doc_type: corpus_bundle
texts:
  psalm.d-cimo-kal-ndas-apr-lis-ce340ab26f:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Archangel Gabriel, who announced to the Blessed Virgin Mary the mystery of the Incarnation of the Lord.
      - type: citation
        text: 'Upon the 23rd day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Africa, the holy martyrs Victorian, Pro-consul of Carthage, and two brethren from Aquae Regiae, also two merchants, both named Frumentius, all in the persecution by the Vandals, were, [as writeth the African, Victor, Bishop of Utica] on account of the steadfastness of their Catholic confession, put to the most grievous torments under the Arian king Hunneric, and gloriously crowned, [in the year 484.]
      - type: text
        text: Likewise in Africa, the holy martyr Faithful there also holy Felix and twenty others.
      - type: text
        text: At Caesarea, in Palestine, the holy martyrs Nicon, [a Neapolitan,] and ninety-nine others. [All suffered at Taormina, in Sicily, under Decius.]
      - type: text
        text: Also the holy martyrs Domitius, [a native of Phrygia,] Pelagia, Aquila, Eparchius, and Theodosia, [under Julian the Apostate.]
      - type: text
        text: At Lima, [in the year 1606,] in the kingdom of Peru, holy Turibius, Archbishop of that see, by whose work the faith and discipline of the church were spread abroad in America.
      - type: text
        text: At Antioch, the holy Priest Theodulus.
      - type: text
        text: At Caesarea, the holy Confessor Julian.
      - type: text
        text: In Campania, the holy monk Benedict, who was shut up by the Goths in a glowing furnace, but upon the morrow was found unhurt, [in the year 550.]
      la:
      - type: text
        text: Décimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: In Africa sanctórum Mártyrum Victoriáni, Procónsulis Cartháginis, et duórum germanórum, Aquisregénsium; item Fruméntii et altérius Fruméntii, mercatórum. Hi omnes, in persecutióne Wandálica (ut scribit Victor, Africánus Epíscopus), sub Ariáno Rege Hunneríco, pro constántia cathólicæ confessiónis, immaníssimis supplíciis cruciáti, egrégie coronáti sunt.
      - type: text
        text: Item in Africa sancti Fidélis Mártyris.
      - type: text
        text: Ibídem sancti Felícis et aliórum vigínti Mártyrum.
      - type: text
        text: Cæsaréæ, in Palæstína, sanctórum Mártyrum Nicónis et aliórum nonagínta novem.
      - type: text
        text: Item corónæ sanctórum Mártyrum Domítii, Pelágiæ, Aquilæ, Epárchii et Theodósiæ.
      - type: text
        text: Limæ, in Perúvia, sancti Turíbii Epíscopi, cuius virtúte fides et disciplína ecclesiástica per Amerícam diffúsæ sunt.
      - type: text
        text: Antiochíæ sancti Theodúli Presbýteri.
      - type: text
        text: Barcinóne, in Hispánia, sancti Ioséphi Oriol Presbýteri, Ecclésiæ sanctæ Maríæ Regum Beneficiárii, omnígena virtúte ac præsértim córporis afflictatióne, paupertátis cultu atque in egénos et infírmos caritáte célebris; quem, in vita et post mortem miráculis gloriósum, Pius Papa Décimus in Sanctórum número recénsuit.
      - type: text
        text: Cæsaréæ sancti Iuliáni Confessóris.
      - type: text
        text: In Campánia sancti Benedícti Mónachi, qui, a Gothis in ardénti clíbano inclúsus, sequénti die invéntus est illǽsus.
  psalm.d-cimo-kal-ndas-aug-sti-10171658c7:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 23rd day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Ravenna, the holy martyr Apollinaris, Bishop of that city. He was ordained at Rome by the Apostle Peter and sent to Ravenna, where he suffered diverse and manifold things for Christ's faith's sake. He afterwards preached the Gospel in Emilia, and turned many from the worshipping of idols. At length he came back to Ravenna, and there finished a glorious testimony under the Caesar Vespasian.
      - type: text
        text: At Le Mans, in Gaul, the holy Confessor Liborius, [fourth Bishop of Le Mans, in the year 425.]
      - type: text
        text: At Rome, the holy martyr Rasyphus.
      - type: text
        text: Also at Rome, the holy Virgin and martyr Primitiva.
      - type: text
        text: Also at Rome, the holy martyrs Apollonius and Eugenius.
      - type: text
        text: On the same day the holy martyrs Trophimus and Theophilus, who under the Emperor Diocletian were stoned and burnt and at last beheaded, and so crowned with martyrdom.
      - type: text
        text: In Bulgaria, very many holy martyrs, whom the profane Emperor Nicephorus, when he was wasting the churches of God, caused to be slain by diverse sorts of death by the sword, by the rope, by arrows, by long imprisonment, and by hunger.
      - type: text
        text: At Rome, the holy Virgins Romula, Redempta, and Hirundo, of whom writeth the holy Pope Gregory.
      - type: text
        text: Also at Rome, the holy widow Brigid, [about the year 1373,] whose sacred body was taken to Sweden upon the 7th day of October, and whose feast is kept upon the 8th day of the same month.
      la:
      - type: text
        text: Décimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Ravénnæ natális sancti Apollináris Epíscopi, qui, ab Apóstolo Petro Romæ ordinátus et Ravénnam missus, pro fide Christi divérsas et multíplices pœnas perpéssus est; póstea, Evangélium in Æmília prǽdicans, plúrimos ab idolórum cultu revocávit; tandem, Ravénnam revérsus, gloriósum martýrium, sub Vespasiáno Cǽsare, complévit.
      - type: text
        text: Cenómanis, in Gállia, sancti Libórii, Epíscopi et Confessóris.
      - type: text
        text: Romæ natális sanctæ Birgíttæ Víduæ, quæ, post multas sanctárum locórum peregrinatiónes, divíno affláta Spíritu, quiévit. Ipsíus autem festívitas octávo Idus Octóbris celebrátur.
      - type: text
        text: Ibídem sancti Rásyphi Mártyris.
      - type: text
        text: Item Romæ pássio sanctæ Primitívæ, Vírginis et Mártyris.
      - type: text
        text: Item sanctórum Mártyrum Apollónii et Eugénii.
      - type: text
        text: Eódem die natális sanctórum Mártyrum Tróphimi et Theóphili, qui, sub Diocletiáno Imperatóre, cæsi lapídibus et igne incénsi, demum, gládio percússi, martýrio coronántur.
      - type: text
        text: In Bulgária sanctórum plurimórum Mártyrum, quos ímpius Imperátor Nicéphorus, Ecclésias Dei devástans, divérso mortis génere, nimírum ense, láqueo, sagíttis, diútino cárcere et fame necári fecit.
      - type: text
        text: Romæ sanctárum Vírginum Rómulæ, Redémptæ et Herúndinis, de quibus scribit sanctus Gregórius Papa.
  psalm.d-cimo-kal-ndas-dec-mbris-edd70e7e4d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 22nd day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Virgin and martyr Cecily. She brought her husband Valerian and his brother Tiburtius to believe in Christ, and nerved them to suffer martyrdom. After their martyrdom, Almachius, Prefect of the city under the Emperor Marcus Aurelius Severus Alexander, caused her to be arrested, and, after she had overcome fire, gloriously to finish her sufferings with the sword.
      - type: text
        text: At Colossae, in Phrygia, the holy martyrs Philemon and Apphia, the disciples of the holy Apostle Paul, (unto whom he addressed an Epistle.) During the reign of the Emperor Nero, the Gentiles broke into the Church upon the feast day of Diana. The rest of the faithful escaped, but these were taken, and by command of the President Artocles they were flogged, buried up to the middle, and stoned to death.
      - type: text
        text: Likewise, at Rome, the holy martyr Maurus, who came from Africa to visit the graves of the Apostles, and suffered under the Emperor Numerian, and the Prefect of the city, Celerinus.
      - type: text
        text: At Antioch, in Pisidia, in the persecution under the Emperor Diocletian, the holy martyrs Mark and Stephen.
      - type: text
        text: At Autun, (in the sixth century,) the holy Confessor Pragmatius, Bishop (of that see.)
      la:
      - type: text
        text: Décimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Sanctæ Cæcíliæ, Vírginis et Mártyris, quæ ad cæléstem Sponsum, próprio sánguine purpuráta, transívit sextodécimo Kaléndas Octóbris.
      - type: text
        text: Colóssis, in Phrýgia, sanctórum Philémonis et Apphíæ, sancti Pauli discipulórum; qui, sub Neróne Imperatóre, cum Gentíles, in die festo Diánæ, invasíssent Ecclésiam, ambo, céteris fugiéntibus, tenti, iussu Artoclis Prǽsidis verbéribus cæsi sunt, et, usque ad renes in fóveam inclúsi, lapídibus opprimúntur.
      - type: text
        text: Romæ sancti Mauri Mártyris, qui, cum ex Africa venísset ad sepúlcra Apostolórum, sub Imperatóre Numeriáno et Urbis Præfécto Celeríno agonizávit.
      - type: text
        text: Antiochíæ Pisídiæ pássio sanctórum Marci et Stéphani, sub Diocletiáno Imperatóre.
      - type: text
        text: Augustodúni sancti Pragmátii, Epíscopi et Confessóris.
  psalm.d-cimo-kal-ndas-febru-rii-118bf9878d:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the Espousal of the Blessed Virgin Mary to holy Joseph.
      - type: text
        text: The holy Confessor Raymond of Penafort, of the Order of Friars Preachers, famous for his holiness and teaching, of whom mention has been made upon the 7th day of this present month of January.
      - type: citation
        text: 'Upon the same 23rd day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Virgin and martyr Emerentiana, who while as yet she was making her ready to be baptized, was stoned to death by the Gentiles while she was praying at the grave of her holy foster-sister Agnes.
      - type: text
        text: At Philippi, in Macedonia, holy Parmenas, one of the first seven Deacons. He yielded himself wholly to the grace of God, discharged in the fulness of faith the office of preaching which had been laid upon him by the brethren, and obtained the glory of martyrdom under the Emperor Trajan.
      - type: text
        text: At Caesarea, in Morocco, of the holy martyrs Severian and Aquila, his wife, who were burnt.
      - type: text
        text: At Antinoe, in Egypt, (in the fourth century,) the holy martyr Aselas, who after suffering diverse torments was cast into the Nile, and rendered up his precious soul to God.
      - type: text
        text: At Ancyra, in Galatia, (in the fourth century,) holy Clement, Bishop of that see, who had often been put to the torture, but at length achieved martyrdom in the persecution under the Emperor Diocletian.
      - type: text
        text: There likewise, (in the fourth century,) upon the same day, and under the President Lucius, the holy martyr Agathangelus.
      - type: text
        text: At Alexandria, (in the year 619,) holy John, surnamed the Almoner, Pope of that city, very famous for his pity toward the poor.
      - type: text
        text: At Toledo, holy Ildefonsus, Archbishop of that city, who on account of the singular purity of his life, and the defence of the virginity of the Mother of God against the heretics who impugned it which he took up, was first gifted, by the same most Blessed Virgin with a chasuble of the purest white, and afterwards called away to heaven, famous for holiness, (in the year 669.)
      - type: text
        text: In the province of Valeria, (in the sixth century,) the holy monk Martyrius, of whom the blessed Pope Gregory maketh mention.
      la:
      - type: text
        text: Décimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Raymúndi de Péñafort, ex Ordine Prædicatórum, Confessóris, cuius dies natális octávo Idus Ianuárii recólitur.
      - type: text
        text: Romæ sanctæ Emerentiánæ, Vírginis et Mártyris; quæ adhuc catechúmena, dum oráret ad sepúlcrum sanctæ Agnétis, cuius fúerat collactánea, a Gentílibus lapidáta est.
      - type: text
        text: Philíppis, in Macedónia, sancti Pármenæ, qui fuit unus de septem primis Diáconis. Hic, tráditus grátiæ Dei, iniúnctum sibi a frátribus offícium prædicatiónis plena fide consúmmans, martýrii glóriam, sub Traiáno, est adéptus.
      - type: text
        text: Ancýræ, in Galátia, sancti Cleméntis Epíscopi, qui, sǽpius cruciátus, tandem, sub Diocletiáno Imperatóre, martýrium consummávit.
      - type: text
        text: Ibídem sancti Agathángeli, qui eódem die, sub Lúcio Prǽside, passus est.
      - type: text
        text: Cæsaréæ, in Mauritánia, sanctórum Mártyrum Severiáni et Aquilæ uxóris, ígnibus combustórum.
      - type: text
        text: Apud Antínoum, Ægýpti urbem, sancti Asclæ Mártyris, qui, post divérsa torménta, pretiósam Deo ánimam, in flumen præcipitátus, réddidit.
      - type: text
        text: Alexandríæ sancti Ioánnis Eleemosynárii, eiúsdem urbis Epíscopi, misericórdia in páuperes celebérrimi.
      - type: text
        text: Toléti, in Hispánia, sancti Ildefónsi Epíscopi, qui, ob singulárem vitæ integritátem, susceptámque fídei defensiónem advérsus hæréticos, sanctíssimæ Dei Genitrícis virginitátem impugnántes, ab eádem Vírgine María donátus est candidíssima veste ac demum, sanctitáte célebris, in cælum vocátus.
      - type: text
        text: In Província Valériæ sancti Martýrii Mónachi, cuius méminit beátus Gregórius Papa.
  psalm.d-cimo-kal-ndas-i-lii-17041f861c:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 22nd day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Verulamium, in Britain, the holy martyr Alban, who in the time of Diocletian gave himself up for a clerk whom he had received as a guest, and was beheaded, [in the year 303,] after being scourged and sharply tormented. One of the soldiers who led him to execution was turned to Christ upon the way and was made worthy to be baptized in his own blood.
      - type: text
        text: At Nola, a city of Campania, the blessed Confessor Paulinus, Bishop of that city, [in the year 431,] who, whereas he was a very noble and wealthy person, became for Christ's sake poor and lowly, and then in addition gave himself up for a slave in order to redeem a widow's son whom the Vandals had carried off as a prisoner to Africa when they wasted Campania. He was illustrious, not only on account of his learning and of the abounding holiness of his life, but also on account of his power against evil spirits. His praises have been set forth in their writings with great force by holy Ambrose, Jerome, Augustine, and Gregory [the Great.] His body has been brought to Rome, and lieth in honour along with the body of the holy Apostle Bartholomew in the church of that Apostle in the island in the Tiber.
      - type: text
        text: At Mount Ararat, ten thousand holy martyrs, who were crucified in the second century.
      - type: text
        text: At Samaria, one thousand four hundred and eighty holy martyrs, who suffered under Chosroes, King of the Persians.
      - type: text
        text: At Rome is commemorated the translation of the holy Consular Flavius Clemens, martyr, who was put to death for Christ's faith's sake by the Emperor Domitian. His body was found in the church of holy Pope Clement, and there solemnly reburied.
      - type: text
        text: On the same day, holy Niceas, Bishop of Romacium, famous for his teaching and holy life.
      - type: text
        text: At Naples, in Campania, holy John, Bishop [of that see,] whom blessed Paulinus, Bishop of Nola, called unto the kingdom of heaven, [in the year 853].
      - type: text
        text: In the monastery at Cluny, the holy Virgin Consortia, [in the year 570.]
      - type: text
        text: At London in England, on Tower Hill, St. John Fisher, bishop of Rochester and cardinal of the Holy Roman Church. For the defense of the Catholic faith and the primacy of the Roman Pontiff he was beheaded by order of King Henry VIII.
      - type: text
        text: At Rome, [in the year 1276,] the blessed Pope Innocent V, who, with gentleness and wisdom, toiled for the upholding of the Church, and for the liberty and unity of Christians. His veneration having been represented to Pope Leo XIII, that Pontiff approved and confirmed it.
      la:
      - type: text
        text: Décimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Apud Nolam, Campániæ urbem, natális beáti Paulíni, Epíscopi et Confessóris, qui ex nobilíssimo et opulentíssimo factus est pro Christo pauper et húmilis, et, quod superérat, seípsum pro rediméndo víduæ fílio, quem Wándali, Campánia devastáta, captívum in Africam abdúxerant, in servitútem dedit. Cláruit autem non solum eruditióne et copiósa vitæ sanctitáte, sed étiam poténtia advérsus dǽmones; eiúsque præcláras laudes sancti Ambrósius, Hierónymus, Augustínus et Gregórius Papa scriptis suis celebrárunt. Ipsíus corpus, póstea Benevéntum et inde Romam translátum, tandem, Summi Pontíficis Pii Décimi iussu, Nolæ restitútum fuit.
      - type: text
        text: Londíni, in Anglia, sancti Ioánnis Fisher, Epíscopi Roffénsis et Cardinális, qui pro fide cathólica et Románi Pontíficis primátu, iubénte Henríco Octávo Rege, decollátus est.
      - type: text
        text: In monte Ararath pássio sanctórum Mártyrum decem míllium, crucifixórum.
      - type: text
        text: Verolámii, in Británnia, sancti Albáni Mártyris, qui, témpore Diocletiáni, pro Clérico hóspite, quem domi excéperat et a quo Christiánæ fídei præceptiónibus imbútus fúerat, seípsum, commutáta veste, trádidit; et hanc ob causam, post vérbera et acérba torménta, cápite plexus est. Passus est étiam cum illo unus de milítibus, qui, dum eum dúceret ad supplícium, in via convérsus est ad Christum, et mox, gládio decollátus, próprio sánguine méruit baptizári. Hoc autem nóbile sancti Albáni ac Sócii durátum pro Deo certámen sanctus Beda Venerábilis descrípsit.
      - type: text
        text: Samaríæ, in Palæstína, sanctórum mille quadringentórum octogínta Mártyrum, qui, sub Rege Persárum Chósroa, pro Christi fide interfécti sunt.
      - type: text
        text: Eódem die sancti Nicétæ, Romatiánæ civitátis Epíscopi, doctrína sanctísque móribus clari.
      - type: text
        text: Neápoli, in Campánia, sancti Ioánnis Epíscopi, quem beátus Paulínus, Epíscopus Nolanus, ad cæléstia regna vocávit.
      - type: text
        text: In monastério Cluniacénsi, in Gállia, deposítio sanctæ Consórtiæ Vírginis.
      - type: text
        text: Romæ beáti Innocéntii Papæ Quinti, ex Ordine Prædicatórum, Confessóris, qui ad tuéndam Ecclésiæ libertátem et Christianórum concórdiam suavi prudéntia adlaborávit. Cultum autem, ei exhíbitum, Leo Décimus tértius, Póntifex Máximus, ratum hábuit et confirmávit.
      - type: text
        text: Item Romæ Translátio sancti Flávii Cleméntis, viri Consuláris et Mártyris; qui, sanctæ Plautíllæ frater ac beátæ Vírginis et Mártyris Fláviæ Domitíllæ avúnculus, a Domitiáno Imperatóre, quocum Consulátum gésserat, ob Christi fidem interémptus est. Ipsíus porro corpus, in Basílica sancti Cleméntis Papæ invéntum, ibídem solémni pompa recónditum est.
  psalm.d-cimo-kal-ndas-i-nii-f16b139287:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 23rd day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Confessor John de' Rossi, famous for his patience and charity in preaching the Gospel to the poor.
      - type: text
        text: At Langres, in Gaul, [in the third century,] the holy Desiderius, Bishop [of that see.] When he saw how the army of the Vandals were harrying his flock he went to plead for them with the Vandal king, who forthwith commanded his throat to be cut upon the spot and he cheerfully stretched out his neck for the sake of his sheep, and with the stroke of the sword passed away to be with Christ. There suffered along with him many others of his people, who are all buried in the same city.
      - type: text
        text: In Spain, the holy martyrs Epitacius the Bishop, and Basil.
      - type: text
        text: In Africa, the holy martyrs Quintian, Lucius, and Julian, who suffered in the persecution under the Vandals, and so obtained crowns that fade not away.
      - type: text
        text: In Cappadocia are commemorated those holy martyrs who, in the persecution under Maximian Galerius, were slain by having their thighs broken also they who, in Mesopotamia, were hung head downwards, and so finished their testimony by being choked with smoke and consumed by slow fire.
      - type: text
        text: In the country of Lyon, the holy Desiderius, Bishop of Vienne, who was stoned to death by order of King Theodoric, and so obtained the crown of martyrdom.
      - type: text
        text: At Synnada, [in the ninth century,] the holy Michael, Bishop [of that see.]
      - type: text
        text: On the same day the holy Mercurial, Bishop [of Forli.]
      - type: text
        text: At Naples, in Campania, [in the third century,] the holy Euphebius, Bishop [of that see.]
      - type: text
        text: At Nursia, the holy monks Eutychius and Florence, of whom mention is made by blessed Pope Gregory the Great.
      la:
      - type: text
        text: Décimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Apud Língonas, in Gállia, pássio sancti Desidérii Epíscopi, qui, cum plebem suam ab exércitu Wandalórum vexári cérneret, ad Regem eórum pro ea supplicatúrus accéssit; a quo statim iugulári iussus, pro óvibus sibi créditis cervícem libénter exténdit, et, percússus gládio, migrávit ad Christum. Passi sunt autem cum ipso et álii plures de número gregis sui, qui apud eándem urbem cónditi sunt.
      - type: text
        text: In Hispánia sanctórum Mártyrum Epitácii Epíscopi, et Basiléi.
      - type: text
        text: In território Lugdunénsi sancti Desidérii, Epíscopi Viennénsis; qui, Theodoríci Regis iussu lapídibus óbrutus, martýrio coronátur.
      - type: text
        text: In Africa sanctórum Mártyrum Quinctiáni, Lúcii et Iuliáni, qui, in persecutióne Wandálica passi, ætérnas corónas meruérunt.
      - type: text
        text: In Cappadócia commemorátio sanctórum Mártyrum, qui, in persecutióne Maximiáni Galérii, confráctis crúribus, necáti sunt; item eórum, qui eódem témpore, in Mesopotámia, appénsi pédibus in sublíme, cápite verso deórsum, suffocáti fumo et lento igne consúmpti, martýrium complevérunt.
      - type: text
        text: Sýnnadæ, in Phrýgia, sancti Michaélis Epíscopi.
      - type: text
        text: Ipso die sancti Mercuriális Epíscopi.
      - type: text
        text: Neápoli, in Campánia, sancti Euphébii Epíscopi.
      - type: text
        text: Romæ sancti Ioánnis Baptístæ de Rossi, Presbýteri et Confessóris, patiéntia et caritáte in evangelizándis paupéribus insígnis.
      - type: text
        text: Apud Núrsiam sanctórum Eutýchii et Floréntii Monachórum, quorum méminit beátus Gregórius Papa.
  psalm.d-cimo-kal-ndas-ianu-rii-f819578302:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 23rd day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Virgin and martyr Victoria (de Tivoli.) She was espoused to one Eugenius, a heathen, and during the persecution under the Emperor Decius she would neither marry Eugenius nor offer sacrifice unto idols, but worked many miracles, whereby she gathered many virgins unto God, and the executioner stabbed her to the heart with his sword at the request of her espoused husband.
      - type: text
        text: At Nicomedia, twenty holy martyrs during the persecution under the Emperor Diocletian, after they had been most grievously tormented.
      - type: text
        text: There likewise, in the same persecution, the holy martyrs Migdonius and Mardonius, of whom the one was burnt and the other cast into a ditch, and so died. Then also suffered the Deacon of holy Anthimus, Bishop of Nicomedia, who was bringing a letter to the martyrs when he was taken by the Gentiles and stoned to death, and so passed hence to be ever with the Lord.
      - type: text
        text: In Crete, the holy martyrs Theodulus, Saturninus, Euporus, Gelasius, Eunician, Zeticus, Cleomenes, Agathopus, Basilides, and Evaristus, who suffered great cruelties in the persecution under the Emperor Decius, and were beheaded. (They are often called the Ten Martyrs of Crete.)
      - type: text
        text: At Rome, blessed Servulus, concerning whom holy Gregory writeth that from his childhood even unto the end of his life he lay paralysed in a porch hard by the church of St. Clement, and at the end he was called by songs of angels, and passed away into the glory of Paradise, (in the year 570.) God doth very often show miracles at his grave.
      la:
      - type: text
        text: Décimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctæ Victóriæ, Vírginis et Mártyris, quæ, in persecutióne Décii Imperatóris, cum esset desponsáta Eugénio pagáno et nec núbere vellet neque sacrificáre, ídeo, post multa facta mirácula, quibus plúrimas Deo Vírgines aggregáverat, a carnífice percússa est gládio in corde, rogátu sui sponsi.
      - type: text
        text: Nicomedíæ pássio sanctórum Migdónii et Mardónii, quorum alter, in Diocletiáni persecutióne, igne cremátus, alter in fossam proiéctus occúbuit. Tunc étiam Diáconus sancti Anthimi, Epíscopi Nicomediénsis, passus est; qui, cum lítteras perférret ad Mártyres, a Gentílibus tentus est, atque, lapídibus óbrutus, migrávit ad Dóminum.
      - type: text
        text: Ibídem natális sanctórum vigínti Mártyrum, quos ípsamet Diocletiána persecútio, gravíssimis torméntis cruciátos, Mártyres Christi fecit.
      - type: text
        text: In Creta sanctórum Mártyrum Theodúli, Saturníni, Eupori, Gelásii, Euniciáni, Zetici, Leóminis, Agathópodis, Basílidis et Evarísti; qui, in Décii persecutióne, crudélia passi sunt et cápite cæsi.
      - type: text
        text: Romæ beáti Sérvuli, qui (ut sanctus Gregórius Papa scribit), a primǽva sui ætáte usque ad finem vitæ, paralýticus iácuit in pórticu prope Ecclésiam sancti Cleméntis, et demum, Angelórum cántibus invitátus, ad paradísi glóriam transívit; ad cuius túmulum Deus mirácula crebérrime osténdit.
  psalm.d-cimo-kal-ndas-m-rtii-ed5a2dde37:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 20th day of February are commemorated
      - type: text
        text: ''
      - type: text
        text: The blessed martyrs of Tyre, in Phoenicia, whose number is known only to God. They were slain by Veturius, military instructor under the Emperor Diocletian, with a great number and variety of torments. They were first lacerated with stripes, then given to diverse kinds of beasts but as these, through the power of God, would not hurt them, they were savagely tortured anew with fire and iron and put to death. This glorious multitude were cheered on to victory by the Bishops Tyrannio, Silvan, Peleus, and Nilus, and the Priest Zenobius, who by a happy contention, along with them, gained the same palm of martyrdom together with them.
      - type: citation
        text: 'On the same 20th day of February, were also born into the better life: In the island of Cyprus, the holy martyrs Pothamius and Nemesius.'
      - type: text
        text: At Constantinople, [in the year 490,] the holy martyr Eleutherius, [eighth] Patriarch of that city. [He had replaced Acacius, who favoured the Eutychians.]
      - type: text
        text: In Persia, [in the year 342,] holy Sadoth, [Arch]bishop [of Seleucia and Ctesephon, in Persia, successor to St. Simeon,] and an hundred and twentyeight others who refused to worship the sun, under Sapor, King of the Persians, and by cruel deaths gained glorious crowns.
      - type: text
        text: At Catania, in Sicily, [in the eighth century,] holy Leo, Bishop of that see, who shone with graces and miracles.
      - type: text
        text: On the same day, [in the year 738,] holy Eucherius, Bishop of Orleans, who shone with more miracles the more he was belied by his enemies.
      - type: text
        text: At Tournai, in Hainaut, [in the year 531,] the holy Confessor Eleutherius, Bishop of that see.
      la:
      - type: text
        text: Décimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Tyri, in Phœnícia, commemorátio beatórum Mártyrum, quorum númerum solíus sciéntia Dei cólligit. Hi omnes, sub Diocletiáno Imperatóre, a Vetúrio, mílitum magístro, multis tormentórum genéribus, sibi invícem succedéntibus, occísi sunt; nam, primo quidem flagris toto córpore dilaniáti, inde divérsis bestiárum genéribus tráditi, sed ab illis divína virtúte nil læsi, post, áddita feritáte ignis ac ferri, martýrium consummárunt. Eórum vero gloriósam multitúdinem ad victóriam incitábant Epíscopi Tyránnio, Silvánus, Péleus et Nilus, ac Présbyter Zenóbius, qui, felíci agóne, una cum illis, martýrii palmam adépti sunt.
      - type: text
        text: Constantinópoli sancti Eleuthérii, Epíscopi et Mártyris.
      - type: text
        text: In Pérside natális sancti Eleuthérii, Epíscopi, et aliórum centum vigínti octo; qui, sub Rege Persárum Sápore, cum Solem adoráre renuíssent, crudéli nece præcláras sibi corónas comparárunt.
      - type: text
        text: In Cypro sanctórum Mártyrum Potámii et Nemésii.
      - type: text
        text: Cátanæ, in Sicília, sancti Leónis Epíscopi, qui virtútibus atque miráculis coruscávit.
      - type: text
        text: Eódem die sancti Euchérii, Aurelianénsis Epíscopi, qui eo magis miráculis cláruit, quo plúribus invidórum calúmniis fuit oppréssus.
      - type: text
        text: Tornáci, in Gálliis, sancti Eleuthérii, Epíscopi et Confessóris.
  psalm.d-cimo-kal-ndas-maii-19e79a8f62:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 22nd day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Appian Way, the holy martyr Soter, Pope [in the years 162-170.]
      - type: text
        text: At Rome likewise, the holy martyr Caius, Pope [in the years 283-295,] who was crowned with martyrdom under the Emperor Diocletian.
      - type: text
        text: At Smyrna, holy Apelles and Lucius, who were among the earliest disciples of Christ. [Apelles is said by the Greeks to have ruled the Church of Smyrna, and Lucius that of Laodicea. They are mentioned by St Paul in the Epistle to the Romans, ch. xvi.]
      - type: text
        text: Upon the same day very many holy martyrs, who were slain with the sword for Christ's name's sake by order of King Sapor in diverse places throughout the whole kingdom of Persia, in the year following the death of Simeon, and like him upon the day upon which is made the memorial of the Passion of the Lord. In this contending for the faith [from the year 341 till 386,] there suffered the eunuch Azades, who was a favourite of the king; Milles, Bishop [of a town in Persia,] who was illustrious for his holiness and for the glory of his miracles; Acepsimas, Bishop [of Honite, in Syria,] along with James his Priest the Priests; Aithalas, [Deacon of Bathnukadra,] and Joseph, [Priest of Bethcatuba,] the Deacons Azadanes and Abd-Jesus, and very many others of the clergy; likewise also the Bishops Mareas and Bicor, along with twenty other bishops, and nearly two hundred and fifty of the clergy; likewise also very many monks, and hallowed virgins, among whom was Tarbula, the sister of holy Simeon, along with her waiting-woman, who were most cruelly slain by being bound to beams and cut through with a saw.
      - type: text
        text: Also in Persia, [in the year 251,] the holy martyrs, the Priests Parmenius, Helimenas, and Chrysotelus, and the Deacons Luke and Mucius, whose triumph is recorded in the history of the sufferings of the holy martyrs Abdon and Sennen.
      - type: text
        text: At Alexandria, the holy martyr Leonides, who suffered under the Emperor Severus.
      - type: text
        text: At Lyons, [in the year 177,] holy martyr Epipodius, who was arrested along with his colleague Alexander, in the persecution under the Emperor Antoninus Verus, and after suffering most grievous torments was beheaded.
      - type: text
        text: At Sens, [in the year 541,] the holy Confessor Leo, Bishop of that see.
      - type: text
        text: At Anastasiopolis, [in Galatia, in the year 613,] holy Theodore, Bishop [of that see,] famous for miracles.
      la:
      - type: text
        text: Décimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Appia, natális sancti Sotéris, Papæ et Mártyris.
      - type: text
        text: Item Romæ sancti Caii, Papæ et Mártyris; qui martýrio coronátus est sub Diocletiáno Príncipe.
      - type: text
        text: Smyrnæ sanctórum Apéllis et Lúcii, ex primis Christi discípulis.
      - type: text
        text: Eódem die sanctórum plurimórum Mártyrum, qui, sequénti anno post óbitum Simeónis, ánnuo item die quo passiónis Domínicæ memória celebrabátur, per totam Pérsidis regiónem, pro Christi nómine, sub Rege Sápore, gládio cædi iussi sunt. In quo fídei certámine passus est Azades eunúchus, Regi caríssimus; Milles Epíscopus, sanctitáte et miraculórum virtúte insígnis; Acépsimas Epíscopus, cum Presbýtero suo Iacóbo, item Aíthala et Iosépho Presbýteris, Azadáne et Abdiéso Diáconis, et complúribus áliis Cléricis; Maréas quoque et Bicor Epíscopi, cum áliis vigínti Epíscopis, et Cléricis fere ducéntis quinquagínta, Mónachis étiam et sacris Virgínibus plúrimis. Has inter Vírgines fuit étiam sancti Simeónis Epíscopi soror, nómine Tárbula, cum pedíssequa sua; quæ, stipítibus alligátæ serráque scissæ, crudelíssime necátæ sunt.
      - type: text
        text: Item in Pérside sanctórum Parménii, Heliménæ et Chrysotéli Presbyterórum, Lucæ et Múcii Diaconórum, quorum triúmphus martýrii in passióne sanctórum Abdon et Sennen habétur.
      - type: text
        text: Alexandríæ natális sancti Leónidæ Mártyris, qui sub Sevéro passus est.
      - type: text
        text: Lugdúni, in Gállia, sancti Epipódii, qui, in persecutióne Antoníni Veri, cum Alexándro colléga tentus, ibídem, post dira torménta, martýrium abscissióne cápitis complévit.
      - type: text
        text: Constantinópoli sancti Agapíti Papæ Primi, cuius sánctitas a beáto Gregório Magno commendátur. Ipsíus autem corpus, póstea Romam relátum, in Vaticáno cónditum est.
      - type: text
        text: Apud Sénonas sancti Leónis, Epíscopi et Confessóris.
      - type: text
        text: Anastasiópoli, in Galátia, sancti Theodóri Epíscopi, miráculis clari.
  psalm.d-cimo-kal-ndas-nov-mbris-7382eb13fd:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the solemn feast of Our Most Holy Redeemer, whose venerable image was taken by barbarians and carried off into Africa, where it was treated with mocking and insults, and then was cast away into a lion's den. It was bought back for money by the bare-footed Friars of the Order of the Most Holy Trinity, and brought to Spain, where it is distinguished everywhere for signs and wonders, and is worshipped and honoured with great earnestness by the people under the Most Holy Name of Jesus of Nazareth.
      - type: citation
        text: 'Upon the same 23rd day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Osuna, near Cadiz, in Spain, the holy martyrs Servandus and Germanus. Under the Imperial Vicar Viator, in the persecution under the Emperor Diocletian, they suffered stripes, a foul imprisonment, hunger and thirst, and a long and toilsome journey, which they were forced to make loaded with irons, and in the end finished the course of their martyrdom by being beheaded. Germanus is buried at Merida and Servandus at Seville.
      - type: text
        text: At Antioch, in Syria, the holy Priest Theodore. In the persecution under the Emperor Julian, the impious apostate, he was arrested and racked, and after many and terrible sufferings, wherein he was partly burnt by the putting of lamps to his sides, he was beheaded, and so finished his martyrdom, still steadfast in the confession of Christ.
      - type: text
        text: At Granada, in Spain, is commemorated the blessed martyr Peter Paschal, Bishop of Jaen, of the Order of the Blessed Mary of Ransom for the Redemption of Captives, who suffered upon the 6th day of December, (in the year 1300.)
      - type: text
        text: At Constantinople, (in the year 878,) the holy Archbishop Ignatius, who suffered much at the hands of the Caesar Bardas, because he rebuked him for having put away his wife, and was sent into exile, but was restored by Nicholas I., Pope of Rome, and in the end fell asleep in peace.
      - type: text
        text: At Bordeaux, (in the fifth century,) the holy Confessor Severinus, Bishop of Cologne, (and afterward of Bordeaux.)
      - type: text
        text: At Rouen, (in the seventh century,) holy Romanus, Bishop (of that see.)
      - type: text
        text: At Salerno, (in the fifth century,) holy Verus, Bishop (of that see.)
      - type: text
        text: In the country of Amiens, (in the eighth century,) the holy Priest Domitius.
      - type: text
        text: At Poitiers, the holy Confessor Benedict.
      - type: text
        text: At Willach, in Pannonia, the holy Confessor John of Capistrano, of the Order of Friars Minor, illustrious for the holiness of his life and for his zeal for the propagation of the Catholic faith, who by his prayers and miracles procured the defeat of a vast army of Turks, and delivered the fortress of Belgrade from beleaguerment. We keep his feast upon the 28th day of March.
      la:
      - type: text
        text: Décimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Antónii Maríæ Claret, Epíscopi et Confessóris, cuius dies natális sequénti die recensétur.
      - type: text
        text: Apud Villáckum, in Pannónia, natális sancti Ioánnis de Capistráno, Sacerdótis ex Ordine Minórum et Confessóris, vitæ sanctitáte ac fídei cathólicæ propagándæ zelo illústris; qui Taurunénsem arcem, validíssimo Turcárum exércitu profligáto, suis précibus et miráculis ab obsidióne liberávit. Eius tamen festívitas quinto Kaléndas Aprílis recólitur.
      - type: text
        text: Antiochíæ item natális sancti Theodóri Presbýteri, qui, in persecutióne ímpii Iuliáni comprehénsus, et, post equúlei pœnam et multos ac duríssimos cruciátus, lampádibus étiam circa látera appósitis adústus, tandem, cum in confessióne Christi persísteret, gládii occisióne martýrium consummávit.
      - type: text
        text: Ad fundum Ursoniánum, prope Gades, in Hispánia, sanctórum Mártyrum Servándi et Germáni, qui, in persecutióne Diocletiáni, sub Viatóre Vicário, post vérbera, squalórum cárceris, famis ac sitis iniúriam, et longíssimi itíneris labórem, quem pertulérunt ferro onústi, novíssime martýrii sui cursum, cæsis cervícibus, implevérunt; ex quibus Germánus Eméritæ, Servándus autem Híspali cónditus est.
      - type: text
        text: Constantinópoli sancti Ignátii Epíscopi, qui, cum Bardam Cǽsarem ob repudiátam uxórem arguísset, ab eo multis iniúriis afféctus est, et in exsílium pulsus; sed, a sancto Nicoláo, Románo Pontífice, restitútus, tandem in pace quiévit.
      - type: text
        text: Burdígalæ sancti Severíni, Epíscopi Coloniénsis et Confessóris.
      - type: text
        text: Rotómagi sancti Románi Epíscopi.
      - type: text
        text: Apud Salérnum sancti Veri Epíscopi.
      - type: text
        text: In território Ambianénsi sancti Domítii Presbýteri.
      - type: text
        text: In pago Pictaviénsi sancti Benedícti Confessóris.
      - type: text
        text: Mántuæ Beáti Ioánnis Boni, ex Eremitárum sancti Augustíni Ordine, Confessóris; cuius præcláram vitam sanctus Antonínus conscrípsit.
  psalm.d-cimo-kal-ndas-oct-bris-986be8cb56:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the morrow we keep the feast of the holy Confessor Thomas of Villanueva, Bishop of Valencia, in Spain, of whom mention is made upon the 8th day of this present month of September.
      - type: citation
        text: 'Upon the same 22nd day of September, were born into the better life:'
      - type: text
        text: At Sion, in Switzerland, the holy martyrs of the Theban Legion Maurice, Exuperius, Candidus, Victor, Innocent, Vitalis, and their Comrades, who were massacred for Christ's sake under the Emperor Maximian, and have enlightened the whole world by the glory of their passion.
      - type: text
        text: At Rome, under the Emperors Valerian and Gallienus, the holy Virgins Digna and Emerita, both martyrs. Their relics are kept in the Church of St. Marcellus.
      - type: text
        text: At Chartres, the holy martyr Jonah, a Priest, who came into Gaul along with holy Denis, and was, by command of the Prefect Julian, flogged and beheaded.
      - type: text
        text: At Regensburg, in Bavaria, (in the seventh century,) the holy martyr Emmeram, the Bishop who, in order that he might deliver others, patiently submitted to a most cruel death for Christ's sake.
      - type: text
        text: At Antinoopolis, in Egypt, the holy martyrs Irais, a Virgin of Alexandria, and her Companions. She was gone out to draw water from a well near by when she saw a ship full of confessors of Christ, and thereupon she forthwith left her water-pot and joined them, and was brought along with them into the city, where she first of all, after many torments, was beheaded, and then all the rest, of whom some were Priests, Deacons, or Virgins, were put to the same death.
      - type: text
        text: At Meaux, blessed Sanctinus, a disciple of holy Denys the Areopagite, who consecrated him Bishop of that city, where he was the first to preach the Gospel.
      - type: text
        text: In the country of Coutances, (in the sixth century,) the holy Confessor Lauto, Bishop (of that see.)
      - type: text
        text: In Poitou, (in the fifth century,) the holy Priest Florence.
      - type: text
        text: In the country of Bourges, (in the first century,) the holy Confessor Silvan.
      - type: text
        text: At Laon, (in the seventh century,) the holy widow Salaberga, Abbess (of the Monastery of St. John the Baptist.)
      la:
      - type: text
        text: Décimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Sancti Thomæ a Villa Nova, ex Eremitárum sancti Augustíni Ordine, Epíscopi Valentíni et Confessóris; cuius dies natális recólitur sexto Idus Septémbris.
      - type: text
        text: Sedúni, in Gállia, in loco Agáuno, natális sanctórum Mártyrum Thebæórum Maurítii, Exsupérii, Cándidi, Victóris, Innocéntii et Vitális, cum Sóciis eiúsdem legiónis; qui, sub Maximiáno, pro Christo necáti, gloriósa passióne mundum illustrárunt.
      - type: text
        text: Romæ pássio sanctárum Vírginum et Mártyrum Dignæ et Eméritæ, sub Valeriáno et Galliéno; quarum relíquiæ in Ecclésia sancti Marcélli asservántur.
      - type: text
        text: Ratisbónæ, in Bavária, sancti Emmerámi, Epíscopi et Mártyris; qui, ut álios liberáret, mortem sævíssimam, Christi causa, patiénter súbiit.
      - type: text
        text: Apud pagum Castrénsium sancti Ionæ, Presbýteri et Mártyris; qui, cum sancto Dionýsio proféctus in Gálliam, ibídem, Iuliáni Præfécti iussu verbéribus cæsus, gládio martýrium consummávit.
      - type: text
        text: Antinoópoli, in Ægýpto, sanctæ Iráidis, Vírginis Alexandrínæ, et Sociórum Mártyrum. Ipsa Virgo, cum esset ad hauriéndam e próximo fonte aquam egréssa, et navim vidísset Confessóribus Christi onústam, prótinus, relícta hýdria, se illis adiúnxit, ac, simul cum iis in urbem ducta, prima ómnium, post multa supplícia, cápite cæsa est; deínde Presbýteri, Diáconi, et Vírgines, aliíque omnes eódem mortis génere consúmpti sunt.
      - type: text
        text: Romæ sancti Felícis Papæ Quarti, qui pro fide cathólica plúrimum laborávit.
      - type: text
        text: Apud civitátem Meldénsem beáti Sanctíni Epíscopi, qui fuit discípulus sancti Dionýsii Areopagítæ; et, eiúsdem civitátis Epíscopus ab eo consecrátus, primus illic Evangélium prædicávit.
      - type: text
        text: In território Constantiénsi, in Gállia, sancti Lautónis Epíscopi.
      - type: text
        text: In monte Glonna, ad Lígerim flumen, in Gállia, sancti Floréntii Presbýteri.
      - type: text
        text: In óppido cui Leprósii nomen, in território Bituricénsi, sancti Silváni Confessóris.
      - type: text
        text: Laudúni, in Gállia, sanctæ Salabérgæ Abbatíssæ.
  psalm.d-cimo-kal-ndas-sept-mbris-c89ca53eb7:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the eve of the holy Apostle Bartholomew.
      - type: citation
        text: 'Upon the same 23rd day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Todi, [in Umbria, in the year 1285,] the holy Confessor Philip Benizi of Florence, a man of eminent lowliness, who greatly spread the Order of Servants of the Blessed Virgin Mary, and whose name Pope Clement X added to the list of those of the Saints.
      - type: text
        text: At Antioch, [in the fourth century,] the holy martyrs Restitutus, Donatus, Valerian, and Fructuosa, along with twelve others, who were crowned with the glory of an illustrious testimony.
      - type: text
        text: At Ostia, [in the third century,] the holy martyrs Quiriacus, Bishop [of that see,] the Priest Maximus, the Deacon Archelaus, and their Companions, who suffered under the Prefect Ulpian, in the time of the Emperor Alexander.
      - type: text
        text: At Aegaea, in Cilicia, the holy brethren Claudius, Asterius, and Neon, all martyrs. They were accused of Christianity by their step-mother, in the time of the Emperor Diocletian, and were first severely tortured, and then crucified, under the President Lysias, and so triumphed as conquerors with Christ. After them suffered Donvina and Theonilla.
      - type: text
        text: At Reims, in Gaul, [in the third century,] the holy martyrs Timothy and Apolinaris, who there finished their testimony and gained the Kingdom of Heaven.
      - type: text
        text: At Lyon, [in the third century,] the holy martyrs Minervus and Eleazar, with eight children.
      - type: text
        text: Likewise, the holy martyr Luppus, who was a slave, but free in Christ, and received also the crown of martyrdom.
      - type: text
        text: At Jerusalem, [in the second century,] holy Zachaeus, the fourth Bishop from the blessed Apostle James who governed that Church.
      - type: text
        text: At Alexandria, [in the year 300,] the holy Confessor Theonas, Pope [of that see.]
      - type: text
        text: At Utica, in Africa, [in the fifth century,] blessed Victor, Bishop [of Vite, in the territory of Tunis.]
      - type: text
        text: At Autun, [in the seventh century,] holy Flavian, Bishop [of that see.]
      - type: text
        text: At Clermont, in Auvergne, [in the fifth century,] holy Sidonius, Bishop [of that see,] famous for his learning and holiness.
      la:
      - type: text
        text: Décimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Philíppi Benítii Confessóris, qui Ordinis Servórum beátæ Maríæ Vírginis éxstitit propagátor, ac prídie huius diéi migrávit ad Dóminum.
      - type: text
        text: Apud Ostia Tiberína sanctórum Mártyrum Quiríaci Epíscopi, Máximi Presbýteri, Archelái Diáconi, et Sociórum, qui sub Ulpiáno Præfécto, témpore Alexándri, passi sunt.
      - type: text
        text: Antiochíæ natális sanctórum Mártyrum Restitúti, Donáti, Valeriáni et Fructuósæ, cum áliis duódecim; qui præclaríssimo confessiónis honóre coronáti sunt.
      - type: text
        text: Ægǽæ, in Cilícia, sanctórum Mártyrum fratrum Cláudii, Astérii et Neónis, qui, Christiánæ religiónis a novérca accusáti, sub Diocletiáno Imperatóre et Lýsia Prǽside, post acérba torménta cruci sunt affíxi, in qua victóres cum Christo triumphárunt. Passæ sunt post eos Donvína et Theonílla.
      - type: text
        text: Rhemis, in Gállia, natális sanctórum Timóthei et Apollináris, qui, ibídem consummáto martýrio, cæléstia regna meruérunt.
      - type: text
        text: Lugdúni, in Gállia, sanctórum Mártyrum Minérvi, et Eleazári cum fíliis octo.
      - type: text
        text: Item sancti Luppi Mártyris, qui, ex servíli conditióne, Christi libertáte donátus, martýrii quoque coróna dignátus est.
      - type: text
        text: Hierosólymis sancti Zachǽi Epíscopi, qui, quartus a beáto Iacóbo Apóstolo, Hierosolymitánam Ecclésiam rexit.
      - type: text
        text: Alexandríæ sancti Theónæ, Epíscopi et Confessóris.
      - type: text
        text: Uticæ, in Africa, beáti Victóris Epíscopi.
      - type: text
        text: Augustodúni sancti Flaviáni Epíscopi.
  psalm.d-cimo-nono-kal-ndas-febru-rii-1389dafdc9:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Hilary, Bishop of Poitiers, and Doctor of the Church, who passed away to heaven upon this present day.
      - type: citation
        text: 'Upon the same 14th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nola, in Campania, the holy Priest Felix. Holy Paulinus, Bishop of the same city, writeth that after the persecutors had put Felix to the torture they committed him to prison, where they laid him in chains, upon shells and potsherds, but in the night an angel loosed him and led him forth. In after-times, when the persecution was over and he had turned many to Christ by his example and teaching, he fell asleep, famous for miracles, (about the year 256.)
      - type: text
        text: In Judea, the holy Prophet Malachi, (415 B.C.)
      - type: text
        text: Upon Mount Sinai, thirty-eight holy monks, who were massacred by the Saracens for Christ's faith's sake, (in the year 373.)
      - type: text
        text: In the country of Rhaithia, in Egypt, forty-three holy monks who were massacred by the Blemmyes for the Christian religion's sake, (in the year 373.)
      - type: text
        text: At Milan, (in the year 552,) the holy Confessor Datius, Bishop of that see, of whom blessed Pope Gregory maketh mention.
      - type: text
        text: In Africa, the holy Bishop Euphrasius, (in the year 515.)
      - type: text
        text: In Syria, holy Julian of Saba, the elder, who in the time of the Emperor Valens, by the power of his miracles, set up again at Antioch the Catholic faith, when it was almost quite fallen away.
      - type: text
        text: At Neo-Caesarea, in Pontus, (in the fourth century,) holy Macrina, a disciple of blessed Gregory the wonder-worker, and grandmother of holy Basil, whom she trained up in the faith.
      la:
      - type: text
        text: Décimo nono Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Hilárii, Epíscopi Pictaviénsis, Confessóris et Ecclésiæ Doctóris; qui prídie huius diéi evolávit in cælum.
      - type: text
        text: Nolæ, in Campánia, natális sancti Felícis Presbýteri, qui (ut sanctus Paulínus Epíscopus scribit), cum a persecutóribus post torménta in cárcerem missus esset, et cóchleis ac téstulis vinctus superpósitus iacéret, nocte ab Angelo solútus atque edúctus fuit; póstmodum vero, cessánte persecutióne, ibídem, cum multos ad Christi fidem exémplo vitæ ac doctrína convertísset, clarus miráculis quiévit in pace.
      - type: text
        text: In Iudǽa sancti Malachíæ Prophétæ.
      - type: text
        text: In monte Sina sanctórum trigínta octo Monachórum, a Saracénis ob Christi fidem interfectórum.
      - type: text
        text: In Rhaíthi regióne, in Ægýpto, sanctórum quadragínta trium Monachórum, qui, pro Christiána religióne, a Blémmiis occísi sunt.
      - type: text
        text: Medioláni sancti Dátii, Epíscopi et Confessóris; cuius méminit beátus Gregórius Papa.
      - type: text
        text: In Africa sancti Euphrásii Epíscopi.
      - type: text
        text: Neocæsaréæ, in Ponto, sanctæ Macrínæ, discípulæ beáti Gregórii Thaumatúrgi, et áviæ sancti Basilíi, quæ eúndem Basilíum educávit.
  psalm.d-cimo-nono-kal-ndas-ianu-rii-3c3e58e2a7:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 14th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, (in the year 250,) the holy martyrs Heron, Arsenius, and Isidore, and a lad Dioscorus. In the persecution under the Emperor Decius the judge caused Heron, Arsenius, and Isidore to be lacerated with diverse torments, and, when he saw them to be all equally steadfast, to be burnt. Dioscorus was heavily whipped, but God was pleased that, for the comfort of the faithful, he should then be set at liberty.
      - type: text
        text: At Antioch, the holy martyrs Drusus, Zosimus, and Theodore.
      - type: text
        text: Upon the same day, (in the year 284,) the holy martyrs Justus and Abundius. Under Olybrius the President, in the persecution under the Emperor Numerian, they were cast into the fire, and when they appeared thence unburnt, they were beheaded.
      - type: text
        text: At Reims, the holy martyrs Nicasius, Bishop, (in the year 400,) of that see the Virgin Eutropia, his sister, and their Companions, who were slain by the savage enemies of the Church (in the year 407.)
      - type: text
        text: In the island of Cyprus the blessed Spiridion, Bishop (of Tremithos) he was one of those Confessors whose right eyes were put out and their left thighs hamstrung, and were condemned to penal servitude in the mines by the Emperor Galerius Maximian. He was illustrious for the gift of prophecy, and the fame of miracles, and at the Council of Nicea, (held in 325,) he confuted and converted to the faith a heathen philosopher who attacked the Christian religion, (and died after the year 347.)
      - type: text
        text: At Bergamo, the holy Confessor Viator, Bishop (of that see.)
      - type: text
        text: At Pavia, holy Pompey, Bishop (of that see.)
      - type: text
        text: At Naples, in Campania, (in the year 596,) holy Agnello, Abbot (at Naples,) famous for the grace of miracles, who, when the city had been beleaguered, had often been seen with a flag marked with a cross, delivering it from the enemy.
      - type: text
        text: At Ubeda, in Spain, the holy Confessor John of the Cross (died in 1591) a companion of holy Teresa in reforming the Carmelites, whose feast is kept upon the 24th day of November.
      - type: text
        text: At Milan, the holy Hermit Matronian.
      la:
      - type: text
        text: Décimo nono Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Ubédæ, in Hispánia, natális sancti Ioánnis a Cruce, Presbýteri et Confessóris, sanctæ Terésiæ in Carmelitárum reformatióne sócii; quem, a Summo Pontífice Benedícto Décimo tértio Sanctis adscríptum, Pius Papa Undécimus Doctórem universális Ecclésiæ declarávit. Ipsíus tamen festívitas ágitur octávo Kaléndas Decémbris.
      - type: text
        text: Rhemis, in Gállia, pássio sanctórum Nicásii Epíscopi, ac soróris Eutrópiæ Vírginis, et Sociórum Mártyrum; qui a bárbaris Ecclésiæ hóstibus cæsi sunt.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Herónis, Arsénii, Isidóri, et Dióscori púeri. Horum tres primos Iudex, in persecutióne Deciána, cum eos, váriis torméntis dilánians, pari armátos constántia vidéret, tradi ígnibus iubet; Dióscorus vero, multiplíciter flagellátus, divíno nutu ad consolatiónem fidélium dimíssus est.
      - type: text
        text: Antiochíæ natális sanctórum Mártyrum Drusi, Zósimi et Theodóri.
      - type: text
        text: Eódem die pássio sanctórum Iusti et Abúndii, qui, sub Numeriáno Imperatóre et Olýbrio Prǽside, coniécti in ignem, et, cum inde evasíssent illǽsi, gládio percússi sunt.
      - type: text
        text: In Cypro natális beáti Spiridiónis Epíscopi, qui unus fuit ex illis Confessóribus, quos Galérius Maximiánus, dextro oculo effósso et sinístro póplite succíso, ad metálla damnáverat. Hic prophetíæ dono et signórum glória ínclitus fuit, et in Nicǽno Concílio philósophum éthnicum, Christiánæ religióni insultántem, devícit et ad fidem perdúxit.
      - type: text
        text: Bérgomi sancti Viatóris, Epíscopi et Confessóris.
      - type: text
        text: Pápiæ sancti Pompéii Epíscopi.
      - type: text
        text: Neápoli, in Campánia, sancti Agnélli Abbátis, virtúte miraculórum illústris, qui obséssam urbem sæpe visus est Crucis vexíllo ab hóstibus liberáre.
      - type: text
        text: Medioláni sancti Matroniáni Eremítæ.
  psalm.d-cimo-nono-kal-ndas-sept-mbris-56002e50af:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Eve of the Assumption of the Blessed Virgin Mary.
      - type: citation
        text: 'Upon the same 14th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 357,] the holy Priest Eusebius. On account of his defence of the Catholic faith the Arian Emperor Constantius caused him to be imprisoned in a bedchamber in his own house, where he lived for seven months, continuing instant in prayer, and then fell asleep. His body was taken by the Priests Gregory and Orosius and buried in the cemetery of Callistus, upon the Appian Way.
      - type: text
        text: In Illyricum, under the Emperor Maximian and the President Aristides, the holy martyr Ursicius, who was beheaded for Christ's name's sake after many and diverse torments.
      - type: text
        text: In Africa, the holy martyr Demetrius.
      - type: text
        text: At Apamea, in Syria, [in the year 389,] the holy martyr Marcellus, Bishop [of that see,] who was destroying a shrine of Jupiter when he was slain by the infuriated Gentiles.
      - type: text
        text: At Todi, [in Umbria,] the holy martyr Callistus, Bishop [of that see.]
      - type: text
        text: In the island of Jegima, in the Grecian Archipelago, [about the year 860,] the holy widow Athanasia, [Abbess of a monastery under the rule of St Basil,] famous for her monastic observance and her power of working miracles.
      la:
      - type: text
        text: Décimo nono Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Vigília Assumptiónis beátæ Maríæ Vírginis.
      - type: text
        text: Romæ natális beáti Eusébii, Presbýteri et Confessóris, qui, ab Ariáno Imperatóre Constántio, ob cathólicæ fídei defensiónem, in quodam domus suæ cubiculo inclúsus, ibi, cum menses septem in oratióne constánter perseverásset, dormitiónem accépit. Ipsíus autem corpus collegérunt Gregórius et Orósius Presbýteri, et in cœmetério Callísti, via Appia, sepeliérunt.
      - type: text
        text: Apaméæ, in Sýria, sancti Marcélli, Epíscopi et Mártyris; qui, cum Iovis delúbrum diruísset, a furéntibus Gentílibus occísus est.
      - type: text
        text: Tudérti, in Umbria, sancti Callísti, Epíscopi et Mártyris.
      - type: text
        text: In Illýrico sancti Ursícii Mártyris, qui, sub Maximiáno Imperatóre et Aristíde Prǽside, post multa et divérsa torménta, pro Christi nómine, gládio cæsus est.
      - type: text
        text: In Africa sancti Demétrii Mártyris.
      - type: text
        text: In Ægína ínsula sanctæ Athanásiæ Víduæ, monástica observántia et miraculórum dono illústris.
  psalm.d-cimo-oct-vo-kal-ndas-dec-mbris-e3acecd289:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep in England the feast of holy Erconwald, Bishop of London, who was famous for many miracles, and of whom mention is made upon the last day of April.
      - type: citation
        text: 'Upon the same 14th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Heraclea, in Thrace, the holy martyrs Clementine, Theodotus, and Philomenus.
      - type: text
        text: At Alexandria, the holy martyr Serapion, whom the persecutors under the Emperor Decius most cruelly tormented until they dislocated all his joints, and then cast him down headlong from the top of his own house, and so made him a martyr for Christ.
      - type: text
        text: At Troyes, in Gaul, under the Emperor Aurelian, the holy martyr Venerandus.
      - type: text
        text: Likewise in Gaul, the holy Virgin Veneranda, who received the crown of martyrdom under the Emperor Antonine and Asclepiades the President.
      - type: text
        text: At Gangra, in Paphlagonia, the holy martyr Hypatius, Bishop (of that see,) who was stoned to death by the Novatian heretics on his way back from the great Council of Nicea.
      - type: text
        text: At Algiers, in Africa, (in the year 1240,) the blessed Serapion, the first martyr of the Order of Blessed Mary of Ransom for the Redemption of the Captive Faithful and the Preaching of the Christian Faith. He won his crown by being fastened to a cross and cut limb from limb.
      - type: text
        text: At Emesa, many holy Women, who, for Christ's faith's sake, were most cruelly tortured and murdered under the savage Arab chief Mady.
      - type: text
        text: At Bologna, the holy Confessor Jucundus, Bishop (of that see.) In Ireland, (in the year 1181,) holy Lorcan Ua Tuathail, Archbishop of Dublin.
      la:
      - type: text
        text: Décimo octávo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Iósaphat, e sancti Basilíi Ordine, Epíscopi Polocénsis et Mártyris, cuius dies natális recensétur prídie Idus Novémbris.
      - type: text
        text: Gangris, in Paphlagónia, sancti Hypátii Epíscopi, qui, a magna Nicǽna Sýnodo rédiens, a Novatiánis hæréticis in via lapídibus impetítus, Martyr occúbuit.
      - type: text
        text: Heracléæ, in Thrácia, natális sanctórum Mártyrum Clementíni, Theódoti et Philómeni.
      - type: text
        text: Alexandríæ sancti Serapiónis Mártyris, quem persecutóres, sub Décio Príncipe, ita crudelíssimis affecérunt supplíciis, ut cunctas ei iunctúras membrórum prius sólverent, eúmque póstea de superióribus domus suæ præcipitárent; atque ille sic gloriósus Christi Martyr efficerétur.
      - type: text
        text: Trecis, in Gállia, sancti Venerándi Mártyris, sub Aureliáno Imperatóre.
      - type: text
        text: In Gállia sanctæ Venerándæ Vírginis, quæ, sub Antoníno Imperatóre et Asclepíade Prǽside, martýrii corónam accépit.
      - type: text
        text: Eméssæ, in Phœnícia, pássio plurimárum sanctárum mulíerum, quæ, sub sævíssimo Arabum duce Mady, ob Christi fidem, crudelíssime tortæ atque necátæ sunt.
      - type: text
        text: Bonóniæ sancti Iucúndi, Epíscopi et Confessóris.
      - type: text
        text: Augæ, in Gállia, tránsitus sancti Lauréntii, Epíscopi Dublinénsis.
      - type: text
        text: Algáriæ, in Africa, beáti Serapiónis, qui, primus ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, pro captívis fidélibus rediméndis et Christiánæ fídei prædicatióne actus in crucem et membrátim disséctus, martýrii palmam méruit obtinére.
  psalm.d-cimo-oct-vo-kal-ndas-febru-rii-98c971527e:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Paul, the first hermit, who was borne to his place among the blessed upon the 10th day of this present month of January.
      - type: text
        text: ''
      - type: text
        text: In the country of Angers, the blessed Maurus, (founder and) Abbot (of Glanfeuil,) a disciple of St. Benedict, by whom he was trained from his childhood, and made such headway that in obedience to him he walked upon water, a thing new and almost unheard of since the time of the Apostle Peter. Benedict sent him into Gaul, where he built a famous monastery, whereof he was Abbot for forty years, and fell asleep in peace, illustrious for miracles, (in the year 584.)
      - type: text
        text: In Judea, the holy prophets Habakkuk and Michah, (606 years before Christ,) whose bodies were found by revelation from God in the time of the Emperor Theodosius the elder, (between the years of Our Lord 346 and 395.)
      - type: text
        text: At Anagni, the holy Virgin and martyr Secundina, who suffered under the Emperor Decius.
      - type: text
        text: At Cagliari, in Sardinia, the holy martyr Ephisius, who under the judge Flavian, in the persecution under the Emperor Diocletian, was strengthened by God to overcome many torments, but in the end was beheaded, and so rose to heaven a conqueror.
      - type: text
        text: At Nola, in Campania, (about the year 252,) holy Maximus, Bishop of that see.
      - type: text
        text: In Auvergne, in Gaul, (in the year 710,) the holy Confessor Bonitus, Bishop of that see.
      - type: text
        text: In Egypt, the holy Macarius, (in the year 391,) Abbot (of Scittir,) a disciple of blessed Anthony, and very famous for his life and miracles.
      - type: text
        text: Likewise (in Egypt, in the year 391,) blessed Isidore, famous for the holiness of his life, his faith, and his miracles.
      - type: text
        text: At Rome, holy John, called the hidden, who lived unknown to his kinsfolk for a while in a corner of his father's house, and then in a hut upon an island in the Tiber, where he was recognised at the time of his death, and famous for miracles, was buried in the same place, where afterward a church was built in his name, (in the year 450.)
      la:
      - type: text
        text: Décimo octávo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Pauli, primi Eremítæ, Confessóris, qui quarto Idus Ianuárii inter beátorum ágmina translátus fuit.
      - type: text
        text: In território Andegavénsi beáti Mauri Abbátis, qui fuit discípulus sancti Benedícti; et, huius disciplínis usque ab infántia erudítus, quantum in eis profécerit, inter ália quæ apud eum pósitus gessit (res nova et post Petrum fere inusitáta), pédibus super aquas incédens patefécit. In Gállias inde ab ipso Benedícto diréctus, ibi, constrúcto célebri monastério, cui quadragínta annis prǽfuit, miraculórum glória clarus, in pace quiévit.
      - type: text
        text: In Iudǽa sanctórum Hábacuc et Michǽæ Prophetárum, quorum córpora, sub Theodósio senióre, divína revelatióne sunt repérta.
      - type: text
        text: Cárali, in Sardínia, sancti Ephísii Mártyris, qui, in persecutióne Diocletiáni, sub Flaviáno Iúdice, plúrimis torméntis divína virtúte superátis, demum, abscíssis cervícibus, victor migrávit in cælum.
      - type: text
        text: Anágniæ sanctæ Secundínæ, Vírginis et Mártyris; quæ sub Décio Imperatóre passa est.
      - type: text
        text: Nolæ, in Campánia, sancti Máximi Epíscopi.
      - type: text
        text: Arvérnis, in Gállia, sancti Boníti, Epíscopi et Confessóris.
      - type: text
        text: In Ægýpto sancti Macárii Abbátis, qui fuit discípulus beáti Antónii, ac vita et miráculis celebérrimus éxstitit.
      - type: text
        text: Alexandríæ beáti Isidóri, sanctitáte vitæ, fide et miráculis clari.
      - type: text
        text: Constantinópoli sancti Ioánnis Calybítæ, qui aliquándiu in ángulo domus patérnæ, deínde in tugúrio, ignótus paréntibus, habitávit; a quibus in morte agnítus, miráculis cláruit. Ipsíus corpus póstea Romam translátum, et in Ínsulæ Tiberínæ Ecclésia, in eius honórem erécta, collocátum est.
  psalm.d-cimo-oct-vo-kal-ndas-i-lii-204d4d65c7:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 14th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: On the morrow we keep the feast of holy Basil, styled "the Great," Archbishop of Caesarea, in Pontus, Confessor and Doctor of the Church, of whom mention is made upon the 1st day of January, and on the 14th day of June, of his ordination to his see of Caesarea. In the time of the Emperor Valens he shone as a marvellous light, illustrious for teaching and wisdom, and shining with all graces, and defended the Church with wonderful firmness against the Arians and Macedonians.
      - type: text
        text: At Samaria, in Palestine, [in the sixth century before Christ,] the holy Prophet Elisha. Holy Jerome writeth that the devils shrink from his grave, where also resteth the Prophet Obadiah.
      - type: text
        text: At Syracuse, the holy Marcian, Bishop [of that see,] who was ordained Bishop by the blessed Apostle Peter. After he had preached the Gospel he was slain by the Jews.
      - type: text
        text: At Soissons, the holy martyrs Valerius and Rufinus, who after suffering diverse torments were beheaded by order of the President Rictiovarus in the persecution under Diocletian.
      - type: text
        text: At Cordova, [in the persecution by the Muslims,] the holy martyrs Anastasius a Priest, Felix a monk, and Digna a Virgin.
      - type: text
        text: At Constantinople, [in the year 846,] holy Methodius, Archbishop [of that see.]
      - type: text
        text: At Vienne, [in Gaul, in the seventh century,] holy Aetherius, Bishop [of that see.]
      - type: text
        text: At Rodez, [in Gaul, in the sixth century,] holy Quinctian, Bishop [first of that see and afterward of Clermont.]
      la:
      - type: text
        text: Décimo octávo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Sancti Basilíi, cognoménto Magni, Confessóris et Ecclésiæ Doctóris, qui Kaléndis Ianuárii obdormívit in Dómino, sed hac die potíssimum cólitur, qua Cæsariénsis in Cappadócia Epíscopus ordinátus est.
      - type: text
        text: Samaríæ, in Palæstína, sancti Eliséi Prophétæ, cuius sepúlcrum, ubi et Prophéta quiéscit Abdías, a dæmónibus perhorrésci sanctus Hierónymus scribit.
      - type: text
        text: Syracúsis, in Sicília, sancti Marciáni Epíscopi, qui, a beáto Petro Apóstolo ordinátus Epíscopus, ibídem, post Evangélii prædicatiónem a Iudǽis occísus est.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Anastásii Presbýteri, Felícis Mónachi, et Dignæ Vírginis.
      - type: text
        text: Apud Suessiónes, in Gálliis, sanctórum Mártyrum Valérii et Rufíni, qui, in persecutióne Diocletiáni, a Prǽside Rictiováro, post multa torménta, iussi sunt decollári.
      - type: text
        text: Constantinópoli sancti Methódii Epíscopi.
      - type: text
        text: Viénnæ, in Gállia, sancti Æthérii Epíscopi.
      - type: text
        text: Apud Rhuténos, in Gállia, sancti Quinctiáni Epíscopi.
  psalm.d-cimo-oct-vo-kal-ndas-ianu-rii-a5137ac0c2:
    role: psalm
    content:
      en:
      - type: text
        text: Tomorrow is the Octave of the Immaculate Conception of the Blessed Virgin Mary.
      - type: text
        text: Upon the same day is
      - type: text
        text: ''
      - type: citation
        text: 'Commemorated the ordination (on December 15, about the year 340,) of holy Eusebius, Bishop of Vercelli, (he was a Reader of the Church of Rome,) who was born into the better life: upon the 1st day of August, but whose feast is kept upon the 16th day of this present month of December by command of Pope Benedict XIII. (He was born about the year 315 and died about the year 371 or 375.)'
      - type: citation
        text: 'Upon the same 15th day of December, were born into the better life:'
      - type: text
        text: At Rome, (in the third century,) the holy martyrs Irenaeus, Antony, Theodore, Saturninus, Victor, and seventeen others who suffered for Christ's sake in the persecution under the Emperor Valerian.
      - type: text
        text: In Africa, the holy martyrs Faustinus, Lucius, Candidus, Caelian, Mark, Januarius, and Fortunatus.
      - type: text
        text: Likewise in Africa, holy Valerian, Bishop (of Abbenze.) When he was more than eighty years of age the Arian king Genseric, during the Vandal persecution, sought to make him consent to give up the vessels of the church, and because he steadfastly refused so to do, he caused him to be thrust out of the city alone, and since it was forbidden to any man to allow him to come into his house or to dwell in his field, he lay a long time in the open air on the public highway, and finished the course of his blessed life, (in the year 457,) in the profession and defense of Catholic truth.
      - type: text
        text: In the country of Orleans, the holy Confessor Maximin, (2nd Abbot of Michy, in the Diocese of Orleans about the year 520.)
      - type: text
        text: In the country of the Iberians, beyond the Black Sea, (in the third century,) the holy handmaiden Christiana, (the Apostle of the Iberians of the Caucasus,) who in the time of the Emperor Constantine, by the power of her miracles, brought that people to believe in Christ.
      la:
      - type: text
        text: Décimo octávo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Mártyrum Irenǽi, Antónii, Theodóri, Saturníni, Victóris, et aliórum decem et septem, qui, in persecutióne Valeriáni, pro Christo passi sunt.
      - type: text
        text: In Africa pássio sanctórum Faustíni, Lúcii, Cándidi, Cæliáni, Marci, Ianuárii et Fortunáti.
      - type: text
        text: Ibídem sancti Valeriáni Epíscopi, qui, cum esset annórum plus octogínta, in persecutióne Wandálica, sub Rege Ariáno Genseríco, convéntus ab eo ut tráderet Ecclésiæ utensília, idque constánter renuísset, extra civitátem singuláris iussus est pelli; cumque præcéptum esset ut nullus eum neque in domo neque in agro dimítteret habitáre, multo témpore in strata pública nudo sub áere iácuit, et, in confessióne et defensióne cathólicæ veritátis, cursum beátæ vitæ complévit.
      - type: text
        text: In território Aurelianénsi sancti Maximíni Confessóris.
      - type: text
        text: Apud Ibéros, trans Pontum Euxínum, sanctæ Christiánæ ancíllæ, quæ miraculórum virtúte gentem illam, témpore Constantíni, ad Christi fidem perdúxit.
      - type: text
        text: Vercéllis Ordinátio sancti Eusébii, Epíscopi et Mártyris.
  psalm.d-cimo-oct-vo-kal-ndas-maii-5da36e0f8e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon 14 of April, were born to better life:'
      - type: text
        text: ''
      - type: text
        text: On the morrow we keep the feast of the holy martyr Justin, the admirable philosopher. He had presented to the Emperors Marcus Antoninus Verus and Lucius Aurelius born Modus his second book in defence of our religion, and was then earnestly spreading the same at Rome by his disputations when he was accused of Christianity through the devices of Crescens the Cynic, whose life and infamous manners he had rebuked, and for a reward of his faithful speaking he received upon this day the crown of martyrdom.
      - type: text
        text: Likewise at Rome, upon the Appian Way, under the Emperor Alexander and the Prefect Almachius, the holy martyrs Tiburtius, Valerian, and Maximus. Tiburtius and Valerian had been converted to Christ by the exhortations of blessed Cicely and baptized by the holy Pope Urban, and for the confession of their faith were cudgelled and beheaded. Maximus was a chamberlain of the Prefect, and was moved to believe in Christ by beholding the steadfastness of Tiburtius and Valerian, and being confirmed in the same faith by an apparition of angels, he was lashed to death with scourges loaded with lead.
      - type: text
        text: At Terni, the holy martyr Proculus, Bishop of that see, [about the year 306.]
      - type: text
        text: Likewise the holy Virgins and martyrs Domnina and her Companions, [about the year 272.]
      - type: text
        text: At Alexandria, [in the fifth century,] the holy martyr Thomais.
      - type: text
        text: On the same day, the holy martyr Ardalion. He was a player, and was making a mock upon the stage of the sacred rites of the Christians, when he was converted all of a sudden, and attested his conversion not only by his words but also by his blood, [about the year 300.]
      - type: text
        text: At Lyon, the holy Confessor Lambert, Bishop of that see, [in the year 688.]
      - type: text
        text: At Alexandria, the holy Abbot Fronto [—in the desert of Nitria, he had 70 monks—] famous for the holiness of his life, and for his miracles, [in the reign of Antonine, about the year 151.]
      - type: text
        text: At Rome, [in the sixth century,] holy Abundius, watchman of the Church of St. Peter.
      la:
      - type: text
        text: Décimo octávo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Iustíni, Philósophi et Mártyris, cuius memória prídie huius diéi recensétur.
      - type: text
        text: Romæ, via Appia, natális sanctórum Mártyrum Tibúrtii, Valeriáni et Máximi, sub Alexándro Imperatóre et Almáchio Præfécto. Horum duo primi, beátæ Cæcíliæ exhortatióne ad Christum convérsi et a sancto Urbáno Papa baptizáti, póstmodum, ob fídei confessiónem, fústibus cæsi, gládio percússi sunt; Máximus vero, Præfécti cubiculárius, cum et ipse, eórum permótus constántia et angélica visióne firmátus, in Christum credidísset, támdiu plumbátis verberátus est, donec spíritum exhaláret.
      - type: text
        text: Interámnæ sancti Próculi, Epíscopi et Mártyris.
      - type: text
        text: Eódem die sancti Ardaliónis mimi, qui, dum Sacris Christianórum in theátro illudéret, derepénte mutátus est, et ea non solum verbis, sed étiam testimónio sui sánguinis comprobávit.
      - type: text
        text: Interámnæ sanctæ Domnínæ, Vírginis et Mártyris, cum Sóciis Virgínibus coronátæ.
      - type: text
        text: Alexandríæ sanctæ Thomáidis Mártyris, quæ a sócero, cuius impudícis nolúerat consentíre votis, gládio percússa est atque in duas partes per médium discíssa.
      - type: text
        text: Lugdúni, in Gállia, sancti Lambérti, Epíscopi et Confessóris.
      - type: text
        text: Alexandríæ sancti Frontónis Abbátis, cuius vita sanctitáte et miráculis cláruit.
      - type: text
        text: Romæ sancti Abúndii, Mansionárii Ecclésiæ sancti Petri.
  psalm.d-cimo-oct-vo-kal-ndas-oct-bris-5734ebdd6f:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 14th day of September is commemorated the Exaltation of the Holy Cross, when the Emperor Heraclius brought it back from Persia to Jerusalem, after he had overcome King Chosroes.
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Appian Way, the blessed martyr Pope Cornelius.
      - type: text
        text: In the persecution under Decius, he was first sentenced to exile, but afterwards to be beaten with scourges loaded with lead, and then to be beheaded, along with twenty others, both men and women. The soldier Cerealis and Sallustia his wife, unto whom Cornelius had taught the faith, were put to death upon the same day.
      - type: text
        text: In Africa, the holy martyr Cyprian, Bishop of Carthage, a man very famous for his holiness and teaching.
      - type: text
        text: Under the Emperors Valerian and Gallienus, after a hard exile, he finished his testimony by being beheaded upon the seashore, at the sixth milestone from Carthage.
      - type: text
        text: The feast of these two saints Cornelius and Cyprian is kept as one upon the 16th day of this present month of September.
      - type: text
        text: There suffered at Carthage also the holy martyrs Crescentian, Victor, Rosula, and Generalis.
      - type: text
        text: At Rome, the holy boy Crescentius, the son of holy Euthymius, who, in the persecution under the Emperor Diocletian, under the judge Turpilius, died upon the Salarian Way, smitten with the sword.
      - type: text
        text: At Treves, holy Maternus, Bishop (of that see,) a disciple of the blessed Apostle Peter, who turned to the faith of Christ the people of Tongres, Cologne, and Treves, and other dwellers in the parts thereabout.
      - type: text
        text: Upon the same day, holy John Chrysostom, Archbishop of Constantinople. By the plots of his enemies he was sent into exile, and although his recall was decreed by the Supreme Pontiff Innocent I., he suffered many things on his journey from the soldiers who had him in charge, and gave up his soul to God. His feast is kept upon the 27th day of January, upon the which day his sacred body was brought to Constantinople by the Emperor Theodosius the Younger.
      la:
      - type: text
        text: Décimo octávo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Exaltátio sanctæ Crucis, quando Heráclius Imperátor, Chósroa Rege devicto, eam de Pérside Hierosólymam reportávit.
      - type: text
        text: Romæ, via Appia, beáti Cornélii, Papæ et Mártyris; qui, in persecutióne Décii, post exsílii relegatiónem, iussus est plumbátis cædi, et sic, cum áliis vigínti et uno promíscui sexus, decollári. Sed et Cæreális miles cum Sallústia uxóre, quos idem Cornélius in fide instrúxerat, eódem die sunt cápite plexi.
      - type: text
        text: In Africa pássio sancti Cypriáni, Epíscopi Carthaginénsis, sanctitáte et doctrína claríssimi; qui, sub Valeriáno et Galliéno Princípibus, post durum exsílium, cápitis detruncatióne martýrium consummávit, sexto milliário a Carthágine, iuxta mare. Eorúndem vero sanctórum Cornélii et Cypriáni memória sextodécimo Kaléndas Octóbris festíve celebrátur.
      - type: text
        text: Apud Cománam, in Ponto, natális sancti Ioánnis, Epíscopi Constantinopolitáni, Confessóris et Ecclésiæ Doctóris, propter áureum eloquéntiæ flumen cognoménto Chrysóstomi; qui, ab inimicórum factióne in exsílium eiéctus, et, cum e sancti Innocéntii Primi, Summi Pontíficis, decréto inde revocarétur, in itínere, a custodiéntibus milítibus multa mala perpéssus, ánimam Deo réddidit. Eius autem festívitas sexto Kaléndas Februárii celebrátur, quo die sacrum ipsíus corpus a Theodósio iunióre Constantinópolim fuit translátum. Hunc vero præclaríssimum divíni verbi præcónem Pius Papa Décimus cæléstem Oratórum sacrórum Patrónum declarávit atque constítuit.
      - type: text
        text: Tréviris sancti Matérni Epíscopi, qui fuit discípulus beáti Petri Apóstoli; ac Tungrénses, Coloniénses et Trevirénses, aliósque finítimos pópulos ad Christi fidem perdúxit.
      - type: text
        text: Romæ sancti Crescéntii púeri, qui sancti Euthýmii fílius éxstitit; atque, in persecutióne Diocletiáni, sub Turpílio Iúdice, via Salária, gládio percússus, occúbuit.
      - type: text
        text: In Africa pássio sanctórum Mártyrum Crescentiáni, Victóris, Rósulæ et Generális.
  psalm.d-cimo-oct-vo-kal-ndas-sept-mbris-2f7500a550:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 15th day of August God took to Himself His most holy Mother the Virgin Mary, [in the year of Our Lord 57.]
      - type: text
        text: 'Upon the same day were also born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Appian Way, [under the Emperors Valerian and Gallienus,] the holy Acolyte Tharsicius.
      - type: text
        text: The pagans found him bearing the Sacraments of the Body of Christ, and began to ask him what he was carrying, but he deemed it unseemly to produce pearls before swine, and they maltreated him so with sticks and stones that he gave up the ghost. When they sacrilegiously searched his body, they did not find any trace of the Sacraments of Christ either in his hands or among his clothes, but the Christians took up the body of the martyr and buried it honourably in the cemetery of Callistus.
      - type: text
        text: At Tagaste, in Africa, [in the year 431,] the holy [Confessor] Alypius, Bishop [of that see,] first the disciple of blessed Augustine, then his companion in his conversion, his comrade in his work as a shepherd of souls, his brave fellow-soldier in his contendings against the heretics, and now a sharer in his glory in heaven.
      - type: text
        text: At Soissons, in Gaul, [in the year 1087,] the holy Confessor Arnulf, Bishop [of that see.]
      - type: text
        text: At Alba, in Pannonia, in the year 1038,] holy Stephen, King of Hungary, whose feast is kept upon the 2nd day of September.
      - type: text
        text: At Rome, [in the year 1568,] the holy Polish Confessor Stanislaus Kostka, of the Society of Jesus, who was made perfect in a little while and finished the work of many years in angelic innocency of life, and whose name the Supreme Pontiff Benedict XIII enrolled among those of the Saints.
      la:
      - type: text
        text: Décimo octávo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Assúmptio sanctíssimæ Dei Genetrícis Vírginis Maríæ.
      - type: text
        text: Cracóviæ, in Polónia, natális sancti Hyacínthi, ex Ordine Prædicatórum, Confessóris, quem Clemens Octávus, Póntifex Máximus, in Sanctórum númerum rétulit. Ipsíus autem festum sextodécimo Kaléndas Septémbris celebrátur.
      - type: text
        text: Apud Albam Regálem, in Pannónia, item natális sancti Stéphani, Regis Hungarórum et Confessóris; qui, divínis virtútibus exornátus, primus Húngaros ad Christi fidem convértit, et a Deípara Vírgine, ipso die Assumptiónis suæ, in cælum recéptus fuit. Eius vero festívitas quarto Nonas Septémbris, quo die munitíssima Budæ arx, sancti Regis ope, ab exércitu Christiáno strénue recuperáta fuit, potíssimum recólitur, ex dispositióne Innocéntii Papæ Undécimi.
      - type: text
        text: Romæ, via Appia, sancti Tharsícii Acolythi, quem Pagáni, cum inveníssent Córporis Christi Sacraménta portántem, cœpérunt disquírere quid géreret. At ipse, indígnum iúdicans porcis pródere margarítas, támdiu ab illis mactátus est fústibus et lapídibus, donec exhaláret spíritum; et, revolúto eius córpore, sacrílegi discussóres nihil Sacramentorum Christi in occísi mánibus aut in vestibus invenerunt. Christiáni autem collegerunt Mártyris corpus, et in cœmetério Callísti honorífice sepeliérunt.
      - type: text
        text: Tagáste, in Africa, sancti Alípii Epíscopi, qui beáti Augustíni olim discípulus, póstea in conversióne sócius, in múnere pastoráli colléga, et in certamínibus advérsus hæréticos commílito strénuus, ac demum in cælésti glória consors fuit.
      - type: text
        text: Suessíone, in Gálliis, sancti Arnúlphi, Epíscopi et Confessóris.
      - type: text
        text: Romæ sancti Stanislái Kostka; Polóni, novítii e Societáte Iesu et Confessóris; qui, consummátus in brevi, per angélicam vitæ innocéntiam explévit témpora multa, et a Benedícto Décimo tértio, Pontífice Máximo, in Sanctórum album relátus est.
  psalm.d-cimo-s-ptimo-kal-ndas-apr-lis-94ae0cccf2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy deacon Cyriacus.
      - type: text
        text: After long suffering in prison, he was covered with pitch, stretched upon a block, racked, and cudgelled, and at last beheaded along with Largus Smaragdus and twenty others, by command of the Emperor Maximian. Their feast is kept upon the 8th day of August, upon the which day blessed Pope Marcellus exhumed their bodies and buried them again with honour.
      - type: text
        text: At Aquileia, the blessed martyrs Hilary, Bishop of that see, and the Deacon Tatian, who after suffering the rack and other torments were martyred, along with Felix, Largus, and Denis, under the President Beronius, in the persecution under the Emperor Numerian.
      - type: text
        text: In Lycaonia, the holy martyr Papas, who for Christ's faith's sake was hided, torn with iron hooks, and made to walk in shoes with nails through them, and then tied up to a barren tree, which became fruitful when he passed away to be with the Lord, [fourth century.]
      - type: text
        text: At Anazarba, in Cilicia, the holy martyr Julian, who suffered a long course of torture under the President Martian, and was at length put into a sack along with serpents and drowned in the sea, [probably under Diocletian.]
      - type: text
        text: At Ravenna, the holy Confessor Agapitus, Bishop of that see, [in the year 341.]
      - type: text
        text: At Cologne, holy Heribert, Bishop of that see, famous for his holiness, [in the year 1021.]
      - type: text
        text: In Auvergne, holy Bishop Patrick.
      - type: text
        text: In Syria, the holy hermit Abraham, [in the year 370,] whose acts have been written by the blessed Deacon Ephrem.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Romæ pássio sancti Cyríaci Diáconi, qui, post longam cárceris maceratiónem, liquáta pice perfúsus et in catásta exténsus, attráctus étiam nervis et fústibus cæsus, ad últimum, cum Largo et Smarágdo et áliis vigínti, iubénte Maximiáno, cápite truncátus est. Sanctórum vero Cyríaci, Largi et Smarágdi festívitas sexto Idus Augústi recólitur, quo die a beáto Marcéllo Papa córpora eorúndem vigínti trium Mártyrum leváta sunt ac venerabíliter tumuláta.
      - type: text
        text: Aquiléiæ natális beáti Hilárii Epíscopi, et Tatiáni Diáconi, qui, sub Numeriáno Imperatóre et Berónio Prǽside, post equúleum atque ália torménta, una cum Felíce, Largo et Dionýsio, martýrium terminárunt.
      - type: text
        text: In Lycaónia sancti Papæ Mártyris, qui, ob Christi fidem, verbéribus cæsus, úngulis férreis lacerátus, clavátis cálceis incédere iussus est; deínde arbóri alligátus, eándem arbórem, migrans ad Dóminum, ex stérili réddidit fructuósam.
      - type: text
        text: Anazárbi, in Cilícia, sancti Iuliáni Mártyris, qui, sub Marciáno Prǽside, diutíssime cruciátus, demum, in sacco una cum serpéntibus inclúsus, in mare demérsus est.
      - type: text
        text: In dicióne Canadénsi sanctórum Mártyrum Ioánnis de Brébeuf, Gabriélis Lalemant, Antónii Daniel, Cároli Garnier et Natális Chabanel, Presbyterórum Societátis Iesu, qui in Hurónica Missióne, hac aliísque diébus, post multos labóres et sævíssimos cruciátus, mortem pro Christo fórtiter obiérunt.
      - type: text
        text: Ravénnæ sancti Agapíti, Epíscopi et Confessóris.
      - type: text
        text: Colóniæ Agrippínæ sancti Heribérti Epíscopi, sanctitáte célebris.
      - type: text
        text: Arvérnis, in Gállia, deposítio sancti Patrícii Epíscopi.
      - type: text
        text: In Sýria sancti Abrahæ Eremítæ, cuius res gestas beátus Ephræm Diáconus conscrípsit.
  psalm.d-cimo-s-ptimo-kal-ndas-aug-sti-faaa25a82c:
    role: psalm
    content:
      en:
      - type: text
        text: Tomorrow is the Feast of the Blessed Virgin Mary, styled of Mount Carmel.
      - type: citation
        text: 'Upon the same 16th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Greece, the holy martyr Faustus, who was crucified under the Emperor Decius. He remained alive upon the cross five days, and at last was pierced with arrows, and so passed away to Heaven.
      - type: text
        text: At Sebaste, in Armenia, under the Emperor Diocletian, the holy martyrs Bishop Athenogenes, and ten of his disciples.
      - type: text
        text: At Antioch, in Syria, the blessed Confessor Eustace, [Patriarch of Antioch,] famous for his teaching and holiness, [in the year 338.] Under the Arian Emperor Constantius he was banished, for defending the Catholic faith, to Trajanopolis, in Thrace, where he fell asleep in the Lord.
      - type: text
        text: On the same day the holy Monk Hilarinus, who was arrested in the persecution under the Emperor Julian the Apostate, along with holy Donatus, and for as much as he would not offer sacrifice, he was beaten to death with clubs, and so received martyrdom, at Arezzo, in Tuscany, but his body hath been brought to Ostia.
      - type: text
        text: At Trier, the holy martyr Valentine, Bishop [of that see, in the fourth century.]
      - type: text
        text: At Cordova, in Spain, the holy levite Sisenand, a martyr, [born at Badajoz, the capital of Estramadura.]
      - type: text
        text: While he was still young he entered the community of the Clerks of Saint Aciocle of Cordova,] who was slain by the Saracens, for Christ's faith's sake, [in the year 851.]
      - type: text
        text: In Saintes, in Gaul, the holy Virgin Rainaldis and her Companions, martyrs, who were slain by the barbarians, for Christ's faith's sake, [in the year 680.]
      - type: text
        text: At Bergamo, the holy martyr Domnion, [under Maximianus Herculeus.]
      - type: text
        text: At Capua, the holy Confessor Vitalian, Bishop [of that see, in the seventh century.]
      la:
      - type: text
        text: Décimo séptimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Commemorátio beátæ Maríæ Vírginis de monte Carmélo.
      - type: text
        text: Sebáste, in Arménia, sanctórum Mártyrum Athenógenis Epíscopi, et decem discipulórum eius, sub Diocletiáno Imperatóre.
      - type: text
        text: Tréviris sancti Valentíni, Epíscopi et Mártyris.
      - type: text
        text: Córdubæ, in Hispánia, sancti Sisenándi, Levítæ et Mártyris; qui a Saracénis, pro Christi fide, iugulátus est.
      - type: text
        text: Eódem die natális sancti Fausti Mártyris, qui, sub Décio Imperatóre, cruci affíxus, quinque diébus in ea vixit, ac demum, sagíttis confóssus, migrávit in cælum.
      - type: text
        text: Santis, in Gállia, sanctórum Mártyrum Rainéldis Vírginis, et Sociórum eius, qui a bárbaris, pro Christi fide, cæsi sunt.
      - type: text
        text: Bérgomi sancti Domniónis Mártyris.
      - type: text
        text: Antiochíæ natális beáti Eustáchii, Epíscopi et Confessóris, doctrína et sanctitáte célebris; qui, sub Ariáno Imperatóre Constántio, ob cathólicæ fídei defensiónem, exsílio Traianópolim Thráciæ pulsus, ibídem in Dómino requiévit.
      - type: text
        text: Cápuæ sancti Vitaliáni, Epíscopi et Confessóris.
      - type: text
        text: Apud Abbátiam Sanctíssimi Salvatóris, diœcésis Constantiénsis, in Gállia, sanctæ Maríæ-Magdalénæ Postel, Fundatrícis Institúti Sorórum Scholárum Christianárum a Misericórdia, a Pio Papa Undécimo in sanctárum Vírginum album relátæ.
      - type: text
        text: Apud Ostia Tiberína, Translátio córporis sancti Hilaríni Mónachi, qui, una cum sancto Donáto, in persecutióne Iuliáni Apóstatæ, comprehénsus est, et, cum nollet sacrificáre, demum, fústibus cæsus, Arétii, in Túscia, martýrium sumpsit séptimo Idus Augústi.
  psalm.d-cimo-s-ptimo-kal-ndas-dec-mbris-3449ea1b43:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Virgin Gertrude, of whom mention is made upon the 17th day of this present month of November.
      - type: citation
        text: 'Upon the same 15th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy martyr Eugene, Archbishop of Toledo, a disciple of blessed Denys, the Areopagite. He finished his testimony in the country of Paris, and received from the Lord a blessed crown of suffering, (in the year 95.) His body was afterwards brought to Toledo.
      - type: text
        text: At Nola, in Campania, the holy martyr Felix, Bishop (of that see,) who was famous for miracles from the fifteenth year of his age upward and gained the battle of martyrdom under the President Marcian, along with thirty others.
      - type: text
        text: At Edessa, in Syria, under the Emperor Diocletian and Antonine the President, the holy martyrs Gurias and Samonas.
      - type: text
        text: There likewise, under the Emperor Licinius and the President Lysanias, the holy Deacon Abibus, who was torn with hooks and cast into the fire.
      - type: text
        text: In Africa, the holy martyrs Secundus, Fidentian, and Varicus.
      - type: text
        text: In Brittany, (in the sixth century,) holy Machutus, (St. Maclou or St. Malo, first) Bishop (of the ancient See of Aleth, in Brittany,) who was marked by miracles even from his youth upward.
      - type: text
        text: At Verona, (about the year 800,) the holy Confessor Luperius, Bishop (of that see.)
      - type: text
        text: In Austria, (in the year 1136,) holy Leopold, (Margrave of Austria,) Marquess of that country, whose name Innocent VIII enrolled with those of the Saints.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Colóniæ Agrippínæ sancti Albérti Epíscopi et Confessóris, ex Ordine Prædicatórum, cognoménto Magni, sanctitáte et doctrína célebris, quem Pius Papa Undécimus Doctórem universális Ecclésiæ declarávit, et Pius Duodécimus cultórum scientiárum naturálium cæléstem apud Deum Patrónum constítuit.
      - type: text
        text: Eódem die natális sancti Eugénii, Epíscopi Toletáni et Mártyris; qui fuit beáti Dionýsii Areopagítæ discípulus, et in território Parisiénsi, consummáto martýrii cursu, beátæ passiónis corónam percépit a Dómino. Ipsíus autem corpus Tolétum, in Hispánia, póstea fuit translátum.
      - type: text
        text: Nolæ, in Campánia, beáti Felícis, Epíscopi et Mártyris; qui, a quintodécimo ætátis suæ anno, miráculis cláruit, et, sub Marciáno Prǽside, cum áliis trigínta Sóciis, agónem martýrii complévit.
      - type: text
        text: Edéssæ, in Mesopotámia, pássio sancti Abibi Diáconi, qui sub Licínio Imperatóre et Lysánia Prǽside, únguibus lacerátus, in ignem coniéctus est.
      - type: text
        text: Ibídem sanctórum Mártyrum Guríæ et Samónæ, sub Diocletiáno Imperatóre et Antoníno Prǽside.
      - type: text
        text: In Africa sanctórum Mártyrum Secúndi, Fidentiáni et Várici.
      - type: text
        text: Apud Arcum, in território Santonénsi, natális sancti Machúti, Aleténsis in Gállia Epíscopi; qui, in Anglia natus, a primǽvo ætátis suæ tirocínio miráculis emícuit.
      - type: text
        text: Verónæ sancti Lupérii, Epíscopi et Confessóris.
      - type: text
        text: Kahlembérgæ, prope Vindobónam, in Austria, sancti Leopóldi, eiúsdem provínciæ Austriæ Marchiónis, quem Innocéntius Papa Octávus in Sanctórum númerum adscrípsit.
  psalm.d-cimo-s-ptimo-kal-ndas-febru-rii-db2efd43e2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Salarian Way, the holy martyr Pope Marcellus I, who for his confession of the Catholic faith was first cudgelled by order of the tyrant Maxentius and then sent to take care of the beasts which were fed at the public cost, in the which service he died, clad in sack-cloth, (in the year 309-310.)
      - type: text
        text: At Morocco, in Africa, (in the year 1220,) the holy martyrs Berard (de Carbis), Peter, Accursius, Adjutus, and Otho, of the Order of Friars Minors.
      - type: text
        text: At Arles, (in the year 429,) the holy Confessor Honoratus, Bishop of that see, whose life was rendered famous by his teaching and miracles.
      - type: text
        text: At Moerzo, the holy Confessor Titian, Bishop of that see.
      - type: text
        text: At Al-Arish, in Egypt, holy Melas, Bishop of that see, (in the fifth century,) who was exiled under the Emperor Valens and suffered other hardships for the Catholic faith's sake, but at length fell asleep in peace.
      - type: text
        text: At Fondi, in Campania, (in the sixth century,) the holy Abbot Honoratus, (who was set over the monastery of Fondi) of whom mention is made by blessed Pope Gregory.
      - type: text
        text: In the monastery of Perouse, the holy Confessor Fursey, (Abbot of Lagny, in the year 650.)
      - type: text
        text: At Rome, holy Priscilla, who gave up herself and all that she had to the service of the martyrs.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Salária, natális sancti Marcélli Primi, Papæ et Mártyris; qui, ob cathólicæ fídei confessiónem, iubénte Maxéntio tyránno, primo cæsus est fústibus, deínde ad servítium animálium cum custódia pública deputátus, et ibídem, serviéndo indútus amíctu cilícino, defúnctus est.
      - type: text
        text: Marróchii, in Africa, pássio sanctórum quinque Protomártyrum Ordinis Minórum, scílicet Berárdi, Petri atque Othónis Sacerdótum, Accúrsii et Adiúti Laicórum; qui, ob Christiánæ fídei prædicatiónem ac Mahuméticæ reprobatiónem legis, post vária torménta et ludíbria, a Saracenórum Rege, scissis gládio capítibus, enecáti sunt.
      - type: text
        text: Rhinocolúræ, in Ægýpto, sancti Melæ Epíscopi, qui, sub Valénte exsílium et ália grávia pro fide cathólica passus, in pace quiévit.
      - type: text
        text: Areláte, in Gállia, sancti Honoráti, Epíscopi et Confessóris; cuius vita tam doctrína quam miráculis fuit illústris.
      - type: text
        text: Opitérgii, in Venetórum fínibus, sancti Titiáni, Epíscopi et Confessóris.
      - type: text
        text: Fundis, in Látio, sancti Honoráti Abbátis, cuius méminit beátus Gregórius Papa.
      - type: text
        text: In castro cui nomen Macériæ, ad Altéiam flúvium, in Gállia, sancti Furséi Confessóris, cuius corpus ad monastérium Perónæ póstmodum translátum est.
      - type: text
        text: Romæ sanctæ Priscíllæ, quæ se súaque pio Mártyrum obséquio mancipávit.
  psalm.d-cimo-s-ptimo-kal-ndas-i-lii-496791fb1d:
    role: psalm
    content:
      en:
      - type: text
        text: Tomorrow we keep the feast of
      - type: text
        text: ''
      - type: text
        text: St. Philip Neri, of whom mention is made in the Martyrology for May 26.
      - type: citation
        text: 'Upon the same 15th day of June, were born into the better life:'
      - type: text
        text: At the river Silaro, in Lucania, the holy martyrs Vitus, Modestus, and Crescentia, who were brought thither from Sicily under the Emperor Diocletian there by the power of God they overcame boiling lead and wild beasts, and finished the course of their glorious fight by being broken alive upon a block.
      - type: text
        text: At Dorostorum, in Mysia, the holy soldier Hesychius, who was arrested along with blessed Julius, and was crowned with martyrdom after him, under the President Maximus.
      - type: text
        text: At Cordova, in Spain, [in the persecution under the Muslims,] the holy martyr Benildes.
      - type: text
        text: At Zephyrium, in Cilicia, the holy martyr Dulas, who under the President Maximus was for Christ's Name's sake beaten with rods, laid upon a gridiron and smeared with burning oil, and suffered other things also, and so as a conqueror grasped the palm of martyrdom.
      - type: text
        text: At Palmyra, in Syria, the holy sisters Libya and Leonis, and Eutropia, a damsel of twelve years of age, who through diverse torments attained unto the crown of martyrdom.
      - type: text
        text: At Valenciennes, [in the year 686,] the holy Landalin, Abbot [of Crespin.]
      - type: text
        text: At Clermont, [in the year 472,] the holy Confessor Abraham, [Abbot of St. Cirgues,] illustrious for his holiness and wonderful works.
      - type: text
        text: At Valais, [in the year 1008,] the holy Confessor Bernard of Menthon.
      - type: text
        text: At Pibrac, in the Diocese of Toulouse, the holy Virgin Germaine Cousin, a shepherdess, who lived poor and lowly, and after many woes, borne with the greatest long-suffering, passed away to the Divine Bridegroom, [in the year 1601.] After her death she became famous for many miracles, and the Supreme Pontiff Pius IX. enrolled her name among those of the holy Virgins.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Apud Sílarum flumen, in Lucánia, natális sanctórum Mártyrum Viti, Modésti atque Crescéntiæ, qui, sub Diocletiáno Imperatóre, e Sicília illuc deláti, ibídem, post ollam fervéntis plumbi, post béstias et catástas divína virtúte superátas, cursum gloriósi certáminis peregérunt.
      - type: text
        text: Doróstori, in Mýsia inferióre, sancti Hesýchii mílitis, qui, cum beáto Iúlio comprehénsus, post eum, sub Máximo Prǽside, martýrio coronátus est.
      - type: text
        text: Zephýrii, in Cilícia, sancti Dulæ Mártyris, qui, sub Prǽside Máximo, ob Christi nomen, virgis cæsus, in cratícula pósitus, fervénti óleo incénsus alíaque passus, martýrii palmam victor accépit.
      - type: text
        text: Córdubæ, in Hispánia, sanctæ Beníldis Mártyris.
      - type: text
        text: Sibápoli, in Mesopotámia, sanctárum Vírginum et Mártyrum Lybes et Leonídis sorórum, et Eutrópiæ, puéllæ annórum duódecim; quæ per divérsa torménta ad corónam martýrii pervenérunt.
      - type: text
        text: Apud Valencénas, in Gállia, deposítio sancti Landelíni Abbátis.
      - type: text
        text: Arvérnis, in Gállia, sancti Abrahæ Confessóris, sanctitáte ac miráculis illústris.
      - type: text
        text: Pibráci, in diœcési Tolosána, sanctæ Germánæ Cousin Vírginis, quæ custodiéndis grégibus addícta permánsit, et, cum húmilis ac pauper vixísset, et, multis ærúmnis patientíssime tolerátis, migrásset ad Sponsum, plúrimis post óbitum miráculis cláruit; atque a Pio Nono, Pontífice Máximo, in sanctárum Vírginum número adscrípta fuit.
  psalm.d-cimo-s-ptimo-kal-ndas-i-nii-15215e02d9:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of May, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Bordeaux, in Aquitaine, the holy Confessor Simon, surnamed Stock, [for that he lived at one time in the stock of an hollow oak,] of the Order of Carmelites, who by his singular devotion toward the Virgin Mother of God won to obtain of her the sacred scapular of his Order, and, after many labours borne in the governing of the same her Order, passed away famous for miracles, to receive his everlasting reward.
      - type: text
        text: At Gubbio, holy Ubald, Bishop [of the same city,] who was famous for miracles, and whose feast we keep upon the 22nd day of this present month of May.
      - type: text
        text: In Isauria, the holy martyrs Aquilinus and Victorian.
      - type: text
        text: At Auxerre, suffered the holy martyr Peregrin, first Bishop of that city, who was sent into Gaul with other clerks by blessed Pope Sixtus [II], and, when he had finished the work preaching the Gospel, was condemned to be beheaded, and so earned a crown of life that fadeth not away.
      - type: text
        text: At Usal, in Africa, [in the third century,] the holy martyrs Felix and Gennadius.
      - type: text
        text: In Palestine, the passion of the holy monks who were massacred by the Saracens in the Monastery of St Saba.
      - type: text
        text: In Persia, the holy martyrs Bishop Audas, seven Priests, nine Deacons, and seven Virgins, who suffered diverse tortures under King Isdegerd, and so finished a glorious testimony.
      - type: text
        text: At Prague, in Bohemia, [in the year 1390,] holy John of Nepomuc, Canon of the Metropolitical Cathedral Church in that city, who, when he had been vainly tried to make him violate the seal of sacramental confession, was cast into the river Moldau, and so earned the palm of martyrdom. We keep feast in his honour upon the 30th day of this present month of May.
      - type: text
        text: At Amiens, in Gaul, [about the year 600,] the holy Confessor Honore, Bishop [of that see.]
      - type: text
        text: At Mans, [toward the end of the sixth century,] the holy Confessor Domnolus, Bishop [of that see.]
      - type: text
        text: At Mirandola, in Emilia, the holy Possidius, Bishop of Calama, in Numidia, a disciple of holy Augustine, and writer of his famous life.
      - type: text
        text: At Troyes, [toward the middle of the sixth century,] the holy Confessor Fidolus, [Abbot of the Isles-Aumont]
      - type: text
        text: In Ireland, [in the year 577,] the holy Brendan, Abbot [of Clonfert.]
      - type: text
        text: At Frejus, the holy Virgin Maxima, who fell asleep in peace, famous for many excellences.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Eugúbii sancti Ubáldi, Epíscopi et Confessóris, miráculis clari.
      - type: text
        text: Antisiodóri pássio sancti Peregríni, qui fuit primus eiúsdem civitátis Epíscopus. Hic, a beáto Xysto Papa Secúndo in Gállias, una cum áliis Cléricis, missus, ibi, Evangélicæ prædicatiónis múnere expléto, capitáli senténtia damnátus corónam méruit sempitérnam.
      - type: text
        text: In Pérside sanctórum Mártyrum Audæ Epíscopi, septem Presbyterórum, novem Diaconórum, et septem Vírginum; qui sub Isdegérde Rege, váriis tormentórum genéribus cruciáti, gloriósum martýrium complevérunt.
      - type: text
        text: Pragæ, in Bohémia, sancti Ioánnis Nepomucéni, Metropolitánæ Ecclésiæ Canónici; qui, frustra tentátus ut sigílli sacramentális fidem próderet, martýrii palmam, in flumen Moldávam deiéctus, eméruit.
      - type: text
        text: In Isáuria natális sanctórum Mártyrum Aquilíni et Victoriáni.
      - type: text
        text: Uzali, in Africa, sanctórum Mártyrum Felícis et Gennádii.
      - type: text
        text: In Palæstína pássio sanctórum Monachórum, a Saracénis in laura sancti Sabbæ interfectórum.
      - type: text
        text: Ianóviæ, apud Pinsk, in Polésia, sancti Andréæ Bobóla, Sacerdótis e Societáte Iesu, qui, a schismáticis innumerabília tormentórum génera perpéssus, illústri martýrio coronátus est.
      - type: text
        text: Ambiáni, in Gállia, sancti Honoráti Epíscopi.
      - type: text
        text: Apud Cenómanos, in Gállia, sancti Dómnoli Epíscopi.
      - type: text
        text: Mirándulæ, in Æmília, sancti Possídii, Calaménsis in Numídia Epíscopi, qui fuit sancti Augustíni discípulus, eiúsque præcláram vitam scripsit.
      - type: text
        text: In monastério Enachduinénsi, in Hibérnia, tránsitus sancti Brendáni, Presbýteri et Clonferténsis Abbátis.
      - type: text
        text: Trecis, in Gállia, sancti Fídoli Confessóris.
      - type: text
        text: Apud Forum Iúlii, in Gállia, sanctæ Máximæ Vírginis, quæ, multis clara virtútibus, in pace quiévit.
  psalm.d-cimo-s-ptimo-kal-ndas-ianu-rii-66dda9a562:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep
      - type: text
        text: ''
      - type: text
        text: The feast of the holy martyr Eusebius, Bishop of Vercelli, of whom mention is made also upon the 1st day of August, (when he died between the years 370 and 375,) and yesterday as for this day.
      - type: citation
        text: 'Upon the same 16th day of December, were born into the better life:'
      - type: text
        text: The three children Ananias, Azarias, and Misael, whose bodies are laid in a certain cave at Babylon (in the sixth century before Christ.)
      - type: text
        text: At Ravenna, the holy martyrs Valentine, a military instructor, Concordius his son, Navalis, and Agricola, who suffered for Christ's sake, (in the fourth century,) in the persecution under the Emperor Maximian.
      - type: text
        text: At Nola, in Campania, in the persecution under the Emperor Decius, the holy Virgin and martyr Albina, (in the year 250.) In Africa, many holy Virgins and martyrs, who in the Vandal persecution under the Arian king Hunneric suffered hanging, pressing, and redhot plates, and happily brought to a close the conflict of martyrdom, (in the year 482.)
      - type: text
        text: At Vienne, (in the year 875,) the blessed Confessor Ado, (monk of the Order of St Benedict,) Bishop (of Vienne.)
      - type: text
        text: At Aberdeen, in Scotland, holy Bean, (called first) Bishop (of that see.)
      - type: text
        text: At Gaza, in Palestine, (in the year 389,) holy Bishop Irenion.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Sancti Eusébii, Epíscopi Vercellénsis et Mártyris; cuius dies natális Kaléndis Augústi, et Ordinátio décimo octávo Kaléndas Ianuárii refértur.
      - type: text
        text: Sanctórum Trium Puerórum, id est Ananíæ, Azaríæ et Misaélis; quorum córpora apud Babylóniam, sub quodam specu, sunt pósita.
      - type: text
        text: Ravénnæ sanctórum Mártyrum Valentíni, magístri mílitum, eiúsque fílii Concórdii, atque Navális et Agrícolæ; qui, in persecutióne Maximiáni, pro Christo passi sunt.
      - type: text
        text: Fórmiis, in Campánia, sanctæ Albínæ, Vírginis et Mártyris, sub Décio Imperatóre.
      - type: text
        text: In Africa pássio plurimárum sanctárum Vírginum, quæ, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, suspéndia, póndera laminásque ignítas perpéssæ, martýrii agónem felíciter consummárunt.
      - type: text
        text: Viénnæ, in Gállia, beáti Adónis, Epíscopi et Confessóris.
      - type: text
        text: In Hibérnia sancti Beáni Epíscopi.
      - type: text
        text: Gazæ, in Palæstína, sancti Ireniónis Epíscopi.
  psalm.d-cimo-s-ptimo-kal-ndas-maii-0658270b88:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 15th of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the noble ladies Basilissa and Anastasia, disciples of the Apostles. Forasmuch as they stood firm in the faith under the Emperor Nero, their tongues and feet were cut off, and they gained the crown of martyrdom by being slain with the sword.
      - type: text
        text: Upon the same day, the holy martyrs Maro, Eutyches, and Victorinus. They were first exiled to the island of Ponza, along with the blessed Flavia Domitilla, for confessing Christ, but were afterwards liberated in the reign of the Emperor Nerva. They converted many to the faith, and were at length put to death with diverse torments by order of the Judge Valerian, in the persecution under the Emperor Trajan.
      - type: text
        text: In Persia, under the Emperor Decius, the holy martyrs Maximus and Olympias. They were first hided with cudgels and scourges loaded with lead, and at length their heads were beaten with the cudgels until they gave up the ghost.
      - type: text
        text: At Fiorentino, in Campania, the holy martyr Eutychius, [at the end of the first century, possibly with some companions.]
      - type: text
        text: At Myra, in Lycia, holy Crescens, who achieved martyrdom by fire.
      - type: text
        text: Likewise the holy martyrs Theodore, [a Priest,] and Pausilippus, who suffered under the Emperor Hadrian, [at Heracleia, on the Sea of Marmora.]
      la:
      - type: text
        text: Décimo séptimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctárum Basilíssæ et Anastásiæ, nobílium feminárum, quæ, cum essent Apostolórum discípulæ et constántes in fídei confessióne persísterent, sub Neróne Imperatóre, lingua pedibúsque præcísis, percússæ gládio, martýrii corónam adéptæ sunt.
      - type: text
        text: Eódem die sanctórum Mártyrum Marónis, Eutychétis et Victoríni; qui, primo cum beáta Flávia Domitílla apud ínsulam Póntiam in Christi confessióne éxsules, póstmodum, sub Príncipe Nerva, liberáti, tandem, cum plúrimos ad fidem convertíssent, in persecutióne Traiáni, a Valeriáno Iúdice váriis pœnis iussi sunt intérfici.
      - type: text
        text: In Pérside sanctórum Mártyrum Máximi et Olympíadis, qui, sub Décio Imperatóre, fústibus et plumbátis cæsi sunt; et ad últimum cápita eórum sunt fústibus tunsa, donec ambo emítterent spíritum.
      - type: text
        text: Ferentíni, in Hérnicis, sancti Eutýchii Mártyris.
      - type: text
        text: Myræ, in Lýcia, sancti Crescéntis, qui per ignem martýrium consummávit.
      - type: text
        text: In Thrácia sanctórum Mártyrum Theodóri et Pausilíppi, qui sub Hadriáno Imperatóre passi sunt.
  psalm.d-cimo-s-ptimo-kal-ndas-nov-mbris-d218bd3f38:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Africa, two hundred and seventy holy martyrs, all crowned alike.
      - type: text
        text: There also the holy martyrs Martinian and Saturian, and two of their brethren. They were slaves of a certain Vandal, and were brought to believe in Christ by the holy Virgin Maxima, who was their fellow-slave.
      - type: text
        text: In the persecution under the Arian king, Genseric, on account of their steadfastness in the Catholic faith, they were first beaten to the very bone with knotty cudgels, but for as much as they were so treated of a long while, and were always found sound and well the next day, they were banished. In their banishment they turned many barbarians to believe in Christ, and obtained from the Roman Pontiff a priest and other ministers to baptize them wherefore at last they were dragged to death through thorny places in the woods, being fastened by the feet behind chariots. Maxima overcame in many contendings,
      - type: text
        text: but God set her at liberty, and she became the mother of many virgins in a monastery, and fell asleep in an holy death.
      - type: text
        text: Likewise the holy martyrs Saturninus, Nereus, and three hundred and sixty-five others.
      - type: text
        text: At Cologne, under the Emperor Julian the Apostate, the holy martyr Eliphius.
      - type: text
        text: Likewise, (in the seventh century,) the holy martyr Berchar, Abbot (of Montier-en-Der.)
      - type: text
        text: In the country of Bourges, (in the eighth century,) holy Ambrose, Bishop of Cahors.
      - type: text
        text: At Mainz, (in the year 787,) the holy Confessor Lullus, Bishop (of that see.)
      - type: text
        text: At Trier, holy Florence, Bishop (of that see.)
      - type: text
        text: At Arbon, in Switzerland, (in the seventh century,) the holy Abbot Gall, a disciple of blessed Columbanus.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Sanctæ Hedwígis Víduæ, Polonórum Ducíssæ, quæ prídie huius diéi obdormívit in Dómino.
      - type: text
        text: In monastério Dervénsi, in Gállia, sancti Berchárii, Abbátis et Mártyris.
      - type: text
        text: In Africa sanctórum Mártyrum ducentórum septuagínta, páriter coronatórum.
      - type: text
        text: Ibídem sanctórum Martiniáni et Saturiáni, cum duóbus eórum frátribus; qui, témpore Wandálicæ persecutiónis, sub Rege Ariáno Genseríco, cum servi essent cuiúsdam Wándali, et a sancta Máxima Vírgine, ipsórum consérva, ad Christi fidem convérsi fuíssent, omnes ab hærético illórum dómino, pro constántia fídei cathólicæ, primum nodósis fústibus cæsi sunt et usque ad ossa laniáti. Sed, cum talia multo témpore pateréntur, et sequénti die nihilóminus redderéntur semper incólumes, exsílio tandem relegántur; ubi, cum multos barbarórum ad Christi convertíssent fidem, et a Románo Pontífice Presbýterum aliósque minístros, qui eos baptizárent, obtinuíssent, novíssime, vinctis pédibus post terga curréntium quadrigárum, inter spinósa loca silvárum iussi sunt páriter interíre. Máxima vero, post multos superátos agónes divínitus liberáta, in monastério, multárum Vírginum Mater, sancto fine quiévit.
      - type: text
        text: Item sanctórum Saturníni, Nérei et aliórum trecentórum sexagínta quinque Mártyrum.
      - type: text
        text: Colóniæ Agrippínæ sancti Elíphii Mártyris, sub Iuliáno Apóstata.
      - type: text
        text: In território Bituricénsi sancti Ambrósii, Epíscopi Caturcénsis.
      - type: text
        text: Mogúntiæ sancti Lulli, Epíscopi et Confessóris.
      - type: text
        text: Tréviris sancti Florentíni Epíscopi.
      - type: text
        text: Apud Arbónam, in Germánia, sancti Galli Abbátis, qui fuit discípulus beáti Columbáni.
      - type: text
        text: Muri, in Lucánia, sancti Gerárdi Maiélla Confessóris, Láici proféssi Congregatiónis a sanctíssimo Redemptóre nuncupátæ, quem, miráculis clarum, Pius Décimus, Póntifex Máximus, Sanctórum albo accénsuit.
  psalm.d-cimo-s-ptimo-kal-ndas-oct-bris-d9932ae5eb:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Octave of the Birth of the Blessed Virgin Mary.
      - type: citation
        text: 'Upon the same 15 th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Nomentan Way, (in the first century,) the holy martyr Nicomede the Priest. Unto them that would have forced him to offer sacrifice he said, " I do not sacrifice, save unto the Almighty God, Who reigneth in the heavens," and he was beaten with scourges loaded with lead until at last he passed away to be ever with the Lord.
      - type: text
        text: In the country of Chalons, (in the second century,) the holy martyr Valerian. The President Priscus caused him to be hung up and tormented by mangling with metal hooks, but when he saw that he could not be shaken in his confession of Christ, but continued the rather to praise Him with a glad heart, he commanded to slay him with the sword.
      - type: text
        text: At Marcianopolis, in Thrace, the holy martyr Melitina. Under the Emperor Antonine and the President Antiochus, she was twice brought to the temples of the Gentiles, but as the idols continually fell down, she was hung up and mangled, and at last beheaded.
      - type: text
        text: At Adrianople, the holy martyrs Maximus, Theodore, and Asclepiodotus, who were crowned under the Emperor Maximian.
      - type: text
        text: Also holy Porphyry, a jester who received baptism as a farce in the presence of the Emperor Julian the Apostate, and was thereupon suddenly changed by the power of God, so that he professed himself to be a Christian, and by command of the Emperor received martyrdom by the axe.
      - type: text
        text: Upon the same day, the holy Goth Nicetas, who was burnt by order of King Athanaric for the Catholic faith's sake.
      - type: text
        text: At Cordova, (in the ninth century,) the holy martyrs Emilas, the Deacon, and Jeremiah, who suffered a long imprisonment in the persecution under the Arabs, and finished their testimony by being beheaded.
      - type: text
        text: At Toul, in Lorraine, (in the fifth century,) the holy Confessor Aper, Bishop (of that see.) Likewise, (in the sixth century,) holy Lubin, Bishop of Chartres.
      - type: text
        text: At Lyons, (in the fourth century,) holy Albin, Bishop (of that see.) On the same day, (in the seventh century,) holy Aichard, Abbot (of Jumieges.) In (Auvergne, in) Gaul, (in the fifth century,) the holy widow Eutropia.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Festum Septem Dolórum beatíssimæ Vírginis Maríæ.
      - type: text
        text: 'Romæ, via Nomentána, natális beáti Nicomédis, Presbýteri et Mártyris, qui, cum díceret compelléntibus se sacrificáre: « Ego non sacrífico nisi Deo omnipoténti, qui regnat in cælis », plumbátis diutíssime cæsus est, atque in eo torménto migrávit ad Dóminum.'
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Emilæ Diáconi, et Ieremíæ, qui, in persecutióne Arábica, post longam cárceris maceratiónem, demum, cervícibus pro Christo abscíssis, martýrium complevérunt.
      - type: text
        text: In território Cabillonénsi sancti Valeriáni Mártyris, quem Priscus Præses, suspénsum et gravi ungulárum laceratióne cruciátum, tandem, cum in Christi confessióne vidéret immóbilem ac læto ánimo in eius láudibus permanéntem, gládio animadvérti præcépit.
      - type: text
        text: Hadrianópoli, in Thrácia, sanctórum Mártyrum Máximi, Theodóri et Asclepiódoti; qui sub Maximiáno Imperatóre coronáti sunt.
      - type: text
        text: Item sancti Porphýrii mimi, qui, coram Iuliáno Apóstata, per iocum suscípiens baptísmum, Dei virtúte derepénte mutátur, et Christiánum se esse profitétur; ac mox, ipsíus Imperatóris mandáto secúri percússus, martýrio coronátur.
      - type: text
        text: Eódem die sancti Nicétæ Gothi, qui ab Athanaríco Rege, ob cathólicam fidem, iussus est igne combúri.
      - type: text
        text: Marcianópoli, in Thrácia, sanctæ Melitínæ Mártyris, quæ, sub Antoníno Imperatóre et Antíocho Prǽside, cum ad Gentílium fana semel et íterum ducta esset, atque idóla semper corruérent, ídeo suspénsa et laniáta est, ac demum cápite plexa.
      - type: text
        text: Tulli, in Gállia, sancti Apri Epíscopi.
      - type: text
        text: Item sancti Leobíni, Epíscopi Carnuténsis.
      - type: text
        text: Lugdúni, in Gállia, sancti Albíni Epíscopi.
      - type: text
        text: Eódem die deposítio sancti Aichárdi Abbátis.
      - type: text
        text: In Gállia sanctæ Eutrópiæ Víduæ.
      - type: text
        text: Génuæ sanctæ Catharínæ Víduæ, contémptu mundi et caritáte in Deum insígnis.
  psalm.d-cimo-s-ptimo-kal-ndas-sept-mbris-c36dba86a8:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 16th day of August we keep the feast of the holy Confessor Hyacinth, of the Order of Preachers, [who died at Cracow, in Poland, upon the feast-day of the Assumption, in the year 1257, and] whose feast Pope Clement VIII, when he enrolled his name among those of the Saints, ordered to be kept on the morrow thereof.
      - type: citation
        text: 'Upon the same 16th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 410,] the holy Deacon Titus. While the city was occupied by the Goths he was distributing money to the poor, when a tribune of the barbarians ordered him to be killed.
      - type: text
        text: At Nice, in Bithynia, the holy physician Diomede, who in the persecution under Diocletian was for Christ's faith's sake slain with the sword, and so finished his testimony.
      - type: text
        text: Likewise thirty-three holy martyrs.
      - type: text
        text: At Ferentino, in Latium, the holy centurion Ambrose, who in the persecution under the Emperor Diocletian was tortured in diverse ways, and when he had passed unhurt through the fire was sunk in water, and so entered into rest.
      - type: text
        text: At Milan, [about the year 400,] holy Simplician, Bishop [of that see,] famed through the testimony of holy Ambrose and Augustine.
      - type: text
        text: At Auxerre, [in the year 561,] holy Eleutherius, Bishop [of that see.]
      - type: text
        text: At Nicomedia, [in the year 358,] the holy Confessor Arsacius. Under the persecutor Licinius he deserted from the army, and took to the life of a hermit, wherein he shone with such graces that it is written that he cast out devils and by his prayers killed a huge dragon. At length he foretold the sack which was coming upon the city, and gave up his soul to God in prayer.
      - type: text
        text: At Montpellier, in Languedoc, [in the year 1327,] the blessed Confessor Roch, who by the sign of the Cross delivered many cities of Italy from the plague. His body hath been taken to Venice, and buried with great honour in the church consecrated in his name.
      - type: text
        text: At Rome, holy Serena, once the wife of the Emperor Diocletian.
      la:
      - type: text
        text: Décimo séptimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Ióachim, patris immaculátæ Vírginis Genetrícis Dei Maríæ, Confessóris, cuius dies natális refértur tertiodécimo Kaléndas Aprílis.
      - type: text
        text: Romæ sancti Titi Diáconi, qui, Urbe a Gothis occupáta, pecúnias paupéribus distríbuens, a Tribúno bárbaro iussus est occídi.
      - type: text
        text: Nicǽæ, in Bithýnia, sancti Diomédis médici, qui in persecutióne Diocletiáni Imperatóris, pro Christi fide cæsus gládio, martýrium complévit.
      - type: text
        text: In Palæstína sanctórum trigínta trium Mártyrum.
      - type: text
        text: Ferentíni, in Hérnicis, sancti Ambrósii Centuriónis, qui, in persecutióne Diocletiáni, váriis modis cruciátus, et novíssime, cum per ignem illǽsus transísset, demérsus in aquam, edúctus est in refrigérium.
      - type: text
        text: Medioláni deposítio sancti Simpliciáni Epíscopi, sanctórum Ambrósii et Augustíni testimónio célebris.
      - type: text
        text: Antisiodóri sancti Eleuthérii Epíscopi.
      - type: text
        text: Nicomedíæ sancti Arsácii Confessóris, qui, sub Licínio persecutóre, milítia relícta, solitáriam vitam ducens, tantis virtútibus cláruit, ut et dǽmones expulísse et orándo interemísse ingéntem dracónem legátur; dénique, futúram civitátis cladem prænúntians, in oratióne spíritum Deo réddidit.
      - type: text
        text: Apud Montem Pessulánum, in Gállia Narbonénsi, deposítio beáti Rochi Confessóris, qui multas Itáliæ urbes signo Crucis a morbo epidémiæ liberávit. Ipsíus corpus Venétias póstea translátum, et in Ecclésia, eius nómine consecráta, honorificentíssime cónditum fuit.
      - type: text
        text: Romæ sanctæ Serénæ, uxóris quondam Diocletiáni Augústi.
  psalm.duod-cimo-kal-ndas-aug-sti-7f1e4e61d7:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Emperor Henry II. He and his wife Cunegunda preserved perpetual virginity. He brought holy Stephen, King of Hungary, and nearly all his realm, to believe in Christ. Of him mention is made upon the 15 th day of this present month of July.
      - type: citation
        text: 'Upon the same 21st day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Virgin Praxedes.
      - type: text
        text: She was learned in the divine law, and spent her time constantly in all chastity, in watchings, and prayers, and fastings, and fell asleep in Christ, [in the year 164.] She was buried on the Salarian Way, beside her Sister Pudentiana.
      - type: text
        text: At Babylon, the Prophet Daniel, [in the year of the world 3429, about 626 B.C.]
      - type: text
        text: At Marseilles, the holy soldier Victor. He refused either to perform military service or to offer sacrifice to idols, wherefore he was first cast into prison, where he was visited by an angel, then punished with diverse torments, and lastly broken in a flour mill, and so finished his testimony.
      - type: text
        text: There also suffered along with him the three soldiers, Alexander, Felician, and Longinus, [in the year 290.]
      - type: text
        text: At Troyes, the holy Virgin and martyr Julia, [in the year 275.]
      - type: text
        text: At the same place, under the Emperor Aurelian, the holy martyrs Claudius, Justus, Jucundinus, and five others.
      - type: text
        text: At Camana, in Armenia, the holy martyr Zoticus, Bishop [of that see,] who was crowned under the Emperor Severus.
      - type: text
        text: At Strasbourg, [in the year 678,] holy Arbogastus, [19th] Bishop [of that see, and Patron of the Diocese,] famous for miracles.
      - type: text
        text: In Syria, the holy monk John, [of Edessa,] the Companion of holy Simeon, [called the Fool, sixth century.]
      la:
      - type: text
        text: Duodécimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Lauréntii a Brundúsio, Confessóris et Ecclésiæ Doctóris, ex Ordine Fratrum Minórum Capuccinórum, qui sequénti die migrávit in cælum.
      - type: text
        text: Romæ sanctæ Praxédis Vírginis, quæ, in omni castitáte et lege divína cum esset erudíta, vigíliis et oratiónibus atque ieiúniis assídue vacans, quiévit in Christo, sepúltaque est, iuxta sorórem suam Pudentiánam, via Salária.
      - type: text
        text: Babylóne sancti Daniélis Prophétæ.
      - type: text
        text: Cománæ, in Arménia, sancti Zótici, Epíscopi et Mártyris; qui sub Sevéro coronátus est.
      - type: text
        text: Massíliæ, in Gállia, natális sancti Victóris, qui, cum esset miles, et nec militáre neque idólis sacrificáre vellet, hinc, primo in cárcerem trusus ibíque ab Angelo visitátus, deínde váriis cruciátibus punítus, novíssime, contrítus in mola pistória, martýrium consummávit. Passi sunt cum ipso et tres mílites, id est Alexánder, Feliciánus et Longínus.
      - type: text
        text: Trecis, in Gállia, pássio sanctórum Cláudii, Iusti, Iucundíni et Sociórum quinque, sub Aureliáno Imperatóre.
      - type: text
        text: Ibídem sanctæ Iúliæ, Vírginis et Mártyris.
      - type: text
        text: Argentoráti sancti Arbogásti Epíscopi, miráculis clari.
      - type: text
        text: In Sýria sancti Ioánnis Mónachi, qui éxstitit colléga sancti Simeónis.
  psalm.duod-cimo-kal-ndas-dec-mbris-bf28eb6f11:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 20th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, the holy martyr Edmund, King of the East Angles.
      - type: text
        text: At Messina, in Sicily, the holy martyrs Ampelus and Caius.
      - type: text
        text: At Turin, the holy martyrs Octavius, Solutor, and Adventor, soldiers of the Theban legion, who contended gloriously under the Emperor Maximian, and were crowned with martyrdom.
      - type: text
        text: At Caesarea, in Palestine, the holy martyr Agapius, who was condemned to the wild beasts under the Emperor Galerius Maximian but as they did not hurt him, he was sunk in the sea with stones tied to his feet.
      - type: text
        text: In Persia, the holy martyrs the Bishop Nerses and his Companions.
      - type: text
        text: At Dorostorum, in Mysia, holy Dasius, Bishop (of that see,) who was beheaded under the President Bassus, because he would not join in the uncleanliness of the Feast of Saturn.
      - type: text
        text: At Nice, in Bithynia, in the persecution under Maximinus, the holy martyrs Eustace, Thespesius, and Anatolius.
      - type: text
        text: At Heraclea, in Thrace, the holy martyrs Bassus, Denys, Agapitus, and forty others.
      - type: text
        text: At Constantinople, holy Gregory of Decapolis, who suffered many things for honouring the holy images.
      - type: text
        text: At Milan, (in the fifth century,) holy Benignus, Bishop (of that see,) who, in the midst of all the troubles caused by the incoming of the barbarians, ministered in all steadfastness and godliness unto the Church committed to his care.
      - type: text
        text: At Chalons, (in the sixth century,) holy Sylvester, Bishop (of that see,) who passed away to be ever with the Lord, full of days and graces, in the forty-second year of his priesthood.
      - type: text
        text: At Verona, (likewise in the sixth century,) the holy Confessor Simplicius, Bishop (of that see.)
      la:
      - type: text
        text: Duodécimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Felícis Valésii, Presbýteri et Confessóris, qui Ordinis sanctíssimæ Trinitátis redemptiónis captivórum éxstitit Fundátor, ac prídie Nonas Novémbris obdormívit in Dómino.
      - type: text
        text: In Pérside pássio sanctórum Nersæ Epíscopi, et Sociórum.
      - type: text
        text: Messánæ, in Sicília, sanctórum Mártyrum Ampéli et Caii.
      - type: text
        text: Tauríni sanctórum Mártyrum Octávii, Solutóris et Adventóris, Thebánæ legiónis mílitum; qui, sub Maximiáno Imperatóre, egrégie decertántes, martýrio coronáti sunt.
      - type: text
        text: Cæsaréæ, in Palæstína, sancti Agápii Mártyris, qui, sub Galério Maximiáno Imperatóre, damnátus ad béstias et ab iis nil læsus, tandem, lapídibus ad pedes appénsis, in mare demérgitur.
      - type: text
        text: Doróstori, in Mýsia inferióre, sancti Dásii Mártyris, qui, cum in festo Satúrni nollet impudicítiis eius consentíre, sub Basso Prǽside cæsus est.
      - type: text
        text: Nicǽæ, in Bithýnia, sanctórum Mártyrum Eustáchii, Thespésii et Anatólii, in persecutióne Maximiáni.
      - type: text
        text: Heracléæ, in Thrácia, sanctórum Mártyrum Bassi, Dionýsii, Agapíti et aliórum quadragínta.
      - type: text
        text: In Anglia sancti Eadmúndi, Regis et Mártyris.
      - type: text
        text: Constantinópoli sancti Gregórii Decapolítæ, qui ob cultum sanctárum Imáginum multa passus est.
      - type: text
        text: Medioláni sancti Benígni Epíscopi, qui, in magna barbarórum perturbatióne, commíssam sibi Ecclésiam summa constántia et religióne administrávit.
      - type: text
        text: Cabillóne, in Gálliis, sancti Silvéstri Epíscopi, qui quadragésimo secúndo sui sacerdótii anno, plenus diérum atque virtútum, migrávit ad Dóminum.
      - type: text
        text: Verónæ sancti Simplícii, Epíscopi et Confessóris.
      - type: text
        text: Hildeshémii, in Saxónia, sancti Bernwárdi, Epíscopi et Confessóris, qui a Cælestíno Papa Tértio in Sanctórum númerum adscríptus est.
  psalm.duod-cimo-kal-ndas-febru-rii-bc8e55819e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, under Symphronius, Prefect of the city, the holy Virgin and martyr Agnes. She was cast into the fire, but the fire died out at her prayer, and then she was smitten with the sword, (in the year 304.) Blessed Jerome writeth concerning her. The life of Agnes hath been praised in the writings and in the tongues of all nations, and most chiefly in the churches. She overcame not only the tyrant but also the weakness of her own age, and hallowed by martyrdom the title of virgin.
      - type: text
        text: At Athens, (in the second century,) the holy Bishop Publius, who ruled illustriously over the Church of Athens in succession to holy Denis the Areopagite he was famous for graces and eminent for teaching, and was gloriously crowned with the martyrdom of Christ.
      - type: text
        text: At Tarragona, in Spain, the holy martyrs Fructuosus, Bishop of that see, and the Deacons Augurius and Eulogius. In (the year 259,) in the time of the Emperor Gallienus, they were first imprisoned and then cast into the fire, and when their bonds had been burnt they stretched forth their hands in the form of a cross, and so in prayer finished their martyrdom.
      - type: text
        text: Holy Augustin preached to the people upon their feast-day.
      - type: text
        text: At Troyes, (in Champagne,) the holy martyr Patroclus, who gained the crown of martyrdom under the Emperor Aurelian.
      - type: text
        text: In the Monastery of Einsiedeln, in Gaul, the holy hermit Meinard, who was murdered by thieves, (in the year 861. Founder of Notre Dame des Ermites.)
      - type: text
        text: At Pavia, the holy Confessor Epiphanius, Bishop of that see.
      la:
      - type: text
        text: Duodécimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: 'Romæ pássio sanctæ Agnétis, Vírginis et Mártyris; quæ, sub Præfécto Urbis Symphrónio, ígnibus iniécta, sed iis per oratiónem eius exstínctis, gládio percússa est. De ea beátus Hierónymus hæc scribit: « Omnium géntium lítteris atque linguis, præcípue in Ecclésiis, Agnétis vita laudáta est; quæ et ætátem vicit et tyránnum, et títulum castitátis martýrio consecrávit ».'
      - type: text
        text: Athénis natális sancti Públii Epíscopi, qui Atheniénsium Ecclésiam, post sanctum Dionýsium Areopagítam, nobíliter rexit; et, præclárus virtútibus ac doctrínæ laude præfúlgens, ob Christi martýrium glorióse coronátur.
      - type: text
        text: Tarracóne, in Hispánia, sanctórum Mártyrum Fructuósi Epíscopi, Augúrii et Eulógii Diaconórum. Hi, témpore Galliéni, primo in cárcerem trusi, deínde flammis iniécti, et, exústis vínculis, mánibus in modum crucis expánsis orántes, martýrium complevérunt; in quorum die natáli sanctus Augustínus sermónem ad pópulum hábuit.
      - type: text
        text: In monastério Einsidlénsi, apud Helvétios, sancti Meinrádi, Presbýteri et Mónachi; qui eódem in loco, ubi póstea monastérium ipsum excrévit, eremíticæ inténtus vitæ, a latrónibus interféctus est. Ipsíus vero beáti viri corpus, olim in Augiénsi Germániæ monastério sepúltum, ad Einsidlénse monastérium deínde relátum fuit.
      - type: text
        text: Trecis, in Gállia, sancti Pátrocli Mártyris, qui martýrii corónam sub Aureliáno Imperatóre proméruit.
      - type: text
        text: Pápiæ sancti Epiphánii, Epíscopi et Confessóris.
  psalm.duod-cimo-kal-ndas-i-lii-36c2db1e3d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 20th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy martyr Pope Silverius. He refused to restore the [Eutychian] heretic Anthimus, who had been deposed [from the Patriarchate of Constantinople] by his predecessor, Pope Agapitus, and in consequence of this, through a plot of the wicked Empress Theodora, was exiled by Bellisarius to the island of Ponza, where he died for the Catholic faith, broken down by sufferings and hardships, [in the year 538.]
      - type: text
        text: At Rome, the holy Novatus, son of the blessed Senator Pudens and brother of the holy Priest Timothy, and of Christ's holy Virgins Pudentiana and Praxedes, who were taught in the faith by the Apostles. Their house was turned into a church, and called that of St. Pastor, [in the second century.]
      - type: text
        text: At Tomi, in Pontus, the holy martyrs Paul and Cyriacus.
      - type: text
        text: At Petra, in Palestine, the holy Macarius, Bishop [of that see,] who suffered many things of the Arians, and was exiled to Africa, where he fell asleep in the Lord, [in the fourth century.]
      - type: text
        text: At Seville, in Spain, [in the year 630,] the holy Virgin Florentina, sister of the holy Leander, Bishop [of Seville,] and holy Isidore, Bishop [of Seville.]
      la:
      - type: text
        text: Duodécimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: In ínsula Póntia natális sancti Silvérii, Papæ et Mártyris, qui, cum Anthimum, Epíscopum hæréticum, a suo prædecessóre Agapíto depósitum, restitúere noluísset, a Belisário, agénte ímpia Theodóra Augústa, in exsílium pulsus est, et ibídem, pro fide cathólica multis ærúmnis conféctus, defécit.
      - type: text
        text: Romæ deposítio sancti Nováti, qui fuit fílius beáti Pudéntis Senatóris, et frater sancti Timóthei Presbýteri et sanctárum Christi Vírginum Pudentiánæ et Praxédis, qui ab Apóstolis erudíti sunt in fide. Ipsórum vero domus, in Ecclésiam commutáta, Pastóris Títulus appellátur.
      - type: text
        text: Tomis, in Ponto, sanctórum Mártyrum Pauli et Cyríaci.
      - type: text
        text: Petræ, in Palæstína, sancti Macárii Epíscopi, qui, ab Ariánis passus multa et in Africam relegátus, Conféssor quiévit in Dómino.
      - type: text
        text: Híspali, in Hispánia, sanctæ Floréntinæ Vírginis, soróris sanctórum Leándri et Isidóri Episcopórum.
  psalm.duod-cimo-kal-ndas-i-nii-8d9aa90092:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Peter Morone, who was a hermit when he was created Supreme Pontiff, and was called Celestine V. He resigned the Papacy and led a religious life in solitude, and so, famous for graces and wonders, passed away to be for ever with the Lord. Of him mention is made upon the 19th of this same month of May.
      - type: citation
        text: 'Upon the same 21st day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Morocco, the holy Deacons Timothy, Polius, and Eutychius, who spread the Word of God in that country, and won the crown of martyrdom together.
      - type: text
        text: At Caesarea, in Cappadocia, the holy martyrs Polyeuctus, Victorius, and Donatus.
      - type: text
        text: At Cordova, [in the persecution under the Emperor Decius,] the holy martyr Secundinus.
      - type: text
        text: Upon the same day, [at Nicomedia, in the persecution under the Emperor Diocletian,] the holy martyrs Synesius and Theopompus.
      - type: text
        text: At Caesarea Philippi, [likewise in the persecution under the Emperor Diocletian,] the holy Nicostratus and Antiochus, along with other soldiers, all martyrs.
      - type: text
        text: On the same day, the holy Valens, Bishop [of Pampeluna,] who was murdered along with three lads.
      - type: text
        text: At Alexandria, are commemorated the holy martyrs Secundus the Priest, and others, whom George, the Arian Bishop under the Emperor Constantius, savagely ordered to be slain during the Whitsuntide holidays.
      - type: text
        text: Also the holy Bishops [Ammonius, Muus, Gaius, Philon, Heres, Pliny, Psinosiris, Palemon, Agathon, Anagamphon, Mark, another Ammonius, another Mark, Dracontius, Adelphius, and Athenodorus,] and the Priests [Hierax and Dioscorus,] who all were banished by the Arians, and so won a place with holy Confessors.
      - type: text
        text: At Nice, in Gaul, [in the sixth century,] the holy Confessor Hospitius, remarkable for the grace of self-denial, and for the spirit of prophecy.
      la:
      - type: text
        text: Duodécimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Sancti Valéntis Epíscopi, qui, una cum tribus púeris, necátus est.
      - type: text
        text: Alexandríæ commemorátio sanctórum Mártyrum Secúndi Presbýteri, et aliórum; quos sacris diébus Pentecóstes, sub Constántio Imperatóre, Ariánus Epíscopus Geórgius sævíssime occídi præcépit.
      - type: text
        text: In Mauritánia Cæsariénsi natális sanctórum Mártyrum Diaconórum Timóthei, Pólii et Eutýchii, qui, in eádem regióne disseminántes verbum Dei, páriter coronári meruérunt.
      - type: text
        text: Cæsaréæ, in Cappadócia, item natális sanctórum Mártyrum Polyeúcti, Victórii et Donáti.
      - type: text
        text: Córdubæ, in Hispánia, sancti Secundíni Mártyris.
      - type: text
        text: Eódem die sanctórum Mártyrum Synésii et Theopómpi.
      - type: text
        text: Cæsaréæ Philíppi natális sanctórum Mártyrum Nicostráti et Antíochi Tribunórum, cum áliis milítibus.
      - type: text
        text: Alexandríæ commemorátio sanctórum Episcopórum et Presbyterórum; qui, ab Ariánis exsílio relegáti, sanctis Confessóribus sociári meruérunt.
      - type: text
        text: Níciæ, apud Varum flúvium, sancti Hospítii Confessóris, abstinéntiæ virtúte ac prophetíæ spíritu insígnis.
  psalm.duod-cimo-kal-ndas-ianu-rii-8f7cde121f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Upon the Coromandel coast of India, not far from Madras, the blessed Apostle Thomas. He preached the Gospel to the Parthians, Medes, Persians, and Hyrcanians, and at length came into India, and was teaching the Christian religion to those people when the king commanded him to be run through with lances, and so he died. His relics were taken first to the city of Edessa and afterwards to Ortona.
      - type: text
        text: In Tuscany, the holy martyrs John and Festus.
      - type: text
        text: In Lycia, the holy martyr Themistocles. Under the Emperor Decius he gave himself up for holy Dioscorus, when they were seeking after him to slay him, and was first racked, taken down and dragged about, and beaten with cudgels, gained the crown of martyrdom (in the year 249.)
      - type: text
        text: At Nicomedia, the holy Priest Glycerius, who suffered many torments in the persecution under the Emperor Diocletian, and was at length cast in the fire, and so finished his testimony.
      - type: text
        text: At Antioch, the holy martyr Anastasius, Bishop (of that see,) who was cruelly murdered by the Jews in the time of the Emperor Phocas, (in the year 609.)
      - type: text
        text: At Trier, the holy Confessor Severinus, Bishop (of that see, fourth century.)
      la:
      - type: text
        text: Duodécimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Calamínæ natális beáti Thomæ Apóstoli, qui Parthis, Medis, Persis et Hyrcánis Evangélium prædicávit; ac demum in Indiam pervénit, ibíque, cum eos pópulos in Christiána religióne instituísset, Regis iussu lánceis transfíxus occúbuit. Ipsíus relíquiæ primo ad urbem Edéssam, in Mesopotámia, deínde Ortónam, apud Frentános, translátæ sunt.
      - type: text
        text: Fribúrgi Helvetiórum item natális sancti Petri Canísii, Sacerdótis e Societáte Iesu et Confessóris, doctrína et sanctitáte præclári; qui, difficíllimis Germániæ tempóribus, fidem cathólicam strénue deféndit ac propagávit. Eum vero Pius Undécimus, Póntifex Máximus, Sanctórum catálogo adscrípsit, simúlque Doctórem universális Ecclésiæ declarávit, et ipsíus festum quinto Kaléndas Maii agéndum esse decrévit.
      - type: text
        text: Antiochíæ sancti Anastásii, Epíscopi et Mártyris; qui, Phocæ Imperatóris témpore, a Iudǽis, in seditióne ab ipsis contra Christiános facta, sævíssime necátus est.
      - type: text
        text: Nicomedíæ sancti Glycérii Presbýteri, qui, in persecutióne Diocletiáni, multis torméntis vexátus, demum, in ignem coniéctus, martýrium consummávit.
      - type: text
        text: In Túscia sanctórum Mártyrum Ioánnis et Festi.
      - type: text
        text: In Lýcia sancti Themístoclis Mártyris, qui, sub Décio Imperatóre, pro sancto Dióscoro, qui quærebátur ad necem, se óbtulit, et, equúleo tortus, raptátus ac fústibus cæsus, martýrii corónam adéptus est.
      - type: text
        text: Tréviris sancti Severíni, Epíscopi et Confessóris.
  psalm.duod-cimo-kal-ndas-m-rtii-cadffa021f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 18th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Jerusalem, the blessed martyr Simeon, Bishop of that holy city [from the year 46 to the year 107.] This is he of whom it is recorded that he was the son of Cleophas and the kinsman of the Saviour according to the flesh. He was ordained Bishop of Jerusalem next after James, the brother of the Lord. In the persecution under Trajan he was put to many torments and suffered martyrdom, and the judge and all men marvelled to see with how great boldness and firmness he endured the grievous torment of the cross at his great age, for he was an hundred and twenty years old.
      - type: text
        text: At Ostia, the holy brethren Maximus and Claudius, and Praeperdigna, the wife of Claudius, and their two sons, Alexander and Cutias, all martyrs, [in the year 295.] They were a very noble race, and by command of the Emperor Diocletian they were arrested and sent into exile, then they were consumed with fire, and so offered a sacrifice of sweet savour unto God himself. Their relics were cast into the river, but the Christians sought for them and buried them hard by the city.
      - type: text
        text: In Africa, the holy martyrs Lucius, Sylvan, Rutulus, Classicus, Secundinus, Fructulus, and Maximus.
      - type: text
        text: At Constantinople, [in the year 449,] holy Flavian, Bishop of that see, who, because he defended the Catholic faith at Ephesus, was assailed by the followers of the wicked Dioscorus with cuffs and kicks, and sent into exile, where he died after three days.
      - type: text
        text: At Toledo, [in the year 631,] the holy Confessor Helladius, Bishop of that see.
      la:
      - type: text
        text: Duodécimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Hierosólymis natális sancti Simeónis, Epíscopi et Mártyris; qui fílius Cleóphæ et propínquus Salvatóris secúndum carnem fuísse tráditur. Hic, Hierosolymórum Epíscopus post Iacóbum, fratrem Dómini, ordinátus, et, in Traiáni persecutióne, multis supplíciis afféctus, martýrio consummátus est, ómnibus qui áderant et Iúdice ipso mirántibus ut centum vigínti annórum senex fórtiter constantérque supplícium crucis pertulísset.
      - type: text
        text: Apud Ostia Tiberína sanctórum Mártyrum Máximi et Cláudii fratrum, et Præpedígnæ, uxóris Cláudii, cum duóbus fíliis Alexándro et Cútia; qui, cum essent præclaríssimi géneris, omnes, iubénte Diocletiáno, tenti atque in exsílium deportáti sunt, ac deínde, incéndio concremáti, Deo ipsi odoríferum martýrii sacrifícium obtulérunt. Eórum relíquiæ, in flumen proiéctæ et a Christiánis perquisítæ, iuxta eándem civitátem sepúltæ sunt.
      - type: text
        text: In Africa sanctórum Mártyrum Lúcii, Silváni, Rútuli, Clássici, Secundíni, Frúctuli et Máximi.
      - type: text
        text: Constantinópoli sancti Flaviáni Epíscopi, qui, cum fidem cathólicam Ephesi propugnáret, ab ímpii Dióscori factióne pugnis et cálcibus percússus est, et, in exsílium actus, ibídem post tríduum vitam finívit.
      - type: text
        text: Toléti, in Hispánia, sancti Helládii, Epíscopi et Confessóris, qui a sancto Ildefónso, Toletáno Epíscopo, multis láudibus celebrátur.
  psalm.duod-cimo-kal-ndas-maii-ab0eb31440:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 20th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Sulpitius and Servilian. They were converted to the faith of Christ by the preaching and miracles of the blessed Virgin Domitilla, and were put to death by Anian, Prefect of the city, in the persecution under the Emperor Trajan, for refusing to offer sacrifice to idols.
      - type: text
        text: Upon the same day, the holy martyrs Victor, Zoticus, Zeno, Acindinus, Caesareus, Severian, Chrysophor, Theonas, and Antonine, who were variously tried under the Emperor Diocletian, and attained to martyrdom, [most likely in Nicomedia.]
      - type: text
        text: At Tomi, in Scythia, holy Theotimus, [Bishop of that see, about the year 409,] whose holiness and miracles were so striking that he was honoured even by the unbelieving savages.
      - type: text
        text: At Embrun, in Gaul, holy Marcellinus, the first Bishop of that city, who came from Africa in consequence of a warning from God, along with his holy companions Vincent and Domninus, and by his word and the wondrous signs, for which he is famous even unto this day, brought to believe in Christ a great number of the dwellers on the Seaward Alps, [in the year 374.]
      - type: text
        text: At Auxerre, [in the fifth century,] the holy Priest Marcian.
      - type: text
        text: On the same day, the holy Confessor Theodore, nicknamed "Hairy" on account of the rough sackcloth garment which he wore. He is famous for many mighty works, more especially against evil spirits and from his body there floweth an ointment whereby the sick are healed. [He was of a noble family of Constantinople. His date is not known exactly, but it was certainly after the persecution of Diocletian. He lived in a desert in Thrace, which is called after him, the Hairy Desert]
      - type: text
        text: At Monte Pulciano, [in the year 1317,] the holy Virgin Agnes, of the Order of St. Dominic, famous for miracles.
      la:
      - type: text
        text: Duodécimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Mártyrum Sulpícii et Serviliáni, qui, prædicatióne et miráculis beátæ Domitíllæ Vírginis ad Christi fidem convérsi, ambo, cum nollent idólis immoláre, in persecutióne Traiáni, a Præfécto Urbis Aniáno sunt cápite cæsi.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Victóris, Zótici, Zenónis, Acíndyni, Cæsárei, Severiáni, Chrysóphori, Theónæ et Antoníni, qui, sub Diocletiáno Imperatóre, passióne ac signis beáti Geórgii ad Christum convérsi sunt, et ob intrépidam fídei confessiónem, várie tentáti, martýrium complevérunt.
      - type: text
        text: Tomis, in Scýthia, sancti Theótimi Epíscopi, quem, ob insígnem ipsíus sanctitátem atque mirácula, étiam infidéles bárbari veneráti sunt.
      - type: text
        text: Ebredúni, in Gálliis, sancti Marcellíni, qui fuit primus eiúsdem urbis Epíscopus. Hic, Dei mónitu, cum sanctis Sóciis Vincéntio et Domníno, ex Africa venit, et máximam Alpium maritimárum partem verbo et signis admirándis, quibus usque hódie refúlget, ad Christi fidem convértit.
      - type: text
        text: Antisiodóri sancti Marciáni Presbýteri.
      - type: text
        text: Apud Constantinópolim sancti Theodóri Confessóris, ab áspera cilícii veste, qua tegebátur, cognoménto Tríchinas, qui multis virtútibus, præsértim advérsus dǽmones, cláruit; ex cuius córpore scatúriens unguéntum ægrótis sanitátem impértit.
      - type: text
        text: In Monte Politiáno, in Túscia, sanctæ Agnétis Vírginis, ex Ordine sancti Domínici, miráculis claræ.
  psalm.duod-cimo-kal-ndas-nov-mbris-a820ac0097:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Cologne, the holy Ursula and her Companions, who, for their steadfastness in Christianity and chastity, were massacred by the Huns, and so closed their earthly life by martyrdom.
      - type: text
        text: Very many of their bodies are buried at Cologne.
      - type: text
        text: In Cyprus, the holy Abbot Hilarion, of whom holy Jerome hath written the life, full of graces and wonders.
      - type: text
        text: At Ostia, the holy martyr Asterius, a Priest who suffered under the Emperor Alexander, as is written in the acts of the passion of the blessed Pope Kallistus.
      - type: text
        text: At Nicomedia, the holy martyrs Dasius, Zoticus, Caius, and twelve others, soldiers, who were diversely tormented, and then drowned in the sea, (under the Emperor Diocletian.) At Maronia, in Syria, near Antioch, (in the fourth century,) the holy monk Malchus.
      - type: text
        text: At Lyon, holy Viator, the servant of the blessed Justus, Bishop of Lyon.
      - type: text
        text: At Laon, holy Cilinia, mother of the blessed Remy, Bishop of Reims.
      la:
      - type: text
        text: Duodécimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: In Cypro natális sancti Hilariónis Abbátis, cuius vitam, virtútibus atque miráculis plenam, sanctus Hierónymus scripsit.
      - type: text
        text: Apud Colóniam Agrippínam item natális sanctárum Ursulæ et Sociárum eius; quæ, pro Christiána religióne et virginitátis constántia ab Hunnis interféctæ, martýrio vitam consummárunt, earúmque plúrima córpora fuérunt Colóniæ cóndita.
      - type: text
        text: Apud Ostia Tiberína sancti Astérii, Presbýteri et Mártyris; qui (ut in passióne beáti Callísti Papæ légitur) sub Alexándro Imperatóre passus est.
      - type: text
        text: Nicomedíæ natális sanctórum Dásii, Zótici, Caii et aliórum duódecim mílitum; qui, post divérsa torménta, in mare demérsi sunt.
      - type: text
        text: Lugdúni, in Gállia, sancti Viatóris, qui éxstitit miníster beáti Iusti, Lugdunénsis Epíscopi.
      - type: text
        text: Maróniæ, prope Antiochíam, in Sýria, sancti Malchi Mónachi.
      - type: text
        text: In castro Laudunénsi sanctæ Cilíniæ, matris beáti Remígii, Epíscopi Rheménsis.
  psalm.duod-cimo-kal-ndas-oct-bris-d5007982ec:
    role: psalm
    content:
      en:
      - type: text
        text: Tomorrow is the Eve of the holy Apostle and Evangelist Matthew.
      - type: citation
        text: 'Upon the same 20th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Eustace and Theopista his wife along with their two sons Agapitus and Theopistus, who, under the Emperor Hadrian, were condemned to be devoured by wild beasts, but, as by God's help these would not touch them, they were shut up in a bull of hot bronze, and so finished their testimony.
      - type: text
        text: At Cyzicus, in the Propontis, under the Emperor Maximian, the holy martyrs, the Virgin Fausta and Evilasius. Evilasius was a priest of idols who shaved Fausta's head to put her to shame, hung her up, and tormented her, then he was fain to cause her to be cut in two, but the executioners could not hurt her whereupon he was confounded and believed in Christ. Then was he mightily tormented, by command of the Emperor, and Fausta was pierced through the head and nails fixed into her whole body, and so was laid upon a vessel of burning metal and then a voice came from heaven and called them both together to go to be with the Lord.
      - type: text
        text: In Phrygia, the holy martyrs Denys and Privatus.
      - type: text
        text: Also the holy martyr Priscus, who was stabbed with poignards and beheaded.
      - type: text
        text: At Perge, in Pamphylia, under the Emperor Antonine, the holy martyrs Theodore and Philippa his mother, and their Companions.
      - type: text
        text: At Carthage, the holy Virgin and martyr Candida, who was crowned with martyrdom under the Emperor Maximian, her whole body being torn with stripes.
      - type: text
        text: Also, (in the fourth century, at Beyt Jabryn, in Palestine,) the holy martyrs Susanna and Martha, of the whom Susanna was the daughter of Arthemius, a priest of idols.
      - type: text
        text: Upon the same day, (in the sixth century,) the holy Confessor Pope Agapitus, whose holiness is recorded by blessed Gregory the Great.
      - type: text
        text: At Milan, (in the fifth century,) the holy Confessor Clicerius, Bishop (of that see.)
      la:
      - type: text
        text: Duodécimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Romæ pássio sanctórum Mártyrum Eustáchii et Theopístis uxóris, cum duóbus fíliis Agapíto et Theopísto, qui, sub Hadriáno Imperatóre, damnáti ad béstias, sed Dei ope ab iis nullátenus læsi, tandem, in bovem ǽneum candéntem inclúsi, martýrium consummárunt.
      - type: text
        text: Cýzici, in Propóntide, natális sanctórum Mártyrum Faustæ Vírginis, et Evilásii, sub Maximiáno Imperatóre; e quibus Fausta, ab eódem Evilásio, idolórum sacerdóte, decalváta et ad turpitúdinem rasa, suspénsa et torta est. Deínde, cum eam vellet médiam secáre, et carnífices lǽdere non valérent, stupens crédidit in Christum Evilásius; et, dum ipse quoque, Imperatóris iussu, fórtiter torquerétur, Fausta, cápite terebráta, clavis toto córpore confíxa et sartágini ignítæ impósita, tandem, cum eódem Evilásio, illam voce de cælis vocánte, transívit ad Dóminum.
      - type: text
        text: In Phrýgia sanctórum Mártyrum Dionýsii et Priváti.
      - type: text
        text: Item sancti Prisci Mártyris, qui, punctim pugiónibus transverberátus, cápite plexus est.
      - type: text
        text: Perge, in Pamphýlia, sanctórum Theodóri, et Philíppæ matris, ac Sociórum Mártyrum, sub Antoníno Imperatóre.
      - type: text
        text: Carthágine sanctæ Cándidæ, Vírginis et Mártyris; quæ, sub Maximiáno Imperatóre, plagis toto córpore dilaceráta, martýrio coronátur.
      - type: text
        text: Medioláni sancti Clicérii, Epíscopi et Confessóris.
      - type: text
        text: Romæ Translátio córporis sancti Agapíti Primi, Papæ et Confessóris, ex urbe Constantinópoli, in qua Póntifex décimo Kaléndas Maii obdormíerat in Dómino.
  psalm.duod-cimo-kal-ndas-sept-mbris-f7a1d5b7c9:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Jeanne Frances Frémiot de Chantal, Foundress of the Order of Nuns of the Visitation of St Mary, at Annecy, in Savoy, of whom mention is made on the 13th day of December.
      - type: citation
        text: 'Upon the same 21st day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, in the Veran Field, [San Lorenzo, in the third century,] the holy widow and martyr Cyriaca. In the Valerian persecution she spent herself, and all that she had, in ministering to the saints, and at last suffered martyrdom for Christ, and so willingly spent her life itself.
      - type: text
        text: At Salona, [in the third century,] holy Anastasius, a petty officer in the army, who was converted to the faith by beholding the firmness with which the blessed martyr Agapitus bore all his torments, and who was slain by order of the Emperor Aurelian for confessing Christ's name, and so passed away as a martyr, to be ever with the Lord.
      - type: text
        text: In Sardinia, the holy martyrs Luxorius, Cisellus, and Camerinus, who were slain with the sword under the President Delphius, in the persecution under the Emperor Diocletian.
      - type: text
        text: In the Gevaudan country, the holy martyr Privatus, Bishop [of Mende,] who suffered in the persecution under the Emperors Valerian and Gallienus.
      - type: text
        text: On the same day, [in the year 363,] the holy martyrs Bonosus and Maximian, [officers of the Old Herculians, and the last victims of the Emperor Julian the Apostate.]
      - type: text
        text: At Fondi, in Latium, [under the Emperor Decius,] the holy martyr Paternus. He had come from Alexandria to Rome to visit the graves of the Apostles, and had gone from Rome to Fondi. He was arrested by a Tribune while he was burying the bodies of martyrs, and died in his chains.
      - type: text
        text: At Edessa, the holy Bassa and her sons Theogonius, Agapius, and Faithful, all martyrs. Their loving mother by her exhortations sent them, crowned before her, to receive their palms, in the persecution under the Emperor Maximian, and then was herself beheaded, and thus joyfully followed them in triumph.
      - type: text
        text: At Verona, the holy Confessor Euprepius, Bishop [of that see.]
      - type: text
        text: Likewise, the holy Bishop Quadratus.
      - type: text
        text: At Siena, in Tuscany, [in the year 1348,] the holy Abbot Bernard Tolomei, Founder of the Congregation of the Olivetans.
      la:
      - type: text
        text: Duodécimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sanctæ Ioánnæ-Francíscæ Frémiot de Chantal, Víduæ, quæ Ordinis Sanctimoniálium Visitatiónis sanctæ Maríæ fuit Institútrix, cuius natális dies Idibus Decémbris memorátur.
      - type: text
        text: Romæ, in agro Veráno, sanctæ Cyríacæ, Víduæ et Mártyris; quæ, in persecutióne Valeriáni cum se súaque ómnia in Sanctórum ministério impendísset, demum pro Christo martýrium súbiens, vitam quoque ipsam libénter impéndit.
      - type: text
        text: In território Gavalitáno sancti Priváti, Epíscopi et Mártyris; qui passus est in persecutióne Valeriáni et Galliéni.
      - type: text
        text: Salónæ, in Dalmátia, sancti Anastásii Corniculárii, qui, cum vidéret beátum Agapítum constánter torménta perferéntem, convérsus est ad fidem, et, pro confessióne nóminis Christi, iubénte Aureliáno Imperatóre, interémptus, Martyr migrávit ad Dóminum.
      - type: text
        text: In Sardínia natális sanctórum Mártyrum Luxórii, Cisélli et Cameríni; qui, in persecutióne Diocletiáni sub Délphio Prǽside gládio cæsi sunt.
      - type: text
        text: Eódem die sanctórum Mártyrum Bonósi et Maximiáni.
      - type: text
        text: Fundis, in Látio, sancti Patérni Martyris, qui ab Alexandría Romam venit ad Apostolórum memórias; et inde in agrum Fundánum secéssit, atque ibi, cum Mártyrum córpora sepelíret, a Tribúno comprehénsus est, et in vinculis expirávit.
      - type: text
        text: Edéssæ, in Sýria, sanctórum Mártyrum Bassæ, et filiórum, id est Thegónii, Agápii et Fidélis; quos, in persecutióne Maximiáni, pia mater exhórtans, martýrio coronátos præmísit ad palmam, et, truncáto cápite, gaudens secúta est cum victória.
      - type: text
        text: Verónæ sancti Euprépii, Epíscopi et Confessóris.
      - type: text
        text: Item sancti Quadráti Epíscopi.
      - type: text
        text: Arvérnis, in Gállia, sancti Sidónii Epíscopi, doctrína et sanctitáte conspícui.
      - type: text
        text: Senis in Túscia beáti Bernárdi Ptolomǽi Abbátis, Congregatiónis Olivetánæ Fundatóris.
  psalm.duodecimo-kalendas-aprilis-ce5f428457:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of March, were born to the better life:'
      - type: text
        text: ''
      - type: text
        text: At Monte Cassino, the holy Abbot Benedict, who restored Monasticism in the West, when it was almost fallen away, and wonderfully spread it [, in the year 543]. Blessed Pope Gregory hath written his life, which was rendered glorious by his graces and miracles.
      - type: text
        text: At Alexandria, are commemorated those holy martyrs who were massacred when the Arians and Gentiles broke into the churches on Good Friday, under the Emperor Constantius and the Prefect Philagrius.
      - type: text
        text: On the same day, [in the end of fourth century,] the holy martyrs Philemon and Domninus.
      - type: text
        text: At Catanae holy Birillus, who was ordained Bishop of that see by the blessed Apostle Peter, and after he had converted many Gentiles to the faith fell asleep in peace in extreme old age.
      - type: text
        text: At Alexandria, the blessed Hermit Serapion, Bishop of Thmuis, a man of great power, who was driven into exile by the rage of the Arians, and there passed away to be ever with the Lord.
      - type: text
        text: In the country of Lyon, holy Lupicinus, Abbot [of Laucorme, in the Jura,] whose life was made illustrious by the fame of his holiness and miracles [, in the year 480].
      la:
      - type: text
        text: Duodecimo Kalendas Aprilis
      - type: text
        text: ''
      - type: text
        text: In monte Cassíno natális sancti Benedicti Abbátis, qui in Occidénte fere collapsam Monachórum disciplínam restituit ac mirifice propagávit; cuius vitam, virtútibus et miraculis gloriosam, beátus Gregórius Papa conscripsit.
      - type: text
        text: Cátanæ, in Sicília, sancti Birilli, qui, a beato Petro ordinátus Epíscopus, ibidem, cum multos Gentílium convertísset ad fidem, in ultima senectute quievit in pace.
      - type: text
        text: Alexandríæ commemorátio sanctórum Mártyrum, qui, sub Constantio Imperatóre et Præfecto Philagrio, irruéntibus Ariánis et Gentilibus in Ecclésias, in die Parascéves cæsi sunt.
      - type: text
        text: Eodem die sanctórum Mártyrum Philémonis et Domníni.
      - type: text
        text: Alexandríæ beáti Serapiónis, Anachoretæ et Epíscopi Thmúeos, magnárum virtútum viri; qui, Arianórum furóre in exsílium actus, Conféssor migrávit ad Dóminum.
      - type: text
        text: In território Lugdunénsi sancti Lupicini Abbátis, cuius vita ob sanctitátis et miraculórum glóriam fuit illústris.
      - type: text
        text: In loco Ranft, prope Sachseln, in Helvetia, sancti Nicolai de Flüe, patris familias, dein Anachoretæ, arctíssima pæniténtia et mundi contemptu insignis, ab Helvetiis pater patriæ appellati, quem Pius Papa Duodecimus Sanctórum fastis adscripsit.
  psalm.idibus-apr-lis-6a9d45b6d8:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 13th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Seville, in Spain, the holy martyr Hermenegild, son of Leovigild, the Arian king of the Visigoths. His misbelieving father had cast him into prison on account of his confession of the Catholic Faith, and when upon the solemn night of Easter he refused to receive Easter Communion from the Arian Bishop he caused him to be smitten with the axe, and so did this king as a martyr exchange a kingdom on earth for the kingdom of heaven, [in the year 586.]
      - type: text
        text: At Pergamos, in Asia, the holy martyrs Carpus, Bishop of Thyatira, the Deacon Papylus, the excellent lady Agathonica his sister, their servant Agathodorus, and many others, who were diversely tormented, and crowned with martyrdom after blessed confessions, in the persecution under the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus. [More likely under Decius in the year 251.]
      - type: text
        text: In the same persecution there suffered at Rome the holy martyr Justin, the admirable philosopher. He had presented to the emperors aforenamed his second book in defence of our religion, and was then earnestly spreading the same by his disputations when he was accused of Christianity through the devices of Crescens the Cynic, whose infamous life and manners he had rebuked, and for a reward of his faithful speaking he received the crown of martyrdom, [in the year 167.] We keep his feast upon the 14th day of this present month.
      - type: text
        text: Upon the same day, in the persecution under the Emperor Diocletian, the holy martyrs Maximus, Quintilian, and Dadas, [at Dorostis, in Bulgaria.]
      - type: text
        text: At Ravenna, the holy Confessor Ursus, Bishop of that see, [in the year 396.]
      la:
      - type: text
        text: Idibus Aprílis
      - type: text
        text: ''
      - type: text
        text: Híspali, in Hispánia, sancti Hermenegíldi Mártyris, qui fuit fílius Leovigíldi, Regis Visigothórum Ariáni; atque ob cathólicæ fídei confessiónem coniéctus in cárcerem, et, cum in solemnitáte Pascháli Communiónem ab Epíscopo Ariáno accípere noluísset, pérfidi patris iussu secúri percússus est, ac regnum cæléste pro terréno Rex et Martyr intrávit.
      - type: text
        text: Romæ, in persecutióne Marci Antoníni Veri et Lúcii Aurélii Cómmodi, pássio sancti Iustíni, Philósophi et Mártyris; qui, cum secúndum librum pro religiónis nostræ defensióne præfátis Imperatóribus porrexísset, eámque ibídem disputándo strénue propugnásset, Crescéntis Cýnici, cuius vitam et mores nefários redargúerat, insídiis accusátus quod Christiánus esset, remuneratiónem linguæ fidélis, martýrii munus accépit. Ipsíus tamen festum sequénti die recólitur.
      - type: text
        text: Pérgami, in Asia, in eádem persecutióne, natális sanctórum Mártyrum Carpi, Thyatirénsis Epíscopi; Pápyli Diáconi, et Agathonícæ, eiúsdem Pápyli soróris et óptimæ féminæ, atque Agathodóri, eórum fámuli, aliorúmque multórum. Hi omnes, post vários cruciátus, pro beátis confessiónibus martýrio coronáti sunt.
      - type: text
        text: Doróstori, in Mýsia inferióre, pássio sanctórum Máximi, Quinctiliáni et Dadæ, in persecutióne Diocletiáni.
      - type: text
        text: Ravénnæ sancti Ursi, Epíscopi et Confessóris.
  psalm.idibus-aug-sti-f23d4da6c0:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 13th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 258,] the blessed martyr Hippolytus. Such was the glory of his confession, under the Emperor Valerian, that after other torments his feet were tied to the necks of unbroken horses, and he was thus cruelly dragged through thistles and thorns until his whole body was torn and he gave up the ghost.
      - type: text
        text: Upon the same day there suffered his nurse, the blessed Concordia, who was beaten to death with scourges loaded with lead, and passed away.
      - type: text
        text: At Imola, [in the fourth century,] the holy martyr Cassian. When he refused to worship idols the persecutors called for the boys to whom he had become hateful while teaching them, and gave them permission to kill him, and the weaker their hands were the greater were his sufferings through the delay of death.
      - type: text
        text: At Todi, [in Umbria,] under the Emperor Diocletian, the holy martyr Cassian, Bishop [of that see.]
      - type: text
        text: At Burgos, in Spain, the holy martyrs Centolla and Helen.
      - type: text
        text: At Constantinople, [in the year 662,] the holy monk Maximus, famous for his teaching and zeal for Catholic truth. He vigorously contended against the Monothelites, and the heretical Emperor Constans cut away his hands and tongue, and banished him to the Crimea, where he gave up the ghost. At the same time the two Anastasii, his disciples, and many others, suffered diverse torments and were sent into hard banishments.
      - type: text
        text: In Germany, [in the year 747,] the holy Confessor Wigbert the Priest.
      - type: text
        text: At Poitiers, [in the year 587,] the holy Queen Radegundis, whose life was famous for miracles and graces.
      - type: text
        text: At Rome, [in the year 1621,] holy John Berchmans, a scholastic of the Society of Jesus, illustrious for the innocency of his life and his observance of the discipline of his Institute, to whom the supreme Pontiff Leo XIII decreed the honours paid to the Saints in heaven.
      la:
      - type: text
        text: Idibus Augústi
      - type: text
        text: ''
      - type: text
        text: Romæ beáti Hippólyti Mártyris, qui pro confessiónis glória, sub Valeriáno Imperatóre, post ália torménta, ligátis pédibus ad colla indomitórum equórum, per carduétum et tríbulos crudéliter tractus est, ac, toto córpore laceráto, emísit spíritum. Passi sunt étiam eódem die beáta Concórdia, eius nutrix, quæ ante ipsum, plumbátis cæsa, migrávit ad Dóminum; et álii decem et novem de domo sua, qui extra portam Tiburtínam decolláti sunt, et, una cum ipso, in agro Veráno sepúlti.
      - type: text
        text: Apud Forum Syllæ natális sancti Cassiáni Mártyris, qui cum adoráre idóla noluísset, ídeo, vocátis a persecutóre púeris, quibus exósus docéndo factus fúerat, data est eis facúltas eum periméndi; quorum quanto infírmior erat manus, tanto graviórem martýrii pœnam, diláta morte, faciébat.
      - type: text
        text: Tudérti, in Umbria, sancti Cassiáni, Epíscopi et Mártyris, sub Diocletiáno Imperatóre.
      - type: text
        text: Burgis, in Hispánia, sanctárum Centóllæ et Hélenæ Mártyrum.
      - type: text
        text: Constantinópoli sancti Máximi Abbátis, doctrína et cathólicæ veritátis zelo insígnis; qui, cum advérsus Monothelítas strénue decertáret, ab hærético Imperatóre Constánte, præcísis mánibus ac lingua, in Chersonésum relegátus est, ibíque, glória confessiónis clarus, spíritum Deo réddidit. Tunc étiam duo Anastásii, qui eius erant discípuli, aliíque plures divérsa torménta et dura exsília sunt expérti.
      - type: text
        text: Fritesláriæ, in Germánia, sancti Wigbérti, Presbýteri et Confessóris.
      - type: text
        text: Romæ natális sancti Ioánnis Berchmans, scholástici e Societáte Iesu et Confessóris, vitæ innocéntia et religiósæ disciplínæ custódia præclári; cui Leo Décimus tértius, Póntifex Máximus, cǽlitum Sanctórum honóres decrévit.
      - type: text
        text: Pictávis, in Gállia, sanctæ Radegúndis Regínæ, cuius vita miráculis et virtútibus cláruit.
  psalm.idibus-dec-mbris-c0dbbc3331:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 13th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Syracuse, in Sicily, in the persecution under the Emperor Diocletian, the holy Virgin and martyr Lucy. By command of Paschasius the Consular she was handed over to panders to make a public mock of her chastity, but when they would have led her away they could not move her even with ropes, and not even when these were drawn by many yoke of oxen then they poured upon her boiling pitch, rosin, and oil but these did not hurt her, and at length she was smitten in the neck with a sword, and so finished her testimony, (in the year 303.)
      - type: text
        text: In Armenia, in the same persecution under the Emperor Diocletian, the holy martyrs Eustratius, Auxentius, Eugenius, Mardarius, and Orestes. Eustratius was first put to dreadful torments under Lysias, and afterwards to the like at Sebaste, along with Orestes, under the President Agricolaus, and was then cast into a furnace, wherein he gave up the ghost. Orestes was laid upon an iron bed heated with fire, and so passed away to be ever with the Lord. The others finished their testimony in diverse ways in the country of the Arabraci, after enduring most cruel sufferings under the President Lysias. Their bodies were afterwards brought to Rome and honourably buried in the church of St. Apollinaris.
      - type: text
        text: In the island of Sulcis, off the coast of Sardinia, (in the second century,) under the Emperor Hadrian, the holy martyr Antiochus.
      - type: text
        text: At Cambrai, in Gaul, the holy Confessor Aubert, Bishop (of that see, and of Arras. He was consecrated on March 21, 633, and died in the year 669.)
      - type: text
        text: At Ponthieu, (in Gaul, in the year 669,) the holy Confessor Josse, (King of Brittany and hermit at Ponthieu.)
      - type: text
        text: In the country of Strasbourg, (in the eighth century,) the holy Virgin Othilia. (First Abbess of Hohenburg, of the order of St Benedict, she was daughter of a Duke of Alsace.)
      - type: text
        text: At Moulins, in Gaul, the holy widow Jeane Frances Fremiot de Chantal, (1572-1641,) foundress of the Congregation of Nuns of the Visitation of St. Mary. She was eminent by her noble birth, by the holiness of her life, which she sanctified unceasingly in the four different states of maiden, wife, widow, and nun, and by the grace of working miracles, and Clement XIII enrolled her name among those of the Saints. Her sacred body was translated to Annecy, in Savoy, and there entombed with solemn pomp in the first church of their order. Clement XIV ordered her feast to be kept by the Universal Church upon the 21st day of August.
      la:
      - type: text
        text: Idibus Decémbris
      - type: text
        text: ''
      - type: text
        text: Syracúsis, in Sicília, natális sanctæ Lúciæ, Vírginis et Mártyris, in persecutióne Diocletiáni. Hæc nóbilis Virgo, cum eam lenónes, quibus, iubénte Paschásio Consulári, trádita erat ut a pópulo castitáti eius illuderétur, dúcere vellent, nullátenus per illos movéri pótuit, nec fúnibus ádditis, nec boum iugis plúrimis; deínde vero, picem, resínam ac fervens óleum nil læsa súperans, tandem, gládio in gútture percússa, martýrium consummávit.
      - type: text
        text: Molíni, in Gállia, item natális sanctæ Ioánnæ-Francíscæ Frémiot de Chantal Víduæ, quæ Ordinis Sanctimoniálium Visitatiónis sanctæ Maríæ fuit Institútrix; ac, nobilitáte géneris, vitæ sanctimónia, quam in quadrúplici statu constánter duxit, et miraculórum dono illústris, a Cleménte Décimo tértio, Pontífice Máximo, in Sanctárum númerum reláta est. Sacrum eius corpus Annésium, in Sabáudia, translátum fuit, et solémni pompa in prima sui Ordinis Ecclésia tumulátum. Ipsíus autem festum duodécimo Kaléndas Septémbris ab univérsa Ecclésia Clemens Papa Décimus quartus celebrári mandávit.
      - type: text
        text: In Arménia pássio sanctórum Mártyrum Eustrátii, Auxéntii, Eugénii, Mardárii et Oréstis, in persecutióne Diocletiáni. Ex ipsis Eustrátius, primum sub Lýsia, deínde Sebáste, sub Agricoláo Prǽside, una cum Oréste exquisítis torméntis cruciátus, in fornácem missus réddidit spíritum; Oréstes autem, in stratum férreum ignítum pósitus, migrávit ad Dóminum; céteri apud Arábracos, sævíssimis agitáti supplíciis, sub Lýsia Prǽside, diversímode martýrium consummárunt. Eórum córpora, póstea Romam transláta, in Ecclésia sancti Apollináris honorífice collocáta sunt.
      - type: text
        text: In Sulcitána ínsula, apud Sardíniam, pássio sancti Antíochi, sub Hadriáno Imperatóre.
      - type: text
        text: Cameráci, in Gállia, sancti Authbérti, Epíscopi et Confessóris.
      - type: text
        text: In pago Pontívo, in Gállia, sancti Iudóci, Presbýteri et Confessóris.
      - type: text
        text: In território Argentoraténsi sanctæ Othíliæ Vírginis.
  psalm.idibus-febru-rii-57767577b8:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the same 13th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, the holy prophet Agabus, [first century,] of whom blessed Luke writeth in the Acts of the Apostles.
      - type: text
        text: At Ravenna, the holy women the Virgin Fusca, and Maura her fostermother, who after suffering many things under the President Quinctian, by order of the Emperor Decius were run through with the sword, and so finished their testimony, [third century.]
      - type: text
        text: At Melitina, in Armenia, the holy martyr Polyeuctus, who suffered many things in the persecution under the Emperor Decius, and received the crown of martyrdom, [in the year 259.]
      - type: text
        text: At Lyon, the holy martyr Julian.
      - type: text
        text: At Todi, [under Diocletian,] the holy martyr Benignus.
      - type: text
        text: At Rome, [in the year 731,] the holy Pope Gregory II, who sharply withstood the ungodliness of the Emperor Leo the Isaurian, and who sent holy Boniface into Germany to preach the Gospel there.
      - type: text
        text: At Angers, holy Lucinius, Bishop of that city, a man of reverend holiness.
      - type: text
        text: At Lyon, [about the year 512,] the holy Confessor Stephen, Bishop of that see.
      - type: text
        text: At Riete, [sixth century,] the holy Abbot Stephen, a man of wonderful patience, at whose passing away the presence of the holy angels, as is stated by blessed Pope Gregory, was visible.
      - type: text
        text: At Prati, in Tuscany, Catherine de Ricci, a Virgin of Florence, of the Order of Preachers, illustrious in the number of her heavenly gifts, whom Pope Benedict XIV added to the roll of Holy Virgins. She died full of graces and merit on the 2nd of February, but her Feast is celebrated today.
      la:
      - type: text
        text: Idibus Februárii
      - type: text
        text: ''
      - type: text
        text: Antiochíæ natális sancti Agábi Prophétæ, de quo beátus Lucas in Actibus Apostólicis scribit.
      - type: text
        text: Tudérti, in Umbria, sancti Benígni, Presbýteri et Mártyris; qui, Diocletiáni et Maximiáni Imperatórum témpore, cum fidem Christiánam verbo et exémplo propagáre non desísteret, ab idolórum cultóribus captus est, ac, váriis afféctus supplíciis, sacerdotále munus honóre martýrii cumulávit.
      - type: text
        text: Melitínæ, in Arménia, sancti Polyeúcti Mártyris, qui, in persecutióne Décii, multa passus, martýrii corónam adéptus est.
      - type: text
        text: Lugdúni, in Gállia, sancti Iuliáni Mártyris.
      - type: text
        text: Ravénnæ sanctárum Fuscæ Vírginis, eiúsque nutrícis Mauræ, quæ, Décio imperánte, multa sub Quinctiáno Prǽside perpéssæ, demum gládio transfíxæ, martýrium consummárunt.
      - type: text
        text: Lugdúni, in Gállia, sancti Stéphani, Epíscopi et Confessóris.
      - type: text
        text: Reáte sancti Stéphani Abbátis, miræ patiéntiæ viri; in cuius tránsitu (ut refert beátus Gregórius Papa) sancti Angeli, céteris étiam vidéntibus, adfuérunt.
  psalm.idibus-i-lii-b1edf96166:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Swithun, Bishop of Winchester, of whom mention is made upon the 2nd day of this present month of July.
      - type: citation
        text: 'Upon the same 15 th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Bamberg, the holy Emperor Henry II. He and his wife Cunegunda preserved perpetual virginity. He brought holy Stephen, king of Hungary, and nearly all his realm, to believe in Christ, [972-1029.] We keep feast in his honour upon the 21st day of this present month of July.
      - type: text
        text: At Porto, in Italy, the holy martyrs Eutropius and the sisters Zosima and Bonosa.
      - type: text
        text: At Carthage, the blessed Deacon Catulinus, in praise of whom holy Augustine preached a sermon to the people, and the holy martyrs Januarius, Florence, Julia, and Justa, who were buried in the Basilica of Faustus.
      - type: text
        text: At Alexandria, the holy martyrs Philip, Zeno, Narseus, and ten little children.
      - type: text
        text: In the island of Tenedos, the holy martyr Abudemius, who suffered under Diocletian.
      - type: text
        text: At Sebaste, the holy physician Antiochus, who was beheaded under the President Hadrian. Milk ran out of his body instead of blood, whereby Cyriacus the headsman was turned to Christ, and himself suffered martyrdom.
      - type: text
        text: At Pavia, the holy martyr Felix, Bishop [of that see, in the year 243.]
      - type: text
        text: At Nisibis, holy James, Bishop of that city, a man of great holiness, and famous for his wonders and his learning. He was one of the Confessors in the persecution under the Emperor Galerius Maximian. At the Council of Nicea, [in the year 325,] he condemned the perversity of Arius in opposing the definition that our Lord Christ is homousius that is, of one Being with the Father, and it was at the prayers of this James, and of Alexander Archbishop of Constantinople, that the same Arius received the due reward of his iniquity at Constantinople, when his bowels gushed out.
      - type: text
        text: At Naples, in Campania, holy Athanasius, Bishop of that city, who suffered much from his ungodly nephew Sergius, and was thrust out of his see.
      - type: text
        text: In the time of King Charles the Bald, [in the year 872,] he passed away from earth to heaven, worn out with sorrow, at Veroli.
      - type: text
        text: At Palermo is commemorated the finding of the body of the holy Virgin Rosalie of that city. It was found by revelation from God, in the year of the jubilee, under the Supreme Pontiff Urban VIII, and Sicily was freed from the plague. [She was of the family of Charlemagne, and was born at Palermo in 1130 and died in 1160. Her body was found in 1625, when the exposition of it caused the plague to cease at Palermo.]
      la:
      - type: text
        text: Idibus Iúlii
      - type: text
        text: ''
      - type: text
        text: Sancti Henríci Primi, Imperatóris Romanórum et Confessóris, cuius dies natális tértio Idus mensis huius recensétur.
      - type: text
        text: Lugdúni, in Gállia, deposítio sancti Bonaventúræ, Cardinális et Epíscopi Albanénsis, Confessóris et Ecclésiæ Doctóris, ex Ordine Minórum, doctrína et vitæ sanctitáte celebérrimi. Ipsíus tamen festívitas prídie huius diéi recólitur.
      - type: text
        text: Pápiæ sancti Felícis, Epíscopi et Mártyris.
      - type: text
        text: In Portu Románo natális sanctórum Mártyrum Eutrópii, atque Zósimæ et Bonósæ sorórum.
      - type: text
        text: Carthágine beáti Catulíni Diáconi, de cuius láudibus sanctus Augustínus sermónem ad pópulum hábuit, et sanctórum Ianuárii, Floréntii, Iúliæ et Iustæ Mártyrum; qui pósiti sunt in Basílica Fausti.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Philíppi, Zenónis, Narséi et decem infántum.
      - type: text
        text: In ínsula Ténedo sancti Abudémii Mártyris, qui sub Diocletiáno passus est.
      - type: text
        text: Sebáste, in Arménia, sancti Antíochi médici, qui, sub Hadriáno Prǽside, cápite obtruncátus est; cumque ex eo lac pro sánguine manáret, Cyriácus cárnifex, convérsus ad Christum, et ipse martýrium súbiit.
      - type: text
        text: Nísibi, in Mesopotámia, natális sancti Iacóbi, eiúsdem urbis Epíscopi, magnæ sanctitátis viri. Hic, miráculis et eruditióne clarus, unus fuit, sub persecutióne Galérii Maximiáni, ex número Confessórum, qui in Nicǽna deínde Sýnodo perversitátem Aríi, Homoúsii oppositióne, damnárunt; cuius et sancti Alexándri Epíscopi oratióne ipse Aríus condígnam suæ iniquitátis mercedem, effúsis viscéribus, Constantinópoli recépit.
      - type: text
        text: Neápoli, in Campánia, sancti Athanásii, eiúsdem civitátis Epíscopi, qui, ab ímpio nepóte Sérgio multa passus ac sede pulsus, tandem Vérulis, in Hérnicis, conféctus ærúmnis, migrávit in cælum, témpore Cároli Calvi.
      - type: text
        text: Campi Salentinórum, in Apúlia, sancti Pompílii Maríæ Pirrótti, Confessóris, ex Ordine Clericórum Páuperum Matris Dei Scholárum Piárum, vita apostólica præclári, a Pio Undécimo, Pontífice Máximo, inter Sanctos reláti.
      - type: text
        text: Panórmi Invéntio córporis sanctæ Rosáliæ, Vírginis Panormitánæ; quod, Urbáno Octávo Pontífice Máximo, repértum divínitus, Iubilǽi anno Sicíliam a peste liberávit.
  psalm.idibus-i-nii-e22da8a2a9:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 13th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Padua, the holy Confessor Anthony of Portugal, of the Order of Friars Minor, famous for his life, miracles, and preaching.
      - type: text
        text: At Rome, upon the Ardeatine Way, the holy Virgin martyr Felicula. She would not marry Flaccus nor sacrifice to idols, and was therefore handed over to a certain judge who, forasmuch as she remained steadfast in confessing Christ, starved her in the dark, then had her racked until she died, and thereafter threw her body into a sewer. The holy Nicomedes buried her beside the same Way.
      - type: text
        text: In Africa, the holy martyrs Fortunatus and Lucian.
      - type: text
        text: At Byblos, in Palestine, the holy Virgin martyr Aquilina, aged twelve years. In the persecution under the Emperor Diocletian and the judge Valusian, she was buffeted and beaten for her confession of the faith, and stabbed with heated awls, and lastly smitten with the sword, and so hallowed maidenhood by martyrdom.
      - type: text
        text: In the Abruzzi, the holy martyr Peregrine, Bishop [of Amiternum,] who for the Catholic faith's sake was drowned by the Lombards in the river Aterno.
      - type: text
        text: At Cordova, the holy monk and priest Fandilas, who [in the year 853] suffered martyrdom for Christ's sake by being beheaded in the persecution by the Arabs.
      - type: text
        text: In Cyprus, [in the fourth century,] holy Triphyllius, Bishop [of Nicosia.]
      la:
      - type: text
        text: Idibus Iúnii
      - type: text
        text: ''
      - type: text
        text: Patávii sancti Antónii Lusitáni, Sacerdótis ex Ordine Minórum et Confessóris, atque Ecclésiæ Doctóris, vita, et miráculis, ac prædicatióne illústris, quem, uno post illíus óbitum anno nondum expléto, Gregórius Papa Nonus in Sanctórum cánonem rétulit.
      - type: text
        text: Romæ, via Ardeatína, natális sanctæ Felículæ, Vírginis et Mártyris; quæ, nec Flacco núbere neque idólis immoláre volens, trádita est cuídam Iúdici, qui eam in confessióne Christi perseverántem, post tenebricósam custódiam et famis inédiam, támdiu fecit in equúleo torquéri, donec illa emítteret spíritum, et sic demum depóni et in cloácam præcipitári. Ipsíus vero corpus, inde extráctum, sanctus Nicomédes Présbyter eádem via sepelívit.
      - type: text
        text: In Pelígnis sancti Peregríni, Epíscopi et Mártyris, qui, pro fide cathólica, a Longobárdis in Atérnum flumen demérsus est.
      - type: text
        text: Córdubæ, in Hispánia, sancti Fándilæ, Presbýteri et Mónachi; qui, in persecutióne Arábica, amputáto cápite, pro Christi fide martýrium súbiit.
      - type: text
        text: In Africa sanctórum Mártyrum Fortunáti et Luciáni.
      - type: text
        text: Bybli, in Phœnícia, sanctæ Aquilínæ, Vírginis et Mártyris, quæ, annos duódecim nata, sub Diocletiáno Imperatóre et Volusiáno Iúdice, ob fídei confessiónem cólaphis et verbéribus cæsa, et súbulis candéntibus perforáta, demum, percússa gládio, virginitátem martýrio consecrávit.
      - type: text
        text: In Cypro sancti Triphýlii Epíscopi.
  psalm.idibus-ianu-rii-1570530629:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Octave of the Epiphany of the Lord.
      - type: citation
        text: 'Upon the same 13th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Lavican Way, forty holy soldiers who earned crowns of martyrdom for confessing the true faith under the Emperor Gallienus.
      - type: text
        text: In Sardinia, the holy martyr Potitus, who suffered many things under the Emperor Antoninus and the President Gelasius, and at last was martyred with the sword.
      - type: text
        text: At Semenden, in Upper Mysia, the holy martyrs Hermylus and Stratonicus, who were cruelly tortured under the Emperor Licinius, and then drowned in the Danube.
      - type: text
        text: At Cordova, (in the year 852,) the holy martyrs Gumesindus the Priest and Servant-of-God the monk.
      - type: text
        text: At Poitiers, in Gaul, the holy Confessor Hilary, Bishop of that see.
      - type: text
        text: He was a stalwart champion of the Catholic faith, for the which cause he was banished for four years into Phrygia. Among other miracles which he wrought he raised a dead man to life, (about the year 369.) The Supreme Pontiff Pius IX confirmed and published his title of Doctor of the Universal Church. We keep his feast upon the morrow.
      - type: text
        text: At Caesarea, in Cappadocia, holy Leontius, Bishop of that see, who contended manfully against the Gentiles under the Emperor Licinius, and against the Arians under the Emperor Constantine.
      - type: text
        text: At Trier, (in the year 335,) holy Agritius, Bishop of that see.
      - type: text
        text: In the monastery of Vergy, the holy Confessor Viventius, (about the year 400.)
      - type: text
        text: At Amasea, (in the year 324,) in Pontus, the holy Virgin Glaphyra.
      - type: text
        text: At Milan, (in the year 1497,) in the monastery of St. Martha, the blessed Virgin Veronica of Binasco, of the Order of St. Augustine.
      la:
      - type: text
        text: Idibus Ianuárii
      - type: text
        text: ''
      - type: text
        text: Commemorátio Baptismátis Dómini nostri Iesu Christi.
      - type: text
        text: Pictávis, in Gállia, natális sancti Hilárii, Epíscopi et Confessóris; qui, ob cathólicam fidem, quam strénue propugnávit, quadriénnio apud Phrýgiam relegátus, ibi, inter ália mirácula, mortúum suscitávit. Eum Pius Nonus, Póntifex Máximus, universális Ecclésiæ Doctórem declarávit et confirmávit. Ipsíus autem festum sequénti die celebrátur.
      - type: text
        text: Rhemis, in Gállia, item natális sancti Remígii, Epíscopi et Confessóris. Hic gentem Francórum convértit ad Christum, Clodóveo, ipsórum Rege, sacris baptismátis undis et fídei sacraméntis initiáto; et, cum annos plúrimos in Episcopátu explésset, sanctitáte et miraculórum glória conspícuus, decéssit e vita. Eius vero festívitas Kaléndis Octóbris potíssimum recólitur, quo die sacrum ipsíus corpus translátum fuit.
      - type: text
        text: Romæ, via Lavicána, corónæ sanctórum Mílitum quadragínta, quas ipsi, sub Galliéno Imperatóre, pro veræ fídei confessióne percípere meruérunt.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Gumesíndi Presbýteri, et Servidéi Mónachi.
      - type: text
        text: In Sardínia sancti Potíti Mártyris, qui, sub Antoníno Imperatóre et Gelásio Prǽside, multa passus, demum gládio martýrium consecútus est.
      - type: text
        text: Singidóni, in Mýsia superióre, sanctórum Mártyrum Hérmyli et Stratoníci, qui, post sæva torménta, sub Licínio Imperatóre, in Istrum flumen demérsi sunt.
      - type: text
        text: Cæsaréæ, in Cappadócia, sancti Leóntii Epíscopi, qui, sub Licínio, advérsus Gentíles, et, sub Constantíno, advérsus Ariános plúrimum decertávit.
      - type: text
        text: Tréviris sancti Agrítii Epíscopi.
      - type: text
        text: In Versíaco monastério, in Gállia, sancti Vivéntii Confessóris.
      - type: text
        text: Amaséæ, in Ponto, sanctæ Gláphyræ Vírginis.
      - type: text
        text: Medioláni, in cœnóbio sanctæ Marthæ, Beátæ Verónicæ de Binásco Vírginis, ex Ordine sancti Augustíni.
  psalm.idibus-m-rtii-a646dc2e8f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 15th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Caesarea, in Cappadocia, the holy martyr Longinus, who is said to have been the soldier who pierced the Lord's side with a spear.
      - type: text
        text: Upon the same day, holy Aristobulus, the disciple of the Apostles, who when the work of his preaching was done, suffered martyrdom.
      - type: text
        text: At Thessalonica, holy Matrona. She was a slave, belonging to a certain Jewess. She was a Christian in secret, and went to the church every day for private prayer. Her mistress found this. She afflicted her in many ways, and at last caused her to be cudgelled, until, still confessing Christ, she gave up her pure spirit to God, [probably about the year 800.]
      - type: text
        text: On the same day, the holy martyr Menignus, a fuller, who suffered under the Emperor Decius.
      - type: text
        text: In Egypt, the holy martyr Nicander, who would make careful search for the relics of holy martyrs, and earned to become a martyr himself under the Emperor Diocletian.
      - type: text
        text: At Cordova, the holy Virgin and martyr Leocritia, [in the year 880.]
      - type: text
        text: At Rome, holy Pope Zachary, who governed the Church of God with all watchfulness, and fell asleep in peace, famous for good works, [in the year 752.]
      - type: text
        text: At Riete, holy Probus, Bishop of that see, at whose death, [in the year 570,] the martyrs Juvenal and Eleutherius were present.
      - type: text
        text: At Rome, [in the sixth century,] the holy [Benedictine] monk, [at Terracina,] Speciosus, whose soul his brother saw being borne heavenward.
      la:
      - type: text
        text: Idibus Mártii
      - type: text
        text: ''
      - type: text
        text: Cæsaréæ, in Cappadócia, pássio sancti Longíni mílitis, qui Dómini latus láncea perforásse perhibétur.
      - type: text
        text: Eódem die natális sancti Aristobúli, Apostolórum discípuli, qui, cursu prædicatiónis perácto, martýrium consummávit.
      - type: text
        text: In Hellespónto sancti Menígni fullónis, qui sub Décio Imperatóre passus est.
      - type: text
        text: In Ægýpto sancti Nicándri Mártyris, qui, cum sanctórum Mártyrum relíquias studióse perquíreret, et ipse méruit éffici Martyr, sub Diocletiáno Imperatóre.
      - type: text
        text: Córdubæ, in Hispánia, sanctæ Leocrítiæ, Vírginis et Mártyris; quæ ob Christi fidem, in persecutióne Arábica, divérsis cruciátibus afflícta et gládio decolláta est.
      - type: text
        text: Thessalonícæ sanctæ Matrónæ, quæ, cum esset ancílla cuiúsdam Iudǽæ, et occúlte Christum cóleret, ac furtívis oratiónibus quotídie Ecclésiam frequentáret, a dómina sua est deprehénsa et multiplíciter afflícta, atque novíssime, robústis fústibus usque ad mortem cæsa, in confessióne Christi, incorrúptum Deo spíritum réddidit.
      - type: text
        text: Reáte sancti Probi Epíscopi, cui moriénti Iuvenális et Eleuthérius Mártyres adfuérunt.
      - type: text
        text: Vindobónæ, in Austria, sancti Cleméntis-Maríæ Hofbauer, Sacerdótis proféssi Congregatiónis a sanctíssimo Redemptóre nuncupátæ, plúrimis in Dei glória et animárum salúte promovénda ac dilatánda ipsa Congregatióne exantlátis labóribus insígnis; quem, virtútibus et miráculis clarum, Pius Décimus, Póntifex Máximus, in Sanctórum cánonem rétulit.
      - type: text
        text: Apud Cápuam sancti Speciósi Mónachi, cuius ánimam (ut scribit beátus Gregórius Papa) germánus eius deférri vidit in cælum.
      - type: text
        text: Lutétiæ Parisiórum sanctæ Ludovícæ de Marillac, víduæ Le Gras, Societátis Puellárum a Caritáte una cum sancto Vincéntio a Paulo Fundatrícis, egénis sublevándis addictíssimæ, quam Pius Papa Undécimus Sanctárum fastis accénsuit.
  psalm.idibus-maii-e650874247:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 15th day of May
      - type: text
        text: ''
      - type: text
        text: In Spain are commemorated the holy Bishops Torquatus, Ctesiphon, Secundus, Indaletius, Caecilius, Hesychius, and Euphratius. They were ordained at Rome by the holy Apostles, and sent to preach the Word of God in Spain. They evangelised diverse cities, and brought countless multitudes into the obedience of the faith of Christ, and fell asleep each in a different place in that land. Torquatus at Cadiz, Ctesiphon at Vierco, Secundus at Avila, Indaletius at Portilla, Caecilius at Elvira, Hesychius at Gibraltar, and Euphratius at Andujar.
      - type: text
        text: At Evora, in Portugal, [in the sixth century,] the holy martyr Mancius.
      - type: citation
        text: 'In the island of Chios, [in the year 251,] was born into the better life: the blessed martyr Isidore, whose church there is a well into the which he is said to have been cast, of the water whereof the sick oftentimes drink and are healed.'
      - type: text
        text: At Lampsacus, on the Hellespont, [in the persecution under the Emperor Decius,] suffered the holy martyrs Peter, Andrew, Paul, and Dionysia.
      - type: text
        text: At Faustina, in Sardinia, the holy martyr Simplicius, Bishop [of that see,] who was thrust through with a lance, under the President Barbaros, in the time of the Emperor Diocletian, and so finished his testimony.
      - type: text
        text: At Clermont, in Auvergne, [in the first century,] the holy martyrs Cassius, Victorinus, Maximus, and their Companions.
      - type: text
        text: In Brabant, the holy Virgin and martyr Dymphna, daughter of a King of Ireland, who was beheaded by order of her own father on account of her belief in Christ, and her holding to her virginity.
      la:
      - type: text
        text: Idibus Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis Baptístæ de La Salle, Presbýteri et Confessóris, qui Sodalitátis Fratrum Scholárum Christianárum fuit Institútor, ac séptimo Idus Aprílis obdormívit in Dómino.
      - type: text
        text: In Hispánia sanctórum Torquáti, Ctesiphóntis, Secúndi, Indalétii, Cæcílii, Hesýchii et Euphrásii; qui Romæ a sanctis Apóstolis Epíscopi ordináti, et ad prædicándum verbum Dei in Hispánias dirécti sunt. Cum autem hi váriis úrbibus evangelizássent, et innúmeras multitúdines ad Christi fidem perduxíssent, divérsis in ea província locis quievérunt; scílicet Torquátus Acci, Ctésiphon Vérgii, Secúndus Abulæ, Indalétius Urci, Cæcílius Illíberi, Hesýchius Cartéiæ et Euphrásius Illitúrgi.
      - type: text
        text: Fausínæ, in Sardínia, sancti Simplícii, Epíscopi et Mártyris, qui, Diocletiáni témpore, sub Bárbaro Prǽside, perfóssus láncea martýrium consummávit.
      - type: text
        text: Eboræ, in Lusitánia, sancti Máncii Mártyris.
      - type: text
        text: In ínsula Chio natális beáti Isidóri Mártyris, in cuius Basílica exstat púteus, in quem fertur fuísse iniéctus, de cuius aqua infírmi potáti sǽpius sanántur.
      - type: text
        text: Lámpsaci, in Hellespónto, pássio sanctórum Petri, Andréæ, Pauli et Dionýsiæ.
      - type: text
        text: Arvérnis, in Gállia, sanctórum Mártyrum Cássii, Victoríni, Máximi et Sociórum.
      - type: text
        text: Ghelæ, in Brabántia, sanctæ Dympnæ, Vírginis et Mártyris, fíliæ Regis Hibernórum; quæ, cum in fide Christi et virginitáte servánda permanéret immóbilis, a patre iussa est decollári.
  psalm.idibus-nov-mbris-5e979a1256:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the morrow we keep the feast of the holy Confessor Diego, of the Order of Friars Minor, who was born into the better life upon this present day.
      - type: citation
        text: 'Upon the same 13th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Ravenna, the holy martyrs Valentine, Solutor, and Victor, who suffered in the persecution under Diocletian.
      - type: text
        text: At Aix, in Provence, (in the year 304,) that illustrious martyr the blessed Mitrius.
      - type: text
        text: At Caesarea, in Palestine, (in the year 308,) in the persecution under the Emperor Galerius Maximian, the holy martyrs Antonine, Zebinas, German, and the Virgin Ennatha. Ennatha was flogged and then burnt, and the men were beheaded because they openly rebuked the President Firmilian for his wickedness in offering sacrifice to the gods.
      - type: text
        text: In Africa, (in the year 437,) the holy martyrs Arcadius, Paschasius, Probus, and Eutychian. These were all Spaniards who, during the persecution under the Vandals, could no wise be brought to turn aside unto the Arian misbelief. For this cause the Arian king Genseric first proscribed them, then banished them, afterwards tormented them with terrible sufferings, and lastly put them to death in diverse ways. Then also became glorious the faithfulness of the little lad, Paulillus, the brother of holy Paschasius and Eutychian, and as he would not give up the Catholic faith, he was cudgelled for a long time and condemned to the lowest bondage.
      - type: text
        text: At Rome, holy Pope Nicholas the Great, eminent for his Apostolic vigour. (He reigned from April 28, 858 to November 13, 867. He was the 107th Pope.)
      - type: text
        text: At Tours, (in the year 444,) holy Brice, Bishop of that see, a disciple of the blessed Bishop Martin.
      - type: text
        text: At Toledo, (in the year 658,) holy Eugene, Bishop (of that see.)
      - type: text
        text: In Auvergne, (in the year 527,) holy Quintian, Bishop (of Rodez and of Clermont.)
      - type: text
        text: At Cremona, the holy Confessor Homobuono, who was famous for miracles, and whose name Innocent III enrolled among those of the Saints.
      la:
      - type: text
        text: Idibus Novémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Dídaci, ex Ordine Minórum, Confessóris; cuius dies natális recólitur prídie huius diéi.
      - type: text
        text: Ravénnæ natális sanctórum Mártyrum Valentíni, Solutóris et Victóris; qui sub Diocletiáno Imperatóre passi sunt.
      - type: text
        text: Aquis, in província Narbonénsi, beáti Mítrii, claríssimi Mártyris.
      - type: text
        text: Cæsaréæ, in Palæstína, pássio sanctórum Antoníni, Zébinæ, Germáni et Ennathæ Vírginis. Hæc, sub Galério Maximiáno Imperatóre, verbéribus cæsa, igne cremáta est; illi vero, cum intrépidi ac líbera voce Firmiliánum Prǽsidem, diis immolántem, impietátis argúerent, cápite cæsi sunt.
      - type: text
        text: In Africa sanctórum Mártyrum Hispanórum Arcádii, Paschásii, Probi et Eutychiáni; qui, in persecutióne Wandálica, cum in Ariánam perfídiam nullátenus declináre pateréntur, hinc a Genseríco, Rege Ariáno, primum proscrípti, deínde acti in exsílium atque atrocíssimis supplíciis cruciáti, postrémum divérso mortis génere interémpti sunt. Tunc et Paulílli puéruli, germáni sanctórum Paschásii et Eutychiáni, constántia enítuit; qui, cum de fide cathólica nullátenus posset avélli, fústibus diu cæsus est, atque ad ínfimam servitútem damnátus.
      - type: text
        text: Romæ sancti Nicolái Papæ Primi, vigóre apostólico præstántis.
      - type: text
        text: Turónis, in Gállia, sancti Brítii Epíscopi, qui fuit discípulus beáti Martíni Epíscopi.
      - type: text
        text: Toléti, in Hispánia, sancti Eugénii Epíscopi.
      - type: text
        text: Arvérnis, in Gállia, sancti Quinctiáni Epíscopi.
      - type: text
        text: Cremónæ, in Insúbria, sancti Homobóni Confessóris; quem, miráculis clarum, Innocéntius Papa Tértius in Sanctórum númerum rétulit.
  psalm.idibus-oct-bris-90db0fba9b:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 15th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Avila, in Spain, the holy Virgin Theresa, the mother and mistress of the brethren and sisters of the Order of Carmelites of the Stricter Observance.
      - type: text
        text: At Rome, upon the Aurelian Way, the holy martyr Fortunatus.
      - type: text
        text: At Cologne, three hundred holy martyrs, who finished the course of their contending in the persecution under Maximian.
      - type: text
        text: At Carthage, the holy martyr Agileus, on whose feast - day holy Augustine preached to the people a discourse concerning him.
      - type: text
        text: In Prussia, (at the beginning of the eleventh century,) the holy martyr Bruno, Bishop of the Ruthenians, who was preaching the gospel in those parts when he was taken by wicked men, who cut off, first his hands and feet, and then his head.
      - type: text
        text: At Lyon, (in the fourth century,) holy Antiochus, Bishop (of that see,) who vigorously administered the office of the bishopric to which he had been called, and inherited a kingdom in heaven.
      - type: text
        text: At Trier, (in the fifth century,) the holy Confessor Severus, Bishop (of that see.)
      - type: text
        text: At Strasbourg, (in the year 1027,) the holy Virgin Aurelia.
      - type: text
        text: At Cracow, holy Iadwiga, Grand Princess of Poland, who gave herself up to the serving of the poor, and was famous ever for miracles. Pope Clement IV enrolled her name among those of the Saints, and Innocent XI sanctioned her festival for the 17th day of this present month of October.
      - type: text
        text: In Germany, (in the eighth century,) holy Thecla, Abbess (of Kitzingen.)
      la:
      - type: text
        text: Idibus Octóbris
      - type: text
        text: ''
      - type: text
        text: Albæ, in Hispánia, sanctæ Terésiæ Vírginis, quæ Fratrum ac Sorórum Ordinis Carmelitárum arctióris observántiæ mater éxstitit et magístra.
      - type: text
        text: Cracóviæ, in Polónia, natális sanctæ Hedwígis Víduæ, Polonórum Ducíssæ, quæ, páuperum obséquio dédita, étiam miráculis cláruit; et a Cleménte Quarto, Pontífice Máximo, Sanctórum número adscrípta est. Ipsíus autem festívitas sequénti die celebrátur.
      - type: text
        text: Romæ, via Aurélia, sancti Fortunáti Mártyris.
      - type: text
        text: In Borússia sancti Brunónis, Epíscopi Ruthenórum et Mártyris; qui, Evangélium in ea regióne prǽdicans, ab ímpiis tentus est, ac, mánibus pedibúsque præcísis, cápite truncátus.
      - type: text
        text: Apud Colóniam Agrippínam natális sanctórum trecentórum Mártyrum, qui, in Maximiáni persecutióne, cursum sui agónis complevérunt.
      - type: text
        text: Carthágine sancti Agiléi Mártyris, in cuius die natáli sanctus Augustínus tractátum de ipso ad pópulum hábuit.
      - type: text
        text: Lugdúni, in Gállia, sancti Antíochi Epíscopi, qui, strénue administráto Pontificii cúlmine ad quod assúmptus fúerat, regnum cæléste adéptus est.
      - type: text
        text: Tréviris sancti Sevéri, Epíscopi et Confessóris.
      - type: text
        text: Argentoráti sanctæ Auréliæ Vírginis.
      - type: text
        text: In Germánia sanctæ Theclæ, Abbatíssæ et Vírginis, quæ, monastériis Kitzíngæ et Ochsenfúrti præpósita, multis cumuláta méritis in cælum migrávit.
  psalm.idibus-sept-mbris-053e467862:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 13th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, the blessed Philip, father of the holy Virgin Eugenia. He resigned the dignity of Prefect of Egypt, and received the grace of baptism, and while he was in prayer Terentius, who had succeeded him as Prefect, caused him to be slain with the sword.
      - type: text
        text: Likewise the holy martyrs Macrobius and Julian, who suffered under Licinius.
      - type: text
        text: Upon the same day suffered the holy martyr Ligorius, who was slain by the Gentiles for Christ's faith's sake while he was dwelling in the desert.
      - type: text
        text: At Alexandria, (in the seventh century,) the holy Confessor Eulogius, Pope (of that see,) famous for his teaching and holiness.
      - type: text
        text: At Angers, in Gaul, (in the fifth century,) the holy Confessor Mauritius, Bishop (of that see,) famous for countless miracles.
      - type: text
        text: At Sens, (in the seventh century,) the holy Confessor Aime, Bishop (of that see.) On the same day, (in the fifth century,) the holy Confessor Venerius, a man of marvellous holiness, who dwelt as an hermit in the island of Palmaria.
      - type: text
        text: In the monastery of Remiremont, in Gaul, (in the seventh century,) the holy Abbot Aimé, a Priest famous for his graces of self-denial and of wonder-working.
      la:
      - type: text
        text: Idibus Septémbris
      - type: text
        text: ''
      - type: text
        text: Alexandríæ natális beáti Philíppi, patris sanctæ Eugéniæ Vírginis. Hic, dignitátem Præfectúræ Ægýpti déserens, Baptismátis grátiam assecútus est; quem, in oratióne constitútum, iussit Teréntius Præféctus, eius succéssor, gládio iugulári.
      - type: text
        text: Item sanctórum Mártyrum Macróbii et Iuliáni, qui sub Licínio passi sunt.
      - type: text
        text: Eódem die sancti Ligórii Mártyris, qui a Gentílibus, in erémo degens, ob Christi fidem necátus est.
      - type: text
        text: Alexandríæ sancti Eulógii Epíscopi, doctrína et sanctitáte célebris.
      - type: text
        text: Andégavi, in Gállia, sancti Maurílii Epíscopi, qui innúmeris miráculis cláruit.
      - type: text
        text: Apud Sénonas sancti Amáti, Epíscopi et Confessóris.
      - type: text
        text: In monastério Romárico, in Gállia, sancti Amáti, Presbýteri et Abbátis, abstinéntia et miraculórum dono illústris.
      - type: text
        text: Ipso die sancti Venérii Confessóris, admirándæ sanctitátis viri, qui in ínsula Palmária vitam eremíticam duxit.
  psalm.kal-ndas-oct-bris-8970329cdb:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the same 1st day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Confessor Remy, (15th) Archbishop of Reims, in Gaul, who converted the French nation to Christ, baptized their king Chlodwig, and administered to him the Sacraments of the faith. Remy passed many years in his labors as Bishop, and was famous for his holiness and for the power of working miracles. He died upon the 13th day of January, (in the year 533,) but his feast is kept upon the 1st day of October, which is that of the translation of his sacred body.
      - type: text
        text: At Rome, the blessed martyrs Aretas, (in the year 852,) and five hundred and four others.
      - type: text
        text: At Tomi, in Pontus, the holy martyrs Priscus, Crescens, and Evagrius.
      - type: text
        text: At Lisbon, in Portugal, the holy martyrs Verissimus and his sisters Maxima and Julia, who suffered in the persecution under the Emperor Diocletian.
      - type: text
        text: At Tournai, in Hainaut, the holy martyr Piaton, a Priest, who came from Rome to Gaul to preach along with the blessed Quinctinus and his Companions, and afterwards finished his testimony by martyrdom, in the persecution under the Emperor Maximian, and so passed away to be ever with the Lord.
      - type: text
        text: At Thessalonica, under the same Emperor Maximian, the holy martyr Domninus.
      - type: text
        text: At Gent, the holy Confessor Bavo, (in the seventh century.)
      - type: text
        text: At Orvieto, the holy Priest and Confessor Severus.
      la:
      - type: text
        text: Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Sancti Remígii, Epíscopi Rheménsis et Confessóris, qui Idibus Ianuárii obdormívit in Dómino, sed hac die, ob Translatiónem córporis eius, potíssimum cólitur.
      - type: text
        text: Romæ beáti Arétæ Mártyris et aliórum quingentórum quátuor.
      - type: text
        text: Tomis in Ponto sanctórum Mártyrum Prisci, Crescéntis, et Evágrii.
      - type: text
        text: Ulyssipóne in Lusitánia sanctórum Mártyrum Veríssimi, Máximæ et Iúliæ sorórum eius, qui in persecutióne Diocletiáni passi sunt.
      - type: text
        text: Tornáci sancti Piatonis Presbýteri et Mártyris, qui cum beáto Quinctíno eiúsque Sóciis ab urbe Roma in Gálliam prædicatiónis causa perréxit, ac póstea in persecutióne Maximiáni consummáto martýrio migrávit ad Dóminum.
      - type: text
        text: Thessalonícæ sancti Domníni Mártyris, sub eódem Maximiáno.
      - type: text
        text: Urbe Véteri sancti Sevéri Presbýteri et Confessóris.
      - type: text
        text: In Portu Gandæ sancti Bavónis Confessóris.
  psalm.kal-ndis-apr-lis-06bd2253c2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 1st day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Theodora, sister of the great martyr Hermes.
      - type: text
        text: She suffered by order of the judge Aurelian, under the Emperor Hadrian, and is buried beside her brother upon the Salarian Way, not far from the city.
      - type: text
        text: On the same day, the holy martyr Venantius, Bishop of Toledo.
      - type: text
        text: In Egypt, the holy martyrs Victor and Stephen.
      - type: text
        text: In Armenia, the holy martyrs Quintian and Irenaeus.
      - type: text
        text: At Constantinople, [about the year 830,] the holy Confessor Macarius, who died in exile, under the Emperor Leo, because of his defence of holy images.
      - type: text
        text: At Grenoble, holy Hew, [born 1053, died 1132,] Bishop of that see, who passed the latter part of his life, even for many years, in the wilderness, and passed away, famous for miracles, to be ever with the Lord.
      - type: text
        text: At Amiens, the holy Abbot Valery, at whose grave miracles are oftentimes wrought. [Monk of Luxeuil, and first Abbot of Leuconais, in the year 619.]
      la:
      - type: text
        text: Kaléndis Aprílis
      - type: text
        text: ''
      - type: text
        text: Romæ pássio sanctæ Theodóræ, soróris illustríssimi Mártyris Hermétis, quæ, sub Hadriáno Imperatóre, ab Aureliáno Iúdice affecta martýrio, sepúlta est iuxta fratrem suum, via Salária, non longe ab Urbe.
      - type: text
        text: Eódem die sancti Venántii, Epíscopi et Mártyris.
      - type: text
        text: In Ægýpto sanctórum Mártyrum Victóris et Stéphani.
      - type: text
        text: In Arménia sanctórum Mártyrum Quinctiáni et Irenǽi.
      - type: text
        text: Constantinópoli sancti Macárii Confessóris, qui, sub Leóne Imperatóre, pro assertióne sanctárum Imáginum, in exsílio vitam finívit.
      - type: text
        text: Ardpatrícii, in Momónia Hibérniæ província, sancti Celsi Epíscopi, qui beátum Malachíam in Episcopátu præcéssit.
      - type: text
        text: Gratianópoli, in Gállia, sancti Hugónis Epíscopi, qui multis annis in solitúdine vitam exégit, et miraculórum glória clarus migrávit ad Dóminum.
      - type: text
        text: Apud Ambiánum, in Gállia, sancti Waleríci Abbátis, cuius sepúlcrum crebris miráculis illustrátur.
  psalm.kal-ndis-aug-sti-78426b0c7a:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 1st day of August
      - type: text
        text: ''
      - type: text
        text: Commemorated the dedication of the Church of St. Peter-in-Chains, upon the Esquiline Mount at Rome.
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: At Antioch, the seven holy Maccabee brethren and their mother, who suffered under King Antiochus Epiphanes. Their relics have been brought to Rome and buried in the aforesaid Church of St. Peter-in-Chains.
      - type: text
        text: At Rome, [in the year 137,] the holy Virgins, Faith, Hope, and Charity, [daughters of St. Sophia, who is named under September 30,] who gained the crown of martyrdom under the Emperor Hadrian.
      - type: text
        text: Likewise at Rome, upon the Latin Way, [in the third century,] the holy martyrs Bonus the Priest, Faustus, and Maurus, and nine others, of whom it is written in the Acts of holy Pope Stephen.
      - type: text
        text: At Philadelphia, in Arabia, the holy martyrs Cyril, Aquila, Peter, Domitian, Rufus, and Menander, who were all crowned upon one and the same day.
      - type: text
        text: At Perge, in Pamphylia, [in the fourth century,] the holy martyrs Leontius, Attius, Alexander, and six other husbandmen, who were beheaded under the President Flavian in the persecution under the Emperor Diocletian.
      - type: text
        text: At Gerona, in Spain, [in the year 304,] the holy martyr Felix, who after torments of diverse kinds was ordered by the Emperor Dacian to be mangled until he gave up his unconquered spirit to Christ.
      - type: text
        text: At Vercelli, [in the year 370,] the holy martyr Eusebius, Bishop of that city, who was banished by the Emperor Constantius, first to Bethshan and then into Cappadocia, on account of his confession of the Catholic faith, but at length returned unto his own Church. He suffered [a living] martyrdom under the persecution of the Arians. His memory is chiefly kept upon the 15th day of December, which is that of his ordination as Bishop.
      - type: text
        text: At Paris, [in the year 287,] the holy martyr Justinus.
      - type: text
        text: At Vienne, [in the year 136,] holy Verus, [fifth] Bishop [of that see.]
      - type: text
        text: At Winchester, in England, [in the year 984,] holy Ethelwold, Bishop [of Winchester, and Confessor.]
      - type: text
        text: In the district of Lisieux, [in the department of Calvados, France,] the holy Confessor Nemesius.
      la:
      - type: text
        text: Kaléndis Augústi
      - type: text
        text: ''
      - type: text
        text: Antiochíæ pássio sanctórum septem fratrum Machabæórum Mártyrum, qui, cum matre sua, passi sunt sub Antíocho Epipháne Rege. Eórum relíquiæ, Romam translátæ, in eádem Ecclésia sancti Petri ad Víncula cónditæ fuérunt.
      - type: text
        text: Vercéllis natális sancti Eusébii, Epíscopi et Mártyris, qui, ob confessiónem fídei cathólicæ, a Constántio Príncipe Scythópolim, in Palæstína, et inde in Cappadóciam relegátus, póstmodum ad Ecclésiam suam revérsus, martýrium, persequéntibus Ariánis, passus est. Ipsíus autem memória étiam décimo octávo Kaléndas Ianuárii solémniter habétur, quo die fuit Epíscopus ordinátus; eiúsque festum recólitur décimo séptimo Kaléndas Ianuárii.
      - type: text
        text: Nucériæ Paganórum, in Campánia, item natális sancti Alfónsi-Maríæ de Ligório, Fundatóris Congregatiónis a sanctíssimo Redemptóre nuncupátæ, Epíscopi sanctæ Agathæ Gothórum et Confessóris, zelo animárum, scriptis, verbo et exémplo insígnis; quem Summus Póntifex Gregórius Décimus sextus albo Sanctórum adscrípsit, et Pius Nonus Doctórem universális Ecclésiæ declarávit, et Pius Duodécimus ómnium Confessariórum ac Moralistárum cæléstem apud Deum Patrónum constítuit. Ipsíus vero festívitas sequénti die celebrátur.
      - type: text
        text: Romæ, via Latína, sanctórum Mártyrum Boni Presbýteri, Fausti et Mauri, cum áliis novem; qui in Actis sancti Stéphani Papæ describúntur.
      - type: text
        text: Item Romæ pássio sanctárum Vírginum Fídei, Spei et Caritátis, e sancta Sophía matre progenitárum, quæ, sub Hadriáno Príncipe, martýrii corónam adéptæ sunt.
      - type: text
        text: Philadelphíæ, in Arábia, sanctórum Mártyrum Cyrílli, Aquilæ, Petri, Domitiáni, Rufi et Menándri, una die coronatórum.
      - type: text
        text: Perge, in Pamphýlia, sanctórum Mártyrum Leóntii, Attii, Alexándri, et aliórum sex agricolárum; qui, in persecutióne Diocletiáni, sub Flaviáno Prǽside, decolláti sunt.
      - type: text
        text: Gerúndæ, in Hispánia, natális sancti Felícis Mártyris, qui, post divérsa tormentórum génera, a Daciáno támdiu iussus est laniári, donec invíctum Christo spíritum rédderet.
      - type: text
        text: In território Parisiénsi sancti Iustíni Mártyris.
      - type: text
        text: Viénnæ, in Gállia, sancti Veri Epíscopi.
      - type: text
        text: Wintóniæ, in Anglia, sancti Ethelwóldi Epíscopi.
      - type: text
        text: In pago Lisuíno, in Gállia, sancti Nemésii Confessóris.
      - type: text
        text: Romæ, in Exquíliis, Dedicátio sancti Petri Apóstoli ad Víncula.
  psalm.kal-ndis-dec-mbris-c16d58530c:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the Feast of the holy Confessor Felix de Valois, of whom mention is made upon the 4th day of November.
      - type: citation
        text: 'Upon the same 1st day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The Prophet Nahum, who sleepeth in Begabar.
      - type: text
        text: At Rome, (about the year 283,) the holy martyrs the Priest Diodorus, and the Deacon Marianus with many others, who gained the glory of martyrdom by command of the Emperor Numerian.
      - type: text
        text: There likewise the holy martyrs Lucius, Rogatus, Cassian, and Candida.
      - type: text
        text: On the same day, the holy martyr Ansanus, who confessed Christ at Rome, under the Emperor Diocletian, and was cast into prison then was brought to Sienna, in Tuscany, where he was beheaded, and so finished the course of his testimony, (about the year 304.)
      - type: text
        text: At Ameria, in Umbria, under the same Diocletian, the holy martyr Olympias. He was a man of consular rank, who had been converted by blessed Firmina, and died upon the rack, (about the year 284.)
      - type: text
        text: At Arbela, in Persia, the holy martyr Ananias.
      - type: text
        text: At Narni, the holy martyr Proculus, Bishop (of that see,) who, after many good works, was beheaded by order of Totila, King of the Goths.
      - type: text
        text: At the city of Casala, the holy martyr Evasius, Bishop (of that see.)
      - type: text
        text: At Milan, holy Castritian, Bishop (of that see,) who gained great praise for his worthy acts and his godly and pious conduct of affairs during the most troublous times of the Church.
      - type: text
        text: At Brescia, holy Ursicinus, Bishop (of that see.)
      - type: text
        text: At Noyon, (in, probably, the year 659,) holy Eloy, Bishop (of that see,) whose marvelous life is commended by the number of signs wrought through him.
      - type: text
        text: At Verdun, (in the year 591,) holy Ageric, Bishop (of that see.)
      - type: text
        text: On the same day, holy Natalia, the wife of the blessed martyr Hadrian. She ministered for a long time to the holy martyrs who were kept in prison at Nicomedia under the Emperor Diocletian, and after their battle was over went to Constantinople, where she fell asleep in peace.
      la:
      - type: text
        text: Kaléndis Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Nahum Prophétæ, in Bégabar quiescéntis.
      - type: text
        text: Romæ sanctórum Mártyrum Diodóri Presbýteri, et Mariáni Diáconi, cum áliis plúribus, qui, sub Numeriáno Príncipe, cum in Arenário natalítia Mártyrum ágerent, illic, obstrúcta a persecutóribus iánua cryptæ ac díruta désuper mole, martýrii glóriam meruérunt.
      - type: text
        text: Item Romæ pássio sanctórum Lúcii, Rogáti, Cassiáni et Cándidæ.
      - type: text
        text: Nárniæ sancti Próculi, Epíscopi et Mártyris; qui, post multa egrégia ópera, a Rege Gothórum Tótila iussus est decollári.
      - type: text
        text: In civitáte Casalénsi sancti Evásii, Epíscopi et Mártyris.
      - type: text
        text: Eódem die sancti Ansáni Mártyris, qui, sub Diocletiáno Imperatóre, Romæ conféssus Christum et in cárcerem trusus, deínde Senas, in Túscia, perdúctus, ibídem cápitis obtruncatióne cursum martýrii perfécit.
      - type: text
        text: Amériæ, in Umbria, sancti Olympíadis, viri Consuláris, qui a beáta Firmína ad fidem est convérsus, et sub Diocletiáno, in equúleo tortus, martýrium consummávit.
      - type: text
        text: Arbéle, in Pérside, sancti Ananíæ Mártyris.
      - type: text
        text: Medioláni sancti Castritiáni Epíscopi, qui, in máxima Ecclésiæ perturbatióne, virtútum méritis ac rerum pie religioséque gestárum laude enítuit.
      - type: text
        text: Bríxiæ sancti Ursicíni Epíscopi.
      - type: text
        text: Noviómi, in Bélgio, sancti Elígii Epíscopi, cuius vitam admirándam múltiplex signórum númerus comméndat.
      - type: text
        text: Apud Virodúnum, in Gállia, sancti Ageríci Epíscopi.
      - type: text
        text: Eódem die sanctæ Natáliæ, uxóris beáti Hadriáni Mártyris, quæ, sub Diocletiáno Imperatóre, sanctis Martýribus, Nicomedíæ in cárcere deténtis, multo témpore ministrávit; impletóque eórum certámine, Constantinópolim est profécta, et ibídem in pace quiévit.
  psalm.kal-ndis-febru-rii-cf34b435b5:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 1st day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy martyr Ignatius, who ruled the church of Antioch as the third Bishop of that See in succession to the blessed Apostle Peter.
      - type: text
        text: In the persecution under the Emperor Trajan he was condemned to be killed by wild beasts, and was sent to Rome in chains by command of the emperor. There, in the presence of the Senate, he was first put to most grievous torments and then thrown to lions, the which throttled him with their teeth, and so he was made Christ's offering, (in the year 107.)
      - type: text
        text: At Smyrna, the holy martyr Pionius. He was a Priest who had written much controversial matter on behalf of the Christian faith. After suffering a foul imprisonment, during the which he strengthened many brethren by his exhortations to the enduring of martyrdom, he was put to many tortures and nailed upon a pyre, where he obtained a blessed end by being burnt for Christ's sake. And with him suffered fifteen others, (in the year 251.)
      - type: text
        text: At Ravenna, holy Severus, (in the year 389,) Bishop of that city, to the which place he was chosen, on account of his extraordinary merits, through a miraculous sign in the form of a dove.
      - type: text
        text: At Tron, in Gaul, (in the fifth century,) holy Paul, Bishop of that see, whose life shone with grace, and the preciousness of whose death is attested by miracles.
      - type: text
        text: Upon the same day, holy Ephrem, Deacon of the church of Edessa, who after much work for the faith of Christ fell asleep in the Lord, eminent for holiness and teaching, in the time of the Emperor Valens, (in the year 378.)
      - type: text
        text: In Ireland, (in the year 523,) the holy Virgin Brigid. At the moment that she bowed down her head to receive the hallowed veil, she chanced to touch the wooden steps of the altar with her hand, and in witness to her virginity the dry wood at once became green.
      - type: text
        text: At Florence, in Tuscany, the blessed Virgin Veridiana, recluse, of the Order of Vallombrosa, (Castel Florentin, 1242.)
      la:
      - type: text
        text: Kaléndis Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Ignátii, Epíscopi Antiochéni et Mártyris, qui glorióse martýrium consummávit tertiodécimo Kaléndas Ianuárii.
      - type: text
        text: Smyrnæ sancti Piónii, Presbýteri et Mártyris; qui, post apologías pro fide Christiána conscríptas, post squalórem cárceris, ubi multos fratrum ad martýrii tolerántiam suis exhortatiónibus roborávit, tandem, cruciátibus multis vexátus, clavis confíxus et ardénti rogo superpósitus, beátum pro Christo finem sortítus est. Cum ipso autem et álii quíndecim passi sunt.
      - type: text
        text: Ravénnæ sancti Sevéri Epíscopi, qui, ob præclára mérita, signo colúmbæ fuit eléctus.
      - type: text
        text: In civitáte Tricastína, in Gállia, sancti Pauli Epíscopi, cuius vita virtútibus cláruit, et mors pretiósa miráculis commendátur.
      - type: text
        text: Apud Kildáriam, in Hibérnia, sanctæ Brígidæ Vírginis, quæ cum lignum altáris tetigísset in testimónium virginitátis suæ, lignum ipsum statim víride factum est.
      - type: text
        text: Apud Castrum Florentínum, in Etrúria, beátæ Viridiánæ, Vírginis reclúsæ, ex Ordine Vallis Umbrósæ.
  psalm.kal-ndis-i-lii-1babe914ad:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is the Octave of the Birth of the holy Baptist John.
      - type: citation
        text: 'Upon the same 1st day of July, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: On Mount Hor, holy Aaron, the first High Priest of the tribe of Levi.
      - type: text
        text: In Britain, the holy martyrs Julius and Aaron, who suffered in the persecution under Diocletian, after holy Alban at the which time there were very many there who suffered diverse torments and were most cruelly mangled, and so finished their fight, and went to be glad for ever in the Jerusalem which is above.
      - type: text
        text: At Mondragone, in Latium, the holy Bishops Castus and Secundinus, both martyrs.
      - type: text
        text: At Vienne, holy Martin, Bishop [of that see,] a disciple of the Apostles.
      - type: text
        text: In Auvergne, [in the sixth century,] holy Gallus, Bishop [of Clermont.]
      - type: text
        text: In the country of Lyon, the holy Domitian, Abbot [of Bebron,] the first who there led an hermit's life. He gathered very many together there to serve God, and was gathered unto his fathers in a good old age, very famous for great graces, and for glorious and wonderful works.
      - type: text
        text: In the country of Reims, the holy Priest Theodoric, a disciple of blessed Bishop Rémy.
      - type: text
        text: At Angoulême, [in the sixth century,] the holy Abbot Eparchius.
      - type: text
        text: At Hums, in Syria, [likewise in the sixth century,] the holy Confessor Simeon, whose surname was Sali. He became a fool for Christ's sake, but God showed by great miracles how deep was his wisdom.
      - type: text
        text: At Vicenza, [in the eleventh century,] the holy Hermit Theobald, of the family of the Earls of Campania, whose name Pope Alexander III added to the list of the Saints on account of his fame for holiness and miracles.
      la:
      - type: text
        text: Kaléndis Iúlii
      - type: text
        text: ''
      - type: text
        text: Festum pretiosíssimi Sánguinis Dómini nostri Iesu Christi.
      - type: text
        text: In monte Hor deposítio sancti Aaron, primi ex órdine Levítico Sacerdótis.
      - type: text
        text: Viénnæ, in Gállia, sancti Martíni Epíscopi, Apostolórum discípuli.
      - type: text
        text: Sinuéssæ, in Campánia, sanctórum Mártyrum Casti et Secundíni Episcopórum.
      - type: text
        text: In Británnia sanctórum Mártyrum Iúlii et Aaron, qui post sanctum Albánum, in persecutióne Diocletiáni Imperatóris, passi sunt; quo témpore ibídem quamplúrimi, divérsis cruciátibus torti et sævíssime laceráti, ad supérnas civitátis gáudia, consummáto agóne, pervenérunt.
      - type: text
        text: Arvérnis, in Gállia, sancti Galli Epíscopi.
      - type: text
        text: In território Lugdunénsi deposítio sancti Domitiáni Abbátis, qui primus illic eremíticam vitam exércuit, et, cum plúrimos ibi in Dei servítio congregásset, tandem, magnis virtútibus et gloriósis miráculis valde clarus, ad patres, in senectúte bona, colléctus est.
      - type: text
        text: Engolísmæ, in Gállia, sancti Epárchii Abbátis.
      - type: text
        text: In território Rheménsi sancti Theodoríci Presbýteri, qui fuit discípulus beáti Remígii Epíscopi.
      - type: text
        text: Apud Eméssam, in Phœnícia, sancti Simeónis Confessóris, cognoménto Sali, qui stultus propter Christum factus est; sed altam eius sapiéntiam Deus magnis miráculis declarávit.
  psalm.kal-ndis-i-nii-eb521a87c1:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 1st day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Juventius.
      - type: text
        text: At Caesarea, in Palestine, [in the year 308,] the blessed martyr Pamphilus, the Priest. He was a man wonderful for his holiness, his teaching, and his goodness towards the poor. In the persecution under the Emperor Galerius Maximian, he was first tortured for Christ's faith's sake, under the President Urban, and cast into prison then under Fermilian he was called back again to suffer, and then along with others finished his testimony. There then suffered also the Deacon Valens, Paul, and nine others whose memory is celebrated upon other days.
      - type: text
        text: At Autun, [in the year 273,] holy Reverian, Bishop [of that see,] the Priest Paul, and ten others, who were crowned with martyrdom under the Emperor Aurelian.
      - type: text
        text: In Cappadocia, the holy martyr Thespesius, who, after being tortured, was beheaded under the Emperor Alexander Severus and the Prefect Simplicius.
      - type: text
        text: In Egypt, the holy martyrs, the sergeant Ischyrion, and five other soldiers, who were put to diverse kinds of death, under the Emperor Diocletian, for believing in Christ; also the holy martyr Firmus, who, in the persecution under Maximian, was terribly scourged, bruised with stones, and at last beheaded.
      - type: text
        text: At Perugia, the holy soldiers Felin and Gratinian, who were diversely tormented under the Emperor Decius, and by a glorious death obtained the palm of martyrdom.
      - type: text
        text: At Bologna, the holy martyr Proculus, who suffered under the Emperor Maximian.
      - type: text
        text: At Amelia, the holy martyr Secundus, who was thrown into the Tiber, under the Emperor Diocletian, and so finished his testimony.
      - type: text
        text: At Citta-di-Castello, in Umbria, the holy Roman soldier Crescentian, who was crowned with martyrdom under the same Emperor Diocletian.
      - type: text
        text: In Umbria also, [in the year 400,] the holy Priest Fortunatus, famous for graces and wonders.
      - type: text
        text: At the Monastery of Lerins, [in the year 430,] the holy Abbot Caprasius.
      - type: text
        text: At Trier, [in the year 1035,] the holy monk Simeon, who was enrolled among the Saints by Pope Benedict IX.
      - type: text
        text: At Burgos, in Spain, [in the year 1037,] in the Monastery of Ogna, the holy Benedictine Abbot Enecon, illustrious for his holiness and the fame of his miracles.
      la:
      - type: text
        text: Kaléndis Iúnii
      - type: text
        text: ''
      - type: text
        text: Sanctæ Angelæ Meríci Vírginis, ex tértio Ordine sancti Francísci; quæ fuit Institútrix Societátis Vírginum sanctæ Ursulæ, et ad accipiéndam corónam immarcescíbilem, sexto Kaléndas Februárii cælésti Sponso vocáta est.
      - type: text
        text: Romæ sancti Iuvéntii Mártyris.
      - type: text
        text: Augustodúni sanctórum Reveriáni Epíscopi, et Pauli Presbýteri, cum áliis decem, qui, sub Aureliáno Príncipe, martýrio coronáti sunt.
      - type: text
        text: Cæsaréæ, in Palæstína, beáti Pámphili, Presbýteri et Mártyris, viri admirándæ sanctitátis et doctrínæ, atque in páuperes munífici; qui, ob Christi fidem, in persecutióne Galérii Maximiáni, primum, sub Urbáno Prǽside, cruciátus et in cárcerem trusus, deínde, sub Firmiliáno, íterum revocátus ad pœnas, una cum áliis martýrium consummávit. Passi sunt étiam tunc Valens Diáconus, et Paulus, aliíque novem; quorum memória áliis diébus celebrátur.
      - type: text
        text: In Cappadócia sancti Thespésii Mártyris, qui, sub Alexándro Imperatóre et Simplício Præfécto, post ália torménta, decollátus est.
      - type: text
        text: In Ægýpto sanctórum Mártyrum Ischyriónis, ductóris mílitum, et aliórum quinque mílitum; qui, sub Diocletiáno Imperatóre, pro fide Christi, divérso mortis génere perémpti sunt.
      - type: text
        text: Item sancti Firmi Mártyris, qui, in persecutióne Maximiáni, acerbíssimis plagis afféctus, lapídibus percússus, ac demum cápite cæsus est.
      - type: text
        text: Perúsiæ sanctórum Mártyrum Felíni et Gratiniáni mílitum, qui, sub Décio, váriis torméntis cruciáti, martýrii palmam gloriósa morte percepérunt.
      - type: text
        text: Bonóniæ sancti Próculi Mártyris, qui sub Maximiáno Imperatóre passus est.
      - type: text
        text: Amériæ, in Umbria, sancti Secúndi Mártyris, qui sub Diocletiáno, in Tíberim proiéctus, martýrium consummávit.
      - type: text
        text: Apud Tiférnum, in Umbria, sancti Crescentiáni, mílitis Románi, qui, sub eódem Imperatóre, martýrio coronátus est.
      - type: text
        text: In monastério Lirinénsi, in Gállia, sancti Caprásii Abbátis.
      - type: text
        text: In monastério Onniénsi, apud Burgos, in Hispánia, sancti Enecónis, Abbátis Benedictíni, ob sanctitátis et miraculórum glóriam illústris.
      - type: text
        text: Apud Montem Falcum, in Umbria, sancti Fortunáti Presbýteri, virtútibus et miráculis clari.
      - type: text
        text: Tréviris sancti Simeónis Mónachi, qui a Benedícto Papa Nono in Sanctórum númerum relátus est.
  psalm.kal-ndis-ianu-rii-cfa26d5f30:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Octave of the Birth of our Lord Jesus Christ, upon the which day is commemorated His Circumcision.
      - type: citation
        text: 'Upon the same 1st day of January, were born into the better life:'
      - type: text
        text: ''
      - type: citation
        text: 'At Rome, the holy martyr Almachius, who was slain by gladiators (about the year 404) at the command of Alpius, prefect of the city, because he said: "This is the Octave of the Lord''s Birth, cease from your idolatrous superstitions, and your unclean sacrifices." Likewise at Rome, upon the Appian Way, thirty holy soldiers who were crowned with martyrdom, under the Emperor Diocletian.'
      - type: text
        text: Likewise at Rome, the holy virgin Martina, who was put to diverse torments, under the Emperor Alexander, and at length gained the crown of martyrdom by the sword, whose feast we keep upon the 30th day of the month of January.
      - type: text
        text: At Spoleto, in the time of the Emperor Antonine, the holy martyr, the priest Concordius. He was first cudgelled, then racked, and afterwards suffered imprisonment wherein he was comforted by a visit of angels, and at length was delivered from this life by the sword.
      - type: text
        text: On the same day, the holy martyr Magnus.
      - type: text
        text: At Caesarea, in Cappadocia, the burial of the holy Basil, bishop of Caesarea (in the year 379), whose feast we keep upon the 14th day of June. Which is the day whereon he was ordained a bishop.
      - type: text
        text: In Africa, blessed Fulgentius, bishop of the Church of Ruspa (in the year 508), who at the time of the persecution under the Vandals, suffered much at the hands of the Arians because of his Catholic faith, and his eminent teaching. He was exiled to Sardinia (in the year 510); but was at length (in the year 523) allowed to return to his own church, where (in the year 533) he died a holy death, famous for his life and his words.
      - type: text
        text: At Chieti, in Abruzzo Citeriore, holy Justin, bishop of that city, famous for the holiness of his life, and for the miracles worked through him (in the year 543).
      - type: text
        text: At the monastery of St. Claude, upon the Jura Mountains, in the country of Lyon, holy (4th) Eugendus, Abbot (of Condat), whose life was illustrious for his graces and miracles (in the year 510).
      - type: text
        text: At Senlis (in the year 1049), holy Odilo, (6th) Abbot of Cluny (elected in the year 994), who first commanded that in his monasteries a commemoration of all the faithful departed should be made upon the first day after the festival of All Saints, the which custom the Universal Church hath since approved by adopting it.
      - type: text
        text: At Monte Senario, in Tuscany, the blessed confessor Bonfiglio, one of the seven founders of the order of servants of the Blessed Virgin Mary, to whom he was devoted and by whom he was suddenly called away to heaven (in the year 1262).
      - type: text
        text: At Alexandria (in the year 470), the burial of the holy virgin Euphrosyne, who shone in her nunnery as a great light by the power of her self-denial and her miracles.
      la:
      - type: text
        text: Kaléndis Ianuárii
      - type: text
        text: ''
      - type: text
        text: Octáva Nativitátis Dómini nostri Iesu Christi.
      - type: text
        text: Circumcísio eiúsdem Dómini nostri Iesu Christi.
      - type: text
        text: Romæ pássio sanctæ Martínæ, Vírginis et Mártyris; quæ, sub Alexándro Imperatóre, divérsis tormentórum genéribus cruciáta, tandem, gládio percússa, martýrii palmam adépta est. Ipsíus vero festum tértio Kaléndas Februárii recólitur.
      - type: text
        text: Cæsaréæ, in Cappadócia, deposítio sancti Basilíi, cognoménto Magni, Epíscopi, Confessóris et Ecclésiæ Doctóris; qui, témpore Valéntis Imperatóris, doctrína et sapiéntia insignítus omnibúsque virtútibus exornátus, mirabíliter effúlsit, et Ecclésiam advérsus Ariános et Macedoniános inexpugnábili constántia deféndit. Eius autem festívitas potíssimum ágitur décimo octávo Kaléndas Iúlii, quo die Epíscopus ordinátus est.
      - type: text
        text: Apud montem Senárium, in Etrúria, natális sancti Bonfílii Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis, quam cum idem impénse coluísset, ab ipsa in cælum repénte evocátus est. Illíus porro ac Sociórum festum prídie Idus Februárii celebrátur.
      - type: text
        text: 'Romæ sancti Almáchii Mártyris, qui, cum díceret: «Hodie Octavæ Domínici diéi sunt, cessáte a superstitiónibus idolórum et a sacrifíciis pollútis,» proptérea, iubénte Præfécto Urbis Alípio, a gladiatóribus occísus est.'
      - type: text
        text: Item Romæ, via Appia, corónæ sanctórum mílitum trigínta Mártyrum, sub Diocletiáno Imperatóre.
      - type: text
        text: Apud Spolétum sancti Concórdii, Presbýteri et Mártyris; qui, tempóribus Antoníni Imperatóris, primo cæsus fústibus, dehinc equúleo suspénsus, ac póstea macerátus in cárcere, ibíque Angélica visitatióne confortátus, demum gládio vitam finívit.
      - type: text
        text: Eódem die sancti Magni Mártyris.
      - type: text
        text: In Africa beáti Fulgéntii, Ruspénsis Ecclésiæ Epíscopi, qui, témpore Wandálicæ persecutiónis, ob cathólicam fidem eximiámque doctrínam, ab Ariánis multa perpéssus et in Sardíniam relegátus est; atque tandem, ad própriam Ecclésiam redíre permíssus, vita et verbo clarus, sancto fine quiévit.
      - type: text
        text: Teáte, in Aprútio citerióre, natális sancti Iustíni, eiúsdem civitátis Epíscopi, sanctitáte vitæ ac miráculis clari.
      - type: text
        text: In território Lugdunénsi, monastério Iurénsium, sancti Eugéndi Abbátis, cuius vita virtútibus et miráculis plena refúlsit.
      - type: text
        text: Apud Silviníacum, in Gállia, sancti Odilónis, Abbátis Cluniacénsis, qui primus Commemoratiónem ómnium Fidélium Defunctórum, prima die post festum ómnium Sanctórum, in suis monastériis fíeri præcépit; quem ritum póstea universális Ecclésia recípiens comprobávit.
      - type: text
        text: Romæ natális sancti Vincéntii Maríæ Strambi, Epíscopi Maceraténsis et Tolentíni, Congregatiónis a Cruce et Passióne Iesu sodális, pastoráli zelo præclári, quem Pius Papa Duodécimus inter Sanctos rétulit.
      - type: text
        text: Alexandríæ deposítio sanctæ Euphrósynæ Vírginis, quæ in monastério virtúte abstinéntiæ ac miráculis cláruit.
  psalm.kal-ndis-m-rtii-57f525cc68:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor David, Archbishop of Caerleon upon Usk.
      - type: citation
        text: 'Upon the same 1st day of March, were also born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, two hundred and sixty holy martyrs whom for Christ's name's sake the Emperor Claudius first condemned to dig sand outside the Salarian Gate, and then to be shot to death with arrows in the amphitheatre.
      - type: text
        text: Likewise the holy martyrs Leo, Donatus, Abundantius, Nicephorus, and nine others.
      - type: text
        text: At Marseilles, [in the year 290,] the holy martyrs Hermes and Hadrian.
      - type: text
        text: At Heliopolis, [in 114,] the holy martyr Eudocia [of Samaria, now Balbek in Turkey-in-Asia,] during the persecution under the Emperor Trajan. She was baptized by Theodotus, Bishop of [Heliopolis,] and, armed for the battle, the President Vincentius ordered her to be smitten with the sword, and thus she received the crown of martyrdom.
      - type: text
        text: Upon the same day, the holy martyr Antonina. During the persecution under the Emperor Diocletian she laughed at the gods of the Gentiles, for the which cause she was diversely tortured, shut up in a barrel, and drowned in the marsh at the city of Cea.
      - type: text
        text: At Werdt, [in the year 713,] holy Swibert, Bishop of that city, [Apostle of the Frisians,] who in the time of Pope Sergius preached the gospel to the Frisians, Hollanders, and other peoples of Lower Germany.
      - type: text
        text: At Angers, [in the year 550,] the holy Confessor Albinus, Bishop of that see, a man of eminent graces and holiness.
      - type: text
        text: At Mans, [in the year 687,] the holy Siviard, Abbot [of Saint Calais.]
      - type: text
        text: At Perugia is commemorated the translation [in the year 547] of the holy martyr Herculanus, Bishop of that see, of whom mention is made upon the 7th day of November. He was beheaded by order of Totila, King of the Goths, and it is written by holy Pope Gregory that, forty days after his head was cut off, head and body were found united again, as though the iron had never touched him.
      la:
      - type: text
        text: Kaléndis Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Mártyrum ducentórum sexagínta, quos iussit primo Cláudius, pro Christi nómine damnátos, extra portam Saláriam arénam fódere, deínde in amphitheátro sagíttis mílitum intérfici.
      - type: text
        text: Item natális sanctórum Mártyrum Leónis, Donáti, Abundántii, Nicéphori et aliórum novem.
      - type: text
        text: Massíliæ, in Gállia, sanctórum Mártyrum Hermétis et Hadriáni.
      - type: text
        text: Heliópoli, apud Líbanum, sanctæ Eudóciæ Mártyris, quæ, in persecutióne Traiáni, a Theódoto Epíscopo baptizáta et ad certámen muníta, ibídem, Vincéntii Prǽsidis iussu percússa gládio, martýrii corónam accépit.
      - type: text
        text: Eódem die sanctæ Antonínæ Mártyris, quæ in persecutióne Diocletiáni, cum Gentílium deos irrisísset, ídeo, post vários cruciátus, in vase quodam inclúsa, in palúdem urbis Ceæ demérsa est.
      - type: text
        text: Romæ natális sancti Felícis Papæ Tértii, qui sancti Gregórii Magni átavus fuit; qui étiam (ut ipse Gregórius refert), sanctæ Tharsíllæ nepti appárens, illam ad cæléstia regna vocávit.
      - type: text
        text: Apud civitátem Werdam sancti Suitbérti Epíscopi, qui, témpore sancti Sérgii Papæ Primi, apud Frísones, Bátavos et álios Germániæ pópulos Evangélium prædicávit.
      - type: text
        text: Andégavi, in Gállia, sancti Albíni, Epíscopi et Confessóris, viri præclaríssimæ virtútis et sanctitátis.
      - type: text
        text: Apud Cenómanos, in Gállia, sancti Siviárdi Abbátis.
      - type: text
        text: Perúsiæ Translátio sancti Herculáni, Epíscopi et Mártyris, qui iussu Totílæ, Gothórum Regis, decollátus est. Ipsíus autem corpus ita cápiti unítum atque sanum, quadragésimo post abscissiónem die (ut scribit sanctus Gregórius Papa), repértum est, ac si nulla ferri incísio illud tetigísset.
  psalm.kal-ndis-maii-df7a71a743:
    role: psalm
    content:
      en:
      - type: text
        text: 'Upon the ist day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The blessed Apostles Philip and James. Philip brought nearly all Scythia to believe in Christ, but in the end, at the city of Hierapolis, in Asia, was fastened to a cross and stoned, and so fell asleep gloriously, [in the year 61.] James, who is written of as the brother of the Lord, and was the first Bishop of Jerusalem, was cast down from a pinnacle of the temple, whereby his legs were broken, and he was slain by a blow upon the head from a fuller's pole, and buried there not far from the temple.
      - type: text
        text: In Egypt, the holy prophet Jeremiah, who was stoned by the people at Taphnis, and so there died, [590 B.C.,] and was buried. Holy Epiphanius saith that the faithful have been in use to pray at his grave and to take dust therefrom, whereby the bites of serpents are healed.
      - type: text
        text: In the territory of Viviers, in Gaul, the blessed subdeacon Andeolus, whom holy Polycarp sent from the East along with others into Gaul to preach the Word of God. Under the Emperor Severus he was beaten with thorny clubs, and at length his head was broken into four parts with a wooden sword, and so he attained to martyrdom, [in the year 208.]
      - type: text
        text: At Huesca, in Spain, the holy martyrs Orentius and Patience.
      - type: text
        text: At Sedune, in Gaul, holy Sigismund, King of the Burgundians, who was drowned in a well, and so died, [in the year 524,] and was afterwards famous for miracles.
      - type: text
        text: At Auxerre, [in the year 524,] the holy Confessor Amator, Bishop of that see.
      - type: text
        text: At Auch, [in the fifth century,] holy Orientius, Bishop of that see.
      - type: text
        text: In England, [in the year 778,] holy Asaph, Bishop of the see which is called by his name, and the holy Virgin Walburga, whose feast we keep upon the 14th day of May.
      - type: text
        text: At Bergamo, the holy widow Grata.
      - type: text
        text: At Forli, holy Peregrinus, of the Order of Servants of the Blessed Virgin Mary.
      la:
      - type: text
        text: Kaléndis Maii
      - type: text
        text: ''
      - type: text
        text: Solémnitas sancti Ioseph Opíficis, Sponsi beátæ Maríæ Vírginis, Confessóris, opíficum Patróni.
      - type: text
        text: Romæ natális sancti Pii Quinti, ex Ordine Prædicatórum, Papæ et Confessóris; qui, ecclesiásticæ disciplínæ restituéndæ, hærésibus exstirpándis et Christiáni nóminis hóstibus conteréndis strénue ac felíciter incúmbens, vitæ ac legum sanctitáte cathólicam Ecclésiam gubernávit. Ipsíus autem festívitas tértio Nonas mensis huius celebrátur.
      - type: text
        text: In Ægýpto sancti Ieremíæ Prophétæ, qui, a pópulo lapídibus óbrutus, apud Taphnas occúbuit, ibíque sepúltus est; ad cuius sepúlcrum fidéles (ut refert sanctus Epiphánius) supplicáre consuevérunt, índeque sumpto púlvere, áspidum mórsibus medéntur.
      - type: text
        text: In território Vivariénsi, in Gálliis, beáti Andéoli Subdiáconi, qui, una cum áliis, a beáto Polycárpo, Smyrnénsi Epíscopo, ex Oriénte in Gálliam ad prædicándum verbum Dei missus est. Hic, sub Sevéro Imperatóre, spinósis fústibus cæsus, demum, per ensem lígneum cápite in quátuor partes in modum crucis conscísso, martýrium consummávit.
      - type: text
        text: Oscæ, in Hispánia, sanctórum Mártyrum Oréntii et Patiéntiæ.
      - type: text
        text: Apud Colúmnam vicum, in Aurelianénsi Gálliæ território, pássio sancti Sigismúndi, Regis Burgundiónum, qui in púteum demérsus occúbuit, ac póstea miráculis cláruit. Sacrum vero ipsíus corpus, e púteo tandem extráctum, ad Ecclésiam Agaunénsis monastérii, intra Sedunénsis diœcésis términos siti, delátum est ibíque honorífice collocátum.
      - type: text
        text: Antisiodóri sancti Amatóris, Epíscopi et Confessóris.
      - type: text
        text: Auscii, in Gállia, sancti Oriéntii Epíscopi.
      - type: text
        text: Elviæ, in Anglia, sancti Asaphi Epíscopi, cuius nómine ipsa cívitas Episcopális póstmodum est insigníta.
      - type: text
        text: Foro Lívii sancti Peregríni, ex Ordine Servórum beátæ Maríæ Vírginis.
      - type: text
        text: Bérgomi sanctæ Gratæ Víduæ.
  psalm.kal-ndis-nov-mbris-2f676b8d1d:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Feast of All the Saints. This famous feast was instituted to be held every year throughout the whole city of Rome, in honour of the Blessed Virgin Mary, Mother of God, and of all the holy martyrs, by Pope Boniface IV, after he had consecrated to Christian worship the temple called the Pantheon or Temple of all the gods. And the same festival was afterwards being kept in diverse ways in diverse churches, when Gregory IV decreed that it should be solemnly observed for ever throughout the universal Church upon the first day of November, in honour of all the Saints.
      - type: citation
        text: 'Upon the same 1st day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Terracina, in Campania, (in the reign of the Emperor Diocletian,) the holy Deacon Caesarius, who suffered many days in prison, and was afterwards put into a sack, along with the holy Priest Julian, and cast into the sea.
      - type: text
        text: At Dijon, the holy Priest Benignus, who was sent into Gaul to preach the Gospel by blessed Polycarp, under the Emperor Marcus Aurelius. He was put to many most grievous torments by the judge Terence, who commanded at last that his neck should be struck with an iron bar and a lance thrust through his body.
      - type: text
        text: Upon the same day, the holy handmaiden Mary, who was accused of Christianity, under the Emperor Hadrian. She was grievously lashed, racked, and torn with hooks, and so suffered martyrdom.
      - type: text
        text: At Damascus, suffered the holy martyrs Caesarius, Dacius, and five others.
      - type: text
        text: In Persia, under King Sapor, the holy martyrs John the Bishop and James the Priest.
      - type: text
        text: At Tarsus, under the Emperor Maximian, holy Cyrenia and Juliana.
      - type: text
        text: (At Clermont,) in Auvergne, holy Austremonius, the first Bishop of that see.
      - type: text
        text: At Paris, (in the fifth century,) deceased the holy Marcellus, Bishop (of that see.)
      - type: text
        text: At Bayeux, in the time of Childebert, King of the Franks, holy Vigor, Bishop (of that see.)
      - type: text
        text: At Tivoli, the holy Monk Severinus.
      - type: text
        text: In the Gatinais, (in the fourth century,) the holy Confessor Maturin.
      la:
      - type: text
        text: Kaléndis Novémbris
      - type: text
        text: ''
      - type: text
        text: Festívitas ómnium Sanctórum, quam in honórem beátæ Dei Genitrícis Vírginis Maríæ et sanctórum Mártyrum Bonifátius Papa Quartus, cum templum Pántheon tértio Idus Maii dedicásset, célebrem et generálem instítuit agi quotánnis in urbe Roma. Sed et Gregórius item Quartus póstmodum decrévit, eándem festivitátem, quæ váriis modis iam in divérsis Ecclésiis celebrabátur, in honórem ómnium Sanctórum solémniter hac die ab univérsa Ecclésia perpétuo observári.
      - type: text
        text: In Pérside sanctórum Mártyrum Ioánnis Epíscopi, et Iacóbi Presbýteri, sub Sápore Rege.
      - type: text
        text: Tarracínæ, in Campánia, natális sancti Cæsárii Diáconi, qui, diébus multis in custódia macerátus, póstea, cum sancto Iuliáno Presbýtero, in saccum missus et in mare præcipitátus est.
      - type: text
        text: In castro Divióne sancti Benígni Presbýteri, qui a beáto Polycárpo missus est in Gálliam ad prædicándum Evangélium; et, postquam, sub Marco Aurélio Imperatóre, a Teréntio Iúdice gravíssimis torméntis multiplíciter est afflíctus, tandem eius collum vecte férreo tundi et corpus láncea perforári iubétur.
      - type: text
        text: Damásci pássio sanctórum Cæsárii, Dácii et aliórum quinque.
      - type: text
        text: Eódem die sanctæ Maríæ ancíllæ, quæ, Christiánæ religiónis nómine accusáta, hinc, sub Hadriáno Imperatóre, diris verbéribus afflícta, equúlei extensiónem et ungulárum laceratiónem passa, martýrium complévit.
      - type: text
        text: Tarsi, in Cilícia, sanctárum Cyréniæ et Iuliánæ Mártyrum, sub Maximiáno Imperatóre.
      - type: text
        text: Arvérnis, in Gállia, sancti Austremónii, qui fuit primus eiúsdem civitátis Epíscopus.
      - type: text
        text: Lutétiæ Parisiórum deposítio sancti Marcélli Epíscopi.
      - type: text
        text: Baiócis, in Gállia, sancti Vigóris Epíscopi, témpore Childebérti, Francórum Regis.
      - type: text
        text: Andégavi, in Gállia, deposítio sancti Licínii Epíscopi, venerábilis sanctitátis viri.
      - type: text
        text: Tíbure sancti Severíni Mónachi.
      - type: text
        text: Lyricánti, in Wastinénsi Gálliæ território, sancti Maturíni Confessóris.
  psalm.kal-ndis-sept-mbris-764d113fba:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Cardinal Raymond, surnamed the Unborn, of the Order of Blessed Mary of Ransom for the Redemption of Prisoners, a man famous for the holiness of his life and for his wonderful works, of whom mention was made yesterday.
      - type: citation
        text: 'Upon the same 1st day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In the province of Narbonne, the holy Abbot and Confessor Giles.
      - type: text
        text: At Benevento, [in the third century,] the Twelve Holy Brethren Martyrs.
      - type: text
        text: In Palestine, holy Joshua and holy Gideon.
      - type: text
        text: At Jerusalem, the blessed Prophetess Anna, whose holiness is set forth in the words of the Gospel.
      - type: text
        text: At Capua, upon the Aquarian Way, the holy martyr Priscus, who was one of the original disciples of Christ.
      - type: text
        text: At Reims, in Gaul, holy Xystus, a disciple of the blessed Apostle Peter, who was by him consecrated as the first Bishop of that city, and received the crown of martyrdom in the persecution under Nero.
      - type: text
        text: At Todi, in Umbria, [in the second century,] the holy martyr Terentian, Bishop [of that city,] who was racked and tormented with armed whips by command of the Pro-Consul Laetian, under the Emperor Hadrian, whereafter his tongue was cut out and he was condemned to be beheaded, and so finished his testimony.
      - type: text
        text: At Heraclea, [in Thrace,] the holy Deacon Ammon, and the forty holy Virgins to whom he taught the faith, and whom he led with him, under the tyrant Licinius, to the glory of martyrdom.
      - type: text
        text: In Spain, the holy martyrs Vincent and Laetus.
      - type: text
        text: At Piombino, in Tuscany, the holy martyr Regulus, who was martyred there under Totila, on his landing from Africa.
      - type: text
        text: At Sens, [in the seventh century,] the blessed Confessor Lupus, Bishop [of that see,] concerning whom it is said that one day when he was standing at the holy Altar in the presence of the clergy a precious stone fell from heaven into his chalice.
      - type: text
        text: At Capua, holy Priscus, Bishop [of that city.] He was one of those Priests who, in the persecution under the Vandals, were diversely afflicted for the Catholic faith's sake, and were put on board an old ship wherein they came from Africa to the shores of Campania, and being scattered about those parts, and set over diverse churches, they wonderfully spread abroad the Christian religion. His Companions were Castrensis, Tammatrus, Rosius, Heraclius, Secundinus, Adjutor, Mark, Augustus, Elpidius, Canion, and Vindonius.
      - type: text
        text: At Aquino, [in the sixth century,] holy Constantius, Bishop [of that see,] famous for the gift of prophecy, and for many other graces.
      - type: text
        text: At Le Mans, [in the fifth century,] holy Victorius, Bishop [of that see.]
      - type: text
        text: At Baden, in the country of Constance, the holy Virgin Verena.
      la:
      - type: text
        text: Kaléndis Septémbris
      - type: text
        text: ''
      - type: text
        text: In província Narbonénsi sancti Ægídii, Abbátis et Confessóris, cuius nómine est appellátum óppidum, quod póstea crevit in loco, ubi ipse monastérium eréxerat et mortális vitæ cursum absólverat.
      - type: text
        text: Sentiáni, in fínibus Apúliæ, pássio sanctórum Donáti et altérius Felícis; qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, iussi sunt, post vária torménta, cápite præcídi hodiérna die, in qua et festívitas aliórum ex duódecim frátribus, quorum natális respectívis diébus ágitur, institúta est celebrári. Ipsórum vero duódecim fratrum córpora Benevéntum póstea transláta sunt, ibíque honorífice asserváta.
      - type: text
        text: In Palæstína sanctórum Iósue et Gedeónis.
      - type: text
        text: Hierosólymis beátæ Annæ Prophetíssæ, cuius sanctitátem sermo Evangélicus prodit.
      - type: text
        text: Cápuæ, via Aquária, sancti Prisci Mártyris, qui fuit unus de antíquis Christi discípulis.
      - type: text
        text: Tudérti, in Umbria, sancti Terentiáni, Epíscopi et Mártyris; qui, sub Hadriáno Imperatóre, Lætiáni Procónsulis iussu, equúleo et scorpiónibus cruciátus est, ac demum, abscíssa lingua, cápitis damnátus martýrium complévit.
      - type: text
        text: Heracléæ, in Thrácia, sancti Ammónis Diáconi, et sanctárum quadragínta Vírginum, quas ille erudívit in fide, et, sub Licínio tyránno, ad martýrii glóriam secum perdúxit.
      - type: text
        text: In Hispánia sanctórum Mártyrum Vincéntii et Læti.
      - type: text
        text: Populónii, in Túscia, sancti Réguli Mártyris, qui ex Africa illuc venit, ibíque, sub Tótila, martýrium consummávit.
      - type: text
        text: Cápuæ sancti Prisci Epíscopi, qui unus fuit ex illis Sacerdótibus, qui, in persecutióne Wandalórum, ob fidem cathólicam várie afflícti et vetústæ navi impósiti, ex Africa ad Campániæ líttora pervenérunt, et Christiánam religiónem, in iis locis dispérsi diversísque Ecclésiis præfécti, mirífice propagárunt. Ipsíus autem fuérunt sócii Castrénsis, cuius dies natális tértio Idus Februárii recólitur, Támmarus, Rósius, Heráclius, Secundínus, Adiútor, Marcus, Augústus, Elpídius, Cánion et Vindónius.
      - type: text
        text: Apud Sénonas beáti Lupi, Epíscopi et Confessóris; de quo refértur quod quadam die, præsénte Clero, dum sacris altáribus adstáret, lapsa est cǽlitus gemma in eius cálicem sanctum.
      - type: text
        text: Rhemis, in Gállia, sancti Xysti, qui fuit primus eiúsdem civitátis Epíscopus.
      - type: text
        text: Apud Cenómanos, in Gállia, sancti Victórii Epíscopi.
      - type: text
        text: Apud Aquínum sancti Constántii Epíscopi, prophetíæ dono multísque virtútibus clari.
      - type: text
        text: Ad Aquas Duras, in Constantiénsi Germániæ território, sanctæ Verénæ Vírginis.
  psalm.nonas-maii-e28bb75d6f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 7th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Krakow, in Poland, the holy Bishop and martyr Stanislaw, slain by the wicked king Boleslaw II, [in the year 1079.]
      - type: text
        text: At Tarracina, in Campania, [in the year 99,] the blessed Virgin and martyr Flavia Domitilla. She was sister's daughter to the Consul Flavius Clemens, and had been consecrated with the sacred veil by holy Clement. In the persecution under Domitian she and very many others were banished into the island of Ponza for bearing witness to Christ, and there she endured a long martyrdom. Last of all she was brought to Tarracina, where by her teaching and miracles she turned many to believe in Christ, and then finished the glorious course of her testimony by being burnt in her bed-chamber, wherein she dwelt along with her maidens Euphrosyne and Theodora. Her memory is kept upon the 12th day of May, along with that of the holy martyrs Nereus and Achilles.
      - type: text
        text: '[At Benevento,] the holy martyr Juvenal, [Bishop of that see.]'
      - type: text
        text: At Nicomedia, [under the Emperor Diocletian,] the holy brethren Flavius Augustus and Augustine, martyrs.
      - type: text
        text: There also, in the persecution under the Emperor Decius, the holy martyr Quadratus, who was oftentimes put to the torture, and at last beheaded.
      - type: text
        text: At Rome, [in the year 686,] the holy Pope and Confessor Benedict.
      - type: text
        text: At York, in England, [in the year 721,] the holy John [of Beverley,] Bishop [of that see,] famous for his life and miracles, whose feast we keep upon the 25th day of October.
      - type: text
        text: At Pavia, the holy Peter, Bishop [of that see.]
      - type: text
        text: At Rome is commemorated the translation of the body of the holy proto-martyr Stephen, which the Supreme Pontiff Pelagius brought to Rome from Constantinople, and laid in the sepulchre of the holy martyr Laurence, outside the walls, where it is held in great reverence by the godly.
      la:
      - type: text
        text: Nonas Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Stanislái, Epíscopi Cracoviénsis et Mártyris, qui sequénti die corónam martýrii consecútus est.
      - type: text
        text: Tarracínæ, in Campánia, natális beátæ Fláviæ Domitíllæ, Vírginis et Mártyris; quæ, cum esset fília sanctæ Plautíllæ, soróris sancti Mártyris Flávii Cleméntis Cónsulis, et sacro velámine fuísset a sancto Cleménte Pontífice consecráta, primum, in persecutióne Domitiáni, ob testimónium Christi, in ínsulam Póntiam, cum áliis plúrimis, exsílio deportáta, longum illic martýrium duxit. Novíssime vero, Tarracínam dedúcta, ibi, cum plúrimos doctrína et miráculis ad Christi fidem convertísset, Iúdicis iussu incénso cubículo, in quo simul cum suis virgínibus Euphrósyna et Theodóra morabátur, cursum gloriósi martýrii consummávit. Ipsa vero Domitílla, una cum sanctis Martýribus Néreo et Achílleo atque Pancrátio, féstiva celebritáte quarto Idus mensis huius recólitur.
      - type: text
        text: Eódem die sancti Iuvenális Mártyris.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum fratrum Flávii, Augústi et Augustíni.
      - type: text
        text: Ibídem sancti Quadráti Mártyris, qui, in persecutióne Décii Imperatóris, sǽpius ad torménta repetítus, demum, cápite truncátus, martýrium complévit.
      - type: text
        text: Eboráci, in Anglia, sancti Ioánnis Epíscopi, vita et miráculis clari.
      - type: text
        text: Pápiæ sancti Petri Epíscopi.
      - type: text
        text: Romæ Translátio córporis sancti Stéphani Protomártyris, quod, Pelágio Primo Summo Pontífice, e Constantinópoli ad Urbem allátum atque in sepúlcro sancti Lauréntii Mártyris in agro Veráno pósitum, ibídem magna piórum religióne cólitur.
  psalm.nonis-apr-lis-4582a51bd1:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 5th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Vannes, in Brittany, the holy Confessor Vincent, surnamed Ferrer, of the Order of Friars Preachers, who was mighty in work and in word, and brought to Christ many thousands of unbelievers, [in the year 1419.]
      - type: text
        text: At Thessalonica, the holy Virgin Irene. She hid the holy books contrary to the edict of the Emperor Diocletian, and therefore suffered imprisonment, was smitten with an arrow, and burnt with fire by order of the President Dulcetius, the same judge under whom her sisters Agape and Chionia had suffered already.
      - type: text
        text: In the island of Lesbos, suffered five holy martyrs.
      - type: text
        text: On the same day the holy martyr Zeno, who was flayed, daubed over with pitch, and cast into the fire.
      - type: text
        text: In Africa, [in the year 559 or 570,] suffered the holy martyrs who were massacred in church upon Easter day, in the persecution under the Arian king Genseric. Among them was the Reader, who was shot with an arrow through the neck, as he was in the pulpit singing the Alle​luja.
      la:
      - type: text
        text: Nonis Aprílis
      - type: text
        text: ''
      - type: text
        text: Venétiæ, in Británnia minóre, sancti Vincéntii, cognoménto Ferrérii, ex Ordine Prædicatórum, Confessóris, qui, potens ópere et sermóne, multa míllia infidélium convértit ad Christum.
      - type: text
        text: In Africa pássio sanctórum Mártyrum, qui, in persecutióne Regis Ariáni Genseríci, in die Paschæ, in Ecclésia cæsi sunt; quorum Lector, dum in púlpito «A​llelúia» cantáret, sagítta in gútture transfíxus est.
      - type: text
        text: Eódem die sancti Zenónis Mártyris, qui, pice íllitus et in ignem coniéctus, et hasta in médio rogo vulnerátus, martýrio coronátus est.
      - type: text
        text: In Lesbo ínsula pássio sanctárum quinque Vírginum, quæ gládio martýrium consummárunt.
      - type: text
        text: Thessalonícæ sanctæ Irénes Vírginis, quæ, cum sacros Libros contra Diocletiáni edíctum occultásset, ídeo, post tolerántiam cárceris, sagítta percússa est et igne cremáta, iussu Dulcétii Prǽsidis; sub quo et soróres eius simul Agape et Chiónia passæ ántea fúerant.
      - type: text
        text: Palmæ, in ínsula Maiórica, sanctæ Catharínæ Thomas, Vírginis, Canoníssæ Reguláris ex Ordine sancti Augustíni, quam Pius Papa Undécimus in sanctárum Vírginum númerum rétulit.
  psalm.nonis-aug-sti-07d452ea7e:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 5th day of August is kept the dedication of the Church of St. Mary in the Snow upon the Esquiline Hill at Rome, [in the year 366.]
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 304,] twenty three holy martyrs, who, in the persecution under Diocletian, were beheaded on the old Salarian Way, and buried there at Cucumber Hill.
      - type: text
        text: At Augsburg, [in the year 304,] the holy martyr Afra. She was turned from paganism to Christ by the teaching of the holy Bishop Narcissus, and baptized with all her house, and for confessing Christ she was burnt.
      - type: text
        text: At Ascoli, in Picenum, [in the Marches of Ancona,] the holy Bishop and martyr Emygdius, who was ordained Bishop [of that see] by holy Pope Marcellus and sent thither to preach the Gospel, and he received a crown of martyrdom for confessing Christ, under the Emperor Diocletian.
      - type: text
        text: At Antioch, [in the year 362,] the holy soldier Eusignius. He was in the hundred and tenth year of his age when he cast in the teeth of the Emperor Julian the Apostate the faith of Constantine the Great, under whom he had served, and rebuked Julian himself for a renegade from the religion of his Fathers, whereupon Julian commanded him to be beheaded.
      - type: text
        text: Also, in Egypt, the holy martyrs Cantidius, Cantidian, and Sobel.
      - type: text
        text: At Chalons[-sur-Marne,] in Gaul, holy Memmius, a Roman citizen, whom the holy apostle Peter consecrated first Bishop of that city, and who led unto Gospel truth the people committed unto him.
      - type: text
        text: At Autun, [in the year 355,] blessed Cassian, Bishop [of that see.]
      - type: text
        text: At Teano, [in Italy, about the year 346,] holy Paris, Bishop [of that see.]
      - type: text
        text: In England, [in the year 642,] the holy Oswald, King of the Northumbrians, whose acts are written by the venerable Priest Bede, [and whose feast we keep upon the 9th day of the present month of August.]
      - type: text
        text: Upon the same day, [about the year 374,] holy Nonna, the mother of blessed Gregory of Nazianzus.
      la:
      - type: text
        text: Nonis Augústi
      - type: text
        text: ''
      - type: text
        text: Romæ, in Exquíliis, Dedicátio Basílicæ sanctæ Maríæ ad Nives.
      - type: text
        text: Cataláuni, in Gállia, sancti Mémmii, civis Románi, qui, a sancto Petro Apóstolo consecrátus illíus civitátis Epíscopus, pópulum sibi commíssum ad Evangélii veritátem perdúxit.
      - type: text
        text: Romæ pássio sanctórum Mártyrum vigínti trium, qui, in persecutióne Diocletiáni, via Salária véteri, cápite obtruncáti sunt, et, ad clivum Cucúmeris, ibídem sepúlti.
      - type: text
        text: Asculi, in Picéno, sancti Emýgdii, Epíscopi et Mártyris; qui, a sancto Marcéllo Papa Epíscopus ordinátus et illuc ad prædicándum Evangélium missus, ibídem, in confessióne Christi, sub Diocletiáno Imperatóre, martýrii corónam accépit.
      - type: text
        text: Antiochíæ sancti Eusígnii mílitis, qui annum agens centésimum décimum, cum Constantíni Magni fidem, sub quo militáverat, Iuliáno Apóstatæ exprobráret, eúmque ut pátriæ pietátis desertórem redargúeret, ab eódem iussus est cápite cædi.
      - type: text
        text: Item sanctórum Mártyrum Ægyptiórum Cantídii, Cantidiáni et Sobélis.
      - type: text
        text: Augústæ Vindelicórum natális sanctæ Afræ Mártyris, quæ, cum esset pagána, per doctrínam sancti Narcíssi Epíscopi ad Christum est convérsa, et, cum ómnibus domus suæ membris, ab eódem Epíscopo baptizáta; póstmodum vero, ob Christi confessiónem igni trádita, martýrium suum, septem diébus ántequam beáta Hilária mater ac tres ancíllæ eódem cruciátus génere coronaréntur, felíciter explévit.
      - type: text
        text: Augustodúni beáti Cassiáni Epíscopi.
      - type: text
        text: Apud Theánum, in Campánia, sancti Páridis Epíscopi.
      - type: text
        text: In Anglia sancti Oswáldi Regis, cuius gesta sanctus Beda Venerábilis commémorat.
      - type: text
        text: Eódem die sanctæ Nonnæ, quæ fuit mater beatórum Gregórii Nazianzéni, Cæsárii et Gorgóniæ.
  psalm.nonis-dec-mbris-e54e4dddab:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep in England the feast of the holy Confessor Brian, first Bishop of Dorchester, of whom mention is made upon the 3rd day of this present month of December.
      - type: citation
        text: 'Upon the same 5th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Mutalasque, in Cappadocia, the holy Saba, Abbot (in Palestine in the year 531,) who shone in Palestine as a marvellous example of holiness, and toiled manfully for the Catholic faith against those that impugned the holy Council of Chalcedon, (held in the year 451.)
      - type: text
        text: At Thebeste, in Africa, holy Crispina, (of Thagara,) a woman of very high rank, who refused to sacrifice to idols, in the days of the Emperors Diocletian and Maximian, and was therefore beheaded by command of the Pro-consul Anolinus, (in the year 304.) Holy Augustin doth oftentimes speak in her praise.
      - type: text
        text: At Thagara, in Africa, the holy martyrs Julius, Potamia, Crispin, Felix, Gratus, and seven others.
      - type: text
        text: At Nice, upon the river Var, holy Bassus, Bishop (of that see, in the third century.) In the persecution under the Emperors Decius and Valerian the President Perennius caused him for Christ's faith's sake to be racked, burnt with plates of white-hot metal, beaten with cudgels and loaded scourges, cast into the fire, and when he came out therefrom unharmed, to be pierced with two nails, and so he achieved an illustrious martyrdom.
      - type: text
        text: At Pavia, the holy martyr Dalmatius, Bishop (of that see,) who suffered in the persecution under the Emperor Maximian, (in the year 304.)
      - type: text
        text: At Pentinia, in the Abruzzi, the holy martyr Pelinus, Bishop of Brindisi.
      - type: text
        text: In the days of the Emperor Julian the Apostate a temple of Mars fell down in answer to his prayer, wherefore the heathen priests beat him direfully, and he earned the crown of martyrdom by eighty-five wounds, (about the year 362.)
      - type: text
        text: Likewise, (in the sixth century,) the holy martyr Anastasius, whose desire for martyrdom caused him to show himself of his own will to the persecutors.
      - type: text
        text: At Trier, (about the year 566,) holy Nicetius, Bishop (of that see,) a man of wonderful holiness. (Two of his works are still extant.)
      - type: text
        text: At Polybotus, in Asia, holy John, called the Wonder-worker, Bishop (of that see in the time of the Emperor Leo the Isaurian.)
      la:
      - type: text
        text: Nonis Decémbris
      - type: text
        text: ''
      - type: text
        text: In Iudǽa sancti Sabbæ Abbátis, in óppido Cappadóciæ Mútala orti, qui miro sanctitátis exémplo refúlsit, et pro fide cathólica, advérsus impugnántes sanctam Sýnodum Chalcedonénsem, strénue laborávit, ac tandem in ea diœcésis Hierosolymitánæ laura, quæ ipsíus sancti Sabbæ nómine póstmodum est insigníta, requiévit in pace.
      - type: text
        text: Níciæ, apud Varum flúvium, sancti Bassi Epíscopi, qui, in persecutióne Décii et Valeriáni, a Perénnio Prǽside, ob Christi fidem, equúleo tortus, láminis candéntibus ustus, fústibus et scorpiónibus cæsus, in ignem missus, et, cum inde evasísset illǽsus, duóbus clavis confíxus, illústre martýrium consummávit.
      - type: text
        text: Pápiæ sancti Dalmátii, Epíscopi et Mártyris; qui in persecutióne Maximiáni passus est.
      - type: text
        text: Corfínii, in Pelígnis, sancti Pelíni, Epíscopi Brundusíni, qui, cum ob eius oratiónem, sub Iuliáno Apóstata, templum Martis corruísset, a templórum Pontifícibus diríssime cæsus est, atque, octogínta et quinque vulnéribus confóssus, martýrii corónam proméruit.
      - type: text
        text: Item sancti Anastásii Mártyris, qui, præ ardóre martýrii, sponte se persecutóribus óbtulit.
      - type: text
        text: Thagúræ, in Africa, sanctórum Mártyrum Iúlii, Potámiæ, Crispíni, Felícis, Grati et aliórum septem.
      - type: text
        text: Thebéste, in Numídia, sanctæ Crispínæ, nobilíssimæ féminæ, quæ, tempóribus Diocletiáni et Maximiáni, cum sacrificáre nollet, iussu Anolíni Procónsulis decolláta est; quam sanctus Augustínus sæpe láudibus celébrat.
      - type: text
        text: Tréviris sancti Nicétii Epíscopi, miræ sanctitátis viri.
      - type: text
        text: Polýboti, in Asia, sancti Ioánnis Epíscopi, cognoménto Thaumatúrgi.
  psalm.nonis-febru-rii-e86625002e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 5th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Catania, in Sicily, (in the year 251) the holy Virgin and martyr Agatha. In the time of the Emperor Decius, under the Judge Quinctian, she endured buffeting and imprisonment, racking and torments. Her breasts were cut off, and she was rolled upon potsherds and coals, and at last died in prison, in prayer to God.
      - type: text
        text: In Pontus, are commemorated very many holy martyrs in the persecution under the Emperor Maximian, (fourth century.) Some had molten lead poured upon them, some were tortured by having sharp reeds thrust under their nails, and were tormented with many most grievous sufferings, which were renewed again and again, and so by their illustrious passion earned palms and crowns from the Lord.
      - type: text
        text: At Alexandria, the holy martyr Isidore, who in the persecution under the Emperor Decius was beheaded by Numerian, chief of the army, for Christ's faith's sake.
      - type: text
        text: In the empire of Japan, [in the year 1597] twenty-six holy martyrs, [some Franciscans, some their pupils, and three Jesuits killed at Nagasaki,] who were crucified, and then died gloriously, transfixed with spears, while they were praising God and proclaiming His Gospel, whose names were enrolled among those of the saints by the supreme Pontiff Pius IX.
      - type: text
        text: At Vienne, (in Dauphinais,) the blessed Confessor Avitus, (in the year 525,) Bishop of that see, by whose faith, labour, and wonderful teaching Gaul was shielded against the Arian heresy.
      - type: text
        text: At Brixen, holy Genuinus, (or Ingenuinus, in the year 640,) Bishop (of Siben, in the Tyrol,) and Albinus, (in the year 1015,) Bishop [of Brixen,] whose lives were rendered glorious by miracles.
      la:
      - type: text
        text: Nonis Februárii
      - type: text
        text: ''
      - type: text
        text: Cátanæ, in Sicília, natális sanctæ Agáthæ, Vírginis et Mártyris; quæ, tempóribus Décii Imperatóris, sub Quinctiáno Iúdice, post álapas et cárcerem, post equúleum et torsiónes, post mamillárum abscissiónem, post volutatiónem in téstulis et carbónibus, tandem in cárcere, Deum precans, consummáta est.
      - type: text
        text: Nangasáchii, in Iapónia, pássio vigínti sex Mártyrum, e quibus tres Sacerdótes atque unus Cléricus et duo Láici ad Ordinem Minórum, tres, et in eis unus quidem Cléricus, ad Societátem Iesu, ac septémdecim ad tértium sancti Francísci Ordinem revocántur. Hi omnes pro cathólica fide, in crucem acti et lanceárum íctibus perfóssi, inter divínas laudes eiusdémque fídei prædicatiónem, glorióse occubuérunt; et a Pio nono, Pontífice Máximo, Sanctórum fastis adscrípti sunt.
      - type: text
        text: In Ponto commemorátio plurimórum sanctórum Mártyrum, in persecutióne Maximiáni; quorum álii plumbo liquénti perfúsi, álii acútis arundínibus in únguibus cruciáti, ac multis horréndis vexáti torméntis, iisdémque sǽpius iterátis, palmas a Dómino et corónas illústri passióne meruérunt.
      - type: text
        text: Alexandríæ sancti Isidóri, mílitis et Mártyris; qui, in persecutióne Décii, a Numeriáno, exércitus Duce, ob Christi fidem, cápite cæsus est.
      - type: text
        text: Viénnæ beáti Avíti, Epíscopi et Confessóris, cuius fide, indústria atque admirábili doctrína ab Ariánæ hǽresis infestatióne sunt Gálliæ defénsæ.
      - type: text
        text: Sabióne, in Rhǽtia secúnda, sancti Ingenuíni Epíscopi, cuius vita miráculis éxstitit gloriósa. Sacrum vero ipsíus corpus Brixinónem póstea translátum fuit, ibíque honorífice asservátum.
      - type: text
        text: Brixinóne sancti Albuíni Epíscopi, qui eam in civitátem e Sabióne Cáthedram Episcopálem tránstulit, et ibídem, virtútum signis émicans, migrávit ad Dóminum.
  psalm.nonis-i-lii-05361b5e2b:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the translation of the holy martyr Thomas, Archbishop of Canterbury. [On the which 7th day of July, in the year of our Lord 1223, his body was raised from its grave in the crypt of Canterbury Cathedral and placed in a shrine.]
      - type: citation
        text: 'Upon the same 7th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Claudius the book-keeper, Nicostratus the chief clerk, Castorius, Victorinus, and Symphorianus, whom holy Sebastian brought to believe in Christ and the blessed Priest Polycarp baptized. Fabian the judge ordered them to be arrested while they were seeking the bodies of holy martyrs, and troubled them for ten days with threats and cajolery. When he found that he was in nowise able to move them, he ordered them to be tortured and afterwards to be cast into the sea, [in the year 302.]
      - type: text
        text: At Durazzo, in Macedonia, the holy martyrs Peregrin, Lucian, Pompey, Hesychius, Papius, Saturninus, and German. These were Italians by nation, and fled to Durazzo during the persecution under Trajan. When they came thither they saw holy Bishop Astius hanging upon the cross for Christ's faith's sake, whereupon they openly confessed themselves to be Christians, and by command of the President they were first tried and then drowned in the sea.
      - type: text
        text: At Perugia, the blessed Pope Benedict XI, surnamed Tarvisini, a Friar of the Order of Preachers, who in the short while of his Papacy did wondrous much for the peace of the Church, the restoration of discipline, and the increase of religion. [He died at Perugia in 1304, after reigning eight months and some days.]
      - type: text
        text: At Alexandria, the holy Pantaenus. He was a man apostolic and adorned with all wisdom. Such was his use and love toward the Word of God that he went glowing with faith and earnestness to preach the gospel of Christ to the nations that are in the uttermost parts of the East. Thence he returned to Alexandria, and there at length he fell asleep, under the Emperor Antoninus Caracalla, [in the year 214.]
      - type: text
        text: At Brescia, the holy Confessor Apollonius, Bishop [of that see, second century.]
      - type: text
        text: In Saxony, holy Willibald, first Bishop of Eichstatt, who laboured in the Gospel along with holy Boniface and turned many peoples to Christ, [he died in the year 786,] whose feast we keep upon the 9th day of this present month of July.
      - type: text
        text: '[At Clermont,] in Auvergne, holy Illidius, Bishop [of that same See,] [in the year 385.]'
      - type: text
        text: At Urgel, in Spain, holy Odo, Bishop [of that see,] [in the year 1122.]
      - type: text
        text: In England, holy Hedda, [a monk of the monastery of St. Hilda,] Bishop of the West Saxons. [In the year 676 he lived first at Dorchester, but afterwards removed his see to Winchester. He governed his church with great holiness for about thirty years, and departed to the Lord in the year 705.]
      - type: text
        text: At Gray, in Burgundy, blessed Peter Foreri, a Canon Regular of the Order of the Most Holy Saviour, famous for graces and miracles, [in the year 1640.]
      - type: text
        text: In England, the holy Virgin Eadelburg, daughter of [Anna,] King of the East Angles. [She became a nun, and finally Abbess, in the monastery of Ferremontier, in the forest of Brie, in France, about the year 695.]
      la:
      - type: text
        text: Nonis Iúlii
      - type: text
        text: ''
      - type: text
        text: Sanctórum Episcopórum et Confessórum Cyrílli et Methódii fratrum, quorum natális respectíve ágitur sextodécimo Kaléndas Mártii et octávo Idus Aprílis.
      - type: text
        text: Romæ sanctórum Mártyrum Cláudii Commentariénsis, Nicostráti primiscrínii, qui fuit vir beátæ Mártyris Zoæ, Castórii, Victoríni et Symphoriáni; quos omnes sanctus Sebastiánus ad fidem Christi perdúxit, et beátus Polycárpus Présbyter baptizávit. Eósdem, in perquiréndis sanctórum Mártyrum corpóribus occupátos, Fabiánus Iudex comprehéndi iussit, et, cum eos, per decem dies minis et blandítiis exágitans, in nullo pénitus posset commovére, iussit tértio torquéri, ac póstea in mare præcípites dari.
      - type: text
        text: Dyrráchii, in Macedónia, sanctórum Mártyrum Peregríni, Luciáni, Pompéii, Hesýchii, Pápii, Saturníni et Germáni; qui, natióne Itáli, in persecutióne Traiáni, cum ad eam urbem confugíssent, et ibi sanctum Astíum Epíscopum, pro fide Christi, in cruce pendéntem vidérent, ac se páriter Christiános esse palam confiteréntur, ídeo, Prǽsidis iussu, tenti sunt atque in mare demérsi.
      - type: text
        text: Bríxiæ sancti Apollónii, Epíscopi et Confessóris.
      - type: text
        text: Eystádii, in Germánia, sancti Willebáldi, eiúsdem urbis primi Epíscopi, qui fílius éxstitit sancti Richárdi, Anglórum Regis, et frater sanctæ Walbúrgæ Vírginis; atque, una cum sancto Bonifátio, labórans in Evangélio, multas gentes convértit ad Christum.
      - type: text
        text: Arvérnis, in Gállia, sancti Illídii Epíscopi.
      - type: text
        text: Urgéllæ, in Hispánia Tarraconénsi, sancti Odónis Epíscopi.
      - type: text
        text: In Anglia sancti Heddæ, Epíscopi Sáxonum occidentálium.
      - type: text
        text: Alexandríæ natális sancti Pantǽni, viri Apostólici et omni sapiéntia adornáti, cui tantum stúdii et amóris erga verbum Dei fuit, ut étiam ad prædicándum Christi Evangélium géntibus quæ in Oriéntis últimis secéssibus recondúntur, fídei et devotiónis calóre succénsus, proféctus sit; ac demum, Alexandríam revérsus, ibi, sub Antoníno Caracálla, in pace quiévit.
      - type: text
        text: Eboriáci, in território Meldénsi, sanctæ Edilbúrgæ, Abbatíssæ et Vírginis, Anglórum Regis fíliæ.
      - type: text
        text: Perúsiæ Beáti Benedícti Papæ Undécimi, Tarvisíni, ex Ordine Prædicatórum, Confessóris; qui, brevi Pontificátus sui spátio, Ecclésiæ pacem, disciplínæ restauratiónem, religiónis increméntum mirífice promóvit.
  psalm.nonis-i-nii-057708c0d0:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 5th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Holy Boniface, Archbishop of Mainz. He came from England to Rome, and was sent by Gregory II into Germany to preach the faith of Christ to those nations, and he earned the title of Apostle of the Germans by turning a vast multitude, more especially of Frisians, to the religion of Christ. At last he, along with Eoban and some other servants of God in Friesland, received martyrdom by the sword at the hand of raging heathens.
      - type: text
        text: In Egypt, the holy martyrs Martian, Nicanor, Apollonius, and others, who finished an illustrious testimony, in the persecution under Galerius Maximian.
      - type: text
        text: At Perugia, the holy martyrs Florence, Julian, Cyriacus, Marcellinus, and Faustinus, who were beheaded in the persecution under Decius.
      - type: text
        text: At Caesarea, in Palestine, the holy Zenais, Cyria, Valeria, and Marcia, who with rejoicing attained unto martyrdom through many torments.
      - type: text
        text: At Tyre, the holy Priest Dorotheus. He suffered much under Diocletian, but survived till the time of Julian, in whose reign, and the hundred and seventh year of his own age, he crowned his venerable years with the glory of martyrdom.
      - type: text
        text: At Cordova, in Spain, the holy lad Sancho, who was brought up in the Royal Court, but in the persecution under the Arabs for Christ’s faith's sake accepted martyrdom without shrinking.
      la:
      - type: text
        text: Nonis Iúnii
      - type: text
        text: ''
      - type: text
        text: In Frísia sancti Bonifátii, Epíscopi Moguntíni et Mártyris. Hic de Anglia Romam venit, indéque a beáto Gregório Papa Secúndo in Germániam missus est ut Christi fidem illis géntibus evangelizáret, et, cum máximam ibi multitúdinem, præsértim Frísonum, Christiánæ religióni subiugásset, Germanórum Apóstolus méruit appellári; novíssime in Frísia, a furéntibus Gentílibus gládio perémptus, una cum Eobáno Coepíscopo et quibúsdam áliis servis Dei, martýrium consummávit.
      - type: text
        text: Tyri, in Phœnícia sancti Doróthei Presbýteri, qui, sub Diocletiáno, multa passus est; et, usque ad Iuliáni témpora supérstes, sub eo, annum agens séptimum supra centésimum, venerándam senéctam martýrio honestávit.
      - type: text
        text: In Ægýpto natális sanctórum Mártyrum Marciáni, Nicánoris, Apollónii et aliórum, qui, in persecutióne Galérii Maximiáni, illústre martýrium consummárunt.
      - type: text
        text: Perúsiæ sanctórum Mártyrum Floréntii, Iuliáni, Cyríaci, Marcellíni et Faustíni, qui omnes, in persecutióne Décii Imperatóris, cápite cæsi sunt.
      - type: text
        text: Córdubæ, in Hispánia, beáti Sáncii adolescéntis, qui, etsi in aula régia educátus, pro Christi tamen fide, in persecutióne Arábica, martýrium subíre non dubitávit.
      - type: text
        text: Cæsaréæ, in Palæstína, pássio sanctárum Zenáidis, Cýriæ, Valériæ et Márciæ; quæ, per multa torménta, gaudéntes ad martýrium pervenérunt.
  psalm.nonis-ianu-rii-7d3133c332:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Eve of the Epiphany of the Lord, the same day is the Octave of the holy martyr Thomas, Archbishop of Canterbury.
      - type: citation
        text: 'Upon the same 5th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Pope Telesphorus, who toiled much for Christ, and under the Emperor Antoninus Pius obtained by his testimony a glorious martyrdom.
      - type: text
        text: In Egypt are commemorated many holy martyrs who were slain in the Thebaid in diverse ways, in the persecution under the Emperor Diocletian.
      - type: text
        text: At Antioch, the holy monk Simeon, who lived for many years standing upon a pillar, whence he is called Stylitis (from the Greek style, which is being interpreted a pillar), whose life and conversation was wonderful (in the year 459).
      - type: text
        text: In England, the holy King Edward, famous for his gift of chastity and of the power of working miracles. By command of Pope Innocent XI his feast is kept upon the 13th day of October, which is the day of the translation of his sacred body (in the year 1066.)
      - type: text
        text: At Alexandria (in the fourth century), holy Syncletica, whose noble acts holy Athanasius hath set before us in his writing.
      - type: text
        text: At Rome, the holy virgin Emiliana, father's sister to holy Gregory the Great. Her sister Tharsilla, who had gone to God before her, came and called her, and upon the same day she passed hence to be for ever with the Lord (sixth century).
      - type: text
        text: Upon the same day, the holy virgin Apollinaris (about the year 440).
      la:
      - type: text
        text: Nonis Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Telésphori, Papæ et Mártyris; qui, sub Antoníno Pio, post multos labóres, pro Christi confessióne, illústre martýrium duxit.
      - type: text
        text: In Anglia natális sancti Eduárdi, Regis Anglórum et Confessóris; qui virtúte castitátis et grátia miraculórum fuit insígnis. Eius autem festívitas, ex decréto Innocéntii Papæ Undécimi, tértio Idus Octóbris, quo die sacrum eius corpus translátum fuit, potíssimum celebrátur.
      - type: text
        text: In Ægýpto commemorátio plurimórum sanctórum Mártyrum, qui in Thebáide, sub persecutióne Diocletiáni, divérso tormentórum génere cæsi sunt.
      - type: text
        text: Antiochíæ sancti Simeónis Mónachi, qui, multos annos in colúmna stans vixit, unde et Stylítæ cognómen accépit; cuius vita et conversátio éxstitit admirábilis.
      - type: text
        text: Romæ sanctæ Æmiliánæ Vírginis, amitæ sancti Gregórii Papæ; quæ, vocánte Tharsílla soróre, quæ ad Deum præcésserat, hac ipsa die migrávit ad Dóminum.
      - type: text
        text: Alexandríæ sanctæ Syncléticæ Vírginis, cuius res præcláre gestas sanctus Athanásius monuméntis litterárum commendávit.
      - type: text
        text: In Ægýpto sanctæ Apollináris Vírginis.
  psalm.nonis-m-rtii-3f9f601933:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 7th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In the monastery of Fossa Nuova, near Terracina, the holy Confessor Thomas of Aquino, [in the year 1274,] of the Order of Friars Preachers, Doctor of the Church, illustrious for the nobility of his birth, the holiness of his life, and the depth of his knowledge of theology. Leo XIII declared him the patron in heaven of all Catholic schools.
      - type: text
        text: At Tuburbe, in Morocco, under the Emperor Severus, the holy martyrs Perpetua and Felicitas. Felicitas was with child, and therefore was respited, in accordance with the law, until after she was delivered. Holy Augustine saith that when she was in travail she had sorrow, but when she was set before the wild beasts she rejoiced. There suffered along with them Revocatus, Saturninus, and Secundolus, of whom the last died in prison, but the others were all killed by beasts.
      - type: text
        text: At Caesarea, in Palestine, the holy martyr Eubulus. He was a Companion of holy Hadrian, and two days after him was mangled by the lions and then despatched with the sword, being the last of all those who received the crown of martyrdom in that city, [in the year 308.]
      - type: text
        text: At Nicomedia, holy Theophilus, Bishop of that see, who for his honouring of holy images was sent into exile and there died, [in the year 845.]
      - type: text
        text: At Pelusium, in Egypt, holy Paul, Bishop of that see, who likewise died in exile for the same cause.
      - type: text
        text: At Brescia, [in the year 445,] the holy Confessor Gaudiosus, Bishop of that see.
      - type: text
        text: In the Thebaid, [in the fourth century,] holy Paul, surnamed the Simple.
      la:
      - type: text
        text: Nonis Mártii
      - type: text
        text: ''
      - type: text
        text: In monastério Fossæ Novæ, prope Tarracínam, in Campánia, sancti Thomæ Aquinátis, Confessóris et Ecclésiæ Doctóris, ex Ordine Prædicatórum, nobilitáte géneris, vitæ sanctitáte et Theológiæ sciéntia illustríssimi; quem Leo Papa Décimus tértius cæléstem Scholárum ómnium catholicárum Patrónum declarávit.
      - type: text
        text: Carthágine natális sanctárum Perpétuæ et Felicitátis Mártyrum; e quibus Felícitas, cum esset prægnans (ut sanctus Augustínus ait), iuxta leges exspectáta ut páreret, dum parturiébat, dolébat, obiécta feris gaudébat. Passi quoque sunt cum eis Sátyrus, Saturnínus, Revocátus et Secúndulus; quorum últimus quiévit in cárcere, réliqui omnes a váriis béstiis sunt vexáti, ac demum gládiorum íctibus confécti, sub Sevéro Príncipe. Sanctárum vero Perpétuæ et Felicitátis festum prídie huius diéi recólitur.
      - type: text
        text: Cæsaréæ, in Palæstína, pássio sancti Eubúli, qui fuit sócius sancti Hadriáni, atque, bíduo post illum, laniátus a leónibus et gládio trucidátus, martýrii corónam, últimus ómnium in ea civitáte, accépit.
      - type: text
        text: Nicomedíæ sancti Theóphili Epíscopi, qui, ob cultum sanctárum Imáginum in exsílium pulsus, illic defúnctus est.
      - type: text
        text: Pelúsii, in Ægýpto, sancti Pauli Epíscopi, qui, eándem ob causam, exsul occúbuit.
      - type: text
        text: Bríxiæ sancti Gaudiósi, Epíscopi et Confessóris.
      - type: text
        text: In Thebáide sancti Pauli, cognoménto Símplicis.
      - type: text
        text: Floréntiæ, in Etrúria, sanctæ Terésiæ Margarítæ Redi, Vírginis, Ordinis Carmelitárum Excalceatárum, vitæ puritáte ac simplicitáte admirábilis, quam Pius Papa Undécimus, sanctárum Vírginum albo adscrípsit.
  psalm.nonis-nov-mbris-8c0feed587:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 5th day of November are commemorated the holy Zacharias, Priest and Prophet, father of the blessed Baptist John, and holy Elizabeth, mother of the same most holy Forerunner.
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Terracina, in Campania, the holy martyrs Felix, a Priest, and Eusebius, a Monk. This Eusebius buried the holy martyrs Julian and Caesarius, and turned many to believe in Christ who were baptized by the holy Priest Felix. He and Felix were therefore tried together and both led before the seat of the judge, where neither was overcome, but were committed to prison together, and the same night, since they refused to sacrifice, they were beheaded.
      - type: text
        text: At Emesa, in Phoenicia, the holy martyrs Galation, and Epistemis, his wife. In the persecution under Decius they were heavily flogged, and their hands, feet, and tongues mutilated, whereafter they were beheaded, and so finished their testimony.
      - type: text
        text: Also under the Emperor Maximin, the holy martyrs Domninus, Theotimus, Philotheus, Silvanus, and their Companions.
      - type: text
        text: At Milan, the holy Confessor Magnus, Bishop (of that see, in the year 529.)
      - type: text
        text: At Brescia, holy Dominator, Bishop (of that see.)
      - type: text
        text: At Trier, (about the year 500,) holy Fibitius, who from being Abbot was made Bishop of that city.
      - type: text
        text: At Orleans, in Gaul, the holy Confessor Laetus, a Priest, (in the year 534.)
      la:
      - type: text
        text: Nonis Novémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Zacharíæ, Sacerdótis et Prophétæ, qui pater éxstitit beáti Ioánnis Baptístæ, Præcursóris Dómini.
      - type: text
        text: Item sanctæ Elísabeth, eiúsdem sanctíssimi Præcursóris matris.
      - type: text
        text: Tarracínæ, in Campánia, natális sanctórum Mártyrum Felícis Presbýteri, et Eusébii Mónachi. Ex his Eusébius, cum sepelísset sanctos Mártyres Iuliánum et Cæsárium, et multos convérteret ad fidem Christi, quos sanctus Felix Présbyter baptizábat, una cum ipso Felíce tentus est; et, ad Iúdicis forum ducti nec superáti, inde in cárcerem inclúsi, ambo, nocte eádem, cum sacrificáre noluíssent, decolláti sunt.
      - type: text
        text: Eméssæ, in Phœnícia, sanctórum Mártyrum Galatiónis et Epistémis cóniugis, qui in Décii persecutióne, flagris cæsi, mánibus pedibúsque et lingua ínsuper mutiláti, dénique, truncáto cápite, martýrium consummárunt.
      - type: text
        text: Item sanctórum Mártyrum Domníni, Theótimi, Philóthei, Silváni et Sociórum, sub Maximíno Imperatóre.
      - type: text
        text: Medioláni sancti Magni, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Dominatóris Epíscopi.
      - type: text
        text: Tréviris sancti Fibítii, qui ex Abbáte factus est eiúsdem civitátis Epíscopus.
      - type: text
        text: Aureliánis, in Gállia, sancti Læti, Presbýteri et Confessóris.
  psalm.nonis-oct-bris-aaabb7b30e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 7th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Ardeatine Way, (in the year 336,) the holy Confessor, Pope Mark, (who succeeded Sylvester I, and reigned 8 months and 20 days.)
      - type: text
        text: In the district called Rasaphe, in Syria, the holy martyrs Sergius and Bacchus, noble Roman officers under the Emperor Maximian. Bacchus was lashed with strips of raw hide till his whole body was cut into ribbons, and so, still confessing Christ, gave up the ghost. Sergius had his legs tortured in the boots, but remaining firm in the faith, sentence was given on him that he should be beheaded. The place where he sleepeth was called after him Sergiopolis instead of Rasaphe, (by command of the Emperor Justinian,) and thither Christians do greatly resort on account of famous miracles.
      - type: text
        text: At Rome, the holy martyrs Marcellus and Apuleius, who were first disciples of Simon Magus, but afterward, seeing the wonders which the Lord wrought by the Apostle Peter, became disciples of the Apostle, and, after he had suffered, won the crown of martyrdom under the Consular Aurelian. They are buried not far from the city.
      - type: text
        text: At Rasaphe also, the holy Virgin Julia, who gained martyrdom under the President Marcian.
      - type: text
        text: At Padua, the holy Virgin and martyr Justina, who was baptized by blessed Prosdocimus, a disciple of the holy Apostle Peter. Forasmuch as she stood firm in the faith of Christ, the President Maximus caused her to be run through with the sword, and she passed away hence to be ever with the Lord.
      - type: text
        text: At Bourges, (about the year 560,) the holy Priest and Confessor Augustus.
      - type: text
        text: At Reims, (in the sixth century,) the holy Priest Helanus.
      - type: text
        text: Upon the same day is made the memorial of St. Mary, styled of Victory, the yearly observance of which memorial the Supreme Pontiff blessed Pius V. ordained on account of the famous victory gained by the Christians over the Turks upon this day in the sea-fight of Lepanto, by the help of the aforesaid Mother of God, and Gregory XIII instituted the yearly solemn feast of the same most Blessed Virgin to be kept upon the first Lord's Day in this present month of October.
      la:
      - type: text
        text: Nonis Octóbris
      - type: text
        text: ''
      - type: text
        text: Festum beátæ Maríæ Vírginis a Rosário; itémque sanctæ Maríæ de Victória commemorátio, quam sanctus Pius Quintus, Póntifex Máximus, ob insígnem victóriam a Christiánis bello naváli, eiúsdem sanctíssimæ Dei Genitrícis auxílio, hac ipsa die de Turcis reportátam, quotánnis fíeri instítuit.
      - type: text
        text: Romæ, via Ardeatína, deposítio sancti Marci, Papæ et Confessóris.
      - type: text
        text: In Província quæ nuncupátur Augústa Euphratésia, sanctórum Mártyrum Sérgii et Bacchi, nobílium Romanórum, sub Maximiáno Imperatóre. Ex his Bacchus támdiu nervis crudis cæsus est, quoadúsque, toto córpore discíssus, in Christi confessióne emítteret spíritum; Sérgius vero clavátis cothúrnis pedes indútus, et, cum in fide fixus manéret, data senténtia, iussus est decollári. Beáti autem Sérgii nómine locus ubi quiéscit, Sergiópolis appellátus est, et, ob præclára mirácula, frequénti Christianórum concúrsu honorátur. Eórum autem memória sequénti die recólitur.
      - type: text
        text: Romæ sanctórum Mártyrum Marcélli et Apuléii, qui prius quidem Simóni mago adhæsérunt; sed, vidéntes mirabília quæ per Apóstolum Petrum Dóminus operabátur, ambo, relícto Simóne, se doctrínæ Apostólicæ tradidérunt, ac, post passiónem Apostolórum, sub Aureliáno Consulári, corónam martýrii reportárunt, sepultíque sunt non longe ab Urbe. Eórum autem memória sequénti die recólitur.
      - type: text
        text: Item apud Augústam Euphratésiam sanctæ Iúliæ Vírginis, quæ, sub Marciáno Prǽside, martýrium consummávit.
      - type: text
        text: Patávii sanctæ Iustínæ, Vírginis et Mártyris; quæ, a beáto Prosdócimo, sancti Petri discípulo, baptizáta, et, cum in fide Christi constánter persísteret, Máximi Prǽsidis iussu, transverberáta gládio, migrávit ad Dóminum.
      - type: text
        text: Apud Bitúricas, in Aquitánia, sancti Augústi Presbýteri et Confessóris.
      - type: text
        text: In pago Rheménsi sancti Heláni Presbýteri.
      - type: text
        text: In Suécia Translátio córporis sanctæ Birgíttæ Víduæ.
  psalm.nonis-sept-mbris-3efe72ab9a:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Lawrence Giustiniani, first Patriarch of Venice, who adorned by graces and by the glory of miracles that Episcopal see which, upon the 5th day of September, he was compelled against his own will to occupy. His birth into the better life is mentioned upon the 8th day of January.
      - type: citation
        text: 'Upon the same 5th day of September, were born into the better life:'
      - type: text
        text: At Rome, in the suburb, the blessed martyr Victorinus, Bishop of Amiternum, (now called after him San Vittorino.) He was famous for holiness and miracles, and was chosen to the see of that city by the voice of all the people thereof. Afterwards, under Nerva-Trajan, he was sent, along with other servants of God, to Cutilia, where there is a pool of stinking sulphurous waters, and where the judge Aurelian ordered him to be hung up with his head downwards this torment he suffered for the space of three days, for Christ's name's sake, and then departed in triumph, gloriously crowned to be ever with the Lord. The Christians carried off his hody, and buried it honourably at Amiternum.
      - type: text
        text: At Porto, (in the second century,) the holy martyr Herculan.
      - type: text
        text: At Capua, the holy martyrs Quintius, Arcontius, and Donatus.
      - type: text
        text: Upon the same day holy Romulus, Praefect of the Palace to the Emperor Trajan he denounced the cruelty of that Emperor against the Christians, and for that cause was first beaten with rods and then beheaded.
      - type: text
        text: At Melitina, in Armenia, the holy soldiers Eudoxius, Zeno, Macarius, and their Companions, one thousand one hundred and four in number, who in the persecution under the Emperor Diocletian renounced their military service, and were massacred for confessing Christ.
      - type: text
        text: At Constantinople, the holy martyrs Urban, Theodore, Menedem, and their Companions, seventy-seven in number, of the ecclesiastical state, who under the Emperor Valens, for the Catholic faith's sake, were put on board a ship and burnt at sea.
      - type: text
        text: At the monastery of Sithiu, in the country of Thérouanne, (in the eighth century,) the holy Abbot Bertin.
      - type: text
        text: At Toledo, the holy Virgin Obdulia.
      la:
      - type: text
        text: Nonis Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Lauréntii Iustiniáni, primi Patriárchæ Venetiárum et Confessóris, qui pontificálem Cáthedram hac die invítus ascéndit, et sexto Idus Ianuárii obdormívit in Dómino.
      - type: text
        text: Romæ, in suburbáno, beáti Victoríni, Epíscopi et Mártyris; qui, sanctitáte et miráculis clarus, sacerdótium Amiternínæ urbis, totíus pópuli electióne, adéptus est. Póstmodum, sub Nerva Traiáno, apud Cutílias, ubi puténtes et sulphúreæ emánant aquæ, cum áliis Dei servis, relegátus, ab Aureliáno Iúdice iussus est suspéndi cápite deórsum; idque cum per tríduum pro nómine Christi passus fuísset, tandem, glorióse coronátus, victor migrávit ad Dóminum. Eius corpus rapuérunt Christiáni, et honorífica sepultúra Amitérni, in Vestínis, condidérunt.
      - type: text
        text: Constantinópoli sanctórum Mártyrum Urbáni, Theodóri, Menedémi, et Sociórum septuagínta septem ex órdine ecclesiástico; qui a Valénte Imperatóre, pro fide cathólica, in navígio impósiti, iussi sunt in mari combúri.
      - type: text
        text: In Portu Románo pássio sancti Herculáni mílitis, qui, sub Gallo Imperatóre, ob Christi fidem cæsus flagris et cápite obtruncátus est.
      - type: text
        text: Cápuæ sanctórum Mártyrum Quínctii, Arcóntii et Donáti.
      - type: text
        text: Eódem die sancti Rómuli, qui, cum esset Traiáni aulæ prefectus ac sævítiam Imperatóris in Christiános detestarétur, cæsus est virgis, et cápite truncátus.
      - type: text
        text: Melitínæ, in Arménia, pássio sanctórum mílitum Eudóxii, Zenónis, Macárii, et Sociórum mille centum et quátuor; qui, cum abiecíssent milítiæ cíngulum, in persecutióne Diocletiáni, pro Christi confessióne necáti sunt.
      - type: text
        text: In pago Tarvanénsi, monastério Sithinénsi, in Gállia, sancti Bertíni Abbátis.
      - type: text
        text: Toléti, in Hispánia, sanctæ Obdúliæ Vírginis.
  psalm.nono-kal-ndas-apr-lis-4185aefd94:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 24th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Mark and Timothy, who were crowned with martyrdom under the Emperor Antonine.
      - type: text
        text: There also the holy martyr Epigmenius, a Priest, who was slain with the sword, by order of the judge Turpius, in the persecution under the Emperor Diocletian.
      - type: text
        text: Likewise at Rome, the blessed martyr Pigmenius, a Priest, who was cast into the river Tiber for Christ's faith's sake, under the Emperor Julian the Apostate.
      - type: text
        text: 'At Caesarea, in Palestine, were born into the better life: the holy martyrs Timolaus, Denis, Pausides, Romulus, Alexander, another Alexander, Agapius, and another Denis, who won crowns of life by the axe, under the president Urban, in the persecution under the Emperor Diocletian.'
      - type: citation
        text: 'In Morocco, were born into the better life: the holy brethren Romulus and Secundus, both martyrs, who suffered for Christ''s faith, [in the year 304.]'
      - type: text
        text: At Trent, the holy child Simeon, most cruelly murdered by the Jews, and who afterwards shone with many miracles, [in the year 1475.]
      - type: text
        text: At Synnada, in Phrygia, holy Agapitus, Bishop of that see, [under Maximin 234-238.]
      - type: text
        text: At Brescia, holy Latinus, Bishop of that see, [beginning of second century.]
      - type: text
        text: In Syria, the holy Confessor Seleucus.
      la:
      - type: text
        text: Nono Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Festum sancti Gabriélis Archángeli, qui ad annuntiándum Incarnatiónis divíni Verbi mystérium a Deo missus est.
      - type: text
        text: Romæ sancti Epigménii Presbýteri, qui, in persecutióne Diocletiáni, sub Túrpio Iúdice, gládio cæsus, martýrium consummávit.
      - type: text
        text: Ibídem pássio beáti Pigménii Presbýteri, qui, sub Iuliáno Apóstata, pro fide Christi, præcipitátus in Tíberim, necátus est.
      - type: text
        text: Item Romæ sanctórum Mártyrum Marci et Timóthei, qui martýrio coronáti sunt sub Antoníno Imperatóre.
      - type: text
        text: Cæsaréæ, in Palæstína, natális sanctórum Mártyrum Timolái, Dionýsii, Páusidis, Rómuli, Alexándri, altérius Alexándri, Agápii et altérius Dionýsii; qui, in persecutióne Diocletiáni, sub Urbáno Prǽside, secúris ictu percússi, vitæ corónas meruérunt.
      - type: text
        text: In Mauritánia item natális sanctórum fratrum Rómuli et Secúndi, qui pro Christi fide passi sunt.
      - type: text
        text: Tridénti pássio sancti Simeónis púeri, a Iudǽis sævíssime trucidáti, qui multis póstea miráculis coruscávit.
      - type: text
        text: Sýnnadæ, in Phrýgia, sancti Agapíti Epíscopi.
      - type: text
        text: Bríxiæ sancti Latíni Epíscopi.
      - type: text
        text: In Sýria sancti Seléuci Confessóris.
      - type: text
        text: In Suécia sanctæ Catharínæ Vírginis, quæ fuit fília sanctæ Birgíttæ.
  psalm.nono-kal-ndas-aug-sti-de73c1931a:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is the eve of the holy Apostle James. Upon the morrow also we keep the feast of the holy Confessor Alexis, son of the Senator Euphemian. Upon the first night of his marriage he left his bride untouched, and absconded from his home. After a long pilgrimage he returned to the city, where he was received as a beggar out of charity in his own fathers house, and there remained unknown for seventeen years, thus deceiving the world by a new craft. After he was dead, [in the year 404,] in the Supreme Pontificate of Innocent I, he was recognised by a voice which was heard throughout the churches of the city and by his own writing, and his body was carried with the greatest honour to the Church of St Boniface, where he hath been illustrious for many miracles. Mention is made of him upon the 17th day of this present month of July.
      - type: citation
        text: 'Upon the same 24th day of July, was also born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Tyro, a city which stood formerly on an island, in the lake of Bolsena in Tuscany, in the persecution under the Emperor Diocletian, the holy Virgin and martyr Christina. She brake her father's idols of gold and silver, and gave the morsels to the poor whereupon he commanded her to be torn with stripes and otherwise fearfully tortured after which a great stone was tied about her neck, and she was cast into the lake but an angel delivered her. She then suffered bravely the sharpest torments under another judge, who succeeded her father, and in the end finished the course of her testimony under the President Julian, having endured a burning furnace, wherein she remained shut up unhurt for five days, having by Christ's power overcome serpents, having had her tongue cut out, and being lastly shot to death with arrows.
      - type: text
        text: At Rome, in the Tiburtine Way, the holy martyr Vincent.
      - type: text
        text: At San Vitturino, in Samnium, eighty-three holy martyrs, all soldiers.
      - type: text
        text: At Merida, in Spain, the holy soldier Victor, who, along with his two brothers Stercatius and Antinogenes, in the persecution under the Emperor Diocletian, by diverse torments finished their testimony.
      - type: text
        text: In Lycia, the holy martyrs Nicetas and Aquilina, who were turned to Christ by the preaching of the blessed martyr Christopher, and received the palm of martyrdom by being beheaded.
      - type: text
        text: Also the holy martyrs Meneus and Capiton.
      - type: text
        text: At Sens, [in the fourth century,] the holy Confessor Ursicinus, Bishop [of that see.]
      la:
      - type: text
        text: Nono Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Tyri, apud lacum Vulsínium, in Túscia, sanctæ Christínæ, Vírginis et Mártyris. Hæc Virgo, cum patris idóla áurea et argéntea, in Christum credens, comminuísset atque illórum frágmina paupéribus erogásset, eiúsdem patris iussu verbéribus dilaniáta est, aliísque supplíciis diríssime cruciáta, et cum magno saxi póndere in lacum proiécta, sed ab Angelo liberáta; deínde, sub alio Iúdice, patris sui successóre, acerbióra torménta constánter pértulit; novíssime, sub Iuliáno Prǽside, post fornácem ardéntem, ubi quinque diébus illǽsa permánsit, post serpéntes virtúte Christi superátos, martýrii sui cursum abscissióne linguæ et sagittárum infixióne complévit.
      - type: text
        text: Romæ, via Tiburtína, sancti Vincéntii Mártyris.
      - type: text
        text: Amitérni, in Vestínis, pássio sanctórum mílitum octogínta trium.
      - type: text
        text: Eméritæ, in Hispánia, sancti Victóris, viri militáris, qui, cum frátribus Stercátio et Antinógene, in persecutióne Diocletiáni, per divérsa supplícia martýrium consummávit.
      - type: text
        text: Item sanctórum Mártyrum Menéi et Capitónis.
      - type: text
        text: In Lýcia sanctárum Mártyrum Nicétæ et Aquilínæ, quæ, beáti Christóphori Mártyris prædicatióne ad Christum convérsæ, martýrii palmam obtruncatióne cápitis sumpsérunt.
      - type: text
        text: Apud Sénonas sancti Ursicíni, Epíscopi et Confessóris.
  psalm.nono-kal-ndas-dec-mbris-d37c79b8a6:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 23rd day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Pope Clement, he was the third, after the blessed Apostle Peter, who held the Papacy. In the persecution under the Emperor Trajan he was sent to the Crimea, where he was sunk in the sea with an anchor tied to his neck, and so received the crown of martyrdom. In the time of Pope Nicholas I his body was brought to Rome and honourably buried in the church which had already been built in his name.
      - type: text
        text: Likewise, at Rome, the holy martyr Felicity, mother of seven sons, who were all likewise martyrs. After they had suffered, the Emperor Mark Antonine commanded her also to be beheaded for Christ's sake.
      - type: text
        text: At Merida, in Spain, the holy Virgin and martyr Lucretia, who suffered martyrdom under the President Dacian, in the persecution under the Emperor Diocletian.
      - type: text
        text: At Cyzicus, on the Hellespont, the holy martyr Sisinius, who was slain with the sword, after suffering many torments, during the same persecution.
      - type: text
        text: At Iconium, in Lycaonia, holy Amphilochius, Bishop (of that see,) the fellow of holy Basil and Gregory of Nazianzus, in the desert and in the Episcopate. He went through many contendings for the Catholic faith's sake, but fell asleep at length in peace, famous for holiness and teaching.
      - type: text
        text: At Girgenti, in Sicily, (at the end of the sixth century,) deceased holy Gregory, Bishop (of that see.)
      - type: text
        text: In the country of Hesbaye/Haspengouw, (in the seventh century,) the holy Confessor Trudo, the Priest.
      - type: text
        text: At Mantua, blessed John Boni, of the Order of Hermits of Saint Augustine, whose illustrious life hath been written by holy Antonine.
      la:
      - type: text
        text: Nono Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Natális sancti Cleméntis Primi, Papæ et Mártyris, qui, tértius post beátum Petrum Apóstolum, Pontificátum ténuit, et, in persecutióne Traiáni, apud Chersonésum relegátus, ibi, alligáta ad eius collum ánchora, præcipitátus in mare, martýrio coronátur. Ipsíus autem corpus, Hadriáno Secúndo Summo Pontífice, a sanctis Cyríllo et Methódio frátribus Romam translátum, in Ecclésia quæ eius nómine ántea fúerat exstrúcta, honorífice recónditum est.
      - type: text
        text: Romæ sanctæ Felicitátis Mártyris, septem filiórum Mártyrum matris; quæ, post eos, iubénte Marco Antoníno Imperatóre, decolláta est pro Christo.
      - type: text
        text: Cýzici, in Hellespónto, sancti Sisínii Mártyris, qui in persecutióne Diocletiáni Imperatóris, post multa torménta, gládio cæsus est.
      - type: text
        text: Eméritæ, in Hispánia, sanctæ Lucrétiæ, Vírginis et Mártyris; quæ in eádem persecutióne, sub Daciáno Prǽside, martýrium consummávit.
      - type: text
        text: Icónii, in Lycaónia, sancti Amphilóchii Epíscopi, qui, sanctórum Basilíi et Gregórii Nazianzéni in erémo sócius et in Episcopátu colléga, tandem, post multa quæ suscépit pro cathólica fide certámina, sanctitáte et doctrína clarus, quiévit in pace.
      - type: text
        text: Agrigénti deposítio sancti Gregórii Epíscopi.
      - type: text
        text: In óppido Hasbániæ, in Bélgio, sancti Trudónis, Presbýteri et Confessóris, cuius nómine póstmodum insignítum fuit tum monastérium illic ab eódem Sancto in suis prǽdiis eréctum, tum ipsum óppidum in eo loco paulátim exstrúctum.
  psalm.nono-kal-ndas-febru-rii-3c4e0554b9:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 24th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Holy Timothy, the disciple of the blessed Apostle Paul, by whom he was ordained Bishop of Ephesus. After many contendings for Christ, because he rebuked them that were offering sacrifice to Diana, they stoned him, and a short while thereafter he fell asleep in the Lord, (in the year 97.)
      - type: text
        text: At Antioch, (in the year 250,) holy Babilas, Patriarch of that city. After he had oftentimes glorified God by the sufferings and torments which he bore, and in the persecution under the Emperor Decius, he ended his glorious life in iron fetters, which he commanded should be buried with him. It is recorded also that there suffered with him three children Urban, Prilidian, and Epolonius whom he had instructed in the faith of Christ.
      - type: text
        text: At Neo-Caesarea, the holy martyrs Mardonius, Musonius, Eugenius, and Metellus, these all were burnt and their ashes thrown into the river.
      - type: text
        text: At Foligno, holy Felician, who was ordained by Pope Victor Bishop of that city, and after many labours was crowned with martyrdom in extreme old age, in the persecution under the Emperor Decius.
      - type: text
        text: Likewise the holy martyrs Thyrsus, (third century,) and Projectus, (Bishop of Clermont, in the year 674.)
      - type: text
        text: At Bologna, (in the third century,) holy Zama, the first Bishop of that city, who was ordained by the holy Roman Pontiff Denis, and there wonderfully spread the Christian faith.
      - type: text
        text: Likewise (in the sixth century,) the blessed Abbot Suran, who flourished in holiness in the time of the Lombards.
      la:
      - type: text
        text: Nono Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Apud Ephesum sancti Timóthei, qui fuit discípulus beáti Pauli Apóstoli; atque, ab eódem Ephesi ordinátus Epíscopus, ibi post multos pro Christo agónes, cum Diánæ immolántes argúeret, lapídibus óbrutus est, ac paulo post obdormívit in Dómino.
      - type: text
        text: Antiochíæ sancti Bábilæ Epíscopi, qui, in persecutióne Décii, póstea quam frequénter passiónibus suis ac cruciátibus glorificáverat Deum, gloriósæ vitæ finem sortítus est in vínculis férreis, cum quibus et suum corpus sepelíri mandávit. Referúntur étiam passi cum eo tres púeri, scílicet Urbánus, Prilidiánus et Epolónius, quos ille in Christi fide instrúxerat.
      - type: text
        text: Fulgínei, in Umbria, sancti Feliciáni, qui, a sancto Victóre Papa Primo Epíscopus eiúsdem civitátis ordinátus, illic, post multos labóres, in última senectúte, sub Décio Imperatóre, martýrio coronátus est.
      - type: text
        text: Neocæsaréæ, in Mauritánia, sanctórum Mártyrum Mardónii, Musónii, Eugénii et Metélli; qui omnes igni tráditi sunt, et eórum relíquiæ in flumen dispérsæ.
      - type: text
        text: Item sanctórum Mártyrum Thyrsi et Proiécti.
      - type: text
        text: Cínguli, in Picéno, sancti Exsuperántii Confessóris, eiúsdem civitátis Epíscopi, ob miraculórum famam illústris.
      - type: text
        text: Bonóniæ sancti Zamæ, qui, a sancto Dionýsio, Románo Pontífice, primus eiúsdem civitátis Epíscopus ordinátus, illic Christiánam fidem mirífice propagávit.
      - type: text
        text: Item beáti Suráni Abbátis, qui, témpore Longobardórum, sanctitáte flóruit.
  psalm.nono-kal-ndas-i-lii-515caed267:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Eve of the holy Baptist John.
      - type: citation
        text: 'Upon the same 23rd day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, the holy Queen and Virgin Etheldreda, who passed away to be with the Lord, illustrious for holiness and miracles whose body was found incorrupt eleven years after her death, [in the year 679.]
      - type: text
        text: At Rome, the holy Priest John, who was beheaded, under the Emperor Julian the Apostate, in front of the image of the sun upon the old Salarian Way. His body was buried by the blessed Priest Concordius, hard by the martyrs' burial-place.
      - type: text
        text: Likewise at Rome, under the Emperor Valerian, the holy Virgin and martyr Agrippina, whose body was taken to Sicily and is distinguished for many miracles.
      - type: text
        text: At Sutri, in Tuscany, the holy Priest Felix, whose mouth the Prefect Turcius ordered to be pounded with a stone until he died.
      - type: text
        text: At Nicomedia are commemorated very many holy martyrs who, in the time of Diocletian, wandered in deserts and in mountains, and in dens and caves of the earth, and for Christ's Name's sake, underwent martyrdom with joy.
      - type: text
        text: At Philadelphia, in Arabia, the holy martyr Zeno and Zenas his slave. When Zeno was bound Zenas kissed his chains, and besought him to be pleased to have him for a sharer in his torments, whereupon the soldiers took him, and he and his master received the same crown of martyrdom together, [in the year 304.]
      la:
      - type: text
        text: Nono Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Vigília Nativitátis sancti Ioánnis Baptístæ.
      - type: text
        text: Romæ sancti Ioánnis Presbýteri, qui, sub Iuliáno Apóstata, via Salária véteri, ante simulácrum Solis decollátus est, et corpus eius a beáto Concórdio Presbýtero iuxta Mártyrum Concília sepúltum.
      - type: text
        text: Item Romæ sanctæ Agrippínæ, Vírginis et Mártyris, quæ sub Valeriáno Imperatóre martýrium consummávit. Ipsíus autem corpus, in Sicíliam translátum ac Menis cónditum, multis miráculis corúscat.
      - type: text
        text: Sútrii, in Túscia, sancti Felícis Presbýteri, cuius os támdiu iussit Túrcius Præféctus lápide contúndi, donec ipse Felix emítteret spíritum.
      - type: text
        text: Nicomedíæ commemorátio plurimórum sanctórum Mártyrum, qui, témpore Diocletiáni, in móntibus et spelúncis laténtes, pro Christi nómine martýrium læto ánimo subiérunt.
      - type: text
        text: Philadelphíæ, in Arábia, sanctórum Mártyrum Zenónis, eiúsque servi Zenæ. Hic dómini sui vincti caténas exósculans, eúmque rogans ut se in torméntis partícipem dignarétur habére, a milítibus tentus est, et cum ipso dómino parem martýrii corónam accépit.
      - type: text
        text: Augústæ Taurinórum sancti Ioséphi Cafásso, Sacerdótis, qui levítis pietáte et sciéntia augéndis atque damnátis cápite Deo conciliándis fuit illústris, et a Pio Papa Duodécimo inter sanctos Cǽlites adscríptus est.
      - type: text
        text: In monastério Elyénsi, in Británnia, sanctæ Ediltrúdis, Regínæ et Vírginis, quæ sanctitáte et miráculis clara migrávit ad Dóminum. Ipsíus autem corpus, úndecim post annis, invéntum est incorrúptum.
  psalm.nono-kal-ndas-i-nii-a8cedbca15:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the Blessed Virgin Mary, styled "Help of Christians."
      - type: citation
        text: 'Upon the same 24th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, the holy Manahen, foster-brother of Herod the Tetrarch, a teacher and prophet under the grace of the New Testament, who sleepeth in that city.
      - type: text
        text: Also, the blessed Johanna, the wife of Chuza, Herod's steward, of whom maketh mention the Evangelist Luke.
      - type: text
        text: At Porto, the holy martyr Vincent.
      - type: text
        text: At Brescia, the holy martyr Afra, who suffered under the Emperor Hadrian.
      - type: text
        text: At Nantes, in Brittany, the blessed brothers Donatian and Rogatian, both martyrs. They were cast into prison, under the Emperor Diocletian, because of the steadfastness of their faith, hung on the rack and mangled, then pierced through with a spear, and in the end beheaded.
      - type: text
        text: In Istria, the holy martyrs Zoellus, Servilius, Felix, Silvanus, and Diodes, [in the third century.]
      - type: text
        text: Upon the same day, [in Egypt, in the persecution under Antoninus,] the holy martyrs Miletius, a captain in the army, and two hundred and fifty-two of his comrades, who finished their testimony by diverse sorts of death.
      - type: text
        text: Also the holy martyrs Susannah, Marciana, and Palladia, wives of three of the aforesaid soldiers, who were slain, together with their little children.
      - type: text
        text: At Milan, the holy martyr Robustian.
      - type: text
        text: In Morocco, in Africa, [in the year 1636,] blessed John de Prado, of the strictest observance of the bare-footed Friars Minors. For the preaching of the Gospel he manfully endured bonds, imprisonment, stripes, and many other torments, and finished his testimony for Christ by fire.
      - type: text
        text: At the monastery of Lerins, [in the fifth century,] the holy Priest Vincent, distinguished for his teaching and holiness.
      - type: text
        text: At Bologna is commemorated the translation of the holy Confessor Dominic, in the time of Pope Gregory IX.
      la:
      - type: text
        text: Nono Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Antiochíæ natális sancti Mánahen, qui fuit Heródis Tetrárchæ collactáneus, atque, Doctor et Prophéta exsístens sub grátia novi Testaménti, in eádem urbe quiévit.
      - type: text
        text: Item beátæ Ioánnæ, uxóris Chusæ, procuratóris Heródis, quam Lucas Evangelísta commémorat.
      - type: text
        text: In Portu Románo natális sancti Vincéntii Mártyris.
      - type: text
        text: Nannéte, in Británnia minóre, beatórum Mártyrum Donatiáni et Rogatiáni fratrum, qui, sub Diocletiáno Imperatóre, pro constántia fídei, in cárcerem missi, et in equúleo suspénsi ac laniáti, deínde láncea militári confóssi, novíssime cápite præcísi sunt.
      - type: text
        text: In Istria sanctórum Mártyrum Zoélli, Servílii, Felícis, Silváni et Dióclis.
      - type: text
        text: Eódem die sanctórum Mártyrum Melétii, ducis exércitus, ac Sociórum eius ducentórum et quinquagínta duórum mílitum; qui divérso mortis génere martýrium complevérunt.
      - type: text
        text: Item sanctárum Mártyrum Susánnæ, Marciánæ et Palládiæ, eorúndem mílitum uxórum, quæ, una cum párvulis suis, confráctæ sunt.
      - type: text
        text: Medioláni sancti Robustiáni Mártyris.
      - type: text
        text: Bríxiæ sanctæ Afræ Mártyris, quæ sub Hadriáno Imperatóre passa est.
      - type: text
        text: In monastério Lirinénsi, in Gállia, sancti Vincéntii Presbýteri, doctrína et sanctitáte conspícui.
      - type: text
        text: Marróchii, in Africa, Beáti Ioánnis de Prado, Sacerdótis ex Ordine Minórum et Mártyris; qui, in prædicatióne Evangélii, post víncula, cárceres, flagélla plurimáque ália torménta, pro Christo fórtiter toleráta, per ignem martýrium consummávit.
      - type: text
        text: Bonóniæ Translátio sancti Domínici Confessóris, témpore Gregórii Papæ Noni.
  psalm.nono-kal-ndas-ianu-rii-a07055c1f4:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Eve of the birth of our Lord Jesus Christ.
      - type: citation
        text: 'Upon the same 24th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, forty holy Virgins and martyrs, who there finished their testimony by diverse torments in the persecution under the Emperor Decius.
      - type: text
        text: At Spoleto, the holy Priest Gregory (of Spoleto), a martyr in the time of the Emperors Diocletian and Maximian, he was beaten with knotted cudgels, laid upon a grating over fire, imprisoned, his knees hammered with iron combs, burning lamps set to his sides, and at last beheaded.
      - type: text
        text: At Tripoli, the holy martyrs Lucian, Metrobius, Paul, Zenobius, Theotimus, and Drusus.
      - type: text
        text: At Nicomedia, the holy martyr Euthymius, who sent many before him to martyrdom, in the persecution under the Emperor Diocletian, and then was himself pierced through with the sword, and so followed them unto their crown.
      - type: text
        text: At Bordeaux, holy Delphinus, Bishop (of that see from 380-404, when he died,) who was a burning and shining light of holiness in the time of the Emperor Theodosius.
      - type: text
        text: In Poland, (in the year 1473,) the holy Confessor John of Kenty, a secular Priest, famous for his learning, his zeal for the spreading of the faith, his graces, and his miracles, whose feast we have kept upon the 22nd day of October.
      - type: text
        text: At Rome, (about the year 550,) the holy Virgin Tharsilla, father's sister to holy Pope Gregory, of whom he witnesseth that at the hour of her going forth she saw Jesus coming unto her.
      - type: text
        text: At Trier, the holy Virgin Irmina, daughter to King Dagobert (II. She was Abbess of the monastery of Horrein, and lived from about the year 672 to about the year 715.)
      la:
      - type: text
        text: Nono Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Vigília Nativitátis Dómini nostri Iesu Christi.
      - type: text
        text: Cracóviæ, in Polónia, natális sancti Ioánnis Cántii, Presbýteri et Confessóris, quem, doctrína, propagándæ fídei zelo, virtútibus ac miráculis clarum, Clemens Décimus tértius, Póntifex Máximus, Sanctórum número adscrípsit. Eius autem festívitas tertiodécimo Kaléndas Novémbris celebrátur.
      - type: text
        text: Apud Spolétum sancti Gregórii, Presbýteri et Mártyris; qui, tempóribus Diocletiáni et Maximiáni Imperatórum, primo nodósis fústibus cæsus, ac deínde, post cratículam et cárcerem, cárduis férreis in génibus percússus, sed et ardéntibus lampádibus per látera incénsus, tandem est decollátus.
      - type: text
        text: Trípoli, in Phœnícia, sanctórum Mártyrum Luciáni, Metróbii, Pauli, Zenóbii, Theotími et Drusi.
      - type: text
        text: Nicomedíæ sancti Euthýmii Mártyris, qui, in persecutióne Diocletiáni, cum multos ad martýrium præmisísset, et ipse, ense transfíxus, eos secútus est ad corónam.
      - type: text
        text: Antiochíæ natális sanctárum Vírginum quadragínta, quæ, in Deciána persecutióne, per divérsa torménta martýrium consummárunt.
      - type: text
        text: Burdígalæ sancti Delphíni Epíscopi, qui, Theodósii témpore, cláruit sanctitáte.
      - type: text
        text: Romæ natális sanctæ Tharsíllæ Vírginis, ámitæ sancti Gregórii Papæ, de qua ipse testátur quod in hora éxitus sui Iesum ad se veniéntem víderit.
      - type: text
        text: Tréviris sanctæ Irminæ Vírginis, fíliæ Dagobérti Regis.
  psalm.nono-kal-ndas-m-rtii-c5e872da32:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Sicily, under the Emperor Diocletian, [fourth century,] seventy-nine holy martyrs, who through diverse torments won the crown of their confession.
      - type: text
        text: At Adrumetum, [Susa] in Africa, [in fourth century,] the holy martyrs Verulus, Secundinus, Syricius, Felix, Servulus, Saturninus, Fortunatus, and sixteen others, who were crowned with martyrdom for their confession of the Catholic faith in the persecution under the Vandals.
      - type: text
        text: At Bethsan, [about 452,] the holy martyr Severian, Bishop of that see.
      - type: text
        text: At Damascus, [in the year 743,] holy Peter Mavimeno. Some Arabs came to see him while he was ill, and to them he said, "Whoever does not embrace the Catholic Christian religion will be damned, as your false prophet Mohammed is," whereupon they killed him.
      - type: text
        text: At Ravenna, [in the year 556,] the holy Confessor Maximian.
      - type: text
        text: At Metz, [about the year 500,] holy Felix, Bishop of that see.
      - type: text
        text: At Brescia, [in the seventh century,] holy Paterius, [twenty-third] Bishop of that see.
      la:
      - type: text
        text: Nono Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Scythópoli, in Palæstína, sancti Severiáni, Epíscopi et Mártyris, qui, Eutychiánis acérrime se oppónens, gládio perémptus est.
      - type: text
        text: In Sicília natális sanctórum Mártyrum septuagínta novem, qui sub Diocletiáno, per divérsa torménta, confessiónis suæ corónam percípere meruérunt.
      - type: text
        text: Adruméti, in Africa, sanctórum Mártyrum Véruli, Secundíni, Sirícii, Felícis, Sérvuli, Saturníni, Fortunáti et aliórum séxdecim, qui in persecutióne Wandálica, ob cathólicæ fídei confessiónem, martýrio coronáti sunt.
      - type: text
        text: 'Damásci sancti Petri Maviméni, qui, cum díceret Arábibus quibúsdam, ad se ægrótum veniéntibus: «Omnis qui fidem Christiánam cathólicam non ampléctitur, damnátus est, sicut et Máhumet, pseudoprophéta vester,» ab illis est necátus.'
      - type: text
        text: Metis, in Gállia, sancti Felícis Epíscopi.
      - type: text
        text: Bríxiæ sancti Patérii Epíscopi.
  psalm.nono-kal-ndas-maii-3056b3b6ef:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 23rd day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy martyr George, whose illustrious martyrdom, [in the year 303,] the church of God honours among the crowns of her martyrs.
      - type: text
        text: At Valence, in Gaul, the holy martyrs the Priest Felix and the Deacons Fortunatus and Achilleus. They had been sent forth to preach the Word of God by blessed Irenaeus, Bishop of Lyon, and had brought a great part of the city of Valence to believe in Christ, when they were cast into prison by Cornelius the general. They were long beaten, their legs were broken, they were tied to the outside of turning wheels, hung in smoke upon the rack, and at length slain with the sword, [in the year 212.]
      - type: text
        text: In Prussia, [in the year 997,] the holy martyr Adalbert, Bishop of Prague, who preached the Gospel to the Poles and Hungarians.
      - type: text
        text: At Milan, [in the year 423,] the holy Confessor Marolus, Bishop [of that see.]
      - type: text
        text: At Toul, in Gaul, holy Gerard, Bishop of that city, [in the year 994.]
      la:
      - type: text
        text: Nono Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Natális sancti Geórgii Mártyris, cuius illústre martýrium inter Mártyrum corónas Ecclésia Dei venerátur.
      - type: text
        text: In vico Tenkítten, ad sinum Venédicum, in Borússia, item natális sancti Adalbérti, Epíscopi Pragénsis et Mártyris, qui Polónis et Húngaris Evangélium prædicávit.
      - type: text
        text: Valéntiæ, in Gállia, pássio sanctórum Mártyrum Felícis Presbýteri, Fortunáti et Achilléi Diaconórum. Hi, cum fuíssent a beáto Irenǽo, Lugdunénsi Epíscopo, missi ad prædicándum verbum Dei, et máximam illíus civitátis partem ad Christi fidem convertíssent, a Duce Cornélio sunt in cárcerem trusi; deínde, diutíssime verberáti, cruribúsque confráctis, circa rotárum vertíginem stricti, fumum quoque in equúlei suspensióne perpéssi; ad extrémum gládio consummáti sunt.
      - type: text
        text: Medioláni sancti Mároli, Epíscopi et Confessóris.
      - type: text
        text: Tulli, in Gállia, sancti Gerárdi, eiúsdem civitátis Epíscopi.
  psalm.nono-kal-ndas-nov-mbris-2011e64cd1:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow, we keep the feast of the holy Archangel Raphael.
      - type: citation
        text: 'Upon the same 24th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Venosa, in Apulia, the holy martyrs Felix, Bishop (of Tubzoca or Thibira,) in Africa the Priests Audactus and Januarius and the Readers Fortunatus and Septimus. In the time of the Emperor Diocletian they long suffered bonds and imprisonment in Africa and Sicily under the Procurator Magdellian, and, forasmuch as Felix refused to give up the holy books as commanded by the edict of the Emperor, they were at last slain with the sword.
      - type: text
        text: In the city of Nagran, in Yemen, (in the sixth century,) under the Jewish tyrant Dunaan, in the time of the Emperor Justin, the holy martyrs Aretas and his three hundred and forty Companions.
      - type: text
        text: After them was burnt a Christian woman and her son, aged five years, could neither be cajoled nor threatened into ceasing to confess Christ, but cast himself into the fire wherein his mother was being burnt.
      - type: text
        text: At Cologne, (in the fifth century,) the holy martyr Evergistus, Bishop (of that see.) At Constantinople, (in the year 447,) the holy Archbishop Proclus.
      - type: text
        text: In Brittany, (in the year 575,) holy Magloire, Bishop (of Dol,) whose body lieth at Paris.
      - type: text
        text: In the monastery of Vertou, (in the year 601,) the holy Abbot Martin.
      - type: text
        text: In Campania, holy Mark the Hermit, whose illustrious works are recorded by holy Gregory.
      la:
      - type: text
        text: Nono Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Festum sancti Raphaélis Archángeli, cuius dígnitas ac benefícia in sacro Tobíæ libro celebrántur.
      - type: text
        text: In Monastério Fontis Frígidi, diœcésis Carcassonénsis, in Gállia, sancti Antónii Maríæ Claret, olim Archiepíscopi Cubáni, Fundatóris Missionariórum Filiórum Immaculáti Cordis beátæ Maríæ Vírginis, animárum zelo et mansuetúdine præclári, quem Pius Duodécimus, Póntifex Máximus, Sanctórum fastis adscrípsit. Ipsíus autem festum prídie huius diéi celebrátur.
      - type: text
        text: Venúsiæ, in Apúlia, natális sanctórum Mártyrum Felícis, Epíscopi Africáni; Audácti et Ianuárii, Presbyterórum; Fortunáti et Séptimi, Lectórum. Hi omnes, témpore Diocletiáni, a Magdelliáno Procuratóre multis diu vínculis et carcéribus in Africa et Sicília maceráti sunt, et, cum Felix sacros Libros iuxta ipsíus Imperatóris edíctum trádere nullátenus voluísset, gládii tandem occisióne consummáti sunt.
      - type: text
        text: Tungris, in Bélgio, sancti Evergísli, Epíscopi Coloniénsis et Mártyris; qui, ob pastorális offícii curam illuc proféctus, ibídem, dum nocte solus ad monastérium sanctíssimæ Genitrícis Dei Maríæ oratúrus pérgeret, a latrónibus sagítta percússus occúbuit.
      - type: text
        text: In civitáte Nagran, apud Homerítas, in Arábia, pássio sanctórum Arétæ, et Sociórum eius trecentórum et quadragínta, témpore Iustíni Imperatóris, sub Dúnaan, Iudǽo tyránno. Post eos Christiána múlier incéndio trádita est; cuius fílius annórum quinque, cum Christum balbutiéndo confiterétur, nec blandítiis nec minis retinéri posset, in ignem ubi mater ardébat, se præcípitem dedit.
      - type: text
        text: Constantinópoli sancti Procli Epíscopi.
      - type: text
        text: In ínsula Sargiénsi sancti Maglórii Epíscopi, qui ibídem, dimísso Episcopáli offício, quod erga sparsos in Armórica Británnos per triénnium exercúerat, monastérium constrúxit, in quo sancte réliquum vitæ tempus exégit; cuius corpus Lutétiam Parisiórum póstea translátum fuit.
      - type: text
        text: In monastério Duríni, in Gállia, sancti Martíni, Diáconi et Abbátis, cuius corpus inde ad Vertávum monastérium delátum est.
      - type: text
        text: In Campánia sancti Marci Solitárii, cuius præclára ópera sanctus Gregórius Papa descrípsit.
  psalm.nono-kal-ndas-oct-bris-c9a83d7f82:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 23rd day of September, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Pope Linus. He was the first successor of the blessed Apostle Peter in the government of the Church of Rome, was crowned with martyrdom, and is buried upon the Vatican Hill, hard by the Apostle.
      - type: text
        text: At Iconium, in Lycaonia, the holy Virgin and martyr Thecla. She was converted to the faith by the holy Apostle Paul. Under the Emperor Nero she overcame fire and beasts for her confession of Christ, and after many contendings, wherein she was victorious, for the teaching of many, she came to Seleucia, and there fell asleep in peace. The holy Fathers do greatly extol her.
      - type: text
        text: In Campania is made commemoration of the blessed Sosius, Deacon of the Church of Miseno. One while when he was reading the Gospel in the church, the holy Bishop Januarius saw flames rising from his head, and foretold that he would be a martyr. Neither was it many days afterward, when, being himself of the age of thirty years, he was beheaded along with the said Bishop, and so received martyrdom.
      - type: text
        text: In Africa, the holy martyrs Andrew, John, Peter, and Anthony.
      - type: text
        text: In the country of Coutances, the holy martyr Paternus, the Bishop.
      - type: text
        text: At Ancona, holy Constantius, watchman of the Church [of St. Stephen,] who was remarkable for his grace of working miracles.
      - type: text
        text: In Spain, the holy women Xantippe and Polyxena, who were disciples of the Apostles.
      la:
      - type: text
        text: Nono Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Lini, Papæ et Mártyris, qui, primus post beátum Petrum Apóstolum, Romanam Ecclésiam gubernávit, et, martýrio coronátus, sepúltus est in Vaticáno, prope eúndem Apóstolum.
      - type: text
        text: Icónii, in Lycaónia, sanctæ Theclæ, Vírginis et Mártyris; quæ, a sancto Paulo Apóstolo ad fidem perdúcta, ignes ac béstias, sub Neróne Imperatóre, in Christi confessióne devícit; et, post plúrima ad multórum doctrínam superáta certámina, venit Seleucíam, ibíque requiévit in pace. Ipsam vero sancti Patres summis láudibus celebrárunt.
      - type: text
        text: In Hispánia sanctárum mulíerum Xantíppæ et Polýxenæ, quæ fuérunt Apostolórum discípulæ.
      - type: text
        text: In Africa sanctórum Mártyrum Andréæ, Ioánnis, Petri et Antónii.
      - type: text
        text: Ancónæ sancti Constántii, Ecclésiæ Mansionárii, miraculórum grátia conspícui.
      - type: text
        text: In Campánia commemorátio beáti Sósii, Diáconi Misenátis, quem sanctus Epíscopus Ianuárius, cum de cápite illíus, Evangélium in Ecclésia legéntis, flammam vidéret exsúrgere, Mártyrem futúrum præannuntiávit; et, non post multos dies, ipse Sósius, cum esset annórum trigínta, cápitis detruncatióne martýrium cum eódem Epíscopo suscépit.
      - type: text
        text: Sescíaci, in Constantiénsi Gálliæ território, item Commemorátio sancti Patérni, Epíscopi Abrincénsis et Confessóris; cuius dies natális sextodécimo Kaléndas Maii recólitur.
  psalm.nono-kal-ndas-sept-mbris-2aab287ae2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 24th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Apostle Bartholomew. He preached the Gospel of Christ in India, whence he went into the greater Armenia, where, when he had turned many to the faith, he was flayed alive by the barbarians, and beheaded by order of King Astyages, [about the year of our Lord 71,] and so finished his testimony. His sacred body was first taken to the island of Lipari, then to Benevento, and lastly to Rome, to the island in the Tiber, where it is devoutly reverenced by the veneration of the faithful.
      - type: text
        text: At Carthage, three hundred holy martyrs, in the time of the Emperors Valerian and Gallienus, among other torments applied to them the President caused a limekiln to be lighted, and producing some hot embers and incense said to them, now choose one of two things, either offer this incense to Jupiter upon these coals, or be thrown into that lime. Then they, being armed with faith, and confessing that Christ is the Son of God, threw themselves in a twinkling into the kiln, where they were burnt to powder among the lime, whence this white-robed army of the blessed has gained the name of the White Lump.
      - type: text
        text: At Nepi, [in the first century,] the holy Bishop Ptolemy, a disciple of the blessed Apostle Peter, by whom he was sent into Tuscany to preach the Gospel, and in that city fell a glorious martyr of Christ and in the same place holy Romanus, Bishop of the same city, who, as he had been the disciple of holy Ptolemy was also his comrade in his last testimony and sufferings.
      - type: text
        text: At Ostia, [in the year 230,] the holy Virgin and martyr Aurea, who was cast into the sea with a stone tied about her neck. Her body was washed up upon the shore, and was buried by blessed Nonnus.
      - type: text
        text: In Isauria, [about the year 304,] the holy martyr Tation, who was slain with the sword under President Urban, in the persecution under the Emperor Diocletian, and so received the crown of martyrdom.
      - type: text
        text: On the same day, [at the end of the first or beginning of the second century,] holy Eutychius, a disciple of the blessed Evangelist John. For preaching the Gospel he suffered in many countries imprisonment, stripes, and fire but at length fell asleep in peace.
      - type: text
        text: Also, [in the eighth century,] the holy monk George, surnamed Limniotes. He rebuked the wicked Emperor Leo for breaking the holy images and burning the relics of the Saints, whereupon the Emperor commanded his hands to be cut off, and his head to be set on fire, and so as a martyr he passed away to be ever with the Lord.
      - type: text
        text: At Rouen, [in the year 683,] the holy Confessor Ouen, [Bishop of that see.]
      - type: text
        text: At Nevers, the holy Abbot Patrick.
      la:
      - type: text
        text: Nono Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Bartholomǽi Apóstoli, qui Christi Evangélium in India prædicávit; inde in maiórem Arméniam proféctus, ibi, cum plúrimos ad fidem convertísset, vivus a bárbaris decoriátus est, atque, Astýagis Regis iussu, cápitis decollatióne martýrium complévit. Ipsíus sacrum corpus, primo ad Líparam ínsulam, deínde Benevéntum, postrémo Romam ad Tiberínam translátim ínsulam, ibi pia fidélium veneratióne honorátur.
      - type: text
        text: Lima, in Perúvia, natális sanctæ Rosæ a sancta María, Vírginis, e tértio Ordine sancti Domínici. Eius vero festívitas tértio Kaléndas Septémbris celebrátur.
      - type: text
        text: Népete sancti Ptolomǽi Epíscopi, qui fuit discípulus beáti Petri Apóstoli; atque, ab eo missus in Túsciam ad prædicándum Evangélium, in eádem civitáte gloriósus Christi Martyr occúbuit.
      - type: text
        text: Eódem die sancti Eutýchii, qui fuit discípulus beáti Ioánnis Evangelístæ; atque, ob Evangélii prædicatiónem in multis regiónibus cárceres, vérbera et ignes perpéssus, in pace tandem quiévit.
      - type: text
        text: Népete sancti Románi, eiúsdem civitátis Epíscopi, qui, cum esset sancti Ptolomǽi discípulus, fuit étiam in passióne sócius.
      - type: text
        text: 'Carthágine sanctórum trecentórum Mártyrum, témpore Valeriáni et Galliéni. Hi Mártyres magnánimi, inter ália supplícia, cum Præses fornácem calcáriam accéndi iussísset, et, in præséntia eius, prunas cum thure exhibéri, atque illis dixísset: « Elígite e duóbus unum, aut thura super his carbónibus offérte Iovi, aut in calcem demergímini », fide armáti, Christum Dei Fílium confiténtes, ictu rapidíssimo se iniecérunt in ignem, et inter calcis vapóres in púlverem sunt redácti; ex quo candidátus ille beatórum exércitus appellári Massa cándida méruit.'
      - type: text
        text: In Isáuria sancti Tatiónis Mártyris, qui in persecutióne Diocletiáni, sub Urbáno Prǽside, gládio cæsus, martýrii corónam accépit.
      - type: text
        text: Item sancti Geórgii Limniótæ Mónachi, qui, cum ímpium Leónem Imperatórem, quod sacras Imágines frángeret Sanctorúmque relíquias combúreret, reprehendísset, hanc ob causam, eius iussu mánibus abscíssis et cápite incénso, Martyr migrávit ad Dóminum.
      - type: text
        text: Apud Ostia Tiberína sanctæ Aureæ, Vírginis et Mártyris; quæ, saxo ad collum ligáto, in mare demérsa est. Ipsíus autem corpus, eiéctum ad littus, beátus Nonnus sepelívit.
      - type: text
        text: Rotómagi sancti Audoéni, Epíscopi et Confessóris.
      - type: text
        text: Nivérnis, in Gállia, sancti Patrícii Abbátis.
      - type: text
        text: Neápoli, in Campánia, sanctæ Ioánnæ Antídæ Thouret, Vírginis, Institúti Sorórum a Caritáte Fundatrícis, quam Pius Papa Undécimus in album sanctárum Vírginum rétulit.
      - type: text
        text: Massíliæ, in Gállia, sanctæ Æmíliæ de Vialár, Vírginis, Fundatrícis Institúti Sorórum a sancto Ioseph ab Apparitióne, fortitudine, patiéntia et caritáte insígnis, quam Pius Duodécimus, Póntifex Máximus, in Sanctárum númerum rétulit.
      - type: text
        text: Valéntiæ, in Hispánia, natális sanctæ Marfæ Michaélæ, Vírginis, Fundatrícis Congregatiónis Ancillárum a Sanctíssimo Sacraménto et Caritátis, patiéndi stúdio ac desidério ánimas Deo lucrándi inflammátæ, quam Pius Papa Undécimus sanctis Virgínibus accénsuit.
  psalm.oct-vo-idus-apr-lis-2d9d5e6ff9:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 6th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the blessed martyr, Pope Sixtus I, who ruled the Church, [in the years 117-127,] in the time of the Emperor Hadrian, and, under the Emperor Antoninus Pius, cheerfully welcomed the death of the body that so he might gain Christ.
      - type: text
        text: In Macedonia, the holy martyrs Timothy and Diogenes, [in the year 345.]
      - type: text
        text: In Persia, [at Adiabene,] an hundred and twenty holy martyrs, [about the year 344.]
      - type: text
        text: At Ascalon, the holy martyrs Platonides and two others.
      - type: text
        text: At Carthage, the holy martyr Marcellinus, who was slain by heretics, [in the year 413,] because he defended the Catholic faith.
      - type: text
        text: At Rome, the holy Confessor, Pope Celestine [I, in the years 422-432,] who condemned Nestorius, Archbishop of Constantinople, and drave out Pelagius. It was by his authority that the holy General Council of Ephesus was held against the said Nestorius.
      - type: text
        text: In Ireland, the holy Confessor Kelly, Archbishop of Armagh, [in the year 1128,] in the which see he came immediately before blessed Maleachlan.
      - type: text
        text: In Denmark, holy William, Abbot [of Eskill,] famous for his life and miracles, [born 1105, died 1202.] [Of the order of Canons Regular of St Victor, Nephew of Hew, 42nd Abbot of St. Germain des Pres.]
      la:
      - type: text
        text: Octávo Idus Aprílis
      - type: text
        text: ''
      - type: text
        text: Medioláni pássio sancti Petri, ex Ordine Prædicatórum, Mártyris, qui ab hæréticis, ob fidem cathólicam, interémptus est. Ipsíus tamen festívitas recólitur tértio Kaléndas Maii.
      - type: text
        text: Velehrádii, in Morávia, natális sancti Methódii, Epíscopi et Confessóris, qui, una cum sancto Cyríllo, item Epíscopo et fratre suo, cuius natális sextodécimo Kaléndas Mártii recensétur, multas Slávicas gentes earúmque Reges ad fidem Christi perdúxit. Horum autem Sanctórum festum Nonis Iúlii celebrátur.
      - type: text
        text: In Macedónia sanctórum Mártyrum Timóthei et Diógenis.
      - type: text
        text: In Pérside sanctórum centum vigínti Mártyrum.
      - type: text
        text: Ascalóne, in Palæstína, pássio sanctórum Platónidis et aliórum duórum Mártyrum.
      - type: text
        text: Carthágine sancti Marcellíni Mártyris, qui, ob cathólicæ fídei defensiónem, ab hæréticis occísus est.
      - type: text
        text: In Dánia sancti Guliélmi Abbátis, vita et miráculis clari.
  psalm.oct-vo-idus-aug-sti-d36aadad24:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 6th day of August we keep the feast of the Transfiguration of Our Lord Jesus Christ upon Mount Tabor [in the year of our Lord 32.]
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, in the cemetery of Callistus, upon the Appian Way, [in the year 258,] the blessed Pope and martyr Sixtus II, who received the crown of martyrdom by the sword in the persecution under Valerian. Likewise the holy martyrs Felicissimus and Agapitus, deacons of the aforesaid blessed Xystus, and his subdeacons Januarius, Magnus, Vincent, and Stephen, who were all beheaded along with him, and were buried in the cemetery of Pretextatus. Along with them suffered also the blessed Quartus, as is written by holy Cyprian.
      - type: text
        text: At Bologna, the birthday of St. Dominic, confessor and founder of the Order of Friars Preachers. He was a man of great renown for holiness and learning. Until death he preserved without stain his virginity, and by the singular grace of his merits raised three dead men to life. By his preaching he curbed heresies, and established many persons in a religious and godly manner of life. He died on this day, but his festival, by an ordinance of Pope Paul IV, is celebrated on August 4.
      - type: text
        text: At Burgos, in Spain, in the Monastery of St. Peter de Cardena, of the Order of St. Benedict, [in the year 872,] the Abbot Stephen and two hundred monks, who were massacred by the Saracens for their faith in Jesus Christ, and by the Christians then buried inside their cloister.
      - type: text
        text: At Alcala, in Spain, [in the year 304,] the holy brethren Justus and Pastor, both martyrs. They were boys learning at school when they threw away their slates, and ran of their own wish to be martyred. The President Dacian ordered them to be taken and cudgelled, and when they continued to call on each other to stand firm he had them led outside the city, where the executioner cut their throats.
      - type: text
        text: At Rome, [in the year 523,] the holy Confessor Pope Hormisdas.
      - type: text
        text: At Diarbekr, [in Mesopotamia, about the year 502,] the holy hermit James, famous for miracles.
      la:
      - type: text
        text: Octávo Idus Augústi
      - type: text
        text: ''
      - type: text
        text: In monte Thabor Transfigurátio Dómini nostri Iesu Christi.
      - type: text
        text: Romæ, via Appia, in cœmetério Callísti, natális beáti Xysti Secúndi, Papæ et Mártyris, qui, in persecutióne Valeriáni, gládio animadvérsus, martýrii corónam accépit.
      - type: text
        text: Item Romæ sanctórum Mártyrum Felicíssimi et Agapíti, ipsíus beáti Xysti Diaconórum; Ianuárii, Magni, Vincéntii et Stéphani, Subdiaconórum. Hi omnes, una cum eódem Pontífice páriter decolláti sunt, atque in Prætextáti cœmetério sepúlti. Passus est étiam cum eis beátus Quartus, ut scribit sanctus Cypriánus.
      - type: text
        text: Bonóniæ natális sancti Domínici Confessóris, qui Ordinis Fratrum Prædicatórum Fundátor éxstitit. Hic vir, sanctitáte et doctrína claríssimus, virginitátem perpétuo illibátam custodívit, et, ob singulárem meritórum grátiam, tres mórtuos suscitávit; cumque prædicatióne sua compressísset hǽreses, ac plúrimos ad religiósam et piam vitam instituísset, in pace quiévit. Eius autem festívitas prídie Nonas mensis huius celebrátur, ex constitutióne Pauli Papæ Quarti.
      - type: text
        text: In monastério sancti Petri de Cardégna, Ordinis sancti Benedícti, apud Burgos, in Hispánia, pássio ducentórum Monachórum cum Stéphano Abbáte, qui a Saracénis pro Iesu Christi fide interfécti sunt, atque ibídem in claustro a Christiánis sepúlti.
      - type: text
        text: Complúti, in Hispánia, sanctórum Mártyrum Iusti et Pastóris fratrum, qui, cum adhuc púeri lítteris imbueréntur, sponte ad martýrium, proiéctis in schola tábulis, cucurrérunt; et mox, a Daciáno Prǽside tenéri iussi et fústibus cædi, ambo, cum se mútuis exhortatiónibus constantíssime corroborárent, extra civitátem perdúcti sunt, et ibi a carnífice iuguláti.
      - type: text
        text: Romæ sancti Hormísdæ, Papæ et Confessóris.
      - type: text
        text: Amidæ, in Mesopotámia, sancti Iacóbi Eremítæ, miráculis clari.
  psalm.oct-vo-idus-dec-mbris-f25d122a8e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 6th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Myra, which is the chief city of Lycia, (in the year 324,) the holy Confessor Nicolas, Bishop (of that see,) of whom among many other signs and wonders it is recorded that when the Emperor Constantine had condemned certain persons to death and these called upon Nicolas, who was alive, and afar off, he appeared unto the Emperor, and bent him to mercy by exhortation and threats.
      - type: text
        text: In Africa, the holy women Dionysia, Dativa, and Leontia, and the monk Tertius, the physician Aemilian, Boniface, and three others, who in the Vandal persecution under the Arian King Hunneric were tormented in most grievous and manifold ways for their defence of the Catholic faith, and so earned a place among Confessors of Christ, (in the year 484.)
      - type: text
        text: At the same time and place, the holy martyr Majoricus, the son of holy Dionysia. He was but a little lad and was in fear of the torments, but by the looks and words of his mother, he was so strengthened that he became mightier than them all, and died under the torture his mother took his body to her heart, and buried it in their home, and was used to pray instantly at his grave.
      - type: text
        text: On the same day, the holy priest Polychronius, who was saying Mass in the time of the Emperor Constantius, when the Arians attacked him and slew him, (fourth century.)
      - type: text
        text: At Granada, in Spain, the blessed martyr Peter Paschasius, Bishop of Jaen, of the order of blessed Mary of Ransom for the redemption of captives, (in the year 1300.)
      - type: text
        text: At Rome, the holy Virgin Asella, who, as writeth blessed Jerome, was blessed from her mother's womb, and passed her life in fastings and prayers unto a good old age. (Born about 334 and died about 410.)
      la:
      - type: text
        text: Octávo Idus Decémbris
      - type: text
        text: ''
      - type: text
        text: Myræ, quæ est metrópolis Lýciæ, natális sancti Nicolái, Epíscopi et Confessóris, de quo, inter plura miraculórum insígnia, illud memorábile fertur, quod Imperatórem Constantínum ab intéritu quorúmdam se invocántium, longe constitútus, ad misericórdiam per visum mónitis defléxit et minis.
      - type: text
        text: Eódem die sancti Polychrónii Presbýteri, qui, témpore Constántii Imperatóris, cum ad altáre Missas ágeret, invásus est ab Ariánis et iugulátus.
      - type: text
        text: In Africa sancti Maiórici, fílii sanctæ Dionýsiæ, qui, cum esset adolescéntulus ac torménta pavésceret, matris obtútibus verbísque corroborátus est, et, céteris fórtior factus, in torméntis ánimam réddidit; quem amplexáta mater domi sepelívit, et ad eius sepúlcrum assídue orare consuévit.
      - type: text
        text: Ibídem sanctárum mulíerum Dionýsiæ, quæ sancti Maiórici Mártyris éxstitit mater, Datívæ ac Leóntiæ; itémque religiósi viri, nómine Tértii, Æmiliáni médici, et Bonifátii, cum áliis tribus. Hi omnes, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, gravíssimis et innúmeris supplíciis pro cathólicæ fídei defensióne cruciáti, sanctórum Christi Confessórum número sociári meruérunt.
      - type: text
        text: Romæ sanctæ Aséllæ Vírginis, quæ (ut beátus Hierónymus scribit), ex útero matris benedícta, vitam in ieiúniis et oratiónibus usque ad senéctam prodúxit.
      - type: text
        text: Granátæ, in Hispánia, pássio beáti Petri Paschásii, Epíscopi Giennénsis et Mártyris, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum.
  psalm.oct-vo-idus-febru-rii-207374bbff:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Titus, Archbishop of Gortyna, in Crete, of whom mention is made upon the 4th day of January.
      - type: citation
        text: 'Upon the same 6th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Caesarea, in Cappadocia, the holy Virgin and martyr Dorothy, who under Sapricius, President of that province, was first racked, then long scourged with palm-branches, and at length put to death [,in the year 304]. At the sight of her sufferings a certain student, named Theophilus, was converted to Christ, and forthwith grievously racked, and at length beheaded.
      - type: text
        text: On the same day the holy martyrs Saturninus, Theophilus, and Revocata.
      - type: text
        text: At Emessa, in Phoenicia, the holy Bishop Silvan, who, when he had been forty years in rule over that church, was cast to wild beasts along with two others, under the Emperor Maximian, and, torn to pieces, received the palm of martyrdom [in the year 312].
      - type: text
        text: At [Clermont,] Auvergne, in Gaul, the holy martyr Antholian [,about the year 265].
      - type: text
        text: On the same day, [in the year 540,] holy Bishop Vedastus, and [in the year 684,] holy Bishop Amandus, the first of whom ruled over the Church of Arras, the second the Church of Maastricht, whose lives and deaths were rendered glorious by diverse miracles.
      - type: text
        text: At Bologna, [in the year 1159,] holy Guarinus, Cardinal Bishop of Palestrina, eminent for the holiness of his life.
      la:
      - type: text
        text: Octávo Idus Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Titi, Epíscopi Creténsium et Confessóris, cuius dies natális occúrrit prídie Nonas Ianuárii.
      - type: text
        text: Cæsaréæ, in Cappadócia, natális sanctæ Dorótheæ, Vírginis et Mártyris; quæ, sub Saprício, illíus Provínciæ Prǽside, primum per equúlei extensiónem vexáta, dehinc palmis diutíssime cæsa, capitáli senténtia ad últimum puníta est. In eius confessióne Theóphilus quidam scholásticus ad Christi fidem convérsus, et mox equúleo acérrime tortus, novíssime gládio cæsus est.
      - type: text
        text: Eméssæ, in Phœnícia, sancti Silváni Epíscopi, qui, cum eídem Ecclésiæ annis quadragínta præfuísset, tandem, sub Maximiáno Imperatóre, una cum duóbus áliis, obiéctus feris membratímque discérptus, martýrii palmam accépit.
      - type: text
        text: Eódem die sanctórum Mártyrum Saturníni, Theóphili et Revocátæ.
      - type: text
        text: Arvérnis, in Gállia, sancti Antholiáni Mártyris.
      - type: text
        text: Atrébati, in Gálliis, sancti Vedásti, eiúsdem civitátis Epíscopi, cuius vita et mors plúrimis miráculis éxstitit gloriósa.
      - type: text
        text: Elnóne, in Gállia, sancti Amándi, Epíscopi Traiecténsis, qui miráculis, cum vivus tum mórtuus, glorióse refúlsit; cuius nómine póstmodum insignítum est óppidum, in quo ille monastérium exstrúxerat et mortálem vitam absólverat.
      - type: text
        text: Bonóniæ sancti Guaríni, Cardinális et Epíscopi Prænestíni, vitæ sanctitáte conspícui.
  psalm.oct-vo-idus-i-lii-b35b7c4dfa:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of
      - type: text
        text: ''
      - type: text
        text: Holy widow Isabel, Queen of Portugal, famous for her graces and miracles, [in the year 1336,] whom Pope Urban VIII enrolled among the Saints.
      - type: text
        text: In Lesser Asia, the holy Aquila and Priscilla his wife, of whom the holy Evangelist Luke writeth in the Acts of the Apostles [xviii, 2]
      - type: text
        text: At Porto, in Italy, fifty holy soldiers, all martyrs, who were brought to the faith through the testifying of holy Bonosa, baptized by the blessed Pope Felix, and slain in the persecution under the Emperor Aurelian.
      - type: text
        text: In Palestine, the holy martyr Procopius. In the persecution under the Emperor Diocletian he was brought from Bethshan, [where he Was reader, exorcist, and interpreter in the church,] to Caesarea, where at the constancy of his very first answers he was beheaded by the command of Fabian the judge.
      - type: text
        text: At Constantinople, the holy Abrahamite monks, who resisted the Emperor Theophilus concerning the worship of the holy images, and therefore suffered martyrdom.
      - type: text
        text: At Wurzburg, in Germany, holy Killan, Bishop of that city. [An Irish monk, who travelled to Rome in the year 686, was sent by the Roman Pontiff Conon to preach the Gospel.]
      - type: text
        text: When he had turned many to Christ he was murdered, [in the year 689,] along with Colman a Priest and Tatnan a Deacon.
      - type: text
        text: At Rome, the blessed Pope Eugenius III. He had been Abbot of the monastery of SS. Vincent and Anastatius, near Rome, before he was made Supreme Pontiff. He ruled the universal Church with wonderful holiness and wisdom. [His name was Bernard Paganelli, and he was a native of Pisa, and Canon of that city. He then became a monk of Cîteaux and disciple of St. Bernard before being elected Pope on February 15, 1145, and consecrated in the Benedictine Abbey of Farfa on the 16th of that month. He died at Tivoli on July 8, 1153.]
      - type: text
        text: At Trier, the holy Confessor Auspicius, Bishop [of that see, fifth century.]
      la:
      - type: text
        text: Octávo Idus Iúlii
      - type: text
        text: ''
      - type: text
        text: Sanctæ Elísabeth Víduæ, Lusitanórum Regínæ, quæ ad regnum cæléste quarto Nonas huius mensis transívit.
      - type: text
        text: In Asia minóre sanctórum Aquilæ et Priscíllæ uxóris, de quibus in Actibus Apostolórum scríbitur.
      - type: text
        text: Herbípoli, in Germánia, sancti Chiliáni Epíscopi, qui, a Románo Pontífice ad prædicándum Evangélium missus, ibi, cum multos ad Christum perduxísset, una cum Sóciis Colománno Presbýtero, et Totnáno Diácono, trucidátus est.
      - type: text
        text: In Portu Románo sanctórum quinquagínta mílitum Mártyrum, qui, in sanctæ Bonósæ confessióne ad fidem addúcti, et a beáto Felíce Papa Primo baptizáti, in Aureliáni Imperatóris persecutióne occísi sunt.
      - type: text
        text: Cæsaréæ, in Palæstína, sancti Procópii Mártyris, qui, sub Diocletiáno Imperatóre, a Scythópoli ductus Cæsaréam, illic, ad primam responsiónum eius confidéntiam, a Iúdice Fabiáno est cápite cæsus.
      - type: text
        text: Constantinópoli pássio sanctórum Monachórum Abrahamitárum, qui ob cultum sanctárum Imáginum, resisténtes Theóphilo Imperatóri, martýrium consummárunt.
      - type: text
        text: Spinæ Lambérti, in Æmília, sancti Hadriáni Papæ Tértii, stúdio conciliándi Románæ Ecclésias Orientáles insígnis, ac miráculis clari; cuius corpus in monastérium Nonantulénse fuit delátum, et in æde sancti Silvéstri honorífice cónditum.
      - type: text
        text: Tréviris sancti Auspícii, Epíscopi et Confessóris.
      - type: text
        text: Romæ beáti Eugénii Papæ Tértii, qui, postquam cœnóbium sanctórum Vincéntii et Anastásii ad Aquas Sálvias magna sanctimóniæ ac prudéntiæ laude rexísset, Ecclésiam univérsam, Póntifex Máximus renuntiátus, sanctíssime gubernávit. Cultum autem, ab immemorábili témpore ipsi exhíbitum, Pius Papa Nonus ratum hábuit et confirmávit.
  psalm.oct-vo-idus-i-nii-39617b9af6:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 6th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Holy Norbert, Archbishop of Magdeburg, founder of the Order of the Premonstratensian Canons Regular.
      - type: text
        text: At Caesarea, in Palestine, the blessed Philip, who was one of the first seven Deacons. He was illustrious for signs and wonders. He turned Samaria to believe in Christ, and baptized the eunuch of Candace, Queen of the Ethiopians. He fell asleep at last at Caesarea. Three of his virgin daughters, who were prophetesses, lie buried beside him. His fourth daughter died at Ephesus, full of the Holy Ghost.
      - type: text
        text: At Rome, the holy martyrs Artemius, with Candida his wife and Paulina his daughter. This Artemius was brought to believe in Christ by the preaching and miracles of the holy Exorcist Peter, and was baptized with all his house by the holy Priest Marcellinus. He was first hided with scourges loaded with lead by order of Serenus the Judge, and afterwards beheaded. His wife and daughters were thrown into a vault, and buried in stones and rubbish.
      - type: text
        text: At Tarsus, in Cilicia, twenty holy martyrs, who in the time of Diocletian and Maximian, under Simplicius the Judge, by diverse torments glorified God in their bodies.
      - type: text
        text: At Noyon, in Gaul, [in the year 290,] the holy martyrs Amantius, Alexander, and their companions.
      - type: text
        text: At Fiesole, in Tuscany, [in the year 839,] the holy martyr Alexander, Bishop [of that see, drowned in a torrent by his enemies.]
      - type: text
        text: At Milan, deceased, [in the year 518,] the holy Confessor Eustorgius, second of that name, Bishop [of that see.]
      - type: text
        text: At Verona, holy John, Bishop [of that see, in the fourth century.]
      - type: text
        text: At Besançon, in Gaul, [in the year 699,] holy Claud, Archbishop [of that see.]
      la:
      - type: text
        text: Octávo Idus Iúnii
      - type: text
        text: ''
      - type: text
        text: Magdebúrgi sancti Norbérti, eiúsdem civitátis Epíscopi et Confessóris, qui Fundátor éxstitit Ordinis Præmonstraténsis.
      - type: text
        text: Cæsaréæ, in Palæstína, natális beáti Philíppi, qui fuit unus de septem primis Diáconis. Hic, signis et prodígiis clarus, Samaríam ad Christi fidem convértit, et Regínæ Æthíopum Candácis Eunúchum baptizávit, ac demum apud Cæsaréam requiévit. Iuxta ipsum tres Vírgines, eius fíliæ ac Prophetíssæ, tumulátæ iacent; nam quarta fília eius, plena Spíritu sancto, Ephesi occúbuit.
      - type: text
        text: Romæ sancti Artémii, cum uxóre sua Cándida, et fília Paulína. Ex his Artémius, ad prædicatiónem et mirácula sancti Petri Exorcístæ, ad Christum convérsus, et, cum omni domo sua, a sancto Marcéllino Presbýtero baptizátus, Seréni Iúdicis iussu plumbátis cæsus et gládio percússus est; uxor vero eius et fília, in cryptam impúlsæ, lapídibus ruderibúsque sunt óbrutæ.
      - type: text
        text: In agro Bononiénsi sancti Alexándri, Epíscopi Fæsuláni et Mártyris; qui, rédiens ex urbe Pápia, ubi Ecclésiæ suæ bona apud Longobardórum Regem ab usurpatóribus vindicáverat, ab his in Rhenum flúvium est deiéctus et aquis præfocátus.
      - type: text
        text: Tarsi, in Cilícia, sanctórum Mártyrum vigínti, qui, tempóribus Diocletiáni et Maximiáni, sub Simplício Iúdice, per divérsa torménta glorificavérunt Deum in corpóribus suis.
      - type: text
        text: Noviodúni, in Gálliis, sanctórum Mártyrum Amántii, Alexándri et Sociórum.
      - type: text
        text: Medioláni deposítio sancti Eustórgii Secúndi, Epíscopi et Confessóris.
      - type: text
        text: Verónæ sancti Ioánnis Epíscopi.
      - type: text
        text: Vesontióne, in Gálliis, sancti Cláudii Epíscopi.
  psalm.oct-vo-idus-ianu-rii-8df293e0f8:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Epiphany of the Lord.
      - type: citation
        text: 'Upon the same 6th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In the country of Reims, by command of the President Rictiovarus, in the persecution under the Emperor Diocletian, the holy virgin and martyr Macra she was first cast into the fire but remained unhurt, whereupon her breasts were cut off, and she was thrust into a prison and rolled upon sharp potsherds and live coals until she passed away in prayer to be ever with the Lord.
      - type: text
        text: On the same day are commemorated many holy martyrs in Africa, who were burnt at the stake in the persecution under the Emperor Severus.
      - type: text
        text: At Rennes, in Gaul, the holy confessor Melanius (Abbot of Platz) (in the year 511), bishop of that see, who after countless works of power passed gloriously out of this world to that heaven where his heart was already fixed (in the year 530).
      - type: text
        text: At Florence, holy Andrew Corsini of that city, a Carmelite friar, Bishop of Fiesoli, who was famous for miracles (in the year 1373), and whose name was numbered by Urban VIII. among those of the Saints, whose feast we keep upon the 4th day of February.
      - type: text
        text: At Geris, in Egypt, the holy hermit Nilammon, who gave up his soul in prayer to God while he was being haled against his will to make him a bishop (fifth century).
      la:
      - type: text
        text: Octávo Idus Ianuárii
      - type: text
        text: ''
      - type: text
        text: Epiphánia Dómini.
      - type: text
        text: Floréntiæ natális sancti Andréæ Corsíni, civis Florentíni, ex Ordine Carmelitárum, Epíscopi Fesuláni et Confessóris; quem, miráculis clarum, Urbánus Papa Octávus in Sanctórum númerum rétulit. Eius autem festívitas recólitur prídie Nonas Februárii.
      - type: text
        text: Barcinóne, in Hispánia, item natális sancti Raymúndi de Peñáfort, ex Ordine Prædicatórum, Confessóris, doctrína et sanctitáte célebris. Ipsíus vero festum décimo Kaléndas Februárii celebrátur.
      - type: text
        text: In Africa commemorátio plurimórum sanctórum Mártyrum, qui, in persecutióne Sevéri, ad palum ligáti sunt et igne consúmpti.
      - type: text
        text: In território Rheménsi pássio sanctæ Macræ Vírginis, quæ, in persecutióne Diocletiáni, iubénte Rictiováro Prǽside, cum in ignem esset præcipitáta et permansísset illǽsa, dehinc, mamíllis abscíssis et squalóre cárceris afflícta, super testas étiam acutíssimas ac prunas volutáta, tandem orans migrávit ad Dóminum.
      - type: text
        text: Rhédonis, in Gállia, sancti Melánii, Epíscopi et Confessóris; qui, post innumerabílium signa virtútum, iúgiter cælo inténtus, gloriósus migrávit a sǽculo.
      - type: text
        text: Geris, in Ægýpto, sancti Nilammónis reclúsi, qui, dum ad Episcopátum traherétur invítus, in oratióne spíritum Deo réddidit.
  psalm.oct-vo-idus-m-rtii-3b00b3d6f9:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 8th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, [in the year 646,] the holy Confessor Felix, Bishop of Dunwich, who converted the East Angles to the faith.
      - type: text
        text: At Granada, in Spain, [in the year 1550,] holy John of God, founder of the Order of brethren Hospitallers of the Sick. Famous for his pity toward the poor, and for his lowly esteem of himself, whom the Supreme Pontiff Leo XIII. declared the patron in heaven of all the sick and those who nurse them, whose feast we keep upon the 11th day of this present month of March.
      - type: text
        text: At Antinoe, in Egypt, the holy martyrs Philemon and Apolonius the Deacon. They were arrested, and brought before the judge, but as they steadfastly refused to sacrifice to idols their heels were bored through, and they were cruelly dragged about the city until at last they were dispatched with the sword.
      - type: text
        text: There also the holy martyrs the President Arian, [governor of Thebes,] Theoticus, and three others whom the judge caused to be drowned in the sea, but their bodies were brought to the shore by dolphins, [in the year 287.]
      - type: text
        text: At Nicomedia, the holy martyr Quinctilis, Bishop of that city.
      - type: text
        text: At Carthage, holy Pontius, Deacon to blessed Bishop Cyprian, with whom he remained in exile even unto the day of his death, and hath left unto us an excellent book of his life and passion.
      - type: text
        text: In his own sufferings he glorified the Lord always, and hath earned the crown of life, [about the year 262.]
      - type: text
        text: In Africa likewise, the holy Bishop Cyril, Rogatus, Felix, another Rogatus, Beata, Herenia, Felicitas, Urban, Silvan, and Mamillus.
      - type: text
        text: At Toledo, in Spain, the blessed Confessor Julian, Bishop of that see, [and also native of the same place.] Very famous for his holiness and teaching, [in the year 690.]
      la:
      - type: text
        text: Octávo Idus Mártii
      - type: text
        text: ''
      - type: text
        text: Granátæ, in Hispánia, sancti Ioánnis de Deo Confessóris, qui Ordinis Fratrum Hospitalitátis infirmórum fuit Institútor, ac misericórdia in páuperes et sui despéctu éxstitit insígnis; quem Leo Décimus tértius, Póntifex Máximus, cæléstem ómnium hospitálium et infirmórum Patrónum renuntiavit.
      - type: text
        text: Nicomedíæ sancti Quinctílis, Epíscopi et Mártyris.
      - type: text
        text: In Africa sanctórum Mártyrum Cyrílli Epíscopi, Rogáti, Felícis, item Rogáti, Beátæ, Heréniæ, Felicitátis, Urbáni, Silváni et Mamílli.
      - type: text
        text: Apud Antínoum, Ægýpti urbem, natális sanctórum Mártyrum Apollónii Diáconi, et Philémonis; qui, tenti et ad Iúdicem addúcti, et, cum sacrificáre idólis constánter renuíssent, ambo, perforátis calcáneis, per civitátem horribíliter tracti, ac novíssime, gládio cæsi, martýrium complevérunt.
      - type: text
        text: Ibídem pássio sanctórum Ariáni Prǽsidis, Theótici et aliórum trium, quos Iudex submérsos in mare necávit, sed delphinórum obséquio córpora eórum ad littus deláta sunt.
      - type: text
        text: Carthágine sancti Póntii, qui fuit Diáconus beáti Cypriáni Epíscopi, et, usque ad diem mortis illíus sústinens cum ipso exsílium, vitæ et passiónis eius egrégium volúmen relíquit, atque, in suis passiónibus Dóminum semper gloríficans, corónam vitæ proméruit.
      - type: text
        text: Toléti, in Hispánia, deposítio beáti Iuliáni, Epíscopi et Confessóris, sanctitáte et doctrína celebérrimi.
      - type: text
        text: In Anglia sancti Felícis Epíscopi, qui orientáles Anglos ad fidem convértit.
  psalm.oct-vo-idus-maii-bd22a2dad6:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is kept the feast in honour of the Manifestation of the holy Archangel Michael on Mount Gargano.
      - type: citation
        text: 'Upon the same 8 th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Milan, the holy martyr Victor. He was a Moor by nation, and had been bred up a Christian from a child. He was a soldier in the Imperial Camp when he was commanded by Maximian to sacrifice to idols, but continued manfully to own the Lord. He was first heavily cudgelled, but God shielded him from pain and then molten lead was poured upon him, but by this also he was not hurt and so at last, being beheaded, finished the glorious course of his testimony.
      - type: text
        text: At Constantinople, the holy Centurion Acathius, who in the persecution under Diocletian and Maximian was denounced as a Christian by the Tribune Firmus. He was most cruelly tortured at Perinthos, on the Black Sea, by Bibianus the judge, and was lastly condemned to death at Byzantium by the Pro-Consul Flaccinus. By the Will of God his body was afterwards carried to the shore at Squillacio in Calabria, where it is honourably buried.
      - type: text
        text: At Vienna, the holy Confessor Denis, Bishop [of that see.]
      - type: text
        text: At Auxerre, [toward the close of the fourth century,] the holy Helladius, Bishop [of that see.]
      - type: text
        text: In the country of Besancon, [in the year 1174,] the holy Peter, Bishop [of Tarantaise.]
      - type: text
        text: In Ireland, [about the year 700,] the holy Bishop Wiro.
      la:
      - type: text
        text: Octávo Idus Maii
      - type: text
        text: ''
      - type: text
        text: Cracóviæ, in Polónia, natális sancti Stanislái, Epíscopi et Mártyris, qui a Bolesláo, ímpio Rege, necátus est. Ipsíus autem festum prídie huius diéi celebrátur.
      - type: text
        text: Medioláni item natális sancti Victóris Mártyris, qui, natióne Maurus et a primǽva ætáte Christiánus, a Maximiáno, cum esset in castris imperiálibus miles, compúlsus ut idólis sacrificáret, et in confessióne Dómini fortíssime persevérans, ídeo, primum gráviter fústibus cæsus, sed, Deo protegénte, dolóris expers; deínde liquénti plumbo perfúsus, sed nihil pénitus læsus; novíssime gloriósi martýrii cursum, cápite abscíssus, implévit.
      - type: text
        text: Constantinópoli sancti Agáthii Centuriónis, qui, in persecutióne Diocletiáni et Maximiáni, a Firmo Tribúno delátus quod Christiánus esset, et a Iúdice Perínthi Bibiáno sævíssime tortus, Byzántii demum a Procónsule Flaccíno cápitis damnátus est. Ipsíus corpus ad Scyllácium littus, in Calábria, divínitus póstea delátum est, atque ibi honorífice asservátum.
      - type: text
        text: Romæ sancti Bonifátii Papæ Quarti, qui Pántheon in honórem beátæ Maríæ ad Mártyres dedicávit.
      - type: text
        text: Item Romæ sancti Benedícti Secúndi, Papæ et Confessóris.
      - type: text
        text: Viénnæ, in Gállia, sancti Dionýsii, Epíscopi et Confessóris.
      - type: text
        text: Antisiodóri sancti Helládii Epíscopi.
      - type: text
        text: In monastério Bellæ Vallis, in território Bisuntíno, sancti Petri, qui ex Mónacho Cisterciénsi factus est Tarentasiénsis in Sabáudia Epíscopus.
      - type: text
        text: Apud Ruræmóndam, in Géldria, sancti Wirónis, Epíscopi Scoti.
      - type: text
        text: In monte Gargáno Apparítio sancti Michaélis Archángeli, quem Pius Papa Duodécimus Radiólogis et Radiumtherapéuticis Patrónum et Protectórem constítuit.
  psalm.oct-vo-idus-nov-mbris-a07aee6a72:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 6th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Thinissa, in Africa, (in the fourth century,) the holy martyr Felix, who had made his confession and was reserved for the torture, when on the next day he was found dead in prison, as is told by holy Augustine in his exposition of Ps. cxxvii. made to the people upon his festival.
      - type: text
        text: At Antioch, ten holy martyrs who are recorded to have suffered at the hands of the Saracens.
      - type: text
        text: At Barcelona, the holy martyr Severus, Bishop (of that see,) who for the Catholic faith's sake had a nail driven into his head, and so received the crown of martyrdom.
      - type: text
        text: In Phrygia, holy Atticus.
      - type: text
        text: At Bergues, (before the middle of the eighth century,) holy Winoc, Abbot (of Wormhout,) famous for graces and miracles, who ministered for a long time to the brethren subject unto him.
      - type: text
        text: At Fondi, in Latium, (in the sixth century,) the holy Monk Felix.
      - type: text
        text: At Limoges, in Aquitaine, (in the sixth century,) the holy Confessor Leonard, a disciple of blessed Bishop Remy. He was noble by birth, but chose the life of an hermit, and is famous for his holiness and miracles, but his power hath been most chiefly shown in the freeing of prisoners.
      la:
      - type: text
        text: Octávo Idus Novémbris
      - type: text
        text: ''
      - type: text
        text: Barcinóne, in Hispánia, sancti Sevéri, Epíscopi et Mártyris; qui ob fidem cathólicam, confósso per clavum cápite, martýrii corónam accépit.
      - type: text
        text: Thiníssæ, in Africa, natális sancti Felícis Mártyris, qui, conféssus et ad torménta dilátus, alio die (ut refert sanctus Augustínus, Psalmum in eius festivitáte ad pópulum expónens) invéntus est in cárcere exánimis.
      - type: text
        text: Theópoli, quæ est Antiochía, sanctórum decem Mártyrum, qui a Saracénis passi legúntur.
      - type: text
        text: In Phrýgia sancti Attici Mártyris.
      - type: text
        text: Apud Bergas, in Flándria, deposítio sancti Winóci Abbátis, qui, virtútibus et miráculis clarus, étiam frátribus sibi súbditis multo témpore ministrávit.
      - type: text
        text: Fundis, in Látio, sancti Felícis Mónachi.
      - type: text
        text: Lemóvicis, in Aquitánia, sancti Leonárdi Confessóris, qui fuit beáti Remígii Epíscopi discípulus. Hic, nóbili génere ortus, solitáriam vitam delégit, et sanctitáte ac miráculis cláruit; eiúsque virtus præcípue in liberándis captívis enítuit.
  psalm.oct-vo-idus-oct-bris-85c17e8750:
    role: psalm
    content:
      en:
      - type: text
        text: On the 8th day of October we keep the Feast of the holy Widow Bridget, (Princess of Nericia.) After many pilgrimages to holy places she died at Rome, full of the Spirit of God, upon the 23rd day of July, (in the year 1373) But her body was taken to Sweden upon the 7th day of October.
      - type: citation
        text: 'Upon the same 8th day of October, were born into the better life:'
      - type: text
        text: The holy old man Simeon, of whom it is written in the Gospel that he took the Lord Jesus up in his arms.
      - type: text
        text: At Caesarea, in Palestine, the holy Virgin and martyr Reparata. Forasmuch as she would not offer sacrifice to idols, she was put to diverse torments, and then beheaded, under the Emperor Decius. Her soul was seen to leave her body and soar heavenward in a bodily shape like a dove.
      - type: text
        text: At Thessalonica, the holy Proconsul Demetrius, who brought many to believe in Christ, and was martyred by being pierced through with lances, by command of the Emperor Maximian. There also the holy martyr Nestor.
      - type: text
        text: At Seville, in Spain, the holy martyr Peter.
      - type: text
        text: At Laodicea, the holy Priest Artemon, who under the Emperor Diocletian received the crown of martyrdom by fire.
      - type: text
        text: In the country of Lyons, the holy Virgin and martyr Benedicta.
      - type: text
        text: At Ancona, holy Palatias and Laurentia, who were carried into exile by command of the President Dion, in the persecution under the Emperor Diocletian, and died of exhaustion and suffering.
      - type: text
        text: At Rouen, (in the fifth century,) the holy Confessor Evodius, Bishop (of that see.)
      - type: text
        text: At Jerusalem, (about the year 460,) holy Pelagia, surnamed the Penitent.
      la:
      - type: text
        text: Octávo Idus Octóbris
      - type: text
        text: ''
      - type: text
        text: Sanctæ Birgíttæ Víduæ, cuius dies natális décimo Kaléndas Augústi, ac Translátio Nonis Octóbris recensétur.
      - type: text
        text: Sanctórum Mártyrum Sérgii, Bacchi, Marcélli et Apuléii, quorum dies natális precedénti die refértur.
      - type: text
        text: Eódem die natális beáti Simeónis senis, qui in Evangélio Dóminum Iesum, præsentátum in Templo, suis in ulnis accepísse ac de illo prophetásse légitur.
      - type: text
        text: Laodicéæ, in Phrýgia, sancti Artémonis Presbýteri, qui per ignem, sub Diocletiáno, martýrii corónam accépit.
      - type: text
        text: Thessalonícæ sancti Demétrii Procónsulis, qui, cum plúrimos ad Christi fidem perdúceret, ídeo, Maximiáni Imperatóris iussu lánceis confóssus, martýrium consummávit.
      - type: text
        text: Ibídem sancti Néstoris Mártyris.
      - type: text
        text: Híspali, in Hispánia, sancti Petri Mártyris.
      - type: text
        text: Cæsaréæ, in Palæstína, pássio sanctæ Reparátæ, Vírginis et Mártyris; quæ, cum nollet idólis sacrificáre, sub Décio Imperatóre, váriis tormentórum genéribus cruciátur, ac demum gládio percútitur. Ipsíus autem ánima, in colúmbæ spécie, de córpore égredi cælúmque conscéndere visa est.
      - type: text
        text: In território Laudunénsi natális sanctæ Benedíctæ, Vírginis et Mártyris.
      - type: text
        text: Ancónæ sanctárum Palatiátis et Lauréntiæ, quæ, in persecutióne Diocletiáni, sub Dióne Prǽside, in exsílium deportátæ, labóribus et ærúmnis conféctæ sunt.
      - type: text
        text: Rotómagi sancti Evódii, Epíscopi et Confessóris.
      - type: text
        text: Hierosólymis sanctæ Pelágiæ, cognoménto Pæniténtis.
  psalm.oct-vo-idus-sept-mbris-75dbedf316:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 6th day of September is commemorated
      - type: text
        text: ''
      - type: text
        text: The Prophet Zachariah, who returned home from Chaldea as an old man, and is buried beside the prophet Haggai.
      - type: text
        text: 'Upon the same day, were born into the better life: At the Dardanelles, holy Onesiphorus, a disciple of the Apostles, of whom holy Paul maketh mention in writing unto Timothy. By command of the Proconsul Hadrian, holy Onesiphorus and Porphyry were heavily beaten, and drawn by wild horses, and so gave up their souls to God.'
      - type: text
        text: At Alexandria, the holy martyrs the Priest Faustus, Macarius, and ten Companions, who finished their testimony for Christ's name's sake, under the Emperor Decius and the President Valerius, by being beheaded.
      - type: text
        text: In Cappadocia, the holy martyrs the Deacon Cottidus, Eugenius, and their Companions.
      - type: text
        text: In Africa, the holy Bishops Donatian, Prassidius, Mansuetus, German, and Fusculus, who in the persecution under the Vandals were, by command of the Arian King Hunneric, because of their assertion of the Catholic truth, heavily beaten with cudgels, and banished. Among them was also a Bishop named Laetus, a man of great activity and learning, who, after suffering a long and foul imprisonment, was burnt.
      - type: text
        text: At Verona, (in the fifth century,) the holy Confessor Petronius, Bishop (of that see.) At Rome, the holy Abbot Eleutherius, the servant of God, of whom holy Pope Gregory writeth, that by his prayer and tears he raised a man from the dead.
      la:
      - type: text
        text: Octávo Idus Septémbris
      - type: text
        text: ''
      - type: text
        text: In Palæstína sancti Zacharíæ Prophétæ, qui, de Chaldǽa senex in patriam revérsus, ibíque defúnctus, iuxta Aggǽum Prophétam cónditus iacet.
      - type: text
        text: In Hellespónto sancti Onesíphori, Apostolórum discípuli, cuius méminit sanctus Paulus ad Timótheum scribens. Ipse autem Onesíphorus ibídem, una cum sancto Porphýrio, iussu Hadriáni Procónsulis ácriter verberátus et a ferócibus raptátus equis, spíritum Deo réddidit.
      - type: text
        text: In Africa sanctórum Episcopórum Donatiáni, Præsídii, Mansuéti, Germáni et Fúsculi; qui, in persecutióne Wandálica, iussu Ariáni Regis Hunneríci, pro assertióne cathólicæ veritátis, fústibus diríssime cæsi et exsílio elimináti sunt. Inter eos étiam erat Epíscopus, nómine Lætus, strénuus atque doctíssimus vir, qui, post diutúrnos cárceris squalóres, incéndio concremátus est.
      - type: text
        text: Alexandríæ pássio sanctórum Mártyrum Fausti Presbýteri, Macárii et Sociórum decem; qui, sub Décio Imperatóre et Valério Prǽside, pro Christi nómine, abscíssis cervícibus, martýrium complevérunt.
      - type: text
        text: In Cappadócia sanctórum Mártyrum Cóttidi Diáconi, Eugénii et Sociórum.
      - type: text
        text: Verónæ sancti Petrónii, Epíscopi et Confessóris.
      - type: text
        text: Romæ sancti Eleuthérii Abbátis, qui Dei servus fuit, atque (ut sanctus Gregórius Papa scribit) oratióne et lácrimis mórtuum suscitávit.
  psalm.oct-vo-kal-ndas-apr-lis-85a7381d1b:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the feast of the Annunciation of the most Blessed Virgin Mary, Mother of God.
      - type: citation
        text: 'Upon the same 25th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Quirinus, under the Emperor Claudius. He suffered the spoiling of his goods, a foul imprisonment, and many stripes, and was at length slain with the sword [, in the year 269]. His body was cast into the Tiber, but the Christians found it on the island of Lycaonia and buried it in the cemetery of Pontianus.
      - type: text
        text: Likewise at Rome, two hundred and sixty-two holy martyrs.
      - type: text
        text: At Sirmium, [in Hungary,] the holy martyr Irenaeus, Bishop of that see, who under the President Probus, in the time of the Emperor Maximian, was first put to grievous torments, then suffered for many days in prison, and at last was beheaded.
      - type: text
        text: At Nicomedia, the holy Dula, a female slave belonging to a certain soldier she was killed in defending her chastity, and so gained the crown of martyrdom.
      - type: text
        text: At Jerusalem, is commemorated the Good Thief, who confessed Christ upon the Cross, and won from Him the words "This day thou shalt be with Me in Paradise".
      - type: text
        text: At Laodicea, holy Pelagius, Bishop of that see, who suffered exile and other hardships for the Catholic faith's sake, in the time of the Emperor Valens, and fell asleep in the Lord.
      - type: text
        text: At Pistoia, the holy Confessors Barontius and Desiderius [about the year 700].
      - type: text
        text: In the island of Aindre, in the river Loire, the Holy Abbot Hermeland, the glory of whose life is set forth by the fame of his miracles [about the year 718].
      la:
      - type: text
        text: Octávo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Annuntiátio beatíssimæ Vírginis Genitrícis Dei Maríæ.
      - type: text
        text: 'Hierosólymis commemorátio sancti Latrónis, qui, in cruce Christum conféssus, ab eo méruit audíre: « Hódie mecum eris in paradíso ».'
      - type: text
        text: Romæ sancti Quiríni Mártyris, qui, sub Cláudio Imperatóre, post facultátum amissiónem, post cárceris squalórem, post multórum vérberum afflictiónem, gládio interféctus est et in Tíberim proiéctus; quem Christiáni, cum in ínsula Lycaónia (quæ póstea sancti Bartholomǽi dicta est) inveníssent, in cœmetério Pontiáni condidérunt.
      - type: text
        text: Item Romæ sanctórum ducentórum sexagínta duórum Mártyrum.
      - type: text
        text: Sírmii pássio sancti Irenǽi, Epíscopi et Mártyris; qui, témpore Maximiáni Imperatóris, sub Prǽside Probo, primum torméntis acérrimis vexátus, deínde diébus plúrimis cruciátus in cárcere, novíssime, abscísso cápite, consummátus est.
      - type: text
        text: Nicomedíæ sanctæ Dulæ, cuiúsdam mílitis ancíllæ, quæ, ob castitátem servándam occísa, martýrii corónam proméruit.
      - type: text
        text: Laodicéæ, ad Líbanum, sancti Pelágii Epíscopi, qui, ob fidem cathólicam, témpore Valéntis, exsílium et ália passus est; ac tandem, in sedem suam restitútus, quiévit in Dómino.
      - type: text
        text: In Antro, ínsula Lígeris flúminis, sancti Hermelándi Abbátis, cuius gloriósa conversátio insígni miraculórum præcónio commendátur.
      - type: text
        text: Pistórii, in Túscia, sanctórum Confessórum Baróntii et Desidérii.
      - type: text
        text: Faliscodúni sanctæ Lúciæ Filippíni, Fundatrícis Institúti Magistrárum Piárum ab eius cognómine nuncupatárum, de Christiána puellárum et mulíerum, præsértim páuperum, eruditióne óptime méritæ, quam Pius Papa Undécimus inter sanctas Vírgines rétulit.
  psalm.oct-vo-kal-ndas-aug-sti-0ae755f17c:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast
      - type: text
        text: ''
      - type: text
        text: Holy Apostle James, brother to the blessed Evangelist John. He was beheaded by King Herod Agrippa about the time of the Passover. His sacred bones were on this day brought from Jerusalem to Spain, and laid in the uttermost parts thereof, in Gallicia, where they are devoutly honoured by the constant veneration of the peoples of that country, and by the flocking together of multitudes of Christians who betake themselves thither for godliness' sake and from vows.
      - type: text
        text: In Lycia, the holy martyr Christopher, who, under the Emperor Decius, was beaten with iron rods. He was preserved from fire by the power of Christ, but at last was shot with arrows, and then beheaded, and so finished his testimony.
      - type: text
        text: At Barcelona, in Spain, the blessed martyr Cucufas, who, in the persecution under the Emperor Diocletian, overcame many torments under the President Dacian, and was then smitten with the sword, and so passed a conqueror to Heaven.
      - type: text
        text: In Palestine, the holy martyr Paul. He was condemned to death under the President Firmilian in the persecution under the Emperor Maximian Galerius. He asked for a few moments in which to pray, sovereign he besought God with all his heart for his fellow-countrymen then for the Jews and Gentiles, that they might be brought to the knowledge of the truth then for the multitude that stood around then for the judge who had condemned him, and for the executioner who was to slay him. Then his head was cut off, and he received the crown of martyrdom.
      - type: text
        text: There also the holy Virgin and martyr Valentina. When she was led to the altar to sacrifice, she kicked it over. She was horribly tortured, and then cast into the fire, along with another Virgin that was her companion, and so hastened hence, to be with Christ her Bridegroom.
      - type: text
        text: At Civita di Bagno, in Valeria, [in the third century,] the holy martyrs Florence and Felix of Siponte.
      - type: text
        text: At Cordova, [in the ninth century,] the holy martyr, the monk Theodemir.
      - type: text
        text: At Trier, [at the end of the sixth century,] the holy Confessor Magneric, Bishop [of that see.]
      la:
      - type: text
        text: Octávo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Iacóbi Apóstoli, qui éxstitit beáti Ioánnis Evangelístæ frater; et, prope festum Paschæ ab Heróde Agríppa decollátus, primus ex Apóstolis corónam martýrii percépit. Eius sacra ossa, ab Hierosólymis ad Hispánias hoc die transláta, et in últimis eárum fínibus apud Gallǽciam recóndita, celebérrima illárum géntium veneratióne, et frequénti Christianórum concúrsu, religiónis et voti causa illuc adeúntium, pie colúntur.
      - type: text
        text: In Lýcia sancti Christóphori Mártyris, qui, sub Décio, virgis férreis attrítus, et e flammæ æstuántis incéndio supérna Christi virtúte servátus, ad últimum, sagittárum íctibus confóssus, cápitis obtruncatióne martýrium complévit.
      - type: text
        text: Barcinóne, in Hispánia, natális beáti Cucuphátis Mártyris, qui, in persecutióne Diocletiáni, sub Daciáno Prǽside, plúrimis torméntis superátis, tandem, percússus gládio, victor migrávit in cælum.
      - type: text
        text: In Palæstína sancti Pauli Mártyris, qui, in persecutióne Maximiáni Galérii, sub Firmiliáno Prǽside, cápitis damnátus, et, exíguo orándi spátio impetráto, primum pro contribúlibus suis, deínde pro Iudǽis et Gentílibus, ut fídei veritátem agnóscerent, póstea pro circumstántium multitúdine, demum pro Iúdice qui ipsum damnáverat, et pro carnífice a quo feriéndus erat, Deum toto corde precátus, martýrii corónam, abscíssis cervícibus, accépit.
      - type: text
        text: Furcónii, in Vestínis, sanctórum Mártyrum Sipontinórum Floréntii et Felícis.
      - type: text
        text: Córdubæ, in Hispánia, sancti Theodemíri, Mónachi et Mártyris.
      - type: text
        text: In Palæstína sanctæ Valentínæ Vírginis, quæ, cum ad aram, ut immoláret, addúcta esset, eámque cálcibus evertísset, prius diríssime cruciáta est; deínde, una cum sócia Vírgine, in ignem coniécta cucúrrit ad Sponsum.
      - type: text
        text: Tréviris sancti Magneríci, Epíscopi et Confessóris.
  psalm.oct-vo-kal-ndas-dec-mbris-bb46696ce2:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the Feast
      - type: text
        text: ''
      - type: text
        text: Of the holy Confessor John of the Cross, of whom mention is made upon the 14th day of December.
      - type: citation
        text: 'Upon the same 24th day of November, were born into the better life:'
      - type: text
        text: The holy martyr Chrysogonus, who long endured bonds and imprisonment for his steadfast confession of Christ, but was at length brought to Aquileia by command of Diocletian, and was there beheaded, whereafter his body was cast into the sea, and so he finished his testimony.
      - type: text
        text: At Rome, the holy martyr Crescentian, of whom record is made in the history of the last sufferings of the blessed Pope Marcellus.
      - type: text
        text: At Amelia, in Umbria, the holy Virgin and martyr Firmina in the persecution under the Emperor Diocletian she was put to diverse torments, but was at length hung up and burnt with lamps, until she gave up the ghost.
      - type: text
        text: At Corinth, under the Emperor Julian the Apostate and the President Sallust, the holy martyr Alexander, who fought for Christ's faith even unto death.
      - type: text
        text: At Cordova, the holy Virgins and martyrs Flora and Mary, who were long imprisoned, and then slain with the sword, in the persecution under the Arabs.
      - type: text
        text: At Perugia, the holy martyr Felicissimus.
      - type: text
        text: At Milan, holy Protasius, Bishop (of that see,) who defended the cause of Athanasius before the Emperor Constans in the Council of Sardica, and passed away to be ever with the Lord, worn out by many toils for the sake of religion and of the Church committed to his care.
      - type: text
        text: At Blaye, (in the fourth century,) the holy Priest Romanus, the praise of whose holiness is proclaimed by the glory of his miracles.
      - type: text
        text: In Auvergne, (in the sixth century,) holy Portian, Abbot (of Mirande,) who was famous for miracles, under King Theodoric.
      la:
      - type: text
        text: Octávo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis a Cruce Presbýteri, Confessóris et Ecclésiæ Doctóris, sanctæ Terésiæ in Carmelitárum reformatióne sócii, cuius dies natális décimo nono Kaléndas Ianuárii recensétur.
      - type: text
        text: Eódem die natális sancti Chrysógoni Mártyris, qui, post longa víncula et cárceres pro constantíssima Christi confessióne tolerátos, Aquiléiam, iubénte Diocletiáno, perdúctus, tandem, cæsus cápite et in mare proiéctus, martýrium consummávit.
      - type: text
        text: Romæ sancti Crescentiáni Mártyris, qui in passióne beáti Marcélli Papæ memorátur.
      - type: text
        text: Apud Corínthum sancti Alexándri Mártyris, qui, sub Iuliáno Apóstata et Sallústio Prǽside, pro Christi fide certávit usque ad mortem.
      - type: text
        text: Perúsiæ sancti Felicíssimi Mártyris.
      - type: text
        text: Amériæ, in Umbria, sanctæ Firmínæ, Vírginis et Mártyris; quæ, in persecutióne Diocletiáni Imperatóris, várie cruciáta est, ac demum, suspénsa et lampádibus ardéntibus adústa, immaculátum spíritum Deo réddidit.
      - type: text
        text: Córdubæ, in Hispánia, sanctárum Vírginum et Mártyrum Floræ et Maríæ; quæ, post diutúrnos cárceres, in persecutióne Arábica, gládio interémptæ sunt.
      - type: text
        text: Medioláni sancti Protásii Epíscopi, qui apud Constántem Imperatórem in Concílio Sardicénsi causam Athanásii deféndit, ac demum, pro Ecclésia sibi commíssa et pro religióne multis perfúnctus labóribus, migrávit ad Dóminum.
      - type: text
        text: In território Arvernénsi sancti Portiáni Abbátis, qui, sub Theodoríco Rege, miráculis cláruit; cuius étiam nomen índitum mansit tam monastério cui Sanctus ipse prǽfuit, quam óppido quod in eódem loco póstea constrúctum fuit.
      - type: text
        text: In castro Blávio, in Gállia, sancti Románi Presbýteri, cuius sanctitátis præcónium glória miraculórum declárat.
  psalm.oct-vo-kal-ndas-febru-rii-48a777f8fd:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we commemorate the conversion of the holy Apostle Paul, which took place in the second year after our Lord's ascension.
      - type: citation
        text: 'Upon the same 25th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Damascus, holy Ananias, who baptized the aforesaid apostle. He preached the Gospel at Damascus and at other places, and was first scourged and rent with thongs, and then stoned to death under the judge Licinius.
      - type: text
        text: At Antioch, the holy martyrs Juventinus and Maximus, who were crowned with martyrdom under the Emperor Julian the Apostate, and on whose feast-day holy John Chrysostom preached unto the people.
      - type: text
        text: At Auvergne, (in the year 674,) the holy martyrs Projectus, Bishop of that see, and Marinus the man of God, who suffered under the chief men of that city.
      - type: text
        text: Likewise the holy martyrs Donatus, Sabinus, and Agapis.
      - type: text
        text: At Tomis, in Scythia, holy Bretannion, Bishop (of that see), who flourished in the Church in wonderful holiness and zeal for the Catholic faith under the Arian Emperor Valens, whom he withstood stoutly.
      - type: text
        text: At Arras, in Gaul, holy Poppo, Abbot (of Stavelotz,) famous for miracles, (in the year 1048, and also his mother, blessed Adelviva.)
      la:
      - type: text
        text: Octávo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Convérsio sancti Pauli Apóstoli, quæ fuit anno secúndo ab Ascensióne Dómini.
      - type: text
        text: Apud Damáscum natális sancti Ananíæ, qui fuit discípulus Dómini, et eúndem Paulum Apóstolum baptizávit. Ipse autem, cum Damásci, et Eleutherópoli, alibíque Evangélium prædicásset, tandem, sub Licínio Iúdice, nervis cæsus et laniátus, ac lapídibus oppréssus, martýrium consummávit.
      - type: text
        text: Arvérnis, in Gállia, sanctórum Præiécti Epíscopi, et Amaríni, Abbátis Cloroangiénsis, qui ambo a procéribus eiúsdem urbis passi sunt.
      - type: text
        text: Antiochíæ sanctórum Mártyrum Iuventíni et Máximi, qui, sub Iuliáno Apóstata, martýrio coronáti sunt; in quorum die natáli sanctus Ioánnes Chrysóstomus sermónem ad pópulum hábuit.
      - type: text
        text: Item sanctórum Mártyrum Donáti, Sabíni et Agapis.
      - type: text
        text: Tomis, in Scýthia, sancti Bretanniónis Epíscopi, qui mira sanctitáte et cathólicæ fídei zelo, sub Ariáno Imperatóre Valénte, cui fórtiter réstitit, in Ecclésia flóruit.
      - type: text
        text: Marciánis, in Gállia, sancti Poppónis, Presbýteri et Abbátis, miráculis clari.
  psalm.oct-vo-kal-ndas-i-lii-56b322dd10:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the birthday of the holy Baptist John, the Forerunner of the Lord, the son of Zacharias and Elizabeth, who was filled with the Holy Ghost while yet he was in his mother's womb.
      - type: text
        text: Upon the same 24th day of June is made the commemoration of
      - type: text
        text: ''
      - type: text
        text: The very many holy martyrs at Rome who were falsely accused by the Emperor Nero of having set the city on fire, and were by him ordered to be put to death in many diverse and most cruel ways.
      - type: text
        text: Some were sewn up in the skins of wild beasts and put to be torn by dogs, some were crucified, some were burnt as torches to give light by night these were all disciples of the Apostles, and the first martyrs whom the Church of Rome, a field fruitful in martyrs, sent to be with the Lord, even before the slaying of the Apostles themselves.
      - type: text
        text: There also the holy martyrs Faustus and twenty-three others.
      - type: text
        text: At Mechelen, in Brabant, [in the eighth century,] the holy martyr Rombout, Bishop [of that city,] son of an Irish king and Bishop of Dublin.
      - type: text
        text: At Satala, in Armenia, the holy brethren Orentius, Eros, Pharnacius, Firminus, Firmus, Cyriacus, and Longinus, all soldiers and all martyrs. Because they were Christians, the Emperor Maximian expelled them from the army, separated them from one another, and sent them to diverse places, where in sorrow and suffering they fell asleep in the Lord, [about the year 306.]
      - type: text
        text: In the village of Créteil, in the country near Paris, the holy martyrs Agoard and Agilbert, with others, both men and women, who cannot be counted.
      - type: text
        text: At Autun, the holy Confessor Simplicius, Bishop [of that see.]
      - type: text
        text: At Lobbes, the holy Theodulf, Bishop [of that see.]
      - type: text
        text: At Style, in Calabria, holy John, surnamed Therestus, famous for his praise as a monk, and for his holy life.
      la:
      - type: text
        text: Octávo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Natívitas sancti Ioánnis Baptístæ, Præcursóris Dómini, ac sanctórum Zacharíæ et Elísabeth fílii, qui Spíritu Sancto replétus est adhuc in útero matris suæ.
      - type: text
        text: Romæ commemorátio sanctórum plurimórum Mártyrum, qui a Neróne Imperatóre, ut a se incénsæ Urbis ódium avérteret, calumnióse accusáti, divérso mortis génere iussi sunt sævíssime intérfici. Horum síquidem álii, ferárum tergis contécti, laniátibus canum expósiti sunt; álii crúcibus affíxi; aliíque incéndio tráditi, ut, ubi defecísset dies, in usum noctúrni lúminis deservírent. Erant hi omnes Apostolórum discípuli, et primítiæ Mártyrum, quas Romána Ecclésia, fértilis ager Mártyrum, ante Apostolórum necem transmísit ad Dóminum.
      - type: text
        text: Item Romæ sanctórum Mártyrum Fausti et aliórum vigínti trium.
      - type: text
        text: Mechlíniæ, in Brabántia, pássio sancti Rumóldi, Epíscopi Dublinénsis et Mártyris, e Scotórum Rege progéniti.
      - type: text
        text: Sátalis, in Arménia, sanctórum Mártyrum septem fratrum, scílicet Oréntii, Heróis, Pharnácii, Firmíni, Firmi, Cyríaci et Longíni mílitum; qui a Maximiáno Imperatóre, eo quod Christiáni essent, cíngulo militári priváti sunt, et, ab invícem separati atque in divérsa loca abdúcti, in dolóribus et ærúmnis pósiti, quievérunt in Dómino.
      - type: text
        text: In vico Christólio, in território Parisiénsi, pássio sanctórum Mártyrum Agoárdi et Aglibérti, cum áliis innúmeris promíscui sexus.
      - type: text
        text: Augustodúni deposítio sancti Simplícii, Epíscopi et Confessóris.
      - type: text
        text: Láubiis, in Bélgio, sancti Theodúlphi Epíscopi.
  psalm.oct-vo-kal-ndas-i-nii-7d82e7bea4:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep in England the feast of the holy Confessor Aldhelm, Bishop of Sherborne.
      - type: citation
        text: 'On the same 25th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Salerno, the blessed Pope Gregory VII, a right stout champion and defender of the freedom of the Church, whose feast we keep upon the 28th day of this same month of May.
      - type: text
        text: At Florence, the holy Virgin, Mary Magdalene de' Pazzi, of the Order of Carmelites, famous for her holy life, whose feast we keep upon the 3rd day of June.
      - type: text
        text: At Rome, upon the Nomentan Way, the blessed martyr, Pope Urban I, who by his exhortation and teaching turned to the faith of Christ many who suffered martyrdom therefore, among whom were Tiburtius and Valerian. He himself also suffered many things for the Church of God in the persecution under the Emperor Alexander Severus, and at length, being beheaded, was crowned with martyrdom.
      - type: text
        text: At Dorostorum, in Bulgaria, the holy martyrs Pasicrates, Valention, and two others, who were all crowned together.
      - type: text
        text: At Milan, holy Bishop Denis. He was banished into Cappadocia by the Arian Emperor Constantius for the Catholic faith's sake, and so there gave up his spirit to God with a near approach to martyrdom. His sacred body was sent to Milan to blessed Bishop Ambrose by Bishop Aurelius, prompted to that godly act, as is said, by holy Basil the Great.
      - type: text
        text: At Rome, the holy Pope Boniface IV, who consecrated the Pantheon as the Church of the Blessed Virgin Mary and All holy Martyrs.
      - type: text
        text: At Florence, [in the fifth century,] holy Zenobius, Bishop of that city, distinguished for the holiness of his life and the fame of his wondrous works.
      - type: text
        text: In the country of Troyes, [in the sixth century,] the holy Confessor Leo.
      - type: text
        text: At Assisi, in Umbria, is commemorated the translation of the holy Confessor Francis, in the time of Pope Gregory IX.
      - type: text
        text: Also at Veroli, in Latium, the translation of holy Mary, [mother] of James, whose sacred body is honoured by many works of power.
      la:
      - type: text
        text: Octávo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Salérni deposítio beáti Gregórii Séptimi, Papæ et Confessóris, ecclesiásticæ libertátis propugnatóris ac defensóris acerrimi.
      - type: text
        text: Romæ, via Nomentána, natális beáti Urbáni Primi, Papæ et Mártyris, cuius exhortatióne et doctrína complúres (in quibus fuére Tibúrtius et Valeriánus) Christi suscepérunt fidem, et pro ea martýrium subiérunt. Ipse quoque, in persecutióne Alexándri Sevéri, multa passus pro Ecclésia Dei, tandem, cervícibus abscíssis, martýrio coronátus est.
      - type: text
        text: Girvi, in Anglia, tránsitus sancti Bedæ Venerábilis, Presbýteri, Confessóris et Ecclésiæ Doctóris, sanctitáte et eruditióne celebérrimi. Ipsíus autem festum recólitur sexto Kaléndas Iúnii.
      - type: text
        text: Floréntiæ natális sanctæ Maríæ-Magdalénæ de Pazzis Vírginis, ex Ordine Carmelitárum, vita et sanctitáte illústris. Eius vero festívitas quarto Kaléndas Iúnii celebrátur.
      - type: text
        text: Doróstori, in Mýsia inferióre, item natális sanctórum Mártyrum Pasícratis, Valentiónis et aliórum duórum, simul coronatórum.
      - type: text
        text: Medioláni sancti Dionýsii Epíscopi, qui, ab Ariáno Imperatóre Constántio in Cappadóciam pro fide cathólica relegátus, ibídem, propióre Martýribus título, spíritum Deo réddidit. Eius sacrum corpus ab Aurélio Epíscopo transmíssum est Mediolánum ad beátum Ambrósium Epíscopum; cui piæ actióni offícium quoque sancti Basilíi Magni accessísse tráditur.
      - type: text
        text: Floréntiæ natális sancti Zenóbii, eiúsdem civitátis Epíscopi, vitæ sanctitáte ac miraculórum glória conspícui.
      - type: text
        text: In Británnia sancti Aldélmi, Epíscopi Schireburgénsis.
      - type: text
        text: In território Tricassíno sancti Leónis Confessóris.
      - type: text
        text: Lutétiæ Parisiórum sanctæ Magdalénæ-Sophíæ Barat, Fundatrícis Institúti Sorórum a Sacro Corde Iesu; quæ pro Christiána puellárum informatióne valde adlaborávit, et a Pio Papa Undécimo in sanctárum Vírginum catalógum fuit reláta.
      - type: text
        text: Vérulis, in Hérnicis, Translátio sanctæ Maríæ Iacóbi; cuius sacrum corpus plúrimis miráculis illustrátur.
      - type: text
        text: Assísii, in Umbria, item Translátio sancti Francísci Confessóris, témpore Gregórii Papæ Noni.
  psalm.oct-vo-kal-ndas-m-rtii-3d831755f2:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the See of the holy Apostle Peter, wherein he first sat at Antioch, in which city the disciples were first called Christians.
      - type: citation
        text: 'On the same 22nd day of February were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Hierapolis, in Phrygia, holy Papias, Bishop of that city, who was the hearer of the holy elder John, and the companion of Polycarp.
      - type: text
        text: At Salamis, in Cyprus, holy Aristion, who, as the said Papias doth testify, was one of the seventy-two disciples of Christ.
      - type: text
        text: In Arabia are commemorated many holy martyrs who were cruelly slain under the Emperor Galerius Maximian.
      - type: text
        text: At Alexandria, holy Abilius, Pope of that see, who was the second who held it after the blessed Evangelist Mark, and administered his office with an eminent manifestation of grace.
      - type: text
        text: At Vienne, holy Paschasius, Bishop of that see, very famous for his learning and the holiness of his life.
      - type: text
        text: At Cortona, in Tuscany, [in the year 1297,] holy Margaret, of the third order of St. Francis, whose body hath marvellously remained incorrupt for more than four hundred years, breathing a sweet savour, and famous for many miracles, and is there deeply honoured.
      la:
      - type: text
        text: Octávo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Cáthedra sancti Petri Apóstoli, qua primum Romæ sedit.
      - type: text
        text: Favéntiæ, in Æmília, natális sancti Petri Damiáni, Cardinális atque Epíscopi Ostiénsis et Confessóris, ex Ordine Camaldulénsi, doctrína et sanctitáte célebris, quem Leo Papa Duodécimus Doctórem universális Ecclésiæ declarávit. Ipsíus autem festum sequénti die celebrátur.
      - type: text
        text: Salamínæ, in Cypro, sancti Aristiónis, qui (ut mox memorándus Pápias testátur) fuit unus de septuagínta duóbus Christi discípulis.
      - type: text
        text: Hierápoli, in Phrýgia, beáti Pápiæ, eiúsdem civitátis Epíscopi, qui sancti Ioánnis Senióris audítor, Polycárpi autem sodális fuit.
      - type: text
        text: In Arábia commemorátio plurimórum sanctórum Mártyrum, qui, sub Galério Maximiáno Imperatóre, sævíssime cæsi sunt.
      - type: text
        text: Alexandríæ sancti Abílii Epíscopi, qui, secúndus post beátum Marcum, factus eiúsdem civitátis Epíscopus, sacerdótium virtúte conspícuus ministrávit.
      - type: text
        text: Viénnæ, in Gállia, sancti Paschásii Epíscopi, eruditióne et morum sanctitáte præclári.
      - type: text
        text: Ravénnæ sancti Maximiáni, Epíscopi et Confessóris.
      - type: text
        text: Cortónæ, in Túscia, sanctæ Margarítæ, ex tértio Ordine sancti Francísci; quæ admirábili pæniténtia et ubérrimis lácrimis máculas anteáctæ vitæ indesinénter abstérsit. Ipsíus corpus, mirabíliter incorrúptum, suávem spirans odórem et crebris miráculis clarum, ibídem magno cum honóre cólitur.
  psalm.oct-vo-kal-ndas-maii-7ce81e6bcb:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 24th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Sevis, in Switzerland, the holy martyr Faithful of Sigmaringen, of the Order of Friars Minor Capuchins. He had been sent thither to preach the Catholic faith, but was murdered by the heretics, and so attained martyrdom, [in the year 1622,] and was numbered among the holy martyrs by the Supreme Pontiff Benedict XIV.
      - type: text
        text: At Rome, the holy martyr Saba, a commander of troops. He was accused of visiting the Christians in prison, and freely confessed Christ in the presence of the judge. He was scorched with torches, and thrust into a vessel of boiling pitch, whence he came forth unhurt, by the which marvel seventy men were turned to Christ, who all stood fast to their confession, and were slain with the sword, when after Saba himself was drowned in the river, and so gained the crown of his testimony, [in the year 272.]
      - type: text
        text: At Lyons, in Gaul, the holy martyr Alexander. In the persecution under the Emperor Antoninus Verus he was imprisoned, and afterwards lashed to such an extent that his inner parts could be seen through holes between his ribs then he was nailed to a cross, and gave up his blessed spirit. There suffered along with him thirty-and-four others, of whom mention is made upon other days.
      - type: text
        text: Upon the same day, the holy martyrs Eusebius, [said to have been converted by St George,] Neon, Leontius, Longinus, and four others, who were slain with the sword after grievous torments in the persecution under the Emperor Diocletian.
      - type: text
        text: In England, [in the year 624,] the holy Bishop Mellitus, who was sent into this country by holy Gregory, and converted to the faith the East Saxons and their King. [He was the first Bishop of London, and afterwards of Canterbury.]
      - type: text
        text: At Elvira, in Spain, the holy Confessor Gregory, Bishop [of that see, about the end of the fourth century.]
      - type: text
        text: At Brescia, holy Honorius, Bishop of that see, [in the year 586.]
      - type: text
        text: In Scotland, the holy Priest and monk Egbert. A man of marvellous lowliness and self-denial, [in the year 729,] whose feast we keep upon the 27th day of this present month of April.
      - type: text
        text: At Reims, the holy Virgins Bona and Doda, [the first Abbesses of St. Peter's at Reims, in the year 673.]
      la:
      - type: text
        text: Octávo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Sevísii, in Rhǽtia, sancti Fidélis a Sigmarínga, Sacerdótis ex Ordine Minórum Capuccinórum et Mártyris; qui, illuc ad prædicándam cathólicam fidem missus, ibídem, ab hæréticis interémptus, martýrium consummávit; et a Benedícto Décimo quarto, Pontífice Máximo, inter sanctos Mártyres relátus est.
      - type: text
        text: Romæ sancti Sabæ, ductóris mílitum, qui, accusátus quod Christiános in cárcere deténtos visitáret, coram Iúdice Christum líbere conféssus est. Hinc ab eódem Iúdice fácibus adústus et in lebétem picis fervéntis est immíssus, et, cum inde evasísset illǽsus, eo miráculo septuagínta viros ad Christum convértit; qui omnes, constánter in confessióne fídei permanéntes, gládio cæsi sunt. Póstremo et ipse, demérsus in flumen, martýrium consummávit.
      - type: text
        text: Lugdúni, in Gállia, natális sancti Alexándri Mártyris, qui, in persecutióne Antoníni Veri, post cárceris custódiam, primo ita laniátus est crudelitáte verberántium, ut, crate solúta costarum, patefáctis viscéribus, interióra córporis panderéntur; deínde, crucis affíxus patíbulo, beátum spíritum exanimátus emísit. Passi sunt cum ipso et álii, número trigínta quátuor, quorum memória áliis diébus ágitur.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Eusébii, Neónis, Leóntii, Longíni et aliórum quátuor, qui, in persecutióne Diocletiáni, post diros cruciátus, gládio percússi sunt.
      - type: text
        text: In Anglia deposítio sancti Mellíti Epíscopi, qui, a sancto Gregório Papa in Angliam missus, orientáles Saxónes et ipsórum Regem ad fidem convértit.
      - type: text
        text: Illíberi, in Hispánia, sancti Gregórii, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Honórii Epíscopi.
      - type: text
        text: In Iona, Scótiæ ínsula, sancti Egbérti, Presbýteri et Mónachi, admirándæ humilitátis et continéntiæ viri.
      - type: text
        text: Rhemis, in Gállia, sanctárum Vírginum Bovæ et Dodæ.
      - type: text
        text: Andégavi, in Gállia, sanctæ Maríæ a sancta Euphrásia Pelletier, Vírginis, Institúti Sorórum a Bono Pastóre Fundatrícis, quam Pius Duodécimus, Póntifex Máximus, in Sanctárum númerum rétulit.
      - type: text
        text: Medioláni Convérsio sancti Augustíni Epíscopi, Confessóris et Ecclésiæ Doctóris; quem beátus Ambrósius Epíscopus veritátem fídei cathólicæ dócuit, et hac die baptizávit.
  psalm.oct-vo-kal-ndas-nov-mbris-6db9a73785:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy John of Beverley, Archbishop of York, in England, illustrious for his life and miracles, of whom mention is made upon the 7th day of May.
      - type: citation
        text: 'Upon the same 25th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Chrysanthus and Daria his wife, who, after bearing many sufferings under the Prefect Celerinus on account of their confession of Christ, were commanded by the Emperor Numerian to be cast into the sand-pit upon the Salarian Way, and there buried alive under earth and stones.
      - type: text
        text: Likewise at Rome, forty-six holy martyrs, who were all baptized together by Pope Denis, and presently beheaded by order of the Emperor Claudius, and buried on the Salarian Way, where also are laid one hundred, twenty, and one other martyrs, among whom are the four soldiers of Christ Theodosius, Lucius, Mark, and Peter.
      - type: text
        text: At Soissons, in Gaul, the holy martyrs Crispin and Crispinian. These were noble Romans who, in the persecution under the Emperor Diocletian, after being put to hideous torments under the President Rictiovarus, were slain with the sword, and so gained the crown of martyrdom. Their bodies were afterwards brought to Rome, and honourably buried in the Church of St. Lawrence.
      - type: text
        text: At Florence, the holy soldier Minias, who contended nobly for Christ's faith in the persecution under the Emperor Decius, and was crowned with a glorious crown of martyrdom.
      - type: text
        text: At Torres, in Sardinia, the holy martyrs Protus a Priest, and Januarius a Deacon, who were sent into that island, in the time of the Emperor Diocletian, by holy Pope Caius, and were put to death by the President Barbarus.
      - type: text
        text: At Constantinople, the holy martyrs Martyrius the Sub-Deacon and Martian the Singer, who were slain by the heretics under the Emperor Constantius.
      - type: text
        text: At Rome, the holy Confessor Pope Boniface I.
      - type: text
        text: At Perigueux, in Gaul, holy Fronto, who was ordained Bishop by the Blessed Apostle Peter, and in company with the Priest George turned a great multitude of that people to Christ, and fell asleep in peace, famous for miracles.
      - type: text
        text: At Brescia, (in the fifth century,) holy Gaudentius, Bishop (of that city,) eminent for his learning and holiness.
      - type: text
        text: At Mende, (in the sixth century,) holy Hilary, Bishop.
      la:
      - type: text
        text: Octávo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Mártyrum Chrysánthi et Daríæ uxóris, qui, post multas, quas sub Celeríno Præfécto pro Christo sustinuérunt, passiónes, a Numeriáno Imperatóre iussi sunt via Salária in Arenário depóni, atque vivéntes illic terra et lapídibus óbrui.
      - type: text
        text: Ibídem natális sancti Marcellíni, Papæ et Mártyris; qui, sub Maximiáno, pro fide Christi, una cum Cláudio, Cyríno et Antoníno, cápite truncátus est. Quo témpore ita magna fuit persecútio, ut decem et septem míllia Christianórum, intra unum mensem, martýrio coronaréntur. Ipsíus tamen sancti Marcellíni festum, una cum festo sancti Cleti, Papæ et Mártyris, sexto Kaléndas Maii celebrátur.
      - type: text
        text: Petragóricis, in Gállia, sancti Frontónis, qui, a beáto Petro Apóstolo Epíscopus ordinátus, cum Geórgio Presbýtero magnam illíus gentis multitúdinem convértit ad Christum, et, miráculis clarus, in pace quiévit.
      - type: text
        text: Romæ natális sanctórum quadragínta sex mílitum, qui, simul baptizáti a sancto Dionýsio Papa, mox Cláudii Imperatóris iussu decolláti sunt, ac via Salária sepúlti; ubi et álii Mártyres centum vigínti et unus pósiti sunt, inter quos fuérunt quátuor mílites Christi, scílicet Theodósius, Lúcius, Marcus et Petrus.
      - type: text
        text: Túrribus, in Sardínia, sanctórum Mártyrum Proti Presbýteri, et Ianuárii Diáconi, qui, a sancto Caio Papa ad eam ínsulam missi, ibídem, témpore Diocletiáni, sub Bárbaro Prǽside, consummáti sunt.
      - type: text
        text: Constantinópoli pássio sanctórum Martýrii Subdiáconi, et Marciáni Cantóris, qui ab hæréticis, sub Constántio Imperatóre, necáti sunt.
      - type: text
        text: Suessíone, in Gálliis, sanctórum Mártyrum Crispíni et Crispiniáni, nobílium Romanórum, qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, post immánia torménta gládio trucidáti, corónam martýrii sunt consecúti; quorum córpora póstea Romam deláta fuérunt, atque in Ecclésia sancti Lauréntii in Pane et Perna honorífice tumuláta.
      - type: text
        text: Floréntiæ pássio beáti Miniátis mílitis, qui, sub Décio Príncipe, pro fide Christi egrégie certans, nóbili martýrio coronátur.
      - type: text
        text: Bríxiæ natális sancti Gaudéntii Epíscopi, eruditióne et sanctitáte conspícui.
      - type: text
        text: Gavális, in Gállia, sancti Hilárii Epíscopi.
  psalm.oct-vo-kal-ndas-oct-bris-27ed508d5d:
    role: psalm
    content:
      en:
      - type: text
        text: Tomorrow is the feast of the Blessed Virgin Mary, styled of Ransom.
      - type: citation
        text: 'Upon the same 24th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Autun, the holy martyrs Andochius a Priest, Thyrsus a Deacon, and Felix. Blessed Polycarp, Bishop of Smyrna, sent Andochius and Thyrsus from the east to teach in Gaul, where they were (received as guests by the noble Felix. In the end they and he were) most heavily scourged, and hung up all day by the hands, then cast into the fire, but as they were not burnt their necks were broken with bars, and so they received a right glorious crown.
      - type: text
        text: In Egypt, (in the persecution under the Emperor Diocletian,) the holy martyrs Paphnutius and his Companions.
      - type: text
        text: He was dwelling in the desert when he heard that many Christians were kept in chains wherefore the Spirit of God moved him to go of his own free will to the Prefect, and profess himself a Christian. The Prefect had him first bound in iron fetters, and racked for a very long time then he sent him, and many others, to Diocletian, by whose command Paphnutius was hung upon a palm-tree, and the others were beheaded.
      - type: text
        text: At Chalcedon, forty-nine holy martyrs, who were condemned to be devoured by wild beasts, under the Emperor Diocletian, after the martyrdom of holy Euphemia, but by the will of God they were delivered from the beasts, then they were beheaded, and so passed away to heaven.
      - type: text
        text: In Hungary, (in the year 1047,) the holy martyr Gerard (Sagredo,) Bishop of Chonad, called the Apostle of Hungary. By birth he was a nobleman of Venice, and was the first of his countrymen who adorned their fatherland by the glory of martyrdom.
      - type: text
        text: In Auvergne, (in the fifth century,) the holy Confessor Rusticus, Bishop (of Clermont.) In the country of Beauvais, (in the seventh century,) holy Geremar, Abbot (of Flay, now called after him Saint-Germer.)
      la:
      - type: text
        text: Octávo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Commemorátio beátæ Maríæ Vírginis de Mercéde nuncupátæ, Ordinis redemptiónis captivórum sub eius nómine Institutrícis, de cuius Apparitióne ágitur quarto Idus Augústi.
      - type: text
        text: Bríxiæ deposítio sancti Anathalónis Epíscopi, qui, beáti Bárnabæ Apóstoli discípulus, in eius locum Epíscopus Ecclésiæ Mediolanénsis succéssit.
      - type: text
        text: In Pannónia sancti Gerárdi, Epíscopi Morisénæ sedis et Mártyris, Hungarórum Apóstoli nuncupáti, patrícii Véneti; qui, cum e Chanadiénsi óppido Albam Regálem se conférret, prope flumen Danúbium ab infidélibus impetítus, lapídibus óbrutus ac tandem láncea transfíxus occúbuit, sicque primus pátriam nóbili martýrio illustrávit.
      - type: text
        text: Augustodúni natális sanctórum Mártyrum Andóchii Presbýteri, Thyrsi Diáconi, et Felícis. Hi, a beáto Polycárpo, Smyrnénsi Epíscopo, ab Oriénte dirécti ad docéndam Gálliam, ibídem flagéllis duríssime cæsi, ac tota die invérsis mánibus suspénsi, et in ignem missi sunt, sed non combústi; tandem eórum colla véctibus feriúntur, et ita Mártyres gloriosíssime coronántur.
      - type: text
        text: In Ægýpto pássio sanctórum Paphnútii et Sociórum Mártyrum. Ipse, vitam in solitúdine agens, cum audíret multos Christiános in vínculis retinéri, sponte, divíno Spíritu cóncitus, Præfécto se offert, et Christiánam religiónem líbere profitétur; a quo primum caténis férreis costríngitur, et in equúleo diutíssime torquétur, deínde cum áliis plúrimis ad Diocletiánum míttitur, cuius iussu, ipse palmæ affígitur, céteri autem ferro necántur.
      - type: text
        text: Chalcedóne sanctórum quadragínta novem Mártyrum, qui post martýrium sanctæ Euphémiæ, sub Diocletiáno Imperatóre, damnáti ad béstias, et, cum ab iis divínitus líberi evasíssent, demum, gládio percússi, migravérunt in cælum.
      - type: text
        text: Arvérnis, in Gállia, deposítio sancti Rústici, Epíscopi et Confessóris.
      - type: text
        text: Flavíaci, in território Bellovacénsi, sancti Geremári, Presbýteri et Abbátis.
      - type: text
        text: Septémpedæ, in Picéno, deposítio sancti Pacífici, Sacerdótis ex Ordine Minórum et Confessóris, exímiæ patiéntiæ viri et solitúdinis amóre præclári, quem Gregórius Papa Décimus sextus in Sanctórum cánonem rétulit.
  psalm.oct-vo-kal-ndas-sept-mbris-0d54fcb248:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 25 th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Paris, [in the year 1270,] the holy Confessor Louis, King of France, famous for the holiness of his life and for the glory of his miracles.
      - type: text
        text: At Rome, [in the second century,] the holy martyrs Eusebius, Pontian, Vincent, and Peregrin. Under the Emperor Commodus they were first racked, then stretched with thongs, and afterwards cudgelled, their sides were burnt, and as they remained faithful in the praise of Christ they were hided to death with scourges loaded with lead.
      - type: citation
        text: 'Likewise at Rome, [in the year 286 or in 303,] the holy martyr Genesius while he was a Gentile he was a player. One while in the theatre, in the presence of the Emperor Diocletian, he was making a mock at the mysteries of the Christians, when the spirit of God came upon him, and he was suddenly turned to the faith, and baptized. The Emperor caused him to be very cruelly beaten with cudgels, then racked, and tormented for a long time by being torn with hooks, and burned with lamps. He stood firm in Christ''s faith, saying: there is no King but Christ, and if I should be slain for Him a thousand times, ye cannot take Him either out of my mouth or out of my heart. In the end he was beheaded, and so gained the palm of martyrdom.'
      - type: text
        text: At Old Seville, in Spain, [in the first century,] holy Gerontius, Bishop [of that see,] who preached the Gospel in that province in the time of the Apostles, and after many toils fell asleep in prison.
      - type: text
        text: At Arles, in Gaul, [in the year 303,] blessed Genesius. He was a registrar who refused to register the wicked edicts which commanded the punishment of Christians, but publicly cast away his tables and professed himself a Christian; for this cause he was taken and beheaded, and being so baptized in his own blood, gained the glory of martyrdom.
      - type: text
        text: In Syria, the holy martyr Julian.
      - type: text
        text: At Taragona, [under the Emperor Maximin,] the holy martyr Maginus.
      - type: text
        text: At Constantinople, [in the year 552,] holy Mennas, [Arch-]Bishop [of that see.]
      - type: text
        text: At Utrecht, [about the year 776,] holy Gregory, Bishop [of that see.]
      - type: text
        text: At Naples, [in the year 365,] the holy Virgin Patricia, [daughter of the Emperor Constans I.]
      la:
      - type: text
        text: Octávo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Apud Cartháginem sancti Ludovíci Noni, Regis Francórum et Confessóris, vitæ sanctitáte ac miraculórum glória præclári, cuius ossa póstmodum Lutétiam Parisiórum sunt reláta.
      - type: text
        text: Romæ natális sancti Ioséphi Calasánctii, Presbýteri et Confessóris, vitæ innocéntia et miráculis illústris; qui, ad erudiéndam pietáte ac lítteris iuventútem, Ordinem Clericórum Regulárium Páuperum Matris Dei Scholárum Piárum fundávit. Eum Pius Duodécimus, Póntifex Máximus, ómnium Scholárum populárium christianárum ubíque exsisténtium cæléstem apud Deum Patrónum constítuit. Ipsíus tamen festívitas sexto Kaléndas Septémbris recólitur.
      - type: text
        text: Item Romæ sanctórum Mártyrum Eusébii, Pontiáni, Vincéntii et Peregríni; qui, sub Cómmodo Imperatóre, primum in equúleo leváti, nervis quoque disténti, ac deínde fústibus cæsi sunt, flammis circa eórum látera appósitis; et, cum in laude Christi fidelíssime permanérent, plumbátis usque ad emissiónem spíritus sunt mactáti.
      - type: text
        text: Romæ prætérea natális beáti Nemésii Diáconi, et fíliæ Lucíllæ Vírginis; qui, cum de fide Christi flecti nequáquam possent, decolláti sunt, iubénte Valeriáno Imperatóre. Ipsórum córpora, a beáto Stéphano Papa sepúlta, deínde a beáto Xysto Secúndo via Appia, prídie Kaléndas Novémbris, honéstius tumuláta, Gregórius Quintus in Diaconíam sanctæ Maríæ Novæ tránstulit, una cum sanctis Symphrónio, Olýmpio Tribúno, huiúsque uxóre Exsupéria et Theodúlo fílio; qui omnes, Symphrónii ópera convérsi et ab eódem sancto Stéphano baptizáti, martýrio coronáti fúerant. Eadem Sanctórum córpora, Gregório Décimo tértio Summo Pontífice, ibídem invénta, sub altári eiúsdem Ecclésiæ honorificéntius collocáta sunt sexto Idus Decémbris.
      - type: text
        text: 'Item Romæ sancti Genésii Mártyris, qui, primum sub Gentilitáte mimus, cum in theátro, spectánte Diocletiáno Imperatóre, Mystériis Christianórum illudéret, repénte, inspirátus a Deo, convérsus est ad fidem et baptizátus. Mox, Imperatóris iussu, fústibus crudelíssime cæsus, deínde suspénsus in equúleo, et ungulárum diutíssima laceratióne vexátus, lampádibus étiam adústus est; ac tandem, cum in fide Christi persísteret, dicens: « Non est Rex præter Christum, pro quo si míllies occídar, ipsum mihi de ore, ipsum mihi de corde auférre non potéritis », martýrii palmam obtruncatióne cápitis proméruit.'
      - type: text
        text: Areláte, in Gállia, beáti item Genésii, qui, cum ímpia edícta, quibus Christiáni puniri iubebántur, exceptóris offício fungens, nollet excípere, et, proiéctis in públicum tábulis, se Christiánum esse testarétur, comprehénsus et decollátus est, atque ita martýrii glóriam, próprio cruóre baptizátus, accépit.
      - type: text
        text: In Sýria sancti Iuliáni Mártyris.
      - type: text
        text: Tarracóne, in Hispánia, sancti Magíni Mártyris.
      - type: text
        text: Itálicæ, in Hispánia, sancti Gerúntii Epíscopi, qui, Apostolórum témpore, Evangélium in ea província prædicávit, et, post multos labóres, in cárcere quiévit.
      - type: text
        text: Constantinópoli sancti Mennæ Epíscopi.
      - type: text
        text: Traiécti sancti Gregórii Epíscopi.
      - type: text
        text: Apud Montem Falíscum, in Etrúria, sancti Thomæ Confessóris, qui Herfordiénsis Ecclésiæ, in Anglia, Epíscopus éxstitit.
      - type: text
        text: Neápoli, in Campánia, sanctæ Patríciæ Vírginis.
  psalm.octavo-kalendas-ianuarii-ac96a6393f:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 25th day of December
      - type: text
        text: ''
      - type: text
        text: In the year 5199th from the creation of the world, when in the beginning God created the heavens and the earth, in the year 2957th from the flood, in the year 2015th from the birth of Abraham, in the year 1510th from the going forth of the people of Israel out of Egypt under Moses, in the year 1032th from the anointing of David as King, in the 65th week according to the prophecy of Daniel, in the 194th Olympiad, in the 752nd from the foundation of the city of Rome, in the 42nd year of the reign of the Emperor Octavian Augustus, in the 6th age of the world, while the whole earth was at peace, Jesus Christ, Himself Eternal God and Son of the Eternal Father, being pleased to hallow the world by His most gracious coming, having been conceived of the Holy Ghost, and when nine months were passed after His conception, (all kneel down) was born of the Virgin Mary at Bethlehem of Juda made Man, Our Lord Jesus Christ was born according to the flesh.
      - type: text
        text: ''
      - type: citation
        text: 'Upon the same 25th day of December were born into the better life:'
      - type: text
        text: The birthday of St. Anastasia, who in the reign of Diocletian first of all suffered hard and cruel imprisonment at the hands of her husband Publius, during which, however, she was much consoled and comforted by Chrysogonus, a confessor of Christ. Then she was enfeebled by lengthy detention by Florus, prefect of Illyria, and at last was bound to stakes with her hands and feet stretched out and fire kindled about her. Thus she achieved her martyrdom in the island of Palmaria, to which she had been deported with 200 men and 70 women, who celebrated their martyrdom by being slain in different ways.
      - type: text
        text: At Rome, in the Apronian cemetery, the holy virgin Eugenia, who in the time of the Emperor Gallienus, after many works of power, and after enlisting bands of sacred virgins for Christ, suffered long under Nicetius, Prefect of the city, and at length was slain with the sword (about 258).
      - type: text
        text: At Nicomedia, many thousand holy martyrs. Upon the feast of Christ's birth they had come together unto the Lord's house, and the Emperor Diocletian ordered the doors of the church to be shut, and all things made ready for fire round about it then he set a tripod and incense in front of the door, and sent an herald to proclaim in a loud voice that whosoever would escape burning should come forth and offer incense unto Jupiter. Whereunto they all replied with one voice, that they would far rather die for Christ's sake, whereupon he kindled the fire and they were consumed, and were born in heaven upon that same day whereupon it had pleased Christ to be born into this world to save it.
      - type: text
        text: At Barcelona, in Spain (in the year 1256), the holy confessor Peter Nolasco, founder of the Order of the Blessed Virgin Mary of Ransom for the redemption of captives. He was famous for his graces and miracles, and Alexander VIII. commanded his feast to be kept upon the last day of January.
      la:
      - type: text
        text: Octavo Kalendas Ianuarii
      - type: text
        text: ''
      - type: text
        text: Anno a creatióne mundi, quando in princípio Deus creávit cælum et terram, quinquiés millésimo centésimo nonagésimo nono; a dilúvio autem, anno bis millésimo nongentésimo quinquagésimo séptimo; a nativitáte Abrahæ, anno bis millésimo quintodécimo; a Móyse et egréssu pópuli Israël de Ægýpto, anno millésimo quingentésimo décimo; ab unctióne David in Regem, anno millésimo trigésimo secúndo; Hebdómada sexagésima quinta, iuxta Daniélis prophétiam; Olympíade centésima nonagésima quarta; ab urbe Roma cóndita, anno septingentésimo quinquagésimo secúndo; anno Impérii Octaviáni Augústi quadragésimo secúndo, toto Orbe in pace compósito, sexta mundi ætáte, Iesus Christus, ætérnus Deus æterníque Patris Fílius, mundum volens advéntu suo piíssimo consecráre, de Spíritu Sancto concéptus, novémque post conceptiónem decúrsis ménsibus (Hic vox elevatur, et omnes genua flectunt), in Béthlehem Iudæ náscitur ex María Vírgine factus Homo. (Hic autem in priori voce dicitur, et in tono passionis:) Natívitas Dómini nostri Iesu Christi secúndum carnem.
      - type: rubric
        text: Quod sequitur, legitur in tono Lectionis consueto; et surgunt omnes.
      - type: text
        text: Eódem die natális sanctæ Anastásiæ, quæ, témpore Diocletiáni, primo diram et immítem custódiam a viro suo Públio perpéssa est, in qua tamen a Confessóre Christi Chrysógono multum consoláta et confortáta fuit; deínde a Floro, Præfécto Illýrici, per diútinam custódiam maceráta, ad últimum, mánibus et pédibus exténsis, ligáta est ad palos, et circa eam ignis accénsus, in quo martýrium consummávit in ínsula Palmária, ad quam una cum ducéntis viris et septuagínta féminis deportáta fúerat, qui váriis interfectiónibus martýrium celebrárunt.
      - type: text
        text: Barcinóne, in Hispánia, item natális sancti Petri Nolásci Confessóris, qui Fundátor éxstitit Ordinis beátæ Maríæ de Mercéde redemptiónis captivórum, ac virtúte et miráculis cláruit. Ipsíus autem festum cólitur quinto Kaléndas Februárii.
      - type: text
        text: Romæ, in cœmetério Aproniáni, sanctæ Eugéniæ Vírginis, beáti Mártyris Philíppi fíliæ, quæ, témpore Galliéni Imperatóris, post plúrima virtútum insígnia, post sacros Vírginum choros Christo aggregátos, sub Præfécto Urbis Nicétio diu agonizávit, ac novíssime gládio iuguláta est.
      - type: text
        text: Nicomedíæ pássio multórum míllium Mártyrum, qui cum in Christi Natáli ad Domínicum conveníssent, Diocletiánus Imperátor iánuas Ecclésiæ claudi iussit, et ignem circumcírca parari, tripodémque cum thure præ fóribus poni, ac præcónem magna voce clamáre ut qui incéndium vellent effúgere, foras exírent et Iovi thus adolérent; cumque omnes una voce respondíssent se pro Christo libéntius mori, incénso igne consúmpti sunt, atque ita eo die nasci meruérunt in cælis, quo Christus in terris pro salúte mundi olim nasci dignátus est.
  psalm.pr-die-idus-apr-lis-c20e96f10c:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 12th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Verona, the holy martyr Zeno, Bishop [of that see,] which he governed with admirable faithfulness amid the storms of persecution. He was crowned with martyrdom in the time of the Emperor Gallienus.
      - type: text
        text: In Cappadocia, the holy martyr Saba the Goth, who was put to grievous torments and then drowned in the river, when Athanaric, king of the Goths, was persecuting the Christians under the Emperor Valens. At the which time, according to holy Augustine, very many orthodox Goths won the crown of martyrdom.
      - type: text
        text: At Braga, in Portugal, [about the year 300, under Diocletian,] the holy martyr Victor. He was only as yet preparing for baptism, when he refused to worship an idol, and with great faithfulness confessed Christ Jesus, for the which cause he was put to many torments and beheaded, and so obtained baptism in his own blood.
      - type: text
        text: At Fermo, in Picenum, the holy Virgin and martyr Vissia.
      - type: text
        text: At Rome, upon the Aurelian Way, holy Pope Julius [I.], who contended stoutly for the Catholic Faith against the Arians, and after many eminent acts fell asleep in peace, [in the year 352,] famous for holiness.
      - type: text
        text: At the town of Gap, the holy Confessor Constantine, Bishop [of that see, about the year 455.]
      - type: text
        text: At Pavia, holy Damian, Bishop of that see, [about the years 671-710.]
      la:
      - type: text
        text: Prídie Idus Aprílis
      - type: text
        text: ''
      - type: text
        text: Verónæ pássio sancti Zenónis Epíscopi, qui inter persecutiónis procéllas eam Ecclésiam mira constántia gubernávit, et, Galliéni témpore, martýrio coronátus est.
      - type: text
        text: In Cappadócia sancti Sabæ Gothi, qui, sub Valénte Imperatóre, cum Rex Gothórum Athanarícus Christiános insequerétur, in flumen, post dira torménta, proiéctus est; quo étiam témpore (ut sanctus Augustínus scribit) quamplúrimi ex Gothis orthodóxis coróna martýrii sunt insigníti.
      - type: text
        text: Brácari, in Lusitánia, sancti Victóris Mártyris, qui, adhuc catechúmenus, cum noluísset idólum adoráre, et Christum Iesum magna constántia conféssus fuísset, ídeo, post multa torménta, cápite abscísso, méruit próprio sánguine baptizári.
      - type: text
        text: Firmi, in Picéno, sanctæ Víssiæ, Vírginis et Mártyris.
      - type: text
        text: Romæ, via Aurélia, natális sancti Iúlii Papæ Primi, qui advérsus Ariános pro fide cathólica plúrimum laborávit, ac, multis præcláre gestis, sanctitáte célebris quiévit in pace.
      - type: text
        text: Apud Vapíngum óppidum, in Gállia, sancti Constantíni, Epíscopi et Confessóris.
      - type: text
        text: Papíæ sancti Damiáni Epíscopi.
  psalm.pr-die-idus-aug-sti-050e9612af:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 12 th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Assisi, in Umbria, [in the year 1253], the holy Virgin Clare, the first of the women of the Order of Friars Minors [who are called Poor Clares.] Her life and miracles were famous, and Pope Alexander IV enrolled her name among those of the holy virgins.
      - type: text
        text: At Catania, in Sicily, in the persecution under the Emperors Diocletian and Maximian, the holy Deacon Euplius. He was long put to the torture for confessing the Lord, and at length beheaded, and so received the crown of martyrdom.
      - type: text
        text: At Augsburg, [in the fourth century,] the holy Hilaria, the mother of the blessed martyr Afra. She was watching at her grave when she was taken by persecutors, and for Christ's faith's sake committed to the fire, along with her handmaidens Digna, Euprepia, and Eunomia.
      - type: text
        text: In the same city, upon the same day, [in the fourth century,] there suffered also Quiriacus, Largis, Crescentian, Nimmia, Juliana, and twenty others.
      - type: text
        text: In Syria, the holy martyrs Macarius and Julian.
      - type: text
        text: At Nicomedia, under the Emperor Diocletian, the holy martyrs Count Anicete, his brother Photinus, and many others.
      - type: text
        text: At Civita Castellana, in Tuscany, [under Galerius Maximianus,] the holy martyr Gracilian and the Virgin Felicissima. Because they confessed the faith, their mouths were first bruised with stones, and then they were smitten with the sword, and so received that palm of martyrdom which they had desired.
      - type: text
        text: On the same day, [about the year 730,] the holy martyrs Porcarius, Abbot of the monastery of Lerins, and five hundred monks, crowned with martyrdom, slain by the barbarians for the Catholic faith's sake.
      - type: text
        text: At Milan, the holy Confessor Eusebius, Bishop [of that see.]
      - type: text
        text: At Brescia, holy Herculanus, Bishop [of that see.]
      la:
      - type: text
        text: Prídie Idus Augústi
      - type: text
        text: ''
      - type: text
        text: Sanctæ Claræ Vírginis, primæ plantæ Páuperum Dominárum Ordinis Minórum; quæ ad ætérnas Agni núptias evocáta est prídie huius diéi.
      - type: text
        text: Eódem die sanctórum Mártyrum Porcárii, Abbátis monastérii Lirinénsis, et Sociórum eius quingentórum Monachórum; qui pro fide cathólica, a bárbaris cæsi, martýrio coronáti sunt.
      - type: text
        text: Cátanæ, in Sicília, natális sancti Eúpli Diáconi, sub Diocletiáno et Maximiáno Augústis; qui, cum diutíssime pro confessióne Dómini tortus esset, tandem martýrii palmam, gládio cædénte, percépit.
      - type: text
        text: Augústæ Vindelicórum sanctæ Hiláriæ, quæ, cum esset beátæ Afræ Mártyris mater et ad sepúlcrum illíus excubáret, ibídem, pro fide Christi, a persecutóribus igni trádita est cum Digna, Euprépia et Eunómia, ancíllis suis. Passi sunt étiam eódem die, in præfáta urbe, Quiríacus, Lárgio, Crescentiánus, Nímmia et Iuliána, cum áliis vigínti.
      - type: text
        text: In Sýria sanctórum Mártyrum Macárii et Iuliáni.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Anicéti Cómitis, et Photíni fratris, cum áliis plúribus, sub Diocletiáno Imperatóre.
      - type: text
        text: Falériæ, in Túscia, pássio sanctórum Graciliáni, et Felicíssimæ Vírginis, quorum pro fídei confessióne ora lapídibus primo contúsa sunt; dehinc ambo, gládio percússi, optátam martýrii palmam suscepérunt.
      - type: text
        text: Medioláni deposítio sancti Eusébii, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Herculáni Epíscopi.
  psalm.pr-die-idus-dec-mbris-775004e1c7:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 12th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Synesius, who was ordained a Reader in the time of the blessed Pope Xystus, and converted many to Christ he was accused before the Emperor Aurelian, and received the crown of martyrdom by being beheaded, (in the year 270.)
      - type: text
        text: At Alexandria, under the Emperor Decius, the holy martyrs Epimachus and Alexander; they were long kept in chains and put to diverse torments, but they persevered in the faith, and at the last were burnt, (in the year 250.)
      - type: text
        text: Likewise at Alexandria, the holy women Ammonaria the Virgin, Mercuria, Dionysia, and another called also Ammonaria. In the aforesaid persecution under the Emperor Decius, the first of these died a blessed death by the sword, after overcoming torments unheard of. The judge was ashamed to be conquered by women, and shrank from causing the application to them of the same tortures as to the first, and so conquered by their steadfastness, ordered them to be beheaded, (in the year 250.)
      - type: text
        text: On the same day, the holy martyrs Hermogenes, Donatus, and twenty-two others.
      - type: text
        text: At Trier, (in the fourth century,) under the President Rictiovarus, in the persecution under the Emperor Diocletian, suffered the holy martyrs Maxentius, Constantius, Crescentius, Justinus, and their Companions.
      la:
      - type: text
        text: Prídie Idus Decémbris
      - type: text
        text: ''
      - type: text
        text: Alexandríæ sanctórum Mártyrum Epímachi et Alexándri, qui, sub Décio Imperatóre, cum fuíssent multo témpore in vínculis, atque, divérsis supplíciis affécti, perdurássent in fide, ígnibus tandem consúmpti sunt. Sanctus vero Epímachus, simul cum sancto Gordiáno Mártyre, festíva celebritáte cólitur sexto Idus Maii.
      - type: text
        text: Romæ sancti Synésii Mártyris, qui, beáti Xysti Papæ Secúndi témpore ordinátus Lector, et, cum multos convertísset ad Christum, apud Aureliánum Imperatórem accusátus, martýrii corónam gládio percússus accépit.
      - type: text
        text: Eódem die sanctórum Mártyrum Hermógenis, Donáti et aliórum vigínti duórum.
      - type: text
        text: Tréviris sanctórum Mártyrum Maxéntii, Constántii, Crescéntii, Iustíni et Sociórum; qui in persecutióne Diocletiáni, sub Rictiováro Prǽside, passi sunt.
      - type: text
        text: Alexandríæ sanctárum Ammonáriæ Vírginis, Mercúriæ, Dionýsiæ et altérius Ammonáriæ. Harum prima, in persecutióne Décii, inaudítis tormentórum genéribus superátis, beátum vitæ finem, ferro cædénte, percépit; tres vero áliæ, cum Iudex a féminis superári erubésceret, ac dubitáret, ne, eádem in illas exércens cruciaménta, viríli eárum étiam constántia vincerétur, statim iussæ sunt decollári.
  psalm.pr-die-idus-febru-rii-d820922c75:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep in England the feast of the holy Confessor Benedict Biscop, founder and Abbot of the monastery of Jarrow-upon-Tyne, of whom mention hath been made upon the 12th day of January.
      - type: citation
        text: 'Upon the same 12 th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Barcelona, in Spain, the holy Virgin Eulalia, who received a glorious crown in the time of the Emperor Diocletian. She suffered racking, tearing with hooks, and scorching with fire, and was finally crucified, [in the year 304.]
      - type: text
        text: In Africa, the holy soldier and martyr Damian.
      - type: text
        text: At Carthage, the holy martyrs Modestus and Julian.
      - type: text
        text: At Benevento, the holy martyr Modestus the Levite.
      - type: text
        text: At Alexandria, the holy children Modestus and Ammonius.
      - type: text
        text: At Constantinople, [in the year 381,] holy Meletius, Patriarch of Antioch, who passed away to be ever with the Lord, when he was in exile, which he oftentimes suffered for the Catholic faith's sake. Holy John Chrysostom and Gregory of Nyssa have greatly praised him.
      - type: text
        text: At Constantinople, [in the year 895,] in the time of the Emperor Leo VI, holy Anthony, Bishop [of Constantinople.]
      - type: text
        text: At Verona, the holy Confessor Gaudentius, Bishop of that see.
      la:
      - type: text
        text: Prídie Idus Februárii
      - type: text
        text: ''
      - type: text
        text: Sanctórum septem Fundatórum Ordinis Servórum beátæ Maríæ Vírginis, Confessórum, quorum deposítio respectívis diébus recólitur. Quos autem in vita unus veræ fraternitátis spíritus sociávit, et indivísa post óbitum venerátio pópuli prosecúta est, eos Leo Décimus tértius, Póntifex Máximus, una páriter Sanctórum fastis accénsuit.
      - type: text
        text: In Africa sancti Damiáni, mílitis et Mártyris.
      - type: text
        text: Carthágine sanctórum Mártyrum Modésti et Iuliáni.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Modésti et Ammónii infántum.
      - type: text
        text: Barcinóne, in Hispánia, sanctæ Euláliæ Vírginis, quæ, témpore Diocletiáni Imperatóris, equúleum, úngulas flammásque perpéssa, demum, cruci affíxa, gloriósam martýrii corónam accépit.
      - type: text
        text: Constantinópoli sancti Melétii, Epíscopi Antiochéni, qui, pro fide cathólica sæpe exsílium passus, demum in eádem urbe migrávit ad Dóminum. Eius virtútes sanctus Ioánnes Chrysóstomus et sanctus Gregórius Nyssénus summis láudibus celebrárunt.
      - type: text
        text: Item Constantinópoli sancti Antónii Epíscopi, témpore Leónis sexti Imperatóris.
      - type: text
        text: Verónæ sancti Gaudéntii, Epíscopi et Confessóris.
  psalm.pr-die-idus-i-lii-b31a916799:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 14th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Lyon, the holy Confessor Bonaventure of the Order of Friars Minors, Cardinal Bishop of Albano, Doctor of the Church, very famous for his teaching and the holiness of his life, [in the year 1279.]
      - type: text
        text: At Rome, under the Tribune Claudius, the holy soldier Justus. God caused a vision of the Cross to appear to him, whereupon he believed in Christ, and as soon as he was baptized gave all his goods to feed the poor. He was tried under the Prefect Magnetius, who commanded him to be beaten with thongs, and a red-hot helmet to be put upon his head, and to be laid upon a burning fire. Not an hair of his head was hurt, but he gave up the ghost, confessing the Lord.
      - type: text
        text: At Sinope, in Pontus, the holy martyr Phocas, Bishop of that city. Under the Emperor Trajan he overcame imprisonment, chains, iron, and fire for Christ's sake, and winged his flight to heaven. His relics were brought to Vienne, in Gaul, and are laid in the Church of the Holy Apostles.
      - type: text
        text: At Alexandria, holy Heracles, Pope [of that see,] to whose judgement so much weight was attached that the Chronicler Julius the African mentions that he went to Alexandria to visit him, [in the year 246.]
      - type: text
        text: At Carthage, holy Cyrus, Bishop [of that see,] on whose feast-day holy Augustine preached to the people a sermon concerning him.
      - type: text
        text: At Como, holy Felix, first Bishop of that city.
      - type: text
        text: At Brescia, the holy Optatian, Bishop [of that see, fifth century.]
      - type: text
        text: At Deventer, in the Low Countries, the holy Priest Marcellinus, [about the year 800.]
      - type: text
        text: At Rome, the holy Camillus de' Lellis, founder of the Congregation of Regular Clerks for ministering to the sick, [in the year 1619.] He was illustrious for his holy life and miracles, and the Supreme Pontiff Benedict XIV enrolled his name among those of the saints. [We keep his feast upon the 18th day of this present month of July.]
      - type: text
        text: At Lima, in the kingdom of Peru, the holy Confessor Francis Solano, of the Order of Friars Minors, famous for his preaching, signs, and mighty works, among the Indians of that country, whose name the Supreme Pontiff Benedict XIII added to the list of the Saints.
      la:
      - type: text
        text: Prídie Idus Iúlii
      - type: text
        text: ''
      - type: text
        text: Sancti Bonaventúræ, ex Ordine Minórum, Cardinális et Epíscopi Albanénsis, Confessóris et Ecclésiæ Doctóris; qui sequénti die migrávit ad Dóminum.
      - type: text
        text: Romæ natális sancti Camílli de Lellis, Presbýteri et Confessóris, Clericórum Regulárium infírmis ministrántium Institutóris; quem, virtútibus et miráculis clarum, Summus Póntifex Benedíctus Décimus quartus in Sanctórum número recénsuit, et Leo Décimus tértius cæléstem hospitálium et infirmórum Patrónum renuntiávit. Ipsíus tamen festívitas quintodécimo Kaléndas Augústi recólitur.
      - type: text
        text: Item Romæ sancti Iusti mílitis, qui, sub Cláudio Tribúno, apparénte sibi divínitus Cruce, crédidit in Christum, et, mox baptizátus, ómnia sua paupéribus erogávit; tentus deínde a Magnétio Præfécto, atque verberári nervis, gálea igníta cóntegi et in rogum immítti iussus ac ne in capíllo quidem læsus, in Dómini confessióne réddidit spíritum.
      - type: text
        text: Synópe, in Ponto, sancti Phocæ Mártyris, eiúsdem civitátis Epíscopi, qui, sub Traiáno Imperatóre, cárcerem, víncula, ferrum ignémque pro Christo súperans, evolávit in cælum. Eius relíquiæ póstea Viénnam, in Gállia, sunt delátæ, et in Basílica sanctórum Apostolórum cónditæ.
      - type: text
        text: Alexandríæ sancti Héraclæ Antístitis, ob cuius celebérrimam opiniónem, Africánus historiógraphus mémorat se Alexandríam, ad eum viséndum, properásse.
      - type: text
        text: Carthágine sancti Cyri Epíscopi, in cuius festivitáte sanctus Augustínus de eo sermónem ad pópulum hábuit.
      - type: text
        text: Novocómi sancti Felícis, qui fuit primus eiúsdem civitátis Epíscopus.
      - type: text
        text: Bríxiæ sancti Optatiáni Epíscopi.
      - type: text
        text: Davéntriæ, in Belgis, sancti Marcellíni, Presbýteri et Confessóris.
      - type: text
        text: Limæ, in Perúvia, sancti Francísci Soláni, Sacerdótis ex Ordine Minórum et Confessóris; qui, prædicatióne, signis et virtútibus apud Indos Occidentáles illústris, migrávit ad Dóminum, atque a Benedícto Décimo tértio, Pontífice Máximo, Sanctórum fastis adscríptus est.
  psalm.pr-die-idus-i-nii-e6327c181a:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 12th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Salamanca, in Spain, the holy Confessor John of San Fagondez, of the Order of Hermits of St. Augustine, famous for his zeal for the faith, the holiness of his life, and his wonderful works.
      - type: text
        text: At Rome, upon the Aurelian Way, the holy soldiers Basilides, Cyrinus, Nabor, and Nazarius, all martyrs, who were thrust into prison under Aurelius the Prefect, in the persecution under Diocletian and Maximian, because of their Christian profession, and after they had been torn with armed scourges, were beheaded.
      - type: text
        text: At Nice, in Bithynia, the holy martyr Antonina, who in the same persecution was, by the order of Priscillian the President, beaten with clubs, hung upon the rack, torn in the sides, burnt with fire, and at last slain with the sword.
      - type: text
        text: In Thrace, [in the fourth century,] holy Olympius, Bishop [of Enos,] who was thrust out of his see by the Arians and died a Confessor.
      - type: text
        text: At Rome, in the Vatican Basilica, [in the year 816,] the holy Pope Leo III, whose eyes and tongue were torn out by wicked men, [in the year 799,] but wonderfully given back to him by God.
      - type: text
        text: In Cilicia, holy Amphion, Bishop [of Nicomedia,] who was an eminent Confessor in the time of the Emperor Galerius Maximian.
      - type: text
        text: In Egypt, [toward the beginning of the fifth century,] the holy Hermit Onuphrius, who lived in the great desert for sixty years and passed to heaven illustrious for great, mighty, and worthy deeds his famous acts were written by the Abbot Paphnutius.
      la:
      - type: text
        text: Prídie Idus Iúnii
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis a sancto Facúndo, ex Eremitárum sancti Augustíni Ordine, Confessóris, qui migrávit in cælum prídie huius diéi.
      - type: text
        text: Romæ, via Aurélia, natális sanctórum Mártyrum Basílidis, Cýrini, Náboris et Nazárii mílitum, qui, in persecutióne Diocletiáni et Maximiáni, sub Aurélio Præfécto, ob Christiáni nóminis confessiónem, detrúsi in cárcerem et scorpiónibus laceráti, tandem cápite truncáti sunt.
      - type: text
        text: Nicǽæ, in Bithýnia, sanctæ Antonínæ Mártyris, quæ, in eádem persecutióne, a Priscilliáno Prǽside iussa est fústibus cædi, suspéndi in equúleo, latéribus laniári et flammis incéndi, ac demum gládio necári.
      - type: text
        text: Romæ, in Basílica Vaticána, sancti Leónis Papæ Tértii, cui érutos ab ímpiis óculos et præcísam linguam Deus mirabíliter restítuit.
      - type: text
        text: In Thrácia sancti Olýmpii Epíscopi, qui, ab Ariánis sede pulsus, Conféssor occúbuit.
      - type: text
        text: In Cilícia sancti Amphíonis Epíscopi, qui, témpore Galérii Maximiáni, Conféssor fuit egrégius.
      - type: text
        text: In Ægýpto sancti Onúphrii Anachorétæ, qui in vasta erémo sexagínta annis vitam religióse perégit, et, magnis virtútibus ac méritis clarus, migrávit in cælum. Ipsíus vero insígnia gesta Paphnútius Abbas conscrípsit.
  psalm.pr-die-idus-ianu-rii-50729ea7e4:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 12th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Tatiana, in the persecution under the Emperor Alexander. She was lacerated with hooks and combs, thrown to wild beasts, and cast into the fire, but as she remained unhurt, was at length beheaded, and so passed away to heaven.
      - type: text
        text: In the Peloponnesos, the holy martyr Satyrus. As he was passing before a certain idol he breathed upon it, and signed himself with the sign of the cross upon his own forehead, whereupon the idol straightway fell down, and for this cause Satyrus was beheaded, (in the year 267.)
      - type: text
        text: Upon the same day, (in Morocco, in the year 259) the holy martyr Arcadius, eminent for his rank and his miracles.
      - type: text
        text: In Africa, the holy martyrs Zoticus, Rogatus, Modestus, Castulus, and a crown of forty soldiers.
      - type: text
        text: At Constantinople, the holy martyrs Tigrius the Priest and Eutropius the Reader, who suffered in the time of the Emperor Arcadius.
      - type: text
        text: At Tivoli, (in the year 126,) the holy martyr Zoticus.
      - type: text
        text: At Ephesus, forty-two holy monks, who were most cruelly tortured and suffered martyrdom under the Emperor Constantine Copronymus for the honouring of holy images.
      - type: text
        text: At Ravenna, the holy Confessor John, Archbishop of that see, (about the year 489.)
      - type: text
        text: At Verona, holy Probus, Bishop of that see, (about the year 236.)
      - type: text
        text: In England, (in the year 690,) the holy Confessor Benedict Biscop, founder, and Abbot of the monastery of Jarrow-upon-Tyne, whose feast we keep upon the 12th day of February.
      la:
      - type: text
        text: Prídie Idus Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctæ Tatiánæ Mártyris, quæ, sub Alexándro Imperatóre, uncis atque pectínibus laniáta, béstiis expósita et in ignem missa, sed nil læsa, demum, gládio percússa, migrávit in cælum.
      - type: text
        text: Constantinópoli sanctórum Tígrii Presbýteri, et Eutrópii Lectóris; qui, Arcádii Imperatóris témpore, cum de incéndio quo Ecclésia princeps et Senátus cúria conflagráverant, tamquam per eos ad exsílium sancti Ioánnis Chrysóstomi ulciscéndum excitáto, per calúmniam accusáti essent, sub Præfécto urbis Optáto, inánium deórum superstitióne implícito et Christiánæ religiónis osóre, passi sunt.
      - type: text
        text: In Acháia sancti Sátyri Mártyris, qui cum ante quoddam idólum tránsiret, in illud exsufflávit, signans sibi frontem, atque statim idólum córruit; ob quam causam decollátus est.
      - type: text
        text: Eódem die sancti Arcádii Mártyris, génere et miráculis clari.
      - type: text
        text: In Africa sanctórum Mártyrum Zótici, Rogáti, Modésti, Cástuli, et corónæ Mílitum quadragínta.
      - type: text
        text: Tíbure sancti Zótici Mártyris.
      - type: text
        text: Ephési pássio sanctórum quadragínta duórum Monachórum, qui ob cultum sanctárum Imáginum, sub Constantíno Coprónymo, sævíssime cruciáti, martýrium complevérunt.
      - type: text
        text: Ravénnæ sancti Ioánnis, Epíscopi et Confessóris.
      - type: text
        text: Verónæ sancti Probi Epíscopi.
      - type: text
        text: In Anglia sancti Benedícti, Abbátis et Confessóris.
  psalm.pr-die-idus-m-rtii-43370cdefa:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 14th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, in the Veranian field, the holy martyr Leo, Bishop.
      - type: text
        text: Likewise at Rome, forty-seven holy martyrs, who were all baptized by the blessed Apostle Peter during the nine months during which he and his fellow-Apostle Paul were imprisoned in the Mamertine prison, and who, all for the loyal confession of their faith, were slain by the sword, under the Emperor Nero.
      - type: text
        text: In Africa, the holy martyrs Peter and Aphrodisius, who received their crown in the persecution under the Vandals.
      - type: text
        text: At Haran, in Mesopotamia, the holy martyrs Eutychius the Patrician and his Companions, who were slain by Evelid, King of the Arabs, for confessing their faith, [in the year 741.]
      - type: text
        text: In the province of Valeria, two holy monks, whom the Lombards hung upon a tree, whereon after they were dead their very enemies heard them singing. In the same persecution, a Deacon of the church of Maruvium, [now called that of Pescina,] was beheaded for confessing the faith.
      - type: text
        text: At Halberstadt, in Germany, the blessed Matilda, Queen of the Romans, Mother of the Emperor Otto I, who fell asleep in peace, illustrious for her lowliness and long suffering, [in the year 968.]
      la:
      - type: text
        text: Prídie Idus Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ, in agro Veráno, sancti Leónis, Epíscopi et Mártyris.
      - type: text
        text: Item Romæ natális sanctórum quadragínta septem Mártyrum, qui baptizáti sunt a beáto Apóstolo Petro, cum tenerétur in custódia Mamertíni cum Coapóstolo suo Paulo, ubi novem menses deténti sunt; qui omnes, sub devotíssima fídei confessióne, Neroniáno gládio consúmpti sunt.
      - type: text
        text: In Província Valériæ sanctórum duórum Monachórum, quos Longobárdi suspéndio necavérunt in árbore; in qua Mártyres, licet defúncti, ab hóstibus ipsis audíti sunt psállere.
      - type: text
        text: In ea étiam persecutióne Diáconus Ecclésiæ Marsicánæ, in confessióne fídei, cápite truncátus est.
      - type: text
        text: In Africa sanctórum Mártyrum Petri et Aphrodísii, qui, in persecutióne Wandálica, martýrii corónam percepérunt.
      - type: text
        text: Carrhis, in Mesopotámia, sancti Eutýchii patrícii, et Sociórum, qui ab Evelid, Arabum Rege, ob fídei confessiónem, interémpti sunt.
      - type: text
        text: Halberstátti, in Germánia, dormítio beátæ Mathíldis Regínæ, matris Othónis Primi, Romanórum Imperatóris, humilitáte et patiéntia conspícuæ.
  psalm.pr-die-idus-maii-76f8c5bea2:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Monica, the mother of blessed Augustine, to whose illustrious life he hath left unto us his witness in the 9th Book of his Confessions, and of whom mention is made upon the 4th day of this present month of May.
      - type: citation
        text: 'Upon the same 14th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy martyr Boniface, who suffered in the persecution under Diocletian and Maximian at Tarsus, in Cilicia, and whose body was thence brought to Rome and buried on the Latin Way.
      - type: text
        text: '[At Cimiez, hard by Nice,] in Gaul, the holy martyr Pontius. By his preaching and carefulness he turned the two Caesars of the name of Philip to Christ, and himself gained the palm of martyrdom under the Emperors Valerian and Gallienus.'
      - type: text
        text: In Syria, the holy Victor and Corona, martyrs under the Emperor Antoninus. Victor was put to diverse and horrid tortures under the judge Sebastian. Corona, who was the wife of a certain soldier, was fain to cry out that he was blessed, because of the constancy in his testimony, whereupon she saw two crowns descending from heaven, the one for Victor and the other for herself, and when she had borne witness to this in the hearing of all, she was torn asunder between trees, and Victor was beheaded.
      - type: text
        text: In Sardinia, [in the second century,] the holy martyrs Justa, Justina, and Henedina.
      - type: text
        text: At Rome, [in the year 824,] the holy Pope Paschal I, who brought up a great number of bodies of the holy martyrs out of the Catacombs and put them in honourable places in diverse churches.
      - type: text
        text: At Ferentino, in Tuscany, [in the sixth century,] the holy Boniface, Bishop [of that see,] who was marked by holiness and miracles from his very boyhood, as is told by blessed Pope Gregory.
      - type: text
        text: At Naples, in Campania, [in the sixth century,] holy Pomponius, Bishop [of that see.]
      - type: text
        text: In Egypt, [in the year 348,] the holy Abbot Pachom, who built many monasteries in that land, and wrote down a rule for monks, at the dictation of an Angel.
      la:
      - type: text
        text: Prídie Idus Maii
      - type: text
        text: ''
      - type: text
        text: Tarsi, in Cilícia, natális sancti Bonifátii Mártyris, qui, sub Diocletiáno et Maximiáno passus, deínde Romam advéctus, via Latína sepúltus est.
      - type: text
        text: In Gállia sancti Póntii Mártyris, cuius prædicatióne et indústria postquam duo Philíppi Cǽsares ad Christi fidem convérsi sunt, ipse, sub Valeriáno et Galliéno Princípibus, martýrii palmam adéptus est.
      - type: text
        text: In Sýria sanctórum Mártyrum Victóris et Coronæ, sub Antoníno Imperatóre; ex quibus Victor a Sebastiáno Iúdice váriis et horréndis afféctus est cruciátibus. Cum autem ipsum Coróna, uxor cuiúsdam mílitis, cœpísset beátum prædicáre ob martýrii constántiam, vidit duas corónas de cælo lapsas, unam Victóri et álteram sibi missam; cumque hoc audiéntibus cunctis testarétur, ipsa quidem inter árbores scissa, Victor vero decollátus est.
      - type: text
        text: In Sardínia sanctárum Mártyrum Iustæ, Iustínæ et Henedínæ.
      - type: text
        text: Ferénti, in Túscia, sancti Bonifátii Epíscopi, qui (ut refert beátus Gregórius Papa) sanctitáte et miráculis a puerítia cláruit.
      - type: text
        text: In pago Betharram, diœcésis Baionénsis, sancti Michaélis Garicoïts, Confessóris, Congregatiónis Presbyterórum Missionariórum a Sacro Corde Iesu Fundatóris, apostólico zelo insígnis, quem Pius Papa Duodécimus Sanctórum fastis adscrípsit.
      - type: text
        text: Niciæ, in Subalpínis, sanctæ Maríæ Domínicæ Mazzaréllo, Cofundatrícis Institúti Filiárum Maríæ Auxiliatrícis, quæ, humilitáte, prudéntia et caritáte præclára, in album sanctárum Vírginum a Pio Papa Duodécimo fuit reláta.
  psalm.pr-die-idus-nov-mbris-074d2fc766:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 12th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy martyr, Pope Martin. He got together a synod at Rome, wherein he condemned the heretics Sergius, Paul, and Pyrrhus. Wherefore the heretic Emperor Constans caused him to be kidnapped and brought to Constantinople, whence he was banished into the Crimea, where he died, (in the year 655,) worn out by his sufferings for the Catholic faith's sake. He was famous for miracles. His body was afterward brought to Rome and buried in the Church of SS. Sylvester and Martin.
      - type: text
        text: In Asia, the holy martyrs and Bishops Aurelius and Publius.
      - type: text
        text: In the country of Sens, (in the year 726,) the holy martyr Paternus.
      - type: text
        text: At Gent, the holy martyr Livin, Bishop (in Ireland, Apostle of West Flanders, martyred at Esse, in Belgium, in the seventh century.)
      - type: text
        text: In Poland, the holy martyred Hermits Benedict, John, Matthew, Isaac, and Christinus.
      - type: text
        text: At Vitepsk, in Poland, the holy martyr Jehosaphat, Archbishop of Polotsk, Monk of the Order of St. Basil, who was cruelly murdered by schismatics, (in the year 1623,) out of their hatred for Catholic unity and truth, and whose name Pope Pius IX enrolled among those of the holy martyrs. We keep his feast upon the 28th day of this present month of November.
      - type: text
        text: At Avignon, holy Rufus, the first Bishop of that see.
      - type: text
        text: At Cologne, (in the year 663,) holy Cunibert, Bishop (of that see.)
      - type: text
        text: At Tarragona, in Spain, the blessed Priest Emilian, who was famous for countless miracles, and whose wonderful life hath been written by Braulio, the holy Bishop of Zaragoza.
      - type: text
        text: At Constantinople, the holy Abbot Nilus, who had been Prefect of the city, but became a Monk, and was famous for teaching and holiness in the time of the Emperor Theodosius the younger.
      - type: text
        text: Likewise at Constantinople, holy Theodore, of the monastery which is called the Studium who contended mightily for the Catholic faith against the Iconoclasts, and became famous throughout the whole Catholic Church, (a.d. 759-826.)
      - type: text
        text: At Alcala, in Spain, (in the year 1463,) the holy Confessor Diego, of the Order of Friars Minor, eminent for his lowliness, whose name Sixtus V enrolled among those of the Saints, and whose feast is kept upon the morrow after.
      la:
      - type: text
        text: Prídie Idus Novémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Martíni Primi, Papæ et Mártyris, cuius dies natális sextodécimo Kaléndas Octóbris recensétur.
      - type: text
        text: Vitépsci, in Polónia, pássio sancti Iósaphat, e sancti Basilíi Ordine, Epíscopi Polocénsis et Mártyris; qui a schismáticis, in ódium cathólicæ unitátis et veritátis, crudéliter interféctus est, et a Pio Papa Nono inter sanctos Mártyres adscríptus. Eius tamen festívitas recólitur décimo octávo Kaléndas Decémbris.
      - type: text
        text: Complúti, in Hispánia, natális sancti Dídaci Confessóris, ex Ordine Minórum, humilitáte célebris; quem Xystus Quintus, Póntifex Máximus, Sanctórum catálogo adscrípsit. Ipsíus autem festum sequénti die celebrátur.
      - type: text
        text: In Asia pássio sanctórum Aurélii et Públii Episcopórum.
      - type: text
        text: Eschæ, in Bélgio, sancti Livíni, Epíscopi et Mártyris; qui, cum plúrimos ad Christi fidem convertísset, a Pagánis necátus est. Ipsíus vero corpus ad Portum Gandæ póstea translátum fuit.
      - type: text
        text: Apud Casimíriam, in Polónia, sanctórum Mártyrum Eremitárum Benedícti, Ioánnis, Matthǽi, Isaac et Christiáni; qui a prædónibus, divíno inténti servítio, dire vexáti sunt et gládiis occísi.
      - type: text
        text: Apud óppidum Sergíniam, in território Senonénsi, sancti Patérni, Mónachi et Mártyris; qui, dum eídem occurréntes in ipsíus óppidi silva latrónes ad emendándam vitam incitáret, ab illis trucidátus est.
      - type: text
        text: Avenióne sancti Rufi, qui éxstitit primus eiúsdem civitátis Epíscopus.
      - type: text
        text: Colóniæ Agrippínæ deposítio sancti Cunibérti Epíscopi.
      - type: text
        text: Turiasóne, in Hispánia Tarraconénsi, beáti Æmiliáni Presbýteri, qui innúmeris miráculis cláruit; cuius admirábilem vitam sanctus Bráulio, Cæsaraugustánus Epíscopus, descrípsit.
      - type: text
        text: Constantinópoli sancti Nili Abbátis, qui, sub Theodósio iunióre, ex Præfécto eiúsdem civitátis factus Mónachus, doctrína et sanctitáte cláruit.
  psalm.pr-die-idus-oct-bris-e877fde52e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 14th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Aurelian Way, the blessed martyr Pope Callistus. By command of the Emperor Alexander he was long starved in prison, and cudgelled every day, then he was cast headlong out of a window of the house wherein he was warded, and drowned in a well, and so earned the triumph of victory.
      - type: text
        text: At Caesarea, in Palestine, the holy Virgin and martyr Fortunata. In the persecution under the Emperor Diocletian she overcame the rack, fire, beasts, and other torments, and gave up her soul to God. Her body was brought later to Naples, in Campania.
      - type: text
        text: Also the holy martyrs Carponius, Evaristus, and Priscian, brothers of the aforesaid Fortunata, who were slain with the sword, and so received their crown.
      - type: text
        text: Also the holy martyrs Saturninus and Lupus.
      - type: text
        text: At Rimini, (in the fourth century,) the holy martyr Gaudentius, Bishop (of that see.)
      - type: text
        text: At Todi, the holy Bishop Fortunatus, who, as is stated by blessed Gregory, was distinguished by the grace of an extraordinary power in driving away unclean spirits.
      - type: text
        text: At Wuerzburg, (in the eighth century,) holy Burchard, the first Bishop of that see.
      - type: text
        text: At Brugge, in Flanders, (toward the end of the fourth century,) holy Donatian, Bishop of Reims.
      - type: text
        text: At Trier, (in the sixth century,) holy Rusticus, Bishop (of that see.)
      - type: text
        text: On the same day, (in the year 1060,) deceased blessed Dominic, called Loricatus, (that is, the mail-wearer, from the coat of mail which he wore as a penance.)
      - type: text
        text: In Latium, the holy Confessor Bernard.
      la:
      - type: text
        text: Prídie Idus Octóbris
      - type: text
        text: ''
      - type: text
        text: Romæ, via Aurélia, natális beáti Callísti Primi, Papæ et Mártyris; qui, Alexándri Imperatóris iussu, diútius fame in cárcere cruciátus, et quotídie fústibus cæsus, tandem, præcipitátus e fenéstra domus in qua custodiebátur, atque in púteum demérsus, victóriæ triúmphum proméruit.
      - type: text
        text: Arímini sancti Gaudéntii, Epíscopi et Mártyris.
      - type: text
        text: Cæsaréæ, in Palæstína, sanctórum Carpónii, Evarísti et Prisciáni, fratrum beátæ Fortunátæ, qui, gládio iuguláti, páriter martýrii corónam percepérunt.
      - type: text
        text: Item sanctórum Saturníni et Lupi.
      - type: text
        text: Cæsaréæ, in Palæstína, sanctæ Fortunátæ, Vírginis et Mártyris, ac prædicatórum Mártyrum Carpónii, Evarísti et Prisciáni soróris; quæ, in persecutióne Diocletiáni, post equúleum, ignes, béstias et ália torménta superáta, spíritum Deo réddidit. Ipsíus corpus póstea Neápolim, in Campánia, delátum fuit.
      - type: text
        text: Tudérti, in Umbria, sancti Fortunáti Epíscopi, qui (ut beátus Gregórius Papa refert) in immúndis spirítibus effugándis imménsæ grátia virtútis emícuit.
      - type: text
        text: Herbípoli, in Germánia, sancti Burchárdi, qui fuit primus illíus civitátis Epíscopus.
      - type: text
        text: Brugis Flandrórum sancti Donatiáni, Rheménsis Epíscopi.
      - type: text
        text: Tréviris sancti Rústici Epíscopi.
      - type: text
        text: Lugdúni, in Gállia, sancti Iusti, Epíscopi et Confessóris, miræ sanctitátis et prophétici spíritus viri; qui, Episcopátu demísso, in erémum Ægýpti, una cum Lectóre suo Viatóre, secéssit, ibíque, cum áliquot annos próximam Angelis egísset vitam, et dignus suórum labórum finis advenísset, corónam iustítiæ perceptúrus migrávit ad Dóminum. Ipsíus sanctum corpus, una cum óssibus beáti Viatóris, qui eiúsdem Epíscopi fúerat miníster, Lugdúnum póstea quarto Nonas Septémbris delátum fuit.
      - type: text
        text: Eódem die deposítio beáti Domínici Loricáti.
      - type: text
        text: Arpíni, in Látio, sancti Bernárdi Confessóris.
  psalm.pr-die-idus-sept-mbris-22b0c50f88:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 12th day of September is commemorated the Holy Name of the Blessed Virgin Mary, the which Commemoration the Supreme Pontiff Innocent XI ordered to be made in thanksgiving for the famous victory gained over the Turks at Vienna, in Austria, under the protection of the same Blessed Virgin, (upon the aforesaid day, in the year 1683.)
      - type: citation
        text: 'Upon the (same) 12th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, the holy martyrs Hieronides, Leontius, Serapion, Selesius, Valerian, and Straton, who, under the Emperor Maximin, were drowned in the sea for confessing Christ's Name.
      - type: text
        text: In Bithynia, the holy martyr Bishop Autonomus. He fled thither from Italy to escape the persecution under the Emperor Diocletian, and when he had turned very many to the faith the raging Gentiles slew him at the Altar while he was celebrating the Holy Mysteries, whereby he himself became a sacrifice of Christ.
      - type: text
        text: At Merus, in Phrygia, the holy martyrs Macedonius, Theodulus, and Tatian. The President Almachius, under the Emperor Julian the Apostate, after putting them to other torments, caused them to be stretched upon red-hot iron gratings, and thus with gladness they finished their testimony.
      - type: text
        text: At Iconium, in Lycaonia, the holy martyr Curonotus, Bishop (of that see,) who was beheaded under the President Perennius, and so received the palm of martyrdom.
      - type: text
        text: At Pavia, holy Juventius, Bishop (of that city,) of whom mention is made upon the 8th day of February. He was sent thither along with holy Syrus by the blessed Hermagoras, a disciple of the holy Evangelist Mark, and they both there preached the gospel of Christ, and shone forth with great graces and wonders, so that by the works of God they lighted up even the cities hard by, and fell asleep at last in the honour of their Bishophood, in glory and in peace.
      - type: text
        text: At Lyon, (in the sixth century,) deceased the holy (Confessor) Sacerdos, Bishop (of that see.)
      - type: text
        text: At Verona, holy Silvinus, Bishop (of that see.)
      - type: text
        text: At Anderlecht, adjacent to the city of Brussels, in the Brabant (in the year 1012,) the holy Confessor Guy (the Palmer.)
      la:
      - type: text
        text: Prídie Idus Septémbris
      - type: text
        text: ''
      - type: text
        text: Festum sanctíssimi Nóminis beátæ Maríæ, quod Innocéntius Undécimus, Póntifex Máximus, ob insígnem victóriam de Turcis, ipsíus Vírginis præsídio, Vindobónæ in Austria reportátam, celebrári iussit.
      - type: text
        text: In Bithýnia sancti Autónomi, Epíscopi et Mártyris; qui ex Itália, Diocletiáni Imperatóris persecutiónem declínans, illuc proféctus, ibi, cum plúrimos convertísset ad fidem, a furéntibus Gentílibus, dum sacra Mystéria perágeret, ad altáre mactátus est, et hóstia Christi efféctus.
      - type: text
        text: Icónii, in Lycaónia, sancti Curónoti Epíscopi, qui sub Perénnio Prǽside, cápite truncátus, martýrii palmam accépit.
      - type: text
        text: Alexandríæ natális sanctórum Mártyrum Hierónidis, Leóntii, Serapiónis, Selésii, Valeriáni et Stratónis, qui, sub Maximíno Imperatóre, ob confessiónem nóminis Christi, in mare sunt demérsi.
      - type: text
        text: Meri, in Phrýgia, pássio sanctórum Mártyrum Macedónii, Theodúli et Tatiáni, qui, sub Iuliáno Apóstata, ab Almáchio Prǽside, post ália torménta, super crates férreas ignítas pósiti, exsultántes martýrium complevérunt.
      - type: text
        text: Apud Papíam sancti Iuvéntii Epíscopi, de quo ágitur sexto Idus Februárii. Ipse, a beáto Hermágora, discípulo sancti Marci Evangelístæ, ad eam urbem, una cum sancto Syro, cuius memória recólitur quinto Idus Decémbris, diréctus est; et ambo, prædicántes illic Christi Evangélium et magnis virtútibus ac miráculis coruscántes, étiam vicínas urbes divínis opéribus illustrárunt, sicque in pontificáli honóre, glorióso fine, quievérunt in pace.
      - type: text
        text: Lugdúni, in Gállia, deposítio sancti Sacerdótis Epíscopi.
      - type: text
        text: Verónæ sancti Silvíni Epíscopi.
      - type: text
        text: Anderláci, prope Bruxéllas, in Brabántia, sancti Guidónis Confessóris.
  psalm.pr-die-kal-ndas-apr-lis-7e2d7473e4:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 31st day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Tekoa, in Palestine, the holy Prophet Amos, who was often-times scourged by the priest Amaziah, and pierced in the temples with a bar by his son Oziah. He was afterward borne back half dead into his own country, and there gave up the ghost, and is buried with his fathers, [785 B.C.]
      - type: text
        text: In Africa, the holy martyrs Theodulus, Anesius, Felix, Cornelia, and their Companions.
      - type: text
        text: In Persia, under King Isdegerd, the holy martyr Benjamin the Deacon. Because he would not cease from preaching the word of God, sharp reeds were forced under his nails, and a thorny stake thrust into his bowels, and so he finished his testimony, [in the year 401.]
      - type: text
        text: At Rome, the holy virgin Balbina, the daughter of the blessed martyr Quirinus. She was baptized by holy Pope Alexander, and after she had overcome the world, [in the year 169,] she was buried on the Appian Way, by her father's side.
      la:
      - type: text
        text: Prídie Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Thécuæ, in Palæstína, sancti Amos Prophétæ, qui ab Amasía Sacerdóte frequénter plagis afflíctus est, atque ab huius fílio Ozía vecte per témpora transfíxus; et póstea, semivívus in pátriam devéctus, ibídem exspirávit, sepultúsque est cum pátribus suis.
      - type: text
        text: In Pérside sancti Béniamin Diáconi, qui, cum Dei verbum non desísteret prædicáre, ídeo, sub Isdegérde Rege, arundínibus acútis confíxus únguibus, et spinósa sude per alvum transmíssa, martýrium consummávit.
      - type: text
        text: In Africa sanctórum Mártyrum Theodúli, Anésii, Felícis, Cornéliæ et Sociórum.
      - type: text
        text: Romæ sanctæ Balbínæ Vírginis, fíliæ beáti Quiríni Mártyris, quæ, a sancto Alexándro Papa baptizáta, in sancta virginitáte Christum sibi sponsum elégit; et, post devíctum huius sǽculi cursum, sepúlta est via Appia, iuxta patrem suum.
  psalm.pr-die-kal-ndas-aug-sti-9d47749297:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 31st day of July, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the birthday of St. Ignatius, confessor, founder of the Society of Jesus, renowned for sanctity and miracles, and most zealous for propagating the Catholic religion in all parts of the world.
      - type: text
        text: At Caesarea, in Mauretania, the martyrdom of the blessed martyr Fabius. As he refused to carry the ensign of the governor of the province, he was thrown into prison for some days, and as he persisted twice in confessing Christ when brought before the judge, he was condemned to capital punishment.
      - type: text
        text: At Milan, during the persecution of Antoninus, St. Calimerius, bishop and martyr, who was arrested, covered with wounds, and pierced through the neck with a sword. He terminated his martyrdom by being precipitated into a well.
      - type: text
        text: At Synnada, in Phrygia, the holy martyrs Democritus, Secundus and Denis.
      - type: text
        text: In Syria, three hundred and fifty monks, who became martyrs by being slain by the heretics for defending the Council of Chalcedon.
      - type: text
        text: At Ravenna, the departure from this world of St. Germanus, bishop of Auxerre, a man most renowned for his birth, faith, learning, and glorious miracles, who freed England completely from the heretical doctrines of the Pelagians.
      - type: text
        text: At Tagaste, in Africa, St. Firmus, bishop, illustrious by a glorious confession of the faith.
      - type: text
        text: At Siena, in Tuscany, the birthday of blessed John Colombini, founder of the Order of the Jesuati, renowned for sanctity and miracles.
      la:
      - type: text
        text: Prídie Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Romæ natális sancti Ignátii, Presbýteri et Confessóris, qui Fundátor éxstitit Societátis Iesu, atque vir fuit sanctitáte et miráculis clarus, ac religiónis cathólicæ ubíque dilatándæ studiosíssimus; quem Pius Undécimus, Póntifex Máximus, cæléstem ómnium Exercitiórum spirituálium Patrónum constítuit.
      - type: text
        text: Medioláni sancti Calimérii, Epíscopi et Mártyris; qui, in Antoníni persecutióne, comprehénsus, vulnéribus confóssus, cervicibúsque gládio transverberátis, præceps in púteum deiéctus, martýrii cursum confécit.
      - type: text
        text: Cæsaréæ, in Mauritánia, pássio beáti Fábii Mártyris, qui, cum ferre vexílla præsidália recusáret, primo in cárcerem trusus est, ibíque diébus áliquot deténtus; deínde, cum in confessióne Christi, interrogátus semel et íterum, immóbilis perduráret, senténtia capitáli a Iúdice condemnátur.
      - type: text
        text: Sýnnadæ, in Phrýgia Pacatiána, sanctórum Mártyrum Demócriti, Secúndi et Dionýsii.
      - type: text
        text: In Sýria sanctórum trecentórum quinquagínta Monachórum Mártyrum, qui, ob defensiónem Sýnodi Chalcedonénsis, ab hæréticis sunt occísi.
      - type: text
        text: Ravénnæ tránsitus sancti Germáni, Antisiodorénsis Epíscopi, génere, fide, doctrína et miraculórum glória claríssimi; qui Británniam a Pelagianórum hærésibus pénitus liberávit.
      - type: text
        text: Tagáste, in Africa, sancti Firmi Epíscopi, confessiónis glória conspícui.
      - type: text
        text: Senis, in Túscia, natális beáti Ioánnis Columbíni, qui fuit Institútor Ordinis Iesuatórum, et sanctitáte ac miráculis cláruit.
  psalm.pr-die-kal-ndas-dec-mbris-23a2864e3a:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 30th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Patrae, in the Peloponnesus, the holy Apostle Andrew. He preached the Gospel of Christ in Thrace and Scythia. He was arrested by the Proconsul Aegeas, and first imprisoned, then heavily flogged, and, lastly, crucified. He remained alive upon the cross through the second day, and taught the people. He besought the Lord not to suffer him to be taken down from the cross, and then a great light from heaven shone round about him, and when it faded away he gave up the ghost.
      - type: text
        text: At Rome, the holy martyrs Castulus and Euprepis.
      - type: text
        text: At Constantinople, the holy Virgin and martyr Maura.
      - type: text
        text: Likewise, the holy Virgin and martyr Justina.
      - type: text
        text: At Saintes, (in the sixth century,) holy Trojan, Bishop (of that see,) a man of great holiness, who, albeit he be buried in the earth, yet showeth by many works of power that he is alive in heaven.
      - type: text
        text: At Rome, (in the fifth century,) the holy Confessor Constantius, who manfully withstood the Pelagians, and bore much at their hands, the which contendings have gained him a place among the holy Confessors.
      - type: text
        text: In Palestine, (in the sixth century,) the holy Confessor Zosimus, who was eminent for holiness and miracles in the time of the Emperor Justin.
      la:
      - type: text
        text: Prídie Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Apud Patras, in Acháia, natális sancti Andréæ Apóstoli, qui in Thrácia et Scýthia sacrum Christi Evangélium prædicávit. Is, ab Ægéa Procónsule comprehénsus, primum in cárcere clausus est, deínde gravíssime cæsus, ad últimum suspénsus in cruce, in ea pópulum docens bíduo supervíxit; et, rogáto Dómino ne eum síneret de cruce depóni, circúmdatus est magno splendóre de cælo, et, abscedénte póstmodum lúmine, emísit spíritum.
      - type: text
        text: Romæ pássio sanctórum Cástuli et Euprépitis.
      - type: text
        text: Constantinópoli sanctæ Mauræ, Vírginis et Mártyris.
      - type: text
        text: Item sanctæ Iustínæ, Vírginis et Mártyris.
      - type: text
        text: Romæ sancti Constántii Confessóris, qui, fórtiter Pelagiánis resistens, ab eórum factióne pértulit multa, quæ illum sanctis Confessóribus sociárunt.
      - type: text
        text: Apud Sántonas, in Gállia, sancti Troiáni Epíscopi, magnæ sanctitátis viri, qui, sepúltus in terris, se in cælis vívere multis virtútibus maniféstat.
      - type: text
        text: In Palæstína beáti Zósimi Confessóris, qui, sub Iustíno Imperatóre, sanctitáte et miráculis fuit insígnis.
  psalm.pr-die-kal-ndas-febru-rii-6de3b0851f:
    role: psalm
    content:
      en:
      - type: text
        text: At Turin, St. John Bosco, confessor and founder of the Salesians and the founder of the Institute of the Daughters of Mary Auxiliatrix, known for his zeal for souls and propagation of the Faith, whom Pope Pius XI enrolled amongst the saints.
      - type: text
        text: ''
      - type: citation
        text: 'Upon the same 31st day of January, were born into a better life:'
      - type: text
        text: At Rome, upon the way to Porto, the holy martyrs Cyrus and John, who suffered many torments for confessing Christ, and were beheaded, (in the fourth century.)
      - type: text
        text: At Alexandria, the holy martyr Metranus. In the time of the Emperor Decius he refused to utter unlawful words at the command of the Pagans. Wherefore they bruised his whole body with cudgels, pierced his face and eyes with sharp reeds, and continued to torture him while they cast him out of the city, where they stoned him to death, (in the year 249.) There, likewise, the holy martyrs Saturninus, Thyrsus, and Victor.
      - type: text
        text: In the same city, the holy martyrs Tharsicius, Zoticus, Cyriacus, and their Companions.
      - type: text
        text: At Cyzicus, on the Hellespont, the holy martyr Triphenes, who overcame diverse torments, and then gained the palm of martyrdom by being killed by a bull.
      - type: text
        text: At Modena, holy Geminian, (after the year 390,) Bishop of that see, famous for miracles.
      - type: text
        text: In the province of Milan, in the time of the Emperor Theodosius, (fifth century,) the holy Confessor Julius the Priest.
      - type: text
        text: At Rome, (in the year 410,) the holy widow Marcella, whose excellences have been written by blessed Jerome.
      - type: text
        text: At Rome, likewise, the blessed widow Louisa Albertoni, (in the year 1530,) of the 3rd Order of St. Francis, illustrious for her graces.
      - type: text
        text: Upon the same day is commemorated the translation of the holy Evangelist Mark, when (in the year 831) his sacred body was taken from Alexandria, in Egypt, already occupied by the Mohammedans, and brought to Venice, where it is honourably buried in the great cathedral church consecrated in his name.
      la:
      - type: text
        text: Prídie Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Augústæ Taurinórum sancti Ioánnis Bosco, Confessóris, Societátis Salesiánæ ac Institúti Filiárum Maríæ Auxiliatrícis Fundatóris, animárum zelo et fídei propagándæ conspícui, quem Pius Papa Undécimus Sanctórum fastis adscrípsit.
      - type: text
        text: Romæ, via Portuénsi, sanctórum Mártyrum Cyri et Ioánnis, qui, pro confessióne Christi, post multa torménta, cápite truncáti sunt.
      - type: text
        text: Alexandríæ natális sancti Metráni Mártyris, qui, sub Décio Imperatóre, cum ad iussiónem Paganórum nollet ímpia verba proférre, hi totum eius corpus fústibus collisérunt, vultúmque et óculos præacútis cálamis terebrántes, cum cruciátibus expulérunt ipsum extra urbem, ibíque lapídibus oppréssum interemérunt.
      - type: text
        text: Ibídem sanctórum Mártyrum Saturníni, Thyrsi et Victóris.
      - type: text
        text: Item Alexandríæ sanctórum Mártyrum Tharsícii, Zótici, Cyríaci et Sociórum.
      - type: text
        text: Cýzici, in Hellespónto, sanctæ Tryphǽnæ Mártyris, quæ, plúrimis torméntis superátis, a tauro demum necáta, martýrii palmam proméruit.
      - type: text
        text: Mútinæ sancti Geminiáni Epíscopi, miraculórum glória conspícui.
      - type: text
        text: In Província Mediolanénsi sancti Iúlii, Presbýteri et Confessóris, témpore Imperatóris Theodósii.
      - type: text
        text: Neápoli sancti Francísci Xavérii-Maríæ Biánchi, Confessóris, Clérici Reguláris sancti Pauli, signis, donis cæléstibus et admirábili patiéntia illústris, quem Pius Papa Duodécimus ad suprémos honóres Sanctórum éxtulit.
      - type: text
        text: Romæ sanctæ Marcéllæ Víduæ, cuius præcláras laudes beátus Hierónymus scripsit.
      - type: text
        text: Item Romæ Beátæ Ludovícæ Albertóniæ, Víduæ Románæ, ex tértio Ordine sancti Francísci, virtútibus claræ.
      - type: text
        text: Eódem die Translátio sancti Marci Evangelístæ, cum sacrum eius corpus ex Alexandría, a bárbaris tunc occupáta, Venétias allátum, ibídem in maióri Ecclésia, eius nómine consecráta, honorificentíssime cónditum fuit.
  psalm.pr-die-kal-ndas-i-lii-b798d3db2f:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we make commemoration of the holy Apostle Paul.
      - type: citation
        text: 'Upon the same 30th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Limoges, in Gaul, [in the first century,] holy Martial, first Bishop [of that see,] and the two Priests Alpinian and Austriclinian, whose lives shone brightly with the fame of miracles.
      - type: text
        text: On the same day, [at Talca, in Spain,] the holy [martyrs, the] Priest Caius and the Sub-Deacon Leo.
      - type: text
        text: At Alexandria, under the Emperor Severus, the holy martyr Basilides. He led the holy Virgin Potamicena to execution, and while doing so, protected her from the insults of some lewd man, and he received a reward from her for this reverential service. Three days afterwards she appeared to him and put a crown upon his head, by the which vision she not only turned him to Christ, but also by her prayers, while he fought his short fight, she made him a glorious martyr.
      - type: text
        text: At Rome, holy Lucina, a disciple of the Apostles, who contributed of her goods to the necessities of the Saints, visited the Christians who were kept bound in prison, and ministered to the burial of the martyrs, beside whom she was buried in a vault which she made for herself.
      - type: text
        text: Also at Rome, [in the fourth century,] the holy Virgin Aemiliana.
      - type: text
        text: At Viviers, the holy Priest and Confessor Ostian.
      la:
      - type: text
        text: Prídie Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Commemorátio sancti Pauli Apóstoli.
      - type: text
        text: Romæ sanctæ Lucínæ, Apostolórum discípulæ, quæ, de facultátibus suis commúnicans Sanctórum necessitátibus, Christiános in cárcere detentos visitábat, ac sepultúræ Mártyrum inserviébat; iuxta quos et ipsa, in crypta a se constrúcta, sepúlta est.
      - type: text
        text: Item Romæ sanctæ Æmiliánæ Mártyris.
      - type: text
        text: Ipso die sanctórum Mártyrum Caii Presbýteri, et Leónis Subdiáconi.
      - type: text
        text: Alexandríæ pássio sancti Basílidis, qui, sub Sévero Imperatóre, cum sanctam Potamiœ́nam Virginem, quam ad supplícium ducébat, ab impudicórum hóminum petulántia tutátus esset, religiósi offícii mercédem ab ea recépit; nam ipsa, post tríduum illi appárens et eius cápiti corónam impónens, non tantum convértit eum ad Christum, sed étiam, brevi agóne certántem, suis précibus Mártyrem gloriósum effécit.
      - type: text
        text: Lemóvicis, in Aquitánia, sancti Martiális Epíscopi, cum duóbus Presbýteris Alpiniáno et Austricliniáno; quorum vita signis miraculórum ádmodum effúlsit.
      - type: text
        text: In território Vivariénsi, in Gálliis, sancti Ostiáni, Presbýteri et Confessóris.
      - type: text
        text: Saánicæ, in território Vicéntino, sancti Theobáldi, Presbýteri et Eremítæ, ex Campániæ Gállicæ Comítibus; quem Alexánder Papa Tértius, ob sanctitátis et miraculórum famam, Sanctórum cánoni adiúnxit.
  psalm.pr-die-kal-ndas-i-nii-64b3b91f04:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 31st day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Brescia, the holy Virgin Angela Merici, Foundress of the religious Sisters of St. Ursula, to have for their principal work the leading of young maidens in the ways of the Lord. Of her mention is made upon the 27th day of January.
      - type: text
        text: At Rome, the holy Virgin Petronilla, daughter of the blessed Apostle Peter. She looked down upon an offer of marriage from the noble Flaccus, and took three days to consider the matter, the which time she spent in fasting and prayer, and upon the third day, immediately after receiving the Sacrament of Christ, she gave up the ghost.
      - type: text
        text: At Aquileia, the holy brothers Cantius and Cantian, and their sister Cantianilla, all martyrs of the noble family of the Anicii, who, along with their schoolmaster Protus, were beheaded under the Emperors reigned A.D. 269-274. Diocletian and Maximian on account of their firmness in the Christian faith.
      - type: text
        text: At Torre, in Sardinia, [in the persecution under the Emperor Hadrian,] the holy martyr Crescentian.
      - type: text
        text: At Comana, in Pontus, the holy soldier Hermias. He was delivered by God's help from countless and savage tortures, under the Emperor Antoninus. He converted his executioner to Christ, and made him a sharer in the crown of his own martyrdom, but he himself was the first to grasp it, by being beheaded.
      - type: text
        text: At Verona, [in the sixth century,] the holy Lupicinus, Bishop [of that see.]
      - type: text
        text: At Rome, the holy Deacon Paschasius, a Confessor of whom doth make mention the blessed Pope Gregory [the Great.]
      la:
      - type: text
        text: Prídie Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Festum beátæ Maríæ Vírginis Regínæ.
      - type: text
        text: Romæ sanctæ Petroníllæ Vírginis, fíliæ beáti Petri Apóstoli, quæ, coniúgium nóbilis viri Flacci spernens, et, accéptis triduánis ad deliberándum indúciis, ínterim ieiúniis et oratiónibus vacans, tértia die, mox ut Christi Sacraméntum accépit, emísit spíritum.
      - type: text
        text: Aquiléiæ sanctórum Mártyrum fratrum Cántii, Cantiáni et Cantianíllæ, qui, cum essent ex illústri Aniciórum progénie, sub Diocletiáno et Maximiáno Imperatóribus, ob Christiánæ fídei constántiam, una cum pædagógo suo Proto, cápite plexi sunt.
      - type: text
        text: Túrribus, in Sardínia, sancti Crescentiáni Mártyris.
      - type: text
        text: Apud Comános, in Ponto, sancti Hérmiæ mílitis, qui, sub Antoníno Imperatóre, de innúmeris et sævíssimis torméntis divína ope liberátus, carníficem convértit ad Christum, et eiúsdem martýrii corónæ partícipem fecit; quam tamen ipse primus, gládio obtruncátus, accépit.
      - type: text
        text: Verónæ sancti Lupicíni Epíscopi.
      - type: text
        text: Romæ sancti Paschásii, Diáconi et Confessóris, cuius méminit beátus Gregórius Papa.
  psalm.pr-die-kal-ndas-ianu-rii-7b02a54d28:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 31st day of December were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, holy Pope Silvester I who (was said by tradition to have) baptized the Emperor Constantine the Great, confirmed the decrees of the Council of Nicea, wrought many other holy works, and fell asleep in peace (in the year 335.)
      - type: text
        text: Likewise at Rome, at the cemetery of Priscilla upon the Salarian Way, the holy martyrs Donata, Paulina, Rustica, Nominanda, Serotina, Hilaria, and their companions.
      - type: text
        text: At Sens, blessed Sabinian, (first) bishop of that see, and Potentian, who were sent thither to preach by the Roman Pontiff, and adorned that city by their last testimony. (He was the Apostle of Sens.)
      - type: text
        text: There also in the persecution under the Emperor Aurelian the holy virgin and martyr Columba, who conquered fire and was slain with the sword (third century.)
      - type: text
        text: At Rhessara, the holy exorcist Hermes.
      - type: text
        text: At Catania, in Sicily, the holy martyrs Stephen, Pontian, Attalus, Fabian, Cornelius, Sextus, Flos, Quintian, Minervinus and Simplician.
      - type: text
        text: On the same day holy Zoticus, a Roman priest, who went to Constantinople, and busied himself with the care of orphans.
      - type: text
        text: At Ravenna, the holy confessor the priest Barbatian.
      - type: text
        text: On the same day holy Melania, the younger, who left Rome along with her husband Pinian (son of the Prefect of Rome), and went to Jerusalem where she became a nun, and he a monk and both died holy deaths. (She was born in 383, married 410, and died in 439.)
      la:
      - type: text
        text: Prídie Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sancti Silvéstri Primi, Papæ et Confessóris; qui Magnum Constantínum Imperatórem baptizávit, et Nicǽnam confirmávit Sýnodum, ac, multis áliis rebus sanctíssime gestis, quiévit in pace.
      - type: text
        text: Item Romæ, via Salária, in cœmetério Priscíllæ, sanctárum Mártyrum Donátæ, Paulínæ, Rústicæ, Nominándæ, Serótinæ, Hiláriæ et Sociárum.
      - type: text
        text: Apud Sénonas beatórum Sabiniáni Epíscopi, et Potentiáni; qui, a Pontífice Románo illuc ad prædicándum dirécti, confessiónis suæ martýrio eándem metrópolim illustrárunt.
      - type: text
        text: Cátanæ, in Sicília, pássio sanctórum Stéphani, Pontiáni, Attali, Fabiáni, Cornélii, Sexti, Floris, Quinctiáni, Minervíni et Simpliciáni.
      - type: text
        text: Apud Sénonas sanctæ Colúmbæ, Vírginis et Mártyris; quæ, igne superáto, in persecutióne Aureliáni Imperatóris, gládio cæsa est.
      - type: text
        text: Eódem die sancti Zótici, Presbýteri Románi; qui, Constantinópolim proféctus, illic alendórum orphanórum curam suscépit.
      - type: text
        text: Ravénnæ sancti Barbatiáni, Presbýteri et Confessóris.
      - type: text
        text: In pago Lalovésci, diœcésis Viennénsis, in Delphinátu, deposítio sancti Ioánnis-Francísci Regis, Sacerdótis e Societáte Iesu et Confessóris, exímiæ in salúte animárum procuránda caritátis et patiéntiæ viri; quem Clemens Papa Duodécimus in Sanctórum cánonem rétulit.
      - type: text
        text: Rhætiáriæ sancti Hermétis Exorcístæ.
      - type: text
        text: Lutétiæ Parisiórum sanctæ Catharínæ Labouré, Vírginis, e Societáte Puellárum Caritátis, quæ a Deípara Immaculáta singulári manifestatióne Sacri Numismátis donáta, virtútibus et miráculis insígnis éxstitit, et a Pio Papa Duodécimo in sanctárum Vírginum númerum reláta est.
      - type: text
        text: Eódem die sanctæ Melániæ iunióris, quæ, cum viro suo Piniáno, ex urbe Roma discéssit, et Hierosólymam profécta est; ibíque ipsa inter féminas Deo sacras et vir inter Mónachos religiósam vitam exércuit, et ambo sancto fine quievérunt.
  psalm.pr-die-kal-ndas-m-rtii-e33be08878:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 28th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Macarius, Rufinus, Justus, and Theophilus.
      - type: text
        text: At Alexandria, the holy martyrs Caerealis, Pupulus, Caius, and Serapion.
      - type: text
        text: Likewise at Alexandria are commemorated the holy Priests, Deacons, and many others who cheerfully met death in ministering to the sick in the great plague which devastated that city, [in the third century,] in the time of the Emperor Valerian, and whom the godly reverence of the faithful hath been used to honour as martyrs.
      - type: text
        text: In the Jura mountains, toward Lyon, [in 460,] the holy Abbot [of Condat,] Romanus, who was the first to live there as a hermit, and becoming famous for many graces and miracles, became also the father of many monks.
      - type: text
        text: At Pavia is commemorated the translation of the body of holy Augustine, Bishop of Hippo, which was brought [in the year 722] from the island of Sardinia by the care of Luitprand, King of the Lombards.
      la:
      - type: text
        text: Prídie Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sanctórum Mártyrum Macárii, Rufíni, Iusti et Theóphili.
      - type: text
        text: Alexandríæ pássio sanctórum Cæreális, Púpuli, Caii et Serapiónis.
      - type: text
        text: Ibídem commemorátio sanctórum Presbyterórum, Diaconórum et aliórum plurimórum; qui, témpore Valeriáni Imperatóris, cum pestis sævíssima grassarétur, morbo laborántibus ministrántes, libentíssime mortem oppetiére, et quos velut Mártyres religiósa piórum fides venerári consuévit.
      - type: text
        text: Romæ sancti Hílari, Papæ et Confessóris.
      - type: text
        text: In território Lugdunénsi, locis Iurénsibus, deposítio sancti Románi Abbátis, qui primus illic eremíticam vitam duxit, et, multis virtútibus ac miráculis clarus, plurimórum póstea Pater éxstitit Monachórum.
      - type: text
        text: Pápiæ Translátio córporis sancti Augustíni Epíscopi, Confessóris et Ecclésiæ Doctóris, ex Sardínia ínsula, ópera Luitprándi, Regis Longobardórum.
  psalm.pr-die-kal-ndas-maii-9b36e33be4:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 30th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 1380,] the holy Virgin Catherine of Siena, of the order of St Dominic, famous for her life and miracles, whose name Pius II enrolled among those of the holy virgins, and whose feast we keep upon the 5th day of May.
      - type: text
        text: At Lambesa, in Numidia, the holy martyrs the Reader Marian, and the Deacon James. Marian had already triumphed over persecution by confessing Christ, under the Emperor Decius, but was arrested again along with his illustrious companion. After dire torments both were wondrously strengthened by revelations from God, and were at last beheaded, along with many others, [in the year 260.]
      - type: text
        text: At Saintes, [in the first century,] the blessed martyr Eutropius, Bishop of that see, who was consecrated a Bishop by holy Clement and sent into Gaul, where he long preached, and then died a conqueror, having his head broken in for confessing Christ.
      - type: text
        text: At Cordova, the holy martyrs the Priest Amator, the Monk Peter, and Lewis, [in the year 855.]
      - type: text
        text: At Novara, [in the fourth century,] the holy martyrs the Priest Lawrence, and the boys whom he had taken as pupils.
      - type: text
        text: At Alexandria, the holy martyrs the Priest Aphrodisius, and thirty others.
      - type: text
        text: At Ephesus, the holy martyr Maximus, who was crowned in the persecution under the Emperor Decius.
      - type: text
        text: At Fermo, in Picenum, the holy Virgin and martyr Sophia.
      - type: text
        text: At Naples, in Campania, [in the fifth century,] holy Severus, Bishop of that see, who, amid other wondrous works, did on an occasion raise a dead man from the grave to convict of untruthfulness the false creditor of a widow and orphans.
      - type: text
        text: At Evorea, in Epirus, holy Donatus, Bishop of that see, who was distinguished for his eminent holiness in the time of the Emperor Theodosius.
      - type: text
        text: At London, in England, holy Erconwald, [in the year 698,] Bishop of that see, [from the year 665 for eleven years. He was Abbot of Chertsey, and founded both that monastery and one for women at Barking, which was governed by his sister St. Edilburga,] who was famous for many miracles, and whose feast we keep upon the 14th day of November.
      la:
      - type: text
        text: Prídie Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Sanctæ Catharínæ Senénsis Vírginis, ex tértio Ordine sancti Domínici, quæ ad cæléstem Sponsum transívit prídie huius diéi.
      - type: text
        text: Apud Sántonas, in Gállia, beáti Eutrópii, Epíscopi et Mártyris, qui, a sancto Cleménte Papa, ordinis pontificális grátia consecrátus, in Gálliam diréctus est, ibíque, perácta diu prædicatióne, tandem, ob Christi testimónium, collíso cápite, victor occúbuit.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Amatóris Presbýteri, Petri Mónachi, et Ludovíci.
      - type: text
        text: Nováriæ sancti Lauréntii Presbýteri, et puerórum Mártyrum, quos ille suscéperat educándos.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Aphrodísii Presbýteri, et aliórum trigínta.
      - type: text
        text: Lambésæ, in Numídia, natális sanctórum Mártyrum Mariáni Lectóris, et Iacóbi Diáconi. Horum prior, cum infestatiónes iamprídem Deciánæ persecutiónis in confessióne Christi vicísset, íterum cum claríssimo colléga tentus est; et ambo, post dira et exquisíta supplícia, mirabíliter divínis revelatiónibus secúndo confortáti, novíssime, cum multis áliis, gládio consummáti sunt.
      - type: text
        text: Ephesi sancti Máximi Mártyris, qui in persecutióne Décii coronátus est.
      - type: text
        text: Firmi, in Picéno, sanctæ Sophíæ, Vírginis et Mártyris.
      - type: text
        text: Evóreæ, in Epíro, sancti Donáti Epíscopi, qui, témpore Theodósii Imperatóris, exímia sanctitáte refúlsit.
      - type: text
        text: Neápoli, in Campánia, sancti Pompónii Epíscopi.
      - type: text
        text: Londíni, in Anglia, sancti Erconváldi Epíscopi, qui multis miráculis cláruit.
      - type: text
        text: Chérii, apud Augústam Taurinórum, sancti Ioséphi Benedícti Cottoléngo, Confessóris, Parvæ Domus a Divína Providéntia Fundatóris, summa in Deum confidéntia et caritáte in páuperes insígnis, quem Pius Papa Undécimus Sanctórum fastis adscrípsit.
  psalm.pr-die-kal-ndas-nov-mbris-6279db5697:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Eve of All the Saints.
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the blessed Deacon Nemesius, and the Virgin Lucilla his daughter for as much as it was impossible to make them swerve from their faith in Christ, they were beheaded by order of the Emperor Valerian upon the 25th day of August.
      - type: text
        text: Their bodies were buried by blessed Pope Stephen; then, upon the 31st day of October, were laid in a more honourable place upon the Appian Way by blessed Xystus. Gregory V moved them to the Deaconry of St. Mary the New, along with those of the holy martyrs Symphronius, the Tribune Olympius, Exuperia his wife, and Theodulus his son, who had all been converted by the said Symphronius, and baptized by the said holy Stephen, and crowned with martyrdom. The bodies of these Saints were found in the church aforesaid in the time of the Supreme Pontiff Gregory XIII, and honourably reburied under the altar there upon the 8th day of December.
      - type: text
        text: The holy martyrs Ampliatus, Urban, and Narcissus, of whom mention is made by holy Paul, writing unto the Romans, and who were slain by the Jews and Gentiles for Christ's Gospel's sake.
      - type: text
        text: At Saint-Quentin, in Gaul, holy Quentin, a Roman citizen of senatorial rank, who suffered martyrdom under the Emperor Maximian. His body was shown by the revelation of an Angel after fifty-five years, and was found incorrupt.
      - type: text
        text: At Constantinople, the holy Archbishop Stachys, who was ordained by the blessed Apostle Andrew as the first Bishop of that city.
      - type: text
        text: At Milan, (in the seventh century,) the holy Confessor Antoninus, Bishop (of that see.)
      - type: text
        text: At Ratisbon, (in the tenth century,) holy Wolfgang, Bishop (of that see.)
      la:
      - type: text
        text: Prídie Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Ampliáti, Urbáni et Narcíssi, quorum méminit sanctus Paulus ad Romános scribens, qui, ob Evangélium Christi, a Iudǽis et Gentílibus cæsi sunt.
      - type: text
        text: Constantinópoli sancti Stachis Epíscopi, qui a beáto Andréa Apóstolo primus eiúsdem civitátis Epíscopus ordinátus est.
      - type: text
        text: Apud Augústam Veromanduórum, in Gállia, sancti Quinctíni, civis Románi et ex órdine Senatório viri, qui sub Maximiáno Imperatóre martýrium passus est; cuius corpus post annos quinquagínta quinque, revelánte Angelo, invéntum est incorrúptum.
      - type: text
        text: Medioláni sancti Antoníni, Epíscopi et Confessóris.
      - type: text
        text: Ratisbónæ, in Bavária, sancti Wolfgángi Epíscopi.
      - type: text
        text: Palmæ, in Maiórca ínsula, sancti Alfónsi Rodríguez, Coadiutóris temporális formáti e Societáte Iesu et Confessóris, humilitáte ac iugi mortificatiónis stúdio insígnis; quem Leo Décimus tértius, Póntifex Máximus, Sanctórum fastis adscrípsit.
      - type: text
        text: Romæ Translátio beáti Nemésii Diáconi, et fíliæ Lucíllæ Vírginis, qui octávo Kaléndas Septémbris decolláti sunt.
  psalm.pr-die-kal-ndas-oct-bris-c701e7e6b7:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 30th day of September, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Bethlehem of Judea, the holy Priest Jerome, Doctor of the Church, a man most deeply read in all letters, and a follower of approved monks. With the sword of his teaching he transfixed many monsters of heresy. He fell asleep in peace, quite broken down with old age, and was buried hard by the Lord's birthplace, but his body hath since been brought to Rome, where it is laid in the Church of St. Mary the Greater.
      - type: text
        text: Upon the same day, the holy martyr Leopardus, one of the household of the Emperor Julian the Apostate. He was beheaded at Rome, but his body hath since been brought to Aachen.
      - type: text
        text: At Solothurn, in Switzerland, the holy martyrs Victor and Ursus, of the glorious Theban Legion. They were first put to direful tortures under the Emperor Maximian, but light broke from heaven upon them, the servants of the Emperor fell to the earth, and they were delivered then they were cast into the fire, but it took no hold upon them and lastly they were slain with the sword.
      - type: text
        text: At Piacenza, the holy martyr Antonine, belonging to the same Theban Legion.
      - type: text
        text: Upon the same day, holy Bishop Gregory, (called the Apostle and Illuminator) of the Great Armenia, who suffered many things under the Emperor Diocletian, but at length fell asleep in peace.
      - type: text
        text: At Canterbury, in England, the holy Confessor Honorius, Bishop (of that see, wherein he succeeded holy Justus. He was consecrated by holy Paulinus, Archbishop of York. For more than thirty years he labored for the glory of God, and saw with joy the faith of Christ extended daily. He died in the year 653, and was succeeded in his see by Deusdedit.)
      - type: text
        text: At Rome, holy Francis de Borgia, of the Society of Jesus, whose feast we keep upon the 1st day of October.
      - type: text
        text: Likewise at Rome, (in the second century,) the holy widow Sophia, mother of the holy Virgins Faith, Hope, and Charity, (all martyrs.)
      la:
      - type: text
        text: Prídie Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: In Béthlehem Iudæ deposítio sancti Hierónymi Presbýteri, Confessóris et Ecclésiæ Doctóris, qui, ómnium stúdia litterárum adéptus ac probatórum Monachórum imitátor factus, multa hǽresum monstra gládio suæ doctrínæ confódit; demum, cum ad decrépitam usque vixísset ætátem, in pace quiévit, sepultúsque est ad Præsépe Dómini. Eius corpus, póstea Romam delátum, in Basílica sanctæ Maríæ Maióris cónditum fuit.
      - type: text
        text: Romæ natális sancti Francísci Bórgiæ, Sacerdótis et Confessóris; qui Præpósitus Generális fuit Societátis Iesu, ac vitæ asperitáte, oratiónis dono, abdicátis sǽculi et recusátis Ecclésiæ dignitátibus, vir memorábilis éxstitit. Ipsíus autem festum sexto Idus Octóbris celebrátur.
      - type: text
        text: Lexóvii, in Gállia, item natális sanctæ Terésiæ a Iesu Infánte, ex Ordine Carmelitárum Excalceatórum; quam, vitæ innocéntia et simplicitáte claríssimam, Pius Undécimus, Póntifex Máximus, sanctárum Vírginum albo adscrípsit, peculiárem ómnium Missiónum Patrónam declarávit, eiúsque festum quinto Nonas Octóbris recoléndum esse decrévit.
      - type: text
        text: Romæ sancti Leopárdi Mártyris, qui ex Iuliáni Apóstatæ domésticis fuit; cui caput amputátum est, et corpus eius Aquisgránum póstea translátum.
      - type: text
        text: Solodóri, in Gállia, pássio sanctórum Mártyrum Victóris et Ursi, ex gloriósa legióne Thebæórum, qui, sub Maximiáno Imperatóre, primum diris supplíciis cruciáti, sed, cælésti super eos lúmine coruscánte, ruéntibus in terram minístris, erépti; deínde in ignem missi, sed in nullo pénitus læsi; novíssime gládio consummáti sunt.
      - type: text
        text: Placéntiæ sancti Antoníni Mártyris, ex eádem legióne.
      - type: text
        text: Eódem die sancti Gregórii, Epíscopi magnæ Arméniæ, qui, sub Diocletiáno, multa passus est; ac tandem, Constantíni Magni Imperatóris témpore, in pace quiévit.
      - type: text
        text: Cantuáriæ, in Anglia, sancti Honórii, Epíscopi et Confessóris.
      - type: text
        text: Romæ sanctæ Sophíæ Víduæ, matris sanctárum Vírginum et Mártyrum Fídei, Spei et Caritátis.
  psalm.pr-die-kal-ndas-sept-mbris-c2688425fe:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 31 st day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, [in the year 651,] holy Aidan, Bishop of Lindisfarne. Holy Cuthbert, who was then a shepherd lad, saw the soul of Aidan carried up into heaven, and he thereupon left his sheep and became a monk.
      - type: text
        text: At Cardona, in Spain, [in the year 1240,] the holy Confessor Cardinal Raymond, surnamed the Unborn, of the Order of Blessed Mary of Ransom for the Redemption of Prisoners, a man famous for the holiness of his life, and for his wondrous works, whose feast we keep upon the first day of September.
      - type: text
        text: At Trier, [in the year 358,] holy Paulinus, Bishop [of that see.] In the time of the persecution under the Arians he was exiled by Constantius the Arian Emperor on account of his Catholic belief, and when he had been wearied out by changing the places of his exile, even beyond the bounds of Christendom, he at length died in Phrygia, and received a crown from the Lord in reward of his blessed sufferings.
      - type: text
        text: Likewise the holy martyrs Robustian and Mark.
      - type: text
        text: At Trasacco, on the Lake of Celano, the holy martyrs Caesidius the Priest and his Companions, who were crowned with martyrdom in the persecution under the Emperor Maximin.
      - type: text
        text: At Cassarea, in Cappadocia, [in the third century,] holy Theodotus, Rufina, and Ammia. Theodotus and Rufina were the father and mother of the holy martyr Mamas. Rufina gave him birth in prison, and Ammia was his nurse.
      - type: text
        text: At Athens, [in the second century,] the holy Aristides, a man illustrious for his faith and wisdom, who offered to the Emperor Hadrian a book upon the Christian religion, containing an exposition of our doctrine, and delivered a most able discourse in the presence of the said Emperor, to prove that Christ Jesus is the only God.
      - type: text
        text: At Auxerre, [in the sixth century,] the holy Confessor Optatus, Bishop [of that see.]
      - type: text
        text: At Nusco, [in the year 1093,] holy Amatus, Bishop [of that see.]
      - type: text
        text: At Monte Senario, hard by Florence, [in the year 1257,] the blessed Confessor Bonajuncta [Manetti,] one of the Seven Founders of the Order of Servants of the Blessed Virgin Mary, who gave up the ghost into the Lord's hands as he was discoursing to his brethren concerning the same Lord's Passion.
      la:
      - type: text
        text: Prídie Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Raymúndi Nonnáti, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, Cardinális et Confessóris; cuius dies natális séptimo Kaléndas Septémbris recólitur.
      - type: text
        text: Apud montem Senárium, in Etrúria, natális sancti Bonaiúnctæ Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, de Passióne Domínica ad fratres verba fáciens, in manus Dómini trádidit spíritum. Ipsíus autem ac Sociórum festum prídie Idus Februárii celebrátur.
      - type: text
        text: Tréviris item natális sancti Paulíni Epíscopi, qui, témpore Ariánæ infestatiónis, ab Ariáno Imperatóre Constántio ob cathólicam fidem relegátus exsílio, et extra Christiánum nomen usque ad mortem mutándo exsília fatigátus, tandem, apud Phrýgiam defúnctus, beátæ passiónis corónam percépit a Dómino.
      - type: text
        text: Tránsaquis, ad lacum Fúcinum, in Marsis, natális quoque sanctórum Mártyrum Cæsídii Presbýteri, et Sociórum; qui martýrio coronáti sunt in persecutióne Maximíni.
      - type: text
        text: Item sanctórum Mártyrum Robustiáni et Marci.
      - type: text
        text: Cæsaréæ, in Cappadócia, sanctórum Theódoti, Rufínæ et Ammiæ; quorum duo primi paréntes fuérunt sancti Mamántis Mártyris, quem Rufína in cárcere péperit, et Ammia educávit.
      - type: text
        text: Antisiodóri sancti Optáti, Epíscopi et Confessóris.
      - type: text
        text: In Anglia sancti Aidáni, Epíscopi Lindisfarnénsis; cuius ánimam, cum sanctus Cuthbértus, cuius memória tertiodécimo Kaléndas Aprílis cólitur, tunc óvium pastor, in cælum ferri vidísset, relíctis óvibus, factus est Mónachus.
      - type: text
        text: Apud Nuscum sancti Amáti Epíscopi.
      - type: text
        text: Athénis sancti Aristídis, fide et sapiéntia claríssimi, qui Hadriáno Príncipi egrégium de religióne Christiána volúmen óbtulit, nostri dogmátis cóntinens ratiónem; et quod Christus Iesus solus esset Deus, præsénte ipso Imperatóre, luculentíssime perorávit.
  psalm.pr-die-nonas-apr-lis-02f0b18efa:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 4th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Seville, in Spain, the holy Confessor Isidore, Bishop of that see, famous for his holiness and teaching, who lighted up all Spain by his zeal for the Catholic faith, and by his observance of the discipline of the Church [in the year 639].
      - type: text
        text: At Thessalonica, under the Emperor Maximian and the President Faustinus, the holy martyrs, the Deacon Agathopodes, and the Reader Theodulos, who were drowned in the sea with stones tied round their necks, because of their confession of the Christian faith.
      - type: text
        text: At Milan, the burial of the holy Confessor Ambrose, Bishop of that see, by whose labours, teaching, and miracles at the time of the Arian misbelief nearly the whole of Italy was converted to the Catholic faith [in the year 397.] [We keep his feast upon the 7th day of December, which is that of his ordination as bishop].
      - type: text
        text: At Constantinople, the holy Monk Plato, who struggled resolutely for many years against the heretics, breakers of the holy images [in the year 813].
      - type: text
        text: In Palestine, [in the fifth century,] the holy Hermit Zosimus, who saw to the burying of holy Mary of Egypt.
      la:
      - type: text
        text: Prídie Nonas Aprílis
      - type: text
        text: ''
      - type: text
        text: Híspali, in Hispánia, sancti Isidóri Epíscopi, Confessóris et Ecclésiæ Doctóris, sanctitáte et doctrína conspícui; qui zelo cathólicæ fídei et ecclesiásticæ observántia disciplínæ Hispánias illustrávit.
      - type: text
        text: Medioláni deposítio sancti Ambrósii Epíscopi, Confessóris et Ecclésiæ Doctóris; cuius stúdio, inter cétera doctrínæ et miraculórum insígnia, témpore Ariánæ perfídiæ, tota fere Itália ad cathólicam fidem convérsa est. Ipsíus tamen festívitas séptimo Idus Decémbris potíssimum recólitur, quo die Epíscopus Mediolanénsis ordinátus est.
      - type: text
        text: Thessalonícæ sanctórum Mártyrum Agathópodis Diáconi, et Theodúli Lectóris, qui, sub Maximiáno Imperatóre et Faustíno Prǽside, ob Christiánæ fídei confessiónem, in mare, alligáto ad collum saxo, demérsi sunt.
      - type: text
        text: Constantinópoli sancti Platónis Mónachi, qui plúribus annis advérsus hæréticos, sanctárum Imáginum effractóres, invicto ánimo decertávit.
      - type: text
        text: In Palæstína sancti Zósimi Anachorétæ, qui funus sanctæ Maríæ Ægyptíacæ curávit.
      - type: text
        text: Panórmi sancti Benedícti a sancto Philadélpho, ob córporis nigrédinem cognoménto Nigri, ex Ordine Minórum, Confessóris, qui, signis et virtútibus clarus, in Dómino quiévit, et a Pio Séptimo, Pontífice Máximo, in Sanctórum númerum relátus est.
  psalm.pr-die-nonas-aug-sti-cb98cbe53b:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 4th day of August is commemorated the holy Confessor Dominic [of Guzman,] Founder of the Order of Friars Preachers, very famous for his holiness and teaching. He remained always a virgin, and through his wonderful gifts raised three dead men to life. By his preaching he crushed heresies, and grounded many in a religious and godly life. He fell asleep in peace, [in the year 1221,] upon the sixth day of this present month of August. But his feast is kept upon this day by command of Pope Paul IV.
      - type: citation
        text: 'On the same 4th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Thessalonica, [in the first century,] the blessed Aristarchus, the disciple and close companion of the holy Apostle Paul, concerning whom the same Apostle writeth unto the Colossians, (iv, 10) "Aristarchus, my fellow-prisoner, saluteth you." He was by the same Apostle ordained Bishop of the Thessalonians, and after long contendings under Nero he was crowned by Christ, and fell asleep.
      - type: text
        text: At Rome, upon the Latin Way, [in the year 275,] the blessed martyr Tertullinus. He was a Priest who, under the Emperor Valerian, was horridly beaten with clubs, had his sides burnt and his mouth crushed, was stretched upon a rack and had his muscles cut, and then sentence was given to behead him, and so he finished his testimony.
      - type: text
        text: At Constantinople, [in the fourth century,] the holy martyr Eleutherius, of the Senatorial Order, who was slain with the sword for Christ's sake, in the persecution under Maximian.
      - type: text
        text: In Persia, [in the year 346,] the holy martyrs Ia and her Companions, who were diversely afflicted and underwent martyrdom along with nine thousand Christian prisoners under King Sapor.
      - type: text
        text: At Cologne, the holy martyr Protasius.
      - type: text
        text: At Verona, the holy Confessor Agabius, Bishop of that see.
      - type: text
        text: At Tours, holy Euphronius, [Arch-] Bishop of that see.
      - type: text
        text: At Rome, holy Perpetua, who was baptized by the blessed Apostle Peter. She turned her son Naserius and her husband Africanus to believe in Christ, and buried a great number of bodies of the holy martyrs, and passed away to be with the Lord, full of good works.
      la:
      - type: text
        text: Prídie Nonas Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Domínici Confessóris, qui Ordinis Fratrum Prædicatórum Fundátor fuit, atque octávo Idus mensis huius in pace quiévit.
      - type: text
        text: In vico Ars, diœcésis Bellicénsis, in Gállia, natális sancti Ioánnis Baptístæ-Maríæ Vianney, Presbýteri et Confessóris, in parochiáli múnere obeúndo insígnis, quem Pius Papa Undécimus in Sanctórum númerum rétulit, et ómnium parochórum cæléstem Patrónum constítuit. Ipsíus tamen festum sexto Idus huius mensis recólitur.
      - type: text
        text: 'Thessalonícæ item natális beáti Aristárchi, qui discípulus et comes indivíduus fuit sancti Pauli Apóstoli, de quo ipse Paulus ad Colossénses scribit: « Salútat vos Aristárchus, concaptívus meus ». Is, ab eódem Apóstolo Epíscopus Thessalonicénsium ordinátus, tandem, post longos agónes, sub Neróne, coronátus a Christo, quiévit.'
      - type: text
        text: Romæ sanctæ Perpétuæ, quæ, a beáto Petro Apóstolo baptizáta, Nazárium fílium et Africánum virum ad Christi fidem perdúxit, et multa sanctórum Mártyrum córpora sepelívit; ac tandem, bonórum óperum méritis cumuláta, migrávit ad Dóminum.
      - type: text
        text: Item Romæ, via Latína, pássio beáti Tertullíni, Presbýteri et Mártyris; qui, sub Valeriáno Imperatóre, post ímpiam fústium mactatiónem, ígnium circa látera exustiónem, oris quassatiónem, atque in equúleo extensiónem nervorúmque cæsiónem, data senténtia, cápitis amputatióne martýrium consummávit.
      - type: text
        text: Constantinópoli sancti Eleuthérii Mártyris, ex órdine Senatório viri, qui pro Christo, in persecutióne Maximiáni, gládio cæsus est.
      - type: text
        text: In Pérside sanctárum Mártyrum Iæ et Sociárum; quæ, cum novem míllibus Christiánis captívis, sub Sápore Rege, divérsis pœnis afflíctæ, martýrium subiérunt.
      - type: text
        text: Verónæ sancti Agábii, Epíscopi et Confessóris.
      - type: text
        text: Turónis, in Gállia, sancti Euphrónii Epíscopi.
      - type: text
        text: Colóniæ Agrippínæ commemorátio sancti Protásii Mártyris; qui Medioláni, una cum Gervásio fratre, passus est tertiodécimo Kaléndas Iúlii.
  psalm.pr-die-nonas-dec-mbris-3cbf3acfd4:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Peter Chrysologus, Archbishop of Ravenna, (in the year 450,) of whom mention is made upon the 2nd day of this present month of December.
      - type: citation
        text: 'Upon the same 4th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, in the persecution under the Emperor Maximin, the holy Virgin and martyr Barbara. After a cruel and wasting imprisonment she endured burning with torches, the cutting off of her breasts, and other torments, and finished her testimony by the sword, (in the year 235.) At Constantinople, (in the year 780,) the holy martyr Theophanes and his Companions.
      - type: text
        text: In Pontus, (about the year 330,) the blessed Confessor Meletius, Bishop (of Sebastopol.) He was a man of extraordinary learning, but this gift was outshone in him by the mightiness of his soul and the straightforwardness of his life.
      - type: text
        text: At Bologna, holy Felix, Bishop (of that see,) who had erstwhile been a Deacon of the church of Milan under holy Ambrose.
      - type: text
        text: In England, holy Osmund, Bishop, (in the year 1078, of Salisbury,) whose feast we keep upon the 17th day of July, which is the day of the translation of his sacred body. (He was Count of Seez in Normandy, and, following William the Conqueror, was made Count of Dorset and Lord High Chancellor of England. He died in 1099, and was canonised by Pope Calixtus III, in the year 1458.)
      - type: text
        text: At Cologne, (in the year 1075,) holy Annon, Bishop (of that see.)
      - type: text
        text: In Mesopotamia, (about the year 449,) holy Maruthas, Bishop of Tagrit, who raised up again the churches of God in Persia which had been cast down in the persecution under King Isdegerd he was famous for many miracles, and achieved honour even among his enemies. (Several of his works are extant. Tagrit is now Miafarakin.)
      - type: text
        text: At Parma, (in the year 1133,) holy Bernard, Cardinal-bishop of that city, of the Congregation of the Order of St Benedict, called that of Vallombrosa.
      la:
      - type: text
        text: Prídie Nonas Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Petri Chrysólogi, Epíscopi Ravennátis, Confessóris et Ecclésiæ Doctóris, cuius memória quarto Nonas huius mensis recensétur.
      - type: text
        text: Nicomedíæ pássio sanctæ Bárbaræ, Vírginis et Mártyris; quæ, in persecutióne Maximíni, post diram cárceris maceratiónem, lampadárum adustiónem, mamillárum præcisiónem atque ália torménta, gládio martýrium consummávit.
      - type: text
        text: Constantinópoli sanctórum Theóphanis et Sociórum.
      - type: text
        text: In Ponto beáti Melétii, Epíscopi et Confessóris; qui, cum esset ob eruditiónis prærogatívam præcípuus, ob virtútem tamen animi et vitæ sinceritátem longe magnificéntior éxstitit.
      - type: text
        text: Bonóniæ sancti Felícis Epíscopi, qui ántea Mediolanénsis Ecclésiæ, sub sancto Ambrósio, Diáconus fúerat.
      - type: text
        text: In Anglia sancti Osmúndi, Epíscopi et Confessóris.
      - type: text
        text: Colóniæ Agrippínæ sancti Annónis Epíscopi.
      - type: text
        text: In Mesopotámia sancti Marúthæ Epíscopi, qui Dei Ecclésias, ob persecutiónem Isdegérdis Regis collápsas, in Pérside reparávit, multísque miráculis clarus, apud hostes étiam méruit honorári.
      - type: text
        text: Parmæ sancti Bernárdi, Cardinális et eiúsdem civitátis Epíscopi, ex Ordine Vallis Umbrósæ.
  psalm.pr-die-nonas-febru-rii-205439a8e4:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Andrew Corsini, (from 1360 to 1373,) Bishop of Fiesole, of whom mention is made upon the 6th day of January.
      - type: citation
        text: 'Upon the same 4th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Eutychius, who gained an illustrious martyrdom and is buried in the cemetery of Callistus. Holy Pope Damasus adorned his grave with some verses.
      - type: text
        text: At Fossambrono, the holy martyrs Aquilinus, Geminus, Gelasius, Magnus, and Donatus.
      - type: text
        text: At Thmuis, in Egypt, (about the year 308,) the blessed martyr Philaeas, Bishop of that city, and Philoromus, Tribune of the troops, who in the persecution under the Emperor Diocletian could not be persuaded by their kinsfolk and friends to have pity on themselves, but stretched forth their necks and won palm branches of victory from the Lord's hand and a countless multitude of the faithful of the same city, following after the example of their shepherd, were likewise crowned with martyrdom.
      - type: text
        text: On the same day, (in the year 888,) holy Rembert, Bishop of Bremen.
      - type: text
        text: At Troyes, the holy Confessor Aventinus, (about the year 538.)
      - type: text
        text: At Pelusium, in Egypt, the holy monk Isidore, (monk in desert of Lychnos, about the year 449,) eminent for his merits and teaching.
      - type: text
        text: On the same day, the holy Confessor Gilbert, (in the year 1190,) founder of the Order of Sempringham, whose feast we keep upon the 11th day of this present month of February.
      - type: text
        text: In the town of Amatrice, in the diocese of Reate, (in the year 1612,) the holy Confessor Joseph of Leonissa, of the Order of Friars Minors Capuchins, who suffered much from the Mohammedans for his preaching of the faith, and was famous for his apostolic labours and his miracles whose name the Supreme Pontiff Benedict XIV. enrolled among those of the holy confessors.
      la:
      - type: text
        text: Prídie Nonas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Andréæ Corsíni, ex Ordine Carmelitárum, Epíscopi Fæsuláni et Confessóris, cuius dies natális ágitur octávo Idus Ianuárii.
      - type: text
        text: Romæ sancti Eutýchii Mártyris, qui illústre martýrium consummávit, ac sepúltus est in cœmetério Callísti; eiúsque sepúlcrum póstea sanctus Dámasus Papa vérsibus exornávit.
      - type: text
        text: Thmui, in Ægýpto, pássio beáti Philéæ, eiúsdem civitátis Epíscopi, et Philóromi, Tribúni mílitum; qui, in persecutióne Diocletiáni, cum a cognátis et amícis suadéri non possent ut sibi párcerent, ambo, datis cervícibus, palmas a Dómino meruérunt. Cum ipsis innúmera étiam multitúdo fidélium ex eádem urbe, pastóris sui vestígia sequens, martýrio coronáta est.
      - type: text
        text: Foro Semprónii sanctórum Mártyrum Aquilíni, Gémini, Gelásii, Magni et Donáti.
      - type: text
        text: In regno Maravénsi, apud Indos Orientáles, sancti Ioánnis de Britto, Sacerdótis e Societáte Iesu, qui, cum multos infidéles ad fidem convertísset, glorióso martýrio coronátus est.
      - type: text
        text: Trecis, in Gállia, sancti Aventíni, Presbýteri et Confessóris.
      - type: text
        text: Pelúsii, in Ægýpto, sancti Isidóri, Presbýteri et Mónachi, méritis et doctrína conspícui.
      - type: text
        text: Sempringhámiæ, in Anglia, sancti Gilbérti, Presbýteri et Confessóris, qui Ordinis Sempringhamiénsis fuit Institútor.
      - type: text
        text: In óppido Amatrícis, in Aprútio, deposítio sancti Ioséphi a Leoníssa, Sacerdótis ex Ordine Minórum Capuccinórum et Confessóris; quem, ob fídei prædicatiónem a Mahumetánis dira perpéssum, labóribus apostólicis et miráculis clarum, Benedíctus Décimus quartus, Póntifex Máximus, in Sanctórum cánonem rétulit.
      - type: text
        text: Bremæ commemorátio sancti Rembérti, qui, sancti Anschárii discípulus, in ipsíus locum, hac die, óbitum magístri sui próxime subsequenti, olim Hamburgénsis simul ac Breménsis Epíscopus eléctus est.
      - type: text
        text: Bitúricis, in Aquitánia, sanctæ Ioánnæ de Valois, Gálliæ Regínæ, Ordinis sanctíssimæ Annuntiatiónis beátæ Maríæ Vírginis Fundatrícis, pietáte et singulári Crucis participatióne illústris, a Pio Papa Duodécimo Sanctárum fastis adscríptæ.
  psalm.pr-die-nonas-i-lii-f352cfe194:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is the Octave of the holy Apostles Peter and Paul.
      - type: citation
        text: 'Upon the same 6th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Judea, the holy Prophet Isaiah, who was sawn asunder under King Manasseh, [about 715 B.C.,] and was buried under the oak at En Rogel beside the flowing of the waters, [the first of the four Greater Prophets.]
      - type: text
        text: At Rome, the holy martyr Tranquillinus, father of the holy martyrs Mark and Marcellian. He had been converted to Christ by the preaching of the holy martyr Sebastian, baptized by the blessed Priest, Polycarp, and himself ordained a Priest by the holy Pope Caius. He was praying at the grave of blessed Paul, upon the Octave Day of the Apostles, when the pagans under the Emperor Diocletian tried and stoned him. And so he finished his testimony, [in the year 286.]
      - type: text
        text: At Fiesole, in Tuscany, the holy martyr Romulus, Bishop [of that see,] a disciple of Peter. He was sent forth by the Apostle to preach the gospel, and when he had proclaimed Christ in many places of Italy, he came back to Fiesole, where he and many Companions were crowned with martyrdom under the Emperor Domitian.
      - type: text
        text: In Campania, the holy Virgin and martyr Dominica, [fourth century.] Under the Emperor Diocletian she was condemned to the beasts for breaking idols, but the beasts did not hurt her. She was then beheaded, and so passed away to be ever with the Lord. Her body is kept with great reverence at Tropea, in Calabria.
      - type: text
        text: On the same day, the holy martyr Lucy, a Campanian by race, who, being tried and sharply tormented under the Vicar Rixius Varus, turned him to Christ, with whom were joined Antoninus, Severinus, Diodorus, Dion, and seventeen others, who all suffered and were crowned together.
      - type: text
        text: In the country of Trier, the holy Priest and Confessor Goer, [in the year 575.]
      la:
      - type: text
        text: Prídie Nonas Iúlii
      - type: text
        text: ''
      - type: text
        text: Hierosólymis sancti Isaíæ Prophétæ, qui, sub Manásse Rege, in duas sectus partes occúbuit, sepultúsque est sub quercu Rogel, iuxta tránsitum aquárum.
      - type: text
        text: Fǽsulis, in Túscia, sancti Rómuli, Epíscopi et Mártyris, qui fuit beáti Petri Apóstoli discípulus. Hic, ab eódem Apóstolo missus ad prædicándum Evangélium, in multis Itáliæ locis Christum annuntiávit; ac tandem, Fǽsulas regréssus, ibi, sub Domitiáno Príncipe, martýrio coronátus est cum áliis Sóciis.
      - type: text
        text: Romæ natális sancti Tranquillíni Mártyris, patris sanctórum Marci et Marcelliáni, qui, ad prædicatiónem sancti Sebastiáni Mártyris convérsus ad Christum, a beáto Polycárpo Presbýtero baptizátus est, et a sancto Caio Papa Présbyter ordinátus. Ipse, die Octavárum Apostolórum, cum ad confessiónem beáti Pauli oráret, ibídem, sub Diocletiáno Imperatóre, a Pagánis tentus est, et, ab eis lapidátus, martýrium consummávit.
      - type: text
        text: Londíni, in Anglia, sancti Thomæ More, regni Cancellárii, qui, pro fide cathólica ac beáti Petri primátu, iubénte Henríco Octávo Rege, decollátus est.
      - type: text
        text: In Campánia sanctæ Domínicæ, Vírginis et Mártyris, quæ, sub Diocletiáno Imperatóre, cum fregísset idóla, hinc ad béstias damnáta, sed ab illis nil læsa, demum, cápite obtruncáta, migrávit ad Dóminum. Ipsíus vero corpus Tropéæ, in Calábria, summa veneratióne asservátur.
      - type: text
        text: Eódem die sanctæ Lúciæ Mártyris, quæ, natióne Campána, a Ríxio Varo Vicário tenta et ácriter cruciáta, eúndem convértit ad Christum; quibus adiúncti sunt Antonínus, Sevérinus, Diodórus, Dion, et álii decem et septem, qui in passióne collégæ et in coróna fuére consórtes.
      - type: text
        text: Neptúni, in Látio, sanctæ Maríæ Gorétti, piíssimæ adolescéntis, in defendénda virginitáte crudelíssime necátæ, quam Pius Papa Duodécimus sanctárum Mártyrum catálogo solémniter accénsuit.
      - type: text
        text: In pago Trevirénsi sancti Goaris, Presbýteri et Confessóris.
  psalm.pr-die-nonas-i-nii-a30037a15b:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 4th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Agnone, in the Abruzzi, holy Confessor Francis, of the noble Neapolitan family of Caracciolo, founder of the congregation of Regular Clerks Minors. He was a burning and a shining light of love towards God and his neighbor, and intense earnestness in spreading abroad the worship of the Holy Eucharist. His body lieth at Naples, and is held in great veneration. Pius VII added his name to the list of those of the Saints.
      - type: text
        text: At Rome, the holy martyrs Aretius and Dacian.
      - type: text
        text: At Sisseg, in Illyricum, [in the year 304,] holy Quirinus, Bishop [of that see.] Prudentius writeth of him that, under the President Galerius, for Christ's faith's sake, a millstone was tied about his neck and he was cast into the river, but the millstone swam, and he was a long time exhorting the Christians who stood by not to be scared at the sight of his execution, nor to be shaken in the faith, and then obtained from God the glory of martyrdom, and so was allowed to sink.
      - type: text
        text: At Brescia, under the Emperor Nero, the holy martyr Clateus, Bishop [of that see.]
      - type: text
        text: In Hungary, the holy martyrs Rutilus and his companions.
      - type: text
        text: At Arras, the holy Virgin and martyr Saturnina.
      - type: text
        text: At Tivoli, the holy martyr Quirinus.
      - type: text
        text: At Constantinople, [in the fourth century,] the holy Metrophanes, Archbishop [of that see,] an eminent Confessor.
      - type: text
        text: At Milevitanus, in Numidia, holy Optatus, Bishop [of that see,] famous for his teaching and holiness.
      - type: text
        text: At Verona, holy Alexander, Bishop [of that see.]
      la:
      - type: text
        text: Prídie Nonas Iúnii
      - type: text
        text: ''
      - type: text
        text: Agnóni, in Aprútio citerióre, sancti Francísci, ex nóbili Neapolitána família Carácciolo, Confessóris, Congregatiónis Clericórum Regulárium Minórum Fundatóris, qui mira in Deum et próximum caritáte et ardentíssimo sacræ Eucharístiæ cultus propagándi stúdio flagrávit; atque a Pio Séptimo, Pontífice Máximo, Sanctórum cánoni adscríptus est. Ipsíus corpus Neápolim, in Campánia, translátum fuit, ibíque religiosíssime cólitur.
      - type: text
        text: Romæ sanctórum Mártyrum Arétii et Daciáni.
      - type: text
        text: Sísciæ, in Illýrico, sancti Quiríni Epíscopi, qui, sub Galério Prǽside, pro fide Christi (ut Prudéntius scribit), molári saxo ad collum ligáto, in flumen præcipitátus est; sed, lápide supernatánte, cum circumstántes Christiános, ne eius terreréntur supplício neve titubárent in fide, diu fuísset hortátus, ipse, ut martýrii glóriam assequerétur, précibus a Deo, ut mergerétur, obtínuit.
      - type: text
        text: Medioláni sancti Clatéi, Epíscopi Brixiénsis et Mártyris, qui, sub Neróne Imperatóre, iussu Præfécti urbis illíus tentus, et, cum renuntiáre Christo nollet, multis verbéribus afflíctus et cápite obtruncátus est.
      - type: text
        text: In Pannónia sanctórum Mártyrum Rútili et Sociórum.
      - type: text
        text: Tíbure sancti Quiríni Mártyris.
      - type: text
        text: Atrébati, in Gálliis, sanctæ Saturnínæ, Vírginis et Mártyris.
      - type: text
        text: Constantinópoli sancti Metrophánis, Epíscopi et Confessóris insígnis.
      - type: text
        text: Milévi, in Numídia, sancti Optáti Epíscopi, doctrína et sanctitáte conspícui, quem sancti Ecclésiæ Patres Augustínus et Fulgéntius suis láudibus celebrárunt.
      - type: text
        text: Verónæ sancti Alexándri Epíscopi.
  psalm.pr-die-nonas-ianu-rii-a487117206:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is Octave of the Holy Innocents.
      - type: citation
        text: 'Upon the same 4th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Crete, holy Titus, whom the Apostle Paul ordained Bishop for the Cretans. When he had faithfully brought to an end (about the year 105), his work of preaching, he obtained a blessed death, and was buried in that church whereof the blessed Apostle had appointed him a worthy minister. His feast is kept upon the 6th day of the month of February.
      - type: text
        text: At Rome, the holy martyrs the priest Priscus, the clerk Priscillian, and the devout woman Benedicta, who won martyrdom by the sword in the time of the wicked Emperor Julian (the Apostate).
      - type: text
        text: Likewise at Rome, the blessed martyr Dafrosa, wife of the holy martyr Flavian (mother of St Bibiana). After the execution of her husband she was first sentenced to exile, and then put to death under the aforesaid Emperor Julian.
      - type: text
        text: At Bologna, the holy martyrs Hermes, Aggaeus, and Caius, who suffered under the Emperor Maximian.
      - type: text
        text: At Adrumetum, in Africa, the holy martyr Mavillus, whom the cruel President Scapula condemned to the wild beasts in the persecution under the Emperor Severus, and who thus received the crown of martyrdom.
      - type: text
        text: Likewise in Africa, the illustrious martyrs Aquilinus, Geminus, Eugenius, Marcian, Quintus, Theodotus, and Tryphon (about end of fifth century).
      - type: text
        text: At Langres, holy Gregory, bishop of that see, famous for miracles (in the year 539).
      - type: text
        text: At Reims, in Gaul (in the year 743), the holy confessor Rigobert, bishop (in the year 722) of that see.
      la:
      - type: text
        text: Prídie Nonas Ianuárii
      - type: text
        text: ''
      - type: text
        text: In Creta natális sancti Titi, qui, ab Apóstolo Paulo Epíscopus Creténsium ordinátus, et, post prædicatiónis offícium fidelíssime consummátum, finem beátum adéptus, in ea sepúltus est Ecclésia, ubi a beáto Apóstolo dignus miníster fúerat constitútus. Ipsíus tamen festívitas octávo Idus Februárii celebrátur.
      - type: text
        text: Romæ sanctórum Mártyrum Prisci Presbýteri, et Priscilliáni Clérici, ac Benedíctæ, religiósæ féminæ; qui, témpore impiíssimi Iuliáni, gládio martýrium complevérunt.
      - type: text
        text: Item Romæ beátæ Dafrósæ, uxóris sancti Flaviáni Mártyris, ac matris sanctárum Bibiánæ et Demétriæ, Vírginum et Mártyrum; quæ, post interfectiónem viri sui, primum exsílio relegáta, deínde, sub præfáto Príncipe, cápite plexa est.
      - type: text
        text: Bonóniæ sanctórum Hermétis, Aggæi et Caii Mártyrum, qui sub Maximiáno Imperatóre passi sunt.
      - type: text
        text: Adruméti, in Africa, commemorátio sancti Mávili Mártyris, qui in persecutióne Sevéri Imperatóris, a sævíssimo Prǽside Scápula damnátus ad béstias, martýrii corónam accépit.
      - type: text
        text: Item in Africa præclarissimórum Mártyrum Aquilíni, Gémini, Eugénii, Marciáni, Quincti, Theodóti et Tryphónis.
      - type: text
        text: Apud Língonas, in Gállia, sancti Gregórii Epíscopi, miráculis clari.
      - type: text
        text: Rhemis, in Gállia, sancti Rigobérti, Epíscopi et Confessóris.
  psalm.pr-die-nonas-m-rtii-db1ab10497:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 6th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, the holy martyrs Victor and Victorinus, who were imprisoned for three years, and many ways tormented, along with Claudian and Bassa his wife, and being still recommitted to prison, died therein, [third century.]
      - type: text
        text: At Tortona, the holy martyr Marcian, Bishop of that see, who was crowned under the Emperor Trajan, being slain for Christ's greater glory.
      - type: text
        text: At Constantinople, holy Evagrius, who was elected Patriarch of that see by the Catholics in the time of the Emperor Valens, but was sent by the Emperor into exile, and there passed away to be ever with the Lord.
      - type: text
        text: In Cyprus, the holy martyr Conon, who under the Emperor Decius had nails driven through his feet, and was then made to run in front of a chariot, under the which torment he fell upon his knees and gave up his soul in prayer to God.
      - type: text
        text: Likewise, forty-two holy martyrs, who were apprehended in Amorium and brought to Syria, where they passed through a noble conflict and triumphantly grasped the palm of martyrdom, [in the year 845.]
      - type: text
        text: At Bologna, holy Basil, Bishop of that city, who was ordained by holy Pope Sylvester, and both by his word and example governed in holiness the church committed unto his care, [fourth century.]
      - type: text
        text: At Barcelona, in Spain, [in the year 137,] blessed Oligarius, who was first Canon and afterward Bishop of Barcelona, and Archbishop of Taragona.
      - type: text
        text: At Gent, in Flanders, the holy Virgin Coletta, [in the year 1447,] who first professed in the Third Order of Friars Minors, and then being filled with the Holy Ghost, set up many monasteries of sisters of the Second Order under the primitive discipline. She was ennobled by the grace of God, and famous for countless miracles, and the Supreme Pontiff Pius VII enrolled her name among those of the saints.
      la:
      - type: text
        text: Prídie Nonas Mártii
      - type: text
        text: ''
      - type: text
        text: Sanctárum Perpétuæ et Felicitátis Mártyrum, quæ sequénti die gloriósam martýrii corónam a Dómino recepérunt.
      - type: text
        text: Dertónæ sancti Marciáni, Epíscopi et Mártyris, qui, sub Traiáno, pro Christi glória occísus, coronátur.
      - type: text
        text: Nicomedíæ natális sanctórum Mártyrum Victóris et Victoríni, qui, per triénnium, cum Claudiáno et uxóre eius Bassa, torméntis multis afflícti et retrúsi in cárcerem, ibídem vitæ suæ cursum implevérunt.
      - type: text
        text: In Cypro sancti Conónis Mártyris, qui, sub Décio Imperatóre, clavis confíxus pedes et ante currum iussus cúrrere, in génua procúbuit, atque in oratióne réddidit spíritum.
      - type: text
        text: In Sýria pássio sanctórum quadragínta duórum Mártyrum, qui, in Amório comprehénsi et illuc perdúcti, ibi, egrégio perácto certámine, victóres palmam martýrii percepérunt.
      - type: text
        text: Constantinópoli sancti Evágrii, qui, témpore Valéntis a Cathólicis eléctus Epíscopus, et ab eódem Imperatóre in exsílium missus, Conféssor migrávit ad Dóminum.
      - type: text
        text: Bonóniæ sancti Basilíi Epíscopi, qui, a sancto Silvéstro Papa ordinátus, verbo et exémplo créditam sibi Ecclésiam sanctíssime gubernávit.
      - type: text
        text: Barcinóne, in Hispánia, beáti Ollegárii, primum Canónici, et póstea Epíscopi Barcinonénsis, et Archiepíscopi Tarraconénsis.
      - type: text
        text: Vitérbii beátæ Rosæ Vírginis, ex tértio Ordine sancti Francísci.
      - type: text
        text: Apud Gandávum, in Flándria, sanctæ Colétæ Vírginis, quæ, primum tértii Ordinis Franciscális régulam proféssa, deínde, divíno Spíritu affláta, quamplúra Moniálium secúndi eiúsdem Ordinis monastéria primǽvæ restítuit disciplínæ; atque, divínis exornáta virtútibus et innúmeris clara miráculis, a Pio Séptimo, Pontífice Máximo, in albo Sanctórum adscrípta est.
  psalm.pr-die-nonas-maii-e725ced7c4:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy [Apostle and Evangelist] John before the Latin gate at Rome. He had been brought bound from Ephesus to Rome by command of Domitian, and by the judgment of the Senate he was put into a vessel of boiling oil before the said gate, but he came out thereof cleaner and healthier than he was when he was put therein, [about the year 95.]
      - type: citation
        text: 'Upon the same 6th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, the holy Evodius, who, as the blessed Ignatius writeth unto the Antiochenes, was ordained the first Bishop there, by the holy Apostle Peter, and who finished his life by a glorious testimony, [in the year 62.]
      - type: text
        text: At Cyrene, [in the first century,] the holy Bishop Lucius, of whom the holy [Evangelist] Luke maketh mention in the Acts of the Apostles, [and the holy Apostle Paul in his Epistle to the Romans.]
      - type: text
        text: In Africa, the holy martyrs Heliodorus and Venustus, and seventy-five others.
      - type: text
        text: In Cyprus, [in the fourth century,] the holy Theodotus, Bishop of Cyrinia, who suffered most grievous persecution under the Emperor Licinius, but saw the peace of the Church before he gave up his spirit to God.
      - type: text
        text: At Damascus, [in the year 780,] blessed John of Damascus, famous for holiness and teaching. He strove manfully for the honouring of the holy images, both by word and writing, against the Emperor Leo the Isaurian, wherefore the Emperor commanded that his right hand should be smitten off, whereupon he commended himself to the image of the Blessed Virgin Mary which he had defended, and forthwith he received back his hand whole and sound, of whom we keep feast upon the 27th day of March.
      - type: text
        text: At Charran, in Mesopotamia, the Bishop Protogenes.
      - type: text
        text: In England, [in the year 718,] the holy Eadberth, Bishop of Lindisfarne, famous for teaching and godliness, [who held the see of Lindisfarne for eleven years next after holy Cuthbert.]
      - type: text
        text: At Rome, the holy Virgin Benedicta, [sister of the holy widow Galla.]
      - type: text
        text: At Salerno, feast is kept for the translation of the holy Apostle Matthew, whose sacred body was brought of old time out of Ethiopia into diverse countries, and at last to that city, where it was buried with all honour under the church dedicated in his name.
      la:
      - type: text
        text: Prídie Nonas Maii
      - type: text
        text: ''
      - type: text
        text: Damásci natális beáti Ioánnis Damascéni, Presbýteri, Confessóris et Ecclésiæ Doctóris, doctrína et sanctitáte célebris. Hic, pro cultu sanctárum Imáginum, verbo et scriptis advérsus Leónem Isáuricum strénue decertávit; cuius Imperatóris ob calúmnias cum ipsi Ioánni déxtera manus a Saracenórum Príncipe amputáta esset, idem, beátæ Maríæ Vírgini, cuius Imágines defénderat, se comméndans, prótinus déxteram íntegram sanámque recépit. Eius autem festívitas sexto Kaléndas Aprílis celebrátur.
      - type: text
        text: Cyréne, in Líbya, sancti Lúcii Epíscopi, quem in Actibus Apostolórum sanctus Lucas commémorat.
      - type: text
        text: Romæ sancti Ioánnis, Apóstoli et Evangelístæ, ante Portam Latínam; qui, ab Epheso, iussu Domitiáni, vinctus Romam est perdúctus, et, iudicánte Senátu, ante eándem portam in ólei fervéntis dólium missus, exívit inde purior et vegétior quam intrávit.
      - type: text
        text: Antiochíæ sancti Evódii, qui (ut beátus Ignátius ad Antiochénses scribit), primus ibídem a sancto Petro Apóstolo ordinátus Epíscopus, glorióso martýrio vitam finívit.
      - type: text
        text: In Africa sanctórum Mártyrum Heliodóri et Venústi, cum áliis septuagínta quinque.
      - type: text
        text: In Cypro sancti Theódoti, Epíscopi Cyríniæ, qui, sub Licínio Imperatóre, gravíssima passus est, ac tandem, in Ecclésiæ pace, spíritum Deo réddidit.
      - type: text
        text: Carrhis, in Mesopotámia, sancti Protógenis, Epíscopi et Confessóris.
      - type: text
        text: In Anglia sancti Eadbérti, Epíscopi Lindisfarnénsis, doctrína et pietáte insígnis.
      - type: text
        text: Romæ sanctæ Benedíctæ Vírginis.
      - type: text
        text: Salérni Translátio sancti Matthǽi, Apóstoli et Evangelístæ; cuius sacrum corpus, olim ex Æthiópia ad divérsas regiónes et demum ad eam urbem delátum, ibídem, in dedicáta eius nómine Ecclésia, summo honóre cónditum fuit.
  psalm.pr-die-nonas-nov-mbris-f429d05ce2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 4th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Milan, (in the year 1584,) holy Charles Borromeo, Cardinal Archbishop of that city, eminent for holiness and famous for miracles, whose name Paul V enrolled among those of the Saints.
      - type: text
        text: At Bologna, the holy martyrs Vitalis and Agricola. Vitalis was a slave belonging to Agricola, to whom, in suffering martyrdom, (in the year 304,) he became an equal and a companion. Upon Vitalis the persecutors exercised every kind of torment, until there was no place in his body without some wound. He bore all steadfastly, and gave up his soul in prayer to God. While they were nailing Agricola with many nails to a cross they thereby killed him. Holy Ambrose was present at the translation of their bodies, and saith that he gathered together the nails of this martyr, his victorious blood, and the wood of his cross, and buried them under the holy altar.
      - type: text
        text: On the same day, the holy martyrs Philologus and Patrobas, disciples of the holy Apostle Paul. (According to the Greek tradition Patrobas was Bishop of Pozzuoli and then of Naples, and Philologus of Sinope, in Paphlagonia.) At Autun, the holy martyr Proculus.
      - type: text
        text: In the Vexin, the holy martyr Clarus, a Priest.
      - type: text
        text: At Ephesus, under the Emperor Aurelian, the holy martyr Porphyry.
      - type: text
        text: At Myra, in Lycia, under the President Libanius, the holy martyrs Nicander, Bishop (of that see,) and Hermas, a Priest.
      - type: text
        text: Upon the same day, the holy Pierius, a Priest of Alexandria, profoundly learned in the Scriptures of God, unblemished in life, and for Christian philosophy's sake stripped nearly of all things, and unattached. He taught the people of Alexandria admirably while Theonas ruled that Church in the time of the Princes Carus and Diocletian, and published diverse treatises. After the persecution was over he spent the rest of his life at Rome, and there fell asleep in peace, (at the beginning of the fourth century.)
      - type: text
        text: At Rodez, in Gaul, (in the year 440,) the blessed Amantius, Bishop (of that see,) whose life remains glorious on account of his holiness and miracles.
      - type: text
        text: In Bithynia, (in the year 846,) the holy Abbot Joannicius.
      - type: text
        text: At Albe-Royale, in Hungary, (in the year 1031,) the blessed Confessor Emeric, son of holy Stephen, King of Hungary.
      - type: text
        text: In the monastery of Cerfroi, in the country of Meaux, (in the year 1212,) holy Felix de Valois, Founder of the Order of the Most Holy Trinity for the Redemption of Captives, whose feast is kept by decree of Innocent XI upon the 20th day of this same month of November, but by us upon the 26th day of the same.
      - type: text
        text: At Trier, (in the year 780,) the holy Virgin Modesta.
      la:
      - type: text
        text: Prídie Nonas Novémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Cároli Borromǽi Cardinális, Epíscopi Mediolanénsis et Confessóris, qui migrávit in cælum prídie huius diéi.
      - type: text
        text: Bonóniæ sanctórum Mártyrum Vitális et Agrícolæ; quorum prior posterióris servus ántea fuit, póstea consors et colléga martýrii. In ipsum porro Vitálem persecutóres ómnia tormentórum génera ita exercuérunt, ut non esset in córpore eius sine vúlnere locus, quæ ipse constánter pérferens, in oratióne spíritum Deo réddidit; Agrícolam vero, plúrimis clavis cruci affigéntes, interemérunt. Eórum translatióni sanctus Ambrósius cum interésset, Mártyris clavos, sánguinem triumphálem et crucis lignum se collegísse refert, ac sub sacris altáribus condidísse.
      - type: text
        text: In cœnóbio Cervi Frígidi, territórii Meldénsis, natális sancti Felícis Valésii, Presbýteri et Confessóris; qui Fundátor fuit Ordinis sanctíssimæ Trinitátis redemptiónis captivórum. Ipsíus autem festum, ex dispositióne Innocéntii Papæ Undécimi, celebrátur duodécimo Kaléndas Decémbris.
      - type: text
        text: Eódem die natális quoque sanctórum Philólogi et Pátrobæ, sancti Pauli Apóstoli discipulórum.
      - type: text
        text: Augustodúni sancti Próculi, Epíscopi et Mártyris.
      - type: text
        text: Myræ, in Lýcia, sanctórum Mártyrum Nicándri Epíscopi, et Hermæ Presbýteri, sub Libánio Prǽside.
      - type: text
        text: In pago Vilcassíno, in Gállia, sancti Clari, Presbýteri et Mártyris.
      - type: text
        text: Ephesi sancti Porphýrii Mártyris, sub Aureliáno Imperatóre.
      - type: text
        text: Apud Ruthénos, in Gállia, beáti Amántii Epíscopi, cuius vita éxstitit sanctitáte et miráculis gloriósa.
      - type: text
        text: Romæ natális sancti Piérii, Presbýteri Alexandríni, qui, in divínis Scriptúris nobíliter erudítus, vita puríssimus, et ad Christiánam philosophíam nudus pénitus et expedítus, sub Caro et Diocletiáno Princípibus, regénte Alexandrínam Ecclésiam Theóna, florentíssime dócuit pópulum, et divérsos tractátus édidit; post persecutiónem vero, omne vitæ suæ tempus Romæ versátus, in pace quiévit.
      - type: text
        text: In Bithýnia sancti Ioannícii Abbátis.
      - type: text
        text: Apud Albam Regálem, in Pannónia, deposítio beáti Emeríci Confessóris, qui fuit fílius sancti Stéphani, Hungarórum Regis.
      - type: text
        text: Tréviris sanctæ Modéstæ Vírginis.
  psalm.pr-die-nonas-oct-bris-4be234e9d0:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 6th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Calabria, (in the year 1101,) the holy Confessor Bruno, Founder of the Order of Monks of the Charterhouse.
      - type: text
        text: At Laodicea, the blessed martyr Sagaris, Bishop (of that see,) who was one of the disciples of the Apostle Paul.
      - type: text
        text: At Capua, (in the fourth century,) the holy martyrs Marcellus, Castus, Emilius, and Saturninus.
      - type: text
        text: At Agen, in Gaul, (towards the end of the third century,) the holy Virgin and martyr Faith, by whose example blessed Caprasius was so stirred up to suffer martyrdom, that he finished his contending with joy.
      - type: text
        text: Likewise the holy martyr Erotis, in whom the love of Christ was so kindled that she triumphed over the flames of fire.
      - type: text
        text: At Trier is kept the memorial of a great multitude of martyrs, which man can scarcely number, who for Christ's faith's sake were put to death in diverse ways by the President Rictiovarus in the persecution under the Emperor Diocletian.
      - type: text
        text: At Auxerre, the holy martyr Romanus, Bishop (of that see, who succeeded Eleutherius and was Bishop three years.)
      - type: text
        text: At Oderzo, (about the year 660,) holy Magnus, Bishop (of that see,) whose body lieth at Venice.
      - type: text
        text: At Naples, (in the year 1791,) holy Mary Frances, of the Five Wounds of our Lord Jesus Christ, of the Third Order of Bare-footed Friars Minor of St. Peter of Alcantara, she was famous for graces and miracles, and Pope Pius IX. enrolled her name among those of the holy virgins.
      la:
      - type: text
        text: Prídie Nonas Octóbris
      - type: text
        text: ''
      - type: text
        text: In monastério Turris, diœcésis Squillacénsis, in Calábria, sancti Brunónis Confessóris, qui Ordinis Carthusianórum fuit Institútor.
      - type: text
        text: Laodicéæ, in Phrýgia, beáti Ságaris, Epíscopi et Mártyris; qui éxstitit unus de antíquis Pauli Apóstoli discípulis.
      - type: text
        text: Antisiodóri sancti Románi, Epíscopi et Mártyris.
      - type: text
        text: Cápuæ natális sanctórum Mártyrum Marcélli, Casti, Æmílii et Saturníni.
      - type: text
        text: Tréviris commemorátio innumerabílium fere Mártyrum, qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, ob Christi fidem, vario mortis génere necáti sunt.
      - type: text
        text: Agénni, in Gállia, natális sanctæ Fídei, Vírginis et Mártyris; cuius exémplo beátus Caprásius, ad martýrium animátus, agónem suum tertiodécimo Kaléndas Novémbris felíciter consummávit.
      - type: text
        text: Item sanctæ Erótidis Mártyris, quæ, Christi amóre succénsa, ignis superávit incéndium.
      - type: text
        text: Opitérgii, in Venetórum fínibus, sancti Magni Epíscopi, cuius corpus Venétiis requiéscit.
      - type: text
        text: Neápoli, in Campánia, deposítio sanctæ Maríæ-Francíscæ a Quinque Vulnéribus Dómini nostri Iesu Christi, Vírginis, ex tértio Ordine sancti Francísci, quæ, virtútibus et miráculis clara, a Pio Papa Nono sanctis Virgínibus adscrípta fuit.
  psalm.pr-die-nonas-sept-mbris-ef146b17b8:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 4th day of September is commemorated
      - type: text
        text: ''
      - type: text
        text: The death of the holy Law-giver and Prophet Moses, upon Mount Nebo, in the land of Moab.
      - type: citation
        text: 'Upon the same 4th day of September, were born into the better life:'
      - type: text
        text: At Ancyra, in Galatia, the three holy children Rufinus, Silvanus, and Vitalicus, all martyrs.
      - type: text
        text: At Chalons, in Gaul, under the Emperor Antonine, the holy martyr Marcellus he was bidden by Priscus the President to a sinful banquet, and, in his horror at such a feast, he boldly rebuked all them that were there for their serving of idols wherefore the same President, with strange cruelty, caused him to be buried in the earth up to the girdle, where he remained for three days still giving praise to God, and then yielded up to Him his spirit without stain.
      - type: text
        text: On the same day, the holy martyrs Magnus, Castus, and Maximus.
      - type: text
        text: At Trier, (in the third century,) the holy martyr Marcellus, Bishop (of that see.) On the same day holy Thamel, who had once been a priest of idols, and his Companions, all martyrs under the Emperor Hadrian.
      - type: text
        text: Likewise the holy martyrs Theodore, Oceanus, Ammian, and Julian, who, under the Emperor Maximian, suffered martyrdom by having their feet cut off, and being then cast into a fire.
      - type: text
        text: At Rimini, (in the fourth century,) the holy Deacon Marinus.
      - type: text
        text: At Palermo, (in the year 1160,) the holy Rosalie, a Virgin of that city, sprung of the Imperial blood of Karl the Great, who for the love of Christ forsook her hereditary principality and her palace, and led an heavenly life alone upon the mountains and in caves of the earth.
      - type: text
        text: At Naples, in Campania, holy Candida, who was the first to meet the holy Apostle Peter when he came to that city. She was baptized by him, and in the end she fell asleep in an holy death. There also, (in the sixth century,) holy Candida, called the Younger, famous for miracles.
      - type: text
        text: At Viterbo, (in the year 1252,) the blessed Virgin Rose, (of the Third Order of Friars Minor.)
      la:
      - type: text
        text: Prídie Nonas Septémbris
      - type: text
        text: ''
      - type: text
        text: In monte Nebo, terræ Moab, sancti Móysis, legislatoris et Prophétæ.
      - type: text
        text: Neápoli, in Campánia, natális sanctæ Cándidæ, quæ sancto Petro Apóstolo, ad eam urbem veniénti, prima occúrrit, atque, ab eo baptizáta, póstea sancto fine quiévit.
      - type: text
        text: Tréviris sancti Marcélli, Epíscopi et Mártyris.
      - type: text
        text: Ancýræ, in Galátia, natális sanctórum trium puerórum Mártyrum, id est Rufíni, Silváni et Vitálici.
      - type: text
        text: Eódem die sanctórum Mártyrum Magni, Casti et Máximi.
      - type: text
        text: Cabillóne, in Gálliis, sancti Marcélli Mártyris, qui, sub Antoníno Imperatóre, cum a Prǽside Prisco ad profanum convívium fuísset invitátus, et, huiúsmodi épulas éxsecrans, omnes qui áderant, cur idólis deservírent, líbera increpatióne corríperet, ab eódem Prǽside, inaudíto crudelitátis génere, cíngulo tenus defóssus est in terra; sicque, cum in Dei láudibus tríduo perseverásset, incontaminátum spíritum réddidit.
      - type: text
        text: Eódem die sanctórum Thamélis, ántea idolórum sacerdótis, et Sociórum Mártyrum, sub Hadriáno Imperatóre.
      - type: text
        text: Item sanctórum Mártyrum Theodóri, Oceáni, Ammiáni et Iuliáni; qui sub Maximiáno Imperatóre, disséctis pédibus in ignem coniécti, martýrium consummárunt.
      - type: text
        text: Romæ sancti Bonifátii Primi, Papæ et Confessóris.
      - type: text
        text: Arímini sancti Maríni Diáconi.
      - type: text
        text: Panórmi natális sanctæ Rosáliæ, Vírginis Panormitánæ, ex régio Cároli Magni sánguine ortæ; quæ, pro Christi amóre, patérnum principátum aulámque profúgit, et, in móntibus ac spelúncis solitária, cæléstem vitam duxit.
      - type: text
        text: Vitérbii Translátio beátæ Rosæ Vírginis, ex tértio Ordine sancti Francísci, témpore Alexándri Papæ Quarti.
  psalm.quarto-idus-apr-lis-d9c1577420:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The prophet Ezechiel, who was put to death [570 B.C.] at Babylon by a judge of the people of Israel because he had rebuked him for worshipping idols. He was buried in the sepulchre of Shem and Arphaxad, the forefathers of Abraham, and many have been used to resort thither to pray.
      - type: text
        text: At Rome, very many holy martyrs, who were baptized by holy Pope Alexander, [in the years 101- 109,] while he was kept in prison. The Prefect Aurelian caused them all to be put on board an old ship and carried to the deep sea, where they were drowned, with stones tied round their necks, [in the year 116.]
      - type: text
        text: At Alexandria, the holy martyrs the Priest Apollonius and five others, who were drowned in the sea in the persecution under the Emperor Maximian.
      - type: text
        text: In Africa, under the Emperor Decius and the Prefect Fortunian, the holy martyrs Terence, Africanus, Pompey, and their Companions, who were beaten with rods, racked, and tormented in diverse other ways, and at length beheaded, and so finished their testimony.
      - type: text
        text: Upon the same day, [in the year 1012,] holy Macarius, Patriarch of Antioch, famous for his graces and miracles.
      - type: text
        text: At Valladolid, in Spain, [in the year 1625,] the holy Confessor Michael de Sanctis, a Barefooted Friar of the Order of the Most Holy Trinity for the Redemption of Captives, eminent for the innocency of his life, the wonderful depth of his penance, and his excelling love of God, his name The Supreme Pontiff Pius IX. enrolled among those of the Saints.
      la:
      - type: text
        text: Quarto Idus Aprílis
      - type: text
        text: ''
      - type: text
        text: Apud Babylónem sancti Ezechiélis Prophétæ, qui, a Iúdice pópuli Israël, quod eum de cultu idolórum argúeret, interféctus, in sepúlcro Sem et Arpháxad, Abrahæ progenitórum, sepúltus est; ad quod sepúlcrum, oratiónis causa, multi conflúere consuevérunt.
      - type: text
        text: Romæ natális plurimórum sanctórum Mártyrum, quos sanctus Alexánder Papa, cum detinerétur in cárcere, baptizávit. Hos autem omnes Aureliánus Præféctus, navi vetústæ impósitos, in altum mare dedúci, et illic, ligátis ad colla lapídibus, mergi præcépit.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Apollónii Presbýteri, et aliórum quinque, qui, in persecutióne Maximiáni, in mare demérsi sunt.
      - type: text
        text: In Africa sanctórum Mártyrum Teréntii, Africáni, Pompéii et Sociórum; qui, sub Décio Imperatóre et Fortuniáno Præfécto, virgis cæsi, equúleis torti aliísque supplíciis cruciáti, demum cápitis obtruncatióne martýrium complevérunt.
      - type: text
        text: Gandávi, in Flándria, sancti Macárii, Epíscopi Antiochéni, virtútibus et miráculis clari.
      - type: text
        text: Vallisoléti, in Hispánia, sancti Michaélis de Sanctis, ex Ordine Discalceatórum sanctíssimæ Trinitátis redemptiónis captivórum, Confessóris, innocéntia vitæ, admirábili pæniténtia et caritáte in Deum exímii; quem Pius Nonus, Póntifex Máximus, inter Sanctos rétulit.
  psalm.quarto-idus-aug-sti-a9f65131f4:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Tiburtine Way, [in the year 258,] the blessed Archdeacon Lawrence. In the persecution under the Emperor Valerian he suffered many torments, diverse stripes, armed scourges, cudgels, and whips loaded with lead, and plates of heated metal, and at the last he was laid upon a bed of iron bars over a slow fire, and so finished his testimony. His body was buried in the cemetery of St. Cyriaca in the Veran field by blessed Hippolytus and Justin the Priest.
      - type: text
        text: Likewise at Rome, [in the third century,] one hundred and sixty-five holy soldiers, who suffered martyrdom under the Emperor Aurelian.
      - type: text
        text: At Bergamo, in the persecution under the Emperors Diocletian and Maximian, the holy Virgin and martyr Asteria.
      - type: text
        text: At Alexandria are commemorated the holy martyrs, who under the President Aemilian, in the persecution under the Emperor Valerian, were long tortured with diverse and terrible torments, and gained the crown of martyrdom by diverse kinds of death.
      - type: text
        text: At Carthage, the holy Virgins Bassa, Paula, and Agathonica, all martyrs.
      - type: text
        text: At Rome, [in the sixth century,] the holy Confessor Deus Dedit, who gave to the poor every Saturday whatever he had gained by working with his hands throughout the week.
      - type: text
        text: In Spain, the apparition of the Blessed Virgin Mary, styled of Ransom, Foundress of the Order for the Redemption of Captives, established in her name.
      la:
      - type: text
        text: Quarto Idus Augústi
      - type: text
        text: ''
      - type: text
        text: Romæ, via Tiburtína, natális beáti Lauréntii Archidiáconi, qui, in persecutióne Valeriáni, post plúrima torménta cárceris, vérberum diversórum, fústium, ac plumbatárum et laminárum ardéntium, ad últimum, in cratícula férrea assátus, martýrium complévit; eiúsque corpus a beáto Hippólyto et Iustíno Presbýtero sepúltum fuit in cœmetério Cyríacæ, in agro Veráno.
      - type: text
        text: In Hispánia Apparítio beátæ Maríæ Vírginis de Mercéde nuncupátæ, quæ Ordinis redemptiónis captivórum sub eius nómine Institútrix fuit. Ipsíus autem festívitas octávo Kaléndas Octóbris recólitur.
      - type: text
        text: Romæ pássio sanctórum centum sexagínta quinque mílitum Mártyrum, sub Aureliáno Imperatóre.
      - type: text
        text: Alexandríæ commemorátio sanctórum Mártyrum, qui, in persecutióne Valeriáni, sub Prǽside Æmiliáno, divérsis exquisitísque torméntis diútius cruciáti, vario mortis génere corónam martýrii sunt adépti.
      - type: text
        text: Bérgomi sanctæ Astériæ, Vírginis et Mártyris, in persecutióne Diocletiáni et Maximiáni Imperatórum.
      - type: text
        text: Carthágine sanctárum Vírginum et Mártyrum Bassæ, Paulæ et Agathonícæ.
      - type: text
        text: Romæ sancti Deúsdedit Confessóris, qui quod in hebdómada mánibus suis operándo lucrabátur, die sábbati paupéribus erogábat.
  psalm.quarto-idus-dec-mbris-853363f782:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Pope Melchiades, (who reigned three years, 7 months, and 62 days, from the year 310 till January 10, 314,) who suffered much in the persecution under the Emperor Maximian, but fell asleep in the Lord after peace had been restored to the church.
      - type: text
        text: Upon the same day the holy martyrs Carpophorus the Priest, and Abundius the Deacon. In the persecution under the Emperor Diocletian they were first most cruelly cudgelled and recommitted to prison, where they were denied food and drink, then they were racked, and suffered long imprisonment, and lastly were beheaded, (in the year 303.)
      - type: text
        text: At Merida, (in Estramadura,) in Spain, (in the same year,) under the Emperor Maximian, the holy Virgin and martyr Eulalia, at the age of twelve years. The President Dacian commanded her to be put to many tortures for confessing Christ at last she was hung upon the rack, and lacerated with hooks and, burning torches being put to her sides, some of the flame and smoke went down her throat and she gave up the ghost.
      - type: text
        text: Likewise at Merida, the holy Virgin and martyr Julia, who was a Companion of the blessed Eulalia, and the only one who clave unto her as she went to suffer.
      - type: text
        text: At Alexandria, under the Emperor Gallerius Maximian, the holy martyrs Mennas, Hermogenes, and Eugraphus.
      - type: text
        text: At Lentini, in Sicily, the holy soldiers, Mercury and his Companions, all martyrs, who were slain with the sword in the time of the Emperor Licinius, under the President Tertyllus.
      - type: text
        text: At Ancyra, in Galatia, the holy martyr Gemellus, who, after most grievous torments under the Emperor Julian the Apostate, achieved martyrdom by the death of the cross.
      - type: text
        text: At Vienne, (about the year 650) the holy Confessor Sindulph, Bishop (of that see).
      - type: text
        text: At Brescia, holy Deusdedit, Bishop (of that see).
      - type: text
        text: At Loreto, in Picenum, is commemorated the translation, (in the year 1294) of the holy house of Mary the Mother of God, wherein the Word was made flesh.
      la:
      - type: text
        text: Quarto Idus Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Melchíadis, Papæ et Mártyris, cuius dies natális recensétur tértio Idus Ianuárii.
      - type: text
        text: Romæ, via Ostiénsi, Dedicátio Basílicæ sancti Pauli Apóstoli; quæ, simul cum Dedicatióne Basílicæ sancti Petri, Apostolórum Príncipis, annua celebritate recólitur quartodécimo Kaléndas Ianuárii.
      - type: text
        text: Eódem die sanctórum Mártyrum Carpóphori Presbýteri, et Abúndii Diáconi; qui, in Diocletiáni persecutióne, primo fústibus crudelíssime cæsi, deínde in cárcerem, negáto cibo et potu, retrúsi, et rursum in equúleo torti, et post hæc diu in cárcere maceráti, novíssime gládio percússi sunt.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Mennæ, Hermógenis et Eugraphi; qui sub Galério Maximiáno passi sunt.
      - type: text
        text: Apud Leontínos, in Sicília, sanctórum Mártyrum Mercúrii et Sociórum mílitum; qui, sub Tertýllo Prǽside, témpore Licínii Imperatóris, gládio cæsi sunt.
      - type: text
        text: Ancýræ, in Galátia, sancti Gemélli Mártyris, qui, post dira torménta, sub Iuliáno Apóstata, crucis supplício martýrium consummávit.
      - type: text
        text: Eméritæ, in Hispánia, pássio sanctæ Euláliæ Vírginis, quæ, sub Maximiáno Imperatóre, cum esset annórum duódecim, ibi, iussu Daciáni Prǽsidis, pro confessióne Christi, plúrima torménta est perpéssa; novíssime, in equúleo suspénsa et exunguláta, fáculis ardéntibus ex utróque látere appósitis, hausto igne, spíritum réddidit.
      - type: text
        text: Item ibídem sanctæ Iúliæ, Vírginis et Mártyris; quæ beátæ Euláliæ sócia fuit, et illi ad passiónem properánti indivídua comes adhǽsit.
      - type: text
        text: Romæ beáti Gregórii Papæ Tértii, qui sanctitáte meritísque præclárus migrávit in cælum.
      - type: text
        text: Viénnæ, in Gállia, sancti Sindúlphi, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Deúsdedit Epíscopi.
      - type: text
        text: Lauréti, in Picéno, Translátio sacræ Domus Genitrícis Dei Maríæ, qua in domo Verbum caro factum est. Ipsam vero beatíssimam Vírginem, Lauretánæ título nuncupátam, Benedíctus Papa Décimus quintus ómnibus aëreonáutis præcípuam apud Deum Patrónam attríbuit.
  psalm.quarto-idus-febru-rii-2209d5552e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Monte Cassino, [in the year 543,] the holy Virgin Scholastica, sister of the holy Abbot Benedict, who saw her soul leave her body and soar heavenward in a bodily shape, like a dove.
      - type: text
        text: At Rome, the holy martyrs Zoticus, Irenaeus, Hyacinth, and Amantius, [all in the year 304.]
      - type: text
        text: At Rome likewise, [under Decius,] upon the Lavican Way, ten holy martyrs, all soldiers.
      - type: text
        text: Also at Rome, [in the year 304,] upon the Appian Way, the holy Virgin and martyr Soteres, who, as holy Ambrose writeth, was born of a noble family, but for Christ's sake despised the consular and prefectural dignities of her race. When she was commanded to offer sacrifice and would not, she was long and heavily buffeted, and when she had overcome other punishments also, she was smitten with the sword and so departed joyfully hence, to be ever with Christ the Bridegroom.
      - type: text
        text: In Campania, the holy Confessor Silvan, Bishop of [Terracine, in the fourth or fifth century.]
      - type: text
        text: At Mala-Vallis, in the country of Siena, [in the year 1157,] the holy hermit William.
      - type: text
        text: At Rouen, [in the year 704,] the holy Virgin Austreberta, famous for miracles.
      la:
      - type: text
        text: Quarto Idus Februárii
      - type: text
        text: ''
      - type: text
        text: Apud montem Cassínum sanctæ Scholásticæ Vírginis, soróris sancti Benedícti Abbátis, qui eius ánimam, instar colúmbæ, migrántem e córpore in cælum ascéndere vidit.
      - type: text
        text: Romæ sanctórum Mártyrum Zótici, Irenǽi, Hyacínthi et Amántii.
      - type: text
        text: Ibídem, via Lavicána, sanctórum decem mílitum Mártyrum.
      - type: text
        text: Item Romæ, via Appia, sanctæ Sotéris, Vírginis et Mártyris; quæ (ut scribit sanctus Ambrósius), nóbili génere nata, paréntum Consulátus et Præfectúras ob Christum contémpsit. Hæc, iussa idólis immoláre, et non acquiéscens, gráviter et diutíssime álapis cæsa est; et, cum cétera quoque pœnárum génera vicísset, demum, percússa gládio, læta migrávit ad Sponsum.
      - type: text
        text: In Campánia sancti Silváni, Epíscopi et Confessóris.
      - type: text
        text: In Stábulo Rhodis, in território Senénsi, sancti Guiliélmi Eremítæ.
      - type: text
        text: In pago Rotomagénsi sanctæ Austrebértæ Vírginis, miráculis célebris.
  psalm.quarto-idus-i-lii-8def369c0f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 12th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At the monastery of Passignano, near Florence, the holy Abbot John Gualberto, [in the year 1073,] founder of the Order of Vallombrosa.
      - type: text
        text: At Milan, the holy martyrs Nabor and Felix, who suffered in the persecution under the Emperor Maximian.
      - type: text
        text: In Cyprus, the blessed Jason, [Bishop of Cyprus, his native land. His name is properly Mnason,] an old disciple of Christ.
      - type: text
        text: At Aquileia, the holy martyr Hermagoras, a disciple of the blessed Evangelist Mark, and the first Bishop of the said city. He was performing miracles of healing, preaching without ceasing, and converting the people, when he was many ways punished and at last beheaded, along with his Deacon Fortunatus, and so won an everlasting crown, [under Nero.]
      - type: text
        text: At Lucca, in Tuscany, the blessed martyr Paulinus, who was ordained by the holy apostle Peter the first Bishop of that city. Under the emperor Nero, after many contendings, he finished his testimony along with others his Companions at the foot of Monte Pisano.
      - type: text
        text: On the same day, the holy martyrs Proclus and Hilarion, who gained the palm of martyrdom through most dire torments under the Emperor Trajan and President Maximus.
      - type: text
        text: At Lentini, in Sicily, the holy Epiphana, who had her breasts cut off, and so gave up the ghost, under the Emperor Diocletian and the President Tertyllus.
      - type: text
        text: At Toledo, the holy Virgin and martyr Marciana, who for Christ's faith's sake was thrown to wild beasts and gored by a bull, and so crowned with martyrdom, [fourth century.]
      - type: text
        text: At Lyon, holy Viventiolus, [24th] Bishop [of that see, in the year 524. He was a monk of Coudak, in the diocese of Saint-Claude, of the Order of St. Benedict.]
      - type: text
        text: At Bologna, holy Paternian, Bishop [of that see, about the year 470.]
      la:
      - type: text
        text: Quarto Idus Iúlii
      - type: text
        text: ''
      - type: text
        text: In monastério Passiniáno, prope Floréntiam, sancti Ioánnis Gualbérti Abbátis, qui fuit Institútor Ordinis Vallis Umbrósæ.
      - type: text
        text: Laudæ, in Insúbria, sanctórum Mártyrum Nabóris et Felícis, qui, in persecutióne Maximiáni, post vária torménta, cápitis decollatióne martýrium complevérunt; eorúmque córpora a beáta Savína Mediolánum advécta sunt, ibíque honorífice sepúlta.
      - type: text
        text: In Cypro beáti Iásonis, qui fuit unus ex antíquis Christi discípulis.
      - type: text
        text: Lucæ, in Túscia, beáti Paulíni, qui a sancto Petro Apóstolo primus eiúsdem civitátis Epíscopus est ordinátus; et, sub Neróne, ad radíces montis Pisáni, post multos agónes, martýrium suum cum áliis Sóciis consummávit.
      - type: text
        text: Aquiléiæ natális sancti Hermágoræ, qui éxstitit discípulus beáti Marci Evangelístæ, et primus eiúsdem civitátis Epíscopus. Hic, inter mirácula sanitátum, et prædicatiónis instántiam, ac populórum conversiónem, plúrima pœnárum génera expértus, tandem, una cum Diácono suo Fortunáto, capitáli supplício perpétuum méruit obtinére triúmphum.
      - type: text
        text: Eódem die pássio sanctórum Procli et Hilariónis, qui, sub Traiáno Imperatóre et Máximo Prǽside, per acerbíssima torménta ad palmam martýrii pervenérunt.
      - type: text
        text: Toléti, in Hispánia, sanctæ Marciánæ, Vírginis et Mártyris; quæ pro fide Christi, obiécta béstiis atque a tauro discérpta, martýrio coronátur.
      - type: text
        text: Apud Leontínos, in Sicília, sanctæ Epíphanæ, quæ sub Diocletiáno Imperatóre et Tertýllo Prǽside, ubéribus præcísis, réddidit spíritum.
      - type: text
        text: Lugdúni, in Gállia, sancti Viventióli Epíscopi.
      - type: text
        text: Bonóniæ sancti Paterniáni Epíscopi.
  psalm.quarto-idus-i-nii-184d8b9f5a:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Scotland, the holy Queen Margaret, famous for her love for the poor and her voluntary poverty.
      - type: text
        text: At Rome, upon the Salarian Way, the blessed Getulius, a man of great eminence and learning, and his Companions Cerealis, Amantius, and Primitivus. At the command of the Emperor Hadrian they were tortured by Licinius the Consular first hided, then thrust into prison, lastly committed to the flames, but as the fire would nowise hurt them, their heads were beaten in with clubs, and so they finished their testimony. Sympharosa, the wife of blessed Getulius, gathered their bodies together and honourably buried them in a sand-pit upon her own farm.
      - type: text
        text: Also at Rome, upon the Aurelian Way, holy Basilides, Tripodes, Mandales, and twenty other martyrs, who suffered under the Emperor Aurelian and Plato, the Prefect of the city.
      - type: text
        text: At Nicomedia, the holy martyr Zacharia.
      - type: text
        text: In the dominions of Prusias, in Bithynia, [in the fourth century,] holy Timothy, Bishop [there,] martyr under Julian the Apostate.
      - type: text
        text: In Spain, the holy martyrs Crispulus and Restitutus.
      - type: text
        text: In Africa, the holy martyrs Aresius, Rogatus, and fifteen others.
      - type: text
        text: At Cologne, the holy martyr the Abbot Maurinus.
      - type: text
        text: At Petra, in Arabia, the holy Asterius, Bishop [of that see,] who, for the Catholic faith's sake, suffered many things of the Arians, and by the Emperor Constantius was banished into Africa and died a glorious Confessor.
      - type: text
        text: At Naples, in Campania, the holy martyr Maximus, Bishop [of that see,] who was banished by the same Emperor Constantius for his unshaken confession of the Nicene faith, and there died worn out by suffering.
      - type: text
        text: At Auxerre, [early in the sixth century,] holy Censurius, Bishop [of that see.]
      la:
      - type: text
        text: Quarto Idus Iúnii
      - type: text
        text: ''
      - type: text
        text: Sanctæ Margarítæ Víduæ, Scotórum Regínæ, quæ sextodécimo Kaléndas Decémbris obdormívit in Dómino.
      - type: text
        text: Romæ, via Salária, pássio beáti Getúlii, claríssimi et doctíssimi viri, ac susceptórum e sancta uxóre Symphorósa beatórum septem fratrum Mártyrum patris, eiúsque Sociórum Cæreális, Amántii et Primitívi. Hi omnes, Hadriáni Imperatóris iussu, a Licínio Consulári tenti, primum cæsi sunt, deínde in cárcerem trusi; postrémum, incéndio tráditi, sed nullo modo ab igne læsi, martýrium suum, fústibus illiso cápite, complevérunt. Ipsórum autem córpora Symphorósa, beáti Getúlii uxor, collégit, et in arenário prǽdii sui honorífice sepelívit.
      - type: text
        text: Item Romæ, via Aurélia, natális sanctórum Basílidis, Trípodis, Mándalis et aliórum vigínti Mártyrum, sub Imperatóre Aureliáno et Urbis Præfécto Platóne.
      - type: text
        text: Neápoli, in Campánia, sancti Máximi, Epíscopi et Mártyris; qui, ob strénuam Nicǽnæ fídei confessiónem, a Constántio Imperatóre in exsílium pulsus, ibídem, ærúmnis conféctus, decéssit.
      - type: text
        text: Prusæ, in Bithýnia, sancti Timóthei, Epíscopi et Mártyris, qui, sub Iuliáno Apóstata, cum Christum eiuráre noluísset, idcírco, ipsíus Imperatóris iussu, cápite abscíssus est.
      - type: text
        text: Colóniæ Agrippínæ sancti Mauríni, Abbátis et Mártyris.
      - type: text
        text: Nicomedíæ sancti Zacharíæ Mártyris.
      - type: text
        text: In Hispánia sanctórum Mártyrum Críspuli et Restitúti.
      - type: text
        text: In Africa sanctórum Mártyrum Arésii, Rogáti et aliórum quíndecim.
      - type: text
        text: Petræ, in Arábia, sancti Astérii Epíscopi, qui, ob fidem cathólicam, ab Ariánis multa passus et ab Imperatóre Constántio in Africam relegátus est, ac tandem, in Ecclésiam suam restitútus, Conféssor gloriósus occúbuit.
      - type: text
        text: Antisiodóri sancti Censúrii Epíscopi.
  psalm.quarto-idus-ianu-rii-fc3a38b319:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Cyprus, the blessed Nicanor, one of the seven first Deacons, who was wondrous for the grace of faith and power, and received a most glorious crown, (in the year 35 or 76.)
      - type: text
        text: At Rome, the holy Pope Agatho, who was eminent for holiness and learning, and fell asleep in peace, (in the year 682.)
      - type: text
        text: At Bourges, in Aquitaine, (in the year 1209,) the holy Confessor William, Archbishop (of that see,) famous for signs and works of power, whose name Honorius III enrolled with those of the saints.
      - type: text
        text: At Milan, the holy Confessor John, surnamed the Good, Archbishop of that city, (in the year 659.)
      - type: text
        text: In the Thebaid, blessed Paul, the first Hermit, who from the sixteenth even unto the hundred and thirteenth year of his age dwelt alone in the desert, (in the year 342,) holy Anthony saw his soul borne heavenward by angels between the choirs of the Apostles and of the Prophets. We keep his feast upon the 15th day of this present month of January.
      - type: text
        text: At Constantinople, the holy Priest Marcian, (about the year 489.)
      - type: text
        text: In the monastery of Cusan, (in the diocese of Perpignan,) the holy Confessor Peter Urseoli, who was sometime Doge of Venice, and then became a monk of the Order of St. Benedict, and was famous for godliness and works of power, (in the year 997.)
      la:
      - type: text
        text: Quarto Idus Ianuárii
      - type: text
        text: ''
      - type: text
        text: In Thebáide natális beáti Pauli, primi Eremítæ, Confessóris, qui, a sextodécimo ætátis suæ anno usque ad centésimum décimum tértium, solus in erémo permánsit; cuius ánimam, inter Apostolórum et Prophetárum choros, ad cælum ferri ab Angelis sanctus Antónius vidit. Eius autem festívitas décimo octávo Kaléndas Februárii celebrátur.
      - type: text
        text: In Cypro beáti Nicánoris, qui fuit unus de septem primis Diáconis; atque, grátia fídei et virtúte admirándus, gloriosíssime coronátus est.
      - type: text
        text: Romæ sancti Agathónis Papæ, qui, sanctitáte et doctrína conspícuus, quiévit in pace.
      - type: text
        text: Bitúricis, in Aquitánia, sancti Willhélmi, Epíscopi et Confessóris, signis et virtútibus clari; quem Honórius Papa Tértius in Sanctórum cánonem adscrípsit.
      - type: text
        text: Medioláni sancti Ioánnis Boni, Epíscopi et Confessóris.
      - type: text
        text: Constantinópoli sancti Marciáni Presbýteri.
      - type: text
        text: In monastério Cuxanénsi, in Gállia, natális sancti Petri Urséoli Confessóris, qui, ántea Venetiárum Dux et deínde Monáchus ex Ordine sancti Benedícti, pietáte et virtútibus cláruit.
      - type: text
        text: Arétii, in Túscia, Beáti Gregórii Décimi, civis Placentíni, qui, ex Archidiácono Leodiénsi Summus Póntifex renuntiátus, Concílium Lugdunénse secúndum celebrávit, Græcísque ad unitátem fídei recéptis, compósitis Christianórum dissídiis, Terræ Sanctæ recuperatióne institúta, de universáli Ecclésia, quam sanctíssime gubernávit, óptime méritus est.
  psalm.quarto-idus-m-rtii-b70b22d47e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 12th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, holy Pope Gregory [I,] an eminent Doctor of the Church, who, on account of his illustrious acts and his doings to bring the English to believe in Christ, is surnamed the Great, and called the Apostle of England, [in the year 604.]
      - type: text
        text: Likewise at Rome, the holy martyr Mamilian, [in the year 295.]
      - type: text
        text: At Nicomedia, the blessed martyr Peter. He was a chamberlain to the Emperor Diocletian, and because he bewailed the fearful slaughter of martyrs, the Emperor commanded him to be brought forth, hung up, and lashed for a long time. After which he was covered with vinegar and salt, and at length roasted upon a grating upon a slow fire, and thus is he worthy to be reckoned a true inheritor of Peter's faith, as well as Peter's name.
      - type: text
        text: There likewise the holy martyrs Egdunus the Priest, and seven others, of whom one was strangled every day in order to terrify the others, [about the year 303.]
      - type: text
        text: At Constantinople, holy Theophanes. He was originally a very rich man, but became a monk. The wicked Emperor Leo, the Armenian, kept him for two years in prison for honouring holy images, and then banished him to Samo-Thrace, where he sank under his sufferings and gave up the ghost, [about the year 818.] He is famous for many miracles.
      - type: text
        text: At Capua, the holy Confessor Bernard, Bishop of Calenum, [in the year 1109.]
      la:
      - type: text
        text: Quarto Idus Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Gregórii Primi, Papæ, Confessóris et Ecclésiæ Doctóris exímii; qui, ob res præcláre gestas atque Anglos ad Christi fidem convérsos, Magnus est dictus et Anglórum Apóstolus appellátus.
      - type: text
        text: Ibídem deposítio sancti Innocéntii Primi, Papæ et Confessóris. Ipsíus autem festum quinto Kaléndas Augústi celebrátur.
      - type: text
        text: Item Romæ sancti Mamiliáni Mártyris.
      - type: text
        text: Nicomedíæ sanctórum Egdúni Presbýteri, et aliórum septem, qui sínguli diébus síngulis suffocáti sunt, ut céteris metus incuterétur.
      - type: text
        text: Ibídem pássio sancti Petri Mártyris, qui, cum esset cubiculárius Diocletiáni Imperatóris, et libérius de imménsis Mártyrum supplíciis quererétur, proptérea, iubénte eódem, in médium addúcitur, ac primo suspénsus, diutíssime flagris torquétur, deínde acéto ac sale perfúsus, ad últimum in cratícula lento igne assátur, sicque vere Petri éxstitit et fídei heres et nóminis.
      - type: text
        text: Constantinópoli sancti Theóphanis, qui, ex ditíssimo pauper Mónachus efféctus, ab ímpio Leóne Arméno, pro cultu sacrárum Imáginum, biénnio deténtus est in cárcere, et inde in Samothráciam deportátus, ibídem, ærúmnis conféctus, réddidit spíritum, multísque miráculis cláruit.
      - type: text
        text: Cápuæ sancti Bernárdi, Epíscopi et Confessóris.
  psalm.quarto-idus-maii-58da1d9582:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 12th day of May, are
      - type: text
        text: ''
      - type: text
        text: Commemorated at Rome, upon the way to Ardea, the holy brethren Nereus and Achilles, both martyrs. They were eunuchs belonging to Flavia Domitilla, and first suffered a long exile with her in the island of Ponza for Christ's Name's sake. Afterwards they were laid under most grievous stripes. Lastly, when Minutius Rufus, the Consular, was striving by racking and fire to force them to offer pagan sacrifices, and they said that they had been baptized by the blessed Apostle Peter and could in no wise make offerings to idols, they were beheaded. By command of Pope Clement VIII their sacred remains, along with those of Flavia Domitilla, were, upon the eve of this day, solemnly transferred from the Deaconry of St. Hadrian to the old church which bears their names, where they had formerly lain buried, and which had now been restored.
      - type: text
        text: Also at Rome, upon the Aurelian Way, the holy martyr Pancras, who at fourteen years of age finished his testimony by being beheaded, in the persecution under Diocletian.
      - type: text
        text: At Rome also, [in the year 304,] the holy Denis, uncle of the said blessed Pancras.
      - type: text
        text: In Sicily, the holy Philip Argyrion, who was sent by the Roman Pontiff to that island, and turned a great part of it to Christ. His holiness is chiefly shown forth in the deliverance of them that are vexed with evil spirits.
      - type: text
        text: At Salamis, in Cyprus, [in the year 403,] the holy Epiphanius, Bishop [of that see,] who excelled in vast learning and knowledge of the Scriptures but was also a wonder for the holiness of his life, his zeal for the Catholic faith, his generosity to the poor, and the power of his mighty deeds.
      - type: text
        text: At Constantinople, [in the eighth century,] the holy Bishop Germanus, famous for his graces and teaching. He withstood the Emperor Leo the Isaurian with great faithfulness, when that Prince published his edict against the holy images.
      - type: text
        text: At Trier, [in the year 640,] the holy Modwald, Bishop [of that see.]
      - type: text
        text: In the city of St. Domingo de la Calzada, [in the beginning of the twelfth century,] the holy Confessor Dominic.
      la:
      - type: text
        text: Quarto Idus Maii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Ardeatína, sanctórum Mártyrum Nérei et Achíllei fratrum, qui primo cum Flávia Domitílla, cuius erant eunúchi, in ínsula Póntia longum pro Christo duxérunt exsílium; póstmodum gravíssimis verbéribus attrectati sunt; deínde, cum a Minútio Rufo, viro Consulári, equúleo et flammis ad immolándum compelleréntur, diceréntque se, a beáto Petro Apóstolo baptizátos, nulla ratióne posse idólis immoláre, cápite cæsi sunt. Horum sacræ relíquiæ, simúlque Fláviæ Domitíllæ, ex Diaconía sancti Hadriáni in antíquum eórum Títulum, ubi asservabántur olim recónditæ, dénuo restaurátum, solémniter translátæ sunt prídie huius diéi, iussu Cleméntis Papæ Octávi; qui exínde hodiérna celebrándum die indíxit étiam festum ipsíus beátæ Domitíllæ Vírginis, cuius pássio Nonis huius mensis recensétur.
      - type: text
        text: Item Romæ, via Aurélia, sancti Pancrátii Mártyris, qui, cum esset annórum quatuórdecim, sub Diocletiáno, cápitis obtruncatióne martýrium complévit.
      - type: text
        text: Salamínæ, in Cypro, sancti Epiphánii Epíscopi, qui, multíplici eruditióne et sacrárum sciéntia litterárum excéllens, vitæ quoque sanctitáte, zelo cathólicæ fídei, munificéntia in páuperes et virtúte miraculórum éxstitit admirándus.
      - type: text
        text: Constantinópoli sancti Germáni Epíscopi, doctrína et virtútibus insígnis, qui Leónem Isáuricum, edictum advérsus sacras Imágines promulgántem, magna fidúcia redárguit.
      - type: text
        text: Tréviris sancti Modoáldi Epíscopi.
      - type: text
        text: Romæ sancti Dionýsii, qui éxstitit pátruus sancti Pancrátii Mártyris.
      - type: text
        text: Argýrii, in Sicília, sancti Philíppi Presbýteri, qui, a Románo Pontífice ad eándem Sicíliam ínsulam missus, magnam illíus partem convértit ad Christum. Ipsíus vero sánctitas in liberándis energúmenis maxime declarátur.
      - type: text
        text: In civitáte Calciaténsi, in Hispánia, sancti Domínici Confessóris.
  psalm.quarto-idus-nov-mbris-0b534f9cc6:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Naples, in Campania, (in the year 1608,) holy Andrew Avellino, Clerk Regular, very eminent for his holiness and his zeal for setting forward the salvation of his neighbours. He was famous for miracles, and Clement XV enrolled his name among those of the saints.
      - type: text
        text: The holy martyrs Tryphon, Respicius, and the Virgin Nympha.
      - type: text
        text: In the country of Agde, the holy martyrs Tiberius, Modestus, and Florence, who, in the time of the Emperor Diocletian, underwent diverse torments, and were crowned with martyrdom.
      - type: text
        text: At Antioch, the holy martyrs Demetrius, Bishop (of that see,) the Deacon Anian, Eustosius, and twenty others.
      - type: text
        text: At Ravenna, (in the year 142,) holy Probus, Bishop (of that see,) famous for miracles.
      - type: text
        text: At Orleans, (in the fifth century,) the holy Confessor Monitor, Bishop (of that see.)
      - type: text
        text: In England, holy Justus, Bishop (of Rochester, afterwards translated to Canterbury,) who was sent into that island by the blessed Pope Gregory, along with Augustine, Mellitus, and others to preach the gospel, and there slept in the Lord, famous for holiness, (in the year 627.)
      - type: text
        text: At Melun is commemorated the holy Confessor Leo.
      - type: text
        text: At Iconium, in Lycaonia, the holy Women Tryphenna and Tryphosa, who advanced much in Christian training by the preaching of blessed Paul and the example of Thecla.
      - type: text
        text: In the island of Paros, the holy Virgin Theoctistis.
      la:
      - type: text
        text: Quarto Idus Novémbris
      - type: text
        text: ''
      - type: text
        text: Neápoli, in Campánia, natális sancti Andréæ Avellíni, Clérici Reguláris et Confessóris, sanctitáte et salútis proximórum procurándæ stúdio præcélebris, quem, miráculis clarum, Clemens Undécimus, Póntifex Máximus, Sanctórum catálogo adscrípsit.
      - type: text
        text: Eódem die natális quoque sanctórum Mártyrum Tryphónis, et Respícii, ac Nymphæ Vírginis.
      - type: text
        text: Romæ item natális sancti Leónis Papæ Primi, Confessóris et Ecclésiæ Doctóris; qui, virtútum excéllens méritis, dictus est Magnus. Eius tempóribus celebráta fuit sancta Sýnodus Chalcedonénsis, in qua ipse per legátos damnávit Eutýchen; cuius étiam Sýnodi decréta póstmodum auctoritáte sua confirmávit. Tandem, cum sanxísset multa luculentérque scripsísset, Pastor bonus, de sancta Dei Ecclésia et univérso grege Domínico óptime méritus, quiévit in pace. Ipsíus tamen festívitas tértio Idus Aprílis celebrátur.
      - type: text
        text: Icónii, in Lycaónia, sanctárum mulíerum Tryphénnæ et Tryphósæ, quæ, beáti Pauli prædicatióne et exémplo Theclæ, in Christiána discíplina plúrimum profecérunt.
      - type: text
        text: Antiochíæ sanctórum Demétrii Epíscopi, Aniáni Diáconi, Eustósii et aliórum vigínti Mártyrum.
      - type: text
        text: In território Agathénsi, in Gállia, sanctórum Mártyrum Tibérii, Modésti et Floréntiæ; qui, témpore Diocletiáni, váriis torméntis cruciáti, martýrium complevérunt.
      - type: text
        text: Ravénnæ sancti Probi Epíscopi, miráculis clari.
      - type: text
        text: Aureliánis, in Gállia, sancti Monitóris, Epíscopi et Confessóris.
      - type: text
        text: In Anglia sancti Iusti Epíscopi, qui, una cum Augustíno, Mellíto et áliis a beáto Gregório Papa in eam ínsulam missus ad prædicándum Evangélium, ibídem, sanctitáte célebris, obdormívit in Dómino.
      - type: text
        text: In óppido Milléduno, in Gállia, sancti Leónis Confessóris.
      - type: text
        text: In Paro ínsula sanctæ Theoctístis Vírginis.
  psalm.quarto-idus-oct-bris-af78cb96d9:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Wilfred, Bishop of York.
      - type: citation
        text: 'Upon the same 12th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Evagrius, Priscian, and their Companions.
      - type: text
        text: At Ravenna, on the Laurentine Way, (in the persecution under the Emperor Diocletian,) the holy martyr Edistius.
      - type: text
        text: In Lycia, under the same Emperor Diocletian, the holy martyr Domnina.
      - type: text
        text: In Africa are commemorated four thousand nine hundred and sixty-six holy martyrs and Confessors in the Vandal persecution under the Arian King Hunneric. Some of these were Bishops of the Churches of God, and some of them Priests and Deacons, but with them were joined multitudes of the other faithful. For defending the Catholic truth they were driven into exile in the terrible desert many of them were cruelly taken by the Moors, goaded to run at the point of the spear, and beaten with stones others had their feet tied together, and were dragged like corpses through hard and sharp places, until all their limbs were mangled and then were tortured to death in diverse ways. Pre-eminent among them were the Bishops Felix and Cyprian.
      - type: text
        text: At Celeia, in Pannonia, (in the fourth century,) holy Maximilian, Bishop (of Lorch.)
      - type: text
        text: At Milan, (in the third century,) the holy Bishop Monas. During the discussion as to the choosing of a Bishop there, a light from heaven shone upon him, and through that wondrous sign he was made Bishop of that church.
      - type: text
        text: At Verona, holy Salvin, Bishop.
      - type: text
        text: In Syria, the holy Priest and Confessor Eustace.
      - type: text
        text: At Ascoli, in the March of Ancona, (in the year 1604,) the holy Confessor Seraphim, of the Order of Friars Minor Capuchins, who was marked by holiness of life and by lowliness, and whose name the Supreme Pontiff Clement XIII enrolled with those of the Saints.
      la:
      - type: text
        text: Quarto Idus Octóbris
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Mártyrum Evágrii, Prisciáni, et Sociórum.
      - type: text
        text: In Africa sanctórum Confessórum et Mártyrum quátuor míllium nongentórum sexagínta sex, in persecutióne Wandálica, sub Hunneríco, Rege Ariáno. Hi, cum essent partim Epíscopi Ecclesiárum Dei, partim Presbýteri et Diáconi, associátis sibi turbis fidélium populórum, pro defensióne cathólicæ veritátis in horríbilis erémi exsílium trusi sunt; ex quibus plúrimi, dum crudéliter a Mauris duceréntur, hastílium cuspídibus impúlsi ad curréndum et lapídibus tunsi, álii, ligátis pédibus, velut cadávera per dura et áspera loca tracti et síngulis membris discérpti, ad extrémum, várie excruciáti, martýrium celebrárunt. Erant inter eos præcípui Sacerdótes Dómini, Felix et Cypriánus Epíscopi.
      - type: text
        text: Ravénnæ, via Laurentína, natális sancti Edístii Mártyris.
      - type: text
        text: In Lýcia sanctæ Domnínæ Mártyris, sub Diocletiáno Imperatóre.
      - type: text
        text: Celénæ, in Pannónia, sancti Maximiliáni, Epíscopi Laureacénsis.
      - type: text
        text: Eboráci, in Anglia, sancti Walfrídi, Epíscopi et Confessóris.
      - type: text
        text: Medioláni sancti Monæ Epíscopi, qui, cum de Epíscopo eligéndo agerétur, cælésti lúmine circumfúsus, eo signo mirabíliter in Pontíficem illíus Ecclésiæ est assúmptus.
      - type: text
        text: Verónæ sancti Salvíni Epíscopi.
      - type: text
        text: In Sýria sancti Eustáchii, Presbýteri et Confessóris.
      - type: text
        text: Asculi, in Picéno, sancti Seraphíni Confessóris, ex Ordine Minórum Capuccinórum, vitæ sanctimónia et humilitáte conspícui; quem Clemens Décimus tértius, Póntifex Máximus, Sanctórum fastis adscrípsit.
  psalm.quarto-idus-sept-mbris-1f2bef800b:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Tolentino, in the March of Ancona, the holy Confessor Nicholas, of the Order of Hermits of St Augustine.
      - type: text
        text: In Africa, the holy Bishops Nemesian, Felix, Lucius, another also named Felix, Litteus, Polyan, Victor, Jader, Dativus, and others, who, when the storm of persecution broke under the Emperors Valerian and Gallienus, at their first steadfastness in confessing Christ were heavily cudgelled, bound, and condemned to penal servitude in the mines, where they finished their glorious contending.
      - type: text
        text: At Chalcedon, the holy martyrs Sosthenes and Victor, who were condemned to be burnt by Priscus the Proconsul of Asia, in the persecution under the Emperor Diocletian, after they had overcome bonds and beasts then they saluted one another with an holy kiss, and gave up their souls in prayer to God.
      - type: text
        text: In Bithynia, the holy sisters Menodora, Metrodora, and Nymphodora, Virgins, who passed into glory crowned with martyrdom, under Maximian the Emperor and Fronto the President.
      - type: text
        text: Likewise the holy martyrs Apellius, Luke, and Clement, (who were among the first disciples of the Lord Christ.)
      - type: text
        text: At Liege, in Belgium, (in the seventh century,) the holy martyr Theodard, the Bishop, who laid down his life for the sheep, and shone with the grace of miracles after his death.
      - type: text
        text: At Rome, (in the fifth century,) the blessed Confessor Pope Hilary.
      - type: text
        text: At Compostella, holy Bishop Peter, famous for many graces and miracles.
      - type: text
        text: In the city of Albi, (in the sixth Bishop (of that see.) At Novara, (in the sixth century,) holy Agapius, Bishop (of that see.) At Constantinople, (in the fifth century,) the holy Virgin Pulcheria, Empress of the Romans, famous for godliness.
      la:
      - type: text
        text: Quarto Idus Septémbris
      - type: text
        text: ''
      - type: text
        text: Tolentíni, in Picéno, deposítio sancti Nicolái Confessóris, ex Ordine Eremitárum sancti Augustíni.
      - type: text
        text: In Africa natális sanctórum Episcopórum Nemesiáni, Felícis, Lúcii, altérius item Felícis, Littéi, Polyáni, Victóris, Iadéris, Datívi et aliórum; qui, sub Valeriáno et Galliéno, exsurgénte persecutiónis rábie, ad primam confessiónis Christi constántiam gráviter fústibus cæsi sunt, deínde, compédibus vincti et ad fodiénda metálla deputáti, gloriósæ confessiónis agónem consummárunt.
      - type: text
        text: Leódii, in Bélgio, sancti Theodárdi, Epíscopi et Mártyris; qui ánimam suam pósuit pro óvibus suis, et miraculórum signis post mortem illúxit.
      - type: text
        text: Chalcedóne sanctórum Mártyrum Sósthenis et Victóris, qui, in persecutióne Diocletiáni, sub Asiæ Procónsule Prisco, post víncula et béstias superátas, iussi sunt incéndi; at illi, salutántes se ínvicem in ósculo sancto, in oratióne pósiti emisérunt spíritum.
      - type: text
        text: Item sanctórum Mártyrum Apéllii, Lucæ et Cleméntis.
      - type: text
        text: In Bithýnia sanctárum Vírginum sorórum Menodóræ, Metrodóræ et Nymphodóræ; quæ sub Maximiáno Imperatóre et Frontóne Prǽside, ob intrépidam in Christi fide constántiam martýrio coronátæ, pervenérunt ad glóriam.
      - type: text
        text: Compostéllæ sancti Petri Epíscopi, qui multis virtútibus et miráculis cláruit.
      - type: text
        text: In civitáte Albigénsi, in Gállia, sancti Sálvii, Epíscopi et Confessóris.
      - type: text
        text: Nováriæ sancti Agápii Epíscopi.
      - type: text
        text: Constantinópoli sanctæ Pulchériæ Augústæ, Vírginis, religióne et pietáte insígnis.
      - type: text
        text: Neápoli, in Campánia, sanctæ Cándidæ iunióris, miráculis claræ.
  psalm.quarto-kal-ndas-apr-lis-24a7896cbf:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 29th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Persia, under King Sapor, [in the year 326,] the holy martyrs Jonah and Barachisius. Jonah was pressed under a screw until his bones were broken, and cut through the middle. Barachisius was choked, by pouring boiling pitch into his mouth.
      - type: text
        text: At Balbec, in the Lebanon, [in the year 362,] the holy martyr Cyril the Deacon. The savage Gentiles, under the Emperor Julian the Apostate, cut open his belly, tore out his liver, and ate it.
      - type: text
        text: At Nicomedia, [in the year 303,] suffered the holy martyrs Pastor, Victorinus, and their Companions.
      - type: text
        text: In Africa, [about the year 461,] the holy Confessors Count Armogastes, Masculus the chief player, and Saturus, steward of the king's house, who suffered many and grievous pains and insults for confessing the truth, at the time of the Vandal persecution under the Arian King Genseric, and so finished a course of glorious contention.
      - type: text
        text: In the city of Asti, [in the second century,] the holy martyr Secundus.
      - type: text
        text: In the monastery of Luxeuil, [diocese of Besançon, in the year 625,] the holy Abbot Eustacius, a disciple of holy Columbanus. He was the father of nearly six hundred monks, and was famous not only for the holiness of his life, but also for miracles.
      la:
      - type: text
        text: Quarto Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Heliópoli, apud Líbanum, sancti Cyrílli, Diáconi et Mártyris, cuius iecur, e discísso ventre avúlsum, Gentíles, sub Iuliáno Apóstata, feráliter depásti sunt.
      - type: text
        text: In Pérside sanctórum Monachórum et Mártyrum Ionæ et Barachísii fratrum, sub Rege Persárum Sápore. Ex ipsis Ionas, pressus in cóchlea, confráctis óssibus, médius disséctus est; Barachísius autem, opplétis fáucibus pice ardénti, suffocátus.
      - type: text
        text: Nicomedíæ pássio sanctórum Mártyrum Pastóris, Victoríni et Sociórum.
      - type: text
        text: In Africa sanctórum Confessórum Armogástis Cómitis, Másculæ archimími, et Sáturi, régiæ domus procuratóris; qui, témpore Wandálicæ persecutiónis, sub Rege Ariáno Genseríco, pro confessióne veritátis, multa et grávia perpéssi supplícia atque oppróbria, cursum gloriósi certáminis implevérunt.
      - type: text
        text: In urbe Asténsi sancti Secúndi Mártyris.
      - type: text
        text: In monastério Luxoviénsi, in Gállia, deposítio sancti Eustásii Abbátis, qui sancti Columbáni discípulus et ferme sexcentórum Monachórum Pater fuit; ac, vitæ sanctitáte conspícuus, étiam miráculis cláruit.
  psalm.quarto-kal-ndas-aug-sti-11e6dfb1d5:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 29th day of July, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Tarascon, in Gaul, the holy Virgin Martha, the hostess of our Saviour, and the sister of blessed Mary Magdalene and of holy Lazarus.
      - type: text
        text: On the same day is commemorated at Rome, upon the Aurelian Way, the holy martyr Pope Felix II, who was expelled from his See by the Arian Emperor Constantius because of his defense of the Catholic faith, and who fell gloriously, secretly murdered with the sword, at Cera, in Tuscany. [Concerning Felix there has been much dispute. The Missal and Breviary, by suppressing the title of Pope or Bishop (always given in such cases), seem to confirm the view now generally adopted by historians, viz., that he was an African martyr, who suffered on November 10, and whose relics were brought to Rome on July 29 but the Martyrology retains another theory, now generally rejected, which identifies this Saint with one Felix, intruded into the See of Rome by Constantius during the Pontificate of Liberius, and now commonly regarded as an Anti-Pope of very dubious orthodoxy.] His body was brought thence by clerks and buried upon the aforesaid Way, whence it was afterwards taken to the church of SS. Cosmas and Damian, where it was found under the altar in the time of the Supreme Pontiff Gregory XIII, along with the relics of the holy martyrs Mark, Marcellian, and Tranquillinus, along with which it was again buried in the same spot upon the last day of July.
      - type: text
        text: Under the same altar were also found the bodies of the holy martyrs Abundius the Priest and Abundantius the Deacon, which not long after were solemnly taken to the church of the Society of Jesus, upon the eve of their birthday into the better life.
      - type: text
        text: At Rome, on the Way to Porto, in the time of the Emperor Diocletian, the holy martyrs Simplicius, Faustinus, and Beatrix. Simplicius and Faustinus were beheaded, after many and diverse torments, and their sister Beatrix was strangled in prison, for confessing Christ.
      - type: text
        text: Likewise at Rome, the holy martyrs the Virgins Lucilla and Flora, Eugene, Antonine, Theodore, and eighteen others their Companions, who suffered martyrdom under the Emperor Gallienus.
      - type: text
        text: At Gangra, in Paphlagonia, the holy martyr Callinicus, who was first beaten with iron rods and tormented in other and diverse ways, and at length cast into a furnace, and so resigned his spirit to God.
      - type: text
        text: In Norway, [in the year 1030,] the holy martyr King Olaf II.
      - type: text
        text: At Troyes, in Gaul, [in the fifth century,] the holy Confessor Lupus, Bishop [of that See,] who went into Britain along with blessed German to rid that country of the Pelagian heresy, and who by his unceasing prayers delivered the city of Troyes from the fury of Attila when he was wasting all Gaul, and at length fell asleep in peace, after having performed the office of the Priesthood with worship for two and fifty years.
      - type: text
        text: At St. Brieuc, [in the year 1237,] the holy Confessor William, Bishop [of that see.]
      - type: text
        text: On the same day deceased also blessed Prosper, Bishop of Orléans, [in the fifth century.]
      - type: text
        text: At Todi, [in the third century,] the holy Confessor Faustinus.
      - type: text
        text: At Mamia, in Galicia, [in the fifth century,] the holy [Virgin] Seraphina.
      la:
      - type: text
        text: Quarto Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Tarásci, in Gállia Narbonénsi, sanctæ Marthæ Vírginis, hóspitæ Salvatóris nostri ac soróris beatórum Maríæ Magdalénæ et Lázari.
      - type: text
        text: Romæ, via Portuénsi, sanctórum Mártyrum Felícis, Simplícii, Faustíni et Beatrícis, tempóribus Diocletiáni Imperatóris. Horum duo primi, post multa et divérsa supplícia, iussi sunt capitálem subíre senténtiam; Beátrix vero, eórum soror, in confessióne Christi est in cárcere præfocáta.
      - type: text
        text: Romæ prætérea sanctórum Mártyrum Lucíllæ et Floræ Vírginum, Eugénii, Antoníni, Theodóri, et Sociórum decem et octo; qui sub Galliéno Imperatóre martýrium obiérunt.
      - type: text
        text: Item Romæ sanctæ Serápiæ Vírginis, quæ, sub Hadriáno Príncipe, cum esset trádita duóbus lascívis iuvénibus et mínime potuísset illúdi, nec póstmodum ardéntibus fácibus inflammári, Derílli Iúdicis iussu fústibus cæsa est, dehinc gládio decolláta. Eius corpus a beáta Sabína in suo monuménto, iuxta áream Vindiciáni, sepúltum est; sed memória ipsíus martýrii tértio Nonas Septémbris celébrior habétur, quo die ambárum sarcóphagum ibi compósitum et ornátum fuit, et locus oratiónis condígne dicátus.
      - type: text
        text: Gangris, in Paphlagónia, sancti Calliníci Mártyris, qui, virgis férreis verberátus aliísque supplíciis afflíctus, tandem, in fornácem iniéctus, spíritum Deo réddidit.
      - type: text
        text: In Norvégia sancti Olávi, Regis et Mártyris.
      - type: text
        text: Trecis, in Gállia, sancti Lupi, Epíscopi et Confessóris; qui, cum beáto Germáno, ad expugnándam Pelagianórum hǽresim, in Británniam perréxit, urbémque Trecas a furóre Attilæ, Gálliam omnem devastántis, assídua oratióne deféndit; demum, quinquagínta duóbus annis sacerdótio venerabíliter functus, in pace quiévit.
      - type: text
        text: In civitáte Briocénsi, in Gállia, sancti Guliélmi, Epíscopi et Confessóris.
      - type: text
        text: Item deposítio beáti Prósperi, Aurelianénsis Epíscopi.
      - type: text
        text: Apud Tudértum, in Umbria, sancti Faustíni Confessóris.
      - type: text
        text: In civitáte Mamiénsi sanctæ Seraphínæ.
      - type: text
        text: Romæ beáti Urbáni Papæ Secúndi, qui, sancti Gregórii Séptimi vestígia secútus, doctrínæ et religiónis stúdio enítuit, et fidéles Cruce signátos ad sacra Palæstínæ loca ex infidélium domínio rediménda excitávit. Cultum autem, ab immemorábili témpore eídem exhíbitum, Leo Décimus tértius, Póntifex Máximus, ratum hábuit et confirmávit.
  psalm.quarto-kal-ndas-dec-mbris-6e58b98fa8:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the Feast of the holy martyr Jehoshaphat, Archbishop of Polotsk, Monk of the Order of St. Basil, who was cruelly murdered by schismatics at Vitebsk in Poland, out of their hatred for Catholic unity and truth, whose name Pope Pius IX. enrolled among those of the holy martyrs, and of whom mention hath been made upon the 12th day of this present month of November.
      - type: citation
        text: 'Upon the same 28th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Rufus, with all his house, whom Diocletian made martyrs unto Christ.
      - type: text
        text: At Corinth, holy Sosthenes, the disciple of the blessed Apostle Paul, of whom the same Apostle doth make mention in writing unto the Corinthians. He was the chief man of the synagogue when he turned to Christ, and eminently hallowed the first-fruits of his faith by being sharply beaten in the presence of Gallio the Proconsul.
      - type: text
        text: In Africa, the holy martyrs the Bishops Papinian and Mansuetus.
      - type: text
        text: On account of their defence of the Catholic faith, during the Vandal persecution under the Arian King Genseric, their whole bodies were seared with white hot iron plates, and so they finished their glorious contending.
      - type: text
        text: At the same time, the other holy Bishops Valerian, Urban, Crescens, Eustace, Cresconius, Crescentian, Felix, Hortulanus, and Florentian were condemned to exile, and there finished their earthly days.
      - type: text
        text: At Constantinople, the holy martyrs Stephen the younger, Basil, Peter, Andrew, and their Companions, even three hundred and thirty-nine monks, who for the honouring of holy images under the Emperor Constantine Copronymus were put to diverse cruel torments, and sealed their confession of the Catholic truth by the outpouring of their blood.
      - type: text
        text: At Rome, the blessed Pope Gregory III., who passed to heaven famous for his holiness and worthy deeds.
      - type: text
        text: At Naples, (in the year 1476,) the holy Confessor James of Picenum, of the Order of Friars Minor, famous for the sharp self-denial of his life, for his Apostolic preaching, and for the embassages which he undertook for Christendom's sake, whose name the Supreme Pontiff Benedict XIII enrolled among those of the saints.
      la:
      - type: text
        text: Quarto Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Apud Corínthum natális sancti Sósthenis, ex beáti Pauli Apóstoli discípulis; cuius mentiónem facit idem Apóstolus Corínthiis scribens. Ipse autem Sósthenes, ex príncipe Synagógæ convérsus ad Christum, fídei suæ primórdia, ante Galliónem Procónsulem ácriter verberátus, præcláro inítio consecrávit.
      - type: text
        text: Romæ sancti Rufi, quem, cum omni família sua, Christi Mártyrem Diocletiánus fecit.
      - type: text
        text: In Africa sanctórum Mártyrum Papiniáni et Mansuéti Episcopórum, qui, témpore Wandálicæ persecutiónis, sub Rege Ariáno Genseríco, pro fídei cathólicæ defensióne, candéntibus ferri láminis toto córpore adústi, gloriósum agónem consummárunt. Quo étiam témpore álii novem sancti Epíscopi, scílicet Valeriánus, Urbánus, Crescens, Eustáchius, Crescónius, Crescentiánus, Felix, Hortulánus et Florentiánus, damnáti exsílio, cursum vitæ suæ implevérunt.
      - type: text
        text: Constantinópoli sanctórum Mártyrum Stéphani iunióris, Basilíi, Petri, Andréæ, et Sociórum trecentórum et trigínta novem Monachórum; qui, sub Constantíno Coprónymo, pro sanctárum Imáginum cultu váriis excruciáti supplíciis, veritátem cathólicam effúso sánguine confirmárunt.
      - type: text
        text: Neápoli, in Campánia, deposítio sancti Iacóbi Picéni, Sacerdótis ex Ordine Minórum et Confessóris, vitæ asperitáte, apostólica prædicatióne ac plúribus pro re Christiána óbitis legatiónibus præclári; quem Benedíctus Décimus tértius, Póntifex Máximus, Sanctórum fastis adiúnxit.
  psalm.quarto-kal-ndas-febru-rii-4c191900d4:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Francis de Sales, Bishop of Geneva, (in the year 1622,) of whom mention is made upon the 28th day of December.
      - type: citation
        text: 'Upon the same 29th day of January, were born into the better life:'
      - type: text
        text: At Rome, upon the Nomentan Way, the holy soldiers Papias and Maurus, martyrs in the time of the Emperor Diocletian, (fourth century.) At their first confession of Christ, Laodicius, the Prefect of the city, ordered their mouths to be bruised with stones and committed them to prison where they were afterwards cudgelled and then lashed to death with scourges loaded with lead.
      - type: text
        text: At Perugia, the holy martyrs Constantius, Bishop of that see, and his companions, who were crowned (about the year 178) for defending the faith in the persecution under the Emperor Marcus Aurelius.
      - type: text
        text: At Edessa, in Syria, the holy martyrs Sarbelius and his sister, Barbea, who were baptized by blessed Barsimceus, Bishop of that city, and were crowned with martyrdom under the President Lysias, in the persecution under the Emperor Trajan, (in the second century.)
      - type: text
        text: In the country of Trois, the holy martyr Sabinian, who was beheaded for Christ's faith's sake, (in the year 275,) by order of the Emperor Aurelian.
      - type: text
        text: At Milan, the holy Priest Aquilinus, who was crowned with martyrdom, (in the eighth century,) by being run through the neck with a sword by the Arians.
      - type: text
        text: At Trier, holy Valerius, Bishop of that see, (in the first century,) a disciple of the holy Apostle Peter.
      - type: text
        text: At Bourges, holy Sulpicius Severus, (in the year 591,) Bishop of that see, famous for his graces and learning.
      la:
      - type: text
        text: Quarto Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Francísci Salésii, Epíscopi Gebennénsis, Confessóris et Ecclésiæ Doctóris, ómnium Scriptórum catholicórum, diáriis aliísve scriptis in vulgus edéndis sapiéntiam Christiánam illustrántium ac provehéntium et tutántium, peculiáris apud Deum Patróni; qui migrávit in cælum quinto Kaléndas Ianuárii, sed hac die, ob Translatiónem córporis eius, potíssimum cólitur.
      - type: text
        text: Tréviris deposítio beáti Valérii Epíscopi, qui fuit discípulus sancti Petri Apóstoli.
      - type: text
        text: Romæ, via Nomentána, natális sanctórum Mártyrum Pápiæ et Mauri mílitum, témpore Diocletiáni Imperatóris; quorum ora iussit Laodícius, Urbis Præféctus, ad primam Christi confessiónem lapídibus contúndi, et sic eos in cárcerem trahi, ac póstea fústibus cædi, atque ad últimum plumbátis pércuti, donec exspirárent.
      - type: text
        text: Perúsiæ sancti Constántii, Epíscopi et Mártyris; qui, una cum Sóciis, sub Marco Aurélio Imperatóre, ob fídei defensiónem, martýrii corónam accépit.
      - type: text
        text: Medioláni sancti Aquilíni Presbýteri, qui, ab Ariánis gládio in gutture transfíxus, martýrio coronátur.
      - type: text
        text: Edéssæ, in Sýria, sanctórum Mártyrum Sarbélii et Bárbeæ soróris, qui, a beáto Barsimǽo Epíscopo baptizáti, ambo, in persecutióne Traiáni, sub Lýsia Prǽside, martýrio coronáti sunt.
      - type: text
        text: In território Tricassíno sancti Sabiniáni Mártyris, qui, iubénte Aureliáno Imperatóre, pro fide Christi decollátus est.
      - type: text
        text: Apud Bitúricas, in Aquitánia, sancti Sulpícii Sevéri Epíscopi, virtútibus et eruditióne conspícui.
  psalm.quarto-kal-ndas-i-lii-07dcc3596e:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Eve of the holy Apostles Peter and Paul.
      - type: citation
        text: 'Upon the same 28th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Pope Leo II.
      - type: text
        text: At Lyon, in Gaul, the holy martyr Irenaeus, Bishop [of that city.] He was, as holy Jerome writeth, a disciple of the blessed Polycarp, Bishop of Smyrna, and hardly removed from the times of the Apostles. He strove much against heretics both by word and by writing, and was crowned with a glorious martyrdom, along with nearly all the [faithful] people of his city, in the persecution under Severus.
      - type: text
        text: In Alexandria, in the same persecution under Severus, the holy martyrs Plutarch, Serenus, Heraclides, (who was still under preparation for baptism,) Heron, (a recent convert,) another Serenus, Rhais, (who also was being prepared for baptism,) Potamiena, and her mother Marcella. Of these the most famous is the Virgin Potamiena. She first endured extraordinary contendings for her virginity, and then suffered terrible and unheard-of torments for her faith, and at the last was burnt, along with her mother.
      - type: text
        text: On the same day, the holy martyr Papius, who, in the persecution under Diocletian, was scourged and put into a vessel filled with boiling oil and fat, and suffered other horrid torments, before he was crowned by being beheaded.
      - type: text
        text: At Utrecht, the holy martyr Bishop Benignus.
      - type: text
        text: At Cordova, the holy martyr, the monk Argymirus, who was slain for Christ's faith's sake, in the persecution by the Arabs, [in the ninth century.]
      - type: text
        text: At Rome, the holy Pope and Confessor Paul I.
      la:
      - type: text
        text: Quarto Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Vigília sanctórum Apostolórum Petri et Pauli.
      - type: text
        text: Lugdúni, in Gállia, sancti Irenǽi, Epíscopi et Mártyris; qui (ut scribit sanctus Hierónymus) beáti Polycárpi, Smyrnénsis Epíscopi, discípulus fuit, et Apostolicórum témporum vicínus. Is, cum advérsus hæréticos verbis ac scriptis plúrimum decertásset, tandem, in persecutióne Sevéri, cum omni fere civitátis suæ pópulo, coronátus est glorióso martýrio. Ipsíus tamen festívitas quinto Nonas Iúlii celebrátur.
      - type: text
        text: Traiécti sancti Benígni, Epíscopi et Mártyris.
      - type: text
        text: Alexandríæ, in persecutióne Sevéri, sanctórum Mártyrum Plutárchi, Seréni, Heraclídis catechúmeni, Herónis neóphyti, et altérius Seréni, Rhaídis catechúmenæ, et Potamiœ́næ cum ipsíus matre Marcélla; inter quos præcípue enítuit Potamiœ́na Virgo, quæ, primo imménsos innumerósque agónes pro virginitáte desudávit, deínde étiam exquisíta et inaudíta torménta pro fide sustínuit, ad últimum, simul cum matre, igne consúmpta est.
      - type: text
        text: Eódem die sancti Pápii Mártyris, qui, in persecutióne Diocletiáni Imperatóris, flagris cæsus, atque in lebétem, oleo et ádipe fervénti plenum, immíssus, áliaque horrénda supplícia perpéssus, demum, datis cervícibus, coronátur.
      - type: text
        text: Córdubæ, in Hispánia, sancti Argymíri, Mónachi et Mártyris, qui in persecutióne Arábica, pro Christi fide, in equúleo pósitus et ense transfóssus est.
      - type: text
        text: Romæ sancti Pauli Primi, Papæ et Confessóris.
      - type: text
        text: Lúere, in diœcési Brixiénsi, sanctæ Vincéntiæ Gerósa, Vírginis, Institúti Sorórum a Caritáte una cum sancta Bartholomǽa Capitánio Fundatrícis, quam Pius Papa Duodécimus albo sanctárum Vírginum accénsuit.
  psalm.quarto-kal-ndas-i-nii-90944073b6:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy martyr Eleutherius, Pope of Rome, who led many noble Romans to believe in Christ, and who sent into Britain holy Dyfan and Ffagan, who baptized Lleurwg, Prince [of Morgan,] along with his wife and nearly all his people. Mention is made of him upon the 26th day of this present month of May.
      - type: citation
        text: 'On the same 29th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Aurelian Way, the holy martyr Restitutus.
      - type: text
        text: At Iconium, a city of Isauria, the holy martyrs Conon and his son aged twelve years. Under the Emperor Aurelian they suffered with great firmness from being basted with oil upon a grating over live coals, stretching upon the rack and fire, and at length gave up the ghost as their hands were being pounded with a wooden mallet.
      - type: text
        text: On the same day, the holy martyrs Sisinius, Martyrius, and Alexander, who are stated by Paulinus, in his life of holy Ambrose, to have gained the crown of martyrdom in the parts of Val-d'Anagna, under the persecution of the heathen in the time of the Emperor Honorius.
      - type: text
        text: At Caesarea Philippi, the holy martyrs Theodosia, mother of the holy martyr Procopius, and twelve other noble matrons, who were beheaded in the persecution under Diocletian.
      - type: text
        text: In Umbria suffered one thousand five hundred and twenty-five holy martyrs.
      - type: text
        text: At Trier, the blessed Confessor Maximin, Bishop [of that city,] who honourably welcomed the holy Bishop Athanasius when he was in exile from the persecution of the Arians.
      - type: text
        text: At Verona, [in the fourth century,] the holy Maximus, Bishop [of that see.]
      - type: text
        text: At Arci, in Latium, the holy Confessor Eleutherius.
      la:
      - type: text
        text: Quarto Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Sanctæ Maríæ-Magdalénæ de Pazzis, ex Ordine Carmelitárum, Vírginis, cuius dies natális octávo Kaléndas Iúnii recensétur.
      - type: text
        text: Romæ, via Aurélia, natális sancti Restitúti Mártyris.
      - type: text
        text: Apud Icónium, in Lycaónia, pássio sanctórum Conónis, et fílii annórum duódecim, qui, sub Aureliáno Imperatóre, cratículæ, prunis suppósitis et óleo superinfúso candéntis, suspensiónis in equúleo atque ignis pœnam constánter passi, ad extrémum, málleo ligneo mánibus eórum contrítis, spíritum emisérunt.
      - type: text
        text: In agro Tridentíno natális sanctórum Mártyrum Sisínii, Martýrii et Alexándri; qui, témpore Honórii Imperatóris, in Anáuniæ pártibus (ut scribit in vita sancti Ambrósii Paulínus), persequéntibus Gentílibus, martýrii corónam adépti sunt.
      - type: text
        text: Cameríni pássio sanctórum mille quingentórum et vigínti quinque Mártyrum.
      - type: text
        text: Cæsaréæ Philíppi sanctárum Mártyrum Theodósiæ, quæ sancti Procópii Mártyris éxstitit mater, et aliárum duódecim nobílium matronárum; quæ, in persecutióne Diocletiáni, cápitis obtruncatióne consummátæ sunt.
      - type: text
        text: Tréviris beáti Maximíni, Epíscopi et Confessóris; a quo sanctus Athanásius Epíscopus, ob persecutiónem Arianórum éxsulans, honorífice suscéptus fuit.
      - type: text
        text: Verónæ sancti Máximi Epíscopi.
      - type: text
        text: Arcáni, in Látio, sancti Eleuthérii Confessóris.
  psalm.quarto-kal-ndas-ianu-rii-8fab8b806c:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 29th day of December were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Canterbury, in England, the holy martyr Thomas, Archbishop of that see, who for his contending for righteousness and for the privileges of the Church, was smitten with the sword in his own cathedral by a band of wicked men, and so passed away to be with Christ (in the year 1170).
      - type: text
        text: At Jerusalem, holy David, the King and Prophet (in the year of the world 2950).
      - type: text
        text: At Arles, holy Trophimus, of whom St. Paul maketh mention in writing unto Timothy. He was ordained bishop by this same Apostle Paul, and was the first who was sent to Arles to preach the Gospel of Christ, and it was a spring, as holy Pope Zosimus writeth, whence streams of faith ran into all Gaul.
      - type: text
        text: At Rome, the holy martyrs Callistus, Felix, and Boniface.
      - type: text
        text: In Africa, the holy martyrs Dominic, Victor, Primian, Lybosus, Saturninus, Crescentius, Secundus, and Honoratus.
      - type: text
        text: At Vienne, in Gaul, holy Crescens, the disciple of the blessed Apostle Paul and the first bishop of the said city.
      - type: text
        text: At Constantinople, holy Marcellus (of Apamea) Abbot (of the Accemeti in the year 485 or 486 in that city).
      - type: text
        text: At Hiesmes, in the time of King Childebert, the holy confessor Evroul, Abbot (of the monastery of Ouche, in the diocese of Lisieux, in Normandy. He was born at Bayeux in 517, founded the Abbey of Ouche and became a monk in 567, and died on December 29, 596).
      la:
      - type: text
        text: Quarto Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Cantuáriæ, in Anglia, natális sancti Thomæ, Epíscopi et Mártyris, qui, ob defensiónem iustítiæ et ecclesiásticæ immunitátis, in Basílica sua, ab impiórum hóminum factióne percússus gládio, Martyr migrávit ad Christum.
      - type: text
        text: Hierosólymis sancti David, Regis et Prophétæ.
      - type: text
        text: Areláte, in Gállia, natális sancti Tróphimi, cuius méminit sanctus Paulus ad Timótheum scribens. Ipse autem Tróphimus, ab eódem Apóstolo Epíscopus ordinátus, præfátæ urbi primus ad Christi Evangélium prædicándum diréctus est; ex cuius prædicatiónis fonte (ut sanctus Zósimus Papa scribit) tota Gállia rívulos fídei recépit.
      - type: text
        text: Romæ sanctórum Mártyrum Callísti, Felícis et Bonifátii.
      - type: text
        text: In Africa pássio sanctórum Mártyrum Domínici, Victóris, Primiáni, Lybósi, Saturníni, Crescéntii, Secúndi et Honoráti.
      - type: text
        text: Constantinópoli sancti Marcélli Abbátis.
      - type: text
        text: In pago Oxyménsi, in Gállia, sancti Ebrúlphi, Abbátis et Confessóris, témpore Childebérti Regis.
      - type: text
        text: Viénnæ, in Gállia, Commemorátio sancti Crescéntis, Epíscopi et Mártyris, qui fuit discípulus beáti Pauli Apóstoli ac primus eiúsdem civitátis Epíscopus, et cuius dies natális quinto Kaléndas Iúlii celebrátur.
  psalm.quarto-kal-ndas-m-rtii-1cf3c26664:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep in England the feast of holy Ethelbert, King of Kent, whom holy Augustin, first Archbishop of Canterbury, converted to the faith of Christ, and of whom mention hath been made upon the 24th day of this present month of February.
      - type: citation
        text: 'Upon the same 26th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Perga, in Pamphylia, [in the year 251,] blessed Nestor, Bishop [of Magydensis.] During the persecution under Decius he was instant in prayer by day and by night that Christ's flock might be kept safe. When he was arrested he confessed the name of the Lord with wonderful freedom and readiness. By command of the President Pollio he was most cruelly racked, and as he steadfastly declared that he would alway cleave unto Christ, he was at last crucified, and from the cross passed to heaven a conqueror.
      - type: text
        text: At Perga likewise, [in 251,] the holy martyrs Papias, Diodorus, Conon, and Claudian, who suffered before holy Nestor.
      - type: text
        text: Also the holy martyrs Fortunatus Felix, and twenty-seven others.
      - type: text
        text: At Alexandria, [in the year 326,] the glorious Elder, holy Alexander, Pope of that see, wherein he succeeded blessed Peter. He it was who cast his priest Arius out of the church when he became perverted with wicked heresy, and reprobate from the truth of God, and he was afterward one of the three hundred and eighteen fathers who condemned him in the Council of Nicea.
      - type: text
        text: At Bologna, [in the fourth century,] the holy Bishop [of that see,] Faustinian, who by the preaching of the word of God strengthened and increased that Church when it had been troubled in the persecution under the Emperor Diocletian.
      - type: text
        text: At Gaza, in Palestine, [in the year 420,] holy Porphyry, Bishop of that see, who in the time of the Emperor Arcadius cast down the idol Mama and its temple, and after many sufferings fell asleep in the Lord.
      - type: text
        text: At Florence, [in the fifth century,] the holy Confessor Andrew, Bishop of that city, [who succeeded St. Zenobius.]
      - type: text
        text: In the country of Troyes, [Vitre, in Champagne, in the sixth century,] the holy Confessor Victor, [Victor of Plancy, Priest and Hermit,] whose praises have been written by holy Bernard.
      la:
      - type: text
        text: Quarto Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Perge, in Pamphýlia, natális beáti Néstoris Epíscopi, qui, in persecutióne Décii, cum diu noctúque oratióni insísteret póstulans ut grex Christi custodirétur, comprehénsus est, ac, nomen Dómini mira libertáte et alacritáte conféssus, Prǽsidis Polliónis iussu equúleo sævíssime est cruciátus; ac demum, cum se Christo semper adhæsúrum constánter profiterétur, crucis suspéndio victor in cælum migrávit.
      - type: text
        text: Ibídem pássio sanctórum Pápiæ, Diodóri, Conónis et Claudiáni, qui sanctum Néstorem martýrio præcessérunt.
      - type: text
        text: Item sanctórum Mártyrum Fortunáti, Felícis et aliórum vigínti septem.
      - type: text
        text: Alexandríæ sancti Alexándri Epíscopi, gloriósi senis, qui, post beátum Petrum, eiúsdem civitátis Epíscopum, zelo fídei succénsus, Aríum, Presbýterum suum, hærética impietáte depravátum et divína veritáte convíctum, de Ecclésia eiécit; ac póstea, inter trecéntos decem et octo Patres, in Nicǽno Concílio eúndem damnávit.
      - type: text
        text: Bonóniæ sancti Faustiniáni Epíscopi, qui eam Ecclésiam, Diocletiáni persecutióne vexátam, verbo prædicatiónis firmávit et auxit.
      - type: text
        text: Gazæ, in Palæstína, sancti Porphýrii Epíscopi, qui, témpore Arcádii Imperatóris, Marnam idólum eiúsque templum evértit, ac, multa passus, quiévit in Dómino.
      - type: text
        text: Floréntiæ sancti Andréæ, Epíscopi et Confessóris.
      - type: text
        text: In território Archiacénsi, in Gállia, sancti Victóris Confessóris, cuius laudes sanctus Bernárdus conscrípsit.
  psalm.quarto-kal-ndas-maii-67450facc6:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 28th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: We keep the feast of the holy Confessor Paul of the Cross, founder of the congregation
      - type: text
        text: called that of the Cross and Passion of our Lord Jesus Christ, and of whom mention is made upon the 18th day of October, upon the which day, [in the year 1775,] he fell asleep in the Lord.
      - type: text
        text: At Ravenna, the holy martyr Vitalis, father of holy Gervase and Protase. He had removed the body of blessed Ursicinus and buried it with due respect for the which cause he was arrested by Paulinus the consular, and when they had racked him, they cast him into a deep pit and buried him alive under earth and stones, and with that testimony he passed away to be with Christ, [in the year 171.]
      - type: text
        text: At Milan, the holy martyr Valeria, wife of holy Vitalis.
      - type: text
        text: At Atino, holy Mark, who was ordained Bishop of that see by the blessed Apostle Peter, and was the first that preached the Gospel to the Equicoli, [inhabitants of the Campania round Rome.] He received the crown of martyrdom under the President Maximus, in the persecution under the Emperor Domitian.
      - type: text
        text: At Alexandria, the holy Virgin Theodora. She would not sacrifice to idols and was sent to a brothel; but one of the brethren, named Didymus, by the favour of God changed clothes with her, and so delivered her thence. Later on, in the persecution under the Emperor Diocletian, they were beheaded together under Eustratius the President, and so were crowned together.
      - type: text
        text: Upon the same day, the holy martyrs Aphrodisius, [first Bishop of Beziers,] Caralippus, Agapius, and Eusebius, [in the year 65.]
      - type: text
        text: In Hungary, under the Emperor Diocletian, the holy martyr Pollio. [He was a Reader in the church of Cibales, in the country of Valentinian. Cibales was between the rivers Save and Drave, and is now in ruins. St Pollio suffered on the same day, though at a distance of some years, as his Bishop Eusebius.]
      - type: text
        text: At Brusa, in Bithynia, the holy martyr Patrick, Bishop of [that see,] Acatius, Menander, and Polyaenus, [third century.]
      - type: text
        text: At Tarazona, in Spain, the holy Confessor Prudentius, Bishop [of that see, before the year 846.]
      - type: text
        text: At Pentina, in the Abruzzi, [in the seventh century,] holy Pamphilus, Bishop of Valva, famous for his charity to the poor and gift of miracles. He is buried at Sulmona.
      la:
      - type: text
        text: Quarto Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Pauli a Cruce, Presbýteri et Confessóris; qui Congregatiónis a Cruce et Passióne Dómini nostri Iesu Christi nuncupátæ Institútor fuit, atque in Dómino obdormívit quintodécimo Kaléndas Novémbris.
      - type: text
        text: Atínæ, in Campánia, sancti Marci, qui, a beáto Petro Apóstolo Epíscopus ordinátus, Æquícolis primus Evangélium prædicávit, et in persecutióne Domitiáni, sub Máximo Prǽside, martýrii corónam accépit.
      - type: text
        text: Prusæ, in Bithýnia, sanctórum Mártyrum Patrícii Epíscopi, Acátii, Menándri et Polyǽni.
      - type: text
        text: Eódem die sanctórum Mártyrum Aphrodísii, Caralíppi, Agápii et Eusébii.
      - type: text
        text: In Pannónia sancti Polliónis Mártyris, sub Diocletiáno Imperatóre.
      - type: text
        text: Medioláni sanctæ Valériæ Mártyris, uxóris sancti Vitális ac matris sanctórum Gervásii et Protásii.
      - type: text
        text: Alexandríæ pássio sanctæ Theodóræ, Vírginis et Mártyris. Hæc, idólis sacrificáre contémnens, in lupánar est trádita, sed repénte quidam ex frátribus, nómine Dídymus, miro Dei favóre, commutátis véstibus, illam erípuit; qui póstea, in persecutióne Diocletiáni, sub Eustrátio Prǽside, simul cum eádem Vírgine percússus, simul coronátus est.
      - type: text
        text: Turiasóne, in Hispánia Tarraconénsi, sancti Prudéntii, Epíscopi et Confessóris.
      - type: text
        text: Corfínii, in Pelígnis, sancti Pámphili, Valvénsis Epíscopi, caritáte in páuperes et virtúte miraculórum illústris; cuius corpus Sulmóne cónditum est.
      - type: text
        text: In pago sancti Lauréntii ad Séparim, diœcésis Lucionénsis, sancti Ludovíci Maríæ Grignion a Montfort, Confessóris, Fundatóris Missionariórum Societátis Maríæ et Filiárum a Sapiéntia, apostólicæ vitæ forma, prædicatióne et devotióne mariáli insígnis, quem Pius Papa Duodécimus Sanctórum catálogo adscrípsit.
  psalm.quarto-kal-ndas-nov-mbris-aeb61d7a7b:
    role: psalm
    content:
      en:
      - type: text
        text: 'Upon the morrow, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Lucania, the holy martyrs Hyacinth, Quintus, Felician, and Lucius.
      - type: text
        text: At Sidon, in Phoenicia, the holy Priest Zenobius, who, during the raging of the last of the persecutions, exhorted others unto martyrdom, and was himself found worthy of the same.
      - type: text
        text: Upon the same day, the holy Bishops Maximilian the martyr, and Valentine the Confessor.
      - type: text
        text: At Bergamo, the holy Virgin and martyr Eusebia.
      - type: text
        text: At Jerusalem, the blessed Narcissus, Bishop (of that see,) praiseworthy for his holiness, his long-suffering, and his faith, who at the age of one hundred and sixteen years passed away to be ever with the Lord.
      - type: text
        text: At Autun, the holy Confessor the Bishop John.
      - type: text
        text: At Cassiope, in the island of Corfu, holy Donatus, of whom writeth blessed Pope Gregory.
      - type: text
        text: At Vienne, (in the sixth century,) deceased the blessed Theodore, Abbot (of the monastery founded by him in honour of the Blessed Virgin, but commonly called after himself.)
      la:
      - type: text
        text: Quarto Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Sanctórum Episcopórum Maximiliáni Mártyris, et Valentíni Confessóris.
      - type: text
        text: Sidóne, in Phœnícia, sancti Zenóbii Presbýteri, qui, sub novíssimæ persecutiónis acerbitáte, ad martýrium álios exhórtans, martýrio et ipse dignátus est.
      - type: text
        text: In Lucánia sanctórum Mártyrum Hyacínthi, Quincti, Feliciáni et Lúcii.
      - type: text
        text: Bérgomi sanctæ Eusébiæ, Vírginis et Mártyris.
      - type: text
        text: Hierosólymis natális beáti Narcíssi Epíscopi, sanctitáte, patiéntia ac fide laudábilis, qui, centum et séxdecim annórum senex, felíciter migrávit ad Dóminum.
      - type: text
        text: Augustodúni sancti Ioánnis, Epíscopi et Confessóris.
      - type: text
        text: Cassíope, in ínsula Corcýra, sancti Donáti Epíscopi, de quo scribit beátus Gregórius Papa.
      - type: text
        text: Viénnæ, in Gállia, deposítio beáti Theodóri Abbátis.
  psalm.quarto-kal-ndas-oct-bris-bb1a20038c:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 28th day of September, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Bohemia, the holy martyr Wenceslaus, Duke of that country, glorious for his holiness and his miracles, who was murdered in the house of his brother, and thus gained the palm of victory.
      - type: text
        text: At Rome, the holy martyr Privatus. He had been full of sores, whereof he had been healed by the blessed Pope Callistus. Under the Emperor Alexander, for Christ's faith's sake, he was flogged to death with scourges loaded with lead.
      - type: text
        text: Likewise at Rome, the holy martyr Stacteus.
      - type: text
        text: In Africa, the holy martyrs Martial, Lawrence, and twenty others.
      - type: text
        text: At Antioch, in Pisidia, (in the persecution under the Emperor Diocletian,) the holy martyrs Mark, who was a shepherd, Alphius, Alexander, and Zosimus who were his brethren, Nicon, Neon, Heliodorus, and thirty soldiers who were brought to believe in Christ by beholding the wonders wrought by the blessed Mark, and were crowned with martyrdom in diverse manners and places.
      - type: text
        text: Upon the same day, under the Emperor Decius, the holy martyr Maximus.
      - type: text
        text: At Toulouse, (at the beginning of the fifth century,) the holy Confessor Exuperius, Bishop (of that see,) concerning whom holy Jerome hath told how sparing he was to himself and how open-handed to others.
      - type: text
        text: At Genoa, (likewise in the fifth century,) the holy Confessor Salomon, Bishop (of that see.)
      - type: text
        text: At Brescia, (also in the fifth century,) holy Silvinus, Bishop (of that see.)
      - type: text
        text: On the same day, the holy Virgin Eustochium, the daughter of blessed Paula, (and disciple of holy Jerome,) who was brought up with other virgins at the Lord's birthplace, and passed away, glorious for eminent good works, to be for ever with this same Lord.
      - type: text
        text: In Germany, (in the eighth century,) the holy Virgin Lioba, eminent for the gift of miracles.
      la:
      - type: text
        text: Quarto Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Apud Bolesláviam véterem, in Bohémia, sancti Wenceslái, Ducis Bohemórum et Mártyris, sanctitáte et miráculis gloriósi, qui, dolo fratris sui necátus, victor pervénit ad palmam.
      - type: text
        text: Romæ sancti Priváti Mártyris, qui, ulcéribus plenus, a beáto Callísto Papa est sanátus; inde, sub Alexándro Imperatóre, ob Christi fidem plumbátis cæsus est usque ad mortem.
      - type: text
        text: Item Romæ sancti Stáctei Mártyris.
      - type: text
        text: In Africa sanctórum Mártyrum Martiális, Lauréntii et aliórum vigínti.
      - type: text
        text: Antiochíæ Pisídiæ sancti Marci Mártyris, pastóris óvium; itémque commemorátio sanctórum Alphii, Alexándri et Zósimi fratrum, Nicónis, Neónis, Heliodóri et trigínta mílitum, qui, cum ad mirácula beáti Marci credidíssent in Christum, divérsis in locis ac diébus variísque modis martýrio coronáti sunt.
      - type: text
        text: Eódem die pássio sancti Máximi, sub Décio Imperatóre.
      - type: text
        text: Tolósæ sancti Exsupérii, Epíscopi et Confessóris; qui beátus vir quantum sibi parcus exstíterit quantúmque áliis largus, sanctus Hierónymus relátu prosecútus est memorábili.
      - type: text
        text: Génuæ sancti Salomónis, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Silvíni Epíscopi.
      - type: text
        text: In Béthlehem Iudæ sanctæ Eustóchii Vírginis, quæ cum beáta Paula, matre sua, ex urbe Roma in Palæstínam profécta est; ibíque, ad Præsépe Dómini cum áliis Virgínibus enutríta, præcláris méritis fulgens migrávit ad Dóminum.
      - type: text
        text: Schorneshémii, prope Mogúntiam, sanctæ Líobæ Vírginis, miráculis claræ.
  psalm.quarto-kal-ndas-sept-mbris-d16460f148:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we commemorate the beheading of the holy Baptist John, whom Herod commanded to be beheaded about the time of the feast of the Passover, [in the 31st year of our Lord] but the memorial of his death is solemnly made on the day when his worshipful head was found for the second time, which head hath since been brought to Rome, and is kept with deep reverence of the people in the Church of St. Sylvester, at the Campus Martius, [hence commonly called the Church of St. Sylvester in Capite, that is to say, St. Sylvester with the Head of the Fore-runner.]
      - type: citation
        text: 'Upon the same 29th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 126,] upon the Aventine Mount, the holy martyr Sabina, who under the Emperor Hadrian was smitten with the sword, and so gained the palm of martyrdom.
      - type: text
        text: Likewise at Rome, the holy Virgin and martyr Candida, whose body Pope Paschal I. brought to the Church of St. Praxedes.
      - type: text
        text: At Antioch, in Syria, the holy martyrs Nicasas and Paul.
      - type: text
        text: At Constantinople, [in the eighth century,] the holy martyrs Hypatius, a Bishop of Asia, and Andrew, a Priest, who were killed, under the Emperor Leo the Isaurian, for the reverence due to the holy images, after their beards had been filled with pitch and set on fire, and their heads flayed.
      - type: text
        text: At Perugia, [about the year 309,] holy Euthymius, a Roman, who fled thither along with his wife and Crescentius his son, to escape the persecution under the Emperor Diocletian, and there fell asleep in the Lord.
      - type: text
        text: At Metz, [in the fifth century,] the holy Confessor Adelphus, [sixth] Bishop [of that see.]
      - type: text
        text: At Paris, [about the year 700,] the holy Priest Mederic.
      - type: text
        text: In England, [in the year 697,] holy Seb, King [of the East Saxons.]
      - type: text
        text: At Smyrna, holy Basilla.
      - type: text
        text: In the country of Troyes, the holy Virgin Sabina, glorious for her graces and miracles.
      la:
      - type: text
        text: Quarto Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Decollátio sancti Ioánnis Baptístæ, quem Heródes circa festum Paschæ decollári præcépit. Ipsíus tamen memória solémniter hac die cólitur, qua venerándum eius caput secúndo invéntum fuit; quod, póstea Romam translátum, in Ecclésia sancti Silvéstri, ad Campum Mártium, summa pópuli devotióne asservátur.
      - type: text
        text: Romæ, in monte Aventíno, natális sanctæ Sabínæ Mártyris, quæ sub Hadriáno Imperatóre, gládio percússa, martýrii palmam adépta est.
      - type: text
        text: Veliniáni, in confínibus Apúliæ, pássio sanctórum Vitális, Satóris et Repósiti; qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, capitálem senténtiam pertulérunt. Eórum tamen ac ceterórum ex duódecim frátribus memória Kaléndis Septémbris recólitur.
      - type: text
        text: Romæ sanctæ Cándidæ, Vírginis et Mártyris; cuius corpus beátus Paschális Primus Papa in Ecclésiam sanctæ Praxédis tránstulit.
      - type: text
        text: Constantinópoli sanctórum Mártyrum Hypátii, Asiáni Epíscopi, et Andréæ Presbýteri; qui ambo, ob cultum sanctárum Imáginum, sub Leóne Isáurico, barba pice íllita atque incénsa, et cute cápitis extrácta, iuguláti sunt.
      - type: text
        text: Antiochíæ natális sanctórum Mártyrum Nicǽæ et Pauli.
      - type: text
        text: Metis, in Gállia, sancti Adélphi, Epíscopi et Confessóris.
      - type: text
        text: Lutétiæ Parisiórum deposítio sancti Mederíci Presbýteri.
      - type: text
        text: Perúsiæ sancti Euthýmii Románi, qui, cum uxóre et Crescéntio fílio persecutiónem Diocletiáni fúgiens, ad eam urbem secéssit, et ibi póstmodum quiévit in Dómino.
      - type: text
        text: In Anglia sancti Sebbi Regis.
      - type: text
        text: Apud Sírmium natális sanctæ Basíllæ Vírginis.
      - type: text
        text: In pago Tricassíno sanctæ Sabínæ Vírginis, virtútibus et miráculis gloriósæ.
  psalm.quarto-nonas-apr-lis-6f0916f572:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 2nd day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Confessor Francis of Paola, founder of the Order of Friars Minim, [in the year 1507.] He was famous for his graces and miracles, and Leo X enrolled his name among those of the Saints.
      - type: text
        text: At Caesarea, in Palestine, the holy martyr Amphian. During the persecution under the Emperor Galerius Maximian he rebuked the President Urban as he was sacrificing unto idols, and for this cause he was savagely mangled, and most cruelly tormented. His feet being wrapped in flax steeped in oil, and set on fire, and at length he was drowned in the sea, and thus did he go through fire and through water, and was brought out into a place of refreshment.
      - type: text
        text: There also suffered the holy martyr Theodosia, a Virgin of Tyre, during the same persecution. When she saw the holy Confessors standing before the judgment seat, she publicly saluted them, and besought them that when they should be come unto the Lord they would remember her. For this cause the soldiers took her, and led her before Urban the President, and by his command her sides and her breasts were deeply mangled, and she was cast into the sea, [in the year 307.]
      - type: text
        text: At Lyon, holy Nicetius, Bishop of that city, famous for his life and miracles, [in the year 573.]
      - type: text
        text: At Como, the holy Confessor Abundius, Bishop of that see, [in the year 468.]
      - type: text
        text: At Langres, holy Urban, [6th] Bishop of that see, [in the year 395.]
      - type: text
        text: In Palestine, holy Mary of Egypt, commonly called the sinner, [fifth century.]
      la:
      - type: text
        text: Quarto Nonas Aprílis
      - type: text
        text: ''
      - type: text
        text: Turónis, in Gállia, sancti Francísci de Paula Confessóris, qui Ordinis Minimórum Institútor éxstitit; atque, virtútibus et miráculis clarus, a Leóne Papa Décimo in Sanctórum númerum est adscríptus.
      - type: text
        text: Cæsaréæ, in Palæstína, natális sancti Apphiáni Mártyris, qui, ante sanctum Ædésium Mártyrem, fratrem suum, in persecutióne Galérii Maximiáni, cum Prǽsidem Urbánum idólis immolántem arguísset, sæve dilaniátus est, et, pédibus lino in oleum intíncto eóque incénso obvolútis, acerbíssime cruciátus, ac demum in mare demérsus; atque ita, tránsiens per ignem et aquam, edúctus est in refrigérium.
      - type: text
        text: Ibídem pássio sanctæ Theodósiæ, Vírginis Týriæ, quæ, in eádem persecutióne, cum sanctos Confessóres ante tribúnal stantes públice salutásset, atque rogásset eos, ut, cum ad Dóminum perveníssent, sui recordaréntur, a milítibus tenta et ad Urbánum Prǽsidem ducta est; eoque iubénte, latéribus et mammis ad interióra usque dilaniátis, in mare tandem proiícitur.
      - type: text
        text: Apud Língonas, in Gállia, sancti Urbáni Epíscopi.
      - type: text
        text: Apud Comum sancti Abúndii, Epíscopi et Confessóris.
      - type: text
        text: Cápuæ sancti Victóris Epíscopi, eruditióne et sanctitáte conspícui.
      - type: text
        text: Lugdúni, in Gállia, sancti Nicétii, eiúsdem urbis Epíscopi, vita et miráculis clari.
      - type: text
        text: In Palæstína deposítio sanctæ Maríæ Ægyptíacæ, quæ Peccátrix appellátur.
  psalm.quarto-nonas-aug-sti-7c5fc775c2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 2nd day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nocera-dei-Pagani, [in Campania, Italy, in the year 1787,] holy Alphonsus Mary de Liguori, Bishop of Santa-Agata-de'-Goti, and Founder of the Congregation of the Most Holy Redeemer. Illustrious for the zeal for the salvation of souls shown both by his writings, his words, and his ensample. Pope Gregory XVI. enrolled his name with those of the Saints, and the Supreme Pontiff Pius IX. gave him the title of Doctor of the Church.
      - type: text
        text: At Rome, in the cemetery of Callistus, [in the year 257,] the holy Pope and martyr Stephen. He was celebrating Mass during the persecution under the Emperor Valerian, when the soldiers broke in. He finished his office before the altar without fear or trembling, and then was beheaded as he sat upon his throne.
      - type: text
        text: At Nice, in Bithynia, [in the fourth century,] the holy Theodota and her three sons, who were all burned [alive] in the fire together by the order of Neretius, Consular of Bithynia, after he had first caused the eldest son, whose name was Evodius, to be beaten with clubs for his faithful confession of Christ.
      - type: text
        text: In Africa, [in the year 211,] the holy martyr Rutilius. He had fled from one place to another in order to escape the persecution, and had sometimes bought himself out of danger, when he was unexpectedly arrested and brought before the President. He was long put to the torture, then given over to the fire, and so crowned with a noble testimony.
      - type: text
        text: At Padua, [in the second century,] the holy Maximus, Bishop of that city, who died a blessed death, famous for miracles.
      la:
      - type: text
        text: Quarto Nonas Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Alfónsi-Maríæ de Ligório, Fundatóris Congregatiónis a sanctíssimo Redemptóre nuncupátæ, Epíscopi sanctæ Agathæ Gothórum, Confessóris et Ecclésiæ Doctóris, qui requiévit in Dómino prídie huius diéi.
      - type: text
        text: Romæ, in cœmetério Callísti, natális sancti Stéphani Primi, Papæ et Mártyris; qui, in persecutióne Valeriáni, dum Missæ Sacrum perágeret, et, superveniéntibus milítibus, ante altáre intrépidus et immóbilis cœpta mystéria perfíceret, in sede sua decollátus est.
      - type: text
        text: Nicǽæ, in Bithýnia, pássio sanctæ Theodótæ, cum tribus fíliis suis. Ex his primogénitum, nómine Evódium, cum Christum fiduciáliter confiterétur, fecit primo Nicétius, Consuláris Bithýniæ, fústibus cædi; deínde matrem, cum ómnibus fíliis, igne consúmi.
      - type: text
        text: In Africa sancti Rutílii Mártyris, qui cum sǽpius, de loco in locum fúgiens, persecutiónem declinásset, et perículum intérdum étiam pecúnia redemísset, ex inopináto aliquándo comprehénsus est, et, Prǽsidi oblátus, torméntis cruciátur plúrimis; demum, ígnibus tráditus, egrégio martýrio coronátur.
      - type: text
        text: Patávii sancti Máximi, eiúsdem civitátis Epíscopi, qui, miráculis clarus, beáto fine quiévit.
  psalm.quarto-nonas-dec-mbris-155d9213d4:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 2nd day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, (about the year 363,) the holy Virgin and martyr Bibiana, who under, the profane Emperor Julian was for Christ's sake flogged to death with scourges loaded with lead.
      - type: text
        text: There likewise, the holy martyrs the Priest Eusebius, the Deacon Marcellus, Hippolytus, Maximus, Adria, Paulina, Neo, Mary, Martana, and Aurelia, who suffered martyrdom under the judge Secundian, in the persecution under the Emperor Valerian, (in the year 256.)
      - type: text
        text: Likewise at Rome, (at the end of the 2nd century,) the holy martyr Pontian and four others.
      - type: text
        text: In Africa, the holy martyrs Severus, Securus, Januarius, and Victorinus, who were there crowned with martyrdom, (about the year of Christ 300.) At Aquileia, (about the year 409,) the holy Confessor Chromatius, Bishop (of that see.)
      - type: text
        text: At Imola, (in the year 450,) holy Peter, Bishop of Ravenna, styled Chrysologus, (or him of the golden words,) famous for his teaching and holiness, whose feast we keep upon the 4th day of this present month.
      - type: text
        text: At Verona, (in the sixth century,) the holy Confessor Lupus, Bishop (of that see.)
      - type: text
        text: At Edessa, (about the year 468,) holy Nonnus, Bishop (first of that see, and afterwards of Heliopolis in Syria,) through whose prayers Pelagia the penitent was converted to Christ.
      - type: text
        text: At Troas, in Phrygia, holy Bishop Silvanus, famous for miracles.
      - type: text
        text: At Brescia, holy Bishop Evasius.
      la:
      - type: text
        text: Quarto Nonas Decémbris
      - type: text
        text: ''
      - type: text
        text: Romæ pássio sanctæ Bibiánæ, Vírginis et Mártyris, quæ, sub Iuliáno Imperatóre sacrílego, ob Christum támdiu plumbátis cæsa est, donec rédderet spíritum.
      - type: text
        text: Apud Forum Cornélii, in Æmília, natális sancti Petri, Epíscopi Ravennátis, Confessóris et Ecclésiæ Doctóris, cognoménto Chrysólogi, doctrína et sanctitáte célebris. Ipsíus tamen festum prídie Nonas huius mensis recólitur.
      - type: text
        text: In Sanciáno, Sinárum ínsula, item natális sancti Francísci Xavérii, Sacerdótis e Societáte Iesu et Confessóris, Indiárum Apóstoli, géntium conversióne, donis et miráculis clari; qui plenus méritis et labóribus obdormívit in Dómino. Ipsum beátum virum Pius Décimus, Póntifex Máximus, cæléstem sodalitáti et óperi Propagándæ Fídei Protectórem elégit atque constítuit; Pius vero Papa Undécimus peculiárem ómnibus Missiónibus Patrónum dedit et confirmávit. Eius autem festívitas, iussu Alexándri Papæ Séptimi, sequénti die celebrátur.
      - type: text
        text: Romæ sanctórum Mártyrum Eusébii Presbýteri, Marcélli Diáconi, Hippólyti, Máximi, Adriæ, Paulínæ, Neónis, Maríæ, Martánæ et Auréliæ; qui omnes in persecutióne Valeriáni, sub Secundiáno Iúdice, martýrium complevérunt.
      - type: text
        text: Item Romæ sancti Pontiáni Mártyris, cum áliis quátuor.
      - type: text
        text: In Africa natális sanctórum Mártyrum Sevéri, Secúri, Ianuárii et Victoríni; qui ibídem martýrio coronáti sunt.
      - type: text
        text: Aquiléiæ sancti Chromátii, Epíscopi et Confessóris.
      - type: text
        text: Verónæ sancti Lupi, Epíscopi et Confessóris.
      - type: text
        text: Edéssæ, in Sýria, sancti Nonni Epíscopi, cuius précibus Pelágia pǽnitens ad Christum convérsa est.
      - type: text
        text: Tróade, in Phrýgia, sancti Silváni Epíscopi, miráculis clari.
      - type: text
        text: Bríxiæ sancti Evásii Epíscopi.
  psalm.quarto-nonas-febru-rii-515d3b2bf1:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the feast of the Purification of the Blessed Virgin Mary, which by the Greeks is called the Hypapante that is, the Presentation of the Lord.
      - type: citation
        text: 'Upon the same 2nd day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Salarian Way, (in the fourth century,) the holy martyr Apronian. He was a notary, who, while he was a Gentile, was leading the holy Licinius out of prison to present him before the Prefect Laodicius, when he heard a voice from heaven saying, "Come, ye blessed of My Father, inherit the kingdom which is prepared for you from the foundation of the world," whereupon he believed, and was baptized, and was afterwards put to death confessing the Lord.
      - type: text
        text: Likewise at Rome, the holy martyrs Fortunatus, Felician, Firmus, and Candidus.
      - type: text
        text: At Caesarea, in Palestine, (in the first century,) the holy centurion Cornelius, who was baptized by the holy Apostle St Peter, and by him also raised to be Bishop in that city.
      - type: text
        text: At Orleans, holy Flosculus, (about the year 500), Bishop of that see.
      - type: text
        text: At Canterbury, in England, holy Laurence, (in the year 619,) Archbishop of that see, which he governed in succession to holy Augustin, and converted king Ethelbert himself to the faith. We keep his feast upon the morrow after.
      - type: text
        text: At Prato, in Tuscany, the holy Florentine Virgin Katherine di Ricci, of the Order of Friars Preachers, eminent for the abundance of her gifts from heaven, whose name the Supreme Pontiff Bendict XIV. enrolled among those of holy virgins.
      la:
      - type: text
        text: Quarto Nonas Februárii
      - type: text
        text: ''
      - type: text
        text: Purificátio beátæ Maríæ Vírginis, quæ a Græcis Hypapánte Dómini appellátur.
      - type: text
        text: Cæsaréæ, in Palæstína, sancti Cornélii Centuriónis, quem beátus Petrus Apóstolus baptizávit, et apud præfátam urbem Episcopáli sublimávit honóre.
      - type: text
        text: 'Romæ, via Salária, pássio sancti Aproniáni Commentariénsis, qui, adhuc Gentílis, cum sanctum Sisínium e cárcere edúceret ut Laodício Præfécto præsentáret, vocémque de cælo factam audíret: « Veníte, benedícti Patris mei, percípite regnum, quod vobis parátum est a constitutióne mundi », credens baptizátur, et póstea, in confessióne Dómini, vitæ finem senténtia capitáli accépit.'
      - type: text
        text: Item Romæ sanctórum Mártyrum Fortunáti, Feliciáni, Firmi et Cándidi.
      - type: text
        text: Aureliánis, in Gállia, sancti Flósculi Epíscopi.
      - type: text
        text: Cantuáriæ, in Anglia, natális sancti Lauréntii Epíscopi, qui, post sanctum Augustínum, eam Ecclésiam gubernávit, et Regem ipsum ad fidem convértit.
      - type: text
        text: Prati, in Etrúria, sanctæ Catharínæ de Rícciis, Vírginis Floréntinæ, ex Ordine Prædicatórum, ob cæléstium donórum cópiam insígnis; quam Benedíctus Décimus quartus, Póntifex Máximus, sanctárum Vírginum fastis adscrípsit.
      - type: text
        text: Burdígalæ sanctæ Ioánnæ de Lestonnác, Víduæ, Institúti Filiárum beátæ Vírginis Maríæ Fundatrícis, caritátis stúdio ac puellárum instituendárum cura insígnis, quam Pius Papa Duodécimus Sanctárum número accénsuit.
  psalm.quarto-nonas-i-lii-d8bd192cce:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 4th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The Prophets Hosea [Osee] and Haggai [Aggeus], [766 and 520 B.C.]
      - type: text
        text: In Africa, the holy martyr Jucundian, who was drowned in the sea for Christ's sake.
      - type: text
        text: In the county of Bourges, in Gaul, the holy martyr Laurian, Bishop of Seville, in Spain, [in the year 544,] whose head has been taken thither.
      - type: text
        text: At Sirmich, [in Hungary,] the holy martyrs Innocentius, Sebastia, and thirty others.
      - type: text
        text: At Madaurus, in Africa, the holy martyrs Namphanion and his Companions, whom he nerved to the fight and carried on to the crown. [Namphanion has among his countrymen been called the Arch- or Proto-Martyr, because he was the first to shed his blood in a public persecution that of Septimius Severus, at the end of the second century. The names of his companions were Miggine, Luciate, and Sanae.]
      - type: text
        text: At Cyrene, in Libya, the holy Confessor Theodorus, Bishop [of that see,] who in the persecution under Diocletian was hided with scourges loaded with lead, under the President Dignian, and had his tongue cut out, but in the end died in peace.
      - type: text
        text: On the same day, holy Flavian, second Patriarch of Antioch, and Elias, Bishop of Jerusalem, who were banished by the Emperor Anastasius because of the Council of Chalcedon, and passed away as conquerors to be ever with the Lord.
      - type: text
        text: At Augsburg, holy Ulderic, Bishop [of that see,] famous for the grace of wonderful self-restraint, beneficence, watchfulness, and miracles, [in the year 973.]
      - type: text
        text: At Lisbon, the holy widow Isabel, Queen of Portugal, [in the year 1336,] whose feast is kept upon the 8th day of this present month of July by order of Pope Innocent XII.
      - type: text
        text: At Tours, are commemorated upon this same day both the translation of the body of the holy Confessor Martin, Bishop of that city, and the dedication of his church there, being also the same day whereon he had been ordained Bishop not many years before.
      la:
      - type: text
        text: Quarto Nonas Iúlii
      - type: text
        text: ''
      - type: text
        text: Stremótii, in Lusitánia, natális sanctæ Elísabeth Víduæ, Lusitanórum Regínæ, quam, virtútibus et miráculis claram, Urbánus Octávus, Póntifex Máximus, in Sanctórum númerum rétulit. Eius tamen celébritas octávo Idus mensis huius recólitur, ex dispositióne Innocéntii Papæ Duodécimi.
      - type: text
        text: Sanctórum Osée et Aggǽi Prophetárum.
      - type: text
        text: In território Bituricénsi sancti Lauriáni, Epíscopi Hispalénsis et Mártyris, cuius caput Híspalim, in Hispánia, delátum est.
      - type: text
        text: In Africa natális sancti Iucundiáni Mártyris, pro Christo in mare demérsi.
      - type: text
        text: Sírmii sanctórum Mártyrum Innocéntii et Sebástiæ, cum áliis trigínta.
      - type: text
        text: Madáuri, in Africa, sancti Namphaniónis Mártyris et Sociórum, quos ille roborávit ad pugnam, et ad corónam provéxit.
      - type: text
        text: Cyréne, in Líbya, sancti Theodóri Epíscopi, qui, in persecutióne Diocletiáni, sub Digniáno Prǽside, plumbátis cæsus et lingua abscíssus est; atque in pace tandem Conféssor occúbuit.
      - type: text
        text: Augústæ, in Rhǽtia, sancti Uldaríci Epíscopi, miræ abstinéntiæ, largitátis et vigilántiæ virtúte, ac miraculórum dono illústris.
      - type: text
        text: Turónis, in Gállia, Translátio sancti Martíni, Epíscopi et Confessóris; et Dedicátio Basílicæ suæ hoc ipso die, quo étiam is ante áliquot annos in Epíscopum fúerat ordinátus.
  psalm.quarto-nonas-i-nii-d860a44924:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 2nd day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Marcellinus the priest, and Peter the Exorcist.
      - type: text
        text: They were teaching the faith to many in prison in the time of Diocletian, when Serenus the judge, after putting them to terrible bonds and many torments, caused them to be beheaded at the place which was then called the Black Wood, but the name of which was afterwards changed in honor of the Saints, and called the White Wood.
      - type: text
        text: Their bodies were buried in the crypt, hard by the body of holy Tibertius, and holy Pope Damasus in after-days decorated their grave with a set of verses.
      - type: text
        text: In Campania, the holy martyr Elmo, Patriarch [of Antioch.] Under the Emperor Diocletian he was first hided with scourges laden with lead, then heavily beaten with cudgels, after which resin, sulphur, lead, pitch, wax, and oil were poured over him, but he still appeared unharmed.
      - type: text
        text: Thereafter at Formi, under Maximian, he was tortured again with diverse and most cruel sufferings but God preserved him to strengthen others, until at length, famous for his testimony, he fell asleep in a holy death at the call of the Lord. His body was afterwards taken to Gaeta.
      - type: text
        text: At Lyon, the holy martyrs Photinus the Bishop, Sanctus the Deacon, Vetius, Epagathus, Maturus, Ponticus, Biblides, Attalus, Alexander, and Blandina, with many others, whose mighty and constant contendings, in the time of Marcus Aurelius Antoninus and Lucius Verus, are written in the Epistle of the Church of Lyon to the Churches of Asia and Phrygia; among these the holy Blandina, weaker by sex, frailer in body, lower in social position, underwent contendings more long and more sharp, and remaining still inflexible, was slain by the sword, and so followed the others whom she had exhorted to victory.
      - type: text
        text: At Rome, [in the year 657,] the holy Confessor Pope Eugenius I.
      - type: text
        text: At Trani, in Apulia, [in the year 1094,] the holy Confessor Nicholas Peregrini, whose wonderful works were published in a Council at Rome under Pope Urban II.
      la:
      - type: text
        text: Quarto Nonas Iúnii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sanctórum Mártyrum Marcellíni Presbýteri, et Petri Exorcístæ, qui, sub Diocletiáno, cum multos in cárcere ad fidem erudírent, ídeo, post dira víncula et plúrima torménta, a Seréno Iúdice decolláti sunt in loco qui dicebátur Silva Nigra; quæ deínde, in honórem Sanctórum, commutáto nómine, Silva Cándida appelláta est. Horum córpora in crypta, iuxta sanctum Tibúrtium, sepúlta sunt; eorúmque sepúlcrum sanctus Dámasus Papa vérsibus póstea exornávit.
      - type: text
        text: In Campánia sancti Erásmi, Epíscopi et Mártyris. Hic, sub Diocletiáno Augústo, primum plumbátis cæsus, deínde fústibus gráviter mactátus, post resína, súlphure, plumbo, pice, cera oleóque perfúsus, illǽsus appáruit; deínde Fórmiis, sub Maximiáno, divérsis atque immaníssimis supplíciis íterum tortus, sed ad confirmándum céteros a Deo servátus; tandem, vocánte Dómino, martýrio clarus, sancto fine quiévit. Ipsíus autem corpus Caiétam póstea translátum est.
      - type: text
        text: Lugdúni, in Gállia, sanctórum Mártyrum Pothíni Epíscopi, Sancti Diáconi, Vétii, Epagáthi, Maturi, Póntici, Bíblidis, Attali, Alexándri et Blandínæ, cum áliis multis; quorum fórtia et iteráta certámina, témpore Marci Aurélii Antoníni et Lúcii Veri, Ecclésiæ Lugdunénsis epístola, ad Ecclésias Asiæ et Phrýgiæ scripta, recénset. In his sancta Blandína, sexu infírmior, córpore imbecíllior, conditióne deiéctior, diuturnióra et acerbióra certámina súbiens, et fortis adhuc pérmanens, gládio iuguláta, céteros secúta est, quos hortabátur ad palmam.
      - type: text
        text: In ínsula Proconnéso, in Propóntide, sancti Nicéphori, Epíscopi Constantinopolitáni, qui, paternárum traditiónum propugnátor acérrimus, pro cultu sanctárum Imáginum se Leóni Arméno, Imperatóri Iconoclástæ, constánter oppósuit; a quo mulctátus exsílio, ibídem, cum per quatuórdecim annos longum duxísset martýrium, migrávit ad Dóminum.
      - type: text
        text: Romæ sancti Eugénii Primi, Papæ et Confessóris.
      - type: text
        text: Trani, in Apúlia, sancti Nicolái Peregríni Confessóris, cuius mirácula in Concílio Románo, cui beátus Urbánus Papa Secúndus prǽfuit, recitáta sunt.
  psalm.quarto-nonas-ianu-rii-c2ab216a5d:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Octave of holy Stephen the Proto-Martyr. At Rome are commemorated upon the same day many holy martyrs who defied the edict of the Emperor Diocletian whereby it was commanded to give up the holy books, they being willing rather to give over their own bodies to the executioners than to give unto dogs that which was holy.
      - type: citation
        text: 'Upon the same 2nd day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, blessed Isidore, Bishop (in the year 420).
      - type: text
        text: At Tomi, in Pontus, under Emperor Licinius, the three holy brethren, Argeus, Narcissus, and Marcellinus.
      - type: text
        text: Argeus and Narcissus were slain with the sword. Marcellinus was a boy, he was taken among the recruits, and for as much as he would not be a soldier he was grievously flogged, and after suffering long in prison was drowned in the sea (in the year 320.)
      - type: text
        text: At Milan (after the year 431), holy Martinian (17th) bishop of that see.
      - type: text
        text: At Nitria, in Egypt, the blessed confessor Isidore (Bishop of Hermopolis in the fourth century).
      - type: text
        text: Upon the same day the holy Bishop Siridion.
      - type: text
        text: In the Thebaid the holy Abbot Macarius of Alexandria (about the year 395.)
      la:
      - type: text
        text: Quarto Nonas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ commemorátio plurimórum sanctórum Mártyrum, qui, spreto Diocletiáni Imperatóris edícto quo tradi sacri Códices iubebántur, pótius córpora carnifícibus quam sancta dare cánibus maluérunt.
      - type: text
        text: Antiochíæ pássio beáti Isidóri Epíscopi.
      - type: text
        text: Tomis, in Ponto, sanctórum fratrum Argéi, Narcíssi et Marcellíni púeri. Hic, sub Licínio Príncipe, cum inter tirónes esset comprehénsus et nollet militáre, hinc, cæsus ad mortem ac diu macerátus in cárcere, demum, in mare demérsus, martýrium consummávit; eius autem fratres gládio perémpti sunt.
      - type: text
        text: Medioláni sancti Martiniáni Epíscopi.
      - type: text
        text: Nítriæ, in Ægýpto, beáti Isidóri, Epíscopi et Confessóris.
      - type: text
        text: Ipso die sancti Siridiónis Epíscopi.
      - type: text
        text: In Thebáide sancti Macárii Alexandríni, Presbýteri et Abbátis.
  psalm.quarto-nonas-m-rtii-b6c70668dd:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 4th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Vilnius, in Lithuania, the blessed Casimir, [Duke of Lithuania,] son of Casimir III, King of Poland, whose name the Roman Pontiff, Leo X, numbered with those of the Saints, [in the year 1458-83.]
      - type: text
        text: At Rome, upon the Appian Way, the holy martyr Pope Lucius. He was first banished in the persecution under the Emperor Valerian, but was afterwards permitted by the will of God to return to his church, and after toiling much against the Novatians, finished his testimony by being beheaded. He is highly praised by holy Cyprian.
      - type: text
        text: Likewise at Rome, upon the Appian Way, nine hundred holy martyrs, [led by Aristion and Licinius, both Bishops,] who are laid in the cemetery called that of St. Cecilia.
      - type: text
        text: Upon the same day, the holy martyr Caius, [an officer of the Imperial Palace,] who was drowned in the sea, and twenty-seven others.
      - type: text
        text: At Nicomedia, the holy martyr Hadrian, and twenty-three others, who, under the Emperor Diocletian, all had their legs broken, and were so left to die. The principal feast in memory of Hadrian is kept upon the 8th day of September, when his body was brought to Rome.
      - type: text
        text: Likewise the holy martyrs Archelaus, Cyril, and Photius.
      - type: text
        text: In the Crimea, the holy Bishops Basil, Eugenius, Agathodormus, Elpidius, Aetherius, Capito, Ephrem, Nestor, and Arcadius.
      la:
      - type: text
        text: Quarto Nonas Mártii
      - type: text
        text: ''
      - type: text
        text: 'Vilnæ, in Lithuánia, beáti Casimíri Confessóris, e Casimíro Rege progéniti: quem Leo Décimus, Románus Póntifex, in Sanctórum númerum rétulit.'
      - type: text
        text: Romæ, via Appia, natális sancti Lúcii Primi, Papæ et Mártyris; qui, primo in persecutióne Valeriáni ob Christi fidem exsílio relegátus, et póstmodum divíno nutu ad Ecclésiam suam redíre permíssus, tandem, cum plúrimum advérsus Novatiános laborásset, cápitis obtruncatióne martýrium complévit. Eum vero sanctus Cypriánus summis láudibus celebrávit.
      - type: text
        text: Nicomedíæ sancti Hadriáni Mártyris, cum áliis vigínti tribus, qui omnes, sub Diocletiáno Imperatóre, martýrium crurifrágio consummárunt. Eórum relíquiæ, a Christiánis Byzántium delátæ, reverénti honóre sepúltæ fuérunt; inde póstea sancti Hadriáni corpus Romam translátum fuit sexto Idus Septémbris, quo die festívitas eius potíssimum celebrátur.
      - type: text
        text: Romæ, via Appia, sanctórum Mártyrum nongentórum, qui pósiti sunt in cœmetério ad sanctam Cæcíliam.
      - type: text
        text: Apud Chersonésum pássio sanctórum Episcopórum Basilíi, Eugénii, Agathodóri, Elpídii, Æthérii, Capitónis, Ephræm, Néstoris et Arcádii.
      - type: text
        text: Eódem die sancti Caii Palatíni, in mare demérsi, et aliórum vigínti septem.
      - type: text
        text: Item pássio sanctórum Archelái, Cyrílli et Phótii.
  psalm.quarto-nonas-maii-b9e29b2fe0:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 4th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Ostia, that is the mouth of the Tiber, [in the year 387,] the holy Monica, the mother of blessed Augustine, as to whose illustrious life he hath left unto us his witness in the ninth book of his Confessions, and of whom we keep feast on the 14th
      - type: text
        text: day of this present month of May.
      - type: text
        text: At the mines of Phaeno, in Palestine, the blessed Silvanus, Bishop of Gaza, who was crowned with martyrdom, [in the year 311,] along with many of his clergy, by order of the Caesar Gallerius Maximian, in the persecution under Diocletian.
      - type: text
        text: Also thirty-nine holy martyrs condemned to the mines at the same place, who, after they had been scorched with red-hot iron and had endured other torments, were beheaded at the same time.
      - type: text
        text: At Jerusalem, Cyriacus, the holy Bishop [of Ancona,] who was on pilgrimage to the holy places when he was slain, under the Emperor Julian the Apostate.
      - type: text
        text: In Umbria, the holy martyr Porphyry, [under the Emperor Decius.]
      - type: text
        text: At Nicomedia, the holy martyr Antonia. She was put grievously to the torture, and afflicted with diverse sufferings. After she had been kept in prison for two years, and when she had been hung up by one arm for three days, at last the President
      - type: text
        text: Priscilian caused her to be burnt for confessing the Lord.
      - type: text
        text: At Lorck, in Austria, the holy martyr Florian. A stone was tied to his neck and he was cast into the river Enns by order of the President Aquilinus, under the Emperor Diocletian.
      - type: text
        text: At Tarsus, the holy Virgin Pelagia, who was shut up inside a bull of heated bronze, under Diocletian, and so finished her testimony.
      - type: text
        text: At Cologne, the holy martyr Paulinus.
      - type: text
        text: At Milan, [in the year 408,] the holy Venerius, Bishop of that place, as to whose excellency holy John Chrysostom hath left unto us his witness in the epistle which he wrote unto him.
      - type: text
        text: In the district of Perigueax, [in the year 720,] the holy Sacerdos, Bishop of Limoges.
      - type: text
        text: At Hildesheim, in Saxony, the holy Confessor Gothard, [Bishop of that see,] and who was numbered among the Saints by Pope Innocent II.
      - type: text
        text: At Auxerre, the holy deacon Curcodomus [in the third century.]
      la:
      - type: text
        text: Quarto Nonas Maii
      - type: text
        text: ''
      - type: text
        text: Apud Ostia Tiberína sanctæ Mónicæ, beáti Augustíni matris, cuius ille præcláram vitam, in libro nono Confessiónum, testátam relíquit.
      - type: text
        text: In metállo Phennénsi Palæstínæ natális beáti Silváni, Gazæ Epíscopi, qui, in Diocletiáni Imperatóris persecutióne, Galérii Maximiáni Cǽsaris mandáto, cum plúrimis suis Cléricis, martýrio coronátus est.
      - type: text
        text: Hierosólymis sancti Cyríaci Epíscopi, qui, cum loca sancta visitáret, ibídem, sub Iuliáno Apóstata, cæsus est.
      - type: text
        text: Cameríni sancti Porphýrii, Presbýteri et Mártyris, qui, sub Décio Imperatóre et Antíocho Prǽside, cum plúrimos (in quibus fuit Venántius) ad Christi fidem convertísset, cápite amputátus est.
      - type: text
        text: In metállo Phennénsi Palæstínæ sanctórum trigínta novem Mártyrum, qui, ad metálla damnáti, demum, post adustiónem candéntis ferri et ália torménta, simul cápite cæsi sunt.
      - type: text
        text: Lauréaci, in Nórico Ripénsi, sancti Floriáni Mártyris, qui, sub Diocletiáno Imperatóre, Aquilíni Prǽsidis iussu, in flumen Anísum, ligáto ad collum saxo, præcipitátus est.
      - type: text
        text: Colóniæ Agrippínæ sancti Paulíni Mártyris.
      - type: text
        text: Tarsi, in Cilícia, sanctæ Pelágiæ, Vírginis et Mártyris, quæ, sub Diocletiáno Imperatóre, in bovem ǽneum candéntem inclúsa, martýrium complévit.
      - type: text
        text: Nicomedíæ natális sanctæ Antóniæ Mártyris, quæ, nímium torta et váriis afflícta cruciátibus, áltero bráchio tribus suspénsa diébus, et in cárcere biénnio deténta, ad últimum a Priscilliáno Prǽside, in confessióne Dómini, flammis exústa est.
      - type: text
        text: Medioláni sancti Venerii Epíscopi, cuius virtútes sanctus Ioánnes Chrysóstomus, in epístola ad eum scripta, testátas relíquit.
      - type: text
        text: In território Petragoricénsi sancti Sacerdótis, Epíscopi Lemovicénsis.
      - type: text
        text: Hildeshémii, in Saxónia, sancti Godehárdi, Epíscopi et Confessóris, qui ab Innocéntio Papa Secúndo in Sanctórum censum relátus est.
      - type: text
        text: Antisiodóri sancti Curcódomi Diáconi.
  psalm.quarto-nonas-nov-mbris-996b1e1b98:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is made the Commemoration of all the faithful departed.
      - type: text
        text: ''
      - type: citation
        text: 'Upon the same 2nd day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Holy Victorinus, Bishop of Poitiers, who, after publishing many writings, as witnesseth holy Jerome, was crowned with martyrdom in the persecution under the Emperor Diocletian.
      - type: text
        text: At Trieste, blessed Justus, who, in the same persecution, was martyred under the President Manatius.
      - type: text
        text: At Sebaste, under the Emperor Licinius, the holy martyrs Carterius, Styriacus, Tobias, Eudoxius, Agapius, and their Companions.
      - type: text
        text: In Persia, the holy martyrs Acindynus, Pegasius, Aphthonius, Elpidephorus, and Anempodistus, with many others their Companions.
      - type: text
        text: In Africa, the holy martyrs Publius, Victor, Hermes, and Papias.
      - type: text
        text: At Tarsus, in Cilicia, under the Emperor Julian the Apostate, the holy Virgin and martyr Eustochium, who, after grievous torments, gave up her soul in prayer to God.
      - type: text
        text: At Laodicea, in Syria, (in the year 334) holy Theodotus, Bishop (of that see,) who excelled not in word only, but in deed and in power.
      - type: text
        text: At Vienne, (in the seventh century,) holy George, Bishop (of that see.)
      - type: text
        text: In the monastery of St. Moritz, in Switzerland, (in the sixth century,) the holy Abbot Ambrose.
      - type: text
        text: At Cyrus, in Syria, the holy Confessor Marcian, (fourth century.)
      la:
      - type: text
        text: Quarto Nonas Novémbris
      - type: text
        text: ''
      - type: text
        text: Commemorátio ómnium Fidelium Defunctorum.
      - type: text
        text: ''
      - type: text
        text: Pœtovióne, in Pannónia superióre, natális sancti Victoríni, eiúsdem civitátis Epíscopi, qui, post multa édita scripta (ut sanctus Hierónymus testátur), in persecutióne Diocletiáni, martýrio coronátus est.
      - type: text
        text: Tergéste pássio beáti Iusti, qui in eádem persecutióne, sub Manátio Prǽside, martýrium consummávit.
      - type: text
        text: Sebáste, in Arménia, sanctórum Cartérii, Styriáci, Tobíæ, Eudóxii, Agápii et Sociórum Mártyrum, sub Licínio Imperatóre.
      - type: text
        text: In Pérside sanctórum Mártyrum Acíndyni, Pegásii, Aphthónii, Elpidíphori et Anempodísti, cum plúrimis Sóciis.
      - type: text
        text: In Africa natális sanctórum Mártyrum Públii, Victóris, Hermétis et Pápiæ.
      - type: text
        text: Tarsi, in Cilícia, sanctæ Eustóchii, Vírginis et Mártyris; quæ, sub Iuliáno Apóstata, post dira torménta, in oratióne réddidit spíritum.
      - type: text
        text: Laodicéæ, in Sýria, sancti Theódoti Epíscopi, qui non solum verbis, sed rebus quoque et virtútibus fuit ornátus.
      - type: text
        text: Viénnæ, in Gállia, sancti Geórgii Epíscopi.
      - type: text
        text: In monastério Agaunénsi, in Gállia, sancti Ambrósii Abbátis.
      - type: text
        text: Cyri, in Sýria, sancti Marciáni Confessóris.
  psalm.quarto-nonas-oct-bris-b19a1a4be5:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 4th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Assisi, in Umbria, the holy Confessor Francis, (1182-1226,) Founder of the Order of Friars Minor, whose life, full of holiness and miracles, hath been written by St. Bonaventure.
      - type: text
        text: At Corinth, holy Crispus and Caius, (first century,) of whom the holy Apostle Paul maketh mention in writing unto the Corinthians.
      - type: text
        text: In Egypt, the holy brethren Mark and Marcian, (in the year 304,) and a multitude of other holy martyrs which is almost countless, both of men and of women, of old and of young some after stripes and some after horrid torments of diverse kinds were burnt, some cast into the sea, a few beheaded, many starved to death, others crucified (some of these with their head downward), and so earned a most blessed crown of martyrdom.
      - type: text
        text: At Damascus, the holy Bishop and martyr Peter, (in the year 742) he was accused of teaching the faith of Christ, before the Prince of the Hagarenes. His tongue, hands, and feet were cut off, and he was fastened to a cross, and there finished his testimony.
      - type: text
        text: At Alexandria, the holy Priests and Deacons Caius, Faustus, Eusebius, Chaeremon, Lucius, and their Companions, of whom some suffered martyrdom in the persecution under the Emperor Valerian, and others by serving the martyrs gained the martyr's reward.
      - type: text
        text: At Athens, holy Hierotheus, a disciple of the blessed Apostle Paul.
      - type: text
        text: At Bologna, (in the fifth century,) the holy Confessor Petronius, Bishop (of that see,) who was famous for his teaching, his miracles, and his holiness.
      - type: text
        text: At Paris, (in the year 666,) the holy Virgin Aurea, (Abbess at Paris.)
      la:
      - type: text
        text: Quarto Nonas Octóbris
      - type: text
        text: ''
      - type: text
        text: Assísii, in Umbria, natális sancti Francísci, Levítæ et Confessóris; qui trium Ordinum, scílicet Fratrum Minórum, Páuperum Dominárum, ac Fratrum et Sorórum de Pæniténtia, Fundátor éxstitit. Ipsíus autem vitam, sanctitáte ac miráculis plenam, sanctus Bonaventúra conscrípsit.
      - type: text
        text: Corínthi item natális sanctórum Crispi et Caii, quorum méminit sanctus Paulus Apóstolus ad Corínthios scribens.
      - type: text
        text: Athénis sancti Hieróthei, qui fuit discípulus ipsíus beáti Pauli Apóstoli.
      - type: text
        text: Damásci sancti Petri, Epíscopi et Mártyris; qui, accusátus apud Agarenórum Príncipem quod fidem Christi docéret, ídeo, lingua et mánibus pedibúsque amputátis, cruci affíxus martýrium consummávit.
      - type: text
        text: Alexandríæ sanctórum Presbyterórum, et Diaconórum Caii, Fausti, Eusébii, Chærémonis, Lúcii et Sociórum; ex quibus álii, in persecutióne Valeriáni, Mártyres facti sunt, álii, Martýribus serviéntes, mercédem Mártyrum recepérunt.
      - type: text
        text: In Ægýpto sanctórum Mártyrum Marci et Marciáni fratrum, et aliórum ferme innumerabílium utriúsque sexus atque omnis ætátis; quorum álii post vérbera, álii post divérsa géneris horríbiles cruciátus flammis tráditi, álii in mare præcipitáti, nonnúlli cápite cæsi, plúrimi inédia consúmpti, álii patíbulis affíxi, quidam étiam, cápite deórsum verso et pédibus in sublíme sublátis, appénsi, beatíssimam martýrii corónam meruérunt.
      - type: text
        text: Bonóniæ sancti Petrónii, Epíscopi et Confessóris; qui doctrína, miráculis et sanctitáte cláruit.
      - type: text
        text: Lutétiæ Parisiórum sanctæ Aureæ Vírginis.
  psalm.quarto-nonas-sept-mbris-9a758518f2:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Stephen, King of Hungary, adorned with many graces from God, who was the first to turn the Hungarians to believe in Christ, and who was received by the Virgin Mother of God into heaven upon the very day of her Assumption, but by the appointment of Pope Innocent XI, his feast is rather kept upon the 2nd day of September, whereon the Christian army, by the help of this holy King, wrested the strong fortress of Buda (from the Turks.)
      - type: citation
        text: 'Upon the same 2nd day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Maxima, who confessed Christ along with holy Ansanus, in the persecution under the Emperor Diocletian, and was beaten to death with cudgels.
      - type: text
        text: At Pamiers, in Gaul, (in the second century,) the holy martyr Antonine, whose relics are kept with great reverence in the church of Palencia in Spain.
      - type: text
        text: Likewise the holy martyrs Diomede, Julian, Philip, Eutychian, Hesychius, Leonides, Philadelphus, Menalippus, and Pantagapa, whereof some finished their testimony by fire, some by water, some by the sword, and some by the cross.
      - type: text
        text: At Nicomedia, (in the persecution under the Emperor Diocletian,) the holy martyrs Zeno and his sons, Concordius and Theodore.
      - type: text
        text: On the same day, (at Syracuse,) the holy brethren Evodius and Hermogenes and their sister Callista, all martyrs.
      - type: text
        text: Upon the same day is commemorated at Lyon, in Gaul, (in the fourth century,) the holy Confessor Justus, Bishop (of that see,) a man of wonderful holiness of life, gifted with the spirit of prophecy he resigned his Bishopric, and withdrew himself into the desert of Egypt, along with Viator his Reader. There he led for some years a life bordering upon the life of Angels, and, when the worthy end of his labours came, departed hence to receive a crown of righteousness from the Lord. It was the 14th day of October, but it was upon the 2nd of September that his sacred body was brought to Lyon, along with the bones of his blessed servant Viator.
      - type: text
        text: Also at Lyon, (in the fifth century,) was born into the better life the holy Confessor Elpidius, Bishop (of that see.)
      - type: text
        text: In the March of Ancona, (in the fifth century,) at the town called by his name, which rejoices to own his sacred body, the holy Abbot Elpidius.
      - type: text
        text: On Mount Soracte, the holy Abbot Nonnosus, who by his prayer moved a stone of great weight, and was famous.
      la:
      - type: text
        text: Quarto Nonas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Stéphani, Regis Hungarórum et Confessóris; qui décimo octávo Kaléndas Septémbris obdormívit in Dómino.
      - type: text
        text: Romæ sanctæ Máximæ Mártyris, quæ, simul cum sancto Ansáno Christum conféssa, in persecutióne Diocletiáni, dum fústibus cǽditur, réddidit spíritum.
      - type: text
        text: Pámiæ, in Gállia, sancti Antoníni Mártyris, cuius relíquiæ apud Ecclésiam Palentínam, in Hispánia, magna veneratióne asservántur.
      - type: text
        text: Item sanctórum Mártyrum Diomédis, Iuliáni, Philíppi, Eutychiáni, Hesýchii, Leónidæ, Philadélphi, Menalíppi et Pantágapæ; quorum álii igne, álii aqua, ense álii et cruce martýrium complevérunt.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Zenónis, atque Concórdii et Theodóri, filiórum eius.
      - type: text
        text: Lugdúni, in Gállia, sancti Elpídii, Epíscopi et Confessóris.
      - type: text
        text: In Picéno item sancti Elpídii Abbátis, cuius nómine óppidum est appellátum, quod eius sacrum corpus se possidére congáudet.
      - type: text
        text: In monte Sorácte sancti Nonnósi Abbátis, qui ingéntis molis saxum oratióne sua tránstulit, aliísque miráculis coruscávit.
      - type: text
        text: Eódem die Commemorátio sanctórum Mártyrum germanórum Evódii, Hermógenis et Callístæ; de quibus, in Syracusána Sicíliæ urbe martýrium passis, ágitur étiam séptimo Kaléndas Maii.
      - type: text
        text: Lugdúni, in Gállia, Translátio sanctórum Iusti, Epíscopi et Confessóris, ac Viatóris, qui eius fúerat miníster; quorum natális dies respectíve prídie Idus Octóbris et duodécimo Kaléndas Novémbris recensétur.
  psalm.quartod-cimo-kal-ndas-apr-lis-b5678f5d18:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Judea, holy Joseph, the husband of the most Blessed Virgin Mary. The Supreme Pontiff Pius IX., in answer to the wish and request of the whole Catholic world, declared him Patron of the universal Church.
      - type: text
        text: At Sorrento, the holy martyrs Quintus, Quintilla, Quartilla, Mark, and nine others.
      - type: text
        text: At Nicomedia, holy Pancharius, the Roman, who was beheaded under the Emperor Diocletian, and so received the crown of martyrdom.
      - type: text
        text: On the same day, the holy Bishops Apollonius and Leontius.
      - type: text
        text: At Gent [in Flanders], the holy Roman Priest Landoald, and Amantius the Deacon, who were sent by holy Pope Martin to preach the gospel, and were famed for many miracles after their deaths, [in the year 666.]
      - type: text
        text: In the city of Pinna, blessed John, a man of great holiness, who came from Syria to Italy, and there built a monastery, wherein he remained, the Father of many servants of God, for forty-and-four years, and fell asleep in peace, famous for many graces, [sixth century.]
      la:
      - type: text
        text: Quartodécimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: In Iudǽa natális sancti Ioseph, Sponsi beatíssimæ Vírginis Maríæ, Confessóris; quem Pius Nonus, Póntifex Máximus, votis et précibus ánnuens totíus cathólici Orbis, universális Ecclésiæ Patrónum declarávit.
      - type: text
        text: Surrénti sanctórum Mártyrum Quincti, Quinctíllæ, Quartíllæ et Marci, cum áliis novem.
      - type: text
        text: Nicomédiæ sancti Panchárii Románi, qui, sub Diocletiáno Imperatóre, in huius grátiam Christum pro diis inánibus eiurávit, sed, matre ac soróre instántibus, ad veram fidem mox rédivit, et ob immótam in ea constántiam, nervis cæsus et cápite truncátus, martýrii corónam accépit.
      - type: text
        text: Eódem die sanctórum Apollónii et Leóntii Episcopórum.
      - type: text
        text: Gandávi, in Flándria, sanctórum Landoáldi, Presbýteri Románi, et Amántii Diáconi; qui, a sancto Martíno Papa ad prædicándum Evangélium missi, ambo apostólicum sibi commíssum opus fidéliter implevérunt, ac multis post óbitum sunt illustráti miráculis.
      - type: text
        text: Apud Pinnénsem civitátem natális beáti Ioánnis, magnæ sanctitátis viri; qui de Sýria ad Itáliam venit, atque ibi, constrúcto monastério, multórum servórum Dei per quátuor et quadragínta annos Pater éxstitit, et, clarus virtútibus, in pace quiévit.
  psalm.quartod-cimo-kal-ndas-aug-sti-db67aaabdf:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Vincent of Paul, who slept in the Lord upon the 27th day of September, and whom Pope Leo XIII. proclaimed the patron before God in heaven of all charitable societies throughout the whole Catholic world which derive their origin in any way from his institution, [in the year 1660.]
      - type: citation
        text: 'Upon the same 19th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Epaphras, whom the holy Apostle Paul doth call his own fellow prisoner. He was ordained by the same Apostle Bishop of Colossi, where, illustrious for graces, he gained the palm of martyrdom in manly contending on behalf of the sheep committed to his care. His body is buried at Rome, in the Church of St Mary the greater.
      - type: text
        text: At Seville, in Spain, the holy Virgins Justa and Rufina. They were arrested under the President Diogenian. They were first racked and tormented by being torn with hooks, and afterwards afflicted with imprisonment, starvation, and diverse tortures. In the end Justa gave up the ghost in prison, and Rufina had her neck broken for confessing the Lord, [at the end of the third century.]
      - type: text
        text: At Cordova, the holy Virgin Aurea, who for a time fell away, but repented of what she had done, and in a renewed combat prevailed against the enemy by the shedding of her blood, [in the year 856.]
      - type: text
        text: At Trier, the holy martyr Martin, Bishop [of that see, in the year 210.]
      - type: text
        text: At Rome, the holy Pope Symmachus, who long suffered through the deeds of the schismatics, and at length passed away, famous for holiness, to be ever with the Lord, [in the year 514.]
      - type: text
        text: At Verona, holy Felix, the Bishop.
      - type: text
        text: At Mount Skete, in Egypt, holy Arsenius, a Deacon of the Church of Rome, who in the time of Theodosius betook himself to the desert, where he gave up his soul to God, finished in all graces and plentifully wet with tears, [in the year 450.]
      - type: text
        text: In Cappadocia, the holy Virgin Macrina, sister to holy Basil the Great and Gregory of Nyssa, [in the year 379.]
      la:
      - type: text
        text: Quartodécimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Vincéntii a Paulo, Presbýteri et Confessóris, Congregatiónis Presbyterórum Missiónis et Puellárum Caritátis Fundatóris, cæléstis ómnium caritátis Societátum Patróni; qui in Dómino obdormívit quinto Kaléndas Octóbris.
      - type: text
        text: Colóssis, in Phrýgia, natális sancti Epaphræ, quem sanctus Paulus Apóstolus concaptívum appéllat. Hic, ab eódem Apóstolo Colóssis Epíscopus ordinátus, ibídem, clarus virtútibus, martýrii palmam, pro óvibus sibi commendátis, viríli agóne percépit; cuius corpus Romæ, in Basílica sanctæ Maríæ Maióris, cónditum est.
      - type: text
        text: Tréviris sancti Martíni, Epíscopi et Mártyris.
      - type: text
        text: Híspali, in Hispánia, pássio sanctárum Vírginum Iustæ et Rufínæ, quæ, a Prǽside Diogeniáno comprehénsæ, primo equúlei extensióne et ungulárum laniatióne vexátæ, póstea cárcere, inédia et váriis torsiónibus sunt afflíctæ; tandem Iusta in cárcere spíritum exhalávit, Rufínæ vero cervix, in confessióne Dómini, confrácta est.
      - type: text
        text: Córdubæ, in Hispánia, sanctæ Aureæ Vírginis, beatórum Adúlphi et Ioánnis Mártyrum soróris; quæ aliquándo in apostasíæ crimen a Mahumetáno Iúdice indúcta est, sed mox, facti pǽnitens, iteráto certámine, hostem effúso sánguine superávit.
      - type: text
        text: Romæ sancti Sýmmachi Papæ, qui, a schismaticórum factióne diútius fatigátus, demum, sanctitáte conspícuus, migrávit ad Dóminum.
      - type: text
        text: Verónæ sancti Felícis Epíscopi.
      - type: text
        text: Apud Scetim, Ægýpti montem, sancti Arsénii, Románæ Ecclésiæ Diáconi; qui, Theodósii témpore, in solitúdinem secéssit, ibíque, virtútibus ómnibus consummátus et iugi lacrimárum imbre perfúsus, spíritum Deo réddidit.
      - type: text
        text: In Cappadócia sanctæ Macrínæ Vírginis, fíliæ sanctórum Basilíi et Emméliæ, atque soróris item sanctórum Episcopórum Basilíi Magni, Gregórii Nysséni et Petri Sebasténsis.
  psalm.quartod-cimo-kal-ndas-dec-mbris-7af7328c74:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 18th day of November is kept the feast of the Dedication of the two Cathedral Churches of St. Peter and of St. Paul at Rome. The Church of St Peter, after being rebuilt on a larger scale, was solemnly consecrated by Urban VIII upon the 18th day of November (in the year 1626.) The Church of St. Paul had been almost entirely destroyed by a lamentable fire, and was rebuilt in a more splendid manner, and consecrated anew by Pius IX upon the 10th day of December but he transferred the yearly feast of the Dedication thereof to the same day as that of the Church of St. Peter.
      - type: citation
        text: 'Upon the same 18th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, the holy martyr Romanus. In the time of the Emperor Galerius, when the Prefect Asclepiades was assailing the Church and seeking utterly to overthrow it, Romanus exhorted the other Christians to gainsay him. For this cause he was put to horrid torments, and his tongue was cut out but thereafter he still uttered the praise of God. Then he was strangled in prison, and so was crowned by a famous martyrdom.
      - type: text
        text: Before him there suffered also the little lad Barula, who was asked by Romanus whether it were better to worship one God or many gods, and answered that we ought to believe in the one God whom the Christians worship for the saying of the which thing he was first flogged and then beheaded.
      - type: text
        text: Likewise at Antioch, (about the year 304,) the holy martyr Hesychius. He was a soldier, but when he heard the command that whosoever would not sacrifice to idols should cast away his military belt, he straightway took off his belt, for which cause a large stone was tied to his right hand, and he was thrown into the river.
      - type: text
        text: On the same day, (in the fifth century,) the holy martyrs Oriculus and his Companions, who suffered for the Catholic faith in the persecution under the Vandals.
      - type: text
        text: At Mainz, holy Maximus, Bishop of that see, who suffered many things from the Arians in the time of the Emperor Constantius, and died a Confessor.
      - type: text
        text: At Tours, (in the year 942,) blessed Odo, Abbot of Cluny.
      - type: text
        text: At Antioch, (about the year 782,) the holy monk Thomas, in whose honour the Antiochenes keep a solemn feast-day every year on account of a plague which was stayed by his prayers.
      - type: text
        text: At Lucca, in Tuscany, is commemorated the finding, (in the year 800,) of the body of the holy Confessor Finnan, Bishop (of that see, a son of Ultach, King of Ulster.)
      la:
      - type: text
        text: Quartodécimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Romæ Dedicátio Basilicárum sanctórum Petri et Pauli Apostolórum. Eárum primam, restitútam in ampliórem formam, Summus Póntifex Urbánus Octávus consecrávit hac ipsa recurrénte die; álteram vero, miserándo incéndio pénitus consúmptam, ac magnificéntius reædificátam, Pius Nonus die décima Decémbris solémni ritu consecrávit, eiúsque ánnuam commemoratiónem hodiérna die agéndam indíxit.
      - type: text
        text: Antiochíæ natális sancti Románi Mártyris, qui, témpore Galérii Imperatóris, cum Asclepíades Præféctus in Ecclésiam irrúmperet eámque fúnditus conarétur evértere, céteros Christiános hortátus est ut ei contradícerent, ideóque, post dira torménta et abscissiónem linguæ (sine qua tamen Dei præcónia loquebátur), in cárcere strangulátus láqueo, célebri martýrio coronátur. Passus est étiam ante ipsum puérulus, nómine Bárula, qui, cum fuísset ab eódem interrogátus Præfécto utrum mélius esset unum Deum cólere an plures deos, atque in unum Deum, quem Christiáni colunt, credéndum esse respondísset, proptérea, verbéribus cæsus, iussus est decollári.
      - type: text
        text: Item Antiochíæ sancti Hesýchii Mártyris, qui, cum esset miles, et præcéptum audísset ut quisquis non sacrificáret idólis, cíngulum milítiæ depóneret, repénte cíngulum solvit; ob quam causam, ingénti saxo in déxtera eius ligáto, in flúvium præcipitári iussus est.
      - type: text
        text: Eódem die sanctórum Orículi et Sociórum, qui, in persecutióne Wandálica, pro fide cathólica passi sunt.
      - type: text
        text: Mogúntiæ sancti Máximi Epíscopi, qui, témpore Constántii multa passus ab Ariánis, Conféssor occúbuit.
      - type: text
        text: Turónis, in Gállia, tránsitus beáti Odónis, Abbátis Cluniacénsis.
      - type: text
        text: Antiochíæ sancti Thomæ Mónachi, quem Antiochéni, ob sedátam eius précibus pestem, solemnitáte annua coluérunt.
      - type: text
        text: Lucæ, in Túscia, Translátio sancti Frigdiáni, Epíscopi et Confessóris.
  psalm.quartod-cimo-kal-ndas-febru-rii-520d5592cd:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Worcester, in England, (in the year 1095,) the holy Confessor Wolstan, Bishop of that see, famous for his worthy and wondrous works, whose name was enrolled among those of the saints by Innocent III.
      - type: text
        text: At Rome, (in the year 270,) upon the Cornelian Way, the holy martyrs Maris, and Martha, his wife, and their sons Audifax and Abachum. These were noble Persians, who came to Rome for prayer's sake in the time of the Emperor Claudius. They were cudgelled, racked, burnt, torn with iron hooks, and had their hands cut off. At length Martha was drowned and the others beheaded, and their bodies cast into the fire.
      - type: text
        text: At Smyrna, in the time of the Emperors Marcus Antoninus and Lucius Aurelius, the blessed martyr Germanicus. He was a very beautiful youth, but by the power of God's grace he laid aside all the weakness of bodily fear, and of his own accord provoked the beast by which he had been condemned by the judge to be killed and so being ground through its teeth, and so dying for the Lord Jesus Christ, he earned to be made one body with Him who is Himself the very Bread which came down from heaven.
      - type: text
        text: In Africa, the holy martyrs Paul, Gerontius, Januarius, Saturninus, Successus, Julius, Catus, Pia, and Germana, (and others to the number in all of 600.)
      - type: text
        text: At Spoleto, in the time of the Emperor Antonine, the holy martyr Pontian. Fabian, the judge, caused him to be first most grievously beaten with rods and then to walk barefoot upon live coals by these he was unhurt, and was therefore racked, lacerated with iron hooks, and cast into prison, where he was comforted by a visitation of angels. Lastly he was thrown to the lions, had molten lead poured over him, and was then beheaded.
      - type: text
        text: At Lodi, (about the year 413,) the holy Confessor Bassian, Bishop of that see, who fought manfully along with holy Ambrose against the heretics.
      la:
      - type: text
        text: Quartodécimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Cornélia, sanctórum Mártyrum Márii et Marthæ coniúgum, et filiórum Audifácis et Abachum, nobílium Persárum; qui Romam, tempóribus Cláudii Príncipis, ad oratiónem vénerant. Ex eis vero, post tolerátos fustes, equúleum, ignes, ungues férreos manuúmque præcisiónem, Martha in Nympha necáta est; ceteri sunt decolláti, et córpora eórum incénsa.
      - type: text
        text: Item sancti Canúti, Regis et Mártyris.
      - type: text
        text: Smyrnæ natális beáti Germánici Mártyris, qui, sub Marco Antoníno et Lúcio Aurélio, cum primǽvæ ætátis venustáte floréret, damnátus a Iúdice, et, per grátiam virtútis Dei, metum córporeæ fragilitátis exclúdens, præparátam sibi béstiam sponte provocávit; cuius déntibus comminútus, vero pani Dómino Iesu Christo, pro ipso móriens, méruit incorporári.
      - type: text
        text: In Africa sanctórum Mártyrum Pauli, Geróntii, Ianuárii, Saturníni, Succéssi, Iúlii, Cati, Piæ et Germánæ.
      - type: text
        text: Apud Spolétum pássio sancti Pontiáni Mártyris, qui, témpore Antoníni Imperatóris, a Fabiáno Iúdice, pro Christo vehementíssime virgis cæsus, iussus est super carbónes nudis pédibus ambuláre, sed a carbónibus nil læsus, equúleo et uncínis férreis iussus est suspéndi, et sic in cárcerem trudi, ubi Angélica visitatióne méruit confortári; postque leónibus expósitus et plumbo fervénti perfúsus, tandem gládio percússus est.
      - type: text
        text: Laudæ, in Insúbria, sancti Bassiáni, Epíscopi et Confessóris, qui advérsus hæréticos, una cum sancto Ambrósio, strénue decertávit.
      - type: text
        text: Wigórniæ, in Anglia, sancti Wulstáni, Epíscopi et Confessóris, méritis et miráculis conspícui; qui ab Innocéntio Papa Tértio inter Sanctos relátus est.
  psalm.quartod-cimo-kal-ndas-i-lii-86efacc371:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 18th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Edessa in Mesopotamia, St. Ephraem, deacon of the church of Edessa in the time of Emperor Valens and confessor. After suffering many trials for the faith of Christ and gaining great renown for holiness and learning, he went to rest in the Lord. He was declared a doctor of the Universal Church by Pope Benedict XV.
      - type: text
        text: At Rome, on the Ardeatine Way, in the persecution of Diocletian, the birthday of the saintly brothers Mark and Marcellian, martyrs, who were arrested by the judge Fabian, tied to a stake, and had sharp nails driven into their feet. Because they would not cease praising the name of Christ they were pierced through the sides with lances, and thus went to the kingdom of heaven with the glory of martyrdom.
      - type: text
        text: At Malaga in Spain, the holy martyrs Cyriacus and the virgin Paula, who were overwhelmed with stones, and yielded up their souls to God.
      - type: text
        text: At Tripoli in Phoenicia, in the time of the governor Adrian, St. Leontius, a soldier, who attained the crown of martyrdom through bitter torments together with the tribune Hypatius and Theodulus, whom he had converted to Christ.
      - type: text
        text: Upon the same day, [at Nicomedia,] St. Aetherius, martyr, in the persecution of Diocletian. After enduring fire and other torments, he was put to death with the sword.
      - type: text
        text: At Alexandria, the passion of St. Marina, virgin.
      - type: text
        text: At Bordeaux, [in the fifth century,] the holy Confessor Amandus, Bishop [of that see.]
      - type: text
        text: At Sacca, in Sicily, [likewise in the fifth century,] the holy Hermit Calogerus, whose holiness is chiefly manifested in delivering them that are vexed with evil spirits.
      - type: text
        text: At Schoenaug, [in the year 1165,] the holy Virgin Elizabeth, celebrated for her observance of the monastic life.
      la:
      - type: text
        text: Quartodécimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Edéssæ, in Mesopotámia, sancti Ephræm, Diáconi Edesséni et Confessóris, qui, post multos labóres pro Christi fide suscéptos, doctrína et sanctitáte conspícuus, sub Valénte Imperatóre quiévit in Dómino, et a Benedícto Papa Décimo quinto Doctor Ecclésiæ universális est declarátus.
      - type: text
        text: Romæ, via Ardeatína, natális sanctórum Mártyrum Marci et Marcelliáni fratrum, qui, in persecutióne Diocletiáni, a Iúdice Fabiáno tenti et ad stípitem alligáti, in pédibus clavos acútos accepérunt; cumque non cessárent laudáre Christum, lánceis per látera transfíxi sunt, et cum glória martýrii ad sidérea regna migrárunt.
      - type: text
        text: Patávii Sancti Gregórii Barbadíci, Venéti, Cardinális et Bergomátis primum, deínde Patávinæ diœcéseos Epíscopi, quem mira virtútum et pastorális sapiéntiæ laude conspícuum, Ioánnes vigésimus tértius Sanctórum coróna insignívit. Ipsíus autem festum prídie huius diéi celebrátur.
      - type: text
        text: Málacæ, in Hispánia, sanctórum Mártyrum Cyríaci, et Paulæ Vírginis, qui, lapídibus óbruti, inter saxa cælo ánimas reddidérunt.
      - type: text
        text: Trípoli, in Phœnícia, sancti Leóntii mílitis, qui, sub Hadriáno Prǽside, una cum Hypátio Tribúno et Theodúlo, quos convértit ad Christum, per acérba torménta pervénit ad corónam martýrii.
      - type: text
        text: Eódem die sancti Æthérii Mártyris, qui, in persecutióne Diocletiáni, post ignes et álios cruciátus, gládio cæsus est.
      - type: text
        text: Alexandríæ pássio sanctæ Marínæ Vírginis.
      - type: text
        text: Burdígalæ sancti Amándi, Epíscopi et Confessóris.
      - type: text
        text: Apud Saccam, in Sicília, sancti Calogéri Eremítæ, cuius sánctitas in energúmenis liberándis máxime effúlget.
      - type: text
        text: Schonáugiæ, in Germánia, sanctæ Elísabeth Vírginis, ob monásticæ vitæ observántiam célebris.
  psalm.quartod-cimo-kal-ndas-i-nii-09df493fa3:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Dunstan, Archbishop of Canterbury.
      - type: citation
        text: 'On the same 19th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Holy Peter Morone, who was a hermit when he was created Supreme Pontiff, and was called Celestine V. He resigned the Papacy and led a religious life in solitude, and so, famous for graces and wonders, passed away, [in the year 1296,] to be for ever with the Lord. His feast we keep upon the 21st day of this same month of May.
      - type: text
        text: At Rome, the holy Virgin Pudentiana, who, after countless contendings, after worshipfully burying many martyrs, and after distributing all her goods to feed the poor for Christ's sake, at length passed from earth to heaven.
      - type: text
        text: There also the holy Senator Pudens, the father of the said virgin. He put on Christ in baptism by the ministry of the Apostles, and kept his robe in innocency undefiled till he received the crown of life.
      - type: text
        text: At Rome also, upon the Appian Way, the holy eunuchs Calocerus and Parthenius. Calocerus was master of the bed-chamber to the wife of the Emperor Decius, and Parthenius was one of the chief officers of the court, and Decius slew them both because they would not sacrifice to idols.
      - type: text
        text: At Nicomedia, the holy martyr Philoter, son of the Pro-Consul Pacian, who suffered much under the Emperor Diocletian, and received the crown of martyrdom.
      - type: text
        text: There also six holy Virgin martyrs, of whom the chiefest was Cyriaca, who boldly rebuked Maximian for his wickedness, and therefore was most direfully rent and torn, and at last burnt with fire.
      - type: text
        text: In Brittany, [in the year 1303,] the holy Priest and Confessor Yves, who for the love of Christ pled the cause of orphans, widows, and the poor.
      la:
      - type: text
        text: Quartodécimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Natális sancti Petri de Moróno Confessóris, qui, ex Anachoréta Summus Póntifex creátus, dictus est Cæléstinus Quintus. Sed Pontificátu se póstmodum abdicávit, et in solitúdine religiósam vitam agens, virtútibus et miráculis clarus, migrávit ad Dóminum.
      - type: text
        text: Romæ sanctæ Pudentiánæ Vírginis, quæ, post innúmeros agónes, post multórum Mártyrum venerabíliter exhíbitas sepultúras, post omnes facultátes suas pro Christo paupéribus erogátas, tandem de terris ad cælos migrávit.
      - type: text
        text: Ibídem sancti Pudéntis Senatóris, qui eiúsdem sanctæ Pudentiánæ ac sanctæ item Praxédis Vírginis fuit pater; atque, ab Apóstolis Christo in baptísmo vestítus, innocéntem túnicam usque ad vitæ corónam immaculáte custodívit.
      - type: text
        text: Item Romæ, via Appia, natális sanctórum Calóceri et Parthénii eunuchórum; quorum prior, cum esset præpósitus cubículi uxóris Décii Imperatóris, postérior vero altérius múneris primicérius, et ambo nollent idólis sacrificáre, idcírco, eiúsdem Imperatóris iussu váriis ac diris sunt excruciáti supplíciis, ac tandem, cervícibus ardénti fuste contúsis, spíritum Deo tradidérunt.
      - type: text
        text: Nicomedíæ sancti Philóteri Mártyris, qui Paciáni Procónsulis fílius éxstitit, et sub Diocletiáno Imperatóre, multa passus, martýrii corónam accépit.
      - type: text
        text: Ibídem sanctárum sex Vírginum et Mártyrum, quarum præcípua erat Cyríaca, quæ, cum líbere Maximiánum impietátis obiurgásset, diríssime cæsa et dilaniáta est, atque ad últimum, igne cremáta, martýrium consummávit.
      - type: text
        text: Cantuáriæ, in Anglia, sancti Dunstáni Epíscopi.
      - type: text
        text: Lohanéti, in Británnia minóre, sancti Ivónis, Presbýteri et Confessóris; qui, pro Christi amóre, causas pupillórum, viduárum ac páuperum defendébat.
      - type: text
        text: Ficécli, in Etrúria, sancti Theóphili a Curte, Confessóris, Sacerdótis Ordinis Fratrum Minórum, sacrórum recéssuum propagatóris, quem Pius Papa Undécimus inter Sanctos rétulit.
  psalm.quartod-cimo-kal-ndas-ianu-rii-45136427fc:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, in Egypt, the blessed martyr Nemesius. He was first brought before the judge on a false accusation that he was a thief, and was acquitted but in the persecution under the Emperor Decius he was accused of Christianity before the judge Aemilian, by whom he was put to the double punishment and condemned to be burnt along with thieves. In the which thing he was conformed to the likeness of the Saviour, who was crucified between thieves.
      - type: text
        text: At Nice, (now Isnik, in Bithynia,) the holy martyrs Darius, Zosimus, Paul, and Secundus, (in the fourth century.)
      - type: text
        text: At Nicomedia, the holy martyrs Cyriacus, Paulillus, Secundus, Anastasius, Syndimius, and their Companions, (in the fourth century.)
      - type: text
        text: In Morocco, (in the fourth century,) the holy martyr Timothy, the Deacon, who after a terrible imprisonment was cast into the fire for Christ's faith's sake, and so finished his testimony.
      - type: text
        text: At Gaza, in Palestine, (in the third century,) the holy martyrs Meuris and Thea.
      - type: text
        text: At Auxerre, the holy Confessor Gregory, (looked on as 12th) Bishop (of that see, successor of St. Theodore, in the year 530.)
      - type: text
        text: At Orleans, the holy Abbot Adjutus, famous for the spirit of prophecy.
      - type: text
        text: At Rome, holy Fausta, the mother of holy Anastasia, eminent for her rank and godliness, (at the end of the third century.)
      - type: text
        text: At Avignon, the blessed Pope Urban V, who performed the highest service to the Church; he restored the Apostolic seat to Rome, he completed the union of the Greeks and the Latins, he brought the unbelievers into subjection. His very ancient veneration was ratified and confirmed by Pope Pius IX.
      la:
      - type: text
        text: Quartodécimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: In Mauritánia sancti Timóthei Diáconi, qui ob Christi fidem, post diros cárceres, in ignem coniéctus, martýrium consummávit.
      - type: text
        text: Alexandríæ beáti Nemésii Mártyris, qui, primo per calúmniam quasi latro Iúdici delátus, eoque crímine absolútus, mox, in persecutióne Décii, Christiánæ religiónis nómine accusátus Æmiliáno Iúdici; a quo, geminátis supplíciis excruciátus, cum latrónibus iussus est incéndi, Salvatóris déferens similitúdinem, qui una cum latrónibus pértulit crucem.
      - type: text
        text: Nicǽæ, in Bithýnia, sanctórum Mártyrum Dárii, Zósimi, Pauli et Secúndi.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Cyríaci, Paulílli, Secúndi, Anastásii, Syndímii et Sociórum.
      - type: text
        text: Gazæ, in Palæstína, pássio sanctárum Meuris et Theæ.
      - type: text
        text: Romæ deposítio sancti Anastásii Papæ Primi, viri ditíssimæ paupertátis et apostólicæ sollicitúdinis, quem (ut ait sanctus Hierónymus) diu Roma habére non méruit, ne orbis caput sub tali Epíscopo truncarétur; nam, haud multo post eius óbitum, Roma a Gothis capta et dirépta fuit.
      - type: text
        text: Antisiodóri sancti Gregórii, Epíscopi et Confessóris.
      - type: text
        text: Aureliánis, in Gállia, sancti Adiúti Abbátis, prophético spíritu illústris.
      - type: text
        text: Romæ sanctæ Faustæ, quæ fuit mater sanctæ Anastásiæ, ac nobilitáte et pietáte éxstitit insígnis.
      - type: text
        text: Avenióne beáti Urbáni Papæ Quinti, qui, Sede Apostólica Romæ restitúta, Græcórum cum Latínis coniunctióne perfécta, infidélibus coércitis, de Ecclésia óptime méritus est. Eius cultum pervetústum Pius Nonus, Póntifex Máximus, ratum hábuit et confirmávit.
  psalm.quartod-cimo-kal-ndas-m-rtii-2d8d5ee110:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Blessed Onesimus, of whom the holy Apostle Paul writeth unto Philemon, and whom also he ordained Bishop of Ephesus after holy Timothy, and committed unto him the preaching of the Word. In the end he was brought to Rome in chains, and there stoned to death for Christ's faith's sake. His body was first buried there, but was thence taken to the place where he had been ordained bishop.
      - type: text
        text: On the same day is commemorated at Camee in Campania the translation of the holy Virgin and martyr Juliana.
      - type: text
        text: At Nicomedia, under the Emperor Maximian, she was cruelly beaten by her own father Africanus, then put to diverse torments by the Prefect Evilasius, whom she refused to marry, and afterwards cast into prison, where she fought visibly with the devil she overcame fire and boiling water, and at length finished her martyrdom by being beheaded, [in the year 299.]
      - type: text
        text: In Egypt, the holy martyr Julian, and five thousand others, [in the year 309.]
      - type: text
        text: At Caesarea, in Palestine, the holy Egyptian martyrs Elijah, Jeremiah, Isaiah, Samuel, and Daniel. They went of their own accord to Cilicia to minister to the Confessors who had been condemned to penal servitude in the mines; when they were returning thence, they were apprehended, and most cruelly tortured by the President Firmilian under the Emperor Galerius Maximian, and in the end were beheaded, [in the year 309.]
      - type: text
        text: After whom holy Porphyry, the servant of the martyr Pamphilus, and holy Seleucus the Cappadocian, who had oftentimes contended and always been conquerors, were put to the torture again, and [in the year 309] received their crowns Porphyry by fire, and Seleucus by the sword.
      - type: text
        text: At Arezzo, in Tuscany, [in the year 1276,] the blessed Pope Gregory X he was a man of Piacenza, and was raised to the Supreme Pontificate from the arch-deaconry [of Liege.]
      - type: text
        text: He held the Second Council of Lyon, received the Greeks into the unity of the faith, healed the dissensions of Christendom, set forward the recovery of the Holy Land, and governed the Church in holiness.
      - type: text
        text: At Brescia, [in the year 350,] the holy Confessor Faustinus, Bishop of that see.
      la:
      - type: text
        text: Quartodécimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ beáti Onésimi, de quo sanctus Paulus Apóstolus ad Philémonem scribit; quem étiam, post sanctum Timótheum, Ephesiórum Epíscopum ordinávit, prædicationísque verbum illi commísit. Ipse autem Onésimus, vinctus Romam perdúctus ac pro fide Christi lapidátus, primo ibídem sepúltus fuit; inde ad locum ubi Epíscopus fúerat ordinátus, corpus eius delátum est.
      - type: text
        text: In Ægýpto sancti Iuliáni Mártyris, cum áliis quinque míllibus.
      - type: text
        text: Cæsaréæ, in Palæstína, sanctórum Mártyrum Ægyptiórum Elíæ, Ieremíæ, Isaíæ, Samuélis et Daniélis; qui, cum spontánee ministrássent Confessóribus in Cilícia ad metálla damnátis, et inde reverteréntur, sunt comprehénsi, et a Firmiliáno Prǽside, sub Galério Maximiáno Imperatóre, sævíssime torti, gládio demum percússi sunt. Post eos sanctus Porphýrius, Pámphili Mártyris fámulus, et sanctus Seléucus Cáppadox, qui iterátis certamínibus sæpe vícerant, rursus cruciáti sunt, atque alter incéndio, gládio alter corónam martýrii accepérunt.
      - type: text
        text: Nicomedíæ sanctæ Iuliánæ, Vírginis et Mártyris; quæ, sub Maximiáno Imperatóre, primum a patre suo Africáno gráviter cæsa, deínde ab Evilásio Præfécto, cui núbere recusáverat, várie cruciáta, et póstmodum in cárcerem detrúsa, ubi palam cum diábolo conflíxit, demum, cum flammas ígnium et ollam fervéntem superásset, cápitis decollatióne martýrium consummávit. Ipsíus autem corpus póstea Cumas, in Campánia, translátum est.
      - type: text
        text: Bríxiæ sancti Faustíni, Epíscopi et Confessóris.
  psalm.quartod-cimo-kal-ndas-maii-4df2787be3:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 18th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, under the Emperor Cornmodus and the Prefect Perennius, the blessed Senator Apollonius. A slave informed upon him as being a Christian, and he was commanded to give an account of his faith. In order to do this he wrote an admirable treatise, which he read in the Senate but the Senate, nevertheless, ordered him to be beheaded for Christ's sake.
      - type: text
        text: At Messina, the holy martyrs Eleutherius, Bishop of Illyrium, and Anthia his mother. He was famous for the holiness of his life, and for his power of working miracles. Under the Emperor Hadrian he was tortured upon a heated iron-bed, a grating, and a vessel filled with boiling oil, pitch, and rosin. These he overcame, and was thrown to the lions but by them he was left unhurt, and in the end his throat was cut along with that of his mother.
      - type: text
        text: Likewise at Messina, the holy Prefect Corebus, who was converted to the faith by holy Eleutherius, and was slain with the sword.
      - type: text
        text: At Brescia, the holy martyr Calocerus, who was converted to Christ by holy Faustinus and Jovita, and under the aforesaid Emperor Hadrian by his testimony finished a glorious contention.
      - type: text
        text: At Cordova, the holy martyr Perfectus the Priest, who was killed by the Moors for holding forth against the Mahomedan religion. [The place of his death, which was in the year 850, is still called the Field of Truth.]
      - type: text
        text: At Milan, holy Cardinal Galdin, Bishop of that see, who gave up his soul to God on finishing a discourse against heretics, [in the year 1176. He was a Cardinal Archbishop and a Legate of the Holy See.]
      - type: text
        text: At Monte Senario, in Tuscany, [in the thirteenth century,] the blessed Confessor Amadeo, one of the seven founders of the Order of Servants of the Blessed Virgin Mary, whose feast we keep upon the 13th day of February. He was eminent for his burning love toward God.
      la:
      - type: text
        text: Quartodécimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Apud montem Senárium, in Etrúria, natális sancti Amidǽi Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis, flagrantíssima in Deum caritáte præclári. Ipsíus tamen ac Sociórum festum prídie Idus Februárii celebrátur.
      - type: text
        text: Romæ beáti Apollónii Senatóris, qui, sub Cómmodo Príncipe et Perénnio Præfécto, a servo próditus quod Christiánus esset, iussúsque ut ratiónem fídei suæ rédderet, insígne volúmen compósuit, quod in Senátu legit; et nihilóminus pro Christo, senténtia Senátus, cápite truncátus est.
      - type: text
        text: Messánæ, in Sicília, natális sanctórum Mártyrum Eleuthérii, Epíscopi Illýrici, et Anthíæ matris. Ipse, cum esset vitæ sanctimónia et miraculórum virtúte illústris, sub Hadriáno Príncipe, lectum férreum ignítum, cratículam et sartáginem, óleo et pice ac resína fervéntem, súperans, proiéctus quoque leónibus sed ab illis nil læsus, novíssime simul cum matre iugulátur.
      - type: text
        text: Córdubæ, in Hispánia, sancti Perfécti, Presbýteri et Mártyris, qui a Mauris, eo quod inveherétur in Mahumétis sectam et fírmiter Christi fidem profiterétur, gládio trucidátus est.
      - type: text
        text: Messánæ, in Sicília, sancti Corébi Præfécti, qui, per sanctum Eleuthérium convérsus ad fidem, gládio percússus est.
      - type: text
        text: Bríxiæ sancti Calóceri Mártyris, qui, a sanctis Faustíno et Iovíta convérsus ad Christum, sub Hadriáno Príncipe gloriósum confessiónis certámen complévit.
      - type: text
        text: Medioláni sancti Galdíni, Cardinális et eiúsdem civitátis Epíscopi, qui, concióne advérsus hæréticos expléta, spíritum Deo réddidit.
  psalm.quartod-cimo-kal-ndas-nov-mbris-86e2dba53d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Arenas, in Spain, the holy Confessor Peter of Alcantara, of the Order of Friars Minor, whose name Clement IX enrolled among those of the saints on account of his wonderful spirit of penance and his many miracles.
      - type: text
        text: At Rome, under the Emperor Mark Antonine, the holy martyrs Ptolemy and Lucius. Of these it is recorded by Justin Martyr that Ptolemy brought a lewd woman to believe in Christ, and taught her to honour chastity, for the which cause he was accused by an unclean man before Urbicius the Prefect. He suffered a long and foul imprisonment, and at length made a public confession of Christ's teaching, and was sentenced to death. Lucius blamed the sentence and openly avowed himself also to be a Christian, for the which cause he was sent to death likewise, and with them was sent a third under the same condemnation.
      - type: text
        text: At Antioch, the holy martyrs Beronicus, the Virgin Pelagia, and forty-nine others.
      - type: text
        text: In Egypt, in the persecution under the Emperor Maximin, the holy soldier Varus. He used to visit seven holy monks that were kept in prison, and to minister to them, and when one of them died he chose to be substituted in his place, and along with the others he suffered great cruelties, and gained the palm of martyrdom.
      - type: text
        text: At Evreux, (at the end of the seventh century,) the holy Confessor Aquilinus, Bishop (of that see.)
      - type: text
        text: In the country of Orleans, (toward the end of the sixth century,) deceased holy Veran, Bishop (of Cavaillon.)
      - type: text
        text: At Salerno, (in the fifth century,) holy Eusterius, Bishop (of that see.)
      - type: text
        text: In Ireland, (at the end of the sixth century,) the holy Confessor Ethbin.
      - type: text
        text: At Oxford, in England, (in the eighth century,) the holy Virgin Frideswide, (Patroness of that city. She was daughter of the Prince of that territory, and founded at Oxford a nunnery in honour of St. Mary and all the saints, the direction of which was committed to her care.)
      la:
      - type: text
        text: Quartodécimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Petri de Alcántara, Sacerdótis ex Ordine Minórum et Confessóris, qui migrávit in cælum prídie huius diéi.
      - type: text
        text: Romæ natális sanctórum Mártyrum Ptolomǽi et Lúcii, sub Marco Antoníno. Horum prior (ut scribit Iustínus Martyr), cum impudícam mulíerem ad Christi convertísset fidem, et castitátem cólere docuísset, ídeo, ab impúro viro apud Præféctum Urbícium accusátus, multo témpore squalóre cárceris macerátus est, et ad últimum, cum de Christi magistério pública confessióne testarétur, iussus est duci ad mortem; Lúcius quoque, cum Urbícii senténtiam improbáret et se Christiánum líbere faterétur, símilem senténtiam excépit; quibus et álius tértius adiúnctus est, qui étiam eódem supplício damnátus fuit.
      - type: text
        text: Antiochíæ sanctórum Mártyrum Beroníci, Pelágiæ Vírginis, et aliórum quadragínta novem.
      - type: text
        text: In Ægýpto sancti Vari mílitis, qui, sub Maximíno Imperatóre, dum sanctos septem Mónachos in cárcere deténtos visitáret atque refíceret, vóluit, uno ex ipsis defúncto, in eius locum subrogári; atque ita cum illis, sævíssima passus, martýrii palmam adéptus est.
      - type: text
        text: Ebróicis, in Gállia, sancti Aquilíni, Epíscopi et Confessóris.
      - type: text
        text: In território Aurelianénsi deposítio sancti Veráni Epíscopi.
      - type: text
        text: Apud Salérnum sancti Eustérii Epíscopi.
      - type: text
        text: In monastério Silvæ Necténsis, in Hibérnia, sancti Ethbíni Abbátis.
      - type: text
        text: Oxónii, in Anglia, sanctæ Fredeswíndæ Vírginis.
  psalm.quartod-cimo-kal-ndas-oct-bris-bbb11cfe03:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 18 th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Osimo, the holy Confessor Joseph of Cupertino, of the Order of Friars Minor Conventuals, whose name Pope Clement XIII enrolled among those of the saints.
      - type: text
        text: Upon the same day, holy Methodius, Bishop first of Olympus in Lycia, and afterward of Tyre, very famous for his clear words and teaching, who, as is written by holy Jerome, was crowned with martyrdom at Chalcis, in Greece, at the end of the last persecution.
      - type: text
        text: In the country of Vienne, the holy martyr Ferreolus, of Tribunitial rank. (During the persecution under the Emperor Diocletian,) he was tried by command of the wicked President Crispin, and first most cruelly beaten, then heavily loaded with chains and cast into a foul prison. God loosed his chains, and the gates of the prison opened, and he went forth, but he was followed and again taken, and received the crown of martyrdom by being beheaded.
      - type: text
        text: Also the holy martyrs Sophia and Irene.
      - type: text
        text: At Milan, (in the fourth century,) holy Eustorgius I, Bishop of that city, famous through the witness of blessed Ambrose.
      - type: text
        text: At Gortyna, in Crete, (in the seventh century,) the holy Confessor Eumenius, Bishop (of that see.)
      la:
      - type: text
        text: Quartodécimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Auximi, in Picéno, sancti Ioséphi a Cupertíno, Sacerdótis ex Ordine Minórum Conventuálium et Confessóris; quem Clemens Papa Décimus tértius in Sanctórum númerum rétulit.
      - type: text
        text: In Chálcide Grǽciæ natális sancti Methódii, qui prius Olýmpii, in Lýcia, et póstea Tyri, in Phœnícia, éxstitit Epíscopus, sermónis nitóre ac doctrína claríssimus; atque, ad extrémum novíssimæ persecutiónis (ut scribit sanctus Hierónymus), martýrio coronátus est.
      - type: text
        text: In território Viennénsi sancti Ferréoli Mártyris, qui, cum esset tribuníciæ potestátis, iussu impiíssimi Prǽsidis Crispíni tentus, et primo crudelíssime verberátus, deínde, gravi catenárum póndere onústus, in tetérrimum cárcerem trusus est; unde, solútis Dei nutu vínculis et iánuis cárceris patefáctis, éxiens, ab insequéntibus íterum est captus, ac martýrii palmam obtruncatióne cápitis percépit.
      - type: text
        text: Item sanctárum Mártyrum Sophíæ et Irénes.
      - type: text
        text: Medioláni sancti Eustórgii Primi, eiúsdem civitátis Epíscopi, beáti Ambrósii testimónio célebris.
      - type: text
        text: Gortýnæ, in Creta, sancti Euménii, Epíscopi et Confessóris.
  psalm.quartod-cimo-kal-ndas-sept-mbris-4630424128:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 192,] the holy martyr Julius. He was a Senator who was denounced to the judge Vitellius and by him committed to prison, thereafter by command of the Emperor Cornmodus he was beaten with cudgels until he gave up the ghost. His body was buried in the cemetery of Calipodius, upon the Aurelian Way.
      - type: text
        text: In Cilicia, [about the year 300,] the holy soldiers Andrew the Tribune, and his companions. After obtaining a victory over the Persians by God's help, they were turned to the faith of Christ, and being accused therefore, they were massacred by the army of the President Seleucus in the straits of the Taurus mountain, under the Emperor Maximian.
      - type: text
        text: In Palestine, the holy martyr Timothy, who after overcoming many torments was burnt at a slow fire, under Urban the President, in the persecution under the Emperor Diocletian. There suffered there at the same place Thecla and Agapius.
      - type: text
        text: Thecla was thrown to wild beasts, and being rent by them passed away to her Divine Bridegroom. Agapius suffered many tortures, but was kept for greater contendings still.
      - type: text
        text: At Anagni, [about the year 250,] the holy martyr Magnus, Bishop [of that see,] who was slain in the persecution under Decius.
      - type: text
        text: At the Brignoles, in Provence, [in the year 1297,] holy Louis, of the Order of Friars Minors, Bishop of Toulouse, famous for the holiness of his life and his miracles. His body was carried thence to Marseilles, and is honourably buried there in the church of the Friars Minors.
      - type: text
        text: At Sisteron, in Gaul, [in the year 535,] the blessed Confessor Donatus, a Priest, who had been from his very infancy marvellously gifted with the grace of God. He lived as a hermit for many years, and passed away to be with Christ, famous for miracles.
      - type: text
        text: In Berry, [in the sixth century,] the holy Confessor Marian.
      - type: text
        text: At Mantua, the holy Confessor Rufinus.
      la:
      - type: text
        text: Quartodécimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Cadómi, in Gállia, sancti Ioánnis Eudes Confessóris, Missionárii Apostólici, Fundatóris Congregatiónis Presbyterórum Iesu et Maríæ necnon Ordinis Moniálium Dóminæ Nostræ a Caritáte, et promotóris litúrgici cultus erga Sacratíssima Christi eiúsque Genitrícis Corda; quem Pius Papa Undécimus fastis Sanctórum adscrípsit.
      - type: text
        text: Romæ Sancti Iúlii, Senatóris et Mártyris; qui, Vitéllio Iúdici tráditus et ab eo in cárcerem trusus, támdiu, iubénte Cómmodo Imperatóre, fústibus cæsus est, donec emítteret spíritum. Ipsíus autem corpus in cœmetério Calepódii via Aurélia, sepúltum fuit.
      - type: text
        text: Anágniæ sancti Magni Epíscopi et Mártyris, qui in persecutióne Décii necátus est.
      - type: text
        text: In Cilícia natális sancti Andréæ Tribúni et Sociórum mílitum; qui, victória de Persis divínitus adépta, ad fidem Christi convérsi, et hoc nómine accusáti, sub Maximiáno Imperatóre in angústiis Tauri montis ab exércitu Seléuci Prǽsidis trucidáti sunt.
      - type: text
        text: 'In Palæstína sancti Timóthei Mártyris, qui in persecutióne Diocletiáni sub Urbáno Prǽside, post multa superáta supplícia, lento igne combústus est. Passi sunt étiam ibídem Thecla et Agápius: illa feris expósita, eárum déntibus laniáta transívit ad Sponsum: Agápius vero, plúrima torménta perpéssus, ad maióra certámina fuit dilátus.'
      - type: text
        text: Romæ sancti Xysti Tértii, Papæ et Confessóris.
      - type: text
        text: Apud castrum Bríncolam, in Província, deposítio sancti Ludovíci, ex Ordine Minórum, Epíscopi Tolosáni, vitæ sanctitáte et miráculis clari; cuius corpus, inde Massíliam translátum, in Ecclésia Fratrum Minórum honorífice cónditum fuit, ac póstea Valéntiam, in Hispánia, devéctum est, atque in cathedráli Ecclésia collocátum.
      - type: text
        text: In pago Sigistérico, in Gállia, beáti Donáti, Presbýteri et Confessóris; qui, ab ipsis usque infántiæ rudiméntis mira Dei grátia prǽditus, anachoréticam vitam multis annis exégit, et miraculórum glória clarus migrávit ad Christum.
      - type: text
        text: In território Bituricénsi sancti Mariáni Confessóris, cuius virtútes et mirácula beátus Gregórius, Turonénsis Epíscopus, magnis láudibus celebravit.
      - type: text
        text: Mántuæ sancti Rufíni Confessóris.
      - type: text
        text: Norimbérgæ sancti Sebáldi Eremítæ, virtútibus et miráculis præclári, qui Sanctórum catálogo a Martíno Papa Quinto adiéctus est.
  psalm.quinto-idus-apr-lis-24e5fac84f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 9th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, holy Prochorus, one of the seven first deacons. He was illustrious for his faith and miracles, and was crowned with martyrdom. [He was the 3rd of the seven deacons, and 66th of the 72 disciples. He was a nephew of St Stephen. After being with St John in Asia, he was made Bishop of Nicomedia, in Bithynia, by St Peter, and later on sent to Antioch.]
      - type: text
        text: At Rome, the holy martyrs Demetrius, Concessus, Hilary, and their Companions.
      - type: text
        text: At Sirmium, suffered seven holy Virgins, all martyrs, who purchased eternal life at the price of their blood.
      - type: text
        text: At Caesarea, in Cappadocia, [in the year 362,] the holy martyr Eupsychius, who was crowned with martyrdom under the Emperor Julian the Apostate for casting down the shrine of Fortune.
      - type: text
        text: In Africa, the holy martyrs of Massylita, [probably Fez,] upon whose birthday holy Augustine made a discourse.
      - type: text
        text: At Diarbekr, in Mesopotamia, [in the fifth century,] holy Acatius, Bishop of that see, who even melted down and sold the vessels of the Church to redeem captives withal.
      - type: text
        text: At Rouen, the holy Confessor Hugh, Bishop of that see, [in the year 730.]
      - type: text
        text: In the city of Die, [in the sixth century,] holy Marcellus, Bishop thereof, who was famous for miracles.
      - type: text
        text: In Judea, holy Mary of Cleophas, sister of Mary the most Holy Mother of God.
      - type: text
        text: At Rome is commemorated the translation of the body of holy Monica, mother of the blessed Augustine, Bishop [of Hippo,] which the supreme Pontiff Martin V caused to be brought into the city from Ostia, and honourably buried in the church of the said blessed Augustine, [in the year 1439.]
      - type: text
        text: At Mons, in Hainaut, [in the year 686,] the blessed Waldetrude, [First Abbess of Mons and Foundress of that City,] famous for the holiness of her life and for her miracles.
      la:
      - type: text
        text: Quinto Idus Aprílis
      - type: text
        text: ''
      - type: text
        text: In Iudǽa sanctæ Maríæ Cléophæ, quam beátus Ioánnes Evangelísta sorórem sanctíssimæ Dei Genitrícis Maríæ núncupat, et cum hac simul iuxta crucem Iesu stetísse narrat.
      - type: text
        text: Antiochíæ sancti Próchori, qui fuit unus de septem primis Diáconis; et, fide ac miráculis clarus, martýrio coronátus est.
      - type: text
        text: Romæ natális sanctórum Mártyrum Demétrii, Concéssi, Hilárii et Sociórum.
      - type: text
        text: Cæsaréæ, in Cappadócia, sancti Eupsýchii Mártyris, qui ob evérsum Fortúnæ fanum, sub Iuliáno Apóstata, martýrium consummávit.
      - type: text
        text: In Africa sanctórum Mártyrum Massylitanórum, in quorum die natáli sanctus Augustínus tractátum hábuit.
      - type: text
        text: Sírmii pássio sanctárum septem Vírginum et Mártyrum, quæ, dato simul prétio sánguinis, vitam mercátæ sunt ætérnam.
      - type: text
        text: Amidæ, in Mesopotámia, sancti Acátii Epíscopi, qui pro rediméndis captívis étiam vasa Ecclésiæ conflávit ac véndidit.
      - type: text
        text: Rotómagi sancti Hugónis, Epíscopi et Confessóris.
      - type: text
        text: In civitáte Diénsi, in Gállia, sancti Marcélli Epíscopi, miráculis clari.
      - type: text
        text: Móntibus, in Hannónia, beátæ Waldetrúdis, vitæ sanctimónia et miráculis claræ.
      - type: text
        text: Romæ Translátio córporis sanctæ Mónicæ, matris beáti Augustíni Epíscopi; quod, ex Ostiis Tiberínis, Martíno Quinto Summo Pontífice, in Urbem delátum, in Ecclésia eiúsdem beáti Augustíni honorífice recónditum fuit.
  psalm.quinto-idus-aug-sti-674c64c781:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the eve of the holy martyr Lawrence.
      - type: text
        text: Upon the same 9th day of August, we keep in England the feast of the holy Oswald, King of the Northumbrians, whose acts are written by the Venerable Priest Bede, and of whom mention is made upon the 5th day of this same month.
      - type: citation
        text: 'Upon the same 9th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 258,] the holy soldier Romanus, who was so wrought upon by the confession of the blessed Lawrence that he sought baptism at his hands, and was presently arraigned, beaten with clubs, and then beheaded.
      - type: text
        text: In Tuscany, [in the year 261,] the holy martyrs Secundian, Marcellian, and Verian. In the time of the Emperor Decius the Consular Promotus caused them first to be hided, then hung upon the rack, scarified with hooks, and burnt in the sides, thereafter they were beheaded, and so gained the palm of victory through martyrdom.
      - type: text
        text: At Verona, the holy martyrs Firmus and Rusticus, in the time of the Emperor Maximian.
      - type: text
        text: In Africa, [in the third century,] many holy martyrs, who at the exhortation of holy Numidicus gained the palm of martyrdom in the persecution under the Emperor Valerian by being cast into the fire. Numidicus himself was thrown upon the burning fire along with the others, and then covered with stones but when his daughter dug him out there was still some life left in him, he was healed, and afterwards by his worthy life obtained from blessed Cyprian admission as a Priest to the Church at Carthage.
      - type: text
        text: At Constantinople, [in the year 730,] the holy martyrs Julian, Marcian, and eight others, who were long tortured, and then slain with the sword by command of the wicked Emperor Leo, on account of the image of the Saviour which they had set up in the Brazen Gate.
      - type: text
        text: At Châlons[-sur-Marne], in Gaul, [in the fourth century,] the holy Confessor Domitian, [third] Bishop [of that see.]
      la:
      - type: text
        text: Quinto Idus Augústi
      - type: text
        text: ''
      - type: text
        text: Vigília sancti Lauréntii Mártyris.
      - type: text
        text: Romæ sancti Románi, mílitis et Mártyris; qui, confessióne beáti Lauréntii compúnctus, pétiit ab eo baptizári, et, mox exhíbitus ac fústibus cæsus, ad últimum decollátus est.
      - type: text
        text: In Túscia natális sanctórum Mártyrum Secundiáni, Marcelliáni et Veriáni; qui, témpore Décii, a Promóto Consulári primum cæsi sunt, deínde in equúleo suspénsi, et abrási úngulis, atque igne latéribus appósito assáti, ac tandem triumphálem martýrii palmam, cápite cæsi, meruérunt.
      - type: text
        text: Verónæ sanctórum Mártyrum Firmi et Rústici, qui, témpore Maximiáni Imperatóris, sub Anolíno Iúdice, cum sacrificáre idólis renúerent et constánter in Christi fide persísterent, ambo iussi sunt, post ália superáta supplícia, fústibus cædi et cápite amputári.
      - type: text
        text: In Africa commemorátio plurimórum sanctórum Mártyrum, qui, in persecutióne Valeriáni, hortánte eos ad constántiam sancto Numídico, in ignem coniécti, martýrii palmam adépti sunt. Ipse autem Numídicus, licet cum áliis in rogum iniéctus et lapídibus óbrutus fuísset, a fília tamen, effóssus et semivívus repértus, curátus est; ac póstea, ob eius virtútem, in Ecclésiæ Carthaginénsis Presbýterum a beáto Cypriáno méruit cooptári.
      - type: text
        text: Constantinópoli sanctórum Mártyrum Iuliáni, Marciáni et aliórum octo; qui, ob Salvatóris imáginem, quam in porta ǽnea constitúerant, omnes, ímpii Leónis Imperatóris iussu, post multa torménta, gládio necáti sunt.
      - type: text
        text: Cataláuni, in Gállia, sancti Domitiáni, Epíscopi et Confessóris.
  psalm.quinto-idus-dec-mbris-c715ab652e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 9th of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Toledo, in Spain, the holy Virgin and martyr Leocadia. In the persecution under the Emperor Diocletian she suffered a terrible imprisonment under Dacian, Prefect of Spain, and when she heard of the grievous torments of blessed Eulalia and the other martyrs, she knelt down in prayer and gave up her unstained spirit to Christ (,in the year 303).
      - type: text
        text: At Carthage, the holy martyr Restitutus, Bishop (of that see,) concerning whom on whose solemn feastday holy Augustine preached a discourse to the people.
      - type: text
        text: Likewise in Africa, the holy martyrs Peter, Successus, Bassian, Primitivus, and twenty others.
      - type: text
        text: At Limoges, in France, (in the year 46,) the holy Virgin and martyr Valeria.
      - type: text
        text: At Verona, holy Proculus, Bishop (of that see, in the fourth century.) In the persecution under the Emperor Diocletian he was buffeted and cudgelled and thrust out of the city, but was at length restored to his own church and fell asleep in peace.
      - type: text
        text: At Pavia, holy Syrus, the first Bishop of that city, who was eminent for the signs and powers of an apostle.
      - type: text
        text: At Apamea, in Syria, blessed Julian, Bishop, who shone with holiness in the time of the Emperor Severus.
      - type: text
        text: At Perigueux, in France, (about the year 586,) the holy Abbot Cyprian, a man of great holiness. (He lived as a hermit in the latter part of his life near Dordogne, at a place now called after him.)
      - type: text
        text: At Nazianzus, (about the year 371,) holy Gorgonia, sister of blessed Gregory the theologian, who hath written of her graces and miracles.
      - type: text
        text: At Grai, in Burgundy, (in the year 1636,) holy Peter Fourier, Canon Regular of Our Saviour, founder of the Canonesses Regular of Our Lady for the education of girls whom, illustrious for his virtues and miracles, Leo XIII added him to the roll of the Saints.
      la:
      - type: text
        text: Quinto Idus Decémbris
      - type: text
        text: ''
      - type: text
        text: Carthágine sancti Restitúti, Epíscopi et Mártyris, in cuius solemnitáte sanctus Augustínus de ipso ad pópulum sermónem hábuit.
      - type: text
        text: Item in Africa sanctórum Mártyrum Petri, Succéssi, Bassiáni, Primitívi et aliórum vigínti.
      - type: text
        text: Toléti, in Hispánia, natális sanctæ Leocádiæ, Vírginis et Mártyris; quæ, in persecutióne Diocletiáni Imperatóris, a Præfécto Hispaniárum Daciáno inclúsa cárcere ac dire maceráta, in eo tandem, cum gravíssimos beátæ Euláliæ et reliquórum Mártyrum cruciátus audísset, impollútum spíritum, génibus in oratióne pósitis, Christo réddidit.
      - type: text
        text: Lemóvicis, in Aquitánia, sanctæ Valériæ, Vírginis et Mártyris.
      - type: text
        text: Verónæ sancti Próculi Epíscopi, qui, in persecutióne Diocletiáni, cólaphis ac fústibus cæsus, e civitáte pulsus est, ac tandem, in Ecclésiam suam restitútus, quiévit in pace.
      - type: text
        text: Pápiæ sancti Syri, qui fuit primus eiúsdem civitátis Epíscopus, atque apostólicis signis et virtútibus cláruit.
      - type: text
        text: Apaméæ, in Sýria, beáti Iuliáni Epíscopi, qui, témpore Sevéri, sanctitáte refúlsit.
      - type: text
        text: Graii, in Burgúndia, sancti Petri Fourier, qui Canónicus Reguláris fuit Salvatóris Nostri, et Canonissárum Regulárium Dóminæ Nostræ edocéndis puéllis Institútor; atque, virtútibus ac miráculis clarus, a Leóne Décimo tértio, Pontífice Máximo, Sanctórum catálogo adiúnctus est.
      - type: text
        text: Petragóricis, in Gállia, sancti Cypriáni Abbátis, magnæ sanctitátis viri.
      - type: text
        text: Naziánzi, in Cappadócia, sanctæ Gorgóniæ, quæ fuit beátæ Nonnæ fília, atque beatórum Gregórii Theológi et Cæsárii soror, cuius ipse Gregórius virtútes et mirácula conscrípsit.
  psalm.quinto-idus-febru-rii-6506f01ed1:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Cyril, Pope of Alexandria, a most eminent champion of the Catholic faith, and illustrious for his teaching and holiness, of whom mention is made upon the 28th day of January, on the which day he fell asleep in peace.
      - type: citation
        text: 'Upon the same 9th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, [in the year 249,] the holy Virgin Apollonia. The persecutors under the Emperor Decius first beat out all her teeth, then they built and kindled a funeral fire and threatened to burn her alive upon it unless she would join them in uttering sinful words. She thought a little while within herself, and then the fire of the Holy Ghost flaming up within her, she tore herself suddenly out of the hands of those wicked men and leapt of her own accord into the fire which they had made ready, so that the very actors in this cruelty were awestruck to find a woman more ready to die than were they to kill her.
      - type: text
        text: At Rome, the holy martyrs Alexander, and thirty-eight others who were crowned at the same time.
      - type: text
        text: At Solis, in Cyprus, the holy martyrs Ammonius and Alexander.
      - type: text
        text: At Antioch, [in the year 260,] the holy martyr Nicephorus, who received his crown by being beheaded, under the Emperor Valerian.
      - type: text
        text: In Africa, in the castle of Lemele, the holy Deacons Primus and Donates, who suffered martyrdom in defending the altar in the church against the Donatists, [sixth century.]
      - type: text
        text: In the monastery of Fontenelle, holy Ausbert, Bishop of Rouen, [in the year 695.]
      - type: text
        text: At Canosa, in Apulia, the holy Confessor Sabinus, Bishop of that see, [in the year 566.]
      la:
      - type: text
        text: Quinto Idus Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Cyrílli, Epíscopi Alexandríni, Confessóris et Ecclésiæ Doctóris, cuius dies natális quinto Kaléndas Februárii recensétur.
      - type: text
        text: Alexandríæ natális sanctæ Apollóniæ, Vírginis et Mártyris, cui persecutóres, sub Décio, dentes omnes primum excussérunt. Deínde, constrúcto ac succénso rogo, iídem commináti sunt, nisi cum eis ímpia verba proférret, vivam se eam incensúros; at illa, cum páululum intra semetípsam deliberásset, repénte se de mánibus impiórum prorípuit, et in ignem, quem paráverant, maióre Sancti Spíritus flamma intus ǽstuans, sponte ita prosilívit, ut perterreréntur étiam ipsi crudelitátis auctóres, quod prómptior invénta esset ad mortem fémina quam persecútor ad pœnam.
      - type: text
        text: Romæ pássio sanctórum Mártyrum Alexándri et aliórum trigínta octo coronatórum.
      - type: text
        text: In castéllo Lemelénsi, in Africa, sanctórum Mártyrum Primi et Donáti Diaconórum, qui, cum altáre in Ecclésia tutaréntur, a Donatístis occísi sunt.
      - type: text
        text: Solis, in Cypro, sanctórum Mártyrum Ammónii et Alexándri.
      - type: text
        text: Antiochíæ sancti Nicéphori Mártyris, qui sub Valeriáno Imperatóre, cápite cæsus, martýrii corónam accépit.
      - type: text
        text: In monastério Fontanéllæ, in Gállia, sancti Ansbérti, Rotomagénsis Epíscopi.
      - type: text
        text: Canúsii, in Apúlia, sancti Sabíni, Epíscopi et Confessóris; qui (ut beátus Gregórius Papa refert), prophétiæ spíritu ac miraculórum dono prǽditus, sibi iam cæco exhíbitum a fámulo, prǽmiis corrúpto, venéni póculum divíno agnóvit instinctu, sed, prænuntiáta mox a Deo suménda de corruptóre vindícta signóque Crucis facto, venénum secúrus ébibit ac nullum ex eo nocuméntum accépit.
  psalm.quinto-idus-i-lii-ef6bb49e21:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy brethren Cyril and Methodius, Bishops, who brought many peoples and kings to believe in Christ, and of whom mention is made on the 9th day of March.
      - type: citation
        text: 'Upon the same 11th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the blessed martyr Pope Pius I., [most likely reigned from 142-157,] who was crowned with martyrdom in the persecution under the Emperor Marcus Aurelius Antoninus.
      - type: text
        text: At Nicopolis, in Armenia, [in the fourth century,] the holy martyrs Januarius and Pelagia, who finished their testimony after having been tormented for four days with the rack, with hooks, and with potsherds.
      - type: text
        text: In the country of Sens, [in the third century,] the holy martyr Sidronius.
      - type: text
        text: At Iconium, the holy martyr Marcian, who under the President Perennius through many torments attained the palm, [in the year 243.]
      - type: text
        text: At Side, in Pamphylia, the holy Priest Cindeus, [third century.] In the persecution under the Emperor Diocletian, the President Stratonicus caused him to be many ways tormented, and afterwards cast into the fire there he remained unhurt, but afterwards, while he was praying, gave up the ghost.
      - type: text
        text: At Brescia, the holy martyrs Savinus and Cyprian, [martyrs in the Diocese of Poitiers, in the fifth or sixth century.] [La Bresse, in France, the native place of these saints, must be meant instead of Brescia, and probably the last entry on this day is merely a repetition.]
      - type: text
        text: At Bergamo, [in Lombardy, in the year 683,] holy John, Bishop [of that see,] who was slain by the Arians for guarding the Catholic faith.
      - type: text
        text: At Cordova, the holy Priest Abundius, who was crowned with martyrdom, [in the year 854,] for inveighing against Mohammedanism.
      - type: text
        text: In the country of Poitiers, the holy Confessor Sabinus, [sixth century.]
      la:
      - type: text
        text: Quinto Idus Iúlii
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Pii Primi, Papæ et Mártyris; qui martýrio coronátus est in persecutióne Marci Aurélii Antoníni.
      - type: text
        text: Bergómi sancti Ioánnis Epíscopi, qui, ob tuéndam cathólicam fidem, ab Ariánis occísus est.
      - type: text
        text: Sidæ, in Pamphýlia, sancti Cindéi Presbýteri, qui, sub Diocletiáno Imperatóre et Stratoníco Prǽside, post multa torménta, iniéctus in ignem et nil læsus, demum in oratióne réddidit spíritum.
      - type: text
        text: Córdubæ, in Hispánia, sancti Abúndii Presbýteri, qui, in persecutióne Arábica, cum in Mahumétis sectam inveherétur, martýrio coronátus est.
      - type: text
        text: Nicópoli, in Arménia, natális sanctórum Mártyrum Ianuárii et Pelágiæ, qui, equúleo, úngulis et testárum fragméntis per dies quátuor cruciáti, martýrium implevérunt.
      - type: text
        text: In território Senonénsi sancti Sidronii Mártyris.
      - type: text
        text: Icónii, in Lycaónia, sancti Marciáni Mártyris, qui, sub Perénnio Prǽside, per multa torménta pervénit ad palmam.
      - type: text
        text: Bríxiæ sanctórum Mártyrum Savíni et Cypriáni.
      - type: text
        text: In território Pictaviénsi sancti Sabíni Confessóris.
  psalm.quinto-idus-i-nii-0e69e9bc05:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 9th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Upon the Celian Mount of Rome, the holy Martyrs Primus and Felician, who suffered under the Emperors Diocletian and Maximian. These glorious martyrs had led a long life together, and had suffered diverse and dreadful torments sometimes together, and sometimes apart. At length they brought their happy fight to a close, being beheaded under Promotus, President of Mentana.
      - type: text
        text: At Agen, in Gaul, [in the third century,] suffered the holy martyr Vincent the Levite.
      - type: text
        text: At Antioch, [in the year 304,] the holy Virgin martyr Pelagia, whom holy Ambrose and John Chrysostom do greatly praise.
      - type: text
        text: At Syracuse, [in the year 594,] holy Maximian, Bishop [of that see,] of whom holy Pope Gregory the Great doth oftentimes make mention.
      - type: text
        text: At Andria, in Apulia, [in the twelfth century,] holy Richard, the first Bishop of that city, famous for wondrous works.
      - type: text
        text: In Scotland, [in the year 597,] holy Colum, Priest and Confessor, [founder and first Abbot of Iona.]
      - type: text
        text: At Edessa, in Syria, [in the fourth century,] the holy monk Julian, whose illustrious acts are written by the holy Deacon Ephraim.
      la:
      - type: text
        text: Quinto Idus Iúnii
      - type: text
        text: ''
      - type: text
        text: Noménti, in Sabínis, natális sanctórum Mártyrum Primi et Feliciáni fratrum, sub Diocletiáno et Maximiáno Imperatóribus. Hi gloriósi Mártyres, cum longǽvam in Dómino vitam duxíssent, et nunc simul pária, nunc singillátim divérsa et exquisíta pertulíssent torménta, ambo tandem felícis pugnæ cursum, a Nomentáno Prǽside Promóto animadvérsi gládio, consummavérunt. Ipsórum autem Mártyrum córpora, póstea Romam transláta, in Ecclésia sancti Stéphani Protomártyris, in monte Cǽlio, honorífice collocáta sunt.
      - type: text
        text: Agénni, in Gállia, pássio sancti Vincéntii, Levítæ et Mártyris, qui, ob Christi fidem, verbéribus diríssime cæsus et gládio decollátus est.
      - type: text
        text: Apud Antiochíam sanctæ Pelágiæ, Vírginis et Mártyris, quam sancti Ambrósius et Ioánnes Chrysostómus magnis éfferunt láudibus.
      - type: text
        text: Syracúsis, in Sicília, sancti Maximiáni Epíscopi, cuius sanctus Gregórius Papa sǽpius méminit.
      - type: text
        text: Andriæ, in Apúlia, sancti Richárdi, qui fuit primus eiúsdem civitátis Epíscopus, et miráculis cláruit.
      - type: text
        text: In Ióna, Scótiæ ínsula, sancti Colúmbæ, Presbýteri et Abbátis.
      - type: text
        text: Edéssæ, in Sýria, sancti Iuliáni Mónachi, cuius præclára gesta sanctus Ephræm Diáconus scripsit.
  psalm.quinto-idus-ianu-rii-56dd432d1d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 9th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, in the persecution under the Emperors Diocletian and Maximian, the holy martyr Julian, along with whom is commemorated the holy Virgin Basilissa, his wife, who kept her virginity with her husband and ended her life in peace. A multitude of priests and ministers of the Church of Christ had taken refuge with them because of the fury of the persecution. They were burnt with fire, and Julian, by command of the President Marcian, was thereafter made to suffer many torments and was then beheaded.
      - type: text
        text: Along with him there suffered also the Priest Anthony and Anastasius, whom Julian had raised from the dead and made a partaker of the grace of Christ, and the lad Celsus, together with his mother, Marcionilla, and seven brethren, and many others.
      - type: text
        text: In Morocco, (in the fourth century,) the holy Virgin and martyr Marciana, who was thrown to wild beasts and so finished her testimony.
      - type: text
        text: At Smyrna, the holy martyrs Vitalis (probably a Bishop, and the others were most likely Deacons), Revocatus, and Fortunatus.
      - type: text
        text: In Africa, the holy martyrs Epictetus, Jucundus, Secundus, Vitalis, Felix, and seven others, (in the year 205.)
      - type: text
        text: At Sebaste, in Armenia, (in the year 392,) holy Peter, Bishop (of that see,) brother of holy Basil the Great (also of St. Gregory of Nyssa. His father was St. Basil the Elder, his mother St. Emmelia, and his grandmother St. Macrina. He was made head of his convent in the year 362, when St. Basil was made bishop, St. Basil having before been Abbot thereof.)
      - type: text
        text: At Ancona, holy Marcellinus, Bishop of that city, the which, as holy Gregory writeth, he did through the power of God deliver from burning. (He succeeded St. Traso in the Bishopric about the year 550, and was followed by St. Thomas about the year 569. He is secondary Patron of Ancona.)
      la:
      - type: text
        text: Quinto Idus Ianuárii
      - type: text
        text: ''
      - type: text
        text: Antiochíæ, sub Diocletiáno et Maximiáno, natális sanctórum Iuliáni Mártyris, et Basilíssæ Vírginis, ipsíus Iuliáni uxóris. Hæc, virginitáte cum viro suo serváta, in pace vitam finívit; Iuliánus vero (postquam multitúdo Sacerdótum et Ministrórum Ecclésiæ Christi, quæ, propter immanitátem persecutiónis, ad eos confúgerat, igne cremáta est), Marciáni Prǽsidis iussu, plúrimis torméntis cruciátus, capitálem senténtiam accépit. Cum ipso étiam Antónius Présbyter, et Anastásius, quem idem Iuliánus, a morte suscitátum, grátiæ Christi partícipem fécerat, et Celsus puer cum huius matre Marcionílla, ac septem fratres, aliíque plúrimi passi sunt.
      - type: text
        text: Smyrnæ sanctórum Mártyrum Vitális, Revocáti et Fortunáti.
      - type: text
        text: In Africa sanctórum Mártyrum Epictéti, Iucúndi, Secúndi, Vitális, Felícis et aliórum septem.
      - type: text
        text: In Mauritánia Cæsariénsi sanctæ Marciánæ Vírginis, quæ, béstiis trádita, martýrium consummávit.
      - type: text
        text: Sebáste, in Arménia, sancti Petri Epíscopi, fílii sanctórum Basilíi et Emméliæ, atque fratris item sanctórum Basilíi Magni et Gregórii Nysséni Episcopórum, ac Macrinæ Vírginis.
      - type: text
        text: Anconæ sancti Marcellíni Epíscopi, qui urbem illam (ut sanctus Gregórius Papa scribit) divína virtúte ab incéndio liberávit.
  psalm.quinto-idus-m-rtii-5d807e90a2:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor John of God, founder of the Order of Brethren Hospitallers of the Sick. Famous for his pity toward the poor, and for his lowly esteem of himself, whom the Supreme Pontiff Leo XIII declared the Patron in heaven of all the sick and those who nurse them, and of whom mention hath been made upon the 8th day of this present month of March.
      - type: citation
        text: 'Upon the same 11th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Carthage, the holy martyrs Heraclius and Zosimus.
      - type: text
        text: At Alexandria, the holy martyrs Candidus, Piperion, and twenty others.
      - type: text
        text: At Laodicea, in Syria, in the persecution under the Emperor Diocletian, the holy martyrs Trophimus and Thalus, who after many cruel torments gained crowns of glory.
      - type: text
        text: At Antioch, are commemorated many holy martyrs, of whom some were laid upon beds of red-hot iron by command of the Emperor Maximian, not until they died, but until their flesh was cooked, so as to ensure their prolonged suffering and others were put to other most cruel torments, before they received the crown of martyrdom.
      - type: text
        text: Likewise the holy martyrs Gorgonius and Firmus.
      - type: text
        text: At Cordova, the holy Priest Eulogius, who deserved a place among the martyrs of the said city, in the persecution under the Saracens, by striving by his writings to rival their contendings for the faith, [in the year 859]
      - type: text
        text: At Sardis, holy Euthymius, Bishop of that see, who for his honouring of holy images was banished by the Iconoclast Emperor Michael, and martyred under Theophilus.
      - type: text
        text: At Jerusalem, holy Sophronius, Bishop of that see, [about the year 638.]
      - type: text
        text: At Milan, holy Benedict, Bishop of that see, [about the year 725]
      - type: text
        text: In the neighbourhood of Amiens, the holy Abbot Firmin.
      - type: text
        text: At Carthage, the holy Confessor Constantine.
      - type: text
        text: At Bauco, the holy Confessor Peter, eminent for the fame of his miracles. [A Spanish soldier who lived as a hermit in Italy.]
      la:
      - type: text
        text: Quinto Idus Mártii
      - type: text
        text: ''
      - type: text
        text: Sardis sancti Euthýmii Epíscopi, qui, ob cultum sanctárum Imáginum, a Michaéle, Imperatóre Iconoclásta, in exsílium missus est; ac demum, Theóphilo imperánte, búbulis nervis inhumániter cæsus, martýrium consummávit.
      - type: text
        text: Córdubæ, in Hispánia, sancti Eulógii, Presbýteri et Mártyris; qui, in persecutióne Saracenórum, ob præcláram et intrépidam Christi confessiónem, verbéribus et álapis cæsus ac decollátus gládio, adiúngi eiúsdem urbis Martýribus méruit, quorum pro fide certámina scribéndo fúerat æmulátus.
      - type: text
        text: Carthágine sanctórum Mártyrum Heráclii et Zósimi.
      - type: text
        text: Alexandríæ pássio sanctórum Cándidi, Piperiónis et aliórum vigínti.
      - type: text
        text: Laodicéæ, in Sýria, sanctórum Mártyrum Tróphimi et Thali, qui in persecutióne Diocletiáni, post multa sǽvaque torménta, corónas glóriæ sunt assecúti.
      - type: text
        text: Antiochíæ commemorátio plurimórum sanctórum Mártyrum, quorum álii, Maximiáni Imperatóris mandáto, candéntibus cratículis superpósiti, non ad mortem sed ad diutúrnum cruciátum assáti, álii áliis sævíssimis affécti supplíciis, ad palmam martýrii pervenérunt.
      - type: text
        text: Item sanctórum Mártyrum Gorgónii et Firmi.
      - type: text
        text: Hierosólymis sancti Sophrónii Epíscopi.
      - type: text
        text: Medioláni sancti Benedícti Epíscopi.
      - type: text
        text: In fínibus Ambianénsium sancti Firmíni Abbátis.
      - type: text
        text: Carthágine sancti Constantíni Confessóris.
      - type: text
        text: Babúci, in Hérnicis, sancti Petri Confessóris, miraculórum glória conspícui.
  psalm.quinto-idus-maii-994d865119:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Pope of Rome, Pius, fifth of that name, a Friar Preacher, of whom mention is made upon the 5th day of this present month. He toiled manfully and hopefully for the restoration of the discipline of the Church, for the extirpation of heresies, and for the defeat of the enemies of the Christian name, and ruled the Catholic Church in holiness of life and government.
      - type: citation
        text: 'Upon the same 11th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Salarian Way, the blessed Priest Anthimus. After he had done excellently well in power and preaching, he was thrown into the Tiber during the persecution under Diocletian, and thence delivered by an angel, who brought him back to his own oratory but he was lastly beheaded, and so passed into heaven as a conqueror.
      - type: text
        text: Upon the same day, the holy martyr Evellius. He was one of Nero's household, who believed on Christ on seeing the passion of the holy martyr Torpes, and was therefore beheaded.
      - type: text
        text: Also at Rome, the holy martyrs Maximus, Bassus, and Fabius, who were killed upon the Salarian Way, in the persecution under Diocletian.
      - type: text
        text: At Camarino, the holy martyrs Anastasius and his Companions, who were put to death under Antiochus the President, in the persecution under Decius.
      - type: text
        text: At Osimo, in Picenum, the holy martyrs Sisinnius the Deacon, Diocletius, and Florence, disciples of the holy Priest Anthimus, who finished their testimony by being stoned to death, in the persecution under Diocletian.
      - type: text
        text: At Varennes, [in the eighth century,] the holy martyr Gangulph.
      - type: text
        text: At Vienne, [toward the end of the fifth century,] the holy Mamertus, Bishop [of that see,] who, on account of a threatening volcanic eruption, instituted in that city the solemn Rogation processions upon the three days before the Ascension of the Lord, the which custom the Universal Church hath since approved by adopting it.
      - type: text
        text: At Sauvigny, [in the year 994,] deceased holy Majolus, Abbot of Cluny, whose life was illustrious for holy and worthy deeds.
      - type: text
        text: At the town now called San Severino, in Picenum, the holy Confessor Illuminatus.
      - type: text
        text: In the town of Grotaglia, in the Diocese of Taranto, [in the year 1716,] the holy Confessor Francis di Girolamo, of the Society of Jesus, an example of singular love and patience in seeking the salvation of souls. Pope Gregory XVI enrolled his name with those of the Saints. His burial is commemorated with great solemnity in the church of the Professed House of his Order at Naples, where his body lieth.
      la:
      - type: text
        text: Quinto Idus Maii
      - type: text
        text: ''
      - type: text
        text: Natális beatórum Philíppi et Iacóbi Apostolórum. Ex his Philíppus, cum omnem fere Scýthiam ad Christi fidem convertísset, tandem apud Hierápolim, Asiæ civitátem, cruci affíxus et lapídibus óbrutus, glorióso fine quiévit; Iacóbus vero, qui et frater Dómini légitur et primus Hierosolymórum Epíscopus, e pinna Templi præcipitátus, confráctis inde crúribus, ac fullónis fuste in cérebro percússus, intériit, ibíque, non longe a Templo, sepúltus est.
      - type: text
        text: Romæ, via Salária, item natális beáti Anthimi Presbýteri, qui, post virtútum et prædicatiónis insígnia, in persecutióne Diocletiáni, in Tíberim præcipitátus, et ab Angelo exínde eréptus, oratório próprio restitútus est; deínde, cápite punítus, victor migrávit ad cælos.
      - type: text
        text: Ibídem sancti Evéllii Mártyris, qui, cum esset de família Nerónis, ad passiónem sancti Torpétis in Christum crédidit, pro quo et decollátus est.
      - type: text
        text: Item Romæ sanctórum Mártyrum Máximi, Bassi et Fábii; qui sub Diocletiáno, via Salária, cæsi sunt.
      - type: text
        text: Auximi, in Picéno, sanctórum Mártyrum Sisínii Diáconi, Dioclétii et Floréntii, discipulórum sancti Anthimi Presbýteri; qui, sub Diocletiáno, lapídibus óbruti, martýrium complevérunt.
      - type: text
        text: Cameríni sanctórum Mártyrum Anastásii et Sociórum; qui, in persecutióne Décii, sub Antíocho Prǽside, cæsi sunt.
      - type: text
        text: Varénnis, in Gállia, sancti Gangúlphi Mártyris.
      - type: text
        text: Viénnæ, in Gállia, sancti Mamérti Epíscopi, qui, ob imminéntem cladem, solémnes ante Ascensiónem Dómini triduánas in ea urbe Litánias instítuit; quem ritum póstea universális Ecclésia recípiens comprobávit.
      - type: text
        text: Apud Silviníacum, in Gállia, deposítio sancti Maióli, Abbátis Cluniacénsis, cuius vita sanctis méritis fuit præclára.
      - type: text
        text: Neápoli, in Campánia, sancti Francísci de Hierónymo, in Tarentínæ diœcésis óppido Cryptaleárum orti, Sacerdótis e Societáte Iesu et Confessóris, exímiæ in salúte animárum procuránda caritátis et patiéntiæ viri; quem Gregórius Papa Décimus sextus in Sanctórum cánonem rétulit.
      - type: text
        text: Apud Septempedános, in Picéno, sancti Illumináti Confessóris.
      - type: text
        text: Cárali, in Sardínia, sancti Ignátii a Láconi, Confessóris, ex Ordine Minórum Capuccinórum, humilitáte, caritáte et miráculis præclári, quem Pius Papa Duodécimus Sanctórum honóribus decorávit.
  psalm.quinto-idus-nov-mbris-cd0af699be:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is kept the feast of the Dedication of the Cathedral Church of the Saviour at Rome, (in the year 324).
      - type: citation
        text: 'Upon the same 9th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Amasea, in Pontus, the holy soldier Theodore. In the time of the Emperor Maximian he was heavily flogged and cast into prison for his profession of the Christian faith, in prison the Lord appeared unto him, and bade him be steadfast and do manfully, then he was taken out and stretched upon the rack and torn with hooks until his inner parts were seen, and lastly he was thrown into the fire. Holy Gregory of Nyssa hath told his praises in a noble discourse.
      - type: text
        text: At Tyana, in Cappadocia, under the Emperor Diocletian, the holy martyr Orestes.
      - type: text
        text: At Thessalonica, under the Emperor Maximian, the holy martyr Alexander.
      - type: text
        text: At Bourges, the holy Confessor Ursinus, who was ordained at Rome by the successors of the Apostles, and sent to that city as the first Bishop thereof.
      - type: text
        text: At Naples, in Campania, holy Agrippinus, Bishop (of that see,) famous for miracles.
      - type: text
        text: At Constantinople, the holy Virgins Eustolia of Rome, and Sopatra, daughter of the Emperor Maurice.
      - type: text
        text: At Beirut, in Lebanon, is made commemoration of an image of the Saviour which was crucified by the Jews, (about the year 765,) and so much Blood flowed therefrom, that the Churches both of the East and West have plentifully received thereof.
      la:
      - type: text
        text: Quinto Idus Novémbris
      - type: text
        text: ''
      - type: text
        text: Romæ, in Lateráno, Dedicátio Basílicæ sanctíssimi Salvatóris, quæ ómnium Urbis et Orbis Ecclesiárum est mater et caput.
      - type: text
        text: Amaséæ, in Ponto, natális sancti Theodóri mílitis, qui, témpore Maximiáni Imperatóris, pro Christiánæ fídei confessióne, fórtiter cæsus et in cárcerem missus; deínde, Dómino sibi apparénte ac monénte ut constánter et viríliter ágeret, relevátus est; novíssime, postquam in equúleo suspénsus et úngulis ita excarnificátus est, ut eius interióra apparérent nuda, ardéntibus ígnibus comburéndus tráditur. Ipsíus vero laudes sanctus Gregórius Nyssénus præcláro encómio celebrávit.
      - type: text
        text: Tyánæ, in Cappadócia, pássio sancti Oréstis, sub Diocletiáno Imperatóre.
      - type: text
        text: Thessalonícæ sancti Alexándri Mártyris, sub Maximiáno Príncipe.
      - type: text
        text: Apud Bitúricas, in Aquitánia, sancti Ursíni Confessóris, qui, Romæ ordinátus a successóribus Apostolórum, primus eídem Bituricénsi urbi destinátur Epíscopus.
      - type: text
        text: Neápoli, in Campánia, sancti Agrippíni Epíscopi, miráculis clari.
      - type: text
        text: Constantinópoli sanctárum Vírginum Eustóliæ Románæ, et Sópatræ, fíliæ Maurítii Imperatóris.
      - type: text
        text: Berýti, in Sýria, commemorátio Imáginis Salvatóris, quæ, a Iudǽis crucifíxa, tam copiósum emísit sánguinem, ut Orientáles et Occidentáles Ecclésiæ ex eo ubértim accéperint.
  psalm.quinto-idus-oct-bris-57f9808ede:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the same 11th day of October, were born into the better life:'
      - type: text
        text: At Tarsus, in Cilicia, the holy martyrs Tharacus, Probus, and Andronicus, who suffered a long and foul imprisonment in the persecution under the Emperor Diocletian, were three times interrogated under torture and punishment, and, still confessing Christ, were beheaded, and so obtained a glorious triumph.
      - type: text
        text: In the country of the Vexin, under the President Fescenninus, the holy martyrs Nicasius, Bishop of Rouen, the Priest Quirinus, the Deacon Scubiculus, and the Virgin Pientia.
      - type: text
        text: Likewise the holy martyrs Anastasius the Priest, Placidus, Genesius, and their Companions.
      - type: text
        text: In the Thebaid, holy Sarmatas, a disciple of the blessed Abbot Antony, who was slain by the Saracens for Christ's sake.
      - type: text
        text: At Besancon, in Gaul, the holy martyr Germanus, Bishop (of that see.)
      - type: text
        text: At Uzes, in Gaul, (in the sixth century,) the holy Confessor Firmin, Bishop (of that see.)
      - type: text
        text: In Ireland, (in the year 600,) holy Kenneth, Abbot (of Aghaboe.)
      - type: text
        text: At Lier, in Belgium, (in the eighth century,) the holy Confessor Gummar.
      - type: text
        text: At Rennes, in Gaul, (in the ninth century,) the holy Confessor Emilian.
      - type: text
        text: At Tarsus, in Cilicia, the holy sisters Zenais and Philonilla, who were kinswomen of the blessed Apostle Paul according to the flesh, and his disciples in the faith.
      - type: text
        text: At Verona, (in the fifth century,) the holy Virgin Placidia.
      la:
      - type: text
        text: Quinto Idus Octóbris
      - type: text
        text: ''
      - type: text
        text: Festum Maternitátis beátæ Maríæ Vírginis.
      - type: text
        text: Tarsi, in Cilícia, sanctárum mulíerum Zenáidis et Philoníllæ sorórum, quæ beáti Pauli Apóstoli consanguíneæ et in fide fuérunt discípulæ.
      - type: text
        text: In pago Vilcassíno, in Gállia, pássio sanctórum Mártyrum Nicásii, qui erat Rotomagénsis Epíscopus, Quiríni Presbýteri, Scubículi Diáconi, et Piéntiæ Vírginis, sub Prǽside Fescenníno.
      - type: text
        text: Vesontióne, in Gálliis, sancti Germáni, Epíscopi et Mártyris.
      - type: text
        text: Item pássio sanctórum Anastásii Presbýteri, Plácidi, Genésii et Sociórum.
      - type: text
        text: Tarsi, in Cilícia, natális sanctórum Mártyrum Tháraci, Probi et Androníci; qui, in persecutióne Diocletiáni, longo témpore cárceris squalóre afflícti, et tértio divérsis torméntis et supplíciis examináti, tandem, in confessióne Christi, abscíssis cervícibus, triúmphum glóriæ sunt adépti.
      - type: text
        text: In Thebáide sancti Sármatæ, qui fuit discípulus beáti Antónii Abbátis, et a Saracénis pro Christo necátus est.
      - type: text
        text: Ucétiæ, in Gállia Narbonénsi, sancti Firmíni, Epíscopi et Confessóris.
      - type: text
        text: Calótii, in diœcési Asténsi, olim Papiénsi, sancti Alexándri Sauli, e Clericórum Regulárium sancti Pauli Congregatióne, Epíscopi et Confessóris; quem, génere, virtútibus, doctrína et miráculis clarum, Pius Décimus, Póntifex Máximus, Sanctórum fastis adscrípsit.
      - type: text
        text: In monastério Achadh-boénsi, in Hibérnia, sancti Cánici, Presbýteri et Abbátis.
      - type: text
        text: Lyræ, in Bélgio, deposítio sancti Gummári Confessóris.
      - type: text
        text: Apud Rhédones, in Gállia, sancti Æmiliáni Confessóris.
      - type: text
        text: Verónæ sanctæ Placídiæ Vírginis.
  psalm.quinto-idus-sept-mbris-1eb36184dc:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 9th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, the holy martyrs Dorotheus and Gorgonius. They stood high at the Court of the Emperor Diocletian. They denounced in his presence the persecution which he was raising against the Christians, wherefore he caused them to be hung up, and their whole bodies torn with lashes, then to have the skin taken off their bowels, to be covered with vinegar and salt, and cooked upon a gridiron, and at the last strangled. In after times the body of the blessed Gorgonius was brought to Rome, and laid first upon the Latin Way, and afterwards in the Basilica of St Peter.
      - type: text
        text: In the land of the Sabines, at the 30th milestone from the city of Rome, the holy martyrs Hyacinth, Alexander, and Tiburtius.
      - type: text
        text: At Sebaste, under the Emperor Licinius, the holy soldier Severian. He often visited the forty martyrs while they were in prison, whereupon Lysias the President ordered him to be hung up with a stone tied to his feet, and to be beaten and torn with stripes and lashes, under the which torment he gave up the ghost.
      - type: text
        text: On the same day, the holy martyr Straton, who, for Christ's sake, was bound to two trees and torn asunder, and so finished his testimony.
      - type: text
        text: Likewise the holy brethren Rufinus and Rufinian, both martyrs.
      - type: text
        text: At Rome, (in the year 701,) the holy Confessor Pope Sergius I.
      - type: text
        text: In the country of Therouanne, (in the seventh century,) holy Omer, Bishop (of that see.)
      - type: text
        text: In Ireland, (in the sixth century,) the holy Abbot Ciaran, (founder of Clonmacnois.)
      - type: text
        text: At Cartagena, in South America, (in the year 1654,) the holy Confessor Peter Claver, of the Society of Jesus, who toiled for more than forty years among the negro slaves with marvellous self-sacrifice and exceeding love, and of them with his own hand caused nearly three hundred thousand to be born again in Christ. His name was enrolled by the Supreme Pontiff Leo XIII among those of the Saints.
      la:
      - type: text
        text: Quinto Idus Septémbris
      - type: text
        text: ''
      - type: text
        text: Nicomedíæ pássio sanctórum Mártyrum Doróthei et Gorgónii, qui, cum essent apud Diocletiánum Augústum honóres amplíssimos consecúti, et persecutiónem, quam ille Christiánis inferébat, detestaréntur, præsénte eo, iussi sunt primo appéndi, et flagris toto córpore laniári; deínde, viscéribus pelle nudátis, acéto et sale perfúndi, sicque assári in cratícula; atque, ad últimum, láqueo necári. Interiécto autem témpore, beáti Gorgónii corpus Romam delátum fuit, ac via Latína pósitum, et inde ad Basílicam sancti Petri translátum.
      - type: text
        text: In Sabínis, trigésimo ab Urbe milliário, sanctórum Mártyrum Hyacínthi, Alexándri et Tibúrtii.
      - type: text
        text: Sebáste, in Arménia, sancti Severiáni, qui, cum Licínii Imperatóris esset miles, et Quadragínta Mártyres, in cárcere deténtos frequens visitáret, hinc, iussu Lýsiæ Prǽsidis, saxo ad pedes ligáto suspénsus est, ac, verbéribus cæsus et flagris laniátus, in torméntis réddidit spíritum.
      - type: text
        text: Eódem die pássio sancti Stratónis, qui pro Christo, ad duas árbores ligátus atque discérptus, martýrium consummávit.
      - type: text
        text: Item sanctórum Mártyrum Rufíni et Rufiniáni fratrum.
      - type: text
        text: In território Tarvanénsi, in Gállia, sancti Audomári Epíscopi.
      - type: text
        text: In monastério Cluanénsi, in Hibérnia, sancti Queráni, Presbýteri et Abbátis.
  psalm.quinto-kal-ndas-apr-lis-cdb97e71f3:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor John of Capistrano, of the Order of Friars Minors, illustrious for the holiness of his life, and his zeal for the propagation of the Catholic faith, who by his prayers and miracles procured the defeat of a vast army of Turks, and delivered the fortress of Belgrade from beleaguerment. Of whom mention is made upon the 23rd day of October.
      - type: citation
        text: 'Upon the same 28th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Caesarea, in Palestine, [about the year 260,] the holy martyrs Priscus, Malchus, and Alexander. During the persecution under the Emperor Valerian they were dwelling on a little plot of ground in the suburbs of the said city, and when heavenly crowns of martyrdom were then being offered, their love of God and faith in Him enkindled them to go openly to the judge, and to rebuke him for that he so raged after the blood of the godly, whereupon he forthwith commanded them to be devoured by wild beasts for Christ's name's sake.
      - type: text
        text: At Tarsus, in Cilicia, the holy martyrs Castor and Dorotheus.
      - type: text
        text: In Africa, the holy martyrs Rogatus, Successus, and sixteen others.
      - type: text
        text: At Rome, [in the year 440,] the holy Confessor Pope Sixtus III.
      - type: text
        text: At Nursia, [in the year 517,] the holy Abbot Speus, a man of wondrous patience, and when he passed away out of this life all his brethren saw his soul wing its flight heavenward in a bodily shape like a dove.
      - type: text
        text: At Chalons, in Gaul, the burial, [in the year 593,] of the holy Confessor Guntram, King of the Franks, who gave himself up so utterly to the things of the Spirit that he fled from the glory of the world, and gave all his goods for the churches, and the poor.
      la:
      - type: text
        text: Quinto Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis de Capistráno, Sacerdótis ex Ordine Minórum et Confessóris, cuius memória recólitur décimo Kaléndas Novémbris.
      - type: text
        text: Cæsaréæ, in Palæstína, natális sanctórum Mártyrum Prisci, Malchi et Alexándri. Hi tres, in persecutióne Valeriáni, cum in suburbáno agéllo supradíctæ urbis habitárent, atque in ea cæléstes martýrii proponeréntur corónæ, ultro Iúdicem, divíno fídei calóre succénsi, ádeunt, et cur tantum in sánguinem piórum desævíret, obiúrgant; quos ille contínuo, pro Christi nómine, béstiis trádidit devorándos.
      - type: text
        text: Tarsi, in Cilícia, sanctórum Mártyrum Castóris et Doróthei.
      - type: text
        text: In Africa sanctórum Mártyrum Rogáti, Succéssi et aliórum séxdecim.
      - type: text
        text: Apud Núrsiam sancti Spei Abbátis, miræ patiéntiæ viri, cuius ánima (ut refert sanctus Gregórius Papa), cum ex hac vita migráret, in colúmbæ spécie a cunctis frátribus visa est in cælum ascéndere.
      - type: text
        text: Cabillóne, in Gálliis, deposítio sancti Gunthrámni, Regis Francórum, qui spiritálibus actiónibus ita se mancipávit, ut, relíctis sǽculi pompis, thesáuros suos lárgiter Ecclésiis et paupéribus erogáret.
  psalm.quinto-kal-ndas-aug-sti-7d93bf3e82:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 28th day of July, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Pope Victor I.
      - type: text
        text: At Rome also, the holy Confessor Pope Innocent I.
      - type: text
        text: At Milan, the holy Nazarius, and Celsus a lad, both martyrs, whom Anolinus, during the madness of the persecution which Nero stirred up, caused to be beheaded, after they had been long maltreated and afflicted in prison.
      - type: text
        text: On the same day are commemorated many holy martyrs in the Thebaid, in Egypt, who suffered in the persecution under Decius and Valerian, when the Christians eagerly accepted death by the sword for Christ's name's sake, and the subtle enemy, seeking to slay souls rather than bodies, invented slower paths to death. One of them, after he had conquered the rack, and plates, and vessels of heated metal, had his hands tied behind his back and was smeared with honey, after which he was set in the burning sun, exposed to the stings of bees and flies. Another was tied down softly among flowers, and a shameless harlot was sent to excite him to lust, but he bit off the end of his tongue and spat it into her face as she was cajoling him.
      - type: text
        text: At Ancyra, in Galatia, the holy martyr Eustathius, who was put to the question with diverse kinds of torments, and cast into the river, whence he was delivered by an angel. But at length a dove came down to him from heaven, and called him away to his everlasting reward.
      - type: text
        text: At Miletus, the holy martyr Acatius, who, under the Emperor Licinius, after diverse torments, was cast into a furnace, where by the help of God he remained unhurt, and then finished his testimony by being beheaded.
      - type: text
        text: In Brittany, [in the sixth century,] the holy Confessor Samson, Bishop [of Dol.]
      - type: text
        text: At Lyon, [in the second century,] the holy Priest Peregrin, whose blessedness is attested by the glory of miracles.
      la:
      - type: text
        text: Quinto Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Medioláni natális sanctórum Mártyrum Nazárii, et Celsi púeri, quos Anolínus, sub rábie persecutiónis quæ per Nerónem excitáta est, diu macerátos et afflíctos in cárcere, gládio feríri iussit.
      - type: text
        text: Romæ pássio sancti Victóris Primi, Papæ et Mártyris. Item Romæ sancti Innocéntii Primi, Papæ et Confessóris, qui ad Dóminum migrávit quarto Idus Mártii.
      - type: text
        text: Thebáide, in Ægýpto, commemorátio plurimórum sanctórum Mártyrum, qui in Décii et Valeriáni persecutióne passi sunt, quando Christiánis, optántibus pro Christi nómine gládio pércuti, cállidus hostis, tarda ad mortem supplícia conquírens, ánimas cupiébat iuguláre, non córpora. Ex eórum número unus, post equúleos et láminas ac sartágines superátas, melle perúnctus, ligátis mánibus post tergum, sub ardentíssimo sole, fucórum ac muscárum acúleis expósitus fuit; álius, inter flores mólliter vinctus, cum ad eum, ut concitáret in libídinem, impudicíssimum scortum venísset, præcísam morsu linguam in blandiéntis fáciem éxspuit.
      - type: text
        text: Ancýræ, in Galátia, sancti Eustáthii Mártyris, qui, váriis tormentórum genéribus excruciátus, atque demérsus in flumen, sed inde ab Angelo eréptus, demum, colúmba e cælis adveniénte, ad prǽmia ætérna vocátus est.
      - type: text
        text: Miléti, in Cária, sancti Acátii Mártyris, qui, sub Licínio Imperatóre, post divérsas pœnas, iniéctus in fornácem ac Dei ope servátus illǽsus, cápitis abscissióne martýrium complévit.
      - type: text
        text: In Británnia minóre sancti Sampsónis, Epíscopi et Confessóris.
      - type: text
        text: Lugdúni, in Gállia, sancti Peregríni Presbýteri, cuius beatitúdinem glória miraculórum testátur.
  psalm.quinto-kal-ndas-dec-mbris-59ed6cd154:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the Feast of the holy Confessor Gregory, Archbishop of Neo-Caesarea, in Pontus, who was famous for teaching and holiness, and who came to be called the Wonder-worker, on account of the great signs and wonders which he worked to the great glory of the churches. Mention hath been made of him upon the 17th day of this present month of November.
      - type: citation
        text: 'Upon the same 27th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, the holy martyrs Basileus, Patriarch (of that see,) Auxilius, and Saturninus.
      - type: text
        text: In Persia, the holy martyr James, styled the Dismembered, a famous martyr. In the time of the Emperor Theodosius the younger, to please King Isdegerd, he denied Christ, wherefore his mother and his wife held aloof from him. Then he bethought himself, and went to the King and confessed Christ, and the King in wrath commanded him to be cut limb from limb, and his head to be cut off. At that time countless other martyrs suffered there also.
      - type: text
        text: At Sebaste, in Armenia, the holy martyrs Hirenarchus, the Priest Acacius, and seven women. It was the constancy of these women which moved Hirenarchus to turn to Christ, and he was beheaded along with Acacius, under Diocletian the Emperor and Maximus the President.
      - type: text
        text: At the river Cea, in Galicia, the holy martyrs Facundus and Primitivus, who suffered under the President Atticus.
      - type: text
        text: At Aquileia, (in the fourth century,) holy Valerian, Bishop (of that see).
      - type: text
        text: At Riez, in Gaul, (in the fifth century,) the holy Confessor Maximus, Bishop of that see, famous for signs and wonders. From his childhood he was endued with every grace, and was father of the monastery of Lerins, and afterward Bishop of the church of Riez.
      - type: text
        text: At Salzburg, (in the eighth century,) the holy Confessor Farrell, an Irishman, Bishop (of that see,) and Apostle of Carinthia, whose name the Supreme Pontiff Gregory IX enrolled among those of the Saints.
      - type: text
        text: In India, toward the borders of Persia, holy Barlaam and Josaphat, whose wonderful acts were written by holy John of Damascus.
      - type: text
        text: At Paris, (in the sixth century,) deceased the holy Monk and Solitary Severinus.
      la:
      - type: text
        text: Quinto Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Antiochíæ sanctórum Mártyrum Basiléi Epíscopi, Auxílii et Saturníni.
      - type: text
        text: Sebáste, in Arménia, sanctórum Mártyrum Hirenárchi, Acácii Presbýteri, ac septem mulíerum. Harum porro constántia Hirenárchus commótus, ad Christum convérsus, sub Diocletiáno Imperatóre et Máximo Prǽside, una cum Acácio, secúri percútitur.
      - type: text
        text: Apud Cæam flúvium, in Gallǽcia, sanctórum Facúndi et Primitívi, qui sub Attico Prǽside passi sunt.
      - type: text
        text: In Pérside sancti Iacóbi intercísi, Mártyris conspícui, qui, témpore Theodósii iunióris, cum in Isdegérdis Regis grátiam Christum negásset, et proptérea mater eius et uxor ab ipsíus se consuetúdine subtraxíssent, hinc, in se revérsus, intrépide coram Vararáne, Isdegérdis fílio ac successóre, se Christiánum esse conféssus est; ideóque ab iráto Rege, lata in eum mortis senténtia, membrátim iussus est concídi et cápite obtruncári. Quo étiam témpore innúmeri álii Mártyres ibídem passi sunt.
      - type: text
        text: Aquiléiæ sancti Valeriáni Epíscopi.
      - type: text
        text: Apud Régium, in Gállia, sancti Máximi, Epíscopi et Confessóris; qui, usque a primǽvæ ætátis annis omni virtútum grátia prǽditus, primum Lirinénsis cœnóbii Pater, deínde Regiénsis Ecclésiæ Epíscopus, signis et prodígiis ínclytus éxstitit.
      - type: text
        text: Salisbúrgi, in Nórico, sancti Virgílii, Epíscopi et Carinthiórum Apóstoli, qui a Gregório Nono, Pontífice Máximo, in Sanctórum númerum adscríptus est.
      - type: text
        text: Apud Indos, Persis finítimos, sanctórum Bárlaam et Iósaphat, quorum actus mirándos sanctus Ioánnes Damascénus conscrípsit.
      - type: text
        text: Lutétiæ Parisiórum deposítio sancti Severíni, Mónachi et Solitarii.
  psalm.quinto-kal-ndas-febru-rii-6c440ed3b2:
    role: psalm
    content:
      en:
      - type: text
        text: The feast of the holy Confessor Peter Nolasco, founder of the Order of Blessed Mary of Ransom, for the redemption of captives, who fell asleep in the Lord upon Christmas Eve.
      - type: text
        text: At Rome, the second Feast of holy Agnes.
      - type: citation
        text: 'Upon the same 28th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome likewise, the holy martyr Flavian, who suffered in the persecution under the Emperor Diocletian.
      - type: text
        text: At Apollonia, the holy martyrs Thyrsus, Leucius, Callinicus. In the time of the Emperor Decius they were tortured in diverse ways. Whereafter, Thyrsus and Callinicus were beheaded, and a voice from heaven called away Leucius, and he gave up the ghost, (in the year 250.)
      - type: text
        text: In the Thebaid, the holy martyrs Leonides and his companions, who secured the palm of martyrdom in the time of the Emperor Diocletian.
      - type: text
        text: At Alexandria, a multitude of holy martyrs, who upon this day were gathered together in a church at Communion, when they were massacred in diverse ways by the followers of the Arian Duke Syrianus, (in the year 376.) Likewise at Alexandria, the holy Confessor Cyril, Pope of that city a most eminent champion of the Catholic faith, and illustrious for his teaching and holiness, who fell asleep in peace, (in the year 444.) whose feast we keep upon the 9th day of February.
      - type: text
        text: At Zaragoza, (in the year 315,) holy Valerius, Bishop of that city.
      - type: text
        text: At Cuenca, in Spain, holy Julian, Bishop of that city, who gave the goods of his Church to the poor, and sought his food by working with his own hands after the manner of the Apostles, and fell asleep in peace, famous for miracles, (in the year 1207.) In the monastery of Rheims, (in the year 545,) the holy Priest John, a man of God.
      - type: text
        text: In Palestine, (in the sixth century,) the holy Hermit James, who, having fallen away, hid himself for a long time in a sepulchre to do penance, and passed away hence to be ever with the Lord, famous for miracles.
      la:
      - type: text
        text: Quinto Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Petri Nolásci Confessóris, qui Ordinis beátæ Maríæ de Mercéde redemptiónis captivórum éxstitit Fundátor, et octávo Kaléndas Ianuárii obdormívit in Dómino.
      - type: text
        text: Romæ sanctæ Agnétis, Vírginis et Mártyris, secúndo.
      - type: text
        text: Alexandríæ natális sancti Cyrílli, eiúsdem urbis Epíscopi, Confessóris et Ecclésiæ Doctóris; qui, cathólicæ fídei præclaríssimus propugnátor, doctrína et sanctitáte illústris quiévit in pace. Eius tamen festívitas quinto Idus Februárii celebrátur.
      - type: text
        text: Romæ sancti Flaviáni Mártyris, qui sub Diocletiáno passus est.
      - type: text
        text: Alexandríæ pássio plurimórum sanctórum Mártyrum, qui, hac ipsa die, a factióne Syriáni, Ducis Ariáni, dum in Ecclésia synáxim ágerent, divérso mortis génere sunt interémpti.
      - type: text
        text: Apollóniæ sanctórum Mártyrum Leúcii, Thyrsi et Calliníci; qui, témpore Décii Imperatóris, váriis tormentórum genéribus cruciáti, ac primus et últimus abscissióne cápitis, médius cælésti voce evocátus spíritum reddens, martýrium consummárunt.
      - type: text
        text: In Thebáide sanctórum Mártyrum Leónidæ et Sociórum, qui, témpore Diocletiáni, palmam martýrii sunt assecúti.
      - type: text
        text: Cæsaraugústæ, in Hispánia, sancti Valérii Epíscopi.
      - type: text
        text: Conchæ, in Hispánia, natális sancti Iuliáni Epíscopi, qui, érogans in páuperes bona Ecclésiæ, ópera mánuum sibi more Apostólico victum quærens, clarus miráculis quiévit in pace.
      - type: text
        text: In monastério Reomaénsi, in Gállia, deposítio sancti Ioánnis Presbýteri, viri Deo devóti.
      - type: text
        text: In Palæstína sancti Iacóbi Eremítæ, qui, post lapsum, diu, pæniténtiæ causa, in sepúlcro látuit, et clarus miráculis migrávit ad Dóminum.
  psalm.quinto-kal-ndas-i-lii-33b782b92c:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 27th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Galatia, holy Crescens, the disciple of the blessed Apostle Paul. He made a journey into Gaul, where by the word of his preaching he brought many to believe in Christ. Then he returned home, where he was specially appointed Bishop till the end of his life. He strengthened the Galatians in the work of the Lord, and at last finished his testimony under Trajan.
      - type: text
        text: At Cordova, [in the fourth century,] the holy martyrs Zoilus and nineteen others.
      - type: text
        text: At Caesarea, in Palestine, the holy martyr Anectus. In the persecution under Diocletian he exhorted others to martyrdom, and by his prayers caused the idols to fall down wherefore the President Urban caused him to be beaten by ten soldiers, and his hands and feet, and lastly his head, cut off, and so he received the crown of martyrdom.
      - type: text
        text: At Constantinople, [in the sixth century,] the holy Priest Samson, the harbourer of the poor.
      - type: text
        text: In the country of Tours, [in the sixth century,] the holy Priest and Confessor John.
      - type: text
        text: At Varadin, in Hungary, [in the year 1095,] holy King Ladislaw, who is famous for eminent miracles even unto the present day.
      la:
      - type: text
        text: Quinto Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: In Galátia sancti Crescéntis, qui fuit beáti Pauli Apóstoli discípulus. Hic, in Gállias tránsitum fáciens, verbo prædicatiónis multos ad fidem Christi convértit; regréssus vero ad gentem cui speciáliter datus erat Epíscopus, demum, sub Traiáno, cum Gálatas ipsos usque ad finem vitæ suæ in ópere Dómini confirmásset, martýrium consummávit.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Zóili, et aliórum decem et novem.
      - type: text
        text: Cæsaréæ, in Palæstína, sancti Anécti Mártyris, qui, in persecutióne Diocletiáni, sub Urbáno Prǽside, cum álios ad martýrium hortátus esset et idóla oratióne sua prostrásset, a decem milítibus verberári iussus est; ac tandem, mánibus pedibúsque præcísis, truncátus cápite, martýrii corónam accépit.
      - type: text
        text: Constantinópoli sancti Sampsónis Presbýteri, páuperum exceptóris.
      - type: text
        text: In castro Cainóne, in Gállia, sancti Ioánnis, Presbýteri et Confessóris.
      - type: text
        text: Varadíni, in Hungária, sancti Ladislái Regis, qui claríssimis miráculis usque ad diem hodiérnum corúscat.
  psalm.quinto-kal-ndas-i-nii-070c33dedf:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the blessed Pope Gregory VII, a right stout champion and defender of the freedom of the Church, of whom mention is made upon, the 25th day of this present month of May.
      - type: citation
        text: 'Upon the same 28th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Sardinia, the holy martyrs Emilius, Felix, Priam, and Lucian, who contended for Christ, and were crowned.
      - type: text
        text: At Chartres, in Gaul, the holy martyr Caraunus, who received martyrdom by being beheaded, under the Emperor Domitian.
      - type: text
        text: At Corinth, the holy martyr Helconides. She was first tried with many torments, under the President Perennius, in the time of the Emperor Gordian then was tortured again under the next President Justinus, but was delivered by an Angel. At length her breasts were cut off and she was thrown to wild beasts, and tried with fire, and thereafter finished her testimony by being beheaded.
      - type: text
        text: Also the holy martyrs Crescens, Dioscorides, Paul, and Helladius.
      - type: text
        text: At Tekoah, in Palestine, the holy martyrs, monks, who were massacred by the Saracens in the time of the Emperor Theodosius the Younger. Their sacred remains were gathered together by the country-folk, who treated them with great reverence.
      - type: text
        text: At Paris, [in the sixth century,] the holy Confessor Germanus, Bishop [of that see.] How saintly he was, how worthy, with what wondrous works he shone, hath been written by Fortunatus, Bishop [of Poitiers.]
      - type: text
        text: At Milan, [in the fifth century,] the holy Senator, Bishop [of that see,] very famous for his graces and learning.
      - type: text
        text: At Urgel, in Spain, [in the sixth century,] the holy Justus, Bishop [of that see.]
      - type: text
        text: At Florence, [in the year 1002,] the holy Confessor Podius, Bishop [of that see.]
      la:
      - type: text
        text: Quinto Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Sancti Augustíni, Epíscopi Cantuariénsis et Confessóris, cuius dies natális ágitur séptimo Kaléndas Iúnii.
      - type: text
        text: In Sardínia sanctórum Mártyrum Æmílii, Felícis, Príami et Luciáni, qui, pro Christo certántes, ab eo glorióse coronáti sunt.
      - type: text
        text: Carnóti, in Gállia, sancti Caráuni Mártyris, qui sub Domitiáno Imperatóre, cápite amputátus, martýrium sumpsit.
      - type: text
        text: Item pássio sanctórum Crescéntis, Dioscóridis, Pauli et Helládii.
      - type: text
        text: Thécuæ, in Palæstína, sanctórum Monachórum Mártyrum, qui, témpore Theodósii iunióris, a Saracénis occísi sunt, quorum sacras relíquias collegérunt áccolæ, et summa veneratióne illas habuérunt.
      - type: text
        text: Corínthi sanctæ Helicónidis Mártyris, témpore Gordiáni Imperatóris. Hæc primum, sub Perénnio Prǽside, multis torméntis afflícta; deínde, sub eius successóre Iustíno, íterum cruciáta, sed ab Angelis liberáta est; demum, disséctis mammis, ferísque obiécta atque igne probáta, cápitis obtruncatióne martýrium complévit.
      - type: text
        text: Lutétiæ Parisiórum sancti Germáni, Epíscopi et Confessóris; qui quantæ sanctitátis quantíque fúerit mériti, quibus étiam miráculis clarúerit, litterárum moniméntis Fortunátus Epíscopus consignávit.
      - type: text
        text: Medioláni sancti Senatóris Epíscopi, virtútibus et eruditióne claríssimi.
      - type: text
        text: Urgéllæ, in Hispánia Tarraconénsi, sancti Iusti Epíscopi.
      - type: text
        text: Floréntiæ sancti Pódii, Epíscopi et Confessóris.
      - type: text
        text: Apud Nováriam sancti Bernárdi a Menthóne Confessóris, qui in monte Iovis, super Alpes, in Valésia, celebérrimum cœnóbium et hospítium exstrúxit, atque a Pio Papa Undécimo, non modo Alpium íncolis vel viatóribus, sed iis étiam qui eárum iuga ascendéndo se exércent, cæléstis Patrónus est attribútus.
  psalm.quinto-kal-ndas-ianu-rii-f5065bb841:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 28th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Bethlehem of Judah, the holy innocent little children who were slain for Christ's sake by Herod the King.
      - type: text
        text: At Ancyra, in Galatia, the holy martyrs Eutychius the priest and Domitian the deacon.
      - type: text
        text: In Africa, the holy martyrs Castor, Victor, and Rogatian.
      - type: text
        text: At Nicomedia, the holy martyrs, Indes the eunuch, the virgins Domna, Agape, and Theophila, and their companions, who after long contendings by diverse kinds of death gained the crown of martyrdom in the persecution under the Emperor Diocletian.
      - type: text
        text: At Neo-Caesarea, in Pontus, in the persecution under the Emperor Decius, the holy martyr Troadius. As he was dying, the ghost of holy Gregory the wonder-worker appeared to him and strengthened him to undergo martyrdom.
      - type: text
        text: At Arabissa, in the lower Armenia, the holy martyr Cassarius, who suffered under the Emperor Galerius Maximian.
      - type: text
        text: At Lyon, in Gaul, the holy confessor Francis de Sales (1567-1622), Bishop (and Prince) of Geneva, whose name was enrolled among those of the Saints by Pope Alexander VII on account of his burning zeal for the conversion of heretics. His feast is kept by command of the said Pope upon the 29th day of January, being that day whereon his sacred body was brought to Annecy from Lyons. Pope Pius IX, in accordance with a vote of the Congregation of Sacred Rites, declared him a doctor of the universal Church.
      - type: text
        text: At Rome, the holy priest Domnio.
      - type: text
        text: In Egypt, the holy monk Theodore (the Sanctified, Abbot from 348, death of St. Pachom of Tabenno, in Egypt. He lived from 314-April 27, 367), a disciple of holy Pachom.
      - type: text
        text: In the monastery of Lerins the holy monk Anthony, famous for his miracles. A monk of Lerins, which monastery he entered about 523. He died about 525 in the midst of the congregation did the Lord open his mouth, and filled him with the spirit of wisdom and understanding, and clothed him with a robe of glory.
      la:
      - type: text
        text: Quinto Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: In Béthlehem Iudæ natális sanctórum Innocéntium Mártyrum, qui pro Christo ab Heróde Rege interfécti sunt.
      - type: text
        text: Lugdúni, in Gállia, item natális sancti Francísci Salésii, Epíscopi Gebennénsis et Confessóris; quem, doctrína et flagrantíssimo in converténdis hæréticis zelo præclárum, Alexánder Papa Séptimus in Sanctórum númerum rétulit, et ipsíus festivitátem quarto Kaléndas Februárii, quo die sacrum illíus corpus Lugdúno Annésium, in Sabáudia, fuit translátum, agéndam esse constítuit. Eum Pius Nonus, Póntifex Máximus, Doctórem universális Ecclésiæ declarávit; et Pius Papa Undécimus ómnibus Scriptóribus cathólicis, qui diáriis aliísve scriptis in vulgus edéndis Christiánam sapiéntiam illústrant ac próvehunt et tuéntur, cæléstem Patrónum dedit seu confirmávit.
      - type: text
        text: Ancýræ, in Galátia, sanctórum Mártyrum Eutýchii Presbýteri, et Domitiáni Diáconi.
      - type: text
        text: In Africa natális sanctórum Mártyrum Castóris, Victóris et Rogatiáni.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Indis eunúchi, Domnæ et Agapis ac Theóphilæ Vírginum, et Sociórum; qui, in persecutióne Diocletiáni, post longa certámina, divérso mortis génere corónam martýrii sunt assecúti.
      - type: text
        text: Neocæsaréæ, in Ponto, sancti Troádii Mártyris, in persecutióne Décii; cui quidem Troádio agonizánti sanctus Gregórius Thaumatúrgus in spíritu ádfuit, eúmque ad subeúndum martýrium roborávit.
      - type: text
        text: Arabíssi, in Arménia inferióre, sancti Cæsárii Mártyris, qui sub Galério Maximiáno passus est.
      - type: text
        text: Romæ sancti Domniónis Presbýteri.
      - type: text
        text: In monastério Lirinénsi, in Gállia, sancti Antónii Mónachi, miráculis clari.
  psalm.quinto-kal-ndas-m-rtii-966aa8379f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 25th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Egypt, [in the third century,] under the Emperor Numerian, the holy martyrs Victorinus, Victor, Nicephorus, Claudian, Dioscorus, Serapion, and Papias. Victorinus and Victor steadfastly bore grievous tortures on account of their confession of the faith, and were beheaded.
      - type: text
        text: Nicephorus was laid upon a hot iron bed, and when he had overcome the fire was cut joint from joint. Claudian and Dioscorus were burnt. Serapion and Papias were slain with the sword.
      - type: text
        text: In Africa, the holy martyrs Donatus, Justus, Herenas, and their Companions.
      - type: text
        text: At Rome, [in the year 492,] the holy Pope Felix III, who was the great-grandfather of holy Gregory the Great, who saith of him that he appeared unto his holy niece Tharsilla, and called her unto the kingdom of heaven.
      - type: text
        text: At Constantinople, [in the year 806,] holy Tharasius, Patriarch of that see, famous for his learning and godliness. There remaineth an epistle addressed unto him by Pope Adrian I in defence of holy images.
      - type: text
        text: At Nazianzum, [in 369,] holy Caesarius, brother of blessed Gregory the Theologian, whom the aforementioned Gregory doth testify that he saw among the multitude of the blessed.
      la:
      - type: text
        text: Quinto Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: In Ægýpto natális sanctórum Mártyrum Victoríni, Victóris, Nicéphori, Claudiáni, Dióscori, Serapiónis et Pápiæ, sub Numeriáno Imperatóre. Horum duo primi, pro confessióne fídei, exquisíta suppliciórum génera constánter passi, cápite plectúntur; Nicéphorus, post cratículas candéntes ignésque superátos, minutátim concísus est; Claudiánus et Dióscorus flammis incénsi; Serápion vero et Pápias gládio cæsi sunt.
      - type: text
        text: In Africa sanctórum Mártyrum Donáti, Iusti, Herénæ et Sociórum.
      - type: text
        text: Constantinópoli sancti Tharásii Epíscopi, eruditióne et pietáte insígnis; ad quem exstat Hadriáni Papæ Primi epístola pro defensióne sanctárum Imáginum.
      - type: text
        text: Naziánzi, in Cappadócia, sancti Cæsárii, qui beátæ Nonnæ fílius ac beatórum Gregórii Theólogi et Gorgóniæ fuit frater, et quem idem Gregórius inter ágmina beatórum se vidísse testátur.
      - type: text
        text: In monastério Heidenhémii, diœcésis Eystetténsis, in Germánia, sanctæ Walbúrgæ Vírginis, quæ fuit fília sancti Richárdi, Anglórum Regis, et soror sancti Willebáldi, Eystetténsis Epíscopi.
  psalm.quinto-kal-ndas-maii-099ae19fbf:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 27th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: We keep the feast of the holy Priest and monk Egbert, a man of marvellous lowliness and self-denial, of whom mention has been made upon the 24th day of this present month of April.
      - type: text
        text: At Nicomedia, the holy martyr Anthimus, Bishop of that see, who was beheaded for confessing Christ, in the persecution under the Emperor Diocletian, and so gained the glory of martyrdom. He was followed by almost all his flock, whereof by command of the judge some were slain with the sword, some burnt in fire, and some embarked upon ships and drowned in the sea.
      - type: text
        text: At Tarsus, in Cilicia, the holy martyrs Castor and Stephen. [St. Stephen was perhaps a Bishop.]
      - type: text
        text: At Rome, blessed Pope Anastasius [I, in the year 401,] a man very rich in poverty and apostolic care, of whom St. Jerome writeth that Rome deserved not long to have him, lest the head of the world should be cut off under such a Bishop, since no long while after his death Rome was taken and sacked by the Goths.
      - type: text
        text: At Bologna, [in the sixth century,] the holy Confessor Tertullian, Bishop of that see.
      - type: text
        text: At Brescia, [in the fifth century,] holy Theophilus, Bishop of that see.
      - type: text
        text: At Constantinople, the holy Abbot John, [of the monastery of Cathares Hegumenos,] who contended much for the honouring of holy images under the Emperor Leo the Isaurian, [in the year 813, under Leo the Armenian. Leo the Isaurian reigned from 717-741.]
      - type: text
        text: At Taragona, the blessed Peter Armengal, of the Order of the Blessed Virgin Mary of Ransom for the Redemption of Captives. He suffered many things for the redemption of the faithful in Africa, and at length died a blessed death in the convent of St.-Mary-of-the-Meadows, [in the year 1304.]
      - type: text
        text: At Lucca, in Italy, [in the year 1278,] the blessed Virgin Zita, very famous for her graces and miracles.
      la:
      - type: text
        text: Quinto Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Petri Canísii, Sacerdótis e Societáte Iesu et Confessóris atque Ecclésiæ Doctóris; qui duodécimo Kaléndas Ianuárii migrávit ad Dóminum.
      - type: text
        text: Nicomedíæ natális sancti Anthimi, Epíscopi et Mártyris; qui in persecutióne Diocletiáni, ob confessiónem Christi, martýrii glóriam obtruncatióne cápitis accépit. Secúta est quoque illum univérsa ferme gregis sui multitúdo; quorum álios Iudex gládio obtruncári, álios conflagrári ígnibus, álios, navículis impósitos, pélago immérgi fecit.
      - type: text
        text: Tarsi, in Cilícia, sanctórum Castóris et Stéphani Mártyrum.
      - type: text
        text: Bonóniæ sancti Tertulliáni, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Theóphili Epíscopi.
      - type: text
        text: In Ægýpto sancti Theodóri Abbátis, qui fuit discípulus sancti Pachómii.
      - type: text
        text: Constantinópoli sancti Ioánnis Abbátis, qui pro cultu sacrárum Imáginum, sub Leóne Isáurico, plúrimum decertávit.
      - type: text
        text: Tarracóne, in Hispánia, beáti Petri Armengáudii, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum; qui, multa pro fidélibus rediméndis in Africa passus, tandem, in convéntu sanctæ Maríæ Pratórum, beáto fine quiévit.
      - type: text
        text: Lucæ, in Túscia, beátæ Zitæ Vírginis, virtútum et miraculórum fama conspícuæ.
  psalm.quinto-kal-ndas-nov-mbris-4a7517ee40:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 28th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The blessed Apostles Simon the Canaanite and Thaddeus, who also is called Jude. Simon preached the Gospel in Egypt, and Thaddeus in Mesopotamia, afterward they both came into Persia, and when they had brought into the obedience of Christ a countless multitude of that people, they finished their course by martyrdom.
      - type: text
        text: At Rome, the holy Virgin Cyrilla, daughter of holy Tryphonia. She was killed for Christ's sake, under the Emperor Claudius.
      - type: text
        text: Likewise at Rome, in the persecution under the Emperor Valerian, the holy martyrs the Virgin Anastasia the elder and Cyril. Anastasia was thrown into chains under the Prefect Probus, buffeted, and tormented with fire and stripes, and, forasmuch as she remained unshaken in confessing Christ, her breasts were cut off, her nails torn out, her teeth broken, and her hands and feet, and lastly her head, cut off; and gloriously prepared by all these sufferings she passed away as a bride adorned for her husband. As for Cyril, when Anastasia asked for a drink of water, he gave it to her, and for this he was rewarded by suffering death as a martyr.
      - type: text
        text: At Como, under the Emperor Maximian, the holy martyr Faithful.
      - type: text
        text: At Mainz, the holy martyr Ferrutius.
      - type: text
        text: At Meaux, (toward the end of the seventh century,) the holy Confessor Faro, Bishop (of that see.)
      - type: text
        text: At Naples, holy Gaudiosus, Bishop (of Abitina,) in Africa, who came to Campagna on account of the persecution by the Vandals, and died an holy death in a monastery in the city above named.
      - type: text
        text: At Vercelli, (at the beginning of the fifth century,) holy Honoratus, Bishop (of that see.)
      la:
      - type: text
        text: Quinto Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: In Pérside natális beatórum Apostolórum Simónis Chananǽi, et Thaddǽi, qui et Iudas dícitur. Ex ipsis autem Simon in Ægýpto, Thaddǽus in Mesopotámia Evangélium prædicávit; deínde, in Pérsidem simul ingréssi, ibi, cum innúmeram gentis illíus multitúdinem Christo subdidíssent, martýrium consummárunt.
      - type: text
        text: Romæ sanctórum Mártyrum Anastásiæ senióris Vírginis, et Cyrílli. Ipsa Virgo, in persecutióne Valeriáni, sub Probo Præfécto, vínculis constrícta, cólaphis cæsa, igne et verbéribus est cruciáta, et, cum in confessióne Christi permanéret immóbilis, tandem, abscíssis mamíllis, evúlsis únguibus, déntibus comminútis, mánibus pedibúsque præcísis, truncáta cápite, tot passiónum ornáta monílibus migrávit ad Sponsum; Cyríllus autem, ei peténti aquam propínans, martýrium pro mercéde accépit.
      - type: text
        text: Item Romæ sanctæ Cyríllæ Vírginis, quæ fília éxstitit sanctæ Tryphóniæ, et, sub Cláudio Príncipe, pro Christo iuguláta est.
      - type: text
        text: Apud Comum sancti Fidélis Mártyris, sub Maximiáno Imperatóre.
      - type: text
        text: Mogúntiæ sancti Ferrútii Mártyris.
      - type: text
        text: Meldis, in Gállia, sancti Farónis, Epíscopi et Confessóris.
      - type: text
        text: Vercéllis sancti Honoráti Epíscopi.
  psalm.quinto-kal-ndas-oct-bris-28dbe9ed09:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 27th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Aegae, in Cilicia, the holy brethren Cosmas and Damian, both martyrs. They were beheaded in the persecution under the Emperor Diocletian, after they had suffered many torments, bonds, and imprisonment, and after God had enabled them to overcome, in the sea and in the fire, crucifixion, stoning, and arrows. Along with them it is stated that there suffered also three more, who were brethren unto them, namely Anthimus, Leontius, and Euprepius.
      - type: text
        text: At Rome, the holy Epicharis, a woman of senatorial rank, who, in the same persecution, was beaten with scourges loaded with lead, and then beheaded.
      - type: text
        text: At Todi, under the same Emperor Diocletian, the holy martyrs Fidentius and Terence.
      - type: text
        text: At Cordova, (in the ninth century,) the holy brethren Adolph and John, both martyrs, who were crowned for Christ's sake in the persecution under the Arabs.
      - type: text
        text: At Semont, in Gaul, (in the third century,) the holy martyr Florentine, who had his tongue cut out, and was then beheaded, along with the blessed Hilary.
      - type: text
        text: At Byblos, in Phoenicia, the holy Mark, Bishop (of that see,) who is called by the blessed Evangelist Luke, (in the Acts of the Apostles,) "John, whose surname was Mark."
      - type: text
        text: At Milan, holy Caius, Bishop (of that see,) a disciple of the blessed Apostle Barnabas, who suffered much in the persecution under the Emperor Nero, but fell asleep at last in peace.
      - type: text
        text: At Ravenna, (in the second century,) the holy Confessor Aderitus, Bishop (of that see.)
      - type: text
        text: At Paris, (in the year 1660,) the holy Priest Vincent of Paul, Founder of the Congregation of the Mission, and of the Sisters of Charity. A man of apostolic spirit, and a father to the poor; whose feast is kept upon the 19th day of July.
      - type: text
        text: At Paris also, (in the year 1325,) the holy Eleazar (de Sabran,) Earl (of Ariano.)
      - type: text
        text: In Hainaut, (toward the end of the eighth century,) the holy virgin Hiltrude.
      la:
      - type: text
        text: Quinto Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Ægéæ natális sanctórum Mártyrum Cosmæ et Damiáni fratrum, qui, in persecutióne Diocletiáni, post multa torménta, víncula et cárceres, post mare et ignes, cruces, lapidatiónem et sagíttas divínitus superátas, cápite plectúntur; cum quibus étiam referúntur passi tres eórum fratres germáni, id est Anthimus, Leóntius et Euprépius.
      - type: text
        text: Lutétiæ Parisiórum item natális sancti Vincéntii a Paulo, Presbýteri et Confessóris, Congregatiónis Presbyterórum Missiónis et Puellárum Caritátis Fundatóris, viri apostólici et páuperum patris; quem Leo Décimus tértius, Póntifex Máximus, ómnium Societátum caritátis, in toto cathólico Orbe exsisténtium et ab eódem Sancto quomodólibet promanántium, cæléstem Patrónum apud Deum constítuit. Ipsíus tamen festívitas quartodécimo Kaléndas Augústi celebrátur.
      - type: text
        text: Bybli, in Phœnícia, sancti Marci Epíscopi, qui et Ioánnes a beáto Luca nominátur, atque fílius éxstitit illíus beátæ Maríæ, cuius memória tértio Kaléndas Iúlii recensétur.
      - type: text
        text: Medioláni sancti Caii Epíscopi, qui fuit discípulus beáti Bárnabæ Apóstoli; et, multa in Nerónis persecutióne passus, quiévit in pace.
      - type: text
        text: Romæ sanctæ Epicháridis, mulíeris Senatóriæ, quæ, in eádem Diocletiáni persecutióne, plumbátis cæsa est atque gládio percússa.
      - type: text
        text: Tudérti, in Umbria, sanctórum Mártyrum Fidéntii et Teréntii, sub eódem Diocletiáno.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Adúlphi et Ioánnis fratrum, qui, in persecutióne Arábica, pro Christo coronáti sunt; eorúmque animáta exémplo beáta Virgo Aurea, ipsorum soror, ad fidem redúcta, et ipsa póstmodum martýrium fórtiter súbiit quartodécimo Kaléndas Augústi.
      - type: text
        text: Sedúni, in Gállia, sancti Florentíni Mártyris, qui, una cum beáto Hilário, post abscissiónem linguæ, iussus est gládio feríri.
      - type: text
        text: Ravénnæ sancti Aderíti, Epíscopi et Confessóris.
      - type: text
        text: Lutétiæ Parisiórum sancti Elzeárii Cómitis.
      - type: text
        text: In Hannónia sanctæ Hiltrúdis Vírginis.
  psalm.quinto-kal-ndas-sept-mbris-ab2e0181ac:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 28th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Hippo, in Africa, [in the year 430,] the holy Augustine, Bishop of that city, the eminent Doctor of the Church. He was converted to the Catholic faith, and baptized by blessed Bishop Ambrose. He was the stalwart defender of the faith against the Manicheans and other heretics, and, after manifold toil for the Church of God, he passed away to be rewarded in heaven. His body was first brought from his own city to Sardinia, on account of the barbarians, and afterwards by Luitprand, King of the Lombards, -to Pavia, where it is honourably buried.
      - type: text
        text: At Rome, [in the year 116 or 132,] the holy martyr Hermes, a man of illustrious worldly station, who, as is written in the acts of the blessed Pope Alexander, was first committed to prison, and then slain with the sword along with many others, under the judge Aurelian.
      - type: text
        text: At Brioude, in Auvergne, the holy martyr Julian he was a comrade of the blessed Tribune Ferreolus, and secretly served Christ as a soldier but in the persecution under the Emperor Diocletian he was tried by the other soldiers, who horribly murdered him by cutting his throat.
      - type: text
        text: At Constance, the holy martyr Pelagius, who received his crown under the Emperor Numerian and the judge Evilasius.
      - type: text
        text: At Salerno, the holy martyrs Fortunatus, Caius, and Anthes, who were beheaded under the Emperor Diocletian and the Proconsul Leontius.
      - type: text
        text: At Constantinople, [in the year 340,] holy Alexander, [Arch-] Bishop [of that see,] that glorious old man by the power of whose prayer the judgement of God smote Arius so that he burst asunder in the midst, and all his bowels gushed out.
      - type: text
        text: In Saintes, [about the year 450,] the holy Confessor Vivian, Bishop [of that see.]
      - type: text
        text: Also, [about the year 395,] holy Moses the Ethiopian, who from a famous robber became a famous Hermit, converted many other robbers, and took them with him to his monastery.
      la:
      - type: text
        text: Quinto Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Hippóne Régio, in Africa, natális sancti Augustíni Epíscopi, Confessóris et Ecclésiæ Doctóris exímii, qui, beáti Ambrósii Epíscopi ópera ad cathólicam fidem convérsus et baptizátus, eam advérsus Manichǽos aliósque hæréticos acérrimus propugnátor deféndit, multísque áliis pro Ecclésia Dei perfúnctus labóribus, ad prǽmia migrávit in cælum. Eius relíquiæ, primo de sua civitáte propter bárbaros in Sardíniam advéctæ, et póstea a Rege Longobardórum Luitprándo Papíam translátæ, ibi honorífice cónditæ sunt.
      - type: text
        text: Romæ item natális sancti Hermétis, viri illústris, qui (ut in Actis beáti Alexándri Papæ légitur), prius carceráli custódiæ mancipátus, deínde, cum áliis plúrimis, gládio cædénte, martýrium complévit, sub Aureliáno Iúdice.
      - type: text
        text: Venúsiæ, in Apúlia, pássio sanctórum Septimíni, Ianuárii et Felícis, qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, iussi sunt decollári. Ipsórum tamen ac reliquórum ex duódecim frátribus festívitas agitur Kaléndis Septémbris.
      - type: text
        text: Briváte, apud Arvérnos, item pássio sancti Iuliáni Mártyris, qui, cum esset beáti Ferréoli Tribúni comes et in hábitu militári occúlte Christo servíret, in persecutióne Diocletiáni, a milítibus tentus est, et, desécto gútture, morte horríbili necátus.
      - type: text
        text: Constántiæ, in Germánia, sancti Pelágii Mártyris, qui sub Numeriáno Imperatóre et Evilásio Iúdice, cápite amputátus, martýrii corónam accépit.
      - type: text
        text: Salérni sanctórum Mártyrum Fortunáti, Caii et Anthis; qui, sub Diocletiáno Imperatóre et Leóntio Procónsule, decolláti sunt.
      - type: text
        text: Constantinópoli sancti Alexándri Epíscopi, gloriósi senis; ob cuius oratiónem Arius, divíno iudício damnátus, crépuit médius, et effúsa sunt víscera eius.
      - type: text
        text: Apud Sántonas, in Gállia, sancti Viviáni, Epíscopi et Confessóris.
      - type: text
        text: Item sancti Móysis Æthíopis, qui, ex insígni latróne insígnis Anachorétæ, multos latrónes convértit et secum duxit ad monastérium.
  psalm.quinto-nonas-i-lii-18f5e4c060:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 3rd day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, the holy martyrs Tryphon and twelve others.
      - type: text
        text: At Constantinople, the holy martyrs Eulogios and his Companions, [fourth century.]
      - type: text
        text: At Caesarea, in Cappadocia, holy Hyacinth, a groom of the bed-chamber to the Emperor Trajan. He was accused of Christianity, variously tormented with stripes, and cast into prison, where he died of hunger.
      - type: text
        text: At Chiusi, in Tuscany, the holy martyrs Irenaeus, a Deacon, and Mustiola, a matron, who under the Emperor Aurelian were tormented in diverse and terrible ways, and gained a crown of martyrdom.
      - type: text
        text: Upon the same day, the holy martyrs Marcus and Mucian were slain with the sword for Christ's sake. A child called out to them not to sacrifice to idols, and for this reason was ordered to be whipped, and forasmuch as he continued to confess Christ all the more vehemently, he also was put to death, along with a certain Paul who also had exhorted the martyrs.
      - type: text
        text: At Laodicea, in Syria, holy Anatolius, Bishop [of that see, in the year 283,] who has left writings which are admired not by devout men only, but by philosophers also.
      - type: text
        text: At Altino, in Venetia, holy Heliodorus, Bishop [of that see, about the year 390,] famous for his teaching and holiness.
      - type: text
        text: At Ravenna, the holy Confessor Dathus, Bishop [of that see, in the year 190.]
      - type: text
        text: At Edessa, in Mesopotamia, is commemorated the translation from India of the body of the holy Apostle Thomas, whose relics have since been brought to Ortona, [in Italy. Henry the Liberal, Count of Champagne, brought one whole rib of St. Thomas from the East. He presented it to the Collegiate Church of St Stephen de Troyes (Aube.)]
      la:
      - type: text
        text: Quinto Nonas Iúlii
      - type: text
        text: ''
      - type: text
        text: Sancti Irenǽi, Epíscopi et Mártyris, qui migrávit in cælum quarto Kaléndas Iúlii.
      - type: text
        text: Clúsii, in Etrúria, sanctórum Mártyrum Irenǽi Diáconi, et Mustíolæ matrónæ; qui sub Aureliáno Imperatóre, divérsis atrocibúsque supplíciis cruciáti, corónam martýrii meruérunt.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Tryphónis et aliórum duódecim.
      - type: text
        text: Constantinópoli sanctórum Eulógii et Sociórum Mártyrum.
      - type: text
        text: Cæsaréæ, in Cappadócia, sancti Hyacínthi, qui Traiáni Imperatóris cubiculárius fuit; et, accusátus quod Christiánus esset, plagis várie afflíctus est, atque, in cárcerem trusus, ibi fame consúmptus exspirávit.
      - type: text
        text: Eódem die sanctórum Mártyrum Marci et Muciáni, qui pro Christo sunt gládio cæsi. Hos cum puer párvulus, ne immolárent idólis, alta voce monéret, verbéribus iussus est cædi; cumque veheméntius Christum confiterétur, tandem, una cum quodam Paulo, Mártyres exhortánte, necátus est.
      - type: text
        text: Romæ natális sancti Leónis Secúndi, Papæ et Confessóris, qui primo sui Pontificátus anno, plenus méritis, migrávit in cælum.
      - type: text
        text: Laodicéæ, in Sýria, sancti Anatólii Epíscopi, qui non solum religiósis viris, sed et philosóphis admiránda scripta relíquit.
      - type: text
        text: Altíni, in Venetórum fínibus, sancti Heliodóri Epíscopi, doctrína et sanctitáte insígnis.
      - type: text
        text: Ravénnæ sancti Dathi, Epíscopi et Confessóris.
      - type: text
        text: Edéssæ, in Mesopotámia, Translátio sancti Thomæ Apóstoli ex India; cuius relíquiæ Ortónam, apud Frentános, póstea translátæ sunt.
  psalm.quinto-nonas-m-rtii-e08899fb27:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Aelred, Abbot of Rievaux, of the Cistercian Order, famous for his knowledge of sacred letters, uprightness of life, self-content, wondrous long-suffering, spirit of prophecy, heavenly conversation, and great miracles, who departed this life upon the 12th day of January.
      - type: citation
        text: 'Upon the same 3rd day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Caesarea, in Palestine, in the persecution under the Emperor Valerian, the holy martyrs Marinus the soldier and Asterius the senator.
      - type: text
        text: Marinus was accused by his comrades of being a Christian, and when asked by the judge so declared with a loud voice, and was beheaded.
      - type: text
        text: Asterius took off his own garment, wrapt in it the headless body of the martyr, and took it upon his own shoulder, and for so doing himself received the honour of martyrdom.
      - type: text
        text: In Spain, the holy martyrs Hemiterius, [or Madir,] and Chelidonius.
      - type: text
        text: They were stationed as soldiers in camp at Leon in Galicia, when the storm of persecution broke. On account of their confession of the Name of Christ they were taken to Calaxorra, where they were put to diverse torments and crowned with martyrdom. [Their bodies rest in the Cathedral of Calal they are the patrons.]
      - type: text
        text: Upon the same day the holy martyrs Felix, Luciolus, Fortunatus, Marcia, and their Companions.
      - type: text
        text: Likewise the holy soldiers Cleonicus, Eutropius, and Basiliscus, who won a happy triumph upon the cross under the President Asclepiades, in the persecution under the Emperor Maximian.
      - type: text
        text: At Brescia, [in the year 526,] the holy Confessor Titian, Bishop of that see.
      - type: text
        text: At Bamberg, holy Cunegunda, Empress of the Romans, bride of the Emperor Henry the First, with whose consent she remained always a Virgin. She fell asleep in peace, richly adorned with good works, and after her death was famous for miracles, [in the year 1040.]
      la:
      - type: text
        text: Quinto Nonas Mártii
      - type: text
        text: ''
      - type: text
        text: Cæsaréæ, in Palæstína, sanctórum Mártyrum Maríni mílitis, et Astérii Senatóris, in persecutióne Valeriáni. Horum prior, cum accusátus esset a commilitónibus ut Christiánus, et, interrogátus a Iúdice, se Christiánum esse voce claríssima testarétur, martýrii corónam abscissióne cápitis accépit; cumque Astérius corpus Mártyris, cápite truncátum, subiéctis húmeris et substráta veste, qua induebátur, excíperet, honórem quem Mártyri détulit, contínuo et ipse Martyr accépit.
      - type: text
        text: Calagúrri, in Hispánia, natális sanctórum Mártyrum Hemitérii et Cheledónii fratrum, qui, cum apud Legiónem, Gallǽciæ urbem, in castris militárent, ambo, exsurgénte persecutiónis procélla, pro confessióne nóminis Christi, Calagúrrim usque profécti, ibi, plúribus torméntis afflícti, martýrio coronáti sunt.
      - type: text
        text: Eódem die pássio sanctórum Felícis, Lucíoli, Fortunáti, Márciæ et Sociórum.
      - type: text
        text: Item sanctórum mílitum Cleoníci, Eutrópii et Basilísci, qui, in persecutióne Maximiáni, sub Asclepíade Prǽside, crucis supplício felíciter triumphárunt
      - type: text
        text: Bríxiæ sancti Titiáni, Epíscopi et Confessóris.
      - type: text
        text: Bambérgæ sanctæ Cunegúndis Augústæ, quæ, sancto Henríco Primo, Romanórum Imperatóri, nupta, perpétuam virginitátem, ipso annuénte, servávit; ac, bonórum óperum méritis cumuláta, sancto fine quiévit, et post óbitum miráculis cláruit.
  psalm.quinto-nonas-maii-210ac8543d:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 3rd day of May
      - type: text
        text: ''
      - type: text
        text: It is commemorated the finding at Jerusalem in the time of the Emperor Constantine of the Most Holy Cross of the Lord.
      - type: citation
        text: 'Upon the same day, were born into the better life: At Rome, upon the Nomentan Way, the holy martyrs Pope Alexander I., [in the year 117,] and the priests Eventius and Theodulos. Under the Emperor Hadrian and the judge Aurelian, Alexander suffered chains and imprisonment, racking, tearing with hooks, and fire, and was at length put to death by small stabs over his whole body. Eventius and Theodulos were long imprisoned, then examined under torture by fire, and at last beheaded.'
      - type: text
        text: At Narni, [in the year 376,] the holy Confessor Juvenal, Bishop of that see.
      - type: text
        text: At Constantinople, [in the year 313,] the holy martyrs Alexander the Soldier, and Antonina the Virgin. In the persecution under the Emperor Maximian the President Festus condemned her to a brothel Alexander awaited her there, changed clothes with her, and so enabled her to escape. For this reason they were put to the torture together, and when both had had their hands cut off, they were together cast into the fire for Christ's sake, and having so finished together their noble contending, were crowned together.
      - type: text
        text: In the Thebaid, [about the year 286,] the holy martyrs Timothy and Myra his wife. The Prefect Arian, after putting them to diverse torments, ordered them to be crucified together. They hung upon the cross alive for nine days, the one strengthening the other in the faith, and so together at last finished their testimony.
      - type: text
        text: At Aphrodisia, in Karia, [in the fourth century,] the holy martyrs Diodorus and Rodopian, who were stoned to death by their fellow-citizens during the persecution under the Emperor Diocletian.
      - type: text
        text: Upon Mount Senario, near Florence, [in the thirteenth century,] the blessed Confessors Sosthenes and Uguccio, two of the seven founders of the Order of Servants of the Blessed Virgin Mary, who departed this life upon the same day and at the same hour, as they were repeating the angelic salutation, even as had been foretold to them from heaven.
      la:
      - type: text
        text: Quinto Nonas Maii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Nomentána, pássio sanctórum Mártyrum Alexándri, Evéntii et Theodúli Presbyterórum. Ex his Alexánder, sub Hadriáno Príncipe et Aureliáno Iúdice, post víncula, cárceres, equúleum, úngulas et ignes, punctis crebérrimis per tota membra confóssus ac perémptus est; Evéntius vero et Theodúlus, post longos cárceres, ígnibus examináti, ad últimum decolláti sunt.
      - type: text
        text: Narniæ sancti Iuvenális, Epíscopi et Confessóris.
      - type: text
        text: Apud montem Senárium, in Etrúria, natális sanctórum Sostenǽi et Ugucciónis Confessórum, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, cǽlitus admóniti, eádem die et hora, salutatiónem Angélicam recitántes, e vita migrárunt. Ipsórum autem ac Sociórum festum prídie Idus Februárii celebrátur.
      - type: text
        text: Constantinópoli sanctórum Mártyrum Alexándri mílitis, et Antonínæ Vírginis. Hæc, in persecutióne Maximiáni, sub Prǽside Festo, ad lupánar damnáta, et ab Alexándro, qui pro ipsa ibi remánserat, mutátis véstibus clam edúcta, cum eo póstmodum iussa est torquéri; et ambo simul in ignem, præcísis mánibus, pro Christo sunt iniécti, atque ita, egrégio perácto certámine, coronántur.
      - type: text
        text: In Thebáide sanctórum Mártyrum Timóthei et Mauræ cóniugis, quos Ariánus Præféctus, post multa torménta, cruci iussit affígi; in qua, per novem dies cum vivi pependíssent ac se ipsos in fide roborássent, martýrium consummárunt.
      - type: text
        text: Aphrodísiæ, in Cária, sanctórum Mártyrum Diodóri et Rhodopiáni, qui, in persecutióne Diocletiáni Imperatóris, a cívibus suis lapidáti sunt.
      - type: text
        text: Hierosólymis Invéntio sacrosánctæ Crucis Domínicæ, sub Constantíno Imperatóre.
  psalm.quinto-nonas-oct-bris-17235172e2:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Thomas, Bishop of Hereford, in England, of whom mention was made yesterday.
      - type: citation
        text: 'Upon the same 3rd day of October, were born into the better life:'
      - type: text
        text: At Rome, at the Bear-and-Cap, the holy martyr Candidus, (in the third century.) Upon the same day, the holy martyrs Denis, Faustus, Caius, Peter, Paul, and four others, (in the third century.) They originally suffered much under the Emperor Decius, and then, under the Emperor Valerian, were put to a long course of torments by the President Emilian.
      - type: text
        text: Among the ancient Saxons, (in Westphalia,) the two holy (English) brethren, both named Ewald, (about the year 695,) (one surnamed the white, and the other the black.) They were priests, and had gone to preach Christ in that country, where they suffered martyrdom, being murdered by the heathen. A bright light was seen around their bodies by night to show where they were, and of what worthiness.
      - type: text
        text: In Africa, holy Maximian, Bishop of Bagaia, who again and again suffered great cruelties at the hands of the Donatists, and was at last thrown off the top of a lofty tower, and left for dead, but afterwards fell asleep in the Lord, famous for his glorious confession.
      - type: text
        text: In Palestine, the holy Confessor Hesychius, (in the fourth century,) a disciple of holy Hilarion, and his companion in his journeyings.
      - type: text
        text: At Brogne, in the diocese of Namur, in Belgium, (in the year 959,) holy Gerard, (Founder and) Abbot, (of the monastery at that place, who introduced a new and most exact discipline into many monasteries of Flanders, Champagne, Lorraine, and Picardy. He reformed some abbeys in Flanders.)
      la:
      - type: text
        text: Quinto Nonas Octóbris
      - type: text
        text: ''
      - type: text
        text: Sanctæ Terésiæ a Iesu Infante, ex Ordine Carmelitárum Excalceatórum, Vírginis, peculiáris ómnium Missiónum Patrónæ; cuius dies natális prídie Kaléndas Octóbris recensétur.
      - type: text
        text: Romæ, ad Ursum pileátum, sancti Cándidi Mártyris.
      - type: text
        text: Apud antíquos Sáxones sanctórum Mártyrum duórum Ewaldórum, qui, cum essent Presbýteri et Christum ibi prædicáre cœpíssent, comprehénsi sunt a Pagánis et occísi; ad quorum córpora noctu lux multa, diu appárens, et ubi essent et cuius essent mériti, declarávit.
      - type: text
        text: Eódem die sanctórum Mártyrum Dionýsii, Fausti, Caii, Petri, Pauli et aliórum quátuor, qui primum, sub Décio, multa passi sunt, ac demum, sub Valeriáno, ab Æmiliáno Prǽside diu torméntis vexáti, martýrii palmam meruérunt.
      - type: text
        text: In Africa sancti Maximiáni, Epíscopi Bagaiénsis, qui, a Donatístis íterum atque íterum sævíssima perpéssus, ex alta dénique turri præcipitátus est, et pro mórtuo derelíctus; sed, póstmodum a transeúntibus colléctus et pia curatióne sanátus, cathólicam fidem propugnáre non déstitit, donec, glória confessiónis clarus, quiévit in Dómino.
      - type: text
        text: Legióne, in Hispánia, sancti Froiláni, eiúsdem civitátis Epíscopi, monásticæ vitæ propagándæ stúdio, beneficéntia in páuperes, ceterísque virtútibus et miráculis clari.
      - type: text
        text: In diœcési Namurcénsi, apud Belgas, sancti Gerárdi Abbátis.
      - type: text
        text: In Palæstína sancti Hesýchii Confessóris, qui fuit sancti Hilariónis discípulus et in peregrinatióne sócius.
      - type: text
        text: Savónæ, in Ligúria, sanctæ Maríæ Ioséphæ Rosséllo, Institúti Filiárum Nostræ Dóminæ a Misericórdia Fundatrícis, quam, caritátis opéribus præcláram, Pius Papa Duodécimus sanctis Virgínibus adnumerávit.
  psalm.quintod-cimo-kal-ndas-apr-lis-63410e336d:
    role: psalm
    content:
      en:
      - type: text
        text: At Jerusalem, holy Confessor Cyril, Bishop of that see, and Doctor of the Church, who suffered many things from the Arians for the faith's sake. He was several times driven from the see, but at length fell asleep in peace, [in the year 386,] illustrious for the glory of holiness. The Ecumenical Council [of Constantinople,] in writing to Pope Damasus, gave a noble witness to the purity of his faith. We keep his feast upon the 22nd day of this present month of March.
      - type: citation
        text: 'Upon the same 18th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Caesarea, in Palestine, the blessed martyr Alexander, Bishop [of Jerusalem.] He came to Jerusalem from his own city, in Cappadocia, whereof he was Bishop, in order to visit the holy places. Narcissus, who was already very old, was then ruling the Church of Jerusalem, and Alexander by the revelation of God received the government thereof, afterward, and when he himself was in the venerable glory of grey hairs he was brought to Caesarea in the persecution under the Emperor Decius, and was put in prison, and finished his testimony confessing Christ.
      - type: text
        text: At Augsburg, the holy martyrs Narcissus, Bishop of Augsburg, and the Deacon Felix. Narcissus was the first who preached the gospel in Rhaetia. He afterwards went into Spain, and after he had brought many to believe in Christ at Girona he there received the palm of martyrdom, along with the Deacon Felix, in the persecution under the Emperor Diocletian.
      - type: text
        text: At Nicomedia, the ten thousand holy martyrs who were slain with the sword for confessing Christ.
      - type: text
        text: Also the holy martyrs Trophimus and Eucarpius, [fourth century.]
      - type: text
        text: In England, holy Edward II., King of the English, who was murdered through a plot of his stepmother, and hath been famous for many miracles, [962-978.]
      - type: text
        text: At Lucca, in Tuscany, holy Finnan, Bishop of that see, [in the sixth century,] famous for the power of working miracles, but whose principal feast is kept upon the 18th day of November, which is that of the translation of his body.
      - type: text
        text: At Mantua, the holy Confessor Anselm, Bishop of the see, [in the year 1086.]
      la:
      - type: text
        text: Quintodécimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Hierosólymis sancti Cyrílli Epíscopi, Confessóris et Ecclésiæ Doctóris; qui, ab Ariánis multas pro fídei causa perpéssus iniúrias et ex Ecclésia sua sæpe depúlsus, tandem, sanctitátis glória clarus, in pace quiévit. Ipsíus porro intemerátam fidem prima Constantinopolitána Sýnodus œcuménica, sancto Dámaso Papæ scribens, præcláro testimónio commendávit.
      - type: text
        text: Cæsaréæ, in Palæstína, natális beáti Alexándri Epíscopi, qui de Cappadócia, ex própria civitáte, ubi erat Epíscopus, sanctórum locórum desidério Hierosólymam pétiit; atque ibi, cum a Narcísso, eiúsdem urbis Epíscopo, iam sene, illa regerétur Ecclésia, ipsíus gubernácula, divína edóctus revelatióne, suscépit. Póstmodum vero, in persecutióne Décii, cum iam longǽvæ ætátis veneránda canítie præfulgéret, ductus est Cæsaréam, et clausus in cárcere, ob confessiónem Christi, martýrium complévit.
      - type: text
        text: Augústæ sancti Narcíssi Epíscopi, qui primus in Rhǽtia Evangélium prædicávit; deínde in Hispániam proféctus est, et, cum Gerúndæ multos ad Christi fidem convertísset, ibídem, in persecutióne Diocletiáni Imperatóris, una cum Felíce Diácono, martýrii palmam accépit.
      - type: text
        text: Nicomedíæ sanctórum decem míllium Mártyrum, qui, pro Christi confessióne, gládio percússi sunt.
      - type: text
        text: Ibídem sanctórum Mártyrum Tróphimi et Eucárpii.
      - type: text
        text: In Británnia sancti Eduárdi Regis, qui, dolis novércæ necátus, multis miráculis cláruit.
      - type: text
        text: Lucæ, in Túscia, natális sancti Frigdiáni Epíscopi, virtúte miraculórum illústris.
      - type: text
        text: Mántuæ sancti Ansélmi, Epíscopi Lucénsis et Confessóris.
      - type: text
        text: Cárali, in Sardínia, sancti Salvatóris ab Horta, Confessóris, ex Ordine Fratrum Minórum, qui, virtútibus et singulári miraculórum dono cláruit, et a Pio Papa Undécimo inter sanctos Cǽlites adnumerátus est.
  psalm.quintod-cimo-kal-ndas-aug-sti-0feb830347:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the morrow we keep the feast of the holy Confessor Camillus de'' Lellis, founder of the Congregation of Regular Clerks for ministering to the sick, whose birthday, [in the year 1614,] to the better life: was recorded upon the 14th of this present month of July, and whom the Supreme Pontiff Leo XIII proclaimed the patron in heaven of the sick and of those that tend them.'
      - type: citation
        text: 'Upon the same 18th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Tivoli, the holy Symphorosa, wife of the holy martyr Getulius, along with her seven sons Crescens, Julian, Nemesius, Primitivus, Justin, Stacteus, and Eugene. Under the Emperor Hadrian the Mother, on account of her invincible constancy, was first long beaten with palm branches, then hung up by the hair, and lastly tied to a stone and thrown into the river her sons stretched upon posts by pullies, finished their testimony by diverse ways of death, [about the year 120.] Their bodies were afterwards brought to Rome, and in the time of the Supreme Pontiff Pius IV, they were found in the Diaconal church of the Holy Angel at the Fish-pond.
      - type: text
        text: At Carthage, the holy Virgin and martyr Gondines. Because of her Confession of Christ the Pro-consul Rufinus caused her to be four different times racked she was horribly tormented with tearing by hooks, she suffered long a foul imprisonment, and in the end she was slain with the sword, [in the year 203.]
      - type: text
        text: At Dorostorum, in Mysia, the holy Martyr Aemilian, who was cast into a furnace under the President Capitolinus, in the time of the Emperor Julian the Apostate, and so received the palm of martyrdom.
      - type: text
        text: At Utrecht, the holy martyr Frederick, Bishop [of that see, in the year 838.]
      - type: text
        text: In Gallicia, in Spain, the holy Virgin and martyr Marina.
      - type: text
        text: At Milan, holy Maternus, Bishop [of that see,] who for the sake of Christ and of the church unto him committed was cast into prison, under the Emperor Maximian, and oftentimes beaten, and at length fell asleep in the Lord, glorious for much testifying.
      - type: text
        text: At Brescia, holy Philastrius, Bishop of that city, who fought much both by word and writing against the heretics, and especially the Arians, of whom he suffered many things, and at length fell asleep in peace, as a Confessor famous for miracles, [in the year 386.]
      - type: text
        text: At Metz, in Gaul, holy Arnulph, Bishop [of that see,] famous for holiness and the gift of working wonders, who chose to live as an hermit and fell asleep in blessedness, [in the year 641.]
      - type: text
        text: At Segni, the holy Confessor Bruno, Bishop [of that see, in the year 1125.]
      - type: text
        text: At Forlimpopoli, on the Emilian Way, holy Ruffillus, Bishop of that city, [in the year 385.]
      la:
      - type: text
        text: Quintodécimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Camílli de Lellis, Presbýteri et Confessóris, Clericórum Regulárium infírmis ministrántium Institutóris, cæléstis hospitálium et infirmórum Patróni; cuius dies natális prídie Idus Iúlii recólitur.
      - type: text
        text: Tíbure sanctæ Symphorósæ, uxóris sancti Getúlii Mártyris, cum septem fíliis suis, scílicet Crescénte, Iuliáno, Nemésio, Primitívo, Iustíno, Stácteo et Eugénio. Horum mater, sub Hadriáno Príncipe, ob insuperábilem constántiam, primo cæsa diu palmis, deínde crínibus suspénsa, novíssime saxo alligáta, in flumen præcipitáta est; fílii autem, stipítibus ad tróchleas exténsi, divérso mortis éxitu martýrium complevérunt. Eorúndem córpora póstea Romam transláta, et, Pio Quarto Summo Pontífice, in Diaconía sancti Angeli in Piscína fuérunt invénta.
      - type: text
        text: Traiécti sancti Frideríci, Epíscopi et Mártyris.
      - type: text
        text: Doróstori, in Mýsia inferióre, sancti Æmiliáni Mártyris, qui, témpore Iuliáni Apóstatæ, sub Capitolíno Prǽside, in fornácem iniéctus, martýrii palmam accépit.
      - type: text
        text: Carthágine sanctæ Gundénis Vírginis, quæ, iussu Rufíni Procónsulis, ob Christi confessiónem, quater divérsis tempóribus per extensiónem in equúleo torta, et úngulis horrénde lacerántibus cruciáta, cárceris squalóre diu afflícta, novíssime gládio cæsa est.
      - type: text
        text: Gallǽciæ, in Hispánia, sanctæ Marínæ, Vírginis et Mártyris.
      - type: text
        text: Medioláni sancti Matérni Epíscopi, qui, sub Maximiáno Imperatóre, pro fide Christi et pro Ecclésia sibi commíssa, in cárcerem detrúsus et sæpe verbéribus cæsus est; ac tandem, multis confessiónibus clarus, obdormívit in Dómino.
      - type: text
        text: Bríxiæ natális sancti Philástrii, qui fuit eiúsdem civitátis Epíscopus. Hic advérsus hæréticos, præsértim Ariános, a quibus multa passus est, plúrimum verbis scriptísque pugnávit; demum, clarus miráculis, Conféssor in pace quiévit.
      - type: text
        text: Metis, in Gállia, sancti Arnúlphi Epíscopi, qui, sanctitáte et miráculis illústris, eremíticam delégit vitam, et beáto fine quiévit.
      - type: text
        text: Signiæ sancti Brunónis, Epíscopi et Confessóris.
      - type: text
        text: Foro Pompílii, in Æmília, sancti Ruffílli, eiúsdem civitátis Epíscopi.
  psalm.quintod-cimo-kal-ndas-dec-mbris-d14739ef63:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 17th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, holy Hugh, Bishop of Lincoln. He was a Charter House Monk, who was called to rule the Church of Lincoln, was famous for many miracles, and died an holy death, (in the year 1200.)
      - type: text
        text: At Neo-Caesarea, in Pontus, (about the year 270,) holy Gregory, Archbishop of that see, who was famous for teaching and holiness, and who came to be called the Wonder-worker, on account of the great signs and wonders which he worked to the great glory of the churches, whose feast we keep upon the 27th day of this present month of November.
      - type: text
        text: In Palestine, the holy martyrs Alphaeus and Zacchaeus, who were put to death after suffering many torments, in the first year of the persecution under the Emperor Diocletian.
      - type: text
        text: At Cordova, the holy brother and sister Acisclus and Victoria, both martyrs, who in the same persecution by Diocletian aforesaid, were most cruelly tortured by command of the President Dion, and earned crowns of glory from the hand of the Lord.
      - type: text
        text: At Alexandria, holy Denys, Bishop (of that see,) a man of great learning, and glorious on account of his many confessions and his diverse sufferings and torments, who at length fell asleep in the Lord, full of days but still a Confessor, in the time of the Emperors Valerian and Gallienus, (in the year 265.)
      - type: text
        text: At Orleans, (in the year 453,) holy Anian, Bishop (of that see,) the preciousness of whose death, in the sight of the Lord, is attested by many miracles.
      - type: text
        text: At Tours, (in the year 595,) holy Gregory, Bishop (of that see.)
      - type: text
        text: At Florence, the holy Confessor Eugene, a Deacon of blessed Zenobius, Bishop of that see.
      - type: text
        text: In Germany, (in the year 1334,) the holy Virgin Gertrude, of the Order of St. Benedict, eminent for her gift of revelations, whose feast we have kept upon the 15th day of this present month.
      la:
      - type: text
        text: Quintodécimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Neocæsaréæ, in Ponto, natális sancti Gregórii, Epíscopi et Confessóris, doctrína et sanctitáte illústris, qui propter signa atque mirácula, quæ cum multa Ecclesiárum glória perpetrávit, Thaumatúrgus est appellátus.
      - type: text
        text: Helpíthi, in Saxónia, item natális sanctæ Gertrúdis, Vírginis, ex Ordine sancti Benedícti, quæ dono revelatiónum clara éxstitit. Ipsíus tamen festívitas prídie huius diéi celebrátur.
      - type: text
        text: In Palæstína sanctórum Mártyrum Alphǽi et Zachǽi, qui primo anno persecutiónis Diocletiáni, post multa torménta, capitálem senténtiam subiére.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Acíscli et Victóriæ germanórum, qui, in eádem persecutióne, Diónis Prǽsidis iussu sævíssime cruciáti sunt, et illústri passióne corónas a Dómino meruérunt.
      - type: text
        text: Alexandríæ sancti Dionýsii Epíscopi, summæ eruditiónis viri, qui, multis confessiónibus clarus et pro passiónum tormentorúmque diversitáte magníficus, plenus diérum Conféssor quiévit, Valeriáni et Galliéni Imperatórum tempóribus.
      - type: text
        text: Aureliánis, in Gállia, sancti Aniáni Epíscopi, cuius mortem in conspéctu Dómini pretiósam mirácula crebra testántur.
      - type: text
        text: In Británnia sancti Hugónis Epíscopi, qui, ex Mónacho Carthusiáno ad Ecclésiam Lincolniénsem regéndam vocátus, multis cláruit miráculis, et sancto fine quiévit.
      - type: text
        text: Turónis, in Gállia, sancti Gregórii Epíscopi.
      - type: text
        text: Floréntiæ sancti Eugénii Confessóris, qui fuit Diáconus beáti Zenóbii, eiúsdem civitátis Epíscopi.
  psalm.quintod-cimo-kal-ndas-febru-rii-81697838e0:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the Feast of the See of the holy Apostle Peter wherein he first sat at Rome.
      - type: citation
        text: 'Upon the same 18th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Virgin and martyr Prisca, who after suffering many torments was crowned with martyrdom under the Emperor Claudius.
      - type: text
        text: In Pontus, the holy soldiers Moseus and Ammonius, who were first condemned to penal servitude in the mines and then burnt, (under the Emperor Decius.) Likewise in Pontus, (probably in the year 196,) the holy martyr Athenogenes the Old, called the Theologian, who, when he was about to suffer martyrdom by fire, joyfully sang an hymn, which also he left unto his disciples in writing.
      - type: text
        text: At Tours, in Gaul, (in the year 498,) holy Volusian, Bishop of that see, who was taken prisoner by the Goths, and while still in exile gave up his soul to God.
      - type: text
        text: There also, (in the year 593,) the holy hermit (of Tourance,) Leobard, who was a bright light of self-denial and lowliness.
      - type: text
        text: In Brittany, holy Deicola, Abbot (of Lure,) (in the year 625,) a disciple of blessed Columbanus.
      - type: text
        text: At Como, (in the year 581,) the holy virgin Liberata.
      la:
      - type: text
        text: Quintodécimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Romæ pássio sanctæ Priscæ, Vírginis et Mártyris; quæ sub Cláudio Imperatóre, post multa torménta, martýrio coronáta est.
      - type: text
        text: In Ponto natális sanctórum Mártyrum Moséi et Ammónii, qui, cum essent mílites, primo ad metálla damnáti sunt, ac novíssime igni tráditi.
      - type: text
        text: Ibídem sancti Athenógenis, antíqui Theólogi, qui, per ignem consummatúrus martýrium, hymnum lætus cecinit, quem et discípulis scriptum relíquit.
      - type: text
        text: Turónis, in Gállia, sancti Volusiáni Epíscopi, qui, a Gothis captus, in exsílio spíritum Deo réddidit.
      - type: text
        text: In monastério Lutrénsi, in Burgúndia, sancti Deícolæ Abbátis, qui, natióne Hibérnus, discípulus fuit beáti Columbáni.
      - type: text
        text: Turónis, in Gállia, sancti Leobárdi reclúsi, qui mira abstinéntia et humilitáte refúlsit.
      - type: text
        text: Novocómi sanctæ Liberátæ Vírginis.
      - type: text
        text: Budæ, in Hungária, sanctæ Margarítæ, Vírginis, e régia Arpadénsium família, Ordinis sancti Domínici Moniális, virtúte castitátis et arctíssima pæniténtia insígnis, quam Pius Duodécimus, Póntifex Máximus, sanctárum Vírginum catálogo adscrípsit.
  psalm.quintod-cimo-kal-ndas-i-lii-b8b3f6120a:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 17th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, the holy Abbot Botolph.
      - type: text
        text: At Rome, two hundred and sixty two holy martyrs, who were slain for Christ's faith's sake in the persecution under Diocletian, and were buried at Cucumber Hill, upon the old Salarian Way.
      - type: text
        text: At Tarracina, the holy soldier Montanus, who, after many torments, received the crown of martyrdom under Hadrian the Emperor and Leontius the Consular.
      - type: text
        text: At Venafro, the holy martyrs Nicander and Marcian, who were beheaded in the persecution under Maximian.
      - type: text
        text: At Chalcedon, the holy martyrs Manuel, Sabel, and Ishmael. They were envoys who had been sent by the King of Persia to Julian the Apostate to treat for peace. Julian commanded them to worship idols, and, forasmuch as they steadfastly refused so to do, he caused them to be slain with the sword.
      - type: text
        text: At Apollonia, in Macedonia, the holy martyrs Isaurus a Deacon, Innocent, Felix, Jeremiah, and Peregrine, Athenians, who were in diverse ways tormented and then beheaded, under the Tribune Tripontius.
      - type: text
        text: At Amelia, in Umbria, [in the sixth century,] the holy Himerius, Bishop [of that see,] whose body was taken to Cremona, [five hundred years later.]
      - type: text
        text: In Berry, [also in the sixth century,] holy Gundulph, Bishop [of that see.]
      - type: text
        text: At Orleans, [in the year 530,] the holy Priest and Confessor Avitus.
      - type: text
        text: In Phrygia, [in the fifth century,] the holy Confessor Hypatius.
      - type: text
        text: Also, [in the year 1160,] the holy Hermit Bessarion.
      - type: text
        text: At Pisa, in Tuscany, [in the year 1160,] the holy Confessor Rainerius.
      la:
      - type: text
        text: Quintodécimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Sancti Gregórii Barbadíci, Cardinális, Epíscopi et Confessóris, cuius dies natális sequénti die recensétur.
      - type: text
        text: Romæ natális sanctórum ducentórum et sexagínta duórum Mártyrum, qui, in persecutióne Diocletiáni, pro fide Christi sunt necáti, ac pósiti via Salária véteri, ad clivum Cucúmeris.
      - type: text
        text: Vesontióne, in Gálliis, sancti Antídii, Epíscopi et Mártyris, qui, ob Christi fidem, a Wándalis occísus fuit.
      - type: text
        text: Apollóniæ, in Macedónia, sanctórum Mártyrum Atheniénsium Isáuri Diáconi, Innocéntii, Felícis, Ieremíæ et Peregríni, qui, a Tripóntio Tribúno várie torti, cápite obtruncáti sunt.
      - type: text
        text: Tarracínæ, in Campánia, sancti Montáni mílitis, qui, sub Hadriáno Imperatóre et Leóntio Consulári, post multa torménta, martýrii corónam accépit.
      - type: text
        text: Apud Venáfrum, in Campánia, sanctórum Mártyrum Nicándri et Marciáni, qui, in persecutióne Maximiáni, cápite cæsi sunt.
      - type: text
        text: Chalcedóne sanctórum Mártyrum Manuélis, Sabélis et Ismaélis, qui, pacis causa apud Iuliánum Apóstatam pro Persárum Rege legatióne fungéntes, ab ipso Imperatóre, cum idóla venerári compelleréntur idque constánti ánimo recusárent, gládio feríri iubéntur.
      - type: text
        text: Amériæ, in Umbria, sancti Himérii Epíscopi, cuius corpus Cremónam, in Insúbria, translátum est.
      - type: text
        text: In pago Bituricénsi sancti Gundúlphi Epíscopi.
      - type: text
        text: Aureliánis, in Gállia, sancti Avíti, Presbýteri et Confessóris.
      - type: text
        text: In Phrýgia sancti Hypátii Confessóris.
      - type: text
        text: Item sancti Bessariónis Anachorétæ.
      - type: text
        text: Pisis, in Túscia, sancti Rainerii Confessóris.
  psalm.quintod-cimo-kal-ndas-i-nii-e6e3c8c58d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 18th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Camarino, in the neighbourhood of Ancona, the holy martyr Venantius, who, at fifteen years of age, under Decius the Emperor and Antiochus the President, along with ten others, finished the course of a glorious contention by being beheaded.
      - type: text
        text: In Egypt, the holy Reader Dioscorus, upon whom the President practiced many and diverse tortures, so that he had his nails dug out, and his sides scarified with lamps, but a sudden light from heaven terrified the tormentors so that they fell down; lastly, he was roasted with hot plates of metal, and so finished his testimony.
      - type: text
        text: At Spoleto, the holy Felix, Bishop [of Spello,] who gained the palm of martyrdom, under the Emperor Maximian.
      - type: text
        text: In Egypt, the holy Potamion, Bishop [of Heraclea,] who was first a Confessor of the faith under the Emperor Maximian Gallerius, and afterwards crowned with martyrdom, under the Emperor Constantius and the Arian President Philagrius.
      - type: text
        text: At Ancyra, in Galatia, the holy martyrs Theodotus, and the Virgins Thecusa his aunt, Alexandra, Claudia, Faina, Euphrasia, Matrona, and Julitta, who were sentenced by the President to the stews, but were preserved by the power of God whereupon stones were tied to their necks and they were sunk in a swamp. Theodotus gathered their remains and buried them honourably, whereupon he was arrested by the President and savagely mangled, and at length received the crown of his testimony by being stricken with the sword.
      - type: text
        text: At Uppsala, in Sweden, [in the year 1161,] the holy martyr Eric, King of that land.
      - type: text
        text: At Rome, [in the year 1587,] the holy Confessor Felix of Cantalicio, of the Order of Friars Minors Capuchins, who was remarkable for his Gospel simplicity and charity, and whom the Supreme Pontiff Clement XI numbered among the Saints.
      la:
      - type: text
        text: Quintodécimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Cameríni sancti Venántii Mártyris, qui, annos quíndecim natus, sub Décio Imperatóre et Antíocho Prǽside, una cum áliis decem, gloriósi certáminis cursum, cervícibus abscíssis, implévit.
      - type: text
        text: Ravénnæ natális sancti Ioánnis Primi, Papæ et Mártyris; qui, ab Ariáno Itáliæ Rege Theodoríco illuc dolo evocátus, ibídem, ab eo propter orthodóxam fidem diu macerátus in cárcere, vitam finívit. Ipsíus autem festum recólitur sexto Kaléndas Iúnii, quo die sacrum eius corpus, Romam relátum, in Basílica sancti Petri, Apostolórum Príncipis, sepúltum est.
      - type: text
        text: Spoléti sancti Felícis Epíscopi, qui, sub Maximiáno Imperatóre, martýrii palmam adéptus est.
      - type: text
        text: Heracléæ, in Ægýpto, sancti Potamónis Epíscopi, qui primum, sub Maximiáno Galério, Conféssor fuit; deínde, sub Constántio Imperatóre et Ariáno Prǽside Philágrio, martýrio coronátus est. Ipsum vero beátum virum sancti Ecclésiæ Patres Athanásius et Epiphánius suis láudibus celebrárunt.
      - type: text
        text: In Ægýpto sancti Dióscori Lectóris, in quem Præses multa et vária torménta ita exércuit, ut ungues eius effóderet et lampádibus látera inflammáret, sed, cæléstis lúminis fúlgore pertérriti, cecidérunt minístri; novíssime autem ipse Dióscorus, láminis ardéntibus adústus, martýrium consummávit.
      - type: text
        text: Ancýræ, in Galátia, sancti Theódoti Mártyris, et sanctárum septem Vírginum et Mártyrum, scílicet Thecúsæ, quæ ipsíus Theódoti erat ámita, Alexándræ, Cláudiæ, Phaínæ, Euphrásiæ, Matrónæ et Iulíttæ. Hæ a Prǽside primum prostitútæ, sed Dei virtúte servátæ, deínde, lapídibus ad colla ligátis, in palúdem mersæ sunt; quarum relíquias colléctas cum Theódotus honorífice sepelísset, ídeo, comprehénsus a Prǽside, sævíssime dilaniátus est, ac demum, ense percússus, martýrii corónam accépit.
      - type: text
        text: Upsali, in Suécia, sancti Eríci, Regis et Mártyris.
      - type: text
        text: Romæ sancti Felícis Confessóris, ex Ordine Minórum Capuccinórum, evangélica simplicitáte et caritáte conspícui; quem Clemens Undécimus, Póntifex Máximus, Sanctórum fastis adscrípsit.
  psalm.quintod-cimo-kal-ndas-ianu-rii-8b1741ceeb:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the Feast of the Blessed Virgin Mary looking shortly to be delivered.
      - type: citation
        text: 'Upon the same 18th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Philippi, in Macedonia, (in the year 107,) the holy martyrs Rufus and Zozimus, who were of the number of the disciples by whom the early Church was founded among the Jews and Greeks of whose happy contending holy Polycarp writeth in his Epistle unto the Philippians.
      - type: text
        text: At Laodicea, in Syria, the holy martyrs Theotimus and Basilian.
      - type: text
        text: In Africa, the holy martyrs Quintus, Simplicius and others, who suffered in the persecution under the Emperors Decius and Valerian.
      - type: text
        text: There also the holy martyr Moysetes.
      - type: text
        text: Likewise in Africa also, the holy martyrs Victurus, Victor, Victorinus, Adjutor, Quartus, and thirty others.
      - type: text
        text: At Mopsuestia, in Cilicia, holy Auxentius, Bishop (of that see;) he was originally a soldier under the Emperor Licinius, but chose rather to cast away his military belt than to offer grapes to Bacchus; he afterwards became a Bishop, and fell asleep in peace, famous for worthy deeds, (fourth century.)
      - type: text
        text: At Tours, holy Bishop Gratian, who was ordained by holy Pope Fabian as the first Bishop of that city, and fell asleep in the Lord, famous for many miracles. (He was a disciple of the Apostles.)
      la:
      - type: text
        text: Quintodécimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Philíppis, in Macedónia, natális sanctórum Mártyrum Rufi et Zósimi, qui ex illórum número discipulórum fuérunt, per quos primitíva Ecclésia in Iudǽis et Græcis fundáta est; de quorum étiam felíci agóne scribit sanctus Polycárpus in epístola ad Philippénses.
      - type: text
        text: Laodicéæ, in Sýria, pássio sanctórum Theotími et Basiliáni.
      - type: text
        text: In Africa sanctórum Mártyrum Quincti, Simplícii et aliórum; qui sub Décii et Valeriáni persecutióne passi sunt.
      - type: text
        text: Ibídem sancti Moysétis Mártyris.
      - type: text
        text: Item in Africa sanctórum Mártyrum Victúri, Victóris, Victoríni, Adiutóris, Quarti et aliórum trigínta.
      - type: text
        text: Mopsuéstiæ, in Cilícia, sancti Auxéntii Epíscopi, qui, olim sub Licínio miles, pótius elégit cíngulum exúere quam uvas Baccho offérre; factúsque Epíscopus, præclárus méritis quiévit in pace.
      - type: text
        text: Turónis, in Gállia, sancti Gratiáni Epíscopi, qui, a sancto Fabiáno Papa primus eiúsdem civitátis Epíscopus ordinátus est, et multis clarus miráculis obdormívit in Dómino.
  psalm.quintod-cimo-kal-ndas-m-rtii-28c92bec93:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 15th day of February were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Brescia, the holy martyrs Faustinus and Jovita, who under the Emperor Hadrian, after many glorious contendings for Christ's faith, received by martyrdom a crown of victory, [about the year 122.]
      - type: text
        text: At Rome, the holy martyr Crato, [the Orator,] who was baptized by blessed Valentine, Bishop [of Terni, in Umbria,] along with his wife and his whole house and no long while after, he and they together attained unto martyrdom, [in the year 273.]
      - type: text
        text: At Terni, [in the year 270,] the holy Virgin and martyr Agapis.
      - type: text
        text: Also the holy martyrs Saturninus, Castulus, Magnus, and Lucius.
      - type: text
        text: At Vaison, in Gaul, holy Quinidius, Bishop of that see, whose death, [in the year 578,] how precious it was in the sight of the Lord miracles do oftentimes witness.
      - type: text
        text: At Capua, [in the year 695] the holy Confessor Decorosus, Bishop of that city.
      - type: text
        text: In the province of Valeria, [in the sixth century,] the holy Priest Severus, of whom blessed Gregory writeth that by his tears he recalled a dead man to life.
      - type: text
        text: At Antioch, the holy Deacon Joseph.
      - type: text
        text: In Auvergne, [in the sixth century,] the holy Virgin Georgia.
      la:
      - type: text
        text: Quintodécimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Bríxiæ natális sanctórum Mártyrum Faustíni et Iovítæ fratrum, qui sub Hadriáno Imperatóre, post multa præclára ob Christi fidem suscépta certámina, victrícem martýrii corónam accepérunt.
      - type: text
        text: Romæ sancti Cratónis Mártyris, qui, cum uxóre sua et univérsa domo a beáto Valentíno Epíscopo baptizátus, non multo post, una cum illis, martýrio consummátus est.
      - type: text
        text: Interámnæ natális sanctórum Mártyrum Saturníni, Cástuli, Magni et Lúcii.
      - type: text
        text: Ibídem sanctæ Agapis, Vírginis et Mártyris.
      - type: text
        text: Vasióne, in Gálliis, sancti Quinídii Epíscopi, cuius mortem in conspéctu Dómini pretiósam mirácula crebra testántur.
      - type: text
        text: Cápuæ sancti Decorósi, Epíscopi et Confessóris.
      - type: text
        text: In Província Valériæ sancti Sevéri Presbýteri, qui (ut beátus Gregórius Papa scribit), fusis lácrimis, defúnctum revocávit ad vitam.
      - type: text
        text: Antiochíæ sancti Ioséphi Diáconi.
      - type: text
        text: Arvérnis, in Gállia, sanctæ Geórgiæ Vírginis.
  psalm.quintod-cimo-kal-ndas-maii-606830bded:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 17th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Pope Anicetus, [in the year 175,] who received the palm of martyrdom in the persecution under Marcus Aurelius Antoninus and Lucius Verus.
      - type: text
        text: In Africa, the blessed martyr Mappalicus, who, [in the year 250,] was crowned, along with diverse other martyrs, as it is written by holy Cyprian in his epistle to the Martyrs and Confessors.
      - type: text
        text: Likewise in Africa, the holy martyrs Fortunatus and Marcian.
      - type: text
        text: At Antioch, the holy martyrs Peter the Deacon and Hermogenes his servant.
      - type: text
        text: At Cordova, the holy martyrs Elias the Priest, and the monks Paul and Isidore, [in the year 856.]
      - type: text
        text: At Vienne, [in the year 540,] holy Pantagathus, Bishop [of that see. He sat for five years and is reckoned the twentieth Bishop of the see. He was present at the Third Council of Orleans. He had been consul.]
      - type: text
        text: At Tortona, the holy Confessor Innocent, Bishop [of that see, in the year 351.]
      - type: text
        text: In the monastery of Chaise-Dieu, in the Diocese of Clermont, the holy Confessor Robert, the founder and first Abbot of that monastery, [in the year 1067.]
      la:
      - type: text
        text: Quintodécimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Anicéti, Papæ et Mártyris; qui martýrii palmam in persecutióne Marci Aurélii Antoníni et Lúcii Veri accépit.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Eliæ Presbýteri, Pauli et Isidóri Monachórum, qui, in persecutióne Arábica, ob Christiánæ fídei professiónem, interémpti sunt.
      - type: text
        text: Antiochíæ sanctórum Mártyrum Petri Diáconi, et Hermógenis, qui eiúsdem Petri erat miníster.
      - type: text
        text: In Africa natális beáti Mappálici Mártyris, qui (ut scribit sanctus Cypriánus in epístola ad Mártyres et Confessóres), cum áliis plúribus, martýrio coronátus est.
      - type: text
        text: Ibídem sanctórum Mártyrum Fortunáti et Marciáni.
      - type: text
        text: Viénnæ, in Gállia, sancti Pantágathi Epíscopi.
      - type: text
        text: Dertónæ sancti Innocéntii, Epíscopi et Confessóris.
      - type: text
        text: Cistércii, in Gállia, sancti Stéphani Abbátis, qui primus erémum Cisterciénsem incóluit, et sanctum Bernárdum, cum sóciis ad se veniéntem, lætus excépit.
      - type: text
        text: In monastério Casæ Dei, Claromontánæ diœcésis, in Gállia, sancti Robérti Confessóris, qui eiúsdem monastérii cónditor et primus Abbas éxstitit.
  psalm.quintod-cimo-kal-ndas-nov-mbris-a6fc153b05:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 18th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The blessed Evangelist Luke, who suffered many things for Christ's Name's sake, and died in Bithynia, full of the Holy Ghost. His bones were first brought to Constantinople, and thence to Padua.
      - type: text
        text: At Antioch, holy Asclepiades, Patriarch (of that see,) who was one of the noble multitude of martyrs who suffered gloriously under Macrinus.
      - type: text
        text: In the country of Beauvais, the holy martyr Justus, who, while he was yet a lad, was slain under the President Rictiovarus in the persecution under the Emperor Diocletian.
      - type: text
        text: At Neo-Caesarea, in Pontus, the holy martyr Athenodorus, Bishop (of that see.) He was brother of holy Gregory the Wonder-worker, was famous for his teaching, and was crowned with martyrdom in the persecution under the Emperor Aurelian.
      - type: text
        text: On the bank of the Euphrates, in Mesopotamia, (at the end of the fourth century,) the holy hermit Julian.
      - type: text
        text: At Rome, the holy Confessor Paul of the Cross, founder of the Congregation styled the Congregation of the Cross and Passion of our Lord Jesus Christ. He was famous for his marvelous innocency and devotion to penance, and kindled with an exceeding love toward Christ crucified. Pope Pius IX enrolled his name among those of the Saints, and appointed for his festival the 28th day of April.
      - type: text
        text: At Rome also, (in the third century,) holy Tryphonia, widow of Decius Caesar. She is buried in the Catacombs beside holy Hippolytus.
      la:
      - type: text
        text: Quintodécimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: In Bithýnia natális beáti Lucæ Evangelístæ, qui, multa passus pro Christi nómine, óbiit Spíritu Sancto plenus. Ipsíus autem ossa póstea Constantinópolim transláta sunt, et inde Patávium deláta.
      - type: text
        text: Romæ item natális sancti Pauli a Cruce, Presbýteri et Confessóris; qui Congregatiónis a Cruce et Passióne Dómini nostri Iesu Christi nuncupátæ Institútor fuit. Ipsum vero, mira innocéntia ac pæniténtia conspícuum et singulári in Christum crucifíxum caritáte incénsum, Pius Papa Nonus fastis Sanctórum adiúnxit, et eiúsdem festivitátem quarto Kaléndas Maii recoléndam indíxit.
      - type: text
        text: Arénis, in Hispánia, natális páriter sancti Petri de Alcántara, Sacerdótis ex Ordine Minórum et Confessóris; quem, propter admirábilem pæniténtiam múltaque mirácula, Clemens Nonus, Póntifex Máximus, Sanctórum número adscrípsit. Eius autem festum sequénti die celebrátur.
      - type: text
        text: Antiochíæ sancti Asclepíadis Epíscopi, qui fuit unus ex præcláro illórum Mártyrum número, qui glorióse sub Macríno passi sunt.
      - type: text
        text: Neocæsaréæ, in Ponto, sancti Athenodóri Epíscopi, qui fuit frater sancti Gregórii Thaumatúrgi; et, doctrína clarus, in persecutióne Aureliáni, martýrium consummávit.
      - type: text
        text: Sinomovíci, in território Bellovacénsi, sancti Iusti Mártyris, qui adhuc puer, in persecutióne Diocletiáni Imperatóris, sub Rictiováro Prǽside, cápite amputátus est.
      - type: text
        text: Romæ sanctæ Tryphóniæ, quæ Décii Cǽsaris quondam uxor ac sanctæ Vírginis et Mártyris Cyríllæ mater éxstitit; cuius corpus in crypta, iuxta sanctum Hippólytum, sepúltum est.
      - type: text
        text: Apud Auriesville, in statu Neo-Eboracénsi, sanctórum Mártyrum e Societáte Iesu, Isaáci Iogues, Sacerdótis, et Ioánnis de La Lande, Coadiutóris temporális, qui hac et sequénti die ab Iroquénsibus dire necáti sunt, eódem loco ubi, paucis ante annis, Renátus Goupil, et ipse Coadiútor temporális, martýrii palmam consecútus fúerat.
      - type: text
        text: In fínibus Edessénæ regiónis, in Mesopotámia, commemorátio sancti Iuliáni Eremítæ, cognoménto Sabæ, de quo ágitur étiam sextodécimo Kaléndas Februárii.
  psalm.quintod-cimo-kal-ndas-oct-bris-be1ab82b72:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we commemorate
      - type: text
        text: ''
      - type: text
        text: The making of the sacred marks which God was pleased by a wonderful grace to make upon the hands, feet, and side of holy Francis, Founder of the Order of Friars Minor, upon Mount Alvernia in Tuscany.
      - type: citation
        text: 'Upon the same 17th day of September, were born into the better life:'
      - type: text
        text: At Rome, upon the Tiburtine Way, the holy martyr Justin, a Priest who was famous for his glorious confession of Christ in the persecution under the Emperors Valerian and Gallienus. He buried the bodies of the blessed Pope Xystus, of Lawrence, of Hippolytus, and of many other saints, and at length himself achieved martyrdom under Claudius.
      - type: text
        text: Likewise at Rome, (under the Emperor Valerian,) the holy martyrs Narcissus and Crescentio.
      - type: text
        text: In Phrygia, holy Ariadne, martyred under the Emperor Hadrian.
      - type: text
        text: In Britain, (in the fourth century,) the holy martyrs Socrates and Stephen.
      - type: text
        text: At Nyon, (on the Lake of Geneva,) the holy martyrs Valerian, Macrinus, and Gordian.
      - type: text
        text: At Autun, the holy lad Flocellus, who suffered many things under the Emperor Antonine and the President Valerian, and at last was torn by wild beasts, and so received the crown of martyrdom.
      - type: text
        text: At Liege, blessed Lambert, Bishop of Maastricht. In his godly zeal he rebuked the Royal House (of Pepin,) whereupon the saint was slain by the sinners, and he went hence to live for ever in a mansion in the kingdom of heaven.
      - type: text
        text: At Zaragoza, in Spain, (in the year 1485,) holy Peter of Arbues, the first Inquisitor of the Faith in the kingdom of Aragon, who was cruelly murdered by some relapsed Jews for the sake of that Catholic faith which in his office he was zealously protecting. Pope Pius IX enrolled his name among those of the holy martyrs.
      - type: text
        text: Upon the same day, the holy Agathoclia, the handmaid of a certain unbelieving woman, who afflicted her of a long time with stripes and other sufferings, to make her deny Christ, and at length brought her before the judge, by whose orders she was very cruelly mangled and forasmuch as she still remained firm in the confession of the faith, her tongue was cut out, and she was cast into the fire.
      - type: text
        text: At Cordova, (in the persecution under the Moors, in the ninth century,) the holy Virgin and martyr Columba.
      - type: text
        text: At Milan, the holy Confessor Satyrus, whose excellences are recorded by his holy brother Ambrose.
      - type: text
        text: At Rome, the holy Matron Theodora, who ministered constantly to the holy martyrs in the persecution under Diocletian.
      - type: text
        text: At Bingen, in the diocese of Mainz, (in the year 1179,) the holy Virgin Hildegard.
      la:
      - type: text
        text: Quintodécimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: In monte Alvérniæ, in Etrúria, commemorátio Impressiónis sacrórum Stígmatum, quibus sanctus Francíscus, Ordinis Minórum Institútor, in suis mánibus, pédibus et látere, mirábili Dei grátia, impréssus fuit.
      - type: text
        text: Romæ natális sancti Robérti Bellarmíno, Confessóris, e Societáte Iesu, atque Cardinális et Capuáni olim Epíscopi, sanctitáte, doctrína, et plúrimis ad cathólicæ fídei et Apostólicæ Sedis defensiónem suscéptis labóribus claríssimi; quem Pius Undécimus, Póntifex Máximus, Sanctórum honóribus auxit et universális Ecclésiæ Doctórem declarávit, eiúsque festum tértio Idus Maii recoléndum indíxit.
      - type: text
        text: Romæ, via Tiburtína, natális sancti Iustíni, Presbýteri et Mártyris; qui, in persecutióne Valeriáni et Galliéni, ob confessiónis glóriam fuit insígnis. Hic beáti Pontíficis Xysti Secúndi, Lauréntii, Hippólyti aliorúmque plurimórum Sanctórum córpora sepelívit, ac demum, sub Cláudio, martýrium consummávit.
      - type: text
        text: Item Romæ sanctórum Mártyrum Narcíssi et Crescentiónis.
      - type: text
        text: Apud Leódium, in Bélgio, beáti Lambérti, Epíscopi Traiecténsis, qui, cum régiam domum zelo religiónis increpásset, a nocéntibus ínnocens occísus est, sicque aulam regni cæléstis perpétuo victúrus intrávit.
      - type: text
        text: Cæsaraugústæ, in Hispánia, sancti Petri de Arbues, primi in Aragóniæ regno Quæsitóris fídei; quem, a relápsis Iudǽis ob eándem, quam pro múnere suo strénue tuebátur, cathólicam fidem, immániter trucidátum, sanctórum Mártyrum catálogo Pius Papa Nonus adiúnxit.
      - type: text
        text: In Británia sanctórum Mártyrum Sócratis et Stéphani.
      - type: text
        text: Noviodúni, in Gálliis, sanctórum Mártyrum Valeriáni, Macríni et Gordiáni.
      - type: text
        text: Augustodúni sancti Flocélli púeri, qui, sub Antoníno Imperatóre et Valeriáno Prǽside, multa passus, demum, a feris discérptus, martýrii corónam adéptus est.
      - type: text
        text: Córdubæ, in Hispánia, sanctæ Colúmbæ, Vírginis et Mártyris.
      - type: text
        text: In Phrýgia sanctæ Ariádnæ Mártyris, sub Hadriáno Imperatóre.
      - type: text
        text: Eódem die sanctæ Agathoclíæ, quæ, cum esset ancílla cuiúsdam mulíeris infidélis, a dómina sua longo témpore verbéribus aliísque ærúmnis est vexáta ut Christum negáret; demum, obláta Iúdici ac sǽvius laniáta, et nihilóminus in confessióne fídei persístens, ídeo, post excisiónem linguæ, in ignem proiécta est.
      - type: text
        text: Medioláni deposítio sancti Sátyri Confessóris, cuius insígnia mérita sanctus Ambrósius, eius frater, commémorat.
      - type: text
        text: Apud Bíngiam, in diœcési Moguntinénsi, sanctæ Hildegárdis Vírginis.
      - type: text
        text: Romæ sanctæ Theodóræ matrónæ, quæ, in persecutióne Diocletiáni, sanctis Martýribus sédulo ministrábat.
  psalm.quintod-cimo-kal-ndas-sept-mbris-1d68b1eb45:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 18th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Lavican Way, [in the year 328,] holy [widow] Helen, [Empress of the West,] mother of that most religious Emperor Constantine the Great, who was the first to leave to other princes the pattern of how to protect and spread the Church.
      - type: text
        text: At Palestrina, Italy, [in the year 274,] the holy martyr Agapitus, [principal patron of the Church in Palestrina]; he was fifteen years of age, and hot with the love of Christ. He was tried by command of the Emperor Aurelian, and was first scourged for a very long time with raw thongs, afterwards he suffered worse under the Prefect Antiochus. By command of the Emperor he was thrown to lions, but as these hurt him not at all the servants smote him with the sword, and so he went to be crowned.
      - type: text
        text: At Rome, the blessed Priests John and Crispus. During the persecution under Diocletian they busied themselves in burying many bodies of the Saints, with whom they themselves were afterward made fellows, and gained the gladness of life eternal [by martyrdom.]
      - type: text
        text: Likewise at Rome, the holy martyrs Hermas, Serapion, and Polysenus, who were dragged through strait, rocky, and rough places until they gave up their souls to God.
      - type: text
        text: In Illyricum, [in the second century,] the holy martyrs Florus and Laurus, quarrymen, who, after their masters Proculus and Maximus had been martyred, were put to many torments, under the President Licion, and then thrown into a well.
      - type: text
        text: At Myra, in Lycia, the holy martyrs Leo and Juliana.
      - type: text
        text: At Metz, in Gaul, [in the fourth century,] the holy Confessor Firmin, [eleventh] Bishop [of that see.]
      - type: text
        text: At Montefalco, in Umbria, [in the year 1308,] the blessed Virgin Clare, a Nun of the Order of Hermits of St. Augustine, on whose heart the mysteries of the suffering of the Lord were found set forth anew, and are therein most reverently worshipped. The Supreme Pontiff Leo XIII solemnly enrolled her name in the list of those of the holy Virgins.
      la:
      - type: text
        text: Quintodécimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Prænéste natális sancti Agapíti Mártyris, qui cum esset annórum quíndecim, et amóre Christi fervéret, iussu Aureliáni Imperatóris tentus, ac primo nervis crudis diutíssime cæsus, deínde sub Antíocho Præfécto gravióra supplícia passus; exínde cum ex præcépto Imperatóris leónibus obiicerétur, et mínime læsus esset, gládio ministrórum coronándus percútitur.
      - type: text
        text: Romæ beatórum Ioánnis et Crispi Presbyterórum, qui in persecutióne Diocletiáni multa Sanctórum córpora officiosíssime sepeliérunt, quorum méritis et ipsi póstmodum sociáti, gáudia vitæ ætérnæ meruérunt.
      - type: text
        text: Item Romæ sanctórum Mártyrum Hermæ, Serapiónis et Polyǽni, qui per angústa, saxósa et áspera loca raptáti, ánimas Deo reddidérunt.
      - type: text
        text: In Illýrico sanctórum Mártyrum Flori et Lauri artis lapicidínæ, qui, consúmptis martýrio eórum magístris Próculo et Máximo, sub Licióne Prǽside post multa torménta in profúndum púteum sunt demérsi.
      - type: text
        text: Myræ in Lýcia sanctórum Mártyrum Leónis et Iuliánæ.
      - type: text
        text: Metis in Gállia sancti Firmíni Epíscopi et Confessóris.
      - type: text
        text: Romæ via Lavicána sanctæ Hélenæ matris Constantíni Magni piíssimi Imperatóris, qui primus Ecclésiæ tuéndæ atque amplificándæ exémplum céteris Princípibus prǽbuit.
  psalm.s-ptimo-idus-apr-lis-7d6c0f8128:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 7th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rouen, [in the year 17 19,] the holy Confessor John Baptist de la Salle. He was foremost in the teaching of the young, the poor especially, and deserved well of both religion and civil society. He founded the Congregation of the Brothers of the Christian Schools.
      - type: text
        text: In Africa, the holy martyrs Epiphanius, the Bishop, also Donatus, Rufinus, and thirteen others.
      - type: text
        text: At Synope, in Pontus, two hundred holy martyrs, [in the year 310.]
      - type: text
        text: '[At Soti,] in Cilicia, the holy martyr Calliopius, who after diverse torments under the prefect Maximian was crucified head downwards, and so gained a noble crown of martyrdom, [in the year 304.]'
      - type: text
        text: At Nicomedia, the holy martyrs Cyriacus and ten others.
      - type: text
        text: At Alexandria, the holy martyr Peleusius the Priest.
      - type: text
        text: At Rome, holy Hegesippus, who came to Pope Anicetus, at Rome, [in the year 157,] very soon after the time of the Apostles, and abode there until the time of Pope Eleutherius, [and died in the year 180.] He wrote in plain words a Church history from the Passion of the Lord until his own time, to set forth the lives of those in whose footsteps he followed.
      - type: text
        text: At Verona, the holy Confessor Saturninus, Bishop of that see, [in the fourth century.]
      - type: text
        text: In Syria, the holy Hermit Aphraates, who defended the Catholic faith by the power of his miracles against the Arians, in the time of the Emperor Valens.
      la:
      - type: text
        text: Séptimo Idus Aprílis
      - type: text
        text: ''
      - type: text
        text: Rotómagi natális sancti Ioánnis Baptístæ de La Salle, Presbýteri et Confessóris, qui, in erudiénda adolescéntia præsértim páupere excéllens, et de religióne civilíque societáte præcláre méritus, Fratrum Scholárum Christianárum Sodalitátem instítuit. Eum Pius Duodécimus, Póntifex Máximus, ómnium Magistrórum púeris adolescentibúsque instituéndis præcípuum apud Deum cæléstem Patrónum constítuit. Ipsíus tamen festum Idibus Maii celebrátur.
      - type: text
        text: In Africa item natális sanctórum Mártyrum Epiphánii Epíscopi, Donáti, Rufíni et aliórum trédecim.
      - type: text
        text: Alexandríæ sancti Peléusii, Presbýteri et Mártyris.
      - type: text
        text: Synópe, in Ponto, sanctórum ducentórum Mártyrum.
      - type: text
        text: In Cilícia sancti Calliópii Mártyris, qui, sub Maximiáno Præfécto, post ália torménta, cápite in terram verso cruci affíxus, nóbili coróna martýrii decorátus est.
      - type: text
        text: Nicomedíæ sancti Cyríaci et aliórum decem Mártyrum.
      - type: text
        text: Verónæ sancti Saturníni, Epíscopi et Confessóris.
      - type: text
        text: Romæ sancti Hegesíppi, qui, vicínus Apostolórum tempóribus, Romam venit ad Anicétum Pontíficem, ibíque mansit usque ad Eleuthérium, et Ecclesiasticórum Actuum a passióne Dómini usque ad suam ætátem sermóne símplici texuit históriam; ut, quorum vitam sectabátur, dicéndi quoque exprímeret charactére.
      - type: text
        text: In Sýria sancti Aphraátis Anachorétæ, qui, Valéntis témpore, cathólicam fidem virtúte miraculórum advérsus Ariános deféndit.
  psalm.s-ptimo-idus-aug-sti-8de5a7af66:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 7th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Naples, in Campania, [in the year 1547,] the holy Confessor Gaetan of Tiene, Founder of the Clerks Regular, who with wonderful confidence in God enjoined upon them the first way of living of the Apostles. He was famous for miracles, and Clement X. enrolled his name among those of the Saints.
      - type: text
        text: At Arezzo, in Tuscany, [in the year 362,] the holy martyr Donatus, Bishop [of that see.], who among other miraculous deeds, by his prayers (as is related by blessed Pope Gregory) made whole again a sacred chalice which had been broken by pagans. He was arrested by the imperial officer Quadratian in the persecution under the Emperor Julian the Apostate, and for as much as he refused to sacrifice to idols he was beheaded, and so finished his testimony. There suffered also along with him the blessed monk Hilarinus, whose feast is kept upon the 16th day of July, being the day whereon his body was brought to Ostia.
      - type: text
        text: At Rome, [in the third century,] the holy martyrs Peter and Julian, and eighteen others.
      - type: text
        text: At Milan, [in the second century,] the holy soldier Faustus, who under the Emperor Aurelius Commodus, after many contendings, gained the crown of martyrdom.
      - type: text
        text: At Como, [in the district of Milan,] the holy martyrs Carpophorus, Exanthus, Cassius, Severinus, Secundus, and Licinius, who were beheaded, [about the year 303,] for confessing Christ.
      - type: text
        text: At Nisibis, in Mesopotamia, [in the year 363,] holy Dometius, a Persian monk, who was stoned to death with two of his disciples, under the Emperor Julian the Apostate.
      - type: text
        text: At Rouen, [about the year 407,] holy Vitricius, Bishop [of that see.] He was a soldier who threw away his belt for Christ's sake under the same Emperor Julian. He was put to many torments by his Tribune, and condemned to death, but the executioner who had been sent to behead him was struck blind, and he got his bonds loosed, and escaped. He afterwards became a Bishop, and by his preaching of the word brought the unconquered tribes of the Morini and Nervii to believe in Christ, and at the last fell asleep in peace.
      - type: text
        text: At Châlons[-sur-Marne,] in Gaul, [in the year 136,] holy Donatian, Bishop [of Châlons.]
      - type: text
        text: At Messina, in Sicily, [in the year 1306,] the holy Confessor Albert, of the Order of Carmelites, famous for miracles.
      la:
      - type: text
        text: Séptimo Idus Augústi
      - type: text
        text: ''
      - type: text
        text: Neápoli, in Campánia, sancti Caietáni Thienǽi Confessóris, Clericórum Regulárium Fundatóris, qui, singulári in Deum fidúcia, prístinam Apostólicam vivéndi formam suis coléndam trádidit, et, miráculis clarus, a Cleménte Papa Décimo inter Sanctos relátus est.
      - type: text
        text: Arétii, in Túscia, natális sancti Donáti, Epíscopi et Mártyris; qui, inter cétera virtútis ópera (ut scribit beátus Gregórius Papa), cálicem sanctum, a Pagánis fractum, orándo instaurávit. Is, in persecutióne Iuliáni Apóstatæ, a Quadratiáno Augustáli comprehénsus, et, cum sacrificáre idólis renuísset, gládio percússus, martýrium consummávit. Passus est étiam cum eo beátus Hilarínus Mónachus; cuius memória décimo séptimo Kaléndas Augústi recólitur, quo die sacrum ipsíus corpus ad Ostia Tiberína translátum fuit.
      - type: text
        text: Romæ sanctórum Mártyrum Petri et Iuliáni, cum áliis decem et octo.
      - type: text
        text: Medioláni sancti Fausti mílitis, qui, sub Aurélio Cómmodo, post multa certámina, martýrii palmam adéptus est.
      - type: text
        text: Novocómi pássio sanctórum Mártyrum Carpóphori, Exánthi, Cássii, Severíni, Secúndi et Licínii; qui, in confessióne Christi, cápite truncáti sunt.
      - type: text
        text: Nísibi, in Mesopotámia, sancti Dométii, Mónachi Persæ, qui cum duóbus discípulis, sub Iuliáno Apóstata, lapidátus est.
      - type: text
        text: Rotómagi sancti Victrícii Epíscopi, qui adhuc miles, sub eódem Iuliáno, abiíciens pro Christo cíngulum, a Tribúno multis torméntis affícitur, et cápitis damnátur; sed, carnífice, qui ad eum cædéndum missus fúerat, cæcitáte percússo, ipse, vínculis solútis, liber evásit. Póstea, Epíscopus factus, indómitas Morinórum et Nerviórum gentes divíni prædicatióne verbi ad Christi fidem perdúxit, et demum Conféssor in pace quiévit.
      - type: text
        text: Cataláuni, in Gállia, sancti Donatiáni Epíscopi.
      - type: text
        text: Messánæ, in Sicília, sancti Albérti Confessóris, ex Ordine Carmelitárum, miráculis clari.
  psalm.s-ptimo-idus-dec-mbris-e420e29db8:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the eve of the Immaculate Conception of the Blessed Virgin Mary. On the same day is kept the feast of the holy Confessor Ambrose, Archbishop of Milan, and Doctor of the universal Church, the which is adorned by his holiness and teaching. (His birth into the better life, in the year 397, is recorded upon the 4th day of April. The 7th day of December is the day of his ordination to the Bishopric of Milan.)
      - type: citation
        text: 'Upon the same 7th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, the blessed soldier Agatho. During the persecution under the Emperor Decius, there were some that would make mock of the bodies of the martyrs, and Agatho forbade them, whereupon straightway a cry of the whole mob was got up against him, he was brought before the judge, and as he stood firm in the confession of Christ he was beheaded, (about the year 250.)
      - type: text
        text: At Antioch, the holy martyrs Polycarp and Theodore.
      - type: text
        text: At Tebourba, in Africa, the holy martyr Servus, who in the Vandal persecution under the Arian king Hunneric, was long cudgelled, repeatedly jerked up with pulleys and dropped upon flints, and scraped with sharp stones, and by this torment gained the palm of martyrdom, (in the year 384.)
      - type: text
        text: At Chieti, in the kingdom of Naples, (in the ninth century,) the holy Confessor Urban, Bishop of (that see.)
      - type: text
        text: At Saintes, in Gaul, (about the year 400,) the holy Abbot Martin, at whose grave by the power of God famous miracles are oftentimes wrought. (He was the founder and first Abbot of the Monastery of Sanjon.)
      - type: text
        text: At Meaux, (in the year 657,) the holy Virgin Fara (de Champigny, Abbess of Faremoutier, in the diocese of Meaux.)
      la:
      - type: text
        text: Séptimo Idus Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Ambrósii Epíscopi, Confessóris et Ecclésiæ Doctóris, qui prídie Nonas Aprílis obdormívit in Dómino, sed hac die potíssimum cólitur, qua Mediolanénsem Ecclésiam gubernándam suscépit.
      - type: text
        text: Romæ beáti Eutychiáni Papæ, qui per divérsa loca trecéntos quadragínta duos Mártyres manu sua sepelívit; quibus et ipse deínde sociátus, sub Numeriáno Imperatóre, martýrio coronátus est, et in cœmetério Callísti sepúltus.
      - type: text
        text: Alexandríæ natális beáti Agathónis militáris, qui, in persecutióne Décii, cum prohíberet quosdam voléntes illúdere cadavéribus Mártyrum, clamor repénte totíus vulgi advérsus eum extóllitur; oblátus autem Iúdici, et in Christi confessióne persístens, cápite pro pietáte damnátus est.
      - type: text
        text: Antiochíæ sanctórum Mártyrum Polycárpi et Theodóri.
      - type: text
        text: Tubúrbi, in Africa, sancti Servi Mártyris, qui, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, fústibus diutíssime cæsus, tróchleis frequénter in sublíme elevátus atque ictu céleri super sílices póndere córporis dimíssus, et lapídibus acutíssimis perfricátus, martýrii palmam adéptus est.
      - type: text
        text: Theáni, in Campánia, sancti Urbáni, Epíscopi et Confessóris.
      - type: text
        text: Apud Sántonas, in Gállia, sancti Martíni Abbátis, ad cuius túmulum crebérrima divínitus fiunt mirácula.
      - type: text
        text: Eboriáci, in território Meldénsi, commemorátio sanctæ Faræ, étiam Burgundofáræ nómine appellátæ, Abbatíssæ et Vírginis, cuius dies natális tértio Nonas Aprílis recensétur.
  psalm.s-ptimo-idus-febru-rii-77e545f055:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Abbot Romuald, [buried at Fabriano in Piceno, in the year 1027,] father of the monks of the Camaldolese Institute, of whom mention is made upon the 19th day of June.
      - type: citation
        text: 'Upon the same 7th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In London, [in the fourth century,] the blessed Augulus, Bishop of that city, who ended his life by martyrdom, and so secured the everlasting prize.
      - type: text
        text: In Phrygia, the holy martyr Adaucus. He was an Italian of noble birth, and had been honoured by the emperors with dignities of almost every rank, and was still quaestor when he gained the crown of martyrdom in defence of the faith, [in the year 304, at Andandros, a town of Phrygia.] Likewise many other holy martyrs, citizens of the same city, [including the Prefect of the Treasury, the Military Prefect, and the Senate,] who followed with Adaucus. They were all Christians and remained steadfast in the confession of the faith, and the Emperor Galerius Maximian caused them all to be burned with fire.
      - type: text
        text: At Heraclea, the holy martyr Theodore. He was a trainer of the soldiery, and in the reign of the Emperor Licinius was beheaded after suffering many torments, and so passed away a conqueror to heaven, [in the year 319.]
      - type: text
        text: In Egypt, holy Moses, the venerable Bishop of [the Saracens in Arabia.] He first lived as a hermit in the desert, but afterwards was made Bishop at the desire of Mauvia, Queen of the Saracens, converted many of that fierce people to the faith, and at length fell asleep in peace, glorious for worthy works.
      - type: text
        text: At Lucca, in Tuscany, [in the year 722,] holy Richard, Prince of the West Saxons in England, and father of holy Winibald, Willibald, and Walburg.
      - type: text
        text: At Bologna, [in the year 430,] the holy widow Juliana.
      la:
      - type: text
        text: Séptimo Idus Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Romuáldi Abbátis, Monachórum Camaldulénsium Patris, cuius dies natális tertiodécimo Kaléndas Iúlii recensétur, sed festívitas hac die, ob Translatiónem córporis eius, potíssimum celebrátur.
      - type: text
        text: Augústæ, cui nunc Londíni nomen, in Británnia, natális beáti Auguli Epíscopi, qui, ætátis cursu per martýrium expléto, ætérna prǽmia suscípere méruit.
      - type: text
        text: In Phrýgia sancti Adáuci Mártyris, qui, ex Itálico génere clarus, et omni fere dignitátum gradu ab Imperatóribus insignítus, tandem, cum adhuc Quæstóris offício fungerétur, martýrii coróna pro fídei defensióne dignátus est.
      - type: text
        text: Ibídem plurimórum sanctórum Mártyrum, urbis uníus cívium, quorum dux erat idem Adáucus; qui, cum omnes Christiáni essent, et constánter in fídei confessióne persísterent, a Galério Maximiáno Imperatóre sunt igne consúmpti.
      - type: text
        text: Heracléæ, in Ponto, sancti Theodóri, ductoris mílitum, qui, Licínio imperánte, post multa torménta, truncátus cápite, victor migrávit in cælum.
      - type: text
        text: In Ægýpto sancti Móysis, Epíscopi venerábilis, qui primum in erémo vitam solitáriam duxit; deínde, peténte Regína Saracenórum Máuvia, Epíscopus factus, gentem illam ferocíssimam magna ex parte ad fidem convértit, et gloriósus méritis quiévit in pace.
      - type: text
        text: Lucæ, in Túscia, deposítio sancti Richárdi, Regis Anglórum, qui pater éxstitit sancti Willebáldi, Eystetténsis Epíscopi, ac sanctæ Walbúrgæ Vírginis.
      - type: text
        text: Bonóniæ sanctæ Iuliánæ Víduæ.
  psalm.s-ptimo-idus-i-lii-ea25ff68db:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of
      - type: text
        text: ''
      - type: text
        text: Holy Confessor Willibald, first Bishop of Eichstätt, in Saxony, who laboured in the Gospel along with holy Boniface, and turned many peoples to, Christ, [in the year 786,] of whom mention is made upon the 7th day of this present month of July.
      - type: citation
        text: 'Upon the same 9th day of July, were born into the better life:'
      - type: text
        text: At Rome, at the Dropping Well, the holy martyrs Zeno and ten thousand two hundred and three others, [third century.]
      - type: text
        text: At Gortyna, in Crete, the holy Cyril, Bishop [of that see.] In the persecution under Decius he was cast into the fire by order of the President Lucius, when his bonds were burnt but he escaped unburnt, and the judge was so confounded at such a marvel that, he would have let him go free, had he not there and then with lively faith proclaimed Christ, wherefore he caused him to be beheaded.
      - type: text
        text: At Tora, on Lake Velino, in the persecution under the Emperor Decius, the holy martyrs Anatolia and Audax. Anatolia was a Virgin of Christ, she had healed many sick of diverse diseases throughout the whole province of Picenum, and turned them to Christ, when by command of the judge Faustinian she suffered diverse punishments. She was delivered from a serpent which was sent against her and converted Audax to the faith, and at last was run through with a sword as she stood praying with outspread hands. Audax also was thrown into prison, and forthwith received his crown by being beheaded.
      - type: text
        text: At Alexandria, the holy martyrs Patermuth, Copres, and Alexander, who were slain under the Emperor Julian the Apostate.
      - type: text
        text: At Brielle, in Holland, the nineteen holy martyrs who are called the Martyrs of Gorcum. They were subjected to diverse mockings and torments, and at last put to death, [in the year 1572,] by the Calvinist heretics, because they defended the authority of the Church of Rome and the real presence of Christ in the Eucharist. Their names were enrolled among those of the holy martyrs by the Supreme Pontiff Pius IX.
      - type: text
        text: At Martula, in Umbria, the holy Confessor Brictius he suffered many things under Marcian the judge, for confessing the Lord, and when he had turned a great multitude of people to Christ he fell asleep in the Lord. [He was Bishop of Martula at the end of the sixth century.]
      - type: text
        text: At Città di Castello, the holy Virgin Veronica de Quiliani, of the Order of Friars Minors Capuchins, Abbess of the Convent of Poor Clares at Citta di Castello. [She was born on December 27, 1660, at Mercatello, a little town in the Duchy of Urbino.] Famous for her wonderful love of suffering and other excellences and gifts of heavenly grace, [in the year 1727,] Pope Gregory XVI enrolled her name among those of the holy Virgins.
      la:
      - type: text
        text: Séptimo Idus Iúlii
      - type: text
        text: ''
      - type: text
        text: Romæ, ad Guttam iúgiter manántem, natális sanctórum Mártyrum Zenónis, et aliórum decem míllium ac ducentórum trium.
      - type: text
        text: Gortýnæ, in Creta, sancti Cyrílli Epíscopi, qui, in persecutióne Décii, sub Lúcio Prǽside, flammis est iniéctus, et, cum ab igne, incénsis vínculis, illǽsus evasísset, ac stupóre tanti miráculi a Iúdice dimíssus esset, rursus ab eódem, pro instánti et álacri fídei prædicatióne facta de Christo, comprehénsus et cápite plexus est.
      - type: text
        text: Brilæ, in Hollándia, pássio novémdecim Mártyrum, Gorcomiénsium nuncupatórum; quorum ex número novem Sacerdótes ac duo Láici erant Fratres Minóres, quátuor Presbýteri sæculáres, duo Præmonstraténses, unus Reguláris Canónicus sancti Augustíni, et unus Dominicánus. Hi omnes, ob tuéndam Ecclésiæ Románæ auctoritátem et reálem Christi in Eucharístia præséntiam, a Calviniánis hæréticis vária ludíbria et torménta perpéssi, tandem, in trabem acti, agónem suum, adstríctis láqueo fáucibus, consummárunt; et a Pio Nono, Pontífice Máximo, inter sanctos Mártyres reláti sunt.
      - type: text
        text: In civitáte Thora, apud lacum Velínum, item pássio sanctórum Anatóliæ et Audácis, sub Décio Imperatóre. Ex his Anatólia, Christi Virgo, postquam plúrimos per totam Picéni provínciam váriis languóribus afféctos curásset et in Christum credéntes fecísset, Iúdicis Faustiniáni iussu divérsis pœnárum genéribus est vexáta, et, cum ab immísso serpénte líbera evádens Audácem convertísset ad fidem, novíssime, exténsis mánibus orans, gládio transverberáta est; Audax quoque, in custódiam tráditus, sine mora senténtia capitáli coronátur.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Patermúthii, Coprétis et Alexándri; qui sub Iuliáno Apóstata cæsi sunt.
      - type: text
        text: Mártulæ, in Umbria, sancti Bríctii Epíscopi, qui, sub Marciáno Iúdice, ob confessiónem Dómini, multa passus est; ac tandem, cum magnam pópuli multitúdinem ad Christum convertísset, Conféssor in pace quiévit.
      - type: text
        text: Tiférni, in Umbria, sanctæ Verónicæ de Iuliánis Vírginis, in Urbaniénsis diœcésis óppido Mercatéllo natæ, Moniális e secúndo sancti Francísci Ordine ac Tifernátis ascetérii Abbatísse; quam, insígni patiéndi stúdio, ceterísque virtútibus, et cæléstibus charismátibus illústrem, Gregórius Papa Décimus sextus in sanctárum Vírginum collégium adscrípsit.
  psalm.s-ptimo-idus-i-nii-42ba4d66a4:
    role: psalm
    content:
      en:
      - type: text
        text: 'On the seventh day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Constantinople, the holy Paul, Archbishop of that city. He was oftentimes thrust out by the Arians because of the Catholic faith, and brought back again by the holy Roman Pontiff, Julius I. At length he was banished by the Arian Emperor Constantius to Cucusus, a little town in Cappadocia, where he was cruelly strangled by Arian plotters, and so passed into the kingdom of heaven. His body was brought to Constantinople with great reverence [thirty years later,] in the time of the Emperor Theodosius.
      - type: text
        text: In Egypt, the holy martyr Licarion, who was mangled, beaten with red-hot iron rods, and suffered other dreadful torments before he was smitten with the sword, and so finished his testimony.
      - type: text
        text: At Cordova, the holy Monks Peter, Wallabond, Sabinian, Wistremund, Habentius, and Jeremiah, of whom Peter was a Priest and Wallabond a 1154,] the holy Confessor William, Deacon, martyrs [under the Muslims.] Archbishop [of that see,].
      - type: text
        text: In England, the holy Abbot Robert, of the Cistercian Order. His grave did raise three dead men to life, and who was written in the list of the Saints by Pope Honorius.
      - type: text
        text: At Aix, in Gaul, holy Maximin, first Bishop of that city.
      la:
      - type: text
        text: Séptimo Idus Iúnii
      - type: text
        text: ''
      - type: text
        text: Constantinópoli natális sancti Pauli, eiúsdem civitátis Epíscopi, qui sæpe ab Ariánis ob fidem cathólicam pulsus, et a sancto Iúlio Primo, Románo Pontífice, restitútus est; ac demum, ab Ariáno Imperatóre Constántio relegátus ad Cucúsum, Cappadóciæ oppídulum, ibídem, Arianórum insídiis crudéliter strangulátus, ad cæléstia regna migrávit. Ipsíus autem corpus, Theodósio Imperatóre, Constantinópolim summo honóre translátum fuit.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Monachórum et Mártyrum Petri Presbýteri, Wallabónsi Diáconi, Sabiniáni, Wistremúndi, Habéntii et Ieremíæ, qui pro Christo, in persecutióne Arábica, sunt iuguláti.
      - type: text
        text: Hermópoli, in Ægýpto, sancti Lycariónis Mártyris, qui laniátus, virgis férreis ignítis cæsus, alíaque sævíssima passus est, ac demum, gládio percússus, martýrium consummávit.
      - type: text
        text: Placéntiæ sancti Antónii Maríæ Gianélli, Bobiénsis Epíscopi, Fundatóris Congregatiónis Filiárum Maríæ sanctíssimæ ab Horto nuncupatárum, quem Pius Papa Duodécimus inter sanctos Cǽlites adnumerávit.
      - type: text
        text: In Anglia sancti Robérti Abbátis, ex Ordine Cisterciénsi.
  psalm.s-ptimo-idus-ianu-rii-6685a790e5:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we call to mind the return of the Child Jesus out of Egypt.
      - type: citation
        text: 'Upon the same 7th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, for confessing Christ, in the persecution under the Emperor Galerius Maximian, the blessed martyr Lucian, priest of the Church of Antioch, distinguished for his learning and eloquence, whose praise hath been recorded by holy John Chrysostom. He is buried at Helenopolis in Bithynia.
      - type: text
        text: At Antioch, the holy martyr the deacon Cleri, who on account of his glorious confession was seven times put to the torture, suffered long in prison, and at length was beheaded.
      - type: text
        text: In the city of Heraclea, the holy martyrs Felix and Januarius.
      - type: text
        text: On the same day, the holy martyr Julian.
      - type: text
        text: In Denmark (in the year 1086), the holy martyr King Canute (IV.), whose feast is kept on January 19 (although not in England).
      - type: text
        text: At Pavia, the holy confessor Crispin (I.), bishop of that see (in the year 248).
      - type: text
        text: In Dacia, the holy bishop Nicetas, who by his preaching of the Gospel caused savage and barbarous tribes to become mild and gentle. (Fifth century.)
      - type: text
        text: In Egypt, the blessed monk Theodore, who flourished in holiness in the time of the Emperor Constantine the Great, and of whom mention is made by holy Athanasius in the life of holy Anthony.
      - type: text
        text: At Barcelona (in the year 1275), holy Raymond of Pehafuerte, of the order of Friars Preachers, famous for his holiness and teaching, whose feast we keep upon the 23rd day of this present month of January.
      la:
      - type: text
        text: Séptimo Idus Ianuárii
      - type: text
        text: ''
      - type: text
        text: Relátio púeri Iesu de Ægýpto.
      - type: text
        text: Nicomédiæ natális beáti Luciáni, Ecclésiæ Antiochénæ Presbýteri et Mártyris; qui, satis clarus doctrína et eloquéntia, passus est, ob Christi confessiónem, in persecutióne Galérii Maximiáni, sepultúsque est Helenópoli, in Bithýnia. Ipsíus autem laudes sanctus Ioánnes Chrysóstomus celebrávit.
      - type: text
        text: Antiochíæ sancti Cleri Diáconi, qui pro confessiónis glória, sépties tortus ac diu macerátus in cárcere, ad últimum, gládio decollátus, martýrium consummávit.
      - type: text
        text: In civitáte Heracléa sanctórum Mártyrum Felícis et Ianuárii.
      - type: text
        text: Eódem die sancti Iuliáni Mártyris.
      - type: text
        text: In Dánia sancti Canúti, Regis et Mártyris.
      - type: text
        text: Pápiæ sancti Crispíni, Epíscopi et Confessóris.
      - type: text
        text: In Dácia sancti Nicetæ Epíscopi, qui feras et bárbaras gentes, Evangélii prædicatióne, mites réddidit ac mansuétas.
      - type: text
        text: In Ægýpto beáti Theodóri Mónachi, qui, témpore Constantíni Magni, flóruit sanctitáte; cuius méminit sanctus Athanásius in vita sancti Antónii.
  psalm.s-ptimo-idus-m-rtii-faadf15efd:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 9th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy widow Frances, famous for her nobleness of birth, the holiness of her life, and the grace of working miracles [,in the year 1440].
      - type: text
        text: At Sebaste, in Armenia, the forty holy Cappadocian soldiers. Under the President Agricolaus, in the time of the Emperor Licinius, after undergoing bonds and a foul imprisonment, and after their faces had been bruised with stones, they were stripped naked, and exposed all night upon the surface of a frozen pool during the bitterest cold of winter, where their bodies perished by the frost, and at length by the breaking of their legs. The illustrious glory of them all hath been celebrated by holy Basil, and the other Fathers in their writings, the chief among them were named Cyrion and Candidus. We keep their feast upon the morrow after.
      - type: text
        text: At Nyssa, holy Gregory, [in the year 396,] Bishop of that see, brother of blessed Basil the Great. He is very famous for his life and learning. For defending the Catholic faith he was driven out of his own city by the Arian Emperor Valens.
      - type: text
        text: At Barcelona, in Spain, holy Pacian, Bishop of that see, famous not only for his life but also for his words, who died in a good old age in the time of the Emperor Theodosius.
      - type: text
        text: In Moravia, [in the ninth century,] the holy Cyril, Bishop [of Moravia,] and Methodius, Bishop [of Kiev,] who brought to believe in Christ many of the peoples of those countries and their kings [,and whose feast we keep upon the 5th day of July].
      - type: text
        text: At Bologna, [in the year 1463,] the holy Virgin Katherine, of the Order of St. Clare, famous for the holiness of her life, whose body is there reverenced with great honour.
      la:
      - type: text
        text: Séptimo Idus Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctæ Francíscæ Víduæ, nobilitáte géneris, vitæ sanctitáte et miraculórum dono célebris.
      - type: text
        text: Apud Sebásten, in Arménia, natális sanctórum quadragínta mílitum Cappádocum, qui, témpore Licínii Imperatóris, sub Prǽside Agricoláo, post víncula et cárceres tetérrimos, post cæsas lapídibus fácies, nudi sub dio, frigidíssimo híemis témpore, supra stagnum rigens pernoctáre iussi sunt, ubi gelu constrícta eórum córpora disrumpebántur, ac demum crurifrágio martýrium consummárunt. Erant autem inter eos nobilióres Cýrion et Cándidus; eorúmque ómnium præcláras glórias sanctus Basilíus aliíque Patres scriptis suis celebrárunt. Ipsórum porro Mártyrum festívitas sequénti die recólitur.
      - type: text
        text: Nyssæ deposítio sancti Gregórii Epíscopi, qui sanctórum Basilíi et Emméliæ fílius, et sanctórum item Basilíi Magni ac Petri Sebasténsis Episcopórum et Macrínæ Vírginis frater éxstitit; atque, vita et eruditióne claríssimus, ob fídei cathólicæ defensiónem, sub Ariáno Imperatóre Valénte, civitáte sua pulsus est.
      - type: text
        text: Barcinóne, in Hispánia, sancti Paciáni Epíscopi, tam vita quam sermóne conspícui; qui, témpore Theodósii Príncipis, in última senectúte finem vitæ sortítus est.
      - type: text
        text: Bonóniæ sanctæ Catharínæ Vírginis, e secúndo Ordine sancti Francísci, quæ vitæ sanctitáte fuit illústris. Ipsíus autem corpus magno cum honóre ibídem cólitur.
  psalm.s-ptimo-idus-maii-78a684a15e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 9th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nazianzus, in Cappadocia, the blessed Gregory, Archbishop of Constantinople, who on account of his wonderful teaching of the things of God is surnamed the Theologian, who set up again the Catholic faith at Constantinople when it had fallen, and stilled the swelling waves of heresy.
      - type: text
        text: At Rome, the holy Hermes, of whom the Apostle Paul maketh mention in his Epistle to the Romans. He made a worthy offering of himself, and being made acceptable as a sacrifice to God, he departed hence to the kingdom of heaven, famous for good works.
      - type: text
        text: In Persia, 310 holy martyrs.
      - type: text
        text: At Cagli, on the Flaminian Way, suffered the holy Gerontius, Bishop of Cervia.
      - type: text
        text: At Vendôme, [in the third century,] deceased, the holy Confessor Beatus. At Constantinople is commemorated the translation of the bodies of the holy Apostle Andrew, and of the holy Evangelist Luke, out of the Peloponnesos, and of that of Timothy, the disciple of the blessed Apostle Paul, out of Ephesos. The body of the holy Andrew was carried to Amalfi a long while after, and godly multitudes of the faithful there gather to do it reverence. At the grave thereof is secreted a liquid for the healing of diseases.
      - type: text
        text: There is also commemorated at Rome the translation of the body of the holy Priest Jerome, Doctor of the Church, from Bethlehem of Juda into the cathedral church of St. Mary-by-the-Manger, [commonly called St. Mary the Greater.]
      - type: text
        text: Also there is commemorated at Bari, in Apulia, the translation thither of the body of the holy Bishop Nicholas, from [his see at] Myra, a city of Lycia.
      la:
      - type: text
        text: Séptimo Idus Maii
      - type: text
        text: ''
      - type: text
        text: Naziánzi, in Cappadócia, natális beáti Gregórii Epíscopi, Confessóris et Ecclésiæ Doctóris, ob singulárem divinárum rerum doctrínam cognoménto Theólogi; qui collápsam Constantinópoli cathólicam fidem, ipsíus urbis Episcopátum gerens, restítuit, hæresésque insurgéntes compréssit.
      - type: text
        text: Romæ sancti Hermæ, cuius Apóstolus Paulus in Epístola ad Romános méminit. Ipse autem Hermas, digne semetípsum sacríficans acceptabilísque Deo hóstia factus, virtútibus clarus cæléstia regna petívit.
      - type: text
        text: Cállii, via Flamínia, pássio sancti Geróntii, Epíscopi Ficoclénsis.
      - type: text
        text: In Pérside sanctórum Mártyrum trecentórum et decem.
      - type: text
        text: In Ægýpto sancti Pachómii Abbátis, qui plúrima erexit in ea regióne monastéria, et régulam Monachórum scripsit, quam ab Angelo dictánte didícerat.
      - type: text
        text: In castro Vindecíno, in Gállia, deposítio sancti Beáti Confessóris.
      - type: text
        text: Bonóniæ beáti Nicolái Albergáti, Mónachi Carthusiáni, eiúsdem civitátis Epíscopi et sanctæ Románæ Ecclésiæ Cardinális, sanctitáte et Apostólicis Legatiónibus clari; cuius corpus Floréntiæ, apud Carthusiános, cónditum est.
      - type: text
        text: Constantinópoli Translátio sanctórum Andréæ Apóstoli, et Lucæ Evangelístæ de Acháia; et Timóthei, uníus ex discípulis beáti Pauli Apóstoli, ab Epheso. Corpus autem sancti Andréæ, longo post témpore Amálphim devéctum, ibi pio fidélium concúrsu honorátur; ex cuius sepúlcro liquor ad languóres curándos iúgiter manat.
      - type: text
        text: Romæ item Translátio sancti Hierónymi Presbýteri, Confessóris et Ecclésiæ Doctóris, ex Béthlehem Iudæ ad Basílicam sanctæ Maríæ ad Præsépe.
      - type: text
        text: Bárii quoque, in Apúlia, Translátio sancti Nicolái, Epíscopi et Confessóris, e Myra, civitáte Lýciæ.
  psalm.s-ptimo-idus-nov-mbris-dcae1458b2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 7th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Padua, holy Prosdocimus, the first Bishop of that see, who was ordained Bishop by the blessed Apostle Peter, and sent to preach the Word of God in that city, where he shone with many graces and wonders, and died a blessed death.
      - type: text
        text: At Perugia, (in the year 547,) the holy martyr Herculanus, Bishop (of that see.) On the same day the holy martyr Amaranth, who was buried in the city of Albi when the course of his faithful contending was over, but he is alive for evermore in glory.
      - type: text
        text: At Melitina, in Armenia, the holy martyrs Hiero, Nicander, Hesychius, and thirty others, who were crowned under the President Lysias, in the persecution under the Emperor Diocletian.
      - type: text
        text: At Amphipolis, in Macedonia, the holy martyrs Auctus, Taurion, and Thessalonica.
      - type: text
        text: At Ancyra, under the Emperor Julian the Apostate, the holy martyrs Melasippus, Anthony, and Carina.
      - type: text
        text: At Cologne, (in the year 1225,) holy Engelbert, Bishop (of that see), who was contented to suffer martyrdom in defence of the freedom of the Church and of the obedience due to the Church of Rome.
      - type: text
        text: At Alexandria, (about the year 313,) blessed Achillas, Bishop (of that see,) eminent for his learning, faith, conversation, and life.
      - type: text
        text: In Friesland, (in the year 738,) holy Willebrord, (first) Bishop of Utrecht, who was ordained Bishop by blessed Pope Sergius, and preached the Gospel in Friesland and Denmark, whose feast we keep upon the 29th day of this present month.
      - type: text
        text: At Metz, (about the year 400,) the holy Confessor Rufus, Bishop (of that see.)
      - type: text
        text: At Strasbourg, (about the year 693,) holy Florence, Bishop (of that see, and Founder and Abbot of Haslach and of St. Thomas.)
      la:
      - type: text
        text: Séptimo Idus Novémbris
      - type: text
        text: ''
      - type: text
        text: Patávii deposítio sancti Prosdócimi, qui fuit primus eiúsdem civitátis Epíscopus. Hic, a beáto Petro Apóstolo Epíscopus ordinátus, ad prædicándum Dei verbum ad prædíctam civitátem missus est; ibíque, multis virtútibus et prodígiis corúscans, beáto fine quiévit.
      - type: text
        text: Perúsiæ sancti Herculáni, Epíscopi et Mártyris.
      - type: text
        text: Apud Swelménsem civitátem, in Germánia, pássio sancti Engelbérti, Epíscopi Coloniénsis, qui, cum illuc ex óppido Sosátio ad templum dedicándum pérgeret, a sicáriis intercéptus in via multísque vulnéribus cæsus, gloriósum pro defensióne ecclesiásticæ libertátis et Románæ Ecclésiæ obediéntia martýrium súbiit.
      - type: text
        text: Eódem die sancti Amaránthi Mártyris, qui apud Albigénsem urbem, in Gállia, exácto agónis fidélis cursu, sepúltus, vivit in glória.
      - type: text
        text: Melitínæ, in Arménia, pássio sanctórum Hierónis, Nicándri, Hesýchii et aliórum trigínta; qui in persecutióne Diocletiáni, sub Lýsia Prǽside, coronáti sunt.
      - type: text
        text: Amphípoli, in Macedónia, sanctórum Mártyrum Aucti, Tauriónis et Thessalonícæ.
      - type: text
        text: Ancýræ, in Galátia, pássio sanctórum Melasíppi, Antónii et Carínæ, sub Iuliáno Apóstata.
      - type: text
        text: Alexandríæ beáti Achíllæ Epíscopi, qui eruditióne, fide, conversatióne ac móribus fuit insígnis.
      - type: text
        text: In Frísia deposítio sancti Willibrórdi, Epíscopi Traiecténsis; qui, a beáto Sérgio Papa ordinátus Epíscopus, in Frísia et Dánia Evangélium prædicávit.
      - type: text
        text: Metis, in Gállia, sancti Rufi, Epíscopi et Confessóris.
      - type: text
        text: Argentoráti sancti Floréntii Epíscopi.
  psalm.s-ptimo-idus-oct-bris-cf00b57260:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 9th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Paris, the holy martyrs Denys the Areopagite, Bishop (of that city,) Rusticus the Priest, and Eleutherius the Deacon. Denys was baptized by the Apostle Paul, and ordained the first Bishop of Athens. He afterward came to Rome, whence he was sent by the Roman Pontiff, the blessed Clement, to preach in Gaul. He came to Paris, where for some years he faithfully executed the task laid upon him then the Prefect Pescenninus, when he had put him to diverse kinds of grievous torments, caused him to be beheaded, along with his two Companions, and so the three together finished their testimony.
      - type: text
        text: Upon the same day is made memorial of the holy Patriarch Abraham, the father of all them that believe.
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: At Julia, in the country of Parma, upon the Claudian Way, under the Emperor Maximian, the holy martyr Domninus. He was seeking to escape from the fury of the persecutors, but they that came in pursuit of him ran him through with the sword, and he fell gloriously.
      - type: text
        text: At Monte Casino, (in the year 834,) the holy Abbot Deusdedit, who was cast into prison by the tyrant Sicard, and there died of hunger and wretchednesss.
      - type: text
        text: In Hainaut, (about the year 680,) the holy Confessor Ghislain, Bishop, who resigned his see and lived as a monk in a monastery founded by himself, and was famous for many graces.
      - type: text
        text: At Valencia, in Spain, holy Louis Bertrand, of the Order of Friars Preachers, who was filled with the spirit of the Apostolate, and confirmed by innocency of life and many signs the Gospel which he preached to the Americans.
      - type: text
        text: At Jerusalem, holy Andronicus and Athanasia his wife.
      - type: text
        text: 'At Antioch, the holy Abbess Publia. As the Emperor Julian the Apostate was passing by, she and her Virgins sang those words of David: "The idols of the heathen are silver and gold," and "Let them that make them become like unto them," wherefore the Emperor commanded her to be buffeted and sharply rebuked.'
      la:
      - type: text
        text: Séptimo Idus Octóbris
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Ioánnis Leonárdi Confessóris, Fundatóris Congregatiónis Clericórum Regulárium a Matre Dei, labóribus et miráculis clari, cuius ópera Missiónes a Propagánda Fide institútæ sunt.
      - type: text
        text: Lutétiæ Parisiórum natális sanctórum Mártyrum Dionýsii Areopagítæ Epíscopi, Rústici Presbýteri, et Eleuthérii Diáconi. Ex his Dionýsius, ab Apóstolo Paulo baptizátus, primus Atheniénsium Epíscopus ordinátus est; deínde Romam venit, atque inde a beáto Cleménte, Románo Pontífice, in Gállias prædicándi grátia diréctus est, et ad præfátam urbem devénit; ibíque, cum per áliquot annos commíssum sibi opus fidéliter prosecútus esset, tandem, a Præfécto Fescenníno, post gravíssima tormentórum génera, una cum Sóciis, gládio animadvérsus, martýrium complévit.
      - type: text
        text: Eódem die memória sancti Abrahæ, Patriárchæ et ómnium credéntium Patris.
      - type: text
        text: Apud Cassínum sancti Deúsdedit Abbátis, qui, a Sicárdo tyránno in cárcerem trusus, illic, fame et ærúmnis conféctus, réddidit spíritum.
      - type: text
        text: Apud Iúliam, in território Parménsi, via Cláudia, sancti Domníni Mártyris; qui, sub Maximiáno Imperatóre, cum vellet persecutiónis rábiem declináre, a persequéntibus est comprehénsus, et, gládio transverberátus, glorióse occúbuit.
      - type: text
        text: In Hannónia sancti Gisléni, Epíscopi et Confessóris; qui, relícto Episcopátu, Mónachi vitam in monastério a se constrúcto exércuit, et multis virtútibus cláruit.
      - type: text
        text: Valéntiæ, in Hispánia Tarraconénsi, sancti Ludovíci Bertrandi, ex Ordine Prædicatórum, Confessóris; qui, apostólico spíritu clarus, Evangélium quod Americánis prædicáverat, vitæ innocéntia multísque éditis miráculis confirmávit.
      - type: text
        text: Hierosólymis sanctórum Androníci et Athanásiæ cóniugis.
      - type: text
        text: 'Antiochíæ sanctæ Públiæ Abbatíssæ, quæ, transeúnte Iuliáno Apóstata, Davídicum illud cum suis Virgínibus canens: «Simulácra Géntium argéntum et aurum», et; «Símiles illis fiant qui fáciunt ea»; Imperatóris iussu, álapis cæsa est, et gráviter obiurgáta.'
  psalm.s-ptimo-idus-sept-mbris-9082a62614:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 7th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, the blessed martyr John. When he saw the cruel edicts against the Christians hanging up in the market-place, in the heat of his faith he stretched forth his hand, pulled them down, and tore them up. When this was told to the Emperors Diocletian and Maximian, who were then in that city, they ordered all the kinds of torment to be tried upon him and the man, right noble as he was, bore this with such a cheerful face and heart that he seemed not even saddened thereby.
      - type: text
        text: At Caesarea, in Cappadocia, the holy martyr Eupsychius, who was cast into prison under the Emperor Hadrian on the charge of being a Christian. Being shortly liberated therefrom, he forthwith sold his inheritance, and distributed the price thereof partly unto the poor, and partly unto his accusers, as unto benefactors. He was arrested again, and finished his testimony under the judge Sapritius, being mangled, and pierced with the sword.
      - type: text
        text: At Soli, in Cilicia, the holy martyr Sozon, who under the Emperor Maximian was cast into the fire, and gave up the ghost.
      - type: text
        text: At Aquileia, (in the persecution under the Emperor Diocletian,) the holy martyr Anastasius.
      - type: text
        text: In the country of Autun, the holy Virgin and martyr Regina, who passed away to Christ the Bridegroom under the Proconsul Olybrius, by whose orders she was imprisoned, racked, burnt with lamps, and lastly beheaded.
      - type: text
        text: At Troyes, the holy martyrs Nemorius the Deacon, and his Companions, who were slain by Attila, King of the Huns.
      - type: text
        text: At Orleans, in Gaul, holy Bishop Evortius, who was first a Subdeacon of the Church of Rome, and was then pointed out by the vision of a dove for Bishop of the aforesaid city.
      - type: text
        text: In Gaul, the holy Confessor Bishop Augustal.
      - type: text
        text: At Capua, holy Pamphilus, Bishop (of that see.)
      - type: text
        text: In the country of Paris, (in the sixth century,) the holy Priest and Confessor Clodoald (St. Cloud) .
      la:
      - type: text
        text: Séptimo Idus Septémbris
      - type: text
        text: ''
      - type: text
        text: Trecis, in Gállia, sancti Nemórii Diáconi, et Sociórum Mártyrum, quos Attíla, Rex Hunnórum, interfécit.
      - type: text
        text: Nicomedíæ natális beáti Ioánnis Mártyris, qui, cum vidéret crudélia advérsus Christiános edícta in foro pendére, hinc, fídei ardóre accénsus, iniécta manu, illa detráxit atque discérpsit. Cumque hoc relátum esset Diocletiáno et Maximiáno Augústis, in eádem urbe constitútis, ómnia suppliciórum génera in eum experíri iussérunt; quæ vir nobilíssimus tanta vultus ac spíritus alacritáte pértulit, ut ne tristis quidem pro his vidéri potúerit.
      - type: text
        text: Cæsaréæ, in Cappadócia, sancti Eupsýchii Mártyris, qui, sub Hadriáno Imperatóre, accusátus quod Christiánus esset, in cárcerem coniéctus est; et, paulo post inde emíssus, patrimónium statim véndidit, et prétium partim paupéribus, partim accusatóribus, tamquam benefactóribus, distríbuit. Sed, íterum comprehénsus, atque, cum sacrificáre nollet idólis, sævíssime dilaniátus et gládio confóssus, sub Saprítio Iúdice martýrium consummávit.
      - type: text
        text: Pompeiópoli, in Cilícia, sancti Sozóntis Mártyris, qui sub Maximiáno Imperatóre, in ignem iniéctus, réddidit spíritum.
      - type: text
        text: Aquiléiæ sancti Anastásii Mártyris.
      - type: text
        text: Apud Aléxiam véterem, in território Augustodunénsi, sanctæ Regínæ, Vírginis et Mártyris; quæ, sub Procónsule Olýbrio, cárceris et equúlei ac lampadárum afflícta supplíciis, demum, cápite damnáta, migrávit ad Sponsum.
      - type: text
        text: Aureliánis, in Gállia, deposítio sancti Evórtii Epíscopi, qui, primo Románæ Ecclésiæ Subdiáconus, dehinc divíno múnere per colúmbam designátus est Póntifex præfátæ urbis.
      - type: text
        text: In Gállia sancti Augustális, Epíscopi et Confessóris.
      - type: text
        text: Cápuæ sancti Pámphili Epíscopi.
      - type: text
        text: In território Parisiénsi sancti Clodoáldi, Presbýteri et Confessóris.
  psalm.s-ptimo-kal-ndas-apr-lis-f1888fdb71:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 26th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Lavican Way, [in the third century,] the holy martyr Castulus. He was a chamberlain of the Palace, and a receiver of the saints. He was three times hung up and interrogated, and as he remained steadfast in confessing the Lord, he was crowned with martyrdom by being thrown into a pit, and buried alive in sand.
      - type: text
        text: Likewise at Rome, the holy martyrs Peter, Marcian, Jovinus, Thecla, Cassian, and others.
      - type: text
        text: In the Pentapolis, in Libya, the holy martyrs Theodore, Bishop [of Zaragossa, who was preaching in Pentapolis-Cyrene in North Africa,] the Deacon Irenaeus, and the Readers Serapion and Ammonius.
      - type: text
        text: At Sirmium, the holy martyrs the Priest Montanus, and Maxima, [his wife,] who were drowned in the river for Christ's faith's sake.
      - type: text
        text: Likewise the holy martyrs Quadratus, Theodosius, Emmanuel, and forty others.
      - type: text
        text: At Alexandria, [in the year 354,] the holy martyrs Eutychius and others, who were slain with the sword for the Catholic faith, under the Arian Bishop George, in the time of the Emperor Constantius.
      - type: text
        text: On the same day, [in the year 309,] holy Ludger, Bishop of Muenster, who preached the gospel to the Saxons.
      - type: text
        text: At Zaragossa, in Spain, [in the year 651,] the holy Confessor Braulio, Bishop of that see.
      - type: text
        text: At Trier, [in the year 400,] holy Felix, [who had been] Bishop [of that see for 12 years, and had then retired to a monastery which he had built in honour of the Blessed Virgin, the martyrs of the vanguard of the Theban Legion, and several magistrates of the town of Trier, who had been martyred at the same time.]
      la:
      - type: text
        text: Séptimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Romæ, via Lavicána, sancti Cástuli Mártyris, qui, cum esset zetárius Palátii et hospes Sanctórum, a persecutóribus tértio appénsus, tértio audítus, et, in confessióne Dómini persevérans, missus est in fóveam, ac, dimíssa super eum massa arenária, martýrio coronátus est.
      - type: text
        text: Item Romæ corónæ sanctórum Mártyrum Petri, Marciáni, Iovíni, Theclæ, Cassiáni et aliórum.
      - type: text
        text: Pentápoli, in Líbya, natális sanctórum Mártyrum Theodóri Epíscopi, Irenǽi Diáconi, Serapiónis et Ammónii Lectórum.
      - type: text
        text: Sírmii sanctórum Mártyrum Montáni Presbýteri, et Máximæ, qui, ob Christi fidem, in flumen demérsi sunt.
      - type: text
        text: Item sanctórum Mártyrum Quadráti, Theodósii, Emmanuélis et aliórum quadragínta.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Eutýchii et aliórum; qui, Constántii témpore, sub Ariáno Epíscopo Geórgio, pro fide cathólica gládio cæsi sunt.
      - type: text
        text: Eódem die sancti Ludgéri, Epíscopi Monasteriénsis, qui Saxonibus Evangélium prædicávit.
      - type: text
        text: Cæsaraugústæ, in Hispánia, sancti Bráulii, Epíscopi et Confessóris.
      - type: text
        text: Tréviris sancti Felícis Epíscopi.
  psalm.s-ptimo-kal-ndas-aug-sti-116254287d:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 26th day of July fell asleep
      - type: text
        text: ''
      - type: text
        text: Holy Anne, mother of Mary the Mother of God.
      - type: citation
        text: 'On the same 26th day of July, was also born into the better life: At Philippi, in Macedonia, holy Erastus, who was left there as Bishop by the blessed Apostle Paul, and was there crowned with martyrdom.'
      - type: text
        text: At Rome, upon the Latin Way, the holy martyrs Symphronius, Olympius, Theodulus, and Exuperia, who, as is written in the Acts of the holy Pope Stephen I, were burnt in the fire, and so gained the palm of martyrdom.
      - type: text
        text: At Porto Romano, the holy martyr Hyacinth. He was first cast into the fire, and then into a torrent, but escaped unhurt. Afterwards, under the Emperor Trajan, Leontius the Consular caused him to be smitten with the sword, and so ended his earthly life. The matron Julia buried his body upon her own farm hard by the city of Rome.
      - type: text
        text: Also at Rome, [in the second century,] the holy Priest Pastor, who giveth his name to the Church upon the Viminal Hill, which is that of holy Pudentiana.
      - type: text
        text: At Verona, [in the sixth century,] the holy Confessor Valens, Bishop [of that see.]
      - type: text
        text: In the monastery of St Benedict, in the country of Mantua, [in the year 1016,] the holy Monk and Hermit Simeon, who fell asleep in a good old age, famous for many marvels.
      la:
      - type: text
        text: Séptimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Dormítio sanctæ Annæ, quæ mater éxstitit Immaculátæ Vírginis Genitrícis Dei Maríæ.
      - type: text
        text: Philíppis, in Macedónia, natális sancti Erásti, qui, illic a beáto Paulo Apóstolo relíctus Epíscopus, ibídem martýrio coronátus est.
      - type: text
        text: Romæ, via Latína, sanctórum Mártyrum Symphrónii, Olýmpii, Theodúli et Exsupériæ; qui (ut in gestis sancti Stéphani Papæ légitur), ígnibus combústi, martýrii palmam adépti sunt.
      - type: text
        text: In Portu Románo sancti Hyacínthi Mártyris, qui, primo in ignem iniéctus, deínde in profluéntem præcipitátus, illǽsus evásit; post hæc, sub Traiáno Imperatóre, a Leóntio Consulári percússus gládio, vitam finívit. Ipsíus corpus Iúlia Matróna in prǽdio suo, iuxta Urbem, sepelívit.
      - type: text
        text: Verónæ sancti Valéntis, Epíscopi et Confessóris.
      - type: text
        text: Romæ sancti Pastóris Presbýteri, cuius nómine Títulus exstat in Vimináli, apud sanctam Pudentiánam.
      - type: text
        text: In monastério sancti Benedícti, in agro Mantuáno, sancti Simeónis, Mónachi et Eremítæ, qui, multis miráculis clarus, in senectúte bona quiévit.
      - type: text
        text: Lúere, in diœcési Brixiénsi, sanctæ Bartholomǽæ Capitánio, Vírginis, Institúti Sorórum a Caritáte Fundatrícis, puéllis instituéndis præcláræ, quam Pius Papa Duodécimus albo sanctárum Vírginum adscrípsit.
  psalm.s-ptimo-kal-ndas-dec-mbris-787367a380:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 25th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, the holy Virgin and martyr Katharine. On account of her confession of the Christian faith, she was cast into prison under the Emperor Maximinus. She was long flogged with loaded scourges, and at length beheaded. Her body was in wondrous wise carried by angels to Mount Sinai, where it is devoutly honoured by the pilgrimages of multitudes of Christians.
      - type: text
        text: At Rome, the holy martyr Moses, a Priest, who was among those whom holy Cyprian oftentimes comforted by his letters while they were kept in prison. He contended manfully not only against the Gentiles, but also against the schismatics and Novatian heretics. At length, as is attested by holy Pope Cornelius, he was crowned with an eminent martyrdom in the persecution under the Emperor Decius.
      - type: text
        text: At Antioch, the holy martyr Erasmus.
      - type: text
        text: At Caesarea, in Cappadocia, the holy martyr Mercury. He was a soldier, who, by the help of his Guardian Angel, overcame the barbarians and the cruelty of the Emperor Decius, and passed away to heaven crowned with a martyrdom adorned by victory over many torments.
      - type: text
        text: In the province of Aemilia, the holy Virgin Jucunda.
      la:
      - type: text
        text: Séptimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Alexandríæ sanctæ Catharínæ, Vírginis et Mártyris, quæ, ob fídei Christiánæ confessiónem, sub Maximíno Imperatóre, in cárcerem trusa, et póstmodum scorpiónibus diutíssime cæsa, tandem cápitis obtruncatióne martýrium complévit. Ipsíus corpus, in montem Sínai mirabíliter ab Angelis delátum, ibídem, frequénti Christianórum concúrsu, pia veneratióne cólitur.
      - type: text
        text: Romæ sancti Móysis, Presbýteris et Mártyris; quem, cum áliis deténtum in cárcere, sanctus Cypriánus per lítteras sæpe est consolátus. Ipse autem Móyses, cum non tantum advérsus Gentíles, sed étiam advérsus schismáticos et hæréticos Novatiános infrácto ánimo stetísset, demum (ut sanctus Cornélius Papa testátur), in persecutióne Décii, exímio et admirábili martýrio decorátus est.
      - type: text
        text: Antiochíæ sancti Erásmi Mártyris.
      - type: text
        text: Cæsaréæ, in Cappadócia, pássio sancti Mercúrii mílitis, qui custodiéntis se Angeli patrocínio et bárbaros vicit, et Décii sævítiam superávit; multísque auctus tormentórum trophǽis, martýrio coronátus migrávit in cælum.
      - type: text
        text: In Æmília, Itáliæ província, sanctæ Iucúndæ Vírginis.
  psalm.s-ptimo-kal-ndas-febru-rii-f73730ecdf:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 26th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Smyrna, holy Polycarp, a disciple of the blessed Apostle John, and by him ordained Bishop of that city, having the charge of all Asia. In the reign of Mark Antony, and Lucius Aurelius Commodus, as the Pro-consul was sitting in the amphitheatre all the people cried out against Polycarp, and to please them he was cast into the fire, but forasmuch as it burned him not he was pierced with the sword, and so received the crown of martyrdom, (in the year 166.) With him there suffered also twelve others that were come from Philadelphia unto the city aforesaid.
      - type: text
        text: At Hippo, in Africa, the holy martyrs Theogenes, Bishop of that city, and thirty-six others, who in the persecution under the Emperor Valerian reckoned cheaply death here in time, and received the crown of life eternal, (about the year 260.)
      - type: text
        text: At Bethlehem of Judah, the holy widow Paula, mother of Eustochium, the virgin of Christ. She was of a very noble senatorial family, that gave up the world and distributed all her goods to feed the poor and betook herself to the manger of the Lord, and thence passed away into the kingdom of heaven endowed with many graces and crowned with a long martyrdom, (in the year 404.) Jerome hath written of her life, full of graces.
      - type: text
        text: In the country of Paris, (in the year 685,) holy Bathildes, Queen (of France,) illustrious for her holiness and the glory of her miracles.
      la:
      - type: text
        text: Séptimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Polycárpi, Epíscopi Smyrnénsis et Mártyris, qui martýrii corónam séptimo Kaléndas Mártii consecútus est.
      - type: text
        text: Hippóne Régio, in Africa, sanctórum Theógenis Epíscopi, et aliórum trigínta sex, qui, in persecutióne Valeriáni, contemnéntes temporálem mortem, corónam ætérnæ vitæ adépti sunt.
      - type: text
        text: Apud Béthlehem Iudæ dormítio sanctæ Paulæ Víduæ, quæ, cum esset e nobilíssimo Senatórum génere, cum beata Vírgine Christi Eustóchio, fília sua, renúntians sǽculo, facultátes suas paupéribus distríbuit, et ad Præsépe Dómini se recépit; ibíque, multis virtútibus prǽdita et longo coronáta martýrio, ad cæléstia regna transívit. Ipsíus autem vitam, virtútibus admirándam, sanctus Hierónymus scripsit.
  psalm.s-ptimo-kal-ndas-i-lii-d2ac097176:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 25th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In the country of Golet, near Nusco, the holy Confessor William, father of the hermits of Monte Vergine.
      - type: text
        text: At Bercea, holy Sosipater, disciple of the blessed Apostle Paul.
      - type: text
        text: At Rome, the holy Virgin and martyr Lucy, with twenty-two others.
      - type: text
        text: At Alexandria, the holy martyr Gallican. This was a man of Consular rank, who had received the honour of a triumph and was a personal friend of the Emperor Constantine. He was converted to the faith of Christ by holy John and Paul. After his conversion he withdrew to Ostia with holy Hilarinus, when he gave himself entirely to the service of strangers and the sick. This got noised abroad in all the world so that people came from all parts to see a man who had been a patrician and a consul washing the feet of the poor, laying the table, pouring water on the guests' hands, ministering carefully to the sick, and performing other offices of mercy. He was turned out of Ostia under the Emperor Julian the Apostate, and went to Alexandria. There the judge Raucian would needs have him sacrifice, and forasmuch as he would not, caused him to be beheaded, and so he became Christ's martyr.
      - type: text
        text: At Sibapolis, in Syria, the holy Virgin and martyr Febronia on account of her steadfastness in faith and chastity during the persecution under Diocletian, the judge Lysimachus ordered her to be first beaten with rods and tormented upon the rack, then torn with combs and burnt with fire afterwards her teeth were hammered out and her breasts cut off, and then she was beheaded, and so passed away to her Divine Bridegroom prepared with all these sufferings as a bride adorned for her husband.
      - type: text
        text: At Besançon, in Gaul, the holy martyr Antidius, Bishop of Besançon, who for Christ's faith's sake was slain by the Vandals.
      - type: text
        text: At Reggio, holy Prosper of Aquitaine, Bishop of that city, famous for his learning and godliness, who stoutly contended for the Catholic faith against the Pelagians.
      - type: text
        text: At Turin, the holy Confessor Maximus, Bishop of Turin, very famous for his teaching and holiness.
      - type: text
        text: In Holland, the holy Confessor Adelbert, the disciple of holy Willibrord, Archbishop [of Utrecht.]
      la:
      - type: text
        text: Séptimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: In território Guléti, prope Nuscum, sancti Guliélmi Confessóris, Patris Eremitárum Montis Vírginis.
      - type: text
        text: Apud Beróeam natális sancti Sosípatris, qui fuit discípulus beáti Pauli Apóstoli.
      - type: text
        text: Romæ sanctæ Lúciæ, Vírginis et Mártyris, cum áliis vigínti duóbus.
      - type: text
        text: Alexandríæ sancti Gallicáni Mártyris, viri Consuláris, qui, sublimátus ínfulis triumphálibus et Constantíno Augústo carus, a sanctis Ioánne et Paulo ad Christi fidem convérsus est; eáque suscépta, cum sancto Hilaríno secéssit ad Ostia Tiberína, atque ibi hospitalitáti et infirmórum servítio totum se dedit. Cuius rei fama in toto Orbe divulgáta, multi úndique illuc veniéntes vidébant virum ex Patrício et Cónsule laváre páuperum pedes, pónere mensam, aquam mánibus effúndere, languéntibus sollícite ministráre et cétera pietátis offícia exhibére. Ipse póstmodum, sub Iuliáno Apóstata, inde expúlsus, Alexandríam perréxit; ibíque, cum a Rauciáno Iúdice sacrificáre cogerétur et contémneret, ídeo, percússus gládio, Christi Martyr efféctus est.
      - type: text
        text: Sibápoli, in Mesopotámia, sanctæ Febróniæ, Vírginis et Mártyris; quæ, in persecutióne Diocletiáni, sub Siléno Iúdice, ob fidem et pudicítiam servándam, primo virgis cæsa et equúleo torta, deínde pectínibus laniáta atque igne succénsa, demum, excússis déntibus ac mammis pedibúsque abscíssis, cápitis damnáta, tot passiónum ornáta monílibus migrávit ad Sponsum.
      - type: text
        text: Apud Rhégium sancti Prósperi Aquitáni, eiúsdem urbis Epíscopi, eruditióne ac pietáte insígnis, qui advérsus Pelagiános, pro fide cathólica, strénue decertávit.
      - type: text
        text: Tauríni natális sancti Máximi, Epíscopi et Confessóris, doctrína et sanctitáte celebérrimi.
      - type: text
        text: In Hollándia sancti Adelbérti Confessóris, qui fuit discípulus sancti Willibrórdi Epíscopi.
  psalm.s-ptimo-kal-ndas-i-nii-d74c5f3d78:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the same 26th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, holy Philip Neri, founder of the Congregation of the Oratory, famous for his virginity, his gift of prophecy, and his wondrous works.
      - type: text
        text: Also at Rome, the holy Pope and martyr Eleutherius, who led many noble Romans to believe in Christ, and who sent into Britain holy Dyfan and Ffagan, who baptized Lleurwg, Prince [of Morgan,] along with his wife and nearly all his people. We keep his feast upon the 29th day of this present month of May.
      - type: text
        text: Also in England the feast of the holy Augustine, first Archbishop of Canterbury, called Apostle of England. He was sent hither, along with others, by the blessed Pope Gregory. He preached the Gospel of Christ to the English people. He fell asleep in the Lord at Canterbury, glorious for his graces and wondrous works.
      - type: text
        text: Also at Rome, the holy Priest Simitrius, and twenty-two others, who suffered martyrdom under the Emperor Antoninus Pius.
      - type: text
        text: At Athens, the blessed Quadratus, a disciple of the Apostles. During the persecution under Hadrian the Church was scattered in great fear, but he gathered it together again by his faith and labour, and gave unto it a book very useful for the defending of the Christian religion, and worthy of the teaching of the Apostles.
      - type: text
        text: At Vienne, in Dauphiny, the holy Zachary, Bishop [of that see,] who suffered martyrdom under Trajan.
      - type: text
        text: In Africa, the holy martyr Quadratus, on whose feast-day holy Augustine [of Hippo] preached a sermon.
      - type: text
        text: At Todi, [in the persecution under the Emperor Diocletian,] the holy martyrs Felicissimus, Heraclius, and Paulinus.
      - type: text
        text: In the country of Auxerre, [in the second century,] the holy Priscus and a vast multitude of Christ's faithful people suffered martyrdom.
      la:
      - type: text
        text: Séptimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Philíppi Nérii, Presbýteri et Confessóris, qui Congregatiónis Oratórii Fundátor fuit, ac virginitáte, prophetíæ dono, et miráculis éxtitit insígnis.
      - type: text
        text: Item Romæ sancti Eleuthérii, Papæ et Mártyris, qui multos nóbiles Romanórum ad fidem Christi perdúxit, et sanctos Damiánum et Fugátium in Británniam misit, qui Lúcium Regem, cum uxóre ipsíus ac toto fere pópulo, baptizárunt.
      - type: text
        text: Cantuáriæ, in Anglia, natális sancti Augustíni, Epíscopi et Confessóris; qui, una cum áliis, a beáto Gregório Papa missus, genti Anglórum sacrum Christi Evangélium prædicávit, ibíque, virtútibus et miráculis gloriósus, obdormívit in Dómino. Eius tamen festívitas quinto Kaléndas Iúnii recólitur.
      - type: text
        text: Athénis item natális beáti Quadráti, Apostolórum discípuli, qui, in persecutióne Hadriáni, fide et indústria sua cóngregans Ecclésiam grandi terróre dispérsam, librum pro Christiánæ religiónis defensióne, valde útilem et Apostólica doctrína dignum, eídem Imperatóri porréxit.
      - type: text
        text: Romæ sanctórum Mártyrum Simítrii Presbýteri, et aliórum vigínti duórum; qui sub Antoníno Pio passi sunt.
      - type: text
        text: Viénnæ, in Gállia, sancti Zacharíæ, Epíscopi et Mártyris, qui sub Traiáno passus est.
      - type: text
        text: In Africa sancti Quadráti Mártyris, in cuius solemnitáte sanctus Augustínus sermónem hábuit.
      - type: text
        text: Tudérti, in Umbria, natális sanctórum Mártyrum Felicíssimi, Heráclii et Paulíni.
      - type: text
        text: In território Antisiodorénsi pássio sancti Prisci Mártyris, qui, cum ingénti multitúdine fidélium Christi, cápite cæsus est.
      - type: text
        text: In civitáte Quiténsi, Æquatoriánæ Ditiónis, sanctæ Maríæ Annæ a Iesu de Parédes, Vírginis, e tértio Ordine sancti Francísci, austeritáte et in próximum caritáte præcláræ, quam Pius Papa Duodécimus sanctárum Vírginum catálogo adnumerávit.
  psalm.s-ptimo-kal-ndas-ianu-rii-9d0bb917d0:
    role: psalm
    content:
      en:
      - type: text
        text: On the 26th day of December, was born into the higher life
      - type: text
        text: ''
      - type: text
        text: At Jerusalem, holy Stephen, the first Martyr. He was stoned by the Jews not long after the Ascension of the Lord.
      - type: text
        text: At Rome, holy Marinus, of the Senatorial order. He was arrested under the Emperor Numerian and the Praefect Marcian, on the charge of being a Christian. He was tortured as they used to do to slaves, on the rack and with iron claws. They threw him into a furnace, but the fire was turned into dew, and he was delivered. He was thrown to wild beasts, but they left him unharmed. He was led again to the altar, and, when he prayed, the idols fell down. Then they smote him with the sword, and he became more than conqueror through up-lifting of his testimony.
      - type: text
        text: Likewise, at Rome, on this day was laid to sleep (in the year 269) beside the Appian Road the holy Pope Denys, who worked hard for the Church, and is a bright ensample of faith.
      - type: text
        text: At the same place (in the year 417), the holy Pope and confessor Zosimus.
      - type: text
        text: In Mesopotamia, the holy Bishop Archelaus, well known for his teaching and holiness.
      - type: text
        text: At Verona (in the year 380), holy Bishop Zeno.
      - type: text
        text: At Rome, holy Theodore, the chamberlain of St Peter's church, of whom mention is made by blessed Pope Gregory.
      - type: text
        text: And in diverse places an exceeding great multitude of holy Martyrs and Confessors and holy Virgins.
      la:
      - type: text
        text: Séptimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Hierosólymis natális sancti Stéphani Protomártyris, qui a Iudǽis, non longe post Ascensiónem Dómini, lapidátus est.
      - type: text
        text: Romæ sancti Maríni, ex órdine Senatório viri, qui, sub Numeriáno Imperatóre et Marciáno Præfécto, Christiánæ religiónis causa comprehénsus, equúleo et úngulis servíli more punítus, in sartáginem deínde coniéctus, sed, igne in rorem convérso, liberátus, obiéctus quoque feris et ab illis nullátenus læsus; tandem, ad aram íterum ductus, et, cum idóla oratióne eius corruíssent, percússus gládio, martýrii triúmphum adéptus est.
      - type: text
        text: Ibídem, via Appia, deposítio sancti Dionýsii Papæ, qui, multis pro Ecclésia impénsis labóribus, fídei documentis clarus effúlsit.
      - type: text
        text: Item Romæ sancti Zósimi, Papæ et Confessóris.
      - type: text
        text: In Mesopotámia sancti Archelái Epíscopi, doctrína et sanctitáte célebris.
      - type: text
        text: Maiúmæ, in Palæstína, sancti Zenónis Epíscopi.
      - type: text
        text: Romæ sancti Theodóri, qui Mansionárius Ecclésiæ sancti Petri fuit, cuius et méminit beátus Gregórius Papa.
  psalm.s-ptimo-kal-ndas-m-rtii-c549b3b1a3:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the eve of the holy Apostle Matthias.
      - type: citation
        text: 'Upon the 23rd day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Faenza, the holy Peter Damian, [988-1072,] Cardinal Bishop of Ostia, famous for his teaching and holiness, whom Pope Leo XII declared to be a Doctor of the Universal Church.
      - type: text
        text: At Sirmium, [in the year 307,] the blessed martyr Sirenus a monk who was apprehended by order of the Emperor Maximian, and when he confessed himself to be a Christian was beheaded.
      - type: text
        text: There likewise, seventy-two holy martyrs, who finished the combat of martyrdom in that city, and received kingdoms which fade not away, eternal in the heavens.
      - type: text
        text: At Rome, [in the fourth century,] the holy Priest Polycarp, who, along with the blessed Sebastian, brought many to believe in Christ, and by his exhortations led them to the glory of martyrdom.
      - type: text
        text: In the city of Astorga, [in the year 252,] the holy Virgin Martha, martyred under the Emperor Decius and the Proconsul Paternus.
      - type: text
        text: At Constantinople, [about the year 860,] the holy monk Lazarus. Because he painted holy images, the Emperor Theophilus, the Iconoclast, put him to grievous tortures, and burnt his hands with a white-hot iron but he was healed by the power of God, restored the painting upon the holy images that had been defaced, and at length fell asleep in peace.
      - type: text
        text: At Brescia, [about 652,] holy Felix, Bishop of that see.
      - type: text
        text: At Seville, in Spain, [in the year 485,] the holy Confessor Florence.
      - type: text
        text: At Todi, [in 324,] the holy Virgin Romana, who was baptized by holy Pope Sylvester, led a heavenly life in dens and caves of the earth, and shone with the glory of miracles.
      - type: text
        text: In England, [in the seventh century,] the holy Virgin Milburga, daughter of the king of the Mercians, [sister of St. Mildred, and Abbess of Wenlock, Shropshire.]
      la:
      - type: text
        text: Séptimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Sancti Petri Damiáni, ex Ordine Camaldulénsi, Cardinális et Epíscopi Ostiénsis, Confessóris et Ecclésiæ Doctóris, qui evolávit in cælum prídie huius diéi.
      - type: text
        text: Smyrnæ natális sancti Polycárpi, qui, beáti Ioánnis Apóstoli discípulus, et ab eo eiúsdem civitátis Epíscopus ordinátus, totíus Asiæ Princeps fuit. Póstea, sub Marco Antoníno et Lúcio Aurélio Cómmodo, sedénte Procónsule et univérso pópulo in theátro advérsus eum personánte, igni tráditus est; et, cum ab igne mínime læderétur, martýrii corónam, gládio confóssus, accépit. Cum illo étiam álii duódecim, qui ex Philadélphia vénerant, in eádem Smyrnénsi urbe, martýrio consummáti sunt. Ipsíus tamen Polycárpi festum séptimo Kaléndas Februárii celebrátur.
      - type: text
        text: Apud Sírmium beáti Siréni, Mónachi et Mártyris, qui, iubénte Maximiáno Imperatóre, reténtus est, et, cum se Christiánum esse confiterétur, cápite obtruncátus.
      - type: text
        text: Ibídem natális sanctórum septuagínta duórum Mártyrum, qui, martýrii certámen in præfáta urbe consummántes, mansúra percepérunt regna.
      - type: text
        text: In civitáte Asturicénsi, in Hispánia, sanctæ Marthæ, Vírginis et Mártyris, quæ, sub Décio Imperatóre et Patérno Procónsule, dire ob Christi fidem est cruciáta et gládio tandem occísa.
      - type: text
        text: Constantinópoli sancti Lázari Mónachi, qui, cum sacras Imágines píngeret, idcírco, Imperatóris Iconoclástæ Theóphili iussu, diris supplíciis excruciátur, et ei manus candénti ferro combúritur; sed, Dei virtúte sanátus, abrásas Imágines sanctas pingéndo restítuit, ac demum in pace quiévit.
      - type: text
        text: Bríxiæ sancti Felícis Epíscopi.
      - type: text
        text: Romæ sancti Polycárpi Presbýteri, qui, cum beáto Sebastiáno, plúrimos ad Christi fidem convértit, atque ad martýrii glóriam exhortándo perdúxit.
      - type: text
        text: Híspali, in Hispánia, sancti Floréntii Confessóris.
      - type: text
        text: Tudérti, in Umbria, sanctæ Románæ Vírginis, quæ, a sancto Silvéstro Papa baptizáta, in antris et spelúncis cæléstem vitam duxit, et miraculórum glória cláruit.
      - type: text
        text: In Anglia sanctæ Milbúrgis Vírginis, fíliæ Regis Merciórum.
      - type: rubric
        text: 'In anno Bissextili bis pronuntiatur Sexto Kaléndas Mártii, et eadem Luna, scilicet die 24 et 25. Prima die, id est 24, hoc modo: Sexto Kaléndas Mártii. Luna..., quota fuerit. Deinde: Commemorátio plurimórum sanctórum Mártyrum et Confessórum, atque sanctárum Vírginum. Secunda die, id est 25: Sexto Kaléndas Mártii. Luna... In Iudǽa..., et cetera, ut in sequenti Lectione.'
  psalm.s-ptimo-kal-ndas-maii-294d6f05db:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 25 th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, the blessed Evangelist Mark. He was the disciple and interpreter of the Apostle Peter. He wrote his Gospel at the prayer of the brethren at Rome. He took it with him and went to Egypt, where he was the first man who proclaimed Christ at Alexandria, and where he founded that Church. He was afterward arrested as a believer in Christ, bound with cords, and dragged over stones to his grievous suffering. Then he was remanded to prison, where he was comforted first by a visitation of angels and then by the Lord Himself appearing unto him, and was called unto the kingdom of heaven in the 8th year of Nero, [in the year 68.]
      - type: text
        text: At Rome, the Greater Litanies, [instituted in sixth century by Pope St. Gregory I, The Great,] take place at St Peter's Church.
      - type: text
        text: At Syracuse, the holy martyrs Evodius, Hermogenes, and Kallistas. [They were brothers and sister.]
      - type: text
        text: At Antioch, [in the year 479] the holy martyr Stephen, Patriarch of that see, who suffered many things at the hands of the heretics who assailed the Council of Chalcedon, and was cast into the river Orontes, in the time of the Emperor Zeno. There likewise, [in the second century,] the holy Deacons Philo and Agathopodes.
      - type: text
        text: At Alexandria, holy Anian, Pope of that see. He was the disciple of blessed Mark, and held that Papacy.
      la:
      - type: text
        text: Séptimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Romæ Litaníæ maióres ad sanctum Petrum.
      - type: text
        text: Alexandríæ natális beáti Marci Evangelístæ. Hic, discípulus et intérpres Apóstoli Petri, rogátus Romæ a frátribus scripsit Evangélium, quo assúmpto, perréxit in Ægýptum, primúsque Alexandríæ Christum annúntians, constítuit Ecclésiam; ac póstea, pro fide Christi tentus, fúnibus vinctus et per saxa raptátus, gráviter afflíctus est; deínde, reclúsus in cárcere, primo angélica visitatióne confortátus est, et demum, ipso Dómino sibi apparénte, ad cæléstia regna vocátus, octávo Nerónis anno.
      - type: text
        text: Item Alexandríæ sancti Aniáni Epíscopi, qui, beáti Marci discípulus eiúsque in Episcopátu succéssor, clarus virtútibus quiévit in Dómino.
      - type: text
        text: Antiochíæ sancti Stéphani, Epíscopi et Mártyris, qui ab hæréticis Synódum Chalcedonénsem impugnántibus, multa passus, in Oróntem flúvium præcipitátus est, témpore Zenónis Imperatóris.
      - type: text
        text: Syracúsis, in Sicília, sanctórum Mártyrum fratrum Evódii, Hermógenis et Callístæ.
      - type: text
        text: Láubiis, in Bélgio, natális sancti Ermíni, Epíscopi et Confessóris.
      - type: text
        text: Antiochíæ sanctórum Philónis et Agathopódis Diaconórum, de quibus beátus Ignátius, Epíscopus et Martyr, laudábilem in suis epístolis mentiónem facit.
  psalm.s-ptimo-kal-ndas-nov-mbris-04d65163b5:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 26th day of October, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr, Pope Evaristus, who dyed the Church of God with his blood under the Emperor Hadrian.
      - type: text
        text: In Africa, the holy martyrs Rogatian the Priest and Felicissimus, who were crowned with a glorious martyrdom in the persecution under the Emperors Valerian and Gallienus. Holy Cyprian writeth of them in his epistle unto the Confessors.
      - type: text
        text: At Nicomedia, (in the persecution under the Emperor Decius,) the holy martyrs Lucian, Florius, and their Companions.
      - type: text
        text: On the same day, holy Quod-Vult-Deus, Bishop of Carthage, whom the Arian king Genseric embarked along with his clergy in unseaworthy ships without oars or sails, but beyond all hope he arrived at Naples and there died in exile as a Confessor.
      - type: text
        text: At Narbonne, the holy Confessor Rusticus, Bishop (of that see,) who enlightened the times of the Emperors Valentinian and Leo.
      - type: text
        text: At Salerno, (in the seventh century,) holy Gaudiosus, Bishop (of that see.)
      - type: text
        text: At Pavia, (in the year 1229,) holy Fulke, Bishop (of that see.)
      - type: text
        text: At Hildesheim, in Saxony, the holy Confessor Bernward, Bishop (of that see,) whose name Celestine III numbered with those of the Saints.
      - type: text
        text: Also (at Policastro, in the sixth century,) the holy Sub-deacon Quadragesimus, who raised a dead man to life, (as is related by the blessed Pope Gregory.)
      la:
      - type: text
        text: Séptimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Evarísti, Papæ et Mártyris, qui Dei Ecclésiam, sub Hadriáno Imperatóre, suo sánguine purpurávit.
      - type: text
        text: In Africa sanctórum Mártyrum Rogatiáni Presbýteri, et Felicíssimi, qui, in persecutióne Valeriáni et Galliéni, illústri martýrio coronáti sunt; de quibus étiam scribit sanctus Cypriánus in epístola ad Confessóres.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Luciáni, Flórii et Sociórum.
      - type: text
        text: Narbóne, in Gállia, sancti Rústici, Epíscopi et Confessóris; qui cláruit tempóribus Valentiniáni et Leónis Imperatórum.
      - type: text
        text: Apud Salérnum sancti Gaudiósi Epíscopi.
      - type: text
        text: Pápiæ sancti Fulci Epíscopi.
      - type: text
        text: Item sancti Quadragésimi Subdiáconi, qui et mortuum resuscitávit.
  psalm.s-ptimo-kal-ndas-oct-bris-3071bdeeae:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Ninian, Bishop of Galloway in Scotland, of whom mention is made upon the 16th day of this present month of September.
      - type: citation
        text: 'Upon the same 25th day of September, were born into the better life: At the village of Emmaus, blessed Cleophas, the disciple of Christ, of whom it is said that he was slain by the Jews for confessing the Lord, and thereafter buried with glorious memory within the same house wherein he had prepared a table for the Lord.'
      - type: text
        text: At Rome, the holy martyr Herculan.
      - type: text
        text: He was a soldier who was turned to Christ on beholding the miracles that were wrought at the passion of the blessed bishop (Pope) Alexander (the First) and was beheaded under the Emperor Antonine, after suffering many torments.
      - type: text
        text: At Amiens, in Gaul, blessed Firmin, (of Pampeluna, first) Bishop (of Amiens,) who suffered martyrdom under the President Rictiovarus, in the persecution under Diocletian, by being beheaded, after enduring diverse torments.
      - type: text
        text: At Damascus, the holy martyrs Paul, Tatta his wife, and their sons Sabinian, Maximus, Rufus, and Eugene.
      - type: text
        text: On the accusation that they were Christians they were flogged and otherwise tormented, and gave up their souls to God.
      - type: text
        text: In Asia, the holy martyrs Bardomian, Eucarpus, and twenty-six others.
      - type: text
        text: On the same day, holy Anathalon; he was a disciple of the blessed Apostle Barnabas, and followed after him as Bishop of the Church of Milan.
      - type: text
        text: At Lyon, (in the year 542) holy Lupus, Bishop (of that see,) who had been an hermit.
      - type: text
        text: At Auxerre, (at the beginning of the seventh century,) the holy Confessor Anacharius, Bishop (of that see.) At Blois, (at the beginning of the sixth century,) holy Solemnius, Bishop of Chartres, famous for miracles.
      - type: text
        text: On the same day, (and at the distance of a few years,) holy Principius, Bishop of Soissons, brother to blessed Remi, Bishop of Rheims.
      - type: text
        text: At Anagni, the holy Virgins Aurelia and Neomisia.
      - type: text
        text: At San Severino, in the March of Ancona, (in the year 1721) the holy Confessor Pacificus, of the Order of Franciscan Friars Minor of the Reformed Observance, a man of wonderful long-suffering and famous for his love of being alone, whose name Pope Gregory XVI enrolled in the list of the saints.
      la:
      - type: text
        text: Séptimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Apud castéllum Emmaus natális beáti Cléophæ, qui fuit Christi discípulus, quem et in eádem domo in qua mensam Dómino paráverat, pro confessióne illíus a Iudǽis occísum tradunt, et gloriósa memória sepúltum.
      - type: text
        text: Ambiáni, in Gállia, beáti Firmíni Epíscopi, qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, post vária torménta, cápitis decollatióne martýrium sumpsit.
      - type: text
        text: Eódem die, via Cláudia, sancti Herculáni, mílitis et Mártyris; qui, sub Antoníno Imperatóre, miráculis in passióne beáti Alexándri Epíscopi ad Christum convérsus, atque ob fídei confessiónem, post multa torménta, gládio cæsus est.
      - type: text
        text: Damásci sanctórum Mártyrum Pauli, et Tattæ cóniugis, ac Sabiniáni, Máximi, Rufi et Eugénii filiórum; qui, Christiánæ religiónis accusáti, verbéribus aliísque supplíciis torti sunt, et in cruciátibus ánimas Deo reddidérunt.
      - type: text
        text: In Asia pássio sanctórum Bardomiáni, Eucárpi et aliórum vigínti sex Mártyrum.
      - type: text
        text: Lugdúni, in Gállia, deposítio sancti Lupi, qui ex Anachoréta factus est Epíscopus.
      - type: text
        text: Antisiodóri sancti Anachárii, Epíscopi et Confessóris.
      - type: text
        text: Blesis, in Gállia, sancti Solémnii, Epíscopi Carnuténsis, miráculis clari.
      - type: text
        text: Eódem die sancti Princípii, qui fuit Epíscopus Suessionénsis et frater beáti Remígii Epíscopi.
      - type: text
        text: Anágniæ sanctárum Vírginum Auréliæ et Neomísiæ.
  psalm.s-ptimo-kal-ndas-sept-mbris-9e2b9a7154:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 26th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 219,] the holy Pope and martyr Zephyrinus.
      - type: text
        text: Likewise at Rome, [in the third century,] the holy martyrs Irenaeus and Abundius. In the persecution under the Emperor Valerian they took the body of blessed Concordia out of the sewer into which it had been thrown, and for so doing were themselves drowned in the same sewer. Justin the Priest drew their bodies thence, and buried them under the ground near blessed Lawrence.
      - type: text
        text: At Vintimiglia, [under the Emperor Maximian,] the holy martyr Secundus. He was a man of good social position, and a captain in the Theban Legion.
      - type: text
        text: At Bergamo, [in the year 286,] the holy martyr Alexander, who was also a soldier of the same legion. As he constantly confessed the name of the Lord Jesus Christ he was beheaded, and so finished his testimony.
      - type: text
        text: Among the tribe of the Marsi, holy Simplicius and his sons, Constantius and Victorian, who were first put to diverse torments, under the Emperor Antoninus, and then beheaded, and so gained the crown of martyrdom.
      - type: text
        text: At Nicomedia, [in the fourth century,] holy Hadrian, the son of the Emperor Probus. He blamed the persecution stirred up by Licinius against the Christians, and was therefore by him ordered to be slain his body was buried at Argyropolis by his uncle Domitius, Bishop of Byzantium.
      - type: text
        text: In Spain, the holy martyr Victor, who was slain by the Moors for Christ's faith's sake, and so received the crown of martyrdom.
      - type: text
        text: At Capua, the holy Confessor Rufinus, Bishop [of that see.]
      - type: text
        text: At Pistoia, the holy Priest and Confessor Felix.
      - type: text
        text: At Lima, in the kingdom of Peru, holy Rose of St. Mary, a Virgin of the Third Order of St Dominic, whose feast is kept upon the 30th day of this present month of August.
      la:
      - type: text
        text: Séptimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Zephyríni, Papæ et Mártyris, cuius dies natális tertiodécimo Kaléndas Ianuárii recensétur.
      - type: text
        text: Cardónæ, in Hispánia, tránsitus sancti Raymúndi Nonnáti, Cardinális et Confessóris, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, vitæ sanctitáte et miráculis clari. Ipsíus tamen festum recólitur prídie Kaléndas Septémbris.
      - type: text
        text: Romæ sanctórum Mártyrum Irenǽi et Abúndii, qui, in persecutióne Valeriáni, eo quod corpus beátæ Concórdiæ, in cloácam proiéctum, leváverant, in eándem cloácam demérsi fuérunt; quorum córpora, a Iustíno Presbýtero inde extrácta, in crypta, iuxta beátum Lauréntium, sepúlta sunt.
      - type: text
        text: Apud Albintimélium, Ligúriæ civitátem, sancti Secúndi Mártyris, viri spectábilis et Ducis ex legióne Thebæórum.
      - type: text
        text: Bérgomi sancti Alexándri Mártyris, qui, et ipse unus ex eádem legióne, cum nomen Dómini Iesu Christi constantíssime faterétur, cápitis abscissióne martýrium complévit.
      - type: text
        text: Apud Marsos sanctórum Simplícii, et eius filiórum Constántii et Victoriáni, qui, sub Antoníno Imperatóre, várie primum excruciáti, tum demum, secúris ictu percússi, martýrii corónam adépti sunt.
      - type: text
        text: Nicomedíæ pássio sancti Hadriáni, e Probo Cǽsare progéniti, qui, Licínio persecutiónem in Christiános commótam éxprobrans, ab eódem iussus est occídi. Ipsíus corpus Domítius, Byzántii Epíscopus, eius pátruus, in ipsíus civitátis subúrbio cui nomen Argyrópolis, sepelívit.
      - type: text
        text: In Hispánia sancti Victóris Mártyris, qui pro Christi fide, a Mauris occísus, martýrii coróna donátus est.
      - type: text
        text: Cápuæ sancti Rufíni, Epíscopi et Confessóris.
      - type: text
        text: Pistórii, in Túscia, sancti Felícis, Presbýteri et Confessóris.
      - type: text
        text: Pódii, in diœcési Pictaviénsi, sanctæ Ioánnæ-Elísabeth Bichier des Ages, Vírginis, Congregatiónis Filiárum a Cruce una cum sancto Andréa Hubérto Fournet Fundatrícis, iugi mortificatióne et vitæ innocéntia claræ, quam Pius Papa Duodécimus sanctárum Vírginum fastis accénsuit.
  psalm.sexto-idus-apr-lis-3e324267f0:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 8th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, the holy martyr Edesius, brother of the blessed Apphian. Under the Emperor Maximian Galerius he openly rebuked the wicked judge for condemning to the lions the virgins vowed to God, wherefore he was apprehended by the soldiers, put to most cruel torments, and drowned in the sea, for the Lord Christ's sake.
      - type: text
        text: In Africa, the holy martyrs Januarius, Maxima, and Macaria.
      - type: text
        text: At Carthage, the holy martyr Concessa.
      - type: text
        text: On the same day are commemorated holy Herodion, Asyncritus, and Phlegon, concerning whom the blessed Apostle Paul writeth in his Epistle unto the Romans.
      - type: text
        text: At Corinth, blessed Denis, Bishop of that city, who by the learning and grace which he had in the Word of God, taught by his epistles not only the people of his own city and province but also the bishops of other provinces and cities, and who had such a veneration for the Popes of Rome that he was used to have their Epistles publicly read in the Church upon the Lord's Day. He flourished in the times of the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus.
      - type: text
        text: At Tours, [in the year 494,] holy Perpetuus, Bishop of that see, a man of wonderful holiness.
      - type: text
        text: At Fiorentino, in Campania, holy Redemptus, [in the year 586,] Bishop of that see, of whom mention is made by blessed Pope Gregory.
      - type: text
        text: At Como, the holy Confessor Amantius, Bishop of that see, [about the year 446.]
      la:
      - type: text
        text: Sexto Idus Aprílis
      - type: text
        text: ''
      - type: text
        text: Commemorátio sanctórum Herodiónis, Asýncriti et Phlegóntis, de quibus scribit beátus Paulus Apóstolus in Epístola ad Romános.
      - type: text
        text: Alexandríæ sancti Ædésii Mártyris, qui, sub Maximiáno Galério Imperatóre, cum esset beáti Apphiáni frater, et ímpium Iúdicem, quod Deo dicátas Vírgines leónibus tráderet, palam argúeret, idcírco, a milítibus tentus sævissimísque afféctus supplíciis, in mare demérsus est pro Christo Dómino.
      - type: text
        text: In Africa sanctórum Mártyrum Ianuárii, Máximæ et Macáriæ.
      - type: text
        text: Carthágine sanctæ Concéssæ Mártyris.
      - type: text
        text: Apud Corínthum beáti Dionýsii Epíscopi, qui eruditióne et grátia, quam hábuit in verbo Dei, non solum suæ civitátis et provínciæ pópulos, sed et aliárum provínciarum et úrbium Epíscopos epístolis erudívit; Romanósque Pontífices ádeo cóluit, ut eórum epístolas públice légere in Ecclésia diébus Domínicis consuevérit. Cláruit autem tempóribus Marci Antoníni Veri et Lúcii Aurélii Cómmodi.
      - type: text
        text: Turónis, in Gállia, sancti Perpétui Epíscopi, admirándæ sanctitátis viri.
      - type: text
        text: Ferentíni, in Hérnicis, sancti Redémpti Epíscopi, cuius méminit beátus Gregórius Papa.
      - type: text
        text: Apud Comum sancti Amántii, Epíscopi et Confessóris.
  psalm.sexto-idus-aug-sti-049e3ea622:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 8th day of August are commemorated at Rome the holy martyrs Cyriacus the Deacon, Largus, Smaragdus, and twenty others, who suffered upon the 16th day of March in the persecution under Diocletian and Maximian, and whose bodies, which had been buried by John the Priest beside the Salarian Way, were upon this day moved by the holy Pope Marcellus to Lucina's farm upon the Ostian Way, whence they have since been brought into the city and buried in the deaconry of Sancta Maria in Via Lata.
      - type: citation
        text: 'Upon the 8th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Anazarbus, in Cilicia, [in the year 290,] holy Marinus the Elder. Under the Emperor Diocletian and the President Lysias he was flogged, tied to a beam, and mangled, and at last thrown to wild beasts. Likewise, the holy martyrs Eleutherius and Leonides, who finished their martyrdom, [in the third century,] by fire.
      - type: text
        text: In Persia, under King Sapor, the holy martyr Hormisdas.
      - type: text
        text: At Cyzicus, upon the Hellespont, [in the year 820,] holy Aemilianus, Bishop [of that see,] who suffered much at the hands of the Emperor Leo on account of the worship of the holy images, and at last died in exile.
      - type: text
        text: In Crete, [in the year 350,] holy Myron, Bishop [of that see,] famous for miracles.
      - type: text
        text: At Vienne, in Gaul, [in the fifth century,] the holy Confessor Severus, a Priest, who undertook a wearisome pilgrimage from India in order to preach the Gospel, and when he came to the aforesaid city, by his word and miracles brought a vast multitude of heathen to believe in Christ.
      la:
      - type: text
        text: Sexto Idus Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis Baptístæ-Maríæ Vianney, Presbýteri et Confessóris, cæléstis ómnium parochórum Patróni; cuius dies natális prídie Nonas mensis huius recensétur.
      - type: text
        text: Sanctórum Mártyrum Cyríaci Diáconi, Largi et Smarágdi, qui, cum áliis vigínti Sóciis, passi sunt décimo séptimo Kaléndas Aprílis. Eórum córpora, via Salária a Ioánne Presbýtero sepúlta, sanctus Marcéllus Papa in prǽdium Lucínæ, via Ostiénsi, hoc die tránstulit; quæ póstea, in Urbem deláta, in Diaconía sanctæ Maríæ in via Lata fuérunt recóndita.
      - type: text
        text: Anazárbi, in Cilícia, sancti Maríni senis, qui, sub Diocletiáno Imperatóre et Lýsia Prǽside, cæsus flagris, in ligno suspénsus ac laniátus, feris tandem obiéctus intériit.
      - type: text
        text: Item sanctórum Mártyrum Eleuthérii et Leónidæ, qui per ignem martýrium consummárunt.
      - type: text
        text: In Pérside sancti Hormísdæ Mártyris, sub Sápore Rege.
      - type: text
        text: Cýzici, in Hellespónto, sancti Æmiliáni Epíscopi, qui, pro sacrárum Imáginum cultu a Leóne Imperatóre multa passus, demum in exsílio vitam finívit.
      - type: text
        text: In Creta sancti Myrónis Epíscopi, miráculis clari.
      - type: text
        text: Viénnæ, in Gállia, sancti Sevéri, Presbýteri et Confessóris; qui ex India, Evangélii prædicándi causa, laboriósam peregrinatiónem suscépit, et, cum ad præfátam urbem devenísset, ingéntem Paganórum multitúdinem verbo et miráculis ad Christi fidem convértit.
  psalm.sexto-idus-dec-mbris-681305b717:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the glorious Mary, Mother of God, and always a Virgin, whom the supreme Pontiff Pius IX. did upon this day solemnly define to have been by a singular gift of God preserved unstained by original sin.
      - type: citation
        text: 'Upon the same 8th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the blessed Pope Eutychian, who with his own hands buried in diverse places three hundred and forty-two martyrs, whose fellow he himself afterwards became, being crowned with martyrdom under the Emperor Numerian and buried in the cemetery of Callistus. (He succeeded Felix I (269-274); after five days' interregnum he became Pope on Jan. 3, 275, and died on Dec. 8, 283.)
      - type: text
        text: At Alexandria, the holy martyr Macarius. Under the Emperor Decius the judge dealt with him in many words to persuade him to deny Christ, but as he only professed his faith the more constantly he was burnt alive, (in the year 250.)
      - type: text
        text: At Trier, holy Eucharius, a disciple of the blessed Apostle Peter, and the first Bishop of that city.
      - type: text
        text: In Cyprus, the holy Bishop Sophronius, who was a wonderful protector of little children, orphans, and widows, and an helper of all the poor and depressed.
      - type: text
        text: In the monastery of Lisieux, the holy Abbot Romaric, who was the first man in the court of King Theodobert, but gave up the world, and became the first in monastic observance. (He was a monk of Luxeuil. He founded the Abbey of Remiremont, of which he became second Abbot in the year 627, and died on Dec. 8, 653.)
      - type: text
        text: At Constantinople, the holy Hermit Patapius, famous for his graces and miracles.
      - type: text
        text: At Verona, is commemorated the ordination of holy Zeno, Bishop (of that see in the fourth century.)
      la:
      - type: text
        text: Sexto Idus Decémbris
      - type: text
        text: ''
      - type: text
        text: Concéptio Immaculáta gloriósæ semper Vírginis Genitrícis Dei Maríæ, quam fuísse præservátam, singulári Dei privilégio, ab omni originális culpæ labe immúnem, Pius Nonus, Póntifex Máximus, hac ipsa recurrénte die, solémniter definívit.
      - type: text
        text: Tréviris sancti Euchárii, qui fuit discípulus beáti Petri Apóstoli et primus eiúsdem civitátis Epíscopus.
      - type: text
        text: Alexandríæ sancti Macárii Mártyris, qui, témpore Décii, cum a Iúdice multis verbis ad negándum Christum suaderétur, et eo maióri constántia suam profiterétur fidem, vivus ad últimum exúri iubétur.
      - type: text
        text: In Cypro sancti Sophrónii Epíscopi, qui pupillórum, orphanórum ac viduárum defénsor miríficus, et páuperum atque oppressórum ómnium adiútor fuit.
      - type: text
        text: In monastério Luxoviénsi, in Gállia, sancti Romárici Abbátis, qui, cum in aula Theodobérti Regis primus esset, renuntiávit sǽculo, et monásticæ étiam observántiæ laude céteris antecélluit.
      - type: text
        text: Constantinópoli sancti Patápii Solitárii, virtútibus et miráculis clari.
      - type: text
        text: Romæ Invéntio sanctórum Mártyrum Nemésii Diáconi, eiúsque fíliæ Lucíllæ Vírginis, Symphrónii, Olýmpii Tribúni, huiúsque uxóris Exsupériæ et Theodúli fílii; quorum memória octávo Kaléndas Septémbris recensétur.
      - type: text
        text: Verónæ Ordinátio sancti Zenónis Epíscopi.
  psalm.sexto-idus-febru-rii-4983156a20:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor John de la Matha, founder of the Order of the Most Holy Trinity for the Redemption of Captives, of whom mention is made upon the 17th day of December, upon the which day he fell asleep in the Lord, [in the year 1213.]
      - type: citation
        text: 'Upon the same 8th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Confessor Jerome Miani, founder of the Congregation of Somascha, whose name was enrolled among those of the saints by Clement XIII, and whose feast we keep upon the 20th day of July.
      - type: text
        text: At Rome, the holy martyrs Paul, Lucius, and Cyriacus.
      - type: text
        text: In the Lesser Armenia, the holy martyrs Denis, Aemilian, and Sebastian.
      - type: text
        text: At Alexandria, under the Emperor Decius, the holy martyr Cointhe. The heathen took her and led her before the idols to make her worship them, and when she would not, they tied her feet with chains and dragged her through the streets of the city until she was mangled to death, [in the year 249.]
      - type: text
        text: At Constantinople, the martyr monks of the monastery of Dim, who were slain in defence of the Catholic faith, [in the year 485,] for that they brought the letter of holy Pope Felix against the [Patriarch] Acacius.
      - type: text
        text: In Persia are commemorated those holy martyrs who were put to death in diverse ways, [in the sixth century,] for the Christian faith's sake, under Gabades, King of Persia.
      - type: text
        text: At Pavia, holy Juventius, Bishop of that see, who laboured earnestly in the Gospel, [in the second century.]
      - type: text
        text: At Milan, [in the year 620,] the holy Confessor Honoratus, Bishop of that see.
      - type: text
        text: At Verdun, in Gaul, [in the year 649,] holy Paul, Bishop of that see, famous for the glory of his miracles.
      - type: text
        text: At Muret, in the country of Limoges, [in the year 1124,] the holy Abbot Stephen, founder of the Order of Grandmont, famous for his graces and miracles.
      - type: text
        text: In the monastery of Vallombrosa, [in the year 1089,] blessed Peter, Cardinal-Bishop of Albano, of the congregation of Vallombrosa, of the Order of St. Benedict. He was surnamed the Fireproof because he passed unhurt through fire.
      la:
      - type: text
        text: Sexto Idus Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis de Matha, Presbýteri et Confessóris, qui Ordinis sanctíssimæ Trinitátis redemptiónis captivórum fuit Institútor, et sextodécimo Kaléndas Ianuárii obdormívit in Dómino.
      - type: text
        text: Somáschæ, in território Bergoménsi, natális sancti Hierónymi Æmiliáni Confessóris, qui Congregatiónis Somáschæ Fundátor éxstitit; atque, plúribus in vita et post mortem miráculis illústris, a Cleménte Décimo tértio, Pontífice Máximo, Sanctórum fastis adscríptus est, et a Pio Papa Undécimo universális orphanórum ac derelíctæ iuventútis Patrónus apud Deum eléctus et declarátus. Eius tamen festívitas tertiodécimo Kaléndas Augústi recólitur.
      - type: text
        text: Romæ sanctórum Mártyrum Pauli, Lúcii et Cyríaci.
      - type: text
        text: In Arménia minóre pássio sanctórum Mártyrum Dionýsii, Æmiliáni et Sebastiáni.
      - type: text
        text: Constantinópoli natális sanctórum Mártyrum Monachórum monastérii Dii, qui, ob defensiónem fídei cathólicæ, cum tulíssent lítteras sancti Felícis Papæ Tértii advérsus Acácium, diríssime cæsi sunt.
      - type: text
        text: In Pérside commemorátio sanctórum Mártyrum, qui, sub Rege Persárum Cábade, ob Christiánam fidem, divérsis supplíciis necáti sunt.
      - type: text
        text: Alexandríæ pássio sanctæ Coínthæ Mártyris, quam Pagáni, sub Décio Imperatóre, corréptam et ad idóla perdúctam, hæc adoráre cogébant; quod cum illa éxsecrans recusáret, ipsíus pedes vínculis innexuérunt, eámque, trahéntes sic vinctam per civitátis platéas, horréndo supplício discerpsérunt.
      - type: text
        text: Pápiæ sancti Iuvéntii Epíscopi, qui strénue in Evangélio laborávit.
      - type: text
        text: Medioláni deposítio sancti Honoráti, Epíscopi et Confessóris.
      - type: text
        text: Virodúni, in Gállia, sancti Pauli Epíscopi, miraculórum dono illústris.
      - type: text
        text: Apud Murétum, in agro Lemovicénsi, natális sancti Stéphani Abbátis, qui Grandimonténsis Ordinis Institútor fuit, ac virtútibus et miráculis cláruit.
      - type: text
        text: In monastério Vallis Umbrósæ Beáti Petri, Cardinális et Epíscopi Albanénsis, ex Ordine Vallis Umbrósæ, cognoménto Ignei, quia per ignem illǽsus transívit.
  psalm.sexto-idus-i-lii-6b566e9c4b:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 10th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, under Publius, Prefect of the City, in the time of the Emperor Antonine, seven holy Brethren, the sons of the holy martyr Felicity. Their names were Januarius, Felix, Philip, Silvanus, Alexander, Vitalis, and Martial. Januarius was first beaten with rods and starved, but in the end hided to death with scourges loaded with lead. Felix and Philip were beaten to death with clubs. Silvanus was killed by being cast over a steep place. Alexander, Vitalis, and Martial were beheaded.
      - type: text
        text: Also at Rome, the holy sisters Rufina and Secunda, both Virgins and both martyrs. In the persecution under the Emperors Valerian and Gallienus they were both tortured and then beheaded, and so passed to heaven. Their bodies lie buried in due honour in the Lateran Cathedral, hard by the Baptistery.
      - type: text
        text: In Africa, the holy martyrs Januarius, Marinus, Nabor, and Felix, who were all beheaded.
      - type: text
        text: At Nicopolis, in Armenia, the holy martyrs Leontius, Maurice, Daniel, and their Companions, who were put to diverse and dreadful torments under the Emperor Licinius, and the President Lysias, and at length were cast into the fire, and so finished the course of their testimony.
      - type: text
        text: In Pisidia, the holy martyrs Bianor and Sylvanus, who suffered most cruel torments for Christ's name's sake, and then were beheaded, and so received their crowns, [fourth century.]
      - type: text
        text: At Iconium, the holy martyr Apollonius, who finished his illustrious testimony upon the Cross, [fourth century.]
      - type: text
        text: At Gent [in Flanders], the holy Virgin Amelberga, [in the year 772. She was a nun in the Abbey of Munsterbilzen, in the Diocese of Liège. She died at the age of 31.]
      la:
      - type: text
        text: Sexto Idus Iúlii
      - type: text
        text: ''
      - type: text
        text: Romæ pássio sanctórum septem Mártyrum fratrum, filiórum sanctæ Felicitátis Mártyris, id est Ianuárii, Felícis, Philíppi, Silváni, Alexándri, Vitális et Martiális, témpore Antoníni Imperatóris, sub Præfécto Urbis Públio. Ex ipsis vero Ianuárius, post virgárum vérbera et cárceris maceratiónem, plumbátis occísus; Felix et Philíppus fústibus mactáti; Silvánus præcipítio interémptus; Alexánder, Vitális et Martiális capitáli senténtia puníti sunt.
      - type: text
        text: Item Romæ sanctárum Vírginum et Mártyrum Rufínæ et Secúndæ sorórum, quæ, in persecutióne Valeriáni et Galliéni, torméntis subáctæ sunt; atque ad últimum, cum álteri caput illísum esset gládio, et álteri cervix cæsa, migrárunt in cælum. Ipsárum vero córpora in Basílica Lateranénsi, prope Baptistérium, débito honóre servántur.
      - type: text
        text: In Africa sanctórum Mártyrum Ianuárii, Maríni, Nabóris et Felícis, qui gládio decolláti sunt.
      - type: text
        text: Nicópoli, in Arménia, sanctórum Mártyrum Leóntii, Maurítii, Daniélis et Sociórum; qui, sub Licínio Imperatóre et Lýsia Prǽside, várie excruciáti, tandem, in ignem coniécti, martýrii cursum confecérunt.
      - type: text
        text: In Pisídia sanctórum Mártyrum Bianóris et Silváni, qui sævíssima pro Christi nómine passi, demum, cervícibus abscíssis, coronántur.
      - type: text
        text: Icónii, in Lycaónia, sancti Apollónii Mártyris, qui per crucem insígne martýrium consummávit.
      - type: text
        text: Apud Gandávum, in Flándria, sanctæ Amelbérgæ Vírginis.
  psalm.sexto-idus-i-nii-cddd0a15ab:
    role: psalm
    content:
      en:
      - type: text
        text: 'On the seventh day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Aix in France, St. Maximin, first bishop of that city, who is said to have been a disciple of the Lord.
      - type: text
        text: On the same day, St. Calliopa, martyr, who for the faith of Christ received the palm of martyrdom. Her breasts had been cut away, her flesh burned, she was rolled on broken pottery, and was at last beheaded.
      - type: text
        text: At York in England, St. William, archbishop and confessor, who, among other miracles wrought at his tomb, raised three persons from the dead. He was placed in the calendar of the saints by Pope Honorius III.
      - type: text
        text: At Soissons in France, the birthday of St. Medard, bishop of Noyon, whose life and precious death are commended by glorious miracles.
      - type: text
        text: At Rouen, St. Gildard, bishop, brother of this same St. Medard. They were born on the same day, consecrated bishops at the same time, and were taken from this life on the same day, entering heaven together.
      - type: text
        text: At Sens, the bishop St. Heraclius.
      - type: text
        text: At Metz, the bishop St. Clodulph.
      - type: text
        text: In Piceno, St. Severin, bishop of Septempeda.
      - type: text
        text: In Sardinia, St. Sallustian, confessor.
      - type: text
        text: At Camerino, St. Victorinus, confessor, the twin brother of St. Severin, bishop of Septempeda.
      la:
      - type: text
        text: Sexto Idus Iúnii
      - type: text
        text: ''
      - type: text
        text: Aquis, in Gállia, sancti Maximíni, qui éxstitit primus eiúsdem civitátis Epíscopus, ac Dómini discípulus fuísse tráditur.
      - type: text
        text: Eódem die sanctæ Callíopæ Mártyris, quæ, ob Christi fidem, abscíssis mammis atque adústis cárnibus, super téstulas volutáta, demum, truncáta cápite, martýrii palmam accépit.
      - type: text
        text: Eboráci, in Anglia, sancti Willhélmi, Epíscopi et Confessóris, qui, inter cétera ad eius sepúlcrum patráta mirácula, tres mórtuos suscitávit, atque ab Honório Papa Tértio in Sanctórum cánonem relátus est.
      - type: text
        text: Apud Suessiónes, in Gálliis, natális sancti Medárdi, Epíscopi Novioménsis; cuius vita et mors pretiósa gloriósis miráculis commendátur.
      - type: text
        text: Rotómagi sancti Gildárdi Epíscopi, qui fuit frater eiúsdem sancti Medárdi. Ambo autem fratres, eódem die nati eodémque die Epíscopi consecráti, uno quoque die de hac vita subtrácti, simul in cælum migrárunt.
      - type: text
        text: Apud Senónas sancti Heráclii Epíscopi.
      - type: text
        text: Metis, in Gállia, sancti Clodúlphi Epíscopi.
      - type: text
        text: In Picéno sancti Severíni, Septempedáni Epíscopi.
      - type: text
        text: In Sardínia sancti Sallustiáni Confessóris.
      - type: text
        text: Cameríni sancti Victoríni Confessóris, qui fuit prædícti sancti Severíni, Septempedáni Epíscopi, germánus frater.
  psalm.sexto-idus-ianu-rii-c02a5539f0:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 8th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Beauvais, in Gaul, the holy martyrs Lucian the Priest (first Bishop of that see,) Maximian, and Julian. Maximian and Julian were slain by the persecutors with the sword, but the blessed Lucian, who had come into Gaul with holy Denis, did not receive the like treatment until after great suffering, the which notwithstanding, he feared not to confess aloud the name of Christ. (He died in the year 312.)
      - type: text
        text: Likewise the holy martyr Eugenian (Bishop of Autun.)
      - type: text
        text: In Libya, the holy martyrs Theophilus the Deacon, and Helladius, who were first torn and mangled with sharp potsherds, and then cast into the fire, and so gave up their souls to God.
      - type: text
        text: At Venice, (in the year 1455,) the blessed Confessor Lawrence de' Giustiniani, the first Patriarch of that city he was filled very abundantly with learning and gifts of divine wisdom from on high, and Alexander VIII. enrolled his name among those of the saints. We keep his festival upon the fifth day of September.
      - type: text
        text: At Hierapolis, in Asia, holy Apollinaris, Bishop (of that see,) who was eminent for holiness and learning, in the time of the Emperor Marcus Antoninus Verus.
      - type: text
        text: At Naples, in Campania, holy Severinus, Bishop (of that see,) brother of the blessed martyr Victorinus he wrought many good works, and fell asleep full of holiness, (in the year 540.)
      - type: text
        text: At Pavia, the holy Confessor Maximus, Bishop (of that see, successor to St Epiphanius. He took part in the 4th and 6th Councils of Rome, held by Pope Symmachus against the Antipope Lawrence at the beginning of the sixth century.)
      - type: text
        text: At Regensburg in Bavaria, holy Bishop Erhard.
      - type: text
        text: At Metz, holy Patient, Bishop (of that see, in the second century.)
      - type: text
        text: On the same day, (in the year 482,) in Bavaria, the holy Abbot Severinus, who spread the Gospel among that people, and is called the Apostle of the (Austrians and) Bavarians. His body was, by the will of God, brought to Montefeltro, near Naples, and thence it hath been since taken to the monastery of St. Severino.
      la:
      - type: text
        text: Sexto Idus Ianuárii
      - type: text
        text: ''
      - type: text
        text: Venétiis deposítio sancti Lauréntii Iustiniáni, primi Patriárchæ urbis eiúsdem et Confessóris; quem, doctrína et supérnis divínæ sapiéntiæ charismátibus copiosíssime replétum, Alexánder Octávus, Póntifex Máximus, in Sanctórum númerum rétulit. Ipsíus autem festívitas Nonis Septémbris, quo die Cáthedram pontificálem ascéndit, potíssimum celebrátur.
      - type: text
        text: Bellováci, in Gálliis, sanctórum Mártyrum Luciáni Presbýteri, Maximiáni et Iuliáni. Horum duo últimi a persecutóribus gládio perémpti sunt; beátus autem Luciánus, qui, una cum sancto Dionýsio, in Gálliam vénerat, et ipse, post nímiam cædem, cum Christi nomen viva voce confitéri non timuísset, priórum senténtiam excépit.
      - type: text
        text: In Líbya sanctórum Mártyrum Theóphili Diáconi, et Helládii, qui, primo laniáti ac téstulis peracútis compúncti, demum, in ignem coniécti, ánimas Deo reddidérunt.
      - type: text
        text: Augustodúni sancti Eugeniáni Mártyris.
      - type: text
        text: Hierápoli, in Asia, sancti Apollináris Epíscopi, qui, sub Marco Antoníno Vero, sanctitáte atque doctrína flóruit.
      - type: text
        text: Neápoli, in Campánia, natális sancti Severíni Epíscopi, qui fuit frater beáti Victoríni Mártyris; et, post multárum virtútum perpetratiónem, plenus sanctitáte quiévit.
      - type: text
        text: Metis, in Gállia, sancti Patiéntis Epíscopi.
      - type: text
        text: Pápiæ sancti Máximi, Epíscopi et Confessóris.
      - type: text
        text: Ratisbónæ, in Bavária, sancti Erhárdi Epíscopi.
      - type: text
        text: Apud Nóricos sancti Severíni Abbátis, qui apud eam gentem Evangélium propagávit, et Noricórum dictus est Apóstolus. Eius corpus ad Lucullánum prope Neápolim, in Campánia, divínitus delátum, inde póstea ad monastérium sancti Severíni translátum est.
  psalm.sexto-idus-m-rtii-290a62062d:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the forty holy martyrs who suffered at Sebaste, in Armenia.
      - type: citation
        text: 'Upon the same 10th day of March, were born into a better life:'
      - type: text
        text: ''
      - type: text
        text: At Apamea, in Phrygia, the holy martyrs Caius and Alexander, who were crowned with a glorious martyrdom in the persecution under the Emperors Marcus Antoninus and Lucius Verus, as is written by Appolinaris, Bishop of Hierapolis, in his book against the heretics called Cataphrygians.
      - type: text
        text: In Persia, forty-two holy martyrs, [about the year 375.]
      - type: text
        text: At Corinth, the holy martyrs Codratus, Denis, Cyprian, Anectus, Paul, and Crescens, who were slain with the sword under the President Jason, in the persecution under the Emperors Decius and Valerian.
      - type: text
        text: In Africa, the holy martyr Victor, on whose feast day holy Augustine addressed a discourse to the people.
      - type: text
        text: At Jerusalem, the holy Confessor Macarius, Patriarch of that see, at whose exhortation Constantine and Helen cleansed the holy places, and adorned them with hallowed churches, [about the year 334. There is a letter to him from Constantine preserved by Socrates.]
      - type: text
        text: At Paris, [in the year 580,] holy Drostovseus, Abbot [of the monastery of St. Germain des Prés,] the disciple of blessed Germain, Bishop [of Paris.]
      - type: text
        text: In the monastery of Bobbio, holy Attala, Abbot [of that monastery,] famous for miracles, [in the year 627.]
      la:
      - type: text
        text: Sexto Idus Mártii
      - type: text
        text: ''
      - type: text
        text: Sanctórum Quadragínta Mártyrum, quorum natális prídie huius diéi recensétur.
      - type: text
        text: Apaméæ, in Phrýgia, natális sanctórum Mártyrum Caii et Alexándri, qui (ut scribit Apollináris, Hierapolitánus Epíscopus, in libro advérsus Cataphrýgas hæréticos), in persecutióne Marci Antoníni et Lúcii Veri, glorióso martýrio coronáti sunt.
      - type: text
        text: In Pérside pássio sanctórum quadragínta duórum Mártyrum.
      - type: text
        text: Corínthi sanctórum Mártyrum Codráti, Dionýsii, Cypriáni, Anécti, Pauli et Crescéntis, qui, in persecutióne Décii et Valeriáni, sub Iásone Prǽside, gládio cæsi sunt.
      - type: text
        text: In Africa sancti Victóris Mártyris, in cuius solemnitáte sanctus Augustínus ad pópulum de ipso tractátum hábuit.
      - type: text
        text: Romæ sancti Simplícii, Papæ et Confessóris.
      - type: text
        text: Hierosólymis sancti Macárii, Epíscopi et Confessóris; cuius hortátu loca sancta a Constantíno Magno et beáta Heléna, eius matre, expurgáta sunt et sacris Basílicis illustráta.
      - type: text
        text: Lutétiæ Parisiórum deposítio sancti Droctovéi Abbátis, qui fuit discípulus beáti Germáni Epíscopi.
      - type: text
        text: In monastério Bobiénsi sancti Attalæ Abbátis, miráculis clari.
  psalm.sexto-idus-maii-0084e2f7c2:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Antonine, Archbishop of Florence, whose birth into the better life is told upon the 2nd day of May.
      - type: text
        text: Upon the same the 10th day of May, is kept
      - type: text
        text: ''
      - type: text
        text: At Rome, on the Latin Way, the birthday of the holy martyrs Gordian and Epimachus. Gordian was long beaten with whips loaded with lead, and at last beheaded, in the time of the Emperor Julian the Apostate, because of his confession of Christ's Name. The Christians buried his body at night upon the aforesaid Latin Way, in the same underground place whither had a little while before been brought from Alexandria the remains of the blessed martyr Epimachus, who had there suffered martyrdom for believing in Christ.
      - type: text
        text: In the land of Uz is commemorated the holy prophet Job, a man of wondrous patience.
      - type: text
        text: At Rome, the blessed priest and martyr Calepodius, whom the Emperor Alexander [Severus] caused to be slain with the sword, and his body to be dragged through the city and cast into the Tiber; when it had been found it was buried by Pope Callistus.
      - type: text
        text: Moreover, at Rome also, there were beheaded the Consul Palmatius, along with his wife and children and forty-two others of both sexes of his house; also the Senator Simplicius, with his wife and sixty-eight of his household; also Felix, with his wife Blanda. Their heads were hung up at the different gates of the city to be a terror to Christians.
      - type: text
        text: Also at Rome, at the Hundred Halls, upon the Latin Way, are commemorated the holy martyrs Quartus and Quintus, whose bodies were taken to Capua.
      - type: text
        text: At Lentini, in Sicily, [in the third century,] the holy martyrs Alphius, Philadelphus, and Cyrinus.
      - type: text
        text: At Smyrna, the holy martyr Dioscoredes.
      - type: text
        text: At Bologna, [in the year 1443,] the blessed Nicholas Albergati, Bishop of that city, a Charterhouse monk, and Cardinal of the holy Roman Church, famous for his holiness and for his work as Legate of the Apostolic See. His body is buried in the Charterhouse at Florence.
      - type: text
        text: At Taranto, [at the end of the seventh century,] the holy Catald, Bishop [of that city, an Irish monk,] famous for wonders.
      - type: text
        text: At Milan is commemorated the finding of the bodies of the holy martyrs Nazarius and Celsus. The blessed Bishop Ambrose found the body of holy Nazarius still marked with fresh blood, and took it to the Cathedral Church of the Apostles along with the body of the blessed child Celsus, to whom Nazarius had been foster-father. In the persecution under Nero, Anolinus commanded them both together to be slain with the sword upon the 29th day of July, upon the which day is kept [at Milan] the feast of their martyrdom.
      - type: text
        text: At Madrid, [in the year 1175,] the holy Isidore the husbandman, famous for wonders, whom Pope Gregory XV enrolled in the list of the Saints along with holy Ignatius of Loyola, Francis Xavier, Teresa, and Philip Neri.
      la:
      - type: text
        text: Sexto Idus Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Antoníni, ex Ordine Prædicatórum, Epíscopi Florentíni et Confessóris, cuius dies natális sexto Nonas mensis huius recensétur.
      - type: text
        text: Romæ, via Latína, natális sanctórum Mártyrum Gordiáni et Epímachi, quorum prior, pro confessióne nóminis Christi, témpore Iuliáni Apóstatæ, diu plumbátis cæsus et ad últimum cápite truncátus, noctu a Christiánis sepúltus eádem via fuit in crypta, in quam beáti Epímachi Mártyris relíquiæ paulo ante translátæ fúerant ab Alexándria, ubi ipse, pro Christi fide, martýrium compléverat prídie Idus Decémbris.
      - type: text
        text: In terra Hus sancti Iob Prophétæ, admirándæ patiéntiæ viri.
      - type: text
        text: Romæ beáti Calepódii, Presbýteri et Mártyris; quem Alexánder Imperátor gládio fecit occídi, et corpus eius per civitátem trahi, atque in Tíberim iactári, quod invéntum Callístus Papa sepelívit. Decollátus est étiam Palmátius Consul cum uxóre et fíliis et áliis promíscui sexus quadragínta duóbus de domo sua, Simplícius quoque Senátor cum uxóre et sexagínta octo de família sua, item et Felix cum uxóre sua Blanda; quorum cápita suspénsa sunt per divérsas portas Urbis, ad exémplum Christianórum.
      - type: text
        text: Item Romæ, via Latína, ad Centum Aulas, natális sanctórum Mártyrum Quarti et Quincti, quorum córpora Cápuam transláta sunt.
      - type: text
        text: Apud Leontínos, in Sicília, sanctórum Mártyrum Alphíi, Philadélphi et Cyríni.
      - type: text
        text: Smyrnæ sancti Dioscóridis Mártyris.
      - type: text
        text: Apud Taréntum sancti Catáldi Epíscopi, miráculis clari.
      - type: text
        text: Matríti sancti Isidóri Agrícolæ, quem, miráculis clarum, Gregórius Papa Décimus quintus, una cum sanctis Ignátio, Francísco Xavério, Terésia et Philíppo Nério, in Sanctórum númerum rétulit.
      - type: text
        text: Medioláni Invéntio sanctórum Mártyrum Nazárii et Celsi, in qua beátus Ambrósius Epíscopus corpus sancti Nazárii recenti adhuc sánguine conspérsum réperit, atque ad Basílicam Apostolórum tránstulit, una cum córpore beáti Celsi púeri, quem idem ipse Nazárius nutríerat, et Anolínus, in Nerónis persecutióne, simul cum eo feríri gládio iússerat quinto Kaléndas Augústi; quo die festívitas gloriósi eórum martýrii celebrátur.
  psalm.sexto-idus-nov-mbris-c7fa36dc00:
    role: psalm
    content:
      en:
      - type: text
        text: Tomorrow is the Octave of All Saints.
      - type: citation
        text: 'Upon the same 8th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Lavican Way, upon the third milestone from the city, the holy martyrs Claudius, Nicostratus, Symphorian, Castorius, and Simplicius, they were first cast into prison, then heavily lashed with loaded scourges, and as their faith in Christ could not be shaken the Emperor Diocletian commanded that they should be cast into the river.
      - type: text
        text: Likewise at Rome, upon the Lavican Way, the holy martyrs called the "Crowned" brethren, Severus, Severian, Carpophorus, and Victorinus, who under the aforesaid Emperor Diocletian were flogged to death with scourges loaded with lead. Their names were afterwards revealed by the Lord after diverse years, but as they were unknown at the time it was ordained that on the anniversary of their deaths they should be commemorated, along with the five above mentioned, under the title of the Four that were Crowned, and the said custom hath still gone on in the Church ever since their names have been known.
      - type: text
        text: At Rome, (in the year 618,) the holy Pope Deusdedit, whose grace was such that by his kiss he made a leper clean.
      - type: text
        text: At Bremen, (about the year 789,) holy Willehad, first Bishop of that see. He spread the Gospel in Friesland and Saxony along with holy Boniface, whose disciple he was.
      - type: text
        text: At Soissons, in Gaul, (in the year 1118,) holy Godfrey, Bishop of Amiens, a man of great holiness.
      - type: text
        text: At Verdun, the holy Confessor Maurus, Bishop (of that see.)
      - type: text
        text: At Tours, (in the fourth century,) the holy priest Clarus, whose epitaph was written by holy Paulinus.
      la:
      - type: text
        text: Sexto Idus Novémbris
      - type: text
        text: ''
      - type: text
        text: Romæ, via Lavicána, tértio ab Urbe milliário, pássio sanctórum Mártyrum Cláudii, Nicostráti, Symphoriáni, Castórii et Simplícii, qui, primo in cárcerem missi, deínde scorpiónibus gravíssime cæsi, tandem, cum ex fide Christi dimovéri non possent, a Diocletiáno iussi sunt in flúvium præcípites dari.
      - type: text
        text: Ibídem, via Lavicána, natális sanctórum Quátuor Coronatórum fratrum, id est Sevéri, Severiáni, Carpóphori et Victoríni; qui, sub eódem Imperatóre, íctibus plumbatárum usque ad mortem cæsi sunt. Horum autem nómina, quæ póstea, interiéctis annis, Dómino revelánte, osténsa sunt, cum mínime reperíri tunc potuíssent, statútum fuit ut anniversária dies ipsórum, una cum illis quinque, sub nómine sanctórum Quátuor Coronatórum recolerétur; qui mos, étiam postquam reveláta sunt, in Ecclésia perseverávit.
      - type: text
        text: Item Romæ sancti Deúsdedit Papæ Primi, qui tanti meriti fuit, ut leprósum ósculo a lepra sanáverit.
      - type: text
        text: In vico Blexen, ad Visúrgim flúvium, in Germánia, sancti Willehádi, qui primus éxstitit Breménsis civitátis Epíscopus; atque, una cum sancto Bonifátio, cuius discípulus fuit, in Frísia et Saxónia Evangélium propagávit.
      - type: text
        text: Suessíone, in Gálliis, sancti Godefrídi, Ambianénsis Epíscopi, magnæ sanctitátis viri.
      - type: text
        text: Apud Virodúnum, in Gállia, sancti Mauri, Epíscopi et Confessóris.
      - type: text
        text: Turónis, in Gállia, sancti Clari Presbýteri, cuius sanctus Paulínus epitáphium scripsit.
  psalm.sexto-idus-oct-bris-8b177c8d86:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Francis Borgia, General of the Society of Jesus, of whom mention is made upon the last day of September, and who is memorable for hardness of living, the gift of prayer, renunciation of the world, and the refusal of high places in the Church.
      - type: citation
        text: 'Upon the 10th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At York, in England, (in the year 644,) holy Paulinus, Archbishop of that see. A disciple of the blessed Pope Gregory. Gregory sent him into England along with others to preach the Gospel, and he brought King Edwin and all his people to believe in Christ.
      - type: text
        text: In the island of Crete, blessed Pinytus, noble among Bishops. He flourished as Bishop of Gnossus, under the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus, and hath left us in his writings a living image of himself as in a looking-glass.
      - type: text
        text: At Cologne, the holy martyr Gereon, with three hundred and eighteen others, who patiently suffered beheading for true godliness' sake in the persecution under the Emperor Maximian.
      - type: text
        text: In the same country, the holy martyrs Victor and his Companions.
      - type: text
        text: At Bonn, in Germany, (in the fourth century,) the holy martyrs Cassius and Florence, and many others.
      - type: text
        text: At Nicomedia, (in the year 303,) the holy martyrs Eulampius, and the Virgin Eulampia his sister. When Eulampia heard her brother being tortured for Christ's sake she sprang into the midst of the crowd, and embraced him, and joined herself to him. Then they both were put together into a vessel of boiling oil, but were nowise hurt thereby, by the which wonder two hundred others were brought to believe in Christ, and these two hundred, along with the brother and sister, were all beheaded together, and so finished their testimony.
      - type: text
        text: At Piombino, in Tuscany, (at the end of the sixth century,) the holy Confessor Cerbonius, Bishop (of that see,) who was famous for miracles, both in life and in death, as witness holy Gregory.
      - type: text
        text: At Verona also, holy Cerbonius, Bishop of Verona.
      - type: text
        text: At Capua, (about the middle of the ninth century,) holy Paulinus, Bishop (of that see.)
      la:
      - type: text
        text: Sexto Idus Octóbris
      - type: text
        text: ''
      - type: text
        text: Sancti Francísci Bórgiæ, Sacerdótis e Societáte Iesu et Confessóris, cuius dies natális prídie Kaléndas Octóbris recensétur.
      - type: text
        text: Apud Septam, in Mauritánia Tingitána, pássio sanctórum septem Mártyrum, ex Ordine Minórum, scílicet Daniélis, Samuélis, Angeli, Leónis, Nicolái, Hugolíni et Domni; qui, cum essent omnes præter Domnum Sacerdótes, ibídem, ob Evangélii prædicatiónem et Mahuméticæ confutatiónem sectæ, a Saracénis contumélias, víncula et flagélla perpéssi, demum, capítibus abscíssis, martýrii palmam adépti sunt.
      - type: text
        text: Colóniæ Agrippínæ sancti Gereónis Mártyris, cum áliis trecéntis decem et octo; qui pro vera pietáte, in persecutióne Maximiáni, gládiis patiéntes colla subdidérunt.
      - type: text
        text: In território eiúsdem urbis sanctórum Victóris et Sociórum Mártyrum.
      - type: text
        text: Bonnæ, in Germánia, sanctórum Mártyrum Cássii et Floréntii, cum áliis plúrimis.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Eulámpii, et soróris Eulámpiæ Vírginis. Hæc porro, cum audísset pro Christo fratrem torquéri, in médiam turbam exsíluit, et, fratrem amplexáta, huic sóciam se adiúnxit; atque ambo, coniécti in ollam fervéntis ólei, sed nulla ex parte læsi, tandem, una cum áliis ducéntis, qui eo miráculo permóti credíderant in Christum, cápitis obtruncatióne martýrium complevérunt.
      - type: text
        text: In Creta ínsula beáti Pinýti, inter Epíscopos nobilíssimi. Hic, Gnósiæ urbis Epíscopus, sub Marco Antoníno Vero et Lúcio Aurélio Cómmodo flóruit, et in scriptis suis, velut in quodam spéculo, vivéntem sui relíquit imáginem.
      - type: text
        text: Eboráci, in Anglia, sancti Paulíni Epíscopi, qui fuit beáti Gregórii Papæ discípulus; et, una cum áliis, ad prædicándum Evangélium illuc ab eo missus, Edwínum Regem eiúsque pópulum ad Christi fidem convértit.
      - type: text
        text: Populónii, in Túscia, sancti Cerbónii, Epíscopi et Confessóris, qui (ut sanctus Gregórius Papa refert) in vita et morte miráculis cláruit.
      - type: text
        text: Verónæ sancti Cerbónii Epíscopi.
      - type: text
        text: Cápuæ sancti Paulíni Epíscopi.
  psalm.sexto-idus-sept-mbris-135b6f3b08:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the same 8th day of September, were born into the better life:'
      - type: text
        text: On the morrow we commemorate the birth of the Most Blessed Mary, always a Virgin, Mother of God.
      - type: text
        text: Upon the same day are commemorated the holy martyr Adrian, and twenty-three others, who finished their testimony at Nicomedia after many sufferings, under the Emperors Diocletian and Maximian, by having their legs broken, upon the 4th day of March. Their relics were carried by the Christians to Byzantium, where they were buried with reverence and honour, and thence the body of holy Adrian was afterwards brought to Rome, upon the 8th of this month, upon which day the chief feast is kept in his honour.
      - type: text
        text: At Alexandria, the holy martyrs Ammon, Theophilus, Neoterius, and twenty-two others.
      - type: text
        text: At Antioch, the holy martyrs Timothy and Faustus.
      - type: text
        text: At Gaza, in Palestine, the holy brethren Eusebius, Nestabus, and Zeno, all martyrs, in the time of the Emperor Julian the Apostate.
      - type: text
        text: A multitude of the Gentiles fell upon them, rent them, and slew them.
      - type: text
        text: There also the holy martyr Nestor, who was most cruelly tormented by the same raging Gentiles, under the same Emperor Julian, and gave up the ghost.
      - type: text
        text: At Valencia, in Spain, holy Thomas of Villanueva, Archbishop (of that city,) famous for his exceeding charity toward the poor. His name was enrolled among those of the Saints by Pope Alexander VII, and we keep his feast upon the 22nd day of this present month of September.
      - type: text
        text: At Frisingen, holy Corbinian, first Bishop of that city. He was ordained and sent forth to preach the Gospel by Pope Gregory II. He bore much fruit in Gaul and in Germany, and at length fell asleep in peace, famous for graces and wonders.
      la:
      - type: text
        text: Sexto Idus Septémbris
      - type: text
        text: ''
      - type: text
        text: Natívitas beatissimæ semper Vírginis Genetrícis Dei Maríæ.
      - type: text
        text: Sancti Hadriáni Mártyris; cuius dies natális quarto Nonas Mártii recensétur, sed festívitas hac die, qua sacrum eius corpus Romam translátum fuit, potíssime celebrátur.
      - type: text
        text: Valéntiæ, in Hispánia Tarraconénsi, natális sancti Thomæ a Villa Nova, ex Eremitárum sancti Augustíni Ordine, Epíscopi et Confessóris, insígnis propter flagrántem in páuperes caritátem; qui ab Alexándro Papa Séptimo in Sanctórum númerum adscríptus est. Ipsíus autem festum décimo Kaléndas Octóbris celebrátur.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Ammónis, Theóphili, Neotérii et aliórum vigínti duórum.
      - type: text
        text: Antiochíæ sanctórum Timóthei et Fausti Mártyrum.
      - type: text
        text: Gazæ, in Palæstína, sanctórum Mártyrum fratrum Eusébii, Néstabi et Zenónis; qui, témpore Iuliáni Apóstatæ, irruénte in eos turba Gentílium, discérpti atque necáti sunt.
      - type: text
        text: Ibídem sancti Néstoris Mártyris, qui sub eódem Iuliáno, ab iísdem Gentílibus furéntibus sævíssime cruciátus, emísit spíritum.
      - type: text
        text: Romæ sancti Sérgii Primi, Papæ et Confessóris.
      - type: text
        text: Frisíngæ sancti Corbiniáni, qui fuit primus eiúsdem civitátis Epíscopus. Hic, a sancto Gregório Secúndo Pontífice ordinátus et ad prædicándum Evangélium missus, úberes fructus in Gállia et Germánia rétulit, ac demum, virtútibus et miráculis clarus, in pace quiévit.
      - type: text
        text: Carthágine nova, in América meridionáli, sancti Petri Claver, Sacerdótis e Societáte Iesu et Confessóris; qui mira sui abnegatióne et exímia caritáte Nigrítis in servitútem abdúctis, annos ámplius quadragínta, óperam impéndens, tercénta fere eórum míllia Christo sua ipse manu regenerávit; et a Leóne Décimo tértio, Pontífice Máximo, in Sanctórum númerum relátus est, ac dein étiam cæléstis Patrónus peculiáris sacrárum ad Nigrítas Missiónum constitútus et declarátus.
  psalm.sexto-kal-ndas-apr-lis-77169469ae:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor and Doctor of the Church, John of Damascus, famous for holiness and teaching. He strove manfully for the honouring of the holy images, both by word and writing, against the Emperor Leo the Isaurian wherefore the Emperor commanded that his right hand should be smitten off; whereupon he commended himself to the image of the Blessed Virgin Mary, which he had defended, and forthwith he received back his hand whole and sound. Of whom mention is made upon the 6th day of May.
      - type: citation
        text: 'Upon the same 27th day of March were born into the better life::'
      - type: text
        text: ''
      - type: text
        text: At Druzipara, in Pannonia, under the Emperor Maximian, the holy soldier Alexander, who after triumphing for Christ in many contendings, and working many miracles, was beheaded, and so finished his testimony.
      - type: text
        text: On the same day, the holy martyrs the Senator Philetus, his wife Lydia, and his children Macedon and Theoprepis, as also the General Amphilochius, and the notary Chronides, who were all slain for confessing Christ.
      - type: text
        text: In Persia, the holy martyrs Zanitas, Lazarus, Marotes, Narses, and five others, who were most cruelly slain under Sapor, King of the Persians, and so won the palm of martyrdom, [in the year 326.]
      - type: text
        text: At Salzburg, [in the year 718,] the holy Confessor Rupert, Bishop of that see, who wondrously spread the gospel among the Bavarians and Styrians.
      - type: text
        text: In Egypt, the holy Hermit John, a man of great holiness, who, among other graces, was gifted with the spirit of prophecy, whereby he foretold unto the Emperor Theodosius his victory over the tyrants Maximus and Eugenius.
      la:
      - type: text
        text: Sexto Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis Damascéni, Presbýteri, Confessóris et Ecclésiæ Doctóris, cuius dies natális ágitur prídie Nonas Maii.
      - type: text
        text: Drizíparæ, in Pannónia, sancti Alexándri mílitis, qui, sub Maximiáno Imperatóre, post multos pro Christo agónes superátos múltaque mirácula édita, cápitis abscissióne martýrium complévit.
      - type: text
        text: In Illýrico sanctórum Philéti Senatóris, Lýdiæ uxóris, et filiórum Macédonis et Theoprépii, itémque Amphilóchii Ducis, et Crónidæ Commentariénsis; qui, pro Christi confessióne, torméntis plúribus superátis, corónam glóriæ sunt adépti.
      - type: text
        text: In Pérside sanctórum Mártyrum Zanítæ, Lázari, Marótæ, Narsétis et aliórum quinque, qui sub Rege Persárum Sápore, sævíssime trucidáti, martýrii palmam meruérunt.
      - type: text
        text: Salisbúrgi, in Nórico, sancti Rupérti, Epíscopi et Confessóris, qui apud Bávaros et Nóricos Evangélium mirífice propagávit.
      - type: text
        text: In Ægýpto sancti Ioánnis Eremítæ, magnæ sanctitátis viri, qui, inter cétera virtútum insígnia, étiam prophético spíritu plenus, Theodósio Imperatóri victórias de tyránnis Máximo et Eugénio prædíxit.
  psalm.sexto-kal-ndas-aug-sti-110db74083:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 27th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, the holy martyr Pantaleon. He was a physician, who was tried by the Emperor Maximian because he believed in Christ, and tormented on the rack, and by scorching with lamps, amid the which things he was comforted by the Lord appearing to him. At last he finished his testimony by the sword.
      - type: text
        text: Also at Nicomedia, the holy Priest Hermolaus, by whose teaching blessed Pantaleon was brought to the faith.
      - type: text
        text: Also, the holy brethren Hermippus and Hermocrates, who, after many sufferings, were put to death by Maximian for confessing Christ.
      - type: text
        text: At Nola, the holy martyrs Felix, Julia, and Jucunda.
      - type: text
        text: At Biseglia, in Apulia, the holy martyrs Maurus, Bishop [of that see,] Pantaleemon, and Sergius, who suffered under Trajan.
      - type: text
        text: On the same day are commemorated the holy martyrs whom the tyrant Dunaan caused to be burnt in Yemen, in Arabia, because they believed in Christ.
      - type: text
        text: At Cordova, in Spain, in the persecution under the Arabs, the holy martyrs George the Deacon, Felix, Aurelius, Natalia, and Liliosa.
      - type: text
        text: At Ephesus, the Seven Holy Sleepers, Maximian, Malchus, Martinian, Denis, John, Serapian, and Constantine.
      - type: text
        text: At Auxerre, [in the sixth century,] deceased the blessed Confessor Etherius, Bishop [of that see.]
      - type: text
        text: At Constantinople, the blessed Virgin Anthusa, who was scourged, under the Emperor Constantine Copronymus, for honouring the holy images, and was sent into exile, where she fell asleep in the Lord.
      la:
      - type: text
        text: Sexto Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Nicomedíæ pássio sancti Pantaleónis médici, qui, pro fide Christi, a Maximiáno Imperatóre tentus, et equúlei pœna ac lampadárum exustióne afflíctus, sed inter hæc, Dómino sibi apparénte, refrigerátus, gládii tandem ictu martýrium consummávit.
      - type: text
        text: Vigíliis, in Apúlia, sanctórum Mártyrum Mauri Epíscopi, Pantaleémonis et Sérgii; qui passi sunt sub Traiáno.
      - type: text
        text: Nicomedíæ sancti Hermolái Presbýteri, cuius doctrína beátus Pantáleon ad fidem convérsus est; itémque sanctórum Hermíppi et Hermócratis fratrum, qui, post multas pœnas sibi illátas, capitáli senténtia, ob confessiónem Christi, a Maximiáno Imperatóre puníti sunt.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Geórgii Diáconi, Aurélii et uxóris Natáliæ, Felícis et uxóris Liliósæ, in persecutióne Arábica.
      - type: text
        text: Nolæ, in Campánia, sanctórum Mártyrum Felícis, Iúliæ et Iucúndæ.
      - type: text
        text: Apud Homerítas, in Arábia, commemorátio sanctórum Mártyrum, qui, sub Dúnaan tyránno, ob Christi fidem, incéndio tráditi sunt.
      - type: text
        text: Ephesi natális sanctórum septem Dormiéntium, scílicet Maximiáni, Malchi, Martiniáni, Dionýsii, Ioánnis, Serapiónis et Constantíni.
      - type: text
        text: Romæ sancti Cælestíni Papæ Primi, qui damnávit Constantinopolitánum Epíscopum Nestórium, Pelagiúmque fugávit; cuius étiam auctoritáte universális sancta Sýnodus Ephesína advérsus eúndem Nestórium celebráta est.
      - type: text
        text: Antisiodóri deposítio beáti Æthérii, Epíscopi et Confessóris.
      - type: text
        text: Constantinópoli beátæ Anthúsæ Vírginis, quæ, sub Constantíno Coprónymo, ob cultum sanctárum Imáginum, verbéribus cæsa et exsílio relegáta, quiévit in Dómino.
  psalm.sexto-kal-ndas-dec-mbris-f5961ba784:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 26th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Fabriano, in the March of Ancona, the blessed Abbot Silvester, founder of the Congregation of Monks of the Order of St Benedict, who are called Silvestrians.
      - type: text
        text: At Alexandria, the holy martyr Peter, Pope of that city, a man enriched with all graces, who was beheaded by order of the Emperor Galerius Maximian.
      - type: text
        text: Likewise at Alexandria, in the same persecution, the holy martyrs Faustus a Priest, Didius, and Ammonius, along with whom are commemorated the Egyptian Bishops Phileas, Hesychius, Pachomius, and Theodore, and six hundred and sixty Others, who were raised to heaven by the sword of the persecutor.
      - type: text
        text: At Nicomedia, the holy Priest Marcellus, who in the time of the Emperor Constantius was thrown over a cliff by the Arians, and so died a martyr.
      - type: text
        text: At Padua, (in the year 1149,) the holy martyr Bellinus, Bishop (of that see.) At Rome, (at the end of the fourth century,) the holy Confessor Pope Siricius, very famous for his teaching, godliness, and zeal for the faith. He condemned diverse heretics and restored the discipline of the Church by healthy enactments.
      - type: text
        text: At Autun, (in the third century,) holy Amator, Bishop (of that see.) At Constance, (in the tenth century,) holy Conrad, Bishop (of that see.) In the country of Rheims, (in the seventh century,) the holy Confessor Basolus.
      - type: text
        text: At Adrianople, in Paphlagonia, the holy hermit Stylian, who was famous for miracles.
      - type: text
        text: In Armenia, (in the tenth century,) the holy monk Nicon.
      - type: text
        text: At Rome, (in the year 1751,) the holy Confessor Leonard of Port Maurice, of the Order of Friars Minor of the stricter observance, who was famous for his zeal for the salvation of souls and his holy journeys throughout Italy, and whose name the Supreme Pontiff Pius IX enrolled among those of the Saints.
      la:
      - type: text
        text: Sexto Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Apud Fabriánum, in Picéno, beáti Silvéstri Abbátis, Institutóris Congregatiónis Monachórum Silvestrinórum.
      - type: text
        text: Alexandríæ natális sancti Petri, eiúsdem urbis Epíscopi et Mártyris; qui, cum esset ómnibus virtútibus exornátus, ibídem, Galérii Maximiáni præcépto, cápite obtruncátus est.
      - type: text
        text: Passi sunt étiam Alexandríæ, in eádem persecutióne, sancti Mártyres Faustus Présbyter, Dídius et Ammónius, itémque Epíscopi quátuor Ægýptii, idest Philéas, Hesýchius, Pachómius et Theodórus, cum áliis sexcéntis sexagínta, quos persecutiónis gládius evéxit ad cælos.
      - type: text
        text: Apud villam cui nomen Fracta, in território Rhodigiénsi, sancti Bellíni, Epíscopi Patavíni et Mártyris; qui a sicáriis, cum esset Ecclésiæ iurium defénsor exímius, crudéliter impetítus ac multis illátis vulnéribus occísus est.
      - type: text
        text: Nicomedíæ sancti Marcélli Presbýteri, qui, Constántii témpore, ab Ariánis e rupe præcipitátus, Martyr occúbuit.
      - type: text
        text: Romæ sancti Sirícii, Papæ et Confessóris, doctrína, pietáte et religiónis zelo præclári, qui vários damnávit hæréticos, et discíplinam ecclesiásticam salubérrimis decrétis instaurávit.
      - type: text
        text: Augustodúni sancti Amatóris Epíscopi.
      - type: text
        text: Constántiæ, in Germánia, sancti Conrádi Epíscopi.
      - type: text
        text: Romæ sancti Leonárdi a Portu Maurítio, Sacerdótis ex Ordine Minórum et Confessóris, zelo animárum et sacris per Itáliam expeditiónibus conspícui; quem Pius Nonus, Póntifex Máximus, in Sanctórum cánonem rétulit, ac Pius Papa Undécimus cæléstem Patrónum Sacerdótum qui ad sacras populáres Missiónes in regiónibus cathólicis ubíque terrárum incúmbunt, elégit et constítuit.
      - type: text
        text: In território Rheménsi natális sancti Básoli Confessóris.
      - type: text
        text: Hadrianópoli, in Paphlagónia, sancti Styliáni Anachorétæ, miráculis clari.
      - type: text
        text: In Arménia sancti Nicónis Mónachi.
  psalm.sexto-kal-ndas-febru-rii-fb5eacc0ae:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep
      - type: text
        text: ''
      - type: text
        text: The feast of holy John, Patriarch of Constantinople, (in the years 398-407,) surnamed Chrysostom that is to say, golden mouth on account of the golden stream of his eloquence, whose word and example much profited the Church, but after many toils he ended his life in exile. Mention is made of him upon the 14th day of September, but the 27th of January is the day whereon his sacred body was brought to Constantinople under the Emperor Theodosius the younger, whence it was afterward brought to Rome, and buried in the Basilica of the Prince of the Apostles.
      - type: text
        text: At Sora, the holy martyr Julian. He was arrested in the persecution under the Emperor Antonine, and while he was being tortured, the temple of the idols fell down, whereupon he was beheaded, and so received the crown of martyrdom.
      - type: text
        text: In Africa, (in the third century,) the holy martyr Avitus.
      - type: text
        text: Likewise in Africa, the holy martyrs Datius, Reater, and their companions, who suffered in the persecution under the Vandals.
      - type: text
        text: Likewise in Africa, the holy martyrs Dativus, Julian, Vincent, and twenty-seven others.
      - type: text
        text: At Rome, (in the year 671,) holy Pope Vitalian.
      - type: text
        text: At Mans, (in the year 117,) holy Julian, the first Bishop of that city, whom holy Peter sent thither to preach the Gospel.
      - type: text
        text: At the monastery of La Val-Benois, the holy Maurus, Abbot of Val-Benois.
      - type: text
        text: At Brescia, (in the year 1540,) the holy Virgin Angela Merici, Foundress of the Society of Nuns of St. Ursula, whose first duty is to lead young maidens into the paths of the Lord. We keep her festival upon the last day of May, in accordance with an ordinance of Pius VII.
      la:
      - type: text
        text: Sexto Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis Chrysóstomi, Epíscopi Constantinopolitáni, Confessóris et Ecclésiæ Doctóris, cæléstis Oratórum sacrórum Patróni; qui décimo octávo Kaléndas Octóbris obdormívit in Dómino. Eius sacrum corpus, sub Theodósio iunióre, hac die Constantinópolim, inde póstea Romam translátum fuit, et in Basílica Príncipis Apostolórum cónditum.
      - type: text
        text: Bríxiæ natális sanctæ Angelæ Meríci Vírginis, ex tértio Ordine sancti Francísci, quæ Societátem Vírginum sanctæ Ursulæ instítuit, quarum præcípuum munus esset dirígere adolescéntulas in vias Dómini. Eius tamen festívitas Kaléndas Iúnii celebrátur.
      - type: text
        text: Apud Cenómanos, in Gállia, deposítio sancti Iuliáni, eiúsdem urbis primi Epíscopi, quem sanctus Petrus illuc ad prædicándum Evangélium misit.
      - type: text
        text: Soræ sancti Iuliáni Mártyris, qui, in persecutióne Antoníni, sub Flaviáno Prǽside, comprehénsus est, et, cum idolórum templum, dum ipse torquerétur, corruísset, martýrii corónam, truncáto cápite, accépit.
      - type: text
        text: In Africa sancti Avíti Mártyris.
      - type: text
        text: Ibídem sanctórum Mártyrum Dátii, Reátri et Sociórum, qui in persecutióne Wandálica passi sunt.
      - type: text
        text: Item sanctórum Datívi, Iuliáni, Vincéntii atque aliórum vigínti septem Mártyrum.
      - type: text
        text: Romæ sancti Vitaliáni Papæ.
      - type: text
        text: In monastério Bodacénsi, in Gállia, sancti Mauri Abbátis.
  psalm.sexto-kal-ndas-i-lii-cb48469b16:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 26th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Celian Mount, the holy brethren John and Paul, both martyrs. John was provost of the household, and Paul chief steward of the Virgin Constantia, daughter of the Emperor Constantine. Under the Emperor Julian the Apostate they both received the palm of martyrdom by the sword.
      - type: text
        text: At Trent, [about the year 400,] the holy Vigilius, Bishop [of that see,] who, because he was striving to stamp out utterly the last remains of idolatry, was stoned by savage men, and so compassed martyrdom for Christ's Name's sake.
      - type: text
        text: At Cordova, in Spain, [in the tenth century,] the holy child Pelagius, who crowned his confession of the faith with a glorious martyrdom, by being torn to pieces with iron pincers, by order of Abdu'l-Rahman, King of the Saracens.
      - type: text
        text: At Valenciennes, [at the beginning of the ninth century,] the holy martyrs Salvius, Bishop of Angoulême, and Superius. Also the commemoration of the holy Anthelm, Bishop of Bellay, [in the year 1178.]
      - type: text
        text: At Poitou, [in the sixth century,] the holy Priest and Confessor Maxentius, who was famous for miracles.
      - type: text
        text: At Thessalonica, [likewise in the sixth century,] the holy Hermit David.
      - type: text
        text: On the same day, [in the sixth century also,] the holy Virgin Perseveranda.
      la:
      - type: text
        text: Sexto Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Romæ, in monte Cǽlio, sanctórum Mártyrum Ioánnis et Pauli fratrum, quorum primus erat præpósitus domus, secúndus primicérius Constántiæ Vírginis, fíliæ Constantíni Imperatóris, et ambo póstea, sub Iuliáno Apóstata, martýrii palmam, cædénte gládio, percepérunt.
      - type: text
        text: Apud Tridéntum sancti Vigílii Epíscopi, qui, cum relíquias idololatríæ pénitus exstirpáre conarétur, ídeo, pro Christi nómine, a feris et bárbaris homínibus percússus lápidum imbre, martýrium implévit.
      - type: text
        text: Apud Valencénas, in Gállia, pássio sanctórum Mártyrum Sálvii, qui éxstitit Engolisménsis Epíscopus, et Supérii.
      - type: text
        text: Córdubæ, in Hispánia, natális sancti Pelágii adolescéntuli, qui, ob confessiónem fídei, Regis Saracenórum Abdaraméni iussu forcípibus férreis membrátim præcísus, martýrium suum glorióse consummávit.
      - type: text
        text: Bellícii, in Gállia, sancti Anthélmi, qui ex maióris Carthúsiæ Prióre, factus est eiúsdem civitátis Epíscopus.
      - type: text
        text: In pago Pictaviénsi sancti Maxéntii, Presbýteri et Confessóris; qui miráculis cláruit.
      - type: text
        text: Thessalonícæ sancti David Eremítæ.
      - type: text
        text: Eódem die sanctæ Perseverándæ Vírginis.
  psalm.sexto-kal-ndas-i-nii-0beaef5505:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of holy Bede the Venerable, Confessor and Doctor of the Church, very famous for his holiness and learning.
      - type: citation
        text: 'Upon the same 27th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy martyr Pope John I, who was sent for to Ravenna by Theodoric, the Arian King of Italy, and there cast into prison on account of his orthodox faith, where he suffered long, and at length died.
      - type: text
        text: At Dorostorum, in Bulgaria, the blessed Julius, a retired Roman soldier, who was arrested in the time of the Emperor Alexander Severus, and brought before the President Maximus, in whose presence he denounced the idols, and steadfastly confessed the Name of Christ, and so was put to death.
      - type: text
        text: At Sora, the holy Virgin and martyr Restituta. She fought the fight of faith under the Emperor Aurelian and the pro-Consul Agathius. She conquered the attacks of devils, the cajolery of her kinsfolk, and the cruelty of the tormentors. At last she was beheaded, along with other Christians, and so received the crown of martyrdom.
      - type: text
        text: '[At Thelus,] in Artois, [in the seventh century,] the holy martyr Ranulph.'
      - type: text
        text: At Orange, in Gaul, [in the first century,] holy Eutropius, Bishop [of that see,] famous for his graces and wondrous works.
      la:
      - type: text
        text: Sexto Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Sancti Bedæ Venerábilis, Presbýteri, Confessóris et Ecclésiæ Doctóris; qui migrávit in cælum octávo Kaléndas Iúnii.
      - type: text
        text: Sancti Ioánnis Primi, Papæ et Mártyris; cuius dies natális quintodécimo Kaléndas Iúnii refértur, sed festívitas hac die, ob Translatiónem córporis eius, potíssimum celebrátur.
      - type: text
        text: Doróstori, in Mýsia inferióre, pássio beáti Iúlii, qui, témpore Alexándri Imperatóris, cum esset veteránus et eméritæ milítiæ, comprehénsus est ab officiálibus, et Máximo Prǽsidi oblátus; quo præsénte, cum exsecrarétur idóla, et Christi nomen constantíssime confiterétur, capitáli senténtia punítus est.
      - type: text
        text: In pago Atrebaténsi sancti Ranúlfi Mártyris.
      - type: text
        text: Apud Soram sanctæ Restitútæ, Vírginis et Mártyris; quæ, sub Aureliáno Imperatóre et Agáthio Procónsule, fídei certámine suscépto, dǽmonum ímpetus, paréntum blandítias et tortórum sævítiam superávit, ac demum, cum áliis Christiánis, cápite truncáta, martýrio decoráta est.
      - type: text
        text: Aráusicæ, in Gálliis, sancti Eutrópii Epíscopi, virtútibus atque miráculis illústris.
      - type: text
        text: Herbípoli, in Germánia, sancti Brunónis, Epíscopi et Confessóris.
  psalm.sexto-kal-ndas-ianu-rii-ebab18a481:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 27th day of December were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Ephesus, the holy Apostle and Evangelist John. After the writing of his Gospel after his return from exile, and after the Revelation which God gave unto him, he lived on until the time of the Emperor Trajan, and founded and governed the churches of all Asia. He died of old age in the sixty-eighth year after the death of Christ (about the year 101), and was buried hard by the city of Ephesus.
      - type: text
        text: At Alexandria, holy Maximus, Pope of that See, who was eminently worthy to be called a confessor (in the year 282).
      - type: text
        text: At Constantinople the holy brethren Theodore (Grapt) and Theophanes. They were bred up from their childhood in the monastery of St. Saba, and afterwards stoutly contended for the honouring of holy images against the Emperor Leo the Armenian, for the which he caused them to be beaten and sent into exile, and after his death they still stoutly withstood the Emperor Theophilus, who was held captive by the same ungodliness, for the which he also caused them to be again beaten and driven into exile. Theodore died in prison, but Theophanes, after that peace was given back to the Church, was made Bishop of Nice, and fell asleep in peace in the Lord (ninth century).
      - type: text
        text: Likewise, at Constantinople, the holy virgin Niceras, who was eminent for her holiness, in the time of the Emperor Arcadius (about the year 440).
      la:
      - type: text
        text: Sexto Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Apud Ephesum natális sancti Ioánnis, Apóstoli et Evangelístæ, qui, post Evangélii scriptiónem, post exsílii relegatiónem et Apocalýpsim divínam, usque ad Traiáni Príncipis témpora persevérans, totíus Asiæ fundávit rexítque Ecclésias, ac tandem, conféctus sénio, sexagésimo octávo post passiónem Dómini anno mórtuus est, et iuxta eándem urbem sepúltus.
      - type: text
        text: Constantinópoli sanctórum Confessórum Theodóri et Theóphanis fratrum, qui, a puerítia in Palæstinénsi sancti Sabbæ monastério nutríti, cum póstea pro sanctárum Imáginum cultu advérsus Leónem Arménum strénue decertárent, eius iussu verbéribus affécti sunt et exsílio relegáti. Sed, eódem Leóne mórtuo, rursus Theóphilo Imperatóri, qui eádem impietáte detinebátur, constánter resisténtes, verbéribus íterum cæsi et in exsílium pulsi sunt, ubi Theodórus in cárcere exspirávit. Theóphanes vero, pace demum Ecclésiæ réddita, factus est Nicǽnæ civitátis Epíscopus, et confessiónis glória præclárus quiévit in Dómino.
      - type: text
        text: Alexandríæ sancti Máximi Epíscopi, qui satis clarus et insígnis título confessiónis efféctus est.
      - type: text
        text: Constantinópoli sanctæ Nicáretes Vírginis, quæ, sub Arcádio Imperatóre, cláruit sanctitáte.
  psalm.sexto-kal-ndas-m-rtii-e74ac63054:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the eve of the holy Apostle Matthias.
      la:
      - type: text
        text: Sexto Kaléndas Mártii
  psalm.sexto-kal-ndas-m-rtii-fa78fbb563:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 24th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Judea, the holy Apostle Matthias, who was chosen by the Apostles right after the Ascension of the Lord to take the place of the traitor Judas, and who suffered martyrdom for preaching the Gospel.
      - type: text
        text: At Rome, the holy martyr Primitiva.
      - type: text
        text: At Caesarea, in Cappadocia, [in the year 304,] the holy martyr Sergius, whose acts are held most famous.
      - type: text
        text: In Africa, [in the year 259,] the holy martyrs Montanus, Lucius, Julian, Victoricus, Flavian, and their Companions, who were disciples of holy Cyprian, and finished their testimony under the Emperor Valerian.
      - type: text
        text: At Rouen, [in the year 588,] the holy martyr Pretextatus, Bishop of that see.
      - type: text
        text: At Trier, [about the year 499] the holy Confessor Modestus, Bishop of that see.
      - type: text
        text: In England, [in the year 616,] holy Ethelbert, King of Kent, whom holy Augustine, first Archbishop of Canterbury, converted to the faith of Christ, and whose feast we keep upon the 26th (27th) day of this present month of February.
      - type: text
        text: At Jerusalem is commemorated the first finding, [in the fourth century,] of the Head of the Lord's forerunner.
      la:
      - type: text
        text: Sexto Kaléndas Mártii
      - type: rubric
        text: 24 aut 25 in anno Bissextili.
      - type: text
        text: In Iudǽa natális sancti Matthíæ Apóstoli, qui, post Ascensiónem Dómini ab Apóstolis in Iudæ proditóris locum sorte eléctus, pro Evangélii prædicatióne martýrium passus est.
      - type: text
        text: Romæ sanctæ Primitívæ Mártyris.
      - type: text
        text: Rotómagi pássio sancti Prætextáti, Epíscopi et Mártyris.
      - type: text
        text: Cæsaréæ, in Cappadócia, sancti Sérgii Mártyris, cuius gesta præclára habéntur.
      - type: text
        text: In Africa sanctórum Mártyrum Montáni, Lúcii, Iuliáni, Victórici, Flaviáni et Sociórum, qui discípuli fuérunt sancti Cypriáni, et, sub Valeriáno Imperatóre, martýrium consummárunt.
      - type: text
        text: Tréviris sancti Modésti, Epíscopi et Confessóris.
      - type: text
        text: Apud Stylum, in Calábria, sancti Ioánnis, cognoménto Therésti, monásticæ vitæ laude et sanctitáte insígnis,
      - type: text
        text: In Anglia sancti Edilbérti, Regis Cantiórum, quem sanctus Augustínus, Anglórum Epíscopus, ad Christi fidem convértit.
      - type: text
        text: Hierosólymis prima Invéntio cápitis sancti Ioánnis Baptístæ Præcursóris Dómini.
  psalm.sexto-kal-ndas-maii-f92fb71f9d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 26th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the blessed Pope Cletus. He was the second who ruled the Church after the Apostle Peter, and was crowned with martyrdom in the persecution under the Emperor Domitian.
      - type: text
        text: There also the holy martyr Pope Marcellinus, who was beheaded for Christ's faith's sake, in the persecution under the Emperor Maximian, along with Claudius, Cyrinus, and Antonine, at the time when the persecution was so great that seventeen thousand Christians were crowned with martyrdom within the space of one month.
      - type: text
        text: At Amasea, in Pontus, [about the year 322,] the holy martyr Basil, Bishop of that see, who gained an illustrious martyrdom under the Emperor Licinius. His body was cast into the sea, but was found by Elpidiphorus on the warning of an angel and was honourably buried.
      - type: text
        text: At Braga, in Portugal, [in the first century,] the holy martyr Peter, first Bishop of that city.
      - type: text
        text: At Vienne, the holy Confessor Clarence, Bishop of that see, [about the year 620.]
      - type: text
        text: At Verona, holy Lucidius, Bishop of that see.
      - type: text
        text: In the monastery of Centule, [in the seventh century,] the holy Confessor, the Priest Requier.
      - type: text
        text: At Troyes, the holy virgin Exuperantia, [in the year 380.]
      la:
      - type: text
        text: Sexto Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Romæ natális beáti Cleti, Papæ et Mártyris; qui, secúndus post Apóstolum Petrum, rexit Ecclésiam, et martýrio in persecutióne Domitiáni coronátus est.
      - type: text
        text: Sancti Marcellíni, Papæ et Mártyris, cuius dies natális octávo Kaléndas Novémbris recensétur.
      - type: text
        text: Amaséæ, in Ponto, sancti Basiléi, Epíscopi et Mártyris, qui, sub Licínio Imperatóre, illústre martýrium consummávit. Ipsíus autem corpus, in mare proiéctum, et ab Elpidíphoro, Angeli mónitu repértum, honorífice tumulátum fuit.
      - type: text
        text: Brácari, in Lusitánia, sancti Petri Mártyris, qui fuit primus eiúsdem civitátis Epíscopus.
      - type: text
        text: Viénnæ, in Gállia, sancti Claréntii, Epíscopi et Confessóris.
      - type: text
        text: Verónæ sancti Lucídii Epíscopi.
      - type: text
        text: In monastério Céntula, in Gállia, sancti Richárii, Presbýteri et Confessóris.
      - type: text
        text: Trecis, in Gállia, sanctæ Exsuperántiæ Vírginis.
  psalm.sexto-kal-ndas-nov-mbris-6c6e4cd272:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the eve of the holy Apostles Simon and Jude.
      - type: citation
        text: 'Upon the same 27th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Avila, in Spain, the holy martyrs Vincent, Sabina, and Christeta, who were first racked until all their joints were loosened, then stones were put upon their heads which were beaten with heavy logs of wood, until their brains were burst, and so they finished their testimony under the (Emperor Diocletian and the) President Dacian.
      - type: text
        text: At Thil-Chateau, (in Burgundy, in the third century,) the holy martyr Florence.
      - type: text
        text: In Cappadocia, the holy martyrs Capitolina and Erotheis her handmaiden, who suffered under the Emperor Diocletian.
      - type: text
        text: In Ethiopia, holy Frumentius, first Bishop of that country, who was first a captive there, then was ordained Bishop by holy Athanasius, and spread the Gospel in that country.
      - type: text
        text: Likewise in Ethiopia, the holy King Elesbaan, who, after he had overcome the enemies of Christ in the time of the Emperor Justin, sent his kingly crown to Jerusalem, and made himself a monk in fulfilment of a vow, and so lived until he passed away hence to be ever with the Lord.
      la:
      - type: text
        text: Sexto Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Abulæ, in Hispánia, pássio sanctórum Vincéntii, Sabínæ et Christétæ. Hi primum in equúleo ádeo sunt exténti, ut omnes membrórum compáges laxaréntur; deínde cápita eórum, lapídibus superpósita, usque ad cérebri excussiónem válidis véctibus sunt contúsa, atque ita ipsi martýrium complevérunt, sub Prǽside Daciáno.
      - type: text
        text: Apud castrum Tyle, in Gállia, sancti Floréntii Mártyris.
      - type: text
        text: In Cappadócia sanctárum Mártyrum Capitolínæ, eiúsque ancíllæ Erothéidis, quæ sub Diocletiáno sunt passæ.
      - type: text
        text: Apud Indos sancti Fruméntii Epíscopi, qui, primum ibi captívus, deínde, Epíscopus a sancto Athanásio ordinátus, Evangélium in ea província propagávit.
      - type: text
        text: Neápoli, in Campánia, sancti Gaudiósi, Epíscopi Africáni, qui ob Wandalórum persecutiónem venit in Campániam, et, in monastério apud eam urbem, sancto fine quiévit.
      - type: text
        text: In Æthiópia sancti Elésbaan Regis, qui, Christi hóstibus expugnátis, ac, témpore Iustíni Imperatóris, misso regio diadémate Hierosólymam, monásticam vitam, ut vóverat, agens, migrávit ad Dóminum.
  psalm.sexto-kal-ndas-oct-bris-8644f8de6f:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the morrow we keep the feast of holy Theodore, Archbishop of Canterbury, who was sent into England by Pope Vitalian, and was a burning and a shining light for teaching and holiness of whom mention is made upon the 19th day of this present month of September.
      - type: citation
        text: 'Upon the same 26th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, the holy martyrs Cyprian and Justina the Virgin. Justina suffered much for Christ's sake under Diocletian the Emperor and Eutholmius the President, and she converted to Christ the warlock Cyprian, who had sought by his magical arts to put her out of her mind, but along with whom she afterwards suffered martyrdom. Their bodies were cast out to be eaten by beasts, but certain Christian sailors took them by night and brought them to Rome, and they were afterwards taken to the church of the Most Holy Saviour, founded by the Emperor Constantine, where they are buried hard by the Baptistery.
      - type: text
        text: At Rome, the holy martyrs Callistratus and forty-nine others, all soldiers. In the persecution under the Emperor Diocletian, Callistratus was sewn up in a leathern sack and cast into the sea, and when, by the help of God, he escaped unharmed, the others were converted to Christ and suffered martyrdom along with him.
      - type: text
        text: Likewise at Rome, (in the year 310,) the holy Confessor Pope Eusebius.
      - type: text
        text: At Bologna, (in the fifth century,) the holy Confessor Eusebius, Bishop (of that see.)
      - type: text
        text: At Brescia, (in the sixth century,) holy Vigilius, Bishop (of that see.)
      - type: text
        text: At Albano, holy Senator.
      - type: text
        text: In the country of Frascati, (at the beginning of the eleventh century,) the blessed Abbot Nilus, a man of great holiness, Founder of the Monastery of Grotta-Ferrata, (of the Italian Congregation of the Order of St. Basil.)
      - type: text
        text: At Citta di Castello, the holy Priest Amantius, famous for the grace of working miracles.
      la:
      - type: text
        text: Sexto Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Nicomedíæ natális sanctórum Mártyrum Cypriáni, et Iustinæ Vírginis. Hæc, sub Diocletiáno Imperatóre et Eutólmio Prǽside, cum multa pro Christo pertulísset, ipsum quoque Cypriánum, qui erat magus et suis mágicis ártibus eam dementáre conabátur, ad Christiánam fidem convértit; cum quo póstea martýrium sumpsit. Eórum córpora, feris obiécta, rapuérunt noctu quidam nautæ Christiáni, et Romam detulérunt; quæ, póstmodum in Basílicam Constantiniánam transláta, prope Baptistérium cóndita sunt.
      - type: text
        text: Romæ sancti Callístrati Mártyris, et aliórum quadragínta novem mílitum; qui mílites, in persecutióne Diocletiáni Imperatóris, cum Callistrátus, insútus cúleo et in mare demérsus, divína ope evasísset incólumis, ad Christiánam religiónem convérsi sunt, et cum eo páriter martýrium subiérunt.
      - type: text
        text: Bonónia; sancti Eusébii, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Vigílii Epíscopi.
      - type: text
        text: In agro Tusculáno beáti Nili Abbátis, qui fundátor monastérii Cryptæ Ferrátæ ac vir magnæ sanctitátis éxstitit.
      - type: text
        text: Tiférni, in Umbria, sancti Amántii Presbýteri, virtúte miraculórum illústris.
      - type: text
        text: Albáni sancti Senatóris.
  psalm.sexto-kal-ndas-sept-mbris-6e16aeb50a:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 27th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 1648,] the holy Confessor Joseph, famous for the innocency of his life and for his miracles, who founded the Order of Poor Regular Clerks of the Mother of God of the Pious Schools, for the teaching of godliness and good learning unto children.
      - type: text
        text: At Capua, [towards the end of the first century,] the holy martyr Rufus, Bishop [of that see.] A man of Patrician family, who was baptized along with all his house by blessed Apollinaris, the disciple of holy Peter.
      - type: text
        text: Likewise at Capua, the holy martyrs Rufus and Carpophorus, who suffered under the Emperors Diocletian and Maximian.
      - type: text
        text: At Tomi, [about the year 303,] in Pontus, the holy martyrs Marcellinus the Tribune, Mannea his wife, and their sons, John, Serapion, and Peter.
      - type: text
        text: At Lentini, in Sicily, [about the year 256,] the holy Virgin Euthalia, who was slain by her own brother Sermilian with the sword, because she was a Christian, and so passed away to Christ the Bridegroom.
      - type: text
        text: On the same day holy Anthusa the younger received martyrdom by being drowned in a well for Christ's faith's sake.
      - type: text
        text: At Bergamo, [about the year 75,] holy Narnus, who was baptized by blessed Barnabas, and was ordained by him to be the first Bishop of that city.
      - type: text
        text: At Arles, [in the year 542,] holy Caesarius, Bishop of that city, a man of marvellous holiness and godliness.
      - type: text
        text: At Autun, [about the year 600,] the holy Confessor Syagrius, Bishop [of that see.]
      - type: text
        text: At Pavia, [in the year 813,] holy John, Bishop [of that see.]
      - type: text
        text: At Lerida, in Spain, holy Licerius, Bishop [of that see.]
      - type: text
        text: In the Thebaid, [about the year 450,] the holy Hermit Poemon [or Pastor, Abbot of Scete.]
      - type: text
        text: At San Severino, in the March of Ancona, [in the year 1396,] the holy widow Margaret.
      la:
      - type: text
        text: Sexto Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Ioséphi Calasánctii, Presbýteri et Confessóris, qui Ordinis Clericórum Regulárium Páuperum Matris Dei Scholárum Piárum éxstitit Fundátor, atque octávo Kaléndas Septémbris obdormívit in Dómino.
      - type: text
        text: Poténtiæ, in Lucánia, pássio sanctórum Aróntii, Honoráti, Fortunáti et Sabiniáni; qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, iussi sunt capitálem subíre senténtiam. Eórum tamen ac reliquórum ex duódecim frátribus festum Kaléndis Septémbris celebrátur.
      - type: text
        text: Bérgomi sancti Narni, qui, a beáto Bárnaba baptizátus, primus ab ipso eiúsdem civitátis Epíscopus ordinátus est.
      - type: text
        text: Cápuæ natális sancti Rufi, Epíscopi et Mártyris; qui, cum esset patríciæ dignitátis, a beáto Apollináre, sancti Petri discípulo, cum univérsa família baptizátus est.
      - type: text
        text: Ibídem sanctórum Mártyrum Rufi et Carpóphori, qui sub Diocletiáno et Maximiáno passi sunt.
      - type: text
        text: Tomis, in Ponto, sanctórum Mártyrum Marcellíni Tribúni, et uxóris Mannéæ, ac filiórum Ioánnis, Serapiónis et Petri.
      - type: text
        text: Apud Leontínos, in Sicília, sanctæ Euthalíæ Vírginis, quæ, cum esset Christiána, ad cæléstem Sponsum, a fratre suo Sermiliáno cæsa gládio, migrávit.
      - type: text
        text: Eódem die pássio sanctæ Anthúsæ iunióris, quæ ob Christi fidem, in púteum mersa, martýrium sumpsit.
      - type: text
        text: Areláte, in Gállia, sancti Cæsárii Epíscopi, miræ sanctitátis et pietátis viri.
      - type: text
        text: Augustodúni sancti Syágrii, Epíscopi et Confessóris.
      - type: text
        text: Papíæ sancti Ioánnis Epíscopi.
      - type: text
        text: Ilérdæ, in Hispánia Tarraconénsi, sancti Licérii Epíscopi.
      - type: text
        text: In Thebáide sancti Póemenis Anachorétæ.
      - type: text
        text: Apud Septempedános, in Picéno, sanctæ Margarítæ Víduæ.
  psalm.sexto-nonas-i-lii-dc478fb14b:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the visit of the Blessed Virgin Mary to Elizabeth.
      - type: citation
        text: 'On the same 2nd day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Aurelian Way, the holy martyrs Processus and Martinian, who were baptized by the blessed Apostle Peter in the Mamertine Prison, and crowned with martyrdom under Nero by being slain with the sword, after suffering the beating of their mouths, the rack, thongs, cudgels, fire, and loaded whips.
      - type: text
        text: At Rome also, the three holy soldiers who turned to Christ at the martyrdom of the blessed Apostle Paul, and thus earned a share with him in the glory of heaven.
      - type: text
        text: On the same day, the holy martyrs Ariston, Crescentian, Eutychian, Urban, Vitalis, Justus, Felicissimus, Felix, Marcia, and Symphorosa, who were all crowned with martyrdom in the Campania while the persecution was raging under the Emperor Diocletian.
      - type: text
        text: At Winchester, in England, the holy Swithin, Bishop of that city, [in the year 863,] whose holiness shone forth in the grace of working miracles, and whose feast day we keep upon the 15th day of this present month of July. [His head was taken to the cathedral of Évreux at the end of the fourteenth century.]
      - type: text
        text: At Bamberg, [in Bavaria,] holy Otto, Bishop of [that see,] who preached the Gospel to the Pomeranians, and turned them to the faith, [in the year 1139.]
      - type: text
        text: At Tours, the holy woman Monegund, [about the year 573]
      la:
      - type: text
        text: Sexto Nonas Iúlii
      - type: text
        text: ''
      - type: text
        text: Visitátio beátæ Maríæ Vírginis ad Elísabeth.
      - type: text
        text: Romæ, via Aurélia, natális sanctórum Mártyrum Procéssi et Martiniáni, qui, a beáto Petro Apóstolo in Mamertíni custódia baptizáti, et, sub Neróne, oris contusiónem, equúleum, nervos, fustes, flammas scorpionésque perpéssi, novíssime, gládio percússi, martýrio coronáti sunt.
      - type: text
        text: Item Romæ pássio sanctórum trium mílitum, qui, ad Christum convérsi in martýrio beáti Pauli Apóstoli, cum eo partícipes fieri cæléstis glóriæ meruérunt.
      - type: text
        text: Eódem die sanctórum Mártyrum Aristónis, Crescentiáni, Eutychiáni, Urbáni, Vitális, Iusti, Felicíssimi, Felícis, Márciæ et Symphorósæ; qui omnes apud Campániam, cum Diocletiáni Imperatóris persecútio desævíret, martýrio coronáti sunt.
      - type: text
        text: Wintóniæ, in Anglia, sancti Swithúni Epíscopi, cuius sánctitas miráculis effúlsit.
      - type: text
        text: Bambérgæ sancti Othónis Epíscopi, qui Pomeránis Evangélium prædicávit, et eos ad fidem convértit.
      - type: text
        text: Lýciis, in Apúlia, sancti Bernardíni Realíno, Confessóris, qui magistrátus múnere egrégie functus, Societátem Iesu ingréssus et sacerdótio auctus, caritáte ac miráculis incláruit.
      - type: text
        text: Turónis, in Gállia, deposítio sanctæ Monegúndis, religiósæ féminæ.
  psalm.sexto-nonas-m-rtii-9e015b49c6:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 2nd day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, [about the year 672,] holy Chad, Bishop of the Mercians and of Lindisfarne, whose eminent graces are recorded by Bede. [His body was buried at Lichfield, first in the Church of Our Lady, second in the Church of St. Peter, and thirdly in the Cathedral dedicated to Our Lady and St. Chad. The town was named Lichfield on account of the number martyred and buried there under Maximian Hercules.]
      - type: text
        text: At Rome, upon the Latin Way, [about the year 258,] under the Emperors Valerian and Gallienus, the holy martyrs Jovinus and Basileus.
      - type: text
        text: Likewise at Rome, under the Emperor Alexander and the Prefect Ulpian, many holy martyrs, who were long tortured, and at length put to death.
      - type: text
        text: At Porto, the holy martyrs Paul, Heraclius, Secundilla, and Januaria.
      - type: text
        text: At Caesarea, in Cappadocia, the holy martyrs Lucius the Bishop, Absolom, Lorgius.
      - type: text
        text: In Campania are commemorated eighty holy martyrs, who would not eat meat sacrificed unto idols, nor adore a she-goat's head, and therefore, [about the year 629,] were cruelly slain by the Lombards.
      - type: text
        text: At Rome, [about the year 483,] the holy Confessor Pope Simplicius.
      la:
      - type: text
        text: Sexto Nonas Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Latína, sanctórum Mártyrum Iovíni et Basiléi, qui passi sunt sub Valeriáno et Galliéno Imperatóribus.
      - type: text
        text: Item Romæ plurimórum sanctórum Mártyrum, qui sub Alexándro Imperatóre et Ulpiáno Præfécto, diu cruciáti, ad extrémum capitáli senténtia damnáti sunt.
      - type: text
        text: Cæsaréæ, in Cappadócia, sanctórum Mártyrum Lúcii Epíscopi, Absalónis et Lórgii.
      - type: text
        text: In Portu Románo sanctórum Mártyrum Pauli, Heráclii, Secundíllæ et Ianuáriæ.
      - type: text
        text: In Campánia commemorátio sanctórum octogínta Mártyrum, qui, cum nollent carnes immolátas comédere nec caput capræ adoráre, a Longobárdis sævíssime cæsi sunt.
      - type: text
        text: Lichféldiæ, in Anglia, sancti Ceáddæ, Epíscopi Merciórum et Lindisfarnórum, cuius præcláras virtútes sanctus Beda Venerábilis commémorat.
  psalm.sexto-nonas-maii-68ff9f8a7e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 2nd day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Alexandria, in the year 373, holy Athanasius, Pope of that city, most illustrious for his holiness and teaching. Nearly the whole world leagued itself together to persecute him for the Catholic Faith. He fought right stoutly against Emperors, Presidents, and Arian Bishops without number, from the time of the Emperor Constantine until that of the Emperor Valens. To escape their plots he became an outcast upon the face of the wide world, and there was nowhere left where he could hide himself in safety. He returned at last to his own church, and after many contendings and many crowns of long-suffering he passed away to be ever with the Lord, in the 46th year of his priesthood, in the time of the Emperors Valentinian and Valens.
      - type: text
        text: At Rome, the holy martyrs Saturninus, Neopolus, German, and Celestine, who suffered many things, and were at last cast into prison, where they slept in the Lord.
      - type: text
        text: Likewise the holy martyrs Exuperius and Zoe his wife, their children Cyriacus and Theodulus, who suffered under the Emperor Hadrian.
      - type: text
        text: At Seville, the holy martyr the Deacon Felix.
      - type: text
        text: Upon the same day, [in the year 489,] the holy martyr Vindemial.
      la:
      - type: text
        text: Sexto Nonas Maii
      - type: text
        text: ''
      - type: text
        text: Alexandríæ natális sancti Athanásii, eiúsdem urbis Epíscopi, Confessóris et Ecclésiæ Doctóris, sanctitáte et doctrína claríssimi; in cuius persecutiónem univérsus fere Orbis coniuráverat. Ipse tamen cathólicam fidem, a témpore Constantíni usque ad Valéntem, advérsus Imperatóres ac Prǽsides et innúmeros Epíscopos Ariános strénue propugnávit; a quibus plúrimas perpéssus insídias, prófugus toto Orbe actus est, nec ullus ei tutus ad laténdum supérerat locus. Tandem, ad suam Ecclésiam revérsus, illic, post multos agónes multásque patiéntiæ corónas, quadragésimo sexto sui sacerdótii anno migrávit ad Dóminum, témpore Valentiniáni et Valéntis Imperatórum.
      - type: text
        text: Floréntiæ item natális sancti Antoníni, ex Ordine Prædicatórum, Epíscopi et Confessóris, doctrína et sanctitáte célebris. Ipsíus autem festívitas sexto Idus mensis huius recólitur.
      - type: text
        text: Romæ sanctórum Mártyrum Saturníni, Neópoli, Germáni et Cælestíni, qui, multa passi, in cárcerem demum coniécti, ibi in Dómino quievérunt.
      - type: text
        text: Eódem die sancti Vindemiális, Epíscopi et Mártyris, qui, una cum sanctis Epíscopis Eugénio et Longíno doctrína et miráculis advérsus Ariános decértans, a Rege Wandalórum Hunneríco iubétur váriis torméntis afflígi ac tandem cápite obtruncári.
      - type: text
        text: Híspali, in Hispánia, sancti Felícis, Diáconi et Mártyris.
      - type: text
        text: Attalíæ, in Pamphýlia, sanctórum Mártyrum Exsupérii, et Zoës uxóris, atque Cyríaci et Theodúli filiórum; qui, sub Hadriáno Imperatóre, cum servi essent cuiúsdam viri Pagáni, omnes, ipso hero iubénte, ob líberam Christiánæ fídei professiónem, primum verberáti sunt ac veheménter torti, deínde, in accénsum clíbanum iniécti, ánimas suas Deo tradidérunt.
  psalm.sexto-nonas-oct-bris-9fa15a2a73:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the feast of the Holy Guardian Angels.
      - type: citation
        text: 'Upon the same 2nd day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, the holy soldier Eleutherius, and an unnumbered multitude of others, all martyrs.
      - type: text
        text: When the palace of the Emperor Diocletian was burnt, they were falsely accused of the crime of setting it on fire and by the command of that most cruel Emperor they were slaughtered in crowds some were slain with the sword, some were burnt in the fire, and some were cast into the sea. But the first of them was Eleutherius, who was long tortured, but at every new torment seemed to grow more steadfast, like gold tried in the fire, and crowned his testimony with victory.
      - type: text
        text: In the country of Arras, the blessed Leodegar, Bishop of Autun, (in the year 678,) who was murdered by Ebroin, mayor of the palace to King Theodoric, after he had laid upon him diverse insults and sufferings for the truth's sake.
      - type: text
        text: Likewise the holy martyr Gerin, brother of the said blessed Leodegar, who was stoned to death at the same place.
      - type: text
        text: At Antioch, the holy martyrs Primus, Cyril, and Secondarius.
      - type: text
        text: At Constantinople, the holy Monk Theophilus, who was cruelly scourged and sent into exile, under the Emperor Leo the Isaurian, for defending holy images, and passed away to be ever with the Lord.
      - type: text
        text: At Hereford, in England, the holy Confessor Thomas, Bishop of that see, whose feast we keep upon the 3rd day of this present month of October.
      la:
      - type: text
        text: Sexto Nonas Octóbris
      - type: text
        text: ''
      - type: text
        text: Festum sanctórum Angelórum Custodum.
      - type: text
        text: Romæ pássio sancti Modésti Sardi, Levítæ et Mártyris; qui, sub Diocletiáno Imperatóre, equúleo tortus atque igne adústus est. Ipsíus vero corpus, Benevéntum póstea translátum, in Ecclésia suo insigníta nómine collocátum fuit.
      - type: text
        text: In território Atrebaténsi item pássio beáti Leodegárii, Augustodunénsis Epíscopi; quem, váriis iniúriis et divérsis supplíciis pro veritáte afflíctum, Ebroínus, Maior domus régiæ Theodoríci, intérfici iussit.
      - type: text
        text: Nicomedíæ sancti Eleuthérii, mílitis et Mártyris, cum áliis innúmeris; qui, cum Diocletiáni regia incéndio conflagrásset et falso huius críminis essent accusáti, omnes, iubénte eódem sævíssimo Imperatóre, acervátim necáti sunt. Horum porro álii gládiis obtruncabántur, álii cremabántur ígnibus, álii in mare præcipitabántur; sed inter eos primus Eleuthérius, cum per singula torménta, diu cruciátus, valídior redderétur, martýrium victóriæ suæ, ígnibus velut aurum examinátus, complévit.
      - type: text
        text: Antiochíæ sanctórum Mártyrum Primi, Cyrílli et Secundárii.
      - type: text
        text: Eódem die sancti Geríni Mártyris, qui frater éxstitit beáti Leodegárii, Augustodunénsis Epíscopi, et, iubénte ipso Ebroíno, lapídibus óbrutus est.
      - type: text
        text: Constantinópoli sancti Theóphili Mónachi, qui, pro defensióne sanctárum Imáginum a Leóne Isáurico sævíssime cæsus et in exsílium pulsus, migrávit ad Dóminum.
  psalm.sextod-cimo-kal-ndas-apr-lis-6adbc1ea64:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 17th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Ireland, the holy Confessor Patrick, Bishop [of Armagh,] the first who there preached the Gospel of Christ, and who was famous for great miracles and works of power, [in the year 464.]
      - type: text
        text: At Jerusalem, holy Joseph of Arimathea, the honourable councillor, the disciple of the Lord, who took down His Body from the cross and laid it in his own new tomb.
      - type: text
        text: At Rome, the holy martyrs Alexander and Theodore.
      - type: text
        text: At Alexandria are commemorated many holy martyrs, who were seized by the worshippers of Serapis, and because they would not worship that idol were cruelly murdered by them, in the time of the Emperor Theodosius, who presently afterward sent a rescript to destroy the temple of Serapis.
      - type: text
        text: At Constantinople, the holy martyr Paul, who was burnt under the Emperor Constantine Copronymus for defending the honouring of holy images.
      - type: text
        text: At Chalons [-sur-Saône,] in Gaul, holy Agricola, Bishop of that see, [in the year 580.]
      - type: text
        text: At Nivelles, in Brabant, the holy Virgin Gertrude, the daughter of an illustrious race, who despised this world, and busied herself all her life in holy deeds, so that she won to be espoused to Christ in heaven, [in the year 659.]
      la:
      - type: text
        text: Sextodécimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Apud civitátem Dunum, in Hibérnia, natális sancti Patrícii, Epíscopi et Confessóris, qui primus in ea ínsula Christum evangelizávit, et máximis miráculis et virtútibus cláruit.
      - type: text
        text: Hierosólymis sancti Ioseph ab Arimathǽa, qui nóbilis Decúrio et discípulus Dómini éxstitit; atque ipsíus Dómini corpus, de cruce depósitum, in monuménto suo novo sepelívit.
      - type: text
        text: Romæ sanctórum Alexándri et Theodóri Mártyrum.
      - type: text
        text: Alexandríæ commemorátio plurimórum sanctórum Mártyrum, qui a Serápidis cultóribus comprehénsi, et, cum adoráre idólum constánter renuíssent, sævíssime cæsi sunt, témpore Theodósii Imperatóris; qui mox rescríptum dedit, ut Serápidis templum destruerétur.
      - type: text
        text: Constantinópoli sancti Pauli Mártyris, qui, sub Constantíno Coprónymo, cum sanctárum Imáginum cultum defénderet, igne combústus est.
      - type: text
        text: Cabillóne, in Gálliis, sancti Agrícolæ Epíscopi.
      - type: text
        text: Nivigéllæ, in Brabántia, sanctæ Gertrúdis Vírginis, quæ, claríssimo génere orta, despíciens mundum et toto vitæ suæ cursu in ómnibus sanctitátis offíciis se exércens, Christum sponsum in cælis habére méruit.
  psalm.sextod-cimo-kal-ndas-aug-sti-19501520c9:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Osmund, Bishop of Salisbury, of whom mention is made upon the 4th day of December, [in the year 1099.]
      - type: citation
        text: 'Upon the same 17th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Confessor Alexius, [in the year 404,] son of the Senator Euphemian. Upon the first night of his marriage he left his bride untouched, and absconded from his home. After a long pilgrimage he returned to the city, where he was received as a beggar out of charity in his own father's house, and there remained unknown for seventeen years, thus deceiving the world by a new craft. After he was dead, in the Supreme Pontificate of Innocent I, he was recognized by a voice which was heard throughout the churches of the city and by his own writing, and his body was carried with the greatest honour to the Church of Saint Boniface, where he hath been illustrious for many miracles. We keep feast in his honour upon the 24th day of this present month of July.
      - type: text
        text: At Carthage, the holy martyrs of Scillita, [now Csarin, in Tunis,] Speratus, Nazales, Cythinus, Veturius, Felix, Acyllinus, Laetantius, Januaria, Generosa, Vestina, Donata, and Secunda. At the command of the Prefect Saturninus, after their first confession of Christ, they were cast into prison, where they were laid in stocks and afterward beheaded, [in the year 180.] The body of Speratus was brought from Africa to Gaul, along with the bones of blessed Cyprian and the head of the holy martyr Pantaleon, where it has been laid with religious honour in the church of St. John the Baptist at Lyon.
      - type: text
        text: At Amarserah, in Paphlagonia, the holy martyr Hyacinth, who suffered many things under the President Castrisius, and fell asleep in prison, [fourth century.]
      - type: text
        text: At Tivoli, the holy martyr Generosus. [His body lies, with that of the Monk and Confessor St Severinus, under the high altar in the Cathedral of St Lawrence, at Tivoli.]
      - type: text
        text: At Constantinople, the holy Theodota, martyr under the Emperor Leo the Iconoclast.
      - type: text
        text: At Rome, the holy Pope Leo IV. [He was elected in 847 and died in 855. He was a Benedictine monk in the monastery of Saint Martin, which was joined to the ancient Vatican Basilica.]
      - type: text
        text: At Pavia, the holy Confessor Ennodius, Bishop [of that see, in the year 521. He was born at Arles, about 473.]
      - type: text
        text: At Auxerre, holy Theodosius, Bishop [of that see, in the year 512.]
      - type: text
        text: At Milan, [in the year 398,] the holy Virgin Marcellina, sister of the blessed Bishop Ambrose, who received the holy veil from Pope Liberius in the church of St. Peter at Rome. Her holiness is attested by the said blessed Ambrose in his writings.
      - type: text
        text: At Venice is commemorated the translation, [in the year 1230,] of the holy Virgin Marina.
      la:
      - type: text
        text: Sextodécimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Aléxii Confessóris, ex Euphemiáno Senatóre progéniti. Hic, prima nocte nuptiárum, sponsa intácta, e domo sua abscédens, ac, post longam peregrinatiónem, ad Urbem rédiens, decem et septem annos tamquam egenus in domo patérna recéptus hospítio, nova mundum arte delúdens, incógnitus mansit; sed post óbitum, et voce per Urbis Ecclésias audíta et scripto suo agnítus, Innocéntio Primo Pontífice Máximo, ad sancti Bonifátii Ecclésiam summo honóre delátus est, ibíque multis miráculis cláruit.
      - type: text
        text: Carthágine natális sanctórum Mártyrum Scillitanórum, id est Speráti, Narzális, Cythíni, Vetúrii, Felícis, Acyllíni, Lætántii, Ianuáriæ, Generósæ, Vestínæ, Donátæ et Secúndæ; qui, iussu Saturníni Præfécti, post primam Christi confessiónem, in cárcerem trusi et in ligno confíxi, deínde gládio decolláti sunt. Speráti autem relíquiæ, cum óssibus beáti Cypriáni et cápite sancti Pantaleónis Mártyris, ex Africa in Gállias translátæ, Lugdúni, in Basílica sancti Ioánnis Baptístæ, religióse cónditæ fuérunt.
      - type: text
        text: Amástride, in Paphlagónia, sancti Hyacínthi Mártyris, qui sub Castrítio Prǽside, multa passus, quiévit in cárcere.
      - type: text
        text: Tíbure sancti Generósi Mártyris.
      - type: text
        text: Constantinópoli sanctæ Theodótæ Mártyris, sub Leóne Iconoclásta.
      - type: text
        text: Romæ deposítio sancti Leónis Papæ Quarti.
      - type: text
        text: Pápiæ sancti Ennódii, Epíscopi et Confessóris.
      - type: text
        text: Antisiodóri sancti Theodósii Epíscopi.
      - type: text
        text: Medioláni sanctæ Marcéllinæ Vírginis, soróris beáti Ambrósii Epíscopi, quæ Romæ, in Basílica sancti Petri, a Libério Papa velum consecratiónis accépit; cuius étiam sanctitátem idem beátus Ambrósius scriptis suis testátam facit.
      - type: text
        text: Venétiis Translátio sanctæ Marínæ Vírginis.
  psalm.sextod-cimo-kal-ndas-dec-mbris-5b5186ae1d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Canterbury, in England, the holy Confessor Edmund Rich, Archbishop of that see, who was driven into exile (at Pontigny) for his defense of the rights of his Church, and died a holy death near Provins, (in Champagne, in the year 1242,) and whose name Innocent IV enrolled among those of the Saints.
      - type: text
        text: In Africa, the holy martyrs Rufinus, Mark, Valerius, and their Companions.
      - type: text
        text: On the same day, the holy martyrs Elpidius, Marcellus, Eustochius, and their Companions. Elpidius was of the Senatorial Order, and steadfastly confessed the Christian faith in the presence of the Emperor Julian the Apostate. He and his Companions were first tied to unbroken horses, and so dragged about, but afterwards cast into the fire, and so achieved a glorious martyrdom, (in the fourth century.)
      - type: text
        text: At Lyon, the holy Confessor Eucherius, Bishop of that see, a man of wonderful faith and teaching. He was of the noblest of the Senatorial Order, and adopted the life and dress of a monk. For a long while he shut himself up in a cave, where he served Christ in fastings and prayers. He was called through the revelation of an angel to occupy the See of Lyons, and was therein solemnly placed. (He died about the year 450.)
      - type: text
        text: At Padua, holy Fidentius, Bishop (of that see, in the year 168.)
      - type: text
        text: On the same day, (in the year 759,) the holy Othmar, Abbot (of St. Gall, in Switzerland.)
      la:
      - type: text
        text: Sextodécimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Sanctæ Gertrúdis Vírginis, cuius natális sequénti die recensétur.
      - type: text
        text: Edimbúrgi, in Scótia, natális sanctæ Margarítæ Víduæ, Scotórum Regínæ, amóre in páuperes et voluntária paupertáte célebris. Ipsíus tamen festívitas quarto Idus Iúnii celebrátur.
      - type: text
        text: In Africa sanctórum Mártyrum Rufíni, Marci, Valérii et Sociórum.
      - type: text
        text: Eódem die sanctórum Mártyrum Elpídii, Marcélli, Eustóchii et Sociórum; ex quibus Elpídius, cum esset órdinis Senatórii et coram Iuliáno Apóstata Christiánam fidem constantíssime profiterétur, ídeo, primum equis indómitis, una cum Sóciis, alligátus atque pertráctus, deínde, in ignem coniéctus, gloriósum martýrium consummávit.
      - type: text
        text: Lugdúni, in Gállia, natális sancti Euchérii, Epíscopi et Confessóris, viri admirándæ fídei et doctrínæ. Hic, ex nobilíssimo Senatórum órdine ad religiósam vitam habitúmque convérsus, diu, intra septa spelúncæ sponte conclúsus, in oratiónibus et ieiúniis Christo servívit; deínde apud præfátam urbem in pontificáli Cáthedra, revelánte Angelo, solémniter collocátus est.
      - type: text
        text: Patávii sancti Fidéntii Epíscopi.
      - type: text
        text: Cantuáriæ, in Anglia, sancti Edmúndi, Epíscopi et Confessóris; qui, pro Ecclésiæ suæ iúribus tuéndis in exsílium actus, apud Provínum, Sénonum óppidum, sanctíssime óbiit; et Sanctórum cánoni ab Innocéntio Papa Quarto adscríptus est.
      - type: text
        text: Eódem die deposítio sancti Othmári Abbátis.
  psalm.sextod-cimo-kal-ndas-febru-rii-6a5bd67e6d:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 17th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In the Thebaid, (in the year 356,) the holy Abbot Anthony, father of many monks, very illustrious for his life and miracles. Holy Athanasius hath chronicled his acts in a famous book. His sacred body was found by the revelation of God in the time of the Emperor Justinian and brought to Alexandria, where it is buried in the Church of St. John the Baptist.
      - type: text
        text: At Langres, the holy triplets Speusippus, Eleusippus, and Meleusippus, who were crowned with martyrdom in the time of the Emperor Marcus Aurelius, along with their grandmother Leonilla.
      - type: text
        text: At Rome is commemorated the finding of the bodies of the holy martyrs Diodorus the Priest, Marian the Deacon, and their Companions, who were keeping the feasts of the martyrs in the Catacombs in the time of holy Pope Stephen, (in the year 257,) when the persecutors closed up the entrance of the Catacomb and buried it up, so that they also died as martyrs.
      - type: text
        text: At Bourges, (in the year 644,) holy Sulpicius, Bishop of that see, surnamed the Pious, whose life and precious death are rendered famous by glorious miracles.
      - type: text
        text: In the monastery of St. Andrew at Rome, (in the sixth century,) the blessed monks Anthony, Merulus, and John, of whom writeth holy Pope Gregory.
      la:
      - type: text
        text: Sextodécimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: In Thebáide sancti Antónii Abbátis, qui, multórum Monachórum Pater, vita et miráculis præclaríssimus vixit; cuius gesta sanctus Athanásius insígni volúmine prosecútus est. Eius autem sacrum corpus, sub Iustiniáno Imperatóre, divína revelatióne repértum et Alexandríam delátum, in Ecclésia sancti Ioánnis Baptístæ humátum fuit.
      - type: text
        text: Apud Língonas, in Gállia, sanctórum tergeminórum Speusíppi, Eleusíppi et Meleusíppi; qui, cum ávia sua Leonílla, martýrio coronáti sunt, témpore Marci Aurélii Imperatóris.
      - type: text
        text: Apud Bitúricas, in Aquitánia, deposítio sancti Sulpícii Epíscopi, cognoménto Pii, cuius vita et mors pretiósa gloriósis miráculis commendátur.
      - type: text
        text: Romæ, in monastério sancti Andréæ, beátorum Monachórum Antónii, Méruli et Ioánnis, de quibus scribit sanctus Gregórius Papa.
      - type: text
        text: In fínibus Edessénæ regiónis, in Mesopotámia, sancti Iuliáni Eremítæ, cognoménto Sabæ, qui, Valéntis Imperatóris témpore, fidem cathólicam, Antiochíæ ferme collápsam, virtúte miraculórum eréxit.
      - type: text
        text: Romæ Invéntio sanctórum Mártyrum Diodóri Presbýteri, Mariáni Diáconi, et Sociórum, qui, sancto Stéphano Papa Ecclésiam Dei regénte, martýrium Kaléndis Decémbris sunt assecúti.
  psalm.sextod-cimo-kal-ndas-i-lii-9c968b2b47:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Besançon, in Gaul, the holy martyrs Ferreolus a Priest and Ferrutio a Deacon, who were sent forth by the blessed Irenaeus, Bishop [of Lyon,] to preach the Word of God, whereafter they were diverse ways tormented and then beheaded under Claudius the judge.
      - type: text
        text: At Tarsus, in Cilicia, under the Emperor Diocletian, the holy martyrs Quiricus and his mother Julitta.
      - type: text
        text: Quiricus was a little boy of three years old when his mother was horribly scourged before the President Alexander, he vehemently wept and lamented her, whereupon he was killed by being dashed against the steps of the judgment-seat. Julitta, after horrid stripes and grievous torments, was beheaded, and so finished her testimony.
      - type: text
        text: At Mainz, the holy martyrs Aureus and his sister Justina, and the others who were at Communion in the Church when they were massacred by the Huns, who were wasting Germany, [in the year 451.]
      - type: text
        text: At Limasol, in Cyprus, holy Tycho, Bishop [of that see,] in the time of the Emperor Theodosius the younger.
      - type: text
        text: At Lyon, [in the year 551,] the blessed Aurelian, Bishop of Arles.
      - type: text
        text: At Nantes, in Brittany, [in the year 310,] the holy Confessor Similian, Bishop [of that see.]
      - type: text
        text: At Meissen, in Germany, [in the year 1106,] holy Benno, Bishop [of that see.]
      - type: text
        text: At the village of La Louvesc, in the Diocese of Vienne, in the Ardèche, [in the year 1640,] the holy Confessor John Francis Regis, of the Society of Jesus, a man of wonderful love and long-suffering in seeking the salvation of souls, whom Pope Clement XII added to the list of the Saints.
      - type: text
        text: In Brabant, [in the year 1246,] the holy Virgin Lutgard.
      la:
      - type: text
        text: Sextodécimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Mogúntiæ pássio sanctórum Aurǽi Epíscopi, et Iustínæ soróris, ac ceterórum Mártyrum; qui, synáxim in Ecclésia agéntes, ab Hunnis, Germániam diripiéntibus, trucidáti sunt.
      - type: text
        text: Vesontióne, in Gálliis, sanctórum Mártyrum Ferreóli Presbýteri, et Ferrutiónis Diáconi, qui, a beáto Irenǽo Epíscopo missi ad prædicándum verbum Dei, póstea, sub Cláudio Iúdice, divérsis pœnis excruciáti, gládio feriúntur.
      - type: text
        text: Tarsi, in Cilícia, sanctórum Mártyrum Quírici et Iulíttæ matris, sub Diocletiáno Imperatóre. Ex eis Quíricus, triénnis puéllus, cum matrem, quæ ante Alexándrum Prǽsidem nervis diríssime cædebátur, implacábili luctu lugéret, ad gradus tribunális illísus intériit; Iulítta vero, post dira vérbera et grávia torménta, martýrii sui cursum obtruncatióne cápitis implévit.
      - type: text
        text: Amathúnte, in Cypro, sancti Tychónis Epíscopi, témpore Theodósii Iunióris.
      - type: text
        text: Lugdúni, in Gállia, deposítio beáti Aureliáni, Epíscopi Arelaténsis.
      - type: text
        text: Nannéte, in Británnia minóre, sancti Similiáni, Epíscopi et Confessóris.
      - type: text
        text: Misnæ, in Germánia, sancti Bennónis Epíscopi.
      - type: text
        text: In monastério Aquiriénsi, in Brabántia, sanctæ Lutgárdis Vírginis.
  psalm.sextod-cimo-kal-ndas-i-nii-af87d4fc6e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 17th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Villa Real, in the kingdom of Valencia, the holy Paschal, of the Order of Friars Minors, a man of wonderful innocency, and wonderful contrition.
      - type: text
        text: At Pisa, in Tuscany, is commemorated the holy martyr Torpes. He was a great official in the house of Nero, and was one of those of whom the Apostle Paul writeth from the city of Rome unto the Philippians (iv. 22,) "All the Saints salute you, chiefly they that are of Caesar's household." But later on, at the command of Satellicus, because of his belief in Christ, he was buffeted, grievously scourged, and thrown to beasts to be devoured; but he was not hurt thereby, and finished his testimony by being beheaded, upon the 29th day of April; but his feast day is kept upon the 17th day of May on account of the translation of his body.
      - type: text
        text: On the same day, the holy Virgin and martyr Restituta. In the reign of the Emperor Valerian, Proculus, the judge in Africa, caused her to be tortured in diverse ways, and put into a ship with pitch and tow that she might burn on the sea, but when fire was put to it the flame turned upon them that kindled it. Restituta gave up her spirit to God in prayer, and, by the will of God, the ship containing her body came to shore in the island of Ischia, near Naples, where her remains were received with great worship by the Christians. In after-days the Emperor Constantine the Great caused a church to be built in her honour at Naples.
      - type: text
        text: At Noyon, [in the reign of the Emperor Diocletian,] the holy martyrs Heradius, Paul, and Aquilinus, along with two others.
      - type: text
        text: At Chalcedon, under the Emperor Maximian, the holy martyrs Solochan, and the soldiers, his Companions.
      - type: text
        text: At Alexandria, the holy martyrs Adrion, Victor, and Basilla.
      - type: text
        text: At Wurzburg, [in the year 1045,] the holy Confessor Bruno, Bishop [of that see.]
      la:
      - type: text
        text: Sextodécimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Apud Villam Regálem, in Hispánia, sancti Paschális, ex Ordine Minórum, Confessóris, miræ innocentiæ et pæniténtiæ viri; quem Leo Papa Décimus tértius cæléstem eucharisticórum Cóetuum et Societátum a sanctíssima Eucharístia Patrónum declarávit.
      - type: text
        text: Noviodúni, in Gálliis, sanctórum Mártyrum Herádii, Pauli et Aquilíni, cum duóbus áliis.
      - type: text
        text: Chalcedóne sanctórum Mártyrum Solochónis et Sociórum mílitum, sub Maximiáno Imperatóre.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Adriónis, Victóris et Basíllæ.
      - type: text
        text: Eódem die sanctæ Restitútæ, Vírginis et Mártyris; quæ, in Africa, Valeriáno imperánte, a Próculo Iúdice várie torta, et in navículam pice et stupa refértam, ut in mari comburerétur, impósita, tandem, cum in incensóres, immisso igne, flamma converterétur, in oratióne spíritum Deo réddidit. Ipsíus corpus cum eádem navícula, Dei nutu, ad Ænáriam ínsulam, prope Neápolim, in Campánia, devéctum est, et a Christiánis magna veneratióne suscéptum; ac póstmodum in eius honórem Constantínus Magnus Basílicam in ipsa urbe Neápoli erigéndam curávit.
  psalm.sextod-cimo-kal-ndas-ianu-rii-686a44c8c3:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 17th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Eleutheropolis, in Palestine, the holy martyrs Florian, Calanicus, and fifty-eight others, their Companions, who were slain by the Saracens for Christ's faith's sake in the time of the Emperor Heraclius.
      - type: text
        text: At Marseilles, in Gaul, blessed Lazarus, (called first) Bishop (of that city,) of whom it is written in the Gospel that the Lord raised him from the dead.
      - type: text
        text: At Rome, holy John de la Matha, founder of the Order of the most Holy Trinity for the redemption of captives. (He died in the year 1213.) His feast is kept upon the 8th day of February by order of Innocent XI.
      - type: text
        text: In the monastery of Fulda, (in the year 779,) the holy Abbot Sturmius, (of the Order of St Benedict, and first Abbot of Fulda,) Apostle of Saxony, whose name Innocent II enrolled with those of the saints at the second Council of Lateran.
      - type: text
        text: At Groot-Bijgaarden, near Brussels, in the Brabant, (in the year 1168,) the holy Virgin Wivina, whose eminent holiness is oftentimes attested by miracles. (Foundress of the Abbey of Bijgaarden, in the Archdiocese of Mechelen, of the Order of St. Benedict.)
      - type: text
        text: At Constantinople, the holy widow Olympias, (about the year 410; born about 368.)
      - type: text
        text: In the Ardennes, the blessed Widow Begga, sister of holy Gertrude. (She married Ansegise, son of St. Arnoult, Bishop of Metz. She was born about 368, became a widow in 386, and died about 410.)
      - type: text
        text: Upon the same day is commemorated the translation of the body of the holy martyr Ignatius, Patriarch of Antioch, who was the third to govern that church after the blessed Apostle Peter he suffered at Rome under Trajan, but his body was brought thence to Antioch and laid in the cemetery of the church outside the gate which leadeth unto Daphne, upon the anniversary of the which ceremony holy John Chrysostom preached unto the people. In after-times the body was again brought back to Rome, where it is buried, and highly honoured in the church of St. Clement along with the body of that most blessed Pope and martyr.
      la:
      - type: text
        text: Sextodécimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sancti Ioánnis de Matha, Presbýteri et Confessóris, qui Ordinis sanctíssimæ Trinitátis redemptiónis captivórum Fundátor éxstitit. Ipsíus tamen festívitas, ex dispositióne Innocéntii Papæ Undécimi, ágitur sexto Idus Februárii.
      - type: text
        text: Massíliæ, in Gállia, beáti Lázari Epíscopi, sanctárum Maríæ Magdalénæ ac Marthæ fratris, quem Dóminus in Evangélio appellásse amícum et a mórtuis excitásse légitur.
      - type: text
        text: Eleutherópoli, in Palæstína, sanctórum Mártyrum Floriáni, Calaníci, et Sociórum quinquagínta et octo; qui, témpore Heráclii Imperatóris, a Saracénis ob Christi fidem occísi sunt.
      - type: text
        text: In monastério Fuldénsi sancti Stúrmii, Abbátis et Saxóniæ Apóstoli; quem Innocéntius Papa Secúndus, in Concílio secúndo Lateranénsi, in Sanctórum númerum rétulit.
      - type: text
        text: Bigárdis, prope Bruxéllas, in Brabántia, sanctæ Wivínæ Vírginis, cuius egrégiam sanctitátem mirácula crebra testántur.
      - type: text
        text: Constantinópoli sanctæ Olympíadis Víduæ.
      - type: text
        text: Andániæ, apud Septem Ecclésias, in Bélgio, beátæ Beggæ Víduæ, quæ fuit soror sanctæ Gertrúdis.
      - type: text
        text: Eódem die Translátio sancti Ignátii, Epíscopi et Mártyris; qui, tértius post beátum Petrum Apóstolum, Antiochénam rexit Ecclésiam. Eius corpus ab urbe Roma, ubi ipse, sub Traiáno, glorióse martýrium tertiodécimo Kaléndas Ianuárii consummáverat, Antiochíam delátum, ibídem, in cœmetério Ecclésiæ, extra portam Daphníticam, pósitum fuit; in qua celebritáte sanctus Ioánnes Chrysóstomus conciónem ad pópulum hábuit. Póstmodum vero eius relíquiæ rursus Romam translátæ sunt, et in Ecclésia sancti Cleméntis, una cum córpore eiúsdem beatíssimi Papæ et Mártyris, summa veneratióne recónditæ.
  psalm.sextod-cimo-kal-ndas-m-rtii-dd4e2e1f72:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 14th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Flaminian Way, the blessed martyr Valentine, a Priest, who after much healing and teaching was cudgelled and beheaded under Claudius Caesar, [in the year 268.]
      - type: text
        text: Likewise at Rome, the holy martyrs Vitalis, Felicula, and Zeno.
      - type: text
        text: At Teramo, [in Umbria, in the year 273,] the holy martyr Valentine, Bishop of that see. He was heavily flogged and committed to jail, but as he would not yield he was thrown out of the prison in the silence of midnight and beheaded by command of Placidus, Prefect of the city. There likewise, [in the year 273,] the holy martyrs Proculus, Ephebus, and Apollonius, who were watching by the body of holy Valentine when they were apprehended by order of Leontius, the consular, and slain with the sword.
      - type: text
        text: At Alexandria, the holy martyrs Bassus, Anthony, and Protolicus, who were drowned in the sea.
      - type: text
        text: Likewise at Alexandria, the Priest Cyrion, Bassian the Reader, Agatho the Exorcist, and Moses, who were all burnt with fire and passed away to heaven.
      - type: text
        text: Also likewise at Alexandria, the holy martyrs Denis and Ammonius, who were beheaded.
      - type: text
        text: At Ravenna, the holy Confessor Eleuchadius, Bishop of that see.
      - type: text
        text: In Bithynia, [in the year 470,] the holy Abbot Auxentius.
      - type: text
        text: At Sorrento, the holy Abbot Antonino. He was in the monastery of Monte Cassino when it was destroyed by the Lombards, and he went thence to a solitude hard by the city of Sorrento, and there [in the year 830,] fell asleep in the Lord, famed for holiness. His body is daily remarkable for many miracles, most chiefly in the delivery of them that are vexed by evil spirits.
      la:
      - type: text
        text: Sextodécimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Flamínia, natális sancti Valentíni, Presbýteri et Mártyris, qui, post multa sanitátum et doctrínæ insígnia, fústibus cæsus et decollátus est, sub Cláudio Cǽsare.
      - type: text
        text: Ibídem deposítio sancti Cyrílli, Epíscopi et Confessóris; qui, una cum sancto Methódio, simíliter Epíscopo et fratre suo, cuius dies natális octávo Idus Aprílis recensétur, multas Slávicas gentes earúmque Reges ad fidem Christi perdúxit. Horum tamen Sanctórum festívitas Nonis Iúlii celebrátur.
      - type: text
        text: Item Romæ sanctórum Mártyrum Vitális, Felículæ et Zenónis.
      - type: text
        text: Interámnæ sancti Valentíni, Epíscopi et Mártyris, qui, post diútinam cædem mancipátus custódiæ, et, cum superári non posset, tandem, médiæ noctis siléntio eiéctus de cárcere, decollátus est, iussu Præfécti urbis Plácidi.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Cyriónis Presbýteri, Bassiáni Lectóris, Agathónis Exorcístæ, et Móysis; qui omnes, igne combústi, evolavérunt ad cælum.
      - type: text
        text: Interámnæ sanctórum Próculi, Ephébi et Apollónii Mártyrum, qui, cum ad sancti Valentíni corpus vigílias ágerent, Leóntii Consuláris iussu comprehénsi sunt, et gládio cæsi.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Bassi, Antónii et Protólici, qui demérsi sunt in mare.
      - type: text
        text: Item Alexandríæ sanctórum Dionýsii et Ammónii decollatórum.
      - type: text
        text: Neápoli, in Campánia, sancti Nostriáni Epíscopi, qui in cathólica fide contra hæréticam pravitátem tuénda éxstitit insígnis.
      - type: text
        text: Ravénnæ sancti Eleuchádii, Epíscopi et Confessóris.
      - type: text
        text: In Bithýnia sancti Auxéntii Abbátis.
      - type: text
        text: Apud Surréntum sancti Antoníni Abbátis, qui e monastério Cassinénsi, a Longobárdis devastáto, in solitúdinem eiúsdem urbis secéssit; ibíque, sanctitáte célebris, obdormívit in Dómino. Ipsíus corpus multis quotídie miráculis, et præsértim in energúmenis liberándis, effúlget.
  psalm.sextod-cimo-kal-ndas-maii-7db618ab86:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 16th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 1783,] the holy Confessor Benedict Joseph Labre, illustrious for his contempt of himself, and his absolute voluntary poverty.
      - type: text
        text: At Corinth, the holy martyrs Callistus and Charisius, and seven others, who were all drowned in the sea, [third century.]
      - type: text
        text: At Saragossa, in Spain, the eighteen holy martyrs, Optatus, Lupercus, Successus, Martial, Urban, Julia, Quintilian, Publius, Fronto, Felix, Caecilian, Eventius, Primitivus, Apodemius, and four others who were all named Saturninus; all these were tormented and slain at one time under Dacian, President of Spain, [about the year 304.] Prudentius has celebrated their illustrious martyrdom in poetry.
      - type: text
        text: Likewise at Saragossa, the holy Virgin and martyr Encratis, who, after her body had been mangled, her breasts cut off, and her liver torn out, still survived, and was kept shut up in prison until her body mortified, [in the year 303 or 304.]
      - type: text
        text: In the same city, the holy martyrs Caius and Crementius, who having confessed Christ for the second time, remained firm in His faith, and drank the cup of His testimony, [after the year 303.]
      - type: text
        text: There likewise, [in the sixth century,] the holy martyr Lambert.
      - type: text
        text: At Palencia, holy Turibius, Bishop of Astorga, who with the help of holy Pope Leo rooted the Priscillianist heresy completely out of Spain, and fell asleep in peace, famous for miracles, [in the year 460.]
      - type: text
        text: At Braga, in Portugal, [in the year 665,] holy Fructuosus, Bishop of that see.
      - type: text
        text: On the same day, holy Paternus, Bishop of Avranches, [in the year 565.]
      - type: text
        text: At Valenciennes, in France, the holy Confessor Drogo, [in the year 1189.]
      - type: text
        text: At Siena, in Tuscany, blessed Joachim, of the Order of Servants of the Blessed Virgin Mary, [in the year 1305.]
      la:
      - type: text
        text: Sextodécimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Corínthi natális sanctórum Mártyrum Callísti et Charísii, cum áliis septem, qui omnes, post ália toleráta supplícia, in mare demérsi sunt.
      - type: text
        text: Cæsaraugústæ, in Hispánia, item natális sanctórum decem et octo Mártyrum, scílicet Optáti, Lupérci, Succéssi, Martiális, Urbáni, Iúliæ, Quinctiliáni, Públii, Frontónis, Felícis, Cæciliáni, Evéntii, Primitívi, Apodémii, et aliórum quátuor qui Saturníni vocáti esse referúntur. Hi omnes sub Daciáno, Hispaniárum Prǽside, simul pœnis affécti atque interémpti sunt; quorum illústre martýrium Prudéntius vérsibus exornávit.
      - type: text
        text: In eádem civitáte sanctórum Caii et Creméntii, qui, secúndo conféssi et in Christi fide perseverántes, martýrii cálicem gustavérunt.
      - type: text
        text: Ibídem sancti Lambérti Mártyris.
      - type: text
        text: Item Cæsaraugústæ sanctæ Encrátidis, Vírginis et Mártyris, quæ, laniáto córpore, mamílla abscíssa et iécore avúlso, adhuc supérstes in cárcere inclúsa et reténta est, donec ulcerátum ipsíus corpus putrésceret.
      - type: text
        text: Paléntiæ sancti Turíbii, Epíscopi Asturicénsis, qui, ope sancti Leónis Papæ, Priscilliáni hǽresim ex Hispánia pénitus profligávit, clarúsque miráculis quiévit in pace.
      - type: text
        text: Brácari, in Lusitánia, sancti Fructuósi Epíscopi.
      - type: text
        text: Sescíaci, in Constantiénsi Gálliæ território, tránsitus sancti Patérni, Epíscopi Abrincénsis et Confessóris.
      - type: text
        text: Romæ natális sancti Benedícti-Ioséphi Labre Confessóris, qui contémptu sui et extrémæ voluntáriæ paupertátis laude éxstitit insígnis.
      - type: text
        text: Apud Valencénas, in Gállia, sancti Drogónis Confessóris.
      - type: text
        text: Nivérnis, in Gállia, sanctæ Maríæ-Bernárdæ Soubirous, Vírginis, e Congregatióne Sorórum a Caritáte et Institutióne Christiána, Lapúrdi, adhuc iuvénculæ, iterátis apparitiónibus Immaculátæ Dei Genitrícis Maríæ recreátæ, quam Pius Papa Undécimus inter sanctas Vírgines adscrípsit.
      - type: text
        text: Senis, in Túscia, beáti Ióachim, ex Ordine Servórum beátæ Maríæ Vírginis.
  psalm.sextod-cimo-kal-ndas-nov-mbris-8067674d7c:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy widow Iadwiga, Grand Princess of Poland, who fell asleep in the Lord upon the 15th day of this present month of October.
      - type: citation
        text: 'Upon the same 17th day of October, were born into the better life:'
      - type: text
        text: At Antioch, the holy martyr Heron, a disciple of blessed Ignatius, after whom he was made Bishop of that city. He followed in all godliness in the steps of his master, and for the love of Christ laid down his life for the sheep committed to his care.
      - type: text
        text: Upon the same day, (in the persecution under the Emperor Diocletian,) the holy martyrs Victor, Alexander, and Marian.
      - type: text
        text: In Persia, (in the fifth century,) the holy martyr Mamelta. She was turned to the faith from the worshipping of idols by a warning from an angel, was stoned by the Gentiles, and drowned in the depths of a lake.
      - type: text
        text: At Constantinople, the holy monk Andrew of Crete. He was often beaten under the Emperor Constantine Copronymus for his honouring of holy images, and at length, after one of his feet had been cut off, he gave up the ghost.
      - type: text
        text: At Orange, in Gaul, (in the sixth century,) holy Florentine, Bishop (of that see,) who was famous for many graces, and fell asleep in the Lord.
      - type: text
        text: At Capua, (in the same sixth century,) holy Victor, Bishop (of that see,) famous for his learning and holiness.
      la:
      - type: text
        text: Sextodécimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Parédii, in diœscési Augustodunénsi, sanctæ Margarítæ Maríæ Alacóque, quæ, Ordinem Visitatiónis beátæ Maríæ Vírginis proféssa, exímiis in devotióne erga sacratíssimum Cor Iesu propagánda et público eiúsdem cultu provehéndo méritis excélluit; atque in sanctárum Vírginum album a Benedícto Papa Décimo quinto reláta fuit.
      - type: text
        text: Antiochíæ natális sancti Herónis, qui fuit discípulus beáti Ignátii; atque, post eum factus Epíscopus, viam magístri pius imitátor est secútus, et pro commendáto sibi grege amátor Christi occúbuit.
      - type: text
        text: Eódem die pássio sanctórum Victóris, Alexándri et Mariáni.
      - type: text
        text: In Pérside sanctæ Maméltæ Mártyris, quæ, a cultu idolórum ad fidem Angélico mónitu convérsa, a Gentílibus lapidáta est et in profúndum lacum demérsa.
      - type: text
        text: Aráusicæ, in Gálliis, sancti Floréntii Epíscopi, qui, multis clarus virtútibus, quiévit in pace.
  psalm.sextod-cimo-kal-ndas-oct-bris-27cb588222:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy martyrs Cornelius, Pope of Rome, and Cyprian, Bishop of Carthage, of whose birth into the better life mention hath been made upon the 14th day of this present month of September.
      - type: citation
        text: 'Upon the same 16th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Chalcedon, the holy Virgin and martyr Euphemia. Under the Emperor Diocletian and the Proconsul Priscus, she overcame for Christ's sake torture, imprisonment, stripes, wheels, fire, stones, beasts, rods, sharp saws, and hot metal. When she was again cast to the beasts in the theatre, she prayed the Lord to take her spirit to Himself, and then one of them bit her sacred body, while the rest licked her feet, and she resigned her soul without spot to God.
      - type: text
        text: At Rome, the holy martyrs Lucy, a noble matron, and Geminian, whom the Emperor Diocletian, after they had suffered grievously and long been tormented, and had thus gained a noble victory by martyrdom, commanded to be slain with the sword.
      - type: text
        text: Likewise at Rome, upon the Flaminian Way, the holy martyrs Abundius the Priest and Abundantius the Deacon, whom the Emperor Diocletian commanded to be beheaded at the tenth milestone from the city, along with the eminent Marcian, and John, the son of Marcian, whom they had raised from the dead.
      - type: text
        text: At Heraclea, in Thrace, the holy martyr Sebastiana, who was led to believe in Christ by the blessed Apostle Paul. Under the Emperor Domitian and the President Sergius she was diversely tried and at last slain with the sword.
      - type: text
        text: At Cordova, (in the ninth century,) the holy martyrs Rogellus and ServusDei, who had their hands and feet cut off and were at last beheaded.
      - type: text
        text: In Scotland, the holy Confessor Ninian, Bishop (of Galloway, whose feast we keep upon the 25th day of this present month of September.)
      - type: text
        text: In England, (in the tenth century,) the holy Virgin Edith, daughter of Edgar, King of the English, who was dedicated to God from a child in the Monastery (of the Order of St. Benedict, at Wilton,) and knew not the world, rather then forsook it.
      la:
      - type: text
        text: Sextodécimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Sanctórum Mártyrum Cornélii Pape, et Cypriáni, Carthaginénsis Epíscopi, quorum memória décimo octávo Kaléndas Octóbris recólitur.
      - type: text
        text: Chalcedóne natális sanctæ Euphémiæ, Vírginis et Mártyris; quæ, sub Diocletiáno Imperatóre et Prisco Procónsule, torménta, cárceres, vérbera, arguménta rotárum, ignes, póndera lápidum, béstias, plagas virgárum, serras acútas, sartágines ignítas pro Christo superávit. Sed, rursus in theátrum ad béstias ducta, ibi, cum orásset ad Dóminum ut iam spíritum suum suscíperet, una ex iis morsum sancto córpori infigénte, céteris pedes eius lambéntibus, immaculátum spíritum Deo réddidit.
      - type: text
        text: Romæ sanctórum Mártyrum Lúciæ, nóbilis matrónæ, et Geminiáni; quos ambos Diocletiánus Imperátor, pœnis gravíssimis afflíctos diúque tortos, tandem, post laudábilem martýrii victóriam, gládio animadvérti præcépit.
      - type: text
        text: Natális sancti Martíni Primi, Papæ et Mártyris, qui, cum Sérgium ac Paulum et Pyrrhum hæréticos, Romæ coácta Sýnodo, condemnásset, ídeo, iussu Constántis, Imperatóris hærétici, per fraudem captus et Constantinópolim perdúctus, in Chersonésum relegátus est, ibíque, ob cathólicam fidem ærúmnis conféctus, vitam finívit, multísque miráculis cláruit. Eius corpus, póstea Romam translátum, in Ecclésia sanctórum Silvéstri et Martíni cónditum fuit. Ipsíus tamen festívitas prídie Idus Novémbris celebrátur.
      - type: text
        text: Romæ item natális sanctæ Cæcíliæ, Vírginis et Mártyris, quæ sponsum suum Valeriánum et fratrem eius Tibúrtium ad credéndum in Christum perdúxit, et ad martýrium incitávit. Hanc Almáchius, Urbis Præféctus, post eórum martýrium tenéri, atque illústri passióne, post ignem superátum, fecit gládio consummári, témpore Marci Aurélii Sevéri Alexándri Imperatóris. Eius vero festum recólitur décimo Kaléndas Decémbris.
      - type: text
        text: Heracléæ, in Thrácia, sanctæ Sebastiánæ Mártyris, quæ a beáto Paulo Apóstolo ad Christi fidem est perdúcta; atque, sub Domitiáno Imperatóre et Sérgio Prǽside, váriis modis tentáta, gládio tandem cæsa est.
      - type: text
        text: Romæ, via Flamínia, sanctórum Mártyrum Abúndii Presbýteri, et Abundántii Diáconi, quos Diocletiánus Imperátor, una cum illústri viro Marciáno et eius fílio Ioánne, quem illi a mórtuis suscitáverant, gládio feríri iussit, décimo ab Urbe lápide.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Rogélli et Servidéi, qui, mánibus pedibúsque abscíssis, ad últimum decolláti sunt.
      - type: text
        text: Apud Cándidam Casam, in Scótia, sancti Niniáni, Epíscopi et Confessóris.
      - type: text
        text: In Anglia sanctæ Edíthæ Vírginis, Regis Anglórum Edgári fíliæ, quæ, in monastério a tenéris annis Deo dicáta, sǽculum hoc ignorávit pótius quam relíquit.
      - type: text
        text: In monte Cassíno Beáti Victóris Papæ Tértii, qui, sancti Gregórii Séptimi succéssor, Apostólicam Sedem novo splendóre illustrávit, insígnem de Saracénis triúmphum divína ope consecútus. Cultum, ab immemorábili témpore eídem exhíbitum, Leo Décimus tértius, Póntifex Máximus, ratum hábuit et confirmávit.
  psalm.sextod-cimo-kal-ndas-sept-mbris-16daa99cb3:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is the Octave of the holy martyr Lawrence.
      - type: citation
        text: 'Upon the same 17th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Carthage, in Africa, [in the year 483,] the holy martyrs Liberatus the Abbot, Boniface the Deacon, Servus and Rusticus the Sub-Deacons, the monks Rogatus and Septimus, and the boy Maximus. In the persecution by the Vandals under King Hunneric, they were put to diverse and unheard-of tortures, on account of their confession of the Catholic faith and their defence of one baptism at last they were nailed to the wood upon which they were to be burnt, and the fire was several times kindled but by the power of God always extinguished. Then the king commanded to beat in their heads with the handles of oars, and so they finished the lovely course of their fight, and were crowned by the Lord.
      - type: text
        text: At Caesarea, in Cappadocia, [about the year 273,] the holy martyr Mamas, who endured one long martyrdom from his childhood to his old age, and at last happily finished it under the President Alexander in the reign of the Emperor Aurelian. The holy fathers Basil and Gregory of Nazianzus highly extol him.
      - type: text
        text: In Achaia, [in the Peloponnesus, about the year 253,] the holy martyr Myron, a Priest, who was beheaded at Cyzicus, [in Asia Minor,] after many torments, under the President Antipater, in the time of the Emperor Decius.
      - type: text
        text: At Nicomedia, [in the year 303,] the holy martyrs Straton, Philip, and Eutychian. They were condemned to the beasts, but as these left them unhurt they finished their testimony by fire.
      - type: text
        text: At Terni, [in Spoleto, in the sixth century,] the holy Confessor Anastasius, Bishop [of that see.]
      - type: text
        text: At Ptolemais, in Palestine, [about the year 260,] the holy martyrs Paul and Juliana his sister, who suffered under the Emperor Valerian.
      la:
      - type: text
        text: Sextodécimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Hyacínthi, ex Ordine Prædicatórum, Confessóris, qui décimo octávo Kaléndas Septémbris obdormívit in Dómino.
      - type: text
        text: Carthágine sanctórum Mártyrum Liberáti Abbátis, Bonifátii Diáconi, Servi et Rústici Subdiaconórum, Rogáti et Séptimi Monachórum, et Máximi púeri; qui, in persecutióne Wandálica, sub Hunneríco Rege, pro confessióne cathólicæ fídei et pro unici Baptismátis defensióne, váriis et inaudítis supplíciis exagitáti, demum super ligna, quibus concremándi erant, clavis confíxi, et, cum ignis sǽpius accénsus fuísset ac divínitus semper exstínctus, Regis iussu remórum véctibus percússi, et, comminútis cérebris, enecáti, speciósum cursum certáminis sui, coronánte Dómino, perfecérunt.
      - type: text
        text: In Acháia sancti Myrónis, Presbýteri et Mártyris, qui, sub Décio Imperatóre et Antípatre Prǽside, Cýzici, post multa torménta, cápite truncátus est.
      - type: text
        text: Cæsaréæ, in Cappadócia, natális sancti Mamántis Mártyris, qui, sanctórum Theódoti et Rufínæ Mártyrum fílius, longum a puerítia ad senectútem usque martýrium duxit, et tandem, imperánte Aureliáno, sub Alexándro Prǽside, illud felíciter consummávit; quem sancti Patres Basilíus et Gregórius Nazianzénus summis láudibus celebrárunt.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Stratónis, Philíppi et Eutychiáni; qui, damnáti ad béstias et nil læsi, per ignem martýrium consummárunt.
      - type: text
        text: Ptolemáide, in Palæstína, pássio sanctórum Mártyrum Pauli, eiúsque soróris Iuliánæ Vírginis; qui ambo, sub Aureliáno Imperatóre, cum in Christi confessióne permanérent immóbiles, iussi sunt váriis et diríssimis torméntis afflígi ac tandem cápite obtruncári.
      - type: text
        text: Romæ sancti Eusébii Papæ.
      - type: text
        text: Interámnæ sancti Anastásii, Epíscopi et Confessóris.
      - type: text
        text: In Monte Falco, in Umbria, sanctæ Claræ, Moniális ex Ordine Eremitárum sancti Augustíni, Vírginis; in cuius viscéribus renováta Domínicæ passiónis mystéria fidéles, máxima cum devotióne, venerántur. Eam Leo Décimus tértius, Summus Póntifex, sanctárum Vírginum albo adscrípsit.
  psalm.t-rtio-idus-apr-lis-930ddcb244:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 11 th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 461,] the holy Confessor, Pope Leo I, who on account of his eminent worthiness is called the Great. In his times was held the holy Council of Chalcedon, wherein, through his legates, he condemned Eutyches, and whereof by his authority he confirmed the decrees. He ordained many things, wrote excellently, deserved well of the holy Church of God, as a good shepherd over all the Lord's flock, and fell asleep in peace.
      - type: text
        text: At Pergamos, in Asia, holy Antipas, "the faithful witness," of whom holy John doth make mention in his Revelation. Under the Emperor Domitian he was thrust into the inside of a brazen bull heated red hot, and so finished his testimony.
      - type: text
        text: At Salona, in Dalmatia, the holy martyrs Domnion, Bishop [of that city, who was converted by St Peter and sent thither,] and eight soldiers.
      - type: text
        text: At Gortyna, in Crete, [about the year 180,] holy Philip, Bishop of that see, very famous for his life and teaching. He governed the church committed unto him in the times of the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus, and shielded it from the rage of the Gentiles and the wiles of the heretics.
      - type: text
        text: At Nicomedia, [under Diocletian,] the holy Priest Eustorgius.
      - type: text
        text: At Spoleto, [in the year 554,] the holy Confessor Isaac the monk, whose graces have been recorded by holy Pope Gregory.
      - type: text
        text: At Gaza, in Palestine, under the Emperor Justinian, the holy Hermit Barsanuph.
      la:
      - type: text
        text: Tértio Idus Aprílis
      - type: text
        text: ''
      - type: text
        text: Sancti Leónis Papæ Primi, cognoménto Magni, Confessóris et Ecclésiæ Doctóris, cuius dies natális recólitur quarto Idus Novémbris.
      - type: text
        text: Pérgami, in Asia, sancti Antípæ, testis fidélis, cuius méminit sanctus Ioánnes in Apocalýpsi. Ipse autem Antípas, sub Domitiáno Imperatóre, in bovem ǽneum candéntem coniéctus, martýrium consummávit.
      - type: text
        text: Salónæ, in Dalmátia, sanctórum Mártyrum Domniónis Epíscopi, cum milítibus octo.
      - type: text
        text: Gortýnæ, in Creta, sancti Philíppi Epíscopi, vita et doctrína claríssimi, qui, tempóribus Marci Antoníni Veri et Lúcii Aurélii Cómmodi, Ecclésiam sibi créditam regens, a furóre Gentílium et ab hæreticórum insídiis eándem tutátus est.
      - type: text
        text: Nicomedíæ sancti Eustórgii Presbýteri.
      - type: text
        text: Spoléti sancti Isaac, Mónachi et Confessóris, cuius virtútes sanctus Gregórius Papa commémorat.
      - type: text
        text: Apud Gazam, in Palæstína, sancti Barsanúphii Anachorétæ, sub Iustiniáno Imperatóre.
      - type: text
        text: Lucæ, in Etrúria, sanctæ Gemmæ Galgáni, Vírginis, contemplatióne Domínicæ Passiónis et vitæ sanctitáte mirábilis, quam Pius Papa Duodécimus in Sanctárum númerum rétulit.
  psalm.t-rtio-idus-aug-sti-aec0726721:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 11th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 286,] between the two Laurel trees, the holy martyr Tiburtius. In the persecution under the Emperor Diocletian the judge Fabian caused him to walk with bare feet upon burning coals, and as he confessed Christ all the more firmly, commanded him to be led to the third mile-stone outside the city, and there beheaded.
      - type: text
        text: Likewise at Rome, [in the year 295,] the holy Virgin Susanna, a damsel of noble birth, a niece to blessed Pope Caius. She was beheaded in the time of the Emperor Diocletian, and so gained the palm of martyrdom.
      - type: text
        text: At Comana, in Pontus, [in the year 250,] holy Alexander, Bishop of that city, surnamed the charcoal-burner. He was a most learned philosopher, who learnt to be eminent for humility as a Christian. He was raised by holy Gregory the wonder-worker to fill that see, and was illustrious not only for his preaching but because he suffered martyrdom by fire.
      - type: text
        text: Upon the same day, under the Emperor Maximinus, [in the fourth century,] the holy martyr Rufinus, Bishop of the Marsi, and his Companions.
      - type: text
        text: At Évreux, [in the fifth century,] the holy Confessor Taurinus, who was ordained [first] Bishop of that city by blessed Pope Clement. He spread the Christian faith by his preaching of the gospel, and after much labour for that end fell asleep in the Lord, famous for miracles.
      - type: text
        text: At Cambrai, in Gaul, [in the year 614,] the holy Confessor Gaugeric [St. Géry], Bishop of that see.
      - type: text
        text: In the province of Valeria, on the Danube, [about the year 540,] the holy Abbot Equitius, whose holiness is attested by the witness of blessed Pope Gregory.
      - type: text
        text: At Todi, the holy Virgin Digna.
      la:
      - type: text
        text: Tértio Idus Augústi
      - type: text
        text: ''
      - type: text
        text: Romæ, inter duas Lauros, natális sancti Tiburtii Mártyris, qui, sub Iúdice Fabiáno, in persecutióne Diocletiáni, cum Christum, nudis plantis super carbónes ardéntes ingréssus, maióri confiterétur constántia, duci in tértium ab Urbe milliárium atque ibídem gládio animadvérti iubétur.
      - type: text
        text: Item Romæ sanctæ Susánnæ Vírginis, quæ, cum ex nóbili prosápia esset orta et beáti Caii Pontíficis neptis, martýrii palmam, témpore Diocletiáni, cápitis obtruncatióne proméruit.
      - type: text
        text: Assísii, in Umbria, natális sanctæ Claræ Vírginis, primæ plantæ Páuperum Dominárum Ordinis Minórum; quam, vita et miráculis célebrem, Alexánder Papa Quartus in númerum sanctárum Vírginum rétulit. Ipsíus tamen festum sequénti die celebrátur.
      - type: text
        text: Cománæ, in Ponto, sancti Alexándri Epíscopi, cognoménto Carbonárii, qui, ex philósopho disertíssimo eminéntem Christiánæ humilitátis sciéntiam adéptus, et a sancto Gregório Thaumatúrgo in thronum illíus Ecclésiæ sublimátus, non solum prædicatióne, sed étiam consummáto per ignem martýrio fuit illústris.
      - type: text
        text: Eódem die pássio sanctórum Rufíni, Marsórum Epíscopi, et Sociórum eius, sub Maximíno Imperatóre.
      - type: text
        text: Apud Ebroicénses, in Gállia, sancti Tauríni Epíscopi, qui, a beáto Cleménte Papa ordinátus illíus civitátis Epíscopus, Evangélii prædicatióne Christiánam fidem propagávit, ac, multis pro ea suscéptis labóribus, miraculórum glória conspícuus obdormívit in Dómino.
      - type: text
        text: Cameráci, in Gállia, sancti Gaugeríci, Epíscopi et Confessóris.
      - type: text
        text: In província Valériæ sancti Equítii Abbátis, cuius sánctitas testimónio beáti Gregórii Papæ comprobátur.
      - type: text
        text: Tudérti, in Umbria, sanctæ Dignæ Vírginis.
  psalm.t-rtio-idus-dec-mbris-05c1e21e7f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 11th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Confessor Pope Damasus (of Spain), who condemned the arch-heretic Apollinaris, and restored to his papacy Peter, Pope of Alexandria, who had been driven into exile moreover, he found the bodies of many holy martyrs, and caused to be engraved upon their tombstones verses composed by himself. (He died in the year 384.) Likewise at Rome, the holy martyr Thrason, who fed at his own expense Christians who were in prison or sent to work in the baths, or at other public works. He was arrested by order of the Emperor Maximian, and crowned with martyrdom along with two others named Pontian and Pretextatus, (about the year 293.)
      - type: text
        text: At Amiens, under the same Emperor Maximian, the holy martyrs Victoricus and Fuscian. Rictiovarus the President had iron spikes driven into their nostrils and ears, and redhot nails hammered into their temples after which their eyes were torn out, their bodies pierced with darts, and their heads cut off, and so they and holy Gentian, their host, passed away to be for ever with the Lord, (in the year 303.)
      - type: text
        text: (At Astrahara, near Persepolis,) in Persia, the holy martyr Barsabas, (with ten monks, whose Abbot he was, in the year 342, at the beginning of the great persecution under Sapor II.)
      - type: text
        text: In Spain, the holy martyr Eutychius.
      - type: text
        text: At Piacenza, holy Sabinus, Bishop of that see, (in the fourth century,) famous for miracles.
      - type: text
        text: At Constantinople, (about the year 489,) holy Daniel the Stylite.
      la:
      - type: text
        text: Tértio Idus Decémbris
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Dámasi Primi, Papæ et Confessóris; qui Apollinárem hæresiárcham damnávit, et Petrum, Epíscopum Alexandrínum, fugátum restítuit; multa étiam sanctórum Mártyrum córpora invénit, eorúmque memórias vérsibus exornávit.
      - type: text
        text: Item Romæ pássio sancti Trasónis, qui, cum Christiános laborántes in thermis, aliísque opéribus públicis fatigátos, et in cárcere pósitos, de suis facultátibus áleret, iussu Maximiáni tentus est, et cum áliis duóbus, id est Pontiáno et Prætextáto, martýrio coronátus.
      - type: text
        text: Ambiáni, in Gállia, sanctórum Mártyrum Victórici et Fusciáni, sub eódem Imperatóre, in quorum náribus et áuribus iussit Rictiovárus Præses immítti tarínchas, et clavis ardéntibus témpora transfígi, deínde óculos evélli, ac póstmodum eórum córpora iaculári; sicque, una cum sancto Gentiáno, eórum hóspite, capítibus amputátis, migravérunt ad Dóminum.
      - type: text
        text: In Pérside sancti Bársabæ Mártyris.
      - type: text
        text: In Hispánia sancti Eutýchii Mártyris.
      - type: text
        text: Placéntiæ sancti Sabíni Epíscopi, miráculis clari.
      - type: text
        text: Constantinópoli sancti Daniélis Stylítæ.
  psalm.t-rtio-idus-febru-rii-aeb28d3a10:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Gilbert, founder of the Order of Sempringham, of whom mention hath been made upon the 4th day of this present month of February. Likewise on the morrow we keep the feast of the Seven holy Founders of the Order of Servants of the Blessed Virgin Mary, who after great hardship of life, famous for works and wonders, died a death precious in the sight of the Lord, upon Monte Senario, in Tuscany. The same spirit of brotherhood had made them one in life, the veneration of the people had not divided them in death, and Leo XIII enrolled their names together among those of the Saints.
      - type: citation
        text: 'Upon the same 11th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Africa, [in the year 304,] the holy martyrs the Priest Saturninus, Dativus, Felix, Ampelius, and their Companions, who were taken by the soldiers in the persecution under the Emperor Diocletian when they came together in one, as the use is, to hold the Lord's Supper, and suffered under the proconsul Anolinus.
      - type: text
        text: In Numidia are commemorated many holy martyrs who were arrested, [in the year 303 or 304,] in the persecution aforesaid, and for as much as they would not obey the edict of the Emperor to give up the Scriptures of God, they were put to grievous torments and slain.
      - type: text
        text: At Adrianople, the holy martyrs Lucius, Bishop [of Adrianople,] and his Companions. He suffered much from the Arians under the Emperor Constantius, and finished his testimony in chains, [in the year 348.] The others were some of the nobler of the citizens who were condemned to death by Count Philagrius because they refused to receive the Arians who had been then condemned in the Council of Sardica.
      - type: text
        text: At Lyon, [in the year 608,] the holy martyr Desiderius, Bishop of Vienne, [in Gaul.]
      - type: text
        text: At Ravenna, [about the year 170,] the holy Confessor Calocerus, Bishop of that see.
      - type: text
        text: At Milan, [in the year 449,] the holy Lazarus, Bishop of that see.
      - type: text
        text: At Capua, [in the year 450,] holy Castrensis, Bishop of that see.
      - type: text
        text: At the village of Landon, [in the year 507,] holy Severinus, Abbot of the monastery of St Maurice, at whose prayers the servant of God, King Clovis, was healed of a long malady.
      - type: text
        text: In Egypt, [about the middle of the fourth century,] the holy monk Jonah, renowned for his graces.
      la:
      - type: text
        text: Tértio Idus Februárii
      - type: text
        text: ''
      - type: text
        text: Lapúrdi, in Gállia, Apparítio beátæ Maríæ Vírginis Immaculátæ.
      - type: text
        text: Hadrianópoli, in Thrácia, sanctórum Mártyrum Lúcii Epíscopi, et Sociórum eius, sub Constántio. Ipse Lúcius, ab Ariánis multa perpéssus, in vínculis martýrium consummávit; céteri vero nobilióres cívium, cum Ariános, in Sardicénsi Concílio tunc damnátos, recípere noluíssent, a Philágrio Cómite capitálem senténtiam excepérunt.
      - type: text
        text: In Africa natális sanctórum Mártyrum Saturníni Presbýteri, Datívi, Felícis, Ampélii et Sociórum, qui, in persecutióne Diocletiáni, cum ad Domínicum ex more celebrándum conveníssent, idcírco, a milítibus comprehénsi, sub Anolíno Procónsule passi sunt.
      - type: text
        text: In Numídia commemorátio plurimórum sanctórum Mártyrum, qui in eádem persecutióne comprehénsi sunt, et, cum iuxta Imperatóris edíctum divínas Scriptúras trádere noluíssent, gravíssimis excruciáti sunt supplíciis, ac tandem occísi.
      - type: text
        text: Romæ sancti Gregórii Papæ Secúndi, qui Leónis Isaúrici impietáti acérrime réstitit, et sanctum Bonifátium ad prædicándum Evangélium in Germániam misit.
      - type: text
        text: Item Romæ sancti Paschális Papæ Primi, qui plúrima sanctórum Mártyrum córpora levávit e cryptis, eáque in divérsis Urbis Ecclésiis honorífice collocávit.
      - type: text
        text: Ravénnæ sancti Calóceri, Epíscopi et Confessóris.
      - type: text
        text: Medioláni sancti Lázari Epíscopi.
      - type: text
        text: Cápuæ sancti Castrénsis Epíscopi.
      - type: text
        text: In Castro Nantoniénsi, in Gállia, sancti Severíni, qui fuit Abbas monastérii Agaunénsis, suísque précibus cultórem Dei, Regem Clodovéum, a diútina infirmitáte liberávit.
      - type: text
        text: In Ægýpto sancti Ionæ Mónachi, virtútibus clari.
      - type: text
        text: Viénnæ, in Gállia, Translátio córporis sancti Desidérii, Epíscopi et Mártyris, ex território Lugdunénsi, in quo ipse olim passus fúerat décimo Kaléndas Iúnii.
  psalm.t-rtio-idus-i-lii-7de2a88634:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 13th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Pope Anaclete, who governed the Church of God after holy Clement, and adorned the same with a glorious testimony, [in the year 91 or 96.]
      - type: text
        text: On the same day, the holy Prophets Joel and Ezra, [two of the twelve minor Prophets, in the seventh and fifth centuries, B.C.]
      - type: text
        text: In Macedonia, blessed Silas, who was one of the first of the Brethren, and was sent by the Apostles to the churches of the Gentiles along with Paul and Barnabas. He was full of the grace of God, earnestly discharged his duty of preaching, and when he had glorified Christ in his sufferings, afterwards fell asleep. Also the holy martyr Serapion, who under the Emperor Severus and the President Aquila attained through fire unto the crown of martyrdom.
      - type: text
        text: In the island of Chios, the holy martyr Myropis, who under the Emperor Decius and the President Numerian was broken with bars, and so passed away to be with the Lord.
      - type: text
        text: In Africa, the holy Confessors Eugenius, Bishop of Carthage, glorious for faith and good works, and all the Clergy of that church, to the number of five hundred or more, [in the year 505,] in the persecution of the Vandals, under the Arian King Hunneric, suffered stripes and hunger among whom were very many Readers that were little children and were driven into cruel exile but rejoicing in the Lord. Among the noblest of them were the Archdeacon named Salutaris, and Murrita the second in the ministry, who became Confessors for the third time, and are illustrious for their glorious steadfastness unto Christ.
      - type: text
        text: In Brittany, the holy Confessor Turiaf, Bishop [of the ancient see of Dol,] a man of marvellous simplicity and innocency, [in the year 749.]
      la:
      - type: text
        text: Tértio Idus Iúlii
      - type: text
        text: ''
      - type: text
        text: Bambérgæ natális sancti Henríci Primi, Imperatóris Romanórum et Confessóris, qui cum sancta Cunegúnde, uxóre sua, perpétuam virginitátem servávit, et sanctum Stéphanum, Hungarórum Regem, cum univérso fere ipsíus regno, ad fidem Christi suscipiéndam perdúxit. Eius autem festívitas Idibus mensis huius celebrátur.
      - type: text
        text: In Palæstína sanctórum Ioélis et Esdræ Prophetárum.
      - type: text
        text: In Macedónia beáti Silæ, qui, cum esset unus de primis frátribus et ab Apóstolis ad Ecclésias Géntium, una cum Paulo et Bárnaba, destinátus, prædicatiónis offícium, grátia Dei plenus, instánter consummávit, atque, in passiónibus suis Christum claríficans, póstmodum requiévit.
      - type: text
        text: Item sancti Serapiónis Mártyris, qui, sub Sevéro Imperatóre et Aquila Prǽside, per ignem pervénit ad corónam martýrii.
      - type: text
        text: In ínsula Chio sanctæ Myrópis Mártyris, quæ sub Décio Imperatóre et Numeriáno Prǽside, véctibus contúsa, migrávit ad Dóminum.
      - type: text
        text: In Africa sanctórum Confessórum Eugénii, Carthaginénsis Epíscopi, fide ac virtútibus gloriósi, et univérsi cleri eiúsdem Ecclésiæ, qui fere quingénti, vel eo ámplius, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, cæde inediáque maceráti (inter quos plúrimi erant Lectóres infántuli), gaudéntes in Dómino, exsílio crudéli procul extrúsi sunt. Erant étiam nobilíssimi in eis Archidiáconus, nómine Salutáris, et Murítta, secúndus in offício ministrórum; qui, tértio Confessóres effécti, ambo glorióse in Christo, perseverántiæ título, illustráti sunt.
      - type: text
        text: In Británnia minóre sancti Turiávi, Epíscopi et Confessóris, miræ simplicitátis et innocéntiæ viri.
  psalm.t-rtio-idus-i-nii-e8405931d5:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 11th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Apostle Barnabas. He was a Cypriot by birth, was by the disciples ordained an Apostle to the Gentiles along with Paul, and went through many countries with him doing that work of preaching the Gospel which had been laid upon them. In the end he went home to Cyprus, where he crowned the dignity of the Apostolate with the glory of martyrdom. Through a revelation from himself his body was discovered in the time of the Emperor Zeno, having with it a copy of the Gospel according to Matthew written with his own hand.
      - type: text
        text: At Aquileia, the holy brethren Felix and Fortunatus, both martyrs. In the persecution under Diocletian and Maximian they were hung upon the rack, and lighted lamps put to their sides, but these were extinguished by the power of God. Boiling oil was poured into their bellies, and at last, forasmuch as they still stood firm in confessing Christ, they were beheaded.
      - type: text
        text: At Bologna, [in the year 1267,] the holy Confessor Parisius, a monk of the Order of Camaldoli.
      - type: text
        text: At Rome is commemorated the translation of the body of holy Gregory of Nazianzus. This sacred body had been brought to Rome from Constantinople and had lain for a long time in the church of the Mother of God at the Campus Martius, when the Supreme Pontiff Gregory XIII, [in the year 1580,] removed it with great pomp to the chapel which he had splendidly decorated in the Basilica of St Peter, and there laid it under the altar with due honour.
      la:
      - type: text
        text: Tértio Idus Iúnii
      - type: text
        text: ''
      - type: text
        text: Salamínæ, in Cypro, natális sancti Bárnabæ Apóstoli, qui, natióne Cýprius, cum Paulo Géntium Apóstolus a discípulis ordinátus, multas regiónes cum eo peragrávit, iniúnctum sibi opus Evangélicæ prædicatiónis exércens; postrémo, Cyprum proféctus, ibi Apostolátum suum glorióso martýrio decorávit. Eius corpus, témpore Zenónis Imperatóris, ipso Bárnaba revelánte, repértum est, una cum códice Evangélii sancti Matthǽi, eiúsdem Bárnabæ manu descrípto.
      - type: text
        text: Salmánticæ, in Hispánia, item natális sancti Ioánnis a sancto Facúndo, ex Eremitárum sancti Augustíni Ordine, Confessóris; qui fídei zelo, sanctimónia vitæ ac miráculis cláruit. Ipsíus autem festívitas sequénti die celebrátur.
      - type: text
        text: Aquiléiæ pássio sanctórum Felícis et Fortunáti fratrum, qui, in persecutióne Diocletiáni et Maximiáni, equúleo suspénsi, atque, ardéntibus lampádibus circa eórum látera appósitis et mox divína virtúte exstínctis, per ventrem fervénti oleo sunt perfúsi; et ad últimum, cum in Christi confessióne persísterent, gloriósi certáminis cursum, obtruncáti cápite, implevérunt.
      - type: text
        text: Bremæ natális sancti Rembérti, Hamburgénsis ac Breménsis Epíscopi.
      - type: text
        text: Tarvísii sancti Parísii, civis Bononiénsis, Confessóris et Mónachi, ex Ordine Camaldulénsi.
      - type: text
        text: Romæ Translátio sancti Gregórii Nazianzéni, Epíscopi, Confessóris atque Ecclésiæ Doctóris; cuius sacrum corpus, e Constantinópoli ántea delátum ad Urbem, atque in Ecclésia sanctæ Dei Genitrícis ad Campum Mártium diu asservátum, Gregórius Décimus tértius, Póntifex Máximus, in Capéllam, a se in Basílica sancti Petri magnificentíssime exornátam, summa celebritáte tránstulit, ac postrídie digno honóre sub altári cóndidit.
  psalm.t-rtio-idus-ianu-rii-ed2dd3d61a:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 11th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Pope Hyginus, who achieved martyrdom gloriously in the persecution under the Emperor Antonine.
      - type: text
        text: In Africa, (about the year 142,) the blessed martyr Salvius, upon whose feast-day holy Augustine preached to the people of Carthage.
      - type: text
        text: At Alexandria, the holy martyrs Peter, Severus, and Leucius.
      - type: text
        text: At Fermo, in Picenum, the holy martyr Alexander, Bishop (of that see.)
      - type: text
        text: At Amiens, the holy martyr Salvius, Bishop of that see, (in the beginning of the seventh century.)
      - type: text
        text: At Brindisi, the holy Confessor Leucius, Bishop of that see, (in the end of the second century.)
      - type: text
        text: At Marissa, in Cappadocia, the holy Abbot Theodosius, (head of all the monasteries of Palestine,) who suffered many things for the Catholic faith, but at length fell asleep in peace, (in the year 529.)
      - type: text
        text: In the Thebaid, (about the year 330,) the holy Abbot Palaemon, the teacher of holy Pachom.
      - type: text
        text: At Castel-Saint-Elie, (about the year 577,) hard by Mount Soracte, the holy monk Anastasius and his Companions, whom the Lord called to pass away unto Him.
      - type: text
        text: At Pavia, the holy virgin Honorata, (in the year 500.)
      la:
      - type: text
        text: Tértio Idus Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Hygíni, Papæ et Mártyris; qui, in persecutióne Antoníni, glorióse martýrium consummávit.
      - type: text
        text: Item Romæ natális sancti Melchíadis, Papæ et Mártyris; qui multa, in persecutióne Maximiáni, passus est, atque, réddita Ecclésiæ pace, quiévit in Dómino. Ipsíus autem festívitas quarto Idus Decémbris celebrátur.
      - type: text
        text: Firmi, in Picéno, sancti Alexandrí, Epíscopi et Mártyris.
      - type: text
        text: Ambiáni, in Gállia, sancti Sálvii, Epíscopi et Mártyris.
      - type: text
        text: In Africa beáti Sálvii Mártyris, in cuius natáli sanctus Augustínus sermónem hábuit ad pópulum Carthaginénsem.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Petri, Sevéri et Leúcii.
      - type: text
        text: Brundúsii sancti Leúcii, Epíscopi et Confessóris.
      - type: text
        text: In Iudǽa sancti Theodósii Cœnobiárchæ, in vico Cappadóciæ Magariásso nati; qui, multa passus pro fide cathólica, in pace tandem quiévit in eo monastério, quod ille super solitárium Hierosolymitánæ diœcésis montem exstrúxerat.
      - type: text
        text: In Thebáide sancti Palamónis Abbátis, qui fuit mágister sancti Pachómii.
      - type: text
        text: Suppentóniæ, apud montem Soráctem, sancti Anastásii Mónachi, et Sociórum; qui, divínitus vocáti, felíciter migravérunt ad Dóminum.
      - type: text
        text: Papíæ sanctæ Honorátæ Vírginis.
  psalm.t-rtio-idus-m-rtii-fc3fd9d2d8:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 13th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Nicomedia, the holy martyrs Macedonius, Patricia his wife, and Modesta their daughter, [in the year 303]
      - type: text
        text: At Nice, the holy martyrs Theusetas and Horres his son, Theodora, Nymphodora, Mark, and Arabia, who were all delivered over to the flames for Christ's sake.
      - type: text
        text: At Eshman, in Egypt, the holy martyr Sabinus, who after suffering many things, was at length drowned in the Nile, [in the year 287. He is said to have been denounced by a beggar he maintained by his alms.]
      - type: text
        text: In Persia, the holy Virgin and martyr Christina.
      - type: text
        text: At Cordova, the holy martyrs Roderick the Priest and Salomon, [in the year 857.]
      - type: text
        text: At Constantinople, holy Nicephorus, Bishop of that see. He was a zealous upholder of the traditions of the Fathers, and for the honouring of holy images constantly withstood the Iconoclast Emperor Leo the Armenian, by whom he was sent into exile, where he suffered a lingering martyrdom for fourteen years, and then passed away to be ever with the Lord, [in the year 828.]
      - type: text
        text: At Camerino, the holy Confessor Ansovinus, Bishop of that see, [in the year 840.]
      - type: text
        text: In the Thebaid, the holy Virgin Euphrasia, [in the year 412.]
      la:
      - type: text
        text: Tértio Idus Mártii
      - type: text
        text: ''
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Ruderíci Presbýteri, et Salomónis.
      - type: text
        text: Nicomedíæ natális sanctórum Mártyrum Macedónii, Patríciæ uxóris, et Modéstæ fíliæ.
      - type: text
        text: Nicǽæ, in Bithýnia, sanctórum Mártyrum Theusétæ, eiúsque fílii Horris, Theodóræ, Nymphodóræ, Marci et Arábiæ; qui omnes pro Christo igni tráditi sunt.
      - type: text
        text: Hermópoli, in Ægýpto, sancti Sabíni Mártyris, qui multa passus, tandem, proiéctus in flumen, martýrium consummávit.
      - type: text
        text: In Pérside sanctæ Christínæ, Vírginis et Mártyris.
      - type: text
        text: Apud Camerínum sancti Ansovíni, Epíscopi et Confessóris.
      - type: text
        text: In Thebáide deposítio sanctæ Euphrásiæ Vírginis.
      - type: text
        text: Constantinópoli Translátio sancti Nicéphori, Epíscopi eiúsdem urbis et Confessóris; cuius corpus e Proconnéso, Propóntidis ínsula, ubi ipse quarto Nonas Iúnii ob sanctárum Imáginum cultum exsul obíerat, Constantinópolim relátum est, atque a sancto illíus civitátis Epíscopo Methódio, honorífice in templo sanctórum Apostolórum sepúltum, hac ipsa recurrénte die, in qua olim idem Nicéphorus in exsílium fúerat deportátus.
  psalm.t-rtio-idus-maii-9c9401b6a3:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Virgin Walburg, of whom mention is made upon the 1st day of May.
      - type: text
        text: Upon the same 13th day of May is kept at Rome the dedication of the church of St. Mary-of-the-Martyrs; this building was called the Pantheon or temple of All the gods, but the blessed Pope Boniface IV cleansed that old temple, and consecrated it in honour of the blessed Mary, always a Virgin, and of All Martyrs, in the time of the Emperor Phocas.
      - type: text
        text: 'On the same day, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Constantinople, the blessed martyr Mucius, the Priest. Under the Emperor Diocletian and the Pro-Consul Laodicius, he was first tormented at Amphipolis with many pains and sufferings, on account of his confession of Christ, and afterwards brought to Byzantium, where he was beheaded.
      - type: text
        text: At Heraclea, the holy martyr Glyceria of Rome, who suffered under the Emperor Antoninus and the President Sabinus.
      - type: text
        text: At Alexandria are commemorated a great number of holy martyrs who were massacred by the Arians in the church of Theona, on account of the Catholic faith, [in the year 372.]
      - type: text
        text: At Utrecht, holy Servatius, Bishop of the Church of Tongres. His worthiness was strikingly set forth to all by this, that when everything round about was covered with snow in the winter time, his grave was never covered therewith until a Cathedral Church was built over it by the industry of the citizens.
      - type: text
        text: In Palestine, [in the year 558,] holy John, surnamed the Silent.
      - type: text
        text: At Valladolid, [in the year 1456,] the holy Confessor Peter Regalati, a Friar Minor, the restorer of the regular observance in the Convents of Spain. The Supreme Pontiff Benedict XIV enrolled his name with those of the Saints.
      la:
      - type: text
        text: Tértio Idus Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Robérti Bellarmíno, e Societáte Iesu, Cardinális atque olim Epíscopi Capuáni, Confessóris et Ecclésiæ Doctóris, cuius dies natális décimo quinto Kaléndas Octóbris recensétur.
      - type: text
        text: Romæ Dedicátio Ecclésiæ sanctæ Maríæ ad Mártyres, quam beátus Bonifátius Papa Quartus, expurgáto deórum ómnium véteri fano, quod Pántheon vocabátur, in honórem beátæ semper Vírginis Maríæ et ómnium Mártyrum dedicávit, témpore Phocæ Imperatóris. Ipsíus vero Dedicatiónis ánnuam solemnitátem póstmodum Summus Póntifex Gregórius item Quartus ab univérsa Ecclésia, et in honórem quidem ómnium Sanctórum, Kaléndis Novémbris agéndam esse constítuit.
      - type: text
        text: Constantinópoli beáti Múcii, Presbýteri et Mártyris; qui, sub Diocletiáno Imperatóre et Laudício Procónsule, prius Amphípoli, in Macedónia, multis pœnis atque cruciátibus ob Christi confessiónem afflíctus, póstea, Byzántium usque perdúctus, capitáli senténtia occúbuit.
      - type: text
        text: Alexandríæ commemorátio plurimórum sanctórum Mártyrum, qui, ob fidem cathólicam, ab Ariánis in Ecclésia Theónæ occísi sunt.
      - type: text
        text: Heracléæ, in Thrácia, sanctæ Glycériæ, Mártyris Románæ, quæ, sub Antoníno Imperatóre et Sabíno Prǽside, cum fuísset plúrimis ac diris tentáta supplíciis et ab his divína ope incólumis evasísset, tandem feris est obiécta, earúmque una, morsum córpori ipsíus infigénte, spíritum Deo réddidit.
      - type: text
        text: Apud Traiéctum sancti Servátii, Tungrénsis Ecclésiæ Epíscopi; ad cuius méritum ómnibus demonstrándum, dum témpore híemis ómnia in circúitu nix repléret, sepúlcrum eius numquam opéruit, donec, ex indústria cívium, Basílica super illud ædificáta est.
      - type: text
        text: In Palæstína sancti Ioánnis Silentiárii, qui, Coloniénsi in Arménia Episcopátu dimísso, in sancti Sabbæ laura monásticam vitam duxit, et sancto fine quiévit.
      - type: text
        text: Pódii, in diœcési Pictaviénsi, sancti Andréæ Hubérti Fournet, Confessóris, olim párochi, Institúti Filiárum a Cruce una cum sancta Elísabeth Bichier des Ages Fundatóris, quem Pius Papa Undécimus Sanctórum fastis adscrípsit.
  psalm.t-rtio-idus-nov-mbris-09ac7ec98f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 11th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Tours, in Gaul, (in the year 397,) the blessed Confessor Martin, Bishop of that see. His life was remarkable for extraordinary miracles he raised three persons from the dead.
      - type: text
        text: At Cotyaeus, in Phrygia, the glorious passion of the holy Egyptian soldier Mennas. During the persecution under Diocletian he cast away his military belt, and served the King of Heaven in secret in the desert then he went forth, and freely declared himself to be a Christian. He was first examined with horrid tortures, then as he was kneeling in prayer, giving thanks to our Lord Jesus Christ, he was beheaded, (in the year 305.) After his death he was famous for many miracles.
      - type: text
        text: At Ravenna, the holy martyrs Valentine, Felician, and Victorine, who were crowned in the persecution under the Emperor Diocletian.
      - type: text
        text: In Mesopotamia, in the persecution under the same Diocletian and Eleusius the President, the holy martyr Athenodorus. He was tormented with fire and other torments, and then condemned to be beheaded but the executioner fell to the earth, and no other dared to smite him with the sword, and as he prayed he fell asleep in the Lord.
      - type: text
        text: At Lyon, the holy Bishop Veran, whose life was illustrious for his faith and other graces.
      - type: text
        text: In the monastery of Grotta-Ferrata, near Frascati, (in the year 1054,) the holy Abbot (of Grotta-Ferrata,) Bartholomew, a companion of blessed Nilus, and the writer of his life.
      - type: text
        text: In the province of Samnium, the blessed hermit, Mennas, whose graces and miracles are recorded by holy Pope Gregory.
      la:
      - type: text
        text: Tértio Idus Novémbris
      - type: text
        text: ''
      - type: text
        text: Turónis, in Gállia, natális beáti Martíni, Epíscopi et Confessóris; cuius vita tantis éxstitit miráculis gloriósa, ut trium mortuórum suscitátor esse merúerit.
      - type: text
        text: Cotyǽi, in Phrýgia, insígnis pássio sancti Mennæ, Ægýptii mílitis, qui, in persecutióne Diocletiáni, postquam, abiécto milítiæ cíngulo, méruit cælésti Regi secréta conversatióne in erémo militáre, procéssit in públicum, et, se Christiánum líbera voce declárans, primo diris cruciátibus examinátur; novíssime, fixis in oratióne génibus, Dómino Iesu Christo grátias agens, gládio cæsus est, ac multis post mortem miráculis cláruit.
      - type: text
        text: Ravénnæ sanctórum Mártyrum Valentíni, Feliciáni et Victoríni; qui in Diocletiáni persecutióne coronáti sunt.
      - type: text
        text: In Mesopotámia sancti Athenodóri Mártyris, qui, sub eódem Diocletiáno et Eléusio Prǽside, ígnibus cruciátus et áliis supplíciis tortus, demum cápitis damnátus est, et, cum cárnifex corruísset neque ullus álius gládio illum ferire ausus esset, orans obdormívit in Dómino.
      - type: text
        text: Lugdúni, in Gállia, sancti Veráni Epíscopi, cuius vita fuit fide et virtútum méritis illústris.
      - type: text
        text: Constantinópoli sancti Theodóri, Abbátis Studítæ, qui, pro fide cathólica advérsus Iconoclástas strénue pugnans, factus est apud univérsam Ecclésiam cathólicam célebris.
      - type: text
        text: In monastério Cryptæ Ferrátæ, in agro Tusculáno, sancti Bartholomǽi Abbátis, qui fuit sócius beáti Nili, eiúsque vitam conscrípsit.
      - type: text
        text: In província Sámnii beáti Mennæ solitárii, cuius virtútes et mirácula sanctus Gregórius Papa commémorat.
  psalm.t-rtio-idus-oct-bris-f54d597d0c:
    role: psalm
    content:
      en:
      - type: text
        text: Of holy Edward, King of England, who died upon the 5th day of January, but whose feast is kept upon the 13th day of October, which is that of the translation of his body.
      - type: citation
        text: 'Upon the same 13th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Troas, in Asia Minor, holy Carpus, the disciple of the blessed Apostle Paul.
      - type: text
        text: At Cordova, in Spain, (in the persecution under the Emperor Diocletian,) the holy martyrs Faustus, Januarius, and Martial, who were first racked, then had their eyebrows, ears, and noses cut off, and their teeth drawn, and at last completed their suffering martyrdom by fire.
      - type: text
        text: At Thessalonica, the holy martyr Florence, who was put to diverse tortures and then burnt.
      - type: text
        text: In Austria, (in the eleventh century,) the holy martyr Colman.
      - type: text
        text: At Ceuta, in Morocco, (in the year 1221,) seven holy martyrs belonging to the Order of Friars Minor namely, Daniel, Samuel, Angelo, Domnus, Leo, Nicolas, and Hugolin for their preaching of the Gospel and their confutation of the Mohammedan religion, the Saracens inflicted upon them insults, chains, and stripes, and then beheaded them and so they gained the palm of martyrdom.
      - type: text
        text: At Antioch, (towards the end of the second century,) the holy Patriarch Theophilus, the sixth after the blessed Apostle Peter, who held the bishopric of that church.
      - type: text
        text: At Tours, (in the fifth century,) the holy Confessor Venantius, Abbot (of St. Martin's Monastery.)
      - type: text
        text: At Subiaco, in Latium, the holy Virgin Chelidonia.
      la:
      - type: text
        text: Tértio Idus Octóbris
      - type: text
        text: ''
      - type: text
        text: Sancti Eduárdi, Regis Anglórum et Confessóris, qui Nonis Ianuárii obdormívit in Dómino, sed hac die, ob Translatiónem córporis eius, potíssimum cólitur.
      - type: text
        text: Apud Tróadem, Asiæ minóris urbem, natális sancti Carpi, qui fuit discípulus beáti Pauli Apóstoli.
      - type: text
        text: Córdubæ, in Hispánia, item natális sanctórum Mártyrum Fausti, Ianuárii et Martiális; qui, primo equúlei pœna cruciáti, deínde, supercíliis rasis, déntibus evúlsis, áuribus quoque et náribus præcísis, ignis passióne martýrium consummárunt.
      - type: text
        text: Thessalonícæ sancti Floréntii Mártyris, qui, post vária torménta, igne combústus est.
      - type: text
        text: Apud Stokeráviam, in Austria, sancti Colmánni Mártyris.
      - type: text
        text: Antiochíæ sancti Theóphili Epíscopi, qui, sextus post beátum Petrum Apóstolum, eiúsdem Ecclésiæ Pontificátum ténuit.
      - type: text
        text: Turónis, in Gállia, sancti Venántii, Abbátis et Confessóris.
      - type: text
        text: Apud Sublácum, in Látio, sanctæ Chelidóniæ Vírginis.
  psalm.t-rtio-idus-sept-mbris-18cbc02829:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 11 th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the old Salarian Way, at the cemetery of Basilla, the holy brethren Protus and Hyacinth, both martyrs. They were eunuchs who belonged to blessed Eugenia.
      - type: text
        text: Under the Emperor Gallienus they were arrested on the charge that they were Christians, and, forasmuch as they could not be made to offer sacrifice, they were first grievously beaten, and then beheaded.
      - type: text
        text: At Laodicea, in Syria, the holy martyrs Diodorus, Diomede, and Didymus.
      - type: text
        text: At Leon, in Spain, (in the middle of the sixth century,) the holy martyr Vincent, Abbot (of the monastery of St Claudius.)
      - type: text
        text: In Egypt, holy Paphnutius, Bishop (in the Thebaid.) He was one of those Confessors who under the Emperor Galerius Maximinus had his right eye put out and his left hough cut, and was condemned to penal servitude in the mines. Under the Emperor Constantine the Great he strove stalwartly for the Catholic faith against the Arians, and at length fell asleep in peace, crowned with many crowns.
      - type: text
        text: At Lyons, (toward the close of the fifth century,) deceased the holy (Confessor) Patient, Bishop (of that see.) At Vercelli, (in the sixth century,) the holy (Confessor) Emilian, Bishop (of that see.) At Alexandria, (in the fifth century,) holy Theodora, who, having carelessly transgressed and deeply repented, continued unknown in the holy habit in wondrous self- denial and longsuffering, until her death.
      la:
      - type: text
        text: Tértio Idus Septémbris
      - type: text
        text: ''
      - type: text
        text: Romæ, via Salária véteri, in cœmetério Basíllæ, natális sanctórum Mártyrum Proti et Hyacínthi fratrum, eunuchórum beátæ Eugéniæ. Hi, sub Galliéno Imperatóre, deprehénsi quod essent Christiáni, sacrificáre cogúntur; sed non consentiéntes, primo duríssime verberáti sunt, ac tandem páriter decolláti.
      - type: text
        text: Legióne, in Hispánia, sancti Vincéntii, Abbátis et Mártyris.
      - type: text
        text: Laodicéæ, in Sýria, pássio sanctórum Diodóri, Diomédis et Dídymi.
      - type: text
        text: In Ægýpto sancti Paphnútii Epíscopi, qui unus fuit ex iis Confessóribus, qui, sub Galério Maximiáno Imperatóre, dextro óculo effósso et sinístro póplite excíso, ad metálla damnáti fuérunt; deínde, sub Constantíno Magno, advérsus Ariános, pro fide cathólica, strénue decertávit; et demum, multis corónis auctus, in pace quiévit.
      - type: text
        text: Lugdúni, in Gállia, deposítio sancti Patiéntis Epíscopi.
      - type: text
        text: Vercéllis sancti Æmiliáni Epíscopi.
      - type: text
        text: Alexandríæ sanctæ Theodóræ, quæ, cum incáute deliquísset, inde, facti pǽnitens, mirábili abstinéntia et patiéntia in hábitu sancto perseverávit incógnita usque ad mortem.
  psalm.t-rtio-kal-ndas-apr-lis-5fae7a3d12:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 30th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Appian Way, the Blessed Tribune Quirinus, [in the year 130.] Holy Pope Alexander was committed to ward with him, and by the same he and all his house were baptized. Under the Emperor Hadrian he was brought before the Judge Aurelian, and as he remained steadfast in the faith, his tongue was cut out, he was racked, and his hands and feet cut off, and at last his contending was finished by the sword.
      - type: text
        text: At Thessalonica, the holy martyrs Domninus, Victor, and their Companions, [perhaps under Maximianus.]
      - type: text
        text: At Constantinople is made the commemoration of very many holy martyrs, Catholic communicants whom in the time of the Emperor Constantius the arch-heretic Macedonius tortured and slew in diverse unheard-of ways. Among other things, he pinched off the nipples of the breasts of the faithful women with the lids of boxes, and seared the wound with hot iron.
      - type: text
        text: At Senlis, holy Regulus, Bishop of Arles, [and of Senlis, in the year 130.]
      - type: text
        text: At Orleans, in Gaul, holy Pastor, Bishop of that see, [perhaps in the year 557.]
      - type: text
        text: At Syracuse, [in Sicily,] the holy Confessor Zozimus, Bishop of that see, [in the year 660.]
      - type: text
        text: On Mount Sinai, holy John, Abbot [of Mount Sinai in the years 525-605,] surnamed Climacus, [which is, being interpreted, "of the ladder." He was probably a native of Palestine.]
      - type: text
        text: At Aquino, the holy Confessor Clinius. [Native of Greece, and a monk of Monte Casino, fifth century.]
      la:
      - type: text
        text: Tértio Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Romæ, via Appia, pássio beáti Quiríni Tribúni, patris sanctæ Balbínæ Vírginis, qui a beáto Alexándro Papa, quem habébat in custódia, cum omni domo sua baptizátus est; atque, sub Hadriáno Imperatóre, cum esset tráditus Aureliáno Iúdici, et in fídei confessióne persísteret, invíctus Christi miles, post linguæ abscissiónem, equúlei suspensiónem, manuúmque ac pedum detruncatiónem, martýrii agónem gládio consummávit.
      - type: text
        text: Thessalonícæ natális sanctórum Mártyrum Domníni, Victóris et Sociórum.
      - type: text
        text: Constantinópoli commemorátio sanctórum plurimórum Mártyrum cathólicæ communiónis, quos, Constántii témpore, Macedónius hæresiárcha, inaudítis tormentórum genéribus cruciátos, occídit; nam, inter cétera, fidélium mulíerum úbera inter compréssa arcárum labra dissécuit, et candénti ferro combússit.
      - type: text
        text: In castro Silvanecténsi, in Gállia, deposítio sancti Réguli, Arelaténsis Epíscopi.
      - type: text
        text: Auréliæ, in Gállia, sancti Pastóris Epíscopi.
      - type: text
        text: Syracúsis, in Sicília, sancti Zósimi, Epíscopi et Confessóris.
      - type: text
        text: In monte Sina sancti Ioánnis Climáci Abbátis.
      - type: text
        text: Aquilériæ, in Hispánia, sancti Petri Regaláti, in urbe Vallisoletána orti, Sacerdótis ex Ordine Minórum et Confessóris, reguláris disciplínæ in Hispániæ cœnóbiis restitutóris; quem Benedíctus Décimus quartus, Póntifex Máximus, Sanctórum fastis adscrípsit.
      - type: text
        text: Apud Aquínum sancti Clínii Confessóris.
  psalm.t-rtio-kal-ndas-aug-sti-af575340b0:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Germain, Bishop of Auxerre, a man illustrious alike for his birth, his faith, his teaching, and the glory of his miracles, who rid Britain of the Pelagian heresy, and of whom mention is made upon the morrow.
      - type: citation
        text: 'Upon the same 30th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Abdon and Sennen. These were Persians who were brought to Rome in bonds under Decius. They were first hided with scourges loaded with lead, and then slain with the sword.
      - type: text
        text: At Tuburbe, in Africa, the holy Virgin martyrs Maxima, Donatilla, and Secunda. In the persecution under Valerian and Gallienus, Maxima and Donatilla were given vinegar and gall to drink, then severely hided and racked, burnt over gratings, and rubbed with lime. Afterward, they were thrown to the beasts along with Secunda, a virgin of twelve years of age, but as the beasts would not touch them they were all slain with the sword.
      - type: text
        text: At Assisi, in Umbria, the holy martyr Rufinus.
      - type: text
        text: At Caesarea, in Cappadocia, [in the time of the Emperor Diocletian,] the holy martyr Julitta. She raised a law plea against a certain great man who had spoiled her goods, and he pleaded against her that being a Christian she could not be heard, whereupon the judge commanded her to offer some incense to the idols in order that she might be able to plead. She firmly refused, and was cast into the fire, where she resigned her soul to God, but the fire did not hurt her body. Her famous praises have been set forth by holy Basil the Great in a noble discourse.
      - type: text
        text: At Auxerre, [at the beginning of the sixth century,] the holy Confessor Ursus, Bishop [of that See.]
      la:
      - type: text
        text: Tértio Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Mártyrum Abdon et Sennen Persárum, qui, sub Décio, caténis alligáti et Romam addúcti, pro Christi fide prius plumbátis cæsi sunt, deínde gládio interfécti.
      - type: text
        text: Assísii, in Umbria, sancti Rufíni Mártyris.
      - type: text
        text: Tubúrbi Lucernáriæ, in Africa, pássio sanctárum Vírginum Máximæ, Donatíllæ et Secúndæ; quarum duæ primæ, in persecutióne Valeriáni et Galliéni, acéto et felle potátæ, deínde plagis acérrimis cæsæ et equúlei extensióne cruciátæ, cratículis étiam exústæ et calce perfricátæ, póstmodum cum Secúnda, Vírgine duódecim annórum, ad béstias simul proiéctæ, sed ab his intáctæ, novíssime gládio iugulátæ sunt.
      - type: text
        text: Cæsaréæ, in Cappadócia, sanctæ Iulíttæ Mártyris, quæ, cum bona sua, a quodam poténte sibi usurpáta, in iudício repéteret, atque ille exceptiónem daret quod ut Christiána non debéret audíri, mox a Iúdice iussa est thus idólis offérre, ut posset audíri. Quod illa constánter recúsans, in ignem coniécta est, sicque spíritum Deo réddidit; corpus autem a flamma remánsit illǽsum. Eius præcláras laudes sanctus Basilíus Magnus egrégio encómio celebrávit.
      - type: text
        text: Antisiodóri sancti Ursi, Epíscopi et Confessóris.
  psalm.t-rtio-kal-ndas-dec-mbris-df80e89d30:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Eve of the holy Apostle Andrew. On the same day we keep the feast of the holy Confessor Willibrord, Archbishop of Utrecht, in Friesland, who was ordained Bishop by blessed Pope Sergius, and preached the Gospel in Friesland and Denmark. Mention is made of him upon the 7th day of this present month of November.
      - type: citation
        text: 'Upon the same 29th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Salarian Way, under the Emperor Maximian, the holy martyrs Saturninus the Elder, and Sisinius the Deacon. They suffered long in prison, and the Prefect of the city then commanded them to be stretched upon the rack, and drawn with thongs, to be flogged with cudgels and loaded scourges, then tormented with fire, and at last to be taken down from the rack and beheaded.
      - type: text
        text: At Toulouse, the holy martyr Saturninus, Bishop (of that see,) who, in the time of the Emperor Decius, was tried by the pagans in the capitol of the same city, and cast down the steps from the summit thereof, so that his head was broken, and his brain scattered, and his whole body mangled, and he gave up his worthy soul to Christ.
      - type: text
        text: Likewise, under Decius the Emperor and Aquilinus the President, the holy martyrs Paramon and three hundred and seventy-five others, his Companions.
      - type: text
        text: At Ancyra, the holy martyr Philomen, who, under the President Felix, in the persecution under the Emperor Aurelian, was tried with fire, and then had nails driven into his hands and feet, and at last into his head, and so finished his testimony.
      - type: text
        text: At Veroli, the holy martyrs Blaise and Demetrius.
      - type: text
        text: At Todi, (in the fourth century,) the holy Virgin Illuminata.
      la:
      - type: text
        text: Tértio Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Romæ, via Salária, natális sanctórum Mártyrum Saturníni senis, et Sisínii Diáconi, sub Maximiáno Príncipe; quos, diu in cárcere macerátos, iussit Urbis Præféctus in equúleum levári et áttrahi nervis, fústibus ac scorpiónibus cædi, deínde eis flammas appóni, et, depósitos de equúleo, cápite truncári.
      - type: text
        text: Tolósæ sancti Saturníni Epíscopi, qui, tempóribus Décii, in Capitólio eiúsdem urbis a Pagánis tentus atque de summa Capitólii arce per omnes gradus præcipitátus est, atque ita, cápite collíso, excussóque cérebro, et toto córpore dilaniáto, dignam Christo ánimam réddidit.
      - type: text
        text: Item pássio sanctórum Parámonis et Sociórum trecentórum septuagínta quinque, sub Décio Imperatóre et Aquilíno Prǽside.
      - type: text
        text: Ancýræ, in Galátia, sancti Philómeni Mártyris, qui, in persecutióne Aureliáni Imperatóris, sub Felíce Prǽside, igne probátus, mánibus pedibúsque ac demum cápite clavis confíxo, martýrium consummávit.
      - type: text
        text: Vérulis, in Hérnicis, sanctórum Mártyrum Blásii et Demétrii.
      - type: text
        text: Tudérti, in Umbria, sanctæ Illuminátæ Vírginis.
  psalm.t-rtio-kal-ndas-febru-rii-617263f5be:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy virgin and Martyr Martina, (third century,) of whom mention is made upon the 1st day of January.
      - type: citation
        text: 'Upon the same 30th day of January, were born into a better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, the blessed martyr Hippolytus, (third century.) He was a Priest who had been led astray into the Novatian schism, but by the operation of the grace of Christ had corrected himself, and had returned into the unity of the Church, for which and within which he afterwards achieved a noble martyrdom. When he was asked by his people which were the true Body, he denied the doctrine of Novatus, and declared that the faith which men ought to keep is the faith which the See of Peter keepeth, and so offered his neck to the executioner.
      - type: text
        text: In Africa, the holy martyrs Felician, Philappian, and 124 others.
      - type: text
        text: At Edessa, in Syria, the holy martyr Barsimceus, Bishop of that city, who converted many Gentiles to the faith, and sent them before him to the crown, but himself followed them with the palm of martyrdom under the Emperor Trajan, (second century.) Likewise, at Edessa, holy Barsen, Bishop of that See, who was famous for the grace of healing, but who on account of his Catholic belief was banished to the uttermost parts of that country by the Arian Emperor Valens, and there finished his earthly life, (in the year 379.)
      - type: text
        text: Likewise the blessed Alexander. He was arrested in the persecution under the Emperor Decius, and died under the torture, (in the year 251,) venerable for his grey hairs and illustrious for his repeated confession.
      - type: text
        text: At Jerusalem, holy Matthias, Patriarch of that place, (in the second century,) of whom are narrated wondrous acts of faith. He suffered much for Christ's sake under the Emperor Hadrian, but at length fell asleep in peace.
      - type: text
        text: At Rome, holy Pope Felix (IV, Pope in 526, died in 530,) who laboured much for the Catholic faith.
      - type: text
        text: At Pavia, the holy Confessor Armentarius, Bishop of that See, (in the year 730.)
      - type: text
        text: In the monastery of Maubeuge, in Hainaut, in the time of King Dagobert, the holy Virgin Aldegundis, (about the year 689.)
      - type: text
        text: At Milan, holy Savina, a devout woman, who fell asleep in the Lord, (in the year 311,) while she was praying at the graves of the holy martyrs Nabor and Felix.
      - type: text
        text: At Viterbo, the holy Virgin Hyacinth de' Mariscotti, (in the year 1640,) a nun of the Third Order of St. Francis, eminent for penitence and for love, whose name Pope Pius VII enrolled with those of the saints.
      la:
      - type: text
        text: Tértio Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Sanctæ Martínæ, Vírginis et Mártyris, cuius dies natális Kaléndis Ianuárii recólitur.
      - type: text
        text: Edéssæ, in Sýria, sancti Barsimǽi Epíscopi, qui, cum Gentíles plúrimos convertísset ad fidem et præmisísset ad corónam, eos secútus est, sub Traiáno, cum palma martýrii.
      - type: text
        text: Antiochíæ pássio beáti Hippólyti Presbýteri, qui, decéptus aliquándiu schísmate Nováti, sed, operánte grátia Christi, corréctus, ad unitátem Ecclésiæ rédiit, pro qua et in qua póstea illústre martýrium consummávit. Hic, rogátus a suis quænam secta vérior esset, exsecrátus est dogma Nováti, et, eam fidem dicens esse servándam quam Petri Cáthedra custodíret, iúgulum prǽbuit.
      - type: text
        text: In Africa pássio sanctórum Mártyrum Feliciáni, Philippiáni et aliórum centum vigínti quátuor.
      - type: text
        text: Item beáti Alexándri, qui, in persecutióne Décii, comprehénsus est, ac, longǽvæ ætátis veneránda canítie et confessióne iteráta respléndens, inter carníficum torménta réddidit spíritum.
      - type: text
        text: Edéssæ, in Sýria, sancti Barsis Epíscopi, dono curatiónum illústris; qui, a Valénte, Imperatóre Ariáno, in díssitas regiónes ob fidem cathólicam relegátus, ac tríplici mutatióne fatigátus exsílii, vitam finívit.
      - type: text
        text: Hierosólymis natális sancti Matthíæ Epíscopi, de quo mira et plena fídei gesta narrántur; qui, sub Hadriáno, multa pro Christo perpéssus est, ac demum in pace quiévit.
      - type: text
        text: Pápiæ sancti Armentárii, Epíscopi et Confessóris.
      - type: text
        text: In Malbódio, Hannóniæ monastério, sanctæ Aldegúndis Vírginis, témpore Dagobérti Regis.
      - type: text
        text: Vitérbii sanctæ Hyacínthæ de Mariscóttis Vírginis, ex tértio sancti Francísci Ordine Sanctimoniális, pæniténtia et caritáte insígnis; quam Pius Papa Séptimus Sanctis adscrípsit.
      - type: text
        text: Medioláni sanctæ Savínæ, féminæ religiosíssimæ, quæ, ad sepúlcra sanctórum Nabóris et Felícis Mártyrum orans, obdormívit in Dómino.
      - type: text
        text: In território Parisiénsi sanctæ Bathíldis Regínæ, sanctitáte et miraculórum glória præcláræ.
  psalm.t-rtio-kal-ndas-i-lii-f600a5927c:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 29th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Apostles Peter and Paul. They suffered under the Emperor Nero upon the same day of the same year. Peter was crucified in the city with his head downwards, and is buried at the Vatican beside the Triumphal Way, surrounded by the veneration of the whole world. Paul was beheaded with the sword, and buried beside the Ostian Way, surrounded by the same honour.
      - type: text
        text: At Argenten, in Gaul, [in the third century,] the holy martyr Marcellus, who was beheaded for Christ's faith's sake, along with a soldier named Anastasius.
      - type: text
        text: At Genoa, [in the sixth century,] holy Syrus, Bishop [of that see.]
      - type: text
        text: At Narni, holy Cassius, Bishop of that city of him holy Gregory hath on record that hardly any day of his life passed wherein he did not offer up unto God Almighty the offerings of atonement and therewith his life accorded well, for he gave away in charity all that he possessed, and at the hour of the sacrifice he wept abundantly. It was his use to come to Rome every year for the birthday of the Apostles, and upon that day, when he had celebrated solemn Mass, and had given unto all the Body of the Lord and the Peace, he passed away to be ever with the Lord.
      - type: text
        text: In Cyprus, holy Mary, the mother of John whose surname was Mark.
      - type: text
        text: In the country of Sens, [in the third century,] the holy Virgin Benedicta.
      la:
      - type: text
        text: Tértio Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sanctórum Apostolórum Petri et Pauli, qui eódem anno eodémque die passi sunt, sub Neróne Imperatóre. Horum prior, in eádem Urbe, cápite ad terram verso cruci affíxus, et in Vaticáno iuxta viam Triumphálem sepúltus, totíus Orbis veneratióne celebrátur; postérior autem, gládio animadvérsus, et via Ostiénsi sepúltus, pari honóre habétur.
      - type: text
        text: In Cypro sanctæ Maríæ, matris Ioánnis qui cognominátus est Marcus.
      - type: text
        text: In castro Argentómacho, in Gállia, sancti Marcélli Mártyris, qui, pro fide Christi, una cum Anastásio, viro militári, cápite plexus est.
      - type: text
        text: Génuæ natális sancti Syri Epíscopi.
      - type: text
        text: Nárniæ sancti Cássii, eiúsdem civitátis Epíscopi, de quo sanctus Gregórius Papa refert quod nullus ferme dies vitæ eius abscedébat, quo placatiónis hóstias omnipoténti Deo non offérret; cui et concordábat vita, quia, cuncta quæ habébat, in eleemósynis tríbuens, in hora sacrifícii totus in lácrimis diffluébat. Demum, natalítio Apostolórum die, quo síngulis annis Romam veníre consuéverat, in eádem Narniénsi urbe, cum Missárum solémnia celebrásset, et corpus Domínicum pacémque ómnibus dedísset, migrávit ad Dóminum.
      - type: text
        text: In território Senonénsi sanctæ Benedíctæ Vírginis.
  psalm.t-rtio-kal-ndas-i-nii-9461e39c01:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the morrow we keep the feast of holy John of Nepomuc, Canon of the metropolitical Cathedral Church of Prague, in Bohemia, who, when he had been vainly tried, to make him violate the seal of sacramental confession, was cast into Xerophagia. the river Moldau, and so earned the palm of martyrdom, of whom mention is made upon the 16th day of May.
      - type: citation
        text: 'Upon this same 30th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Aurelian Way, the holy martyr Pope Felix, who was crowned with martyrdom under the Emperor Aurelian.
      - type: text
        text: At Torre, in Sardinia, [in the persecution under the Emperor Hadrian,] the holy martyrs Gabinus and Crispulus.
      - type: text
        text: At Antioch, [in the fourth century,] holy Sycus and Palatinus, who suffered many torments for Christ's Name's sake.
      - type: text
        text: At Ravenna, [in the fifth century,] the holy Confessor Exuperantius, Bishop [of that see.]
      - type: text
        text: At Pavia, [in the seventh century,] the holy Anastasius, Bishop [of that see.]
      - type: text
        text: At Caesarea, in Cappadocia, the holy Basil and Emmelia his wife, father and mother of holy Basil the Great. In the time of the Emperor Galerius Maximian they were banished, and dwelt in the wilderness in Pontus; but they fell asleep in peace after the persecution was over, leaving their children inheritors of their goodness.
      - type: text
        text: At Seville, in Spain, [in the year 1252,] holy Ferdinand III, King of Castille and Leon, who on account of his excelling graces was surnamed the Saint. Illustrious for his zeal in the propagation of the faith, after conquering the Moors, he left an earthly kingdom to inherit in blessedness a kingdom eternal in heaven.
      la:
      - type: text
        text: Tértio Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Sancti Felícis Primi, Papæ et Mártyris, cuius dies natális tértio Kaléndas Ianuárii recensétur.
      - type: text
        text: Túrribus, in Sardínia, sanctórum Mártyrum Gabíni et Críspuli.
      - type: text
        text: Antiochíæ sanctórum Syci et Palatíni, qui, pro Christi nómine, multa torménta passi sunt.
      - type: text
        text: Ravénnæ sancti Exsuperántii, Epíscopi et Confessóris.
      - type: text
        text: Pápiæ sancti Anastásii Epíscopi.
      - type: text
        text: Cæsaréæ, in Cappadócia, sanctórum Basilíi et Emméliæ uxóris, qui fuérunt paréntes beatórum Basilíi Magni et Gregórii Nysséni ac Petri Sebasténsis Episcopórum, atque Macrínæ Vírginis. Hi vero sancti cóniuges, témpore Galérii Maximiáni, extórres facti, Pónticas solitúdines incoluére; et post persecutiónem, fíliis suárum relíctis virtútum herédibus, in pace quievérunt.
      - type: text
        text: Híspali, in Hispánia, sancti Ferdinándi Tértii, Castéllæ et Legiónis Regis, ob virtútum præstántiam cognoménto Sancti; qui, fídei propagándæ zelo clarus, tandem, devíctis Mauris, ad cæléste regnum, terréno relícto, felíciter evolávit.
      - type: text
        text: Rotómagi, sanctæ Ioánnæ Arcénsis Vírginis, Puéllæ Aurelianénsis appellátæ, quæ cum fórtiter pro pátria dimicásset, tandem, in hóstium potestátem trádita, iniquo iudício condemnáta est et igne combústa; atque a Benedícto Décimo quinto, Pontífice Máximo, Sanctórum fastis adscrípta.
  psalm.t-rtio-kal-ndas-ianu-rii-24a8bbf54e:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 30th day of December were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the birthday of St. Felix I, pope and martyr, who governed the Church during the reign of Emperor Aurelian. His feast day is celebrated on the 30th of May.
      - type: text
        text: At Spoleto, under the Emperor Maximian, the holy martyrs Sabinus, bishop of that see; the deacons Exuperantius and Marcellus, and the President Venustian along with his wife and children. Marcellus and Exuperantius were first racked then heavily cudgelled, then mangled with hooks, and their sides were afterwards burnt until they died. Venustian and his wife and children were shortly afterward put to the sword holy Sabinus had his hands cut off, and was long imprisoned, and at length lashed to death. These did not all suffer at the same time, but they are all commemorated upon the same day.
      - type: text
        text: At Alexandria, the holy martyrs Mansuetus, Severus, Appian, Donatus, Honorius and their companions.
      - type: text
        text: At Thessalonica, the holy martir Anysia (about the year 303). There likewise holy Anysius, bishop of that city. (He succeeded St. Ascole, and died about the year 404.)
      - type: text
        text: At Milan, the holy confessor Eugenius, bishop of that city.
      - type: text
        text: At Ravenna, holy Liberius, bishop of that city.
      - type: text
        text: At Aquila, in the Abruzzi, holy Rainerius, bishop of that city (in the twelfth century).
      la:
      - type: text
        text: Tértio Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sancti Felícis Primi, Papæ et Mártyris, qui sub Aureliáno Príncipe Ecclésiam rexit. Ipsíus tamen festum tértio Kaléndas Iúnii celebrátur.
      - type: text
        text: Spoléti item natális sanctórum Mártyrum Sabíni, Assisiénsis Epíscopi, atque Exsuperántii et Marcélli Diaconórum, ac Venustiáni Prǽsidis cum uxóre et fíliis, sub Maximiáno Imperatóre. Ex ipsis Marcéllus et Exsuperántius, primum equúleo suspénsi, deínde fústibus gráviter mactáti, postrémum, abrási úngulis et láterum exustióne assáti, martýrium complevérunt; Venustiánus autem non multo post, simul cum uxóre et fíliis, est gládio necátus; sanctus vero Sabínus, post detruncatiónem mánuum et diútinam cárceris maceratiónem, ad mortem usque cæsus est. Horum martýrium, licet divérso exstíterit témpore, una tamen die recólitur.
      - type: text
        text: Alexandríæ sanctórum Mansuéti, Sevéri, Appiáni, Donáti, Honórii et Sociórum Mártyrum.
      - type: text
        text: Thessalonícæ sanctæ Anýsiæ Mártyris.
      - type: text
        text: Ibídem sancti Anýsii, eiúsdem civitátis Epíscopi.
      - type: text
        text: Medioláni sancti Eugénii, Epíscopi et Confessóris.
      - type: text
        text: Ravénnæ sancti Libérii Epíscopi.
      - type: text
        text: Aquilæ, in Vestínis, sancti Rainérii Epíscopi.
  psalm.t-rtio-kal-ndas-m-rtii-dddaa146a7:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 27th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Alexander, Abundius, Antigonus, and Fortunatus.
      - type: text
        text: At Alexandria, [in the year 250,] the holy martyr Julian. He was so crippled by the gout that he could neither walk nor stand, and was carried before the judge in a chair by two servants. Of these two servants one denied the faith the other, whose name was Eunus, persisted in confessing Christ along with Julian. They were both placed upon camels and led about the whole city, lashed, and at length publicly burnt upon a pyre.
      - type: text
        text: There also the holy soldier Besas. He rebuked some who were jeering at the martyrs aforenamed, for which cause he was accused before the judge, and as he stood firm in the faith he was beheaded.
      - type: text
        text: At Seville, in Spain, [in the year 596,] holy Leander, Bishop of that city, by whose preaching and labours, assisted by Reccared, King of the Visigoths, that nation were converted from the Arian misbelief to the Catholic faith.
      - type: text
        text: At Constantinople, [in 750] the holy Confessors Basil and Procopius, who in the time of the Emperor Leo the Isaurian, contended valiantly for the honouring of holy images.
      - type: text
        text: At Lyon, [about the year 660,] holy Baldomer, [locksmith and subdeacon,] the man of God whose grave is famous on account of the miracles which are oftentimes wrought there.
      la:
      - type: text
        text: Tértio Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Insulæ, in Aprútio, sancti Gabriélis a Vírgine Perdolénte, Clérici Congregatiónis a Cruce et Passióne Dómini nuncupátæ, et Confessóris; qui, magnis intra breve vitæ spátium méritis et post mortem miráculis clarus, a Benedícto Papa Décimo quinto in Sanctórum cánonem relátus est.
      - type: text
        text: Romæ natális sanctórum Mártyrum Alexándri, Abúndii, Antígoni et Fortunáti.
      - type: text
        text: Alexandríæ pássio sancti Iuliáni Mártyris, qui, cum ita pódagra constríctus esset, ut neque incédere neque stare posset, una cum duóbus fámulis, qui eum in sella gestábant, Iúdici offértur; quorum alter fidem negávit, alter, nómine Eunus, cum dómino suo perdurávit in confessióne Christi. Ipse porro Iuliánus et Eunus, camélis impósiti, per totam urbem circumdúci iubéntur, et flagris laniári, ac tandem, incénso rogo, hinc inde spectánte pópulo, combúri.
      - type: text
        text: Ibídem sancti Besæ mílitis, qui, cum insultántes in prædíctos Mártyres cohibéret, delátus est ad Iúdicem, et, pro fide constánter agens, cápite truncátus.
      - type: text
        text: Híspali, in Hispánia, natális sancti Leándri, eiúsdem civitátis Epíscopi, qui, sanctórum Isidóri Epíscopi ac Florentínæ Vírginis frater, sua prædicatióne et indústria gentem Visigothórum, adiuvánte Reccarédo, eórum Rege, ab Ariána impietáte ad cathólicam fidem convértit.
      - type: text
        text: Constantinópoli sanctórum Confessórum Basilíi et Procópii, qui, témpore Leónis Imperatóris, pro cultu sanctárum Imáginum strénue decertárunt.
      - type: text
        text: Lugdúni, in Gállia, sancti Baldoméri Subdiaconi, viri Deo devóti, cuius sepúlcrum crebris miráculis illustrátur.
  psalm.t-rtio-kal-ndas-maii-4a1cc69880:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 29th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Milan, the holy martyr Peter, of the Order of Friars Preachers, who was murdered by heretics for the Catholic faith's sake, [in the year 1252.]
      - type: text
        text: At Paphos, in Cyprus, holy Tychicus, the disciple of the blessed Apostle Paul, whom that Apostle doth in his Epistles call "a beloved brother and a faithful minister and fellow-servant in the Lord." [He was a native of the province of Asia.]
      - type: text
        text: At Cirtha, in Numidia, [in the year 260,] the holy martyrs Agapius, Bishop [of Carthagena,] and Secundinus, Bishop [of Braga,] who had long been banished to that city in the persecution under the Emperor Valerian, wherein the fury of the Gentiles did most seek to try the faith of the just. From having been eminent Priests they became glorious martyrs and there suffered along with them the soldier Emilian, the holy Virgins Tartulla and Antonia, and a certain woman with her twin children.
      - type: text
        text: On the same day, the seven Saints who had been robbers but were converted to Christ by holy Jason, and by martyrdom gained life everlasting, [in the year 100. They are called the robbers of Corfu. Their names are Saturninus, Jusischolus, Faustian, Januarius, Marsalius, Euphrasius, and Mammius.]
      - type: text
        text: At Brescia, the holy Confessor Paulinus, Bishop of that see, [about the year 428. The Bollandists call him Paul I, and say there never was a Bishop Paulinus of Brescia.]
      - type: text
        text: In the monastery of Cluny, [in the year 1109,] holy Hew, Abbpt of Cluny.
      - type: text
        text: In the monastery of Molesme, holy Robert, first Abbot of Citeaux. [He was a monk of Moitier-la-Celle, Abbot of Saint-Michel de Tonnerre, Prior of Saint-Ayoul, and founder of Molesme and Citeaux, [in the year 1110.]
      la:
      - type: text
        text: Tértio Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Petri, ex Ordine Prædicatórum, Mártyris, qui octávo Idus Aprílis pro fide cathólica martýrium súbiit.
      - type: text
        text: Romæ natális sanctæ Catharínæ Senénsis Vírginis, ex tértio Ordine sancti Domínici, vita et miráculis claræ, quam Pius Secúndus, Póntifex Máximus, sanctárum Vírginum número adscrípsit. Ipsíus tamen festum sequénti die celebrátur.
      - type: text
        text: Apud Paphum, in Cypro, sancti Týchici, qui fuit discípulus beáti Pauli Apóstoli, et ab ipso Apóstolo in suis Epístolis caríssimus frater, miníster fidélis suúsque in Dómino consérvus appellátur.
      - type: text
        text: 'Pisis, in Túscia, sancti Torpétis Mártyris, qui magnus in offício Nerónis primum fuit, unúsque ex his, de quibus idem Paulus Apóstolus ab urbe Roma ad Philippénses scribit: « Salútant vos omnes sancti, máxime autem qui de Cǽsaris domo sunt». Sed póstea, pro fide Christi, iubénte Satéllico, álapis cǽditur, verbéribus duríssime affícitur, ac béstiis devorándus tráditur, sed mínime lǽditur; tandem martýrium suum decollatióne complévit.'
      - type: text
        text: Cirthæ, in Numídia, natális sanctórum Mártyrum Agápii et Secundíni Episcopórum, qui, post longum apud præfátam urbem exsílium, in persecutióne Valeriáni, in qua tunc máxime Gentílium rábies ad tentándam iustórum fidem inhiábat, ex illústri sacerdótio effécti sunt Mártyres gloriósi. Passi sunt in eórum collégio Æmiliánus miles, Tertúlla et Antónia, quæ erant sacræ Vírgines, et quædam múlier cum suis géminis.
      - type: text
        text: In ínsula Corcýra sanctórum septem Latrónum, qui, a sancto Iásone ad Christum convérsi, martýrio vitam adépti sunt sempitérnam.
      - type: text
        text: Neápoli, in Campánia, sancti Sevéri Epíscopi, qui, inter ália admiránda, mórtuum de sepúlcro excitávit ad tempus, ut mendácem víduæ et pupillórum creditórem argúeret falsitátis.
      - type: text
        text: Bríxiæ sancti Paulíni, Epíscopi et Confessóris.
      - type: text
        text: In cœnóbio Cluniacénsi, in Gállia, sancti Hugónis Abbátis.
      - type: text
        text: In monastério Molisménsi, in Gállia, sancti Robérti, qui fuit primus Abbas Cistércii.
  psalm.t-rtio-kal-ndas-nov-mbris-df3d731dc3:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 30th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Africa, two hundred and twenty holy martyrs.
      - type: text
        text: At Tangiers, in Morocco, (in the third century,) the holy centurion Marcellus, who accomplished martyrdom by being beheaded under Agricolaus, Vicar to the Prefect of the Pretorium.
      - type: text
        text: At Alexandria, thirteen holy martyrs, who suffered under the Emperor Decius, along with Julian, Eunus, and Macarius.
      - type: text
        text: At Alexandria also, the holy martyr Eutropia, who visited the martyrs, and, being most cruelly tormented along with them, gave up the ghost.
      - type: text
        text: At Cagliari, in Sardinia, the holy martyr Saturninus, who was beheaded under the President Barbarus, in the persecution under the Emperor Diocletian.
      - type: text
        text: At Apamea, in Phrygia, under the same Emperor Diocletian, the holy martyr Maximus.
      - type: text
        text: At Leon, in Spain, the holy martyrs Claudius, Lupercus, and Victorius, sons of the holy centurion Marcellus, who were beheaded under the President Diogenian, in the persecution under the Emperors Diocletian and Maximian.
      - type: text
        text: At Algaea, in Cilicia, under the President Lysias and the Emperor Diocletian, the holy martyrs Zenobius, Bishop (of that see,) and Zenobia his sister.
      - type: text
        text: At Altino, the holy martyr Theonestus, Bishop (of Philippi, in Macedonia,) who was slain by the Arians.
      - type: text
        text: At Paris, the holy martyr Lucan.
      - type: text
        text: At Antioch, (in the third century,) holy Serapion, Patriarch (of that see,) eminent for his learning.
      - type: text
        text: At Capua, the holy Confessor Germanus, Bishop (of that see,) a man of great holiness, whose soul, at the hour of his death, holy Benedict saw carried heavenward by Angels.
      - type: text
        text: At Potenza, in Lucania, (in the year 1119,) holy Gerard, Bishop (of that see.)
      - type: text
        text: At Palma, in Majorca, (in the year 1617,) the holy Confessor Alphonsus Rodriguez, temporal coadjutor in the Society of Jesus, eminent for his lowliness and his love of mortification, whose name Leo XII numbered with those of the Blessed, and Leo XIII with those of the Saints.
      la:
      - type: text
        text: Tértio Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: In Sardínia natális sancti Pontiáni, Papæ et Mártyris, qui, ab Alexándro Imperatóre, una cum Hippólyto Presbýtero, in eam ínsulam deportátus, ibídem, mactátus fústibus, martýrium consummávit. Eius corpus a beáto Fabiáno Papa Romam delátum est, atque in cœmetério Callísti sepúltum. Ipsíus tamen festum recólitur tertiodécimo Kaléndas Decémbris.
      - type: text
        text: Ægéæ, in Cilícia, pássio sanctórum Zenóbii Epíscopi, et Zenóbiæ soróris, sub Diocletiáno Imperatóre et Lýsia Prǽside.
      - type: text
        text: Altíni, in Venetórum fínibus, sancti Theonésti, Epíscopi et Mártyris, qui ab Ariánis occísus est.
      - type: text
        text: In Africa natális sanctórum Mártyrum ducentórum vigínti.
      - type: text
        text: Tingi, in Mauritánia, pássio sancti Marcélli Centuriónis, qui, sanctórum Cláudii ac Lupérci et Victórii Mártyrum pater, cápitis abscissióne martýrium complévit sub Agricoláo, agente vices Præfécti prætório.
      - type: text
        text: Alexandríæ sanctórum trédecim Mártyrum, qui, cum sanctis Iuliáno, Euno et Macário, passi sunt sub Décio Imperatóre.
      - type: text
        text: Cárali, in Sardínia, sancti Saturníni Mártyris, qui, in persecutióne Diocletiáni, sub Bárbaro Prǽside, cápite truncátus est.
      - type: text
        text: Apaméæ, in Phrýgia, sancti Máximi Mártyris, sub eódem Diocletiáno.
      - type: text
        text: Legióne, in Hispánia, sanctórum Mártyrum Cláudii, Lupérci et Victórii, filiórum sancti Marcélli Centuriónis; qui, in persecutióne Diocletiáni et Maximiáni, sub Diogeniáno Prǽside, iussi sunt decollári.
      - type: text
        text: Lutétiæ Parisiórum sancti Lucáni Mártyris.
      - type: text
        text: Alexandríæ sanctæ Eutrópiæ Mártyris, quæ, Mártyres vísitans, apprehénsa est, et, cum illis sævíssime cruciáta, réddidit spíritum.
      - type: text
        text: Antiochíæ sancti Serapiónis Epíscopi, eruditióne claríssimi.
      - type: text
        text: Cápuæ sancti Germáni, Epíscopi et Confessóris, magnæ sanctitátis viri; cuius ánimam, in hora óbitus eius, ab Angelis in cælum deférri sanctus Benedíctus aspéxit.
      - type: text
        text: Poténtiæ, in Lucánia, sancti Gerárdi Epíscopi.
  psalm.t-rtio-kal-ndas-oct-bris-0492a7d29d:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is made the worshipful Commemoration of the Blessed Archangel Michael on the which day was consecrated in his name the church upon Mount Gargano, mean as to building, but filled with power from heaven.
      - type: citation
        text: 'Upon the same 29th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In Thrace, the holy martyrs Eutychius, Plautus, and Heraclea.
      - type: text
        text: In Persia, the holy martyr Gudelia, who had turned many to Christ. Forasmuch as she would not worship the sun and the fire, Sapor the king put her to many torments and caused the skin to be plucked from her head, and her to be fastened to a post, where she won the last victory.
      - type: text
        text: Likewise in Persia, the holy martyrs Dadas, kinsman of King Sapor, Casdoa his wife, and Gabdelas their son, who were stripped of their worldly goods, tormented with diverse sufferings, imprisoned for a long time, and at last beheaded.
      - type: text
        text: In Armenia, under the King Tiridates, the holy virgins Ripsimis and her Companions, all martyrs.
      - type: text
        text: At Auxerre, (in the fifth century,) the holy martyr Fraternus, Bishop (of that see.)
      - type: text
        text: At Pontecorvo, near by Aquino, (in the twelfth century,) the holy Confessor Grimwald the Priest.
      - type: text
        text: In Palestine, (in the sixth century,) the holy hermit Quiriacus.
      la:
      - type: text
        text: Tértio Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: In monte Gargáno venerábilis memória beáti Michaélis Archángeli, quando ipsíus nómine ibi consecráta fuit Ecclésia, vili quidem facta schémate, sed cælésti præstans virtúte.
      - type: text
        text: Antisiodóri sancti Fratérni, Epíscopi et Mártyris.
      - type: text
        text: In Thrácia natális sanctórum Mártyrum Eutýchii, Plauti et Heracléæ.
      - type: text
        text: In Pérside sanctórum Mártyrum Dadæ, e Sáporis Regis consanguíneis, Cásdoæ uxóris, et Gabdélæ fílii; qui, honóribus exúti ac váriis torméntis dilaniáti, tandem, post longos cárceres, gládio sunt animadvérsi.
      - type: text
        text: In Arménia sanctárum Vírginum Rípsimis et Sociárum Mártyrum, sub Tiridáte Rege.
      - type: text
        text: In Pérside sanctæ Gudéliæ Mártyris, quæ, cum plúrimos convertísset ad Christum, ac Solem et Ignem adoráre noluísset, ídeo, sub Sápore Rege, post multa torménta, cute cápitis detrácta, ligno affíxa, méruit obtinére triúmphum.
      - type: text
        text: In Ponte Curvo, apud Aquínum, sancti Grimoáldi, Presbýteri et Confessóris.
      - type: text
        text: In Palæstína sancti Quiríaci Anachorétæ.
  psalm.t-rtio-kal-ndas-sept-mbris-df0bb44945:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the morrow we keep the feast of the holy Virgin Rose of St. Mary, whose birth into the better life (in the year 1617) is mentioned upon the 26th day of this present month.
      - type: citation
        text: 'Upon the same 30th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Ostian Way, under the Emperors Diocletian and Maximian, the blessed Priest Felix. After being racked he was sentenced to be beheaded as he was being led to execution he was met by some man who of his own accord professed himself a Christian, and was accordingly forthwith beheaded along with him. The Christians never knew the name of this other, and they accordingly always spoke of him as him who was added, that is, added to the company of the holy martyr Felix in winning of the crown.
      - type: text
        text: Likewise at Rome, the holy Virgin and martyr Gaudentia, with three others.
      - type: text
        text: At Rome, [in the year 410,] also the holy Priest Pammachius, [a Roman Senator,] who was eminent for his teaching and holiness.
      - type: text
        text: At Sfaitla, in Africa, [in the year 399,] sixty blessed martyrs, who were slain by the fury of the Gentiles.
      - type: text
        text: At Susa, also in Africa, [in the year 250,] holy Boniface and Thecla, who were the parents of twelve sons, all blessed martyrs.
      - type: text
        text: At Thessalonica, the holy Confessor Fantinus. He suffered much from the Saracens, and was thrust out of the monastery wherein he had lived in marvellous austerity. He led many into the path of salvation, and at length fell asleep in a good old age.
      - type: text
        text: At Meaux, [in the year 670,] the holy Confessor [Fefrash, an Irishman, who came over into Gaul, where he is called] Fiacre, [and founded a monastery, and died towards the end of the seventh century.]
      - type: text
        text: At Trevi, [near Subiaco, towards the middle of the eleventh century,] the holy Confessor Peter, famous for many graces and miracles, who there passed away to be with the Lord, and is held in honour and worship.
      - type: text
        text: At Bologna, [in the year 1026,] the holy Abbot Bononius.
      la:
      - type: text
        text: Tértio Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sanctæ Rosæ a sancta María, e tértio Ordine sancti Domínici, Vírginis; cuius dies natális nono Kaléndas Septémbris recensétur.
      - type: text
        text: Romæ, via Ostiénsi, pássio beáti Felícis Presbýteri, sub Diocletiáno et Maximiáno Imperatóribus. Hic, post equúlei vexatiónem, data senténtia, cum ducerétur ad decollándum, óbvius ei fuit quidam Christiánus, qui, dum se Christiánum esse sponte profiterétur, mox cum eódem páriter decollátus est; cuius nomen ignorántes, Christiáni Adáuctum eum appellavérunt, eo quod sancto Felíci auctus sit ad corónam.
      - type: text
        text: Item Romæ sanctæ Gaudéntiæ, Vírginis et Mártyris, cum áliis tribus.
      - type: text
        text: Colóniæ Suffetulánæ, in Africa, beatórum sexagínta Mártyrum, qui furóre Gentílium cæsi sunt.
      - type: text
        text: Bonóniæ sancti Bonónii Abbátis.
      - type: text
        text: Romæ sancti Pammáchii Presbýteri, qui fuit doctrína et sanctitáte conspícuus.
      - type: text
        text: Adruméti, in Africa, sanctórum Bonifátii et Theclæ, qui beatórum duódecim filiórum Mártyrum paréntes fuérunt.
      - type: text
        text: Thessalonícæ sancti Fantíni Confessóris, qui, multa a Saracénis perpéssus, atque e monastério, in quo abstinéntia víxerat admirábili, expúlsus, demum, cum plúrimos ad viam salútis perduxísset, in senectúte bona quiévit.
      - type: text
        text: In território Meldénsi sancti Fiácrii Confessóris.
      - type: text
        text: Trebis, in Látio, sancti Petri Confessóris, qui, multis clarus virtútibus et miráculis, ibídem migrávit ad Dóminum, et honorífice cólitur.
  psalm.t-rtio-nonas-apr-lis-e0d8c91ff5:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 3rd day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, [in the year 1253,] holy Richard, Bishop of Chichester, famous for his holiness and the glory of his miracles.
      - type: text
        text: At Taormina, in Sicily, holy Pancras, Bishop of that see, who sealed with his blood the testimony of the gospel of Christ which the holy Apostle Peter had sent him thither to preach.
      - type: text
        text: At Isnia, in Scythia, the holy martyrs Evagrius and Benignus.
      - type: text
        text: At Thessalonica, under the Emperor Diocletian, the holy Virgins Agape and Chionia, because they refused to deny Christ, they were first starved in prison, and then cast into the fire. The flame took no hold upon them, but when they had prayed to the Lord, they then gave up their souls to him, [in the year 304.]
      - type: text
        text: At Tyre, the holy martyr Vulpian. During the persecution under the Emperor Maximian Galerius, he was sewn up inside a sack along with an adder and a dog, and drowned in the sea, [in the year 305.]
      - type: text
        text: At the Monastery of Mecidion, on Mount Olympus, the holy Abbot Nicetas, who suffered many things under the Emperor Leo the Armenian, on account of the honouring of holy images.
      - type: text
        text: In England, the holy Virgin Burgundofora, Abbess [of Farmoutier, about the year 655.]
      - type: text
        text: At Palermo, the holy Confessor Benedict of San Fradello, of the Order of Friars Minors, who was by race a black, whence he was commonly called "the Black." He was famous for his signs and mighty works. He fell asleep in the Lord upon the 4th day of April, [in the year 1585.] The Supreme Pontiff Pius VII. enrolled his name among those of the Saints.
      la:
      - type: text
        text: Tértio Nonas Aprílis
      - type: text
        text: ''
      - type: text
        text: Romæ natális beáti Xysti Primi, Papæ et Mártyris; qui, tempóribus Hadriáni Imperatóris, summa cum laude rexit Ecclésiam, ac demum, sub Antoníno Pio, ut sibi Christum lucrifáceret, libénter mortem sustínuit temporálem.
      - type: text
        text: Tauroménii, in Sicília, sancti Pancrátii Epíscopi, qui Christi Evangélium, quod a sancto Petro Apóstolo illuc missus prædicáverat, martýrii sánguine consignávit.
      - type: text
        text: Tomis, in Scýthia, natális sanctórum Mártyrum Evágrii et Benígni.
      - type: text
        text: Tyri, in Phœnícia, sancti Vulpiáni Mártyris, qui, in persecutióne Maximiáni Galérii, cum áspide et cane insútus cúleo, in mare demérsus fuit.
      - type: text
        text: Thessalonícæ pássio sanctárum Vírginum Agapis et Chióniæ, Diocletiáno Imperatóre, sub quo et sancta Virgo Iréne, eárum soror, póstmodum passúra erat. Ambæ vero, cum Christum negáre nollent, primum in cárcere macerátæ sunt, póstea in ignem missæ, sed a flammis intáctæ, ibi, oratióne ad Dóminum fusa, ánimas reddidérunt.
      - type: text
        text: In monastério Medícii, in Bithýnia, deposítio sancti Nicétæ Abbátis, qui ob cultum sanctárum Imáginum, sub Leóne Arméno, multa passus est, ac tandem, iuxta Constantinópolim, Conféssor quiévit in pace.
      - type: text
        text: In Anglia sancti Richárdi, Epíscopi Cicestrénsis, sanctitáte et miraculórum glória conspícui.
      - type: text
        text: Eboríaci, in território Meldénsi, sanctæ Burgundofáræ, étiam Faræ nómine appellátæ, Abbatíssæ et Vírginis.
  psalm.t-rtio-nonas-aug-sti-78fa35fb63:
    role: psalm
    content:
      en:
      - type: text
        text: Upon the 3rd day of August is commemorated the finding at Jerusalem, [in the year 415,] of the body of the most blessed Stephen, the first of all the martyrs, and of those of holy Gamaliel, Nicodemus, and Abibon.
      - type: text
        text: Their place was revealed by God to Lucian the Priest, in the time of the Emperor Honorius. [The body of St. Stephen now rests at Rome in the Basilica of St. Lawrence beyond the Walls.]
      - type: text
        text: 'Upon the same day, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Constantinople, the holy martyr Hermellus.
      - type: text
        text: In India, upon the coasts of Persia, the holy Monks and others whom King Abenner, when he was persecuting the Church of God, caused to be tormented and slain in diverse ways.
      - type: text
        text: At Naples, in Campania, [in the year 97,] holy Aspren, Bishop of Naples, who was healed of sickness by the holy Apostle Peter, and thereupon procuring himself to be baptized was ordained Bishop of that city.
      - type: text
        text: At Autun, [in the year 490,] the holy Confessor Euphronius, Bishop [of that see.]
      - type: text
        text: At Anagni, [in the year 1105,] holy Peter, Bishop [of that see,] who fell asleep in the Lord, famous for his observance as a Monk first, and afterwards for his carefulness as a shepherd.
      - type: text
        text: At Philippi, [in the year 60,] in Macedonia, holy Lydia, a seller of purple, who was the first of all to believe the Gospel there at the preaching of the holy Apostle Paul. [Acts xvi, 14]
      - type: text
        text: At Bercea, in Syria, [about the year 450,] the holy women Marana and Cyra, [Virgins of Bercea.]
      la:
      - type: text
        text: Tértio Nonas Augústi
      - type: text
        text: ''
      - type: text
        text: Philíppis, in Macedónia, sanctæ Lýdiæ purpuráriæ, quæ, prædicánte ibídem sancto Paulo Apóstolo, ut beátus Lucas in Actibus Apostólicis refert, ómnium prima crédidit Evangélio.
      - type: text
        text: Neápoli, in Campánia, sancti Aspréni Epíscopi, qui a sancto Petro Apóstolo, curátus ab infirmitáte ac deínde baptizátus, eiúsdem civitátis Epíscopus ordinátus fuit.
      - type: text
        text: Constantinópoli natális sancti Hermélli Mártyris.
      - type: text
        text: Apud Indos, Persis finítimos, pássio sanctórum Monachórum, et aliórum fidélium, quos Abénner Rex, pérsequens Ecclésiam Dei, divérsis afflíctos supplíciis, cædi iussit.
      - type: text
        text: Augustodúni deposítio sancti Euphrónii, Epíscopi et Confessóris.
      - type: text
        text: Anágniæ sancti Petri Epíscopi, qui, monástica primum observántia, deínde pastoráli vigilántia clarus, quiévit in Dómino.
      - type: text
        text: Beróeæ, in Sýria, sanctárum mulíerum Maránæ et Cyræ.
      - type: text
        text: Hierosólymis Invéntio beatíssimi Stéphani Protomártyris, et sanctórum Gamaliélis, Nicodémi et Abibónis, sicut Luciáno Presbýtero divínitus revelátum est, Honórii Príncipis témpore.
  psalm.t-rtio-nonas-dec-mbris-924b11f5e6:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 3rd day of December is commemorated the birth into the better life:'
      - type: text
        text: ''
      - type: text
        text: In the island of San-Chan, in the Canton River, in China, holy Francis Xavier of the Society of Jesus, Apostle of the Indies, illustrious for the conversion of the Gentiles, for gifts and miracles, who died, (in the year 1552,) full of good works and labours, upon this present 2nd day of December, but his feast is kept upon the morrow by order of Alexander VII.
      - type: text
        text: In Judea, the holy prophet Zephaniah, (in the seventh century B.C. He is the ninth of the twelve minor prophets.)
      - type: text
        text: At Rome, the holy martyrs the Tribune Claudius, his wife Hilaria, their sons Jason and Marus, and seventy soldiers. The Emperor Numerian commanded a great stone to be tied to Claudius and that he should be cast into the river the soldiers and the sons of Claudius he also caused to be put to death. The blessed Hilaria buried the bodies of her sons, and was praying at their grave soon after, when she was seized by the heathen, and departed hence to be ever with the Lord, (about the year 257.)
      - type: text
        text: At Tangier, in Morocco, (in the year 398,) the holy martyr Cassian. He had of a long time discharged the office of a public clerk when the thought came to him from heaven that it was an accursed thing to serve for the slaughter of Christians he resigned his office therefore, and under the public profession of a Christian he earned the victory of martyrdom, (in the year 398.)
      - type: text
        text: Likewise in Africa, the holy martyrs Claudius, Crispin, Magina, John, and Stephen.
      - type: text
        text: In Hungary, the holy martyr Agricola.
      - type: text
        text: At Nicomedia, the holy martyrs Ambicus, Victor, and Julius.
      - type: text
        text: At Milan, (about the year 318,) the holy Confessor Mirocles, Bishop (of that see,) of whom mention is made by holy Ambrose.
      - type: text
        text: In England, holy Brian, first Bishop of Dorchester, (he was a Priest of Rome about the year 650, whose feast we keep upon the 5th day of this present month of December.)
      - type: text
        text: At Chur, in Switzerland, holy Lucius, King of the Britons (of Morganweg,) who was the first British prince to receive the faith of Christ, in the time of Pope Eleutherius, (about the year 182.)
      - type: text
        text: At Sienna, in Tuscany, the holy Hermit Galgan, (of the order of St. Benedict. He lived on a mountain called Siepi, and died in the year 1181.)
      la:
      - type: text
        text: Tértio Nonas Decémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Francísci Xavérii, Sacerdótis e Societáte Iesu et Confessóris, Indiárum Apóstoli, sodalitátis et óperis Propagándæ Fídei atque Missiónum ómnium Patróni cæléstis; qui prídie huius diéi quiévit in pace.
      - type: text
        text: In Iudǽa sancti Sophoníæ Prophétæ.
      - type: text
        text: Romæ sanctórum Mártyrum Cláudii Tribúni, et uxóris Hiláriæ, filiórum Iásonis et Mauri, cum septuagínta milítibus. Ex eis Cláudium iussit Numeriánus Imperátor, ingénti saxo alligátum, in flumen præcípitem dari; mílites vero et ipsíus Cláudii fílios capitáli senténtia puníri. Beáta autem Hilária, cum filiórum córpora sepelísset, paulo post, orans ad eórum sepúlcrum, tenta est a Pagánis, et, in cárcerem trusa, migrávit ad Dóminum.
      - type: text
        text: Tingi, in Mauritánia, pássio sancti Cassiáni Mártyris, qui, cum exceptóris diu gessísset offícium, tandem, admirátus intrépida beáti Marcélli Centuriónis respónsa et immóbilem in Christi fide constántiam, atque cǽlitus inspirátus, exsecrábile duxit Christianórum neci deservíre; ideóque, cum renuntiásset eídem offício, et ipse, sub Christiána professióne, cápite abscíssus, triúmphum méruit obtinére martýrii.
      - type: text
        text: Item in Africa sanctórum Mártyrum Cláudii, Crispíni, Magínæ, Ioánnis et Stéphani.
      - type: text
        text: In Pannónia sancti Agrícolæ Mártyris.
      - type: text
        text: Nicomedíæ pássio sanctórum Ambici, Victóris et Iúlii.
      - type: text
        text: Medioláni sancti Miroclétis, Epíscopi et Confessóris; cuius aliquándo sanctus Ambrósius méminit.
      - type: text
        text: Dorcéstriæ, in Anglia, sancti Biríni, qui fuit primus eiúsdem civitátis Epíscopus.
      - type: text
        text: Curiæ, in Germánia, sancti Lúcii, Britannórum Regis, qui primus ex iis Régibus fidem Christi suscépit, témpore sancti Eleuthérii Papæ.
      - type: text
        text: Senis, in Túscia, sancti Galgáni Eremítæ.
  psalm.t-rtio-nonas-febru-rii-b56a2aa57f:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep in England the feast of the holy Confessor Laurence, Archbishop of Canterbury, who governed that church in succession to holy Augustin, and who converted King Ethelbert himself to the faith, of whom mention is made as upon this day.
      - type: citation
        text: 'Upon the same 3rd day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Sebaste, in Armenia, the holy martyr Blase, (about the year 316,) Bishop of that city, and the worker of many miracles. Under the President Agricolaus he was long flogged, then hung to a beam, where his flesh was rent with iron combs, then he suffered a foul imprisonment, after which he was cast into the lake, and, forasmuch as he came out thence unhurt, he was beheaded, by order of the same judge, along with two lads.
      - type: text
        text: Before him seven women, who were collecting the drops of his blood as they fell during the torture, were arrested for being Christians, and after being grievously tormented were put to the sword.
      - type: text
        text: In Africa, the holy Deacon Celerinus, who was kept nineteen days in prison, and was a glorious confessor of Christ under the lash, and in iron chains and other sufferings, and while he overcame the adversary of his contending by his invincible firmness, he led the way for victories for others, (in the year 280.) Likewise the holy martyrs Laurentinus, (these martyrs mentioned by Cyprian, Letter 34,) and Ignatius, his father's and mother's brothers, and Celerina his grandmother, who had before him been crowned with martyrdom, to the glorious praises of all whom there remaineth to witness an epistle of blessed Cyprian.
      - type: text
        text: Likewise in Africa, the holy martyrs Felix, Symphronius, Hippolytus, and their Companions, (in the year 270.)
      - type: text
        text: In the town of Gap, (in the second century,) the holy Bishops Tigides and Remedius.
      - type: text
        text: At Lyon, (about the year 486,) holy Lupicinus and Felix, Bishops of that see.
      - type: text
        text: On the same day, (in the year 865,) holy Anschar, Bishop of Bremen, who brought the Swedes and the Danes to believe in Christ.
      la:
      - type: text
        text: Tértio Nonas Februárii
      - type: text
        text: ''
      - type: text
        text: Sebáste, in Arménia, pássio sancti Blásii, Epíscopi et Mártyris; qui, multórum patrátor miraculórum, sub Agricoláo Prǽside, post diútinam cæsiónem, atque in ligno suspensiónem, ubi férreis pectínibus carnes eius dirúptæ sunt, post tetérrimum cárcerem et in lacum demérsionem, unde salvus exívit, tandem, iubénte eódem Iúdice, una cum duóbus púeris, cápite truncátur. Ante ipsum vero septem mulíeres, quæ guttas sánguinis, ex eiúsdem Mártyris córpore defluéntes, dum torquerétur, colligébant, proptérea, deprehénsæ quod essent Christiánæ, omnes, post dira torménta, gládio percússæ sunt.
      - type: text
        text: In Africa sancti Celeríni Diáconi, qui, decem et novem dies custódia cárceris septus, in nervo et ferro variísque pœnis gloriósus fuit Christi Conféssor; et, dum inexpugnábili firmitáte certáminis sui vicit adversárium, vincéndi céteris viam fecit.
      - type: text
        text: Ibídem sanctórum trium Mártyrum, ipsíus Celeríni Diáconi consanguineórum, scílicet Laurentíni pátrui, Ignátii avúnculi, et Celérinæ áviæ, qui ántea martýrio coronáti fúerant; de quorum ómnium gloriósis láudibus exstat beáti Cypriáni epístola.
      - type: text
        text: Item in Africa sanctórum Mártyrum Felícis, Symphrónii, Hippólyti et Sociórum.
      - type: text
        text: In óppido Vapíngo, in Gállia, sanctórum Tigídis et Remédii Episcopórum.
      - type: text
        text: Lugdúni, in Gállia, sanctórum Lupicíni et Felícis, itidem Episcopórum.
      - type: text
        text: Bremæ sancti Anschárii, Hamburgénsis ac póstea Breménsis simul Epíscopi, qui Suévos et Danos ad Christi fidem convértit, et a Gregório Papa Quarto Legátus Apostólicus totíus Septentriónis fuit institútus.
  psalm.t-rtio-nonas-i-lii-591dce7463:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the Feast of St. Anthony Mary Zaccaria, Confessor, founder of the Clerks Regular of St. Paul, a man illustrious for every virtue, and famous for miracles. Leo XIII enrolled his name among those of the Saints. His body is reverenced at Milan, in the Church of St. Barnabas.
      - type: citation
        text: 'Upon the same 5th day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Zoe, the wife of the blessed martyr Nicostratus. She was praying at the grave of the blessed Apostle Peter when she was arrested by the persecutor under the Emperor Diocletian, and committed to a dark prison. In the end she was hung on a tree by her neck and hair, and a thick smoke made below her, and so, constantly confessing the Lord, gave up the Ghost.
      - type: text
        text: In Syria, the holy martyr Domitius, [in the year 363,] who by his power doth many kindnesses unto the dwellers there.
      - type: text
        text: At Cyrene, in Libya, the holy martyr Cyrilla, [in the year 310.] In the persecution under Diocletian live embers mixed with incense were laid upon her hand, and she held them there for a long while, lest, if she jerked away the live coals, she should seem to have offered the incense, when she was most cruelly mangled, and so passed away to Christ her Bridegroom adorned with her own blood.
      - type: text
        text: At Jerusalem, holy Athanasius, Deacon [of the Church of Rome.]
      - type: text
        text: He was seized by the heretics regarding the holy council of Chalcedon, [held in the year 451,] and after he had been tried with all kinds of torments, was at length slain with the sword, [in the year 452.]
      - type: text
        text: In Sicily, the holy martyrs Agathon and Triphina.
      - type: text
        text: At Timisoara, on the Black Sea, the holy martyrs Marinus, Theodotus, and Sedophas.
      - type: text
        text: At Trier, the holy Confessor Numerian, [Bishop of that see, in the year 657.]
      - type: text
        text: On the same day is commemorated the holy Confessor Michael de Sanctis, of whom mention is made upon the 10th day of April.
      - type: text
        text: At San Severino, in Picenum, the holy Virgin Philumena, [sixth century.]
      la:
      - type: text
        text: Tértio Nonas Iúlii
      - type: text
        text: ''
      - type: text
        text: Cremónæ, in Insúbria, sancti Antónii-Maríæ Zaccaría Confessóris, qui Clericórum Regulárium sancti Pauli et Angelicárum Vírginum fuit Institútor; atque, virtútibus ómnibus et miráculis insígnis, a Leóne Papa Décimo tértio inter Sanctos adscríptus est. Eius corpus Medioláni, in Ecclésia sancti Bárnabæ, cólitur.
      - type: text
        text: Romæ sanctæ Zoæ Mártyris, uxóris beáti Nicóstrati Mártyris, quæ, sub Diocletiáno Imperatóre, dum ad confessiónem beáti Petri Apóstoli oráret, a persecutóribus est arctáta et in custódiam obscuríssimam trusa; deínde, collo et capíllis in árbore, adhíbito subter horríbili fumo, suspénsa est, et ita, in confessióne Dómini, emísit spíritum.
      - type: text
        text: Hierosólymis sancti Athanásii Diáconi, qui, pro sancta Sýnodo Chalcedonénsi, ab hæréticis comprehénsus et ómnium cruciátuum expértus génera, ferro tandem necátus est.
      - type: text
        text: In Sýria natális sancti Domítii Mártyris, qui virtútibus suis multa íncolis præstat benefícia.
      - type: text
        text: In Sicília sanctórum Mártyrum Agathónis et Triphínæ.
      - type: text
        text: Tomis, in Scýthia, sanctórum Mártyrum Maríni, Theódoti et Sédophæ.
      - type: text
        text: Cyréne, in Líbya, sanctæ Cyríllæ Mártyris, quæ, in persecutióne Diocletiáni, ardéntes carbónes cum thure super manum pósitos diu ténuit, ne, prunas excutiéndo, thus obtulísse viderétur; deínde, sævíssime laniáta, próprio decoráta sánguine migrávit ad Sponsum.
      - type: text
        text: Tréviris sancti Numeriáni, Epíscopi et Confessóris.
      - type: text
        text: Apud Septempedános, in Picéno, sanctæ Philoménæ Vírginis.
  psalm.t-rtio-nonas-i-nii-8005aee474:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Virgin Mary Magdalene de' Pazzi, of the Order of Carmelites, famous for her holy life, of whom mention is made upon the 25th day of the month of May.
      - type: citation
        text: 'Upon the 3rd day of June were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Arezzo, in Tuscany, the holy brethren Pergentinus and Laurentinus, both martyrs. They were boys, who, in the persecution under Decius, after bearing horrid torments and showing forth great works of power, were slain by the sword under the President Tiburtius.
      - type: text
        text: At Constantinople, the holy martyr Lucillian and his four sons, Claud, Hypatius, Paul, and Denis. Lucillian, before he became a Christian, had been a priest of idols. All the five, after they had been put to various tortures, were cast into a furnace, but rain put out the fire, and they all escaped unhurt. Then Lucillian was crucified, and the children were beheaded, and so under Silvanus the President they finished their testimony.
      - type: text
        text: At the same place, the holy Virgin and martyr Paula, who was arrested while she was gathering up the blood of the aforesaid martyrs. She was beaten with rods, and cast into the fire, but was delivered, and at last beheaded at the same place where the holy Lucillian had been crucified.
      - type: text
        text: At Cordova, in Spain, the blessed monk Isaac, who, [in the year 851,] was slain with the sword, [by the Muslims,] for Christ's faith's sake.
      - type: text
        text: At Carthage, the holy Priest Caecilius, who brought holy Cyprian to believe in Christ.
      - type: text
        text: In the country of Orleans, [in the year 565,] the holy Confessor Liphard the Priest.
      - type: text
        text: At Lucca, in Tuscany, [in the year 1051,] the holy Confessor Davin, [the Armenian pilgrim.]
      - type: text
        text: At Paris, the holy Queen Clotilde, at whose entreaties her husband, King Clovis, accepted the faith of Christ.
      - type: text
        text: At Anagni, the holy Virgin Oliva.
      la:
      - type: text
        text: Tértio Nonas Iúnii
      - type: text
        text: ''
      - type: text
        text: Arétii, in Túscia, sanctórum Mártyrum Pergentíni et Laurentíni fratrum, qui, in persecutióne Décii, sub Tibúrtio Prǽside, cum essent púeri, ibídem, post dira supplícia toleráta et magna mirácula osténsa, gládio cæsi sunt.
      - type: text
        text: Constantinópoli sanctórum Mártyrum Lucilliáni et quátuor puerórum, scílicet Cláudii, Hypátii, Pauli et Dionýsii. His cum púeris Lucilliánus, ex idolórum sacerdóte Christiánus factus, in fornácem, post vária torménta, iniéctus est, sed, flamma imbre exstíncta, omnes illǽsi evasérunt; dénique, ipse cruci affíxus, púeri autem gládio obtruncáti, sub Silváno Prǽside, consummáti sunt.
      - type: text
        text: Córdubæ, in Hispánia, beáti Isaac Mónachi, qui, pro Christi fide, gládio necátus est.
      - type: text
        text: Constantinópoli sanctæ Paulæ, Vírginis et Mártyris, quæ, cum prædictórum Mártyrum Lucilliáni ac Sociórum sánguinem collígeret, ídeo, comprehénsa, virgis percússa, et in ignem coniécta sed liberáta, demum et ipsa eódem loco, ubi sanctus Lucilliánus crucifíxus fúerat, decolláta est.
      - type: text
        text: Carthágine sancti Cæcílii Presbýteri, qui sanctum Cypriánum ad Christi fidem perdúxit.
      - type: text
        text: In território Aurelianénsi sancti Liphárdi, Presbýteri et Confessóris.
      - type: text
        text: Lucæ, in Túscia, sancti Davíni Confessóris.
      - type: text
        text: Anániæ sanctæ Olívæ Vírginis.
      - type: text
        text: Lutétiæ Parisiórum sanctæ Clotíldis Regínæ, cuius précibus vir eius Clodovéus, Rex Francórum, Christi fidem suscépit.
  psalm.t-rtio-nonas-ianu-rii-1969fec563:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Octave of the holy Apostle and Evangelist John.
      - type: citation
        text: 'Upon the same 3rd day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Appian Way, holy Pope Anterus, who suffered under the Emperor Julius Maximian, and was buried in the cemetery of Callistus. (He reigned one month and 12 days in the year 236.)
      - type: text
        text: Upon the same day, holy Peter, who suffered the death of the cross at the city of Aulone. (In the year 311 or 291.)
      - type: text
        text: On the Hellespont, the holy martyrs Cyrinus, Primus, and Theogenes (about the year 320.) At Caesarea, in Cappadocia, the holy centurion Gordius (about the year 320), in whose praise Basil the Great delivered a noble discourse upon his feast day.
      - type: text
        text: In Cilicia, the holy martyrs Zozimus and Athanasius the Notary, also the holy martyrs Theopemptus and Theona, who suffered an illustrious martyrdom in the persecution under Diocletian.
      - type: text
        text: At Padua, the holy martyr Daniel (in the year 168.)
      - type: text
        text: At Vienne, in Gaul, holy Florence, (8th) bishop of that see (successor to St. Paracodius), who was exiled in the time of the Emperor Gallienus, and there finished his testimony (in the year 252.)
      - type: text
        text: At Paris (in the year 512), the holy virgin (and Patron of Paris) Genevieve, who was dedicated to Christ by blessed Germanus, Bishop of Auxerre, and was famous for her wondrous graces and miracles.
      la:
      - type: text
        text: Tértio Nonas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Appia, natális sancti Anthéri, Papæ et Mártyris; qui sub Iúlio Maximíno passus est, et in cœmetério Callísti sepúltus.
      - type: text
        text: Viénnæ, in Gállia, sancti Floréntii Epíscopi, qui, témpore Galliéni Imperatóris, in exsílium relegátus, illic martýrium consummávit.
      - type: text
        text: Apud civitátem Aulánam, in Palæstína, pássio sancti Petri, qui crucis supplício interémptus est.
      - type: text
        text: In Hellespónto sanctórum Mártyrum Cyríni, Primi et Theogénis.
      - type: text
        text: Cæsaréæ, in Cappadócia, sancti Górdii Centuriónis, Mártyris; de cuius láudibus exstat præclára Basílii Magni orátio, in eius die festo hábita.
      - type: text
        text: In Cilícia sanctórum Mártyrum Zósimi, et Athanásii Commentariénsis.
      - type: text
        text: Item sanctórum Theopémpti et Theónæ, qui, in persecutióne Diocletiáni, illústre martýrium obiérunt.
      - type: text
        text: Patávii sancti Daniélis Mártyris.
      - type: text
        text: Lutétiæ Parisiórum sanctæ Genovéfæ Vírginis, quæ, a beáto Germáno, Antisiodorénsi Epíscopo, Christo dicáta, admirándis virtútibus et miráculis cláruit.
  psalm.t-rtio-nonas-m-rtii-8f94a1b70c:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 5th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, [about the year 320,] the holy martyr Phocas. For the Redeemer's name's sake he gained the victory over many an assault of the old serpent, and that victory is still held forth before the people, with this miracle, that if any be bitten of a serpent and touch in faith the door of this martyr's church, he is forthwith healed of the poison.
      - type: text
        text: At Cassarea, in Palestine, [in the year 308,] the holy martyr Hadrian, who was crowned by command of the President Firmilian, in the persecution under the Emperor Diocletian. He was first thrown to a lion, but afterward slain with the sword.
      - type: text
        text: On the same day, the holy martyr Eusebius, and nine others.
      - type: text
        text: At Caesarea, in Palestine, [in the year 200,] holy Theophilus, Bishop of that see, who was a great light for wisdom and good living in the time of the Emperor Severus.
      - type: text
        text: Likewise in Palestine, on the bank of the Jordan, [in the year 475,] the holy hermit Gerasimus, who flourished in the time of the Emperor Zeno.
      - type: text
        text: At Naples, [in the year 1734,] holy John Joseph of the Cross, barefooted Friar Minor, first Provincial of the Italian followers of holy Peter of Alcantara. He strove to tread in the footsteps of holy Francis of Assisi and Peter of Alcantara, was a bright ornament of the Seraphic Order, and was numbered among the saints by Pope Gregory XVI.
      la:
      - type: text
        text: Tértio Nonas Mártii
      - type: text
        text: ''
      - type: text
        text: Antiochíæ natális sancti Phocæ Mártyris, qui, post multas, quas pro nómine Redemptóris passus est, iniúrias, quáliter de antíquo illo serpénte triumpháverit, hódie quoque pópulis eo miráculo declarátur, quod, si quíspiam a serpénte morsus fúerit, hic, ut iánuam Basílicæ Mártyris credens attígerit, conféstim, evacuáta venéni virtúte, sanátur.
      - type: text
        text: Cæsaréæ, in Palæstína, sancti Hadriáni Mártyris, qui in persecutióne Diocletiáni Imperatóris, iussu Firmiliáni Prǽsidis, prius ob Christi fidem leóni obiéctus, deínde gládio iugulátus, martýrii corónam accépit.
      - type: text
        text: Eódem die pássio sanctórum Eusébii Palatíni, et aliórum novem Mártyrum.
      - type: text
        text: Cæsaréæ, in Palæstína, sancti Theóphili Epíscopi, qui sub Sevéro Príncipe, sapiéntia et vitæ integritáte conspícuus, emícuit.
      - type: text
        text: Ad ripam Iordánis, item in Palæstína, sancti Gerásimi, Anachorétæ et Abbátis, qui témpore Zenónis Imperatóris flóruit.
      - type: text
        text: Neápoli, in Campánia, deposítio sancti Ioánnis-Ioséphi a Cruce, Sacerdótis ex Ordine Minórum et Confessóris, qui, sanctórum Francísci Assisiénsis et Petri de Alcántara stúdia æmulátus, Ordini Seráphico insígne decus áddidit, atque a Gregório Papa Décimo sexto in Sanctórum cánonem est relátus.
  psalm.t-rtio-nonas-maii-7b106d1040:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Virgin Catherine of Siena, of the Order of St. Dominic, famous for her life and miracles, whose name Pius II enrolled among those of the holy Virgins, and of whom mention is made upon the 30th day of April.
      - type: citation
        text: 'Upon the same 5th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 1572,] the holy Pope Pius V, of the Order of Friars Preachers, who toiled mightily and happily to restore the discipline of the Church, to root out heresies, and to crush the enemies of Christianity, and who governed the Catholic Church in holiness of life and law-giving; whose feast we keep upon the 11th day of this present month of May.
      - type: text
        text: Likewise at Rome, the holy martyr Crescentiana.
      - type: text
        text: Likewise at Rome, the holy martyr Silvanus.
      - type: text
        text: At Alexandria, the holy Deacon Euthymius, who died a prisoner for Christ's sake.
      - type: text
        text: At Thessalonica, the holy martyrs Irenaeus, Peregrinus, and Irene, who were burnt with fire.
      - type: text
        text: At Auxerre, [in the year 304,] the holy martyr, the Reader Jovinian.
      - type: text
        text: At Licata, in Sicily, [about the year 1220,] the holy Priest Angelus, of the Order of Carmelite Friars, who was murdered by heretics for defending the Catholic faith.
      - type: text
        text: At Jerusalem, the holy Confessor Maximus, Bishop of that city. The Caesar Maximian Galerius plucked out one of his eyes, maimed one of his feet with hot iron, and condemned him to penal servitude in the mines.
      - type: text
        text: At Edessa, in Syria, the holy Confessor Eulogius, Bishop of Edessa.
      - type: text
        text: At Arles, in Gaul, [in the year 449,] holy Hilary, Bishop [of Arles,] famous for his teaching and holiness.
      - type: text
        text: At Vienne, in Gaul, [about the fourth century,] holy Nicetus, Bishop of that see, worshipful for his holiness.
      - type: text
        text: At Bologna, [about the year 540,] holy Theodore, Bishop [of that see,] famous for his worthy works.
      - type: text
        text: Likewise, [about the year 550,] holy Sacerdos, Bishop of Murviedro, in Spain.
      - type: text
        text: At Milan, [in the year 470,] holy Gerontius, Bishop [of that see.]
      - type: text
        text: On this day is also commemorated, at Milan, the conversion of holy Augustine, Bishop [of Hippo,] and Doctor of the Church, to whom the truth of the Catholic faith was taught by the blessed Ambrose, Bishop [of Milan,] and whom he upon this day baptized.
      la:
      - type: text
        text: Tértio Nonas Maii
      - type: text
        text: ''
      - type: text
        text: Sancti Pii Quinti, ex Ordine Prædicatórum, Papæ et Confessóris, qui Kaléndis mensis huius obdormívit in Dómino.
      - type: text
        text: Romæ sancti Silváni Mártyris.
      - type: text
        text: Item Romæ sanctæ Crescentiánæ Mártyris.
      - type: text
        text: Leocátæ, in Sicília, sancti Angeli, ex Ordine Carmelitárum, Presbýteri et Mártyris, qui ab hæréticis, ob defensiónem cathólicæ fídei, trucidátus est.
      - type: text
        text: Alexandríæ sancti Euthýmii Diáconi, qui ob Christum quiévit in cárcere.
      - type: text
        text: Antisiodóri pássio sancti Ioviniáni Lectóris.
      - type: text
        text: Thessalonícæ natális sanctórum Mártyrum Irenǽi, Peregríni et Irénes, qui, ígnibus combústi, palmas martýrii percepérunt.
      - type: text
        text: Hierosólymis sancti Máximi Epíscopi, qui a Maximiáno Galério Cǽsare, post óculum effóssum pedémque igníto ferro adústum, ad metálla damnátus est; atque, liber inde abíre permíssus et Ecclésiæ Hierosolymitánæ præpósitus, ibi, confessiónis glória præclárus, in pace tandem quiévit.
      - type: text
        text: Edéssæ, in Sýria, sancti Eulógii, Epíscopi et Confessóris.
      - type: text
        text: Areláte, in Gállia, sancti Hilárii Epíscopi, doctrína et sanctitáte conspícui
      - type: text
        text: Viénnæ, in Gállia, sancti Nicéti Epíscopi, venerábilis sanctitátis viri.
      - type: text
        text: Bonóniæ sancti Theodóri Epíscopi, méritis clari.
      - type: text
        text: Medioláni sancti Gerúntii Epíscopi.
      - type: text
        text: Eódem die sancti Sacerdótis, Epíscopi Saguntíni.
  psalm.t-rtio-nonas-nov-mbris-35e1f761a7:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep in England the feast of the holy Virgin and martyr Winefrid.
      - type: citation
        text: 'Upon the same 3rd day of November, were also born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Holy Quartus, the disciple of the Apostles.
      - type: text
        text: At Caesarea, in Cappadocia, the holy martyrs Germanus, Theophilus, Caesarius, and Vitalis, who bore a noble testimony in the persecution under the Emperor Decius.
      - type: text
        text: At Saragossa, countless holy martyrs, who wondrously laid down their lives for Christ's sake under Dacian, President of Spain, (in the year 304.)
      - type: text
        text: At Viterbo, the holy martyrs Valentine the Priest and Hilary the Deacon, who, in the persecution under the Emperor Maximian, were for Christ's faith's sake cast into the Tiber weighted with stones, but by the will of God were thence delivered by an Angel, and received the crown of martyrdom by being beheaded.
      - type: text
        text: At the monastery of Clairvaux, (in the year 1148,) holy Maleachlan, Archbishop of Armagh, in Ireland, who in his time shone with many graces, and whose life hath been written by the holy Abbot Bernard.
      - type: text
        text: On the same day, (in the year 727,) holy Hubert, Bishop of Tongres.
      - type: text
        text: At Vienne, (in the sixth century,) holy Domnus, Bishop (of that see.)
      - type: text
        text: Likewise (in the year 755,) holy Pirmin, Bishop of Meaux.
      - type: text
        text: At Urgel, in Spain, holy Hermengaudus, Bishop (of that see.)
      - type: text
        text: At Rome, holy Sylvia, the mother of holy Pope Gregory.
      la:
      - type: text
        text: Tértio Nonas Novémbris
      - type: text
        text: ''
      - type: text
        text: Medioláni natális sancti Cároli Borromǽi Cardinális, Epíscopi Mediolanénsis et Confessóris, quem, sanctitáte conspícuum et miráculis clarum, Paulus Papa Quintus in sanctórum númerum rétulit. Ipsíus tamen festívitas sequénti die celebrátur.
      - type: text
        text: Eódem die natális quoque sancti Quarti, Apostolórum discípuli.
      - type: text
        text: Vitérbii sanctórum Mártyrum Valentíni Presbýteri, et Hilárii Diáconi, qui, in persecutióne Maximiáni, ob Christi fidem, cum saxi póndere in Tíberim præcipitáti et inde ab Angelo divínitus erépti, demum, abscíssis cervícibus, corónam martýrii percepérunt.
      - type: text
        text: Cæsaréæ, in Cappadócia, sanctórum Mártyrum Germáni, Theóphili, Cæsárii et Vitális; qui, in persecutióne Deciána, óptime duxérunt martýrium.
      - type: text
        text: Cæsaraugústæ, in Hispánia, sanctórum innumerabílium Mártyrum, qui, sub Hispaniárum Prǽside Daciáno, mirabíliter occubuérunt pro Christo.
      - type: text
        text: In Anglia sanctæ Wenefrídæ, Vírginis et Mártyris.
      - type: text
        text: In monastério Clarævallénsi, in Gállia, deposítio sancti Malachíæ, Connerthénsis in Hibérnia Epíscopi, qui multis virtútibus suo témpore cláruit; cuius vitam sanctus Bernárdus Abbas conscrípsit.
      - type: text
        text: Eódem die sancti Hubérti, Tungrénsis Epíscopi.
      - type: text
        text: Viénnæ, in Gállia, sancti Domni, Epíscopi et Confessóris.
      - type: text
        text: Item deposítio sancti Pirmíni, Meldénsis Epíscopi.
      - type: text
        text: Urgéllæ, in Hispánia Tarraconénsi, sancti Hermengáudii Epíscopi.
      - type: text
        text: Romæ sanctæ Sílviæ, matris sancti Gregórii Papæ.
  psalm.t-rtio-nonas-oct-bris-f5f011acac:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 5th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Messina, in Sicily, (in the year 546,) the holy monk Placidus, a disciple of the blessed Abbot Benedict, his brothers Eutychius and Victorinus, and the Virgin Flavia, their sister, along with Donatus, the Deacon Firmatus, Faustus, and thirty other monks, all martyrs, who were massacred for Christ's faith's sake, by the pirate Manucha.
      - type: text
        text: Upon the same day, (in the year 171,) blessed Thraseas, Bishop of Eumenia, who achieved his martyrdom at Smyrna.
      - type: text
        text: At Trier, the holy martyrs Palmatius and his Companions, who underwent martyrdom under the President Rictiovarus, in the persecution under the Emperor Diocletian.
      - type: text
        text: On the same day, the holy Virgin Charitina, under the Emperor Diocletian and the Consular Domitius. She was tormented with fire, and cast into the sea, whence she came forth unharmed, then her hands and feet were cut off, and her teeth shaken, and she gave up her soul in prayer to God.
      - type: text
        text: At Auxerre, the holy Deacon Firmatus, (in the fifth or sixth century,) and the Virgin Flaviana his sister.
      - type: text
        text: At Ravenna, the holy Confessor Marcellinus, Bishop of (that see.)
      - type: text
        text: At Valence, in Gaul, holy Apollinaris, (about the year 520,) Bishop (of that see) his life was famous for his graces, and his death was marked by signs and wonders.
      - type: text
        text: Upon the same day holy Attilan, Bishop of Zamora, whose name Urban II. numbered with those of the Saints.
      - type: text
        text: At Leon, (in the year 1006,) in Spain, holy Froilan, Bishop of that city, famous for his zeal in spreading the monastic life, his goodness toward the poor, and other graces and wonders.
      - type: text
        text: At Rome, the holy widow Galla, daughter of the Consul Symmachus after the death of her husband she passed many years at the church of blessed Peter, intent upon prayer, alms, fastings, and other holy works. Holy Pope Gregory hath written of her right blessed passage hence.
      la:
      - type: text
        text: Tértio Nonas Octóbris
      - type: text
        text: ''
      - type: text
        text: Messánæ, in Sicília, natális sanctórum Mártyrum Plácidi Mónachi, e beáti Benedícti Abbátis discípulis, et eius fratrum Eutýchii et Victoríni, ac soróris eórum Fláviæ Vírginis, itémque Donáti, Firmáti Diáconi, Fausti et aliórum trigínta Monachórum, qui omnes a Manúcha piráta, pro Christi fide, necáti sunt.
      - type: text
        text: Apud Smyrnam item natális beáti Thraséæ, Epíscopi Euméniæ, martýrio consummáti.
      - type: text
        text: Antisiodóri deposítio sanctórum germanórum Firmáti Diáconi, et Flaviánæ Vírginis.
      - type: text
        text: Tréviris sanctórum Mártyrum Palmátii et Sociórum; qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, martýrium subiérunt.
      - type: text
        text: Eódem die pássio sanctæ Charitínæ Vírginis, quæ, sub Diocletiáno Imperatóre et Domítio Consulári, ígnibus est cruciáta et in mare proiécta, et, cum inde incólumis evasísset, tandem, mánibus et pédibus abscíssis dentibúsque convúlsis, in oratióne spíritum emísit.
      - type: text
        text: Ravénnæ sancti Marcellíni, Epíscopi et Confessóris.
      - type: text
        text: Valéntiæ, in Gállia, sancti Apollináris Epíscopi, cuius vita virtútibus fuit illústris, et mors signis ac prodígiis decoráta.
      - type: text
        text: Eódem die sancti Attiláni, Epíscopi Zamorénsis, quem beátus Urbánus Papa Secúndus in Sanctórum númerum rétulit.
      - type: text
        text: Romæ sanctæ Gallæ Víduæ, fíliæ Sýmmachi Cónsulis, quæ, viro suo defúncto, apud Ecclésiam beáti Petri multis annis oratióni, eleemósynis, ieiúniis aliísque sanctis opéribus inténta permánsit; cuius felicíssimum tránsitum sanctus Gregórius Papa descrípsit.
  psalm.t-rtio-nonas-sept-mbris-ee855d895c:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is commemorated at Rome the holy Virgin Serapia. Under the Emperor Hadrian she was given over to two young rakes, but they could not deflower her. Neither could she afterwards be burnt with torches, wherefore, by the command of the judge Berillus, she was cudgelled and then beheaded with the sword. She suffered upon the 29th day of July, and was buried by blessed Sabina in her own sepulchre hard by the threshing-floor of Vindician. But the memory of her martyrdom is kept the most chiefly upon the 3rd day of September, when the stone coffin of Sabina and of herself was there set in order and adorned, and the place of prayer was meetly dedicated.
      - type: citation
        text: 'Upon the same 3rd day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Corinth, holy Phoebe, of whom the blessed Apostle Paul doth make mention in writing unto the Romans.
      - type: text
        text: At Aquileia, the holy Virgins, Euphemia, Dorothy, Thecla, and Erasma, all martyrs, who, after many torments, were slain with the sword under Nero, and were buried by holy Hermagoras.
      - type: text
        text: At Capua, (in the persecution under the Emperor Diocletian,) the holy martyrs Aristaeus, Bishop (of that see,) and the little lad Antonine.
      - type: text
        text: At Nicomedia, the holy Virgin and martyr Basilissa, who, at nine years of age, in the persecution under the Emperor Diocletian, by the power of God triumphed over stripes, fire, and wild beasts, under the President Alexander, and gave up her soul in prayer to God.
      - type: text
        text: Likewise the holy martyrs Zeno and Chariton, whereof the one was cast into a vessel of molten lead and the other into a fiery furnace.
      - type: text
        text: At Cordova, the holy martyr Sandalus, (who suffered in the persecution under the same Emperor Diocletian.) Upon the same day, (in the seventh century,) the holy martyrs Aigulph, Abbot of Lerins, and the monks his Companions, who had their tongues cut out and their eyes put out, and were beheaded with the sword.
      - type: text
        text: At Toul, in Lorraine, (in the fourth century,) the holy Confessor Mansuetus, Bishop (of that see.) At Milan, (in the sixth century,) deceased holy Auxanus, Bishop (of that see.) Upon the same day, (at the end of the sixth century,) the holy Stylite Simeon the Younger.
      - type: text
        text: At Rome is commemorated the Ordination as Supreme Pontiff of that excellent man holy Gregory the Great; the compulsion which forced that burden upon him caused the rays of his holiness to shine through all the world, all the clearer in that they shone from an higher spot.
      la:
      - type: text
        text: Tértio Nonas Septémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Pii Papæ Décimi, cuius natális dies tertiodécimo Kaléndas Septémbris recensétur.
      - type: text
        text: Corínthi natális sanctæ Phœbes, cuius méminit beátus Apóstolus Paulus ad Romános scribens.
      - type: text
        text: Cápuæ sanctórum Mártyrum Aristǽi Epíscopi, et Antoníni púeri.
      - type: text
        text: Eódem die natális sanctórum Mártyrum Aigúlphi, Abbátis Lirinénsis, et Sociórum ipsíus Monachórum, qui, linguis præcísis oculísque effóssis, gládio obtruncáti sunt.
      - type: text
        text: Item sanctórum Mártyrum Zenónis et Charitónis; quorum alter in lebétem liquáti plumbi coniéctus est, alter in ignis fornácem immíssus.
      - type: text
        text: Córdubæ, in Hispánia, sancti Sándali Mártyris.
      - type: text
        text: Aquiléiæ sanctárum Vírginum et Mártyrum, Euphémiæ, Dorótheæ, Theclæ et Erásmæ, quæ, sub Neróne Imperatóre et Sebásto Prǽside, post multa supplícia, gládio cæsæ sunt, et a sancto Hermágora sepúltæ.
      - type: text
        text: Nicomedíæ pássio sanctæ Basilíssæ, Vírginis et Mártyris; quæ, annos novem nata, cum in persecutióne Diocletiáni Imperatóris, sub Alexándro Prǽside, vérbera, ignes ac béstias divína virtúte superásset, ipsum Prǽsidem ad Christi fidem convértit, ac tandem extra urbem in oratióne spíritum Deo réddidit.
      - type: text
        text: Tulli, in Gállia, sancti Mansuéti, Epíscopi et Confessóris.
      - type: text
        text: Medioláni deposítio sancti Auxáni Epíscopi.
      - type: text
        text: Eódem die sancti Simeónis Stylítæ iunióris.
      - type: text
        text: Romæ Translátio sanctæ Serápiæ, Vírginis et Mártyris; quæ passa est quarto Kaléndas Augústi.
      - type: text
        text: Item Romæ Ordinátio incomparábilis viri sancti Gregórii Magni in Summum Pontíficem; qui, onus illud subíre coáctus, e sublimióri throno clarióribus sanctitátis radiis in Orbe refúlsit.
  psalm.tertiod-cimo-kal-ndas-apr-lis-21d8053ca4:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 20th day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In England, holy Cuthbert, Bishop of Lindisfarne, who from his childhood until his death shone with holy works and miraculous signs [, in the year 687].
      - type: text
        text: In Judea, holy Joachim, father of the Most Blessed Virgin Mary, Mother of God. We keep his feast upon the Lord's day within the octave of the Assumption of the same Blessed Virgin Mary.
      - type: text
        text: In Asia, holy Archippus, the fellowsoldier of the blessed Apostle Paul, of whom the same Apostle doth make mention in his Epistles unto Philemon and unto the Colossians. [Archippus is called by St. Ambrose, Bishop of the Colossians.]
      - type: text
        text: In Syria, the holy martyrs Paul, Cyril, Eugene, and four others.
      - type: text
        text: On the same day, the holy martyrs Photina of Samaria and her sons Joseph and Victor, also Sebastian the general, Anatolius, Photius, Photis, Parasceve, and Cyriaca, sisters, who all confessed Christ and obtained martyrdom.
      - type: text
        text: At Amisus, in Paphlagonia, the seven holy women, Alexandra, Claudia, Euphrasia, Matrona, Juliana, Euphemia, and Theodosia, who were slain for confessing the faith, and to whom were added afterward Derphuta and her sister [, about the year 300].
      - type: text
        text: At Apollonia, holy Nicetas, Bishop of that see, who was driven into banishment for the honouring of holy images, and there gave up the ghost [, eighth century].
      - type: text
        text: At the monastery of Fontenelle, holy Wolfran, Bishop of Sens, who resigned his see, and died famous for miracles [, in the year 720].
      - type: text
        text: At Sienna, in Tuscany, blessed Ambrose, of the Order of Friars Preachers, famous for his holiness, his preachments, and his miracles [, in the year 1286].
      la:
      - type: text
        text: Tertiodécimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: In Iudǽa natális sancti Ióachim, patris immaculátæ Vírginis Genetrícis Dei Maríæ, Confessóris. Ipsíus tamen festum ágitur décimo séptimo Kaléndas Septémbris.
      - type: text
        text: In Asia item natális sancti Archíppi, qui beáti Pauli Apóstoli éxstitit commílito, et cuius ipse in Epístola ad Philémonem et ad Colossénses méminit.
      - type: text
        text: In Sýria sanctórum Mártyrum Pauli, Cyrílli, Eugénii et aliórum quátuor.
      - type: text
        text: Eódem die sanctórum Photínæ Samaritánæ, Ioseph et Victóris filiórum, itémque Sebastiáni Ducis, Anatólii, Phótii, Phótidis, Parascéves et Cyríacæ germanárum; qui omnes, Christum conféssi, martýrium sunt assecúti.
      - type: text
        text: Amísi, in Paphlagónia, sanctárum septem mulíerum, scílicet Alexándræ, Cláudiæ, Euphrásiæ, Matrónæ, Iuliánæ, Euphémiæ et Theodósiæ; quæ in fídei confessióne sunt cæsæ, eásque secútæ sunt Derphúta et soror ipsíus.
      - type: text
        text: Apollóniæ sancti Nicétæ Epíscopi, qui, pro sanctárum Imáginum cultu eiéctus in exsílium, illic réddidit spíritum.
      - type: text
        text: In monastério Fontanéllæ, in Gállia, sancti Wulfránni, Epíscopi Senonénsis, qui, relícto Episcopátu, ibídem, clarus miráculis, decéssit e vita.
      - type: text
        text: In Británnia deposítio sancti Cuthbérti, Epíscopi Lindisfarnénsis, qui, a puerítia ad óbitum usque, sanctis opéribus et miraculórum signis effúlsit.
      - type: text
        text: Senis, in Túscia, Beáti Ambrósii, ex Ordine Prædicatórum, sanctitáte, prædicatióne et miráculis clari.
  psalm.tertiod-cimo-kal-ndas-aug-sti-970bbf9904:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Jerome Miani, founder of the congregation of Somascha, famous for diverse miracles in his life and since his death [in the year 1537,] whose name Pope Clement XIII solemnly enrolled among those of the saints, and of whom mention is made upon the 8th day of February.
      - type: citation
        text: 'Upon the same 20th day of July, was born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Antioch, the holy Virgin and martyr Margaret, [in the year 275.]
      - type: text
        text: On Mount Carmel is commemorated the holy Prophet Elijah, [of Thesbe, 880 B.C.]
      - type: text
        text: The blessed Joseph called Barsabas, who was surnamed Justus, whom the Apostles appointed along with blessed Matthias that he might take part of the ministry and apostleship, from which Judas by transgression fell. The lot fell upon Matthias, but Joseph nevertheless served in the office of preaching and sanctification, and bore much persecution of the Jews for Christ's faith's sake. He fell asleep in Judea, in a triumphant end. It is told of him that he drank poison, and was unharmed thereby because of his faith in the Lord.
      - type: text
        text: At Damascus, the holy martyrs Sabinus, Julian, Maximus, Macrobius, Cassia, and Paula, and ten others.
      - type: text
        text: At Cordova, the holy Deacon Paul. He rebuked the unbelieving princes for their Mohammedan ungodliness and cruelty and constantly preached Christ, wherefore the said princes commanded him to be slain, and he passed away, to receive a martyr's reward in heaven, [in the year 851.]
      - type: text
        text: In Portugal, the holy Virgin and martyr Wilgefortes, who contended for Christian faith and chastity, and obtained a glorious triumph upon the Cross. [This is probably the same person as St Liberata on January 28.]
      - type: text
        text: In the country of Boulogne, in Gaul, the holy Abbot Vulmar, a man of wonderful holiness, [in the year 689. Founder of the Abbey of Samer, in the Diocese of Arras.]
      - type: text
        text: At Trier, the holy Virgin Severa, [in the year 660.]
      la:
      - type: text
        text: Tertiodécimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Sancti Hierónymi Æmiliáni Confessóris, Congregatiónis Somáschæ Institutóris, cæléstis ómnium orphanórum ac derelíctæ iuventútis Patróni; qui sexto Idus Februárii obdormívit in Dómino.
      - type: text
        text: Antiochíæ pássio sanctæ Margarítæ, Vírginis et Mártyris.
      - type: text
        text: In monte Carmélo sancti Elíæ Prophétæ.
      - type: text
        text: In Iudǽa natális beáti Ioseph, qui cognominátus est Iustus, quem Apóstoli cum beáto Matthía statuérunt ut locum apostolátus Iudæ proditóris impléret; sed, cum sors cecidísset super Matthíam, ipse, nihilóminus prædicatiónis et sanctitátis offício insérviens, multámque pro fide Christi a Iudǽis persecutiónem sústinens, victorióso fine quiévit. De quo étiam refértur quod venénum bíberit, et nihil ex hoc triste propter Dómini fidem pertúlerit.
      - type: text
        text: Córdubæ, in Hispánia, sancti Pauli, Diáconi et Mártyris; qui, cum infidéles príncipes argúeret Mahuméticæ impietátis ac sævítiæ, et Christum constantíssime prædicáret, idcírco, eórum iussu necátus, ad prǽmia evolávit in cælum.
      - type: text
        text: Damásci sanctórum Mártyrum Sabíni, Iuliáni, Máximi, Macróbii, Cássiæ et Paulæ, cum áliis decem.
      - type: text
        text: In Lusitánia sanctæ Wilgefórtis, Vírginis et Mártyris; quæ, pro Christiána fide ac pudicítia decértans, in cruce méruit gloriósum obtinére triúmphum.
      - type: text
        text: Eódem die natális sanctórum Flaviáni Secúndi, Epíscopi Antiochéni, et Elíæ, Epíscopi Hierosolymitáni; qui, pro Sýnodo Chalcedonénsi ab Anastásio Imperatóre ambo in exsílium acti, victóres migrárunt ad Dóminum.
      - type: text
        text: In pago Bononiénsi, in Gállia, sancti Vulmári Abbátis, admirándæ sanctitátis viri.
      - type: text
        text: Tréviris sanctæ Sevéræ Vírginis.
  psalm.tertiod-cimo-kal-ndas-dec-mbris-a10e917811:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Marburg, in Germany, (in the year 1231,) the holy Widow Elizabeth, (Landgravine of Hesse and Thuringia,) of the third Order of St Francis, daughter of Andrew II, King of Hungary, busied without ceasing in works of mercy and famous for miracles.
      - type: text
        text: On the same day, the holy martyr, Pope Pontian, who was exiled to Sardinia along with the Priest Hippolytus, under the Emperor Alexander, and was there cudgelled to death. His body was brought to Rome by blessed Pope Fabian, and buried in the cemetery of Kallistus.
      - type: text
        text: At Samaria, the holy Prophet Obadiah.
      - type: text
        text: At Rome, upon the Appian Way, the holy martyr Maximus, a Priest, who suffered in the persecution under the Emperor Valerian, and was buried hard by holy Pope Xystus.
      - type: text
        text: At Caesarea, in Cappadocia, the holy martyr Barlaam. He was an unlettered peasant, but filled with the wisdom of Christ, and by the steadfastness of his faith conquered the tyrant (Diocletian) and his fire. Holy Basil the Great preached a famous sermon upon his feast-day.
      - type: text
        text: In the city of Ecija, blessed Crispin, Bishop (of that see,) who was beheaded, and so won the glory of martyrdom.
      - type: text
        text: At Vienne, in Gaul, (in the second century,) the holy martyrs Severinus, Exuperius, and Felician after many years had passed they themselves revealed where their bodies were lying the which, being so found, were honourably taken up by the Bishop, clergy, and people of that city, and buried again with due reverence.
      - type: text
        text: Upon the same day, holy Faustus, a Deacon of Alexandria, who was first sent into exile along with holy Denys in the persecution under the Emperor Valerian, and afterwards in his old age was beheaded in the persecution under the Emperor Diocletian.
      - type: text
        text: In Isauria, under the Emperor Diocletian and the Tribune Aquilinus, the holy martyrs Azas and a hundred and fifty Companions, all soldiers.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: In óppido Marpúrgi, in Germánia, deposítio sanctæ Elísabeth Víduæ, Regis Hungarórum Andréæ fíliæ, ex tértio Ordine sancti Francísci, quæ, pietátis opéribus assídue inténta, miráculis clara migrávit ad Dóminum.
      - type: text
        text: Sancti Pontiáni, Papæ et Mártyris; cuius dies natális tértio Kaléndas Novémbris recensétur.
      - type: text
        text: Samaríæ, in Palæstína, sancti Abdíæ Prophétæ.
      - type: text
        text: Romæ, via Appia, natális sancti Máximi, Presbýteri et Mártyris, qui, in persecutióne Valeriáni passus, pósitus est ad sanctum Xystum.
      - type: text
        text: In civitáte Astiagénsi, in Hispánia, beáti Crispíni Epíscopi, qui, cápite amputáto, martýrii glóriam adéptus est.
      - type: text
        text: Eódem die sancti Fausti, Diáconi Alexandríni, qui primum, in persecutióne Valeriáni, cum sancto Dionýsio, in exsílium missus est; deínde, ætáte longǽvus, in persecutióne Diocletiáni, animadvérsus gládio martýrium consummávit.
      - type: text
        text: Cæsaréæ, in Cappadócia, sancti Bárlaam Mártyris, qui, agréstis licet et rudis, Christi sapiéntia munítus tyránnum vicit, et ignem ipsum per invíctam fídei constántiam superávit; in cuius die natáli sanctus Basilíus Magnus célebrem hábuit oratiónem.
      - type: text
        text: Viénnæ, in Gállia, sanctórum Mártyrum Severíni, Exsupérii et Feliciáni; quorum córpora, post multa annórum currícula, ipsis revelántibus, invénta, et a Pontífice, clero et pópulo illíus urbis honorífice subláta, condígno honóre cóndita sunt.
      - type: text
        text: In Isáuria pássio sanctórum Azæ et Sociórum centum quinquagínta mílitum, sub Diocletiáno Imperatóre et Aquilíno Tribúno.
  psalm.tertiod-cimo-kal-ndas-febru-rii-f74825b20b:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 20th day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy Pope Fabian, who suffered in the time of the Emperor Decius, and was buried in the cemetery of Callistus.
      - type: text
        text: There also, at the Catacombs, the holy martyr Sebastian, commander of the first cohort under the Emperor Diocletian. Being convicted of Christianity, he was tied up in the midst of a field and shot at by the soldiers, but in the end he was beaten to death with cudgels.
      - type: text
        text: At Nice, in Bithynia, (in the fourth century,) the holy martyr Neophitus, who in the fifteenth year of his age was flogged, cast into a furnace, and thrown to wild beasts, and for as much as he remained unhurt and constantly professed the faith of Christ, he was at length beheaded.
      - type: text
        text: At Caesena, (in the tenth century,) holy Maurus, Bishop of that see, famous for graces and miracles.
      - type: text
        text: In Palestine, (in the year 473,) holy Euthymius, (surnamed the Great,) Abbot (near Jerusalem,) who flourished in the Church in the time of the Emperor Marcian, filled with zeal for catholic discipline, and marked by the power of working miracles.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sancti Fabiáni, Papæ et Mártyris, qui, Décii témpore, martýrium passus est, atque in cœmetério Callísti sepúltus.
      - type: text
        text: Item Romæ, ad Catacúmbas, sancti Sebastiáni Mártyris, qui, Diocletiáno Imperatóre, cum habéret principátum primæ cohórtis, iussus est, sub título christianitátis, ligári in médio campo, et sagittári a milítibus, atque ad últimum fústibus cædi, donec defíceret.
      - type: text
        text: Nicǽæ, in Bithýnia, sancti Neóphyti Mártyris, qui, quintumdécimum annum ætátis agens, flagris cæsus, in fornácem immíssus, feris obiéctus, et, cum illǽsus permanéret et Christi fidem constánter profiterétur, gládio tandem occísus est.
      - type: text
        text: Cæsénæ sancti Mauri Epíscopi, virtútibus et miráculis clari.
      - type: text
        text: In Palæstína natális sancti Euthýmii Abbátis, qui zelo cathólicæ disciplínæ et virtúte miraculórum, témpore Marciáni Imperatóris, in Ecclésia flóruit.
  psalm.tertiod-cimo-kal-ndas-i-lii-58004f25e7:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Florence, St. Juliana Falconieri, virgin, foundress of the Sisters of the Order of the Servants of the Blessed Virgin Mary, who was placed among the holy virgins by the Sovereign Pontiff, Clement XII.
      - type: text
        text: At Milan, [in the first century,] the holy martyrs Gervase and Protase, brothers. The former, by order of the judge Astasius, was scourged with leaded whips for so long that he expired. The latter, after being scourged with rods, was beheaded. Through divine revelation their bodies were found by St. Ambrose. They were partly covered with blood, and as free from corruption as if they had been put to death that very day. When the translation took place, a blind man recovered his sight by touching their relics, and many persons possessed by demons were delivered.
      - type: text
        text: At the monastery in the valley of Castro in Piceno, the birthday of St. Romuald, anchoret, a native of Ravenna. He was the founder of the Camaldolese monks, and he restored and greatly extended monastic discipline, which was much relaxed in Italy. His feast is observed on the 7th of February, on which day his sacred relics were transferred to Fabriano.
      - type: text
        text: At Arezzo in Tuscany, the holy martyrs Gaudentius, bishop, and Culmatius, deacon, who were murdered by the furious heathen, during the reign of Valentinian.
      - type: text
        text: Also, St. Boniface, martyr, a disciple of blessed Romuald, who was sent by the Roman Pontiff, Gregory V, to preach the Gospel in Russia. Having passed through fire uninjured, and baptized the king and his people, he was killed by the enraged brother of the king, and thus gained the palm of martyrdom which he ardently desired.
      - type: text
        text: At Ravenna, [likewise in the first century,] St. Ursicinus, martyr, who remained constant through many torments in the confession of martyrdom by being beheaded.
      - type: text
        text: At Sozopolis, under the governor Domitian, during the persecution of Trajan, St. Zosimus, martyr, who suffered bitter tortures, was beheaded, and thus triumphantly went to heaven.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Floréntiæ sanctæ Iuliánæ Falconériæ Vírginis, quæ Sorórum Ordinis Servórum beátæ Maríæ Vírginis fuit Institútrix, et a Cleménte Duodécimo, Pontífice Máximo, in sanctárum Vírginum númerum reláta est.
      - type: text
        text: Medioláni sanctórum Mártyrum Gervásii et Protásii fratrum, ex quibus priórem támdiu iussit Astásius Iudex plumbátis cædi, quoúsque ille spíritum exhaláret; posteriórem vero, fústibus cæsum, cápite truncári. Horum córpora, Dómino revelánte, beátus Ambrósius sánguine conspérsa et ita incorrúpta réperit, ac si eo die ipsi fuíssent interémpti; in quorum translatióne cæcus, féretri tactu, lumen recépit, et plúrimi, vexáti a dæmónibus, liberáti sunt.
      - type: text
        text: In monastério Vallis Castri, in Picéno, natális sancti Romuáldi Ravennátis, Anachorétæ et Monachórum Camaldulénsium Patris; qui collápsam in Itália eremíticam discíplinam restítuit ac mirífice propagávit. Eius tamen festívitas recólitur séptimo Idus Februárii, quo die sacræ ipsíus relíquiæ Fabriánum sunt translátæ.
      - type: text
        text: Arétii, in Túscia, sanctórum Mártyrum Gaudéntii Epíscopi, et Culmátii Diáconi, qui, témpore Valentiniáni, furóre Gentílium cæsi sunt.
      - type: text
        text: Eódem die sancti Bonifátii, Epíscopi et Mártyris; qui fuit beáti Romuáldi discípulus. Hic, a Gregório Quinto, Románo Pontífice, ad prædicándum Evangélium in Rússiam missus, ibi, cum per ignem transísset illǽsus, Regémque ac pópulum baptizásset, a furénte Regis fratre necátus est, atque sic optátam martýrii corónam accépit.
      - type: text
        text: Ravénnæ sancti Ursicíni Mártyris, qui, sub Paulíno Iúdice, post plúrima torménta, in Dómini confessióne pérmanens immóbilis, cápitis abscissióne martýrium complévit.
      - type: text
        text: Sozópoli, in Pisídia, sancti Zósimi Mártyris, qui, in persecutióne Traiáni, sub Domitiáno Prǽside, post acérbos cruciátus, cápite amputáto, victor migrávit ad Dóminum.
  psalm.tertiod-cimo-kal-ndas-i-nii-a1a9a22fa5:
    role: psalm
    content:
      en:
      - type: citation
        text: 'On the 20th day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Aquila, in the Abruzzi, holy Bernardine of Sienna, of the Order of Friars Minors, who enlightened Italy both by word and example.
      - type: text
        text: At Rome, on the Salarian Way, [about A.D. 160] the holy Virgin Basilla. She was of the blood of kings and illustriously betrothed, but rejected her spouse, whereupon he accused her of being a Christian, and the Emperor Gallienus ordered that she should either take him back or perish by the sword. She answered that the King of kings was her Bridegroom, and the sword was accordingly passed through her.
      - type: text
        text: At Nimes, in Gaul, the holy martyr Baudelius. He was apprehended and would not sacrifice, and so remaining inmovable amidst stripes and torments, grasped the palm of martyrdom by a death precious in the sight of the Lord.
      - type: text
        text: At Edessa, in Syria, the holy martyrs Thalalaeus, Asterius, Alexander, and their companions, who suffered under the Emperor Numerian.
      - type: text
        text: In the Thebai'd, the holy martyr Aquila, who was lacerated with combs, for Christ's sake.
      - type: text
        text: At Bourges, in Gaul, [in the seventh century,] the holy Confessor Austregisilus, [Bishop of that see.]
      - type: text
        text: At Brescia, [early in the seventh century,] the holy Anastasius, Bishop [of that see.]
      - type: text
        text: At Pavia, [in the eighth century,] the holy Theodore, Bishop [of that see.]
      - type: text
        text: At Rome, the holy Plautilla, a woman of Consular rank and mother of the blessed Flavia Domitilla. She was baptized by the holy Apostle Peter, and after being eminent for excellency, fell asleep in peace.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Aquilæ, in Vestínis, sancti Bernardíni Senénsis, Sacerdótis ex Ordine Minórum et Confessóris, qui verbo et exémplo Itáliam illustrávit.
      - type: text
        text: Romæ sanctæ Plautíllæ, féminæ Consuláris, quæ beatórum Mártyrum Flávii Cleméntis Cónsulis soror et Fláviæ Domitíllæ Vírginis mater éxstitit; atque, a sancto Petro Apóstolo baptizáta, ómnium virtútum laude refúlgens, quiévit in pace.
      - type: text
        text: Item Romæ, via Salária, natális sanctæ Basíllæ Vírginis, quæ, cum esset ex regio génere, et illustríssimum sponsum habéret illúmque dimisísset, accusáta fuit ab eo quod esset Christiána, et mox decrétum est a Galliéno Augústo ut aut sponsum recíperet, aut gládio interíret; cumque ipsa Virgo, convénta de hoc, respondísset se Regem regum habére sponsum, gládio transverberáta est.
      - type: text
        text: Nemáusi, in Gálliis, sancti Baudélii Mártyris, qui comprehénsus est a Pagánis, et, cum sacrificáre nollet idólis et in Christi fide inter vérbera et torménta immóbilis persísteret, martýrii palmam pretiósa morte suscépit.
      - type: text
        text: Edéssæ, apud Ægas, in Cilícia, sanctórum Mártyrum Thalelǽi, Astérii, Alexándri et Sociórum, qui sub Numeriáno Imperatóre passi sunt.
      - type: text
        text: In Thebáide sancti Aquilæ Mártyris, qui pectínibus pro Christo dilaniátus fuit.
      - type: text
        text: Apud Bitúricas, in Aquitánia, sancti Austregísili, Epíscopi et Confessóris.
      - type: text
        text: Bríxiæ sancti Anastásii Epíscopi.
      - type: text
        text: Pápiæ sancti Theodóri Epíscopi.
  psalm.tertiod-cimo-kal-ndas-ianu-rii-b85e224ef0:
    role: psalm
    content:
      en:
      - type: text
        text: Tomorrow is the eve of the holy Apostle Thomas.
      - type: citation
        text: 'Upon the same 20th day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Liberatus, Bajulus, Ammon, Zeno, Ptolemy, Ingenes, and Theophilus, all martyrs. They were on guard beside the judgment-seat when a certain Christian who was under the torture began to waver and was almost giving way, and they tried by signs to encourage him to hold out; for this cause all the people cried out against them, and they came forward and confessed themselves to be Christians and Christ, who Himself had given such steadfastness unto His own, did Himself most gloriously triumph in their victory, (in the year 249.)
      - type: text
        text: At Geldube, (in Thrace,) the holy martyr Julius, (fourth century.)
      - type: text
        text: In Arabia, the holy martyrs Eugenius and Macarius, two Priests who blamed the ungodliness of the Emperor Julian the Apostate, and for that cause were most cruelly flogged and sent out into the great desert, where they were slain with the sword, (in the year 362.)
      - type: text
        text: At Antioch, holy Philogonius, Patriarch of the see. He was an advocate when he was called by the will of God to govern that church, and first took up the contending for the Catholic faith along with holy Bishop Alexander, and his Companions, against Arius. He fell asleep in the Lord, illustrious for good works, (in the year 322.) Holy John Chrysostom preached an eloquent sermon on his feast-day.
      - type: text
        text: At Brescia, the holy Confessor Dominic, Bishop (of that see, about the year 612.)
      - type: text
        text: On this day is commemorated the burial in Spain of holy Dominic, Abbot of Silos, (in the diocese of Burgos, in Castile, which abbey he founded,) of the Order of St. Benedict, very famous for his miracles wrought for the liberation of captives. (He died in his monastery at Silos, on December 14, 1073.)
      la:
      - type: text
        text: Tertiodécimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sancti Zephyríni, Papæ et Mártyris. Ipsíus tamen festum recólitur séptimo Kaléndas Septémbris.
      - type: text
        text: Ibídem pássio sancti Ignátii, Epíscopi et Mártyris; qui, tértius post beátum Petrum Apóstolum, Antiochénam rexit Ecclésiam. Hic, in persecutióne Traiáni, damnátus ad béstias, Romam vinctus míttitur; ibíque, circumsedénte Senátu, immaníssimis pœnárum supplíciis primo est afféctus, dehinc obiícitur leónibus, quorum déntibus præfocátus, hóstia Christi effícitur. Eius vero festívitas Kaléndis Februárii celebrátur.
      - type: text
        text: Item Romæ sanctórum Mártyrum Liberáti et Báiuli.
      - type: text
        text: In Arábia sanctórum Mártyrum Eugénii et Macárii Presbyterórum, qui a Iuliáno Apóstata, cum ipsíus impietátem arguíssent, sævíssimis plagis affécti sunt, atque in vastíssimam erémum relegáti, et gládio cæsi.
      - type: text
        text: Alexandríæ sanctórum mílitum et Mártyrum Ammónis, Zenónis, Ptolemǽi, Ingenis et Theóphili; qui, tribunálibus astántes, cum quidam Christiánus, in supplíciis pósitus, trepidáret et iam prope ad negándum declináret, vultu, óculis ac nútibus illum conabántur erígere. Cumque hac de causa clamor totíus pópuli in eos prosilíret, prorumpéntes in médium se Christiános esse testáti sunt; per quorum victóriam Christus, qui suis eam animi constántiam déderat, gloriosíssime triumphávit.
      - type: text
        text: Géldubæ, in Germánia, sancti Iúlii Mártyris.
      - type: text
        text: Antiochíæ natális sancti Philogónii Epíscopi, qui, Dei nutu ex causídico ad eam Ecclésiam regéndam accersítus, advérsus Aríum, una cum sancto Alexándro Epíscopo et Sóciis, primum pro fide cathólica certámen íniit, clarúsque méritis quiévit in Dómino; cuius ánnuam festivitátem sanctus Ioánnes Chrysóstomus præcláro encómio celebrávit.
      - type: text
        text: Bríxiæ sancti Domínici, Epíscopi et Confessóris.
      - type: text
        text: In Hispánia deposítio sancti Domínici de Sylos Abbátis, e sancti Benedícti Ordine, miráculis in captivórum liberatióne celebérrimi.
  psalm.tertiod-cimo-kal-ndas-m-rtii-fdee823555:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 17th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyr Faustinus, and forty-four others, who followed him to his crown.
      - type: text
        text: In Persia, [in the year 251,] holy Polychronius, Bishop of Babylon, who in the persecution of Decius had his mouth broken with stones, and then with his hands stretched out and his eyes lifted up to heaven, gave up the ghost.
      - type: text
        text: At Concordia, [in the year 303,] the holy martyrs Donatus, Secundianus, and Romulus, together with eighty-six others, who were partakers in their crown.
      - type: text
        text: At Caesarea, in Palestine, [in the year 309,] holy Theodulus the Elder, of the household of the President Firmilian. He was stirred up by the example of the martyrs steadfastly to confess Christ, and being himself crucified gained by a noble victory the palm of martyrdom.
      - type: text
        text: There also the holy martyr Julian the Cappadocian. He kissed the bodies of the slaughtered martyrs, and was therefore accused of Christianity, brought before the President, and burnt on a slow fire.
      - type: text
        text: In the country of Tervan, holy Silvin, Bishop of Toulouse.
      - type: text
        text: In Ireland, [in the middle of the sixth century,] the holy Priest and Confessor Fintan, [of the race of whom was Brigid he was Abbot of Cluain-ed-nech in Leinster, and was called chief head of the monks of Ireland.]
      - type: text
        text: At Florence, [at the end of the thirteenth century,] the blessed Confessor Alexis de' Falconieri, one of the seven founders of the Order of Servants of the Blessed Virgin Mary. He died a blessed death in the hundred and tenth year of his life, strengthened by the presence of Christ Jesus and of the angels.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Floréntiæ natális sancti Aléxii Falconérii Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, décimo supra centésimum vitæ suæ anno, Christi Iesu et Angelórum præséntia recreátus, beáto fine quiévit. Ipsíus tamen ac Sociórum festum prídie Idus Februárii celebrátur.
      - type: text
        text: Romæ pássio sancti Faustíni, quem álii quadragínta quátuor secúti sunt ad corónam.
      - type: text
        text: In Pérside natális beáti Polychrónii, Epíscopi Babylónis, qui, in persecutióne Décii, ore lapídibus cæso, mánibus exténsis, ad cælum óculos élevans, emísit spíritum.
      - type: text
        text: Concórdiæ, in Venetórum fínibus, sanctórum Mártyrum Donáti, Secundiáni et Rómuli, cum áliis octogínta sex, eiúsdem corónæ consórtibus.
      - type: text
        text: Cæsaréæ, in Palæstína, sancti Theodúli senis, qui, cum esset ex família Prǽsidis Firmiliáni, et, Mártyrum excitátus exémplo Christum constánter confiterétur, martýrii palmam, cruci affíxus, nóbili triúmpho proméruit.
      - type: text
        text: Ibídem sancti Iuliáni Cappádocis, qui, exosculátus necatórum Mártyrum córpora, et ídeo ut Christiánus delátus et ad Prǽsidem ductus, lento igne iussus est combúri.
      - type: text
        text: In pago Tarvanénsi, in Gállia, sancti Silvíni, Epíscopi Tolosáni.
      - type: text
        text: In monastério Cluain-ednechénsi, in Hibérnia, sancti Fintáni, Presbýteri et Abbátis.
  psalm.tertiod-cimo-kal-ndas-maii-97097f0ed2:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Canterbury, in England, the holy martyr Elphege, Bishop of that see. [He had been Bishop of Winchester. He died in the year 1012.]
      - type: text
        text: At Corinth, the holy martyr Timon, one of the seven first Deacons. He first dwelt as a teacher at Berea, and thence came, spreading the word of God as far as Corinth there he is said to have been cast into the fire by the Jews and Greeks, but remained unharmed, and was crucified. [He was successively Bishop of Tyre and of Bostra. He preached in Berea, Corinth, the island of Cyprus where he prepared the way for St. Barnabas, Phoenicia, and Arabia.]
      - type: text
        text: At Malathia, in Armenia, the holy martyrs Hermogenes, Caius, Expeditus, Aristonicus, Rufus, and Galata, who were all crowned upon one and the same day.
      - type: text
        text: At Cancavella, in Catalonia, the holy martyr Vincent, [in the year 291.]
      - type: text
        text: On the same day, [in the second century,] the holy martyrs Socrates and Denis, who were run through with lances.
      - type: text
        text: At Jerusalem, the holy martyr Paphnutius.
      - type: text
        text: At Antioch, in Pisidia, [in the ninth century,] holy George, Bishop of that see, who died in exile for the honouring of holy images.
      - type: text
        text: At Rome, the holy Pope, Leo IX, [from the year 1049 till 1054,] illustrious for his grace and the fame of his miracles. [He is the same as St. Bruno, 40th Bishop of Toul.]
      - type: text
        text: In the monastery of Lobbes, holy Bishop Ursmar, [Abbot of Lobbes, in the years 644-713.]
      - type: text
        text: At Florence, [in the year 396,] the holy Confessor Crescentius, disciple of the blessed Zenobius, Bishop [of that see. Among the early Bishops of the church of Florence, St. Zenobius, the 5th of that see, is celebrated. He was elected about the year 376 and ministered till the year 407. He buried his sub-deacon St. Crescent with his own hands. St. Crescent is mentioned by St Ambrose.]
      la:
      - type: text
        text: Tertiodécimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Corínthi natális sancti Timónis, qui fuit unus de septem primis Diáconis. Hic primo apud Beroéam Doctor resédit, ac deínde, verbum Dómini disséminans, venit Corínthum; ibíque, a Iudǽis et Græcis (ut tráditur) iniéctus flammis, sed nihil læsus, demum, cruci affíxus, martýrium suum implévit.
      - type: text
        text: Cantuáriæ, in Anglia, sancti Elphegi, Epíscopi et Mártyris.
      - type: text
        text: Melitínæ, in Arménia, sanctórum Mártyrum Hermógenis, Caii, Expedíti, Aristoníci, Rufi et Gálatæ, qui omnes una die sunt coronáti.
      - type: text
        text: Caucolíberi, in Hispánia Tarraconénsi, pássio sancti Vincéntii Mártyris.
      - type: text
        text: Eódem die sanctórum Mártyrum Sócratis et Dionýsii, qui lánceis confóssi sunt.
      - type: text
        text: Hierosólymis sancti Paphnútii Mártyris.
      - type: text
        text: Romæ sancti Leónis Papæ Noni, virtútum et miraculórum laude insígnis.
      - type: text
        text: Antiochíæ Pisídiæ sancti Geórgii Epíscopi, qui, ob sanctárum Imáginum cultum, exsul occúbuit.
      - type: text
        text: In cœnóbio Laubiénsi, in Bélgio, sancti Ursmári Epíscopi.
      - type: text
        text: Floréntiæ sancti Crescéntii Confessóris, qui fuit discípulus beáti Zenóbii Epíscopi.
  psalm.tertiod-cimo-kal-ndas-nov-mbris-691ce9b3c9:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Octave of the holy Confessor Edward.
      - type: text
        text: On the morrow also we keep the Feast of the Holy Confessor John of Kenty, in Poland, glorious for graces and miracles, whose name the Supreme Pontiff Clement XIII enrolled among those of the Saints, (and of whom mention is made upon the 24th day of December.)
      - type: citation
        text: 'Upon the same 20th day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Avia, near Aquila, in the Abruzzi, (in the third century,) the blessed martyr Maximus the Levite. From his desire to suffer he showed himself when the persecutors sought for him, when he was interrogated he answered with steadfastness, was tortured upon the rack, then cudgelled, and at last thrown down from an high place, and so slain.
      - type: text
        text: At Agen, in Gaul, the holy martyr Caprasius. He had escaped from the fury of the persecution, and was lying hid in a cave, when he heard how the blessed Virgin Faith was suffering for Christ's sake. Then he was stirred up to bear suffering likewise, and he prayed the Lord that if He judged him also to be worthy of the glory of martyrdom He would cause a spring of clear water to break forth from the rock of the cave, which thing when the Lord granted, Caprasius went back confidently to the field of battle, and gained the crown of martyrdom by a noble contention.
      - type: text
        text: At Antioch, the holy Augustal Prefect Artemius, who had been distinguished for the highest military service under the Emperor Constantine the Great, but when he rebuked the Emperor Julian the Apostate for his cruelty toward the Christians, Julian commanded him to be cudgelled, tortured, and beheaded.
      - type: text
        text: At Cologne, the holy Virgins Martha and Saula, and others, all martyrs.
      - type: text
        text: At Minden, (in the third century,) the holy martyr Bishop Felician.
      - type: text
        text: At Paris (is commemorated the translation of the relics of) the holy martyrs George the Deacon and Aurelius, (of whom mention is made upon the 27th day of July.)
      - type: text
        text: In Portugal, suffered (in the seventh century,) the holy Virgin and martyr Irene.
      - type: text
        text: At Reims, deceased, (about the year 600,) the holy Confessor Sindulph.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Sancti Ioánnis Cántii, Presbýteri et Confessóris, qui nono Kaléndas Ianuárii obdormívit in Dómino.
      - type: text
        text: In Aviénsi civitáte, prope Aquilam, in Vestínis, natális beáti Máximi, Levítæ et Mártyris; qui, patiéndi desidério, inquiréntibus se persecutóribus palam osténdit, et, post responsiónis constántiam, equúleo suspénsus ac tortus, deínde fústibus cæsus, ad últimum, e sublími loco præcipitátus, occúbuit.
      - type: text
        text: Agénni, in Gállia, sancti Caprásii Mártyris, qui, cum rábiem persecutiónis declínans latéret in spelúnca, tandem, áudiens quáliter beáta Fides Virgo pro Christo agonizáret, índeque animátus ad tolerántiam passiónum, orávit ad Dóminum, ut, si eum glória martýrii dignum iudicáret, ex lápide spelúncæ limpidíssima aqua manáret; quod cum Dóminum præstitísset, secúrus ad áream certáminis properávit, et palmam martýrii, sub Maximiáno Imperatóre, fórtiter dimicándo proméruit.
      - type: text
        text: Antiochíæ sancti Artémii, Ducis Augustális, qui, sub Constantíno Magno præcláris milítiæ honóribus functus, a Iuliáno Apóstata, quem sævítiæ in Christiános argúerat, fústibus cædi, aliísque torméntis afflígi, ac demum cápite truncári iubétur.
      - type: text
        text: Constantinópoli sancti Andréæ Creténsis Mónachi, qui ob cultum sacrárum Imáginum, sub Constantíno Coprónymo, sǽpius verberátus, tandem, amputáto áltero pede, réddidit spíritum.
      - type: text
        text: Colóniæ Agrippínæ pássio sanctárum Vírginum Marthæ et Saulæ, cum áliis plúribus.
      - type: text
        text: Apud Nabántiam, in Lusitánia, sanctæ Irénes, Vírginis et Mártyris; cuius corpus honorífice sepúltum fuit in óppido Scálabi, quod ipsíus Sanctæ nómine insignítum inde permánsit.
      - type: text
        text: Alsóntiæ, in território Rheménsi, sancti Sindúlphi, Presbýteri et Confessóris.
      - type: text
        text: Apud Mindam, in Germánia, Translátio sancti Feliciáni, Epíscopi Fulginátis et Mártyris; cuius ibi depósita fuit sacrárum pars reliquiárum, quæ in Germániam advéctæ sunt ex Umbriæ civitáte Fulgíneo, ubi ipse nono Kaléndas Februárii passus quondam fúerat.
      - type: text
        text: Lutétiæ Parisiórum item Translátio sanctórum Mártyrum Geórgii Diáconi, et Aurélii, ex urbe Hispániæ Córduba, in qua olim, una cum áliis tribus Sóciis, ambo martýrium compléverant sexto Kaléndas Augústi.
  psalm.tertiod-cimo-kal-ndas-oct-bris-c769fe9631:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Pozzuoli, in Campania, the holy martyrs Januarius, Bishop of Benevento, Festus his Deacon, and Desiderius his Reader, Sosius, a Deacon of the Church of Miseno, Proculus, a Deacon of Pozzuoli, (and two laymen named respectively) Eutyches and Acutius, who were chained and imprisoned, and at length beheaded, under the Emperor Diocletian. The body of the holy Januarius was carried to Naples, and honourably buried in the church there, where also is still kept in a glass phial some of the blood of this most blessed martyr, which is seen to melt and bubble, as though it were fresh, when it is put in sight of his head.
      - type: text
        text: At Nocera, the holy martyrs Felix and Constance, who suffered under Nero.
      - type: text
        text: In Palestine, the holy martyrs Peleus, Nilus, and Elias, Bishops of Egypt, who, in the time of the persecution under the Emperor Diocletian, were, along with many other clerks, consumed with fire for Christ's sake.
      - type: text
        text: On the same day, under the Emperor Probus, the holy martyrs Trophimus, Sabbatius, and Dorymedon.
      - type: text
        text: Sabbatius was flogged to death at Antioch, by command of Atticus the President; Trophimus was sent to Synnada to the President Perennius, and there, after being put to many torments, he was beheaded along with the Senator Dorymedon.
      - type: text
        text: At Cordova, in the persecution under the Arabs, (in the ninth century,) the holy virgin and martyr Pomposa.
      - type: text
        text: At Canterbury, holy Theodore, Archbishop of that city, who was sent into England by Pope Vitalian, and was a burning and a shining light for teaching and holiness. (We keep his feast upon the 26th day of this present month of September.)
      - type: text
        text: At Tours, (in the fifth century,) the holy Confessor Eustochius, Bishop (of that see,) a man of many graces.
      - type: text
        text: In the country of Langres, (in the sixth century,) the holy Priest and Confessor Sequanus.
      - type: text
        text: At Barcelona, in Spain, the blessed virgin Mary de Cervelhon, of the Order of St. Mary of Ransom, who, because of her ready help to them that call upon her, is commonly called Helpful Mary.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: Putéolis, in Campánia, sanctórum Mártyrum Ianuárii, Beneventánæ civitátis Epíscopi, eiúsque Diáconi Festi, et Desidérii Lectóris, Sósii, Diáconi Ecclésiæ Misenátis, Próculi, Diáconi Puteoláni; Eutýchii et Acútii. Hi omnes, post víncula et cárceres, cápite cæsi sunt, sub Diocletiáno Príncipe. Corpus sancti Ianuárii delátum fuit Neápolim, atque honorífice in Ecclésia tumulátum; ubi étiam beatíssimi Mártyris sanguis in ampúlla vitrea adhuc servátur, qui, in conspéctu cápitis illíus pósitus, velut recens liquéscere et ebullíre conspícitur.
      - type: text
        text: In Palæstína sanctórum Mártyrum et Ægýpti Episcopórum Pélei, Nili et Elíæ; qui, témpore persecutiónis Diocletiáni, cum plúrimis Cléricis, pro Christo sunt igne consúmpti.
      - type: text
        text: Nucériæ natális sanctórum Mártyrum Felícis et Constántiæ, qui passi sunt sub Neróne.
      - type: text
        text: Eódem die sanctórum Mártyrum Tróphimi, Sabbátii et Dorymedóntis, sub Probo Imperatóre. Ex eis Sabbátius Antiochíæ, iussu Attici Prǽsidis, támdiu flagris cæsus est, donec emítteret spíritum; Tróphimus vero, Sýnnadam, in Phrýgia, ad Perénnium Prǽsidem missus, ibi, post multos cruciátus, cum Dorymedónte Senatóre, cápitis decollatióne martýrium consummávit.
      - type: text
        text: Eleutherópoli, in Palæstína, sanctæ Susánnæ, Vírginis et Mártyris; quæ, orta ex idolórum sacerdóte Arthémio et Iudǽa mulíere Martha, ad Christiánam fidem, paréntibus mórtuis, est convérsa, atque ob eándem fidem ab Alexándro Præfécto várie torta et in cárcerem trusa, ibi orans migrávit ad Sponsum.
      - type: text
        text: Córdubæ, in Hispánia, sanctæ Pompósæ, Vírginis et Mártyris; quæ in persecutióne Arábica, ob impávidam Christi confessiónem decolláta gládio, palmam consecúta est.
      - type: text
        text: Cantuáriæ sancti Theodóri Epíscopi, qui, a beáto Vitaliáno Papa in Angliam missus, doctrína et sanctitáte refúlsit.
      - type: text
        text: Turónis, in Gállia, sancti Eustóchii Epíscopi, magnárum virtútum viri.
      - type: text
        text: In território Lingoniénsi sancti Séquani, Presbýteri et Confessóris.
      - type: text
        text: Barcinóne, in Hispánia, beátæ Maríæ de Cervellióne, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, Vírginis; quæ, ob præséntem quam invocántibus confert opem, María de Subsídio vulgo nuncupátur.
      - type: text
        text: In vico Druelle, in diœcési Ruthenénsi, in Gállia, sanctæ Maríæ Guliélmæ-Æmíliæ de Rodat, Vírginis, Congregatiónis Sorórum a sancta Família Fundatrícis, puéllis erudiéndis et egénis sublevándis addictíssimæ, quæ a Pio Duodécimo, Pontífice Máximo, inter sanctas Vírgines reláta est.
  psalm.tertiod-cimo-kal-ndas-sept-mbris-289525828f:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 20th day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: In the country of Langres, [in the year 1153,] holy Bernard, the first Abbot of Clairvaux, glorious for his life, his teaching, and his miracles, whom the Supreme Pontiff Pius VIII declared and confirmed a Doctor of the Universal Church.
      - type: text
        text: In Judea, [in the year 1043 before Christ,] the holy Prophet Samuel, whose sacred bones, as writeth blessed Jerome, were carried to Constantinople by the Emperor Arcadius, and laid near the Hebdomon.
      - type: text
        text: On the same day, [in the fourth century,] the holy Senator Lucius. He was turned to the faith of Christ by seeing the constancy with which Theodore, Bishop of Cyrene, underwent martyrdom, and drew the President Dignian to the same belief; they went together to Cyprus, and when he saw other Christians there being crowned for confessing the Lord, he thrust himself forward and gained the same crown of martyrdom by being beheaded.
      - type: text
        text: In Thrace, thirty-seven holy martyrs, who under the President Apellian, for Christ's faith's sake, had their hands and feet cut off, and were cast into a furnace of fire. Likewise the holy martyrs Severus and Memnon the centurion, who finished their testimony by the same kind of death, and departed to heaven as conquerors.
      - type: text
        text: At Cordova, [in the year 852,] the holy martyrs Leovigild and Christopher. They were monks who were cast into prison for their defence of the Christian faith in the persecution under the Arabs, and were presently beheaded, and so gained the palm of martyrdom, whereafter their bodies were burnt.
      - type: text
        text: At Rome, [in the third century,] blessed Porphyry, a man of God, from whom the holy martyr Agapitus learnt the faith and teaching of Christ.
      - type: text
        text: In the island of Noirmoutier, [in the seventh century,] the holy Philibert, [first] Abbot [of Jumièges and of Noirmoutier.]
      - type: text
        text: In the castle of Chinon, [in the fifth century,] the holy Confessor Maximus, a disciple of blessed Martin, Bishop [of Tours.]
      - type: text
        text: At Monte Senario, in the Diocese of Florence, [in the year 1268,] the blessed Confessor Manetto [Zantella,] one of the Seven Founders of the Order of Servants of the Blessed Virgin Mary, who died as he was reciting hymns to her.
      la:
      - type: text
        text: Tertiodécimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: In território Lingoniénsi deposítio sancti Bernárdi, primi Clarævallénsis Abbátis, vita, doctrína et miráculis gloriósi, quem Pius Octávus Póntifex Máximus universális Ecclésiæ Doctórem declarávit, et confirmávit.
      - type: text
        text: Romæ deposítio sancti Pii décimi, Papæ et Confessóris, fídei integritáte et ecclesiásticæ libertátis propugnatóris invícti, religionísque zelo insígnis, cuius festum tértio Nonas Septémbris recólitur.
      - type: text
        text: Apud montem Senárium, in Etrúria, natális sancti Manétii Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, eídem hymnos dicens, expiravit. Ipsíus autem ac Sociórum festum prídie Idus Februárii celebrátur.
      - type: text
        text: In Iudǽa sancti Samuélis Prophetæ, cuius sancta ossa (ut beátus Hierónymus scribit) Arcádius Augústus Constantinópolim tránstulit, et prope Séptimum collocávit.
      - type: text
        text: In Cypro sancti Lúcii Senatóris, qui, perspécta constántia Theodóri, Cyrenénsis Epíscopi, in martýrio pósiti, ad Christi fidem est convérsus, et ad eam étiam Digniánum Prǽsidem pertráxit; cum eóque Cyprum proféctus, ibi, cum álios Christiános pro confessióne Dómini coronári vidéret, ultro se ipsum óbtulit, et cápitis obtruncatióne eándem martýrii corónam proméruit.
      - type: text
        text: In Thrácia sanctórum trigínta septem Mártyrum, qui sub Prǽside Apelliáno pro Christi fide, mánibus pedibúsque præcísis, in camínum ardéntem iniécti sunt.
      - type: text
        text: Ibídem sanctórum Mártyrum Sevéri, et Mémnonis Centuriónis; qui, eódem mortis génere consummáti, victóres abiérunt in cælum.
      - type: text
        text: Córdubæ, in Hispánia, sanctórum Mártyrum Leovigíldi et Christóphori Monachórum, qui, in Arabum persecutióne pro Christiánæ fídei defensióne in cárcerem coniécti, ac mox, cervícibus abscíssis, igni tráditi, martýrii palmam adépti sunt.
      - type: text
        text: In Hério ínsula sancti Philibérti Abbátis.
      - type: text
        text: Romæ beáti Porphýrii, qui fuit homo Dei, qui sanctum Mártyrem Agapítum erudívit in fide et doctrína Christi.
      - type: text
        text: In castro Cainóne, in Gállia, sancti Máximi Confessóris, qui éxstitit discípulus beáti Martíni Epíscopi.
  psalm.und-cimo-kal-ndas-apr-lis-57b6cb2d7b:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Confessor Cyril, Bishop of Jerusalem, who suffered many things from the Arians for the faith's sake. He was several times driven from his see, but at length fell asleep in peace, illustrious for the glory of holiness. The Ecumenical Council of Constantinople, in writing to Pope Damasus, gave a noble witness to the purity of his faith. Mention hath been made of him on the 18th day of this present month of March.
      - type: citation
        text: 'Upon the same 22nd day of March, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Narbonne, in Gaul, holy Paul, Bishop of that see. A disciple of the Apostle, who is said to have been the same person as the Proconsul Sergius Paulus, baptized by the blessed Apostle Paul, and on his way into Spain left at Narbonne, where he received the dignity of Bishop, laboured much in the office of preaching, and passed away to heaven, famous for miracles.
      - type: text
        text: At Terracina, holy Epaphroditus, the disciple of the Apostles, who was ordained Bishop of the said city, by the blessed Apostle Peter.
      - type: text
        text: In Africa, the holy martyrs Saturninus and nine others.
      - type: text
        text: In Galatia, [in the year 252,] the holy martyrs Callinice and Basilissa.
      - type: text
        text: At Ancyra, the holy martyr Basil, a Priest, who was put to most grievous torments under the Emperor Julian the Apostate, and gave up his soul to God.
      - type: text
        text: At Carthage, the holy Archdeacon Octavian and many thousand martyrs, who were slaughtered by the Vandals for the Catholic faith's sake.
      - type: text
        text: There also, holy Deogratias, Bishop of Carthage, who redeemed many captives whom the Vandals had brought from Rome, and fell asleep in the Lord, famous for holy works, [in the year 457.]
      - type: text
        text: At Osimo, in Picenum, holy Benvenuto, Bishop of that see, [in the year 1276.]
      - type: text
        text: In Sweden, the holy Virgin Katherine, daughter of holy Bridget, [in the year 1381.]
      - type: text
        text: At Rome, the holy widow Lea, whose graces and her going hence to be with God have been recorded by Holy Jerome, [about the year 384.]
      - type: text
        text: At Genoa, the holy widow Katherine, eminent for her contempt of the world and her love toward God, [in the year 1510.]
      la:
      - type: text
        text: Undécimo Kaléndas Aprílis
      - type: text
        text: ''
      - type: text
        text: Narbóne, in Gállia, natális sancti Pauli Epíscopi, Apostolórum discípuli, quem tradunt fuísse Sérgium Paulum Procónsulem. Hic, a beáto Apóstolo Paulo baptizátus, et ab eo, cum in Hispániam pérgeret, apud Narbónem relíctus, ibídem Episcopáli dignitáte donátus est; ibíque, prædicatiónis offício non ségniter expléto, clarus miráculis migrávit in cælum.
      - type: text
        text: Tarracínæ, in Campánia, sancti Epaphrodíti, Apostolórum discípuli, qui a beáto Petro Apóstolo Epíscopus illíus civitátis ordinátus fuit.
      - type: text
        text: Ancýræ, in Galátia, sancti Basilíi, Presbýteri et Mártyris, qui sub Iuliáno Apóstata, gravíssimis cruciátibus afféctus, ánimam Deo réddidit.
      - type: text
        text: Carthágine sancti Octaviáni Archidiáconi, et multórum míllium Mártyrum, qui, ob fidem cathólicam, a Wándalis cæsi sunt.
      - type: text
        text: In Africa sanctórum Mártyrum Saturníni et aliórum novem.
      - type: text
        text: In Galátia natális sanctárum Mártyrum Callinícæ et Basilíssæ.
      - type: text
        text: Romæ sancti Zacharíæ Papæ, qui Dei Ecclésiam summa vigilántia gubernávit, et clarus méritis quiévit in pace.
      - type: text
        text: Carthágine sancti Deográtias, Epíscopi Carthaginénsis, qui plúrimos, a Wándalis captívos ex Urbe ductos, redémit, aliísque sanctis opéribus célebris quiévit in Dómino.
      - type: text
        text: Auximi, in Picéno, sancti Benvenúti Epíscopi.
      - type: text
        text: Romæ sanctæ Leæ Víduæ, cuius virtútes et tránsitum ad Deum sanctus Hierónymus scribit.
  psalm.und-cimo-kal-ndas-aug-sti-34d2193fe0:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 22nd day of July, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Marseilles, holy Mary Magdalen, out of whom the Lord cast seven devils, and who was made worthy to be the first to see this same Saviour after that He was risen from the dead.
      - type: text
        text: At Philippi, holy Syntyche, of whom mention is made by the blessed Apostle Paul.
      - type: text
        text: At Ancyra, in Galatia, the holy martyr Plato, [in the year 304.]
      - type: text
        text: Under the Vicar Agrippinus he was cut with stripes, pronged with iron nails, and tormented with other dire sorts of torments, then at last beheaded, and so gave up his soul unconquered to God. The miracles wrought by him in the succouring of prisoners are attested by the acts of the Second Council of Nicea.
      - type: text
        text: In Cyprus, the holy Praetor Theophilus. The Arabs strove to make him deny Christ, but as neither bribery nor threats could bend him, they slew him with the sword, [in the year 790.]
      - type: text
        text: At Antioch, holy Cyril, Bishop [of that see,] famous for his teaching and holiness, [in the year 300.]
      - type: text
        text: In Auvergne, the holy Abbot Menelaus, [about the year 700, Restorer of the Abbey of Menat, in the Diocese of Clermont.]
      - type: text
        text: In the Monastery of the Blandijnberg, in Gent in Flanders, holy Wandregisilus [St. Wandrille], Abbot of Fontenelle, [in the year 667, the founder of several monasteries.]
      - type: text
        text: At Lisbon, the holy Confessor Laurence of Brindisi, Minister-General of the Order of Capuchin Friars Minors of St. Francis. He was famous for his preaching of the word of God, and for his hard work for God's glory, and the Supreme Pontiff Leo XIII enrolled his name among those of the saints.
      - type: text
        text: At Bethshan, in Palestine, the holy Earl Joseph, [about the year 366.]
      la:
      - type: text
        text: Undécimo Kaléndas Augústi
      - type: text
        text: ''
      - type: text
        text: Apud Massíliam, in Gállia, natális sanctæ Maríæ Magdalénæ, de qua Dóminus eiécit septem dæmónia, et quæ ipsum Salvatórem a mórtuis resurgéntem prima vidére méruit.
      - type: text
        text: Ulyssipóne, in Lusitánia, natális sancti Lauréntii a Brundúsio, Confessóris, ex Ordine Fratrum Minórum Capuccinórum, quem verbi Dei prædicatióne, cælésti doctrína, pontificiis legatiónibus rebúsque ad Dei glóriam et Ecclésiæ utilitátem felíciter gestis præclárum, Leo Papa décimus tértius Sanctárum fastis adscrípsit, et Summus Póntifex Ioánnes vigésimus tértius universális Ecclésiæ Doctórem declarávit, eiúsque festum prídie huius diéi celebrári iussit.
      - type: text
        text: Philíppis, in Macedónia, sanctæ Synthýches, cuius méminit beátus Paulus Apóstolus.
      - type: text
        text: Ancýræ, in Galátia, natális sancti Platónis Mártyris, qui, sub Agrippíno Vicário, verbéribus cæsus, uncis laniátus férreis, aliísque immaníssimis tormentórum genéribus cruciátus, demum, abscísso cápite, invíctam ánimam Deo réddidit. Ipsíus vero mirácula in subveniéndis captívis, Acta secúndæ Sýnodi Nicǽnæ testántur.
      - type: text
        text: In Cypro sancti Theóphili Prætóris, qui ab Arábibus tentus, et, cum nec donis nec minis flecti posset ut Christum negáret, gládio cæsus est.
      - type: text
        text: Antiochíæ sancti Cyrílli Epíscopi, doctrína et sanctitáte conspícui.
      - type: text
        text: Menáti, in território Arvernénsi, sancti Meneléi Abbátis.
      - type: text
        text: In monastério Fontanéllæ, in Gállia, sancti Wandregísili Abbátis, miráculis clari; cuius corpus ad Blandínum monastérium, in Flándria, póstea delátum fuit.
      - type: text
        text: Scythópoli, in Palæstína, sancti Ioséphi Cómitis.
  psalm.und-cimo-kal-ndas-dec-mbris-777835c8a3:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the Feast of the Presentation of the Blessed Virgin Mary, Mother of God, in the Temple at Jerusalem.
      - type: citation
        text: 'Upon the same 21st day of November, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: Holy Rufus, touching whom the holy Apostle Paul writeth unto the Romans.
      - type: text
        text: At Rome, the holy martyrs Celsus and Clement.
      - type: text
        text: At Ostia, the holy martyrs Demetrius and Honorius.
      - type: text
        text: At Rheims, (in the year 1192,) the holy martyr Albert, Bishop of Liege, who was slain for defending the freedom of the Church.
      - type: text
        text: In Spain, the holy martyrs Honorius, Eutychius, and Stephen.
      - type: text
        text: In Pamphylia, under the President Aetius, in the persecution under the Emperor Aurelian, the holy martyr Heliodorus, by whom his very torturers were converted to the faith for the which cause they were drowned in the sea.
      - type: text
        text: At Rome, holy Pope Gelasius, famous for his teaching and holiness.
      - type: text
        text: At Verona, the holy Confessor Maurus, Bishop (of that see.) At the monastery of Bobbio, deceased the holy Abbot Columbanus, the founder of many monasteries, and the Father of many monks, who fell asleep in a good old age, bright with many graces.
      la:
      - type: text
        text: Undécimo Kaléndas Decémbris
      - type: text
        text: ''
      - type: text
        text: Hierosólymis Præsentátio beátæ Dei Genitrícis Vírginis Maríæ in Templo.
      - type: text
        text: Eódem die natális beáti Rufi, de quo sanctus Paulus Apóstolus ad Romános scribit.
      - type: text
        text: Romæ pássio sanctórum Celsi et Cleméntis.
      - type: text
        text: Rhemis, in Gállia, sancti Albérti, Epíscopi Leodiénsis et Mártyris; qui pro tuénda ecclesiástica libertáte necátus est.
      - type: text
        text: Apud Ostia Tiberína natális sanctórum Mártyrum Demétrii et Honórii.
      - type: text
        text: In Hispánia sanctórum Mártyrum Honórii, Eutýchii et Stéphani.
      - type: text
        text: In Pamphýlia sancti Heliodóri Mártyris, in persecutióne Aureliáni, sub Aétio Prǽside. Post eum vero ipsi tortóres, convérsi ad fidem, in mare demérsi sunt.
      - type: text
        text: Romæ sancti Gelásii Papæ Primi, doctrína et sanctitáte conspícui.
      - type: text
        text: Verónæ sancti Mauri, Epíscopi et Confessóris.
      - type: text
        text: In monastério Bobiénsi deposítio sancti Columbáni Abbátis, qui, multórum cœnóbiorum fundátor, plurimórum Monachórum éxstitit Pater, multísque virtútibus clarus, in senectúte bona quiévit.
  psalm.und-cimo-kal-ndas-febru-rii-4a45c076b1:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 22nd day of January, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Valentia, in Spain, the holy Levite and martyr Vincent. Under the wicked Prefect Dacian he suffered imprisonment, starvation, racking, twisting of his limbs, red-hot plates, and bed of red-hot iron, and other kinds of torments, and passed away to heaven to receive there a martyr's reward, (in the year 304.) The glorious triumph of his passion hath been set forth by Prudentius in noble poetry, and the blessed Augustine and the holy Pope Leo have praised him in the highest language.
      - type: text
        text: In Persia, the holy monk Anastasius, who, after enduring many torments of imprisonment, stripes, and bonds at Caesarea, in Palestine, suffered much again under Chosroes, King of the Persians, and was at length beheaded, when he had sent before him seventy companions who suffered martyrdom by drowning, (in the year 628.) His head and his venerable image were afterwards brought to Rome, and the acts of the Second Council of Nicea bear witness that at the sight of them devils fly and diseases are healed.
      la:
      - type: text
        text: Undécimo Kaléndas Februárii
      - type: text
        text: ''
      - type: text
        text: Valéntiæ, in Hispánia Tarraconénsi, sancti Vincéntii, Levítæ et Mártyris; qui, sub impiíssimo Prǽside Daciáno, cárceres, famem, equúleum, distorsiónes membrórum, láminas candéntes, férream cratem ignítam áliaque tormentórum génera perpéssus, ad martýrii prǽmium evolávit in cælum; cuius passiónis nóbilem triúmphum Prudéntius luculénter vérsibus exséquitur, et beátus Augustínus ac sanctus Leo Papa summis láudibus comméndant.
      - type: text
        text: Apud Bethsáloën, in Assýria, sancti Anastásii Persæ Mónachi, qui, post plúrima torménta cárceris, vérberum et vinculórum, quæ in Cæsaréa Palæstínæ perpéssus fúerat, a Persárum Rege Chósroa multis pœnis afféctus, ad últimum decollátus est, cum prius septuagínta Sócios, qui fúerant in fluénta demérsi, ad martýrium præmisísset. Eius caput Romam, ad Aquas Sálvias, delátum est, una cum veneránda eius imágine, cuius aspéctu fugári dǽmones morbósque curári, Acta secúndi Concílii Nicǽni testántur.
      - type: text
        text: Ebredúni, in Gálliis, sanctórum Mártyrum Vincéntii, Oróntii et Victóris, qui martýrio in Diocletiáni persecutióne coronáti sunt.
      - type: text
        text: Nováriæ sancti Gaudéntii, Epíscopi et Confessóris.
      - type: text
        text: Soræ sancti Domínici Abbátis, miráculis clari.
  psalm.und-cimo-kal-ndas-i-lii-7a92cefa45:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of June, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 1591,] holy Aloysius Gonzaga, of the Society of Jesus, illustrious for his contempt of earthly rank, and for the innocency of his life.
      - type: text
        text: Also at Rome, the holy Virgin Demetria, who was crowned with martyrdom under the Emperor Julian the Apostate.
      - type: text
        text: At Syracuse, in Sicily, the holy martyrs Rufinus and Marcia.
      - type: text
        text: In Africa, the holy martyrs Cyriacus and Apollinaris.
      - type: text
        text: At Mainz, the holy martyr Alban, who after long toil and stern contending for Christ's faith was made worthy of the crown of life.
      - type: text
        text: On the same day, holy Eusebius of Samosata. In the time of the Arian Emperor Constantius he used to visit the Churches of God, disguised as a soldier, to confirm them in the Catholic faith. Under Valens he was banished into Thrace. After peace was restored to the Church in the time of Theodosius he was called back from exile, and was visiting the churches again when an Arian woman dropped a tile upon him from a height which cracked his skull, and so he died a martyr at last, [in the year 380.]
      - type: text
        text: At Iconium, in Lycaonia, the holy martyr Terence, Bishop [of that see.]
      - type: text
        text: At Pavia, [in the year 216,] the holy Confessor Urciscenus, Bishop [of that see.]
      - type: text
        text: At Tongres, holy Martin, Bishop [of that see.]
      - type: text
        text: At Évreux, the holy Abbot Leufroi, [about the year 738.]
      la:
      - type: text
        text: Undécimo Kaléndas Iúlii
      - type: text
        text: ''
      - type: text
        text: Romæ sancti Aloísii Gonzágæ, Clérici e Societáte Iesu et Confessóris, principátus contémptu et innocéntia vitæ claríssimi, quem, a Summo Pontífice Benedícto Décimo tértio adscríptum Sanctórum fastis et Protectórem iuvénibus præsértim studiósis datum, Pius Papa Undécimus cæléstem Christiánæ iuventútis univérsæ Patrónum confirmávit solémniter atque íterum declarávit.
      - type: text
        text: Item Romæ sanctæ Demétriæ Vírginis, quæ, sanctórum Mártyrum Flaviáni et Dafrósæ fília ac sanctæ Vírginis et Mártyris Bibiánæ soror, ipsa quoque, sub Iuliáno Apóstata, martýrio coronáta est.
      - type: text
        text: Eódem die sancti Eusébii, Samosaténi Epíscopi; qui, témpore Constántii, Imperatóris Ariáni, sub hábitu militári incognítus Ecclésias Dei visitábat, ut in fide cathólica illas confirmáret. Deínde, sub Valénte, in Thráciam relegátur; sed, réddita pace Ecclésiæ, témpore Theodósii, ab exsílio revocátus, tandem, cum íterum Ecclésias visitáret, ei caput, tégula per mulíerem Ariánam désuper immíssa, confráctum est, sicque Martyr occúbuit.
      - type: text
        text: Icónii, in Lycaónia, sancti Teréntii, Epíscopi et Mártyris.
      - type: text
        text: Syracúsis, in Sicília, natális sanctórum Mártyrum Rufíni et Martiæ.
      - type: text
        text: In Africa sanctórum Mártyrum Cyríaci et Apollináris.
      - type: text
        text: Mogúntiæ sancti Albáni Mártyris, qui ob Christi fidem, post longos labóres et dura certámina, factus est dignus coróna vitæ.
      - type: text
        text: Pápiæ sancti Urciscéni, Epíscopi et Confessóris.
      - type: text
        text: Apud Tungrénses sancti Martíni Epíscopi.
      - type: text
        text: In pago Ebroicénsi sancti Leutfrídi Abbátis.
  psalm.und-cimo-kal-ndas-i-nii-e886cd10fa:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow we keep the feast of the holy Ubald, Bishop of Gubbio, who was famous for miracles, and of whom mention is made upon the 16th day of this same month of May.
      - type: citation
        text: 'Upon the same 22nd day of May, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, the holy martyrs Faustinus, Timothy, and Venustus.
      - type: text
        text: In Africa, [at the beginning of the third century,] the holy martyrs Castus and Emilius, who finished their testimony by the suffering of fire; of them blessed Cyprian writeth that in the first skirmish they were conquered, but in the second battle the Lord made them conquerors, that they who had first yielded to the flames might become stronger than the flames.
      - type: text
        text: In Corsica, [in the fifth century,] the holy Virgin [martyr] Julia, who endured the Cross, and so was crowned.
      - type: text
        text: At Comana, in Pontus, the holy martyr Basiliscus, who obtained the glory of martyrdom under the Emperor Maximian and the President Agrippa. He was shod with iron boots pierced with fiery nails, and suffered many other things likewise, before his head was cut off and he was cast into the river.
      - type: text
        text: In Spain, the holy Virgin martyr Quiteria.
      - type: text
        text: At Ravenna, the holy Confessor Marcian, Bishop [of that see.]
      - type: text
        text: In the country of Auxerre, the blessed Abbot Romanus, who ministered to holy Benedict when he was in the cave, and afterwards went into Gaul, where he built a monastery, and fell asleep in the Lord, leaving many heirs of his holiness.
      - type: text
        text: At Aquino, [in the twelfth century,] the holy Confessor Fulco.
      - type: text
        text: At Pistoja, in Tuscany, [also in the twelfth century,] the blessed Attho, monk of the Order of Valombrosa, [who became Bishop of Pistoja.]
      - type: text
        text: At Auxerre, [in the fifth century,] the holy Virgin Helen.
      - type: text
        text: At Cassia, in Umbria, [in the year 1456,] the blessed Rita, a widow, a nun of the Order of Augustine Hermits, who, after having been married in the world, loved only the Eternal Bridegroom Christ.
      la:
      - type: text
        text: Undécimo Kaléndas Iúnii
      - type: text
        text: ''
      - type: text
        text: Romæ sanctórum Mártyrum Faustíni, Timóthei et Venústi.
      - type: text
        text: In Africa sanctórum Mártyrum Casti et Æmílii, qui per passiónis ignem martýrium consummárunt. Hos (ut beátus Cypriánus scribit), in prima congressióne devíctos, Dóminus victóres in secúndo prǽlio réddidit, ut fortióres ígnibus fíerent qui ígnibus ante cessíssent.
      - type: text
        text: Cománæ, in Ponto, sancti Basilísci Mártyris, qui, sub Maximiáno Imperatóre et Agríppa Prǽside, férreas calceátus crépidas, ignítis clavis confíxas, múltaque ália passus, demum, cápite obtruncátus et in flumen proiéctus, martýrii glóriam consecútus est.
      - type: text
        text: In Córsica sanctæ Iúliæ Vírginis, quæ crucis supplício coronáta est.
      - type: text
        text: In Hispánia sanctæ Quitériæ, Vírginis et Mártyris.
      - type: text
        text: Ravénnæ sancti Marciáni, Epíscopi et Confessóris.
      - type: text
        text: Pistórii, in Túscia, beáti Atthónis Epíscopi, ex Ordine Vallis Umbrósæ.
      - type: text
        text: In pago Antisiodorénsi beáti Románi Abbátis, qui sancto Benedícto ministrávit in specu; inde, in Gállias proféctus, ibi, ædificáto monastério relictísque multis sanctitátis alúmnis, quiévit in Dómino.
      - type: text
        text: Apud Aquínum sancti Fulci Confessóris.
      - type: text
        text: Antisiodóri sanctæ Hélenæ Vírginis.
      - type: text
        text: Cássiæ, in Umbria, sanctæ Ritæ Víduæ, Moniális ex Ordine Eremitárum sancti Augustíni; quæ, post sǽculi núptias, ætérnum sponsum Christum únice diléxit.
  psalm.und-cimo-kal-ndas-ianu-rii-9b0a6c9a93:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 22nd day of December, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, between the two Laurels upon the Lavican Way, thirty holy martyrs, who were all crowned in one day in the persecution under the Emperor Diocletian.
      - type: text
        text: There likewise the holy Flavian, the ex-Prefect (of Rome), who for Christ's sake was first branded and then banished under the Emperor Julian the Apostate. He was sent to Bagni di Ferrata, (near Civita Vecchia,) where he gave up his soul to God in prayer, (in the year 362.)
      - type: text
        text: At Ostia, the holy martyrs Demetrius, Honoratus, and Florus.
      - type: text
        text: At Alexandria, the holy martyr Ischyrion. Many injuries and reproaches were cast upon him to make him sacrifice to idols, but he despised them, and was handed over to be slain by the driving of a sharp stake through the midst of his bowels, (in the year 250.)
      - type: text
        text: In Egypt, (in the third century,) holy Chaeremon, Bishop of Nilopolis, and many other martyrs, of whom some, scattered in flight to escape the persecution under the Emperor Decius, were killed by wild beasts as they wandered in the desert some were destroyed by hunger, cold, and sickness and some were murdered by savages and robbers.
      - type: text
        text: At Nicomedia, the holy soldier Zeno, who made a jest upon the Emperor Diocletian as he was offering sacrifice to Ceres, and for this cause had his jaws broken, his teeth beaten out, and his head cut off.
      la:
      - type: text
        text: Undécimo Kaléndas Ianuárii
      - type: text
        text: ''
      - type: text
        text: Romæ, via Lavicána, inter duas Lauros, natális sanctórum trigínta Mártyrum, qui omnes una die, in persecutióne Diocletiáni, martýrio coronáti sunt.
      - type: text
        text: Item Romæ sancti Flaviáni Expræfécti, viri beátæ Mártyris Dafrósæ atque patris beatárum Vírginum et Mártyrum Bibiánæ ac Demétriæ; qui, sub Iuliáno Apóstata, pro Christo inscriptióne damnátus, et ad Aquas Taurínas, in Etrúria, in exsílium missus, illic in oratióne spíritum Deo réddidit.
      - type: text
        text: In Ægýpto sanctórum Chæremónis, Epíscopi Nilópolis, et aliórum plurimórum Mártyrum. Horum álii, sæviénte Décii persecutióne, fuga dispérsi, in solitudínibus errántes, a béstiis interémpti sunt; álii fame, frígore ac languóre consúmpti; álii a bárbaris et latrónibus necáti; atque ita omnes, divérso mortis génere, eádem martýrii glória coronáti sunt.
      - type: text
        text: Apud Ostia Tiberína sanctórum Mártyrum Demétrii, Honoráti et Flori.
      - type: text
        text: Alexandríæ sancti Ischyriónis Mártyris, qui, cum ad sacrificándum convíciis et iniúriis cogerétur atque contémneret, ídeo, præacúta sude per média víscera transverberátus, neci tráditur.
      - type: text
        text: Nicomedíæ sancti Zenónis mílitis, qui, cum Diocletiánum Céreri immolántem derisísset, proptérea, maxíllis confráctis dentibúsque excússis, cápite truncátus est.
      - type: text
        text: Chicágiæ sanctæ Francíscæ Xavériæ Cabríni, Vírginis, Institúti Missionariárum a Sacratíssimo Corde Iesu Fundatrícis, exímia caritáte, invícta ánimi fortitúdine et humilitáte insígnis, quam Pius Papa Duodécimus Sanctárum catálogo adscrípsit et ómnium emigrántium cæléstem apud Deum Patrónam constítuit.
  psalm.und-cimo-kal-ndas-m-rtii-44055c94cd:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 19th day of February, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, [in the year 296,] the holy martyr Gavin, a Priest who was the brother of the blessed Pope Caius, and who was long kept in prison and chains by the Emperor Diocletian, and gained the gladness of heaven through a death precious in the sight of the Lord.
      - type: text
        text: In Africa, the holy martyrs Publius, Julian, Marcellus, and others.
      - type: text
        text: In Palestine are commemorated the holy monks and other martyrs who [about the year 508] were cruelly slain for Christ's faith's sake by the Saracens under Al Mundar, their general.
      - type: text
        text: At Jerusalem, [in the year 304,] holy Zambdas, [counted thirty-ninth] Bishop of that holy city.
      - type: text
        text: At Soli, [in Cyprus, in the year 102,] holy Auxibius, Bishop [of that see.]
      - type: text
        text: At Beneventum, [in the year 682,] holy Barbatus, Bishop of that see, famous for his holiness, who brought the Lombards and their leader to Christ.
      - type: text
        text: At Milan, [about the year 700,] the holy Confessor Mansuetus, Bishop of that see.
      la:
      - type: text
        text: Undécimo Kaléndas Mártii
      - type: text
        text: ''
      - type: text
        text: Romæ natális sancti Gabíni, Presbýteri et Mártyris, qui fuit frater beáti Caii Papæ, atque, a Diocletiáno diu in custódia vínculis afflíctus, pretiósa morte sibi cæli gáudia comparávit.
      - type: text
        text: In Africa sanctórum Mártyrum Públii, Iuliáni, Marcélli et aliórum.
      - type: text
        text: In Palæstína commemorátio sanctórum Monachórum, et aliórum Mártyrum, qui a Saracénis, sub Duce Alamúndaro, ob Christi fidem, sævíssime cæsi sunt.
      - type: text
        text: Neápoli, in Campánia, sancti Quod-vult-Deus, Carthaginénsis Epíscopi, qui, una cum Clero, a Rege Ariáno Genseríco in fractas et absque remígiis ac velis naves impósitus, præter spem Neápolim áppulit, ibíque, in exsílio pósitus, Conféssor occúbuit.
      - type: text
        text: Hierosólymis sancti Zambdæ Epíscopi.
      - type: text
        text: Solis, in Cypro, sancti Auxíbii Epíscopi.
      - type: text
        text: Apud Benevéntum sancti Barbati Epíscopi, qui, sanctitáte célebris, Longobárdos et eórum Ducem convértit ad Christum.
      - type: text
        text: Medioláni sancti Mansuéti, Epíscopi et Confessóris.
  psalm.und-cimo-kal-ndas-maii-38f02cc897:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of April, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Canterbury, in England, holy Anselm, Archbishop of that see, illustrious for his holiness and teaching, [in the year 1109.]
      - type: text
        text: In Persia, [in the year 345,] the holy martyr Simeon, Bishop of Seleucia and Ctesiphon. He was arrested by order of Sapor, King of the Persians, loaded with chains, and brought before the iniquitous judgment-seat. He refused to worship the sun, and with a free and unfaltering voice bore witness for Christ Jesus. He suffered a long while in prison along with a hundred others, whereof some were bishops, some priests, and others clergy of diverse orders. He recalled to repentance Usthazanes, the king's tutor, who had fallen away from the faith, but who now bravely underwent martyrdom. On the day after, which was the anniversary of the Lord's Sufferings, all the others were slain with the sword before the eyes of Simeon, who earnestly exhorted every one of them, and at the last was himself also beheaded. There suffered, moreover, along with him his eminent Priests Abdechalas and Ananias also Pusicius, the foreman of the king's workmen, who encouraged Ananias when he was wavering, and who was put to a very cruel death by having his tongue cut out through a hole in his neck; and after him was put to death his daughter, who was an hallowed virgin.
      - type: text
        text: At Alexandria, the holy martyrs, the Priest Arator, Fortunatus, Felix, Silvius, and Vitalis, who fell asleep in prison.
      - type: text
        text: Also, the holy martyrs Apollo, Isacius, and Crotates, who suffered under the Emperor Diocletian.
      - type: text
        text: At Antioch, [after the year 686,] the holy Bishop of that city, Anastasius of Sinai.
      la:
      - type: text
        text: Undécimo Kaléndas Maii
      - type: text
        text: ''
      - type: text
        text: Cantuáriæ, in Anglia, sancti Ansélmi Epíscopi, Confessóris et Ecclésiæ Doctóris, sanctitáte et doctrína conspícui.
      - type: text
        text: In Pérside natális sancti Simeónis, Epíscopi Seleucíæ et Ctesiphóntis, qui, iubénte Rege Persárum Sápore, comprehénsus ferróque onústus, iníquis tribunálibus exhíbitus, et, cum Solem ipsum adoráre nollet et de Iesu Christo voce líbera et constantíssima testarétur, primum carceráli ergástulo, cum áliis centum (ex quibus álii Epíscopi, álii erant Presbýteri, álii diversórum órdinum Clérici), longo témpore macerátus est. Deínde, cum Usthazánes, Regis nutrítius, qui ante iam lapsus a fide, sed per eum ad pæniténtiam fúerat revocátus, martýrium constánter subiísset, postrídie, qui erat ánnuus Domínicæ passiónis dies, ómnibus ante Simeónis óculos, qui unumquémque eórum strénue exhortabátur, gládio iugulátis, novíssime et ipse decollátus est. Passi sunt étiam cum ipso claríssimi viri Abdéchalas et Ananías, qui eius erant Presbýteri. Pusícius quoque, Præféctus artíficum Regis, eo quod Ananíam titubántem corroborásset, ídeo, collo circa téndinem perforáto et lingua exínde extrácta, crudéli morte occúbuit; post quem et fília eius, quæ erat sacra Virgo, plúribus et diris afflícta cruciátibus ac demum ense decolláta est.
      - type: text
        text: Alexandríæ sanctórum Mártyrum Aratóris Presbýteri, Fortunáti, Felícis, Sílvii et Vitális, qui in cárcere quievérunt.
      - type: text
        text: Nicomedíæ sanctórum Mártyrum Apóllinis, Isácii et Codráti; e quibus, sub Diocletiáno Imperatóre, últimus cápite plexus, et, paucis post illum diébus, duo primi in vínculis fame confécti, martýrii corónam meruérunt.
      - type: text
        text: Antiochíæ sancti Anastásii Sinaítæ Epíscopi.
      - type: text
        text: Œttingæ Véteris, in Bavária, sancti Conrádi a Parzham, Confessóris, Ordinis Minórum Capuccinórum, caritáte et oratióne insígnis, quem, miráculis clarum, Pius Papa Undécimus Sanctórum número adscrípsit.
  psalm.und-cimo-kal-ndas-nov-mbris-4812440330:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 22nd day of October, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Jerusalem, the blessed Bishop Mark, a man of great eminence and learning, who was the first Gentile to be entrusted with the government of the Church of Jerusalem, and who in no long time gained the palm of martyrdom under the Emperor Antonine.
      - type: text
        text: At Adrianople, in Thrace, the holy martyrs Philip, Bishop (of Heraclea,) the Priest Severus, Eusebius, and Hermes, who, under the Emperor Julian the Apostate, were imprisoned and flogged, and then burnt.
      - type: text
        text: Likewise, the holy martyrs the Bishop Alexander, the soldier Heraclius, and their Companions.
      - type: text
        text: At Fermo, in the March of Ancona, (in the third century,) the holy Bishop and martyr Philip.
      - type: text
        text: At Huesca, in Spain, (in the ninth century,) the holy sisters Nunilo and Alodia, two Virgins who were punished with death by the Saracens for their confession of the faith, and so suffered martyrdom.
      - type: text
        text: At Cologne, holy Cordula, one of the Companions of holy Ursula, who had hidden herself in terror at the sight of the sufferings and slaughter of the others, but repented thereof, and on the next day showed herself openly, and received the crown of martyrdom, the last of them all.
      - type: text
        text: At Hierapolis, in Phrygia, holy Abercius, who was illustrious in the time of the Emperor Mark Antonine.
      - type: text
        text: At Rouen, holy Melanius, Bishop (of that see,) who was ordained by holy Pope Stephen I., and sent thither to preach the Gospel.
      - type: text
        text: In Tuscany, (towards the end of the ninth century,) the holy Irishman Donatus, (Bishop of Fiesole.)
      - type: text
        text: At Verona, (in the sixth century,) the holy Confessor Verecundus, Bishop (of that see.)
      - type: text
        text: At Jerusalem, the holy Mary Salome, concerning whom it is written in the Gospel that she was careful about the burying of the Lord.
      la:
      - type: text
        text: Undécimo Kaléndas Novémbris
      - type: text
        text: ''
      - type: text
        text: Hierosólymis sanctæ Maríæ Salóme, matris sanctórum Iacóbi et Ioánnis Apostolórum, quæ in Evangélio légitur circa Dómini sepultúram sollícita.
      - type: text
        text: Item Hierosólymis beáti Marci Epíscopi, claríssimi et doctíssimi viri, qui primus ex Géntibus Ecclésiam Hierosolymórum suscépit regéndam, ac, non multo post, sub Antoníno Imperatóre, martýrii méruit palmam.
      - type: text
        text: Hadrianópoli, in Thrácia, natális sanctórum Mártyrum Philíppi Epíscopi, Sevéri Presbýteri, Eusébii et Hermétis; qui, sub Iuliáno Apóstata, post cárceres et flagélla, incéndio cremáti sunt.
      - type: text
        text: Item sanctórum Mártyrum Alexándri Epíscopi, Heráclii mílitis, et Sociórum.
      - type: text
        text: Apud Firmum, in Picéno, natális sancti Philíppi, Epíscopi et Mártyris.
      - type: text
        text: Apud Colóniam Agrippínam sanctæ Córdulæ, quæ, cum esset una ex sodálibus sanctæ Ursulæ, atque aliárum supplíciis et cǽdibus pertérrita se occultásset, postrídie, eius rei pǽnitens, se ultro patefécit Hunnis, et, novíssima ómnium, martýrii corónam accépit.
      - type: text
        text: Oscæ, in Hispánia, sanctárum Vírginum Nunilónis et Alódiæ sorórum, quæ, a Saracénis ob fídei confessiónem capitáli senténtia punítæ, martýrium consummárunt.
      - type: text
        text: Hierápoli, in Phrýgia, sancti Abércii Epíscopi, qui sub Marco Antoníno Imperatóre cláruit.
      - type: text
        text: Rotómagi sancti Melánii Epíscopi, qui, a sancto Stéphano Papa ordinátus, illuc ad prædicándum Evangélium missus est.
      - type: text
        text: In Túscia sancti Donáti Scoti, Epíscopi Fæsuláni.
      - type: text
        text: Verónæ sancti Verecúndi, Epíscopi et Confessóris.
  psalm.und-cimo-kal-ndas-oct-bris-78b542a539:
    role: psalm
    content:
      en:
      - type: citation
        text: 'Upon the 21st day of September, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: The holy Apostle and Evangelist Matthew, who suffered in Ethiopia, where he had preached the Gospel. A copy of his Gospel written in the Hebrew language was, by a revelation from himself, found in the time of the Emperor Zeno, along with the body of the blessed Apostle Barnabas.
      - type: text
        text: In the land of Shaar, the holy prophet Jonah, who is buried in Gath.
      - type: text
        text: At Rome, the holy martyr Pamphilus.
      - type: text
        text: Likewise at Rome, at the twentieth milestone from the city upon the Claudian Way, the holy Bishop and martyr Pope Alexander I. Under the Emperor Antonine, he, for Christ's faith's sake, overcame fettering, cudgelling, racking, burning with lamps, tearing with hooks, exposure to wild beasts, and the fire of a furnace, and being at last beheaded won the life of glory that fadeth not away. The blessed Pope Damasus afterwards brought his body into the city on the 26th day of November, upon the which day he commanded a feast to be kept in his honour.
      - type: text
        text: In Phoenicia, the holy martyr Eusebius, who went openly to the Prefect and proclaimed himself a Christian, for the which cause he was put to many torments and then beheaded.
      - type: text
        text: In Cyprus, the holy Bishop and martyr Isacius, and there also the holy Bishop and Confessor Meletius.
      - type: text
        text: In Ethiopia, the holy Virgin Iphigenia, who was baptized and consecrated to God by the blessed Apostle Matthew, and fell asleep in a holy death.
      la:
      - type: text
        text: Undécimo Kaléndas Octóbris
      - type: text
        text: ''
      - type: text
        text: In Æthiópia natális sancti Matthǽi, Apóstoli et Evangelístæ; qui, in ea regióne prǽdicans, martýrium passus est. Huius Evangélium, Hebrǽo sermóne conscríptum, ipso Matthǽo revelánte, invéntum est, una cum córpore beáti Bárnabæ Apóstoli, témpore Zenónis Imperatóris.
      - type: text
        text: In terra Saar sancti Ionæ Prophétæ, qui sepúltus est in Geth.
      - type: text
        text: In Æthiópia sanctæ Iphigéniæ Vírginis, quæ, baptizáta a beáto Matthǽo Apóstolo et Deo dicáta, sancto fine quiévit.
      - type: text
        text: Romæ sancti Pámphili Mártyris.
      - type: text
        text: Eódem die, via Cláudia, vigésimo ab Urbe milliário, pássio sancti Alexándri Epíscopi, qui, sub Antoníno Imperatóre, pro Christi fide, víncula, fustes, equúleum, lámpades ardéntes, ungulárum laniatiónem, béstias ac fornácis superávit flammas, ac tandem, gládio cæsus, vitam adéptus est gloriósam. Eius corpus póstea beátus Dámasus Papa in Urbem tránstulit sexto Kaléndas Decémbris.
      - type: text
        text: In Cypro sancti Isácii, Epíscopi et Mártyris.
      - type: text
        text: In Phœnícia sancti Eusébii Mártyris, qui, cum ultro Præféctum adísset et se Christiánum esse denuntiásset, ab eo, multis torméntis afflíctus, cápite cæsus est.
      - type: text
        text: In Cypro sancti Melétii, Epíscopi et Confessóris.
  psalm.und-cimo-kal-ndas-sept-mbris-386acb84be:
    role: psalm
    content:
      en:
      - type: text
        text: On the morrow is the Octave of the Assumption of the Blessed Virgin Mary.
      - type: citation
        text: 'Upon the same 22nd day of August, were born into the better life:'
      - type: text
        text: ''
      - type: text
        text: At Rome, upon the Ostian Way, [in the fourth century,] the holy martyr Timothy. He was tried by Tarquinius, Prefect of the city, and suffered a long imprisonment, and forasmuch as he would not sacrifice to idols, he was then hided, put to horrid tortures, and at length beheaded.
      - type: text
        text: At Porto, [in the third century,] holy Hippolytus, Bishop [of that city,] a man of eminent learning, who received the palm of martyrdom under the Emperor Alexander, on account of his illustrious confession of the faith, for the which he had his hands and feet tied and was cast into a deep pit full of water his body was buried by the Christians at the same place.
      - type: text
        text: At Autun, the holy martyr Symphorian, who finished his testimony in the time of the Emperor Aurelian, because he would not sacrifice unto idols, being first beaten, then imprisoned, and in the end beheaded.
      - type: text
        text: At Rome, [in the second century,] the holy martyr Antoninus. He openly professed himself a Christian, and therefore was sentenced to death by Vitellius the judge, and was buried upon the Aurelian Way.
      - type: text
        text: Likewise at Porto, [in the third century,] the holy martyrs Martial, Saturninus, Epictetus, Maprilis, and Felix, and their Companions.
      - type: text
        text: At Nicomedia, under the Emperor Maximian and the President Eutholomius, the holy martyrs Agathonicus, Zoticus, and their Companions.
      - type: text
        text: At Tarsus, [in Cilicia,] under the Emperor Valerian, the holy martyrs Athanasius, Bishop [of that see,] the noble lady Anthusa, whom he had baptized, and two of her slaves, [called Charisius and Neophytus.]
      - type: text
        text: At Reims, [at the end of the third century,] the holy martyrs Maurus and his [forty-nine] Companions.
      - type: text
        text: In Spain, the holy martyrs Fabrician and Philibert.
      - type: text
        text: At Pavia, the holy martyr Gunifort.
      la:
      - type: text
        text: Undécimo Kaléndas Septémbris
      - type: text
        text: ''
      - type: text
        text: Festum Immaculáti Cordis beátæ Vírginis Maríæ.
      - type: text
        text: Romæ, via Ostiénsi, natális sancti Timóthei Mártyris, qui, a Præfécto Urbis Tarquínio tentus, et longa cárceris custódia macerátus, et, cum sacrificáre idólis noluísset, tértio cæsus et gravíssimis supplíciis attrectátus, ad últimum decollátus est.
      - type: text
        text: In Portu Románo sancti Hippólyti Epíscopi, eruditióne claríssimi, qui, sub Alexándro Imperatóre, ob præcláram fídei confessiónem, mánibus pedibúsque ligátis in altam fóveam, aquis plenam, præcipitátus, martýrii palmam accépit; cuius corpus apud eúndem locum a Christiánis sepúltum fuit.
      - type: text
        text: Augustodúni sancti Symphoriáni Mártyris, qui, témpore Aureliáni Imperatóris, cum sacrificáre nollet idólis, primo verbéribus afflíctus est, deínde cárceri mancipátus; atque ad últimum, cæso cápite, martýrium consummávit.
      - type: text
        text: Tudérti, in Umbria, natális sancti Philíppi Benítii, Confessóris, Florentíni, qui Ordinis Servórum beátæ Maríæ Vírginis éxstitit propagátor et exímiæ humilitátis vir; atque a Cleménte Décimo, Pontífice Máximo, Sanctórum número adscríptus est. Ipsíus autem festívitas sequénti die celebrátur.
      - type: text
        text: Romæ sancti Antoníni Mártyris, qui, cum se Christiánum líbera voce faterétur, senténtia capitáli a Iúdice Vitéllio damnátus est, et a Rufino Presbýtero via Aurélia sepúltus.
      - type: text
        text: Tarsi, in Cilícia, commemorátio sanctórum Athanásii, Epíscopi et Mártyris, Anthúsæ, nóbilis féminæ, quam ipse baptizáverat, ac simul Charísii et Neóphyti Mártyrum, eiúsdem Anthúsæ servórum, qui sub Valeriáno Imperatóre passi sunt.
      - type: text
        text: In Portu Románo sanctórum Mártyrum Martiális, Saturníni, Epictéti, Maprílis et Felícis, cum Sóciis eórum.
      - type: text
        text: Nicomedíæ pássio sanctórum Agathoníci, Zótici et Sociórum Mártyrum, sub Maximiáno Imperatóre et Eutólmio Prǽside.
      - type: text
        text: Rhemis, in Gállia, sanctórum Mártyrum Mauri et Sociórum.
      - type: text
        text: In Hispánia sanctórum Mártyrum Fabriciáni et Philibérti.
      - type: text
        text: Papíæ sancti Gunifórti Mártyris.
