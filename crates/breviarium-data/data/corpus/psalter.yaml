        antiphon: Alleluia, * praise ye the Lord from the heavens, alleluia, alleluia.
        psalms:
        - number: '148'
      la:
      - type: psalmody
        antiphon: Allelúia, * Dóminus regnávit, decórem índuit, allelúia, allelúia.
        psalms:
        - number: '92'
      - type: psalmody
        antiphon: Iubiláte * Deo omnis terra, allelúia.
        psalms:
        - number: '99'
      - type: psalmody
        antiphon: 'Benedícam te * in vita mea, Dómine: et in nómine tuo levábo manus meas, allelúia.'
        psalms:
        - number: '62'
      - type: psalmody
        antiphon: 'Tres púeri * iussu regis in fornácem missi sunt, non timéntes flammam ignis, dicéntes: Benedíctus Deus, allelúia.'
