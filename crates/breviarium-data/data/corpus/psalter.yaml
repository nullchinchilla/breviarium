  psalmody.allel-ia-confit-mini-d-mino-qu-niam-in-s-culum-m-f9c1d108b0:
    role: psalmody
    content:
      en:
      - type: table_row
        label: sunday
        text: Alleluia, * Give glory to the Lord, for his mercy endureth for ever, alleluia, alleluia.
        psalms:
        - number: '117'
        - number: '118'
          start: '1'
          end: '16'
        - number: '118'
          start: '17'
          end: '32'
      - type: table_row
        label: monday
        text: The innocent in hands * and clean of heart shall ascend the mountain of the Lord.
        psalms:
        - number: '23'
        - number: '18'
          start: '2'
          end: 7b
        - number: '18'
          start: '8'
          end: 15b
        - number: '46'
          optional: true
      - type: table_row
        label: tuesday
        text: In thee, O my God, * I put my trust; let me not be ashamed.
        psalms:
        - number: '24'
          start: '1'
          end: '7'
        - number: '24'
          start: '8'
          end: '14'
        - number: '24'
          start: '15'
          end: '22'
        - number: '95'
          optional: true
      - type: table_row
        label: wednesday
        text: For thy mercy, * O Lord, is before my eyes; and I am well pleased with thy truth.
        psalms:
        - number: '25'
        - number: '51'
        - number: '52'
        - number: '96'
          optional: true
      - type: table_row
        label: thursday
        text: The Lord hath set me * in a place of pasture.
        psalms:
        - number: '22'
        - number: '71'
          start: '2'
          end: '8'
        - number: '71'
          start: '9'
          end: '19'
        - number: '97'
          optional: true
      - type: table_row
        label: friday
        text: Depart not from me, * O Lord, for tribulation is very near; for there is none to help me.
        psalms:
        - number: '21'
          start: '2'
          end: '12'
        - number: '21'
          start: '13'
          end: '23'
        - number: '21'
          start: '24'
          end: '32'
        - number: '98'
          optional: true
      - type: table_row
        label: saturday
        text: 'Lift up thyself, O Lord, * thou that judgest the earth: render retribution to the proud.'
        psalms:
        - number: '93'
          start: '1'
          end: '11'
        - number: '93'
          start: '12'
          end: '23'
        - number: '107'
        - number: '149'
          optional: true
      la:
      - type: table_row
        label: sunday
        text: Allelúia, * confitémini Dómino, quóniam in sǽculum misericórdia eius, allelúia, allelúia.
        psalms:
        - number: '117'
        - number: '118'
          start: '1'
          end: '16'
        - number: '118'
          start: '17'
          end: '32'
      - type: table_row
        label: monday
        text: Ínnocens mánibus * et mundo corde ascéndet in montem Dómini.
        psalms:
        - number: '23'
        - number: '18'
          start: '2'
          end: 7b
        - number: '18'
          start: '8'
          end: 15b
        - number: '46'
          optional: true
      - type: table_row
        label: tuesday
        text: Deus meus * in te confído non erubéscam.
        psalms:
        - number: '24'
          start: '1'
          end: '7'
        - number: '24'
          start: '8'
          end: '14'
        - number: '24'
          start: '15'
          end: '22'
        - number: '95'
          optional: true
      - type: table_row
        label: wednesday
        text: 'Misericórdia tua, * Dómine, ante óculos meos: et complácui in veritáte tua.'
        psalms:
        - number: '25'
        - number: '51'
        - number: '52'
        - number: '96'
          optional: true
      - type: table_row
        label: thursday
        text: In loco páscuæ * ibi Dóminus me collocávit.
        psalms:
        - number: '22'
        - number: '71'
          start: '2'
          end: '8'
        - number: '71'
          start: '9'
          end: '19'
        - number: '97'
          optional: true
      - type: table_row
        label: friday
        text: 'Ne discédas a me, * Dómine: quóniam tribulátio próxima est: quóniam non est qui ádiuvet.'
        psalms:
        - number: '21'
          start: '2'
          end: '12'
        - number: '21'
          start: '13'
          end: '23'
        - number: '21'
          start: '24'
          end: '32'
        - number: '98'
          optional: true
      - type: table_row
        label: saturday
        text: 'Exaltáre, Dómine, * qui iúdicas terram: redde retributiónem supérbis.'
        psalms:
        - number: '93'
          start: '1'
          end: '11'
        - number: '93'
          start: '12'
          end: '23'
        - number: '107'
        - number: '149'
          optional: true
  psalmody.allel-ia-d-minus-regn-vit-dec-rem-nduit-allel-ia-2cdb79052b:
