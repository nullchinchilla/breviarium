        antiphon: Iusta iudicáte * fílii hóminum
        psalms:
        - number: '57'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '58'
  psalmody.adi-tor-in-tribulati-nibus-aa50701e0e:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: God is our help * in trouble.
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '46'
      - type: psalmody
        antiphon: Great is the Lord, * and greatly to be praised.
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '48'
      - type: psalmody
        antiphon: The God of gods * the Lord hath spoken.
        psalms:
        - number: '49'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '51'
      - type: versicle
        text: Offer to God the sacrifice of praise.
      - type: response
        text: And pay thy vows to the most High.
      - type: psalmody
        antiphon: God bringeth back * the captivity of His people.
        psalms:
        - number: '52'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '53'
      - type: psalmody
        antiphon: Be attentive to me * and hear me.
        psalms:
        - number: '54'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '55'
      - type: psalmody
        antiphon: Judge right things, * ye sons of men.
        psalms:
        - number: '57'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '58'
      la:
      - type: psalmody
        antiphon: Adiútor * in tribulatiónibus
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '46'
      - type: psalmody
        antiphon: Magnus Dóminus * et laudábilis nimis
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: ''
        psalms:
        - number: '48'
      - type: psalmody
        antiphon: Deus deórum * Dóminus locútus est
