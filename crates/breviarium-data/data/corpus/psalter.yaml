        - number: '17'
          start: '26'
          end: '51'
        - number: '18'
        - number: '19'
      - type: table_row
        label: Prima Festis
        text: Alleluia, * alleluia, alleluia (alleluia)
        psalms:
        - number: '118'
          start: '1'
          end: '8'
        - number: '118'
          start: '9'
          end: '16'
        - number: '118'
          start: '17'
          end: '24'
        - number: '118'
          start: '25'
          end: '32'
      - type: table_row
        label: Tertia Dominica
        text: Alleluia, * alleluia, alleluia (alleluia)
        psalms:
        - number: '118'
          start: '33'
          end: '40'
        - number: '118'
          start: '41'
          end: '48'
        - number: '118'
          start: '49'
          end: '56'
      - type: table_row
        label: Tertia Feria II
        text: Help me * and I shall be saved, O Lord.
        psalms:
        - number: '118'
          start: '105'
          end: '112'
        - number: '118'
          start: '113'
          end: '120'
        - number: '118'
          start: '121'
          end: '128'
      - type: table_row
        label: Tertia Feria
        text: I cried unto the Lord, * and He heard me.
        psalms:
        - number: '119'
        - number: '120'
        - number: '121'
      - type: table_row
        label: Sexta Dominica
        text: Alleluia, * alleluia, alleluia (alleluia)
        psalms:
        - number: '118'
          start: '57'
          end: '64'
        - number: '118'
          start: '65'
          end: '72'
        - number: '118'
          start: '73'
          end: '80'
      - type: table_row
        label: Sexta Feria II
        text: Look upon me * and have mercy on me.
        psalms:
        - number: '118'
          start: '129'
          end: '136'
        - number: '118'
          start: '137'
          end: '144'
        - number: '118'
          start: '145'
          end: '152'
