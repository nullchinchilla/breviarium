        label: monday
        text: My light * and my salvation is the Lord.
        psalms:
        - number: '26'
          start: '1'
          end: '6'
        - number: '26'
          start: '7'
          end: '14'
        - number: '27'
      - type: table_row
        label: tuesday
        text: 'The Lord hath heard * my supplication: the Lord hath received my prayer.'
        psalms:
        - number: '39'
          start: '2'
          end: '9'
        - number: '39'
          start: '10'
          end: '14'
        - number: '39'
          start: '15'
          end: '18'
      - type: table_row
        label: wednesday
        text: 'For behold God is my helper: * and the Lord is the protector of my soul.'
        psalms:
        - number: '53'
        - number: '54'
          start: '2'
          end: '16'
        - number: '54'
          start: '17'
          end: '24'
      - type: table_row
        label: thursday
        text: How good is God * to Israel, to them that are of a right heart!
        psalms:
        - number: '72'
          start: '1'
          end: '9'
        - number: '72'
          start: '10'
          end: '17'
        - number: '72'
          start: '18'
          end: '28'
      - type: table_row
        label: friday
        text: Stir up thy might, O Lord, * and come to save us.
        psalms:
        - number: '79'
          start: '2'
          end: '8'
        - number: '79'
          start: '9'
          end: '20'
        - number: '81'
      - type: table_row
        label: saturday
        text: 'Let my cry reach unto thee, O Lord: * turn not away thy face from me.'
        psalms:
        - number: '101'
          start: '2'
          end: '13'
        - number: '101'
          start: '14'
          end: '23'
        - number: '101'
          start: '24'
          end: '29'
      la:
      - type: table_row
        label: sunday
        text: Allelúia, * deduc me, Dómine, in sémitam mandatórum tuórum, allelúia, allelúia.
        psalms:
        - number: '118'
          start: '33'
          end: '48'
        - number: '118'
          start: '49'
          end: '64'
        - number: '118'
          start: '65'
          end: '80'
      - type: table_row
        label: monday
        text: Illuminátio mea * et salus mea Dóminus.
        psalms:
        - number: '26'
          start: '1'
          end: '6'
        - number: '26'
          start: '7'
          end: '14'
        - number: '27'
      - type: table_row
        label: tuesday
        text: Respéxit me * et exaudívit deprecatiónem meam Dóminus.
        psalms:
        - number: '39'
          start: '2'
          end: '9'
        - number: '39'
          start: '10'
          end: '14'
        - number: '39'
          start: '15'
          end: '18'
      - type: table_row
        label: wednesday
        text: 'Deus ádiuvat me: * et Dóminus suscéptor est ánimæ meæ.'
        psalms:
        - number: '53'
        - number: '54'
          start: '2'
          end: '16'
        - number: '54'
          start: '17'
          end: '24'
      - type: table_row
        label: thursday
        text: Quam bonus * Israël Deus, his, qui recto sunt corde.
        psalms:
        - number: '72'
          start: '1'
          end: '9'
        - number: '72'
          start: '10'
          end: '17'
        - number: '72'
          start: '18'
          end: '28'
      - type: table_row
        label: friday
        text: Éxcita, Dómine, * poténtiam tuam, ut salvos fácias nos.
        psalms:
        - number: '79'
          start: '2'
          end: '8'
        - number: '79'
          start: '9'
          end: '20'
        - number: '81'
      - type: table_row
        label: saturday
        text: 'Clamor meus, * Dómine, ad te pervéniat: non avértas fáciem tuam a me.'
