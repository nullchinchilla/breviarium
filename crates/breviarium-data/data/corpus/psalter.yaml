        - number: '8'
      - type: psalmody
        antiphon: 'Christ our King cometh, * Whom John preached, saying: Behold the Lamb That should come!'
        psalms:
        - number: '9'
          start: '2'
          end: '11'
      - type: psalmody
        antiphon: Behold, I come * quickly, saith the Lord, and My reward is with Me, to give every man according as his work shall be.
        psalms:
        - number: '9'
          start: '12'
          end: '21'
      - type: versicle
        text: Send forth the Lamb, O Lord, the ruler of the land.
      - type: response
        text: From the Rock of the wilderness unto the mount of the daughter of Zion.
      - type: psalmody
        antiphon: 'The Angel Gabriel * spake unto Mary, saying: Hail, thou that art full of grace, the Lord is with thee: blessed art thou among women.'
        psalms:
        - number: '9'
          start: '22'
          end: '32'
      - type: psalmody
        antiphon: 'Mary said: * What manner of salutation is this? My soul is troubled. Shall I bear the King? And will He not break the seal of my virginity?'
        psalms:
        - number: '9'
          start: '33'
          end: '39'
      - type: psalmody
        antiphon: The King, * even the Most High, cometh therefore let the hearts of men be purified to go forth to meet Him, for, behold, He will come and will not tarry.
        psalms:
        - number: '10'
      - type: versicle
        text: The Lord cometh out of His holy place.
      - type: response
        text: He will come and save His people.
      la:
      - type: psalmody
        antiphon: Véniet ecce Rex * excélsus cum potestáte magna ad salvándas gentes, allelúia.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: 'Confortáte * manus dissolútas: confortámini, dícite: Ecce Deus noster véniet, et salvábit nos, allelúia.'
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: 'Gaudéte omnes * et lætámini: ecce quia véniet Dóminus ultiónis addúcet retributiónem: ipse véniet, et salvábit nos.'
        psalms:
        - number: '3'
      - type: versicle
        text: Ex Sion spécies decóris eius.
      - type: response
        text: Deus noster maniféste véniet.
      - type: psalmody
        antiphon: 'Gaude et lætáre, * fília Ierúsalem: ecce Rex tuus véniet tibi: Sion, noli timére, quia cito véniet salus tua.'
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Rex noster * advéniet Christus, quem Ioánnes prædicávit Agnum esse ventúrum.
        psalms:
        - number: '9'
          start: '2'
          end: '11'
      - type: psalmody
        antiphon: 'Ecce vénio * cito et merces mea mecum est, dicit Dóminus: dare unicuíque secúndum ópera sua.'
        psalms:
        - number: '9'
          start: '12'
          end: '21'
      - type: versicle
        text: Emítte Agnum, Dómine, Dominatórem terræ.
      - type: response
        text: De Petra desérti ad montem fíliæ Sion.
      - type: psalmody
        antiphon: 'Gábriel Ángelus * locútus est Maríæ, dicens: Ave, grátia plena: Dóminus tecum: benedícta tu inter mulíeres.'
        psalms:
        - number: '9'
          start: '22'
          end: '32'
      - type: psalmody
        antiphon: 'María dixit: * Putas qualis est ista salutátio, quia conturbáta est ánima mea, et quia paritúra sum Regem, qui claustrum virginitátis meæ non violábit?'
        psalms:
        - number: '9'
          start: '33'
          end: '39'
      - type: psalmody
        antiphon: 'In advéntu * summi Regis mundéntur corda hóminum, ut digne ambulémus in occúrsum illíus: quia ecce véniet et non tardábit.'
        psalms:
        - number: '10'
      - type: versicle
        text: Egrediétur Dóminus de loco sancto suo.
      - type: response
        text: Véniet ut salvet pópulum suum.
