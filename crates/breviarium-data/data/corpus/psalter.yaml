        text: Let thy hand be with me to save me; * for I have chosen thy precepts.
        psalms:
        - number: '118'
          start: '153'
          end: '160'
        - number: '118'
          start: '161'
          end: '168'
        - number: '118'
          start: '169'
          end: '176'
      - type: table_row
        label: Nona Feria
        text: Blessed are all they * that fear the Lord.
        psalms:
        - number: '125'
        - number: '126'
        - number: '127'
      la:
      - type: table_row
        label: Prima Dominica
        text: Allelúia, * allelúia, allelúia (allelúia)
        psalms:
        - number: '118'
          start: '1'
          end: '8'
        - number: '118'
          start: '9'
          end: '16'
        - number: '118'
          start: '17'
          end: '24'
        - number: '118'
          start: '25'
          end: '32'
      - type: table_row
        label: Prima Feria II
        text: 'Servíte Dómino * in timóre: et exsultáte ei cum tremóre.'
        psalms:
        - number: '1'
        - number: '2'
        - number: '6'
      - type: table_row
        label: Prima Feria III
        text: 'Deus iudex iustus, * fortis et longánimis: numquid irascétur per síngulos dies?'
        psalms:
        - number: '7'
        - number: '8'
        - number: '9'
          start: '2'
          end: '19'
      - type: table_row
        label: Prima Feria IV
        text: Exsúrge, Dómine * non præváleat homo.
        psalms:
        - number: '9'
          start: '20'
          end: '39'
        - number: '10'
        - number: '11'
      - type: table_row
        label: Prima Feria V
        text: Cantábo Dómino, * qui bona tríbuit mihi.
        psalms:
        - number: '12'
        - number: '13'
        - number: '14'
      - type: table_row
        label: Prima Feria VI
        text: Bonórum meórum * non indiges, in te sperávi, consérva me, Dómine.
        psalms:
        - number: '15'
        - number: '16'
        - number: '17'
          start: '2'
          end: '25'
      - type: table_row
        label: Prima Sabbato
        text: Vivit Dóminus, * et benedíctus Deus salútis meæ.
        psalms:
        - number: '17'
          start: '26'
          end: '51'
        - number: '18'
        - number: '19'
      - type: table_row
        label: Prima Festis
        text: Allelúia, * allelúia, allelúia (allelúia)
        psalms:
        - number: '118'
          start: '1'
          end: '8'
        - number: '118'
          start: '9'
          end: '16'
        - number: '118'
          start: '17'
          end: '24'
        - number: '118'
          start: '25'
          end: '32'
      - type: table_row
        label: Tertia Dominica
        text: Allelúia, * allelúia, allelúia (allelúia)
        psalms:
        - number: '118'
          start: '33'
          end: '40'
        - number: '118'
          start: '41'
          end: '48'
        - number: '118'
          start: '49'
          end: '56'
      - type: table_row
        label: Tertia Feria II
        text: Ádiuva me, * et salvus ero, Dómine.
        psalms:
