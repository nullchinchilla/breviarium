    content:
      en:
      - type: table_row
        label: Prima Dominica
        text: Alleluia, * alleluia, alleluia (alleluia)
        psalms:
        - number: '118'
          start: '1'
          end: '8'
        - number: '118'
          start: '9'
          end: '16'
        - number: '118'
          start: '17'
          end: '24'
        - number: '118'
          start: '25'
          end: '32'
      - type: table_row
        label: Prima Feria II
        text: 'Serve ye the Lord with fear: * and rejoice unto him with trembling.'
        psalms:
        - number: '1'
        - number: '2'
        - number: '6'
      - type: table_row
        label: Prima Feria III
        text: God is a just judge * strong and patient, will He be angry every day?
        psalms:
        - number: '7'
        - number: '8'
        - number: '9'
          start: '2'
          end: '19'
      - type: table_row
        label: Prima Feria IV
        text: Arise, O Lord, * let not man be strengthened.
        psalms:
        - number: '9'
          start: '20'
          end: '39'
        - number: '10'
        - number: '11'
      - type: table_row
        label: Prima Feria V
        text: I shall sing to the Lord, * who hath given good things to me.
        psalms:
        - number: '12'
        - number: '13'
        - number: '14'
      - type: table_row
        label: Prima Feria VI
        text: Thou hast no need of my goods * preserve me, O Lord, for I have put my trust in thee.
        psalms:
        - number: '15'
        - number: '16'
        - number: '17'
          start: '2'
          end: '25'
      - type: table_row
        label: Prima Sabbato
        text: The Lord liveth, and blessed be my God, my salvation.
