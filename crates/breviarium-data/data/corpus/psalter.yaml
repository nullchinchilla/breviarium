        - number: '210'
      - type: psalmody
        antiphon: Allelúia, * laudáte Dóminum de cælis, allelúia, allelúia.
        psalms:
        - number: '148'
  psalmody.allel-ia-deduc-me-d-mine-in-s-mitam-mandat-rum-t-49994460e7:
    role: psalmody
    content:
      en:
      - type: table_row
        label: sunday
        text: Alleluia, * Lead me into the path of thy commandments, alleluia, alleluia.
        psalms:
        - number: '118'
