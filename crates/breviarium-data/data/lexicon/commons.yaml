      - type: citation
        text: Rom 8:28-34
      - type: text
        text: 28 And we know that to them that love God, all things work together unto good, to such as, according to his purpose, are called to be saints.
      - type: text
        text: 29 For whom he foreknew, he also predestinated to be made conformable to the image of his Son; that he might be the firstborn amongst many brethren.
      - type: text
        text: 30 And whom he predestinated, them he also called. And whom he called, them he also justified. And whom he justified, them he also glorified.
      - type: text
