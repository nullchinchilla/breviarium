      - type: text
        text: |-
          32 And now, I commend you to God and to the Word of his grace. He has the power to build up, and to give an inheritance to all who are sanctified.
          33 I have coveted neither silver and gold, nor apparel,
          34 as you yourselves know. For that which was needed by me and by those who are with me, these hands have provided.
          35 I have revealed all things to you, because by laboring in this way, it is necessary to support the weak and to remember the words of the Lord Jesus, how he said, 'It is more blessed to give than to receive.'
          36 And when he had said these things, kneeling down, he prayed with all of them.
          37 Then a great weeping occurred among them all. And, falling upon the neck of Paul, they kissed him,
          38 being grieved most of all over the word which he had said, that they would never see his face again. And they brought him to the ship.
  reading.ad-se-autem-nobis-veni-ntibus-d-minus-pr-c-pit-u-1a36b0c3e4:
    role: reading
    content:
      en:
      - type: text
        text: |-
          Or it may be asked how we are commanded in one place to hate our parents, and them that are near us in the flesh, and in another place to love even our enemies. And, verily, the Truth hath said, as touching a wife “What God hath joined together, let not man put asunder.” (Matth. xix. 6.) And Paul saith “ Husbands, love your wives, even as Christ also loved the Church.” (Eph. v. 25.) Behold, the disciple commandeth a man to love his wife, and the Master saith “If any man hate not his wife, he cannot be My disciple.” Doth the judge, then, order one proclamation, and the crier make another? or can the man both love and hate? If we consider well the force of the commandment, we shall be able in wisdom to do both. Let us love wife, and kindred, and neighbour, as touching their nearness in the flesh but as touching the way of God, if they withstand us therein, let us not know them, but hate them and flee from them.
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
      - type: rubric
        text: Kneel for the following verse
      - type: text
        text: |-
          We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: |-
          Ad se autem nobis veniéntibus Dóminus præcépit, ut renuntiémus nostris: quia quicúmque ad fídei agónem vénimus, luctámen contra malígnos spíritus súmimus. Nihil autem malígni spíritus in hoc mundo próprium póssident: nudi ergo cum nudis luctári debémus. Nam si vestítus quisque cum nudo luctátur, cítius ad terram deiícitur, quia habet unde teneátur. Quid enim sunt terréna ómnia, nisi quædam córporis induménta? Qui ergo contra diábolum ad certámen próperat, vestiménta abiíciat, ne succúmbat.
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
          Tibi Chérubim et Séraphim * incessábili voce proclámant:
          (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
          Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
          Te gloriósus * Apostolórum chorus,
          Te Prophetárum * laudábilis númerus,
          Te Mártyrum candidátus * laudat exércitus.
          Te per orbem terrárum * sancta confitétur Ecclésia,
          Patrem * imménsæ maiestátis;
          Venerándum tuum verum * et únicum Fílium;
          Sanctum quoque * Paráclitum Spíritum.
          Tu Rex glóriæ, * Christe.
          Tu Patris * sempitérnus es Fílius.
          (Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
          Tu ad déxteram Dei sedes, * in glória Patris.
          Iudex créderis * esse ventúrus.
      - type: rubric
        text: (Sequens versus dicitur flexis genibus)
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: |-
          Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
          Ætérna fac cum Sanctis tuis * in glória numerári.
          Ætérna fac cum Sanctis tuis * in glória munerári.
          Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
          Et rege eos, * et extólle illos usque in ætérnum.
          Per síngulos dies * benedícimus te.
          (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Dignáre, Dómine, die isto * sine peccáto nos custodíre.
          Miserére nostri, Dómine, * miserére nostri.
          Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
          In te, Dómine, sperávi: * non confúndar in ætérnum.
      en2:
      - type: text
        text: |-
          For when the Lord commanded those who were coming to him, he prescribed that we renounce our own: because all of us who come to the contest of faith take up the struggle against evil spirits. But the evil spirits possess nothing of their own in this world: naked, therefore, we must wrestle with the naked. For if anyone clothed wrestles with one who is naked, he is more quickly thrown to the ground, because there is something by which he may be seized. For what are all earthly things, but certain garments of the body? Let him who hastens to the contest against the devil cast off his garments, lest he be overcome.
          We praise you, O God: * we acknowledge you as Lord.
          We worship you, * O eternal Father, all the earth.
          To you all Angels, * to you the Heavens and all the Powers:
          To you the Cherubim and Seraphim * cry out unceasingly:
          (A bow is made) Holy, Holy, Holy, * Lord God of Sabaoth.
          Full are the heavens and the earth * of the majesty of your glory.
          You, the glorious * chorus of Apostles,
          You, the praiseworthy * company of Prophets,
          You, the white-robed * army of Martyrs praises.
          You, throughout the whole world, * the holy Church confesses,
          the Father * of immense majesty;
          Your venerable, true * and only Son;
          and the Holy * Paraclete Spirit.
          You, O Christ, * are the King of glory.
          You are the eternal * Son of the Father.
          (A bow is made) You, when you were to take on man for his liberation: * did not shrink from the Virgin's womb.
          You, when you were to take on man for his liberation: * did not shrink from the Virgin's womb.
          You, having conquered the sting of death, * opened the kingdoms of heaven to those who believe.
          You sit at the right hand of God, * in the glory of the Father.
          You are believed * to be the Judge who is to come.
      - type: rubric
        text: (The following verse is said kneeling)
      - type: rubric
        text: (Brethren, when they begin 'Te ergo quaesumus,' departing from the Stalls, let them reverently bow at the words 'Quos pretioso' and the rest)
      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
          And we praise your name for ever, * and for ever and ever.
          Graciously keep us, O Lord, this day * without sin.
          Have mercy on us, O Lord, * have mercy on us.
          Let your mercy, O Lord, be upon us, * as we have hoped in you.
          In you, O Lord, I have hoped: * let me not be confounded for ever.
  reading.annunti-mus-inquam-sanctis-mart-ribus-dom-nic-pa-eb3c5f9814:
    role: reading
    content:
      en:
      - type: text
        text: 'I say again, let us tell to the holy Martyrs what the grace of the Lord''s Passover is let us tell them that, even as He hath opened the bars of His own grave, even so shall their graves also be opened let us tell them that, even as in His dead Body the Veins grew warm and quick again, even so shall their limbs, that now are cold, flush with the heat of an eternal vigor. That power which brought again our Lord from the dead will bring His Martyrs too. For as they have followed Him in His sufferings, so shall they follow Him also in His newness of life. It is written in the Psalms: “Thou hast shown Me the path of life” (xv. 12.) This is said of the Resurrection in the Person of the Saviour, as of Him Who, after that He died, came up again from hell, and began to have that path of life which was not known before.'
      la:
      - type: text
        text: 'Annuntiémus inquam sanctis Martýribus Domínicæ Paschæ grátiam: ut dum sepultúræ illíus prædicámus reseráta claustra, et horum sepúlcra reseréntur: dum corpus illíus mortuum dícimus tepéntibus venis súbito viguísse, horum quoque membra iam frígida immortalitátis calóre foveántur. Éadem enim rátio Mártyres súscitat, quæ et Dóminum suscitávit. Nam sicut viam passiónis eius expérti sunt, ita experiéntur et vitæ; scriptum est enim in Psalmo: Notas mihi fecísti vias vitæ. Hoc útique in resurrectióne ex persóna dícitur Salvatóris: ut qui, dum post mortem ab ínferis redit ad súperos, incípiat notam habére viam vitæ, quæ ante habebátur ignóta.'
      en2:
      - type: text
        text: 'Let us proclaim to the holy Martyrs the grace of the Lord''s Passover: that, as we preach the opened gates of that burial, so may their tombs likewise be opened; as we declare that his dead body suddenly revived with warm veins, so may the already cold limbs of these saints be warmed by the heat of immortality. For the same power that raised the Lord raises the Martyrs. For as they experienced the way of his Passion, so shall they also experience that of his life; for it is written in the Psalm: You have made known to me the ways of life. This is surely said in the Resurrection in the person of the Savior: so that he who, while returning after death from the lower regions to the upper, begins to know the way of life, which before was unknown.'
  reading.be-ti-p-uperes-quia-vestrum-est-regnum-dei-qu-tu-73d78d3609:
    role: reading
    content:
      en:
      - type: text
        text: 'When these woes come, the end is not by and by. And He saith further Nation shall rise against nation, and kingdom against kingdom; and great earthquakes shall be in diverse places, and pestilences, and famines, and fearful sights and great signs shall there be from heaven. Before the last tribulation cometh, shall come many other tribulations: and, by the many woes which shall come first, shall be foreshadowed the everlasting woe which shall come in the end. And therefore, after wars and commotions, the end is not yet by and by many woes must come first, to give warning of the woe that hath no end.'
      la:
      - type: text
        text: 'Beáti páuperes, quia vestrum est regnum Dei. Quátuor tantum beatitúdines sanctus Lucas Domínicas posuit, octo vero sanctus Matthǽus: sed in illis octo istæ quátuor sunt, et in quátuor istis illæ octo. Hic enim quátuor velut virtútes ampléxus est cardináles: ille in illis octo mýsticum númerum reserávit. Pro octáva enim multi inscribúntur Psalmi: et mandátum áccipis octo illis partem dare fortásse benedictiónibus. Sicut enim spei nostræ octáva perféctio est, ita octáva summa virtútum est.'
      en2:
      - type: text
        text: Blessed are the poor, for yours is the kingdom of God. Saint Luke set down only four beatitudes of the Lord, but Saint Matthew set down eight; yet in those eight these four are contained, and in these four those eight. For here he embraced, as it were, the four cardinal virtues; there, in the eight, he unlocked the mystical number. Many psalms are inscribed for the octave; and you receive the command to give a portion to those eight beatitudes. For just as the eighth is the perfection of our hope, so the eighth is the sum of the virtues.
  reading.bene-et-c-ngrue-in-hac-die-quam-nobis-be-ti-patr-3b1bc68200:
    role: reading
    content:
      la:
      - type: text
        text: 'Bene et cóngrue in hac die, quam nobis beáti Patris nostri N. ad paradísum tránsitus exsultábilem reddit, præséntis Psalmi versículum decantávimus: In memória ætérna erit iustus. Digne enim in memóriam vértitur hóminum, qui ad gáudium tránsiit Angelórum. Dicit sermo divínus: Ne laudes hóminem in vita sua; tamquam si díceret: Lauda post vitam, magnífica post consummatiónem. Dúplici enim ex causa utílius est hóminum magis memóriæ laudem dare quam vitæ; ut illo potíssimum témpore mérita sanctitátis extóllas, quando nec laudántem adulátio movet, nec laudátum tentat elátio.'
      en2:
      - type: text
        text: 'Fittingly and appropriately on this day, which the passing of our blessed Father N. to paradise renders joyful for us, we have sung the verse of the present Psalm: The just man shall be in everlasting remembrance. For he is rightly brought to the memory of men who has passed over to the joy of Angels. The divine word says: Do not praise a man in his life; as if to say: Praise after life, magnify after its completion. For there are two reasons why it is more useful to give praise to the memory of men rather than to their life: so that you extol the merits of holiness most especially at that time when neither does flattery move the one who praises, nor does pride tempt the one who is praised.'
  reading.bene-et-c-ngrue-in-hac-die-quam-nobis-be-ti-patr-ace66aca6e:
    role: reading
    content:
      en:
      - type: text
        text: It is very meet and right that upon this day, which is made a joyful day for us because it is the day whereon our blessed Father N., passed away to heaven, I say it is very meet and right that on this day we should sing that verse of the Psalms “The righteous shall be in everlasting remembrance.” (cxi. 7.) His memory is rightly honoured among men who is at this present making glad among Angels. The word of God saith “Judge none blessed before his death,” (Ecclus. xi. 30,) as though it were said, “Judge him blessed when life is ended, praise him when he is made perfect.” For there are two main reasons why it is better to praise a dead man than a living, since, if thou call him holy and worthy after his death, thou dost it when neither canst thou be corrupted by being a flatterer, nor he by being nattered.
      la:
      - type: text
        text: 'Bene et cóngrue in hac die, quam nobis beáti Patris nostri N. ad paradísum tránsitus exsultábilem reddit, præséntis Psalmi versículum decantávimus: In memória ætérna erit iustus. Digne enim in memóriam vértitur hóminum, qui ad gáudium tránsiit Angelórum. Dicit sermo divínus: Ne laudes hóminem in vita sua; tamquam si díceret: Lauda post vitam, magnífica post consummatiónem. Dúplici enim ex causa utílius est hóminum magis memóriæ laudem dare quam vitæ; ut illo potíssimum témpore mérita sanctitátis extóllas, quando nec laudántem adulátio movet, nec laudátum tentat elátio.'
      en2:
      - type: text
        text: 'Fittingly and appropriately on this day, which the passing of our blessed Father N. to paradise renders joyful for us, we have sung the verse of the present Psalm: The just man shall be in everlasting remembrance. For he is rightly brought to the memory of men who has passed over to the joy of Angels. The divine word says: Do not praise a man in his life; as if to say: Praise after life, magnify after its completion. For there are two reasons why it is more useful to give praise to the memory of men rather than to their life: so that you extol the merits of holiness most especially at that time when neither does flattery move the one who praises, nor does pride tempt the one who is praised.'
  reading.can-27-6a7ae03de1:
    role: reading
    content:
      en:
      - type: text
        text: What other, then, is that man travelling into a far country but our Redeemer, Who is gone up from us into heaven in that Flesh Which He had taken into Himself? For the earth is the home of the Flesh, Which travelleth into a far country when our Redeemer giveth It a place in heaven. But that man travelling into a far country delivered unto his servants his goods and so doth our Redeemer give spiritual gifts unto His faithful people. “And unto one he gave five talents, to another two, and to another one.” There are five bodily senses that is, sight, hearing, taste, smell, and touch. By the five talents therefore are signified the five senses, that is, outward knowledge. By the two, wit and work. And by the figure of the one talent, understanding, which is alone.
      la:
      - type: citation
        text: Can 27
      - type: text
        text: 'Quisnam est fidélis servus et prudens, quem constítuit Dóminus super famíliam suam? Quamquam in commúne nos ad indeféssam vigilántiæ curam adhortétur: speciálem tamen pópuli princípibus, id est, epíscopis, in exspectatióne adventúque suo sollicitúdinem mandat. Hunc enim servum fidélem atque prudéntem, præpósitum famíliæ signíficat, cómmoda atque utilitátes commíssi sibi pópuli curántem. Qui si dicto áudiens, et præcéptis obédiens erit, id est, si doctrínæ opportunitáte et veritáte infírma confírmet, disrúpta consólidet, depraváta convértat, et verbum vitæ in æternitátis cibum aléndæ famíliæ dispéndat, atque hæc agens, hisque ímmorans deprehendátur: glóriam a Dómino tamquam dispensátor fidélis et víllicus útilis consequétur, et super ómnia bona constituétur; id est, in Dei glória collocábitur, quia nihil sit ultra, quod mélius sit.'
      en2:
      - type: citation
        text: Can 27
      - type: text
        text: 'Who then is the faithful and wise servant whom the Lord has set over his household? Although he exhorts us all alike to the unwearying care of watchfulness, yet he assigns a special solicitude to the leaders of the people, that is, to bishops, in looking forward to and awaiting his coming. For this faithful and wise servant he signifies as one placed in authority over the household, who attends to the welfare and advantage of the people committed to him. If such a one is obedient to his word and observant of his commandments, that is, if he strengthens the weak with the opportuneness and truth of teaching, consolidates what is broken, converts what is depraved, and dispenses the word of life as food of eternity for the nourishment of the household, and is found doing this and devoted to these things: he shall receive glory from the Lord as a faithful steward and profitable overseer, and shall be set over all goods; that is, he shall be placed in the glory of God, because there is nothing beyond which is better.'
  reading.certe-cum-se-sequ-ntibus-nova-mand-ta-prop-neret-2328630ef5:
    role: reading
    content:
      en:
      - type: text
        text: 'Then we hear these things our hearts burn within us and we long to be already there, where we hope to rejoice for ever. But we cannot attain unto great rewards, save through great labour. Therefore saith the excellent preacher Paul: “He is not crowned, except he strive lawfully.” (2 Tim. ii. 5.) The greatness of the reward doth delight our mind let not the throes of the struggle dishearten us. Therefore the Truth saith unto every one that cometh unto Him “If any man come to Me, and hate not his father and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple.”'
      la:
      - type: text
        text: 'Certe cum se sequéntibus nova mandáta propóneret, dixit: Nisi quis renuntiáverit ómnibus quæ póssidet, non potest meus esse discípulus. Ac si apérte dicat: Qui per vitam véterem aliéna concupíscitis, per novæ conversatiónis stúdium et vestra largímini. Quid vero in hac lectióne dicat, audiámus: Qui vult post me veníre, ábneget semetípsum. Ibi dícitur, ut abnegémus nostra: hic dícitur, ut abnegémus nos. Et fortásse laboriósum non est hómini relínquere sua; sed valde laboriósum est relínquere semetípsum. Minus quippe est abnegáre quod habet; valde autem multum est abnegáre quod est.'
      en2:
      - type: text
        text: 'For indeed, when he was proposing new commandments to those who followed him, he said: Unless a man renounces all that he possesses, he cannot be my disciple. As if to say openly: you who, through the old life, have coveted the things of others, through the zeal of a new way of life, give away even your own. But let us hear what this reading says: Whoever wishes to come after me, let him deny himself. There it is said that we should deny what is ours; here it is said that we should deny ourselves. And perhaps it is not burdensome for a man to leave his own things; but it is very burdensome to leave himself. For it is a lesser thing to deny what one has; but it is a very great thing to deny what one is.'
  reading.certe-iste-ipse-pastor-eccl-si-ad-cuius-sacrat-s-aebeb89376:
    role: reading
    content:
      en:
      - type: text
        text: Verily, if we ask of the damsel that kept the door, she will tell us what was the measure of weakness and of strength in that Shepherd 3 of the Church nigh to whose most holy body we are now sitting, before that the Spirit came. He was so stricken by the words of one woman, that for fear of death, he denied Life. And we may well remember that Peter denied in captivity Him, Whom the thief confessed, even when He was lifted up upon the Cross. But let us hear what that craven was after that the Spirit came. When the rulers and elders were gathered together, the Apostles were beaten, and commanded not to speak at all nor teach in the name of Jesus. And Peter answered with great boldness, We ought to obey God rather than men. (Acts v. 42.)
      la:
      - type: text
        text: 'Certe iste ipse pastor Ecclésiæ, ad cuius sacratíssimum corpus sedémus, quantæ debilitátis, quantǽque formídinis ante advéntum Spíritus fúerit, ancílla ostiária requisíta dicat. Una enim mulíeris voce percúlsus, dum mori tímuit, Vitam negávit. Et pensándum, quia eum comprehénsum Petrus negávit in terra, quem suspénsum latro conféssus est in cruce. Sed vir iste tantæ formídinis, qualis post advéntum Spíritus exsístat, audiámus. Fit convéntus magistrátus atque seniórum, cæsis denuntiátur Apóstolis, ne in nómine Iesu loqui débeant: Petrus magna auctoritáte respóndet: Obedíre opórtet Deo magis quam homínibus.'
      en2:
      - type: text
        text: 'This very pastor of the Church, at whose most sacred body we are seated, let the maidservant who kept the door testify of how great weakness and how great fear he was before the coming of the Spirit. For struck down by the single voice of a woman, while he feared to die, he denied the Life. And it is to be noted that Peter denied him while arrested on the earth, whom the thief confessed while suspended on the cross. But let us hear what kind of man this man, of so great fear, became after the coming of the Spirit. An assembly of magistrates and elders is convened; the Apostles are commanded under threat of scourging not to speak in the name of Jesus: Peter responds with great authority: It is necessary to obey God rather than men.'
  reading.contemplab-tur-enim-quantum-in-n-gmate-inf-rmita-2d9d2e2ae9:
    role: reading
    content:
      en:
      - type: text
        text: For he considered, as far as man's weakness is able, through this darkness, to fix the eyes of his mind upon the eternal things, what is the gladness of the city above and being not able to tell it, he cried out wondering “What have I in heaven?” As though he would have said “It passeth my strength, it passeth the power of my utterance, it goeth beyond the reach of my understanding, what is that beauty, what is that glory, what is that exaltation, wherein, when He hath hidden us from the troubling of men, in the secret of His presence, our Lord Jesus Christ shall change our vile body, that it may be fashioned like unto His glorious Body” (Ps. xxx. 21, Phil. iii. 21.) In sight of this perfect liberty he shrank from no danger, and quailed before no suffering and if he could have died a thousand times, he would not have thought himself to have bought it at a price high enough.
      la:
      - type: text
        text: 'Contemplabátur enim quantum in ænígmate infírmitas humána óculum mentis in æternitáte fígere potest, quanta sint supérnæ civitátis gáudia: et ea enarráre non suffíciens admirándo clamábat Quid mihi est in cælo? Quasi díceret: Excédit vires meas, excédit facultátem eloquéntiæ meæ, transcéndit capacitátem intelligéntiæ meæ illud decus, illa glória, illa celsitúdo, qua nobis, a conturbatióne hóminum remótis, in abscóndito faciéi suæ Iesus Christus Dóminus noster reformábit corpus humilitátis nostræ, configurátum córpori claritátis suæ. Huius perféctæ libertátis contemplatióne nullum vitábat perículum, nullum horrébat supplícium: et si mílies posset mori, non putábat se hanc digne posse áliqua ratióne promeréri.'
      en2:
      - type: text
        text: 'For he was contemplating, as much as the weakness of the human eye of the mind is able to fix itself in a riddle upon eternity, how great are the joys of the heavenly city; and, unable to recount them, he cried out in wonder: What have I in heaven? As if to say: It surpasses my strength, it surpasses the capacity of my eloquence, it transcends the capacity of my understanding, that splendor, that glory, that loftiness by which our Lord Jesus Christ, having removed us from the disquiet of men, in the hidden place of his face, will reform the body of our lowliness, configured to the body of his glory. In contemplation of this perfect freedom, he feared no danger, he dreaded no punishment: and if he could die a thousand times, he did not think that he could merit this worthily by any means whatsoever.'
  reading.contemplab-tur-enim-quantum-in-n-gmate-inf-rmita-f70e13cf3b:
