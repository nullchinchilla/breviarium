  responsory.iste-est-qui-ante-deum-magnas-virt-tes-oper-tus-2365348a8d:
    role: responsory
    content:
      la:
      - type: response
        text: 'Iste est qui ante Deum magnas virtútes operátus est, et de omni corde suo laudávit Dóminum:'
      - type: text
        text: '* Ipse intercédat pro peccátis ómnium populórum.'
      - type: versicle
        text: Ecce homo sine queréla, verus Dei cultor, ábstinens se ab omni ópere malo, et pérmanens in innocéntia sua.
      - type: response
        text: Ipse intercédat pro peccátis ómnium populórum.
  responsory.iste-est-qui-ante-deum-magnas-virt-tes-oper-tus-6495056f9d:
    role: responsory
    content:
      en:
      - type: response
        text: This is he which wrought great wonders before God, and praised the Lord with all his heart.
      - type: text
        text: '* May he pray for all people, that their sins may be forgiven unto them.'
      - type: versicle
        text: Behold a man without blame, a worshipper of God in truth, keeping himself clean from every evil work, and abiding still in his innocency.
      - type: response
        text: May he pray for all people, that their sins may be forgiven unto them.
