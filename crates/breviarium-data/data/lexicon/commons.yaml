  reading.et-bene-asc-ndit-in-rborem-ut-arbor-bona-bonos-f-1687d64506:
    role: reading
    content:
      en:
      - type: text
        text: He did well to climb up into a tree, that a good tree might bring forth good fruits, (Matth. vii. 17,) and that the slip of the wild olive, grafted, contrary to nature, into the good olive, might bring forth the fruits of the law. (Rom. xi. 17, 24.) For the root is holy, however unprofitable the branches. Their barren beauty hath now been overshadowed by the belief of the Gentiles in the Resurrection, as by a material upgrowth. Zacchaeus, then, was in the sycamore tree, and the blind man by the way-side, (xviii. 35.) For the one, Jesus stood waiting to show mercy, and asked him before He healed him, what he would that He should do for him; being unbidden of the other, He bade Himself to be his Guest, knowing how rich was the reward of receiving Him. Nevertheless, albeit He had heard no words of invitation, yet had He seen how his heart went.
      la:
      - type: text
        text: 'Et bene ascéndit in árborem, ut arbor bona bonos fructus fáceret, ac, naturáli excísus oleástro et contra natúram insértus in bonam olívam, fructum posset legis afférre. Radix enim sancta, etsi rami inútiles. Quorum infructuósam glóriam plebs géntium, fide resurrectiónis, quasi quadam córporis elevatióne, transcéndit. Zachǽus ergo in sycómoro, cæcus in via: quorum álterum Dóminus miseratúrus exspéctat, álterum mansiónis suæ claritáte nobílitat; álterum sanatúrus intérrogat, apud álterum se, non invitátus, invítat. Sciébat enim úberem hospítii sui esse mercédem. Sed tamen, etsi nondum vocem invitántis audíerat, iam víderat afféctum.'
  reading.et-qu-tuor-penn-uni-quia-dei-omnipot-ntis-f-lium-24c6320ffa:
    role: reading
    content:
      en:
      - type: text
        text: '“And every one had four wings.” For they do all with one accord preach our Lord Jesus Christ, the Son of Almighty God toward Whose Godhead lifting up the eyes of their mind, they do lift the wings of contemplation, and do fly. In the Evangelists, the face pertaineth to the Lord''s Manhood, and the wings to His Godhead for they turn their face toward Him Whom they see in bodily shape: but when they say that He is, as touching His Godhead, Incomprehensible, and Incorporeal, the wings of their contemplation do, in a manner, carry them in flight heavenward. Because, then, they have all one faith in the Incarnation, and all equally look by contemplation toward the Godhead it is well written of them, “Every one had four faces, and every one had four wings.”'
      la:
      - type: text
        text: 'Et quátuor pennæ uni: quia Dei omnipoténtis Fílium Dóminum! nostrum Iesum Christum simul omnes concórditer prǽdicant: et ad divinitátem eius mentis óculos levántes, penna contemplatiónis volant. Evangelistárum ergo fácies ad humanitátem Dómini pértinet, penna ad divinitátem: quia in eum, quem corpóreum aspíciunt, quasi fácies inténdunt: sed dum hunc esse incircumscríptum atque incorpóreum ex divinitáte annúntiant, per contemplatiónis pennam quasi in áëra levántur. Quia ítaque una est fides incarnatiónis eius in ómnibus, et par contemplátio divinitátis eius in síngulis, recte nunc dícitur: Quátuor fácies uni, et quátuor pennæ uni.'
  reading.et-qu-tuor-penn-uni-quia-dei-omnipot-ntis-f-lium-73fb1b5455:
    role: reading
    content:
      en:
      - type: text
        text: Verily, if we ask of the damsel that kept the door, she will tell us what was the measure of weakness and of strength in that Shepherd 3 of the Church nigh to whose most holy body we are now sitting, before that the Spirit came. He was so stricken by the words of one woman, that for fear of death, he denied Life. And we may well remember that Peter denied in captivity Him, Whom the thief confessed, even when He was lifted up upon the Cross. But let us hear what that craven was after that the Spirit came. When the rulers and elders were gathered together, the Apostles were beaten, and commanded not to speak at all nor teach in the name of Jesus. And Peter answered with great boldness, We ought to obey God rather than men. (Acts v. 42.)
      la:
      - type: text
        text: 'Et quátuor pennæ uni: quia Dei omnipoténtis Fílium Dóminum! nostrum Iesum Christum simul omnes concórditer prǽdicant: et ad divinitátem eius mentis óculos levántes, penna contemplatiónis volant. Evangelistárum ergo fácies ad humanitátem Dómini pértinet, penna ad divinitátem: quia in eum, quem corpóreum aspíciunt, quasi fácies inténdunt: sed dum hunc esse incircumscríptum atque incorpóreum ex divinitáte annúntiant, per contemplatiónis pennam quasi in áëra levántur. Quia ítaque una est fides incarnatiónis eius in ómnibus, et par contemplátio divinitátis eius in síngulis, recte nunc dícitur: Quátuor fácies uni, et quátuor pennæ uni.'
  reading.et-vos-s-miles-hom-nibus-exspect-ntibus-d-minum-17c37ab501:
    role: reading
    content:
      la:
      - type: text
        text: 'Et vos símiles homínibus exspectántibus dóminum suum, quando revertátur a núptiis: ut cum vénerit et pulsáverit, conféstim apériant ei. Venit quippe Dóminus, cum ad iudícium próperat: pulsat vero, cum iam per ægritúdinis moléstias esse mortem vicínam desígnat. Cui conféstim aperímus, si hunc cum amóre suscípimus. Aperíre enim iúdici pulsánti non vult, qui exíre de córpore trépidat: et vidére eum, quem contempsísse se méminit, iúdicem formídat. Qui autem de sua spe et operatióne secúrus est, pulsanti conféstim áperit, quia lætus iúdicem sústinet; et, cum tempus propínquæ mortis advénerit, de glória retributiónis hilaréscit.'
      - type: text
        text: 'Te Deum laudámus: * te Dóminum confitémur.'
      - type: text
        text: Te ætérnum Patrem * omnis terra venerátur.
      - type: text
        text: 'Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:'
      - type: text
        text: 'Tibi Chérubim et Séraphim * incessábili voce proclámant:'
      - type: text
        text: (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
      - type: text
        text: Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
      - type: text
        text: Te gloriósus * Apostolórum chorus,
      - type: text
        text: Te Prophetárum * laudábilis númerus,
      - type: text
        text: Te Mártyrum candidátus * laudat exércitus.
      - type: text
        text: Te per orbem terrárum * sancta confitétur Ecclésia,
      - type: text
        text: Patrem * imménsæ maiestátis;
      - type: text
        text: Venerándum tuum verum * et únicum Fílium;
      - type: text
        text: Sanctum quoque * Paráclitum Spíritum.
      - type: text
        text: Tu Rex glóriæ, * Christe.
      - type: text
        text: Tu Patris * sempitérnus es Fílius.
      - type: text
        text: '(Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: 'Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
      - type: text
        text: Tu ad déxteram Dei sedes, * in glória Patris.
      - type: text
        text: Iudex créderis * esse ventúrus.
      - type: text
        text: (Sequens versus dicitur flexis genibus) ~
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória numerári.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória munerári.
      - type: text
        text: Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
      - type: text
        text: Et rege eos, * et extólle illos usque in ætérnum.
      - type: text
        text: Per síngulos dies * benedícimus te.
      - type: text
        text: (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Dignáre, Dómine, die isto * sine peccáto nos custodíre.
      - type: text
        text: Miserére nostri, Dómine, * miserére nostri.
      - type: text
        text: Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
      - type: text
        text: 'In te, Dómine, sperávi: * non confúndar in ætérnum.'
  reading.et-vos-s-miles-hom-nibus-exspect-ntibus-d-minum-c19ef3f352:
    role: reading
    content:
      en:
      - type: text
        text: And ye yourselves like unto men that wait for their lord, when he will return from the wedding that, when he cometh and knocketh, they may open unto him immediately. The Lord cometh at the hour of judgment He knocketh when, by the pains of sickness, He biddeth us know that death is nigh. To Him open we immediately, if we receive Him in love. Whoso feareth to leave this body, will not open to the Judge when He knocketh, for he dreadeth to see that Judge, Whom he knoweth that he hath despised. But whosoever knoweth that his hope and works are built upon a good foundation, when he heareth the Judge knock, openeth to Him immediately, for to such an one that coming is blessed, yea, when the hour of death is at hand, such an one haileth with gladness a glorious reward.
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
      - type: text
        text: O Lord, have mercy upon us, * have mercy upon us.
      - type: text
        text: O Lord, let thy mercy lighten upon us, * as our trust is in thee.
      - type: text
        text: O Lord, in thee have I trusted, * let me never be confounded.
