  reading.cum-vero-unus-idemque-narrator-utr-mque-dicat-ut-83981d0a4a:
    role: reading
    content:
      la:
      - type: text
        text: 'Cum vero unus idemque narrator utrúmque dicat, utrúmque commendet, et virum Mariae Ioseph, et Christi Virginem Matrem, et Christum ex semine David, et Ioseph in serie progeneratorum Christi ex David: quid restat, nisi et Mariam non fuisse extraneam a cognatione David, et eam Ioseph coniugem non frustra appellatam propter órdinem sexus et animorum confoederationem; et Ioseph potius propter dignitatem virilem ab ordine generationum illarum non fuisse separandum, ne hoc ipso viderétur ab illa femina separatus, cui eum coniungebat mentis affectus?'
  reading.de-ctibus-apostol-rum-59cc97341e:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the Acts of Apostles
      - type: citation
        text: Acts 20:17-24
      - type: text
        text: 17 And sending from Miletus to Ephesus, he called the ancients of the church.
      - type: citation
        text: '18 And when they were come to him, and were together, he said to them: You know from the first day that I came into Asia, in what manner I have been with you, for all the time,'
      - type: text
        text: 19 Serving the Lord with all humility, and with tears, and temptations which befell me by the conspiracies of the Jews;
      - type: text
        text: 20 How I have kept back nothing that was profitable to you, but have preached it to you, and taught you publicly, and from house to house,
      - type: text
        text: 21 Testifying both to Jews and Gentiles penance towards God, and faith in our Lord Jesus Christ.
      - type: citation
        text: '22 And now, behold, being bound in the spirit, I go to Jerusalem: not knowing the things which shall befall me there:'
      - type: citation
        text: '23 Save that the Holy Ghost in every city witnesseth to me, saying: That bands and afflictions wait for me at Jerusalem.'
      - type: text
        text: 24 But I fear none of these things, neither do I count my life more precious than myself, so that I may consummate my course and the ministry of the word which I received from the Lord Jesus, to testify the gospel of the grace of God.
      la:
      - type: text
        text: De Áctibus Apostolórum
      - type: citation
        text: Acts 20:17-24
      - type: text
        text: 17 A Miléto Paulus mittens Éphesum, vocávit maióres natu Ecclésiæ.
      - type: citation
        text: '18 Qui cum veníssent ad eum, et simul essent, dixit eis: Vos scitis a prima die qua ingréssus sum in Ásiam, quáliter vobíscum per omne tempus fúerim,'
      - type: citation
        text: '19 sérviens Dómino cum omni humilitáte, et lácrimis, et tentatiónibus, quae mihi accidérunt ex insídiis Iudæórum:'
      - type: text
        text: 20 quómodo nihil subtráxerim utílium, quóminus annuntiárem vobis et docérem vos, públice et per domos,
      - type: text
        text: 21 testíficans Iudǽis atque Gentílibus in Deum pœniténtiam, et fidem in Dóminum nostrum Iesum Christum.
      - type: citation
        text: '22 Et nunc ecce alligátus ego spíritu, vado in Ierúsalem: quæ in ea ventúra sint mihi, ignórans:'
      - type: citation
        text: '23 nisi quod Spíritus Sanctus per omnes civitátes mihi protestátur, dicens: Quóniam víncula et tribulatiónes Ierosólymis me manent.'
      - type: citation
        text: '24 Sed nihil horum véreor: nec fácio ánimam meam pretiosiórem quam me, dúmmodo consúmmem cursum meum, et ministérium verbi quod accépi a Dómino Iesu, testificári Evangélium grátiæ Dei.'
