        text: Amen.
  hymn.iste-conf-ssor-d-mini-col-ntes-3f6d87b6e9:
    role: hymn
    content:
      en:
      - type: text
        text: This the confessor of the Lord, whose triumph
      - type: text
        text: Now all the faithful celebrate, with gladness
      - type: text
        text: Erst on this feast-day merited to enter
      - type: text
        text: Into his glory.
      - type: text
        text: Saintly and prudent, modest in behaviour,
      - type: text
        text: Peaceful and sober, chaste was he, and lowly.
      - type: text
        text: While that life’s vigour, coursing through his members,
      - type: text
        text: Quickened his being.
      - type: text
        text: Sick ones of old time, to his tomb resorting,
      - type: text
        text: Sorely by ailments manifold afflicted,
      - type: text
        text: Oft-times have welcomed health and strength returning,
      - type: text
        text: At his petition.
      - type: text
        text: Whence we in chorus gladly do him honour,
      - type: text
        text: Chanting his praises with devout affection,
      - type: text
        text: That in his merits we may have a portion,
      - type: text
        text: Now and forever.
      - type: text
        text: His be the glory, power and salvation,
      - type: text
        text: Who over all things reigneth in the highest,
      - type: text
        text: Earth’s mighty fabric ruling and directing,
      - type: text
        text: Onely and Trinal.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Iste Conféssor Dómini, coléntes
      - type: text
        text: Quem pie laudant pópuli per orbem,
      - type: text
        text: Hac die lætus méruit beátas
      - type: text
        text: Scándere sedes.
      - type: text
        text: Qui pius, prudens, húmilis, pudícus,
      - type: text
        text: Sóbriam duxit sine labe vitam,
      - type: text
        text: Donec humános animávit auræ
      - type: text
        text: Spíritus artus.
      - type: text
        text: Cuius ob præstans méritum, frequénter,
      - type: text
        text: Ægra quæ passim iacuére membra,
      - type: text
        text: Víribus morbi dómitis, salúti
      - type: text
        text: Restituúntur.
      - type: text
        text: Noster hinc illi chorus obsequéntem
      - type: text
        text: Cóncinit laudem celebrésque palmas,
      - type: text
        text: Ut piis eius précibus iuvémur
      - type: text
        text: Omne per ævum.
      - type: text
        text: Sit salus illi, decus atque virtus,
      - type: text
        text: Qui, super cæli sólio corúscans,
      - type: text
        text: Tótius mundi sériem gubérnat,
      - type: text
        text: Trinus et unus.
      - type: text
        text: Amen.
  hymn.iste-conf-ssor-d-mini-col-ntes-4dd3f199b1:
    role: hymn
