      en2:
      - type: text
        text: |-
          Do not fear those who kill the body. Therefore, no accident that may befall our bodies is to be feared, nor is any pain that destroys the flesh to be admitted: since, dissolved according to the condition of its own nature and origin, it shall flow back into the substance of the spiritual soul. And because those strengthened by such teachings ought to possess a free constancy in confessing God, he also added the condition by which we would be held: that he would deny before the Father in heaven the one who had denied him before men on earth; but that the one who had confessed him before men would himself be confessed by him in heaven: and that, as we had been witnesses to his name before men, so we would make use of his testimony before God the Father.
          We praise you, O God: * we acknowledge you as Lord.
          To you, eternal Father, * all the earth renders worship.
          To you all Angels, * to you the Heavens and all the Powers:
          To you the Cherubim and Seraphim * cry out without ceasing:
