  reading.de-libro-secundo-paralip-menon-9ee5ebae15:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the book of Paralipomenon
      - type: citation
        text: 2 Chr 7:1-5
      - type: citation
        text: '1 And when Solomon had made an end of his prayer, fire came down from heaven, and consumed the holocausts and the victims: and the majesty of the Lord filled the house.'
      - type: citation
        text: 2 Neither could the priests enter into the temple of the Lord, because the majesty of the Lord had filled the temple of the Lord.
      - type: citation
        text: '3 Moreover all the children of Israel saw the fire coming down, and the glory of the Lord upon the house: and falling down with their faces to the ground, upon the stone pavement, they adored and praised the Lord: because he is good, because his mercy endureth for ever.'
      - type: text
        text: 4 And the king and all the people sacrificed victims before the Lord.
      - type: citation
        text: '5 And king Solomon offered a sacrifice of twenty-two thousand oxen, and one hundred and twenty thousand rams: and the king and all the people dedicated the house of God.'
      la:
      - type: text
        text: De libro secundo Paralipómenon
      - type: citation
