  reading.quin-mmo-be-ti-qui-udiunt-verbum-dei-et-cust-diu-c8de889527:
    role: reading
    content:
      en:
      - type: text
        text: |-
          Yea, rather, blessed are they that hear the Word of God and keep it. How nobly doth the Saviour say “Yea” to the woman's blessing, declaring also that not only is she blessed who was meet to give bodily birth to the Word of God, but that all they who spiritually conceive the same Word by the hearing of faith, and, by keeping it through good works, bring it forth and, as it were, carefully nurse it, in their own hearts, and in the hearts of their neighbours, are also blessed. Yea, and that the very Mother of God herself was blessed in being for a while the handmaid of the Word of God made Flesh, but that she was much more blessed in this, that through her love she keepeth Him for ever.
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
      - type: rubric
        text: Kneel for the following verse
      - type: text
        text: |-
          We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: |-
          Quinímmo beáti qui áudiunt verbum Dei et custódiunt. Pulchre Salvátor attestatióni mulíeris ánnuit, non eam tantúmmodo quæ Verbum Dei corporáliter generáre merúerat, sed et omnes qui idem Verbum spiritáliter audítu fídei concípere, et boni óperis custódia vel in suo vel in proximórum corde párere et quasi álere studúerint, asséverans esse beátos; quia, et éadem Dei Génetrix, et inde quidem beáta quia Verbi incarnándi minístra facta est temporális, sed inde multo beátior quia eiúsdem semper amándi custos manébat ætérna.
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
          Tibi Chérubim et Séraphim * incessábili voce proclámant:
          (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
          Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
          Te gloriósus * Apostolórum chorus,
          Te Prophetárum * laudábilis númerus,
          Te Mártyrum candidátus * laudat exércitus.
          Te per orbem terrárum * sancta confitétur Ecclésia,
          Patrem * imménsæ maiestátis;
          Venerándum tuum verum * et únicum Fílium;
          Sanctum quoque * Paráclitum Spíritum.
          Tu Rex glóriæ, * Christe.
          Tu Patris * sempitérnus es Fílius.
          (Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
          Tu ad déxteram Dei sedes, * in glória Patris.
          Iudex créderis * esse ventúrus.
      - type: rubric
        text: (Sequens versus dicitur flexis genibus)
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: |-
          Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
          Ætérna fac cum Sanctis tuis * in glória numerári.
          Ætérna fac cum Sanctis tuis * in glória munerári.
          Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
          Et rege eos, * et extólle illos usque in ætérnum.
          Per síngulos dies * benedícimus te.
          (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Dignáre, Dómine, die isto * sine peccáto nos custodíre.
          Miserére nostri, Dómine, * miserére nostri.
          Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
          In te, Dómine, sperávi: * non confúndar in ætérnum.
      en2:
      - type: text
        text: |-
          Nay rather, blessed are they who hear the word of God and keep it. The Savior graciously assents to the woman's witness, affirming that not only she who had merited to bear the Word of God bodily, but also all those who strive to conceive that same Word spiritually by the hearing of faith, and to bring it forth and, as it were, to nurture it in their own heart or in the hearts of their neighbors through the guardianship of good works, are blessed; because even the Mother of God is blessed, and is blessed for this reason, that she was made a temporal minister of the Incarnation of the Word, but is far more blessed in that she remained the eternal guardian of that same Word ever to be loved.
          We praise you, O God: * we acknowledge you as Lord.
          To you, eternal Father, * all the earth renders worship.
          To you all Angels, * to you the Heavens and all the Powers:
          To you the Cherubim and Seraphim * cry out without ceasing:
          (A bow is made) Holy, Holy, Holy, * Lord God of Sabaoth.
          Full are the heavens and the earth * of the majesty of your glory.
          You, the glorious * choir of the Apostles,
          You, the praiseworthy * company of the Prophets,
          You, the white-robed * army of the Martyrs praise.
          You, throughout the world, * the holy Church confesses,
          the Father * of immense majesty;
          Your venerable, true * and only Son;
          And the Holy * Paraclete Spirit.
          You are the King of glory, * O Christ.
          You are the * everlasting Son of the Father.
          (A bow is made) You, about to take upon yourself man for his liberation, * did not shrink from the Virgin's womb.
          You, about to take upon yourself man for his liberation, * did not shrink from the Virgin's womb.
          You, having overcome the sting of death, * have opened to believers the kingdoms of heaven.
          You sit at the right hand of God, * in the glory of the Father.
          You are believed * to be the Judge to come.
      - type: rubric
        text: (The following verse is said kneeling)
      - type: rubric
        text: (Brethren, when they begin 'Te ergo quaesumus,' departing from the Stalls, let them reverently bow at the words 'Quos pretioso' and the rest)
      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
          And we praise your name for ever, * and for ever and ever.
          Graciously keep us, O Lord, this day * without sin.
          Have mercy on us, O Lord, * have mercy on us.
          Let your mercy, O Lord, be upon us, * as we have hoped in you.
          In you, O Lord, I have hoped: * let me not be confounded for ever.
  reading.quis-gitur-neget-hanc-vitam-flux-sse-de-c-lo-qua-412e86e157:
    role: reading
    content:
      en:
      - type: text
        text: Who would deny that this is a life which hath come down from heaven, seeing it is a life whereof it is not easy to find an example before God came down to dwell in a Body of clay? Then was it a virgin which conceived Him in her womb, and the Word was made Flesh, that Flesh might be made God. Some will say Concerning Elias also, we find not that he shared in the lusting after a bodily coming-together. Yea and therefore it is that he was carried up in a fiery chariot into heaven therefore is it that he is seen with the Lord amid all the glory of the Transfiguration therefore it is that he is to come as a Forerunner of the Lord's coming again.
      la:
      - type: text
        text: 'Quis ígitur neget hanc vitam fluxísse de cælo, quam non fácile invenímus in terris, nisi postquam Deus in hæc terréni córporis membra descéndit? Tunc in útero Virgo concépit, et Verbum caro factum est, ut caro fíeret Deus. Dicet áliquis: Sed étiam Elías nullíus corpórei cóitus fuísse permíxtus cupiditátibus invenítur. Ideo ergo curru raptus ad cælum; ídeo cum Dómino appáret in glória; ídeo Domínici ventúrus est præcúrsor advéntus.'
      en2:
      - type: text
        text: 'Who, then, can deny that this life has flowed down from heaven — a life that we do not easily find on earth, save since God descended into the members of this earthly body? Then the Virgin conceived in her womb, and the Word was made flesh, so that the flesh might become God. Someone may say: But Elijah also is found to have been untouched by any desire born of bodily union. For this reason he was caught up to heaven in a chariot; for this reason he appears with the Lord in glory; for this reason he is to come as the forerunner of the Lord''s advent.'
  reading.quis-taque-iste-homo-est-qui-p-regre-profic-scit-3363c6d802:
    role: reading
    content:
      la:
      - type: text
        text: 'Quis ítaque iste homo est qui péregre proficíscitur, nisi Redémptor noster, qui, in ea carne quam assúmpserat, ábiit in cælum? Carnis enim locus próprius terra est; quæ quasi ad peregrína dúcitur, dum per Redemptórem nostrum in cælo collocátur. Sed homo iste, péregre proficíscens, servis suis bona sua trádidit; quia fidélibus suis spirituália dona concéssit. Et uni quidem quinque talénta, álii duo, álii vero commísit unum. Quinque étenim sunt córporis sensus, vidélicet: visus, audítus, gustus, odorátus et tactus. Quinque ergo taléntis, donum quinque sénsuum, id est, exteriórum sciéntia, exprímitur. Duóbus vero, intelléctus et operátio designátur. Uníus autem talénti nómine, intelléctus tantúmmodo designátur.'
      en2:
      - type: text
        text: 'Who, then, is this man who goes on a journey, if not our Redeemer, who, in the flesh he had assumed, went up to heaven? For the proper place of flesh is the earth; and it is brought, as it were, to a foreign land, when through our Redeemer it is placed in heaven. But this man, going on a journey, handed over his goods to his servants; because he granted spiritual gifts to his faithful. To one he entrusted five talents, to another two, to yet another one. For the senses of the body are five, namely: sight, hearing, taste, smell, and touch. By the five talents, therefore, the gift of the five senses — that is, the knowledge of external things — is expressed. By the two, intelligence and action are signified. By the name of the one talent, intelligence alone is signified.'
  reading.quis-taque-iste-homo-est-qui-p-regre-profic-scit-7fdef2956b:
    role: reading
    content:
      en:
      - type: text
        text: What other, then, is that man travelling into a far country but our Redeemer, Who is gone up from us into heaven in that Flesh Which He had taken into Himself? For the earth is the home of the Flesh, Which travelleth into a far country when our Redeemer giveth It a place in heaven. But that man travelling into a far country delivered unto his servants his goods and so doth our Redeemer give spiritual gifts unto His faithful people. “And unto one he gave five talents, to another two, and to another one.” There are five bodily senses that is, sight, hearing, taste, smell, and touch. By the five talents therefore are signified the five senses, that is, outward knowledge. By the two, wit and work. And by the figure of the one talent, understanding, which is alone.
      la:
      - type: text
        text: 'Quis ítaque iste homo est qui péregre proficíscitur, nisi Redémptor noster, qui, in ea carne quam assúmpserat, ábiit in cælum? Carnis enim locus próprius terra est; quæ quasi ad peregrína dúcitur, dum per Redemptórem nostrum in cælo collocátur. Sed homo iste, péregre proficíscens, servis suis bona sua trádidit; quia fidélibus suis spirituália dona concéssit. Et uni quidem quinque talénta, álii duo, álii vero commísit unum. Quinque étenim sunt córporis sensus, vidélicet: visus, audítus, gustus, odorátus et tactus. Quinque ergo taléntis, donum quinque sénsuum, id est, exteriórum sciéntia, exprímitur. Duóbus vero, intelléctus et operátio designátur. Uníus autem talénti nómine, intelléctus tantúmmodo designátur.'
      en2:
      - type: text
        text: 'Who, then, is this man who goes on a journey, if not our Redeemer, who, in the flesh he had assumed, went up to heaven? For the proper place of flesh is the earth; and it is brought, as it were, to a foreign land, when through our Redeemer it is placed in heaven. But this man, going on a journey, handed over his goods to his servants; because he granted spiritual gifts to his faithful. To one he entrusted five talents, to another two, to yet another one. For the senses of the body are five, namely: sight, hearing, taste, smell, and touch. By the five talents, therefore, the gift of the five senses — that is, the knowledge of external things — is expressed. By the two, intelligence and action are signified. By the name of the one talent, intelligence alone is signified.'
  reading.quod-si-c-ntuens-longam-dei-pati-ntiam-qu-in-pro-afe4fd3b0d:
    role: reading
    content:
      en:
      - type: text
        text: |-
          And so he that had received five talents, gained other five talents for some there be who, while yet they are not able to go on unto things inward and mystic, do yet so desire our Fatherland which is above, that they teach well all whom they can, and of those very outward things which they have received make gain double. These are they which keep themselves clean from the unruly motions of the flesh, and from the lust of the world, and from the delight of things which are seen, and, by their preaching, keep other men also clean from all these things. And some there are who receive, as their two talents, the power to think and the power to work. These are they which inwardly understand dark things, and outwardly work wonders. And these, since they preach unto others, both through their understanding and their works, gain, as it were, double, for the talents which they have received.
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
      - type: rubric
        text: Kneel for the following verse
      - type: text
        text: |-
          We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: 'Quod, si cóntuens longam Dei patiéntiam, quæ in proféctum humánæ salútis exténditur, advérsum consérvos insoléscet, et sæculi malus vitiísque se tradet, præséntium tantum curam in cultu ventris exércens; desperáta die Dóminus advéniet, eúmque a bonis, quæ spopónderat, dívidet, portionémque eius cum hypócritis in pœnæ æternitáte constítuet: quia advéntum desperávit, quia mandátis non obtemperáverit, quia præséntibus studúerit, quia vita Géntium víxerit, quia desperatióne iudícii commíssam sibi famíliam fame, siti, cæde vexáverit.'
      en2:
      - type: text
        text: 'But if, beholding the long patience of God, which is extended for the benefit of human salvation, he grows insolent against his fellow-servants, and gives himself over to the vices of the age, devoting care only to present things in the service of his belly; the Lord will come on a day when he has despaired of his coming, and will separate him from the good things he had promised, and will establish his portion with the hypocrites in the eternity of punishment: because he despaired of the coming, because he did not obey the commandments, because he was devoted to present things, because he lived the life of the Gentiles, because through despair of judgment he harassed with hunger, thirst, and violence the household entrusted to him.'
  reading.quod-si-hic-ubi-morbi-ubi-insectati-nes-ubi-pr-m-4d58930236:
    role: reading
    content:
      la:
      - type: text
        text: 'Quod si hic, ubi morbi, ubi insectatiónes, ubi præmaturæ mortes, ubi calumniæ, ubi invidiæ, ubi perturbationes, ubi iræ, ubi cupiditates, ubi innumerábiles insidiæ, ubi quotidianæ sollicitudines, ubi perpétua sibíque succedentia mala sunt, innúmeros ex omni parte dolóres afferentia, Paulus dixit fíeri posse, ut semper gaudeamus, si quis paululum ex rerum mundanarum flúctibus erexerit caput, vitámque suam recte composuerit: multo magis, postquam hinc demigraverimus, fácile cómpotes érimus eius boni, cum hæc ómnia sublata fúerint, advérsa valetudo, morbi, peccandi matéria, ubi non est meum ac tuum, frígidum illud verbum, et quidquid est malórum in vitam nostram invehens, innumeraque gignens bella.'
      en2:
      - type: text
        text: 'But if here, where there are diseases, persecutions, untimely deaths, slanders, envies, disturbances, angers, desires, innumerable snares, daily anxieties, and continuous evils succeeding one another, bringing with them pain from every side, Paul said it was possible for us always to rejoice, if anyone lifts his head but a little from the waves of worldly affairs and orders his life rightly — how much more easily, after we have departed from here, shall we attain that good, when all these things have been taken away: ill health, sickness, the occasion of sin, the cold word of mine and thine, and whatever it is that introduces evils into our life and begets countless wars.'
  reading.quod-si-hic-ubi-morbi-ubi-insectati-nes-ubi-pr-m-ca1a26bf8f:
    role: reading
    content:
      en:
      - type: text
        text: Here there are sicknesses, here there are strivings, here there are untimely deaths, here there are lies, here there are jealousies, here there are troubles, here there is anger, here there are lustings, here there are pit-falls unnumbered, here there are daily cares, here one evil followeth after another, and all bring vexation. And yet Paul hath it that even here a man may rejoice evermore, if he will but raise his head above the flood of earthly things, and order his life aright. How much better shall we fare when we have passed away from all these things, and all these things are taken away from us, when we shall have no illhealth, nor disease, nor matter wherein to sin, when that hard thing, right of property, shall exist no more, whereby all unrighteousness cometh into this life, and strifes unnumbered are begotten.
      la:
      - type: text
        text: 'Quod si hic, ubi morbi, ubi insectatiónes, ubi præmaturæ mortes, ubi calumniæ, ubi invidiæ, ubi perturbationes, ubi iræ, ubi cupiditates, ubi innumerábiles insidiæ, ubi quotidianæ sollicitudines, ubi perpétua sibíque succedentia mala sunt, innúmeros ex omni parte dolóres afferentia, Paulus dixit fíeri posse, ut semper gaudeamus, si quis paululum ex rerum mundanarum flúctibus erexerit caput, vitámque suam recte composuerit: multo magis, postquam hinc demigraverimus, fácile cómpotes érimus eius boni, cum hæc ómnia sublata fúerint, advérsa valetudo, morbi, peccandi matéria, ubi non est meum ac tuum, frígidum illud verbum, et quidquid est malórum in vitam nostram invehens, innumeraque gignens bella.'
      en2:
      - type: text
        text: 'But if here, where there are diseases, persecutions, untimely deaths, slanders, envies, disturbances, angers, desires, innumerable snares, daily anxieties, and continuous evils succeeding one another, bringing with them pain from every side, Paul said it was possible for us always to rejoice, if anyone lifts his head but a little from the waves of worldly affairs and orders his life rightly — how much more easily, after we have departed from here, shall we attain that good, when all these things have been taken away: ill health, sickness, the occasion of sin, the cold word of mine and thine, and whatever it is that introduces evils into our life and begets countless wars.'
  reading.quod-si-nobis-cr6dere-non-prod-sset-non-hoc-tam-d7089e94c5:
    role: reading
    content:
      la:
      - type: text
        text: 'Quod si nobis cr6dere non prodésset, non hoc tam attente idem Apostolus Timotheo comendaret dicens: Memoresto Christum Iesum resurrexisse a mortuis, ex semine David, secúndum Evangelium meum. Quid ergo iam moveat sancti Evangelii sectatorem, quod sine conciibitu Ioseph Christus natus ex Virgine, filius tamen David appellatur, cum generationum seriem non usque ad Mariam, sed usque ad Ioseph Matthaeus Evangelista perdticat? Primo quia mariti eius fiierat propter virilem sexum pótius honoranda persona: neque enim quia conciibitu non permixtus, ideo non maritus, cum ipse Matthaeus narret ab Angelo Mariam coniugem ipsius appellatam, qui narrat, quod de Spiritu sancto conceperat.'
      en2:
      - type: text
        text: 'But if it were of no benefit for us to believe, the same Apostle would not so earnestly commend this to Timothy, saying: Remember that Christ Jesus has risen from the dead, of the seed of David, according to my Gospel. What, then, should now trouble the follower of the holy Gospel, that Christ — born of the Virgin without any union with Joseph — is nonetheless called the son of David, since Matthew the Evangelist traces the line of generations not to Mary but to Joseph? First, because the person of her husband was to be honored more, on account of the male sex: for the fact that he was not united in bodily union does not mean he was not a husband, since Matthew himself narrates that the Angel called Mary his wife — the same Matthew who relates that she had conceived of the Holy Spirit.'
  reading.quot-ergo-sunt-bona-pr-dic-ntium-tot-sunt-ornam-c2e72557ed:
    role: reading
    content:
      en:
      - type: text
        text: 'So much power then as have preachers, so much ornament have the heavens. Wherefore again it is written By the word of the Lord were the heavens made. ~(Ps. xxxii. 6.) For the Word of the Lord is the Son of the Father. But, to the end that all the Holy Trinity may be made manifest as the Maker of the heavens, that is, of the Apostles, it is straightway added touching God the Holy Ghost: you and all the host of them by the Breath of His mouth. Therefore the might of the same heavens is the might of the Spirit, for they had not braved the powers of this world, unless the strength of the Holy Ghost had comforted them. For we know what manner of men the Teachers of the Holy Church were before the coming of this Spirit and since He came we see in Whose strength they are made strong.'
      la:
      - type: text
        text: 'Quot ergo sunt bona prædicántium, tot sunt ornaménta cælórum. Hinc rursus scriptum est: Verbo Dómini cæli firmáti sunt. Verbum enim Dómini Fílius est Patris. Sed eósdem cælos, vidélicet sanctos Apóstolos, ut tota simul sancta Trínitas ostendátur operáta, repénte de Sancti Spíritus divinitáte adiúngitur: Et Spíritu oris eius omnis virtus eórum. Cælórum ergo virtus de Spíritu sumpta est: quia mundi huius potestátibus contraíre non præsúmerent, nisi eos Sancti Spíritus fortitúdo solidásset. Quales namque doctóres sanctæ Ecclésiæ ante advéntum huius Spíritus fúerint, scimus: et post advéntum illíus, cuius fortitúdinis facti sint, conspícimus.'
      en2:
      - type: text
        text: 'Therefore, as many as are the good things of those who preach, so many are the ornaments of the heavens. Hence it is written again: By the word of the Lord the heavens were made firm. For the Word of the Lord is the Son of the Father. But that the same heavens — namely the holy Apostles — might show the whole holy Trinity at work together, there is added at once from the divinity of the Holy Spirit: And by the Spirit of his mouth all their power. The power of the heavens, then, was received from the Spirit: for they would not have dared to stand against the powers of this world, had not the strength of the Holy Spirit made them firm. We know what kind of teachers of the holy Church they were before the coming of that Spirit; and after his coming, we behold of what strength they became.'
  reading.rm-5-18-21-0cde61a493:
    role: reading
    content:
      la:
      - type: citation
        text: Rm 5:18-21
      - type: text
        text: |-
          18 Igitur sicut per uníus delíctum in omnes hómines in condemnatiónem: sic et per uníus iustítiam in omnes hómines in iustificatiónem vitæ.
          19 Sicut enim per inobediéntiam uníus hóminis, peccatóres constitúti sunt multi: ita et per uníus obeditiónem, iusti constituéntur multi.
          20 Lex autem subintrávit ut abundáret delíctum. Ubi autem abundávit delíctum, superabundávit grátia:
          21 ut sicut regnávit peccátum in mortem: ita et grátia regnet per iustítiam in vitam ætérnam, per Iesum Christum Dóminum nostrum.
      en2:
      - type: citation
        text: Rm 5:18-21
      - type: text
        text: |-
          18 Therefore, just as through the offense of one, all men fell under condemnation, so also through the justice of one, all men fall under justification unto life.
          19 For, just as through the disobedience of one man, many were established as sinners, so also through the obedience of one man, many shall be established as just.
          20 Now the law entered in such a way that offenses would abound. But where offenses were abundant, grace was superabundant.
          21 So then, just as sin has reigned unto death, so also may grace reign through justice unto eternal life, through Jesus Christ our Lord.
  reading.rm-6-1-8-e8296de047:
    role: reading
    content:
      la:
      - type: citation
        text: Rm 6:1-8
      - type: text
        text: |-
          1 Quid ergo dicémus? permanébimus in peccáto ut grátia abúndet?
          2 Absit. Qui enim mórtui sumus peccáto, quómodo adhuc vivémus in illo?
          3 an ignorátis quia quicúmque baptizáti sumus in Christo Iesu, in morte ipsíus baptizáti sumus?
          4 Consepúlti enim sumus cum illo per baptísmum in mortem: ut quómodo Christus surréxit a mórtuis per glóriam Patris, ita et nos in novitáte vitæ ambulémus.
          5 Si enim complantáti facti sumus similitúdini mortis eius: simul et resurrectiónis érimus.
          6 Hoc sciéntes, quia vetus homo noster simul crucifíxus est, ut destruátur corpus peccáti, et ultra non serviámus peccáto.
          7 Qui enim mórtuus est, iustificátus est a peccáto.
          8 Si autem mórtui sumus cum Christo, crédimus quia simul étiam vivémus cum Christo.
      en2:
      - type: citation
        text: Rm 6:1-8
      - type: text
        text: |-
          1 So what shall we say? Should we remain in sin, so that grace may abound?
          2 Let it not be so! For how can we who have died to sin still live in sin?
          3 Do you not know that those of us who have been baptized in Christ Jesus have been baptized into his death?
          4 For through baptism we have been buried with him into death, so that, in the manner that Christ rose from the dead, by the glory of the Father, so may we also walk in the newness of life.
          5 For if we have been planted together, in the likeness of his death, so shall we also be, in the likeness of his resurrection.
          6 For we know this: that our former selves have been crucified together with him, so that the body which is of sin may be destroyed, and moreover, so that we may no longer serve sin.
          7 For he who has died has been justified from sin.
          8 Now if we have died with Christ, we believe that we shall also live together with Christ.
  reading.rom-8-28-34-5da4c14800:
    role: reading
    content:
      en:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: |-
          25 And now behold, I know that all you, among whom I have gone preaching the kingdom of God, shall see my face no more.
          26 Wherefore I take you to witness this day, that I am clear from the blood of all men;
          27 For I have not spared to declare unto you all the counsel of God.
          28 Take heed to yourselves, and to the whole flock, wherein the Holy Ghost hath placed you bishops, to rule the church of God, which he hath purchased with his own blood.
          29 I know that, after my departure, ravening wolves will enter in among you, not sparing the flock.
          30 And of your own selves shall arise men speaking perverse things, to draw away disciples after them.
          31 Therefore watch, keeping in memory, that for three years I ceased not, with tears to admonish every one of you night and day.
      la:
      - type: citation
        text: Rom 8:28-34
      - type: text
        text: |-
          28 Scimus autem quóniam diligéntibus Deum ómnia cooperántur in bonum iis qui secúndum propósitum vocáti sunt sancti.
          29 Nam quos præscívit et prædestinávit confórmes fíeri imáginis Fílii sui ut sit ipse primogénitus in multis frátribus.
          30 Quos autem prædestinávit, hos et vocávit: et quos vocávit, hos et iustificávit: quos autem iustificávit, illos et glorificávit.
          31 Quid ergo dicémus ad hæc? Si Deus pro nobis, quis contra nos?
          32 Qui étiam próprio Fílio suo non pepércit, sed pro nobis ómnibus trádidit illum, quómodo non étiam cum illo ómnia nobis donávit?
          33 Quis accusábit advérsus eléctos Dei? Deus qui iustíficat,
          34 quis est qui condémnet? Christus Iesus, qui mórtuus est, immo qui et resurréxit, qui est ad déxteram Dei, qui étiam interpéllat pro nobis.
      en2:
      - type: citation
        text: Rom 8:28-34
      - type: text
        text: |-
          28 And we know that, for those who love God, all things work together unto good, for those who, in accordance with his purpose, are called to be saints.
          29 For those whom he foreknew, he also predestinated, in conformity with the image of his Son, so that he might be the Firstborn among many brothers.
          30 And those whom he predestinated, he also called. And those whom he called, he also justified. And those whom he justified, he also glorified.
          31 So, what should we say about these things? If God is for us, who is against us?
          32 He who did not spare even his own Son, but handed him over for the sake of us all, how could he not also, with him, have given us all things?
          33 Who will make an accusation against the elect of God? God is the One who justifies;
          34 who is the one who condemns? Christ Jesus who has died, and who has indeed also risen again, is at the right hand of God, and even now he intercedes for us.
  reading.rom-8-28-34-68de67dc33:
