  responsory.sp-cie-tua-et-pulchrit-dine-tua-a90d456c23:
    role: responsory
    content:
      en:
      - type: response
        text: In thy comeliness and thy beauty;
      - type: text
        text: '* Go forward, fare prosperously, and reign.'
      - type: versicle
        text: Grace is poured into thy lips, therefore God hath blessed thee for ever.
      - type: response
        text: Go forward, fare prosperously, and reign.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Go forward, fare prosperously, and reign.
      la:
      - type: response
        text: Spécie tua et pulchritúdine tua
      - type: text
        text: '* Inténde, próspere procéde, et regna.'
      - type: versicle
        text: Diffúsa est grátia in lábiis tuis, proptérea benedíxit te Deus in ætérnum.
      - type: response
        text: Inténde, próspere procéde, et regna.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Inténde, próspere procéde, et regna.
  responsory.st-tuet-f-lios-suos-sub-t-gmine-ill-us-et-sub-ra-c99a0c1b16:
    role: responsory
    content:
      en:
      - type: response
        text: He shall set his children under her shelter, and shall lodge under her branches by her shall he be covered from heat,
      - type: text
        text: '* And in her glory shall he dwell. Alleluia.'
      - type: versicle
        text: Trust in Him, ye congregation of the people, pour out your heart before Him.
      - type: response
        text: And in her glory shall he dwell. Alleluia.
      la:
      - type: response
        text: 'Státuet fílios suos sub tégmine illíus, et sub ramis eius morábitur: protegétur sub tégmine illíus a fervóre:'
      - type: text
        text: '* Et in glória eius requiéscet, allelúia.'
      - type: versicle
        text: Speráte in eo, omnis congregátio pópuli, effúndite coram illo corda vestra.
      - type: response
        text: Et in glória eius requiéscet, allelúia.
  responsory.stola-iucundit-tis-nduit-eum-d-minus-35c7dbe61d:
    role: responsory
    content:
      en:
      - type: response
        text: The Lord hath put on him a robe of honour,
      - type: text
        text: '* And put about his head a crown of joy.'
      - type: versicle
        text: With the bread of life and understanding hath the Lord fed him, and given him the water of health and wisdom to drink.
      - type: response
        text: And put about his head a crown of joy.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: And put about his head a crown of joy.
      la:
      - type: response
        text: 'Stola iucunditátis índuit eum Dóminus:'
      - type: text
        text: '* Et corónam pulchritúdinis pósuit super caput eius.'
      - type: versicle
        text: 'Cibávit illum Dóminus pane vitæ et intelléctus: et aqua sapiéntiæ salutáris potávit illum.'
      - type: response
        text: Et corónam pulchritúdinis pósuit super caput eius.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et corónam pulchritúdinis pósuit super caput eius.
  responsory.stola-iucundit-tis-nduit-eum-d-minus-fb8fd3df28:
    role: responsory
    content:
      la:
      - type: response
