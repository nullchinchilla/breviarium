  responsory.sancti-mei-qui-in-carne-p-siti-cert-men-habu-sti-0b9583e292:
    role: responsory
    content:
      en:
      - type: response
        text: O ye My Saints, who, being in the flesh, didst have striving
      - type: text
        text: I will render unto you a reward of your labours.
      - type: versicle
        text: Come, ye blessed of My Father, inherit the kingdom
      - type: response
        text: I will render unto you a reward of your labours.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: I will render unto you a reward of your labours.
      la:
      - type: response
        text: 'Sancti mei, qui in carne pósiti, certámen habuístis:'
      - type: text
        text: Mercédem labóris ego reddam vobis.
      - type: versicle
        text: Veníte benedícti Patris mei, percípite regnum.
      - type: response
        text: Mercédem labóris ego reddam vobis.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Mercédem labóris ego reddam vobis.
      en2:
      - type: response
        text: 'My holy ones, who while set in the flesh endured the struggle:'
      - type: text
        text: I myself will render you the reward of your labor.
      - type: versicle
        text: Come, blessed of my Father, receive the kingdom.
      - type: response
        text: I myself will render you the reward of your labor.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: I myself will render you the reward of your labor.
  responsory.sancti-mei-qui-in-carne-p-siti-cert-men-habu-sti-29409d6b83:
