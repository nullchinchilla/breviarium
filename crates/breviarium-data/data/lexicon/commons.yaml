  reading.non-est-d-bium-quin-bonus-et-fidelis-homo-fiieri-d65512b14a:
    role: reading
    content:
      la:
      - type: text
        text: 'Non est dúbium, quin bonus et fidelis homo fiierit iste Ioseph, cui Mater desponsata est Salvatoris. Fidelis, inquam, servus et prudens, quem constituit Dominus suae Matris solatium, suae carnis nutritium, solum denique in terris magni consilii coadiutorem fidelissimum. Huc accedit, quod dicitur fuisse de domo David. Vere enim de domo David. Vere de regia stirpe descendit vir iste Ioseph, nobilis genere, mente nobilior. Plane filius David, non degenerans a patre suo David; prorsus, inquam, filius David, non tantum carne, sed fide, sed sanctitate, sed devotione, quem tamquam alterum David Dominus invenit seciindum cor suum, cui tuto comitteret sacratissimum atque secretissimum sui cordis arcanum: cui, tamquam alteri David, incerta et occúlta sapientiae suae manifestavit, et dedit illi non ignarum esse mysterii, quod nemo principum huius sseculi agnovit.'
      en2:
      - type: text
        text: There is no doubt that this Joseph was a good and faithful man — Joseph, to whom the Mother of the Savior was betrothed. Faithful, I say, and prudent is this servant, whom the Lord set as the consolation of his Mother, the foster-father of his flesh, and, finally, the sole most faithful co-worker on earth of the great counsel. To this is added that he is said to have been of the house of David. For truly of the house of David, truly of royal stock this man Joseph descended — noble by birth, nobler in mind. Truly a son of David, not degenerating from his father David; utterly, I say, a son of David, not only in flesh, but in faith, in holiness, in devotion — one whom the Lord found, like another David, according to his own heart; to whom he might safely entrust the most sacred and most secret mystery of his heart; to whom, as to another David, he revealed the hidden and secret things of his wisdom, and gave him not to be ignorant of the mystery that none of the princes of this age has known.
