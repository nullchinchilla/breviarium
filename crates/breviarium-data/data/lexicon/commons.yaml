  reading.pr-c-pta-ergo-dom-nica-et-multa-sunt-et-unum-mul-a7fdcd6ff5:
    role: reading
    content:
      en:
      - type: text
        text: Therefore the commandments of the Lord are manifold, and yet one. Manifold, indeed, by the diversity of working, but one, as concerning the root of love. And how it behoveth us to keep fast hold on that root of love, we know from Him, Who in sundry places of His holy Scripture, moveth us to love our friends in Him, and our enemies for Him. He truly abideth in love, who loveth his friend in God, and his enemy for God. For there are some who love their neighbour indeed, but by an affection engendered of kinship and of the flesh such love the Scripture forbiddeth not but it is one thing to love our neighbour with that love whereto nature doth freely move us, and another thing to love him with that love whereto we are obliged, if we would do whatsoever the Lord commandeth us.
      la:
      - type: text
        text: 'Præcépta ergo Domínica et multa sunt, et unum: multa per diversitátem óperis, unum in radíce dilectiónis. Quáliter autem ista diléctio tenénda sit, ipse insínuat, qui in plerísque Scriptúræ suæ senténtiis, et amícos iubet díligi in se, et inimícos propter se. Ille enim veráciter caritátem habet, qui et amícum díligit in Deo, et inimícum díligit propter Deum. Nam sunt nonnúlli, qui díligunt próximos, sed per afféctum cognatiónis et carnis: quibus tamen in hac dilectióne sacra elóquia non contradícunt. Sed áliud est quod sponte impénditur natúræ, áliud quod præcéptis Domínicis ex caritáte debétur obediéntiæ.'
      en2:
      - type: text
        text: 'The commandments of the Lord are therefore both many and one: many in the diversity of action, one in the root of love. In what manner, however, this love is to be kept, he himself makes clear, who in very many sentences of his Scripture commands that friends be loved in him, and enemies for his sake. For he truly has charity who loves a friend in God, and loves an enemy for God''s sake. For there are some who love their neighbors, but through an affection of kinship and of the flesh: against whom, in this love, the sacred writings do not argue. But it is one thing that is bestowed freely upon nature, another that is owed in obedience to the Lord''s commandments out of charity.'
