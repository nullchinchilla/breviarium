  psalmody.asc-ndit-ioseph-a-galil-a-de-civit-te-n-zareth-i-3abfaf7d6f:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: Joseph went up * from Galilee, out of the city of Nazareth, into Judea, unto the city of David, which is called Bethlehem, to be enrolled with Mary.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: The shepherds came with haste, * and found Mary and Joseph, and the Babe lying in a manger.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: 'Behold, the Angel of the Lord * appeared to Joseph in a dream, saying: Arise, and take the young Child and His mother, and flee into Egypt.'
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: Joseph arose, * and took the young child and His mother by night, and departed into Egypt and was there until the death of Herod.
        psalms:
        - number: '4'
      - type: psalmody
        antiphon: 'When Herod was dead, * an Angel of the Lord appeareth in a dream to Joseph in Egypt, saying: Arise, and take the young Child and His mother, and go into the land of Israel; for they are dead which sought the young Child''s life.'
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: Joseph took * the young Child and His mother, and came into the land of Israel.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: When Joseph heard * that Archelaus did reign in Judea in the room of his father Herod, he was afraid to go thither.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: Joseph, being warned of God in a dream, * turned aside into the parts of Galilee; and he came and dwelt in a city called Nazareth, that it might be fulfilled which was spoken by the Prophets He shall be called a Nazarene.
        psalms:
        - number: '20'
      - type: psalmody
        antiphon: The father and mother of Jesus * marvelled at those things which were spoken of Him; and Simeon blessed them.
        psalms:
        - number: '23'
      la:
      - type: psalmody
        antiphon: Ascéndit Ioseph, * a Galilǽa de civitáte Názareth in Iudǽam, in civitátem David, quæ vocátur Béthlehem, ut profiterétur cum María.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: Venérunt pastóres * festinántes; et invenérunt Maríam, et Ioseph, et Infántem pósitum in præsépio.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: 'Ecce Angelus Dómini * appáruit in somnis Ioseph, dicens: Surge, et áccipe Púerum et Matrem eius, et fuge in Ægýptum.'
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: Consúrgens Ioseph, * accépit Púerum et Matrem eius nocte, et secéssit in Ægýptum; et erat ibi usque ad óbitum Heródis.
        psalms:
        - number: '4'
      - type: psalmody
        antiphon: 'Defúncto Heróde, * Angelus Dómini appáruit in somnis Ioseph in Ægýpto, dicens: Surge, et áccipe Púerum et Matrem eius, et vade in terram Israël; defúncti sunt enim qui quærébant ánimam Púeri.'
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: Accépit Ioseph * Púerum et Matrem eius, et venit in terram Israël.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Audiens Ioseph, * quod Archeláus regnáret in Iudǽa pro Heróde patre suo, tímuit illo ire.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: 'Admónitus in somnis, * Ioseph secéssit in partes Galilǽæ: et véniens habitávit in civitáte, quæ vocátur Názareth; ut adimplerétur quod dictum est per prophétas: Quóniam Nazarǽus vocábitur.'
        psalms:
        - number: '20'
      - type: psalmody
        antiphon: Erat Pater Iesu * et Mater mirántes super his, quæ dicebántur de illo; et benedíxit illis Símeon.
        psalms:
        - number: '23'
  psalmody.ass-mpta-est-mar-a-in-c-lum-gaudent-angeli-laud-b413309a59:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: 'Assúmpta est María in cælum: * gaudent Angeli, laudántes benedícunt Dóminum.'
      - type: antiphon
        text: María Virgo assúmpta est * ad æthéreum thálamum, in quo Rex regum stelláto sedet sólio.
      - type: antiphon
        text: 'In odórem * unguentórum tuórum cúrrimus: adolescéntulæ dilexérunt te nimis.'
      - type: antiphon
        text: 'Benedícta * fília tu a Dómino: quia per te fructum vitæ communicávimus.'
      - type: antiphon
        text: 'Pulchra es, * et decóra, fília Ierúsalem: terríbilis ut castrórum ácies ordináta.'
  psalmody.ass-mpta-est-mar-a-in-c-lum-gaudent-angeli-laud-daf6db1a31:
    role: psalmody
    content:
      en:
      - type: antiphon
        text: Mary hath been taken to heaven; * the Angels rejoice; they praise and bless the Lord.
      - type: antiphon
        text: The Virgin Mary hath been taken into the chamber on high, * where the King of kings sitteth on a throne amid the stars.
      - type: antiphon
        text: We run after thee, on the scent of thy perfumes * the virgins love thee heartily.
      - type: antiphon
        text: Blessed of the Lord art thou, O daughter, * for by thee we have been given to eat of the fruit of the tree of Life.
      - type: antiphon
        text: Fair and comely art thou, O daughter of Jerusalem, * terrible as a fenced camp set in battle array.
      la:
      - type: antiphon
        text: 'Assúmpta est María in cælum: * gaudent Angeli, laudántes benedícunt Dóminum.'
      - type: antiphon
        text: María Virgo assúmpta est * ad æthéreum thálamum, in quo Rex regum stelláto sedet sólio.
      - type: antiphon
        text: 'In odórem * unguentórum tuórum cúrrimus: adolescéntulæ dilexérunt te nimis.'
      - type: antiphon
        text: 'Benedícta * fília tu a Dómino: quia per te fructum vitæ communicávimus.'
      - type: antiphon
        text: 'Pulchra es, * et decóra, fília Ierúsalem: terríbilis ut castrórum ácies ordináta.'
  psalmody.astit-runt-reges-terr-et-pr-ncipes-conven-runt-i-88fd0860c1:
    role: psalmody
    content:
      la:
      - type: psalmody
        antiphon: Astitérunt reges terræ, * et príncipes convenérunt in unum, advérsus Dóminum, et advérsus Christum eius.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: Multiplicáti sunt qui tríbulant me; multi insúrgunt advérsum me.
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: Insurrexérunt in me * testes iníqui, et mentíta est iníquitas sibi.
        psalms:
        - number: '26'
      - type: psalmody
        antiphon: 'Inimíci mei dixérunt mala mihi: Quando moriétur, et períbit nomen eius?'
        psalms:
        - number: '40'
      - type: psalmody
        antiphon: Confundántur * et revereántur, qui quærunt ánimam meam, ut áuferant eam.
        psalms:
        - number: '39'
      - type: psalmody
        antiphon: Conculcavérunt me inimíci mei tota die; advérsum me omnes cogitatiónes eórum in malum.
        psalms:
        - number: '55'
      - type: psalmody
        antiphon: Fílii hóminum dentes eórum arma et sagíttæ, et lingua eórum gládius acútus.
        psalms:
        - number: '56'
      - type: psalmody
        antiphon: Intendérunt arcum rem amáram, ut sagíttent in occúltis immaculátum.
        psalms:
        - number: '63'
      - type: psalmody
        antiphon: Factus sum * sicut homo sine adiutório, inter mórtuos liber.
        psalms:
        - number: '87'
  psalmody.be-tus-vir-qui-in-lege-d-mini-medit-tur-vol-ntas-871056d2f9:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: Blessed is the man * that doth meditate in the law of the Lord; his delight is therein day and night, and whatsoever he doeth shall prosper.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: Blessed and holy is he * that putteth his trust in the Lord, that declareth the decree of the Lord, and is set upon His holy hill.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: Thou, O Lord, art my glory, * Thou art a shield for me; Thou art the Lifter-up of mine head, and Thou hast heard me out of thy holy hill.
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: When His holy one called, * the Lord heard him, yea, the Lord heard him, and gave him peace.
        psalms:
        - number: '4'
      - type: psalmody
        antiphon: Let all those that put their trust in thee rejoice, O Lord, for Thou hast blessed the righteous; * Thou hast compassed him with thy favour as with a shield.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: O Lord, our Ruler, * how excellent is thy Name in all the earth, Who hast crowned thine holy one with glory and honour, and made him to have dominion over the works of thy hands.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Lord, this thy Saint * shall dwell in thy tabernacle, and this that hath worked righteousness shall abide upon thy holy hill.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: He asked life of thee, * and Thou, O Lord, gavest it; honour and great majesty hast Thou laid upon him; Thou hast set a crown of precious stones upon his head.
        psalms:
        - number: '20'
      - type: psalmody
        antiphon: He shall receive * a blessing from the Lord, and mercy from the God of his salvation, for this is the generation of them that seek the Lord.
        psalms:
        - number: '23'
      la:
      - type: psalmody
        antiphon: 'Beátus vir, * qui in lege Dómini meditátur: volúntas eius pérmanet die ac nocte, et ómnia quæcúmque fáciet, semper prosperabúntur.'
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: Beátus iste Sanctus, * qui confísus est in Dómino, prædicávit præcéptum Dómini, constitútus est in monte sancto eius.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: Tu es glória mea, * tu es suscéptor meus, Dómine; tu exáltans caput meum, et exaudísti me de monte sancto tuo.
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: Invocántem * exaudívit Dóminus Sanctum suum; Dóminus exaudívit eum, et constítuit eum in pace.
        psalms:
        - number: '4'
      - type: psalmody
        antiphon: Læténtur omnes * qui sperant in te, Dómine; quóniam tu benedixísti iusto, scuto bonæ voluntátis tuæ coronásti eum.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: Dómine, Dóminus noster, * quam admirábile est nomen tuum in univérsa terra! quia glória et honóre coronásti Sanctum tuum, et constituísti eum super ópera mánuum tuárum.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Dómine, * iste Sanctus habitábit in tabernáculo tuo, operátus est iustítiam, requiéscet in monte sancto tuo.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: 'Vitam pétiit * a te, et tribuísti ei, Dómine: glóriam et magnum decórem imposuísti super eum; posuísti in cápite eius corónam de lápide pretióso.'
        psalms:
        - number: '20'
      - type: psalmody
        antiphon: 'Hic accípiet * benedictiónem a Dómino, et misericórdiam a Deo salutári suo: quia hæc est generátio quæréntium Dóminum.'
        psalms:
        - number: '23'
