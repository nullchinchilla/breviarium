      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et invéntus est in número Sanctórum.
  responsory.iste-cogn-vit-iust-tiam-et-vidit-mirab-lia-magna-77dd0ee552:
    role: responsory
    content:
      en:
      - type: response
        text: This is he which knew righteousness, and saw great wonders, and made his prayer unto the Most High;
      - type: text
        text: '* And he is numbered among the Saints.'
      - type: versicle
        text: This is he which loved not his life in this world, and is come unto an everlasting kingdom.
      - type: response
        text: And he is numbered among the Saints.
