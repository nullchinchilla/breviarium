      - type: versicle
        text: Iustum dedúxit Dóminus per vias rectas, et osténdit illi regnum Dei.
      - type: response
        text: Et dedit illi claritátem ætérnam.
  responsory.hon-stum-fecit-illum-d-minus-et-custod-vit-eum-a-cae7d2a6a0:
    role: responsory
    content:
      la:
      - type: response
        text: 'Honéstum fecit illum Dóminus, et custodívit eum ab inimícis, et a seductóribus tutávit illum:'
      - type: text
