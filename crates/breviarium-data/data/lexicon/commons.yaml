        text: Descendítque cum illo in fóveam, et in vínculis non derelíquit eum.
      - type: response
        text: Et dedit illi claritátem ætérnam.
  responsory.hon-stum-fecit-illum-d-minus-et-custod-vit-eum-a-be9af621a1:
