      - type: text
        text: 'Beáti N. dies, cuius festivitátem celebrámus, ad ipsíus recte factórum enarrationem línguam nostram evocavit. Síquidem hódie beátus iste ad tranquillam, omnísque perturbationis expertem vitam tránsiit: eóque navigium áppulit, ubi deínceps non póterit metuere naufragium, nec ullam ánimi perturbationem, aut dolórem. Et quid mirum est, si locus ille purus est ab omni molestia ánimi, cum Paulus homínibus adhuc in hac vita degentibus loquens dicat: Semper gaudéte, sine intermissióne orate?'
      en2:
      - type: text
        text: Sermon of Saint John Chrysostom
      - type: citation
        text: In Orat. de S. Philogonio
      - type: text
        text: 'The day of blessed N., whose feast we celebrate, has summoned our tongue to the recounting of his righteous deeds. For today this blessed one passed to a tranquil life, free from all disturbance: and he has brought his vessel to port where henceforth he will have no fear of shipwreck, nor any disturbance of soul, nor sorrow. And what wonder is it, if that place is free from all affliction of soul, when Paul, speaking to men still living this present life, says: Rejoice always, pray without ceasing?'
  reading.sermo-sancti-max-mi-ep-scopi-113892bef3:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St Maximus, Bishop [of Turin.]
      - type: citation
        text: Homilia 59, being the 2nd on St Eusebius of Vercelli.
      - type: text
        text: It is idle to strive to add anything to the praise of our holy and most blessed Father N. whose Feast is this day kept. The beauty of his life oughtnot to be the subject of panegyrics, so much as the object of imitation. The Scripture saith “A wise son is the glory of his father,” truly then will he be honoured by such as, by doing after his en sample, show themselves to be his children for in Christ Jesus hath he begotten us through the Gospel.(1 Cor. iv. 15.)
      la:
      - type: text
        text: Sermo sancti Maxími Epíscopi
      - type: citation
        text: Homilia 78, quæ est 2 de S. Eusebio Vercellensi
      - type: text
        text: 'Ad sancti ac beatíssimi Patris nostri N., cuius hódie festa celebrámus, laudes addidísse áliquid, decerpsísse est; síquidem virtútem eius grátia, non sermónibus exponénda est, sed opéribus comprobánda. Cum enim dicat Scriptúra: Glória patris est fílius sápiens; quantæ huius sunt glóriæ, qui tantórum filiórum sapiéntia et devotióne lætátur? In Christo enim Iesu per Evangélium ipse nos génuit.'
      en2:
      - type: text
        text: Sermo sancti Maxími Epíscopi
      - type: citation
        text: Homilia 78, quæ est 2 de S. Eusebio Vercellensi
      - type: text
        text: 'To the praises of our holy and most blessed Father N., whose feast we celebrate today, to have added anything is to have diminished them; for his virtue must be set forth not by words, but proved by works of grace. For since Scripture says: The glory of a father is a wise son; how great is the glory of him who rejoices in the wisdom and devotion of so many sons? For in Christ Jesus, through the Gospel, he himself begot us.'
  reading.sermo-sancti-max-mi-ep-scopi-96f3eb4e49:
    role: reading
    content:
      la:
      - type: text
        text: Sermo sancti Maxími Epíscopi
      - type: citation
        text: Homilia 78, quæ est 2 de S. Eusebio Vercellensi
      - type: text
        text: 'Ad sancti ac beatíssimi Patris nostri N., cuius hódie festa celebrámus, laudes addidísse áliquid, decerpsísse est; síquidem virtútem eius grátia, non sermónibus exponénda est, sed opéribus comprobánda. Cum enim dicat Scriptúra: Glória patris est fílius sápiens; quantæ huius sunt glóriæ, qui tantórum filiórum sapiéntia et devotióne lætátur? In Christo enim Iesu per Evangélium ipse nos génuit.'
      en2:
      - type: text
