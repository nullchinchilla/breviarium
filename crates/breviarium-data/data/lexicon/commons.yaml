        text: O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: 'Cum ergo cohortatiónes nostras áuribus vestræ sanctitátis adhibémus, ipsum vobis, cuius vice fúngimur, loqui crédite: quia et illíus vos afféctu monémus, et non áliud vobis, quam quod dócuit, prædicámus; obsecrántes, ut succíncti lumbos mentis vestræ, castam et sóbriam vitam in Dei timóre ducátis. Coróna mea, sicut Apóstolus ait, et gáudium vos estis, si fides vestra, quæ ab inítio Evangélii in univérso mundo prædicáta est, in dilectióne et sanctitáte permánserit. Nam licet omnem Ecclésiam, quæ in toto est orbe terrárum, cunctis opórteat florére virtútibus; vos tamen præcípue inter céteros pópulos decet méritis pietátis excéllere, quos in ipsa apostólicæ petræ arce fundátos, et Dóminus noster Iesus Christus cum ómnibus redémit, et beátus Apóstolus Petrus præ ómnibus erudívit.'
