      - type: versicle
        text: In your comeliness and your beauty; attend, go forth prosperously, and reign.
      - type: response
        text: They shall be brought to you with joy and gladness.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
