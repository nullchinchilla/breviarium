  hymn.exs-ltet-orbis-g-udiis-3d5c7da003:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Exsúltet orbis gáudiis:
          Cælum resúltet láudibus:
          Apostolórum glóriam
          Tellus et astra cóncinunt.

          Vos sæculórum iúdices,
          Et vera mundi lúmina:
          Votis precámur córdium,
          Audíte voces súpplicum.

          Qui templa cæli cláuditis,
          Serásque verbo sólvitis,
          Nos a reátu nóxios
          Solvi iubéte, quǽsumus.

          Præcépta quorum prótinus
          Languor salúsque séntiunt:
          Sanáte mentes lánguidas:
          Augéte nos virtútibus.

          Ut, cum redíbit árbiter
          In fine Christus sǽculi,
          Nos sempitérni gáudii
          Concédat esse cómpotes.

          Patri, simúlque Fílio,
          Tibíque Sancte Spíritus,
          Sicut fuit, sit iúgiter
          Sæclum per omne glória.
          Amen.
      en2:
      - type: text
        text: |-
          Let the world exult with joy;
          let heaven resound with praises;
          the earth and stars sing together
          the glory of the Apostles.
      
          You, judges of the ages
          and true lights of the world:
          we pray with the vows of our hearts,
          hear the voices of suppliants.
      
          You who shut the gates of heaven
          and open locks with a word,
          bid us, who are guilty of offense,
          to be loosed, we pray.
      
          At whose commands sickness and health
          at once take effect:
          heal our ailing minds;
          grant us increase in virtues.
      
          That when Christ the Judge
          returns at the end of the age,
          he may grant us to be partakers
          of everlasting joy.
      
          To the Father, and likewise to the Son,
          and to you, Holy Spirit,
          as it was, so let it ever be
          through all the ages, glory.
          Amen.
  hymn.exs-ltet-orbis-g-udiis-73a9727489:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Now let the earth with joy resound,
          And heaven the chant re-echo round;
          Nor heaven nor earth too high can raise
          The great Apostles' glorious praise.

          O ye who, throned in glory dread,
          Shall judge the living and the dead,
          Lights of the world forevermore!
          To you the suppliant prayer we pour.

          Ye close the sacred gates on high;
          At your command apart they fly:
          Oh! loose for us the guilty chain
          We strive to break, and strive in vain.

          Sickness and health your voice obey;
          At your command they go or stay:
          From sin's disease our souls restore;
          In good confirm us more and more.

          So when the world is at its end,
          And Christ to judgement shall descend,
          May we be called those joys to see
          Prepared from all eternity.

          Praise to the Father, with the Son,
          And Holy Spirit, Three in One;
          As ever was in ages past,
          And so shall be while ages last.
          Amen.
      la:
      - type: text
        text: |-
