  hymn.s-vo-dol-rum-turbine-4ac1bdc142:
    role: hymn
    content:
      la:
      - type: text
        text: Sævo dolórum turbine
      - type: text
        text: Iactatur, atris óbrutus
      - type: text
        text: Pœnis, acerba sustinens,
      - type: text
        text: Redémptor affixus Cruci.
      - type: text
        text: Pedes manúsque horribili
      - type: text
        text: Clavi cruentant vúlnere;
      - type: text
        text: Cor, vultus, artus, pectora
      - type: text
        text: Sacro redundant sánguine.
      - type: text
        text: Flet, orat, et clamans obit;
      - type: text
        text: Cor Matris ictum concídit;
      - type: text
        text: Heu Mater! Heu Fili! dolor
      - type: text
        text: Ingrata frangat pectora.
      - type: text
        text: Montes, sepúlcra, saxaque
      - type: text
        text: Scinduntur; arva, flúmina,
      - type: text
        text: Rupes, et æquor contremunt,
      - type: text
        text: Templique velum scinditur.
      - type: text
        text: Sol, luna, cælum, sidera
      - type: text
        text: Plangunt, et Orbis ingemit.
      - type: text
        text: O vos viri, vos párvuli,
      - type: text
        text: Nuptæ, puéllæ, plangite,
      - type: text
        text: Adstate mœrentes Cruci,
      - type: text
        text: Pedes beátos ungite,
      - type: text
        text: Lavate fletu, tergite
      - type: text
        text: Comis, et ore lambite.
      - type: text
        text: Tu, caritátis victima,
      - type: text
        text: Ut nostra tollas crímina,
      - type: text
        text: Nobis salubri perficis
      - type: text
        text: Adoptiónem Sánguine.
      - type: text
        text: Nostra ergo pax et gáudium,
      - type: text
        text: Sis vita, Iesu, et prǽmium,
      - type: text
        text: Sis ductor et lux in via,
      - type: text
        text: Merces, coróna in Pátria.
      - type: text
        text: Amen.
  hymn.sanct-rum-m-ritis-nclita-g-udia-e5a1690b10:
    role: hymn
    content:
      la:
      - type: text
        text: Sanctórum méritis ínclita gáudia
      - type: text
        text: 'Pangámus, sócii, géstaque fórtia:'
      - type: text
        text: Gliscens fert ánimus prómere cántibus
      - type: text
        text: Victórum genus óptimum.
      - type: text
        text: Hi sunt, quos fátue mundus abhórruit;
      - type: text
        text: Hunc fructu vácuum, flóribus áridum
      - type: text
        text: Contempsére tui nóminis ásseclæ
      - type: text
        text: Iesu, Rex bone cǽlitum.
      - type: text
        text: Hi pro te fúrias, atque minas truces
      - type: text
        text: 'Calcárunt hóminum, sǽvaque vérbera:'
      - type: text
        text: His cessit lácerans fórtiter úngula,
      - type: text
        text: Nec carpsit penetrália.
      - type: text
        text: 'Cædúntur gládiis more bidéntium:'
      - type: text
        text: Non murmur résonat, non quærimónia;
      - type: text
        text: Sed corde impávido mens bene cónscia
      - type: text
        text: Consérvat patiéntiam.
      - type: text
        text: Quæ vox, quæ póterit lingua retéxere,
      - type: text
        text: Quæ tu Martýribus múnera prǽparas?
      - type: text
        text: Rubri nam flúido sánguine fúlgidis
      - type: text
        text: Cingunt témpora láureis.
      - type: text
        text: Te, summa o Déitas, únaque póscimus;
      - type: text
        text: Ut culpas ábigas, nóxia súbtrahas,
      - type: text
        text: Des pacem fámulis; ut tibi glóriam,
      - type: text
        text: Annórum in sériem, canant.
      - type: text
        text: Amen.
