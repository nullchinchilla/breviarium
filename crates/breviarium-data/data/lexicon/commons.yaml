  chapter.eph-2-19-20-58436a4ab3:
    role: chapter
    content:
      en:
      - type: citation
        text: Eph 2:19-20
      - type: text
        text: 'Brothers: Now therefore you are no more strangers and foreigners; but you are fellow citizens with the saints, and the domestics of God, built upon the foundation of the apostles and prophets, Jesus Christ himself being the chief corner stone.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Eph 2:19-20
      - type: text
        text: 'Fratres: Iam non estis hóspites et ádvenæ: sed estis cives Sanctórum et doméstici Dei: superædificáti super fundaméntum Apostolórum, et Prophetárum, ipso summo angulári lápide Christo Iesu.'
      - type: response
        text: Deo grátias.
  chapter.iac-1-12-000c025425:
    role: chapter
    content:
      en:
      - type: citation
        text: Jas 1:12
      - type: text
        text: Blessed is the man that endureth temptation; for when he hath been proved, he shall receive a crown of life, which God hath promised to them that love him.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Iac 1:12
      - type: text
        text: 'Beátus vir, qui suffert tentatiónem: quóniam cum probátus fúerit, accípiet corónam vitæ, quam repromísit Deus diligéntibus se.'
      - type: response
        text: Deo grátias.
  chapter.iac-1-12-319fd7a95a:
    role: chapter
    content:
