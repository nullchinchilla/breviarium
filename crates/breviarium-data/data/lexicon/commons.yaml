  reading.sed-dicit-liquis-et-quis-est-qui-possit-beat-rum-0b70e37c01:
    role: reading
    content:
      la:
      - type: text
        text: 'Sed dicit áliquis: Et quis est qui possit beatórum Mártyrum vestígia sequi? Huic ego respóndeo, quia non solum Mártyres, sed étiam ipsum Dóminum cum ipsíus adiutório, si vólumus, póssumus imitári. Audi non me, sed ipsum Dóminum géneri humáno clamántem: Díscite a me, quia mitis sum et húmilis corde. Audi et Petrum Apóstolum admonéntem: Christus passus est pro nobis, relínquens nobis exémplum ut sequámur vestígia eius.'
      en2:
      - type: text
        text: 'But someone may say: And who is there who can follow in the footsteps of the blessed Martyrs? To this I reply, that not only the Martyrs, but even the Lord himself, we can imitate with his help, if we wish. Hear not me, but the Lord himself calling out to the human race: Learn from me, for I am meek and humble of heart. Hear also the Apostle Peter admonishing: Christ suffered for us, leaving us an example, that we might follow in his footsteps.'
  reading.sed-dicit-liquis-et-quis-est-qui-possit-beat-rum-e610688999:
    role: reading
    content:
      en:
      - type: text
        text: 'But some man will say: And who is he that can tread in the footsteps of the blessed Martyrs? To such an one I answer that, by the Lord''s help, we are able, if we so will, to tread in the footsteps, not of the blessed Martyrs only, but even of the same Lord Himself. Hearken, not to me, but to the same Lord, Who crieth unto all men: “Learn of Me, for I am meek and lowly in heart.” (Matth. xi. 29.) Hear also with what words the Apostle Peter warneth us: “Christ suffered for us, leaving us an example, that we should follow His steps.” (1 Pet. ii. 21.)'
      la:
      - type: text
        text: 'Sed dicit áliquis: Et quis est qui possit beatórum Mártyrum vestígia sequi? Huic ego respóndeo, quia non solum Mártyres, sed étiam ipsum Dóminum cum ipsíus adiutório, si vólumus, póssumus imitári. Audi non me, sed ipsum Dóminum géneri humáno clamántem: Díscite a me, quia mitis sum et húmilis corde. Audi et Petrum Apóstolum admonéntem: Christus passus est pro nobis, relínquens nobis exémplum ut sequámur vestígia eius.'
      en2:
      - type: text
        text: 'But someone may say: And who is there who can follow in the footsteps of the blessed Martyrs? To this I reply, that not only the Martyrs, but even the Lord himself, we can imitate with his help, if we wish. Hear not me, but the Lord himself calling out to the human race: Learn from me, for I am meek and humble of heart. Hear also the Apostle Peter admonishing: Christ suffered for us, leaving us an example, that we might follow in his footsteps.'
  reading.sed-habit-culum-cordis-nostri-evacu-tur-v-tiis-e-5bb72a64fe:
    role: reading
    content:
      en:
      - type: text
        text: Let the Tabernacle of our heart be swept clean of vices and filled with virtues. Let it be locked to the devil, and thrown open to Christ. Yea, let us so work, that we may be able to open the door of the kingdom of heaven with the key of good works. For even as evil works are so many bolts and bars to close against us the entrance into life, so beyond doubt are good works the key thereto. And therefore, dearly beloved brethren, let each one look into his own conscience, and when he findeth the wounds of guilt there, let him first strive by prayers, fasting, or alms deeds to purge his conscience, and so let him dare to take the Eucharist.
      la:
      - type: text
        text: Sed habitáculum cordis nostri evacuétur vítiis, et virtútibus repleátur; claudátur diábolo, et aperiátur Christo. Et ita labóremus, ut nobis bonórum óperum clávibus iánuam regni cæléstis aperíre possímus. Sicut enim malis opéribus, quasi quibúsdam seris ac véctibus, vitæ nobis ianua claudítur; ita, absque dubio, bonis opéribus aperítur. Et ídeo, fratres caríssimi, unusquísque consíderet consciéntiam suam, et, quando se áliquo crímine vulnerátum esse cognóverit, prius oratiónibus, ieiúniis vel eleemósynis stúdeat mundáre consciéntiam suam; et sic Eucharístiam præsúmat accípere.
      en2:
      - type: text
        text: But let the dwelling of our heart be emptied of vices and filled with virtues; let it be shut to the devil, and opened to Christ. And let us so labor that we may be able to open to ourselves the gate of the heavenly kingdom with the keys of good works. For just as by evil deeds, as by certain bolts and bars, the gate of life is shut to us; so, without doubt, it is opened by good deeds. And therefore, dearest brethren, let each one examine his conscience, and, when he has recognized himself to be wounded by some sin, let him first strive to cleanse his conscience through prayers, fasts, and almsgiving; and so let him presume to receive the Eucharist.
  reading.sed-his-malis-pr-veni-ntibus-quia-non-statim-fin-57b28d5067:
    role: reading
    content:
      en:
      - type: text
        text: 'When these woes come, the end is not by and by. And He saith further Nation shall rise against nation, and kingdom against kingdom; and great earthquakes shall be in diverse places, and pestilences, and famines, and fearful sights and great signs shall there be from heaven. Before the last tribulation cometh, shall come many other tribulations: and, by the many woes which shall come first, shall be foreshadowed the everlasting woe which shall come in the end. And therefore, after wars and commotions, the end is not yet by and by many woes must come first, to give warning of the woe that hath no end.'
      la:
      - type: text
        text: 'Sed his malis præveniéntibus, quia non statim finis sequátur, adiúngit: Surget gens contra gentem, et regnum advérsus regnum: et terræmótus magni erunt per loca, et pestiléntiæ, et fames, terrorésque de cælo: et signa magna erunt. Última tribulátio multis tribulatiónibus prævenítur: et per crebra mala, quæ prævéniunt, indicántur mala perpétua, quæ subsequéntur. Et ídeo post bella et seditiónes non statim finis: quia multa debent mala præcúrrere, ut malum váleant sine fine nuntiáre.'
      en2:
      - type: text
        text: 'But following these preceding evils, since the end does not immediately follow, he adds: Nation will rise against nation, and kingdom against kingdom; and there will be great earthquakes in various places, and pestilences, and famine, and terrors from the sky: and there will be great signs. The final tribulation is preceded by many tribulations; and by the frequent evils that come before, the perpetual evils that will follow are foretold. And therefore, after wars and upheavals, the end does not come at once: because many evils must run ahead, so that they may be able to announce without end the evil to come.'
