  responsory.iste-homo-perf-cit-mnia-qu-loc-tus-est-ei-deus-e-65ef034708:
    role: responsory
    content:
      la:
      - type: response
        text: 'Iste homo perfécit ómnia quæ locútus est ei Deus, et dixit ad eum: Ingrédere in réquiem meam:'
      - type: text
        text: '* Quia te vidi iustum coram me ex ómnibus géntibus.'
      - type: versicle
        text: Iste est, qui contémpsit vitam mundi, et pervénit ad cæléstia regna.
      - type: response
        text: Quia te vidi iustum coram me ex ómnibus géntibus.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quia te vidi iustum coram me ex ómnibus géntibus.
  responsory.iste-homo-perf-cit-mnia-qu-loc-tus-est-ei-deus-e-d3cabb89e6:
    role: responsory
    content:
      en:
      - type: response
        text: 'This is he which did according unto all that God commanded him; and God said unto him: Enter thou into My rest,'
      - type: text
        text: '* For thee have I seen righteous before Me among all people.'
      - type: versicle
        text: This is he which loved not his life in this world, and is come unto an everlasting kingdom.
      - type: response
        text: For thee have I seen righteous before Me among all people.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: For thee have I seen righteous before Me among all people.
