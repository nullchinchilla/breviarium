  reading.1-cor-4-10-15-ed402db679:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 4:10-15
      - type: text
        text: |-
          10 We are fools for Christ's sake, but you are wise in Christ; we are weak, but you are strong; you are honourable, but we without honour.
          11 Even unto this hour we both hunger and thirst, and are naked, and are buffeted, and have no fixed abode;
          12 And we labour, working with our own hands: we are reviled, and we bless; we are persecuted, and we suffer it.
          13 We are blasphemed, and we entreat; we are made as the refuse of this world, the offscouring of all even until now.
          14 I write not these things to confound you; but I admonish you as my dearest children.
          15 For if you have ten thousand instructors in Christ, yet not many fathers. For in Christ Jesus, by the gospel, I have begotten you.
      la:
      - type: citation
        text: 1 Cor 4:10-15
      - type: text
        text: |-
          10 Nos stulti propter Christum, vos autem prudéntes in Christo: nos infírmi, vos autem fortes: vos nóbiles, nos autem ignóbiles.
          11 Usque in hanc horam et esurímus, et sitímus, et nudi sumus, et cólaphis cǽdimur, et instábiles sumus,
          12 et laborámus operántes mánibus nostris: maledícimur, et benedícimus: persecutiónem pátimur, et sustinémus:
          13 blasphemámur, et obsecrámus: tamquam purgaménta huius mundi facti sumus, ómnium peripséma usque adhuc.
          14 Non ut confúndam vos, hæc scribo, sed ut fílios meos caríssimos móneo.
          15 Nam si decem míllia pædagogórum habeátis in Christo, sed non multos patres, nam in Christo Iesu per Evangélium ego vos génui.
      en2:
      - type: citation
        text: 1 Cor 4:10-15
      - type: text
        text: |-
          10 So we are fools because of Christ, but you are discerning in Christ? We are weak, but you are strong? You are noble, but we are ignoble?
          11 Even to this very hour, we hunger and thirst, and we are naked and repeatedly beaten, and we are unsteady.
          12 And we labor, working with our own hands. We are slandered, and so we bless. We suffer and endure persecution.
          13 We are cursed, and so we pray. We have become like the refuse of this world, like the residue of everything, even until now.
          14 I am not writing these things in order to confound you, but in order to admonish you, as my dearest sons.
          15 For you might have ten thousand instructors in Christ, but not so many fathers. For in Christ Jesus, through the Gospel, I have begotten you.
  reading.1-cor-4-6-9-11450fe186:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 4:6-9
      - type: text
        text: |-
          6 But these things, brethren, I have in a figure transferred to myself and to Apollo, for your sakes; that in us you may learn, that one be not puffed up against the other for another, above that which is written.
          7 For who distinguisheth thee? Or what hast thou that thou hast not received? And if thou hast received, why dost thou glory, as if thou hadst not received it?
          8 You are now full; you are now become rich; you reign without us; and I would to God you did reign, that we also might reign with you.
          9 For I think that God hath set forth us apostles, the last, as it were men appointed to death: we are made a spectacle to the world, and to angels, and to men.
      la:
      - type: citation
        text: 1 Cor 4:6-9
      - type: text
        text: |-
          6 Hæc autem, fratres, transfigurávi in me et Apóllo, propter vos: ut in nobis discátis, ne supra quam scriptum est, unus advérsus álterum inflétur pro álio.
          7 Quis enim te discérnit? Quid autem habes quod non accepísti? Si autem accepísti, quid gloriáris quasi non accéperis?
          8 Iam saturáti estis, iam dívites facti estis: sine nobis regnátis: et útinam regnétis, ut et nos vobíscum regnémus.
          9 Puto enim quod Deus nos Apóstolos novíssimos osténdit, tamquam morti destinátos: quia spectáculum facti sumus mundo, et Ángelis, et homínibus.
      en2:
      - type: citation
        text: 1 Cor 4:6-9
      - type: text
        text: |-
          6 And so, brothers, I have presented these things in myself and in Apollo, for your sakes, so that you may learn, through us, that no one should be inflated against one person and for another, not beyond what has been written.
          7 For what distinguishes you from another? And what do you have that you have not received? But if you have received it, why do you glory, as if you had not received it?
          8 So, now you have been filled, and now you have been made wealthy, as if to reign without us? But I wish that you would reign, so that we, too, might reign with you!
          9 For I think that God has presented us as the last Apostles, as those destined for death. For we have been made into a spectacle for the world, and for Angels, and for men.
  reading.1-cor-7-32-35-2178082e71:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 7:32-35
      - type: text
        text: |-
          32 But I would have you to be without solicitude. He that is without a wife, is solicitous for the things that belong to the Lord, how he may please God.
          33 But he that is with a wife, is solicitous for the things of the world, how he may please his wife: and he is divided.
          34 And the unmarried woman and the virgin thinketh on the things of the Lord, that she may be holy both in body and in spirit. But she that is married thinketh on the things of the world, how she may please her husband.
          35 And this I speak for your profit: not to cast a snare upon you; but for that which is decent, and which may give you power to attend upon the Lord, without impediment.
      la:
      - type: citation
        text: 1 Cor 7:32-35
      - type: text
        text: |-
          32 Volo autem vos sine sollicitúdine esse. Qui sine uxóre est, sollícitus est quæ Dómini sunt, quómodo pláceat Deo.
          33 Qui autem cum uxóre est, sollícitus est quæ sunt mundi, quómodo pláceat uxóri; et divísus est.
          34 Et múlier innúpta et virgo cógitat quæ Dómini sunt, ut sit sancta córpore et spíritu. Quæ autem nupta est, cógitat quæ sunt mundi, quómodo pláceat viro.
          35 Porro hoc ad utilitátem vestram dico, non ut láqueum vobis iníciam, sed ad id, quod honéstum est, et quod facultátem prǽbeat sine impediménto Dóminum obsecrándi.
      en2:
      - type: citation
        text: 1 Cor 7:32-35
      - type: text
        text: |-
          32 But I would prefer you to be without worry. Whoever is without a wife is worried about the things of the Lord, as to how he may please God.
          33 But whoever is with a wife is worried about the things of the world, as to how he may please his wife. And so, he is divided.
          34 And the unmarried woman and the virgin think about the things that are of the Lord, so that she may be holy in body and in spirit. But she who is married thinks about the things that are of the world, as to how she may please her husband.
          35 Furthermore, I am saying this for your own benefit, not in order to cast a snare over you, but toward whatever is honest and whatever may provide you with the ability to be without hindrance, so as to worship the Lord.
  reading.1-cor-7-36-40-9daa799bfb:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 7:36-40
      - type: text
        text: |-
          36 But if any man think that he seemeth dishonoured, with regard to his virgin, for that she is above the age, and it must so be: let him do what he will; he sinneth not, if she marry.
          37 For he that hath determined being steadfast in his heart, having no necessity, but having power of his own will; and hath judged this in his heart, to keep his virgin, doth well.
          38 Therefore, both he that giveth his virgin in marriage, doth well; and he that giveth her not, doth better.
          39 A woman is bound by the law as long as her husband liveth; but if her husband die, she is at liberty: let her marry to whom she will; only in the Lord.
          40 But more blessed shall she be, if she so remain, according to my counsel; and I think that I also have the spirit of God.
      la:
      - type: citation
        text: 1 Cor 7:36-40
      - type: text
        text: |-
          36 Si quis autem turpem se vidéri exístimat super vírgine sua, quod sit superadúlta, et ita opórtet fíeri; quod vult fáciat: non peccat, si nubat.
          37 Nam, qui státuit in corde suo firmus, non habens necessitátem, potestátem autem habens suæ voluntátis, et hoc iudicávit in corde suo, serváre vírginem suam, bene facit.
          38 Ígitur et qui matrimónio iungit vírginem suam, bene facit; et qui non iungit, mélius facit.
          39 Múlier alligáta est legi quanto témpore, vir eius vivit. Quod, si dormíerit vir eius, liberáta est; cui vult nubat, tantum in Dómino.
          40 Beátior autem erit, si sic permánserit, secúndum meum consílium; puto autem quod et ego Spíritum Dei hábeam.
      en2:
      - type: citation
        text: 1 Cor 7:36-40
      - type: text
        text: |-
          36 But if any man considers himself to seem dishonorable, concerning a virgin who is of adult age, and so it ought to be, he may do as he wills. If he marries her, he does not sin.
          37 But if he has decided firmly in his heart, and he does not have any obligation, but only the power of his free will, and if he has judged this in his heart, to let her remain a virgin, he does well.
          38 And so, he who joins with his virgin in matrimony does well, and he who does not join with her does better.
          39 A woman is bound under the law for as long as her husband lives. But if her husband has died, she is free. She may marry whomever she wishes, but only in the Lord.
          40 But she will be more blessed, if she remains in this state, in accord with my counsel. And I think that I, too, have the Spirit of God.
  reading.2-chr-7-11-16-e6295d02d6:
    role: reading
    content:
      en:
      - type: citation
        text: 2 Chr 7:11-16
      - type: text
        text: |-
          11 And Solomon finished the house of the Lord, and the king's house, and all that he had designed in his heart to do, in the house of the Lord, and in his own house, and he prospered.
          12 And the Lord appeared to him by night, and said: I have heard thy prayer, and I have chosen this place to myself for a house of sacrifice.
          13 If I shut up heaven, and there fall no rain, or if I give orders, and command the locust to devour the land, or if I send pestilence among my people:
          14 And my people, upon whom my name is called, being converted, shall make supplication to me, and seek out my face, and do penance for their most wicked ways: then will I hear from heaven, and will forgive their sins and will heal their land.
          15 My eyes also shall be open, and my ears attentive to the prayer of him that shall pray in this place.
          16 For I have chosen, and have sanctified this place, that my name may be there for ever, and my eyes and my heart may remain there perpetually.
      la:
      - type: citation
        text: 2 Chr 7:11-16
      - type: text
        text: |-
          11 Complevítque Sálomon domum Dómini, et domum regis, et ómnia quæ disposúerat in corde suo, ut fáceret in domo Dómini et in domo sua, et prosperátus est.
          12 Appáruit autem ei Dóminus nocte, et ait: Audívi oratiónem tuam, et elégi locum istum mihi in domum sacrifícii.
          13 Si cláusero cælum, et plúvia non flúxerit, et mandávero et præcépero locústæ, ut dévoret terram, et mísero pestiléntiam in pópulum meum:
          14 convérsus autem pópulus meus, super quos invocátum est nomen meum, deprecátus me fúerit, et exquisíerit fáciem meam, et égerit pœniténtiam a viis suis pessimis: et ego exáudiam de cælo, et propítius ero peccátis eórum, et sanábo terram eórum.
          15 Oculi quoque mei erunt apérti, et aures meæ eréctæ ad oratiónem eius qui in loco isto oráverit.
          16 Elégi enim et sanctificávi locum istum, ut sit nomen meum ibi in sempitérnum, et permáneant óculi mei et cor meum ibi cunctis diébus.
      en2:
      - type: citation
        text: 2 Chr 7:11-16
      - type: text
        text: |-
          11 And Solomon completed the house of the Lord, and the house of the king, and all that he had resolved in his heart to do for the house of the Lord, and for his own house. And he prospered.
          12 Then the Lord appeared to him by night, and said: 'I have heard your prayer, and I have chosen this place for myself as a house of sacrifice.'
          13 If I close up heaven, so that no rain will fall, or if I order and instruct the locust to devour the land, or if I send a pestilence among my people,
          14 and if my people, over whom my name has been invoked, being converted, will have petitioned me and sought my face, and will have done penance for their wicked ways, then I will heed them from heaven, and I will forgive their sins, and I will heal their land.
          15 Also, my eyes will be open, and my ears will be attentive, to the prayer of him who shall pray in this place.
          16 For I have chosen and sanctified this place, so that my name may be there continually, and so that my eyes and my heart may remain there, for all days.
  reading.2-chr-7-6-9-86a783ac9f:
    role: reading
    content:
      en:
      - type: citation
        text: 2 Chr 7:6-9
      - type: text
        text: |-
          6 And the priests stood in their offices: and the Levites with the instruments of music of the Lord, which king David made to praise the Lord: because his mercy endureth for ever, singing the hymns of David by their ministry: and the priests sounded with trumpets before them, and all Israel stood.
          7 Solomon also sanctified the middle of the court before the temple of the Lord: for he offered there the holocausts, and the fat of the peace offerings: because the brazen altar, which he had made, could not hold the holocausts and the sacrifices and the fat:
          8 And Solomon kept the solemnity at that time seven days, and all Israel with him, a very great congregation, from the entrance of Emath to the torrent of Egypt.
          9 And he made on the eighth day a solemn assembly, because he had kept the dedication of the altar seven days, and had celebrated the solemnity seven days.
      la:
      - type: citation
        text: 2 Chr 7:6-9
      - type: text
        text: |-
          6 Sacerdótes autem stabant in offíciis suis, et Levítæ in organis cárminum Dómini, quæ fecit David rex ad laudándum Dóminum: Quóniam in ætérnum misericórdia eius; hymnos David canéntes per manus suas: porro sacerdótes canébant tubis ante eos, cunctúsque Israël stabat.
          7 Sanctificávit quoque Sálomon médium átrii ante templum Dómini: obtúlerat enim ibi holocáusta, et ádipes pacificórum: quia altáre ǽneum, quod fécerat, non póterat sustinére holocáusta et sacrifícia et ádipes.
          8 Fecit ergo Sálomon solemnitátem in témpore illo septem diébus, et omnis Israël cum eo, ecclésia magna valde ab intróitu Emath usque ad Torréntem Ægýpti.
          9 Fecítque die octávo colléctam, eo quod dedicásset altáre septem diébus, et solemnitátem celebrásset diébus septem.
      en2:
      - type: citation
        text: 2 Chr 7:6-9
      - type: text
        text: |-
          6 Then the priests and the Levites were standing in their offices, with the instruments of music for the Lord, which king David made in order to praise the Lord: 'For his mercy is eternal.' And they were playing the hymns of David with their hands. And the priests were sounding out with trumpets before them, and all of Israel was standing.
          7 Also, Solomon sanctified the middle of the atrium in front of the temple of the Lord. For he had offered the holocausts and the fat of peace offerings in that place, because the bronze altar, which he had made, had not been able to support the holocausts and the sacrifices and the fat.
          8 Therefore, Solomon kept the solemnity, at that time, for seven days, and all of Israel with him, a very great assembly, from the entrance of Hamath, even to the torrent of Egypt.
          9 And on the eighth day, he held a solemn gathering, because he had dedicated the altar over seven days, and he had celebrated the solemnity over seven days.
  reading.acts-20-25-31-19f0a0026c:
    role: reading
    content:
      la:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: |-
          25 Et nunc ecce ego scio quia ámplius non vidébitis fáciem meam vos omnes, per quos transívi prǽdicans regnum Dei.
          26 Quaprópter contéstor vos hodiérna die, quia mundus sum a sánguine ómnium.
          27 Non enim subterfúgi, quóminus annuntiárem omne consílium Dei vobis.
          28 Atténdite vobis, et univérso gregi, in quo vos Spíritus Sanctus pósuit epíscopos régere Ecclésiam Dei, quam acquisívit sánguine suo.
          29 Ego scio quóniam intrábunt post discessiónem meam lupi rapáces in vos, non parcéntes gregi.
          30 Et ex vobis ipsis exsúrgent viri loquéntes pervérsa, ut abdúcant discípulos post se.
          31 Propter quod vigiláte, memória retinéntes quóniam per triénnium nocte et die non cessávi, cum lácrimis monens unumquémque vestrum.
      en2:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: |-
          25 And now, behold, I know that you will no longer see my face, all of you among whom I have traveled, preaching the kingdom of God.
          26 For this reason, I call you as witnesses on this very day: that I am clean from the blood of all.
          27 For I have not turned aside in the least from announcing every counsel of God to you.
          28 Take care of yourselves and of the entire flock, over which the Holy Spirit has stationed you as Bishops to rule the Church of God, which he has purchased by his own blood.
          29 I know that after my departure ravenous wolves will enter among you, not sparing the flock.
          30 And from among yourselves, men will rise up, speaking perverse things in order to entice disciples after them.
          31 Because of this, be vigilant, retaining in memory that throughout three years I did not cease, night and day, with tears, to admonish each and every one of you.
  reading.acts-20-25-31-e1bf516db8:
    role: reading
    content:
      en:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: |-
          25 And now behold, I know that all you, among whom I have gone preaching the kingdom of God, shall see my face no more.
          26 Wherefore I take you to witness this day, that I am clear from the blood of all men;
          27 For I have not spared to declare unto you all the counsel of God.
          28 Take heed to yourselves, and to the whole flock, wherein the Holy Ghost hath placed you bishops, to rule the church of God, which he hath purchased with his own blood.
          29 I know that, after my departure, ravening wolves will enter in among you, not sparing the flock.
          30 And of your own selves shall arise men speaking perverse things, to draw away disciples after them.
          31 Therefore watch, keeping in memory, that for three years I ceased not, with tears to admonish every one of you night and day.
