          Amen.
      en2:
      - type: rubric
        text: The first stanza of the following hymn is said kneeling.
      - type: text
        text: |-
          Hail, star of the sea,
          gentle Mother of God,
          and ever Virgin,
          happy gate of heaven.
      
          Receiving that Ave
          from the mouth of Gabriel,
          establish us in peace,
          changing the name of Eve.
      
          Loose the chains of the guilty,
          bring forth light to the blind,
          drive away our evils,
          beg for all good things.
      
          Show yourself to be a mother;
          let him receive through you our prayers,
          who, born for us,
          consented to be yours.
      
          O singular Virgin,
          gentle above all others,
          free us from our sins
          and make us gentle and chaste.
      
          Grant a pure life,
          prepare a safe journey,
          that, beholding Jesus,
          we may rejoice together always.
      
          Let praise be to God the Father,
          and honor to Christ the Most High,
          and to the Holy Spirit,
          one honor to the Three.
          Amen.
  hymn.quem-terra-pontus-s-dera-0f539e67a6:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          The God whom earth, and sea, and sky
          Adore, and laud, and magnify,
          Who o'er their threefold fabric reigns,
          The Virgin's spotless womb contains.

          The God, whose will by moon and sun
          And all things in due course is done,
          Is borne upon a maiden's breast,
          By fullest heavenly grace possest.

          How blest that mother, in whose shrine
          The great artificer divine,
          Whose hand contains the earth and sky,
          Vouchsafed, as in his ark, to lie.

          Blest, in the message Gabriel brought;
          Blest, by the work the Spirit wrought;
          From whom the great desire of earth
          Took human flesh and human birth.

          All honour, laud, and glory be,
          O Jesu, Virgin-born to thee;
          All glory, as is ever meet,
          To Father and to Paraclete.
          Amen.
      la:
      - type: text
        text: |-
          Quem terra, pontus, sídera
          Colunt, adórant, prædicant,
          Trinam regéntem máchinam,
          Claustrum Maríæ báiulat.

          Cui luna, sol, et ómnia
          Desérviunt per témpora,
          Perfúsa cæli grátia,
          Gestant puéllæ víscera.

          Beáta Mater múnere,
          Cuius supérnus ártifex
          Mundum pugíllo cóntinens,
          Ventris sub arca clausus est.

          Beáta cæli núntio,
          Fœcúnda sancto Spíritu,
          Desiderátus géntibus,
          Cuius per alvum fusus est.

          Iesu, tibi sit glória,
          Qui natus es de Vírgine,
          Cum Patre, et almo Spíritu
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
