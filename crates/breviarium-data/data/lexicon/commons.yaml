  chapter.sir-24-19-20-f2807ce9f9:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: 'In platéis sicut cinnamómum et bálsamum aromatízans odórem dedi: quasi myrrha elécta, dedi suavitátem odóris.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: I was exalted like a beautiful olive tree in the plains, and like a sycamore tree beside the waters along a wide road. I gave off an aromatic fragrance like cinnamon or balsam. I produced a sweet odor like the best myrrh.
      - type: response
        text: Thanks be to God.
  chapter.sir-31-8-9-508ebb3179:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 31:8-9
      - type: text
        text: 'Blessed is the rich man that is found without blemish: and that hath not gone after gold, nor put his trust in money nor in treasures. Who is he, and we will praise him? for he hath done wonderful things in his life.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 31:8-9
      - type: text
        text: Beátus vir, qui invéntus est sine mácula, et qui post aurum non ábiit, nec sperávit in pecúnia et thesáuris. Quis est hic, et laudábimus eum? fecit enim mirabília in vita sua.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 31:8-9
      - type: text
        text: Blessed is the rich man who is found to be without blemish. And blessed is he who has not gone after gold, nor placed his hope in money or treasures. Who is he? For we should praise him. For he has done wonderful things in his life.
      - type: response
        text: Thanks be to God.
  chapter.sir-31-8-9-cc563ea06e:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 31:8-9
      - type: text
        text: Beátus vir, qui invéntus est sine mácula, et qui post aurum non ábiit, nec sperávit in pecúnia et thesáuris. Quis est hic, et laudábimus eum? fecit enim mirabília in vita sua.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 31:8-9
      - type: text
        text: Blessed is the rich man who is found to be without blemish. And blessed is he who has not gone after gold, nor placed his hope in money or treasures. Who is he? For we should praise him. For he has done wonderful things in his life.
      - type: response
        text: Thanks be to God.
  chapter.sir-39-6-00cdfc664c:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 39:6
      - type: text
        text: The righteous will give his heart to resort early to the Lord that made him, and he will pray in the sight of the most High.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 39:6
      - type: text
        text: Iustus cor suum trádidit ad vigilándum dilúculo ad Dóminum, qui fecit illum, et in conspéctu Altíssimi deprecábitur.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 39:6
      - type: text
        text: At first light, he will offer his heart with watchfulness to the Lord who made him, and he will pray in the sight of the Most High.
      - type: response
        text: Thanks be to God.
  chapter.sir-39-6-1b7a29ceb3:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 39:6
      - type: text
        text: Iustus cor suum trádidit ad vigilándum dilúculo ad Dóminum, qui fecit illum, et in conspéctu Altíssimi deprecábitur.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 39:6
      - type: text
        text: At first light, he will offer his heart with watchfulness to the Lord who made him, and he will pray in the sight of the Most High.
      - type: response
        text: Thanks be to God.
  chapter.sir-44-16-17-27e06fb9a7:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 44:16-17
      - type: text
        text: Behold an high priest, who in his days pleased God, and was found righteous, and in the time of wrath he was made a propitiation.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 44:16-17
      - type: text
        text: 'Ecce sacérdos magnus, qui in diébus suis plácuit Deo, et invéntus est iustus: et in témpore iracúndiæ factus est reconciliátio.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 44:16-17
      - type: text
        text: Behold, the great priest, who in his days pleased God and was found just; and in the time of wrath he became a reconciliation.
      - type: response
        text: Thanks be to God.
  chapter.sir-44-16-17-74216b4204:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 44:16-17
      - type: text
        text: 'Ecce sacérdos magnus, qui in diébus suis plácuit Deo, et invéntus est iustus: et in témpore iracúndiæ factus est reconciliátio.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 44:16-17
      - type: text
        text: Behold, the great priest, who in his days pleased God and was found just; and in the time of wrath he became a reconciliation.
      - type: response
        text: Thanks be to God.
  chapter.sir-44-20-44-22-97b9e22c7f:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 44:20; 44:22
      - type: text
        text: There was not found the like to him in glory, who kept the law of the most High, and was in covenant with him. Therefore by an oath he gave him glory in his posterity, that he should increase in his people.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 44:20; 44:22
      - type: text
        text: 'Non est invéntus símilis illi, qui conserváret legem Excélsi: ídeo iureiurándo fecit illum Dóminus créscere in plebem suam.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 44:20; 44:22
      - type: text
        text: There was found no one like him, who kept the law of the Most High; therefore the Lord made him grow among his people by an oath.
      - type: response
        text: Thanks be to God.
  chapter.sir-44-20-44-22-cdf6434fa0:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 44:20; 44:22
      - type: text
        text: 'Non est invéntus símilis illi, qui conserváret legem Excélsi: ídeo iureiurándo fecit illum Dóminus créscere in plebem suam.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 44:20; 44:22
      - type: text
        text: There was found no one like him, who kept the law of the Most High; therefore the Lord made him grow among his people by an oath.
      - type: response
        text: Thanks be to God.
  chapter.sir-45-19-20-3616cf01c4:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: Fungi sacerdótio, et habére laudem in nómine ipsíus, et offérre illi incénsum dignum in odórem suavitátis.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: To exercise the priesthood and to have praise in his name, and to offer him worthy incense as a fragrant offering.
      - type: response
        text: Thanks be to God.
  chapter.sir-51-1-3-c46e757ad0:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 51:1-3
      - type: text
        text: 'I will give glory to thee, O Lord, O King, and I will praise thee, O God my Saviour. I will give glory to thy name: for thou hast been a helper and protector to me, and hast preserved my body from destruction.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 51:1-3
      - type: text
        text: 'Confitébor tibi, Dómine, Rex, et collaudábo te Deum Salvatórem meum. Confitébor nómini tuo: quóniam adiútor et protéctor factus es mihi, et liberásti corpus meum a perditióne.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 51:1-3
      - type: text
        text: I will confess to you, O Lord and King, and I will give praise to you, O God my Saviour. I will acknowledge your name. For you have been my Helper and Protector, and you have freed my body from perdition.
      - type: response
        text: Thanks be to God.
  chapter.sir-51-13-14-e15388ce22:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 51:13-14
      - type: text
        text: Dómine, Deus meus, exaltásti super terram habitatiónem meam, et pro morte defluénte deprecáta sum. Invocávi Dóminum, Patrem Dómini mei, ut non derelínquat me in die tribulatiónis meæ, et in témpore superbórum sine adiutório.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 51:13-14
      - type: text
        text: You exalted my habitation upon the earth, and I made supplication that death would pass away. I called upon the Lord, the Father of my Lord, so that he would not abandon me in the day of my tribulation, nor in the time of arrogance without assistance.
      - type: response
        text: Thanks be to God.
  chapter.sir-51-4-5-dbe2f2313c:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 51:4-5
      - type: text
        text: And thou hast delivered me, according to the multitude of the mercy of thy name, from them that did roar, prepared to devour. Out of the hands of them that sought my life, and from the gates of afflictions, which compassed me about.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 51:4-5
      - type: text
        text: Liberásti me secúndum multitúdinem misericórdiæ nóminis tui a rugiéntibus, præparátis ad escam, de mánibus quæréntium ánimam meam, et de multis tribulatiónibus quæ circumdedérunt me.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 51:4-5
      - type: text
        text: 'And you have freed me according to the multitude of the mercy of your name: from those who roared and prepared to devour, from the hands of those who sought my life, and from the gates of tribulation that surrounded me.'
      - type: response
        text: Thanks be to God.
  chapter.sir-51-8-51-12-51fe1de600:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 51:8; 51:12
      - type: text
        text: Laudábit usque ad mortem ánima mea Dóminum, quóniam éruis sustinéntes te, et líberas eos de manu angústiæ, Dómine, Deus noster.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 51:8; 51:12
      - type: text
        text: My soul shall praise the Lord, even unto death. For you rescue those who persevere for you, O Lord, and you free them from the hands of the Gentiles.
      - type: response
        text: Thanks be to God.
  chapter.zach-13-5679ff6637:
    role: chapter
    content:
      la:
      - type: citation
        text: Zach 13
      - type: text
        text: 'Quid sunt plagæ istæ in médio mánuum tuárum? Et dicet: His plagatus sum in domo eórum qui diligebant me.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Zach 13
      - type: text
        text: 'What are these wounds in the middle of your hands? And he will say: I was wounded with these in the house of those who love me.'
      - type: response
        text: Thanks be to God.
  collect.ad-sto-d-mine-supplicati-nibus-nostris-quas-in-b-2a927320c6:
    role: collect
    content:
      en:
      - type: text
        text: Be mindful, O Lord, of our humble prayers in this commemoration of Your Saints, so that we, who have no confidence in our own righteousness, may be helped by the merits of those who have been pleasing to You.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Adésto, Dómine, supplicatiónibus nostris, quas in beatórum N. et N. Confessórum tuórum sollemnitáte deférimus: ut, qui nostræ iustítiæ fidúciam non habémus, eórum, qui tibi placuérunt, précibus adiuvémur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Be present, O Lord, to our supplications, which we offer on the solemnity of your blessed Confessors N. and N.: that we, who have no confidence in our own justice, may be aided by the prayers of those who were pleasing to you.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.ad-sto-d-mine-supplicati-nibus-nostris-quas-in-b-6e735f6e00:
    role: collect
    content:
      en:
      - type: text
        text: Be mindful, O Lord, of our humble prayers in this commemoration of Your Saints, so that we, who have no confidence in our own righteousness, may be helped by the merits of those who have been pleasing to You.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Adésto, Dómine, supplicatiónibus nostris, quas in beáti N. Confessóris tui sollemnitáte deférimus: ut, qui nostræ iustítiæ fidúciam non habémus, eius, qui tibi plácuit, précibus adiuvémur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Be present, O Lord, to our supplications, which we offer on the solemnity of your blessed Confessor N.: that we, who have no confidence in our own justice, may be aided by the prayers of him who was pleasing to you.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.beato-rum-ma-rtyrum-parite-rque-ponti-ficum-n-et-9d87195bc2:
    role: collect
    content:
      en:
      - type: text
        text: May the feast of the blessed Martyrs and Bishops N. and N., protect us, O Lord, we beseech You, and may their holy prayer recommend us unto You.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Beatórum Mártyrum paritérque Pontíficum N. et N. nos, quǽsumus, Dómine, festa tueántur: et eórum comméndet orátio veneránda.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'May the feast of the blessed Martyrs and likewise Pontiffs N. and N., we pray, O Lord, protect us: and may their venerable prayer commend us.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.beato-rum-ma-rtyrum-parite-rque-ponti-ficum-n-et-cb2b11415c:
    role: collect
    content:
      la:
      - type: text
        text: 'Beatórum Mártyrum paritérque Pontíficum N. et N. nos, quǽsumus, Dómine, festa tueántur: et eórum comméndet orátio veneránda.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: 'Deus, qui nos concédis sanctórum Mártyrum tuórum N. et N. natalítia cólere: da nobis in ætérna beatitúdine de eórum societáte gaudére.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'May the feast of the blessed Martyrs and likewise Pontiffs N. and N., we pray, O Lord, protect us: and may their venerable prayer commend us.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
      - type: text
        text: 'O God, who grant us to celebrate the birth to heaven of your holy Martyrs N. and N.: grant us to rejoice in their company in eternal blessedness.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.beato-rum-ma-rtyrum-parite-rque-ponti-ficum-n-et-dfdb2ef628:
    role: collect
    content:
      la:
      - type: text
        text: 'Beatórum Mártyrum paritérque Pontíficum N. et N. nos, quǽsumus, Dómine, festa tueántur: et eórum comméndet orátio veneránda.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: 'Deus, qui nos ánnua sanctórum Mártyrum tuórum N. et N. sollemnitáte lætíficas: concéde propítius; ut, quorum gaudémus méritis, accendámur exémplis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'May the feast of the blessed Martyrs and likewise Pontiffs N. and N., we pray, O Lord, protect us: and may their venerable prayer commend us.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
      - type: text
        text: 'O God, who gladden us by the annual solemnity of your holy Martyrs N. and N.: graciously grant that we, who rejoice in their merits, may be enkindled by their example.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.conc-de-nos-f-mulos-tuos-qu-sumus-d-mine-deus-pe-38220de185:
    role: collect
    content:
      en:
      - type: text
        text: Grant, we beseech thee, O Lord God, unto all thy servants, that they may remain continually in the enjoyment of soundness both of mind and body, and by the glorious intercession of the Blessed Mary, always a Virgin, may be delivered from present sadness, and enter into the joy of thine eternal gladness.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Concéde nos fámulos tuos, quǽsumus, Dómine Deus, perpétua mentis et córporis sanitáte gaudére: et, gloriósa beátæ Maríæ semper Vírginis intercessióne, a præsénti liberári tristítia, et ætérna pérfrui lætítia.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Grant, we pray, O Lord our God, that we your servants may rejoice in perpetual health of mind and body: and, by the glorious intercession of Blessed Mary ever-Virgin, may we be freed from present sorrow and come to enjoy eternal gladness.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.d-mine-iesu-christe-qui-de-c-lis-ad-terram-de-si-a8b1a10053:
    role: collect
    content:
      la:
      - type: text
        text: 'Dómine Iesu Christe, qui de cœlis ad terram de sinu Patris descendisti, et sánguinem tuum pretiósum in remissiónem peccatórum nostrórum fudisti: te humíliter deprecámur; ut in die iudícii, ad déxteram tuam audíre mereámur: Veníte benedícti:'
      - type: prayer
        text: Qui vivis et regnas cum Deo Patre, in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O Lord Jesus Christ, who descended from heaven to earth from the bosom of the Father and poured out your precious blood for the forgiveness of our sins: we humbly implore you, that on the day of judgment we may merit to hear at your right hand: Come, you blessed:'
      - type: prayer
        text: Who live and reign with God the Father, in the unity of the Holy Spirit, God, for ever and ever.
      - type: response
        text: Amen.
  collect.da-nobis-qu-sumus-d-mine-deus-noster-sanct-rum-m-0d6b25e347:
    role: collect
    content:
      en:
      - type: text
        text: Grant unto us, we beseech thee, O Lord, our God, that we may ever call to mind, with all worship and thanksgiving, the victory of thy holy Martyrs N. and N., and although we know that our mind cannot comprehend thee who art this day their exceeding great reward, give us always the grace humbly to worship thee.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Da nobis, quǽsumus, Dómine Deus noster, sanctárum Mártyrum tuárum N. et N. palmas incessábili devotióne venerári: ut quas digna mente non póssumus celebráre, humílibus saltem frequentémus obséquiis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Grant us, we pray, O Lord our God, to venerate with unceasing devotion the palms of your holy Martyrs N. and N.: that what we cannot celebrate with worthy minds, we may at least frequent with humble service.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.da-nobis-qu-sumus-d-mine-deus-noster-sanct-rum-v-6a4732f239:
    role: collect
    content:
      en:
      - type: text
        text: Grant unto us, we beseech thee, O Lord, our God, that we may ever call to mind, with all worship and thanksgiving, the victory of thy holy Virgins and Martyrs N. and N., and although we know that our mind cannot comprehend thee who art this day their exceeding great reward, give us always the grace humbly to worship thee.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Da nobis, quǽsumus, Dómine Deus noster, sanctárum Vírginum et Mártyrum tuárum N. et N. palmas incessábili devotióne venerári: ut quas digna mente non póssumus celebráre, humílibus saltem frequentémus obséquiis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Grant us, we pray, O Lord our God, to venerate with unceasing devotion the palms of your holy Virgins and Martyrs N. and N.: that what we cannot celebrate with worthy minds, we may at least frequent with humble service.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.da-qu-sumus-omn-potens-deus-ut-be-ti-n-ap-stoli-33588c7c62:
    role: collect
    content:
      en:
      - type: text
        text: Grant, we beseech thee, O Almighty God, that the worshipful Feast of thy blessed Apostle, N. on the eve whereof we now stand, may avail us to the increase both of godliness toward thee, and of health to our own souls.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Da, quǽsumus, omnípotens Deus: ut beáti N. Apóstoli tui, quam prævenimus, veneránda solémnitas, et devotiónem nobis áugeat et salútem.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: |-
          (sed commune C4)
          Quǽsumus omnípotens Deus, ut beátus N. Apóstolus, cuius prævenímus festivitátem, tuum pro nobis implóret auxílium: ut a nostris reátibus absolúti a cunctis étiam perículis eruámur.
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: Grant, we pray, almighty God, that the venerable solemnity of your blessed Apostle N., which we anticipate, may both increase our devotion and bring about our salvation.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
      - type: text
        text: |-
          (sed commune C4)
          We pray, almighty God, that your blessed Apostle N., whose feast we anticipate, may implore your help for us: that, absolved from our offenses, we may also be delivered from all dangers.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.da-qu-sumus-omn-potens-deus-ut-be-ti-n-confess-r-68d6be366f:
    role: collect
    content:
      en:
      - type: text
        text: Grant, we beseech thee, almighty God, that the venerable feast of N. thy blessed Confessor and Bishop may increase our devotion and promote our salvation.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Da, quǽsumus, omnípotens Deus: ut beáti N. Confessóris tui atque Pontíficis veneránda solémnitas, et devotiónem nobis áugeat et salútem.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: Grant, we pray, almighty God, that the venerable solemnity of your blessed Confessor and Pontiff N. may both increase our devotion and bring about our salvation.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.da-qu-sumus-omn-potens-deus-ut-qui-beat-rum-m-rt-73411107a9:
    role: collect
    content:
      la:
      - type: text
        text: 'Da, quǽsumus, omnípotens Deus: ut, qui beatórum Mártyrum tuórum N. et N. solémnia cólimus, eórum apud te intercessiónibus adiuvémur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: Grant, we pray, almighty God, that we who celebrate the solemnity of your blessed Martyrs N. and N. may be aided by their intercession before you.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.deus-indulgenti-rum-d-mine-da-anim-bus-famul-rum-5a02476f40:
    role: collect
    content:
      en:
      - type: text
        text: O Lord God, who art the great pardoner, grant rest and refreshment, peace and blessing, light and glory, unto the souls of thy men-servants and thy maid-servants, (or, the soul of thy servant, or, of thine handmaid,) whose year's-mind we are keeping.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus indulgentiárum Dómine: da animábus famulórum famularúmque tuárum, quorum anniversárium depositiónis diem commemorámus, refrigérii sedem, quiétis beatitúdinem, et lúminis claritátem.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O Lord, God of mercy: grant to the souls of your servants N. and N., whose anniversary of death we commemorate, a place of refreshment, the blessedness of rest, and the brightness of light.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.deus-mnium-fid-lium-pastor-et-rector-f-mulum-tuu-5a3b702173:
    role: collect
    content:
      la:
      - type: text
        text: 'Deus, ómnium fidélium pastor et rector, fámulum tuum N.p, quem pastórem Ecclésiæ tuæ præésse voluísti, propítius réspice: da ei, quǽsumus, verbo et exémplo, quibus præest, profícere; ut ad vitam, una cum grege sibi crédito, pervéniat sempitérnam.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, shepherd and ruler of all the faithful, look graciously upon your servant N.p, whom you have willed to set over your Church as its shepherd: grant him, we pray, to profit those over whom he presides by word and by example; that, together with the flock entrusted to him, he may come to everlasting life.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.deus-qui-de-be-t-mar-v-rginis-tero-verbum-tuum-a-8287deb4d0:
    role: collect
    content:
      en:
      - type: text
        text: O God, who didst will that, at the announcement of an Angel, thy Word should take flesh in the womb of the Blessed Virgin Mary, grant to us thy suppliants, that we who believe her to be truly the Mother of God may be helped by her intercession with thee.
      - type: prayer
        text: Through the same Jesus Christ, thy Son, Our Lord, Who liveth and reigneth with thee in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui de beátæ Maríæ Vírginis útero Verbum tuum, Angelo nuntiánte, carnem suscípere voluísti: præsta supplícibus tuis; ut, qui vere eam Genetrícem Dei crédimus, eius apud te intercessiónibus adiuvémur.'
      - type: prayer
        text: Per eúndem Dóminum nostrum Iesum Christum Fílium tuum, qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who willed that your Word should take flesh in the womb of the Blessed Virgin Mary at the announcement of the Angel: grant to your suppliants that we, who truly believe her to be the Mother of God, may be aided by her intercession before you.'
      - type: prayer
        text: Through the same Lord Jesus Christ your Son, who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.
      - type: response
        text: Amen.
