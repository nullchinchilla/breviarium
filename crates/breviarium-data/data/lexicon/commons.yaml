      - type: antiphon
        text: 'The root of Jesse has budded, * a star has arisen from Jacob: a Virgin has brought forth the Savior; we praise you, our God.'
      - type: antiphon
        text: 'Behold, Mary has borne * for us the Savior, whom John seeing cried out, saying: Behold the Lamb of God, behold him who takes away the sins of the world, alleluia.'
  psalmody.o-admir-bile-comm-rcium-cre-tor-g-neris-hum-ni-a-af71c8cdc6:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: 'O wondrous interchange! * the Creator of mankind, taking upon him a living body, vouchsafed to be born of a pure Virgin: and by his Humanity, which was begotten in no earthly wise, hath made us partakers of his Divinity.'
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: When thou wast born * all ineffably of a Virgin, then were the Scriptures fulfilled; thou camest down like the dew upon the fleece of wool, to bring salvation unto all mankind; we praise thee, O our God.
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: 'In the bush which Moses saw * unconsumed, we recognize the preservation of thy glorious virginity: holy Mother of God, intercede for us.'
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: 'The Root of Jesse hath budded, * the Star hath come out of Jacob, the Virgin hath borne the Saviour: we praise thee, O our God.'
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: 'Lo, Mary hath brought forth * the Saviour of whom when John saw him, he did proclaim: Behold the Lamb of God that taketh away the sins of the world, alleluia.'
        psalms:
        - number: '147'
      la:
      - type: psalmody
        antiphon: 'O admirábile commércium: * Creátor géneris humáni, animátum corpus sumens, de Vírgine nasci dignátus est; et procédens homo sine sémine, largítus est nobis suam Deitátem.'
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: 'Quando natus es * ineffabíliter ex Vírgine, tunc implétæ sunt Scriptúræ: sicut plúvia in vellus descendísti, ut salvum fáceres genus humánum: te laudámus, Deus noster.'
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: 'Rubum, quem víderat Móyses * incombústum, conservátam agnóvimus tuam laudábilem virginitátem: Dei Génetrix, intercéde pro nobis.'
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: 'Germinávit radix Iesse, * orta est stella ex Iacob: Virgo péperit Salvatórem; te laudámus, Deus noster.'
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: 'Ecce María génuit * nobis Salvatórem, quem Ioánnes videns, exclamávit, dicens: Ecce Agnus Dei, ecce qui tollit peccáta mundi, allelúia.'
        psalms:
        - number: '147'
      en2:
      - type: psalmody
        antiphon: 'O wondrous exchange: * the Creator of the human race, taking on an animate body, deigned to be born of a Virgin; and proceeding as man without seed, he bestowed upon us his Divinity.'
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: 'When you were born * ineffably from the Virgin, then the Scriptures were fulfilled: as rain upon a fleece you came down, to save the human race: we praise you, our God.'
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: 'The bush which Moses saw * burning but unconsumed, we have known to signify your laudable virginity preserved: O Mother of God, intercede for us.'
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: 'The root of Jesse has budded, * a star has arisen from Jacob: a Virgin has brought forth the Savior; we praise you, our God.'
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: 'Behold, Mary has borne * for us the Savior, whom John seeing cried out, saying: Behold the Lamb of God, behold him who takes away the sins of the world, alleluia.'
        psalms:
        - number: '147'
