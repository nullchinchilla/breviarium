  reading.de-epistola-beati-pauli-apostoli-ad-romanos-71b10ac613:
    role: reading
    content:
      la:
      - type: text
        text: De Epistola beati Pauli Apostoli ad Romanos.
      - type: citation
        text: Rm 5:8-11,17
      - type: text
        text: |-
          8 Comméndat caritátem suam Deus in nobis: quóniam cum adhuc peccatóres essémus, secúndum tempus,
          9 Christus pro nobis mórtuus est: multo ígitur magis nunc iustificáti in sánguine ipsíus, salvi érimus ab ira per ipsum.
          10 Si enim cum inimíci essémus, reconciliáti sumus Deo per mortem Fílii eius: multo magis reconciliáti, salvi érimus in vita ipsíus.
          11 Non solum autem: sed et gloriámur in Deo per Dóminum nostrum Iesum Christum, per quem nunc reconciliatiónem accépimus.
          17 Si enim uníus delícto mors regnávit per unum: multo magis abundántiam grátiæ, et donatiónis, et iustítiæ accipiéntes, in vita regnábunt per unum Iesum Christum.
      en2:
      - type: text
        text: From the Epistle of the blessed Apostle Paul to the Romans.
      - type: citation
        text: Rm 5:8-11,17
      - type: text
        text: |-
          8 God demonstrates his charity for us in that, while we were yet sinners, at the proper time,
          9 Christ died for us. Therefore, having been justified now by his blood, all the more so shall we be saved from wrath through him.
          10 For if we were reconciled to God through the death of his Son, while we were still enemies, all the more so, having been reconciled, shall we be saved by his life.
          11 And not only that, but we also glory in God through our Lord Jesus Christ, through whom we have now received reconciliation.
          17 For though, by the one offense, death reigned through one, yet so much more so shall those who receive an abundance of grace, both of the gift and of justice, reign in life through the one Jesus Christ.
  reading.de-expositi-ne-sancti-greg-rii-pap-super-ezechi-947c384a8f:
    role: reading
    content:
      en:
      - type: text
        text: From the Exposition of the Book of the Prophet Ezekiel by Pope St. Gregory (the Great.)
      - type: citation
        text: Hom. 3, Bk. I
      - type: text
        text: 'The Prophet writeth very minutely touching the four holy living creatures, whom he saw in the spirit as being to come. He saith: “Every one had four faces, and every one had four wings.” What signifieth the face save likeness whereby we are known? or wings, save the power to fly since it is by the face that man is known from man, and by their wings that the birds'' bodies are carried up into the air. So the face pertaineth to certitude, and the wings to contemplation. With certitude we are known of God Almighty, Who saith: “I am the Good Shepherd, and know My sheep, and am known of Mine.” (John x. 14.) And again: “I know whom I have chosen.” (xiii. 18.) And by contemplation, whereby we rise above ourselves, we as it were fly heavenwards.'
      la:
      - type: text
        text: De Expositióne sancti Gregórii Papæ super Ezechiélem Prophétam
      - type: citation
        text: Homilia 3, Lib. 1
      - type: text
        text: 'Sancta quátuor animália, quæ prophetíæ spíritu futúra prævidéntur, subtíli narratióne describúntur, cum dícitur: Quátuor fácies uni, et quátuor pennæ uni. Quid per fáciem, nisi notítia; et quid per pennas, nisi volátus exprímitur? Per fáciem quippe unusquísque cognóscitur: per pennas vero in altum ávium córpora sublevántur. Fácies ítaque ad fidem pértinet, penna ad contemplatiónem. Per fidem namque ab omnipoténti Deo cognóscimur, sicut ipse de suis óvibus dicit: Ego sum pastor bonus, et cognósco oves meas, et cognóscunt me meæ. Qui rursus ait: Ego scio quos elégerim. Per contemplatiónem vero, qua super nosmetípsos tóllimur, quasi in áëra levámur.'
      en2:
      - type: text
        text: From the Commentary of Pope Saint Gregory on the Prophet Ezekiel
      - type: citation
        text: Homilia 3, Lib. 1
      - type: text
        text: 'The four holy living creatures, which are foreseen by the spirit of prophecy as future realities, are described with subtle narration, when it is said: Four faces to each one, and four wings to each one. What is expressed by the face, but knowledge; and what by the wings, but flight? For by the face each one is recognized; by the wings, the bodies of birds are lifted into the heights. The face, therefore, pertains to faith, the wing to contemplation. For by faith we are known to almighty God, as he himself says of his sheep: I am the good shepherd, and I know my sheep, and my sheep know me. Who says again: I know those whom I have chosen. By contemplation, however, by which we are lifted above ourselves, we are raised as it were into the air.'
  reading.de-expositi-ne-sancti-greg-rii-pap-super-ezechi-eff7b75adc:
    role: reading
    content:
      en:
      - type: text
        text: Sermon of St. Gregory, Pope
      - type: citation
        text: Sermon 30 on the Gospels
      - type: text
        text: 'It is written: By His Spirit the Lord hath adorned the heavens. (Job xxvi. 13.) Now the ornament of the heavens are the godly powers of preachers, and this ornament, what it is, Paul teacheth us thus To one is given by the Spirit the word of wisdom, to another the word of knowledge by the same Spirit; to another faith by the same Spirit; to another the gifts of healing by the same Spirit, to another the working of miracles, to another prophecy, to another discerning of spirits, to another diverse kinds of tongues, to another the interpretation of tongues. But all these worketh that one and the self-same Spirit, dividing to every man severally as He will. (1 Cor. xii. 8.)'
      la:
      - type: text
        text: De Expositióne sancti Gregórii Papæ super Ezechiélem Prophétam
      - type: citation
        text: Homilia 3, Lib. 1
      - type: text
