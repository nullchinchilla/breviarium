  reading.ex-libro-mor-lium-sancti-greg-rii-pap-077b7dcfd8:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St. John Chrysostom, Patriarch (of Constantinople.)
      - type: heading
        text: On St Philogonius, Tom. iii.
      - type: citation
        text: 'The blessed N., whose Feast we are this day keeping, doth justly call on our tongue to tell what great deeds he wrought. To-day did that blessed servant of God pass into that higher life, which is a life of peace, a life where there is no trouble. To-day his ship reached that harbour whereafter wreck is to be dreaded no more. He hath felt trouble and anguish of spirit for the last time. And wherefore marvel we that that place is one where the mind is vexed no more, when we remember that Paul saith, even to men living here in this life: Rejoice evermore, pray without ceasing? (1 Thess. v. 16, 17.)'
      la:
      - type: text
        text: Ex libro Morálium sancti Gregórii Papæ
      - type: heading
        text: Lib. 9. cap. 11., n. 45
      - type: text
        text: Qui, post Oríonas, Hýadum nómine, nisi Doctóres sanctæ Ecclésiæ designántur? Qui, subdúctis Martýribus, eo iam témpore ad mundi notítiam venérunt, quo fides clárius elúcet, et, représsa infidelitátis híeme, áltius per corda fidélium sol veritátis calet. Qui, remóta tempestáte persecutiónis, explétis longis nóctibus infidelitátis, tunc sanctæ Ecclésiæ orti sunt, cum ei iam per credulitátis vernum lucídior annus aperítur.
  reading.ex-libro-mor-lium-sancti-greg-rii-pap-09fb012679:
    role: reading
    content:
      en:
      - type: text
        text: From the Book of Moral Reflection on Job, written by Pope St. Gregory the Great.
      - type: heading
        text: Bk. ix. ch. vi.
      - type: text
        text: In the Book of Job (ix. 9), it is written that it is God which maketh Arcturus, Orion, and Hyades. Now if by the constellation Orion be mystically signified the spiritual constellation of the holy Martyrs, whom can we understand to be named after them under the title of the Hyades, but the Doctors of the Holy Church? When the glorious constellation of the Martyrs had set, and the light of the faith grew stronger, then appeared the constellation of the Doctors in the firmament of the Church, even in that spring-time when the winter of unbelief was past, and the Sun of truth rose higher to shine on the hearts of His faithful ones. The storms of persecution were gone, and the long nights of unbelief were over then rose the Doctors to shine on the Church, when the springtime of belief promised her a brighter year.
      la:
      - type: text
        text: Ex libro Morálium sancti Gregórii Papæ
      - type: heading
        text: Lib. 9. cap. 11., n. 45
      - type: text
        text: Qui, post Oríonas, Hýadum nómine, nisi Doctóres sanctæ Ecclésiæ designántur? Qui, subdúctis Martýribus, eo iam témpore ad mundi notítiam venérunt, quo fides clárius elúcet, et, représsa infidelitátis híeme, áltius per corda fidélium sol veritátis calet. Qui, remóta tempestáte persecutiónis, explétis longis nóctibus infidelitátis, tunc sanctæ Ecclésiæ orti sunt, cum ei iam per credulitátis vernum lucídior annus aperítur.
  reading.ex-libro-sancti-ambr-sii-ep-scopi-de-v-duis-543fd13fba:
    role: reading
    content:
      en:
      - type: text
        text: From the Book upon Widows by St Ambrose, Bishop of Milan.
      - type: heading
        text: near the end
      - type: text
        text: Behold the field of the Church, that the same is a fruitful field, some while smiling with the brightness of virginity, somewhile golden with the ripe harvest of widowhood, somewhile rich with the crop of marriage. These things be diverse, but they be the fruits of the same field. There are not so many choice lilies as stalks of bearded grain, ears for the harvest, and there are more places in the soil fitted once to receive seed than there are places which, when they have yielded a crop, are fitted again to be ploughed. Good, then, is widowhood, which the judgment of an Apostle hath so often commended, widowhood, which is the teacher of faith and of purity.
      la:
      - type: text
        text: Ex Libro Sancti Ambrósii Epíscopi de Víduis
      - type: heading
        text: Prope finem
      - type: text
        text: Agrum hunc Ecclésiæ fértilem cerno, nunc integritátis flore vernántem, nunc viduitátis gravitáte polléntem, nunc étiam coniúgii frúctibus redundántem. Nam, etsi divérsi, uníus tamen agri fructus sunt; nec tanta hortórum lília, quantæ arístæ ségetum, méssium spicæ; compluriúmque spátia campórum recipiéndis aptántur semínibus, quam rédditis nováles frúctibus feriántur. Bona ergo vidúitas, quæ tóties apostólico iudício prædicátur. Hæc enim magístra fídei, magístra est castitátis.
  reading.ex-occasi-ne-huius-sent-nti-quidam-introd-cunt-m-0ee35ad4d2:
    role: reading
    content:
      en:
      - type: text
        text: By reason of these words, an hundredfold, some will have that there shall be a thousand years after the resurrection, wherein they that have forsaken all things shall receive an hundredfold of those things which they have forsaken, and shall inherit everlasting life. Such men consider not that though in other things this were worthy, as touching wives it is unseemly for it becometh us not to think that he that hath forsaken one wife in this world, shall receive an hundred wives in that which is to come. But the meaning is this, that every one that for the Saviour's sake hath forsaken earthly things, shall receive spiritual things which things, being rightly weighed against earthly things, are as though an hundredfold were weighed against one.
