        psalms:
        - number: '140'
      - type: psalmody
        antiphon: 'I looked * on my right hand and beheld: but there was no man that would know me.'
        psalms:
        - number: '141'
      la:
      - type: psalmody
        antiphon: Cálicem * salutáris accípiam et nomen Dómini invocábo.
        psalms:
        - number: '115'
      - type: psalmody
        antiphon: 'Cum his, * qui odérunt pacem eram pacíficus: dum loquébar illis, impugnábant me gratis.'
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: Ab homínibus * iníquis líbera me, Dómine.
        psalms:
        - number: '139'
      - type: psalmody
        antiphon: Custódi me * a láqueo, quem statuérunt mihi, et a scándalis operántium iniquitátem.
        psalms:
        - number: '140'
      - type: psalmody
        antiphon: Considerábam * ad déxteram, et vidébam, et non erat qui cognósceret me.
        psalms:
        - number: '141'
      en2:
      - type: psalmody
        antiphon: I will take the chalice * of salvation and call upon the name of the Lord.
        psalms:
        - number: '115'
      - type: psalmody
        antiphon: 'With those * who hated peace I was peaceful: when I spoke to them, they attacked me without cause.'
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: From unjust men * deliver me, O Lord.
        psalms:
        - number: '139'
      - type: psalmody
        antiphon: Keep me * from the snare they have set for me, and from the stumbling-blocks of those who work iniquity.
        psalms:
        - number: '140'
