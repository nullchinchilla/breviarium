  hymn.inv-cte-martyr-nicum-1fd8d482ba:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Invícte Martyr, únicum
          Patris secútus Fílium,
          Victis triúmphas hóstibus,
          Victor fruens cæléstibus.

