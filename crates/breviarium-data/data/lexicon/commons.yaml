        text: Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
      - type: text
        text: Te gloriósus * Apostolórum chorus,
      - type: text
        text: Te Prophetárum * laudábilis númerus,
      - type: text
        text: Te Mártyrum candidátus * laudat exércitus.
      - type: text
        text: Te per orbem terrárum * sancta confitétur Ecclésia,
      - type: text
        text: Patrem * imménsæ maiestátis;
      - type: text
        text: Venerándum tuum verum * et únicum Fílium;
      - type: text
        text: Sanctum quoque * Paráclitum Spíritum.
      - type: text
        text: Tu Rex glóriæ, * Christe.
      - type: text
        text: Tu Patris * sempitérnus es Fílius.
      - type: text
        text: '(Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: 'Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
      - type: text
        text: Tu ad déxteram Dei sedes, * in glória Patris.
      - type: text
        text: Iudex créderis * esse ventúrus.
      - type: text
        text: (Sequens versus dicitur flexis genibus) ~
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória numerári.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória munerári.
      - type: text
        text: Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
      - type: text
        text: Et rege eos, * et extólle illos usque in ætérnum.
      - type: text
        text: Per síngulos dies * benedícimus te.
      - type: text
        text: (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Dignáre, Dómine, die isto * sine peccáto nos custodíre.
      - type: text
        text: Miserére nostri, Dómine, * miserére nostri.
      - type: text
        text: Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
      - type: text
        text: 'In te, Dómine, sperávi: * non confúndar in ætérnum.'
  reading.sir-32-18-20-32-28-33-1-3-8efe9f0d55:
    role: reading
    content:
      en:
      - type: citation
        text: Sir 32:18-20; 32:28; 33:1-3
      - type: citation
        text: '18 He that feareth the Lord, will receive his discipline: and they that will seek him early, shall find a blessing.'
      - type: citation
        text: '19 He that seeketh the law, shall be filled with it: and he that dealeth deceitfully, shall meet with a stumblingblock therein.'
      - type: text
        text: 20 They that fear the Lord, shall find just judgment, and shall kindle justice as a light.
      - type: citation
        text: '28 He that believeth God, taketh heed to the commandments: and he that trusteth in him, shall fare never the worse.'
      - type: citation
        text: 1 No evils shall happen to him that feareth the Lord, but in temptation God will keep him, and deliver him from evils.
      - type: citation
        text: 2 A wise man hateth not the commandments and justices, and he shall not be dashed in pieces as a ship in a storm.
      - type: citation
        text: 3 A man of understanding is faithful to the law of God, and the law is faithful to him.
      la:
      - type: citation
        text: Sir 32:18-20; 32:28; 33:1-3
      - type: citation
        text: '18 Qui timet Dóminum excípiet doctrínam eius: et qui vigiláverint ad illum invénient benedictiónem.'
      - type: citation
        text: '19 Qui quærit legem, replébitur ab ea: et qui insidióse agit, scandalizábitur in ea.'
      - type: text
        text: 20 Qui timent Dóminum invénient iudícium iustum, et iustítias quasi lumen accéndent.
      - type: citation
        text: '28 Qui credit Deo atténdit mandátis: et qui confídit in illo non minorábitur.'
      - type: citation
        text: '1 Timénti Dóminum non occúrrent mala: sed in tentatióne Deus illum conservábit, et liberábit a malis. Sápiens non odit mandáta et iustítias,'
      - type: citation
        text: 2 et non illidétur quasi in procélla navis.
      - type: citation
        text: 3 Homo sensátus credit legi Dei, et lex illi fidélis.
  reading.sir-34-14-20-12edc9be3a:
    role: reading
    content:
      en:
      - type: citation
        text: Sir 34:14-20
      - type: text
        text: 14 The spirit of those that fear God; is sought after, and by his regard shall be blessed.
      - type: text
        text: 15 For their hope is on him that saveth them, and the eyes of God are upon them that love him.
      - type: text
        text: 16 He that feareth the Lord shall tremble at nothing, and shall not be afraid for he is his hope.
      - type: text
        text: 17 The soul of him that feareth the Lord is blessed.
      - type: text
        text: 18 To whom doth he look, and who in his strength?
      - type: text
        text: 19 The eyes of the Lord are upon them that fear him, he is their powerful protector, and strong stay, a defence from the heat, and a cover from the sun at noon,
      - type: text
        text: 20 A preservation from stumbling, and a help from falling; he raiseth up the soul, and enlighteneth the eyes, and giveth health, and life, and blessing.
      la:
      - type: citation
        text: Sir 34:14-20
      - type: text
        text: 14 Spíritus timéntium Deum quǽritur, et in respéctu illíus benedicétur.
      - type: text
        text: 15 Spes enim illórum in salvántem illos, et óculi Dei in diligéntes se.
      - type: citation
        text: '16 Qui timet Dóminum nihil trepidábit: et non pavébit, quóniam ipse est spes eius.'
      - type: text
        text: 17 Timéntis Dóminum, beáta est ánima eius.
      - type: text
        text: 18 Ad quem réspicit, et quis est fortitúdo eius?
      - type: citation
        text: '19 Óculi Dómini super timéntes eum: protéctor poténtiæ, firmaméntum virtútis, tégimen ardóris, et umbráculum meridiáni:'
      - type: citation
        text: '20 deprecátio offensiónis, et adiutórium casus: exáltans ánimam, et illúminans óculos, dans sanitátem, et vitam, et benedictiónem.'
