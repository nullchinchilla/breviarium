        - number: '86'
      - type: psalmody
        antiphon: Eréxit Iacob * lápidem in títulum, fundens óleum désuper.
        psalms:
        - number: '87'
      - type: psalmody
        antiphon: Qui hábitat * in adiutório Altíssimi, in protectióne Dei cæli commorábitur.
        psalms:
        - number: '90'
      - type: psalmody
        antiphon: Templum Dómini * sanctum est, Dei structúra est, Dei ædificátio est.
        psalms:
        - number: '95'
      - type: psalmody
        antiphon: Benedícta * glória Dómini, de loco sancto suo, allelúia.
