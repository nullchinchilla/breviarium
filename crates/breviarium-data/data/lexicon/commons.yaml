      - type: text
        text: 15 Et sic in Sion firmáta sum, et in civitáte sanctificáta simíliter requiévi, et in Ierúsalem potéstas mea.
      - type: response
        text: Deo grátias.
  chapter.sir-24-15-16-863b4dd6d5:
    role: chapter
    content:
