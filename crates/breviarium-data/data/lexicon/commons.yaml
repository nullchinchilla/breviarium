  responsory.clam-vit-p-pulus-ad-regem-alim-nta-petens-6acbf3d027:
    role: responsory
    content:
      en:
      - type: response
        text: The people cried to Pharaoh for bread
      - type: text
        text: And he answered them Go unto Joseph. Alleluia.
      - type: versicle
        text: The saving of our lives is in thy hand; only let us find grace in thy sight, and we will gladly be Pharaoh's servants.
      - type: response
        text: And he answered them Go unto Joseph. Alleluia.
      la:
      - type: response
        text: 'Clamávit pópulus ad regem, aliménta petens:'
      - type: text
        text: 'Quibus ille respóndit: Ite ad Ioseph, allelúia.'
      - type: versicle
        text: 'Salus nostra in manu tua est: réspice nos tantum, et læti serviémus regi.'
      - type: response
        text: 'Quibus ille respóndit: Ite ad Ioseph, allelúia.'
      en2:
      - type: response
        text: 'The people cried out to the king, asking for food:'
      - type: text
        text: 'To whom he answered: Go to Joseph, alleluia.'
      - type: versicle
        text: 'Our salvation is in your hand: look upon us only, and we will joyfully serve the king.'
      - type: response
        text: 'To whom he answered: Go to Joseph, alleluia.'
  responsory.congratul-mini-mihi-omnes-qui-dil-gitis-d-minum-9e2e39417d:
    role: responsory
    content:
      en:
      - type: response
        text: Rejoice with me, all ye that love the Lord, for while I was yet a little one, I pleased the Most High.
      - type: text
        text: And I have brought forth from my bowels God and man.
      - type: versicle
        text: All generations shall call me blessed, since the Lord hath regarded the lowliness of his handmaiden.
      - type: response
        text: And I have brought forth from my bowels God and man.
      la:
      - type: response
        text: 'Congratulámini mihi, omnes qui dilígitis Dóminum: quia cum essem párvula, plácui Altíssimo,'
      - type: text
        text: Et de meis viscéribus génui Deum et hóminem.
      - type: versicle
        text: Beátam me dicent omnes generatiónes, quia ancíllam húmilem respéxit Deus.
      - type: response
        text: Et de meis viscéribus génui Deum et hóminem.
      en2:
      - type: response
        text: 'Rejoice with me, all you who love the Lord: for when I was little, I pleased the Most High,'
      - type: text
        text: And from my own womb I brought forth God and man.
      - type: versicle
        text: All generations shall call me blessed, because God regarded his humble handmaid.
      - type: response
        text: And from my own womb I brought forth God and man.
  responsory.cor-na-urea-super-caput-eius-30f56e8068:
