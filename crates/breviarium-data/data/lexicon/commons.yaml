  reading.sed-dicit-liquis-et-quis-est-qui-possit-beat-rum-0b70e37c01:
    role: reading
    content:
      la:
      - type: text
        text: 'Sed dicit áliquis: Et quis est qui possit beatórum Mártyrum vestígia sequi? Huic ego respóndeo, quia non solum Mártyres, sed étiam ipsum Dóminum cum ipsíus adiutório, si vólumus, póssumus imitári. Audi non me, sed ipsum Dóminum géneri humáno clamántem: Díscite a me, quia mitis sum et húmilis corde. Audi et Petrum Apóstolum admonéntem: Christus passus est pro nobis, relínquens nobis exémplum ut sequámur vestígia eius.'
  reading.sed-dicit-liquis-et-quis-est-qui-possit-beat-rum-354bca02d7:
    role: reading
    content:
      en:
      - type: citation
        text: 'But some man will say: And who is he that can tread in the footsteps of the blessed Martyrs? To such an one I answer that, by the Lord''s help, we are able, if we so will, to tread in the footsteps, not of the blessed Martyrs only, but even of the same Lord Himself. Hearken, not to me, but to the same Lord, Who crieth unto all men: “Learn of Me, for I am meek and lowly in heart.” (Matth. xi. 29.) Hear also with what words the Apostle Peter warneth us: “Christ suffered for us, leaving us an example, that we should follow His steps.” (1 Pet. ii. 21.)'
      la:
      - type: text
        text: 'Sed dicit áliquis: Et quis est qui possit beatórum Mártyrum vestígia sequi? Huic ego respóndeo, quia non solum Mártyres, sed étiam ipsum Dóminum cum ipsíus adiutório, si vólumus, póssumus imitári. Audi non me, sed ipsum Dóminum géneri humáno clamántem: Díscite a me, quia mitis sum et húmilis corde. Audi et Petrum Apóstolum admonéntem: Christus passus est pro nobis, relínquens nobis exémplum ut sequámur vestígia eius.'
  reading.sed-habit-culum-cordis-nostri-evacu-tur-v-tiis-e-5bb72a64fe:
    role: reading
    content:
      en:
      - type: text
        text: Let the Tabernacle of our heart be swept clean of vices and filled with virtues. Let it be locked to the devil, and thrown open to Christ. Yea, let us so work, that we may be able to open the door of the kingdom of heaven with the key of good works. For even as evil works are so many bolts and bars to close against us the entrance into life, so beyond doubt are good works the key thereto. And therefore, dearly beloved brethren, let each one look into his own conscience, and when he findeth the wounds of guilt there, let him first strive by prayers, fasting, or alms deeds to purge his conscience, and so let him dare to take the Eucharist.
      la:
      - type: text
        text: Sed habitáculum cordis nostri evacuétur vítiis, et virtútibus repleátur; claudátur diábolo, et aperiátur Christo. Et ita labóremus, ut nobis bonórum óperum clávibus iánuam regni cæléstis aperíre possímus. Sicut enim malis opéribus, quasi quibúsdam seris ac véctibus, vitæ nobis ianua claudítur; ita, absque dubio, bonis opéribus aperítur. Et ídeo, fratres caríssimi, unusquísque consíderet consciéntiam suam, et, quando se áliquo crímine vulnerátum esse cognóverit, prius oratiónibus, ieiúniis vel eleemósynis stúdeat mundáre consciéntiam suam; et sic Eucharístiam præsúmat accípere.
  reading.sed-his-malis-pr-veni-ntibus-quia-non-statim-fin-57b28d5067:
    role: reading
    content:
      en:
      - type: text
        text: 'When these woes come, the end is not by and by. And He saith further Nation shall rise against nation, and kingdom against kingdom; and great earthquakes shall be in diverse places, and pestilences, and famines, and fearful sights and great signs shall there be from heaven. Before the last tribulation cometh, shall come many other tribulations: and, by the many woes which shall come first, shall be foreshadowed the everlasting woe which shall come in the end. And therefore, after wars and commotions, the end is not yet by and by many woes must come first, to give warning of the woe that hath no end.'
      la:
      - type: text
        text: 'Sed his malis præveniéntibus, quia non statim finis sequátur, adiúngit: Surget gens contra gentem, et regnum advérsus regnum: et terræmótus magni erunt per loca, et pestiléntiæ, et fames, terrorésque de cælo: et signa magna erunt. Última tribulátio multis tribulatiónibus prævenítur: et per crebra mala, quæ prævéniunt, indicántur mala perpétua, quæ subsequéntur. Et ídeo post bella et seditiónes non statim finis: quia multa debent mala præcúrrere, ut malum váleant sine fine nuntiáre.'
  reading.sed-his-malis-pr-veni-ntibus-quia-non-statim-fin-b5afff76bb:
    role: reading
    content:
      la:
      - type: text
        text: 'Sed his malis præveniéntibus, quia non statim finis sequátur, adiúngit: Surget gens contra gentem, et regnum advérsus regnum: et terræmótus magni erunt per loca, et pestiléntiæ, et fames, terrorésque de cælo: et signa magna erunt. Última tribulátio multis tribulatiónibus prævenítur: et per crebra mala, quæ prævéniunt, indicántur mala perpétua, quæ subsequéntur. Et ídeo post bella et seditiónes non statim finis: quia multa debent mala præcúrrere, ut malum váleant sine fine nuntiáre.'
  reading.sed-is-qui-quinque-tal-nta-acc-perat-lia-quinque-18670d56c1:
    role: reading
    content:
      la:
      - type: text
        text: 'Sed is, qui quinque talénta accéperat, ália quinque lucrátus est: quia sunt nonnúlli, qui, etsi intérna ac mýstica penetráre nésciunt, pro intentióne tamen supérnæ pátriæ docent recta quos possunt; de ipsis exterióribus, quæ accepérunt, duplum taléntum portant; dumque se a carnis petulántia et a terrenárum rerum ámbitu atque a visibílium voluptáte custódiunt, ab his étiam álios admonéndo compéscunt. Et sunt nonnúlli, qui, quasi duóbus taléntis ditáti, intelléctum atque operatiónem percípiunt, subtília de intérnis intélligunt, mira in exterióribus operántur; cumque et intelligéndo et operándo áliis prǽdicant, quasi duplicátum de negótio lucrum repórtant.'
      - type: text
        text: 'Te Deum laudámus: * te Dóminum confitémur.'
      - type: text
        text: Te ætérnum Patrem * omnis terra venerátur.
      - type: text
        text: 'Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:'
      - type: text
        text: 'Tibi Chérubim et Séraphim * incessábili voce proclámant:'
      - type: text
        text: (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
      - type: text
        text: Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
      - type: text
        text: Te gloriósus * Apostolórum chorus,
      - type: text
        text: Te Prophetárum * laudábilis númerus,
      - type: text
        text: Te Mártyrum candidátus * laudat exércitus.
      - type: text
        text: Te per orbem terrárum * sancta confitétur Ecclésia,
      - type: text
        text: Patrem * imménsæ maiestátis;
      - type: text
        text: Venerándum tuum verum * et únicum Fílium;
      - type: text
        text: Sanctum quoque * Paráclitum Spíritum.
      - type: text
        text: Tu Rex glóriæ, * Christe.
      - type: text
        text: Tu Patris * sempitérnus es Fílius.
      - type: text
        text: '(Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: 'Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
      - type: text
        text: Tu ad déxteram Dei sedes, * in glória Patris.
      - type: text
        text: Iudex créderis * esse ventúrus.
      - type: text
        text: (Sequens versus dicitur flexis genibus) ~
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória numerári.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória munerári.
      - type: text
        text: Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
      - type: text
        text: Et rege eos, * et extólle illos usque in ætérnum.
      - type: text
        text: Per síngulos dies * benedícimus te.
      - type: text
        text: (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Dignáre, Dómine, die isto * sine peccáto nos custodíre.
      - type: text
        text: Miserére nostri, Dómine, * miserére nostri.
      - type: text
        text: Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
      - type: text
        text: 'In te, Dómine, sperávi: * non confúndar in ætérnum.'
  reading.sed-is-qui-quinque-tal-nta-acc-perat-lia-quinque-b97aa7f539:
    role: reading
    content:
      en:
      - type: text
        text: And so he that had received five talents, gained other five talents for some there be who, while yet they are not able to go on unto things inward and mystic, do yet so desire our Fatherland which is above, that they teach well all whom they can, and of those very outward things which they have received make gain double. These are they which keep themselves clean from the unruly motions of the flesh, and from the lust of the world, and from the delight of things which are seen, and, by their preaching, keep other men also clean from all these things. And some there are who receive, as their two talents, the power to think and the power to work. These are they which inwardly understand dark things, and outwardly work wonders. And these, since they preach unto others, both through their understanding and their works, gain, as it were, double, for the talents which they have received.
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
      - type: text
        text: O Lord, have mercy upon us, * have mercy upon us.
      - type: text
        text: O Lord, let thy mercy lighten upon us, * as our trust is in thee.
      - type: text
        text: O Lord, in thee have I trusted, * let me never be confounded.
