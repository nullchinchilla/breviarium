  collect.deus-qui-inter-c-tera-pot-nti-tu-mir-cula-tiam-i-8ddd098952:
    role: collect
    content:
      en:
      - type: text
        text: O God, Who among the other miracles of thy power have bestowed the victory of martyrdom even upon the weaker sex, graciously grant that we who commemorate the anniversary of the death of blessed N., thy Virgin and Martyr, may come to thee by the path of her example.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui inter cétera poténtiæ tuæ mirácula étiam in sexu frágili victóriam martýrii contulísti: concéde propítius; ut, qui beátæ N. Vírginis et Mártyris tuæ natalícia cólimus, per eius ad te exémpla gradiámur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who among the other wonders of your power have also bestowed the victory of martyrdom upon the frail sex: graciously grant that we, who celebrate the birth to heaven of your blessed Virgin and Martyr N., may advance toward you by her example.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.deus-qui-inter-c-tera-pot-nti-tu-mir-cula-tiam-i-f62d3d1090:
    role: collect
    content:
      en:
      - type: text
        text: O God, Who, amidst the wondrous work of thy divine power, dost make even weak women to be more than conquerors in the uplifting of their testimony, mercifully grant unto all us which do keep the birthday of thy blessed witness N., grace to follow her steps toward thee.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui inter cétera poténtiæ tuæ mirácula étiam in sexu frágili victóriam martýrii contulísti: concéde propítius; ut, qui beátæ N. Mártyris tuæ natalícia cólimus, per eius ad te exémpla gradiámur.'
