      - type: text
        text: 11 Ipse palam fáciet disciplínam doctrínæ suæ, et in lege testaménti Dómini gloriábitur.
      - type: text
        text: 12 Collaudábunt multi sapiéntiam eius, et usque in sǽculum non delébitur.
      - type: text
        text: 13 Non recédet memória eius, et nomen eius requirétur a generatióne in generatiónem.
      - type: text
        text: 14 Sapiéntiam eius enarrábunt gentes, et laudem eius enuntiábit Ecclésia.
