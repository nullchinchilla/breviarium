  hymn.m-rentes-culi-spargite-l-crimas-2d47ce04ec:
    role: hymn
    content:
      la:
      - type: text
        text: Mœrentes óculi spargite lácrimas
      - type: text
        text: Et luctu resonent íntima córdium,
      - type: text
        text: Illátas refero Numini ab ímpiis
      - type: text
        text: Pœnas et fera vúlnera.
      - type: text
        text: Accincta heu! gladiis turba satellitum.
      - type: text
        text: Arreptum Dóminum fústibus impetit,
      - type: text
        text: Nunc cædit cólaphis, nunc quatit horridis
      - type: text
        text: Divínum Caput íctibus.
      - type: text
        text: Haud finis sceleri; tráditur improbo
      - type: text
        text: Christus carnifici; nec mora, barbarus
      - type: text
        text: In Regem superum non timet, ímpio
      - type: text
        text: Ausu, vertere déxteram.
      - type: text
        text: Audíte o Pópuli, Numen amábile,
      - type: text
        text: Manánte ex húmeris úndique sánguine,
      - type: text
        text: Lictoris rabidi sústinet impetum,
      - type: text
        text: Et vocem premit ínnocens.
      - type: text
        text: 'Quis non illacrimet! Iam nova condidi:'
      - type: text
        text: Torménta indomitæ Gentis iníquitas.
      - type: text
        text: Infigit cerebro; proh dolor! efferis
      - type: text
        text: Sertum vepribus asperum.
      - type: text
        text: Heu crimen! tráhitur funibus improbis
      - type: text
        text: Funesti Dóminus supplicii ad locum;
      - type: text
        text: Illic oppétiit, fúnere spíritum
      - type: text
        text: Patri restituens suo.
      - type: text
        text: Passo pro miseris tam fera vúlnera
      - type: text
        text: In terris resonet débita glória;
      - type: text
        text: Sacrumque assídue Nomen in æthera
      - type: text
        text: Humánum genus efferat.
      - type: text
        text: Amen.
  hymn.o-glori-sa-v-rginum-bd4fe846cd:
    role: hymn
    content:
      en:
      - type: text
        text: O glorious lady! throned on high
      - type: text
        text: Above the star-illumined sky;
      - type: text
        text: Thereto ordained, thy bosom lent
      - type: text
        text: To thy Creator nourishment.
      - type: text
        text: Through thy sweet offspring we receive
      - type: text
        text: The bliss once lost through hapless Eve;
      - type: text
        text: And heaven to mortals open lies
      - type: text
        text: Now thou art portal of the skies.
      - type: text
        text: Thou art the door of heaven's high King,
      - type: text
        text: Light's gateway fair and glistering;
      - type: text
        text: Life through a Virgin is restored;
      - type: text
        text: Ye ransomed nations, praise the Lord!
      - type: text
        text: All honour, laud, and glory be,
      - type: text
        text: O Jesu, Virgin-born, to thee;
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To Father and to Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: O gloriósa vírginum,
      - type: text
        text: Sublímis inter sídera,
      - type: text
        text: Qui te creávit, párvulum
      - type: text
        text: Lacténte nutris úbere.
      - type: text
        text: Quod Heva tristis ábstulit,
      - type: text
        text: 'Tu reddis almo gérmine:'
      - type: text
        text: Intrent ut astra flébiles,
      - type: text
        text: Cæli reclúdis cárdines.
      - type: text
        text: Tu Regis alti iánua
      - type: text
        text: 'Et aula lucis fúlgida:'
      - type: text
        text: Vitam datam per Vírginem,
      - type: text
        text: Gentes redémptæ, pláudite.
      - type: text
        text: '* Iesu tibi sit glória,'
      - type: text
        text: Qui natus es de Vírgine,
      - type: text
        text: Cum Patre, et almo Spíritu,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.o-glori-sa-v-rginum-f108b17bdc:
    role: hymn
    content:
      la:
      - type: text
        text: O gloriósa vírginum,
