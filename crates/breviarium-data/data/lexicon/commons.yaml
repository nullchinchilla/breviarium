  responsory.isti-sunt-agni-nov-lli-qui-annuntiav-runt-allel-439ae87da3:
    role: responsory
    content:
      en:
      - type: response
        text: These are the young lambs, who were promised, they are just coming to the fountains.
      - type: text
        text: '* They are filled with glory, alleluia, alleluia.'
      - type: versicle
        text: In sight of the Lamb, clothed with white robes, and palms in their hands.
      - type: response
        text: They are filled with glory, alleluia, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: They are filled with glory, alleluia, alleluia.
      la:
      - type: response
        text: Isti sunt agni novélli, qui annuntiavérunt, allelúia, modo venérunt ad fontes,
      - type: text
        text: '* Repléti sunt claritáte, allelúia, allelúia.'
      - type: versicle
        text: In conspéctu Agni amícti sunt stolis albis, et palmæ in mánibus eórum.
      - type: response
        text: Repléti sunt claritáte, allelúia, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Repléti sunt claritáte, allelúia, allelúia.
  responsory.isti-sunt-qui-viv-ntes-in-carne-plantav-runt-ecc-38bbbc956b:
    role: responsory
    content:
      en:
      - type: response
        text: These are they who while yet they lived in the flesh, planted the Church in their own blood;
      - type: text
        text: '* They drank of the Lord''s cup, and became the friends of God.'
      - type: versicle
        text: Their sound is gone out through all the earth, and their words to the ends of the world.
      - type: response
        text: They drank of the Lord's cup, and became the friends of God.
      la:
      - type: response
        text: 'Isti sunt qui vivéntes in carne, plantavérunt Ecclésiam sánguine suo:'
      - type: text
        text: '* Cálicem Dómini bibérunt, et amíci Dei facti sunt.'
      - type: versicle
        text: In omnem terram exívit sonus eórum, et in fines orbis terræ verba eórum.
      - type: response
        text: Cálicem Dómini bibérunt, et amíci Dei facti sunt.
  responsory.isti-sunt-triumphat-res-et-am-ci-dei-qui-contemn-eb89f0f02c:
    role: responsory
    content:
      en:
      - type: response
        text: These are they which have conquered, and are become the friends of God, who recked not of the commandments of princes, and earned the everlasting reward.
      - type: text
        text: '* And now have they crowns on their heads, and palms in their hands.'
      - type: versicle
        text: These are they which came out of great tribulation, and have washed their robes in the blood of the Lamb.
      - type: response
        text: And now have they crowns on their heads, and palms in their hands.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: And now have they crowns on their heads, and palms in their hands.
      la:
      - type: response
        text: 'Isti sunt triumphatóres et amíci Dei, qui contemnéntes iussa príncipum, meruérunt prǽmia ætérna:'
      - type: text
        text: '* Modo coronántur, et accípiunt palmam.'
      - type: versicle
        text: Isti sunt qui venérunt ex magna tribulatióne, et lavérunt stolas suas in sánguine Agni.
      - type: response
        text: Modo coronántur, et accípiunt palmam.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Modo coronántur, et accípiunt palmam.
  responsory.isti-sunt-viri-sancti-quos-el-git-d-minus-in-car-ec172345bd:
    role: responsory
    content:
      en:
      - type: response
        text: These men are saints, whom the Lord hath chosen in love unfeigned, and hath given them glory everlasting. These are they
      - type: text
        text: '* By the light of whose teaching the Church is glorified, even as the moon is glorified by the light of the sun.'
      - type: versicle
        text: The saints through faith subdued kingdoms, wrought righteousness.
      - type: response
        text: By the light of whose teaching the Church is glorified, even as the moon is glorified by the light of the sun.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: By the light of whose teaching the Church is glorified, even as the moon is glorified by the light of the sun.
      la:
      - type: response
        text: 'Isti sunt viri sancti, quos elégit Dóminus in caritáte non ficta, et dedit illis glóriam sempitérnam:'
      - type: text
        text: '* Quorum doctrína fulget Ecclésia, ut sole luna.'
      - type: versicle
        text: 'Sancti per fidem vicérunt regna: operáti sunt iustítiam.'
      - type: response
        text: Quorum doctrína fulget Ecclésia, ut sole luna.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quorum doctrína fulget Ecclésia, ut sole luna.
  responsory.iur-vit-d-minus-et-non-p-nit-bit-eum-617d6f7a9b:
    role: responsory
    content:
      la:
      - type: response
        text: 'Iurávit Dóminus, et non pœnitébit eum:'
      - type: text
        text: '* Tu es sacérdos in ætérnum secúndum órdinem Melchísedech.'
      - type: versicle
        text: Dixit Dóminus Dómino meo, Sede a dextris meis.
      - type: response
        text: Tu es sacérdos in ætérnum secúndum órdinem Melchísedech.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Tu es sacérdos in ætérnum secúndum órdinem Melchísedech.
  responsory.iur-vit-d-minus-et-non-p-nit-bit-eum-ec29d13db1:
    role: responsory
    content:
      en:
      - type: response
        text: The Lord hath sworn and will not repent
      - type: text
        text: '* Thou art a Priest for ever after the order of Melchisedek.'
      - type: versicle
        text: The Lord said unto my Lord Sit Thou at My right hand.
      - type: response
        text: '* Thou art a Priest for ever after the order of Melchisedek.'
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Thou art a Priest for ever after the order of Melchisedek.
      la:
      - type: response
        text: 'Iurávit Dóminus, et non pœnitébit eum:'
      - type: text
        text: '* Tu es sacérdos in ætérnum secúndum órdinem Melchísedech.'
      - type: versicle
        text: Dixit Dóminus Dómino meo, Sede a dextris meis.
      - type: response
        text: Tu es sacérdos in ætérnum secúndum órdinem Melchísedech.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Tu es sacérdos in ætérnum secúndum órdinem Melchísedech.
  responsory.iustus-germin-bit-sicut-l-lium-04dd175560:
    role: responsory
    content:
      en:
      - type: response
        text: The righteous shall grow as the lily;
      - type: text
        text: '* Yea, he shall flourish in the presence of the Lord for ever.'
      - type: versicle
        text: Those that be planted in the house of the Lord, shall flourish in the courts of the house of our God.
      - type: response
        text: Yea, he shall flourish in the presence of the Lord for ever.
      la:
      - type: response
        text: 'Iustus germinábit sicut lílium:'
      - type: text
        text: '* Et florébit in ætérnum ante Dóminum.'
      - type: versicle
        text: Plantátus in domo Dómini, in átriis domus Dei nostri.
      - type: response
        text: Et florébit in ætérnum ante Dóminum.
  responsory.iustus-germin-bit-sicut-l-lium-2583734184:
    role: responsory
    content:
      la:
      - type: response
        text: 'Iustus germinábit sicut lílium:'
      - type: text
        text: '* Et florébit in ætérnum ante Dóminum.'
      - type: versicle
        text: Plantátus in domo Dómini, in átriis domus Dei nostri.
      - type: response
        text: Et florébit in ætérnum ante Dóminum.
  responsory.iustus-germin-bit-sicut-l-lium-be89978425:
    role: responsory
    content:
      en:
      - type: response
        text: The righteous shall grow as the lily
      - type: text
        text: '* Yea, he shall flourish in the presence of the Lord for ever.'
      - type: versicle
        text: Those that be planted in the house of the Lord, shall flourish in the courts of the house of our God.
      - type: response
        text: Yea, he shall flourish in the presence of the Lord for ever.
      la:
      - type: response
        text: 'Iustus germinábit sicut lílium:'
      - type: text
