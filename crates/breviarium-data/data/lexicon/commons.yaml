        text: Et dedit illi claritátem ætérnam.
  responsory.iam-l-tus-m-riar-quia-vidi-f-ciem-tuam-et-sup-rs-d0d4b08e42:
    role: responsory
    content:
      en:
      - type: response
        text: Now shall I die happy, since I have seen thy face, and do leave thee behind me. I am not disappointed of seeing thee.
      - type: text
        text: '* The Lord hath showed me also thy seed. Alleluia.'
      - type: versicle
        text: He That hath fed me from my youth up, bless the lads, and let my name be named on them.
      - type: response
        text: The Lord hath showed me also thy seed. Alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: The Lord hath showed me also thy seed. Alleluia.
      la:
      - type: response
        text: 'Iam lætus móriar, quia vidi fáciem tuam, et supérstitem te relínquo. Non sum fraudátus aspéctu tuo:'
      - type: text
        text: '* Ínsuper osténdit mihi Dóminus semen tuum, allelúia.'
      - type: versicle
        text: Qui pascit me ab adolescéntia mea, benedícat púeris istis, et invocétur super eos nomen meum.
      - type: response
        text: Ínsuper osténdit mihi Dóminus semen tuum, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Ínsuper osténdit mihi Dóminus semen tuum, allelúia.
  responsory.in-dedicati-ne-templi-decant-bat-p-pulus-laudem-bf321f0836:
    role: responsory
    content:
      en:
      - type: response
        text: When the Temple was dedicated the people sang praise;
      - type: text
        text: '* And sweet in their mouths was the sound.'
      - type: versicle
        text: The Lord's house is established in the top of the mountains; and all nations shall flow unto it.
      - type: response
        text: And sweet in their mouths was the sound.
      la:
      - type: response
        text: 'In dedicatióne templi decantábat pópulus laudem:'
      - type: text
        text: '* Et in ore eórum dulcis resonábat sonus.'
      - type: versicle
        text: Fundáta est domus Dómini supra vérticem móntium, et vénient ad eam omnes gentes.
      - type: response
        text: Et in ore eórum dulcis resonábat sonus.
  responsory.in-m-dio-eccl-si-ap-ruit-os-eius-abfe2a23f7:
    role: responsory
    content:
      en:
      - type: response
        text: In the midst of the congregation did the Lord open his mouth.
      - type: text
        text: '* And filled him with the spirit of wisdom and understanding.'
      - type: versicle
        text: He made him rich with joy and gladness.
      - type: response
        text: And filled him with the spirit of wisdom and understanding.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: And filled him with the spirit of wisdom and understanding.
      la:
      - type: response
        text: In médio Ecclésiæ apéruit os eius,
      - type: text
        text: '* Et implévit eum Dóminus spíritu sapiéntiæ et intelléctus.'
      - type: versicle
        text: Iucunditátem et exsultatiónem thesaurizávit super eum.
      - type: response
        text: Et implévit eum Dóminus spíritu sapiéntiæ et intelléctus.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et implévit eum Dóminus spíritu sapiéntiæ et intelléctus.
  responsory.in-servis-suis-allel-ia-775dc0bde6:
    role: responsory
    content:
      en:
      - type: response
        text: His servants, alleluia
      - type: text
        text: '* God will comfort, alleluia, alleluia.'
      - type: versicle
        text: The Lord will judge His people and, His servants,
      - type: response
        text: God will comfort, alleluia, alleluia.
      la:
      - type: response
        text: In servis suis, allelúia,
      - type: text
        text: '* Consolábitur Deus, allelúia.'
      - type: versicle
        text: Iudicábit Dóminus pópulum suum, et in servis suis.
      - type: response
        text: Consolábitur Deus, allelúia.
  responsory.inv-ni-david-servum-meum-leo-sancto-meo-unxi-eum-22ca7edd81:
    role: responsory
    content:
      la:
      - type: response
        text: 'Invéni David servum meum, óleo sancto meo unxi eum:'
      - type: text
        text: '* Manus enim mea auxiliábitur ei.'
      - type: versicle
        text: Nihil profíciet inimícus in eo, et fílius iniquitátis non nocébit ei.
      - type: response
        text: Manus enim mea auxiliábitur ei.
  responsory.inv-ni-david-servum-meum-leo-sancto-meo-unxi-eum-66708cbbe3:
    role: responsory
    content:
      en:
      - type: response
        text: I have found David My servant, with My holy oil have I anointed him
      - type: text
        text: '* For My hand shall help him.'
      - type: versicle
        text: The enemy shall prevail nothing against him, nor the son of wickedness afflict him.
      - type: response
        text: For My hand shall help him.
      la:
      - type: response
        text: 'Invéni David servum meum, óleo sancto meo unxi eum:'
      - type: text
        text: '* Manus enim mea auxiliábitur ei.'
      - type: versicle
        text: Nihil profíciet inimícus in eo, et fílius iniquitátis non nocébit ei.
      - type: response
        text: Manus enim mea auxiliábitur ei.
  responsory.ioseph-fili-david-noli-tim-re-acc-pere-mar-am-c-e297fe9014:
    role: responsory
    content:
      en:
      - type: response
        text: Joseph, thou Son of David, fear not to take unto thee Mary thy wife; for That Which is conceived in her is of the Holy Ghost and she shall bring forth a Son;
      - type: text
        text: '* And thou shalt call His Name Jesus. Alleluia.'
      - type: versicle
        text: For He shall save His people from their sins.
      - type: response
        text: And thou shalt call His Name Jesus. Alleluia.
      la:
      - type: response
        text: 'Ioseph, fili David, noli timére accípere Maríam cóniugem tuam; quod enim in ea natum est, de Spíritu Sancto est: páriet autem fílium,'
      - type: text
        text: '* Et vocábis nomen eius Iesum, allelúia.'
      - type: versicle
        text: Ipse enim salvum fáciet pópulum suum a peccátis eórum.
      - type: response
        text: Et vocábis nomen eius Iesum, allelúia.
  responsory.iste-cogn-vit-iust-tiam-et-vidit-mirab-lia-magna-3be11d3124:
    role: responsory
    content:
      la:
      - type: response
        text: 'Iste cognóvit iustítiam, et vidit mirabília magna, et exorávit Altíssimum:'
      - type: text
        text: '* Et invéntus est in número Sanctórum.'
      - type: versicle
        text: Iste est qui contémpsit vitam mundi, et pervénit ad cæléstia regna.
      - type: response
        text: Et invéntus est in número Sanctórum.
      - type: versicle
