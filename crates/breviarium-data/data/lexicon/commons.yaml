  reading.si-enim-agn-scens-re-tum-suum-ipse-se-a-div-no-a-50dacba74b:
    role: reading
    content:
      en:
      - type: text
        text: For if he acknowledge his iniquity, and withdraw himself from the Altar of God, he will soon attain unto the mercy of the pardon of God, for, as he that exalted himself shall be abased, so shall he that humbleth himself be exalted. (Luke xiv. n.) He who, as I have said, acknowledging his iniquity, withdraweth himself through lowliness from the Altar of the Church, till he have mended his life, need have but little fear that he will be excommunicated from the eternal marriage supper in heaven.
      la:
      - type: text
        text: Si enim, agnóscens reátum suum, ipse se a divíno altári subtráxerit, cito ad indulgéntiam divínæ misericórdiæ pervéniet. Quia, sicut qui se exáltat, humiliábitur; ita, e contrário, qui se humíliat ab altári Ecclésiæ pro emendatióne vitæ removére volúerit, ab ætérno illo et cælésti convívio excommunicári pénitus non timébit.
  reading.sir-24-11-13-3f6188b9d1:
    role: reading
    content:
      la:
      - type: citation
        text: Sir 24:11-13
      - type: text
        text: 11 In ómnibus réquiem quæsívi, et in hereditáte Dómini morábor.
      - type: citation
        text: '12 Tunc præcépit, et dixit mihi Creátor ómnium: et qui creávit me, requiévit in tabernáculo meo.'
      - type: citation
        text: '13 Et dixit mihi: In Iacob inhábita, et in Israël hereditáre, et in eléctis meis mitte radíces.'
  reading.sir-24-11-13-efb9482203:
    role: reading
    content:
      en:
      - type: citation
        text: Sir 24:11-13
      - type: citation
        text: '11 And by my power I have trodden under my feet the hearts of all the high and low: and in all these I sought rest, and I shall abide in the inheritance of the Lord.'
      - type: citation
        text: '12 Then the creator of all things commanded, and said to me: and he that made me, rested in my tabernacle,'
      - type: citation
        text: '13 And he said to me: Let thy dwelling be in Jacob, and thy inheritance in Israel, and take root in my elect.'
