  responsory.l-bera-me-d-mine-de-morte-t-rna-in-die-illa-trem-d4862e7c91:
    role: responsory
    content:
      en:
      - type: response
        text: Deliver me, O Lord, from eternal death in that awful day;
      - type: text
        text: '* when the heavens and the earth shall be shaken, and Thou shalt come to judge the world by fire.'
      - type: versicle
        text: Quaking and dread take hold upon me, when I look for the coming of the trial and the wrath to come.
      - type: response
        text: When the heavens and the earth shall be shaken.
      - type: versicle
        text: That day is a day of wrath, of wasteness and desolation, a great day and exceeding bitter.
      - type: response
        text: When Thou shalt come to judge the world by fire.
      - type: versicle
        text: Eternal rest * grant unto them, O Lord.
      - type: response
        text: And let perpetual light * shine upon them.
      - type: response
        text: Deliver me, O Lord, from eternal death in that awful day, when the heavens and the earth shall be shaken, and Thou shalt come to judge the world by fire.
      la:
      - type: response
        text: Líbera me, Dómine, de morte ætérna in die illa treménda,
      - type: text
        text: '* Quando cæli movéndi sunt et terra, * Dum véneris iudicáre sǽculum per ignem.'
      - type: versicle
        text: Tremens factus sum ego et tímeo, dum discússio vénerit atque ventúra ira.
      - type: response
        text: Quando cæli movéndi sunt et terra.
      - type: versicle
        text: Dies illa, dies iræ, calamitátis et misériæ, dies magna et amára valde.
      - type: response
        text: Dum véneris iudicáre sǽculum per ignem.
      - type: versicle
        text: Réquiem ætérnam * dona eis, Dómine.
      - type: response
        text: Et lux perpétua * lúceat eis.
      - type: response
        text: Líbera me, Dómine, de morte ætérna in die illa treménda, * Quando cæli movéndi sunt et terra, * Dum véneris iudicáre sǽculum per ignem.
  responsory.l-bera-me-d-mine-de-viis-inf-rni-qui-portas-reas-a37d4b468f:
    role: responsory
    content:
      en:
      - type: response
        text: Deliver me from the ways of hell, O Lord, Who didst break the gates of brass in sunder, and didst descend into hell, and give them light,
      - type: text
        text: '* That they that sat in affliction and darkness might behold thee.'
      - type: versicle
        text: Crying and saying, Thou hast come, O our Redeemer
      - type: response
        text: That they that sat in affliction and darkness might behold thee.
      - type: versicle
        text: Eternal rest * grant unto them, O Lord.
      - type: response
        text: And let perpetual light * shine upon them.
      - type: response
        text: That they that sat in affliction and darkness might behold thee.
      la:
      - type: response
        text: 'Líbera me, Dómine, de viis inférni, qui portas ǽreas confregísti: et visitásti inférnum, et dedísti eis lumen, ut vidérent te:'
      - type: text
        text: '* Qui erant in pœnis tenebrárum.'
      - type: versicle
        text: 'Clamántes et dicéntes: Advenísti, Redémptor noster.'
      - type: response
        text: Qui erant in pœnis tenebrárum.
      - type: versicle
        text: Réquiem ætérnam * dona eis, Dómine.
      - type: response
        text: Et lux perpétua * lúceat eis.
      - type: response
        text: Qui erant in pœnis tenebrárum.
  responsory.l-pides-preti-si-omnes-muri-tui-57e12e4a2b:
    role: responsory
    content:
      en:
      - type: response
        text: All thy walls are of stones most precious.
      - type: text
        text: '* The towers of Jerusalem shall be built up with jewels.'
      - type: versicle
        text: The gates of Jerusalem shall be built up with the sapphire stone, and the emerald, and all her walls round about with stones most precious.
      - type: response
        text: The towers of Jerusalem shall be built up with jewels.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: The towers of Jerusalem shall be built up with jewels.
      la:
      - type: response
        text: Lápides pretiósi omnes muri tui,
      - type: text
        text: '* Et turres Ierúsalem gemmis ædificabúntur.'
      - type: versicle
        text: Portæ Ierúsalem ex sapphíro et smarágdo ædificabúntur, et ex lápide pretióso omnis circúitus muri eius.
      - type: response
        text: Et turres Ierúsalem gemmis ædificabúntur.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et turres Ierúsalem gemmis ædificabúntur.
  responsory.lux-perp-tua-luc-bit-sanctis-tuis-d-mine-329da6f11b:
    role: responsory
    content:
      en:
      - type: response
        text: Eternal light will shine over your saints, O Lord,
      - type: text
        text: '* And the eternity of the times, alleluia, alleluia.'
      - type: versicle
        text: Everlasting joy shall be upon their heads, they shall obtain joy and gladness
      - type: response
        text: And the eternity of the times, alleluia, alleluia.
      la:
      - type: response
        text: Lux perpétua lucébit Sanctis tuis, Dómine,
      - type: text
        text: '* Et ætérnitas témporum, allelúia, allelúia.'
      - type: versicle
        text: 'Lætítia sempitérna erit super cápita eórum: gáudium et exsultatiónem obtinébunt.'
      - type: response
        text: Et ætérnitas témporum, allelúia, allelúia.
  responsory.m-dia-nocte-clamor-factus-est-fad07c6b46:
    role: responsory
    content:
      en:
      - type: response
        text: 'At midnight there was a cry made:'
      - type: text
        text: '* Behold, the Bridegroom cometh, go ye out to meet him.'
      - type: versicle
        text: Trim your lamps, O ye wise virgins.
      - type: response
        text: Behold, the Bridegroom cometh, go ye out to meet him.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Behold, the Bridegroom cometh, go ye out to meet him.
      la:
      - type: response
        text: 'Média nocte clamor factus est:'
      - type: text
        text: '* Ecce sponsus venit, exíte óbviam ei.'
      - type: versicle
        text: Prudéntes vírgines, aptáte vestras lámpades.
      - type: response
        text: Ecce sponsus venit, exíte óbviam ei.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Ecce sponsus venit, exíte óbviam ei.
  responsory.mane-surgens-iacob-erig-bat-l-pidem-in-t-tulum-f-ac47464088:
    role: responsory
    content:
      en:
      - type: response
        text: Jacob rose up early in the morning, and set up the stone for a pillar, and poured oil upon the top of it, and vowed a vow unto the Lord.
      - type: text
        text: '* Surely this place is holy, and I knew it not.'
      - type: versicle
        text: And Jacob awaked out of his sleep, and he said
      - type: response
        text: Surely this place is holy, and I knew it not.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Surely this place is holy, and I knew it not.
      la:
      - type: response
        text: 'Mane surgens Iacob, erigébat lápidem in títulum, fundens óleum désuper; votum vovit Dómino:'
      - type: text
        text: '* Vere locus iste sanctus est, et ego nesciébam.'
      - type: versicle
        text: Cumque evigilásset Iacob de somno, ait.
      - type: response
        text: Vere locus iste sanctus est, et ego nesciébam.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Vere locus iste sanctus est, et ego nesciébam.
  responsory.mem-nto-mei-deus-quia-ventus-est-vita-mea-1d5e796dd1:
    role: responsory
    content:
      en:
      - type: response
        text: Remember, O God, that my life is wind.
      - type: text
        text: '* The eye of him that hath seen me shall see me no more.'
      - type: versicle
        text: Out of the depths have I cried unto thee, O Lord! Lord, hear my voice.
      - type: response
        text: The eye of him that hath seen me shall see me no more.
      la:
      - type: response
        text: Meménto mei, Deus, quia ventus est vita mea,
      - type: text
        text: '* Nec aspíciat me visus hóminis.'
      - type: versicle
        text: 'De profúndis clamávi ad te, Dómine: Dómine, exáudi vocem meam.'
      - type: response
        text: Nec aspíciat me visus hóminis.
  responsory.missus-est-g-briel-angelus-ad-mar-am-v-rginem-de-6d11efb352:
    role: responsory
    content:
      en:
      - type: response
        text: The angel Gabriel was sent to Mary, a Virgin espoused to Joseph, to bring unto her the word of the Lord and when the Virgin saw the light she was afraid. Fear not, Mary, for thou hast found grace from the Lord.
      - type: text
        text: '* Behold, thou shalt conceive and bring forth a son, and He shall be called the Son of the Highest. (Alleluia.)'
      - type: versicle
        text: The Lord God shall give unto Him the throne of His father David, and He shall reign over the house of Jacob for ever.
      - type: response
        text: Behold, thou shalt conceive and bring forth a son, and He shall be called the Son of the Highest. (Alleluia.)
      la:
      - type: response
        text: 'Missus est Gábriel Angelus ad Maríam Vírginem desponsátam Ioseph, núntians ei verbum; et expavéscit Virgo de lúmine: ne tímeas, María, invenísti grátiam apud Dóminum:'
      - type: text
        text: '* Ecce concípies et páries, et vocábitur Altíssimi Fílius. (Allelúia.)'
      - type: versicle
        text: Dabit ei Dóminus Deus sedem David, patris eius, et regnábit in domo Iacob in ætérnum.
      - type: response
        text: Ecce concípies et páries, et vocábitur Altíssimi Fílius. (Allelúia.)
  responsory.ne-record-ris-pecc-ta-mea-d-mine-7d84edc447:
    role: responsory
    content:
      en:
      - type: response
        text: Hold not my sins in remembrance, O Lord,
      - type: text
        text: '* When thou comest to judge the world by fire.'
      - type: versicle
        text: Make my way straight before thy face, O Lord my God.
      - type: response
        text: When thou comest to judge the world by fire.
      - type: versicle
        text: Eternal rest * grant unto them, O Lord.
      - type: response
        text: And let perpetual light * shine upon them.
      - type: response
        text: When thou comest to judge the world by fire.
      la:
      - type: response
        text: Ne recordéris peccáta mea, Dómine,
      - type: text
        text: '* Dum véneris iudicáre sǽculum per ignem.'
      - type: versicle
        text: Dírige, Dómine, Deus meus, in conspéctu tuo viam meam.
      - type: response
        text: Dum véneris iudicáre sǽculum per ignem.
      - type: versicle
        text: Réquiem ætérnam * dona eis, Dómine.
      - type: response
        text: Et lux perpétua * lúceat eis.
      - type: response
        text: Dum véneris iudicáre sǽculum per ignem.
  responsory.o-quam-metu-ndus-est-locus-iste-718832e143:
    role: responsory
    content:
      en:
      - type: response
        text: How dreadful is this place!
      - type: text
        text: '* Surely this is none other but the house of God, and this is the gate of heaven.'
      - type: versicle
        text: This is the house of God, stoutly builded, well founded upon a sure rock.
      - type: response
        text: Surely this is none other but the house of God, and this is the gate of heaven.
      la:
      - type: response
        text: 'O quam metuéndus est locus iste:'
      - type: text
        text: '* Vere non est hic áliud nisi domus Dei et porta cæli.'
      - type: versicle
        text: Hæc est domus Dómini fírmiter ædificáta, bene fundáta est supra firmam petram.
      - type: response
        text: Vere non est hic áliud nisi domus Dei et porta cæli.
  responsory.or-ntibus-in-loco-isto-7232253939:
    role: responsory
    content:
      en:
      - type: response
        text: If they pray toward this place,
      - type: text
        text: '* Forgive the sin of thy people, O God, and teach them the good way wherein they should walk, and manifest forth thy glory in this place.'
      - type: versicle
        text: Give ear, O Shepherd of Israel, thou that leadest Joseph like a flock, thou that sittest upon the cherubim.
      - type: response
        text: Forgive the sin of thy people, O God, and teach them the good way wherein they should walk, and manifest forth thy glory in this place.
      la:
      - type: response
        text: Orántibus in loco isto,
      - type: text
        text: '* Dimítte peccáta pópuli tui, Deus, et osténde eis viam bonam per quam ámbulent, et da glóriam in loco isto.'
      - type: versicle
        text: Qui regis Israël inténde, qui dedúcis velut ovem Ioseph, qui sedes super Chérubim.
      - type: response
        text: Dimítte peccáta pópuli tui, Deus, et osténde eis viam bonam per quam ámbulent, et da glóriam in loco isto.
  responsory.orn-tam-mon-libus-f-liam-ier-salem-d-minus-concu-aaae649864:
    role: responsory
    content:
      en:
      - type: response
        text: When the Lord beheld the daughter of Jerusalem adorned with her jewels, He greatly desired her beauty
      - type: text
        text: '* And when the daughters of Zion saw her, they cried out that she was most blessed, saying thy name is as ointment poured forth.'
      - type: versicle
        text: Upon thy right hand did stand the Queen in a vesture of gold wrought about with diverse colours.
      - type: response
        text: 'And when the daughters of Zion saw her, they cried out that she was most blessed, saying:'
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Thy name is as ointment poured forth.
      la:
      - type: response
        text: 'Ornátam monílibus fíliam Ierúsalem Dóminus concupívit:'
      - type: text
        text: '* Et vidéntes eam fíliæ Sion, beatíssimam prædicavérunt, dicéntes: * Unguéntum effúsum nomen tuum.'
      - type: versicle
        text: Astitit regína a dextris tuis in vestítu deauráto, circúmdata varietáte.
      - type: response
        text: 'Et vidéntes eam fíliæ Sion, beatíssimam prædicavérunt, dicéntes:'
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Unguéntum effúsum nomen tuum.
  responsory.os-suum-ap-ruit-sapi-nti-et-lex-clem-nti-in-ling-72f3502c87:
    role: responsory
    content:
      en:
      - type: response
        text: She openeth her mouth with wisdom, and in her tongue is the law of kindness. She looketh well to the ways of her household
      - type: text
        text: '* And eateth not the bread of idleness.'
      - type: versicle
        text: She tasteth and perceiveth that her merchandise is good. Her candle goeth not out by night.
      - type: response
        text: And she eateth not the bread of idleness.
      la:
      - type: response
        text: 'Os suum apéruit sapiéntiæ, et lex cleméntiæ in lingua eius: considerávit sémitas domus suæ,'
      - type: text
        text: '* Et panem otiósa non comédit.'
      - type: versicle
        text: 'Gustávit et vidit quia bona est negotiátio eius: non exstinguétur in nocte lucérna eius.'
      - type: response
        text: Et panem otiósa non comédit.
  responsory.p-sui-adiut-rium-super-pot-ntem-et-exalt-vi-el-c-b12a25549f:
    role: responsory
    content:
      en:
      - type: response
        text: I have laid help upon one that is mighty, and have exalted one chosen out of My people
      - type: text
        text: '* For My hand shall help him.'
      - type: versicle
        text: I have found David My servant, with My holy oil have I anointed him.
      - type: response
        text: For My hand shall help him.
      la:
      - type: response
        text: 'Pósui adiutórium super poténtem, et exaltávi eléctum de plebe mea:'
      - type: text
        text: '* Manus enim mea auxiliábitur ei.'
      - type: versicle
        text: Invéni David servum meum, óleo sancto meo unxi eum.
      - type: response
        text: Manus enim mea auxiliábitur ei.
  responsory.p-sui-adiut-rium-super-pot-ntem-et-exalt-vi-el-c-b899937985:
    role: responsory
    content:
      la:
      - type: response
        text: 'Pósui adiutórium super poténtem, et exaltávi eléctum de plebe mea:'
      - type: text
        text: '* Manus enim mea auxiliábitur ei.'
      - type: versicle
        text: Invéni David servum meum, óleo sancto meo unxi eum.
      - type: response
        text: Manus enim mea auxiliábitur ei.
  responsory.pecc-ntem-me-cot-die-et-non-me-p-nit-ntem-timor-3ffc8399d7:
    role: responsory
    content:
      en:
      - type: response
        text: Forasmuch as I sin daily, and repent not, the fear of death troubleth me.
      - type: text
        text: '* O God, have mercy upon me, and save me, for in hell there is no redemption.'
      - type: versicle
        text: Save me, O God, by thy name, and judge me in thy strength.
      - type: response
        text: O God, have mercy upon me, and save me, for in hell there is no redemption.
      la:
      - type: response
        text: 'Peccántem me cotídie, et non me pœniténtem, timor mortis contúrbat me:'
      - type: text
        text: '* Quia in inférno nulla est redémptio, miserére mei, Deus, et salva me.'
      - type: versicle
        text: Deus, in nómine tuo salvum me fac, et in virtúte tua líbera me.
      - type: response
        text: Quia in inférno nulla est redémptio, miserére mei, Deus, et salva me.
  responsory.preti-sa-in-consp-ctu-d-mini-allel-ia-38d0a31ffb:
    role: responsory
    content:
      en:
      - type: response
        text: Precious in the sight of the Lord, alleluia.
      - type: text
        text: '* Is the death of his saints, alleluia.'
      - type: versicle
        text: 'The Lord is nigh unto them that are of a contrite heart: and he will save the humble of spirit.'
      - type: response
        text: Is the death of his saints, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Is the death of his saints, alleluia.
      la:
      - type: response
        text: Pretiósa in conspéctu Dómini, allelúia,
      - type: text
        text: '* Mors Sanctórum eius, allelúia.'
      - type: versicle
        text: Custódit Dóminus ómnia ossa eórum, unum ex his non conterétur.
      - type: response
        text: Mors Sanctórum eius, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Mors Sanctórum eius, allelúia.
  responsory.propter-testam-ntum-d-mini-et-leges-pat-rnas-san-b47bfdd67f:
    role: responsory
    content:
      la:
      - type: response
        text: 'Propter testaméntum Dómini, et leges patérnas, Sancti Dei perstitérunt in amóre fraternitátis:'
      - type: text
        text: '* Quia unus fuit semper spíritus in eis, et una fides.'
      - type: versicle
        text: Ecce quam bonum et quam iucúndum habitáre fratres in unum.
      - type: response
        text: Quia unus fuit semper spíritus in eis, et una fides.
  responsory.propter-testam-ntum-d-mini-et-leges-pat-rnas-san-e35d2af9b2:
    role: responsory
    content:
      en:
      - type: response
        text: Because of the covenant of the Lord, and the laws of their fathers, the Saints of God abode in brotherly love,
      - type: text
        text: '* For one spirit and one faith was ever in them.'
      - type: versicle
        text: Behold how good and how pleasant it is for brethren to dwell together in unity.
      - type: response
        text: For one spirit and one faith was ever in them.
      la:
      - type: response
        text: 'Propter testaméntum Dómini, et leges patérnas, Sancti Dei perstitérunt in amóre fraternitátis:'
      - type: text
        text: '* Quia unus fuit semper spíritus in eis, et una fides.'
      - type: versicle
        text: Ecce quam bonum et quam iucúndum habitáre fratres in unum.
      - type: response
        text: Quia unus fuit semper spíritus in eis, et una fides.
  responsory.propter-verit-tem-et-mansuet-dinem-et-iust-tiam-f46b5c998d:
    role: responsory
    content:
      en:
      - type: response
        text: Because of truth, and meekness, and righteousness;
      - type: text
        text: '* And thy right hand shall lead thee wonderfully.'
      - type: versicle
        text: In thy comeliness, and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: And thy right hand shall lead thee wonderfully.
      la:
      - type: response
        text: 'Propter veritátem, et mansuetúdinem, et iustítiam:'
      - type: text
        text: '* Et dedúcet te mirabíliter déxtera tua.'
      - type: versicle
        text: Spécie tua et pulchritúdine tua inténde, próspere procéde, et regna.
      - type: response
        text: Et dedúcet te mirabíliter déxtera tua.
  responsory.qu-est-ista-qu-proc-ssit-sicut-sol-et-form-sa-ta-b1d5df6979:
    role: responsory
    content:
      en:
      - type: response
        text: Who is this that cometh up like the sun? This, comely as Jerusalem?
      - type: text
        text: '* The daughters of Zion saw her, and called her blessed: the queens also, and they praised her.'
      - type: versicle
        text: And about her it was as the flower of roses in the spring of the year, and lilies of the valleys.
      - type: response
        text: The daughters of Zion saw her, and called her blessed the queens also, and they praised her.
      la:
      - type: response
        text: Quæ est ista quæ procéssit sicut sol, et formósa tamquam Ierúsalem?
      - type: text
        text: '* Vidérunt eam fíliæ Sion, et beátam dixérunt, et regínæ laudavérunt eam.'
      - type: versicle
        text: Et sicut dies verni circúmdabant eam flores rosárum et lília convállium.
      - type: response
        text: Vidérunt eam fíliæ Sion, et beátam dixérunt, et regínæ laudavérunt eam.
  responsory.qui-l-zarum-resuscit-sti-a-monum-nto-f-tidum-a4c14f4755:
    role: responsory
    content:
      en:
      - type: response
        text: Thou Who didst call up Lazarus from the grave after that he had begun to stink
      - type: text
        text: '* Do Thou, O Lord, grant them rest and a place of forgiveness.'
      - type: versicle
        text: Thou Who shalt come to judge the quick and dead, and the world by fire
      - type: response
        text: Do Thou, O Lord, grant them rest and a place of forgiveness.
      la:
      - type: response
        text: Qui Lázarum resuscitásti a monuménto fœ́tidum,
      - type: text
        text: '* Tu eis, Dómine, dona réquiem, et locum indulgéntiæ.'
      - type: versicle
        text: Qui ventúrus es iudicáre vivos et mórtuos, et sǽculum per ignem.
      - type: response
        text: Tu eis, Dómine, dona réquiem, et locum indulgéntiæ.
  responsory.regnum-mundi-et-omnem-orn-tum-s-culi-cont-mpsi-p-307a48a864:
    role: responsory
    content:
      en:
      - type: response
        text: The kingdom of this world and all the beauty of life I have esteemed as nothing, for the excellency of the love of Jesus Christ my Lord
      - type: text
        text: '* Whom, having seen, I loved Whom, having believed, I longed after.'
      - type: versicle
        text: My heart is overflowing with a good matter I speak of my works unto the King.
      - type: response
        text: Whom, having seen, I loved Whom, having believed, I longed after.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Whom, having seen, I loved Whom, having believed, I longed after.
      la:
      - type: response
        text: 'Regnum mundi et omnem ornátum sǽculi contémpsi, propter amórem Dómini mei Iesu Christi:'
      - type: text
        text: '* Quem vidi, quem amávi, in quem crédidi, quem diléxi.'
      - type: versicle
        text: 'Eructávit cor meum verbum bonum: dico ego ópera mea Regi.'
      - type: response
        text: Quem vidi, quem amávi, in quem crédidi, quem diléxi.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quem vidi, quem amávi, in quem crédidi, quem diléxi.
  responsory.s-scipe-verbum-virgo-mar-a-quod-tibi-a-d-mino-pe-4fbfe55398:
    role: responsory
    content:
      en:
      - type: response
        text: O Holy Virgin Mary, happy indeed art thou, and right worthy of all praise
      - type: text
        text: '* For out of thee rose the Sun of righteousness, even Christ our God.'
      - type: versicle
        text: Pray for the people, plead for the clergy, make intercession for all women vowed to God. Let all that are making this holy memorial of thee feel the might of thine assistance.
      - type: response
        text: For out of thee rose the Sun of righteousness, even Christ our God.
      la:
      - type: response
        text: 'Súscipe verbum, Virgo María, quod tibi a Dómino per Angelum transmíssum est: concípies et páries Deum páriter et hóminem,'
      - type: text
        text: '* Ut benedícta dicáris inter omnes mulíeres.'
      - type: versicle
        text: 'Páries quidem fílium, et virginitátis non patiéris detriméntum: efficiéris grávida, et eris mater semper intácta.'
      - type: response
        text: Ut benedícta dicáris inter omnes mulíeres.
  responsory.sancta-et-immacul-ta-virg-nitas-quibus-te-l-udib-456ba8f390:
    role: responsory
    content:
      en:
      - type: response
        text: 'O how holy and how spotless is thy virginity; I am too dull to praise thee:'
      - type: text
        text: '* For thou hast borne in thy breast Him Whom the heavens cannot contain.'
      - type: versicle
        text: Blessed art thou among women, and blessed is the fruit of thy womb.
      - type: response
        text: For thou hast borne in thy breast Him Whom the heavens cannot contain.
      la:
      - type: response
        text: 'Sancta et immaculáta virgínitas, quibus te láudibus éfferam, néscio:'
      - type: text
        text: '* Quia quem cæli cápere non póterant, tuo grémio contulísti.'
      - type: versicle
        text: Benedícta tu in muliéribus, et benedíctus fructus ventris tui.
      - type: response
        text: Quia quem cæli cápere non póterant, tuo grémio contulisti.
  responsory.sancta-et-immacul-ta-virg-nitas-quibus-te-l-udib-6335290ac9:
    role: responsory
    content:
      la:
      - type: response
        text: 'Sancta et immaculáta virgínitas, quibus te láudibus éfferam, néscio:'
      - type: text
        text: '* Quia quem cæli cápere non póterant, tuo grémio contulísti.'
      - type: versicle
        text: Benedícta tu in muliéribus, et benedíctus fructus ventris tui.
      - type: response
        text: Quia quem cæli cápere non póterant, tuo grémio contulisti.
  responsory.sancti-mei-qui-in-carne-p-siti-cert-men-habu-sti-2aa5021a39:
    role: responsory
    content:
      la:
      - type: response
        text: 'Sancti mei, qui in carne pósiti, certámen habuístis:'
      - type: text
        text: '* Mercédem labóris ego reddam vobis.'
      - type: versicle
        text: Veníte benedícti Patris mei, percípite regnum.
      - type: response
        text: Mercédem labóris ego reddam vobis.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Mercédem labóris ego reddam vobis.
  responsory.sancti-mei-qui-in-carne-p-siti-cert-men-habu-sti-9c9d3d528a:
    role: responsory
    content:
      en:
      - type: response
        text: O ye My Saints, who, being in the flesh, didst have striving
      - type: text
        text: '* I will render unto you a reward of your labours.'
      - type: versicle
        text: Come, ye blessed of My Father, inherit the kingdom
      - type: response
        text: I will render unto you a reward of your labours.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: I will render unto you a reward of your labours.
      la:
      - type: response
        text: 'Sancti mei, qui in carne pósiti, certámen habuístis:'
      - type: text
        text: '* Mercédem labóris ego reddam vobis.'
      - type: versicle
        text: Veníte benedícti Patris mei, percípite regnum.
      - type: response
        text: Mercédem labóris ego reddam vobis.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Mercédem labóris ego reddam vobis.
  responsory.sancti-tui-d-mine-mir-bile-consec-ti-sunt-iter-s-6f2895befa:
    role: responsory
    content:
      la:
      - type: response
        text: 'Sancti tui, Dómine, mirábile consecúti sunt iter, serviéntes præcéptis tuis, ut inveniréntur illǽsi in aquis válidis:'
      - type: text
        text: '* Terra appáruit árida: et in Mari Rubro via sine impediménto.'
      - type: versicle
        text: Quóniam percússit petram, et fluxérunt aquæ, et torréntes inundavérunt.
      - type: response
        text: 'Terra appáruit árida: et in Mari Rubro via sine impediménto.'
  responsory.sancti-tui-d-mine-mir-bile-consec-ti-sunt-iter-s-b6e9c660e9:
    role: responsory
    content:
      en:
      - type: response
        text: thy Saints, O Lord, have passed a wonderful way, serving thy commandments, that they might be found without hurt in the midst of the mighty waters.
      - type: text
        text: '* Dry land appeared, and, out of the Red Sea, a way without impediment.'
      - type: versicle
        text: He smote the rock, and the waters gushed out, and the streams overflowed.
      - type: response
        text: Dry land appeared, and, out of the Red Sea, a way without impediment.
      la:
      - type: response
        text: 'Sancti tui, Dómine, mirábile consecúti sunt iter, serviéntes præcéptis tuis, ut inveniréntur illǽsi in aquis válidis:'
      - type: text
        text: '* Terra appáruit árida: et in Mari Rubro via sine impediménto.'
      - type: versicle
        text: Quóniam percússit petram, et fluxérunt aquæ, et torréntes inundavérunt.
      - type: response
        text: 'Terra appáruit árida: et in Mari Rubro via sine impediménto.'
  responsory.si-cons-stant-adv-rsum-me-castra-non-tim-bit-cor-5a3319f56f:
    role: responsory
    content:
      en:
      - type: response
        text: Though an host should encamp against me, my heart shall not fear.
      - type: text
        text: '* Though war should rise against me, in this will I be confident. Alleluia.'
      - type: versicle
        text: My praise shall be continually of thee, for Thou art my strong refuge.
      - type: response
        text: '* Though war should rise against me, in this will I be confident. Alleluia.'
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Though war should rise against me, in this will I be confident. Alleluia.
      la:
      - type: response
        text: 'Si consístant advérsum me castra, non timébit cor meum:'
      - type: text
        text: '* Si exsúrgat advérsum me prǽlium, in hoc ego sperábo, allelúia.'
      - type: versicle
        text: In te cantátio mea semper, quóniam tu adiútor fortis.
      - type: response
        text: Si exsúrgat advérsum me prǽlium, in hoc ego sperábo, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Si exsúrgat advérsum me prǽlium, in hoc ego sperábo, allelúia.
  responsory.sicut-cedrus-exalt-ta-sum-in-l-bano-et-sicut-cyp-6be5b989f6:
    role: responsory
    content:
      en:
      - type: response
        text: I was exalted like a cedar in Lebanon, and as a cypress-tree upon Mount Zion. Like the best myrrh
      - type: text
        text: '* I yielded a pleasant odour.'
      - type: versicle
        text: Like cinnamon and sweet balsam.
      - type: response
        text: I yielded a pleasant odour.
      la:
      - type: response
        text: 'Sicut cedrus exaltáta sum in Líbano, et sicut cypréssus in monte Sion: quasi myrrha elécta,'
      - type: text
        text: '* Dedi suavitátem odóris.'
      - type: versicle
        text: Et sicut cinnamómum et bálsamum aromatízans.
      - type: response
        text: Dedi suavitátem odóris.
  responsory.sint-lumbi-vestri-pr-c-ncti-et-luc-rn-ard-ntes-i-8b65677303:
    role: responsory
    content:
      en:
      - type: response
        text: Let your loins be girded about, and your lights burning;
      - type: text
        text: '* And ye yourselves like unto men that wait for their lord, when he will return from the wedding.'
      - type: versicle
        text: Watch therefore, for ye know not what hour your Lord doth come.
      - type: response
        text: And ye yourselves like unto men that wait for their lord, when he will return from the wedding.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: And ye yourselves like unto men that wait for their lord, when he will return from the wedding.
      la:
      - type: response
        text: 'Sint lumbi vestri præcíncti, et lucérnæ ardéntes in mánibus vestris:'
      - type: text
        text: '* Et vos símiles homínibus exspectántibus dóminum suum, quando revertátur a núptiis.'
      - type: versicle
        text: Vigiláte ergo, quia nescítis qua hora Dóminus vester ventúrus sit.
      - type: response
        text: Et vos símiles homínibus exspectántibus dóminum suum, quando revertátur a núptiis.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et vos símiles homínibus exspectántibus dóminum suum, quando revertátur a núptiis.
  responsory.sint-lumbi-vestri-pr-c-ncti-et-luc-rn-ard-ntes-i-c05d76c957:
    role: responsory
    content:
      la:
      - type: response
        text: 'Sint lumbi vestri præcíncti, et lucérnæ ardéntes in mánibus vestris:'
