      - type: text
        text: |-
          On the occasion of this passage, certain people introduce the thousand years after the Resurrection, saying that then the hundredfold of all the things we have left behind, along with eternal life, is to be rendered to us: not understanding that, if the reward were fitting in the other cases, in the matter of wives it would appear unseemly — that he who has left one wife for the Lord's sake should receive a hundred in the future. The meaning, therefore, is this: he who has left carnal things for the Saviour's sake shall receive spiritual ones: which, by comparison and by their own worth, will be as if a hundredfold number were compared with a small number.
          We praise you, O God, * we acknowledge you as Lord.
          All the earth worships you, * the eternal Father.
          To you all Angels, * to you the Heavens, and all the Powers:
          To you the Cherubim and Seraphim * cry out without ceasing:
          (A bow is made) Holy, Holy, Holy, * Lord God of Hosts.
          Heaven and earth are full * of the majesty of your glory.
          The glorious choir * of the Apostles,
          the noble company * of the Prophets,
          the white-robed army * of the Martyrs praise you.
          Across all the world * the holy Church proclaims you:
          the Father * of immeasurable majesty,
          your adorable, true, * and only Son,
          and the Holy * Spirit, the Comforter.
          You, O Christ, are the King of glory.
          You are the * eternal Son of the Father.
          (A bow is made) You, who were to take upon yourself our humanity to set us free, * did not shrink from the womb of the Virgin.
          You, who were to take upon yourself our humanity to set us free, * did not shrink from the womb of the Virgin.
          Having overcome the sting of death, * you opened the Kingdom of Heaven to those who believe.
          You sit at the right hand of God, * in the glory of the Father.
          You are believed * to be the Judge to come.
      - type: rubric
        text: (The following verse is said kneeling)
      - type: rubric
        text: (Brethren, when they begin 'Te ergo quaesumus,' departing from the Stalls, let them reverently bow at the words 'Quos pretioso' and the rest)
      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
          And we praise your name for ever, * and for ever and ever.
          Graciously keep us, O Lord, this day * without sin.
          Have mercy on us, O Lord, * have mercy on us.
          Let your mercy, O Lord, be upon us, * as we have hoped in you.
          In you, O Lord, I have hoped: * let me not be confounded for ever.
  reading.ezech-1-10-12-955a6f59d6:
    role: reading
    content:
      en:
      - type: citation
        text: Ezek 1:10-12
      - type: text
        text: |-
          10 And as for the likeness of their faces: there was the face of a man, and the face of a lion on the right side of all the four: and the face of an ox, on the left side of all the four: and the face of an eagle over all the four.
          11 And their faces, and their wings were stretched upward: two wings of every one were joined, and two covered their bodies:
          12 And every one of them went straight forward: whither the impulse of the spirit was to go, thither they went: and they turned not when they went.
