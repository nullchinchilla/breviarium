  reading.in-regenerati-ne-cum-s-derit-f-lius-h-minis-in-s-42927b55ad:
    role: reading
    content:
      en:
      - type: text
        text: In the regeneration, when the Son of Man shall sit in the throne of His glory, and when the dead shall rise again from corruption incorruptible, (i Cor. xv. 53,) ye also shall sit upon twelve thrones of judgment, condemning the twelve tribes of Israel, because, when ye believed in Me, they would not. (John iii. 18.) And every one that hath forsaken houses, or brethren, or sisters, or father, or mother, or wife, or children, or lands, for My Name's sake, shall receive an hundredfold, and shall inherit everlasting life. This place agreeth well with that other where the Saviour saith I came not to send peace, but a sword. For I am come to set a man at variance against his father, and the daughter against her mother, and the daughter-in-law against her mother-in-law; and a man's foes shall be they of his own household. (Matth. x. 34.) Every one, therefore, that hath set no store by affection, and riches, and the pleasures of the world, for Christ's faith's sake, and the preaching of the Gospel, shall receive an hundred-fold, and shall inherit everlasting life.
      la:
      - type: text
        text: 'In regeneratióne, cum séderit Fílius hóminis in sede maiestátis suæ (quando et mórtui de corruptióne resúrgent incorrúpti) sedébitis et vos in sóliis iudicántium, condemnántes duódecim tribus Ísraël: quia vobis credéntibus, illi crédere noluérunt. Et omnis qui relíquerit domum, vel fratres, aut soróres, aut patrem, aut matrem, aut uxórem, aut fílios, aut agros propter nomen meum, céntuplum accípiet, et vitam ætérnam possidébit. Locus iste cum illa senténtia cóngruit, in qua Salvátor lóquitur: Non veni pacem míttere, sed gládium. Veni enim separáre hóminem a patre suo, et matrem a fília, et nurum a socru: et inimíci hóminis doméstici eius. Qui ergo propter fidem Christi, et prædicatiónem Evangélii, omnes afféctus contémpserint, atque divítias et sǽculi voluptátes: isti céntuplum recípient, et vitam ætérnam possidébunt.'
  reading.in-regenerati-ne-cum-s-derit-f-lius-h-minis-in-s-d34a399268:
    role: reading
    content:
      en:
      - type: text
        text: Here, then, are two commandments, to gird our loins about, and to keep our lights burning the cleanness of purity in our body, and the light of the truth in our works. Whoso hath the one and not the other, pleaseth not thereby our Redeemer; that is, he pleaseth Him not which doth good works, but bridleth not himself from the pollutions of lust, neither he which is eminent in chastity, but exerciseth not himself in good works. Neither is chastity a great thing without good works, nor good works anything without chastity. And if any man do both, it remaineth that he must look by hope toward our Fatherland above, and not have for his reason wherethrough he turneth himself away from vice, the love of honour in this present world.
      la:
      - type: text
        text: 'In regeneratióne, cum séderit Fílius hóminis in sede maiestátis suæ (quando et mórtui de corruptióne resúrgent incorrúpti) sedébitis et vos in sóliis iudicántium, condemnántes duódecim tribus Ísraël: quia vobis credéntibus, illi crédere noluérunt. Et omnis qui relíquerit domum, vel fratres, aut soróres, aut patrem, aut matrem, aut uxórem, aut fílios, aut agros propter nomen meum, céntuplum accípiet, et vitam ætérnam possidébit. Locus iste cum illa senténtia cóngruit, in qua Salvátor lóquitur: Non veni pacem míttere, sed gládium. Veni enim separáre hóminem a patre suo, et matrem a fília, et nurum a socru: et inimíci hóminis doméstici eius. Qui ergo propter fidem Christi, et prædicatiónem Evangélii, omnes afféctus contémpserint, atque divítias et sǽculi voluptátes: isti céntuplum recípient, et vitam ætérnam possidébunt.'
  reading.in-univ-rsa-namque-eccl-sia-tu-es-christus-f-liu-1b63987641:
    role: reading
    content:
      en:
      - type: text
        text: What other, then, is that man travelling into a far country but our Redeemer, Who is gone up from us into heaven in that Flesh Which He had taken into Himself? For the earth is the home of the Flesh, Which travelleth into a far country when our Redeemer giveth It a place in heaven. But that man travelling into a far country delivered unto his servants his goods and so doth our Redeemer give spiritual gifts unto His faithful people. “And unto one he gave five talents, to another two, and to another one.” There are five bodily senses that is, sight, hearing, taste, smell, and touch. By the five talents therefore are signified the five senses, that is, outward knowledge. By the two, wit and work. And by the figure of the one talent, understanding, which is alone.
      la:
      - type: text
        text: 'In univérsa namque Ecclésia, Tu es Christus Fílius Dei vivi, quotídie Petrus dicit; et omnis lingua, quæ confitétur Dóminum, magistério huius vocis imbúitur. Hæc fides diábolum vincit et captivórum eius víncula dissólvit. Hæc érutos mundo, ínserit cælo, et portæ ínferi advérsus eam prævalére non possunt. Tanta enim divínitus soliditáte muníta est, ut eam neque hærética umquam corrúmpere právitas, nec pagána potúerit superáre perfídia. His ítaque modis, dilectíssimi, rationábile obséquio celebrétur hodiérna festívitas: ut in persóna humilitátis meæ ille intelligátur, ille honorétur, in quo et ómnium pastórum sollicitúdo, cum commendatárum sibi óvium custódia persevérat, et cuius étiam dígnitas in indígno heréde non déficit.'
  reading.in-univ-rsa-namque-eccl-sia-tu-es-christus-f-liu-551aeaf7d5:
    role: reading
    content:
      en:
      - type: text
        text: 'When these woes come, the end is not by and by. And He saith further Nation shall rise against nation, and kingdom against kingdom; and great earthquakes shall be in diverse places, and pestilences, and famines, and fearful sights and great signs shall there be from heaven. Before the last tribulation cometh, shall come many other tribulations: and, by the many woes which shall come first, shall be foreshadowed the everlasting woe which shall come in the end. And therefore, after wars and commotions, the end is not yet by and by many woes must come first, to give warning of the woe that hath no end.'
      la:
      - type: text
        text: 'In univérsa namque Ecclésia, Tu es Christus Fílius Dei vivi, quotídie Petrus dicit; et omnis lingua, quæ confitétur Dóminum, magistério huius vocis imbúitur. Hæc fides diábolum vincit et captivórum eius víncula dissólvit. Hæc érutos mundo, ínserit cælo, et portæ ínferi advérsus eam prævalére non possunt. Tanta enim divínitus soliditáte muníta est, ut eam neque hærética umquam corrúmpere právitas, nec pagána potúerit superáre perfídia. His ítaque modis, dilectíssimi, rationábile obséquio celebrétur hodiérna festívitas: ut in persóna humilitátis meæ ille intelligátur, ille honorétur, in quo et ómnium pastórum sollicitúdo, cum commendatárum sibi óvium custódia persevérat, et cuius étiam dígnitas in indígno heréde non déficit.'
  reading.in-univ-rsa-namque-eccl-sia-tu-es-christus-f-liu-c686c2e9cb:
    role: reading
    content:
      en:
      - type: citation
        text: 'Then we hear these things our hearts burn within us and we long to be already there, where we hope to rejoice for ever. But we cannot attain unto great rewards, save through great labour. Therefore saith the excellent preacher Paul: “He is not crowned, except he strive lawfully.” (2 Tim. ii. 5.) The greatness of the reward doth delight our mind let not the throes of the struggle dishearten us. Therefore the Truth saith unto every one that cometh unto Him “If any man come to Me, and hate not his father and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple.”'
      la:
      - type: text
        text: 'In univérsa namque Ecclésia, Tu es Christus Fílius Dei vivi, quotídie Petrus dicit; et omnis lingua, quæ confitétur Dóminum, magistério huius vocis imbúitur. Hæc fides diábolum vincit et captivórum eius víncula dissólvit. Hæc érutos mundo, ínserit cælo, et portæ ínferi advérsus eam prævalére non possunt. Tanta enim divínitus soliditáte muníta est, ut eam neque hærética umquam corrúmpere právitas, nec pagána potúerit superáre perfídia. His ítaque modis, dilectíssimi, rationábile obséquio celebrétur hodiérna festívitas: ut in persóna humilitátis meæ ille intelligátur, ille honorétur, in quo et ómnium pastórum sollicitúdo, cum commendatárum sibi óvium custódia persevérat, et cuius étiam dígnitas in indígno heréde non déficit.'
  reading.incipit-liber-ezechi-lis-proph-t-486366f9ff:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the book of Ezekiel
      - type: citation
        text: Ezek 1:1-4
      - type: citation
        text: 1 Now it came to pass in the thirtieth year, in the fourth month, on the fifth day of the month, when I was in the midst of the captives by the river Chobar, the heavens were opened, and I saw the visions of God.
      - type: citation
        text: 2 On the fifth day of the month, the same was the fifth year of the captivity of king Joachin,
      - type: citation
        text: '3 The word of the Lord came to Ezechiel the priest the son of Buzi in the land of the Chaldeans, by the river Chobar: and the hand of the Lord was there upon him.'
      - type: citation
        text: '4 And I saw, and behold a whirlwind came out of the north: and a great cloud, and a fire infolding it, and brightness was about it: and out of the midst thereof, that is, out of the midst of the fire, as it were the resemblance of amber.'
      la:
      - type: text
        text: Incipit liber Ezechiélis Prophétæ
      - type: citation
        text: Ezech 1:1-4
      - type: citation
        text: 1 Et factum est in trigésimo anno, in quarto, in quinta mensis, cum essem in médio captivórum iuxta flúvium Chobar, apérti sunt cæli, et vidi visiónes Dei.
      - type: citation
        text: 2 In quinta mensis, ipse est annus quintus transmigratiónis regis Ióachim,
      - type: citation
        text: '3 factum est verbum Dómini ad Ezechiélem fílium Buzi sacerdótem, in terra Chaldæórum, secus flumen Chobar: et facta est super eum ibi manus Dómini.'
      - type: citation
        text: '4 Et vidi, et ecce ventus túrbinis veniébat ab Aquilóne, et nubes magna, et ignis invólvens, et splendor in circúitu eius: et de médio eius, quasi spécies eléctri, id est, de médio ignis:'
  reading.incipit-liber-ezechi-lis-proph-t-acd401c49e:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to the Corinthians
      - type: citation
        text: 1 Cor 4:1-5
      - type: citation
        text: 1 Let a man so account of us as of the ministers of Christ, and the dispensers of the mysteries of God.
      - type: citation
        text: 2 Here now it is required among the dispensers, that a man be found faithful.
      - type: citation
        text: 3 But to me it is a very small thing to be judged by you, or by man's day; but neither do I judge my own self.
      - type: text
        text: 4 For I am not conscious to myself of any thing, yet am I not hereby justified; but he that judgeth me, is the Lord.
      - type: text
        text: 5 Therefore judge not before the time; until the Lord come, who both will bring to light the hidden things of darkness, and will make manifest the counsels of the hearts; and then shall every man have praise from God.
      la:
      - type: text
        text: Incipit liber Ezechiélis Prophétæ
      - type: citation
        text: Ezech 1:1-4
      - type: citation
        text: 1 Et factum est in trigésimo anno, in quarto, in quinta mensis, cum essem in médio captivórum iuxta flúvium Chobar, apérti sunt cæli, et vidi visiónes Dei.
      - type: citation
        text: 2 In quinta mensis, ipse est annus quintus transmigratiónis regis Ióachim,
      - type: citation
        text: '3 factum est verbum Dómini ad Ezechiélem fílium Buzi sacerdótem, in terra Chaldæórum, secus flumen Chobar: et facta est super eum ibi manus Dómini.'
      - type: citation
        text: '4 Et vidi, et ecce ventus túrbinis veniébat ab Aquilóne, et nubes magna, et ignis invólvens, et splendor in circúitu eius: et de médio eius, quasi spécies eléctri, id est, de médio ignis:'
  reading.inclin-vit-gitur-caput-ccidit-enim-morientibus-v-2b43849c6c:
    role: reading
    content:
      la:
      - type: text
        text: 'Inclinávit ígitur caput. Áccidit enim morientibus, vigore carnis iam consumpto et ánima, quæ corpus retinet, abeunte, inclinatio cápitis. Quamóbrem verbis hoc modo usus Evangelísta est. Sic et tradidisse spíritum, a consuetúdine nostra sibi dictum est; multi enim sic exstingui, et mori dicúntur. Quamvis mihi videátur ídeo non simplíciter mórtuum esse, sed tradidisse spíritum Evangelísta dixísse; quia in manus Dei Patris ánimam suam commendávit, ut ipse dixit: Pater! in manus tuas comméndo spíritum meum. Quod nobis magnæ spei fundaméntum, atque oríginem præbet.'
  reading.iob-10-1-7-b7f32c6341:
    role: reading
    content:
      en:
      - type: citation
        text: Job 10:1-7
      - type: citation
        text: 1 My soul is weary of my life, I will let go my speech against myself, I will speak in the bitterness of my soul.
      - type: citation
        text: '2 I will say to God: Do not condemn me: tell me why thou judgest me so.'
      - type: citation
        text: 3 Doth it seem good to thee that thou shouldst calumniate me, and oppress me, the work of thy own hands, and help the counsel of the wicked?
      - type: citation
        text: '4 Hast thou eyes of flesh: or, shalt thou see as man seeth?'
      - type: citation
        text: '5 Are thy days as the days of man, and are thy years as the times of men:'
      - type: text
        text: 6 That thou shouldst inquire after my iniquity, and search after my sin?
      - type: text
        text: 7 And shouldst know that I have done no wicked thing, whereas there is no man that can deliver out of thy hand.
      la:
      - type: citation
        text: Iob 10:1-7
      - type: citation
        text: '1 Tædet ánimam meam vitæ meæ; dimíttam advérsum me elóquium meum: loquar in amaritúdine ánimæ meæ.'
      - type: citation
        text: '2 Dicam Deo: Noli me condemnáre; índica mihi cur me ita iúdices.'
      - type: citation
        text: 3 Numquid bonum tibi vidétur, si calumniéris me, et ópprimas me opus mánuum tuárum, et consílium impiórum ádiuves?
      - type: text
        text: 4 Numquid óculi cárnei tibi sunt? aut sicut videt homo, et tu vidébis?
      - type: text
        text: 5 Numquid sicut dies hóminis dies tui, et anni tui sicut humána sunt témpora,
      - type: text
        text: 6 ut quæras iniquitátem meam, et peccátum meum scrutéris,
      - type: text
        text: 7 et scias quia nihil ímpium fécerim, cum sit nemo qui de manu tua possit erúere?
  reading.iob-10-18-22-c0eea3dddd:
    role: reading
    content:
      en:
      - type: citation
        text: Job 10:18-22
      - type: citation
        text: '18 Why didst thou bring me forth out of the womb: O that I had been consumed that eye might not see me!'
      - type: text
        text: 19 I should have been as if I had not been, carried from the womb to the grave.
      - type: citation
        text: '20 Shall not the fewness of my days be ended shortly? suffer me, therefore, that I may lament my sorrow a little:'
      - type: citation
        text: '21 Before I go, and return no more, to a land that is dark and covered with the mist of death:'
      - type: text
        text: 22 A land of misery and darkness, where the shadow of death, and no order, but everlasting horror dwelleth.
      la:
      - type: citation
        text: Iob 10:18-22
      - type: text
        text: 18 Quare de vulva eduxísti me? qui útinam consúmptus essem, ne óculus me vidéret.
      - type: text
        text: 19 Fuíssem quasi non essem, de útero translátus ad túmulum.
      - type: text
        text: 20 Numquid non páucitas diérum meórum finiétur brevi? dimítte ergo me, ut plangam páululum dolórem meum,
      - type: citation
        text: '21 ántequam vadam, et non revértar, ad terram tenebrósam, et opértam mortis calígine:'
      - type: text
        text: 22 terram misériæ et tenebrárum, ubi umbra mortis et nullus ordo, sed sempitérnus horror inhábitat.
  reading.iob-10-8-12-88b951a842:
    role: reading
    content:
      en:
      - type: citation
        text: Job 10:8-12
      - type: text
        text: 8 thy hands have made me, and fashioned me wholly round about, and dost thou thus cast me down headlong on a sudden?
      - type: text
        text: 9 Remember, I beseech thee, that thou hast made me as the clay, and thou wilt bring me into dust again.
      - type: text
        text: 10 Hast thou not milked me as milk, and curdled me like cheese?
      - type: citation
        text: '11 Thou hast clothed me with skin and flesh: thou hast put me together with bones and sinews:'
      - type: text
        text: 12 Thou hast granted me life and mercy, and thy visitation hath preserved my spirit.
      la:
      - type: citation
        text: Iob 10:8-12
      - type: citation
        text: '8 Manus tuæ fecérunt me, et plasmavérunt me totum in circúitu: et sic repénte præcípitas me?'
      - type: text
        text: 9 Meménto, quæso, quod sicut lutum féceris me, et in púlverem redúces me.
      - type: text
        text: 10 Nonne sicut lac mulsísti me, et sicut cáseum me coagulásti?
      - type: text
        text: 11 Pelle et cárnibus vestísti me; óssibus et nervis compegísti me.
      - type: text
        text: 12 Vitam et misericórdiam tribuísti mihi, et visitátio tua custodívit spíritum meum.
  reading.iob-13-22-28-30b52d8132:
    role: reading
    content:
      en:
      - type: citation
        text: Job 13:22-28
      - type: text
        text: 22 Answer me.
      - type: text
        text: 23 How many are my iniquities and sins? make me know my crimes and offences.
      - type: text
        text: 24 Why hidest thou thy face, and thinkest me thy enemy?
      - type: text
        text: 25 Against a leaf, that is carried away with the wind, thou showest thy power, and thou pursuest a dry straw.
      - type: text
        text: 26 For thou writest bitter things against me, and wilt consume me for the sins of my youth.
      - type: citation
        text: '27 Thou hast put my feet in the stocks, and hast observed all my paths, and hast considered the steps of my feet:'
      - type: text
        text: 28 Who am to be consumed as rottenness, and as a garment that is moth-eaten.
      la:
      - type: citation
        text: Iob 13:22-28
      - type: text
        text: 22 Respónde mihi.
      - type: text
        text: 23 Quantas hábeo iniquitátes et peccáta? scélera mea et delícta osténde mihi.
      - type: text
        text: 24 Cur fáciem tuam abscóndis, et arbitráris me inimícum tuum?
      - type: citation
        text: '25 Contra fólium, quod vento rápitur, osténdis poténtiam tuam, et stípulam siccam perséqueris:'
      - type: text
        text: 26 scribis enim contra me amaritúdines, et consúmere me vis peccátis adolescéntiæ meæ.
      - type: citation
        text: '27 Posuísti in nervo pedem meum, et observásti omnes sémitas meas, et vestígia pedum meórum considerásti:'
      - type: text
        text: 28 qui quasi putrédo consuméndus sum, et quasi vestiméntum quod coméditur a tínea.
  reading.iob-14-1-6-97e07c6b8a:
    role: reading
    content:
      en:
      - type: citation
        text: Job 14:1-6
      - type: citation
        text: 1 Man born of a woman, living for a short time, is filled with many miseries.
      - type: citation
        text: 2 Who cometh forth like a flower, and is destroyed, and fleeth as a shadow, and never continueth in the same state.
      - type: citation
        text: 3 And dost thou think it meet to open thy eyes upon such an one, and to bring him into judgment with thee?
      - type: text
        text: 4 Who can make him clean that is conceived of unclean seed? is it not thou who only art?
      - type: citation
        text: '5 The days of man are short, and the number of his months is with thee: thou hast appointed his bounds which cannot be passed.'
      - type: text
        text: 6 Depart a little from him, that he may rest, until his wished for day come, as that of the hireling
      la:
      - type: citation
        text: Iob 14:1-6
      - type: citation
        text: 1 Homo natus de mulíere, brevi vivens témpore, replétur multis misériis.
      - type: citation
        text: 2 Qui quasi flos egréditur et contéritur, et fugit velut umbra, et nunquam in eódem statu pérmanet.
      - type: citation
        text: 3 Et dignum ducis super huiuscémodi aperíre óculos tuos, et addúcere eum tecum in iudícium?
      - type: text
        text: 4 Quis potest fácere mundum de immúndo concéptum sémine? Nonne tu qui solus es?
      - type: citation
        text: '5 Breves dies hóminis sunt: númerus ménsium eius apud te est: constituísti términos eius, qui præteríri non póterunt.'
      - type: text
        text: 6 Recéde páululum ab eo, ut quiéscat, donec optáta véniat, sicut mercenárii, dies eius.
  reading.iob-14-13-16-8d19bfc948:
    role: reading
    content:
      en:
      - type: citation
        text: Job 14:13-16
      - type: text
        text: 13 Who will grant me this, that thou mayst protect me in hell, and hide me till thy wrath pass, and appoint me a time when thou wilt remember me?
      - type: text
        text: 14 Shall man that is dead, thinkest thou, live again? all the days in which I am now in warfare, I expect until my change come.
      - type: citation
        text: '15 Thou shalt call me, and I will answer thee: to the work of thy hands thou shalt reach out thy right hand.'
      - type: text
        text: 16 Thou indeed hast numbered my steps, but spare my sins.
      la:
      - type: citation
        text: Iob 14:13-16
      - type: text
        text: 13 Quis mihi hoc tríbuat, ut in inférno prótegas me, et abscóndas me donec pertránseat furor tuus, et constítuas mihi tempus in quo recordéris mei?
      - type: text
        text: 14 Putásne mórtuus homo rursum vivat? cunctis diébus quibus nunc mílito, expécto donec véniat immutátio mea.
      - type: citation
        text: '15 Vocábis me, et ego respondébo tibi: óperi mánuum tuárum porríges déxteram.'
      - type: citation
        text: '16 Tu quidem gressus meos dinumerásti: sed parce peccátis meis.'
  reading.iob-17-1-3-17-11-15-98b01c09be:
    role: reading
    content:
      en:
      - type: citation
        text: Job 17:1-3; 17:11-15
      - type: citation
        text: 1 My spirit shall be wasted, my days shall be shortened, and only the grave remaineth for me.
      - type: citation
        text: 2 I have not sinned, and my eye abideth in bitterness.
      - type: citation
        text: 3 Deliver me O Lord, and set me beside thee, and let any man's hand fight against me.
      - type: text
        text: 11 My days have passed away, my thoughts are dissipated, tormenting my heart.
      - type: text
        text: 12 They have turned night into day, and after darkness I hope for light again.
      - type: text
        text: 13 If I wait hell is my house, and I have made my bed in darkness.
      - type: citation
        text: '14 If I have said to rottenness: thou art my father; to worms, my mother and my sister.'
      - type: text
        text: 15 Where is now then my expectation, and who considereth my patience?
      la:
      - type: citation
        text: Iob 17:1-3; 17:11-15
      - type: citation
        text: '1 Spíritus meus attenuábitur; dies mei breviabúntur: et solum mihi súperest sepúlchrum.'
      - type: citation
        text: 2 Non peccávi, et in amaritudínibus morátur óculus meus.
      - type: citation
        text: 3 Líbera me, Dómine, et pone me iuxta te, et cuiúsvis manus pugnet contra me.
      - type: text
        text: 11 Dies mei transiérunt; cogitatiónes meæ dissipátæ sunt, torquéntes cor meum.
      - type: text
        text: 12 Noctem vertérunt in diem, et rursum post ténebras spero lucem.
      - type: text
        text: 13 Si sustinúero, inférnus domus mea est, et in ténebris stravi léctulum meum.
      - type: citation
        text: '14 Putrédini dixi: Pater meus es; Mater mea, et soror mea, vérmibus.'
      - type: text
        text: 15 Ubi est ergo nunc præstolátio mea? et patiéntiam meam quis consíderat?
  reading.iob-19-20-27-16b18ec11d:
    role: reading
    content:
      en:
      - type: citation
        text: Job 19:20-27
      - type: text
        text: 20 The flesh being consumed. My bone hath cleaved to my skin, and nothing but lips are left about my teeth.
      - type: text
        text: 21 Have pity on me, have pity on me, at least you my friends, because the hand of the Lord hath touched me.
      - type: text
        text: 22 Why do you persecute me as God, and glut yourselves with my flesh?
      - type: text
        text: 23 Who will grant me that my words may be written? Who will grant me that they may be marked down in a book?
      - type: text
        text: 24 With an iron pen and in a plate of lead, or else be graven with an instrument in flint stone.
      - type: text
        text: 25 For I know that my Redeemer liveth, and in the last day I shall rise out of the earth.
      - type: text
        text: 26 And I shall be clothed again with my skin, and in my flesh I will see my God.
      - type: citation
        text: '27 Whom I myself shall see, and my eyes shall behold, and not another: this my hope is laid up in my bosom.'
      la:
      - type: citation
        text: Iob 19:20-27
      - type: text
        text: 20 Pelli meæ, consúmptis cárnibus, adhǽsit os meum, et derelícta sunt tantúmmodo lábia circa dentes meos.
      - type: text
        text: 21 Miserémini mei, miserémini mei saltem vos, amíci mei, quia manus Dómini tétigit me.
      - type: text
        text: 22 Quare persequímini me sicut Deus, et cárnibus meis saturámini?
      - type: text
        text: 23 Quis mihi tríbuat ut scribántur sermónes mei? quis mihi det ut exaréntur in libro
      - type: text
        text: 24 stylo férreo et plumbi lámina, vel celte sculpántur in sílice?
      - type: citation
        text: '25 Scio enim quod redémptor meus vivit, et in novíssimo die de terra surrectúrus sum:'
      - type: citation
        text: '26 et rursum circúmdabor pelle mea, et in carne mea vidébo Deum meum:'
      - type: citation
        text: '27 quem visúrus sum ego ipse, et óculi mei conspectúri sunt, et non álius: repósita est hæc spes mea in sinu meo.'
  reading.iob-7-16-21-c50266bec7:
    role: reading
    content:
      en:
      - type: citation
        text: Job 7:16-21
      - type: text
        text: 16 Spare me, for my days are nothing.
      - type: text
        text: 17 What is a man that thou shouldst magnify him? or why dost thou set thy heart upon him?
      - type: text
        text: 18 Thou visitest him early in the morning, and thou provest him suddenly.
      - type: text
        text: 19 How long wilt thou not spare me, nor suffer me to swallow down my spittle?
      - type: citation
        text: '20 I have sinned: what shall I do to thee, O keeper of men? why hast thou set me opposite to thee, and I am become burdensome to myself?'
      - type: citation
        text: '21 Why dost thou not remove my sin, and why dost thou not take away my iniquity? Behold now I shall sleep in the dust: and if thou seek me in the morning, I shall not be.'
      la:
      - type: citation
        text: Iob 7:16-21
      - type: text
        text: 16 Parce mihi, Dómine; nihil enim sunt dies mei.
      - type: text
        text: 17 Quid est homo, quia magníficas eum? aut quid appónis erga eum cor tuum?
      - type: text
        text: 18 Vísitas eum dilúculo, et súbito probas illum.
      - type: text
        text: 19 Usquequo non parcis mihi, nec dimíttis me, ut glútiam salívam meam?
      - type: text
        text: 20 Peccávi, quid fáciam tibi, o custos hóminum? quare posuísti me contrárium tibi, et factus sum mihimetípsi gravis?
      - type: citation
        text: '21 Cur non tollis peccátum meum, et quare non aufers iniquitátem meam? Ecce nunc in púlvere dórmiam: et, si mane me quæsíeris, non subsístam.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-io-nnem-005efea9e4:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Ioánnem.
      - type: citation
        text: Ioann 19:28-35
      - type: text
        text: 'In illo témpore: Sciens Iesus, quia ómnia consummáta sunt, ut consummaretur Scriptúra, dixit: Sitio. Et réliqua.'
      - type: text
        text: Homilía sancti Cyrílli Epíscopi Alexandríni
      - type: heading
        text: Comment. in Ioannem. Lib. 12., cap. 35
      - type: citation
        text: 'Cum truculenter ómnia impietáte Iudæórum essent perácta, nec quidquam ad summam crudelitátem deesset, tandem sanctíssima caro Christi naturale quid pátitur. Multis enim, ac váriis dolóribus exsiccata, siti torquétur. Multum enim possunt dolóres ad commovendam sitim; innatum enim calorem exagitantes, vel, quod in profunditate humidum est, consumunt et igneis ardoribus dolentis víscera urunt. Sicut ígitur ceteras passi6nes, sic hanc étiam sponte Christus perpéssus est. Bibere ígitur petit: illi autem ádeo longe ab omni humanitate aberant, ut pro iuvante potu atque iucundo nocentem et acerbum attulerint, et humanitátem, qua moveri videbantur, in impietátem converterint. Nam cum petenti dabant, caritátis hábitum suscípere videbantur; sed non est possíbile mentíri Scripturam, in qua ex persóna Christi dícitur: Et dedérunt in escam meam fel, et in siti mea potavérunt me acéto.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-io-nnem-9af158df08:
    role: reading
    content:
      en:
      - type: text
        text: Continuation of the Holy Gospel according to John
      - type: citation
        text: John 15:12-16
      - type: text
        text: 'In that time Jesus said to his disciples: This is my commandment, that you love one another, as I have loved you. And so on.'
      - type: text
        text: Homily by Pope St Gregory (the Great.)
      - type: heading
        text: 21th on the Gospels
      - type: text
        text: All the holy words of the Lord are full of His commandments. Why, then, speaketh the Lord of the commandment to love one another as if He gave no other commandment? This, saith He, is My commandment, That ye love one another. Is it not because love is the one object of all His commandments, and all His commandments are one? For, even as a tree, having but one root, bringeth forth many branches, so, if the root be love, many virtues do spring therefrom. Neither is the branch of good works green, if it abide not in the root of love.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Ioánnem.
      - type: citation
        text: Ioannes 15:12-16
      - type: text
        text: 'In illo témpore: Dixit Iesus discípulis suis: Hoc est præcéptum meum, ut diligátis ínvicem, sicut diléxi vos. Et réliqua.'
      - type: text
        text: Homilía S. Gregórii Papæ.
      - type: heading
        text: Homilia 27. in Evangelia.
      - type: text
        text: 'Cum cuncta sacra elóquia Domínicis plena sint præcéptis quid est quod de dilectióne, quasi de singulári mandáto, Dóminus dicit, Hoc est præcéptum meum, ut diligátis ínvicem: nisi quia omne mandátum de sola dilectióne est: et omnia unum præcéptum sunt? Quia quidquid præcípitur, in sola caritáte solidátur. Ut enim multi árboris rami ex una radíce pródeunt: sic multæ virtútes ex una caritáte generántur. Nec habet áliquid viriditátis ramus boni óperis, si non manet in radíce caritátis.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-io-nnem-c8ca092597:
    role: reading
    content:
      en:
      - type: text
        text: From the holy Gospel according to John
      - type: citation
        text: John 15:1-7
      - type: text
        text: 'In that time Jesus said to his disciples: I an the true vine; and my Father is the husbandman. And so on.'
      - type: text
        text: Homily by St. Augustine, Bishop (of Hippo.)
      - type: heading
        text: Tract 80 on John
      - type: text
        text: Dearly beloved brethren, this passage of the Gospel, wherein the Lord saith that He is the vine, and that His disciples are the branches, is to be taken in that sense wherein it is also said, that He is the Head of the Church, (Eph. v. 23,) and that we are the members of Him (30) Who is the Mediator between God and men, the man Christ Jesus (1 Tim. ii. 5.) The vine and his branches are of one and the same nature. Therefore, seeing that He was God, of which nature we are not, He was made man, to the end that He might have in Himself this vine, that is, the manhood, whereof we men can be made branches.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Ioánnem
      - type: citation
        text: Ioannes 15:1-7
      - type: text
        text: 'In illo témpore: Dixit Iesus discípulis suis: Ego sum vitis vera: et Pater meus agrícola est. Et réliqua.'
      - type: text
        text: Homilía sancti Augustíni Epíscopi
      - type: heading
        text: Tract. 80 in Ioannem
      - type: text
        text: Iste locus evangélicus, fratres, ubi se dicit Dóminus vitem, et discípulos suos pálmites, secúndum hoc dicit, quod est caput Ecclésiæ, nosque membra eius, mediátor Dei et hóminum, homo Christus Iesus. Uníus quippe natúræ sunt vitis et pálmites. Propter quod cum esset Deus, cuius natúræ non sumus, factus est homo, ut in illo esset vitis humána natúra, cuius et nos hómines pálmites esse possémus.
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-10013fb3a9:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 12:1-8
      - type: text
        text: 'In illo témpore: Dixit Iesus discípulis suis: Atténdite a fermento pharisæórum, quod est hypócrisis. Et réliqua.'
      - type: text
        text: Homilía sancti Bedæ Venerábilis Presbýteri
      - type: heading
        text: Lib. 4 in Lucam, cap. 12
      - type: text
        text: 'De hoc ferménto Apóstolus præcépit: Itáque epulémur, non in ferménto véteri, neque in ferménto malítiæ et nequítiæ, sed in ázymis sinceritátis et veritátis. Nam, sicut módicum ferméntum totam farínæ, cui iniícitur, massam corrúmpit, universámque mox conspersiónem suo sapóre commáculat; sic nimírum simulátio, cuius semel ánimum imbúerit, tota virtútum sinceritáte et veritáte fraudábit. Est ergo sensus: Atténdite ne æmulémini simulatóres; quia véniet profécto tempus, in quo et vestra virtus ómnibus, et eórum revelétur hypócrisis.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-380ffbeb03:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 21:9-19
      - type: text
        text: 'At that time, Jesus said unto His disciples: When ye shall hear of wars and commotions, be not terrified for these things must first come to pass; but the end is not by and by. And so on.'
      - type: text
        text: Homily by Pope St Gregory (the Great.)
      - type: heading
        text: 35th on the Gospels.
      - type: text
        text: 'Our Lord and Redeemer willeth us to know what shall be the signs that the end of the world is at hand, to the end that ye may be the less terrified, when that cometh whereof ye have already had warning. Darts strike less which are seen coming: and the plagues of the earth will be to us more bearable, if we are harnessed against them with the shield of foreknowledge. Behold, how He saith When ye shall hear of wars and commotions be not terrified for these things must first come to pass; but the end is not by and by. It behoveth us to ponder these words of our Redeemer, wherein He warneth us of suffering, from without, and from within. Wars are the work of a foreign enemy, commotions of the citizens. Therefore, that He may let us know that we shall be troubled from within and from without, He showeth that our wrestling shall be in part against strangers, and in part against our brethren.'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 6:17-23
      - type: text
        text: 'In illo témpore: Descéndens Iesus de monte, stetit in loco campéstri, et turba discipulórum eius, et multitúdo copiósa plebis ab omni Iudǽa, et Ierúsalem, et marítima, et Tyri, et Sidónis. Et réliqua.'
      - type: text
        text: Homilía sancti Ambrósii Epíscopi
      - type: heading
        text: Lib. 5. in Lucam. Cap. 6., post init.
      - type: text
        text: 'Advérte ómnia diligénter, quómodo et cum Apóstolis ascéndat et descéndat ad turbas. Quómodo enim turba nisi in húmili Christum vidéret? Non séquitur ad excélsa, non ascéndit ad sublímia. Dénique ubi descéndit, invénit infírmos: in excélsis enim infírmi esse non possunt. Hinc étiam Matthǽus docet in inferióribus débiles esse sanátos. Prius enim unusquísque sanándus est, ut paulátim virtútibus procedéntibus ascéndere possit ad montem; et ídeo quemque in inferióribus sanat, hoc est, a libídine révocat, iniúriam cæcitátis avértit. Ad vúlnera nostra descéndit: ut usu quodam et cópia suæ natúræ, compartícipes nos fáciat esse regni cæléstis.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-46a465af42:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 21:9-19
      - type: text
        text: 'At that time, Jesus said unto His disciples: When ye shall hear of wars and commotions, be not terrified for these things must first come to pass; but the end is not by and by. And so on.'
      - type: text
