          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: |-
          Nolíte timére eos qui occídunt corpus. Nullus ígitur córporum nostrórum casus est pertimescéndus, neque ullus interiméndæ carnis admitténdus est dolor: quando pro natúræ suæ atque oríginis conditióne resolúta, in substántiam spirituális ánimæ refundátur. Et quia doctrínis tálibus confirmátos opórtet líberam confiténdi Dei habére constántiam, étiam conditiónem, qua tenerémur, adiécit: negatúrum se eum Patri in cælis, qui se homínibus in terra negásset: eum porro qui conféssus coram homínibus se fuísset, a se in cælis confiténdum: qualésque nos nóminis sui testes homínibus fuissémus, tali nos apud Deum Patrem testimónio eius usúros.
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
