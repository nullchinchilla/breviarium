  collect.deus-qui-nos-conc-dis-sanct-rum-m-rtyrum-tu-rum-6360a83082:
    role: collect
    content:
      en:
      - type: text
        text: O God, who dost permit us to keep the birthday of thy holy Martyrs N. and N., grant that we may enjoy their fellowship in everlasting happiness.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui nos concédis sanctórum Mártyrum tuórum N. et N. natalítia cólere: da nobis in ætérna beatitúdine de eórum societáte gaudére.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who grant us to celebrate the birth to heaven of your holy Martyrs N. and N.: grant us to rejoice in their company in eternal blessedness.'
