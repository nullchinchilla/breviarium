texts:
  antiphon.ad-iesum-autem-cum-ven-ssent-ut-vid-runt-eum-iam-8bd4cfa188:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Ad Iesum autem * cum veníssent, ut vidérunt eum iam mórtuum, non fregérunt eius crura; sed unus mílitum láncea latus eius apéruit, et contínuo exívit sanguis et aqua.
  antiphon.am-vit-eum-d-minus-et-orn-vit-eum-stolam-gl-ri-n-143fe67946:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: The Lord loved him * and beautified him. He clothed him with a robe of glory, and crowned him at the gates of Paradise.
      la:
      - type: antiphon
        text: 'Amávit eum Dóminus, * et ornávit eum: stolam glóriæ índuit eum, et ad portas paradísi coronávit eum.'
  antiphon.am-vit-eum-d-minus-et-orn-vit-eum-stolam-gl-ri-n-7aaf614691:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Amávit eum Dóminus, * et ornávit eum: stolam glóriæ índuit eum, et ad portas paradísi coronávit eum.'
  antiphon.be-ta-dei-g-netrix-mar-a-virgo-perp-tua-templum-ace1493d7d:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: O Blessed Mary, * Mother of God, Virgin for ever, temple of the Lord, sanctuary of the Holy Ghost, thou, without any example before thee, didst make thyself well-pleasing in the sight of our Lord Jesus Christ; pray for the people, plead for the clergy, make intercession for all women vowed to God.
      la:
      - type: antiphon
        text: 'Beáta Dei Génetrix, María, * Virgo perpétua, templum Dómini, sacrárium Spíritus Sancti, sola sine exémplo placuísti Dómino nostro Iesu Christo: ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu.'
  antiphon.be-ta-dei-g-netrix-mar-a-virgo-perp-tua-templum-c47da918b4:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Beáta Dei Génetrix, María, * Virgo perpétua, templum Dómini, sacrárium Spíritus Sancti, sola sine exémplo placuísti Dómino nostro Iesu Christo: ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu.'
  antiphon.be-ta-dei-g-netrix-mar-a-virgo-perp-tua-templum-dc5dd3998e:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Beáta Dei Génetrix, María, * Virgo perpétua, templum Dómini, sacrárium Spíritus Sancti, sola sine exémplo placuísti Dómino nostro Iesu Christo: ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu.'
      - type: text
        text: (sed tempore paschali)
      - type: antiphon
        text: 'Regína cæli, * lætáre, allelúia; quia quem meruísti portáre, allelúia; resurréxit, sicut dixit, allelúia: ora pro nobis Deum, allelúia.'
      - type: antiphon
        text: 'Beáta Dei Génetrix, María, * Virgo perpétua, templum Dómini, sacrárium Spíritus Sancti, sola sine exémplo placuísti Dómino nostro Iesu Christo: ora pro pópulo, intérveni pro clero, intercéde pro devóto fœmíneo sexu.'
  antiphon.be-ta-es-mar-a-qu-credid-sti-perfici-ntur-in-te-e57f8ee620:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: O Mary * blessed art thou that didst believe! for there shall be a performance of those things which were told thee from the Lord. Alleluia.
      la:
      - type: antiphon
        text: 'Beáta es, * María, quæ credidísti: perficiéntur in te, quæ dicta sunt tibi a Dómino, allelúia.'
  antiphon.be-ta-mater-et-int-cta-virgo-glori-sa-reg-na-mun-ce7384759d:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Beáta Mater * et intácta Virgo, gloriósa Regína mundi, intercéde pro nobis ad Dóminum.
      - type: text
        text: (sed tempore paschali)
      - type: antiphon
        text: 'Regína cæli, * lætáre, allelúia; quia quem meruísti portáre, allelúia; resurréxit, sicut dixit, allelúia: ora pro nobis Deum, allelúia.'
      - type: antiphon
        text: 'Sancta María, * succúrre míseris, iuva pusillánimes, réfove flébiles, ora pro pópulo, intérveni pro clero, intercéde pro devóto fœmíneo sexu: séntiant omnes tuum iuvámen, quicúmque célebrant tuam sanctam festivitátem.'
  antiphon.be-tam-me-dicent-omnes-generati-nes-quia-anc-lla-da1c5d254b:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: All generations shall call me blessed, * for God hath regarded the lowliness of His hand-maiden.
      la:
      - type: antiphon
        text: Beátam me dicent * omnes generatiónes, quia ancíllam húmilem respéxit Deus.
  antiphon.date-ei-de-fructu-m-nuum-su-rum-et-laudent-eam-i-d397ce7dcd:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Give her of the fruit of her hands, * and let her own works praise her in the gates.
      la:
      - type: antiphon
        text: Date ei * de fructu mánuum suárum, et laudent eam in portis ópera eius.
  antiphon.deponens-ioseph-corpus-iesu-involvit-sindone-et-62f833ed05:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Deponens Ioseph * corpus Iesu involvit sindone, et pósuit eum in monuménto exciso. Fuit planctus magnus in illa die; mulíeres autem sedéntes contra sepulchrum dolebant, sicut doleri solet in morte primogeniti.
  antiphon.dum-esset-summus-p-ntifex-terr-na-non-m-tuit-sed-662a27b2d8:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Dum esset Summus Póntifex, * terréna non métuit, sed ad cæléstia regna gloriósus migrávit.
  antiphon.dum-esset-summus-p-ntifex-terr-na-non-m-tuit-sed-f3aac6d1aa:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: The Lord loved him * and beautified him. He clothed him with a robe of glory, and crowned him at the gates of Paradise.
      la:
      - type: antiphon
        text: Dum esset Summus Póntifex, * terréna non métuit, sed ad cæléstia regna gloriósus migrávit.
  antiphon.ego-sum-resurr-ctio-et-vita-qui-credit-in-me-tia-4314292f99:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: 'I am the resurrection and the life: * he that believeth in me, though he were dead, yet shall he live; and whosoever liveth and believeth in me shall never die.'
      la:
      - type: antiphon
        text: 'Ego sum * resurréctio et vita: qui credit in me, étiam si mórtuus fúerit, vivet; et omnis qui vivit et credit in me, non moriétur in ætérnum.'
  antiphon.est-te-fortes-in-bello-et-pugn-te-cum-ant-quo-se-3a548a3bc9:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Be valiant * in battle, fight the ancient serpent and accept the eternal kingdom. Alleluia.
      la:
      - type: antiphon
        text: 'Estóte fortes * in bello, et pugnáte cum antíquo serpénte: et accipiétis regnum ætérnum, allelúia.'
  antiphon.euge-serve-bone-et-fid-lis-quia-in-pauca-fu-sti-6d3f199155:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Euge, serve bone * et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam, intra in gáudium Dómini tui.
      - type: antiphon
        text: Serve bone * et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam, intra in gáudium Dómini tui.
  antiphon.euge-serve-bone-et-fid-lis-quia-in-pauca-fu-sti-7b0e697332:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Well done, thou good and faithful servant * thou hast been faithful over a few things, I will make thee ruler over many things, saith the Lord.
      la:
      - type: antiphon
        text: Euge, serve bone * et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam, dicit Dóminus.
  antiphon.euge-serve-bone-et-fid-lis-quia-in-pauca-fu-sti-8faa7a00a7:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Well done, thou good and faithful servant; * thou hast been faithful over a few things, I will make thee ruler over many things; enter thou into the joy of thy Lord.
      la:
      - type: antiphon
        text: Euge, serve bone * et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam, intra in gáudium Dómini tui.
      - type: antiphon
        text: Serve bone * et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam, intra in gáudium Dómini tui.
  antiphon.euge-serve-bone-et-fid-lis-quia-in-pauca-fu-sti-bfdf20105d:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Euge, serve bone * et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam, dicit Dóminus.
  antiphon.f-li-ier-salem-ven-te-et-vid-te-m-rtyres-cum-cor-cd01450083:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Daughters of Jerusalem, * come and see the crowned martyrs, the Lord crowned them in his solemnity and delight, alleluia, alleluia.
      la:
      - type: antiphon
        text: Fíliæ Ierúsalem, * veníte et vidéte Mártyres cum corónis, quibus coronávit eos Dóminus in die solemnitátis et lætítiæ, allelúia, allelúia.
  antiphon.fili-quid-fec-sti-nobis-sic-ecce-pater-tuus-et-e-e8e3b9680d:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: 'As the Father * knoweth me, and I know the Father: and I lay down my life for my sheep. alleluia.'
      la:
      - type: antiphon
        text: Fili, quid fecísti * nobis sic? Ecce pater tuus et ego doléntes quærebámus te, allelúia.
  antiphon.gaudent-in-c-lis-nim-sanct-rum-qui-christi-vest-46ded8114b:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Gaudent in cælis * ánimæ Sanctórum, qui Christi vestígia sunt secúti: et quia pro eius amóre sánguinem suum fudérunt, ídeo cum Christo exsúltant sine fine.'
  antiphon.gaudent-in-c-lis-nim-sanct-rum-qui-christi-vest-6e06371c61:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: In heaven do rejoice the souls of the Saints * who have followed the steps of Christ; and because they shed their blood for the love of Christ, therefore shall they be made glad for ever with Christ.
      la:
      - type: antiphon
        text: 'Gaudent in cælis * ánimæ Sanctórum, qui Christi vestígia sunt secúti: et quia pro eius amóre sánguinem suum fudérunt, ídeo cum Christo exsúltant sine fine.'
  antiphon.hic-vir-desp-ciens-mundum-et-terr-na-tri-mphans-31e061a713:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Lo, a servant of God * who esteemed but little things earthly. And by word and work laid him up treasure in heaven.
      la:
      - type: antiphon
        text: Hic vir despíciens mundum * et terréna, triúmphans, divítias cælo cóndidit ore, manu.
  antiphon.hic-vir-desp-ciens-mundum-et-terr-na-tri-mphans-87ad44af00:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Hic vir despíciens mundum * et terréna, triúmphans, divítias cælo cóndidit ore, manu.
  antiphon.ioseph-fili-david-noli-tim-re-acc-pere-mar-am-c-54a0e7dc02:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Go, tell my brethren alleluia * that they go into Galilee, alleluia, there they shall see me, alleluia, alleluia, alleluia.
      la:
      - type: antiphon
        text: Ioseph, fili David, * noli timére accípere Maríam cóniugem tuam; quod enim in ea natum est, de Spíritu Sancto est, allelúia.
  antiphon.ist-rum-est-enim-regnum-c-l-rum-qu-contemps-runt-b2892e1884:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: She spreadeth out her hand to the poor, * yea, she reacheth forth her hands to the needy, and eateth not the bread of idleness.
      la:
      - type: antiphon
        text: Istárum est enim * regnum cælórum, quæ contempsérunt vitam mundi, et pervenérunt ad prǽmia regni, et lavérunt stolas suas in sánguine Agni.
  antiphon.ist-rum-est-enim-regnum-c-l-rum-qu-contemps-runt-bd299fe7a2:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Give her of the fruit of her hands, * and let her own works praise her in the gates.
      la:
      - type: antiphon
        text: Istárum est enim * regnum cælórum, quæ contempsérunt vitam mundi, et pervenérunt ad prǽmia regni, et lavérunt stolas suas in sánguine Agni.
  antiphon.magnum-heredit-tis-myst-rium-templum-dei-factus-8c5359c13b:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: 'Herein is a great mystery * of heirship; the womb of her that knew not a man is become the temple of God; in taking of her flesh, He was not defiled; all nations shall come and say: Glory be to thee, O Lord!'
      la:
      - type: antiphon
        text: 'Magnum * hereditátis mystérium: templum Dei factus est úterus nesciéntis virum: non est pollútus ex ea carnem assúmens; omnes gentes vénient dicéntes: Glória tibi, Dómine.'
  antiphon.manum-suam-ap-ruit-nopi-et-palmas-suas-ext-ndit-78f0303f5e:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: She spreadeth out her hand to the poor, * yea, she reacheth forth her hands to the needy, and eateth not the bread of idleness.
      la:
      - type: antiphon
        text: Manum suam * apéruit ínopi, et palmas suas exténdit ad páuperem, et panem otiósa non comédit.
  antiphon.mir-bile-myst-rium-declar-tur-h-die-innov-ntur-n-297ee8ffe7:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: 'This day is set forth a wonderful mystery, * a new thing hath been created in the earth: God is made man. That which He was, He remaineth; and that which He was not, He taketh; suffering therein neither confusion nor division.'
      la:
      - type: antiphon
        text: 'Mirábile mystérium * declarátur hódie: innovántur natúræ, Deus homo factus est: id quod fuit permánsit, et quod non erat assúmpsit; non commixtiónem passus, neque divisiónem.'
  antiphon.o-doctor-ptime-eccl-si-sanct-lumen-be-te-n-div-n-5513cfc5d6:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Lo, a servant of God * who esteemed but little things earthly. And by word and work laid him up treasure in heaven.
      la:
      - type: antiphon
        text: O Doctor óptime, * Ecclésiæ sanctæ lumen, beáte N., divínæ legis amátor, deprecáre pro nobis Fílium Dei.
  antiphon.o-doctor-ptime-eccl-si-sanct-lumen-be-te-n-div-n-5589578e46:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: The Lord loved him * and beautified him. He clothed him with a robe of glory, and crowned him at the gates of Paradise.
      la:
      - type: antiphon
        text: O Doctor óptime, * Ecclésiæ sanctæ lumen, beáte N., divínæ legis amátor, deprecáre pro nobis Fílium Dei.
  antiphon.o-quam-metu-ndus-est-locus-iste-vere-non-est-hic-f302284649:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: How dreadful is this place. * Surely this is none other but the house of God, and this is the gate of heaven.
      la:
      - type: antiphon
        text: 'O quam metuéndus est * locus iste: vere non est hic áliud, nisi domus Dei, et porta cæli.'
  antiphon.prud-ntes-v-rgines-apt-te-vestras-l-mpades-ecce-be075d641b:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: The kingdom of heaven is like unto a merchantman * seeking goodly pearls, who, when he had found one pearl of great price, went and sold all that he had, and bought it.
      la:
      - type: antiphon
        text: 'Prudéntes vírgines, * aptáte vestras lámpades: ecce sponsus venit, exíte óbviam ei.'
  antiphon.prud-ntes-v-rgines-apt-te-vestras-l-mpades-ecce-d89f58040e:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Prudéntes vírgines, * aptáte vestras lámpades: ecce sponsus venit, exíte óbviam ei.'
  antiphon.qui-odit-nimam-suam-in-hoc-mundo-in-vitam-t-rnam-a709f48ed9:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: He that hateth his life * in this world, shall keep it unto life eternal.
      la:
      - type: antiphon
        text: Qui odit * ánimam suam in hoc mundo, in vitam ætérnam custódit eam.
  antiphon.qui-odit-nimam-suam-in-hoc-mundo-in-vitam-t-rnam-ce49573c41:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Qui odit * ánimam suam in hoc mundo, in vitam ætérnam custódit eam.
  antiphon.qui-vult-ven-re-post-me-bneget-semet-psum-et-tol-dc0a3848cf:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Qui vult veníre post me, * ábneget semetípsum, et tollat crucem suam, et sequátur me.
  antiphon.qui-vult-ven-re-post-me-bneget-semet-psum-et-tol-ec7eace9f0:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: If any man will come after me, * let him deny himself and take up his cross daily and follow me.
      la:
      - type: antiphon
        text: Qui vult veníre post me, * ábneget semetípsum, et tollat crucem suam, et sequátur me.
  antiphon.s-mile-est-regnum-c-l-rum-h-mini-negotiat-ri-qu-1119ceb25c:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: The kingdom of heaven is like unto a merchantman * seeking goodly pearls, who, when he had found one pearl of great price, went and sold all that he had, and bought it.
      la:
      - type: antiphon
        text: 'Símile est regnum cælórum * hómini negotiatóri quærénti bonas margarítas: invénta una pretiósa, dedit ómnia sua, et comparávit eam.'
  antiphon.sancti-et-iusti-in-d-mino-gaud-te-allel-ia-vos-e-b0f8f8c036:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Saints and just * rejoice in the Lord, alleluia, the Lord has chosen you for his inheritance, alleluia.
      la:
      - type: antiphon
        text: 'Sancti et iusti * in Dómino gaudéte, allelúia: vos elégit Deus in hereditátem sibi, allelúia.'
  antiphon.sp-ritus-sanctus-in-te-desc-ndet-mar-a-ne-t-meas-751544a7eb:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: The Holy Ghost shall come upon thee, * O Mary; fear not, thou shalt bear in thy womb the Son of God. Alleluia.
      la:
      - type: antiphon
        text: 'Spíritus Sanctus * in te descéndet, María: ne tímeas, habébis in útero Fílium Dei, allelúia.'
  antiphon.sp-ritus-sanctus-in-te-desc-ndet-mar-a-ne-t-meas-eb0dcae2f1:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Spíritus Sanctus * in te descéndet, María: ne tímeas, habébis in útero Fílium Dei, allelúia.'
  antiphon.veni-sponsa-christi-ccipe-cor-nam-quam-tibi-d-mi-cb0753b99d:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Veni, Sponsa Christi, * áccipe corónam, quam tibi Dóminus præparávit in ætérnum.
  antiphon.vestri-cap-lli-c-pitis-omnes-numer-ti-sunt-nol-t-02c8188435:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: 'Even the very hairs of your head are all numbered: * fear not therefore; ye are of more value than many sparrows.'
      la:
      - type: antiphon
        text: 'Vestri capílli cápitis * omnes numeráti sunt: nolíte timére: multis passéribus melióres estis vos.'
  antiphon.vestri-cap-lli-c-pitis-omnes-numer-ti-sunt-nol-t-a39ada226d:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Vestri capílli cápitis * omnes numeráti sunt: nolíte timére: multis passéribus melióres estis vos.'
  antiphon.vos-qui-reliqu-stis-mnia-et-sec-ti-estis-me-c-nt-cb0aa6707a:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: You who left all * and follow me, you will receive hundredfolds, and you will have eternal life.
      la:
      - type: antiphon
        text: Vos qui reliquístis * ómnia, et secúti estis me, céntuplum accipiétis, et vitam ætérnam possidébitis.
  antiphon.zach-e-fest-nans-desc-nde-quia-h-die-in-domo-tua-e481ef187d:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Zacchaeus, make haste and come down, for today I must abide at thy house. * And he made haste and came down, and received Him joyfully into his house. This day is salvation come from God to this house. Alleluia.
      la:
      - type: antiphon
        text: Zachǽe, * festínans descénde, quia hódie in domo tua opórtet me manére. At ille festínans descéndit, et suscépit illum gaudens in domum suam. Hódie huic dómui salus a Deo facta est, allelúia.
  chapter.2-cor-10-17-18-543543991c:
    role: chapter
    content:
      en:
      - type: citation
        text: 2 Cor 10:17-18
      - type: text
        text: 'Brothers: But he that glorieth, let him glory in the Lord. For not he who commendeth himself, is approved, but he, whom God commendeth.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 2 Cor 10:17-18
      - type: text
        text: 'Fratres: Qui gloriátur, in Dómino gloriétur. Non enim qui seípsum comméndat, ille probátus est; sed quem Deus comméndat.'
      - type: response
        text: Deo grátias.
  chapter.2-cor-11-2-31df929e4b:
    role: chapter
    content:
      en:
      - type: citation
        text: 2 Cor 11:2
      - type: text
        text: For I am jealous of you with the jealousy of God. For I have espoused you to one husband that I may present you as a chaste virgin to Christ.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 2 Cor 11:2
      - type: text
        text: Æmulor enim vos Dei æmulatióne. Despóndi enim vos uni viro vírginem castam exhibére Christo.
      - type: response
        text: Deo grátias.
  chapter.act-5-12-1a2d67526e:
    role: chapter
    content:
      en:
      - type: citation
        text: Acts 5:12
      - type: text
        text: And by the hands of the apostles were many signs and wonders wrought among the people.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Act 5:12
      - type: text
        text: Per manus autem Apostolórum fiébant signa et prodígia multa in plebe.
      - type: response
        text: Deo grátias.
  chapter.act-5-41-4020214389:
    role: chapter
    content:
      la:
      - type: citation
        text: Act 5:41
      - type: text
        text: Ibant Apóstoli gaudéntes a conspéctu concílii, quóniam digni hábiti sunt pro nómine Iesu contuméliam pati.
      - type: response
        text: Deo grátias.
  chapter.apo-21-2-a946d4f046:
    role: chapter
    content:
      en:
      - type: citation
        text: Rev 21:2
      - type: text
        text: I saw the holy city, New Jerusalem, coming down from God out of heaven, prepared as a Bride adorned for her husband.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Apo 21:2
      - type: text
        text: Vidi civitátem sanctam, Ierúsalem novam, descendéntem de cælo a Deo, parátam sicut sponsam ornátam viro suo.
      - type: response
        text: Deo grátias.
  chapter.apo-21-3-ebab45a4ff:
    role: chapter
    content:
      en:
      - type: citation
        text: Rev 21:3
      - type: text
        text: And I heard a great voice out of the throne, saying Behold, the tabernacle of God is with men, and He will dwell with them. And they shall be His people; and God Himself shall be with them, and be their God.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Apo 21:3
      - type: text
        text: 'Et audívi vocem magnam de throno dicéntem: Ecce tabernáculum Dei cum homínibus, et habitábit cum eis; et ipsi pópulus eius erunt, et ipse Deus cum eis erit eórum Deus.'
      - type: response
        text: Deo grátias.
  chapter.apo-21-4-5-8e68886248:
    role: chapter
    content:
      la:
      - type: citation
        text: Apo 21:4-5
      - type: text
        text: 'Et abstérget Deus omnem lácrimam ab óculis eórum: et mors ultra non erit, neque luctus, neque clamor, neque dolor erit ultra, quia prima abiérunt. Et dixit qui sedébat in throno: Ecce nova fácio ómnia.'
      - type: response
        text: Deo grátias.
  chapter.cant-6-8-53583dfb7a:
    role: chapter
    content:
      la:
      - type: citation
        text: Cant 6:8
      - type: text
        text: Vidérunt eam fíliæ Sion, et beatíssimam prædicavérunt et regínæ laudavérunt eam.
      - type: response
        text: Deo grátias.
  chapter.cant-6-8-79738155bf:
    role: chapter
    content:
      en:
      - type: citation
        text: Song 6:8
      - type: text
