      - type: text
        text: Who is she that cometh forth like the rising dawn, fair as the moon, clear as the sun, terrible as a fenced camp set in battle array?
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Cant 6:9
      - type: text
        text: Quæ est ista, quæ progréditur quasi auróra consúrgens, pulchra ut luna, elécta ut sol, terríbilis ut castrórum ácies ordináta?
      - type: response
        text: Deo grátias.
  chapter.cant-6-9-99e640cd0c:
