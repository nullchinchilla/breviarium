  reading.sed-nos-v-lumus-gaud-re-cum-sanctis-et-tribulati-57723cc327:
    role: reading
    content:
      en:
      - type: text
        text: 'But we, who would fain rejoice with the Saints, would fail not share with them the persecution of the world. Whosoever will not take example of the holy Martyrs, as far as lieth in him, such an one cannot attain unto their blessedness. Thus preacheth the Apostle Paul, when he saith “As ye are partakers of the suffering: so shall ye be also of the consolation.” (2 Cor. i. 7.) Yea, the Lord Himself saith in the Gospel: “If the world hate you, ye know the it hated Me before it hated you (John xv. 18.) He will not be in the body, who will not be hated with the Head.'
      la:
      - type: text
        text: 'Sed nos vólumus gaudére cum Sanctis: et tribulatiónem mundi nólumus sustinére cum ipsis. Qui enim sanctos Mártyres, in quantum potúerit, imitári nolúerit; ad eórum beatitúdinem non póterit perveníre. Sed et Paulus Apóstolus prǽdicat dicens: Si fuérimus sócii passiónum, érimus et consolatiónum. Et Dóminus in Evangélio: Si mundus vos odit, scitóte quia me priórem vobis ódio hábuit. Recúsat esse in córpore, qui ódium non vult sustinére cum cápite.'
      en2:
      - type: text
        text: 'But we wish to rejoice with the Saints; and we do not wish to endure tribulation with them in this world. For he who has been unwilling to imitate the holy Martyrs, insofar as he was able, will not be able to arrive at their blessedness. Moreover, the Apostle Paul also preaches, saying: If we share in their sufferings, we shall also share in their consolations. And the Lord in the Gospel: If the world hates you, know that it has hated me before you. He refuses to be in the body who does not wish to endure hatred together with the head.'
