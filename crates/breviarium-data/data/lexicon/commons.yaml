  reading.unde-et-illi-qui-de-rum-su-rum-adult-ria-et-prob-c50a76d4e0:
    role: reading
    content:
      en:
      - type: text
        text: Therefore they who worship adultery and uncleanness in their gods made celibacy and widowhood punishable. They who lusted after abominations, taxed self-control. The pretence was the desire of fruitfulness, but the aim was to abolish virginity, the resolution of chastity. When a soldier hath served his time he layeth down his arms, leaveth his trade, and retireth him to his own lands, that as well himself may rest after the toils of life, as that the hope of rest to come may make others the more ready to undergo work. So also the aged labourer leaveth it for others to guide the handle of the plough, and withdraweth from the weariness of his younger days' labour to essay the task of an old man's thoughtful supervision. It is easier to prune vines, than to stamp them out, to check the first wild outburst of their vigour, and to curtail the wantonness of their young growth, so teaching, even by the example of the vineyard, that chastity, which keepeth itself within the bearing of but a few children.
      la:
      - type: text
        text: 'Unde et illi qui deórum suórum adultéria et probra venerántur, cælibátus et viduitátis statuére pœnas; ut, ǽmuli críminum, mulctárent stúdia virtútum, spécie quidem qua fœcunditátem quǽrerent, sed stúdio quo propósitum castitátis abolérent. Nam conféctis et miles stipéndiis arma depónit, et relícto offício quod gerébat, ad própria veteránus rura dimíttitur; ut et ipse exércitæ labóribus vitæ réquiem consequátur et álios spes futúræ quiétis subeúndis fáciat opéribus promptióres. Agrícola quoque matúrior torquéndam áliis stivam commíttit, et iuveníli gravátus ópere, providéntiam curæ senílis explórat: vitem facílius tondére quam prémere, ut iuvenescéntem luxúriam réprimat, et adolescéntem lascíviam falce succídat; parcórum quamdam pártuum castitátem docens étiam in vítibus expeténdam.'
      en2:
      - type: text
        text: 'Furthermore, those who venerate the adulteries and shames of their gods established penalties for celibacy and widowhood; so that, as rivals in crime, they might punish the pursuit of virtue — under the pretext of seeking fruitfulness, but with the design of abolishing the resolution of chastity. For the soldier, when his years of service are completed, lays down his arms; and when his office is discharged, the veteran is released to his own fields: so that he himself may obtain rest after a life worn out by labors, and that the hope of future quiet may render others more prompt to undertake their tasks. The more aged farmer also entrusts the plough to others to guide, and, burdened by the toil of youth, looks to the foresight of old age''s care: more easily trimming the vine than pressing it, so as to curb its youthful luxuriance and cut back its adolescent wantonness with the pruning hook; teaching that a certain chastity of restrained fruit is to be sought even in the vines.'
  reading.utr-mque-tamen-magn-fice-causa-ipsa-comm-ndat-ni-332dc7c968:
    role: reading
    content:
      la:
      - type: text
        text: Utrámque tamen magnífice causa ipsa comméndat, nimírum cáritas est. Propter nímiam enim caritátem suam, qua diléxit nos Deus, ut servum redímeret, nec Pater Fílio, nec sibi Fílius ipse pepércit. Vere nímiam, quia et hæc mensúram excedit, modum superat, plane supereminens univérsis. Maiórem, inquit, caritátem nemo habet, quam ut ánimam suam ponat quis pro amícis suis. Tu maiórem habuisti Dómine, ponens eam étiam pro inimícis. Cum enim adhuc inimíci essémus, per mortem tuam et tibi reconciliati sumus et Patri. Quænam ergo ália vidébitur esse, vel fuísse, vel fore huic símilis caritáti? Vix pro iusto quis móritur. Tu pro iniustis passus es, moriens propter delícta nostra, qui venisti iustificare gratis peccatóres, servos fácere fratres, captívos cohæredes, éxsules reges.
      en2:
      - type: text
        text: Yet both are magnificently commended by the cause itself, which is, without doubt, charity. For on account of his exceeding charity, with which God loved us, so that he might redeem his servant, neither did the Father spare his Son, nor did the Son spare himself. Truly exceeding, because this surpasses measure, transcends all limit, plainly supereminent above all things. Greater love, he says, no man has than this, that a man lay down his life for his friends. You had a greater love, O Lord, laying it down even for your enemies. For while we were yet enemies, we were reconciled both to you and to the Father through your death. What other love, then, will seem to be, or to have been, or to be yet to come, like this charity? Scarcely will one die for a just man. You suffered for the unjust, dying for our transgressions, you who came to justify sinners freely, to make servants into brothers, captives into co-heirs, exiles into kings.
  reading.verum-ne-c-cum-illum-tamquam-fastidi-si-p-uperum-8a0f6d59e8:
    role: reading
    content:
      en:
      - type: text
        text: |-
          But lest we should seem haughtily to pass by the poor blind man, and to hurry on to the rich one, let us stand waiting for him, as the Lord stood and waited; let us ask of him, as Christ asked of him. Let us ask, because we are ignorant; Christ asked, because He knew. Let us ask, that we may know whence he received his cure; Christ asked, that all of us may know from one example where through we are to earn a sight of the Lord. Christ asked, that we might believe that none, save they that confess Him, can be saved.
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
      - type: rubric
        text: Kneel for the following verse
      - type: text
        text: |-
          We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: |-
          Verum, ne cæcum illum, tamquam fastidiósi páuperum, cito reliquísse videámur et transísse ad dívitem, exspectémus eum, quia exspectávit et Dóminus; interrogémus eum, quia interrogávit et Christus. Nos interrogémus, quia nescímus: ille, quia nóverat. Nos interrogémus, ut sciámus unde iste curátus sit: ille interrogávit, ut in uno plures discerémus unde Dóminum vidére mereámur. Interrogávit enim, ut crederémus, néminem, nisi confiténtem, posse salvári.
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
          Tibi Chérubim et Séraphim * incessábili voce proclámant:
          (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
          Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
          Te gloriósus * Apostolórum chorus,
          Te Prophetárum * laudábilis númerus,
          Te Mártyrum candidátus * laudat exércitus.
          Te per orbem terrárum * sancta confitétur Ecclésia,
          Patrem * imménsæ maiestátis;
          Venerándum tuum verum * et únicum Fílium;
          Sanctum quoque * Paráclitum Spíritum.
          Tu Rex glóriæ, * Christe.
          Tu Patris * sempitérnus es Fílius.
          (Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
          Tu ad déxteram Dei sedes, * in glória Patris.
          Iudex créderis * esse ventúrus.
      - type: rubric
        text: (Sequens versus dicitur flexis genibus)
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: |-
          Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
          Ætérna fac cum Sanctis tuis * in glória numerári.
          Ætérna fac cum Sanctis tuis * in glória munerári.
          Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
          Et rege eos, * et extólle illos usque in ætérnum.
          Per síngulos dies * benedícimus te.
          (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Dignáre, Dómine, die isto * sine peccáto nos custodíre.
          Miserére nostri, Dómine, * miserére nostri.
          Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
          In te, Dómine, sperávi: * non confúndar in ætérnum.
      en2:
      - type: text
        text: |-
          But, lest we seem to have quickly left behind and passed by that blind man, as though disdainful of the poor, and hastened to the rich man, let us wait for him, because the Lord also waited; let us question him, because Christ also questioned. Let us question, because we do not know: he questioned, because he knew. Let us question, that we may learn from one where this man was healed: he questioned, that from one we might learn whence we may merit to see the Lord. For he questioned, that we might believe that no one, unless confessing, can be saved.
          We praise you, O God: * we acknowledge you as Lord.
          You, the eternal Father, * all the earth does venerate.
          To you all the Angels, * to you the Heavens and all the Powers:
          To you the Cherubim and Seraphim * with unceasing voice proclaim:
          (A bow is made) Holy, Holy, Holy, * Lord God of Sabaoth.
          Full are the heavens and earth * of the majesty of your glory.
          You, the glorious * choir of Apostles,
          You, the praiseworthy * company of Prophets,
          You, the white-robed * army of Martyrs do praise.
          You, throughout the world, * the holy Church does confess:
          the Father * of immense majesty;
          Your venerable, true, * and only Son;
          And also the Holy * Paraclete Spirit.
          You, King of glory, * O Christ.
          You are the eternal * Son of the Father.
          (A bow is made) You, about to take on humanity for its liberation, * did not shrink from the Virgin's womb.
          You, about to take on humanity for its liberation, * did not shrink from the Virgin's womb.
          You, having overcome the sting of death, * have opened the kingdoms of heaven to those who believe.
          You sit at the right hand of God, * in the glory of the Father.
          You are believed * to be the Judge who is to come.
      - type: rubric
        text: (The following verse is said kneeling)
      - type: rubric
        text: (Brethren, when they begin 'Te ergo quaesumus,' departing from the Stalls, let them reverently bow at the words 'Quos pretioso' and the rest)
      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
          And we praise your name for ever, * and for ever and ever.
          Graciously keep us, O Lord, this day * without sin.
          Have mercy on us, O Lord, * have mercy on us.
          Let your mercy, O Lord, be upon us, * as we have hoped in you.
          In you, O Lord, I have hoped: * let me not be confounded for ever.
  reading.verum-quod-s-quitur-qu-niam-qu-in-t-nebris-dix-s-34af2b7050:
    role: reading
    content:
      en:
      - type: text
        text: 'When these woes come, the end is not by and by. And He saith further Nation shall rise against nation, and kingdom against kingdom; and great earthquakes shall be in diverse places, and pestilences, and famines, and fearful sights and great signs shall there be from heaven. Before the last tribulation cometh, shall come many other tribulations: and, by the many woes which shall come first, shall be foreshadowed the everlasting woe which shall come in the end. And therefore, after wars and commotions, the end is not yet by and by many woes must come first, to give warning of the woe that hath no end.'
      la:
      - type: text
        text: 'Verum quod séquitur: Quóniam quæ in ténebris dixístis, in lúmine dicéntur; non solum in futúro, quando cuncta córdium abscóndita proferéntur ad lucem, sed et in præsénti témpore potest congruénter áccipi. Quóniam quæ inter ténebras quondam pressurárum carcerúmque umbras vel locúti vel passi sunt Apóstoli; nunc, clarificáta per orbem Ecclésia, lectis eórum áctibus, públice prædicántur. Ne terreámini ab his qui occídunt corpus. Si persecutóres Sanctórum, occísis corpóribus, non habent ámplius quid contra illos agant: ergo supervácua furunt insánia, qui mórtua Mártyrum membra, feris avibúsque discerpénda proiíciunt, cum nequáquam omnipoténtiæ Dei, quin ea resuscitándo vivíficet, obsístere possint.'
      en2:
      - type: text
        text: 'But what follows — For what you said in darkness will be spoken in the light — can be fittingly understood not only of the future, when all the hidden things of hearts will be brought to light, but also of the present time. For what the Apostles spoke or suffered amid the darkness of former persecutions and the shadows of prisons, is now publicly proclaimed throughout the world, as the Church has been glorified, when their Acts are read. Do not be afraid of those who kill the body. If the persecutors of the Saints, having slain the bodies, have nothing further to do against them: then their frenzy was in vain, they who cast the dead members of the Martyrs to be torn apart by wild beasts and birds, since they cannot in any way resist the omnipotence of God from raising them up and restoring them to life.'
  reading.verum-quod-s-quitur-qu-niam-qu-in-t-nebris-dix-s-5145b334d0:
    role: reading
