  responsory.ave-mar-a-gr-tia-plena-d-minus-tecum-31d08d0679:
    role: responsory
    content:
      en:
      - type: response
        text: Blessed art thou, O Virgin Mary, who hast carried the Lord, the Maker of the world.
      - type: text
        text: Thou hast borne Him Who created thee, and thou abidest a virgin for ever.
      - type: versicle
        text: Hail, Mary, full of grace, the Lord is with thee.
      - type: response
        text: Thou hast borne him who created thee, and thou abidest a virgin for ever.
      la:
      - type: response
        text: 'Ave, María, grátia plena; Dóminus tecum:'
      - type: text
        text: 'Spíritus Sanctus supervéniet in te, et virtus Altíssimi obumbrábit tibi: quod enim ex te nascétur Sanctum, vocábitur Fílius Dei. (Allelúia.)'
      - type: versicle
        text: Quómodo fiet istud, quóniam virum non cognósco? Et respóndens Angelus, dixit ei.
      - type: response
        text: 'Spíritus Sanctus supervéniet in te, et virtus Altíssimi obumbrábit tibi: quod enim ex te nascétur Sanctum, vocábitur Fílius Dei. (Allelúia.)'
