  responsory.be-tam-me-dicent-omnes-generati-nes-d53d7a5c23:
    role: responsory
    content:
      en:
      - type: response
        text: All generations shall call me blessed.
      - type: text
        text: '* For He that is mighty, even the Lord, hath done to me great things; and Holy is His Name.'
      - type: versicle
        text: And his mercy is on them that fear Him, from generation to generation.
      - type: response
        text: He that is mighty, even the Lord, hath done to me great things; and Holy is His Name.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: He that is mighty, even the Lord, hath done to me great things; and Holy is His Name.
      la:
      - type: response
        text: Beátam me dicent omnes generatiónes,
      - type: text
        text: '* Quia fecit mihi Dóminus magna qui potens est, et sanctum nomen eius.'
      - type: versicle
        text: Et misericórdia eius a progénie in progénies timéntibus eum.
      - type: response
        text: Quia fecit mihi Dóminus magna qui potens est, et sanctum nomen eius.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quia fecit mihi Dóminus magna qui potens est, et sanctum nomen eius.
  responsory.be-ti-estis-cum-maled-xerint-vobis-h-mines-et-pe-c4fc9c98cf:
    role: responsory
    content:
      en:
      - type: response
        text: Blessed are ye when men shall revile you, and persecute you, and shall say all manner of evil against you falsely, for My sake;
      - type: text
        text: '* Rejoice, and be exceeding glad, for great is your reward in heaven.'
      - type: versicle
        text: When men shall hate you, and when they shall separate you from their company, and shall reproach you, and cast out your name as evil, for the Son of Man's sake.
      - type: response
        text: Rejoice, and be exceeding glad, for great is your reward in heaven.
      la:
      - type: response
        text: 'Beáti estis, cum maledíxerint vobis hómines, et persecúti vos fúerint, et díxerint omne malum advérsum vos, mentiéntes, propter me:'
      - type: text
        text: '* Gaudéte et exsultáte, quóniam merces vestra copiósa est in cælis.'
      - type: versicle
        text: Cum vos óderint hómines, et cum separáverint vos, et exprobráverint, et eiécerint nomen vestrum tamquam malum propter Fílium hóminis.
      - type: response
        text: Gaudéte et exsultáte, quóniam merces vestra copiósa est in cælis.
  responsory.be-tus-vir-qui-m-tuit-d-minum-allel-ia-4222ac4c28:
    role: responsory
    content:
      en:
      - type: response
        text: Blessed is the man that feareth the Lord, alleluia.
      - type: text
        text: '* He shall delight exceedingly in his commandments, alleluia, alleluia, alleluia.'
      - type: versicle
        text: 'Glory and wealth shall be in his house: and his justice remaineth for ever and ever.'
      - type: response
        text: He shall delight exceedingly in his commandments, alleluia, alleluia, alleluia.
      la:
      - type: response
        text: 'Beátus vir qui métuit Dóminum, allelúia:'
      - type: text
        text: '* In mandátis eius cupit nimis, allelúia, allelúia, allelúia.'
      - type: versicle
        text: Glória et divítiæ in domo eius, et iustítia eius manet in sǽculum sǽculi.
      - type: response
        text: In mandátis eius cupit nimis, allelúia, allelúia, allelúia.
  responsory.beata-es-virgo-mar-a-qu-dominum-portasti-creator-05f7ca934a:
    role: responsory
    content:
      la:
      - type: response
        text: 'Beata es, Virgo María, quæ Dominum portasti, Creatorem mundi:'
      - type: text
        text: '* Genuisti qui te fecit, et in æternum permanes Virgo.'
      - type: versicle
        text: Ave María, gratia plena, Dominus tecum.
      - type: response
        text: Genuisti qui te fecit, et in æternum permanes Virgo.
  responsory.beata-es-virgo-mar-a-qu-dominum-portasti-creator-41d7926de4:
    role: responsory
    content:
      en:
      - type: response
        text: Blessed art thou, O Virgin Mary, who hast carried the Lord, the Maker of the world.
      - type: text
        text: '* Thou hast borne Him Who created thee, and thou abidest a virgin for ever.'
      - type: versicle
        text: Hail, Mary, full of grace, the Lord is with thee.
      - type: response
        text: Thou hast borne him who created thee, and thou abidest a virgin for ever.
      la:
      - type: response
        text: 'Beata es, Virgo María, quæ Dominum portasti, Creatorem mundi:'
      - type: text
        text: '* Genuisti qui te fecit, et in æternum permanes Virgo.'
      - type: versicle
        text: Ave María, gratia plena, Dominus tecum.
      - type: response
        text: Genuisti qui te fecit, et in æternum permanes Virgo.
  responsory.c-ndidi-facti-sunt-nazar-i-eius-allel-ia-splend-7831a112a9:
    role: responsory
    content:
      en:
      - type: response
        text: 'Her Nazarites are become pure, Alleluia: they reflect the glory of God, Alleluia.'
      - type: text
        text: '* They are whiter than milk. Alleluia, Alleluia.'
      - type: versicle
        text: They are purer than snow, they are whiter than milk, they are more ruddy in body than coral, their polishing is of sapphire.
      - type: response
        text: They are whiter than milk. Alleluia, Alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: They are whiter than milk. Alleluia, Alleluia.
      la:
      - type: response
        text: 'Cándidi facti sunt Nazarǽi eius, allelúia: splendórem Deo dedérunt, allelúia:'
      - type: text
        text: '* Et sicut lac coaguláti sunt, allelúia, allelúia.'
      - type: versicle
        text: Candidióres nive, nitidióres lacte, rubicundióres ébore antíquo, sapphíro pulchrióres.
      - type: response
        text: Et sicut lac coaguláti sunt, allelúia, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et sicut lac coaguláti sunt, allelúia, allelúia.
  responsory.clam-vit-p-pulus-ad-regem-alim-nta-petens-10bc6eb398:
    role: responsory
    content:
      en:
      - type: response
        text: The people cried to Pharaoh for bread
      - type: text
        text: '* And he answered them Go unto Joseph. Alleluia.'
      - type: versicle
        text: The saving of our lives is in thy hand; only let us find grace in thy sight, and we will gladly be Pharaoh's servants.
      - type: response
        text: And he answered them Go unto Joseph. Alleluia.
      la:
      - type: response
        text: 'Clamávit pópulus ad regem, aliménta petens:'
      - type: text
        text: '* Quibus ille respóndit: Ite ad Ioseph, allelúia.'
      - type: versicle
        text: 'Salus nostra in manu tua est: réspice nos tantum, et læti serviémus regi.'
      - type: response
        text: 'Quibus ille respóndit: Ite ad Ioseph, allelúia.'
  responsory.congratul-mini-mihi-omnes-qui-dil-gitis-d-minum-18249e93f5:
    role: responsory
    content:
      en:
      - type: response
        text: Rejoice with me, all ye that love the Lord, for while I was yet a little one, I pleased the Most High.
      - type: text
        text: '* And I have brought forth from my bowels God and man.'
      - type: versicle
        text: All generations shall call me blessed, since the Lord hath regarded the lowliness of his handmaiden.
      - type: response
        text: And I have brought forth from my bowels God and man.
      la:
      - type: response
        text: 'Congratulámini mihi, omnes qui dilígitis Dóminum: quia cum essem párvula, plácui Altíssimo,'
      - type: text
        text: '* Et de meis viscéribus génui Deum et hóminem.'
      - type: versicle
        text: Beátam me dicent omnes generatiónes, quia ancíllam húmilem respéxit Deus.
      - type: response
        text: Et de meis viscéribus génui Deum et hóminem.
  responsory.cor-na-urea-super-caput-eius-74e593d0d0:
    role: responsory
    content:
      la:
      - type: response
        text: Coróna áurea super caput eius,
      - type: text
        text: '* Expréssa signo sanctitátis, glória honóris, et opus fortitúdinis.'
      - type: versicle
        text: Quóniam prævenísti eum in benedictiónibus dulcédinis, posuísti in cápite eius corónam de lápide pretióso.
      - type: response
        text: Expréssa signo sanctitátis, glória honóris, et opus fortitúdinis.
  responsory.cor-na-urea-super-caput-eius-8dd5fb65e7:
    role: responsory
    content:
      en:
      - type: response
        text: A crown of gold upon his head,
      - type: text
        text: '* Wherein is engraved Holiness, an ornament of honour, a costly work.'
      - type: versicle
        text: For Thou hast prevented him with the blessings of sweetness, Thou hast set a crown of precious stones upon his head.
      - type: response
        text: Wherein is engraved Holiness, an ornament of honour, a costly work.
      la:
      - type: response
        text: Coróna áurea super caput eius,
      - type: text
        text: '* Expréssa signo sanctitátis, glória honóris, et opus fortitúdinis.'
      - type: versicle
        text: Quóniam prævenísti eum in benedictiónibus dulcédinis, posuísti in cápite eius corónam de lápide pretióso.
      - type: response
        text: Expréssa signo sanctitátis, glória honóris, et opus fortitúdinis.
  responsory.credo-quod-red-mptor-meus-vivit-et-in-nov-ssimo-fe2daf62c6:
    role: responsory
    content:
      en:
      - type: response
        text: I believe that my Redeemer liveth, and that I shall stand up from the earth at the latter day,
      - type: text
        text: '* And in my flesh shall I see God my Saviour.'
      - type: versicle
        text: Whom I shall see for myself, and mine eyes shall behold, and not another.
      - type: response
        text: And in my flesh shall I see God my Saviour.
      la:
      - type: response
        text: Credo quod Redémptor meus vivit, et in novíssimo die de terra surrectúrus sum,
      - type: text
        text: '* Et in carne mea vidébo Deum Salvatórem meum.'
      - type: versicle
        text: Quem visúrus sum ego ipse, et non álius; et óculi mei conspectúri sunt.
      - type: response
        text: Et in carne mea vidébo Deum Salvatórem meum.
  responsory.d-mine-quando-v-neris-iudic-re-terram-ubi-me-abs-61ecc67c8d:
    role: responsory
    content:
      en:
      - type: response
        text: Lord, when Thou comest to judge the earth, where shall I hide myself from the face of thy wrath?
      - type: text
        text: '* For I have sinned greatly in my life.'
      - type: versicle
        text: I dread my sins, I blush before thee I see the great tribunal set! In fear and terror I implore thee, Forgive when soul and Judge are met!
      - type: response
        text: For I have sinned greatly in my life.
      - type: versicle
        text: Eternal rest * grant unto them, O Lord.
      - type: response
        text: And let perpetual light * shine upon them.
      - type: response
        text: For I have sinned greatly in my life.
      la:
      - type: response
        text: Dómine, quando véneris iudicáre terram, ubi me abscóndam a vultu iræ tuæ?
      - type: text
        text: '* Quia peccávi nimis in vita mea.'
      - type: versicle
        text: 'Commíssa mea pavésco, et ante te erubésco: dum véneris iudicáre, noli me condemnáre.'
      - type: response
        text: Quia peccávi nimis in vita mea.
      - type: versicle
        text: Réquiem ætérnam * dona eis, Dómine.
      - type: response
        text: Et lux perpétua * lúceat eis.
      - type: response
        text: Quia peccávi nimis in vita mea.
  responsory.d-mine-sec-ndum-actum-meum-noli-me-iudic-re-nihi-16668dace2:
    role: responsory
    content:
      en:
      - type: response
        text: O Lord, judge me not according to my works; for I have done nothing that can be counted in respect of thee. I beseech thy majesty therefore, that thou wouldest
      - type: text
        text: '* Blot out my transgressions, O God.'
      - type: versicle
        text: Lord, wash me thoroughly from mine iniquity and cleanse me from my sin.
      - type: response
        text: Blot out my transgressions, O God.
      la:
      - type: response
        text: 'Dómine, secúndum actum meum noli me iudicáre: nihil dignum in conspéctu tuo egi; ídeo déprecor maiestátem tuam,'
      - type: text
        text: '* Ut tu, Deus, déleas iniquitátem meam.'
      - type: versicle
        text: Amplius lava me, Dómine, ab iniustítia mea, et a delícto meo munda me.
      - type: response
        text: Ut tu, Deus, déleas iniquitátem meam.
  responsory.ded-sti-mihi-protecti-nem-sal-tis-tu-et-d-xtera-ea799d4857:
    role: responsory
    content:
      en:
      - type: response
        text: Thou hast given me the shield of thy salvation, and thy right hand hath holden me up.
      - type: text
        text: '* My buckler, and the horn of my salvation, and my refuge. Alleluia.'
      - type: versicle
        text: I am thy shield and thy exceeding great reward.
      - type: response
        text: My buckler, and the horn of my salvation, and my refuge. Alleluia.
      la:
      - type: response
        text: 'Dedísti mihi protectiónem salútis tuæ, et déxtera tua suscépit me:'
      - type: text
        text: '* Protéctor meus, et cornu salútis meæ, et suscéptor meus, allelúia.'
      - type: versicle
        text: Ego protéctor tuus sum, et merces tua magna nimis.
      - type: response
        text: Protéctor meus, et cornu salútis meæ, et suscéptor meus, allelúia.
  responsory.desid-rium-nim-eius-tribu-sti-ei-d-mine-b7e61b9442:
    role: responsory
    content:
      en:
      - type: response
        text: Lord, Thou hast given him his heart's desire.
      - type: text
        text: '* And hast not withholden the request of his lips.'
      - type: versicle
        text: 'For Thou hast prevented him with the blessings of sweetness: Thou hast set a crown of precious stones upon his head.'
      - type: response
        text: And hast not withholden the request of his lips.
      la:
      - type: response
        text: Desidérium ánimæ eius tribuísti ei Dómine,
      - type: text
        text: '* Et voluntáte labiórum eius non fraudásti eum.'
      - type: versicle
        text: 'Quóniam prævenísti eum in benedictiónibus dulcédinis: posuísti in cápite eius corónam de lápide pretióso.'
      - type: response
        text: Et voluntáte labiórum eius non fraudásti eum.
  responsory.desid-rium-nim-eius-tribu-sti-ei-d-mine-c7e375fe2c:
    role: responsory
    content:
      la:
      - type: response
        text: Desidérium ánimæ eius tribuísti ei Dómine,
      - type: text
        text: '* Et voluntáte labiórum eius non fraudásti eum.'
      - type: versicle
        text: 'Quóniam prævenísti eum in benedictiónibus dulcédinis: posuísti in cápite eius corónam de lápide pretióso.'
      - type: response
        text: Et voluntáte labiórum eius non fraudásti eum.
  responsory.diff-sa-est-gr-tia-in-l-biis-tuis-8d36961f3e:
    role: responsory
    content:
      en:
      - type: response
        text: Grace is poured into thy lips, therefore;
      - type: text
        text: '* God hath blessed thee for ever.'
      - type: versicle
        text: In thy comeliness and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: God hath blessed thee for ever.
      la:
      - type: response
        text: Diffúsa est grátia in lábiis tuis,
      - type: text
        text: '* Proptérea benedíxit te Deus in ætérnum.'
      - type: versicle
        text: Spécie tua et pulchritúdine tua inténde, próspere procéde, et regna.
      - type: response
        text: Proptérea benedíxit te Deus in ætérnum.
  responsory.dilex-sti-iust-tiam-et-od-sti-iniquit-tem-e117bcd8dd:
    role: responsory
    content:
      en:
      - type: response
        text: Thou hast loved righteousness, and hated iniquity;
      - type: text
        text: '* Therefore God, thy God, hath anointed thee with the oil of gladness.'
      - type: versicle
        text: Because of truth, and meekness, and righteousness.
      - type: response
        text: Therefore God, thy God, hath anointed thee with the oil of gladness.
      la:
      - type: response
        text: 'Dilexísti iustítiam, et odísti iniquitátem:'
      - type: text
        text: '* Proptérea unxit te Deus, Deus tuus, óleo lætítiæ.'
      - type: versicle
        text: Propter veritátem, et mansuetúdinem, et iustítiam.
      - type: response
        text: Proptérea unxit te Deus, Deus tuus, óleo lætítiæ.
  responsory.domus-mea-domus-orati-nis-voc-bitur-dicit-d-minu-6cc6d17495:
    role: responsory
    content:
      en:
      - type: response
        text: My house shall be called the house of prayer, saith the Lord. Therein, he that asketh, receiveth; he that seeketh, findeth;
      - type: text
        text: '* And to him that knocketh, it shall be opened.'
      - type: versicle
        text: Ask, and ye shall receive; seek, and ye shall find.
      - type: response
        text: And to him that knocketh, it shall be opened.
      la:
      - type: response
        text: 'Domus mea, domus oratiónis vocábitur, dicit Dóminus: in ea omnis qui petit, áccipit; et qui quærit, ínvenit;'
      - type: text
        text: '* Et pulsánti aperiétur.'
      - type: versicle
        text: Pétite, et accipiétis; quǽrite, et inveniétis.
      - type: response
        text: Et pulsánti aperiétur.
  responsory.dum-stet-ritis-ante-reges-et-pr-sides-nol-te-cog-9eeb4fe824:
    role: responsory
    content:
      en:
      - type: response
        text: 'But when they shall deliver you up to the judges, take no thought how or what to speak:'
      - type: text
        text: '* for it shall be given you in that hour what to speak:'
      - type: versicle
        text: For it is not you that speak, but the spirit of your Father that speaketh in you.
      - type: response
        text: For it shall be given you in that hour what to speak.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: For it shall be given you in that hour what to speak.
      la:
      - type: response
        text: 'Dum stetéritis ante reges et prǽsides, nolíte cogitáre quómodo aut quid loquámini:'
      - type: text
        text: '* Dábitur enim vobis in illa hora, quid loquámini.'
      - type: versicle
        text: 'Non enim vos estis qui loquímini: sed Spíritus Patris vestri, qui lóquitur in vobis.'
      - type: response
        text: Dábitur enim vobis in illa hora, quid loquámini.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Dábitur enim vobis in illa hora, quid loquámini.
  responsory.ecce-ego-mitto-vos-sicut-oves-in-m-dio-lup-rum-d-7793ddce27:
    role: responsory
    content:
      en:
      - type: response
        text: 'Behold, I send you as sheep in the midst of wolves, said the Lord:'
      - type: text
        text: '* Be ye, therefore, wise as serpents and simple as doves.'
      - type: versicle
        text: Whilst you have the light, believe in the light, that you may be the children of light.
      - type: response
        text: Be ye therefore wise as serpents and simple as doves.
      la:
      - type: response
        text: 'Ecce ego mitto vos sicut oves in médio lupórum, dicit Dóminus:'
      - type: text
        text: '* Estóte ergo prudéntes sicut serpéntes, et símplices sicut colúmbæ.'
      - type: versicle
        text: Dum lucem habétis, crédite in lucem, ut fílii lucis sitis.
      - type: response
        text: Estóte ergo prudéntes sicut serpéntes, et símplices sicut colúmbæ.
  responsory.ecce-sac-rdos-magnus-qui-in-di-bus-suis-pl-cuit-51071a4ba1:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ecce sacérdos magnus, qui in diébus suis plácuit Deo:'
      - type: text
        text: '* Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.'
      - type: versicle
        text: Benedictiónem ómnium géntium dedit illi, et testaméntum suum confirmávit super caput eius.
      - type: response
        text: Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.
  responsory.ecce-sac-rdos-magnus-qui-in-di-bus-suis-pl-cuit-631d554b94:
    role: responsory
    content:
      en:
      - type: response
        text: Behold an high priest, who in his days pleased God
      - type: text
        text: '* Therefore the Lord assured him by an oath that He would multiply his seed among His people.'
      - type: versicle
        text: He hath made him a blessing unto all nations, and hath established His covenant upon his head.
      - type: response
        text: Therefore the Lord assured him by an oath that He would multiply his seed among His people
      la:
      - type: response
        text: 'Ecce sacérdos magnus, qui in diébus suis plácuit Deo:'
      - type: text
        text: '* Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.'
      - type: versicle
        text: Benedictiónem ómnium géntium dedit illi, et testaméntum suum confirmávit super caput eius.
      - type: response
        text: Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.
  responsory.ego-ante-te-ap-rui-mare-7f2825c4e3:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego ante te apérui mare:'
      - type: text
        text: '* Et tu aperuísti láncea latus Salvatori tuo,'
      - type: text
        text: '* Qui redémit mundum in sánguine suo.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu aperuísti láncea latus Salvatori tuo.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Qui redémit mundum in sánguine suo.
  responsory.ego-duxi-te-per-des-rtum-quadrag-nta-annis-et-ma-d3557568a9:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego duxi te per desértum quadragínta annis, et manna cibavi te:'
      - type: text
        text: '* Et tu me cecidisti alapis et flagéllis.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me cecidisti alapis et flagéllis.
  responsory.ego-ed-xi-te-de-g-pto-dem-rso-phara-ne-in-mare-r-fb448c6685:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego edúxi te de Ægýpto, demérso Pharaóne in Mare Rubrum, et ante te præívi in colúmna nubis:'
      - type: text
        text: '* Et tu me tradidísti princípibus sacerdótum, et me duxísti ad prætórium Piláti.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me tradidísti princípibus sacerdótum, et me duxísti ad prætórium Piláti.
  responsory.ego-exalt-vi-te-magna-virt-te-2be225070b:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego exaltávi te magna virtúte:'
      - type: text
        text: '* Et tu me suspendisti in patibulo crucis,'
      - type: text
        text: '* In qua expándi manus meas ad pópulum non credentem et contradicentem.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me suspendisti in patibulo crucis.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: In qua expándi manus meas ad pópulum non credentem et contradicentem.
  responsory.ego-propter-te-chanan-orum-reges-perciissi-et-de-acc08cdd87:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego propter te Chananæorum reges perciissi, et dedi tibi sceptrum regále:'
      - type: text
        text: '* Et tu dedísti cápiti meo spineam corónam, et percussísti arundine caput meum.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu dedísti cápiti meo spineam corónam, et percussísti arundine caput meum.
  responsory.ego-propter-te-flagell-vi-g-ptum-cum-primog-niti-efb1c28130:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego propter te flagellávi Ægýptum cum primogénitis suis:'
      - type: text
        text: '* Et tu me flagellátum tradidísti,'
      - type: text
        text: '* Qui tamquam agnus coram tondénte se obmútui, et non apérui os meum.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me flagellátum tradidísti.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Qui tamquam agnus coram tondénte se obmútui, et non apérui os meum.
  responsory.ego-sum-vitis-vera-et-vos-p-lmites-d9e0d40c58:
    role: responsory
    content:
      en:
      - type: response
        text: 'I am the vine: you the branches.'
      - type: text
        text: '* He that abideth in me, and I in him, the same beareth much fruit, alleluia, alleluia.'
      - type: versicle
        text: As the Father hath loved me, I also have loved you.
      - type: response
        text: He that abideth in me, and I in him, the same beareth much fruit, alleluia, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: He that abideth in me, and I in him, the same beareth much fruit, alleluia, alleluia.
      la:
      - type: response
        text: 'Ego sum vitis vera, et vos pálmites:'
      - type: text
        text: '* Qui manet in me, et ego in eo, hic fert fructum multum, allelúia, allelúia.'
      - type: versicle
        text: Sicut diléxit me Pater, et ego diléxi vos.
      - type: response
        text: Qui manet in me, et ego in eo, hic fert fructum multum, allelúia, allelúia.
  responsory.ego-te-potavi-aqua-sal-tis-de-petra-1ec073fe5a:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego te potavi aqua salútis de petra:'
      - type: text
        text: '* Et tu me potásti felle et acéto.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me potásti felle et acéto.
  responsory.euge-serve-bone-et-fid-lis-quia-in-pauca-fu-sti-7f98509db0:
    role: responsory
    content:
      en:
      - type: response
        text: 'Well done, thou good and faithful servant, thou hast been faithful over a few things. I will make thee ruler over many things:'
      - type: text
        text: '* Enter thou into the joy of thy Lord.'
      - type: versicle
        text: Lord, thou deliveredst unto me five talents; behold, I have gained beside them five talents more.
      - type: response
        text: Enter thou into the joy of thy Lord.
      la:
      - type: response
        text: 'Euge, serve bone et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam:'
      - type: text
        text: '* Intra in gáudium Dómini tui.'
      - type: versicle
        text: Dómine, quinque talénta tradidísti mihi, ecce ália quinque superlucrátus sum.
      - type: response
        text: Intra in gáudium Dómini tui.
  responsory.euge-serve-bone-et-fid-lis-quia-in-pauca-fu-sti-b34ec773ed:
    role: responsory
    content:
      la:
      - type: response
        text: 'Euge, serve bone et fidélis, quia in pauca fuísti fidélis, supra multa te constítuam:'
      - type: text
        text: '* Intra in gáudium Dómini tui.'
      - type: versicle
        text: Dómine, quinque talénta tradidísti mihi, ecce ália quinque superlucrátus sum.
      - type: response
        text: Intra in gáudium Dómini tui.
  responsory.f-li-ier-salem-ven-te-et-vid-te-m-rtyres-cum-cor-bf32d9c722:
    role: responsory
    content:
      en:
      - type: response
        text: Come forth, O ye daughters of Jerusalem, and behold the Martyrs with the crowns wherewith the Lord crowned them;
      - type: text
        text: '* In the day of His feasting, and of His gladness. Alleluia.'
      - type: versicle
        text: For He hath strengthened the bars of thy gates He hath blessed thy children within thee.
      - type: response
        text: In the day of His feasting, and of His gladness. Alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: In the day of His feasting, and of His gladness. Alleluia.
      la:
      - type: response
        text: Fíliæ Ierúsalem, veníte et vidéte Mártyres cum corónis, quibus coronávit eos Dóminus
      - type: text
        text: '* In die solemnitátis et lætítiæ, allelúia.'
      - type: versicle
        text: Quóniam confortávit seras portárum tuárum, benedíxit fílios tuos in te.
      - type: response
        text: In die solemnitátis et lætítiæ, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: In die solemnitátis et lætítiæ, allelúia.
  responsory.fallax-gr-tia-et-vana-est-pulchrit-do-78ab776e88:
    role: responsory
    content:
      en:
      - type: response
        text: Favour is deceitful, and beauty is vain
      - type: text
        text: '* A woman that feareth God she shall be praised.'
      - type: versicle
        text: Give her of the fruit of her hands, and let her own works praise her in the gates.
      - type: response
        text: A woman that feareth God she shall be praised.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: A woman that feareth God she shall be praised.
      la:
      - type: response
        text: 'Fallax grátia, et vana est pulchritúdo:'
      - type: text
        text: '* Múlier timens Dóminum, ipsa laudábitur.'
      - type: versicle
        text: Date ei de fructu mánuum suárum, et laudent eam in portis ópera eius.
      - type: response
        text: Múlier timens Dóminum, ipsa laudábitur.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Múlier timens Dóminum, ipsa laudábitur.
  responsory.fecit-me-deus-quasi-patrem-regis-et-d-minum-univ-de77eea08a:
    role: responsory
    content:
      en:
      - type: response
        text: God hath made me as a father to Pharaoh, and lord of all his house.
      - type: text
        text: '* He hath made me great, to save much people alive. Alleluia.'
      - type: versicle
        text: Come unto me, and I wili give you all the good of the land of Egypt, and ye shall eat the fat of the land.
      - type: response
        text: He hath made me great, to save much people alive. Alleluia.
      la:
      - type: response
        text: 'Fecit me Deus quasi patrem regis, et dóminum univérsæ domus eius:'
      - type: text
        text: '* Exaltávit me, ut salvos fáceret multos pópulos, allelúia.'
      - type: versicle
        text: Veníte ad me, et ego dabo vobis ómnia bona Ægýpti, ut comedátis medúllam terræ.
      - type: response
        text: Exaltávit me, ut salvos fáceret multos pópulos, allelúia.
  responsory.felix-namque-es-sacra-virgo-mar-a-et-omni-laude-35aac9ad1f:
    role: responsory
    content:
      en:
      - type: response
        text: O Holy Virgin Mary, happy indeed art thou, and right worthy of all praise
      - type: text
        text: '* For out of thee rose the Sun of righteousness, even Christ our God.'
      - type: versicle
        text: Pray for the people, plead for the clergy, make intercession for all women vowed to God. May all that are keeping this thine holy Feast day feel the might of thine assistance.
      - type: response
        text: For out of thee rose the Sun of righteousness, even Christ our God.
      la:
      - type: response
        text: 'Felix namque es, sacra Virgo María, et omni laude digníssima:'
      - type: text
        text: '* Quia ex te ortus est sol iustítiæ, Christus, Deus noster.'
      - type: versicle
        text: 'Ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu: séntiant omnes tuum iuvámen, quicúmque célebrant tuam sanctam festivitátem.'
      - type: response
        text: Quia ex te ortus est sol iustítiæ, Christus, Deus noster.
  responsory.felix-namque-es-sacra-virgo-mar-a-et-omni-laude-7775c78355:
    role: responsory
    content:
      la:
      - type: response
        text: 'Felix namque es, sacra Virgo María, et omni laude digníssima:'
      - type: text
        text: '* Quia ex te ortus est sol iustítiæ, Christus, Deus noster.'
