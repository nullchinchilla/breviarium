        psalms:
        - number: '97'
      la:
      - type: psalmody
        antiphon: O quam pulchra * est casta generátio cum claritáte!
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Ante torum * huius Vírginis frequentáte nobis dúlcia cántica drámatis.
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: Revértere, * revértere, Sunamítis; revértere, ut intueámur te.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: Spécie tua * et pulchritúdine tua inténde, próspere procéde, et regna.
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: 'Adiuvábit eam * Deus vultu suo: Deus in médio eius, non commovébitur.'
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: Aquæ multæ * non potuérunt exstínguere caritátem.
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: Nigra sum, * sed formósa, fíliæ Ierúsalem; ídeo diléxit me Rex, et introdúxit me in cubículum suum.
        psalms:
        - number: '95'
      - type: psalmody
        antiphon: 'Trahe me post te, * in odórem currémus unguentórum tuórum: óleum effúsum nomen tuum.'
