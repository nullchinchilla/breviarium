  reading.hinc-namque-e-sdem-pr-dicat-ribus-isa-as-dicit-p-dbccbd0da1:
    role: reading
    content:
      en:
      - type: text
        text: By reason of these words, an hundredfold, some will have that there shall be a thousand years after the resurrection, wherein they that have forsaken all things shall receive an hundredfold of those things which they have forsaken, and shall inherit everlasting life. Such men consider not that though in other things this were worthy, as touching wives it is unseemly for it becometh us not to think that he that hath forsaken one wife in this world, shall receive an hundred wives in that which is to come. But the meaning is this, that every one that for the Saviour's sake hath forsaken earthly things, shall receive spiritual things which things, being rightly weighed against earthly things, are as though an hundredfold were weighed against one.
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
