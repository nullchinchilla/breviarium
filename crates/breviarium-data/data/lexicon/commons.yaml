  psalmody.in-omnem-terram-ex-vit-sonus-e-rum-et-in-fines-o-299497d7c4:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: 'Their sound * hath gone forth into all the earth: and their words unto the ends of the world.'
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: The just cried * and the Lord heard them.
        psalms:
        - number: '33'
      - type: psalmody
        antiphon: Thou shalt make them princes * over all the earth. They shall remember thy name, O Lord.
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: The princes of the people * are gathered together, with the God of Abraham.
        psalms:
        - number: '46'
      - type: psalmody
        antiphon: Thou hast given an inheritance * to them that fear thy name, O Lord.
        psalms:
        - number: '60'
      - type: psalmody
        antiphon: They declared * the works of God, and understood his doings.
        psalms:
        - number: '63'
      - type: psalmody
        antiphon: The horns of the just * shall be exalted. Alleluia.
        psalms:
        - number: '74'
      - type: psalmody
        antiphon: Light is risen * to the just, alleluia, and joy to the right of heart. Alleluia.
        psalms:
        - number: '96'
      - type: psalmody
        antiphon: They kept his testimonies, * and the commandment which he gave them. Alleluia.
        psalms:
        - number: '98'
      la:
      - type: psalmody
        antiphon: In omnem terram * exívit sonus eórum, et in fines orbis terræ verba eórum.
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: Clamavérunt iusti, * et Dóminus exaudívit eos.
        psalms:
        - number: '33'
      - type: psalmody
        antiphon: 'Constítues eos * príncipes super omnem terram: mémores erunt nóminis tui, Dómine.'
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: Príncipes populórum * congregáti sunt cum Deo Ábraham.
        psalms:
        - number: '46'
      - type: psalmody
        antiphon: Dedísti hereditátem * timéntibus nomen tuum, Dómine.
        psalms:
        - number: '60'
      - type: psalmody
        antiphon: Annuntiavérunt * ópera Dei, et facta eius intellexérunt.
        psalms:
        - number: '63'
      - type: psalmody
        antiphon: Exaltabúntur * córnua iusti, allelúia.
        psalms:
        - number: '74'
      - type: psalmody
        antiphon: Lux orta est * iusto, allelúia, rectis corde lætítia, allelúia.
        psalms:
        - number: '96'
      - type: psalmody
        antiphon: Custodiébant * testimónia eius, et præcépta eius, allelúia.
        psalms:
        - number: '98'
  psalmody.missus-est-g-briel-angelus-ad-mar-am-v-rginem-de-b7c1623ffd:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: The Angel Gabriel was sent * to a virgin espoused to a man whose name was Joseph; and the virgin's name was Mary. (Alleluia.)
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: Hail, Mary, * full of grace, the Lord is with thee; blessed art thou among women. (Alleluia.)
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: Fear not, Mary, * thou hast found grace with the Lord; behold, thou shalt conceive, and bring forth a Son. (Alleluia.)
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: The Lord shall give unto Him * the throne of His father David, and of His kingdom there shall be no end. (Alleluia.)
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: Behold the handmaid of the Lord, * be it unto me according to thy word. (Alleluia.)
        psalms:
        - number: '147'
      la:
      - type: psalmody
        antiphon: Missus est * Gábriel Angelus ad Maríam Vírginem desponsátam Ioseph. (Allelúia.)
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: 'Ave, María, * grátia plena; Dóminus tecum: benedícta tu in muliéribus. (Allelúia.)'
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: 'Ne tímeas, María, * invenísti grátiam apud Dóminum: ecce concípies et páries fílium. (Allelúia.)'
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: Dabit ei Dóminus * sedem David, patris eius, et regnábit in ætérnum. (Allelúia.)
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: 'Ecce ancílla Dómini: * fiat mihi secúndum verbum tuum. (Allelúia.)'
        psalms:
        - number: '147'
  psalmody.missus-est-g-briel-angelus-ad-mar-am-v-rginem-de-e32d01c6b4:
    role: psalmody
    content:
      en:
      - type: antiphon
        text: Mary hath been taken to heaven; * the Angels rejoice; they praise and bless the Lord.
      - type: antiphon
        text: The Virgin Mary hath been taken into the chamber on high, * where the King of kings sitteth on a throne amid the stars.
      - type: antiphon
        text: We run after thee, on the scent of thy perfumes * the virgins love thee heartily.
      - type: antiphon
        text: Blessed of the Lord art thou, O daughter, * for by thee we have been given to eat of the fruit of the tree of Life.
      - type: antiphon
        text: Fair and comely art thou, O daughter of Jerusalem, * terrible as a fenced camp set in battle array.
      la:
      - type: antiphon
        text: Missus est * Gábriel Angelus ad Maríam Vírginem desponsátam Ioseph. (Allelúia.)
      - type: antiphon
        text: 'Ave, María, * grátia plena; Dóminus tecum: benedícta tu in muliéribus. (Allelúia.)'
      - type: antiphon
        text: 'Ne tímeas, María, * invenísti grátiam apud Dóminum: ecce concípies et páries fílium. (Allelúia.)'
      - type: antiphon
        text: Dabit ei Dóminus * sedem David, patris eius, et regnábit in ætérnum. (Allelúia.)
      - type: antiphon
        text: 'Ecce ancílla Dómini: * fiat mihi secúndum verbum tuum. (Allelúia.)'
  psalmody.o-admir-bile-comm-rcium-cre-tor-g-neris-hum-ni-a-11ff75dda1:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: 'O admirábile commércium: * Creátor géneris humáni, animátum corpus sumens, de Vírgine nasci dignátus est; et procédens homo sine sémine, largítus est nobis suam Deitátem.'
      - type: antiphon
        text: 'Quando natus es * ineffabíliter ex Vírgine, tunc implétæ sunt Scriptúræ: sicut plúvia in vellus descendísti, ut salvum fáceres genus humánum: te laudámus, Deus noster.'
      - type: antiphon
        text: 'Rubum, quem víderat Móyses * incombústum, conservátam agnóvimus tuam laudábilem virginitátem: Dei Génetrix, intercéde pro nobis.'
      - type: antiphon
        text: 'Germinávit radix Iesse, * orta est stella ex Iacob: Virgo péperit Salvatórem; te laudámus, Deus noster.'
      - type: antiphon
        text: 'Ecce María génuit * nobis Salvatórem, quem Ioánnes videns, exclamávit, dicens: Ecce Agnus Dei, ecce qui tollit peccáta mundi, allelúia.'
  psalmody.o-admir-bile-comm-rcium-cre-tor-g-neris-hum-ni-a-2e1491bc22:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: 'O wondrous interchange! * the Creator of mankind, taking upon him a living body, vouchsafed to be born of a pure Virgin: and by his Humanity, which was begotten in no earthly wise, hath made us partakers of his Divinity.'
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: When thou wast born * all ineffably of a Virgin, then were the Scriptures fulfilled; thou camest down like the dew upon the fleece of wool, to bring salvation unto all mankind; we praise thee, O our God.
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: 'In the bush which Moses saw * unconsumed, we recognize the preservation of thy glorious virginity: holy Mother of God, intercede for us.'
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: 'The Root of Jesse hath budded, * the Star hath come out of Jacob, the Virgin hath borne the Saviour: we praise thee, O our God.'
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: 'Lo, Mary hath brought forth * the Saviour of whom when John saw him, he did proclaim: Behold the Lamb of God that taketh away the sins of the world, alleluia.'
        psalms:
        - number: '147'
      la:
      - type: antiphon
        text: 'O admirábile commércium: * Creátor géneris humáni, animátum corpus sumens, de Vírgine nasci dignátus est; et procédens homo sine sémine, largítus est nobis suam Deitátem.'
