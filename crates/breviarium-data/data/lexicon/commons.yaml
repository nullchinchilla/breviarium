      - type: text
        text: 'Triumphális beáti Mártyris N. dies hódie nobis anniversária celebritáte recúrrit: cuius glorificatióni sicut congáudet Ecclésia, sic eius propónit sequénda vestígia. Si enim compátimur, et conglorificábimur. In cuius glorióso agóne duo nobis præcípue consideránda sunt: induráta vidélicet tortóris sævítia, et Mártyris invícta patiéntia. Sævítia tortóris, ut eam detestémur: patiéntia Mártyris, ut eam imitémur. Audi Psalmístam advérsus malítiam increpántem: Noli æmulári in malignántibus quóniam tamquam fœnum velóciter aréscent. Quod autem advérsus malignántes patiéntia exhibénda sit, audi Apóstolum suadéntem: Patiéntia vobis necessária est, ut reportétis promissiónes.'
