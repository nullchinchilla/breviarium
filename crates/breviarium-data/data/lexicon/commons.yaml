      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et esto ibi usque dum dicam tibi, allelúia.
      en2:
      - type: response
        text: 'Rise, take the Child and his mother, and flee into Egypt:'
      - type: text
        text: And remain there until I tell you, alleluia.
      - type: versicle
        text: 'That what was spoken by the Lord through the Prophet might be fulfilled, saying: Out of Egypt I called my Son.'
      - type: response
        text: And remain there until I tell you, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
