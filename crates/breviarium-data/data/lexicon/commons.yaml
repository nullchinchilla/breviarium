  reading.s-milis-huic-v-dua-velut-em-ritis-veter-na-stip-28a1f9d5f3:
    role: reading
    content:
      en:
      - type: text
        text: Like to these is a widow, a veteran retiring to rest upon the earned rewards of her chastity, and who, albeit she layeth down the arms of wifehood, still ruleth the order of all her household albeit she be at rest from bearing burdens, she is careful in the marriage of her youngers, and with the wisdom of age chooseth what study is the most useful, what fruit is the richest, what wedlock is the meetest. And so, if the government of the field be given more to the elder than to the younger, wherefore shouldest thou hold that a wife is more useful than a widow? But if they which persecuted the faith persecuted also widowhood, then, surely, in the eyes of them which hold the faith, must widowhood be looked upon as a reward, rather than shrunk from as a punishment.
      la:
      - type: text
        text: Símilis huic vídua, velut eméritis veterána stipéndiis castitátis, et si coniúgii arma depónat, domus tamen totíus pacem gubérnat; et si vehéndis onéribus otiósa, maritándis tamen iunióribus próvida, ubi cultus utílior, ubi fructus ubérior sit, quarum cópulam aptiórem seníli gravitáte dispónit. Itaque, si maturióribus quam iunióribus commítitur ager, cur putes utiliórem nuptam esse quam víduam? Quod, si persecutóres fídei persecutóres fuérunt étiam viduitátis; útique fidem sequéntibus vidúitas non pro supplício fugiénda est, sed tenénda pro prǽmio.
      en2:
      - type: text
        text: Like to her is the widow, who, as a veteran having completed the service of chastity, even if she lays down the arms of wedlock, yet governs the peace of the whole household; and, though resting from carrying heavy burdens, is nonetheless provident in marrying off the younger women, appointing with mature gravity the union that is most fitting. And so, if the field is entrusted more fittingly to the more mature than to the young, why do you suppose a married woman to be more useful than a widow? And if persecutors of the faith were also persecutors of widowhood, surely widowhood is not to be fled as a punishment by those who follow the faith, but to be held as a reward.
  reading.sed-ad-h-c-aud-ta-inard-scit-nimus-iamque-illic-0d03e0432c:
    role: reading
    content:
      la:
      - type: text
        text: 'Sed ad hæc audíta inardéscit ánimus, iamque illic cupit assístere, ubi se sperat sine fine gaudére. Sed ad magna prǽmia perveníri non potest, nisi per magnos labóres. Unde et Paulus egrégius prædicátor dicit: Non coronábitur, nisi qui legítime certáverit. Deléctet ergo mentem magnitúdo præmiórum, sed non detérreat certámen labórum. Unde ad se veniéntibus Véritas dicit: Si quis venit ad me, et non odit patrem suum, et matrem, et uxórem, et fílios, et fratres, et soróres, adhuc autem et ánimam suam, non potest meus esse discípulus.'
      en2:
      - type: text
        text: 'But at hearing these things the soul burns with longing, and already desires to stand in that place where it hopes to rejoice without end. Yet great rewards cannot be attained save through great labors. Hence the eminent preacher Paul also says: No one will be crowned unless he has competed lawfully. Let the greatness of the rewards therefore delight the mind, but let the contest of labors not deter it. Hence Truth says to those who come to him: If anyone comes to me and does not hate his father, and mother, and wife, and children, and brothers, and sisters, and even his own soul, he cannot be my disciple.'
  reading.sed-ad-h-c-aud-ta-inard-scit-nimus-iamque-illic-83f61badd2:
    role: reading
    content:
      en:
      - type: text
        text: 'Then we hear these things our hearts burn within us and we long to be already there, where we hope to rejoice for ever. But we cannot attain unto great rewards, save through great labour. Therefore saith the excellent preacher Paul: “He is not crowned, except he strive lawfully.” (2 Tim. ii. 5.) The greatness of the reward doth delight our mind let not the throes of the struggle dishearten us. Therefore the Truth saith unto every one that cometh unto Him “If any man come to Me, and hate not his father and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple.”'
      la:
      - type: text
        text: 'Sed ad hæc audíta inardéscit ánimus, iamque illic cupit assístere, ubi se sperat sine fine gaudére. Sed ad magna prǽmia perveníri non potest, nisi per magnos labóres. Unde et Paulus egrégius prædicátor dicit: Non coronábitur, nisi qui legítime certáverit. Deléctet ergo mentem magnitúdo præmiórum, sed non detérreat certámen labórum. Unde ad se veniéntibus Véritas dicit: Si quis venit ad me, et non odit patrem suum, et matrem, et uxórem, et fílios, et fratres, et soróres, adhuc autem et ánimam suam, non potest meus esse discípulus.'
