  reading.ibid-cap-36-a514a2ba5c:
    role: reading
    content:
      la:
      - type: heading
        text: ibid., cap. 36
      - type: text
        text: 'Cum ergo accepísset Iesus acetum, dixit: Consummatum est: et inclináto cápite trádidit spíritum. Consummatum iam esse Salvátor dicit, quia sæviendi Iudæórum potéstas in ipsum per mortem suam términum hábuit. Quid enim non excogitarunt, aut quid supremæ in humanitátis relictum sibi est? Quis cædendi, quis contumeliandi modus non adhíbitus? Mérito ígitur consummatum esse, ait. Cumque tempus iam esset, ut étiam spirítibus apud ínferos prædicáret (venit enim, ut tam vivórum quam mortuórum dominaretur) mortem pro nobis suscépit: et hanc natúræ nostræ própriam passiónem sponte súbiit secúndum carnem, quamvis, ut Deus vita naturaliter sit, ut spoliatis inferis, primítiæ dormientium, et primogénitus (ut Scriptúræ dicunt) mortuórum factus, recursum ad vitam natúræ nostræ largiretur.'
  reading.ign-ta-enim-erat-ante-christi-adv-ntum-via-vit-q-ce11e2e16d:
    role: reading
    content:
      en:
      - type: citation
        text: 'Before that Christ came, that path of life was not known, which none had risen from the dead to tread. But, since the Lord hath risen, it is known, and many have trodden it after the Lord. Touching them, the holy Evangelist saying: “Many bodies of the saints which slept arose with Him, and went into the holy city.” (Matth. xxvii. 52, 53.) 4 Wherefore, when the Lord riseth again and saith: “Thou hast shown Me the path of life,” we also can now say to Him “Thou hast shown us the path of life.” For He hath shown us the path of life, Who hath shown us the way that leadeth unto life. He hath shown me the path of life, Who hath taught me faith, mercy, righteousness, and chastity for these are the ways that lead unto life eternal.'
      la:
      - type: text
        text: 'Ignóta enim erat ante Christi advéntum via vitæ, quæ nullíus adhuc resurgéntis fúerat temeráta vestígio. At ubi Dóminus resurréxit, nota facta, solo attríta est plurimórum: de quibus sanctus Evangelísta ait: Multórum córpora Sanctórum surrexérunt cum eo, et introiérunt in sanctam civitátem. Unde cum Dóminus in resurrectióne sua díxerit, Notas mihi fecísti vias vitæ: póssumus et nos iam dícere Dómino: Notas fecísti nobis vias vitæ. Ipse enim nobis notas fecit vias vitæ, qui nobis sémitam manifestávit ad vitam. Notas enim mihi fecit vias vitæ, cum me dócuit fidem, misericórdiam, iustítiam, castitátem: his enim pervenítur itinéribus ad salútem.'
  reading.in-quinque-autem-c-rporis-s-nsibus-unusqu-sque-s-f2bf663582:
    role: reading
    content:
      en:
      - type: text
        text: The body of every man doth consist of five senses, and five being doubled, is ten. Forasmuch, therefore, as the whole body of the faithful doth consist of two sexes, the Holy Church is likened unto ten virgins. And forasmuch as in the Church the good are for the present mingled with the bad, and the reprobate with the elect, it is rightly said that, of the ten virgins, five are wise and five are foolish. There are many who have self-control, which do keep themselves from lusting after things outward, whose hope beareth them to things inward, who chastise the flesh, who long with intense home-sickness for their Fatherland which is in heaven, who seek an eternal reward, and who will not to receive for their labours the praise of men. These are they who reckon their glory, not in the mouths of men, but in the testimony of their own conscience. And many there be likewise who afflict the body by self-control, and yet who seek for their self-control applause from men.
