  invitatory.domum-dei-decet-sanctit-do-sponsum-eius-christum-a4f3aace38:
    role: invitatory
    content:
      en:
      - type: antiphon
        text: Holiness becometh the house of God. * In her let us worship her Bridegroom, even Christ.
      la:
      - type: antiphon
        text: 'Domum Dei decet sanctitúdo: * Sponsum eius Christum adorémus in ea.'
  invitatory.exs-ltent-in-d-mino-sancti-allel-ia-e505b4b240:
    role: invitatory
    content:
      en:
      - type: antiphon
        text: Let the Saints rejoice in the Lord, * Alleluia.
      la:
      - type: antiphon
        text: Exsúltent in Dómino sancti, * Allelúia.
