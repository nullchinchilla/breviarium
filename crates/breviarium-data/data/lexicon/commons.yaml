    role: responsory
    content:
      en:
      - type: response
        text: After her shall virgins be brought unto the King, her fellows
      - type: text
        text: They shall be brought unto thee with gladness and rejoicing.
      - type: versicle
        text: In thy comeliness and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: They shall be brought unto thee with gladness and rejoicing.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: They shall be brought unto thee with gladness and rejoicing.
      la:
      - type: response
        text: Afferéntur Regi vírgines post eam, próximæ eius;
      - type: text
        text: Afferéntur tibi in lætítia et exsultatióne.
      - type: versicle
        text: Spécie tua et pulchritúdine tua; inténde, próspere procéde, et regna.
      - type: response
        text: Afferéntur tibi in lætítia et exsultatióne.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Afferéntur tibi in lætítia et exsultatióne.
      en2:
      - type: response
        text: Virgins shall be brought to the King after her, her companions;
      - type: text
