  responsory.abst-rget-deus-omnem-l-crimam-ab-culis-sanct-rum-ad6d8a9af2:
    role: responsory
    content:
      en:
      - type: response
        text: God shall wipe away all tears from the eyes of His Saints, and there shall be no more sorrow, there shall be no more death, neither sorrow, nor crying, neither shall there be any more pain;
      - type: text
        text: For the former things are passed away.
      - type: versicle
        text: They shall hunger no more, neither thirst any more, neither shall the sun light on them, nor any heat.
      - type: response
        text: For the former things are passed away.
      la:
      - type: response
        text: 'Abstérget Deus omnem lácrimam ab óculis Sanctórum: et iam non erit ámplius neque luctus, neque clamor, sed nec ullus dolor:'
      - type: text
        text: Quóniam prióra transiérunt.
      - type: versicle
        text: Non esúrient, neque sítient ámplius, neque cadet super illos sol, neque ullus æstus.
      - type: response
        text: Quóniam prióra transiérunt.
      en2:
      - type: response
        text: 'God will wipe away every tear from the eyes of the Saints: and there will be no more mourning, nor crying, nor any pain:'
      - type: text
        text: For the former things have passed away.
      - type: versicle
        text: They will hunger no more, nor thirst any more, nor will the sun fall upon them, nor any heat.
      - type: response
        text: For the former things have passed away.
