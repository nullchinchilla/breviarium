  reading.ex-libro-sancti-ambr-sii-ep-scopi-de-v-duis-792807d366:
    role: reading
    content:
      en:
      - type: text
        text: From the Book upon Widows by St Ambrose, Bishop of Milan.
      - type: citation
        text: near the end
      - type: text
        text: Behold the field of the Church, that the same is a fruitful field, some while smiling with the brightness of virginity, somewhile golden with the ripe harvest of widowhood, somewhile rich with the crop of marriage. These things be diverse, but they be the fruits of the same field. There are not so many choice lilies as stalks of bearded grain, ears for the harvest, and there are more places in the soil fitted once to receive seed than there are places which, when they have yielded a crop, are fitted again to be ploughed. Good, then, is widowhood, which the judgment of an Apostle hath so often commended, widowhood, which is the teacher of faith and of purity.
      la:
      - type: text
        text: Ex Libro Sancti Ambrósii Epíscopi de Víduis
      - type: citation
        text: Prope finem
      - type: text
        text: Agrum hunc Ecclésiæ fértilem cerno, nunc integritátis flore vernántem, nunc viduitátis gravitáte polléntem, nunc étiam coniúgii frúctibus redundántem. Nam, etsi divérsi, uníus tamen agri fructus sunt; nec tanta hortórum lília, quantæ arístæ ségetum, méssium spicæ; compluriúmque spátia campórum recipiéndis aptántur semínibus, quam rédditis nováles frúctibus feriántur. Bona ergo vidúitas, quæ tóties apostólico iudício prædicátur. Hæc enim magístra fídei, magístra est castitátis.
      en2:
      - type: text
        text: From the Book of Saint Ambrose the Bishop on Widows
      - type: citation
        text: Prope finem
      - type: text
        text: 'I behold this field of the Church as fertile: now blooming with the flower of virginity, now flourishing with the dignity of widowhood, now also abounding with the fruits of marriage. For although they are diverse, they are all fruits of one field; and lilies of the garden are not as many as the ears of the harvest, the sheaves of the fields; and broad expanses of plain are prepared to receive seeds, rather than to repay the fields with their returned fruits. Good, then, is widowhood, praised so many times by apostolic judgment. For widowhood is the teacher of faith, the teacher of chastity.'
  reading.ex-occasi-ne-huius-sent-nti-quidam-introd-cunt-m-44bef57208:
    role: reading
    content:
      en:
      - type: text
        text: |-
          By reason of these words, an hundredfold, some will have that there shall be a thousand years after the resurrection, wherein they that have forsaken all things shall receive an hundredfold of those things which they have forsaken, and shall inherit everlasting life. Such men consider not that though in other things this were worthy, as touching wives it is unseemly for it becometh us not to think that he that hath forsaken one wife in this world, shall receive an hundred wives in that which is to come. But the meaning is this, that every one that for the Saviour's sake hath forsaken earthly things, shall receive spiritual things which things, being rightly weighed against earthly things, are as though an hundredfold were weighed against one.
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
