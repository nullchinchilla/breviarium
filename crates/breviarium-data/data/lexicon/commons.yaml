  hymn.quem-terra-pontus-s-dera-93277115b4:
    role: hymn
    content:
      la:
      - type: text
        text: Quem terra, pontus, sídera
      - type: text
        text: Colunt, adórant, prædicant,
      - type: text
        text: Trinam regéntem máchinam,
      - type: text
        text: Claustrum Maríæ báiulat.
      - type: text
        text: Cui luna, sol, et ómnia
      - type: text
        text: Desérviunt per témpora,
      - type: text
        text: Perfúsa cæli grátia,
      - type: text
        text: Gestant puéllæ víscera.
      - type: text
        text: Beáta Mater múnere,
      - type: text
        text: Cuius supérnus ártifex
      - type: text
        text: Mundum pugíllo cóntinens,
      - type: text
        text: Ventris sub arca clausus est.
      - type: text
        text: Beáta cæli núntio,
      - type: text
        text: Fœcúnda sancto Spíritu,
      - type: text
        text: Desiderátus géntibus,
      - type: text
        text: Cuius per alvum fusus est.
      - type: text
        text: '* Iesu, tibi sit glória,'
      - type: text
        text: Qui natus es de Vírgine,
      - type: text
        text: Cum Patre, et almo Spíritu
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.quem-terra-pontus-s-dera-ac3d45b4d8:
    role: hymn
    content:
      en:
      - type: text
        text: The God whom earth, and sea, and sky
      - type: text
        text: Adore, and laud, and magnify,
      - type: text
        text: Who o'er their threefold fabric reigns,
      - type: text
        text: The Virgin's spotless womb contains.
      - type: text
        text: The God, whose will by moon and sun
      - type: text
        text: And all things in due course is done,
      - type: text
        text: Is borne upon a maiden's breast,
      - type: text
        text: By fullest heavenly grace possest.
      - type: text
        text: How blest that mother, in whose shrine
      - type: text
        text: The great artificer divine,
      - type: text
        text: Whose hand contains the earth and sky,
      - type: text
        text: Vouchsafed, as in his ark, to lie.
      - type: text
        text: Blest, in the message Gabriel brought;
      - type: text
        text: Blest, by the work the Spirit wrought;
      - type: text
        text: From whom the great desire of earth
      - type: text
        text: Took human flesh and human birth.
      - type: text
        text: '* All honour, laud, and glory be,'
      - type: text
        text: O Jesu, Virgin-born to thee;
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To Father and to Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Quem terra, pontus, sídera
      - type: text
        text: Colunt, adórant, prædicant,
      - type: text
        text: Trinam regéntem máchinam,
      - type: text
        text: Claustrum Maríæ báiulat.
      - type: text
        text: Cui luna, sol, et ómnia
      - type: text
        text: Desérviunt per témpora,
      - type: text
        text: Perfúsa cæli grátia,
      - type: text
        text: Gestant puéllæ víscera.
      - type: text
        text: Beáta Mater múnere,
      - type: text
        text: Cuius supérnus ártifex
      - type: text
        text: Mundum pugíllo cóntinens,
      - type: text
        text: Ventris sub arca clausus est.
      - type: text
        text: Beáta cæli núntio,
      - type: text
        text: Fœcúnda sancto Spíritu,
      - type: text
        text: Desiderátus géntibus,
      - type: text
        text: Cuius per alvum fusus est.
      - type: text
        text: '* Iesu, tibi sit glória,'
      - type: text
        text: Qui natus es de Vírgine,
      - type: text
        text: Cum Patre, et almo Spíritu
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.rex-glori-se-m-rtyrum-47ceb07f5c:
    role: hymn
    content:
      en:
      - type: text
        text: Sing, O sons of the Church sounding the martyrs' praise!
      - type: text
        text: God's true soldiers applaud, who, in their weary days,
      - type: text
        text: Won bright trophies of good, glad be the voice ye raise,
      - type: text
        text: While these heroes of Christ ye sing!
      - type: text
        text: They, while yet in the world were by the world abhorred;
      - type: text
        text: Felt how fading the joys, fleeting the wealth it stored;
      - type: text
        text: Spurned all pleasure for thee, and at thy call, O Lord,
      - type: text
        text: Came forth strong in thy name, as King.
      - type: text
        text: Lord, how bravely they bore fury and pain for thee!
      - type: text
        text: Scourge, rod, sword, and the rack strongly endured; but free
      - type: text
        text: Sang out, bold in thy love, longing on high to be;
      - type: text
        text: Earth's might never their souls could bend.
      - type: text
        text: While they, shedding their blood, victims for Jesus fell,
      - type: text
        text: No sound out of their lips came of their throes to tell;
      - type: text
        text: Bowed low, patient and meek, loving the Lord so well,
      - type: text
        text: Turned they still to the Christ, their friend.
      - type: text
        text: What joys, bright with the blood shed for thy love they share,
      - type: text
        text: Those brave martyrs of thine crowned with thy laurels rare;
      - type: text
        text: Man's tongue never can tell, never can half declare,
      - type: text
        text: How pure now is their bliss above!
      - type: text
        text: Yet we, Father on high, God of eternal might,
      - type: text
        text: Lift weak voices in prayer asking for peace and light;
      - type: text
        text: Cleanse thou out of our hearts every stain and blight,
      - type: text
        text: So our songs may be songs of love.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Rex glorióse Mártyrum,
      - type: text
        text: Coróna confiténtium,
      - type: text
        text: Qui respuéntes térrea
      - type: text
        text: 'Perdúcis ad cæléstia:'
      - type: text
        text: Aurem benígnam prótinus
      - type: text
        text: 'Inténde nostris vócibus:'
      - type: text
        text: 'Trophǽa sacra pángimus:'
      - type: text
        text: Ignósce quod delíquimus.
      - type: text
        text: Tu vincis inter Mártyres
      - type: text
        text: 'Parcísque Confessóribus:'
      - type: text
        text: Tu vince nostra crímina,
      - type: text
        text: Largítor indulgéntiæ.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc, et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.rex-glori-se-m-rtyrum-e8d519fd85:
    role: hymn
    content:
      en:
      - type: text
        text: O glorious King of martyr hosts,
      - type: text
        text: Thou crown that each confessor boasts,
      - type: text
        text: Who leadest to celestial day
      - type: text
        text: 'Those who have cast earth''s joys away:'
      - type: text
        text: Thine ear in mercy, Saviour, lend,
      - type: text
        text: While unto thee our prayers ascend;
      - type: text
        text: And as we count their triumphs won,
      - type: text
        text: Forgive the sins that we have done.
      - type: text
        text: Martyrs in thee their triumphs gain,
      - type: text
        text: From thee confessors grace obtain;
      - type: text
        text: O'ercome in us the lust of sin,
      - type: text
        text: That we thy pardoning love may win.
      - type: text
        text: To thee who, dead, again dost live,
      - type: text
        text: All glory, Lord, thy people give;
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To Father and to Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Rex glorióse Mártyrum,
      - type: text
        text: Coróna confiténtium,
      - type: text
        text: Qui respuéntes térrea
      - type: text
        text: 'Perdúcis ad cæléstia:'
      - type: text
        text: Aurem benígnam prótinus
      - type: text
        text: 'Inténde nostris vócibus:'
      - type: text
        text: 'Trophǽa sacra pángimus:'
      - type: text
        text: Ignósce quod delíquimus.
      - type: text
        text: Tu vincis inter Mártyres
      - type: text
        text: 'Parcísque Confessóribus:'
      - type: text
        text: Tu vince nostra crímina,
      - type: text
        text: Largítor indulgéntiæ.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc, et per omne sǽculum.
      - type: text
        text: Amen.
