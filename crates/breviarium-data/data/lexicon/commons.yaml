        text: 'In the heavenly kingdom is the habitation of the saints, alleluia: and they rest in the eternity, alleluia.'
      - type: antiphon
        text: Protected by a veil * your saints turn to you, O Lord, alleluia, alleluia.
      - type: antiphon
        text: Spirits and souls * of the just, sing hymns to our Lord, alleluia, alleluia.
      - type: antiphon
        text: The just shine * like the sun at the face of God, alleluia.
