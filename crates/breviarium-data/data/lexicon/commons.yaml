  psalmody.bened-cta-tu-in-muli-ribus-et-bened-ctus-fructus-65a3fdc94c:
    role: psalmody
    content:
      en: []
      la:
      - type: psalmody
        antiphon: Benedícta tu * in muliéribus, et benedíctus fructus ventris tui.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Sicut myrrha * elécta, odórem dedísti suavitátis, sancta Dei Génetrix.
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: Ante torum * huius Vírginis frequentáte nobis dúlcia cántica drámatis.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: Ángelus Dómini * nuntiávit Maríæ, et concépit de Spíritu Sancto.
        psalms:
        - number: '97'
  psalmody.bened-cta-tu-in-muli-ribus-et-bened-ctus-fructus-91848230ea:
    role: psalmody
    content:
      la:
      - type: psalmody
        antiphon: Benedícta tu * in muliéribus, et benedíctus fructus ventris tui.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Sicut myrrha * elécta, odórem dedísti suavitátis, sancta Dei Génetrix.
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: Ante torum * huius Vírginis frequentáte nobis dúlcia cántica drámatis.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: Spécie tua * et pulchritúdine tua inténde, próspere procéde, et regna.
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: 'Adiuvábit eam * Deus vultu suo: Deus in médio eius, non commovébitur.'
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: Sicut lætántium * ómnium nostrum habitátio est in te, sancta Dei Génetrix.
        psalms:
        - number: '86'
      - type: psalmody
        antiphon: 'Gaude, María Virgo: * cunctas hǽreses sola interemísti in univérso mundo.'
        psalms:
        - number: '95'
      - type: psalmody
        antiphon: 'Dignáre me * laudáre te, Virgo sacráta: da mihi virtútem contra hostes tuos.'
        psalms:
        - number: '96'
      - type: psalmody
        antiphon: 'Post partum, * Virgo, invioláta permansísti: Dei Génetrix, intercéde pro nobis.'
        psalms:
        - number: '97'
  psalmody.c-licem-salut-ris-acc-piam-et-nomen-d-mini-invoc-542a200d9e:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: I will take the cup of salvation; * and call upon the Name of the Lord.
        psalms:
        - number: '115'
      - type: psalmody
        antiphon: With them * that hate peace I was peaceable; when I spoke unto them they fought against me without a cause.
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: O Lord, preserve me * from the wicked man.
        psalms:
        - number: '139'
      - type: psalmody
        antiphon: Keep me * from the snare which they have laid for me, and the gins of the workers of iniquity.
        psalms:
        - number: '140'
      - type: psalmody
        antiphon: 'I looked * on my right hand and beheld: but there was no man that would know me.'
        psalms:
        - number: '141'
      la:
      - type: psalmody
        antiphon: Cálicem * salutáris accípiam et nomen Dómini invocábo.
        psalms:
        - number: '115'
      - type: psalmody
        antiphon: 'Cum his, * qui odérunt pacem eram pacíficus: dum loquébar illis, impugnábant me gratis.'
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: Ab homínibus * iníquis líbera me, Dómine.
        psalms:
        - number: '139'
      - type: psalmody
        antiphon: Custódi me * a láqueo, quem statuérunt mihi, et a scándalis operántium iniquitátem.
        psalms:
        - number: '140'
      - type: psalmody
        antiphon: Considerábam * ad déxteram, et vidébam, et non erat qui cognósceret me.
        psalms:
        - number: '141'
  psalmody.d-mine-quinque-tal-nta-tradid-sti-mihi-ecce-lia-1cb3793de2:
    role: psalmody
    content:
      en:
      - type: antiphon
        text: Lord, Thou deliverest unto me five talents * behold, I have gained beside them five talents more.
      - type: antiphon
        text: Well done, thou good servant, * thou hast been faithful in a very little, enter thou into the joy of thy Lord.
      - type: antiphon
        text: A faithful and wise servant * whom his Lord hath made ruler over His household.
      - type: antiphon
        text: Blessed is that servant * whom his Lord, when He cometh and knocketh at the door, shall find watching.
      - type: antiphon
        text: Thou good and faithful servant, * enter thou into the joy of thy Lord.
      la:
      - type: antiphon
        text: Dómine, quinque talénta * tradidísti mihi, ecce ália quinque superlucrátus sum.
      - type: antiphon
        text: Euge, serve bone * in módico fidélis, intra in gáudium Dómini tui.
      - type: antiphon
        text: Fidélis servus * et prudens, quem constítuit Dóminus super famíliam suam.
      - type: antiphon
        text: Beátus ille servus, * quem, cum vénerit Dóminus eius et pulsáverit iánuam, invénerit vigilántem.
      - type: antiphon
        text: Serve bone * et fidélis, intra in gáudium Dómini tui.
  psalmody.d-mine-quinque-tal-nta-tradid-sti-mihi-ecce-lia-7b74377cf6:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Dómine, quinque talénta * tradidísti mihi, ecce ália quinque superlucrátus sum.
      - type: antiphon
        text: Euge, serve bone * in módico fidélis, intra in gáudium Dómini tui.
      - type: antiphon
        text: Fidélis servus * et prudens, quem constítuit Dóminus super famíliam suam.
      - type: antiphon
        text: Beátus ille servus, * quem, cum vénerit Dóminus eius et pulsáverit iánuam, invénerit vigilántem.
      - type: antiphon
        text: Serve bone * et fidélis, intra in gáudium Dómini tui.
  psalmody.d-rige-d-mine-deus-meus-in-consp-ctu-tuo-viam-me-a4e1296a40:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: Make my way straight before thy face, * O Lord my God.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: Return, O Lord, deliver my soul * O save me for thy mercy's sake.
        psalms:
        - number: '6'
      - type: psalmody
        antiphon: Lest he tear my soul like a lion, * while there is none to deliver, or to save.
        psalms:
        - number: '7'
      - type: psalmody
        antiphon: He maketh me to lie down * in green pastures.
        psalms:
        - number: '22'
      - type: psalmody
        antiphon: Lord, remember not the sins of my youth, * nor my transgressions.
        psalms:
        - number: '24'
      - type: psalmody
        antiphon: I believe that I shall yet see the goodness of the Lord * in the land of the living.
        psalms:
        - number: '26'
      - type: psalmody
        antiphon: Be pleased, O Lord, to deliver me * O Lord, look upon me to help me.
        psalms:
        - number: '39'
      - type: psalmody
        antiphon: Lord, heal my soul; * for I have sinned against thee.
        psalms:
        - number: '40'
      - type: psalmody
        antiphon: My soul thirsteth for the living God; * when shall I come and appear before God?
        psalms:
        - number: '41'
      la:
      - type: psalmody
        antiphon: Dírige, * Dómine, Deus meus, in conspéctu tuo viam meam.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: 'Convértere, * Dómine, et éripe ánimam meam: quóniam non est in morte, qui memor sit tui.'
        psalms:
        - number: '6'
      - type: psalmody
        antiphon: Nequándo rápiat * ut leo ánimam meam, dum non est qui rédimat, neque qui salvum fáciat.
        psalms:
        - number: '7'
      - type: psalmody
        antiphon: In loco páscuæ * ibi me collocávit.
        psalms:
        - number: '22'
      - type: psalmody
        antiphon: Delícta * iuventútis meæ, et ignorántias meas ne memíneris, Dómine.
        psalms:
        - number: '24'
      - type: psalmody
        antiphon: Credo vidére * bona Dómini in terra vivéntium.
        psalms:
        - number: '26'
      - type: psalmody
        antiphon: 'Compláceat * tibi, Dómine, ut erípias me: Dómine, ad adiuvándum me réspice.'
        psalms:
        - number: '39'
      - type: psalmody
        antiphon: Sana, Dómine, * ánimam meam, quia peccávi tibi.
        psalms:
        - number: '40'
      - type: psalmody
        antiphon: 'Sitívit * ánima mea ad Deum vivum: quando véniam, et apparébo ante fáciem Dómini?'
        psalms:
        - number: '41'
  psalmody.domum-tuam-d-mine-decet-sanctit-do-in-longit-din-25a04f21a4:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: Holiness becometh thine house, * O Lord, for ever.
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: My house * shall be called the house of prayer.
        psalms:
        - number: '110'
      - type: psalmody
        antiphon: This is the Lord's house * stoutly builded, well founded upon a sure rock.
        psalms:
        - number: '111'
      - type: psalmody
        antiphon: The Lord's house is well founded * upon a sure rock.
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: All thy walls are of stones most precious, * and the towers of Jerusalem shall be built up with jewels.
        psalms:
        - number: '147'
      la:
      - type: psalmody
        antiphon: Domum tuam, Dómine, * decet sanctitúdo in longitúdinem diérum.
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: Domus mea, * domus oratiónis vocábitur.
        psalms:
        - number: '110'
      - type: psalmody
        antiphon: Hæc est domus Dómini * fírmiter ædificáta, bene fundáta est supra firmam petram.
        psalms:
        - number: '111'
      - type: psalmody
        antiphon: Bene fundáta est * domus Dómini supra firmam petram.
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: Lápides pretiósi * omnes muri tui, et turres Ierúsalem gemmis ædificabúntur.
        psalms:
        - number: '147'
  psalmody.domum-tuam-d-mine-decet-sanctit-do-in-longit-din-584a91b0aa:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Domum tuam, Dómine, * decet sanctitúdo in longitúdinem diérum.
      - type: antiphon
        text: Domus mea, * domus oratiónis vocábitur.
      - type: antiphon
        text: Hæc est domus Dómini * fírmiter ædificáta, bene fundáta est supra firmam petram.
      - type: antiphon
        text: Bene fundáta est * domus Dómini supra firmam petram.
      - type: antiphon
        text: Lápides pretiósi * omnes muri tui, et turres Ierúsalem gemmis ædificabúntur.
  psalmody.dum-esset-rex-in-acc-bitu-suo-nardus-mea-dedit-o-0d04fc8c47:
    role: psalmody
    content:
      la:
      - type: psalmody
        antiphon: Dum esset Rex * in accúbitu suo, nardus mea dedit odórem suavitátis.
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: Læva eius * sub cápite meo, et déxtera illíus amplexábitur me.
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: Nigra sum, * sed formósa, fíliæ Ierúsalem; ídeo diléxit me Rex, et introdúxit me in cubículum suum.
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: 'Iam hiems tránsiit, * imber ábiit et recéssit: surge, amíca mea, et veni.'
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: Speciósa * facta es et suávis in delíciis tuis, sancta Dei Génetrix.
        psalms:
        - number: '147'
  psalmody.dum-esset-rex-in-acc-bitu-suo-nardus-mea-dedit-o-293c024116:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Dum esset Rex * in accúbitu suo, nardus mea dedit odórem suavitátis.
      - type: antiphon
        text: Læva eius * sub cápite meo, et déxtera illíus amplexábitur me.
      - type: antiphon
        text: Nigra sum, * sed formósa, fíliæ Ierúsalem; ídeo diléxit me Rex, et introdúxit me in cubículum suum.
      - type: antiphon
        text: 'Iam hiems tránsiit, * imber ábiit et recéssit: surge, amíca mea, et veni.'
      - type: antiphon
        text: Speciósa * facta es et suávis in delíciis tuis, sancta Dei Génetrix.
  psalmody.dum-esset-rex-in-acc-bitu-suo-nardus-mea-dedit-o-7733705312:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Dum esset Rex * in accúbitu suo, nardus mea dedit odórem suavitátis.
      - type: antiphon
        text: 'In odórem * unguentórum tuórum cúrrimus: adolescéntulæ dilexérunt te nimis.'
      - type: antiphon
        text: 'Iam hiems tránsiit, * imber ábiit et recéssit: surge, amíca mea, et veni.'
      - type: antiphon
        text: Veni, elécta mea, * et ponam in te thronum meum, allelúia.
      - type: antiphon
        text: Ista est speciósa * inter fílias Ierúsalem.
  psalmody.dum-esset-rex-in-acc-bitu-suo-nardus-mea-dedit-o-a848c232e0:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: While the King sitteth at his table, * my spikenard sendeth forth the smell thereof
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: We will run after thee, * in the savour of thy good ointments. The virgins love them exceedingly.
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: Lo the winter is past, * the rain is over and gone. Rise up, my love, and come away.
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: Come, O My chosen one, * and I will establish My throne in thee. Alleluia.
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: She is beautiful * among the daughters of Jerusalem.
        psalms:
        - number: '147'
      la:
      - type: psalmody
        antiphon: Dum esset Rex * in accúbitu suo, nardus mea dedit odórem suavitátis.
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: 'In odórem * unguentórum tuórum cúrrimus: adolescéntulæ dilexérunt te nimis.'
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: 'Iam hiems tránsiit, * imber ábiit et recéssit: surge, amíca mea, et veni.'
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: Veni, elécta mea, * et ponam in te thronum meum, allelúia.
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: Ista est speciósa * inter fílias Ierúsalem.
        psalms:
        - number: '147'
  psalmody.ecce-sac-rdos-magnus-qui-in-di-bus-suis-pl-cuit-cc4a99577f:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Ecce sacérdos magnus, * qui in diébus suis plácuit Deo, et invéntus est iustus.
      - type: antiphon
        text: Non est invéntus * símilis illi, qui conserváret legem Excélsi.
      - type: antiphon
        text: Ideo iureiurándo * fecit illum Dóminus créscere in plebem suam.
      - type: antiphon
        text: 'Sacerdótes Dei, * benedícite Dóminum: servi Dómini, hymnum dícite Deo. Allelúia.'
      - type: antiphon
        text: Serve bone * et fidélis, intra in gáudium Dómini tui.
  psalmody.ecce-sac-rdos-magnus-qui-in-di-bus-suis-pl-cuit-fe4174bb4d:
    role: psalmody
    content:
      en:
      - type: antiphon
        text: Behold an high priest, * who in his days pleased God, and was found righteous.
      - type: antiphon
        text: None was found like unto him, * to keep the Law of the Most High.
      - type: antiphon
        text: Therefore the Lord assured him * by an oath that He would multiply his seed among His people.
      - type: antiphon
        text: O all ye Priests of God, * bless ye the Lord O all ye servants of the Lord, sing praises unto our God.
      - type: antiphon
        text: Good and faithful servant, * enter thou into the joy of thy Lord.
      la:
      - type: antiphon
        text: Ecce sacérdos magnus, * qui in diébus suis plácuit Deo, et invéntus est iustus.
      - type: antiphon
        text: Non est invéntus * símilis illi, qui conserváret legem Excélsi.
      - type: antiphon
        text: Ideo iureiurándo * fecit illum Dóminus créscere in plebem suam.
      - type: antiphon
        text: 'Sacerdótes Dei, * benedícite Dóminum: servi Dómini, hymnum dícite Deo. Allelúia.'
      - type: antiphon
        text: Serve bone * et fidélis, intra in gáudium Dómini tui.
  psalmody.exsult-bunt-d-mino-ossa-humili-ta-b0280698e2:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: The bones which thou hast broken * may rejoice.
        psalms:
        - number: '50'
      - type: psalmody
        antiphon: Lord, hear * my prayer; unto thee shall all flesh come.
        psalms:
        - number: '64'
      - type: psalmody
        antiphon: Thy right hand * upholdeth me.
        psalms:
        - number: '62'
      - type: psalmody
        antiphon: From the gates of hell * deliver my soul, O Lord.
        psalms:
        - number: '222'
      - type: psalmody
        antiphon: Let everything that hath breath * praise the Lord.
        psalms:
        - number: '150'
      la:
      - type: psalmody
        antiphon: Exsultábunt Dómino * ossa humiliáta.
        psalms:
        - number: '50'
      - type: psalmody
        antiphon: 'Exáudi, Dómine, * oratiónem meam: ad te omnis caro véniet.'
        psalms:
        - number: '64'
      - type: psalmody
        antiphon: Me suscépit * déxtera tua, Dómine.
        psalms:
        - number: '62'
      - type: psalmody
        antiphon: A porta ínferi * érue, Dómine, ánimam meam.
        psalms:
        - number: '222'
      - type: psalmody
        antiphon: Omnis spíritus * laudet Dóminum.
        psalms:
        - number: '150'
  psalmody.fui-flagell-tus-tota-die-et-castig-tio-mea-in-ma-34753a577d:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Fui flagellátus * tota die, et castigátio mea in matutínis.
      - type: antiphon
        text: Veni ad montem myrrhæ * et ad collem thuris; tamquam agnus ad occisionem ductus, obmútui, et non apérui os meum.
      - type: antiphon
        text: 'Fodérunt manus meas * et pedes meos: dinumeravérunt ómnia ossa mea.'
      - type: antiphon
        text: 'Consolantem me * quæsívi, et non invéni: dedérunt in escam meam fel, et in siti mea potavérunt me acéto.'
      - type: antiphon
        text: 'Cum accepísset Iesus * acetum, dixit: Consummatum est; et inclináto cápite, emísit spíritum.'
  psalmody.h-c-est-virgo-s-piens-et-una-de-n-mero-prud-ntum-7c9b3367f6:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Hæc est Virgo sápiens, * et una de número prudéntum.
      - type: antiphon
        text: Hæc est Virgo sápiens, * quam Dóminus vigilántem invénit.
      - type: antiphon
        text: 'Hæc est quæ nescívit * torum in delícto: habébit fructum in respectióne animárum sanctárum.'
      - type: antiphon
        text: Veni, elécta mea, * et ponam in te thronum meum, allelúia.
      - type: antiphon
        text: Ista est speciósa * inter fílias Ierúsalem.
  psalmody.h-c-est-virgo-s-piens-et-una-de-n-mero-prud-ntum-f4d02dcd75:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: This is one of the wise virgins, * one chosen out of the number of the careful.
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: This is one of the wise virgins, * whom the Lord found watching.
        psalms:
        - number: '112'
      - type: psalmody
        antiphon: This, is one which hath not known the sinful bed, * she shall have fruit in the visitation of holy souls.
        psalms:
        - number: '121'
      - type: psalmody
        antiphon: Come, O my chosen one, * and I will establish My throne in thee.
        psalms:
        - number: '126'
      - type: psalmody
        antiphon: She is beautiful * among the daughters of Jerusalem.
        psalms:
        - number: '147'
      la:
      - type: psalmody
        antiphon: Hæc est Virgo sápiens, * et una de número prudéntum.
        psalms:
        - number: '109'
      - type: psalmody
        antiphon: Hæc est Virgo sápiens, * quam Dóminus vigilántem invénit.
        psalms:
