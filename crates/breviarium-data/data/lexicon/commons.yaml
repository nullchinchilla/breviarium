  reading.ezech-1-5-9-bac2bbe546:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 4:6-9
      - type: text
        text: |-
          6 But these things, brethren, I have in a figure transferred to myself and to Apollo, for your sakes; that in us you may learn, that one be not puffed up against the other for another, above that which is written.
          7 For who distinguisheth thee? Or what hast thou that thou hast not received? And if thou hast received, why dost thou glory, as if thou hadst not received it?
          8 You are now full; you are now become rich; you reign without us; and I would to God you did reign, that we also might reign with you.
          9 For I think that God hath set forth us apostles, the last, as it were men appointed to death: we are made a spectacle to the world, and to angels, and to men.
      la:
      - type: citation
        text: Ezech 1:5-9
      - type: text
        text: |-
          5 Et in médio eius similitúdo quátuor animálium, et hic aspéctus eórum, similitúdo hóminis in eis.
          6 Quátuor fácies uni, et quátuor pennæ uni.
          7 Pedes eórum, pedes recti, et planta pedis eórum quasi planta pedis vítuli: et scintíllæ quasi aspéctus æris candéntis.
          8 Et manus hóminis sub pennis eórum, in quátuor pártibus: et fácies et pennas per quátuor partes habébant,
          9 iunctǽque erant pennæ eórum altérius ad álterum. Non revertebántur cum incéderent, sed unumquódque ante fáciem suam gradiebátur.
      en2:
      - type: citation
        text: Ezech 1:5-9
      - type: text
        text: |-
          5 And in its midst, there was the likeness of four living creatures. And this was their appearance: the likeness of a man was in them.
          6 Each one had four faces, and each one had four wings.
          7 Their feet were straight feet, and the sole of their foot was like the sole of the foot of a calf, and they sparkled with the appearance of glowing brass.
          8 And they had the hands of a man under their wings on the four sides. And they had faces with the wings on the four sides.
          9 And their wings were joined to one another. They did not turn as they went. Instead, each one advanced before his face.
