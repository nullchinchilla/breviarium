  reading.qu-tuor-ergo-f-cies-uni-sunt-quia-si-requ-ras-qu-1f7b4dcdb6:
    role: reading
    content:
      en:
      - type: text
        text: “Verily one had four faces.” Four faces, that is, and one body. If thou seek to know what Matthew teacheth concerning the Incarnation of the Lord, he teacheth no other doctrine than teacheth Mark, or Luke, or John. If thou seek to know what John teacheth, it is beyond all doubt that his doctrine is the doctrine of Matthew, and Mark, and Luke. If thou ask concerning Mark, he hath that which hath Matthew, and John, and Luke. If thou wilt know of Luke, know that he teacheth as doth Matthew, and Mark, and John. Therefore every one hath four faces, for God knoweth and seeth in them but one faith, which thou mayest see in each and in all.
      la:
      - type: text
        text: 'Quátuor ergo fácies uni sunt: quia si requíras quid Matthǽus de incarnatióne Dómini séntiat: hoc nimírum sentit, quod Marcus, Lucas, et Ioánnes. Si quæras quid Ioánnes séntiat; hoc procul dúbio, quod Lucas, Marcus, et Matthǽus. Si quæras quid Marcus; hoc quod Matthǽus, Ioánnes, et Lucas. Si quæras quid Lucas; hoc quod Ioánnes, Matthǽus, et Marcus sentit. Quátuor ergo fácies uni sunt: quia notítia fídei, qua cognoscúntur a Deo, ipsa est in uno, quæ est simul in quátuor. Quidquid enim in uno invéneris, hoc in ómnibus simul quátuor cognósces.'
      en2:
      - type: text
        text: 'Therefore the four faces are one: for if you inquire what Matthew thinks concerning the Incarnation of the Lord, he thinks precisely what Mark, Luke, and John think. If you ask what John thinks, it is beyond doubt what Luke, Mark, and Matthew think. If you ask what Mark thinks, it is what Matthew, John, and Luke think. If you ask what Luke thinks, it is what John, Matthew, and Mark think. Therefore the four faces are one: because the knowledge of faith, by which they are known by God, is itself one in the one, which is at the same time in the four. For whatever you find in one, you will know to be present in all four at once.'
  reading.qu-tuor-ergo-f-cies-uni-sunt-quia-si-requ-ras-qu-bd9bb3ae7a:
    role: reading
    content:
      en:
      - type: text
        text: 'So much power then as have preachers, so much ornament have the heavens. Wherefore again it is written By the word of the Lord were the heavens made. ~(Ps. xxxii. 6.) For the Word of the Lord is the Son of the Father. But, to the end that all the Holy Trinity may be made manifest as the Maker of the heavens, that is, of the Apostles, it is straightway added touching God the Holy Ghost: you and all the host of them by the Breath of His mouth. Therefore the might of the same heavens is the might of the Spirit, for they had not braved the powers of this world, unless the strength of the Holy Ghost had comforted them. For we know what manner of men the Teachers of the Holy Church were before the coming of this Spirit and since He came we see in Whose strength they are made strong.'
      la:
      - type: text
        text: 'Quátuor ergo fácies uni sunt: quia si requíras quid Matthǽus de incarnatióne Dómini séntiat: hoc nimírum sentit, quod Marcus, Lucas, et Ioánnes. Si quæras quid Ioánnes séntiat; hoc procul dúbio, quod Lucas, Marcus, et Matthǽus. Si quæras quid Marcus; hoc quod Matthǽus, Ioánnes, et Lucas. Si quæras quid Lucas; hoc quod Ioánnes, Matthǽus, et Marcus sentit. Quátuor ergo fácies uni sunt: quia notítia fídei, qua cognoscúntur a Deo, ipsa est in uno, quæ est simul in quátuor. Quidquid enim in uno invéneris, hoc in ómnibus simul quátuor cognósces.'
      en2:
      - type: text
        text: 'Therefore the four faces are one: for if you inquire what Matthew thinks concerning the Incarnation of the Lord, he thinks precisely what Mark, Luke, and John think. If you ask what John thinks, it is beyond doubt what Luke, Mark, and Matthew think. If you ask what Mark thinks, it is what Matthew, John, and Luke think. If you ask what Luke thinks, it is what John, Matthew, and Mark think. Therefore the four faces are one: because the knowledge of faith, by which they are known by God, is itself one in the one, which is at the same time in the four. For whatever you find in one, you will know to be present in all four at once.'
  reading.qua-in-re-hoc-quoque-not-ndum-est-quod-inv-ntus-f88f554cf7:
    role: reading
    content:
      en:
      - type: text
        text: 'And herein we must remark that the treasure, when once it hath been found, is hidden to keep it safe. He whose intimate yearnings after God are not hidden from the praise of men, is open thereby to the attacks of evil spirits. In this life we are, as it were, journeying homewards on a road beset by evil spirits who are like highwaymen. He therefore inviteth robbery who carrieth his treasure ostentatiously. Doubtless our neighbour should be able to see our good works, as it is written: “Let your light so shine before men that they may see your good works, and glorify your Father which is in heaven.” But this is not to be understood to mean that we are to seek the praise of men by what we do. Rather, let us in such wise work in the open that the inner intention of devotion is not advertised. So we shall give an example to our neighbour, and yet keep hidden, except from the sight of God, our purpose of pleasing him.'
      la:
      - type: text
        text: 'Qua in re hoc quoque notándum est, quod invéntus thesáurus abscónditur, ut servétur: quia stúdium cæléstis desidérii a malígnis spirítibus custodíre non súfficit, qui hoc ab humánis láudibus non abscóndit. In præsénti étenim vita, quasi in via sumus, qua ad pátriam pérgimus. Malígni autem spíritus iter nostrum quasi quidam latrúnculi óbsident. Deprædári ergo desíderat, qui thesáurum públice portat in via. Hoc autem dico, non ut próximi ópera nostra bona non vídeant, cum scriptum sit: Vídeant ópera vestra bona, et gloríficent Patrem vestrum qui in cælis est; sed, ut per hoc quod ágimus, laudes extérius non quærámus. Sic autem sit opus in público, quátenus inténtio máneat in occúlto; ut, et de bono ópere próximis præbeámus exémplum, et tamen per intentiónem, qua Deo soli placére quǽrimus, semper optémus secrétum.'
      en2:
      - type: text
        text: 'In this matter, it must also be noted that the treasure, once found, is hidden so that it may be kept safe: for he does not suffice to guard the zeal of heavenly desire from evil spirits, who does not hide it from human praise. For in this present life we are, as it were, on the road by which we press on toward our homeland. But the evil spirits beset our way like so many brigands. He who carries his treasure openly on the road invites plunder. This I say not so that our neighbors may not see our good works — since it is written: Let your good works be seen, that they may glorify your Father who is in heaven — but so that we may not seek outward praise for what we do. So let the work be in public, but the intention remain hidden; that we may both offer our neighbors the example of a good work, and yet, through the intention by which we seek to please God alone, may always desire what is secret.'
  reading.quam-ob-rem-maxim-pere-gratulor-huius-sancti-fel-897e15ff4d:
    role: reading
    content:
      la:
      - type: text
        text: 'Quam ob rem maximópere gratulor huius Sancti felicitáti, quod quamquam translátus est, atque hanc, quæ apud nos est, civitátem relíquit, tamen in álteram adscríptus est civitátem, nempe Dei. Et digréssus ab hac Ecclésia, ad illam pervénit, quæ est primogenitorum descriptorum in cælis: ac relíctis hisce festis, tránsiit ad celebritatem Angelórum. Étenim quod et cívitas sursum sit, et Ecclésia, et celebritas, audi Paulum dicéntem: Accessistis ad civitátem Dei viventis, Ierúsalem cæléstem, et Ecclésiam primitivorum, qui conscripti sunt in cælis, et ad multórum millium Angelórum frequentiam.'
      en2:
      - type: text
        text: 'For this reason I greatly rejoice at the happiness of this Saint, who, though he has been translated and has left this city which is among us, has nevertheless been enrolled in another city, that is, the city of God. And departing from this Church, he has arrived at that Church which is the assembly of the firstborn who are enrolled in the heavens; and leaving these festivals, he has passed over to the celebration of the Angels. For that there is a city above, and a Church, and a celebration, hear Paul saying: You have come to the city of the living God, the heavenly Jerusalem, and to the Church of the firstborn who are enrolled in the heavens, and to the company of many thousands of Angels.'
  reading.quam-ob-rem-maxim-pere-gratulor-huius-sancti-fel-c14a1eb41c:
    role: reading
    content:
      en:
      - type: text
        text: In this verily do I most chiefly rejoice, for the happiness of that holy servant of God, in that, being taken away hence, and having found here no abiding city, he is become a citizen of that other city, which is the city of the living God from the Church here he is gone, but hie is come unto the Church of the first-born, which are written in heaven, (Heb. xii. 22, 23); he keepeth holiday with us no more, but he is passed to where he holdeth high festival with Angels. And what be that city, and that Church, and that festival above, Paul biddeth us know, saying Ye are come unto the city of the living God, the heavenly Jerusalem, and unto the Church of the first-born which are written in heaven, and to an innumerable company of Angels.
      la:
      - type: text
        text: 'Quam ob rem maximópere gratulor huius Sancti felicitáti, quod quamquam translátus est, atque hanc, quæ apud nos est, civitátem relíquit, tamen in álteram adscríptus est civitátem, nempe Dei. Et digréssus ab hac Ecclésia, ad illam pervénit, quæ est primogenitorum descriptorum in cælis: ac relíctis hisce festis, tránsiit ad celebritatem Angelórum. Étenim quod et cívitas sursum sit, et Ecclésia, et celebritas, audi Paulum dicéntem: Accessistis ad civitátem Dei viventis, Ierúsalem cæléstem, et Ecclésiam primitivorum, qui conscripti sunt in cælis, et ad multórum millium Angelórum frequentiam.'
      en2:
      - type: text
        text: 'For this reason I greatly rejoice at the happiness of this Saint, who, though he has been translated and has left this city which is among us, has nevertheless been enrolled in another city, that is, the city of God. And departing from this Church, he has arrived at that Church which is the assembly of the firstborn who are enrolled in the heavens; and leaving these festivals, he has passed over to the celebration of the Angels. For that there is a city above, and a Church, and a celebration, hear Paul saying: You have come to the city of the living God, the heavenly Jerusalem, and to the Church of the firstborn who are enrolled in the heavens, and to the company of many thousands of Angels.'
  reading.quid-ergo-est-ego-sum-vitis-vera-numquid-ut-dder-b09ad16624:
    role: reading
    content:
      en:
      - type: text
        text: 'Why saith He: I am the true vine? As touching this word true, hath He not here regard to that other parable of a vine, the like figure whereto He doth here apply to Himself? (Jer. ii. 21.) Here is He called a vine, not plainly, but in parable, as also He is called elsewhere a sheep, (Isa. liii. 7, Acts viii. 32,) a lamb, (John i. 36,) a lion, (Apoc. v. 5,) a rock, (1 Cor. x. 4,) a corner-stone, ~(Eph. ii. 20,) and other things of the like kind. But these things are in themselves that which they seem to be, albeit He is called by their names, not plainly, but in a parable, and herein are they different from that vine, whereof in this place He taketh on Him the name. For when He saith: I am the true vine, doth He not make distinction between Himself, and that which indeed seemed to be a vine, but to which it is said: How art thou turned into the degenerate plant of a strange vine unto Me? (Jer. ii. 21.) For by what title shall that plant be called other than a false vine, whereto they looked that she should bring forth grapes, and she brought forth thorns?'
      la:
      - type: text
        text: 'Quid ergo est, Ego sum vitis vera? Numquid ut ádderet, vera, hoc ad eam vitem rétulit, unde ista similitúdo transláta est? Sic enim dícitur vitis per similitúdinem, non per proprietátem: quemádmodum dícitur ovis, agnus, leo, petra, lapis anguláris, et cétera huiúsmodi, quæ magis ipsa sunt vera, ex quibus ducúntur istæ similitúdines, non proprietátes. Sed cum dicit, Ego sum vitis vera: ab illa se útique discérnit, cui dícitur: Quómodo convérsa es in amaritúdinem vitis aliéna? Nam quo pacto est vitis vera, quæ exspectáta est ut fáceret uvam, fecit autem spinas?'
      en2:
      - type: text
        text: 'What is it, then, that he says: I am the true vine? Did he add the word true as a reference to that vine from which the metaphor is drawn? For the vine is so called by way of similitude, not by way of proper designation — just as he is called a sheep, a lamb, a lion, a rock, a cornerstone, and other things of this kind, which are in fact more truly what they are — those things from which the similitudes are drawn, not the proper designations. But when he says, I am the true vine, he surely distinguishes himself from the vine to which it is said: How have you turned into the bitterness of a foreign vine? For how is that the true vine, which was expected to bring forth grapes but brought forth thorns instead?'
  reading.quidquid-gitur-in-hac-sancta-plebe-potest-esse-v-7630f53848:
    role: reading
    content:
      en:
      - type: text
        text: Whatsover, therefore, of virtue and grace there may be in this holy people, all the bright streams thereof do flow from him, as from a most clear fountain. By his manly chastity, by his sternly noble temperance, by the graceful courtesy which marked him, he drew all men’s love to God and by his eminent ministry in his Bishopric he hath left behind him in his disciples, many heirs of his priesthood.
      la:
      - type: text
        text: Quidquid ígitur in hac sancta plebe potest esse virtútis et grátiæ, de hoc, quasi quodam fonte lucidíssimo, ómnium rivulórum púritas emanávit. Etenim, quia castitátis pollébat vigóre, quia abstinéntiæ gloriabátur angústiis, quia blandiméntis erat prǽditus lenitátis, ómnium cívium in Deum provocávit afféctum; quia Pontíficis administratióne fulgébat, plures e discípulis relíquit sui sacerdótii successóres.
      en2:
      - type: text
        text: Whatever therefore of virtue and grace can exist in this holy people, the purity of all the streams flowed from him as from some most limpid fountain. For since he flourished with the vigor of chastity, since he gloried in the strictness of abstinence, since he was endowed with the gentleness of kindness, he drew the affection of all citizens toward God; and since he shone in the administration of a Pontiff, he left behind more disciples as successors in his priesthood.
  reading.quidquid-gitur-in-hac-sancta-plebe-potest-esse-v-fae9030a35:
    role: reading
    content:
      la:
      - type: text
        text: Quidquid ígitur in hac sancta plebe potest esse virtútis et grátiæ, de hoc, quasi quodam fonte lucidíssimo, ómnium rivulórum púritas emanávit. Etenim, quia castitátis pollébat vigóre, quia abstinéntiæ gloriabátur angústiis, quia blandiméntis erat prǽditus lenitátis, ómnium cívium in Deum provocávit afféctum; quia Pontíficis administratióne fulgébat, plures e discípulis relíquit sui sacerdótii successóres.
