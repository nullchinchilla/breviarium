        text: Fui flagellátus * tota die, et castigátio mea in matutínis.
      - type: antiphon
        text: Veni ad montem myrrhæ * et ad collem thuris; tamquam agnus ad occisionem ductus, obmútui, et non apérui os meum.
      - type: antiphon
        text: 'Fodérunt manus meas * et pedes meos: dinumeravérunt ómnia ossa mea.'
      - type: antiphon
        text: 'Consolantem me * quæsívi, et non invéni: dedérunt in escam meam fel, et in siti mea potavérunt me acéto.'
      - type: antiphon
        text: 'Cum accepísset Iesus * acetum, dixit: Consummatum est; et inclináto cápite, emísit spíritum.'
