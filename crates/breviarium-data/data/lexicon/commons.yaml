      - type: citation
        text: '1 Cum complésset Sálomon fundens preces, ignis descéndit de cælo et devorávit holocáusta et víctimas: et maiéstas Dómini implévit domum.'
      - type: citation
        text: 2 Nec póterant sacerdótes íngredi templum Dómini, eo quod implésset maiéstas Dómini, templum Dómini.
      - type: citation
        text: '3 Sed et omnes fílii Israël vidébant descendéntem ignem, et glóriam Dómini super domum: et corruéntes proni in terram super paviméntum stratum lápide, adoravérunt et laudavérunt Dóminum: Quóniam bonus, quóniam in sǽculum misericórdia eius.'
      - type: text
        text: 4 Rex autem et omnis pópulus immolábant víctimas coram Dómino.
      - type: citation
        text: '5 Mactávit ígitur rex Sálomon hóstias, boum vigínti duo míllia, aríetum centum vigínti míllia: et dedicávit domum Dei rex et univérsus pópulus.'
