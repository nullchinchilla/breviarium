      en2:
      - type: text
        text: |-
          Unconquered Martyr, who followed
          the only-begotten Son of the Father,
          you triumph with your foes vanquished
          and enjoy the things of heaven as victor.
      
          By the gift of your prayer
          wash away our guilt,
          keeping off the contagion of evil
          and repelling the weariness of life.
      
          Now the bonds of your consecrated body
          are loosed:
          loose us from the chains of this age,
          by the gift of the heavenly Power.
      
          Let glory be to God the Father,
          and to his only Son,
          with the Spirit the Paraclete,
          now and through every age.
          Amen.
  hymn.iste-conf-ssor-d-mini-col-ntes-3f6d87b6e9:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          This the confessor of the Lord, whose triumph
          Now all the faithful celebrate, with gladness
          Erst on this feast-day merited to enter
          Into his glory.

          Saintly and prudent, modest in behaviour,
          Peaceful and sober, chaste was he, and lowly.
          While that life’s vigour, coursing through his members,
          Quickened his being.

          Sick ones of old time, to his tomb resorting,
          Sorely by ailments manifold afflicted,
          Oft-times have welcomed health and strength returning,
          At his petition.

          Whence we in chorus gladly do him honour,
          Chanting his praises with devout affection,
          That in his merits we may have a portion,
          Now and forever.

          His be the glory, power and salvation,
          Who over all things reigneth in the highest,
          Earth’s mighty fabric ruling and directing,
          Onely and Trinal.
          Amen.
      la:
      - type: text
        text: |-
          Iste Conféssor Dómini, coléntes
          Quem pie laudant pópuli per orbem,
          Hac die lætus méruit beátas
          Scándere sedes.

          Qui pius, prudens, húmilis, pudícus,
          Sóbriam duxit sine labe vitam,
          Donec humános animávit auræ
          Spíritus artus.

          Cuius ob præstans méritum, frequénter,
          Ægra quæ passim iacuére membra,
          Víribus morbi dómitis, salúti
          Restituúntur.

          Noster hinc illi chorus obsequéntem
          Cóncinit laudem celebrésque palmas,
          Ut piis eius précibus iuvémur
          Omne per ævum.

          Sit salus illi, decus atque virtus,
          Qui, super cæli sólio corúscans,
          Tótius mundi sériem gubérnat,
          Trinus et unus.
          Amen.
      en2:
      - type: text
        text: |-
          This the confessor of the Lord, whose triumph
          Now all the faithful celebrate, with gladness
          Erst on this feast-day merited to enter
          Into his glory.
      
          Saintly and prudent, modest in behaviour,
          Peaceful and sober, chaste was he, and lowly.
          While that life’s vigour, coursing through his members,
          Quickened his being.
      
          Sick ones of old time, to his tomb resorting,
          Sorely by ailments manifold afflicted,
          Oft-times have welcomed health and strength returning,
          At his petition.
      
          Whence we in chorus gladly do him honour,
          Chanting his praises with devout affection,
          That in his merits we may have a portion,
          Now and forever.
      
          His be the glory, power and salvation,
          Who over all things reigneth in the highest,
          Earth’s mighty fabric ruling and directing,
          Onely and Trinal.
          Amen.
  hymn.iste-conf-ssor-d-mini-col-ntes-4dd3f199b1:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iste Conféssor Dómini, coléntes
          Quem pie laudant pópuli per orbem,
          Hac die lætus méruit beátas
          Scándere sedes.

          Qui pius, prudens, húmilis, pudícus,
          Sóbriam duxit sine labe vitam,
          Donec humános animávit auræ
          Spíritus artus.

          Cuius ob præstans méritum, frequénter,
          Ægra quæ passim iacuére membra,
          Víribus morbi dómitis, salúti
          Restituúntur.

          Noster hinc illi chorus obsequéntem
          Cóncinit laudem celebrésque palmas,
          Ut piis eius précibus iuvémur
          Omne per ævum.

          Sit salus illi, decus atque virtus,
          Qui, super cæli sólio corúscans,
          Tótius mundi sériem gubérnat,
          Trinus et unus.
          Amen.
      en2:
      - type: text
        text: |-
          This Confessor of the Lord, whom the peoples
          piously praise and celebrate throughout the world,
          on this day merited joyfully
          to ascend the blessed seats.
      
          Who, devout, prudent, humble, and pure,
          led a sober life without stain,
          until the breath of the Spirit
          gave life to his mortal limbs.
      
          By whose outstanding merit, frequently,
          sick members that lay here and there,
          with the power of disease overcome,
          are restored to health.
      
          Our choir sings to him
          its dutiful praise and celebrated palms,
          that we may be aided by his devout prayers
          through every age.
      
          Let salvation, honor, and power be to him
          who, shining upon the throne of heaven,
          governs the order of the whole world,
          Three and One.
          Amen.
  hymn.m-rentes-culi-spargite-l-crimas-2d47ce04ec:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Mœrentes óculi spargite lácrimas
          Et luctu resonent íntima córdium,
          Illátas refero Numini ab ímpiis
          Pœnas et fera vúlnera.

          Accincta heu! gladiis turba satellitum.
          Arreptum Dóminum fústibus impetit,
          Nunc cædit cólaphis, nunc quatit horridis
          Divínum Caput íctibus.

          Haud finis sceleri; tráditur improbo
          Christus carnifici; nec mora, barbarus
          In Regem superum non timet, ímpio
          Ausu, vertere déxteram.

          Audíte o Pópuli, Numen amábile,
          Manánte ex húmeris úndique sánguine,
          Lictoris rabidi sústinet impetum,
          Et vocem premit ínnocens.

          Quis non illacrimet! Iam nova condidi:
          Torménta indomitæ Gentis iníquitas.
          Infigit cerebro; proh dolor! efferis
          Sertum vepribus asperum.

          Heu crimen! tráhitur funibus improbis
          Funesti Dóminus supplicii ad locum;
          Illic oppétiit, fúnere spíritum
          Patri restituens suo.

          Passo pro miseris tam fera vúlnera
          In terris resonet débita glória;
          Sacrumque assídue Nomen in æthera
          Humánum genus efferat.
          Amen.
      en2:
      - type: text
        text: |-
          O weeping eyes, shed your tears,
          and let the depths of hearts resound with grief;
          I recall the punishments and fierce wounds
          inflicted upon the Lord by the wicked.
      
          Alas! a band of servants girded with swords
          assaults the arrested Lord with clubs;
          now they strike him with blows,
          now they batter the divine Head with horrible strokes.
      
          There is no end to the wickedness: Christ
          is handed over to the wicked executioner;
          without delay the barbarian fears not,
          with impious daring, to turn his right hand against the King of heaven.
      
          Hear, O peoples, the beloved Lord,
          with blood flowing from his shoulders on all sides,
          bears the assault of the frenzied lictor,
          and the innocent one suppresses his voice.
      
          Who would not weep! Already I have recounted new things:
          the wickedness of the untamed people devises new torments.
          Alas for the grief! it drives into his head
          a crown rough with wild thorns.
      
          Alas the crime! The Lord is dragged with wicked ropes
          to the place of deadly punishment;
          there he died, restoring his spirit in death
          to his Father.
      
          For one who suffered such fierce wounds
          for wretched sinners, let fitting glory resound on earth;
          and may the human race ceaselessly raise
          the sacred Name to heaven.
          Amen.
  hymn.o-glori-sa-v-rginum-37f031ca98:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O glorious lady! throned on high
          Above the star-illumined sky;
          Thereto ordained, thy bosom lent
          To thy Creator nourishment.

          Through thy sweet offspring we receive
          The bliss once lost through hapless Eve;
          And heaven to mortals open lies
          Now thou art portal of the skies.

          Thou art the door of heaven's high King,
          Light's gateway fair and glistering;
          Life through a Virgin is restored;
          Ye ransomed nations, praise the Lord!

          All honour, laud, and glory be,
          O Jesu, Virgin-born, to thee;
          All glory, as is ever meet,
          To Father and to Paraclete.
          Amen.
      la:
      - type: text
        text: |-
          O gloriósa vírginum,
          Sublímis inter sídera,
          Qui te creávit, párvulum
          Lacténte nutris úbere.

          Quod Heva tristis ábstulit,
          Tu reddis almo gérmine:
          Intrent ut astra flébiles,
          Cæli reclúdis cárdines.

          Tu Regis alti iánua
          Et aula lucis fúlgida:
          Vitam datam per Vírginem,
          Gentes redémptæ, pláudite.

          Iesu tibi sit glória,
          Qui natus es de Vírgine,
          Cum Patre, et almo Spíritu,
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
