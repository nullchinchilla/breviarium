  reading.gl-dius-tel-rum-mnium-telum-acut-ssimum-est-in-q-d1c5299ff4:
    role: reading
    content:
      en:
      - type: text
        text: 'Then we hear these things our hearts burn within us and we long to be already there, where we hope to rejoice for ever. But we cannot attain unto great rewards, save through great labour. Therefore saith the excellent preacher Paul: “He is not crowned, except he strive lawfully.” (2 Tim. ii. 5.) The greatness of the reward doth delight our mind let not the throes of the struggle dishearten us. Therefore the Truth saith unto every one that cometh unto Him “If any man come to Me, and hate not his father and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple.”'
      la:
      - type: text
        text: Gládius telórum ómnium telum acutíssimum est, in quo sit ius potestátis, et iudícii sevéritas, et animadvérsio peccatórum. Et, huius quidem teli nómine, novi Evangélii prædicatiónem appellátam frequens in prophétis auctóritas est. Dei ígitur verbum nuncupátum meminérimus in gládio; qui gládius missus in terram est, idest, prædicátio eius hóminum córdibus infúsa. Fitque gravis in domo una dissénsio, et doméstica novo hómini erunt inimíca; quia ille, per verbum Dei divísus ab illis, manére et intérior et extérior, id est, et corpus et anima, in spíritus novitáte gaudébit.
      en2:
      - type: text
        text: The sword is the sharpest of all weapons, in which resides the authority of power, the severity of judgment, and the punishment of sins. And by the name of this weapon, the frequent testimony of the prophets declares that the preaching of the new Gospel is signified. Let us therefore recall that the word of God is named by the sword; which sword was sent upon the earth, that is, the preaching of it was infused into the hearts of men. And there arises a grave dissension within a single household, and those of the household shall be enemies to the new man; because he who has been divided from them by the word of God will rejoice to remain both interior and exterior, that is, both body and soul, in the newness of the spirit.
  reading.h-c-eius-mater-est-qui-a-patre-ante-omne-princ-p-5dd59e51c7:
    role: reading
    content:
      en:
      - type: text
        text: She is the Mother of him who was begotten of the Father before all ages, and who is acknowledged by Angels and men to be Lord of all. Wouldst thou know how much nobler is this virgin than any of the heavenly powers. They stand before Him with fear and trembling, veiling their faces with their wings, but she offereth humanity to Him to Whom she gave birth. Through her we obtain the remission of sins. Hail, then, O Mother! heaven! damsel! maiden! throne! adornment, and glory, and foundation, of our Church! cease not to pray for us to thy Son and our Lord Jesus Christ that through thee we may find mercy in the day of judgment, and may be able to obtain those good things which God hath prepared for them that love Him, by the grace and goodness of our Lord Jesus Christ to Whom, with the Father, and the Holy Ghost, be ascribed all glory, and honour, and power, now, and for ever and ever. Amen.
      la:
      - type: text
        text: 'Hæc eius mater est, qui a Patre ante omne princípium génitus fuit; quem Angeli et hómines agnóscunt Dóminum rerum ómnium. Visne cognóscere quanto Virgo hæc præstántior sit cæléstibus Poténtiis? Illæ cum timóre et tremóre assístunt, fáciem velántes suam: hæc humánum genus illi offert, quem génuit. Per hanc et peccatórum véniam conséquimur. Ave ígitur, mater, cælum, puélla, virgo, thronus. Ecclésiæ nostræ decus, glória et firmaméntum: assídue pro nobis precáre Iesum, Fílium tuum et Dóminum nostrum, ut per te misericórdiam inveníre in die iudícii, et quæ repósita sunt iis qui díligunt Deum bona cónsequi possímus, grátia et benignitáte Dómini nostri Iesu Christi: cum quo Patri simul et Sancto Spirítui glória, et honor, et impérium, nunc et semper in sǽcula sæculórum. Amen.'
      en2:
      - type: text
        text: 'She is the mother of him who was begotten by the Father before all beginning; whom Angels and men acknowledge as Lord of all things. Do you wish to know how much this Virgin excels the heavenly Powers? They stand before him with fear and trembling, veiling their faces; she offers to him the human race she has borne. Through her we obtain pardon even for sins. Hail, therefore, O Mother, O heaven, O maiden, O virgin, O throne. The ornament, glory, and foundation of our Church: pray without ceasing to Jesus, your Son and our Lord, that through you we may find mercy on the day of judgment, and may obtain the good things laid up for those who love God, by the grace and kindness of our Lord Jesus Christ: with whom, to the Father and likewise to the Holy Spirit, be glory, honor, and dominion, now and always, for ever and ever. Amen.'
  reading.h-c-nubes-ra-ngelos-sid-raque-transgr-diens-verb-2ecc245b00:
    role: reading
    content:
      en:
      - type: text
        text: It was maidenhood that pierced beyond the clouds, the atmosphere, the Angels, and the stars, and came upon the Word of God in the very bosom of the Father, and sucked Him into her heart. For who, that hath once found such blessedness, would leave it again “For thy name is as ointment poured forth, therefore do the virgins love thee,” and draw thee after them. (Cant. i. 3.) Lastly, it is not I, but the Lord by Whom it is said that they which neither marry nor are given in marriage are as the angels of God in heaven. (Matth. xxii. 30.) Let no man therefore marvel that they which be married unto the Lord of angels should be likened themselves to angels.
      la:
      - type: text
        text: Hæc nubes, áëra, Ángelos, sidéraque transgrédiens, Verbum Dei in ipso sinu Patris invénit, et toto hausit péctore. Nam quis tantum, cum invénerit, relínquat boni? Unguéntum enim exinanítum est nomen tuum; proptérea adolescéntulæ dilexérunt te, et attraxérunt te. Postrémo, non meum est illud quóniam, Quæ non nubunt neque nubéntur, erunt sicut Ángeli Dei in cælo. Nemo ergo mirétur, si Ángelis comparéntur, quæ Angelórum Dómino copulántur.
      en2:
      - type: text
        text: This cloud, passing beyond the air, the Angels, and the stars, found the Word of God in the very bosom of the Father, and drank him in with all her heart. For who, having found so great a good, would leave it? "Your name is as oil poured out; therefore young women have loved you, and have drawn you to themselves." Finally, those words — "they who neither marry nor are given in marriage, but shall be as the angels of God in heaven" — are not mine to withhold. Let no one wonder, then, if virgins are compared to the Angels, who are united to the Lord of the Angels.
  reading.hi-nim-rum-et-pr-ximum-d-ligunt-et-tamen-illa-su-9006a73818:
    role: reading
    content:
      en:
      - type: text
        text: 'He, then, that loveth his neighbour naturally, loveth him indeed, but attaineth not unto that great reward of love, for he loveth him, not after the spirit, but after the flesh. Therefore, when the Lord saith: This is My commandment, That ye love one another, He saith also, as I have loved you, even as though He said openly, Love ye one another, with that aim wherewith I have loved you. And in this matter, dearly beloved brethren, it behoveth us to watch; for he that hateth us of old time, even while he draweth our mind to love the things which are seen and temporal, rouseth up against us our neighbour who is weaker than we are, to take from us that which we love.'
      la:
      - type: text
        text: 'Hi nimírum et próximum díligunt, et tamen illa sublímia dilectiónis prǽmia non assequúntur: quia amórem suum non spiritáliter, sed carnáliter impéndunt. Proínde cum Dóminus díceret: Hoc est præcéptum meum, ut diligátis ínvicem: prótinus áddidit: Sicut diléxi vos. Ac si apérte dicat: Ad hoc amáte, ad quod amávi vos. Qua in re, fratres caríssimi, solérter intuéndum est, quod antíquus hostis, dum mentem nostram ad rerum temporálium dilectiónem trahit, infirmiórem contra nos próximum éxcitat, qui ea ipsa, quae dilígimus, auférre moliátur.'
      en2:
      - type: text
        text: 'These indeed love their neighbor, and yet do not attain those sublime rewards of love: because they bestow their love not spiritually but carnally. Hence, when the Lord said: "This is my commandment, that you love one another," he immediately added: "as I have loved you." As if to say openly: Love in the same way that I have loved you. In this matter, dearest brothers, it must be carefully discerned that the ancient enemy, while drawing our mind toward love of temporal things, stirs up against us a weaker neighbor, who strives to take away those very things that we love.'
  reading.hinc-namque-e-sdem-pr-dicat-ribus-isa-as-dicit-p-2470537131:
    role: reading
    content:
      en:
      - type: text
        text: |-
          Therefore, to preachers saith Isaiah: “Prepare ye the way of the Lord, make straight an highway for our God.” (xl. 3.) And again the Psalmist saith: “Spread a path before him that rideth upon the West.” (lxvii. 4.) The Lord rideth upon the West above that from which in death He veiled His glory, hath He royally exalted that glory that excelleth, even the glory of His rising again. He rideth upon the West, Who, being risen again from the dead, is throned high above the death to which He bowed. Before Him, therefore, That rideth upon the West, we spread a path, when we set forth His glory before the eyes of your mind, to the end that He Himself may come after, and Himself enlighten the same your minds by His presence and His love.
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
      - type: rubric
        text: Kneel for the following verse
      - type: text
        text: |-
          We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: |-
          Hinc namque eísdem prædicatóribus Isaías dicit: Paráte viam Dómini, rectas fácite sémitas Dei nostri. Hinc fíliis Psalmísta ait: Iter fácite ei, qui ascéndit super occásum. Super occásum namque Dóminus ascéndit: quia unde in passióne occúbuit, inde maiórem suam glóriam resurgéndo manifestávit. Super occásum vidélicet ascéndit; quia mortem quam pértulit, resurgéndo calcávit. Ei ergo qui ascéndit super occásum, iter fácimus, cum nos eius glóriam vestris méntibus prædicámus, ut eas et ipse post véniens, per amóris sui præséntiam illústret.
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
          Tibi Chérubim et Séraphim * incessábili voce proclámant:
          (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
          Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
          Te gloriósus * Apostolórum chorus,
          Te Prophetárum * laudábilis númerus,
          Te Mártyrum candidátus * laudat exércitus.
          Te per orbem terrárum * sancta confitétur Ecclésia,
          Patrem * imménsæ maiestátis;
          Venerándum tuum verum * et únicum Fílium;
          Sanctum quoque * Paráclitum Spíritum.
          Tu Rex glóriæ, * Christe.
          Tu Patris * sempitérnus es Fílius.
          (Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
          Tu ad déxteram Dei sedes, * in glória Patris.
          Iudex créderis * esse ventúrus.
      - type: rubric
        text: (Sequens versus dicitur flexis genibus)
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: |-
          Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
          Ætérna fac cum Sanctis tuis * in glória numerári.
          Ætérna fac cum Sanctis tuis * in glória munerári.
          Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
          Et rege eos, * et extólle illos usque in ætérnum.
          Per síngulos dies * benedícimus te.
          (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Dignáre, Dómine, die isto * sine peccáto nos custodíre.
          Miserére nostri, Dómine, * miserére nostri.
          Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
          In te, Dómine, sperávi: * non confúndar in ætérnum.
      en2:
      - type: text
        text: |-
