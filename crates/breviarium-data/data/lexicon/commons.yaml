      - type: text
        text: 26 And in the sixth month, the angel Gabriel was sent from God into a city of Galilee, called Nazareth,
      - type: text
        text: 27 To a virgin espoused to a man whose name was Joseph, of the house of David; and the virgin's name was Mary.
      - type: citation
        text: '28 And the angel being come in, said unto her: Hail, full of grace, the Lord is with thee: blessed art thou among women.'
      la:
      - type: citation
        text: Luc 1:26-28
      - type: text
        text: 26 Missus est Angelus Gabriel a Deo in civitatem Galilaeae, cui nomen Nazareth,
      - type: citation
        text: '27 Ad virginem desponsatam viro, cui nomen erat Ioseph, de domo David: et nomen virginis Maria.'
      - type: citation
        text: '28 Et ingressus Angelus ad eam dixit: Ave gratia plena: Dominus tecum: benedicta tu in mulieribus.'
  reading.luc-1-29-33-229a6f1717:
    role: reading
    content:
      en:
      - type: citation
        text: Luke 1:29-33
      - type: text
        text: 29 Who having heard, was troubled at his saying, and thought with herself what manner of salutation this should be.
      - type: citation
        text: '30 And the angel said to her: Fear not, Mary, for thou hast found grace with God.'
      - type: text
        text: 31 Behold thou shalt conceive in thy womb, and shalt bring forth a son; and thou shalt call his name Jesus.
      - type: text
        text: 32 He shall be great, and shall be called the Son of the most High; and the Lord God shall give unto him the throne of David his father; and he shall reign in the house of Jacob for ever.
      - type: text
        text: 33 And of his kingdom there shall be no end.
      la:
      - type: citation
        text: Luc 1:29-33
      - type: text
        text: 29 Quae cum audisset, turbata est in sermone eius, et cogitabat qualis esset ista salutatio.
      - type: citation
        text: '30 Et ait Angelus ei: Ne timeas, Maria: invenisti enim gratiam apud Deum:'
      - type: citation
        text: '31 Ecce concipies in utero, et paries filium, et vocabis nomen eius Iesum:'
      - type: citation
        text: '32 Hic erit magnus, et Filius Altissimi vocabitur, et dabit illi Dominus Deus sedem David patris eius: et regnabit in domo Iacob in aeternum,'
      - type: text
        text: 33 Et regni eius non erit finis.
  reading.luc-1-34-38-4b07af992a:
    role: reading
    content:
      en:
      - type: citation
        text: Luke 1:34-38
      - type: citation
        text: '34 And Mary said to the angel: How shall this be done, because I know not man?'
      - type: citation
        text: '35 And the angel answering, said to her: The Holy Ghost shall come upon thee, and the power of the most High shall overshadow thee. And therefore also the Holy which shall be born of thee shall be called the Son of God.'
      - type: citation
        text: '36 And behold thy cousin Elizabeth, she also hath conceived a son in her old age; and this is the sixth month with her that is called barren:'
      - type: text
        text: 37 Because no word shall be impossible with God.
      - type: citation
        text: '38 And Mary said: Behold the handmaid of the Lord; be it done to me according to thy word. And the angel departed from her.'
      la:
      - type: citation
        text: Luc 1:34-38
      - type: citation
        text: '34 Dixit autem Maria ad Angelum: Quomodo fiet istud, quoniam virum non cognosco?'
      - type: citation
        text: '35 Et respondens Angelus dixit ei: Spiritus Sanctus superveniet in te, et virtus Altissimi obumbrabit tibi. Ideoque et quod nascetur ex te Sanctum, vocabitur Filius Dei.'
      - type: citation
        text: '36 Et ecce Elisabeth cognata tua, et ipsa concepit filium in senectute sua: et hic mensis sextus est illi, quae vocatur sterilis:'
      - type: text
        text: 37 Quia non erit impossibile apud Deum omne verbum.
      - type: citation
        text: '38 Dixit autem Maria: Ecce ancilla Domini: fiat mihi secundum verbum tuum.'
  reading.magnum-rev-ra-mir-culum-fratres-dilect-ssimi-fui-70dd118006:
    role: reading
    content:
      en:
      - type: text
        text: Dearly beloved brethren, the Blessed Virgin Mary was a great wonder. What thing greater or more famous than she, hath ever at any time been found, or can be found She alone is greater than heaven and earth. What thing holier than she hath been, or can be found? Neither Prophets, nor Apostles, nor Martyrs, nor Patriarchs, nor Angels, nor Thrones, nor Lordships, nor Seraphim, nor Cherubim, nor any other creature, visible or invisible, can be found that is greater or more excellent than she. She is at once the hand-maid and the parent of God, at once virgin and mother.
      la:
      - type: text
        text: Magnum revéra miráculum, fratres dilectíssimi, fuit beáta semper Virgo María. Quid namque illa maius aut illústrius ullo umquam témpore invéntum est, seu aliquándo inveníri póterit? Hæc sola cælum ac terram amplitúdine superávit. Quidnam illa sánctius? Non Prophétæ, non Apóstoli, non Mártyres, non Patriárchæ, non Angeli, non Throni, non Dominatiónes, non Séraphim, non Chérubim; non deníque áliud quidpíam, inter creátas res visíbiles aut invisíbiles, maius aut excelléntius inveníri potest. Eádem ancílla Dei est et mater; eádem Virgo et Génetrix.
  reading.modum-ipsum-si-dilig-nter-attendas-non-modo-mite-8b98250d4e:
    role: reading
    content:
      la:
      - type: text
        text: Modum ipsum, si diligénter attendas, non modo mitem, sed et húmilem corde cognosces. Nempe in humilitáte iudícium eius sublatum est, cum nec ad tantas blasphemias, nec ad falsissima, quæ sibi obiiciebantur crímina respónderet. Vídimus, inquit, eum et non erat ei aspectus, nec speciosum forma præ fíliis hóminum, sed oppróbrium hóminum et tamquam leprosum, novissimum virórum, plane virum dolórum a Deo percussum et humiliátum; ita ut nulla esset ei spécies, neque decor. O novissimum et altíssimum! O húmilem et sublimem! Oppróbrium hóminum et glóriam Angelórum! Nemo illo sublimior, neque humilior. Dénique sputis illitus est, oppróbriis saturatus est, morte turpissima condemnátus est, cum sceleratis deputatus est. Nihílque merebitur vel ista humílitas, quæ hunc habet modum; imo quæ tam est ultra modum? Sicut est patiéntia singuláris, sic et humílitas admirábilis; utráque sine exémplo.
  reading.nec-imm-rito-doct-res-sancti-h-adum-nuncupati-ne-1b019ffd10:
    role: reading
    content:
      en:
      - type: text
        text: Whatsover, therefore, of virtue and grace there may be in this holy people, all the bright streams thereof do flow from him, as from a most clear fountain. By his manly chastity, by his sternly noble temperance, by the graceful courtesy which marked him, he drew all men’s love to God and by his eminent ministry in his Bishopric he hath left behind him in his disciples, many heirs of his priesthood.
      la:
      - type: text
        text: 'Nec immérito Doctóres sancti Hýadum nuncupatióne signántur. Græco quippe elóquio hýetos plúvia vocátur, et Hýades nomen a plúviis accepérunt, quia ortæ procul dúbio imbres ferunt. Bene ergo Hýadum appellatióne expréssi sunt, qui, ad statum universális Ecclésiæ quasi in cæli fáciem dedúcti, super aréntem terram humáni péctoris, sanctæ prædicatiónis imbres fudérunt. Si enim prædicatiónis sermo plúvia non esset, Móyses mínime dixísset: Exspectétur sicut plúvia elóquium meum; et nequáquam per Isaíam Véritas díceret: Mandábo núbibus meis, ne pluant super eam imbrem; atque hoc, quod paulo ante protúlimus: Quam ob rem prohíbitæ sunt stellæ pluviárum.'
  reading.nec-imm-rito-doct-res-sancti-h-adum-nuncupati-ne-34e933241d:
    role: reading
    content:
      en:
      - type: text
        text: Here there are sicknesses, here there are strivings, here there are untimely deaths, here there are lies, here there are jealousies, here there are troubles, here there is anger, here there are lustings, here there are pit-falls unnumbered, here there are daily cares, here one evil followeth after another, and all bring vexation. And yet Paul hath it that even here a man may rejoice evermore, if he will but raise his head above the flood of earthly things, and order his life aright. How much better shall we fare when we have passed away from all these things, and all these things are taken away from us, when we shall have no illhealth, nor disease, nor matter wherein to sin, when that hard thing, right of property, shall exist no more, whereby all unrighteousness cometh into this life, and strifes unnumbered are begotten.
      la:
      - type: text
        text: 'Nec immérito Doctóres sancti Hýadum nuncupatióne signántur. Græco quippe elóquio hýetos plúvia vocátur, et Hýades nomen a plúviis accepérunt, quia ortæ procul dúbio imbres ferunt. Bene ergo Hýadum appellatióne expréssi sunt, qui, ad statum universális Ecclésiæ quasi in cæli fáciem dedúcti, super aréntem terram humáni péctoris, sanctæ prædicatiónis imbres fudérunt. Si enim prædicatiónis sermo plúvia non esset, Móyses mínime dixísset: Exspectétur sicut plúvia elóquium meum; et nequáquam per Isaíam Véritas díceret: Mandábo núbibus meis, ne pluant super eam imbrem; atque hoc, quod paulo ante protúlimus: Quam ob rem prohíbitæ sunt stellæ pluviárum.'
  reading.nol-te-tim-re-eos-qui-occ-dunt-corpus-nullus-git-fd05e89ada:
    role: reading
    content:
      en:
      - type: text
        text: Or it may be asked how we are commanded in one place to hate our parents, and them that are near us in the flesh, and in another place to love even our enemies. And, verily, the Truth hath said, as touching a wife “What God hath joined together, let not man put asunder.” (Matth. xix. 6.) And Paul saith “ Husbands, love your wives, even as Christ also loved the Church.” (Eph. v. 25.) Behold, the disciple commandeth a man to love his wife, and the Master saith “If any man hate not his wife, he cannot be My disciple.” Doth the judge, then, order one proclamation, and the crier make another? or can the man both love and hate? If we consider well the force of the commandment, we shall be able in wisdom to do both. Let us love wife, and kindred, and neighbour, as touching their nearness in the flesh but as touching the way of God, if they withstand us therein, let us not know them, but hate them and flee from them.
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
      - type: text
        text: O Lord, have mercy upon us, * have mercy upon us.
      - type: text
        text: O Lord, let thy mercy lighten upon us, * as our trust is in thee.
      - type: text
        text: O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: 'Nolíte timére eos qui occídunt corpus. Nullus ígitur córporum nostrórum casus est pertimescéndus, neque ullus interiméndæ carnis admitténdus est dolor: quando pro natúræ suæ atque oríginis conditióne resolúta, in substántiam spirituális ánimæ refundátur. Et quia doctrínis tálibus confirmátos opórtet líberam confiténdi Dei habére constántiam, étiam conditiónem, qua tenerémur, adiécit: negatúrum se eum Patri in cælis, qui se homínibus in terra negásset: eum porro qui conféssus coram homínibus se fuísset, a se in cælis confiténdum: qualésque nos nóminis sui testes homínibus fuissémus, tali nos apud Deum Patrem testimónio eius usúros.'
      - type: text
        text: 'Te Deum laudámus: * te Dóminum confitémur.'
      - type: text
        text: Te ætérnum Patrem * omnis terra venerátur.
      - type: text
        text: 'Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:'
      - type: text
        text: 'Tibi Chérubim et Séraphim * incessábili voce proclámant:'
      - type: text
        text: (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
      - type: text
        text: Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
      - type: text
        text: Te gloriósus * Apostolórum chorus,
      - type: text
        text: Te Prophetárum * laudábilis númerus,
      - type: text
        text: Te Mártyrum candidátus * laudat exércitus.
      - type: text
        text: Te per orbem terrárum * sancta confitétur Ecclésia,
      - type: text
        text: Patrem * imménsæ maiestátis;
      - type: text
        text: Venerándum tuum verum * et únicum Fílium;
      - type: text
        text: Sanctum quoque * Paráclitum Spíritum.
      - type: text
        text: Tu Rex glóriæ, * Christe.
      - type: text
        text: Tu Patris * sempitérnus es Fílius.
      - type: text
        text: '(Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: 'Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
      - type: text
        text: Tu ad déxteram Dei sedes, * in glória Patris.
      - type: text
        text: Iudex créderis * esse ventúrus.
      - type: text
        text: (Sequens versus dicitur flexis genibus) ~
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória numerári.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória munerári.
      - type: text
        text: Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
      - type: text
        text: Et rege eos, * et extólle illos usque in ætérnum.
      - type: text
        text: Per síngulos dies * benedícimus te.
      - type: text
        text: (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Dignáre, Dómine, die isto * sine peccáto nos custodíre.
      - type: text
        text: Miserére nostri, Dómine, * miserére nostri.
      - type: text
        text: Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
      - type: text
        text: 'In te, Dómine, sperávi: * non confúndar in ætérnum.'
  reading.non-est-d-bium-quin-bonus-et-fidelis-homo-fiieri-d65512b14a:
    role: reading
    content:
      la:
      - type: text
        text: 'Non est dúbium, quin bonus et fidelis homo fiierit iste Ioseph, cui Mater desponsata est Salvatoris. Fidelis, inquam, servus et prudens, quem constituit Dominus suae Matris solatium, suae carnis nutritium, solum denique in terris magni consilii coadiutorem fidelissimum. Huc accedit, quod dicitur fuisse de domo David. Vere enim de domo David. Vere de regia stirpe descendit vir iste Ioseph, nobilis genere, mente nobilior. Plane filius David, non degenerans a patre suo David; prorsus, inquam, filius David, non tantum carne, sed fide, sed sanctitate, sed devotione, quem tamquam alterum David Dominus invenit seciindum cor suum, cui tuto comitteret sacratissimum atque secretissimum sui cordis arcanum: cui, tamquam alteri David, incerta et occúlta sapientiae suae manifestavit, et dedit illi non ignarum esse mysterii, quod nemo principum huius sseculi agnovit.'
