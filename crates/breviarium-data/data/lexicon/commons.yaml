      - type: versicle
        text: You have crowned them with glory and honor, O Lord.
      - type: response
        text: And have set them over the works of your hands.
  versicle.h-c-est-domus-d-mini-f-rmiter-dific-ta-4d62bf45ef:
    role: versicle
    content:
      la:
      - type: versicle
        text: Hæc est domus Dómini fírmiter ædificáta.
      - type: response
        text: Bene fundáta est supra firmam petram.
      en2:
      - type: versicle
        text: This is the house of the Lord, firmly built.
      - type: response
        text: It is well founded upon solid rock.
  versicle.invoc-vi-d-minum-patrem-d-mini-mei-allel-ia-b5082d41a4:
    role: versicle
    content:
      en:
      - type: versicle
        text: I called upon the Lord, the Father of my Lord, Alleluia.
      - type: response
        text: That He would not leave me in the days of my trouble. Alleluia.
      la:
      - type: versicle
        text: Invocávi Dóminum, Patrem Dómini mei, allelúia.
      - type: response
        text: Ut non derelínquat me in die tribulatiónis, allelúia.
      en2:
      - type: versicle
        text: I called upon the Lord, the Father of my Lord, alleluia.
      - type: response
        text: That he might not forsake me in the day of tribulation, alleluia.
  versicle.ipse-vulner-tus-est-propter-iniquit-tes-nostras-94af4eadf6:
    role: versicle
    content:
      la:
      - type: versicle
        text: Ipse vulnerátus est propter iniquitátes nostras.
      - type: response
        text: Et attrítus est propter scélera nostra.
      en2:
      - type: versicle
        text: He himself was wounded for our iniquities.
      - type: response
        text: And he was crushed for our transgressions.
  versicle.iusti-autem-in-perp-tuum-vivent-213aca6657:
    role: versicle
    content:
      en:
      - type: versicle
        text: The righteous live for evermore.
      - type: response
        text: Their reward also is with the Lord.
      la:
      - type: versicle
        text: Iusti autem in perpétuum vivent.
      - type: response
        text: Et apud Dóminum est merces eórum.
      en2:
      - type: versicle
        text: But the just shall live for ever.
      - type: response
        text: And their reward is with the Lord.
  versicle.iusti-autem-in-perp-tuum-vivent-82d87204ef:
    role: versicle
    content:
      la:
      - type: versicle
        text: Iusti autem in perpétuum vivent.
      - type: response
        text: Et apud Dóminum est merces eórum.
      en2:
      - type: versicle
        text: But the just shall live for ever.
      - type: response
        text: And their reward is with the Lord.
  versicle.iustum-ded-xit-d-minus-per-vias-rectas-8b9f70517b:
    role: versicle
    content:
      en:
      - type: versicle
        text: The Lord guided the just in right paths.
      - type: response
        text: And showed him the kingdom of God.
      la:
      - type: versicle
        text: Iustum dedúxit Dóminus per vias rectas.
      - type: response
        text: Et osténdit illi regnum Dei.
      en2:
      - type: versicle
        text: The Lord led the just man by straight paths.
      - type: response
        text: And showed him the Kingdom of God.
  versicle.iustum-ded-xit-d-minus-per-vias-rectas-cb2545f7a9:
    role: versicle
    content:
      en:
      - type: versicle
        text: The Lord loved him and beautified him.
      - type: response
        text: He clothed him with a robe of glory.
      la:
      - type: versicle
        text: Iustum dedúxit Dóminus per vias rectas.
      - type: response
        text: Et osténdit illi regnum Dei.
      en2:
      - type: versicle
        text: The Lord led the just man by straight paths.
      - type: response
        text: And showed him the Kingdom of God.
  versicle.iustum-ded-xit-d-minus-per-vias-rectas-f9889b4025:
    role: versicle
    content:
      la:
      - type: versicle
        text: Iustum dedúxit Dóminus per vias rectas.
      - type: response
        text: Et osténdit illi regnum Dei.
      en2:
      - type: versicle
        text: The Lord led the just man by straight paths.
      - type: response
        text: And showed him the Kingdom of God.
  versicle.iustus-germin-bit-sicut-l-lium-41249fe3a2:
    role: versicle
    content:
      en:
      - type: versicle
        text: The righteous shall grow as the lily.
      - type: response
        text: Yea, he shall flourish for ever in the presence of the Lord.
      la:
      - type: versicle
        text: Iustus germinábit sicut lílium.
      - type: response
        text: Et florébit in ætérnum ante Dóminum.
      en2:
      - type: versicle
        text: The just man shall blossom like a lily.
      - type: response
        text: And shall flourish for ever before the Lord.
  versicle.iustus-ut-palma-flor-bit-93a266f089:
    role: versicle
    content:
      en:
      - type: versicle
        text: The righteous shall flourish like the palm-tree.
      - type: response
        text: He shall grow like a cedar in Lebanon.
      la:
      - type: versicle
        text: Iustus ut palma florébit.
      - type: response
        text: Sicut cedrus Líbani multiplicábitur.
      en2:
      - type: versicle
        text: The just man shall flourish like a palm tree.
      - type: response
        text: Like the cedar of Lebanon he shall multiply.
  versicle.iustus-ut-palma-flor-bit-c0debcf211:
    role: versicle
    content:
      en:
      - type: versicle
        text: Thou hast crowned him with glory and honour, O Lord.
      - type: response
        text: And madest him to have dominion over the works of thy hands.
      la:
      - type: versicle
        text: Iustus ut palma florébit.
      - type: response
        text: Sicut cedrus Líbani multiplicábitur.
      en2:
      - type: versicle
        text: The just man shall flourish like a palm tree.
      - type: response
        text: Like the cedar of Lebanon he shall multiply.
  versicle.iustus-ut-palma-flor-bit-cde7a8a6ec:
    role: versicle
    content:
      la:
      - type: versicle
        text: Iustus ut palma florébit.
      - type: response
        text: Sicut cedrus Líbani multiplicábitur.
      en2:
      - type: versicle
        text: The just man shall flourish like a palm tree.
      - type: response
        text: Like the cedar of Lebanon he shall multiply.
  versicle.l-t-tia-sempit-rna-super-c-pita-e-rum-allel-ia-4a3ca74d97:
    role: versicle
    content:
      en:
      - type: versicle
        text: Everlasting joy shall be upon their heads, alleluia.
      - type: response
        text: They shall obtain joy and gladness, alleluia.
      la:
      - type: versicle
        text: Lætítia sempitérna super cápita eórum, allelúia.
      - type: response
        text: Gáudium et exsultatiónem obtinébunt, allelúia.
      en2:
      - type: versicle
        text: Everlasting joy upon their heads, alleluia.
      - type: response
        text: They shall obtain gladness and exultation, alleluia.
  versicle.lex-dei-eius-in-corde-ips-us-85f4abd1ba:
    role: versicle
    content:
      la:
      - type: versicle
        text: Lex Dei eius in corde ipsíus.
      - type: response
        text: Et non supplantabúntur gressus eius.
      en2:
      - type: versicle
        text: The law of his God is in his heart.
      - type: response
        text: And his steps shall not be overthrown.
  versicle.lex-dei-eius-in-corde-ips-us-a600210126:
    role: versicle
    content:
      en:
      - type: versicle
        text: The law of his God is in his heart.
      - type: response
        text: None of his steps shall slide.
      la:
      - type: versicle
        text: Lex Dei eius in corde ipsíus.
      - type: response
        text: Et non supplantabúntur gressus eius.
      en2:
      - type: versicle
        text: The law of his God is in his heart.
      - type: response
        text: And his steps shall not be overthrown.
  versicle.locus-iste-sanctus-est-in-quo-orat-sac-rdos-619d274357:
    role: versicle
    content:
      en:
      - type: versicle
        text: This place is holy, wherein the Priest prayeth.
      - type: response
        text: For the pardon of the transgressions and offences of the people.
      la:
      - type: versicle
        text: Locus iste sanctus est, in quo orat sacérdos.
      - type: response
        text: Pro delíctis et peccátis pópuli.
      en2:
      - type: versicle
        text: This place is holy, where the Priest prays.
      - type: response
        text: For the offenses and sins of the people.
  versicle.lux-perp-tua-luc-bit-sanctis-tuis-d-mine-allel-i-450680c665:
    role: versicle
    content:
      en:
      - type: versicle
        text: Eternal light will shine over your saints, O Lord, alleluia.
      - type: response
        text: And the eternity of times, alleluia.
      la:
      - type: versicle
        text: Lux perpétua lucébit Sanctis tuis, Dómine, allelúia.
      - type: response
        text: Et ætérnitas témporum, allelúia.
      en2:
      - type: versicle
        text: Perpetual light shall shine upon your Saints, O Lord, alleluia.
      - type: response
        text: And eternity of ages, alleluia.
  versicle.magna-est-gl-ria-eius-in-salut-ri-tuo-7237c27b58:
    role: versicle
    content:
      la:
      - type: versicle
        text: Magna est glória eius in salutári tuo.
      - type: response
        text: Glóriam et magnum decórem impónes super eum.
      en2:
      - type: versicle
        text: Great is his glory in your salvation.
      - type: response
        text: You shall lay upon him glory and great majesty.
  versicle.magna-est-gl-ria-eius-in-salut-ri-tuo-9e5a83791b:
    role: versicle
    content:
      en:
      - type: versicle
        text: His glory is great in thy salvation.
      - type: response
        text: Honour and great majesty shalt Thou lay upon him.
      la:
      - type: versicle
        text: Magna est glória eius in salutári tuo.
      - type: response
        text: Glóriam et magnum decórem impónes super eum.
      en2:
      - type: versicle
        text: Great is his glory in your salvation.
      - type: response
        text: You shall lay upon him glory and great majesty.
  versicle.ne-tradas-b-stiis-nimas-confit-ntes-tibi-d860595c47:
    role: versicle
    content:
      en:
      - type: versicle
        text: O deliver not unto beasts the souls of them that praise thee!
      - type: response
        text: And forget not the souls of thy poor for ever.
      la:
      - type: versicle
        text: Ne tradas béstiis ánimas confiténtes tibi.
      - type: response
        text: Et ánimas páuperum tuórum ne obliviscáris in finem.
      en2:
      - type: versicle
        text: Do not deliver to beasts the souls of those who confess you.
      - type: response
        text: And forget not the souls of your poor to the end.
  versicle.nimis-honor-ti-sunt-am-ci-tui-deus-4c094e5e37:
    role: versicle
    content:
      en:
      - type: versicle
        text: Thy friends, O Lord, are made exceedingly honourable.
      - type: response
        text: Their principality is exceedingly strengthened.
      la:
      - type: versicle
        text: Nimis honoráti sunt amíci tui, Deus.
      - type: response
        text: Nimis confortátus est principátus eórum.
      en2:
      - type: versicle
        text: How greatly honored are your friends, O God.
      - type: response
        text: How greatly is their dominion strengthened.
  versicle.obl-tus-est-quia-ipse-v-luit-38e0f46c29:
    role: versicle
    content:
      la:
      - type: versicle
        text: Oblátus est quia ipse vóluit.
      - type: response
        text: Et livóre eius sanáti sumus.
      en2:
      - type: versicle
        text: He was offered because he himself willed it.
      - type: response
        text: And by his bruise we are healed.
  versicle.os-iusti-medit-bitur-sapi-ntiam-0204322fa6:
    role: versicle
    content:
      en:
      - type: versicle
        text: The mouth of the righteous speaketh wisdom.
      - type: response
        text: And his tongue talketh judgment.
      la:
      - type: versicle
        text: Os iusti meditábitur sapiéntiam.
      - type: response
        text: Et lingua eius loquétur iudícium.
      en2:
      - type: versicle
        text: The mouth of the just man shall meditate wisdom.
      - type: response
        text: And his tongue shall speak judgment.
  versicle.os-iusti-medit-bitur-sapi-ntiam-3ccf6858d7:
    role: versicle
    content:
      la:
      - type: versicle
        text: Os iusti meditábitur sapiéntiam.
      - type: response
        text: Et lingua eius loquétur iudícium.
      en2:
      - type: versicle
        text: The mouth of the just man shall meditate wisdom.
      - type: response
        text: And his tongue shall speak judgment.
  versicle.plant-tus-in-domo-d-mini-de8a9e3ef4:
    role: versicle
    content:
      en:
      - type: versicle
        text: Planted in the house of the Lord
      - type: response
        text: In the courts of the house of our God.
      la:
      - type: versicle
        text: Plantátus in domo Dómini.
      - type: response
        text: In átriis domus Dei nostri.
      en2:
      - type: versicle
        text: Planted in the house of the Lord.
      - type: response
        text: In the courts of the house of our God.
  versicle.posu-sti-d-mine-super-caput-eius-34ea0ea413:
    role: versicle
    content:
      en:
      - type: versicle
        text: O Lord, Thou hast set a crown of precious stones.
      - type: response
        text: Upon his head.
      la:
      - type: versicle
        text: Posuísti, Dómine, super caput eius.
      - type: response
        text: Corónam de lápide pretióso.
      en2:
      - type: versicle
        text: You have placed upon his head, O Lord.
      - type: response
        text: A crown of precious stone.
  versicle.posu-sti-d-mine-super-caput-eius-52912e52a9:
    role: versicle
    content:
      la:
      - type: versicle
        text: Posuísti, Dómine, super caput eius.
      - type: response
        text: Corónam de lápide pretióso.
      en2:
      - type: versicle
        text: You have placed upon his head, O Lord.
      - type: response
        text: A crown of precious stone.
  versicle.pr-prio-f-lio-suo-non-pep-rcit-deus-2bb540b3f7:
    role: versicle
    content:
      la:
      - type: versicle
        text: Próprio Fílio suo non pepércit Deus.
      - type: response
        text: Sed pro nobis ómnibus trádidit illum.
      en2:
      - type: versicle
        text: God did not spare his own Son.
      - type: response
        text: But delivered him up for us all.
  versicle.preti-sa-in-consp-ctu-d-mini-allel-ia-2dc379b9bd:
    role: versicle
    content:
      en:
      - type: versicle
        text: Precious in the sight of the Lord, alleluia.
      - type: response
        text: Is the death of his saints, alleluia.
      la:
      - type: versicle
        text: Pretiósa in conspéctu Dómini, allelúia.
      - type: response
        text: Mors Sanctórum eius, allelúia.
      en2:
      - type: versicle
        text: Precious in the sight of the Lord, alleluia.
      - type: response
        text: Is the death of his Saints, alleluia.
  versicle.preti-sa-in-consp-ctu-d-mini-allel-ia-6183ddf46a:
    role: versicle
    content:
      en:
      - type: versicle
        text: Saints and just, rejoice in the Lord, alleluia.
      - type: response
        text: The Lord has chosen you for his inheritance, alleluia.
      la:
      - type: versicle
        text: Pretiósa in conspéctu Dómini, allelúia.
      - type: response
        text: Mors Sanctórum eius, allelúia.
      en2:
      - type: versicle
        text: Precious in the sight of the Lord, alleluia.
      - type: response
        text: Is the death of his Saints, alleluia.
  versicle.qui-pro-nobis-pati-dign-tus-es-5a67c76326:
    role: versicle
    content:
      la:
      - type: text
        text: Qui pro nobis pati dignátus es.
      en2:
      - type: text
        text: Who was pleased to suffer for us.
  versicle.r-spice-de-c-lo-et-vide-et-v-sita-v-neam-istam-a-173755a92b:
    role: versicle
    content:
      en:
      - type: versicle
        text: Look down from heaven, and behold, and visit this vine, Alleluia.
      - type: response
        text: And protect that (thy right hand hath planted.) Alleluia.
      la:
      - type: versicle
        text: Réspice de cælo, et vide, et vísita víneam istam, allelúia.
      - type: response
        text: Et pérfice eam, allelúia.
      en2:
      - type: versicle
        text: Look down from heaven, and see, and visit this vineyard, alleluia.
      - type: response
        text: And bring it to perfection, alleluia.
  versicle.sp-cie-tua-et-pulchrit-dine-tua-d7fb69c7f4:
    role: versicle
    content:
      en:
      - type: versicle
        text: In thy comeliness and thy beauty.
      - type: response
        text: Go forward, fare prosperously, and reign.
      la:
      - type: versicle
        text: Spécie tua et pulchritúdine tua.
      - type: response
        text: Inténde, próspere procéde, et regna.
      en2:
      - type: versicle
        text: With your beauty and your comeliness.
      - type: response
        text: Press forward, prosper, and reign.
  versicle.sub-umbra-ill-us-quem-desider-veram-sedi-allel-i-87455f4394:
    role: versicle
    content:
      en:
      - type: versicle
        text: I sat under His shadow in Whom I delighted. Alleluia.
      - type: response
        text: To my taste. And His fruit was sweet Alleluia.
      la:
      - type: versicle
        text: Sub umbra illíus, quem desideráveram, sedi, allelúia.
      - type: response
        text: Et fructus eius dulcis gútturi meo, allelúia.
      en2:
      - type: versicle
        text: I sat under the shadow of him whom I had desired, alleluia.
      - type: response
        text: And his fruit was sweet to my palate, alleluia.
  versicle.text-3c241b111f:
    role: versicle
    content:
      en2: []
      la: []
  versicle.tu-es-sac-rdos-in-t-rnum-6b0ffd5af7:
    role: versicle
    content:
      en:
      - type: versicle
        text: Thou art a Priest for ever.
      - type: response
        text: After the order of Melchisedek.
      la:
      - type: versicle
        text: Tu es sacérdos in ætérnum.
      - type: response
        text: Secúndum órdinem Melchísedech.
      en2:
      - type: versicle
        text: You are a Priest for ever.
      - type: response
        text: According to the order of Melchisedech.
  versicle.tu-es-sac-rdos-in-t-rnum-b847894b60:
    role: versicle
    content:
      la:
      - type: versicle
        text: Tu es sacérdos in ætérnum.
      - type: response
        text: Secúndum órdinem Melchísedech.
      en2:
      - type: versicle
        text: You are a Priest for ever.
      - type: response
        text: According to the order of Melchisedech.
