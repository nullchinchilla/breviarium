  reading.de-libro-secundo-paralip-menon-0c8b73cd7a:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the book of Paralipomenon
      - type: citation
        text: 2 Chr 7:1-5
      - type: text
        text: |-
          1 And when Solomon had made an end of his prayer, fire came down from heaven, and consumed the holocausts and the victims: and the majesty of the Lord filled the house.
          2 Neither could the priests enter into the temple of the Lord, because the majesty of the Lord had filled the temple of the Lord.
          3 Moreover all the children of Israel saw the fire coming down, and the glory of the Lord upon the house: and falling down with their faces to the ground, upon the stone pavement, they adored and praised the Lord: because he is good, because his mercy endureth for ever.
          4 And the king and all the people sacrificed victims before the Lord.
          5 And king Solomon offered a sacrifice of twenty-two thousand oxen, and one hundred and twenty thousand rams: and the king and all the people dedicated the house of God.
      la:
      - type: text
        text: De libro secundo Paralipómenon
      - type: citation
        text: 2 Chr 7:1-5
      - type: text
        text: |-
          1 Cum complésset Sálomon fundens preces, ignis descéndit de cælo et devorávit holocáusta et víctimas: et maiéstas Dómini implévit domum.
          2 Nec póterant sacerdótes íngredi templum Dómini, eo quod implésset maiéstas Dómini, templum Dómini.
          3 Sed et omnes fílii Israël vidébant descendéntem ignem, et glóriam Dómini super domum: et corruéntes proni in terram super paviméntum stratum lápide, adoravérunt et laudavérunt Dóminum: Quóniam bonus, quóniam in sǽculum misericórdia eius.
          4 Rex autem et omnis pópulus immolábant víctimas coram Dómino.
          5 Mactávit ígitur rex Sálomon hóstias, boum vigínti duo míllia, aríetum centum vigínti míllia: et dedicávit domum Dei rex et univérsus pópulus.
      en2:
      - type: text
        text: From the Second Book of Chronicles
      - type: citation
        text: 2 Chr 7:1-5
      - type: text
        text: |-
          1 And when Solomon had completed pouring out his prayers, fire descended from heaven, and it devoured the holocausts and the victims. And the majesty of the Lord filled the house.
          2 Neither were the priests able to enter into the temple of the Lord, because the majesty of the Lord had filled the temple of the Lord.
          3 Moreover, all the sons of Israel saw the fire descending, and the glory of the Lord upon the house. And falling prone upon the ground, on the layer of pavement stones, they adored and praised the Lord: 'For he is good. For his mercy is everlasting.'
          4 Then the king and all the people were immolating victims before the Lord.
          5 And so, king Solomon slaughtered victims: twenty-two thousand oxen, and one hundred twenty thousand rams. And the king and the entire people dedicated the house of God.
  reading.de-par-bolis-salom-nis-5f689711a2:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the book of Proverbs
      - type: citation
        text: Prov 8:12-17
      - type: text
        text: |-
          12 I wisdom dwell in counsel, and am present in learned thoughts.
          13 The fear of the Lord hateth evil: I hate arrogance, and pride, and every wicked way, and a mouth with a double tongue.
          14 Counsel and equity is mine, prudence is mine, strength is mine.
          15 By me kings reign, and lawgivers decree just things,
          16 By me princes rule, and the mighty decree justice.
          17 I love them that love me: and they that in the morning early watch for me, shall find me.
      la:
      - type: text
        text: De Parábolis Salomónis
      - type: citation
        text: Prov 8:12-17
      - type: text
        text: |-
          12 Ego sapiéntia hábito in consílio et erudítis intérsum cogitatiónibus.
          13 Timor Dómini odit malum: arrogántiam, et supérbiam, et viam pravam, et os bilíngue detéstor.
          14 Meum est consílium et ǽquitas, mea est prudéntia, mea est fortitúdo.
          15 Per me reges regnant, et legum conditóres iusta decérnunt;
          16 per me príncipes ímperant, et poténtes decérnunt iustítiam.
          17 Ego diligéntes me díligo; et qui mane vígilant ad me, invénient me.
      en2:
      - type: text
        text: From the Proverbs of Solomon
      - type: citation
        text: Prov 8:12-17
      - type: text
        text: |-
          12 I, wisdom, dwell in counsel, and I am inside learned thoughts.
          13 The fear of the Lord hates evil. I detest arrogance, and pride, and every wicked way, and a mouth with a double tongue.
          14 Counsel is mine, and equity. Prudence is mine. Strength is mine.
          15 Through me, kings reign and legislators decree just conditions.
          16 Through me, princes rule and the powerful decree justice.
          17 I love those who love me. And those who stand watch for me until morning shall discover me.
  reading.de-par-bolis-salom-nis-c5fbb67c9c:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the book of Proverbs
      - type: citation
        text: Prov 31:10-17
      - type: text
        text: |-
          10 Who shall find a valiant woman? Far and from the uttermost coasts is the price of her.
          11 The heart of her husband trusteth in her, and he shall have no need of spoils.
          12 She will render him good, and not evil, all the days of her life.
          13 She hath sought wool and flax, and hath wrought by the counsel of her hands.
          14 She is like the merchant's ship, she bringeth her bread from afar.
          15 And she hath risen in the night, and given a prey to her household, and victuals to her maidens.
          16 She hath considered a field, and bought it: with the fruit of her hands she hath planted a vineyard.
          17 She hath girded her loins with strength, and hath strengthened her arm
      la:
      - type: text
        text: De Parábolis Salomónis
      - type: citation
        text: Prov 31:10-17
      - type: text
        text: |-
          10 Mulíerem fortem quis invéniet? procul et de últimis fínibus prétium eius.
          11 Confídit in ea cor viri sui, et spóliis non indigébit.
          12 Reddet ei bonum, et non malum, ómnibus diébus vitæ suæ.
          13 Quæsívit lanam et linum, et operáta est consília mánuum suárum.
          14 Facta est quasi navis institóris, de longe portans panem suum.
          15 Et de nocte surréxit, dedítque prædam domésticis suis, et cibária ancíllis suis.
          16 Considerávit agrum, et emit eum; de fructu mánuum suárum plantávit víneam.
          17 Accínxit fortitúdine lumbos suos, et roborávit bráchium suum.
      en2:
      - type: text
        text: From the Proverbs of Solomon
      - type: citation
        text: Prov 31:10-17
      - type: text
        text: |-
          10 Who shall find a strong woman? Far away, and from the furthest parts, is her price.
          11 The heart of her husband confides in her, and he will not be deprived of spoils.
          12 She will repay him with good, and not evil, all the days of her life.
          13 She has sought wool and flax, and she has worked these by the counsel of her hands.
          14 She has become like a merchant's ship, bringing her bread from far away.
          15 And she has risen in the night, and given a prey to her household, and provisions to her maids.
          16 She has considered a field and bought it. From the fruit of her own hands, she has planted a vineyard.
          17 She has wrapped her waist with fortitude, and she has strengthened her arm.
  reading.dum-ergo-h-ades-cum-pl-viis-v-niunt-ad-c-li-sp-t-bf5aa81dcb:
    role: reading
    content:
      en:
      - type: text
        text: In this verily do I most chiefly rejoice, for the happiness of that holy servant of God, in that, being taken away hence, and having found here no abiding city, he is become a citizen of that other city, which is the city of the living God from the Church here he is gone, but hie is come unto the Church of the first-born, which are written in heaven, (Heb. xii. 22, 23); he keepeth holiday with us no more, but he is passed to where he holdeth high festival with Angels. And what be that city, and that Church, and that festival above, Paul biddeth us know, saying Ye are come unto the city of the living God, the heavenly Jerusalem, and unto the Church of the first-born which are written in heaven, and to an innumerable company of Angels.
      la:
      - type: text
        text: 'Dum ergo Hýades cum plúviis véniunt, ad cæli spátia altióra sol dúcitur: quia, apparénte Doctórum sciéntia, dum mens nostra imbre prædicatiónis infúnditur, fídei calor augétur. Et perfúsa terra ad fructum próficit, cum lumen ætheris ignéscit: quia ubérius frugem boni óperis réddimus, dum per sacræ eruditiónis flammam in corde clárius ardémus. Dumque per eos diébus síngulis magis magísque sciéntia cæléstis osténditur, quasi intérni nobis lúminis vernum tempus aperítur; ut novus sol nostris méntibus rútilet, et, eórum verbis nobis cógnitus, seípso quotídie clárior micet. Urgénte étenim mundi fine, supérna sciéntia próficit, et lárgius cum témpore excréscit.'
      en2:
      - type: text
        text: 'When, therefore, the Hyades come with their rains, the sun is drawn to the higher regions of the sky: for when the knowledge of the Doctors shines forth, and our minds are watered by the shower of preaching, the warmth of faith is increased. And the earth, when drenched, advances to fruit as the light of the heavens blazes: because we bring forth more abundantly the harvest of good works, the more brightly we burn in the heart through the flame of sacred learning. And as through them day by day heavenly knowledge is more and more revealed to us, a springtime of interior light is opened for us, so that the new sun may shine upon our minds, and, being made known to us through their words, may sparkle more clearly each day. For as the end of the world presses on, heavenly wisdom advances, and grows more abundantly with time.'
  reading.dum-ergo-h-ades-cum-pl-viis-v-niunt-ad-c-li-sp-t-d4e894bd5f:
    role: reading
    content:
      en:
      - type: text
        text: It is very meet and right that upon this day, which is made a joyful day for us because it is the day whereon our blessed Father N., passed away to heaven, I say it is very meet and right that on this day we should sing that verse of the Psalms “The righteous shall be in everlasting remembrance.” (cxi. 7.) His memory is rightly honoured among men who is at this present making glad among Angels. The word of God saith “Judge none blessed before his death,” (Ecclus. xi. 30,) as though it were said, “Judge him blessed when life is ended, praise him when he is made perfect.” For there are two main reasons why it is better to praise a dead man than a living, since, if thou call him holy and worthy after his death, thou dost it when neither canst thou be corrupted by being a flatterer, nor he by being nattered.
      la:
      - type: text
        text: 'Dum ergo Hýades cum plúviis véniunt, ad cæli spátia altióra sol dúcitur: quia, apparénte Doctórum sciéntia, dum mens nostra imbre prædicatiónis infúnditur, fídei calor augétur. Et perfúsa terra ad fructum próficit, cum lumen ætheris ignéscit: quia ubérius frugem boni óperis réddimus, dum per sacræ eruditiónis flammam in corde clárius ardémus. Dumque per eos diébus síngulis magis magísque sciéntia cæléstis osténditur, quasi intérni nobis lúminis vernum tempus aperítur; ut novus sol nostris méntibus rútilet, et, eórum verbis nobis cógnitus, seípso quotídie clárior micet. Urgénte étenim mundi fine, supérna sciéntia próficit, et lárgius cum témpore excréscit.'
      en2:
      - type: text
        text: 'When, therefore, the Hyades come with their rains, the sun is drawn to the higher regions of the sky: for when the knowledge of the Doctors shines forth, and our minds are watered by the shower of preaching, the warmth of faith is increased. And the earth, when drenched, advances to fruit as the light of the heavens blazes: because we bring forth more abundantly the harvest of good works, the more brightly we burn in the heart through the flame of sacred learning. And as through them day by day heavenly knowledge is more and more revealed to us, a springtime of interior light is opened for us, so that the new sun may shine upon our minds, and, being made known to us through their words, may sparkle more clearly each day. For as the end of the world presses on, heavenly wisdom advances, and grows more abundantly with time.'
  reading.duo-autem-sunt-g-nera-persecut-rum-unum-palam-s-d7790cbbfd:
    role: reading
    content:
      la:
      - type: text
        text: |-
          Duo autem sunt génera persecutórum: unum palam sæviéntium, álterum ficte fraudulentérque blandiéntium. Contra utrúmque nos muníre atque institúere volens Salvátor, et supra ab hypócrisi pharisæórum atténdere, et hic a carníficum cæde prǽcipit non timére; quia vidélicet, post mortem nec horum crudélitas nec illórum váleat simulátio duráre. Nonne quinque pásseres véneunt dipóndio? Si minutíssima, inquit, animália, et quæ quólibet per aëra ferúntur volatília, Deus oblivísci non potest; vos, qui ad imáginem facti estis Creatóris, non debétis terréri ab his qui occídunt corpus; quia, qui irrationabília animália gubérnat, rationabília curáre non désinit.
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
          Tibi Chérubim et Séraphim * incessábili voce proclámant:
          (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
          Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
          Te gloriósus * Apostolórum chorus,
          Te Prophetárum * laudábilis númerus,
          Te Mártyrum candidátus * laudat exércitus.
          Te per orbem terrárum * sancta confitétur Ecclésia,
          Patrem * imménsæ maiestátis;
          Venerándum tuum verum * et únicum Fílium;
          Sanctum quoque * Paráclitum Spíritum.
          Tu Rex glóriæ, * Christe.
          Tu Patris * sempitérnus es Fílius.
          (Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
          Tu ad déxteram Dei sedes, * in glória Patris.
          Iudex créderis * esse ventúrus.
