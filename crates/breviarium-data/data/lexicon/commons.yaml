  responsory.f-li-ier-salem-ven-te-et-vid-te-m-rtyres-cum-cor-8c5d4c8d6a:
    role: responsory
    content:
      en:
      - type: response
        text: Come forth, O ye daughters of Jerusalem, and behold the Martyrs with the crowns wherewith the Lord crowned them;
      - type: text
        text: In the day of His feasting, and of His gladness. Alleluia.
      - type: versicle
        text: For He hath strengthened the bars of thy gates He hath blessed thy children within thee.
      - type: response
        text: In the day of His feasting, and of His gladness. Alleluia.
      - type: versicle
