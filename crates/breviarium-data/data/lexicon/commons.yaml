        - number: '98'
  reading.1-cor-4-10-15-f0dd340869:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 4:10-15
      - type: text
        text: 10 We are fools for Christ's sake, but you are wise in Christ; we are weak, but you are strong; you are honourable, but we without honour.
      - type: text
        text: 11 Even unto this hour we both hunger and thirst, and are naked, and are buffeted, and have no fixed abode;
      - type: citation
        text: '12 And we labour, working with our own hands: we are reviled, and we bless; we are persecuted, and we suffer it.'
      - type: text
        text: 13 We are blasphemed, and we entreat; we are made as the refuse of this world, the offscouring of all even until now.
      - type: text
        text: 14 I write not these things to confound you; but I admonish you as my dearest children.
      - type: text
        text: 15 For if you have ten thousand instructors in Christ, yet not many fathers. For in Christ Jesus, by the gospel, I have begotten you.
      la:
      - type: citation
        text: 1 Cor 4:10-15
      - type: citation
        text: '10 Nos stulti propter Christum, vos autem prudéntes in Christo: nos infírmi, vos autem fortes: vos nóbiles, nos autem ignóbiles.'
      - type: text
        text: 11 Usque in hanc horam et esurímus, et sitímus, et nudi sumus, et cólaphis cǽdimur, et instábiles sumus,
      - type: citation
        text: '12 et laborámus operántes mánibus nostris: maledícimur, et benedícimus: persecutiónem pátimur, et sustinémus:'
      - type: citation
        text: '13 blasphemámur, et obsecrámus: tamquam purgaménta huius mundi facti sumus, ómnium peripséma usque adhuc.'
      - type: text
        text: 14 Non ut confúndam vos, hæc scribo, sed ut fílios meos caríssimos móneo.
      - type: text
        text: 15 Nam si decem míllia pædagogórum habeátis in Christo, sed non multos patres, nam in Christo Iesu per Evangélium ego vos génui.
  reading.1-cor-4-6-9-16d471ad4f:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 4:6-9
      - type: text
        text: 6 But these things, brethren, I have in a figure transferred to myself and to Apollo, for your sakes; that in us you may learn, that one be not puffed up against the other for another, above that which is written.
      - type: text
        text: 7 For who distinguisheth thee? Or what hast thou that thou hast not received? And if thou hast received, why dost thou glory, as if thou hadst not received it?
      - type: text
        text: 8 You are now full; you are now become rich; you reign without us; and I would to God you did reign, that we also might reign with you.
      - type: citation
        text: '9 For I think that God hath set forth us apostles, the last, as it were men appointed to death: we are made a spectacle to the world, and to angels, and to men.'
      la:
      - type: citation
        text: 1 Cor 4:6-9
      - type: citation
        text: '6 Hæc autem, fratres, transfigurávi in me et Apóllo, propter vos: ut in nobis discátis, ne supra quam scriptum est, unus advérsus álterum inflétur pro álio.'
      - type: text
        text: 7 Quis enim te discérnit? Quid autem habes quod non accepísti? Si autem accepísti, quid gloriáris quasi non accéperis?
      - type: citation
        text: '8 Iam saturáti estis, iam dívites facti estis: sine nobis regnátis: et útinam regnétis, ut et nos vobíscum regnémus.'
      - type: citation
        text: '9 Puto enim quod Deus nos Apóstolos novíssimos osténdit, tamquam morti destinátos: quia spectáculum facti sumus mundo, et Ángelis, et homínibus.'
  reading.1-cor-7-32-35-2b255c1098:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 7:32-35
      - type: text
        text: 32 But I would have you to be without solicitude. He that is without a wife, is solicitous for the things that belong to the Lord, how he may please God.
      - type: citation
        text: '33 But he that is with a wife, is solicitous for the things of the world, how he may please his wife: and he is divided.'
      - type: text
        text: 34 And the unmarried woman and the virgin thinketh on the things of the Lord, that she may be holy both in body and in spirit. But she that is married thinketh on the things of the world, how she may please her husband.
      - type: citation
        text: '35 And this I speak for your profit: not to cast a snare upon you; but for that which is decent, and which may give you power to attend upon the Lord, without impediment.'
      la:
      - type: citation
        text: 1 Cor 7:32-35
      - type: text
        text: 32 Volo autem vos sine sollicitúdine esse. Qui sine uxóre est, sollícitus est quæ Dómini sunt, quómodo pláceat Deo.
      - type: text
        text: 33 Qui autem cum uxóre est, sollícitus est quæ sunt mundi, quómodo pláceat uxóri; et divísus est.
      - type: text
        text: 34 Et múlier innúpta et virgo cógitat quæ Dómini sunt, ut sit sancta córpore et spíritu. Quæ autem nupta est, cógitat quæ sunt mundi, quómodo pláceat viro.
      - type: text
        text: 35 Porro hoc ad utilitátem vestram dico, non ut láqueum vobis iníciam, sed ad id, quod honéstum est, et quod facultátem prǽbeat sine impediménto Dóminum obsecrándi.
  reading.1-cor-7-36-40-8c3629fb1a:
    role: reading
    content:
      en:
      - type: citation
        text: 1 Cor 7:36-40
      - type: citation
        text: '36 But if any man think that he seemeth dishonoured, with regard to his virgin, for that she is above the age, and it must so be: let him do what he will; he sinneth not, if she marry.'
      - type: text
        text: 37 For he that hath determined being steadfast in his heart, having no necessity, but having power of his own will; and hath judged this in his heart, to keep his virgin, doth well.
      - type: text
        text: 38 Therefore, both he that giveth his virgin in marriage, doth well; and he that giveth her not, doth better.
      - type: citation
        text: '39 A woman is bound by the law as long as her husband liveth; but if her husband die, she is at liberty: let her marry to whom she will; only in the Lord.'
      - type: text
        text: 40 But more blessed shall she be, if she so remain, according to my counsel; and I think that I also have the spirit of God.
      la:
      - type: citation
        text: 1 Cor 7:36-40
      - type: citation
        text: '36 Si quis autem turpem se vidéri exístimat super vírgine sua, quod sit superadúlta, et ita opórtet fíeri; quod vult fáciat: non peccat, si nubat.'
      - type: text
        text: 37 Nam, qui státuit in corde suo firmus, non habens necessitátem, potestátem autem habens suæ voluntátis, et hoc iudicávit in corde suo, serváre vírginem suam, bene facit.
      - type: text
        text: 38 Ígitur et qui matrimónio iungit vírginem suam, bene facit; et qui non iungit, mélius facit.
      - type: text
        text: 39 Múlier alligáta est legi quanto témpore, vir eius vivit. Quod, si dormíerit vir eius, liberáta est; cui vult nubat, tantum in Dómino.
      - type: text
        text: 40 Beátior autem erit, si sic permánserit, secúndum meum consílium; puto autem quod et ego Spíritum Dei hábeam.
  reading.2-chr-7-11-16-95f1b67732:
    role: reading
    content:
      en:
      - type: citation
        text: 2 Chr 7:11-16
      - type: text
        text: 11 And Solomon finished the house of the Lord, and the king's house, and all that he had designed in his heart to do, in the house of the Lord, and in his own house, and he prospered.
      - type: citation
        text: '12 And the Lord appeared to him by night, and said: I have heard thy prayer, and I have chosen this place to myself for a house of sacrifice.'
      - type: citation
        text: '13 If I shut up heaven, and there fall no rain, or if I give orders, and command the locust to devour the land, or if I send pestilence among my people:'
      - type: citation
        text: '14 And my people, upon whom my name is called, being converted, shall make supplication to me, and seek out my face, and do penance for their most wicked ways: then will I hear from heaven, and will forgive their sins and will heal their land.'
      - type: text
        text: 15 My eyes also shall be open, and my ears attentive to the prayer of him that shall pray in this place.
      - type: text
        text: 16 For I have chosen, and have sanctified this place, that my name may be there for ever, and my eyes and my heart may remain there perpetually.
      la:
      - type: citation
        text: 2 Chr 7:11-16
      - type: text
        text: 11 Complevítque Sálomon domum Dómini, et domum regis, et ómnia quæ disposúerat in corde suo, ut fáceret in domo Dómini et in domo sua, et prosperátus est.
      - type: citation
        text: '12 Appáruit autem ei Dóminus nocte, et ait: Audívi oratiónem tuam, et elégi locum istum mihi in domum sacrifícii.'
      - type: citation
        text: '13 Si cláusero cælum, et plúvia non flúxerit, et mandávero et præcépero locústæ, ut dévoret terram, et mísero pestiléntiam in pópulum meum:'
      - type: citation
        text: '14 convérsus autem pópulus meus, super quos invocátum est nomen meum, deprecátus me fúerit, et exquisíerit fáciem meam, et égerit pœniténtiam a viis suis pessimis: et ego exáudiam de cælo, et propítius ero peccátis eórum, et sanábo terram eórum.'
      - type: text
        text: 15 Oculi quoque mei erunt apérti, et aures meæ eréctæ ad oratiónem eius qui in loco isto oráverit.
      - type: text
        text: 16 Elégi enim et sanctificávi locum istum, ut sit nomen meum ibi in sempitérnum, et permáneant óculi mei et cor meum ibi cunctis diébus.
  reading.2-chr-7-6-9-07b811f1bd:
    role: reading
    content:
      en:
      - type: citation
        text: 2 Chr 7:6-9
      - type: citation
        text: '6 And the priests stood in their offices: and the Levites with the instruments of music of the Lord, which king David made to praise the Lord: because his mercy endureth for ever, singing the hymns of David by their ministry: and the priests sounded with trumpets before them, and all Israel stood.'
      - type: citation
        text: '7 Solomon also sanctified the middle of the court before the temple of the Lord: for he offered there the holocausts, and the fat of the peace offerings: because the brazen altar, which he had made, could not hold the holocausts and the sacrifices and the fat:'
      - type: text
        text: 8 And Solomon kept the solemnity at that time seven days, and all Israel with him, a very great congregation, from the entrance of Emath to the torrent of Egypt.
      - type: text
        text: 9 And he made on the eighth day a solemn assembly, because he had kept the dedication of the altar seven days, and had celebrated the solemnity seven days.
      la:
      - type: citation
        text: 2 Chr 7:6-9
      - type: citation
        text: '6 Sacerdótes autem stabant in offíciis suis, et Levítæ in organis cárminum Dómini, quæ fecit David rex ad laudándum Dóminum: Quóniam in ætérnum misericórdia eius; hymnos David canéntes per manus suas: porro sacerdótes canébant tubis ante eos, cunctúsque Israël stabat.'
      - type: citation
        text: '7 Sanctificávit quoque Sálomon médium átrii ante templum Dómini: obtúlerat enim ibi holocáusta, et ádipes pacificórum: quia altáre ǽneum, quod fécerat, non póterat sustinére holocáusta et sacrifícia et ádipes.'
      - type: text
        text: 8 Fecit ergo Sálomon solemnitátem in témpore illo septem diébus, et omnis Israël cum eo, ecclésia magna valde ab intróitu Emath usque ad Torréntem Ægýpti.
      - type: text
        text: 9 Fecítque die octávo colléctam, eo quod dedicásset altáre septem diébus, et solemnitátem celebrásset diébus septem.
  reading.acts-20-25-31-19f0a0026c:
    role: reading
    content:
      la:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: 25 Et nunc ecce ego scio quia ámplius non vidébitis fáciem meam vos omnes, per quos transívi prǽdicans regnum Dei.
      - type: text
        text: 26 Quaprópter contéstor vos hodiérna die, quia mundus sum a sánguine ómnium.
      - type: text
        text: 27 Non enim subterfúgi, quóminus annuntiárem omne consílium Dei vobis.
      - type: text
        text: 28 Atténdite vobis, et univérso gregi, in quo vos Spíritus Sanctus pósuit epíscopos régere Ecclésiam Dei, quam acquisívit sánguine suo.
      - type: text
        text: 29 Ego scio quóniam intrábunt post discessiónem meam lupi rapáces in vos, non parcéntes gregi.
      - type: text
        text: 30 Et ex vobis ipsis exsúrgent viri loquéntes pervérsa, ut abdúcant discípulos post se.
      - type: text
        text: 31 Propter quod vigiláte, memória retinéntes quóniam per triénnium nocte et die non cessávi, cum lácrimis monens unumquémque vestrum.
  reading.acts-20-25-31-e1bf516db8:
    role: reading
    content:
      en:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: 25 And now behold, I know that all you, among whom I have gone preaching the kingdom of God, shall see my face no more.
      - type: text
        text: 26 Wherefore I take you to witness this day, that I am clear from the blood of all men;
      - type: text
        text: 27 For I have not spared to declare unto you all the counsel of God.
      - type: text
        text: 28 Take heed to yourselves, and to the whole flock, wherein the Holy Ghost hath placed you bishops, to rule the church of God, which he hath purchased with his own blood.
      - type: text
        text: 29 I know that, after my departure, ravening wolves will enter in among you, not sparing the flock.
      - type: text
        text: 30 And of your own selves shall arise men speaking perverse things, to draw away disciples after them.
      - type: text
        text: 31 Therefore watch, keeping in memory, that for three years I ceased not, with tears to admonish every one of you night and day.
      la:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: 25 Et nunc ecce ego scio quia ámplius non vidébitis fáciem meam vos omnes, per quos transívi prǽdicans regnum Dei.
