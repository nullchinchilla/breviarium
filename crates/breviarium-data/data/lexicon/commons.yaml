      en2:
      - type: citation
        text: Act 5:41
      - type: text
        text: And indeed, they went forth from the presence of the council, rejoicing that they were considered worthy to suffer insult on behalf of the name of Jesus.
      - type: response
        text: Thanks be to God.
  chapter.apo-21-2-a946d4f046:
    role: chapter
    content:
      en:
      - type: citation
        text: Rev 21:2
      - type: text
        text: I saw the holy city, New Jerusalem, coming down from God out of heaven, prepared as a Bride adorned for her husband.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Apo 21:2
      - type: text
        text: Vidi civitátem sanctam, Ierúsalem novam, descendéntem de cælo a Deo, parátam sicut sponsam ornátam viro suo.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Apo 21:2
      - type: text
        text: And I, John, saw the Holy City, the New Jerusalem, descending out of heaven from God, prepared like a bride adorned for her husband.
      - type: response
        text: Thanks be to God.
  chapter.apo-21-3-ebab45a4ff:
    role: chapter
    content:
      en:
      - type: citation
        text: Rev 21:3
      - type: text
        text: And I heard a great voice out of the throne, saying Behold, the tabernacle of God is with men, and He will dwell with them. And they shall be His people; and God Himself shall be with them, and be their God.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Apo 21:3
      - type: text
        text: 'Et audívi vocem magnam de throno dicéntem: Ecce tabernáculum Dei cum homínibus, et habitábit cum eis; et ipsi pópulus eius erunt, et ipse Deus cum eis erit eórum Deus.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Apo 21:3
      - type: text
        text: 'And I heard a great voice from the throne, saying: Behold the tabernacle of God with men. And he will dwell with them, and they will be his people. And God himself will be their God with them.'
      - type: response
        text: Thanks be to God.
  chapter.apo-21-4-5-8e68886248:
    role: chapter
    content:
      la:
      - type: citation
        text: Apo 21:4-5
      - type: text
        text: 'Et abstérget Deus omnem lácrimam ab óculis eórum: et mors ultra non erit, neque luctus, neque clamor, neque dolor erit ultra, quia prima abiérunt. Et dixit qui sedébat in throno: Ecce nova fácio ómnia.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Apo 21:4-5
      - type: text
        text: 'And God will wipe away every tear from their eyes. And death shall be no more. And neither mourning, nor crying out, nor grief shall be anymore. For the first things have passed away. And the One who was sitting upon the throne said: Behold, I make all things new.'
      - type: response
        text: Thanks be to God.
  chapter.cant-6-8-53583dfb7a:
