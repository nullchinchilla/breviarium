  reading.coron-ta-taque-est-be-ti-m-rtyris-pati-ntia-manc-45f0827b94:
    role: reading
    content:
      la:
      - type: text
        text: 'Coronáta ítaque est beáti Mártyris patiéntia: mancipáta est ætérnis cruciátibus tortóris incorrécta malítia. Hoc atténdens in agóne suo gloriósus Christi Athléta, non exhórruit cárcerem. Ad imitatiónem cápitis sui tolerávit probra, sustínuit irrisiónes, flagélla non tímuit: et quot ante mortem pro Christo pértulit supplícia, tot ei de se óbtulit sacrifícia. Quod enim propinánte Apóstolo bíberat, alte retinébat: Quia non sunt condígnæ passiónes huius témporis ad futúram glóriam, quæ revelábitur in nobis. Et quia momentáneum hoc et leve nostræ tribulatiónis, ætérnum glóriæ pondus operátur in cælis. Huius promissiónis amóre a terrénis suspénsus, et prægustáta supérnæ suavitátis dulcédine ineffabíliter afféctus, dicébat cum Psalmísta: Quid mihi est in cælo, et a te quid volui super terram? Defécit caro mea et cor meum: Deus cordis mei, et pars mea Deus in ætérnum.'
      en2:
      - type: text
        text: 'And so the patience of the blessed Martyr was crowned; the unrepentant malice of the torturer was delivered over to eternal torments. Mindful of this in his agony, the glorious Athlete of Christ did not shrink from prison. After the example of his Head, he endured reproaches, bore mockeries, feared not the scourges: and as many punishments as he suffered for Christ before death, so many sacrifices of himself did he offer. For what the Apostle had given him to drink, he held deeply within: that the sufferings of this present time are not worthy to be compared with the future glory which shall be revealed in us. And because this momentary and light tribulation works for us an eternal weight of glory in the heavens. Suspended from earthly things by love of this promise, and ineffably moved by the foretaste of heavenly sweetness, he said with the Psalmist: What have I in heaven, and what have I desired of you upon earth? My flesh and my heart have fainted: O God of my heart, and God is my portion for ever.'
  reading.coron-ta-taque-est-be-ti-m-rtyris-pati-ntia-manc-560119cfb1:
    role: reading
    content:
      en:
      - type: text
        text: 'So the patience of the blessed Martyr was crowned, and the unchastened spite of the tormentor is given over to everlasting torture. Christ''s glorious champion looked for this during his battle, and shrank not from prison. Like his Head, he bore reproach, underwent mocking, and feared not for scourges and as many sufferings as for Christ''s sake he bore before he died, so many offerings did he make unto Him of himself. He had drunk in the Apostles'' word and kept it deep in I him: “The sufferings of this present time are not worthy to be compared with the glory which shall be revealed in us,” (Rom. viii. 18.) “for our light affliction which is but for a moment, worketh for us a far more exceeding and eternal weight of glory.” (2 Cor. iv. 17.) Being lifted up above earthly things by the love of this promise, andj tasting beforehand the sweetness of the heavenly peace, he was unspeakably moved, and said with the Psalmist “What have I in heaven, and what is there upon earth that desire beside thee My flesh and my heart faileth Thou art the God of my heart, and God is my portion for ever.” (lxxii. 26.)'
