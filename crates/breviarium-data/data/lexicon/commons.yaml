    content:
      la:
      - type: citation
        text: Cant 6:8
      - type: text
        text: Vidérunt eam fíliæ Sion, et beatíssimam prædicavérunt et regínæ laudavérunt eam.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Cant 6:8
      - type: text
        text: One is my dove, my perfect one. One is her mother; elect is she who bore her. The daughters saw her, and they proclaimed her most blessed. The queens and concubines saw her, and they praised her.
      - type: response
        text: Thanks be to God.
