  reading.qu-tuor-ergo-f-cies-uni-sunt-quia-si-requ-ras-qu-1f7b4dcdb6:
    role: reading
    content:
      en:
      - type: text
        text: “Verily one had four faces.” Four faces, that is, and one body. If thou seek to know what Matthew teacheth concerning the Incarnation of the Lord, he teacheth no other doctrine than teacheth Mark, or Luke, or John. If thou seek to know what John teacheth, it is beyond all doubt that his doctrine is the doctrine of Matthew, and Mark, and Luke. If thou ask concerning Mark, he hath that which hath Matthew, and John, and Luke. If thou wilt know of Luke, know that he teacheth as doth Matthew, and Mark, and John. Therefore every one hath four faces, for God knoweth and seeth in them but one faith, which thou mayest see in each and in all.
      la:
      - type: text
        text: 'Quátuor ergo fácies uni sunt: quia si requíras quid Matthǽus de incarnatióne Dómini séntiat: hoc nimírum sentit, quod Marcus, Lucas, et Ioánnes. Si quæras quid Ioánnes séntiat; hoc procul dúbio, quod Lucas, Marcus, et Matthǽus. Si quæras quid Marcus; hoc quod Matthǽus, Ioánnes, et Lucas. Si quæras quid Lucas; hoc quod Ioánnes, Matthǽus, et Marcus sentit. Quátuor ergo fácies uni sunt: quia notítia fídei, qua cognoscúntur a Deo, ipsa est in uno, quæ est simul in quátuor. Quidquid enim in uno invéneris, hoc in ómnibus simul quátuor cognósces.'
  reading.qu-tuor-ergo-f-cies-uni-sunt-quia-si-requ-ras-qu-797985b577:
    role: reading
    content:
      en:
      - type: citation
        text: 'So much power then as have preachers, so much ornament have the heavens. Wherefore again it is written By the word of the Lord were the heavens made. ~(Ps. xxxii. 6.) For the Word of the Lord is the Son of the Father. But, to the end that all the Holy Trinity may be made manifest as the Maker of the heavens, that is, of the Apostles, it is straightway added touching God the Holy Ghost: you and all the host of them by the Breath of His mouth. Therefore the might of the same heavens is the might of the Spirit, for they had not braved the powers of this world, unless the strength of the Holy Ghost had comforted them. For we know what manner of men the Teachers of the Holy Church were before the coming of this Spirit and since He came we see in Whose strength they are made strong.'
      la:
      - type: text
        text: 'Quátuor ergo fácies uni sunt: quia si requíras quid Matthǽus de incarnatióne Dómini séntiat: hoc nimírum sentit, quod Marcus, Lucas, et Ioánnes. Si quæras quid Ioánnes séntiat; hoc procul dúbio, quod Lucas, Marcus, et Matthǽus. Si quæras quid Marcus; hoc quod Matthǽus, Ioánnes, et Lucas. Si quæras quid Lucas; hoc quod Ioánnes, Matthǽus, et Marcus sentit. Quátuor ergo fácies uni sunt: quia notítia fídei, qua cognoscúntur a Deo, ipsa est in uno, quæ est simul in quátuor. Quidquid enim in uno invéneris, hoc in ómnibus simul quátuor cognósces.'
  reading.qua-in-re-hoc-quoque-not-ndum-est-quod-inv-ntus-f88f554cf7:
    role: reading
    content:
      en:
      - type: text
        text: 'And herein we must remark that the treasure, when once it hath been found, is hidden to keep it safe. He whose intimate yearnings after God are not hidden from the praise of men, is open thereby to the attacks of evil spirits. In this life we are, as it were, journeying homewards on a road beset by evil spirits who are like highwaymen. He therefore inviteth robbery who carrieth his treasure ostentatiously. Doubtless our neighbour should be able to see our good works, as it is written: “Let your light so shine before men that they may see your good works, and glorify your Father which is in heaven.” But this is not to be understood to mean that we are to seek the praise of men by what we do. Rather, let us in such wise work in the open that the inner intention of devotion is not advertised. So we shall give an example to our neighbour, and yet keep hidden, except from the sight of God, our purpose of pleasing him.'
      la:
      - type: text
        text: 'Qua in re hoc quoque notándum est, quod invéntus thesáurus abscónditur, ut servétur: quia stúdium cæléstis desidérii a malígnis spirítibus custodíre non súfficit, qui hoc ab humánis láudibus non abscóndit. In præsénti étenim vita, quasi in via sumus, qua ad pátriam pérgimus. Malígni autem spíritus iter nostrum quasi quidam latrúnculi óbsident. Deprædári ergo desíderat, qui thesáurum públice portat in via. Hoc autem dico, non ut próximi ópera nostra bona non vídeant, cum scriptum sit: Vídeant ópera vestra bona, et gloríficent Patrem vestrum qui in cælis est; sed, ut per hoc quod ágimus, laudes extérius non quærámus. Sic autem sit opus in público, quátenus inténtio máneat in occúlto; ut, et de bono ópere próximis præbeámus exémplum, et tamen per intentiónem, qua Deo soli placére quǽrimus, semper optémus secrétum.'
  reading.quam-ob-rem-maxim-pere-gratulor-huius-sancti-fel-897e15ff4d:
    role: reading
    content:
      la:
      - type: text
        text: 'Quam ob rem maximópere gratulor huius Sancti felicitáti, quod quamquam translátus est, atque hanc, quæ apud nos est, civitátem relíquit, tamen in álteram adscríptus est civitátem, nempe Dei. Et digréssus ab hac Ecclésia, ad illam pervénit, quæ est primogenitorum descriptorum in cælis: ac relíctis hisce festis, tránsiit ad celebritatem Angelórum. Étenim quod et cívitas sursum sit, et Ecclésia, et celebritas, audi Paulum dicéntem: Accessistis ad civitátem Dei viventis, Ierúsalem cæléstem, et Ecclésiam primitivorum, qui conscripti sunt in cælis, et ad multórum millium Angelórum frequentiam.'
  reading.quam-ob-rem-maxim-pere-gratulor-huius-sancti-fel-c14a1eb41c:
    role: reading
    content:
      en:
      - type: text
        text: In this verily do I most chiefly rejoice, for the happiness of that holy servant of God, in that, being taken away hence, and having found here no abiding city, he is become a citizen of that other city, which is the city of the living God from the Church here he is gone, but hie is come unto the Church of the first-born, which are written in heaven, (Heb. xii. 22, 23); he keepeth holiday with us no more, but he is passed to where he holdeth high festival with Angels. And what be that city, and that Church, and that festival above, Paul biddeth us know, saying Ye are come unto the city of the living God, the heavenly Jerusalem, and unto the Church of the first-born which are written in heaven, and to an innumerable company of Angels.
      la:
      - type: text
        text: 'Quam ob rem maximópere gratulor huius Sancti felicitáti, quod quamquam translátus est, atque hanc, quæ apud nos est, civitátem relíquit, tamen in álteram adscríptus est civitátem, nempe Dei. Et digréssus ab hac Ecclésia, ad illam pervénit, quæ est primogenitorum descriptorum in cælis: ac relíctis hisce festis, tránsiit ad celebritatem Angelórum. Étenim quod et cívitas sursum sit, et Ecclésia, et celebritas, audi Paulum dicéntem: Accessistis ad civitátem Dei viventis, Ierúsalem cæléstem, et Ecclésiam primitivorum, qui conscripti sunt in cælis, et ad multórum millium Angelórum frequentiam.'
  reading.quid-ergo-est-ego-sum-vitis-vera-numquid-ut-dder-1d171d62d8:
    role: reading
    content:
      en:
      - type: citation
        text: 'Why saith He: I am the true vine? As touching this word true, hath He not here regard to that other parable of a vine, the like figure whereto He doth here apply to Himself? (Jer. ii. 21.) Here is He called a vine, not plainly, but in parable, as also He is called elsewhere a sheep, (Isa. liii. 7, Acts viii. 32,) a lamb, (John i. 36,) a lion, (Apoc. v. 5,) a rock, (1 Cor. x. 4,) a corner-stone, ~(Eph. ii. 20,) and other things of the like kind. But these things are in themselves that which they seem to be, albeit He is called by their names, not plainly, but in a parable, and herein are they different from that vine, whereof in this place He taketh on Him the name. For when He saith: I am the true vine, doth He not make distinction between Himself, and that which indeed seemed to be a vine, but to which it is said: How art thou turned into the degenerate plant of a strange vine unto Me? (Jer. ii. 21.) For by what title shall that plant be called other than a false vine, whereto they looked that she should bring forth grapes, and she brought forth thorns?'
      la:
      - type: text
        text: 'Quid ergo est, Ego sum vitis vera? Numquid ut ádderet, vera, hoc ad eam vitem rétulit, unde ista similitúdo transláta est? Sic enim dícitur vitis per similitúdinem, non per proprietátem: quemádmodum dícitur ovis, agnus, leo, petra, lapis anguláris, et cétera huiúsmodi, quæ magis ipsa sunt vera, ex quibus ducúntur istæ similitúdines, non proprietátes. Sed cum dicit, Ego sum vitis vera: ab illa se útique discérnit, cui dícitur: Quómodo convérsa es in amaritúdinem vitis aliéna? Nam quo pacto est vitis vera, quæ exspectáta est ut fáceret uvam, fecit autem spinas?'
  reading.quidquid-gitur-in-hac-sancta-plebe-potest-esse-v-7630f53848:
    role: reading
    content:
      en:
      - type: text
        text: Whatsover, therefore, of virtue and grace there may be in this holy people, all the bright streams thereof do flow from him, as from a most clear fountain. By his manly chastity, by his sternly noble temperance, by the graceful courtesy which marked him, he drew all men’s love to God and by his eminent ministry in his Bishopric he hath left behind him in his disciples, many heirs of his priesthood.
      la:
      - type: text
        text: Quidquid ígitur in hac sancta plebe potest esse virtútis et grátiæ, de hoc, quasi quodam fonte lucidíssimo, ómnium rivulórum púritas emanávit. Etenim, quia castitátis pollébat vigóre, quia abstinéntiæ gloriabátur angústiis, quia blandiméntis erat prǽditus lenitátis, ómnium cívium in Deum provocávit afféctum; quia Pontíficis administratióne fulgébat, plures e discípulis relíquit sui sacerdótii successóres.
  reading.quidquid-gitur-in-hac-sancta-plebe-potest-esse-v-fae9030a35:
    role: reading
    content:
      la:
      - type: text
        text: Quidquid ígitur in hac sancta plebe potest esse virtútis et grátiæ, de hoc, quasi quodam fonte lucidíssimo, ómnium rivulórum púritas emanávit. Etenim, quia castitátis pollébat vigóre, quia abstinéntiæ gloriabátur angústiis, quia blandiméntis erat prǽditus lenitátis, ómnium cívium in Deum provocávit afféctum; quia Pontíficis administratióne fulgébat, plures e discípulis relíquit sui sacerdótii successóres.
  reading.quin-mmo-be-ti-qui-udiunt-verbum-dei-et-cust-diu-986716aa87:
    role: reading
    content:
      en:
      - type: text
        text: Yea, rather, blessed are they that hear the Word of God and keep it. How nobly doth the Saviour say “Yea” to the woman's blessing, declaring also that not only is she blessed who was meet to give bodily birth to the Word of God, but that all they who spiritually conceive the same Word by the hearing of faith, and, by keeping it through good works, bring it forth and, as it were, carefully nurse it, in their own hearts, and in the hearts of their neighbours, are also blessed. Yea, and that the very Mother of God herself was blessed in being for a while the handmaid of the Word of God made Flesh, but that she was much more blessed in this, that through her love she keepeth Him for ever.
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
      - type: text
        text: O Lord, have mercy upon us, * have mercy upon us.
      - type: text
        text: O Lord, let thy mercy lighten upon us, * as our trust is in thee.
      - type: text
        text: O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: Quinímmo beáti qui áudiunt verbum Dei et custódiunt. Pulchre Salvátor attestatióni mulíeris ánnuit, non eam tantúmmodo quæ Verbum Dei corporáliter generáre merúerat, sed et omnes qui idem Verbum spiritáliter audítu fídei concípere, et boni óperis custódia vel in suo vel in proximórum corde párere et quasi álere studúerint, asséverans esse beátos; quia, et éadem Dei Génetrix, et inde quidem beáta quia Verbi incarnándi minístra facta est temporális, sed inde multo beátior quia eiúsdem semper amándi custos manébat ætérna.
      - type: text
        text: 'Te Deum laudámus: * te Dóminum confitémur.'
      - type: text
        text: Te ætérnum Patrem * omnis terra venerátur.
      - type: text
        text: 'Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:'
      - type: text
        text: 'Tibi Chérubim et Séraphim * incessábili voce proclámant:'
      - type: text
        text: (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
      - type: text
        text: Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
      - type: text
        text: Te gloriósus * Apostolórum chorus,
      - type: text
        text: Te Prophetárum * laudábilis númerus,
      - type: text
        text: Te Mártyrum candidátus * laudat exércitus.
      - type: text
        text: Te per orbem terrárum * sancta confitétur Ecclésia,
      - type: text
        text: Patrem * imménsæ maiestátis;
      - type: text
        text: Venerándum tuum verum * et únicum Fílium;
      - type: text
        text: Sanctum quoque * Paráclitum Spíritum.
      - type: text
        text: Tu Rex glóriæ, * Christe.
      - type: text
        text: Tu Patris * sempitérnus es Fílius.
      - type: text
        text: '(Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: 'Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
      - type: text
        text: Tu ad déxteram Dei sedes, * in glória Patris.
      - type: text
        text: Iudex créderis * esse ventúrus.
      - type: text
        text: (Sequens versus dicitur flexis genibus) ~
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória numerári.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória munerári.
      - type: text
        text: Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
      - type: text
        text: Et rege eos, * et extólle illos usque in ætérnum.
      - type: text
        text: Per síngulos dies * benedícimus te.
      - type: text
        text: (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Dignáre, Dómine, die isto * sine peccáto nos custodíre.
      - type: text
        text: Miserére nostri, Dómine, * miserére nostri.
      - type: text
        text: Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
      - type: text
        text: 'In te, Dómine, sperávi: * non confúndar in ætérnum.'
  reading.quis-gitur-neget-hanc-vitam-flux-sse-de-c-lo-qua-412e86e157:
    role: reading
    content:
      en:
      - type: text
        text: Who would deny that this is a life which hath come down from heaven, seeing it is a life whereof it is not easy to find an example before God came down to dwell in a Body of clay? Then was it a virgin which conceived Him in her womb, and the Word was made Flesh, that Flesh might be made God. Some will say Concerning Elias also, we find not that he shared in the lusting after a bodily coming-together. Yea and therefore it is that he was carried up in a fiery chariot into heaven therefore is it that he is seen with the Lord amid all the glory of the Transfiguration therefore it is that he is to come as a Forerunner of the Lord's coming again.
      la:
      - type: text
        text: 'Quis ígitur neget hanc vitam fluxísse de cælo, quam non fácile invenímus in terris, nisi postquam Deus in hæc terréni córporis membra descéndit? Tunc in útero Virgo concépit, et Verbum caro factum est, ut caro fíeret Deus. Dicet áliquis: Sed étiam Elías nullíus corpórei cóitus fuísse permíxtus cupiditátibus invenítur. Ideo ergo curru raptus ad cælum; ídeo cum Dómino appáret in glória; ídeo Domínici ventúrus est præcúrsor advéntus.'
  reading.quis-taque-iste-homo-est-qui-p-regre-profic-scit-3363c6d802:
    role: reading
    content:
      la:
      - type: text
        text: 'Quis ítaque iste homo est qui péregre proficíscitur, nisi Redémptor noster, qui, in ea carne quam assúmpserat, ábiit in cælum? Carnis enim locus próprius terra est; quæ quasi ad peregrína dúcitur, dum per Redemptórem nostrum in cælo collocátur. Sed homo iste, péregre proficíscens, servis suis bona sua trádidit; quia fidélibus suis spirituália dona concéssit. Et uni quidem quinque talénta, álii duo, álii vero commísit unum. Quinque étenim sunt córporis sensus, vidélicet: visus, audítus, gustus, odorátus et tactus. Quinque ergo taléntis, donum quinque sénsuum, id est, exteriórum sciéntia, exprímitur. Duóbus vero, intelléctus et operátio designátur. Uníus autem talénti nómine, intelléctus tantúmmodo designátur.'
  reading.quis-taque-iste-homo-est-qui-p-regre-profic-scit-7fdef2956b:
    role: reading
    content:
      en:
      - type: text
        text: What other, then, is that man travelling into a far country but our Redeemer, Who is gone up from us into heaven in that Flesh Which He had taken into Himself? For the earth is the home of the Flesh, Which travelleth into a far country when our Redeemer giveth It a place in heaven. But that man travelling into a far country delivered unto his servants his goods and so doth our Redeemer give spiritual gifts unto His faithful people. “And unto one he gave five talents, to another two, and to another one.” There are five bodily senses that is, sight, hearing, taste, smell, and touch. By the five talents therefore are signified the five senses, that is, outward knowledge. By the two, wit and work. And by the figure of the one talent, understanding, which is alone.
      la:
      - type: text
        text: 'Quis ítaque iste homo est qui péregre proficíscitur, nisi Redémptor noster, qui, in ea carne quam assúmpserat, ábiit in cælum? Carnis enim locus próprius terra est; quæ quasi ad peregrína dúcitur, dum per Redemptórem nostrum in cælo collocátur. Sed homo iste, péregre proficíscens, servis suis bona sua trádidit; quia fidélibus suis spirituália dona concéssit. Et uni quidem quinque talénta, álii duo, álii vero commísit unum. Quinque étenim sunt córporis sensus, vidélicet: visus, audítus, gustus, odorátus et tactus. Quinque ergo taléntis, donum quinque sénsuum, id est, exteriórum sciéntia, exprímitur. Duóbus vero, intelléctus et operátio designátur. Uníus autem talénti nómine, intelléctus tantúmmodo designátur.'
  reading.quod-si-c-ntuens-longam-dei-pati-ntiam-qu-in-pro-996c0ae526:
    role: reading
    content:
      en:
      - type: text
        text: And so he that had received five talents, gained other five talents for some there be who, while yet they are not able to go on unto things inward and mystic, do yet so desire our Fatherland which is above, that they teach well all whom they can, and of those very outward things which they have received make gain double. These are they which keep themselves clean from the unruly motions of the flesh, and from the lust of the world, and from the delight of things which are seen, and, by their preaching, keep other men also clean from all these things. And some there are who receive, as their two talents, the power to think and the power to work. These are they which inwardly understand dark things, and outwardly work wonders. And these, since they preach unto others, both through their understanding and their works, gain, as it were, double, for the talents which they have received.
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
      - type: text
        text: O Lord, have mercy upon us, * have mercy upon us.
      - type: text
        text: O Lord, let thy mercy lighten upon us, * as our trust is in thee.
      - type: text
        text: O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: 'Quod, si cóntuens longam Dei patiéntiam, quæ in proféctum humánæ salútis exténditur, advérsum consérvos insoléscet, et sæculi malus vitiísque se tradet, præséntium tantum curam in cultu ventris exércens; desperáta die Dóminus advéniet, eúmque a bonis, quæ spopónderat, dívidet, portionémque eius cum hypócritis in pœnæ æternitáte constítuet: quia advéntum desperávit, quia mandátis non obtemperáverit, quia præséntibus studúerit, quia vita Géntium víxerit, quia desperatióne iudícii commíssam sibi famíliam fame, siti, cæde vexáverit.'
  reading.quod-si-hic-ubi-morbi-ubi-insectati-nes-ubi-pr-m-4d58930236:
    role: reading
    content:
      la:
      - type: text
        text: 'Quod si hic, ubi morbi, ubi insectatiónes, ubi præmaturæ mortes, ubi calumniæ, ubi invidiæ, ubi perturbationes, ubi iræ, ubi cupiditates, ubi innumerábiles insidiæ, ubi quotidianæ sollicitudines, ubi perpétua sibíque succedentia mala sunt, innúmeros ex omni parte dolóres afferentia, Paulus dixit fíeri posse, ut semper gaudeamus, si quis paululum ex rerum mundanarum flúctibus erexerit caput, vitámque suam recte composuerit: multo magis, postquam hinc demigraverimus, fácile cómpotes érimus eius boni, cum hæc ómnia sublata fúerint, advérsa valetudo, morbi, peccandi matéria, ubi non est meum ac tuum, frígidum illud verbum, et quidquid est malórum in vitam nostram invehens, innumeraque gignens bella.'
  reading.quod-si-hic-ubi-morbi-ubi-insectati-nes-ubi-pr-m-ca1a26bf8f:
    role: reading
    content:
      en:
      - type: text
        text: Here there are sicknesses, here there are strivings, here there are untimely deaths, here there are lies, here there are jealousies, here there are troubles, here there is anger, here there are lustings, here there are pit-falls unnumbered, here there are daily cares, here one evil followeth after another, and all bring vexation. And yet Paul hath it that even here a man may rejoice evermore, if he will but raise his head above the flood of earthly things, and order his life aright. How much better shall we fare when we have passed away from all these things, and all these things are taken away from us, when we shall have no illhealth, nor disease, nor matter wherein to sin, when that hard thing, right of property, shall exist no more, whereby all unrighteousness cometh into this life, and strifes unnumbered are begotten.
      la:
      - type: text
        text: 'Quod si hic, ubi morbi, ubi insectatiónes, ubi præmaturæ mortes, ubi calumniæ, ubi invidiæ, ubi perturbationes, ubi iræ, ubi cupiditates, ubi innumerábiles insidiæ, ubi quotidianæ sollicitudines, ubi perpétua sibíque succedentia mala sunt, innúmeros ex omni parte dolóres afferentia, Paulus dixit fíeri posse, ut semper gaudeamus, si quis paululum ex rerum mundanarum flúctibus erexerit caput, vitámque suam recte composuerit: multo magis, postquam hinc demigraverimus, fácile cómpotes érimus eius boni, cum hæc ómnia sublata fúerint, advérsa valetudo, morbi, peccandi matéria, ubi non est meum ac tuum, frígidum illud verbum, et quidquid est malórum in vitam nostram invehens, innumeraque gignens bella.'
  reading.quod-si-nobis-cr6dere-non-prod-sset-non-hoc-tam-f7c8296e9d:
    role: reading
    content:
      la:
      - type: citation
        text: 'Quod si nobis cr6dere non prodésset, non hoc tam attente idem Apostolus Timotheo comendaret dicens: Memoresto Christum Iesum resurrexisse a mortuis, ex semine David, secúndum Evangelium meum. Quid ergo iam moveat sancti Evangelii sectatorem, quod sine conciibitu Ioseph Christus natus ex Virgine, filius tamen David appellatur, cum generationum seriem non usque ad Mariam, sed usque ad Ioseph Matthaeus Evangelista perdticat? Primo quia mariti eius fiierat propter virilem sexum pótius honoranda persona: neque enim quia conciibitu non permixtus, ideo non maritus, cum ipse Matthaeus narret ab Angelo Mariam coniugem ipsius appellatam, qui narrat, quod de Spiritu sancto conceperat.'
  reading.quot-ergo-sunt-bona-pr-dic-ntium-tot-sunt-ornam-8c1815f6ad:
    role: reading
    content:
      en:
      - type: citation
        text: 'So much power then as have preachers, so much ornament have the heavens. Wherefore again it is written By the word of the Lord were the heavens made. ~(Ps. xxxii. 6.) For the Word of the Lord is the Son of the Father. But, to the end that all the Holy Trinity may be made manifest as the Maker of the heavens, that is, of the Apostles, it is straightway added touching God the Holy Ghost: you and all the host of them by the Breath of His mouth. Therefore the might of the same heavens is the might of the Spirit, for they had not braved the powers of this world, unless the strength of the Holy Ghost had comforted them. For we know what manner of men the Teachers of the Holy Church were before the coming of this Spirit and since He came we see in Whose strength they are made strong.'
      la:
      - type: text
        text: 'Quot ergo sunt bona prædicántium, tot sunt ornaménta cælórum. Hinc rursus scriptum est: Verbo Dómini cæli firmáti sunt. Verbum enim Dómini Fílius est Patris. Sed eósdem cælos, vidélicet sanctos Apóstolos, ut tota simul sancta Trínitas ostendátur operáta, repénte de Sancti Spíritus divinitáte adiúngitur: Et Spíritu oris eius omnis virtus eórum. Cælórum ergo virtus de Spíritu sumpta est: quia mundi huius potestátibus contraíre non præsúmerent, nisi eos Sancti Spíritus fortitúdo solidásset. Quales namque doctóres sanctæ Ecclésiæ ante advéntum huius Spíritus fúerint, scimus: et post advéntum illíus, cuius fortitúdinis facti sint, conspícimus.'
  reading.rm-5-18-21-083d64c4d6:
    role: reading
    content:
      la:
      - type: citation
        text: Rm 5:18-21
      - type: citation
        text: '18 Igitur sicut per uníus delíctum in omnes hómines in condemnatiónem: sic et per uníus iustítiam in omnes hómines in iustificatiónem vitæ.'
      - type: citation
        text: '19 Sicut enim per inobediéntiam uníus hóminis, peccatóres constitúti sunt multi: ita et per uníus obeditiónem, iusti constituéntur multi.'
      - type: citation
        text: '20 Lex autem subintrávit ut abundáret delíctum. Ubi autem abundávit delíctum, superabundávit grátia:'
      - type: citation
        text: '21 ut sicut regnávit peccátum in mortem: ita et grátia regnet per iustítiam in vitam ætérnam, per Iesum Christum Dóminum nostrum.'
  reading.rm-6-1-8-ddf211b7c4:
    role: reading
    content:
      la:
      - type: citation
        text: Rm 6:1-8
      - type: citation
        text: 1 Quid ergo dicémus? permanébimus in peccáto ut grátia abúndet?
      - type: citation
        text: 2 Absit. Qui enim mórtui sumus peccáto, quómodo adhuc vivémus in illo?
      - type: citation
        text: 3 an ignorátis quia quicúmque baptizáti sumus in Christo Iesu, in morte ipsíus baptizáti sumus?
      - type: citation
        text: '4 Consepúlti enim sumus cum illo per baptísmum in mortem: ut quómodo Christus surréxit a mórtuis per glóriam Patris, ita et nos in novitáte vitæ ambulémus.'
      - type: citation
        text: '5 Si enim complantáti facti sumus similitúdini mortis eius: simul et resurrectiónis érimus.'
      - type: text
        text: 6 Hoc sciéntes, quia vetus homo noster simul crucifíxus est, ut destruátur corpus peccáti, et ultra non serviámus peccáto.
      - type: text
        text: 7 Qui enim mórtuus est, iustificátus est a peccáto.
      - type: text
        text: 8 Si autem mórtui sumus cum Christo, crédimus quia simul étiam vivémus cum Christo.
  reading.rom-8-28-34-09b15f64a8:
    role: reading
    content:
      en:
      - type: citation
        text: Acts 20:25-31
      - type: text
        text: 25 And now behold, I know that all you, among whom I have gone preaching the kingdom of God, shall see my face no more.
      - type: text
        text: 26 Wherefore I take you to witness this day, that I am clear from the blood of all men;
      - type: text
        text: 27 For I have not spared to declare unto you all the counsel of God.
      - type: text
        text: 28 Take heed to yourselves, and to the whole flock, wherein the Holy Ghost hath placed you bishops, to rule the church of God, which he hath purchased with his own blood.
      - type: text
