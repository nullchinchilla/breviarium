          22 Answer me.
          23 How many are my iniquities and sins? make me know my crimes and offences.
          24 Why hidest thou thy face, and thinkest me thy enemy?
          25 Against a leaf, that is carried away with the wind, thou showest thy power, and thou pursuest a dry straw.
          26 For thou writest bitter things against me, and wilt consume me for the sins of my youth.
          27 Thou hast put my feet in the stocks, and hast observed all my paths, and hast considered the steps of my feet:
          28 Who am to be consumed as rottenness, and as a garment that is moth-eaten.
      la:
      - type: citation
        text: Iob 13:22-28
      - type: text
        text: |-
          22 Respónde mihi.
          23 Quantas hábeo iniquitátes et peccáta? scélera mea et delícta osténde mihi.
          24 Cur fáciem tuam abscóndis, et arbitráris me inimícum tuum?
          25 Contra fólium, quod vento rápitur, osténdis poténtiam tuam, et stípulam siccam perséqueris:
          26 scribis enim contra me amaritúdines, et consúmere me vis peccátis adolescéntiæ meæ.
          27 Posuísti in nervo pedem meum, et observásti omnes sémitas meas, et vestígia pedum meórum considerásti:
          28 qui quasi putrédo consuméndus sum, et quasi vestiméntum quod coméditur a tínea.
      en2:
      - type: citation
        text: Iob 13:22-28
      - type: text
        text: |-
          22 Call me, and I will answer you, or else I will speak, and you can answer me.
          23 How many iniquities and sins do I have? Reveal my crimes and offenses to me.
          24 Why do you conceal your face and consider me to be your enemy?
          25 Against a leaf, which is carried away by the wind, you reveal your power, and you pursue dry straw.
          26 For you write bitter things against me, and you want to consume me for the sins of my youth.
          27 You have put my feet on a tether, and you have observed all my paths, and you have considered the steps of my feet.
          28 I will be left to decay like something rotten and like a garment that is being eaten by moths.
  reading.iob-14-1-6-7fc60741ed:
    role: reading
    content:
      en:
      - type: citation
        text: Job 14:1-6
      - type: text
        text: |-
          1 Man born of a woman, living for a short time, is filled with many miseries.
          2 Who cometh forth like a flower, and is destroyed, and fleeth as a shadow, and never continueth in the same state.
          3 And dost thou think it meet to open thy eyes upon such an one, and to bring him into judgment with thee?
          4 Who can make him clean that is conceived of unclean seed? is it not thou who only art?
          5 The days of man are short, and the number of his months is with thee: thou hast appointed his bounds which cannot be passed.
          6 Depart a little from him, that he may rest, until his wished for day come, as that of the hireling
      la:
      - type: citation
        text: Iob 14:1-6
      - type: text
        text: |-
          1 Homo natus de mulíere, brevi vivens témpore, replétur multis misériis.
          2 Qui quasi flos egréditur et contéritur, et fugit velut umbra, et nunquam in eódem statu pérmanet.
          3 Et dignum ducis super huiuscémodi aperíre óculos tuos, et addúcere eum tecum in iudícium?
          4 Quis potest fácere mundum de immúndo concéptum sémine? Nonne tu qui solus es?
          5 Breves dies hóminis sunt: númerus ménsium eius apud te est: constituísti términos eius, qui præteríri non póterunt.
          6 Recéde páululum ab eo, ut quiéscat, donec optáta véniat, sicut mercenárii, dies eius.
      en2:
      - type: citation
        text: Iob 14:1-6
      - type: text
        text: |-
          1 Man, born of woman, living for a short time, is filled with many miseries.
          2 He comes forth like a flower, and is crushed, and he flees, as if a shadow, and never remains in the same state.
          3 And do you consider it fitting to look down with your eyes on someone in this way and to lead him into judgment with you?
          4 Who can make him clean who is conceived of unclean seed? Are you not the only one who can?
          5 The days of man are short, and the number of his months is with you; you have determined his limits, which cannot be surpassed.
          6 Withdraw a little from him, so that he may rest, until his awaited day arrives, like that of the hired hand.
  reading.iob-14-13-16-b9a9d39550:
    role: reading
    content:
      en:
      - type: citation
        text: Job 14:13-16
      - type: text
        text: |-
          13 Who will grant me this, that thou mayst protect me in hell, and hide me till thy wrath pass, and appoint me a time when thou wilt remember me?
          14 Shall man that is dead, thinkest thou, live again? all the days in which I am now in warfare, I expect until my change come.
          15 Thou shalt call me, and I will answer thee: to the work of thy hands thou shalt reach out thy right hand.
          16 Thou indeed hast numbered my steps, but spare my sins.
      la:
      - type: citation
        text: Iob 14:13-16
      - type: text
        text: |-
          13 Quis mihi hoc tríbuat, ut in inférno prótegas me, et abscóndas me donec pertránseat furor tuus, et constítuas mihi tempus in quo recordéris mei?
          14 Putásne mórtuus homo rursum vivat? cunctis diébus quibus nunc mílito, expécto donec véniat immutátio mea.
          15 Vocábis me, et ego respondébo tibi: óperi mánuum tuárum porríges déxteram.
          16 Tu quidem gressus meos dinumerásti: sed parce peccátis meis.
      en2:
      - type: citation
        text: Iob 14:13-16
      - type: text
        text: |-
          13 Who will grant this to me, that you will protect me in the underworld, and hide me until your fury passes by, and establish a time for me, in which you will remember me?
          14 Do you suppose that a dead man will live again? On each of the days in which I now battle, I wait until my transformation occurs.
          15 You will call me and I will answer you; to the work of your hands, you will extend your right hand.
          16 Indeed, you have numbered my steps, but you have been lenient with my sins.
  reading.iob-17-1-3-17-11-15-a687ad3856:
    role: reading
    content:
      en:
      - type: citation
        text: Job 17:1-3; 17:11-15
      - type: text
        text: |-
          1 My spirit shall be wasted, my days shall be shortened, and only the grave remaineth for me.
          2 I have not sinned, and my eye abideth in bitterness.
          3 Deliver me O Lord, and set me beside thee, and let any man's hand fight against me.
          11 My days have passed away, my thoughts are dissipated, tormenting my heart.
          12 They have turned night into day, and after darkness I hope for light again.
          13 If I wait hell is my house, and I have made my bed in darkness.
          14 If I have said to rottenness: thou art my father; to worms, my mother and my sister.
          15 Where is now then my expectation, and who considereth my patience?
      la:
      - type: citation
        text: Iob 17:1-3; 17:11-15
      - type: text
        text: |-
          1 Spíritus meus attenuábitur; dies mei breviabúntur: et solum mihi súperest sepúlchrum.
          2 Non peccávi, et in amaritudínibus morátur óculus meus.
          3 Líbera me, Dómine, et pone me iuxta te, et cuiúsvis manus pugnet contra me.
          11 Dies mei transiérunt; cogitatiónes meæ dissipátæ sunt, torquéntes cor meum.
          12 Noctem vertérunt in diem, et rursum post ténebras spero lucem.
          13 Si sustinúero, inférnus domus mea est, et in ténebris stravi léctulum meum.
          14 Putrédini dixi: Pater meus es; Mater mea, et soror mea, vérmibus.
          15 Ubi est ergo nunc præstolátio mea? et patiéntiam meam quis consíderat?
      en2:
      - type: citation
        text: Iob 17:1-3; 17:11-15
      - type: text
        text: |-
          1 My spirit will be wasted, my days will be shortened, and only the grave will be left for me.
          2 I have not sinned, yet my eye remains in bitterness.
          3 Free me, O Lord, and set me beside you, and let the hand of anyone you wish fight against me.
          11 My days have passed away; my thoughts have been scattered, tormenting my heart.
          12 They have turned night into day, and I hope for light again after the darkness.
          13 If I should wait, the underworld is my house, and in darkness I have spread out my bed.
          14 I have said to decay and to worms: 'You are my father, my mother, and my sister.'
          15 Therefore, where is my expectation now, and who is it that considers my patience?
  reading.iob-19-20-27-764fc146b6:
    role: reading
    content:
      en:
      - type: citation
        text: Job 19:20-27
      - type: text
        text: |-
          20 The flesh being consumed. My bone hath cleaved to my skin, and nothing but lips are left about my teeth.
          21 Have pity on me, have pity on me, at least you my friends, because the hand of the Lord hath touched me.
          22 Why do you persecute me as God, and glut yourselves with my flesh?
          23 Who will grant me that my words may be written? Who will grant me that they may be marked down in a book?
          24 With an iron pen and in a plate of lead, or else be graven with an instrument in flint stone.
          25 For I know that my Redeemer liveth, and in the last day I shall rise out of the earth.
          26 And I shall be clothed again with my skin, and in my flesh I will see my God.
          27 Whom I myself shall see, and my eyes shall behold, and not another: this my hope is laid up in my bosom.
      la:
      - type: citation
        text: Iob 19:20-27
      - type: text
        text: |-
          20 Pelli meæ, consúmptis cárnibus, adhǽsit os meum, et derelícta sunt tantúmmodo lábia circa dentes meos.
          21 Miserémini mei, miserémini mei saltem vos, amíci mei, quia manus Dómini tétigit me.
          22 Quare persequímini me sicut Deus, et cárnibus meis saturámini?
          23 Quis mihi tríbuat ut scribántur sermónes mei? quis mihi det ut exaréntur in libro
          24 stylo férreo et plumbi lámina, vel celte sculpántur in sílice?
          25 Scio enim quod redémptor meus vivit, et in novíssimo die de terra surrectúrus sum:
          26 et rursum circúmdabor pelle mea, et in carne mea vidébo Deum meum:
          27 quem visúrus sum ego ipse, et óculi mei conspectúri sunt, et non álius: repósita est hæc spes mea in sinu meo.
      en2:
      - type: citation
        text: Iob 19:20-27
      - type: text
        text: |-
          20 Since my flesh has been consumed, my bone adheres to my skin, and only my lips have been left around my teeth.
          21 Have mercy on me, have compassion on me, at least you my friends, because the hand of the Lord has touched me.
          22 Why do you pursue me just as God does, and satiate yourselves with my flesh?
          23 Who will grant to me that my words may be written down? Who will grant to me that they may be inscribed in a book,
          24 with an iron pen and a plate of lead, or else be carved in stone?
          25 For I know that my Redeemer lives, and on the last day I will rise out of the earth.
          26 And I will be enveloped again with my skin, and in my flesh I will see my God.
          27 It is he whom I myself will see, and he whom my eyes will behold, and no other. This, my hope, has taken rest in my bosom.
  reading.iob-7-16-21-e2d1c43a99:
    role: reading
    content:
      en:
      - type: citation
        text: Job 7:16-21
      - type: text
        text: |-
          16 Spare me, for my days are nothing.
          17 What is a man that thou shouldst magnify him? or why dost thou set thy heart upon him?
          18 Thou visitest him early in the morning, and thou provest him suddenly.
          19 How long wilt thou not spare me, nor suffer me to swallow down my spittle?
          20 I have sinned: what shall I do to thee, O keeper of men? why hast thou set me opposite to thee, and I am become burdensome to myself?
          21 Why dost thou not remove my sin, and why dost thou not take away my iniquity? Behold now I shall sleep in the dust: and if thou seek me in the morning, I shall not be.
      la:
      - type: citation
        text: Iob 7:16-21
      - type: text
        text: |-
          16 Parce mihi, Dómine; nihil enim sunt dies mei.
          17 Quid est homo, quia magníficas eum? aut quid appónis erga eum cor tuum?
          18 Vísitas eum dilúculo, et súbito probas illum.
          19 Usquequo non parcis mihi, nec dimíttis me, ut glútiam salívam meam?
          20 Peccávi, quid fáciam tibi, o custos hóminum? quare posuísti me contrárium tibi, et factus sum mihimetípsi gravis?
          21 Cur non tollis peccátum meum, et quare non aufers iniquitátem meam? Ecce nunc in púlvere dórmiam: et, si mane me quæsíeris, non subsístam.
      en2:
      - type: citation
        text: Iob 7:16-21
      - type: text
        text: |-
          16 I despair; by no means will I live any longer. Spare me, for my days are nothing.
          17 What is man, that you should praise him? Or why do you place your heart near him?
          18 You visit him at dawn, and you test him unexpectedly.
          19 How long will you not spare me, nor release me to ingest my saliva?
          20 I have sinned; what should I do for you, O keeper of men? Why have you set me against you, so that I have become burdensome even to myself?
          21 Why do you not steal away my sin, and why do you not sweep away my iniquity? Behold, now I will sleep in the dust, and if you seek me in the morning, I will not remain.
  reading.l-ctio-sancti-evang-lii-sec-ndum-io-nnem-5b38412286:
    role: reading
    content:
      en:
      - type: text
        text: Continuation of the Holy Gospel according to John
      - type: citation
        text: John 15:12-16
      - type: text
        text: |-
          In that time Jesus said to his disciples: This is my commandment, that you love one another, as I have loved you. And so on.

          Homily by Pope St Gregory (the Great.)
      - type: citation
        text: 21th on the Gospels
      - type: text
        text: All the holy words of the Lord are full of His commandments. Why, then, speaketh the Lord of the commandment to love one another as if He gave no other commandment? This, saith He, is My commandment, That ye love one another. Is it not because love is the one object of all His commandments, and all His commandments are one? For, even as a tree, having but one root, bringeth forth many branches, so, if the root be love, many virtues do spring therefrom. Neither is the branch of good works green, if it abide not in the root of love.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Ioánnem.
      - type: citation
        text: Ioannes 15:12-16
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Hoc est præcéptum meum, ut diligátis ínvicem, sicut diléxi vos. Et réliqua.

          Homilía S. Gregórii Papæ.
      - type: citation
        text: Homilia 27. in Evangelia.
      - type: text
        text: 'Cum cuncta sacra elóquia Domínicis plena sint præcéptis quid est quod de dilectióne, quasi de singulári mandáto, Dóminus dicit, Hoc est præcéptum meum, ut diligátis ínvicem: nisi quia omne mandátum de sola dilectióne est: et omnia unum præcéptum sunt? Quia quidquid præcípitur, in sola caritáte solidátur. Ut enim multi árboris rami ex una radíce pródeunt: sic multæ virtútes ex una caritáte generántur. Nec habet áliquid viriditátis ramus boni óperis, si non manet in radíce caritátis.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to John.
      - type: citation
        text: Ioannes 15:12-16
      - type: text
        text: |-
          At that time, Jesus said to his disciples: This is my commandment: that you love one another, as I have loved you. Et cetera.
      
          A Homily of Saint Gregory the Pope.
      - type: citation
        text: Homilia 27. in Evangelia.
      - type: text
        text: 'Since all the sacred eloquences are full of the Lord''s commandments, what is the meaning of the Lord''s saying of charity as if it were a singular commandment: "This is my commandment, that you love one another" — unless it be that all commandments are of charity alone, and all are one commandment? Because whatever is commanded is grounded in charity alone. For as many branches come forth from one root, so many virtues are generated from one charity. And the branch of good work has no greenness in it unless it abides in the root of charity.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-io-nnem-87f1835305:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Ioánnem.
      - type: citation
        text: Ioann 19:28-35
      - type: text
        text: |-
          In illo témpore: Sciens Iesus, quia ómnia consummáta sunt, ut consummaretur Scriptúra, dixit: Sitio. Et réliqua.

          Homilía sancti Cyrílli Epíscopi Alexandríni
      - type: citation
        text: Comment. in Ioannem. Lib. 12., cap. 35
      - type: text
        text: 'Cum truculenter ómnia impietáte Iudæórum essent perácta, nec quidquam ad summam crudelitátem deesset, tandem sanctíssima caro Christi naturale quid pátitur. Multis enim, ac váriis dolóribus exsiccata, siti torquétur. Multum enim possunt dolóres ad commovendam sitim; innatum enim calorem exagitantes, vel, quod in profunditate humidum est, consumunt et igneis ardoribus dolentis víscera urunt. Sicut ígitur ceteras passi6nes, sic hanc étiam sponte Christus perpéssus est. Bibere ígitur petit: illi autem ádeo longe ab omni humanitate aberant, ut pro iuvante potu atque iucundo nocentem et acerbum attulerint, et humanitátem, qua moveri videbantur, in impietátem converterint. Nam cum petenti dabant, caritátis hábitum suscípere videbantur; sed non est possíbile mentíri Scripturam, in qua ex persóna Christi dícitur: Et dedérunt in escam meam fel, et in siti mea potavérunt me acéto.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to John.
      - type: citation
        text: Ioann 19:28-35
      - type: text
        text: |-
          At that time, Jesus, knowing that all things were now accomplished, that the Scripture might be fulfilled, said: I thirst. Et cetera.
      
          A Homily of Saint Cyril, Bishop of Alexandria
      - type: citation
        text: Comment. in Ioannem. Lib. 12., cap. 35
      - type: text
        text: 'When all things had been wrought with the savage impiety of the Jews, and nothing was lacking to the sum of their cruelty, at last the most holy flesh of Christ suffers something natural. For dried out by many and varied torments, it is tormented by thirst. For torments have great power to provoke thirst; for exciting the innate heat, they either consume what is moist in the body''s depths, or with fiery ardors they burn the entrails of the sufferer. As Christ, therefore, willingly endured the other sufferings, so also he willingly endured this one. He asks, therefore, to drink; but they were so far removed from all humanity that instead of a helpful and pleasant draught they brought something harmful and bitter, and turned the appearance of kindness, which they seemed to show, into impiety. For when they gave to him who asked, they seemed to take up the manner of charity; but it is not possible for Scripture to lie, in which it is said in the person of Christ: "And they gave me gall for my food, and in my thirst they gave me vinegar to drink."'
  reading.l-ctio-sancti-evang-lii-sec-ndum-io-nnem-889f76357d:
    role: reading
    content:
      en:
      - type: text
        text: From the holy Gospel according to John
      - type: citation
        text: John 15:1-7
      - type: text
        text: |-
          In that time Jesus said to his disciples: I an the true vine; and my Father is the husbandman. And so on.

          Homily by St. Augustine, Bishop (of Hippo.)
      - type: citation
        text: Tract 80 on John
      - type: text
        text: Dearly beloved brethren, this passage of the Gospel, wherein the Lord saith that He is the vine, and that His disciples are the branches, is to be taken in that sense wherein it is also said, that He is the Head of the Church, (Eph. v. 23,) and that we are the members of Him (30) Who is the Mediator between God and men, the man Christ Jesus (1 Tim. ii. 5.) The vine and his branches are of one and the same nature. Therefore, seeing that He was God, of which nature we are not, He was made man, to the end that He might have in Himself this vine, that is, the manhood, whereof we men can be made branches.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Ioánnem
      - type: citation
        text: Ioannes 15:1-7
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Ego sum vitis vera: et Pater meus agrícola est. Et réliqua.

          Homilía sancti Augustíni Epíscopi
      - type: citation
        text: Tract. 80 in Ioannem
      - type: text
        text: Iste locus evangélicus, fratres, ubi se dicit Dóminus vitem, et discípulos suos pálmites, secúndum hoc dicit, quod est caput Ecclésiæ, nosque membra eius, mediátor Dei et hóminum, homo Christus Iesus. Uníus quippe natúræ sunt vitis et pálmites. Propter quod cum esset Deus, cuius natúræ non sumus, factus est homo, ut in illo esset vitis humána natúra, cuius et nos hómines pálmites esse possémus.
      en2:
      - type: text
        text: A Reading from the holy Gospel according to John
      - type: citation
        text: Ioannes 15:1-7
      - type: text
        text: |-
          At that time, Jesus said to his disciples: I am the true vine, and my Father is the vinedresser. Et cetera.
      
          A Homily of Saint Augustine the Bishop
      - type: citation
        text: Tract. 80 in Ioannem
      - type: text
        text: This passage of the Gospel, brethren, in which the Lord calls himself the vine and his disciples the branches, he speaks according to what he is as the head of the Church and we as his members, the mediator between God and men, the man Christ Jesus. For the vine and the branches are of one nature. Therefore, because he was God, whose nature we do not share, he became man, so that in him human nature might be the vine, of which we too, as human beings, might be branches.
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-08203c10b1:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 12:35-40
      - type: text
        text: |-
          At that time, Jesus said unto His disciples: Let your loins be girded about, and your lights burning. And so on.

          Homily by Pope St. Gregory (the Great.)
      - type: citation
        text: 13th on the Gospels.
      - type: text
        text: Dearly beloved brethren, the words of the Holy Gospel, which have just been read, lie open before you, and, lest their very plainness should make them seem to some to be hard, we will go through them with such shortness as that neither may they which understand not remain unenlightened, nor they which understand be wearied. The Lord saith Let your loins be girded about. Now, we gird our loins about, when by continency we master the lustful inclination of the flesh. But, forasmuch as it sufficeth not for a man to abstain from evil deeds, if he strive not to join thereto the earnest doing of good works, it is immediately added And your lights burning. Our lights burn when, by good works, we give bright example to our neighbour; concerning which works the Lord saith Let your light so shine before men, that they may see your good works, and glorify your Father Which is in heaven. (Matth. v. 16.)
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 12:35-40
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Sint lumbi vestri præcincti, et lucernæ ardentes in mánibus vestris. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 13 in Evang.
      - type: text
        text: 'Sancti Evangélii, fratres caríssimi, apérta vobis est léctio recitata. Sed ne alíquibus ipsa eius planíties alta fortásse videátur, eam sub brevitáte transcúrrimus, quátenus eius exposítio ita nesciéntibus fiat cógnita, ut tamen sciéntibus non sit onerósa. Dóminus dicit: Sint lumbi vestri præcíncti. Lumbos enim præcíngimus, cum carnis luxúriam per continéntiam coarctámus. Sed quia minus est, mala non ágere, nisi étiam quisque stúdeat, et bonis opéribus insudáre, prótinus ádditur: Et lucérnæ ardéntes in mánibus vestris. Lucérnas quippe ardéntes in mánibus tenémus, cum per bona ópera próximis nostris lucis exémpla monstrámus. De quibus profécto opéribus Dóminus dicit: Lúceat lux vestra coram homínibus, ut vídeant ópera vestra bona, et gloríficent Patrem vestrum qui in cælis est.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 12:35-40
      - type: text
        text: |-
          At that time: Jesus said to his disciples: Let your waists be girded, and let lamps be burning in your hands. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 13 in Evang.
      - type: text
        text: 'The reading of the holy Gospel just proclaimed, dearest brethren, is clear enough. But lest to some its very plainness seem perhaps too deep, we pass through it briefly, so that its exposition may be made known to those who do not yet understand it, without being burdensome to those who do. The Lord says: Let your waists be girded. For we gird our loins when we restrain the lust of the flesh through continence. But because it is not enough to do no evil unless one also strives to labor at good works, there is immediately added: And let lamps be burning in your hands. We hold burning lamps in our hands when by our good works we show our neighbors the example of light. Concerning which works the Lord says: Let your light shine before men, that they may see your good works, and may glorify your Father who is in heaven.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-1c16486ba2:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 21:9-19
      - type: text
        text: |-
          At that time, Jesus said unto His disciples: When ye shall hear of wars and commotions, be not terrified for these things must first come to pass; but the end is not by and by. And so on.

          Homily by Pope St Gregory (the Great.)
      - type: citation
        text: 35th on the Gospels.
      - type: text
        text: 'Our Lord and Redeemer willeth us to know what shall be the signs that the end of the world is at hand, to the end that ye may be the less terrified, when that cometh whereof ye have already had warning. Darts strike less which are seen coming: and the plagues of the earth will be to us more bearable, if we are harnessed against them with the shield of foreknowledge. Behold, how He saith When ye shall hear of wars and commotions be not terrified for these things must first come to pass; but the end is not by and by. It behoveth us to ponder these words of our Redeemer, wherein He warneth us of suffering, from without, and from within. Wars are the work of a foreign enemy, commotions of the citizens. Therefore, that He may let us know that we shall be troubled from within and from without, He showeth that our wrestling shall be in part against strangers, and in part against our brethren.'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 12:1-8
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Atténdite a fermento pharisæórum, quod est hypócrisis. Et réliqua.

          Homilía sancti Bedæ Venerábilis Presbýteri
      - type: citation
        text: Lib. 4 in Lucam, cap. 12
      - type: text
        text: 'De hoc ferménto Apóstolus præcépit: Itáque epulémur, non in ferménto véteri, neque in ferménto malítiæ et nequítiæ, sed in ázymis sinceritátis et veritátis. Nam, sicut módicum ferméntum totam farínæ, cui iniícitur, massam corrúmpit, universámque mox conspersiónem suo sapóre commáculat; sic nimírum simulátio, cuius semel ánimum imbúerit, tota virtútum sinceritáte et veritáte fraudábit. Est ergo sensus: Atténdite ne æmulémini simulatóres; quia véniet profécto tempus, in quo et vestra virtus ómnibus, et eórum revelétur hypócrisis.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 12:1-8
      - type: text
        text: |-
          At that time: Jesus said to his disciples: Beware of the leaven of the Pharisees, which is hypocrisy. And so forth.
      
          A Homily of the Venerable Bede the Priest
      - type: citation
        text: Lib. 4 in Lucam, cap. 12
      - type: text
        text: 'Concerning this leaven the Apostle gave instruction: Therefore, let us feast, not with the old leaven, nor with the leaven of malice and wickedness, but with the unleavened bread of sincerity and truth. For just as a little leaven corrupts the whole mass of dough into which it is thrown, and soon taints the entire mixture with its own flavor; so likewise simulation, once it has steeped the mind, will defraud it of all the sincerity and truth of the virtues. The meaning is therefore: Beware lest you imitate dissemblers; because the day of judgment will come, on which both your virtue will be revealed to all, and their hypocrisy will be unmasked.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-2639a62f4d:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 21:9-19
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Cum audiéritis prǽlia, et seditiónes, nolíte terréri: opórtet primum hæc fíeri, sed nondum statim finis. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 35 in Evangel.
      - type: text
        text: 'Dóminus ac Redémptor noster peritúri mundi præcurréntia mala denúntiat, ut eo minus pertúrbent veniéntia, quo fúerint præscíta. Minus enim iácula fériunt, quæ prævidéntur: et nos tolerabílius mundi mala suscípimus, si contra hæc per præsciéntiæ clípeum munímur. Ecce enim dicit: Cum audiéritis prǽlia et seditiónes, nolíte terréri: opórtet enim primum hæc fíeri, sed nondum statim finis. Pensánda sunt verba Redemptóris nostri, per quæ nos áliud intérius, áliud extérius passúros esse denúntiat; bella quippe ad hostes pértinent, seditiónes ad cives. Ut ergo nos índicet intérius exteriúsque turbári, áliud nos fatétur ab hóstibus, áliud a frátribus pérpeti.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 21:9-19
      - type: text
        text: |-
          At that time: Jesus said to his disciples: And when you will have heard of battles and seditions, do not be terrified. These things must happen first. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 35 in Evangel.
      - type: text
        text: 'Our Lord and Redeemer announces the evils that precede the perishing of the world, so that those things which are to come may disturb us the less, in proportion as they have been foreknown. For darts strike less deeply when they are seen in advance; and we take up the evils of the world more tolerably when we are fortified against them by the shield of foreknowledge. For behold, he says: And when you will have heard of battles and seditions, do not be terrified. These things must happen first, but the end is not so soon. The words of our Redeemer are to be weighed carefully: by them he declares that we are to suffer different things inwardly and outwardly; for battles belong to enemies, while seditions belong to citizens. Therefore, to signify that we shall be troubled both within and without, he tells us that we shall suffer one thing from enemies, another from brethren.'
