  responsory.propter-verit-tem-et-mansuet-dinem-et-iust-tiam-6bd41d998e:
    role: responsory
    content:
      en:
      - type: response
        text: Because of truth, and meekness, and righteousness;
      - type: text
        text: And thy right hand shall lead thee wonderfully.
      - type: versicle
        text: In thy comeliness, and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: And thy right hand shall lead thee wonderfully.
      la:
      - type: response
        text: 'Propter veritátem, et mansuetúdinem, et iustítiam:'
      - type: text
        text: Et dedúcet te mirabíliter déxtera tua.
      - type: versicle
        text: Spécie tua et pulchritúdine tua inténde, próspere procéde, et regna.
      - type: response
        text: Et dedúcet te mirabíliter déxtera tua.
      en2:
      - type: response
        text: 'For truth, and meekness, and justice:'
      - type: text
        text: And your right hand shall lead you wondrously.
      - type: versicle
        text: In your beauty and in your splendor, set out, advance in triumph, and reign.
      - type: response
        text: And your right hand shall lead you wondrously.
  responsory.qu-est-ista-qu-proc-ssit-sicut-sol-et-form-sa-ta-d10efb5728:
    role: responsory
    content:
      en:
      - type: response
        text: Who is this that cometh up like the sun? This, comely as Jerusalem?
      - type: text
        text: 'The daughters of Zion saw her, and called her blessed: the queens also, and they praised her.'
      - type: versicle
        text: And about her it was as the flower of roses in the spring of the year, and lilies of the valleys.
      - type: response
        text: The daughters of Zion saw her, and called her blessed the queens also, and they praised her.
      la:
      - type: response
        text: Quæ est ista quæ procéssit sicut sol, et formósa tamquam Ierúsalem?
      - type: text
        text: Vidérunt eam fíliæ Sion, et beátam dixérunt, et regínæ laudavérunt eam.
      - type: versicle
        text: Et sicut dies verni circúmdabant eam flores rosárum et lília convállium.
      - type: response
        text: Vidérunt eam fíliæ Sion, et beátam dixérunt, et regínæ laudavérunt eam.
      en2:
      - type: response
        text: Who is she that comes forth like the sun, and fair as Jerusalem?
      - type: text
        text: The daughters of Sion saw her, and called her blessed, and queens praised her.
      - type: versicle
        text: And as on spring days, flowers of roses and lilies of the valleys surrounded her.
      - type: response
        text: The daughters of Sion saw her, and called her blessed, and queens praised her.
  responsory.qui-l-zarum-resuscit-sti-a-monum-nto-f-tidum-d28d295b12:
    role: responsory
    content:
      en:
      - type: response
        text: Thou Who didst call up Lazarus from the grave after that he had begun to stink
      - type: text
        text: Do Thou, O Lord, grant them rest and a place of forgiveness.
      - type: versicle
        text: Thou Who shalt come to judge the quick and dead, and the world by fire
      - type: response
        text: Do Thou, O Lord, grant them rest and a place of forgiveness.
      la:
      - type: response
        text: Qui Lázarum resuscitásti a monuménto fœ́tidum,
      - type: text
        text: Tu eis, Dómine, dona réquiem, et locum indulgéntiæ.
      - type: versicle
        text: Qui ventúrus es iudicáre vivos et mórtuos, et sǽculum per ignem.
      - type: response
        text: Tu eis, Dómine, dona réquiem, et locum indulgéntiæ.
      en2:
      - type: response
        text: You who raised Lazarus from the stinking tomb,
      - type: text
        text: Grant them, O Lord, rest and a place of pardon.
      - type: versicle
        text: You who are to come to judge the living and the dead, and the world by fire.
      - type: response
        text: Grant them, O Lord, rest and a place of pardon.
  responsory.regnum-mundi-et-omnem-orn-tum-s-culi-cont-mpsi-p-043b90c888:
    role: responsory
    content:
      en:
      - type: response
        text: The kingdom of this world and all the beauty of life I have esteemed as nothing, for the excellency of the love of Jesus Christ my Lord
      - type: text
        text: Whom, having seen, I loved Whom, having believed, I longed after.
      - type: versicle
        text: My heart is overflowing with a good matter I speak of my works unto the King.
      - type: response
        text: Whom, having seen, I loved Whom, having believed, I longed after.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Whom, having seen, I loved Whom, having believed, I longed after.
      la:
      - type: response
        text: 'Regnum mundi et omnem ornátum sǽculi contémpsi, propter amórem Dómini mei Iesu Christi:'
      - type: text
        text: Quem vidi, quem amávi, in quem crédidi, quem diléxi.
      - type: versicle
        text: 'Eructávit cor meum verbum bonum: dico ego ópera mea Regi.'
      - type: response
        text: Quem vidi, quem amávi, in quem crédidi, quem diléxi.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quem vidi, quem amávi, in quem crédidi, quem diléxi.
      en2:
      - type: response
        text: 'The kingdom of the world and all the adornment of the age I have despised, for the love of my Lord Jesus Christ:'
      - type: text
        text: Whom I have seen, whom I have loved, in whom I have believed, whom I have cherished.
      - type: versicle
        text: 'My heart has uttered a good word: I declare my works to the King.'
      - type: response
        text: Whom I have seen, whom I have loved, in whom I have believed, whom I have cherished.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: Whom I have seen, whom I have loved, in whom I have believed, whom I have cherished.
  responsory.s-scipe-verbum-virgo-mar-a-quod-tibi-a-d-mino-pe-b29bf0448d:
    role: responsory
    content:
      en:
      - type: response
        text: O Holy Virgin Mary, happy indeed art thou, and right worthy of all praise
      - type: text
        text: For out of thee rose the Sun of righteousness, even Christ our God.
      - type: versicle
        text: Pray for the people, plead for the clergy, make intercession for all women vowed to God. Let all that are making this holy memorial of thee feel the might of thine assistance.
      - type: response
        text: For out of thee rose the Sun of righteousness, even Christ our God.
      la:
      - type: response
        text: 'Súscipe verbum, Virgo María, quod tibi a Dómino per Angelum transmíssum est: concípies et páries Deum páriter et hóminem,'
      - type: text
        text: Ut benedícta dicáris inter omnes mulíeres.
      - type: versicle
        text: 'Páries quidem fílium, et virginitátis non patiéris detriméntum: efficiéris grávida, et eris mater semper intácta.'
      - type: response
        text: Ut benedícta dicáris inter omnes mulíeres.
      en2:
      - type: response
        text: 'Receive the word, O Virgin Mary, which has been sent to you from the Lord through the Angel: you shall conceive and bear both God and man,'
      - type: text
        text: That you may be called blessed among all women.
      - type: versicle
        text: 'You shall indeed bear a son, and shall suffer no loss of your virginity: you shall become with child, and shall remain a mother ever untouched.'
      - type: response
        text: That you may be called blessed among all women.
  responsory.sancta-et-immacul-ta-virg-nitas-quibus-te-l-udib-3f29c356e1:
    role: responsory
    content:
      en:
      - type: response
        text: 'O how holy and how spotless is thy virginity; I am too dull to praise thee:'
      - type: text
        text: For thou hast borne in thy breast Him Whom the heavens cannot contain.
      - type: versicle
        text: Blessed art thou among women, and blessed is the fruit of thy womb.
      - type: response
        text: For thou hast borne in thy breast Him Whom the heavens cannot contain.
      la:
      - type: response
        text: 'Sancta et immaculáta virgínitas, quibus te láudibus éfferam, néscio:'
      - type: text
        text: Quia quem cæli cápere non póterant, tuo grémio contulísti.
      - type: versicle
        text: Benedícta tu in muliéribus, et benedíctus fructus ventris tui.
      - type: response
        text: Quia quem cæli cápere non póterant, tuo grémio contulisti.
      en2:
      - type: response
        text: 'Holy and undefiled virginity, with what praises I may extol you, I know not:'
      - type: text
        text: For him whom the heavens could not contain, you bore in your womb.
      - type: versicle
        text: Blessed are you among women, and blessed is the fruit of your womb.
      - type: response
        text: For him whom the heavens could not contain, you bore in your womb.
  responsory.sancta-et-immacul-ta-virg-nitas-quibus-te-l-udib-ba2e853795:
