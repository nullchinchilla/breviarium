  hymn.fortem-vir-li-p-ctore-782e46a763:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Fortem viríli péctore
          Laudémus omnes féminam,
          Quæ sanctitátis glória
          Ubíque fulget ínclita.

          Hæc sancto amóre sáucia,
          Dum mundi amórem nóxium
          Horréscit, ad cæléstia
          Iter perégit árduum.

          Carnem domans ieiúniis,
          Dulcíque mentem pábulo
          Oratiónis nútriens,
          Cæli potítur gáudiis.

          Rex Christe, virtus fórtium,
          Qui magna solus éfficis,
          Huius precátu, quǽsumus,
          Audi benígnus súpplices.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Nunc, et per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          Let us all praise the woman
          of strong and manly heart,
          who shines renowned everywhere
          with the glory of holiness.
      
          Wounded by holy love,
          while she shudders at the harmful love
          of the world, she traveled
          the arduous way to heaven.
      
          Taming the flesh with fasts
          and nourishing her mind
          with the sweet food of prayer,
          she possesses the joys of heaven.
      
          O Christ the King, strength of the strong,
          you who alone accomplish great deeds,
          hear graciously, at her prayer,
          us your suppliants.
      
          Let glory be to God the Father,
          and to his only Son,
          with the Spirit the Paraclete,
          now and through every age.
          Amen.
  hymn.huius-or-tu-deus-alme-nobis-05ea9be08a:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Huius orátu, Deus alme, nobis
          Débitas pœnas scélerum remítte;
          Ut tibi puro resonémus almum
          Péctore carmen.

          Sit decus Patri, genitǽque Proli,
          Et tibi, compar utriúsque virtus,
          Spíritus semper, Deus unus, omni
          Témporis ævo.
          Amen.
      en2:
      - type: text
        text: |-
          At her prayer, O gracious God,
          remit from us the fitting punishments of our sins;
          that with a pure heart we may resound
          a worthy hymn to you.
      
          Let glory be to the Father, and to the Son his offspring,
          and to you, O Spirit, power equal to them both,
          God ever one, through every age of time.
          Amen.
  hymn.huius-or-tu-deus-alme-nobis-a17eca3ef7:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Son of a virgin, maker of thy mother,
          Thou, rod and blossom from a stem unstainèd,
          While we a Virgin's triumphs are rehearsing,
          Hear our petition!

          Lo, on thy handmaid fell a two-fold blessing,
          Who, in her body vanquishing the weakness,
          In that same body, grace from heaven obtaining,
          Bore the world witness.

          Death, nor the rending pains of death appalled her;
          Bondage and torment found her undefeated:
          So by the shedding of her blood attained she
          Heavenly guerdon.

          Fountain of mercy, hear the prayers she offers;
          Purge our offences, pardon our transgressions,
          So that hereafter we to thee may render
          Praise with thanksgiving.

          Thou, the All-Father, thou, the One-Begotten,
          Thou, Holy Spirit, Three in One co-equal,
          Glory be henceforth thine through all the ages,
          World without ending.
          Amen.
