  reading.sir-32-18-20-32-28-33-1-3-f3aa170e4a:
    role: reading
    content:
      en:
      - type: citation
        text: Sir 32:18-20; 32:28; 33:1-3
      - type: text
        text: |-
          18 He that feareth the Lord, will receive his discipline: and they that will seek him early, shall find a blessing.
          19 He that seeketh the law, shall be filled with it: and he that dealeth deceitfully, shall meet with a stumblingblock therein.
          20 They that fear the Lord, shall find just judgment, and shall kindle justice as a light.
          28 He that believeth God, taketh heed to the commandments: and he that trusteth in him, shall fare never the worse.
          1 No evils shall happen to him that feareth the Lord, but in temptation God will keep him, and deliver him from evils.
          2 A wise man hateth not the commandments and justices, and he shall not be dashed in pieces as a ship in a storm.
          3 A man of understanding is faithful to the law of God, and the law is faithful to him.
      la:
      - type: citation
        text: Sir 32:18-20; 32:28; 33:1-3
      - type: text
        text: |-
          18 Qui timet Dóminum excípiet doctrínam eius: et qui vigiláverint ad illum invénient benedictiónem.
          19 Qui quærit legem, replébitur ab ea: et qui insidióse agit, scandalizábitur in ea.
          20 Qui timent Dóminum invénient iudícium iustum, et iustítias quasi lumen accéndent.
          28 Qui credit Deo atténdit mandátis: et qui confídit in illo non minorábitur.
          1 Timénti Dóminum non occúrrent mala: sed in tentatióne Deus illum conservábit, et liberábit a malis. Sápiens non odit mandáta et iustítias,
          2 et non illidétur quasi in procélla navis.
          3 Homo sensátus credit legi Dei, et lex illi fidélis.
      en2:
      - type: citation
        text: Sir 32:18-20; 32:28; 33:1-3
      - type: text
        text: |-
          18 Whoever fears the Lord will accept his doctrine. And whoever watches for him diligently will find a blessing.
          19 Whoever seeks the law will be filled from the law. But whoever acts with treachery will be scandalized by treachery.
          20 Those who fear the Lord will find just judgment, and they will kindle justice like a light.
          28 Whoever believes God attends to the commandments. And whoever trusts in him will not be diminished.
          1 No evils will befall one who fears the Lord. Instead, God will preserve him during temptation and will free him from evils. A wise man does not hate the commandments and the justices,
          2 and so he will not be thrown about violently, like a ship in a storm.
          3 A man of understanding puts his faith in the law of God, and so the law is faithful to him.
  reading.sir-34-14-20-84f7b316a3:
    role: reading
    content:
      en:
      - type: citation
        text: Sir 34:14-20
      - type: text
        text: |-
          14 The spirit of those that fear God; is sought after, and by his regard shall be blessed.
          15 For their hope is on him that saveth them, and the eyes of God are upon them that love him.
          16 He that feareth the Lord shall tremble at nothing, and shall not be afraid for he is his hope.
          17 The soul of him that feareth the Lord is blessed.
          18 To whom doth he look, and who in his strength?
          19 The eyes of the Lord are upon them that fear him, he is their powerful protector, and strong stay, a defence from the heat, and a cover from the sun at noon,
          20 A preservation from stumbling, and a help from falling; he raiseth up the soul, and enlighteneth the eyes, and giveth health, and life, and blessing.
      la:
      - type: citation
        text: Sir 34:14-20
      - type: text
        text: |-
          14 Spíritus timéntium Deum quǽritur, et in respéctu illíus benedicétur.
          15 Spes enim illórum in salvántem illos, et óculi Dei in diligéntes se.
          16 Qui timet Dóminum nihil trepidábit: et non pavébit, quóniam ipse est spes eius.
          17 Timéntis Dóminum, beáta est ánima eius.
          18 Ad quem réspicit, et quis est fortitúdo eius?
          19 Óculi Dómini super timéntes eum: protéctor poténtiæ, firmaméntum virtútis, tégimen ardóris, et umbráculum meridiáni:
          20 deprecátio offensiónis, et adiutórium casus: exáltans ánimam, et illúminans óculos, dans sanitátem, et vitam, et benedictiónem.
      en2:
      - type: citation
        text: Sir 34:14-20
      - type: text
        text: |-
          14 The spirit of those who fear God is sought, and they will be blessed by his providence.
          15 For their hope is in him who saves them, and the eyes of God are on those who love him.
          16 Those who fear the Lord will tremble at nothing, and they will not be terrified. For he is their hope.
          17 The soul of him who fears the Lord is blessed.
          18 To whom should he look, and who is his strength?
          19 The eyes of the Lord are upon those who fear him. He is a powerful Protector, a Firmament of virtue, a Shelter from the heat, and a Covering from the midday sun,
          20 a Guardian from offenses, and a Helper from falling, who exalts the soul and illuminates the eyes, and who gives health and life and blessing.
  reading.sir-39-11-14-ab86655c2f:
    role: reading
    content:
      en:
      - type: citation
        text: Sir 39:11-14
      - type: text
        text: |-
          11 He shall show forth the discipline he hath learned, and shall glory in the law of the covenant of the Lord.
          12 Many shall praise his wisdom, and it shall never be forgotten.
          13 The memory of him shall not depart away, and his name shall be in request from generation to generation.
          14 Nations shall declare his wisdom, and the church shall show forth his praise.
      la:
      - type: citation
        text: Sir 39:11-14
      - type: text
        text: |-
          11 Ipse palam fáciet disciplínam doctrínæ suæ, et in lege testaménti Dómini gloriábitur.
          12 Collaudábunt multi sapiéntiam eius, et usque in sǽculum non delébitur.
          13 Non recédet memória eius, et nomen eius requirétur a generatióne in generatiónem.
          14 Sapiéntiam eius enarrábunt gentes, et laudem eius enuntiábit Ecclésia.
      en2:
      - type: citation
        text: Sir 39:11-14
      - type: text
        text: |-
          11 He will make the discipline of his doctrine clear, and he will glory in the law of the covenant of the Lord.
          12 Many persons will together praise his wisdom, and it will never be abolished, for all ages.
          13 The memory of him will not fade away, and his name will be sought from generation to generation.
          14 The peoples will declare his wisdom, and the Church will announce his praise.
