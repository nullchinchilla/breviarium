          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          O glorious among virgins,
          exalted among the stars,
          you nourish at your milky breast
          him, small, who created you.
      
          What sad Eve took away
          you restore by your holy offspring:
          that the sorrowful may enter the stars,
          you open the hinges of heaven.
      
          You are the gate of the high King
          and the shining hall of light:
          rejoice, O redeemed peoples,
          for life was given through the Virgin.
      
          To Jesus be glory,
          who was born of a Virgin,
          with the Father and the gracious Spirit,
          unto ages of ages.
          Amen.
  hymn.pasch-le-mundo-g-udium-b4a794fcb3:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          With the fair sun of Easter morn
          The world's excelling joy is born,
          When, bright with new and greater grace,
          The Apostles see the Saviour's face.

          They in their Lord's fair flesh descry
          The wounds that shine as stars on high,
          And, wondering, faithful witness bear,
          And all that they have seen declare.

          O Christ, most loving King, we pray,
          Possess our inmost hearts today,
          While grateful lips with glad acclaim
          Sing fervent praises to thy name.

          Lord Jesu, that thou mayest be
          Our Easter joy eternally,
          Our souls from death of sin set free
          That they, new born, may live to thee.

          To God the Father, and the Son,
          From death arisen, praise be done:
          With God the Holy Ghost on high
          Henceforth to all eternity.
          Amen.
      la:
      - type: text
        text: |-
          Paschále mundo gáudium
          Sol núntiat formósior,
          Cum luce fulgéntem nova
          Iesum vident Apóstoli.

          In carne Christi vúlnera
          Micáre tamquam sídera
          Mirántur, et quidquid vident
          Testes fidéles prǽdicant.

          Rex Christe clementíssime,
          Tu corda nostra pósside:
          Ut lingua grates débitas
          Tuo repéndat nómini.

          Ut sis perénne méntibus
          Paschále Iesu gáudium;
          A morte dira críminum
          Vitæ renátos líbera.

          Deo Patri sit glória,
          Et Fílio, qui a mórtuis
          Surréxit, ac Paráclito,
          In sempitérna sǽcula.
          Amen.
