  psalmody.d-mine-quinque-tal-nta-tradid-sti-mihi-ecce-lia-1cb3793de2:
    role: psalmody
    content:
      en:
      - type: antiphon
        text: Lord, Thou deliverest unto me five talents * behold, I have gained beside them five talents more.
      - type: antiphon
        text: Well done, thou good servant, * thou hast been faithful in a very little, enter thou into the joy of thy Lord.
      - type: antiphon
        text: A faithful and wise servant * whom his Lord hath made ruler over His household.
      - type: antiphon
        text: Blessed is that servant * whom his Lord, when He cometh and knocketh at the door, shall find watching.
      - type: antiphon
        text: Thou good and faithful servant, * enter thou into the joy of thy Lord.
      la:
      - type: antiphon
        text: Dómine, quinque talénta * tradidísti mihi, ecce ália quinque superlucrátus sum.
      - type: antiphon
        text: Euge, serve bone * in módico fidélis, intra in gáudium Dómini tui.
      - type: antiphon
        text: Fidélis servus * et prudens, quem constítuit Dóminus super famíliam suam.
      - type: antiphon
        text: Beátus ille servus, * quem, cum vénerit Dóminus eius et pulsáverit iánuam, invénerit vigilántem.
      - type: antiphon
        text: Serve bone * et fidélis, intra in gáudium Dómini tui.
      en2:
      - type: antiphon
        text: 'Lord, you delivered to me * five talents: behold, I have gained five more.'
      - type: antiphon
        text: 'Well done, good servant, * faithful in a little: enter into the joy of your Lord.'
      - type: antiphon
        text: The faithful and prudent servant, * whom the Lord has set over his household.
      - type: antiphon
        text: Blessed is that servant * whom, when his Lord shall come and knock at the door, he shall find watching.
      - type: antiphon
        text: Good * and faithful servant, enter into the joy of your Lord.
