      - type: text
        text: Amen.
  hymn.deus-tu-rum-m-litum-7b2152b686:
    role: hymn
    content:
      la:
      - type: text
        text: Deus tuórum mílitum
      - type: text
        text: Sors, et córona, prǽmium,
      - type: text
        text: Laudes canéntes Mártyris
      - type: text
        text: Absólve nexu críminis.
      - type: text
        text: Hic nempe mundi gáudia,
      - type: text
        text: Et blanda fraudum pábula
      - type: text
        text: Imbúta felle députans,
      - type: text
        text: Pervénit ad cæléstia.
      - type: text
        text: Pœnas cucúrrit fórtiter,
      - type: text
        text: Et sústulit viríliter,
      - type: text
        text: Fundénsque pro te sánguinem,
      - type: text
        text: Ætérna dona póssidet.
      - type: text
        text: Ob hoc precátu súpplici
      - type: text
        text: Te póscimus, piíssime;
      - type: text
        text: In hoc triúmpho Mártyris
      - type: text
        text: Dimítte noxam sérvulis.
      - type: text
        text: '* Laus et perénnis glória'
      - type: text
        text: Patri sit, atque Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.deus-tu-rum-m-litum-94b3db0d97:
    role: hymn
    content:
      en:
      - type: text
        text: O God, of those that fought thy fight,
      - type: text
        text: Portion, and prize, and crown of light,
      - type: text
        text: Break every bond of sin and shame
      - type: text
        text: As now we praise thy martyr's name.
      - type: text
        text: He recked not of the world's allure,
      - type: text
        text: 'But sin and pomp of sin forswore:'
      - type: text
        text: Knew all their gall, and passed them by,
      - type: text
        text: And reached the throne prepared on high.
      - type: text
        text: Bravely the course of pain he ran,
      - type: text
        text: 'And bare his torments as a man:'
      - type: text
        text: For love of thee his blood outpoured,
      - type: text
        text: And thus obtained the great reward.
      - type: text
        text: With humble voice and suppliant word
      - type: text
        text: We pray thee therefore, holy Lord,
      - type: text
        text: While we thy martyr's feast-day keep,
      - type: text
        text: Forgive thy loved and erring sheep.
      - type: text
        text: '* Glory and praise for aye be done'
      - type: text
        text: To God the Father, and the Son,
      - type: text
        text: And Holy Ghost, who reign on high,
      - type: text
        text: One God, to all eternity.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Deus tuórum mílitum
      - type: text
        text: Sors, et córona, prǽmium,
      - type: text
        text: Laudes canéntes Mártyris
      - type: text
        text: Absólve nexu críminis.
      - type: text
        text: Hic nempe mundi gáudia,
      - type: text
        text: Et blanda fraudum pábula
      - type: text
        text: Imbúta felle députans,
      - type: text
        text: Pervénit ad cæléstia.
      - type: text
        text: Pœnas cucúrrit fórtiter,
      - type: text
        text: Et sústulit viríliter,
      - type: text
        text: Fundénsque pro te sánguinem,
      - type: text
        text: Ætérna dona póssidet.
      - type: text
        text: Ob hoc precátu súpplici
      - type: text
        text: Te póscimus, piíssime;
      - type: text
        text: In hoc triúmpho Mártyris
      - type: text
        text: Dimítte noxam sérvulis.
      - type: text
        text: '* Laus et perénnis glória'
      - type: text
        text: Patri sit, atque Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.exs-ltet-orbis-g-udiis-7088d37944:
    role: hymn
    content:
      la:
      - type: text
        text: 'Exsúltet orbis gáudiis:'
      - type: text
        text: 'Cælum resúltet láudibus:'
      - type: text
        text: Apostolórum glóriam
      - type: text
        text: Tellus et astra cóncinunt.
      - type: text
        text: Vos sæculórum iúdices,
      - type: text
        text: 'Et vera mundi lúmina:'
      - type: text
        text: Votis precámur córdium,
      - type: text
        text: Audíte voces súpplicum.
      - type: text
        text: Qui templa cæli cláuditis,
      - type: text
        text: Serásque verbo sólvitis,
      - type: text
        text: Nos a reátu nóxios
      - type: text
        text: Solvi iubéte, quǽsumus.
      - type: text
        text: Præcépta quorum prótinus
      - type: text
        text: 'Languor salúsque séntiunt:'
      - type: text
        text: 'Sanáte mentes lánguidas:'
      - type: text
        text: Augéte nos virtútibus.
      - type: text
        text: Ut, cum redíbit árbiter
      - type: text
        text: In fine Christus sǽculi,
      - type: text
        text: Nos sempitérni gáudii
      - type: text
        text: Concédat esse cómpotes.
      - type: text
        text: '* Patri, simúlque Fílio,'
      - type: text
        text: Tibíque Sancte Spíritus,
      - type: text
        text: Sicut fuit, sit iúgiter
      - type: text
        text: Sæclum per omne glória.
      - type: text
        text: Amen.
  hymn.exs-ltet-orbis-g-udiis-e9ddda99af:
    role: hymn
    content:
      en:
      - type: text
        text: Now let the earth with joy resound,
      - type: text
        text: And heaven the chant re-echo round;
      - type: text
        text: Nor heaven nor earth too high can raise
      - type: text
        text: The great Apostles' glorious praise.
      - type: text
        text: O ye who, throned in glory dread,
      - type: text
        text: Shall judge the living and the dead,
      - type: text
        text: Lights of the world forevermore!
      - type: text
        text: To you the suppliant prayer we pour.
      - type: text
        text: Ye close the sacred gates on high;
      - type: text
        text: 'At your command apart they fly:'
      - type: text
        text: Oh! loose for us the guilty chain
      - type: text
        text: We strive to break, and strive in vain.
      - type: text
        text: Sickness and health your voice obey;
      - type: text
        text: 'At your command they go or stay:'
      - type: text
        text: From sin's disease our souls restore;
      - type: text
        text: In good confirm us more and more.
      - type: text
        text: So when the world is at its end,
      - type: text
        text: And Christ to judgement shall descend,
      - type: text
        text: May we be called those joys to see
      - type: text
        text: Prepared from all eternity.
      - type: text
        text: '* Praise to the Father, with the Son,'
      - type: text
        text: And Holy Spirit, Three in One;
      - type: text
        text: As ever was in ages past,
      - type: text
        text: And so shall be while ages last.
      - type: text
        text: Amen.
      la:
      - type: text
        text: 'Exsúltet orbis gáudiis:'
      - type: text
        text: 'Cælum resúltet láudibus:'
      - type: text
        text: Apostolórum glóriam
      - type: text
        text: Tellus et astra cóncinunt.
      - type: text
        text: Vos sæculórum iúdices,
      - type: text
        text: 'Et vera mundi lúmina:'
      - type: text
        text: Votis precámur córdium,
      - type: text
        text: Audíte voces súpplicum.
      - type: text
        text: Qui templa cæli cláuditis,
      - type: text
        text: Serásque verbo sólvitis,
      - type: text
        text: Nos a reátu nóxios
      - type: text
        text: Solvi iubéte, quǽsumus.
      - type: text
        text: Præcépta quorum prótinus
      - type: text
        text: 'Languor salúsque séntiunt:'
      - type: text
        text: 'Sanáte mentes lánguidas:'
      - type: text
        text: Augéte nos virtútibus.
      - type: text
        text: Ut, cum redíbit árbiter
      - type: text
        text: In fine Christus sǽculi,
      - type: text
        text: Nos sempitérni gáudii
      - type: text
        text: Concédat esse cómpotes.
      - type: text
        text: '* Patri, simúlque Fílio,'
      - type: text
        text: Tibíque Sancte Spíritus,
      - type: text
        text: Sicut fuit, sit iúgiter
      - type: text
        text: Sæclum per omne glória.
      - type: text
        text: Amen.
  hymn.fortem-vir-li-p-ctore-506ed5cbbe:
    role: hymn
    content:
      la:
      - type: text
        text: Fortem viríli péctore
      - type: text
        text: Laudémus omnes féminam,
      - type: text
        text: Quæ sanctitátis glória
      - type: text
        text: Ubíque fulget ínclita.
      - type: text
        text: Hæc sancto amóre sáucia,
      - type: text
        text: Dum mundi amórem nóxium
      - type: text
        text: Horréscit, ad cæléstia
      - type: text
        text: Iter perégit árduum.
      - type: text
        text: Carnem domans ieiúniis,
      - type: text
        text: Dulcíque mentem pábulo
      - type: text
        text: Oratiónis nútriens,
      - type: text
        text: Cæli potítur gáudiis.
      - type: text
        text: Rex Christe, virtus fórtium,
      - type: text
        text: Qui magna solus éfficis,
      - type: text
        text: Huius precátu, quǽsumus,
      - type: text
        text: Audi benígnus súpplices.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc, et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.fortem-vir-li-p-ctore-69b96df905:
    role: hymn
    content:
      en:
      - type: text
        text: High let us all our voices raise
      - type: text
        text: In that heroic woman's praise
      - type: text
        text: Whose name, with saintly glory bright,
      - type: text
        text: Shines in the starry realms of light.
      - type: text
        text: Filled with a pure celestial glow,
      - type: text
        text: She spurned all love of things below;
      - type: text
        text: And heedless here on earth to stay,
      - type: text
        text: Climbed to the skies her toilsome way.
      - type: text
        text: With fasts her body she subdued,
      - type: text
        text: 'But filled her soul with prayer''s sweet food:'
      - type: text
        text: In other worlds she tastes the bliss
      - type: text
        text: For which she left the joys of this.
      - type: text
        text: O Christ, the strength of all the strong;
      - type: text
        text: To whom our holiest deeds belong!
      - type: text
        text: Through her prevailing prayers on high,
      - type: text
        text: In mercy hear thy people's cry!
      - type: text
        text: '* To God the Father, with the Son,'
      - type: text
        text: And Holy Spirit, Three in One,
      - type: text
        text: Be glory while the ages flow,
      - type: text
        text: From all above, and all below.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Fortem viríli péctore
      - type: text
        text: Laudémus omnes féminam,
      - type: text
        text: Quæ sanctitátis glória
      - type: text
        text: Ubíque fulget ínclita.
      - type: text
        text: Hæc sancto amóre sáucia,
      - type: text
        text: Dum mundi amórem nóxium
      - type: text
        text: Horréscit, ad cæléstia
      - type: text
        text: Iter perégit árduum.
      - type: text
        text: Carnem domans ieiúniis,
      - type: text
        text: Dulcíque mentem pábulo
      - type: text
        text: Oratiónis nútriens,
      - type: text
        text: Cæli potítur gáudiis.
      - type: text
        text: Rex Christe, virtus fórtium,
      - type: text
        text: Qui magna solus éfficis,
      - type: text
        text: Huius precátu, quǽsumus,
      - type: text
        text: Audi benígnus súpplices.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Eiúsque soli Fílio,
