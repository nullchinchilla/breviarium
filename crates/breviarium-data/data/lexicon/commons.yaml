  hymn.prima-stropha-sequentis-hymni-dicitur-flexis-gen-57fe64106a:
    role: hymn
    content:
      en:
      - type: rubric
        text: The first verse of the following hymn is said genuflecting.
      - type: text
        text: |-
          Ave, star of ocean,
          Child divine who barest,
          Mother, ever-Virgin,
          Heaven's portal fairest.

          Taking that sweet Ave
          Erst by Gabriel spoken,
          Eva's name reversing,
          Be of peace the token.

          Break the sinners' fetters,
          Light to blind restoring,
          All our ills dispelling,
          Every boon imploring.

          Show thyself a mother
          In thy supplication;
          He will hear who chose thee
          At his incarnation.

          Maid all maids excelling,
          Passing meek and lowly,
          Win for sinners pardon,
          Make us chaste and holy.

          As we onward journey
          Aid our weak endeavour,
          Till we gaze on Jesus
          And rejoice forever.

          Father, Son, and Spirit,
          Three in One confessing,
          Give we equal glory
          Equal praise and blessing.
          Amen.
      la:
      - type: rubric
        text: Prima stropha sequentis hymni dicitur flexis genibus.
      - type: text
        text: |-
          Ave maris stella,
          Dei Mater alma,
          Atque semper Virgo,
          Felix cæli porta.

          Sumens illud Ave
          Gabriélis ore,
          Funda nos in pace,
          Mutans Hevæ nomen.

          Solve vincla reis,
          Profer lumen cæcis,
          Mala nostra pelle,
          Bona cuncta posce.

          Monstra te esse matrem,
          Sumat per te preces,
          Qui pro nobis natus,
          Tulit esse tuus.

          Virgo singuláris,
          Inter omnes mitis,
          Nos culpis solútos
          Mites fac et castos.

          Vitam præsta puram,
          Iter para tutum,
          Ut vidéntes Iesum,
          Semper collætémur.

          Sit laus Deo Patri,
          Summo Christo decus,
          Spirítui Sancto,
          Tribus honor unus.
          Amen.
