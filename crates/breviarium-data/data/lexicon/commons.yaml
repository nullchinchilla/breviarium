  hymn.pasch-le-mundo-g-udium-d1e9fd8ecf:
    role: hymn
    content:
      en:
      - type: text
        text: With the fair sun of Easter morn
      - type: text
        text: The world's excelling joy is born,
      - type: text
        text: When, bright with new and greater grace,
      - type: text
        text: The Apostles see the Saviour's face.
      - type: text
        text: They in their Lord's fair flesh descry
      - type: text
        text: The wounds that shine as stars on high,
      - type: text
        text: And, wondering, faithful witness bear,
      - type: text
        text: And all that they have seen declare.
      - type: text
        text: O Christ, most loving King, we pray,
      - type: text
        text: Possess our inmost hearts today,
      - type: text
        text: While grateful lips with glad acclaim
      - type: text
        text: Sing fervent praises to thy name.
      - type: text
        text: Lord Jesu, that thou mayest be
      - type: text
        text: Our Easter joy eternally,
      - type: text
        text: Our souls from death of sin set free
      - type: text
        text: That they, new born, may live to thee.
      - type: text
        text: '* To God the Father, and the Son,'
      - type: text
        text: 'From death arisen, praise be done:'
      - type: text
        text: With God the Holy Ghost on high
      - type: text
        text: Henceforth to all eternity.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Paschále mundo gáudium
      - type: text
        text: Sol núntiat formósior,
      - type: text
        text: Cum luce fulgéntem nova
      - type: text
        text: Iesum vident Apóstoli.
      - type: text
        text: In carne Christi vúlnera
      - type: text
        text: Micáre tamquam sídera
      - type: text
        text: Mirántur, et quidquid vident
      - type: text
        text: Testes fidéles prǽdicant.
      - type: text
        text: Rex Christe clementíssime,
      - type: text
        text: 'Tu corda nostra pósside:'
      - type: text
        text: Ut lingua grates débitas
      - type: text
        text: Tuo repéndat nómini.
      - type: text
        text: Ut sis perénne méntibus
      - type: text
        text: Paschále Iesu gáudium;
      - type: text
        text: A morte dira críminum
      - type: text
        text: Vitæ renátos líbera.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Et Fílio, qui a mórtuis
      - type: text
        text: Surréxit, ac Paráclito,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.prima-stropha-sequentis-hymni-dicitur-flexis-gen-57fe64106a:
    role: hymn
    content:
      en:
      - type: rubric
        text: The first verse of the following hymn is said genuflecting.
      - type: text
        text: Ave, star of ocean,
      - type: text
        text: Child divine who barest,
      - type: text
        text: Mother, ever-Virgin,
      - type: text
        text: Heaven's portal fairest.
      - type: text
        text: Taking that sweet Ave
      - type: text
        text: Erst by Gabriel spoken,
      - type: text
        text: Eva's name reversing,
      - type: text
        text: Be of peace the token.
      - type: text
        text: Break the sinners' fetters,
      - type: text
        text: Light to blind restoring,
      - type: text
        text: All our ills dispelling,
      - type: text
        text: Every boon imploring.
      - type: text
        text: Show thyself a mother
      - type: text
        text: In thy supplication;
      - type: text
        text: He will hear who chose thee
      - type: text
        text: At his incarnation.
      - type: text
        text: Maid all maids excelling,
      - type: text
        text: Passing meek and lowly,
      - type: text
        text: Win for sinners pardon,
      - type: text
        text: Make us chaste and holy.
      - type: text
        text: As we onward journey
      - type: text
        text: Aid our weak endeavour,
      - type: text
        text: Till we gaze on Jesus
      - type: text
        text: And rejoice forever.
      - type: text
        text: Father, Son, and Spirit,
      - type: text
        text: Three in One confessing,
      - type: text
        text: Give we equal glory
      - type: text
        text: Equal praise and blessing.
      - type: text
        text: Amen.
      la:
      - type: rubric
        text: Prima stropha sequentis hymni dicitur flexis genibus.
      - type: text
        text: Ave maris stella,
      - type: text
        text: Dei Mater alma,
      - type: text
        text: Atque semper Virgo,
      - type: text
        text: Felix cæli porta.
      - type: text
        text: Sumens illud Ave
      - type: text
        text: Gabriélis ore,
      - type: text
        text: Funda nos in pace,
      - type: text
        text: Mutans Hevæ nomen.
      - type: text
        text: Solve vincla reis,
      - type: text
        text: Profer lumen cæcis,
      - type: text
        text: Mala nostra pelle,
      - type: text
        text: Bona cuncta posce.
      - type: text
        text: Monstra te esse matrem,
      - type: text
        text: Sumat per te preces,
      - type: text
        text: Qui pro nobis natus,
      - type: text
        text: Tulit esse tuus.
      - type: text
        text: Virgo singuláris,
      - type: text
        text: Inter omnes mitis,
      - type: text
        text: Nos culpis solútos
      - type: text
        text: Mites fac et castos.
      - type: text
        text: Vitam præsta puram,
      - type: text
        text: Iter para tutum,
      - type: text
        text: Ut vidéntes Iesum,
      - type: text
        text: Semper collætémur.
      - type: text
        text: Sit laus Deo Patri,
      - type: text
        text: Summo Christo decus,
      - type: text
        text: Spirítui Sancto,
      - type: text
        text: Tribus honor unus.
      - type: text
        text: Amen.
  hymn.prima-stropha-sequentis-hymni-dicitur-flexis-gen-c5830fa128:
