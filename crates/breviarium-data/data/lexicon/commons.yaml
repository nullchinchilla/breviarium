          Cum Spíritu Paráclito,
          Nunc, et per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          O glorious King of Martyrs,
          crown of confessors,
          who lead those who spurn earthly things
          to the things of heaven:
      
          straightway turn your gracious ear
          to our voices:
          we sing of sacred trophies:
          forgive what we have done wrong.
      
          You conquer among the Martyrs
          and are merciful to confessors:
          conquer also our sins,
          O bestower of pardon.
      
          Let glory be to God the Father,
          and to his only Son,
          with the Spirit the Paraclete,
          now and through every age.
          Amen.
  hymn.s-vo-dol-rum-turbine-4ac1bdc142:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Sævo dolórum turbine
          Iactatur, atris óbrutus
          Pœnis, acerba sustinens,
          Redémptor affixus Cruci.

          Pedes manúsque horribili
          Clavi cruentant vúlnere;
          Cor, vultus, artus, pectora
          Sacro redundant sánguine.

          Flet, orat, et clamans obit;
          Cor Matris ictum concídit;
          Heu Mater! Heu Fili! dolor
          Ingrata frangat pectora.

          Montes, sepúlcra, saxaque
          Scinduntur; arva, flúmina,
          Rupes, et æquor contremunt,
          Templique velum scinditur.

          Sol, luna, cælum, sidera
          Plangunt, et Orbis ingemit.
          O vos viri, vos párvuli,
          Nuptæ, puéllæ, plangite,

          Adstate mœrentes Cruci,
          Pedes beátos ungite,
          Lavate fletu, tergite
          Comis, et ore lambite.

          Tu, caritátis victima,
          Ut nostra tollas crímina,
          Nobis salubri perficis
          Adoptiónem Sánguine.

          Nostra ergo pax et gáudium,
          Sis vita, Iesu, et prǽmium,
          Sis ductor et lux in via,
          Merces, coróna in Pátria.
          Amen.
      en2:
      - type: text
        text: |-
          The Redeemer is tossed by the fierce whirlwind of sorrows,
          overwhelmed by dark punishments,
          bearing bitter suffering,
          nailed to the Cross.
      
          Feet and hands are bloodied
          by the horrible wound of the nail;
          heart, face, limbs, and breast
          overflow with sacred blood.
      
          He weeps, he prays, and crying out he dies;
          the stricken heart of his Mother falters;
          alas, Mother! alas, Son! let this grief
          break ungrateful hearts.
      
          Mountains, tombs, and rocks
          are split; fields, rivers,
          cliffs, and the sea tremble,
          and the veil of the Temple is torn.
      
          Sun, moon, sky, and stars
          mourned, and the world groans.
          O you men, you little ones,
          O wives, maidens, weep,
      
          stand in sorrow at the Cross,
          anoint his blessed feet,
          wash them with tears, dry them
          with your hair, and kiss them with your lips.
      
          You, the victim of charity,
          that you might take away our sins,
          accomplish for us, by your saving Blood,
          our adoption.
      
          Be therefore our peace and joy,
          be our life, O Jesus, and our reward,
          be our guide and light on the way,
          our recompense and crown in our homeland.
          Amen.
  hymn.sanct-rum-m-ritis-nclita-g-udia-e5a1690b10:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Sanctórum méritis ínclita gáudia
          Pangámus, sócii, géstaque fórtia:
          Gliscens fert ánimus prómere cántibus
          Victórum genus óptimum.

          Hi sunt, quos fátue mundus abhórruit;
          Hunc fructu vácuum, flóribus áridum
          Contempsére tui nóminis ásseclæ
          Iesu, Rex bone cǽlitum.

          Hi pro te fúrias, atque minas truces
          Calcárunt hóminum, sǽvaque vérbera:
          His cessit lácerans fórtiter úngula,
          Nec carpsit penetrália.

          Cædúntur gládiis more bidéntium:
          Non murmur résonat, non quærimónia;
          Sed corde impávido mens bene cónscia
          Consérvat patiéntiam.

          Quæ vox, quæ póterit lingua retéxere,
          Quæ tu Martýribus múnera prǽparas?
          Rubri nam flúido sánguine fúlgidis
          Cingunt témpora láureis.

          Te, summa o Déitas, únaque póscimus;
          Ut culpas ábigas, nóxia súbtrahas,
          Des pacem fámulis; ut tibi glóriam,
          Annórum in sériem, canant.
          Amen.
      en2:
      - type: text
        text: |-
          Let us sing together
          the renowned joys of the Saints,
          their deeds and brave acts:
          an eager heart urges to set forth in song
          the noblest kind of victors.
      
          These are they whom the foolish world abhorred;
          this fruit-barren, flower-dry world
          was despised by the followers of your name,
          O Jesus, good King of heaven.
      
          For you they trod underfoot
          the frenzies and savage threats of men
          and cruel stripes:
          the tearing hook vigorously yielded to them
          and did not pierce their inmost parts.
      
          They are cut down by swords as sheep:
          no murmur resounds, no complaint;
          but with undaunted heart, a well-formed conscience
          preserves their patience.
      
          What voice, what tongue will be able to recount
          the gifts you prepare for the Martyrs?
          For with laurels bright with flowing crimson blood
          they encircle their temples.
      
          You, O supreme and only Deity, we beseech;
          that you drive away our sins and remove our harmful deeds,
          grant peace to your servants; that to you they may sing glory
          through the succession of years.
          Amen.
  hymn.sanct-rum-m-ritis-nclita-g-udia-f380705de9:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Sing, O sons of the Church sounding the martyrs' praise!
          God's true soldiers applaud, who, in their weary days,
          Won bright trophies of good, glad be the voice ye raise,
          While these heroes of Christ ye sing!

          They, while yet in the world were by the world abhorred;
          Felt how fading the joys, fleeting the wealth it stored;
          Spurned all pleasure for thee, and at thy call, O Lord,
          Came forth strong in thy name, as King.

          Lord, how bravely they bore fury and pain for thee!
          Scourge, rod, sword, and the rack strongly endured; but free
          Sang out, bold in thy love, longing on high to be;
          Earth's might never their souls could bend.

          While they, shedding their blood, victims for Jesus fell,
          No sound out of their lips came of their throes to tell;
          Bowed low, patient and meek, loving the Lord so well,
          Turned they still to the Christ, their friend.

          What joys, bright with the blood shed for thy love they share,
          Those brave martyrs of thine crowned with thy laurels rare;
          Man's tongue never can tell, never can half declare,
          How pure now is their bliss above!

          Yet we, Father on high, God of eternal might,
          Lift weak voices in prayer asking for peace and light;
          Cleanse thou out of our hearts every stain and blight,
          So our songs may be songs of love.
          Amen.
