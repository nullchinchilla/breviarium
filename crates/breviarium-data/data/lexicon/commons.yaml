      en2:
      - type: text
        text: From the Commentary of Pope Saint Gregory on the Prophet Ezekiel
      - type: citation
        text: Homilia 3, Lib. 1
      - type: text
        text: 'The four holy living creatures, which are foreseen by the spirit of prophecy as future realities, are described with subtle narration, when it is said: Four faces to each one, and four wings to each one. What is expressed by the face, but knowledge; and what by the wings, but flight? For by the face each one is recognized; by the wings, the bodies of birds are lifted into the heights. The face, therefore, pertains to faith, the wing to contemplation. For by faith we are known to almighty God, as he himself says of his sheep: I am the good shepherd, and I know my sheep, and my sheep know me. Who says again: I know those whom I have chosen. By contemplation, however, by which we are lifted above ourselves, we are raised as it were into the air.'
  reading.de-libro-ecclesi-stici-1fde89b0e8:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the book of Ecclesiasticus
      - type: citation
        text: Sir 31:8-11
      - type: text
        text: |-
          8 Blessed is the rich man that is found without blemish: and that hath not gone after gold, nor put his trust in money nor in treasures.
          9 Who is he, and we will praise him? for he hath done wonderful things in his life.
          10 Who hath been tried thereby, and made perfect, he shall have glory everlasting. He that could have transgressed, and hath not transgressed: and could do evil things, and hath not done them:
          11 Therefore are his goods established in the Lord, and all the church of the saints shall declare his alms
      la:
      - type: text
        text: De libro Ecclesiástici
      - type: citation
        text: Sir 39:1-5
      - type: text
        text: |-
          1 Sapiéntiam ómnium antiquórum exquíret sápiens, et in prophétis vacábit.
          2 Narratiónem virórum nominatórum conservábit, et in versútias parabolárum simul introíbit.
          3 Occúlta proverbiórum exquíret, et in abscónditis parabolárum conversábitur.
          4 In médio magnatórum ministrábit, et in conspéctu prǽsidis apparébit.
          5 In terram alienigenárum géntium pertránsiet; bona enim et mala in homínibus tentábit.
      en2:
      - type: text
        text: From the Book of Sirach
      - type: citation
        text: Sir 39:1-5
      - type: text
        text: |-
          1 A wise man will seek the wisdom of all the ancients, and he will be occupied in the prophets.
          2 He will preserve the words of renowned men, and he will enter with them into the subtleties of parables.
          3 He will search for the hidden meanings of proverbs, and he will become familiar with the mysteries of parables.
          4 He will minister in the midst of great men, and he will appear in the sight of the foremost leader.
          5 He will pass through the land of foreign nations. For he will test good and evil among men.
