    role: reading
    content:
      en:
      - type: citation
        text: Sir 24:15-16
      - type: text
        text: 15 And so was I established in Sion, and in the holy city likewise I rested, and my power was in Jerusalem.
      - type: text
        text: 16 And I took root in an honourable people, and in the portion of my God his inheritance, and my abode is in the full assembly of saints.
      la:
      - type: citation
        text: Sir 24:15-16
      - type: text
        text: 15 Et sic in Sion firmáta sum, et in civitáte sanctificáta simíliter requiévi, et in Ierúsalem potéstas mea.
      - type: text
        text: 16 Et radicávi in pópulo honorificáto, et in parte Dei mei heréditas illíus, et in plenitúdine sanctórum deténtio mea.
