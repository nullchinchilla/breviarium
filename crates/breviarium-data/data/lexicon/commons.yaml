  responsory.abst-rget-deus-omnem-l-crimam-ab-culis-sanct-rum-63fbda5fd2:
    role: responsory
    content:
      la:
      - type: response
        text: 'Abstérget Deus omnem lácrimam ab óculis Sanctórum: et iam non erit ámplius neque luctus, neque clamor, sed nec ullus dolor:'
      - type: text
        text: '* Quóniam prióra transiérunt.'
      - type: versicle
        text: Non esúrient, neque sítient ámplius, neque cadet super illos sol, neque ullus æstus.
      - type: response
        text: Quóniam prióra transiérunt.
  responsory.abst-rget-deus-omnem-l-crimam-ab-culis-sanct-rum-6bd30c6871:
    role: responsory
    content:
      en:
      - type: response
        text: God shall wipe away all tears from the eyes of His Saints, and there shall be no more sorrow, there shall be no more death, neither sorrow, nor crying, neither shall there be any more pain;
      - type: text
        text: '* For the former things are passed away.'
      - type: versicle
        text: They shall hunger no more, neither thirst any more, neither shall the sun light on them, nor any heat.
      - type: response
        text: For the former things are passed away.
      la:
      - type: response
        text: 'Abstérget Deus omnem lácrimam ab óculis Sanctórum: et iam non erit ámplius neque luctus, neque clamor, sed nec ullus dolor:'
      - type: text
        text: '* Quóniam prióra transiérunt.'
      - type: versicle
        text: Non esúrient, neque sítient ámplius, neque cadet super illos sol, neque ullus æstus.
      - type: response
        text: Quóniam prióra transiérunt.
  responsory.affer-ntur-regi-v-rgines-post-eam-pr-xim-eius-883cbaf479:
    role: responsory
    content:
      en:
      - type: response
        text: After her shall virgins be brought unto the King, her fellows
      - type: text
        text: '* They shall be brought unto thee with gladness and rejoicing.'
      - type: versicle
        text: In thy comeliness and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: They shall be brought unto thee with gladness and rejoicing.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: They shall be brought unto thee with gladness and rejoicing.
      la:
      - type: response
        text: Afferéntur Regi vírgines post eam, próximæ eius;
      - type: text
        text: '* Afferéntur tibi in lætítia et exsultatióne.'
      - type: versicle
        text: Spécie tua et pulchritúdine tua; inténde, próspere procéde, et regna.
      - type: response
        text: Afferéntur tibi in lætítia et exsultatióne.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Afferéntur tibi in lætítia et exsultatióne.
  responsory.am-vit-eum-d-minus-et-orn-vit-eum-stolam-gl-ri-n-0aa0011eca:
    role: responsory
    content:
      en:
      - type: response
        text: The Lord loved him and beautified him He clothed him with a robe of glory
      - type: text
        text: '* And crowned him at the gates of Paradise.'
      - type: versicle
        text: The Lord hath put on him the breast-plate of faith, and hath adorned him.
      - type: response
        text: And crowned him at the gates of Paradise.
      la:
      - type: response
        text: 'Amávit eum Dóminus, et ornávit eum: stolam glóriæ índuit eum,'
      - type: text
        text: '* Et ad portas paradísi coronávit eum.'
      - type: versicle
        text: Induit eum Dóminus lorícam fídei, et ornávit eum.
      - type: response
        text: Et ad portas paradísi coronávit eum.
  responsory.am-vit-eum-d-minus-et-orn-vit-eum-stolam-gl-ri-n-a6c85bc614:
    role: responsory
    content:
      en:
      - type: response
        text: The Lord loved him and beautified him; He clothed him with a robe of glory,
      - type: text
        text: '* And crowned him at the gates of Paradise.'
      - type: versicle
        text: The Lord hath put on him the breast-plate of faith, and hath adorned him.
      - type: response
        text: And crowned him at the gates of Paradise.
