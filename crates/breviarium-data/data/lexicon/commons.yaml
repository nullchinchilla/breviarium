  reading.s-milis-huic-v-dua-velut-em-ritis-veter-na-stip-28a1f9d5f3:
    role: reading
    content:
      en:
      - type: text
        text: Like to these is a widow, a veteran retiring to rest upon the earned rewards of her chastity, and who, albeit she layeth down the arms of wifehood, still ruleth the order of all her household albeit she be at rest from bearing burdens, she is careful in the marriage of her youngers, and with the wisdom of age chooseth what study is the most useful, what fruit is the richest, what wedlock is the meetest. And so, if the government of the field be given more to the elder than to the younger, wherefore shouldest thou hold that a wife is more useful than a widow? But if they which persecuted the faith persecuted also widowhood, then, surely, in the eyes of them which hold the faith, must widowhood be looked upon as a reward, rather than shrunk from as a punishment.
      la:
      - type: text
        text: Símilis huic vídua, velut eméritis veterána stipéndiis castitátis, et si coniúgii arma depónat, domus tamen totíus pacem gubérnat; et si vehéndis onéribus otiósa, maritándis tamen iunióribus próvida, ubi cultus utílior, ubi fructus ubérior sit, quarum cópulam aptiórem seníli gravitáte dispónit. Itaque, si maturióribus quam iunióribus commítitur ager, cur putes utiliórem nuptam esse quam víduam? Quod, si persecutóres fídei persecutóres fuérunt étiam viduitátis; útique fidem sequéntibus vidúitas non pro supplício fugiénda est, sed tenénda pro prǽmio.
  reading.sed-ad-h-c-aud-ta-inard-scit-nimus-iamque-illic-0d03e0432c:
    role: reading
    content:
      la:
      - type: text
        text: 'Sed ad hæc audíta inardéscit ánimus, iamque illic cupit assístere, ubi se sperat sine fine gaudére. Sed ad magna prǽmia perveníri non potest, nisi per magnos labóres. Unde et Paulus egrégius prædicátor dicit: Non coronábitur, nisi qui legítime certáverit. Deléctet ergo mentem magnitúdo præmiórum, sed non detérreat certámen labórum. Unde ad se veniéntibus Véritas dicit: Si quis venit ad me, et non odit patrem suum, et matrem, et uxórem, et fílios, et fratres, et soróres, adhuc autem et ánimam suam, non potest meus esse discípulus.'
  reading.sed-ad-h-c-aud-ta-inard-scit-nimus-iamque-illic-ce78d13911:
    role: reading
    content:
      en:
      - type: citation
        text: 'Then we hear these things our hearts burn within us and we long to be already there, where we hope to rejoice for ever. But we cannot attain unto great rewards, save through great labour. Therefore saith the excellent preacher Paul: “He is not crowned, except he strive lawfully.” (2 Tim. ii. 5.) The greatness of the reward doth delight our mind let not the throes of the struggle dishearten us. Therefore the Truth saith unto every one that cometh unto Him “If any man come to Me, and hate not his father and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple.”'
      la:
      - type: text
        text: 'Sed ad hæc audíta inardéscit ánimus, iamque illic cupit assístere, ubi se sperat sine fine gaudére. Sed ad magna prǽmia perveníri non potest, nisi per magnos labóres. Unde et Paulus egrégius prædicátor dicit: Non coronábitur, nisi qui legítime certáverit. Deléctet ergo mentem magnitúdo præmiórum, sed non detérreat certámen labórum. Unde ad se veniéntibus Véritas dicit: Si quis venit ad me, et non odit patrem suum, et matrem, et uxórem, et fílios, et fratres, et soróres, adhuc autem et ánimam suam, non potest meus esse discípulus.'
  reading.sed-cum-tot-signa-perturbati-nis-dicta-sint-op-r-3b09115284:
    role: reading
    content:
      en:
      - type: citation
        text: 'But, forasmuch as the signs and troubles whereof the Lord speaketh are so manifold, we must needs shortly consider each for, of necessity, we must suffer some things from heaven, some from the earth, some from the powers of nature, and some from men. For where He saith Nation shall rise against nation He speaketh concerning the troubling of men where great earthquakes shall be in diverse places concerning wrath from above: where: and pestilences concerning the frailty of the body where and famines concerning the barrenness of the earth: where fearful signs from heaven, and tempests concerning commotions of the air. As, then, all things shall have an end, so, before the end, shall all things be troubled and we who have sinned and come short in all things, shall in all things be afflicted, that it may be fulfilled that is written: and the world shall fight with Him against the unwise. (Wisd v. 21.)'
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
      - type: text
        text: O Lord, have mercy upon us, * have mercy upon us.
      - type: text
        text: O Lord, let thy mercy lighten upon us, * as our trust is in thee.
      - type: text
        text: O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: 'Sed cum tot signa perturbatiónis dicta sint, opórtet, ut eórum consideratiónem bréviter per síngula perstringámus: quia necésse est, ut ália e cælo, ália e terra, ália ab eleméntis, ália ab homínibus patiámur. Ait enim: Surget gens contra gentem, ecce perturbátio hóminum: erunt terræmótus magni per loca, ecce respéctus iræ désuper: erunt pestiléntiæ ecce inæquálitas córporum: erit fames, ecce sterílitas terræ: terrorésque de cælo et tempestátes, ecce inæquálitas áëris. Quia ergo ómnia consummánda sunt, ante consummatiónem ómnia perturbántur: et qui in cunctis delíquimus, in cunctis ferímur: ut impleátur quod dícitur, Et pugnábit pro eo orbis terrárum contra insensátos.'
      - type: text
        text: 'Te Deum laudámus: * te Dóminum confitémur.'
      - type: text
        text: Te ætérnum Patrem * omnis terra venerátur.
      - type: text
        text: 'Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:'
      - type: text
        text: 'Tibi Chérubim et Séraphim * incessábili voce proclámant:'
      - type: text
        text: (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
      - type: text
        text: Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
      - type: text
        text: Te gloriósus * Apostolórum chorus,
      - type: text
        text: Te Prophetárum * laudábilis númerus,
      - type: text
        text: Te Mártyrum candidátus * laudat exércitus.
      - type: text
        text: Te per orbem terrárum * sancta confitétur Ecclésia,
      - type: text
        text: Patrem * imménsæ maiestátis;
      - type: text
        text: Venerándum tuum verum * et únicum Fílium;
      - type: text
        text: Sanctum quoque * Paráclitum Spíritum.
      - type: text
        text: Tu Rex glóriæ, * Christe.
      - type: text
        text: Tu Patris * sempitérnus es Fílius.
      - type: text
        text: '(Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: 'Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
      - type: text
        text: Tu ad déxteram Dei sedes, * in glória Patris.
      - type: text
        text: Iudex créderis * esse ventúrus.
      - type: text
        text: (Sequens versus dicitur flexis genibus) ~
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória numerári.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória munerári.
      - type: text
        text: Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
      - type: text
        text: Et rege eos, * et extólle illos usque in ætérnum.
      - type: text
        text: Per síngulos dies * benedícimus te.
      - type: text
        text: (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Dignáre, Dómine, die isto * sine peccáto nos custodíre.
      - type: text
        text: Miserére nostri, Dómine, * miserére nostri.
      - type: text
        text: Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
      - type: text
        text: 'In te, Dómine, sperávi: * non confúndar in ætérnum.'
