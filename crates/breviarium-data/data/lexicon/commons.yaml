  chapter.is-53-4b2e66527c:
    role: chapter
    content:
      la:
      - type: heading
        text: Is 53
      - type: text
        text: 'Generatiónem eius quis enarrabit? Quia abscissus est de terra vivéntium: propter scelus pópuli mei percússi eum.'
      - type: response
        text: Deo grátias.
  chapter.isa-11-1-2-58c0bfdfaf:
    role: chapter
    content:
      la:
      - type: citation
        text: Isa 11:1-2
      - type: text
