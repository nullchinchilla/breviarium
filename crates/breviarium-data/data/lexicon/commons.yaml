        text: 'In the heavenly kingdoms * is the dwelling of the Saints, alleluia: and their rest is for ever, alleluia.'
      - type: antiphon
        text: Beneath the veil * your Saints cried out, O Lord, alleluia, alleluia, alleluia.
      - type: antiphon
        text: O spirits and souls * of the just, sing a hymn to our God, alleluia, alleluia.
      - type: antiphon
        text: The just will shine * like the sun in the sight of God, alleluia.
  psalmody.secus-dec-rsus-aqu-rum-plant-vit-v-neam-iust-rum-a4ba43f78f:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: By the rivers of water * hath the Lord planted the vineyard of the righteous, and in His Law do they meditate day and night.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: As gold in the furnace * hath the Lord tried His chosen ones, and received them for ever as a burnt-offering.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: Though the elect be punished * in the sight of men, yet is their hope full of immortality for ever.
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: I will give unto My Saints a place * in the kingdom of My Father, every one by his own name, saith the Lord.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: To the Saints that are in the earth * Thou hast made all my counsels admirable.
        psalms:
        - number: '15'
      - type: psalmody
        antiphon: The Saints that wait upon the Lord * shall renew their strength; they shall mount up with wings as eagles, they shall fly and not faint.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: The righteous live * for evermore; their reward also is with the Lord.
        psalms:
        - number: '32'
      - type: psalmody
        antiphon: They gave up their bodies unto death * rather than serve idols and therefore have they crowns on their heads and palms in their hands.
        psalms:
        - number: '33'
      - type: psalmody
        antiphon: Behold, how great with God is the reward * of His Saints; yea, they who died for Christ's sake shall live for ever and ever.
        psalms:
        - number: '45'
      la:
      - type: psalmody
        antiphon: Secus decúrsus aquárum * plantávit víneam iustórum, et in lege Dómini fuit volúntas eórum.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: 'Tamquam aurum * in fornáce probávit eléctos Dóminus: et quasi holocáusta accépit eos in ætérnum.'
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: Si coram homínibus * torménta passi sunt, spes electórum est immortális in ætérnum.
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: Dabo Sanctis meis * locum nominátum in regno Patris mei, dicit Dóminus.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: Sanctis, qui in terra sunt eius, * mirificávit omnes voluntátes meas inter illos.
        psalms:
        - number: '15'
      - type: psalmody
        antiphon: Sancti qui sperant in Dómino, * habébunt fortitúdinem, assúment pennas ut áquilæ, volábunt, et non defícient.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: Iusti autem * in perpétuum vivent, et apud Dóminum est merces eórum.
        psalms:
        - number: '32'
      - type: psalmody
        antiphon: 'Tradidérunt * córpora sua in mortem, ne servírent idólis: ídeo coronáti póssident palmam.'
        psalms:
        - number: '33'
      - type: psalmody
        antiphon: 'Ecce merces * Sanctórum copiósa est apud Deum: ipsi vero mórtui sunt pro Christo, et vivent in ætérnum.'
        psalms:
        - number: '45'
      en2:
      - type: psalmody
        antiphon: Beside the running waters * he planted the vineyard of the just, and in the law of the Lord was their delight.
        psalms:
        - number: '1'
