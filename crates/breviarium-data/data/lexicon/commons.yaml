      - type: citation
        text: 3 non vinoléntum, non percussórem, sed modéstum; non litigiósum, non cúpidum, sed
      - type: text
        text: 4 suæ dómui bene præpósitum, fílios habéntem súbditos cum omni castitáte.
      - type: text
        text: 5 Si quis autem dómui suæ præésse nescit, quómodo Ecclésiæ Dei diligéntiam habébit?
      - type: text
        text: 6 Non neóphytum, ne in supérbiam elátus, in iudícium íncidat diáboli.
      - type: text
        text: 7 Opórtet autem illum et testimónium habére bonum ab iis qui foris sunt, ut non in oppróbrium íncidat, et in láqueum diáboli.
  reading.de-epistola-beati-pauli-apostoli-ad-romanos-b55b55ed4c:
    role: reading
    content:
      la:
      - type: text
        text: De Epistola beati Pauli Apostoli ad Romanos.
      - type: citation
        text: Rm 5:8-11,17
      - type: citation
        text: '8 Comméndat caritátem suam Deus in nobis: quóniam cum adhuc peccatóres essémus, secúndum tempus,'
      - type: citation
        text: '9 Christus pro nobis mórtuus est: multo ígitur magis nunc iustificáti in sánguine ipsíus, salvi érimus ab ira per ipsum.'
      - type: citation
        text: '10 Si enim cum inimíci essémus, reconciliáti sumus Deo per mortem Fílii eius: multo magis reconciliáti, salvi érimus in vita ipsíus.'
      - type: citation
        text: '11 Non solum autem: sed et gloriámur in Deo per Dóminum nostrum Iesum Christum, per quem nunc reconciliatiónem accépimus.'
      - type: citation
        text: '17 Si enim uníus delícto mors regnávit per unum: multo magis abundántiam grátiæ, et donatiónis, et iustítiæ accipiéntes, in vita regnábunt per unum Iesum Christum.'
  reading.de-expositi-ne-sancti-greg-rii-pap-super-ezechi-5b4a1778df:
    role: reading
    content:
      en:
      - type: text
        text: Sermon of St. Gregory, Pope
      - type: heading
        text: Sermon 30 on the Gospels
      - type: citation
        text: 'It is written: By His Spirit the Lord hath adorned the heavens. (Job xxvi. 13.) Now the ornament of the heavens are the godly powers of preachers, and this ornament, what it is, Paul teacheth us thus To one is given by the Spirit the word of wisdom, to another the word of knowledge by the same Spirit; to another faith by the same Spirit; to another the gifts of healing by the same Spirit, to another the working of miracles, to another prophecy, to another discerning of spirits, to another diverse kinds of tongues, to another the interpretation of tongues. But all these worketh that one and the self-same Spirit, dividing to every man severally as He will. (1 Cor. xii. 8.)'
      la:
      - type: text
        text: De Expositióne sancti Gregórii Papæ super Ezechiélem Prophétam
      - type: heading
        text: Homilia 3, Lib. 1
      - type: text
        text: 'Sancta quátuor animália, quæ prophetíæ spíritu futúra prævidéntur, subtíli narratióne describúntur, cum dícitur: Quátuor fácies uni, et quátuor pennæ uni. Quid per fáciem, nisi notítia; et quid per pennas, nisi volátus exprímitur? Per fáciem quippe unusquísque cognóscitur: per pennas vero in altum ávium córpora sublevántur. Fácies ítaque ad fidem pértinet, penna ad contemplatiónem. Per fidem namque ab omnipoténti Deo cognóscimur, sicut ipse de suis óvibus dicit: Ego sum pastor bonus, et cognósco oves meas, et cognóscunt me meæ. Qui rursus ait: Ego scio quos elégerim. Per contemplatiónem vero, qua super nosmetípsos tóllimur, quasi in áëra levámur.'
  reading.de-expositi-ne-sancti-greg-rii-pap-super-ezechi-e0babe4888:
    role: reading
    content:
      en:
      - type: text
        text: From the Exposition of the Book of the Prophet Ezekiel by Pope St. Gregory (the Great.)
      - type: heading
        text: Hom. 3, Bk. I
      - type: citation
        text: 'The Prophet writeth very minutely touching the four holy living creatures, whom he saw in the spirit as being to come. He saith: “Every one had four faces, and every one had four wings.” What signifieth the face save likeness whereby we are known? or wings, save the power to fly since it is by the face that man is known from man, and by their wings that the birds'' bodies are carried up into the air. So the face pertaineth to certitude, and the wings to contemplation. With certitude we are known of God Almighty, Who saith: “I am the Good Shepherd, and know My sheep, and am known of Mine.” (John x. 14.) And again: “I know whom I have chosen.” (xiii. 18.) And by contemplation, whereby we rise above ourselves, we as it were fly heavenwards.'
      la:
      - type: text
        text: De Expositióne sancti Gregórii Papæ super Ezechiélem Prophétam
      - type: heading
        text: Homilia 3, Lib. 1
      - type: text
        text: 'Sancta quátuor animália, quæ prophetíæ spíritu futúra prævidéntur, subtíli narratióne describúntur, cum dícitur: Quátuor fácies uni, et quátuor pennæ uni. Quid per fáciem, nisi notítia; et quid per pennas, nisi volátus exprímitur? Per fáciem quippe unusquísque cognóscitur: per pennas vero in altum ávium córpora sublevántur. Fácies ítaque ad fidem pértinet, penna ad contemplatiónem. Per fidem namque ab omnipoténti Deo cognóscimur, sicut ipse de suis óvibus dicit: Ego sum pastor bonus, et cognósco oves meas, et cognóscunt me meæ. Qui rursus ait: Ego scio quos elégerim. Per contemplatiónem vero, qua super nosmetípsos tóllimur, quasi in áëra levámur.'
  reading.de-libro-ecclesi-stici-54dad62329:
    role: reading
    content:
      la:
      - type: text
        text: De libro Ecclesiástici
      - type: citation
        text: Sir 51:1-7
      - type: citation
        text: 1 Confitébor tibi, Dómine, Rex, et collaudábo te Deum Salvatórem meum.
      - type: citation
        text: '2 Confitébor nómini tuo: quóniam adiútor et protéctor factus es mihi,'
      - type: citation
        text: 3 et liberásti corpus meum a perditióne, a láqueo linguæ iníquæ et a lábiis operántium mendácium, et in conspéctu astántium factus es mihi adiútor.
      - type: citation
        text: '4 Et liberásti me secúndum multitúdinem misericórdiæ nóminis tui a rugiéntibus, præparátis ad escam:'
      - type: text
        text: 5 de mánibus quæréntium ánimam meam, et de portis tribulatiónum, quæ circumdedérunt me;
      - type: text
        text: 6 a pressúra flammæ, quæ circúmdedit me, et in médio ignis non sum æstuáta;
      - type: text
        text: 7 de altitúdine ventris ínferi, et a lingua coinquináta, et a verbo mendácii, a rege iníquo, et a lingua iniústa.
  reading.de-libro-ecclesi-stici-64217be798:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the book of Ecclesiasticus
      - type: citation
        text: Sir 39:1-5
      - type: citation
        text: 1 The wise men will seek out the wisdom of all the ancients, and will be occupied in the prophets.
      - type: citation
        text: 2 He will keep the sayings of renowned men, and will enter withal into the subtilties of parables.
      - type: citation
        text: 3 He will search out the hidden meanings of proverbs, and will be conversant in the secrets of parables.
      - type: citation
        text: '4 He shall serve among great men, and: appear before the governor.'
      - type: citation
        text: '5 He shall pass into strange countries: for he shall try good and evil among men.'
