  reading.vos-estis-lumen-mundi-qu-modo-dixit-sup-rius-sal-c31b370307:
    role: reading
    content:
      en:
      - type: text
        text: And ye yourselves like unto men that wait for their lord, when he will return from the wedding that, when he cometh and knocketh, they may open unto him immediately. The Lord cometh at the hour of judgment He knocketh when, by the pains of sickness, He biddeth us know that death is nigh. To Him open we immediately, if we receive Him in love. Whoso feareth to leave this body, will not open to the Judge when He knocketh, for he dreadeth to see that Judge, Whom he knoweth that he hath despised. But whosoever knoweth that his hope and works are built upon a good foundation, when he heareth the Judge knock, openeth to Him immediately, for to such an one that coming is blessed, yea, when the hour of death is at hand, such an one haileth with gladness a glorious reward.
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
      - type: text
        text: O Lord, have mercy upon us, * have mercy upon us.
      - type: text
        text: O Lord, let thy mercy lighten upon us, * as our trust is in thee.
      - type: text
        text: O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: Vos estis lumen mundi. Quómodo dixit supérius sal terræ, sic nunc dicit lumen mundi. Nam, neque supérius ista terra accipiénda est, quam pédibus corpóreis calcámus; sed hómines, qui in terra hábitant, vel étiam peccatóres, quorum condiéndis et exstinguéndis putóribus apostólicum salem Dóminus misit. Et hic mundum non cælum et terram, sed hómines qui sunt in mundo vel díligunt mundum, opórtet intélligi; quibus illuminándis Apóstoli missi sunt. Non potest cívitas abscóndi super montem pósita; id est, fundáta super insígnem magnámque iustítiam, quam signíficat étiam ipse mons, in quo dísputat Dóminus.
      - type: text
        text: 'Te Deum laudámus: * te Dóminum confitémur.'
      - type: text
