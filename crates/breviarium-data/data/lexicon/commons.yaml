      - type: antiphon
        text: In worshipful remembrance of our blessed Defender Joseph, * let us praise our God.
      la:
      - type: antiphon
        text: Laudémus Deum nostrum * In veneratióne beáti Ioseph, protectóris nostri, allelúia.
  invitatory.regem-apostol-rum-d-minum-ven-te-ador-mus-444e722c36:
    role: invitatory
    content:
      en:
      - type: antiphon
        text: The Lord, the King of Apostles, * O come, let us adore.
      la:
      - type: antiphon
