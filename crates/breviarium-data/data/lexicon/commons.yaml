        text: Sir 15:3
      - type: text
        text: She will feed him with the bread of life and understanding. And she give him to drink from the water of salvific wisdom. And she will be confirmed in him, and he will not waver.
      - type: response
        text: Thanks be to God.
  chapter.sir-24-14-8ec4e47f6b:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 24:14
      - type: text
        text: Ab inítio et ante sǽcula creáta sum, et usque ad futúrum sǽculum non désinam, et in habitatióne sancta coram ipso ministrávi.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 24:14
      - type: text
        text: From the beginning, and before the world, I was created. And even unto the future world, I will not cease to exist. For I have ministered before him in the holy habitation.
      - type: response
        text: Thanks be to God.
  chapter.sir-24-14-b7b4746e13:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 24:14
      - type: text
        text: From the beginning, and before the world, was I created, and unto the world to come I shall not cease to be, and in the holy dwelling place I have ministered before him.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 24:14
      - type: text
        text: Ab inítio et ante sǽcula creáta sum, et usque ad futúrum sǽculum non désinam, et in habitatióne sancta coram ipso ministrávi.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 24:14
      - type: text
        text: From the beginning, and before the world, I was created. And even unto the future world, I will not cease to exist. For I have ministered before him in the holy habitation.
      - type: response
        text: Thanks be to God.
  chapter.sir-24-15-146bb9404d:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 24:15
      - type: text
        text: 15 Et sic in Sion firmáta sum, et in civitáte sanctificáta simíliter requiévi, et in Ierúsalem potéstas mea.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 24:15
      - type: text
        text: And in this way, I was established in Zion. And likewise, in the holy city, I found rest. And my authority was in Jerusalem.
      - type: response
        text: Thanks be to God.
  chapter.sir-24-15-16-863b4dd6d5:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 24:15-16
      - type: text
        text: Et sic in Sion firmáta sum, et in civitáte sanctificáta simíliter requiévi, et in Ierúsalem potéstas mea. Et radicávi in pópulo honorificáto, et in parte Dei mei heréditas illíus, et in plenitúdine sanctórum deténtio mea.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 24:15-16
      - type: text
        text: And in this way, I was established in Zion. And likewise, in the holy city, I found rest. And my authority was in Jerusalem. And I took root among an honorable people, within the portion of my God, within his inheritance. And so my abode is in the full assembly of the saints.
      - type: response
        text: Thanks be to God.
  chapter.sir-24-15-16-c467bef7b6:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 24:15-16
      - type: text
        text: And so was I established in Sion, and in the holy city likewise I rested, and my power was in Jerusalem. And I took root in an honourable people, and in the portion of my God his inheritance, and my abode is in the full assembly of saints.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 24:15-16
      - type: text
