  reading.sed-prius-qu-r-ndum-nobis-est-quid-sit-regnum-c-83fb0130f4:
    role: reading
    content:
      en:
      - type: text
        text: First of all, it is for us to ask What is the kingdom of Heaven? And wherefore shall the same be likened unto ten virgins, whereof, albeit five were wise, yet five were foolish For if the kingdom of heaven be such that there shall in no wise enter into it anything that defileth, neither whatsoever worketh abomination, or maketh a lie, (Apoc. xxi. 27,) how can it be like unto five virgins which were foolish? But we must know that, in the word of God, the kingdom of heaven doth oftentimes signify the Church as she now is, touching the which the Lord saith in another place “The Son of Man shall send forth His Angels, and they shall gather out of His kingdom all things that offend.” (Matth. xiii. 41.) In that kingdom of Blessedness, wherein peace shall have her perfect reign, there shall be nothing found that offendeth for the angels to gather out.
      la:
      - type: text
        text: 'Sed prius quæréndum nobis est quid sit regnum cælórum, aut cur decem virgínibus comparétur, quæ étiam vírgines prudéntes et fátuæ dicántur. Dum enim cælórum regnum constat quia reprobórum nullus ingréditur, étiam fátuis virgínibus cur símile esse perhibétur? Sed sciéndum nobis est quod sæpe in sacro elóquio regnum cælórum præséntis témporis Ecclésia dícitur. De quo álio in loco Dóminus dicit: Mittet Fílius hóminis Ángelos suos, et cólligent de regno eius ómnia scándala. Neque enim in illo regno beatitúdinis, in quo pax summa est, inveníri scándala póterunt, quæ colligántur.'
  reading.sed-prius-qu-sunt-ampli-ra-vide-mus-be-ti-inquit-ee8437abdd:
    role: reading
    content:
      en:
      - type: citation
        text: 'But, forasmuch as the signs and troubles whereof the Lord speaketh are so manifold, we must needs shortly consider each for, of necessity, we must suffer some things from heaven, some from the earth, some from the powers of nature, and some from men. For where He saith Nation shall rise against nation He speaketh concerning the troubling of men where great earthquakes shall be in diverse places concerning wrath from above: where: and pestilences concerning the frailty of the body where and famines concerning the barrenness of the earth: where fearful signs from heaven, and tempests concerning commotions of the air. As, then, all things shall have an end, so, before the end, shall all things be troubled and we who have sinned and come short in all things, shall in all things be afflicted, that it may be fulfilled that is written: and the world shall fight with Him against the unwise. (Wisd v. 21.)'
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
        text: The holy Church throughout all the world * doth acknowledge thee;
      - type: text
        text: The Father, * of an infinite Majesty.
      - type: text
        text: Thine honourable, true, * and only Son;
      - type: text
        text: Also the Holy Ghost, * the Comforter.
      - type: text
        text: Thou art the King of Glory, * O Christ.
      - type: text
        text: Thou art the everlasting * Son of the Father.
      - type: text
        text: (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
      - type: text
        text: When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
      - type: text
        text: Thou sittest at the right hand of God, * in the glory of the Father.
      - type: text
        text: We believe that thou shalt come * to be our Judge.
      - type: text
        text: (Kneel for the following verse) ~
      - type: text
        text: We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
      - type: text
        text: Make them to be numbered with thy Saints, * in glory everlasting.
      - type: text
        text: O Lord, save thy people, * and bless thine heritage.
      - type: text
        text: Govern them, * and lift them up for ever.
      - type: text
        text: Day by day * we magnify thee;
      - type: text
        text: (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
      - type: text
        text: Vouchsafe, O Lord, to keep us * this day without sin.
