  reading.sir-24-17-20-7b069d6d3c:
    role: reading
    content:
      la:
      - type: citation
        text: Sir 24:17-20
      - type: text
        text: |-
          17 Quasi cedrus exaltáta sum in Líbano, et quasi cypréssus in monte Sion:
          18 quasi palma exaltáta sum in Cades, et quasi plantátio rosæ in Iéricho:
          19 quasi olíva speciósa in campis, et quasi plátanus exaltáta sum iuxta aquam in platéis.
          20 Sicut cinnamómum et bálsamum aromatízans odórem dedi: quasi myrrha elécta dedi suavitátem odóris:
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
          Tibi Chérubim et Séraphim * incessábili voce proclámant:
          (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
          Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
          Te gloriósus * Apostolórum chorus,
          Te Prophetárum * laudábilis númerus,
          Te Mártyrum candidátus * laudat exércitus.
          Te per orbem terrárum * sancta confitétur Ecclésia,
          Patrem * imménsæ maiestátis;
          Venerándum tuum verum * et únicum Fílium;
          Sanctum quoque * Paráclitum Spíritum.
          Tu Rex glóriæ, * Christe.
          Tu Patris * sempitérnus es Fílius.
          (Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
          Tu ad déxteram Dei sedes, * in glória Patris.
          Iudex créderis * esse ventúrus.
      - type: rubric
        text: (Sequens versus dicitur flexis genibus)
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: |-
          Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
          Ætérna fac cum Sanctis tuis * in glória numerári.
          Ætérna fac cum Sanctis tuis * in glória munerári.
          Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
          Et rege eos, * et extólle illos usque in ætérnum.
          Per síngulos dies * benedícimus te.
          (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Dignáre, Dómine, die isto * sine peccáto nos custodíre.
          Miserére nostri, Dómine, * miserére nostri.
          Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
          In te, Dómine, sperávi: * non confúndar in ætérnum.
      en2:
      - type: citation
        text: Sir 24:17-20
      - type: text
        text: |-
          17 I was exalted like a cedar in Lebanon and like a cypress on Mount Zion.
          18 I was exalted like a palm tree in Kadesh and like a rose bush in Jericho.
          19 I was exalted like a beautiful olive tree in the plains, and like a sycamore tree beside the waters along a wide road.
          20 I gave off an aromatic fragrance like cinnamon or balsam. I produced a sweet odor like the best myrrh.
          Te Deum laudámus: * we praise you as Lord.
          You, the eternal Father, * all the earth does venerate.
          To you all the Angels, * to you the Heavens and all the Powers:
          To you the Cherubim and Seraphim * with unceasing voice proclaim:
          (A bow is made) Holy, Holy, Holy, * Lord God of Sabaoth.
          Full are the heavens and earth * of the majesty of your glory.
          You, the glorious * choir of Apostles,
          You, the praiseworthy * company of Prophets,
          You, the white-robed * army of Martyrs do praise.
          You, throughout the world, * the holy Church does confess:
          the Father * of immense majesty;
          Your venerable, true, * and only Son;
          And also the Holy * Paraclete Spirit.
          You, King of glory, * O Christ.
          You are the eternal * Son of the Father.
          (A bow is made) You, about to take on humanity for its liberation, * did not shrink from the Virgin's womb.
          You, about to take on humanity for its liberation, * did not shrink from the Virgin's womb.
          You, having overcome the sting of death, * have opened the kingdoms of heaven to those who believe.
          You sit at the right hand of God, * in the glory of the Father.
          You are believed * to be the Judge who is to come.
      - type: rubric
        text: (The following verse is said kneeling)
      - type: rubric
        text: (Brethren, when they begin 'Te ergo quaesumus,' departing from the Stalls, let them reverently bow at the words 'Quos pretioso' and the rest)
      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
          And we praise your name for ever, * and for ever and ever.
          Graciously keep us, O Lord, this day * without sin.
          Have mercy on us, O Lord, * have mercy on us.
          Let your mercy, O Lord, be upon us, * as we have hoped in you.
          In you, O Lord, I have hoped: * let me not be confounded for ever.
  reading.sir-24-17-20-910ed05cca:
    role: reading
    content:
      en:
      - type: citation
        text: Sir 24:17-20
      - type: text
        text: |-
          17 I was exalted like a cedar in Libanus, and as a cypress tree on mount Sion.
          18 I was exalted like a palm tree in Cades, and as a rose plant in Jericho:
          19 As a fair olive tree in the plains, and as a plane tree by the water in the streets, was I exalted.
          20 I gave a sweet smell like cinnamon. and aromatical balm: I yielded a sweet odour like the best myrrh:
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
      - type: rubric
        text: Kneel for the following verse
      - type: text
        text: |-
          We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
