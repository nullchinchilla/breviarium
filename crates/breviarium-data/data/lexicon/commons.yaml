      - type: response
        text: For the grace of God, and His peace, are with His chosen.
      la:
      - type: response
        text: 'Tamquam aurum in fornáce probávit eléctos Dóminus, et quasi holocáusti hóstiam accépit illos: et in témpore erit respéctus illórum:'
      - type: text
        text: Quóniam donum et pax est eléctis Dei.
      - type: versicle
        text: Qui confídunt in illum, intélligent veritátem, et fidéles in dilectióne acquiéscent illi.
      - type: response
        text: Quóniam donum et pax est eléctis Dei.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quóniam donum et pax est eléctis Dei.
      en2:
      - type: response
        text: 'As gold in the furnace the Lord has proved the elect, and as a sacrificial victim of a holocaust he has received them: and in due time there will be regard for them:'
      - type: text
        text: For gift and peace are for the elect of God.
      - type: versicle
        text: They who trust in him shall understand truth, and the faithful in love shall rest in him.
      - type: response
        text: For gift and peace are for the elect of God.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: For gift and peace are for the elect of God.
