  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-4bc1d3ab8d:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Matthew
      - type: citation
        text: Matt 19:27-29
      - type: text
        text: |-
          At that time, Peter said unto Jesus: Behold, we have forsaken all, and followed thee what shall we have therefore? And so on.

          Homily by St. Jerome, Priest (at Bethlehem.)
      - type: citation
        text: Bk. iii. on Matth xix.
      - type: text
        text: 'Peter was a fisherman, he was not rich, he earned his bread by his hand and skill, and nevertheless he is thus bold, and saith confidently: We have forsaken all. And because it sufficeth not to forsake only, he addeth that which to do is to be perfect: and followed thee. We have done that which Thou hast commanded us, what reward therefore wilt Thou give us? And Jesus said unto them Amen I say unto you, that ye which have followed Me, in the regeneration, when the Son of Man shall sit in the throne of His glory, ye also shall sit upon twelve thrones, judging the twelve tribes of Israel. He said not, Ye which have forsaken all, for this did even Crates the philosopher, and they which have set nothing by riches are many, but, Ye which have followed Me. This did the Apostles, and this do believers do.'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 10:1-9
      - type: text
        text: |-
          In illo témpore: Designávit Dóminus et álios septuagínta duos: et misit illos binos ante fáciem suam, in omnem civitátem et locum, quo erat ipse ventúrus. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 17 in Evangelia
      - type: text
        text: 'Dóminus et Salvátor noster, fratres caríssimi, aliquándo nos sermónibus, aliquándo vero opéribus ádmonet. Ipsa étenim facta eius præcépta sunt: quia dum áliquid tácitus facit, quid ágere debeámus innotéscit. Ecce enim binos in prædicatiónem discípulos mittit: quia duo sunt præcépta caritátis, Dei vidélicet amor, et próximi: et minus quam inter duos cáritas habéri non potest. Nemo enim próprie ad semetípsum habére caritátem dícitur: sed diléctio in álterum tendit, ut cáritas esse possit.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 10:1-9
      - type: text
        text: |-
          At that time: The Lord designated another seventy-two, and sent them in pairs before his face, into every city and place where he was to arrive. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 17 in Evangelia
      - type: text
        text: 'Our Lord and Savior, dearest brethren, admonishes us sometimes by words and sometimes by deeds. His very acts are precepts: for what he does in silence reveals what we ought to do. Behold, he sends the disciples forth in pairs to preach; for there are two commandments of charity, namely, the love of God and the love of neighbor; and charity cannot exist between fewer than two. For no one is said properly to have charity toward himself alone: but love reaches out to another, so that it may be charity.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-5aa405379b:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 3:21-23
      - type: text
        text: 'In illo témpore: Factum est autem cum baptizarétur omnis pópulus, et Iesu baptizáto et oránte, apértum est cælum. Et réliqua.'
      - type: citation
        text: Lib. 23, contra Faust. cap. 7. 8.
      - type: text
        text: 'Sic de cœlo dictum est super aquam Iordanis: Hic est Filius meus dilectus, in quo mihi bene complacui: quemadmodum dictum est et in monte. Neque enim quia et ibi de coelo vox ipsa sonuit, Filius Dei ante non fuit: quando quidem ex litero Virginis ille accepit formam servi, qui cum in forma Dei esset, non rapinam arbitratus est, esse se aequalem Deo. Denique idem Apostolus Paulus alio loco apertissime dicit: Cum autem venit plenitudo temporis, misit Deus Filium suum factum ex rauliere, factum sub lege, ut eos, qui sub lege erant, redimeret, ut filiorum adoptionem reciperemus. Ipse ergo est Filius Dei, qui et Dóminus David secúndum divinitatem, et idem ipse Filius David ex semine David secúndum carnem.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 3:21-23
      - type: text
        text: 'At that time: Now it happened that, when all the people were being baptized, Jesus was baptized; and as he was praying, heaven was opened.'
      - type: citation
        text: Lib. 23, contra Faust. cap. 7. 8.
      - type: text
        text: 'Thus it was said from heaven over the water of the Jordan: This is my beloved Son, in whom I am well pleased — just as it was also said on the mountain. Nor does the fact that there too the voice sounded from heaven mean that the Son of God was not there before; since from the womb of the Virgin he assumed the form of a servant, who, though he was in the form of God, did not consider equality with God something to be grasped. Moreover, the same Apostle Paul says most plainly in another place: But when the fullness of time came, God sent his Son, born of a woman, born under the law, to redeem those who were under the law, so that we might receive the adoption of sons. He himself, then, is the Son of God, who is also the Lord of David according to divinity, and likewise the Son of David from the seed of David according to the flesh.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-5c0f303878:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 14:26-33
      - type: text
        text: |-
          At that time, Jesus said unto the multitudes: If any man come to Me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple. And so on.

          Homily by Pope St Gregory the Great
      - type: citation
        text: Homilia 37th on the Gospels.
      - type: text
        text: Dearly beloved brethren, if we consider what and how great things are promised unto us in heaven, all things which are upon earth grow poor to our mind. For when this world's goods are reckoned against the gladness above, they are found to be a clog rather than an help. This present life being compared to life eternal, ought rather to be called death than life. For what is the daily failing of our corruption but, as it were, a creeping death But what tongue is there that can tell, or what understanding that can comprehend how great is the rejoicing in the city above, where they have part with the choirs of Angels, where they stand with the most blessed spirits before the glory of the Creator, where they see the face of God present, where they behold the Incomprehensible Light, where they have no fear of death, and where they rejoice eternally incorruptible
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 14:26-33
      - type: text
        text: |-
          In illo témpore: Dixit Iesus turbis: Si quis venit ad me, et non odit patrem suum, et matrem, et uxórem, et fílios, et fratres, et soróres, adhuc autem et ánimam suam, non potest meus esse discípulus. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homil. 37 in Evangelia
      - type: text
        text: Si considerémus fratres caríssimi, quæ et quanta sunt, quæ nobis promittúntur in cælis, viléscunt ánimo ómnia quæ habéntur in terris. Terréna namque substántia supérnæ felicitáti comparáta, pondus est, non subsídium. Temporális vita ætérnæ vitæ comparáta, mors est pótius dicénda quam vita. Ipse enim quotidiánus deféctus corruptiónis quid est áliud, quam quædam prolíxitas mortis? Quæ autem lingua dícere, vel quis intelléctus cápere súfficit, illa supérnæ civitátis quanta sint gáudia; Angelórum choris interésse, cum beatíssimis spirítibus glóriæ Conditóris assístere, præséntem Dei vultum cérnere, incircumscríptum lumen vidére, nullo mortis metu áffici, incorruptiónis perpétuæ múnere lætári?
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 14:26-33
      - type: text
        text: |-
          At that time: Jesus said to the crowds: If anyone comes to me, and does not hate his father, and mother, and wife, and children, and brothers, and sisters, and yes, even his own life, he is not able to be my disciple. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homil. 37 in Evangelia
      - type: text
        text: 'If we consider, dearest brethren, how great and how many are the things promised to us in heaven, all that is possessed on earth grows cheap in the soul. For earthly substance, compared to heavenly happiness, is a burden, not a support. Temporal life, compared to eternal life, ought rather to be called death than life. For what is the daily decline of corruption but a certain prolonged dying? Yet what tongue can tell, or what mind can grasp, how great are the joys of that heavenly city: to be present among the choirs of angels, to stand before the glory of the Creator with the most blessed spirits, to behold the very face of God, to see the uncircumscribed light, to be afflicted by no fear of death, to rejoice in the gift of eternal incorruption?'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-6b98d73480:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 19:1-10
      - type: text
        text: |-
          At that time: Jesus entered and passed through Jericho. And, behold, there was a man named Zacchaeus, which was the chief among the publicans, and he was rich. And so on.

          Homily by St. Ambrose, Bishop (of Milan.)
      - type: citation
        text: Bk. viii. on Luke.
      - type: text
        text: Zacchaeus was little of stature, that is, he was not raised aloft among men by nobility of birth, and, like the most of the world, he possessed few merits. When he heard that the Lord and Saviour, Who had come unto His Own, and Whom His Own had not received, (John i. 11,) was coming, he desired to see Him. But the sight of Jesus is not easy; to any on the earth it is impossible. And since Zacchaeus had neither the Prophets, nor yet the Law, as a gracious help to his nature, he climbed up into a sycamore tree, raising his feet above the vanity of the Jews, and straightening the crooked branches of his former life, and therefore he received Jesus to lodge within his house.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 19:1-10
      - type: text
        text: |-
          In illo témpore: Ingréssus Iesus perambulábat Iéricho. Et ecce vir nómine Zachǽus: et hic princeps erat publicanórum, et ipse dives. Et réliqua.

          Homilía sancti Ambrósii Epíscopi
      - type: citation
        text: Lib. 8 in Luc., prope finem
      - type: text
        text: Zachǽus, statúra pusíllus, hoc est, nulla nobilitátis ingénitæ dignitáte sublímis, exíguus méritis sicut pópulus natiónum, audíto Dómini Salvatóris advéntu, quem sui non recéperant, vidére cupiébat. Sed nemo fácile Iesum videt; nemo potest Iesum vidére constitútus in terra. Et, quia non prophétas, non legem habébat, tamquam formæ grátiam naturális, ascéndit in sycómorum, vanitátem scílicet Iudæórum vestígio suo próterens, erráta quoque córrigens superióris ætátis. Et ídeo Iesum in interióris domus recépit hospítio.
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 19:1-10
      - type: text
        text: |-
          At that time: Jesus entered and walked through Jericho. And behold, there was a man named Zacchaeus, and he was the leader of the tax collectors, and he was wealthy. And so forth.
      
          A Homily of Saint Ambrose the Bishop
      - type: citation
        text: Lib. 8 in Luc., prope finem
      - type: text
        text: Zacchaeus, small in stature — that is, exalted by no dignity of inborn nobility, lowly in merit as the people of the nations — upon hearing of the coming of the Lord Savior, whom his own had not received, desired to see him. But no one easily sees Jesus; no one can see Jesus while standing on the earth. And because he had neither prophets nor the law, as it were the natural grace of form, he climbed a sycamore tree, treading underfoot with his step the vanity of the Jews, and also correcting the errors of his earlier life. And therefore Jesus received him as a guest in the inner chamber of his house.
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-7e2d664733:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 10:1-9
      - type: text
        text: |-
          At that time, the Lord appointed other seventy-two also, and sent them two and two before His face into every city and place, whither He Himself would come. And so on.

          Homily by Pope St. Gregory (the Great.)
      - type: citation
        text: 17th Homily on the Gospels
      - type: text
        text: 'Dearly beloved brethren, our Lord and Saviour doth sometimes admonish us by words, and sometimes by works. Yea, His very works do themselves teach us for that which He doth silently His example still moveth us to copy. Behold how He sendeth forth His disciples to preach by two and two since there are two commandments to love, that is, a commandment to love God, and a commandment to love our neighbour and where there are not two, the one, being alone, hath not whereon to do the Lord''s commandment. And no man can properly be said to love himself: for love tendeth outward toward our neighbour, if it be the love whereto the Gospel doth oblige us.'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 10:1-9
      - type: text
        text: |-
          In illo témpore: Designávit Dóminus et álios septuagínta duos: et misit illos binos ante fáciem suam, in omnem civitátem et locum, quo erat ipse ventúrus. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 17 in Evangelia
      - type: text
        text: 'Dóminus et Salvátor noster, fratres caríssimi, aliquándo nos sermónibus, aliquándo vero opéribus ádmonet. Ipsa étenim facta eius præcépta sunt: quia dum áliquid tácitus facit, quid ágere debeámus innotéscit. Ecce enim binos in prædicatiónem discípulos mittit: quia duo sunt præcépta caritátis, Dei vidélicet amor, et próximi: et minus quam inter duos cáritas habéri non potest. Nemo enim próprie ad semetípsum habére caritátem dícitur: sed diléctio in álterum tendit, ut cáritas esse possit.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 10:1-9
      - type: text
        text: |-
          At that time: The Lord designated another seventy-two, and sent them in pairs before his face, into every city and place where he was to arrive. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 17 in Evangelia
      - type: text
        text: 'Our Lord and Savior, dearest brethren, admonishes us sometimes by words and sometimes by deeds. His very acts are precepts: for what he does in silence reveals what we ought to do. Behold, he sends the disciples forth in pairs to preach; for there are two commandments of charity, namely, the love of God and the love of neighbor; and charity cannot exist between fewer than two. For no one is said properly to have charity toward himself alone: but love reaches out to another, so that it may be charity.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-9561fc14c3:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 12:35-40
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Sint lumbi vestri præcincti, et lucernæ ardentes in mánibus vestris. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 13 in Evang.
      - type: text
        text: 'Sancti Evangélii, fratres caríssimi, apérta vobis est léctio recitata. Sed ne alíquibus ipsa eius planíties alta fortásse videátur, eam sub brevitáte transcúrrimus, quátenus eius exposítio ita nesciéntibus fiat cógnita, ut tamen sciéntibus non sit onerósa. Dóminus dicit: Sint lumbi vestri præcíncti. Lumbos enim præcíngimus, cum carnis luxúriam per continéntiam coarctámus. Sed quia minus est, mala non ágere, nisi étiam quisque stúdeat, et bonis opéribus insudáre, prótinus ádditur: Et lucérnæ ardéntes in mánibus vestris. Lucérnas quippe ardéntes in mánibus tenémus, cum per bona ópera próximis nostris lucis exémpla monstrámus. De quibus profécto opéribus Dóminus dicit: Lúceat lux vestra coram homínibus, ut vídeant ópera vestra bona, et gloríficent Patrem vestrum qui in cælis est.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 12:35-40
      - type: text
        text: |-
          At that time: Jesus said to his disciples: Let your waists be girded, and let lamps be burning in your hands. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 13 in Evang.
      - type: text
        text: 'The reading of the holy Gospel just proclaimed, dearest brethren, is clear enough. But lest to some its very plainness seem perhaps too deep, we pass through it briefly, so that its exposition may be made known to those who do not yet understand it, without being burdensome to those who do. The Lord says: Let your waists be girded. For we gird our loins when we restrain the lust of the flesh through continence. But because it is not enough to do no evil unless one also strives to labor at good works, there is immediately added: And let lamps be burning in your hands. We hold burning lamps in our hands when by our good works we show our neighbors the example of light. Concerning which works the Lord says: Let your light shine before men, that they may see your good works, and may glorify your Father who is in heaven.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-a2495ba9a7:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 14:26-33
      - type: text
        text: |-
          In illo témpore: Dixit Iesus turbis: Si quis venit ad me, et non odit patrem suum, et matrem, et uxórem, et fílios, et fratres, et soróres, adhuc autem et ánimam suam, non potest meus esse discípulus. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homil. 37 in Evangelia
      - type: text
        text: Si considerémus fratres caríssimi, quæ et quanta sunt, quæ nobis promittúntur in cælis, viléscunt ánimo ómnia quæ habéntur in terris. Terréna namque substántia supérnæ felicitáti comparáta, pondus est, non subsídium. Temporális vita ætérnæ vitæ comparáta, mors est pótius dicénda quam vita. Ipse enim quotidiánus deféctus corruptiónis quid est áliud, quam quædam prolíxitas mortis? Quæ autem lingua dícere, vel quis intelléctus cápere súfficit, illa supérnæ civitátis quanta sint gáudia; Angelórum choris interésse, cum beatíssimis spirítibus glóriæ Conditóris assístere, præséntem Dei vultum cérnere, incircumscríptum lumen vidére, nullo mortis metu áffici, incorruptiónis perpétuæ múnere lætári?
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 14:26-33
      - type: text
        text: |-
          At that time: Jesus said to the crowds: If anyone comes to me, and does not hate his father, and mother, and wife, and children, and brothers, and sisters, and yes, even his own life, he is not able to be my disciple. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homil. 37 in Evangelia
      - type: text
        text: 'If we consider, dearest brethren, how great and how many are the things promised to us in heaven, all that is possessed on earth grows cheap in the soul. For earthly substance, compared to heavenly happiness, is a burden, not a support. Temporal life, compared to eternal life, ought rather to be called death than life. For what is the daily decline of corruption but a certain prolonged dying? Yet what tongue can tell, or what mind can grasp, how great are the joys of that heavenly city: to be present among the choirs of angels, to stand before the glory of the Creator with the most blessed spirits, to behold the very face of God, to see the uncircumscribed light, to be afflicted by no fear of death, to rejoice in the gift of eternal incorruption?'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-d3f3b20beb:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 11:27-28
      - type: text
        text: |-
          At that time, as Jesus spoke unto the multitudes, a certain woman of the company lifted up her voice and said unto Him: Blessed is the womb that bore thee. And so on.

          Homily by the Venerable Bede
      - type: citation
        text: Lib 4 Cap 49 in Luke 11
      - type: text
        text: It is plain that this was a woman of great earnestness and faith. The Scribes and Pharisees were at once tempting and blaspheming the Lord, but this woman so clearly grasped His Incarnation, and so bravely confessed the same, that she confounded both the lies of the great men who were present, and the faithlessness of the heretics who were yet to come. Even as the Jews then, blaspheming the works of the Holy Ghost, denied the very Son of God Who is of one substance with the Father, so afterwards did the heretics, by denying that Mary always a Virgin did, under the operation of the Holy Ghost, supply flesh to the Only begotten One of God, when He was about being born in an human Body, even so, I say, did the heretics deny that the Son of Man should be called a true Son, Who is of one substance with His Mother.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 11:27-28
      - type: text
        text: |-
          In illo témpore: Loquénte Iesu ad turbas, extóllens vocem quædam múlier de turba dixit illi: Beátus venter qui te portávit. Et réliqua.

          Homilía sancti Bedæ Venerábilis Presbýteri
      - type: citation
        text: Lib 4. cap. 49. in Luc. 11.
      - type: text
        text: Magnæ devotiónis et fídei hæc múlier osténditur, quæ, scribis et pharisǽis Dóminum tentántibus simul et blasphemántibus, tanta eius incarnatiónem præ ómnibus sinceritáte cognóscit, tanta fidúcia confitétur, ut et præséntium prócerum calúmniam, et futurórum confúndat hæreticórum perfídiam. Nam, sicut tunc Iudǽi, Sancti Spíritus ópera blasphemándo, verum consubstantialémque Patri Dei Fílium negábant; sic hærétici póstea, negándo Maríam semper Vírginem, Sancti Spíritus operánte virtúte, nascitúro cum humánis membris Unigénito Dei, carnis suæ matériam ministrásse, verum consubstantialémque matri Fílium hóminis fatéri non debére dixérunt.
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 11:27-28
      - type: text
        text: |-
          At that time: As Jesus was speaking to the crowds, a certain woman from the crowd, lifting up her voice, said to him: Blessed is the womb that bore you. And so forth.
      
          A Homily of the Venerable Bede the Priest
      - type: citation
        text: Lib 4. cap. 49. in Luc. 11.
      - type: text
        text: This woman shows herself to be of great devotion and faith who, while the scribes and Pharisees were at once tempting and blaspheming the Lord, recognizes his Incarnation before all others with such sincerity, and confesses it with such confidence, as to confound both the calumny of the present rulers and the perfidy of future heretics. For just as the Jews of that time, by blaspheming the works of the Holy Spirit, denied that he was the true Son of God, consubstantial with the Father; so the heretics afterwards, by denying that Mary is ever-Virgin, claimed that it was not right to confess the Only-Begotten Son of God — to whom, by the power of the Holy Spirit at work, the flesh of his human members was born — as the true Son of man, consubstantial with his mother.
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-1bb0ef675a:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Matthew
      - type: citation
        text: Matt 5:13-19
      - type: text
        text: |-
          At that time: Jesus said unto his disciples: Ye are the salt of the earth: But if the salt have lost his savour, wherewith shall it be salted? And so on, and that which followeth.

          A Homily by St. Augustine the Bishop
      - type: citation
        text: Lib. 1 de Sermóne Dómini in monte, cap. 6
      - type: text
        text: 'The Lord would have us understand how that men do lose their power of savouring others with righteousness when they are willing to place their eternal welfare in jeopardy for the sake of any témporal advantage, like as attainment of ease or luxury, or escape from suffering or toil. For that which is eternal, unlike things of this world, can neither be bestowed by men, nor by them taken away. Hence, when he asketh: If the salt have lost his savour, wherewith shall it be salted? he would have us understand the question to be: If ye, by whom mankind is preserved from corruption, be willing to lose the kingdom of heaven so as to escape trials or persecutions in this world, who is there to preserve you from corruption, seeing ye are they that God hath chosen to preserve all others from corruption?'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 5:13-19
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Vos estis sal terræ. Quod si sal evanúerit, in quo saliétur? Et réliqua.

          Homilía sancti Augustíni Epíscopi
      - type: citation
        text: Lib. 1 de Sermone Domini in monte, cap. 6
      - type: text
        text: Osténdit Dóminus fátuos esse iudicándos, qui temporálium bonórum vel cópiam sectántes vel inópiam metuéntes, amíttunt ætérna, quæ nec dari possunt ab homínibus nec auférri. Itaque, si sal infatuátum fúerit, in quo saliétur? Id est, si vos, per quos condiéndi sunt quodámmodo pópuli, metu persecutiónum temporálium amiséritis regna cælórum; qui erunt hómines, per quos a vobis error auferátur, cum vos elégerit Deus, per quos errórem áuferat ceterórum?
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 5:13-19
      - type: text
        text: |-
          At that time: Jesus said to his disciples: You are the salt of the earth. But if salt loses its saltiness, with what will it be salted? And so forth.
      
          A Homily of Saint Augustine the Bishop
      - type: citation
        text: Lib. 1 de Sermone Domini in monte, cap. 6
      - type: text
        text: 'The Lord shows that those are to be judged foolish who, either by pursuing an abundance of temporal goods or by fearing the want of them, lose the eternal, which can neither be given nor taken away by men. And so: if salt loses its saltiness, with what will it be salted? That is, if you — through whom the peoples are to be seasoned in a certain manner — have lost the kingdoms of heaven through fear of temporal persecutions, who will be the people by whom error is removed from you, since God has chosen you as the very ones through whom he would remove the error of the rest?'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-2bd1d6532d:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to St. Matthew
      - type: citation
        text: Matt 25:1
      - type: text
        text: |-
          At that time, Jesus said to His disciples: The Kingdom of heaven shall be likened unto ten virgins, which took their lamps, and went forth to meet the Bridegroom and the Bride. And so on.

          Homily by Pope St. Gregory the Great
      - type: citation
        text: 12th on the Gospels
      - type: text
        text: Dearly beloved brethren oftentimes do I warn you to fly corrupt conversation, and to keep yourselves unspotted from the world. But the portion which is this day read from the Holy Gospel doth oblige me to say that even to these good things which ye do, ye must needs take all careful heed. Look ye well to it, that, when ye work righteousness, ye do it not as seeking the praise and admiration of men, for if the lust of praise do once creep in, that which seemeth so fair without, loseth its reward within. Behold how the Redeemer speaketh of these ten virgins. He calleth them all virgins, yet entered not all of them into the door of blessedness, for there were some of them who sought outwardly the honour of virginity, but would take no oil within their vessels with their lamps.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 25:1-13
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis parábolam hanc: Símile erit regnum cælórum decem virgínibus, quæ, accipiéntes lámpades suas, exiérunt óbviam sponso et sponsæ. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilía 12 in Evangelia
      - type: text
        text: Sæpe vos, fratres caríssimi, admóneo prava ópera fúgere, mundi huius inquinaménta devitáre, sed hodiérna sancti Evangélii lectióne compéllor dícere, ut, et bona, quæ ágitis, cum magna cautéla teneátis; ne per hoc, quod a vobis rectum géritur, favor aut grátia humána requirátur; ne appetítus laudis subrépat, et, quod foris osténditur, intus a mercéde vacuétur. Ecce enim Redemptóris voce decem vírgines, et omnes dicúntur vírgines, et tamen intra beatitúdinis iánuam non omnes sunt recéptæ; quia eárum quædam, dum de virginitáte sua glóriam foris éxpetunt, in vasis suis óleum habére noluérunt.
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 25:1-13
      - type: text
        text: |-
          At that time: Jesus spoke this parable to his disciples: The kingdom of heaven shall be like ten virgins, who, taking their lamps, went out to meet the groom and the bride. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilía 12 in Evangelia
      - type: text
        text: I often admonish you, dearest brethren, to flee wicked works and to avoid the defilements of this world; but today's reading of the holy Gospel compels me to say that you must also hold fast, with great caution, to the good things you do, lest through what is done rightly by you, human favor or approval be sought; lest the appetite for praise steal in, and what is shown outwardly be emptied of its inward reward. For behold, by the voice of the Redeemer ten virgins are spoken of — all are called virgins, and yet not all were received within the gate of blessedness; because some of them, while seeking outward glory from their virginity, refused to have oil in their vessels.
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-334cd74355:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 14:26-33
      - type: text
        text: |-
          At that time, Jesus said unto the multitudes: If any man come to Me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple. And so on.

          Homily by Pope St Gregory the Great
      - type: citation
        text: Homilia 37th on the Gospels.
      - type: text
        text: Dearly beloved brethren, if we consider what and how great things are promised unto us in heaven, all things which are upon earth grow poor to our mind. For when this world's goods are reckoned against the gladness above, they are found to be a clog rather than an help. This present life being compared to life eternal, ought rather to be called death than life. For what is the daily failing of our corruption but, as it were, a creeping death But what tongue is there that can tell, or what understanding that can comprehend how great is the rejoicing in the city above, where they have part with the choirs of Angels, where they stand with the most blessed spirits before the glory of the Creator, where they see the face of God present, where they behold the Incomprehensible Light, where they have no fear of death, and where they rejoice eternally incorruptible
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 10:26-32
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Nihil est opértum, quod non revelábitur; et occúltum, quod non sciétur. Et réliqua.

          Homilía sancti Hilárii Epíscopi
      - type: citation
        text: Comment. in Matthaeum, can. 10 post medium
      - type: text
        text: 'Dóminus diem iudícii osténdit, quæ abstrúsam voluntátis nostræ consciéntiam prodet: et ea quæ nunc occúlta existimántur, luce cognitiónis públicæ déteget. Ígitur non minas, non consília, non potestátes insectántium monet esse metuéndas: quia dies iudícii nulla hæc fuísse, atque inánia revelábit. Et quod dico vobis in ténebris, dícite in lúmine: et quod in aure audítis, prædicáte super tecta. Non légimus Dóminum sólitum fuísse nóctibus sermocinári, et doctrínam in ténebris tradidísse: sed quia omnis sermo eius carnálibus ténebræ sunt, et verbum eius infidélibus nox est.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 10:26-32
      - type: text
        text: |-
          At that time: Jesus said to his disciples: Nothing is covered that shall not be revealed, nor hidden that shall not be known. And so forth.
      
          A Homily of Saint Hilary the Bishop
      - type: citation
        text: Comment. in Matthaeum, can. 10 post medium
      - type: text
        text: 'The Lord points to the day of judgment, which will betray the hidden conscience of our will; and those things which are now considered secret, it will lay bare in the light of public knowledge. Therefore, he warns us not to fear the threats, the plots, or the powers of those who persecute: for the day of judgment will reveal that all these were as nothing and empty. And what I say to you in darkness, speak in the light; and what you hear whispered in the ear, preach above the rooftops. We do not read that the Lord was accustomed to speak at night or to impart his teaching in darkness; but because all his words are darkness to the carnal, and his word is night to the faithless.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-3c3c9aa18a:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Matthew
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: |-
          At that time Jesus spake unto His disciples this parable A man, travelling into a far country, called his own servants, and delivered unto them his goods. And so on.

          Homily by Pope St Gregory (the Great.)
      - type: citation
        text: 9th on the Gospels.
      - type: text
        text: Dearly beloved brethren, this Lesson from the Holy Gospel moveth us to take good heed lest we, who are seen in this world to have received more than others, should thereby bring ourselves into greater condemnation from the Maker of this world. To whom much is given, of the same is much required. Therefore, let him that receiveth much, strive to be all the more lowly, and all the more ready to do God service, for his very gifts’ sake, knowing that he will be obliged to give account thereof. Behold, a man, travelling into a far country, calleth his own servants, and delivereth unto them talents, to the end that they may trade therewith. After a long time, the lord of those servants cometh, and reckoneth with them, and to them that have done well He rendereth a reward of their labours, but that servant which was careless of his master’s work He condemneth.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 24:42-45
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Vigiláte, quia nescítis qua hora Dóminus vester ventúrus sit. Et réliqua.

          Homilía sancti Hilárii Epíscopi
      - type: citation
        text: Comment. in Matth. Can 26
      - type: text
        text: 'Ut ignorántiam illam diéi ómnibus táciti, non sine útilis siléntii ratióne esse scirémus, vigiláre nos Dóminus propter advéntum furis admónuit, et oratiónum assiduitáte deténtos ómnibus præceptórum suórum opéribus inhærére. Furem enim esse osténdit zábulum, ad detrahénda ex nobis spólia pervígilem, et córporum nostrórum dómibus insidiántem: ut ea incuriósis nobis, et somno déditis, consiliórum suórum atque illecebrárum iáculis perfódiat. Parátos ígitur esse nos cónvenit: quia diéi ignorátio inténtam sollicitúdinem suspénsæ exspectatiónis exágitet.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 24:42-45
      - type: text
        text: |-
          At that time: Jesus said to his disciples: Be vigilant. For you do not know at what hour your Lord will return. And so forth.
      
          A Homily of Saint Hilary the Bishop
      - type: citation
        text: Comment. in Matth. Can 26
      - type: text
        text: 'So that we might know, though in silence, that ignorance of that day is for the benefit of all, the Lord admonished us to be watchful because of the coming of the thief, and to remain fixed in all the works of his commandments by the assiduous practice of prayer. For he shows the devil to be a thief, ever watchful to seize spoils from us and lying in ambush for the dwelling places of our bodies: so that, when we are careless and given to sleep, he might pierce them with the shafts and enticements of his designs. We must therefore be prepared: for ignorance of the day stirs up an intent solicitude of watchful expectation.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-63c2df8f83:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 21:9-19
      - type: text
        text: |-
          At that time, Jesus said unto His disciples: When ye shall hear of wars and commotions, be not terrified for these things must first come to pass; but the end is not by and by. And so on.

          Homily by Pope St Gregory (the Great.)
      - type: citation
        text: 35th on the Gospels.
      - type: text
        text: 'Our Lord and Redeemer willeth us to know what shall be the signs that the end of the world is at hand, to the end that ye may be the less terrified, when that cometh whereof ye have already had warning. Darts strike less which are seen coming: and the plagues of the earth will be to us more bearable, if we are harnessed against them with the shield of foreknowledge. Behold, how He saith When ye shall hear of wars and commotions be not terrified for these things must first come to pass; but the end is not by and by. It behoveth us to ponder these words of our Redeemer, wherein He warneth us of suffering, from without, and from within. Wars are the work of a foreign enemy, commotions of the citizens. Therefore, that He may let us know that we shall be troubled from within and from without, He showeth that our wrestling shall be in part against strangers, and in part against our brethren.'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 16:13-19
      - type: text
        text: |-
          In illo témpore: Venit Iesus in partes Cæsaréæ Philíppi, et interrogábat discípulos suos, dicens: Quem dicunt hómines esse Fílium hóminis? Et réliqua.

          Homilía sancti Leónis Papæ
      - type: citation
        text: Sermo 2 in anniversario assumpt. suæ, ante medium
      - type: text
        text: 'Cum, sicut evangélica lectióne reserátum est, interrogásset Dóminus discípulos, quem ipsum (multis divérsa opinántibus) créderent; respondissétque beátus Petrus, dicens: Tu es Christus Fílius Dei vivi; Dóminus ait: Beátus es, Simon Bar-Iona, quia caro et sanguis non revelávit tibi, sed Pater meus, qui in cælis est: et ego dico tibi, quia tu es Petrus, et super hanc petram ædificábo Ecclésiam meam, et portæ ínferi non prævalébunt advérsus eam. Et tibi dabo claves regni cælórum: et quodcúmque ligáveris super terram, erit ligátum et in cælis: et quodcúmque sólveris super terram, erit solútum et in cælis. Manet ergo disposítio veritátis, et beátus Petrus, in accépta fortitúdine petræ persevérans, suscépta Ecclésiæ gubernácula non relíquit.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 16:13-19
      - type: text
        text: |-
          At that time: Jesus came into the parts of Caesarea Philippi, and he questioned his disciples, saying: Who do men say that the Son of man is? And so forth.
      
          A Homily of Saint Leo the Pope
      - type: citation
        text: Sermo 2 in anniversario assumpt. suæ, ante medium
      - type: text
        text: 'When, as is revealed by the Gospel reading, the Lord had asked the disciples who — with many holding different opinions — they believed him to be, and blessed Peter had answered saying: You are the Christ, the Son of the living God; the Lord said: Blessed are you, Simon son of Jonah, for flesh and blood has not revealed this to you, but my Father who is in heaven. And I say to you, that you are Peter, and upon this rock I will build my Church, and the gates of Hell shall not prevail against it. And I will give you the keys of the kingdom of heaven; and whatever you shall bind on earth shall be bound in heaven, and whatever you shall release on earth shall be released in heaven. The disposition of truth therefore endures, and blessed Peter, persevering in the strength of the rock he received, has not abandoned the governance of the Church entrusted to him.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-6b4d22ca1d:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 14:26-33
      - type: text
        text: |-
          At that time, Jesus said unto the multitudes: If any man come to Me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple. And so on.

          Homily by Pope St Gregory the Great
      - type: citation
        text: Homilia 37th on the Gospels.
      - type: text
        text: Dearly beloved brethren, if we consider what and how great things are promised unto us in heaven, all things which are upon earth grow poor to our mind. For when this world's goods are reckoned against the gladness above, they are found to be a clog rather than an help. This present life being compared to life eternal, ought rather to be called death than life. For what is the daily failing of our corruption but, as it were, a creeping death But what tongue is there that can tell, or what understanding that can comprehend how great is the rejoicing in the city above, where they have part with the choirs of Angels, where they stand with the most blessed spirits before the glory of the Creator, where they see the face of God present, where they behold the Incomprehensible Light, where they have no fear of death, and where they rejoice eternally incorruptible
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 10:34-42
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Nolíte arbitrári quia pacem vénerim míttere in terram: non veni pacem míttere, sed gládium. Et réliqua.

          Homilía sancti Hilárii Epíscopi
      - type: citation
        text: Comment. in Matth., can. 10
      - type: text
        text: 'Quæ ista divísio est? inter prima enim legis præcépta accépimus: Honóra patrem tuum et matrem tuam; et ipse Dóminus ait: Pacem meam do vobis, pacem meam relínquo vobis. Quid sibi vult missus pótius gládius in terram, et separátus a patre fílius, et fília a matre, et nurus advérsus socrum, et hóminis doméstici eius inimíci? Igitur exínde pública auctóritas impietáti proferétur. Ubíque ódia, ubíque bella, et gládius Dómini inter patrem et fílium, et inter filiam matrémque desæviens.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 10:34-42
      - type: text
        text: |-
          At that time: Jesus said to his disciples: Do not think that I came to send peace upon the earth; I came, not to send peace, but the sword. And so forth.
      
          A Homily of Saint Hilary the Bishop
      - type: citation
        text: Comment. in Matth., can. 10
      - type: text
        text: 'What is this division? For among the first precepts of the law we received: Honor your father and your mother; and the Lord himself says: My peace I give to you, my peace I leave to you. What then does it mean that a sword is sent rather upon the earth, and a son is separated from his father, and a daughter from her mother, and a daughter-in-law against her mother-in-law, and the enemies of a man are those of his own household? For henceforth public authority will be given over to impiety. Everywhere hatred, everywhere wars, and the sword of the Lord raging between father and son and between daughter and mother.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-6d3b746c75:
    role: reading
    content:
