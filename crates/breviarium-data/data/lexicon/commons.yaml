      - type: response
        text: Et corónam pulchritúdinis pósuit super caput eius.
  responsory.surge-et-ccipe-p-erum-et-matrem-eius-et-fuge-in-eed8d5517f:
    role: responsory
    content:
      en:
      - type: response
        text: Arise, and take the young Child, and His Mother, and flee into Egypt;
      - type: text
        text: '* And be thou there until I bring thee word. Alleluia.'
      - type: versicle
        text: That it might be fulfilled which was spoken of the Lord by the Prophets, saying Out of Egypt have I called My Son.
      - type: response
        text: And be thou there until I bring thee word. Alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: And be thou there until I bring thee word. Alleluia.
      la:
      - type: response
        text: 'Surge, et áccipe Púerum et matrem eius, et fuge in Ægýptum:'
      - type: text
        text: '* Et esto ibi usque dum dicam tibi, allelúia.'
      - type: versicle
        text: 'Ut adimplerétur quod dictum est a Dómino per Prophétam dicéntem: Ex Ægýpto vocávi Fílium meum.'
      - type: response
        text: Et esto ibi usque dum dicam tibi, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et esto ibi usque dum dicam tibi, allelúia.
  responsory.t-llite-iugum-meum-super-vos-dicit-d-minus-et-d-5b754847a7:
    role: responsory
    content:
      en:
      - type: response
        text: Take up my yoke upon you, said the Lord, and learn of me, because I am meek, and humble of heart.
      - type: text
        text: '* For my yoke is sweet and my burden light.'
      - type: versicle
        text: And you shall find rest to your souls.
      - type: response
        text: For my yoke is sweet and my burden light.
      la:
      - type: response
        text: 'Tóllite iugum meum super vos, dicit Dóminus, et díscite a me, quia mitis sum et húmilis corde:'
      - type: text
        text: '* Iugum enim meum suáve est, et onus meum leve.'
      - type: versicle
        text: Et inveniétis réquiem animábus vestris.
      - type: response
        text: Iugum enim meum suáve est, et onus meum leve.
  responsory.tamquam-aurum-in-forn-ce-prob-vit-el-ctos-d-minu-1b54c6ae96:
    role: responsory
    content:
      en:
      - type: response
        text: As gold in the furnace hath the Lord tried His chosen ones, and received them as a burnt-offering, and yet a while, and they shall be regarded;
      - type: text
        text: '* For the grace of God, and His peace, are with His chosen.'
      - type: versicle
        text: They that put their trust in Him shall understand the truth and such as be faithful in love shall abide with Him.
      - type: response
        text: For the grace of God, and His peace, are with His chosen.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: For the grace of God, and His peace, are with His chosen.
      la:
      - type: response
        text: 'Tamquam aurum in fornáce probávit eléctos Dóminus, et quasi holocáusti hóstiam accépit illos: et in témpore erit respéctus illórum:'
      - type: text
        text: '* Quóniam donum et pax est eléctis Dei.'
      - type: versicle
        text: Qui confídunt in illum, intélligent veritátem, et fidéles in dilectióne acquiéscent illi.
      - type: response
        text: Quóniam donum et pax est eléctis Dei.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quóniam donum et pax est eléctis Dei.
  responsory.tamquam-aurum-in-forn-ce-prob-vit-el-ctos-d-minu-348a3f8491:
    role: responsory
    content:
      la:
      - type: response
        text: 'Tamquam aurum in fornáce probávit eléctos Dóminus, et quasi holocáusti hóstiam accépit illos: et in témpore erit respéctus illórum:'
      - type: text
        text: '* Quóniam donum et pax est eléctis Dei.'
      - type: versicle
        text: Qui confídunt in illum, intélligent veritátem, et fidéles in dilectióne acquiéscent illi.
      - type: response
        text: Quóniam donum et pax est eléctis Dei.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Quóniam donum et pax est eléctis Dei.
  responsory.tradid-runt-c-rpora-sua-propter-deum-ad-suppl-ci-9f52ec9be0:
    role: responsory
    content:
      en:
      - type: response
        text: They gave their bodies for God’s sake to death
      - type: text
        text: '* And gained the everlasting crown.'
      - type: versicle
        text: These are they which came out of great tribulation, and have washed their robes in the Blood of the Lamb.
      - type: response
        text: And gained the everlasting crown.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: And gained the everlasting crown.
      la:
      - type: response
        text: 'Tradidérunt córpora sua propter Deum ad supplícia:'
      - type: text
        text: '* Et meruérunt habére corónas perpétuas.'
      - type: versicle
        text: Isti sunt qui venérunt ex magna tribulatióne, et lavérunt stolas suas in sánguine Agni.
      - type: response
        text: Et meruérunt habére corónas perpétuas.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et meruérunt habére corónas perpétuas.
  responsory.tradid-runt-c-rpora-sua-propter-deum-ad-suppl-ci-ab0144a6fc:
    role: responsory
    content:
      la:
      - type: response
        text: 'Tradidérunt córpora sua propter Deum ad supplícia:'
      - type: text
        text: '* Et meruérunt habére corónas perpétuas.'
      - type: versicle
        text: Isti sunt qui venérunt ex magna tribulatióne, et lavérunt stolas suas in sánguine Agni.
      - type: response
        text: Et meruérunt habére corónas perpétuas.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et meruérunt habére corónas perpétuas.
  responsory.trist-tia-vestra-allel-ia-70349fb6de:
    role: responsory
    content:
      en:
      - type: response
        text: Your sorrow, alleluia.
      - type: text
        text: '* Shall be turned into joy, alleluia.'
      - type: versicle
        text: 'The world shall rejoice: and you shall be made sorrowful, but your sorrow.'
      - type: response
        text: Shall be turned into joy, alleluia.
      la:
      - type: response
        text: Tristítia vestra, allelúia,
      - type: text
        text: '* Convertétur in gáudium, allelúia, allelúia.'
      - type: versicle
        text: Mundus autem gaudébit, vos vero contristabímini, sed tristítia vestra.
      - type: response
        text: Convertétur in gáudium, allelúia, allelúia.
  responsory.v-nea-mea-el-cta-ego-te-plant-vi-dicit-d-minus-e-0024085109:
    role: responsory
    content:
      la:
      - type: response
        text: 'Vínea mea elécta, ego te plantávi, dicit Dóminus: et tu facta es mihi nimis amára:'
      - type: text
        text: '* Quia parásti crucem Salvatóri tuo.'
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Quia parásti crucem Salvatóri tuo.
  responsory.v-rbera-carn-ficum-non-timu-runt-sancti-dei-mori-f04e9a0799:
    role: responsory
    content:
      la:
      - type: response
        text: 'Vérbera carníficum non timuérunt Sancti Dei, moriéntes pro Christi nómine:'
      - type: text
        text: '* Ut herédes fíerent in domo Dómini.'
      - type: versicle
        text: Tradidérunt córpora sua propter Deum ad supplícia.
      - type: response
        text: Ut herédes fíerent in domo Dómini.
  responsory.v-rbera-carn-ficum-non-timu-runt-sancti-dei-mori-f10264373e:
    role: responsory
    content:
      en:
      - type: response
        text: The Saints of God shrank not from the stripes of the executioners, but died for Christ's Name's sake
      - type: text
        text: '* That they might be made joint-heirs in the house of the Lord.'
      - type: versicle
        text: They gave their bodies for God's sake to death.
      - type: response
        text: That they might be made joint-heirs in the house of the Lord.
      la:
      - type: response
        text: 'Vérbera carníficum non timuérunt Sancti Dei, moriéntes pro Christi nómine:'
      - type: text
        text: '* Ut herédes fíerent in domo Dómini.'
      - type: versicle
        text: Tradidérunt córpora sua propter Deum ad supplícia.
      - type: response
        text: Ut herédes fíerent in domo Dómini.
  responsory.veni-el-cta-mea-et-ponam-in-te-thronum-meum-f0631705bb:
    role: responsory
    content:
      en:
      - type: response
        text: Come, O My chosen one, and I will establish My throne in thee;
      - type: text
        text: '* For the King hath greatly desired thy beauty.'
      - type: versicle
        text: In thy comeliness and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: For the King hath greatly desired thy beauty.
      la:
      - type: response
        text: Veni, elécta mea, et ponam in te thronum meum
      - type: text
        text: '* Quia concupívit Rex spéciem tuam.'
      - type: versicle
        text: Spécie tua et pulchritúdine tua inténde, próspere procéde, et regna.
      - type: response
        text: Quia concupívit Rex spéciem tuam.
  responsory.veni-sponsa-christi-ccipe-cor-nam-quam-tibi-d-mi-c2cef097e0:
    role: responsory
    content:
      en:
      - type: short_response
        text: Come, Bride of Christ, and take the everlasting crown, which the Lord hath prepared for thee, even for thee who for the love of Him hast shed thy blood;
      - type: text
        text: '* And art entered with Angels into His garden.'
      - type: versicle
        text: Come, O My chosen one, and I will establish My throne in thee, for the King hath reatly desired thy beauty
      - type: response
        text: And art entered with Angels into His garden.
      la:
      - type: response
        text: Veni Sponsa Christi, áccipe corónam, quam tibi Dóminus præparávit in ætérnum; pro cuius amóre sánguinem tuum fudísti,
      - type: text
        text: '* Et cum Ángelis in paradísum introísti.'
      - type: versicle
        text: Veni, elécta mea, et ponam in te thronum meum; quia concupívit Rex spéciem tuam.
      - type: response
        text: Et cum Ángelis in paradísum introísti.
  responsory.vidi-coni-nctos-viros-hab-ntes-spl-ndidas-vestes-2c0f430785:
    role: responsory
    content:
      en:
      - type: response
        text: 'I saw men standing together, clad in shining raiment, and the Angel of the Lord spoke unto me, saying:'
      - type: text
        text: '* These men are holy, for they are the friends of God.'
      - type: versicle
        text: 'I saw a strong Angel of God fly into the midst of heaven, saying with a loud voice:'
      - type: response
        text: These men are holy, for they are the friends of God.
      la:
      - type: response
        text: 'Vidi coniúnctos viros, habéntes spléndidas vestes, et Ángelus Dómini locútus est ad me, dicens:'
      - type: text
        text: '* Isti sunt viri sancti facti amíci Dei.'
      - type: versicle
        text: Vidi Ángelum Dei fortem, volántem per médium cælum, voce magna clamántem et dicéntem.
      - type: response
        text: Isti sunt viri sancti facti amíci Dei.
  responsory.viri-sancti-glori-sum-s-nguinem-fud-runt-pro-d-m-c58eca9989:
    role: responsory
    content:
      la:
      - type: response
        text: 'Viri sancti gloriósum sánguinem fudérunt pro Dómino, amavérunt Christum in vita sua, imitáti sunt eum in morte sua:'
      - type: text
        text: '* Et ídeo corónas triumpháles meruérunt.'
      - type: versicle
        text: Unus spíritus, et una fides erat in eis.
      - type: response
        text: Et ídeo corónas triumpháles meruérunt.
  responsory.viri-sancti-glori-sum-s-nguinem-fud-runt-pro-d-m-f347561435:
    role: responsory
    content:
      en:
      - type: response
        text: These men are holy, who have gloriously shed their blood for the Lord's sake, yea, who loved Christ in their lives, and were made like unto Him in their flesh,
      - type: text
        text: '* And therefore they have earned crowns of victory.'
      - type: versicle
        text: One spirit, and one faith was in them.
      - type: response
        text: And therefore they have earned crowns of victory.
      la:
      - type: response
        text: 'Viri sancti gloriósum sánguinem fudérunt pro Dómino, amavérunt Christum in vita sua, imitáti sunt eum in morte sua:'
      - type: text
        text: '* Et ídeo corónas triumpháles meruérunt.'
      - type: versicle
        text: Unus spíritus, et una fides erat in eis.
      - type: response
        text: Et ídeo corónas triumpháles meruérunt.
  responsory.virt-te-magna-redd-bant-ap-stoli-609a49049d:
    role: responsory
    content:
      en:
      - type: response
        text: With great power did the Apostles
      - type: text
        text: '* Give testimony of the resurrection of Jesus Christ our Lord, alleluia, alleluia.'
      - type: versicle
        text: 'And they were all filled with the Holy Ghost: and they spoke the word of God with confidence.'
      - type: response
        text: Give testimony of the resurrection of Jesus Christ our Lord, alleluia, alleluia.
      la:
      - type: response
        text: Virtúte magna reddébant Apóstoli
      - type: text
        text: '* Testimónium resurrectiónis Iesu Christi Dómini nostri, allelúia, allelúia.'
      - type: versicle
        text: Repléti quidem Spíritu Sancto, loquebántur cum fidúcia verbum Dei.
      - type: response
        text: Testimónium resurrectiónis Iesu Christi Dómini nostri, allelúia, allelúia.
  short-reading.act-5-41-62f73f56f7:
    role: short_reading
    content:
      en:
      - type: citation
        text: Acts 5:41
      - type: versicle
        text: And the Apostles indeed went from the presence of the council, rejoicing that they were accounted worthy to suffer reproach for the name of Jesus.
      la:
      - type: citation
        text: Act 5:41
      - type: text
        text: Ibant Apóstoli gaudéntes a conspéctu concílii, quóniam digni hábiti sunt pro nómine Iesu contuméliam pati.
  short-reading.apo-21-4-5-fa8af0c8ca:
    role: short_reading
    content:
      en:
      - type: citation
        text: Rev 21:4-4
      - type: text
        text: 'And God shall wipe away all tears from their eyes, and there shall be no more death, neither sorrow, nor crying, neither shall there be any more pain; for the former things are passed away. And He That sat upon the throne said: Behold, I make all things new.'
      la:
      - type: citation
        text: Apo 21:4-5
      - type: text
        text: 'Et abstérget Deus omnem lácrimam ab óculis eórum: et mors ultra non erit, neque luctus, neque clamor, neque dolor erit ultra, quia prima abiérunt. Et dixit qui sedébat in throno: Ecce nova fácio ómnia.'
  short-reading.is-53-b9c51d26fe:
    role: short_reading
    content:
      la:
      - type: heading
        text: Is 53
      - type: text
        text: 'Generatiónem eius quis enarrabit? Quia abscissus est de terra vivéntium: propter scelus pópuli mei percússi eum.'
  short-reading.prov-31-29-30-7e15610fbd:
    role: short_reading
    content:
      en:
      - type: citation
        text: Prov 31:29-30
      - type: text
        text: 'Many daughters have gathered together riches: thou hast surpassed them all. Favour is deceitful, and beauty is vain: the woman that feareth the Lord, she shall be praised.'
      la:
      - type: citation
        text: Prov 31:29-30
      - type: text
        text: 'Multæ fíliæ congregavérunt divítias: tu supergréssa es univérsas. Fallax grátia, et vana est pulchritúdo: múlier timens Dóminum, ipsa laudábitur.'
  short-reading.rom-8-28-9fefa0bba0:
    role: short_reading
    content:
      en:
      - type: citation
        text: Rom 8:28
      - type: text
        text: And we know that to them that love God, all things work together unto good, to such as, according to his purpose, are called to be saints.
      la:
      - type: citation
        text: Rom 8:28
      - type: text
        text: Scimus quóniam diligéntibus Deum ómnia cooperántur in bonum, iis qui secúndum propósitum vocáti sunt sancti.
  short-reading.sap-10-10-d0e681ab77:
    role: short_reading
    content:
      en:
      - type: citation
        text: Wis 10:10
      - type: text
        text: She conducted the just, when he fled from his brother's wrath, through the right ways, and showed him the kingdom of God, and gave him the knowledge of the holy things, made him honourable in his labours, and accomplished his labours.
      la:
      - type: citation
        text: Sap 10:10
      - type: text
        text: 'Iustum dedúxit Dóminus per vias rectas, et osténdit illi regnum Dei, et dedit illi sciéntiam sanctórum: honestávit illum in labóribus, et complévit labóres illíus.'
  short-reading.sap-10-10-e42c2c9341:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sap 10:10
      - type: text
        text: 'Iustum dedúxit Dóminus per vias rectas, et osténdit illi regnum Dei, et dedit illi sciéntiam sanctórum: honestávit illum in labóribus, et complévit labóres illíus.'
  short-reading.sap-3-7-8-7c78bf8e39:
    role: short_reading
    content:
      en:
      - type: citation
        text: Wis 3:7-8
      - type: text
        text: The just shall shine, and shall run to and fro like sparks among the reeds. They shall judge nations, and rule over people, and their Lord shall reign for ever.
      la:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: 'Fulgébunt iusti, et tamquam scintíllæ in arundinéto discúrrent. Iudicábunt natiónes, et dominabúntur pópulis: et regnábit Dóminus illórum in perpétuum.'
  short-reading.sap-3-7-8-d4443e8350:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: 'Fulgébunt iusti, et tamquam scintíllæ in arundinéto discúrrent. Iudicábunt natiónes, et dominabúntur pópulis: et regnábit Dóminus illórum in perpétuum.'
  short-reading.sap-4-1-75192b022f:
    role: short_reading
    content:
      en:
      - type: citation
        text: Wis 4:1
      - type: text
        text: 'O how beautiful is the chaste generation with glory: for the memory thereof is immortal: because it is known both with God and with men.'
      la:
      - type: citation
        text: Sap 4:1
      - type: text
        text: O quam pulchra est casta generátio cum claritáte! Immortális est enim memória illíus, quóniam apud Deum nota est, et apud hómines.
  short-reading.sir-24-19-20-451a48cfb9:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: 'In platéis sicut cinnamómum et bálsamum aromatízans odórem dedi: quasi myrrha elécta, dedi suavitátem odóris.'
  short-reading.sir-24-19-20-b7f351f59f:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: 'As a plane tree by the water in the streets, I gave a sweet smell like cinnamon. and aromatical balm: I yielded a sweet odour like the best myrrh.'
      la:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: 'In platéis sicut cinnamómum et bálsamum aromatízans odórem dedi: quasi myrrha elécta, dedi suavitátem odóris.'
  short-reading.sir-39-6-20bfd77cf5:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sir 39:6
      - type: text
        text: Iustus cor suum trádidit ad vigilándum dilúculo ad Dóminum, qui fecit illum, et in conspéctu Altíssimi deprecábitur.
  short-reading.sir-39-6-f4818753b5:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 39:6
      - type: text
        text: He will give his heart to resort early to the Lord that made him, and he will pray in the sight of the most High.
      la:
      - type: citation
        text: Sir 39:6
      - type: text
        text: Iustus cor suum trádidit ad vigilándum dilúculo ad Dóminum, qui fecit illum, et in conspéctu Altíssimi deprecábitur.
  short-reading.sir-45-19-20-83d1b177e4:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: To execute the office of the priesthood, and to have praise, and to glorify his people in his name. He chose him out of all men living, to offer sacrifice to God, incense, and a good savour.
      la:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: Fungi sacerdótio, et habére laudem in nómine ipsíus, et offérre illi incénsum dignum in odórem suavitátis.
  short-reading.sir-45-19-20-d4486c4926:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: Fungi sacerdótio, et habére laudem in nómine ipsíus, et offérre illi incénsum dignum in odórem suavitátis.
  short-reading.sir-51-13-14-894a3c3bcb:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 51:13-14
      - type: text
        text: O Lord, my God thou hast exalted my dwelling place upon the earth and I have prayed for death to pass away. I called upon the Lord, the father of my Lord, that he would not leave me in the day of my trouble, and in the time of the proud without help.
      la:
      - type: citation
        text: Sir 51:13-14
