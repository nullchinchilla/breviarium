      - type: text
        text: Amen.
  hymn.huius-or-tu-deus-alme-nobis-05ea9be08a:
    role: hymn
    content:
      la:
      - type: text
        text: Huius orátu, Deus alme, nobis
      - type: text
        text: Débitas pœnas scélerum remítte;
      - type: text
        text: Ut tibi puro resonémus almum
      - type: text
        text: Péctore carmen.
      - type: text
        text: Sit decus Patri, genitǽque Proli,
      - type: text
        text: Et tibi, compar utriúsque virtus,
      - type: text
        text: Spíritus semper, Deus unus, omni
      - type: text
        text: Témporis ævo.
      - type: text
        text: Amen.
  hymn.huius-or-tu-deus-alme-nobis-a17eca3ef7:
    role: hymn
    content:
      en:
      - type: text
        text: Son of a virgin, maker of thy mother,
      - type: text
        text: Thou, rod and blossom from a stem unstainèd,
      - type: text
        text: While we a Virgin's triumphs are rehearsing,
      - type: text
        text: Hear our petition!
      - type: text
        text: Lo, on thy handmaid fell a two-fold blessing,
      - type: text
        text: Who, in her body vanquishing the weakness,
      - type: text
        text: In that same body, grace from heaven obtaining,
      - type: text
        text: Bore the world witness.
      - type: text
        text: Death, nor the rending pains of death appalled her;
      - type: text
        text: 'Bondage and torment found her undefeated:'
      - type: text
        text: So by the shedding of her blood attained she
      - type: text
        text: Heavenly guerdon.
      - type: text
        text: Fountain of mercy, hear the prayers she offers;
      - type: text
        text: Purge our offences, pardon our transgressions,
      - type: text
        text: So that hereafter we to thee may render
      - type: text
        text: Praise with thanksgiving.
      - type: text
        text: Thou, the All-Father, thou, the One-Begotten,
      - type: text
        text: Thou, Holy Spirit, Three in One co-equal,
      - type: text
        text: Glory be henceforth thine through all the ages,
      - type: text
        text: World without ending.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Huius orátu, Deus alme, nobis
      - type: text
        text: Débitas pœnas scélerum remítte;
      - type: text
        text: Ut tibi puro resonémus almum
      - type: text
        text: Péctore carmen.
      - type: text
        text: Sit decus Patri, genitǽque Proli,
      - type: text
        text: Et tibi, compar utriúsque virtus,
      - type: text
        text: Spíritus semper, Deus unus, omni
      - type: text
        text: Témporis ævo.
      - type: text
        text: Amen.
  hymn.iesu-cor-na-c-lsior-21071f0349:
    role: hymn
    content:
      la:
      - type: text
        text: Iesu, coróna célsior,
      - type: text
        text: Et véritas sublímior,
      - type: text
        text: Qui confiténti sérvulo
      - type: text
        text: 'Reddis perénne prǽmium:'
      - type: text
        text: Da supplicánti cœ́tui,
      - type: text
        text: Huius rogátu, nóxii
      - type: text
        text: Remissiónem críminis,
      - type: text
        text: Rumpéndo nexum vínculi.
      - type: text
        text: Anni revérso témpore,
      - type: text
        text: Dies refúlsit lúmine,
      - type: text
        text: Quo Sanctus hic de córpore
      - type: text
        text: Migrávit inter sídera.
      - type: text
        text: Hic vana terræ gáudia,
      - type: text
        text: Et luculénta prǽdia,
      - type: text
        text: Pollúta sorde députans,
      - type: text
        text: Ovans tenet cæléstia.
      - type: text
        text: Te, Christe, Rex piíssime,
      - type: text
        text: Hic confiténdo iúgiter,
      - type: text
        text: Calcávit artes dǽmonum,
      - type: text
        text: Sævúmque avérni príncipem.
      - type: text
        text: Virtúte clarus, et fide,
      - type: text
        text: Confessióne sédulus,
      - type: text
        text: Ieiúna membra déferens,
      - type: text
        text: Dapes supérnas óbtinet.
      - type: text
        text: Proínde te piíssime
      - type: text
        text: 'Precámur omnes súpplices:'
      - type: text
        text: Nobis ut huius grátia
      - type: text
        text: Pœnas remíttas débitas.
      - type: text
        text: '* Patri perénnis glória,'
      - type: text
        text: Natóque Patris único,
      - type: text
        text: Sanctóque sit Paráclito,
      - type: text
        text: Per omne semper sǽculum.
      - type: text
        text: Amen.
  hymn.iesu-cor-na-c-lsior-3c7f993986:
    role: hymn
    content:
      en:
      - type: text
        text: Jesu, eternal truth sublime,
      - type: text
        text: Through endless years the same!
      - type: text
        text: Thou crown of those who through all time
      - type: text
        text: 'Confess thy holy name:'
      - type: text
        text: Thy suppliant people, through the prayer
      - type: text
        text: Of thy blest saint, forgive;
      - type: text
        text: For his dear sake, thy wrath forbear,
      - type: text
        text: And bid our spirits live.
      - type: text
        text: Again returns the sacred day,
      - type: text
        text: With heavenly glory bright,
      - type: text
        text: Which saw him go upon his way
      - type: text
        text: Into the realms of light.
      - type: text
        text: All objects of our vain desire,
      - type: text
        text: All earthly joys and gains,
      - type: text
        text: To him were but as filthy mire;
      - type: text
        text: And now with thee he reigns.
      - type: text
        text: Thee, Jesu, his all-gracious Lord,
      - type: text
        text: Confessing to the last,
      - type: text
        text: He trod beneath him Satan's fraud,
      - type: text
        text: And stood forever fast.
      - type: text
        text: In holy deeds of faith and love,
      - type: text
        text: In fastings and in prayers,
      - type: text
        text: His days were spent; and now above
      - type: text
        text: Thy heavenly feast he shares.
      - type: text
        text: Then, for his sake thy wrath lay by,
      - type: text
        text: And hear us while we pray;
      - type: text
        text: And pardon us, O thou most high,
      - type: text
        text: On this his festal day.
      - type: text
        text: '* All glory to the Father be;'
      - type: text
        text: And sole Incarnate Son;
      - type: text
        text: Praise, holy Paraclete, to thee;
      - type: text
        text: While endless ages run.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Iesu, coróna célsior,
      - type: text
        text: Et véritas sublímior,
      - type: text
        text: Qui confiténti sérvulo
      - type: text
        text: 'Reddis perénne prǽmium:'
      - type: text
        text: Da supplicánti cœ́tui,
      - type: text
