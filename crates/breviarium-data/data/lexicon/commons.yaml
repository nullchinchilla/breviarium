        text: Quocúmque tendis, Vírgines
      - type: text
        text: Sequúntur, atque láudibus
      - type: text
        text: Post te canéntes cúrsitant,
      - type: text
        text: Hymnósque dulces pérsonant;
      - type: text
        text: Te deprecámur súpplices,
      - type: text
        text: Nostris ut addas sénsibus
      - type: text
        text: Nescíre prorsus ómnia
      - type: text
        text: Corruptiónis vúlnera.
      - type: text
        text: '* Virtus, honor, laus, glória'
      - type: text
        text: Deo Patri cum Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.iesu-red-mptor-mnium-3efe75fd2b:
    role: hymn
    content:
      la:
      - type: text
        text: Iesu Redémptor ómnium,
      - type: text
        text: Perpes coróna Prǽsulum,
      - type: text
        text: In hac die cleméntius
      - type: text
        text: Indúlgeas precántibus.
      - type: text
        text: Tui sacri qua nóminis
      - type: text
        text: 'Conféssor almus cláruit:'
      - type: text
        text: Huius celébrat ánnua
      - type: text
        text: Devóta plebs solémnia.
      - type: text
        text: Qui rite mundi gáudia
      - type: text
        text: Huius cadúca réspuens,
      - type: text
        text: Æternitátis prǽmio
      - type: text
        text: Potítur inter Ángelos.
      - type: text
        text: Huius benígnus ánnue
      - type: text
        text: 'Nobis sequi vestígia:'
      - type: text
        text: Huius precátu, sérvulis
      - type: text
        text: Dimítte noxam críminis.
      - type: text
        text: '* Sit Christe, Rex piíssime,'
      - type: text
        text: Tibi, Patríque glória,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc, et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.iesu-red-mptor-mnium-5e72f44dc3:
    role: hymn
    content:
      en:
      - type: text
        text: Jesu, the world’s Redeemer, O hear;
      - type: text
        text: 'thy bishops’ fadeless crown, draw near:'
      - type: text
        text: Accept with gentlest love today
      - type: text
        text: The prayers and praises that we pay.
      - type: text
        text: The meek confessor of thy name
      - type: text
        text: Today attained a glorious fame;
      - type: text
        text: Whose yearly feast, in solemn state,
      - type: text
        text: Thy faithful people celebrate.
      - type: text
        text: The world and all its boasted good,
      - type: text
        text: As vain and passing, he eschewed;
      - type: text
        text: And therefore with angelic bands,
      - type: text
        text: In endless joy forever stands.
      - type: text
        text: Grant then that we, most gracious God,
      - type: text
        text: 'May follow in the steps he trod:'
      - type: text
        text: And, at his prayer, thy servants free
      - type: text
        text: From stain of all iniquity.
      - type: text
        text: '* To thee, O Christ, our loving King,'
      - type: text
        text: 'All glory, praise, and thanks we bring:'
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To Father and to Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Iesu Redémptor ómnium,
      - type: text
        text: Perpes coróna Prǽsulum,
      - type: text
        text: In hac die cleméntius
      - type: text
        text: Indúlgeas precántibus.
      - type: text
        text: Tui sacri qua nóminis
      - type: text
        text: 'Conféssor almus cláruit:'
      - type: text
        text: Huius celébrat ánnua
      - type: text
        text: Devóta plebs solémnia.
      - type: text
        text: Qui rite mundi gáudia
      - type: text
        text: Huius cadúca réspuens,
      - type: text
        text: Æternitátis prǽmio
      - type: text
        text: Potítur inter Ángelos.
      - type: text
        text: Huius benígnus ánnue
      - type: text
        text: 'Nobis sequi vestígia:'
      - type: text
        text: Huius precátu, sérvulis
      - type: text
        text: Dimítte noxam críminis.
      - type: text
        text: '* Sit Christe, Rex piíssime,'
      - type: text
        text: Tibi, Patríque glória,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc, et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.inv-cte-martyr-nicum-86f458abe7:
    role: hymn
    content:
      en:
      - type: text
        text: Martyr of God, whose strength was steeled
      - type: text
        text: To follow close God's only Son,
      - type: text
        text: Well didst thou brave thy battlefield,
      - type: text
        text: And well thy heavenly bliss was won!
      - type: text
        text: Now join thy prayers with ours, who pray
      - type: text
        text: That God may pardon us and bless;
      - type: text
        text: For prayer keeps evil's plague away,
      - type: text
        text: And draws from life its weariness.
      - type: text
        text: Long, long ago, were loosed the chains
      - type: text
        text: That held thy body once in thrall;
      - type: text
        text: For us how many a bond remains!
      - type: text
        text: O love of God release us all.
      - type: text
        text: All praise to God the Father be,
      - type: text
        text: All praise to thee, Eternal Son;
      - type: text
        text: All praise, O Holy Ghost, to thee,
      - type: text
        text: While never-ending ages run.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Invícte Martyr, únicum
      - type: text
        text: Patris secútus Fílium,
      - type: text
        text: Victis triúmphas hóstibus,
      - type: text
        text: Victor fruens cæléstibus.
      - type: text
        text: Tui precátus múnere
      - type: text
        text: Nostrum reátum dílue,
      - type: text
        text: Arcens mali contágium,
      - type: text
        text: Vitæ repéllens tǽdium.
      - type: text
        text: Solúta sunt iam víncula
      - type: text
        text: 'Tui sacráti córporis:'
      - type: text
        text: Nos solve vinclis sǽculi,
      - type: text
        text: Dono supérni Núminis.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc, et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.inv-cte-martyr-nicum-ee6b6d22c6:
    role: hymn
    content:
      la:
      - type: text
        text: Invícte Martyr, únicum
      - type: text
        text: Patris secútus Fílium,
      - type: text
        text: Victis triúmphas hóstibus,
