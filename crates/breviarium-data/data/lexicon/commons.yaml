      la:
      - type: text
        text: 'Sed percontári libet, quómodo paréntes et carnáliter propínquos præcípimur odísse, qui iubémur et inimícos dilígere? Et certe Véritas de uxóre dicit: Quod Deus coniúnxit, homo non séparet. Et Paulus ait: Viri, dilígite uxóres vestras, sicut et Christus Ecclésiam. Ecce, discípulus uxórem diligéndam prǽdicat, cum magíster dicat: Qui uxórem non odit, non potest meus esse discípulus. Numquid áliud iudex núntiat, áliud præco clamat? An simul et odísse póssumus, et dilígere? Sed si vim præcépti perpéndimus, utrúmque ágere per discretiónem valémus: ut uxórem, et eos, qui nobis carnis cognatióne coniúncti sunt, et quos próximos nóvimus, diligámus; et quos adversários in via Dei pátimur, odiéndo et fugiéndo nesciámus.'
