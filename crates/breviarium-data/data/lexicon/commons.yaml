        antiphon: As gold * in a furnace the Lord tried his chosen ones, and as a burnt offering he received them for ever.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: If in the sight of men * they suffered torments, the hope of the chosen is immortal for ever.
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: I will give to my Saints * a named place in the Kingdom of my Father, says the Lord.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: To his holy ones who are in his land, * he has made wonderful all my desires among them.
        psalms:
        - number: '15'
      - type: psalmody
        antiphon: The holy ones who hope in the Lord * shall have strength; they shall take wings as eagles, they shall fly, and shall not grow weary.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: But the just * shall live for ever, and their reward is with the Lord.
        psalms:
        - number: '32'
      - type: psalmody
        antiphon: They delivered * their bodies to death, that they might not serve idols; therefore, crowned, they possess the palm.
