  reading.sed-si-caro-verbi-dei-sec-ndum-carnem-nasc-ntis-69e5b81b53:
    role: reading
    content:
      en:
      - type: citation
        text: 'If we shall say that the Flesh, Wherewith the Son of God was born in the flesh, was something outside of the flesh of the Virgin His Mother, without reason should we bless the womb that bore Him, and the paps which He hath sucked. But the Apostle saith: “God sent forth His Son, made of a woman, made under the law”, (Gal. iv. 4,) and they are not to be listened to who read this passage: “Born of a woman, made under the law.” He was made of a woman, for He was conceived in a virgin''s womb, and took His Flesh, not from nothing, not from elsewhere, but from the flesh of His Mother. Otherwise, and if He had not been sprung of a woman, He could not with truth be called the Son of man. Let us therefore, denying the doctrine of Eutyches, lift up our voice, along with the Universal Church, whereof that woman was a figure, let us lift up our heart as well as our voice from the company, and say unto the Saviour: Blessed is the womb that bare thee, and the paps which thou hast sucked. Blessed Mother, of whom one hath said thou art His Mother, Who reigns over earth and over heaven for ever.'
      la:
      - type: text
        text: 'Sed, si caro Verbi Dei secúndum carnem nascéntis a carne Vírginis matris pronuntiátur extránea, sine causa venter qui eam portásset, úbera quæ lactássent, beatificántur. Dicit autem Apóstolus: Quia misit Deus Fílium suum, factum ex mulíere, factum sub lege. Neque audiéndi sunt, qui legéndum putant: Natum ex mulíere, factum sub lege, sed Factum ex mulíere; quia concéptus ex útero virgináli, carnem non de níhilo, non aliúnde, sed matérna traxit ex carne. Alióquin nec vere Fílius hóminis dicerétur, qui oríginem non habéret ex hómine. Et nos ígitur, his contra Eutychen dictis, extollámus vocem cum Ecclésia cathólica, cuius hæc múlier typum gessit, extollámus et mentem de médio turbárum, dicamúsque Salvatóri: Beátus venter qui te portávit, et úbera quæ suxísti. Vere enim beáta parens, quæ, sicut quidam ait, Eníxa est puérpera Regem, qui cælum terrámque tenet per sǽcula.'
  reading.sermo-sancti-ambr-sii-ep-scopi-ecd3053c7f:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St. Ambrose, Bishop of Milan.
      - type: heading
        text: Book. I. on Virgins
      - type: text
        text: This day is a maiden's Birthday. The love of virginity provoketh us to say somewhat touching maidenhood, lest, if we pass thereby, we should seem to cast a slur on that which was her chief strength. Virginity is not to be praised because it is a grace which is poured forth in Martyrs, but because it is a grace which maketh Martyrs. But what understanding of man can rightly grasp this excellency which riseth above the laws of nature herself? What natural voice can portray a thing which is supernaturally noble? It is a reflection on earth of a glory whose home is in heaven. And it is but that which we may justly look for, when we see her who hath her Husband in heaven, live a life whose model is the life of heaven.
      la:
      - type: text
        text: Sermo sancti Ambrósii Epíscopi
      - type: heading
        text: Lib. 1 de Virg., circa init.
      - type: text
        text: Quóniam hódie natális est Vírginis, invítat nunc integritátis amor, ut áliquid de virginitáte dicámus; ne, véluti tránsitu quodam præstrícta videátur, quæ principális est virtus. Non enim ídeo laudábilis virgínitas, quia in Martýribus reperítur; sed quia ipsa Mártyres fáciat. Quis autem humáno eam possit ingénio comprehéndere, quam nec natúra suis inclúsit légibus? aut quis naturáli voce complécti, quod supra usum natúræ sit? E cælo accersívit quod imitarétur in terris. Nec immérito vivéndi sibi usum quæsívit e cælo, quæ Sponsum sibi invénit in cælo.
  reading.sermo-sancti-ambrosii-episcopi-8b31dde8ae:
    role: reading
    content:
      en:
      - type: text
        text: Homily of St. Ambrose, Bishop
      - type: heading
        text: Serm. 22
      - type: citation
        text: 'Dearly beloved brethren, it is very meet and right that after the gladness of Easter, which we have celebrated in the Church, we should mingle our own joy with the joy of the holy Martyrs yea, that we should tell of the glory of the Lord''s rising again, to them that have been made partakers of the Lord''s sufferings. It truly must needs be that they which have been partakers of His sufferings, should be also of His joy. For thus saith the blessed Apostle: “As ye are partakers of the sufferings, so shall ye be also of the consolation.” (2 Cor. i. 7.) And again “If we suffer, we shall also reign with Him.” (2 Tim. ii. 12.) He, therefore, that endureth sorrow for Christ, must needs also have glory with Christ.'
      la:
      - type: text
        text: Sermo sancti Ambrosii Episcopi
      - type: heading
        text: Serm. 22
      - type: text
        text: 'Dignum et cóngruum est, fratres, ut post lætítiam Paschæ, quam in Ecclésia celebrávimus, gáudia nostra cum sanctis Martýribus conferámus: et iis annuntiémus Domínicæ resurrectiónis glóriam, qui consórtes sunt Domínicæ passiónis. Qui enim sócii sunt contuméliæ, debent et partícipes esse lætítiæ. Ita enim dicit beátus Apóstolus: Sicut sócii passiónum estis, et resurrectiónis éritis: si tolerábimus, inquit, et conregnábimus. Qui ergo toleravérunt mala propter Christum, debent et glóriam habére cum Christo.'
  reading.sermo-sancti-august-ni-ep-scopi-0d70dbc600:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St. Augustine, Bishop (of Hippo.)
      - type: heading
        text: Serm. 47. of the Saints.
      - type: text
        text: Dearly beloved brethren, as often as we keep the Feasts of the holy Martyrs, we look to obtain of the Lord, by their intercession, such good things in this life that thereby we, following them, may gain better in that which is to come. For they only do truly keep Holiday on the Feasts of the Martyrs, who follow after the Martyrs' example. These Feasts of the Martyrs are the Martyrs' preaching, whereby to stir us up to imitate what we are not loath to honour.
      la:
      - type: text
        text: Sermo sancti Augustíni Epíscopi
      - type: heading
        text: Serm. 47. de Sanctis.
      - type: text
        text: 'Quotiescúmque fratres caríssimi, sanctórum Mártyrum solémnia celebrámus, ita, ipsis intercedéntibus, exspectémus a Dómino cónsequi temporália benefícia, ut ipsos Mártyres imitándo accípere mereámur ætérna. Ab ipsis enim sanctórum Mártyrum in veritáte festivitátum gáudia celebrántur, qui ipsórum Mártyrum exémpla sequúntur. Solemnitátes enim Mártyrum exhortatiónes sunt martyriórum: ut imitári non pígeat, quod celebráre deléctat.'
  reading.sermo-sancti-august-ni-ep-scopi-3943f2d258:
    role: reading
    content:
      la:
      - type: text
        text: Sermo sancti Augustíni Epíscopi
      - type: heading
        text: Sermo 44 de Sanctis
      - type: text
        text: 'Triumphális beáti Mártyris N. dies hódie nobis anniversária celebritáte recúrrit: cuius glorificatióni sicut congáudet Ecclésia, sic eius propónit sequénda vestígia. Si enim compátimur, et conglorificábimur. In cuius glorióso agóne duo nobis præcípue consideránda sunt: induráta vidélicet tortóris sævítia, et Mártyris invícta patiéntia. Sævítia tortóris, ut eam detestémur: patiéntia Mártyris, ut eam imitémur. Audi Psalmístam advérsus malítiam increpántem: Noli æmulári in malignántibus quóniam tamquam fœnum velóciter aréscent. Quod autem advérsus malignántes patiéntia exhibénda sit, audi Apóstolum suadéntem: Patiéntia vobis necessária est, ut reportétis promissiónes.'
  reading.sermo-sancti-august-ni-ep-scopi-6e33123775:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St Augustine, Bishop (of Hippo.)
      - type: heading
        text: 44 on the Saints.
      - type: citation
        text: 'The illustrious day whereon the blessed Martyr N. conquered, doth this day come round to us again and as the Church doth rejoice with him in his glory, so doth she set before us his footsteps to be followed. For if we suffer, we shall also reign with him. In his glorious battle we have two things chiefly to consider the hardened cruelty of the tormentor, and the unconquered patience of the Martyr the cruelty of the tormentor, that we may abhor it; the patience of the Martyr, that we may imitate it. Hear what the Psalmist saith, complaining against sin: “Fret not thyself because of the evil-doers, for they shall soon dry up like the grass.” (xxxvi. 1.) But touching the patience which is to be shown against the evil-doers, hear the word wherewith the Apostle moveth us Ye have need of patience, that ye may receive the promise. (Heb. x. 36.)'
      la:
      - type: text
        text: Sermo sancti Augustíni Epíscopi
      - type: heading
        text: Sermo 44 de Sanctis
      - type: text
        text: 'Triumphális beáti Mártyris N. dies hódie nobis anniversária celebritáte recúrrit: cuius glorificatióni sicut congáudet Ecclésia, sic eius propónit sequénda vestígia. Si enim compátimur, et conglorificábimur. In cuius glorióso agóne duo nobis præcípue consideránda sunt: induráta vidélicet tortóris sævítia, et Mártyris invícta patiéntia. Sævítia tortóris, ut eam detestémur: patiéntia Mártyris, ut eam imitémur. Audi Psalmístam advérsus malítiam increpántem: Noli æmulári in malignántibus quóniam tamquam fœnum velóciter aréscent. Quod autem advérsus malignántes patiéntia exhibénda sit, audi Apóstolum suadéntem: Patiéntia vobis necessária est, ut reportétis promissiónes.'
