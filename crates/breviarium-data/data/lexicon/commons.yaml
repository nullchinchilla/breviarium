  reading.dum-ergo-h-ades-cum-pl-viis-v-niunt-ad-c-li-sp-t-bf5aa81dcb:
    role: reading
    content:
      en:
      - type: text
        text: In this verily do I most chiefly rejoice, for the happiness of that holy servant of God, in that, being taken away hence, and having found here no abiding city, he is become a citizen of that other city, which is the city of the living God from the Church here he is gone, but hie is come unto the Church of the first-born, which are written in heaven, (Heb. xii. 22, 23); he keepeth holiday with us no more, but he is passed to where he holdeth high festival with Angels. And what be that city, and that Church, and that festival above, Paul biddeth us know, saying Ye are come unto the city of the living God, the heavenly Jerusalem, and unto the Church of the first-born which are written in heaven, and to an innumerable company of Angels.
      la:
      - type: text
        text: 'Dum ergo Hýades cum plúviis véniunt, ad cæli spátia altióra sol dúcitur: quia, apparénte Doctórum sciéntia, dum mens nostra imbre prædicatiónis infúnditur, fídei calor augétur. Et perfúsa terra ad fructum próficit, cum lumen ætheris ignéscit: quia ubérius frugem boni óperis réddimus, dum per sacræ eruditiónis flammam in corde clárius ardémus. Dumque per eos diébus síngulis magis magísque sciéntia cæléstis osténditur, quasi intérni nobis lúminis vernum tempus aperítur; ut novus sol nostris méntibus rútilet, et, eórum verbis nobis cógnitus, seípso quotídie clárior micet. Urgénte étenim mundi fine, supérna sciéntia próficit, et lárgius cum témpore excréscit.'
  reading.dum-ergo-h-ades-cum-pl-viis-v-niunt-ad-c-li-sp-t-d4e894bd5f:
    role: reading
    content:
      en:
      - type: text
        text: It is very meet and right that upon this day, which is made a joyful day for us because it is the day whereon our blessed Father N., passed away to heaven, I say it is very meet and right that on this day we should sing that verse of the Psalms “The righteous shall be in everlasting remembrance.” (cxi. 7.) His memory is rightly honoured among men who is at this present making glad among Angels. The word of God saith “Judge none blessed before his death,” (Ecclus. xi. 30,) as though it were said, “Judge him blessed when life is ended, praise him when he is made perfect.” For there are two main reasons why it is better to praise a dead man than a living, since, if thou call him holy and worthy after his death, thou dost it when neither canst thou be corrupted by being a flatterer, nor he by being nattered.
      la:
      - type: text
        text: 'Dum ergo Hýades cum plúviis véniunt, ad cæli spátia altióra sol dúcitur: quia, apparénte Doctórum sciéntia, dum mens nostra imbre prædicatiónis infúnditur, fídei calor augétur. Et perfúsa terra ad fructum próficit, cum lumen ætheris ignéscit: quia ubérius frugem boni óperis réddimus, dum per sacræ eruditiónis flammam in corde clárius ardémus. Dumque per eos diébus síngulis magis magísque sciéntia cæléstis osténditur, quasi intérni nobis lúminis vernum tempus aperítur; ut novus sol nostris méntibus rútilet, et, eórum verbis nobis cógnitus, seípso quotídie clárior micet. Urgénte étenim mundi fine, supérna sciéntia próficit, et lárgius cum témpore excréscit.'
  reading.duo-autem-sunt-g-nera-persecut-rum-unum-palam-s-3740092010:
    role: reading
    content:
      la:
      - type: text
        text: 'Duo autem sunt génera persecutórum: unum palam sæviéntium, álterum ficte fraudulentérque blandiéntium. Contra utrúmque nos muníre atque institúere volens Salvátor, et supra ab hypócrisi pharisæórum atténdere, et hic a carníficum cæde prǽcipit non timére; quia vidélicet, post mortem nec horum crudélitas nec illórum váleat simulátio duráre. Nonne quinque pásseres véneunt dipóndio? Si minutíssima, inquit, animália, et quæ quólibet per aëra ferúntur volatília, Deus oblivísci non potest; vos, qui ad imáginem facti estis Creatóris, non debétis terréri ab his qui occídunt corpus; quia, qui irrationabília animália gubérnat, rationabília curáre non désinit.'
      - type: text
        text: 'Te Deum laudámus: * te Dóminum confitémur.'
      - type: text
        text: Te ætérnum Patrem * omnis terra venerátur.
      - type: text
        text: 'Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:'
      - type: text
        text: 'Tibi Chérubim et Séraphim * incessábili voce proclámant:'
      - type: text
        text: (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
      - type: text
        text: Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
      - type: text
        text: Te gloriósus * Apostolórum chorus,
      - type: text
        text: Te Prophetárum * laudábilis númerus,
      - type: text
        text: Te Mártyrum candidátus * laudat exércitus.
      - type: text
        text: Te per orbem terrárum * sancta confitétur Ecclésia,
      - type: text
        text: Patrem * imménsæ maiestátis;
      - type: text
        text: Venerándum tuum verum * et únicum Fílium;
      - type: text
        text: Sanctum quoque * Paráclitum Spíritum.
      - type: text
        text: Tu Rex glóriæ, * Christe.
      - type: text
        text: Tu Patris * sempitérnus es Fílius.
      - type: text
        text: '(Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: 'Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.'
      - type: text
        text: Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
      - type: text
        text: Tu ad déxteram Dei sedes, * in glória Patris.
      - type: text
        text: Iudex créderis * esse ventúrus.
      - type: text
        text: (Sequens versus dicitur flexis genibus) ~
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória numerári.
      - type: text
        text: Ætérna fac cum Sanctis tuis * in glória munerári.
      - type: text
        text: Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
      - type: text
        text: Et rege eos, * et extólle illos usque in ætérnum.
      - type: text
        text: Per síngulos dies * benedícimus te.
      - type: text
        text: (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
      - type: text
        text: Dignáre, Dómine, die isto * sine peccáto nos custodíre.
      - type: text
        text: Miserére nostri, Dómine, * miserére nostri.
      - type: text
        text: Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
      - type: text
        text: 'In te, Dómine, sperávi: * non confúndar in ætérnum.'
  reading.duo-autem-sunt-g-nera-persecut-rum-unum-palam-s-3963fc408b:
    role: reading
    content:
      en:
      - type: citation
        text: 'But, forasmuch as the signs and troubles whereof the Lord speaketh are so manifold, we must needs shortly consider each for, of necessity, we must suffer some things from heaven, some from the earth, some from the powers of nature, and some from men. For where He saith Nation shall rise against nation He speaketh concerning the troubling of men where great earthquakes shall be in diverse places concerning wrath from above: where: and pestilences concerning the frailty of the body where and famines concerning the barrenness of the earth: where fearful signs from heaven, and tempests concerning commotions of the air. As, then, all things shall have an end, so, before the end, shall all things be troubled and we who have sinned and come short in all things, shall in all things be afflicted, that it may be fulfilled that is written: and the world shall fight with Him against the unwise. (Wisd v. 21.)'
      - type: text
        text: We praise thee, O God, * we acknowledge thee to be the Lord.
      - type: text
        text: All the earth doth worship thee, * the Father everlasting.
      - type: text
        text: To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
      - type: text
        text: To thee Cherubim and Seraphim * continually do cry.
      - type: text
        text: (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
      - type: text
        text: Heaven and earth are full * of the Majesty of thy glory.
      - type: text
        text: The glorious company of the Apostles * praise thee.
      - type: text
        text: The goodly fellowship of the Prophets * praise thee.
      - type: text
        text: The noble army of Martyrs * praise thee.
      - type: text
