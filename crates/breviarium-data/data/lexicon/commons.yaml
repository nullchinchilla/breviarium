  psalmody.omnes-sancti-quanta-passi-sunt-torm-nta-ut-sec-r-18e74e0f78:
    role: psalmody
    content:
      en:
      - type: antiphon
        text: O how many torments have all the Saints suffered, * that they might attain safely unto the palm of martyrdom.
      - type: antiphon
        text: The Saints have attained unto the kingdom, * with palms in their hands; they have earned crowns of Majesty from the Lord's hand.
      - type: antiphon
        text: The bodies of the Saints are buried in peace, * and their name liveth for evermore.
      - type: antiphon
        text: O all ye Martyrs of the Lord, bless ye the Lord * for ever.
      - type: antiphon
        text: O ye Martyrs, * praise ye the Lord from the heavens, praise Him with the dance, alleluia.
      la:
      - type: antiphon
        text: Omnes Sancti, * quanta passi sunt torménta, ut secúri pervenírent ad palmam martýrii.
      - type: antiphon
        text: Cum palma * ad regna pervenérunt Sancti, corónas decóris meruérunt de manu Dei.
      - type: antiphon
        text: 'Córpora Sanctórum * in pace sepúlta sunt: et vivent nómina eórum in ætérnum.'
      - type: antiphon
        text: Mártyres Dómini * Dóminum benedícite in ætérnum.
      - type: antiphon
        text: Mártyrum chorus * laudáte Dóminum de cælis, allelúia.
