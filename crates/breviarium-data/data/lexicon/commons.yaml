  responsory.pecc-ntem-me-cot-die-et-non-me-p-nit-ntem-timor-f5621ff1be:
    role: responsory
    content:
      en:
      - type: response
        text: Forasmuch as I sin daily, and repent not, the fear of death troubleth me.
      - type: text
        text: O God, have mercy upon me, and save me, for in hell there is no redemption.
      - type: versicle
        text: Save me, O God, by thy name, and judge me in thy strength.
      - type: response
        text: O God, have mercy upon me, and save me, for in hell there is no redemption.
      la:
      - type: response
        text: 'Peccántem me cotídie, et non me pœniténtem, timor mortis contúrbat me:'
      - type: text
        text: Quia in inférno nulla est redémptio, miserére mei, Deus, et salva me.
      - type: versicle
        text: Deus, in nómine tuo salvum me fac, et in virtúte tua líbera me.
      - type: response
        text: Quia in inférno nulla est redémptio, miserére mei, Deus, et salva me.
      en2:
      - type: response
        text: 'As I sin daily and do not repent, the fear of death troubles me:'
      - type: text
        text: Because in hell there is no redemption, have mercy on me, O God, and save me.
      - type: versicle
        text: O God, save me by your name, and deliver me by your power.
      - type: response
        text: Because in hell there is no redemption, have mercy on me, O God, and save me.
  responsory.preti-sa-in-consp-ctu-d-mini-allel-ia-b424858153:
    role: responsory
    content:
      en:
      - type: response
        text: Precious in the sight of the Lord, alleluia.
      - type: text
        text: Is the death of his saints, alleluia.
      - type: versicle
        text: 'The Lord is nigh unto them that are of a contrite heart: and he will save the humble of spirit.'
      - type: response
        text: Is the death of his saints, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Is the death of his saints, alleluia.
      la:
      - type: response
        text: Pretiósa in conspéctu Dómini, allelúia,
      - type: text
        text: Mors Sanctórum eius, allelúia.
      - type: versicle
        text: Custódit Dóminus ómnia ossa eórum, unum ex his non conterétur.
      - type: response
        text: Mors Sanctórum eius, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Mors Sanctórum eius, allelúia.
      en2:
      - type: response
        text: Precious in the sight of the Lord, alleluia,
      - type: text
        text: Is the death of his Saints, alleluia.
      - type: versicle
        text: The Lord keeps all their bones; not one of them shall be broken.
      - type: response
        text: Is the death of his Saints, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: Is the death of his Saints, alleluia.
  responsory.propter-testam-ntum-d-mini-et-leges-pat-rnas-san-b88295da23:
    role: responsory
    content:
      en:
      - type: response
        text: Because of the covenant of the Lord, and the laws of their fathers, the Saints of God abode in brotherly love,
      - type: text
        text: For one spirit and one faith was ever in them.
      - type: versicle
        text: Behold how good and how pleasant it is for brethren to dwell together in unity.
      - type: response
        text: For one spirit and one faith was ever in them.
      la:
      - type: response
        text: 'Propter testaméntum Dómini, et leges patérnas, Sancti Dei perstitérunt in amóre fraternitátis:'
      - type: text
        text: Quia unus fuit semper spíritus in eis, et una fides.
      - type: versicle
        text: Ecce quam bonum et quam iucúndum habitáre fratres in unum.
      - type: response
        text: Quia unus fuit semper spíritus in eis, et una fides.
      en2:
      - type: response
        text: 'For the sake of the covenant of the Lord and the laws of their fathers, the holy ones of God persevered in brotherly love:'
      - type: text
        text: Because there was always one spirit in them, and one faith.
      - type: versicle
        text: Behold, how good and how pleasant it is for brothers to dwell together as one.
      - type: response
        text: Because there was always one spirit in them, and one faith.
  responsory.propter-testam-ntum-d-mini-et-leges-pat-rnas-san-db6a523a53:
    role: responsory
    content:
      la:
      - type: response
        text: 'Propter testaméntum Dómini, et leges patérnas, Sancti Dei perstitérunt in amóre fraternitátis:'
      - type: text
        text: Quia unus fuit semper spíritus in eis, et una fides.
      - type: versicle
        text: Ecce quam bonum et quam iucúndum habitáre fratres in unum.
