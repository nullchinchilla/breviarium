  hymn.rex-glori-se-m-rtyrum-c82813d889:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Rex glorióse Mártyrum,
          Coróna confiténtium,
          Qui respuéntes térrea
          Perdúcis ad cæléstia:

