  reading.et-bene-asc-ndit-in-rborem-ut-arbor-bona-bonos-f-1687d64506:
    role: reading
    content:
      en:
      - type: text
        text: He did well to climb up into a tree, that a good tree might bring forth good fruits, (Matth. vii. 17,) and that the slip of the wild olive, grafted, contrary to nature, into the good olive, might bring forth the fruits of the law. (Rom. xi. 17, 24.) For the root is holy, however unprofitable the branches. Their barren beauty hath now been overshadowed by the belief of the Gentiles in the Resurrection, as by a material upgrowth. Zacchaeus, then, was in the sycamore tree, and the blind man by the way-side, (xviii. 35.) For the one, Jesus stood waiting to show mercy, and asked him before He healed him, what he would that He should do for him; being unbidden of the other, He bade Himself to be his Guest, knowing how rich was the reward of receiving Him. Nevertheless, albeit He had heard no words of invitation, yet had He seen how his heart went.
      la:
      - type: text
        text: 'Et bene ascéndit in árborem, ut arbor bona bonos fructus fáceret, ac, naturáli excísus oleástro et contra natúram insértus in bonam olívam, fructum posset legis afférre. Radix enim sancta, etsi rami inútiles. Quorum infructuósam glóriam plebs géntium, fide resurrectiónis, quasi quadam córporis elevatióne, transcéndit. Zachǽus ergo in sycómoro, cæcus in via: quorum álterum Dóminus miseratúrus exspéctat, álterum mansiónis suæ claritáte nobílitat; álterum sanatúrus intérrogat, apud álterum se, non invitátus, invítat. Sciébat enim úberem hospítii sui esse mercédem. Sed tamen, etsi nondum vocem invitántis audíerat, iam víderat afféctum.'
      en2:
      - type: text
        text: 'And rightly did he climb the tree, that the good tree might bring forth good fruit, and that he, cut off from the wild olive by nature, and contrary to nature grafted into the good olive, might be able to bear the fruit of the law. For the root is holy, even if the branches are unprofitable. The people of the Gentiles, by the faith of the Resurrection, transcend their unfruitful glory, as if by a certain elevation of the body. Zacchaeus, therefore, is in the sycamore; the blind man is on the road: the Lord is on the point of showing mercy to one, and honours the other with the distinction of his lodging; he questions one in order to heal him, and invites himself, uninvited, to the other. For he knew that the reward of his hospitality would be abundant. Yet, though Zacchaeus had not yet heard the voice of the one inviting him, he had already seen his kindly affection.'
  reading.et-qu-tuor-penn-uni-quia-dei-omnipot-ntis-f-lium-24c6320ffa:
    role: reading
    content:
      en:
      - type: text
        text: '“And every one had four wings.” For they do all with one accord preach our Lord Jesus Christ, the Son of Almighty God toward Whose Godhead lifting up the eyes of their mind, they do lift the wings of contemplation, and do fly. In the Evangelists, the face pertaineth to the Lord''s Manhood, and the wings to His Godhead for they turn their face toward Him Whom they see in bodily shape: but when they say that He is, as touching His Godhead, Incomprehensible, and Incorporeal, the wings of their contemplation do, in a manner, carry them in flight heavenward. Because, then, they have all one faith in the Incarnation, and all equally look by contemplation toward the Godhead it is well written of them, “Every one had four faces, and every one had four wings.”'
      la:
      - type: text
        text: 'Et quátuor pennæ uni: quia Dei omnipoténtis Fílium Dóminum! nostrum Iesum Christum simul omnes concórditer prǽdicant: et ad divinitátem eius mentis óculos levántes, penna contemplatiónis volant. Evangelistárum ergo fácies ad humanitátem Dómini pértinet, penna ad divinitátem: quia in eum, quem corpóreum aspíciunt, quasi fácies inténdunt: sed dum hunc esse incircumscríptum atque incorpóreum ex divinitáte annúntiant, per contemplatiónis pennam quasi in áëra levántur. Quia ítaque una est fides incarnatiónis eius in ómnibus, et par contemplátio divinitátis eius in síngulis, recte nunc dícitur: Quátuor fácies uni, et quátuor pennæ uni.'
      en2:
      - type: text
        text: '"And four wings to each one": because they all proclaim the Lord, the Son of almighty God, our Lord Jesus Christ, with one accord and in harmony; and, raising the eyes of the mind to his divinity, they fly with the wing of contemplation. The face of the Evangelists therefore pertains to the humanity of the Lord, the wing to his divinity: for upon him whom they behold in the body, they fix their face, as it were; but as they declare him to be uncircumscribed and incorporeal by reason of his divinity, they are lifted, as it were, into the air by the wing of contemplation. Because, therefore, the faith of his Incarnation is one in all, and the contemplation of his divinity is equal in each one, it is rightly said here: "Four faces to each one, and four wings to each one."'
  reading.et-qu-tuor-penn-uni-quia-dei-omnipot-ntis-f-lium-73fb1b5455:
    role: reading
    content:
      en:
      - type: text
        text: Verily, if we ask of the damsel that kept the door, she will tell us what was the measure of weakness and of strength in that Shepherd 3 of the Church nigh to whose most holy body we are now sitting, before that the Spirit came. He was so stricken by the words of one woman, that for fear of death, he denied Life. And we may well remember that Peter denied in captivity Him, Whom the thief confessed, even when He was lifted up upon the Cross. But let us hear what that craven was after that the Spirit came. When the rulers and elders were gathered together, the Apostles were beaten, and commanded not to speak at all nor teach in the name of Jesus. And Peter answered with great boldness, We ought to obey God rather than men. (Acts v. 42.)
