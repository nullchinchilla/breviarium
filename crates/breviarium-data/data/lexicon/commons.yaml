  reading.sir-51-13-17-53e0b55150:
    role: reading
    content:
      la:
      - type: citation
        text: Sir 51:13-17
      - type: text
        text: |-
          13 Exaltásti super terram habitatiónem meam, et pro morte defluénte deprecáta sum.
          14 Invocávi Dóminum, Patrem Dómini mei, ut non derelínquat me in die tribulatiónis meæ, et in témpore superbórum, sine adiutório.
          15 Laudábo nomen tuum assídue, et collaudábo illud in confessióne, et exaudíta est orátio mea.
          16 Et liberásti me de perditióne, et eripuísti me de témpore iníquo.
          17 Proptérea confitébor, et laudem dicam tibi, et benedícam nómini Dómini.
      en2:
      - type: citation
        text: Sir 51:13-17
      - type: text
        text: |-
          13 You exalted my habitation upon the earth, and I made supplication that death would pass away.
          14 I called upon the Lord, the Father of my Lord, so that he would not abandon me in the day of my tribulation, nor in the time of arrogance without assistance.
          15 I will praise your name unceasingly, and I will praise it with thanksgiving, for my prayer was heeded.
          16 And you freed me from perdition, and you rescued me from the time of iniquity.
          17 Because of this, I will give thanks and praise to you, and I will bless the name of the Lord.
  reading.sir-51-8-12-2275f1a06a:
    role: reading
    content:
      la:
      - type: citation
        text: Sir 51:8-12
      - type: text
        text: |-
          8 Laudábit usque ad mortem ánima mea Dóminum,
          9 et vita mea appropínquans erat in inférno deórsum.
          10 Circumdedérunt me úndique, et non erat qui adiuváret. Respíciens eram ad adiutórium hóminum, et non erat.
          11 Memoráta sum misericórdiæ tuæ, Dómine, et operatiónis tuæ, quæ a sǽculo sunt:
          12 quóniam éruis sustinéntes te, Dómine, et líberas eos de mánibus géntium.
      en2:
      - type: citation
        text: Sir 51:8-12
      - type: text
        text: |-
          8 My soul shall praise the Lord, even unto death.
          9 For my life was drawing near to hell below.
          10 And they surrounded me on every side. And there was no one who would help me. I looked around for the assistance of men, and there was none.
          11 Then I remembered your mercy, O Lord, and your works, which are from the very beginning.
          12 For you rescue those who persevere for you, O Lord, and you free them from the hands of the Gentiles.
  reading.taque-id-quod-a-se-dictum-est-cum-libert-te-f-de-f3bd651990:
    role: reading
    content:
      en:
      - type: text
        text: 'Then we hear these things our hearts burn within us and we long to be already there, where we hope to rejoice for ever. But we cannot attain unto great rewards, save through great labour. Therefore saith the excellent preacher Paul: “He is not crowned, except he strive lawfully.” (2 Tim. ii. 5.) The greatness of the reward doth delight our mind let not the throes of the struggle dishearten us. Therefore the Truth saith unto every one that cometh unto Him “If any man come to Me, and hate not his father and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple.”'
      la:
      - type: text
        text: 'Ítaque id quod a se dictum est, cum libertáte fídei et confessiónis vult esse loquéndum. Idcírco quæ in ténebris dicta sunt prædicári iussit in lúmine: ut quæ secréto áurium commíssa sunt, super tecta, id est, excélso loquéntium præcónio audiántur. Constánter enim Dei ingerénda cognítio est, et profúndum doctrínæ evangélicæ secrétum in lúmine prædicatiónis apostólicæ revelándum: non timéntes eos, quibus cum sit licéntia in córpora, tamen in ánimam ius nullum est: sed timéntes pótius Deum, cui perdéndæ in gehénna et ánimæ et córporis sit potéstas.'
      en2:
      - type: text
        text: 'Thus, what he said is to be proclaimed with the freedom of faith and confession. And so he commanded that what was spoken in darkness be proclaimed in the light: so that what was entrusted to the hearing in secret may be heard upon the housetops, that is, by the lofty proclamation of those who speak. For the knowledge of God must be persistently urged, and the profound mystery of the evangelical doctrine must be revealed in the light of apostolic preaching: not fearing those who, while they have power over bodies, yet have no right over the soul; but fearing rather God, who has the power to destroy both soul and body in Gehenna.'
  reading.thes-urus-autem-c-l-ste-est-desid-rium-ager-vero-fe5b0978f0:
    role: reading
    content:
      en:
      - type: text
        text: |-
          The treasure is the desire for heaven, the field wherein it is hidden is the earnest observance wherewith this desire is surrounded. Whosoever turneth his back upon the enjoyments of the flesh, and by earnest striving heavenward, putteth all earthly lusts under the feet of discipline, so that he smileth back no more when the flesh smileth at him, and shuddereth no more at anything that can only kill the body whosoever doth thus, hath sold all that he had, and bought that field.
          We praise thee, O God, * we acknowledge thee to be the Lord.
          All the earth doth worship thee, * the Father everlasting.
          To thee all Angels cry aloud, * the Heavens, and all the Powers therein.
          To thee Cherubim and Seraphim * continually do cry.
          (bow head) Holy, Holy, Holy * Lord God of Sabaoth;
          Heaven and earth are full * of the Majesty of thy glory.
          The glorious company of the Apostles * praise thee.
          The goodly fellowship of the Prophets * praise thee.
          The noble army of Martyrs * praise thee.
          The holy Church throughout all the world * doth acknowledge thee;
          The Father, * of an infinite Majesty.
          Thine honourable, true, * and only Son;
          Also the Holy Ghost, * the Comforter.
          Thou art the King of Glory, * O Christ.
          Thou art the everlasting * Son of the Father.
          (During the following verse all make a profound bow:) When thou tookest upon thee to deliver man, * thou didst not abhor the Virgin's womb.
          When thou hadst overcome the sharpness of death, * thou didst open the Kingdom of Heaven to all believers.
          Thou sittest at the right hand of God, * in the glory of the Father.
          We believe that thou shalt come * to be our Judge.
      - type: rubric
        text: Kneel for the following verse
      - type: text
        text: |-
          We therefore pray thee, help thy servants, * whom thou hast redeemed with thy precious Blood.
          Make them to be numbered with thy Saints, * in glory everlasting.
          O Lord, save thy people, * and bless thine heritage.
          Govern them, * and lift them up for ever.
          Day by day * we magnify thee;
          (During the following verse, by local custom, all make a profound bow.) And we worship thy Name * ever, world without end.
          Vouchsafe, O Lord, to keep us * this day without sin.
          O Lord, have mercy upon us, * have mercy upon us.
          O Lord, let thy mercy lighten upon us, * as our trust is in thee.
          O Lord, in thee have I trusted, * let me never be confounded.
      la:
      - type: text
        text: |-
          Thesáurus autem cæléste est desidérium; ager vero, in quo thesáurus abscónditur, disciplína stúdii cæléstis. Quem profécto agrum, vénditis ómnibus, cómparat, qui, voluptátibus carnis renúntians, cuncta sua terréna desidéria per disciplínæ cæléstis custódiam calcat: ut nihil iam quod caro blandítur, líbeat; nihil, quod carnálem vitam trucídat, spíritus perhorréscat.
          Te Deum laudámus: * te Dóminum confitémur.
          Te ætérnum Patrem * omnis terra venerátur.
          Tibi omnes Ángeli, * tibi Cæli, et univérsæ Potestátes:
          Tibi Chérubim et Séraphim * incessábili voce proclámant:
          (Fit reverentia) Sanctus, Sanctus, Sanctus * Dóminus Deus Sábaoth.
          Pleni sunt cæli et terra * maiestátis glóriæ tuæ.
          Te gloriósus * Apostolórum chorus,
          Te Prophetárum * laudábilis númerus,
          Te Mártyrum candidátus * laudat exércitus.
          Te per orbem terrárum * sancta confitétur Ecclésia,
          Patrem * imménsæ maiestátis;
          Venerándum tuum verum * et únicum Fílium;
          Sanctum quoque * Paráclitum Spíritum.
          Tu Rex glóriæ, * Christe.
          Tu Patris * sempitérnus es Fílius.
          (Fit reverentia) Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, ad liberándum susceptúrus hóminem: * non horruísti Vírginis úterum.
          Tu, devícto mortis acúleo, * aperuísti credéntibus regna cælórum.
          Tu ad déxteram Dei sedes, * in glória Patris.
          Iudex créderis * esse ventúrus.
      - type: rubric
        text: (Sequens versus dicitur flexis genibus)
      - type: rubric
        text: (Fratres, quando incipiunt « Te ergo quæsumus, » exeuntes e Stallis, reverenter inclinent ad verba « Quos pretioso » et cetera)
      - type: text
        text: |-
          Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
          Ætérna fac cum Sanctis tuis * in glória numerári.
          Ætérna fac cum Sanctis tuis * in glória munerári.
          Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
          Et rege eos, * et extólle illos usque in ætérnum.
          Per síngulos dies * benedícimus te.
          (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Dignáre, Dómine, die isto * sine peccáto nos custodíre.
          Miserére nostri, Dómine, * miserére nostri.
          Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
          In te, Dómine, sperávi: * non confúndar in ætérnum.
      en2:
      - type: text
        text: |-
          But the heavenly treasure is the desire for heaven; and the field in which the treasure is hidden is the discipline of heavenly endeavor. This field one truly purchases by selling all, who, renouncing the pleasures of the flesh, tramples down all his earthly desires through the keeping of heavenly discipline: so that he no longer desires whatever the flesh flatters; nothing which slays the carnal life does the spirit dread.
          We praise you, O God: * we acknowledge you as Lord.
          You, the eternal Father, * all the earth does venerate.
          To you all the Angels, * to you the Heavens and all the Powers:
          To you the Cherubim and Seraphim * with unceasing voice proclaim:
          (A bow is made) Holy, Holy, Holy, * Lord God of Sabaoth.
          Full are the heavens and earth * of the majesty of your glory.
          You, the glorious * choir of Apostles,
          You, the praiseworthy * company of Prophets,
          You, the white-robed * army of Martyrs do praise.
          You, throughout the world, * the holy Church does confess:
          the Father * of immense majesty;
          Your venerable, true, * and only Son;
          And also the Holy * Paraclete Spirit.
          You, King of glory, * O Christ.
          You are the eternal * Son of the Father.
          (A bow is made) You, about to take on humanity for its liberation, * did not shrink from the Virgin's womb.
          You, about to take on humanity for its liberation, * did not shrink from the Virgin's womb.
          You, having overcome the sting of death, * have opened the kingdoms of heaven to those who believe.
          You sit at the right hand of God, * in the glory of the Father.
          You are believed * to be the Judge who is to come.
      - type: rubric
        text: (The following verse is said kneeling)
      - type: rubric
        text: (Brethren, when they begin 'Te ergo quaesumus,' departing from the Stalls, let them reverently bow at the words 'Quos pretioso' and the rest)
      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
