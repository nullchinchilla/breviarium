  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-5bb38f87a1:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 14:26-33
      - type: text
        text: 'In illo témpore: Dixit Iesus turbis: Si quis venit ad me, et non odit patrem suum, et matrem, et uxórem, et fílios, et fratres, et soróres, adhuc autem et ánimam suam, non potest meus esse discípulus. Et réliqua.'
      - type: text
        text: Homilía sancti Gregórii Papæ
      - type: heading
        text: Homil. 37 in Evangelia
      - type: text
        text: Si considerémus fratres caríssimi, quæ et quanta sunt, quæ nobis promittúntur in cælis, viléscunt ánimo ómnia quæ habéntur in terris. Terréna namque substántia supérnæ felicitáti comparáta, pondus est, non subsídium. Temporális vita ætérnæ vitæ comparáta, mors est pótius dicénda quam vita. Ipse enim quotidiánus deféctus corruptiónis quid est áliud, quam quædam prolíxitas mortis? Quæ autem lingua dícere, vel quis intelléctus cápere súfficit, illa supérnæ civitátis quanta sint gáudia; Angelórum choris interésse, cum beatíssimis spirítibus glóriæ Conditóris assístere, præséntem Dei vultum cérnere, incircumscríptum lumen vidére, nullo mortis metu áffici, incorruptiónis perpétuæ múnere lætári?
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-5d0390e4a3:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 11:27-28
      - type: text
        text: 'At that time, as Jesus spoke unto the multitudes, a certain woman of the company lifted up her voice and said unto Him: Blessed is the womb that bore thee. And so on.'
      - type: text
        text: Homily by the Venerable Bede
      - type: heading
        text: Lib 4 Cap 49 in Luke 11
      - type: text
        text: It is plain that this was a woman of great earnestness and faith. The Scribes and Pharisees were at once tempting and blaspheming the Lord, but this woman so clearly grasped His Incarnation, and so bravely confessed the same, that she confounded both the lies of the great men who were present, and the faithlessness of the heretics who were yet to come. Even as the Jews then, blaspheming the works of the Holy Ghost, denied the very Son of God Who is of one substance with the Father, so afterwards did the heretics, by denying that Mary always a Virgin did, under the operation of the Holy Ghost, supply flesh to the Only begotten One of God, when He was about being born in an human Body, even so, I say, did the heretics deny that the Son of Man should be called a true Son, Who is of one substance with His Mother.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 11:27-28
      - type: text
        text: 'In illo témpore: Loquénte Iesu ad turbas, extóllens vocem quædam múlier de turba dixit illi: Beátus venter qui te portávit. Et réliqua.'
      - type: text
        text: Homilía sancti Bedæ Venerábilis Presbýteri
      - type: heading
        text: Lib 4. cap. 49. in Luc. 11.
      - type: text
        text: Magnæ devotiónis et fídei hæc múlier osténditur, quæ, scribis et pharisǽis Dóminum tentántibus simul et blasphemántibus, tanta eius incarnatiónem præ ómnibus sinceritáte cognóscit, tanta fidúcia confitétur, ut et præséntium prócerum calúmniam, et futurórum confúndat hæreticórum perfídiam. Nam, sicut tunc Iudǽi, Sancti Spíritus ópera blasphemándo, verum consubstantialémque Patri Dei Fílium negábant; sic hærétici póstea, negándo Maríam semper Vírginem, Sancti Spíritus operánte virtúte, nascitúro cum humánis membris Unigénito Dei, carnis suæ matériam ministrásse, verum consubstantialémque matri Fílium hóminis fatéri non debére dixérunt.
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-67d89b0359:
    role: reading
    content:
      la:
      - type: text
