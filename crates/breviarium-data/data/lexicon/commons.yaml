      - type: psalmody
        antiphon: The Lord shall be my God, * and this stone shall be called God's house.
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: Moses built an altar * to the Lord God.
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: This is none other but the house of God, and this is the gate of heaven.
        psalms:
        - number: '83'
      - type: psalmody
        antiphon: 'Jacob beheld a ladder set up on the earth, and the top of it reached to heaven, and the angels of God descending on it. And he said: Surely this place is holy.'
        psalms:
        - number: '86'
      - type: psalmody
        antiphon: Jacob set up the stone for a pillar, and poured oil upon the top of it.
        psalms:
        - number: '87'
      - type: psalmody
        antiphon: He that dwelleth in the help of the Most High * shall abide under the shadow of the God of heaven.
        psalms:
        - number: '90'
      - type: psalmody
        antiphon: The Temple of the Lord is holy. * The same is God's workmanship and God's building.
        psalms:
        - number: '95'
      - type: psalmody
        antiphon: Blessed be the glory of the Lord * from His holy place. Alleluia.
        psalms:
        - number: '98'
      la:
      - type: psalmody
        antiphon: Tóllite portas, * príncipes vestras, et elevámini, portæ æternáles.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: Erit mihi Dóminus * in Deum, et lapis iste vocábitur domus Dei.
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: Ædificávit * Móyses altáre Dómino Deo.
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: Non est hic áliud, * nisi domus Dei, et porta cæli.
        psalms:
