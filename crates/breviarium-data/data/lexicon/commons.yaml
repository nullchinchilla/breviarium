  responsory.iste-sanctus-pro-lege-dei-sui-cert-vit-usque-ad-32abc40f1b:
    role: responsory
    content:
      en:
      - type: response
        text: This man is holy, for he hath striven for the law of his God even unto death, and hath not feared for the words of the ungodly;
      - type: text
        text: '* For he had his foundation upon a strong rock.'
      - type: versicle
        text: This is he which loved not his life in this world, and is come unto an everlasting kingdom.
      - type: response
        text: For he had his foundation upon a strong rock.
      la:
      - type: response
        text: 'Iste Sanctus pro lege Dei sui certávit usque ad mortem, et a verbis impiórum non tímuit:'
      - type: text
        text: '* Fundátus enim erat supra firmam petram.'
      - type: versicle
        text: Iste est qui contémpsit vitam mundi, et pervénit ad cæléstia regna.
      - type: response
        text: Fundátus enim erat supra firmam petram.
  responsory.iste-sanctus-pro-lege-dei-sui-cert-vit-usque-ad-d2a5abc6a0:
