        text: And Jacob begat Joseph, * the husband of Mary, of whom was born Jesus, Who is called Christ. Alleluia.
      - type: antiphon
        text: The Angel Gabriel * was sent from God, unto a city of Galilee, named Nazareth, to a Virgin espoused to a man whose name was Joseph. Alleluia.
      - type: antiphon
        text: And Joseph also went up * from Galilee, out of the city of Nazareth, unto Judea, unto the city of David, which is called Bethlehem. Alleluia.
      - type: antiphon
        text: And they came with haste, * and found Mary and Joseph, and the Babe lying in a manger. Alleluia.
      - type: antiphon
        text: And Jesus Himself began to be about thirty years of age, being (as was supposed) the Son of Joseph. Alleluia.
      la:
      - type: antiphon
        text: Iacob autem * génuit Ioseph, virum Maríæ, de qua natus est Iesus, qui vocátur Christus, allelúia.
      - type: antiphon
        text: Missus est * Ángelus Gábriel a Deo in civitátem Galilǽæ, cui nomen Názareth, ad Vírginem desponsátam viro, cui nomen erat Ioseph, allelúia.
      - type: antiphon
        text: Ascéndit autem * Ioseph a Galilǽa de civitáte Názareth in Iudǽam, in civitátem David, quæ vocátur Béthlehem, allelúia.
      - type: antiphon
        text: Et venérunt festinántes, * et invenérunt Maríam, et Ioseph, et Infántem pósitum in præsépio, allelúia.
      - type: antiphon
        text: Et ipse Iesus * erat incípiens quasi annórum trigínta, ut putabátur, fílius Ioseph, allelúia.
      en2:
      - type: antiphon
        text: Jacob begot * Joseph, the husband of Mary, of whom was born Jesus, who is called Christ, alleluia.
      - type: antiphon
        text: The Angel Gabriel * was sent from God to a city of Galilee, whose name was Nazareth, to a Virgin betrothed to a man whose name was Joseph, alleluia.
      - type: antiphon
        text: Joseph also went up * from Galilee, from the city of Nazareth into Judea, to the city of David, which is called Bethlehem, alleluia.
      - type: antiphon
        text: And they came with haste * and found Mary, and Joseph, and the Infant lying in the manger, alleluia.
      - type: antiphon
        text: And Jesus himself * was beginning to be about thirty years of age, as was supposed, the son of Joseph, alleluia.
  psalmody.in-lege-d-mini-fuit-vol-ntas-eius-die-ac-nocte-bd996dbc4d:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: His delight * was in the law of the Lord day and night.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: The Lord hath set him * upon His holy hill, to declare His decree.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: I cried unto the Lord * with my voice, and He heard me out of His holy hill.
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: O ye sons of men, * know that the Lord hath set apart him that is holy for Himself.
        psalms:
        - number: '4'
      - type: psalmody
        antiphon: O Lord, Thou hast compassed him * with thy favour as with a shield.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: Thou hast crowned him * with glory and honour in all the earth.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: The righteous Lord * loveth righteousness; His countenance doth behold uprightness.
        psalms:
        - number: '10'
      - type: psalmody
        antiphon: He shall dwell * in thy tabernacle, He shall rest upon thy holy hill.
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: O Lord, Thou hast set a crown * of precious stones upon his head.
        psalms:
        - number: '20'
      la:
      - type: psalmody
        antiphon: In lege Dómini * fuit volúntas eius die ac nocte.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: Prǽdicans * præcéptum Dómini constitútus est in monte sancto eius.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: 'Voce mea * ad Dóminum clamávi: et exaudívit me de monte sancto suo.'
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: Fílii hóminum * scitóte quia Dóminus sanctum suum mirificávit.
        psalms:
        - number: '4'
      - type: psalmody
        antiphon: Scuto bonæ voluntátis * tuæ coronásti eum Dómine.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: In univérsa terra * glória et honóre coronásti eum.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: 'Iustus Dóminus, * et iustítiam diléxit: æquitátem vidit vultus eius.'
        psalms:
        - number: '10'
      - type: psalmody
        antiphon: 'Habitábit * in tabernáculo tuo: requiéscet in monte sancto tuo.'
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: Posuísti, Dómine, * super caput eius corónam de lápide pretióso.
        psalms:
        - number: '20'
      en2:
      - type: psalmody
        antiphon: In the law of the Lord * was his delight day and night.
        psalms:
        - number: '1'
      - type: psalmody
        antiphon: Proclaiming * the commandment of the Lord, he was established on his holy mountain.
        psalms:
        - number: '2'
      - type: psalmody
        antiphon: 'With my voice * I cried to the Lord: and he heard me from his holy mountain.'
        psalms:
        - number: '3'
      - type: psalmody
        antiphon: Sons of men, * know that the Lord has made his holy one wonderful.
        psalms:
        - number: '4'
      - type: psalmody
        antiphon: With the shield of your good will * you have crowned him, O Lord.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: In all the earth * you have crowned him with glory and honor.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: 'The Lord is just * and has loved justice: his face has beheld equity.'
        psalms:
        - number: '10'
      - type: psalmody
        antiphon: 'He shall dwell * in your tabernacle: he shall rest on your holy mountain.'
        psalms:
        - number: '14'
      - type: psalmody
        antiphon: You have set, O Lord, * upon his head a crown of precious stone.
        psalms:
        - number: '20'
