        text: De Áctibus Apostolórum
      - type: citation
        text: Acts 20:17-24
      - type: text
        text: 17 A Miléto Paulus mittens Éphesum, vocávit maióres natu Ecclésiæ.
      - type: citation
        text: '18 Qui cum veníssent ad eum, et simul essent, dixit eis: Vos scitis a prima die qua ingréssus sum in Ásiam, quáliter vobíscum per omne tempus fúerim,'
      - type: citation
        text: '19 sérviens Dómino cum omni humilitáte, et lácrimis, et tentatiónibus, quae mihi accidérunt ex insídiis Iudæórum:'
      - type: text
        text: 20 quómodo nihil subtráxerim utílium, quóminus annuntiárem vobis et docérem vos, públice et per domos,
      - type: text
        text: 21 testíficans Iudǽis atque Gentílibus in Deum pœniténtiam, et fidem in Dóminum nostrum Iesum Christum.
      - type: citation
        text: '22 Et nunc ecce alligátus ego spíritu, vado in Ierúsalem: quæ in ea ventúra sint mihi, ignórans:'
      - type: citation
        text: '23 nisi quod Spíritus Sanctus per omnes civitátes mihi protestátur, dicens: Quóniam víncula et tribulatiónes Ierosólymis me manent.'
      - type: citation
        text: '24 Sed nihil horum véreor: nec fácio ánimam meam pretiosiórem quam me, dúmmodo consúmmem cursum meum, et ministérium verbi quod accépi a Dómino Iesu, testificári Evangélium grátiæ Dei.'
  reading.de-ep-stola-ad-titum-2d34ca8e43:
    role: reading
    content:
      en:
      - type: text
        text: From the letter of St. Paul the Apostle to Titus
      - type: citation
        text: Titus 1:7-11
      - type: citation
        text: '7 For a bishop must be without crime, as the steward of God: not proud, not subject to anger, not given to wine, no striker, not greedy of filthy lucre:'
      - type: citation
        text: '8 But given to hospitality, gentle, sober, just, holy, continent:'
      - type: text
        text: 9 Embracing that faithful word which is according to doctrine, that he may be able to exhort in sound doctrine, and to convince the gainsayers.
      - type: citation
        text: '10 For there are also many disobedient, vain talkers, and seducers: especially they who are of the circumcision:'
      - type: text
        text: 11 Who must be reproved, who subvert whole houses, teaching things which they ought not, for filthy lucre’s sake.
      la:
      - type: text
        text: De Epístola ad Titum
      - type: citation
        text: Titus 1:7-11
      - type: citation
        text: '7 Opórtet enim epíscopum sine crímine esse, sicut Dei dispensatórem: non supérbum, non iracúndum, non vinoléntum, non percussórem, non turpis lucri cúpidum:'
      - type: text
        text: 8 sed hospitálem, benígnum, sóbrium, iustum, sanctum, continéntem,
      - type: citation
        text: '9 amplecténtem eum, qui secúndum doctrínam est, fidélem sermónem: ut potens sit exhortári in doctrína sana, et eos qui contradícunt, argúere.'
      - type: citation
        text: '10 Sunt enim multi étiam inobediéntes, vaníloqui, et seductóres: máxime qui de circumcisióne sunt:'
      - type: citation
        text: '11 quos opórtet redárgui: qui univérsas domos subvértunt, docéntes quæ non opórtet, turpis lucri grátia.'
