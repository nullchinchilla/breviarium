      - type: response
        text: Deo grátias.
  chapter.sir-31-8-9-508ebb3179:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 31:8-9
      - type: text
        text: 'Blessed is the rich man that is found without blemish: and that hath not gone after gold, nor put his trust in money nor in treasures. Who is he, and we will praise him? for he hath done wonderful things in his life.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 31:8-9
      - type: text
