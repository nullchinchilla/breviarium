  chapter.philipp-2-3fc8bdd469:
    role: chapter
    content:
      la:
      - type: citation
        text: Philipp 2
      - type: text
        text: |-
          Fratres: Hoc enim sentite in vobis, quod et in Christo Iesu: qui cum in forma Dei esset, non rapínam arbitrátus est esse se æquálem Deo: sed semetípsum exinanívit, formam servi accípiens, in similitúdinem hóminum factus, et hábitu invéntus ut homo. Humiliávit semetípsum, factus obédiens
          usque ad mortem, mortem autem crucis.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Philipp 2
      - type: text
        text: 'Brethren: For this understanding in you was also in Christ Jesus: who, though he was in the form of God, did not consider equality with God something to be seized. Instead, he emptied himself, taking the form of a servant, being made in the likeness of men, and accepting the state of a man. He humbled himself, becoming obedient even unto death, even the death of the Cross.'
      - type: response
        text: Thanks be to God.
  chapter.prov-31-10-11-d163b1109a:
    role: chapter
    content:
      en:
      - type: citation
        text: Prov. 31:10-11
      - type: text
        text: Who shall find a valiant woman? Far and from the uttermost coasts is the price of her. The heart of her husband trusteth in her, and he shall have no need of spoils.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Prov. 31:10-11
      - type: text
        text: Mulíerem fortem quis invéniet? Procul et de últimis fínibus prétium eius. Confídit in ea cor viri sui, et spóliis non indigébit.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Prov. 31:10-11
      - type: text
        text: Who shall find a strong woman? Far away, and from the furthest parts, is her price. The heart of her husband confides in her, and he will not be deprived of spoils.
      - type: response
        text: Thanks be to God.
  chapter.prov-31-20-21-39b41e1196:
    role: chapter
    content:
      en:
      - type: citation
        text: Prov 31:20-21
      - type: text
        text: She hath opened her hand to the needy, and stretched out her hands to the poor. She shall not fear for her house in the cold of snow.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Prov 31:20-21
      - type: text
        text: Manum suam apéruit ínopi, et palmas suas exténdit ad páuperem. Non timébit dómui suæ a frigóribus nivis.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Prov 31:20-21
      - type: text
        text: She has opened her hand to the needy, and she has extended her hands to the poor. She shall not fear, in the cold of snow, for her household. For all those of her household have been clothed two-fold.
      - type: response
        text: Thanks be to God.
  chapter.prov-31-29-30-79dbc5ce87:
    role: chapter
    content:
      la:
      - type: citation
        text: Prov 31:29-30
      - type: text
        text: 'Multæ fíliæ congregavérunt divítias: tu supergréssa es univérsas. Fallax grátia, et vana est pulchritúdo: múlier timens Dóminum, ipsa laudábitur.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Prov 31:29-30
      - type: text
        text: Many daughters have gathered together riches; you have surpassed them all. Charm is false, and beauty is vain. The woman who fears the Lord, the same shall be praised.
      - type: response
        text: Thanks be to God.
  chapter.rom-8-28-ea5fb8370b:
    role: chapter
    content:
      la:
      - type: citation
        text: Rom 8:28
      - type: text
        text: Scimus quóniam diligéntibus Deum ómnia cooperántur in bonum, iis qui secúndum propósitum vocáti sunt sancti.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Rom 8:28
      - type: text
        text: And we know that, for those who love God, all things work together unto good, for those who, in accordance with his purpose, are called to be saints.
      - type: response
        text: Thanks be to God.
  chapter.sap-10-10-20250183dd:
    role: chapter
    content:
      la:
      - type: citation
        text: Sap 10:10
      - type: text
        text: 'Iustum dedúxit Dóminus per vias rectas, et osténdit illi regnum Dei, et dedit illi sciéntiam sanctórum: honestávit illum in labóribus, et complévit labóres illíus.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 10:10
      - type: text
        text: She led the just man, this fugitive of his brother's wrath, by the right ways, and revealed to him the kingdom of God, and gave him the knowledge of holiness, honored him in his labors, and completed his labors.
      - type: response
        text: Thanks be to God.
  chapter.sap-10-17-6b6483a1e5:
    role: chapter
    content:
      la:
      - type: citation
        text: Sap 10:17
      - type: text
        text: 'Réddidit Deus mercédem labórum sanctórum suórum, et dedúxit illos in via mirábili: et fuit illis in velaménto diéi, et in luce stellárum nocte.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 10:17
      - type: text
        text: And she rendered to the just the wages of their labors, and led them along a wondrous way; and she was to them, like a cover by day, and like the light of the stars by night.
      - type: response
        text: Thanks be to God.
  chapter.sap-10-17-be1378549c:
    role: chapter
    content:
      en:
      - type: citation
        text: Wis 10:17
      - type: text
        text: 'And she rendered to the just the wages of their labours, and conducted them in a wonderful way: and she was to them for a covert by day, and for the light of stars by night.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sap 10:17
      - type: text
        text: 'Réddidit Deus mercédem labórum sanctórum suórum, et dedúxit illos in via mirábili: et fuit illis in velaménto diéi, et in luce stellárum nocte.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 10:17
      - type: text
        text: And she rendered to the just the wages of their labors, and led them along a wondrous way; and she was to them, like a cover by day, and like the light of the stars by night.
      - type: response
        text: Thanks be to God.
  chapter.sap-3-1-3-87472e732c:
    role: chapter
    content:
      en:
      - type: citation
        text: Wis 3:1-3
      - type: text
        text: But the souls of the just are in the hand of God, and the torment of death shall not touch them. In the sight of the unwise they seemed to die, but they are in peace.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sap 3:1-3
      - type: text
        text: 'Iustórum ánimæ in manu Dei sunt, et non tanget illos torméntum mortis. Visi sunt óculis insipiéntium mori: illi autem sunt in pace.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 3:1-3
      - type: text
        text: But the souls of the just are in the hand of God, and no torment of death will touch them. In the eyes of the foolish, they seemed to die, and their departure was considered an affliction, and their going away from us, a banishment. Yet they are in peace.
      - type: response
        text: Thanks be to God.
  chapter.sap-3-1-3-8e784cb146:
    role: chapter
    content:
      la:
      - type: citation
        text: Sap 3:1-3
      - type: text
        text: 'Iustórum ánimæ in manu Dei sunt, et non tanget illos torméntum mortis. Visi sunt óculis insipiéntium mori: illi autem sunt in pace.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 3:1-3
      - type: text
        text: But the souls of the just are in the hand of God, and no torment of death will touch them. In the eyes of the foolish, they seemed to die, and their departure was considered an affliction, and their going away from us, a banishment. Yet they are in peace.
      - type: response
        text: Thanks be to God.
  chapter.sap-3-7-8-1b87987f21:
    role: chapter
    content:
      en:
      - type: citation
        text: Wis 3:7-8
      - type: text
        text: The just shall shine, and shall run to and fro like sparks among the reeds. They shall judge nations, and rule over people, and their Lord shall reign for ever.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: 'Fulgébunt iusti, et tamquam scintíllæ in arundinéto discúrrent. Iudicábunt natiónes, et dominabúntur pópulis: et regnábit Dóminus illórum in perpétuum.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: They will shine, and they will dash about like sparks among stubble. They will judge the nations and they will rule over the people, and their Lord will reign forever.
      - type: response
        text: Thanks be to God.
  chapter.sap-3-7-8-bd36312480:
    role: chapter
    content:
      la:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: 'Fulgébunt iusti, et tamquam scintíllæ in arundinéto discúrrent. Iudicábunt natiónes, et dominabúntur pópulis: et regnábit Dóminus illórum in perpétuum.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: They will shine, and they will dash about like sparks among stubble. They will judge the nations and they will rule over the people, and their Lord will reign forever.
      - type: response
        text: Thanks be to God.
  chapter.sap-4-1-21a32d8ebd:
    role: chapter
    content:
      la:
      - type: citation
        text: Sap 4:1
      - type: text
        text: O quam pulchra est casta generátio cum claritáte! Immortális est enim memória illíus, quóniam apud Deum nota est, et apud hómines.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 4:1
      - type: text
        text: O how beautiful is the chaste fruit of purity! For its remembrance is immortal, because it is observed both with God and with men.
      - type: response
        text: Thanks be to God.
  chapter.sap-5-1-355c0df03e:
    role: chapter
    content:
      en:
      - type: citation
        text: Wis 5:1
      - type: text
        text: Then shall the just stand with great constancy against those that have afflicted them, and taken away their labours.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sap 5:1
      - type: text
        text: Stabunt iusti in magna constántia advérsus eos qui se angustiavérunt et qui abstulérunt labóres eórum.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap 5:1
      - type: text
        text: Then the just will stand with great steadfastness against those who have oppressed them and have taken away their labors.
      - type: response
        text: Thanks be to God.
  chapter.sap-5-5-0a12877fb6:
    role: chapter
    content:
      en:
      - type: citation
        text: Sap. 5.5
      - type: text
        text: Behold how they are numbered among the children of God, and their lot is among the saints.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sap. 5:5
      - type: text
        text: Ecce quómodo computáti sunt inter fílios Dei, et inter sanctos sors illórum est.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sap. 5:5
      - type: text
        text: How is it that they are counted among the sons of God, and their place is among the holy?
      - type: response
        text: Thanks be to God.
  chapter.sir-15-3-89b4cc2a93:
    role: chapter
    content:
      en:
      - type: citation
        text: Sir 15:3
      - type: text
        text: 'With the bread of life and understanding, she shall feed him, and give him the water of wholesome wisdom to drink: and she shall be made strong in him, and he shall not be moved.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Sir 15:3
      - type: text
        text: Cibávit illum pane vitæ et intelléctus, et aqua sapiéntiæ salutáris potávit illum Dóminus Deus noster.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Sir 15:3
      - type: text
        text: She will feed him with the bread of life and understanding. And she give him to drink from the water of salvific wisdom. And she will be confirmed in him, and he will not waver.
      - type: response
        text: Thanks be to God.
  chapter.sir-15-3-ce34176f6d:
    role: chapter
    content:
      la:
      - type: citation
        text: Sir 15:3
      - type: text
        text: Cibávit illum pane vitæ et intelléctus, et aqua sapiéntiæ salutáris potávit illum Dóminus Deus noster.
      - type: response
        text: Deo grátias.
