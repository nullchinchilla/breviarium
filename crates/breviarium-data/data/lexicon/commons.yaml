  reading.duo-autem-sunt-qu-iub-ntur-et-lumbos-restr-ngere-4b59fd2e36:
    role: reading
    content:
      la:
      - type: text
        text: 'Duo autem sunt, quæ iubéntur, et lumbos restríngere, et lucérnas tenére: ut et mundítia sit castitátis in córpore, et lumen veritátis in operatióne. Redemptóri étenim nostro unum sine áltero placére nequáquam potest: si aut is qui bona agit, adhuc luxúriæ inquinaménta non déserit: aut is qui castitáte præéminet, necdum se per bona ópera exércet. Nec cástitas ergo magna est sine bono ópere, nec opus bonum est áliquod sine castitáte. Sed et si utrúmque ágitur, restat, ut quisquis ille est, spe ad supérnam pátriam tendat, et nequáquam se a vítiis pro mundi huius honestáte contíneat.'
  reading.duo-autem-sunt-qu-iub-ntur-et-lumbos-restr-ngere-7580ff7c8b:
    role: reading
    content:
      en:
      - type: text
        text: Here, then, are two commandments, to gird our loins about, and to keep our lights burning the cleanness of purity in our body, and the light of the truth in our works. Whoso hath the one and not the other, pleaseth not thereby our Redeemer; that is, he pleaseth Him not which doth good works, but bridleth not himself from the pollutions of lust, neither he which is eminent in chastity, but exerciseth not himself in good works. Neither is chastity a great thing without good works, nor good works anything without chastity. And if any man do both, it remaineth that he must look by hope toward our Fatherland above, and not have for his reason wherethrough he turneth himself away from vice, the love of honour in this present world.
      la:
      - type: text
        text: 'Duo autem sunt, quæ iubéntur, et lumbos restríngere, et lucérnas tenére: ut et mundítia sit castitátis in córpore, et lumen veritátis in operatióne. Redemptóri étenim nostro unum sine áltero placére nequáquam potest: si aut is qui bona agit, adhuc luxúriæ inquinaménta non déserit: aut is qui castitáte præéminet, necdum se per bona ópera exércet. Nec cástitas ergo magna est sine bono ópere, nec opus bonum est áliquod sine castitáte. Sed et si utrúmque ágitur, restat, ut quisquis ille est, spe ad supérnam pátriam tendat, et nequáquam se a vítiis pro mundi huius honestáte contíneat.'
  reading.ecce-enim-binos-ad-pr-dic-ndum-disc-pulos-d-minu-ad20e93abc:
    role: reading
    content:
      en:
      - type: text
        text: Behold, the Lord sendeth forth His disciples to preach by two and two and thus doing, He doth silently teach us that whosoever loveth not his neighbour, such a one it behoveth not to take upon him the office of a preacher. Well also is it said that He sent them before His face into every city and place whither He Himself would come. The Lord followeth His preachers first cometh preaching, and then the Lord Himself cometh to the house of our mind, whither the word of exhortation hath come before and so cometh the truth into our mind.
      la:
      - type: text
        text: 'Ecce enim binos ad prædicándum discípulos Dóminus mittit: quátenus hoc nobis tácitus ínnuat, quia qui caritátem erga álterum non habet, prædicatiónis offícium suscípere nullátenus debet. Bene autem dícitur, quia misit eos ante fáciem suam in omnem civitátem et locum, quo erat ipse ventúrus. Prædicatóres enim suos Dóminus séquitur: quia prædicátio prǽvenit, et tunc ad mentis nostræ habitáculum Dóminus venit, quando verba exhortatiónis præcúrrunt: atque per hoc véritas in mente suscípitur.'
  reading.ecce-enim-binos-ad-pr-dic-ndum-disc-pulos-d-minu-b90efa02ca:
    role: reading
    content:
      en:
      - type: text
        text: In the regeneration, when the Son of Man shall sit in the throne of His glory, and when the dead shall rise again from corruption incorruptible, (i Cor. xv. 53,) ye also shall sit upon twelve thrones of judgment, condemning the twelve tribes of Israel, because, when ye believed in Me, they would not. (John iii. 18.) And every one that hath forsaken houses, or brethren, or sisters, or father, or mother, or wife, or children, or lands, for My Name's sake, shall receive an hundredfold, and shall inherit everlasting life. This place agreeth well with that other where the Saviour saith I came not to send peace, but a sword. For I am come to set a man at variance against his father, and the daughter against her mother, and the daughter-in-law against her mother-in-law; and a man's foes shall be they of his own household. (Matth. x. 34.) Every one, therefore, that hath set no store by affection, and riches, and the pleasures of the world, for Christ's faith's sake, and the preaching of the Gospel, shall receive an hundred-fold, and shall inherit everlasting life.
      la:
      - type: text
        text: 'Ecce enim binos ad prædicándum discípulos Dóminus mittit: quátenus hoc nobis tácitus ínnuat, quia qui caritátem erga álterum non habet, prædicatiónis offícium suscípere nullátenus debet. Bene autem dícitur, quia misit eos ante fáciem suam in omnem civitátem et locum, quo erat ipse ventúrus. Prædicatóres enim suos Dóminus séquitur: quia prædicátio prǽvenit, et tunc ad mentis nostræ habitáculum Dóminus venit, quando verba exhortatiónis præcúrrunt: atque per hoc véritas in mente suscípitur.'
  reading.ego-sum-inquit-vitis-vera-et-pater-meus-agr-cola-312805a79a:
    role: reading
    content:
      en:
      - type: citation
        text: 'He saith: I am the true vine, and My Father is the husbandman. Is the vine one with the husbandman? These words then are to be taken in that sense wherein He also saith: My Father is greater than I. (John xiv. 28.) In this sense is He the vine, and the Father is the husbandman. But again, in regard to those words: I and the Father are one, and again and: My Father is the husbandman, we understand that They are not the vine and the husbandman, after the manner of a vine, and the husbandman that from without doth care for and keep it, but after the manner of a vine and Him That from within doth make it to bring forth fruit. For neither is he that planteth anything, neither he that watereth, but God that giveth the increase. (1 Cor. iii. 7.) But Christ is God, for the Word was God. (John i. 1.) Therefore He and the Father are one: and, albeit the Word was made flesh, (John i. 14,) which, before, He was not, He ceased not to be still That Which He was.'
