  responsory.sicut-cedrus-exalt-ta-sum-in-l-bano-et-sicut-cyp-164932c2c7:
    role: responsory
    content:
      en:
      - type: response
        text: I was exalted like a cedar in Lebanon, and as a cypress-tree upon Mount Zion. Like the best myrrh
      - type: text
        text: I yielded a pleasant odour.
      - type: versicle
        text: Like cinnamon and sweet balsam.
      - type: response
        text: I yielded a pleasant odour.
      la:
      - type: response
        text: 'Sicut cedrus exaltáta sum in Líbano, et sicut cypréssus in monte Sion: quasi myrrha elécta,'
      - type: text
        text: Dedi suavitátem odóris.
      - type: versicle
        text: Et sicut cinnamómum et bálsamum aromatízans.
      - type: response
        text: Dedi suavitátem odóris.
      en2:
      - type: response
        text: 'I was exalted like a cedar in Lebanon, and like a cypress on Mount Sion: like choice myrrh,'
      - type: text
        text: I gave forth a sweet fragrance.
      - type: versicle
        text: And like cinnamon and aromatic balm.
      - type: response
        text: I gave forth a sweet fragrance.
