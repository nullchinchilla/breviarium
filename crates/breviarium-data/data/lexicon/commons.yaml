  psalmody.plac-bo-d-mino-in-regi-ne-viv-rum-58640c855f:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: I will walk before the Lord * in the land of the living.
        psalms:
        - number: '114'
      - type: psalmody
        antiphon: Woe is me! O Lord, * that my sojourn is long
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: The Lord shall keep thee from all evil, * the Lord shall keep thy soul.
        psalms:
        - number: '120'
      - type: psalmody
        antiphon: If Thou, Lord, shouldest mark iniquities, * O Lord, who shall stand.
        psalms:
        - number: '129'
      - type: psalmody
        antiphon: O Lord, forsake not * the works of thine own hands.
        psalms:
        - number: '137'
      la:
      - type: psalmody
        antiphon: Placébo Dómino * in regióne vivórum.
        psalms:
        - number: '114'
      - type: psalmody
        antiphon: Heu mihi Dómine, * quia incolátus meus prolongátus est.
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: 'Dóminus custódit te ab omni malo: * custódiat ánimam tuam Dóminus.'
        psalms:
        - number: '120'
      - type: psalmody
        antiphon: 'Si iniquitátes * observáveris, Dómine: Dómine, quis sustinébit?'
        psalms:
        - number: '129'
      - type: psalmody
        antiphon: Opera * mánuum tuárum, Dómine, ne despícias.
        psalms:
        - number: '137'
  psalmody.qui-me-conf-ssus-f-erit-coram-hom-nibus-confit-b-6a1c172a81:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Qui me conféssus fúerit * coram homínibus, confitébor et ego eum coram Patre meo.
      - type: antiphon
        text: Qui séquitur me, * non ámbulat in ténebris, sed habébit lumen vitæ, dicit Dóminus.
      - type: antiphon
        text: 'Qui mihi minístrat, * me sequátur: et ubi ego sum, illic sit et miníster meus.'
      - type: antiphon
        text: Si quis mihi ministráverit, * honorificábit eum Pater meus, qui est in cælis, dicit Dóminus.
      - type: antiphon
        text: Volo Pater, * ut ubi ego sum, illic sit et miníster meus.
  psalmody.qui-me-conf-ssus-f-erit-coram-hom-nibus-confit-b-a2885a13d7:
    role: psalmody
    content:
      en:
      - type: antiphon
        text: Whosoever shall confess Me * before men, him will I confess also before My Father.
      - type: antiphon
        text: He that followeth Me * walketh not in darkness, but shall have the light of life, saith the Lord.
      - type: antiphon
        text: If any man serve Me, * let him follow Me and where I am, there shall also My servant be.
      - type: antiphon
        text: If any man serve Me, * him will My Father, who is in heaven, honour.
      - type: antiphon
        text: Father, I will * that where I am, there shall also My servant be.
