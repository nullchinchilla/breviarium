  hymn.spice-infami-deus-ipse-ligno-23cae9b586:
    role: hymn
    content:
      la:
      - type: text
        text: Áspice, infami Deus ipse ligno
      - type: text
        text: Pendet, effuso madidus cruóre;
      - type: text
        text: Áspice, immiti manus alma clavo
      - type: text
        text: Finditur alte.
      - type: text
        text: Hunc, velut pravi scéleris minístrum;
      - type: text
        text: Inter indignos médium latrones,
      - type: text
        text: Cerne; crudelis fuit ista gentis
      - type: text
        text: Dira volúntas.
      - type: text
        text: Pallet heu! vultus; caput ecce lapsum
      - type: text
        text: Flectitur; clausis óculis, Redémptor
      - type: text
        text: Spíritum sacro, méritis onustum,
      - type: text
        text: Fundit ab ore.
      - type: text
        text: O cor, æs durum superas, gemendo,
      - type: text
        text: Ni scelus tergas; tua culpa Christum
      - type: text
        text: Stipiti affixit; tua culpa morti
      - type: text
        text: Súbdidit atræ.
      - type: text
        text: Sit Deo ætérnum decus omne in ævum,
      - type: text
        text: Qui pius nostri géneris Redémptor,
      - type: text
        text: Críminis labem miseris nocentem
      - type: text
        text: Sánguine tersit.
      - type: text
        text: Amen.
  hymn.t-rna-christi-m-nera-0ac0376ec0:
    role: hymn
    content:
      en:
      - type: text
        text: Th' eternal gifts of Christ the King,
      - type: text
        text: The Apostles' glory, let us sing;
      - type: text
        text: And all with hearts of gladness raise
      - type: text
        text: Due hymns of thankful love and praise.
      - type: text
        text: For they the Church's princes are,
      - type: text
        text: Triumphant leaders in the war,
      - type: text
        text: The heavenly King's own warrior band,
      - type: text
        text: True lights to lighten every land.
      - type: text
        text: Theirs was the steadfast faith of saints,
      - type: text
        text: The hope that never yields nor faints,
      - type: text
        text: The love of Christ in perfect glow,
      - type: text
        text: That lay the prince of this world low.
      - type: text
        text: In them the Father's glory shone,
      - type: text
        text: In them the Spirit's will was done,
      - type: text
        text: The Son himself exults in them;
      - type: text
        text: Joy fills the new Jerusalem.
      - type: text
        text: '* Praise to the Father, with the Son,'
      - type: text
        text: And Holy Spirit, Three in One;
      - type: text
        text: As ever was in ages past,
      - type: text
        text: And so shall be while ages last.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Ætérna Christi múnera,
      - type: text
        text: Apostolórum glóriam,
      - type: text
        text: Palmas et hymnos débitos
      - type: text
        text: Lætis canámus méntibus.
      - type: text
        text: Ecclesiárum Príncipes,
      - type: text
        text: Belli triumpháles duces,
      - type: text
        text: Cæléstis aulæ mílites,
      - type: text
        text: Et vera mundi lúmina.
      - type: text
        text: Devóta Sanctórum fides,
      - type: text
        text: Invícta spes credéntium,
      - type: text
        text: Perfécta Christi cáritas
      - type: text
        text: Mundi tyránnum cónterit.
      - type: text
        text: In his Patérna glória,
      - type: text
        text: In his triúmphat Fílius,
      - type: text
        text: In his volúntas Spíritus,
      - type: text
        text: Cælum replétur gáudio.
      - type: text
        text: '* Patri, simúlque Fílio,'
      - type: text
        text: Tibíque Sancte Spíritus,
      - type: text
        text: Sicut fuit, sit iúgiter
      - type: text
        text: Sæclum per omne glória.
      - type: text
        text: Amen.
  hymn.text-6004299733:
    role: hymn
    content:
      en:
      - type: text
        text: This the confessor of the Lord, whose triumph
      - type: text
        text: Now all the faithful celebrate, with gladness
      - type: text
        text: Erst on this feast-day merited to enter
      - type: text
        text: Into his glory.
      - type: text
        text: Saintly and prudent, modest in behaviour,
      - type: text
        text: Peaceful and sober, chaste was he, and lowly.
      - type: text
        text: While that life’s vigour, coursing through his members,
      - type: text
        text: Quickened his being.
      - type: text
        text: Sick ones of old time, to his tomb resorting,
      - type: text
        text: Sorely by ailments manifold afflicted,
      - type: text
        text: Oft-times have welcomed health and strength returning,
      - type: text
        text: At his petition.
      - type: text
        text: Whence we in chorus gladly do him honour,
      - type: text
        text: Chanting his praises with devout affection,
      - type: text
        text: That in his merits we may have a portion,
      - type: text
        text: Now and forever.
      - type: text
        text: His be the glory, power and salvation,
      - type: text
        text: Who over all things reigneth in the highest,
      - type: text
        text: Earth’s mighty fabric ruling and directing,
      - type: text
        text: Onely and Trinal.
      - type: text
        text: Amen.
      la: []
  hymn.tristes-erant-ap-stoli-318cf3e466:
    role: hymn
    content:
      en:
      - type: text
        text: Th' eternal gifts of Christ the King,
      - type: text
        text: The Apostles' glory, let us sing;
      - type: text
        text: And all with hearts of gladness raise
      - type: text
        text: Due hymns of thankful love and praise.
      - type: text
        text: For they the Church's princes are,
      - type: text
        text: Triumphant leaders in the war,
      - type: text
        text: The heavenly King's own warrior band,
      - type: text
        text: True lights to lighten every land.
      - type: text
        text: Theirs was the steadfast faith of saints,
      - type: text
        text: The hope that never yields nor faints,
      - type: text
        text: The love of Christ in perfect glow,
      - type: text
        text: That lay the prince of this world low.
      - type: text
        text: In them the Father's glory shone,
      - type: text
        text: In them the Spirit's will was done,
      - type: text
        text: The Son himself exults in them;
      - type: text
        text: Joy fills the new Jerusalem.
      - type: text
        text: '* Praise to the Father, with the Son,'
      - type: text
        text: And Holy Spirit, Three in One;
      - type: text
        text: As ever was in ages past,
      - type: text
        text: And so shall be while ages last.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Tristes erant Apóstoli
      - type: text
        text: De Christi acérbo fúnere,
      - type: text
        text: Quem morte crudelíssima
      - type: text
        text: Servi necárant ímpii.
      - type: text
        text: Sermóne verax Angelus
      - type: text
        text: 'Muliéribus prædíxerat:'
      - type: text
        text: Mox ore Christus gáudium
      - type: text
        text: Gregi feret fidélium.
      - type: text
        text: Ad ánxios Apóstolos
      - type: text
        text: Currunt statim dum núntiæ,
      - type: text
        text: Illæ micántis óbvia
      - type: text
        text: Christi tenent vestígia.
      - type: text
        text: Galilǽæ ad alta móntium
      - type: text
        text: Se cónferunt Apóstoli,
      - type: text
        text: Iesúque, voti cómpotes,
      - type: text
        text: Almo beántur lúmine.
      - type: text
        text: Ut sis perénne méntibus
      - type: text
        text: Paschále Iesu gáudium;
      - type: text
        text: A morte dira críminum
      - type: text
        text: Vitæ renátos líbera.
      - type: text
        text: '* Deo Patri sit glória'
      - type: text
        text: Et Filio, qui a mórtuis
      - type: text
        text: Surréxit, ac Paráclito
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.tristes-erant-ap-stoli-ace41cb061:
    role: hymn
    content:
      en:
      - type: text
        text: While Christ's disciples, grieving, sad,
      - type: text
        text: Their master's painful death deplore,
      - type: text
        text: Whom faithless servants' cruel hands,
      - type: text
        text: Had bathed in his own crimson gore;
      - type: text
        text: Quick from the happy realms above,
      - type: text
        text: An angel comes on joyful wing,
      - type: text
        text: And to the women tells the joy
      - type: text
        text: That to his flock their Lord will bring.
      - type: text
        text: As they with eager steps make haste,
      - type: text
        text: Their joyous message to repeat,
      - type: text
        text: Their master's glorious form they see,
      - type: text
        text: And falling clasp his sacred feet.
      - type: text
        text: Cheered by this tale, his faithful flock
      - type: text
        text: The Galilean mount ascend,
      - type: text
        text: And there with loving awe behold
      - type: text
        text: Their heart's sole wish, their truest friend.
      - type: text
        text: That thou mayst be our Paschal joy
      - type: text
        text: Through happy, never-ending years,
      - type: text
        text: thine own poor children, Jesu, free
      - type: text
        text: From sin's sad death with all its fears.
      - type: text
        text: '* To God the Father, and the Son,'
      - type: text
        text: Who rose from death, glad praise repeat;
      - type: text
        text: Let equal praise be ever sung
      - type: text
        text: To God the Holy Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Tristes erant Apóstoli
      - type: text
        text: De Christi acérbo fúnere,
      - type: text
        text: Quem morte crudelíssima
      - type: text
        text: Servi necárant ímpii.
      - type: text
        text: Sermóne verax Angelus
      - type: text
        text: 'Muliéribus prædíxerat:'
      - type: text
