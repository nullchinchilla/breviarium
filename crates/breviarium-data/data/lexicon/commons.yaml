          But he who had received the five talents gained another five: for there are some who, even if they cannot penetrate the interior and mystical things, yet, with an intention toward the heavenly homeland, teach what is right to those they can; from those very outward things they have received, they bring a doubled talent; and while they keep themselves from the wantonness of the flesh and from the pursuit of earthly things and from the pleasure of visible things, they also restrain others from these by admonishing them. And there are some who, as though enriched by two talents, receive both understanding and action, perceive subtle matters of the interior, accomplish wondrous things outwardly; and since by both understanding and acting they preach to others, they bring back, as it were, a doubled gain from their trading.
          We praise you, O God: * we acknowledge you as Lord.
          To you, eternal Father, * all the earth renders worship.
          To you all Angels, * to you the Heavens and all the Powers:
          To you the Cherubim and Seraphim * cry out without ceasing:
          (A bow is made) Holy, Holy, Holy, * Lord God of Sabaoth.
          Full are the heavens and the earth * of the majesty of your glory.
          You, the glorious * choir of the Apostles,
          You, the praiseworthy * company of the Prophets,
          You, the white-robed * army of the Martyrs praise.
          You, throughout the world, * the holy Church confesses,
          the Father * of immense majesty;
          Your venerable, true * and only Son;
          And the Holy * Paraclete Spirit.
          You are the King of glory, * O Christ.
          You are the * everlasting Son of the Father.
          (A bow is made) You, about to take upon yourself man for his liberation, * did not shrink from the Virgin's womb.
          You, about to take upon yourself man for his liberation, * did not shrink from the Virgin's womb.
          You, having overcome the sting of death, * have opened to believers the kingdoms of heaven.
          You sit at the right hand of God, * in the glory of the Father.
          You are believed * to be the Judge to come.
      - type: rubric
        text: (The following verse is said kneeling)
      - type: rubric
        text: (Brethren, when they begin 'Te ergo quaesumus,' departing from the Stalls, let them reverently bow at the words 'Quos pretioso' and the rest)
      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
          And we praise your name for ever, * and for ever and ever.
          Graciously keep us, O Lord, this day * without sin.
          Have mercy on us, O Lord, * have mercy on us.
          Let your mercy, O Lord, be upon us, * as we have hoped in you.
          In you, O Lord, I have hoped: * let me not be confounded for ever.
  reading.sed-is-qui-quinque-tal-nta-acc-perat-lia-quinque-766932ce67:
