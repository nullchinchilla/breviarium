  responsory.fecit-me-deus-quasi-patrem-regis-et-d-minum-univ-ca913541f7:
    role: responsory
    content:
      en:
      - type: response
        text: God hath made me as a father to Pharaoh, and lord of all his house.
      - type: text
        text: He hath made me great, to save much people alive. Alleluia.
      - type: versicle
        text: Come unto me, and I wili give you all the good of the land of Egypt, and ye shall eat the fat of the land.
      - type: response
        text: He hath made me great, to save much people alive. Alleluia.
      la:
      - type: response
        text: 'Fecit me Deus quasi patrem regis, et dóminum univérsæ domus eius:'
      - type: text
        text: Exaltávit me, ut salvos fáceret multos pópulos, allelúia.
      - type: versicle
        text: Veníte ad me, et ego dabo vobis ómnia bona Ægýpti, ut comedátis medúllam terræ.
      - type: response
        text: Exaltávit me, ut salvos fáceret multos pópulos, allelúia.
      en2:
      - type: response
        text: 'God has made me as a father to the king, and lord of all his household:'
      - type: text
        text: He has exalted me to save many peoples, alleluia.
      - type: versicle
        text: Come to me, and I will give you all the goods of Egypt, that you may eat the marrow of the land.
      - type: response
        text: He has exalted me to save many peoples, alleluia.
  responsory.felix-namque-es-sacra-virgo-mar-a-et-omni-laude-4efde58ecb:
    role: responsory
    content:
      la:
      - type: response
        text: 'Felix namque es, sacra Virgo María, et omni laude digníssima:'
      - type: text
        text: Quia ex te ortus est sol iustítiæ, Christus, Deus noster.
      - type: versicle
        text: 'Ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu: séntiant omnes tuum iuvámen, quicúmque célebrant tuam sanctam commemoratiónem.'
      - type: response
        text: Quia ex te ortus est sol iustítiæ, Christus, Deus noster.
      en2:
      - type: response
        text: 'For you are blessed, O holy Virgin Mary, and most worthy of all praise:'
      - type: text
        text: For from you arose the Sun of justice, Christ our God.
      - type: versicle
        text: 'Pray for the people, intercede for the clergy, plead for the devout female sex: let all feel your help, whoever celebrate your holy commemoration.'
      - type: response
        text: For from you arose the Sun of justice, Christ our God.
  responsory.felix-namque-es-sacra-virgo-mar-a-et-omni-laude-8605a22e06:
    role: responsory
    content:
