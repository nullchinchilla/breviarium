      - type: psalmody
        antiphon: 'You shall make them * princes over all the earth: they shall be mindful of your name, O Lord.'
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: The princes of the peoples * are gathered together with the God of Abraham.
        psalms:
        - number: '46'
      - type: psalmody
        antiphon: You have given an inheritance * to those who fear your name, O Lord.
        psalms:
        - number: '60'
