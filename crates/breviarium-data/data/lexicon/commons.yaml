      - type: text
        text: |-
          We beseech you, therefore, come to the aid of your servants, * whom you have redeemed with your precious blood.
          Number them among your Saints * in eternal glory.
          Number them among your Saints * to receive reward in eternal glory.
          Save your people, O Lord, * and bless your inheritance.
          And rule them, * and lift them up for ever.
          Day by day * we bless you.
          (A bow is made, according to custom) And we praise your name for ever, * and for ever and ever.
          And we praise your name for ever, * and for ever and ever.
          Graciously keep us, O Lord, this day * without sin.
          Have mercy on us, O Lord, * have mercy on us.
          Let your mercy, O Lord, be upon us, * as we have hoped in you.
          In you, O Lord, I have hoped: * let me not be confounded for ever.
  reading.ex-libro-mor-lium-sancti-greg-rii-pap-01c0b1ce4f:
    role: reading
    content:
      en:
      - type: text
        text: From the Book of Moral Reflection on Job, written by Pope St. Gregory the Great.
      - type: citation
        text: Bk. ix. ch. vi.
      - type: text
        text: In the Book of Job (ix. 9), it is written that it is God which maketh Arcturus, Orion, and Hyades. Now if by the constellation Orion be mystically signified the spiritual constellation of the holy Martyrs, whom can we understand to be named after them under the title of the Hyades, but the Doctors of the Holy Church? When the glorious constellation of the Martyrs had set, and the light of the faith grew stronger, then appeared the constellation of the Doctors in the firmament of the Church, even in that spring-time when the winter of unbelief was past, and the Sun of truth rose higher to shine on the hearts of His faithful ones. The storms of persecution were gone, and the long nights of unbelief were over then rose the Doctors to shine on the Church, when the springtime of belief promised her a brighter year.
      la:
      - type: text
        text: Ex libro Morálium sancti Gregórii Papæ
      - type: citation
        text: Lib. 9. cap. 11., n. 45
      - type: text
        text: Qui, post Oríonas, Hýadum nómine, nisi Doctóres sanctæ Ecclésiæ designántur? Qui, subdúctis Martýribus, eo iam témpore ad mundi notítiam venérunt, quo fides clárius elúcet, et, représsa infidelitátis híeme, áltius per corda fidélium sol veritátis calet. Qui, remóta tempestáte persecutiónis, explétis longis nóctibus infidelitátis, tunc sanctæ Ecclésiæ orti sunt, cum ei iam per credulitátis vernum lucídior annus aperítur.
      en2:
      - type: text
        text: From the Book of the Moralia of Saint Gregory the Pope
      - type: citation
        text: Lib. 9. cap. 11., n. 45
      - type: text
        text: Who are designated by the name of the Hyades, who come after the Orions, if not the Doctors of the holy Church? Who, when the Martyrs had been taken away, came to the knowledge of the world at a time when faith shines more brightly, and when, the winter of unbelief being repressed, the sun of truth burns more intensely in the hearts of the faithful. Who, when the storm of persecution had passed and the long nights of unbelief had been fulfilled, arose for the holy Church at a time when a more luminous year was already opening for her through the spring of faith.
  reading.ex-libro-mor-lium-sancti-greg-rii-pap-2336d5e7c0:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St. John Chrysostom, Patriarch (of Constantinople.)
      - type: citation
        text: On St Philogonius, Tom. iii.
      - type: text
        text: 'The blessed N., whose Feast we are this day keeping, doth justly call on our tongue to tell what great deeds he wrought. To-day did that blessed servant of God pass into that higher life, which is a life of peace, a life where there is no trouble. To-day his ship reached that harbour whereafter wreck is to be dreaded no more. He hath felt trouble and anguish of spirit for the last time. And wherefore marvel we that that place is one where the mind is vexed no more, when we remember that Paul saith, even to men living here in this life: Rejoice evermore, pray without ceasing? (1 Thess. v. 16, 17.)'
      la:
      - type: text
        text: Ex libro Morálium sancti Gregórii Papæ
      - type: citation
