          Sanctóque sit Paráclito,
          Per omne semper sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          Jesus, more exalted crown
          and more sublime truth,
          who render to your confessing servant
          an everlasting reward:
      
          grant to this suppliant assembly,
          at his prayer, remission
          of the guilt of sin
          by breaking the bond of its chain.
      
          As the year's season returns,
          the day has shone with its light
          on which this Saint departed
          from the body to dwell among the stars.
      
          He, counting the empty joys
          of earth and its gleaming estates
          as defiled with filth,
          holds the things of heaven in triumph.
      
          You, O Christ, most merciful King,
          by continually confessing you,
          he trampled the arts of demons
          and the fierce prince of hell.
      
          Illustrious in virtue and faith,
          diligent in confession,
          offering up his fasting members,
          he obtains the heavenly banquet.
      
          And so we all, as suppliants,
          beseech you most mercifully:
          that by this man's grace
          you remit to us our fitting punishments.
      
          Let enduring glory be to the Father,
          and to the only-begotten Son of the Father,
          and to the Holy Paraclete,
          through every age for ever.
          Amen.
  hymn.iesu-cor-na-v-rginum-1347fd7f61:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iesu, coróna Vírginum,
          Quem Mater illa cóncipit
          Quæ sola Virgo párturit,
          Hæc vota clemens áccipe:

          Qui pergis inter lília
          Septus choréis Vírginum,
          Sponsus decórus glória
          Sponsísque reddens prǽmia.

          Quocúmque tendis, Vírgines
          Sequúntur, atque láudibus
          Post te canéntes cúrsitant,
          Hymnósque dulces pérsonant;

          Te deprecámur súpplices,
          Nostris ut addas sénsibus
          Nescíre prorsus ómnia
          Corruptiónis vúlnera.

          Virtus, honor, laus, glória
          Deo Patri cum Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          Jesus, crown of Virgins,
          whom that Mother conceived
          who alone as a Virgin gives birth:
          receive graciously these vows:
      
          You who walk among the lilies
          surrounded by the choirs of Virgins,
          the Bridegroom glorious in splendor,
          bestowing rewards upon your brides.
      
          Wherever you go, the Virgins
          follow, and hasten after you
          with praises singing,
          and resound sweet hymns;
      
          we implore you as suppliants,
          that you grant to our senses
          to be utterly ignorant
          of all the wounds of corruption.
      
          Power, honor, praise, and glory
          to God the Father with the Son,
          and likewise to the Holy Paraclete,
          unto ages of ages.
          Amen.
  hymn.iesu-cor-na-v-rginum-6a37f1b200:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Jesu, the virgins' crown, do thou
          Accept us as in prayer we bow;
          Born of that Virgin, whom alone
          The mother and the maid we own.

          Amongst the lilies thou dost feed,
          By virgin choirs accompanied;
          With glory decked, the spotless brides
          Whose bridal gifts thy love provides.

          They, wheresoe'er thy footsteps bend,
          With hymns and praises still attend:
          In blessèd troops they follow thee,
          With dance, and song, and melody.

          We pray thee therefore to bestow
          Upon our senses here below
          Thy grace, that so we may endure
          From taint of all corruption pure.

          All laud to God the Father be,
          All praise, eternal Son, to thee;
          All glory as is ever meet,
          To God, the holy Paraclete.
          Amen.
      la:
      - type: text
        text: |-
