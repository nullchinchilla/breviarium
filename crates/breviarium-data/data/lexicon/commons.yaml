        text: 29 Nam quos præscívit et prædestinávit confórmes fíeri imáginis Fílii sui ut sit ipse primogénitus in multis frátribus.
      - type: citation
        text: '30 Quos autem prædestinávit, hos et vocávit: et quos vocávit, hos et iustificávit: quos autem iustificávit, illos et glorificávit.'
      - type: text
        text: 31 Quid ergo dicémus ad hæc? Si Deus pro nobis, quis contra nos?
      - type: text
        text: 32 Qui étiam próprio Fílio suo non pepércit, sed pro nobis ómnibus trádidit illum, quómodo non étiam cum illo ómnia nobis donávit?
      - type: text
        text: 33 Quis accusábit advérsus eléctos Dei? Deus qui iustíficat,
      - type: text
        text: 34 quis est qui condémnet? Christus Iesus, qui mórtuus est, immo qui et resurréxit, qui est ad déxteram Dei, qui étiam interpéllat pro nobis.
  reading.rom-8-35-39-50f575298e:
    role: reading
    content:
      en:
      - type: citation
        text: Acts 20:32-38
      - type: text
        text: 32 And now I commend you to God, and to the word of his grace, who is able to build up, and to give an inheritance among all the sanctified.
      - type: text
        text: 33 I have not coveted any man's silver, gold, or apparel, as
      - type: citation
        text: '34 You yourselves know: for such things as were needful for me and them that are with me, these hands have furnished.'
      - type: citation
        text: '35 I have showed you all things, how that so labouring you ought to support the weak, and to remember the word of the Lord Jesus, how he said: It is a more blessed thing to give, rather than to receive.'
      - type: text
        text: 36 And when he had said these things, kneeling down, he prayed with them all.
      - type: text
        text: 37 And there was much weeping among them all; and falling on the neck of Paul, they kissed him,
      - type: text
        text: 38 Being grieved most of all for the word which he had said, that they should see his face no more. And they brought him on his way to the ship.
      la:
      - type: citation
        text: Rom 8:35-39
      - type: text
        text: 35 Quis ergo nos separábit a caritáte Christi? tribulátio? an angústia? an fames? an núditas? an perículum? an persecútio? an gládius?
      - type: citation
        text: '36 (sicut scriptum est: Quia propter te mortificámur tota die: æstimáti sumus sicut oves occisiónis.)'
      - type: text
        text: 37 Sed in his ómnibus superámus propter eum qui diléxit nos.
      - type: text
        text: 38 Certus sum enim quia neque mors, neque vita, neque Ángeli, neque Principátus, neque Virtútes, neque instántia, neque futúra, neque fortitúdo,
      - type: text
        text: 39 neque altitúdo, neque profúndum, neque creatúra ália póterit nos separáre a caritáte Dei, quæ est in Christo Iesu Dómino nostro.
  reading.rom-8-35-39-dd358b64ae:
    role: reading
    content:
      en:
      - type: citation
        text: Rom 8:35-39
      - type: text
        text: 35 Who then shall separate us from the love of Christ? Shall tribulation? or distress? or famine? or nakedness? or danger? or persecution? or the sword?
      - type: citation
        text: '36 As it is written: For thy sake we are put to death all the day long. We are accounted as sheep for the slaughter.'
      - type: text
        text: 37 But in all these things we overcome, because of him that hath loved us.
      - type: text
        text: 38 For I am sure that neither death, nor life, nor angels, nor principalities, nor powers, nor things present, nor things to come, nor might,
      - type: text
        text: 39 Nor height, nor depth, nor any other creature, shall be able to separate us from the love of God, which is in Christ Jesus our Lord.
