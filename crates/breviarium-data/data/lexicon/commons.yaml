  reading.de-ep-stola-prima-be-ti-pauli-ap-stoli-ad-cor-nt-5bc904888a:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to the Corinthians
      - type: citation
        text: 1 Cor 4:1-5
      - type: citation
        text: 1 Let a man so account of us as of the ministers of Christ, and the dispensers of the mysteries of God.
      - type: citation
        text: 2 Here now it is required among the dispensers, that a man be found faithful.
      - type: citation
        text: 3 But to me it is a very small thing to be judged by you, or by man's day; but neither do I judge my own self.
      - type: text
        text: 4 For I am not conscious to myself of any thing, yet am I not hereby justified; but he that judgeth me, is the Lord.
      - type: text
        text: 5 Therefore judge not before the time; until the Lord come, who both will bring to light the hidden things of darkness, and will make manifest the counsels of the hearts; and then shall every man have praise from God.
      la:
      - type: text
        text: De Epístola prima beáti Pauli Apóstoli ad Corínthios
      - type: citation
        text: 1 Cor 4:1-5
      - type: citation
        text: 1 Sic nos exístimet homo ut minístros Christi, et dispensatóres mysteriórum Dei.
      - type: citation
        text: 2 Hic iam quǽritur inter dispensatóres ut fidélis quis inveniátur.
      - type: citation
        text: '3 Mihi autem pro mínimo est ut a vobis iúdicer, aut ab humáno die: sed neque meípsum iúdico.'
      - type: citation
        text: '4 Nihil enim mihi cónscius sum, sed non in hoc iustificátus sum: qui autem iúdicat me, Dóminus est.'
      - type: citation
        text: '5 Ítaque nolíte ante tempus iudicáre, quoadúsque véniat Dóminus: qui et illuminábit abscóndita tenebrárum, et manifestábit consília córdium: et tunc laus erit unicuíque a Deo.'
  reading.de-ep-stola-prima-be-ti-pauli-ap-stoli-ad-cor-nt-5f40ffe0c2:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to the Corinthians
      - type: citation
        text: 1 Cor 7:25-31
      - type: text
        text: 25 Now concerning virgins, I have no commandment of the Lord; but I give counsel, as having obtained mercy of the Lord, to be faithful.
      - type: text
        text: 26 I think therefore that this is good for the present necessity, that it is good for a man so to be.
      - type: text
        text: 27 Art thou bound to a wife? seek not to be loosed. Art thou loosed from a wife? seek not a wife.
      - type: citation
        text: '28 But if thou take a wife, thou hast not sinned. And if a virgin marry, she hath not sinned: nevertheless, such shall have tribulation of the flesh. But I spare you.'
      - type: text
        text: 29 This therefore I say, brethren; the time is short; it remaineth, that they also who have wives, be as if they had none;
      - type: text
        text: 30 And they that weep, as though they wept not; and they that rejoice, as if they rejoiced not; and they that buy, as though they possessed not;
      - type: citation
        text: '31 And they that use this world, as if they used it not: for the fashion of this world passeth away.'
      la:
      - type: text
        text: De Epístola prima beáti Pauli Apóstoli ad Corínthios
      - type: citation
        text: 1 Cor 7:25-31
      - type: citation
        text: '25 De virgínibus præcéptum Dómini non hábeo: consílium autem do, tamquam misericórdiam consecútus a Dómino, ut sim fidélis.'
      - type: text
        text: 26 Exístimo ergo hoc bonum esse propter instántem necessitátem, quóniam bonum est hómini sic esse.
      - type: text
        text: 27 Alligátus es uxóri? noli quǽrere solutiónem. Solútus es ab uxóre? noli quǽrere uxórem.
      - type: text
        text: 28 Si autem accéperis uxórem, non peccásti. Et si núpserit virgo, non peccávit. Tribulatiónem tamen carnis habébunt huiúsmodi. Ego autem vobis parco.
      - type: citation
        text: '29 Hoc ítaque dico, fratres: Tempus breve est: réliquum est, ut et qui habent uxóres, tamquam non habéntes sint;'
      - type: text
        text: 30 et qui flent, tamquam non flentes; et qui gaudent, tamquam non gaudéntes; et qui emunt, tamquam non possidéntes;
      - type: text
        text: 31 et qui utúntur hoc mundo, tamquam non utántur; prǽterit enim figúra huius mundi.
  reading.de-ep-stola-prima-be-ti-pauli-ap-stoli-ad-tim-th-b7fb8b50be:
    role: reading
    content:
      la:
      - type: text
        text: De Epístola prima beáti Pauli Apóstoli ad Timótheum
      - type: citation
        text: 1 Tim 3:1-7
      - type: citation
        text: '1 Fidélis sermo: si quis episcopátum desíderat, bonum opus desíderat.'
      - type: citation
        text: 2 Opórtet ergo epíscopum irreprehensíbilem esse, uníus uxóris virum, sóbrium, prudéntem, ornátum, pudícum, hospitálem, doctórem,
      - type: citation
        text: 3 non vinoléntum, non percussórem, sed modéstum; non litigiósum, non cúpidum, sed
      - type: text
        text: 4 suæ dómui bene præpósitum, fílios habéntem súbditos cum omni castitáte.
      - type: text
        text: 5 Si quis autem dómui suæ præésse nescit, quómodo Ecclésiæ Dei diligéntiam habébit?
      - type: text
        text: 6 Non neóphytum, ne in supérbiam elátus, in iudícium íncidat diáboli.
      - type: text
        text: 7 Opórtet autem illum et testimónium habére bonum ab iis qui foris sunt, ut non in oppróbrium íncidat, et in láqueum diáboli.
  reading.de-ep-stola-prima-be-ti-pauli-ap-stoli-ad-tim-th-dea476f9b7:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to Timothy
      - type: citation
        text: 1 Tim 3:1-7
      - type: citation
        text: '1 A faithful saying: if a man desire the office of a bishop, he desireth a good work.'
      - type: citation
        text: 2 It behoveth therefore a bishop to be blameless, the husband of one wife, sober, prudent, of good behaviour, chaste, given to hospitality, a teacher,
      - type: citation
        text: 3 Not given to wine, no striker, but modest, not quarrelsome, not covetous, but
      - type: text
        text: 4 One that ruleth well his own house, having his children in subjection with all chastity.
      - type: text
        text: 5 But if a man know not how to rule his own house, how shall he take care of the church of God?
      - type: citation
        text: '6 Not a neophyte: lest being puffed up with pride, he fall into the judgment of the devil.'
      - type: citation
        text: '7 Moreover he must have a good testimony of them who are without: lest he fall into reproach and the snare of the devil.'
      la:
      - type: text
        text: De Epístola prima beáti Pauli Apóstoli ad Timótheum
      - type: citation
