  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-7ba96edbd5:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 14:26-33
      - type: text
        text: |-
          At that time, Jesus said unto the multitudes: If any man come to Me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple. And so on.

          Homily by Pope St Gregory the Great
      - type: citation
        text: Homilia 37th on the Gospels.
      - type: text
        text: Dearly beloved brethren, if we consider what and how great things are promised unto us in heaven, all things which are upon earth grow poor to our mind. For when this world's goods are reckoned against the gladness above, they are found to be a clog rather than an help. This present life being compared to life eternal, ought rather to be called death than life. For what is the daily failing of our corruption but, as it were, a creeping death But what tongue is there that can tell, or what understanding that can comprehend how great is the rejoicing in the city above, where they have part with the choirs of Angels, where they stand with the most blessed spirits before the glory of the Creator, where they see the face of God present, where they behold the Incomprehensible Light, where they have no fear of death, and where they rejoice eternally incorruptible
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 16:24-27
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Si quis vult post me veníre, ábneget semetípsum, et tollat crucem suam, et sequátur me. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 32 in Evang.
      - type: text
        text: 'Quia Dóminus ac Redémptor noster novus homo venit in mundum, nova præcépta dedit mundo. Vitæ étenim nostræ véteri in vítiis enutrítæ contrarietátem oppósuit novitátis suæ. Quid enim vetus, quid carnális homo nóverat, nisi sua retinére, aliéna rápere, si posset; concupíscere, si non posset? Sed cæléstis médicus síngulis quibúsque vítiis obviántia ádhibet medicaménta. Nam sicut arte medicínæ cálida frígidis, frígida cálidis curántur: ita Dóminus noster contrária oppósuit medicaménta peccátis, ut lúbricis continéntiam, tenácibus largitátem, iracúndis mansuetúdinem, elátis præcíperet humilitátem.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 16:24-27
      - type: text
        text: |-
          At that time: Jesus said to his disciples: If anyone is willing to come after me, let him deny himself, and take up his cross, and follow me. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 32 in Evang.
      - type: text
        text: Because our Lord and Redeemer, the new man, came into the world, he gave new commandments to the world. For he set the newness of his own way in opposition to our old life nurtured in vices. What did the old man, what did the carnal man know, except to hold fast to what was his own, to seize what belonged to others if he could; to covet it if he could not? But the heavenly physician applies remedies contrary to each vice in turn. For just as in the art of medicine, hot ailments are treated with cold remedies and cold with hot; so our Lord set contrary medicines against sins, prescribing continence for the licentious, generosity for the covetous, gentleness for the wrathful, humility for the proud.
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-82e1e0a5c7:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Matthew
      - type: citation
        text: Matt 19:27-29
      - type: text
        text: |-
          At that time, Peter said unto Jesus: Behold, we have forsaken all, and followed thee what shall we have therefore? And so on.

          Homily by St. Jerome, Priest (at Bethlehem.)
      - type: citation
        text: Bk. iii. on Matth xix.
      - type: text
        text: 'Peter was a fisherman, he was not rich, he earned his bread by his hand and skill, and nevertheless he is thus bold, and saith confidently: We have forsaken all. And because it sufficeth not to forsake only, he addeth that which to do is to be perfect: and followed thee. We have done that which Thou hast commanded us, what reward therefore wilt Thou give us? And Jesus said unto them Amen I say unto you, that ye which have followed Me, in the regeneration, when the Son of Man shall sit in the throne of His glory, ye also shall sit upon twelve thrones, judging the twelve tribes of Israel. He said not, Ye which have forsaken all, for this did even Crates the philosopher, and they which have set nothing by riches are many, but, Ye which have followed Me. This did the Apostles, and this do believers do.'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum.
      - type: citation
        text: Matt 19:27-29
      - type: text
        text: |-
          In illo témpore: Dixit Petrus ad Iesum: Ecce nos relíquimus ómnia, et secúti sumus te: quid ergo erit nobis? Et réliqua.

          Homilía sancti Hierónymi Presbýteri.
      - type: citation
        text: Lib. 3. in Matth. cap. 19.
      - type: text
        text: 'Grandis fidúcia! Petrus piscátor erat, dives non fúerat, cibos manu et arte quærébat: et tamen lóquitur confidénter: Relíquimus ómnia. Et quia non súfficit tantum relínquere, iungit quod perféctum est: Et secúti sumus te. Fécimus quod iussísti: quid ígitur nobis dabis prǽmii? Iesus autem dixit illis: Amen dico vobis, quod vos qui secúti estis me, in regeneratióne, cum séderit Fílius hóminis in sede maiestátis suæ, sedébitis et vos super sedes duódecim, iudicántes duódecim tribus Ísraël. Non dixit: Qui reliquístis ómnia; hoc enim et Crates fecit philósophus, et multi álii divítias contempsérunt: sed, Qui secúti estis me: quod próprie Apostolórum est, atque credéntium.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew.
      - type: citation
        text: Matt 19:27-29
      - type: text
        text: |-
          At that time: Peter said to Jesus: Behold, we have left behind all things, and we have followed you. So then, what will be for us? And so forth.
      
          A Homily of Saint Jerome the Priest.
      - type: citation
        text: Lib. 3. in Matth. cap. 19.
      - type: text
        text: 'Great confidence! Peter was a fisherman; he had not been wealthy; he earned his food by hand and by craft. And yet he speaks with confidence: We have left behind all things. And because it is not enough merely to leave things behind, he adds what is perfect: And we have followed you. We have done what you commanded; what reward, then, will you give us? But Jesus said to them: Amen I say to you, that you who have followed me, at the resurrection, when the Son of man shall sit on the seat of his majesty, shall also sit on twelve seats, judging the twelve tribes of Israel. He did not say: Who have left behind all things — for the philosopher Crates also did this, and many others despised riches; but: Who have followed me — which belongs properly to the Apostles and to believers.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-89321f8f2c:
    role: reading
    content:
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis parábolam hanc: Homo péregre proficíscens, vocávit servos suos, et trádidit illis bona sua. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 9 in Evangelia
      - type: text
        text: 'Léctio sancti Evangélii, fratres caríssimi, solícite consideráre nos ádmonet, ne nos, qui plus céteris in hoc mundo accepísse áliquid cérnimur, ab Auctóre mundi grávius inde iudicémur. Cum enim augéntur dona, ratiónes étiam crescunt donórum. Tanto ergo esse humílior atque ad serviéndum Deo prómptior quisque debet ex múnere, quanto se obligatiórem esse cónspicit in reddénda ratióne. Ecce homo, qui péregre proficíscitur, servos suos vocat, eisque ad negótium talénta partítur. Post multum vero témporis positúrus ratiónem revértitur: bene operántes pro apportáto lucro remúnerat, servum vero a bono ópere torpéntem damnat.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: |-
          At that time: Jesus spoke this parable to his disciples: A man setting out on a long journey called his servants and delivered to them his goods. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 9 in Evangelia
      - type: text
        text: 'The reading of the holy Gospel, dearest brethren, admonishes us to consider carefully lest we who are seen to have received more than others in this world be judged more severely for it by the Author of the world. For when gifts are increased, the reckoning of the gifts increases as well. Therefore, each one ought to be so much the more humble and prompt in serving God in proportion to the gift he has received, as he sees himself more obligated in giving an account. Behold, the man who goes on a long journey calls his servants and distributes talents among them for their business. But after a long time he returns to settle accounts: he rewards those who have labored well for the profit they bring; but he condemns the servant who has been sluggish in good work.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-940db60625:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Matthew
      - type: citation
        text: Matt 13:44
      - type: text
        text: |-
          At that time Jesus spake unto His disciples this parable The kingdom of heaven is like unto treasure hid in a field. And so on.

          Homily by Pope St Gregory the Great
      - type: citation
        text: 11th on the Gospels
      - type: text
        text: Dearly beloved brethren, the kingdom of heaven is likened unto the things of earth, to the end that by the mean of things which we know, our mind may rise to the contemplation of the things which we know not by the example of things which are seen, may fix her gaze on things which are not seen by the touch of things which she useth, may be warmed towards the things which she useth not; by things which she knoweth and loveth, to love also the things which she knoweth not. For, behold, “the kingdom of heaven is likened unto treasure hid in a field, the which when a man hath found, he hideth, and, for joy thereof, goeth and selleth all that he hath and buyeth that field.”
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 13:44-52
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis parábolam hanc: Simile est regnum cælórum thesáuro abscóndito in agro. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 11 in Evangelia
      - type: text
        text: 'Cælórum regnum, fratres caríssimi, idcírco terrénis rebus símile dícitur, ut, ex his quæ ánimus novit, surgat ad incógnita, quæ non novit: quátenus exémplo visibílium se ad invisibília rápiat, et, per ea quæ usu dídicit quasi confricátus incaléscat; ut per hoc, quod scit notum dilígere, discat et incógnita amáre. Ecce enim cælórum regnum thesáuro abscóndito in agro comparátur; quem, qui invénit homo, abscóndit, et præ gáudio illíus vadit, et vendit univérsa quæ habet, et emit agrum illum.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 13:44-52
      - type: text
        text: |-
          At that time: Jesus spoke this parable to his disciples: The kingdom of heaven is like a treasure hidden in a field. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 11 in Evangelia
      - type: text
        text: 'The Kingdom of Heaven, dearest brethren, is therefore said to be like earthly things, so that, from those things which the mind knows, it may rise to the unknown things which it does not know: in order that, by the example of visible things, it may be drawn swiftly to the invisible, and, as though warmed by rubbing against what it has learned by experience, it may grow hot; so that, through what it knows how to love as familiar, it may also learn to love the unknown. For behold, the Kingdom of Heaven is likened to a treasure hidden in a field; which, when a man finds it, he hides it, and out of joy for it he goes and sells all that he has, and buys that field.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-ada7afe230:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 12:35-40
      - type: text
        text: |-
          At that time, Jesus said unto His disciples: Let your loins be girded about, and your lights burning. And so on.

          Homily by Pope St. Gregory (the Great.)
      - type: citation
        text: 13th on the Gospels.
      - type: text
        text: Dearly beloved brethren, the words of the Holy Gospel, which have just been read, lie open before you, and, lest their very plainness should make them seem to some to be hard, we will go through them with such shortness as that neither may they which understand not remain unenlightened, nor they which understand be wearied. The Lord saith Let your loins be girded about. Now, we gird our loins about, when by continency we master the lustful inclination of the flesh. But, forasmuch as it sufficeth not for a man to abstain from evil deeds, if he strive not to join thereto the earnest doing of good works, it is immediately added And your lights burning. Our lights burn when, by good works, we give bright example to our neighbour; concerning which works the Lord saith Let your light so shine before men, that they may see your good works, and glorify your Father Which is in heaven. (Matth. v. 16.)
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 5:13-19
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis: Vos estis sal terræ. Quod si sal evanúerit, in quo saliétur? Et réliqua.

          Homilía sancti Augustíni Epíscopi
      - type: citation
        text: Lib. 1 de Sermone Domini in monte, cap. 6
      - type: text
        text: Osténdit Dóminus fátuos esse iudicándos, qui temporálium bonórum vel cópiam sectántes vel inópiam metuéntes, amíttunt ætérna, quæ nec dari possunt ab homínibus nec auférri. Itaque, si sal infatuátum fúerit, in quo saliétur? Id est, si vos, per quos condiéndi sunt quodámmodo pópuli, metu persecutiónum temporálium amiséritis regna cælórum; qui erunt hómines, per quos a vobis error auferátur, cum vos elégerit Deus, per quos errórem áuferat ceterórum?
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 5:13-19
      - type: text
        text: |-
          At that time: Jesus said to his disciples: You are the salt of the earth. But if salt loses its saltiness, with what will it be salted? And so forth.
      
          A Homily of Saint Augustine the Bishop
      - type: citation
        text: Lib. 1 de Sermone Domini in monte, cap. 6
      - type: text
        text: 'The Lord shows that those are to be judged foolish who, either by pursuing an abundance of temporal goods or by fearing the want of them, lose the eternal, which can neither be given nor taken away by men. And so: if salt loses its saltiness, with what will it be salted? That is, if you — through whom the peoples are to be seasoned in a certain manner — have lost the kingdoms of heaven through fear of temporal persecutions, who will be the people by whom error is removed from you, since God has chosen you as the very ones through whom he would remove the error of the rest?'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-b421dc917f:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Matthew
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: |-
          At that time Jesus spake unto His disciples this parable A man, travelling into a far country, called his own servants, and delivered unto them his goods. And so on.

          Homily by Pope St Gregory (the Great.)
      - type: citation
        text: 9th on the Gospels.
      - type: text
        text: Dearly beloved brethren, this Lesson from the Holy Gospel moveth us to take good heed lest we, who are seen in this world to have received more than others, should thereby bring ourselves into greater condemnation from the Maker of this world. To whom much is given, of the same is much required. Therefore, let him that receiveth much, strive to be all the more lowly, and all the more ready to do God service, for his very gifts’ sake, knowing that he will be obliged to give account thereof. Behold, a man, travelling into a far country, calleth his own servants, and delivereth unto them talents, to the end that they may trade therewith. After a long time, the lord of those servants cometh, and reckoneth with them, and to them that have done well He rendereth a reward of their labours, but that servant which was careless of his master’s work He condemneth.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: |-
          In illo témpore: Dixit Iesus discípulis suis parábolam hanc: Homo péregre proficíscens, vocávit servos suos, et trádidit illis bona sua. Et réliqua.

          Homilía sancti Gregórii Papæ
      - type: citation
        text: Homilia 9 in Evangelia
      - type: text
        text: 'Léctio sancti Evangélii, fratres caríssimi, solícite consideráre nos ádmonet, ne nos, qui plus céteris in hoc mundo accepísse áliquid cérnimur, ab Auctóre mundi grávius inde iudicémur. Cum enim augéntur dona, ratiónes étiam crescunt donórum. Tanto ergo esse humílior atque ad serviéndum Deo prómptior quisque debet ex múnere, quanto se obligatiórem esse cónspicit in reddénda ratióne. Ecce homo, qui péregre proficíscitur, servos suos vocat, eisque ad negótium talénta partítur. Post multum vero témporis positúrus ratiónem revértitur: bene operántes pro apportáto lucro remúnerat, servum vero a bono ópere torpéntem damnat.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: |-
          At that time: Jesus spoke this parable to his disciples: A man setting out on a long journey called his servants and delivered to them his goods. And so forth.
      
          A Homily of Saint Gregory the Pope
      - type: citation
        text: Homilia 9 in Evangelia
      - type: text
        text: 'The reading of the holy Gospel, dearest brethren, admonishes us to consider carefully lest we who are seen to have received more than others in this world be judged more severely for it by the Author of the world. For when gifts are increased, the reckoning of the gifts increases as well. Therefore, each one ought to be so much the more humble and prompt in serving God in proportion to the gift he has received, as he sees himself more obligated in giving an account. Behold, the man who goes on a long journey calls his servants and distributes talents among them for their business. But after a long time he returns to settle accounts: he rewards those who have labored well for the profit they bring; but he condemns the servant who has been sluggish in good work.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-c20774e311:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 12:35-40
      - type: text
        text: |-
          At that time, Jesus said unto His disciples: Let your loins be girded about, and your lights burning. And so on.

          Homily by Pope St. Gregory (the Great.)
      - type: citation
        text: 13th on the Gospels.
      - type: text
        text: Dearly beloved brethren, the words of the Holy Gospel, which have just been read, lie open before you, and, lest their very plainness should make them seem to some to be hard, we will go through them with such shortness as that neither may they which understand not remain unenlightened, nor they which understand be wearied. The Lord saith Let your loins be girded about. Now, we gird our loins about, when by continency we master the lustful inclination of the flesh. But, forasmuch as it sufficeth not for a man to abstain from evil deeds, if he strive not to join thereto the earnest doing of good works, it is immediately added And your lights burning. Our lights burn when, by good works, we give bright example to our neighbour; concerning which works the Lord saith Let your light so shine before men, that they may see your good works, and glorify your Father Which is in heaven. (Matth. v. 16.)
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum.
      - type: citation
        text: Matt 19:27-29
      - type: text
        text: |-
          In illo témpore: Dixit Petrus ad Iesum: Ecce nos relíquimus ómnia, et secúti sumus te: quid ergo erit nobis? Et réliqua.

          Homilía sancti Hierónymi Presbýteri.
      - type: citation
        text: Lib. 3. in Matth. cap. 19.
      - type: text
        text: 'Grandis fidúcia! Petrus piscátor erat, dives non fúerat, cibos manu et arte quærébat: et tamen lóquitur confidénter: Relíquimus ómnia. Et quia non súfficit tantum relínquere, iungit quod perféctum est: Et secúti sumus te. Fécimus quod iussísti: quid ígitur nobis dabis prǽmii? Iesus autem dixit illis: Amen dico vobis, quod vos qui secúti estis me, in regeneratióne, cum séderit Fílius hóminis in sede maiestátis suæ, sedébitis et vos super sedes duódecim, iudicántes duódecim tribus Ísraël. Non dixit: Qui reliquístis ómnia; hoc enim et Crates fecit philósophus, et multi álii divítias contempsérunt: sed, Qui secúti estis me: quod próprie Apostolórum est, atque credéntium.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew.
      - type: citation
        text: Matt 19:27-29
      - type: text
        text: |-
          At that time: Peter said to Jesus: Behold, we have left behind all things, and we have followed you. So then, what will be for us? And so forth.
      
          A Homily of Saint Jerome the Priest.
      - type: citation
        text: Lib. 3. in Matth. cap. 19.
      - type: text
        text: 'Great confidence! Peter was a fisherman; he had not been wealthy; he earned his food by hand and by craft. And yet he speaks with confidence: We have left behind all things. And because it is not enough merely to leave things behind, he adds what is perfect: And we have followed you. We have done what you commanded; what reward, then, will you give us? But Jesus said to them: Amen I say to you, that you who have followed me, at the resurrection, when the Son of man shall sit on the seat of his majesty, shall also sit on twelve seats, judging the twelve tribes of Israel. He did not say: Who have left behind all things — for the philosopher Crates also did this, and many others despised riches; but: Who have followed me — which belongs properly to the Apostles and to believers.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-c614cdc9c4:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 14:26-33
      - type: text
        text: |-
          At that time, Jesus said unto the multitudes: If any man come to Me, and hate not his father, and mother, and wife, and children, and brethren, and sisters, yea, and his own life also, he cannot be My disciple. And so on.

          Homily by Pope St Gregory the Great
      - type: citation
        text: Homilia 37th on the Gospels.
      - type: text
        text: Dearly beloved brethren, if we consider what and how great things are promised unto us in heaven, all things which are upon earth grow poor to our mind. For when this world's goods are reckoned against the gladness above, they are found to be a clog rather than an help. This present life being compared to life eternal, ought rather to be called death than life. For what is the daily failing of our corruption but, as it were, a creeping death But what tongue is there that can tell, or what understanding that can comprehend how great is the rejoicing in the city above, where they have part with the choirs of Angels, where they stand with the most blessed spirits before the glory of the Creator, where they see the face of God present, where they behold the Incomprehensible Light, where they have no fear of death, and where they rejoice eternally incorruptible
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 16:13-19
      - type: text
        text: |-
          In illo témpore: Venit Iesus in partes Cæsaréæ Philíppi, et interrogábat discípulos suos, dicens: Quem dicunt hómines esse Fílium hóminis? Et réliqua.

          Homilía sancti Leónis Papæ
      - type: citation
        text: Sermo 2 in anniversario assumpt. suæ, ante medium
      - type: text
        text: 'Cum, sicut evangélica lectióne reserátum est, interrogásset Dóminus discípulos, quem ipsum (multis divérsa opinántibus) créderent; respondissétque beátus Petrus, dicens: Tu es Christus Fílius Dei vivi; Dóminus ait: Beátus es, Simon Bar-Iona, quia caro et sanguis non revelávit tibi, sed Pater meus, qui in cælis est: et ego dico tibi, quia tu es Petrus, et super hanc petram ædificábo Ecclésiam meam, et portæ ínferi non prævalébunt advérsus eam. Et tibi dabo claves regni cælórum: et quodcúmque ligáveris super terram, erit ligátum et in cælis: et quodcúmque sólveris super terram, erit solútum et in cælis. Manet ergo disposítio veritátis, et beátus Petrus, in accépta fortitúdine petræ persevérans, suscépta Ecclésiæ gubernácula non relíquit.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Matthew
      - type: citation
        text: Matt 16:13-19
      - type: text
        text: |-
          At that time: Jesus came into the parts of Caesarea Philippi, and he questioned his disciples, saying: Who do men say that the Son of man is? And so forth.
      
          A Homily of Saint Leo the Pope
      - type: citation
        text: Sermo 2 in anniversario assumpt. suæ, ante medium
      - type: text
        text: 'When, as is revealed by the Gospel reading, the Lord had asked the disciples who — with many holding different opinions — they believed him to be, and blessed Peter had answered saying: You are the Christ, the Son of the living God; the Lord said: Blessed are you, Simon son of Jonah, for flesh and blood has not revealed this to you, but my Father who is in heaven. And I say to you, that you are Peter, and upon this rock I will build my Church, and the gates of Hell shall not prevail against it. And I will give you the keys of the kingdom of heaven; and whatever you shall bind on earth shall be bound in heaven, and whatever you shall release on earth shall be released in heaven. The disposition of truth therefore endures, and blessed Peter, persevering in the strength of the rock he received, has not abandoned the governance of the Church entrusted to him.'
  reading.luc-1-26-28-12031a498a:
    role: reading
    content:
      en:
      - type: citation
        text: Luke 1:26-28
      - type: text
        text: |-
          26 And in the sixth month, the angel Gabriel was sent from God into a city of Galilee, called Nazareth,
          27 To a virgin espoused to a man whose name was Joseph, of the house of David; and the virgin's name was Mary.
          28 And the angel being come in, said unto her: Hail, full of grace, the Lord is with thee: blessed art thou among women.
      la:
      - type: citation
        text: Luc 1:26-28
      - type: text
        text: |-
          26 Missus est Angelus Gabriel a Deo in civitatem Galilaeae, cui nomen Nazareth,
          27 Ad virginem desponsatam viro, cui nomen erat Ioseph, de domo David: et nomen virginis Maria.
          28 Et ingressus Angelus ad eam dixit: Ave gratia plena: Dominus tecum: benedicta tu in mulieribus.
      en2:
      - type: citation
        text: Luc 1:26-28
      - type: text
        text: |-
          26 Then, in the sixth month, the Angel Gabriel was sent by God, to a city of Galilee named Nazareth,
          27 to a virgin betrothed to a man whose name was Joseph, of the house of David; and the name of the virgin was Mary.
          28 And upon entering, the Angel said to her: Hail, full of grace. The Lord is with you. Blessed are you among women.
  reading.luc-1-29-33-7bbaefec43:
    role: reading
    content:
      en:
      - type: citation
        text: Luke 1:29-33
      - type: text
        text: |-
          29 Who having heard, was troubled at his saying, and thought with herself what manner of salutation this should be.
          30 And the angel said to her: Fear not, Mary, for thou hast found grace with God.
          31 Behold thou shalt conceive in thy womb, and shalt bring forth a son; and thou shalt call his name Jesus.
          32 He shall be great, and shall be called the Son of the most High; and the Lord God shall give unto him the throne of David his father; and he shall reign in the house of Jacob for ever.
          33 And of his kingdom there shall be no end.
      la:
      - type: citation
        text: Luc 1:29-33
      - type: text
        text: |-
          29 Quae cum audisset, turbata est in sermone eius, et cogitabat qualis esset ista salutatio.
          30 Et ait Angelus ei: Ne timeas, Maria: invenisti enim gratiam apud Deum:
          31 Ecce concipies in utero, et paries filium, et vocabis nomen eius Iesum:
          32 Hic erit magnus, et Filius Altissimi vocabitur, et dabit illi Dominus Deus sedem David patris eius: et regnabit in domo Iacob in aeternum,
          33 Et regni eius non erit finis.
      en2:
      - type: citation
        text: Luc 1:29-33
      - type: text
        text: |-
          29 And when she had heard this, she was disturbed by his words, and she considered what kind of greeting this might be.
          30 And the Angel said to her: Do not be afraid, Mary, for you have found grace with God.
          31 Behold, you shall conceive in your womb, and you shall bear a son, and you shall call his name: JESUS.
          32 He will be great, and he will be called the Son of the Most High, and the Lord God will give him the throne of David his father.
          33 And his kingdom shall have no end.
  reading.luc-1-34-38-e5707bcaae:
    role: reading
    content:
      en:
      - type: citation
        text: Luke 1:34-38
      - type: text
        text: |-
          34 And Mary said to the angel: How shall this be done, because I know not man?
          35 And the angel answering, said to her: The Holy Ghost shall come upon thee, and the power of the most High shall overshadow thee. And therefore also the Holy which shall be born of thee shall be called the Son of God.
          36 And behold thy cousin Elizabeth, she also hath conceived a son in her old age; and this is the sixth month with her that is called barren:
          37 Because no word shall be impossible with God.
          38 And Mary said: Behold the handmaid of the Lord; be it done to me according to thy word. And the angel departed from her.
      la:
      - type: citation
        text: Luc 1:34-38
      - type: text
        text: |-
          34 Dixit autem Maria ad Angelum: Quomodo fiet istud, quoniam virum non cognosco?
          35 Et respondens Angelus dixit ei: Spiritus Sanctus superveniet in te, et virtus Altissimi obumbrabit tibi. Ideoque et quod nascetur ex te Sanctum, vocabitur Filius Dei.
          36 Et ecce Elisabeth cognata tua, et ipsa concepit filium in senectute sua: et hic mensis sextus est illi, quae vocatur sterilis:
          37 Quia non erit impossibile apud Deum omne verbum.
          38 Dixit autem Maria: Ecce ancilla Domini: fiat mihi secundum verbum tuum.
      en2:
      - type: citation
        text: Luc 1:34-38
      - type: text
        text: |-
          34 Then Mary said to the Angel, How shall this be done, since I do not know man?
          35 And in response, the Angel said to her: The Holy Spirit will pass over you, and the power of the Most High will overshadow you.
          36 And behold, your cousin Elizabeth has herself also conceived a son, in her old age. And this is the sixth month for her who is called barren.
          37 For no word will be impossible with God.
          38 Then Mary said: Behold, I am the handmaid of the Lord. Let it be done to me according to your word.
  reading.magnum-rev-ra-mir-culum-fratres-dilect-ssimi-fui-70dd118006:
    role: reading
    content:
      en:
      - type: text
        text: Dearly beloved brethren, the Blessed Virgin Mary was a great wonder. What thing greater or more famous than she, hath ever at any time been found, or can be found She alone is greater than heaven and earth. What thing holier than she hath been, or can be found? Neither Prophets, nor Apostles, nor Martyrs, nor Patriarchs, nor Angels, nor Thrones, nor Lordships, nor Seraphim, nor Cherubim, nor any other creature, visible or invisible, can be found that is greater or more excellent than she. She is at once the hand-maid and the parent of God, at once virgin and mother.
      la:
      - type: text
        text: Magnum revéra miráculum, fratres dilectíssimi, fuit beáta semper Virgo María. Quid namque illa maius aut illústrius ullo umquam témpore invéntum est, seu aliquándo inveníri póterit? Hæc sola cælum ac terram amplitúdine superávit. Quidnam illa sánctius? Non Prophétæ, non Apóstoli, non Mártyres, non Patriárchæ, non Angeli, non Throni, non Dominatiónes, non Séraphim, non Chérubim; non deníque áliud quidpíam, inter creátas res visíbiles aut invisíbiles, maius aut excelléntius inveníri potest. Eádem ancílla Dei est et mater; eádem Virgo et Génetrix.
      en2:
      - type: text
        text: Truly a great wonder was the blessed ever-Virgin Mary, most beloved brethren. For what greater or more glorious thing has ever at any time been found, or ever could be found? She alone surpassed the breadth of heaven and earth. What is holier than she? Not Prophets, not Apostles, not Martyrs, not Patriarchs, not Angels, not Thrones, not Dominations, not Seraphim, not Cherubim; nor, finally, can any other thing whatsoever, among all created things visible or invisible, be found greater or more excellent. She is at once the handmaid of God and his Mother; at once a Virgin and a Mother.
  reading.modum-ipsum-si-dilig-nter-attendas-non-modo-mite-8b98250d4e:
    role: reading
    content:
      la:
      - type: text
        text: Modum ipsum, si diligénter attendas, non modo mitem, sed et húmilem corde cognosces. Nempe in humilitáte iudícium eius sublatum est, cum nec ad tantas blasphemias, nec ad falsissima, quæ sibi obiiciebantur crímina respónderet. Vídimus, inquit, eum et non erat ei aspectus, nec speciosum forma præ fíliis hóminum, sed oppróbrium hóminum et tamquam leprosum, novissimum virórum, plane virum dolórum a Deo percussum et humiliátum; ita ut nulla esset ei spécies, neque decor. O novissimum et altíssimum! O húmilem et sublimem! Oppróbrium hóminum et glóriam Angelórum! Nemo illo sublimior, neque humilior. Dénique sputis illitus est, oppróbriis saturatus est, morte turpissima condemnátus est, cum sceleratis deputatus est. Nihílque merebitur vel ista humílitas, quæ hunc habet modum; imo quæ tam est ultra modum? Sicut est patiéntia singuláris, sic et humílitas admirábilis; utráque sine exémplo.
      en2:
      - type: text
        text: If you attend carefully to the very manner of it, you will recognize it as not only meek, but also humble of heart. Indeed, his judgment was taken away in humility, since he answered neither the great blasphemies nor the most false charges that were laid against him. We saw him, it says, and he had no appearance, nor beauty beyond the sons of men, but he was the reproach of men and as a leper, the least of men, plainly a man of sorrows struck and humbled by God; so that there was no comeliness in him, nor beauty. O the most lowly and the most exalted! O the humble and the sublime! The reproach of men and the glory of Angels! None more exalted, none more lowly than he. For he was covered with spittle, saturated with reproaches, condemned to a most shameful death, numbered with the wicked. And will this humility merit nothing — this humility that is so moderated; or rather, that so exceeds all measure? As his patience is singular, so also his humility is admirable; each of them beyond all example.
  reading.nec-imm-rito-doct-res-sancti-h-adum-nuncupati-ne-1b019ffd10:
    role: reading
    content:
      en:
      - type: text
        text: Whatsover, therefore, of virtue and grace there may be in this holy people, all the bright streams thereof do flow from him, as from a most clear fountain. By his manly chastity, by his sternly noble temperance, by the graceful courtesy which marked him, he drew all men’s love to God and by his eminent ministry in his Bishopric he hath left behind him in his disciples, many heirs of his priesthood.
      la:
      - type: text
        text: 'Nec immérito Doctóres sancti Hýadum nuncupatióne signántur. Græco quippe elóquio hýetos plúvia vocátur, et Hýades nomen a plúviis accepérunt, quia ortæ procul dúbio imbres ferunt. Bene ergo Hýadum appellatióne expréssi sunt, qui, ad statum universális Ecclésiæ quasi in cæli fáciem dedúcti, super aréntem terram humáni péctoris, sanctæ prædicatiónis imbres fudérunt. Si enim prædicatiónis sermo plúvia non esset, Móyses mínime dixísset: Exspectétur sicut plúvia elóquium meum; et nequáquam per Isaíam Véritas díceret: Mandábo núbibus meis, ne pluant super eam imbrem; atque hoc, quod paulo ante protúlimus: Quam ob rem prohíbitæ sunt stellæ pluviárum.'
      en2:
      - type: text
        text: 'Not without reason are the holy Doctors designated by the name of the Hyades. For in the Greek tongue, hyetos means rain, and the Hyades received their name from rain, because when they rise they undoubtedly bring showers. Well, then, were they expressed by the name of the Hyades, those who, set in the face of the sky, as it were, for the good of the universal Church, poured down upon the parched earth of the human breast the rains of holy preaching. For if the word of preaching were not rain, Moses would never have said: Let my eloquence be awaited as rain; nor would Truth have said through Isaiah: I will command my clouds that they rain no rain upon it; nor yet what we quoted a little earlier: For this reason the stars of the rain have been restrained.'
  reading.nec-imm-rito-doct-res-sancti-h-adum-nuncupati-ne-34e933241d:
    role: reading
    content:
      en:
      - type: text
        text: Here there are sicknesses, here there are strivings, here there are untimely deaths, here there are lies, here there are jealousies, here there are troubles, here there is anger, here there are lustings, here there are pit-falls unnumbered, here there are daily cares, here one evil followeth after another, and all bring vexation. And yet Paul hath it that even here a man may rejoice evermore, if he will but raise his head above the flood of earthly things, and order his life aright. How much better shall we fare when we have passed away from all these things, and all these things are taken away from us, when we shall have no illhealth, nor disease, nor matter wherein to sin, when that hard thing, right of property, shall exist no more, whereby all unrighteousness cometh into this life, and strifes unnumbered are begotten.
