  reading.sermo-sancti-augustini-episcopi-daeb8fd9c4:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St. Augustine, Bishop (of Hippo.)
      - type: citation
        text: 252nd for the Season.
      - type: text
        text: 'Dearly beloved brethren, as often as we keep the Dedication-Feast of some Altar or Church, if we think faithfully and carefully, and live holily and righteously, that which is done in temples made with hands, is done in our soul by a spiritual building. He at the Dedication of the Temple. lied not who said: The temple of God is holy; which temple ye are (i Cor. iii. 17,) and again: Know ye not that your body is the temple of the Holy Ghost, Which is in you, (vi. 19.) And therefore, dearly beloved brethren, since by the grace of God, without any foregoing deserts of our own, we have been made meet to become the Temple of God, let us work as hard as we can, with His help, that our Lord may not find in His Temple, that is, in us, anything to offend the eyes of His Majesty.'
      la:
      - type: text
        text: Sermo sancti Augustini Episcopi
      - type: citation
        text: Sermo 252 de Tempore
      - type: text
        text: 'Quotiescúmque, fratres caríssimi, altáris vel templi festivitátem cólimus, si fidéliter ac diligénter atténdimus et sancte ac iuste vívimus, quidquid in templis manufáctis ágitur, totum in nobis spiritáli ædificatióne complétur. Non enim mentítus est ille qui dixit: Templum enim Dei sanctum est, quod estis vos; et íterum: Nescitis quia córpora vestra templum sunt Spíritus Sancti, qui in vobis est? Et ideo, fratres caríssimi, quia, nullis præcedéntibus méritis, per grátiam Dei merúimus fíeri templum Dei, quantum possumus cum ipsíus adiutório labóremus, ne Dóminus noster in templo suo, hoc est, in nobis ipsis, invéniat quod óculos suæ maiestátis offéndat.'
      en2:
      - type: text
        text: Sermon of Saint Augustine, Bishop
      - type: citation
        text: Sermo 252 de Tempore
      - type: text
        text: 'As often as we celebrate, dearest brethren, the feast of an altar or a church, if we attend faithfully and diligently, and live holy and just lives, whatever is done in temples made by hand is fulfilled entirely in us through spiritual edification. For he did not lie who said: The temple of God is holy, which you are; and again: Do you not know that your bodies are the temple of the Holy Spirit, who is in you? And therefore, dearest brethren, because we have merited by no preceding merits, through the grace of God, to become the temple of God, let us labor as much as we are able, with his help, lest our Lord find in his temple — that is, in ourselves — anything that offends the eyes of his majesty.'
  reading.sermo-sancti-bern-rdi-abb-tis-09044765f4:
    role: reading
    content:
      la:
      - type: text
        text: Sermo sancti Bernárdi Abbátis
      - type: citation
        text: Feria 4. Hebdom. S. Serm. de Passione Domini
      - type: text
        text: |-
          In passióne domínica, fratres, tria specialiter convénit intuéri: opus, modum, causam. Nam in ópere quidem patiéntia, in modo humílitas, in causa cáritas commendatur. Patiéntia autem singuláris, quod vidélicet: cum supra dorsum eius fabricarent peccatóres; cum sic extenderetur in ligno, ut dinumerarentur ómnia ossa eius; cum fortíssimum illud propugnaculum, quod custódit Israël, lindique foraretur; cum foderéntur manus eius et pedes, sicut agnus ad occisionem ductus sit et tamquam ovis coram tondénte non apéruit os suum. Non advérsus Patrem
          murmurans, a quo missus fúerat; non advérsus humánum genus, pro quo, quæ non rapuit, exsolvebat; non dénique vel contra pópulum ipsum peculiárem sibi, a quo pro tantis benefíciis tanta mala recipiebat.
      en2:
      - type: text
        text: Sermon of Saint Bernard, Abbot
      - type: citation
        text: Feria 4. Hebdom. S. Serm. de Passione Domini
      - type: text
        text: 'In the Lord''s Passion, brethren, three things are especially fitting to contemplate: the work, the manner, and the cause. For in the work patience is commended, in the manner humility, and in the cause charity. And the patience is singular: for while sinners built upon his back; while he was so stretched out upon the wood that all his bones could be numbered; while that most strong bulwark, which guards Israel, was pierced on every side; while his hands and feet were bored through — as a lamb he was led to the slaughter, and as a sheep before its shearer he did not open his mouth. Not murmuring against the Father, by whom he had been sent; not against the human race, for whom he was paying what he had not taken; not even against that people especially his own, from whom in return for such great benefits he received such great evils.'
  reading.sermo-sancti-bern-rdi-abb-tis-a36db5b576:
    role: reading
    content:
      la:
      - type: text
        text: Sermo sancti Bernárdi Abbátis
      - type: citation
        text: Homil. 2 super Missus
      - type: text
        text: 'Desponsáta est María Ioseph, vel potius (sicut ponit Evangelista) viro, cui nomen erat Ioseph: virum nominat, non quia maritus, sed quod homo virtútis erat: vel potius quia iuxta alium Evangelístam, non vir simpliciter, sed vir eius dictus est, merito appellatur, quod necessario putatur. Debuit ergo vir eius appellari, quia necesse fuit et putari: sicut et pater Salvatoris non quidem esse, sed dici meruit, ut putaretur esse, dicente hoc ipso Evangelista: Et ipse Iesus erat incipiens quasi annorum triginta, ut putabcitur, filius Ioseph.'
      en2:
      - type: text
        text: Sermon of Saint Bernard, Abbot
      - type: citation
        text: Homil. 2 super Missus
      - type: text
        text: 'Mary was betrothed to Joseph, or rather (as the Evangelist states) to a man whose name was Joseph: he calls him a man, not because he was a husband, but because he was a man of virtue; or rather, because according to another Evangelist, he was called not simply a man, but her man, he is rightly so named, for the reason that this was necessarily supposed. He was therefore to be called her man because it was necessary that he be supposed to be such: just as he merited not indeed to be the father of the Savior, but to be called so — to be supposed to be so — as that same Evangelist says: And Jesus himself was beginning to be about thirty years of age, as was supposed, the son of Joseph.'
  reading.sermo-sancti-greg-rii-pap-818407a06a:
    role: reading
    content:
      en:
      - type: text
        text: Sermon of St. Gregory, Pope
      - type: citation
        text: Sermon 30 on the Gospels
      - type: text
        text: 'It is written: By His Spirit the Lord hath adorned the heavens. (Job xxvi. 13.) Now the ornament of the heavens are the godly powers of preachers, and this ornament, what it is, Paul teacheth us thus To one is given by the Spirit the word of wisdom, to another the word of knowledge by the same Spirit; to another faith by the same Spirit; to another the gifts of healing by the same Spirit, to another the working of miracles, to another prophecy, to another discerning of spirits, to another diverse kinds of tongues, to another the interpretation of tongues. But all these worketh that one and the self-same Spirit, dividing to every man severally as He will. (1 Cor. xii. 8.)'
      la:
      - type: text
        text: Sermo sancti Gregórii Papæ
      - type: citation
        text: Homilia 30 in Evangelia, post medium
      - type: text
        text: 'Scriptum est: Spíritus Dómini ornávit cælos. Ornaménta enim cælórum sunt virtútes prædicántium. Quæ vidélicet ornaménta Paulus enúmerat, dicens: Álii datur per Spíritum sermo sapiéntiæ, álii sermo sciéntiæ secúndum eúndem Spíritum, álteri fides in eódem Spíritu, álii grátia sanitátum in uno Spíritu, álii operátio virtútum, álii prophetía, álii discrétio spirítuum, álii génera linguárum, álii interpretátio sermónum. Hæc autem ómnia operátur unus atque idem Spíritus, dívidens síngulis prout vult.'
      en2:
      - type: text
        text: Sermon of Saint Gregory the Pope
      - type: citation
        text: Homilia 30 in Evangelia, post medium
      - type: text
        text: 'It is written: The Spirit of the Lord adorned the heavens. For the adornments of the heavens are the virtues of those who preach. These adornments Paul enumerates, saying: To one is given through the Spirit the word of wisdom, to another the word of knowledge according to the same Spirit, to another faith in the same Spirit, to another the grace of healing in the one Spirit, to another the working of mighty deeds, to another prophecy, to another the discernment of spirits, to another various kinds of tongues, to another the interpretation of utterances. But all these things are wrought by one and the same Spirit, distributing to each one as he wills.'
  reading.sermo-sancti-io-nnis-chrys-stomi-328c32eb50:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St. John Chrysostom, Patriarch (of Constantinople.)
      - type: citation
        text: On St Philogonius, Tom. iii.
      - type: text
        text: 'The blessed N., whose Feast we are this day keeping, doth justly call on our tongue to tell what great deeds he wrought. To-day did that blessed servant of God pass into that higher life, which is a life of peace, a life where there is no trouble. To-day his ship reached that harbour whereafter wreck is to be dreaded no more. He hath felt trouble and anguish of spirit for the last time. And wherefore marvel we that that place is one where the mind is vexed no more, when we remember that Paul saith, even to men living here in this life: Rejoice evermore, pray without ceasing? (1 Thess. v. 16, 17.)'
      la:
      - type: text
        text: Sermo sancti Ioánnis Chrysóstomi
      - type: citation
        text: In Orat. de S. Philogonio
      - type: text
        text: 'Beatórum N. et N. dies, quórum festivitátem celebrámus, ad ipsiórum recte factórum enarrationem línguam nostram evocavit. Síquidem hódie beátus iste ad tranquillam, omnísque perturbationis expertem vitam tránsiit: eóque navigium áppulit, ubi deínceps non póterit metuere naufragium, nec ullam ánimi perturbationem, aut dolórem. Et quid mirum est, si locus ille purus est ab omni molestia ánimi, cum Paulus homínibus adhuc in hac vita degentibus loquens dicat: Semper gaudéte, sine intermissióne orate?'
      en2:
      - type: text
        text: Sermon of Saint John Chrysostom
      - type: citation
        text: In Orat. de S. Philogonio
      - type: text
        text: 'The feast-day of the blessed N. and N., whose solemnity we celebrate, has called our tongue to the recounting of their righteous deeds. For today this blessed one passed over to the tranquil life, free from all disturbance; and his vessel arrived at harbor where he need no longer fear shipwreck, nor any disturbance of soul, nor sorrow. And what wonder is it that that place is free from all affliction of soul, when Paul, speaking to men still living this present life, says: Rejoice always, pray without ceasing?'
  reading.sermo-sancti-io-nnis-chrys-stomi-3d858823ae:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St John Chrysostom, Patriarch of Constantinople.
      - type: citation
        text: Found in Metaphrastes.
      - type: text
        text: That is wealth, not a woman of substance, but that blessed maiden whose soul was bright with grace. It was because Blessed Mary had preserved a superhuman chastity, that she conceived the Lord Jesus Christ in her womb. Let us then fly to the most holy maiden, who is Mother of God, that we may gain the help of her patronage. Yea, all ye that be virgins, whosoever ye be, run to the Mother of the Lord. She will keep for you by her protection your most beautiful, your most precious, and your most enduring possession.
      la:
      - type: text
        text: Sermo sancti Ioánnis Chrysóstomi
      - type: citation
        text: Apud Metaphrasten
      - type: text
        text: Dei Fílius non dívitem aut locuplétem áliquam féminam sibi matrem elégit, sed beátam Vírginem illam, cuius ánima virtútibus ornáta erat. Cum enim beáta María supra omnem humánam natúram castitátem serváret, proptérea Christum Dóminum in ventre concépit. Ad hanc ígitur sanctíssimam Vírginem et Dei Matrem accurréntes, eius patrocínii utilitátem assequámur. Itaque, quæcúmque estis vírgines, ad Matrem Dómini confúgite; illa enim pulchérrimam, pretiosíssimam et incorruptíbilem possessiónem, patrocínio suo, vobis conservábit.
      en2:
      - type: text
        text: Sermon of Saint John Chrysostom
      - type: citation
        text: Apud Metaphrasten
      - type: text
        text: The Son of God chose not a wealthy or affluent woman as his mother, but that blessed Virgin whose soul was adorned with virtues. For because blessed Mary preserved chastity beyond all human nature, she therefore conceived Christ the Lord in her womb. Let us therefore hasten to this most holy Virgin and Mother of God, and obtain the benefit of her patronage. And so, whatever of you are virgins, flee to the Mother of the Lord; for she will preserve for you, through her patronage, that most beautiful, most precious, and incorruptible possession.
  reading.sermo-sancti-io-nnis-chrys-stomi-c5ca8e3a5c:
    role: reading
    content:
      en:
      - type: text
        text: From the Sermons of St. John Chrysostom, Patriarch (of Constantinople.)
      - type: citation
        text: On St Philogonius, Tom. iii.
      - type: text
        text: 'The blessed N., whose Feast we are this day keeping, doth justly call on our tongue to tell what great deeds he wrought. To-day did that blessed servant of God pass into that higher life, which is a life of peace, a life where there is no trouble. To-day his ship reached that harbour whereafter wreck is to be dreaded no more. He hath felt trouble and anguish of spirit for the last time. And wherefore marvel we that that place is one where the mind is vexed no more, when we remember that Paul saith, even to men living here in this life: Rejoice evermore, pray without ceasing? (1 Thess. v. 16, 17.)'
      la:
      - type: text
        text: Sermo sancti Ioánnis Chrysóstomi
      - type: citation
