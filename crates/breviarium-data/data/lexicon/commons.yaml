  responsory.hon-stum-fecit-illum-d-minus-et-custod-vit-eum-a-1ffd6632f4:
    role: responsory
    content:
      en:
      - type: response
        text: The Lord made him honourable, and defended him from his enemies, and kept him safe from those that lay in wait for him,
      - type: text
        text: '* And gave him perpetual glory.'
      - type: versicle
        text: He went down with him into the pit, and left him not in bonds.
      - type: response
        text: And gave him perpetual glory.
      la:
      - type: response
        text: 'Honéstum fecit illum Dóminus, et custodívit eum ab inimícis, et a seductóribus tutávit illum:'
      - type: text
        text: '* Et dedit illi claritátem ætérnam.'
      - type: versicle
        text: Descendítque cum illo in fóveam, et in vínculis non derelíquit eum.
      - type: response
        text: Et dedit illi claritátem ætérnam.
  responsory.hon-stum-fecit-illum-d-minus-et-custod-vit-eum-a-427e57b3e7:
    role: responsory
