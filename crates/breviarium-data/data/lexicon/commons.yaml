      la:
      - type: text
        text: 'Pergit deínde eódem præceptórum et intelligéntiæ decúrsu. Nam, posteáquam relinquénda ómnia, quæ in sæculo caríssima sunt, imperáverat, adiécit: Qui non áccipit crucem suam, et séquitur me, non est me dignus; quia Qui Christi sunt, crucifixérunt corpus cum vítiis et concupiscéntia. Et indígnus est Christo, qui non crucem suam, in qua compátimur, commórimur, consepelímur, conresúrgimus, accípiens, Dóminum sit secúrus, in hoc sacraménto fídei, spíritus novitáte victúrus.'
