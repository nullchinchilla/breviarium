  reading.de-libro-ecclesi-stici-ea32a7c655:
    role: reading
    content:
      la:
      - type: text
        text: De libro Ecclesiástici
      - type: citation
        text: Sir 51:1-7
      - type: text
        text: |-
          1 Confitébor tibi, Dómine, Rex, et collaudábo te Deum Salvatórem meum.
          2 Confitébor nómini tuo: quóniam adiútor et protéctor factus es mihi,
          3 et liberásti corpus meum a perditióne, a láqueo linguæ iníquæ et a lábiis operántium mendácium, et in conspéctu astántium factus es mihi adiútor.
          4 Et liberásti me secúndum multitúdinem misericórdiæ nóminis tui a rugiéntibus, præparátis ad escam:
          5 de mánibus quæréntium ánimam meam, et de portis tribulatiónum, quæ circumdedérunt me;
          6 a pressúra flammæ, quæ circúmdedit me, et in médio ignis non sum æstuáta;
          7 de altitúdine ventris ínferi, et a lingua coinquináta, et a verbo mendácii, a rege iníquo, et a lingua iniústa.
      en2:
      - type: text
        text: From the Book of Sirach
      - type: citation
        text: Sir 51:1-7
      - type: text
        text: |-
          1 I will confess to you, O Lord and King, and I will give praise to you, O God my Saviour.
          2 I will acknowledge your name. For you have been my Helper and Protector.
          3 And you have freed my body from perdition, from the snare of the iniquitous tongue, and from the lips of those who forge lies, and in the sight of those standing by you have been my helper.
          4 And you have freed me according to the multitude of the mercy of your name: from those who roared and prepared to devour,
          5 from the hands of those who sought my life, and from the gates of tribulation that surrounded me,
          6 from the oppression of the flames that surrounded me, and I was not burned in the midst of the fire,
          7 from the depths of the bowels of hell, and from the defiled tongue, and from lying words, from an iniquitous king, and from an unjust tongue.
