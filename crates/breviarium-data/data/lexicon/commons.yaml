  reading.ecce-enim-binos-ad-pr-dic-ndum-disc-pulos-d-minu-ad20e93abc:
    role: reading
    content:
      en:
      - type: text
        text: Behold, the Lord sendeth forth His disciples to preach by two and two and thus doing, He doth silently teach us that whosoever loveth not his neighbour, such a one it behoveth not to take upon him the office of a preacher. Well also is it said that He sent them before His face into every city and place whither He Himself would come. The Lord followeth His preachers first cometh preaching, and then the Lord Himself cometh to the house of our mind, whither the word of exhortation hath come before and so cometh the truth into our mind.
      la:
      - type: text
        text: 'Ecce enim binos ad prædicándum discípulos Dóminus mittit: quátenus hoc nobis tácitus ínnuat, quia qui caritátem erga álterum non habet, prædicatiónis offícium suscípere nullátenus debet. Bene autem dícitur, quia misit eos ante fáciem suam in omnem civitátem et locum, quo erat ipse ventúrus. Prædicatóres enim suos Dóminus séquitur: quia prædicátio prǽvenit, et tunc ad mentis nostræ habitáculum Dóminus venit, quando verba exhortatiónis præcúrrunt: atque per hoc véritas in mente suscípitur.'
      en2:
      - type: text
        text: 'Behold, the Lord sends out his disciples two by two to preach: that by this he may silently indicate to us that whoever has no charity toward another ought by no means to take up the office of preaching. And it is well said that he sent them before his face into every town and place where he himself was about to come. For the Lord follows his preachers: because preaching goes before, and then the Lord comes to the dwelling of our heart when the words of exhortation have run ahead; and thus truth is received into the mind.'
  reading.ecce-enim-binos-ad-pr-dic-ndum-disc-pulos-d-minu-b90efa02ca:
    role: reading
    content:
      en:
      - type: text
        text: In the regeneration, when the Son of Man shall sit in the throne of His glory, and when the dead shall rise again from corruption incorruptible, (i Cor. xv. 53,) ye also shall sit upon twelve thrones of judgment, condemning the twelve tribes of Israel, because, when ye believed in Me, they would not. (John iii. 18.) And every one that hath forsaken houses, or brethren, or sisters, or father, or mother, or wife, or children, or lands, for My Name's sake, shall receive an hundredfold, and shall inherit everlasting life. This place agreeth well with that other where the Saviour saith I came not to send peace, but a sword. For I am come to set a man at variance against his father, and the daughter against her mother, and the daughter-in-law against her mother-in-law; and a man's foes shall be they of his own household. (Matth. x. 34.) Every one, therefore, that hath set no store by affection, and riches, and the pleasures of the world, for Christ's faith's sake, and the preaching of the Gospel, shall receive an hundred-fold, and shall inherit everlasting life.
