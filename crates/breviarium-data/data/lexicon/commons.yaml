  responsory.d-mine-quando-v-neris-iudic-re-terram-ubi-me-abs-cb2ec493db:
    role: responsory
    content:
      en:
      - type: response
        text: Lord, when Thou comest to judge the earth, where shall I hide myself from the face of thy wrath?
      - type: text
        text: For I have sinned greatly in my life.
      - type: versicle
        text: I dread my sins, I blush before thee I see the great tribunal set! In fear and terror I implore thee, Forgive when soul and Judge are met!
      - type: response
        text: For I have sinned greatly in my life.
      - type: versicle
        text: Eternal rest * grant unto them, O Lord.
      - type: response
        text: And let perpetual light * shine upon them.
      - type: response
        text: For I have sinned greatly in my life.
      la:
      - type: response
        text: Dómine, quando véneris iudicáre terram, ubi me abscóndam a vultu iræ tuæ?
      - type: text
        text: Quia peccávi nimis in vita mea.
      - type: versicle
        text: 'Commíssa mea pavésco, et ante te erubésco: dum véneris iudicáre, noli me condemnáre.'
      - type: response
        text: Quia peccávi nimis in vita mea.
      - type: versicle
        text: Réquiem ætérnam * dona eis, Dómine.
      - type: response
        text: Et lux perpétua * lúceat eis.
      - type: response
        text: Quia peccávi nimis in vita mea.
      en2:
      - type: response
        text: Lord, when you come to judge the earth, where shall I hide from the face of your wrath?
      - type: text
        text: For I have sinned exceedingly in my life.
      - type: versicle
        text: 'I tremble at my transgressions, and I blush before you: when you come to judge, do not condemn me.'
      - type: response
        text: For I have sinned exceedingly in my life.
      - type: versicle
        text: Eternal rest * grant unto them, O Lord.
      - type: response
        text: And let perpetual light * shine upon them.
      - type: response
        text: For I have sinned exceedingly in my life.
  responsory.d-mine-sec-ndum-actum-meum-noli-me-iudic-re-nihi-f686384c51:
    role: responsory
    content:
      en:
      - type: response
        text: O Lord, judge me not according to my works; for I have done nothing that can be counted in respect of thee. I beseech thy majesty therefore, that thou wouldest
      - type: text
        text: Blot out my transgressions, O God.
      - type: versicle
        text: Lord, wash me thoroughly from mine iniquity and cleanse me from my sin.
      - type: response
        text: Blot out my transgressions, O God.
      la:
      - type: response
        text: 'Dómine, secúndum actum meum noli me iudicáre: nihil dignum in conspéctu tuo egi; ídeo déprecor maiestátem tuam,'
      - type: text
        text: Ut tu, Deus, déleas iniquitátem meam.
      - type: versicle
        text: Amplius lava me, Dómine, ab iniustítia mea, et a delícto meo munda me.
      - type: response
        text: Ut tu, Deus, déleas iniquitátem meam.
      en2:
      - type: response
        text: 'Lord, judge me not according to my deeds: I have done nothing worthy in your sight; therefore I implore your majesty,'
      - type: text
        text: That you, O God, would blot out my iniquity.
      - type: versicle
        text: Wash me yet more, O Lord, from my injustice, and cleanse me from my sin.
      - type: response
        text: That you, O God, would blot out my iniquity.
  responsory.ded-sti-mihi-protecti-nem-sal-tis-tu-et-d-xtera-388d4cf9da:
    role: responsory
    content:
      en:
      - type: response
        text: Thou hast given me the shield of thy salvation, and thy right hand hath holden me up.
      - type: text
        text: My buckler, and the horn of my salvation, and my refuge. Alleluia.
      - type: versicle
        text: I am thy shield and thy exceeding great reward.
      - type: response
        text: My buckler, and the horn of my salvation, and my refuge. Alleluia.
      la:
      - type: response
        text: 'Dedísti mihi protectiónem salútis tuæ, et déxtera tua suscépit me:'
      - type: text
        text: Protéctor meus, et cornu salútis meæ, et suscéptor meus, allelúia.
      - type: versicle
        text: Ego protéctor tuus sum, et merces tua magna nimis.
      - type: response
        text: Protéctor meus, et cornu salútis meæ, et suscéptor meus, allelúia.
      en2:
      - type: response
        text: 'You have given me the protection of your salvation, and your right hand has upheld me:'
      - type: text
        text: My protector, and the horn of my salvation, and my upholder, alleluia.
      - type: versicle
        text: I am your protector, and your reward is exceedingly great.
      - type: response
        text: My protector, and the horn of my salvation, and my upholder, alleluia.
  responsory.desid-rium-nim-eius-tribu-sti-ei-d-mine-7b25bf8c9f:
    role: responsory
    content:
      la:
      - type: response
        text: Desidérium ánimæ eius tribuísti ei Dómine,
      - type: text
        text: Et voluntáte labiórum eius non fraudásti eum.
      - type: versicle
        text: 'Quóniam prævenísti eum in benedictiónibus dulcédinis: posuísti in cápite eius corónam de lápide pretióso.'
      - type: response
        text: Et voluntáte labiórum eius non fraudásti eum.
      en2:
      - type: response
        text: The desire of his soul you have granted him, O Lord,
      - type: text
        text: And you have not withheld the request of his lips.
      - type: versicle
        text: 'For you came before him with blessings of sweetness: you placed upon his head a crown of precious stone.'
      - type: response
        text: And you have not withheld the request of his lips.
  responsory.desid-rium-nim-eius-tribu-sti-ei-d-mine-c28510fd17:
    role: responsory
    content:
      en:
      - type: response
        text: Lord, Thou hast given him his heart's desire.
      - type: text
        text: And hast not withholden the request of his lips.
      - type: versicle
        text: 'For Thou hast prevented him with the blessings of sweetness: Thou hast set a crown of precious stones upon his head.'
      - type: response
        text: And hast not withholden the request of his lips.
      la:
      - type: response
        text: Desidérium ánimæ eius tribuísti ei Dómine,
      - type: text
        text: Et voluntáte labiórum eius non fraudásti eum.
      - type: versicle
        text: 'Quóniam prævenísti eum in benedictiónibus dulcédinis: posuísti in cápite eius corónam de lápide pretióso.'
      - type: response
        text: Et voluntáte labiórum eius non fraudásti eum.
      en2:
      - type: response
        text: The desire of his soul you have granted him, O Lord,
      - type: text
        text: And you have not withheld the request of his lips.
      - type: versicle
        text: 'For you came before him with blessings of sweetness: you placed upon his head a crown of precious stone.'
      - type: response
        text: And you have not withheld the request of his lips.
  responsory.diff-sa-est-gr-tia-in-l-biis-tuis-1c629f63a0:
    role: responsory
    content:
      en:
      - type: response
        text: Grace is poured into thy lips, therefore;
      - type: text
        text: God hath blessed thee for ever.
      - type: versicle
        text: In thy comeliness and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: God hath blessed thee for ever.
      la:
      - type: response
        text: Diffúsa est grátia in lábiis tuis,
      - type: text
        text: Proptérea benedíxit te Deus in ætérnum.
      - type: versicle
        text: Spécie tua et pulchritúdine tua inténde, próspere procéde, et regna.
      - type: response
        text: Proptérea benedíxit te Deus in ætérnum.
      en2:
      - type: response
        text: Grace is poured forth upon your lips,
      - type: text
        text: Therefore God has blessed you for ever.
      - type: versicle
        text: In your beauty and in your splendor, set out, advance in triumph, and reign.
      - type: response
        text: Therefore God has blessed you for ever.
  responsory.dilex-sti-iust-tiam-et-od-sti-iniquit-tem-926e8f7da5:
    role: responsory
    content:
      en:
      - type: response
        text: Thou hast loved righteousness, and hated iniquity;
      - type: text
        text: Therefore God, thy God, hath anointed thee with the oil of gladness.
      - type: versicle
        text: Because of truth, and meekness, and righteousness.
      - type: response
        text: Therefore God, thy God, hath anointed thee with the oil of gladness.
      la:
      - type: response
        text: 'Dilexísti iustítiam, et odísti iniquitátem:'
      - type: text
        text: Proptérea unxit te Deus, Deus tuus, óleo lætítiæ.
      - type: versicle
        text: Propter veritátem, et mansuetúdinem, et iustítiam.
      - type: response
        text: Proptérea unxit te Deus, Deus tuus, óleo lætítiæ.
      en2:
      - type: response
        text: 'You have loved justice, and hated iniquity:'
      - type: text
        text: Therefore God, your God, has anointed you with the oil of gladness.
      - type: versicle
        text: For the sake of truth, and meekness, and justice.
      - type: response
        text: Therefore God, your God, has anointed you with the oil of gladness.
  responsory.domus-mea-domus-orati-nis-voc-bitur-dicit-d-minu-289fdf208a:
    role: responsory
    content:
      en:
      - type: response
        text: My house shall be called the house of prayer, saith the Lord. Therein, he that asketh, receiveth; he that seeketh, findeth;
      - type: text
        text: And to him that knocketh, it shall be opened.
      - type: versicle
        text: Ask, and ye shall receive; seek, and ye shall find.
      - type: response
        text: And to him that knocketh, it shall be opened.
      la:
      - type: response
        text: 'Domus mea, domus oratiónis vocábitur, dicit Dóminus: in ea omnis qui petit, áccipit; et qui quærit, ínvenit;'
      - type: text
        text: Et pulsánti aperiétur.
      - type: versicle
        text: Pétite, et accipiétis; quǽrite, et inveniétis.
      - type: response
        text: Et pulsánti aperiétur.
      en2:
      - type: response
        text: 'My house shall be called a house of prayer, says the Lord: in it everyone who asks receives; and he who seeks finds;'
      - type: text
        text: And to him who knocks it shall be opened.
      - type: versicle
        text: Ask, and you shall receive; seek, and you shall find.
      - type: response
        text: And to him who knocks it shall be opened.
  responsory.dum-stet-ritis-ante-reges-et-pr-sides-nol-te-cog-e3b02b42c2:
    role: responsory
    content:
      en:
      - type: response
        text: 'But when they shall deliver you up to the judges, take no thought how or what to speak:'
      - type: text
        text: 'for it shall be given you in that hour what to speak:'
      - type: versicle
        text: For it is not you that speak, but the spirit of your Father that speaketh in you.
      - type: response
        text: For it shall be given you in that hour what to speak.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: For it shall be given you in that hour what to speak.
      la:
      - type: response
        text: 'Dum stetéritis ante reges et prǽsides, nolíte cogitáre quómodo aut quid loquámini:'
      - type: text
        text: Dábitur enim vobis in illa hora, quid loquámini.
      - type: versicle
        text: 'Non enim vos estis qui loquímini: sed Spíritus Patris vestri, qui lóquitur in vobis.'
      - type: response
        text: Dábitur enim vobis in illa hora, quid loquámini.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Dábitur enim vobis in illa hora, quid loquámini.
      en2:
      - type: response
        text: 'When you stand before kings and governors, do not think about how or what you are to speak:'
      - type: text
        text: For it shall be given to you in that hour what you are to speak.
      - type: versicle
        text: For it is not you who speak, but the Spirit of your Father, who speaks in you.
      - type: response
        text: For it shall be given to you in that hour what you are to speak.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: For it shall be given to you in that hour what you are to speak.
  responsory.ecce-ego-mitto-vos-sicut-oves-in-m-dio-lup-rum-d-7375f6354c:
    role: responsory
    content:
      en:
      - type: response
        text: 'Behold, I send you as sheep in the midst of wolves, said the Lord:'
      - type: text
        text: Be ye, therefore, wise as serpents and simple as doves.
      - type: versicle
        text: Whilst you have the light, believe in the light, that you may be the children of light.
      - type: response
        text: Be ye therefore wise as serpents and simple as doves.
      la:
      - type: response
        text: 'Ecce ego mitto vos sicut oves in médio lupórum, dicit Dóminus:'
      - type: text
        text: Estóte ergo prudéntes sicut serpéntes, et símplices sicut colúmbæ.
      - type: versicle
        text: Dum lucem habétis, crédite in lucem, ut fílii lucis sitis.
      - type: response
        text: Estóte ergo prudéntes sicut serpéntes, et símplices sicut colúmbæ.
      en2:
      - type: response
        text: 'Behold, I send you as sheep in the midst of wolves, says the Lord:'
      - type: text
        text: Be therefore wise as serpents, and simple as doves.
      - type: versicle
        text: While you have the light, believe in the light, that you may be children of light.
      - type: response
        text: Be therefore wise as serpents, and simple as doves.
  responsory.ecce-sac-rdos-magnus-qui-in-di-bus-suis-pl-cuit-3f9f251f79:
    role: responsory
    content:
      en:
      - type: response
        text: Behold an high priest, who in his days pleased God
      - type: text
        text: Therefore the Lord assured him by an oath that He would multiply his seed among His people.
      - type: versicle
        text: He hath made him a blessing unto all nations, and hath established His covenant upon his head.
      - type: response
        text: Therefore the Lord assured him by an oath that He would multiply his seed among His people
      la:
      - type: response
        text: 'Ecce sacérdos magnus, qui in diébus suis plácuit Deo:'
      - type: text
        text: Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.
      - type: versicle
        text: Benedictiónem ómnium géntium dedit illi, et testaméntum suum confirmávit super caput eius.
      - type: response
        text: Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.
      en2:
      - type: response
        text: 'Behold the great Priest, who in his days pleased God:'
      - type: text
        text: Therefore the Lord swore with an oath to make him grow great among his people.
      - type: versicle
        text: He gave him the blessing of all nations, and confirmed his covenant upon his head.
      - type: response
        text: Therefore the Lord swore with an oath to make him grow great among his people.
  responsory.ecce-sac-rdos-magnus-qui-in-di-bus-suis-pl-cuit-b632f47c7f:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ecce sacérdos magnus, qui in diébus suis plácuit Deo:'
      - type: text
        text: Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.
      - type: versicle
        text: Benedictiónem ómnium géntium dedit illi, et testaméntum suum confirmávit super caput eius.
      - type: response
        text: Ideo iureiurándo fecit illum Dóminus créscere in plebem suam.
      en2:
      - type: response
        text: 'Behold the great Priest, who in his days pleased God:'
      - type: text
        text: Therefore the Lord swore with an oath to make him grow great among his people.
      - type: versicle
        text: He gave him the blessing of all nations, and confirmed his covenant upon his head.
      - type: response
        text: Therefore the Lord swore with an oath to make him grow great among his people.
  responsory.ego-ante-te-ap-rui-mare-0bd9155a62:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego ante te apérui mare:'
      - type: text
        text: |-
          Et tu aperuísti láncea latus Salvatori tuo,
          Qui redémit mundum in sánguine suo.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu aperuísti láncea latus Salvatori tuo.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Qui redémit mundum in sánguine suo.
      en2:
      - type: response
        text: 'I opened the sea before you:'
      - type: text
        text: |-
          And you opened with a lance the side of your Savior,
          Who redeemed the world in his blood.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: And you opened with a lance the side of your Savior.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: Who redeemed the world in his blood.
  responsory.ego-duxi-te-per-des-rtum-quadrag-nta-annis-et-ma-be8f87e453:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego duxi te per desértum quadragínta annis, et manna cibavi te:'
      - type: text
        text: Et tu me cecidisti alapis et flagéllis.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me cecidisti alapis et flagéllis.
      en2:
      - type: response
        text: 'I led you through the desert for forty years, and fed you with manna:'
      - type: text
        text: And you struck me with blows and scourges.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: And you struck me with blows and scourges.
  responsory.ego-ed-xi-te-de-g-pto-dem-rso-phara-ne-in-mare-r-ca9c4a661f:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego edúxi te de Ægýpto, demérso Pharaóne in Mare Rubrum, et ante te præívi in colúmna nubis:'
      - type: text
        text: Et tu me tradidísti princípibus sacerdótum, et me duxísti ad prætórium Piláti.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me tradidísti princípibus sacerdótum, et me duxísti ad prætórium Piláti.
      en2:
      - type: response
        text: 'I brought you out of Egypt, with Pharaoh drowned in the Red Sea, and I went before you in a pillar of cloud:'
      - type: text
        text: And you delivered me to the chief priests, and led me to the praetorium of Pilate.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: And you delivered me to the chief priests, and led me to the praetorium of Pilate.
  responsory.ego-exalt-vi-te-magna-virt-te-2031b2d3af:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego exaltávi te magna virtúte:'
      - type: text
        text: |-
          Et tu me suspendisti in patibulo crucis,
          In qua expándi manus meas ad pópulum non credentem et contradicentem.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me suspendisti in patibulo crucis.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: In qua expándi manus meas ad pópulum non credentem et contradicentem.
      en2:
      - type: response
        text: 'I exalted you with great power:'
      - type: text
        text: |-
          And you hung me on the gibbet of the Cross,
          On which I stretched out my hands to a people that did not believe and contradicted me.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: And you hung me on the gibbet of the Cross.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: On which I stretched out my hands to a people that did not believe and contradicted me.
  responsory.ego-propter-te-chanan-orum-reges-perciissi-et-de-97e6fc8204:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego propter te Chananæorum reges perciissi, et dedi tibi sceptrum regále:'
      - type: text
        text: Et tu dedísti cápiti meo spineam corónam, et percussísti arundine caput meum.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu dedísti cápiti meo spineam corónam, et percussísti arundine caput meum.
      en2:
      - type: response
        text: 'I struck down the kings of Canaan for your sake, and gave you a royal scepter:'
      - type: text
        text: And you gave my head a crown of thorns, and struck my head with a reed.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: And you gave my head a crown of thorns, and struck my head with a reed.
  responsory.ego-propter-te-flagell-vi-g-ptum-cum-primog-niti-57b764b2c7:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego propter te flagellávi Ægýptum cum primogénitis suis:'
      - type: text
        text: |-
          Et tu me flagellátum tradidísti,
          Qui tamquam agnus coram tondénte se obmútui, et non apérui os meum.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me flagellátum tradidísti.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Qui tamquam agnus coram tondénte se obmútui, et non apérui os meum.
      en2:
      - type: response
        text: 'I scourged Egypt for your sake together with its firstborn:'
      - type: text
        text: |-
          And you handed me over to be scourged,
          I who, like a lamb before its shearer, was silent and did not open my mouth.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: And you handed me over to be scourged.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: I who, like a lamb before its shearer, was silent and did not open my mouth.
  responsory.ego-sum-vitis-vera-et-vos-p-lmites-7431c53958:
    role: responsory
    content:
      en:
      - type: response
        text: 'I am the vine: you the branches.'
      - type: text
        text: He that abideth in me, and I in him, the same beareth much fruit, alleluia, alleluia.
      - type: versicle
        text: As the Father hath loved me, I also have loved you.
      - type: response
        text: He that abideth in me, and I in him, the same beareth much fruit, alleluia, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: He that abideth in me, and I in him, the same beareth much fruit, alleluia, alleluia.
      la:
      - type: response
        text: 'Ego sum vitis vera, et vos pálmites:'
      - type: text
        text: Qui manet in me, et ego in eo, hic fert fructum multum, allelúia, allelúia.
      - type: versicle
        text: Sicut diléxit me Pater, et ego diléxi vos.
      - type: response
        text: Qui manet in me, et ego in eo, hic fert fructum multum, allelúia, allelúia.
      en2:
      - type: response
        text: 'I am the true vine, and you are the branches:'
      - type: text
        text: He who abides in me, and I in him, bears much fruit, alleluia, alleluia.
      - type: versicle
        text: As the Father has loved me, so I have loved you.
      - type: response
        text: He who abides in me, and I in him, bears much fruit, alleluia, alleluia.
  responsory.ego-te-potavi-aqua-sal-tis-de-petra-c77d425208:
    role: responsory
    content:
      la:
      - type: response
        text: 'Ego te potavi aqua salútis de petra:'
      - type: text
        text: Et tu me potásti felle et acéto.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Et tu me potásti felle et acéto.
      en2:
      - type: response
        text: 'I gave you water of salvation from the rock:'
      - type: text
        text: And you gave me gall and vinegar to drink.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: And you gave me gall and vinegar to drink.
  responsory.euge-serve-bone-et-fid-lis-quia-in-pauca-fu-sti-ae3473f4bf:
    role: responsory
    content:
      en:
