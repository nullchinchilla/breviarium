  responsory.fund-ta-est-domus-d-mini-supra-v-rticem-m-ntium-25bb19099d:
    role: responsory
    content:
      en:
      - type: response
        text: The Lord's house is established in the top of the mountains, and exalted above the hills;
      - type: text
        text: 'And all nations shall flow unto it, and shall say: Glory be to thee, O Lord!'
      - type: versicle
        text: They shall doubtless come again with rejoicing, bringing their sheaves with them.
      - type: response
        text: 'And all nations shall flow unto it, and shall say: Glory be to thee, O Lord!'
      la:
      - type: response
        text: 'Fundáta est domus Dómini supra vérticem móntium, et exaltáta est super omnes colles:'
      - type: text
        text: 'Et vénient ad eam omnes gentes, et dicent: Glória tibi, Dómine.'
      - type: versicle
        text: Veniéntes autem vénient cum exsultatióne, portántes manípulos suos.
      - type: response
        text: 'Et vénient ad eam omnes gentes, et dicent: Glória tibi, Dómine.'
      en2:
      - type: response
        text: 'The house of the Lord is founded upon the summit of the mountains, and exalted above all hills:'
      - type: text
        text: 'And all nations shall come to it, and shall say: Glory to you, O Lord.'
      - type: versicle
        text: They shall indeed come with exultation, carrying their sheaves.
      - type: response
        text: 'And all nations shall come to it, and shall say: Glory to you, O Lord.'
  responsory.h-c-est-virgo-s-piens-quam-d-minus-vigil-ntem-in-16d9dd579f:
    role: responsory
    content:
      en:
      - type: response
        text: This is one of those wise virgins, whom the Lord found watching, for when she took her lamp, she took oil with her.
      - type: text
        text: And when the Lord came, she went in with him to the marriage.
      - type: versicle
        text: 'At midnight there was a cry made: Behold, the Bridegroom cometh, go ye out to meet him.'
      - type: response
        text: And when the Lord came, she went in with him to the marriage.
      la:
      - type: response
        text: 'Hæc est Virgo sápiens, quam Dóminus vigilántem invénit, quæ accéptis lampádibus sumpsit secum óleum:'
      - type: text
        text: Et veniénte Dómino, introívit cum eo ad núptias.
      - type: versicle
        text: 'Média nocte clamor factus est: Ecce sponsus venit, exíte óbviam ei.'
      - type: response
        text: Et veniénte Dómino, introívit cum eo ad núptias.
      en2:
      - type: response
        text: 'This is the wise Virgin, whom the Lord found watching, who, having taken her lamps, brought oil with her:'
      - type: text
        text: And when the Lord came, she entered with him to the wedding feast.
      - type: versicle
        text: 'At midnight a cry was made: Behold, the bridegroom comes; go forth to meet him.'
      - type: response
        text: And when the Lord came, she entered with him to the wedding feast.
  responsory.hei-mihi-d-mine-quia-pecc-vi-nimis-in-vita-mea-q-6ee19ad925:
    role: responsory
    content:
      en:
      - type: response
        text: Woe is me, O Lord! for I have sinned greatly in my life. I am smitten what shall I do? Whither shall I flee but unto thee, O my God?
      - type: text
        text: Have mercy upon me, when Thou comest at the latter day.
      - type: versicle
        text: My soul is sore vexed, but Thou, O Lord, help me.
      - type: response
        text: Have mercy upon me, when Thou comest at the latter day.
      la:
      - type: response
        text: 'Hei mihi, Dómine, quia peccávi nimis in vita mea: Quid fáciam, miser? ubi fúgiam, nisi ad te, Deus meus?'
      - type: text
        text: Miserére mei, dum véneris in novíssimo die.
      - type: versicle
        text: Anima mea turbáta est valde, sed tu, Dómine, succúrre ei.
      - type: response
        text: Miserére mei, dum véneris in novíssimo die.
      en2:
      - type: response
        text: 'Woe is me, O Lord, for I have sinned greatly in my life: what shall I do, wretch that I am? Where shall I flee, if not to you, my God?'
      - type: text
        text: Have mercy on me when you come on the last day.
      - type: versicle
        text: My soul is greatly troubled, but you, O Lord, come to its aid.
      - type: response
        text: Have mercy on me when you come on the last day.
  responsory.hic-est-vere-martyr-qui-pro-christi-n-mine-s-ngu-b65db5d4ee:
    role: responsory
    content:
      la:
      - type: response
        text: 'Hic est vere Martyr, qui pro Christi nómine sánguinem suum fudit:'
      - type: text
        text: Qui minas iúdicum non tímuit, nec terrénæ dignitátis glóriam quæsívit, sed ad cæléstia regna pervénit.
      - type: versicle
        text: Iustum dedúxit Dóminus per vias rectas, et osténdit illi regnum Dei.
      - type: response
        text: Qui minas iúdicum non tímuit, nec terrénæ dignitátis glóriam quæsívit, sed ad cæléstia regna pervénit.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Qui minas iúdicum non tímuit, nec terrénæ dignitátis glóriam quæsívit, sed ad cæléstia regna pervénit.
      en2:
      - type: response
        text: 'This is truly a Martyr, who shed his blood for the name of Christ:'
      - type: text
        text: Who feared not the threats of judges, nor sought the glory of earthly dignity, but attained the heavenly kingdoms.
      - type: versicle
        text: The Lord led the just man by straight paths, and showed him the kingdom of God.
      - type: response
        text: Who feared not the threats of judges, nor sought the glory of earthly dignity, but attained the heavenly kingdoms.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: Who feared not the threats of judges, nor sought the glory of earthly dignity, but attained the heavenly kingdoms.
