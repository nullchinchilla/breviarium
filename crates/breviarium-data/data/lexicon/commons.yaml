        text: Your sorrow, alleluia,
      - type: text
        text: Shall be turned into joy, alleluia, alleluia.
      - type: versicle
        text: The world indeed shall rejoice, but you shall be sorrowful; yet your sorrow.
      - type: response
        text: Shall be turned into joy, alleluia, alleluia.
  responsory.v-nea-mea-el-cta-ego-te-plant-vi-dicit-d-minus-e-4aefbd8f7b:
    role: responsory
    content:
      la:
      - type: response
        text: 'Vínea mea elécta, ego te plantávi, dicit Dóminus: et tu facta es mihi nimis amára:'
      - type: text
        text: Quia parásti crucem Salvatóri tuo.
      - type: versicle
        text: Pópule meus, quid feci tibi, aut in quo contristávi te? respónde mihi.
      - type: response
        text: Quia parásti crucem Salvatóri tuo.
      en2:
      - type: response
        text: 'My chosen vineyard, I planted you, says the Lord: and you have become for me exceedingly bitter:'
      - type: text
        text: For you have prepared the Cross for your Savior.
      - type: versicle
        text: O my people, what have I done to you, or in what have I grieved you? Answer me.
      - type: response
        text: For you have prepared the Cross for your Savior.
  responsory.v-rbera-carn-ficum-non-timu-runt-sancti-dei-mori-1c4e05a263:
    role: responsory
    content:
      en:
      - type: response
        text: The Saints of God shrank not from the stripes of the executioners, but died for Christ's Name's sake
      - type: text
        text: That they might be made joint-heirs in the house of the Lord.
      - type: versicle
        text: They gave their bodies for God's sake to death.
      - type: response
        text: That they might be made joint-heirs in the house of the Lord.
      la:
      - type: response
        text: 'Vérbera carníficum non timuérunt Sancti Dei, moriéntes pro Christi nómine:'
      - type: text
        text: Ut herédes fíerent in domo Dómini.
      - type: versicle
        text: Tradidérunt córpora sua propter Deum ad supplícia.
      - type: response
        text: Ut herédes fíerent in domo Dómini.
      en2:
      - type: response
        text: 'The holy ones of God did not fear the blows of their torturers, dying for the name of Christ:'
      - type: text
        text: That they might become heirs in the house of the Lord.
      - type: versicle
        text: They delivered their bodies to torments for the sake of God.
      - type: response
        text: That they might become heirs in the house of the Lord.
  responsory.v-rbera-carn-ficum-non-timu-runt-sancti-dei-mori-e33148d99e:
    role: responsory
    content:
      la:
      - type: response
        text: 'Vérbera carníficum non timuérunt Sancti Dei, moriéntes pro Christi nómine:'
      - type: text
        text: Ut herédes fíerent in domo Dómini.
      - type: versicle
        text: Tradidérunt córpora sua propter Deum ad supplícia.
      - type: response
        text: Ut herédes fíerent in domo Dómini.
      en2:
      - type: response
        text: 'The holy ones of God did not fear the blows of their torturers, dying for the name of Christ:'
      - type: text
        text: That they might become heirs in the house of the Lord.
      - type: versicle
        text: They delivered their bodies to torments for the sake of God.
      - type: response
        text: That they might become heirs in the house of the Lord.
  responsory.veni-el-cta-mea-et-ponam-in-te-thronum-meum-e9e4a489ef:
    role: responsory
    content:
      en:
      - type: response
        text: Come, O My chosen one, and I will establish My throne in thee;
      - type: text
        text: For the King hath greatly desired thy beauty.
      - type: versicle
        text: In thy comeliness and thy beauty, go forward, fare prosperously, and reign.
      - type: response
        text: For the King hath greatly desired thy beauty.
      la:
      - type: response
        text: Veni, elécta mea, et ponam in te thronum meum
      - type: text
        text: Quia concupívit Rex spéciem tuam.
      - type: versicle
        text: Spécie tua et pulchritúdine tua inténde, próspere procéde, et regna.
      - type: response
        text: Quia concupívit Rex spéciem tuam.
      en2:
      - type: response
        text: Come, my chosen one, and I will set my throne in you,
      - type: text
        text: For the King has desired your beauty.
      - type: versicle
        text: In your beauty and in your splendor, set out, advance in triumph, and reign.
      - type: response
        text: For the King has desired your beauty.
  responsory.veni-sponsa-christi-ccipe-cor-nam-quam-tibi-d-mi-aeb092a955:
    role: responsory
    content:
      en:
      - type: short_response
        text: Come, Bride of Christ, and take the everlasting crown, which the Lord hath prepared for thee, even for thee who for the love of Him hast shed thy blood;
      - type: text
        text: And art entered with Angels into His garden.
      - type: versicle
        text: Come, O My chosen one, and I will establish My throne in thee, for the King hath reatly desired thy beauty
      - type: response
        text: And art entered with Angels into His garden.
      la:
      - type: response
        text: Veni Sponsa Christi, áccipe corónam, quam tibi Dóminus præparávit in ætérnum; pro cuius amóre sánguinem tuum fudísti,
      - type: text
        text: Et cum Ángelis in paradísum introísti.
      - type: versicle
        text: Veni, elécta mea, et ponam in te thronum meum; quia concupívit Rex spéciem tuam.
      - type: response
        text: Et cum Ángelis in paradísum introísti.
      en2:
      - type: response
        text: Come, Bride of Christ, receive the crown which the Lord has prepared for you for eternity; for love of whom you have shed your blood,
      - type: text
        text: And you have entered paradise with the Angels.
      - type: versicle
        text: Come, my chosen one, and I will set my throne in you; for the King has desired your beauty.
      - type: response
        text: And you have entered paradise with the Angels.
  responsory.vidi-coni-nctos-viros-hab-ntes-spl-ndidas-vestes-b721cec578:
    role: responsory
    content:
      en:
      - type: response
        text: 'I saw men standing together, clad in shining raiment, and the Angel of the Lord spoke unto me, saying:'
      - type: text
        text: These men are holy, for they are the friends of God.
      - type: versicle
        text: 'I saw a strong Angel of God fly into the midst of heaven, saying with a loud voice:'
      - type: response
        text: These men are holy, for they are the friends of God.
      la:
      - type: response
        text: 'Vidi coniúnctos viros, habéntes spléndidas vestes, et Ángelus Dómini locútus est ad me, dicens:'
      - type: text
        text: Isti sunt viri sancti facti amíci Dei.
      - type: versicle
        text: Vidi Ángelum Dei fortem, volántem per médium cælum, voce magna clamántem et dicéntem.
      - type: response
        text: Isti sunt viri sancti facti amíci Dei.
      en2:
      - type: response
        text: 'I saw men joined together, wearing shining garments, and the Angel of the Lord spoke to me, saying:'
      - type: text
        text: These are holy men made friends of God.
      - type: versicle
        text: I saw a mighty Angel of God, flying through the midst of heaven, crying out with a great voice and saying.
      - type: response
        text: These are holy men made friends of God.
  responsory.viri-sancti-glori-sum-s-nguinem-fud-runt-pro-d-m-55f764f011:
    role: responsory
    content:
      la:
      - type: response
        text: 'Viri sancti gloriósum sánguinem fudérunt pro Dómino, amavérunt Christum in vita sua, imitáti sunt eum in morte sua:'
      - type: text
        text: Et ídeo corónas triumpháles meruérunt.
      - type: versicle
        text: Unus spíritus, et una fides erat in eis.
      - type: response
        text: Et ídeo corónas triumpháles meruérunt.
      en2:
      - type: response
        text: 'Holy men have gloriously shed their blood for the Lord, they loved Christ in their life, they imitated him in their death:'
      - type: text
        text: And therefore they merited triumphant crowns.
      - type: versicle
        text: One spirit and one faith were in them.
      - type: response
        text: And therefore they merited triumphant crowns.
  responsory.viri-sancti-glori-sum-s-nguinem-fud-runt-pro-d-m-f2ef007404:
    role: responsory
    content:
      en:
      - type: response
        text: These men are holy, who have gloriously shed their blood for the Lord's sake, yea, who loved Christ in their lives, and were made like unto Him in their flesh,
      - type: text
        text: And therefore they have earned crowns of victory.
      - type: versicle
        text: One spirit, and one faith was in them.
      - type: response
        text: And therefore they have earned crowns of victory.
      la:
      - type: response
        text: 'Viri sancti gloriósum sánguinem fudérunt pro Dómino, amavérunt Christum in vita sua, imitáti sunt eum in morte sua:'
      - type: text
        text: Et ídeo corónas triumpháles meruérunt.
      - type: versicle
        text: Unus spíritus, et una fides erat in eis.
      - type: response
        text: Et ídeo corónas triumpháles meruérunt.
      en2:
      - type: response
        text: 'Holy men have gloriously shed their blood for the Lord, they loved Christ in their life, they imitated him in their death:'
      - type: text
        text: And therefore they merited triumphant crowns.
      - type: versicle
        text: One spirit and one faith were in them.
      - type: response
        text: And therefore they merited triumphant crowns.
  responsory.virt-te-magna-redd-bant-ap-stoli-ac3d72bbe9:
    role: responsory
    content:
      en:
      - type: response
        text: With great power did the Apostles
      - type: text
        text: Give testimony of the resurrection of Jesus Christ our Lord, alleluia, alleluia.
      - type: versicle
        text: 'And they were all filled with the Holy Ghost: and they spoke the word of God with confidence.'
      - type: response
        text: Give testimony of the resurrection of Jesus Christ our Lord, alleluia, alleluia.
      la:
      - type: response
        text: Virtúte magna reddébant Apóstoli
      - type: text
        text: Testimónium resurrectiónis Iesu Christi Dómini nostri, allelúia, allelúia.
      - type: versicle
        text: Repléti quidem Spíritu Sancto, loquebántur cum fidúcia verbum Dei.
      - type: response
        text: Testimónium resurrectiónis Iesu Christi Dómini nostri, allelúia, allelúia.
      en2:
      - type: response
        text: With great power the Apostles
      - type: text
        text: Gave testimony to the Resurrection of Jesus Christ our Lord, alleluia, alleluia.
      - type: versicle
        text: Filled indeed with the Holy Spirit, they spoke the word of God with confidence.
      - type: response
        text: Gave testimony to the Resurrection of Jesus Christ our Lord, alleluia, alleluia.
  short-reading.act-5-41-62f73f56f7:
    role: short_reading
    content:
      en:
      - type: citation
        text: Acts 5:41
      - type: versicle
        text: And the Apostles indeed went from the presence of the council, rejoicing that they were accounted worthy to suffer reproach for the name of Jesus.
      la:
      - type: citation
        text: Act 5:41
      - type: text
        text: Ibant Apóstoli gaudéntes a conspéctu concílii, quóniam digni hábiti sunt pro nómine Iesu contuméliam pati.
      en2:
      - type: citation
        text: Act 5:41
      - type: text
        text: And indeed, they went forth from the presence of the council, rejoicing that they were considered worthy to suffer insult on behalf of the name of Jesus.
  short-reading.apo-21-4-5-fa8af0c8ca:
    role: short_reading
    content:
      en:
      - type: citation
        text: Rev 21:4-4
      - type: text
        text: 'And God shall wipe away all tears from their eyes, and there shall be no more death, neither sorrow, nor crying, neither shall there be any more pain; for the former things are passed away. And He That sat upon the throne said: Behold, I make all things new.'
      la:
      - type: citation
        text: Apo 21:4-5
      - type: text
        text: 'Et abstérget Deus omnem lácrimam ab óculis eórum: et mors ultra non erit, neque luctus, neque clamor, neque dolor erit ultra, quia prima abiérunt. Et dixit qui sedébat in throno: Ecce nova fácio ómnia.'
      en2:
      - type: citation
        text: Apo 21:4-5
      - type: text
        text: 'And God will wipe away every tear from their eyes. And death shall be no more. And neither mourning, nor crying out, nor grief shall be anymore. For the first things have passed away. And the One who was sitting upon the throne said: Behold, I make all things new.'
  short-reading.is-53-1d29afa1da:
    role: short_reading
    content:
      la:
      - type: citation
        text: Is 53
      - type: text
        text: 'Generatiónem eius quis enarrabit? Quia abscissus est de terra vivéntium: propter scelus pópuli mei percússi eum.'
      en2:
      - type: citation
        text: Is 53
      - type: text
        text: Who will describe his life? For he has been cut off from the land of the living. Because of the wickedness of my people, I have struck him down.
  short-reading.prov-31-29-30-7e15610fbd:
    role: short_reading
    content:
      en:
      - type: citation
        text: Prov 31:29-30
      - type: text
        text: 'Many daughters have gathered together riches: thou hast surpassed them all. Favour is deceitful, and beauty is vain: the woman that feareth the Lord, she shall be praised.'
      la:
      - type: citation
        text: Prov 31:29-30
      - type: text
        text: 'Multæ fíliæ congregavérunt divítias: tu supergréssa es univérsas. Fallax grátia, et vana est pulchritúdo: múlier timens Dóminum, ipsa laudábitur.'
      en2:
      - type: citation
        text: Prov 31:29-30
      - type: text
        text: Many daughters have gathered together riches; you have surpassed them all. Charm is false, and beauty is vain. The woman who fears the Lord, the same shall be praised.
  short-reading.rom-8-28-9fefa0bba0:
    role: short_reading
    content:
      en:
      - type: citation
        text: Rom 8:28
      - type: text
        text: And we know that to them that love God, all things work together unto good, to such as, according to his purpose, are called to be saints.
      la:
      - type: citation
        text: Rom 8:28
      - type: text
        text: Scimus quóniam diligéntibus Deum ómnia cooperántur in bonum, iis qui secúndum propósitum vocáti sunt sancti.
      en2:
      - type: citation
        text: Rom 8:28
      - type: text
        text: And we know that, for those who love God, all things work together unto good, for those who, in accordance with his purpose, are called to be saints.
  short-reading.sap-10-10-d0e681ab77:
    role: short_reading
    content:
      en:
      - type: citation
        text: Wis 10:10
      - type: text
        text: She conducted the just, when he fled from his brother's wrath, through the right ways, and showed him the kingdom of God, and gave him the knowledge of the holy things, made him honourable in his labours, and accomplished his labours.
      la:
      - type: citation
        text: Sap 10:10
      - type: text
        text: 'Iustum dedúxit Dóminus per vias rectas, et osténdit illi regnum Dei, et dedit illi sciéntiam sanctórum: honestávit illum in labóribus, et complévit labóres illíus.'
      en2:
      - type: citation
        text: Sap 10:10
      - type: text
        text: She led the just man, this fugitive of his brother's wrath, by the right ways, and revealed to him the kingdom of God, and gave him the knowledge of holiness, honored him in his labors, and completed his labors.
  short-reading.sap-10-10-e42c2c9341:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sap 10:10
      - type: text
        text: 'Iustum dedúxit Dóminus per vias rectas, et osténdit illi regnum Dei, et dedit illi sciéntiam sanctórum: honestávit illum in labóribus, et complévit labóres illíus.'
      en2:
      - type: citation
        text: Sap 10:10
      - type: text
        text: She led the just man, this fugitive of his brother's wrath, by the right ways, and revealed to him the kingdom of God, and gave him the knowledge of holiness, honored him in his labors, and completed his labors.
  short-reading.sap-3-7-8-7c78bf8e39:
    role: short_reading
    content:
      en:
      - type: citation
        text: Wis 3:7-8
      - type: text
        text: The just shall shine, and shall run to and fro like sparks among the reeds. They shall judge nations, and rule over people, and their Lord shall reign for ever.
      la:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: 'Fulgébunt iusti, et tamquam scintíllæ in arundinéto discúrrent. Iudicábunt natiónes, et dominabúntur pópulis: et regnábit Dóminus illórum in perpétuum.'
      en2:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: They will shine, and they will dash about like sparks among stubble. They will judge the nations and they will rule over the people, and their Lord will reign forever.
  short-reading.sap-3-7-8-d4443e8350:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: 'Fulgébunt iusti, et tamquam scintíllæ in arundinéto discúrrent. Iudicábunt natiónes, et dominabúntur pópulis: et regnábit Dóminus illórum in perpétuum.'
      en2:
      - type: citation
        text: Sap 3:7-8
      - type: text
        text: They will shine, and they will dash about like sparks among stubble. They will judge the nations and they will rule over the people, and their Lord will reign forever.
  short-reading.sap-4-1-75192b022f:
    role: short_reading
    content:
      en:
      - type: citation
        text: Wis 4:1
      - type: text
        text: 'O how beautiful is the chaste generation with glory: for the memory thereof is immortal: because it is known both with God and with men.'
      la:
      - type: citation
        text: Sap 4:1
      - type: text
        text: O quam pulchra est casta generátio cum claritáte! Immortális est enim memória illíus, quóniam apud Deum nota est, et apud hómines.
      en2:
      - type: citation
        text: Sap 4:1
      - type: text
        text: O how beautiful is the chaste fruit of purity! For its remembrance is immortal, because it is observed both with God and with men.
  short-reading.sir-24-19-20-451a48cfb9:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: 'In platéis sicut cinnamómum et bálsamum aromatízans odórem dedi: quasi myrrha elécta, dedi suavitátem odóris.'
      en2:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: I was exalted like a beautiful olive tree in the plains, and like a sycamore tree beside the waters along a wide road. I gave off an aromatic fragrance like cinnamon or balsam. I produced a sweet odor like the best myrrh.
  short-reading.sir-24-19-20-b7f351f59f:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: 'As a plane tree by the water in the streets, I gave a sweet smell like cinnamon. and aromatical balm: I yielded a sweet odour like the best myrrh.'
      la:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: 'In platéis sicut cinnamómum et bálsamum aromatízans odórem dedi: quasi myrrha elécta, dedi suavitátem odóris.'
      en2:
      - type: citation
        text: Sir 24:19-20
      - type: text
        text: I was exalted like a beautiful olive tree in the plains, and like a sycamore tree beside the waters along a wide road. I gave off an aromatic fragrance like cinnamon or balsam. I produced a sweet odor like the best myrrh.
  short-reading.sir-39-6-20bfd77cf5:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sir 39:6
      - type: text
        text: Iustus cor suum trádidit ad vigilándum dilúculo ad Dóminum, qui fecit illum, et in conspéctu Altíssimi deprecábitur.
      en2:
      - type: citation
        text: Sir 39:6
      - type: text
        text: At first light, he will offer his heart with watchfulness to the Lord who made him, and he will pray in the sight of the Most High.
  short-reading.sir-39-6-f4818753b5:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 39:6
      - type: text
        text: He will give his heart to resort early to the Lord that made him, and he will pray in the sight of the most High.
      la:
      - type: citation
        text: Sir 39:6
      - type: text
        text: Iustus cor suum trádidit ad vigilándum dilúculo ad Dóminum, qui fecit illum, et in conspéctu Altíssimi deprecábitur.
      en2:
      - type: citation
        text: Sir 39:6
      - type: text
        text: At first light, he will offer his heart with watchfulness to the Lord who made him, and he will pray in the sight of the Most High.
  short-reading.sir-45-19-20-83d1b177e4:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: To execute the office of the priesthood, and to have praise, and to glorify his people in his name. He chose him out of all men living, to offer sacrifice to God, incense, and a good savour.
      la:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: Fungi sacerdótio, et habére laudem in nómine ipsíus, et offérre illi incénsum dignum in odórem suavitátis.
      en2:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: To exercise the priesthood and to have praise in his name, and to offer him worthy incense as a fragrant offering.
  short-reading.sir-45-19-20-d4486c4926:
    role: short_reading
    content:
      la:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: Fungi sacerdótio, et habére laudem in nómine ipsíus, et offérre illi incénsum dignum in odórem suavitátis.
      en2:
      - type: citation
        text: Sir 45:19-20
      - type: text
        text: To exercise the priesthood and to have praise in his name, and to offer him worthy incense as a fragrant offering.
  short-reading.sir-51-13-14-894a3c3bcb:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 51:13-14
      - type: text
        text: O Lord, my God thou hast exalted my dwelling place upon the earth and I have prayed for death to pass away. I called upon the Lord, the father of my Lord, that he would not leave me in the day of my trouble, and in the time of the proud without help.
      la:
      - type: citation
        text: Sir 51:13-14
      - type: text
        text: Dómine, Deus meus, exaltásti super terram habitatiónem meam, et pro morte defluénte deprecáta sum. Invocávi Dóminum, Patrem Dómini mei, ut non derelínquat me in die tribulatiónis meæ, et in témpore superbórum sine adiutório.
      en2:
      - type: citation
        text: Sir 51:13-14
      - type: text
        text: You exalted my habitation upon the earth, and I made supplication that death would pass away. I called upon the Lord, the Father of my Lord, so that he would not abandon me in the day of my tribulation, nor in the time of arrogance without assistance.
  short-reading.sir-51-8-51-12-4e5f8be0eb:
    role: short_reading
    content:
      en:
      - type: citation
        text: Sir 51:8; 51:12
      - type: text
        text: My soul shall praise the Lord even to death. How thou deliverest them that wait for thee, O Lord, and savest them out of the hands of the nations!
      la:
      - type: citation
        text: Sir 51:8; 51:12
      - type: text
        text: Laudábit usque ad mortem ánima mea Dóminum, quóniam éruis sustinéntes te, et líberas eos de manu angústiæ, Dómine, Deus noster.
      en2:
      - type: citation
        text: Sir 51:8; 51:12
      - type: text
        text: My soul shall praise the Lord, even unto death. For you rescue those who persevere for you, O Lord, and you free them from the hands of the Gentiles.
