  reading.incipit-liber-ezechi-lis-proph-t-0680badf29:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to the Corinthians
      - type: citation
        text: 1 Cor 4:1-5
      - type: text
        text: |-
          1 Let a man so account of us as of the ministers of Christ, and the dispensers of the mysteries of God.
          2 Here now it is required among the dispensers, that a man be found faithful.
          3 But to me it is a very small thing to be judged by you, or by man's day; but neither do I judge my own self.
          4 For I am not conscious to myself of any thing, yet am I not hereby justified; but he that judgeth me, is the Lord.
          5 Therefore judge not before the time; until the Lord come, who both will bring to light the hidden things of darkness, and will make manifest the counsels of the hearts; and then shall every man have praise from God.
      la:
      - type: text
        text: Incipit liber Ezechiélis Prophétæ
      - type: citation
        text: Ezech 1:1-4
      - type: text
        text: |-
          1 Et factum est in trigésimo anno, in quarto, in quinta mensis, cum essem in médio captivórum iuxta flúvium Chobar, apérti sunt cæli, et vidi visiónes Dei.
          2 In quinta mensis, ipse est annus quintus transmigratiónis regis Ióachim,
          3 factum est verbum Dómini ad Ezechiélem fílium Buzi sacerdótem, in terra Chaldæórum, secus flumen Chobar: et facta est super eum ibi manus Dómini.
          4 Et vidi, et ecce ventus túrbinis veniébat ab Aquilóne, et nubes magna, et ignis invólvens, et splendor in circúitu eius: et de médio eius, quasi spécies eléctri, id est, de médio ignis:
      en2:
      - type: text
        text: The Beginning of the Book of the Prophet Ezekiel
      - type: citation
        text: Ezech 1:1-4
      - type: text
        text: |-
          1 And it happened that, in the thirtieth year, in the fourth month, on the fifth of the month, when I was in the midst of the captives beside the river Chebar, the heavens were opened, and I saw the visions of God.
          2 On the fifth of the month, the same is the fifth year of the transmigration of king Joachin,
          3 the word of the Lord came to Ezekiel, a priest, the son of Buzi, in the land of the Chaldeans, next to the river Chebar. And the hand of the Lord was over him there.
          4 And I saw, and behold, a whirlwind arrived from the north. And a great cloud, wrapped in fire and brightness, was all around it. And from its midst, that is, from the midst of the fire, there was something with the appearance of amber.
