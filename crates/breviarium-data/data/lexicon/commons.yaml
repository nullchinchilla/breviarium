  reading.ergo-ad-n-hilum-valet-sal-infatu-tum-nisi-ut-mit-d335e6b697:
    role: reading
    content:
      en:
      - type: text
        text: Those that should be the salt of the earth, but have lost their savour, are thenceforth good for nothing, but to be cast out, and to be trodden under foot of men. But no one that suffereth persecution is truly said to be trodden under foot of men. Rather, that one is truly trodden under foot of men who through fear of persecution hath lost the savour of righteousness. For no one can be trodden upon, unless he be beneath him which treadeth upon him. And certainly no one who hath his heart in heaven, no matter how grievously he doth suffer in his body on earth, is rightly said to be beneath anyone who misuseth him.
      la:
      - type: text
        text: Ergo ad níhilum valet sal infatuátum, nisi ut mittátur foras et calcétur ab homínibus. Non ítaque calcátur ab homínibus qui pátitur persecutiónem; sed qui, persecutiónem timéndo, infatuátur. Calcári enim non potest nisi inférior; sed inférior non est, qui, quamvis córpore multa in terra sustíneat, corde tamen fixus in cælo est.
      en2:
      - type: text
        text: Therefore, salt that has lost its savour is good for nothing but to be cast out and trodden underfoot by men. He, then, is not trodden underfoot by men who suffers persecution; but rather he who, through fear of persecution, loses his savour. For only what is inferior can be trodden underfoot; but he is not inferior who, though he may endure much in the body upon earth, has his heart fixed in heaven.
  reading.ergo-ad-n-hilum-valet-sal-infatu-tum-nisi-ut-mit-d5060c8773:
    role: reading
    content:
      en:
      - type: text
        text: Here, then, are two commandments, to gird our loins about, and to keep our lights burning the cleanness of purity in our body, and the light of the truth in our works. Whoso hath the one and not the other, pleaseth not thereby our Redeemer; that is, he pleaseth Him not which doth good works, but bridleth not himself from the pollutions of lust, neither he which is eminent in chastity, but exerciseth not himself in good works. Neither is chastity a great thing without good works, nor good works anything without chastity. And if any man do both, it remaineth that he must look by hope toward our Fatherland above, and not have for his reason wherethrough he turneth himself away from vice, the love of honour in this present world.
      la:
      - type: text
        text: Ergo ad níhilum valet sal infatuátum, nisi ut mittátur foras et calcétur ab homínibus. Non ítaque calcátur ab homínibus qui pátitur persecutiónem; sed qui, persecutiónem timéndo, infatuátur. Calcári enim non potest nisi inférior; sed inférior non est, qui, quamvis córpore multa in terra sustíneat, corde tamen fixus in cælo est.
