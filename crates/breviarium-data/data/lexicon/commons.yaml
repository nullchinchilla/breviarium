      - type: text
        text: 'Our Lord and Redeemer willeth us to know what shall be the signs that the end of the world is at hand, to the end that ye may be the less terrified, when that cometh whereof ye have already had warning. Darts strike less which are seen coming: and the plagues of the earth will be to us more bearable, if we are harnessed against them with the shield of foreknowledge. Behold, how He saith When ye shall hear of wars and commotions be not terrified for these things must first come to pass; but the end is not by and by. It behoveth us to ponder these words of our Redeemer, wherein He warneth us of suffering, from without, and from within. Wars are the work of a foreign enemy, commotions of the citizens. Therefore, that He may let us know that we shall be troubled from within and from without, He showeth that our wrestling shall be in part against strangers, and in part against our brethren.'
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Lucam
      - type: citation
        text: Luc 6:17-23
      - type: text
        text: |-
          In illo témpore: Descéndens Iesus de monte, stetit in loco campéstri, et turba discipulórum eius, et multitúdo copiósa plebis ab omni Iudǽa, et Ierúsalem, et marítima, et Tyri, et Sidónis. Et réliqua.

          Homilía sancti Ambrósii Epíscopi
      - type: citation
        text: Lib. 5. in Lucam. Cap. 6., post init.
      - type: text
        text: 'Advérte ómnia diligénter, quómodo et cum Apóstolis ascéndat et descéndat ad turbas. Quómodo enim turba nisi in húmili Christum vidéret? Non séquitur ad excélsa, non ascéndit ad sublímia. Dénique ubi descéndit, invénit infírmos: in excélsis enim infírmi esse non possunt. Hinc étiam Matthǽus docet in inferióribus débiles esse sanátos. Prius enim unusquísque sanándus est, ut paulátim virtútibus procedéntibus ascéndere possit ad montem; et ídeo quemque in inferióribus sanat, hoc est, a libídine révocat, iniúriam cæcitátis avértit. Ad vúlnera nostra descéndit: ut usu quodam et cópia suæ natúræ, compartícipes nos fáciat esse regni cæléstis.'
      en2:
      - type: text
        text: A Reading from the holy Gospel according to Luke
      - type: citation
        text: Luc 6:17-23
      - type: text
        text: |-
          At that time: Jesus descended with them and stood in a level place, with a multitude of his disciples and a copious multitude of people from all of Judea and Jerusalem and the seacoast, and Tyre and Sidon. And so forth.
      
          A Homily of Saint Ambrose the Bishop
      - type: citation
        text: Lib. 5. in Lucam. Cap. 6., post init.
      - type: text
        text: 'Observe all things carefully: how he ascends with the Apostles and descends to the crowds. For how could the crowd see Christ except in a lowly place? It does not follow to the heights; it does not climb to the lofty. And so, where he descended, he found the sick: for the sick cannot be on the heights. Hence Matthew also teaches that the weak were healed in the lower places. For each one must first be healed, so that, as the virtues advance step by step, he may be able to ascend the mountain; and therefore he heals each one in the lower places, that is, he draws him back from lust, he turns away the injury of blindness. He descended to our wounds: so that by a certain use and abundance of his nature, he might make us sharers in the heavenly kingdom.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-lucam-4ab0c80352:
    role: reading
