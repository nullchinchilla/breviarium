      - type: text
        text: For out of thee rose the Sun of righteousness, even Christ our God.
      - type: versicle
        text: Pray for the people, plead for the clergy, make intercession for all women vowed to God. May all that are keeping this thine holy Feast day feel the might of thine assistance.
      - type: response
        text: For out of thee rose the Sun of righteousness, even Christ our God.
