  reading.duo-autem-sunt-qu-iub-ntur-et-lumbos-restr-ngere-4b59fd2e36:
    role: reading
    content:
      la:
      - type: text
        text: 'Duo autem sunt, quæ iubéntur, et lumbos restríngere, et lucérnas tenére: ut et mundítia sit castitátis in córpore, et lumen veritátis in operatióne. Redemptóri étenim nostro unum sine áltero placére nequáquam potest: si aut is qui bona agit, adhuc luxúriæ inquinaménta non déserit: aut is qui castitáte præéminet, necdum se per bona ópera exércet. Nec cástitas ergo magna est sine bono ópere, nec opus bonum est áliquod sine castitáte. Sed et si utrúmque ágitur, restat, ut quisquis ille est, spe ad supérnam pátriam tendat, et nequáquam se a vítiis pro mundi huius honestáte contíneat.'
      en2:
      - type: text
        text: 'Now two things are commanded: to gird the loins and to hold lamps; that there be purity of chastity in the body, and the light of truth in action. For our Redeemer it is in no way possible for one to please without the other: whether it be he who does good yet still does not forsake the defilements of lust; or he who excels in chastity yet does not yet exercise himself through good works. Neither, therefore, is chastity great without good work, nor is any work good without chastity. But if both are practiced, it remains that whoever it may be should tend in hope toward the heavenly homeland, and should refrain from vices not for the sake of worldly honor.'
  reading.duo-autem-sunt-qu-iub-ntur-et-lumbos-restr-ngere-7580ff7c8b:
    role: reading
    content:
      en:
      - type: text
        text: Here, then, are two commandments, to gird our loins about, and to keep our lights burning the cleanness of purity in our body, and the light of the truth in our works. Whoso hath the one and not the other, pleaseth not thereby our Redeemer; that is, he pleaseth Him not which doth good works, but bridleth not himself from the pollutions of lust, neither he which is eminent in chastity, but exerciseth not himself in good works. Neither is chastity a great thing without good works, nor good works anything without chastity. And if any man do both, it remaineth that he must look by hope toward our Fatherland above, and not have for his reason wherethrough he turneth himself away from vice, the love of honour in this present world.
