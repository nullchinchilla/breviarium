        text: Homilia 37th on the Gospels.
      - type: text
        text: Dearly beloved brethren, if we consider what and how great things are promised unto us in heaven, all things which are upon earth grow poor to our mind. For when this world's goods are reckoned against the gladness above, they are found to be a clog rather than an help. This present life being compared to life eternal, ought rather to be called death than life. For what is the daily failing of our corruption but, as it were, a creeping death But what tongue is there that can tell, or what understanding that can comprehend how great is the rejoicing in the city above, where they have part with the choirs of Angels, where they stand with the most blessed spirits before the glory of the Creator, where they see the face of God present, where they behold the Incomprehensible Light, where they have no fear of death, and where they rejoice eternally incorruptible
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 10:26-32
      - type: text
        text: 'In illo témpore: Dixit Iesus discípulis suis: Nihil est opértum, quod non revelábitur; et occúltum, quod non sciétur. Et réliqua.'
      - type: text
        text: Homilía sancti Hilárii Epíscopi
      - type: heading
        text: Comment. in Matthaeum, can. 10 post medium
      - type: text
        text: 'Dóminus diem iudícii osténdit, quæ abstrúsam voluntátis nostræ consciéntiam prodet: et ea quæ nunc occúlta existimántur, luce cognitiónis públicæ déteget. Ígitur non minas, non consília, non potestátes insectántium monet esse metuéndas: quia dies iudícii nulla hæc fuísse, atque inánia revelábit. Et quod dico vobis in ténebris, dícite in lúmine: et quod in aure audítis, prædicáte super tecta. Non légimus Dóminum sólitum fuísse nóctibus sermocinári, et doctrínam in ténebris tradidísse: sed quia omnis sermo eius carnálibus ténebræ sunt, et verbum eius infidélibus nox est.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-9b18eccfe8:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Luke
      - type: citation
        text: Luke 12:35-40
      - type: text
        text: 'At that time, Jesus said unto His disciples: Let your loins be girded about, and your lights burning. And so on.'
      - type: text
        text: Homily by Pope St. Gregory (the Great.)
      - type: heading
        text: 13th on the Gospels.
      - type: text
        text: Dearly beloved brethren, the words of the Holy Gospel, which have just been read, lie open before you, and, lest their very plainness should make them seem to some to be hard, we will go through them with such shortness as that neither may they which understand not remain unenlightened, nor they which understand be wearied. The Lord saith Let your loins be girded about. Now, we gird our loins about, when by continency we master the lustful inclination of the flesh. But, forasmuch as it sufficeth not for a man to abstain from evil deeds, if he strive not to join thereto the earnest doing of good works, it is immediately added And your lights burning. Our lights burn when, by good works, we give bright example to our neighbour; concerning which works the Lord saith Let your light so shine before men, that they may see your good works, and glorify your Father Which is in heaven. (Matth. v. 16.)
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 5:13-19
      - type: text
        text: 'In illo témpore: Dixit Iesus discípulis suis: Vos estis sal terræ. Quod si sal evanúerit, in quo saliétur? Et réliqua.'
      - type: text
        text: Homilía sancti Augustíni Epíscopi
      - type: heading
        text: Lib. 1 de Sermone Domini in monte, cap. 6
      - type: text
        text: Osténdit Dóminus fátuos esse iudicándos, qui temporálium bonórum vel cópiam sectántes vel inópiam metuéntes, amíttunt ætérna, quæ nec dari possunt ab homínibus nec auférri. Itaque, si sal infatuátum fúerit, in quo saliétur? Id est, si vos, per quos condiéndi sunt quodámmodo pópuli, metu persecutiónum temporálium amiséritis regna cælórum; qui erunt hómines, per quos a vobis error auferátur, cum vos elégerit Deus, per quos errórem áuferat ceterórum?
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-9ea9eee77c:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to Matthew
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: At that time Jesus spake unto His disciples this parable A man, travelling into a far country, called his own servants, and delivered unto them his goods. And so on.
      - type: text
        text: Homily by Pope St Gregory (the Great.)
      - type: heading
        text: 9th on the Gospels.
      - type: text
        text: Dearly beloved brethren, this Lesson from the Holy Gospel moveth us to take good heed lest we, who are seen in this world to have received more than others, should thereby bring ourselves into greater condemnation from the Maker of this world. To whom much is given, of the same is much required. Therefore, let him that receiveth much, strive to be all the more lowly, and all the more ready to do God service, for his very gifts’ sake, knowing that he will be obliged to give account thereof. Behold, a man, travelling into a far country, calleth his own servants, and delivereth unto them talents, to the end that they may trade therewith. After a long time, the lord of those servants cometh, and reckoneth with them, and to them that have done well He rendereth a reward of their labours, but that servant which was careless of his master’s work He condemneth.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 25:14-23
      - type: text
        text: 'In illo témpore: Dixit Iesus discípulis suis parábolam hanc: Homo péregre proficíscens, vocávit servos suos, et trádidit illis bona sua. Et réliqua.'
      - type: text
        text: Homilía sancti Gregórii Papæ
      - type: heading
        text: Homilia 9 in Evangelia
      - type: text
        text: 'Léctio sancti Evangélii, fratres caríssimi, solícite consideráre nos ádmonet, ne nos, qui plus céteris in hoc mundo accepísse áliquid cérnimur, ab Auctóre mundi grávius inde iudicémur. Cum enim augéntur dona, ratiónes étiam crescunt donórum. Tanto ergo esse humílior atque ad serviéndum Deo prómptior quisque debet ex múnere, quanto se obligatiórem esse cónspicit in reddénda ratióne. Ecce homo, qui péregre proficíscitur, servos suos vocat, eisque ad negótium talénta partítur. Post multum vero témporis positúrus ratiónem revértitur: bene operántes pro apportáto lucro remúnerat, servum vero a bono ópere torpéntem damnat.'
  reading.l-ctio-sancti-evang-lii-sec-ndum-matth-um-aed447d6b1:
    role: reading
    content:
      en:
      - type: text
        text: From the Holy Gospel according to St. Matthew
      - type: citation
        text: Matt 25:1
      - type: text
        text: 'At that time, Jesus said to His disciples: The Kingdom of heaven shall be likened unto ten virgins, which took their lamps, and went forth to meet the Bridegroom and the Bride. And so on.'
      - type: text
        text: Homily by Pope St. Gregory the Great
      - type: heading
        text: 12th on the Gospels
      - type: text
        text: Dearly beloved brethren oftentimes do I warn you to fly corrupt conversation, and to keep yourselves unspotted from the world. But the portion which is this day read from the Holy Gospel doth oblige me to say that even to these good things which ye do, ye must needs take all careful heed. Look ye well to it, that, when ye work righteousness, ye do it not as seeking the praise and admiration of men, for if the lust of praise do once creep in, that which seemeth so fair without, loseth its reward within. Behold how the Redeemer speaketh of these ten virgins. He calleth them all virgins, yet entered not all of them into the door of blessedness, for there were some of them who sought outwardly the honour of virginity, but would take no oil within their vessels with their lamps.
      la:
      - type: text
        text: Léctio sancti Evangélii secúndum Matthǽum
      - type: citation
        text: Matt 25:1-13
      - type: text
        text: 'In illo témpore: Dixit Iesus discípulis suis parábolam hanc: Símile erit regnum cælórum decem virgínibus, quæ, accipiéntes lámpades suas, exiérunt óbviam sponso et sponsæ. Et réliqua.'
      - type: text
        text: Homilía sancti Gregórii Papæ
      - type: heading
        text: Homilía 12 in Evangelia
      - type: text
        text: Sæpe vos, fratres caríssimi, admóneo prava ópera fúgere, mundi huius inquinaménta devitáre, sed hodiérna sancti Evangélii lectióne compéllor dícere, ut, et bona, quæ ágitis, cum magna cautéla teneátis; ne per hoc, quod a vobis rectum géritur, favor aut grátia humána requirátur; ne appetítus laudis subrépat, et, quod foris osténditur, intus a mercéde vacuétur. Ecce enim Redemptóris voce decem vírgines, et omnes dicúntur vírgines, et tamen intra beatitúdinis iánuam non omnes sunt recéptæ; quia eárum quædam, dum de virginitáte sua glóriam foris éxpetunt, in vasis suis óleum habére noluérunt.
