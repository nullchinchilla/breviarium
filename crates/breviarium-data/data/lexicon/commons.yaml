  collect.deus-qui-sal-tis-t-rn-be-t-mar-virginit-te-fec-n-00bec7e28c:
    role: collect
    content:
      en:
      - type: text
        text: 'O God, Who, by the fruitful virginity of the Blessed Mary, hast given unto mankind the rewards of everlasting life; grant, we beseech thee, that we may continually feel the might of her intercession, through whom we have worthily received the Author of our life, our Lord Jesus Christ, thy Son:'
      - type: prayer
        text: Who with thee liveth and reigneth, in the unity of the Holy Spirit, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui salútis ætérnæ, beátæ Maríæ virginitáte fecúnda, humáno géneri prǽmia præstitísti: tríbue, quǽsumus; ut ipsam pro nobis intercédere sentiámus, per quam merúimus auctórem vitæ suscípere, Dóminum nostrum Iesum Christum Fílium tuum:'
      - type: prayer
        text: Qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who through the fruitful virginity of Blessed Mary have bestowed upon the human race the rewards of eternal salvation: grant, we pray, that we may experience her intercession for us, through whom we merited to receive the author of life, our Lord Jesus Christ your Son:'
      - type: prayer
        text: Who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.
      - type: response
        text: Amen.
  collect.ex-udi-nos-deus-salut-ris-noster-ut-sicut-de-be-4eec4c7370:
    role: collect
    content:
      en:
      - type: text
        text: Graciously hear us, O God of our salvation; that as we rejoice in the festivity of blessed N., we may be instructed in the affections of a loving devotion.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Exáudi nos, Deus, salutáris noster: ut sicut de beátæ N. festivitáte gaudémus; ita piæ devotiónis erudiámur afféctu.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Hear us, O God our Saviour: that as we rejoice in the feast of your blessed N., so we may be schooled in the spirit of devout affection.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.ex-udi-nos-deus-salut-ris-noster-ut-sicut-de-be-a585ac541a:
    role: collect
    content:
      en:
      - type: text
        text: Graciously hear us, O God of our salvation; that as we rejoice in the festivity of blessed N. thy Virgin, we may be instructed in the affections of a loving devotion.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Exáudi nos, Deus, salutáris noster: ut sicut de beátæ N. Vírginis tuæ festivitáte gaudémus; ita piæ devotiónis erudiámur afféctu.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Hear us, O God our Saviour: that as we rejoice in the feast of your blessed Virgin N., so we may be schooled in the spirit of devout affection.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.ex-udi-qu-sumus-d-mine-preces-nostras-quas-in-be-5860913078:
    role: collect
    content:
      en:
      - type: text
        text: Hear, O Lord, we beseech thee, the prayers which we offer thee on this the solemn feast-day of thy blessed Confessor and bishop N., and, for the sake of him who so nobly served thee, forgive us our trespasses.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Exáudi, quǽsumus, Dómine, preces nostras, quas in beáti N. Confessóris tui atque Pontíficis solemnitáte deférimus: et, qui tibi digne méruit famulári, eius intercedéntibus méritis, ab ómnibus nos absólve peccátis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'Hear, we pray, O Lord, our prayers, which we offer on the solemnity of your blessed Confessor and Pontiff N.: and grant that he, who merited to serve you worthily, may by his interceding merits absolve us from all sins.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.fid-lium-deus-mnium-c-nditor-et-red-mptor-anim-b-5eaa28b1d0:
    role: collect
    content:
      en:
      - type: text
        text: O God, Creator and Redeemer of all the faithful, grant to the souls of Your servants and handmaids the remission of all their sins, that by loving prayers they may obtain the forgiveness they have ever desired.
      - type: prayer
        text: Who livest and reignest with God the Father in the unity of the Holy Spirit, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Fidélium, Deus, ómnium Cónditor et Redémptor: animábus famulórum famularúmque tuárum remissiónem cunctórum tríbue peccatórum; ut indulgéntiam, quam semper optavérunt, piis supplicatiónibus consequántur:'
      - type: prayer
        text: Qui vivis et regnas cum Deo Patre, in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, Creator and Redeemer of all the faithful: grant to the souls of your servants and handmaids the remission of all their sins; that through devout supplications they may obtain the pardon they have always desired:'
      - type: prayer
        text: Who live and reign with God the Father, in the unity of the Holy Spirit, God, for ever and ever.
      - type: response
        text: Amen.
  collect.gregem-tuum-pastor-t-rne-plac-tus-int-nde-et-per-2287f55bab:
    role: collect
    content:
      en:
      - type: text
        text: Look forgivingly on thy flock, Eternal Shepherd, and keep it in thy constant protection, by the intercession of blessed N. and N. thy Martyrs and Sovereign Pontiffs, whom thou didst constitute Shepherds of the whole Church.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Gregem tuum, Pastor ætérne, placátus inténde: et per beátos N. et N. Mártyres tuos atque Summos Pontífices perpétua protectióne custódi; quos totíus Ecclésiæ præstitísti esse pastóres.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: Look graciously upon your flock, O eternal Shepherd, and keep it under the perpetual protection of your blessed Martyrs and Supreme Pontiffs N. and N., whom you established as shepherds of the whole Church.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.gregem-tuum-pastor-t-rne-plac-tus-int-nde-et-per-343eee7fc9:
