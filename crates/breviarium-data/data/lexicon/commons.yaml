  hymn.spice-infami-deus-ipse-ligno-23cae9b586:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Áspice, infami Deus ipse ligno
          Pendet, effuso madidus cruóre;
          Áspice, immiti manus alma clavo
          Finditur alte.

          Hunc, velut pravi scéleris minístrum;
          Inter indignos médium latrones,
          Cerne; crudelis fuit ista gentis
          Dira volúntas.

          Pallet heu! vultus; caput ecce lapsum
          Flectitur; clausis óculis, Redémptor
          Spíritum sacro, méritis onustum,
          Fundit ab ore.

          O cor, æs durum superas, gemendo,
          Ni scelus tergas; tua culpa Christum
          Stipiti affixit; tua culpa morti
          Súbdidit atræ.

          Sit Deo ætérnum decus omne in ævum,
          Qui pius nostri géneris Redémptor,
          Críminis labem miseris nocentem
          Sánguine tersit.
          Amen.
      en2:
      - type: text
        text: |-
          Behold, God himself hangs on the infamous wood,
          wet with his shed blood;
          behold, his gracious hand is cleft deeply
          by the merciless nail.
      
          Him, as the minister of a wicked crime,
          in the midst of unworthy thieves,
          consider; this was the dreadful will
          of the cruel people.
      
          Alas, his face grows pale; behold his head
          drops and bends; with eyes closed, the Redeemer
          pours forth his spirit from his sacred mouth,
          laden with merits.
      
          O heart, you surpass hard bronze in mourning,
          unless you wipe away your sin; your fault
          nailed Christ to the stake; your fault
          has subjected him to dark death.
      
          Let all eternal glory be to God for ever,
          who, the merciful Redeemer of our race,
          washed away by his Blood the stain of sin
          that was harming the wretched guilty.
          Amen.
  hymn.t-rna-christi-m-nera-8329ba6182:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Th' eternal gifts of Christ the King,
          The Apostles' glory, let us sing;
          And all with hearts of gladness raise
          Due hymns of thankful love and praise.

          For they the Church's princes are,
          Triumphant leaders in the war,
          The heavenly King's own warrior band,
          True lights to lighten every land.

          Theirs was the steadfast faith of saints,
          The hope that never yields nor faints,
          The love of Christ in perfect glow,
          That lay the prince of this world low.

          In them the Father's glory shone,
          In them the Spirit's will was done,
          The Son himself exults in them;
          Joy fills the new Jerusalem.

          Praise to the Father, with the Son,
          And Holy Spirit, Three in One;
          As ever was in ages past,
          And so shall be while ages last.
          Amen.
      la:
      - type: text
        text: |-
          Ætérna Christi múnera,
          Apostolórum glóriam,
          Palmas et hymnos débitos
          Lætis canámus méntibus.

          Ecclesiárum Príncipes,
          Belli triumpháles duces,
          Cæléstis aulæ mílites,
          Et vera mundi lúmina.

          Devóta Sanctórum fides,
          Invícta spes credéntium,
          Perfécta Christi cáritas
          Mundi tyránnum cónterit.

          In his Patérna glória,
          In his triúmphat Fílius,
          In his volúntas Spíritus,
          Cælum replétur gáudio.

          Patri, simúlque Fílio,
          Tibíque Sancte Spíritus,
          Sicut fuit, sit iúgiter
          Sæclum per omne glória.
          Amen.
      en2:
      - type: text
        text: |-
