  reading.acts-20-32-38-1da20f7ecc:
    role: reading
    content:
      la:
      - type: citation
        text: Acts 20:32-38
      - type: text
        text: 32 Et nunc comméndo vos Deo, et verbo grátiæ ipsíus, qui potens est ædificáre, et dare hereditátem in sanctificátis ómnibus.
      - type: text
        text: 33 Argéntum, et aurum, aut vestem nullíus concupívi, sicut
      - type: citation
        text: '34 ipsi scitis: quóniam ad ea quæ mihi opus erant, et his qui mecum sunt, ministravérunt manus istæ.'
      - type: citation
        text: '35 Ómnia osténdi vobis, quóniam sic laborántes, opórtet suscípere infírmos ac meminísse verbi Dómini Iesu: quóniam ipse dixit: Beátius est magis dare, quam accípere.'
      - type: text
        text: 36 Et cum haec dixísset, pósitis génibus suis orávit cum ómnibus illis.
      - type: citation
        text: '37 Magnus autem fletus factus est ómnium: et procumbéntes super collum Pauli, osculabántur eum,'
      - type: text
        text: 38 doléntes máxime in verbo quod díxerat, quóniam ámplius fáciem eius non essent visúri. Et deducébant eum ad navem.
  reading.acts-20-32-38-78145f20ae:
    role: reading
    content:
      en:
      - type: citation
        text: Acts 20:32-38
      - type: text
        text: 32 And now I commend you to God, and to the word of his grace, who is able to build up, and to give an inheritance among all the sanctified.
      - type: text
        text: 33 I have not coveted any man's silver, gold, or apparel, as
      - type: citation
        text: '34 You yourselves know: for such things as were needful for me and them that are with me, these hands have furnished.'
      - type: citation
        text: '35 I have showed you all things, how that so labouring you ought to support the weak, and to remember the word of the Lord Jesus, how he said: It is a more blessed thing to give, rather than to receive.'
      - type: text
        text: 36 And when he had said these things, kneeling down, he prayed with them all.
      - type: text
        text: 37 And there was much weeping among them all; and falling on the neck of Paul, they kissed him,
      - type: text
        text: 38 Being grieved most of all for the word which he had said, that they should see his face no more. And they brought him on his way to the ship.
      la:
      - type: citation
        text: Acts 20:32-38
      - type: text
