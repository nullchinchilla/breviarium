  responsory.iam-l-tus-m-riar-quia-vidi-f-ciem-tuam-et-sup-rs-1f8a18100f:
    role: responsory
    content:
      en:
      - type: response
        text: Now shall I die happy, since I have seen thy face, and do leave thee behind me. I am not disappointed of seeing thee.
      - type: text
        text: The Lord hath showed me also thy seed. Alleluia.
      - type: versicle
        text: He That hath fed me from my youth up, bless the lads, and let my name be named on them.
      - type: response
        text: The Lord hath showed me also thy seed. Alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: The Lord hath showed me also thy seed. Alleluia.
      la:
      - type: response
        text: 'Iam lætus móriar, quia vidi fáciem tuam, et supérstitem te relínquo. Non sum fraudátus aspéctu tuo:'
      - type: text
        text: Ínsuper osténdit mihi Dóminus semen tuum, allelúia.
      - type: versicle
        text: Qui pascit me ab adolescéntia mea, benedícat púeris istis, et invocétur super eos nomen meum.
      - type: response
        text: Ínsuper osténdit mihi Dóminus semen tuum, allelúia.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Ínsuper osténdit mihi Dóminus semen tuum, allelúia.
      en2:
      - type: response
        text: 'Now I shall die rejoicing, for I have seen your face, and I leave you as my survivor. I have not been deprived of the sight of you:'
      - type: text
        text: Moreover, the Lord has shown me your offspring, alleluia.
      - type: versicle
        text: May he who has nourished me from my youth bless these children, and may my name be invoked upon them.
      - type: response
        text: Moreover, the Lord has shown me your offspring, alleluia.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
        text: Moreover, the Lord has shown me your offspring, alleluia.
  responsory.in-dedicati-ne-templi-decant-bat-p-pulus-laudem-d3c58ccad2:
    role: responsory
    content:
      en:
      - type: response
        text: When the Temple was dedicated the people sang praise;
      - type: text
        text: And sweet in their mouths was the sound.
      - type: versicle
        text: The Lord's house is established in the top of the mountains; and all nations shall flow unto it.
      - type: response
        text: And sweet in their mouths was the sound.
      la:
      - type: response
        text: 'In dedicatióne templi decantábat pópulus laudem:'
      - type: text
        text: Et in ore eórum dulcis resonábat sonus.
      - type: versicle
        text: Fundáta est domus Dómini supra vérticem móntium, et vénient ad eam omnes gentes.
      - type: response
        text: Et in ore eórum dulcis resonábat sonus.
      en2:
      - type: response
        text: 'At the dedication of the temple the people sang praise:'
      - type: text
        text: And a sweet sound resounded in their mouths.
      - type: versicle
        text: The house of the Lord is founded upon the summit of the mountains, and all nations shall come to it.
      - type: response
        text: And a sweet sound resounded in their mouths.
