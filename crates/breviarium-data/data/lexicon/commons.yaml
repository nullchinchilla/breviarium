      - type: text
        text: 14 She is like the merchant's ship, she bringeth her bread from afar.
      - type: text
        text: 15 And she hath risen in the night, and given a prey to her household, and victuals to her maidens.
      - type: citation
        text: '16 She hath considered a field, and bought it: with the fruit of her hands she hath planted a vineyard.'
      - type: text
