  responsory.ave-mar-a-gr-tia-plena-d-minus-tecum-1d75e63e93:
    role: responsory
    content:
      en:
      - type: response
        text: Blessed art thou, O Virgin Mary, who hast carried the Lord, the Maker of the world.
      - type: text
        text: '* Thou hast borne Him Who created thee, and thou abidest a virgin for ever.'
      - type: versicle
        text: Hail, Mary, full of grace, the Lord is with thee.
      - type: response
        text: Thou hast borne him who created thee, and thou abidest a virgin for ever.
      la:
      - type: response
        text: 'Ave, María, grátia plena; Dóminus tecum:'
      - type: text
        text: '* Spíritus Sanctus supervéniet in te, et virtus Altíssimi obumbrábit tibi: quod enim ex te nascétur Sanctum, vocábitur Fílius Dei. (Allelúia.)'
      - type: versicle
        text: Quómodo fiet istud, quóniam virum non cognósco? Et respóndens Angelus, dixit ei.
      - type: response
        text: 'Spíritus Sanctus supervéniet in te, et virtus Altíssimi obumbrábit tibi: quod enim ex te nascétur Sanctum, vocábitur Fílius Dei. (Allelúia.)'
  responsory.b-nedic-d-mine-domum-istam-quam-dific-vi-n-mini-a71b036e1e:
    role: responsory
    content:
      en:
      - type: response
        text: O Lord, bless this house which I have built unto thy name. whosoever shall come unto this place and pray, then
      - type: text
        text: '* Hear thou from the excellent throne of thy glory.'
      - type: versicle
        text: O Lord, if thy people turn and pray toward thy sanctuary.
      - type: response
        text: Hear thou from the excellent throne of thy glory.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Hear Thou from the excellent throne of thy glory.
      la:
      - type: response
        text: 'Bénedic, Dómine, domum istam, quam ædificávi nómini tuo: veniéntium in loco isto'
      - type: text
        text: '* Exáudi preces in excélso sólio glóriæ tuæ.'
      - type: versicle
        text: Dómine, si convérsus fúerit pópulus tuus, et oráverit ad sanctuárium tuum.
      - type: response
        text: Exáudi preces in excélso sólio glóriæ tuæ.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Exáudi preces in excélso sólio glóriæ tuæ.
