  psalmody.sancti-tui-d-mine-flor-bunt-sicut-l-lium-allel-i-05d43f195e:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: 'Sancti tui, * Dómine, florébunt sicut lílium, allelúia: et sicut odor bálsami erunt ante te, allelúia.'
      - type: antiphon
        text: 'In cæléstibus regnis * Sanctórum habitátio est, allelúia: et in ætérnum réquies eórum, allelúia.'
      - type: antiphon
        text: In velaménto * clamábant Sancti tui, Dómine, allelúia, allelúia, allelúia.
      - type: antiphon
        text: Spíritus et ánimæ * iustórum hymnum dícite Deo nostro, allelúia, allelúia.
      - type: antiphon
        text: Fulgébunt iusti * sicut sol in conspéctu Dei, allelúia.
