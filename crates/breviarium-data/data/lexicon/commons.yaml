  reading.de-ep-stola-be-ti-pauli-ap-stoli-ad-rom-nos-50d58e537d:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the Acts of Apostles
      - type: citation
        text: Acts 20:17-24
      - type: text
        text: 17 And sending from Miletus to Ephesus, he called the ancients of the church.
      - type: citation
        text: '18 And when they were come to him, and were together, he said to them: You know from the first day that I came into Asia, in what manner I have been with you, for all the time,'
      - type: text
        text: 19 Serving the Lord with all humility, and with tears, and temptations which befell me by the conspiracies of the Jews;
      - type: text
        text: 20 How I have kept back nothing that was profitable to you, but have preached it to you, and taught you publicly, and from house to house,
      - type: text
        text: 21 Testifying both to Jews and Gentiles penance towards God, and faith in our Lord Jesus Christ.
      - type: citation
        text: '22 And now, behold, being bound in the spirit, I go to Jerusalem: not knowing the things which shall befall me there:'
      - type: citation
        text: '23 Save that the Holy Ghost in every city witnesseth to me, saying: That bands and afflictions wait for me at Jerusalem.'
      - type: text
        text: 24 But I fear none of these things, neither do I count my life more precious than myself, so that I may consummate my course and the ministry of the word which I received from the Lord Jesus, to testify the gospel of the grace of God.
      la:
      - type: text
        text: De Epístola beáti Pauli Apóstoli ad Romános
      - type: citation
        text: Rom 8:12-19
      - type: citation
        text: '12 Fratres: Debitóres sumus non carni, ut secúndum carnem vivámus.'
      - type: citation
        text: '13 Si enim secúndum carnem vixéritis, moriémini: si autem spíritu facta carnis mortificavéritis, vivétis.'
      - type: text
        text: 14 Quicúmque enim spíritu Dei agúntur, ii sunt fílii Dei.
      - type: citation
        text: '15 Non enim accepístis spíritum servitútis íterum in timóre, sed accepístis spíritum adoptiónis filiórum, in quo clamámus: Abba (Pater).'
      - type: text
        text: 16 Ipse enim Spíritus testimónium reddit spirítui nostro quod sumus fílii Dei.
      - type: citation
        text: '17 Si autem fílii, et herédes: herédes, quidem Dei, coherédes autem Christi: si tamen compátimur ut et conglorificémur.'
      - type: text
        text: 18 Exístimo enim quod non sunt condígnæ passiónes huius témporis ad futúram glóriam, quæ revelábitur in nobis.
      - type: text
        text: 19 Nam exspectátio creatúræ revelatiónem filiórum Dei exspéctat.
  reading.de-ep-stola-be-ti-pauli-ap-stoli-ad-rom-nos-53470a0a2b:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the letter of St Paul the Apostle to the Romans
      - type: citation
        text: Rom 8:12-19
      - type: text
        text: 12 Therefore, brethren, we are debtors, not to the flesh, to live according to the flesh.
      - type: citation
        text: '13 For if you live according to the flesh, you shall die: but if by the Spirit you mortify the deeds of the flesh, you shall live.'
      - type: text
        text: 14 For whosoever are led by the Spirit of God, they are the sons of God.
      - type: citation
        text: '15 For you have not received the spirit of bondage again in fear; but you have received the spirit of adoption of sons, whereby we cry: Abba, Father.'
      - type: text
        text: 16 For the Spirit himself giveth testimony to our spirit, that we are the sons of God.
      - type: citation
        text: '17 And if sons, heirs also; heirs indeed of God, and joint heirs with Christ: yet so, if we suffer with him, that we may be also glorified with him.'
      - type: text
        text: 18 For I reckon that the sufferings of this time are not worthy to be compared with the glory to come, that shall be revealed in us.
      - type: text
        text: 19 For the expectation of the creature waiteth for the revelation of the sons of God
