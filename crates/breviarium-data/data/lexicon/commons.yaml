  reading.de-ep-stola-prima-be-ti-pauli-ap-stoli-ad-cor-nt-1b303e0078:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to the Corinthians
      - type: citation
        text: 1 Cor 4:1-5
      - type: text
        text: |-
          1 Let a man so account of us as of the ministers of Christ, and the dispensers of the mysteries of God.
          2 Here now it is required among the dispensers, that a man be found faithful.
          3 But to me it is a very small thing to be judged by you, or by man's day; but neither do I judge my own self.
          4 For I am not conscious to myself of any thing, yet am I not hereby justified; but he that judgeth me, is the Lord.
          5 Therefore judge not before the time; until the Lord come, who both will bring to light the hidden things of darkness, and will make manifest the counsels of the hearts; and then shall every man have praise from God.
      la:
      - type: text
        text: De Epístola prima beáti Pauli Apóstoli ad Corínthios
      - type: citation
        text: 1 Cor 4:1-5
      - type: text
        text: |-
          1 Sic nos exístimet homo ut minístros Christi, et dispensatóres mysteriórum Dei.
          2 Hic iam quǽritur inter dispensatóres ut fidélis quis inveniátur.
          3 Mihi autem pro mínimo est ut a vobis iúdicer, aut ab humáno die: sed neque meípsum iúdico.
          4 Nihil enim mihi cónscius sum, sed non in hoc iustificátus sum: qui autem iúdicat me, Dóminus est.
          5 Ítaque nolíte ante tempus iudicáre, quoadúsque véniat Dóminus: qui et illuminábit abscóndita tenebrárum, et manifestábit consília córdium: et tunc laus erit unicuíque a Deo.
      en2:
      - type: text
        text: From the First Epistle of the blessed Apostle Paul to the Corinthians
      - type: citation
        text: 1 Cor 4:1-5
      - type: text
        text: |-
          1 Accordingly, let man consider us to be ministers of Christ and attendants of the mysteries of God.
          2 Here and now, it is required of attendants that each one be found to be faithful.
          3 But as for me, it is such a small thing to be judged by you, or by the age of mankind. And neither do I judge myself.
          4 For I have nothing on my conscience. But I am not justified by this. For the Lord is the One who judges me.
          5 And so, do not choose to judge before the time, until the Lord returns. He will illuminate the hidden things of the darkness, and he will make manifest the decisions of hearts. And then each one shall have praise from God.
  reading.de-ep-stola-prima-be-ti-pauli-ap-stoli-ad-cor-nt-67fc42fe43:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to the Corinthians
      - type: citation
        text: 1 Cor 7:25-31
      - type: text
        text: |-
          25 Now concerning virgins, I have no commandment of the Lord; but I give counsel, as having obtained mercy of the Lord, to be faithful.
          26 I think therefore that this is good for the present necessity, that it is good for a man so to be.
          27 Art thou bound to a wife? seek not to be loosed. Art thou loosed from a wife? seek not a wife.
          28 But if thou take a wife, thou hast not sinned. And if a virgin marry, she hath not sinned: nevertheless, such shall have tribulation of the flesh. But I spare you.
          29 This therefore I say, brethren; the time is short; it remaineth, that they also who have wives, be as if they had none;
          30 And they that weep, as though they wept not; and they that rejoice, as if they rejoiced not; and they that buy, as though they possessed not;
          31 And they that use this world, as if they used it not: for the fashion of this world passeth away.
      la:
      - type: text
        text: De Epístola prima beáti Pauli Apóstoli ad Corínthios
      - type: citation
        text: 1 Cor 7:25-31
      - type: text
        text: |-
          25 De virgínibus præcéptum Dómini non hábeo: consílium autem do, tamquam misericórdiam consecútus a Dómino, ut sim fidélis.
          26 Exístimo ergo hoc bonum esse propter instántem necessitátem, quóniam bonum est hómini sic esse.
          27 Alligátus es uxóri? noli quǽrere solutiónem. Solútus es ab uxóre? noli quǽrere uxórem.
          28 Si autem accéperis uxórem, non peccásti. Et si núpserit virgo, non peccávit. Tribulatiónem tamen carnis habébunt huiúsmodi. Ego autem vobis parco.
          29 Hoc ítaque dico, fratres: Tempus breve est: réliquum est, ut et qui habent uxóres, tamquam non habéntes sint;
          30 et qui flent, tamquam non flentes; et qui gaudent, tamquam non gaudéntes; et qui emunt, tamquam non possidéntes;
          31 et qui utúntur hoc mundo, tamquam non utántur; prǽterit enim figúra huius mundi.
      en2:
      - type: text
        text: From the First Epistle of the blessed Apostle Paul to the Corinthians
      - type: citation
        text: 1 Cor 7:25-31
      - type: text
        text: |-
          25 Now, concerning virgins, I have no commandment from the Lord. But I give counsel, as one who has obtained the mercy of the Lord, so as to be faithful.
          26 Therefore, I consider this to be good, because of the present necessity: that it is good for a man to be such as I am.
          27 Are you bound to a wife? Do not seek to be freed. Are you free of a wife? Do not seek a wife.
          28 But if you take a wife, you have not sinned. And if a virgin has married, she has not sinned. Even so, such as these will have the tribulation of the flesh. But I would spare you from this.
          29 And so, this is what I say, brothers: The time is short. What remains of it is such that: those who have wives should be as if they had none;
          30 and those who weep, as though they were not weeping; and those who rejoice, as if they were not rejoicing; and those who buy, as if they possessed nothing;
          31 and those who use the things of this world, as if they were not using them. For the figure of this world is passing away.
  reading.de-ep-stola-prima-be-ti-pauli-ap-stoli-ad-tim-th-610e70fe32:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the first letter of St. Paul the Apostle to Timothy
      - type: citation
        text: 1 Tim 3:1-7
      - type: text
        text: |-
          1 A faithful saying: if a man desire the office of a bishop, he desireth a good work.
          2 It behoveth therefore a bishop to be blameless, the husband of one wife, sober, prudent, of good behaviour, chaste, given to hospitality, a teacher,
          3 Not given to wine, no striker, but modest, not quarrelsome, not covetous, but
          4 One that ruleth well his own house, having his children in subjection with all chastity.
          5 But if a man know not how to rule his own house, how shall he take care of the church of God?
          6 Not a neophyte: lest being puffed up with pride, he fall into the judgment of the devil.
          7 Moreover he must have a good testimony of them who are without: lest he fall into reproach and the snare of the devil.
      la:
      - type: text
        text: De Epístola prima beáti Pauli Apóstoli ad Timótheum
      - type: citation
        text: 1 Tim 3:1-7
      - type: text
        text: |-
          1 Fidélis sermo: si quis episcopátum desíderat, bonum opus desíderat.
          2 Opórtet ergo epíscopum irreprehensíbilem esse, uníus uxóris virum, sóbrium, prudéntem, ornátum, pudícum, hospitálem, doctórem,
          3 non vinoléntum, non percussórem, sed modéstum; non litigiósum, non cúpidum, sed
          4 suæ dómui bene præpósitum, fílios habéntem súbditos cum omni castitáte.
          5 Si quis autem dómui suæ præésse nescit, quómodo Ecclésiæ Dei diligéntiam habébit?
          6 Non neóphytum, ne in supérbiam elátus, in iudícium íncidat diáboli.
          7 Opórtet autem illum et testimónium habére bonum ab iis qui foris sunt, ut non in oppróbrium íncidat, et in láqueum diáboli.
      en2:
      - type: text
        text: From the First Epistle of the blessed Apostle Paul to Timothy
      - type: citation
        text: 1 Tim 3:1-7
      - type: text
        text: |-
          1 It is a faithful saying: if a man desires the episcopate, he desires a good work.
          2 Therefore, it is necessary for a bishop to be beyond reproach, the husband of one wife, sober, prudent, gracious, chaste, hospitable, a teacher,
          3 not a drunkard, not combative but restrained, not quarrelsome, not covetous;
          4 but a man who leads his own house well, having children who are subordinate with all chastity.
          5 For if a man does not know how to lead his own house, how will he take care of the Church of God?
          6 He must not be a new convert, lest, being elated by pride, he may fall under the sentence of the devil.
          7 And it is necessary for him also to have good testimony from those who are outside, so that he may not fall into disrepute and the snare of the devil.
