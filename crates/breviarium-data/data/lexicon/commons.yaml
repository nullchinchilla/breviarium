  responsory.isti-sunt-qui-viv-ntes-in-carne-plantav-runt-ecc-ccf4972881:
    role: responsory
    content:
      en:
      - type: response
        text: These are they who while yet they lived in the flesh, planted the Church in their own blood;
      - type: text
        text: They drank of the Lord's cup, and became the friends of God.
      - type: versicle
        text: Their sound is gone out through all the earth, and their words to the ends of the world.
      - type: response
        text: They drank of the Lord's cup, and became the friends of God.
