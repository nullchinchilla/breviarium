  reading.cum-vero-unus-idemque-narrator-utr-mque-dicat-ut-83981d0a4a:
    role: reading
    content:
      la:
      - type: text
        text: 'Cum vero unus idemque narrator utrúmque dicat, utrúmque commendet, et virum Mariae Ioseph, et Christi Virginem Matrem, et Christum ex semine David, et Ioseph in serie progeneratorum Christi ex David: quid restat, nisi et Mariam non fuisse extraneam a cognatione David, et eam Ioseph coniugem non frustra appellatam propter órdinem sexus et animorum confoederationem; et Ioseph potius propter dignitatem virilem ab ordine generationum illarum non fuisse separandum, ne hoc ipso viderétur ab illa femina separatus, cui eum coniungebat mentis affectus?'
      en2:
      - type: text
        text: When, moreover, one and the same narrator declares both, commends both — the man Joseph of Mary, and the Virgin Mother of Christ, and Christ from the seed of David, and Joseph in the line of the ancestors of Christ from David — what remains, but that Mary was not a stranger to the lineage of David, and that she was not in vain called the wife of Joseph on account of the order of her sex and the union of hearts; and that Joseph ought rather, on account of the dignity of the male sex, not to have been separated from the order of those generations, lest by this very fact he might seem to be separated from that woman to whom the affection of his mind joined him?
  reading.de-ctibus-apostol-rum-644a4b270e:
    role: reading
    content:
      en:
      - type: text
        text: Lesson from the Acts of Apostles
      - type: citation
        text: Acts 20:17-24
      - type: text
        text: |-
          17 And sending from Miletus to Ephesus, he called the ancients of the church.
          18 And when they were come to him, and were together, he said to them: You know from the first day that I came into Asia, in what manner I have been with you, for all the time,
          19 Serving the Lord with all humility, and with tears, and temptations which befell me by the conspiracies of the Jews;
          20 How I have kept back nothing that was profitable to you, but have preached it to you, and taught you publicly, and from house to house,
          21 Testifying both to Jews and Gentiles penance towards God, and faith in our Lord Jesus Christ.
          22 And now, behold, being bound in the spirit, I go to Jerusalem: not knowing the things which shall befall me there:
          23 Save that the Holy Ghost in every city witnesseth to me, saying: That bands and afflictions wait for me at Jerusalem.
          24 But I fear none of these things, neither do I count my life more precious than myself, so that I may consummate my course and the ministry of the word which I received from the Lord Jesus, to testify the gospel of the grace of God.
      la:
      - type: text
        text: De Áctibus Apostolórum
      - type: citation
        text: Acts 20:17-24
      - type: text
        text: |-
          17 A Miléto Paulus mittens Éphesum, vocávit maióres natu Ecclésiæ.
          18 Qui cum veníssent ad eum, et simul essent, dixit eis: Vos scitis a prima die qua ingréssus sum in Ásiam, quáliter vobíscum per omne tempus fúerim,
          19 sérviens Dómino cum omni humilitáte, et lácrimis, et tentatiónibus, quae mihi accidérunt ex insídiis Iudæórum:
          20 quómodo nihil subtráxerim utílium, quóminus annuntiárem vobis et docérem vos, públice et per domos,
          21 testíficans Iudǽis atque Gentílibus in Deum pœniténtiam, et fidem in Dóminum nostrum Iesum Christum.
          22 Et nunc ecce alligátus ego spíritu, vado in Ierúsalem: quæ in ea ventúra sint mihi, ignórans:
          23 nisi quod Spíritus Sanctus per omnes civitátes mihi protestátur, dicens: Quóniam víncula et tribulatiónes Ierosólymis me manent.
          24 Sed nihil horum véreor: nec fácio ánimam meam pretiosiórem quam me, dúmmodo consúmmem cursum meum, et ministérium verbi quod accépi a Dómino Iesu, testificári Evangélium grátiæ Dei.
      en2:
      - type: text
        text: From the Acts of the Apostles
      - type: citation
        text: Acts 20:17-24
      - type: text
        text: |-
          17 Then, sending from Miletus to Ephesus, Paul called the elders of the church.
          18 And when they had come to him and were together, he said to them: 'You know that from the first day when I entered into Asia, I have been with you, for the entire time, in this manner:
          19 serving the Lord, with all humility and despite the tears and trials which befell me from the treacheries of the Jews,
          20 how I held back nothing that was of value, how well I have preached to you, and that I have taught you publicly and throughout the houses,
          21 testifying both to Jews and to Gentiles about repentance in God and faith in our Lord Jesus Christ.
          22 And now, behold, being obliged in spirit, I am going to Jerusalem, not knowing what will happen to me there,
          23 except that the Holy Spirit, throughout every city, has cautioned me, saying that chains and tribulations await me at Jerusalem.
          24 But I dread none of these things. Neither do I consider my life to be more precious because it is my own, provided that in some way I may complete my own course and that of the ministry of the Word, which I received from the Lord Jesus, to testify to the Gospel of the grace of God.'
