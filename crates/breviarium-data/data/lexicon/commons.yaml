      - type: psalmody
        antiphon: His left hand * is under my head, and his right hand shall embrace me.
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: Return, * return, O Shulammite; return, that we may behold you.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: In your beauty * and your comeliness go forth, advance prosperously, and reign.
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: 'God will help her * with his countenance: God is in her midst, she shall not be moved.'
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: Many waters * could not quench charity.
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: I am dark * but beautiful, O daughters of Jerusalem; and so the King has loved me, and brought me into his chamber.
        psalms:
