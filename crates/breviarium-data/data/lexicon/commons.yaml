  responsory.hon-stum-fecit-illum-d-minus-et-custod-vit-eum-a-037a1be09a:
    role: responsory
    content:
      la:
      - type: response
        text: 'Honéstum fecit illum Dóminus, et custodívit eum ab inimícis, et a seductóribus tutávit illum:'
      - type: text
        text: Et dedit illi claritátem ætérnam.
      - type: versicle
        text: Descendítque cum illo in fóveam, et in vínculis non derelíquit eum.
      - type: response
        text: Et dedit illi claritátem ætérnam.
      en2:
      - type: response
        text: 'The Lord made him honorable, and guarded him from his enemies, and protected him from those who would lead him astray:'
      - type: text
        text: And gave him everlasting glory.
      - type: versicle
        text: And he went down with him into the pit, and in chains he did not abandon him.
      - type: response
