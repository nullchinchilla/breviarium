      - type: text
        text: Confessióne sédulus,
      - type: text
        text: Ieiúna membra déferens,
      - type: text
        text: Dapes supérnas óbtinet.
      - type: text
        text: Proínde te piíssime
      - type: text
        text: 'Precámur omnes súpplices:'
      - type: text
        text: Nobis ut huius grátia
      - type: text
        text: Pœnas remíttas débitas.
      - type: text
        text: '* Patri perénnis glória,'
      - type: text
        text: Natóque Patris único,
      - type: text
        text: Sanctóque sit Paráclito,
      - type: text
        text: Per omne semper sǽculum.
      - type: text
        text: Amen.
  hymn.iesu-cor-na-v-rginum-128e3a0529:
    role: hymn
    content:
      la:
      - type: text
        text: Iesu, coróna Vírginum,
      - type: text
        text: Quem Mater illa cóncipit
      - type: text
        text: Quæ sola Virgo párturit,
      - type: text
        text: 'Hæc vota clemens áccipe:'
      - type: text
        text: Qui pergis inter lília
      - type: text
        text: Septus choréis Vírginum,
      - type: text
        text: Sponsus decórus glória
      - type: text
        text: Sponsísque reddens prǽmia.
      - type: text
        text: Quocúmque tendis, Vírgines
      - type: text
        text: Sequúntur, atque láudibus
      - type: text
        text: Post te canéntes cúrsitant,
      - type: text
        text: Hymnósque dulces pérsonant;
      - type: text
        text: Te deprecámur súpplices,
      - type: text
        text: Nostris ut addas sénsibus
      - type: text
        text: Nescíre prorsus ómnia
      - type: text
        text: Corruptiónis vúlnera.
      - type: text
        text: '* Virtus, honor, laus, glória'
      - type: text
        text: Deo Patri cum Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.iesu-cor-na-v-rginum-b730218016:
    role: hymn
    content:
      en:
      - type: text
        text: Jesu, the virgins' crown, do thou
      - type: text
        text: Accept us as in prayer we bow;
      - type: text
        text: Born of that Virgin, whom alone
      - type: text
        text: The mother and the maid we own.
      - type: text
        text: Amongst the lilies thou dost feed,
      - type: text
        text: By virgin choirs accompanied;
      - type: text
        text: With glory decked, the spotless brides
      - type: text
        text: Whose bridal gifts thy love provides.
      - type: text
        text: They, wheresoe'er thy footsteps bend,
      - type: text
        text: 'With hymns and praises still attend:'
      - type: text
        text: In blessèd troops they follow thee,
      - type: text
        text: With dance, and song, and melody.
      - type: text
        text: We pray thee therefore to bestow
      - type: text
        text: Upon our senses here below
      - type: text
        text: Thy grace, that so we may endure
      - type: text
        text: From taint of all corruption pure.
      - type: text
        text: '* All laud to God the Father be,'
      - type: text
        text: All praise, eternal Son, to thee;
      - type: text
        text: All glory as is ever meet,
      - type: text
        text: To God, the holy Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Iesu, coróna Vírginum,
      - type: text
        text: Quem Mater illa cóncipit
      - type: text
        text: Quæ sola Virgo párturit,
      - type: text
        text: 'Hæc vota clemens áccipe:'
      - type: text
        text: Qui pergis inter lília
      - type: text
