          Te ergo quǽsumus, tuis fámulis súbveni, * quos pretióso sánguine redemísti.
          Ætérna fac cum Sanctis tuis * in glória numerári.
          Ætérna fac cum Sanctis tuis * in glória munerári.
          Salvum fac pópulum tuum, Dómine, * et bénedic hereditáti tuæ.
          Et rege eos, * et extólle illos usque in ætérnum.
          Per síngulos dies * benedícimus te.
          (Fit reverentia, secundum consuetudinem) Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Et laudámus nomen tuum in sǽculum, * et in sǽculum sǽculi.
          Dignáre, Dómine, die isto * sine peccáto nos custodíre.
          Miserére nostri, Dómine, * miserére nostri.
          Fiat misericórdia tua, Dómine, super nos, * quemádmodum sperávimus in te.
          In te, Dómine, sperávi: * non confúndar in ætérnum.
      en2:
      - type: text
        text: |-
          "I am," he says, "the true vine, and my Father is the vinedresser." Are the vinedresser and the vine one? According to this, then, Christ is the vine, according to what he says: "The Father is greater than I." But according to what he says: "I and the Father are one," he himself is also the vinedresser — not such as those who render service by working from without, but such as to give increase even from within. For neither he who plants is anything, nor he who waters, but God, who gives the increase. But certainly Christ is God, since the Word was God: wherefore he and the Father are one. And if the Word was made flesh, what he was not, what he was remains.
          We praise you, O God, * we acknowledge you as Lord.
          All the earth worships you, * the eternal Father.
          To you all Angels, * to you the Heavens, and all the Powers:
          To you the Cherubim and Seraphim * cry out without ceasing:
          (A bow is made) Holy, Holy, Holy, * Lord God of Hosts.
          Heaven and earth are full * of the majesty of your glory.
          The glorious choir * of the Apostles,
