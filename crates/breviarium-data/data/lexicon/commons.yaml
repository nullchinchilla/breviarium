  responsory.ioseph-fili-david-noli-tim-re-acc-pere-mar-am-c-0d9c4dbeb9:
    role: responsory
    content:
      en:
      - type: response
        text: Joseph, thou Son of David, fear not to take unto thee Mary thy wife; for That Which is conceived in her is of the Holy Ghost and she shall bring forth a Son;
      - type: text
        text: And thou shalt call His Name Jesus. Alleluia.
      - type: versicle
        text: For He shall save His people from their sins.
      - type: response
        text: And thou shalt call His Name Jesus. Alleluia.
      la:
      - type: response
        text: 'Ioseph, fili David, noli timére accípere Maríam cóniugem tuam; quod enim in ea natum est, de Spíritu Sancto est: páriet autem fílium,'
      - type: text
        text: Et vocábis nomen eius Iesum, allelúia.
      - type: versicle
        text: Ipse enim salvum fáciet pópulum suum a peccátis eórum.
      - type: response
        text: Et vocábis nomen eius Iesum, allelúia.
      en2:
      - type: response
        text: 'Joseph, son of David, do not be afraid to take Mary as your wife; for that which is born in her is of the Holy Spirit: and she shall bring forth a son,'
      - type: text
        text: And you shall call his name Jesus, alleluia.
      - type: versicle
        text: For he shall save his people from their sins.
      - type: response
        text: And you shall call his name Jesus, alleluia.
