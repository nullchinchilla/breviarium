  psalmody.o-quam-pulchra-est-casta-gener-tio-cum-clarit-te-19b0fe5819:
    role: psalmody
    content:
      la:
      - type: psalmody
        antiphon: O quam pulchra * est casta generátio cum claritáte!
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Læva eius * sub cápite meo, et déxtera illíus amplexábitur me.
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: Revértere, * revértere, Sunamítis; revértere, ut intueámur te.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: Spécie tua * et pulchritúdine tua inténde, próspere procéde, et regna.
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: 'Adiuvábit eam * Deus vultu suo: Deus in médio eius, non commovébitur.'
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: Aquæ multæ * non potuérunt exstínguere caritátem.
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: Nigra sum, * sed formósa, fíliæ Ierúsalem; ídeo diléxit me Rex, et introdúxit me in cubículum suum.
        psalms:
        - number: '95'
      - type: psalmody
        antiphon: 'Trahe me post te, * in odórem currémus unguentórum tuórum: óleum effúsum nomen tuum.'
        psalms:
        - number: '96'
      - type: psalmody
        antiphon: Veni, Sponsa Christi, * áccipe corónam, quam tibi Dóminus præparávit in ætérnum.
        psalms:
        - number: '97'
  psalmody.o-quam-pulchra-est-casta-gener-tio-cum-clarit-te-ad9f6f7c26:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: O how lovely and glorious * is the generation of the chaste.
        psalms:
        - number: '8'
      - type: psalmody
        antiphon: Sing for us again and again before this maiden's bed * the tender idylls of the play.
        psalms:
        - number: '18'
      - type: psalmody
        antiphon: Return, return, O Shulammith * Return, return, that we may look upon thee.
        psalms:
        - number: '23'
      - type: psalmody
        antiphon: In thy comeliness and thy beauty, * go forward, fare prosperously, and reign.
        psalms:
        - number: '44'
      - type: psalmody
        antiphon: 'God shall help * her with His countenance: God is in the midst of her; she shall not be moved.'
        psalms:
        - number: '45'
      - type: psalmody
        antiphon: Many waters cannot * quench love.
        psalms:
        - number: '47'
      - type: psalmody
        antiphon: I am black but comely, * O ye daughters of Jerusalem; therefore hath the King loved me, and brought me into his chamber.
        psalms:
        - number: '95'
      - type: psalmody
