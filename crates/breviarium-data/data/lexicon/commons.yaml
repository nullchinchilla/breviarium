  reading.vos-estis-lumen-mundi-qu-modo-dixit-sup-rius-sal-2996611bf6:
    role: reading
    content:
      en:
      - type: text
        text: 'Ye are the light of the world. And we are to understand the word World in the same sense as the word Earth when he spoke above of the salt of the earth, that is, not that earth whereupon we walk with our bodily feet, but the men which dwell upon the earth; in other words, sinners, for the sweetening and correction of whose corruption, the Lord hath sent his Apostles, as it were, as so much salt. And so by the world we are to understand, not the heaven and the earth, but the men who are in the world and love the world, for the enlightening of whom the Apostles have been sent. A city that is set on a hill cannot be hid: that is, what is founded upon the heights of righteousness, whereof the mountain upon which the Lord gave this discourse was itself a figure, is magnificent in the eyes of all men.'
