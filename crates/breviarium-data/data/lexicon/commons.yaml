      - type: response
        text: Amen.
  collect.deus-qui-nos-a-nnua-sancto-rum-m-rtyrum-tu-rum-n-a296672422:
    role: collect
    content:
      en:
      - type: text
        text: O God, Who gladden us by the annual festival of Your Martyrs N. and N., grant that we may be inspired by the example of those in whose merits we rejoice.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui nos ánnua sanctórum Mártyrum tuórum N. et N. sollemnitáte lætíficas: concéde propítius; ut, quorum gaudémus méritis, accendámur exémplis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who gladden us by the annual solemnity of your holy Martyrs N. and N.: graciously grant that we, who rejoice in their merits, may be enkindled by their example.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.deus-qui-nos-be-ti-n-confess-ris-tui-nnua-solemn-15d3c5fbb4:
    role: collect
    content:
      en:
      - type: text
        text: O God, Who, year by year, dost gladden us by the solemn feast-day of thy blessed confessor N., mercifully grant unto all who keep his birthday, grace to follow after the pattern of his godly conversation.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui nos beáti N. Confessóris tui ánnua solemnitáte lætíficas: concéde propítius; ut cuius natalítia cólimus, étiam actiónes imitémur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who gladden us by the annual solemnity of your blessed Confessor N.: graciously grant that we, whose birth to heaven we celebrate, may also imitate his deeds.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.deus-qui-nos-be-ti-n-m-rtyris-tui-atque-pont-fic-df0537c667:
    role: collect
    content:
      en:
      - type: text
        text: O God, who year by year dost gladden us by the solemn feast day of thy Blessed Martyr and Bishop N., mercifully grant that we who keep his birthday, may ever feel the joyful effects of his protection.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Deus, qui nos beáti N. Mártyris tui atque Pontíficis ánnua solemnitáte lætíficas: concéde propítius; ut, cuius natalítia cólimus, de eiúsdem étiam protectióne gaudeámus.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who gladden us by the annual solemnity of your blessed Martyr and Pontiff N.: graciously grant that, as we celebrate his birth to heaven, we may also rejoice in his protection.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  collect.deus-qui-nos-beat-rum-n-et-n-confess-rum-tu-rum-aaba420826:
    role: collect
    content:
      la:
      - type: text
        text: 'Deus, qui nos beatórum N. et N. Confessórum tuórum atque Pontíficum confessiónibus gloriósus circumdas et protegis: da nobis, et eórum imitatióne proficere, et intercessióne gaudére.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: 'Ecclésiam tuam, Dómine, beatórum N. et N. Confessórum tuórum atque Pontíficum continua protectióne custódi: ut, sicut illos pastorális sollicitúdo gloriosos réddidit; ita nos eórum intercessio in tuo semper fáciat amóre ferventes.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: text
        text: 'O God, who surround and protect us gloriously by the confessions of your blessed Confessors and Pontiffs N. and N.: grant us both to advance by imitating them and to rejoice in their intercession.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
      - type: text
        text: 'Guard your Church, O Lord, by the continual protection of your blessed Confessors and Pontiffs N. and N.: that, as pastoral solicitude made them glorious, so their intercession may keep us ever fervent in your love.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
