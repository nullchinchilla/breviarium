        text: 'Ego sum, inquit, vitis vera: et Pater meus agrícola est. Numquid unum sunt agrícola et vitis? Secúndum hoc ergo vitis Christus, secúndum quod ait: Pater maior me est. Secúndum autem id, quod ait: Ego, et Pater unum sumus; et ipse agrícola est: nec talis, quales sunt, qui extrínsecus operándo éxhibent ministérium: sed talis, ut det étiam intrínsecus increméntum. Nam neque qui plantat est áliquid, neque qui rigat: sed, qui increméntum dat, Deus. Sed útique Deus est Christus, quia Deus erat Verbum: unde ipse, et Pater unum sunt. Et, si Verbum caro factum est, quod non erat, manet quod erat.'
