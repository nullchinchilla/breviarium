  psalmody.d-rige-d-mine-deus-meus-in-consp-ctu-tuo-viam-me-a4e1296a40:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: Make my way straight before thy face, * O Lord my God.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: Return, O Lord, deliver my soul * O save me for thy mercy's sake.
        psalms:
        - number: '6'
      - type: psalmody
        antiphon: Lest he tear my soul like a lion, * while there is none to deliver, or to save.
        psalms:
        - number: '7'
      - type: psalmody
        antiphon: He maketh me to lie down * in green pastures.
        psalms:
        - number: '22'
      - type: psalmody
        antiphon: Lord, remember not the sins of my youth, * nor my transgressions.
        psalms:
        - number: '24'
      - type: psalmody
        antiphon: I believe that I shall yet see the goodness of the Lord * in the land of the living.
        psalms:
        - number: '26'
      - type: psalmody
        antiphon: Be pleased, O Lord, to deliver me * O Lord, look upon me to help me.
        psalms:
        - number: '39'
      - type: psalmody
        antiphon: Lord, heal my soul; * for I have sinned against thee.
        psalms:
        - number: '40'
      - type: psalmody
        antiphon: My soul thirsteth for the living God; * when shall I come and appear before God?
        psalms:
        - number: '41'
      la:
      - type: psalmody
        antiphon: Dírige, * Dómine, Deus meus, in conspéctu tuo viam meam.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: 'Convértere, * Dómine, et éripe ánimam meam: quóniam non est in morte, qui memor sit tui.'
        psalms:
        - number: '6'
      - type: psalmody
        antiphon: Nequándo rápiat * ut leo ánimam meam, dum non est qui rédimat, neque qui salvum fáciat.
        psalms:
        - number: '7'
      - type: psalmody
        antiphon: In loco páscuæ * ibi me collocávit.
        psalms:
        - number: '22'
      - type: psalmody
        antiphon: Delícta * iuventútis meæ, et ignorántias meas ne memíneris, Dómine.
        psalms:
        - number: '24'
      - type: psalmody
        antiphon: Credo vidére * bona Dómini in terra vivéntium.
        psalms:
        - number: '26'
      - type: psalmody
        antiphon: 'Compláceat * tibi, Dómine, ut erípias me: Dómine, ad adiuvándum me réspice.'
        psalms:
        - number: '39'
      - type: psalmody
        antiphon: Sana, Dómine, * ánimam meam, quia peccávi tibi.
        psalms:
        - number: '40'
      - type: psalmody
        antiphon: 'Sitívit * ánima mea ad Deum vivum: quando véniam, et apparébo ante fáciem Dómini?'
        psalms:
        - number: '41'
      en2:
      - type: psalmody
        antiphon: Direct, * O Lord my God, my way in your sight.
        psalms:
        - number: '5'
      - type: psalmody
        antiphon: 'Return, * O Lord, and deliver my soul: for in death there is none who is mindful of you.'
        psalms:
        - number: '6'
      - type: psalmody
        antiphon: Lest at any time * he seize my soul like a lion, while there is no one to redeem me, nor to save me.
        psalms:
        - number: '7'
      - type: psalmody
        antiphon: In a place of pasture * there he has settled me.
        psalms:
        - number: '22'
      - type: psalmody
        antiphon: The sins * of my youth and my ignorances, do not remember, O Lord.
        psalms:
        - number: '24'
      - type: psalmody
        antiphon: I believe to see * the good things of the Lord in the land of the living.
        psalms:
        - number: '26'
      - type: psalmody
        antiphon: 'May it please you, * O Lord, to deliver me: O Lord, look upon me to help me.'
        psalms:
        - number: '39'
      - type: psalmody
        antiphon: Heal my soul, * O Lord, for I have sinned against you.
        psalms:
        - number: '40'
      - type: psalmody
        antiphon: 'My soul thirsted * for the living God: when shall I come and appear before the face of the Lord?'
        psalms:
        - number: '41'
