        text: Amen.
  collect.in-anniversario-dedicationis-ecclesi-72f6a0c0fb:
    role: collect
    content:
      en:
      - type: heading
        text: 'Prayer on the anniversary of the dedication:'
      - type: text
        text: O God, who dost every year bring round unto us again the day whereon this thine holy temple was hallowed, and bringest us again in soundness of body and mind to be present at thine holy worship, graciously hear the supplications of thy people, and grant that whosoever shall come into this thine house to ask good at thine hand, may be rejoiced in the obtaining of all his request.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: heading
        text: In Anniversario Dedicationis Ecclesiæ
      - type: text
        text: 'Deus, qui nobis per síngulos annos huius sancti templi tui consecratiónis réparas diem, et sacris semper mystériis repræséntas incólumes: exáudi preces pópuli tui, et præsta; ut quisquis hoc templum benefícia petitúrus ingréditur, cuncta se impetrásse lætétur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.indulg-ntiam-nobis-qu-sumus-d-mine-be-ta-n-virgo-6305b2dfac:
    role: collect
    content:
      en:
      - type: text
        text: O Lord, we pray thee, that thy blessed handmaiden and witness N. in whom Thou hast ever been well pleased, because of her worthy maidenhood and her mighty showing-forth of thy power, may entreat thy pardon on our behalf.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Indulgéntiam nobis, quǽsumus, Dómine, beáta N. Virgo et Martyr implóret: quæ tibi grata semper éxstitit, et mérito castitátis, et tuæ professióne virtútis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.infirmit-tem-nostram-r-spice-omn-potens-deus-et-34b3096453:
    role: collect
    content:
      en:
      - type: text
        text: Mercifully consider our weakness, O Almighty God, and whereas by the burden of our sins we are sore, may the glorious intercession of blessed N., Your Martyr and Bishop, sustain us.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Infirmitátem nostram réspice, omnípotens Deus: et, quia pondus própriæ actiónis gravat, beáti N. Mártyris tui atque Pontíficis intercéssio gloriósa nos prótegat.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.infirmit-tem-nostram-r-spice-omn-potens-deus-et-9f29db4cd3:
    role: collect
    content:
      en:
      - type: text
        text: Mercifully consider our weakness, O Almighty God, and whereas by the burden of our sins we are sore, let N. your Martyr be mercifully pleased to deliver us from all things which may hurt our bodies, and from all evil thoughts which may defile our souls.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Infirmitátem nostram réspice, omnípotens Deus: et, quia pondus própriæ actiónis gravat, beáti N. Mártyris tui atque Pontíficis intercéssio gloriósa nos prótegat.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: ut, qui beáti N. Mártyris tui natalítia cólimus, intercessióne eius in tui nóminis amóre roborémur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: ut, intercedénte beáto N. Mártyre tuo, et a cunctis adversitátibus liberémur in córpore, et a pravis cogitatiónibus mundémur in mente.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.infirmit-tem-nostram-r-spice-omn-potens-deus-et-aeda7323ac:
    role: collect
    content:
      la:
      - type: text
        text: 'Infirmitátem nostram réspice, omnípotens Deus: et, quia pondus própriæ actiónis gravat, beáti N. Mártyris tui atque Pontíficis intercéssio gloriósa nos prótegat.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: ut, qui beáti N. Mártyris tui natalítia cólimus, intercessióne eius in tui nóminis amóre roborémur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.infirmit-tem-nostram-r-spice-omn-potens-deus-et-f577eebf63:
    role: collect
    content:
      en:
      - type: text
        text: O God, who givest us joy by the annual solemnity of blessed N. Thy martyr and bishop, mercifully grant that we may rejoice in his protection whose birthday we celebrate.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Infirmitátem nostram réspice, omnípotens Deus: et, quia pondus própriæ actiónis gravat, beáti N. Mártyris tui atque Pontíficis intercéssio gloriósa nos prótegat.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: 'Deus, qui nos beáti N. Mártyris tui atque Pontíficis ánnua solemnitáte lætíficas: concéde propítius; ut, cuius natalítia cólimus, de eiúsdem étiam protectióne gaudeámus.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.interc-ssio-nos-qu-sumus-d-mine-be-ti-n-abb-tis-50ef1a5806:
    role: collect
    content:
      en:
      - type: text
        text: May the pleading of blessed N., the Abbot, make us acceptable unto thee, O Lord, we pray; that what we may not have through any merits of ours, we may gain by means of his patronage.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Intercéssio nos, quǽsumus, Dómine, beáti N. Abbátis comméndet: ut, quod nostris méritis non valémus, eius patrocínio assequámur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.oratio-propria-7939a86c97:
    role: collect
    content:
      la:
      - type: heading
        text: Oratio propria.
  collect.pr-sta-qu-sumus-omn-potens-deus-ut-interced-nte-dc4833e8a5:
    role: collect
    content:
      en:
      - type: text
        text: Graciously hear us, we beseech thee, O Almighty God, and, at the petition of thy blessed Martyr, N. be mercifully pleased to deliver us from all things which may hurt our bodies, and from all evil thoughts which may defile our souls.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: ut, intercedénte beáto N. Mártyre tuo, et a cunctis adversitátibus liberémur in córpore, et a pravis cogitatiónibus mundémur in mente.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  collect.pr-sta-qu-sumus-omn-potens-deus-ut-qui-be-ti-n-m-1ddb7261c6:
    role: collect
    content:
      en:
      - type: text
        text: Grant, we beseech thee, almighty God, that we who celebrate the martyrdom of blessed N., through his intercession be strengthened in your love.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: ut, qui beáti N. Mártyris tui natalítia cólimus, intercessióne eius in tui nóminis amóre roborémur.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  hymn.alto-ex-ol-mpi-v-rtice-9f6367d0f3:
    role: hymn
    content:
      en:
      - type: text
        text: From highest heaven, the Father's Son,
      - type: text
        text: Descending like that mystic stone
      - type: text
        text: Cut from a mountain without hands,
      - type: text
        text: Came down below, and filled all lands;
      - type: text
        text: Uniting, midway in the sky,
      - type: text
        text: His house on earth, and house on high.
      - type: text
        text: That house on high, it ever rings
      - type: text
        text: With praises of the King of kings;
      - type: text
        text: Forever there, on harps divine,
      - type: text
        text: They hymn th' eternal One and Trine;
      - type: text
        text: We, here below, the strain prolong,
      - type: text
        text: And faintly echo Sion's song.
      - type: text
        text: O Lord of lords invisible!
      - type: text
        text: 'With thy pure light this temple fill:'
      - type: text
        text: Hither, oft as invoked, descend;
      - type: text
        text: Here to thy people's prayer attend;
      - type: text
        text: Here, through all hearts, forevermore,
      - type: text
        text: thy Spirit's quick'ning graces pour.
      - type: text
        text: Here may the faithful, day by day,
      - type: text
        text: Their hearts' adoring homage pay;
      - type: text
        text: And here receive from thy dear love
      - type: text
        text: The blessings of that home above;
      - type: text
        text: Till loosened from this mortal chain,
      - type: text
        text: Its everlasting joys they gain.
      - type: text
        text: To God the Father, glory due
      - type: text
        text: Be paid by all the heavenly host;
      - type: text
        text: And to his only Son most true;
      - type: text
        text: With thee, O mighty Holy Ghost!
      - type: text
        text: To whom, praise, power, and blessing be,
      - type: text
        text: Through th' ages of eternity,
      - type: text
        text: Amen.
      la:
      - type: text
        text: Alto ex Olýmpi vértice
      - type: text
        text: Summi Paréntis Fílius,
      - type: text
        text: Ceu monte deséctus lapis
      - type: text
        text: Terras in imas décidens,
      - type: text
        text: Domus supérnæ et ínfimæ
      - type: text
        text: Utrúmque iunxit ángulum.
      - type: text
        text: Sed illa sedes cǽlitum
      - type: text
        text: Semper resúltat láudibus,
      - type: text
        text: Deúmque trinum et únicum
      - type: text
        text: 'Iugi canóre prǽdicat:'
      - type: text
        text: Illi canéntes iúngimur
      - type: text
        text: Almæ Siónis ǽmuli.
      - type: text
        text: Hæc templa, Rex cæléstium,
      - type: text
        text: 'Imple benígno lúmine:'
      - type: text
        text: Huc, o rogátus, ádveni,
      - type: text
        text: Plebísque vota súscipe,
      - type: text
        text: Et nostra corda iúgiter
      - type: text
        text: Perfúnde cæli grátia.
      - type: text
        text: Hic ímpetrent fidélium
      - type: text
        text: Voces precésque súpplicum
      - type: text
        text: Domus beátæ múnera,
      - type: text
        text: 'Partísque donis gáudeant:'
      - type: text
        text: Donec, solúti córpore,
      - type: text
        text: Sedes beátas ímpleant.
      - type: text
        text: Decus Parénti débitum
      - type: text
        text: Sit usquequáque Altíssimo,
      - type: text
        text: Natóque Patris único,
      - type: text
        text: Et ínclito Paráclito,
      - type: text
        text: Cui laus, potéstas, glória
      - type: text
        text: Ætérna sit per sǽcula.
      - type: text
        text: Amen.
  hymn.c-l-stis-urbs-ier-salem-724d67c976:
    role: hymn
    content:
      en:
      - type: text
        text: Thou heavenly, new Jerusalem,
      - type: text
        text: Vision of peace in prophet's dream!
      - type: text
        text: With living stones built up on high,
      - type: text
        text: And rising to yon starry sky;
      - type: text
        text: In bridal pomp thy form is crowned,
      - type: text
        text: With thousand thousand angels round!
      - type: text
        text: O bride, betrothed in happy hour,
      - type: text
        text: The Father's glory is thy dower;
      - type: text
        text: The bridegroom's grace is shed on thee
      - type: text
        text: Thou queen all fair eternally;
      - type: text
        text: To Christ allied, thy Prince adored,
      - type: text
        text: Bright shining city of the Lord!
      - type: text
        text: Behold with pearls they glittering stand
      - type: text
        text: thy peaceful gates to all expand;
      - type: text
        text: By grace and strength divinely shed
      - type: text
        text: Each mortal thither may be led;
      - type: text
        text: Who, kindled by Christ's love, will dare
      - type: text
        text: All earthly sufferings now to bear.
      - type: text
        text: By many a salutary stroke,
      - type: text
        text: By many a weary blow that broke,
      - type: text
        text: Or polished with a workman's skill,
      - type: text
        text: The stones that form that glorious pile,
      - type: text
        text: They all are fitly framed to lie
      - type: text
        text: In their appointed place on high.
      - type: text
        text: Fair and well pleasing in thy sight,
      - type: text
        text: Parent most high, enthroned in light,
      - type: text
        text: And for thine only Son most meet,
      - type: text
        text: And thee, all-glorious Paraclete,
      - type: text
        text: To whom praise, power, and glory rise
      - type: text
        text: Forever through the eternal skies.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Cæléstis urbs Ierúsalem,
      - type: text
        text: Beáta pacis vísio,
      - type: text
        text: Quæ celsa de vivéntibus
      - type: text
        text: Saxis ad astra tólleris,
      - type: text
        text: Sponsǽque ritu cíngeris
      - type: text
        text: Mille Angelórum míllibus.
      - type: text
        text: O sorte nupta próspera,
      - type: text
        text: Dotáta Patris glória,
      - type: text
        text: Respérsa Sponsi grátia,
      - type: text
        text: Regína formosíssima,
      - type: text
        text: Christo iugáta Príncipi,
      - type: text
        text: Cæli corúsca cívitas.
      - type: text
        text: Hic margarítis émicant,
      - type: text
        text: Paténtque cunctis óstia;
      - type: text
        text: Virtúte namque prǽvia
      - type: text
        text: Mortális illuc dúcitur,
      - type: text
        text: Amóre Christi pércitus
      - type: text
        text: Torménta quisquis sústinet.
      - type: text
        text: Scalpri salúbris íctibus
      - type: text
        text: Et tunsióne plúrima,
      - type: text
        text: Fabri políta málleo
      - type: text
        text: Hanc saxa molem cónstruunt,
      - type: text
        text: Aptísque iuncta néxibus
      - type: text
        text: Locántur in fastígio.
      - type: text
        text: Decus Parénti débitum
      - type: text
        text: Sit usquequáque Altíssimo,
      - type: text
        text: Natóque Patris único,
      - type: text
        text: Et ínclito Paráclito,
      - type: text
        text: Cui laus, potéstas, glória
      - type: text
        text: Ætérna sit per sǽcula.
      - type: text
        text: Amen.
  hymn.christo-prof-sum-s-nguinem-06096c7784:
    role: hymn
    content:
      en:
      - type: text
        text: The martyrs' triumphs let us sing,
      - type: text
        text: Their blood poured forth for Christ the King,
      - type: text
        text: And while due hymns of praise we pay,
      - type: text
        text: Our thankful hearts cast grief away.
      - type: text
        text: The world its terrors urged in vain;
      - type: text
        text: They recked not of the body's pain;
      - type: text
        text: One step, and holy death made sure
      - type: text
        text: The life that ever shall endure.
      - type: text
        text: To flames the martyr saints are hailed;
      - type: text
        text: By teeth of savage beasts assailed;
      - type: text
        text: Against them, armed with ruthless brand
      - type: text
        text: And hooks of steel, their torturers stand.
      - type: text
        text: The mangled frame is tortured sore,
      - type: text
        text: The holy life-drops freshly pour;
      - type: text
        text: They stand unmoved amidst the strife,
      - type: text
        text: By grace of everlasting life.
      - type: text
        text: Redeemer, hear us of thy love,
      - type: text
        text: That, with the martyr host above,
      - type: text
        text: Hereafter, of thine endless grace,
      - type: text
        text: thy servants also may have place.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Christo profúsum sánguinem,
      - type: text
        text: Et Mártyrum victórias,
      - type: text
        text: Dignámque cælo láuream
      - type: text
        text: Lætis sequámur vócibus.
      - type: text
        text: Terróre victo sǽculi,
      - type: text
        text: Pœnísque spretis córporis,
      - type: text
        text: Mortis sacræ compéndio
      - type: text
        text: Vitam beátam póssident.
      - type: text
        text: Tradúntur igni Mártyres,
      - type: text
        text: Et bestiárum déntibus;
      - type: text
        text: Armáta sævit úngulis
      - type: text
        text: Tortóris insáni manus.
      - type: text
        text: Nudáta pendent víscera,
      - type: text
        text: Sanguis sacrátus fúnditur;
      - type: text
        text: Sed pérmanent immóbiles,
      - type: text
        text: Vitæ perénnis grátia.
      - type: text
        text: Te nunc, Redémptor, quǽsumus,
      - type: text
        text: Ut mártyrum consórtio
      - type: text
        text: Iungas precántes sérvulos
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.christo-prof-sum-s-nguinem-2047d1b157:
    role: hymn
    content:
      la:
      - type: text
        text: Christo profúsum sánguinem,
      - type: text
        text: Et Mártyrum victórias,
      - type: text
        text: Dignámque cælo láuream
      - type: text
        text: Lætis sequámur vócibus.
