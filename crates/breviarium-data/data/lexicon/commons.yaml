      - type: text
        text: Témporis ævo.
      - type: text
        text: Amen.
  invitatory.ave-mar-a-gr-tia-plena-d-minus-tecum-822c15fbb7:
    role: invitatory
    content:
      en:
      - type: antiphon
        text: Hail Mary, full of grace, * The Lord is with thee.
      la:
      - type: antiphon
