  responsory.sancti-tui-d-mine-mir-bile-consec-ti-sunt-iter-s-e6287cda60:
    role: responsory
    content:
      en:
      - type: response
        text: thy Saints, O Lord, have passed a wonderful way, serving thy commandments, that they might be found without hurt in the midst of the mighty waters.
      - type: text
        text: Dry land appeared, and, out of the Red Sea, a way without impediment.
      - type: versicle
        text: He smote the rock, and the waters gushed out, and the streams overflowed.
      - type: response
        text: Dry land appeared, and, out of the Red Sea, a way without impediment.
      la:
      - type: response
        text: 'Sancti tui, Dómine, mirábile consecúti sunt iter, serviéntes præcéptis tuis, ut inveniréntur illǽsi in aquis válidis:'
      - type: text
        text: 'Terra appáruit árida: et in Mari Rubro via sine impediménto.'
      - type: versicle
        text: Quóniam percússit petram, et fluxérunt aquæ, et torréntes inundavérunt.
      - type: response
        text: 'Terra appáruit árida: et in Mari Rubro via sine impediménto.'
      en2:
      - type: response
        text: 'Your holy ones, O Lord, have followed a wonderful way, serving your commandments, that they might be found unharmed in the mighty waters:'
      - type: text
        text: 'The dry land appeared: and in the Red Sea there was a way without obstacle.'
      - type: versicle
        text: For he struck the rock, and waters flowed, and torrents overflowed.
      - type: response
        text: 'The dry land appeared: and in the Red Sea there was a way without obstacle.'
  responsory.sancti-tui-d-mine-mir-bile-consec-ti-sunt-iter-s-e6d1e56cab:
    role: responsory
    content:
      la:
