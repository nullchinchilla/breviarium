  reading.si-enim-agn-scens-re-tum-suum-ipse-se-a-div-no-a-50dacba74b:
    role: reading
    content:
      en:
      - type: text
        text: For if he acknowledge his iniquity, and withdraw himself from the Altar of God, he will soon attain unto the mercy of the pardon of God, for, as he that exalted himself shall be abased, so shall he that humbleth himself be exalted. (Luke xiv. n.) He who, as I have said, acknowledging his iniquity, withdraweth himself through lowliness from the Altar of the Church, till he have mended his life, need have but little fear that he will be excommunicated from the eternal marriage supper in heaven.
      la:
      - type: text
        text: Si enim, agnóscens reátum suum, ipse se a divíno altári subtráxerit, cito ad indulgéntiam divínæ misericórdiæ pervéniet. Quia, sicut qui se exáltat, humiliábitur; ita, e contrário, qui se humíliat ab altári Ecclésiæ pro emendatióne vitæ removére volúerit, ab ætérno illo et cælésti convívio excommunicári pénitus non timébit.
      en2:
      - type: text
        text: For if one, acknowledging his own guilt, withdraws himself from the divine altar, he will quickly attain to the indulgence of divine mercy. For, just as he who exalts himself will be humbled; so, on the contrary, he who humbles himself and wills to be removed from the altar of the Church for the amendment of his life will have no fear of being utterly excluded from that eternal and heavenly banquet.
  reading.sir-24-11-13-09b6b4d418:
    role: reading
    content:
      la:
      - type: citation
        text: Sir 24:11-13
      - type: text
        text: |-
          11 In ómnibus réquiem quæsívi, et in hereditáte Dómini morábor.
          12 Tunc præcépit, et dixit mihi Creátor ómnium: et qui creávit me, requiévit in tabernáculo meo.
          13 Et dixit mihi: In Iacob inhábita, et in Israël hereditáre, et in eléctis meis mitte radíces.
      en2:
      - type: citation
        text: Sir 24:11-13
      - type: text
        text: |-
          11 And by virtue, I have tread upon the hearts of all, the great and the lowly. And I have sought my rest in all of them. And I will continue, as the inheritance of the Lord.
          12 Then the Creator of all things instructed and spoke with me. And the One who created me rested in my tabernacle.
          13 And he said to me: 'Let your dwelling place be with Jacob, and let your inheritance be in Israel, for you shall take root among my elect.'
