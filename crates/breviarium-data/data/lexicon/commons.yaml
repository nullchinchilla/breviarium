  psalmody.plac-bo-d-mino-in-regi-ne-viv-rum-58640c855f:
    role: psalmody
    content:
      en:
      - type: psalmody
        antiphon: I will walk before the Lord * in the land of the living.
        psalms:
        - number: '114'
      - type: psalmody
        antiphon: Woe is me! O Lord, * that my sojourn is long
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: The Lord shall keep thee from all evil, * the Lord shall keep thy soul.
        psalms:
        - number: '120'
      - type: psalmody
        antiphon: If Thou, Lord, shouldest mark iniquities, * O Lord, who shall stand.
        psalms:
        - number: '129'
      - type: psalmody
        antiphon: O Lord, forsake not * the works of thine own hands.
        psalms:
        - number: '137'
      la:
      - type: psalmody
        antiphon: Placébo Dómino * in regióne vivórum.
        psalms:
        - number: '114'
      - type: psalmody
        antiphon: Heu mihi Dómine, * quia incolátus meus prolongátus est.
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: 'Dóminus custódit te ab omni malo: * custódiat ánimam tuam Dóminus.'
        psalms:
        - number: '120'
      - type: psalmody
        antiphon: 'Si iniquitátes * observáveris, Dómine: Dómine, quis sustinébit?'
        psalms:
        - number: '129'
      - type: psalmody
        antiphon: Opera * mánuum tuárum, Dómine, ne despícias.
        psalms:
        - number: '137'
      en2:
      - type: psalmody
        antiphon: I will please the Lord * in the land of the living.
        psalms:
        - number: '114'
      - type: psalmody
        antiphon: Woe is me, O Lord, * for my sojourning is prolonged.
        psalms:
        - number: '119'
      - type: psalmody
        antiphon: 'The Lord keeps you from all evil: * may the Lord keep your soul.'
        psalms:
        - number: '120'
      - type: psalmody
        antiphon: 'If you, O Lord, shall mark iniquities: * O Lord, who shall endure it?'
        psalms:
        - number: '129'
      - type: psalmody
        antiphon: The works * of your hands, O Lord, do not despise.
        psalms:
        - number: '137'
  psalmody.qui-me-conf-ssus-f-erit-coram-hom-nibus-confit-b-6a1c172a81:
    role: psalmody
    content:
      la:
      - type: antiphon
        text: Qui me conféssus fúerit * coram homínibus, confitébor et ego eum coram Patre meo.
      - type: antiphon
        text: Qui séquitur me, * non ámbulat in ténebris, sed habébit lumen vitæ, dicit Dóminus.
      - type: antiphon
        text: 'Qui mihi minístrat, * me sequátur: et ubi ego sum, illic sit et miníster meus.'
      - type: antiphon
        text: Si quis mihi ministráverit, * honorificábit eum Pater meus, qui est in cælis, dicit Dóminus.
      - type: antiphon
        text: Volo Pater, * ut ubi ego sum, illic sit et miníster meus.
      en2:
      - type: antiphon
        text: Whoever shall confess me * before men, I also will confess him before my Father.
      - type: antiphon
        text: Whoever follows me * does not walk in darkness, but shall have the light of life, says the Lord.
      - type: antiphon
        text: 'Whoever serves me, * let him follow me: and where I am, there also shall my servant be.'
      - type: antiphon
        text: If anyone serves me, * my Father who is in heaven will honor him, says the Lord.
      - type: antiphon
        text: I will, Father, * that where I am, there also shall my servant be.
