  reading.inclin-vit-gitur-caput-ccidit-enim-morientibus-v-2b43849c6c:
    role: reading
    content:
      la:
      - type: text
        text: 'Inclinávit ígitur caput. Áccidit enim morientibus, vigore carnis iam consumpto et ánima, quæ corpus retinet, abeunte, inclinatio cápitis. Quamóbrem verbis hoc modo usus Evangelísta est. Sic et tradidisse spíritum, a consuetúdine nostra sibi dictum est; multi enim sic exstingui, et mori dicúntur. Quamvis mihi videátur ídeo non simplíciter mórtuum esse, sed tradidisse spíritum Evangelísta dixísse; quia in manus Dei Patris ánimam suam commendávit, ut ipse dixit: Pater! in manus tuas comméndo spíritum meum. Quod nobis magnæ spei fundaméntum, atque oríginem præbet.'
      en2:
      - type: text
        text: 'He bowed his head. For this is what happens to the dying when the vigor of the flesh is now spent and the soul, which holds the body together, departs: a bowing of the head. This, therefore, is the language the Evangelist used. So also "gave up his spirit" is said after the manner of our experience; for many are said to be extinguished and to die in this way. Although it seems to me that the Evangelist did not say simply that he died, but that he gave up his spirit, because he commended his soul into the hands of God the Father, as he himself said: "Father, into your hands I commend my spirit." This furnishes us with a great foundation and source of hope.'
  reading.iob-10-1-7-a786b975f5:
    role: reading
    content:
      en:
      - type: citation
        text: Job 10:1-7
      - type: text
        text: |-
          1 My soul is weary of my life, I will let go my speech against myself, I will speak in the bitterness of my soul.
          2 I will say to God: Do not condemn me: tell me why thou judgest me so.
          3 Doth it seem good to thee that thou shouldst calumniate me, and oppress me, the work of thy own hands, and help the counsel of the wicked?
          4 Hast thou eyes of flesh: or, shalt thou see as man seeth?
          5 Are thy days as the days of man, and are thy years as the times of men:
          6 That thou shouldst inquire after my iniquity, and search after my sin?
          7 And shouldst know that I have done no wicked thing, whereas there is no man that can deliver out of thy hand.
      la:
      - type: citation
        text: Iob 10:1-7
      - type: text
        text: |-
          1 Tædet ánimam meam vitæ meæ; dimíttam advérsum me elóquium meum: loquar in amaritúdine ánimæ meæ.
          2 Dicam Deo: Noli me condemnáre; índica mihi cur me ita iúdices.
          3 Numquid bonum tibi vidétur, si calumniéris me, et ópprimas me opus mánuum tuárum, et consílium impiórum ádiuves?
          4 Numquid óculi cárnei tibi sunt? aut sicut videt homo, et tu vidébis?
          5 Numquid sicut dies hóminis dies tui, et anni tui sicut humána sunt témpora,
          6 ut quæras iniquitátem meam, et peccátum meum scrutéris,
          7 et scias quia nihil ímpium fécerim, cum sit nemo qui de manu tua possit erúere?
      en2:
      - type: citation
        text: Iob 10:1-7
      - type: text
        text: |-
          1 My soul is weary of my life. I will release my words against myself. I will speak in the bitterness of my soul.
          2 I will say to God: Do not be willing to condemn me. Reveal to me why you judge me this way.
          3 Does it seem good to you, if you find fault with me and oppress me, the work of your own hands, and assist the counsel of the impious?
          4 Do you have bodily eyes? Or, just as man sees, will you see?
          5 Are your days just like the days of man, and are your years as the times of humans,
          6 so that you would inquire about my iniquity and examine my sin?
          7 And you know that I have done nothing impious, yet there is no one who can deliver from your hand.
  reading.iob-10-18-22-62fe4702af:
    role: reading
    content:
      en:
      - type: citation
        text: Job 10:18-22
      - type: text
        text: |-
          18 Why didst thou bring me forth out of the womb: O that I had been consumed that eye might not see me!
          19 I should have been as if I had not been, carried from the womb to the grave.
          20 Shall not the fewness of my days be ended shortly? suffer me, therefore, that I may lament my sorrow a little:
          21 Before I go, and return no more, to a land that is dark and covered with the mist of death:
          22 A land of misery and darkness, where the shadow of death, and no order, but everlasting horror dwelleth.
      la:
      - type: citation
        text: Iob 10:18-22
      - type: text
        text: |-
          18 Quare de vulva eduxísti me? qui útinam consúmptus essem, ne óculus me vidéret.
          19 Fuíssem quasi non essem, de útero translátus ad túmulum.
          20 Numquid non páucitas diérum meórum finiétur brevi? dimítte ergo me, ut plangam páululum dolórem meum,
          21 ántequam vadam, et non revértar, ad terram tenebrósam, et opértam mortis calígine:
          22 terram misériæ et tenebrárum, ubi umbra mortis et nullus ordo, sed sempitérnus horror inhábitat.
      en2:
      - type: citation
        text: Iob 10:18-22
      - type: text
        text: |-
          18 Why did you lead me out of the womb? If only I had been consumed, so that no eye would ever see me!
          19 I should have been as if I had not been: transferred from the womb to the tomb.
          20 Will not my few days be completed soon? Release me, therefore, so that I may lament my sorrows a little,
          21 before I depart and return no more to a land that is dark and covered with the fog of death,
          22 a land of misery and darkness, where the shadow of death, and nothing else but everlasting horror, dwells.
  reading.iob-10-8-12-c18318a181:
    role: reading
    content:
      en:
      - type: citation
        text: Job 10:8-12
      - type: text
        text: |-
          8 thy hands have made me, and fashioned me wholly round about, and dost thou thus cast me down headlong on a sudden?
          9 Remember, I beseech thee, that thou hast made me as the clay, and thou wilt bring me into dust again.
          10 Hast thou not milked me as milk, and curdled me like cheese?
          11 Thou hast clothed me with skin and flesh: thou hast put me together with bones and sinews:
          12 Thou hast granted me life and mercy, and thy visitation hath preserved my spirit.
      la:
      - type: citation
        text: Iob 10:8-12
      - type: text
        text: |-
          8 Manus tuæ fecérunt me, et plasmavérunt me totum in circúitu: et sic repénte præcípitas me?
          9 Meménto, quæso, quod sicut lutum féceris me, et in púlverem redúces me.
          10 Nonne sicut lac mulsísti me, et sicut cáseum me coagulásti?
          11 Pelle et cárnibus vestísti me; óssibus et nervis compegísti me.
          12 Vitam et misericórdiam tribuísti mihi, et visitátio tua custodívit spíritum meum.
      en2:
      - type: citation
        text: Iob 10:8-12
      - type: text
        text: |-
          8 Your hands have made me and formed me all around, and, in this way, do you suddenly throw me away?
          9 Remember, I ask you, that you have fashioned me like clay, and you will reduce me to dust.
          10 Have you not extracted me like milk and curdled me like cheese?
          11 You have clothed me with skin and flesh. You have put me together with bones and nerves.
          12 You have assigned to me life and mercy, and your visitation has preserved my spirit.
