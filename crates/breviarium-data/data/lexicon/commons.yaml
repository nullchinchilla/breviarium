          Iungas precántes sérvulos
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          With glad voices let us follow
          the Blood poured out for Christ
          and the victories of the Martyrs
          and the laurel crown worthy of heaven.
      
          With the terror of the world overcome
          and the punishments of the body scorned,
          by the swift passage of holy death
          they possess the blessed life.
      
          The Martyrs are given to the fire
          and to the teeth of beasts;
          the hand of the frenzied torturer
          brandishes armed hooks.
      
          Their naked bowels are exposed,
          their sacred blood is shed;
          but they remain unmoved,
          by the grace of eternal life.
      
          You now, O Redeemer, we implore,
          that you join us who pray
          to the fellowship of the Martyrs
          through all eternal ages.
          Amen.
  hymn.deus-tu-rum-m-litum-2ca4c418e5:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Deus tuórum mílitum
          Sors, et córona, prǽmium,
          Laudes canéntes Mártyris
          Absólve nexu críminis.

          Hic nempe mundi gáudia,
          Et blanda fraudum pábula
          Imbúta felle députans,
          Pervénit ad cæléstia.

          Pœnas cucúrrit fórtiter,
          Et sústulit viríliter,
          Fundénsque pro te sánguinem,
          Ætérna dona póssidet.

          Ob hoc precátu súpplici
          Te póscimus, piíssime;
          In hoc triúmpho Mártyris
          Dimítte noxam sérvulis.

          Laus et perénnis glória
          Patri sit, atque Fílio,
          Sancto simul Paráclito,
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          O God, the lot, crown, and reward
          of your soldiers:
          as we sing the praises of the Martyr,
          free us from the bond of sin.
      
          For he, reckoning the joys of this world
          and the enticing food of deception
          as bitter gall,
          arrived at the things of heaven.
      
          He ran bravely through his punishments
          and bore them manfully,
          and, shedding his blood for you,
          now possesses eternal gifts.
      
          For this, with suppliant prayer
          we entreat you, most merciful One;
          in this triumph of the Martyr
          forgive your servants their offenses.
      
          Let enduring praise and glory
          be to the Father, and to the Son,
          and likewise to the Holy Paraclete,
          through all eternal ages.
          Amen.
  hymn.deus-tu-rum-m-litum-3e8d721bed:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O God, of those that fought thy fight,
          Portion, and prize, and crown of light,
          Break every bond of sin and shame
          As now we praise thy martyr's name.

          He recked not of the world's allure,
          But sin and pomp of sin forswore:
          Knew all their gall, and passed them by,
          And reached the throne prepared on high.

          Bravely the course of pain he ran,
          And bare his torments as a man:
          For love of thee his blood outpoured,
          And thus obtained the great reward.

          With humble voice and suppliant word
          We pray thee therefore, holy Lord,
          While we thy martyr's feast-day keep,
          Forgive thy loved and erring sheep.

          Glory and praise for aye be done
          To God the Father, and the Son,
          And Holy Ghost, who reign on high,
          One God, to all eternity.
          Amen.
