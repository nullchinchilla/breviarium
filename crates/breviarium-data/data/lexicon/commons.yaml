      en:
      - type: versicle
        text: This place is holy, wherein the Priest prayeth.
      - type: response
        text: For the pardon of the transgressions and offences of the people.
      la:
      - type: versicle
        text: Locus iste sanctus est, in quo orat sacérdos.
      - type: response
        text: Pro delíctis et peccátis pópuli.
  versicle.lux-perp-tua-luc-bit-sanctis-tuis-d-mine-allel-i-450680c665:
    role: versicle
    content:
      en:
      - type: versicle
        text: Eternal light will shine over your saints, O Lord, alleluia.
      - type: response
        text: And the eternity of times, alleluia.
      la:
      - type: versicle
        text: Lux perpétua lucébit Sanctis tuis, Dómine, allelúia.
      - type: response
        text: Et ætérnitas témporum, allelúia.
  versicle.magna-est-gl-ria-eius-in-salut-ri-tuo-7237c27b58:
    role: versicle
    content:
      la:
      - type: versicle
        text: Magna est glória eius in salutári tuo.
      - type: response
        text: Glóriam et magnum decórem impónes super eum.
  versicle.magna-est-gl-ria-eius-in-salut-ri-tuo-9e5a83791b:
    role: versicle
    content:
      en:
      - type: versicle
        text: His glory is great in thy salvation.
      - type: response
        text: Honour and great majesty shalt Thou lay upon him.
      la:
      - type: versicle
        text: Magna est glória eius in salutári tuo.
      - type: response
        text: Glóriam et magnum decórem impónes super eum.
  versicle.ne-tradas-b-stiis-nimas-confit-ntes-tibi-d860595c47:
    role: versicle
    content:
      en:
      - type: versicle
        text: O deliver not unto beasts the souls of them that praise thee!
      - type: response
        text: And forget not the souls of thy poor for ever.
      la:
      - type: versicle
        text: Ne tradas béstiis ánimas confiténtes tibi.
      - type: response
        text: Et ánimas páuperum tuórum ne obliviscáris in finem.
  versicle.nimis-honor-ti-sunt-am-ci-tui-deus-4c094e5e37:
    role: versicle
    content:
      en:
      - type: versicle
        text: Thy friends, O Lord, are made exceedingly honourable.
      - type: response
        text: Their principality is exceedingly strengthened.
      la:
      - type: versicle
        text: Nimis honoráti sunt amíci tui, Deus.
      - type: response
        text: Nimis confortátus est principátus eórum.
  versicle.obl-tus-est-quia-ipse-v-luit-38e0f46c29:
    role: versicle
    content:
      la:
      - type: versicle
        text: Oblátus est quia ipse vóluit.
      - type: response
        text: Et livóre eius sanáti sumus.
  versicle.os-iusti-medit-bitur-sapi-ntiam-0204322fa6:
    role: versicle
    content:
      en:
      - type: versicle
        text: The mouth of the righteous speaketh wisdom.
      - type: response
        text: And his tongue talketh judgment.
      la:
      - type: versicle
        text: Os iusti meditábitur sapiéntiam.
      - type: response
        text: Et lingua eius loquétur iudícium.
  versicle.os-iusti-medit-bitur-sapi-ntiam-3ccf6858d7:
    role: versicle
    content:
      la:
      - type: versicle
        text: Os iusti meditábitur sapiéntiam.
      - type: response
        text: Et lingua eius loquétur iudícium.
  versicle.plant-tus-in-domo-d-mini-de8a9e3ef4:
    role: versicle
    content:
      en:
      - type: versicle
        text: Planted in the house of the Lord
      - type: response
        text: In the courts of the house of our God.
      la:
      - type: versicle
        text: Plantátus in domo Dómini.
      - type: response
        text: In átriis domus Dei nostri.
  versicle.posu-sti-d-mine-super-caput-eius-34ea0ea413:
    role: versicle
    content:
      en:
      - type: versicle
        text: O Lord, Thou hast set a crown of precious stones.
      - type: response
        text: Upon his head.
      la:
      - type: versicle
        text: Posuísti, Dómine, super caput eius.
      - type: response
        text: Corónam de lápide pretióso.
  versicle.posu-sti-d-mine-super-caput-eius-52912e52a9:
    role: versicle
    content:
      la:
      - type: versicle
        text: Posuísti, Dómine, super caput eius.
      - type: response
        text: Corónam de lápide pretióso.
  versicle.pr-prio-f-lio-suo-non-pep-rcit-deus-2bb540b3f7:
    role: versicle
    content:
      la:
      - type: versicle
        text: Próprio Fílio suo non pepércit Deus.
      - type: response
        text: Sed pro nobis ómnibus trádidit illum.
  versicle.preti-sa-in-consp-ctu-d-mini-allel-ia-2dc379b9bd:
    role: versicle
    content:
      en:
      - type: versicle
        text: Precious in the sight of the Lord, alleluia.
      - type: response
        text: Is the death of his saints, alleluia.
      la:
      - type: versicle
        text: Pretiósa in conspéctu Dómini, allelúia.
      - type: response
        text: Mors Sanctórum eius, allelúia.
  versicle.preti-sa-in-consp-ctu-d-mini-allel-ia-6183ddf46a:
    role: versicle
    content:
      en:
      - type: versicle
        text: Saints and just, rejoice in the Lord, alleluia.
      - type: response
        text: The Lord has chosen you for his inheritance, alleluia.
      la:
      - type: versicle
        text: Pretiósa in conspéctu Dómini, allelúia.
      - type: response
        text: Mors Sanctórum eius, allelúia.
  versicle.qui-pro-nobis-pati-dign-tus-es-5a67c76326:
    role: versicle
    content:
      la:
      - type: text
        text: Qui pro nobis pati dignátus es.
  versicle.r-spice-de-c-lo-et-vide-et-v-sita-v-neam-istam-a-173755a92b:
    role: versicle
    content:
      en:
      - type: versicle
        text: Look down from heaven, and behold, and visit this vine, Alleluia.
      - type: response
        text: And protect that (thy right hand hath planted.) Alleluia.
      la:
      - type: versicle
        text: Réspice de cælo, et vide, et vísita víneam istam, allelúia.
      - type: response
        text: Et pérfice eam, allelúia.
  versicle.sp-cie-tua-et-pulchrit-dine-tua-d7fb69c7f4:
    role: versicle
    content:
      en:
      - type: versicle
        text: In thy comeliness and thy beauty.
      - type: response
        text: Go forward, fare prosperously, and reign.
      la:
      - type: versicle
        text: Spécie tua et pulchritúdine tua.
      - type: response
        text: Inténde, próspere procéde, et regna.
  versicle.sub-umbra-ill-us-quem-desider-veram-sedi-allel-i-87455f4394:
    role: versicle
    content:
      en:
      - type: versicle
        text: I sat under His shadow in Whom I delighted. Alleluia.
      - type: response
        text: To my taste. And His fruit was sweet Alleluia.
      la:
      - type: versicle
        text: Sub umbra illíus, quem desideráveram, sedi, allelúia.
      - type: response
        text: Et fructus eius dulcis gútturi meo, allelúia.
  versicle.text-3c241b111f:
    role: versicle
    content:
      la: []
  versicle.tu-es-sac-rdos-in-t-rnum-6b0ffd5af7:
    role: versicle
    content:
      en:
      - type: versicle
        text: Thou art a Priest for ever.
      - type: response
        text: After the order of Melchisedek.
      la:
      - type: versicle
        text: Tu es sacérdos in ætérnum.
      - type: response
        text: Secúndum órdinem Melchísedech.
  versicle.tu-es-sac-rdos-in-t-rnum-b847894b60:
    role: versicle
    content:
      la:
      - type: versicle
        text: Tu es sacérdos in ætérnum.
      - type: response
        text: Secúndum órdinem Melchísedech.
