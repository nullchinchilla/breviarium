  responsory.st-tuet-f-lios-suos-sub-t-gmine-ill-us-et-sub-ra-6172a18589:
    role: responsory
    content:
      en:
      - type: response
        text: He shall set his children under her shelter, and shall lodge under her branches by her shall he be covered from heat,
      - type: text
        text: And in her glory shall he dwell. Alleluia.
      - type: versicle
        text: Trust in Him, ye congregation of the people, pour out your heart before Him.
      - type: response
        text: And in her glory shall he dwell. Alleluia.
      la:
      - type: response
        text: 'Státuet fílios suos sub tégmine illíus, et sub ramis eius morábitur: protegétur sub tégmine illíus a fervóre:'
      - type: text
        text: Et in glória eius requiéscet, allelúia.
      - type: versicle
        text: Speráte in eo, omnis congregátio pópuli, effúndite coram illo corda vestra.
      - type: response
        text: Et in glória eius requiéscet, allelúia.
      en2:
      - type: response
        text: 'He shall establish his sons under its shade, and under its branches they shall dwell: beneath its shade they shall be sheltered from the heat:'
      - type: text
        text: And in its glory they shall rest, alleluia.
      - type: versicle
        text: Hope in him, all you assembly of the people, pour out your hearts before him.
      - type: response
        text: And in its glory they shall rest, alleluia.
  responsory.stola-iucundit-tis-nduit-eum-d-minus-283f16d1c3:
    role: responsory
    content:
      la:
      - type: response
        text: 'Stola iucunditátis índuit eum Dóminus:'
      - type: text
        text: Et corónam pulchritúdinis pósuit super caput eius.
      - type: versicle
        text: 'Cibávit illum Dóminus pane vitæ et intelléctus: et aqua sapiéntiæ salutáris potávit illum.'
      - type: response
        text: Et corónam pulchritúdinis pósuit super caput eius.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Et corónam pulchritúdinis pósuit super caput eius.
      en2:
      - type: response
        text: 'The Lord clothed him with a robe of gladness:'
      - type: text
        text: And placed upon his head a crown of beauty.
      - type: versicle
        text: 'The Lord fed him with the bread of life and understanding: and gave him to drink of the water of saving wisdom.'
      - type: response
        text: And placed upon his head a crown of beauty.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Spirit.
      - type: response
        text: As it was in the beginning, is now, and ever shall be, * world without end. Amen.
      - type: response
