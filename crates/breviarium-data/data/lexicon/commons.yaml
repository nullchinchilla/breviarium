  responsory.be-ti-estis-cum-maled-xerint-vobis-h-mines-et-pe-01a11d7768:
    role: responsory
    content:
      en:
      - type: response
        text: Blessed are ye when men shall revile you, and persecute you, and shall say all manner of evil against you falsely, for My sake;
      - type: text
        text: Rejoice, and be exceeding glad, for great is your reward in heaven.
      - type: versicle
        text: When men shall hate you, and when they shall separate you from their company, and shall reproach you, and cast out your name as evil, for the Son of Man's sake.
      - type: response
        text: Rejoice, and be exceeding glad, for great is your reward in heaven.
      la:
      - type: response
        text: 'Beáti estis, cum maledíxerint vobis hómines, et persecúti vos fúerint, et díxerint omne malum advérsum vos, mentiéntes, propter me:'
      - type: text
        text: Gaudéte et exsultáte, quóniam merces vestra copiósa est in cælis.
      - type: versicle
        text: Cum vos óderint hómines, et cum separáverint vos, et exprobráverint, et eiécerint nomen vestrum tamquam malum propter Fílium hóminis.
      - type: response
        text: Gaudéte et exsultáte, quóniam merces vestra copiósa est in cælis.
      en2:
      - type: response
        text: 'Blessed are you when men shall curse you, and shall persecute you, and shall say all manner of evil against you, lying, for my sake:'
      - type: text
        text: Rejoice and be glad, for your reward is great in heaven.
      - type: versicle
        text: When men shall hate you, and when they shall separate you, and shall reproach you, and cast out your name as evil, for the sake of the Son of Man.
      - type: response
        text: Rejoice and be glad, for your reward is great in heaven.
