  reading.sed-percont-ri-libet-qu-modo-par-ntes-et-carn-li-9447def260:
    role: reading
    content:
      en:
      - type: text
        text: Or it may be asked how we are commanded in one place to hate our parents, and them that are near us in the flesh, and in another place to love even our enemies. And, verily, the Truth hath said, as touching a wife “What God hath joined together, let not man put asunder.” (Matth. xix. 6.) And Paul saith “ Husbands, love your wives, even as Christ also loved the Church.” (Eph. v. 25.) Behold, the disciple commandeth a man to love his wife, and the Master saith “If any man hate not his wife, he cannot be My disciple.” Doth the judge, then, order one proclamation, and the crier make another? or can the man both love and hate? If we consider well the force of the commandment, we shall be able in wisdom to do both. Let us love wife, and kindred, and neighbour, as touching their nearness in the flesh but as touching the way of God, if they withstand us therein, let us not know them, but hate them and flee from them.
