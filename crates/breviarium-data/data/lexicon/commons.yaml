        text: 'Sed prius quæ sunt amplióra videámus. Beáti, inquit, páuperes, quóniam vestrum est regnum Dei. Primam benedictiónem hanc utérque Evangelísta pósuit. Órdine enim prima est, et parens quædam generatióque virtútum: quia qui contempsérit sæculária, ipse merébitur sempitérna: nec potest quisquam méritum regni cæléstis adipísci, qui mundi cupiditáte pressus, emergéndi non habet facultátem.'
