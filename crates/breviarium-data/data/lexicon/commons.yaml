  responsory.iste-est-qui-ante-deum-magnas-virt-tes-oper-tus-0c17cef238:
    role: responsory
    content:
      la:
      - type: response
        text: 'Iste est qui ante Deum magnas virtútes operátus est, et de omni corde suo laudávit Dóminum:'
      - type: text
        text: Ipse intercédat pro peccátis ómnium populórum.
      - type: versicle
        text: Ecce homo sine queréla, verus Dei cultor, ábstinens se ab omni ópere malo, et pérmanens in innocéntia sua.
      - type: response
        text: Ipse intercédat pro peccátis ómnium populórum.
      en2:
      - type: response
        text: 'This is he who before God worked great deeds of power, and with his whole heart praised the Lord:'
      - type: text
        text: May he intercede for the sins of all peoples.
      - type: versicle
        text: Behold a man without complaint, a true worshiper of God, abstaining from every evil work, and remaining in his innocence.
      - type: response
        text: May he intercede for the sins of all peoples.
  responsory.iste-est-qui-ante-deum-magnas-virt-tes-oper-tus-1ae923c27c:
