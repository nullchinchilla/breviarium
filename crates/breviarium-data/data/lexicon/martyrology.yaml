texts:
  psalm.d-cimo-kal-ndas-apr-lis-3c7aea790b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Archangel Gabriel, who announced to the Blessed Virgin Mary the mystery of the Incarnation of the Lord.
          Upon the 23rd day of March, were born into the better life:

          In Africa, the holy martyrs Victorian, Pro-consul of Carthage, and two brethren from Aquae Regiae, also two merchants, both named Frumentius, all in the persecution by the Vandals, were, [as writeth the African, Victor, Bishop of Utica] on account of the steadfastness of their Catholic confession, put to the most grievous torments under the Arian king Hunneric, and gloriously crowned, [in the year 484.]
          Likewise in Africa, the holy martyr Faithful there also holy Felix and twenty others.
          At Caesarea, in Palestine, the holy martyrs Nicon, [a Neapolitan,] and ninety-nine others. [All suffered at Taormina, in Sicily, under Decius.]
          Also the holy martyrs Domitius, [a native of Phrygia,] Pelagia, Aquila, Eparchius, and Theodosia, [under Julian the Apostate.]
          At Lima, [in the year 1606,] in the kingdom of Peru, holy Turibius, Archbishop of that see, by whose work the faith and discipline of the church were spread abroad in America.
          At Antioch, the holy Priest Theodulus.
          At Caesarea, the holy Confessor Julian.
          In Campania, the holy monk Benedict, who was shut up by the Goths in a glowing furnace, but upon the morrow was found unhurt, [in the year 550.]
      la:
      - type: text
        text: |-
          Décimo Kaléndas Aprílis

          In Africa sanctórum Mártyrum Victoriáni, Procónsulis Cartháginis, et duórum germanórum, Aquisregénsium; item Fruméntii et altérius Fruméntii, mercatórum. Hi omnes, in persecutióne Wandálica (ut scribit Victor, Africánus Epíscopus), sub Ariáno Rege Hunneríco, pro constántia cathólicæ confessiónis, immaníssimis supplíciis cruciáti, egrégie coronáti sunt.
          Item in Africa sancti Fidélis Mártyris.
          Ibídem sancti Felícis et aliórum vigínti Mártyrum.
          Cæsaréæ, in Palæstína, sanctórum Mártyrum Nicónis et aliórum nonagínta novem.
          Item corónæ sanctórum Mártyrum Domítii, Pelágiæ, Aquilæ, Epárchii et Theodósiæ.
          Limæ, in Perúvia, sancti Turíbii Epíscopi, cuius virtúte fides et disciplína ecclesiástica per Amerícam diffúsæ sunt.
          Antiochíæ sancti Theodúli Presbýteri.
          Barcinóne, in Hispánia, sancti Ioséphi Oriol Presbýteri, Ecclésiæ sanctæ Maríæ Regum Beneficiárii, omnígena virtúte ac præsértim córporis afflictatióne, paupertátis cultu atque in egénos et infírmos caritáte célebris; quem, in vita et post mortem miráculis gloriósum, Pius Papa Décimus in Sanctórum número recénsuit.
          Cæsaréæ sancti Iuliáni Confessóris.
          In Campánia sancti Benedícti Mónachi, qui, a Gothis in ardénti clíbano inclúsus, sequénti die invéntus est illǽsus.
      en2:
      - type: text
        text: |-
          The Twenty-Third of March
      
          In Africa, the holy Martyrs Victorianus, Proconsul of Carthage, and two brothers from Aquae Regenses; also Frumentius and another Frumentius, merchants. All these, in the Vandal persecution (as Victor, African Bishop, writes), under the Arian king Huneric, for their steadfast catholic confession, were tortured with most savage torments and gloriously crowned.
          Likewise in Africa, the holy Martyr Fidelis.
          There also, Saints Felix and twenty other Martyrs.
          At Caesarea in Palestine, the holy Martyrs Nicon and ninety-nine others.
          Likewise, the crown of the holy Martyrs Domitius, Pelagia, Aquila, Eparchus, and Theodosia.
          At Lima in Peru, Saint Turibius, Bishop, through whose virtue the faith and ecclesiastical discipline were spread throughout America.
          At Antioch, Saint Theodulus the Priest.
          At Barcelona in Spain, Saint Joseph Oriol, Priest, Beneficiary of the Church of Santa Maria del Rey, renowned for every virtue and especially for bodily mortification, the practice of poverty, and charity toward the poor and sick; whom Pius X, glorified by miracles in life and after death, enrolled in the number of the Saints.
          At Caesarea, Saint Julian the Confessor.
          In Campania, Saint Benedict the Monk, who, enclosed by the Goths in a burning furnace, was found unharmed the following day.
  psalm.d-cimo-kal-ndas-aug-sti-211b9132a8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 23rd day of July, were born into the better life:

          At Ravenna, the holy martyr Apollinaris, Bishop of that city. He was ordained at Rome by the Apostle Peter and sent to Ravenna, where he suffered diverse and manifold things for Christ's faith's sake. He afterwards preached the Gospel in Emilia, and turned many from the worshipping of idols. At length he came back to Ravenna, and there finished a glorious testimony under the Caesar Vespasian.
          At Le Mans, in Gaul, the holy Confessor Liborius, [fourth Bishop of Le Mans, in the year 425.]
          At Rome, the holy martyr Rasyphus.
          Also at Rome, the holy Virgin and martyr Primitiva.
          Also at Rome, the holy martyrs Apollonius and Eugenius.
          On the same day the holy martyrs Trophimus and Theophilus, who under the Emperor Diocletian were stoned and burnt and at last beheaded, and so crowned with martyrdom.
          In Bulgaria, very many holy martyrs, whom the profane Emperor Nicephorus, when he was wasting the churches of God, caused to be slain by diverse sorts of death by the sword, by the rope, by arrows, by long imprisonment, and by hunger.
          At Rome, the holy Virgins Romula, Redempta, and Hirundo, of whom writeth the holy Pope Gregory.
          Also at Rome, the holy widow Brigid, [about the year 1373,] whose sacred body was taken to Sweden upon the 7th day of October, and whose feast is kept upon the 8th day of the same month.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Augústi

          Ravénnæ natális sancti Apollináris Epíscopi, qui, ab Apóstolo Petro Romæ ordinátus et Ravénnam missus, pro fide Christi divérsas et multíplices pœnas perpéssus est; póstea, Evangélium in Æmília prǽdicans, plúrimos ab idolórum cultu revocávit; tandem, Ravénnam revérsus, gloriósum martýrium, sub Vespasiáno Cǽsare, complévit.
          Cenómanis, in Gállia, sancti Libórii, Epíscopi et Confessóris.
          Romæ natális sanctæ Birgíttæ Víduæ, quæ, post multas sanctárum locórum peregrinatiónes, divíno affláta Spíritu, quiévit. Ipsíus autem festívitas octávo Idus Octóbris celebrátur.
          Ibídem sancti Rásyphi Mártyris.
          Item Romæ pássio sanctæ Primitívæ, Vírginis et Mártyris.
          Item sanctórum Mártyrum Apollónii et Eugénii.
          Eódem die natális sanctórum Mártyrum Tróphimi et Theóphili, qui, sub Diocletiáno Imperatóre, cæsi lapídibus et igne incénsi, demum, gládio percússi, martýrio coronántur.
          In Bulgária sanctórum plurimórum Mártyrum, quos ímpius Imperátor Nicéphorus, Ecclésias Dei devástans, divérso mortis génere, nimírum ense, láqueo, sagíttis, diútino cárcere et fame necári fecit.
          Romæ sanctárum Vírginum Rómulæ, Redémptæ et Herúndinis, de quibus scribit sanctus Gregórius Papa.
      en2:
      - type: text
        text: |-
          The Twenty-Second of July
      
          At Ravenna, the birthday of Saint Apollinaris, Bishop, who was ordained at Rome by the Apostle Peter and sent to Ravenna, where he endured diverse and manifold sufferings for the faith of Christ; thereafter, preaching the Gospel in Aemilia, he recalled very many from the worship of idols; and finally, returning to Ravenna, he fulfilled a glorious martyrdom under the Caesar Vespasian.
          At Le Mans in Gaul, Saint Liborius, Bishop and Confessor.
          At Rome, the birthday of Saint Bridget, Widow, who, after many pilgrimages to holy places, breathed her last, inspired by the divine Spirit. Her feast, however, is celebrated on the eighth of October.
          There also, Saint Rasyphus the Martyr.
          Likewise at Rome, the passion of Saint Primitiva, Virgin and Martyr.
          Likewise, the holy Martyrs Apollonius and Eugenius.
          On the same day, the birthday of the holy Martyrs Trophimus and Theophilus, who, under the Emperor Diocletian, were beaten with stones and consumed with fire, and finally, struck with the sword, were crowned with martyrdom.
          In Bulgaria, very many holy Martyrs, whom the impious Emperor Nicephorus, laying waste the churches of God, caused to be put to death by various kinds of death, namely by the sword, the noose, arrows, lengthy imprisonment, and famine.
          At Rome, the holy Virgins Romula, Redempta, and Herundis, of whom Saint Gregory the Pope writes.
  psalm.d-cimo-kal-ndas-dec-mbris-5b451712b2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 22nd day of November, were born into the better life:

          At Rome, the holy Virgin and martyr Cecily. She brought her husband Valerian and his brother Tiburtius to believe in Christ, and nerved them to suffer martyrdom. After their martyrdom, Almachius, Prefect of the city under the Emperor Marcus Aurelius Severus Alexander, caused her to be arrested, and, after she had overcome fire, gloriously to finish her sufferings with the sword.
          At Colossae, in Phrygia, the holy martyrs Philemon and Apphia, the disciples of the holy Apostle Paul, (unto whom he addressed an Epistle.) During the reign of the Emperor Nero, the Gentiles broke into the Church upon the feast day of Diana. The rest of the faithful escaped, but these were taken, and by command of the President Artocles they were flogged, buried up to the middle, and stoned to death.
          Likewise, at Rome, the holy martyr Maurus, who came from Africa to visit the graves of the Apostles, and suffered under the Emperor Numerian, and the Prefect of the city, Celerinus.
          At Antioch, in Pisidia, in the persecution under the Emperor Diocletian, the holy martyrs Mark and Stephen.
          At Autun, (in the sixth century,) the holy Confessor Pragmatius, Bishop (of that see.)
      la:
      - type: text
        text: |-
          Décimo Kaléndas Decémbris

          Sanctæ Cæcíliæ, Vírginis et Mártyris, quæ ad cæléstem Sponsum, próprio sánguine purpuráta, transívit sextodécimo Kaléndas Octóbris.
          Colóssis, in Phrýgia, sanctórum Philémonis et Apphíæ, sancti Pauli discipulórum; qui, sub Neróne Imperatóre, cum Gentíles, in die festo Diánæ, invasíssent Ecclésiam, ambo, céteris fugiéntibus, tenti, iussu Artoclis Prǽsidis verbéribus cæsi sunt, et, usque ad renes in fóveam inclúsi, lapídibus opprimúntur.
          Romæ sancti Mauri Mártyris, qui, cum ex Africa venísset ad sepúlcra Apostolórum, sub Imperatóre Numeriáno et Urbis Præfécto Celeríno agonizávit.
          Antiochíæ Pisídiæ pássio sanctórum Marci et Stéphani, sub Diocletiáno Imperatóre.
          Augustodúni sancti Pragmátii, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Twenty-Second of November
      
          Saint Cecilia, Virgin and Martyr, who passed to her heavenly Bridegroom, purple with her own blood, on the seventeenth of September.
          At Colossae in Phrygia, Saints Philemon and Apphia, disciples of Saint Paul; who, under the Emperor Nero, when the Gentiles invaded the church on the feast day of Diana, both, while the rest fled, were seized, by the command of the governor Artocles were beaten with rods, and, buried up to the waist in a pit, were crushed with stones.
          At Rome, Saint Maurus the Martyr, who, having come from Africa to the tombs of the Apostles, suffered under the Emperor Numerianus and Celerinus, Prefect of the City.
          At Antioch in Pisidia, the passion of Saints Mark and Stephen, under the Emperor Diocletian.
          At Autun, Saint Pragmatius, Bishop and Confessor.
  psalm.d-cimo-kal-ndas-febru-rii-5710c85290:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the Espousal of the Blessed Virgin Mary to holy Joseph.
          The holy Confessor Raymond of Penafort, of the Order of Friars Preachers, famous for his holiness and teaching, of whom mention has been made upon the 7th day of this present month of January.
          Upon the same 23rd day of January, were born into the better life:

          At Rome, the holy Virgin and martyr Emerentiana, who while as yet she was making her ready to be baptized, was stoned to death by the Gentiles while she was praying at the grave of her holy foster-sister Agnes.
          At Philippi, in Macedonia, holy Parmenas, one of the first seven Deacons. He yielded himself wholly to the grace of God, discharged in the fulness of faith the office of preaching which had been laid upon him by the brethren, and obtained the glory of martyrdom under the Emperor Trajan.
          At Caesarea, in Morocco, of the holy martyrs Severian and Aquila, his wife, who were burnt.
          At Antinoe, in Egypt, (in the fourth century,) the holy martyr Aselas, who after suffering diverse torments was cast into the Nile, and rendered up his precious soul to God.
          At Ancyra, in Galatia, (in the fourth century,) holy Clement, Bishop of that see, who had often been put to the torture, but at length achieved martyrdom in the persecution under the Emperor Diocletian.
          There likewise, (in the fourth century,) upon the same day, and under the President Lucius, the holy martyr Agathangelus.
          At Alexandria, (in the year 619,) holy John, surnamed the Almoner, Pope of that city, very famous for his pity toward the poor.
          At Toledo, holy Ildefonsus, Archbishop of that city, who on account of the singular purity of his life, and the defence of the virginity of the Mother of God against the heretics who impugned it which he took up, was first gifted, by the same most Blessed Virgin with a chasuble of the purest white, and afterwards called away to heaven, famous for holiness, (in the year 669.)
          In the province of Valeria, (in the sixth century,) the holy monk Martyrius, of whom the blessed Pope Gregory maketh mention.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Februárii

          Sancti Raymúndi de Péñafort, ex Ordine Prædicatórum, Confessóris, cuius dies natális octávo Idus Ianuárii recólitur.
          Romæ sanctæ Emerentiánæ, Vírginis et Mártyris; quæ adhuc catechúmena, dum oráret ad sepúlcrum sanctæ Agnétis, cuius fúerat collactánea, a Gentílibus lapidáta est.
          Philíppis, in Macedónia, sancti Pármenæ, qui fuit unus de septem primis Diáconis. Hic, tráditus grátiæ Dei, iniúnctum sibi a frátribus offícium prædicatiónis plena fide consúmmans, martýrii glóriam, sub Traiáno, est adéptus.
          Ancýræ, in Galátia, sancti Cleméntis Epíscopi, qui, sǽpius cruciátus, tandem, sub Diocletiáno Imperatóre, martýrium consummávit.
          Ibídem sancti Agathángeli, qui eódem die, sub Lúcio Prǽside, passus est.
          Cæsaréæ, in Mauritánia, sanctórum Mártyrum Severiáni et Aquilæ uxóris, ígnibus combustórum.
          Apud Antínoum, Ægýpti urbem, sancti Asclæ Mártyris, qui, post divérsa torménta, pretiósam Deo ánimam, in flumen præcipitátus, réddidit.
          Alexandríæ sancti Ioánnis Eleemosynárii, eiúsdem urbis Epíscopi, misericórdia in páuperes celebérrimi.
          Toléti, in Hispánia, sancti Ildefónsi Epíscopi, qui, ob singulárem vitæ integritátem, susceptámque fídei defensiónem advérsus hæréticos, sanctíssimæ Dei Genitrícis virginitátem impugnántes, ab eádem Vírgine María donátus est candidíssima veste ac demum, sanctitáte célebris, in cælum vocátus.
          In Província Valériæ sancti Martýrii Mónachi, cuius méminit beátus Gregórius Papa.
      en2:
      - type: text
        text: |-
          The Twenty-Third of January
      
          Saint Raymond of Penyafort, of the Order of Preachers, Confessor, whose birthday is commemorated on the sixth of January.
          At Rome, Saint Emerentiana, Virgin and Martyr; who, while still a catechumen, was stoned by the Gentiles as she prayed at the tomb of Saint Agnes, whose foster-sister she had been.
          At Philippi in Macedonia, Saint Parmenas, who was one of the seven first Deacons. He, entrusted to the grace of God, completing with full faith the office of preaching enjoined upon him by the brethren, obtained the glory of martyrdom under Trajan.
          At Ancyra in Galatia, Saint Clement, Bishop, who, having been tortured many times, finally completed his martyrdom under the Emperor Diocletian.
          There also, Saint Agathangel, who suffered on the same day under the governor Lucius.
          At Caesarea in Mauritania, the holy Martyrs Severianus and Aquila his wife, who were burned in flames.
          At Antinoe, a city of Egypt, Saint Asclas the Martyr, who, after diverse torments, cast into a river, yielded his precious soul to God.
          At Alexandria, Saint John the Almsgiver, Bishop of that same city, most celebrated for his mercy toward the poor.
          At Toledo in Spain, Saint Ildefonsus, Bishop, who, for the singular integrity of his life and the defense of the faith he undertook against heretics attacking the virginity of the most holy Mother of God, was rewarded by the Virgin Mary herself with a most white garment, and finally, renowned for holiness, was called to heaven.
          In the Province of Valeria, Saint Martyrius the Monk, of whom the blessed Pope Gregory makes mention.
  psalm.d-cimo-kal-ndas-i-lii-a553006e76:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 22nd day of June, were born into the better life:

          At Verulamium, in Britain, the holy martyr Alban, who in the time of Diocletian gave himself up for a clerk whom he had received as a guest, and was beheaded, [in the year 303,] after being scourged and sharply tormented. One of the soldiers who led him to execution was turned to Christ upon the way and was made worthy to be baptized in his own blood.
          At Nola, a city of Campania, the blessed Confessor Paulinus, Bishop of that city, [in the year 431,] who, whereas he was a very noble and wealthy person, became for Christ's sake poor and lowly, and then in addition gave himself up for a slave in order to redeem a widow's son whom the Vandals had carried off as a prisoner to Africa when they wasted Campania. He was illustrious, not only on account of his learning and of the abounding holiness of his life, but also on account of his power against evil spirits. His praises have been set forth in their writings with great force by holy Ambrose, Jerome, Augustine, and Gregory [the Great.] His body has been brought to Rome, and lieth in honour along with the body of the holy Apostle Bartholomew in the church of that Apostle in the island in the Tiber.
          At Mount Ararat, ten thousand holy martyrs, who were crucified in the second century.
          At Samaria, one thousand four hundred and eighty holy martyrs, who suffered under Chosroes, King of the Persians.
          At Rome is commemorated the translation of the holy Consular Flavius Clemens, martyr, who was put to death for Christ's faith's sake by the Emperor Domitian. His body was found in the church of holy Pope Clement, and there solemnly reburied.
          On the same day, holy Niceas, Bishop of Romacium, famous for his teaching and holy life.
          At Naples, in Campania, holy John, Bishop [of that see,] whom blessed Paulinus, Bishop of Nola, called unto the kingdom of heaven, [in the year 853].
          In the monastery at Cluny, the holy Virgin Consortia, [in the year 570.]
          At London in England, on Tower Hill, St. John Fisher, bishop of Rochester and cardinal of the Holy Roman Church. For the defense of the Catholic faith and the primacy of the Roman Pontiff he was beheaded by order of King Henry VIII.
          At Rome, [in the year 1276,] the blessed Pope Innocent V, who, with gentleness and wisdom, toiled for the upholding of the Church, and for the liberty and unity of Christians. His veneration having been represented to Pope Leo XIII, that Pontiff approved and confirmed it.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Iúlii

          Apud Nolam, Campániæ urbem, natális beáti Paulíni, Epíscopi et Confessóris, qui ex nobilíssimo et opulentíssimo factus est pro Christo pauper et húmilis, et, quod superérat, seípsum pro rediméndo víduæ fílio, quem Wándali, Campánia devastáta, captívum in Africam abdúxerant, in servitútem dedit. Cláruit autem non solum eruditióne et copiósa vitæ sanctitáte, sed étiam poténtia advérsus dǽmones; eiúsque præcláras laudes sancti Ambrósius, Hierónymus, Augustínus et Gregórius Papa scriptis suis celebrárunt. Ipsíus corpus, póstea Benevéntum et inde Romam translátum, tandem, Summi Pontíficis Pii Décimi iussu, Nolæ restitútum fuit.
          Londíni, in Anglia, sancti Ioánnis Fisher, Epíscopi Roffénsis et Cardinális, qui pro fide cathólica et Románi Pontíficis primátu, iubénte Henríco Octávo Rege, decollátus est.
          In monte Ararath pássio sanctórum Mártyrum decem míllium, crucifixórum.
          Verolámii, in Británnia, sancti Albáni Mártyris, qui, témpore Diocletiáni, pro Clérico hóspite, quem domi excéperat et a quo Christiánæ fídei præceptiónibus imbútus fúerat, seípsum, commutáta veste, trádidit; et hanc ob causam, post vérbera et acérba torménta, cápite plexus est. Passus est étiam cum illo unus de milítibus, qui, dum eum dúceret ad supplícium, in via convérsus est ad Christum, et mox, gládio decollátus, próprio sánguine méruit baptizári. Hoc autem nóbile sancti Albáni ac Sócii durátum pro Deo certámen sanctus Beda Venerábilis descrípsit.
          Samaríæ, in Palæstína, sanctórum mille quadringentórum octogínta Mártyrum, qui, sub Rege Persárum Chósroa, pro Christi fide interfécti sunt.
          Eódem die sancti Nicétæ, Romatiánæ civitátis Epíscopi, doctrína sanctísque móribus clari.
          Neápoli, in Campánia, sancti Ioánnis Epíscopi, quem beátus Paulínus, Epíscopus Nolanus, ad cæléstia regna vocávit.
          In monastério Cluniacénsi, in Gállia, deposítio sanctæ Consórtiæ Vírginis.
          Romæ beáti Innocéntii Papæ Quinti, ex Ordine Prædicatórum, Confessóris, qui ad tuéndam Ecclésiæ libertátem et Christianórum concórdiam suavi prudéntia adlaborávit. Cultum autem, ei exhíbitum, Leo Décimus tértius, Póntifex Máximus, ratum hábuit et confirmávit.
          Item Romæ Translátio sancti Flávii Cleméntis, viri Consuláris et Mártyris; qui, sanctæ Plautíllæ frater ac beátæ Vírginis et Mártyris Fláviæ Domitíllæ avúnculus, a Domitiáno Imperatóre, quocum Consulátum gésserat, ob Christi fidem interémptus est. Ipsíus porro corpus, in Basílica sancti Cleméntis Papæ invéntum, ibídem solémni pompa recónditum est.
      en2:
      - type: text
        text: |-
          The Twenty-Second of June
      
          Near Nola, a city of Campania, the birthday of Blessed Paulinus, Bishop and Confessor, who from being most noble and wealthy became poor and lowly for Christ, and, what remained, gave himself into servitude to ransom the son of a widow whom the Vandals, having laid waste Campania, had carried off captive to Africa. He was distinguished not only for learning and the abundant holiness of his life, but also for power against demons; and Saints Ambrose, Jerome, Augustine, and Pope Gregory celebrated his renowned praises in their writings. His body, afterward translated to Benevento and thence to Rome, was finally, by the command of the Supreme Pontiff Pius X, restored to Nola.
          At London in England, Saint John Fisher, Bishop of Rochester and Cardinal, who was beheaded for the catholic faith and the primacy of the Roman Pontiff, by the order of King Henry VIII.
          On Mount Ararat, the passion of the holy Martyrs of the Ten Thousand, crucified.
          At Verulamium in Britain, Saint Alban the Martyr, who, in the time of Diocletian, delivered himself in exchange of garments for a clerical guest whom he had received in his home and from whom he had been imbued with the teachings of the Christian faith; and for this reason, after stripes and bitter torments, was beheaded. There suffered also with him one of the soldiers who, as he was leading him to execution, turned to Christ along the way, and was straightway beheaded by the sword, meriting to be baptized in his own blood. This noble contest, endured for God by Saint Alban and his Companion, Saint Bede the Venerable described.
          In Samaria in Palestine, the holy Martyrs, one thousand four hundred and eighty, who were slain for the faith of Christ under the Persian king Chosroes.
          On the same day, Saint Nicetas, Bishop of Romatiana, illustrious for learning and holy character.
          At Naples in Campania, Saint John the Bishop, whom the blessed Paulinus, Bishop of Nola, called to the celestial kingdom.
          In the monastery of Cluny in Gaul, the repose of Saint Consortia, Virgin.
          At Rome, Blessed Pope Innocent V, of the Order of Preachers, Confessor, who labored with gentle wisdom to defend the liberty of the Church and the concord of Christians. The cult offered to him was ratified and confirmed by Leo XIII, Supreme Pontiff.
          Likewise at Rome, the Translation of Saint Flavius Clemens, man of consular rank and Martyr; who, the brother of holy Plautilla and uncle of the blessed Virgin and Martyr Flavia Domitilla, was put to death by the Emperor Domitian, with whom he had held the consulship, for the faith of Christ. Moreover, his body, found in the Basilica of Pope Saint Clement, was there solemnly enshrined.
  psalm.d-cimo-kal-ndas-i-nii-5d142ef2f9:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 23rd day of May, were born into the better life:

          At Rome, the holy Confessor John de' Rossi, famous for his patience and charity in preaching the Gospel to the poor.
          At Langres, in Gaul, [in the third century,] the holy Desiderius, Bishop [of that see.] When he saw how the army of the Vandals were harrying his flock he went to plead for them with the Vandal king, who forthwith commanded his throat to be cut upon the spot and he cheerfully stretched out his neck for the sake of his sheep, and with the stroke of the sword passed away to be with Christ. There suffered along with him many others of his people, who are all buried in the same city.
          In Spain, the holy martyrs Epitacius the Bishop, and Basil.
          In Africa, the holy martyrs Quintian, Lucius, and Julian, who suffered in the persecution under the Vandals, and so obtained crowns that fade not away.
          In Cappadocia are commemorated those holy martyrs who, in the persecution under Maximian Galerius, were slain by having their thighs broken also they who, in Mesopotamia, were hung head downwards, and so finished their testimony by being choked with smoke and consumed by slow fire.
          In the country of Lyon, the holy Desiderius, Bishop of Vienne, who was stoned to death by order of King Theodoric, and so obtained the crown of martyrdom.
          At Synnada, [in the ninth century,] the holy Michael, Bishop [of that see.]
          On the same day the holy Mercurial, Bishop [of Forli.]
          At Naples, in Campania, [in the third century,] the holy Euphebius, Bishop [of that see.]
          At Nursia, the holy monks Eutychius and Florence, of whom mention is made by blessed Pope Gregory the Great.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Iúnii

          Apud Língonas, in Gállia, pássio sancti Desidérii Epíscopi, qui, cum plebem suam ab exércitu Wandalórum vexári cérneret, ad Regem eórum pro ea supplicatúrus accéssit; a quo statim iugulári iussus, pro óvibus sibi créditis cervícem libénter exténdit, et, percússus gládio, migrávit ad Christum. Passi sunt autem cum ipso et álii plures de número gregis sui, qui apud eándem urbem cónditi sunt.
          In Hispánia sanctórum Mártyrum Epitácii Epíscopi, et Basiléi.
          In território Lugdunénsi sancti Desidérii, Epíscopi Viennénsis; qui, Theodoríci Regis iussu lapídibus óbrutus, martýrio coronátur.
          In Africa sanctórum Mártyrum Quinctiáni, Lúcii et Iuliáni, qui, in persecutióne Wandálica passi, ætérnas corónas meruérunt.
          In Cappadócia commemorátio sanctórum Mártyrum, qui, in persecutióne Maximiáni Galérii, confráctis crúribus, necáti sunt; item eórum, qui eódem témpore, in Mesopotámia, appénsi pédibus in sublíme, cápite verso deórsum, suffocáti fumo et lento igne consúmpti, martýrium complevérunt.
          Sýnnadæ, in Phrýgia, sancti Michaélis Epíscopi.
          Ipso die sancti Mercuriális Epíscopi.
          Neápoli, in Campánia, sancti Euphébii Epíscopi.
          Romæ sancti Ioánnis Baptístæ de Rossi, Presbýteri et Confessóris, patiéntia et caritáte in evangelizándis paupéribus insígnis.
          Apud Núrsiam sanctórum Eutýchii et Floréntii Monachórum, quorum méminit beátus Gregórius Papa.
      en2:
      - type: text
        text: |-
          The Twenty-Second of May
      
          Near Langres in Gaul, the passion of Saint Desiderius, Bishop, who, seeing his people harassed by the army of the Vandals, went to their king to entreat him on their behalf; by whom he was immediately ordered to be slaughtered, and willingly extended his neck for the sheep entrusted to him, and, struck by the sword, passed to Christ. There suffered with him also several others of the number of his flock, who were buried in that same city.
          In Spain, the holy Martyrs Epitacius, Bishop, and Basileus.
          In the territory of Lyons, Saint Desiderius, Bishop of Vienne; who, by the order of King Theodoric, was crushed with stones and crowned with martyrdom.
          In Africa, the holy Martyrs Quinctianus, Lucius, and Julian, who, suffering in the Vandal persecution, merited eternal crowns.
          In Cappadocia, a commemoration of the holy Martyrs who, in the persecution of Maximianus Galerius, were slain with broken legs; likewise of those who at the same time, in Mesopotamia, hung up by their feet in the air with their heads downward, were suffocated by smoke and slowly consumed by fire, and completed their martyrdom.
          At Synnada in Phrygia, Saint Michael the Bishop.
          On the same day, Saint Mercurialis the Bishop.
          At Naples in Campania, Saint Euphebius the Bishop.
          At Rome, Saint John Baptist de Rossi, Priest and Confessor, distinguished for patience and charity in the evangelization of the poor.
          Near Nursia, the holy Monks Eutychius and Florentius, of whom the blessed Pope Gregory makes mention.
  psalm.d-cimo-kal-ndas-ianu-rii-800db80a6f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 23rd day of December, were born into the better life:

          At Rome, the holy Virgin and martyr Victoria (de Tivoli.) She was espoused to one Eugenius, a heathen, and during the persecution under the Emperor Decius she would neither marry Eugenius nor offer sacrifice unto idols, but worked many miracles, whereby she gathered many virgins unto God, and the executioner stabbed her to the heart with his sword at the request of her espoused husband.
          At Nicomedia, twenty holy martyrs during the persecution under the Emperor Diocletian, after they had been most grievously tormented.
          There likewise, in the same persecution, the holy martyrs Migdonius and Mardonius, of whom the one was burnt and the other cast into a ditch, and so died. Then also suffered the Deacon of holy Anthimus, Bishop of Nicomedia, who was bringing a letter to the martyrs when he was taken by the Gentiles and stoned to death, and so passed hence to be ever with the Lord.
          In Crete, the holy martyrs Theodulus, Saturninus, Euporus, Gelasius, Eunician, Zeticus, Cleomenes, Agathopus, Basilides, and Evaristus, who suffered great cruelties in the persecution under the Emperor Decius, and were beheaded. (They are often called the Ten Martyrs of Crete.)
          At Rome, blessed Servulus, concerning whom holy Gregory writeth that from his childhood even unto the end of his life he lay paralysed in a porch hard by the church of St. Clement, and at the end he was called by songs of angels, and passed away into the glory of Paradise, (in the year 570.) God doth very often show miracles at his grave.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Ianuárii

          Romæ sanctæ Victóriæ, Vírginis et Mártyris, quæ, in persecutióne Décii Imperatóris, cum esset desponsáta Eugénio pagáno et nec núbere vellet neque sacrificáre, ídeo, post multa facta mirácula, quibus plúrimas Deo Vírgines aggregáverat, a carnífice percússa est gládio in corde, rogátu sui sponsi.
          Nicomedíæ pássio sanctórum Migdónii et Mardónii, quorum alter, in Diocletiáni persecutióne, igne cremátus, alter in fossam proiéctus occúbuit. Tunc étiam Diáconus sancti Anthimi, Epíscopi Nicomediénsis, passus est; qui, cum lítteras perférret ad Mártyres, a Gentílibus tentus est, atque, lapídibus óbrutus, migrávit ad Dóminum.
          Ibídem natális sanctórum vigínti Mártyrum, quos ípsamet Diocletiána persecútio, gravíssimis torméntis cruciátos, Mártyres Christi fecit.
          In Creta sanctórum Mártyrum Theodúli, Saturníni, Eupori, Gelásii, Euniciáni, Zetici, Leóminis, Agathópodis, Basílidis et Evarísti; qui, in Décii persecutióne, crudélia passi sunt et cápite cæsi.
          Romæ beáti Sérvuli, qui (ut sanctus Gregórius Papa scribit), a primǽva sui ætáte usque ad finem vitæ, paralýticus iácuit in pórticu prope Ecclésiam sancti Cleméntis, et demum, Angelórum cántibus invitátus, ad paradísi glóriam transívit; ad cuius túmulum Deus mirácula crebérrime osténdit.
      en2:
      - type: text
        text: |-
          The Twenty-Third of December
      
          At Rome, Saint Victoria, Virgin and Martyr, who, in the persecution of the Emperor Decius, having been betrothed to the pagan Eugenius and wishing neither to marry nor to sacrifice, after many miracles by which she had gathered numerous virgins to God, was struck in the heart by the sword of the executioner at her betrothed's request.
          At Nicomedia, the passion of Saints Migdonius and Mardonius, of whom the one, in the persecution of Diocletian, was consumed by fire, and the other perished, cast into a pit. At that time also the Deacon of Saint Anthimus, Bishop of Nicomedia, suffered; who, as he was carrying letters to the Martyrs, was seized by the Gentiles, and, crushed with stones, passed to the Lord.
          There also, the birthday of twenty holy Martyrs, whom that very Diocletianic persecution, having tortured them with most grievous torments, made Martyrs of Christ.
          In Crete, the holy Martyrs Theodulus, Saturninus, Euporus, Gelasius, Eunicians, Zeticus, Leomenes, Agathopodes, Basilides, and Evaristus; who, in the persecution of Decius, endured cruel sufferings and were beheaded.
          At Rome, Blessed Servulus, who (as the holy Pope Gregory writes), from the first years of his life to his end, lay paralytic in the porch near the church of Saint Clement, and at length, invited by the singing of Angels, passed to the glory of paradise; at whose tomb God most frequently wrought miracles.
  psalm.d-cimo-kal-ndas-m-rtii-9e782eea0a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 20th day of February are commemorated

          The blessed martyrs of Tyre, in Phoenicia, whose number is known only to God. They were slain by Veturius, military instructor under the Emperor Diocletian, with a great number and variety of torments. They were first lacerated with stripes, then given to diverse kinds of beasts but as these, through the power of God, would not hurt them, they were savagely tortured anew with fire and iron and put to death. This glorious multitude were cheered on to victory by the Bishops Tyrannio, Silvan, Peleus, and Nilus, and the Priest Zenobius, who by a happy contention, along with them, gained the same palm of martyrdom together with them.
          On the same 20th day of February, were also born into the better life: In the island of Cyprus, the holy martyrs Pothamius and Nemesius.
          At Constantinople, [in the year 490,] the holy martyr Eleutherius, [eighth] Patriarch of that city. [He had replaced Acacius, who favoured the Eutychians.]
          In Persia, [in the year 342,] holy Sadoth, [Arch]bishop [of Seleucia and Ctesephon, in Persia, successor to St. Simeon,] and an hundred and twentyeight others who refused to worship the sun, under Sapor, King of the Persians, and by cruel deaths gained glorious crowns.
          At Catania, in Sicily, [in the eighth century,] holy Leo, Bishop of that see, who shone with graces and miracles.
          On the same day, [in the year 738,] holy Eucherius, Bishop of Orleans, who shone with more miracles the more he was belied by his enemies.
          At Tournai, in Hainaut, [in the year 531,] the holy Confessor Eleutherius, Bishop of that see.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Mártii

          Tyri, in Phœnícia, commemorátio beatórum Mártyrum, quorum númerum solíus sciéntia Dei cólligit. Hi omnes, sub Diocletiáno Imperatóre, a Vetúrio, mílitum magístro, multis tormentórum genéribus, sibi invícem succedéntibus, occísi sunt; nam, primo quidem flagris toto córpore dilaniáti, inde divérsis bestiárum genéribus tráditi, sed ab illis divína virtúte nil læsi, post, áddita feritáte ignis ac ferri, martýrium consummárunt. Eórum vero gloriósam multitúdinem ad victóriam incitábant Epíscopi Tyránnio, Silvánus, Péleus et Nilus, ac Présbyter Zenóbius, qui, felíci agóne, una cum illis, martýrii palmam adépti sunt.
          Constantinópoli sancti Eleuthérii, Epíscopi et Mártyris.
          In Pérside natális sancti Eleuthérii, Epíscopi, et aliórum centum vigínti octo; qui, sub Rege Persárum Sápore, cum Solem adoráre renuíssent, crudéli nece præcláras sibi corónas comparárunt.
          In Cypro sanctórum Mártyrum Potámii et Nemésii.
          Cátanæ, in Sicília, sancti Leónis Epíscopi, qui virtútibus atque miráculis coruscávit.
          Eódem die sancti Euchérii, Aurelianénsis Epíscopi, qui eo magis miráculis cláruit, quo plúribus invidórum calúmniis fuit oppréssus.
          Tornáci, in Gálliis, sancti Eleuthérii, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Twenty-Third of February
      
          At Tyre in Phoenicia, a commemoration of the blessed Martyrs, whose number the knowledge of God alone comprehends. All these, under the Emperor Diocletian, were slain by Veturius, master of soldiers, by many kinds of torments succeeding one another; for first they were torn over the whole body with scourges, then given to various kinds of beasts, but by divine power suffered no harm from them; thereafter, with added ferocity of fire and sword, they completed their martyrdom. The glorious multitude of the martyrs was urged on to victory by the Bishops Tyrannio, Silvanus, Peleus, and Nilus, and the Priest Zenobius, who, in a blessed contest, together with them, obtained the palm of martyrdom.
          At Constantinople, Saint Eleutherius, Bishop and Martyr.
          In Persia, the birthday of Saint Eleutherius, Bishop, and one hundred twenty-eight others; who, under the Persian king Sapor, having refused to adore the Sun, obtained for themselves glorious crowns by a cruel death.
          In Cyprus, the holy Martyrs Potamius and Nemesius.
          At Catania in Sicily, Saint Leo the Bishop, who shone with virtues and miracles.
          On the same day, Saint Eucherius, Bishop of Orleans, who was the more renowned for miracles the more he was oppressed by the calumnies of his enviers.
          At Tournai in Gaul, Saint Eleutherius, Bishop and Confessor.
  psalm.d-cimo-kal-ndas-maii-1b28232491:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 22nd day of April, were born into the better life:

          At Rome, upon the Appian Way, the holy martyr Soter, Pope [in the years 162-170.]
          At Rome likewise, the holy martyr Caius, Pope [in the years 283-295,] who was crowned with martyrdom under the Emperor Diocletian.
          At Smyrna, holy Apelles and Lucius, who were among the earliest disciples of Christ. [Apelles is said by the Greeks to have ruled the Church of Smyrna, and Lucius that of Laodicea. They are mentioned by St Paul in the Epistle to the Romans, ch. xvi.]
          Upon the same day very many holy martyrs, who were slain with the sword for Christ's name's sake by order of King Sapor in diverse places throughout the whole kingdom of Persia, in the year following the death of Simeon, and like him upon the day upon which is made the memorial of the Passion of the Lord. In this contending for the faith [from the year 341 till 386,] there suffered the eunuch Azades, who was a favourite of the king; Milles, Bishop [of a town in Persia,] who was illustrious for his holiness and for the glory of his miracles; Acepsimas, Bishop [of Honite, in Syria,] along with James his Priest the Priests; Aithalas, [Deacon of Bathnukadra,] and Joseph, [Priest of Bethcatuba,] the Deacons Azadanes and Abd-Jesus, and very many others of the clergy; likewise also the Bishops Mareas and Bicor, along with twenty other bishops, and nearly two hundred and fifty of the clergy; likewise also very many monks, and hallowed virgins, among whom was Tarbula, the sister of holy Simeon, along with her waiting-woman, who were most cruelly slain by being bound to beams and cut through with a saw.
          Also in Persia, [in the year 251,] the holy martyrs, the Priests Parmenius, Helimenas, and Chrysotelus, and the Deacons Luke and Mucius, whose triumph is recorded in the history of the sufferings of the holy martyrs Abdon and Sennen.
          At Alexandria, the holy martyr Leonides, who suffered under the Emperor Severus.
          At Lyons, [in the year 177,] holy martyr Epipodius, who was arrested along with his colleague Alexander, in the persecution under the Emperor Antoninus Verus, and after suffering most grievous torments was beheaded.
          At Sens, [in the year 541,] the holy Confessor Leo, Bishop of that see.
          At Anastasiopolis, [in Galatia, in the year 613,] holy Theodore, Bishop [of that see,] famous for miracles.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Maii

          Romæ, via Appia, natális sancti Sotéris, Papæ et Mártyris.
          Item Romæ sancti Caii, Papæ et Mártyris; qui martýrio coronátus est sub Diocletiáno Príncipe.
          Smyrnæ sanctórum Apéllis et Lúcii, ex primis Christi discípulis.
          Eódem die sanctórum plurimórum Mártyrum, qui, sequénti anno post óbitum Simeónis, ánnuo item die quo passiónis Domínicæ memória celebrabátur, per totam Pérsidis regiónem, pro Christi nómine, sub Rege Sápore, gládio cædi iussi sunt. In quo fídei certámine passus est Azades eunúchus, Regi caríssimus; Milles Epíscopus, sanctitáte et miraculórum virtúte insígnis; Acépsimas Epíscopus, cum Presbýtero suo Iacóbo, item Aíthala et Iosépho Presbýteris, Azadáne et Abdiéso Diáconis, et complúribus áliis Cléricis; Maréas quoque et Bicor Epíscopi, cum áliis vigínti Epíscopis, et Cléricis fere ducéntis quinquagínta, Mónachis étiam et sacris Virgínibus plúrimis. Has inter Vírgines fuit étiam sancti Simeónis Epíscopi soror, nómine Tárbula, cum pedíssequa sua; quæ, stipítibus alligátæ serráque scissæ, crudelíssime necátæ sunt.
          Item in Pérside sanctórum Parménii, Heliménæ et Chrysotéli Presbyterórum, Lucæ et Múcii Diaconórum, quorum triúmphus martýrii in passióne sanctórum Abdon et Sennen habétur.
          Alexandríæ natális sancti Leónidæ Mártyris, qui sub Sevéro passus est.
          Lugdúni, in Gállia, sancti Epipódii, qui, in persecutióne Antoníni Veri, cum Alexándro colléga tentus, ibídem, post dira torménta, martýrium abscissióne cápitis complévit.
          Constantinópoli sancti Agapíti Papæ Primi, cuius sánctitas a beáto Gregório Magno commendátur. Ipsíus autem corpus, póstea Romam relátum, in Vaticáno cónditum est.
          Apud Sénonas sancti Leónis, Epíscopi et Confessóris.
          Anastasiópoli, in Galátia, sancti Theodóri Epíscopi, miráculis clari.
      en2:
      - type: text
        text: |-
          The Twenty-Third of April
      
          At Rome, on the Appian Way, the birthday of Saint Soter, Pope and Martyr.
          Likewise at Rome, Saint Gaius, Pope and Martyr; who was crowned with martyrdom under the Prince Diocletian.
          At Smyrna, Saints Apelles and Lucius, among the first disciples of Christ.
          On the same day, very many holy Martyrs who, the year following the death of Simeon, on the same anniversary day on which the memory of the Lord's Passion was celebrated, were ordered to be put to the sword throughout the whole region of Persia for the name of Christ, under king Sapor. In this contest of faith there suffered Azades the eunuch, most dear to the king; Milles the Bishop, distinguished for holiness and the power of miracles; Acepsimas the Bishop, with his Priest James, and likewise the Priests Aithala and Joseph, the Deacons Azadanes and Abdieso, and very many other Clergy; also the Bishops Mareas and Bicor, with about twenty other Bishops, and nearly two hundred fifty Clergy, and many Monks and holy Virgins. Among these Virgins was also the sister of Saint Simeon the Bishop, by name Tarbula, with her maidservant; who, bound to stakes and sawn asunder, were most cruelly slain.
          Likewise in Persia, the holy Priests Parmenius, Helimenas, and Chrysoteles, the Deacons Lucas and Mucius, whose triumph of martyrdom is contained in the passion of Saints Abdon and Sennens.
          At Alexandria, the birthday of Saint Leonidas the Martyr, who suffered under Severus.
          At Lyons in Gaul, Saint Epipodius, who, in the persecution of Antoninus Verus, was seized there with his companion Alexander, and there, after dreadful torments, completed his martyrdom by the cutting off of his head.
          At Constantinople, Saint Agapetus I, Pope, whose holiness is commended by the blessed Gregory the Great. His body, afterward brought back to Rome, was interred in the Vatican.
          Near Sens, Saint Leo, Bishop and Confessor.
          At Anastasiopolis in Galatia, Saint Theodore the Bishop, renowned for miracles.
  psalm.d-cimo-kal-ndas-nov-mbris-4e2301037f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the solemn feast of Our Most Holy Redeemer, whose venerable image was taken by barbarians and carried off into Africa, where it was treated with mocking and insults, and then was cast away into a lion's den. It was bought back for money by the bare-footed Friars of the Order of the Most Holy Trinity, and brought to Spain, where it is distinguished everywhere for signs and wonders, and is worshipped and honoured with great earnestness by the people under the Most Holy Name of Jesus of Nazareth.
          Upon the same 23rd day of October, were born into the better life:

          At Osuna, near Cadiz, in Spain, the holy martyrs Servandus and Germanus. Under the Imperial Vicar Viator, in the persecution under the Emperor Diocletian, they suffered stripes, a foul imprisonment, hunger and thirst, and a long and toilsome journey, which they were forced to make loaded with irons, and in the end finished the course of their martyrdom by being beheaded. Germanus is buried at Merida and Servandus at Seville.
          At Antioch, in Syria, the holy Priest Theodore. In the persecution under the Emperor Julian, the impious apostate, he was arrested and racked, and after many and terrible sufferings, wherein he was partly burnt by the putting of lamps to his sides, he was beheaded, and so finished his martyrdom, still steadfast in the confession of Christ.
          At Granada, in Spain, is commemorated the blessed martyr Peter Paschal, Bishop of Jaen, of the Order of the Blessed Mary of Ransom for the Redemption of Captives, who suffered upon the 6th day of December, (in the year 1300.)
          At Constantinople, (in the year 878,) the holy Archbishop Ignatius, who suffered much at the hands of the Caesar Bardas, because he rebuked him for having put away his wife, and was sent into exile, but was restored by Nicholas I., Pope of Rome, and in the end fell asleep in peace.
          At Bordeaux, (in the fifth century,) the holy Confessor Severinus, Bishop of Cologne, (and afterward of Bordeaux.)
          At Rouen, (in the seventh century,) holy Romanus, Bishop (of that see.)
          At Salerno, (in the fifth century,) holy Verus, Bishop (of that see.)
          In the country of Amiens, (in the eighth century,) the holy Priest Domitius.
          At Poitiers, the holy Confessor Benedict.
          At Willach, in Pannonia, the holy Confessor John of Capistrano, of the Order of Friars Minor, illustrious for the holiness of his life and for his zeal for the propagation of the Catholic faith, who by his prayers and miracles procured the defeat of a vast army of Turks, and delivered the fortress of Belgrade from beleaguerment. We keep his feast upon the 28th day of March.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Novémbris

          Sancti Antónii Maríæ Claret, Epíscopi et Confessóris, cuius dies natális sequénti die recensétur.
          Apud Villáckum, in Pannónia, natális sancti Ioánnis de Capistráno, Sacerdótis ex Ordine Minórum et Confessóris, vitæ sanctitáte ac fídei cathólicæ propagándæ zelo illústris; qui Taurunénsem arcem, validíssimo Turcárum exércitu profligáto, suis précibus et miráculis ab obsidióne liberávit. Eius tamen festívitas quinto Kaléndas Aprílis recólitur.
          Antiochíæ item natális sancti Theodóri Presbýteri, qui, in persecutióne ímpii Iuliáni comprehénsus, et, post equúlei pœnam et multos ac duríssimos cruciátus, lampádibus étiam circa látera appósitis adústus, tandem, cum in confessióne Christi persísteret, gládii occisióne martýrium consummávit.
          Ad fundum Ursoniánum, prope Gades, in Hispánia, sanctórum Mártyrum Servándi et Germáni, qui, in persecutióne Diocletiáni, sub Viatóre Vicário, post vérbera, squalórum cárceris, famis ac sitis iniúriam, et longíssimi itíneris labórem, quem pertulérunt ferro onústi, novíssime martýrii sui cursum, cæsis cervícibus, implevérunt; ex quibus Germánus Eméritæ, Servándus autem Híspali cónditus est.
          Constantinópoli sancti Ignátii Epíscopi, qui, cum Bardam Cǽsarem ob repudiátam uxórem arguísset, ab eo multis iniúriis afféctus est, et in exsílium pulsus; sed, a sancto Nicoláo, Románo Pontífice, restitútus, tandem in pace quiévit.
          Burdígalæ sancti Severíni, Epíscopi Coloniénsis et Confessóris.
          Rotómagi sancti Románi Epíscopi.
          Apud Salérnum sancti Veri Epíscopi.
          In território Ambianénsi sancti Domítii Presbýteri.
          In pago Pictaviénsi sancti Benedícti Confessóris.
          Mántuæ Beáti Ioánnis Boni, ex Eremitárum sancti Augustíni Ordine, Confessóris; cuius præcláram vitam sanctus Antonínus conscrípsit.
      en2:
      - type: text
        text: |-
          The Twenty-Second of October
      
          Saint Anthony Mary Claret, Bishop and Confessor, whose birthday is recorded on the following day.
          Near Villach in Pannonia, the birthday of Saint John of Capistrano, Priest of the Order of Friars Minor and Confessor, illustrious for holiness of life and zeal for propagating the catholic faith; who by his prayers and miracles freed the fortress of Belgrade, when a most powerful army of the Turks had been routed. His feast, however, is commemorated on the twenty-eighth of March.
          At Antioch, likewise the birthday of Saint Theodore the Priest, who, seized in the persecution of the impious Julian and, after the torment of the rack and many most severe sufferings, also burned with torches applied to his sides, finally, persisting in the confession of Christ, completed his martyrdom by the slaying of the sword.
          At the estate of Ursonianum, near Cadiz in Spain, the holy Martyrs Servandus and Germanus, who, in the persecution of Diocletian, under the Vicar Viator, after stripes, the squalor of prison, the suffering of hunger and thirst, and the toil of a very long journey, which they endured laden with iron, at last completed the course of their martyrdom with severed necks; of these, Germanus was buried at Merida and Servandus at Seville.
          At Constantinople, Saint Ignatius the Bishop, who, having rebuked the Caesar Bardas for repudiating his wife, was afflicted by him with many injuries and driven into exile; but, restored by Saint Nicholas, the Roman Pontiff, finally rested in peace.
          At Bordeaux, Saint Severinus, Bishop of Cologne and Confessor.
          At Rouen, Saint Romanus the Bishop.
          Near Salerno, Saint Verus the Bishop.
          In the territory of Amiens, Saint Domitius the Priest.
          In the district of Poitiers, Saint Benedict the Confessor.
          At Mantua, Blessed John Bonus, of the Order of Hermits of Saint Augustine, Confessor; whose distinguished life Saint Antoninus wrote.
  psalm.d-cimo-kal-ndas-oct-bris-8217baba25:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the morrow we keep the feast of the holy Confessor Thomas of Villanueva, Bishop of Valencia, in Spain, of whom mention is made upon the 8th day of this present month of September.
          Upon the same 22nd day of September, were born into the better life:
          At Sion, in Switzerland, the holy martyrs of the Theban Legion Maurice, Exuperius, Candidus, Victor, Innocent, Vitalis, and their Comrades, who were massacred for Christ's sake under the Emperor Maximian, and have enlightened the whole world by the glory of their passion.
          At Rome, under the Emperors Valerian and Gallienus, the holy Virgins Digna and Emerita, both martyrs. Their relics are kept in the Church of St. Marcellus.
          At Chartres, the holy martyr Jonah, a Priest, who came into Gaul along with holy Denis, and was, by command of the Prefect Julian, flogged and beheaded.
          At Regensburg, in Bavaria, (in the seventh century,) the holy martyr Emmeram, the Bishop who, in order that he might deliver others, patiently submitted to a most cruel death for Christ's sake.
          At Antinoopolis, in Egypt, the holy martyrs Irais, a Virgin of Alexandria, and her Companions. She was gone out to draw water from a well near by when she saw a ship full of confessors of Christ, and thereupon she forthwith left her water-pot and joined them, and was brought along with them into the city, where she first of all, after many torments, was beheaded, and then all the rest, of whom some were Priests, Deacons, or Virgins, were put to the same death.
          At Meaux, blessed Sanctinus, a disciple of holy Denys the Areopagite, who consecrated him Bishop of that city, where he was the first to preach the Gospel.
          In the country of Coutances, (in the sixth century,) the holy Confessor Lauto, Bishop (of that see.)
          In Poitou, (in the fifth century,) the holy Priest Florence.
          In the country of Bourges, (in the first century,) the holy Confessor Silvan.
          At Laon, (in the seventh century,) the holy widow Salaberga, Abbess (of the Monastery of St. John the Baptist.)
      la:
      - type: text
        text: |-
          Décimo Kaléndas Octóbris

          Sancti Thomæ a Villa Nova, ex Eremitárum sancti Augustíni Ordine, Epíscopi Valentíni et Confessóris; cuius dies natális recólitur sexto Idus Septémbris.
          Sedúni, in Gállia, in loco Agáuno, natális sanctórum Mártyrum Thebæórum Maurítii, Exsupérii, Cándidi, Victóris, Innocéntii et Vitális, cum Sóciis eiúsdem legiónis; qui, sub Maximiáno, pro Christo necáti, gloriósa passióne mundum illustrárunt.
          Romæ pássio sanctárum Vírginum et Mártyrum Dignæ et Eméritæ, sub Valeriáno et Galliéno; quarum relíquiæ in Ecclésia sancti Marcélli asservántur.
          Ratisbónæ, in Bavária, sancti Emmerámi, Epíscopi et Mártyris; qui, ut álios liberáret, mortem sævíssimam, Christi causa, patiénter súbiit.
          Apud pagum Castrénsium sancti Ionæ, Presbýteri et Mártyris; qui, cum sancto Dionýsio proféctus in Gálliam, ibídem, Iuliáni Præfécti iussu verbéribus cæsus, gládio martýrium consummávit.
          Antinoópoli, in Ægýpto, sanctæ Iráidis, Vírginis Alexandrínæ, et Sociórum Mártyrum. Ipsa Virgo, cum esset ad hauriéndam e próximo fonte aquam egréssa, et navim vidísset Confessóribus Christi onústam, prótinus, relícta hýdria, se illis adiúnxit, ac, simul cum iis in urbem ducta, prima ómnium, post multa supplícia, cápite cæsa est; deínde Presbýteri, Diáconi, et Vírgines, aliíque omnes eódem mortis génere consúmpti sunt.
          Romæ sancti Felícis Papæ Quarti, qui pro fide cathólica plúrimum laborávit.
          Apud civitátem Meldénsem beáti Sanctíni Epíscopi, qui fuit discípulus sancti Dionýsii Areopagítæ; et, eiúsdem civitátis Epíscopus ab eo consecrátus, primus illic Evangélium prædicávit.
          In território Constantiénsi, in Gállia, sancti Lautónis Epíscopi.
          In monte Glonna, ad Lígerim flumen, in Gállia, sancti Floréntii Presbýteri.
          In óppido cui Leprósii nomen, in território Bituricénsi, sancti Silváni Confessóris.
          Laudúni, in Gállia, sanctæ Salabérgæ Abbatíssæ.
      en2:
      - type: text
        text: |-
          The Twenty-Second of September
      
          Saint Thomas of Villanova, of the Order of Hermits of Saint Augustine, Bishop of Valencia and Confessor; whose birthday is commemorated on the eighth of September.
          At Sion in Gaul, at the place called Agaunum, the birthday of the holy Martyrs of the Theban Legion: Maurice, Exsuperius, Candidus, Victor, Innocentius, and Vitalis, with the companions of the same legion; who, under Maximianus, slain for Christ, illustrated the world by their glorious passion.
          At Rome, the passion of the holy Virgins and Martyrs Digna and Emerita, under Valerian and Gallienus; whose relics are preserved in the church of Saint Marcellus.
          At Regensburg in Bavaria, Saint Emmeram, Bishop and Martyr; who, that he might free others, patiently endured a most savage death for the cause of Christ.
          Near the village of Castres, Saint Jonas, Priest and Martyr; who, having set out into Gaul with Saint Denis, was there beaten with rods by the order of the governor Julian, and completed his martyrdom by the sword.
          At Antinopolis in Egypt, Saint Iraïs, Alexandrian Virgin, and her companions the Martyrs. The Virgin herself, having gone out to draw water from a nearby spring and seeing a ship laden with Confessors of Christ, immediately left her water jar, joined them, and, brought with them into the city, was first of all, after many torments, beheaded; then Priests, Deacons, and Virgins, and all the others were consumed by the same kind of death.
          At Rome, Saint Felix IV, Pope, who labored greatly for the catholic faith.
          Near the city of Meaux, Blessed Sanctinus the Bishop, who was a disciple of Saint Denis the Areopagite; and, consecrated Bishop of that same city by him, was the first to preach the Gospel there.
          In the territory of Constance in Gaul, Saint Lautonis the Bishop.
          On Mount Glanfeuil, by the Loire river in Gaul, Saint Florentius the Priest.
          In the town called Lepreux, in the territory of Bourges, Saint Silvanus the Confessor.
          At Laon in Gaul, Saint Salaberga the Abbess.
  psalm.d-cimo-kal-ndas-sept-mbris-6e5b631757:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the eve of the holy Apostle Bartholomew.
          Upon the same 23rd day of August, were born into the better life:

          At Todi, [in Umbria, in the year 1285,] the holy Confessor Philip Benizi of Florence, a man of eminent lowliness, who greatly spread the Order of Servants of the Blessed Virgin Mary, and whose name Pope Clement X added to the list of those of the Saints.
          At Antioch, [in the fourth century,] the holy martyrs Restitutus, Donatus, Valerian, and Fructuosa, along with twelve others, who were crowned with the glory of an illustrious testimony.
          At Ostia, [in the third century,] the holy martyrs Quiriacus, Bishop [of that see,] the Priest Maximus, the Deacon Archelaus, and their Companions, who suffered under the Prefect Ulpian, in the time of the Emperor Alexander.
          At Aegaea, in Cilicia, the holy brethren Claudius, Asterius, and Neon, all martyrs. They were accused of Christianity by their step-mother, in the time of the Emperor Diocletian, and were first severely tortured, and then crucified, under the President Lysias, and so triumphed as conquerors with Christ. After them suffered Donvina and Theonilla.
          At Reims, in Gaul, [in the third century,] the holy martyrs Timothy and Apolinaris, who there finished their testimony and gained the Kingdom of Heaven.
          At Lyon, [in the third century,] the holy martyrs Minervus and Eleazar, with eight children.
          Likewise, the holy martyr Luppus, who was a slave, but free in Christ, and received also the crown of martyrdom.
          At Jerusalem, [in the second century,] holy Zachaeus, the fourth Bishop from the blessed Apostle James who governed that Church.
          At Alexandria, [in the year 300,] the holy Confessor Theonas, Pope [of that see.]
          At Utica, in Africa, [in the fifth century,] blessed Victor, Bishop [of Vite, in the territory of Tunis.]
          At Autun, [in the seventh century,] holy Flavian, Bishop [of that see.]
          At Clermont, in Auvergne, [in the fifth century,] holy Sidonius, Bishop [of that see,] famous for his learning and holiness.
      la:
      - type: text
        text: |-
          Décimo Kaléndas Septémbris

          Sancti Philíppi Benítii Confessóris, qui Ordinis Servórum beátæ Maríæ Vírginis éxstitit propagátor, ac prídie huius diéi migrávit ad Dóminum.
          Apud Ostia Tiberína sanctórum Mártyrum Quiríaci Epíscopi, Máximi Presbýteri, Archelái Diáconi, et Sociórum, qui sub Ulpiáno Præfécto, témpore Alexándri, passi sunt.
          Antiochíæ natális sanctórum Mártyrum Restitúti, Donáti, Valeriáni et Fructuósæ, cum áliis duódecim; qui præclaríssimo confessiónis honóre coronáti sunt.
          Ægǽæ, in Cilícia, sanctórum Mártyrum fratrum Cláudii, Astérii et Neónis, qui, Christiánæ religiónis a novérca accusáti, sub Diocletiáno Imperatóre et Lýsia Prǽside, post acérba torménta cruci sunt affíxi, in qua victóres cum Christo triumphárunt. Passæ sunt post eos Donvína et Theonílla.
          Rhemis, in Gállia, natális sanctórum Timóthei et Apollináris, qui, ibídem consummáto martýrio, cæléstia regna meruérunt.
          Lugdúni, in Gállia, sanctórum Mártyrum Minérvi, et Eleazári cum fíliis octo.
          Item sancti Luppi Mártyris, qui, ex servíli conditióne, Christi libertáte donátus, martýrii quoque coróna dignátus est.
          Hierosólymis sancti Zachǽi Epíscopi, qui, quartus a beáto Iacóbo Apóstolo, Hierosolymitánam Ecclésiam rexit.
          Alexandríæ sancti Theónæ, Epíscopi et Confessóris.
          Uticæ, in Africa, beáti Victóris Epíscopi.
          Augustodúni sancti Flaviáni Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-Second of August
      
          Saint Philip Benizi the Confessor, who was the promoter of the Order of the Servants of the Blessed Virgin Mary, and passed to the Lord on the day before this.
          Near the mouth of the Tiber, the holy Martyrs Quiriacus the Bishop, Maximus the Priest, Archelaus the Deacon, and their companions, who suffered under the Prefect Ulpianus in the time of Alexander.
          At Antioch, the birthday of the holy Martyrs Restitutus, Donatus, Valerianus, and Fructuosa, with twelve others; who were crowned with the most distinguished honor of confession.
          At Aegae in Cilicia, the holy Martyr brothers Claudius, Asterius, and Neon, who, accused of the Christian religion by their stepmother, under the Emperor Diocletian and the governor Lysias, after bitter torments were affixed to the cross, on which they triumphed as victors with Christ. After them, Donvina and Theonilla suffered.
          At Reims in Gaul, the birthday of Saints Timothy and Apollinaris, who, having completed their martyrdom there, merited the celestial kingdom.
          At Lyons in Gaul, the holy Martyrs Minervus and Eleazar with his eight sons.
          Likewise, Saint Lupus the Martyr, who, freed from the condition of servitude by the liberty of Christ, was also deemed worthy of the crown of martyrdom.
          At Jerusalem, Saint Zachaeus the Bishop, who, fourth from the blessed Apostle James, governed the Church of Jerusalem.
          At Alexandria, Saint Theonas, Bishop and Confessor.
          At Utica in Africa, Blessed Victor the Bishop.
          At Autun, Saint Flavianus the Bishop.
  psalm.d-cimo-nono-kal-ndas-febru-rii-a00b08d09e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Hilary, Bishop of Poitiers, and Doctor of the Church, who passed away to heaven upon this present day.
          Upon the same 14th day of January, were born into the better life:

          At Nola, in Campania, the holy Priest Felix. Holy Paulinus, Bishop of the same city, writeth that after the persecutors had put Felix to the torture they committed him to prison, where they laid him in chains, upon shells and potsherds, but in the night an angel loosed him and led him forth. In after-times, when the persecution was over and he had turned many to Christ by his example and teaching, he fell asleep, famous for miracles, (about the year 256.)
          In Judea, the holy Prophet Malachi, (415 B.C.)
          Upon Mount Sinai, thirty-eight holy monks, who were massacred by the Saracens for Christ's faith's sake, (in the year 373.)
          In the country of Rhaithia, in Egypt, forty-three holy monks who were massacred by the Blemmyes for the Christian religion's sake, (in the year 373.)
          At Milan, (in the year 552,) the holy Confessor Datius, Bishop of that see, of whom blessed Pope Gregory maketh mention.
          In Africa, the holy Bishop Euphrasius, (in the year 515.)
          In Syria, holy Julian of Saba, the elder, who in the time of the Emperor Valens, by the power of his miracles, set up again at Antioch the Catholic faith, when it was almost quite fallen away.
          At Neo-Caesarea, in Pontus, (in the fourth century,) holy Macrina, a disciple of blessed Gregory the wonder-worker, and grandmother of holy Basil, whom she trained up in the faith.
      la:
      - type: text
        text: |-
          Décimo nono Kaléndas Februárii

          Sancti Hilárii, Epíscopi Pictaviénsis, Confessóris et Ecclésiæ Doctóris; qui prídie huius diéi evolávit in cælum.
          Nolæ, in Campánia, natális sancti Felícis Presbýteri, qui (ut sanctus Paulínus Epíscopus scribit), cum a persecutóribus post torménta in cárcerem missus esset, et cóchleis ac téstulis vinctus superpósitus iacéret, nocte ab Angelo solútus atque edúctus fuit; póstmodum vero, cessánte persecutióne, ibídem, cum multos ad Christi fidem exémplo vitæ ac doctrína convertísset, clarus miráculis quiévit in pace.
          In Iudǽa sancti Malachíæ Prophétæ.
          In monte Sina sanctórum trigínta octo Monachórum, a Saracénis ob Christi fidem interfectórum.
          In Rhaíthi regióne, in Ægýpto, sanctórum quadragínta trium Monachórum, qui, pro Christiána religióne, a Blémmiis occísi sunt.
          Medioláni sancti Dátii, Epíscopi et Confessóris; cuius méminit beátus Gregórius Papa.
          In Africa sancti Euphrásii Epíscopi.
          Neocæsaréæ, in Ponto, sanctæ Macrínæ, discípulæ beáti Gregórii Thaumatúrgi, et áviæ sancti Basilíi, quæ eúndem Basilíum educávit.
      en2:
      - type: text
        text: |-
          The Fourteenth of January
      
          Saint Hilary, Bishop of Poitiers, Confessor and Doctor of the Church; who flew to heaven on the day before this.
          At Nola in Campania, the birthday of Saint Felix the Priest, who (as Saint Paulinus the Bishop writes), having been sent to prison after torments by persecutors, and placed lying bound upon snail shells and potsherds, was at night loosed and led out by an Angel; and afterwards, when the persecution had ceased, having converted many to the faith of Christ in the same place by the example of his life and by his teaching, he rested in peace there, renowned for miracles.
          In Judea, the holy Prophet Malachi.
          On Mount Sinai, thirty-eight Monks slain by Saracens for the faith of Christ.
          In the region of Raithu in Egypt, forty-three Monks killed by the Blemyes for the Christian religion.
          At Milan, Saint Datius, Bishop and Confessor, of whom the blessed Pope Gregory makes mention.
          In Africa, Saint Euphrasius the Bishop.
          At Neocaesarea in Pontus, Saint Macrina, disciple of the blessed Gregory the Wonderworker, and grandmother of Saint Basil, who brought up the same Basil.
  psalm.d-cimo-nono-kal-ndas-ianu-rii-da0d0f7254:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 14th day of December, were born into the better life:

          At Alexandria, (in the year 250,) the holy martyrs Heron, Arsenius, and Isidore, and a lad Dioscorus. In the persecution under the Emperor Decius the judge caused Heron, Arsenius, and Isidore to be lacerated with diverse torments, and, when he saw them to be all equally steadfast, to be burnt. Dioscorus was heavily whipped, but God was pleased that, for the comfort of the faithful, he should then be set at liberty.
          At Antioch, the holy martyrs Drusus, Zosimus, and Theodore.
          Upon the same day, (in the year 284,) the holy martyrs Justus and Abundius. Under Olybrius the President, in the persecution under the Emperor Numerian, they were cast into the fire, and when they appeared thence unburnt, they were beheaded.
          At Reims, the holy martyrs Nicasius, Bishop, (in the year 400,) of that see the Virgin Eutropia, his sister, and their Companions, who were slain by the savage enemies of the Church (in the year 407.)
          In the island of Cyprus the blessed Spiridion, Bishop (of Tremithos) he was one of those Confessors whose right eyes were put out and their left thighs hamstrung, and were condemned to penal servitude in the mines by the Emperor Galerius Maximian. He was illustrious for the gift of prophecy, and the fame of miracles, and at the Council of Nicea, (held in 325,) he confuted and converted to the faith a heathen philosopher who attacked the Christian religion, (and died after the year 347.)
          At Bergamo, the holy Confessor Viator, Bishop (of that see.)
          At Pavia, holy Pompey, Bishop (of that see.)
          At Naples, in Campania, (in the year 596,) holy Agnello, Abbot (at Naples,) famous for the grace of miracles, who, when the city had been beleaguered, had often been seen with a flag marked with a cross, delivering it from the enemy.
          At Ubeda, in Spain, the holy Confessor John of the Cross (died in 1591) a companion of holy Teresa in reforming the Carmelites, whose feast is kept upon the 24th day of November.
          At Milan, the holy Hermit Matronian.
      la:
      - type: text
        text: |-
          Décimo nono Kaléndas Ianuárii

          Ubédæ, in Hispánia, natális sancti Ioánnis a Cruce, Presbýteri et Confessóris, sanctæ Terésiæ in Carmelitárum reformatióne sócii; quem, a Summo Pontífice Benedícto Décimo tértio Sanctis adscríptum, Pius Papa Undécimus Doctórem universális Ecclésiæ declarávit. Ipsíus tamen festívitas ágitur octávo Kaléndas Decémbris.
          Rhemis, in Gállia, pássio sanctórum Nicásii Epíscopi, ac soróris Eutrópiæ Vírginis, et Sociórum Mártyrum; qui a bárbaris Ecclésiæ hóstibus cæsi sunt.
          Alexandríæ sanctórum Mártyrum Herónis, Arsénii, Isidóri, et Dióscori púeri. Horum tres primos Iudex, in persecutióne Deciána, cum eos, váriis torméntis dilánians, pari armátos constántia vidéret, tradi ígnibus iubet; Dióscorus vero, multiplíciter flagellátus, divíno nutu ad consolatiónem fidélium dimíssus est.
          Antiochíæ natális sanctórum Mártyrum Drusi, Zósimi et Theodóri.
          Eódem die pássio sanctórum Iusti et Abúndii, qui, sub Numeriáno Imperatóre et Olýbrio Prǽside, coniécti in ignem, et, cum inde evasíssent illǽsi, gládio percússi sunt.
          In Cypro natális beáti Spiridiónis Epíscopi, qui unus fuit ex illis Confessóribus, quos Galérius Maximiánus, dextro oculo effósso et sinístro póplite succíso, ad metálla damnáverat. Hic prophetíæ dono et signórum glória ínclitus fuit, et in Nicǽno Concílio philósophum éthnicum, Christiánæ religióni insultántem, devícit et ad fidem perdúxit.
          Bérgomi sancti Viatóris, Epíscopi et Confessóris.
          Pápiæ sancti Pompéii Epíscopi.
          Neápoli, in Campánia, sancti Agnélli Abbátis, virtúte miraculórum illústris, qui obséssam urbem sæpe visus est Crucis vexíllo ab hóstibus liberáre.
          Medioláni sancti Matroniáni Eremítæ.
      en2:
      - type: text
        text: |-
          The Fourteenth of December
      
          At Ubeda in Spain, the birthday of Saint John of the Cross, Priest and Confessor, companion of Saint Teresa in the reform of the Carmelites; whom, enrolled among the Saints by the Supreme Pontiff Benedict XIII, Pope Pius XI declared Doctor of the Universal Church. His feast, however, is celebrated on the twenty-fourth of November.
          At Reims in Gaul, the passion of Saints Nicasius the Bishop, his sister Eutropia the Virgin, and companion Martyrs; who were slain by barbarian enemies of the Church.
          At Alexandria, the holy Martyrs Heron, Arsenius, Isidore, and the boy Dioscorus. The judge, in the Decian persecution, tearing apart the first three with various torments and seeing them armed with equal constancy, ordered them to be handed over to the flames; Dioscorus, however, having been beaten in many ways, was dismissed by divine dispensation for the consolation of the faithful.
          At Antioch, the birthday of the holy Martyrs Drusus, Zosimus, and Theodore.
          On the same day, the passion of Saints Justus and Abundius, who, under the Emperor Numerianus and the governor Olybrius, cast into fire and, having escaped thence unharmed, were struck with the sword.
          In Cyprus, the birthday of Blessed Spiridon the Bishop, who was one of those Confessors whom Galerius Maximianus had condemned to the mines, with the right eye gouged out and the left knee severed. He was renowned for the gift of prophecy and the glory of signs, and at the Council of Nicaea he vanquished an ethnic philosopher who was insulting the Christian religion and brought him to the faith.
          At Bergamo, Saint Viator, Bishop and Confessor.
          At Pavia, Saint Pompeius the Bishop.
          At Naples in Campania, Saint Agnellus the Abbot, illustrious for the power of miracles, who was often seen to free the besieged city from enemies with the banner of the Cross.
          At Milan, Saint Matronian the Hermit.
  psalm.d-cimo-nono-kal-ndas-sept-mbris-e92dc51343:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Eve of the Assumption of the Blessed Virgin Mary.
          Upon the same 14th day of August, were born into the better life:

          At Rome, [in the year 357,] the holy Priest Eusebius. On account of his defence of the Catholic faith the Arian Emperor Constantius caused him to be imprisoned in a bedchamber in his own house, where he lived for seven months, continuing instant in prayer, and then fell asleep. His body was taken by the Priests Gregory and Orosius and buried in the cemetery of Callistus, upon the Appian Way.
          In Illyricum, under the Emperor Maximian and the President Aristides, the holy martyr Ursicius, who was beheaded for Christ's name's sake after many and diverse torments.
          In Africa, the holy martyr Demetrius.
          At Apamea, in Syria, [in the year 389,] the holy martyr Marcellus, Bishop [of that see,] who was destroying a shrine of Jupiter when he was slain by the infuriated Gentiles.
          At Todi, [in Umbria,] the holy martyr Callistus, Bishop [of that see.]
          In the island of Jegima, in the Grecian Archipelago, [about the year 860,] the holy widow Athanasia, [Abbess of a monastery under the rule of St Basil,] famous for her monastic observance and her power of working miracles.
      la:
      - type: text
        text: |-
          Décimo nono Kaléndas Septémbris

          Vigília Assumptiónis beátæ Maríæ Vírginis.
          Romæ natális beáti Eusébii, Presbýteri et Confessóris, qui, ab Ariáno Imperatóre Constántio, ob cathólicæ fídei defensiónem, in quodam domus suæ cubiculo inclúsus, ibi, cum menses septem in oratióne constánter perseverásset, dormitiónem accépit. Ipsíus autem corpus collegérunt Gregórius et Orósius Presbýteri, et in cœmetério Callísti, via Appia, sepeliérunt.
          Apaméæ, in Sýria, sancti Marcélli, Epíscopi et Mártyris; qui, cum Iovis delúbrum diruísset, a furéntibus Gentílibus occísus est.
          Tudérti, in Umbria, sancti Callísti, Epíscopi et Mártyris.
          In Illýrico sancti Ursícii Mártyris, qui, sub Maximiáno Imperatóre et Aristíde Prǽside, post multa et divérsa torménta, pro Christi nómine, gládio cæsus est.
          In Africa sancti Demétrii Mártyris.
          In Ægína ínsula sanctæ Athanásiæ Víduæ, monástica observántia et miraculórum dono illústris.
      en2:
      - type: text
        text: |-
          The Fourteenth of August
      
          The Vigil of the Assumption of the Blessed Virgin Mary.
          At Rome, the birthday of Blessed Eusebius, Priest and Confessor, who, shut up by the Arian Emperor Constantius in a certain room of his house for his defense of the catholic faith, there, having persevered steadfastly for seven months in prayer, received his falling asleep. His body was gathered by the Priests Gregory and Orosius, and buried in the cemetery of Callixtus on the Appian Way.
          At Apamea in Syria, Saint Marcellus, Bishop and Martyr; who, having demolished the temple of Jupiter, was slain by the enraged Gentiles.
          At Todi in Umbria, Saint Callistus, Bishop and Martyr.
          In Illyricum, Saint Ursicius the Martyr, who, under the Emperor Maximianus and the governor Aristides, after many and diverse torments, was slain by the sword for the name of Christ.
          In Africa, Saint Demetrius the Martyr.
          On the island of Aegina, Saint Athanasia the Widow, illustrious for monastic observance and the gift of miracles.
  psalm.d-cimo-oct-vo-kal-ndas-dec-mbris-1875ba8088:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep in England the feast of holy Erconwald, Bishop of London, who was famous for many miracles, and of whom mention is made upon the last day of April.
          Upon the same 14th day of November, were born into the better life:

          At Heraclea, in Thrace, the holy martyrs Clementine, Theodotus, and Philomenus.
          At Alexandria, the holy martyr Serapion, whom the persecutors under the Emperor Decius most cruelly tormented until they dislocated all his joints, and then cast him down headlong from the top of his own house, and so made him a martyr for Christ.
          At Troyes, in Gaul, under the Emperor Aurelian, the holy martyr Venerandus.
          Likewise in Gaul, the holy Virgin Veneranda, who received the crown of martyrdom under the Emperor Antonine and Asclepiades the President.
          At Gangra, in Paphlagonia, the holy martyr Hypatius, Bishop (of that see,) who was stoned to death by the Novatian heretics on his way back from the great Council of Nicea.
          At Algiers, in Africa, (in the year 1240,) the blessed Serapion, the first martyr of the Order of Blessed Mary of Ransom for the Redemption of the Captive Faithful and the Preaching of the Christian Faith. He won his crown by being fastened to a cross and cut limb from limb.
          At Emesa, many holy Women, who, for Christ's faith's sake, were most cruelly tortured and murdered under the savage Arab chief Mady.
          At Bologna, the holy Confessor Jucundus, Bishop (of that see.) In Ireland, (in the year 1181,) holy Lorcan Ua Tuathail, Archbishop of Dublin.
      la:
      - type: text
        text: |-
          Décimo octávo Kaléndas Decémbris

          Sancti Iósaphat, e sancti Basilíi Ordine, Epíscopi Polocénsis et Mártyris, cuius dies natális recensétur prídie Idus Novémbris.
          Gangris, in Paphlagónia, sancti Hypátii Epíscopi, qui, a magna Nicǽna Sýnodo rédiens, a Novatiánis hæréticis in via lapídibus impetítus, Martyr occúbuit.
          Heracléæ, in Thrácia, natális sanctórum Mártyrum Clementíni, Theódoti et Philómeni.
          Alexandríæ sancti Serapiónis Mártyris, quem persecutóres, sub Décio Príncipe, ita crudelíssimis affecérunt supplíciis, ut cunctas ei iunctúras membrórum prius sólverent, eúmque póstea de superióribus domus suæ præcipitárent; atque ille sic gloriósus Christi Martyr efficerétur.
          Trecis, in Gállia, sancti Venerándi Mártyris, sub Aureliáno Imperatóre.
          In Gállia sanctæ Venerándæ Vírginis, quæ, sub Antoníno Imperatóre et Asclepíade Prǽside, martýrii corónam accépit.
          Eméssæ, in Phœnícia, pássio plurimárum sanctárum mulíerum, quæ, sub sævíssimo Arabum duce Mady, ob Christi fidem, crudelíssime tortæ atque necátæ sunt.
          Bonóniæ sancti Iucúndi, Epíscopi et Confessóris.
          Augæ, in Gállia, tránsitus sancti Lauréntii, Epíscopi Dublinénsis.
          Algáriæ, in Africa, beáti Serapiónis, qui, primus ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, pro captívis fidélibus rediméndis et Christiánæ fídei prædicatióne actus in crucem et membrátim disséctus, martýrii palmam méruit obtinére.
      en2:
      - type: text
        text: |-
          The Fifteenth of November
      
          Saint Josaphat, of the Order of Saint Basil, Bishop of Polotsk and Martyr, whose birthday is recorded on the twelfth of November.
          At Gangra in Paphlagonia, Saint Hypatius the Bishop, who, returning from the great Council of Nicaea, was set upon with stones on the road by the Novatian heretics and died a Martyr.
          At Heraclea in Thrace, the birthday of the holy Martyrs Clementinus, Theodotus, and Philomenus.
          At Alexandria, Saint Serapion the Martyr, whom the persecutors, under the Prince Decius, afflicted with most cruel torments in such a way that they first dislocated all the joints of his limbs, and afterward hurled him from the upper story of his house; and thus he was gloriously made a Martyr of Christ.
          At Troyes in Gaul, Saint Venerandus the Martyr, under the Emperor Aurelian.
          In Gaul, Saint Veneranda the Virgin, who, under the Emperor Antoninus and the governor Asclepiadus, received the crown of martyrdom.
          At Emessa in Phoenicia, the passion of very many holy women, who, under the most savage Arab leader Mady, for the faith of Christ, were most cruelly tortured and slain.
          At Bologna, Saint Jucundus, Bishop and Confessor.
          At Eu in Gaul, the passing of Saint Lawrence, Bishop of Dublin.
          At Algiers in Africa, Blessed Serapion, who, first of the Order of Our Lady of Mercy for the Redemption of Captives, for the ransom of faithful captives and the preaching of the Christian faith, was stretched on a cross and dismembered limb by limb, and merited to obtain the palm of martyrdom.
  psalm.d-cimo-oct-vo-kal-ndas-febru-rii-98c971527e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Paul, the first hermit, who was borne to his place among the blessed upon the 10th day of this present month of January.

          In the country of Angers, the blessed Maurus, (founder and) Abbot (of Glanfeuil,) a disciple of St. Benedict, by whom he was trained from his childhood, and made such headway that in obedience to him he walked upon water, a thing new and almost unheard of since the time of the Apostle Peter. Benedict sent him into Gaul, where he built a famous monastery, whereof he was Abbot for forty years, and fell asleep in peace, illustrious for miracles, (in the year 584.)
          In Judea, the holy prophets Habakkuk and Michah, (606 years before Christ,) whose bodies were found by revelation from God in the time of the Emperor Theodosius the elder, (between the years of Our Lord 346 and 395.)
          At Anagni, the holy Virgin and martyr Secundina, who suffered under the Emperor Decius.
          At Cagliari, in Sardinia, the holy martyr Ephisius, who under the judge Flavian, in the persecution under the Emperor Diocletian, was strengthened by God to overcome many torments, but in the end was beheaded, and so rose to heaven a conqueror.
          At Nola, in Campania, (about the year 252,) holy Maximus, Bishop of that see.
          In Auvergne, in Gaul, (in the year 710,) the holy Confessor Bonitus, Bishop of that see.
          In Egypt, the holy Macarius, (in the year 391,) Abbot (of Scittir,) a disciple of blessed Anthony, and very famous for his life and miracles.
          Likewise (in Egypt, in the year 391,) blessed Isidore, famous for the holiness of his life, his faith, and his miracles.
          At Rome, holy John, called the hidden, who lived unknown to his kinsfolk for a while in a corner of his father's house, and then in a hut upon an island in the Tiber, where he was recognised at the time of his death, and famous for miracles, was buried in the same place, where afterward a church was built in his name, (in the year 450.)
      la:
      - type: text
        text: |-
          Décimo octávo Kaléndas Februárii

          Sancti Pauli, primi Eremítæ, Confessóris, qui quarto Idus Ianuárii inter beátorum ágmina translátus fuit.
          In território Andegavénsi beáti Mauri Abbátis, qui fuit discípulus sancti Benedícti; et, huius disciplínis usque ab infántia erudítus, quantum in eis profécerit, inter ália quæ apud eum pósitus gessit (res nova et post Petrum fere inusitáta), pédibus super aquas incédens patefécit. In Gállias inde ab ipso Benedícto diréctus, ibi, constrúcto célebri monastério, cui quadragínta annis prǽfuit, miraculórum glória clarus, in pace quiévit.
          In Iudǽa sanctórum Hábacuc et Michǽæ Prophetárum, quorum córpora, sub Theodósio senióre, divína revelatióne sunt repérta.
          Cárali, in Sardínia, sancti Ephísii Mártyris, qui, in persecutióne Diocletiáni, sub Flaviáno Iúdice, plúrimis torméntis divína virtúte superátis, demum, abscíssis cervícibus, victor migrávit in cælum.
          Anágniæ sanctæ Secundínæ, Vírginis et Mártyris; quæ sub Décio Imperatóre passa est.
          Nolæ, in Campánia, sancti Máximi Epíscopi.
          Arvérnis, in Gállia, sancti Boníti, Epíscopi et Confessóris.
          In Ægýpto sancti Macárii Abbátis, qui fuit discípulus beáti Antónii, ac vita et miráculis celebérrimus éxstitit.
          Alexandríæ beáti Isidóri, sanctitáte vitæ, fide et miráculis clari.
          Constantinópoli sancti Ioánnis Calybítæ, qui aliquándiu in ángulo domus patérnæ, deínde in tugúrio, ignótus paréntibus, habitávit; a quibus in morte agnítus, miráculis cláruit. Ipsíus corpus póstea Romam translátum, et in Ínsulæ Tiberínæ Ecclésia, in eius honórem erécta, collocátum est.
      en2:
      - type: text
        text: |-
          The Fifteenth of January
      
          Saint Paul the First Hermit, Confessor, who was translated to the ranks of the blessed on the tenth of January.
          In the territory of Anjou, Blessed Maurus the Abbot, who was a disciple of Saint Benedict; and, trained in his discipline from infancy, how greatly he had profited therein he showed by walking upon the waters with his feet — a thing new and almost unheard of since Peter — among other deeds performed while staying with him. Thence sent by Benedict himself into Gaul, he there, having built a celebrated monastery over which he presided for forty years, rested in peace, renowned for the glory of miracles.
          In Judea, the holy Prophets Habakkuk and Micah, whose bodies were found by divine revelation in the time of the elder Theodosius.
          At Cagliari in Sardinia, Saint Ephisius the Martyr, who, in the persecution of Diocletian, under the judge Flavianus, having overcome many torments by divine power, at last, with his neck cut off, passed as victor into heaven.
          At Anagni, Saint Secundina, Virgin and Martyr; who suffered under the Emperor Decius.
          At Nola in Campania, Saint Maximus the Bishop.
          At Clermont in Gaul, Saint Bonitus, Bishop and Confessor.
          In Egypt, Saint Macarius the Abbot, who was a disciple of the blessed Anthony, and was most celebrated for his life and miracles.
          At Alexandria, Blessed Isidore, renowned for holiness of life, faith, and miracles.
          At Constantinople, Saint John the Calybite, who for some time dwelt in a corner of his father's house, then in a hut, unknown to his parents; recognized by them at the time of his death, he was renowned for miracles. His body was afterward translated to Rome and placed in a church on Tiber Island, erected in his honor.
  psalm.d-cimo-oct-vo-kal-ndas-i-lii-765830bef2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 14th day of June, were born into the better life:

          On the morrow we keep the feast of holy Basil, styled "the Great," Archbishop of Caesarea, in Pontus, Confessor and Doctor of the Church, of whom mention is made upon the 1st day of January, and on the 14th day of June, of his ordination to his see of Caesarea. In the time of the Emperor Valens he shone as a marvellous light, illustrious for teaching and wisdom, and shining with all graces, and defended the Church with wonderful firmness against the Arians and Macedonians.
          At Samaria, in Palestine, [in the sixth century before Christ,] the holy Prophet Elisha. Holy Jerome writeth that the devils shrink from his grave, where also resteth the Prophet Obadiah.
          At Syracuse, the holy Marcian, Bishop [of that see,] who was ordained Bishop by the blessed Apostle Peter. After he had preached the Gospel he was slain by the Jews.
          At Soissons, the holy martyrs Valerius and Rufinus, who after suffering diverse torments were beheaded by order of the President Rictiovarus in the persecution under Diocletian.
          At Cordova, [in the persecution by the Muslims,] the holy martyrs Anastasius a Priest, Felix a monk, and Digna a Virgin.
          At Constantinople, [in the year 846,] holy Methodius, Archbishop [of that see.]
          At Vienne, [in Gaul, in the seventh century,] holy Aetherius, Bishop [of that see.]
          At Rodez, [in Gaul, in the sixth century,] holy Quinctian, Bishop [first of that see and afterward of Clermont.]
      la:
      - type: text
        text: |-
          Décimo octávo Kaléndas Iúlii

          Sancti Basilíi, cognoménto Magni, Confessóris et Ecclésiæ Doctóris, qui Kaléndis Ianuárii obdormívit in Dómino, sed hac die potíssimum cólitur, qua Cæsariénsis in Cappadócia Epíscopus ordinátus est.
          Samaríæ, in Palæstína, sancti Eliséi Prophétæ, cuius sepúlcrum, ubi et Prophéta quiéscit Abdías, a dæmónibus perhorrésci sanctus Hierónymus scribit.
          Syracúsis, in Sicília, sancti Marciáni Epíscopi, qui, a beáto Petro Apóstolo ordinátus Epíscopus, ibídem, post Evangélii prædicatiónem a Iudǽis occísus est.
          Córdubæ, in Hispánia, sanctórum Mártyrum Anastásii Presbýteri, Felícis Mónachi, et Dignæ Vírginis.
          Apud Suessiónes, in Gálliis, sanctórum Mártyrum Valérii et Rufíni, qui, in persecutióne Diocletiáni, a Prǽside Rictiováro, post multa torménta, iussi sunt decollári.
          Constantinópoli sancti Methódii Epíscopi.
          Viénnæ, in Gállia, sancti Æthérii Epíscopi.
          Apud Rhuténos, in Gállia, sancti Quinctiáni Epíscopi.
      en2:
      - type: text
        text: |-
          The Fifteenth of June
      
          Saint Basil, surnamed the Great, Confessor and Doctor of the Church, who fell asleep in the Lord on the first of January, but is especially celebrated on this day, on which he was ordained Bishop of Caesarea in Cappadocia.
          In Samaria in Palestine, the holy Prophet Elisha, at whose tomb, where also the Prophet Obadiah rests, Saint Jerome writes that demons are stricken with terror.
          At Syracuse in Sicily, Saint Marcian the Bishop, who, ordained Bishop by the blessed Apostle Peter, was slain there by the Jews after the preaching of the Gospel.
          At Cordoba in Spain, the holy Martyrs Anastasius the Priest, Felix the Monk, and Digna the Virgin.
          Near Soissons in Gaul, the holy Martyrs Valerius and Rufinus, who, in the persecution of Diocletian, were ordered by the governor Rictiovarus, after many torments, to be beheaded.
          At Constantinople, Saint Methodius the Bishop.
          At Vienne in Gaul, Saint Aetherius the Bishop.
          Near Rodez in Gaul, Saint Quinctianus the Bishop.
  psalm.d-cimo-oct-vo-kal-ndas-ianu-rii-080b0e3086:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Tomorrow is the Octave of the Immaculate Conception of the Blessed Virgin Mary.
          Upon the same day is

          Commemorated the ordination (on December 15, about the year 340,) of holy Eusebius, Bishop of Vercelli, (he was a Reader of the Church of Rome,) who was born into the better life: upon the 1st day of August, but whose feast is kept upon the 16th day of this present month of December by command of Pope Benedict XIII. (He was born about the year 315 and died about the year 371 or 375.)
          Upon the same 15th day of December, were born into the better life:
          At Rome, (in the third century,) the holy martyrs Irenaeus, Antony, Theodore, Saturninus, Victor, and seventeen others who suffered for Christ's sake in the persecution under the Emperor Valerian.
          In Africa, the holy martyrs Faustinus, Lucius, Candidus, Caelian, Mark, Januarius, and Fortunatus.
          Likewise in Africa, holy Valerian, Bishop (of Abbenze.) When he was more than eighty years of age the Arian king Genseric, during the Vandal persecution, sought to make him consent to give up the vessels of the church, and because he steadfastly refused so to do, he caused him to be thrust out of the city alone, and since it was forbidden to any man to allow him to come into his house or to dwell in his field, he lay a long time in the open air on the public highway, and finished the course of his blessed life, (in the year 457,) in the profession and defense of Catholic truth.
          In the country of Orleans, the holy Confessor Maximin, (2nd Abbot of Michy, in the Diocese of Orleans about the year 520.)
          In the country of the Iberians, beyond the Black Sea, (in the third century,) the holy handmaiden Christiana, (the Apostle of the Iberians of the Caucasus,) who in the time of the Emperor Constantine, by the power of her miracles, brought that people to believe in Christ.
      la:
      - type: text
        text: |-
          Décimo octávo Kaléndas Ianuárii

          Romæ sanctórum Mártyrum Irenǽi, Antónii, Theodóri, Saturníni, Victóris, et aliórum decem et septem, qui, in persecutióne Valeriáni, pro Christo passi sunt.
          In Africa pássio sanctórum Faustíni, Lúcii, Cándidi, Cæliáni, Marci, Ianuárii et Fortunáti.
          Ibídem sancti Valeriáni Epíscopi, qui, cum esset annórum plus octogínta, in persecutióne Wandálica, sub Rege Ariáno Genseríco, convéntus ab eo ut tráderet Ecclésiæ utensília, idque constánter renuísset, extra civitátem singuláris iussus est pelli; cumque præcéptum esset ut nullus eum neque in domo neque in agro dimítteret habitáre, multo témpore in strata pública nudo sub áere iácuit, et, in confessióne et defensióne cathólicæ veritátis, cursum beátæ vitæ complévit.
          In território Aurelianénsi sancti Maximíni Confessóris.
          Apud Ibéros, trans Pontum Euxínum, sanctæ Christiánæ ancíllæ, quæ miraculórum virtúte gentem illam, témpore Constantíni, ad Christi fidem perdúxit.
          Vercéllis Ordinátio sancti Eusébii, Epíscopi et Mártyris.
      en2:
      - type: text
        text: |-
          The Fifteenth of December
      
          At Rome, the holy Martyrs Irenaeus, Antonius, Theodore, Saturninus, Victor, and seventeen others, who suffered for Christ in the persecution of Valerian.
          In Africa, the passion of the holy Martyrs Faustinus, Lucius, Candidus, Caelianus, Marcus, Januarius, and Fortunatus.
          There also, Saint Valerianus the Bishop, who, being more than eighty years old, in the Vandal persecution, under the Arian king Genseric, was summoned by him to surrender the vessels of the church, and having steadfastly refused, was ordered to be expelled outside the city; and, since it was commanded that no one should allow him to dwell in a house or on a farm, he lay for a long time in the open air on the public road, and completed the course of his blessed life in the confession and defense of catholic truth.
          In the territory of Orleans, Saint Maximinus the Confessor.
          Among the Iberians, beyond the Euxine Sea, Saint Christiana the slave-girl, who by the power of miracles in the time of Constantine brought that people to the faith of Christ.
          At Vercelli, the Ordination of Saint Eusebius, Bishop and Martyr.
  psalm.d-cimo-oct-vo-kal-ndas-maii-82c957683d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon 14 of April, were born to better life:

          On the morrow we keep the feast of the holy martyr Justin, the admirable philosopher. He had presented to the Emperors Marcus Antoninus Verus and Lucius Aurelius born Modus his second book in defence of our religion, and was then earnestly spreading the same at Rome by his disputations when he was accused of Christianity through the devices of Crescens the Cynic, whose life and infamous manners he had rebuked, and for a reward of his faithful speaking he received upon this day the crown of martyrdom.
          Likewise at Rome, upon the Appian Way, under the Emperor Alexander and the Prefect Almachius, the holy martyrs Tiburtius, Valerian, and Maximus. Tiburtius and Valerian had been converted to Christ by the exhortations of blessed Cicely and baptized by the holy Pope Urban, and for the confession of their faith were cudgelled and beheaded. Maximus was a chamberlain of the Prefect, and was moved to believe in Christ by beholding the steadfastness of Tiburtius and Valerian, and being confirmed in the same faith by an apparition of angels, he was lashed to death with scourges loaded with lead.
          At Terni, the holy martyr Proculus, Bishop of that see, [about the year 306.]
          Likewise the holy Virgins and martyrs Domnina and her Companions, [about the year 272.]
          At Alexandria, [in the fifth century,] the holy martyr Thomais.
          On the same day, the holy martyr Ardalion. He was a player, and was making a mock upon the stage of the sacred rites of the Christians, when he was converted all of a sudden, and attested his conversion not only by his words but also by his blood, [about the year 300.]
          At Lyon, the holy Confessor Lambert, Bishop of that see, [in the year 688.]
          At Alexandria, the holy Abbot Fronto [—in the desert of Nitria, he had 70 monks—] famous for the holiness of his life, and for his miracles, [in the reign of Antonine, about the year 151.]
          At Rome, [in the sixth century,] holy Abundius, watchman of the Church of St. Peter.
      la:
      - type: text
        text: |-
          Décimo octávo Kaléndas Maii

          Sancti Iustíni, Philósophi et Mártyris, cuius memória prídie huius diéi recensétur.
          Romæ, via Appia, natális sanctórum Mártyrum Tibúrtii, Valeriáni et Máximi, sub Alexándro Imperatóre et Almáchio Præfécto. Horum duo primi, beátæ Cæcíliæ exhortatióne ad Christum convérsi et a sancto Urbáno Papa baptizáti, póstmodum, ob fídei confessiónem, fústibus cæsi, gládio percússi sunt; Máximus vero, Præfécti cubiculárius, cum et ipse, eórum permótus constántia et angélica visióne firmátus, in Christum credidísset, támdiu plumbátis verberátus est, donec spíritum exhaláret.
          Interámnæ sancti Próculi, Epíscopi et Mártyris.
          Eódem die sancti Ardaliónis mimi, qui, dum Sacris Christianórum in theátro illudéret, derepénte mutátus est, et ea non solum verbis, sed étiam testimónio sui sánguinis comprobávit.
          Interámnæ sanctæ Domnínæ, Vírginis et Mártyris, cum Sóciis Virgínibus coronátæ.
          Alexandríæ sanctæ Thomáidis Mártyris, quæ a sócero, cuius impudícis nolúerat consentíre votis, gládio percússa est atque in duas partes per médium discíssa.
          Lugdúni, in Gállia, sancti Lambérti, Epíscopi et Confessóris.
          Alexandríæ sancti Frontónis Abbátis, cuius vita sanctitáte et miráculis cláruit.
          Romæ sancti Abúndii, Mansionárii Ecclésiæ sancti Petri.
      en2:
      - type: text
        text: |-
          The Fifteenth of April
      
          Saint Justin, Philosopher and Martyr, whose memory is recorded on the day before this.
          At Rome, on the Appian Way, the birthday of the holy Martyrs Tiburtius, Valerian, and Maximus, under the Emperor Alexander and the Prefect Almachius. The first two of these, converted to Christ by the exhortation of the blessed Cecilia and baptized by the holy Pope Urban, were afterward, for confessing the faith, beaten with rods and struck with the sword; but Maximus, chamberlain of the Prefect, having himself believed in Christ, moved by their steadfastness and strengthened by an angelic vision, was beaten with leaded whips until he breathed his last.
          At Interamna, Saint Proculus, Bishop and Martyr.
          On the same day, Saint Ardalion the mime, who, while mocking the rites of Christians in the theater, was suddenly changed, and confirmed them not only by words but also by the testimony of his own blood.
          At Interamna, Saint Domnina, Virgin and Martyr, crowned with her companion Virgins.
          At Alexandria, Saint Thomais the Martyr, who was struck by the sword by her father-in-law, because she had refused to consent to his shameless desires, and was cut through the middle into two parts.
          At Lyons in Gaul, Saint Lambert, Bishop and Confessor.
          At Alexandria, Saint Fronto the Abbot, whose life shone with holiness and miracles.
          At Rome, Saint Abundius, Mansionary of the church of Saint Peter.
  psalm.d-cimo-oct-vo-kal-ndas-oct-bris-5734ebdd6f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 14th day of September is commemorated the Exaltation of the Holy Cross, when the Emperor Heraclius brought it back from Persia to Jerusalem, after he had overcome King Chosroes.
          Upon the same day, were born into the better life:

          At Rome, upon the Appian Way, the blessed martyr Pope Cornelius.
          In the persecution under Decius, he was first sentenced to exile, but afterwards to be beaten with scourges loaded with lead, and then to be beheaded, along with twenty others, both men and women. The soldier Cerealis and Sallustia his wife, unto whom Cornelius had taught the faith, were put to death upon the same day.
          In Africa, the holy martyr Cyprian, Bishop of Carthage, a man very famous for his holiness and teaching.
          Under the Emperors Valerian and Gallienus, after a hard exile, he finished his testimony by being beheaded upon the seashore, at the sixth milestone from Carthage.
          The feast of these two saints Cornelius and Cyprian is kept as one upon the 16th day of this present month of September.
          There suffered at Carthage also the holy martyrs Crescentian, Victor, Rosula, and Generalis.
          At Rome, the holy boy Crescentius, the son of holy Euthymius, who, in the persecution under the Emperor Diocletian, under the judge Turpilius, died upon the Salarian Way, smitten with the sword.
          At Treves, holy Maternus, Bishop (of that see,) a disciple of the blessed Apostle Peter, who turned to the faith of Christ the people of Tongres, Cologne, and Treves, and other dwellers in the parts thereabout.
          Upon the same day, holy John Chrysostom, Archbishop of Constantinople. By the plots of his enemies he was sent into exile, and although his recall was decreed by the Supreme Pontiff Innocent I., he suffered many things on his journey from the soldiers who had him in charge, and gave up his soul to God. His feast is kept upon the 27th day of January, upon the which day his sacred body was brought to Constantinople by the Emperor Theodosius the Younger.
      la:
      - type: text
        text: |-
          Décimo octávo Kaléndas Octóbris

          Exaltátio sanctæ Crucis, quando Heráclius Imperátor, Chósroa Rege devicto, eam de Pérside Hierosólymam reportávit.
          Romæ, via Appia, beáti Cornélii, Papæ et Mártyris; qui, in persecutióne Décii, post exsílii relegatiónem, iussus est plumbátis cædi, et sic, cum áliis vigínti et uno promíscui sexus, decollári. Sed et Cæreális miles cum Sallústia uxóre, quos idem Cornélius in fide instrúxerat, eódem die sunt cápite plexi.
          In Africa pássio sancti Cypriáni, Epíscopi Carthaginénsis, sanctitáte et doctrína claríssimi; qui, sub Valeriáno et Galliéno Princípibus, post durum exsílium, cápitis detruncatióne martýrium consummávit, sexto milliário a Carthágine, iuxta mare. Eorúndem vero sanctórum Cornélii et Cypriáni memória sextodécimo Kaléndas Octóbris festíve celebrátur.
          Apud Cománam, in Ponto, natális sancti Ioánnis, Epíscopi Constantinopolitáni, Confessóris et Ecclésiæ Doctóris, propter áureum eloquéntiæ flumen cognoménto Chrysóstomi; qui, ab inimicórum factióne in exsílium eiéctus, et, cum e sancti Innocéntii Primi, Summi Pontíficis, decréto inde revocarétur, in itínere, a custodiéntibus milítibus multa mala perpéssus, ánimam Deo réddidit. Eius autem festívitas sexto Kaléndas Februárii celebrátur, quo die sacrum ipsíus corpus a Theodósio iunióre Constantinópolim fuit translátum. Hunc vero præclaríssimum divíni verbi præcónem Pius Papa Décimus cæléstem Oratórum sacrórum Patrónum declarávit atque constítuit.
          Tréviris sancti Matérni Epíscopi, qui fuit discípulus beáti Petri Apóstoli; ac Tungrénses, Coloniénses et Trevirénses, aliósque finítimos pópulos ad Christi fidem perdúxit.
          Romæ sancti Crescéntii púeri, qui sancti Euthýmii fílius éxstitit; atque, in persecutióne Diocletiáni, sub Turpílio Iúdice, via Salária, gládio percússus, occúbuit.
          In Africa pássio sanctórum Mártyrum Crescentiáni, Victóris, Rósulæ et Generális.
      en2:
      - type: text
        text: |-
          The Fifteenth of September
      
          The Exaltation of the Holy Cross, when the Emperor Heraclius, having conquered king Chosroes, brought it back from Persia to Jerusalem.
          At Rome, on the Appian Way, Blessed Cornelius, Pope and Martyr; who, in the persecution of Decius, after the sentence of exile, was ordered to be beaten with leaded whips and thus, with twenty-one others of both sexes, to be beheaded. The soldier Caerealis also, with his wife Sallustia, whom the same Cornelius had instructed in the faith, were beheaded on the same day.
          In Africa, the passion of Saint Cyprian, Bishop of Carthage, most illustrious for holiness and learning; who, under the Emperors Valerian and Gallienus, after a hard exile, completed his martyrdom by beheading, six miles from Carthage, near the sea. The memory of these same Saints Cornelius and Cyprian is solemnly celebrated on the sixteenth of September.
          Near Comana in Pontus, the birthday of Saint John, Bishop of Constantinople, Confessor and Doctor of the Church, surnamed Chrysostom for his golden stream of eloquence; who, cast into exile by the faction of his enemies and, as he was being recalled thence by the decree of the holy Innocent I, Supreme Pontiff, suffering much evil on the road at the hands of the soldiers guarding him, gave his soul to God. His feast is celebrated on the twenty-seventh of January, the day on which his sacred body was translated to Constantinople by the younger Theodosius. This most distinguished herald of the divine word, Pope Pius X declared and appointed the heavenly Patron of sacred Orators.
          At Trier, Saint Maternus the Bishop, who was a disciple of the blessed Apostle Peter; and brought the people of Tongeren, Cologne, Trier, and other neighboring peoples to the faith of Christ.
          At Rome, Saint Crescentius the boy, who was the son of Saint Euthymius; and, in the persecution of Diocletian, under the judge Turpilius, on the Salarian Way, was struck by the sword and perished.
          In Africa, the passion of the holy Martyrs Crescentianus, Victor, Rosula, and Generalis.
  psalm.d-cimo-oct-vo-kal-ndas-sept-mbris-2f7500a550:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 15th day of August God took to Himself His most holy Mother the Virgin Mary, [in the year of Our Lord 57.]
          Upon the same day were also born into the better life:

          At Rome, upon the Appian Way, [under the Emperors Valerian and Gallienus,] the holy Acolyte Tharsicius.
          The pagans found him bearing the Sacraments of the Body of Christ, and began to ask him what he was carrying, but he deemed it unseemly to produce pearls before swine, and they maltreated him so with sticks and stones that he gave up the ghost. When they sacrilegiously searched his body, they did not find any trace of the Sacraments of Christ either in his hands or among his clothes, but the Christians took up the body of the martyr and buried it honourably in the cemetery of Callistus.
          At Tagaste, in Africa, [in the year 431,] the holy [Confessor] Alypius, Bishop [of that see,] first the disciple of blessed Augustine, then his companion in his conversion, his comrade in his work as a shepherd of souls, his brave fellow-soldier in his contendings against the heretics, and now a sharer in his glory in heaven.
          At Soissons, in Gaul, [in the year 1087,] the holy Confessor Arnulf, Bishop [of that see.]
          At Alba, in Pannonia, in the year 1038,] holy Stephen, King of Hungary, whose feast is kept upon the 2nd day of September.
          At Rome, [in the year 1568,] the holy Polish Confessor Stanislaus Kostka, of the Society of Jesus, who was made perfect in a little while and finished the work of many years in angelic innocency of life, and whose name the Supreme Pontiff Benedict XIII enrolled among those of the Saints.
      la:
      - type: text
        text: |-
          Décimo octávo Kaléndas Septémbris

          Assúmptio sanctíssimæ Dei Genetrícis Vírginis Maríæ.
          Cracóviæ, in Polónia, natális sancti Hyacínthi, ex Ordine Prædicatórum, Confessóris, quem Clemens Octávus, Póntifex Máximus, in Sanctórum númerum rétulit. Ipsíus autem festum sextodécimo Kaléndas Septémbris celebrátur.
          Apud Albam Regálem, in Pannónia, item natális sancti Stéphani, Regis Hungarórum et Confessóris; qui, divínis virtútibus exornátus, primus Húngaros ad Christi fidem convértit, et a Deípara Vírgine, ipso die Assumptiónis suæ, in cælum recéptus fuit. Eius vero festívitas quarto Nonas Septémbris, quo die munitíssima Budæ arx, sancti Regis ope, ab exércitu Christiáno strénue recuperáta fuit, potíssimum recólitur, ex dispositióne Innocéntii Papæ Undécimi.
          Romæ, via Appia, sancti Tharsícii Acolythi, quem Pagáni, cum inveníssent Córporis Christi Sacraménta portántem, cœpérunt disquírere quid géreret. At ipse, indígnum iúdicans porcis pródere margarítas, támdiu ab illis mactátus est fústibus et lapídibus, donec exhaláret spíritum; et, revolúto eius córpore, sacrílegi discussóres nihil Sacramentorum Christi in occísi mánibus aut in vestibus invenerunt. Christiáni autem collegerunt Mártyris corpus, et in cœmetério Callísti honorífice sepeliérunt.
          Tagáste, in Africa, sancti Alípii Epíscopi, qui beáti Augustíni olim discípulus, póstea in conversióne sócius, in múnere pastoráli colléga, et in certamínibus advérsus hæréticos commílito strénuus, ac demum in cælésti glória consors fuit.
          Suessíone, in Gálliis, sancti Arnúlphi, Epíscopi et Confessóris.
          Romæ sancti Stanislái Kostka; Polóni, novítii e Societáte Iesu et Confessóris; qui, consummátus in brevi, per angélicam vitæ innocéntiam explévit témpora multa, et a Benedícto Décimo tértio, Pontífice Máximo, in Sanctórum album relátus est.
      en2:
      - type: text
        text: |-
          The Fifteenth of August
      
          The Assumption of the most holy Virgin Mary, Mother of God.
          At Krakow in Poland, the birthday of Saint Hyacinth, of the Order of Preachers, Confessor, whom Clement VIII, Supreme Pontiff, enrolled in the number of the Saints. His feast is celebrated on the seventeenth of August.
          Near Alba Regalis in Pannonia, likewise the birthday of Saint Stephen, King of the Hungarians and Confessor; who, adorned with divine virtues, was the first to convert the Hungarians to the faith of Christ, and was received into heaven by the Virgin Mother of God on the very day of her Assumption. His feast is especially commemorated on the second of September, on which day the most fortified citadel of Buda was vigorously recovered by the Christian army through the help of the holy King, by the appointment of Pope Innocent XI.
          At Rome, on the Appian Way, Saint Tarsicius the Acolyte, whom the pagans, having found him carrying the Sacrament of the Body of Christ, began to question what he was carrying. But he, judging it unworthy to cast pearls before swine, was beaten by them with clubs and stones so long until he breathed his last; and when his body was turned over, the sacrilegious searchers found nothing of the Sacraments of Christ in the hands or on the garments of the slain man. The Christians, however, gathered the body of the Martyr and buried it with honor in the cemetery of Callixtus.
          At Tagaste in Africa, Saint Alypius the Bishop, who was formerly a disciple of the blessed Augustine, then his companion in conversion, his colleague in the pastoral office, his strenuous fellow soldier in the struggles against heretics, and finally his companion in celestial glory.
          At Soissons in Gaul, Saint Arnulphus, Bishop and Confessor.
          At Rome, Saint Stanislaus Kostka, a Pole, novice of the Society of Jesus and Confessor; who, perfected in a short time through an angelic innocence of life, fulfilled many years, and was enrolled in the roll of the Saints by Benedict XIII, Supreme Pontiff.
  psalm.d-cimo-s-ptimo-kal-ndas-apr-lis-adbaaff835:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of March, were born into the better life:

          At Rome, the holy deacon Cyriacus.
          After long suffering in prison, he was covered with pitch, stretched upon a block, racked, and cudgelled, and at last beheaded along with Largus Smaragdus and twenty others, by command of the Emperor Maximian. Their feast is kept upon the 8th day of August, upon the which day blessed Pope Marcellus exhumed their bodies and buried them again with honour.
          At Aquileia, the blessed martyrs Hilary, Bishop of that see, and the Deacon Tatian, who after suffering the rack and other torments were martyred, along with Felix, Largus, and Denis, under the President Beronius, in the persecution under the Emperor Numerian.
          In Lycaonia, the holy martyr Papas, who for Christ's faith's sake was hided, torn with iron hooks, and made to walk in shoes with nails through them, and then tied up to a barren tree, which became fruitful when he passed away to be with the Lord, [fourth century.]
          At Anazarba, in Cilicia, the holy martyr Julian, who suffered a long course of torture under the President Martian, and was at length put into a sack along with serpents and drowned in the sea, [probably under Diocletian.]
          At Ravenna, the holy Confessor Agapitus, Bishop of that see, [in the year 341.]
          At Cologne, holy Heribert, Bishop of that see, famous for his holiness, [in the year 1021.]
          In Auvergne, holy Bishop Patrick.
          In Syria, the holy hermit Abraham, [in the year 370,] whose acts have been written by the blessed Deacon Ephrem.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Aprílis

          Romæ pássio sancti Cyríaci Diáconi, qui, post longam cárceris maceratiónem, liquáta pice perfúsus et in catásta exténsus, attráctus étiam nervis et fústibus cæsus, ad últimum, cum Largo et Smarágdo et áliis vigínti, iubénte Maximiáno, cápite truncátus est. Sanctórum vero Cyríaci, Largi et Smarágdi festívitas sexto Idus Augústi recólitur, quo die a beáto Marcéllo Papa córpora eorúndem vigínti trium Mártyrum leváta sunt ac venerabíliter tumuláta.
          Aquiléiæ natális beáti Hilárii Epíscopi, et Tatiáni Diáconi, qui, sub Numeriáno Imperatóre et Berónio Prǽside, post equúleum atque ália torménta, una cum Felíce, Largo et Dionýsio, martýrium terminárunt.
          In Lycaónia sancti Papæ Mártyris, qui, ob Christi fidem, verbéribus cæsus, úngulis férreis lacerátus, clavátis cálceis incédere iussus est; deínde arbóri alligátus, eándem arbórem, migrans ad Dóminum, ex stérili réddidit fructuósam.
          Anazárbi, in Cilícia, sancti Iuliáni Mártyris, qui, sub Marciáno Prǽside, diutíssime cruciátus, demum, in sacco una cum serpéntibus inclúsus, in mare demérsus est.
          In dicióne Canadénsi sanctórum Mártyrum Ioánnis de Brébeuf, Gabriélis Lalemant, Antónii Daniel, Cároli Garnier et Natális Chabanel, Presbyterórum Societátis Iesu, qui in Hurónica Missióne, hac aliísque diébus, post multos labóres et sævíssimos cruciátus, mortem pro Christo fórtiter obiérunt.
          Ravénnæ sancti Agapíti, Epíscopi et Confessóris.
          Colóniæ Agrippínæ sancti Heribérti Epíscopi, sanctitáte célebris.
          Arvérnis, in Gállia, deposítio sancti Patrícii Epíscopi.
          In Sýria sancti Abrahæ Eremítæ, cuius res gestas beátus Ephræm Diáconus conscrípsit.
      en2:
      - type: text
        text: |-
          The Sixteenth of March
      
          At Rome, the passion of Saint Cyriacus the Deacon, who, after long torment in prison, drenched with molten pitch and stretched on the rack, also tormented with cords and beaten with rods, was at last, together with Largus, Smaragdus, and twenty others, beheaded by the order of Maximianus. The feast of Saints Cyriacus, Largus, and Smaragdus is commemorated on the eighth of August, the day on which the bodies of these same twenty-three Martyrs were raised up and reverently entombed by the blessed Pope Marcellus.
          At Aquileia, the birthday of Blessed Hilary the Bishop and Tatianus the Deacon, who, under the Emperor Numerianus and the governor Beronius, after the rack and other torments, together with Felix, Largus, and Dionysius, completed their martyrdom.
          In Lycaonia, Saint Pappas the Martyr, who, for the faith of Christ, was beaten with rods, lacerated with iron hooks, and ordered to walk in nailed shoes; then, bound to a tree, at the hour of his passing to the Lord, he caused that same tree to yield fruit from being barren.
          At Anazarbus in Cilicia, Saint Julian the Martyr, who, under the governor Marcianus, having been tortured for a very long time, was at last enclosed in a sack together with serpents and submerged in the sea.
          In the Canadian dominion, the holy Martyrs John de Brébeuf, Gabriel Lalemant, Anthony Daniel, Charles Garnier, and Nathalis Chabanel, Priests of the Society of Jesus, who in the Huron Mission, on this and other days, after many labors and most savage torments, courageously underwent death for Christ.
          At Ravenna, Saint Agapitus, Bishop and Confessor.
          At Cologne, Saint Heribert the Bishop, renowned for holiness.
          At Clermont in Gaul, the repose of Saint Patrick the Bishop.
          In Syria, Saint Abraham the Hermit, whose deeds the blessed Ephrem the Deacon wrote.
  psalm.d-cimo-s-ptimo-kal-ndas-aug-sti-c5c671a5a2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Tomorrow is the Feast of the Blessed Virgin Mary, styled of Mount Carmel.
          Upon the same 16th day of July, were born into the better life:

          At Greece, the holy martyr Faustus, who was crucified under the Emperor Decius. He remained alive upon the cross five days, and at last was pierced with arrows, and so passed away to Heaven.
          At Sebaste, in Armenia, under the Emperor Diocletian, the holy martyrs Bishop Athenogenes, and ten of his disciples.
          At Antioch, in Syria, the blessed Confessor Eustace, [Patriarch of Antioch,] famous for his teaching and holiness, [in the year 338.] Under the Arian Emperor Constantius he was banished, for defending the Catholic faith, to Trajanopolis, in Thrace, where he fell asleep in the Lord.
          On the same day the holy Monk Hilarinus, who was arrested in the persecution under the Emperor Julian the Apostate, along with holy Donatus, and for as much as he would not offer sacrifice, he was beaten to death with clubs, and so received martyrdom, at Arezzo, in Tuscany, but his body hath been brought to Ostia.
          At Trier, the holy martyr Valentine, Bishop [of that see, in the fourth century.]
          At Cordova, in Spain, the holy levite Sisenand, a martyr, [born at Badajoz, the capital of Estramadura.]
          While he was still young he entered the community of the Clerks of Saint Aciocle of Cordova,] who was slain by the Saracens, for Christ's faith's sake, [in the year 851.]
          In Saintes, in Gaul, the holy Virgin Rainaldis and her Companions, martyrs, who were slain by the barbarians, for Christ's faith's sake, [in the year 680.]
          At Bergamo, the holy martyr Domnion, [under Maximianus Herculeus.]
          At Capua, the holy Confessor Vitalian, Bishop [of that see, in the seventh century.]
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Augústi

          Commemorátio beátæ Maríæ Vírginis de monte Carmélo.
          Sebáste, in Arménia, sanctórum Mártyrum Athenógenis Epíscopi, et decem discipulórum eius, sub Diocletiáno Imperatóre.
          Tréviris sancti Valentíni, Epíscopi et Mártyris.
          Córdubæ, in Hispánia, sancti Sisenándi, Levítæ et Mártyris; qui a Saracénis, pro Christi fide, iugulátus est.
          Eódem die natális sancti Fausti Mártyris, qui, sub Décio Imperatóre, cruci affíxus, quinque diébus in ea vixit, ac demum, sagíttis confóssus, migrávit in cælum.
          Santis, in Gállia, sanctórum Mártyrum Rainéldis Vírginis, et Sociórum eius, qui a bárbaris, pro Christi fide, cæsi sunt.
          Bérgomi sancti Domniónis Mártyris.
          Antiochíæ natális beáti Eustáchii, Epíscopi et Confessóris, doctrína et sanctitáte célebris; qui, sub Ariáno Imperatóre Constántio, ob cathólicæ fídei defensiónem, exsílio Traianópolim Thráciæ pulsus, ibídem in Dómino requiévit.
          Cápuæ sancti Vitaliáni, Epíscopi et Confessóris.
          Apud Abbátiam Sanctíssimi Salvatóris, diœcésis Constantiénsis, in Gállia, sanctæ Maríæ-Magdalénæ Postel, Fundatrícis Institúti Sorórum Scholárum Christianárum a Misericórdia, a Pio Papa Undécimo in sanctárum Vírginum album relátæ.
          Apud Ostia Tiberína, Translátio córporis sancti Hilaríni Mónachi, qui, una cum sancto Donáto, in persecutióne Iuliáni Apóstatæ, comprehénsus est, et, cum nollet sacrificáre, demum, fústibus cæsus, Arétii, in Túscia, martýrium sumpsit séptimo Idus Augústi.
      en2:
      - type: text
        text: |-
          The Sixteenth of July
      
          The Commemoration of the Blessed Virgin Mary of Mount Carmel.
          At Sebastia in Armenia, the holy Martyrs Athenogenes the Bishop, and his ten disciples, under the Emperor Diocletian.
          At Trier, Saint Valentine, Bishop and Martyr.
          At Cordoba in Spain, Saint Sisenandus, Levite and Martyr; who was beheaded by the Saracens for the faith of Christ.
          On the same day, the birthday of Saint Faustus the Martyr, who, under the Emperor Decius, having been affixed to the cross, lived on it for five days, and at last, pierced by arrows, passed to heaven.
          At Saintes in Gaul, the holy Martyrs Raïneldis the Virgin, and her companions, who were slain by barbarians for the faith of Christ.
          At Bergamo, Saint Dominio the Martyr.
          At Antioch, the birthday of Blessed Eustathius, Bishop and Confessor, renowned for learning and holiness; who, under the Arian Emperor Constantius, for his defense of the catholic faith, was driven into exile at Traianopolis in Thrace, where he rested in the Lord.
          At Capua, Saint Vitalianus, Bishop and Confessor.
          At the Abbey of the Most Holy Savior, in the diocese of Constance in Gaul, Saint Marie-Madeleine Postel, Foundress of the Institute of Sisters of the Christian Schools of Mercy, enrolled by Pope Pius XI in the roll of holy Virgins.
          Near the mouth of the Tiber, the Translation of the body of Saint Hilarinus the Monk, who, together with Saint Donatus, was seized in the persecution of Julian the Apostate, and, having refused to sacrifice, was at last beaten with rods and, at Arezzo in Tuscany, suffered martyrdom on the seventh of August.
  psalm.d-cimo-s-ptimo-kal-ndas-dec-mbris-325035d272:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Virgin Gertrude, of whom mention is made upon the 17th day of this present month of November.
          Upon the same 15th day of November, were born into the better life:

          The holy martyr Eugene, Archbishop of Toledo, a disciple of blessed Denys, the Areopagite. He finished his testimony in the country of Paris, and received from the Lord a blessed crown of suffering, (in the year 95.) His body was afterwards brought to Toledo.
          At Nola, in Campania, the holy martyr Felix, Bishop (of that see,) who was famous for miracles from the fifteenth year of his age upward and gained the battle of martyrdom under the President Marcian, along with thirty others.
          At Edessa, in Syria, under the Emperor Diocletian and Antonine the President, the holy martyrs Gurias and Samonas.
          There likewise, under the Emperor Licinius and the President Lysanias, the holy Deacon Abibus, who was torn with hooks and cast into the fire.
          In Africa, the holy martyrs Secundus, Fidentian, and Varicus.
          In Brittany, (in the sixth century,) holy Machutus, (St. Maclou or St. Malo, first) Bishop (of the ancient See of Aleth, in Brittany,) who was marked by miracles even from his youth upward.
          At Verona, (about the year 800,) the holy Confessor Luperius, Bishop (of that see.)
          In Austria, (in the year 1136,) holy Leopold, (Margrave of Austria,) Marquess of that country, whose name Innocent VIII enrolled with those of the Saints.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Decémbris

          Colóniæ Agrippínæ sancti Albérti Epíscopi et Confessóris, ex Ordine Prædicatórum, cognoménto Magni, sanctitáte et doctrína célebris, quem Pius Papa Undécimus Doctórem universális Ecclésiæ declarávit, et Pius Duodécimus cultórum scientiárum naturálium cæléstem apud Deum Patrónum constítuit.
          Eódem die natális sancti Eugénii, Epíscopi Toletáni et Mártyris; qui fuit beáti Dionýsii Areopagítæ discípulus, et in território Parisiénsi, consummáto martýrii cursu, beátæ passiónis corónam percépit a Dómino. Ipsíus autem corpus Tolétum, in Hispánia, póstea fuit translátum.
          Nolæ, in Campánia, beáti Felícis, Epíscopi et Mártyris; qui, a quintodécimo ætátis suæ anno, miráculis cláruit, et, sub Marciáno Prǽside, cum áliis trigínta Sóciis, agónem martýrii complévit.
          Edéssæ, in Mesopotámia, pássio sancti Abibi Diáconi, qui sub Licínio Imperatóre et Lysánia Prǽside, únguibus lacerátus, in ignem coniéctus est.
          Ibídem sanctórum Mártyrum Guríæ et Samónæ, sub Diocletiáno Imperatóre et Antoníno Prǽside.
          In Africa sanctórum Mártyrum Secúndi, Fidentiáni et Várici.
          Apud Arcum, in território Santonénsi, natális sancti Machúti, Aleténsis in Gállia Epíscopi; qui, in Anglia natus, a primǽvo ætátis suæ tirocínio miráculis emícuit.
          Verónæ sancti Lupérii, Epíscopi et Confessóris.
          Kahlembérgæ, prope Vindobónam, in Austria, sancti Leopóldi, eiúsdem provínciæ Austriæ Marchiónis, quem Innocéntius Papa Octávus in Sanctórum númerum adscrípsit.
      en2:
      - type: text
        text: |-
          The Sixteenth of November
      
          At Cologne, Saint Albert the Bishop and Confessor, of the Order of Preachers, surnamed the Great, renowned for holiness and learning, whom Pope Pius XI declared Doctor of the Universal Church, and Pope Pius XII appointed heavenly Patron before God of those who cultivate the natural sciences.
          On the same day, the birthday of Saint Eugenius, Bishop of Toledo and Martyr; who was a disciple of the blessed Denis the Areopagite, and in the territory of Paris, having completed the course of his martyrdom, received the crown of his blessed passion from the Lord. His body was afterward translated to Toledo in Spain.
          At Nola in Campania, Blessed Felix, Bishop and Martyr; who, from his fifteenth year of age, shone with miracles, and, under the governor Marcianus, together with thirty other companions, completed the contest of martyrdom.
          At Edessa in Mesopotamia, the passion of Saint Abibus the Deacon, who under the Emperor Licinius and the governor Lysanius, lacerated with hooks, was cast into fire.
          There also, the holy Martyrs Gurias and Samonas, under the Emperor Diocletian and the governor Antoninus.
          In Africa, the holy Martyrs Secundus, Fidentianus, and Varicus.
          Near Ars, in the territory of Saintes, the birthday of Saint Maclou, Bishop of Aleth in Gaul; who, born in England, shone with miracles from the very beginnings of his youth.
          At Verona, Saint Luparius, Bishop and Confessor.
          At Kahlenberg near Vienna in Austria, Saint Leopold, Margrave of that same province of Austria, whom Pope Innocent VIII enrolled in the number of the Saints.
  psalm.d-cimo-s-ptimo-kal-ndas-febru-rii-686435da6a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of January, were born into the better life:

          At Rome, upon the Salarian Way, the holy martyr Pope Marcellus I, who for his confession of the Catholic faith was first cudgelled by order of the tyrant Maxentius and then sent to take care of the beasts which were fed at the public cost, in the which service he died, clad in sack-cloth, (in the year 309-310.)
          At Morocco, in Africa, (in the year 1220,) the holy martyrs Berard (de Carbis), Peter, Accursius, Adjutus, and Otho, of the Order of Friars Minors.
          At Arles, (in the year 429,) the holy Confessor Honoratus, Bishop of that see, whose life was rendered famous by his teaching and miracles.
          At Moerzo, the holy Confessor Titian, Bishop of that see.
          At Al-Arish, in Egypt, holy Melas, Bishop of that see, (in the fifth century,) who was exiled under the Emperor Valens and suffered other hardships for the Catholic faith's sake, but at length fell asleep in peace.
          At Fondi, in Campania, (in the sixth century,) the holy Abbot Honoratus, (who was set over the monastery of Fondi) of whom mention is made by blessed Pope Gregory.
          In the monastery of Perouse, the holy Confessor Fursey, (Abbot of Lagny, in the year 650.)
          At Rome, holy Priscilla, who gave up herself and all that she had to the service of the martyrs.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Februárii

          Romæ, via Salária, natális sancti Marcélli Primi, Papæ et Mártyris; qui, ob cathólicæ fídei confessiónem, iubénte Maxéntio tyránno, primo cæsus est fústibus, deínde ad servítium animálium cum custódia pública deputátus, et ibídem, serviéndo indútus amíctu cilícino, defúnctus est.
          Marróchii, in Africa, pássio sanctórum quinque Protomártyrum Ordinis Minórum, scílicet Berárdi, Petri atque Othónis Sacerdótum, Accúrsii et Adiúti Laicórum; qui, ob Christiánæ fídei prædicatiónem ac Mahuméticæ reprobatiónem legis, post vária torménta et ludíbria, a Saracenórum Rege, scissis gládio capítibus, enecáti sunt.
          Rhinocolúræ, in Ægýpto, sancti Melæ Epíscopi, qui, sub Valénte exsílium et ália grávia pro fide cathólica passus, in pace quiévit.
          Areláte, in Gállia, sancti Honoráti, Epíscopi et Confessóris; cuius vita tam doctrína quam miráculis fuit illústris.
          Opitérgii, in Venetórum fínibus, sancti Titiáni, Epíscopi et Confessóris.
          Fundis, in Látio, sancti Honoráti Abbátis, cuius méminit beátus Gregórius Papa.
          In castro cui nomen Macériæ, ad Altéiam flúvium, in Gállia, sancti Furséi Confessóris, cuius corpus ad monastérium Perónæ póstmodum translátum est.
          Romæ sanctæ Priscíllæ, quæ se súaque pio Mártyrum obséquio mancipávit.
      en2:
      - type: text
        text: |-
          The Sixteenth of January
      
          At Rome, on the Salarian Way, the birthday of Saint Marcellus I, Pope and Martyr; who, for the confession of the catholic faith, by the order of the tyrant Maxentius, was first beaten with rods, then assigned to the care of animals under public custody, and there, dressed in a hair-cloth garment while serving, breathed his last.
          At Marrakesh in Africa, the passion of the five holy Proto-martyrs of the Order of Friars Minor, namely Berard, Peter, and Otto, Priests, and Accursius and Adjutus, lay brothers; who, for the preaching of the Christian faith and the repudiation of the Mohammedan law, after various torments and mockeries, were put to death by the king of the Saracens with their heads split by the sword.
          At Rhinocorura in Egypt, Saint Melito the Bishop, who, having suffered exile and other grave hardships for the catholic faith under Valens, rested in peace.
          At Arles in Gaul, Saint Honoratus, Bishop and Confessor; whose life was illustrious both for learning and for miracles.
          At Oderzo, within the borders of the Venetians, Saint Titianus, Bishop and Confessor.
          At Fondi in Latium, Saint Honoratus the Abbot, of whom the blessed Pope Gregory makes mention.
          At the hamlet called Maceria, on the river Authie in Gaul, Saint Fursey the Confessor, whose body was afterward translated to the monastery of Péronne.
          At Rome, Saint Priscilla, who devoted herself and her goods to the pious service of the Martyrs.
  psalm.d-cimo-s-ptimo-kal-ndas-i-lii-8d4b10b4f4:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Tomorrow we keep the feast of

          St. Philip Neri, of whom mention is made in the Martyrology for May 26.
          Upon the same 15th day of June, were born into the better life:
          At the river Silaro, in Lucania, the holy martyrs Vitus, Modestus, and Crescentia, who were brought thither from Sicily under the Emperor Diocletian there by the power of God they overcame boiling lead and wild beasts, and finished the course of their glorious fight by being broken alive upon a block.
          At Dorostorum, in Mysia, the holy soldier Hesychius, who was arrested along with blessed Julius, and was crowned with martyrdom after him, under the President Maximus.
          At Cordova, in Spain, [in the persecution under the Muslims,] the holy martyr Benildes.
          At Zephyrium, in Cilicia, the holy martyr Dulas, who under the President Maximus was for Christ's Name's sake beaten with rods, laid upon a gridiron and smeared with burning oil, and suffered other things also, and so as a conqueror grasped the palm of martyrdom.
          At Palmyra, in Syria, the holy sisters Libya and Leonis, and Eutropia, a damsel of twelve years of age, who through diverse torments attained unto the crown of martyrdom.
          At Valenciennes, [in the year 686,] the holy Landalin, Abbot [of Crespin.]
          At Clermont, [in the year 472,] the holy Confessor Abraham, [Abbot of St. Cirgues,] illustrious for his holiness and wonderful works.
          At Valais, [in the year 1008,] the holy Confessor Bernard of Menthon.
          At Pibrac, in the Diocese of Toulouse, the holy Virgin Germaine Cousin, a shepherdess, who lived poor and lowly, and after many woes, borne with the greatest long-suffering, passed away to the Divine Bridegroom, [in the year 1601.] After her death she became famous for many miracles, and the Supreme Pontiff Pius IX. enrolled her name among those of the holy Virgins.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Iúlii

          Apud Sílarum flumen, in Lucánia, natális sanctórum Mártyrum Viti, Modésti atque Crescéntiæ, qui, sub Diocletiáno Imperatóre, e Sicília illuc deláti, ibídem, post ollam fervéntis plumbi, post béstias et catástas divína virtúte superátas, cursum gloriósi certáminis peregérunt.
          Doróstori, in Mýsia inferióre, sancti Hesýchii mílitis, qui, cum beáto Iúlio comprehénsus, post eum, sub Máximo Prǽside, martýrio coronátus est.
          Zephýrii, in Cilícia, sancti Dulæ Mártyris, qui, sub Prǽside Máximo, ob Christi nomen, virgis cæsus, in cratícula pósitus, fervénti óleo incénsus alíaque passus, martýrii palmam victor accépit.
          Córdubæ, in Hispánia, sanctæ Beníldis Mártyris.
          Sibápoli, in Mesopotámia, sanctárum Vírginum et Mártyrum Lybes et Leonídis sorórum, et Eutrópiæ, puéllæ annórum duódecim; quæ per divérsa torménta ad corónam martýrii pervenérunt.
          Apud Valencénas, in Gállia, deposítio sancti Landelíni Abbátis.
          Arvérnis, in Gállia, sancti Abrahæ Confessóris, sanctitáte ac miráculis illústris.
          Pibráci, in diœcési Tolosána, sanctæ Germánæ Cousin Vírginis, quæ custodiéndis grégibus addícta permánsit, et, cum húmilis ac pauper vixísset, et, multis ærúmnis patientíssime tolerátis, migrásset ad Sponsum, plúrimis post óbitum miráculis cláruit; atque a Pio Nono, Pontífice Máximo, in sanctárum Vírginum número adscrípta fuit.
      en2:
      - type: text
        text: |-
          The Sixteenth of June
      
          Near the river Sele in Lucania, the birthday of the holy Martyrs Vitus, Modestus, and Crescentia, who, under the Emperor Diocletian, having been brought there from Sicily, there, after an oven of boiling lead, beasts, and racks overcome by divine power, completed the course of their glorious contest.
          At Dorostorum in Lower Moesia, Saint Hesychius the soldier, who, having been seized with the blessed Julius, was after him crowned with martyrdom under the governor Maximus.
          At Zephyrium in Cilicia, Saint Dulas the Martyr, who, under the governor Maximus, for the name of Christ, beaten with rods, placed on a grill, burned with boiling oil, and having suffered other torments, received the palm of martyrdom as victor.
          At Cordoba in Spain, Saint Benildis the Martyr.
          At Shibapolis in Mesopotamia, the holy Virgins and Martyrs Lybes and Leonides, sisters, and Eutropia, a girl of twelve years; who through diverse torments attained to the crown of martyrdom.
          Near Valenciennes in Gaul, the repose of Saint Landelinus the Abbot.
          At Clermont in Gaul, Saint Abraham the Confessor, illustrious for holiness and miracles.
          At Pibrac, in the diocese of Toulouse, Saint Germaine Cousin the Virgin, who remained dedicated to tending flocks, and, having lived humbly and poorly, and having most patiently endured many hardships, passed to her Spouse, shone with very many miracles after her death; and was enrolled in the number of holy Virgins by Pius IX, Supreme Pontiff.
  psalm.d-cimo-s-ptimo-kal-ndas-i-nii-2ea8dca29f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of May, was born into the better life:

          At Bordeaux, in Aquitaine, the holy Confessor Simon, surnamed Stock, [for that he lived at one time in the stock of an hollow oak,] of the Order of Carmelites, who by his singular devotion toward the Virgin Mother of God won to obtain of her the sacred scapular of his Order, and, after many labours borne in the governing of the same her Order, passed away famous for miracles, to receive his everlasting reward.
          At Gubbio, holy Ubald, Bishop [of the same city,] who was famous for miracles, and whose feast we keep upon the 22nd day of this present month of May.
          In Isauria, the holy martyrs Aquilinus and Victorian.
          At Auxerre, suffered the holy martyr Peregrin, first Bishop of that city, who was sent into Gaul with other clerks by blessed Pope Sixtus [II], and, when he had finished the work preaching the Gospel, was condemned to be beheaded, and so earned a crown of life that fadeth not away.
          At Usal, in Africa, [in the third century,] the holy martyrs Felix and Gennadius.
          In Palestine, the passion of the holy monks who were massacred by the Saracens in the Monastery of St Saba.
          In Persia, the holy martyrs Bishop Audas, seven Priests, nine Deacons, and seven Virgins, who suffered diverse tortures under King Isdegerd, and so finished a glorious testimony.
          At Prague, in Bohemia, [in the year 1390,] holy John of Nepomuc, Canon of the Metropolitical Cathedral Church in that city, who, when he had been vainly tried to make him violate the seal of sacramental confession, was cast into the river Moldau, and so earned the palm of martyrdom. We keep feast in his honour upon the 30th day of this present month of May.
          At Amiens, in Gaul, [about the year 600,] the holy Confessor Honore, Bishop [of that see.]
          At Mans, [toward the end of the sixth century,] the holy Confessor Domnolus, Bishop [of that see.]
          At Mirandola, in Emilia, the holy Possidius, Bishop of Calama, in Numidia, a disciple of holy Augustine, and writer of his famous life.
          At Troyes, [toward the middle of the sixth century,] the holy Confessor Fidolus, [Abbot of the Isles-Aumont]
          In Ireland, [in the year 577,] the holy Brendan, Abbot [of Clonfert.]
          At Frejus, the holy Virgin Maxima, who fell asleep in peace, famous for many excellences.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Iúnii

          Eugúbii sancti Ubáldi, Epíscopi et Confessóris, miráculis clari.
          Antisiodóri pássio sancti Peregríni, qui fuit primus eiúsdem civitátis Epíscopus. Hic, a beáto Xysto Papa Secúndo in Gállias, una cum áliis Cléricis, missus, ibi, Evangélicæ prædicatiónis múnere expléto, capitáli senténtia damnátus corónam méruit sempitérnam.
          In Pérside sanctórum Mártyrum Audæ Epíscopi, septem Presbyterórum, novem Diaconórum, et septem Vírginum; qui sub Isdegérde Rege, váriis tormentórum genéribus cruciáti, gloriósum martýrium complevérunt.
          Pragæ, in Bohémia, sancti Ioánnis Nepomucéni, Metropolitánæ Ecclésiæ Canónici; qui, frustra tentátus ut sigílli sacramentális fidem próderet, martýrii palmam, in flumen Moldávam deiéctus, eméruit.
          In Isáuria natális sanctórum Mártyrum Aquilíni et Victoriáni.
          Uzali, in Africa, sanctórum Mártyrum Felícis et Gennádii.
          In Palæstína pássio sanctórum Monachórum, a Saracénis in laura sancti Sabbæ interfectórum.
          Ianóviæ, apud Pinsk, in Polésia, sancti Andréæ Bobóla, Sacerdótis e Societáte Iesu, qui, a schismáticis innumerabília tormentórum génera perpéssus, illústri martýrio coronátus est.
          Ambiáni, in Gállia, sancti Honoráti Epíscopi.
          Apud Cenómanos, in Gállia, sancti Dómnoli Epíscopi.
          Mirándulæ, in Æmília, sancti Possídii, Calaménsis in Numídia Epíscopi, qui fuit sancti Augustíni discípulus, eiúsque præcláram vitam scripsit.
          In monastério Enachduinénsi, in Hibérnia, tránsitus sancti Brendáni, Presbýteri et Clonferténsis Abbátis.
          Trecis, in Gállia, sancti Fídoli Confessóris.
          Apud Forum Iúlii, in Gállia, sanctæ Máximæ Vírginis, quæ, multis clara virtútibus, in pace quiévit.
      en2:
      - type: text
        text: |-
          The Sixteenth of May
      
          At Gubbio, Saint Ubaldus, Bishop and Confessor, renowned for miracles.
          At Auxerre, the passion of Saint Peregrinus, who was the first Bishop of that same city. He, sent into Gaul by the blessed Pope Sixtus II with other Clergy, there, having fulfilled the office of evangelical preaching, was condemned to capital sentence and merited an eternal crown.
          In Persia, the holy Martyrs Audas the Bishop, seven Priests, nine Deacons, and seven Virgins; who under king Isdegerd, tortured by various kinds of torments, completed a glorious martyrdom.
          At Prague in Bohemia, Saint John Nepomucen, Canon of the Metropolitan Church; who, having been tried in vain to be made to betray the seal of the confessional, merited the palm of martyrdom by being cast into the river Vltava.
          In Isauria, the birthday of the holy Martyrs Aquilinus and Victorianus.
          At Uzalis in Africa, the holy Martyrs Felix and Gennadius.
          In Palestine, the passion of the holy Monks, slain by Saracens in the laura of Saint Sabas.
          At Janow, near Pinsk in Polesia, Saint Andrew Bobola, Priest of the Society of Jesus, who, having endured innumerable kinds of torments from the schismatics, was crowned with a glorious martyrdom.
          At Amiens in Gaul, Saint Honoratus the Bishop.
          Near Le Mans in Gaul, Saint Domnolus the Bishop.
          At Mirandola in Aemilia, Saint Possidius, Bishop of Calama in Numidia, who was a disciple of Saint Augustine and wrote his distinguished life.
          In the monastery of Enachduin in Ireland, the passing of Saint Brendan, Priest and Abbot of Clonfert.
          At Troyes in Gaul, Saint Fidolus the Confessor.
          Near Forum Iulii in Gaul, Saint Maxima the Virgin, who, illustrious for many virtues, rested in peace.
  psalm.d-cimo-s-ptimo-kal-ndas-ianu-rii-91a3bb11db:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep

          The feast of the holy martyr Eusebius, Bishop of Vercelli, of whom mention is made also upon the 1st day of August, (when he died between the years 370 and 375,) and yesterday as for this day.
          Upon the same 16th day of December, were born into the better life:
          The three children Ananias, Azarias, and Misael, whose bodies are laid in a certain cave at Babylon (in the sixth century before Christ.)
          At Ravenna, the holy martyrs Valentine, a military instructor, Concordius his son, Navalis, and Agricola, who suffered for Christ's sake, (in the fourth century,) in the persecution under the Emperor Maximian.
          At Nola, in Campania, in the persecution under the Emperor Decius, the holy Virgin and martyr Albina, (in the year 250.) In Africa, many holy Virgins and martyrs, who in the Vandal persecution under the Arian king Hunneric suffered hanging, pressing, and redhot plates, and happily brought to a close the conflict of martyrdom, (in the year 482.)
          At Vienne, (in the year 875,) the blessed Confessor Ado, (monk of the Order of St Benedict,) Bishop (of Vienne.)
          At Aberdeen, in Scotland, holy Bean, (called first) Bishop (of that see.)
          At Gaza, in Palestine, (in the year 389,) holy Bishop Irenion.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Ianuárii

          Sancti Eusébii, Epíscopi Vercellénsis et Mártyris; cuius dies natális Kaléndis Augústi, et Ordinátio décimo octávo Kaléndas Ianuárii refértur.
          Sanctórum Trium Puerórum, id est Ananíæ, Azaríæ et Misaélis; quorum córpora apud Babylóniam, sub quodam specu, sunt pósita.
          Ravénnæ sanctórum Mártyrum Valentíni, magístri mílitum, eiúsque fílii Concórdii, atque Navális et Agrícolæ; qui, in persecutióne Maximiáni, pro Christo passi sunt.
          Fórmiis, in Campánia, sanctæ Albínæ, Vírginis et Mártyris, sub Décio Imperatóre.
          In Africa pássio plurimárum sanctárum Vírginum, quæ, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, suspéndia, póndera laminásque ignítas perpéssæ, martýrii agónem felíciter consummárunt.
          Viénnæ, in Gállia, beáti Adónis, Epíscopi et Confessóris.
          In Hibérnia sancti Beáni Epíscopi.
          Gazæ, in Palæstína, sancti Ireniónis Epíscopi.
      en2:
      - type: text
        text: |-
          The Sixteenth of December
      
          Saint Eusebius, Bishop of Vercelli and Martyr; whose birthday is recorded on the first of August, and his Ordination on the fifteenth of December.
          The holy Three Young Men, that is, Ananias, Azarias, and Misael; whose bodies are placed near Babylon, under a certain cave.
          At Ravenna, the holy Martyrs Valentine, master of soldiers, and his son Concordius, and Navalis and Agricola; who suffered for Christ in the persecution of Maximianus.
          At Formiae in Campania, Saint Albina, Virgin and Martyr, under the Emperor Decius.
          In Africa, the passion of very many holy Virgins, who, in the Vandal persecution, under the Arian king Huneric, having endured hangings, weights, and burning plates, happily completed the contest of martyrdom.
          At Vienne in Gaul, Blessed Ado, Bishop and Confessor.
          In Ireland, Saint Beanus the Bishop.
          At Gaza in Palestine, Saint Irenion the Bishop.
  psalm.d-cimo-s-ptimo-kal-ndas-maii-c7cd88d114:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 15th of April, were born into the better life:

          At Rome, the noble ladies Basilissa and Anastasia, disciples of the Apostles. Forasmuch as they stood firm in the faith under the Emperor Nero, their tongues and feet were cut off, and they gained the crown of martyrdom by being slain with the sword.
          Upon the same day, the holy martyrs Maro, Eutyches, and Victorinus. They were first exiled to the island of Ponza, along with the blessed Flavia Domitilla, for confessing Christ, but were afterwards liberated in the reign of the Emperor Nerva. They converted many to the faith, and were at length put to death with diverse torments by order of the Judge Valerian, in the persecution under the Emperor Trajan.
          In Persia, under the Emperor Decius, the holy martyrs Maximus and Olympias. They were first hided with cudgels and scourges loaded with lead, and at length their heads were beaten with the cudgels until they gave up the ghost.
          At Fiorentino, in Campania, the holy martyr Eutychius, [at the end of the first century, possibly with some companions.]
          At Myra, in Lycia, holy Crescens, who achieved martyrdom by fire.
          Likewise the holy martyrs Theodore, [a Priest,] and Pausilippus, who suffered under the Emperor Hadrian, [at Heracleia, on the Sea of Marmora.]
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Maii

          Romæ sanctárum Basilíssæ et Anastásiæ, nobílium feminárum, quæ, cum essent Apostolórum discípulæ et constántes in fídei confessióne persísterent, sub Neróne Imperatóre, lingua pedibúsque præcísis, percússæ gládio, martýrii corónam adéptæ sunt.
          Eódem die sanctórum Mártyrum Marónis, Eutychétis et Victoríni; qui, primo cum beáta Flávia Domitílla apud ínsulam Póntiam in Christi confessióne éxsules, póstmodum, sub Príncipe Nerva, liberáti, tandem, cum plúrimos ad fidem convertíssent, in persecutióne Traiáni, a Valeriáno Iúdice váriis pœnis iussi sunt intérfici.
          In Pérside sanctórum Mártyrum Máximi et Olympíadis, qui, sub Décio Imperatóre, fústibus et plumbátis cæsi sunt; et ad últimum cápita eórum sunt fústibus tunsa, donec ambo emítterent spíritum.
          Ferentíni, in Hérnicis, sancti Eutýchii Mártyris.
          Myræ, in Lýcia, sancti Crescéntis, qui per ignem martýrium consummávit.
          In Thrácia sanctórum Mártyrum Theodóri et Pausilíppi, qui sub Hadriáno Imperatóre passi sunt.
      en2:
      - type: text
        text: |-
          The Sixteenth of April
      
          At Rome, the holy Basilissa and Anastasia, noble women, who, as they were disciples of the Apostles and persevered steadfast in the confession of the faith, under the Emperor Nero, with their tongues and feet cut off, were struck by the sword and obtained the crown of martyrdom.
          On the same day, the holy Martyrs Maro, Eutychetes, and Victorinus; who, first exiles with the blessed Flavia Domitilla on the island of Pontia for confessing Christ, were afterward, under the Prince Nerva, set free; and finally, having converted very many to the faith, in the persecution of Trajan, were ordered by the judge Valerian to be put to death by various punishments.
          In Persia, the holy Martyrs Maximus and Olympiadas, who, under the Emperor Decius, were beaten with rods and leaded whips; and at last their heads were beaten with clubs until both of them breathed their last.
          At Ferentino among the Hernici, Saint Eutychius the Martyr.
          At Myra in Lycia, Saint Crescens, who completed his martyrdom through fire.
          In Thrace, the holy Martyrs Theodore and Pausilippus, who suffered under the Emperor Hadrian.
  psalm.d-cimo-s-ptimo-kal-ndas-nov-mbris-3fa7549465:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of October, were born into the better life:

          In Africa, two hundred and seventy holy martyrs, all crowned alike.
          There also the holy martyrs Martinian and Saturian, and two of their brethren. They were slaves of a certain Vandal, and were brought to believe in Christ by the holy Virgin Maxima, who was their fellow-slave.
          In the persecution under the Arian king, Genseric, on account of their steadfastness in the Catholic faith, they were first beaten to the very bone with knotty cudgels, but for as much as they were so treated of a long while, and were always found sound and well the next day, they were banished. In their banishment they turned many barbarians to believe in Christ, and obtained from the Roman Pontiff a priest and other ministers to baptize them wherefore at last they were dragged to death through thorny places in the woods, being fastened by the feet behind chariots. Maxima overcame in many contendings,
          but God set her at liberty, and she became the mother of many virgins in a monastery, and fell asleep in an holy death.
          Likewise the holy martyrs Saturninus, Nereus, and three hundred and sixty-five others.
          At Cologne, under the Emperor Julian the Apostate, the holy martyr Eliphius.
          Likewise, (in the seventh century,) the holy martyr Berchar, Abbot (of Montier-en-Der.)
          In the country of Bourges, (in the eighth century,) holy Ambrose, Bishop of Cahors.
          At Mainz, (in the year 787,) the holy Confessor Lullus, Bishop (of that see.)
          At Trier, holy Florence, Bishop (of that see.)
          At Arbon, in Switzerland, (in the seventh century,) the holy Abbot Gall, a disciple of blessed Columbanus.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Novémbris

          Sanctæ Hedwígis Víduæ, Polonórum Ducíssæ, quæ prídie huius diéi obdormívit in Dómino.
          In monastério Dervénsi, in Gállia, sancti Berchárii, Abbátis et Mártyris.
          In Africa sanctórum Mártyrum ducentórum septuagínta, páriter coronatórum.
          Ibídem sanctórum Martiniáni et Saturiáni, cum duóbus eórum frátribus; qui, témpore Wandálicæ persecutiónis, sub Rege Ariáno Genseríco, cum servi essent cuiúsdam Wándali, et a sancta Máxima Vírgine, ipsórum consérva, ad Christi fidem convérsi fuíssent, omnes ab hærético illórum dómino, pro constántia fídei cathólicæ, primum nodósis fústibus cæsi sunt et usque ad ossa laniáti. Sed, cum talia multo témpore pateréntur, et sequénti die nihilóminus redderéntur semper incólumes, exsílio tandem relegántur; ubi, cum multos barbarórum ad Christi convertíssent fidem, et a Románo Pontífice Presbýterum aliósque minístros, qui eos baptizárent, obtinuíssent, novíssime, vinctis pédibus post terga curréntium quadrigárum, inter spinósa loca silvárum iussi sunt páriter interíre. Máxima vero, post multos superátos agónes divínitus liberáta, in monastério, multárum Vírginum Mater, sancto fine quiévit.
          Item sanctórum Saturníni, Nérei et aliórum trecentórum sexagínta quinque Mártyrum.
          Colóniæ Agrippínæ sancti Elíphii Mártyris, sub Iuliáno Apóstata.
          In território Bituricénsi sancti Ambrósii, Epíscopi Caturcénsis.
          Mogúntiæ sancti Lulli, Epíscopi et Confessóris.
          Tréviris sancti Florentíni Epíscopi.
          Apud Arbónam, in Germánia, sancti Galli Abbátis, qui fuit discípulus beáti Columbáni.
          Muri, in Lucánia, sancti Gerárdi Maiélla Confessóris, Láici proféssi Congregatiónis a sanctíssimo Redemptóre nuncupátæ, quem, miráculis clarum, Pius Décimus, Póntifex Máximus, Sanctórum albo accénsuit.
      en2:
      - type: text
        text: |-
          The Sixteenth of October
      
          Saint Hedwig the Widow, Duchess of the Poles, who fell asleep in the Lord on the day before this.
          In the monastery of Derventum in Gaul, Saint Bercharius, Abbot and Martyr.
          In Africa, two hundred seventy holy Martyrs, crowned together.
          There also, Saints Martinianus and Saturianus, with two of their brothers; who, in the time of the Vandal persecution, under the Arian king Genseric, being slaves of a certain Vandal, and having been converted to the faith of Christ by the holy Virgin Maxima, their fellow slave, were all, by their heretical master, for their steadfast adherence to the catholic faith, first beaten with knotted rods and lacerated to the bone. But, since they endured such things for a long time and were always found unharmed again the following day, they were at last sentenced to exile; where, having converted many barbarians to the faith of Christ, and having obtained from the Roman Pontiff a Priest and other ministers to baptize them, they were at last ordered to perish together, their feet bound behind galloping chariots, through thorny places in the forests. But Maxima, delivered by divine power after many struggles overcome, rested in a monastery as Mother of many Virgins with a holy end.
          Likewise, the holy Martyrs Saturninus, Neres, and three hundred sixty-five others.
          At Cologne, Saint Eliphius the Martyr, under Julian the Apostate.
          In the territory of Bourges, Saint Ambrosius, Bishop of Cahors.
          At Mainz, Saint Lullus, Bishop and Confessor.
          At Trier, Saint Florentinus the Bishop.
          Near Arbon in Germany, Saint Gall the Abbot, who was a disciple of the blessed Columban.
          At Muro in Lucania, Saint Gerard Majella the Confessor, a professed lay brother of the Congregation called of the Most Holy Redeemer, whom Pius X, Supreme Pontiff, illustrious for miracles, added to the roll of the Saints.
  psalm.d-cimo-s-ptimo-kal-ndas-oct-bris-e53df7bbf1:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Octave of the Birth of the Blessed Virgin Mary.
          Upon the same 15 th day of September, were born into the better life:

          At Rome, upon the Nomentan Way, (in the first century,) the holy martyr Nicomede the Priest. Unto them that would have forced him to offer sacrifice he said, " I do not sacrifice, save unto the Almighty God, Who reigneth in the heavens," and he was beaten with scourges loaded with lead until at last he passed away to be ever with the Lord.
          In the country of Chalons, (in the second century,) the holy martyr Valerian. The President Priscus caused him to be hung up and tormented by mangling with metal hooks, but when he saw that he could not be shaken in his confession of Christ, but continued the rather to praise Him with a glad heart, he commanded to slay him with the sword.
          At Marcianopolis, in Thrace, the holy martyr Melitina. Under the Emperor Antonine and the President Antiochus, she was twice brought to the temples of the Gentiles, but as the idols continually fell down, she was hung up and mangled, and at last beheaded.
          At Adrianople, the holy martyrs Maximus, Theodore, and Asclepiodotus, who were crowned under the Emperor Maximian.
          Also holy Porphyry, a jester who received baptism as a farce in the presence of the Emperor Julian the Apostate, and was thereupon suddenly changed by the power of God, so that he professed himself to be a Christian, and by command of the Emperor received martyrdom by the axe.
          Upon the same day, the holy Goth Nicetas, who was burnt by order of King Athanaric for the Catholic faith's sake.
          At Cordova, (in the ninth century,) the holy martyrs Emilas, the Deacon, and Jeremiah, who suffered a long imprisonment in the persecution under the Arabs, and finished their testimony by being beheaded.
          At Toul, in Lorraine, (in the fifth century,) the holy Confessor Aper, Bishop (of that see.) Likewise, (in the sixth century,) holy Lubin, Bishop of Chartres.
          At Lyons, (in the fourth century,) holy Albin, Bishop (of that see.) On the same day, (in the seventh century,) holy Aichard, Abbot (of Jumieges.) In (Auvergne, in) Gaul, (in the fifth century,) the holy widow Eutropia.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Octóbris

          Festum Septem Dolórum beatíssimæ Vírginis Maríæ.
          Romæ, via Nomentána, natális beáti Nicomédis, Presbýteri et Mártyris, qui, cum díceret compelléntibus se sacrificáre: « Ego non sacrífico nisi Deo omnipoténti, qui regnat in cælis », plumbátis diutíssime cæsus est, atque in eo torménto migrávit ad Dóminum.
          Córdubæ, in Hispánia, sanctórum Mártyrum Emilæ Diáconi, et Ieremíæ, qui, in persecutióne Arábica, post longam cárceris maceratiónem, demum, cervícibus pro Christo abscíssis, martýrium complevérunt.
          In território Cabillonénsi sancti Valeriáni Mártyris, quem Priscus Præses, suspénsum et gravi ungulárum laceratióne cruciátum, tandem, cum in Christi confessióne vidéret immóbilem ac læto ánimo in eius láudibus permanéntem, gládio animadvérti præcépit.
          Hadrianópoli, in Thrácia, sanctórum Mártyrum Máximi, Theodóri et Asclepiódoti; qui sub Maximiáno Imperatóre coronáti sunt.
          Item sancti Porphýrii mimi, qui, coram Iuliáno Apóstata, per iocum suscípiens baptísmum, Dei virtúte derepénte mutátur, et Christiánum se esse profitétur; ac mox, ipsíus Imperatóris mandáto secúri percússus, martýrio coronátur.
          Eódem die sancti Nicétæ Gothi, qui ab Athanaríco Rege, ob cathólicam fidem, iussus est igne combúri.
          Marcianópoli, in Thrácia, sanctæ Melitínæ Mártyris, quæ, sub Antoníno Imperatóre et Antíocho Prǽside, cum ad Gentílium fana semel et íterum ducta esset, atque idóla semper corruérent, ídeo suspénsa et laniáta est, ac demum cápite plexa.
          Tulli, in Gállia, sancti Apri Epíscopi.
          Item sancti Leobíni, Epíscopi Carnuténsis.
          Lugdúni, in Gállia, sancti Albíni Epíscopi.
          Eódem die deposítio sancti Aichárdi Abbátis.
          In Gállia sanctæ Eutrópiæ Víduæ.
          Génuæ sanctæ Catharínæ Víduæ, contémptu mundi et caritáte in Deum insígnis.
      en2:
      - type: text
        text: |-
          The Sixteenth of September
      
          The Feast of the Seven Sorrows of the most blessed Virgin Mary.
          At Rome, on the Nomentan Way, the birthday of Blessed Nicodemus, Priest and Martyr, who, when those compelling him to sacrifice said: 'I sacrifice only to the almighty God, who reigns in heaven,' was beaten for a very long time with leaded whips, and in that torment passed to the Lord.
          At Cordoba in Spain, the holy Martyrs Emila the Deacon, and Jeremias, who, in the Arabian persecution, after a long torment in prison, at last, with their necks cut off for Christ, completed their martyrdom.
          In the territory of Chalon, Saint Valerianus the Martyr, whom the governor Priscus, having suspended him and tortured him with a harsh tearing by hooks, at last, seeing him unmoved in the confession of Christ and remaining with a joyful spirit in his praises, ordered to be put to death by the sword.
          At Hadrianopolis in Thrace, the holy Martyrs Maximus, Theodore, and Asclepiodotus; who were crowned under the Emperor Maximianus.
          Likewise, Saint Porphyrius the mime, who, before Julian the Apostate, receiving baptism in jest, was suddenly changed by the power of God and professed himself a Christian; and forthwith, by the command of the Emperor himself, was struck with the axe and crowned with martyrdom.
          On the same day, Saint Nicetas the Goth, who was ordered by king Athanaric to be consumed by fire for the catholic faith.
          At Marcianopolis in Thrace, Saint Melitina the Martyr, who, under the Emperor Antoninus and the governor Antioch, having been led once and again to the temples of the Gentiles, and the idols always having fallen, was therefore suspended and lacerated, and at last beheaded.
          At Toul in Gaul, Saint Aper the Bishop.
          Likewise, Saint Leobinus, Bishop of Chartres.
          At Lyons in Gaul, Saint Albinus the Bishop.
          On the same day, the repose of Saint Aichardus the Abbot.
          In Gaul, Saint Eutropia the Widow.
          At Genoa, Saint Catherine the Widow, distinguished for contempt of the world and charity toward God.
  psalm.d-cimo-s-ptimo-kal-ndas-sept-mbris-f676d904d8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of August we keep the feast of the holy Confessor Hyacinth, of the Order of Preachers, [who died at Cracow, in Poland, upon the feast-day of the Assumption, in the year 1257, and] whose feast Pope Clement VIII, when he enrolled his name among those of the Saints, ordered to be kept on the morrow thereof.
          Upon the same 16th day of August, were born into the better life:

          At Rome, [in the year 410,] the holy Deacon Titus. While the city was occupied by the Goths he was distributing money to the poor, when a tribune of the barbarians ordered him to be killed.
          At Nice, in Bithynia, the holy physician Diomede, who in the persecution under Diocletian was for Christ's faith's sake slain with the sword, and so finished his testimony.
          Likewise thirty-three holy martyrs.
          At Ferentino, in Latium, the holy centurion Ambrose, who in the persecution under the Emperor Diocletian was tortured in diverse ways, and when he had passed unhurt through the fire was sunk in water, and so entered into rest.
          At Milan, [about the year 400,] holy Simplician, Bishop [of that see,] famed through the testimony of holy Ambrose and Augustine.
          At Auxerre, [in the year 561,] holy Eleutherius, Bishop [of that see.]
          At Nicomedia, [in the year 358,] the holy Confessor Arsacius. Under the persecutor Licinius he deserted from the army, and took to the life of a hermit, wherein he shone with such graces that it is written that he cast out devils and by his prayers killed a huge dragon. At length he foretold the sack which was coming upon the city, and gave up his soul to God in prayer.
          At Montpellier, in Languedoc, [in the year 1327,] the blessed Confessor Roch, who by the sign of the Cross delivered many cities of Italy from the plague. His body hath been taken to Venice, and buried with great honour in the church consecrated in his name.
          At Rome, holy Serena, once the wife of the Emperor Diocletian.
      la:
      - type: text
        text: |-
          Décimo séptimo Kaléndas Septémbris

          Sancti Ióachim, patris immaculátæ Vírginis Genetrícis Dei Maríæ, Confessóris, cuius dies natális refértur tertiodécimo Kaléndas Aprílis.
          Romæ sancti Titi Diáconi, qui, Urbe a Gothis occupáta, pecúnias paupéribus distríbuens, a Tribúno bárbaro iussus est occídi.
          Nicǽæ, in Bithýnia, sancti Diomédis médici, qui in persecutióne Diocletiáni Imperatóris, pro Christi fide cæsus gládio, martýrium complévit.
          In Palæstína sanctórum trigínta trium Mártyrum.
          Ferentíni, in Hérnicis, sancti Ambrósii Centuriónis, qui, in persecutióne Diocletiáni, váriis modis cruciátus, et novíssime, cum per ignem illǽsus transísset, demérsus in aquam, edúctus est in refrigérium.
          Medioláni deposítio sancti Simpliciáni Epíscopi, sanctórum Ambrósii et Augustíni testimónio célebris.
          Antisiodóri sancti Eleuthérii Epíscopi.
          Nicomedíæ sancti Arsácii Confessóris, qui, sub Licínio persecutóre, milítia relícta, solitáriam vitam ducens, tantis virtútibus cláruit, ut et dǽmones expulísse et orándo interemísse ingéntem dracónem legátur; dénique, futúram civitátis cladem prænúntians, in oratióne spíritum Deo réddidit.
          Apud Montem Pessulánum, in Gállia Narbonénsi, deposítio beáti Rochi Confessóris, qui multas Itáliæ urbes signo Crucis a morbo epidémiæ liberávit. Ipsíus corpus Venétias póstea translátum, et in Ecclésia, eius nómine consecráta, honorificentíssime cónditum fuit.
          Romæ sanctæ Serénæ, uxóris quondam Diocletiáni Augústi.
      en2:
      - type: text
        text: |-
          The Sixteenth of August
      
          Saint Joachim, father of the immaculate Virgin Mother of God Mary, Confessor, whose birthday is recorded on the twentieth of March.
          At Rome, Saint Titus the Deacon, who, when the City was seized by the Goths, distributing money to the poor, was ordered to be killed by a barbarian Tribune.
          At Nicaea in Bithynia, Saint Diomedes the physician, who in the persecution of the Emperor Diocletian, for the faith of Christ, was struck by the sword and completed his martyrdom.
          In Palestine, thirty-three holy Martyrs.
          At Ferentino among the Hernici, Saint Ambrose the Centurion, who, in the persecution of Diocletian, tortured in various ways, and finally, having passed through fire unharmed, was submerged in water and brought out to refreshment.
          At Milan, the repose of Saint Simplicianus the Bishop, celebrated by the witness of Saints Ambrose and Augustine.
          At Auxerre, Saint Eleutherius the Bishop.
          At Nicomedia, Saint Arsacius the Confessor, who, under the persecutor Licinius, having left military service and leading a solitary life, shone with such virtues that it is recorded that he drove out demons and by prayer killed a great dragon; and finally, foretelling the coming destruction of the city, gave his spirit to God in prayer.
          Near Montpellier in Narbonese Gaul, the repose of Blessed Roch the Confessor, who freed many cities of Italy from the plague by the sign of the Cross. His body was afterward translated to Venice and was placed most honorably in a church consecrated in his name.
          At Rome, Saint Serena, formerly the wife of the Emperor Diocletian.
  psalm.duod-cimo-kal-ndas-aug-sti-8405f09250:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Emperor Henry II. He and his wife Cunegunda preserved perpetual virginity. He brought holy Stephen, King of Hungary, and nearly all his realm, to believe in Christ. Of him mention is made upon the 15 th day of this present month of July.
          Upon the same 21st day of July, were born into the better life:

          At Rome, the holy Virgin Praxedes.
          She was learned in the divine law, and spent her time constantly in all chastity, in watchings, and prayers, and fastings, and fell asleep in Christ, [in the year 164.] She was buried on the Salarian Way, beside her Sister Pudentiana.
          At Babylon, the Prophet Daniel, [in the year of the world 3429, about 626 B.C.]
          At Marseilles, the holy soldier Victor. He refused either to perform military service or to offer sacrifice to idols, wherefore he was first cast into prison, where he was visited by an angel, then punished with diverse torments, and lastly broken in a flour mill, and so finished his testimony.
          There also suffered along with him the three soldiers, Alexander, Felician, and Longinus, [in the year 290.]
          At Troyes, the holy Virgin and martyr Julia, [in the year 275.]
          At the same place, under the Emperor Aurelian, the holy martyrs Claudius, Justus, Jucundinus, and five others.
          At Camana, in Armenia, the holy martyr Zoticus, Bishop [of that see,] who was crowned under the Emperor Severus.
          At Strasbourg, [in the year 678,] holy Arbogastus, [19th] Bishop [of that see, and Patron of the Diocese,] famous for miracles.
          In Syria, the holy monk John, [of Edessa,] the Companion of holy Simeon, [called the Fool, sixth century.]
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Augústi

          Sancti Lauréntii a Brundúsio, Confessóris et Ecclésiæ Doctóris, ex Ordine Fratrum Minórum Capuccinórum, qui sequénti die migrávit in cælum.
          Romæ sanctæ Praxédis Vírginis, quæ, in omni castitáte et lege divína cum esset erudíta, vigíliis et oratiónibus atque ieiúniis assídue vacans, quiévit in Christo, sepúltaque est, iuxta sorórem suam Pudentiánam, via Salária.
          Babylóne sancti Daniélis Prophétæ.
          Cománæ, in Arménia, sancti Zótici, Epíscopi et Mártyris; qui sub Sevéro coronátus est.
          Massíliæ, in Gállia, natális sancti Victóris, qui, cum esset miles, et nec militáre neque idólis sacrificáre vellet, hinc, primo in cárcerem trusus ibíque ab Angelo visitátus, deínde váriis cruciátibus punítus, novíssime, contrítus in mola pistória, martýrium consummávit. Passi sunt cum ipso et tres mílites, id est Alexánder, Feliciánus et Longínus.
          Trecis, in Gállia, pássio sanctórum Cláudii, Iusti, Iucundíni et Sociórum quinque, sub Aureliáno Imperatóre.
          Ibídem sanctæ Iúliæ, Vírginis et Mártyris.
          Argentoráti sancti Arbogásti Epíscopi, miráculis clari.
          In Sýria sancti Ioánnis Mónachi, qui éxstitit colléga sancti Simeónis.
      en2:
      - type: text
        text: |-
          The Twenty-First of July
      
          Saint Lawrence of Brindisi, Confessor and Doctor of the Church, of the Order of Friars Minor Capuchins, who passed to heaven on the following day.
          At Rome, Saint Praxedes the Virgin, who, having been trained in all chastity and the divine law, devoting herself assiduously to vigils, prayers, and fasts, rested in Christ, and was buried near her sister Pudentiana on the Salarian Way.
          At Babylon, the holy Prophet Daniel.
          At Comana in Armenia, Saint Zoticus, Bishop and Martyr; who was crowned under Severus.
          At Marseilles in Gaul, the birthday of Saint Victor, who, being a soldier and wishing neither to serve in the military nor to sacrifice to idols, was therefore first thrust into prison and there visited by an Angel, then punished with various torments, and finally, ground in a mill, completed his martyrdom. There suffered with him also three soldiers, namely Alexander, Felicianus, and Longinus.
          At Troyes in Gaul, the passion of the holy Martyrs Claudius, Justus, Jucundinus, and five companions, under the Emperor Aurelian.
          There also, Saint Julia, Virgin and Martyr.
          At Strasbourg, Saint Arbogast the Bishop, renowned for miracles.
          In Syria, Saint John the Monk, who was the companion of Saint Simeon.
  psalm.duod-cimo-kal-ndas-dec-mbris-7f57823f40:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 20th day of November, were born into the better life:

          In England, the holy martyr Edmund, King of the East Angles.
          At Messina, in Sicily, the holy martyrs Ampelus and Caius.
          At Turin, the holy martyrs Octavius, Solutor, and Adventor, soldiers of the Theban legion, who contended gloriously under the Emperor Maximian, and were crowned with martyrdom.
          At Caesarea, in Palestine, the holy martyr Agapius, who was condemned to the wild beasts under the Emperor Galerius Maximian but as they did not hurt him, he was sunk in the sea with stones tied to his feet.
          In Persia, the holy martyrs the Bishop Nerses and his Companions.
          At Dorostorum, in Mysia, holy Dasius, Bishop (of that see,) who was beheaded under the President Bassus, because he would not join in the uncleanliness of the Feast of Saturn.
          At Nice, in Bithynia, in the persecution under Maximinus, the holy martyrs Eustace, Thespesius, and Anatolius.
          At Heraclea, in Thrace, the holy martyrs Bassus, Denys, Agapitus, and forty others.
          At Constantinople, holy Gregory of Decapolis, who suffered many things for honouring the holy images.
          At Milan, (in the fifth century,) holy Benignus, Bishop (of that see,) who, in the midst of all the troubles caused by the incoming of the barbarians, ministered in all steadfastness and godliness unto the Church committed to his care.
          At Chalons, (in the sixth century,) holy Sylvester, Bishop (of that see,) who passed away to be ever with the Lord, full of days and graces, in the forty-second year of his priesthood.
          At Verona, (likewise in the sixth century,) the holy Confessor Simplicius, Bishop (of that see.)
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Decémbris

          Sancti Felícis Valésii, Presbýteri et Confessóris, qui Ordinis sanctíssimæ Trinitátis redemptiónis captivórum éxstitit Fundátor, ac prídie Nonas Novémbris obdormívit in Dómino.
          In Pérside pássio sanctórum Nersæ Epíscopi, et Sociórum.
          Messánæ, in Sicília, sanctórum Mártyrum Ampéli et Caii.
          Tauríni sanctórum Mártyrum Octávii, Solutóris et Adventóris, Thebánæ legiónis mílitum; qui, sub Maximiáno Imperatóre, egrégie decertántes, martýrio coronáti sunt.
          Cæsaréæ, in Palæstína, sancti Agápii Mártyris, qui, sub Galério Maximiáno Imperatóre, damnátus ad béstias et ab iis nil læsus, tandem, lapídibus ad pedes appénsis, in mare demérgitur.
          Doróstori, in Mýsia inferióre, sancti Dásii Mártyris, qui, cum in festo Satúrni nollet impudicítiis eius consentíre, sub Basso Prǽside cæsus est.
          Nicǽæ, in Bithýnia, sanctórum Mártyrum Eustáchii, Thespésii et Anatólii, in persecutióne Maximiáni.
          Heracléæ, in Thrácia, sanctórum Mártyrum Bassi, Dionýsii, Agapíti et aliórum quadragínta.
          In Anglia sancti Eadmúndi, Regis et Mártyris.
          Constantinópoli sancti Gregórii Decapolítæ, qui ob cultum sanctárum Imáginum multa passus est.
          Medioláni sancti Benígni Epíscopi, qui, in magna barbarórum perturbatióne, commíssam sibi Ecclésiam summa constántia et religióne administrávit.
          Cabillóne, in Gálliis, sancti Silvéstri Epíscopi, qui quadragésimo secúndo sui sacerdótii anno, plenus diérum atque virtútum, migrávit ad Dóminum.
          Verónæ sancti Simplícii, Epíscopi et Confessóris.
          Hildeshémii, in Saxónia, sancti Bernwárdi, Epíscopi et Confessóris, qui a Cælestíno Papa Tértio in Sanctórum númerum adscríptus est.
      en2:
      - type: text
        text: |-
          The Twentieth of November
      
          Saint Felix of Valois, Priest and Confessor, who was the Founder of the Order of the Most Holy Trinity for the Redemption of Captives, and fell asleep in the Lord on the fourth of November.
          In Persia, the passion of the holy Martyrs Nerses, Bishop, and his Companions.
          At Messina, in Sicily, the holy Martyrs Ampelus and Caius.
          At Turin, the holy Martyrs Octavius, Solutor, and Adventor, soldiers of the Theban Legion, who, under the Emperor Maximian, fought valiantly and were crowned with martyrdom.
          At Caesarea, in Palestine, the holy Martyr Agapius, who, under the Emperor Galerius Maximian, was condemned to the beasts, yet was not harmed by them, and was at last cast into the sea with stones tied to his feet.
          At Dorostorum, in Lower Moesia, the holy Martyr Dasius, who, refusing to consent to the impurities of the festival of Saturn, was put to death under the Governor Bassus.
          At Nicaea, in Bithynia, the holy Martyrs Eustasius, Thespesios, and Anatolius, in the persecution of Maximian.
          At Heraclea, in Thrace, the holy Martyrs Bassus, Dionysius, Agapitus, and forty others.
          In England, Saint Edmund, King and Martyr.
          At Constantinople, Saint Gregory the Decapolite, who suffered much for the veneration of holy Images.
          At Milan, Saint Benignus, Bishop, who, in the great upheaval caused by the barbarians, administered the Church entrusted to him with the utmost steadfastness and piety.
          At Chalon-sur-Saône, in Gaul, Saint Silvester, Bishop, who, in the forty-second year of his priesthood, full of days and virtues, passed to the Lord.
          At Verona, Saint Simplicius, Bishop and Confessor.
          At Hildesheim, in Saxony, Saint Bernward, Bishop and Confessor, who was enrolled in the number of the Saints by Pope Celestine III.
  psalm.duod-cimo-kal-ndas-febru-rii-dc171e8ca5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of January, were born into the better life:

          At Rome, under Symphronius, Prefect of the city, the holy Virgin and martyr Agnes. She was cast into the fire, but the fire died out at her prayer, and then she was smitten with the sword, (in the year 304.) Blessed Jerome writeth concerning her. The life of Agnes hath been praised in the writings and in the tongues of all nations, and most chiefly in the churches. She overcame not only the tyrant but also the weakness of her own age, and hallowed by martyrdom the title of virgin.
          At Athens, (in the second century,) the holy Bishop Publius, who ruled illustriously over the Church of Athens in succession to holy Denis the Areopagite he was famous for graces and eminent for teaching, and was gloriously crowned with the martyrdom of Christ.
          At Tarragona, in Spain, the holy martyrs Fructuosus, Bishop of that see, and the Deacons Augurius and Eulogius. In (the year 259,) in the time of the Emperor Gallienus, they were first imprisoned and then cast into the fire, and when their bonds had been burnt they stretched forth their hands in the form of a cross, and so in prayer finished their martyrdom.
          Holy Augustin preached to the people upon their feast-day.
          At Troyes, (in Champagne,) the holy martyr Patroclus, who gained the crown of martyrdom under the Emperor Aurelian.
          In the Monastery of Einsiedeln, in Gaul, the holy hermit Meinard, who was murdered by thieves, (in the year 861. Founder of Notre Dame des Ermites.)
          At Pavia, the holy Confessor Epiphanius, Bishop of that see.
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Februárii

          Romæ pássio sanctæ Agnétis, Vírginis et Mártyris; quæ, sub Præfécto Urbis Symphrónio, ígnibus iniécta, sed iis per oratiónem eius exstínctis, gládio percússa est. De ea beátus Hierónymus hæc scribit: « Omnium géntium lítteris atque linguis, præcípue in Ecclésiis, Agnétis vita laudáta est; quæ et ætátem vicit et tyránnum, et títulum castitátis martýrio consecrávit ».
          Athénis natális sancti Públii Epíscopi, qui Atheniénsium Ecclésiam, post sanctum Dionýsium Areopagítam, nobíliter rexit; et, præclárus virtútibus ac doctrínæ laude præfúlgens, ob Christi martýrium glorióse coronátur.
          Tarracóne, in Hispánia, sanctórum Mártyrum Fructuósi Epíscopi, Augúrii et Eulógii Diaconórum. Hi, témpore Galliéni, primo in cárcerem trusi, deínde flammis iniécti, et, exústis vínculis, mánibus in modum crucis expánsis orántes, martýrium complevérunt; in quorum die natáli sanctus Augustínus sermónem ad pópulum hábuit.
          In monastério Einsidlénsi, apud Helvétios, sancti Meinrádi, Presbýteri et Mónachi; qui eódem in loco, ubi póstea monastérium ipsum excrévit, eremíticæ inténtus vitæ, a latrónibus interféctus est. Ipsíus vero beáti viri corpus, olim in Augiénsi Germániæ monastério sepúltum, ad Einsidlénse monastérium deínde relátum fuit.
          Trecis, in Gállia, sancti Pátrocli Mártyris, qui martýrii corónam sub Aureliáno Imperatóre proméruit.
          Pápiæ sancti Epiphánii, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Twenty-First of January
      
          At Rome, the passion of Saint Agnes, Virgin and Martyr; who, under Sympronius, Prefect of the City, was cast into the fire, but when it was extinguished through her prayer, she was struck with the sword. Of her, blessed Jerome writes: 'In the writings and languages of all peoples, Agnes is praised above all in the Churches; she overcame both her age and the tyrant, and consecrated the glory of chastity with martyrdom.'
          At Athens, the birthday of Saint Publius, Bishop, who nobly governed the Church of the Athenians after Saint Dionysius the Areopagite; and, shining with virtues and distinguished for his learning, was gloriously crowned with martyrdom for Christ.
          At Tarragona, in Spain, the holy Martyrs Fructuosus, Bishop, and Augurius and Eulogius, Deacons. These, in the time of Gallienus, were first cast into prison, then thrown into the flames; and with their bonds burned away, praying with hands extended in the form of a cross, they completed their martyrdom. Saint Augustine preached a sermon to the people on the day of their birth in heaven.
          At the monastery of Einsiedeln, among the Swiss, Saint Meinrad, Priest and Monk; who, in the very place where the monastery later grew up, given to the eremitic life, was slain by thieves. The body of that blessed man, formerly buried in the monastery of Reichenau in Germany, was later translated to the monastery of Einsiedeln.
          At Troyes, in Gaul, Saint Patrocius, Martyr, who merited the crown of martyrdom under the Emperor Aurelian.
          At Pavia, Saint Epiphanius, Bishop and Confessor.
  psalm.duod-cimo-kal-ndas-i-lii-1f2e761748:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 20th day of June, were born into the better life:

          The holy martyr Pope Silverius. He refused to restore the [Eutychian] heretic Anthimus, who had been deposed [from the Patriarchate of Constantinople] by his predecessor, Pope Agapitus, and in consequence of this, through a plot of the wicked Empress Theodora, was exiled by Bellisarius to the island of Ponza, where he died for the Catholic faith, broken down by sufferings and hardships, [in the year 538.]
          At Rome, the holy Novatus, son of the blessed Senator Pudens and brother of the holy Priest Timothy, and of Christ's holy Virgins Pudentiana and Praxedes, who were taught in the faith by the Apostles. Their house was turned into a church, and called that of St. Pastor, [in the second century.]
          At Tomi, in Pontus, the holy martyrs Paul and Cyriacus.
          At Petra, in Palestine, the holy Macarius, Bishop [of that see,] who suffered many things of the Arians, and was exiled to Africa, where he fell asleep in the Lord, [in the fourth century.]
          At Seville, in Spain, [in the year 630,] the holy Virgin Florentina, sister of the holy Leander, Bishop [of Seville,] and holy Isidore, Bishop [of Seville.]
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Iúlii

          In ínsula Póntia natális sancti Silvérii, Papæ et Mártyris, qui, cum Anthimum, Epíscopum hæréticum, a suo prædecessóre Agapíto depósitum, restitúere noluísset, a Belisário, agénte ímpia Theodóra Augústa, in exsílium pulsus est, et ibídem, pro fide cathólica multis ærúmnis conféctus, defécit.
          Romæ deposítio sancti Nováti, qui fuit fílius beáti Pudéntis Senatóris, et frater sancti Timóthei Presbýteri et sanctárum Christi Vírginum Pudentiánæ et Praxédis, qui ab Apóstolis erudíti sunt in fide. Ipsórum vero domus, in Ecclésiam commutáta, Pastóris Títulus appellátur.
          Tomis, in Ponto, sanctórum Mártyrum Pauli et Cyríaci.
          Petræ, in Palæstína, sancti Macárii Epíscopi, qui, ab Ariánis passus multa et in Africam relegátus, Conféssor quiévit in Dómino.
          Híspali, in Hispánia, sanctæ Floréntinæ Vírginis, soróris sanctórum Leándri et Isidóri Episcopórum.
      en2:
      - type: text
        text: |-
          The Twentieth of June
      
          On the island of Ponza, the birthday of Saint Silverius, Pope and Martyr, who, having refused to restore Anthimus, a heretical bishop deposed by his predecessor Agapetus, was driven into exile by Belisarius acting at the instigation of the wicked Empress Theodora, and there, worn out by many hardships for the catholic faith, he died.
          At Rome, the deposition of Saint Novatus, who was the son of the blessed Senator Pudens, and brother of Saint Timothy the Priest and of the holy Virgins of Christ, Pudentiana and Praxedes, who were instructed in the faith by the Apostles. Their house, converted into a church, is called the Title of the Shepherd.
          At Tomi, in Pontus, the holy Martyrs Paul and Cyriacus.
          At Petra, in Palestine, Saint Macarius, Bishop, who, having suffered much at the hands of the Arians and been exiled to Africa, rested in the Lord as a Confessor.
          At Seville, in Spain, Saint Florentina, Virgin, sister of the holy Bishops Leander and Isidore.
  psalm.duod-cimo-kal-ndas-i-nii-884714106d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Peter Morone, who was a hermit when he was created Supreme Pontiff, and was called Celestine V. He resigned the Papacy and led a religious life in solitude, and so, famous for graces and wonders, passed away to be for ever with the Lord. Of him mention is made upon the 19th of this same month of May.
          Upon the same 21st day of May, were born into the better life:

          In Morocco, the holy Deacons Timothy, Polius, and Eutychius, who spread the Word of God in that country, and won the crown of martyrdom together.
          At Caesarea, in Cappadocia, the holy martyrs Polyeuctus, Victorius, and Donatus.
          At Cordova, [in the persecution under the Emperor Decius,] the holy martyr Secundinus.
          Upon the same day, [at Nicomedia, in the persecution under the Emperor Diocletian,] the holy martyrs Synesius and Theopompus.
          At Caesarea Philippi, [likewise in the persecution under the Emperor Diocletian,] the holy Nicostratus and Antiochus, along with other soldiers, all martyrs.
          On the same day, the holy Valens, Bishop [of Pampeluna,] who was murdered along with three lads.
          At Alexandria, are commemorated the holy martyrs Secundus the Priest, and others, whom George, the Arian Bishop under the Emperor Constantius, savagely ordered to be slain during the Whitsuntide holidays.
          Also the holy Bishops [Ammonius, Muus, Gaius, Philon, Heres, Pliny, Psinosiris, Palemon, Agathon, Anagamphon, Mark, another Ammonius, another Mark, Dracontius, Adelphius, and Athenodorus,] and the Priests [Hierax and Dioscorus,] who all were banished by the Arians, and so won a place with holy Confessors.
          At Nice, in Gaul, [in the sixth century,] the holy Confessor Hospitius, remarkable for the grace of self-denial, and for the spirit of prophecy.
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Iúnii

          Sancti Valéntis Epíscopi, qui, una cum tribus púeris, necátus est.
          Alexandríæ commemorátio sanctórum Mártyrum Secúndi Presbýteri, et aliórum; quos sacris diébus Pentecóstes, sub Constántio Imperatóre, Ariánus Epíscopus Geórgius sævíssime occídi præcépit.
          In Mauritánia Cæsariénsi natális sanctórum Mártyrum Diaconórum Timóthei, Pólii et Eutýchii, qui, in eádem regióne disseminántes verbum Dei, páriter coronári meruérunt.
          Cæsaréæ, in Cappadócia, item natális sanctórum Mártyrum Polyeúcti, Victórii et Donáti.
          Córdubæ, in Hispánia, sancti Secundíni Mártyris.
          Eódem die sanctórum Mártyrum Synésii et Theopómpi.
          Cæsaréæ Philíppi natális sanctórum Mártyrum Nicostráti et Antíochi Tribunórum, cum áliis milítibus.
          Alexandríæ commemorátio sanctórum Episcopórum et Presbyterórum; qui, ab Ariánis exsílio relegáti, sanctis Confessóribus sociári meruérunt.
          Níciæ, apud Varum flúvium, sancti Hospítii Confessóris, abstinéntiæ virtúte ac prophetíæ spíritu insígnis.
      en2:
      - type: text
        text: |-
          The Twenty-First of May
      
          Saint Valens, Bishop, who was put to death together with three boys.
          At Alexandria, a commemoration of the holy Martyrs: Secundus, Priest, and others; whom the Arian Bishop George, during the sacred days of Pentecost, under the Emperor Constantius, ordered to be most cruelly slain.
          In Caesarea Mauritania, the birthday of the holy Martyr Deacons Timothy, Pollius, and Eutychius, who, sowing the word of God throughout that same region, merited to be crowned together.
          At Caesarea, in Cappadocia, likewise the birthday of the holy Martyrs Polyeuctus, Victorius, and Donatus.
          At Córdoba, in Spain, Saint Secundinus, Martyr.
          On the same day, the holy Martyrs Synesius and Theopompus.
          At Caesarea Philippi, the birthday of the holy Martyrs Nicostratus and Antiochus, Tribunes, with other soldiers.
          At Alexandria, a commemoration of the holy Bishops and Priests who, exiled by the Arians, merited to be associated with the holy Confessors.
          At Nice, near the river Var, Saint Hospitius, Confessor, distinguished for the virtue of abstinence and the spirit of prophecy.
  psalm.duod-cimo-kal-ndas-ianu-rii-757183c66b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of December, were born into the better life:

          Upon the Coromandel coast of India, not far from Madras, the blessed Apostle Thomas. He preached the Gospel to the Parthians, Medes, Persians, and Hyrcanians, and at length came into India, and was teaching the Christian religion to those people when the king commanded him to be run through with lances, and so he died. His relics were taken first to the city of Edessa and afterwards to Ortona.
          In Tuscany, the holy martyrs John and Festus.
          In Lycia, the holy martyr Themistocles. Under the Emperor Decius he gave himself up for holy Dioscorus, when they were seeking after him to slay him, and was first racked, taken down and dragged about, and beaten with cudgels, gained the crown of martyrdom (in the year 249.)
          At Nicomedia, the holy Priest Glycerius, who suffered many torments in the persecution under the Emperor Diocletian, and was at length cast in the fire, and so finished his testimony.
          At Antioch, the holy martyr Anastasius, Bishop (of that see,) who was cruelly murdered by the Jews in the time of the Emperor Phocas, (in the year 609.)
          At Trier, the holy Confessor Severinus, Bishop (of that see, fourth century.)
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Ianuárii

          Calamínæ natális beáti Thomæ Apóstoli, qui Parthis, Medis, Persis et Hyrcánis Evangélium prædicávit; ac demum in Indiam pervénit, ibíque, cum eos pópulos in Christiána religióne instituísset, Regis iussu lánceis transfíxus occúbuit. Ipsíus relíquiæ primo ad urbem Edéssam, in Mesopotámia, deínde Ortónam, apud Frentános, translátæ sunt.
          Fribúrgi Helvetiórum item natális sancti Petri Canísii, Sacerdótis e Societáte Iesu et Confessóris, doctrína et sanctitáte præclári; qui, difficíllimis Germániæ tempóribus, fidem cathólicam strénue deféndit ac propagávit. Eum vero Pius Undécimus, Póntifex Máximus, Sanctórum catálogo adscrípsit, simúlque Doctórem universális Ecclésiæ declarávit, et ipsíus festum quinto Kaléndas Maii agéndum esse decrévit.
          Antiochíæ sancti Anastásii, Epíscopi et Mártyris; qui, Phocæ Imperatóris témpore, a Iudǽis, in seditióne ab ipsis contra Christiános facta, sævíssime necátus est.
          Nicomedíæ sancti Glycérii Presbýteri, qui, in persecutióne Diocletiáni, multis torméntis vexátus, demum, in ignem coniéctus, martýrium consummávit.
          In Túscia sanctórum Mártyrum Ioánnis et Festi.
          In Lýcia sancti Themístoclis Mártyris, qui, sub Décio Imperatóre, pro sancto Dióscoro, qui quærebátur ad necem, se óbtulit, et, equúleo tortus, raptátus ac fústibus cæsus, martýrii corónam adéptus est.
          Tréviris sancti Severíni, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Twenty-First of December
      
          At Calamina, the birthday of the blessed Apostle Thomas, who preached the Gospel to the Parthians, Medes, Persians, and Hyrcanians; and came at last to India, where, having established those peoples in the Christian faith, he was pierced with lances by order of the king and died. His relics were first translated to the city of Edessa in Mesopotamia, and then to Ortona among the Frentani.
          At Fribourg in Switzerland, likewise the birthday of Saint Peter Canisius, Priest of the Society of Jesus and Confessor, distinguished for learning and holiness; who, in the most difficult times of Germany, strenuously defended and propagated the catholic faith. Pope Pius XI enrolled him in the catalogue of the Saints and at the same time declared him a Doctor of the universal Church, and decreed that his feast should be observed on the twenty-seventh of April.
          At Antioch, Saint Anastasius, Bishop and Martyr; who, in the time of the Emperor Phocas, was most cruelly slain by the Jews in a sedition raised by them against the Christians.
          At Nicomedia, Saint Glycerius, Priest, who, in the persecution of Diocletian, tormented by many sufferings, was at last cast into the fire and completed his martyrdom.
          In Tuscany, the holy Martyrs John and Festus.
          In Lycia, Saint Themistocles, Martyr, who, under the Emperor Decius, offered himself in place of the holy Dioscorus who was sought out for death, and, racked on the horse, dragged about and beaten with clubs, attained the crown of martyrdom.
          At Trier, Saint Severinus, Bishop and Confessor.
  psalm.duod-cimo-kal-ndas-m-rtii-70d330fb9a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18th day of February, were born into the better life:

          At Jerusalem, the blessed martyr Simeon, Bishop of that holy city [from the year 46 to the year 107.] This is he of whom it is recorded that he was the son of Cleophas and the kinsman of the Saviour according to the flesh. He was ordained Bishop of Jerusalem next after James, the brother of the Lord. In the persecution under Trajan he was put to many torments and suffered martyrdom, and the judge and all men marvelled to see with how great boldness and firmness he endured the grievous torment of the cross at his great age, for he was an hundred and twenty years old.
          At Ostia, the holy brethren Maximus and Claudius, and Praeperdigna, the wife of Claudius, and their two sons, Alexander and Cutias, all martyrs, [in the year 295.] They were a very noble race, and by command of the Emperor Diocletian they were arrested and sent into exile, then they were consumed with fire, and so offered a sacrifice of sweet savour unto God himself. Their relics were cast into the river, but the Christians sought for them and buried them hard by the city.
          In Africa, the holy martyrs Lucius, Sylvan, Rutulus, Classicus, Secundinus, Fructulus, and Maximus.
          At Constantinople, [in the year 449,] holy Flavian, Bishop of that see, who, because he defended the Catholic faith at Ephesus, was assailed by the followers of the wicked Dioscorus with cuffs and kicks, and sent into exile, where he died after three days.
          At Toledo, [in the year 631,] the holy Confessor Helladius, Bishop of that see.
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Mártii

          Hierosólymis natális sancti Simeónis, Epíscopi et Mártyris; qui fílius Cleóphæ et propínquus Salvatóris secúndum carnem fuísse tráditur. Hic, Hierosolymórum Epíscopus post Iacóbum, fratrem Dómini, ordinátus, et, in Traiáni persecutióne, multis supplíciis afféctus, martýrio consummátus est, ómnibus qui áderant et Iúdice ipso mirántibus ut centum vigínti annórum senex fórtiter constantérque supplícium crucis pertulísset.
          Apud Ostia Tiberína sanctórum Mártyrum Máximi et Cláudii fratrum, et Præpedígnæ, uxóris Cláudii, cum duóbus fíliis Alexándro et Cútia; qui, cum essent præclaríssimi géneris, omnes, iubénte Diocletiáno, tenti atque in exsílium deportáti sunt, ac deínde, incéndio concremáti, Deo ipsi odoríferum martýrii sacrifícium obtulérunt. Eórum relíquiæ, in flumen proiéctæ et a Christiánis perquisítæ, iuxta eándem civitátem sepúltæ sunt.
          In Africa sanctórum Mártyrum Lúcii, Silváni, Rútuli, Clássici, Secundíni, Frúctuli et Máximi.
          Constantinópoli sancti Flaviáni Epíscopi, qui, cum fidem cathólicam Ephesi propugnáret, ab ímpii Dióscori factióne pugnis et cálcibus percússus est, et, in exsílium actus, ibídem post tríduum vitam finívit.
          Toléti, in Hispánia, sancti Helládii, Epíscopi et Confessóris, qui a sancto Ildefónso, Toletáno Epíscopo, multis láudibus celebrátur.
      en2:
      - type: text
        text: |-
          The Eighteenth of February
      
          At Jerusalem, the birthday of Saint Simeon, Bishop and Martyr; who is said to have been the son of Cleophas and a kinsman of the Savior according to the flesh. He was ordained Bishop of Jerusalem after James, the brother of the Lord, and in the persecution of Trajan, afflicted with many torments, he completed his martyrdom — to the wonder of all present and of the judge himself — bearing the punishment of the cross bravely and steadfastly at the age of one hundred and twenty years.
          Near the mouth of the Tiber, the holy Martyrs Maximus and Claudius, brothers, and Praepedigna, wife of Claudius, together with their two sons Alexander and Cutia; who, being of most noble birth, were all arrested and deported into exile by order of Diocletian, and then, consumed by fire, offered to God the fragrant sacrifice of martyrdom. Their relics, cast into the river and sought out by Christians, were buried near that same city.
          In Africa, the holy Martyrs Lucius, Silvanus, Rutilus, Classicus, Secundinus, Fructulus, and Maximus.
          At Constantinople, Saint Flavian, Bishop, who, while defending the catholic faith at Ephesus, was struck with fists and kicks by the faction of the wicked Dioscorus, and, driven into exile, ended his life there three days later.
          At Toledo, in Spain, Saint Helladius, Bishop and Confessor, celebrated with many praises by Saint Ildefonsus, Bishop of Toledo.
  psalm.duod-cimo-kal-ndas-maii-3d8367ec9b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 20th day of April, were born into the better life:

          At Rome, the holy martyrs Sulpitius and Servilian. They were converted to the faith of Christ by the preaching and miracles of the blessed Virgin Domitilla, and were put to death by Anian, Prefect of the city, in the persecution under the Emperor Trajan, for refusing to offer sacrifice to idols.
          Upon the same day, the holy martyrs Victor, Zoticus, Zeno, Acindinus, Caesareus, Severian, Chrysophor, Theonas, and Antonine, who were variously tried under the Emperor Diocletian, and attained to martyrdom, [most likely in Nicomedia.]
          At Tomi, in Scythia, holy Theotimus, [Bishop of that see, about the year 409,] whose holiness and miracles were so striking that he was honoured even by the unbelieving savages.
          At Embrun, in Gaul, holy Marcellinus, the first Bishop of that city, who came from Africa in consequence of a warning from God, along with his holy companions Vincent and Domninus, and by his word and the wondrous signs, for which he is famous even unto this day, brought to believe in Christ a great number of the dwellers on the Seaward Alps, [in the year 374.]
          At Auxerre, [in the fifth century,] the holy Priest Marcian.
          On the same day, the holy Confessor Theodore, nicknamed "Hairy" on account of the rough sackcloth garment which he wore. He is famous for many mighty works, more especially against evil spirits and from his body there floweth an ointment whereby the sick are healed. [He was of a noble family of Constantinople. His date is not known exactly, but it was certainly after the persecution of Diocletian. He lived in a desert in Thrace, which is called after him, the Hairy Desert]
          At Monte Pulciano, [in the year 1317,] the holy Virgin Agnes, of the Order of St. Dominic, famous for miracles.
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Maii

          Romæ sanctórum Mártyrum Sulpícii et Serviliáni, qui, prædicatióne et miráculis beátæ Domitíllæ Vírginis ad Christi fidem convérsi, ambo, cum nollent idólis immoláre, in persecutióne Traiáni, a Præfécto Urbis Aniáno sunt cápite cæsi.
          Nicomedíæ sanctórum Mártyrum Victóris, Zótici, Zenónis, Acíndyni, Cæsárei, Severiáni, Chrysóphori, Theónæ et Antoníni, qui, sub Diocletiáno Imperatóre, passióne ac signis beáti Geórgii ad Christum convérsi sunt, et ob intrépidam fídei confessiónem, várie tentáti, martýrium complevérunt.
          Tomis, in Scýthia, sancti Theótimi Epíscopi, quem, ob insígnem ipsíus sanctitátem atque mirácula, étiam infidéles bárbari veneráti sunt.
          Ebredúni, in Gálliis, sancti Marcellíni, qui fuit primus eiúsdem urbis Epíscopus. Hic, Dei mónitu, cum sanctis Sóciis Vincéntio et Domníno, ex Africa venit, et máximam Alpium maritimárum partem verbo et signis admirándis, quibus usque hódie refúlget, ad Christi fidem convértit.
          Antisiodóri sancti Marciáni Presbýteri.
          Apud Constantinópolim sancti Theodóri Confessóris, ab áspera cilícii veste, qua tegebátur, cognoménto Tríchinas, qui multis virtútibus, præsértim advérsus dǽmones, cláruit; ex cuius córpore scatúriens unguéntum ægrótis sanitátem impértit.
          In Monte Politiáno, in Túscia, sanctæ Agnétis Vírginis, ex Ordine sancti Domínici, miráculis claræ.
      en2:
      - type: text
        text: |-
          The Twenty-Second of April
      
          At Rome, the holy Martyrs Sulpicius and Servilianus, who, converted to the faith of Christ by the preaching and miracles of the blessed Virgin Domitilla, both refused to sacrifice to idols and were beheaded in the persecution of Trajan by Anianus, Prefect of the City.
          At Nicomedia, the holy Martyrs Victor, Zoticus, Zeno, Acindynus, Caesarius, Severianus, Chrysophorus, Theona, and Antoninus, who, converted to Christ by the passion and miracles of the blessed George under the Emperor Diocletian, and tested in various ways for their fearless confession of faith, completed their martyrdom.
          At Tomi, in Scythia, Saint Theotimus, Bishop, whom even the unbelieving barbarians venerated on account of his remarkable holiness and miracles.
          At Embrun, in Gaul, Saint Marcellinus, who was the first Bishop of that city. He came from Africa, by divine prompting, together with the holy Companions Vincent and Domnius, and converted the greater part of the Maritime Alps to the faith of Christ through word and admirable signs, in which he shines to this day.
          At Auxerre, Saint Marcianus, Priest.
          Near Constantinople, Saint Theodore, Confessor, surnamed Trichinas from the rough hair-shirt which he wore, who was distinguished by many virtues, especially against demons; from whose body a flowing unguent bestows health upon the sick.
          At Monte Pulciano, in Tuscany, Saint Agnes, Virgin, of the Order of Saint Dominic, renowned for miracles.
  psalm.duod-cimo-kal-ndas-nov-mbris-ecce3cb7f0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of October, were born into the better life:

          At Cologne, the holy Ursula and her Companions, who, for their steadfastness in Christianity and chastity, were massacred by the Huns, and so closed their earthly life by martyrdom.
          Very many of their bodies are buried at Cologne.
          In Cyprus, the holy Abbot Hilarion, of whom holy Jerome hath written the life, full of graces and wonders.
          At Ostia, the holy martyr Asterius, a Priest who suffered under the Emperor Alexander, as is written in the acts of the passion of the blessed Pope Kallistus.
          At Nicomedia, the holy martyrs Dasius, Zoticus, Caius, and twelve others, soldiers, who were diversely tormented, and then drowned in the sea, (under the Emperor Diocletian.) At Maronia, in Syria, near Antioch, (in the fourth century,) the holy monk Malchus.
          At Lyon, holy Viator, the servant of the blessed Justus, Bishop of Lyon.
          At Laon, holy Cilinia, mother of the blessed Remy, Bishop of Reims.
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Novémbris

          In Cypro natális sancti Hilariónis Abbátis, cuius vitam, virtútibus atque miráculis plenam, sanctus Hierónymus scripsit.
          Apud Colóniam Agrippínam item natális sanctárum Ursulæ et Sociárum eius; quæ, pro Christiána religióne et virginitátis constántia ab Hunnis interféctæ, martýrio vitam consummárunt, earúmque plúrima córpora fuérunt Colóniæ cóndita.
          Apud Ostia Tiberína sancti Astérii, Presbýteri et Mártyris; qui (ut in passióne beáti Callísti Papæ légitur) sub Alexándro Imperatóre passus est.
          Nicomedíæ natális sanctórum Dásii, Zótici, Caii et aliórum duódecim mílitum; qui, post divérsa torménta, in mare demérsi sunt.
          Lugdúni, in Gállia, sancti Viatóris, qui éxstitit miníster beáti Iusti, Lugdunénsis Epíscopi.
          Maróniæ, prope Antiochíam, in Sýria, sancti Malchi Mónachi.
          In castro Laudunénsi sanctæ Cilíniæ, matris beáti Remígii, Epíscopi Rheménsis.
      en2:
      - type: text
        text: |-
          The Twenty-Second of October
      
          On Cyprus, the birthday of Saint Hilarion, Abbot, whose life, full of virtues and miracles, was written by Saint Jerome.
          Near Cologne, likewise the birthday of the holy Ursula and her Companions; who, for the Christian faith and the steadfastness of their virginity, were slain by the Huns and completed their lives in martyrdom, and many of their bodies were buried at Cologne.
          Near the mouth of the Tiber, Saint Asterius, Priest and Martyr; who (as is read in the passion of the blessed Pope Callistus) suffered under the Emperor Alexander.
          At Nicomedia, the birthday of the holy Martyrs Dasius, Zoticus, Caius, and twelve other soldiers; who, after various torments, were cast into the sea.
          At Lyons, in Gaul, Saint Viator, who was the minister of the blessed Justus, Bishop of Lyons.
          At Maronea, near Antioch, in Syria, Saint Malchus, Monk.
          In the castle of Laon, Saint Cilinia, mother of the blessed Remigius, Bishop of Reims.
  psalm.duod-cimo-kal-ndas-oct-bris-eef2484cf3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Tomorrow is the Eve of the holy Apostle and Evangelist Matthew.
          Upon the same 20th day of September, were born into the better life:

          At Rome, the holy martyrs Eustace and Theopista his wife along with their two sons Agapitus and Theopistus, who, under the Emperor Hadrian, were condemned to be devoured by wild beasts, but, as by God's help these would not touch them, they were shut up in a bull of hot bronze, and so finished their testimony.
          At Cyzicus, in the Propontis, under the Emperor Maximian, the holy martyrs, the Virgin Fausta and Evilasius. Evilasius was a priest of idols who shaved Fausta's head to put her to shame, hung her up, and tormented her, then he was fain to cause her to be cut in two, but the executioners could not hurt her whereupon he was confounded and believed in Christ. Then was he mightily tormented, by command of the Emperor, and Fausta was pierced through the head and nails fixed into her whole body, and so was laid upon a vessel of burning metal and then a voice came from heaven and called them both together to go to be with the Lord.
          In Phrygia, the holy martyrs Denys and Privatus.
          Also the holy martyr Priscus, who was stabbed with poignards and beheaded.
          At Perge, in Pamphylia, under the Emperor Antonine, the holy martyrs Theodore and Philippa his mother, and their Companions.
          At Carthage, the holy Virgin and martyr Candida, who was crowned with martyrdom under the Emperor Maximian, her whole body being torn with stripes.
          Also, (in the fourth century, at Beyt Jabryn, in Palestine,) the holy martyrs Susanna and Martha, of the whom Susanna was the daughter of Arthemius, a priest of idols.
          Upon the same day, (in the sixth century,) the holy Confessor Pope Agapitus, whose holiness is recorded by blessed Gregory the Great.
          At Milan, (in the fifth century,) the holy Confessor Clicerius, Bishop (of that see.)
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Octóbris

          Romæ pássio sanctórum Mártyrum Eustáchii et Theopístis uxóris, cum duóbus fíliis Agapíto et Theopísto, qui, sub Hadriáno Imperatóre, damnáti ad béstias, sed Dei ope ab iis nullátenus læsi, tandem, in bovem ǽneum candéntem inclúsi, martýrium consummárunt.
          Cýzici, in Propóntide, natális sanctórum Mártyrum Faustæ Vírginis, et Evilásii, sub Maximiáno Imperatóre; e quibus Fausta, ab eódem Evilásio, idolórum sacerdóte, decalváta et ad turpitúdinem rasa, suspénsa et torta est. Deínde, cum eam vellet médiam secáre, et carnífices lǽdere non valérent, stupens crédidit in Christum Evilásius; et, dum ipse quoque, Imperatóris iussu, fórtiter torquerétur, Fausta, cápite terebráta, clavis toto córpore confíxa et sartágini ignítæ impósita, tandem, cum eódem Evilásio, illam voce de cælis vocánte, transívit ad Dóminum.
          In Phrýgia sanctórum Mártyrum Dionýsii et Priváti.
          Item sancti Prisci Mártyris, qui, punctim pugiónibus transverberátus, cápite plexus est.
          Perge, in Pamphýlia, sanctórum Theodóri, et Philíppæ matris, ac Sociórum Mártyrum, sub Antoníno Imperatóre.
          Carthágine sanctæ Cándidæ, Vírginis et Mártyris; quæ, sub Maximiáno Imperatóre, plagis toto córpore dilaceráta, martýrio coronátur.
          Medioláni sancti Clicérii, Epíscopi et Confessóris.
          Romæ Translátio córporis sancti Agapíti Primi, Papæ et Confessóris, ex urbe Constantinópoli, in qua Póntifex décimo Kaléndas Maii obdormíerat in Dómino.
      en2:
      - type: text
        text: |-
          The Twenty-Second of September
      
          At Rome, the passion of the holy Martyrs Eustachius and his wife Theopistis, with their two sons Agapitus and Theopistus, who, under the Emperor Hadrian, were condemned to the beasts, yet by God's power were in no way harmed by them, and were finally enclosed in a brazen ox and completed their martyrdom.
          At Cyzicus, in Propontis, the birthday of the holy Martyrs Fausta, Virgin, and Evilasius, under the Emperor Maximian; of whom Fausta, by that same Evilasius, a priest of idols, was shaved and stripped, then suspended and tortured. Afterward, when he wished to cut her in two and the executioners were unable to harm her, the astonished Evilasius believed in Christ; and while he himself, by the Emperor's command, was being bravely tortured, Fausta, with her head bored through, nails driven throughout her body, and placed upon a burning gridiron, finally passed to the Lord together with Evilasius, a voice from heaven calling to her.
          In Phrygia, the holy Martyrs Dionysius and Privatus.
          Likewise, Saint Priscus, Martyr, who was pierced through with daggers and beheaded.
          At Perge, in Pamphylia, the holy Martyrs Theodore, and Philippa his mother, and their Companions, under the Emperor Antoninus.
          At Carthage, Saint Candida, Virgin and Martyr; who, under the Emperor Maximian, was lacerated with stripes over her whole body and crowned with martyrdom.
          At Milan, Saint Clicerius, Bishop and Confessor.
          At Rome, the Translation of the body of Saint Agapetus I, Pope and Confessor, from the city of Constantinople, where the Pontiff had fallen asleep in the Lord on the twenty-second of April.
  psalm.duod-cimo-kal-ndas-sept-mbris-9dfe7805ab:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Jeanne Frances Frémiot de Chantal, Foundress of the Order of Nuns of the Visitation of St Mary, at Annecy, in Savoy, of whom mention is made on the 13th day of December.
          Upon the same 21st day of August, were born into the better life:

          At Rome, in the Veran Field, [San Lorenzo, in the third century,] the holy widow and martyr Cyriaca. In the Valerian persecution she spent herself, and all that she had, in ministering to the saints, and at last suffered martyrdom for Christ, and so willingly spent her life itself.
          At Salona, [in the third century,] holy Anastasius, a petty officer in the army, who was converted to the faith by beholding the firmness with which the blessed martyr Agapitus bore all his torments, and who was slain by order of the Emperor Aurelian for confessing Christ's name, and so passed away as a martyr, to be ever with the Lord.
          In Sardinia, the holy martyrs Luxorius, Cisellus, and Camerinus, who were slain with the sword under the President Delphius, in the persecution under the Emperor Diocletian.
          In the Gevaudan country, the holy martyr Privatus, Bishop [of Mende,] who suffered in the persecution under the Emperors Valerian and Gallienus.
          On the same day, [in the year 363,] the holy martyrs Bonosus and Maximian, [officers of the Old Herculians, and the last victims of the Emperor Julian the Apostate.]
          At Fondi, in Latium, [under the Emperor Decius,] the holy martyr Paternus. He had come from Alexandria to Rome to visit the graves of the Apostles, and had gone from Rome to Fondi. He was arrested by a Tribune while he was burying the bodies of martyrs, and died in his chains.
          At Edessa, the holy Bassa and her sons Theogonius, Agapius, and Faithful, all martyrs. Their loving mother by her exhortations sent them, crowned before her, to receive their palms, in the persecution under the Emperor Maximian, and then was herself beheaded, and thus joyfully followed them in triumph.
          At Verona, the holy Confessor Euprepius, Bishop [of that see.]
          Likewise, the holy Bishop Quadratus.
          At Siena, in Tuscany, [in the year 1348,] the holy Abbot Bernard Tolomei, Founder of the Congregation of the Olivetans.
      la:
      - type: text
        text: |-
          Duodécimo Kaléndas Septémbris

          Sanctæ Ioánnæ-Francíscæ Frémiot de Chantal, Víduæ, quæ Ordinis Sanctimoniálium Visitatiónis sanctæ Maríæ fuit Institútrix, cuius natális dies Idibus Decémbris memorátur.
          Romæ, in agro Veráno, sanctæ Cyríacæ, Víduæ et Mártyris; quæ, in persecutióne Valeriáni cum se súaque ómnia in Sanctórum ministério impendísset, demum pro Christo martýrium súbiens, vitam quoque ipsam libénter impéndit.
          In território Gavalitáno sancti Priváti, Epíscopi et Mártyris; qui passus est in persecutióne Valeriáni et Galliéni.
          Salónæ, in Dalmátia, sancti Anastásii Corniculárii, qui, cum vidéret beátum Agapítum constánter torménta perferéntem, convérsus est ad fidem, et, pro confessióne nóminis Christi, iubénte Aureliáno Imperatóre, interémptus, Martyr migrávit ad Dóminum.
          In Sardínia natális sanctórum Mártyrum Luxórii, Cisélli et Cameríni; qui, in persecutióne Diocletiáni sub Délphio Prǽside gládio cæsi sunt.
          Eódem die sanctórum Mártyrum Bonósi et Maximiáni.
          Fundis, in Látio, sancti Patérni Martyris, qui ab Alexandría Romam venit ad Apostolórum memórias; et inde in agrum Fundánum secéssit, atque ibi, cum Mártyrum córpora sepelíret, a Tribúno comprehénsus est, et in vinculis expirávit.
          Edéssæ, in Sýria, sanctórum Mártyrum Bassæ, et filiórum, id est Thegónii, Agápii et Fidélis; quos, in persecutióne Maximiáni, pia mater exhórtans, martýrio coronátos præmísit ad palmam, et, truncáto cápite, gaudens secúta est cum victória.
          Verónæ sancti Euprépii, Epíscopi et Confessóris.
          Item sancti Quadráti Epíscopi.
          Arvérnis, in Gállia, sancti Sidónii Epíscopi, doctrína et sanctitáte conspícui.
          Senis in Túscia beáti Bernárdi Ptolomǽi Abbátis, Congregatiónis Olivetánæ Fundatóris.
      en2:
      - type: text
        text: |-
          The Twenty-Second of August
      
          Saint Jane Frances Frémiot de Chantal, Widow, who was the Foundress of the Order of the Nuns of the Visitation of Holy Mary, whose birthday is commemorated on the thirteenth of December.
          At Rome, in the Verano district, Saint Cyriaca, Widow and Martyr; who, in the persecution of Valerian, having spent herself and all her possessions in the service of the Saints, at last underwent martyrdom for Christ and willingly gave up her very life.
          In the territory of Javols, Saint Privatus, Bishop and Martyr; who suffered in the persecution of Valerian and Gallienus.
          At Salona, in Dalmatia, Saint Anastasius the Cornicularius, who, seeing the blessed Agapitus steadfastly enduring torments, was converted to the faith, and, for his confession of the name of Christ, by order of the Emperor Aurelian was put to death and passed as a Martyr to the Lord.
          In Sardinia, the birthday of the holy Martyrs Luxorius, Cisellus, and Camerinus; who, in the persecution of Diocletian under the Governor Delphius, were slain with the sword.
          On the same day, the holy Martyrs Honoratus and Maximian.
          At Fondi, in Latium, Saint Paternus, Martyr, who came from Alexandria to Rome to venerate the memorials of the Apostles; and thence withdrew to the countryside of Fondi, where, while he was burying the bodies of Martyrs, he was seized by a Tribune and died in chains.
          At Edessa, in Syria, the holy Martyrs Bassa and her sons, namely Theogonius, Agapius, and Fidelius; whom their devout mother encouraged and sent before her to the palm, crowned with martyrdom in the persecution of Maximian, and she joyfully followed them, her head severed, in victory.
          At Verona, Saint Euprepes, Bishop and Confessor.
          Likewise, Saint Quadratus, Bishop.
          At Clermont, in Gaul, Saint Sidonius, Bishop, distinguished for learning and holiness.
          At Siena, in Tuscany, the blessed Bernard Tolomei, Abbot, Founder of the Olivetan Congregation.
  psalm.duodecimo-kalendas-aprilis-adb1aa2af1:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of March, were born to the better life:

          At Monte Cassino, the holy Abbot Benedict, who restored Monasticism in the West, when it was almost fallen away, and wonderfully spread it [, in the year 543]. Blessed Pope Gregory hath written his life, which was rendered glorious by his graces and miracles.
          At Alexandria, are commemorated those holy martyrs who were massacred when the Arians and Gentiles broke into the churches on Good Friday, under the Emperor Constantius and the Prefect Philagrius.
          On the same day, [in the end of fourth century,] the holy martyrs Philemon and Domninus.
          At Catanae holy Birillus, who was ordained Bishop of that see by the blessed Apostle Peter, and after he had converted many Gentiles to the faith fell asleep in peace in extreme old age.
          At Alexandria, the blessed Hermit Serapion, Bishop of Thmuis, a man of great power, who was driven into exile by the rage of the Arians, and there passed away to be ever with the Lord.
          In the country of Lyon, holy Lupicinus, Abbot [of Laucorme, in the Jura,] whose life was made illustrious by the fame of his holiness and miracles [, in the year 480].
      la:
      - type: text
        text: |-
          Duodecimo Kalendas Aprilis

          In monte Cassíno natális sancti Benedicti Abbátis, qui in Occidénte fere collapsam Monachórum disciplínam restituit ac mirifice propagávit; cuius vitam, virtútibus et miraculis gloriosam, beátus Gregórius Papa conscripsit.
          Cátanæ, in Sicília, sancti Birilli, qui, a beato Petro ordinátus Epíscopus, ibidem, cum multos Gentílium convertísset ad fidem, in ultima senectute quievit in pace.
          Alexandríæ commemorátio sanctórum Mártyrum, qui, sub Constantio Imperatóre et Præfecto Philagrio, irruéntibus Ariánis et Gentilibus in Ecclésias, in die Parascéves cæsi sunt.
          Eodem die sanctórum Mártyrum Philémonis et Domníni.
          Alexandríæ beáti Serapiónis, Anachoretæ et Epíscopi Thmúeos, magnárum virtútum viri; qui, Arianórum furóre in exsílium actus, Conféssor migrávit ad Dóminum.
          In território Lugdunénsi sancti Lupicini Abbátis, cuius vita ob sanctitátis et miraculórum glóriam fuit illústris.
          In loco Ranft, prope Sachseln, in Helvetia, sancti Nicolai de Flüe, patris familias, dein Anachoretæ, arctíssima pæniténtia et mundi contemptu insignis, ab Helvetiis pater patriæ appellati, quem Pius Papa Duodecimus Sanctórum fastis adscripsit.
      en2:
      - type: text
        text: |-
          The Twenty-First of March
      
          On Monte Cassino, the birthday of Saint Benedict, Abbot, who in the West restored the nearly collapsed discipline of monks and spread it wonderfully; whose life, glorious with virtues and miracles, the blessed Pope Gregory wrote.
          At Catania, in Sicily, Saint Birillus, who, ordained Bishop by the blessed Peter, and having converted many of the pagans to the faith there, rested in peace in extreme old age.
          At Alexandria, a commemoration of the holy Martyrs who, under the Emperor Constantius and the Prefect Philagrius, with Arians and pagans rushing into the churches on Good Friday, were slain.
          On the same day, the holy Martyrs Philemon and Domnius.
          At Alexandria, the blessed Serapion, Anchorite and Bishop of Tmuis, a man of great virtues; who, driven into exile by the fury of the Arians, passed to the Lord as a Confessor.
          In the territory of Lyons, Saint Lupicinus, Abbot, whose life was illustrious for holiness and the glory of miracles.
          At the place of Ranft, near Sachseln, in Switzerland, Saint Nicholas of Flüe, father of a family and later Anchorite, distinguished for most austere penance and contempt of the world, called the Father of his Country by the Swiss, whom Pope Pius XII enrolled in the register of the Saints.
  psalm.idibus-apr-lis-2948d84cb5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 13th day of April, were born into the better life:

          At Seville, in Spain, the holy martyr Hermenegild, son of Leovigild, the Arian king of the Visigoths. His misbelieving father had cast him into prison on account of his confession of the Catholic Faith, and when upon the solemn night of Easter he refused to receive Easter Communion from the Arian Bishop he caused him to be smitten with the axe, and so did this king as a martyr exchange a kingdom on earth for the kingdom of heaven, [in the year 586.]
          At Pergamos, in Asia, the holy martyrs Carpus, Bishop of Thyatira, the Deacon Papylus, the excellent lady Agathonica his sister, their servant Agathodorus, and many others, who were diversely tormented, and crowned with martyrdom after blessed confessions, in the persecution under the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus. [More likely under Decius in the year 251.]
          In the same persecution there suffered at Rome the holy martyr Justin, the admirable philosopher. He had presented to the emperors aforenamed his second book in defence of our religion, and was then earnestly spreading the same by his disputations when he was accused of Christianity through the devices of Crescens the Cynic, whose infamous life and manners he had rebuked, and for a reward of his faithful speaking he received the crown of martyrdom, [in the year 167.] We keep his feast upon the 14th day of this present month.
          Upon the same day, in the persecution under the Emperor Diocletian, the holy martyrs Maximus, Quintilian, and Dadas, [at Dorostis, in Bulgaria.]
          At Ravenna, the holy Confessor Ursus, Bishop of that see, [in the year 396.]
      la:
      - type: text
        text: |-
          Idibus Aprílis

          Híspali, in Hispánia, sancti Hermenegíldi Mártyris, qui fuit fílius Leovigíldi, Regis Visigothórum Ariáni; atque ob cathólicæ fídei confessiónem coniéctus in cárcerem, et, cum in solemnitáte Pascháli Communiónem ab Epíscopo Ariáno accípere noluísset, pérfidi patris iussu secúri percússus est, ac regnum cæléste pro terréno Rex et Martyr intrávit.
          Romæ, in persecutióne Marci Antoníni Veri et Lúcii Aurélii Cómmodi, pássio sancti Iustíni, Philósophi et Mártyris; qui, cum secúndum librum pro religiónis nostræ defensióne præfátis Imperatóribus porrexísset, eámque ibídem disputándo strénue propugnásset, Crescéntis Cýnici, cuius vitam et mores nefários redargúerat, insídiis accusátus quod Christiánus esset, remuneratiónem linguæ fidélis, martýrii munus accépit. Ipsíus tamen festum sequénti die recólitur.
          Pérgami, in Asia, in eádem persecutióne, natális sanctórum Mártyrum Carpi, Thyatirénsis Epíscopi; Pápyli Diáconi, et Agathonícæ, eiúsdem Pápyli soróris et óptimæ féminæ, atque Agathodóri, eórum fámuli, aliorúmque multórum. Hi omnes, post vários cruciátus, pro beátis confessiónibus martýrio coronáti sunt.
          Doróstori, in Mýsia inferióre, pássio sanctórum Máximi, Quinctiliáni et Dadæ, in persecutióne Diocletiáni.
          Ravénnæ sancti Ursi, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Thirteenth of April
      
          At Seville, in Spain, Saint Hermenegild, Martyr, who was the son of Leovigild, King of the Visigothic Arians; and for his confession of the catholic faith was cast into prison, and, when he refused on Easter to receive Communion from an Arian Bishop, was struck with the axe by command of his treacherous father, and as a King and Martyr entered the heavenly kingdom in place of the earthly.
          At Rome, in the persecution of Marcus Antoninus Verus and Lucius Aurelius Commodus, the passion of Saint Justin, Philosopher and Martyr; who, having presented to those same Emperors a second book in defense of our religion, and having there vigorously defended it in debate, was accused on the instigation of the Cynic Crescens — whose corrupt life and infamous conduct he had rebuked — of being a Christian, and received, as the reward of his faithful tongue, the gift of martyrdom. His feast, however, is celebrated on the following day.
          At Pergamon, in Asia, in the same persecution, the birthday of the holy Martyrs Carpus, Bishop of Thyatira; Papylus, Deacon; and Agathonica, sister of that same Papylus and a most excellent woman; and Agathodorus, their servant, and many others. All of these, after various torments, were crowned with martyrdom for their blessed confessions.
          At Dorostorum, in Lower Moesia, the passion of the holy Martyrs Maximus, Quinctilian, and Dadas, in the persecution of Diocletian.
          At Ravenna, Saint Ursus, Bishop and Confessor.
  psalm.idibus-aug-sti-145f244f35:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 13th day of August, were born into the better life:

          At Rome, [in the year 258,] the blessed martyr Hippolytus. Such was the glory of his confession, under the Emperor Valerian, that after other torments his feet were tied to the necks of unbroken horses, and he was thus cruelly dragged through thistles and thorns until his whole body was torn and he gave up the ghost.
          Upon the same day there suffered his nurse, the blessed Concordia, who was beaten to death with scourges loaded with lead, and passed away.
          At Imola, [in the fourth century,] the holy martyr Cassian. When he refused to worship idols the persecutors called for the boys to whom he had become hateful while teaching them, and gave them permission to kill him, and the weaker their hands were the greater were his sufferings through the delay of death.
          At Todi, [in Umbria,] under the Emperor Diocletian, the holy martyr Cassian, Bishop [of that see.]
          At Burgos, in Spain, the holy martyrs Centolla and Helen.
          At Constantinople, [in the year 662,] the holy monk Maximus, famous for his teaching and zeal for Catholic truth. He vigorously contended against the Monothelites, and the heretical Emperor Constans cut away his hands and tongue, and banished him to the Crimea, where he gave up the ghost. At the same time the two Anastasii, his disciples, and many others, suffered diverse torments and were sent into hard banishments.
          In Germany, [in the year 747,] the holy Confessor Wigbert the Priest.
          At Poitiers, [in the year 587,] the holy Queen Radegundis, whose life was famous for miracles and graces.
          At Rome, [in the year 1621,] holy John Berchmans, a scholastic of the Society of Jesus, illustrious for the innocency of his life and his observance of the discipline of his Institute, to whom the supreme Pontiff Leo XIII decreed the honours paid to the Saints in heaven.
      la:
      - type: text
        text: |-
          Idibus Augústi

          Romæ beáti Hippólyti Mártyris, qui pro confessiónis glória, sub Valeriáno Imperatóre, post ália torménta, ligátis pédibus ad colla indomitórum equórum, per carduétum et tríbulos crudéliter tractus est, ac, toto córpore laceráto, emísit spíritum. Passi sunt étiam eódem die beáta Concórdia, eius nutrix, quæ ante ipsum, plumbátis cæsa, migrávit ad Dóminum; et álii decem et novem de domo sua, qui extra portam Tiburtínam decolláti sunt, et, una cum ipso, in agro Veráno sepúlti.
          Apud Forum Syllæ natális sancti Cassiáni Mártyris, qui cum adoráre idóla noluísset, ídeo, vocátis a persecutóre púeris, quibus exósus docéndo factus fúerat, data est eis facúltas eum periméndi; quorum quanto infírmior erat manus, tanto graviórem martýrii pœnam, diláta morte, faciébat.
          Tudérti, in Umbria, sancti Cassiáni, Epíscopi et Mártyris, sub Diocletiáno Imperatóre.
          Burgis, in Hispánia, sanctárum Centóllæ et Hélenæ Mártyrum.
          Constantinópoli sancti Máximi Abbátis, doctrína et cathólicæ veritátis zelo insígnis; qui, cum advérsus Monothelítas strénue decertáret, ab hærético Imperatóre Constánte, præcísis mánibus ac lingua, in Chersonésum relegátus est, ibíque, glória confessiónis clarus, spíritum Deo réddidit. Tunc étiam duo Anastásii, qui eius erant discípuli, aliíque plures divérsa torménta et dura exsília sunt expérti.
          Fritesláriæ, in Germánia, sancti Wigbérti, Presbýteri et Confessóris.
          Romæ natális sancti Ioánnis Berchmans, scholástici e Societáte Iesu et Confessóris, vitæ innocéntia et religiósæ disciplínæ custódia præclári; cui Leo Décimus tértius, Póntifex Máximus, cǽlitum Sanctórum honóres decrévit.
          Pictávis, in Gállia, sanctæ Radegúndis Regínæ, cuius vita miráculis et virtútibus cláruit.
      en2:
      - type: text
        text: |-
          The Thirteenth of August
      
          At Rome, the blessed Hippolytus, Martyr, who, for the glory of his confession, under the Emperor Valerian, after other torments, had his feet bound to the necks of unbroken horses, was dragged cruelly through thistles and thorns, and, with his whole body torn apart, gave up his spirit. On that same day also suffered the blessed Concordia, his nurse, who was beaten with leaden weights before him and passed to the Lord; and nineteen others of his household, who were beheaded outside the Tiburtine gate and buried, together with him, in the Verano district.
          Near Forum Syllae, the birthday of Saint Cassianus, Martyr, who, refusing to worship idols, had the boys he had taught — and to whom he had become hateful through his teaching — summoned by the persecutor and given the means to kill him; and the weaker their hands, the more grievous was the pain of his martyrdom, death being prolonged.
          At Todi, in Umbria, Saint Cassianus, Bishop and Martyr, under the Emperor Diocletian.
          At Burgos, in Spain, the holy Martyrs Centolla and Helena.
          At Constantinople, Saint Maximus, Abbot, distinguished for learning and zeal for catholic truth; who, while strenuously fighting against the Monothelites, had his hands and tongue cut off by the heretical Emperor Constans and was exiled to Chersonesus, where, illustrious in the glory of confession, he gave up his spirit to God. At that time also the two Anastasii, who were his disciples, and many others endured various torments and harsh exiles.
          At Fritzlar, in Germany, Saint Wigbert, Priest and Confessor.
          At Rome, the birthday of Saint John Berchmans, scholastic of the Society of Jesus and Confessor, distinguished for the innocence of his life and observance of religious discipline; upon whom Pope Leo XIII bestowed the honors of the Saints in heaven.
          At Poitiers, in Gaul, Saint Radegundis, Queen, whose life was renowned for miracles and virtues.
  psalm.idibus-dec-mbris-4126818f7a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 13th day of December, were born into the better life:

          At Syracuse, in Sicily, in the persecution under the Emperor Diocletian, the holy Virgin and martyr Lucy. By command of Paschasius the Consular she was handed over to panders to make a public mock of her chastity, but when they would have led her away they could not move her even with ropes, and not even when these were drawn by many yoke of oxen then they poured upon her boiling pitch, rosin, and oil but these did not hurt her, and at length she was smitten in the neck with a sword, and so finished her testimony, (in the year 303.)
          In Armenia, in the same persecution under the Emperor Diocletian, the holy martyrs Eustratius, Auxentius, Eugenius, Mardarius, and Orestes. Eustratius was first put to dreadful torments under Lysias, and afterwards to the like at Sebaste, along with Orestes, under the President Agricolaus, and was then cast into a furnace, wherein he gave up the ghost. Orestes was laid upon an iron bed heated with fire, and so passed away to be ever with the Lord. The others finished their testimony in diverse ways in the country of the Arabraci, after enduring most cruel sufferings under the President Lysias. Their bodies were afterwards brought to Rome and honourably buried in the church of St. Apollinaris.
          In the island of Sulcis, off the coast of Sardinia, (in the second century,) under the Emperor Hadrian, the holy martyr Antiochus.
          At Cambrai, in Gaul, the holy Confessor Aubert, Bishop (of that see, and of Arras. He was consecrated on March 21, 633, and died in the year 669.)
          At Ponthieu, (in Gaul, in the year 669,) the holy Confessor Josse, (King of Brittany and hermit at Ponthieu.)
          In the country of Strasbourg, (in the eighth century,) the holy Virgin Othilia. (First Abbess of Hohenburg, of the order of St Benedict, she was daughter of a Duke of Alsace.)
          At Moulins, in Gaul, the holy widow Jeane Frances Fremiot de Chantal, (1572-1641,) foundress of the Congregation of Nuns of the Visitation of St. Mary. She was eminent by her noble birth, by the holiness of her life, which she sanctified unceasingly in the four different states of maiden, wife, widow, and nun, and by the grace of working miracles, and Clement XIII enrolled her name among those of the Saints. Her sacred body was translated to Annecy, in Savoy, and there entombed with solemn pomp in the first church of their order. Clement XIV ordered her feast to be kept by the Universal Church upon the 21st day of August.
      la:
      - type: text
        text: |-
          Idibus Decémbris

          Syracúsis, in Sicília, natális sanctæ Lúciæ, Vírginis et Mártyris, in persecutióne Diocletiáni. Hæc nóbilis Virgo, cum eam lenónes, quibus, iubénte Paschásio Consulári, trádita erat ut a pópulo castitáti eius illuderétur, dúcere vellent, nullátenus per illos movéri pótuit, nec fúnibus ádditis, nec boum iugis plúrimis; deínde vero, picem, resínam ac fervens óleum nil læsa súperans, tandem, gládio in gútture percússa, martýrium consummávit.
          Molíni, in Gállia, item natális sanctæ Ioánnæ-Francíscæ Frémiot de Chantal Víduæ, quæ Ordinis Sanctimoniálium Visitatiónis sanctæ Maríæ fuit Institútrix; ac, nobilitáte géneris, vitæ sanctimónia, quam in quadrúplici statu constánter duxit, et miraculórum dono illústris, a Cleménte Décimo tértio, Pontífice Máximo, in Sanctárum númerum reláta est. Sacrum eius corpus Annésium, in Sabáudia, translátum fuit, et solémni pompa in prima sui Ordinis Ecclésia tumulátum. Ipsíus autem festum duodécimo Kaléndas Septémbris ab univérsa Ecclésia Clemens Papa Décimus quartus celebrári mandávit.
          In Arménia pássio sanctórum Mártyrum Eustrátii, Auxéntii, Eugénii, Mardárii et Oréstis, in persecutióne Diocletiáni. Ex ipsis Eustrátius, primum sub Lýsia, deínde Sebáste, sub Agricoláo Prǽside, una cum Oréste exquisítis torméntis cruciátus, in fornácem missus réddidit spíritum; Oréstes autem, in stratum férreum ignítum pósitus, migrávit ad Dóminum; céteri apud Arábracos, sævíssimis agitáti supplíciis, sub Lýsia Prǽside, diversímode martýrium consummárunt. Eórum córpora, póstea Romam transláta, in Ecclésia sancti Apollináris honorífice collocáta sunt.
          In Sulcitána ínsula, apud Sardíniam, pássio sancti Antíochi, sub Hadriáno Imperatóre.
          Cameráci, in Gállia, sancti Authbérti, Epíscopi et Confessóris.
          In pago Pontívo, in Gállia, sancti Iudóci, Presbýteri et Confessóris.
          In território Argentoraténsi sanctæ Othíliæ Vírginis.
      en2:
      - type: text
        text: |-
          The Thirteenth of December
      
          At Syracuse, in Sicily, the birthday of Saint Lucy, Virgin and Martyr, in the persecution of Diocletian. This noble Virgin, when the pimps to whom she had been handed over by order of the Consul Paschasius so that the people might mock her chastity wished to take her away, could in no way be moved by them, even with ropes attached and many teams of oxen; then, suffering no harm from pitch, resin, and boiling oil poured over her, she was at last struck with the sword in the throat and completed her martyrdom.
          At Moulins, in Gaul, likewise the birthday of Saint Jane Frances Frémiot de Chantal, Widow, who was the Foundress of the Order of the Nuns of the Visitation of Holy Mary; distinguished by nobility of birth, the holiness of life which she constantly led in four states of life, and the gift of miracles, she was included in the number of the Saints by Pope Clement XIII. Her sacred body was translated to Annecy, in Savoy, and solemnly entombed in the first church of her Order. Her feast was appointed by Pope Clement XIV to be celebrated by the whole Church on the twenty-first of August.
          In Armenia, the passion of the holy Martyrs Eustratius, Auxentius, Eugenius, Mardarius, and Orestes, in the persecution of Diocletian. Of these, Eustratius, first under Lysias, then at Sebaste under the Governor Agricolaus, was tortured with Orestes by exquisite torments and cast into a furnace and gave up his spirit; Orestes was placed upon a burning iron bed and passed to the Lord; the rest, at Arabraca, tormented by most cruel punishments under the Governor Lysias, completed their martyrdom in various ways. Their bodies, later translated to Rome, were placed with honor in the church of Saint Apollinaris.
          In the island of Sulcis, near Sardinia, the passion of Saint Antiochus, under the Emperor Hadrian.
          At Cambrai, in Gaul, Saint Autbert, Bishop and Confessor.
          In the district of Ponthieu, in Gaul, Saint Judocus, Priest and Confessor.
          In the territory of Strasbourg, Saint Odilia, Virgin.
  psalm.idibus-febru-rii-ecf8a7a7a6:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the same 13th day of February, were born into the better life:

          At Antioch, the holy prophet Agabus, [first century,] of whom blessed Luke writeth in the Acts of the Apostles.
          At Ravenna, the holy women the Virgin Fusca, and Maura her fostermother, who after suffering many things under the President Quinctian, by order of the Emperor Decius were run through with the sword, and so finished their testimony, [third century.]
          At Melitina, in Armenia, the holy martyr Polyeuctus, who suffered many things in the persecution under the Emperor Decius, and received the crown of martyrdom, [in the year 259.]
          At Lyon, the holy martyr Julian.
          At Todi, [under Diocletian,] the holy martyr Benignus.
          At Rome, [in the year 731,] the holy Pope Gregory II, who sharply withstood the ungodliness of the Emperor Leo the Isaurian, and who sent holy Boniface into Germany to preach the Gospel there.
          At Angers, holy Lucinius, Bishop of that city, a man of reverend holiness.
          At Lyon, [about the year 512,] the holy Confessor Stephen, Bishop of that see.
          At Riete, [sixth century,] the holy Abbot Stephen, a man of wonderful patience, at whose passing away the presence of the holy angels, as is stated by blessed Pope Gregory, was visible.
          At Prati, in Tuscany, Catherine de Ricci, a Virgin of Florence, of the Order of Preachers, illustrious in the number of her heavenly gifts, whom Pope Benedict XIV added to the roll of Holy Virgins. She died full of graces and merit on the 2nd of February, but her Feast is celebrated today.
      la:
      - type: text
        text: |-
          Idibus Februárii

          Antiochíæ natális sancti Agábi Prophétæ, de quo beátus Lucas in Actibus Apostólicis scribit.
          Tudérti, in Umbria, sancti Benígni, Presbýteri et Mártyris; qui, Diocletiáni et Maximiáni Imperatórum témpore, cum fidem Christiánam verbo et exémplo propagáre non desísteret, ab idolórum cultóribus captus est, ac, váriis afféctus supplíciis, sacerdotále munus honóre martýrii cumulávit.
          Melitínæ, in Arménia, sancti Polyeúcti Mártyris, qui, in persecutióne Décii, multa passus, martýrii corónam adéptus est.
          Lugdúni, in Gállia, sancti Iuliáni Mártyris.
          Ravénnæ sanctárum Fuscæ Vírginis, eiúsque nutrícis Mauræ, quæ, Décio imperánte, multa sub Quinctiáno Prǽside perpéssæ, demum gládio transfíxæ, martýrium consummárunt.
          Lugdúni, in Gállia, sancti Stéphani, Epíscopi et Confessóris.
          Reáte sancti Stéphani Abbátis, miræ patiéntiæ viri; in cuius tránsitu (ut refert beátus Gregórius Papa) sancti Angeli, céteris étiam vidéntibus, adfuérunt.
      en2:
      - type: text
        text: |-
          The Thirteenth of February
      
          At Antioch, the birthday of the holy Prophet Agabus, of whom the blessed Luke writes in the Acts of the Apostles.
          At Todi, in Umbria, Saint Benignus, Priest and Martyr; who, in the time of the Emperors Diocletian and Maximian, not ceasing to propagate the Christian faith by word and example, was seized by the worshippers of idols, and, afflicted with various punishments, crowned the priestly office with the honor of martyrdom.
          At Melitene, in Armenia, Saint Polyeuctus, Martyr, who, in the persecution of Decius, suffered greatly and attained the crown of martyrdom.
          At Lyons, in Gaul, Saint Julian, Martyr.
          At Ravenna, the holy Fusca, Virgin, and her nurse Maura, who, under the Emperor Decius, having suffered greatly under the Governor Quinctianus, were at last pierced through with the sword and completed their martyrdom.
          At Lyons, in Gaul, Saint Stephen, Bishop and Confessor.
          At Rieti, Saint Stephen, Abbot, a man of admirable patience; at whose passing (as the blessed Pope Gregory relates) the holy Angels were present, seen also by the others.
  psalm.idibus-i-lii-e05f7b9307:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Swithun, Bishop of Winchester, of whom mention is made upon the 2nd day of this present month of July.
          Upon the same 15 th day of July, were born into the better life:

          At Bamberg, the holy Emperor Henry II. He and his wife Cunegunda preserved perpetual virginity. He brought holy Stephen, king of Hungary, and nearly all his realm, to believe in Christ, [972-1029.] We keep feast in his honour upon the 21st day of this present month of July.
          At Porto, in Italy, the holy martyrs Eutropius and the sisters Zosima and Bonosa.
          At Carthage, the blessed Deacon Catulinus, in praise of whom holy Augustine preached a sermon to the people, and the holy martyrs Januarius, Florence, Julia, and Justa, who were buried in the Basilica of Faustus.
          At Alexandria, the holy martyrs Philip, Zeno, Narseus, and ten little children.
          In the island of Tenedos, the holy martyr Abudemius, who suffered under Diocletian.
          At Sebaste, the holy physician Antiochus, who was beheaded under the President Hadrian. Milk ran out of his body instead of blood, whereby Cyriacus the headsman was turned to Christ, and himself suffered martyrdom.
          At Pavia, the holy martyr Felix, Bishop [of that see, in the year 243.]
          At Nisibis, holy James, Bishop of that city, a man of great holiness, and famous for his wonders and his learning. He was one of the Confessors in the persecution under the Emperor Galerius Maximian. At the Council of Nicea, [in the year 325,] he condemned the perversity of Arius in opposing the definition that our Lord Christ is homousius that is, of one Being with the Father, and it was at the prayers of this James, and of Alexander Archbishop of Constantinople, that the same Arius received the due reward of his iniquity at Constantinople, when his bowels gushed out.
          At Naples, in Campania, holy Athanasius, Bishop of that city, who suffered much from his ungodly nephew Sergius, and was thrust out of his see.
          In the time of King Charles the Bald, [in the year 872,] he passed away from earth to heaven, worn out with sorrow, at Veroli.
          At Palermo is commemorated the finding of the body of the holy Virgin Rosalie of that city. It was found by revelation from God, in the year of the jubilee, under the Supreme Pontiff Urban VIII, and Sicily was freed from the plague. [She was of the family of Charlemagne, and was born at Palermo in 1130 and died in 1160. Her body was found in 1625, when the exposition of it caused the plague to cease at Palermo.]
      la:
      - type: text
        text: |-
          Idibus Iúlii

          Sancti Henríci Primi, Imperatóris Romanórum et Confessóris, cuius dies natális tértio Idus mensis huius recensétur.
          Lugdúni, in Gállia, deposítio sancti Bonaventúræ, Cardinális et Epíscopi Albanénsis, Confessóris et Ecclésiæ Doctóris, ex Ordine Minórum, doctrína et vitæ sanctitáte celebérrimi. Ipsíus tamen festívitas prídie huius diéi recólitur.
          Pápiæ sancti Felícis, Epíscopi et Mártyris.
          In Portu Románo natális sanctórum Mártyrum Eutrópii, atque Zósimæ et Bonósæ sorórum.
          Carthágine beáti Catulíni Diáconi, de cuius láudibus sanctus Augustínus sermónem ad pópulum hábuit, et sanctórum Ianuárii, Floréntii, Iúliæ et Iustæ Mártyrum; qui pósiti sunt in Basílica Fausti.
          Alexandríæ sanctórum Mártyrum Philíppi, Zenónis, Narséi et decem infántum.
          In ínsula Ténedo sancti Abudémii Mártyris, qui sub Diocletiáno passus est.
          Sebáste, in Arménia, sancti Antíochi médici, qui, sub Hadriáno Prǽside, cápite obtruncátus est; cumque ex eo lac pro sánguine manáret, Cyriácus cárnifex, convérsus ad Christum, et ipse martýrium súbiit.
          Nísibi, in Mesopotámia, natális sancti Iacóbi, eiúsdem urbis Epíscopi, magnæ sanctitátis viri. Hic, miráculis et eruditióne clarus, unus fuit, sub persecutióne Galérii Maximiáni, ex número Confessórum, qui in Nicǽna deínde Sýnodo perversitátem Aríi, Homoúsii oppositióne, damnárunt; cuius et sancti Alexándri Epíscopi oratióne ipse Aríus condígnam suæ iniquitátis mercedem, effúsis viscéribus, Constantinópoli recépit.
          Neápoli, in Campánia, sancti Athanásii, eiúsdem civitátis Epíscopi, qui, ab ímpio nepóte Sérgio multa passus ac sede pulsus, tandem Vérulis, in Hérnicis, conféctus ærúmnis, migrávit in cælum, témpore Cároli Calvi.
          Campi Salentinórum, in Apúlia, sancti Pompílii Maríæ Pirrótti, Confessóris, ex Ordine Clericórum Páuperum Matris Dei Scholárum Piárum, vita apostólica præclári, a Pio Undécimo, Pontífice Máximo, inter Sanctos reláti.
          Panórmi Invéntio córporis sanctæ Rosáliæ, Vírginis Panormitánæ; quod, Urbáno Octávo Pontífice Máximo, repértum divínitus, Iubilǽi anno Sicíliam a peste liberávit.
      en2:
      - type: text
        text: |-
          The Fifteenth of July
      
          Saint Henry I, Emperor of the Romans and Confessor, whose birthday is observed on the thirteenth of this month.
          At Lyons, in Gaul, the deposition of Saint Bonaventure, Cardinal and Bishop of Albano, Confessor and Doctor of the Church, of the Order of Minors, most celebrated for learning and holiness of life. His feast, however, is observed on the day before.
          At Pavia, Saint Felix, Bishop and Martyr.
          At the Port of Rome, the birthday of the holy Martyrs Eutropius, and the sisters Zosima and Bonosa.
          At Carthage, the blessed Deacon Catulinus, about whose praises Saint Augustine preached a sermon to the people, and the holy Martyrs January, Florentius, Julia, and Justa; who were laid to rest in the Basilica of Faustus.
          At Alexandria, the holy Martyrs Philip, Zeno, Narseus, and ten infants.
          On the island of Tenedos, Saint Abudemus, Martyr, who suffered under Diocletian.
          At Sebaste, in Armenia, Saint Antiochus the physician, who was beheaded by the Governor Hadrian; and when milk flowed from him instead of blood, Cyriacus the executioner, converted to Christ, likewise underwent martyrdom.
          At Nisibis, in Mesopotamia, the birthday of Saint Jacob, Bishop of that city, a man of great holiness. Distinguished for miracles and learning, he was one of the Confessors under the persecution of Galerius Maximian who, at the Council of Nicaea, condemned the perversity of Arius by the affirmation of consubstantiality; and at the prayer of him and of the holy Bishop Alexander, Arius himself received at Constantinople the fitting reward of his iniquity, his bowels having poured out.
          At Naples, in Campania, Saint Athanasius, Bishop of that city, who, having suffered greatly at the hands of his wicked nephew Sergius and been driven from his see, at last died worn out by hardships at Veroli, among the Hernicans, in the time of Charles the Bald.
          At Campi Salentina, in Apulia, Saint Pompilio Maria Pirrotti, Confessor, of the Order of the Poor Clerics of the Mother of God of the Pious Schools, renowned for apostolic life, enrolled among the Saints by Pope Pius XI.
          At Palermo, the Finding of the body of Saint Rosalia, Virgin of Palermo; which, divinely discovered in the year of Jubilee under Pope Urban VIII, delivered Sicily from the plague.
  psalm.idibus-i-nii-70df4e44c8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 13th day of June, were born into the better life:

          At Padua, the holy Confessor Anthony of Portugal, of the Order of Friars Minor, famous for his life, miracles, and preaching.
          At Rome, upon the Ardeatine Way, the holy Virgin martyr Felicula. She would not marry Flaccus nor sacrifice to idols, and was therefore handed over to a certain judge who, forasmuch as she remained steadfast in confessing Christ, starved her in the dark, then had her racked until she died, and thereafter threw her body into a sewer. The holy Nicomedes buried her beside the same Way.
          In Africa, the holy martyrs Fortunatus and Lucian.
          At Byblos, in Palestine, the holy Virgin martyr Aquilina, aged twelve years. In the persecution under the Emperor Diocletian and the judge Valusian, she was buffeted and beaten for her confession of the faith, and stabbed with heated awls, and lastly smitten with the sword, and so hallowed maidenhood by martyrdom.
          In the Abruzzi, the holy martyr Peregrine, Bishop [of Amiternum,] who for the Catholic faith's sake was drowned by the Lombards in the river Aterno.
          At Cordova, the holy monk and priest Fandilas, who [in the year 853] suffered martyrdom for Christ's sake by being beheaded in the persecution by the Arabs.
          In Cyprus, [in the fourth century,] holy Triphyllius, Bishop [of Nicosia.]
      la:
      - type: text
        text: |-
          Idibus Iúnii

          Patávii sancti Antónii Lusitáni, Sacerdótis ex Ordine Minórum et Confessóris, atque Ecclésiæ Doctóris, vita, et miráculis, ac prædicatióne illústris, quem, uno post illíus óbitum anno nondum expléto, Gregórius Papa Nonus in Sanctórum cánonem rétulit.
          Romæ, via Ardeatína, natális sanctæ Felículæ, Vírginis et Mártyris; quæ, nec Flacco núbere neque idólis immoláre volens, trádita est cuídam Iúdici, qui eam in confessióne Christi perseverántem, post tenebricósam custódiam et famis inédiam, támdiu fecit in equúleo torquéri, donec illa emítteret spíritum, et sic demum depóni et in cloácam præcipitári. Ipsíus vero corpus, inde extráctum, sanctus Nicomédes Présbyter eádem via sepelívit.
          In Pelígnis sancti Peregríni, Epíscopi et Mártyris, qui, pro fide cathólica, a Longobárdis in Atérnum flumen demérsus est.
          Córdubæ, in Hispánia, sancti Fándilæ, Presbýteri et Mónachi; qui, in persecutióne Arábica, amputáto cápite, pro Christi fide martýrium súbiit.
          In Africa sanctórum Mártyrum Fortunáti et Luciáni.
          Bybli, in Phœnícia, sanctæ Aquilínæ, Vírginis et Mártyris, quæ, annos duódecim nata, sub Diocletiáno Imperatóre et Volusiáno Iúdice, ob fídei confessiónem cólaphis et verbéribus cæsa, et súbulis candéntibus perforáta, demum, percússa gládio, virginitátem martýrio consecrávit.
          In Cypro sancti Triphýlii Epíscopi.
      en2:
      - type: text
        text: |-
          The Thirteenth of June
      
          At Padua, Saint Anthony of Lisbon, Priest of the Order of Minors and Confessor, and Doctor of the Church, illustrious for his life, miracles, and preaching, whom Pope Gregory IX enrolled in the canon of the Saints less than a year after his death.
          At Rome, on the Ardeatine Way, the birthday of Saint Feliculas, Virgin and Martyr; who, refusing to marry Flaccus or to sacrifice to idols, was handed over to a certain judge, who, as she persevered in the confession of Christ through dark custody and the torment of starvation, had her racked on the horse for so long that she gave up her spirit, and then finally cast down into a sewer. Her body, extracted from there, was buried on that same road by the holy Presbyter Nicodemus.
          Among the Paelignians, Saint Peregrinus, Bishop and Martyr, who, for the catholic faith, was cast into the Aterno river by the Lombards.
          At Córdoba, in Spain, Saint Fandila, Priest and Monk; who, in the Arab persecution, was beheaded and underwent martyrdom for the faith of Christ.
          In Africa, the holy Martyrs Fortunatus and Lucian.
          At Byblos, in Phoenicia, Saint Aquilina, Virgin and Martyr, who, twelve years of age, under the Emperor Diocletian and the Judge Volusianus, for the confession of faith was beaten with blows and stripes, pierced with burning awls, and finally, struck with the sword, consecrated her virginity with martyrdom.
          On Cyprus, Saint Triphyllius, Bishop.
  psalm.idibus-ianu-rii-0ddc434093:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Octave of the Epiphany of the Lord.
          Upon the same 13th day of January, were born into the better life:

          At Rome, upon the Lavican Way, forty holy soldiers who earned crowns of martyrdom for confessing the true faith under the Emperor Gallienus.
          In Sardinia, the holy martyr Potitus, who suffered many things under the Emperor Antoninus and the President Gelasius, and at last was martyred with the sword.
          At Semenden, in Upper Mysia, the holy martyrs Hermylus and Stratonicus, who were cruelly tortured under the Emperor Licinius, and then drowned in the Danube.
          At Cordova, (in the year 852,) the holy martyrs Gumesindus the Priest and Servant-of-God the monk.
          At Poitiers, in Gaul, the holy Confessor Hilary, Bishop of that see.
          He was a stalwart champion of the Catholic faith, for the which cause he was banished for four years into Phrygia. Among other miracles which he wrought he raised a dead man to life, (about the year 369.) The Supreme Pontiff Pius IX confirmed and published his title of Doctor of the Universal Church. We keep his feast upon the morrow.
          At Caesarea, in Cappadocia, holy Leontius, Bishop of that see, who contended manfully against the Gentiles under the Emperor Licinius, and against the Arians under the Emperor Constantine.
          At Trier, (in the year 335,) holy Agritius, Bishop of that see.
          In the monastery of Vergy, the holy Confessor Viventius, (about the year 400.)
          At Amasea, (in the year 324,) in Pontus, the holy Virgin Glaphyra.
          At Milan, (in the year 1497,) in the monastery of St. Martha, the blessed Virgin Veronica of Binasco, of the Order of St. Augustine.
      la:
      - type: text
        text: |-
          Idibus Ianuárii

          Commemorátio Baptismátis Dómini nostri Iesu Christi.
          Pictávis, in Gállia, natális sancti Hilárii, Epíscopi et Confessóris; qui, ob cathólicam fidem, quam strénue propugnávit, quadriénnio apud Phrýgiam relegátus, ibi, inter ália mirácula, mortúum suscitávit. Eum Pius Nonus, Póntifex Máximus, universális Ecclésiæ Doctórem declarávit et confirmávit. Ipsíus autem festum sequénti die celebrátur.
          Rhemis, in Gállia, item natális sancti Remígii, Epíscopi et Confessóris. Hic gentem Francórum convértit ad Christum, Clodóveo, ipsórum Rege, sacris baptismátis undis et fídei sacraméntis initiáto; et, cum annos plúrimos in Episcopátu explésset, sanctitáte et miraculórum glória conspícuus, decéssit e vita. Eius vero festívitas Kaléndis Octóbris potíssimum recólitur, quo die sacrum ipsíus corpus translátum fuit.
          Romæ, via Lavicána, corónæ sanctórum Mílitum quadragínta, quas ipsi, sub Galliéno Imperatóre, pro veræ fídei confessióne percípere meruérunt.
          Córdubæ, in Hispánia, sanctórum Mártyrum Gumesíndi Presbýteri, et Servidéi Mónachi.
          In Sardínia sancti Potíti Mártyris, qui, sub Antoníno Imperatóre et Gelásio Prǽside, multa passus, demum gládio martýrium consecútus est.
          Singidóni, in Mýsia superióre, sanctórum Mártyrum Hérmyli et Stratoníci, qui, post sæva torménta, sub Licínio Imperatóre, in Istrum flumen demérsi sunt.
          Cæsaréæ, in Cappadócia, sancti Leóntii Epíscopi, qui, sub Licínio, advérsus Gentíles, et, sub Constantíno, advérsus Ariános plúrimum decertávit.
          Tréviris sancti Agrítii Epíscopi.
          In Versíaco monastério, in Gállia, sancti Vivéntii Confessóris.
          Amaséæ, in Ponto, sanctæ Gláphyræ Vírginis.
          Medioláni, in cœnóbio sanctæ Marthæ, Beátæ Verónicæ de Binásco Vírginis, ex Ordine sancti Augustíni.
      en2:
      - type: text
        text: |-
          The Thirteenth of January
      
          The Commemoration of the Baptism of our Lord Jesus Christ.
          At Poitiers, in Gaul, the birthday of Saint Hilary, Bishop and Confessor; who, for the catholic faith which he strenuously defended, was exiled for four years among the Phrygians, where, among other miracles, he raised a dead man to life. Pope Pius IX declared and confirmed him as a Doctor of the universal Church. His feast is celebrated on the following day.
          At Reims, in Gaul, likewise the birthday of Saint Remigius, Bishop and Confessor. He converted the Frankish people to Christ, having initiated their King Clovis with the sacred waters of Baptism and the sacraments of faith; and, having completed many years in the Episcopate, distinguished for holiness and the glory of miracles, he departed this life. His feast is observed above all on the first of October, on which day his sacred body was translated.
          At Rome, on the Lavican Way, the crown of the forty holy Soldiers, who under the Emperor Gallienus merited to receive it for the confession of the true faith.
          At Córdoba, in Spain, the holy Martyrs Gumesindus, Priest, and Servusdeus, Monk.
          In Sardinia, Saint Potitus, Martyr, who, under the Emperor Antoninus and the Governor Gelasius, having suffered greatly, at last attained martyrdom by the sword.
          At Singidunum, in Upper Moesia, the holy Martyrs Hermylus and Stratonicus, who, after savage torments, under the Emperor Licinius, were cast into the Ister river.
          At Caesarea, in Cappadocia, Saint Leontius, Bishop, who fought most earnestly against the pagans under Licinius, and against the Arians under Constantine.
          At Trier, Saint Agritius, Bishop.
          At the monastery of Verzy, in Gaul, Saint Viventius, Confessor.
          At Amasea, in Pontus, Saint Glaphyra, Virgin.
          At Milan, in the monastery of Saint Martha, the Blessed Veronica de Binasco, Virgin, of the Order of Saint Augustine.
  psalm.idibus-m-rtii-bc42a1e5f2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 15th day of March, were born into the better life:

          At Caesarea, in Cappadocia, the holy martyr Longinus, who is said to have been the soldier who pierced the Lord's side with a spear.
          Upon the same day, holy Aristobulus, the disciple of the Apostles, who when the work of his preaching was done, suffered martyrdom.
          At Thessalonica, holy Matrona. She was a slave, belonging to a certain Jewess. She was a Christian in secret, and went to the church every day for private prayer. Her mistress found this. She afflicted her in many ways, and at last caused her to be cudgelled, until, still confessing Christ, she gave up her pure spirit to God, [probably about the year 800.]
          On the same day, the holy martyr Menignus, a fuller, who suffered under the Emperor Decius.
          In Egypt, the holy martyr Nicander, who would make careful search for the relics of holy martyrs, and earned to become a martyr himself under the Emperor Diocletian.
          At Cordova, the holy Virgin and martyr Leocritia, [in the year 880.]
          At Rome, holy Pope Zachary, who governed the Church of God with all watchfulness, and fell asleep in peace, famous for good works, [in the year 752.]
          At Riete, holy Probus, Bishop of that see, at whose death, [in the year 570,] the martyrs Juvenal and Eleutherius were present.
          At Rome, [in the sixth century,] the holy [Benedictine] monk, [at Terracina,] Speciosus, whose soul his brother saw being borne heavenward.
      la:
      - type: text
        text: |-
          Idibus Mártii

          Cæsaréæ, in Cappadócia, pássio sancti Longíni mílitis, qui Dómini latus láncea perforásse perhibétur.
          Eódem die natális sancti Aristobúli, Apostolórum discípuli, qui, cursu prædicatiónis perácto, martýrium consummávit.
          In Hellespónto sancti Menígni fullónis, qui sub Décio Imperatóre passus est.
          In Ægýpto sancti Nicándri Mártyris, qui, cum sanctórum Mártyrum relíquias studióse perquíreret, et ipse méruit éffici Martyr, sub Diocletiáno Imperatóre.
          Córdubæ, in Hispánia, sanctæ Leocrítiæ, Vírginis et Mártyris; quæ ob Christi fidem, in persecutióne Arábica, divérsis cruciátibus afflícta et gládio decolláta est.
          Thessalonícæ sanctæ Matrónæ, quæ, cum esset ancílla cuiúsdam Iudǽæ, et occúlte Christum cóleret, ac furtívis oratiónibus quotídie Ecclésiam frequentáret, a dómina sua est deprehénsa et multiplíciter afflícta, atque novíssime, robústis fústibus usque ad mortem cæsa, in confessióne Christi, incorrúptum Deo spíritum réddidit.
          Reáte sancti Probi Epíscopi, cui moriénti Iuvenális et Eleuthérius Mártyres adfuérunt.
          Vindobónæ, in Austria, sancti Cleméntis-Maríæ Hofbauer, Sacerdótis proféssi Congregatiónis a sanctíssimo Redemptóre nuncupátæ, plúrimis in Dei glória et animárum salúte promovénda ac dilatánda ipsa Congregatióne exantlátis labóribus insígnis; quem, virtútibus et miráculis clarum, Pius Décimus, Póntifex Máximus, in Sanctórum cánonem rétulit.
          Apud Cápuam sancti Speciósi Mónachi, cuius ánimam (ut scribit beátus Gregórius Papa) germánus eius deférri vidit in cælum.
          Lutétiæ Parisiórum sanctæ Ludovícæ de Marillac, víduæ Le Gras, Societátis Puellárum a Caritáte una cum sancto Vincéntio a Paulo Fundatrícis, egénis sublevándis addictíssimæ, quam Pius Papa Undécimus Sanctárum fastis accénsuit.
      en2:
      - type: text
        text: |-
          The Fifteenth of March
      
          At Caesarea, in Cappadocia, the passion of Saint Longinus the soldier, who is said to have pierced the side of the Lord with a lance.
          On the same day, the birthday of Saint Aristobulus, disciple of the Apostles, who, having completed his course of preaching, completed his martyrdom.
          In the Hellespont, Saint Menignus the fuller, who suffered under the Emperor Decius.
          In Egypt, Saint Nicander, Martyr, who, while diligently seeking out the relics of the holy Martyrs, himself merited to be made a Martyr, under the Emperor Diocletian.
          At Córdoba, in Spain, Saint Leocricia, Virgin and Martyr; who, for the faith of Christ, in the Arab persecution, was afflicted with various torments and beheaded.
          At Thessalonica, Saint Matrona, who, being the handmaid of a certain Jewish woman, and secretly worshipping Christ and attending church daily in furtive prayers, was discovered by her mistress and afflicted in many ways, and at last, beaten with heavy clubs unto death, gave up her spirit undefiled to God in the confession of Christ.
          At Rieti, Saint Probus, Bishop, at whose death the Martyrs Juvenal and Eleutherius were present.
          At Vienna, in Austria, Saint Clement Mary Hofbauer, Priest professed of the Congregation of the Most Holy Redeemer, distinguished for his many labors in advancing the glory of God, the salvation of souls, and the spread of that same Congregation; whom, illustrious for virtues and miracles, Pope Pius X enrolled in the canon of the Saints.
          Near Capua, Saint Speciosus, Monk, whose soul (as the blessed Pope Gregory writes) his brother saw borne up to heaven.
          At Paris, Saint Louise de Marillac, widow Le Gras, co-Foundress with Saint Vincent de Paul of the Society of the Daughters of Charity, most devoted to the relief of the poor, whom Pope Pius XI enrolled in the register of the Saints.
  psalm.idibus-maii-4a6bc1cb73:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 15th day of May

          In Spain are commemorated the holy Bishops Torquatus, Ctesiphon, Secundus, Indaletius, Caecilius, Hesychius, and Euphratius. They were ordained at Rome by the holy Apostles, and sent to preach the Word of God in Spain. They evangelised diverse cities, and brought countless multitudes into the obedience of the faith of Christ, and fell asleep each in a different place in that land. Torquatus at Cadiz, Ctesiphon at Vierco, Secundus at Avila, Indaletius at Portilla, Caecilius at Elvira, Hesychius at Gibraltar, and Euphratius at Andujar.
          At Evora, in Portugal, [in the sixth century,] the holy martyr Mancius.
          In the island of Chios, [in the year 251,] was born into the better life: the blessed martyr Isidore, whose church there is a well into the which he is said to have been cast, of the water whereof the sick oftentimes drink and are healed.
          At Lampsacus, on the Hellespont, [in the persecution under the Emperor Decius,] suffered the holy martyrs Peter, Andrew, Paul, and Dionysia.
          At Faustina, in Sardinia, the holy martyr Simplicius, Bishop [of that see,] who was thrust through with a lance, under the President Barbaros, in the time of the Emperor Diocletian, and so finished his testimony.
          At Clermont, in Auvergne, [in the first century,] the holy martyrs Cassius, Victorinus, Maximus, and their Companions.
          In Brabant, the holy Virgin and martyr Dymphna, daughter of a King of Ireland, who was beheaded by order of her own father on account of her belief in Christ, and her holding to her virginity.
      la:
      - type: text
        text: |-
          Idibus Maii

          Sancti Ioánnis Baptístæ de La Salle, Presbýteri et Confessóris, qui Sodalitátis Fratrum Scholárum Christianárum fuit Institútor, ac séptimo Idus Aprílis obdormívit in Dómino.
          In Hispánia sanctórum Torquáti, Ctesiphóntis, Secúndi, Indalétii, Cæcílii, Hesýchii et Euphrásii; qui Romæ a sanctis Apóstolis Epíscopi ordináti, et ad prædicándum verbum Dei in Hispánias dirécti sunt. Cum autem hi váriis úrbibus evangelizássent, et innúmeras multitúdines ad Christi fidem perduxíssent, divérsis in ea província locis quievérunt; scílicet Torquátus Acci, Ctésiphon Vérgii, Secúndus Abulæ, Indalétius Urci, Cæcílius Illíberi, Hesýchius Cartéiæ et Euphrásius Illitúrgi.
          Fausínæ, in Sardínia, sancti Simplícii, Epíscopi et Mártyris, qui, Diocletiáni témpore, sub Bárbaro Prǽside, perfóssus láncea martýrium consummávit.
          Eboræ, in Lusitánia, sancti Máncii Mártyris.
          In ínsula Chio natális beáti Isidóri Mártyris, in cuius Basílica exstat púteus, in quem fertur fuísse iniéctus, de cuius aqua infírmi potáti sǽpius sanántur.
          Lámpsaci, in Hellespónto, pássio sanctórum Petri, Andréæ, Pauli et Dionýsiæ.
          Arvérnis, in Gállia, sanctórum Mártyrum Cássii, Victoríni, Máximi et Sociórum.
          Ghelæ, in Brabántia, sanctæ Dympnæ, Vírginis et Mártyris, fíliæ Regis Hibernórum; quæ, cum in fide Christi et virginitáte servánda permanéret immóbilis, a patre iussa est decollári.
      en2:
      - type: text
        text: |-
          The Fifteenth of May
      
          Saint John Baptist de La Salle, Priest and Confessor, who was the Founder of the Brotherhood of the Christian Schools, and fell asleep in the Lord on the seventh of April.
          In Spain, the holy Torquatus, Ctesiphon, Secundus, Indaletius, Caecilius, Hesychius, and Euphrasius; who were ordained Bishops at Rome by the holy Apostles and sent to preach the word of God in the Spains. Having evangelized in various cities and led innumerable multitudes to the faith of Christ, they rested in different places in that province: namely Torquatus at Acci, Ctesiphon at Vergi, Secundus at Avila, Indaletius at Urci, Caecilius at Illiberi, Hesychius at Carteia, and Euphrasius at Iliturgis.
          At Faustina, in Sardinia, Saint Simplicius, Bishop and Martyr, who, in the time of Diocletian under the Governor Barbarus, pierced with a lance, completed his martyrdom.
          At Évora, in Portugal, Saint Mancius, Martyr.
          On the island of Chios, the birthday of the blessed Isidore, Martyr, in whose Basilica there is a well into which he is said to have been cast, from whose water the sick who have drunk have often been healed.
          At Lampsacus, in the Hellespont, the passion of the holy Martyrs Peter, Andrew, Paul, and Dionysia.
          At Clermont, in Gaul, the holy Martyrs Cassius, Victorinus, Maximus, and their Companions.
          At Gheel, in Brabant, Saint Dymphna, Virgin and Martyr, daughter of a King of the Irish; who, remaining steadfast in the faith of Christ and in the preservation of her virginity, was ordered by her father to be beheaded.
  psalm.idibus-nov-mbris-6885724a58:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the morrow we keep the feast of the holy Confessor Diego, of the Order of Friars Minor, who was born into the better life upon this present day.
          Upon the same 13th day of November, were born into the better life:

          At Ravenna, the holy martyrs Valentine, Solutor, and Victor, who suffered in the persecution under Diocletian.
          At Aix, in Provence, (in the year 304,) that illustrious martyr the blessed Mitrius.
          At Caesarea, in Palestine, (in the year 308,) in the persecution under the Emperor Galerius Maximian, the holy martyrs Antonine, Zebinas, German, and the Virgin Ennatha. Ennatha was flogged and then burnt, and the men were beheaded because they openly rebuked the President Firmilian for his wickedness in offering sacrifice to the gods.
          In Africa, (in the year 437,) the holy martyrs Arcadius, Paschasius, Probus, and Eutychian. These were all Spaniards who, during the persecution under the Vandals, could no wise be brought to turn aside unto the Arian misbelief. For this cause the Arian king Genseric first proscribed them, then banished them, afterwards tormented them with terrible sufferings, and lastly put them to death in diverse ways. Then also became glorious the faithfulness of the little lad, Paulillus, the brother of holy Paschasius and Eutychian, and as he would not give up the Catholic faith, he was cudgelled for a long time and condemned to the lowest bondage.
          At Rome, holy Pope Nicholas the Great, eminent for his Apostolic vigour. (He reigned from April 28, 858 to November 13, 867. He was the 107th Pope.)
          At Tours, (in the year 444,) holy Brice, Bishop of that see, a disciple of the blessed Bishop Martin.
          At Toledo, (in the year 658,) holy Eugene, Bishop (of that see.)
          In Auvergne, (in the year 527,) holy Quintian, Bishop (of Rodez and of Clermont.)
          At Cremona, the holy Confessor Homobuono, who was famous for miracles, and whose name Innocent III enrolled among those of the Saints.
      la:
      - type: text
        text: |-
          Idibus Novémbris

          Sancti Dídaci, ex Ordine Minórum, Confessóris; cuius dies natális recólitur prídie huius diéi.
          Ravénnæ natális sanctórum Mártyrum Valentíni, Solutóris et Victóris; qui sub Diocletiáno Imperatóre passi sunt.
          Aquis, in província Narbonénsi, beáti Mítrii, claríssimi Mártyris.
          Cæsaréæ, in Palæstína, pássio sanctórum Antoníni, Zébinæ, Germáni et Ennathæ Vírginis. Hæc, sub Galério Maximiáno Imperatóre, verbéribus cæsa, igne cremáta est; illi vero, cum intrépidi ac líbera voce Firmiliánum Prǽsidem, diis immolántem, impietátis argúerent, cápite cæsi sunt.
          In Africa sanctórum Mártyrum Hispanórum Arcádii, Paschásii, Probi et Eutychiáni; qui, in persecutióne Wandálica, cum in Ariánam perfídiam nullátenus declináre pateréntur, hinc a Genseríco, Rege Ariáno, primum proscrípti, deínde acti in exsílium atque atrocíssimis supplíciis cruciáti, postrémum divérso mortis génere interémpti sunt. Tunc et Paulílli puéruli, germáni sanctórum Paschásii et Eutychiáni, constántia enítuit; qui, cum de fide cathólica nullátenus posset avélli, fústibus diu cæsus est, atque ad ínfimam servitútem damnátus.
          Romæ sancti Nicolái Papæ Primi, vigóre apostólico præstántis.
          Turónis, in Gállia, sancti Brítii Epíscopi, qui fuit discípulus beáti Martíni Epíscopi.
          Toléti, in Hispánia, sancti Eugénii Epíscopi.
          Arvérnis, in Gállia, sancti Quinctiáni Epíscopi.
          Cremónæ, in Insúbria, sancti Homobóni Confessóris; quem, miráculis clarum, Innocéntius Papa Tértius in Sanctórum númerum rétulit.
      en2:
      - type: text
        text: |-
          The Fifteenth of November
      
          Saint Didacus, of the Order of Minors, Confessor; whose birthday is observed on the day before.
          At Ravenna, the birthday of the holy Martyrs Valentine, Solutor, and Victor; who suffered under the Emperor Diocletian.
          At Aix, in the province of Narbonne, the blessed Mitre, most glorious Martyr.
          At Caesarea, in Palestine, the passion of the holy Martyrs Antoninus, Zebinas, Germanus, and the Virgin Ennatha. She, under the Emperor Galerius Maximian, was beaten with stripes and burned with fire; while they, fearlessly and with free voice reproaching the Governor Firmilianus as he was sacrificing to the gods, were beheaded.
          In Africa, the holy Spanish Martyrs Arcadius, Paschasius, Probus, and Eutychian; who, in the Vandal persecution, when they in no way consented to yield to Arian treachery, were first proscribed by the Arian King Genseric, then driven into exile and tormented with most atrocious punishments, and finally put to death by various kinds of death. And at that time also the constancy of the boy Paulillus, brother of the holy Paschasius and Eutychian, shone forth; for he, when he could in no way be drawn away from the catholic faith, was long beaten with clubs and condemned to the lowest servitude.
          At Rome, Saint Nicholas I, Pope, preeminent for apostolic vigor.
          At Tours, in Gaul, Saint Britius, Bishop, who was a disciple of the blessed Bishop Martin.
          At Toledo, in Spain, Saint Eugene, Bishop.
          At Clermont, in Gaul, Saint Quinctianus, Bishop.
          At Cremona, in Lombardy, Saint Homobonus, Confessor; whom, renowned for miracles, Pope Innocent III enrolled in the number of the Saints.
  psalm.idibus-oct-bris-154b060acc:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 15th day of October, were born into the better life:

          At Avila, in Spain, the holy Virgin Theresa, the mother and mistress of the brethren and sisters of the Order of Carmelites of the Stricter Observance.
          At Rome, upon the Aurelian Way, the holy martyr Fortunatus.
          At Cologne, three hundred holy martyrs, who finished the course of their contending in the persecution under Maximian.
          At Carthage, the holy martyr Agileus, on whose feast - day holy Augustine preached to the people a discourse concerning him.
          In Prussia, (at the beginning of the eleventh century,) the holy martyr Bruno, Bishop of the Ruthenians, who was preaching the gospel in those parts when he was taken by wicked men, who cut off, first his hands and feet, and then his head.
          At Lyon, (in the fourth century,) holy Antiochus, Bishop (of that see,) who vigorously administered the office of the bishopric to which he had been called, and inherited a kingdom in heaven.
          At Trier, (in the fifth century,) the holy Confessor Severus, Bishop (of that see.)
          At Strasbourg, (in the year 1027,) the holy Virgin Aurelia.
          At Cracow, holy Iadwiga, Grand Princess of Poland, who gave herself up to the serving of the poor, and was famous ever for miracles. Pope Clement IV enrolled her name among those of the Saints, and Innocent XI sanctioned her festival for the 17th day of this present month of October.
          In Germany, (in the eighth century,) holy Thecla, Abbess (of Kitzingen.)
      la:
      - type: text
        text: |-
          Idibus Octóbris

          Albæ, in Hispánia, sanctæ Terésiæ Vírginis, quæ Fratrum ac Sorórum Ordinis Carmelitárum arctióris observántiæ mater éxstitit et magístra.
          Cracóviæ, in Polónia, natális sanctæ Hedwígis Víduæ, Polonórum Ducíssæ, quæ, páuperum obséquio dédita, étiam miráculis cláruit; et a Cleménte Quarto, Pontífice Máximo, Sanctórum número adscrípta est. Ipsíus autem festívitas sequénti die celebrátur.
          Romæ, via Aurélia, sancti Fortunáti Mártyris.
          In Borússia sancti Brunónis, Epíscopi Ruthenórum et Mártyris; qui, Evangélium in ea regióne prǽdicans, ab ímpiis tentus est, ac, mánibus pedibúsque præcísis, cápite truncátus.
          Apud Colóniam Agrippínam natális sanctórum trecentórum Mártyrum, qui, in Maximiáni persecutióne, cursum sui agónis complevérunt.
          Carthágine sancti Agiléi Mártyris, in cuius die natáli sanctus Augustínus tractátum de ipso ad pópulum hábuit.
          Lugdúni, in Gállia, sancti Antíochi Epíscopi, qui, strénue administráto Pontificii cúlmine ad quod assúmptus fúerat, regnum cæléste adéptus est.
          Tréviris sancti Sevéri, Epíscopi et Confessóris.
          Argentoráti sanctæ Auréliæ Vírginis.
          In Germánia sanctæ Theclæ, Abbatíssæ et Vírginis, quæ, monastériis Kitzíngæ et Ochsenfúrti præpósita, multis cumuláta méritis in cælum migrávit.
      en2:
      - type: text
        text: |-
          The Fifteenth of October
      
          At Ávila, in Spain, Saint Teresa, Virgin, who was the mother and teacher of the Brothers and Sisters of the Order of Carmelites of stricter observance.
          At Kraków, in Poland, the birthday of Saint Hedwig, Widow, Duchess of Poland, who, devoted to the service of the poor, was also renowned for miracles; and was enrolled in the number of the Saints by Pope Clement IV. Her feast is celebrated on the following day.
          At Rome, on the Aurelian Way, Saint Fortunatus, Martyr.
          In Prussia, Saint Bruno, Bishop of the Ruthenians and Martyr; who, preaching the Gospel in that region, was seized by the wicked, and, having his hands and feet cut off, was beheaded.
          Near Cologne, the birthday of the three hundred holy Martyrs, who, in the persecution of Maximian, completed the course of their contest.
          At Carthage, Saint Agileus, Martyr, on whose birthday Saint Augustine preached a discourse to the people.
          At Lyons, in Gaul, Saint Antiochus, Bishop, who, having vigorously administered the pontifical dignity to which he had been elevated, attained the heavenly kingdom.
          At Trier, Saint Severus, Bishop and Confessor.
          At Strasbourg, Saint Aurelia, Virgin.
          In Germany, Saint Thecla, Abbess and Virgin, who, placed over the monasteries of Kitzingen and Ochsenfurt, passed to heaven enriched with many merits.
  psalm.idibus-sept-mbris-54456b8864:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 13th day of September, were born into the better life:

          At Alexandria, the blessed Philip, father of the holy Virgin Eugenia. He resigned the dignity of Prefect of Egypt, and received the grace of baptism, and while he was in prayer Terentius, who had succeeded him as Prefect, caused him to be slain with the sword.
          Likewise the holy martyrs Macrobius and Julian, who suffered under Licinius.
          Upon the same day suffered the holy martyr Ligorius, who was slain by the Gentiles for Christ's faith's sake while he was dwelling in the desert.
          At Alexandria, (in the seventh century,) the holy Confessor Eulogius, Pope (of that see,) famous for his teaching and holiness.
          At Angers, in Gaul, (in the fifth century,) the holy Confessor Mauritius, Bishop (of that see,) famous for countless miracles.
          At Sens, (in the seventh century,) the holy Confessor Aime, Bishop (of that see.) On the same day, (in the fifth century,) the holy Confessor Venerius, a man of marvellous holiness, who dwelt as an hermit in the island of Palmaria.
          In the monastery of Remiremont, in Gaul, (in the seventh century,) the holy Abbot Aimé, a Priest famous for his graces of self-denial and of wonder-working.
      la:
      - type: text
        text: |-
          Idibus Septémbris

          Alexandríæ natális beáti Philíppi, patris sanctæ Eugéniæ Vírginis. Hic, dignitátem Præfectúræ Ægýpti déserens, Baptismátis grátiam assecútus est; quem, in oratióne constitútum, iussit Teréntius Præféctus, eius succéssor, gládio iugulári.
          Item sanctórum Mártyrum Macróbii et Iuliáni, qui sub Licínio passi sunt.
          Eódem die sancti Ligórii Mártyris, qui a Gentílibus, in erémo degens, ob Christi fidem necátus est.
          Alexandríæ sancti Eulógii Epíscopi, doctrína et sanctitáte célebris.
          Andégavi, in Gállia, sancti Maurílii Epíscopi, qui innúmeris miráculis cláruit.
          Apud Sénonas sancti Amáti, Epíscopi et Confessóris.
          In monastério Romárico, in Gállia, sancti Amáti, Presbýteri et Abbátis, abstinéntia et miraculórum dono illústris.
          Ipso die sancti Venérii Confessóris, admirándæ sanctitátis viri, qui in ínsula Palmária vitam eremíticam duxit.
      en2:
      - type: text
        text: |-
          The Fifteenth of September
      
          At Alexandria, the birthday of the blessed Philip, father of the holy Virgin Eugenia. He, renouncing the dignity of the Prefecture of Egypt, received the grace of Baptism; and while he was at prayer, the Governor Terentius, his successor, ordered him to be beheaded.
          Likewise, the holy Martyrs Macrobius and Julian, who suffered under Licinius.
          On the same day, Saint Ligorius, Martyr, who, living in the desert, was put to death by pagans for the faith of Christ.
          At Alexandria, Saint Eulogius, Bishop, celebrated for learning and holiness.
          At Angers, in Gaul, Saint Maurilius, Bishop, who was renowned for innumerable miracles.
          Near Sens, Saint Amatus, Bishop and Confessor.
          At the monastery of Remiremont, in Gaul, Saint Amatus, Priest and Abbot, illustrious for abstinence and the gift of miracles.
          On the same day, Saint Venerius, Confessor, a man of admirable holiness, who led the eremitic life on the island of Palmaria.
  psalm.kal-ndas-oct-bris-2bff874bf5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the same 1st day of October, were born into the better life:

          The holy Confessor Remy, (15th) Archbishop of Reims, in Gaul, who converted the French nation to Christ, baptized their king Chlodwig, and administered to him the Sacraments of the faith. Remy passed many years in his labors as Bishop, and was famous for his holiness and for the power of working miracles. He died upon the 13th day of January, (in the year 533,) but his feast is kept upon the 1st day of October, which is that of the translation of his sacred body.
          At Rome, the blessed martyrs Aretas, (in the year 852,) and five hundred and four others.
          At Tomi, in Pontus, the holy martyrs Priscus, Crescens, and Evagrius.
          At Lisbon, in Portugal, the holy martyrs Verissimus and his sisters Maxima and Julia, who suffered in the persecution under the Emperor Diocletian.
          At Tournai, in Hainaut, the holy martyr Piaton, a Priest, who came from Rome to Gaul to preach along with the blessed Quinctinus and his Companions, and afterwards finished his testimony by martyrdom, in the persecution under the Emperor Maximian, and so passed away to be ever with the Lord.
          At Thessalonica, under the same Emperor Maximian, the holy martyr Domninus.
          At Gent, the holy Confessor Bavo, (in the seventh century.)
          At Orvieto, the holy Priest and Confessor Severus.
      la:
      - type: text
        text: |-
          Kaléndas Octóbris

          Sancti Remígii, Epíscopi Rheménsis et Confessóris, qui Idibus Ianuárii obdormívit in Dómino, sed hac die, ob Translatiónem córporis eius, potíssimum cólitur.
          Romæ beáti Arétæ Mártyris et aliórum quingentórum quátuor.
          Tomis in Ponto sanctórum Mártyrum Prisci, Crescéntis, et Evágrii.
          Ulyssipóne in Lusitánia sanctórum Mártyrum Veríssimi, Máximæ et Iúliæ sorórum eius, qui in persecutióne Diocletiáni passi sunt.
          Tornáci sancti Piatonis Presbýteri et Mártyris, qui cum beáto Quinctíno eiúsque Sóciis ab urbe Roma in Gálliam prædicatiónis causa perréxit, ac póstea in persecutióne Maximiáni consummáto martýrio migrávit ad Dóminum.
          Thessalonícæ sancti Domníni Mártyris, sub eódem Maximiáno.
          Urbe Véteri sancti Sevéri Presbýteri et Confessóris.
          In Portu Gandæ sancti Bavónis Confessóris.
      en2:
      - type: text
        text: |-
          The First of October
      
          Saint Remigius, Bishop of Reims and Confessor, who fell asleep in the Lord on the thirteenth of January, but is chiefly honored on this day on account of the Translation of his body.
          At Rome, the blessed Aretas, Martyr, and five hundred and four others.
          At Tomi, in Pontus, the holy Martyrs Priscus, Crescens, and Evagrius.
          At Lisbon, in Portugal, the holy Martyrs Verissimus, Maxima, and Julia his sisters, who suffered in the persecution of Diocletian.
          At Tournai, Saint Piaton, Priest and Martyr, who went with the blessed Quinctinus and his Companions from the city of Rome to Gaul to preach, and afterward, in the persecution of Maximian, completed his martyrdom and passed to the Lord.
          At Thessalonica, Saint Domnius, Martyr, under that same Maximian.
          At Orvieto, Saint Severus, Priest and Confessor.
          At the port of Ghent, Saint Bavo, Confessor.
  psalm.kal-ndis-apr-lis-d4cf3ef2f2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 1st day of April, were born into the better life:

          At Rome, the holy martyr Theodora, sister of the great martyr Hermes.
          She suffered by order of the judge Aurelian, under the Emperor Hadrian, and is buried beside her brother upon the Salarian Way, not far from the city.
          On the same day, the holy martyr Venantius, Bishop of Toledo.
          In Egypt, the holy martyrs Victor and Stephen.
          In Armenia, the holy martyrs Quintian and Irenaeus.
          At Constantinople, [about the year 830,] the holy Confessor Macarius, who died in exile, under the Emperor Leo, because of his defence of holy images.
          At Grenoble, holy Hew, [born 1053, died 1132,] Bishop of that see, who passed the latter part of his life, even for many years, in the wilderness, and passed away, famous for miracles, to be ever with the Lord.
          At Amiens, the holy Abbot Valery, at whose grave miracles are oftentimes wrought. [Monk of Luxeuil, and first Abbot of Leuconais, in the year 619.]
      la:
      - type: text
        text: |-
          Kaléndis Aprílis

          Romæ pássio sanctæ Theodóræ, soróris illustríssimi Mártyris Hermétis, quæ, sub Hadriáno Imperatóre, ab Aureliáno Iúdice affecta martýrio, sepúlta est iuxta fratrem suum, via Salária, non longe ab Urbe.
          Eódem die sancti Venántii, Epíscopi et Mártyris.
          In Ægýpto sanctórum Mártyrum Victóris et Stéphani.
          In Arménia sanctórum Mártyrum Quinctiáni et Irenǽi.
          Constantinópoli sancti Macárii Confessóris, qui, sub Leóne Imperatóre, pro assertióne sanctárum Imáginum, in exsílio vitam finívit.
          Ardpatrícii, in Momónia Hibérniæ província, sancti Celsi Epíscopi, qui beátum Malachíam in Episcopátu præcéssit.
          Gratianópoli, in Gállia, sancti Hugónis Epíscopi, qui multis annis in solitúdine vitam exégit, et miraculórum glória clarus migrávit ad Dóminum.
          Apud Ambiánum, in Gállia, sancti Waleríci Abbátis, cuius sepúlcrum crebris miráculis illustrátur.
      en2:
      - type: text
        text: |-
          The First of April
      
          At Rome, the passion of Saint Theodora, sister of the most illustrious Martyr Hermes, who, under the Emperor Hadrian, was afflicted with martyrdom by the Judge Aurelianus, and was buried near her brother, on the Salarian Way, not far from the City.
          On the same day, Saint Venantius, Bishop and Martyr.
          In Egypt, the holy Martyrs Victor and Stephen.
          In Armenia, the holy Martyrs Quinctianus and Irenaeus.
          At Constantinople, Saint Macarius, Confessor, who, under the Emperor Leo, for his defense of holy Images, ended his life in exile.
          At Ardpatrick, in the province of Munster in Ireland, Saint Celsus, Bishop, who preceded the blessed Malachias in the Episcopate.
          At Grenoble, in Gaul, Saint Hugh, Bishop, who lived many years in solitude and, renowned for the glory of miracles, passed to the Lord.
          Near Amiens, in Gaul, Saint Walaricus, Abbot, whose sepulcher is honored with frequent miracles.
  psalm.kal-ndis-aug-sti-78426b0c7a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 1st day of August

          Commemorated the dedication of the Church of St. Peter-in-Chains, upon the Esquiline Mount at Rome.
          Upon the same day, were born into the better life:
          At Antioch, the seven holy Maccabee brethren and their mother, who suffered under King Antiochus Epiphanes. Their relics have been brought to Rome and buried in the aforesaid Church of St. Peter-in-Chains.
          At Rome, [in the year 137,] the holy Virgins, Faith, Hope, and Charity, [daughters of St. Sophia, who is named under September 30,] who gained the crown of martyrdom under the Emperor Hadrian.
          Likewise at Rome, upon the Latin Way, [in the third century,] the holy martyrs Bonus the Priest, Faustus, and Maurus, and nine others, of whom it is written in the Acts of holy Pope Stephen.
          At Philadelphia, in Arabia, the holy martyrs Cyril, Aquila, Peter, Domitian, Rufus, and Menander, who were all crowned upon one and the same day.
          At Perge, in Pamphylia, [in the fourth century,] the holy martyrs Leontius, Attius, Alexander, and six other husbandmen, who were beheaded under the President Flavian in the persecution under the Emperor Diocletian.
          At Gerona, in Spain, [in the year 304,] the holy martyr Felix, who after torments of diverse kinds was ordered by the Emperor Dacian to be mangled until he gave up his unconquered spirit to Christ.
          At Vercelli, [in the year 370,] the holy martyr Eusebius, Bishop of that city, who was banished by the Emperor Constantius, first to Bethshan and then into Cappadocia, on account of his confession of the Catholic faith, but at length returned unto his own Church. He suffered [a living] martyrdom under the persecution of the Arians. His memory is chiefly kept upon the 15th day of December, which is that of his ordination as Bishop.
          At Paris, [in the year 287,] the holy martyr Justinus.
          At Vienne, [in the year 136,] holy Verus, [fifth] Bishop [of that see.]
          At Winchester, in England, [in the year 984,] holy Ethelwold, Bishop [of Winchester, and Confessor.]
          In the district of Lisieux, [in the department of Calvados, France,] the holy Confessor Nemesius.
      la:
      - type: text
        text: |-
          Kaléndis Augústi

          Antiochíæ pássio sanctórum septem fratrum Machabæórum Mártyrum, qui, cum matre sua, passi sunt sub Antíocho Epipháne Rege. Eórum relíquiæ, Romam translátæ, in eádem Ecclésia sancti Petri ad Víncula cónditæ fuérunt.
          Vercéllis natális sancti Eusébii, Epíscopi et Mártyris, qui, ob confessiónem fídei cathólicæ, a Constántio Príncipe Scythópolim, in Palæstína, et inde in Cappadóciam relegátus, póstmodum ad Ecclésiam suam revérsus, martýrium, persequéntibus Ariánis, passus est. Ipsíus autem memória étiam décimo octávo Kaléndas Ianuárii solémniter habétur, quo die fuit Epíscopus ordinátus; eiúsque festum recólitur décimo séptimo Kaléndas Ianuárii.
          Nucériæ Paganórum, in Campánia, item natális sancti Alfónsi-Maríæ de Ligório, Fundatóris Congregatiónis a sanctíssimo Redemptóre nuncupátæ, Epíscopi sanctæ Agathæ Gothórum et Confessóris, zelo animárum, scriptis, verbo et exémplo insígnis; quem Summus Póntifex Gregórius Décimus sextus albo Sanctórum adscrípsit, et Pius Nonus Doctórem universális Ecclésiæ declarávit, et Pius Duodécimus ómnium Confessariórum ac Moralistárum cæléstem apud Deum Patrónum constítuit. Ipsíus vero festívitas sequénti die celebrátur.
          Romæ, via Latína, sanctórum Mártyrum Boni Presbýteri, Fausti et Mauri, cum áliis novem; qui in Actis sancti Stéphani Papæ describúntur.
          Item Romæ pássio sanctárum Vírginum Fídei, Spei et Caritátis, e sancta Sophía matre progenitárum, quæ, sub Hadriáno Príncipe, martýrii corónam adéptæ sunt.
          Philadelphíæ, in Arábia, sanctórum Mártyrum Cyrílli, Aquilæ, Petri, Domitiáni, Rufi et Menándri, una die coronatórum.
          Perge, in Pamphýlia, sanctórum Mártyrum Leóntii, Attii, Alexándri, et aliórum sex agricolárum; qui, in persecutióne Diocletiáni, sub Flaviáno Prǽside, decolláti sunt.
          Gerúndæ, in Hispánia, natális sancti Felícis Mártyris, qui, post divérsa tormentórum génera, a Daciáno támdiu iussus est laniári, donec invíctum Christo spíritum rédderet.
          In território Parisiénsi sancti Iustíni Mártyris.
          Viénnæ, in Gállia, sancti Veri Epíscopi.
          Wintóniæ, in Anglia, sancti Ethelwóldi Epíscopi.
          In pago Lisuíno, in Gállia, sancti Nemésii Confessóris.
          Romæ, in Exquíliis, Dedicátio sancti Petri Apóstoli ad Víncula.
      en2:
      - type: text
        text: |-
          The First of August
      
          At Antioch, the passion of the seven holy Maccabee brothers, Martyrs, who, together with their mother, suffered under King Antiochus Epiphanes. Their relics, translated to Rome, were deposited in the same church of Saint Peter in Chains.
          At Vercelli, the birthday of Saint Eusebius, Bishop and Martyr, who, for his confession of the catholic faith, was exiled by the Emperor Constantius to Scythopolis in Palestine, and thence to Cappadocia, and afterwards returned to his Church and suffered martyrdom at the hands of persecuting Arians. His memory is also solemnly observed on the fifteenth of December, the day on which he was ordained Bishop; and his feast is observed on the sixteenth of December.
          At Nocera Superiore, in Campania, likewise the birthday of Saint Alphonsus Mary de Ligorio, Founder of the Congregation of the Most Holy Redeemer, Bishop of Sant'Agata dei Goti and Confessor, distinguished for zeal for souls, writings, word, and example; whom Pope Gregory XVI enrolled in the register of the Saints, and Pope Pius IX declared a Doctor of the universal Church, and Pope Pius XII established as the heavenly Patron before God of all Confessors and Moralists. His feast is celebrated on the following day.
          At Rome, on the Latin Way, the holy Martyrs Bonus, Priest, Faustus, and Maurus, with nine others; who are described in the Acts of Pope Saint Stephen.
          Likewise at Rome, the passion of the holy Virgins Faith, Hope, and Charity, born of their holy mother Sophia, who, under the Emperor Hadrian, attained the crown of martyrdom.
          At Philadelphia, in Arabia, the holy Martyrs Cyrillus, Aquila, Peter, Domitian, Rufus, and Menander, crowned on the same day.
          At Perge, in Pamphylia, the holy Martyrs Leontius, Attius, Alexander, and six other farmers; who, in the persecution of Diocletian under the Governor Flavianus, were beheaded.
          At Gerona, in Spain, the birthday of Saint Felix, Martyr, who, after various kinds of torments, was ordered by Dacianus to be torn apart until he rendered up his invincible spirit to Christ.
          In the territory of Paris, Saint Justin, Martyr.
          At Vienne, in Gaul, Saint Verus, Bishop.
          At Winchester, in England, Saint Ethelwold, Bishop.
          In the district of Lisieux, in Gaul, Saint Nemesius, Confessor.
          At Rome, on the Esquiline, the Dedication of the Apostle Saint Peter in Chains.
  psalm.kal-ndis-dec-mbris-4e24da2939:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the Feast of the holy Confessor Felix de Valois, of whom mention is made upon the 4th day of November.
          Upon the same 1st day of December, were born into the better life:

          The Prophet Nahum, who sleepeth in Begabar.
          At Rome, (about the year 283,) the holy martyrs the Priest Diodorus, and the Deacon Marianus with many others, who gained the glory of martyrdom by command of the Emperor Numerian.
          There likewise the holy martyrs Lucius, Rogatus, Cassian, and Candida.
          On the same day, the holy martyr Ansanus, who confessed Christ at Rome, under the Emperor Diocletian, and was cast into prison then was brought to Sienna, in Tuscany, where he was beheaded, and so finished the course of his testimony, (about the year 304.)
          At Ameria, in Umbria, under the same Diocletian, the holy martyr Olympias. He was a man of consular rank, who had been converted by blessed Firmina, and died upon the rack, (about the year 284.)
          At Arbela, in Persia, the holy martyr Ananias.
          At Narni, the holy martyr Proculus, Bishop (of that see,) who, after many good works, was beheaded by order of Totila, King of the Goths.
          At the city of Casala, the holy martyr Evasius, Bishop (of that see.)
          At Milan, holy Castritian, Bishop (of that see,) who gained great praise for his worthy acts and his godly and pious conduct of affairs during the most troublous times of the Church.
          At Brescia, holy Ursicinus, Bishop (of that see.)
          At Noyon, (in, probably, the year 659,) holy Eloy, Bishop (of that see,) whose marvelous life is commended by the number of signs wrought through him.
          At Verdun, (in the year 591,) holy Ageric, Bishop (of that see.)
          On the same day, holy Natalia, the wife of the blessed martyr Hadrian. She ministered for a long time to the holy martyrs who were kept in prison at Nicomedia under the Emperor Diocletian, and after their battle was over went to Constantinople, where she fell asleep in peace.
      la:
      - type: text
        text: |-
          Kaléndis Decémbris

          Sancti Nahum Prophétæ, in Bégabar quiescéntis.
          Romæ sanctórum Mártyrum Diodóri Presbýteri, et Mariáni Diáconi, cum áliis plúribus, qui, sub Numeriáno Príncipe, cum in Arenário natalítia Mártyrum ágerent, illic, obstrúcta a persecutóribus iánua cryptæ ac díruta désuper mole, martýrii glóriam meruérunt.
          Item Romæ pássio sanctórum Lúcii, Rogáti, Cassiáni et Cándidæ.
          Nárniæ sancti Próculi, Epíscopi et Mártyris; qui, post multa egrégia ópera, a Rege Gothórum Tótila iussus est decollári.
          In civitáte Casalénsi sancti Evásii, Epíscopi et Mártyris.
          Eódem die sancti Ansáni Mártyris, qui, sub Diocletiáno Imperatóre, Romæ conféssus Christum et in cárcerem trusus, deínde Senas, in Túscia, perdúctus, ibídem cápitis obtruncatióne cursum martýrii perfécit.
          Amériæ, in Umbria, sancti Olympíadis, viri Consuláris, qui a beáta Firmína ad fidem est convérsus, et sub Diocletiáno, in equúleo tortus, martýrium consummávit.
          Arbéle, in Pérside, sancti Ananíæ Mártyris.
          Medioláni sancti Castritiáni Epíscopi, qui, in máxima Ecclésiæ perturbatióne, virtútum méritis ac rerum pie religioséque gestárum laude enítuit.
          Bríxiæ sancti Ursicíni Epíscopi.
          Noviómi, in Bélgio, sancti Elígii Epíscopi, cuius vitam admirándam múltiplex signórum númerus comméndat.
          Apud Virodúnum, in Gállia, sancti Ageríci Epíscopi.
          Eódem die sanctæ Natáliæ, uxóris beáti Hadriáni Mártyris, quæ, sub Diocletiáno Imperatóre, sanctis Martýribus, Nicomedíæ in cárcere deténtis, multo témpore ministrávit; impletóque eórum certámine, Constantinópolim est profécta, et ibídem in pace quiévit.
      en2:
      - type: text
        text: |-
          The First of December
      
          Saint Nahum, Prophet, resting at Begabar.
          At Rome, the holy Martyrs Diodorus, Priest, and Marianus, Deacon, with many others, who, under the Emperor Numerian, while celebrating the birthdays of the Martyrs in the Sandpit, had the door of the crypt blocked by the persecutors and a mass of earth poured on top of it, and thus merited the glory of martyrdom.
          Likewise at Rome, the passion of the holy Martyrs Lucius, Rogatus, Cassianus, and Candida.
          At Narni, Saint Proculinus, Bishop and Martyr; who, after many distinguished works, was ordered to be beheaded by the Gothic King Totila.
          In the city of Casale, Saint Evasius, Bishop and Martyr.
          On the same day, Saint Ansanus, Martyr, who, under the Emperor Diocletian, confessed Christ at Rome and was cast into prison, then led to Siena, in Tuscany, where he completed his martyrdom by decapitation.
          At Ameria, in Umbria, Saint Olympiades, a man of consular rank, who was converted to the faith by the blessed Firmina, and under Diocletian, racked on the horse, completed his martyrdom.
          At Arbela, in Persia, Saint Ananias, Martyr.
          At Milan, Saint Castritian, Bishop, who, in the great upheaval of the Church, shone forth by the merits of his virtues and the praise of his pious and religious conduct.
          At Brescia, Saint Ursicinus, Bishop.
          At Noyon, in Belgium, Saint Eligius, Bishop, whose admirable life is commended by a great number of miracles.
          Near Verdun, in Gaul, Saint Agericus, Bishop.
          On the same day, Saint Natalia, wife of the blessed Hadrian the Martyr, who, under the Emperor Diocletian, ministered for a long time to the holy Martyrs held in prison at Nicomedia; and, having seen their contest to its end, set out for Constantinople and rested there in peace.
  psalm.kal-ndis-febru-rii-5f6d3bc5a7:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 1st day of February, were born into the better life:

          The holy martyr Ignatius, who ruled the church of Antioch as the third Bishop of that See in succession to the blessed Apostle Peter.
          In the persecution under the Emperor Trajan he was condemned to be killed by wild beasts, and was sent to Rome in chains by command of the emperor. There, in the presence of the Senate, he was first put to most grievous torments and then thrown to lions, the which throttled him with their teeth, and so he was made Christ's offering, (in the year 107.)
          At Smyrna, the holy martyr Pionius. He was a Priest who had written much controversial matter on behalf of the Christian faith. After suffering a foul imprisonment, during the which he strengthened many brethren by his exhortations to the enduring of martyrdom, he was put to many tortures and nailed upon a pyre, where he obtained a blessed end by being burnt for Christ's sake. And with him suffered fifteen others, (in the year 251.)
          At Ravenna, holy Severus, (in the year 389,) Bishop of that city, to the which place he was chosen, on account of his extraordinary merits, through a miraculous sign in the form of a dove.
          At Tron, in Gaul, (in the fifth century,) holy Paul, Bishop of that see, whose life shone with grace, and the preciousness of whose death is attested by miracles.
          Upon the same day, holy Ephrem, Deacon of the church of Edessa, who after much work for the faith of Christ fell asleep in the Lord, eminent for holiness and teaching, in the time of the Emperor Valens, (in the year 378.)
          In Ireland, (in the year 523,) the holy Virgin Brigid. At the moment that she bowed down her head to receive the hallowed veil, she chanced to touch the wooden steps of the altar with her hand, and in witness to her virginity the dry wood at once became green.
          At Florence, in Tuscany, the blessed Virgin Veridiana, recluse, of the Order of Vallombrosa, (Castel Florentin, 1242.)
      la:
      - type: text
        text: |-
          Kaléndis Februárii

          Sancti Ignátii, Epíscopi Antiochéni et Mártyris, qui glorióse martýrium consummávit tertiodécimo Kaléndas Ianuárii.
          Smyrnæ sancti Piónii, Presbýteri et Mártyris; qui, post apologías pro fide Christiána conscríptas, post squalórem cárceris, ubi multos fratrum ad martýrii tolerántiam suis exhortatiónibus roborávit, tandem, cruciátibus multis vexátus, clavis confíxus et ardénti rogo superpósitus, beátum pro Christo finem sortítus est. Cum ipso autem et álii quíndecim passi sunt.
          Ravénnæ sancti Sevéri Epíscopi, qui, ob præclára mérita, signo colúmbæ fuit eléctus.
          In civitáte Tricastína, in Gállia, sancti Pauli Epíscopi, cuius vita virtútibus cláruit, et mors pretiósa miráculis commendátur.
          Apud Kildáriam, in Hibérnia, sanctæ Brígidæ Vírginis, quæ cum lignum altáris tetigísset in testimónium virginitátis suæ, lignum ipsum statim víride factum est.
          Apud Castrum Florentínum, in Etrúria, beátæ Viridiánæ, Vírginis reclúsæ, ex Ordine Vallis Umbrósæ.
      en2:
      - type: text
        text: |-
          The First of February
      
          Saint Ignatius, Bishop of Antioch and Martyr, who gloriously completed his martyrdom on the twentieth of December.
          At Smyrna, Saint Pionius, Priest and Martyr; who, after composing apologies in defense of the Christian faith, after the squalor of prison — where by his exhortations he strengthened many of the brethren to endure martyrdom — at last, tormented by many sufferings, pierced with nails and placed upon a burning pyre, received a blessed end for Christ. With him also fifteen others suffered.
          At Ravenna, Saint Severus, Bishop, who on account of his distinguished merits was chosen by the sign of a dove.
          In the city of Tricastina, in Gaul, Saint Paul, Bishop, whose life was renowned for virtues and whose precious death is commended by miracles.
          Near Kildare, in Ireland, Saint Brigid, Virgin, who, when she touched the wood of the altar as a testimony of her virginity, the very wood immediately became green.
          Near Castel Fiorentino, in Etruria, the blessed Verdiana, enclosed Virgin, of the Order of Vallombrosa.
  psalm.kal-ndis-i-lii-408ae00665:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is the Octave of the Birth of the holy Baptist John.
          Upon the same 1st day of July, was born into the better life:

          On Mount Hor, holy Aaron, the first High Priest of the tribe of Levi.
          In Britain, the holy martyrs Julius and Aaron, who suffered in the persecution under Diocletian, after holy Alban at the which time there were very many there who suffered diverse torments and were most cruelly mangled, and so finished their fight, and went to be glad for ever in the Jerusalem which is above.
          At Mondragone, in Latium, the holy Bishops Castus and Secundinus, both martyrs.
          At Vienne, holy Martin, Bishop [of that see,] a disciple of the Apostles.
          In Auvergne, [in the sixth century,] holy Gallus, Bishop [of Clermont.]
          In the country of Lyon, the holy Domitian, Abbot [of Bebron,] the first who there led an hermit's life. He gathered very many together there to serve God, and was gathered unto his fathers in a good old age, very famous for great graces, and for glorious and wonderful works.
          In the country of Reims, the holy Priest Theodoric, a disciple of blessed Bishop Rémy.
          At Angoulême, [in the sixth century,] the holy Abbot Eparchius.
          At Hums, in Syria, [likewise in the sixth century,] the holy Confessor Simeon, whose surname was Sali. He became a fool for Christ's sake, but God showed by great miracles how deep was his wisdom.
          At Vicenza, [in the eleventh century,] the holy Hermit Theobald, of the family of the Earls of Campania, whose name Pope Alexander III added to the list of the Saints on account of his fame for holiness and miracles.
      la:
      - type: text
        text: |-
          Kaléndis Iúlii

          Festum pretiosíssimi Sánguinis Dómini nostri Iesu Christi.
          In monte Hor deposítio sancti Aaron, primi ex órdine Levítico Sacerdótis.
          Viénnæ, in Gállia, sancti Martíni Epíscopi, Apostolórum discípuli.
          Sinuéssæ, in Campánia, sanctórum Mártyrum Casti et Secundíni Episcopórum.
          In Británnia sanctórum Mártyrum Iúlii et Aaron, qui post sanctum Albánum, in persecutióne Diocletiáni Imperatóris, passi sunt; quo témpore ibídem quamplúrimi, divérsis cruciátibus torti et sævíssime laceráti, ad supérnas civitátis gáudia, consummáto agóne, pervenérunt.
          Arvérnis, in Gállia, sancti Galli Epíscopi.
          In território Lugdunénsi deposítio sancti Domitiáni Abbátis, qui primus illic eremíticam vitam exércuit, et, cum plúrimos ibi in Dei servítio congregásset, tandem, magnis virtútibus et gloriósis miráculis valde clarus, ad patres, in senectúte bona, colléctus est.
          Engolísmæ, in Gállia, sancti Epárchii Abbátis.
          In território Rheménsi sancti Theodoríci Presbýteri, qui fuit discípulus beáti Remígii Epíscopi.
          Apud Eméssam, in Phœnícia, sancti Simeónis Confessóris, cognoménto Sali, qui stultus propter Christum factus est; sed altam eius sapiéntiam Deus magnis miráculis declarávit.
      en2:
      - type: text
        text: |-
          The First of July
      
          The Feast of the Most Precious Blood of our Lord Jesus Christ.
          On Mount Hor, the deposition of Saint Aaron, the first Priest of the Levitic order.
          At Vienne, in Gaul, Saint Martin, Bishop, disciple of the Apostles.
          At Sinuessa, in Campania, the holy Martyr Bishops Castus and Secundinus.
          In Britain, the holy Martyrs Julius and Aaron, who suffered after Saint Alban in the persecution of the Emperor Diocletian; at which time very many there, tortured by various torments and most cruelly mangled, came, their contest complete, to the joys of the heavenly city.
          At Clermont, in Gaul, Saint Gallus, Bishop.
          In the territory of Lyons, the deposition of Saint Domitian, Abbot, who first practiced the eremitic life there, and, having gathered many into the service of God in that place, was at last most renowned for great virtues and glorious miracles and was gathered to his fathers in a good old age.
          At Angoulême, in Gaul, Saint Eparchius, Abbot.
          In the territory of Reims, Saint Theoderic, Priest, who was a disciple of the blessed Bishop Remigius.
          Near Emesa, in Phoenicia, Saint Simeon, Confessor, surnamed Salos, who became a fool for Christ; but God declared his deep wisdom by great miracles.
  psalm.kal-ndis-i-nii-4b11c5381c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 1st day of June, were born into the better life:

          At Rome, the holy martyr Juventius.
          At Caesarea, in Palestine, [in the year 308,] the blessed martyr Pamphilus, the Priest. He was a man wonderful for his holiness, his teaching, and his goodness towards the poor. In the persecution under the Emperor Galerius Maximian, he was first tortured for Christ's faith's sake, under the President Urban, and cast into prison then under Fermilian he was called back again to suffer, and then along with others finished his testimony. There then suffered also the Deacon Valens, Paul, and nine others whose memory is celebrated upon other days.
          At Autun, [in the year 273,] holy Reverian, Bishop [of that see,] the Priest Paul, and ten others, who were crowned with martyrdom under the Emperor Aurelian.
          In Cappadocia, the holy martyr Thespesius, who, after being tortured, was beheaded under the Emperor Alexander Severus and the Prefect Simplicius.
          In Egypt, the holy martyrs, the sergeant Ischyrion, and five other soldiers, who were put to diverse kinds of death, under the Emperor Diocletian, for believing in Christ; also the holy martyr Firmus, who, in the persecution under Maximian, was terribly scourged, bruised with stones, and at last beheaded.
          At Perugia, the holy soldiers Felin and Gratinian, who were diversely tormented under the Emperor Decius, and by a glorious death obtained the palm of martyrdom.
          At Bologna, the holy martyr Proculus, who suffered under the Emperor Maximian.
          At Amelia, the holy martyr Secundus, who was thrown into the Tiber, under the Emperor Diocletian, and so finished his testimony.
          At Citta-di-Castello, in Umbria, the holy Roman soldier Crescentian, who was crowned with martyrdom under the same Emperor Diocletian.
          In Umbria also, [in the year 400,] the holy Priest Fortunatus, famous for graces and wonders.
          At the Monastery of Lerins, [in the year 430,] the holy Abbot Caprasius.
          At Trier, [in the year 1035,] the holy monk Simeon, who was enrolled among the Saints by Pope Benedict IX.
          At Burgos, in Spain, [in the year 1037,] in the Monastery of Ogna, the holy Benedictine Abbot Enecon, illustrious for his holiness and the fame of his miracles.
      la:
      - type: text
        text: |-
          Kaléndis Iúnii

          Sanctæ Angelæ Meríci Vírginis, ex tértio Ordine sancti Francísci; quæ fuit Institútrix Societátis Vírginum sanctæ Ursulæ, et ad accipiéndam corónam immarcescíbilem, sexto Kaléndas Februárii cælésti Sponso vocáta est.
          Romæ sancti Iuvéntii Mártyris.
          Augustodúni sanctórum Reveriáni Epíscopi, et Pauli Presbýteri, cum áliis decem, qui, sub Aureliáno Príncipe, martýrio coronáti sunt.
          Cæsaréæ, in Palæstína, beáti Pámphili, Presbýteri et Mártyris, viri admirándæ sanctitátis et doctrínæ, atque in páuperes munífici; qui, ob Christi fidem, in persecutióne Galérii Maximiáni, primum, sub Urbáno Prǽside, cruciátus et in cárcerem trusus, deínde, sub Firmiliáno, íterum revocátus ad pœnas, una cum áliis martýrium consummávit. Passi sunt étiam tunc Valens Diáconus, et Paulus, aliíque novem; quorum memória áliis diébus celebrátur.
          In Cappadócia sancti Thespésii Mártyris, qui, sub Alexándro Imperatóre et Simplício Præfécto, post ália torménta, decollátus est.
          In Ægýpto sanctórum Mártyrum Ischyriónis, ductóris mílitum, et aliórum quinque mílitum; qui, sub Diocletiáno Imperatóre, pro fide Christi, divérso mortis génere perémpti sunt.
          Item sancti Firmi Mártyris, qui, in persecutióne Maximiáni, acerbíssimis plagis afféctus, lapídibus percússus, ac demum cápite cæsus est.
          Perúsiæ sanctórum Mártyrum Felíni et Gratiniáni mílitum, qui, sub Décio, váriis torméntis cruciáti, martýrii palmam gloriósa morte percepérunt.
          Bonóniæ sancti Próculi Mártyris, qui sub Maximiáno Imperatóre passus est.
          Amériæ, in Umbria, sancti Secúndi Mártyris, qui sub Diocletiáno, in Tíberim proiéctus, martýrium consummávit.
          Apud Tiférnum, in Umbria, sancti Crescentiáni, mílitis Románi, qui, sub eódem Imperatóre, martýrio coronátus est.
          In monastério Lirinénsi, in Gállia, sancti Caprásii Abbátis.
          In monastério Onniénsi, apud Burgos, in Hispánia, sancti Enecónis, Abbátis Benedictíni, ob sanctitátis et miraculórum glóriam illústris.
          Apud Montem Falcum, in Umbria, sancti Fortunáti Presbýteri, virtútibus et miráculis clari.
          Tréviris sancti Simeónis Mónachi, qui a Benedícto Papa Nono in Sanctórum númerum relátus est.
      en2:
      - type: text
        text: |-
          The First of June
      
          Saint Angela Merici, Virgin, of the Third Order of Saint Francis; who was the Foundress of the Society of the Virgins of Saint Ursula, and was called to her incorruptible crown by her heavenly Spouse on the twenty-seventh of January.
          At Rome, Saint Juventius, Martyr.
          At Autun, the holy Martyrs Reverianus, Bishop, and Paul, Priest, with ten others, who, under the Emperor Aurelian, were crowned with martyrdom.
          At Caesarea, in Palestine, the blessed Pamphilus, Priest and Martyr, a man of admirable holiness and learning, and generous toward the poor; who, for the faith of Christ, in the persecution of Galerius Maximian, was first tortured and cast into prison under the Governor Urbanus, then, under Firmilianus, recalled again to punishments and completed his martyrdom together with others. At that time also Valens, Deacon, and Paul, and nine others suffered; their commemoration is celebrated on other days.
          In Cappadocia, Saint Thespesios, Martyr, who, under the Emperor Alexander and the Prefect Simplicius, after other torments, was beheaded.
          In Egypt, the holy Martyrs Ischyrion, commander of soldiers, and five other soldiers; who, under the Emperor Diocletian, for the faith of Christ, were killed by various kinds of death.
          Likewise, Saint Firmus, Martyr, who, in the persecution of Maximian, was afflicted with most bitter stripes, struck with stones, and finally beheaded.
          At Perugia, the holy Martyr soldiers Felinus and Gratinianus, who, under Decius, tormented by various punishments, received the palm of martyrdom in a glorious death.
          At Bologna, Saint Proculinus, Martyr,
  psalm.kal-ndis-ianu-rii-62751a3ca8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Octave of the Birth of our Lord Jesus Christ, upon the which day is commemorated His Circumcision.
          Upon the same 1st day of January, were born into the better life:

          At Rome, the holy martyr Almachius, who was slain by gladiators (about the year 404) at the command of Alpius, prefect of the city, because he said: "This is the Octave of the Lord's Birth, cease from your idolatrous superstitions, and your unclean sacrifices." Likewise at Rome, upon the Appian Way, thirty holy soldiers who were crowned with martyrdom, under the Emperor Diocletian.
          Likewise at Rome, the holy virgin Martina, who was put to diverse torments, under the Emperor Alexander, and at length gained the crown of martyrdom by the sword, whose feast we keep upon the 30th day of the month of January.
          At Spoleto, in the time of the Emperor Antonine, the holy martyr, the priest Concordius. He was first cudgelled, then racked, and afterwards suffered imprisonment wherein he was comforted by a visit of angels, and at length was delivered from this life by the sword.
          On the same day, the holy martyr Magnus.
          At Caesarea, in Cappadocia, the burial of the holy Basil, bishop of Caesarea (in the year 379), whose feast we keep upon the 14th day of June. Which is the day whereon he was ordained a bishop.
          In Africa, blessed Fulgentius, bishop of the Church of Ruspa (in the year 508), who at the time of the persecution under the Vandals, suffered much at the hands of the Arians because of his Catholic faith, and his eminent teaching. He was exiled to Sardinia (in the year 510); but was at length (in the year 523) allowed to return to his own church, where (in the year 533) he died a holy death, famous for his life and his words.
          At Chieti, in Abruzzo Citeriore, holy Justin, bishop of that city, famous for the holiness of his life, and for the miracles worked through him (in the year 543).
          At the monastery of St. Claude, upon the Jura Mountains, in the country of Lyon, holy (4th) Eugendus, Abbot (of Condat), whose life was illustrious for his graces and miracles (in the year 510).
          At Senlis (in the year 1049), holy Odilo, (6th) Abbot of Cluny (elected in the year 994), who first commanded that in his monasteries a commemoration of all the faithful departed should be made upon the first day after the festival of All Saints, the which custom the Universal Church hath since approved by adopting it.
          At Monte Senario, in Tuscany, the blessed confessor Bonfiglio, one of the seven founders of the order of servants of the Blessed Virgin Mary, to whom he was devoted and by whom he was suddenly called away to heaven (in the year 1262).
          At Alexandria (in the year 470), the burial of the holy virgin Euphrosyne, who shone in her nunnery as a great light by the power of her self-denial and her miracles.
      la:
      - type: text
        text: |-
          Kaléndis Ianuárii

          Octáva Nativitátis Dómini nostri Iesu Christi.
          Circumcísio eiúsdem Dómini nostri Iesu Christi.
          Romæ pássio sanctæ Martínæ, Vírginis et Mártyris; quæ, sub Alexándro Imperatóre, divérsis tormentórum genéribus cruciáta, tandem, gládio percússa, martýrii palmam adépta est. Ipsíus vero festum tértio Kaléndas Februárii recólitur.
          Cæsaréæ, in Cappadócia, deposítio sancti Basilíi, cognoménto Magni, Epíscopi, Confessóris et Ecclésiæ Doctóris; qui, témpore Valéntis Imperatóris, doctrína et sapiéntia insignítus omnibúsque virtútibus exornátus, mirabíliter effúlsit, et Ecclésiam advérsus Ariános et Macedoniános inexpugnábili constántia deféndit. Eius autem festívitas potíssimum ágitur décimo octávo Kaléndas Iúlii, quo die Epíscopus ordinátus est.
          Apud montem Senárium, in Etrúria, natális sancti Bonfílii Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis, quam cum idem impénse coluísset, ab ipsa in cælum repénte evocátus est. Illíus porro ac Sociórum festum prídie Idus Februárii celebrátur.
          Romæ sancti Almáchii Mártyris, qui, cum díceret: «Hodie Octavæ Domínici diéi sunt, cessáte a superstitiónibus idolórum et a sacrifíciis pollútis,» proptérea, iubénte Præfécto Urbis Alípio, a gladiatóribus occísus est.
          Item Romæ, via Appia, corónæ sanctórum mílitum trigínta Mártyrum, sub Diocletiáno Imperatóre.
          Apud Spolétum sancti Concórdii, Presbýteri et Mártyris; qui, tempóribus Antoníni Imperatóris, primo cæsus fústibus, dehinc equúleo suspénsus, ac póstea macerátus in cárcere, ibíque Angélica visitatióne confortátus, demum gládio vitam finívit.
          Eódem die sancti Magni Mártyris.
          In Africa beáti Fulgéntii, Ruspénsis Ecclésiæ Epíscopi, qui, témpore Wandálicæ persecutiónis, ob cathólicam fidem eximiámque doctrínam, ab Ariánis multa perpéssus et in Sardíniam relegátus est; atque tandem, ad própriam Ecclésiam redíre permíssus, vita et verbo clarus, sancto fine quiévit.
          Teáte, in Aprútio citerióre, natális sancti Iustíni, eiúsdem civitátis Epíscopi, sanctitáte vitæ ac miráculis clari.
          In território Lugdunénsi, monastério Iurénsium, sancti Eugéndi Abbátis, cuius vita virtútibus et miráculis plena refúlsit.
          Apud Silviníacum, in Gállia, sancti Odilónis, Abbátis Cluniacénsis, qui primus Commemoratiónem ómnium Fidélium Defunctórum, prima die post festum ómnium Sanctórum, in suis monastériis fíeri præcépit; quem ritum póstea universális Ecclésia recípiens comprobávit.
          Romæ natális sancti Vincéntii Maríæ Strambi, Epíscopi Maceraténsis et Tolentíni, Congregatiónis a Cruce et Passióne Iesu sodális, pastoráli zelo præclári, quem Pius Papa Duodécimus inter Sanctos rétulit.
          Alexandríæ deposítio sanctæ Euphrósynæ Vírginis, quæ in monastério virtúte abstinéntiæ ac miráculis cláruit.
      en2:
      - type: text
        text: |-
          The First of January
      
          The Octave of the Nativity of our Lord Jesus Christ.
          The Circumcision of the same our Lord Jesus Christ.
          At Rome, the passion of Saint Martina, Virgin and Martyr; who, under the Emperor Alexander, after various
  psalm.kal-ndis-m-rtii-a0d2684977:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor David, Archbishop of Caerleon upon Usk.
          Upon the same 1st day of March, were also born into the better life:

          At Rome, two hundred and sixty holy martyrs whom for Christ's name's sake the Emperor Claudius first condemned to dig sand outside the Salarian Gate, and then to be shot to death with arrows in the amphitheatre.
          Likewise the holy martyrs Leo, Donatus, Abundantius, Nicephorus, and nine others.
          At Marseilles, [in the year 290,] the holy martyrs Hermes and Hadrian.
          At Heliopolis, [in 114,] the holy martyr Eudocia [of Samaria, now Balbek in Turkey-in-Asia,] during the persecution under the Emperor Trajan. She was baptized by Theodotus, Bishop of [Heliopolis,] and, armed for the battle, the President Vincentius ordered her to be smitten with the sword, and thus she received the crown of martyrdom.
          Upon the same day, the holy martyr Antonina. During the persecution under the Emperor Diocletian she laughed at the gods of the Gentiles, for the which cause she was diversely tortured, shut up in a barrel, and drowned in the marsh at the city of Cea.
          At Werdt, [in the year 713,] holy Swibert, Bishop of that city, [Apostle of the Frisians,] who in the time of Pope Sergius preached the gospel to the Frisians, Hollanders, and other peoples of Lower Germany.
          At Angers, [in the year 550,] the holy Confessor Albinus, Bishop of that see, a man of eminent graces and holiness.
          At Mans, [in the year 687,] the holy Siviard, Abbot [of Saint Calais.]
          At Perugia is commemorated the translation [in the year 547] of the holy martyr Herculanus, Bishop of that see, of whom mention is made upon the 7th day of November. He was beheaded by order of Totila, King of the Goths, and it is written by holy Pope Gregory that, forty days after his head was cut off, head and body were found united again, as though the iron had never touched him.
      la:
      - type: text
        text: |-
          Kaléndis Mártii

          Romæ sanctórum Mártyrum ducentórum sexagínta, quos iussit primo Cláudius, pro Christi nómine damnátos, extra portam Saláriam arénam fódere, deínde in amphitheátro sagíttis mílitum intérfici.
          Item natális sanctórum Mártyrum Leónis, Donáti, Abundántii, Nicéphori et aliórum novem.
          Massíliæ, in Gállia, sanctórum Mártyrum Hermétis et Hadriáni.
          Heliópoli, apud Líbanum, sanctæ Eudóciæ Mártyris, quæ, in persecutióne Traiáni, a Theódoto Epíscopo baptizáta et ad certámen muníta, ibídem, Vincéntii Prǽsidis iussu percússa gládio, martýrii corónam accépit.
          Eódem die sanctæ Antonínæ Mártyris, quæ in persecutióne Diocletiáni, cum Gentílium deos irrisísset, ídeo, post vários cruciátus, in vase quodam inclúsa, in palúdem urbis Ceæ demérsa est.
          Romæ natális sancti Felícis Papæ Tértii, qui sancti Gregórii Magni átavus fuit; qui étiam (ut ipse Gregórius refert), sanctæ Tharsíllæ nepti appárens, illam ad cæléstia regna vocávit.
          Apud civitátem Werdam sancti Suitbérti Epíscopi, qui, témpore sancti Sérgii Papæ Primi, apud Frísones, Bátavos et álios Germániæ pópulos Evangélium prædicávit.
          Andégavi, in Gállia, sancti Albíni, Epíscopi et Confessóris, viri præclaríssimæ virtútis et sanctitátis.
          Apud Cenómanos, in Gállia, sancti Siviárdi Abbátis.
          Perúsiæ Translátio sancti Herculáni, Epíscopi et Mártyris, qui iussu Totílæ, Gothórum Regis, decollátus est. Ipsíus autem corpus ita cápiti unítum atque sanum, quadragésimo post abscissiónem die (ut scribit sanctus Gregórius Papa), repértum est, ac si nulla ferri incísio illud tetigísset.
      en2:
      - type: text
        text: |-
          The First of March
      
          At Rome, two hundred and sixty holy Martyrs, whom Claudius first ordered — condemned for the name of Christ — to dig sand outside the Salarian gate, and then to be shot with soldiers' arrows in the amphitheater,
  psalm.kal-ndis-maii-df7a71a743:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the ist day of May, were born into the better life:

          The blessed Apostles Philip and James. Philip brought nearly all Scythia to believe in Christ, but in the end, at the city of Hierapolis, in Asia, was fastened to a cross and stoned, and so fell asleep gloriously, [in the year 61.] James, who is written of as the brother of the Lord, and was the first Bishop of Jerusalem, was cast down from a pinnacle of the temple, whereby his legs were broken, and he was slain by a blow upon the head from a fuller's pole, and buried there not far from the temple.
          In Egypt, the holy prophet Jeremiah, who was stoned by the people at Taphnis, and so there died, [590 B.C.,] and was buried. Holy Epiphanius saith that the faithful have been in use to pray at his grave and to take dust therefrom, whereby the bites of serpents are healed.
          In the territory of Viviers, in Gaul, the blessed subdeacon Andeolus, whom holy Polycarp sent from the East along with others into Gaul to preach the Word of God. Under the Emperor Severus he was beaten with thorny clubs, and at length his head was broken into four parts with a wooden sword, and so he attained to martyrdom, [in the year 208.]
          At Huesca, in Spain, the holy martyrs Orentius and Patience.
          At Sedune, in Gaul, holy Sigismund, King of the Burgundians, who was drowned in a well, and so died, [in the year 524,] and was afterwards famous for miracles.
          At Auxerre, [in the year 524,] the holy Confessor Amator, Bishop of that see.
          At Auch, [in the fifth century,] holy Orientius, Bishop of that see.
          In England, [in the year 778,] holy Asaph, Bishop of the see which is called by his name, and the holy Virgin Walburga, whose feast we keep upon the 14th day of May.
          At Bergamo, the holy widow Grata.
          At Forli, holy Peregrinus, of the Order of Servants of the Blessed Virgin Mary.
      la:
      - type: text
        text: |-
          Kaléndis Maii

          Solémnitas sancti Ioseph Opíficis, Sponsi beátæ Maríæ Vírginis, Confessóris, opíficum Patróni.
          Romæ natális sancti Pii Quinti, ex Ordine Prædicatórum, Papæ et Confessóris; qui, ecclesiásticæ disciplínæ restituéndæ, hærésibus exstirpándis et Christiáni nóminis hóstibus conteréndis strénue ac felíciter incúmbens, vitæ ac legum sanctitáte cathólicam Ecclésiam gubernávit. Ipsíus autem festívitas tértio Nonas mensis huius celebrátur.
          In Ægýpto sancti Ieremíæ Prophétæ, qui, a pópulo lapídibus óbrutus, apud Taphnas occúbuit, ibíque sepúltus est; ad cuius sepúlcrum fidéles (ut refert sanctus Epiphánius) supplicáre consuevérunt, índeque sumpto púlvere, áspidum mórsibus medéntur.
          In território Vivariénsi, in Gálliis, beáti Andéoli Subdiáconi, qui, una cum áliis, a beáto Polycárpo, Smyrnénsi Epíscopo, ex Oriénte in Gálliam ad prædicándum verbum Dei missus est. Hic, sub Sevéro Imperatóre, spinósis fústibus cæsus, demum, per ensem lígneum cápite in quátuor partes in modum crucis conscísso, martýrium consummávit.
          Oscæ, in Hispánia, sanctórum Mártyrum Oréntii et Patiéntiæ.
          Apud Colúmnam vicum, in Aurelianénsi Gálliæ território, pássio sancti Sigismúndi, Regis Burgundiónum, qui in púteum demérsus occúbuit, ac póstea miráculis cláruit. Sacrum vero ipsíus corpus, e púteo tandem extráctum, ad Ecclésiam Agaunénsis monastérii, intra Sedunénsis diœcésis términos siti, delátum est ibíque honorífice collocátum.
          Antisiodóri sancti Amatóris, Epíscopi et Confessóris.
          Auscii, in Gállia, sancti Oriéntii Epíscopi.
          Elviæ, in Anglia, sancti Asaphi Epíscopi, cuius nómine ipsa cívitas Episcopális póstmodum est insigníta.
          Foro Lívii sancti Peregríni, ex Ordine Servórum beátæ Maríæ Vírginis.
          Bérgomi sanctæ Gratæ Víduæ.
      en2:
      - type: text
        text: |-
          The First of May
      
          The Solemnity of Saint Joseph the Worker, Spouse of the Blessed Virgin Mary, Confessor, Patron of workers.
          At Rome, the birthday of Saint Pius V, of the Order of Preachers, Pope and Confessor; who, with zeal for ecclesiastical
  psalm.kal-ndis-nov-mbris-6607314070:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Feast of All the Saints. This famous feast was instituted to be held every year throughout the whole city of Rome, in honour of the Blessed Virgin Mary, Mother of God, and of all the holy martyrs, by Pope Boniface IV, after he had consecrated to Christian worship the temple called the Pantheon or Temple of all the gods. And the same festival was afterwards being kept in diverse ways in diverse churches, when Gregory IV decreed that it should be solemnly observed for ever throughout the universal Church upon the first day of November, in honour of all the Saints.
          Upon the same 1st day of November, were born into the better life:

          At Terracina, in Campania, (in the reign of the Emperor Diocletian,) the holy Deacon Caesarius, who suffered many days in prison, and was afterwards put into a sack, along with the holy Priest Julian, and cast into the sea.
          At Dijon, the holy Priest Benignus, who was sent into Gaul to preach the Gospel by blessed Polycarp, under the Emperor Marcus Aurelius. He was put to many most grievous torments by the judge Terence, who commanded at last that his neck should be struck with an iron bar and a lance thrust through his body.
          Upon the same day, the holy handmaiden Mary, who was accused of Christianity, under the Emperor Hadrian. She was grievously lashed, racked, and torn with hooks, and so suffered martyrdom.
          At Damascus, suffered the holy martyrs Caesarius, Dacius, and five others.
          In Persia, under King Sapor, the holy martyrs John the Bishop and James the Priest.
          At Tarsus, under the Emperor Maximian, holy Cyrenia and Juliana.
          (At Clermont,) in Auvergne, holy Austremonius, the first Bishop of that see.
          At Paris, (in the fifth century,) deceased the holy Marcellus, Bishop (of that see.)
          At Bayeux, in the time of Childebert, King of the Franks, holy Vigor, Bishop (of that see.)
          At Tivoli, the holy Monk Severinus.
          In the Gatinais, (in the fourth century,) the holy Confessor Maturin.
      la:
      - type: text
        text: |-
          Kaléndis Novémbris

          Festívitas ómnium Sanctórum, quam in honórem beátæ Dei Genitrícis Vírginis Maríæ et sanctórum Mártyrum Bonifátius Papa Quartus, cum templum Pántheon tértio Idus Maii dedicásset, célebrem et generálem instítuit agi quotánnis in urbe Roma. Sed et Gregórius item Quartus póstmodum decrévit, eándem festivitátem, quæ váriis modis iam in divérsis Ecclésiis celebrabátur, in honórem ómnium Sanctórum solémniter hac die ab univérsa Ecclésia perpétuo observári.
          In Pérside sanctórum Mártyrum Ioánnis Epíscopi, et Iacóbi Presbýteri, sub Sápore Rege.
          Tarracínæ, in Campánia, natális sancti Cæsárii Diáconi, qui, diébus multis in custódia macerátus, póstea, cum sancto Iuliáno Presbýtero, in saccum missus et in mare præcipitátus est.
          In castro Divióne sancti Benígni Presbýteri, qui a beáto Polycárpo missus est in Gálliam ad prædicándum Evangélium; et, postquam, sub Marco Aurélio Imperatóre, a Teréntio Iúdice gravíssimis torméntis multiplíciter est afflíctus, tandem eius collum vecte férreo tundi et corpus láncea perforári iubétur.
          Damásci pássio sanctórum Cæsárii, Dácii et aliórum quinque.
          Eódem die sanctæ Maríæ ancíllæ, quæ, Christiánæ religiónis nómine accusáta, hinc, sub Hadriáno Imperatóre, diris verbéribus afflícta, equúlei extensiónem et ungulárum laceratiónem passa, martýrium complévit.
          Tarsi, in Cilícia, sanctárum Cyréniæ et Iuliánæ Mártyrum, sub Maximiáno Imperatóre.
          Arvérnis, in Gállia, sancti Austremónii, qui fuit primus eiúsdem civitátis Epíscopus.
          Lutétiæ Parisiórum deposítio sancti Marcélli Epíscopi.
          Baiócis, in Gállia, sancti Vigóris Epíscopi, témpore Childebérti, Francórum Regis.
          Andégavi, in Gállia, deposítio sancti Licínii Epíscopi, venerábilis sanctitátis viri.
          Tíbure sancti Severíni Mónachi.
          Lyricánti, in Wastinénsi Gálliæ território, sancti Maturíni Confessóris.
      en2:
      - type: text
        text: |-
          The First of November
      
          The Feast of All Saints, which in honor of the Blessed Virgin Mary, Mother of God, and of the holy Martyrs, Pope Boniface IV, having dedicated the temple of the Pantheon on the seventh of May, celebrated
  psalm.kal-ndis-sept-mbris-5531d3a5bf:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Cardinal Raymond, surnamed the Unborn, of the Order of Blessed Mary of Ransom for the Redemption of Prisoners, a man famous for the holiness of his life and for his wonderful works, of whom mention was made yesterday.
          Upon the same 1st day of September, were born into the better life:

          In the province of Narbonne, the holy Abbot and Confessor Giles.
          At Benevento, [in the third century,] the Twelve Holy Brethren Martyrs.
          In Palestine, holy Joshua and holy Gideon.
          At Jerusalem, the blessed Prophetess Anna, whose holiness is set forth in the words of the Gospel.
          At Capua, upon the Aquarian Way, the holy martyr Priscus, who was one of the original disciples of Christ.
          At Reims, in Gaul, holy Xystus, a disciple of the blessed Apostle Peter, who was by him consecrated as the first Bishop of that city, and received the crown of martyrdom in the persecution under Nero.
          At Todi, in Umbria, [in the second century,] the holy martyr Terentian, Bishop [of that city,] who was racked and tormented with armed whips by command of the Pro-Consul Laetian, under the Emperor Hadrian, whereafter his tongue was cut out and he was condemned to be beheaded, and so finished his testimony.
          At Heraclea, [in Thrace,] the holy Deacon Ammon, and the forty holy Virgins to whom he taught the faith, and whom he led with him, under the tyrant Licinius, to the glory of martyrdom.
          In Spain, the holy martyrs Vincent and Laetus.
          At Piombino, in Tuscany, the holy martyr Regulus, who was martyred there under Totila, on his landing from Africa.
          At Sens, [in the seventh century,] the blessed Confessor Lupus, Bishop [of that see,] concerning whom it is said that one day when he was standing at the holy Altar in the presence of the clergy a precious stone fell from heaven into his chalice.
          At Capua, holy Priscus, Bishop [of that city.] He was one of those Priests who, in the persecution under the Vandals, were diversely afflicted for the Catholic faith's sake, and were put on board an old ship wherein they came from Africa to the shores of Campania, and being scattered about those parts, and set over diverse churches, they wonderfully spread abroad the Christian religion. His Companions were Castrensis, Tammatrus, Rosius, Heraclius, Secundinus, Adjutor, Mark, Augustus, Elpidius, Canion, and Vindonius.
          At Aquino, [in the sixth century,] holy Constantius, Bishop [of that see,] famous for the gift of prophecy, and for many other graces.
          At Le Mans, [in the fifth century,] holy Victorius, Bishop [of that see.]
          At Baden, in the country of Constance, the holy Virgin Verena.
      la:
      - type: text
        text: |-
          Kaléndis Septémbris

          In província Narbonénsi sancti Ægídii, Abbátis et Confessóris, cuius nómine est appellátum óppidum, quod póstea crevit in loco, ubi ipse monastérium eréxerat et mortális vitæ cursum absólverat.
          Sentiáni, in fínibus Apúliæ, pássio sanctórum Donáti et altérius Felícis; qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, iussi sunt, post vária torménta, cápite præcídi hodiérna die, in qua et festívitas aliórum ex duódecim frátribus, quorum natális respectívis diébus ágitur, institúta est celebrári. Ipsórum vero duódecim fratrum córpora Benevéntum póstea transláta sunt, ibíque honorífice asserváta.
          In Palæstína sanctórum Iósue et Gedeónis.
          Hierosólymis beátæ Annæ Prophetíssæ, cuius sanctitátem sermo Evangélicus prodit.
          Cápuæ, via Aquária, sancti Prisci Mártyris, qui fuit unus de antíquis Christi discípulis.
          Tudérti, in Umbria, sancti Terentiáni, Epíscopi et Mártyris; qui, sub Hadriáno Imperatóre, Lætiáni Procónsulis iussu, equúleo et scorpiónibus cruciátus est, ac demum, abscíssa lingua, cápitis damnátus martýrium complévit.
          Heracléæ, in Thrácia, sancti Ammónis Diáconi, et sanctárum quadragínta Vírginum, quas ille erudívit in fide, et, sub Licínio tyránno, ad martýrii glóriam secum perdúxit.
          In Hispánia sanctórum Mártyrum Vincéntii et Læti.
          Populónii, in Túscia, sancti Réguli Mártyris, qui ex Africa illuc venit, ibíque, sub Tótila, martýrium consummávit.
          Cápuæ sancti Prisci Epíscopi, qui unus fuit ex illis Sacerdótibus, qui, in persecutióne Wandalórum, ob fidem cathólicam várie afflícti et vetústæ navi impósiti, ex Africa ad Campániæ líttora pervenérunt, et Christiánam religiónem, in iis locis dispérsi diversísque Ecclésiis præfécti, mirífice propagárunt. Ipsíus autem fuérunt sócii Castrénsis, cuius dies natális tértio Idus Februárii recólitur, Támmarus, Rósius, Heráclius, Secundínus, Adiútor, Marcus, Augústus, Elpídius, Cánion et Vindónius.
          Apud Sénonas beáti Lupi, Epíscopi et Confessóris; de quo refértur quod quadam die, præsénte Clero, dum sacris altáribus adstáret, lapsa est cǽlitus gemma in eius cálicem sanctum.
          Rhemis, in Gállia, sancti Xysti, qui fuit primus eiúsdem civitátis Epíscopus.
          Apud Cenómanos, in Gállia, sancti Victórii Epíscopi.
          Apud Aquínum sancti Constántii Epíscopi, prophetíæ dono multísque virtútibus clari.
          Ad Aquas Duras, in Constantiénsi Germániæ território, sanctæ Verénæ Vírginis.
      en2:
      - type: text
        text: |-
          The First of September
      
          In the province of Narbonne, Saint Aegidius, Abbot and Confessor, after whom was named the town that later grew up in the place where he had erected a monastery and completed the course of his mortal life;
  psalm.nonas-maii-2dc60cb773:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 7th day of May, were born into the better life:

          At Krakow, in Poland, the holy Bishop and martyr Stanislaw, slain by the wicked king Boleslaw II, [in the year 1079.]
          At Tarracina, in Campania, [in the year 99,] the blessed Virgin and martyr Flavia Domitilla. She was sister's daughter to the Consul Flavius Clemens, and had been consecrated with the sacred veil by holy Clement. In the persecution under Domitian she and very many others were banished into the island of Ponza for bearing witness to Christ, and there she endured a long martyrdom. Last of all she was brought to Tarracina, where by her teaching and miracles she turned many to believe in Christ, and then finished the glorious course of her testimony by being burnt in her bed-chamber, wherein she dwelt along with her maidens Euphrosyne and Theodora. Her memory is kept upon the 12th day of May, along with that of the holy martyrs Nereus and Achilles.
          [At Benevento,] the holy martyr Juvenal, [Bishop of that see.]
          At Nicomedia, [under the Emperor Diocletian,] the holy brethren Flavius Augustus and Augustine, martyrs.
          There also, in the persecution under the Emperor Decius, the holy martyr Quadratus, who was oftentimes put to the torture, and at last beheaded.
          At Rome, [in the year 686,] the holy Pope and Confessor Benedict.
          At York, in England, [in the year 721,] the holy John [of Beverley,] Bishop [of that see,] famous for his life and miracles, whose feast we keep upon the 25th day of October.
          At Pavia, the holy Peter, Bishop [of that see.]
          At Rome is commemorated the translation of the body of the holy proto-martyr Stephen, which the Supreme Pontiff Pelagius brought to Rome from Constantinople, and laid in the sepulchre of the holy martyr Laurence, outside the walls, where it is held in great reverence by the godly.
      la:
      - type: text
        text: |-
          Nonas Maii

          Sancti Stanislái, Epíscopi Cracoviénsis et Mártyris, qui sequénti die corónam martýrii consecútus est.
          Tarracínæ, in Campánia, natális beátæ Fláviæ Domitíllæ, Vírginis et Mártyris; quæ, cum esset fília sanctæ Plautíllæ, soróris sancti Mártyris Flávii Cleméntis Cónsulis, et sacro velámine fuísset a sancto Cleménte Pontífice consecráta, primum, in persecutióne Domitiáni, ob testimónium Christi, in ínsulam Póntiam, cum áliis plúrimis, exsílio deportáta, longum illic martýrium duxit. Novíssime vero, Tarracínam dedúcta, ibi, cum plúrimos doctrína et miráculis ad Christi fidem convertísset, Iúdicis iussu incénso cubículo, in quo simul cum suis virgínibus Euphrósyna et Theodóra morabátur, cursum gloriósi martýrii consummávit. Ipsa vero Domitílla, una cum sanctis Martýribus Néreo et Achílleo atque Pancrátio, féstiva celebritáte quarto Idus mensis huius recólitur.
          Eódem die sancti Iuvenális Mártyris.
          Nicomedíæ sanctórum Mártyrum fratrum Flávii, Augústi et Augustíni.
          Ibídem sancti Quadráti Mártyris, qui, in persecutióne Décii Imperatóris, sǽpius ad torménta repetítus, demum, cápite truncátus, martýrium complévit.
          Eboráci, in Anglia, sancti Ioánnis Epíscopi, vita et miráculis clari.
          Pápiæ sancti Petri Epíscopi.
          Romæ Translátio córporis sancti Stéphani Protomártyris, quod, Pelágio Primo Summo Pontífice, e Constantinópoli ad Urbem allátum atque in sepúlcro sancti Lauréntii Mártyris in agro Veráno pósitum, ibídem magna piórum religióne cólitur.
      en2:
      - type: text
        text: |-
          The Seventh of May
      
          Saint Stanislaus, Bishop of Kraków and Martyr, who attained the crown of martyrdom on the following day.
          At Terracina, in Campania, the birthday of the blessed Flavia Domitilla, Virgin and Martyr; who, because
  psalm.nonis-apr-lis-acf28155a0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 5th day of April, were born into the better life:

          At Vannes, in Brittany, the holy Confessor Vincent, surnamed Ferrer, of the Order of Friars Preachers, who was mighty in work and in word, and brought to Christ many thousands of unbelievers, [in the year 1419.]
          At Thessalonica, the holy Virgin Irene. She hid the holy books contrary to the edict of the Emperor Diocletian, and therefore suffered imprisonment, was smitten with an arrow, and burnt with fire by order of the President Dulcetius, the same judge under whom her sisters Agape and Chionia had suffered already.
          In the island of Lesbos, suffered five holy martyrs.
          On the same day the holy martyr Zeno, who was flayed, daubed over with pitch, and cast into the fire.
          In Africa, [in the year 559 or 570,] suffered the holy martyrs who were massacred in church upon Easter day, in the persecution under the Arian king Genseric. Among them was the Reader, who was shot with an arrow through the neck, as he was in the pulpit singing the Alle​luja.
      la:
      - type: text
        text: |-
          Nonis Aprílis

          Venétiæ, in Británnia minóre, sancti Vincéntii, cognoménto Ferrérii, ex Ordine Prædicatórum, Confessóris, qui, potens ópere et sermóne, multa míllia infidélium convértit ad Christum.
          In Africa pássio sanctórum Mártyrum, qui, in persecutióne Regis Ariáni Genseríci, in die Paschæ, in Ecclésia cæsi sunt; quorum Lector, dum in púlpito «A​llelúia» cantáret, sagítta in gútture transfíxus est.
          Eódem die sancti Zenónis Mártyris, qui, pice íllitus et in ignem coniéctus, et hasta in médio rogo vulnerátus, martýrio coronátus est.
          In Lesbo ínsula pássio sanctárum quinque Vírginum, quæ gládio martýrium consummárunt.
          Thessalonícæ sanctæ Irénes Vírginis, quæ, cum sacros Libros contra Diocletiáni edíctum occultásset, ídeo, post tolerántiam cárceris, sagítta percússa est et igne cremáta, iussu Dulcétii Prǽsidis; sub quo et soróres eius simul Agape et Chiónia passæ ántea fúerant.
          Palmæ, in ínsula Maiórica, sanctæ Catharínæ Thomas, Vírginis, Canoníssæ Reguláris ex Ordine sancti Augustíni, quam Pius Papa Undécimus in sanctárum Vírginum númerum rétulit.
      en2:
      - type: text
        text: |-
          The Fifth of April
      
          At Venice, in Lesser Britain, Saint Vincent, surnamed Ferreri, of the Order of Preachers, Confessor, who, mighty in deed and word, converted many thousands of unbelievers to Christ.
          In
  psalm.nonis-aug-sti-07d452ea7e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 5th day of August is kept the dedication of the Church of St. Mary in the Snow upon the Esquiline Hill at Rome, [in the year 366.]
          Upon the same day, were born into the better life:

          At Rome, [in the year 304,] twenty three holy martyrs, who, in the persecution under Diocletian, were beheaded on the old Salarian Way, and buried there at Cucumber Hill.
          At Augsburg, [in the year 304,] the holy martyr Afra. She was turned from paganism to Christ by the teaching of the holy Bishop Narcissus, and baptized with all her house, and for confessing Christ she was burnt.
          At Ascoli, in Picenum, [in the Marches of Ancona,] the holy Bishop and martyr Emygdius, who was ordained Bishop [of that see] by holy Pope Marcellus and sent thither to preach the Gospel, and he received a crown of martyrdom for confessing Christ, under the Emperor Diocletian.
          At Antioch, [in the year 362,] the holy soldier Eusignius. He was in the hundred and tenth year of his age when he cast in the teeth of the Emperor Julian the Apostate the faith of Constantine the Great, under whom he had served, and rebuked Julian himself for a renegade from the religion of his Fathers, whereupon Julian commanded him to be beheaded.
          Also, in Egypt, the holy martyrs Cantidius, Cantidian, and Sobel.
          At Chalons[-sur-Marne,] in Gaul, holy Memmius, a Roman citizen, whom the holy apostle Peter consecrated first Bishop of that city, and who led unto Gospel truth the people committed unto him.
          At Autun, [in the year 355,] blessed Cassian, Bishop [of that see.]
          At Teano, [in Italy, about the year 346,] holy Paris, Bishop [of that see.]
          In England, [in the year 642,] the holy Oswald, King of the Northumbrians, whose acts are written by the venerable Priest Bede, [and whose feast we keep upon the 9th day of the present month of August.]
          Upon the same day, [about the year 374,] holy Nonna, the mother of blessed Gregory of Nazianzus.
      la:
      - type: text
        text: |-
          Nonis Augústi

          Romæ, in Exquíliis, Dedicátio Basílicæ sanctæ Maríæ ad Nives.
          Cataláuni, in Gállia, sancti Mémmii, civis Románi, qui, a sancto Petro Apóstolo consecrátus illíus civitátis Epíscopus, pópulum sibi commíssum ad Evangélii veritátem perdúxit.
          Romæ pássio sanctórum Mártyrum vigínti trium, qui, in persecutióne Diocletiáni, via Salária véteri, cápite obtruncáti sunt, et, ad clivum Cucúmeris, ibídem sepúlti.
          Asculi, in Picéno, sancti Emýgdii, Epíscopi et Mártyris; qui, a sancto Marcéllo Papa Epíscopus ordinátus et illuc ad prædicándum Evangélium missus, ibídem, in confessióne Christi, sub Diocletiáno Imperatóre, martýrii corónam accépit.
          Antiochíæ sancti Eusígnii mílitis, qui annum agens centésimum décimum, cum Constantíni Magni fidem, sub quo militáverat, Iuliáno Apóstatæ exprobráret, eúmque ut pátriæ pietátis desertórem redargúeret, ab eódem iussus est cápite cædi.
          Item sanctórum Mártyrum Ægyptiórum Cantídii, Cantidiáni et Sobélis.
          Augústæ Vindelicórum natális sanctæ Afræ Mártyris, quæ, cum esset pagána, per doctrínam sancti Narcíssi Epíscopi ad Christum est convérsa, et, cum ómnibus domus suæ membris, ab eódem Epíscopo baptizáta; póstmodum vero, ob Christi confessiónem igni trádita, martýrium suum, septem diébus ántequam beáta Hilária mater ac tres ancíllæ eódem cruciátus génere coronaréntur, felíciter explévit.
          Augustodúni beáti Cassiáni Epíscopi.
          Apud Theánum, in Campánia, sancti Páridis Epíscopi.
          In Anglia sancti Oswáldi Regis, cuius gesta sanctus Beda Venerábilis commémorat.
          Eódem die sanctæ Nonnæ, quæ fuit mater beatórum Gregórii Nazianzéni, Cæsárii et Gorgóniæ.
      en2:
      - type: text
        text: |-
          The Fifth of August
      
          At Rome, on the Esquiline, the Dedication of the Basilica of Our Lady of the Snows.
          At Châlons, in Gaul, Saint Memmius, a Roman citizen, who, consecrated Bishop of that city by the holy Apostle Peter,
  psalm.nonis-dec-mbris-1a25f4ac73:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep in England the feast of the holy Confessor Brian, first Bishop of Dorchester, of whom mention is made upon the 3rd day of this present month of December.
          Upon the same 5th day of December, were born into the better life:

          At Mutalasque, in Cappadocia, the holy Saba, Abbot (in Palestine in the year 531,) who shone in Palestine as a marvellous example of holiness, and toiled manfully for the Catholic faith against those that impugned the holy Council of Chalcedon, (held in the year 451.)
          At Thebeste, in Africa, holy Crispina, (of Thagara,) a woman of very high rank, who refused to sacrifice to idols, in the days of the Emperors Diocletian and Maximian, and was therefore beheaded by command of the Pro-consul Anolinus, (in the year 304.) Holy Augustin doth oftentimes speak in her praise.
          At Thagara, in Africa, the holy martyrs Julius, Potamia, Crispin, Felix, Gratus, and seven others.
          At Nice, upon the river Var, holy Bassus, Bishop (of that see, in the third century.) In the persecution under the Emperors Decius and Valerian the President Perennius caused him for Christ's faith's sake to be racked, burnt with plates of white-hot metal, beaten with cudgels and loaded scourges, cast into the fire, and when he came out therefrom unharmed, to be pierced with two nails, and so he achieved an illustrious martyrdom.
          At Pavia, the holy martyr Dalmatius, Bishop (of that see,) who suffered in the persecution under the Emperor Maximian, (in the year 304.)
          At Pentinia, in the Abruzzi, the holy martyr Pelinus, Bishop of Brindisi.
          In the days of the Emperor Julian the Apostate a temple of Mars fell down in answer to his prayer, wherefore the heathen priests beat him direfully, and he earned the crown of martyrdom by eighty-five wounds, (about the year 362.)
          Likewise, (in the sixth century,) the holy martyr Anastasius, whose desire for martyrdom caused him to show himself of his own will to the persecutors.
          At Trier, (about the year 566,) holy Nicetius, Bishop (of that see,) a man of wonderful holiness. (Two of his works are still extant.)
          At Polybotus, in Asia, holy John, called the Wonder-worker, Bishop (of that see in the time of the Emperor Leo the Isaurian.)
      la:
      - type: text
        text: |-
          Nonis Decémbris

          In Iudǽa sancti Sabbæ Abbátis, in óppido Cappadóciæ Mútala orti, qui miro sanctitátis exémplo refúlsit, et pro fide cathólica, advérsus impugnántes sanctam Sýnodum Chalcedonénsem, strénue laborávit, ac tandem in ea diœcésis Hierosolymitánæ laura, quæ ipsíus sancti Sabbæ nómine póstmodum est insigníta, requiévit in pace.
          Níciæ, apud Varum flúvium, sancti Bassi Epíscopi, qui, in persecutióne Décii et Valeriáni, a Perénnio Prǽside, ob Christi fidem, equúleo tortus, láminis candéntibus ustus, fústibus et scorpiónibus cæsus, in ignem missus, et, cum inde evasísset illǽsus, duóbus clavis confíxus, illústre martýrium consummávit.
          Pápiæ sancti Dalmátii, Epíscopi et Mártyris; qui in persecutióne Maximiáni passus est.
          Corfínii, in Pelígnis, sancti Pelíni, Epíscopi Brundusíni, qui, cum ob eius oratiónem, sub Iuliáno Apóstata, templum Martis corruísset, a templórum Pontifícibus diríssime cæsus est, atque, octogínta et quinque vulnéribus confóssus, martýrii corónam proméruit.
          Item sancti Anastásii Mártyris, qui, præ ardóre martýrii, sponte se persecutóribus óbtulit.
          Thagúræ, in Africa, sanctórum Mártyrum Iúlii, Potámiæ, Crispíni, Felícis, Grati et aliórum septem.
          Thebéste, in Numídia, sanctæ Crispínæ, nobilíssimæ féminæ, quæ, tempóribus Diocletiáni et Maximiáni, cum sacrificáre nollet, iussu Anolíni Procónsulis decolláta est; quam sanctus Augustínus sæpe láudibus celébrat.
          Tréviris sancti Nicétii Epíscopi, miræ sanctitátis viri.
          Polýboti, in Asia, sancti Ioánnis Epíscopi, cognoménto Thaumatúrgi.
      en2:
      - type: text
        text: |-
          The Fifth of December
      
          In Judea, Saint Sabas, Abbot, born in the town of Mutalasa in Cappadocia, who shone as a wondrous example of holiness, and, for the catholic faith, strenuously fought against those who attacked the holy Council of Chalcedon;
  psalm.nonis-febru-rii-41a438481c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 5th day of February, were born into the better life:

          At Catania, in Sicily, (in the year 251) the holy Virgin and martyr Agatha. In the time of the Emperor Decius, under the Judge Quinctian, she endured buffeting and imprisonment, racking and torments. Her breasts were cut off, and she was rolled upon potsherds and coals, and at last died in prison, in prayer to God.
          In Pontus, are commemorated very many holy martyrs in the persecution under the Emperor Maximian, (fourth century.) Some had molten lead poured upon them, some were tortured by having sharp reeds thrust under their nails, and were tormented with many most grievous sufferings, which were renewed again and again, and so by their illustrious passion earned palms and crowns from the Lord.
          At Alexandria, the holy martyr Isidore, who in the persecution under the Emperor Decius was beheaded by Numerian, chief of the army, for Christ's faith's sake.
          In the empire of Japan, [in the year 1597] twenty-six holy martyrs, [some Franciscans, some their pupils, and three Jesuits killed at Nagasaki,] who were crucified, and then died gloriously, transfixed with spears, while they were praising God and proclaiming His Gospel, whose names were enrolled among those of the saints by the supreme Pontiff Pius IX.
          At Vienne, (in Dauphinais,) the blessed Confessor Avitus, (in the year 525,) Bishop of that see, by whose faith, labour, and wonderful teaching Gaul was shielded against the Arian heresy.
          At Brixen, holy Genuinus, (or Ingenuinus, in the year 640,) Bishop (of Siben, in the Tyrol,) and Albinus, (in the year 1015,) Bishop [of Brixen,] whose lives were rendered glorious by miracles.
      la:
      - type: text
        text: |-
          Nonis Februárii

          Cátanæ, in Sicília, natális sanctæ Agáthæ, Vírginis et Mártyris; quæ, tempóribus Décii Imperatóris, sub Quinctiáno Iúdice, post álapas et cárcerem, post equúleum et torsiónes, post mamillárum abscissiónem, post volutatiónem in téstulis et carbónibus, tandem in cárcere, Deum precans, consummáta est.
          Nangasáchii, in Iapónia, pássio vigínti sex Mártyrum, e quibus tres Sacerdótes atque unus Cléricus et duo Láici ad Ordinem Minórum, tres, et in eis unus quidem Cléricus, ad Societátem Iesu, ac septémdecim ad tértium sancti Francísci Ordinem revocántur. Hi omnes pro cathólica fide, in crucem acti et lanceárum íctibus perfóssi, inter divínas laudes eiusdémque fídei prædicatiónem, glorióse occubuérunt; et a Pio nono, Pontífice Máximo, Sanctórum fastis adscrípti sunt.
          In Ponto commemorátio plurimórum sanctórum Mártyrum, in persecutióne Maximiáni; quorum álii plumbo liquénti perfúsi, álii acútis arundínibus in únguibus cruciáti, ac multis horréndis vexáti torméntis, iisdémque sǽpius iterátis, palmas a Dómino et corónas illústri passióne meruérunt.
          Alexandríæ sancti Isidóri, mílitis et Mártyris; qui, in persecutióne Décii, a Numeriáno, exércitus Duce, ob Christi fidem, cápite cæsus est.
          Viénnæ beáti Avíti, Epíscopi et Confessóris, cuius fide, indústria atque admirábili doctrína ab Ariánæ hǽresis infestatióne sunt Gálliæ defénsæ.
          Sabióne, in Rhǽtia secúnda, sancti Ingenuíni Epíscopi, cuius vita miráculis éxstitit gloriósa. Sacrum vero ipsíus corpus Brixinónem póstea translátum fuit, ibíque honorífice asservátum.
          Brixinóne sancti Albuíni Epíscopi, qui eam in civitátem e Sabióne Cáthedram Episcopálem tránstulit, et ibídem, virtútum signis émicans, migrávit ad Dóminum.
      en2:
      - type: text
        text: |-
          The Fifth of February
      
          At Catania, in Sicily, the birthday of Saint Agatha, Virgin and Martyr; who, in the times of the Emperor Decius, under the Judge Quinctianus, after blows and prison, after the rack and tortures, after
  psalm.nonis-i-lii-820d0ed57a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the translation of the holy martyr Thomas, Archbishop of Canterbury. [On the which 7th day of July, in the year of our Lord 1223, his body was raised from its grave in the crypt of Canterbury Cathedral and placed in a shrine.]
          Upon the same 7th day of July, were born into the better life:

          At Rome, the holy martyrs Claudius the book-keeper, Nicostratus the chief clerk, Castorius, Victorinus, and Symphorianus, whom holy Sebastian brought to believe in Christ and the blessed Priest Polycarp baptized. Fabian the judge ordered them to be arrested while they were seeking the bodies of holy martyrs, and troubled them for ten days with threats and cajolery. When he found that he was in nowise able to move them, he ordered them to be tortured and afterwards to be cast into the sea, [in the year 302.]
          At Durazzo, in Macedonia, the holy martyrs Peregrin, Lucian, Pompey, Hesychius, Papius, Saturninus, and German. These were Italians by nation, and fled to Durazzo during the persecution under Trajan. When they came thither they saw holy Bishop Astius hanging upon the cross for Christ's faith's sake, whereupon they openly confessed themselves to be Christians, and by command of the President they were first tried and then drowned in the sea.
          At Perugia, the blessed Pope Benedict XI, surnamed Tarvisini, a Friar of the Order of Preachers, who in the short while of his Papacy did wondrous much for the peace of the Church, the restoration of discipline, and the increase of religion. [He died at Perugia in 1304, after reigning eight months and some days.]
          At Alexandria, the holy Pantaenus. He was a man apostolic and adorned with all wisdom. Such was his use and love toward the Word of God that he went glowing with faith and earnestness to preach the gospel of Christ to the nations that are in the uttermost parts of the East. Thence he returned to Alexandria, and there at length he fell asleep, under the Emperor Antoninus Caracalla, [in the year 214.]
          At Brescia, the holy Confessor Apollonius, Bishop [of that see, second century.]
          In Saxony, holy Willibald, first Bishop of Eichstatt, who laboured in the Gospel along with holy Boniface and turned many peoples to Christ, [he died in the year 786,] whose feast we keep upon the 9th day of this present month of July.
          [At Clermont,] in Auvergne, holy Illidius, Bishop [of that same See,] [in the year 385.]
          At Urgel, in Spain, holy Odo, Bishop [of that see,] [in the year 1122.]
          In England, holy Hedda, [a monk of the monastery of St. Hilda,] Bishop of the West Saxons. [In the year 676 he lived first at Dorchester, but afterwards removed his see to Winchester. He governed his church with great holiness for about thirty years, and departed to the Lord in the year 705.]
          At Gray, in Burgundy, blessed Peter Foreri, a Canon Regular of the Order of the Most Holy Saviour, famous for graces and miracles, [in the year 1640.]
          In England, the holy Virgin Eadelburg, daughter of [Anna,] King of the East Angles. [She became a nun, and finally Abbess, in the monastery of Ferremontier, in the forest of Brie, in France, about the year 695.]
      la:
      - type: text
        text: |-
          Nonis Iúlii

          Sanctórum Episcopórum et Confessórum Cyrílli et Methódii fratrum, quorum natális respectíve ágitur sextodécimo Kaléndas Mártii et octávo Idus Aprílis.
          Romæ sanctórum Mártyrum Cláudii Commentariénsis, Nicostráti primiscrínii, qui fuit vir beátæ Mártyris Zoæ, Castórii, Victoríni et Symphoriáni; quos omnes sanctus Sebastiánus ad fidem Christi perdúxit, et beátus Polycárpus Présbyter baptizávit. Eósdem, in perquiréndis sanctórum Mártyrum corpóribus occupátos, Fabiánus Iudex comprehéndi iussit, et, cum eos, per decem dies minis et blandítiis exágitans, in nullo pénitus posset commovére, iussit tértio torquéri, ac póstea in mare præcípites dari.
          Dyrráchii, in Macedónia, sanctórum Mártyrum Peregríni, Luciáni, Pompéii, Hesýchii, Pápii, Saturníni et Germáni; qui, natióne Itáli, in persecutióne Traiáni, cum ad eam urbem confugíssent, et ibi sanctum Astíum Epíscopum, pro fide Christi, in cruce pendéntem vidérent, ac se páriter Christiános esse palam confiteréntur, ídeo, Prǽsidis iussu, tenti sunt atque in mare demérsi.
          Bríxiæ sancti Apollónii, Epíscopi et Confessóris.
          Eystádii, in Germánia, sancti Willebáldi, eiúsdem urbis primi Epíscopi, qui fílius éxstitit sancti Richárdi, Anglórum Regis, et frater sanctæ Walbúrgæ Vírginis; atque, una cum sancto Bonifátio, labórans in Evangélio, multas gentes convértit ad Christum.
          Arvérnis, in Gállia, sancti Illídii Epíscopi.
          Urgéllæ, in Hispánia Tarraconénsi, sancti Odónis Epíscopi.
          In Anglia sancti Heddæ, Epíscopi Sáxonum occidentálium.
          Alexandríæ natális sancti Pantǽni, viri Apostólici et omni sapiéntia adornáti, cui tantum stúdii et amóris erga verbum Dei fuit, ut étiam ad prædicándum Christi Evangélium géntibus quæ in Oriéntis últimis secéssibus recondúntur, fídei et devotiónis calóre succénsus, proféctus sit; ac demum, Alexandríam revérsus, ibi, sub Antoníno Caracálla, in pace quiévit.
          Eboriáci, in território Meldénsi, sanctæ Edilbúrgæ, Abbatíssæ et Vírginis, Anglórum Regis fíliæ.
          Perúsiæ Beáti Benedícti Papæ Undécimi, Tarvisíni, ex Ordine Prædicatórum, Confessóris; qui, brevi Pontificátus sui spátio, Ecclésiæ pacem, disciplínæ restauratiónem, religiónis increméntum mirífice promóvit.
      en2:
      - type: text
        text: |-
          The Fifth of July
      
          The holy Bishops and Confessors Cyril and Methodius, brothers, whose birthday is observed respectively on the fourteenth of February and the sixth of April.
          At Rome, the holy Martyrs Claudius, Commodus,
  psalm.nonis-i-nii-3b44225dcd:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 5th day of June, were born into the better life:

          Holy Boniface, Archbishop of Mainz. He came from England to Rome, and was sent by Gregory II into Germany to preach the faith of Christ to those nations, and he earned the title of Apostle of the Germans by turning a vast multitude, more especially of Frisians, to the religion of Christ. At last he, along with Eoban and some other servants of God in Friesland, received martyrdom by the sword at the hand of raging heathens.
          In Egypt, the holy martyrs Martian, Nicanor, Apollonius, and others, who finished an illustrious testimony, in the persecution under Galerius Maximian.
          At Perugia, the holy martyrs Florence, Julian, Cyriacus, Marcellinus, and Faustinus, who were beheaded in the persecution under Decius.
          At Caesarea, in Palestine, the holy Zenais, Cyria, Valeria, and Marcia, who with rejoicing attained unto martyrdom through many torments.
          At Tyre, the holy Priest Dorotheus. He suffered much under Diocletian, but survived till the time of Julian, in whose reign, and the hundred and seventh year of his own age, he crowned his venerable years with the glory of martyrdom.
          At Cordova, in Spain, the holy lad Sancho, who was brought up in the Royal Court, but in the persecution under the Arabs for Christ’s faith's sake accepted martyrdom without shrinking.
      la:
      - type: text
        text: |-
          Nonis Iúnii

          In Frísia sancti Bonifátii, Epíscopi Moguntíni et Mártyris. Hic de Anglia Romam venit, indéque a beáto Gregório Papa Secúndo in Germániam missus est ut Christi fidem illis géntibus evangelizáret, et, cum máximam ibi multitúdinem, præsértim Frísonum, Christiánæ religióni subiugásset, Germanórum Apóstolus méruit appellári; novíssime in Frísia, a furéntibus Gentílibus gládio perémptus, una cum Eobáno Coepíscopo et quibúsdam áliis servis Dei, martýrium consummávit.
          Tyri, in Phœnícia sancti Doróthei Presbýteri, qui, sub Diocletiáno, multa passus est; et, usque ad Iuliáni témpora supérstes, sub eo, annum agens séptimum supra centésimum, venerándam senéctam martýrio honestávit.
          In Ægýpto natális sanctórum Mártyrum Marciáni, Nicánoris, Apollónii et aliórum, qui, in persecutióne Galérii Maximiáni, illústre martýrium consummárunt.
          Perúsiæ sanctórum Mártyrum Floréntii, Iuliáni, Cyríaci, Marcellíni et Faustíni, qui omnes, in persecutióne Décii Imperatóris, cápite cæsi sunt.
          Córdubæ, in Hispánia, beáti Sáncii adolescéntis, qui, etsi in aula régia educátus, pro Christi tamen fide, in persecutióne Arábica, martýrium subíre non dubitávit.
          Cæsaréæ, in Palæstína, pássio sanctárum Zenáidis, Cýriæ, Valériæ et Márciæ; quæ, per multa torménta, gaudéntes ad martýrium pervenérunt.
      en2:
      - type: text
        text: |-
          The Fifth of June
      
          In Frisia, Saint Boniface, Bishop of Mainz and Martyr. He came to Rome from England, and thence was sent by the blessed Pope Gregory II to Germany to preach the faith of Christ to those peoples;
  psalm.nonis-ianu-rii-7b4e3912fd:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Eve of the Epiphany of the Lord, the same day is the Octave of the holy martyr Thomas, Archbishop of Canterbury.
          Upon the same 5th day of January, were born into the better life:

          At Rome, the holy Pope Telesphorus, who toiled much for Christ, and under the Emperor Antoninus Pius obtained by his testimony a glorious martyrdom.
          In Egypt are commemorated many holy martyrs who were slain in the Thebaid in diverse ways, in the persecution under the Emperor Diocletian.
          At Antioch, the holy monk Simeon, who lived for many years standing upon a pillar, whence he is called Stylitis (from the Greek style, which is being interpreted a pillar), whose life and conversation was wonderful (in the year 459).
          In England, the holy King Edward, famous for his gift of chastity and of the power of working miracles. By command of Pope Innocent XI his feast is kept upon the 13th day of October, which is the day of the translation of his sacred body (in the year 1066.)
          At Alexandria (in the fourth century), holy Syncletica, whose noble acts holy Athanasius hath set before us in his writing.
          At Rome, the holy virgin Emiliana, father's sister to holy Gregory the Great. Her sister Tharsilla, who had gone to God before her, came and called her, and upon the same day she passed hence to be for ever with the Lord (sixth century).
          Upon the same day, the holy virgin Apollinaris (about the year 440).
      la:
      - type: text
        text: |-
          Nonis Ianuárii

          Romæ sancti Telésphori, Papæ et Mártyris; qui, sub Antoníno Pio, post multos labóres, pro Christi confessióne, illústre martýrium duxit.
          In Anglia natális sancti Eduárdi, Regis Anglórum et Confessóris; qui virtúte castitátis et grátia miraculórum fuit insígnis. Eius autem festívitas, ex decréto Innocéntii Papæ Undécimi, tértio Idus Octóbris, quo die sacrum eius corpus translátum fuit, potíssimum celebrátur.
          In Ægýpto commemorátio plurimórum sanctórum Mártyrum, qui in Thebáide, sub persecutióne Diocletiáni, divérso tormentórum génere cæsi sunt.
          Antiochíæ sancti Simeónis Mónachi, qui, multos annos in colúmna stans vixit, unde et Stylítæ cognómen accépit; cuius vita et conversátio éxstitit admirábilis.
          Romæ sanctæ Æmiliánæ Vírginis, amitæ sancti Gregórii Papæ; quæ, vocánte Tharsílla soróre, quæ ad Deum præcésserat, hac ipsa die migrávit ad Dóminum.
          Alexandríæ sanctæ Syncléticæ Vírginis, cuius res præcláre gestas sanctus Athanásius monuméntis litterárum commendávit.
          In Ægýpto sanctæ Apollináris Vírginis.
      en2:
      - type: text
        text: |-
          The Fifth of January
      
          At Rome, Saint Telesphorus, Pope and Martyr; who, under Antoninus Pius, after many labors, for the confession of Christ, suffered a glorious martyrdom.
          In England, the birthday of Saint Edward, King of the English,
  psalm.nonis-m-rtii-c6e81e8112:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 7th day of March, were born into the better life:

          In the monastery of Fossa Nuova, near Terracina, the holy Confessor Thomas of Aquino, [in the year 1274,] of the Order of Friars Preachers, Doctor of the Church, illustrious for the nobility of his birth, the holiness of his life, and the depth of his knowledge of theology. Leo XIII declared him the patron in heaven of all Catholic schools.
          At Tuburbe, in Morocco, under the Emperor Severus, the holy martyrs Perpetua and Felicitas. Felicitas was with child, and therefore was respited, in accordance with the law, until after she was delivered. Holy Augustine saith that when she was in travail she had sorrow, but when she was set before the wild beasts she rejoiced. There suffered along with them Revocatus, Saturninus, and Secundolus, of whom the last died in prison, but the others were all killed by beasts.
          At Caesarea, in Palestine, the holy martyr Eubulus. He was a Companion of holy Hadrian, and two days after him was mangled by the lions and then despatched with the sword, being the last of all those who received the crown of martyrdom in that city, [in the year 308.]
          At Nicomedia, holy Theophilus, Bishop of that see, who for his honouring of holy images was sent into exile and there died, [in the year 845.]
          At Pelusium, in Egypt, holy Paul, Bishop of that see, who likewise died in exile for the same cause.
          At Brescia, [in the year 445,] the holy Confessor Gaudiosus, Bishop of that see.
          In the Thebaid, [in the fourth century,] holy Paul, surnamed the Simple.
      la:
      - type: text
        text: |-
          Nonis Mártii

          In monastério Fossæ Novæ, prope Tarracínam, in Campánia, sancti Thomæ Aquinátis, Confessóris et Ecclésiæ Doctóris, ex Ordine Prædicatórum, nobilitáte géneris, vitæ sanctitáte et Theológiæ sciéntia illustríssimi; quem Leo Papa Décimus tértius cæléstem Scholárum ómnium catholicárum Patrónum declarávit.
          Carthágine natális sanctárum Perpétuæ et Felicitátis Mártyrum; e quibus Felícitas, cum esset prægnans (ut sanctus Augustínus ait), iuxta leges exspectáta ut páreret, dum parturiébat, dolébat, obiécta feris gaudébat. Passi quoque sunt cum eis Sátyrus, Saturnínus, Revocátus et Secúndulus; quorum últimus quiévit in cárcere, réliqui omnes a váriis béstiis sunt vexáti, ac demum gládiorum íctibus confécti, sub Sevéro Príncipe. Sanctárum vero Perpétuæ et Felicitátis festum prídie huius diéi recólitur.
          Cæsaréæ, in Palæstína, pássio sancti Eubúli, qui fuit sócius sancti Hadriáni, atque, bíduo post illum, laniátus a leónibus et gládio trucidátus, martýrii corónam, últimus ómnium in ea civitáte, accépit.
          Nicomedíæ sancti Theóphili Epíscopi, qui, ob cultum sanctárum Imáginum in exsílium pulsus, illic defúnctus est.
          Pelúsii, in Ægýpto, sancti Pauli Epíscopi, qui, eándem ob causam, exsul occúbuit.
          Bríxiæ sancti Gaudiósi, Epíscopi et Confessóris.
          In Thebáide sancti Pauli, cognoménto Símplicis.
          Floréntiæ, in Etrúria, sanctæ Terésiæ Margarítæ Redi, Vírginis, Ordinis Carmelitárum Excalceatárum, vitæ puritáte ac simplicitáte admirábilis, quam Pius Papa Undécimus, sanctárum Vírginum albo adscrípsit.
      en2:
      - type: text
        text: |-
          The Fifth of March
      
          At the monastery of Fossanova, near Terracina, in Campania, Saint Thomas Aquinas, Confessor and Doctor of the Church, of the Order of Preachers, distinguished for nobility of birth, holiness of life, and theological
  psalm.nonis-nov-mbris-8c0feed587:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 5th day of November are commemorated the holy Zacharias, Priest and Prophet, father of the blessed Baptist John, and holy Elizabeth, mother of the same most holy Forerunner.
          Upon the same day, were born into the better life:

          At Terracina, in Campania, the holy martyrs Felix, a Priest, and Eusebius, a Monk. This Eusebius buried the holy martyrs Julian and Caesarius, and turned many to believe in Christ who were baptized by the holy Priest Felix. He and Felix were therefore tried together and both led before the seat of the judge, where neither was overcome, but were committed to prison together, and the same night, since they refused to sacrifice, they were beheaded.
          At Emesa, in Phoenicia, the holy martyrs Galation, and Epistemis, his wife. In the persecution under Decius they were heavily flogged, and their hands, feet, and tongues mutilated, whereafter they were beheaded, and so finished their testimony.
          Also under the Emperor Maximin, the holy martyrs Domninus, Theotimus, Philotheus, Silvanus, and their Companions.
          At Milan, the holy Confessor Magnus, Bishop (of that see, in the year 529.)
          At Brescia, holy Dominator, Bishop (of that see.)
          At Trier, (about the year 500,) holy Fibitius, who from being Abbot was made Bishop of that city.
          At Orleans, in Gaul, the holy Confessor Laetus, a Priest, (in the year 534.)
      la:
      - type: text
        text: |-
          Nonis Novémbris

          Sancti Zacharíæ, Sacerdótis et Prophétæ, qui pater éxstitit beáti Ioánnis Baptístæ, Præcursóris Dómini.
          Item sanctæ Elísabeth, eiúsdem sanctíssimi Præcursóris matris.
          Tarracínæ, in Campánia, natális sanctórum Mártyrum Felícis Presbýteri, et Eusébii Mónachi. Ex his Eusébius, cum sepelísset sanctos Mártyres Iuliánum et Cæsárium, et multos convérteret ad fidem Christi, quos sanctus Felix Présbyter baptizábat, una cum ipso Felíce tentus est; et, ad Iúdicis forum ducti nec superáti, inde in cárcerem inclúsi, ambo, nocte eádem, cum sacrificáre noluíssent, decolláti sunt.
          Eméssæ, in Phœnícia, sanctórum Mártyrum Galatiónis et Epistémis cóniugis, qui in Décii persecutióne, flagris cæsi, mánibus pedibúsque et lingua ínsuper mutiláti, dénique, truncáto cápite, martýrium consummárunt.
          Item sanctórum Mártyrum Domníni, Theótimi, Philóthei, Silváni et Sociórum, sub Maximíno Imperatóre.
          Medioláni sancti Magni, Epíscopi et Confessóris.
          Bríxiæ sancti Dominatóris Epíscopi.
          Tréviris sancti Fibítii, qui ex Abbáte factus est eiúsdem civitátis Epíscopus.
          Aureliánis, in Gállia, sancti Læti, Presbýteri et Confessóris.
      en2:
      - type: text
        text: |-
          The Fifth of November
      
          Saint Zacharias, Priest and Prophet, who was the father of the blessed John the Baptist, Forerunner of the Lord.
          Likewise, Saint Elizabeth, mother of that same most holy Forerunner.
          At Terracina, in
  psalm.nonis-oct-bris-c4d2783a4c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 7th day of October, were born into the better life:

          At Rome, upon the Ardeatine Way, (in the year 336,) the holy Confessor, Pope Mark, (who succeeded Sylvester I, and reigned 8 months and 20 days.)
          In the district called Rasaphe, in Syria, the holy martyrs Sergius and Bacchus, noble Roman officers under the Emperor Maximian. Bacchus was lashed with strips of raw hide till his whole body was cut into ribbons, and so, still confessing Christ, gave up the ghost. Sergius had his legs tortured in the boots, but remaining firm in the faith, sentence was given on him that he should be beheaded. The place where he sleepeth was called after him Sergiopolis instead of Rasaphe, (by command of the Emperor Justinian,) and thither Christians do greatly resort on account of famous miracles.
          At Rome, the holy martyrs Marcellus and Apuleius, who were first disciples of Simon Magus, but afterward, seeing the wonders which the Lord wrought by the Apostle Peter, became disciples of the Apostle, and, after he had suffered, won the crown of martyrdom under the Consular Aurelian. They are buried not far from the city.
          At Rasaphe also, the holy Virgin Julia, who gained martyrdom under the President Marcian.
          At Padua, the holy Virgin and martyr Justina, who was baptized by blessed Prosdocimus, a disciple of the holy Apostle Peter. Forasmuch as she stood firm in the faith of Christ, the President Maximus caused her to be run through with the sword, and she passed away hence to be ever with the Lord.
          At Bourges, (about the year 560,) the holy Priest and Confessor Augustus.
          At Reims, (in the sixth century,) the holy Priest Helanus.
          Upon the same day is made the memorial of St. Mary, styled of Victory, the yearly observance of which memorial the Supreme Pontiff blessed Pius V. ordained on account of the famous victory gained by the Christians over the Turks upon this day in the sea-fight of Lepanto, by the help of the aforesaid Mother of God, and Gregory XIII instituted the yearly solemn feast of the same most Blessed Virgin to be kept upon the first Lord's Day in this present month of October.
      la:
      - type: text
        text: |-
          Nonis Octóbris

          Festum beátæ Maríæ Vírginis a Rosário; itémque sanctæ Maríæ de Victória commemorátio, quam sanctus Pius Quintus, Póntifex Máximus, ob insígnem victóriam a Christiánis bello naváli, eiúsdem sanctíssimæ Dei Genitrícis auxílio, hac ipsa die de Turcis reportátam, quotánnis fíeri instítuit.
          Romæ, via Ardeatína, deposítio sancti Marci, Papæ et Confessóris.
          In Província quæ nuncupátur Augústa Euphratésia, sanctórum Mártyrum Sérgii et Bacchi, nobílium Romanórum, sub Maximiáno Imperatóre. Ex his Bacchus támdiu nervis crudis cæsus est, quoadúsque, toto córpore discíssus, in Christi confessióne emítteret spíritum; Sérgius vero clavátis cothúrnis pedes indútus, et, cum in fide fixus manéret, data senténtia, iussus est decollári. Beáti autem Sérgii nómine locus ubi quiéscit, Sergiópolis appellátus est, et, ob præclára mirácula, frequénti Christianórum concúrsu honorátur. Eórum autem memória sequénti die recólitur.
          Romæ sanctórum Mártyrum Marcélli et Apuléii, qui prius quidem Simóni mago adhæsérunt; sed, vidéntes mirabília quæ per Apóstolum Petrum Dóminus operabátur, ambo, relícto Simóne, se doctrínæ Apostólicæ tradidérunt, ac, post passiónem Apostolórum, sub Aureliáno Consulári, corónam martýrii reportárunt, sepultíque sunt non longe ab Urbe. Eórum autem memória sequénti die recólitur.
          Item apud Augústam Euphratésiam sanctæ Iúliæ Vírginis, quæ, sub Marciáno Prǽside, martýrium consummávit.
          Patávii sanctæ Iustínæ, Vírginis et Mártyris; quæ, a beáto Prosdócimo, sancti Petri discípulo, baptizáta, et, cum in fide Christi constánter persísteret, Máximi Prǽsidis iussu, transverberáta gládio, migrávit ad Dóminum.
          Apud Bitúricas, in Aquitánia, sancti Augústi Presbýteri et Confessóris.
          In pago Rheménsi sancti Heláni Presbýteri.
          In Suécia Translátio córporis sanctæ Birgíttæ Víduæ.
      en2:
      - type: text
        text: |-
          The Fifth of October
      
          The Feast of the Blessed Virgin Mary of the Rosary; and likewise the commemoration of Our Lady of Victory, which the holy Pope Pius V, on account of the notable victory won by the Christians in a naval battle on that day,
  psalm.nonis-sept-mbris-041f08f04a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Lawrence Giustiniani, first Patriarch of Venice, who adorned by graces and by the glory of miracles that Episcopal see which, upon the 5th day of September, he was compelled against his own will to occupy. His birth into the better life is mentioned upon the 8th day of January.
          Upon the same 5th day of September, were born into the better life:
          At Rome, in the suburb, the blessed martyr Victorinus, Bishop of Amiternum, (now called after him San Vittorino.) He was famous for holiness and miracles, and was chosen to the see of that city by the voice of all the people thereof. Afterwards, under Nerva-Trajan, he was sent, along with other servants of God, to Cutilia, where there is a pool of stinking sulphurous waters, and where the judge Aurelian ordered him to be hung up with his head downwards this torment he suffered for the space of three days, for Christ's name's sake, and then departed in triumph, gloriously crowned to be ever with the Lord. The Christians carried off his hody, and buried it honourably at Amiternum.
          At Porto, (in the second century,) the holy martyr Herculan.
          At Capua, the holy martyrs Quintius, Arcontius, and Donatus.
          Upon the same day holy Romulus, Praefect of the Palace to the Emperor Trajan he denounced the cruelty of that Emperor against the Christians, and for that cause was first beaten with rods and then beheaded.
          At Melitina, in Armenia, the holy soldiers Eudoxius, Zeno, Macarius, and their Companions, one thousand one hundred and four in number, who in the persecution under the Emperor Diocletian renounced their military service, and were massacred for confessing Christ.
          At Constantinople, the holy martyrs Urban, Theodore, Menedem, and their Companions, seventy-seven in number, of the ecclesiastical state, who under the Emperor Valens, for the Catholic faith's sake, were put on board a ship and burnt at sea.
          At the monastery of Sithiu, in the country of Thérouanne, (in the eighth century,) the holy Abbot Bertin.
          At Toledo, the holy Virgin Obdulia.
      la:
      - type: text
        text: |-
          Nonis Septémbris

          Sancti Lauréntii Iustiniáni, primi Patriárchæ Venetiárum et Confessóris, qui pontificálem Cáthedram hac die invítus ascéndit, et sexto Idus Ianuárii obdormívit in Dómino.
          Romæ, in suburbáno, beáti Victoríni, Epíscopi et Mártyris; qui, sanctitáte et miráculis clarus, sacerdótium Amiternínæ urbis, totíus pópuli electióne, adéptus est. Póstmodum, sub Nerva Traiáno, apud Cutílias, ubi puténtes et sulphúreæ emánant aquæ, cum áliis Dei servis, relegátus, ab Aureliáno Iúdice iussus est suspéndi cápite deórsum; idque cum per tríduum pro nómine Christi passus fuísset, tandem, glorióse coronátus, victor migrávit ad Dóminum. Eius corpus rapuérunt Christiáni, et honorífica sepultúra Amitérni, in Vestínis, condidérunt.
          Constantinópoli sanctórum Mártyrum Urbáni, Theodóri, Menedémi, et Sociórum septuagínta septem ex órdine ecclesiástico; qui a Valénte Imperatóre, pro fide cathólica, in navígio impósiti, iussi sunt in mari combúri.
          In Portu Románo pássio sancti Herculáni mílitis, qui, sub Gallo Imperatóre, ob Christi fidem cæsus flagris et cápite obtruncátus est.
          Cápuæ sanctórum Mártyrum Quínctii, Arcóntii et Donáti.
          Eódem die sancti Rómuli, qui, cum esset Traiáni aulæ prefectus ac sævítiam Imperatóris in Christiános detestarétur, cæsus est virgis, et cápite truncátus.
          Melitínæ, in Arménia, pássio sanctórum mílitum Eudóxii, Zenónis, Macárii, et Sociórum mille centum et quátuor; qui, cum abiecíssent milítiæ cíngulum, in persecutióne Diocletiáni, pro Christi confessióne necáti sunt.
          In pago Tarvanénsi, monastério Sithinénsi, in Gállia, sancti Bertíni Abbátis.
          Toléti, in Hispánia, sanctæ Obdúliæ Vírginis.
      en2:
      - type: text
        text: |-
          The Fifth of September
      
          Saint Lawrence Justinian, first Patriarch of Venice and Confessor, who unwillingly ascended the pontifical throne on this day and fell asleep in the Lord on the eighth of January.
          At Rome, in his
  psalm.nono-kal-ndas-apr-lis-ccf69a97ad:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 24th day of March, were born into the better life:

          At Rome, the holy martyrs Mark and Timothy, who were crowned with martyrdom under the Emperor Antonine.
          There also the holy martyr Epigmenius, a Priest, who was slain with the sword, by order of the judge Turpius, in the persecution under the Emperor Diocletian.
          Likewise at Rome, the blessed martyr Pigmenius, a Priest, who was cast into the river Tiber for Christ's faith's sake, under the Emperor Julian the Apostate.
          At Caesarea, in Palestine, were born into the better life: the holy martyrs Timolaus, Denis, Pausides, Romulus, Alexander, another Alexander, Agapius, and another Denis, who won crowns of life by the axe, under the president Urban, in the persecution under the Emperor Diocletian.
          In Morocco, were born into the better life: the holy brethren Romulus and Secundus, both martyrs, who suffered for Christ's faith, [in the year 304.]
          At Trent, the holy child Simeon, most cruelly murdered by the Jews, and who afterwards shone with many miracles, [in the year 1475.]
          At Synnada, in Phrygia, holy Agapitus, Bishop of that see, [under Maximin 234-238.]
          At Brescia, holy Latinus, Bishop of that see, [beginning of second century.]
          In Syria, the holy Confessor Seleucus.
      la:
      - type: text
        text: |-
          Nono Kaléndas Aprílis

          Festum sancti Gabriélis Archángeli, qui ad annuntiándum Incarnatiónis divíni Verbi mystérium a Deo missus est.
          Romæ sancti Epigménii Presbýteri, qui, in persecutióne Diocletiáni, sub Túrpio Iúdice, gládio cæsus, martýrium consummávit.
          Ibídem pássio beáti Pigménii Presbýteri, qui, sub Iuliáno Apóstata, pro fide Christi, præcipitátus in Tíberim, necátus est.
          Item Romæ sanctórum Mártyrum Marci et Timóthei, qui martýrio coronáti sunt sub Antoníno Imperatóre.
          Cæsaréæ, in Palæstína, natális sanctórum Mártyrum Timolái, Dionýsii, Páusidis, Rómuli, Alexándri, altérius Alexándri, Agápii et altérius Dionýsii; qui, in persecutióne Diocletiáni, sub Urbáno Prǽside, secúris ictu percússi, vitæ corónas meruérunt.
          In Mauritánia item natális sanctórum fratrum Rómuli et Secúndi, qui pro Christi fide passi sunt.
          Tridénti pássio sancti Simeónis púeri, a Iudǽis sævíssime trucidáti, qui multis póstea miráculis coruscávit.
          Sýnnadæ, in Phrýgia, sancti Agapíti Epíscopi.
          Bríxiæ sancti Latíni Epíscopi.
          In Sýria sancti Seléuci Confessóris.
          In Suécia sanctæ Catharínæ Vírginis, quæ fuit fília sanctæ Birgíttæ.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of March
      
          The Feast of Saint Gabriel the Archangel, who was sent by God to announce the mystery of the Incarnation of the divine Word.
          At Rome, Saint Epigonius, Priest, who, in the persecution of Diocletian,
  psalm.nono-kal-ndas-aug-sti-a9e71dd349:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is the eve of the holy Apostle James. Upon the morrow also we keep the feast of the holy Confessor Alexis, son of the Senator Euphemian. Upon the first night of his marriage he left his bride untouched, and absconded from his home. After a long pilgrimage he returned to the city, where he was received as a beggar out of charity in his own fathers house, and there remained unknown for seventeen years, thus deceiving the world by a new craft. After he was dead, [in the year 404,] in the Supreme Pontificate of Innocent I, he was recognised by a voice which was heard throughout the churches of the city and by his own writing, and his body was carried with the greatest honour to the Church of St Boniface, where he hath been illustrious for many miracles. Mention is made of him upon the 17th day of this present month of July.
          Upon the same 24th day of July, was also born into the better life:

          At Tyro, a city which stood formerly on an island, in the lake of Bolsena in Tuscany, in the persecution under the Emperor Diocletian, the holy Virgin and martyr Christina. She brake her father's idols of gold and silver, and gave the morsels to the poor whereupon he commanded her to be torn with stripes and otherwise fearfully tortured after which a great stone was tied about her neck, and she was cast into the lake but an angel delivered her. She then suffered bravely the sharpest torments under another judge, who succeeded her father, and in the end finished the course of her testimony under the President Julian, having endured a burning furnace, wherein she remained shut up unhurt for five days, having by Christ's power overcome serpents, having had her tongue cut out, and being lastly shot to death with arrows.
          At Rome, in the Tiburtine Way, the holy martyr Vincent.
          At San Vitturino, in Samnium, eighty-three holy martyrs, all soldiers.
          At Merida, in Spain, the holy soldier Victor, who, along with his two brothers Stercatius and Antinogenes, in the persecution under the Emperor Diocletian, by diverse torments finished their testimony.
          In Lycia, the holy martyrs Nicetas and Aquilina, who were turned to Christ by the preaching of the blessed martyr Christopher, and received the palm of martyrdom by being beheaded.
          Also the holy martyrs Meneus and Capiton.
          At Sens, [in the fourth century,] the holy Confessor Ursicinus, Bishop [of that see.]
      la:
      - type: text
        text: |-
          Nono Kaléndas Augústi

          Tyri, apud lacum Vulsínium, in Túscia, sanctæ Christínæ, Vírginis et Mártyris. Hæc Virgo, cum patris idóla áurea et argéntea, in Christum credens, comminuísset atque illórum frágmina paupéribus erogásset, eiúsdem patris iussu verbéribus dilaniáta est, aliísque supplíciis diríssime cruciáta, et cum magno saxi póndere in lacum proiécta, sed ab Angelo liberáta; deínde, sub alio Iúdice, patris sui successóre, acerbióra torménta constánter pértulit; novíssime, sub Iuliáno Prǽside, post fornácem ardéntem, ubi quinque diébus illǽsa permánsit, post serpéntes virtúte Christi superátos, martýrii sui cursum abscissióne linguæ et sagittárum infixióne complévit.
          Romæ, via Tiburtína, sancti Vincéntii Mártyris.
          Amitérni, in Vestínis, pássio sanctórum mílitum octogínta trium.
          Eméritæ, in Hispánia, sancti Victóris, viri militáris, qui, cum frátribus Stercátio et Antinógene, in persecutióne Diocletiáni, per divérsa supplícia martýrium consummávit.
          Item sanctórum Mártyrum Menéi et Capitónis.
          In Lýcia sanctárum Mártyrum Nicétæ et Aquilínæ, quæ, beáti Christóphori Mártyris prædicatióne ad Christum convérsæ, martýrii palmam obtruncatióne cápitis sumpsérunt.
          Apud Sénonas sancti Ursicíni, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of July
      
          At Tyre, near Lake Bolsena, in Tuscany, Saint Christina, Virgin and Martyr. This Virgin, having believed in Christ and smashed her father's golden and silver idols and distributed their fragments
  psalm.nono-kal-ndas-dec-mbris-7335868054:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 23rd day of November, were born into the better life:

          The holy Pope Clement, he was the third, after the blessed Apostle Peter, who held the Papacy. In the persecution under the Emperor Trajan he was sent to the Crimea, where he was sunk in the sea with an anchor tied to his neck, and so received the crown of martyrdom. In the time of Pope Nicholas I his body was brought to Rome and honourably buried in the church which had already been built in his name.
          Likewise, at Rome, the holy martyr Felicity, mother of seven sons, who were all likewise martyrs. After they had suffered, the Emperor Mark Antonine commanded her also to be beheaded for Christ's sake.
          At Merida, in Spain, the holy Virgin and martyr Lucretia, who suffered martyrdom under the President Dacian, in the persecution under the Emperor Diocletian.
          At Cyzicus, on the Hellespont, the holy martyr Sisinius, who was slain with the sword, after suffering many torments, during the same persecution.
          At Iconium, in Lycaonia, holy Amphilochius, Bishop (of that see,) the fellow of holy Basil and Gregory of Nazianzus, in the desert and in the Episcopate. He went through many contendings for the Catholic faith's sake, but fell asleep at length in peace, famous for holiness and teaching.
          At Girgenti, in Sicily, (at the end of the sixth century,) deceased holy Gregory, Bishop (of that see.)
          In the country of Hesbaye/Haspengouw, (in the seventh century,) the holy Confessor Trudo, the Priest.
          At Mantua, blessed John Boni, of the Order of Hermits of Saint Augustine, whose illustrious life hath been written by holy Antonine.
      la:
      - type: text
        text: |-
          Nono Kaléndas Decémbris

          Natális sancti Cleméntis Primi, Papæ et Mártyris, qui, tértius post beátum Petrum Apóstolum, Pontificátum ténuit, et, in persecutióne Traiáni, apud Chersonésum relegátus, ibi, alligáta ad eius collum ánchora, præcipitátus in mare, martýrio coronátur. Ipsíus autem corpus, Hadriáno Secúndo Summo Pontífice, a sanctis Cyríllo et Methódio frátribus Romam translátum, in Ecclésia quæ eius nómine ántea fúerat exstrúcta, honorífice recónditum est.
          Romæ sanctæ Felicitátis Mártyris, septem filiórum Mártyrum matris; quæ, post eos, iubénte Marco Antoníno Imperatóre, decolláta est pro Christo.
          Cýzici, in Hellespónto, sancti Sisínii Mártyris, qui in persecutióne Diocletiáni Imperatóris, post multa torménta, gládio cæsus est.
          Eméritæ, in Hispánia, sanctæ Lucrétiæ, Vírginis et Mártyris; quæ in eádem persecutióne, sub Daciáno Prǽside, martýrium consummávit.
          Icónii, in Lycaónia, sancti Amphilóchii Epíscopi, qui, sanctórum Basilíi et Gregórii Nazianzéni in erémo sócius et in Episcopátu colléga, tandem, post multa quæ suscépit pro cathólica fide certámina, sanctitáte et doctrína clarus, quiévit in pace.
          Agrigénti deposítio sancti Gregórii Epíscopi.
          In óppido Hasbániæ, in Bélgio, sancti Trudónis, Presbýteri et Confessóris, cuius nómine póstmodum insignítum fuit tum monastérium illic ab eódem Sancto in suis prǽdiis eréctum, tum ipsum óppidum in eo loco paulátim exstrúctum.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of November
      
          The birthday of Saint Clement I, Pope and Martyr, who held the Pontificate third after the blessed Apostle Peter, and, in the persecution of Trajan, was exiled to Chersonesus, where,
  psalm.nono-kal-ndas-febru-rii-25e97e5966:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 24th day of January, were born into the better life:

          Holy Timothy, the disciple of the blessed Apostle Paul, by whom he was ordained Bishop of Ephesus. After many contendings for Christ, because he rebuked them that were offering sacrifice to Diana, they stoned him, and a short while thereafter he fell asleep in the Lord, (in the year 97.)
          At Antioch, (in the year 250,) holy Babilas, Patriarch of that city. After he had oftentimes glorified God by the sufferings and torments which he bore, and in the persecution under the Emperor Decius, he ended his glorious life in iron fetters, which he commanded should be buried with him. It is recorded also that there suffered with him three children Urban, Prilidian, and Epolonius whom he had instructed in the faith of Christ.
          At Neo-Caesarea, the holy martyrs Mardonius, Musonius, Eugenius, and Metellus, these all were burnt and their ashes thrown into the river.
          At Foligno, holy Felician, who was ordained by Pope Victor Bishop of that city, and after many labours was crowned with martyrdom in extreme old age, in the persecution under the Emperor Decius.
          Likewise the holy martyrs Thyrsus, (third century,) and Projectus, (Bishop of Clermont, in the year 674.)
          At Bologna, (in the third century,) holy Zama, the first Bishop of that city, who was ordained by the holy Roman Pontiff Denis, and there wonderfully spread the Christian faith.
          Likewise (in the sixth century,) the blessed Abbot Suran, who flourished in holiness in the time of the Lombards.
      la:
      - type: text
        text: |-
          Nono Kaléndas Februárii

          Apud Ephesum sancti Timóthei, qui fuit discípulus beáti Pauli Apóstoli; atque, ab eódem Ephesi ordinátus Epíscopus, ibi post multos pro Christo agónes, cum Diánæ immolántes argúeret, lapídibus óbrutus est, ac paulo post obdormívit in Dómino.
          Antiochíæ sancti Bábilæ Epíscopi, qui, in persecutióne Décii, póstea quam frequénter passiónibus suis ac cruciátibus glorificáverat Deum, gloriósæ vitæ finem sortítus est in vínculis férreis, cum quibus et suum corpus sepelíri mandávit. Referúntur étiam passi cum eo tres púeri, scílicet Urbánus, Prilidiánus et Epolónius, quos ille in Christi fide instrúxerat.
          Fulgínei, in Umbria, sancti Feliciáni, qui, a sancto Victóre Papa Primo Epíscopus eiúsdem civitátis ordinátus, illic, post multos labóres, in última senectúte, sub Décio Imperatóre, martýrio coronátus est.
          Neocæsaréæ, in Mauritánia, sanctórum Mártyrum Mardónii, Musónii, Eugénii et Metélli; qui omnes igni tráditi sunt, et eórum relíquiæ in flumen dispérsæ.
          Item sanctórum Mártyrum Thyrsi et Proiécti.
          Cínguli, in Picéno, sancti Exsuperántii Confessóris, eiúsdem civitátis Epíscopi, ob miraculórum famam illústris.
          Bonóniæ sancti Zamæ, qui, a sancto Dionýsio, Románo Pontífice, primus eiúsdem civitátis Epíscopus ordinátus, illic Christiánam fidem mirífice propagávit.
          Item beáti Suráni Abbátis, qui, témpore Longobardórum, sanctitáte flóruit.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of January
      
          At Ephesus, Saint Timothy, who was a disciple of the blessed Apostle Paul; and, having been ordained Bishop of Ephesus by him, there, after many contests for Christ, when those sacrificing to Diana were rushing
  psalm.nono-kal-ndas-i-lii-5a4b1b23f5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Eve of the holy Baptist John.
          Upon the same 23rd day of June, were born into the better life:

          In England, the holy Queen and Virgin Etheldreda, who passed away to be with the Lord, illustrious for holiness and miracles whose body was found incorrupt eleven years after her death, [in the year 679.]
          At Rome, the holy Priest John, who was beheaded, under the Emperor Julian the Apostate, in front of the image of the sun upon the old Salarian Way. His body was buried by the blessed Priest Concordius, hard by the martyrs' burial-place.
          Likewise at Rome, under the Emperor Valerian, the holy Virgin and martyr Agrippina, whose body was taken to Sicily and is distinguished for many miracles.
          At Sutri, in Tuscany, the holy Priest Felix, whose mouth the Prefect Turcius ordered to be pounded with a stone until he died.
          At Nicomedia are commemorated very many holy martyrs who, in the time of Diocletian, wandered in deserts and in mountains, and in dens and caves of the earth, and for Christ's Name's sake, underwent martyrdom with joy.
          At Philadelphia, in Arabia, the holy martyr Zeno and Zenas his slave. When Zeno was bound Zenas kissed his chains, and besought him to be pleased to have him for a sharer in his torments, whereupon the soldiers took him, and he and his master received the same crown of martyrdom together, [in the year 304.]
      la:
      - type: text
        text: |-
          Nono Kaléndas Iúlii

          Vigília Nativitátis sancti Ioánnis Baptístæ.
          Romæ sancti Ioánnis Presbýteri, qui, sub Iuliáno Apóstata, via Salária véteri, ante simulácrum Solis decollátus est, et corpus eius a beáto Concórdio Presbýtero iuxta Mártyrum Concília sepúltum.
          Item Romæ sanctæ Agrippínæ, Vírginis et Mártyris, quæ sub Valeriáno Imperatóre martýrium consummávit. Ipsíus autem corpus, in Sicíliam translátum ac Menis cónditum, multis miráculis corúscat.
          Sútrii, in Túscia, sancti Felícis Presbýteri, cuius os támdiu iussit Túrcius Præféctus lápide contúndi, donec ipse Felix emítteret spíritum.
          Nicomedíæ commemorátio plurimórum sanctórum Mártyrum, qui, témpore Diocletiáni, in móntibus et spelúncis laténtes, pro Christi nómine martýrium læto ánimo subiérunt.
          Philadelphíæ, in Arábia, sanctórum Mártyrum Zenónis, eiúsque servi Zenæ. Hic dómini sui vincti caténas exósculans, eúmque rogans ut se in torméntis partícipem dignarétur habére, a milítibus tentus est, et cum ipso dómino parem martýrii corónam accépit.
          Augústæ Taurinórum sancti Ioséphi Cafásso, Sacerdótis, qui levítis pietáte et sciéntia augéndis atque damnátis cápite Deo conciliándis fuit illústris, et a Pio Papa Duodécimo inter sanctos Cǽlites adscríptus est.
          In monastério Elyénsi, in Británnia, sanctæ Ediltrúdis, Regínæ et Vírginis, quæ sanctitáte et miráculis clara migrávit ad Dóminum. Ipsíus autem corpus, úndecim post annis, invéntum est incorrúptum.
      en2:
      - type: text
        text: |-
          The Twenty-Third of June
      
          The Vigil of the Nativity of Saint John the Baptist.
          At Rome, Saint John, Priest, who, under Julian the Apostate, on the old Salarian Way, was beheaded before a statue of the Sun, and his body was
  psalm.nono-kal-ndas-i-nii-b39280fa77:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the Blessed Virgin Mary, styled "Help of Christians."
          Upon the same 24th day of May, were born into the better life:

          At Antioch, the holy Manahen, foster-brother of Herod the Tetrarch, a teacher and prophet under the grace of the New Testament, who sleepeth in that city.
          Also, the blessed Johanna, the wife of Chuza, Herod's steward, of whom maketh mention the Evangelist Luke.
          At Porto, the holy martyr Vincent.
          At Brescia, the holy martyr Afra, who suffered under the Emperor Hadrian.
          At Nantes, in Brittany, the blessed brothers Donatian and Rogatian, both martyrs. They were cast into prison, under the Emperor Diocletian, because of the steadfastness of their faith, hung on the rack and mangled, then pierced through with a spear, and in the end beheaded.
          In Istria, the holy martyrs Zoellus, Servilius, Felix, Silvanus, and Diodes, [in the third century.]
          Upon the same day, [in Egypt, in the persecution under Antoninus,] the holy martyrs Miletius, a captain in the army, and two hundred and fifty-two of his comrades, who finished their testimony by diverse sorts of death.
          Also the holy martyrs Susannah, Marciana, and Palladia, wives of three of the aforesaid soldiers, who were slain, together with their little children.
          At Milan, the holy martyr Robustian.
          In Morocco, in Africa, [in the year 1636,] blessed John de Prado, of the strictest observance of the bare-footed Friars Minors. For the preaching of the Gospel he manfully endured bonds, imprisonment, stripes, and many other torments, and finished his testimony for Christ by fire.
          At the monastery of Lerins, [in the fifth century,] the holy Priest Vincent, distinguished for his teaching and holiness.
          At Bologna is commemorated the translation of the holy Confessor Dominic, in the time of Pope Gregory IX.
      la:
      - type: text
        text: |-
          Nono Kaléndas Iúnii

          Antiochíæ natális sancti Mánahen, qui fuit Heródis Tetrárchæ collactáneus, atque, Doctor et Prophéta exsístens sub grátia novi Testaménti, in eádem urbe quiévit.
          Item beátæ Ioánnæ, uxóris Chusæ, procuratóris Heródis, quam Lucas Evangelísta commémorat.
          In Portu Románo natális sancti Vincéntii Mártyris.
          Nannéte, in Británnia minóre, beatórum Mártyrum Donatiáni et Rogatiáni fratrum, qui, sub Diocletiáno Imperatóre, pro constántia fídei, in cárcerem missi, et in equúleo suspénsi ac laniáti, deínde láncea militári confóssi, novíssime cápite præcísi sunt.
          In Istria sanctórum Mártyrum Zoélli, Servílii, Felícis, Silváni et Dióclis.
          Eódem die sanctórum Mártyrum Melétii, ducis exércitus, ac Sociórum eius ducentórum et quinquagínta duórum mílitum; qui divérso mortis génere martýrium complevérunt.
          Item sanctárum Mártyrum Susánnæ, Marciánæ et Palládiæ, eorúndem mílitum uxórum, quæ, una cum párvulis suis, confráctæ sunt.
          Medioláni sancti Robustiáni Mártyris.
          Bríxiæ sanctæ Afræ Mártyris, quæ sub Hadriáno Imperatóre passa est.
          In monastério Lirinénsi, in Gállia, sancti Vincéntii Presbýteri, doctrína et sanctitáte conspícui.
          Marróchii, in Africa, Beáti Ioánnis de Prado, Sacerdótis ex Ordine Minórum et Mártyris; qui, in prædicatióne Evangélii, post víncula, cárceres, flagélla plurimáque ália torménta, pro Christo fórtiter toleráta, per ignem martýrium consummávit.
          Bonóniæ Translátio sancti Domínici Confessóris, témpore Gregórii Papæ Noni.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of May
      
          At Antioch, the birthday of Saint Manahen, who was the foster-brother of Herod the Tetrarch, and, serving as Doctor and Prophet under the grace of the New Testament, rested in that same city.
          Likewise, the blessed Joanna,
  psalm.nono-kal-ndas-ianu-rii-b57f5e19bc:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Eve of the birth of our Lord Jesus Christ.
          Upon the same 24th day of December, were born into the better life:

          At Antioch, forty holy Virgins and martyrs, who there finished their testimony by diverse torments in the persecution under the Emperor Decius.
          At Spoleto, the holy Priest Gregory (of Spoleto), a martyr in the time of the Emperors Diocletian and Maximian, he was beaten with knotted cudgels, laid upon a grating over fire, imprisoned, his knees hammered with iron combs, burning lamps set to his sides, and at last beheaded.
          At Tripoli, the holy martyrs Lucian, Metrobius, Paul, Zenobius, Theotimus, and Drusus.
          At Nicomedia, the holy martyr Euthymius, who sent many before him to martyrdom, in the persecution under the Emperor Diocletian, and then was himself pierced through with the sword, and so followed them unto their crown.
          At Bordeaux, holy Delphinus, Bishop (of that see from 380-404, when he died,) who was a burning and shining light of holiness in the time of the Emperor Theodosius.
          In Poland, (in the year 1473,) the holy Confessor John of Kenty, a secular Priest, famous for his learning, his zeal for the spreading of the faith, his graces, and his miracles, whose feast we have kept upon the 22nd day of October.
          At Rome, (about the year 550,) the holy Virgin Tharsilla, father's sister to holy Pope Gregory, of whom he witnesseth that at the hour of her going forth she saw Jesus coming unto her.
          At Trier, the holy Virgin Irmina, daughter to King Dagobert (II. She was Abbess of the monastery of Horrein, and lived from about the year 672 to about the year 715.)
      la:
      - type: text
        text: |-
          Nono Kaléndas Ianuárii

          Vigília Nativitátis Dómini nostri Iesu Christi.
          Cracóviæ, in Polónia, natális sancti Ioánnis Cántii, Presbýteri et Confessóris, quem, doctrína, propagándæ fídei zelo, virtútibus ac miráculis clarum, Clemens Décimus tértius, Póntifex Máximus, Sanctórum número adscrípsit. Eius autem festívitas tertiodécimo Kaléndas Novémbris celebrátur.
          Apud Spolétum sancti Gregórii, Presbýteri et Mártyris; qui, tempóribus Diocletiáni et Maximiáni Imperatórum, primo nodósis fústibus cæsus, ac deínde, post cratículam et cárcerem, cárduis férreis in génibus percússus, sed et ardéntibus lampádibus per látera incénsus, tandem est decollátus.
          Trípoli, in Phœnícia, sanctórum Mártyrum Luciáni, Metróbii, Pauli, Zenóbii, Theotími et Drusi.
          Nicomedíæ sancti Euthýmii Mártyris, qui, in persecutióne Diocletiáni, cum multos ad martýrium præmisísset, et ipse, ense transfíxus, eos secútus est ad corónam.
          Antiochíæ natális sanctárum Vírginum quadragínta, quæ, in Deciána persecutióne, per divérsa torménta martýrium consummárunt.
          Burdígalæ sancti Delphíni Epíscopi, qui, Theodósii témpore, cláruit sanctitáte.
          Romæ natális sanctæ Tharsíllæ Vírginis, ámitæ sancti Gregórii Papæ, de qua ipse testátur quod in hora éxitus sui Iesum ad se veniéntem víderit.
          Tréviris sanctæ Irminæ Vírginis, fíliæ Dagobérti Regis.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of December
      
          The Vigil of the Nativity of our Lord Jesus Christ.
          At Kraków, in Poland, the birthday of Saint John of Kantí, Priest and Confessor, whom, for his learning, his zeal for propagating the faith, his virtues,
  psalm.nono-kal-ndas-m-rtii-3432b7a07d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of February, were born into the better life:

          In Sicily, under the Emperor Diocletian, [fourth century,] seventy-nine holy martyrs, who through diverse torments won the crown of their confession.
          At Adrumetum, [Susa] in Africa, [in fourth century,] the holy martyrs Verulus, Secundinus, Syricius, Felix, Servulus, Saturninus, Fortunatus, and sixteen others, who were crowned with martyrdom for their confession of the Catholic faith in the persecution under the Vandals.
          At Bethsan, [about 452,] the holy martyr Severian, Bishop of that see.
          At Damascus, [in the year 743,] holy Peter Mavimeno. Some Arabs came to see him while he was ill, and to them he said, "Whoever does not embrace the Catholic Christian religion will be damned, as your false prophet Mohammed is," whereupon they killed him.
          At Ravenna, [in the year 556,] the holy Confessor Maximian.
          At Metz, [about the year 500,] holy Felix, Bishop of that see.
          At Brescia, [in the seventh century,] holy Paterius, [twenty-third] Bishop of that see.
      la:
      - type: text
        text: |-
          Nono Kaléndas Mártii

          Scythópoli, in Palæstína, sancti Severiáni, Epíscopi et Mártyris, qui, Eutychiánis acérrime se oppónens, gládio perémptus est.
          In Sicília natális sanctórum Mártyrum septuagínta novem, qui sub Diocletiáno, per divérsa torménta, confessiónis suæ corónam percípere meruérunt.
          Adruméti, in Africa, sanctórum Mártyrum Véruli, Secundíni, Sirícii, Felícis, Sérvuli, Saturníni, Fortunáti et aliórum séxdecim, qui in persecutióne Wandálica, ob cathólicæ fídei confessiónem, martýrio coronáti sunt.
          Damásci sancti Petri Maviméni, qui, cum díceret Arábibus quibúsdam, ad se ægrótum veniéntibus: «Omnis qui fidem Christiánam cathólicam non ampléctitur, damnátus est, sicut et Máhumet, pseudoprophéta vester,» ab illis est necátus.
          Metis, in Gállia, sancti Felícis Epíscopi.
          Bríxiæ sancti Patérii Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-First of February
      
          At Scythopolis, in Palestine, Saint Severianus, Bishop and Martyr, who, opposing the Eutychians most vigorously, was slain with the sword.
          In Sicily, the birthday of the holy Martyrs seventy
  psalm.nono-kal-ndas-maii-6a87c9d9c8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 23rd day of April, were born into the better life:

          The holy martyr George, whose illustrious martyrdom, [in the year 303,] the church of God honours among the crowns of her martyrs.
          At Valence, in Gaul, the holy martyrs the Priest Felix and the Deacons Fortunatus and Achilleus. They had been sent forth to preach the Word of God by blessed Irenaeus, Bishop of Lyon, and had brought a great part of the city of Valence to believe in Christ, when they were cast into prison by Cornelius the general. They were long beaten, their legs were broken, they were tied to the outside of turning wheels, hung in smoke upon the rack, and at length slain with the sword, [in the year 212.]
          In Prussia, [in the year 997,] the holy martyr Adalbert, Bishop of Prague, who preached the Gospel to the Poles and Hungarians.
          At Milan, [in the year 423,] the holy Confessor Marolus, Bishop [of that see.]
          At Toul, in Gaul, holy Gerard, Bishop of that city, [in the year 994.]
      la:
      - type: text
        text: |-
          Nono Kaléndas Maii

          Natális sancti Geórgii Mártyris, cuius illústre martýrium inter Mártyrum corónas Ecclésia Dei venerátur.
          In vico Tenkítten, ad sinum Venédicum, in Borússia, item natális sancti Adalbérti, Epíscopi Pragénsis et Mártyris, qui Polónis et Húngaris Evangélium prædicávit.
          Valéntiæ, in Gállia, pássio sanctórum Mártyrum Felícis Presbýteri, Fortunáti et Achilléi Diaconórum. Hi, cum fuíssent a beáto Irenǽo, Lugdunénsi Epíscopo, missi ad prædicándum verbum Dei, et máximam illíus civitátis partem ad Christi fidem convertíssent, a Duce Cornélio sunt in cárcerem trusi; deínde, diutíssime verberáti, cruribúsque confráctis, circa rotárum vertíginem stricti, fumum quoque in equúlei suspensióne perpéssi; ad extrémum gládio consummáti sunt.
          Medioláni sancti Mároli, Epíscopi et Confessóris.
          Tulli, in Gállia, sancti Gerárdi, eiúsdem civitátis Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-Third of April
      
          The birthday of Saint George, Martyr, whose illustrious martyrdom the Church of God venerates among the crowns of the Martyrs.
          In the village of Tenkitten, on the Gulf of Danzig, in Prussia, likewise the birthday of Saint Ada
  psalm.nono-kal-ndas-nov-mbris-9edcc2553c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow, we keep the feast of the holy Archangel Raphael.
          Upon the same 24th day of October, were born into the better life:

          At Venosa, in Apulia, the holy martyrs Felix, Bishop (of Tubzoca or Thibira,) in Africa the Priests Audactus and Januarius and the Readers Fortunatus and Septimus. In the time of the Emperor Diocletian they long suffered bonds and imprisonment in Africa and Sicily under the Procurator Magdellian, and, forasmuch as Felix refused to give up the holy books as commanded by the edict of the Emperor, they were at last slain with the sword.
          In the city of Nagran, in Yemen, (in the sixth century,) under the Jewish tyrant Dunaan, in the time of the Emperor Justin, the holy martyrs Aretas and his three hundred and forty Companions.
          After them was burnt a Christian woman and her son, aged five years, could neither be cajoled nor threatened into ceasing to confess Christ, but cast himself into the fire wherein his mother was being burnt.
          At Cologne, (in the fifth century,) the holy martyr Evergistus, Bishop (of that see.) At Constantinople, (in the year 447,) the holy Archbishop Proclus.
          In Brittany, (in the year 575,) holy Magloire, Bishop (of Dol,) whose body lieth at Paris.
          In the monastery of Vertou, (in the year 601,) the holy Abbot Martin.
          In Campania, holy Mark the Hermit, whose illustrious works are recorded by holy Gregory.
      la:
      - type: text
        text: |-
          Nono Kaléndas Novémbris

          Festum sancti Raphaélis Archángeli, cuius dígnitas ac benefícia in sacro Tobíæ libro celebrántur.
          In Monastério Fontis Frígidi, diœcésis Carcassonénsis, in Gállia, sancti Antónii Maríæ Claret, olim Archiepíscopi Cubáni, Fundatóris Missionariórum Filiórum Immaculáti Cordis beátæ Maríæ Vírginis, animárum zelo et mansuetúdine præclári, quem Pius Duodécimus, Póntifex Máximus, Sanctórum fastis adscrípsit. Ipsíus autem festum prídie huius diéi celebrátur.
          Venúsiæ, in Apúlia, natális sanctórum Mártyrum Felícis, Epíscopi Africáni; Audácti et Ianuárii, Presbyterórum; Fortunáti et Séptimi, Lectórum. Hi omnes, témpore Diocletiáni, a Magdelliáno Procuratóre multis diu vínculis et carcéribus in Africa et Sicília maceráti sunt, et, cum Felix sacros Libros iuxta ipsíus Imperatóris edíctum trádere nullátenus voluísset, gládii tandem occisióne consummáti sunt.
          Tungris, in Bélgio, sancti Evergísli, Epíscopi Coloniénsis et Mártyris; qui, ob pastorális offícii curam illuc proféctus, ibídem, dum nocte solus ad monastérium sanctíssimæ Genitrícis Dei Maríæ oratúrus pérgeret, a latrónibus sagítta percússus occúbuit.
          In civitáte Nagran, apud Homerítas, in Arábia, pássio sanctórum Arétæ, et Sociórum eius trecentórum et quadragínta, témpore Iustíni Imperatóris, sub Dúnaan, Iudǽo tyránno. Post eos Christiána múlier incéndio trádita est; cuius fílius annórum quinque, cum Christum balbutiéndo confiterétur, nec blandítiis nec minis retinéri posset, in ignem ubi mater ardébat, se præcípitem dedit.
          Constantinópoli sancti Procli Epíscopi.
          In ínsula Sargiénsi sancti Maglórii Epíscopi, qui ibídem, dimísso Episcopáli offício, quod erga sparsos in Armórica Británnos per triénnium exercúerat, monastérium constrúxit, in quo sancte réliquum vitæ tempus exégit; cuius corpus Lutétiam Parisiórum póstea translátum fuit.
          In monastério Duríni, in Gállia, sancti Martíni, Diáconi et Abbátis, cuius corpus inde ad Vertávum monastérium delátum est.
          In Campánia sancti Marci Solitárii, cuius præclára ópera sanctus Gregórius Papa descrípsit.
      en2:
      - type: text
        text: |-
          The Twenty-Third of October
      
          The Feast of Saint Raphael the Archangel, whose dignity and benefactions are celebrated in the sacred book of Tobit.
          In the Monastery of Fontfroide, of the diocese of Carcassonne, in Gaul, Saint Antho
  psalm.nono-kal-ndas-oct-bris-7a787e2076:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 23rd day of September, was born into the better life:

          At Rome, the holy martyr Pope Linus. He was the first successor of the blessed Apostle Peter in the government of the Church of Rome, was crowned with martyrdom, and is buried upon the Vatican Hill, hard by the Apostle.
          At Iconium, in Lycaonia, the holy Virgin and martyr Thecla. She was converted to the faith by the holy Apostle Paul. Under the Emperor Nero she overcame fire and beasts for her confession of Christ, and after many contendings, wherein she was victorious, for the teaching of many, she came to Seleucia, and there fell asleep in peace. The holy Fathers do greatly extol her.
          In Campania is made commemoration of the blessed Sosius, Deacon of the Church of Miseno. One while when he was reading the Gospel in the church, the holy Bishop Januarius saw flames rising from his head, and foretold that he would be a martyr. Neither was it many days afterward, when, being himself of the age of thirty years, he was beheaded along with the said Bishop, and so received martyrdom.
          In Africa, the holy martyrs Andrew, John, Peter, and Anthony.
          In the country of Coutances, the holy martyr Paternus, the Bishop.
          At Ancona, holy Constantius, watchman of the Church [of St. Stephen,] who was remarkable for his grace of working miracles.
          In Spain, the holy women Xantippe and Polyxena, who were disciples of the Apostles.
      la:
      - type: text
        text: |-
          Nono Kaléndas Octóbris

          Romæ sancti Lini, Papæ et Mártyris, qui, primus post beátum Petrum Apóstolum, Romanam Ecclésiam gubernávit, et, martýrio coronátus, sepúltus est in Vaticáno, prope eúndem Apóstolum.
          Icónii, in Lycaónia, sanctæ Theclæ, Vírginis et Mártyris; quæ, a sancto Paulo Apóstolo ad fidem perdúcta, ignes ac béstias, sub Neróne Imperatóre, in Christi confessióne devícit; et, post plúrima ad multórum doctrínam superáta certámina, venit Seleucíam, ibíque requiévit in pace. Ipsam vero sancti Patres summis láudibus celebrárunt.
          In Hispánia sanctárum mulíerum Xantíppæ et Polýxenæ, quæ fuérunt Apostolórum discípulæ.
          In Africa sanctórum Mártyrum Andréæ, Ioánnis, Petri et Antónii.
          Ancónæ sancti Constántii, Ecclésiæ Mansionárii, miraculórum grátia conspícui.
          In Campánia commemorátio beáti Sósii, Diáconi Misenátis, quem sanctus Epíscopus Ianuárius, cum de cápite illíus, Evangélium in Ecclésia legéntis, flammam vidéret exsúrgere, Mártyrem futúrum præannuntiávit; et, non post multos dies, ipse Sósius, cum esset annórum trigínta, cápitis detruncatióne martýrium cum eódem Epíscopo suscépit.
          Sescíaci, in Constantiénsi Gálliæ território, item Commemorátio sancti Patérni, Epíscopi Abrincénsis et Confessóris; cuius dies natális sextodécimo Kaléndas Maii recólitur.
      en2:
      - type: text
        text: |-
          The Twenty-Third of September
      
          At Rome, Saint Linus, Pope and Martyr, who, first after the blessed Apostle Peter, governed the Roman Church, and, crowned with martyrdom, was buried in the Vatican, near that same Apostle
  psalm.nono-kal-ndas-sept-mbris-a0f09616ac:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 24th day of August, were born into the better life:

          The holy Apostle Bartholomew. He preached the Gospel of Christ in India, whence he went into the greater Armenia, where, when he had turned many to the faith, he was flayed alive by the barbarians, and beheaded by order of King Astyages, [about the year of our Lord 71,] and so finished his testimony. His sacred body was first taken to the island of Lipari, then to Benevento, and lastly to Rome, to the island in the Tiber, where it is devoutly reverenced by the veneration of the faithful.
          At Carthage, three hundred holy martyrs, in the time of the Emperors Valerian and Gallienus, among other torments applied to them the President caused a limekiln to be lighted, and producing some hot embers and incense said to them, now choose one of two things, either offer this incense to Jupiter upon these coals, or be thrown into that lime. Then they, being armed with faith, and confessing that Christ is the Son of God, threw themselves in a twinkling into the kiln, where they were burnt to powder among the lime, whence this white-robed army of the blessed has gained the name of the White Lump.
          At Nepi, [in the first century,] the holy Bishop Ptolemy, a disciple of the blessed Apostle Peter, by whom he was sent into Tuscany to preach the Gospel, and in that city fell a glorious martyr of Christ and in the same place holy Romanus, Bishop of the same city, who, as he had been the disciple of holy Ptolemy was also his comrade in his last testimony and sufferings.
          At Ostia, [in the year 230,] the holy Virgin and martyr Aurea, who was cast into the sea with a stone tied about her neck. Her body was washed up upon the shore, and was buried by blessed Nonnus.
          In Isauria, [about the year 304,] the holy martyr Tation, who was slain with the sword under President Urban, in the persecution under the Emperor Diocletian, and so received the crown of martyrdom.
          On the same day, [at the end of the first or beginning of the second century,] holy Eutychius, a disciple of the blessed Evangelist John. For preaching the Gospel he suffered in many countries imprisonment, stripes, and fire but at length fell asleep in peace.
          Also, [in the eighth century,] the holy monk George, surnamed Limniotes. He rebuked the wicked Emperor Leo for breaking the holy images and burning the relics of the Saints, whereupon the Emperor commanded his hands to be cut off, and his head to be set on fire, and so as a martyr he passed away to be ever with the Lord.
          At Rouen, [in the year 683,] the holy Confessor Ouen, [Bishop of that see.]
          At Nevers, the holy Abbot Patrick.
      la:
      - type: text
        text: |-
          Nono Kaléndas Septémbris

          Sancti Bartholomǽi Apóstoli, qui Christi Evangélium in India prædicávit; inde in maiórem Arméniam proféctus, ibi, cum plúrimos ad fidem convertísset, vivus a bárbaris decoriátus est, atque, Astýagis Regis iussu, cápitis decollatióne martýrium complévit. Ipsíus sacrum corpus, primo ad Líparam ínsulam, deínde Benevéntum, postrémo Romam ad Tiberínam translátim ínsulam, ibi pia fidélium veneratióne honorátur.
          Lima, in Perúvia, natális sanctæ Rosæ a sancta María, Vírginis, e tértio Ordine sancti Domínici. Eius vero festívitas tértio Kaléndas Septémbris celebrátur.
          Népete sancti Ptolomǽi Epíscopi, qui fuit discípulus beáti Petri Apóstoli; atque, ab eo missus in Túsciam ad prædicándum Evangélium, in eádem civitáte gloriósus Christi Martyr occúbuit.
          Eódem die sancti Eutýchii, qui fuit discípulus beáti Ioánnis Evangelístæ; atque, ob Evangélii prædicatiónem in multis regiónibus cárceres, vérbera et ignes perpéssus, in pace tandem quiévit.
          Népete sancti Románi, eiúsdem civitátis Epíscopi, qui, cum esset sancti Ptolomǽi discípulus, fuit étiam in passióne sócius.
          Carthágine sanctórum trecentórum Mártyrum, témpore Valeriáni et Galliéni. Hi Mártyres magnánimi, inter ália supplícia, cum Præses fornácem calcáriam accéndi iussísset, et, in præséntia eius, prunas cum thure exhibéri, atque illis dixísset: « Elígite e duóbus unum, aut thura super his carbónibus offérte Iovi, aut in calcem demergímini », fide armáti, Christum Dei Fílium confiténtes, ictu rapidíssimo se iniecérunt in ignem, et inter calcis vapóres in púlverem sunt redácti; ex quo candidátus ille beatórum exércitus appellári Massa cándida méruit.
          In Isáuria sancti Tatiónis Mártyris, qui in persecutióne Diocletiáni, sub Urbáno Prǽside, gládio cæsus, martýrii corónam accépit.
          Item sancti Geórgii Limniótæ Mónachi, qui, cum ímpium Leónem Imperatórem, quod sacras Imágines frángeret Sanctorúmque relíquias combúreret, reprehendísset, hanc ob causam, eius iussu mánibus abscíssis et cápite incénso, Martyr migrávit ad Dóminum.
          Apud Ostia Tiberína sanctæ Aureæ, Vírginis et Mártyris; quæ, saxo ad collum ligáto, in mare demérsa est. Ipsíus autem corpus, eiéctum ad littus, beátus Nonnus sepelívit.
          Rotómagi sancti Audoéni, Epíscopi et Confessóris.
          Nivérnis, in Gállia, sancti Patrícii Abbátis.
          Neápoli, in Campánia, sanctæ Ioánnæ Antídæ Thouret, Vírginis, Institúti Sorórum a Caritáte Fundatrícis, quam Pius Papa Undécimus in album sanctárum Vírginum rétulit.
          Massíliæ, in Gállia, sanctæ Æmíliæ de Vialár, Vírginis, Fundatrícis Institúti Sorórum a sancto Ioseph ab Apparitióne, fortitudine, patiéntia et caritáte insígnis, quam Pius Duodécimus, Póntifex Máximus, in Sanctárum númerum rétulit.
          Valéntiæ, in Hispánia, natális sanctæ Marfæ Michaélæ, Vírginis, Fundatrícis Congregatiónis Ancillárum a Sanctíssimo Sacraménto et Caritátis, patiéndi stúdio ac desidério ánimas Deo lucrándi inflammátæ, quam Pius Papa Undécimus sanctis Virgínibus accénsuit.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of August
      
          Saint Bartholomew the Apostle, who preached the Gospel of Christ in India; and going thence to Greater Armenia, where he had converted very many to the faith, was flayed alive by the barbarians
  psalm.oct-vo-idus-apr-lis-1a41c47659:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 6th day of April, were born into the better life:

          At Rome, the blessed martyr, Pope Sixtus I, who ruled the Church, [in the years 117-127,] in the time of the Emperor Hadrian, and, under the Emperor Antoninus Pius, cheerfully welcomed the death of the body that so he might gain Christ.
          In Macedonia, the holy martyrs Timothy and Diogenes, [in the year 345.]
          In Persia, [at Adiabene,] an hundred and twenty holy martyrs, [about the year 344.]
          At Ascalon, the holy martyrs Platonides and two others.
          At Carthage, the holy martyr Marcellinus, who was slain by heretics, [in the year 413,] because he defended the Catholic faith.
          At Rome, the holy Confessor, Pope Celestine [I, in the years 422-432,] who condemned Nestorius, Archbishop of Constantinople, and drave out Pelagius. It was by his authority that the holy General Council of Ephesus was held against the said Nestorius.
          In Ireland, the holy Confessor Kelly, Archbishop of Armagh, [in the year 1128,] in the which see he came immediately before blessed Maleachlan.
          In Denmark, holy William, Abbot [of Eskill,] famous for his life and miracles, [born 1105, died 1202.] [Of the order of Canons Regular of St Victor, Nephew of Hew, 42nd Abbot of St. Germain des Pres.]
      la:
      - type: text
        text: |-
          Octávo Idus Aprílis

          Medioláni pássio sancti Petri, ex Ordine Prædicatórum, Mártyris, qui ab hæréticis, ob fidem cathólicam, interémptus est. Ipsíus tamen festívitas recólitur tértio Kaléndas Maii.
          Velehrádii, in Morávia, natális sancti Methódii, Epíscopi et Confessóris, qui, una cum sancto Cyríllo, item Epíscopo et fratre suo, cuius natális sextodécimo Kaléndas Mártii recensétur, multas Slávicas gentes earúmque Reges ad fidem Christi perdúxit. Horum autem Sanctórum festum Nonis Iúlii celebrátur.
          In Macedónia sanctórum Mártyrum Timóthei et Diógenis.
          In Pérside sanctórum centum vigínti Mártyrum.
          Ascalóne, in Palæstína, pássio sanctórum Platónidis et aliórum duórum Mártyrum.
          Carthágine sancti Marcellíni Mártyris, qui, ob cathólicæ fídei defensiónem, ab hæréticis occísus est.
          In Dánia sancti Guliélmi Abbátis, vita et miráculis clari.
      en2:
      - type: text
        text: |-
          The Sixth of April
      
          At Milan, the passion of Saint Peter, of the Order of Preachers, Martyr, who was slain by heretics for the catholic faith. His feast, however, is observed on the twenty-ninth of April.
          At Ve
  psalm.oct-vo-idus-aug-sti-d36aadad24:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 6th day of August we keep the feast of the Transfiguration of Our Lord Jesus Christ upon Mount Tabor [in the year of our Lord 32.]
          Upon the same day, were born into the better life:

          At Rome, in the cemetery of Callistus, upon the Appian Way, [in the year 258,] the blessed Pope and martyr Sixtus II, who received the crown of martyrdom by the sword in the persecution under Valerian. Likewise the holy martyrs Felicissimus and Agapitus, deacons of the aforesaid blessed Xystus, and his subdeacons Januarius, Magnus, Vincent, and Stephen, who were all beheaded along with him, and were buried in the cemetery of Pretextatus. Along with them suffered also the blessed Quartus, as is written by holy Cyprian.
          At Bologna, the birthday of St. Dominic, confessor and founder of the Order of Friars Preachers. He was a man of great renown for holiness and learning. Until death he preserved without stain his virginity, and by the singular grace of his merits raised three dead men to life. By his preaching he curbed heresies, and established many persons in a religious and godly manner of life. He died on this day, but his festival, by an ordinance of Pope Paul IV, is celebrated on August 4.
          At Burgos, in Spain, in the Monastery of St. Peter de Cardena, of the Order of St. Benedict, [in the year 872,] the Abbot Stephen and two hundred monks, who were massacred by the Saracens for their faith in Jesus Christ, and by the Christians then buried inside their cloister.
          At Alcala, in Spain, [in the year 304,] the holy brethren Justus and Pastor, both martyrs. They were boys learning at school when they threw away their slates, and ran of their own wish to be martyred. The President Dacian ordered them to be taken and cudgelled, and when they continued to call on each other to stand firm he had them led outside the city, where the executioner cut their throats.
          At Rome, [in the year 523,] the holy Confessor Pope Hormisdas.
          At Diarbekr, [in Mesopotamia, about the year 502,] the holy hermit James, famous for miracles.
      la:
      - type: text
        text: |-
          Octávo Idus Augústi

          In monte Thabor Transfigurátio Dómini nostri Iesu Christi.
          Romæ, via Appia, in cœmetério Callísti, natális beáti Xysti Secúndi, Papæ et Mártyris, qui, in persecutióne Valeriáni, gládio animadvérsus, martýrii corónam accépit.
          Item Romæ sanctórum Mártyrum Felicíssimi et Agapíti, ipsíus beáti Xysti Diaconórum; Ianuárii, Magni, Vincéntii et Stéphani, Subdiaconórum. Hi omnes, una cum eódem Pontífice páriter decolláti sunt, atque in Prætextáti cœmetério sepúlti. Passus est étiam cum eis beátus Quartus, ut scribit sanctus Cypriánus.
          Bonóniæ natális sancti Domínici Confessóris, qui Ordinis Fratrum Prædicatórum Fundátor éxstitit. Hic vir, sanctitáte et doctrína claríssimus, virginitátem perpétuo illibátam custodívit, et, ob singulárem meritórum grátiam, tres mórtuos suscitávit; cumque prædicatióne sua compressísset hǽreses, ac plúrimos ad religiósam et piam vitam instituísset, in pace quiévit. Eius autem festívitas prídie Nonas mensis huius celebrátur, ex constitutióne Pauli Papæ Quarti.
          In monastério sancti Petri de Cardégna, Ordinis sancti Benedícti, apud Burgos, in Hispánia, pássio ducentórum Monachórum cum Stéphano Abbáte, qui a Saracénis pro Iesu Christi fide interfécti sunt, atque ibídem in claustro a Christiánis sepúlti.
          Complúti, in Hispánia, sanctórum Mártyrum Iusti et Pastóris fratrum, qui, cum adhuc púeri lítteris imbueréntur, sponte ad martýrium, proiéctis in schola tábulis, cucurrérunt; et mox, a Daciáno Prǽside tenéri iussi et fústibus cædi, ambo, cum se mútuis exhortatiónibus constantíssime corroborárent, extra civitátem perdúcti sunt, et ibi a carnífice iuguláti.
          Romæ sancti Hormísdæ, Papæ et Confessóris.
          Amidæ, in Mesopotámia, sancti Iacóbi Eremítæ, miráculis clari.
      en2:
      - type: text
        text: |-
          The Sixth of August
      
          On Mount Tabor, the Transfiguration of our Lord Jesus Christ.
          At Rome, on the Appian Way, in the cemetery of Callistus, the birthday of the blessed Xystus II, Pope and Martyr, who, in the persecution of Valerian,
  psalm.oct-vo-idus-dec-mbris-0483875c71:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 6th day of December, were born into the better life:

          At Myra, which is the chief city of Lycia, (in the year 324,) the holy Confessor Nicolas, Bishop (of that see,) of whom among many other signs and wonders it is recorded that when the Emperor Constantine had condemned certain persons to death and these called upon Nicolas, who was alive, and afar off, he appeared unto the Emperor, and bent him to mercy by exhortation and threats.
          In Africa, the holy women Dionysia, Dativa, and Leontia, and the monk Tertius, the physician Aemilian, Boniface, and three others, who in the Vandal persecution under the Arian King Hunneric were tormented in most grievous and manifold ways for their defence of the Catholic faith, and so earned a place among Confessors of Christ, (in the year 484.)
          At the same time and place, the holy martyr Majoricus, the son of holy Dionysia. He was but a little lad and was in fear of the torments, but by the looks and words of his mother, he was so strengthened that he became mightier than them all, and died under the torture his mother took his body to her heart, and buried it in their home, and was used to pray instantly at his grave.
          On the same day, the holy priest Polychronius, who was saying Mass in the time of the Emperor Constantius, when the Arians attacked him and slew him, (fourth century.)
          At Granada, in Spain, the blessed martyr Peter Paschasius, Bishop of Jaen, of the order of blessed Mary of Ransom for the redemption of captives, (in the year 1300.)
          At Rome, the holy Virgin Asella, who, as writeth blessed Jerome, was blessed from her mother's womb, and passed her life in fastings and prayers unto a good old age. (Born about 334 and died about 410.)
      la:
      - type: text
        text: |-
          Octávo Idus Decémbris

          Myræ, quæ est metrópolis Lýciæ, natális sancti Nicolái, Epíscopi et Confessóris, de quo, inter plura miraculórum insígnia, illud memorábile fertur, quod Imperatórem Constantínum ab intéritu quorúmdam se invocántium, longe constitútus, ad misericórdiam per visum mónitis defléxit et minis.
          Eódem die sancti Polychrónii Presbýteri, qui, témpore Constántii Imperatóris, cum ad altáre Missas ágeret, invásus est ab Ariánis et iugulátus.
          In Africa sancti Maiórici, fílii sanctæ Dionýsiæ, qui, cum esset adolescéntulus ac torménta pavésceret, matris obtútibus verbísque corroborátus est, et, céteris fórtior factus, in torméntis ánimam réddidit; quem amplexáta mater domi sepelívit, et ad eius sepúlcrum assídue orare consuévit.
          Ibídem sanctárum mulíerum Dionýsiæ, quæ sancti Maiórici Mártyris éxstitit mater, Datívæ ac Leóntiæ; itémque religiósi viri, nómine Tértii, Æmiliáni médici, et Bonifátii, cum áliis tribus. Hi omnes, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, gravíssimis et innúmeris supplíciis pro cathólicæ fídei defensióne cruciáti, sanctórum Christi Confessórum número sociári meruérunt.
          Romæ sanctæ Aséllæ Vírginis, quæ (ut beátus Hierónymus scribit), ex útero matris benedícta, vitam in ieiúniis et oratiónibus usque ad senéctam prodúxit.
          Granátæ, in Hispánia, pássio beáti Petri Paschásii, Epíscopi Giennénsis et Mártyris, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum.
      en2:
      - type: text
        text: |-
          The Sixth of December
      
          At Myra, which is the metropolis of Lycia, the birthday of Saint Nicholas, Bishop and Confessor, of whom, among many notable signs of miracles, that memorable one is told, how he prevailed upon the Emperor Constantine
  psalm.oct-vo-idus-febru-rii-37f5e595bb:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Titus, Archbishop of Gortyna, in Crete, of whom mention is made upon the 4th day of January.
          Upon the same 6th day of February, were born into the better life:

          At Caesarea, in Cappadocia, the holy Virgin and martyr Dorothy, who under Sapricius, President of that province, was first racked, then long scourged with palm-branches, and at length put to death [,in the year 304]. At the sight of her sufferings a certain student, named Theophilus, was converted to Christ, and forthwith grievously racked, and at length beheaded.
          On the same day the holy martyrs Saturninus, Theophilus, and Revocata.
          At Emessa, in Phoenicia, the holy Bishop Silvan, who, when he had been forty years in rule over that church, was cast to wild beasts along with two others, under the Emperor Maximian, and, torn to pieces, received the palm of martyrdom [in the year 312].
          At [Clermont,] Auvergne, in Gaul, the holy martyr Antholian [,about the year 265].
          On the same day, [in the year 540,] holy Bishop Vedastus, and [in the year 684,] holy Bishop Amandus, the first of whom ruled over the Church of Arras, the second the Church of Maastricht, whose lives and deaths were rendered glorious by diverse miracles.
          At Bologna, [in the year 1159,] holy Guarinus, Cardinal Bishop of Palestrina, eminent for the holiness of his life.
      la:
      - type: text
        text: |-
          Octávo Idus Februárii

          Sancti Titi, Epíscopi Creténsium et Confessóris, cuius dies natális occúrrit prídie Nonas Ianuárii.
          Cæsaréæ, in Cappadócia, natális sanctæ Dorótheæ, Vírginis et Mártyris; quæ, sub Saprício, illíus Provínciæ Prǽside, primum per equúlei extensiónem vexáta, dehinc palmis diutíssime cæsa, capitáli senténtia ad últimum puníta est. In eius confessióne Theóphilus quidam scholásticus ad Christi fidem convérsus, et mox equúleo acérrime tortus, novíssime gládio cæsus est.
          Eméssæ, in Phœnícia, sancti Silváni Epíscopi, qui, cum eídem Ecclésiæ annis quadragínta præfuísset, tandem, sub Maximiáno Imperatóre, una cum duóbus áliis, obiéctus feris membratímque discérptus, martýrii palmam accépit.
          Eódem die sanctórum Mártyrum Saturníni, Theóphili et Revocátæ.
          Arvérnis, in Gállia, sancti Antholiáni Mártyris.
          Atrébati, in Gálliis, sancti Vedásti, eiúsdem civitátis Epíscopi, cuius vita et mors plúrimis miráculis éxstitit gloriósa.
          Elnóne, in Gállia, sancti Amándi, Epíscopi Traiecténsis, qui miráculis, cum vivus tum mórtuus, glorióse refúlsit; cuius nómine póstmodum insignítum est óppidum, in quo ille monastérium exstrúxerat et mortálem vitam absólverat.
          Bonóniæ sancti Guaríni, Cardinális et Epíscopi Prænestíni, vitæ sanctitáte conspícui.
      en2:
      - type: text
        text: |-
          The Sixth of February
      
          Saint Titus, Bishop of Crete and Confessor, whose birthday falls on the fourth of January.
          At Caesarea, in Cappadocia, the birthday of Saint Dorothea, Virgin and Martyr; who,
  psalm.oct-vo-idus-i-lii-b35b7c4dfa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of

          Holy widow Isabel, Queen of Portugal, famous for her graces and miracles, [in the year 1336,] whom Pope Urban VIII enrolled among the Saints.
          In Lesser Asia, the holy Aquila and Priscilla his wife, of whom the holy Evangelist Luke writeth in the Acts of the Apostles [xviii, 2]
          At Porto, in Italy, fifty holy soldiers, all martyrs, who were brought to the faith through the testifying of holy Bonosa, baptized by the blessed Pope Felix, and slain in the persecution under the Emperor Aurelian.
          In Palestine, the holy martyr Procopius. In the persecution under the Emperor Diocletian he was brought from Bethshan, [where he Was reader, exorcist, and interpreter in the church,] to Caesarea, where at the constancy of his very first answers he was beheaded by the command of Fabian the judge.
          At Constantinople, the holy Abrahamite monks, who resisted the Emperor Theophilus concerning the worship of the holy images, and therefore suffered martyrdom.
          At Wurzburg, in Germany, holy Killan, Bishop of that city. [An Irish monk, who travelled to Rome in the year 686, was sent by the Roman Pontiff Conon to preach the Gospel.]
          When he had turned many to Christ he was murdered, [in the year 689,] along with Colman a Priest and Tatnan a Deacon.
          At Rome, the blessed Pope Eugenius III. He had been Abbot of the monastery of SS. Vincent and Anastatius, near Rome, before he was made Supreme Pontiff. He ruled the universal Church with wonderful holiness and wisdom. [His name was Bernard Paganelli, and he was a native of Pisa, and Canon of that city. He then became a monk of Cîteaux and disciple of St. Bernard before being elected Pope on February 15, 1145, and consecrated in the Benedictine Abbey of Farfa on the 16th of that month. He died at Tivoli on July 8, 1153.]
          At Trier, the holy Confessor Auspicius, Bishop [of that see, fifth century.]
      la:
      - type: text
        text: |-
          Octávo Idus Iúlii

          Sanctæ Elísabeth Víduæ, Lusitanórum Regínæ, quæ ad regnum cæléste quarto Nonas huius mensis transívit.
          In Asia minóre sanctórum Aquilæ et Priscíllæ uxóris, de quibus in Actibus Apostolórum scríbitur.
          Herbípoli, in Germánia, sancti Chiliáni Epíscopi, qui, a Románo Pontífice ad prædicándum Evangélium missus, ibi, cum multos ad Christum perduxísset, una cum Sóciis Colománno Presbýtero, et Totnáno Diácono, trucidátus est.
          In Portu Románo sanctórum quinquagínta mílitum Mártyrum, qui, in sanctæ Bonósæ confessióne ad fidem addúcti, et a beáto Felíce Papa Primo baptizáti, in Aureliáni Imperatóris persecutióne occísi sunt.
          Cæsaréæ, in Palæstína, sancti Procópii Mártyris, qui, sub Diocletiáno Imperatóre, a Scythópoli ductus Cæsaréam, illic, ad primam responsiónum eius confidéntiam, a Iúdice Fabiáno est cápite cæsus.
          Constantinópoli pássio sanctórum Monachórum Abrahamitárum, qui ob cultum sanctárum Imáginum, resisténtes Theóphilo Imperatóri, martýrium consummárunt.
          Spinæ Lambérti, in Æmília, sancti Hadriáni Papæ Tértii, stúdio conciliándi Románæ Ecclésias Orientáles insígnis, ac miráculis clari; cuius corpus in monastérium Nonantulénse fuit delátum, et in æde sancti Silvéstri honorífice cónditum.
          Tréviris sancti Auspícii, Epíscopi et Confessóris.
          Romæ beáti Eugénii Papæ Tértii, qui, postquam cœnóbium sanctórum Vincéntii et Anastásii ad Aquas Sálvias magna sanctimóniæ ac prudéntiæ laude rexísset, Ecclésiam univérsam, Póntifex Máximus renuntiátus, sanctíssime gubernávit. Cultum autem, ab immemorábili témpore ipsi exhíbitum, Pius Papa Nonus ratum hábuit et confirmávit.
      en2:
      - type: text
        text: |-
          The Sixth of July
      
          Saint Elizabeth, Widow, Queen of Portugal, who passed to the heavenly kingdom on the fourth of July.
          In Asia Minor, the holy Aquila and his wife Priscilla, of whom mention is made in the Acts of the Apostles
  psalm.oct-vo-idus-i-nii-1066084cb8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 6th day of June, were born into the better life:

          Holy Norbert, Archbishop of Magdeburg, founder of the Order of the Premonstratensian Canons Regular.
          At Caesarea, in Palestine, the blessed Philip, who was one of the first seven Deacons. He was illustrious for signs and wonders. He turned Samaria to believe in Christ, and baptized the eunuch of Candace, Queen of the Ethiopians. He fell asleep at last at Caesarea. Three of his virgin daughters, who were prophetesses, lie buried beside him. His fourth daughter died at Ephesus, full of the Holy Ghost.
          At Rome, the holy martyrs Artemius, with Candida his wife and Paulina his daughter. This Artemius was brought to believe in Christ by the preaching and miracles of the holy Exorcist Peter, and was baptized with all his house by the holy Priest Marcellinus. He was first hided with scourges loaded with lead by order of Serenus the Judge, and afterwards beheaded. His wife and daughters were thrown into a vault, and buried in stones and rubbish.
          At Tarsus, in Cilicia, twenty holy martyrs, who in the time of Diocletian and Maximian, under Simplicius the Judge, by diverse torments glorified God in their bodies.
          At Noyon, in Gaul, [in the year 290,] the holy martyrs Amantius, Alexander, and their companions.
          At Fiesole, in Tuscany, [in the year 839,] the holy martyr Alexander, Bishop [of that see, drowned in a torrent by his enemies.]
          At Milan, deceased, [in the year 518,] the holy Confessor Eustorgius, second of that name, Bishop [of that see.]
          At Verona, holy John, Bishop [of that see, in the fourth century.]
          At Besançon, in Gaul, [in the year 699,] holy Claud, Archbishop [of that see.]
      la:
      - type: text
        text: |-
          Octávo Idus Iúnii

          Magdebúrgi sancti Norbérti, eiúsdem civitátis Epíscopi et Confessóris, qui Fundátor éxstitit Ordinis Præmonstraténsis.
          Cæsaréæ, in Palæstína, natális beáti Philíppi, qui fuit unus de septem primis Diáconis. Hic, signis et prodígiis clarus, Samaríam ad Christi fidem convértit, et Regínæ Æthíopum Candácis Eunúchum baptizávit, ac demum apud Cæsaréam requiévit. Iuxta ipsum tres Vírgines, eius fíliæ ac Prophetíssæ, tumulátæ iacent; nam quarta fília eius, plena Spíritu sancto, Ephesi occúbuit.
          Romæ sancti Artémii, cum uxóre sua Cándida, et fília Paulína. Ex his Artémius, ad prædicatiónem et mirácula sancti Petri Exorcístæ, ad Christum convérsus, et, cum omni domo sua, a sancto Marcéllino Presbýtero baptizátus, Seréni Iúdicis iussu plumbátis cæsus et gládio percússus est; uxor vero eius et fília, in cryptam impúlsæ, lapídibus ruderibúsque sunt óbrutæ.
          In agro Bononiénsi sancti Alexándri, Epíscopi Fæsuláni et Mártyris; qui, rédiens ex urbe Pápia, ubi Ecclésiæ suæ bona apud Longobardórum Regem ab usurpatóribus vindicáverat, ab his in Rhenum flúvium est deiéctus et aquis præfocátus.
          Tarsi, in Cilícia, sanctórum Mártyrum vigínti, qui, tempóribus Diocletiáni et Maximiáni, sub Simplício Iúdice, per divérsa torménta glorificavérunt Deum in corpóribus suis.
          Noviodúni, in Gálliis, sanctórum Mártyrum Amántii, Alexándri et Sociórum.
          Medioláni deposítio sancti Eustórgii Secúndi, Epíscopi et Confessóris.
          Verónæ sancti Ioánnis Epíscopi.
          Vesontióne, in Gálliis, sancti Cláudii Epíscopi.
      en2:
      - type: text
        text: |-
          The Sixth of June
      
          At Magdeburg, Saint Norbert, Bishop of that city and Confessor, who was the Founder of the Premonstratensian Order.
          At Caesarea, in Palestine, the birthday of the blessed Philip, who was one of the
  psalm.oct-vo-idus-ianu-rii-dee5e06882:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Epiphany of the Lord.
          Upon the same 6th day of January, were born into the better life:

          In the country of Reims, by command of the President Rictiovarus, in the persecution under the Emperor Diocletian, the holy virgin and martyr Macra she was first cast into the fire but remained unhurt, whereupon her breasts were cut off, and she was thrust into a prison and rolled upon sharp potsherds and live coals until she passed away in prayer to be ever with the Lord.
          On the same day are commemorated many holy martyrs in Africa, who were burnt at the stake in the persecution under the Emperor Severus.
          At Rennes, in Gaul, the holy confessor Melanius (Abbot of Platz) (in the year 511), bishop of that see, who after countless works of power passed gloriously out of this world to that heaven where his heart was already fixed (in the year 530).
          At Florence, holy Andrew Corsini of that city, a Carmelite friar, Bishop of Fiesoli, who was famous for miracles (in the year 1373), and whose name was numbered by Urban VIII. among those of the Saints, whose feast we keep upon the 4th day of February.
          At Geris, in Egypt, the holy hermit Nilammon, who gave up his soul in prayer to God while he was being haled against his will to make him a bishop (fifth century).
      la:
      - type: text
        text: |-
          Octávo Idus Ianuárii

          Epiphánia Dómini.
          Floréntiæ natális sancti Andréæ Corsíni, civis Florentíni, ex Ordine Carmelitárum, Epíscopi Fesuláni et Confessóris; quem, miráculis clarum, Urbánus Papa Octávus in Sanctórum númerum rétulit. Eius autem festívitas recólitur prídie Nonas Februárii.
          Barcinóne, in Hispánia, item natális sancti Raymúndi de Peñáfort, ex Ordine Prædicatórum, Confessóris, doctrína et sanctitáte célebris. Ipsíus vero festum décimo Kaléndas Februárii celebrátur.
          In Africa commemorátio plurimórum sanctórum Mártyrum, qui, in persecutióne Sevéri, ad palum ligáti sunt et igne consúmpti.
          In território Rheménsi pássio sanctæ Macræ Vírginis, quæ, in persecutióne Diocletiáni, iubénte Rictiováro Prǽside, cum in ignem esset præcipitáta et permansísset illǽsa, dehinc, mamíllis abscíssis et squalóre cárceris afflícta, super testas étiam acutíssimas ac prunas volutáta, tandem orans migrávit ad Dóminum.
          Rhédonis, in Gállia, sancti Melánii, Epíscopi et Confessóris; qui, post innumerabílium signa virtútum, iúgiter cælo inténtus, gloriósus migrávit a sǽculo.
          Geris, in Ægýpto, sancti Nilammónis reclúsi, qui, dum ad Episcopátum traherétur invítus, in oratióne spíritum Deo réddidit.
      en2:
      - type: text
        text: |-
          The Sixth of January
      
          The Epiphany of the Lord.
          At Florence, the birthday of Saint Andrew Corsini, a Florentine citizen, of the Order of Carmelites, Bishop of Fiesole and Confessor; whom, renowned for miracles, Pope Urban VIII
  psalm.oct-vo-idus-m-rtii-a7bca74271:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 8th day of March, were born into the better life:

          In England, [in the year 646,] the holy Confessor Felix, Bishop of Dunwich, who converted the East Angles to the faith.
          At Granada, in Spain, [in the year 1550,] holy John of God, founder of the Order of brethren Hospitallers of the Sick. Famous for his pity toward the poor, and for his lowly esteem of himself, whom the Supreme Pontiff Leo XIII. declared the patron in heaven of all the sick and those who nurse them, whose feast we keep upon the 11th day of this present month of March.
          At Antinoe, in Egypt, the holy martyrs Philemon and Apolonius the Deacon. They were arrested, and brought before the judge, but as they steadfastly refused to sacrifice to idols their heels were bored through, and they were cruelly dragged about the city until at last they were dispatched with the sword.
          There also the holy martyrs the President Arian, [governor of Thebes,] Theoticus, and three others whom the judge caused to be drowned in the sea, but their bodies were brought to the shore by dolphins, [in the year 287.]
          At Nicomedia, the holy martyr Quinctilis, Bishop of that city.
          At Carthage, holy Pontius, Deacon to blessed Bishop Cyprian, with whom he remained in exile even unto the day of his death, and hath left unto us an excellent book of his life and passion.
          In his own sufferings he glorified the Lord always, and hath earned the crown of life, [about the year 262.]
          In Africa likewise, the holy Bishop Cyril, Rogatus, Felix, another Rogatus, Beata, Herenia, Felicitas, Urban, Silvan, and Mamillus.
          At Toledo, in Spain, the blessed Confessor Julian, Bishop of that see, [and also native of the same place.] Very famous for his holiness and teaching, [in the year 690.]
      la:
      - type: text
        text: |-
          Octávo Idus Mártii

          Granátæ, in Hispánia, sancti Ioánnis de Deo Confessóris, qui Ordinis Fratrum Hospitalitátis infirmórum fuit Institútor, ac misericórdia in páuperes et sui despéctu éxstitit insígnis; quem Leo Décimus tértius, Póntifex Máximus, cæléstem ómnium hospitálium et infirmórum Patrónum renuntiavit.
          Nicomedíæ sancti Quinctílis, Epíscopi et Mártyris.
          In Africa sanctórum Mártyrum Cyrílli Epíscopi, Rogáti, Felícis, item Rogáti, Beátæ, Heréniæ, Felicitátis, Urbáni, Silváni et Mamílli.
          Apud Antínoum, Ægýpti urbem, natális sanctórum Mártyrum Apollónii Diáconi, et Philémonis; qui, tenti et ad Iúdicem addúcti, et, cum sacrificáre idólis constánter renuíssent, ambo, perforátis calcáneis, per civitátem horribíliter tracti, ac novíssime, gládio cæsi, martýrium complevérunt.
          Ibídem pássio sanctórum Ariáni Prǽsidis, Theótici et aliórum trium, quos Iudex submérsos in mare necávit, sed delphinórum obséquio córpora eórum ad littus deláta sunt.
          Carthágine sancti Póntii, qui fuit Diáconus beáti Cypriáni Epíscopi, et, usque ad diem mortis illíus sústinens cum ipso exsílium, vitæ et passiónis eius egrégium volúmen relíquit, atque, in suis passiónibus Dóminum semper gloríficans, corónam vitæ proméruit.
          Toléti, in Hispánia, deposítio beáti Iuliáni, Epíscopi et Confessóris, sanctitáte et doctrína celebérrimi.
          In Anglia sancti Felícis Epíscopi, qui orientáles Anglos ad fidem convértit.
      en2:
      - type: text
        text: |-
          The Sixth of March
      
          At Granada, in Spain, Saint John of God, Confessor, who was the Founder of the Order of Brothers of Hospitality for the sick, and was distinguished for mercy toward the poor and contempt of himself;
  psalm.oct-vo-idus-maii-9a34d0ecee:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is kept the feast in honour of the Manifestation of the holy Archangel Michael on Mount Gargano.
          Upon the same 8 th day of May, were born into the better life:

          At Milan, the holy martyr Victor. He was a Moor by nation, and had been bred up a Christian from a child. He was a soldier in the Imperial Camp when he was commanded by Maximian to sacrifice to idols, but continued manfully to own the Lord. He was first heavily cudgelled, but God shielded him from pain and then molten lead was poured upon him, but by this also he was not hurt and so at last, being beheaded, finished the glorious course of his testimony.
          At Constantinople, the holy Centurion Acathius, who in the persecution under Diocletian and Maximian was denounced as a Christian by the Tribune Firmus. He was most cruelly tortured at Perinthos, on the Black Sea, by Bibianus the judge, and was lastly condemned to death at Byzantium by the Pro-Consul Flaccinus. By the Will of God his body was afterwards carried to the shore at Squillacio in Calabria, where it is honourably buried.
          At Vienna, the holy Confessor Denis, Bishop [of that see.]
          At Auxerre, [toward the close of the fourth century,] the holy Helladius, Bishop [of that see.]
          In the country of Besancon, [in the year 1174,] the holy Peter, Bishop [of Tarantaise.]
          In Ireland, [about the year 700,] the holy Bishop Wiro.
      la:
      - type: text
        text: |-
          Octávo Idus Maii

          Cracóviæ, in Polónia, natális sancti Stanislái, Epíscopi et Mártyris, qui a Bolesláo, ímpio Rege, necátus est. Ipsíus autem festum prídie huius diéi celebrátur.
          Medioláni item natális sancti Victóris Mártyris, qui, natióne Maurus et a primǽva ætáte Christiánus, a Maximiáno, cum esset in castris imperiálibus miles, compúlsus ut idólis sacrificáret, et in confessióne Dómini fortíssime persevérans, ídeo, primum gráviter fústibus cæsus, sed, Deo protegénte, dolóris expers; deínde liquénti plumbo perfúsus, sed nihil pénitus læsus; novíssime gloriósi martýrii cursum, cápite abscíssus, implévit.
          Constantinópoli sancti Agáthii Centuriónis, qui, in persecutióne Diocletiáni et Maximiáni, a Firmo Tribúno delátus quod Christiánus esset, et a Iúdice Perínthi Bibiáno sævíssime tortus, Byzántii demum a Procónsule Flaccíno cápitis damnátus est. Ipsíus corpus ad Scyllácium littus, in Calábria, divínitus póstea delátum est, atque ibi honorífice asservátum.
          Romæ sancti Bonifátii Papæ Quarti, qui Pántheon in honórem beátæ Maríæ ad Mártyres dedicávit.
          Item Romæ sancti Benedícti Secúndi, Papæ et Confessóris.
          Viénnæ, in Gállia, sancti Dionýsii, Epíscopi et Confessóris.
          Antisiodóri sancti Helládii Epíscopi.
          In monastério Bellæ Vallis, in território Bisuntíno, sancti Petri, qui ex Mónacho Cisterciénsi factus est Tarentasiénsis in Sabáudia Epíscopus.
          Apud Ruræmóndam, in Géldria, sancti Wirónis, Epíscopi Scoti.
          In monte Gargáno Apparítio sancti Michaélis Archángeli, quem Pius Papa Duodécimus Radiólogis et Radiumtherapéuticis Patrónum et Protectórem constítuit.
      en2:
      - type: text
        text: |-
          The Sixth of May
      
          At Kraków, in Poland, the birthday of Saint Stanislaus, Bishop and Martyr, who was slain by the wicked King Boleslaus. His feast is celebrated on the day before.
          At Milan, likewise the birthday of
  psalm.oct-vo-idus-nov-mbris-a3a6b6e393:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 6th day of November, were born into the better life:

          At Thinissa, in Africa, (in the fourth century,) the holy martyr Felix, who had made his confession and was reserved for the torture, when on the next day he was found dead in prison, as is told by holy Augustine in his exposition of Ps. cxxvii. made to the people upon his festival.
          At Antioch, ten holy martyrs who are recorded to have suffered at the hands of the Saracens.
          At Barcelona, the holy martyr Severus, Bishop (of that see,) who for the Catholic faith's sake had a nail driven into his head, and so received the crown of martyrdom.
          In Phrygia, holy Atticus.
          At Bergues, (before the middle of the eighth century,) holy Winoc, Abbot (of Wormhout,) famous for graces and miracles, who ministered for a long time to the brethren subject unto him.
          At Fondi, in Latium, (in the sixth century,) the holy Monk Felix.
          At Limoges, in Aquitaine, (in the sixth century,) the holy Confessor Leonard, a disciple of blessed Bishop Remy. He was noble by birth, but chose the life of an hermit, and is famous for his holiness and miracles, but his power hath been most chiefly shown in the freeing of prisoners.
      la:
      - type: text
        text: |-
          Octávo Idus Novémbris

          Barcinóne, in Hispánia, sancti Sevéri, Epíscopi et Mártyris; qui ob fidem cathólicam, confósso per clavum cápite, martýrii corónam accépit.
          Thiníssæ, in Africa, natális sancti Felícis Mártyris, qui, conféssus et ad torménta dilátus, alio die (ut refert sanctus Augustínus, Psalmum in eius festivitáte ad pópulum expónens) invéntus est in cárcere exánimis.
          Theópoli, quæ est Antiochía, sanctórum decem Mártyrum, qui a Saracénis passi legúntur.
          In Phrýgia sancti Attici Mártyris.
          Apud Bergas, in Flándria, deposítio sancti Winóci Abbátis, qui, virtútibus et miráculis clarus, étiam frátribus sibi súbditis multo témpore ministrávit.
          Fundis, in Látio, sancti Felícis Mónachi.
          Lemóvicis, in Aquitánia, sancti Leonárdi Confessóris, qui fuit beáti Remígii Epíscopi discípulus. Hic, nóbili génere ortus, solitáriam vitam delégit, et sanctitáte ac miráculis cláruit; eiúsque virtus præcípue in liberándis captívis enítuit.
      en2:
      - type: text
        text: |-
          The Sixth of November
      
          At Barcelona, in Spain, Saint Severus, Bishop and Martyr; who, for the catholic faith, received the crown of martyrdom with a nail driven through his head.
          At Thinissa, in Africa, the birthday of Saint F
  psalm.oct-vo-idus-oct-bris-3cc2390692:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 8th day of October we keep the Feast of the holy Widow Bridget, (Princess of Nericia.) After many pilgrimages to holy places she died at Rome, full of the Spirit of God, upon the 23rd day of July, (in the year 1373) But her body was taken to Sweden upon the 7th day of October.
          Upon the same 8th day of October, were born into the better life:
          The holy old man Simeon, of whom it is written in the Gospel that he took the Lord Jesus up in his arms.
          At Caesarea, in Palestine, the holy Virgin and martyr Reparata. Forasmuch as she would not offer sacrifice to idols, she was put to diverse torments, and then beheaded, under the Emperor Decius. Her soul was seen to leave her body and soar heavenward in a bodily shape like a dove.
          At Thessalonica, the holy Proconsul Demetrius, who brought many to believe in Christ, and was martyred by being pierced through with lances, by command of the Emperor Maximian. There also the holy martyr Nestor.
          At Seville, in Spain, the holy martyr Peter.
          At Laodicea, the holy Priest Artemon, who under the Emperor Diocletian received the crown of martyrdom by fire.
          In the country of Lyons, the holy Virgin and martyr Benedicta.
          At Ancona, holy Palatias and Laurentia, who were carried into exile by command of the President Dion, in the persecution under the Emperor Diocletian, and died of exhaustion and suffering.
          At Rouen, (in the fifth century,) the holy Confessor Evodius, Bishop (of that see.)
          At Jerusalem, (about the year 460,) holy Pelagia, surnamed the Penitent.
      la:
      - type: text
        text: |-
          Octávo Idus Octóbris

          Sanctæ Birgíttæ Víduæ, cuius dies natális décimo Kaléndas Augústi, ac Translátio Nonis Octóbris recensétur.
          Sanctórum Mártyrum Sérgii, Bacchi, Marcélli et Apuléii, quorum dies natális precedénti die refértur.
          Eódem die natális beáti Simeónis senis, qui in Evangélio Dóminum Iesum, præsentátum in Templo, suis in ulnis accepísse ac de illo prophetásse légitur.
          Laodicéæ, in Phrýgia, sancti Artémonis Presbýteri, qui per ignem, sub Diocletiáno, martýrii corónam accépit.
          Thessalonícæ sancti Demétrii Procónsulis, qui, cum plúrimos ad Christi fidem perdúceret, ídeo, Maximiáni Imperatóris iussu lánceis confóssus, martýrium consummávit.
          Ibídem sancti Néstoris Mártyris.
          Híspali, in Hispánia, sancti Petri Mártyris.
          Cæsaréæ, in Palæstína, pássio sanctæ Reparátæ, Vírginis et Mártyris; quæ, cum nollet idólis sacrificáre, sub Décio Imperatóre, váriis tormentórum genéribus cruciátur, ac demum gládio percútitur. Ipsíus autem ánima, in colúmbæ spécie, de córpore égredi cælúmque conscéndere visa est.
          In território Laudunénsi natális sanctæ Benedíctæ, Vírginis et Mártyris.
          Ancónæ sanctárum Palatiátis et Lauréntiæ, quæ, in persecutióne Diocletiáni, sub Dióne Prǽside, in exsílium deportátæ, labóribus et ærúmnis conféctæ sunt.
          Rotómagi sancti Evódii, Epíscopi et Confessóris.
          Hierosólymis sanctæ Pelágiæ, cognoménto Pæniténtis.
      en2:
      - type: text
        text: |-
          The Sixth of October
      
          Saint Bridget, Widow, whose birthday is observed on the twenty-third of July, and her Translation on the seventh of October.
          The holy Martyrs Sergius, Bacchus, Marcellus, and Apuleius, whose birthday
  psalm.oct-vo-idus-sept-mbris-75dbedf316:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 6th day of September is commemorated

          The Prophet Zachariah, who returned home from Chaldea as an old man, and is buried beside the prophet Haggai.
          Upon the same day, were born into the better life: At the Dardanelles, holy Onesiphorus, a disciple of the Apostles, of whom holy Paul maketh mention in writing unto Timothy. By command of the Proconsul Hadrian, holy Onesiphorus and Porphyry were heavily beaten, and drawn by wild horses, and so gave up their souls to God.
          At Alexandria, the holy martyrs the Priest Faustus, Macarius, and ten Companions, who finished their testimony for Christ's name's sake, under the Emperor Decius and the President Valerius, by being beheaded.
          In Cappadocia, the holy martyrs the Deacon Cottidus, Eugenius, and their Companions.
          In Africa, the holy Bishops Donatian, Prassidius, Mansuetus, German, and Fusculus, who in the persecution under the Vandals were, by command of the Arian King Hunneric, because of their assertion of the Catholic truth, heavily beaten with cudgels, and banished. Among them was also a Bishop named Laetus, a man of great activity and learning, who, after suffering a long and foul imprisonment, was burnt.
          At Verona, (in the fifth century,) the holy Confessor Petronius, Bishop (of that see.) At Rome, the holy Abbot Eleutherius, the servant of God, of whom holy Pope Gregory writeth, that by his prayer and tears he raised a man from the dead.
      la:
      - type: text
        text: |-
          Octávo Idus Septémbris

          In Palæstína sancti Zacharíæ Prophétæ, qui, de Chaldǽa senex in patriam revérsus, ibíque defúnctus, iuxta Aggǽum Prophétam cónditus iacet.
          In Hellespónto sancti Onesíphori, Apostolórum discípuli, cuius méminit sanctus Paulus ad Timótheum scribens. Ipse autem Onesíphorus ibídem, una cum sancto Porphýrio, iussu Hadriáni Procónsulis ácriter verberátus et a ferócibus raptátus equis, spíritum Deo réddidit.
          In Africa sanctórum Episcopórum Donatiáni, Præsídii, Mansuéti, Germáni et Fúsculi; qui, in persecutióne Wandálica, iussu Ariáni Regis Hunneríci, pro assertióne cathólicæ veritátis, fústibus diríssime cæsi et exsílio elimináti sunt. Inter eos étiam erat Epíscopus, nómine Lætus, strénuus atque doctíssimus vir, qui, post diutúrnos cárceris squalóres, incéndio concremátus est.
          Alexandríæ pássio sanctórum Mártyrum Fausti Presbýteri, Macárii et Sociórum decem; qui, sub Décio Imperatóre et Valério Prǽside, pro Christi nómine, abscíssis cervícibus, martýrium complevérunt.
          In Cappadócia sanctórum Mártyrum Cóttidi Diáconi, Eugénii et Sociórum.
          Verónæ sancti Petrónii, Epíscopi et Confessóris.
          Romæ sancti Eleuthérii Abbátis, qui Dei servus fuit, atque (ut sanctus Gregórius Papa scribit) oratióne et lácrimis mórtuum suscitávit.
      en2:
      - type: text
        text: |-
          The Sixth of September
      
          In Palestine, Saint Zacharias, Prophet, who, returning in old age from Chaldea to his homeland, and dying there, lies buried next to the Prophet Haggai.
          In the Hellespont, Saint Onesiphorus, Apostle
  psalm.oct-vo-kal-ndas-apr-lis-75e7f03db7:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the feast of the Annunciation of the most Blessed Virgin Mary, Mother of God.
          Upon the same 25th day of March, were born into the better life:

          At Rome, the holy martyr Quirinus, under the Emperor Claudius. He suffered the spoiling of his goods, a foul imprisonment, and many stripes, and was at length slain with the sword [, in the year 269]. His body was cast into the Tiber, but the Christians found it on the island of Lycaonia and buried it in the cemetery of Pontianus.
          Likewise at Rome, two hundred and sixty-two holy martyrs.
          At Sirmium, [in Hungary,] the holy martyr Irenaeus, Bishop of that see, who under the President Probus, in the time of the Emperor Maximian, was first put to grievous torments, then suffered for many days in prison, and at last was beheaded.
          At Nicomedia, the holy Dula, a female slave belonging to a certain soldier she was killed in defending her chastity, and so gained the crown of martyrdom.
          At Jerusalem, is commemorated the Good Thief, who confessed Christ upon the Cross, and won from Him the words "This day thou shalt be with Me in Paradise".
          At Laodicea, holy Pelagius, Bishop of that see, who suffered exile and other hardships for the Catholic faith's sake, in the time of the Emperor Valens, and fell asleep in the Lord.
          At Pistoia, the holy Confessors Barontius and Desiderius [about the year 700].
          In the island of Aindre, in the river Loire, the Holy Abbot Hermeland, the glory of whose life is set forth by the fame of his miracles [about the year 718].
      la:
      - type: text
        text: |-
          Octávo Kaléndas Aprílis

          Annuntiátio beatíssimæ Vírginis Genitrícis Dei Maríæ.
          Hierosólymis commemorátio sancti Latrónis, qui, in cruce Christum conféssus, ab eo méruit audíre: « Hódie mecum eris in paradíso ».
          Romæ sancti Quiríni Mártyris, qui, sub Cláudio Imperatóre, post facultátum amissiónem, post cárceris squalórem, post multórum vérberum afflictiónem, gládio interféctus est et in Tíberim proiéctus; quem Christiáni, cum in ínsula Lycaónia (quæ póstea sancti Bartholomǽi dicta est) inveníssent, in cœmetério Pontiáni condidérunt.
          Item Romæ sanctórum ducentórum sexagínta duórum Mártyrum.
          Sírmii pássio sancti Irenǽi, Epíscopi et Mártyris; qui, témpore Maximiáni Imperatóris, sub Prǽside Probo, primum torméntis acérrimis vexátus, deínde diébus plúrimis cruciátus in cárcere, novíssime, abscísso cápite, consummátus est.
          Nicomedíæ sanctæ Dulæ, cuiúsdam mílitis ancíllæ, quæ, ob castitátem servándam occísa, martýrii corónam proméruit.
          Laodicéæ, ad Líbanum, sancti Pelágii Epíscopi, qui, ob fidem cathólicam, témpore Valéntis, exsílium et ália passus est; ac tandem, in sedem suam restitútus, quiévit in Dómino.
          In Antro, ínsula Lígeris flúminis, sancti Hermelándi Abbátis, cuius gloriósa conversátio insígni miraculórum præcónio commendátur.
          Pistórii, in Túscia, sanctórum Confessórum Baróntii et Desidérii.
          Faliscodúni sanctæ Lúciæ Filippíni, Fundatrícis Institúti Magistrárum Piárum ab eius cognómine nuncupatárum, de Christiána puellárum et mulíerum, præsértim páuperum, eruditióne óptime méritæ, quam Pius Papa Undécimus inter sanctas Vírgines rétulit.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of March
      
          The Annunciation of the Blessed Virgin Mary, Mother of God.
          At Jerusalem, a commemoration of the holy Thief, who, confessing Christ upon the Cross, merited to hear from him: 'This day you shall be with me in paradise.'
  psalm.oct-vo-kal-ndas-aug-sti-0ae755f17c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast

          Holy Apostle James, brother to the blessed Evangelist John. He was beheaded by King Herod Agrippa about the time of the Passover. His sacred bones were on this day brought from Jerusalem to Spain, and laid in the uttermost parts thereof, in Gallicia, where they are devoutly honoured by the constant veneration of the peoples of that country, and by the flocking together of multitudes of Christians who betake themselves thither for godliness' sake and from vows.
          In Lycia, the holy martyr Christopher, who, under the Emperor Decius, was beaten with iron rods. He was preserved from fire by the power of Christ, but at last was shot with arrows, and then beheaded, and so finished his testimony.
          At Barcelona, in Spain, the blessed martyr Cucufas, who, in the persecution under the Emperor Diocletian, overcame many torments under the President Dacian, and was then smitten with the sword, and so passed a conqueror to Heaven.
          In Palestine, the holy martyr Paul. He was condemned to death under the President Firmilian in the persecution under the Emperor Maximian Galerius. He asked for a few moments in which to pray, sovereign he besought God with all his heart for his fellow-countrymen then for the Jews and Gentiles, that they might be brought to the knowledge of the truth then for the multitude that stood around then for the judge who had condemned him, and for the executioner who was to slay him. Then his head was cut off, and he received the crown of martyrdom.
          There also the holy Virgin and martyr Valentina. When she was led to the altar to sacrifice, she kicked it over. She was horribly tortured, and then cast into the fire, along with another Virgin that was her companion, and so hastened hence, to be with Christ her Bridegroom.
          At Civita di Bagno, in Valeria, [in the third century,] the holy martyrs Florence and Felix of Siponte.
          At Cordova, [in the ninth century,] the holy martyr, the monk Theodemir.
          At Trier, [at the end of the sixth century,] the holy Confessor Magneric, Bishop [of that see.]
      la:
      - type: text
        text: |-
          Octávo Kaléndas Augústi

          Sancti Iacóbi Apóstoli, qui éxstitit beáti Ioánnis Evangelístæ frater; et, prope festum Paschæ ab Heróde Agríppa decollátus, primus ex Apóstolis corónam martýrii percépit. Eius sacra ossa, ab Hierosólymis ad Hispánias hoc die transláta, et in últimis eárum fínibus apud Gallǽciam recóndita, celebérrima illárum géntium veneratióne, et frequénti Christianórum concúrsu, religiónis et voti causa illuc adeúntium, pie colúntur.
          In Lýcia sancti Christóphori Mártyris, qui, sub Décio, virgis férreis attrítus, et e flammæ æstuántis incéndio supérna Christi virtúte servátus, ad últimum, sagittárum íctibus confóssus, cápitis obtruncatióne martýrium complévit.
          Barcinóne, in Hispánia, natális beáti Cucuphátis Mártyris, qui, in persecutióne Diocletiáni, sub Daciáno Prǽside, plúrimis torméntis superátis, tandem, percússus gládio, victor migrávit in cælum.
          In Palæstína sancti Pauli Mártyris, qui, in persecutióne Maximiáni Galérii, sub Firmiliáno Prǽside, cápitis damnátus, et, exíguo orándi spátio impetráto, primum pro contribúlibus suis, deínde pro Iudǽis et Gentílibus, ut fídei veritátem agnóscerent, póstea pro circumstántium multitúdine, demum pro Iúdice qui ipsum damnáverat, et pro carnífice a quo feriéndus erat, Deum toto corde precátus, martýrii corónam, abscíssis cervícibus, accépit.
          Furcónii, in Vestínis, sanctórum Mártyrum Sipontinórum Floréntii et Felícis.
          Córdubæ, in Hispánia, sancti Theodemíri, Mónachi et Mártyris.
          In Palæstína sanctæ Valentínæ Vírginis, quæ, cum ad aram, ut immoláret, addúcta esset, eámque cálcibus evertísset, prius diríssime cruciáta est; deínde, una cum sócia Vírgine, in ignem coniécta cucúrrit ad Sponsum.
          Tréviris sancti Magneríci, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of July
      
          Saint James the Apostle, who was the brother of the blessed John the Evangelist; and, near the feast of Easter, was beheaded by Herod Agrippa, and was the first of the Apostles to receive the crown of martyrdom. His
  psalm.oct-vo-kal-ndas-dec-mbris-0a64e2ce75:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the Feast

          Of the holy Confessor John of the Cross, of whom mention is made upon the 14th day of December.
          Upon the same 24th day of November, were born into the better life:
          The holy martyr Chrysogonus, who long endured bonds and imprisonment for his steadfast confession of Christ, but was at length brought to Aquileia by command of Diocletian, and was there beheaded, whereafter his body was cast into the sea, and so he finished his testimony.
          At Rome, the holy martyr Crescentian, of whom record is made in the history of the last sufferings of the blessed Pope Marcellus.
          At Amelia, in Umbria, the holy Virgin and martyr Firmina in the persecution under the Emperor Diocletian she was put to diverse torments, but was at length hung up and burnt with lamps, until she gave up the ghost.
          At Corinth, under the Emperor Julian the Apostate and the President Sallust, the holy martyr Alexander, who fought for Christ's faith even unto death.
          At Cordova, the holy Virgins and martyrs Flora and Mary, who were long imprisoned, and then slain with the sword, in the persecution under the Arabs.
          At Perugia, the holy martyr Felicissimus.
          At Milan, holy Protasius, Bishop (of that see,) who defended the cause of Athanasius before the Emperor Constans in the Council of Sardica, and passed away to be ever with the Lord, worn out by many toils for the sake of religion and of the Church committed to his care.
          At Blaye, (in the fourth century,) the holy Priest Romanus, the praise of whose holiness is proclaimed by the glory of his miracles.
          In Auvergne, (in the sixth century,) holy Portian, Abbot (of Mirande,) who was famous for miracles, under King Theodoric.
      la:
      - type: text
        text: |-
          Octávo Kaléndas Decémbris

          Sancti Ioánnis a Cruce Presbýteri, Confessóris et Ecclésiæ Doctóris, sanctæ Terésiæ in Carmelitárum reformatióne sócii, cuius dies natális décimo nono Kaléndas Ianuárii recensétur.
          Eódem die natális sancti Chrysógoni Mártyris, qui, post longa víncula et cárceres pro constantíssima Christi confessióne tolerátos, Aquiléiam, iubénte Diocletiáno, perdúctus, tandem, cæsus cápite et in mare proiéctus, martýrium consummávit.
          Romæ sancti Crescentiáni Mártyris, qui in passióne beáti Marcélli Papæ memorátur.
          Apud Corínthum sancti Alexándri Mártyris, qui, sub Iuliáno Apóstata et Sallústio Prǽside, pro Christi fide certávit usque ad mortem.
          Perúsiæ sancti Felicíssimi Mártyris.
          Amériæ, in Umbria, sanctæ Firmínæ, Vírginis et Mártyris; quæ, in persecutióne Diocletiáni Imperatóris, várie cruciáta est, ac demum, suspénsa et lampádibus ardéntibus adústa, immaculátum spíritum Deo réddidit.
          Córdubæ, in Hispánia, sanctárum Vírginum et Mártyrum Floræ et Maríæ; quæ, post diutúrnos cárceres, in persecutióne Arábica, gládio interémptæ sunt.
          Medioláni sancti Protásii Epíscopi, qui apud Constántem Imperatórem in Concílio Sardicénsi causam Athanásii deféndit, ac demum, pro Ecclésia sibi commíssa et pro religióne multis perfúnctus labóribus, migrávit ad Dóminum.
          In território Arvernénsi sancti Portiáni Abbátis, qui, sub Theodoríco Rege, miráculis cláruit; cuius étiam nomen índitum mansit tam monastério cui Sanctus ipse prǽfuit, quam óppido quod in eódem loco póstea constrúctum fuit.
          In castro Blávio, in Gállia, sancti Románi Presbýteri, cuius sanctitátis præcónium glória miraculórum declárat.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of November
      
          Saint John of the Cross, Priest, Confessor and Doctor of the Church, companion of Saint Teresa in the reform of the Carmelites, whose birthday is observed on the fourteenth of December.
  psalm.oct-vo-kal-ndas-febru-rii-b0b474179e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we commemorate the conversion of the holy Apostle Paul, which took place in the second year after our Lord's ascension.
          Upon the same 25th day of January, were born into the better life:

          At Damascus, holy Ananias, who baptized the aforesaid apostle. He preached the Gospel at Damascus and at other places, and was first scourged and rent with thongs, and then stoned to death under the judge Licinius.
          At Antioch, the holy martyrs Juventinus and Maximus, who were crowned with martyrdom under the Emperor Julian the Apostate, and on whose feast-day holy John Chrysostom preached unto the people.
          At Auvergne, (in the year 674,) the holy martyrs Projectus, Bishop of that see, and Marinus the man of God, who suffered under the chief men of that city.
          Likewise the holy martyrs Donatus, Sabinus, and Agapis.
          At Tomis, in Scythia, holy Bretannion, Bishop (of that see), who flourished in the Church in wonderful holiness and zeal for the Catholic faith under the Arian Emperor Valens, whom he withstood stoutly.
          At Arras, in Gaul, holy Poppo, Abbot (of Stavelotz,) famous for miracles, (in the year 1048, and also his mother, blessed Adelviva.)
      la:
      - type: text
        text: |-
          Octávo Kaléndas Februárii

          Convérsio sancti Pauli Apóstoli, quæ fuit anno secúndo ab Ascensióne Dómini.
          Apud Damáscum natális sancti Ananíæ, qui fuit discípulus Dómini, et eúndem Paulum Apóstolum baptizávit. Ipse autem, cum Damásci, et Eleutherópoli, alibíque Evangélium prædicásset, tandem, sub Licínio Iúdice, nervis cæsus et laniátus, ac lapídibus oppréssus, martýrium consummávit.
          Arvérnis, in Gállia, sanctórum Præiécti Epíscopi, et Amaríni, Abbátis Cloroangiénsis, qui ambo a procéribus eiúsdem urbis passi sunt.
          Antiochíæ sanctórum Mártyrum Iuventíni et Máximi, qui, sub Iuliáno Apóstata, martýrio coronáti sunt; in quorum die natáli sanctus Ioánnes Chrysóstomus sermónem ad pópulum hábuit.
          Item sanctórum Mártyrum Donáti, Sabíni et Agapis.
          Tomis, in Scýthia, sancti Bretanniónis Epíscopi, qui mira sanctitáte et cathólicæ fídei zelo, sub Ariáno Imperatóre Valénte, cui fórtiter réstitit, in Ecclésia flóruit.
          Marciánis, in Gállia, sancti Poppónis, Presbýteri et Abbátis, miráculis clari.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of January
      
          The Conversion of the holy Apostle Paul, which took place in the second year after the Ascension of the Lord.
          Near Damascus, the birthday of Saint Ananias, who was a disciple of the Lord, and baptized that same Apostle Paul
  psalm.oct-vo-kal-ndas-i-lii-56b322dd10:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the birthday of the holy Baptist John, the Forerunner of the Lord, the son of Zacharias and Elizabeth, who was filled with the Holy Ghost while yet he was in his mother's womb.
          Upon the same 24th day of June is made the commemoration of

          The very many holy martyrs at Rome who were falsely accused by the Emperor Nero of having set the city on fire, and were by him ordered to be put to death in many diverse and most cruel ways.
          Some were sewn up in the skins of wild beasts and put to be torn by dogs, some were crucified, some were burnt as torches to give light by night these were all disciples of the Apostles, and the first martyrs whom the Church of Rome, a field fruitful in martyrs, sent to be with the Lord, even before the slaying of the Apostles themselves.
          There also the holy martyrs Faustus and twenty-three others.
          At Mechelen, in Brabant, [in the eighth century,] the holy martyr Rombout, Bishop [of that city,] son of an Irish king and Bishop of Dublin.
          At Satala, in Armenia, the holy brethren Orentius, Eros, Pharnacius, Firminus, Firmus, Cyriacus, and Longinus, all soldiers and all martyrs. Because they were Christians, the Emperor Maximian expelled them from the army, separated them from one another, and sent them to diverse places, where in sorrow and suffering they fell asleep in the Lord, [about the year 306.]
          In the village of Créteil, in the country near Paris, the holy martyrs Agoard and Agilbert, with others, both men and women, who cannot be counted.
          At Autun, the holy Confessor Simplicius, Bishop [of that see.]
          At Lobbes, the holy Theodulf, Bishop [of that see.]
          At Style, in Calabria, holy John, surnamed Therestus, famous for his praise as a monk, and for his holy life.
      la:
      - type: text
        text: |-
          Octávo Kaléndas Iúlii

          Natívitas sancti Ioánnis Baptístæ, Præcursóris Dómini, ac sanctórum Zacharíæ et Elísabeth fílii, qui Spíritu Sancto replétus est adhuc in útero matris suæ.
          Romæ commemorátio sanctórum plurimórum Mártyrum, qui a Neróne Imperatóre, ut a se incénsæ Urbis ódium avérteret, calumnióse accusáti, divérso mortis génere iussi sunt sævíssime intérfici. Horum síquidem álii, ferárum tergis contécti, laniátibus canum expósiti sunt; álii crúcibus affíxi; aliíque incéndio tráditi, ut, ubi defecísset dies, in usum noctúrni lúminis deservírent. Erant hi omnes Apostolórum discípuli, et primítiæ Mártyrum, quas Romána Ecclésia, fértilis ager Mártyrum, ante Apostolórum necem transmísit ad Dóminum.
          Item Romæ sanctórum Mártyrum Fausti et aliórum vigínti trium.
          Mechlíniæ, in Brabántia, pássio sancti Rumóldi, Epíscopi Dublinénsis et Mártyris, e Scotórum Rege progéniti.
          Sátalis, in Arménia, sanctórum Mártyrum septem fratrum, scílicet Oréntii, Heróis, Pharnácii, Firmíni, Firmi, Cyríaci et Longíni mílitum; qui a Maximiáno Imperatóre, eo quod Christiáni essent, cíngulo militári priváti sunt, et, ab invícem separati atque in divérsa loca abdúcti, in dolóribus et ærúmnis pósiti, quievérunt in Dómino.
          In vico Christólio, in território Parisiénsi, pássio sanctórum Mártyrum Agoárdi et Aglibérti, cum áliis innúmeris promíscui sexus.
          Augustodúni deposítio sancti Simplícii, Epíscopi et Confessóris.
          Láubiis, in Bélgio, sancti Theodúlphi Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of June
      
          The Nativity of Saint John the Baptist, Forerunner of the Lord, and son of the holy Zacharias and Elizabeth, who was filled with the Holy Spirit even in his mother's womb.
          At Rome, a commemoration of the holy
  psalm.oct-vo-kal-ndas-i-nii-ad4ca3f82a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep in England the feast of the holy Confessor Aldhelm, Bishop of Sherborne.
          On the same 25th day of May, were born into the better life:

          At Salerno, the blessed Pope Gregory VII, a right stout champion and defender of the freedom of the Church, whose feast we keep upon the 28th day of this same month of May.
          At Florence, the holy Virgin, Mary Magdalene de' Pazzi, of the Order of Carmelites, famous for her holy life, whose feast we keep upon the 3rd day of June.
          At Rome, upon the Nomentan Way, the blessed martyr, Pope Urban I, who by his exhortation and teaching turned to the faith of Christ many who suffered martyrdom therefore, among whom were Tiburtius and Valerian. He himself also suffered many things for the Church of God in the persecution under the Emperor Alexander Severus, and at length, being beheaded, was crowned with martyrdom.
          At Dorostorum, in Bulgaria, the holy martyrs Pasicrates, Valention, and two others, who were all crowned together.
          At Milan, holy Bishop Denis. He was banished into Cappadocia by the Arian Emperor Constantius for the Catholic faith's sake, and so there gave up his spirit to God with a near approach to martyrdom. His sacred body was sent to Milan to blessed Bishop Ambrose by Bishop Aurelius, prompted to that godly act, as is said, by holy Basil the Great.
          At Rome, the holy Pope Boniface IV, who consecrated the Pantheon as the Church of the Blessed Virgin Mary and All holy Martyrs.
          At Florence, [in the fifth century,] holy Zenobius, Bishop of that city, distinguished for the holiness of his life and the fame of his wondrous works.
          In the country of Troyes, [in the sixth century,] the holy Confessor Leo.
          At Assisi, in Umbria, is commemorated the translation of the holy Confessor Francis, in the time of Pope Gregory IX.
          Also at Veroli, in Latium, the translation of holy Mary, [mother] of James, whose sacred body is honoured by many works of power.
      la:
      - type: text
        text: |-
          Octávo Kaléndas Iúnii

          Salérni deposítio beáti Gregórii Séptimi, Papæ et Confessóris, ecclesiásticæ libertátis propugnatóris ac defensóris acerrimi.
          Romæ, via Nomentána, natális beáti Urbáni Primi, Papæ et Mártyris, cuius exhortatióne et doctrína complúres (in quibus fuére Tibúrtius et Valeriánus) Christi suscepérunt fidem, et pro ea martýrium subiérunt. Ipse quoque, in persecutióne Alexándri Sevéri, multa passus pro Ecclésia Dei, tandem, cervícibus abscíssis, martýrio coronátus est.
          Girvi, in Anglia, tránsitus sancti Bedæ Venerábilis, Presbýteri, Confessóris et Ecclésiæ Doctóris, sanctitáte et eruditióne celebérrimi. Ipsíus autem festum recólitur sexto Kaléndas Iúnii.
          Floréntiæ natális sanctæ Maríæ-Magdalénæ de Pazzis Vírginis, ex Ordine Carmelitárum, vita et sanctitáte illústris. Eius vero festívitas quarto Kaléndas Iúnii celebrátur.
          Doróstori, in Mýsia inferióre, item natális sanctórum Mártyrum Pasícratis, Valentiónis et aliórum duórum, simul coronatórum.
          Medioláni sancti Dionýsii Epíscopi, qui, ab Ariáno Imperatóre Constántio in Cappadóciam pro fide cathólica relegátus, ibídem, propióre Martýribus título, spíritum Deo réddidit. Eius sacrum corpus ab Aurélio Epíscopo transmíssum est Mediolánum ad beátum Ambrósium Epíscopum; cui piæ actióni offícium quoque sancti Basilíi Magni accessísse tráditur.
          Floréntiæ natális sancti Zenóbii, eiúsdem civitátis Epíscopi, vitæ sanctitáte ac miraculórum glória conspícui.
          In Británnia sancti Aldélmi, Epíscopi Schireburgénsis.
          In território Tricassíno sancti Leónis Confessóris.
          Lutétiæ Parisiórum sanctæ Magdalénæ-Sophíæ Barat, Fundatrícis Institúti Sorórum a Sacro Corde Iesu; quæ pro Christiána puellárum informatióne valde adlaborávit, et a Pio Papa Undécimo in sanctárum Vírginum catalógum fuit reláta.
          Vérulis, in Hérnicis, Translátio sanctæ Maríæ Iacóbi; cuius sacrum corpus plúrimis miráculis illustrátur.
          Assísii, in Umbria, item Translátio sancti Francísci Confessóris, témpore Gregórii Papæ Noni.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of May
      
          At Salerno, the deposition of the blessed Gregory VII, Pope and Confessor, most ardent champion and defender of ecclesiastical liberty.
          At Rome, on the Nomentan Way, the birthday of the blessed Urban I, Pop
  psalm.oct-vo-kal-ndas-m-rtii-178a91623f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the See of the holy Apostle Peter, wherein he first sat at Antioch, in which city the disciples were first called Christians.
          On the same 22nd day of February were born into the better life:

          At Hierapolis, in Phrygia, holy Papias, Bishop of that city, who was the hearer of the holy elder John, and the companion of Polycarp.
          At Salamis, in Cyprus, holy Aristion, who, as the said Papias doth testify, was one of the seventy-two disciples of Christ.
          In Arabia are commemorated many holy martyrs who were cruelly slain under the Emperor Galerius Maximian.
          At Alexandria, holy Abilius, Pope of that see, who was the second who held it after the blessed Evangelist Mark, and administered his office with an eminent manifestation of grace.
          At Vienne, holy Paschasius, Bishop of that see, very famous for his learning and the holiness of his life.
          At Cortona, in Tuscany, [in the year 1297,] holy Margaret, of the third order of St. Francis, whose body hath marvellously remained incorrupt for more than four hundred years, breathing a sweet savour, and famous for many miracles, and is there deeply honoured.
      la:
      - type: text
        text: |-
          Octávo Kaléndas Mártii

          Cáthedra sancti Petri Apóstoli, qua primum Romæ sedit.
          Favéntiæ, in Æmília, natális sancti Petri Damiáni, Cardinális atque Epíscopi Ostiénsis et Confessóris, ex Ordine Camaldulénsi, doctrína et sanctitáte célebris, quem Leo Papa Duodécimus Doctórem universális Ecclésiæ declarávit. Ipsíus autem festum sequénti die celebrátur.
          Salamínæ, in Cypro, sancti Aristiónis, qui (ut mox memorándus Pápias testátur) fuit unus de septuagínta duóbus Christi discípulis.
          Hierápoli, in Phrýgia, beáti Pápiæ, eiúsdem civitátis Epíscopi, qui sancti Ioánnis Senióris audítor, Polycárpi autem sodális fuit.
          In Arábia commemorátio plurimórum sanctórum Mártyrum, qui, sub Galério Maximiáno Imperatóre, sævíssime cæsi sunt.
          Alexandríæ sancti Abílii Epíscopi, qui, secúndus post beátum Marcum, factus eiúsdem civitátis Epíscopus, sacerdótium virtúte conspícuus ministrávit.
          Viénnæ, in Gállia, sancti Paschásii Epíscopi, eruditióne et morum sanctitáte præclári.
          Ravénnæ sancti Maximiáni, Epíscopi et Confessóris.
          Cortónæ, in Túscia, sanctæ Margarítæ, ex tértio Ordine sancti Francísci; quæ admirábili pæniténtia et ubérrimis lácrimis máculas anteáctæ vitæ indesinénter abstérsit. Ipsíus corpus, mirabíliter incorrúptum, suávem spirans odórem et crebris miráculis clarum, ibídem magno cum honóre cólitur.
      en2:
      - type: text
        text: |-
          The Twenty-Second of February
      
          The Chair of the holy Apostle Peter, on which he first sat at Rome.
          At Faenza, in Emilia, the birthday of Saint Peter Damian, Cardinal and Bishop of Ostia and Confessor, of the Order of Camaldol
  psalm.oct-vo-kal-ndas-maii-4ccea0a75a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 24th day of April, were born into the better life:

          At Sevis, in Switzerland, the holy martyr Faithful of Sigmaringen, of the Order of Friars Minor Capuchins. He had been sent thither to preach the Catholic faith, but was murdered by the heretics, and so attained martyrdom, [in the year 1622,] and was numbered among the holy martyrs by the Supreme Pontiff Benedict XIV.
          At Rome, the holy martyr Saba, a commander of troops. He was accused of visiting the Christians in prison, and freely confessed Christ in the presence of the judge. He was scorched with torches, and thrust into a vessel of boiling pitch, whence he came forth unhurt, by the which marvel seventy men were turned to Christ, who all stood fast to their confession, and were slain with the sword, when after Saba himself was drowned in the river, and so gained the crown of his testimony, [in the year 272.]
          At Lyons, in Gaul, the holy martyr Alexander. In the persecution under the Emperor Antoninus Verus he was imprisoned, and afterwards lashed to such an extent that his inner parts could be seen through holes between his ribs then he was nailed to a cross, and gave up his blessed spirit. There suffered along with him thirty-and-four others, of whom mention is made upon other days.
          Upon the same day, the holy martyrs Eusebius, [said to have been converted by St George,] Neon, Leontius, Longinus, and four others, who were slain with the sword after grievous torments in the persecution under the Emperor Diocletian.
          In England, [in the year 624,] the holy Bishop Mellitus, who was sent into this country by holy Gregory, and converted to the faith the East Saxons and their King. [He was the first Bishop of London, and afterwards of Canterbury.]
          At Elvira, in Spain, the holy Confessor Gregory, Bishop [of that see, about the end of the fourth century.]
          At Brescia, holy Honorius, Bishop of that see, [in the year 586.]
          In Scotland, the holy Priest and monk Egbert. A man of marvellous lowliness and self-denial, [in the year 729,] whose feast we keep upon the 27th day of this present month of April.
          At Reims, the holy Virgins Bona and Doda, [the first Abbesses of St. Peter's at Reims, in the year 673.]
      la:
      - type: text
        text: |-
          Octávo Kaléndas Maii

          Sevísii, in Rhǽtia, sancti Fidélis a Sigmarínga, Sacerdótis ex Ordine Minórum Capuccinórum et Mártyris; qui, illuc ad prædicándam cathólicam fidem missus, ibídem, ab hæréticis interémptus, martýrium consummávit; et a Benedícto Décimo quarto, Pontífice Máximo, inter sanctos Mártyres relátus est.
          Romæ sancti Sabæ, ductóris mílitum, qui, accusátus quod Christiános in cárcere deténtos visitáret, coram Iúdice Christum líbere conféssus est. Hinc ab eódem Iúdice fácibus adústus et in lebétem picis fervéntis est immíssus, et, cum inde evasísset illǽsus, eo miráculo septuagínta viros ad Christum convértit; qui omnes, constánter in confessióne fídei permanéntes, gládio cæsi sunt. Póstremo et ipse, demérsus in flumen, martýrium consummávit.
          Lugdúni, in Gállia, natális sancti Alexándri Mártyris, qui, in persecutióne Antoníni Veri, post cárceris custódiam, primo ita laniátus est crudelitáte verberántium, ut, crate solúta costarum, patefáctis viscéribus, interióra córporis panderéntur; deínde, crucis affíxus patíbulo, beátum spíritum exanimátus emísit. Passi sunt cum ipso et álii, número trigínta quátuor, quorum memória áliis diébus ágitur.
          Nicomedíæ sanctórum Mártyrum Eusébii, Neónis, Leóntii, Longíni et aliórum quátuor, qui, in persecutióne Diocletiáni, post diros cruciátus, gládio percússi sunt.
          In Anglia deposítio sancti Mellíti Epíscopi, qui, a sancto Gregório Papa in Angliam missus, orientáles Saxónes et ipsórum Regem ad fidem convértit.
          Illíberi, in Hispánia, sancti Gregórii, Epíscopi et Confessóris.
          Bríxiæ sancti Honórii Epíscopi.
          In Iona, Scótiæ ínsula, sancti Egbérti, Presbýteri et Mónachi, admirándæ humilitátis et continéntiæ viri.
          Rhemis, in Gállia, sanctárum Vírginum Bovæ et Dodæ.
          Andégavi, in Gállia, sanctæ Maríæ a sancta Euphrásia Pelletier, Vírginis, Institúti Sorórum a Bono Pastóre Fundatrícis, quam Pius Duodécimus, Póntifex Máximus, in Sanctárum númerum rétulit.
          Medioláni Convérsio sancti Augustíni Epíscopi, Confessóris et Ecclésiæ Doctóris; quem beátus Ambrósius Epíscopus veritátem fídei cathólicæ dócuit, et hac die baptizávit.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of April
      
          At Seewis, in Rhaetia, Saint Fidelis of Sigmaringen, Priest of the Order of Minor Capuchins and Martyr; who, sent there to preach the catholic faith, was there, by heretics in
  psalm.oct-vo-kal-ndas-nov-mbris-dd16b6a5a0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy John of Beverley, Archbishop of York, in England, illustrious for his life and miracles, of whom mention is made upon the 7th day of May.
          Upon the same 25th day of October, were born into the better life:

          At Rome, the holy martyrs Chrysanthus and Daria his wife, who, after bearing many sufferings under the Prefect Celerinus on account of their confession of Christ, were commanded by the Emperor Numerian to be cast into the sand-pit upon the Salarian Way, and there buried alive under earth and stones.
          Likewise at Rome, forty-six holy martyrs, who were all baptized together by Pope Denis, and presently beheaded by order of the Emperor Claudius, and buried on the Salarian Way, where also are laid one hundred, twenty, and one other martyrs, among whom are the four soldiers of Christ Theodosius, Lucius, Mark, and Peter.
          At Soissons, in Gaul, the holy martyrs Crispin and Crispinian. These were noble Romans who, in the persecution under the Emperor Diocletian, after being put to hideous torments under the President Rictiovarus, were slain with the sword, and so gained the crown of martyrdom. Their bodies were afterwards brought to Rome, and honourably buried in the Church of St. Lawrence.
          At Florence, the holy soldier Minias, who contended nobly for Christ's faith in the persecution under the Emperor Decius, and was crowned with a glorious crown of martyrdom.
          At Torres, in Sardinia, the holy martyrs Protus a Priest, and Januarius a Deacon, who were sent into that island, in the time of the Emperor Diocletian, by holy Pope Caius, and were put to death by the President Barbarus.
          At Constantinople, the holy martyrs Martyrius the Sub-Deacon and Martian the Singer, who were slain by the heretics under the Emperor Constantius.
          At Rome, the holy Confessor Pope Boniface I.
          At Perigueux, in Gaul, holy Fronto, who was ordained Bishop by the Blessed Apostle Peter, and in company with the Priest George turned a great multitude of that people to Christ, and fell asleep in peace, famous for miracles.
          At Brescia, (in the fifth century,) holy Gaudentius, Bishop (of that city,) eminent for his learning and holiness.
          At Mende, (in the sixth century,) holy Hilary, Bishop.
      la:
      - type: text
        text: |-
          Octávo Kaléndas Novémbris

          Romæ sanctórum Mártyrum Chrysánthi et Daríæ uxóris, qui, post multas, quas sub Celeríno Præfécto pro Christo sustinuérunt, passiónes, a Numeriáno Imperatóre iussi sunt via Salária in Arenário depóni, atque vivéntes illic terra et lapídibus óbrui.
          Ibídem natális sancti Marcellíni, Papæ et Mártyris; qui, sub Maximiáno, pro fide Christi, una cum Cláudio, Cyríno et Antoníno, cápite truncátus est. Quo témpore ita magna fuit persecútio, ut decem et septem míllia Christianórum, intra unum mensem, martýrio coronaréntur. Ipsíus tamen sancti Marcellíni festum, una cum festo sancti Cleti, Papæ et Mártyris, sexto Kaléndas Maii celebrátur.
          Petragóricis, in Gállia, sancti Frontónis, qui, a beáto Petro Apóstolo Epíscopus ordinátus, cum Geórgio Presbýtero magnam illíus gentis multitúdinem convértit ad Christum, et, miráculis clarus, in pace quiévit.
          Romæ natális sanctórum quadragínta sex mílitum, qui, simul baptizáti a sancto Dionýsio Papa, mox Cláudii Imperatóris iussu decolláti sunt, ac via Salária sepúlti; ubi et álii Mártyres centum vigínti et unus pósiti sunt, inter quos fuérunt quátuor mílites Christi, scílicet Theodósius, Lúcius, Marcus et Petrus.
          Túrribus, in Sardínia, sanctórum Mártyrum Proti Presbýteri, et Ianuárii Diáconi, qui, a sancto Caio Papa ad eam ínsulam missi, ibídem, témpore Diocletiáni, sub Bárbaro Prǽside, consummáti sunt.
          Constantinópoli pássio sanctórum Martýrii Subdiáconi, et Marciáni Cantóris, qui ab hæréticis, sub Constántio Imperatóre, necáti sunt.
          Suessíone, in Gálliis, sanctórum Mártyrum Crispíni et Crispiniáni, nobílium Romanórum, qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, post immánia torménta gládio trucidáti, corónam martýrii sunt consecúti; quorum córpora póstea Romam deláta fuérunt, atque in Ecclésia sancti Lauréntii in Pane et Perna honorífice tumuláta.
          Floréntiæ pássio beáti Miniátis mílitis, qui, sub Décio Príncipe, pro fide Christi egrégie certans, nóbili martýrio coronátur.
          Bríxiæ natális sancti Gaudéntii Epíscopi, eruditióne et sanctitáte conspícui.
          Gavális, in Gállia, sancti Hilárii Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of October
      
          At Rome, the holy Martyrs Chrysanthus and his wife Daria, who, after the many sufferings they endured for Christ under the Prefect Celerinus, were ordered by the Emperor Numerian to be buried alive
  psalm.oct-vo-kal-ndas-oct-bris-3d57ea524b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Tomorrow is the feast of the Blessed Virgin Mary, styled of Ransom.
          Upon the same 24th day of September, were born into the better life:

          At Autun, the holy martyrs Andochius a Priest, Thyrsus a Deacon, and Felix. Blessed Polycarp, Bishop of Smyrna, sent Andochius and Thyrsus from the east to teach in Gaul, where they were (received as guests by the noble Felix. In the end they and he were) most heavily scourged, and hung up all day by the hands, then cast into the fire, but as they were not burnt their necks were broken with bars, and so they received a right glorious crown.
          In Egypt, (in the persecution under the Emperor Diocletian,) the holy martyrs Paphnutius and his Companions.
          He was dwelling in the desert when he heard that many Christians were kept in chains wherefore the Spirit of God moved him to go of his own free will to the Prefect, and profess himself a Christian. The Prefect had him first bound in iron fetters, and racked for a very long time then he sent him, and many others, to Diocletian, by whose command Paphnutius was hung upon a palm-tree, and the others were beheaded.
          At Chalcedon, forty-nine holy martyrs, who were condemned to be devoured by wild beasts, under the Emperor Diocletian, after the martyrdom of holy Euphemia, but by the will of God they were delivered from the beasts, then they were beheaded, and so passed away to heaven.
          In Hungary, (in the year 1047,) the holy martyr Gerard (Sagredo,) Bishop of Chonad, called the Apostle of Hungary. By birth he was a nobleman of Venice, and was the first of his countrymen who adorned their fatherland by the glory of martyrdom.
          In Auvergne, (in the fifth century,) the holy Confessor Rusticus, Bishop (of Clermont.) In the country of Beauvais, (in the seventh century,) holy Geremar, Abbot (of Flay, now called after him Saint-Germer.)
      la:
      - type: text
        text: |-
          Octávo Kaléndas Octóbris

          Commemorátio beátæ Maríæ Vírginis de Mercéde nuncupátæ, Ordinis redemptiónis captivórum sub eius nómine Institutrícis, de cuius Apparitióne ágitur quarto Idus Augústi.
          Bríxiæ deposítio sancti Anathalónis Epíscopi, qui, beáti Bárnabæ Apóstoli discípulus, in eius locum Epíscopus Ecclésiæ Mediolanénsis succéssit.
          In Pannónia sancti Gerárdi, Epíscopi Morisénæ sedis et Mártyris, Hungarórum Apóstoli nuncupáti, patrícii Véneti; qui, cum e Chanadiénsi óppido Albam Regálem se conférret, prope flumen Danúbium ab infidélibus impetítus, lapídibus óbrutus ac tandem láncea transfíxus occúbuit, sicque primus pátriam nóbili martýrio illustrávit.
          Augustodúni natális sanctórum Mártyrum Andóchii Presbýteri, Thyrsi Diáconi, et Felícis. Hi, a beáto Polycárpo, Smyrnénsi Epíscopo, ab Oriénte dirécti ad docéndam Gálliam, ibídem flagéllis duríssime cæsi, ac tota die invérsis mánibus suspénsi, et in ignem missi sunt, sed non combústi; tandem eórum colla véctibus feriúntur, et ita Mártyres gloriosíssime coronántur.
          In Ægýpto pássio sanctórum Paphnútii et Sociórum Mártyrum. Ipse, vitam in solitúdine agens, cum audíret multos Christiános in vínculis retinéri, sponte, divíno Spíritu cóncitus, Præfécto se offert, et Christiánam religiónem líbere profitétur; a quo primum caténis férreis costríngitur, et in equúleo diutíssime torquétur, deínde cum áliis plúrimis ad Diocletiánum míttitur, cuius iussu, ipse palmæ affígitur, céteri autem ferro necántur.
          Chalcedóne sanctórum quadragínta novem Mártyrum, qui post martýrium sanctæ Euphémiæ, sub Diocletiáno Imperatóre, damnáti ad béstias, et, cum ab iis divínitus líberi evasíssent, demum, gládio percússi, migravérunt in cælum.
          Arvérnis, in Gállia, deposítio sancti Rústici, Epíscopi et Confessóris.
          Flavíaci, in território Bellovacénsi, sancti Geremári, Presbýteri et Abbátis.
          Septémpedæ, in Picéno, deposítio sancti Pacífici, Sacerdótis ex Ordine Minórum et Confessóris, exímiæ patiéntiæ viri et solitúdinis amóre præclári, quem Gregórius Papa Décimus sextus in Sanctórum cánonem rétulit.
      en2:
      - type: text
        text: |-
          The Twenty-Fourth of September
      
          Commemoration of the Blessed Virgin Mary of Mercy, Foundress of the Order of Redemption of Captives under her name, whose Apparition is celebrated on the Tenth of August.
          At Brescia, the passing of Saint Anathalon, Bishop, who, as a disciple of the blessed Apostle Barnabas, succeeded him as Bishop of the Church of Milan.
          In Pannonia, Saint Gerard, Bishop of the see of Morisena and Martyr, called the Apostle of the Hungarians, a Venetian nobleman; who, while traveling from the town of Csanád to Székesfehérvár, was attacked by unbelievers near the river Danube, overwhelmed with stones and finally pierced through with a lance, and thus was the first to glorify his homeland with a noble martyrdom.
          At Autun, the birthday of the holy Martyrs Andochius, Priest, Thyrsus, Deacon, and Felix. These, sent from the East by the blessed Polycarp, Bishop of Smyrna, to preach the faith in Gaul, were there most harshly beaten with scourges, hung for a whole day with their hands turned behind them, and cast into the fire, yet were not burned; at last their necks were struck with clubs, and thus they were most gloriously crowned as Martyrs.
          In Egypt, the passion of the holy Martyrs Paphnutius and his Companions. He, while living in solitude, hearing that many Christians were held in chains, moved by the divine Spirit, spontaneously presented himself to the governor and freely professed the Christian faith; by whom he was first bound with iron chains and tortured for a very long time on the rack, then sent with many others to Diocletian, by whose command he was nailed to a palm tree, while the rest were put to death by the sword.
          At Chalcedon, the holy Forty-Nine Martyrs, who, after the martyrdom of Saint Euphemia, under the Emperor Diocletian, were condemned to the beasts, and, when by divine power they escaped unharmed from them, were at last struck by the sword and passed into heaven.
          At Clermont, in Gaul, the passing of Saint Rusticus, Bishop and Confessor.
          At Flaviac, in the territory of Beauvais, Saint Geremarus, Priest and Abbot.
          At Septempeda, in Picenum, the passing of Saint Pacificus, Priest of the Order of Friars Minor and Confessor, a man of outstanding patience and renowned for his love of solitude, whom Pope Gregory XVI enrolled in the canon of the Saints.
  psalm.oct-vo-kal-ndas-sept-mbris-49026faa64:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 25 th day of August, were born into the better life:

          At Paris, [in the year 1270,] the holy Confessor Louis, King of France, famous for the holiness of his life and for the glory of his miracles.
          At Rome, [in the second century,] the holy martyrs Eusebius, Pontian, Vincent, and Peregrin. Under the Emperor Commodus they were first racked, then stretched with thongs, and afterwards cudgelled, their sides were burnt, and as they remained faithful in the praise of Christ they were hided to death with scourges loaded with lead.
          Likewise at Rome, [in the year 286 or in 303,] the holy martyr Genesius while he was a Gentile he was a player. One while in the theatre, in the presence of the Emperor Diocletian, he was making a mock at the mysteries of the Christians, when the spirit of God came upon him, and he was suddenly turned to the faith, and baptized. The Emperor caused him to be very cruelly beaten with cudgels, then racked, and tormented for a long time by being torn with hooks, and burned with lamps. He stood firm in Christ's faith, saying: there is no King but Christ, and if I should be slain for Him a thousand times, ye cannot take Him either out of my mouth or out of my heart. In the end he was beheaded, and so gained the palm of martyrdom.
          At Old Seville, in Spain, [in the first century,] holy Gerontius, Bishop [of that see,] who preached the Gospel in that province in the time of the Apostles, and after many toils fell asleep in prison.
          At Arles, in Gaul, [in the year 303,] blessed Genesius. He was a registrar who refused to register the wicked edicts which commanded the punishment of Christians, but publicly cast away his tables and professed himself a Christian; for this cause he was taken and beheaded, and being so baptized in his own blood, gained the glory of martyrdom.
          In Syria, the holy martyr Julian.
          At Taragona, [under the Emperor Maximin,] the holy martyr Maginus.
          At Constantinople, [in the year 552,] holy Mennas, [Arch-]Bishop [of that see.]
          At Utrecht, [about the year 776,] holy Gregory, Bishop [of that see.]
          At Naples, [in the year 365,] the holy Virgin Patricia, [daughter of the Emperor Constans I.]
      la:
      - type: text
        text: |-
          Octávo Kaléndas Septémbris

          Apud Cartháginem sancti Ludovíci Noni, Regis Francórum et Confessóris, vitæ sanctitáte ac miraculórum glória præclári, cuius ossa póstmodum Lutétiam Parisiórum sunt reláta.
          Romæ natális sancti Ioséphi Calasánctii, Presbýteri et Confessóris, vitæ innocéntia et miráculis illústris; qui, ad erudiéndam pietáte ac lítteris iuventútem, Ordinem Clericórum Regulárium Páuperum Matris Dei Scholárum Piárum fundávit. Eum Pius Duodécimus, Póntifex Máximus, ómnium Scholárum populárium christianárum ubíque exsisténtium cæléstem apud Deum Patrónum constítuit. Ipsíus tamen festívitas sexto Kaléndas Septémbris recólitur.
          Item Romæ sanctórum Mártyrum Eusébii, Pontiáni, Vincéntii et Peregríni; qui, sub Cómmodo Imperatóre, primum in equúleo leváti, nervis quoque disténti, ac deínde fústibus cæsi sunt, flammis circa eórum látera appósitis; et, cum in laude Christi fidelíssime permanérent, plumbátis usque ad emissiónem spíritus sunt mactáti.
          Romæ prætérea natális beáti Nemésii Diáconi, et fíliæ Lucíllæ Vírginis; qui, cum de fide Christi flecti nequáquam possent, decolláti sunt, iubénte Valeriáno Imperatóre. Ipsórum córpora, a beáto Stéphano Papa sepúlta, deínde a beáto Xysto Secúndo via Appia, prídie Kaléndas Novémbris, honéstius tumuláta, Gregórius Quintus in Diaconíam sanctæ Maríæ Novæ tránstulit, una cum sanctis Symphrónio, Olýmpio Tribúno, huiúsque uxóre Exsupéria et Theodúlo fílio; qui omnes, Symphrónii ópera convérsi et ab eódem sancto Stéphano baptizáti, martýrio coronáti fúerant. Eadem Sanctórum córpora, Gregório Décimo tértio Summo Pontífice, ibídem invénta, sub altári eiúsdem Ecclésiæ honorificéntius collocáta sunt sexto Idus Decémbris.
          Item Romæ sancti Genésii Mártyris, qui, primum sub Gentilitáte mimus, cum in theátro, spectánte Diocletiáno Imperatóre, Mystériis Christianórum illudéret, repénte, inspirátus a Deo, convérsus est ad fidem et baptizátus. Mox, Imperatóris iussu, fústibus crudelíssime cæsus, deínde suspénsus in equúleo, et ungulárum diutíssima laceratióne vexátus, lampádibus étiam adústus est; ac tandem, cum in fide Christi persísteret, dicens: « Non est Rex præter Christum, pro quo si míllies occídar, ipsum mihi de ore, ipsum mihi de corde auférre non potéritis », martýrii palmam obtruncatióne cápitis proméruit.
          Areláte, in Gállia, beáti item Genésii, qui, cum ímpia edícta, quibus Christiáni puniri iubebántur, exceptóris offício fungens, nollet excípere, et, proiéctis in públicum tábulis, se Christiánum esse testarétur, comprehénsus et decollátus est, atque ita martýrii glóriam, próprio cruóre baptizátus, accépit.
          In Sýria sancti Iuliáni Mártyris.
          Tarracóne, in Hispánia, sancti Magíni Mártyris.
          Itálicæ, in Hispánia, sancti Gerúntii Epíscopi, qui, Apostolórum témpore, Evangélium in ea província prædicávit, et, post multos labóres, in cárcere quiévit.
          Constantinópoli sancti Mennæ Epíscopi.
          Traiécti sancti Gregórii Epíscopi.
          Apud Montem Falíscum, in Etrúria, sancti Thomæ Confessóris, qui Herfordiénsis Ecclésiæ, in Anglia, Epíscopus éxstitit.
          Neápoli, in Campánia, sanctæ Patríciæ Vírginis.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of August
      
          At Carthage, Saint Louis IX, King of the Franks and Confessor, renowned for holiness of life and the glory of miracles, whose bones were afterwards translated to Paris.
          At Rome, the birthday of Saint Joseph Calasanz, Priest and Confessor, distinguished for innocence of life and miracles; who, to educate youth in piety and learning, founded the Order of Poor Clerics Regular of the Mother of God of the Pious Schools. Pope Pius XII, Supreme Pontiff, appointed him heavenly Patron before God the Father of all popular Christian schools everywhere. His feast, however, is kept on the Twenty-Seventh of August.
          Likewise at Rome, the holy Martyrs Eusebius, Pontian, Vincent, and Peregrinus; who, under the Emperor Commodus, were first lifted on the rack and stretched with sinews, then beaten with clubs, with flames applied to their sides; and, since they persevered most faithfully in praising Christ, were put to death with leaded whips until they gave up the spirit.
          At Rome, furthermore, the birthday of the blessed Deacon Nemesius and of his daughter, the Virgin Lucilla; who, since they could in no way be turned away from the faith of Christ, were beheaded by command of the Emperor Valerian. Their bodies, buried by the blessed Pope Stephen, were afterwards more honorably entombed by the blessed Pope Sixtus II on the Appian Way, on the Thirty-First of October; Pope Gregory V transferred them to the diaconia of Santa Maria Nova, together with the holy Symphronius, Olympius the Tribune, his wife Exsuperia, and their son Theodulus; all of whom, converted through the work of Symphronius and baptized by that holy Pope Stephen, had been crowned with martyrdom. The bodies of these same Saints, having been found there under Pope Gregory XIII, Supreme Pontiff, were placed more honorably beneath the altar of the same church on the Eighth of December.
          Likewise at Rome, Saint Genesius, Martyr, who was first a mime under paganism and, while mocking the Christian Mysteries in the theatre before the Emperor Diocletian, was suddenly inspired by God, converted to the faith, and baptized. Immediately, by the Emperor's command, he was most cruelly beaten with clubs, then hung on the rack, tormented with the prolonged laceration of iron claws, and also burned with torches; and at last, when he persisted in the faith of Christ, saying: "There is no King but Christ, for whom, though I be slain a thousand times, you will not be able to take him from my lips, nor from my heart" — he merited the palm of martyrdom by the cutting off of his head.
          At Arles, in Gaul, the blessed Genesius likewise, who, while serving as a notary and refusing to transcribe the impious edicts by which Christians were ordered to be punished, cast the tablets into the public street and testified that he was a Christian; he was seized and beheaded, and thus received the glory of martyrdom, baptized in his own blood.
          In Syria, Saint Julian, Martyr.
          At Tarragona, in Spain, Saint Maginus, Martyr.
          At Italica, in Spain, Saint Gerontius, Bishop, who, in the time of the Apostles, preached the Gospel in that province, and, after many labors, fell asleep in prison.
          At Constantinople, Saint Mennas, Bishop.
          At Utrecht, Saint Gregory, Bishop.
          Near Mons Faliscus, in Etruria, Saint Thomas, Confessor, who was Bishop of the Church of Hereford in England.
          At Naples, in Campania, Saint Patricia, Virgin.
  psalm.octavo-kalendas-ianuarii-290286ccb2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 25th day of December

          In the year 5199th from the creation of the world, when in the beginning God created the heavens and the earth, in the year 2957th from the flood, in the year 2015th from the birth of Abraham, in the year 1510th from the going forth of the people of Israel out of Egypt under Moses, in the year 1032th from the anointing of David as King, in the 65th week according to the prophecy of Daniel, in the 194th Olympiad, in the 752nd from the foundation of the city of Rome, in the 42nd year of the reign of the Emperor Octavian Augustus, in the 6th age of the world, while the whole earth was at peace, Jesus Christ, Himself Eternal God and Son of the Eternal Father, being pleased to hallow the world by His most gracious coming, having been conceived of the Holy Ghost, and when nine months were passed after His conception, (all kneel down) was born of the Virgin Mary at Bethlehem of Juda made Man, Our Lord Jesus Christ was born according to the flesh.

          Upon the same 25th day of December were born into the better life:
          The birthday of St. Anastasia, who in the reign of Diocletian first of all suffered hard and cruel imprisonment at the hands of her husband Publius, during which, however, she was much consoled and comforted by Chrysogonus, a confessor of Christ. Then she was enfeebled by lengthy detention by Florus, prefect of Illyria, and at last was bound to stakes with her hands and feet stretched out and fire kindled about her. Thus she achieved her martyrdom in the island of Palmaria, to which she had been deported with 200 men and 70 women, who celebrated their martyrdom by being slain in different ways.
          At Rome, in the Apronian cemetery, the holy virgin Eugenia, who in the time of the Emperor Gallienus, after many works of power, and after enlisting bands of sacred virgins for Christ, suffered long under Nicetius, Prefect of the city, and at length was slain with the sword (about 258).
          At Nicomedia, many thousand holy martyrs. Upon the feast of Christ's birth they had come together unto the Lord's house, and the Emperor Diocletian ordered the doors of the church to be shut, and all things made ready for fire round about it then he set a tripod and incense in front of the door, and sent an herald to proclaim in a loud voice that whosoever would escape burning should come forth and offer incense unto Jupiter. Whereunto they all replied with one voice, that they would far rather die for Christ's sake, whereupon he kindled the fire and they were consumed, and were born in heaven upon that same day whereupon it had pleased Christ to be born into this world to save it.
          At Barcelona, in Spain (in the year 1256), the holy confessor Peter Nolasco, founder of the Order of the Blessed Virgin Mary of Ransom for the redemption of captives. He was famous for his graces and miracles, and Alexander VIII. commanded his feast to be kept upon the last day of January.
      la:
      - type: text
        text: |-
          Octavo Kalendas Ianuarii

          Anno a creatióne mundi, quando in princípio Deus creávit cælum et terram, quinquiés millésimo centésimo nonagésimo nono; a dilúvio autem, anno bis millésimo nongentésimo quinquagésimo séptimo; a nativitáte Abrahæ, anno bis millésimo quintodécimo; a Móyse et egréssu pópuli Israël de Ægýpto, anno millésimo quingentésimo décimo; ab unctióne David in Regem, anno millésimo trigésimo secúndo; Hebdómada sexagésima quinta, iuxta Daniélis prophétiam; Olympíade centésima nonagésima quarta; ab urbe Roma cóndita, anno septingentésimo quinquagésimo secúndo; anno Impérii Octaviáni Augústi quadragésimo secúndo, toto Orbe in pace compósito, sexta mundi ætáte, Iesus Christus, ætérnus Deus æterníque Patris Fílius, mundum volens advéntu suo piíssimo consecráre, de Spíritu Sancto concéptus, novémque post conceptiónem decúrsis ménsibus (Hic vox elevatur, et omnes genua flectunt), in Béthlehem Iudæ náscitur ex María Vírgine factus Homo. (Hic autem in priori voce dicitur, et in tono passionis:) Natívitas Dómini nostri Iesu Christi secúndum carnem.
      - type: rubric
        text: Quod sequitur, legitur in tono Lectionis consueto; et surgunt omnes.
      - type: text
        text: |-
          Eódem die natális sanctæ Anastásiæ, quæ, témpore Diocletiáni, primo diram et immítem custódiam a viro suo Públio perpéssa est, in qua tamen a Confessóre Christi Chrysógono multum consoláta et confortáta fuit; deínde a Floro, Præfécto Illýrici, per diútinam custódiam maceráta, ad últimum, mánibus et pédibus exténsis, ligáta est ad palos, et circa eam ignis accénsus, in quo martýrium consummávit in ínsula Palmária, ad quam una cum ducéntis viris et septuagínta féminis deportáta fúerat, qui váriis interfectiónibus martýrium celebrárunt.
          Barcinóne, in Hispánia, item natális sancti Petri Nolásci Confessóris, qui Fundátor éxstitit Ordinis beátæ Maríæ de Mercéde redemptiónis captivórum, ac virtúte et miráculis cláruit. Ipsíus autem festum cólitur quinto Kaléndas Februárii.
          Romæ, in cœmetério Aproniáni, sanctæ Eugéniæ Vírginis, beáti Mártyris Philíppi fíliæ, quæ, témpore Galliéni Imperatóris, post plúrima virtútum insígnia, post sacros Vírginum choros Christo aggregátos, sub Præfécto Urbis Nicétio diu agonizávit, ac novíssime gládio iuguláta est.
          Nicomedíæ pássio multórum míllium Mártyrum, qui cum in Christi Natáli ad Domínicum conveníssent, Diocletiánus Imperátor iánuas Ecclésiæ claudi iussit, et ignem circumcírca parari, tripodémque cum thure præ fóribus poni, ac præcónem magna voce clamáre ut qui incéndium vellent effúgere, foras exírent et Iovi thus adolérent; cumque omnes una voce respondíssent se pro Christo libéntius mori, incénso igne consúmpti sunt, atque ita eo die nasci meruérunt in cælis, quo Christus in terris pro salúte mundi olim nasci dignátus est.
      en2:
      - type: text
        text: |-
          The Twenty-Fifth of December
      
          In the year from the creation of the world, when in the beginning God created heaven and earth, five thousand one hundred and ninety-nine; from the flood, in the year two thousand nine hundred and fifty-seven; from the birth of Abraham, in the year two thousand and fifteen; from Moses and the departure of the people of Israel from Egypt, in the year one thousand five hundred and ten; from the anointing of David as King, in the year one thousand and thirty-two; in the sixty-fifth week, according to the prophecy of Daniel; in the one hundred and ninety-fourth Olympiad; from the founding of the city of Rome, in the year seven hundred and fifty-two; in the forty-second year of the reign of the Emperor Octavian Augustus, when the whole world was at peace, in the sixth age of the world — (here the voice is raised, and all kneel) Jesus Christ, the eternal God and Son of the eternal Father, desiring to consecrate the world by his most gracious coming, having been conceived of the Holy Spirit, and nine months having elapsed since his conception: he is born in Bethlehem of Judah of the Virgin Mary, made Man. (Here, however, the former tone is resumed, and in the tone of the Passion:) The Nativity of our Lord Jesus Christ according to the flesh.
      - type: rubric
        text: What follows is read in the usual tone of a Lesson; and all rise.
      - type: text
        text: |-
          On the same day, the birthday of Saint Anastasia, who, in the time of Diocletian, first endured a harsh and cruel imprisonment at the hands of her husband Publius, in which she was greatly consoled and strengthened by Chrysogonus, a Confessor of Christ; then, worn down by long confinement under Florus, governor of Illyricum, she was at last bound hand and foot to stakes with a fire kindled around her, in which she completed her martyrdom on the island of Palmaria, to which she had been deported together with two hundred men and seventy women, who celebrated their martyrdom by various forms of death.
          At Barcelona, in Spain, likewise the birthday of Saint Peter Nolasco, Confessor, who was the Founder of the Order of the Blessed Mary of Mercy for the Redemption of Captives, and was renowned for virtue and miracles. His feast, however, is kept on the Twenty-eighth of January.
          At Rome, in the cemetery of Apronianus, Saint Eugenia, Virgin, daughter of the blessed Martyr Philip, who, in the time of the Emperor Gallienus, after very many notable acts of virtue, after sacred choirs of Virgins gathered for Christ, suffered long under the city prefect Niketios, and was at last put to death by the sword.
          At Nicomedia, the passion of many thousands of Martyrs, who had gathered for the Lord's Day at Christmas; the Emperor Diocletian ordered the doors of the church to be shut and fire to be prepared all around, and a tripod with incense to be placed before the entrance, and a herald to cry out in a loud voice that those who wished to escape the fire should come outside and offer incense to Jupiter; and when all replied with one voice that they would more gladly die for Christ, the fire was kindled and they were consumed, and thus merited on that day to be born in heaven, on which Christ once was pleased to be born on earth for the salvation of the world.
  psalm.pr-die-idus-apr-lis-2d45a0702d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 12th day of April, were born into the better life:

          At Verona, the holy martyr Zeno, Bishop [of that see,] which he governed with admirable faithfulness amid the storms of persecution. He was crowned with martyrdom in the time of the Emperor Gallienus.
          In Cappadocia, the holy martyr Saba the Goth, who was put to grievous torments and then drowned in the river, when Athanaric, king of the Goths, was persecuting the Christians under the Emperor Valens. At the which time, according to holy Augustine, very many orthodox Goths won the crown of martyrdom.
          At Braga, in Portugal, [about the year 300, under Diocletian,] the holy martyr Victor. He was only as yet preparing for baptism, when he refused to worship an idol, and with great faithfulness confessed Christ Jesus, for the which cause he was put to many torments and beheaded, and so obtained baptism in his own blood.
          At Fermo, in Picenum, the holy Virgin and martyr Vissia.
          At Rome, upon the Aurelian Way, holy Pope Julius [I.], who contended stoutly for the Catholic Faith against the Arians, and after many eminent acts fell asleep in peace, [in the year 352,] famous for holiness.
          At the town of Gap, the holy Confessor Constantine, Bishop [of that see, about the year 455.]
          At Pavia, holy Damian, Bishop of that see, [about the years 671-710.]
      la:
      - type: text
        text: |-
          Prídie Idus Aprílis

          Verónæ pássio sancti Zenónis Epíscopi, qui inter persecutiónis procéllas eam Ecclésiam mira constántia gubernávit, et, Galliéni témpore, martýrio coronátus est.
          In Cappadócia sancti Sabæ Gothi, qui, sub Valénte Imperatóre, cum Rex Gothórum Athanarícus Christiános insequerétur, in flumen, post dira torménta, proiéctus est; quo étiam témpore (ut sanctus Augustínus scribit) quamplúrimi ex Gothis orthodóxis coróna martýrii sunt insigníti.
          Brácari, in Lusitánia, sancti Victóris Mártyris, qui, adhuc catechúmenus, cum noluísset idólum adoráre, et Christum Iesum magna constántia conféssus fuísset, ídeo, post multa torménta, cápite abscísso, méruit próprio sánguine baptizári.
          Firmi, in Picéno, sanctæ Víssiæ, Vírginis et Mártyris.
          Romæ, via Aurélia, natális sancti Iúlii Papæ Primi, qui advérsus Ariános pro fide cathólica plúrimum laborávit, ac, multis præcláre gestis, sanctitáte célebris quiévit in pace.
          Apud Vapíngum óppidum, in Gállia, sancti Constantíni, Epíscopi et Confessóris.
          Papíæ sancti Damiáni Epíscopi.
      en2:
      - type: text
        text: |-
          The Twelfth of April
      
          At Verona, the passion of Saint Zeno, Bishop, who amid the storms of persecution governed that Church with wonderful steadfastness, and in the time of Gallienus was crowned with martyrdom.
          In Cappadocia, Saint Sabas the Goth, who, under the Emperor Valens, when Athanaric, King of the Goths, was persecuting Christians, was thrown into a river after dire torments; at which time also (as Saint Augustine writes) very many of the orthodox Goths were distinguished with the crown of martyrdom.
          At Braga, in Lusitania, Saint Victor, Martyr, who, being still a catechumen, having refused to adore an idol and having confessed Jesus Christ with great constancy, was therefore beheaded after many torments and merited to be baptized in his own blood.
          At Fermo, in Picenum, Saint Vissia, Virgin and Martyr.
          At Rome, on the Aurelian Way, the birthday of Saint Julius I, Pope, who labored greatly against the Arians on behalf of the Catholic faith, and, after many illustrious deeds, fell asleep in peace, renowned for holiness.
          Near the town of Gap, in Gaul, Saint Constantine, Bishop and Confessor.
          At Pavia, Saint Damian, Bishop.
  psalm.pr-die-idus-aug-sti-0e2e317182:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12 th day of August, were born into the better life:

          At Assisi, in Umbria, [in the year 1253], the holy Virgin Clare, the first of the women of the Order of Friars Minors [who are called Poor Clares.] Her life and miracles were famous, and Pope Alexander IV enrolled her name among those of the holy virgins.
          At Catania, in Sicily, in the persecution under the Emperors Diocletian and Maximian, the holy Deacon Euplius. He was long put to the torture for confessing the Lord, and at length beheaded, and so received the crown of martyrdom.
          At Augsburg, [in the fourth century,] the holy Hilaria, the mother of the blessed martyr Afra. She was watching at her grave when she was taken by persecutors, and for Christ's faith's sake committed to the fire, along with her handmaidens Digna, Euprepia, and Eunomia.
          In the same city, upon the same day, [in the fourth century,] there suffered also Quiriacus, Largis, Crescentian, Nimmia, Juliana, and twenty others.
          In Syria, the holy martyrs Macarius and Julian.
          At Nicomedia, under the Emperor Diocletian, the holy martyrs Count Anicete, his brother Photinus, and many others.
          At Civita Castellana, in Tuscany, [under Galerius Maximianus,] the holy martyr Gracilian and the Virgin Felicissima. Because they confessed the faith, their mouths were first bruised with stones, and then they were smitten with the sword, and so received that palm of martyrdom which they had desired.
          On the same day, [about the year 730,] the holy martyrs Porcarius, Abbot of the monastery of Lerins, and five hundred monks, crowned with martyrdom, slain by the barbarians for the Catholic faith's sake.
          At Milan, the holy Confessor Eusebius, Bishop [of that see.]
          At Brescia, holy Herculanus, Bishop [of that see.]
      la:
      - type: text
        text: |-
          Prídie Idus Augústi

          Sanctæ Claræ Vírginis, primæ plantæ Páuperum Dominárum Ordinis Minórum; quæ ad ætérnas Agni núptias evocáta est prídie huius diéi.
          Eódem die sanctórum Mártyrum Porcárii, Abbátis monastérii Lirinénsis, et Sociórum eius quingentórum Monachórum; qui pro fide cathólica, a bárbaris cæsi, martýrio coronáti sunt.
          Cátanæ, in Sicília, natális sancti Eúpli Diáconi, sub Diocletiáno et Maximiáno Augústis; qui, cum diutíssime pro confessióne Dómini tortus esset, tandem martýrii palmam, gládio cædénte, percépit.
          Augústæ Vindelicórum sanctæ Hiláriæ, quæ, cum esset beátæ Afræ Mártyris mater et ad sepúlcrum illíus excubáret, ibídem, pro fide Christi, a persecutóribus igni trádita est cum Digna, Euprépia et Eunómia, ancíllis suis. Passi sunt étiam eódem die, in præfáta urbe, Quiríacus, Lárgio, Crescentiánus, Nímmia et Iuliána, cum áliis vigínti.
          In Sýria sanctórum Mártyrum Macárii et Iuliáni.
          Nicomedíæ sanctórum Mártyrum Anicéti Cómitis, et Photíni fratris, cum áliis plúribus, sub Diocletiáno Imperatóre.
          Falériæ, in Túscia, pássio sanctórum Graciliáni, et Felicíssimæ Vírginis, quorum pro fídei confessióne ora lapídibus primo contúsa sunt; dehinc ambo, gládio percússi, optátam martýrii palmam suscepérunt.
          Medioláni deposítio sancti Eusébii, Epíscopi et Confessóris.
          Bríxiæ sancti Herculáni Epíscopi.
      en2:
      - type: text
        text: |-
          The Twelfth of August
      
          Of Saint Clare, Virgin, first plant of the Poor Ladies of the Order of Friars Minor; who was called to the eternal nuptials of the Lamb on the day before this.
          On the same day, the holy Martyrs Porcarius, Abbot of the monastery of Lérins, and his Companions, five hundred Monks; who, for the Catholic faith, were slain by barbarians and crowned with martyrdom.
          At Catania, in Sicily, the birthday of Saint Euplus, Deacon, under the Emperors Diocletian and Maximian; who, after being tortured for a very long time for confessing the Lord, at last received the palm of martyrdom by the stroke of the sword.
          At Augsburg, Saint Hilaria, who, being the mother of the blessed Martyr Afra and keeping watch at her tomb, was there handed over to the flames for the faith of Christ by persecutors, together with Digna, Euprepia, and Eunomia, her handmaids. On the same day, in the aforesaid city, Quiriacus, Largus, Crescentianus, Nimmia, and Juliana also suffered, together with twenty others.
          In Syria, the holy Martyrs Macarius and Julian.
          At Nicomedia, the holy Martyrs Anicetus the Count, and Photinus his brother, together with many others, under the Emperor Diocletian.
          At Faleria, in Etruria, the passion of the holy Gracilianus, and of Felicissima, Virgin, whose mouths were first crushed with stones for the confession of the faith; then both were struck by the sword and received the longed-for palm of martyrdom.
          At Milan, the passing of Saint Eusebius, Bishop and Confessor.
          At Brescia, Saint Herculanus, Bishop.
  psalm.pr-die-idus-dec-mbris-afffa714ca:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of December, were born into the better life:

          At Rome, the holy martyr Synesius, who was ordained a Reader in the time of the blessed Pope Xystus, and converted many to Christ he was accused before the Emperor Aurelian, and received the crown of martyrdom by being beheaded, (in the year 270.)
          At Alexandria, under the Emperor Decius, the holy martyrs Epimachus and Alexander; they were long kept in chains and put to diverse torments, but they persevered in the faith, and at the last were burnt, (in the year 250.)
          Likewise at Alexandria, the holy women Ammonaria the Virgin, Mercuria, Dionysia, and another called also Ammonaria. In the aforesaid persecution under the Emperor Decius, the first of these died a blessed death by the sword, after overcoming torments unheard of. The judge was ashamed to be conquered by women, and shrank from causing the application to them of the same tortures as to the first, and so conquered by their steadfastness, ordered them to be beheaded, (in the year 250.)
          On the same day, the holy martyrs Hermogenes, Donatus, and twenty-two others.
          At Trier, (in the fourth century,) under the President Rictiovarus, in the persecution under the Emperor Diocletian, suffered the holy martyrs Maxentius, Constantius, Crescentius, Justinus, and their Companions.
      la:
      - type: text
        text: |-
          Prídie Idus Decémbris

          Alexandríæ sanctórum Mártyrum Epímachi et Alexándri, qui, sub Décio Imperatóre, cum fuíssent multo témpore in vínculis, atque, divérsis supplíciis affécti, perdurássent in fide, ígnibus tandem consúmpti sunt. Sanctus vero Epímachus, simul cum sancto Gordiáno Mártyre, festíva celebritáte cólitur sexto Idus Maii.
          Romæ sancti Synésii Mártyris, qui, beáti Xysti Papæ Secúndi témpore ordinátus Lector, et, cum multos convertísset ad Christum, apud Aureliánum Imperatórem accusátus, martýrii corónam gládio percússus accépit.
          Eódem die sanctórum Mártyrum Hermógenis, Donáti et aliórum vigínti duórum.
          Tréviris sanctórum Mártyrum Maxéntii, Constántii, Crescéntii, Iustíni et Sociórum; qui in persecutióne Diocletiáni, sub Rictiováro Prǽside, passi sunt.
          Alexandríæ sanctárum Ammonáriæ Vírginis, Mercúriæ, Dionýsiæ et altérius Ammonáriæ. Harum prima, in persecutióne Décii, inaudítis tormentórum genéribus superátis, beátum vitæ finem, ferro cædénte, percépit; tres vero áliæ, cum Iudex a féminis superári erubésceret, ac dubitáret, ne, eádem in illas exércens cruciaménta, viríli eárum étiam constántia vincerétur, statim iussæ sunt decollári.
      en2:
      - type: text
        text: |-
          The Twelfth of December
      
          At Alexandria, the holy Martyrs Epimachius and Alexander, who, under the Emperor Decius, having been held in chains for a long time and afflicted with various torments, yet persevered in the faith, were at last consumed by fire. Saint Epimachius, however, is celebrated together with Saint Gordianus, Martyr, on the Tenth of May.
          At Rome, Saint Synesius, Martyr, who, ordained Lector in the time of the blessed Pope Sixtus II, and having converted many to Christ, was accused before the Emperor Aurelian, and received the crown of martyrdom by the stroke of the sword.
          On the same day, the holy Martyrs Hermogenes, Donatus, and twenty-two others.
          At Trier, the holy Martyrs Maxentius, Constantius, Crescentius, Justinus, and Companions; who suffered in the persecution of Diocletian under the governor Rictiovarus.
          At Alexandria, the holy Ammonaria, Virgin, Mercuria, Dionysia, and another Ammonaria. Of these, the first, in the persecution of Decius, having overcome unheard-of kinds of torments, received a blessed end of life by the stroke of the sword; the other three, however, since the judge was ashamed to be overcome by women, and hesitated lest, in subjecting them to the same torments, he should also be vanquished by their manly constancy, were immediately ordered to be beheaded.
  psalm.pr-die-idus-febru-rii-8f24147a61:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep in England the feast of the holy Confessor Benedict Biscop, founder and Abbot of the monastery of Jarrow-upon-Tyne, of whom mention hath been made upon the 12th day of January.
          Upon the same 12 th day of February, were born into the better life:

          At Barcelona, in Spain, the holy Virgin Eulalia, who received a glorious crown in the time of the Emperor Diocletian. She suffered racking, tearing with hooks, and scorching with fire, and was finally crucified, [in the year 304.]
          In Africa, the holy soldier and martyr Damian.
          At Carthage, the holy martyrs Modestus and Julian.
          At Benevento, the holy martyr Modestus the Levite.
          At Alexandria, the holy children Modestus and Ammonius.
          At Constantinople, [in the year 381,] holy Meletius, Patriarch of Antioch, who passed away to be ever with the Lord, when he was in exile, which he oftentimes suffered for the Catholic faith's sake. Holy John Chrysostom and Gregory of Nyssa have greatly praised him.
          At Constantinople, [in the year 895,] in the time of the Emperor Leo VI, holy Anthony, Bishop [of Constantinople.]
          At Verona, the holy Confessor Gaudentius, Bishop of that see.
      la:
      - type: text
        text: |-
          Prídie Idus Februárii

          Sanctórum septem Fundatórum Ordinis Servórum beátæ Maríæ Vírginis, Confessórum, quorum deposítio respectívis diébus recólitur. Quos autem in vita unus veræ fraternitátis spíritus sociávit, et indivísa post óbitum venerátio pópuli prosecúta est, eos Leo Décimus tértius, Póntifex Máximus, una páriter Sanctórum fastis accénsuit.
          In Africa sancti Damiáni, mílitis et Mártyris.
          Carthágine sanctórum Mártyrum Modésti et Iuliáni.
          Alexandríæ sanctórum Mártyrum Modésti et Ammónii infántum.
          Barcinóne, in Hispánia, sanctæ Euláliæ Vírginis, quæ, témpore Diocletiáni Imperatóris, equúleum, úngulas flammásque perpéssa, demum, cruci affíxa, gloriósam martýrii corónam accépit.
          Constantinópoli sancti Melétii, Epíscopi Antiochéni, qui, pro fide cathólica sæpe exsílium passus, demum in eádem urbe migrávit ad Dóminum. Eius virtútes sanctus Ioánnes Chrysóstomus et sanctus Gregórius Nyssénus summis láudibus celebrárunt.
          Item Constantinópoli sancti Antónii Epíscopi, témpore Leónis sexti Imperatóris.
          Verónæ sancti Gaudéntii, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Twelfth of February
      
          The holy Seven Founders of the Order of Servants of the Blessed Virgin Mary, Confessors, whose passing is recalled on their respective days. Those whom, in life, one spirit of true brotherhood united, and an undivided veneration of the people followed after their death, Pope Leo XIII, Supreme Pontiff, enrolled together likewise in the roll of the Saints.
          In Africa, Saint Damian, soldier and Martyr.
          At Carthage, the holy Martyrs Modestus and Julian.
          At Alexandria, the holy infant Martyrs Modestus and Ammonius.
          At Barcelona, in Spain, Saint Eulalia, Virgin, who, in the time of the Emperor Diocletian, having endured the rack, iron claws, and flames, was at last fixed to the cross and received the glorious crown of martyrdom.
          At Constantinople, Saint Meletius, Bishop of Antioch, who, having suffered exile many times for the Catholic faith, at last passed to the Lord in that same city. Saint John Chrysostom and Saint Gregory of Nyssa celebrated his virtues with the highest praise.
          Likewise at Constantinople, Saint Anthony, Bishop, in the time of the Emperor Leo VI.
          At Verona, Saint Gaudentius, Bishop and Confessor.
  psalm.pr-die-idus-i-lii-c017ae855b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 14th day of July, were born into the better life:

          At Lyon, the holy Confessor Bonaventure of the Order of Friars Minors, Cardinal Bishop of Albano, Doctor of the Church, very famous for his teaching and the holiness of his life, [in the year 1279.]
          At Rome, under the Tribune Claudius, the holy soldier Justus. God caused a vision of the Cross to appear to him, whereupon he believed in Christ, and as soon as he was baptized gave all his goods to feed the poor. He was tried under the Prefect Magnetius, who commanded him to be beaten with thongs, and a red-hot helmet to be put upon his head, and to be laid upon a burning fire. Not an hair of his head was hurt, but he gave up the ghost, confessing the Lord.
          At Sinope, in Pontus, the holy martyr Phocas, Bishop of that city. Under the Emperor Trajan he overcame imprisonment, chains, iron, and fire for Christ's sake, and winged his flight to heaven. His relics were brought to Vienne, in Gaul, and are laid in the Church of the Holy Apostles.
          At Alexandria, holy Heracles, Pope [of that see,] to whose judgement so much weight was attached that the Chronicler Julius the African mentions that he went to Alexandria to visit him, [in the year 246.]
          At Carthage, holy Cyrus, Bishop [of that see,] on whose feast-day holy Augustine preached to the people a sermon concerning him.
          At Como, holy Felix, first Bishop of that city.
          At Brescia, the holy Optatian, Bishop [of that see, fifth century.]
          At Deventer, in the Low Countries, the holy Priest Marcellinus, [about the year 800.]
          At Rome, the holy Camillus de' Lellis, founder of the Congregation of Regular Clerks for ministering to the sick, [in the year 1619.] He was illustrious for his holy life and miracles, and the Supreme Pontiff Benedict XIV enrolled his name among those of the saints. [We keep his feast upon the 18th day of this present month of July.]
          At Lima, in the kingdom of Peru, the holy Confessor Francis Solano, of the Order of Friars Minors, famous for his preaching, signs, and mighty works, among the Indians of that country, whose name the Supreme Pontiff Benedict XIII added to the list of the Saints.
      la:
      - type: text
        text: |-
          Prídie Idus Iúlii

          Sancti Bonaventúræ, ex Ordine Minórum, Cardinális et Epíscopi Albanénsis, Confessóris et Ecclésiæ Doctóris; qui sequénti die migrávit ad Dóminum.
          Romæ natális sancti Camílli de Lellis, Presbýteri et Confessóris, Clericórum Regulárium infírmis ministrántium Institutóris; quem, virtútibus et miráculis clarum, Summus Póntifex Benedíctus Décimus quartus in Sanctórum número recénsuit, et Leo Décimus tértius cæléstem hospitálium et infirmórum Patrónum renuntiávit. Ipsíus tamen festívitas quintodécimo Kaléndas Augústi recólitur.
          Item Romæ sancti Iusti mílitis, qui, sub Cláudio Tribúno, apparénte sibi divínitus Cruce, crédidit in Christum, et, mox baptizátus, ómnia sua paupéribus erogávit; tentus deínde a Magnétio Præfécto, atque verberári nervis, gálea igníta cóntegi et in rogum immítti iussus ac ne in capíllo quidem læsus, in Dómini confessióne réddidit spíritum.
          Synópe, in Ponto, sancti Phocæ Mártyris, eiúsdem civitátis Epíscopi, qui, sub Traiáno Imperatóre, cárcerem, víncula, ferrum ignémque pro Christo súperans, evolávit in cælum. Eius relíquiæ póstea Viénnam, in Gállia, sunt delátæ, et in Basílica sanctórum Apostolórum cónditæ.
          Alexandríæ sancti Héraclæ Antístitis, ob cuius celebérrimam opiniónem, Africánus historiógraphus mémorat se Alexandríam, ad eum viséndum, properásse.
          Carthágine sancti Cyri Epíscopi, in cuius festivitáte sanctus Augustínus de eo sermónem ad pópulum hábuit.
          Novocómi sancti Felícis, qui fuit primus eiúsdem civitátis Epíscopus.
          Bríxiæ sancti Optatiáni Epíscopi.
          Davéntriæ, in Belgis, sancti Marcellíni, Presbýteri et Confessóris.
          Limæ, in Perúvia, sancti Francísci Soláni, Sacerdótis ex Ordine Minórum et Confessóris; qui, prædicatióne, signis et virtútibus apud Indos Occidentáles illústris, migrávit ad Dóminum, atque a Benedícto Décimo tértio, Pontífice Máximo, Sanctórum fastis adscríptus est.
      en2:
      - type: text
        text: |-
          The Twelfth of July
      
          Of Saint Bonaventure, of the Order of Friars Minor, Cardinal and Bishop of Albano, Confessor and Doctor of the Church; who passed to the Lord on the following day.
          At Rome, the birthday of Saint Camillus de Lellis, Priest and Confessor, Founder of the Clerks Regular Ministers to the Sick; whom, renowned for virtues and miracles, the Supreme Pontiff Pope Benedict XIV enrolled in the number of the Saints, and Pope Leo XIII declared the heavenly Patron of hospitals and the sick. His feast, however, is kept on the Eighteenth of July.
          Likewise at Rome, Saint Justus, soldier, who, under the Tribune Claudius, when the Cross appeared to him by divine power, believed in Christ, and, having been baptized immediately, distributed all his possessions to the poor; then seized by the prefect Magnetius, and ordered to be beaten with sinews, covered with a burning helmet, and cast into a funeral pyre — yet not so much as a hair was harmed — he gave up his spirit in the confession of the Lord.
          At Sinope, in Pontus, Saint Phocas, Martyr, Bishop of that city, who, under the Emperor Trajan, overcoming imprisonment, chains, iron, and fire for Christ, flew up to heaven. His relics were afterwards translated to Vienne, in Gaul, and enshrined in the Basilica of the holy Apostles.
          At Alexandria, Saint Heraclas, Bishop, for whose celebrated reputation the historian Africanus records that he hastened to Alexandria to visit him.
          At Carthage, Saint Cyrus, Bishop, in whose feast Saint Augustine delivered a sermon to the people in his honor.
          At Novara, Saint Felix, who was the first Bishop of that city.
          At Brescia, Saint Optatianus, Bishop.
          At Deventer, in the Low Countries, Saint Marcellinus, Priest and Confessor.
          At Lima, in Peru, Saint Francis Solanus, Priest of the Order of Friars Minor and Confessor; who, distinguished among the Western Indians by his preaching, signs, and virtues, passed to the Lord, and was enrolled in the roll of the Saints by Pope Benedict XIII, Supreme Pontiff.
  psalm.pr-die-idus-i-nii-ffc3a6f060:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of June, were born into the better life:

          At Salamanca, in Spain, the holy Confessor John of San Fagondez, of the Order of Hermits of St. Augustine, famous for his zeal for the faith, the holiness of his life, and his wonderful works.
          At Rome, upon the Aurelian Way, the holy soldiers Basilides, Cyrinus, Nabor, and Nazarius, all martyrs, who were thrust into prison under Aurelius the Prefect, in the persecution under Diocletian and Maximian, because of their Christian profession, and after they had been torn with armed scourges, were beheaded.
          At Nice, in Bithynia, the holy martyr Antonina, who in the same persecution was, by the order of Priscillian the President, beaten with clubs, hung upon the rack, torn in the sides, burnt with fire, and at last slain with the sword.
          In Thrace, [in the fourth century,] holy Olympius, Bishop [of Enos,] who was thrust out of his see by the Arians and died a Confessor.
          At Rome, in the Vatican Basilica, [in the year 816,] the holy Pope Leo III, whose eyes and tongue were torn out by wicked men, [in the year 799,] but wonderfully given back to him by God.
          In Cilicia, holy Amphion, Bishop [of Nicomedia,] who was an eminent Confessor in the time of the Emperor Galerius Maximian.
          In Egypt, [toward the beginning of the fifth century,] the holy Hermit Onuphrius, who lived in the great desert for sixty years and passed to heaven illustrious for great, mighty, and worthy deeds his famous acts were written by the Abbot Paphnutius.
      la:
      - type: text
        text: |-
          Prídie Idus Iúnii

          Sancti Ioánnis a sancto Facúndo, ex Eremitárum sancti Augustíni Ordine, Confessóris, qui migrávit in cælum prídie huius diéi.
          Romæ, via Aurélia, natális sanctórum Mártyrum Basílidis, Cýrini, Náboris et Nazárii mílitum, qui, in persecutióne Diocletiáni et Maximiáni, sub Aurélio Præfécto, ob Christiáni nóminis confessiónem, detrúsi in cárcerem et scorpiónibus laceráti, tandem cápite truncáti sunt.
          Nicǽæ, in Bithýnia, sanctæ Antonínæ Mártyris, quæ, in eádem persecutióne, a Priscilliáno Prǽside iussa est fústibus cædi, suspéndi in equúleo, latéribus laniári et flammis incéndi, ac demum gládio necári.
          Romæ, in Basílica Vaticána, sancti Leónis Papæ Tértii, cui érutos ab ímpiis óculos et præcísam linguam Deus mirabíliter restítuit.
          In Thrácia sancti Olýmpii Epíscopi, qui, ab Ariánis sede pulsus, Conféssor occúbuit.
          In Cilícia sancti Amphíonis Epíscopi, qui, témpore Galérii Maximiáni, Conféssor fuit egrégius.
          In Ægýpto sancti Onúphrii Anachorétæ, qui in vasta erémo sexagínta annis vitam religióse perégit, et, magnis virtútibus ac méritis clarus, migrávit in cælum. Ipsíus vero insígnia gesta Paphnútius Abbas conscrípsit.
      en2:
      - type: text
        text: |-
          The Twelfth of June
      
          Of Saint John of Saint Facundo, of the Order of Hermits of Saint Augustine, Confessor, who passed into heaven on the day before this.
          At Rome, on the Aurelian Way, the birthday of the holy Martyrs Basilides, Cyrinus, Nabor, and Nazarius, soldiers, who, in the persecution of Diocletian and Maximian, under the governor Aurelius, for the confession of the Christian name, were cast into prison and torn by scorpions, and at last beheaded.
          At Nicaea, in Bithynia, of the holy Martyr Antonina, who, in the same persecution, was ordered by the governor Priscillianus to be beaten with clubs, hung on the rack, her sides torn, burned with flames, and at last put to death by the sword.
          At Rome, in the Vatican Basilica, of Saint Leo III, Pope, to whom God miraculously restored the eyes gouged out and the tongue cut off by impious men.
          In Thrace, Saint Olympius, Bishop, who, driven from his see by Arians, fell asleep as a Confessor.
          In Cilicia, Saint Amphion, Bishop, who, in the time of Galerius Maximian, was an outstanding Confessor.
          In Egypt, Saint Onuphrius, Anchorite, who in the vast desert lived a religious life for sixty years, and, distinguished by great virtues and merits, passed into heaven. His remarkable deeds were recorded by Abbot Paphnutius.
  psalm.pr-die-idus-ianu-rii-1187241129:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of January, were born into the better life:

          At Rome, the holy martyr Tatiana, in the persecution under the Emperor Alexander. She was lacerated with hooks and combs, thrown to wild beasts, and cast into the fire, but as she remained unhurt, was at length beheaded, and so passed away to heaven.
          In the Peloponnesos, the holy martyr Satyrus. As he was passing before a certain idol he breathed upon it, and signed himself with the sign of the cross upon his own forehead, whereupon the idol straightway fell down, and for this cause Satyrus was beheaded, (in the year 267.)
          Upon the same day, (in Morocco, in the year 259) the holy martyr Arcadius, eminent for his rank and his miracles.
          In Africa, the holy martyrs Zoticus, Rogatus, Modestus, Castulus, and a crown of forty soldiers.
          At Constantinople, the holy martyrs Tigrius the Priest and Eutropius the Reader, who suffered in the time of the Emperor Arcadius.
          At Tivoli, (in the year 126,) the holy martyr Zoticus.
          At Ephesus, forty-two holy monks, who were most cruelly tortured and suffered martyrdom under the Emperor Constantine Copronymus for the honouring of holy images.
          At Ravenna, the holy Confessor John, Archbishop of that see, (about the year 489.)
          At Verona, holy Probus, Bishop of that see, (about the year 236.)
          In England, (in the year 690,) the holy Confessor Benedict Biscop, founder, and Abbot of the monastery of Jarrow-upon-Tyne, whose feast we keep upon the 12th day of February.
      la:
      - type: text
        text: |-
          Prídie Idus Ianuárii

          Romæ sanctæ Tatiánæ Mártyris, quæ, sub Alexándro Imperatóre, uncis atque pectínibus laniáta, béstiis expósita et in ignem missa, sed nil læsa, demum, gládio percússa, migrávit in cælum.
          Constantinópoli sanctórum Tígrii Presbýteri, et Eutrópii Lectóris; qui, Arcádii Imperatóris témpore, cum de incéndio quo Ecclésia princeps et Senátus cúria conflagráverant, tamquam per eos ad exsílium sancti Ioánnis Chrysóstomi ulciscéndum excitáto, per calúmniam accusáti essent, sub Præfécto urbis Optáto, inánium deórum superstitióne implícito et Christiánæ religiónis osóre, passi sunt.
          In Acháia sancti Sátyri Mártyris, qui cum ante quoddam idólum tránsiret, in illud exsufflávit, signans sibi frontem, atque statim idólum córruit; ob quam causam decollátus est.
          Eódem die sancti Arcádii Mártyris, génere et miráculis clari.
          In Africa sanctórum Mártyrum Zótici, Rogáti, Modésti, Cástuli, et corónæ Mílitum quadragínta.
          Tíbure sancti Zótici Mártyris.
          Ephési pássio sanctórum quadragínta duórum Monachórum, qui ob cultum sanctárum Imáginum, sub Constantíno Coprónymo, sævíssime cruciáti, martýrium complevérunt.
          Ravénnæ sancti Ioánnis, Epíscopi et Confessóris.
          Verónæ sancti Probi Epíscopi.
          In Anglia sancti Benedícti, Abbátis et Confessóris.
      en2:
      - type: text
        text: |-
          The Twelfth of January
      
          At Rome, Saint Tatiana, Martyr, who, under the Emperor Alexander, was torn with hooks and iron combs, exposed to wild beasts, and cast into the fire, yet was unharmed; and at last, struck by the sword, passed into heaven.
          At Constantinople, the holy Tigrius, Priest, and Eutropius, Lector; who, in the time of the Emperor Arcadius, having been falsely accused of having set the fire by which the chief church and the Senate building were burned — as though to avenge the exile of Saint John Chrysostom through them — suffered under the city prefect Optatus, a man entangled in the superstition of empty gods and a hater of the Christian religion.
          In Achaia, Saint Satyrus, Martyr, who, while passing before a certain idol, blew upon it, signing himself on the forehead, and immediately the idol fell; for which reason he was beheaded.
          On the same day, Saint Arcadius, Martyr, distinguished by birth and miracles.
          In Africa, the holy Martyrs Zoticus, Rogatus, Modestus, Castulus, and a company of forty soldiers.
          At Tivoli, Saint Zoticus, Martyr.
          At Ephesus, the passion of the holy Forty-Two Monks, who, for the veneration of the holy Images, under Constantine Copronymus, were most cruelly tortured and completed their martyrdom.
          At Ravenna, Saint John, Bishop and Confessor.
          At Verona, Saint Probus, Bishop.
          In England, Saint Benedict, Abbot and Confessor.
  psalm.pr-die-idus-m-rtii-d4274d847f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 14th day of March, were born into the better life:

          At Rome, in the Veranian field, the holy martyr Leo, Bishop.
          Likewise at Rome, forty-seven holy martyrs, who were all baptized by the blessed Apostle Peter during the nine months during which he and his fellow-Apostle Paul were imprisoned in the Mamertine prison, and who, all for the loyal confession of their faith, were slain by the sword, under the Emperor Nero.
          In Africa, the holy martyrs Peter and Aphrodisius, who received their crown in the persecution under the Vandals.
          At Haran, in Mesopotamia, the holy martyrs Eutychius the Patrician and his Companions, who were slain by Evelid, King of the Arabs, for confessing their faith, [in the year 741.]
          In the province of Valeria, two holy monks, whom the Lombards hung upon a tree, whereon after they were dead their very enemies heard them singing. In the same persecution, a Deacon of the church of Maruvium, [now called that of Pescina,] was beheaded for confessing the faith.
          At Halberstadt, in Germany, the blessed Matilda, Queen of the Romans, Mother of the Emperor Otto I, who fell asleep in peace, illustrious for her lowliness and long suffering, [in the year 968.]
      la:
      - type: text
        text: |-
          Prídie Idus Mártii

          Romæ, in agro Veráno, sancti Leónis, Epíscopi et Mártyris.
          Item Romæ natális sanctórum quadragínta septem Mártyrum, qui baptizáti sunt a beáto Apóstolo Petro, cum tenerétur in custódia Mamertíni cum Coapóstolo suo Paulo, ubi novem menses deténti sunt; qui omnes, sub devotíssima fídei confessióne, Neroniáno gládio consúmpti sunt.
          In Província Valériæ sanctórum duórum Monachórum, quos Longobárdi suspéndio necavérunt in árbore; in qua Mártyres, licet defúncti, ab hóstibus ipsis audíti sunt psállere.
          In ea étiam persecutióne Diáconus Ecclésiæ Marsicánæ, in confessióne fídei, cápite truncátus est.
          In Africa sanctórum Mártyrum Petri et Aphrodísii, qui, in persecutióne Wandálica, martýrii corónam percepérunt.
          Carrhis, in Mesopotámia, sancti Eutýchii patrícii, et Sociórum, qui ab Evelid, Arabum Rege, ob fídei confessiónem, interémpti sunt.
          Halberstátti, in Germánia, dormítio beátæ Mathíldis Regínæ, matris Othónis Primi, Romanórum Imperatóris, humilitáte et patiéntia conspícuæ.
      en2:
      - type: text
        text: |-
          The Twelfth of March
      
          At Rome, in the field of Verano, Saint Leo, Bishop and Martyr.
          Likewise at Rome, the birthday of the holy Forty-Seven Martyrs, who were baptized by the blessed Apostle Peter while he was held in the Mamertine prison together with his fellow Apostle Paul, where they were detained for nine months; all of whom were put to death by the sword of Nero, under the most devout confession of the faith.
          In the province of Valeria, two holy Monks, whom the Lombards killed by hanging on a tree; on which tree the Martyrs, though dead, were heard by their enemies themselves singing the psalms.
          In that same persecution, a Deacon of the Church of Marsica was beheaded for the confession of the faith.
          In Africa, the holy Martyrs Peter and Aphrodisius, who, in the Vandal persecution, received the crown of martyrdom.
          At Carrhae, in Mesopotamia, Saint Eutychius the patrician and his Companions, who were put to death by Evelid, King of the Arabs, for the confession of the faith.
          At Halberstadt, in Germany, the passing of the blessed Queen Matilda, mother of Otto I, Emperor of the Romans, conspicuous for humility and patience.
  psalm.pr-die-idus-maii-297f2c343d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Monica, the mother of blessed Augustine, to whose illustrious life he hath left unto us his witness in the 9th Book of his Confessions, and of whom mention is made upon the 4th day of this present month of May.
          Upon the same 14th day of May, were born into the better life:

          The holy martyr Boniface, who suffered in the persecution under Diocletian and Maximian at Tarsus, in Cilicia, and whose body was thence brought to Rome and buried on the Latin Way.
          [At Cimiez, hard by Nice,] in Gaul, the holy martyr Pontius. By his preaching and carefulness he turned the two Caesars of the name of Philip to Christ, and himself gained the palm of martyrdom under the Emperors Valerian and Gallienus.
          In Syria, the holy Victor and Corona, martyrs under the Emperor Antoninus. Victor was put to diverse and horrid tortures under the judge Sebastian. Corona, who was the wife of a certain soldier, was fain to cry out that he was blessed, because of the constancy in his testimony, whereupon she saw two crowns descending from heaven, the one for Victor and the other for herself, and when she had borne witness to this in the hearing of all, she was torn asunder between trees, and Victor was beheaded.
          In Sardinia, [in the second century,] the holy martyrs Justa, Justina, and Henedina.
          At Rome, [in the year 824,] the holy Pope Paschal I, who brought up a great number of bodies of the holy martyrs out of the Catacombs and put them in honourable places in diverse churches.
          At Ferentino, in Tuscany, [in the sixth century,] the holy Boniface, Bishop [of that see,] who was marked by holiness and miracles from his very boyhood, as is told by blessed Pope Gregory.
          At Naples, in Campania, [in the sixth century,] holy Pomponius, Bishop [of that see.]
          In Egypt, [in the year 348,] the holy Abbot Pachom, who built many monasteries in that land, and wrote down a rule for monks, at the dictation of an Angel.
      la:
      - type: text
        text: |-
          Prídie Idus Maii

          Tarsi, in Cilícia, natális sancti Bonifátii Mártyris, qui, sub Diocletiáno et Maximiáno passus, deínde Romam advéctus, via Latína sepúltus est.
          In Gállia sancti Póntii Mártyris, cuius prædicatióne et indústria postquam duo Philíppi Cǽsares ad Christi fidem convérsi sunt, ipse, sub Valeriáno et Galliéno Princípibus, martýrii palmam adéptus est.
          In Sýria sanctórum Mártyrum Victóris et Coronæ, sub Antoníno Imperatóre; ex quibus Victor a Sebastiáno Iúdice váriis et horréndis afféctus est cruciátibus. Cum autem ipsum Coróna, uxor cuiúsdam mílitis, cœpísset beátum prædicáre ob martýrii constántiam, vidit duas corónas de cælo lapsas, unam Victóri et álteram sibi missam; cumque hoc audiéntibus cunctis testarétur, ipsa quidem inter árbores scissa, Victor vero decollátus est.
          In Sardínia sanctárum Mártyrum Iustæ, Iustínæ et Henedínæ.
          Ferénti, in Túscia, sancti Bonifátii Epíscopi, qui (ut refert beátus Gregórius Papa) sanctitáte et miráculis a puerítia cláruit.
          In pago Betharram, diœcésis Baionénsis, sancti Michaélis Garicoïts, Confessóris, Congregatiónis Presbyterórum Missionariórum a Sacro Corde Iesu Fundatóris, apostólico zelo insígnis, quem Pius Papa Duodécimus Sanctórum fastis adscrípsit.
          Niciæ, in Subalpínis, sanctæ Maríæ Domínicæ Mazzaréllo, Cofundatrícis Institúti Filiárum Maríæ Auxiliatrícis, quæ, humilitáte, prudéntia et caritáte præclára, in album sanctárum Vírginum a Pio Papa Duodécimo fuit reláta.
      en2:
      - type: text
        text: |-
          The Twelfth of May
      
          At Tarsus, in Cilicia, the birthday of Saint Boniface, Martyr, who suffered under Diocletian and Maximian, and was afterwards brought to Rome and buried on the Latin Way.
          In Gaul, Saint Pontius, Martyr, by whose preaching and labor the two emperors Philip were converted to the faith of Christ; he himself afterwards, under the Emperors Valerian and Gallienus, obtained the palm of martyrdom.
          In Syria, the holy Martyrs Victor and Corona, under the Emperor Antoninus; of whom Victor was afflicted by the judge Sebastian with various and terrible torments. But when Corona, the wife of a certain soldier, began to declare him blessed for his constancy in martyrdom, she saw two crowns descend from heaven, one sent for Victor and the other for herself; and when she testified to this before all who were listening, she herself was split between two trees, and Victor was beheaded.
          In Sardinia, the holy Martyrs Justa, Justina, and Henedinа.
          At Ferento, in Etruria, Saint Boniface, Bishop, who (as the blessed Pope Gregory relates) was renowned for holiness and miracles from childhood.
          In the hamlet of Betharram, in the diocese of Bayonne, Saint Michael Garicoïts, Confessor, Founder of the Congregation of Missionary Priests of the Sacred Heart of Jesus, outstanding for apostolic zeal, whom Pope Pius XII enrolled in the roll of the Saints.
          At Nice, in Piedmont, Saint Mary Dominica Mazzarello, Co-Foundress of the Institute of the Daughters of Mary Help of Christians, who, renowned for humility, prudence, and charity, was enrolled among the holy Virgins by Pope Pius XII.
  psalm.pr-die-idus-nov-mbris-4f5c7465c6:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of November, were born into the better life:

          The holy martyr, Pope Martin. He got together a synod at Rome, wherein he condemned the heretics Sergius, Paul, and Pyrrhus. Wherefore the heretic Emperor Constans caused him to be kidnapped and brought to Constantinople, whence he was banished into the Crimea, where he died, (in the year 655,) worn out by his sufferings for the Catholic faith's sake. He was famous for miracles. His body was afterward brought to Rome and buried in the Church of SS. Sylvester and Martin.
          In Asia, the holy martyrs and Bishops Aurelius and Publius.
          In the country of Sens, (in the year 726,) the holy martyr Paternus.
          At Gent, the holy martyr Livin, Bishop (in Ireland, Apostle of West Flanders, martyred at Esse, in Belgium, in the seventh century.)
          In Poland, the holy martyred Hermits Benedict, John, Matthew, Isaac, and Christinus.
          At Vitepsk, in Poland, the holy martyr Jehosaphat, Archbishop of Polotsk, Monk of the Order of St. Basil, who was cruelly murdered by schismatics, (in the year 1623,) out of their hatred for Catholic unity and truth, and whose name Pope Pius IX enrolled among those of the holy martyrs. We keep his feast upon the 28th day of this present month of November.
          At Avignon, holy Rufus, the first Bishop of that see.
          At Cologne, (in the year 663,) holy Cunibert, Bishop (of that see.)
          At Tarragona, in Spain, the blessed Priest Emilian, who was famous for countless miracles, and whose wonderful life hath been written by Braulio, the holy Bishop of Zaragoza.
          At Constantinople, the holy Abbot Nilus, who had been Prefect of the city, but became a Monk, and was famous for teaching and holiness in the time of the Emperor Theodosius the younger.
          Likewise at Constantinople, holy Theodore, of the monastery which is called the Studium who contended mightily for the Catholic faith against the Iconoclasts, and became famous throughout the whole Catholic Church, (a.d. 759-826.)
          At Alcala, in Spain, (in the year 1463,) the holy Confessor Diego, of the Order of Friars Minor, eminent for his lowliness, whose name Sixtus V enrolled among those of the Saints, and whose feast is kept upon the morrow after.
      la:
      - type: text
        text: |-
          Prídie Idus Novémbris

          Sancti Martíni Primi, Papæ et Mártyris, cuius dies natális sextodécimo Kaléndas Octóbris recensétur.
          Vitépsci, in Polónia, pássio sancti Iósaphat, e sancti Basilíi Ordine, Epíscopi Polocénsis et Mártyris; qui a schismáticis, in ódium cathólicæ unitátis et veritátis, crudéliter interféctus est, et a Pio Papa Nono inter sanctos Mártyres adscríptus. Eius tamen festívitas recólitur décimo octávo Kaléndas Decémbris.
          Complúti, in Hispánia, natális sancti Dídaci Confessóris, ex Ordine Minórum, humilitáte célebris; quem Xystus Quintus, Póntifex Máximus, Sanctórum catálogo adscrípsit. Ipsíus autem festum sequénti die celebrátur.
          In Asia pássio sanctórum Aurélii et Públii Episcopórum.
          Eschæ, in Bélgio, sancti Livíni, Epíscopi et Mártyris; qui, cum plúrimos ad Christi fidem convertísset, a Pagánis necátus est. Ipsíus vero corpus ad Portum Gandæ póstea translátum fuit.
          Apud Casimíriam, in Polónia, sanctórum Mártyrum Eremitárum Benedícti, Ioánnis, Matthǽi, Isaac et Christiáni; qui a prædónibus, divíno inténti servítio, dire vexáti sunt et gládiis occísi.
          Apud óppidum Sergíniam, in território Senonénsi, sancti Patérni, Mónachi et Mártyris; qui, dum eídem occurréntes in ipsíus óppidi silva latrónes ad emendándam vitam incitáret, ab illis trucidátus est.
          Avenióne sancti Rufi, qui éxstitit primus eiúsdem civitátis Epíscopus.
          Colóniæ Agrippínæ deposítio sancti Cunibérti Epíscopi.
          Turiasóne, in Hispánia Tarraconénsi, beáti Æmiliáni Presbýteri, qui innúmeris miráculis cláruit; cuius admirábilem vitam sanctus Bráulio, Cæsaraugustánus Epíscopus, descrípsit.
          Constantinópoli sancti Nili Abbátis, qui, sub Theodósio iunióre, ex Præfécto eiúsdem civitátis factus Mónachus, doctrína et sanctitáte cláruit.
      en2:
      - type: text
        text: |-
          The Twelfth of November
      
          Of Saint Martin I, Pope and Martyr, whose birthday is recalled on the Sixteenth of September.
          At Vitebsk, in Poland, the passion of Saint Josaphat, of the Order of Saint Basil, Bishop of Polotsk and Martyr; who was cruelly put to death by schismatics out of hatred for Catholic unity and truth, and was enrolled among the holy Martyrs by Pope Pius IX. His feast, however, is kept on the Fourteenth of November.
          At Alcalá de Henares, in Spain, the birthday of Saint Didacus, Confessor, of the Order of Friars Minor, celebrated for humility; whom Pope Sixtus V, Supreme Pontiff, enrolled in the catalogue of the Saints. His feast, however, is celebrated on the following day.
          In Asia, the passion of the holy Bishops Aurelius and Publius.
          At Asse, in Belgium, Saint Livinus, Bishop and Martyr; who, having converted very many to the faith of Christ, was put to death by pagans. His body was afterwards translated to the port of Ghent.
          Near Kazimierz, in Poland, the holy Martyr Hermits Benedict, John, Matthew, Isaac, and Christian; who, intent on the divine service, were cruelly tormented by robbers and slain with swords.
          Near the town of Sergy, in the territory of Sens, Saint Paternus, Monk and Martyr; who, while urging robbers who met him in the wood of that same town to amend their lives, was slaughtered by them.
          At Avignon, Saint Rufus, who was the first Bishop of that city.
          At Cologne, the passing of Saint Cunibert, Bishop.
          At Tarazona, in Tarraconensian Spain, the blessed Priest Aemilianus, who was renowned for countless miracles; whose wonderful life was described by Saint Braulio, Bishop of Zaragoza.
          At Constantinople, Saint Nilus, Abbot, who, under Theodosius the Younger, having become a Monk from having been prefect of that city, was renowned for learning and holiness.
  psalm.pr-die-idus-oct-bris-036fc56e8a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 14th day of October, were born into the better life:

          At Rome, upon the Aurelian Way, the blessed martyr Pope Callistus. By command of the Emperor Alexander he was long starved in prison, and cudgelled every day, then he was cast headlong out of a window of the house wherein he was warded, and drowned in a well, and so earned the triumph of victory.
          At Caesarea, in Palestine, the holy Virgin and martyr Fortunata. In the persecution under the Emperor Diocletian she overcame the rack, fire, beasts, and other torments, and gave up her soul to God. Her body was brought later to Naples, in Campania.
          Also the holy martyrs Carponius, Evaristus, and Priscian, brothers of the aforesaid Fortunata, who were slain with the sword, and so received their crown.
          Also the holy martyrs Saturninus and Lupus.
          At Rimini, (in the fourth century,) the holy martyr Gaudentius, Bishop (of that see.)
          At Todi, the holy Bishop Fortunatus, who, as is stated by blessed Gregory, was distinguished by the grace of an extraordinary power in driving away unclean spirits.
          At Wuerzburg, (in the eighth century,) holy Burchard, the first Bishop of that see.
          At Brugge, in Flanders, (toward the end of the fourth century,) holy Donatian, Bishop of Reims.
          At Trier, (in the sixth century,) holy Rusticus, Bishop (of that see.)
          On the same day, (in the year 1060,) deceased blessed Dominic, called Loricatus, (that is, the mail-wearer, from the coat of mail which he wore as a penance.)
          In Latium, the holy Confessor Bernard.
      la:
      - type: text
        text: |-
          Prídie Idus Octóbris

          Romæ, via Aurélia, natális beáti Callísti Primi, Papæ et Mártyris; qui, Alexándri Imperatóris iussu, diútius fame in cárcere cruciátus, et quotídie fústibus cæsus, tandem, præcipitátus e fenéstra domus in qua custodiebátur, atque in púteum demérsus, victóriæ triúmphum proméruit.
          Arímini sancti Gaudéntii, Epíscopi et Mártyris.
          Cæsaréæ, in Palæstína, sanctórum Carpónii, Evarísti et Prisciáni, fratrum beátæ Fortunátæ, qui, gládio iuguláti, páriter martýrii corónam percepérunt.
          Item sanctórum Saturníni et Lupi.
          Cæsaréæ, in Palæstína, sanctæ Fortunátæ, Vírginis et Mártyris, ac prædicatórum Mártyrum Carpónii, Evarísti et Prisciáni soróris; quæ, in persecutióne Diocletiáni, post equúleum, ignes, béstias et ália torménta superáta, spíritum Deo réddidit. Ipsíus corpus póstea Neápolim, in Campánia, delátum fuit.
          Tudérti, in Umbria, sancti Fortunáti Epíscopi, qui (ut beátus Gregórius Papa refert) in immúndis spirítibus effugándis imménsæ grátia virtútis emícuit.
          Herbípoli, in Germánia, sancti Burchárdi, qui fuit primus illíus civitátis Epíscopus.
          Brugis Flandrórum sancti Donatiáni, Rheménsis Epíscopi.
          Tréviris sancti Rústici Epíscopi.
          Lugdúni, in Gállia, sancti Iusti, Epíscopi et Confessóris, miræ sanctitátis et prophétici spíritus viri; qui, Episcopátu demísso, in erémum Ægýpti, una cum Lectóre suo Viatóre, secéssit, ibíque, cum áliquot annos próximam Angelis egísset vitam, et dignus suórum labórum finis advenísset, corónam iustítiæ perceptúrus migrávit ad Dóminum. Ipsíus sanctum corpus, una cum óssibus beáti Viatóris, qui eiúsdem Epíscopi fúerat miníster, Lugdúnum póstea quarto Nonas Septémbris delátum fuit.
          Eódem die deposítio beáti Domínici Loricáti.
          Arpíni, in Látio, sancti Bernárdi Confessóris.
      en2:
      - type: text
        text: |-
          The Twelfth of October
      
          At Rome, on the Aurelian Way, the birthday of the blessed Callixtus I, Pope and Martyr; who, by order of the Emperor Alexander, was tortured for a very long time by hunger in prison, beaten daily with clubs, and at last hurled headlong from a window of the house where he was kept and plunged into a well, and thus merited the triumph of victory.
          At Rimini, Saint Gaudentius, Bishop and Martyr.
          At Caesarea, in Palestine, the holy Carponius, Evaristus, and Priscianus, brothers of the blessed Fortunata, who, put to death by the sword, equally received the crown of martyrdom.
          Likewise, the holy Saturninus and Lupus.
          At Caesarea, in Palestine, Saint Fortunata, Virgin and Martyr, and sister of the aforesaid Martyrs Carponius, Evaristus, and Priscianus; who, in the persecution of Diocletian, having overcome the rack, fire, wild beasts, and other torments, gave up her spirit to God. Her body was afterwards translated to Naples, in Campania.
          At Todi, in Umbria, Saint Fortunatus, Bishop, who (as the blessed Pope Gregory relates) shone forth with immense grace and power in driving out unclean spirits.
          At Würzburg, in Germany, Saint Burchard, who was the first Bishop of that city.
          At Bruges in Flanders, Saint Donatianus, Bishop of Reims.
          At Trier, Saint Rusticus, Bishop.
          At Lyon, in Gaul, Saint Justus, Bishop and Confessor, a man of wondrous holiness and prophetic spirit; who, laying aside the episcopate, withdrew with his lector Viator into the desert of Egypt, and there, having lived for some years a life next to that of the Angels, when the fitting end of his labors came and he was about to receive the crown of justice, he passed to the Lord. His holy body, together with the bones of the blessed Viator, who had been the minister of the same Bishop, was afterwards brought to Lyon on the Second of September.
          On the same day, the passing of the blessed Dominic Loricatus.
          At Arpino, in Latium, Saint Bernard, Confessor.
  psalm.pr-die-idus-sept-mbris-33516e3b34:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of September is commemorated the Holy Name of the Blessed Virgin Mary, the which Commemoration the Supreme Pontiff Innocent XI ordered to be made in thanksgiving for the famous victory gained over the Turks at Vienna, in Austria, under the protection of the same Blessed Virgin, (upon the aforesaid day, in the year 1683.)
          Upon the (same) 12th day of September, were born into the better life:

          At Alexandria, the holy martyrs Hieronides, Leontius, Serapion, Selesius, Valerian, and Straton, who, under the Emperor Maximin, were drowned in the sea for confessing Christ's Name.
          In Bithynia, the holy martyr Bishop Autonomus. He fled thither from Italy to escape the persecution under the Emperor Diocletian, and when he had turned very many to the faith the raging Gentiles slew him at the Altar while he was celebrating the Holy Mysteries, whereby he himself became a sacrifice of Christ.
          At Merus, in Phrygia, the holy martyrs Macedonius, Theodulus, and Tatian. The President Almachius, under the Emperor Julian the Apostate, after putting them to other torments, caused them to be stretched upon red-hot iron gratings, and thus with gladness they finished their testimony.
          At Iconium, in Lycaonia, the holy martyr Curonotus, Bishop (of that see,) who was beheaded under the President Perennius, and so received the palm of martyrdom.
          At Pavia, holy Juventius, Bishop (of that city,) of whom mention is made upon the 8th day of February. He was sent thither along with holy Syrus by the blessed Hermagoras, a disciple of the holy Evangelist Mark, and they both there preached the gospel of Christ, and shone forth with great graces and wonders, so that by the works of God they lighted up even the cities hard by, and fell asleep at last in the honour of their Bishophood, in glory and in peace.
          At Lyon, (in the sixth century,) deceased the holy (Confessor) Sacerdos, Bishop (of that see.)
          At Verona, holy Silvinus, Bishop (of that see.)
          At Anderlecht, adjacent to the city of Brussels, in the Brabant (in the year 1012,) the holy Confessor Guy (the Palmer.)
      la:
      - type: text
        text: |-
          Prídie Idus Septémbris

          Festum sanctíssimi Nóminis beátæ Maríæ, quod Innocéntius Undécimus, Póntifex Máximus, ob insígnem victóriam de Turcis, ipsíus Vírginis præsídio, Vindobónæ in Austria reportátam, celebrári iussit.
          In Bithýnia sancti Autónomi, Epíscopi et Mártyris; qui ex Itália, Diocletiáni Imperatóris persecutiónem declínans, illuc proféctus, ibi, cum plúrimos convertísset ad fidem, a furéntibus Gentílibus, dum sacra Mystéria perágeret, ad altáre mactátus est, et hóstia Christi efféctus.
          Icónii, in Lycaónia, sancti Curónoti Epíscopi, qui sub Perénnio Prǽside, cápite truncátus, martýrii palmam accépit.
          Alexandríæ natális sanctórum Mártyrum Hierónidis, Leóntii, Serapiónis, Selésii, Valeriáni et Stratónis, qui, sub Maximíno Imperatóre, ob confessiónem nóminis Christi, in mare sunt demérsi.
          Meri, in Phrýgia, pássio sanctórum Mártyrum Macedónii, Theodúli et Tatiáni, qui, sub Iuliáno Apóstata, ab Almáchio Prǽside, post ália torménta, super crates férreas ignítas pósiti, exsultántes martýrium complevérunt.
          Apud Papíam sancti Iuvéntii Epíscopi, de quo ágitur sexto Idus Februárii. Ipse, a beáto Hermágora, discípulo sancti Marci Evangelístæ, ad eam urbem, una cum sancto Syro, cuius memória recólitur quinto Idus Decémbris, diréctus est; et ambo, prædicántes illic Christi Evangélium et magnis virtútibus ac miráculis coruscántes, étiam vicínas urbes divínis opéribus illustrárunt, sicque in pontificáli honóre, glorióso fine, quievérunt in pace.
          Lugdúni, in Gállia, deposítio sancti Sacerdótis Epíscopi.
          Verónæ sancti Silvíni Epíscopi.
          Anderláci, prope Bruxéllas, in Brabántia, sancti Guidónis Confessóris.
      en2:
      - type: text
        text: |-
          The Twelfth of September
      
          The feast of the Most Holy Name of the Blessed Virgin Mary, which Pope Innocent XI, Supreme Pontiff, ordered to be celebrated on account of the outstanding victory over the Turks, won at Vienna in Austria through the protection of that same Virgin.
          In Bithynia, Saint Autonomus, Bishop and Martyr; who, fleeing from Italy to avoid the persecution of the Emperor Diocletian, went there, and, having converted very many to the faith, was slaughtered at the altar by raging pagans while celebrating the sacred Mysteries, and so became a victim of Christ.
          At Iconium, in Lycaonia, Saint Coronatus, Bishop, who, under the governor Perennius, was beheaded and received the palm of martyrdom.
          At Alexandria, the birthday of the holy Martyrs Hieronides, Leontius, Serapion, Selesius, Valerian, and Straton, who, under the Emperor Maximinus, were plunged into the sea for the confession of the name of Christ.
          At Meros, in Phrygia, the passion of the holy Martyrs Macedonius, Theodulus, and Tatianus, who, under Julian the Apostate, under the governor Almachus, after other torments, were placed on red-hot iron gratings and rejoicing completed their martyrdom.
          Near Pavia, Saint Juventius, Bishop, of whom commemoration is made on the Eighth of February. He was directed to that city by the blessed Hermagoras, disciple of Saint Mark the Evangelist, together with Saint Syrus, whose memory is recalled on the Ninth of December; and both, preaching the Gospel of Christ there and shining with great virtues and miracles, also illuminated the neighboring cities with divine works, and thus fell asleep in peace with a glorious end in the honor of the episcopate.
          At Lyon, in Gaul, the passing of Saint Sacerdos, Bishop.
          At Verona, Saint Silvinus, Bishop.
          At Anderlecht, near Brussels, in Brabant, Saint Guido, Confessor.
  psalm.pr-die-kal-ndas-apr-lis-b0ad480c02:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 31st day of March, were born into the better life:

          At Tekoa, in Palestine, the holy Prophet Amos, who was often-times scourged by the priest Amaziah, and pierced in the temples with a bar by his son Oziah. He was afterward borne back half dead into his own country, and there gave up the ghost, and is buried with his fathers, [785 B.C.]
          In Africa, the holy martyrs Theodulus, Anesius, Felix, Cornelia, and their Companions.
          In Persia, under King Isdegerd, the holy martyr Benjamin the Deacon. Because he would not cease from preaching the word of God, sharp reeds were forced under his nails, and a thorny stake thrust into his bowels, and so he finished his testimony, [in the year 401.]
          At Rome, the holy virgin Balbina, the daughter of the blessed martyr Quirinus. She was baptized by holy Pope Alexander, and after she had overcome the world, [in the year 169,] she was buried on the Appian Way, by her father's side.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Aprílis

          Thécuæ, in Palæstína, sancti Amos Prophétæ, qui ab Amasía Sacerdóte frequénter plagis afflíctus est, atque ab huius fílio Ozía vecte per témpora transfíxus; et póstea, semivívus in pátriam devéctus, ibídem exspirávit, sepultúsque est cum pátribus suis.
          In Pérside sancti Béniamin Diáconi, qui, cum Dei verbum non desísteret prædicáre, ídeo, sub Isdegérde Rege, arundínibus acútis confíxus únguibus, et spinósa sude per alvum transmíssa, martýrium consummávit.
          In Africa sanctórum Mártyrum Theodúli, Anésii, Felícis, Cornéliæ et Sociórum.
          Romæ sanctæ Balbínæ Vírginis, fíliæ beáti Quiríni Mártyris, quæ, a sancto Alexándro Papa baptizáta, in sancta virginitáte Christum sibi sponsum elégit; et, post devíctum huius sǽculi cursum, sepúlta est via Appia, iuxta patrem suum.
      en2:
      - type: text
        text: |-
          The Thirty-First of March
      
          At Tekoa, in Palestine, of the holy Prophet Amos, who was frequently afflicted with blows by the priest Amaziah, and was pierced through the temples with a club by Amaziah's son Oziah; and afterwards, carried home half-dead to his homeland, he breathed his last there, and was buried with his fathers.
          In Persia, Saint Benjamin, Deacon, who, since he did not cease preaching the word of God, was therefore, under King Isdegerd, pierced in the fingernails with sharp reeds, and a thorny stake was driven through his bowels, and thus he completed his martyrdom.
          In Africa, the holy Martyrs Theodulus, Anesius, Felix, Cornelia, and Companions.
          At Rome, Saint Balbina, Virgin, daughter of the blessed Martyr Quirinus, who, baptized by the holy Pope Alexander, chose Christ as her spouse in holy virginity; and, after overcoming the course of this age, was buried on the Appian Way, near her father.
  psalm.pr-die-kal-ndas-aug-sti-2c9b6caca0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 31st day of July, was born into the better life:

          At Rome, the birthday of St. Ignatius, confessor, founder of the Society of Jesus, renowned for sanctity and miracles, and most zealous for propagating the Catholic religion in all parts of the world.
          At Caesarea, in Mauretania, the martyrdom of the blessed martyr Fabius. As he refused to carry the ensign of the governor of the province, he was thrown into prison for some days, and as he persisted twice in confessing Christ when brought before the judge, he was condemned to capital punishment.
          At Milan, during the persecution of Antoninus, St. Calimerius, bishop and martyr, who was arrested, covered with wounds, and pierced through the neck with a sword. He terminated his martyrdom by being precipitated into a well.
          At Synnada, in Phrygia, the holy martyrs Democritus, Secundus and Denis.
          In Syria, three hundred and fifty monks, who became martyrs by being slain by the heretics for defending the Council of Chalcedon.
          At Ravenna, the departure from this world of St. Germanus, bishop of Auxerre, a man most renowned for his birth, faith, learning, and glorious miracles, who freed England completely from the heretical doctrines of the Pelagians.
          At Tagaste, in Africa, St. Firmus, bishop, illustrious by a glorious confession of the faith.
          At Siena, in Tuscany, the birthday of blessed John Colombini, founder of the Order of the Jesuati, renowned for sanctity and miracles.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Augústi

          Romæ natális sancti Ignátii, Presbýteri et Confessóris, qui Fundátor éxstitit Societátis Iesu, atque vir fuit sanctitáte et miráculis clarus, ac religiónis cathólicæ ubíque dilatándæ studiosíssimus; quem Pius Undécimus, Póntifex Máximus, cæléstem ómnium Exercitiórum spirituálium Patrónum constítuit.
          Medioláni sancti Calimérii, Epíscopi et Mártyris; qui, in Antoníni persecutióne, comprehénsus, vulnéribus confóssus, cervicibúsque gládio transverberátis, præceps in púteum deiéctus, martýrii cursum confécit.
          Cæsaréæ, in Mauritánia, pássio beáti Fábii Mártyris, qui, cum ferre vexílla præsidália recusáret, primo in cárcerem trusus est, ibíque diébus áliquot deténtus; deínde, cum in confessióne Christi, interrogátus semel et íterum, immóbilis perduráret, senténtia capitáli a Iúdice condemnátur.
          Sýnnadæ, in Phrýgia Pacatiána, sanctórum Mártyrum Demócriti, Secúndi et Dionýsii.
          In Sýria sanctórum trecentórum quinquagínta Monachórum Mártyrum, qui, ob defensiónem Sýnodi Chalcedonénsis, ab hæréticis sunt occísi.
          Ravénnæ tránsitus sancti Germáni, Antisiodorénsis Epíscopi, génere, fide, doctrína et miraculórum glória claríssimi; qui Británniam a Pelagianórum hærésibus pénitus liberávit.
          Tagáste, in Africa, sancti Firmi Epíscopi, confessiónis glória conspícui.
          Senis, in Túscia, natális beáti Ioánnis Columbíni, qui fuit Institútor Ordinis Iesuatórum, et sanctitáte ac miráculis cláruit.
      en2:
      - type: text
        text: |-
          The Thirty-First of July
      
          At Rome, the birthday of Saint Ignatius, Priest and Confessor, who was the Founder of the Society of Jesus, and was a man renowned for holiness and miracles, and most zealous for the spreading of the Catholic faith everywhere; whom Pope Pius XI, Supreme Pontiff, appointed the heavenly Patron of all Spiritual Exercises.
          At Milan, Saint Calimerius, Bishop and Martyr; who, in the persecution of Antoninus, was seized, run through with wounds, pierced through the neck with a sword, and hurled headlong into a well, and thus completed the course of his martyrdom.
          At Caesarea, in Mauretania, the passion of the blessed Fabius, Martyr, who, refusing to carry the standards of the governor, was first thrust into prison and detained there for several days; then, when he persevered unmoved in the confession of Christ, having been questioned once and again, was condemned to capital punishment by the judge.
          At Synnada, in Phrygia Pacatiana, the holy Martyrs Democritus, Secundus, and Dionysius.
          In Syria, the holy three hundred and fifty Monks, Martyrs, who were slain by heretics for defending the Council of Chalcedon.
          At Ravenna, the passing of Saint Germanus, Bishop of Auxerre, most renowned for birth, faith, learning, and the glory of miracles; who completely freed Britain from the heresies of the Pelagians.
          At Thagaste, in Africa, Saint Firmus, Bishop, conspicuous for the glory of his confession.
          At Siena, in Etruria, the birthday of the blessed John Colombini, who was the Founder of the Order of the Jesuates, and was renowned for holiness and miracles.
  psalm.pr-die-kal-ndas-dec-mbris-fc30d0aba7:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 30th day of November, were born into the better life:

          At Patrae, in the Peloponnesus, the holy Apostle Andrew. He preached the Gospel of Christ in Thrace and Scythia. He was arrested by the Proconsul Aegeas, and first imprisoned, then heavily flogged, and, lastly, crucified. He remained alive upon the cross through the second day, and taught the people. He besought the Lord not to suffer him to be taken down from the cross, and then a great light from heaven shone round about him, and when it faded away he gave up the ghost.
          At Rome, the holy martyrs Castulus and Euprepis.
          At Constantinople, the holy Virgin and martyr Maura.
          Likewise, the holy Virgin and martyr Justina.
          At Saintes, (in the sixth century,) holy Trojan, Bishop (of that see,) a man of great holiness, who, albeit he be buried in the earth, yet showeth by many works of power that he is alive in heaven.
          At Rome, (in the fifth century,) the holy Confessor Constantius, who manfully withstood the Pelagians, and bore much at their hands, the which contendings have gained him a place among the holy Confessors.
          In Palestine, (in the sixth century,) the holy Confessor Zosimus, who was eminent for holiness and miracles in the time of the Emperor Justin.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Decémbris

          Apud Patras, in Acháia, natális sancti Andréæ Apóstoli, qui in Thrácia et Scýthia sacrum Christi Evangélium prædicávit. Is, ab Ægéa Procónsule comprehénsus, primum in cárcere clausus est, deínde gravíssime cæsus, ad últimum suspénsus in cruce, in ea pópulum docens bíduo supervíxit; et, rogáto Dómino ne eum síneret de cruce depóni, circúmdatus est magno splendóre de cælo, et, abscedénte póstmodum lúmine, emísit spíritum.
          Romæ pássio sanctórum Cástuli et Euprépitis.
          Constantinópoli sanctæ Mauræ, Vírginis et Mártyris.
          Item sanctæ Iustínæ, Vírginis et Mártyris.
          Romæ sancti Constántii Confessóris, qui, fórtiter Pelagiánis resistens, ab eórum factióne pértulit multa, quæ illum sanctis Confessóribus sociárunt.
          Apud Sántonas, in Gállia, sancti Troiáni Epíscopi, magnæ sanctitátis viri, qui, sepúltus in terris, se in cælis vívere multis virtútibus maniféstat.
          In Palæstína beáti Zósimi Confessóris, qui, sub Iustíno Imperatóre, sanctitáte et miráculis fuit insígnis.
      en2:
      - type: text
        text: |-
          The Thirtieth of November
      
          At Patras, in Achaia, the birthday of Saint Andrew, Apostle, who preached the holy Gospel of Christ in Thrace and Scythia. Seized by the proconsul Aegeas, he was first shut up in prison, then most grievously beaten, and finally hung on the cross; teaching the people from it he survived for two days; and, having prayed to the Lord not to allow him to be taken down from the cross, he was surrounded by a great splendor from heaven, and, when the light afterwards departed, he gave up his spirit.
          At Rome, the passion of the holy Castulus and Eupretes.
          At Constantinople, Saint Maura, Virgin and Martyr.
          Likewise, Saint Justina, Virgin and Martyr.
          At Rome, Saint Constantius, Confessor, who, resolutely resisting the Pelagians, endured many things at the hands of their faction, which united him with the holy Confessors.
          Near Saintes, in Gaul, Saint Trojan, Bishop, a man of great holiness, who, buried in the earth, by many virtues makes manifest that he lives in heaven.
          In Palestine, the blessed Zosimus, Confessor, who, under the Emperor Justin, was distinguished for holiness and miracles.
  psalm.pr-die-kal-ndas-febru-rii-8bfbb16d87:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          At Turin, St. John Bosco, confessor and founder of the Salesians and the founder of the Institute of the Daughters of Mary Auxiliatrix, known for his zeal for souls and propagation of the Faith, whom Pope Pius XI enrolled amongst the saints.

          Upon the same 31st day of January, were born into a better life:
          At Rome, upon the way to Porto, the holy martyrs Cyrus and John, who suffered many torments for confessing Christ, and were beheaded, (in the fourth century.)
          At Alexandria, the holy martyr Metranus. In the time of the Emperor Decius he refused to utter unlawful words at the command of the Pagans. Wherefore they bruised his whole body with cudgels, pierced his face and eyes with sharp reeds, and continued to torture him while they cast him out of the city, where they stoned him to death, (in the year 249.) There, likewise, the holy martyrs Saturninus, Thyrsus, and Victor.
          In the same city, the holy martyrs Tharsicius, Zoticus, Cyriacus, and their Companions.
          At Cyzicus, on the Hellespont, the holy martyr Triphenes, who overcame diverse torments, and then gained the palm of martyrdom by being killed by a bull.
          At Modena, holy Geminian, (after the year 390,) Bishop of that see, famous for miracles.
          In the province of Milan, in the time of the Emperor Theodosius, (fifth century,) the holy Confessor Julius the Priest.
          At Rome, (in the year 410,) the holy widow Marcella, whose excellences have been written by blessed Jerome.
          At Rome, likewise, the blessed widow Louisa Albertoni, (in the year 1530,) of the 3rd Order of St. Francis, illustrious for her graces.
          Upon the same day is commemorated the translation of the holy Evangelist Mark, when (in the year 831) his sacred body was taken from Alexandria, in Egypt, already occupied by the Mohammedans, and brought to Venice, where it is honourably buried in the great cathedral church consecrated in his name.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Februárii

          Augústæ Taurinórum sancti Ioánnis Bosco, Confessóris, Societátis Salesiánæ ac Institúti Filiárum Maríæ Auxiliatrícis Fundatóris, animárum zelo et fídei propagándæ conspícui, quem Pius Papa Undécimus Sanctórum fastis adscrípsit.
          Romæ, via Portuénsi, sanctórum Mártyrum Cyri et Ioánnis, qui, pro confessióne Christi, post multa torménta, cápite truncáti sunt.
          Alexandríæ natális sancti Metráni Mártyris, qui, sub Décio Imperatóre, cum ad iussiónem Paganórum nollet ímpia verba proférre, hi totum eius corpus fústibus collisérunt, vultúmque et óculos præacútis cálamis terebrántes, cum cruciátibus expulérunt ipsum extra urbem, ibíque lapídibus oppréssum interemérunt.
          Ibídem sanctórum Mártyrum Saturníni, Thyrsi et Victóris.
          Item Alexandríæ sanctórum Mártyrum Tharsícii, Zótici, Cyríaci et Sociórum.
          Cýzici, in Hellespónto, sanctæ Tryphǽnæ Mártyris, quæ, plúrimis torméntis superátis, a tauro demum necáta, martýrii palmam proméruit.
          Mútinæ sancti Geminiáni Epíscopi, miraculórum glória conspícui.
          In Província Mediolanénsi sancti Iúlii, Presbýteri et Confessóris, témpore Imperatóris Theodósii.
          Neápoli sancti Francísci Xavérii-Maríæ Biánchi, Confessóris, Clérici Reguláris sancti Pauli, signis, donis cæléstibus et admirábili patiéntia illústris, quem Pius Papa Duodécimus ad suprémos honóres Sanctórum éxtulit.
          Romæ sanctæ Marcéllæ Víduæ, cuius præcláras laudes beátus Hierónymus scripsit.
          Item Romæ Beátæ Ludovícæ Albertóniæ, Víduæ Románæ, ex tértio Ordine sancti Francísci, virtútibus claræ.
          Eódem die Translátio sancti Marci Evangelístæ, cum sacrum eius corpus ex Alexandría, a bárbaris tunc occupáta, Venétias allátum, ibídem in maióri Ecclésia, eius nómine consecráta, honorificentíssime cónditum fuit.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of February
      
          At Augusta Taurinorum, Saint John Bosco, Confessor, Founder of the Salesian Society and of the Institute of the Daughters of Mary Help of Christians, renowned for his zeal for souls and for spreading the faith, whom Pope Pius XI enrolled in the calendar of the Saints.
          At Rome, on the Portuensian Way, the holy Martyrs Cyrus and John, who, for confessing Christ, were beheaded after many torments.
          At Alexandria, the birthday of Saint Metras, Martyr, who, under the Emperor Decius, when he refused to utter impious words at the command of the pagans, had his whole body beaten with clubs, his face and eyes pierced with sharp reeds, and was driven out of the city with torments; and there, crushed with stones, was slain.
          In the same city, the holy Martyrs Saturninus, Thyrsus, and Victor.
          Likewise at Alexandria, the holy Martyrs Tharsicius, Zoticus, Cyriacus, and their companions.
          At Cyzicus, in the Hellespont, Saint Tryphaena, Martyr, who, having endured very many torments, was at last slain by a bull and thereby merited the palm of martyrdom.
          At Modena, Saint Geminianus, Bishop, renowned for the glory of miracles.
          In the Province of Milan, Saint Julius, Priest and Confessor, in the time of the Emperor Theodosius.
          At Naples, Saint Francis Xavier-Mary Bianchi, Confessor, a Cleric Regular of Saint Paul, illustrious for signs, heavenly gifts, and admirable patience, whom Pope Pius XII raised to the supreme honors of the Saints.
          At Rome, Saint Marcella, Widow, whose distinguished praises Saint Jerome wrote.
          Likewise at Rome, Blessed Ludovica Albertoni, Roman Widow, of the Third Order of Saint Francis, renowned for her virtues.
          On the same day, the Translation of Saint Mark the Evangelist, when his sacred body was brought from Alexandria, then occupied by barbarians, to Venice, and there laid to rest with the greatest honor in the principal church consecrated in his name.
  psalm.pr-die-kal-ndas-i-lii-72ed3c76fa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we make commemoration of the holy Apostle Paul.
          Upon the same 30th day of June, were born into the better life:

          At Limoges, in Gaul, [in the first century,] holy Martial, first Bishop [of that see,] and the two Priests Alpinian and Austriclinian, whose lives shone brightly with the fame of miracles.
          On the same day, [at Talca, in Spain,] the holy [martyrs, the] Priest Caius and the Sub-Deacon Leo.
          At Alexandria, under the Emperor Severus, the holy martyr Basilides. He led the holy Virgin Potamicena to execution, and while doing so, protected her from the insults of some lewd man, and he received a reward from her for this reverential service. Three days afterwards she appeared to him and put a crown upon his head, by the which vision she not only turned him to Christ, but also by her prayers, while he fought his short fight, she made him a glorious martyr.
          At Rome, holy Lucina, a disciple of the Apostles, who contributed of her goods to the necessities of the Saints, visited the Christians who were kept bound in prison, and ministered to the burial of the martyrs, beside whom she was buried in a vault which she made for herself.
          Also at Rome, [in the fourth century,] the holy Virgin Aemiliana.
          At Viviers, the holy Priest and Confessor Ostian.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Iúlii

          Commemorátio sancti Pauli Apóstoli.
          Romæ sanctæ Lucínæ, Apostolórum discípulæ, quæ, de facultátibus suis commúnicans Sanctórum necessitátibus, Christiános in cárcere detentos visitábat, ac sepultúræ Mártyrum inserviébat; iuxta quos et ipsa, in crypta a se constrúcta, sepúlta est.
          Item Romæ sanctæ Æmiliánæ Mártyris.
          Ipso die sanctórum Mártyrum Caii Presbýteri, et Leónis Subdiáconi.
          Alexandríæ pássio sancti Basílidis, qui, sub Sévero Imperatóre, cum sanctam Potamiœ́nam Virginem, quam ad supplícium ducébat, ab impudicórum hóminum petulántia tutátus esset, religiósi offícii mercédem ab ea recépit; nam ipsa, post tríduum illi appárens et eius cápiti corónam impónens, non tantum convértit eum ad Christum, sed étiam, brevi agóne certántem, suis précibus Mártyrem gloriósum effécit.
          Lemóvicis, in Aquitánia, sancti Martiális Epíscopi, cum duóbus Presbýteris Alpiniáno et Austricliniáno; quorum vita signis miraculórum ádmodum effúlsit.
          In território Vivariénsi, in Gálliis, sancti Ostiáni, Presbýteri et Confessóris.
          Saánicæ, in território Vicéntino, sancti Theobáldi, Presbýteri et Eremítæ, ex Campániæ Gállicæ Comítibus; quem Alexánder Papa Tértius, ob sanctitátis et miraculórum famam, Sanctórum cánoni adiúnxit.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of July
      
          The Commemoration of Saint Paul the Apostle.
          At Rome, Saint Lucina, disciple of the Apostles, who, sharing from her own resources in the needs of the Saints, used to visit Christians held in prison and attend to the burial of the Martyrs; near whom she herself was also buried, in a crypt she had built.
          Likewise at Rome, Saint Aemiliana, Martyr.
          On the same day, the holy Martyrs Gaius, Priest, and Leo, Subdeacon.
          At Alexandria, the passion of Saint Basilides, who, under the Emperor Severus, having protected the holy Virgin Potamiaena, whom he was escorting to execution, from the insolence of impure men, received from her the reward of his dutiful service; for she, appearing to him after three days and placing a crown upon his head, not only converted him to Christ, but also, as he strove in a brief contest, made him by her prayers a glorious Martyr.
          At Limoges, in Aquitaine, Saint Martial, Bishop, with his two Priests Alpinian and Austriclinianus; whose life shone forth abundantly with the signs of miracles.
          In the territory of Viviers, in the Gauls, Saint Ostianus, Priest and Confessor.
          At Sanico, in the territory of Vicenza, Saint Theobald, Priest and Hermit, of the Counts of Champagne; whom Pope Alexander III, on account of his renown for holiness and miracles, added to the canon of the Saints.
  psalm.pr-die-kal-ndas-i-nii-4825f0a0fb:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 31st day of May, were born into the better life:

          At Brescia, the holy Virgin Angela Merici, Foundress of the religious Sisters of St. Ursula, to have for their principal work the leading of young maidens in the ways of the Lord. Of her mention is made upon the 27th day of January.
          At Rome, the holy Virgin Petronilla, daughter of the blessed Apostle Peter. She looked down upon an offer of marriage from the noble Flaccus, and took three days to consider the matter, the which time she spent in fasting and prayer, and upon the third day, immediately after receiving the Sacrament of Christ, she gave up the ghost.
          At Aquileia, the holy brothers Cantius and Cantian, and their sister Cantianilla, all martyrs of the noble family of the Anicii, who, along with their schoolmaster Protus, were beheaded under the Emperors reigned A.D. 269-274. Diocletian and Maximian on account of their firmness in the Christian faith.
          At Torre, in Sardinia, [in the persecution under the Emperor Hadrian,] the holy martyr Crescentian.
          At Comana, in Pontus, the holy soldier Hermias. He was delivered by God's help from countless and savage tortures, under the Emperor Antoninus. He converted his executioner to Christ, and made him a sharer in the crown of his own martyrdom, but he himself was the first to grasp it, by being beheaded.
          At Verona, [in the sixth century,] the holy Lupicinus, Bishop [of that see.]
          At Rome, the holy Deacon Paschasius, a Confessor of whom doth make mention the blessed Pope Gregory [the Great.]
      la:
      - type: text
        text: |-
          Prídie Kaléndas Iúnii

          Festum beátæ Maríæ Vírginis Regínæ.
          Romæ sanctæ Petroníllæ Vírginis, fíliæ beáti Petri Apóstoli, quæ, coniúgium nóbilis viri Flacci spernens, et, accéptis triduánis ad deliberándum indúciis, ínterim ieiúniis et oratiónibus vacans, tértia die, mox ut Christi Sacraméntum accépit, emísit spíritum.
          Aquiléiæ sanctórum Mártyrum fratrum Cántii, Cantiáni et Cantianíllæ, qui, cum essent ex illústri Aniciórum progénie, sub Diocletiáno et Maximiáno Imperatóribus, ob Christiánæ fídei constántiam, una cum pædagógo suo Proto, cápite plexi sunt.
          Túrribus, in Sardínia, sancti Crescentiáni Mártyris.
          Apud Comános, in Ponto, sancti Hérmiæ mílitis, qui, sub Antoníno Imperatóre, de innúmeris et sævíssimis torméntis divína ope liberátus, carníficem convértit ad Christum, et eiúsdem martýrii corónæ partícipem fecit; quam tamen ipse primus, gládio obtruncátus, accépit.
          Verónæ sancti Lupicíni Epíscopi.
          Romæ sancti Paschásii, Diáconi et Confessóris, cuius méminit beátus Gregórius Papa.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of June
      
          The Feast of Blessed Mary, Virgin, Queen.
          At Rome, Saint Petronilla, Virgin, daughter of the blessed Apostle Peter, who, spurning the marriage of the nobleman Flaccus and having obtained a three-day respite for deliberation, meanwhile devoting herself to fasting and prayers, on the third day, as soon as she had received the Sacrament of Christ, gave up her spirit.
          At Aquileia, the holy Martyr brothers Cantius, Cantianus, and Cantianilla, who, being of the illustrious line of the Anicii, were beheaded under the Emperors Diocletian and Maximian for their constancy in the Christian faith, together with their tutor Protus.
          At Turris, in Sardinia, Saint Crescentianus, Martyr.
          At Comana, in Pontus, Saint Hermias, soldier, who, under the Emperor Antoninus, being freed by divine power from countless and most savage torments, converted his executioner to Christ and made him a sharer in the same crown of martyrdom; which, however, he himself first received, being cut down by the sword.
          At Verona, Saint Lupicinus, Bishop.
          At Rome, Saint Paschasius, Deacon and Confessor, of whom the blessed Pope Gregory makes mention.
  psalm.pr-die-kal-ndas-ianu-rii-1b88c605b1:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 31st day of December were born into the better life:

          At Rome, holy Pope Silvester I who (was said by tradition to have) baptized the Emperor Constantine the Great, confirmed the decrees of the Council of Nicea, wrought many other holy works, and fell asleep in peace (in the year 335.)
          Likewise at Rome, at the cemetery of Priscilla upon the Salarian Way, the holy martyrs Donata, Paulina, Rustica, Nominanda, Serotina, Hilaria, and their companions.
          At Sens, blessed Sabinian, (first) bishop of that see, and Potentian, who were sent thither to preach by the Roman Pontiff, and adorned that city by their last testimony. (He was the Apostle of Sens.)
          There also in the persecution under the Emperor Aurelian the holy virgin and martyr Columba, who conquered fire and was slain with the sword (third century.)
          At Rhessara, the holy exorcist Hermes.
          At Catania, in Sicily, the holy martyrs Stephen, Pontian, Attalus, Fabian, Cornelius, Sextus, Flos, Quintian, Minervinus and Simplician.
          On the same day holy Zoticus, a Roman priest, who went to Constantinople, and busied himself with the care of orphans.
          At Ravenna, the holy confessor the priest Barbatian.
          On the same day holy Melania, the younger, who left Rome along with her husband Pinian (son of the Prefect of Rome), and went to Jerusalem where she became a nun, and he a monk and both died holy deaths. (She was born in 383, married 410, and died in 439.)
      la:
      - type: text
        text: |-
          Prídie Kaléndas Ianuárii

          Romæ natális sancti Silvéstri Primi, Papæ et Confessóris; qui Magnum Constantínum Imperatórem baptizávit, et Nicǽnam confirmávit Sýnodum, ac, multis áliis rebus sanctíssime gestis, quiévit in pace.
          Item Romæ, via Salária, in cœmetério Priscíllæ, sanctárum Mártyrum Donátæ, Paulínæ, Rústicæ, Nominándæ, Serótinæ, Hiláriæ et Sociárum.
          Apud Sénonas beatórum Sabiniáni Epíscopi, et Potentiáni; qui, a Pontífice Románo illuc ad prædicándum dirécti, confessiónis suæ martýrio eándem metrópolim illustrárunt.
          Cátanæ, in Sicília, pássio sanctórum Stéphani, Pontiáni, Attali, Fabiáni, Cornélii, Sexti, Floris, Quinctiáni, Minervíni et Simpliciáni.
          Apud Sénonas sanctæ Colúmbæ, Vírginis et Mártyris; quæ, igne superáto, in persecutióne Aureliáni Imperatóris, gládio cæsa est.
          Eódem die sancti Zótici, Presbýteri Románi; qui, Constantinópolim proféctus, illic alendórum orphanórum curam suscépit.
          Ravénnæ sancti Barbatiáni, Presbýteri et Confessóris.
          In pago Lalovésci, diœcésis Viennénsis, in Delphinátu, deposítio sancti Ioánnis-Francísci Regis, Sacerdótis e Societáte Iesu et Confessóris, exímiæ in salúte animárum procuránda caritátis et patiéntiæ viri; quem Clemens Papa Duodécimus in Sanctórum cánonem rétulit.
          Rhætiáriæ sancti Hermétis Exorcístæ.
          Lutétiæ Parisiórum sanctæ Catharínæ Labouré, Vírginis, e Societáte Puellárum Caritátis, quæ a Deípara Immaculáta singulári manifestatióne Sacri Numismátis donáta, virtútibus et miráculis insígnis éxstitit, et a Pio Papa Duodécimo in sanctárum Vírginum númerum reláta est.
          Eódem die sanctæ Melániæ iunióris, quæ, cum viro suo Piniáno, ex urbe Roma discéssit, et Hierosólymam profécta est; ibíque ipsa inter féminas Deo sacras et vir inter Mónachos religiósam vitam exércuit, et ambo sancto fine quievérunt.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of January
      
          At Rome, the birthday of Saint Sylvester I, Pope and Confessor; who baptized the Emperor Constantine the Great, confirmed the Council of Nicaea, and, after many other most holy deeds, rested in peace.
          Likewise at Rome, on the Salarian Way, in the cemetery of Priscilla, the holy Martyrs Donata, Paulina, Rustica, Nominanda, Serotina, Hilaria, and their companions.
          Near Sens, the blessed Sabinianus, Bishop, and Potentianus; who, sent thither by the Bishop of Rome to preach, glorified that same metropolis by the martyrdom of their confession.
          At Catania, in Sicily, the passion of the holy Stephan, Pontianus, Attalus, Fabianus, Cornelius, Sextus, Florus, Quinctianus, Minervinus, and Simplicianus.
          Near Sens, Saint Columba, Virgin and Martyr; who, having passed unharmed through fire, was slain by the sword in the persecution of the Emperor Aurelian.
          On the same day, Saint Zoticus, Priest of Rome; who, having gone to Constantinople, undertook there the care of feeding orphans.
          At Ravenna, Saint Barbatianus, Priest and Confessor.
          In the village of Lalouvesc, in the diocese of Vienne, in Dauphiné, the repose of Saint John-Francis Regis, Priest of the Society of Jesus and Confessor, a man of extraordinary charity and patience in procuring the salvation of souls; whom Pope Clement XII enrolled in the canon of the Saints.
          At Rhaetiarum, Saint Hermes, Exorcist.
          At Paris, Saint Catherine Labouré, Virgin, of the Society of the Daughters of Charity, who was granted by the Immaculate Mother of God a singular manifestation of the Sacred Medal, and was outstanding in virtues and miracles, and was enrolled by Pope Pius XII in the number of holy Virgins.
          On the same day, Saint Melania the Younger, who, together with her husband Pinianus, departed from the city of Rome and journeyed to Jerusalem; where she herself led a religious life among women consecrated to God and her husband among Monks, and both rested in a holy end.
  psalm.pr-die-kal-ndas-m-rtii-ff2f7935aa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 28th day of February, were born into the better life:

          At Rome, the holy martyrs Macarius, Rufinus, Justus, and Theophilus.
          At Alexandria, the holy martyrs Caerealis, Pupulus, Caius, and Serapion.
          Likewise at Alexandria are commemorated the holy Priests, Deacons, and many others who cheerfully met death in ministering to the sick in the great plague which devastated that city, [in the third century,] in the time of the Emperor Valerian, and whom the godly reverence of the faithful hath been used to honour as martyrs.
          In the Jura mountains, toward Lyon, [in 460,] the holy Abbot [of Condat,] Romanus, who was the first to live there as a hermit, and becoming famous for many graces and miracles, became also the father of many monks.
          At Pavia is commemorated the translation of the body of holy Augustine, Bishop of Hippo, which was brought [in the year 722] from the island of Sardinia by the care of Luitprand, King of the Lombards.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Mártii

          Romæ natális sanctórum Mártyrum Macárii, Rufíni, Iusti et Theóphili.
          Alexandríæ pássio sanctórum Cæreális, Púpuli, Caii et Serapiónis.
          Ibídem commemorátio sanctórum Presbyterórum, Diaconórum et aliórum plurimórum; qui, témpore Valeriáni Imperatóris, cum pestis sævíssima grassarétur, morbo laborántibus ministrántes, libentíssime mortem oppetiére, et quos velut Mártyres religiósa piórum fides venerári consuévit.
          Romæ sancti Hílari, Papæ et Confessóris.
          In território Lugdunénsi, locis Iurénsibus, deposítio sancti Románi Abbátis, qui primus illic eremíticam vitam duxit, et, multis virtútibus ac miráculis clarus, plurimórum póstea Pater éxstitit Monachórum.
          Pápiæ Translátio córporis sancti Augustíni Epíscopi, Confessóris et Ecclésiæ Doctóris, ex Sardínia ínsula, ópera Luitprándi, Regis Longobardórum.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of March
      
          At Rome, the birthday of the holy Martyrs Macarius, Rufinus, Justus, and Theophilus.
          At Alexandria, the passion of the holy Cærealis, Pupulus, Gaius, and Serapion.
          In the same city, the commemoration of holy Priests, Deacons, and many others; who, in the time of the Emperor Valerian, when a most savage pestilence was raging, ministering to those afflicted by the disease, most willingly went to their death, and whom the devout faith of the pious has been accustomed to venerate as Martyrs.
          At Rome, Saint Hilarus, Pope and Confessor.
          In the territory of Lyons, in the Jurassian places, the repose of Saint Romanus, Abbot, who was the first there to lead the eremitic life, and, renowned for many virtues and miracles, afterward became Father of many Monks.
          At Pavia, the Translation of the body of Saint Augustine, Bishop, Confessor, and Doctor of the Church, from the island of Sardinia, through the efforts of Liutprand, King of the Lombards.
  psalm.pr-die-kal-ndas-maii-809abcac4f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 30th day of April, were born into the better life:

          At Rome, [in the year 1380,] the holy Virgin Catherine of Siena, of the order of St Dominic, famous for her life and miracles, whose name Pius II enrolled among those of the holy virgins, and whose feast we keep upon the 5th day of May.
          At Lambesa, in Numidia, the holy martyrs the Reader Marian, and the Deacon James. Marian had already triumphed over persecution by confessing Christ, under the Emperor Decius, but was arrested again along with his illustrious companion. After dire torments both were wondrously strengthened by revelations from God, and were at last beheaded, along with many others, [in the year 260.]
          At Saintes, [in the first century,] the blessed martyr Eutropius, Bishop of that see, who was consecrated a Bishop by holy Clement and sent into Gaul, where he long preached, and then died a conqueror, having his head broken in for confessing Christ.
          At Cordova, the holy martyrs the Priest Amator, the Monk Peter, and Lewis, [in the year 855.]
          At Novara, [in the fourth century,] the holy martyrs the Priest Lawrence, and the boys whom he had taken as pupils.
          At Alexandria, the holy martyrs the Priest Aphrodisius, and thirty others.
          At Ephesus, the holy martyr Maximus, who was crowned in the persecution under the Emperor Decius.
          At Fermo, in Picenum, the holy Virgin and martyr Sophia.
          At Naples, in Campania, [in the fifth century,] holy Severus, Bishop of that see, who, amid other wondrous works, did on an occasion raise a dead man from the grave to convict of untruthfulness the false creditor of a widow and orphans.
          At Evorea, in Epirus, holy Donatus, Bishop of that see, who was distinguished for his eminent holiness in the time of the Emperor Theodosius.
          At London, in England, holy Erconwald, [in the year 698,] Bishop of that see, [from the year 665 for eleven years. He was Abbot of Chertsey, and founded both that monastery and one for women at Barking, which was governed by his sister St. Edilburga,] who was famous for many miracles, and whose feast we keep upon the 14th day of November.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Maii

          Sanctæ Catharínæ Senénsis Vírginis, ex tértio Ordine sancti Domínici, quæ ad cæléstem Sponsum transívit prídie huius diéi.
          Apud Sántonas, in Gállia, beáti Eutrópii, Epíscopi et Mártyris, qui, a sancto Cleménte Papa, ordinis pontificális grátia consecrátus, in Gálliam diréctus est, ibíque, perácta diu prædicatióne, tandem, ob Christi testimónium, collíso cápite, victor occúbuit.
          Córdubæ, in Hispánia, sanctórum Mártyrum Amatóris Presbýteri, Petri Mónachi, et Ludovíci.
          Nováriæ sancti Lauréntii Presbýteri, et puerórum Mártyrum, quos ille suscéperat educándos.
          Alexandríæ sanctórum Mártyrum Aphrodísii Presbýteri, et aliórum trigínta.
          Lambésæ, in Numídia, natális sanctórum Mártyrum Mariáni Lectóris, et Iacóbi Diáconi. Horum prior, cum infestatiónes iamprídem Deciánæ persecutiónis in confessióne Christi vicísset, íterum cum claríssimo colléga tentus est; et ambo, post dira et exquisíta supplícia, mirabíliter divínis revelatiónibus secúndo confortáti, novíssime, cum multis áliis, gládio consummáti sunt.
          Ephesi sancti Máximi Mártyris, qui in persecutióne Décii coronátus est.
          Firmi, in Picéno, sanctæ Sophíæ, Vírginis et Mártyris.
          Evóreæ, in Epíro, sancti Donáti Epíscopi, qui, témpore Theodósii Imperatóris, exímia sanctitáte refúlsit.
          Neápoli, in Campánia, sancti Pompónii Epíscopi.
          Londíni, in Anglia, sancti Erconváldi Epíscopi, qui multis miráculis cláruit.
          Chérii, apud Augústam Taurinórum, sancti Ioséphi Benedícti Cottoléngo, Confessóris, Parvæ Domus a Divína Providéntia Fundatóris, summa in Deum confidéntia et caritáte in páuperes insígnis, quem Pius Papa Undécimus Sanctórum fastis adscrípsit.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of May
      
          Saint Catherine of Siena, Virgin, of the Third Order of Saint Dominic, who passed to her heavenly Spouse on the day before this feast.
          Near Saintes, in Gaul, Blessed Eutropius, Bishop and Martyr, who, consecrated with the grace of the pontifical order by the holy Pope Clement, was sent to Gaul, and there, after long preaching, at last fell victoriously for the testimony of Christ, his head being crushed.
          At Córdoba, in Spain, the holy Martyrs Amator, Priest, Peter, Monk, and Ludovicus.
          At Novara, Saint Laurence, Priest, and the boy Martyrs whom he had taken to educate.
          At Alexandria, the holy Martyrs Aphrodisius, Priest, and thirty others.
          At Lambesa, in Numidia, the birthday of the holy Martyrs Marianus, Reader, and James, Deacon. The former, having already overcome the harassments of the Decian persecution by confessing Christ, was arrested again with his most illustrious companion; and both, after dire and exquisite torments, wondrously strengthened a second time by divine revelations, were at last consummated by the sword, together with many others.
          At Ephesus, Saint Maximus, Martyr, who was crowned in the persecution of Decius.
          At Fermo, in Picenum, Saint Sophia, Virgin and Martyr.
          At Evoraea, in Epirus, Saint Donatus, Bishop, who in the time of the Emperor Theodosius shone with singular holiness.
          At Naples, in Campania, Saint Pomponius, Bishop.
          At London, in England, Saint Erconwald, Bishop, who was renowned for many miracles.
          At Chieri, near Augusta Taurinorum, Saint Joseph Benedict Cottolengo, Confessor, Founder of the Little House of Divine Providence, outstanding for his supreme trust in God and charity toward the poor, whom Pope Pius XI enrolled in the calendar of the Saints.
  psalm.pr-die-kal-ndas-nov-mbris-6279db5697:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Eve of All the Saints.
          Upon the same day, were born into the better life:

          At Rome, the blessed Deacon Nemesius, and the Virgin Lucilla his daughter for as much as it was impossible to make them swerve from their faith in Christ, they were beheaded by order of the Emperor Valerian upon the 25th day of August.
          Their bodies were buried by blessed Pope Stephen; then, upon the 31st day of October, were laid in a more honourable place upon the Appian Way by blessed Xystus. Gregory V moved them to the Deaconry of St. Mary the New, along with those of the holy martyrs Symphronius, the Tribune Olympius, Exuperia his wife, and Theodulus his son, who had all been converted by the said Symphronius, and baptized by the said holy Stephen, and crowned with martyrdom. The bodies of these Saints were found in the church aforesaid in the time of the Supreme Pontiff Gregory XIII, and honourably reburied under the altar there upon the 8th day of December.
          The holy martyrs Ampliatus, Urban, and Narcissus, of whom mention is made by holy Paul, writing unto the Romans, and who were slain by the Jews and Gentiles for Christ's Gospel's sake.
          At Saint-Quentin, in Gaul, holy Quentin, a Roman citizen of senatorial rank, who suffered martyrdom under the Emperor Maximian. His body was shown by the revelation of an Angel after fifty-five years, and was found incorrupt.
          At Constantinople, the holy Archbishop Stachys, who was ordained by the blessed Apostle Andrew as the first Bishop of that city.
          At Milan, (in the seventh century,) the holy Confessor Antoninus, Bishop (of that see.)
          At Ratisbon, (in the tenth century,) holy Wolfgang, Bishop (of that see.)
      la:
      - type: text
        text: |-
          Prídie Kaléndas Novémbris

          Romæ sanctórum Ampliáti, Urbáni et Narcíssi, quorum méminit sanctus Paulus ad Romános scribens, qui, ob Evangélium Christi, a Iudǽis et Gentílibus cæsi sunt.
          Constantinópoli sancti Stachis Epíscopi, qui a beáto Andréa Apóstolo primus eiúsdem civitátis Epíscopus ordinátus est.
          Apud Augústam Veromanduórum, in Gállia, sancti Quinctíni, civis Románi et ex órdine Senatório viri, qui sub Maximiáno Imperatóre martýrium passus est; cuius corpus post annos quinquagínta quinque, revelánte Angelo, invéntum est incorrúptum.
          Medioláni sancti Antoníni, Epíscopi et Confessóris.
          Ratisbónæ, in Bavária, sancti Wolfgángi Epíscopi.
          Palmæ, in Maiórca ínsula, sancti Alfónsi Rodríguez, Coadiutóris temporális formáti e Societáte Iesu et Confessóris, humilitáte ac iugi mortificatiónis stúdio insígnis; quem Leo Décimus tértius, Póntifex Máximus, Sanctórum fastis adscrípsit.
          Romæ Translátio beáti Nemésii Diáconi, et fíliæ Lucíllæ Vírginis, qui octávo Kaléndas Septémbris decolláti sunt.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of November
      
          At Rome, the holy Ampliatus, Urbanus, and Narcissus, of whom Saint Paul makes mention in his letter to the Romans, who were slain by Jews and Gentiles on account of the Gospel of Christ.
          At Constantinople, Saint Stachys, Bishop, who was ordained the first Bishop of that city by the blessed Apostle Andrew.
          At Augusta Veromanduorum, in Gaul, Saint Quintinus, a Roman citizen and a man of senatorial rank, who suffered martyrdom under the Emperor Maximian; whose body, after fifty-five years, was found incorrupt, an Angel having revealed its location.
          At Milan, Saint Antoninus, Bishop and Confessor.
          At Regensburg, in Bavaria, Saint Wolfgang, Bishop.
          At Palma, on the island of Majorca, Saint Alphonsus Rodriguez, formed Temporal Coadjutor of the Society of Jesus and Confessor, outstanding for humility and the constant practice of mortification; whom Pope Leo XIII enrolled in the calendar of the Saints.
          At Rome, the Translation of Blessed Nemesius, Deacon, and of his daughter Lucilla, Virgin, who were beheaded on the twenty-fifth of August.
  psalm.pr-die-kal-ndas-oct-bris-85b1e8cb36:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 30th day of September, was born into the better life:

          In Bethlehem of Judea, the holy Priest Jerome, Doctor of the Church, a man most deeply read in all letters, and a follower of approved monks. With the sword of his teaching he transfixed many monsters of heresy. He fell asleep in peace, quite broken down with old age, and was buried hard by the Lord's birthplace, but his body hath since been brought to Rome, where it is laid in the Church of St. Mary the Greater.
          Upon the same day, the holy martyr Leopardus, one of the household of the Emperor Julian the Apostate. He was beheaded at Rome, but his body hath since been brought to Aachen.
          At Solothurn, in Switzerland, the holy martyrs Victor and Ursus, of the glorious Theban Legion. They were first put to direful tortures under the Emperor Maximian, but light broke from heaven upon them, the servants of the Emperor fell to the earth, and they were delivered then they were cast into the fire, but it took no hold upon them and lastly they were slain with the sword.
          At Piacenza, the holy martyr Antonine, belonging to the same Theban Legion.
          Upon the same day, holy Bishop Gregory, (called the Apostle and Illuminator) of the Great Armenia, who suffered many things under the Emperor Diocletian, but at length fell asleep in peace.
          At Canterbury, in England, the holy Confessor Honorius, Bishop (of that see, wherein he succeeded holy Justus. He was consecrated by holy Paulinus, Archbishop of York. For more than thirty years he labored for the glory of God, and saw with joy the faith of Christ extended daily. He died in the year 653, and was succeeded in his see by Deusdedit.)
          At Rome, holy Francis de Borgia, of the Society of Jesus, whose feast we keep upon the 1st day of October.
          Likewise at Rome, (in the second century,) the holy widow Sophia, mother of the holy Virgins Faith, Hope, and Charity, (all martyrs.)
      la:
      - type: text
        text: |-
          Prídie Kaléndas Octóbris

          In Béthlehem Iudæ deposítio sancti Hierónymi Presbýteri, Confessóris et Ecclésiæ Doctóris, qui, ómnium stúdia litterárum adéptus ac probatórum Monachórum imitátor factus, multa hǽresum monstra gládio suæ doctrínæ confódit; demum, cum ad decrépitam usque vixísset ætátem, in pace quiévit, sepultúsque est ad Præsépe Dómini. Eius corpus, póstea Romam delátum, in Basílica sanctæ Maríæ Maióris cónditum fuit.
          Romæ natális sancti Francísci Bórgiæ, Sacerdótis et Confessóris; qui Præpósitus Generális fuit Societátis Iesu, ac vitæ asperitáte, oratiónis dono, abdicátis sǽculi et recusátis Ecclésiæ dignitátibus, vir memorábilis éxstitit. Ipsíus autem festum sexto Idus Octóbris celebrátur.
          Lexóvii, in Gállia, item natális sanctæ Terésiæ a Iesu Infánte, ex Ordine Carmelitárum Excalceatórum; quam, vitæ innocéntia et simplicitáte claríssimam, Pius Undécimus, Póntifex Máximus, sanctárum Vírginum albo adscrípsit, peculiárem ómnium Missiónum Patrónam declarávit, eiúsque festum quinto Nonas Octóbris recoléndum esse decrévit.
          Romæ sancti Leopárdi Mártyris, qui ex Iuliáni Apóstatæ domésticis fuit; cui caput amputátum est, et corpus eius Aquisgránum póstea translátum.
          Solodóri, in Gállia, pássio sanctórum Mártyrum Victóris et Ursi, ex gloriósa legióne Thebæórum, qui, sub Maximiáno Imperatóre, primum diris supplíciis cruciáti, sed, cælésti super eos lúmine coruscánte, ruéntibus in terram minístris, erépti; deínde in ignem missi, sed in nullo pénitus læsi; novíssime gládio consummáti sunt.
          Placéntiæ sancti Antoníni Mártyris, ex eádem legióne.
          Eódem die sancti Gregórii, Epíscopi magnæ Arméniæ, qui, sub Diocletiáno, multa passus est; ac tandem, Constantíni Magni Imperatóris témpore, in pace quiévit.
          Cantuáriæ, in Anglia, sancti Honórii, Epíscopi et Confessóris.
          Romæ sanctæ Sophíæ Víduæ, matris sanctárum Vírginum et Mártyrum Fídei, Spei et Caritátis.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of October
      
          At Bethlehem of Judea, the repose of Saint Jerome, Priest, Confessor, and Doctor of the Church, who, having mastered every branch of learning and become an imitator of approved Monks, pierced many monsters of heresy with the sword of his doctrine; at last, having lived to extreme old age, he rested in peace and was buried near the Manger of the Lord. His body was afterward brought to Rome and enshrined in the Basilica of Saint Mary Major.
          At Rome, the birthday of Saint Francis Borgia, Priest and Confessor; who was Superior General of the Society of Jesus, and was a memorable man for the austerity of his life, the gift of prayer, and for having renounced and refused the dignities of the world and of the Church. His feast is celebrated on the tenth of October.
          At Lisieux, in Gaul, likewise the birthday of Saint Thérèse of the Child Jesus, of the Order of Discalced Carmelites; whom, most renowned for the innocence and simplicity of her life, Pope Pius XI enrolled in the register of holy Virgins, declared her the special Patroness of all the Missions, and decreed that her feast should be kept on the third of October.
          At Rome, Saint Leopardus, Martyr, who was of the household of Julian the Apostate; his head was cut off, and his body was afterward translated to Aachen.
          At Solothurn, in Gaul, the passion of the holy Martyrs Victor and Ursus, of the glorious Theban Legion, who, under the Emperor Maximian, were first tortured with dire torments, but, as a heavenly light flashed above them and the executioners fell to the ground, were rescued; then cast into fire, yet not harmed in the least; and finally consummated by the sword.
          At Piacenza, Saint Antoninus, Martyr, of the same legion.
          On the same day, Saint Gregory, Bishop of Greater Armenia, who under Diocletian suffered greatly, and at last rested in peace in the time of the Emperor Constantine the Great.
          At Canterbury, in England, Saint Honorius, Bishop and Confessor.
          At Rome, Saint Sophia, Widow, mother of the holy Virgins and Martyrs Faith, Hope, and Charity.
  psalm.pr-die-kal-ndas-sept-mbris-b7164906f5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 31 st day of August, were born into the better life:

          In England, [in the year 651,] holy Aidan, Bishop of Lindisfarne. Holy Cuthbert, who was then a shepherd lad, saw the soul of Aidan carried up into heaven, and he thereupon left his sheep and became a monk.
          At Cardona, in Spain, [in the year 1240,] the holy Confessor Cardinal Raymond, surnamed the Unborn, of the Order of Blessed Mary of Ransom for the Redemption of Prisoners, a man famous for the holiness of his life, and for his wondrous works, whose feast we keep upon the first day of September.
          At Trier, [in the year 358,] holy Paulinus, Bishop [of that see.] In the time of the persecution under the Arians he was exiled by Constantius the Arian Emperor on account of his Catholic belief, and when he had been wearied out by changing the places of his exile, even beyond the bounds of Christendom, he at length died in Phrygia, and received a crown from the Lord in reward of his blessed sufferings.
          Likewise the holy martyrs Robustian and Mark.
          At Trasacco, on the Lake of Celano, the holy martyrs Caesidius the Priest and his Companions, who were crowned with martyrdom in the persecution under the Emperor Maximin.
          At Cassarea, in Cappadocia, [in the third century,] holy Theodotus, Rufina, and Ammia. Theodotus and Rufina were the father and mother of the holy martyr Mamas. Rufina gave him birth in prison, and Ammia was his nurse.
          At Athens, [in the second century,] the holy Aristides, a man illustrious for his faith and wisdom, who offered to the Emperor Hadrian a book upon the Christian religion, containing an exposition of our doctrine, and delivered a most able discourse in the presence of the said Emperor, to prove that Christ Jesus is the only God.
          At Auxerre, [in the sixth century,] the holy Confessor Optatus, Bishop [of that see.]
          At Nusco, [in the year 1093,] holy Amatus, Bishop [of that see.]
          At Monte Senario, hard by Florence, [in the year 1257,] the blessed Confessor Bonajuncta [Manetti,] one of the Seven Founders of the Order of Servants of the Blessed Virgin Mary, who gave up the ghost into the Lord's hands as he was discoursing to his brethren concerning the same Lord's Passion.
      la:
      - type: text
        text: |-
          Prídie Kaléndas Septémbris

          Sancti Raymúndi Nonnáti, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, Cardinális et Confessóris; cuius dies natális séptimo Kaléndas Septémbris recólitur.
          Apud montem Senárium, in Etrúria, natális sancti Bonaiúnctæ Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, de Passióne Domínica ad fratres verba fáciens, in manus Dómini trádidit spíritum. Ipsíus autem ac Sociórum festum prídie Idus Februárii celebrátur.
          Tréviris item natális sancti Paulíni Epíscopi, qui, témpore Ariánæ infestatiónis, ab Ariáno Imperatóre Constántio ob cathólicam fidem relegátus exsílio, et extra Christiánum nomen usque ad mortem mutándo exsília fatigátus, tandem, apud Phrýgiam defúnctus, beátæ passiónis corónam percépit a Dómino.
          Tránsaquis, ad lacum Fúcinum, in Marsis, natális quoque sanctórum Mártyrum Cæsídii Presbýteri, et Sociórum; qui martýrio coronáti sunt in persecutióne Maximíni.
          Item sanctórum Mártyrum Robustiáni et Marci.
          Cæsaréæ, in Cappadócia, sanctórum Theódoti, Rufínæ et Ammiæ; quorum duo primi paréntes fuérunt sancti Mamántis Mártyris, quem Rufína in cárcere péperit, et Ammia educávit.
          Antisiodóri sancti Optáti, Epíscopi et Confessóris.
          In Anglia sancti Aidáni, Epíscopi Lindisfarnénsis; cuius ánimam, cum sanctus Cuthbértus, cuius memória tertiodécimo Kaléndas Aprílis cólitur, tunc óvium pastor, in cælum ferri vidísset, relíctis óvibus, factus est Mónachus.
          Apud Nuscum sancti Amáti Epíscopi.
          Athénis sancti Aristídis, fide et sapiéntia claríssimi, qui Hadriáno Príncipi egrégium de religióne Christiána volúmen óbtulit, nostri dogmátis cóntinens ratiónem; et quod Christus Iesus solus esset Deus, præsénte ipso Imperatóre, luculentíssime perorávit.
      en2:
      - type: text
        text: |-
          The Eve of the Kalends of September
      
          Saint Raymond Nonnatus, of the Order of Blessed Mary of Mercy for the Redemption of Captives, Cardinal and Confessor; whose birthday is kept on the twenty-sixth of August.
          Near Monte Senario, in Etruria, the birthday of Saint Buonfiglio, Confessor, one of the seven Founders of the Order of the Servants of Blessed Mary, Virgin; who, speaking to his brethren about the Passion of the Lord, gave up his spirit into the hands of God. His feast and that of his companions is celebrated on the twelfth of February.
          At Trier, likewise the birthday of Saint Paulinus, Bishop, who, in the time of the Arian trouble, being exiled for the Catholic faith by the Arian Emperor Constantius, and worn out to death by being sent from exile to exile at that faction's behest without ever taking the Christian name, at last died in Phrygia and received from the Lord the crown of his blessed passion.
          At Trasacco, on Lake Fucino, in the Marsi, likewise the birthday of the holy Martyrs Caesidius, Priest, and his companions; who were crowned with martyrdom in the persecution of Maximinus.
          Likewise the holy Martyrs Robustianus and Marcus.
          At Caesarea, in Cappadocia, the holy Theodotus, Rufina, and Ammia; the first two of whom were the parents of Saint Mamas the Martyr, whom Rufina bore in prison and Ammia raised.
          At Auxerre, Saint Optatus, Bishop and Confessor.
          In England, Saint Aidan, Bishop of Lindisfarne; whose soul, when Saint Cuthbert — whose memory is kept on the twentieth of March — was then a shepherd of sheep and saw it being carried to heaven, abandoned his sheep and became a Monk.
          Near Nusco, Saint Amatus, Bishop.
          At Athens, Saint Aristides, most renowned for faith and wisdom, who presented to the Emperor Hadrian an outstanding volume on the Christian religion, containing the proofs of our doctrine; and, in the very presence of the Emperor himself, argued most brilliantly that Christ Jesus alone is God.
  psalm.pr-die-nonas-apr-lis-ea6bc18560:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of April, were born into the better life:

          At Seville, in Spain, the holy Confessor Isidore, Bishop of that see, famous for his holiness and teaching, who lighted up all Spain by his zeal for the Catholic faith, and by his observance of the discipline of the Church [in the year 639].
          At Thessalonica, under the Emperor Maximian and the President Faustinus, the holy martyrs, the Deacon Agathopodes, and the Reader Theodulos, who were drowned in the sea with stones tied round their necks, because of their confession of the Christian faith.
          At Milan, the burial of the holy Confessor Ambrose, Bishop of that see, by whose labours, teaching, and miracles at the time of the Arian misbelief nearly the whole of Italy was converted to the Catholic faith [in the year 397.] [We keep his feast upon the 7th day of December, which is that of his ordination as bishop].
          At Constantinople, the holy Monk Plato, who struggled resolutely for many years against the heretics, breakers of the holy images [in the year 813].
          In Palestine, [in the fifth century,] the holy Hermit Zosimus, who saw to the burying of holy Mary of Egypt.
      la:
      - type: text
        text: |-
          Prídie Nonas Aprílis

          Híspali, in Hispánia, sancti Isidóri Epíscopi, Confessóris et Ecclésiæ Doctóris, sanctitáte et doctrína conspícui; qui zelo cathólicæ fídei et ecclesiásticæ observántia disciplínæ Hispánias illustrávit.
          Medioláni deposítio sancti Ambrósii Epíscopi, Confessóris et Ecclésiæ Doctóris; cuius stúdio, inter cétera doctrínæ et miraculórum insígnia, témpore Ariánæ perfídiæ, tota fere Itália ad cathólicam fidem convérsa est. Ipsíus tamen festívitas séptimo Idus Decémbris potíssimum recólitur, quo die Epíscopus Mediolanénsis ordinátus est.
          Thessalonícæ sanctórum Mártyrum Agathópodis Diáconi, et Theodúli Lectóris, qui, sub Maximiáno Imperatóre et Faustíno Prǽside, ob Christiánæ fídei confessiónem, in mare, alligáto ad collum saxo, demérsi sunt.
          Constantinópoli sancti Platónis Mónachi, qui plúribus annis advérsus hæréticos, sanctárum Imáginum effractóres, invicto ánimo decertávit.
          In Palæstína sancti Zósimi Anachorétæ, qui funus sanctæ Maríæ Ægyptíacæ curávit.
          Panórmi sancti Benedícti a sancto Philadélpho, ob córporis nigrédinem cognoménto Nigri, ex Ordine Minórum, Confessóris, qui, signis et virtútibus clarus, in Dómino quiévit, et a Pio Séptimo, Pontífice Máximo, in Sanctórum númerum relátus est.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of April
      
          At Seville, in Spain, Saint Isidore, Bishop, Confessor, and Doctor of the Church, renowned for holiness and learning; who, by his zeal for the Catholic faith and his observance of ecclesiastical discipline, shed light upon the Spains.
          At Milan, the repose of Saint Ambrose, Bishop, Confessor, and Doctor of the Church; by whose efforts, among other marks of his doctrine and miracles, nearly all of Italy was converted to the Catholic faith in the time of the Arian perfidy. His feast, however, is more particularly kept on the seventh of December, the day on which he was ordained Bishop of Milan.
          At Thessalonica, the holy Martyrs Agathopus, Deacon, and Theodulus, Reader, who, under the Emperor Maximian and the governor Faustinus, were drowned in the sea for confessing the Christian faith, a stone having been bound about their necks.
          At Constantinople, Saint Plato, Monk, who for many years contended with unconquered spirit against the heretics who broke the sacred images.
          In Palestine, Saint Zosimas, Anchorite, who arranged the burial of Saint Mary of Egypt.
          At Palermo, Saint Benedict of Saint Philadelphus, surnamed the Moor on account of the darkness of his complexion, of the Order of Friars Minor and Confessor, who rested in the Lord renowned for signs and virtues, and was enrolled in the number of the Saints by Pope Pius VII.
  psalm.pr-die-nonas-aug-sti-3ab84ed596:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of August is commemorated the holy Confessor Dominic [of Guzman,] Founder of the Order of Friars Preachers, very famous for his holiness and teaching. He remained always a virgin, and through his wonderful gifts raised three dead men to life. By his preaching he crushed heresies, and grounded many in a religious and godly life. He fell asleep in peace, [in the year 1221,] upon the sixth day of this present month of August. But his feast is kept upon this day by command of Pope Paul IV.
          On the same 4th day of August, were born into the better life:

          At Thessalonica, [in the first century,] the blessed Aristarchus, the disciple and close companion of the holy Apostle Paul, concerning whom the same Apostle writeth unto the Colossians, (iv, 10) "Aristarchus, my fellow-prisoner, saluteth you." He was by the same Apostle ordained Bishop of the Thessalonians, and after long contendings under Nero he was crowned by Christ, and fell asleep.
          At Rome, upon the Latin Way, [in the year 275,] the blessed martyr Tertullinus. He was a Priest who, under the Emperor Valerian, was horridly beaten with clubs, had his sides burnt and his mouth crushed, was stretched upon a rack and had his muscles cut, and then sentence was given to behead him, and so he finished his testimony.
          At Constantinople, [in the fourth century,] the holy martyr Eleutherius, of the Senatorial Order, who was slain with the sword for Christ's sake, in the persecution under Maximian.
          In Persia, [in the year 346,] the holy martyrs Ia and her Companions, who were diversely afflicted and underwent martyrdom along with nine thousand Christian prisoners under King Sapor.
          At Cologne, the holy martyr Protasius.
          At Verona, the holy Confessor Agabius, Bishop of that see.
          At Tours, holy Euphronius, [Arch-] Bishop of that see.
          At Rome, holy Perpetua, who was baptized by the blessed Apostle Peter. She turned her son Naserius and her husband Africanus to believe in Christ, and buried a great number of bodies of the holy martyrs, and passed away to be with the Lord, full of good works.
      la:
      - type: text
        text: |-
          Prídie Nonas Augústi

          Sancti Domínici Confessóris, qui Ordinis Fratrum Prædicatórum Fundátor fuit, atque octávo Idus mensis huius in pace quiévit.
          In vico Ars, diœcésis Bellicénsis, in Gállia, natális sancti Ioánnis Baptístæ-Maríæ Vianney, Presbýteri et Confessóris, in parochiáli múnere obeúndo insígnis, quem Pius Papa Undécimus in Sanctórum númerum rétulit, et ómnium parochórum cæléstem Patrónum constítuit. Ipsíus tamen festum sexto Idus huius mensis recólitur.
          Thessalonícæ item natális beáti Aristárchi, qui discípulus et comes indivíduus fuit sancti Pauli Apóstoli, de quo ipse Paulus ad Colossénses scribit: « Salútat vos Aristárchus, concaptívus meus ». Is, ab eódem Apóstolo Epíscopus Thessalonicénsium ordinátus, tandem, post longos agónes, sub Neróne, coronátus a Christo, quiévit.
          Romæ sanctæ Perpétuæ, quæ, a beáto Petro Apóstolo baptizáta, Nazárium fílium et Africánum virum ad Christi fidem perdúxit, et multa sanctórum Mártyrum córpora sepelívit; ac tandem, bonórum óperum méritis cumuláta, migrávit ad Dóminum.
          Item Romæ, via Latína, pássio beáti Tertullíni, Presbýteri et Mártyris; qui, sub Valeriáno Imperatóre, post ímpiam fústium mactatiónem, ígnium circa látera exustiónem, oris quassatiónem, atque in equúleo extensiónem nervorúmque cæsiónem, data senténtia, cápitis amputatióne martýrium consummávit.
          Constantinópoli sancti Eleuthérii Mártyris, ex órdine Senatório viri, qui pro Christo, in persecutióne Maximiáni, gládio cæsus est.
          In Pérside sanctárum Mártyrum Iæ et Sociárum; quæ, cum novem míllibus Christiánis captívis, sub Sápore Rege, divérsis pœnis afflíctæ, martýrium subiérunt.
          Verónæ sancti Agábii, Epíscopi et Confessóris.
          Turónis, in Gállia, sancti Euphrónii Epíscopi.
          Colóniæ Agrippínæ commemorátio sancti Protásii Mártyris; qui Medioláni, una cum Gervásio fratre, passus est tertiodécimo Kaléndas Iúlii.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of August
      
          Saint Dominic, Confessor, who was the Founder of the Order of Friars Preachers, and rested in peace on the sixth of this month.
          In the village of Ars, in the diocese of Belley, in Gaul, the birthday of Saint John Baptist-Mary Vianney, Priest and Confessor, outstanding in the discharge of his parochial office, whom Pope Pius XI enrolled in the number of the Saints and appointed the heavenly Patron of all parish priests. His feast, however, is kept on the eighth of this month.
          At Thessalonica, likewise the birthday of Blessed Aristarchus, who was the inseparable disciple and companion of Saint Paul the Apostle, of whom Paul himself writes to the Colossians: “Aristarchus my fellow prisoner greets you.” He, ordained Bishop of the Thessalonians by the same Apostle, at last, after long struggles, was crowned by Christ under Nero, and rested in peace.
          At Rome, Saint Perpetua, who, having been baptized by the blessed Apostle Peter, led her son Nazarius and her husband Africanus to the faith of Christ, and buried many bodies of the holy Martyrs; and at last, filled with the merits of good works, passed to the Lord.
          Likewise at Rome, on the Latin Way, the passion of Blessed Tertullinus, Priest and Martyr; who, under the Emperor Valerian, after the impious beating with clubs, the burning of fire around his sides, the shattering of his mouth, the stretching on the rack, and the cutting of sinews, was condemned by sentence and consummated his martyrdom by beheading.
          At Constantinople, Saint Eleutherius, Martyr, a man of senatorial rank, who was slain by the sword for Christ in the persecution of Maximian.
          In Persia, the holy Martyrs Ia and her companions; who, together with nine thousand Christian captives, were afflicted with various punishments under King Shapur and suffered martyrdom.
          At Verona, Saint Agabius, Bishop and Confessor.
          At Tours, in Gaul, Saint Euphronius, Bishop.
          At Cologne, the commemoration of Saint Protasius, Martyr; who suffered at Milan together with his brother Gervasius on the nineteenth of June.
  psalm.pr-die-nonas-dec-mbris-aa920b92eb:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Peter Chrysologus, Archbishop of Ravenna, (in the year 450,) of whom mention is made upon the 2nd day of this present month of December.
          Upon the same 4th day of December, were born into the better life:

          At Nicomedia, in the persecution under the Emperor Maximin, the holy Virgin and martyr Barbara. After a cruel and wasting imprisonment she endured burning with torches, the cutting off of her breasts, and other torments, and finished her testimony by the sword, (in the year 235.) At Constantinople, (in the year 780,) the holy martyr Theophanes and his Companions.
          In Pontus, (about the year 330,) the blessed Confessor Meletius, Bishop (of Sebastopol.) He was a man of extraordinary learning, but this gift was outshone in him by the mightiness of his soul and the straightforwardness of his life.
          At Bologna, holy Felix, Bishop (of that see,) who had erstwhile been a Deacon of the church of Milan under holy Ambrose.
          In England, holy Osmund, Bishop, (in the year 1078, of Salisbury,) whose feast we keep upon the 17th day of July, which is the day of the translation of his sacred body. (He was Count of Seez in Normandy, and, following William the Conqueror, was made Count of Dorset and Lord High Chancellor of England. He died in 1099, and was canonised by Pope Calixtus III, in the year 1458.)
          At Cologne, (in the year 1075,) holy Annon, Bishop (of that see.)
          In Mesopotamia, (about the year 449,) holy Maruthas, Bishop of Tagrit, who raised up again the churches of God in Persia which had been cast down in the persecution under King Isdegerd he was famous for many miracles, and achieved honour even among his enemies. (Several of his works are extant. Tagrit is now Miafarakin.)
          At Parma, (in the year 1133,) holy Bernard, Cardinal-bishop of that city, of the Congregation of the Order of St Benedict, called that of Vallombrosa.
      la:
      - type: text
        text: |-
          Prídie Nonas Decémbris

          Sancti Petri Chrysólogi, Epíscopi Ravennátis, Confessóris et Ecclésiæ Doctóris, cuius memória quarto Nonas huius mensis recensétur.
          Nicomedíæ pássio sanctæ Bárbaræ, Vírginis et Mártyris; quæ, in persecutióne Maximíni, post diram cárceris maceratiónem, lampadárum adustiónem, mamillárum præcisiónem atque ália torménta, gládio martýrium consummávit.
          Constantinópoli sanctórum Theóphanis et Sociórum.
          In Ponto beáti Melétii, Epíscopi et Confessóris; qui, cum esset ob eruditiónis prærogatívam præcípuus, ob virtútem tamen animi et vitæ sinceritátem longe magnificéntior éxstitit.
          Bonóniæ sancti Felícis Epíscopi, qui ántea Mediolanénsis Ecclésiæ, sub sancto Ambrósio, Diáconus fúerat.
          In Anglia sancti Osmúndi, Epíscopi et Confessóris.
          Colóniæ Agrippínæ sancti Annónis Epíscopi.
          In Mesopotámia sancti Marúthæ Epíscopi, qui Dei Ecclésias, ob persecutiónem Isdegérdis Regis collápsas, in Pérside reparávit, multísque miráculis clarus, apud hostes étiam méruit honorári.
          Parmæ sancti Bernárdi, Cardinális et eiúsdem civitátis Epíscopi, ex Ordine Vallis Umbrósæ.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of December
      
          Saint Peter Chrysologus, Bishop of Ravenna, Confessor, and Doctor of the Church, whose memory is commemorated on the second of this month.
          At Nicomedia, the passion of Saint Barbara, Virgin and Martyr; who, in the persecution of Maximinus, after the dire wasting of prison, the burning with lamps, the cutting off of her breasts, and other torments, consummated her martyrdom by the sword.
          At Constantinople, the holy Theophanes and his companions.
          In Pontus, Blessed Meletius, Bishop and Confessor; who, though preeminent by reason of his learned distinction, was far more magnificent still for the virtue of his soul and the sincerity of his life.
          At Bologna, Saint Felix, Bishop, who had previously been Deacon of the Church of Milan under Saint Ambrose.
          In England, Saint Osmund, Bishop and Confessor.
          At Cologne, Saint Anno, Bishop.
          In Mesopotamia, Saint Marutha, Bishop, who restored in Persia the Churches of God that had collapsed due to the persecution of King Yazdegerd, and, renowned for many miracles, merited to be honored even by enemies.
          At Parma, Saint Bernard, Cardinal and Bishop of that city, of the Order of Vallombrosa.
  psalm.pr-die-nonas-febru-rii-980e6b4529:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Andrew Corsini, (from 1360 to 1373,) Bishop of Fiesole, of whom mention is made upon the 6th day of January.
          Upon the same 4th day of February, were born into the better life:

          At Rome, the holy martyr Eutychius, who gained an illustrious martyrdom and is buried in the cemetery of Callistus. Holy Pope Damasus adorned his grave with some verses.
          At Fossambrono, the holy martyrs Aquilinus, Geminus, Gelasius, Magnus, and Donatus.
          At Thmuis, in Egypt, (about the year 308,) the blessed martyr Philaeas, Bishop of that city, and Philoromus, Tribune of the troops, who in the persecution under the Emperor Diocletian could not be persuaded by their kinsfolk and friends to have pity on themselves, but stretched forth their necks and won palm branches of victory from the Lord's hand and a countless multitude of the faithful of the same city, following after the example of their shepherd, were likewise crowned with martyrdom.
          On the same day, (in the year 888,) holy Rembert, Bishop of Bremen.
          At Troyes, the holy Confessor Aventinus, (about the year 538.)
          At Pelusium, in Egypt, the holy monk Isidore, (monk in desert of Lychnos, about the year 449,) eminent for his merits and teaching.
          On the same day, the holy Confessor Gilbert, (in the year 1190,) founder of the Order of Sempringham, whose feast we keep upon the 11th day of this present month of February.
          In the town of Amatrice, in the diocese of Reate, (in the year 1612,) the holy Confessor Joseph of Leonissa, of the Order of Friars Minors Capuchins, who suffered much from the Mohammedans for his preaching of the faith, and was famous for his apostolic labours and his miracles whose name the Supreme Pontiff Benedict XIV. enrolled among those of the holy confessors.
      la:
      - type: text
        text: |-
          Prídie Nonas Februárii

          Sancti Andréæ Corsíni, ex Ordine Carmelitárum, Epíscopi Fæsuláni et Confessóris, cuius dies natális ágitur octávo Idus Ianuárii.
          Romæ sancti Eutýchii Mártyris, qui illústre martýrium consummávit, ac sepúltus est in cœmetério Callísti; eiúsque sepúlcrum póstea sanctus Dámasus Papa vérsibus exornávit.
          Thmui, in Ægýpto, pássio beáti Philéæ, eiúsdem civitátis Epíscopi, et Philóromi, Tribúni mílitum; qui, in persecutióne Diocletiáni, cum a cognátis et amícis suadéri non possent ut sibi párcerent, ambo, datis cervícibus, palmas a Dómino meruérunt. Cum ipsis innúmera étiam multitúdo fidélium ex eádem urbe, pastóris sui vestígia sequens, martýrio coronáta est.
          Foro Semprónii sanctórum Mártyrum Aquilíni, Gémini, Gelásii, Magni et Donáti.
          In regno Maravénsi, apud Indos Orientáles, sancti Ioánnis de Britto, Sacerdótis e Societáte Iesu, qui, cum multos infidéles ad fidem convertísset, glorióso martýrio coronátus est.
          Trecis, in Gállia, sancti Aventíni, Presbýteri et Confessóris.
          Pelúsii, in Ægýpto, sancti Isidóri, Presbýteri et Mónachi, méritis et doctrína conspícui.
          Sempringhámiæ, in Anglia, sancti Gilbérti, Presbýteri et Confessóris, qui Ordinis Sempringhamiénsis fuit Institútor.
          In óppido Amatrícis, in Aprútio, deposítio sancti Ioséphi a Leoníssa, Sacerdótis ex Ordine Minórum Capuccinórum et Confessóris; quem, ob fídei prædicatiónem a Mahumetánis dira perpéssum, labóribus apostólicis et miráculis clarum, Benedíctus Décimus quartus, Póntifex Máximus, in Sanctórum cánonem rétulit.
          Bremæ commemorátio sancti Rembérti, qui, sancti Anschárii discípulus, in ipsíus locum, hac die, óbitum magístri sui próxime subsequenti, olim Hamburgénsis simul ac Breménsis Epíscopus eléctus est.
          Bitúricis, in Aquitánia, sanctæ Ioánnæ de Valois, Gálliæ Regínæ, Ordinis sanctíssimæ Annuntiatiónis beátæ Maríæ Vírginis Fundatrícis, pietáte et singulári Crucis participatióne illústris, a Pio Papa Duodécimo Sanctárum fastis adscríptæ.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of February
      
          Saint Andrew Corsini, of the Order of Carmelites, Bishop of Fiesole and Confessor, whose birthday is kept on the sixth of January.
          At Rome, Saint Eutychius, Martyr, who completed an illustrious martyrdom and was buried in the cemetery of Callixtus; whose tomb the holy Pope Damasus afterward adorned with verses.
          At Thmuis, in Egypt, the passion of Blessed Phileas, Bishop of that city, and Philoromus, Military Tribune; who, in the persecution of Diocletian, when they could not be persuaded by their kinsmen and friends to spare themselves, both bowed their necks and merited palms from the Lord. With them an innumerable multitude of the faithful from the same city, following in the footsteps of their shepherd, was also crowned with martyrdom.
          At Forum Sempronii, the holy Martyrs Aquilinus, Geminus, Gelasius, Magnus, and Donatus.
          In the kingdom of Maravi, among the East Indians, Saint John de Brito, Priest of the Society of Jesus, who, having converted many unbelievers to the faith, was crowned with a glorious martyrdom.
          At Troyes, in Gaul, Saint Aventinus, Priest and Confessor.
          At Pelusium, in Egypt, Saint Isidore, Priest and Monk, renowned for merits and learning.
          At Sempringham, in England, Saint Gilbert, Priest and Confessor, who was the Founder of the Sempringhamian Order.
          In the town of Amatrice, in Abruzzo, the repose of Saint Joseph of Leonessa, Priest of the Order of Friars Minor Capuchin and Confessor; who, having suffered dire things at the hands of the Mohammedans for preaching the faith, renowned for apostolic labors and miracles, was enrolled by Pope Benedict XIV in the canon of the Saints.
          At Bremen, the commemoration of Saint Rembert, who, as a disciple of Saint Ansgar, was on this day, shortly following his master's death, elected Bishop of Hamburg and Bremen together.
          At Bourges, in Aquitaine, Saint Joan of Valois, Queen of France, Foundress of the Order of the Most Holy Annunciation of the Blessed Virgin Mary, illustrious for her piety and her singular sharing in the Cross, enrolled among the Saints by Pope Pius XII.
  psalm.pr-die-nonas-i-lii-4d4d7cce86:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is the Octave of the holy Apostles Peter and Paul.
          Upon the same 6th day of July, were born into the better life:

          In Judea, the holy Prophet Isaiah, who was sawn asunder under King Manasseh, [about 715 B.C.,] and was buried under the oak at En Rogel beside the flowing of the waters, [the first of the four Greater Prophets.]
          At Rome, the holy martyr Tranquillinus, father of the holy martyrs Mark and Marcellian. He had been converted to Christ by the preaching of the holy martyr Sebastian, baptized by the blessed Priest, Polycarp, and himself ordained a Priest by the holy Pope Caius. He was praying at the grave of blessed Paul, upon the Octave Day of the Apostles, when the pagans under the Emperor Diocletian tried and stoned him. And so he finished his testimony, [in the year 286.]
          At Fiesole, in Tuscany, the holy martyr Romulus, Bishop [of that see,] a disciple of Peter. He was sent forth by the Apostle to preach the gospel, and when he had proclaimed Christ in many places of Italy, he came back to Fiesole, where he and many Companions were crowned with martyrdom under the Emperor Domitian.
          In Campania, the holy Virgin and martyr Dominica, [fourth century.] Under the Emperor Diocletian she was condemned to the beasts for breaking idols, but the beasts did not hurt her. She was then beheaded, and so passed away to be ever with the Lord. Her body is kept with great reverence at Tropea, in Calabria.
          On the same day, the holy martyr Lucy, a Campanian by race, who, being tried and sharply tormented under the Vicar Rixius Varus, turned him to Christ, with whom were joined Antoninus, Severinus, Diodorus, Dion, and seventeen others, who all suffered and were crowned together.
          In the country of Trier, the holy Priest and Confessor Goer, [in the year 575.]
      la:
      - type: text
        text: |-
          Prídie Nonas Iúlii

          Hierosólymis sancti Isaíæ Prophétæ, qui, sub Manásse Rege, in duas sectus partes occúbuit, sepultúsque est sub quercu Rogel, iuxta tránsitum aquárum.
          Fǽsulis, in Túscia, sancti Rómuli, Epíscopi et Mártyris, qui fuit beáti Petri Apóstoli discípulus. Hic, ab eódem Apóstolo missus ad prædicándum Evangélium, in multis Itáliæ locis Christum annuntiávit; ac tandem, Fǽsulas regréssus, ibi, sub Domitiáno Príncipe, martýrio coronátus est cum áliis Sóciis.
          Romæ natális sancti Tranquillíni Mártyris, patris sanctórum Marci et Marcelliáni, qui, ad prædicatiónem sancti Sebastiáni Mártyris convérsus ad Christum, a beáto Polycárpo Presbýtero baptizátus est, et a sancto Caio Papa Présbyter ordinátus. Ipse, die Octavárum Apostolórum, cum ad confessiónem beáti Pauli oráret, ibídem, sub Diocletiáno Imperatóre, a Pagánis tentus est, et, ab eis lapidátus, martýrium consummávit.
          Londíni, in Anglia, sancti Thomæ More, regni Cancellárii, qui, pro fide cathólica ac beáti Petri primátu, iubénte Henríco Octávo Rege, decollátus est.
          In Campánia sanctæ Domínicæ, Vírginis et Mártyris, quæ, sub Diocletiáno Imperatóre, cum fregísset idóla, hinc ad béstias damnáta, sed ab illis nil læsa, demum, cápite obtruncáta, migrávit ad Dóminum. Ipsíus vero corpus Tropéæ, in Calábria, summa veneratióne asservátur.
          Eódem die sanctæ Lúciæ Mártyris, quæ, natióne Campána, a Ríxio Varo Vicário tenta et ácriter cruciáta, eúndem convértit ad Christum; quibus adiúncti sunt Antonínus, Sevérinus, Diodórus, Dion, et álii decem et septem, qui in passióne collégæ et in coróna fuére consórtes.
          Neptúni, in Látio, sanctæ Maríæ Gorétti, piíssimæ adolescéntis, in defendénda virginitáte crudelíssime necátæ, quam Pius Papa Duodécimus sanctárum Mártyrum catálogo solémniter accénsuit.
          In pago Trevirénsi sancti Goaris, Presbýteri et Confessóris.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of July
      
          At Jerusalem, Saint Isaiah the Prophet, who, under King Manasseh, was cut in two and buried under the oak of Rogel, near the water-conduit.
          At Fiesole, in Tuscany, Saint Romulus, Bishop and Martyr, who was a disciple of the blessed Apostle Peter. Sent by the same Apostle to preach the Gospel, he proclaimed Christ in many places of Italy; and at last, returning to Fiesole, was there crowned with martyrdom together with other companions under the Emperor Domitian.
          At Rome, the birthday of Saint Tranquillinus, Martyr, father of the holy Marcus and Marcellianus, who was converted to Christ at the preaching of Saint Sebastian the Martyr, baptized by the blessed Priest Polycarp, and ordained Priest by the holy Pope Gaius. On the Octave day of the Apostles, while he was praying at the confession of Blessed Paul, he was seized there by the pagans under the Emperor Diocletian, and, having been stoned by them, consummated his martyrdom.
          At London, in England, Saint Thomas More, Chancellor of the realm, who, for the Catholic faith and the primacy of Blessed Peter, was beheaded at the command of King Henry VIII.
          In Campania, Saint Dominica, Virgin and Martyr, who, under the Emperor Diocletian, having broken idols, was therefore condemned to the beasts, but unharmed by them; at last, being beheaded, she passed to the Lord. Her body is preserved at Tropea, in Calabria, with the greatest veneration.
          On the same day, Saint Lucia, Martyr, who, a native of Campania, was seized and sharply tortured by the deputy Rixius Varus, and converted him to Christ; to whom were joined Antoninus, Severinus, Diodorus, Dion, and seventeen others, who were companions in the passion of their colleague and sharers in the crown.
          At Nettuno, in Latium, Saint Maria Goretti, a most devout young woman, most cruelly slain in defense of her virginity, whom Pope Pius XII solemnly enrolled in the catalogue of the holy Martyrs.
          In the territory of Trier, Saint Goar, Priest and Confessor.
  psalm.pr-die-nonas-i-nii-f153fb333f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of June, were born into the better life:

          At Agnone, in the Abruzzi, holy Confessor Francis, of the noble Neapolitan family of Caracciolo, founder of the congregation of Regular Clerks Minors. He was a burning and a shining light of love towards God and his neighbor, and intense earnestness in spreading abroad the worship of the Holy Eucharist. His body lieth at Naples, and is held in great veneration. Pius VII added his name to the list of those of the Saints.
          At Rome, the holy martyrs Aretius and Dacian.
          At Sisseg, in Illyricum, [in the year 304,] holy Quirinus, Bishop [of that see.] Prudentius writeth of him that, under the President Galerius, for Christ's faith's sake, a millstone was tied about his neck and he was cast into the river, but the millstone swam, and he was a long time exhorting the Christians who stood by not to be scared at the sight of his execution, nor to be shaken in the faith, and then obtained from God the glory of martyrdom, and so was allowed to sink.
          At Brescia, under the Emperor Nero, the holy martyr Clateus, Bishop [of that see.]
          In Hungary, the holy martyrs Rutilus and his companions.
          At Arras, the holy Virgin and martyr Saturnina.
          At Tivoli, the holy martyr Quirinus.
          At Constantinople, [in the fourth century,] the holy Metrophanes, Archbishop [of that see,] an eminent Confessor.
          At Milevitanus, in Numidia, holy Optatus, Bishop [of that see,] famous for his teaching and holiness.
          At Verona, holy Alexander, Bishop [of that see.]
      la:
      - type: text
        text: |-
          Prídie Nonas Iúnii

          Agnóni, in Aprútio citerióre, sancti Francísci, ex nóbili Neapolitána família Carácciolo, Confessóris, Congregatiónis Clericórum Regulárium Minórum Fundatóris, qui mira in Deum et próximum caritáte et ardentíssimo sacræ Eucharístiæ cultus propagándi stúdio flagrávit; atque a Pio Séptimo, Pontífice Máximo, Sanctórum cánoni adscríptus est. Ipsíus corpus Neápolim, in Campánia, translátum fuit, ibíque religiosíssime cólitur.
          Romæ sanctórum Mártyrum Arétii et Daciáni.
          Sísciæ, in Illýrico, sancti Quiríni Epíscopi, qui, sub Galério Prǽside, pro fide Christi (ut Prudéntius scribit), molári saxo ad collum ligáto, in flumen præcipitátus est; sed, lápide supernatánte, cum circumstántes Christiános, ne eius terreréntur supplício neve titubárent in fide, diu fuísset hortátus, ipse, ut martýrii glóriam assequerétur, précibus a Deo, ut mergerétur, obtínuit.
          Medioláni sancti Clatéi, Epíscopi Brixiénsis et Mártyris, qui, sub Neróne Imperatóre, iussu Præfécti urbis illíus tentus, et, cum renuntiáre Christo nollet, multis verbéribus afflíctus et cápite obtruncátus est.
          In Pannónia sanctórum Mártyrum Rútili et Sociórum.
          Tíbure sancti Quiríni Mártyris.
          Atrébati, in Gálliis, sanctæ Saturnínæ, Vírginis et Mártyris.
          Constantinópoli sancti Metrophánis, Epíscopi et Confessóris insígnis.
          Milévi, in Numídia, sancti Optáti Epíscopi, doctrína et sanctitáte conspícui, quem sancti Ecclésiæ Patres Augustínus et Fulgéntius suis láudibus celebrárunt.
          Verónæ sancti Alexándri Epíscopi.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of June
      
          At Agnone, in inner Abruzzo, Saint Francis of the noble Neapolitan family Caracciolo, Confessor, Founder of the Congregation of Minor Clerics Regular, who burned with wonderful charity toward God and neighbor and with most ardent zeal for spreading the worship of the holy Eucharist; and was enrolled in the canon of the Saints by Pope Pius VII. His body was translated to Naples, in Campania, where it is venerated with greatest piety.
          At Rome, the holy Martyrs Aretius and Dacianus.
          At Siscia, in Illyricum, Saint Quirinus, Bishop, who, under the governor Galerius, for the faith of Christ (as Prudentius writes), having a millstone bound to his neck, was hurled into a river; but the stone floating above him, and having for a long time exhorted the bystanders who were Christians not to be frightened by his torment nor to waver in faith, he himself, in order to attain the glory of martyrdom, obtained by prayer from God that he should be submerged.
          At Milan, Saint Clatus, Bishop of Brescia and Martyr, who, under the Emperor Nero, being seized at the command of the Prefect of that city and, when he refused to renounce Christ, afflicted with many stripes and beheaded.
          In Pannonia, the holy Martyrs Rutilius and his companions.
          At Tibur, Saint Quirinus, Martyr.
          At Arras, in the Gauls, Saint Saturnina, Virgin and Martyr.
          At Constantinople, Saint Metrophanes, Bishop and outstanding Confessor.
          At Milevis, in Numidia, Saint Optatus, Bishop, renowned for learning and holiness, whom the holy Fathers of the Church, Augustine and Fulgentius, celebrated with their praises.
          At Verona, Saint Alexander, Bishop.
  psalm.pr-die-nonas-ianu-rii-37bcb3bc8a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is Octave of the Holy Innocents.
          Upon the same 4th day of January, were born into the better life:

          In Crete, holy Titus, whom the Apostle Paul ordained Bishop for the Cretans. When he had faithfully brought to an end (about the year 105), his work of preaching, he obtained a blessed death, and was buried in that church whereof the blessed Apostle had appointed him a worthy minister. His feast is kept upon the 6th day of the month of February.
          At Rome, the holy martyrs the priest Priscus, the clerk Priscillian, and the devout woman Benedicta, who won martyrdom by the sword in the time of the wicked Emperor Julian (the Apostate).
          Likewise at Rome, the blessed martyr Dafrosa, wife of the holy martyr Flavian (mother of St Bibiana). After the execution of her husband she was first sentenced to exile, and then put to death under the aforesaid Emperor Julian.
          At Bologna, the holy martyrs Hermes, Aggaeus, and Caius, who suffered under the Emperor Maximian.
          At Adrumetum, in Africa, the holy martyr Mavillus, whom the cruel President Scapula condemned to the wild beasts in the persecution under the Emperor Severus, and who thus received the crown of martyrdom.
          Likewise in Africa, the illustrious martyrs Aquilinus, Geminus, Eugenius, Marcian, Quintus, Theodotus, and Tryphon (about end of fifth century).
          At Langres, holy Gregory, bishop of that see, famous for miracles (in the year 539).
          At Reims, in Gaul (in the year 743), the holy confessor Rigobert, bishop (in the year 722) of that see.
      la:
      - type: text
        text: |-
          Prídie Nonas Ianuárii

          In Creta natális sancti Titi, qui, ab Apóstolo Paulo Epíscopus Creténsium ordinátus, et, post prædicatiónis offícium fidelíssime consummátum, finem beátum adéptus, in ea sepúltus est Ecclésia, ubi a beáto Apóstolo dignus miníster fúerat constitútus. Ipsíus tamen festívitas octávo Idus Februárii celebrátur.
          Romæ sanctórum Mártyrum Prisci Presbýteri, et Priscilliáni Clérici, ac Benedíctæ, religiósæ féminæ; qui, témpore impiíssimi Iuliáni, gládio martýrium complevérunt.
          Item Romæ beátæ Dafrósæ, uxóris sancti Flaviáni Mártyris, ac matris sanctárum Bibiánæ et Demétriæ, Vírginum et Mártyrum; quæ, post interfectiónem viri sui, primum exsílio relegáta, deínde, sub præfáto Príncipe, cápite plexa est.
          Bonóniæ sanctórum Hermétis, Aggæi et Caii Mártyrum, qui sub Maximiáno Imperatóre passi sunt.
          Adruméti, in Africa, commemorátio sancti Mávili Mártyris, qui in persecutióne Sevéri Imperatóris, a sævíssimo Prǽside Scápula damnátus ad béstias, martýrii corónam accépit.
          Item in Africa præclarissimórum Mártyrum Aquilíni, Gémini, Eugénii, Marciáni, Quincti, Theodóti et Tryphónis.
          Apud Língonas, in Gállia, sancti Gregórii Epíscopi, miráculis clari.
          Rhemis, in Gállia, sancti Rigobérti, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of January
      
          In Crete, the birthday of Saint Titus, who, ordained Bishop of the Cretans by the Apostle Paul, and having most faithfully completed the office of preaching, attained a blessed end and was buried in that Church where he had been appointed a worthy minister by the blessed Apostle. His feast, however, is celebrated on the sixth of February.
          At Rome, the holy Martyrs Priscus, Priest, and Priscillianus, Cleric, and Benedita, a religious woman; who, in the time of the most impious Julian, completed their martyrdom by the sword.
          Likewise at Rome, Blessed Dafrosa, wife of Saint Flavianus the Martyr and mother of the holy Bibianna and Demetria, Virgins and Martyrs; who, after the slaying of her husband, was first sent into exile, then beheaded under the aforementioned Emperor.
          At Bologna, the holy Martyrs Hermes, Aggaeus, and Gaius, who suffered under the Emperor Maximian.
          At Hadrumetum, in Africa, the commemoration of Saint Mavilus, Martyr, who, in the persecution of the Emperor Severus, condemned to the beasts by the most savage governor Scapula, received the crown of martyrdom.
          Likewise in Africa, the most distinguished Martyrs Aquilinus, Geminus, Eugenius, Marcianus, Quintus, Theodotus, and Tryphon.
          Near Lingones, in Gaul, Saint Gregory, Bishop, renowned for miracles.
          At Reims, in Gaul, Saint Rigobert, Bishop and Confessor.
  psalm.pr-die-nonas-m-rtii-a98970ed1c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 6th day of March, were born into the better life:

          At Nicomedia, the holy martyrs Victor and Victorinus, who were imprisoned for three years, and many ways tormented, along with Claudian and Bassa his wife, and being still recommitted to prison, died therein, [third century.]
          At Tortona, the holy martyr Marcian, Bishop of that see, who was crowned under the Emperor Trajan, being slain for Christ's greater glory.
          At Constantinople, holy Evagrius, who was elected Patriarch of that see by the Catholics in the time of the Emperor Valens, but was sent by the Emperor into exile, and there passed away to be ever with the Lord.
          In Cyprus, the holy martyr Conon, who under the Emperor Decius had nails driven through his feet, and was then made to run in front of a chariot, under the which torment he fell upon his knees and gave up his soul in prayer to God.
          Likewise, forty-two holy martyrs, who were apprehended in Amorium and brought to Syria, where they passed through a noble conflict and triumphantly grasped the palm of martyrdom, [in the year 845.]
          At Bologna, holy Basil, Bishop of that city, who was ordained by holy Pope Sylvester, and both by his word and example governed in holiness the church committed unto his care, [fourth century.]
          At Barcelona, in Spain, [in the year 137,] blessed Oligarius, who was first Canon and afterward Bishop of Barcelona, and Archbishop of Taragona.
          At Gent, in Flanders, the holy Virgin Coletta, [in the year 1447,] who first professed in the Third Order of Friars Minors, and then being filled with the Holy Ghost, set up many monasteries of sisters of the Second Order under the primitive discipline. She was ennobled by the grace of God, and famous for countless miracles, and the Supreme Pontiff Pius VII enrolled her name among those of the saints.
      la:
      - type: text
        text: |-
          Prídie Nonas Mártii

          Sanctárum Perpétuæ et Felicitátis Mártyrum, quæ sequénti die gloriósam martýrii corónam a Dómino recepérunt.
          Dertónæ sancti Marciáni, Epíscopi et Mártyris, qui, sub Traiáno, pro Christi glória occísus, coronátur.
          Nicomedíæ natális sanctórum Mártyrum Victóris et Victoríni, qui, per triénnium, cum Claudiáno et uxóre eius Bassa, torméntis multis afflícti et retrúsi in cárcerem, ibídem vitæ suæ cursum implevérunt.
          In Cypro sancti Conónis Mártyris, qui, sub Décio Imperatóre, clavis confíxus pedes et ante currum iussus cúrrere, in génua procúbuit, atque in oratióne réddidit spíritum.
          In Sýria pássio sanctórum quadragínta duórum Mártyrum, qui, in Amório comprehénsi et illuc perdúcti, ibi, egrégio perácto certámine, victóres palmam martýrii percepérunt.
          Constantinópoli sancti Evágrii, qui, témpore Valéntis a Cathólicis eléctus Epíscopus, et ab eódem Imperatóre in exsílium missus, Conféssor migrávit ad Dóminum.
          Bonóniæ sancti Basilíi Epíscopi, qui, a sancto Silvéstro Papa ordinátus, verbo et exémplo créditam sibi Ecclésiam sanctíssime gubernávit.
          Barcinóne, in Hispánia, beáti Ollegárii, primum Canónici, et póstea Epíscopi Barcinonénsis, et Archiepíscopi Tarraconénsis.
          Vitérbii beátæ Rosæ Vírginis, ex tértio Ordine sancti Francísci.
          Apud Gandávum, in Flándria, sanctæ Colétæ Vírginis, quæ, primum tértii Ordinis Franciscális régulam proféssa, deínde, divíno Spíritu affláta, quamplúra Moniálium secúndi eiúsdem Ordinis monastéria primǽvæ restítuit disciplínæ; atque, divínis exornáta virtútibus et innúmeris clara miráculis, a Pio Séptimo, Pontífice Máximo, in albo Sanctórum adscrípta est.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of March
      
          The holy Martyrs Perpetua and Felicity, who received the glorious crown of martyrdom from the Lord on the following day.
          At Derthona, Saint Marcianus, Bishop and Martyr, who, under Trajan, slain for the glory of Christ, is crowned.
          At Nicomedia, the birthday of the holy Martyrs Victor and Victorinus, who, over three years, afflicted with many torments along with Claudianus and his wife Bassa and cast into prison, there completed the course of their lives.
          In Cyprus, Saint Conon, Martyr, who, under the Emperor Decius, having nails driven into his feet and ordered to run before a chariot, fell upon his knees and, in the act of prayer, gave back his spirit.
          In Syria, the passion of the holy forty-two Martyrs, who, seized at Amorium and brought there, having performed a distinguished contest, received victoriously the palm of martyrdom.
          At Constantinople, Saint Evagrius, who, elected Bishop by the Catholics in the time of Valens and sent into exile by the same Emperor, departed to the Lord as a Confessor.
          At Bologna, Saint Basilius, Bishop, who, ordained by the holy Pope Sylvester, most holily governed the Church entrusted to him by word and example.
          At Barcelona, in Spain, Blessed Olegarius, first Canon, then Bishop of Barcelona and Archbishop of Tarragona.
          At Viterbo, Blessed Rosa, Virgin, of the Third Order of Saint Francis.
          Near Ghent, in Flanders, Saint Coleta, Virgin, who, having first professed the rule of the Third Franciscan Order, then, inspired by the Holy Spirit, restored very many monasteries of the nuns of the Second Order of the same Order to their original discipline; and, adorned with divine virtues and renowned for innumerable miracles, was enrolled by Pope Pius VII in the register of the Saints.
  psalm.pr-die-nonas-maii-31941920f1:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy [Apostle and Evangelist] John before the Latin gate at Rome. He had been brought bound from Ephesus to Rome by command of Domitian, and by the judgment of the Senate he was put into a vessel of boiling oil before the said gate, but he came out thereof cleaner and healthier than he was when he was put therein, [about the year 95.]
          Upon the same 6th day of May, were born into the better life:

          At Antioch, the holy Evodius, who, as the blessed Ignatius writeth unto the Antiochenes, was ordained the first Bishop there, by the holy Apostle Peter, and who finished his life by a glorious testimony, [in the year 62.]
          At Cyrene, [in the first century,] the holy Bishop Lucius, of whom the holy [Evangelist] Luke maketh mention in the Acts of the Apostles, [and the holy Apostle Paul in his Epistle to the Romans.]
          In Africa, the holy martyrs Heliodorus and Venustus, and seventy-five others.
          In Cyprus, [in the fourth century,] the holy Theodotus, Bishop of Cyrinia, who suffered most grievous persecution under the Emperor Licinius, but saw the peace of the Church before he gave up his spirit to God.
          At Damascus, [in the year 780,] blessed John of Damascus, famous for holiness and teaching. He strove manfully for the honouring of the holy images, both by word and writing, against the Emperor Leo the Isaurian, wherefore the Emperor commanded that his right hand should be smitten off, whereupon he commended himself to the image of the Blessed Virgin Mary which he had defended, and forthwith he received back his hand whole and sound, of whom we keep feast upon the 27th day of March.
          At Charran, in Mesopotamia, the Bishop Protogenes.
          In England, [in the year 718,] the holy Eadberth, Bishop of Lindisfarne, famous for teaching and godliness, [who held the see of Lindisfarne for eleven years next after holy Cuthbert.]
          At Rome, the holy Virgin Benedicta, [sister of the holy widow Galla.]
          At Salerno, feast is kept for the translation of the holy Apostle Matthew, whose sacred body was brought of old time out of Ethiopia into diverse countries, and at last to that city, where it was buried with all honour under the church dedicated in his name.
      la:
      - type: text
        text: |-
          Prídie Nonas Maii

          Damásci natális beáti Ioánnis Damascéni, Presbýteri, Confessóris et Ecclésiæ Doctóris, doctrína et sanctitáte célebris. Hic, pro cultu sanctárum Imáginum, verbo et scriptis advérsus Leónem Isáuricum strénue decertávit; cuius Imperatóris ob calúmnias cum ipsi Ioánni déxtera manus a Saracenórum Príncipe amputáta esset, idem, beátæ Maríæ Vírgini, cuius Imágines defénderat, se comméndans, prótinus déxteram íntegram sanámque recépit. Eius autem festívitas sexto Kaléndas Aprílis celebrátur.
          Cyréne, in Líbya, sancti Lúcii Epíscopi, quem in Actibus Apostolórum sanctus Lucas commémorat.
          Romæ sancti Ioánnis, Apóstoli et Evangelístæ, ante Portam Latínam; qui, ab Epheso, iussu Domitiáni, vinctus Romam est perdúctus, et, iudicánte Senátu, ante eándem portam in ólei fervéntis dólium missus, exívit inde purior et vegétior quam intrávit.
          Antiochíæ sancti Evódii, qui (ut beátus Ignátius ad Antiochénses scribit), primus ibídem a sancto Petro Apóstolo ordinátus Epíscopus, glorióso martýrio vitam finívit.
          In Africa sanctórum Mártyrum Heliodóri et Venústi, cum áliis septuagínta quinque.
          In Cypro sancti Theódoti, Epíscopi Cyríniæ, qui, sub Licínio Imperatóre, gravíssima passus est, ac tandem, in Ecclésiæ pace, spíritum Deo réddidit.
          Carrhis, in Mesopotámia, sancti Protógenis, Epíscopi et Confessóris.
          In Anglia sancti Eadbérti, Epíscopi Lindisfarnénsis, doctrína et pietáte insígnis.
          Romæ sanctæ Benedíctæ Vírginis.
          Salérni Translátio sancti Matthǽi, Apóstoli et Evangelístæ; cuius sacrum corpus, olim ex Æthiópia ad divérsas regiónes et demum ad eam urbem delátum, ibídem, in dedicáta eius nómine Ecclésia, summo honóre cónditum fuit.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of May
      
          At Damascus, the birthday of Blessed John of Damascus, Priest, Confessor, and Doctor of the Church, celebrated for learning and holiness. He strenuously contended by word and by writing against Leo the Isaurian for the veneration of the holy Images; and when, at the calumnies of that Emperor, his right hand had been cut off at the command of the Saracen prince, commending himself to the Blessed Virgin Mary, whose Images he had defended, he forthwith received his right hand restored whole and sound. His feast is celebrated on the twenty-seventh of March.
          At Cyrene, in Libya, Saint Lucius, Bishop, whom Saint Luke commemorates in the Acts of the Apostles.
          At Rome, Saint John, Apostle and Evangelist, before the Latin Gate; who, brought bound from Ephesus to Rome at the command of Domitian, was cast by judgment of the Senate before the same gate into a vat of boiling oil, and came out thence purer and more vigorous than when he had entered.
          At Antioch, Saint Evodius, who (as the blessed Ignatius writes to the Antiochenes) was the first ordained Bishop there by the holy Apostle Peter, and ended his life with a glorious martyrdom.
          In Africa, the holy Martyrs Heliodorus and Venustus, with seventy-five others.
          In Cyprus, Saint Theodotus, Bishop of Cyrinia, who under the Emperor Licinius suffered very greatly, and at last, in the peace of the Church, gave back his spirit to God.
          At Carrhae, in Mesopotamia, Saint Protogenes, Bishop and Confessor.
          In England, Saint Eadbert, Bishop of Lindisfarne, outstanding for learning and piety.
          At Rome, Saint Benedita, Virgin.
          At Salerno, the Translation of Saint Matthew, Apostle and Evangelist; whose sacred body, once brought from Ethiopia to various regions and at last to that city, was there enshrined with the highest honor in the church dedicated in his name.
  psalm.pr-die-nonas-nov-mbris-04b9c599de:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of November, were born into the better life:

          At Milan, (in the year 1584,) holy Charles Borromeo, Cardinal Archbishop of that city, eminent for holiness and famous for miracles, whose name Paul V enrolled among those of the Saints.
          At Bologna, the holy martyrs Vitalis and Agricola. Vitalis was a slave belonging to Agricola, to whom, in suffering martyrdom, (in the year 304,) he became an equal and a companion. Upon Vitalis the persecutors exercised every kind of torment, until there was no place in his body without some wound. He bore all steadfastly, and gave up his soul in prayer to God. While they were nailing Agricola with many nails to a cross they thereby killed him. Holy Ambrose was present at the translation of their bodies, and saith that he gathered together the nails of this martyr, his victorious blood, and the wood of his cross, and buried them under the holy altar.
          On the same day, the holy martyrs Philologus and Patrobas, disciples of the holy Apostle Paul. (According to the Greek tradition Patrobas was Bishop of Pozzuoli and then of Naples, and Philologus of Sinope, in Paphlagonia.) At Autun, the holy martyr Proculus.
          In the Vexin, the holy martyr Clarus, a Priest.
          At Ephesus, under the Emperor Aurelian, the holy martyr Porphyry.
          At Myra, in Lycia, under the President Libanius, the holy martyrs Nicander, Bishop (of that see,) and Hermas, a Priest.
          Upon the same day, the holy Pierius, a Priest of Alexandria, profoundly learned in the Scriptures of God, unblemished in life, and for Christian philosophy's sake stripped nearly of all things, and unattached. He taught the people of Alexandria admirably while Theonas ruled that Church in the time of the Princes Carus and Diocletian, and published diverse treatises. After the persecution was over he spent the rest of his life at Rome, and there fell asleep in peace, (at the beginning of the fourth century.)
          At Rodez, in Gaul, (in the year 440,) the blessed Amantius, Bishop (of that see,) whose life remains glorious on account of his holiness and miracles.
          In Bithynia, (in the year 846,) the holy Abbot Joannicius.
          At Albe-Royale, in Hungary, (in the year 1031,) the blessed Confessor Emeric, son of holy Stephen, King of Hungary.
          In the monastery of Cerfroi, in the country of Meaux, (in the year 1212,) holy Felix de Valois, Founder of the Order of the Most Holy Trinity for the Redemption of Captives, whose feast is kept by decree of Innocent XI upon the 20th day of this same month of November, but by us upon the 26th day of the same.
          At Trier, (in the year 780,) the holy Virgin Modesta.
      la:
      - type: text
        text: |-
          Prídie Nonas Novémbris

          Sancti Cároli Borromǽi Cardinális, Epíscopi Mediolanénsis et Confessóris, qui migrávit in cælum prídie huius diéi.
          Bonóniæ sanctórum Mártyrum Vitális et Agrícolæ; quorum prior posterióris servus ántea fuit, póstea consors et colléga martýrii. In ipsum porro Vitálem persecutóres ómnia tormentórum génera ita exercuérunt, ut non esset in córpore eius sine vúlnere locus, quæ ipse constánter pérferens, in oratióne spíritum Deo réddidit; Agrícolam vero, plúrimis clavis cruci affigéntes, interemérunt. Eórum translatióni sanctus Ambrósius cum interésset, Mártyris clavos, sánguinem triumphálem et crucis lignum se collegísse refert, ac sub sacris altáribus condidísse.
          In cœnóbio Cervi Frígidi, territórii Meldénsis, natális sancti Felícis Valésii, Presbýteri et Confessóris; qui Fundátor fuit Ordinis sanctíssimæ Trinitátis redemptiónis captivórum. Ipsíus autem festum, ex dispositióne Innocéntii Papæ Undécimi, celebrátur duodécimo Kaléndas Decémbris.
          Eódem die natális quoque sanctórum Philólogi et Pátrobæ, sancti Pauli Apóstoli discipulórum.
          Augustodúni sancti Próculi, Epíscopi et Mártyris.
          Myræ, in Lýcia, sanctórum Mártyrum Nicándri Epíscopi, et Hermæ Presbýteri, sub Libánio Prǽside.
          In pago Vilcassíno, in Gállia, sancti Clari, Presbýteri et Mártyris.
          Ephesi sancti Porphýrii Mártyris, sub Aureliáno Imperatóre.
          Apud Ruthénos, in Gállia, beáti Amántii Epíscopi, cuius vita éxstitit sanctitáte et miráculis gloriósa.
          Romæ natális sancti Piérii, Presbýteri Alexandríni, qui, in divínis Scriptúris nobíliter erudítus, vita puríssimus, et ad Christiánam philosophíam nudus pénitus et expedítus, sub Caro et Diocletiáno Princípibus, regénte Alexandrínam Ecclésiam Theóna, florentíssime dócuit pópulum, et divérsos tractátus édidit; post persecutiónem vero, omne vitæ suæ tempus Romæ versátus, in pace quiévit.
          In Bithýnia sancti Ioannícii Abbátis.
          Apud Albam Regálem, in Pannónia, deposítio beáti Emeríci Confessóris, qui fuit fílius sancti Stéphani, Hungarórum Regis.
          Tréviris sanctæ Modéstæ Vírginis.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of November
      
          Saint Charles Borromeo, Cardinal, Bishop of Milan, and Confessor, who passed into heaven on the day before this feast.
          At Bologna, the holy Martyrs Vitalis and Agricola; of whom the former had previously been the latter's servant, but afterward became his companion and colleague in martyrdom. Upon Vitalis himself the persecutors applied every kind of torment, so that there was no place on his body without a wound; bearing all this steadfastly, he gave back his spirit to God in prayer; Agricola they slew by affixing him to a cross with very many nails. When Saint Ambrose attended the translation of their relics, he recounts that he gathered the Martyr's nails, the triumphant blood, and the wood of the cross, and laid them under the sacred altars.
          In the monastery of Cervus Frigidus, in the territory of Meaux, the birthday of Saint Felix of Valois, Priest and Confessor; who was the Founder of the Order of the Most Holy Trinity for the Redemption of Captives. His feast, by the disposition of Pope Innocent XI, is celebrated on the twentieth of November.
          On the same day, likewise the birthday of the holy Philologus and Patrobas, disciples of the holy Apostle Paul.
          At Autun, Saint Proculus, Bishop and Martyr.
          At Myra, in Lycia, the holy Martyrs Nicander, Bishop, and Hermas, Priest, under the governor Libanius.
          In the territory of Vexin, in Gaul, Saint Clarus, Priest and Martyr.
          At Ephesus, Saint Porphyrius, Martyr, under the Emperor Aurelian.
          Near Rodez, in Gaul, Blessed Amantius, Bishop, whose life was glorious in holiness and miracles.
          At Rome, the birthday of Saint Pierius, Alexandrian Priest, who, nobly learned in the divine Scriptures, most pure in life, and utterly stripped and free for Christian philosophy, taught the people most brilliantly under the Emperors Carus and Diocletian while Theonas was governing the Alexandrian Church, and published various treatises; but after the persecution, having spent the whole remaining time of his life at Rome, rested in peace.
          In Bithynia, Saint Joannicius, Abbot.
          At Alba Regia, in Pannonia, the repose of Blessed Emeric, Confessor, who was the son of Saint Stephen, King of Hungary.
          At Trier, Saint Modesta, Virgin.
  psalm.pr-die-nonas-oct-bris-8b50544ad2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 6th day of October, were born into the better life:

          In Calabria, (in the year 1101,) the holy Confessor Bruno, Founder of the Order of Monks of the Charterhouse.
          At Laodicea, the blessed martyr Sagaris, Bishop (of that see,) who was one of the disciples of the Apostle Paul.
          At Capua, (in the fourth century,) the holy martyrs Marcellus, Castus, Emilius, and Saturninus.
          At Agen, in Gaul, (towards the end of the third century,) the holy Virgin and martyr Faith, by whose example blessed Caprasius was so stirred up to suffer martyrdom, that he finished his contending with joy.
          Likewise the holy martyr Erotis, in whom the love of Christ was so kindled that she triumphed over the flames of fire.
          At Trier is kept the memorial of a great multitude of martyrs, which man can scarcely number, who for Christ's faith's sake were put to death in diverse ways by the President Rictiovarus in the persecution under the Emperor Diocletian.
          At Auxerre, the holy martyr Romanus, Bishop (of that see, who succeeded Eleutherius and was Bishop three years.)
          At Oderzo, (about the year 660,) holy Magnus, Bishop (of that see,) whose body lieth at Venice.
          At Naples, (in the year 1791,) holy Mary Frances, of the Five Wounds of our Lord Jesus Christ, of the Third Order of Bare-footed Friars Minor of St. Peter of Alcantara, she was famous for graces and miracles, and Pope Pius IX. enrolled her name among those of the holy virgins.
      la:
      - type: text
        text: |-
          Prídie Nonas Octóbris

          In monastério Turris, diœcésis Squillacénsis, in Calábria, sancti Brunónis Confessóris, qui Ordinis Carthusianórum fuit Institútor.
          Laodicéæ, in Phrýgia, beáti Ságaris, Epíscopi et Mártyris; qui éxstitit unus de antíquis Pauli Apóstoli discípulis.
          Antisiodóri sancti Románi, Epíscopi et Mártyris.
          Cápuæ natális sanctórum Mártyrum Marcélli, Casti, Æmílii et Saturníni.
          Tréviris commemorátio innumerabílium fere Mártyrum, qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, ob Christi fidem, vario mortis génere necáti sunt.
          Agénni, in Gállia, natális sanctæ Fídei, Vírginis et Mártyris; cuius exémplo beátus Caprásius, ad martýrium animátus, agónem suum tertiodécimo Kaléndas Novémbris felíciter consummávit.
          Item sanctæ Erótidis Mártyris, quæ, Christi amóre succénsa, ignis superávit incéndium.
          Opitérgii, in Venetórum fínibus, sancti Magni Epíscopi, cuius corpus Venétiis requiéscit.
          Neápoli, in Campánia, deposítio sanctæ Maríæ-Francíscæ a Quinque Vulnéribus Dómini nostri Iesu Christi, Vírginis, ex tértio Ordine sancti Francísci, quæ, virtútibus et miráculis clara, a Pio Papa Nono sanctis Virgínibus adscrípta fuit.
      en2:
      - type: text
        text: |-
          The Fifth Day before the Nones of October
      
          In the monastery of La Torre, in the diocese of Squillace, in Calabria, Saint Bruno, Confessor, who was the Founder of the Carthusian Order.
          At Laodicea, in Phrygia, Blessed Sagaris, Bishop and Martyr; who was one of the ancient disciples of the Apostle Paul.
          At Auxerre, Saint Romanus, Bishop and Martyr.
          At Capua, the birthday of the holy Martyrs Marcellus, Castus, Aemilius, and Saturninus.
          At Trier, the commemoration of almost innumerable Martyrs, who, in the persecution of Diocletian under the governor Rictiovarus, were slain for the faith of Christ by various kinds of death.
          At Agen, in Gaul, the birthday of Saint Faith, Virgin and Martyr; whose example inspired Blessed Caprarius to take courage for martyrdom, and happily completed his own contest on the twentieth of October.
          Likewise, Saint Erotis, Martyr, who, kindled with love of Christ, overcame the blaze of fire.
          At Oderzo, in the territory of the Veneti, Saint Magnus, Bishop, whose body rests at Venice.
          At Naples, in Campania, the repose of Saint Mary-Frances of the Five Wounds of Our Lord Jesus Christ, Virgin, of the Third Order of Saint Francis, who, renowned for virtues and miracles, was solemnly enrolled by Pope Pius IX among the holy Virgins.
  psalm.pr-die-nonas-sept-mbris-f4ed3756be:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of September is commemorated

          The death of the holy Law-giver and Prophet Moses, upon Mount Nebo, in the land of Moab.
          Upon the same 4th day of September, were born into the better life:
          At Ancyra, in Galatia, the three holy children Rufinus, Silvanus, and Vitalicus, all martyrs.
          At Chalons, in Gaul, under the Emperor Antonine, the holy martyr Marcellus he was bidden by Priscus the President to a sinful banquet, and, in his horror at such a feast, he boldly rebuked all them that were there for their serving of idols wherefore the same President, with strange cruelty, caused him to be buried in the earth up to the girdle, where he remained for three days still giving praise to God, and then yielded up to Him his spirit without stain.
          On the same day, the holy martyrs Magnus, Castus, and Maximus.
          At Trier, (in the third century,) the holy martyr Marcellus, Bishop (of that see.) On the same day holy Thamel, who had once been a priest of idols, and his Companions, all martyrs under the Emperor Hadrian.
          Likewise the holy martyrs Theodore, Oceanus, Ammian, and Julian, who, under the Emperor Maximian, suffered martyrdom by having their feet cut off, and being then cast into a fire.
          At Rimini, (in the fourth century,) the holy Deacon Marinus.
          At Palermo, (in the year 1160,) the holy Rosalie, a Virgin of that city, sprung of the Imperial blood of Karl the Great, who for the love of Christ forsook her hereditary principality and her palace, and led an heavenly life alone upon the mountains and in caves of the earth.
          At Naples, in Campania, holy Candida, who was the first to meet the holy Apostle Peter when he came to that city. She was baptized by him, and in the end she fell asleep in an holy death. There also, (in the sixth century,) holy Candida, called the Younger, famous for miracles.
          At Viterbo, (in the year 1252,) the blessed Virgin Rose, (of the Third Order of Friars Minor.)
      la:
      - type: text
        text: |-
          Prídie Nonas Septémbris

          In monte Nebo, terræ Moab, sancti Móysis, legislatoris et Prophétæ.
          Neápoli, in Campánia, natális sanctæ Cándidæ, quæ sancto Petro Apóstolo, ad eam urbem veniénti, prima occúrrit, atque, ab eo baptizáta, póstea sancto fine quiévit.
          Tréviris sancti Marcélli, Epíscopi et Mártyris.
          Ancýræ, in Galátia, natális sanctórum trium puerórum Mártyrum, id est Rufíni, Silváni et Vitálici.
          Eódem die sanctórum Mártyrum Magni, Casti et Máximi.
          Cabillóne, in Gálliis, sancti Marcélli Mártyris, qui, sub Antoníno Imperatóre, cum a Prǽside Prisco ad profanum convívium fuísset invitátus, et, huiúsmodi épulas éxsecrans, omnes qui áderant, cur idólis deservírent, líbera increpatióne corríperet, ab eódem Prǽside, inaudíto crudelitátis génere, cíngulo tenus defóssus est in terra; sicque, cum in Dei láudibus tríduo perseverásset, incontaminátum spíritum réddidit.
          Eódem die sanctórum Thamélis, ántea idolórum sacerdótis, et Sociórum Mártyrum, sub Hadriáno Imperatóre.
          Item sanctórum Mártyrum Theodóri, Oceáni, Ammiáni et Iuliáni; qui sub Maximiáno Imperatóre, disséctis pédibus in ignem coniécti, martýrium consummárunt.
          Romæ sancti Bonifátii Primi, Papæ et Confessóris.
          Arímini sancti Maríni Diáconi.
          Panórmi natális sanctæ Rosáliæ, Vírginis Panormitánæ, ex régio Cároli Magni sánguine ortæ; quæ, pro Christi amóre, patérnum principátum aulámque profúgit, et, in móntibus ac spelúncis solitária, cæléstem vitam duxit.
          Vitérbii Translátio beátæ Rosæ Vírginis, ex tértio Ordine sancti Francísci, témpore Alexándri Papæ Quarti.
      en2:
      - type: text
        text: |-
          The day before the Nones of September
      
          On Mount Nebo, in the land of Moab, of holy Moses, lawgiver and Prophet.
          At Naples, in Campania, the birth into heaven of holy Candida, who was the first to meet blessed Peter the Apostle as he came to that city, and, having been baptized by him, afterwards fell asleep in a holy end.
          At Trier, of holy Marcellus, Bishop and Martyr.
          At Ancyra, in Galatia, the birth into heaven of three holy boy Martyrs: Rufinus, Silvanus, and Vitalicus.
          On the same day, of holy Martyrs Magnus, Castus, and Maximus.
          At Chalon, in Gaul, of holy Marcellus, Martyr; who, under the Emperor Antoninus, having been invited by the prefect Priscus to a profane banquet, and, holding such a feast in abhorrence, rebuked with open reproach all those present for serving idols, was buried up to his waist in the earth by that same prefect in a form of cruelty without precedent; and so, having persevered for three days in the praises of God, yielded up his undefiled spirit.
          On the same day, of holy Thamelus, formerly a priest of idols, and of his companion Martyrs, under the Emperor Hadrian.
          Likewise of holy Martyrs Theodore, Oceanus, Ammianus, and Julian; who, under the Emperor Maximian, had their feet split and were cast into fire, and so completed their martyrdom.
          At Rome, of holy Boniface I, Pope and Confessor.
          At Rimini, of holy Marinus, Deacon.
          At Palermo, the birth into heaven of holy Rosalia, Virgin of Palermo, of the royal blood of Charlemagne; who, for love of Christ, fled her father's principality and court, and, living as a solitary in mountains and caves, led a heavenly life.
          At Viterbo, the Translation of blessed Rose, Virgin, of the Third Order of Saint Francis, in the time of Pope Alexander IV.
  psalm.quarto-idus-apr-lis-e7931ac160:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of April, were born into the better life:

          The prophet Ezechiel, who was put to death [570 B.C.] at Babylon by a judge of the people of Israel because he had rebuked him for worshipping idols. He was buried in the sepulchre of Shem and Arphaxad, the forefathers of Abraham, and many have been used to resort thither to pray.
          At Rome, very many holy martyrs, who were baptized by holy Pope Alexander, [in the years 101- 109,] while he was kept in prison. The Prefect Aurelian caused them all to be put on board an old ship and carried to the deep sea, where they were drowned, with stones tied round their necks, [in the year 116.]
          At Alexandria, the holy martyrs the Priest Apollonius and five others, who were drowned in the sea in the persecution under the Emperor Maximian.
          In Africa, under the Emperor Decius and the Prefect Fortunian, the holy martyrs Terence, Africanus, Pompey, and their Companions, who were beaten with rods, racked, and tormented in diverse other ways, and at length beheaded, and so finished their testimony.
          Upon the same day, [in the year 1012,] holy Macarius, Patriarch of Antioch, famous for his graces and miracles.
          At Valladolid, in Spain, [in the year 1625,] the holy Confessor Michael de Sanctis, a Barefooted Friar of the Order of the Most Holy Trinity for the Redemption of Captives, eminent for the innocency of his life, the wonderful depth of his penance, and his excelling love of God, his name The Supreme Pontiff Pius IX. enrolled among those of the Saints.
      la:
      - type: text
        text: |-
          Quarto Idus Aprílis

          Apud Babylónem sancti Ezechiélis Prophétæ, qui, a Iúdice pópuli Israël, quod eum de cultu idolórum argúeret, interféctus, in sepúlcro Sem et Arpháxad, Abrahæ progenitórum, sepúltus est; ad quod sepúlcrum, oratiónis causa, multi conflúere consuevérunt.
          Romæ natális plurimórum sanctórum Mártyrum, quos sanctus Alexánder Papa, cum detinerétur in cárcere, baptizávit. Hos autem omnes Aureliánus Præféctus, navi vetústæ impósitos, in altum mare dedúci, et illic, ligátis ad colla lapídibus, mergi præcépit.
          Alexandríæ sanctórum Mártyrum Apollónii Presbýteri, et aliórum quinque, qui, in persecutióne Maximiáni, in mare demérsi sunt.
          In Africa sanctórum Mártyrum Teréntii, Africáni, Pompéii et Sociórum; qui, sub Décio Imperatóre et Fortuniáno Præfécto, virgis cæsi, equúleis torti aliísque supplíciis cruciáti, demum cápitis obtruncatióne martýrium complevérunt.
          Gandávi, in Flándria, sancti Macárii, Epíscopi Antiochéni, virtútibus et miráculis clari.
          Vallisoléti, in Hispánia, sancti Michaélis de Sanctis, ex Ordine Discalceatórum sanctíssimæ Trinitátis redemptiónis captivórum, Confessóris, innocéntia vitæ, admirábili pæniténtia et caritáte in Deum exímii; quem Pius Nonus, Póntifex Máximus, inter Sanctos rétulit.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of April
      
          At Babylon, of holy Ezekiel the Prophet, who was slain by a judge of the people of Israel for rebuking him concerning the worship of idols, and was buried in the tomb of Shem and Arphaxad, the forebears of Abraham; to which tomb many were accustomed to come for the sake of prayer.
          At Rome, the birth into heaven of a great number of holy Martyrs, whom holy Pope Alexander baptized while he was held in prison. Aurelianus the Prefect commanded them all to be placed on a rotting ship, brought out to the high sea, and there, with stones bound to their necks, drowned.
          At Alexandria, of holy Martyrs Apollonius the Priest, and five others, who, in the persecution of Maximian, were cast into the sea.
          In Africa, of holy Martyrs Terentius, Africanus, Pompeius, and their companions; who, under the Emperor Decius and the prefect Fortunianus, beaten with rods, racked on the horse, and tormented with other punishments, at last completed their martyrdom by beheading.
          At Ghent, in Flanders, of holy Macarius, Bishop of Antioch, renowned for virtues and miracles.
          At Valladolid, in Spain, of holy Michael de Sanctis, of the Order of the Discalced of the Most Holy Trinity for the Redemption of Captives, Confessor, outstanding for innocence of life, admirable penance, and charity toward God; whom Pope Pius IX enrolled among the Saints.
  psalm.quarto-idus-aug-sti-7047c6d7ed:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of August, were born into the better life:

          At Rome, upon the Tiburtine Way, [in the year 258,] the blessed Archdeacon Lawrence. In the persecution under the Emperor Valerian he suffered many torments, diverse stripes, armed scourges, cudgels, and whips loaded with lead, and plates of heated metal, and at the last he was laid upon a bed of iron bars over a slow fire, and so finished his testimony. His body was buried in the cemetery of St. Cyriaca in the Veran field by blessed Hippolytus and Justin the Priest.
          Likewise at Rome, [in the third century,] one hundred and sixty-five holy soldiers, who suffered martyrdom under the Emperor Aurelian.
          At Bergamo, in the persecution under the Emperors Diocletian and Maximian, the holy Virgin and martyr Asteria.
          At Alexandria are commemorated the holy martyrs, who under the President Aemilian, in the persecution under the Emperor Valerian, were long tortured with diverse and terrible torments, and gained the crown of martyrdom by diverse kinds of death.
          At Carthage, the holy Virgins Bassa, Paula, and Agathonica, all martyrs.
          At Rome, [in the sixth century,] the holy Confessor Deus Dedit, who gave to the poor every Saturday whatever he had gained by working with his hands throughout the week.
          In Spain, the apparition of the Blessed Virgin Mary, styled of Ransom, Foundress of the Order for the Redemption of Captives, established in her name.
      la:
      - type: text
        text: |-
          Quarto Idus Augústi

          Romæ, via Tiburtína, natális beáti Lauréntii Archidiáconi, qui, in persecutióne Valeriáni, post plúrima torménta cárceris, vérberum diversórum, fústium, ac plumbatárum et laminárum ardéntium, ad últimum, in cratícula férrea assátus, martýrium complévit; eiúsque corpus a beáto Hippólyto et Iustíno Presbýtero sepúltum fuit in cœmetério Cyríacæ, in agro Veráno.
          In Hispánia Apparítio beátæ Maríæ Vírginis de Mercéde nuncupátæ, quæ Ordinis redemptiónis captivórum sub eius nómine Institútrix fuit. Ipsíus autem festívitas octávo Kaléndas Octóbris recólitur.
          Romæ pássio sanctórum centum sexagínta quinque mílitum Mártyrum, sub Aureliáno Imperatóre.
          Alexandríæ commemorátio sanctórum Mártyrum, qui, in persecutióne Valeriáni, sub Prǽside Æmiliáno, divérsis exquisitísque torméntis diútius cruciáti, vario mortis génere corónam martýrii sunt adépti.
          Bérgomi sanctæ Astériæ, Vírginis et Mártyris, in persecutióne Diocletiáni et Maximiáni Imperatórum.
          Carthágine sanctárum Vírginum et Mártyrum Bassæ, Paulæ et Agathonícæ.
          Romæ sancti Deúsdedit Confessóris, qui quod in hebdómada mánibus suis operándo lucrabátur, die sábbati paupéribus erogábat.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of August
      
          At Rome, on the Tiburtine Way, the birth into heaven of blessed Lawrence, Archdeacon, who, in the persecution of Valerian, after very many torments of prison, diverse floggings, cudgels, leaded scourges, and burning plates, was at last roasted on an iron gridiron and so completed his martyrdom; and his body was buried by blessed Hippolytus and the priest Justinus in the cemetery of Cyriaca, in the field of Veranus.
          In Spain, the Apparition of the Blessed Virgin Mary called of Mercy, who was the foundress of the Order for the redemption of captives under her name. Her feast is kept on the eighth before the Kalends of October.
          At Rome, the passion of holy one hundred and sixty-five soldier Martyrs, under the Emperor Aurelian.
          At Alexandria, the commemoration of holy Martyrs who, in the persecution of Valerian under the prefect Aemilianus, having been tormented for a long time with diverse and exquisite punishments, obtained the crown of martyrdom in various kinds of death.
          At Bergamo, of holy Asteria, Virgin and Martyr, in the persecution of the Emperors Diocletian and Maximian.
          At Carthage, of holy Virgins and Martyrs Bassa, Paula, and Agathonica.
          At Rome, of holy Deusdedit, Confessor, who gave to the poor on the Sabbath day whatever he had earned by the labor of his hands during the week.
  psalm.quarto-idus-dec-mbris-68442b3d66:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of December, were born into the better life:

          At Rome, the holy Pope Melchiades, (who reigned three years, 7 months, and 62 days, from the year 310 till January 10, 314,) who suffered much in the persecution under the Emperor Maximian, but fell asleep in the Lord after peace had been restored to the church.
          Upon the same day the holy martyrs Carpophorus the Priest, and Abundius the Deacon. In the persecution under the Emperor Diocletian they were first most cruelly cudgelled and recommitted to prison, where they were denied food and drink, then they were racked, and suffered long imprisonment, and lastly were beheaded, (in the year 303.)
          At Merida, (in Estramadura,) in Spain, (in the same year,) under the Emperor Maximian, the holy Virgin and martyr Eulalia, at the age of twelve years. The President Dacian commanded her to be put to many tortures for confessing Christ at last she was hung upon the rack, and lacerated with hooks and, burning torches being put to her sides, some of the flame and smoke went down her throat and she gave up the ghost.
          Likewise at Merida, the holy Virgin and martyr Julia, who was a Companion of the blessed Eulalia, and the only one who clave unto her as she went to suffer.
          At Alexandria, under the Emperor Gallerius Maximian, the holy martyrs Mennas, Hermogenes, and Eugraphus.
          At Lentini, in Sicily, the holy soldiers, Mercury and his Companions, all martyrs, who were slain with the sword in the time of the Emperor Licinius, under the President Tertyllus.
          At Ancyra, in Galatia, the holy martyr Gemellus, who, after most grievous torments under the Emperor Julian the Apostate, achieved martyrdom by the death of the cross.
          At Vienne, (about the year 650) the holy Confessor Sindulph, Bishop (of that see).
          At Brescia, holy Deusdedit, Bishop (of that see).
          At Loreto, in Picenum, is commemorated the translation, (in the year 1294) of the holy house of Mary the Mother of God, wherein the Word was made flesh.
      la:
      - type: text
        text: |-
          Quarto Idus Decémbris

          Sancti Melchíadis, Papæ et Mártyris, cuius dies natális recensétur tértio Idus Ianuárii.
          Romæ, via Ostiénsi, Dedicátio Basílicæ sancti Pauli Apóstoli; quæ, simul cum Dedicatióne Basílicæ sancti Petri, Apostolórum Príncipis, annua celebritate recólitur quartodécimo Kaléndas Ianuárii.
          Eódem die sanctórum Mártyrum Carpóphori Presbýteri, et Abúndii Diáconi; qui, in Diocletiáni persecutióne, primo fústibus crudelíssime cæsi, deínde in cárcerem, negáto cibo et potu, retrúsi, et rursum in equúleo torti, et post hæc diu in cárcere maceráti, novíssime gládio percússi sunt.
          Alexandríæ sanctórum Mártyrum Mennæ, Hermógenis et Eugraphi; qui sub Galério Maximiáno passi sunt.
          Apud Leontínos, in Sicília, sanctórum Mártyrum Mercúrii et Sociórum mílitum; qui, sub Tertýllo Prǽside, témpore Licínii Imperatóris, gládio cæsi sunt.
          Ancýræ, in Galátia, sancti Gemélli Mártyris, qui, post dira torménta, sub Iuliáno Apóstata, crucis supplício martýrium consummávit.
          Eméritæ, in Hispánia, pássio sanctæ Euláliæ Vírginis, quæ, sub Maximiáno Imperatóre, cum esset annórum duódecim, ibi, iussu Daciáni Prǽsidis, pro confessióne Christi, plúrima torménta est perpéssa; novíssime, in equúleo suspénsa et exunguláta, fáculis ardéntibus ex utróque látere appósitis, hausto igne, spíritum réddidit.
          Item ibídem sanctæ Iúliæ, Vírginis et Mártyris; quæ beátæ Euláliæ sócia fuit, et illi ad passiónem properánti indivídua comes adhǽsit.
          Romæ beáti Gregórii Papæ Tértii, qui sanctitáte meritísque præclárus migrávit in cælum.
          Viénnæ, in Gállia, sancti Sindúlphi, Epíscopi et Confessóris.
          Bríxiæ sancti Deúsdedit Epíscopi.
          Lauréti, in Picéno, Translátio sacræ Domus Genitrícis Dei Maríæ, qua in domo Verbum caro factum est. Ipsam vero beatíssimam Vírginem, Lauretánæ título nuncupátam, Benedíctus Papa Décimus quintus ómnibus aëreonáutis præcípuam apud Deum Patrónam attríbuit.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of December
      
          Of holy Miltiades, Pope and Martyr, whose day of birth into heaven falls on the third before the Ides of January.
          At Rome, on the Ostian Way, the Dedication of the Basilica of holy Paul the Apostle; which, together with the Dedication of the Basilica of holy Peter, Prince of the Apostles, is recalled with an annual celebration on the fourteenth before the Kalends of January.
          On the same day, of holy Martyrs Carpophorus the Priest and Abundius the Deacon; who, in the persecution of Diocletian, were first most cruelly beaten with cudgels, then thrust into prison and denied food and drink, and again racked on the horse, and after this long wasted in prison, and finally struck down with the sword.
          At Alexandria, of holy Martyrs Mennas, Hermogenes, and Eugraphus; who suffered under Galerius Maximian.
          At Leontini, in Sicily, of holy Martyrs Mercurius and his companion soldiers; who, under the prefect Tertullus, in the time of the Emperor Licinius, were struck down with the sword.
          At Ancyra, in Galatia, of holy Gemellus, Martyr; who, after terrible torments, under Julian the Apostate, completed his martyrdom by the punishment of the cross.
          At Mérida, in Spain, the passion of holy Eulalia, Virgin; who, under the Emperor Maximian, being twelve years of age, there, by the order of the prefect Dacianus, endured very many torments for her confession of Christ; and at last, suspended on the rack and torn with iron hooks, with burning torches applied to each side, she breathed in the fire and yielded her spirit.
          Likewise there, of holy Julia, Virgin and Martyr; who was a companion of blessed Eulalia, and cleaved to her as an inseparable companion as she hastened to her passion.
          At Rome, of blessed Pope Gregory III, who, renowned for holiness and merits, passed over to heaven.
          At Vienne, in Gaul, of holy Sindulphus, Bishop and Confessor.
          At Brescia, of holy Deusdedit, Bishop.
          At Loreto, in Picenum, the Translation of the holy House of Mary, Mother of God, in which house the Word was made flesh. Pope Benedict XV assigned the most blessed Virgin, named under the title of Loreto, as the principal Patroness before God of all those who travel by air.
  psalm.quarto-idus-febru-rii-82ab60c464:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of February, were born into the better life:

          At Monte Cassino, [in the year 543,] the holy Virgin Scholastica, sister of the holy Abbot Benedict, who saw her soul leave her body and soar heavenward in a bodily shape, like a dove.
          At Rome, the holy martyrs Zoticus, Irenaeus, Hyacinth, and Amantius, [all in the year 304.]
          At Rome likewise, [under Decius,] upon the Lavican Way, ten holy martyrs, all soldiers.
          Also at Rome, [in the year 304,] upon the Appian Way, the holy Virgin and martyr Soteres, who, as holy Ambrose writeth, was born of a noble family, but for Christ's sake despised the consular and prefectural dignities of her race. When she was commanded to offer sacrifice and would not, she was long and heavily buffeted, and when she had overcome other punishments also, she was smitten with the sword and so departed joyfully hence, to be ever with Christ the Bridegroom.
          In Campania, the holy Confessor Silvan, Bishop of [Terracine, in the fourth or fifth century.]
          At Mala-Vallis, in the country of Siena, [in the year 1157,] the holy hermit William.
          At Rouen, [in the year 704,] the holy Virgin Austreberta, famous for miracles.
      la:
      - type: text
        text: |-
          Quarto Idus Februárii

          Apud montem Cassínum sanctæ Scholásticæ Vírginis, soróris sancti Benedícti Abbátis, qui eius ánimam, instar colúmbæ, migrántem e córpore in cælum ascéndere vidit.
          Romæ sanctórum Mártyrum Zótici, Irenǽi, Hyacínthi et Amántii.
          Ibídem, via Lavicána, sanctórum decem mílitum Mártyrum.
          Item Romæ, via Appia, sanctæ Sotéris, Vírginis et Mártyris; quæ (ut scribit sanctus Ambrósius), nóbili génere nata, paréntum Consulátus et Præfectúras ob Christum contémpsit. Hæc, iussa idólis immoláre, et non acquiéscens, gráviter et diutíssime álapis cæsa est; et, cum cétera quoque pœnárum génera vicísset, demum, percússa gládio, læta migrávit ad Sponsum.
          In Campánia sancti Silváni, Epíscopi et Confessóris.
          In Stábulo Rhodis, in território Senénsi, sancti Guiliélmi Eremítæ.
          In pago Rotomagénsi sanctæ Austrebértæ Vírginis, miráculis célebris.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of February
      
          At Monte Cassino, of holy Scholastica, Virgin, sister of holy Benedict, Abbot, whose soul he saw depart from her body and ascend to heaven in the likeness of a dove.
          At Rome, of holy Martyrs Zoticus, Irenaeus, Hyacinthus, and Amantius.
          There likewise, on the Lavican Way, of the ten holy soldier Martyrs.
          Likewise at Rome, on the Appian Way, of holy Sotera, Virgin and Martyr; who (as Saint Ambrose writes), born of a noble family, despised for Christ's sake her parents' consulships and prefectures. She was commanded to sacrifice to idols, and, refusing, was slapped heavily and for a very long time; and, having overcome all the other kinds of punishments as well, she was at last struck with the sword and joyfully passed over to the Spouse.
          In Campania, of holy Silvanus, Bishop and Confessor.
          At Stabulum Rhodis, in the territory of Siena, of holy William, Hermit.
          In the district of Rouen, of holy Austrebertha, Virgin, renowned for miracles.
  psalm.quarto-idus-i-lii-ea1fb6a846:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of July, were born into the better life:

          At the monastery of Passignano, near Florence, the holy Abbot John Gualberto, [in the year 1073,] founder of the Order of Vallombrosa.
          At Milan, the holy martyrs Nabor and Felix, who suffered in the persecution under the Emperor Maximian.
          In Cyprus, the blessed Jason, [Bishop of Cyprus, his native land. His name is properly Mnason,] an old disciple of Christ.
          At Aquileia, the holy martyr Hermagoras, a disciple of the blessed Evangelist Mark, and the first Bishop of the said city. He was performing miracles of healing, preaching without ceasing, and converting the people, when he was many ways punished and at last beheaded, along with his Deacon Fortunatus, and so won an everlasting crown, [under Nero.]
          At Lucca, in Tuscany, the blessed martyr Paulinus, who was ordained by the holy apostle Peter the first Bishop of that city. Under the emperor Nero, after many contendings, he finished his testimony along with others his Companions at the foot of Monte Pisano.
          On the same day, the holy martyrs Proclus and Hilarion, who gained the palm of martyrdom through most dire torments under the Emperor Trajan and President Maximus.
          At Lentini, in Sicily, the holy Epiphana, who had her breasts cut off, and so gave up the ghost, under the Emperor Diocletian and the President Tertyllus.
          At Toledo, the holy Virgin and martyr Marciana, who for Christ's faith's sake was thrown to wild beasts and gored by a bull, and so crowned with martyrdom, [fourth century.]
          At Lyon, holy Viventiolus, [24th] Bishop [of that see, in the year 524. He was a monk of Coudak, in the diocese of Saint-Claude, of the Order of St. Benedict.]
          At Bologna, holy Paternian, Bishop [of that see, about the year 470.]
      la:
      - type: text
        text: |-
          Quarto Idus Iúlii

          In monastério Passiniáno, prope Floréntiam, sancti Ioánnis Gualbérti Abbátis, qui fuit Institútor Ordinis Vallis Umbrósæ.
          Laudæ, in Insúbria, sanctórum Mártyrum Nabóris et Felícis, qui, in persecutióne Maximiáni, post vária torménta, cápitis decollatióne martýrium complevérunt; eorúmque córpora a beáta Savína Mediolánum advécta sunt, ibíque honorífice sepúlta.
          In Cypro beáti Iásonis, qui fuit unus ex antíquis Christi discípulis.
          Lucæ, in Túscia, beáti Paulíni, qui a sancto Petro Apóstolo primus eiúsdem civitátis Epíscopus est ordinátus; et, sub Neróne, ad radíces montis Pisáni, post multos agónes, martýrium suum cum áliis Sóciis consummávit.
          Aquiléiæ natális sancti Hermágoræ, qui éxstitit discípulus beáti Marci Evangelístæ, et primus eiúsdem civitátis Epíscopus. Hic, inter mirácula sanitátum, et prædicatiónis instántiam, ac populórum conversiónem, plúrima pœnárum génera expértus, tandem, una cum Diácono suo Fortunáto, capitáli supplício perpétuum méruit obtinére triúmphum.
          Eódem die pássio sanctórum Procli et Hilariónis, qui, sub Traiáno Imperatóre et Máximo Prǽside, per acerbíssima torménta ad palmam martýrii pervenérunt.
          Toléti, in Hispánia, sanctæ Marciánæ, Vírginis et Mártyris; quæ pro fide Christi, obiécta béstiis atque a tauro discérpta, martýrio coronátur.
          Apud Leontínos, in Sicília, sanctæ Epíphanæ, quæ sub Diocletiáno Imperatóre et Tertýllo Prǽside, ubéribus præcísis, réddidit spíritum.
          Lugdúni, in Gállia, sancti Viventióli Epíscopi.
          Bonóniæ sancti Paterniáni Epíscopi.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of July
      
          In the monastery of Passignano, near Florence, of holy John Gualbert, Abbot, who was the founder of the Order of Vallombrosa.
          At Lodi, in Lombardy, of holy Martyrs Nabor and Felix, who, in the persecution of Maximian, after various torments, completed their martyrdom by beheading; and their bodies were brought by blessed Savina to Milan, where they were honorably buried.
          In Cyprus, of blessed Jason, who was one of the ancient disciples of Christ.
          At Lucca, in Tuscany, of blessed Paulinus, who was ordained the first Bishop of that same city by blessed Peter the Apostle; and, under Nero, at the foot of the Pisan mountain, after many contests, completed his martyrdom together with his companions.
          At Aquileia, the birth into heaven of holy Hermagoras, who was a disciple of blessed Mark the Evangelist and the first Bishop of that same city. He, amid the miracles of healings, the urgency of preaching, and the conversion of peoples, and having experienced very many kinds of punishment, at last, together with his Deacon Fortunatus, by capital punishment merited to obtain the everlasting triumph.
          On the same day, the passion of holy Proclus and Hilarion, who, under the Emperor Trajan and the prefect Maximus, through most bitter torments, attained the palm of martyrdom.
          At Toledo, in Spain, of holy Marciana, Virgin and Martyr; who, for faith in Christ, was exposed to beasts and torn apart by a bull, and was crowned with martyrdom.
          At Leontini, in Sicily, of holy Epiphana, who, under the Emperor Diocletian and the prefect Tertullus, had her breasts cut off and yielded up her spirit.
          At Lyons, in Gaul, of holy Viventiolus, Bishop.
          At Bologna, of holy Paterianus, Bishop.
  psalm.quarto-idus-i-nii-9d12458ba0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of June, were born into the better life:

          In Scotland, the holy Queen Margaret, famous for her love for the poor and her voluntary poverty.
          At Rome, upon the Salarian Way, the blessed Getulius, a man of great eminence and learning, and his Companions Cerealis, Amantius, and Primitivus. At the command of the Emperor Hadrian they were tortured by Licinius the Consular first hided, then thrust into prison, lastly committed to the flames, but as the fire would nowise hurt them, their heads were beaten in with clubs, and so they finished their testimony. Sympharosa, the wife of blessed Getulius, gathered their bodies together and honourably buried them in a sand-pit upon her own farm.
          Also at Rome, upon the Aurelian Way, holy Basilides, Tripodes, Mandales, and twenty other martyrs, who suffered under the Emperor Aurelian and Plato, the Prefect of the city.
          At Nicomedia, the holy martyr Zacharia.
          In the dominions of Prusias, in Bithynia, [in the fourth century,] holy Timothy, Bishop [there,] martyr under Julian the Apostate.
          In Spain, the holy martyrs Crispulus and Restitutus.
          In Africa, the holy martyrs Aresius, Rogatus, and fifteen others.
          At Cologne, the holy martyr the Abbot Maurinus.
          At Petra, in Arabia, the holy Asterius, Bishop [of that see,] who, for the Catholic faith's sake, suffered many things of the Arians, and by the Emperor Constantius was banished into Africa and died a glorious Confessor.
          At Naples, in Campania, the holy martyr Maximus, Bishop [of that see,] who was banished by the same Emperor Constantius for his unshaken confession of the Nicene faith, and there died worn out by suffering.
          At Auxerre, [early in the sixth century,] holy Censurius, Bishop [of that see.]
      la:
      - type: text
        text: |-
          Quarto Idus Iúnii

          Sanctæ Margarítæ Víduæ, Scotórum Regínæ, quæ sextodécimo Kaléndas Decémbris obdormívit in Dómino.
          Romæ, via Salária, pássio beáti Getúlii, claríssimi et doctíssimi viri, ac susceptórum e sancta uxóre Symphorósa beatórum septem fratrum Mártyrum patris, eiúsque Sociórum Cæreális, Amántii et Primitívi. Hi omnes, Hadriáni Imperatóris iussu, a Licínio Consulári tenti, primum cæsi sunt, deínde in cárcerem trusi; postrémum, incéndio tráditi, sed nullo modo ab igne læsi, martýrium suum, fústibus illiso cápite, complevérunt. Ipsórum autem córpora Symphorósa, beáti Getúlii uxor, collégit, et in arenário prǽdii sui honorífice sepelívit.
          Item Romæ, via Aurélia, natális sanctórum Basílidis, Trípodis, Mándalis et aliórum vigínti Mártyrum, sub Imperatóre Aureliáno et Urbis Præfécto Platóne.
          Neápoli, in Campánia, sancti Máximi, Epíscopi et Mártyris; qui, ob strénuam Nicǽnæ fídei confessiónem, a Constántio Imperatóre in exsílium pulsus, ibídem, ærúmnis conféctus, decéssit.
          Prusæ, in Bithýnia, sancti Timóthei, Epíscopi et Mártyris, qui, sub Iuliáno Apóstata, cum Christum eiuráre noluísset, idcírco, ipsíus Imperatóris iussu, cápite abscíssus est.
          Colóniæ Agrippínæ sancti Mauríni, Abbátis et Mártyris.
          Nicomedíæ sancti Zacharíæ Mártyris.
          In Hispánia sanctórum Mártyrum Críspuli et Restitúti.
          In Africa sanctórum Mártyrum Arésii, Rogáti et aliórum quíndecim.
          Petræ, in Arábia, sancti Astérii Epíscopi, qui, ob fidem cathólicam, ab Ariánis multa passus et ab Imperatóre Constántio in Africam relegátus est, ac tandem, in Ecclésiam suam restitútus, Conféssor gloriósus occúbuit.
          Antisiodóri sancti Censúrii Epíscopi.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of June
      
          Of holy Margaret, Widow, Queen of Scots, who fell asleep in the Lord on the sixteenth before the Kalends of December.
          At Rome, on the Salarian Way, the passion of blessed Getulius, a most distinguished and learned man, and father of the seven blessed brother Martyrs born to him by his holy wife Symphorosa, and of his companions Cerealis, Amantius, and Primitivus. All these, seized by the order of the Emperor Hadrian by the consular Licinius, were first beaten, then thrust into prison; and finally handed over to fire, but by no means harmed by the flames, they completed their martyrdom when their heads were crushed with cudgels. And their bodies were gathered by Symphorosa, the wife of blessed Getulius, and honorably buried in a sandpit of his estate.
          Likewise at Rome, on the Aurelian Way, the birth into heaven of holy Basilides, Tripodes, Mandalis, and twenty other Martyrs, under the Emperor Aurelian and Plato, Prefect of the City.
          At Naples, in Campania, of holy Maximus, Bishop and Martyr; who, for his strenuous confession of the Nicene faith, was driven into exile by the Emperor Constantius, and there, worn down by hardships, departed this life.
          At Prusa, in Bithynia, of holy Timothy, Bishop and Martyr, who, under Julian the Apostate, having refused to renounce Christ, was therefore beheaded by order of the Emperor himself.
          At Cologne, of holy Maurinus, Abbot and Martyr.
          At Nicomedia, of holy Zacharias, Martyr.
          In Spain, of holy Martyrs Crispulus and Restitutus.
          In Africa, of holy Martyrs Aresius, Rogatus, and fifteen others.
          At Petra, in Arabia, of holy Asterius, Bishop, who, for the Catholic faith, suffered much from the Arians and was banished to Africa by the Emperor Constantius, and at last, restored to his own Church, died a glorious Confessor.
          At Auxerre, of holy Censurius, Bishop.
  psalm.quarto-idus-ianu-rii-5fdcb47d8f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of January, were born into the better life:

          In Cyprus, the blessed Nicanor, one of the seven first Deacons, who was wondrous for the grace of faith and power, and received a most glorious crown, (in the year 35 or 76.)
          At Rome, the holy Pope Agatho, who was eminent for holiness and learning, and fell asleep in peace, (in the year 682.)
          At Bourges, in Aquitaine, (in the year 1209,) the holy Confessor William, Archbishop (of that see,) famous for signs and works of power, whose name Honorius III enrolled with those of the saints.
          At Milan, the holy Confessor John, surnamed the Good, Archbishop of that city, (in the year 659.)
          In the Thebaid, blessed Paul, the first Hermit, who from the sixteenth even unto the hundred and thirteenth year of his age dwelt alone in the desert, (in the year 342,) holy Anthony saw his soul borne heavenward by angels between the choirs of the Apostles and of the Prophets. We keep his feast upon the 15th day of this present month of January.
          At Constantinople, the holy Priest Marcian, (about the year 489.)
          In the monastery of Cusan, (in the diocese of Perpignan,) the holy Confessor Peter Urseoli, who was sometime Doge of Venice, and then became a monk of the Order of St. Benedict, and was famous for godliness and works of power, (in the year 997.)
      la:
      - type: text
        text: |-
          Quarto Idus Ianuárii

          In Thebáide natális beáti Pauli, primi Eremítæ, Confessóris, qui, a sextodécimo ætátis suæ anno usque ad centésimum décimum tértium, solus in erémo permánsit; cuius ánimam, inter Apostolórum et Prophetárum choros, ad cælum ferri ab Angelis sanctus Antónius vidit. Eius autem festívitas décimo octávo Kaléndas Februárii celebrátur.
          In Cypro beáti Nicánoris, qui fuit unus de septem primis Diáconis; atque, grátia fídei et virtúte admirándus, gloriosíssime coronátus est.
          Romæ sancti Agathónis Papæ, qui, sanctitáte et doctrína conspícuus, quiévit in pace.
          Bitúricis, in Aquitánia, sancti Willhélmi, Epíscopi et Confessóris, signis et virtútibus clari; quem Honórius Papa Tértius in Sanctórum cánonem adscrípsit.
          Medioláni sancti Ioánnis Boni, Epíscopi et Confessóris.
          Constantinópoli sancti Marciáni Presbýteri.
          In monastério Cuxanénsi, in Gállia, natális sancti Petri Urséoli Confessóris, qui, ántea Venetiárum Dux et deínde Monáchus ex Ordine sancti Benedícti, pietáte et virtútibus cláruit.
          Arétii, in Túscia, Beáti Gregórii Décimi, civis Placentíni, qui, ex Archidiácono Leodiénsi Summus Póntifex renuntiátus, Concílium Lugdunénse secúndum celebrávit, Græcísque ad unitátem fídei recéptis, compósitis Christianórum dissídiis, Terræ Sanctæ recuperatióne institúta, de universáli Ecclésia, quam sanctíssime gubernávit, óptime méritus est.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of January
      
          In the Thebaid, the birth into heaven of blessed Paul, the first Hermit and Confessor, who, from the sixteenth year of his age to his hundred and thirteenth, remained alone in the desert; whose soul holy Anthony saw borne by Angels to heaven amid choirs of Apostles and Prophets. His feast is celebrated on the eighteenth before the Kalends of February.
          In Cyprus, of blessed Nicanor, who was one of the first seven Deacons; and, wonderful for the grace of faith and power, was crowned most gloriously.
          At Rome, of holy Pope Agatho, who, conspicuous for holiness and learning, rested in peace.
          At Bourges, in Aquitaine, of holy William, Bishop and Confessor, renowned for signs and virtues; whom Pope Honorius III enrolled among the Saints.
          At Milan, of holy John Bonus, Bishop and Confessor.
          At Constantinople, of holy Marcianus, Priest.
          In the monastery of Cuxa, in Gaul, the birth into heaven of holy Peter Urseolus, Confessor, who, formerly Doge of Venice and then a monk of the Order of Saint Benedict, was renowned for piety and virtues.
          At Arezzo, in Tuscany, of blessed Gregory X, a citizen of Piacenza, who, having been declared Supreme Pontiff from being Archdeacon of Liège, celebrated the Second Council of Lyons, and, having received the Greeks back into the unity of faith, settled the dissensions of Christians, undertaken the recovery of the Holy Land, and served the universal Church, which he governed most holily, with the highest merit.
  psalm.quarto-idus-m-rtii-2fc657e432:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of March, were born into the better life:

          At Rome, holy Pope Gregory [I,] an eminent Doctor of the Church, who, on account of his illustrious acts and his doings to bring the English to believe in Christ, is surnamed the Great, and called the Apostle of England, [in the year 604.]
          Likewise at Rome, the holy martyr Mamilian, [in the year 295.]
          At Nicomedia, the blessed martyr Peter. He was a chamberlain to the Emperor Diocletian, and because he bewailed the fearful slaughter of martyrs, the Emperor commanded him to be brought forth, hung up, and lashed for a long time. After which he was covered with vinegar and salt, and at length roasted upon a grating upon a slow fire, and thus is he worthy to be reckoned a true inheritor of Peter's faith, as well as Peter's name.
          There likewise the holy martyrs Egdunus the Priest, and seven others, of whom one was strangled every day in order to terrify the others, [about the year 303.]
          At Constantinople, holy Theophanes. He was originally a very rich man, but became a monk. The wicked Emperor Leo, the Armenian, kept him for two years in prison for honouring holy images, and then banished him to Samo-Thrace, where he sank under his sufferings and gave up the ghost, [about the year 818.] He is famous for many miracles.
          At Capua, the holy Confessor Bernard, Bishop of Calenum, [in the year 1109.]
      la:
      - type: text
        text: |-
          Quarto Idus Mártii

          Romæ sancti Gregórii Primi, Papæ, Confessóris et Ecclésiæ Doctóris exímii; qui, ob res præcláre gestas atque Anglos ad Christi fidem convérsos, Magnus est dictus et Anglórum Apóstolus appellátus.
          Ibídem deposítio sancti Innocéntii Primi, Papæ et Confessóris. Ipsíus autem festum quinto Kaléndas Augústi celebrátur.
          Item Romæ sancti Mamiliáni Mártyris.
          Nicomedíæ sanctórum Egdúni Presbýteri, et aliórum septem, qui sínguli diébus síngulis suffocáti sunt, ut céteris metus incuterétur.
          Ibídem pássio sancti Petri Mártyris, qui, cum esset cubiculárius Diocletiáni Imperatóris, et libérius de imménsis Mártyrum supplíciis quererétur, proptérea, iubénte eódem, in médium addúcitur, ac primo suspénsus, diutíssime flagris torquétur, deínde acéto ac sale perfúsus, ad últimum in cratícula lento igne assátur, sicque vere Petri éxstitit et fídei heres et nóminis.
          Constantinópoli sancti Theóphanis, qui, ex ditíssimo pauper Mónachus efféctus, ab ímpio Leóne Arméno, pro cultu sacrárum Imáginum, biénnio deténtus est in cárcere, et inde in Samothráciam deportátus, ibídem, ærúmnis conféctus, réddidit spíritum, multísque miráculis cláruit.
          Cápuæ sancti Bernárdi, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of March
      
          At Rome, of holy Gregory I, Pope, Confessor, and most eminent Doctor of the Church; who, for his illustrious achievements and for having converted the English to the faith of Christ, was called the Great and named the Apostle of the English.
          There likewise, the deposition of holy Innocent I, Pope and Confessor. His feast is celebrated on the fifth before the Kalends of August.
          Likewise at Rome, of holy Mamilian, Martyr.
          At Nicomedia, of holy Egdunus the Priest and seven others, who were each suffocated on successive days so as to strike terror into the rest.
          There likewise, the passion of holy Peter, Martyr, who, being a chamberlain of the Emperor Diocletian and complaining too freely about the immense torments of the Martyrs, was for that reason brought forth into the midst, and, first suspended, was tormented for a very long time with lashes, then drenched with vinegar and salt, and finally roasted on a gridiron over a slow fire, and so proved himself a true heir both of Peter's faith and of Peter's name.
          At Constantinople, of holy Theophanes, who, having become a poor monk from being most wealthy, was held in prison for two years by the impious Leo the Armenian on account of the veneration of sacred images, and from there was deported to Samothrace, where, worn out by hardships, he yielded up his spirit, and was renowned for many miracles.
          At Capua, of holy Bernard, Bishop and Confessor.
  psalm.quarto-idus-maii-58da1d9582:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 12th day of May, are

          Commemorated at Rome, upon the way to Ardea, the holy brethren Nereus and Achilles, both martyrs. They were eunuchs belonging to Flavia Domitilla, and first suffered a long exile with her in the island of Ponza for Christ's Name's sake. Afterwards they were laid under most grievous stripes. Lastly, when Minutius Rufus, the Consular, was striving by racking and fire to force them to offer pagan sacrifices, and they said that they had been baptized by the blessed Apostle Peter and could in no wise make offerings to idols, they were beheaded. By command of Pope Clement VIII their sacred remains, along with those of Flavia Domitilla, were, upon the eve of this day, solemnly transferred from the Deaconry of St. Hadrian to the old church which bears their names, where they had formerly lain buried, and which had now been restored.
          Also at Rome, upon the Aurelian Way, the holy martyr Pancras, who at fourteen years of age finished his testimony by being beheaded, in the persecution under Diocletian.
          At Rome also, [in the year 304,] the holy Denis, uncle of the said blessed Pancras.
          In Sicily, the holy Philip Argyrion, who was sent by the Roman Pontiff to that island, and turned a great part of it to Christ. His holiness is chiefly shown forth in the deliverance of them that are vexed with evil spirits.
          At Salamis, in Cyprus, [in the year 403,] the holy Epiphanius, Bishop [of that see,] who excelled in vast learning and knowledge of the Scriptures but was also a wonder for the holiness of his life, his zeal for the Catholic faith, his generosity to the poor, and the power of his mighty deeds.
          At Constantinople, [in the eighth century,] the holy Bishop Germanus, famous for his graces and teaching. He withstood the Emperor Leo the Isaurian with great faithfulness, when that Prince published his edict against the holy images.
          At Trier, [in the year 640,] the holy Modwald, Bishop [of that see.]
          In the city of St. Domingo de la Calzada, [in the beginning of the twelfth century,] the holy Confessor Dominic.
      la:
      - type: text
        text: |-
          Quarto Idus Maii

          Romæ, via Ardeatína, sanctórum Mártyrum Nérei et Achíllei fratrum, qui primo cum Flávia Domitílla, cuius erant eunúchi, in ínsula Póntia longum pro Christo duxérunt exsílium; póstmodum gravíssimis verbéribus attrectati sunt; deínde, cum a Minútio Rufo, viro Consulári, equúleo et flammis ad immolándum compelleréntur, diceréntque se, a beáto Petro Apóstolo baptizátos, nulla ratióne posse idólis immoláre, cápite cæsi sunt. Horum sacræ relíquiæ, simúlque Fláviæ Domitíllæ, ex Diaconía sancti Hadriáni in antíquum eórum Títulum, ubi asservabántur olim recónditæ, dénuo restaurátum, solémniter translátæ sunt prídie huius diéi, iussu Cleméntis Papæ Octávi; qui exínde hodiérna celebrándum die indíxit étiam festum ipsíus beátæ Domitíllæ Vírginis, cuius pássio Nonis huius mensis recensétur.
          Item Romæ, via Aurélia, sancti Pancrátii Mártyris, qui, cum esset annórum quatuórdecim, sub Diocletiáno, cápitis obtruncatióne martýrium complévit.
          Salamínæ, in Cypro, sancti Epiphánii Epíscopi, qui, multíplici eruditióne et sacrárum sciéntia litterárum excéllens, vitæ quoque sanctitáte, zelo cathólicæ fídei, munificéntia in páuperes et virtúte miraculórum éxstitit admirándus.
          Constantinópoli sancti Germáni Epíscopi, doctrína et virtútibus insígnis, qui Leónem Isáuricum, edictum advérsus sacras Imágines promulgántem, magna fidúcia redárguit.
          Tréviris sancti Modoáldi Epíscopi.
          Romæ sancti Dionýsii, qui éxstitit pátruus sancti Pancrátii Mártyris.
          Argýrii, in Sicília, sancti Philíppi Presbýteri, qui, a Románo Pontífice ad eándem Sicíliam ínsulam missus, magnam illíus partem convértit ad Christum. Ipsíus vero sánctitas in liberándis energúmenis maxime declarátur.
          In civitáte Calciaténsi, in Hispánia, sancti Domínici Confessóris.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of May
      
          At Rome, on the Ardeatine Way, of holy Martyrs Nereus and Achilleus, brothers, who first endured a long exile on the island of Pontia for Christ, together with Flavia Domitilla, of whose household they were eunuchs; afterwards they were severely beaten; then, when they were compelled by the consular Minutius Rufus with the rack and with flames to sacrifice and they declared that, having been baptized by blessed Peter the Apostle, they could by no means sacrifice to idols, they were beheaded. Their sacred relics, along with those of Flavia Domitilla, were solemnly translated from the deaconry of Saint Hadrian back to their ancient titular church, where they had formerly been kept and which had been newly restored, on the day before this feast, by order of Pope Clement VIII; who thereupon decreed that the feast of blessed Domitilla herself, Virgin, whose passion is commemorated on the Nones of this month, should also be celebrated on this day.
          Likewise at Rome, on the Aurelian Way, of holy Pancras, Martyr, who, being fourteen years of age, under Diocletian, completed his martyrdom by beheading.
          At Salamis, in Cyprus, of holy Epiphanius, Bishop, who, excelling in manifold learning and knowledge of the sacred Scriptures, was also to be marveled at for holiness of life, zeal for the Catholic faith, generosity toward the poor, and the power of miracles.
          At Constantinople, of holy Germanus, Bishop, outstanding in learning and virtues, who with great boldness rebuked Leo the Isaurian when he was promulgating an edict against the sacred images.
          At Trier, of holy Modoaldus, Bishop.
          At Rome, of holy Dionysius, who was the paternal uncle of holy Pancras, Martyr.
          At Agira, in Sicily, of holy Philip the Priest, who was sent by the Roman Pontiff to that same island of Sicily and converted a great part of it to Christ. His holiness is most manifestly declared in the freeing of those possessed by demons.
          In the city of Calahorra, in Spain, of holy Dominic, Confessor.
  psalm.quarto-idus-nov-mbris-a86c1a3540:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of November, were born into the better life:

          At Naples, in Campania, (in the year 1608,) holy Andrew Avellino, Clerk Regular, very eminent for his holiness and his zeal for setting forward the salvation of his neighbours. He was famous for miracles, and Clement XV enrolled his name among those of the saints.
          The holy martyrs Tryphon, Respicius, and the Virgin Nympha.
          In the country of Agde, the holy martyrs Tiberius, Modestus, and Florence, who, in the time of the Emperor Diocletian, underwent diverse torments, and were crowned with martyrdom.
          At Antioch, the holy martyrs Demetrius, Bishop (of that see,) the Deacon Anian, Eustosius, and twenty others.
          At Ravenna, (in the year 142,) holy Probus, Bishop (of that see,) famous for miracles.
          At Orleans, (in the fifth century,) the holy Confessor Monitor, Bishop (of that see.)
          In England, holy Justus, Bishop (of Rochester, afterwards translated to Canterbury,) who was sent into that island by the blessed Pope Gregory, along with Augustine, Mellitus, and others to preach the gospel, and there slept in the Lord, famous for holiness, (in the year 627.)
          At Melun is commemorated the holy Confessor Leo.
          At Iconium, in Lycaonia, the holy Women Tryphenna and Tryphosa, who advanced much in Christian training by the preaching of blessed Paul and the example of Thecla.
          In the island of Paros, the holy Virgin Theoctistis.
      la:
      - type: text
        text: |-
          Quarto Idus Novémbris

          Neápoli, in Campánia, natális sancti Andréæ Avellíni, Clérici Reguláris et Confessóris, sanctitáte et salútis proximórum procurándæ stúdio præcélebris, quem, miráculis clarum, Clemens Undécimus, Póntifex Máximus, Sanctórum catálogo adscrípsit.
          Eódem die natális quoque sanctórum Mártyrum Tryphónis, et Respícii, ac Nymphæ Vírginis.
          Romæ item natális sancti Leónis Papæ Primi, Confessóris et Ecclésiæ Doctóris; qui, virtútum excéllens méritis, dictus est Magnus. Eius tempóribus celebráta fuit sancta Sýnodus Chalcedonénsis, in qua ipse per legátos damnávit Eutýchen; cuius étiam Sýnodi decréta póstmodum auctoritáte sua confirmávit. Tandem, cum sanxísset multa luculentérque scripsísset, Pastor bonus, de sancta Dei Ecclésia et univérso grege Domínico óptime méritus, quiévit in pace. Ipsíus tamen festívitas tértio Idus Aprílis celebrátur.
          Icónii, in Lycaónia, sanctárum mulíerum Tryphénnæ et Tryphósæ, quæ, beáti Pauli prædicatióne et exémplo Theclæ, in Christiána discíplina plúrimum profecérunt.
          Antiochíæ sanctórum Demétrii Epíscopi, Aniáni Diáconi, Eustósii et aliórum vigínti Mártyrum.
          In território Agathénsi, in Gállia, sanctórum Mártyrum Tibérii, Modésti et Floréntiæ; qui, témpore Diocletiáni, váriis torméntis cruciáti, martýrium complevérunt.
          Ravénnæ sancti Probi Epíscopi, miráculis clari.
          Aureliánis, in Gállia, sancti Monitóris, Epíscopi et Confessóris.
          In Anglia sancti Iusti Epíscopi, qui, una cum Augustíno, Mellíto et áliis a beáto Gregório Papa in eam ínsulam missus ad prædicándum Evangélium, ibídem, sanctitáte célebris, obdormívit in Dómino.
          In óppido Milléduno, in Gállia, sancti Leónis Confessóris.
          In Paro ínsula sanctæ Theoctístis Vírginis.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of November
      
          At Naples, in Campania, the birth into heaven of holy Andrew Avellino, Clerk Regular and Confessor, most celebrated for holiness and zeal for procuring the salvation of his neighbors, whom Pope Clement XI, Supreme Pontiff, enrolled in the catalogue of the Saints, resplendent with miracles.
          On the same day, the birth into heaven likewise of holy Martyrs Trypho and Respicius, and Nympha, Virgin.
          At Rome, likewise the birth into heaven of holy Pope Leo I, Confessor and Doctor of the Church; who, excelling in the merits of virtues, was called the Great. In his time the holy Council of Chalcedon was celebrated, in which he himself condemned Eutyches through his legates; and the decrees of that same Council he afterwards confirmed with his own authority. At last, having ordained much and written with eloquence, that good Shepherd, who had most excellently served the holy Church of God and the whole flock of the Lord, rested in peace. His feast, however, is celebrated on the third before the Ides of April.
          At Iconium, in Lycaonia, of holy women Tryphaena and Tryphosa, who made great progress in the Christian discipline through the preaching of blessed Paul and the example of Thecla.
          At Antioch, of holy Demetrius, Bishop, Anianus the Deacon, Eustosios, and twenty other Martyrs.
          In the territory of Agde, in Gaul, of holy Martyrs Tiberius, Modestus, and Florentia; who, in the time of Diocletian, tormented with various punishments, completed their martyrdom.
          At Ravenna, of holy Probus, Bishop, renowned for miracles.
          At Orléans, in Gaul, of holy Monitor, Bishop and Confessor.
          In England, of holy Justus, Bishop, who, sent to that island together with Augustine, Mellitus, and others by blessed Pope Gregory to preach the Gospel, fell asleep in the Lord there, renowned for holiness.
          In the town of Maillezais, in Gaul, of holy Leo, Confessor.
          On the island of Paros, of holy Theoctiste, Virgin.
  psalm.quarto-idus-oct-bris-cdc33e520f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Wilfred, Bishop of York.
          Upon the same 12th day of October, were born into the better life:

          At Rome, the holy martyrs Evagrius, Priscian, and their Companions.
          At Ravenna, on the Laurentine Way, (in the persecution under the Emperor Diocletian,) the holy martyr Edistius.
          In Lycia, under the same Emperor Diocletian, the holy martyr Domnina.
          In Africa are commemorated four thousand nine hundred and sixty-six holy martyrs and Confessors in the Vandal persecution under the Arian King Hunneric. Some of these were Bishops of the Churches of God, and some of them Priests and Deacons, but with them were joined multitudes of the other faithful. For defending the Catholic truth they were driven into exile in the terrible desert many of them were cruelly taken by the Moors, goaded to run at the point of the spear, and beaten with stones others had their feet tied together, and were dragged like corpses through hard and sharp places, until all their limbs were mangled and then were tortured to death in diverse ways. Pre-eminent among them were the Bishops Felix and Cyprian.
          At Celeia, in Pannonia, (in the fourth century,) holy Maximilian, Bishop (of Lorch.)
          At Milan, (in the third century,) the holy Bishop Monas. During the discussion as to the choosing of a Bishop there, a light from heaven shone upon him, and through that wondrous sign he was made Bishop of that church.
          At Verona, holy Salvin, Bishop.
          In Syria, the holy Priest and Confessor Eustace.
          At Ascoli, in the March of Ancona, (in the year 1604,) the holy Confessor Seraphim, of the Order of Friars Minor Capuchins, who was marked by holiness of life and by lowliness, and whose name the Supreme Pontiff Clement XIII enrolled with those of the Saints.
      la:
      - type: text
        text: |-
          Quarto Idus Octóbris

          Romæ sanctórum Mártyrum Evágrii, Prisciáni, et Sociórum.
          In Africa sanctórum Confessórum et Mártyrum quátuor míllium nongentórum sexagínta sex, in persecutióne Wandálica, sub Hunneríco, Rege Ariáno. Hi, cum essent partim Epíscopi Ecclesiárum Dei, partim Presbýteri et Diáconi, associátis sibi turbis fidélium populórum, pro defensióne cathólicæ veritátis in horríbilis erémi exsílium trusi sunt; ex quibus plúrimi, dum crudéliter a Mauris duceréntur, hastílium cuspídibus impúlsi ad curréndum et lapídibus tunsi, álii, ligátis pédibus, velut cadávera per dura et áspera loca tracti et síngulis membris discérpti, ad extrémum, várie excruciáti, martýrium celebrárunt. Erant inter eos præcípui Sacerdótes Dómini, Felix et Cypriánus Epíscopi.
          Ravénnæ, via Laurentína, natális sancti Edístii Mártyris.
          In Lýcia sanctæ Domnínæ Mártyris, sub Diocletiáno Imperatóre.
          Celénæ, in Pannónia, sancti Maximiliáni, Epíscopi Laureacénsis.
          Eboráci, in Anglia, sancti Walfrídi, Epíscopi et Confessóris.
          Medioláni sancti Monæ Epíscopi, qui, cum de Epíscopo eligéndo agerétur, cælésti lúmine circumfúsus, eo signo mirabíliter in Pontíficem illíus Ecclésiæ est assúmptus.
          Verónæ sancti Salvíni Epíscopi.
          In Sýria sancti Eustáchii, Presbýteri et Confessóris.
          Asculi, in Picéno, sancti Seraphíni Confessóris, ex Ordine Minórum Capuccinórum, vitæ sanctimónia et humilitáte conspícui; quem Clemens Décimus tértius, Póntifex Máximus, Sanctórum fastis adscrípsit.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of October
      
          At Rome, of holy Martyrs Evagrius, Priscianus, and their companions.
          In Africa, of holy Confessors and Martyrs numbering four thousand nine hundred and sixty-six, in the Vandal persecution under Huneric, the Arian king. These, being partly Bishops of the Churches of God, partly Priests and Deacons, with crowds of the faithful people joined to them, were driven into the exile of a most fearful desert for the defense of Catholic truth; of whom very many, as they were cruelly driven along by the Moors, goaded with the points of spears to run, struck with stones, others dragged by their feet bound like corpses over hard and rough ground and torn limb from limb, and at last tormented in various ways, celebrated their martyrdom. Among them the most eminent were the Priests of the Lord, Felix and Cyprian, Bishops.
          At Ravenna, on the Laurentine Way, the birth into heaven of holy Editius, Martyr.
          In Lycia, of holy Domnica, Martyr, under the Emperor Diocletian.
          At Celeia, in Pannonia, of holy Maximilian, Bishop of Lorch.
          At York, in England, of holy Wilfrid, Bishop and Confessor.
          At Milan, of holy Monas, Bishop, who, when the election of a Bishop was being conducted, was surrounded with a heavenly light, and by that sign was miraculously chosen as Pontiff of that Church.
          At Verona, of holy Salvinus, Bishop.
          In Syria, of holy Eustachius, Priest and Confessor.
          At Ascoli, in Picenum, of holy Seraphinus, Confessor, of the Order of Minor Capuchins, conspicuous for sanctity of life and humility; whom Pope Clement XIII, Supreme Pontiff, enrolled in the roll of the Saints.
  psalm.quarto-idus-sept-mbris-818c4899d0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of September, were born into the better life:

          At Tolentino, in the March of Ancona, the holy Confessor Nicholas, of the Order of Hermits of St Augustine.
          In Africa, the holy Bishops Nemesian, Felix, Lucius, another also named Felix, Litteus, Polyan, Victor, Jader, Dativus, and others, who, when the storm of persecution broke under the Emperors Valerian and Gallienus, at their first steadfastness in confessing Christ were heavily cudgelled, bound, and condemned to penal servitude in the mines, where they finished their glorious contending.
          At Chalcedon, the holy martyrs Sosthenes and Victor, who were condemned to be burnt by Priscus the Proconsul of Asia, in the persecution under the Emperor Diocletian, after they had overcome bonds and beasts then they saluted one another with an holy kiss, and gave up their souls in prayer to God.
          In Bithynia, the holy sisters Menodora, Metrodora, and Nymphodora, Virgins, who passed into glory crowned with martyrdom, under Maximian the Emperor and Fronto the President.
          Likewise the holy martyrs Apellius, Luke, and Clement, (who were among the first disciples of the Lord Christ.)
          At Liege, in Belgium, (in the seventh century,) the holy martyr Theodard, the Bishop, who laid down his life for the sheep, and shone with the grace of miracles after his death.
          At Rome, (in the fifth century,) the blessed Confessor Pope Hilary.
          At Compostella, holy Bishop Peter, famous for many graces and miracles.
          In the city of Albi, (in the sixth Bishop (of that see.) At Novara, (in the sixth century,) holy Agapius, Bishop (of that see.) At Constantinople, (in the fifth century,) the holy Virgin Pulcheria, Empress of the Romans, famous for godliness.
      la:
      - type: text
        text: |-
          Quarto Idus Septémbris

          Tolentíni, in Picéno, deposítio sancti Nicolái Confessóris, ex Ordine Eremitárum sancti Augustíni.
          In Africa natális sanctórum Episcopórum Nemesiáni, Felícis, Lúcii, altérius item Felícis, Littéi, Polyáni, Victóris, Iadéris, Datívi et aliórum; qui, sub Valeriáno et Galliéno, exsurgénte persecutiónis rábie, ad primam confessiónis Christi constántiam gráviter fústibus cæsi sunt, deínde, compédibus vincti et ad fodiénda metálla deputáti, gloriósæ confessiónis agónem consummárunt.
          Leódii, in Bélgio, sancti Theodárdi, Epíscopi et Mártyris; qui ánimam suam pósuit pro óvibus suis, et miraculórum signis post mortem illúxit.
          Chalcedóne sanctórum Mártyrum Sósthenis et Victóris, qui, in persecutióne Diocletiáni, sub Asiæ Procónsule Prisco, post víncula et béstias superátas, iussi sunt incéndi; at illi, salutántes se ínvicem in ósculo sancto, in oratióne pósiti emisérunt spíritum.
          Item sanctórum Mártyrum Apéllii, Lucæ et Cleméntis.
          In Bithýnia sanctárum Vírginum sorórum Menodóræ, Metrodóræ et Nymphodóræ; quæ sub Maximiáno Imperatóre et Frontóne Prǽside, ob intrépidam in Christi fide constántiam martýrio coronátæ, pervenérunt ad glóriam.
          Compostéllæ sancti Petri Epíscopi, qui multis virtútibus et miráculis cláruit.
          In civitáte Albigénsi, in Gállia, sancti Sálvii, Epíscopi et Confessóris.
          Nováriæ sancti Agápii Epíscopi.
          Constantinópoli sanctæ Pulchériæ Augústæ, Vírginis, religióne et pietáte insígnis.
          Neápoli, in Campánia, sanctæ Cándidæ iunióris, miráculis claræ.
      en2:
      - type: text
        text: |-
          The tenth before the Ides of September
      
          At Tolentino, in Picenum, the deposition of holy Nicholas, Confessor, of the Order of Hermits of Saint Augustine.
          In Africa, the birth into heaven of holy Bishops Nemesianus, Felix, Lucius, another Felix, Litteus, Polianus, Victor, Jader, Dativus, and others; who, under Valerian and Gallienus, when the fury of persecution arose, were grievously beaten with rods at the first moment of their steadfast confession of Christ, then bound with fetters and assigned to dig in the mines, and so completed the contest of their glorious confession.
          At Liège, in Belgium, of holy Theodardus, Bishop and Martyr; who laid down his life for his sheep, and shone forth with signs of miracles after death.
          At Chalcedon, of holy Martyrs Sosthenes and Victor, who, in the persecution of Diocletian, under Priscus the proconsul of Asia, after bonds and having overcome the beasts, were ordered to be burned; but they, greeting one another with the holy kiss, and set in prayer, gave up their spirits.
          Likewise of holy Martyrs Apellius, Lucas, and Clement.
          In Bithynia, of holy Virgin sisters Menodora, Metrodora, and Nymphodora; who, under the Emperor Maximian and the prefect Fronto, for their fearless constancy in the faith of Christ, were crowned with martyrdom and attained to glory.
          At Compostela, of holy Peter, Bishop, who was renowned for many virtues and miracles.
          In the city of Albi, in Gaul, of holy Salvius, Bishop and Confessor.
          At Novara, of holy Agapius, Bishop.
          At Constantinople, of holy Pulcheria Augusta, Virgin, outstanding for religion and piety.
          At Naples, in Campania, of holy Candida the Younger, renowned for miracles.
  psalm.quarto-kal-ndas-apr-lis-97f74245d0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 29th day of March, were born into the better life:

          In Persia, under King Sapor, [in the year 326,] the holy martyrs Jonah and Barachisius. Jonah was pressed under a screw until his bones were broken, and cut through the middle. Barachisius was choked, by pouring boiling pitch into his mouth.
          At Balbec, in the Lebanon, [in the year 362,] the holy martyr Cyril the Deacon. The savage Gentiles, under the Emperor Julian the Apostate, cut open his belly, tore out his liver, and ate it.
          At Nicomedia, [in the year 303,] suffered the holy martyrs Pastor, Victorinus, and their Companions.
          In Africa, [about the year 461,] the holy Confessors Count Armogastes, Masculus the chief player, and Saturus, steward of the king's house, who suffered many and grievous pains and insults for confessing the truth, at the time of the Vandal persecution under the Arian King Genseric, and so finished a course of glorious contention.
          In the city of Asti, [in the second century,] the holy martyr Secundus.
          In the monastery of Luxeuil, [diocese of Besançon, in the year 625,] the holy Abbot Eustacius, a disciple of holy Columbanus. He was the father of nearly six hundred monks, and was famous not only for the holiness of his life, but also for miracles.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Aprílis

          Heliópoli, apud Líbanum, sancti Cyrílli, Diáconi et Mártyris, cuius iecur, e discísso ventre avúlsum, Gentíles, sub Iuliáno Apóstata, feráliter depásti sunt.
          In Pérside sanctórum Monachórum et Mártyrum Ionæ et Barachísii fratrum, sub Rege Persárum Sápore. Ex ipsis Ionas, pressus in cóchlea, confráctis óssibus, médius disséctus est; Barachísius autem, opplétis fáucibus pice ardénti, suffocátus.
          Nicomedíæ pássio sanctórum Mártyrum Pastóris, Victoríni et Sociórum.
          In Africa sanctórum Confessórum Armogástis Cómitis, Másculæ archimími, et Sáturi, régiæ domus procuratóris; qui, témpore Wandálicæ persecutiónis, sub Rege Ariáno Genseríco, pro confessióne veritátis, multa et grávia perpéssi supplícia atque oppróbria, cursum gloriósi certáminis implevérunt.
          In urbe Asténsi sancti Secúndi Mártyris.
          In monastério Luxoviénsi, in Gállia, deposítio sancti Eustásii Abbátis, qui sancti Columbáni discípulus et ferme sexcentórum Monachórum Pater fuit; ac, vitæ sanctitáte conspícuus, étiam miráculis cláruit.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of April
      
          At Heliopolis, near Lebanon, of holy Cyril, Deacon and Martyr, whose liver, torn from his opened belly, the Gentiles under Julian the Apostate savagely devoured.
          In Persia, of holy Monks and Martyrs Jonas and Barachisius, brothers, under Sapor, King of the Persians. Of these, Jonas was pressed in a vice, his bones crushed, and cut in two at the waist; while Barachisius was suffocated with his throat filled with burning pitch.
          At Nicomedia, the passion of holy Martyrs Pastor, Victorinus, and their companions.
          In Africa, of holy Confessors Armogastes the Count, Mascula the chief mime, and Saturus, steward of the royal household; who, in the time of the Vandal persecution, under the Arian king Genseric, having endured many and grievous punishments and indignities for their confession of the truth, completed the course of their glorious contest.
          In the city of Asti, of holy Secundus, Martyr.
          In the monastery of Luxeuil, in Gaul, the deposition of holy Eustasios, Abbot, who was a disciple of Saint Columban and father of nearly six hundred monks; and, conspicuous for holiness of life, was also renowned for miracles.
  psalm.quarto-kal-ndas-aug-sti-6672de4d41:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 29th day of July, was born into the better life:

          At Tarascon, in Gaul, the holy Virgin Martha, the hostess of our Saviour, and the sister of blessed Mary Magdalene and of holy Lazarus.
          On the same day is commemorated at Rome, upon the Aurelian Way, the holy martyr Pope Felix II, who was expelled from his See by the Arian Emperor Constantius because of his defense of the Catholic faith, and who fell gloriously, secretly murdered with the sword, at Cera, in Tuscany. [Concerning Felix there has been much dispute. The Missal and Breviary, by suppressing the title of Pope or Bishop (always given in such cases), seem to confirm the view now generally adopted by historians, viz., that he was an African martyr, who suffered on November 10, and whose relics were brought to Rome on July 29 but the Martyrology retains another theory, now generally rejected, which identifies this Saint with one Felix, intruded into the See of Rome by Constantius during the Pontificate of Liberius, and now commonly regarded as an Anti-Pope of very dubious orthodoxy.] His body was brought thence by clerks and buried upon the aforesaid Way, whence it was afterwards taken to the church of SS. Cosmas and Damian, where it was found under the altar in the time of the Supreme Pontiff Gregory XIII, along with the relics of the holy martyrs Mark, Marcellian, and Tranquillinus, along with which it was again buried in the same spot upon the last day of July.
          Under the same altar were also found the bodies of the holy martyrs Abundius the Priest and Abundantius the Deacon, which not long after were solemnly taken to the church of the Society of Jesus, upon the eve of their birthday into the better life.
          At Rome, on the Way to Porto, in the time of the Emperor Diocletian, the holy martyrs Simplicius, Faustinus, and Beatrix. Simplicius and Faustinus were beheaded, after many and diverse torments, and their sister Beatrix was strangled in prison, for confessing Christ.
          Likewise at Rome, the holy martyrs the Virgins Lucilla and Flora, Eugene, Antonine, Theodore, and eighteen others their Companions, who suffered martyrdom under the Emperor Gallienus.
          At Gangra, in Paphlagonia, the holy martyr Callinicus, who was first beaten with iron rods and tormented in other and diverse ways, and at length cast into a furnace, and so resigned his spirit to God.
          In Norway, [in the year 1030,] the holy martyr King Olaf II.
          At Troyes, in Gaul, [in the fifth century,] the holy Confessor Lupus, Bishop [of that See,] who went into Britain along with blessed German to rid that country of the Pelagian heresy, and who by his unceasing prayers delivered the city of Troyes from the fury of Attila when he was wasting all Gaul, and at length fell asleep in peace, after having performed the office of the Priesthood with worship for two and fifty years.
          At St. Brieuc, [in the year 1237,] the holy Confessor William, Bishop [of that see.]
          On the same day deceased also blessed Prosper, Bishop of Orléans, [in the fifth century.]
          At Todi, [in the third century,] the holy Confessor Faustinus.
          At Mamia, in Galicia, [in the fifth century,] the holy [Virgin] Seraphina.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Augústi

          Tarásci, in Gállia Narbonénsi, sanctæ Marthæ Vírginis, hóspitæ Salvatóris nostri ac soróris beatórum Maríæ Magdalénæ et Lázari.
          Romæ, via Portuénsi, sanctórum Mártyrum Felícis, Simplícii, Faustíni et Beatrícis, tempóribus Diocletiáni Imperatóris. Horum duo primi, post multa et divérsa supplícia, iussi sunt capitálem subíre senténtiam; Beátrix vero, eórum soror, in confessióne Christi est in cárcere præfocáta.
          Romæ prætérea sanctórum Mártyrum Lucíllæ et Floræ Vírginum, Eugénii, Antoníni, Theodóri, et Sociórum decem et octo; qui sub Galliéno Imperatóre martýrium obiérunt.
          Item Romæ sanctæ Serápiæ Vírginis, quæ, sub Hadriáno Príncipe, cum esset trádita duóbus lascívis iuvénibus et mínime potuísset illúdi, nec póstmodum ardéntibus fácibus inflammári, Derílli Iúdicis iussu fústibus cæsa est, dehinc gládio decolláta. Eius corpus a beáta Sabína in suo monuménto, iuxta áream Vindiciáni, sepúltum est; sed memória ipsíus martýrii tértio Nonas Septémbris celébrior habétur, quo die ambárum sarcóphagum ibi compósitum et ornátum fuit, et locus oratiónis condígne dicátus.
          Gangris, in Paphlagónia, sancti Calliníci Mártyris, qui, virgis férreis verberátus aliísque supplíciis afflíctus, tandem, in fornácem iniéctus, spíritum Deo réddidit.
          In Norvégia sancti Olávi, Regis et Mártyris.
          Trecis, in Gállia, sancti Lupi, Epíscopi et Confessóris; qui, cum beáto Germáno, ad expugnándam Pelagianórum hǽresim, in Británniam perréxit, urbémque Trecas a furóre Attilæ, Gálliam omnem devastántis, assídua oratióne deféndit; demum, quinquagínta duóbus annis sacerdótio venerabíliter functus, in pace quiévit.
          In civitáte Briocénsi, in Gállia, sancti Guliélmi, Epíscopi et Confessóris.
          Item deposítio beáti Prósperi, Aurelianénsis Epíscopi.
          Apud Tudértum, in Umbria, sancti Faustíni Confessóris.
          In civitáte Mamiénsi sanctæ Seraphínæ.
          Romæ beáti Urbáni Papæ Secúndi, qui, sancti Gregórii Séptimi vestígia secútus, doctrínæ et religiónis stúdio enítuit, et fidéles Cruce signátos ad sacra Palæstínæ loca ex infidélium domínio rediménda excitávit. Cultum autem, ab immemorábili témpore eídem exhíbitum, Leo Décimus tértius, Póntifex Máximus, ratum hábuit et confirmávit.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of August
      
          At Tarascon, in Narbonese Gaul, of holy Martha, Virgin, hostess of our Savior and sister of blessed Mary Magdalene and Lazarus.
          At Rome, on the Portian Way, of holy Martyrs Felix, Simplicius, Faustinus, and Beatrice, in the time of the Emperor Diocletian. Of these, the first two, after many and diverse punishments, were ordered to undergo capital sentence; but Beatrice, their sister, was strangled in prison for her confession of Christ.
          At Rome furthermore, of holy Martyrs Lucilla and Flora, Virgins, Eugenius, Antoninus, Theodore, and eighteen companions; who suffered martyrdom under the Emperor Gallienus.
          Likewise at Rome, of holy Seraphia, Virgin; who, under the Emperor Hadrian, when she had been handed over to two lascivious young men and could not at all be violated, nor afterwards be set ablaze with burning torches, was beaten with rods by order of the judge Derillus and then beheaded. Her body was buried by blessed Sabina in her own tomb, near the precinct of Vindicianus; but the memory of her martyrdom is more solemnly observed on the third before the Nones of September, on which day the sarcophagus of both was placed and adorned there, and a worthy place of prayer was duly dedicated.
          At Gangra, in Paphlagonia, of holy Callinicus, Martyr, who, beaten with iron rods and afflicted with other punishments, at last cast into a furnace, yielded his spirit to God.
          In Norway, of holy Olaf, King and Martyr.
          At Troyes, in Gaul, of holy Lupus, Bishop and Confessor; who, together with blessed Germanus, journeyed to Britain to overcome the Pelagian heresy, and defended the city of Troyes from the fury of Attila, who was devastating all of Gaul, by his constant prayer; and at last, having fulfilled the priesthood with veneration for fifty-two years, rested in peace.
          In the city of Saint-Brieuc, in Gaul, of holy William, Bishop and Confessor.
          Likewise the deposition of blessed Prosper, Bishop of Orléans.
          At Todi, in Umbria, of holy Faustinus, Confessor.
          In the city of Pamiers, of holy Seraphina.
          At Rome, of blessed Pope Urban II, who, following in the footsteps of Saint Gregory VII, excelled in zeal for doctrine and religion, and roused the faithful marked with the Cross to recover the holy places of Palestine from the dominion of the infidels. The cult rendered to him from time immemorial was ratified and confirmed by Pope Leo XIII, Supreme Pontiff.
  psalm.quarto-kal-ndas-dec-mbris-a20be407b3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the Feast of the holy martyr Jehoshaphat, Archbishop of Polotsk, Monk of the Order of St. Basil, who was cruelly murdered by schismatics at Vitebsk in Poland, out of their hatred for Catholic unity and truth, whose name Pope Pius IX. enrolled among those of the holy martyrs, and of whom mention hath been made upon the 12th day of this present month of November.
          Upon the same 28th day of November, were born into the better life:

          At Rome, the holy Rufus, with all his house, whom Diocletian made martyrs unto Christ.
          At Corinth, holy Sosthenes, the disciple of the blessed Apostle Paul, of whom the same Apostle doth make mention in writing unto the Corinthians. He was the chief man of the synagogue when he turned to Christ, and eminently hallowed the first-fruits of his faith by being sharply beaten in the presence of Gallio the Proconsul.
          In Africa, the holy martyrs the Bishops Papinian and Mansuetus.
          On account of their defence of the Catholic faith, during the Vandal persecution under the Arian King Genseric, their whole bodies were seared with white hot iron plates, and so they finished their glorious contending.
          At the same time, the other holy Bishops Valerian, Urban, Crescens, Eustace, Cresconius, Crescentian, Felix, Hortulanus, and Florentian were condemned to exile, and there finished their earthly days.
          At Constantinople, the holy martyrs Stephen the younger, Basil, Peter, Andrew, and their Companions, even three hundred and thirty-nine monks, who for the honouring of holy images under the Emperor Constantine Copronymus were put to diverse cruel torments, and sealed their confession of the Catholic truth by the outpouring of their blood.
          At Rome, the blessed Pope Gregory III., who passed to heaven famous for his holiness and worthy deeds.
          At Naples, (in the year 1476,) the holy Confessor James of Picenum, of the Order of Friars Minor, famous for the sharp self-denial of his life, for his Apostolic preaching, and for the embassages which he undertook for Christendom's sake, whose name the Supreme Pontiff Benedict XIII enrolled among those of the saints.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Decémbris

          Apud Corínthum natális sancti Sósthenis, ex beáti Pauli Apóstoli discípulis; cuius mentiónem facit idem Apóstolus Corínthiis scribens. Ipse autem Sósthenes, ex príncipe Synagógæ convérsus ad Christum, fídei suæ primórdia, ante Galliónem Procónsulem ácriter verberátus, præcláro inítio consecrávit.
          Romæ sancti Rufi, quem, cum omni família sua, Christi Mártyrem Diocletiánus fecit.
          In Africa sanctórum Mártyrum Papiniáni et Mansuéti Episcopórum, qui, témpore Wandálicæ persecutiónis, sub Rege Ariáno Genseríco, pro fídei cathólicæ defensióne, candéntibus ferri láminis toto córpore adústi, gloriósum agónem consummárunt. Quo étiam témpore álii novem sancti Epíscopi, scílicet Valeriánus, Urbánus, Crescens, Eustáchius, Crescónius, Crescentiánus, Felix, Hortulánus et Florentiánus, damnáti exsílio, cursum vitæ suæ implevérunt.
          Constantinópoli sanctórum Mártyrum Stéphani iunióris, Basilíi, Petri, Andréæ, et Sociórum trecentórum et trigínta novem Monachórum; qui, sub Constantíno Coprónymo, pro sanctárum Imáginum cultu váriis excruciáti supplíciis, veritátem cathólicam effúso sánguine confirmárunt.
          Neápoli, in Campánia, deposítio sancti Iacóbi Picéni, Sacerdótis ex Ordine Minórum et Confessóris, vitæ asperitáte, apostólica prædicatióne ac plúribus pro re Christiána óbitis legatiónibus præclári; quem Benedíctus Décimus tértius, Póntifex Máximus, Sanctórum fastis adiúnxit.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of December
      
          At Corinth, the birth into heaven of holy Sosthenes, one of the disciples of blessed Paul the Apostle; of whom the same Apostle makes mention when writing to the Corinthians. Sosthenes himself, converted from being ruler of the synagogue to Christ, consecrated the beginnings of his faith with a distinguished opening, having been sharply beaten before the proconsul Gallio.
          At Rome, of holy Rufus, whom Diocletian made a Martyr for Christ together with his whole family.
          In Africa, of holy Martyrs Papinian and Mansueetus, Bishops, who, in the time of the Vandal persecution, under the Arian king Genseric, for the defense of the Catholic faith, having been branded over their whole body with red-hot iron plates, completed a glorious contest. At that same time nine other holy Bishops — namely Valerianus, Urbanus, Crescens, Eustachius, Cresconius, Crescentianus, Felix, Hortulanus, and Florentianus — condemned to exile, completed the course of their lives.
          At Constantinople, of holy Martyrs Stephen the Younger, Basil, Peter, Andrew, and three hundred and thirty-nine companion Monks; who, under Constantine Copronymus, tormented with various punishments for the veneration of holy images, confirmed the Catholic truth with their outpoured blood.
          At Naples, in Campania, the deposition of holy James of the Marches, Priest of the Order of Friars Minor and Confessor, illustrious for austerity of life, apostolic preaching, and very many embassies undertaken for the Christian cause; whom Pope Benedict XIII, Supreme Pontiff, added to the roll of the Saints.
  psalm.quarto-kal-ndas-febru-rii-92bc6f8b06:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Francis de Sales, Bishop of Geneva, (in the year 1622,) of whom mention is made upon the 28th day of December.
          Upon the same 29th day of January, were born into the better life:
          At Rome, upon the Nomentan Way, the holy soldiers Papias and Maurus, martyrs in the time of the Emperor Diocletian, (fourth century.) At their first confession of Christ, Laodicius, the Prefect of the city, ordered their mouths to be bruised with stones and committed them to prison where they were afterwards cudgelled and then lashed to death with scourges loaded with lead.
          At Perugia, the holy martyrs Constantius, Bishop of that see, and his companions, who were crowned (about the year 178) for defending the faith in the persecution under the Emperor Marcus Aurelius.
          At Edessa, in Syria, the holy martyrs Sarbelius and his sister, Barbea, who were baptized by blessed Barsimceus, Bishop of that city, and were crowned with martyrdom under the President Lysias, in the persecution under the Emperor Trajan, (in the second century.)
          In the country of Trois, the holy martyr Sabinian, who was beheaded for Christ's faith's sake, (in the year 275,) by order of the Emperor Aurelian.
          At Milan, the holy Priest Aquilinus, who was crowned with martyrdom, (in the eighth century,) by being run through the neck with a sword by the Arians.
          At Trier, holy Valerius, Bishop of that see, (in the first century,) a disciple of the holy Apostle Peter.
          At Bourges, holy Sulpicius Severus, (in the year 591,) Bishop of that see, famous for his graces and learning.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Februárii

          Sancti Francísci Salésii, Epíscopi Gebennénsis, Confessóris et Ecclésiæ Doctóris, ómnium Scriptórum catholicórum, diáriis aliísve scriptis in vulgus edéndis sapiéntiam Christiánam illustrántium ac provehéntium et tutántium, peculiáris apud Deum Patróni; qui migrávit in cælum quinto Kaléndas Ianuárii, sed hac die, ob Translatiónem córporis eius, potíssimum cólitur.
          Tréviris deposítio beáti Valérii Epíscopi, qui fuit discípulus sancti Petri Apóstoli.
          Romæ, via Nomentána, natális sanctórum Mártyrum Pápiæ et Mauri mílitum, témpore Diocletiáni Imperatóris; quorum ora iussit Laodícius, Urbis Præféctus, ad primam Christi confessiónem lapídibus contúndi, et sic eos in cárcerem trahi, ac póstea fústibus cædi, atque ad últimum plumbátis pércuti, donec exspirárent.
          Perúsiæ sancti Constántii, Epíscopi et Mártyris; qui, una cum Sóciis, sub Marco Aurélio Imperatóre, ob fídei defensiónem, martýrii corónam accépit.
          Medioláni sancti Aquilíni Presbýteri, qui, ab Ariánis gládio in gutture transfíxus, martýrio coronátur.
          Edéssæ, in Sýria, sanctórum Mártyrum Sarbélii et Bárbeæ soróris, qui, a beáto Barsimǽo Epíscopo baptizáti, ambo, in persecutióne Traiáni, sub Lýsia Prǽside, martýrio coronáti sunt.
          In território Tricassíno sancti Sabiniáni Mártyris, qui, iubénte Aureliáno Imperatóre, pro fide Christi decollátus est.
          Apud Bitúricas, in Aquitánia, sancti Sulpícii Sevéri Epíscopi, virtútibus et eruditióne conspícui.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of February
      
          Of holy Francis de Sales, Bishop of Geneva, Confessor and Doctor of the Church, the special Patron before God of all Catholic writers who illustrate, advance, and defend Christian wisdom through journals or other writings published for the public; who passed over to heaven on the fifth before the Kalends of January, but is especially venerated on this day on account of the Translation of his body.
          At Trier, the deposition of blessed Valerius, Bishop, who was a disciple of Saint Peter the Apostle.
          At Rome, on the Nomentan Way, the birth into heaven of holy Martyrs Papias and Maurus, soldiers, in the time of the Emperor Diocletian; whose mouths Laodicius the Prefect of the City ordered to be beaten with stones at their first confession of Christ, and they were thus dragged to prison, afterwards beaten with rods, and at last struck with leaded scourges until they expired.
          At Perugia, of holy Constantius, Bishop and Martyr; who, together with his companions, under the Emperor Marcus Aurelius, received the crown of martyrdom for the defense of the faith.
          At Milan, of holy Aquilinus the Priest, who, run through the throat with a sword by the Arians, is crowned with martyrdom.
          At Edessa, in Syria, of holy Martyrs Sarbelius and his sister Barbea, who, having been baptized by blessed Barsamaeus the Bishop, were both crowned with martyrdom in the persecution of Trajan, under the prefect Lysia.
          In the territory of Troyes, of holy Sabinianus, Martyr, who was beheaded for the faith of Christ by order of the Emperor Aurelian.
          At Bourges, in Aquitaine, of holy Sulpicius Severus, Bishop, outstanding for virtues and learning.
  psalm.quarto-kal-ndas-i-lii-73a21a329c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Eve of the holy Apostles Peter and Paul.
          Upon the same 28th day of June, were born into the better life:

          At Rome, the holy Pope Leo II.
          At Lyon, in Gaul, the holy martyr Irenaeus, Bishop [of that city.] He was, as holy Jerome writeth, a disciple of the blessed Polycarp, Bishop of Smyrna, and hardly removed from the times of the Apostles. He strove much against heretics both by word and by writing, and was crowned with a glorious martyrdom, along with nearly all the [faithful] people of his city, in the persecution under Severus.
          In Alexandria, in the same persecution under Severus, the holy martyrs Plutarch, Serenus, Heraclides, (who was still under preparation for baptism,) Heron, (a recent convert,) another Serenus, Rhais, (who also was being prepared for baptism,) Potamiena, and her mother Marcella. Of these the most famous is the Virgin Potamiena. She first endured extraordinary contendings for her virginity, and then suffered terrible and unheard-of torments for her faith, and at the last was burnt, along with her mother.
          On the same day, the holy martyr Papius, who, in the persecution under Diocletian, was scourged and put into a vessel filled with boiling oil and fat, and suffered other horrid torments, before he was crowned by being beheaded.
          At Utrecht, the holy martyr Bishop Benignus.
          At Cordova, the holy martyr, the monk Argymirus, who was slain for Christ's faith's sake, in the persecution by the Arabs, [in the ninth century.]
          At Rome, the holy Pope and Confessor Paul I.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Iúlii

          Vigília sanctórum Apostolórum Petri et Pauli.
          Lugdúni, in Gállia, sancti Irenǽi, Epíscopi et Mártyris; qui (ut scribit sanctus Hierónymus) beáti Polycárpi, Smyrnénsis Epíscopi, discípulus fuit, et Apostolicórum témporum vicínus. Is, cum advérsus hæréticos verbis ac scriptis plúrimum decertásset, tandem, in persecutióne Sevéri, cum omni fere civitátis suæ pópulo, coronátus est glorióso martýrio. Ipsíus tamen festívitas quinto Nonas Iúlii celebrátur.
          Traiécti sancti Benígni, Epíscopi et Mártyris.
          Alexandríæ, in persecutióne Sevéri, sanctórum Mártyrum Plutárchi, Seréni, Heraclídis catechúmeni, Herónis neóphyti, et altérius Seréni, Rhaídis catechúmenæ, et Potamiœ́næ cum ipsíus matre Marcélla; inter quos præcípue enítuit Potamiœ́na Virgo, quæ, primo imménsos innumerósque agónes pro virginitáte desudávit, deínde étiam exquisíta et inaudíta torménta pro fide sustínuit, ad últimum, simul cum matre, igne consúmpta est.
          Eódem die sancti Pápii Mártyris, qui, in persecutióne Diocletiáni Imperatóris, flagris cæsus, atque in lebétem, oleo et ádipe fervénti plenum, immíssus, áliaque horrénda supplícia perpéssus, demum, datis cervícibus, coronátur.
          Córdubæ, in Hispánia, sancti Argymíri, Mónachi et Mártyris, qui in persecutióne Arábica, pro Christi fide, in equúleo pósitus et ense transfóssus est.
          Romæ sancti Pauli Primi, Papæ et Confessóris.
          Lúere, in diœcési Brixiénsi, sanctæ Vincéntiæ Gerósa, Vírginis, Institúti Sorórum a Caritáte una cum sancta Bartholomǽa Capitánio Fundatrícis, quam Pius Papa Duodécimus albo sanctárum Vírginum accénsuit.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of July
      
          The Vigil of the holy Apostles Peter and Paul.
          At Lyons, in Gaul, of holy Irenaeus, Bishop and Martyr; who (as Saint Jerome writes) was a disciple of blessed Polycarp, Bishop of Smyrna, and a neighbor of the times of the Apostles. He, having strenuously contended against heretics by word and by writing, was at last, in the persecution of Severus, crowned with glorious martyrdom together with nearly all the people of his city. His feast, however, is celebrated on the fifth before the Nones of July.
          At Utrecht, of holy Benignus, Bishop and Martyr.
          At Alexandria, in the persecution of Severus, of holy Martyrs Plutarchus, Serenus, Heraclides the catechumen, Heron the neophyte, and another Serenus, Rhais the catechumen, and Potamiaena with her mother Marcella; among whom Potamiaena the Virgin especially shone forth, who first endured immense and countless contests for the sake of her virginity, then also bore exquisite and unheard-of torments for the faith, and at last was consumed by fire together with her mother.
          On the same day, of holy Papius, Martyr, who, in the persecution of the Emperor Diocletian, beaten with rods and cast into a cauldron filled with boiling oil and fat, and having endured other dreadful punishments, at last, bowing his neck, was crowned.
          At Córdoba, in Spain, of holy Argymirus, Monk and Martyr, who, in the Arabian persecution, for the faith of Christ, was placed on the rack and run through with a sword.
          At Rome, of holy Paul I, Pope and Confessor.
          At Lovere, in the diocese of Brescia, of holy Vincenza Gerosa, Virgin, co-foundress with holy Bartolomea Capitanio of the Institute of Sisters of Charity, whom Pope Pius XII enrolled in the roll of holy Virgins.
  psalm.quarto-kal-ndas-i-nii-ad138e9f11:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy martyr Eleutherius, Pope of Rome, who led many noble Romans to believe in Christ, and who sent into Britain holy Dyfan and Ffagan, who baptized Lleurwg, Prince [of Morgan,] along with his wife and nearly all his people. Mention is made of him upon the 26th day of this present month of May.
          On the same 29th day of May, were born into the better life:

          At Rome, upon the Aurelian Way, the holy martyr Restitutus.
          At Iconium, a city of Isauria, the holy martyrs Conon and his son aged twelve years. Under the Emperor Aurelian they suffered with great firmness from being basted with oil upon a grating over live coals, stretching upon the rack and fire, and at length gave up the ghost as their hands were being pounded with a wooden mallet.
          On the same day, the holy martyrs Sisinius, Martyrius, and Alexander, who are stated by Paulinus, in his life of holy Ambrose, to have gained the crown of martyrdom in the parts of Val-d'Anagna, under the persecution of the heathen in the time of the Emperor Honorius.
          At Caesarea Philippi, the holy martyrs Theodosia, mother of the holy martyr Procopius, and twelve other noble matrons, who were beheaded in the persecution under Diocletian.
          In Umbria suffered one thousand five hundred and twenty-five holy martyrs.
          At Trier, the blessed Confessor Maximin, Bishop [of that city,] who honourably welcomed the holy Bishop Athanasius when he was in exile from the persecution of the Arians.
          At Verona, [in the fourth century,] the holy Maximus, Bishop [of that see.]
          At Arci, in Latium, the holy Confessor Eleutherius.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Iúnii

          Sanctæ Maríæ-Magdalénæ de Pazzis, ex Ordine Carmelitárum, Vírginis, cuius dies natális octávo Kaléndas Iúnii recensétur.
          Romæ, via Aurélia, natális sancti Restitúti Mártyris.
          Apud Icónium, in Lycaónia, pássio sanctórum Conónis, et fílii annórum duódecim, qui, sub Aureliáno Imperatóre, cratículæ, prunis suppósitis et óleo superinfúso candéntis, suspensiónis in equúleo atque ignis pœnam constánter passi, ad extrémum, málleo ligneo mánibus eórum contrítis, spíritum emisérunt.
          In agro Tridentíno natális sanctórum Mártyrum Sisínii, Martýrii et Alexándri; qui, témpore Honórii Imperatóris, in Anáuniæ pártibus (ut scribit in vita sancti Ambrósii Paulínus), persequéntibus Gentílibus, martýrii corónam adépti sunt.
          Cameríni pássio sanctórum mille quingentórum et vigínti quinque Mártyrum.
          Cæsaréæ Philíppi sanctárum Mártyrum Theodósiæ, quæ sancti Procópii Mártyris éxstitit mater, et aliárum duódecim nobílium matronárum; quæ, in persecutióne Diocletiáni, cápitis obtruncatióne consummátæ sunt.
          Tréviris beáti Maximíni, Epíscopi et Confessóris; a quo sanctus Athanásius Epíscopus, ob persecutiónem Arianórum éxsulans, honorífice suscéptus fuit.
          Verónæ sancti Máximi Epíscopi.
          Arcáni, in Látio, sancti Eleuthérii Confessóris.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of June
      
          Of holy Mary Magdalene de' Pazzi, of the Order of Carmelites, Virgin, whose day of birth into heaven falls on the eighth before the Kalends of June.
          At Rome, on the Aurelian Way, the birth into heaven of holy Restitutus, Martyr.
          At Iconium, in Lycaonia, the passion of holy Conon and his son, twelve years of age, who, under the Emperor Aurelian, having patiently endured suspension on a gridiron with coals laid beneath and boiling oil poured over it, as well as the torment of the rack and of fire, at last had their hands crushed with a wooden mallet and gave up their spirit.
          In the territory of Trento, the birth into heaven of holy Martyrs Sisinnius, Martyrius, and Alexander; who, in the time of the Emperor Honorius, in the district of the Anaunia (as Paulinus writes in the life of Saint Ambrose), were attacked by the Gentiles and obtained the crown of martyrdom.
          At Camerino, the passion of holy fifteen hundred and twenty-five Martyrs.
          At Caesarea Philippi, of holy Martyrs Theodosia, who was the mother of holy Procopius the Martyr, and twelve other noble matrons; who, in the persecution of Diocletian, were completed by beheading.
          At Trier, of blessed Maximinus, Bishop and Confessor; by whom holy Athanasius the Bishop, an exile on account of the persecution of the Arians, was honorably received.
          At Verona, of holy Maximus, Bishop.
          At Arcano, in Latium, of holy Eleutherius, Confessor.
  psalm.quarto-kal-ndas-ianu-rii-e7db4c880d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 29th day of December were born into the better life:

          At Canterbury, in England, the holy martyr Thomas, Archbishop of that see, who for his contending for righteousness and for the privileges of the Church, was smitten with the sword in his own cathedral by a band of wicked men, and so passed away to be with Christ (in the year 1170).
          At Jerusalem, holy David, the King and Prophet (in the year of the world 2950).
          At Arles, holy Trophimus, of whom St. Paul maketh mention in writing unto Timothy. He was ordained bishop by this same Apostle Paul, and was the first who was sent to Arles to preach the Gospel of Christ, and it was a spring, as holy Pope Zosimus writeth, whence streams of faith ran into all Gaul.
          At Rome, the holy martyrs Callistus, Felix, and Boniface.
          In Africa, the holy martyrs Dominic, Victor, Primian, Lybosus, Saturninus, Crescentius, Secundus, and Honoratus.
          At Vienne, in Gaul, holy Crescens, the disciple of the blessed Apostle Paul and the first bishop of the said city.
          At Constantinople, holy Marcellus (of Apamea) Abbot (of the Accemeti in the year 485 or 486 in that city).
          At Hiesmes, in the time of King Childebert, the holy confessor Evroul, Abbot (of the monastery of Ouche, in the diocese of Lisieux, in Normandy. He was born at Bayeux in 517, founded the Abbey of Ouche and became a monk in 567, and died on December 29, 596).
      la:
      - type: text
        text: |-
          Quarto Kaléndas Ianuárii

          Cantuáriæ, in Anglia, natális sancti Thomæ, Epíscopi et Mártyris, qui, ob defensiónem iustítiæ et ecclesiásticæ immunitátis, in Basílica sua, ab impiórum hóminum factióne percússus gládio, Martyr migrávit ad Christum.
          Hierosólymis sancti David, Regis et Prophétæ.
          Areláte, in Gállia, natális sancti Tróphimi, cuius méminit sanctus Paulus ad Timótheum scribens. Ipse autem Tróphimus, ab eódem Apóstolo Epíscopus ordinátus, præfátæ urbi primus ad Christi Evangélium prædicándum diréctus est; ex cuius prædicatiónis fonte (ut sanctus Zósimus Papa scribit) tota Gállia rívulos fídei recépit.
          Romæ sanctórum Mártyrum Callísti, Felícis et Bonifátii.
          In Africa pássio sanctórum Mártyrum Domínici, Victóris, Primiáni, Lybósi, Saturníni, Crescéntii, Secúndi et Honoráti.
          Constantinópoli sancti Marcélli Abbátis.
          In pago Oxyménsi, in Gállia, sancti Ebrúlphi, Abbátis et Confessóris, témpore Childebérti Regis.
          Viénnæ, in Gállia, Commemorátio sancti Crescéntis, Epíscopi et Mártyris, qui fuit discípulus beáti Pauli Apóstoli ac primus eiúsdem civitátis Epíscopus, et cuius dies natális quinto Kaléndas Iúlii celebrátur.
      en2:
      - type: text
        text: |-
          The tenth before the Kalends of January
      
          At Canterbury, in England, the birth into heaven of holy Thomas, Bishop and Martyr, who, for the defense of justice and ecclesiastical immunity, was struck with the sword in his own basilica by a faction of wicked men, and as a Martyr passed over to Christ.
          At Jerusalem, of holy David, King and Prophet.
          At Arles, in Gaul, the birth into heaven of holy Trophimus, of whom Saint Paul makes mention when writing to Timothy. Trophimus himself, ordained Bishop by the same Apostle, was the first to be sent to the aforesaid city to preach the Gospel of Christ; from the fountain of whose preaching (as Pope Saint Zosimus writes) all of Gaul received the streams of faith.
          At Rome, of holy Martyrs Callistus, Felix, and Boniface.
          In Africa, the passion of holy Martyrs Dominicus, Victor, Primianus, Lybosus, Saturninus, Crescentius, Secundus, and Honoratus.
          At Constantinople, of holy Marcellus, Abbot.
          In the district of Ouche, in Gaul, of holy Ebrulfus, Abbot and Confessor, in the time of King Childebert.
          At Vienne, in Gaul, the Commemoration of holy Crescens, Bishop and Martyr, who was a disciple of blessed Paul the Apostle and the first Bishop of that same city, and whose day of birth into heaven is celebrated on the fifth before the Kalends of July.
  psalm.quarto-kal-ndas-m-rtii-703c96073d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep in England the feast of holy Ethelbert, King of Kent, whom holy Augustin, first Archbishop of Canterbury, converted to the faith of Christ, and of whom mention hath been made upon the 24th day of this present month of February.
          Upon the same 26th day of February, were born into the better life:

          At Perga, in Pamphylia, [in the year 251,] blessed Nestor, Bishop [of Magydensis.] During the persecution under Decius he was instant in prayer by day and by night that Christ's flock might be kept safe. When he was arrested he confessed the name of the Lord with wonderful freedom and readiness. By command of the President Pollio he was most cruelly racked, and as he steadfastly declared that he would alway cleave unto Christ, he was at last crucified, and from the cross passed to heaven a conqueror.
          At Perga likewise, [in 251,] the holy martyrs Papias, Diodorus, Conon, and Claudian, who suffered before holy Nestor.
          Also the holy martyrs Fortunatus Felix, and twenty-seven others.
          At Alexandria, [in the year 326,] the glorious Elder, holy Alexander, Pope of that see, wherein he succeeded blessed Peter. He it was who cast his priest Arius out of the church when he became perverted with wicked heresy, and reprobate from the truth of God, and he was afterward one of the three hundred and eighteen fathers who condemned him in the Council of Nicea.
          At Bologna, [in the fourth century,] the holy Bishop [of that see,] Faustinian, who by the preaching of the word of God strengthened and increased that Church when it had been troubled in the persecution under the Emperor Diocletian.
          At Gaza, in Palestine, [in the year 420,] holy Porphyry, Bishop of that see, who in the time of the Emperor Arcadius cast down the idol Mama and its temple, and after many sufferings fell asleep in the Lord.
          At Florence, [in the fifth century,] the holy Confessor Andrew, Bishop of that city, [who succeeded St. Zenobius.]
          In the country of Troyes, [Vitre, in Champagne, in the sixth century,] the holy Confessor Victor, [Victor of Plancy, Priest and Hermit,] whose praises have been written by holy Bernard.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Mártii

          Perge, in Pamphýlia, natális beáti Néstoris Epíscopi, qui, in persecutióne Décii, cum diu noctúque oratióni insísteret póstulans ut grex Christi custodirétur, comprehénsus est, ac, nomen Dómini mira libertáte et alacritáte conféssus, Prǽsidis Polliónis iussu equúleo sævíssime est cruciátus; ac demum, cum se Christo semper adhæsúrum constánter profiterétur, crucis suspéndio victor in cælum migrávit.
          Ibídem pássio sanctórum Pápiæ, Diodóri, Conónis et Claudiáni, qui sanctum Néstorem martýrio præcessérunt.
          Item sanctórum Mártyrum Fortunáti, Felícis et aliórum vigínti septem.
          Alexandríæ sancti Alexándri Epíscopi, gloriósi senis, qui, post beátum Petrum, eiúsdem civitátis Epíscopum, zelo fídei succénsus, Aríum, Presbýterum suum, hærética impietáte depravátum et divína veritáte convíctum, de Ecclésia eiécit; ac póstea, inter trecéntos decem et octo Patres, in Nicǽno Concílio eúndem damnávit.
          Bonóniæ sancti Faustiniáni Epíscopi, qui eam Ecclésiam, Diocletiáni persecutióne vexátam, verbo prædicatiónis firmávit et auxit.
          Gazæ, in Palæstína, sancti Porphýrii Epíscopi, qui, témpore Arcádii Imperatóris, Marnam idólum eiúsque templum evértit, ac, multa passus, quiévit in Dómino.
          Floréntiæ sancti Andréæ, Epíscopi et Confessóris.
          In território Archiacénsi, in Gállia, sancti Victóris Confessóris, cuius laudes sanctus Bernárdus conscrípsit.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Kalends of March
      
          At Perge in Pamphylia, the birthday of blessed Nestor the Bishop, who, during the persecution of Decius, having persevered day and night in prayer beseeching that the flock of Christ might be kept safe, was arrested; and, having confessed the name of the Lord with wondrous freedom and alacrity, was by order of the Governor Pollio most savagely tortured on the rack; and at last, steadfastly professing that he would always cleave to Christ, passed as a victor into heaven by the punishment of crucifixion.
      
          At the same place, the passion of Saints Papia, Diodorus, Conon, and Claudian, who preceded Saint Nestor to martyrdom.
      
          Likewise, Saints Fortunatus, Felix, and twenty-seven others, Martyrs.
      
          At Alexandria, Saint Alexander the Bishop, a glorious elder, who, after blessed Peter the Bishop of that same city, burning with zeal for the faith, cast out of the Church Arius, his Presbyter, corrupted by heretical impiety and convicted of divine truth; and afterwards, among the three hundred and eighteen Fathers at the Council of Nicaea, condemned the same man.
      
          At Bologna, Saint Faustinian the Bishop, who strengthened and enlarged that Church, vexed by the persecution of Diocletian, by the word of preaching.
      
          At Gaza in Palestine, Saint Porphyry the Bishop, who, in the time of the Emperor Arcadius, overthrew the idol Marnas and his temple, and, having suffered much, rested in the Lord.
      
          At Florence, Saint Andrew, Bishop and Confessor.
      
          In the territory of Archiaco in Gaul, Saint Victor the Confessor, whose praises Saint Bernard wrote.
  psalm.quarto-kal-ndas-maii-93ebee25ab:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 28th day of April, were born into the better life:

          We keep the feast of the holy Confessor Paul of the Cross, founder of the congregation
          called that of the Cross and Passion of our Lord Jesus Christ, and of whom mention is made upon the 18th day of October, upon the which day, [in the year 1775,] he fell asleep in the Lord.
          At Ravenna, the holy martyr Vitalis, father of holy Gervase and Protase. He had removed the body of blessed Ursicinus and buried it with due respect for the which cause he was arrested by Paulinus the consular, and when they had racked him, they cast him into a deep pit and buried him alive under earth and stones, and with that testimony he passed away to be with Christ, [in the year 171.]
          At Milan, the holy martyr Valeria, wife of holy Vitalis.
          At Atino, holy Mark, who was ordained Bishop of that see by the blessed Apostle Peter, and was the first that preached the Gospel to the Equicoli, [inhabitants of the Campania round Rome.] He received the crown of martyrdom under the President Maximus, in the persecution under the Emperor Domitian.
          At Alexandria, the holy Virgin Theodora. She would not sacrifice to idols and was sent to a brothel; but one of the brethren, named Didymus, by the favour of God changed clothes with her, and so delivered her thence. Later on, in the persecution under the Emperor Diocletian, they were beheaded together under Eustratius the President, and so were crowned together.
          Upon the same day, the holy martyrs Aphrodisius, [first Bishop of Beziers,] Caralippus, Agapius, and Eusebius, [in the year 65.]
          In Hungary, under the Emperor Diocletian, the holy martyr Pollio. [He was a Reader in the church of Cibales, in the country of Valentinian. Cibales was between the rivers Save and Drave, and is now in ruins. St Pollio suffered on the same day, though at a distance of some years, as his Bishop Eusebius.]
          At Brusa, in Bithynia, the holy martyr Patrick, Bishop of [that see,] Acatius, Menander, and Polyaenus, [third century.]
          At Tarazona, in Spain, the holy Confessor Prudentius, Bishop [of that see, before the year 846.]
          At Pentina, in the Abruzzi, [in the seventh century,] holy Pamphilus, Bishop of Valva, famous for his charity to the poor and gift of miracles. He is buried at Sulmona.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Maii

          Sancti Pauli a Cruce, Presbýteri et Confessóris; qui Congregatiónis a Cruce et Passióne Dómini nostri Iesu Christi nuncupátæ Institútor fuit, atque in Dómino obdormívit quintodécimo Kaléndas Novémbris.
          Atínæ, in Campánia, sancti Marci, qui, a beáto Petro Apóstolo Epíscopus ordinátus, Æquícolis primus Evangélium prædicávit, et in persecutióne Domitiáni, sub Máximo Prǽside, martýrii corónam accépit.
          Prusæ, in Bithýnia, sanctórum Mártyrum Patrícii Epíscopi, Acátii, Menándri et Polyǽni.
          Eódem die sanctórum Mártyrum Aphrodísii, Caralíppi, Agápii et Eusébii.
          In Pannónia sancti Polliónis Mártyris, sub Diocletiáno Imperatóre.
          Medioláni sanctæ Valériæ Mártyris, uxóris sancti Vitális ac matris sanctórum Gervásii et Protásii.
          Alexandríæ pássio sanctæ Theodóræ, Vírginis et Mártyris. Hæc, idólis sacrificáre contémnens, in lupánar est trádita, sed repénte quidam ex frátribus, nómine Dídymus, miro Dei favóre, commutátis véstibus, illam erípuit; qui póstea, in persecutióne Diocletiáni, sub Eustrátio Prǽside, simul cum eádem Vírgine percússus, simul coronátus est.
          Turiasóne, in Hispánia Tarraconénsi, sancti Prudéntii, Epíscopi et Confessóris.
          Corfínii, in Pelígnis, sancti Pámphili, Valvénsis Epíscopi, caritáte in páuperes et virtúte miraculórum illústris; cuius corpus Sulmóne cónditum est.
          In pago sancti Lauréntii ad Séparim, diœcésis Lucionénsis, sancti Ludovíci Maríæ Grignion a Montfort, Confessóris, Fundatóris Missionariórum Societátis Maríæ et Filiárum a Sapiéntia, apostólicæ vitæ forma, prædicatióne et devotióne mariáli insígnis, quem Pius Papa Duodécimus Sanctórum catálogo adscrípsit.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Kalends of May
      
          Saint Paul of the Cross, Presbyter and Confessor, who was the founder of the Congregation named of the Cross and Passion of Our Lord Jesus Christ, and fell asleep in the Lord on the fifteenth day before the Kalends of November.
      
          At Atina in Campania, Saint Mark, who, having been ordained Bishop by blessed Peter the Apostle, first preached the Gospel to the Aequicoli, and in the persecution of Domitian, under the Governor Maximus, received the crown of martyrdom.
      
          At Prusa in Bithynia, the holy Martyrs Patrick the Bishop, Acacius, Menander, and Polyaenus.
      
          On the same day, the holy Martyrs Aphrodisius, Caralepus, Agapius, and Eusebius.
      
          In Pannonia, Saint Pollio the Martyr, under the Emperor Diocletian.
      
          At Milan, Saint Valeria the Martyr, wife of Saint Vitalis and mother of Saints Gervasius and Protasius.
      
          At Alexandria, the passion of Saint Theodora, Virgin and Martyr. She, scorning to sacrifice to idols, was handed over to a brothel; but suddenly a certain one of the brethren, by name Didymus, by the wondrous favor of God, having exchanged garments with her, rescued her; he himself was afterward, in the persecution of Diocletian, under the Governor Eustratius, struck down together with the same Virgin, and together with her was crowned.
      
          At Tarazona in Hispania Tarraconensis, Saint Prudentius, Bishop and Confessor.
      
          At Corfinium among the Paeligni, Saint Pamphilus, Bishop of Valva, illustrious for charity toward the poor and the power of miracles; whose body was buried at Sulmona.
      
          In the district of Saint-Laurent-sur-Sèvre in the diocese of Luçon, Saint Louis Marie Grignion de Montfort, Confessor, Founder of the Missionaries of the Company of Mary and the Daughters of Wisdom, distinguished by the form of apostolic life, preaching, and Marian devotion, whom Pope Pius XII enrolled in the catalogue of the Saints.
  psalm.quarto-kal-ndas-nov-mbris-aeb61d7a7b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the morrow, were born into the better life:

          In Lucania, the holy martyrs Hyacinth, Quintus, Felician, and Lucius.
          At Sidon, in Phoenicia, the holy Priest Zenobius, who, during the raging of the last of the persecutions, exhorted others unto martyrdom, and was himself found worthy of the same.
          Upon the same day, the holy Bishops Maximilian the martyr, and Valentine the Confessor.
          At Bergamo, the holy Virgin and martyr Eusebia.
          At Jerusalem, the blessed Narcissus, Bishop (of that see,) praiseworthy for his holiness, his long-suffering, and his faith, who at the age of one hundred and sixteen years passed away to be ever with the Lord.
          At Autun, the holy Confessor the Bishop John.
          At Cassiope, in the island of Corfu, holy Donatus, of whom writeth blessed Pope Gregory.
          At Vienne, (in the sixth century,) deceased the blessed Theodore, Abbot (of the monastery founded by him in honour of the Blessed Virgin, but commonly called after himself.)
      la:
      - type: text
        text: |-
          Quarto Kaléndas Novémbris

          Sanctórum Episcopórum Maximiliáni Mártyris, et Valentíni Confessóris.
          Sidóne, in Phœnícia, sancti Zenóbii Presbýteri, qui, sub novíssimæ persecutiónis acerbitáte, ad martýrium álios exhórtans, martýrio et ipse dignátus est.
          In Lucánia sanctórum Mártyrum Hyacínthi, Quincti, Feliciáni et Lúcii.
          Bérgomi sanctæ Eusébiæ, Vírginis et Mártyris.
          Hierosólymis natális beáti Narcíssi Epíscopi, sanctitáte, patiéntia ac fide laudábilis, qui, centum et séxdecim annórum senex, felíciter migrávit ad Dóminum.
          Augustodúni sancti Ioánnis, Epíscopi et Confessóris.
          Cassíope, in ínsula Corcýra, sancti Donáti Epíscopi, de quo scribit beátus Gregórius Papa.
          Viénnæ, in Gállia, deposítio beáti Theodóri Abbátis.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Kalends of November
      
          The holy Bishops Maximilian the Martyr and Valentine the Confessor.
      
          At Sidon in Phoenicia, Saint Zenobius the Presbyter, who, amid the bitterness of the most recent persecution, while exhorting others to martyrdom, was himself counted worthy of martyrdom.
      
          In Lucania, the holy Martyrs Hyacinth, Quintus, Felicianus, and Lucius.
      
          At Bergamo, Saint Eusebius, Virgin and Martyr.
      
          At Jerusalem, the birthday of blessed Narcissus the Bishop, praiseworthy for holiness, patience, and faith, who, an elder of a hundred and sixteen years, passed happily to the Lord.
      
          At Autun, Saint John, Bishop and Confessor.
      
          At Cassope on the island of Corcyra, Saint Donatus the Bishop, of whom blessed Pope Gregory writes.
      
          At Vienne in Gaul, the deposition of blessed Theodore the Abbot.
  psalm.quarto-kal-ndas-oct-bris-0a476ecd2f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 28th day of September, was born into the better life:

          In Bohemia, the holy martyr Wenceslaus, Duke of that country, glorious for his holiness and his miracles, who was murdered in the house of his brother, and thus gained the palm of victory.
          At Rome, the holy martyr Privatus. He had been full of sores, whereof he had been healed by the blessed Pope Callistus. Under the Emperor Alexander, for Christ's faith's sake, he was flogged to death with scourges loaded with lead.
          Likewise at Rome, the holy martyr Stacteus.
          In Africa, the holy martyrs Martial, Lawrence, and twenty others.
          At Antioch, in Pisidia, (in the persecution under the Emperor Diocletian,) the holy martyrs Mark, who was a shepherd, Alphius, Alexander, and Zosimus who were his brethren, Nicon, Neon, Heliodorus, and thirty soldiers who were brought to believe in Christ by beholding the wonders wrought by the blessed Mark, and were crowned with martyrdom in diverse manners and places.
          Upon the same day, under the Emperor Decius, the holy martyr Maximus.
          At Toulouse, (at the beginning of the fifth century,) the holy Confessor Exuperius, Bishop (of that see,) concerning whom holy Jerome hath told how sparing he was to himself and how open-handed to others.
          At Genoa, (likewise in the fifth century,) the holy Confessor Salomon, Bishop (of that see.)
          At Brescia, (also in the fifth century,) holy Silvinus, Bishop (of that see.)
          On the same day, the holy Virgin Eustochium, the daughter of blessed Paula, (and disciple of holy Jerome,) who was brought up with other virgins at the Lord's birthplace, and passed away, glorious for eminent good works, to be for ever with this same Lord.
          In Germany, (in the eighth century,) the holy Virgin Lioba, eminent for the gift of miracles.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Octóbris

          Apud Bolesláviam véterem, in Bohémia, sancti Wenceslái, Ducis Bohemórum et Mártyris, sanctitáte et miráculis gloriósi, qui, dolo fratris sui necátus, victor pervénit ad palmam.
          Romæ sancti Priváti Mártyris, qui, ulcéribus plenus, a beáto Callísto Papa est sanátus; inde, sub Alexándro Imperatóre, ob Christi fidem plumbátis cæsus est usque ad mortem.
          Item Romæ sancti Stáctei Mártyris.
          In Africa sanctórum Mártyrum Martiális, Lauréntii et aliórum vigínti.
          Antiochíæ Pisídiæ sancti Marci Mártyris, pastóris óvium; itémque commemorátio sanctórum Alphii, Alexándri et Zósimi fratrum, Nicónis, Neónis, Heliodóri et trigínta mílitum, qui, cum ad mirácula beáti Marci credidíssent in Christum, divérsis in locis ac diébus variísque modis martýrio coronáti sunt.
          Eódem die pássio sancti Máximi, sub Décio Imperatóre.
          Tolósæ sancti Exsupérii, Epíscopi et Confessóris; qui beátus vir quantum sibi parcus exstíterit quantúmque áliis largus, sanctus Hierónymus relátu prosecútus est memorábili.
          Génuæ sancti Salomónis, Epíscopi et Confessóris.
          Bríxiæ sancti Silvíni Epíscopi.
          In Béthlehem Iudæ sanctæ Eustóchii Vírginis, quæ cum beáta Paula, matre sua, ex urbe Roma in Palæstínam profécta est; ibíque, ad Præsépe Dómini cum áliis Virgínibus enutríta, præcláris méritis fulgens migrávit ad Dóminum.
          Schorneshémii, prope Mogúntiam, sanctæ Líobæ Vírginis, miráculis claræ.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Kalends of October
      
          At old Boleslav in Bohemia, Saint Wenceslas, Duke of the Bohemians and Martyr, glorious in holiness and miracles, who, slain by the treachery of his brother, came as a victor to the palm.
      
          At Rome, Saint Privatus the Martyr, who, covered with sores, was healed by blessed Pope Callixtus; thereafter, under the Emperor Alexander, he was beaten with lead-weighted whips unto death for the faith of Christ.
      
          Likewise at Rome, Saint Stacteus the Martyr.
      
          In Africa, the holy Martyrs Martialis, Lawrence, and twenty others.
      
          At Antioch in Pisidia, Saint Mark the Martyr, a shepherd of sheep; and likewise the commemoration of Saints Alphius, Alexander, and Zosimus, brothers, Nicon, Neon, Heliodorus, and thirty soldiers, who, having believed in Christ at the miracles of blessed Mark, were crowned with martyrdom in various places and on various days and by various means.
      
          On the same day, the passion of Saint Maximus, under the Emperor Decius.
      
          At Toulouse, Saint Exuperius, Bishop and Confessor; of this blessed man, how sparing he was toward himself and how lavish toward others, Saint Jerome recounted in a memorable account.
      
          At Genoa, Saint Solomon, Bishop and Confessor.
      
          At Brescia, Saint Silvinus the Bishop.
      
          At Bethlehem of Judah, Saint Eustochium the Virgin, who set out from the city of Rome to Palestine with blessed Paula her mother; and there, nurtured at the Manger of the Lord together with other Virgins, she passed to the Lord resplendent with illustrious merits.
      
          At Schornsheim near Mainz, Saint Lioba the Virgin, renowned for miracles.
  psalm.quarto-kal-ndas-sept-mbris-6e711cb447:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we commemorate the beheading of the holy Baptist John, whom Herod commanded to be beheaded about the time of the feast of the Passover, [in the 31st year of our Lord] but the memorial of his death is solemnly made on the day when his worshipful head was found for the second time, which head hath since been brought to Rome, and is kept with deep reverence of the people in the Church of St. Sylvester, at the Campus Martius, [hence commonly called the Church of St. Sylvester in Capite, that is to say, St. Sylvester with the Head of the Fore-runner.]
          Upon the same 29th day of August, were born into the better life:

          At Rome, [in the year 126,] upon the Aventine Mount, the holy martyr Sabina, who under the Emperor Hadrian was smitten with the sword, and so gained the palm of martyrdom.
          Likewise at Rome, the holy Virgin and martyr Candida, whose body Pope Paschal I. brought to the Church of St. Praxedes.
          At Antioch, in Syria, the holy martyrs Nicasas and Paul.
          At Constantinople, [in the eighth century,] the holy martyrs Hypatius, a Bishop of Asia, and Andrew, a Priest, who were killed, under the Emperor Leo the Isaurian, for the reverence due to the holy images, after their beards had been filled with pitch and set on fire, and their heads flayed.
          At Perugia, [about the year 309,] holy Euthymius, a Roman, who fled thither along with his wife and Crescentius his son, to escape the persecution under the Emperor Diocletian, and there fell asleep in the Lord.
          At Metz, [in the fifth century,] the holy Confessor Adelphus, [sixth] Bishop [of that see.]
          At Paris, [about the year 700,] the holy Priest Mederic.
          In England, [in the year 697,] holy Seb, King [of the East Saxons.]
          At Smyrna, holy Basilla.
          In the country of Troyes, the holy Virgin Sabina, glorious for her graces and miracles.
      la:
      - type: text
        text: |-
          Quarto Kaléndas Septémbris

          Decollátio sancti Ioánnis Baptístæ, quem Heródes circa festum Paschæ decollári præcépit. Ipsíus tamen memória solémniter hac die cólitur, qua venerándum eius caput secúndo invéntum fuit; quod, póstea Romam translátum, in Ecclésia sancti Silvéstri, ad Campum Mártium, summa pópuli devotióne asservátur.
          Romæ, in monte Aventíno, natális sanctæ Sabínæ Mártyris, quæ sub Hadriáno Imperatóre, gládio percússa, martýrii palmam adépta est.
          Veliniáni, in confínibus Apúliæ, pássio sanctórum Vitális, Satóris et Repósiti; qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, capitálem senténtiam pertulérunt. Eórum tamen ac ceterórum ex duódecim frátribus memória Kaléndis Septémbris recólitur.
          Romæ sanctæ Cándidæ, Vírginis et Mártyris; cuius corpus beátus Paschális Primus Papa in Ecclésiam sanctæ Praxédis tránstulit.
          Constantinópoli sanctórum Mártyrum Hypátii, Asiáni Epíscopi, et Andréæ Presbýteri; qui ambo, ob cultum sanctárum Imáginum, sub Leóne Isáurico, barba pice íllita atque incénsa, et cute cápitis extrácta, iuguláti sunt.
          Antiochíæ natális sanctórum Mártyrum Nicǽæ et Pauli.
          Metis, in Gállia, sancti Adélphi, Epíscopi et Confessóris.
          Lutétiæ Parisiórum deposítio sancti Mederíci Presbýteri.
          Perúsiæ sancti Euthýmii Románi, qui, cum uxóre et Crescéntio fílio persecutiónem Diocletiáni fúgiens, ad eam urbem secéssit, et ibi póstmodum quiévit in Dómino.
          In Anglia sancti Sebbi Regis.
          Apud Sírmium natális sanctæ Basíllæ Vírginis.
          In pago Tricassíno sanctæ Sabínæ Vírginis, virtútibus et miráculis gloriósæ.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Kalends of September
      
          The Beheading of Saint John the Baptist, whom Herod commanded to be beheaded around the feast of Passover. His memory, however, is solemnly kept on this day, on which his venerable head was found for the second time; which, afterward translated to Rome, is preserved in the Church of Saint Silvester at the Campus Martius with the highest devotion of the people.
      
          At Rome, on the Aventine Hill, the birthday of Saint Sabina the Martyr, who, under the Emperor Hadrian, was struck with the sword and obtained the palm of martyrdom.
      
          At Vellinum on the borders of Apulia, the passion of Saints Vitalis, Sator, and Repositus; who, sons of Saints Boniface and Thecla, suffered the sentence of death from the judge Valerian under the Emperor Maximian. Their memory, however, along with the rest of the twelve brothers, is commemorated on the Kalends of September.
      
          At Rome, Saint Candida, Virgin and Martyr; whose body blessed Pope Paschal I translated into the Church of Saint Praxedes.
      
          At Constantinople, the holy Martyrs Hypatius, Bishop of Asia, and Andrew the Presbyter; who, both of them, on account of their veneration of the holy Images, were under Leo the Isaurian smeared and set alight with pitch upon their beards, had the skin of their heads stripped away, and were slain.
      
          At Antioch, the birthday of the holy Martyrs Nicaea and Paul.
      
          At Metz in Gaul, Saint Adelphus, Bishop and Confessor.
      
          At Paris, the deposition of Saint Medericus the Presbyter.
      
          At Perugia, Saint Euthymius the Roman, who, fleeing the persecution of Diocletian with his wife and his son Crescentius, withdrew to that city and afterward rested there in the Lord.
      
          In England, Saint Sebbi the King.
      
          At Sirmium, the birthday of Saint Basilla the Virgin.
      
          In the region of Troyes, Saint Sabina the Virgin, glorious in virtues and miracles.
  psalm.quarto-nonas-apr-lis-8f49e6a5e5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 2nd day of April, were born into the better life:

          The holy Confessor Francis of Paola, founder of the Order of Friars Minim, [in the year 1507.] He was famous for his graces and miracles, and Leo X enrolled his name among those of the Saints.
          At Caesarea, in Palestine, the holy martyr Amphian. During the persecution under the Emperor Galerius Maximian he rebuked the President Urban as he was sacrificing unto idols, and for this cause he was savagely mangled, and most cruelly tormented. His feet being wrapped in flax steeped in oil, and set on fire, and at length he was drowned in the sea, and thus did he go through fire and through water, and was brought out into a place of refreshment.
          There also suffered the holy martyr Theodosia, a Virgin of Tyre, during the same persecution. When she saw the holy Confessors standing before the judgment seat, she publicly saluted them, and besought them that when they should be come unto the Lord they would remember her. For this cause the soldiers took her, and led her before Urban the President, and by his command her sides and her breasts were deeply mangled, and she was cast into the sea, [in the year 307.]
          At Lyon, holy Nicetius, Bishop of that city, famous for his life and miracles, [in the year 573.]
          At Como, the holy Confessor Abundius, Bishop of that see, [in the year 468.]
          At Langres, holy Urban, [6th] Bishop of that see, [in the year 395.]
          In Palestine, holy Mary of Egypt, commonly called the sinner, [fifth century.]
      la:
      - type: text
        text: |-
          Quarto Nonas Aprílis

          Turónis, in Gállia, sancti Francísci de Paula Confessóris, qui Ordinis Minimórum Institútor éxstitit; atque, virtútibus et miráculis clarus, a Leóne Papa Décimo in Sanctórum númerum est adscríptus.
          Cæsaréæ, in Palæstína, natális sancti Apphiáni Mártyris, qui, ante sanctum Ædésium Mártyrem, fratrem suum, in persecutióne Galérii Maximiáni, cum Prǽsidem Urbánum idólis immolántem arguísset, sæve dilaniátus est, et, pédibus lino in oleum intíncto eóque incénso obvolútis, acerbíssime cruciátus, ac demum in mare demérsus; atque ita, tránsiens per ignem et aquam, edúctus est in refrigérium.
          Ibídem pássio sanctæ Theodósiæ, Vírginis Týriæ, quæ, in eádem persecutióne, cum sanctos Confessóres ante tribúnal stantes públice salutásset, atque rogásset eos, ut, cum ad Dóminum perveníssent, sui recordaréntur, a milítibus tenta et ad Urbánum Prǽsidem ducta est; eoque iubénte, latéribus et mammis ad interióra usque dilaniátis, in mare tandem proiícitur.
          Apud Língonas, in Gállia, sancti Urbáni Epíscopi.
          Apud Comum sancti Abúndii, Epíscopi et Confessóris.
          Cápuæ sancti Victóris Epíscopi, eruditióne et sanctitáte conspícui.
          Lugdúni, in Gállia, sancti Nicétii, eiúsdem urbis Epíscopi, vita et miráculis clari.
          In Palæstína deposítio sanctæ Maríæ Ægyptíacæ, quæ Peccátrix appellátur.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of April
      
          At Tours in Gaul, Saint Francis of Paola, Confessor, who was the founder of the Order of the Minims; and, renowned for virtues and miracles, was enrolled in the number of the Saints by Pope Leo X.
      
          At Caesarea in Palestine, the birthday of Saint Apphianus the Martyr, who, before Saint Aedesius the Martyr his brother, during the persecution of Galerius Maximian, having rebuked the Governor Urbanus as he was sacrificing to idols, was savagely torn limb from limb, and, with his feet bound in linen soaked in oil and set alight, was tormented most bitterly, and at last drowned in the sea; and thus, passing through fire and water, was led out into refreshment.
      
          At the same place, the passion of Saint Theodosia, a Tyrian Virgin, who, in the same persecution, having publicly greeted the holy Confessors as they stood before the tribunal, and having asked them that, when they should come to the Lord, they would remember her, was seized by soldiers and led before the Governor Urbanus; and at his command, her sides and breasts being torn asunder to the very inward parts, she was at last cast into the sea.
      
          At Langres in Gaul, Saint Urban the Bishop.
      
          At Como, Saint Abundius, Bishop and Confessor.
      
          At Capua, Saint Victor the Bishop, conspicuous for learning and holiness.
      
          At Lyons in Gaul, Saint Nicetius, Bishop of that same city, renowned for life and miracles.
      
          In Palestine, the deposition of Saint Mary of Egypt, who is called the Penitent.
  psalm.quarto-nonas-aug-sti-d67bad1d29:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 2nd day of August, were born into the better life:

          At Nocera-dei-Pagani, [in Campania, Italy, in the year 1787,] holy Alphonsus Mary de Liguori, Bishop of Santa-Agata-de'-Goti, and Founder of the Congregation of the Most Holy Redeemer. Illustrious for the zeal for the salvation of souls shown both by his writings, his words, and his ensample. Pope Gregory XVI. enrolled his name with those of the Saints, and the Supreme Pontiff Pius IX. gave him the title of Doctor of the Church.
          At Rome, in the cemetery of Callistus, [in the year 257,] the holy Pope and martyr Stephen. He was celebrating Mass during the persecution under the Emperor Valerian, when the soldiers broke in. He finished his office before the altar without fear or trembling, and then was beheaded as he sat upon his throne.
          At Nice, in Bithynia, [in the fourth century,] the holy Theodota and her three sons, who were all burned [alive] in the fire together by the order of Neretius, Consular of Bithynia, after he had first caused the eldest son, whose name was Evodius, to be beaten with clubs for his faithful confession of Christ.
          In Africa, [in the year 211,] the holy martyr Rutilius. He had fled from one place to another in order to escape the persecution, and had sometimes bought himself out of danger, when he was unexpectedly arrested and brought before the President. He was long put to the torture, then given over to the fire, and so crowned with a noble testimony.
          At Padua, [in the second century,] the holy Maximus, Bishop of that city, who died a blessed death, famous for miracles.
      la:
      - type: text
        text: |-
          Quarto Nonas Augústi

          Sancti Alfónsi-Maríæ de Ligório, Fundatóris Congregatiónis a sanctíssimo Redemptóre nuncupátæ, Epíscopi sanctæ Agathæ Gothórum, Confessóris et Ecclésiæ Doctóris, qui requiévit in Dómino prídie huius diéi.
          Romæ, in cœmetério Callísti, natális sancti Stéphani Primi, Papæ et Mártyris; qui, in persecutióne Valeriáni, dum Missæ Sacrum perágeret, et, superveniéntibus milítibus, ante altáre intrépidus et immóbilis cœpta mystéria perfíceret, in sede sua decollátus est.
          Nicǽæ, in Bithýnia, pássio sanctæ Theodótæ, cum tribus fíliis suis. Ex his primogénitum, nómine Evódium, cum Christum fiduciáliter confiterétur, fecit primo Nicétius, Consuláris Bithýniæ, fústibus cædi; deínde matrem, cum ómnibus fíliis, igne consúmi.
          In Africa sancti Rutílii Mártyris, qui cum sǽpius, de loco in locum fúgiens, persecutiónem declinásset, et perículum intérdum étiam pecúnia redemísset, ex inopináto aliquándo comprehénsus est, et, Prǽsidi oblátus, torméntis cruciátur plúrimis; demum, ígnibus tráditus, egrégio martýrio coronátur.
          Patávii sancti Máximi, eiúsdem civitátis Epíscopi, qui, miráculis clarus, beáto fine quiévit.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of August
      
          Saint Alphonsus Mary de Liguori, Founder of the Congregation called of the Most Holy Redeemer, Bishop of Sant'Agata de' Goti, Confessor and Doctor of the Church, who rested in the Lord on the day before this day.
      
          At Rome, in the Cemetery of Callixtus, the birthday of Saint Stephen I, Pope and Martyr; who, during the persecution of Valerian, while he was celebrating the Sacred Sacrifice of the Mass, and, with soldiers arriving, was completing the mysteries he had begun, fearless and unmoved before the altar, was beheaded in his chair.
      
          At Nicaea in Bithynia, the passion of Saint Theodota, with her three sons. Of these, the firstborn, by name Evodius, when he had fearlessly confessed Christ, was first ordered by Nicetius, the Consular of Bithynia, to be beaten with rods; then the mother, together with all her sons, to be consumed by fire.
      
          In Africa, Saint Rutilius the Martyr, who, having repeatedly escaped persecution by fleeing from place to place, and having at times even ransomed himself from danger with money, was suddenly arrested on one occasion, and, brought before the Governor, was tormented with very many tortures; at last, handed over to the flames, he was crowned with illustrious martyrdom.
      
          At Padua, Saint Maximus, Bishop of that same city, who, renowned for miracles, rested with a blessed end.
  psalm.quarto-nonas-dec-mbris-c959e320a8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 2nd day of December, were born into the better life:

          At Rome, (about the year 363,) the holy Virgin and martyr Bibiana, who under, the profane Emperor Julian was for Christ's sake flogged to death with scourges loaded with lead.
          There likewise, the holy martyrs the Priest Eusebius, the Deacon Marcellus, Hippolytus, Maximus, Adria, Paulina, Neo, Mary, Martana, and Aurelia, who suffered martyrdom under the judge Secundian, in the persecution under the Emperor Valerian, (in the year 256.)
          Likewise at Rome, (at the end of the 2nd century,) the holy martyr Pontian and four others.
          In Africa, the holy martyrs Severus, Securus, Januarius, and Victorinus, who were there crowned with martyrdom, (about the year of Christ 300.) At Aquileia, (about the year 409,) the holy Confessor Chromatius, Bishop (of that see.)
          At Imola, (in the year 450,) holy Peter, Bishop of Ravenna, styled Chrysologus, (or him of the golden words,) famous for his teaching and holiness, whose feast we keep upon the 4th day of this present month.
          At Verona, (in the sixth century,) the holy Confessor Lupus, Bishop (of that see.)
          At Edessa, (about the year 468,) holy Nonnus, Bishop (first of that see, and afterwards of Heliopolis in Syria,) through whose prayers Pelagia the penitent was converted to Christ.
          At Troas, in Phrygia, holy Bishop Silvanus, famous for miracles.
          At Brescia, holy Bishop Evasius.
      la:
      - type: text
        text: |-
          Quarto Nonas Decémbris

          Romæ pássio sanctæ Bibiánæ, Vírginis et Mártyris, quæ, sub Iuliáno Imperatóre sacrílego, ob Christum támdiu plumbátis cæsa est, donec rédderet spíritum.
          Apud Forum Cornélii, in Æmília, natális sancti Petri, Epíscopi Ravennátis, Confessóris et Ecclésiæ Doctóris, cognoménto Chrysólogi, doctrína et sanctitáte célebris. Ipsíus tamen festum prídie Nonas huius mensis recólitur.
          In Sanciáno, Sinárum ínsula, item natális sancti Francísci Xavérii, Sacerdótis e Societáte Iesu et Confessóris, Indiárum Apóstoli, géntium conversióne, donis et miráculis clari; qui plenus méritis et labóribus obdormívit in Dómino. Ipsum beátum virum Pius Décimus, Póntifex Máximus, cæléstem sodalitáti et óperi Propagándæ Fídei Protectórem elégit atque constítuit; Pius vero Papa Undécimus peculiárem ómnibus Missiónibus Patrónum dedit et confirmávit. Eius autem festívitas, iussu Alexándri Papæ Séptimi, sequénti die celebrátur.
          Romæ sanctórum Mártyrum Eusébii Presbýteri, Marcélli Diáconi, Hippólyti, Máximi, Adriæ, Paulínæ, Neónis, Maríæ, Martánæ et Auréliæ; qui omnes in persecutióne Valeriáni, sub Secundiáno Iúdice, martýrium complevérunt.
          Item Romæ sancti Pontiáni Mártyris, cum áliis quátuor.
          In Africa natális sanctórum Mártyrum Sevéri, Secúri, Ianuárii et Victoríni; qui ibídem martýrio coronáti sunt.
          Aquiléiæ sancti Chromátii, Epíscopi et Confessóris.
          Verónæ sancti Lupi, Epíscopi et Confessóris.
          Edéssæ, in Sýria, sancti Nonni Epíscopi, cuius précibus Pelágia pǽnitens ad Christum convérsa est.
          Tróade, in Phrýgia, sancti Silváni Epíscopi, miráculis clari.
          Bríxiæ sancti Evásii Epíscopi.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of December
      
          At Rome, the passion of Saint Bibiana, Virgin and Martyr, who, under the sacrilegious Emperor Julian, was beaten with lead-weighted whips for Christ until she gave up her spirit.
      
          At Forum Cornelii in Aemilia, the birthday of Saint Peter, Bishop of Ravenna, Confessor and Doctor of the Church, surnamed Chrysologus, celebrated for learning and holiness. His feast, however, is kept on the day before the Nones of this month.
      
          On the island of Sancian belonging to China, likewise the birthday of Saint Francis Xavier, Priest of the Society of Jesus and Confessor, Apostle of the Indies, renowned for the conversion of peoples, for gifts and miracles; who, full of merits and labors, fell asleep in the Lord. This blessed man was chosen and appointed by Pope Pius X, Supreme Pontiff, as heavenly Patron of the Sodality and of the work of the Propagation of the Faith; and Pope Pius XI gave and confirmed him as special Patron of all the Missions. His feast is celebrated on the following day by the order of Pope Alexander VII.
      
          At Rome, the holy Martyrs Eusebius the Presbyter, Marcellus the Deacon, Hippolytus, Maximus, Adria, Paulina, Neon, Maria, Martana, and Aurelia; all of whom completed martyrdom in the persecution of Valerian, under the judge Secundianus.
      
          Likewise at Rome, Saint Pontianus the Martyr, with four others.
      
          In Africa, the birthday of the holy Martyrs Severus, Securus, Januarius, and Victorinus; who were crowned with martyrdom in that same place.
      
          At Aquileia, Saint Chromatius, Bishop and Confessor.
      
          At Verona, Saint Lupus, Bishop and Confessor.
      
          At Edessa in Syria, Saint Nonnus the Bishop, by whose prayers Pelagia the penitent was converted to Christ.
      
          At Troas in Phrygia, Saint Silvanus the Bishop, renowned for miracles.
      
          At Brescia, Saint Evasius the Bishop.
  psalm.quarto-nonas-febru-rii-f99f6fc87f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the feast of the Purification of the Blessed Virgin Mary, which by the Greeks is called the Hypapante that is, the Presentation of the Lord.
          Upon the same 2nd day of February, were born into the better life:

          At Rome, upon the Salarian Way, (in the fourth century,) the holy martyr Apronian. He was a notary, who, while he was a Gentile, was leading the holy Licinius out of prison to present him before the Prefect Laodicius, when he heard a voice from heaven saying, "Come, ye blessed of My Father, inherit the kingdom which is prepared for you from the foundation of the world," whereupon he believed, and was baptized, and was afterwards put to death confessing the Lord.
          Likewise at Rome, the holy martyrs Fortunatus, Felician, Firmus, and Candidus.
          At Caesarea, in Palestine, (in the first century,) the holy centurion Cornelius, who was baptized by the holy Apostle St Peter, and by him also raised to be Bishop in that city.
          At Orleans, holy Flosculus, (about the year 500), Bishop of that see.
          At Canterbury, in England, holy Laurence, (in the year 619,) Archbishop of that see, which he governed in succession to holy Augustin, and converted king Ethelbert himself to the faith. We keep his feast upon the morrow after.
          At Prato, in Tuscany, the holy Florentine Virgin Katherine di Ricci, of the Order of Friars Preachers, eminent for the abundance of her gifts from heaven, whose name the Supreme Pontiff Bendict XIV. enrolled among those of holy virgins.
      la:
      - type: text
        text: |-
          Quarto Nonas Februárii

          Purificátio beátæ Maríæ Vírginis, quæ a Græcis Hypapánte Dómini appellátur.
          Cæsaréæ, in Palæstína, sancti Cornélii Centuriónis, quem beátus Petrus Apóstolus baptizávit, et apud præfátam urbem Episcopáli sublimávit honóre.
          Romæ, via Salária, pássio sancti Aproniáni Commentariénsis, qui, adhuc Gentílis, cum sanctum Sisínium e cárcere edúceret ut Laodício Præfécto præsentáret, vocémque de cælo factam audíret: « Veníte, benedícti Patris mei, percípite regnum, quod vobis parátum est a constitutióne mundi », credens baptizátur, et póstea, in confessióne Dómini, vitæ finem senténtia capitáli accépit.
          Item Romæ sanctórum Mártyrum Fortunáti, Feliciáni, Firmi et Cándidi.
          Aureliánis, in Gállia, sancti Flósculi Epíscopi.
          Cantuáriæ, in Anglia, natális sancti Lauréntii Epíscopi, qui, post sanctum Augustínum, eam Ecclésiam gubernávit, et Regem ipsum ad fidem convértit.
          Prati, in Etrúria, sanctæ Catharínæ de Rícciis, Vírginis Floréntinæ, ex Ordine Prædicatórum, ob cæléstium donórum cópiam insígnis; quam Benedíctus Décimus quartus, Póntifex Máximus, sanctárum Vírginum fastis adscrípsit.
          Burdígalæ sanctæ Ioánnæ de Lestonnác, Víduæ, Institúti Filiárum beátæ Vírginis Maríæ Fundatrícis, caritátis stúdio ac puellárum instituendárum cura insígnis, quam Pius Papa Duodécimus Sanctárum número accénsuit.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of February
      
          The Purification of the Blessed Virgin Mary, which is called by the Greeks the Hypapante of the Lord.
      
          At Caesarea in Palestine, Saint Cornelius the Centurion, whom blessed Peter the Apostle baptized and raised to the honor of the episcopate in the aforementioned city.
      
          At Rome, on the Salarian Way, the passion of Saint Apronianus the Jailer, who, while still a Gentile, as he was bringing Saint Sisinnius out of prison to present him to the Prefect Laodicus, and heard a voice made from heaven — "Come, you blessed of my Father, receive the kingdom prepared for you from the foundation of the world" — believed and was baptized, and afterward, in the confession of the Lord, received the end of his life by sentence of death.
      
          Likewise at Rome, the holy Martyrs Fortunatus, Felicianus, Firmus, and Candidus.
      
          At Orléans in Gaul, Saint Flosculus the Bishop.
      
          At Canterbury in England, the birthday of Saint Laurence the Bishop, who, after Saint Augustine, governed that Church and converted the King himself to the faith.
      
          At Prato in Etruria, Saint Catherine de' Ricci, a Florentine Virgin of the Order of Preachers, distinguished for the abundance of heavenly gifts; whom Blessed Pope Benedict XIV enrolled in the register of holy Virgins.
      
          At Bordeaux, Saint Jeanne de Lestonnac, Widow, Foundress of the Institute of the Daughters of Blessed Virgin Mary, distinguished for zeal of charity and care for the education of girls, whom Pope Pius XII numbered among the Saints.
  psalm.quarto-nonas-i-lii-5472db5548:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of July, were born into the better life:

          The Prophets Hosea [Osee] and Haggai [Aggeus], [766 and 520 B.C.]
          In Africa, the holy martyr Jucundian, who was drowned in the sea for Christ's sake.
          In the county of Bourges, in Gaul, the holy martyr Laurian, Bishop of Seville, in Spain, [in the year 544,] whose head has been taken thither.
          At Sirmich, [in Hungary,] the holy martyrs Innocentius, Sebastia, and thirty others.
          At Madaurus, in Africa, the holy martyrs Namphanion and his Companions, whom he nerved to the fight and carried on to the crown. [Namphanion has among his countrymen been called the Arch- or Proto-Martyr, because he was the first to shed his blood in a public persecution that of Septimius Severus, at the end of the second century. The names of his companions were Miggine, Luciate, and Sanae.]
          At Cyrene, in Libya, the holy Confessor Theodorus, Bishop [of that see,] who in the persecution under Diocletian was hided with scourges loaded with lead, under the President Dignian, and had his tongue cut out, but in the end died in peace.
          On the same day, holy Flavian, second Patriarch of Antioch, and Elias, Bishop of Jerusalem, who were banished by the Emperor Anastasius because of the Council of Chalcedon, and passed away as conquerors to be ever with the Lord.
          At Augsburg, holy Ulderic, Bishop [of that see,] famous for the grace of wonderful self-restraint, beneficence, watchfulness, and miracles, [in the year 973.]
          At Lisbon, the holy widow Isabel, Queen of Portugal, [in the year 1336,] whose feast is kept upon the 8th day of this present month of July by order of Pope Innocent XII.
          At Tours, are commemorated upon this same day both the translation of the body of the holy Confessor Martin, Bishop of that city, and the dedication of his church there, being also the same day whereon he had been ordained Bishop not many years before.
      la:
      - type: text
        text: |-
          Quarto Nonas Iúlii

          Stremótii, in Lusitánia, natális sanctæ Elísabeth Víduæ, Lusitanórum Regínæ, quam, virtútibus et miráculis claram, Urbánus Octávus, Póntifex Máximus, in Sanctórum númerum rétulit. Eius tamen celébritas octávo Idus mensis huius recólitur, ex dispositióne Innocéntii Papæ Duodécimi.
          Sanctórum Osée et Aggǽi Prophetárum.
          In território Bituricénsi sancti Lauriáni, Epíscopi Hispalénsis et Mártyris, cuius caput Híspalim, in Hispánia, delátum est.
          In Africa natális sancti Iucundiáni Mártyris, pro Christo in mare demérsi.
          Sírmii sanctórum Mártyrum Innocéntii et Sebástiæ, cum áliis trigínta.
          Madáuri, in Africa, sancti Namphaniónis Mártyris et Sociórum, quos ille roborávit ad pugnam, et ad corónam provéxit.
          Cyréne, in Líbya, sancti Theodóri Epíscopi, qui, in persecutióne Diocletiáni, sub Digniáno Prǽside, plumbátis cæsus et lingua abscíssus est; atque in pace tandem Conféssor occúbuit.
          Augústæ, in Rhǽtia, sancti Uldaríci Epíscopi, miræ abstinéntiæ, largitátis et vigilántiæ virtúte, ac miraculórum dono illústris.
          Turónis, in Gállia, Translátio sancti Martíni, Epíscopi et Confessóris; et Dedicátio Basílicæ suæ hoc ipso die, quo étiam is ante áliquot annos in Epíscopum fúerat ordinátus.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of July
      
          At Estremoz in Portugal, the birthday of Saint Elizabeth the Widow, Queen of Portugal, whom, renowned for virtues and miracles, Pope Urban VIII, Supreme Pontiff, enrolled in the number of the Saints. Her feast, however, is kept on the eighth day before the Ides of this month, by the appointment of Pope Innocent XII.
      
          The holy Prophets Hosea and Haggai.
      
          In the territory of Bourges, Saint Laurianus, Bishop of Seville and Martyr, whose head was carried to Seville in Spain.
      
          In Africa, the birthday of Saint Jucundianus the Martyr, drowned in the sea for Christ.
      
          At Sirmium, the holy Martyrs Innocentius and Sebastia, with thirty others.
      
          At Madauros in Africa, Saint Namphamon the Martyr and his Companions, whom he strengthened for the battle and led on to the crown.
      
          At Cyrene in Libya, Saint Theodore the Bishop, who, in the persecution of Diocletian, under the Governor Dignianus, was beaten with lead-weighted whips and had his tongue cut out; and at last rested as a Confessor in peace.
      
          At Augsburg in Rhaetia, Saint Uldaricus the Bishop, illustrious for the virtue of wondrous abstinence, generosity, and watchfulness, and for the gift of miracles.
      
          At Tours in Gaul, the Translation of Saint Martin, Bishop and Confessor; and the Dedication of his Basilica on this very day, on which also he had been ordained Bishop some years before.
  psalm.quarto-nonas-i-nii-67585c9a10:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 2nd day of June, were born into the better life:

          At Rome, the holy martyrs Marcellinus the priest, and Peter the Exorcist.
          They were teaching the faith to many in prison in the time of Diocletian, when Serenus the judge, after putting them to terrible bonds and many torments, caused them to be beheaded at the place which was then called the Black Wood, but the name of which was afterwards changed in honor of the Saints, and called the White Wood.
          Their bodies were buried in the crypt, hard by the body of holy Tibertius, and holy Pope Damasus in after-days decorated their grave with a set of verses.
          In Campania, the holy martyr Elmo, Patriarch [of Antioch.] Under the Emperor Diocletian he was first hided with scourges laden with lead, then heavily beaten with cudgels, after which resin, sulphur, lead, pitch, wax, and oil were poured over him, but he still appeared unharmed.
          Thereafter at Formi, under Maximian, he was tortured again with diverse and most cruel sufferings but God preserved him to strengthen others, until at length, famous for his testimony, he fell asleep in a holy death at the call of the Lord. His body was afterwards taken to Gaeta.
          At Lyon, the holy martyrs Photinus the Bishop, Sanctus the Deacon, Vetius, Epagathus, Maturus, Ponticus, Biblides, Attalus, Alexander, and Blandina, with many others, whose mighty and constant contendings, in the time of Marcus Aurelius Antoninus and Lucius Verus, are written in the Epistle of the Church of Lyon to the Churches of Asia and Phrygia; among these the holy Blandina, weaker by sex, frailer in body, lower in social position, underwent contendings more long and more sharp, and remaining still inflexible, was slain by the sword, and so followed the others whom she had exhorted to victory.
          At Rome, [in the year 657,] the holy Confessor Pope Eugenius I.
          At Trani, in Apulia, [in the year 1094,] the holy Confessor Nicholas Peregrini, whose wonderful works were published in a Council at Rome under Pope Urban II.
      la:
      - type: text
        text: |-
          Quarto Nonas Iúnii

          Romæ natális sanctórum Mártyrum Marcellíni Presbýteri, et Petri Exorcístæ, qui, sub Diocletiáno, cum multos in cárcere ad fidem erudírent, ídeo, post dira víncula et plúrima torménta, a Seréno Iúdice decolláti sunt in loco qui dicebátur Silva Nigra; quæ deínde, in honórem Sanctórum, commutáto nómine, Silva Cándida appelláta est. Horum córpora in crypta, iuxta sanctum Tibúrtium, sepúlta sunt; eorúmque sepúlcrum sanctus Dámasus Papa vérsibus póstea exornávit.
          In Campánia sancti Erásmi, Epíscopi et Mártyris. Hic, sub Diocletiáno Augústo, primum plumbátis cæsus, deínde fústibus gráviter mactátus, post resína, súlphure, plumbo, pice, cera oleóque perfúsus, illǽsus appáruit; deínde Fórmiis, sub Maximiáno, divérsis atque immaníssimis supplíciis íterum tortus, sed ad confirmándum céteros a Deo servátus; tandem, vocánte Dómino, martýrio clarus, sancto fine quiévit. Ipsíus autem corpus Caiétam póstea translátum est.
          Lugdúni, in Gállia, sanctórum Mártyrum Pothíni Epíscopi, Sancti Diáconi, Vétii, Epagáthi, Maturi, Póntici, Bíblidis, Attali, Alexándri et Blandínæ, cum áliis multis; quorum fórtia et iteráta certámina, témpore Marci Aurélii Antoníni et Lúcii Veri, Ecclésiæ Lugdunénsis epístola, ad Ecclésias Asiæ et Phrýgiæ scripta, recénset. In his sancta Blandína, sexu infírmior, córpore imbecíllior, conditióne deiéctior, diuturnióra et acerbióra certámina súbiens, et fortis adhuc pérmanens, gládio iuguláta, céteros secúta est, quos hortabátur ad palmam.
          In ínsula Proconnéso, in Propóntide, sancti Nicéphori, Epíscopi Constantinopolitáni, qui, paternárum traditiónum propugnátor acérrimus, pro cultu sanctárum Imáginum se Leóni Arméno, Imperatóri Iconoclástæ, constánter oppósuit; a quo mulctátus exsílio, ibídem, cum per quatuórdecim annos longum duxísset martýrium, migrávit ad Dóminum.
          Romæ sancti Eugénii Primi, Papæ et Confessóris.
          Trani, in Apúlia, sancti Nicolái Peregríni Confessóris, cuius mirácula in Concílio Románo, cui beátus Urbánus Papa Secúndus prǽfuit, recitáta sunt.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of June
      
          At Rome, the birthday of the holy Martyrs Marcellinus the Presbyter and Peter the Exorcist, who, under Diocletian, having instructed many in the faith while in prison, were on that account, after grievous bonds and very many tortures, beheaded by the judge Serenus in a place that was called the Dark Wood; which thereafter, in honor of the Saints, was changed in name and called the White Wood. Their bodies were buried in a crypt near Saint Tiburtius; and their tomb was afterward adorned with verses by Pope Saint Damasus.
      
          In Campania, Saint Erasmus, Bishop and Martyr. He, under the Emperor Diocletian, first beaten with lead-weighted whips, then gravely scourged with rods, afterward drenched with resin, sulphur, lead, pitch, wax, and oil, appeared unharmed; then at Formiae, under Maximian, tortured again with diverse and most terrible punishments, yet preserved by God to confirm the others; at last, called by the Lord, glorious in martyrdom, he rested with a holy end. His body was afterward translated to Gaeta.
      
          At Lyons in Gaul, the holy Martyrs Pothinus the Bishop, Sanctus the Deacon, Vetius, Epagathus, Maturus, Ponticus, Biblis, Attalus, Alexander, and Blandina, together with many others; whose courageous and repeated struggles during the time of Marcus Aurelius Antoninus and Lucius Verus are recounted in the letter of the Church of Lyons written to the Churches of Asia and Phrygia. Among these, Saint Blandina, weaker in sex, feebler in body, lower in condition, enduring more prolonged and more bitter contests, and remaining still strong, was slain with the sword and followed the others whom she had exhorted to the palm.
      
          On the island of Proconnesus in the Propontis, Saint Nicephorus, Bishop of Constantinople, the most ardent defender of ancestral traditions, who steadfastly opposed Leo the Armenian, the Iconoclast Emperor, on behalf of the veneration of the holy Images; and, punished by him with exile, after having endured a long martyrdom there for fourteen years, passed to the Lord.
      
          At Rome, Saint Eugenius I, Pope and Confessor.
      
          At Trani in Apulia, Saint Nicholas the Pilgrim, Confessor, whose miracles were recounted at the Roman Council over which blessed Pope Urban II presided.
  psalm.quarto-nonas-ianu-rii-995a26a1e9:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Octave of holy Stephen the Proto-Martyr. At Rome are commemorated upon the same day many holy martyrs who defied the edict of the Emperor Diocletian whereby it was commanded to give up the holy books, they being willing rather to give over their own bodies to the executioners than to give unto dogs that which was holy.
          Upon the same 2nd day of January, were born into the better life:

          At Antioch, blessed Isidore, Bishop (in the year 420).
          At Tomi, in Pontus, under Emperor Licinius, the three holy brethren, Argeus, Narcissus, and Marcellinus.
          Argeus and Narcissus were slain with the sword. Marcellinus was a boy, he was taken among the recruits, and for as much as he would not be a soldier he was grievously flogged, and after suffering long in prison was drowned in the sea (in the year 320.)
          At Milan (after the year 431), holy Martinian (17th) bishop of that see.
          At Nitria, in Egypt, the blessed confessor Isidore (Bishop of Hermopolis in the fourth century).
          Upon the same day the holy Bishop Siridion.
          In the Thebaid the holy Abbot Macarius of Alexandria (about the year 395.)
      la:
      - type: text
        text: |-
          Quarto Nonas Ianuárii

          Romæ commemorátio plurimórum sanctórum Mártyrum, qui, spreto Diocletiáni Imperatóris edícto quo tradi sacri Códices iubebántur, pótius córpora carnifícibus quam sancta dare cánibus maluérunt.
          Antiochíæ pássio beáti Isidóri Epíscopi.
          Tomis, in Ponto, sanctórum fratrum Argéi, Narcíssi et Marcellíni púeri. Hic, sub Licínio Príncipe, cum inter tirónes esset comprehénsus et nollet militáre, hinc, cæsus ad mortem ac diu macerátus in cárcere, demum, in mare demérsus, martýrium consummávit; eius autem fratres gládio perémpti sunt.
          Medioláni sancti Martiniáni Epíscopi.
          Nítriæ, in Ægýpto, beáti Isidóri, Epíscopi et Confessóris.
          Ipso die sancti Siridiónis Epíscopi.
          In Thebáide sancti Macárii Alexandríni, Presbýteri et Abbátis.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of January
      
          At Rome, the commemoration of very many holy Martyrs, who, scorning the edict of the Emperor Diocletian by which the sacred Books were ordered to be surrendered, chose rather to give their bodies to the executioners than holy things to dogs.
      
          At Antioch, the passion of blessed Isidore the Bishop.
      
          At Tomis in Pontus, the holy brothers Argeus, Narcissus, and the boy Marcellinus. He, under the Prince Licinius, having been conscripted among the recruits and refusing to serve as a soldier, was therefore beaten to the point of death and long macerated in prison, and at last drowned in the sea, thus completing his martyrdom; his brothers, however, were put to death by the sword.
      
          At Milan, Saint Martinianus the Bishop.
      
          At Nitria in Egypt, blessed Isidore, Bishop and Confessor.
      
          On the same day, Saint Siridion the Bishop.
      
          In the Thebaid, Saint Macarius of Alexandria, Presbyter and Abbot.
  psalm.quarto-nonas-m-rtii-89029df033:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of March, were born into the better life:

          At Vilnius, in Lithuania, the blessed Casimir, [Duke of Lithuania,] son of Casimir III, King of Poland, whose name the Roman Pontiff, Leo X, numbered with those of the Saints, [in the year 1458-83.]
          At Rome, upon the Appian Way, the holy martyr Pope Lucius. He was first banished in the persecution under the Emperor Valerian, but was afterwards permitted by the will of God to return to his church, and after toiling much against the Novatians, finished his testimony by being beheaded. He is highly praised by holy Cyprian.
          Likewise at Rome, upon the Appian Way, nine hundred holy martyrs, [led by Aristion and Licinius, both Bishops,] who are laid in the cemetery called that of St. Cecilia.
          Upon the same day, the holy martyr Caius, [an officer of the Imperial Palace,] who was drowned in the sea, and twenty-seven others.
          At Nicomedia, the holy martyr Hadrian, and twenty-three others, who, under the Emperor Diocletian, all had their legs broken, and were so left to die. The principal feast in memory of Hadrian is kept upon the 8th day of September, when his body was brought to Rome.
          Likewise the holy martyrs Archelaus, Cyril, and Photius.
          In the Crimea, the holy Bishops Basil, Eugenius, Agathodormus, Elpidius, Aetherius, Capito, Ephrem, Nestor, and Arcadius.
      la:
      - type: text
        text: |-
          Quarto Nonas Mártii

          Vilnæ, in Lithuánia, beáti Casimíri Confessóris, e Casimíro Rege progéniti: quem Leo Décimus, Románus Póntifex, in Sanctórum númerum rétulit.
          Romæ, via Appia, natális sancti Lúcii Primi, Papæ et Mártyris; qui, primo in persecutióne Valeriáni ob Christi fidem exsílio relegátus, et póstmodum divíno nutu ad Ecclésiam suam redíre permíssus, tandem, cum plúrimum advérsus Novatiános laborásset, cápitis obtruncatióne martýrium complévit. Eum vero sanctus Cypriánus summis láudibus celebrávit.
          Nicomedíæ sancti Hadriáni Mártyris, cum áliis vigínti tribus, qui omnes, sub Diocletiáno Imperatóre, martýrium crurifrágio consummárunt. Eórum relíquiæ, a Christiánis Byzántium delátæ, reverénti honóre sepúltæ fuérunt; inde póstea sancti Hadriáni corpus Romam translátum fuit sexto Idus Septémbris, quo die festívitas eius potíssimum celebrátur.
          Romæ, via Appia, sanctórum Mártyrum nongentórum, qui pósiti sunt in cœmetério ad sanctam Cæcíliam.
          Apud Chersonésum pássio sanctórum Episcopórum Basilíi, Eugénii, Agathodóri, Elpídii, Æthérii, Capitónis, Ephræm, Néstoris et Arcádii.
          Eódem die sancti Caii Palatíni, in mare demérsi, et aliórum vigínti septem.
          Item pássio sanctórum Archelái, Cyrílli et Phótii.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of March
      
          At Vilnius in Lithuania, blessed Casimir the Confessor, born of King Casimir, whom Leo X, Roman Pontiff, enrolled in the number of the Saints.
      
          At Rome, on the Appian Way, the birthday of Saint Lucius I, Pope and Martyr; who, first sent into exile for the faith of Christ in the persecution of Valerian, and afterward permitted by divine providence to return to his Church, at last, having labored greatly against the Novatians, completed his martyrdom by beheading. Saint Cyprian celebrated him in the highest praises.
      
          At Nicomedia, Saint Adrian the Martyr, with twenty-three others, who all, under the Emperor Diocletian, completed their martyrdom by the breaking of their legs. Their relics, carried by Christians to Byzantium, were buried with reverent honor; afterward the body of Saint Adrian was translated to Rome on the sixth day before the Ides of September, on which day his feast is chiefly celebrated.
      
          At Rome, on the Appian Way, the holy Martyrs, nine hundred in number, who were placed in the cemetery at Saint Cecilia.
      
          At Chersonesus, the passion of the holy Bishops Basil, Eugenius, Agathodorus, Elpidius, Aetherius, Capiton, Ephrem, Nestor, and Arcadius.
      
          On the same day, Saint Caius of the Palace, drowned in the sea, and twenty-seven others.
      
          Likewise, the passion of Saints Archelaus, Cyril, and Photius.
  psalm.quarto-nonas-maii-b3c62803c8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of May, were born into the better life:

          At Ostia, that is the mouth of the Tiber, [in the year 387,] the holy Monica, the mother of blessed Augustine, as to whose illustrious life he hath left unto us his witness in the ninth book of his Confessions, and of whom we keep feast on the 14th
          day of this present month of May.
          At the mines of Phaeno, in Palestine, the blessed Silvanus, Bishop of Gaza, who was crowned with martyrdom, [in the year 311,] along with many of his clergy, by order of the Caesar Gallerius Maximian, in the persecution under Diocletian.
          Also thirty-nine holy martyrs condemned to the mines at the same place, who, after they had been scorched with red-hot iron and had endured other torments, were beheaded at the same time.
          At Jerusalem, Cyriacus, the holy Bishop [of Ancona,] who was on pilgrimage to the holy places when he was slain, under the Emperor Julian the Apostate.
          In Umbria, the holy martyr Porphyry, [under the Emperor Decius.]
          At Nicomedia, the holy martyr Antonia. She was put grievously to the torture, and afflicted with diverse sufferings. After she had been kept in prison for two years, and when she had been hung up by one arm for three days, at last the President
          Priscilian caused her to be burnt for confessing the Lord.
          At Lorck, in Austria, the holy martyr Florian. A stone was tied to his neck and he was cast into the river Enns by order of the President Aquilinus, under the Emperor Diocletian.
          At Tarsus, the holy Virgin Pelagia, who was shut up inside a bull of heated bronze, under Diocletian, and so finished her testimony.
          At Cologne, the holy martyr Paulinus.
          At Milan, [in the year 408,] the holy Venerius, Bishop of that place, as to whose excellency holy John Chrysostom hath left unto us his witness in the epistle which he wrote unto him.
          In the district of Perigueax, [in the year 720,] the holy Sacerdos, Bishop of Limoges.
          At Hildesheim, in Saxony, the holy Confessor Gothard, [Bishop of that see,] and who was numbered among the Saints by Pope Innocent II.
          At Auxerre, the holy deacon Curcodomus [in the third century.]
      la:
      - type: text
        text: |-
          Quarto Nonas Maii

          Apud Ostia Tiberína sanctæ Mónicæ, beáti Augustíni matris, cuius ille præcláram vitam, in libro nono Confessiónum, testátam relíquit.
          In metállo Phennénsi Palæstínæ natális beáti Silváni, Gazæ Epíscopi, qui, in Diocletiáni Imperatóris persecutióne, Galérii Maximiáni Cǽsaris mandáto, cum plúrimis suis Cléricis, martýrio coronátus est.
          Hierosólymis sancti Cyríaci Epíscopi, qui, cum loca sancta visitáret, ibídem, sub Iuliáno Apóstata, cæsus est.
          Cameríni sancti Porphýrii, Presbýteri et Mártyris, qui, sub Décio Imperatóre et Antíocho Prǽside, cum plúrimos (in quibus fuit Venántius) ad Christi fidem convertísset, cápite amputátus est.
          In metállo Phennénsi Palæstínæ sanctórum trigínta novem Mártyrum, qui, ad metálla damnáti, demum, post adustiónem candéntis ferri et ália torménta, simul cápite cæsi sunt.
          Lauréaci, in Nórico Ripénsi, sancti Floriáni Mártyris, qui, sub Diocletiáno Imperatóre, Aquilíni Prǽsidis iussu, in flumen Anísum, ligáto ad collum saxo, præcipitátus est.
          Colóniæ Agrippínæ sancti Paulíni Mártyris.
          Tarsi, in Cilícia, sanctæ Pelágiæ, Vírginis et Mártyris, quæ, sub Diocletiáno Imperatóre, in bovem ǽneum candéntem inclúsa, martýrium complévit.
          Nicomedíæ natális sanctæ Antóniæ Mártyris, quæ, nímium torta et váriis afflícta cruciátibus, áltero bráchio tribus suspénsa diébus, et in cárcere biénnio deténta, ad últimum a Priscilliáno Prǽside, in confessióne Dómini, flammis exústa est.
          Medioláni sancti Venerii Epíscopi, cuius virtútes sanctus Ioánnes Chrysóstomus, in epístola ad eum scripta, testátas relíquit.
          In território Petragoricénsi sancti Sacerdótis, Epíscopi Lemovicénsis.
          Hildeshémii, in Saxónia, sancti Godehárdi, Epíscopi et Confessóris, qui ab Innocéntio Papa Secúndo in Sanctórum censum relátus est.
          Antisiodóri sancti Curcódomi Diáconi.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of May
      
          At Ostia on the Tiber, Saint Monica, mother of blessed Augustine, whose illustrious life he left recorded in the ninth book of his Confessions.
      
          At the mines of Phaeno in Palestine, the birthday of blessed Silvanus, Bishop of Gaza, who, in the persecution of the Emperor Diocletian, by command of Galerius Maximian the Caesar, was crowned with martyrdom together with very many of his clergy.
      
          At Jerusalem, Saint Cyriacus the Bishop, who, while visiting the holy places, was slain there under Julian the Apostate.
      
          At Camerino, Saint Porphyrius, Presbyter and Martyr, who, under the Emperor Decius and the Governor Antiochus, having converted very many — among whom was Venantius — to the faith of Christ, was beheaded.
      
          At the mines of Phaeno in Palestine, the holy thirty-nine Martyrs, who, condemned to the mines, at last, after the burning of red-hot iron and other tortures, were beheaded together.
      
          At Lorch in Ripensian Noricum, Saint Florian the Martyr, who, under the Emperor Diocletian, by order of the Governor Aquilinus, was cast headlong into the river Anisius with a stone tied to his neck.
      
          At Cologne, Saint Paulinus the Martyr.
      
          At Tarsus in Cilicia, Saint Pelagia, Virgin and Martyr, who, under the Emperor Diocletian, enclosed in a red-hot bronze bull, completed her martyrdom.
      
          At Nicomedia, the birthday of Saint Antonia the Martyr, who, excessively tortured and afflicted with various cruelties, suspended by one arm for three days, and detained in prison for two years, was at last burned in the flames by the Governor Priscillian in the confession of the Lord.
      
          At Milan, Saint Venerius the Bishop, whose virtues Saint John Chrysostom left attested in a letter written to him.
      
          In the territory of Périgueux, Saint Sacerdos, Bishop of Limoges.
      
          At Hildesheim in Saxony, Saint Godehard, Bishop and Confessor, who was enrolled in the catalogue of the Saints by Pope Innocent II.
      
          At Auxerre, Saint Curcodomus the Deacon.
  psalm.quarto-nonas-nov-mbris-9161b87b58:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is made the Commemoration of all the faithful departed.

          Upon the same 2nd day of November, were born into the better life:

          Holy Victorinus, Bishop of Poitiers, who, after publishing many writings, as witnesseth holy Jerome, was crowned with martyrdom in the persecution under the Emperor Diocletian.
          At Trieste, blessed Justus, who, in the same persecution, was martyred under the President Manatius.
          At Sebaste, under the Emperor Licinius, the holy martyrs Carterius, Styriacus, Tobias, Eudoxius, Agapius, and their Companions.
          In Persia, the holy martyrs Acindynus, Pegasius, Aphthonius, Elpidephorus, and Anempodistus, with many others their Companions.
          In Africa, the holy martyrs Publius, Victor, Hermes, and Papias.
          At Tarsus, in Cilicia, under the Emperor Julian the Apostate, the holy Virgin and martyr Eustochium, who, after grievous torments, gave up her soul in prayer to God.
          At Laodicea, in Syria, (in the year 334) holy Theodotus, Bishop (of that see,) who excelled not in word only, but in deed and in power.
          At Vienne, (in the seventh century,) holy George, Bishop (of that see.)
          In the monastery of St. Moritz, in Switzerland, (in the sixth century,) the holy Abbot Ambrose.
          At Cyrus, in Syria, the holy Confessor Marcian, (fourth century.)
      la:
      - type: text
        text: |-
          Quarto Nonas Novémbris

          Commemorátio ómnium Fidelium Defunctorum.

          Pœtovióne, in Pannónia superióre, natális sancti Victoríni, eiúsdem civitátis Epíscopi, qui, post multa édita scripta (ut sanctus Hierónymus testátur), in persecutióne Diocletiáni, martýrio coronátus est.
          Tergéste pássio beáti Iusti, qui in eádem persecutióne, sub Manátio Prǽside, martýrium consummávit.
          Sebáste, in Arménia, sanctórum Cartérii, Styriáci, Tobíæ, Eudóxii, Agápii et Sociórum Mártyrum, sub Licínio Imperatóre.
          In Pérside sanctórum Mártyrum Acíndyni, Pegásii, Aphthónii, Elpidíphori et Anempodísti, cum plúrimis Sóciis.
          In Africa natális sanctórum Mártyrum Públii, Victóris, Hermétis et Pápiæ.
          Tarsi, in Cilícia, sanctæ Eustóchii, Vírginis et Mártyris; quæ, sub Iuliáno Apóstata, post dira torménta, in oratióne réddidit spíritum.
          Laodicéæ, in Sýria, sancti Theódoti Epíscopi, qui non solum verbis, sed rebus quoque et virtútibus fuit ornátus.
          Viénnæ, in Gállia, sancti Geórgii Epíscopi.
          In monastério Agaunénsi, in Gállia, sancti Ambrósii Abbátis.
          Cyri, in Sýria, sancti Marciáni Confessóris.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of November
      
          The Commemoration of All the Faithful Departed.
      
          At Poetovio in Upper Pannonia, the birthday of Saint Victorinus, Bishop of that same city, who, after producing many writings (as Saint Jerome attests), was crowned with martyrdom in the persecution of Diocletian.
      
          At Trieste, the passion of blessed Justus, who in the same persecution, under the Governor Manatius, completed his martyrdom.
      
          At Sebaste in Armenia, the holy Martyrs Carterius, Styriacus, Tobias, Eudoxius, Agapius, and their Companions, under the Emperor Licinius.
      
          In Persia, the holy Martyrs Acindynus, Pegasius, Aphthonius, Elpidiphorus, and Anempodistus, with very many Companions.
      
          In Africa, the birthday of the holy Martyrs Publius, Victor, Hermes, and Papia.
      
          At Tarsus in Cilicia, Saint Eustochium, Virgin and Martyr; who, under Julian the Apostate, after terrible tortures, gave up her spirit in prayer.
      
          At Laodicea in Syria, Saint Theodotus the Bishop, who was adorned not only with words but also with deeds and virtues.
      
          At Vienne in Gaul, Saint George the Bishop.
      
          At the monastery of Agaunum in Gaul, Saint Ambrose the Abbot.
      
          At Cyrrhus in Syria, Saint Marcianus the Confessor.
  psalm.quarto-nonas-oct-bris-11946d184e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 4th day of October, were born into the better life:

          At Assisi, in Umbria, the holy Confessor Francis, (1182-1226,) Founder of the Order of Friars Minor, whose life, full of holiness and miracles, hath been written by St. Bonaventure.
          At Corinth, holy Crispus and Caius, (first century,) of whom the holy Apostle Paul maketh mention in writing unto the Corinthians.
          In Egypt, the holy brethren Mark and Marcian, (in the year 304,) and a multitude of other holy martyrs which is almost countless, both of men and of women, of old and of young some after stripes and some after horrid torments of diverse kinds were burnt, some cast into the sea, a few beheaded, many starved to death, others crucified (some of these with their head downward), and so earned a most blessed crown of martyrdom.
          At Damascus, the holy Bishop and martyr Peter, (in the year 742) he was accused of teaching the faith of Christ, before the Prince of the Hagarenes. His tongue, hands, and feet were cut off, and he was fastened to a cross, and there finished his testimony.
          At Alexandria, the holy Priests and Deacons Caius, Faustus, Eusebius, Chaeremon, Lucius, and their Companions, of whom some suffered martyrdom in the persecution under the Emperor Valerian, and others by serving the martyrs gained the martyr's reward.
          At Athens, holy Hierotheus, a disciple of the blessed Apostle Paul.
          At Bologna, (in the fifth century,) the holy Confessor Petronius, Bishop (of that see,) who was famous for his teaching, his miracles, and his holiness.
          At Paris, (in the year 666,) the holy Virgin Aurea, (Abbess at Paris.)
      la:
      - type: text
        text: |-
          Quarto Nonas Octóbris

          Assísii, in Umbria, natális sancti Francísci, Levítæ et Confessóris; qui trium Ordinum, scílicet Fratrum Minórum, Páuperum Dominárum, ac Fratrum et Sorórum de Pæniténtia, Fundátor éxstitit. Ipsíus autem vitam, sanctitáte ac miráculis plenam, sanctus Bonaventúra conscrípsit.
          Corínthi item natális sanctórum Crispi et Caii, quorum méminit sanctus Paulus Apóstolus ad Corínthios scribens.
          Athénis sancti Hieróthei, qui fuit discípulus ipsíus beáti Pauli Apóstoli.
          Damásci sancti Petri, Epíscopi et Mártyris; qui, accusátus apud Agarenórum Príncipem quod fidem Christi docéret, ídeo, lingua et mánibus pedibúsque amputátis, cruci affíxus martýrium consummávit.
          Alexandríæ sanctórum Presbyterórum, et Diaconórum Caii, Fausti, Eusébii, Chærémonis, Lúcii et Sociórum; ex quibus álii, in persecutióne Valeriáni, Mártyres facti sunt, álii, Martýribus serviéntes, mercédem Mártyrum recepérunt.
          In Ægýpto sanctórum Mártyrum Marci et Marciáni fratrum, et aliórum ferme innumerabílium utriúsque sexus atque omnis ætátis; quorum álii post vérbera, álii post divérsa géneris horríbiles cruciátus flammis tráditi, álii in mare præcipitáti, nonnúlli cápite cæsi, plúrimi inédia consúmpti, álii patíbulis affíxi, quidam étiam, cápite deórsum verso et pédibus in sublíme sublátis, appénsi, beatíssimam martýrii corónam meruérunt.
          Bonóniæ sancti Petrónii, Epíscopi et Confessóris; qui doctrína, miráculis et sanctitáte cláruit.
          Lutétiæ Parisiórum sanctæ Aureæ Vírginis.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of October
      
          At Assisi in Umbria, the birthday of Saint Francis, Levite and Confessor, who was the founder of three Orders, namely the Friars Minor, the Poor Ladies, and the Brothers and Sisters of Penance. His life, full of holiness and miracles, was written by Saint Bonaventure.
      
          At Corinth, likewise the birthday of Saints Crispus and Caius, whom Saint Paul the Apostle mentions when writing to the Corinthians.
      
          At Athens, Saint Hierotheus, who was a disciple of blessed Paul the Apostle himself.
      
          At Damascus, Saint Peter, Bishop and Martyr; who, accused before the prince of the Saracens of teaching the faith of Christ, had his tongue, hands, and feet cut off, was affixed to a cross, and thus completed his martyrdom.
      
          At Alexandria, the holy Presbyters and Deacons Caius, Faustus, Eusebius, Chaeremon, Lucius, and their Companions; of whom some were made Martyrs in the persecution of Valerian, while others, serving the Martyrs, received the reward of Martyrs.
      
          In Egypt, the holy Martyrs Mark and Marcian, brothers, and nearly innumerable others of both sexes and every age; of whom some were given to the flames after flogging, others after various terrible tortures of different kinds, others were cast into the sea, some were beheaded, very many were consumed by starvation, others were affixed to gibbets, and some, suspended with their heads turned downward and their feet raised aloft, merited the most blessed crown of martyrdom.
      
          At Bologna, Saint Petronius, Bishop and Confessor, renowned for learning, miracles, and holiness.
      
          At Paris, Saint Aurea the Virgin.
  psalm.quarto-nonas-sept-mbris-b185859f9e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Stephen, King of Hungary, adorned with many graces from God, who was the first to turn the Hungarians to believe in Christ, and who was received by the Virgin Mother of God into heaven upon the very day of her Assumption, but by the appointment of Pope Innocent XI, his feast is rather kept upon the 2nd day of September, whereon the Christian army, by the help of this holy King, wrested the strong fortress of Buda (from the Turks.)
          Upon the same 2nd day of September, were born into the better life:

          At Rome, the holy martyr Maxima, who confessed Christ along with holy Ansanus, in the persecution under the Emperor Diocletian, and was beaten to death with cudgels.
          At Pamiers, in Gaul, (in the second century,) the holy martyr Antonine, whose relics are kept with great reverence in the church of Palencia in Spain.
          Likewise the holy martyrs Diomede, Julian, Philip, Eutychian, Hesychius, Leonides, Philadelphus, Menalippus, and Pantagapa, whereof some finished their testimony by fire, some by water, some by the sword, and some by the cross.
          At Nicomedia, (in the persecution under the Emperor Diocletian,) the holy martyrs Zeno and his sons, Concordius and Theodore.
          On the same day, (at Syracuse,) the holy brethren Evodius and Hermogenes and their sister Callista, all martyrs.
          Upon the same day is commemorated at Lyon, in Gaul, (in the fourth century,) the holy Confessor Justus, Bishop (of that see,) a man of wonderful holiness of life, gifted with the spirit of prophecy he resigned his Bishopric, and withdrew himself into the desert of Egypt, along with Viator his Reader. There he led for some years a life bordering upon the life of Angels, and, when the worthy end of his labours came, departed hence to receive a crown of righteousness from the Lord. It was the 14th day of October, but it was upon the 2nd of September that his sacred body was brought to Lyon, along with the bones of his blessed servant Viator.
          Also at Lyon, (in the fifth century,) was born into the better life the holy Confessor Elpidius, Bishop (of that see.)
          In the March of Ancona, (in the fifth century,) at the town called by his name, which rejoices to own his sacred body, the holy Abbot Elpidius.
          On Mount Soracte, the holy Abbot Nonnosus, who by his prayer moved a stone of great weight, and was famous.
      la:
      - type: text
        text: |-
          Quarto Nonas Septémbris

          Sancti Stéphani, Regis Hungarórum et Confessóris; qui décimo octávo Kaléndas Septémbris obdormívit in Dómino.
          Romæ sanctæ Máximæ Mártyris, quæ, simul cum sancto Ansáno Christum conféssa, in persecutióne Diocletiáni, dum fústibus cǽditur, réddidit spíritum.
          Pámiæ, in Gállia, sancti Antoníni Mártyris, cuius relíquiæ apud Ecclésiam Palentínam, in Hispánia, magna veneratióne asservántur.
          Item sanctórum Mártyrum Diomédis, Iuliáni, Philíppi, Eutychiáni, Hesýchii, Leónidæ, Philadélphi, Menalíppi et Pantágapæ; quorum álii igne, álii aqua, ense álii et cruce martýrium complevérunt.
          Nicomedíæ sanctórum Mártyrum Zenónis, atque Concórdii et Theodóri, filiórum eius.
          Lugdúni, in Gállia, sancti Elpídii, Epíscopi et Confessóris.
          In Picéno item sancti Elpídii Abbátis, cuius nómine óppidum est appellátum, quod eius sacrum corpus se possidére congáudet.
          In monte Sorácte sancti Nonnósi Abbátis, qui ingéntis molis saxum oratióne sua tránstulit, aliísque miráculis coruscávit.
          Eódem die Commemorátio sanctórum Mártyrum germanórum Evódii, Hermógenis et Callístæ; de quibus, in Syracusána Sicíliæ urbe martýrium passis, ágitur étiam séptimo Kaléndas Maii.
          Lugdúni, in Gállia, Translátio sanctórum Iusti, Epíscopi et Confessóris, ac Viatóris, qui eius fúerat miníster; quorum natális dies respectíve prídie Idus Octóbris et duodécimo Kaléndas Novémbris recensétur.
      en2:
      - type: text
        text: |-
          The Fourth Day before the Nones of September
      
          Saint Stephen, King of the Hungarians and Confessor, who fell asleep in the Lord on the eighteenth day before the Kalends of September.
      
          At Rome, Saint Maxima the Martyr, who, having confessed Christ together with Saint Ansanus, gave up her spirit during the persecution of Diocletian while she was being beaten with rods.
      
          At Pamiers in Gaul, Saint Antoninus the Martyr, whose relics are preserved with great veneration at the Church of Palencia in Spain.
      
          Likewise, the holy Martyrs Diomedes, Julian, Philip, Eutychian, Hesychius, Leonidas, Philadelphus, Menalippus, and Pantagapas; of whom some completed their martyrdom by fire, others by water, others by the sword and the cross.
      
          At Nicomedia, the holy Martyrs Zeno, and Concordius and Theodore his sons.
      
          At Lyons in Gaul, Saint Elpidius, Bishop and Confessor.
      
          In Picenum, likewise Saint Elpidius the Abbot, by whose name a town is called, which rejoices to possess his sacred body.
      
          On Mount Soracte, Saint Nonnosus the Abbot, who moved a rock of enormous mass by his prayer, and shone with other miracles.
      
          On the same day, the Commemoration of the holy Martyr brothers Evodius, Hermogenes, and Callistus; concerning whom, who suffered martyrdom in the city of Syracuse in Sicily, notice is also given on the seventh day before the Kalends of May.
      
          At Lyons in Gaul, the Translation of Saints Justus, Bishop and Confessor, and Viator, who had been his minister; whose respective birthdays are recorded on the day before the Ides of October and on the twelfth day before the Kalends of November.
  psalm.quartod-cimo-kal-ndas-apr-lis-8eee13a755:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of March, were born into the better life:

          In Judea, holy Joseph, the husband of the most Blessed Virgin Mary. The Supreme Pontiff Pius IX., in answer to the wish and request of the whole Catholic world, declared him Patron of the universal Church.
          At Sorrento, the holy martyrs Quintus, Quintilla, Quartilla, Mark, and nine others.
          At Nicomedia, holy Pancharius, the Roman, who was beheaded under the Emperor Diocletian, and so received the crown of martyrdom.
          On the same day, the holy Bishops Apollonius and Leontius.
          At Gent [in Flanders], the holy Roman Priest Landoald, and Amantius the Deacon, who were sent by holy Pope Martin to preach the gospel, and were famed for many miracles after their deaths, [in the year 666.]
          In the city of Pinna, blessed John, a man of great holiness, who came from Syria to Italy, and there built a monastery, wherein he remained, the Father of many servants of God, for forty-and-four years, and fell asleep in peace, famous for many graces, [sixth century.]
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Aprílis

          In Iudǽa natális sancti Ioseph, Sponsi beatíssimæ Vírginis Maríæ, Confessóris; quem Pius Nonus, Póntifex Máximus, votis et précibus ánnuens totíus cathólici Orbis, universális Ecclésiæ Patrónum declarávit.
          Surrénti sanctórum Mártyrum Quincti, Quinctíllæ, Quartíllæ et Marci, cum áliis novem.
          Nicomédiæ sancti Panchárii Románi, qui, sub Diocletiáno Imperatóre, in huius grátiam Christum pro diis inánibus eiurávit, sed, matre ac soróre instántibus, ad veram fidem mox rédivit, et ob immótam in ea constántiam, nervis cæsus et cápite truncátus, martýrii corónam accépit.
          Eódem die sanctórum Apollónii et Leóntii Episcopórum.
          Gandávi, in Flándria, sanctórum Landoáldi, Presbýteri Románi, et Amántii Diáconi; qui, a sancto Martíno Papa ad prædicándum Evangélium missi, ambo apostólicum sibi commíssum opus fidéliter implevérunt, ac multis post óbitum sunt illustráti miráculis.
          Apud Pinnénsem civitátem natális beáti Ioánnis, magnæ sanctitátis viri; qui de Sýria ad Itáliam venit, atque ibi, constrúcto monastério, multórum servórum Dei per quátuor et quadragínta annos Pater éxstitit, et, clarus virtútibus, in pace quiévit.
      en2:
      - type: text
        text: |-
          The Fourteenth Day before the Kalends of April
      
          In Judea, the birthday of Saint Joseph, Spouse of the most blessed Virgin Mary, Confessor; whom Pope Pius IX, Supreme Pontiff, acceding to the wishes and prayers of the entire Catholic world, declared Patron of the Universal Church.
      
          At Sorrento, the holy Martyrs Quintus, Quintilla, Quartilla, and Mark, with nine others.
      
          At Nicomedia, Saint Pancharion the Roman, who, under the Emperor Diocletian, for his favor renounced Christ for empty gods; but, urged by his mother and sister, soon returned to the true faith, and, on account of his unshaken constancy in it, was beaten with sinews and beheaded, and received the crown of martyrdom.
      
          On the same day, Saints Apollonius and Leontius, Bishops.
      
          At Ghent in Flanders, Saints Landoaldus, a Roman Presbyter, and Amantius the Deacon; who, sent by Saint Pope Martin to preach the Gospel, both faithfully fulfilled the apostolic work entrusted to them, and were distinguished by many miracles after their death.
      
          At the city of Pinna, the birthday of blessed John, a man of great holiness; who came from Syria to Italy, and there, having built a monastery, was for forty-four years the father of many servants of God, and, renowned for virtues, rested in peace.
  psalm.quartod-cimo-kal-ndas-aug-sti-23b8cc676c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Vincent of Paul, who slept in the Lord upon the 27th day of September, and whom Pope Leo XIII. proclaimed the patron before God in heaven of all charitable societies throughout the whole Catholic world which derive their origin in any way from his institution, [in the year 1660.]
          Upon the same 19th day of July, were born into the better life:

          The holy Epaphras, whom the holy Apostle Paul doth call his own fellow prisoner. He was ordained by the same Apostle Bishop of Colossi, where, illustrious for graces, he gained the palm of martyrdom in manly contending on behalf of the sheep committed to his care. His body is buried at Rome, in the Church of St Mary the greater.
          At Seville, in Spain, the holy Virgins Justa and Rufina. They were arrested under the President Diogenian. They were first racked and tormented by being torn with hooks, and afterwards afflicted with imprisonment, starvation, and diverse tortures. In the end Justa gave up the ghost in prison, and Rufina had her neck broken for confessing the Lord, [at the end of the third century.]
          At Cordova, the holy Virgin Aurea, who for a time fell away, but repented of what she had done, and in a renewed combat prevailed against the enemy by the shedding of her blood, [in the year 856.]
          At Trier, the holy martyr Martin, Bishop [of that see, in the year 210.]
          At Rome, the holy Pope Symmachus, who long suffered through the deeds of the schismatics, and at length passed away, famous for holiness, to be ever with the Lord, [in the year 514.]
          At Verona, holy Felix, the Bishop.
          At Mount Skete, in Egypt, holy Arsenius, a Deacon of the Church of Rome, who in the time of Theodosius betook himself to the desert, where he gave up his soul to God, finished in all graces and plentifully wet with tears, [in the year 450.]
          In Cappadocia, the holy Virgin Macrina, sister to holy Basil the Great and Gregory of Nyssa, [in the year 379.]
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Augústi

          Sancti Vincéntii a Paulo, Presbýteri et Confessóris, Congregatiónis Presbyterórum Missiónis et Puellárum Caritátis Fundatóris, cæléstis ómnium caritátis Societátum Patróni; qui in Dómino obdormívit quinto Kaléndas Octóbris.
          Colóssis, in Phrýgia, natális sancti Epaphræ, quem sanctus Paulus Apóstolus concaptívum appéllat. Hic, ab eódem Apóstolo Colóssis Epíscopus ordinátus, ibídem, clarus virtútibus, martýrii palmam, pro óvibus sibi commendátis, viríli agóne percépit; cuius corpus Romæ, in Basílica sanctæ Maríæ Maióris, cónditum est.
          Tréviris sancti Martíni, Epíscopi et Mártyris.
          Híspali, in Hispánia, pássio sanctárum Vírginum Iustæ et Rufínæ, quæ, a Prǽside Diogeniáno comprehénsæ, primo equúlei extensióne et ungulárum laniatióne vexátæ, póstea cárcere, inédia et váriis torsiónibus sunt afflíctæ; tandem Iusta in cárcere spíritum exhalávit, Rufínæ vero cervix, in confessióne Dómini, confrácta est.
          Córdubæ, in Hispánia, sanctæ Aureæ Vírginis, beatórum Adúlphi et Ioánnis Mártyrum soróris; quæ aliquándo in apostasíæ crimen a Mahumetáno Iúdice indúcta est, sed mox, facti pǽnitens, iteráto certámine, hostem effúso sánguine superávit.
          Romæ sancti Sýmmachi Papæ, qui, a schismaticórum factióne diútius fatigátus, demum, sanctitáte conspícuus, migrávit ad Dóminum.
          Verónæ sancti Felícis Epíscopi.
          Apud Scetim, Ægýpti montem, sancti Arsénii, Románæ Ecclésiæ Diáconi; qui, Theodósii témpore, in solitúdinem secéssit, ibíque, virtútibus ómnibus consummátus et iugi lacrimárum imbre perfúsus, spíritum Deo réddidit.
          In Cappadócia sanctæ Macrínæ Vírginis, fíliæ sanctórum Basilíi et Emméliæ, atque soróris item sanctórum Episcopórum Basilíi Magni, Gregórii Nysséni et Petri Sebasténsis.
      en2:
      - type: text
        text: |-
          The Fourteenth Day before the Kalends of August
      
          Saint Vincent de Paul, Presbyter and Confessor, Founder of the Congregation of Priests of the Mission and of the Daughters of Charity, heavenly Patron of all societies of charity; who fell asleep in the Lord on the fifth day before the Kalends of October.
      
          At Colossae in Phrygia, the birthday of Saint Epaphras, whom Saint Paul the Apostle calls his fellow captive. He, having been ordained Bishop of Colossae by the same Apostle, obtained there, renowned for virtues, the palm of martyrdom for the sheep entrusted to him, by a manly contest; his body is buried at Rome in the Basilica of Saint Mary Major.
      
          At Trier, Saint Martin, Bishop and Martyr.
      
          At Seville in Spain, the passion of the holy Virgins Justa and Rufina, who, seized by the Governor Diogenianus, were first tormented by the extension of the rack and the tearing of hooks, then afflicted with prison, starvation, and various tortures; at last Justa breathed out her spirit in prison, while Rufina's neck was broken in the confession of the Lord.
      
          At Córdoba in Spain, Saint Aurea the Virgin, sister of the blessed Martyrs Adolphus and John; who was at one time induced by a Mohammedan judge to fall into the crime of apostasy, but soon, repenting of the deed, overcame the enemy by a repeated combat with shed blood.
      
          At Rome, Saint Symmachus the Pope, who, long harassed by the faction of the schismatics, at last, conspicuous in holiness, passed to the Lord.
      
          At Verona, Saint Felix the Bishop.
      
          At Scetis, a mountain of Egypt, Saint Arsenius, a Deacon of the Roman Church; who, in the time of Theodosius, withdrew into solitude, and there, perfected in all virtues and drenched with a continual rain of tears, gave back his spirit to God.
      
          In Cappadocia, Saint Macrina the Virgin, daughter of Saints Basil and Emmelia, and likewise sister of the holy Bishops Basil the Great, Gregory of Nyssa, and Peter of Sebaste.
  psalm.quartod-cimo-kal-ndas-dec-mbris-999b890ad3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18th day of November is kept the feast of the Dedication of the two Cathedral Churches of St. Peter and of St. Paul at Rome. The Church of St Peter, after being rebuilt on a larger scale, was solemnly consecrated by Urban VIII upon the 18th day of November (in the year 1626.) The Church of St. Paul had been almost entirely destroyed by a lamentable fire, and was rebuilt in a more splendid manner, and consecrated anew by Pius IX upon the 10th day of December but he transferred the yearly feast of the Dedication thereof to the same day as that of the Church of St. Peter.
          Upon the same 18th day of November, were born into the better life:

          At Antioch, the holy martyr Romanus. In the time of the Emperor Galerius, when the Prefect Asclepiades was assailing the Church and seeking utterly to overthrow it, Romanus exhorted the other Christians to gainsay him. For this cause he was put to horrid torments, and his tongue was cut out but thereafter he still uttered the praise of God. Then he was strangled in prison, and so was crowned by a famous martyrdom.
          Before him there suffered also the little lad Barula, who was asked by Romanus whether it were better to worship one God or many gods, and answered that we ought to believe in the one God whom the Christians worship for the saying of the which thing he was first flogged and then beheaded.
          Likewise at Antioch, (about the year 304,) the holy martyr Hesychius. He was a soldier, but when he heard the command that whosoever would not sacrifice to idols should cast away his military belt, he straightway took off his belt, for which cause a large stone was tied to his right hand, and he was thrown into the river.
          On the same day, (in the fifth century,) the holy martyrs Oriculus and his Companions, who suffered for the Catholic faith in the persecution under the Vandals.
          At Mainz, holy Maximus, Bishop of that see, who suffered many things from the Arians in the time of the Emperor Constantius, and died a Confessor.
          At Tours, (in the year 942,) blessed Odo, Abbot of Cluny.
          At Antioch, (about the year 782,) the holy monk Thomas, in whose honour the Antiochenes keep a solemn feast-day every year on account of a plague which was stayed by his prayers.
          At Lucca, in Tuscany, is commemorated the finding, (in the year 800,) of the body of the holy Confessor Finnan, Bishop (of that see, a son of Ultach, King of Ulster.)
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Decémbris

          Romæ Dedicátio Basilicárum sanctórum Petri et Pauli Apostolórum. Eárum primam, restitútam in ampliórem formam, Summus Póntifex Urbánus Octávus consecrávit hac ipsa recurrénte die; álteram vero, miserándo incéndio pénitus consúmptam, ac magnificéntius reædificátam, Pius Nonus die décima Decémbris solémni ritu consecrávit, eiúsque ánnuam commemoratiónem hodiérna die agéndam indíxit.
          Antiochíæ natális sancti Románi Mártyris, qui, témpore Galérii Imperatóris, cum Asclepíades Præféctus in Ecclésiam irrúmperet eámque fúnditus conarétur evértere, céteros Christiános hortátus est ut ei contradícerent, ideóque, post dira torménta et abscissiónem linguæ (sine qua tamen Dei præcónia loquebátur), in cárcere strangulátus láqueo, célebri martýrio coronátur. Passus est étiam ante ipsum puérulus, nómine Bárula, qui, cum fuísset ab eódem interrogátus Præfécto utrum mélius esset unum Deum cólere an plures deos, atque in unum Deum, quem Christiáni colunt, credéndum esse respondísset, proptérea, verbéribus cæsus, iussus est decollári.
          Item Antiochíæ sancti Hesýchii Mártyris, qui, cum esset miles, et præcéptum audísset ut quisquis non sacrificáret idólis, cíngulum milítiæ depóneret, repénte cíngulum solvit; ob quam causam, ingénti saxo in déxtera eius ligáto, in flúvium præcipitári iussus est.
          Eódem die sanctórum Orículi et Sociórum, qui, in persecutióne Wandálica, pro fide cathólica passi sunt.
          Mogúntiæ sancti Máximi Epíscopi, qui, témpore Constántii multa passus ab Ariánis, Conféssor occúbuit.
          Turónis, in Gállia, tránsitus beáti Odónis, Abbátis Cluniacénsis.
          Antiochíæ sancti Thomæ Mónachi, quem Antiochéni, ob sedátam eius précibus pestem, solemnitáte annua coluérunt.
          Lucæ, in Túscia, Translátio sancti Frigdiáni, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Fourteenth Day before the Kalends of December
      
          At Rome, the Dedication of the Basilicas of the holy Apostles Peter and Paul. The first of these, restored to a larger form, was consecrated by the Supreme Pontiff Urban VIII on this very recurring day; the other, however, entirely consumed by a lamentable fire and magnificently rebuilt, was consecrated with solemn rite by Pius IX on the tenth day of December, who appointed its annual commemoration to be kept on today's day.
      
          At Antioch, the birthday of Saint Romanus the Martyr, who, at the time of the Emperor Galerius, when the Prefect Asclepiades broke into the Church and was attempting to destroy it utterly, exhorted the other Christians to oppose him, and on that account, after terrible tortures and the cutting off of his tongue (without which, nevertheless, he proclaimed the praises of God), was strangled with a noose in prison and crowned with celebrated martyrdom. Also before him suffered a little boy named Barulas, who, having been asked by that same Prefect whether it was better to worship one God or many gods, and having answered that one must believe in the one God whom Christians worship, was on that account beaten with stripes and ordered to be beheaded.
      
          Likewise at Antioch, Saint Hesychius the Martyr, who, being a soldier, and having heard the command that whoever would not sacrifice to idols should lay down his soldier's belt, immediately loosened his belt; for which reason, with a great stone tied to his right hand, he was ordered to be cast headlong into a river.
      
          On the same day, Saints Oriculus and his Companions, who suffered for the Catholic faith in the Vandal persecution.
      
          At Mainz, Saint Maximus the Bishop, who, in the time of Constantius, having suffered much from the Arians, died as a Confessor.
      
          At Tours in Gaul, the passing of blessed Odo, Abbot of Cluny.
      
          At Antioch, Saint Thomas the Monk, whom the Antiochenes honored with a solemn annual observance on account of the plague stilled by his prayers.
      
          At Lucca in Tuscany, the Translation of Saint Fridianus, Bishop and Confessor.
  psalm.quartod-cimo-kal-ndas-febru-rii-7f1201a70f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of January, were born into the better life:

          At Worcester, in England, (in the year 1095,) the holy Confessor Wolstan, Bishop of that see, famous for his worthy and wondrous works, whose name was enrolled among those of the saints by Innocent III.
          At Rome, (in the year 270,) upon the Cornelian Way, the holy martyrs Maris, and Martha, his wife, and their sons Audifax and Abachum. These were noble Persians, who came to Rome for prayer's sake in the time of the Emperor Claudius. They were cudgelled, racked, burnt, torn with iron hooks, and had their hands cut off. At length Martha was drowned and the others beheaded, and their bodies cast into the fire.
          At Smyrna, in the time of the Emperors Marcus Antoninus and Lucius Aurelius, the blessed martyr Germanicus. He was a very beautiful youth, but by the power of God's grace he laid aside all the weakness of bodily fear, and of his own accord provoked the beast by which he had been condemned by the judge to be killed and so being ground through its teeth, and so dying for the Lord Jesus Christ, he earned to be made one body with Him who is Himself the very Bread which came down from heaven.
          In Africa, the holy martyrs Paul, Gerontius, Januarius, Saturninus, Successus, Julius, Catus, Pia, and Germana, (and others to the number in all of 600.)
          At Spoleto, in the time of the Emperor Antonine, the holy martyr Pontian. Fabian, the judge, caused him to be first most grievously beaten with rods and then to walk barefoot upon live coals by these he was unhurt, and was therefore racked, lacerated with iron hooks, and cast into prison, where he was comforted by a visitation of angels. Lastly he was thrown to the lions, had molten lead poured over him, and was then beheaded.
          At Lodi, (about the year 413,) the holy Confessor Bassian, Bishop of that see, who fought manfully along with holy Ambrose against the heretics.
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Februárii

          Romæ, via Cornélia, sanctórum Mártyrum Márii et Marthæ coniúgum, et filiórum Audifácis et Abachum, nobílium Persárum; qui Romam, tempóribus Cláudii Príncipis, ad oratiónem vénerant. Ex eis vero, post tolerátos fustes, equúleum, ignes, ungues férreos manuúmque præcisiónem, Martha in Nympha necáta est; ceteri sunt decolláti, et córpora eórum incénsa.
          Item sancti Canúti, Regis et Mártyris.
          Smyrnæ natális beáti Germánici Mártyris, qui, sub Marco Antoníno et Lúcio Aurélio, cum primǽvæ ætátis venustáte floréret, damnátus a Iúdice, et, per grátiam virtútis Dei, metum córporeæ fragilitátis exclúdens, præparátam sibi béstiam sponte provocávit; cuius déntibus comminútus, vero pani Dómino Iesu Christo, pro ipso móriens, méruit incorporári.
          In Africa sanctórum Mártyrum Pauli, Geróntii, Ianuárii, Saturníni, Succéssi, Iúlii, Cati, Piæ et Germánæ.
          Apud Spolétum pássio sancti Pontiáni Mártyris, qui, témpore Antoníni Imperatóris, a Fabiáno Iúdice, pro Christo vehementíssime virgis cæsus, iussus est super carbónes nudis pédibus ambuláre, sed a carbónibus nil læsus, equúleo et uncínis férreis iussus est suspéndi, et sic in cárcerem trudi, ubi Angélica visitatióne méruit confortári; postque leónibus expósitus et plumbo fervénti perfúsus, tandem gládio percússus est.
          Laudæ, in Insúbria, sancti Bassiáni, Epíscopi et Confessóris, qui advérsus hæréticos, una cum sancto Ambrósio, strénue decertávit.
          Wigórniæ, in Anglia, sancti Wulstáni, Epíscopi et Confessóris, méritis et miráculis conspícui; qui ab Innocéntio Papa Tértio inter Sanctos relátus est.
      en2:
      - type: text
        text: |-
          The Nineteenth of January
      
          At Rome, on the Cornelian Way, the holy Martyrs Marius and Martha, a married couple, and their sons Audifax and Abachum, Persian nobles, who had come to Rome in the time of the Emperor Claudius for prayer. After enduring beatings, the rack, fire, iron claws, and the cutting off of their hands, Martha was slain at the Nympha; the others were beheaded, and their bodies burned.
          Likewise, Saint Canute, King and Martyr.
          At Smyrna, the birth of blessed Germanicus, Martyr, who, under Marcus Antoninus and Lucius Aurelius, while he was in the flower of early youth, was condemned by the judge and, through the grace of God's power, casting out all fear of bodily weakness, willingly provoked the beast prepared for him; torn apart by its teeth, he merited to be incorporated into the true Bread, the Lord Jesus Christ, by dying for him.
          In Africa, the holy Martyrs Paul, Gerontius, Januarius, Saturninus, Successus, Julius, Catus, Pia, and Germana.
          At Spoleto, the passion of Saint Pontianus, Martyr, who, in the time of the Emperor Antoninus, was most savagely beaten with rods by the judge Fabianus for Christ's sake, and commanded to walk barefoot over burning coals; but, harmed not at all by the coals, was ordered to be hung on the rack with iron hooks and thrust into prison, where he merited to be comforted by an angelic visitation; and after being exposed to lions and drenched with molten lead, he was finally struck with a sword.
          At Laus, in Liguria, Saint Bassianus, Bishop and Confessor, who strenuously fought against heretics together with Saint Ambrose.
          At Worcester, in England, Saint Wulfstan, Bishop and Confessor, distinguished for merits and miracles, who was enrolled among the Saints by Pope Innocent the Third.
  psalm.quartod-cimo-kal-ndas-i-lii-1eae679497:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18th day of June, were born into the better life:

          At Edessa in Mesopotamia, St. Ephraem, deacon of the church of Edessa in the time of Emperor Valens and confessor. After suffering many trials for the faith of Christ and gaining great renown for holiness and learning, he went to rest in the Lord. He was declared a doctor of the Universal Church by Pope Benedict XV.
          At Rome, on the Ardeatine Way, in the persecution of Diocletian, the birthday of the saintly brothers Mark and Marcellian, martyrs, who were arrested by the judge Fabian, tied to a stake, and had sharp nails driven into their feet. Because they would not cease praising the name of Christ they were pierced through the sides with lances, and thus went to the kingdom of heaven with the glory of martyrdom.
          At Malaga in Spain, the holy martyrs Cyriacus and the virgin Paula, who were overwhelmed with stones, and yielded up their souls to God.
          At Tripoli in Phoenicia, in the time of the governor Adrian, St. Leontius, a soldier, who attained the crown of martyrdom through bitter torments together with the tribune Hypatius and Theodulus, whom he had converted to Christ.
          Upon the same day, [at Nicomedia,] St. Aetherius, martyr, in the persecution of Diocletian. After enduring fire and other torments, he was put to death with the sword.
          At Alexandria, the passion of St. Marina, virgin.
          At Bordeaux, [in the fifth century,] the holy Confessor Amandus, Bishop [of that see.]
          At Sacca, in Sicily, [likewise in the fifth century,] the holy Hermit Calogerus, whose holiness is chiefly manifested in delivering them that are vexed with evil spirits.
          At Schoenaug, [in the year 1165,] the holy Virgin Elizabeth, celebrated for her observance of the monastic life.
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Iúlii

          Edéssæ, in Mesopotámia, sancti Ephræm, Diáconi Edesséni et Confessóris, qui, post multos labóres pro Christi fide suscéptos, doctrína et sanctitáte conspícuus, sub Valénte Imperatóre quiévit in Dómino, et a Benedícto Papa Décimo quinto Doctor Ecclésiæ universális est declarátus.
          Romæ, via Ardeatína, natális sanctórum Mártyrum Marci et Marcelliáni fratrum, qui, in persecutióne Diocletiáni, a Iúdice Fabiáno tenti et ad stípitem alligáti, in pédibus clavos acútos accepérunt; cumque non cessárent laudáre Christum, lánceis per látera transfíxi sunt, et cum glória martýrii ad sidérea regna migrárunt.
          Patávii Sancti Gregórii Barbadíci, Venéti, Cardinális et Bergomátis primum, deínde Patávinæ diœcéseos Epíscopi, quem mira virtútum et pastorális sapiéntiæ laude conspícuum, Ioánnes vigésimus tértius Sanctórum coróna insignívit. Ipsíus autem festum prídie huius diéi celebrátur.
          Málacæ, in Hispánia, sanctórum Mártyrum Cyríaci, et Paulæ Vírginis, qui, lapídibus óbruti, inter saxa cælo ánimas reddidérunt.
          Trípoli, in Phœnícia, sancti Leóntii mílitis, qui, sub Hadriáno Prǽside, una cum Hypátio Tribúno et Theodúlo, quos convértit ad Christum, per acérba torménta pervénit ad corónam martýrii.
          Eódem die sancti Æthérii Mártyris, qui, in persecutióne Diocletiáni, post ignes et álios cruciátus, gládio cæsus est.
          Alexandríæ pássio sanctæ Marínæ Vírginis.
          Burdígalæ sancti Amándi, Epíscopi et Confessóris.
          Apud Saccam, in Sicília, sancti Calogéri Eremítæ, cuius sánctitas in energúmenis liberándis máxime effúlget.
          Schonáugiæ, in Germánia, sanctæ Elísabeth Vírginis, ob monásticæ vitæ observántiam célebris.
      en2:
      - type: text
        text: |-
          The Eighteenth of June
      
          At Edessa, in Mesopotamia, Saint Ephrem, Deacon of Edessa and Confessor, who, after many labors undertaken for the faith of Christ, renowned for learning and holiness, rested in the Lord under the Emperor Valens, and was declared a Doctor of the universal Church by Pope Benedict the Fifteenth.
          At Rome, on the Ardeatine Way, the birth of the holy Martyrs Mark and Marcellian, brothers, who, in the persecution of Diocletian, were seized by the judge Fabianus and bound to a post, and had sharp nails driven into their feet; and when they would not cease to praise Christ, they were pierced through the sides with lances and passed with the glory of martyrdom to the heavenly kingdom.
          At Padua, Saint Gregory Barbarigo, a Venetian, Cardinal and first Bishop of Bergamo, then of the Diocese of Padua, whom John the Twenty-third, renowned for his wondrous virtue and pastoral wisdom, crowned with the honor of the Saints. His feast is celebrated on the preceding day.
          At Malaga, in Spain, the holy Martyrs Cyriacus and Paula, a Virgin, who, crushed with stones, gave up their souls to heaven amid the rocks.
          At Tripoli, in Phoenicia, Saint Leontius, a soldier, who, under the Governor Hadrian, together with Hypatius, Tribune, and Theodulus, whom he had converted to Christ, reached the crown of martyrdom through bitter torments.
          On the same day, Saint Aethereus, Martyr, who in the persecution of Diocletian, after fires and other tortures, was slain with a sword.
          At Alexandria, the passion of Saint Marina, Virgin.
          At Bordeaux, Saint Amandus, Bishop and Confessor.
          At Sacca, in Sicily, Saint Calogero, Hermit, whose holiness shines forth especially in the freeing of those possessed.
          At Schönau, in Germany, Saint Elisabeth, Virgin, renowned for her observance of the monastic life.
  psalm.quartod-cimo-kal-ndas-i-nii-22efca52c2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Dunstan, Archbishop of Canterbury.
          On the same 19th day of May, were born into the better life:

          Holy Peter Morone, who was a hermit when he was created Supreme Pontiff, and was called Celestine V. He resigned the Papacy and led a religious life in solitude, and so, famous for graces and wonders, passed away, [in the year 1296,] to be for ever with the Lord. His feast we keep upon the 21st day of this same month of May.
          At Rome, the holy Virgin Pudentiana, who, after countless contendings, after worshipfully burying many martyrs, and after distributing all her goods to feed the poor for Christ's sake, at length passed from earth to heaven.
          There also the holy Senator Pudens, the father of the said virgin. He put on Christ in baptism by the ministry of the Apostles, and kept his robe in innocency undefiled till he received the crown of life.
          At Rome also, upon the Appian Way, the holy eunuchs Calocerus and Parthenius. Calocerus was master of the bed-chamber to the wife of the Emperor Decius, and Parthenius was one of the chief officers of the court, and Decius slew them both because they would not sacrifice to idols.
          At Nicomedia, the holy martyr Philoter, son of the Pro-Consul Pacian, who suffered much under the Emperor Diocletian, and received the crown of martyrdom.
          There also six holy Virgin martyrs, of whom the chiefest was Cyriaca, who boldly rebuked Maximian for his wickedness, and therefore was most direfully rent and torn, and at last burnt with fire.
          In Brittany, [in the year 1303,] the holy Priest and Confessor Yves, who for the love of Christ pled the cause of orphans, widows, and the poor.
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Iúnii

          Natális sancti Petri de Moróno Confessóris, qui, ex Anachoréta Summus Póntifex creátus, dictus est Cæléstinus Quintus. Sed Pontificátu se póstmodum abdicávit, et in solitúdine religiósam vitam agens, virtútibus et miráculis clarus, migrávit ad Dóminum.
          Romæ sanctæ Pudentiánæ Vírginis, quæ, post innúmeros agónes, post multórum Mártyrum venerabíliter exhíbitas sepultúras, post omnes facultátes suas pro Christo paupéribus erogátas, tandem de terris ad cælos migrávit.
          Ibídem sancti Pudéntis Senatóris, qui eiúsdem sanctæ Pudentiánæ ac sanctæ item Praxédis Vírginis fuit pater; atque, ab Apóstolis Christo in baptísmo vestítus, innocéntem túnicam usque ad vitæ corónam immaculáte custodívit.
          Item Romæ, via Appia, natális sanctórum Calóceri et Parthénii eunuchórum; quorum prior, cum esset præpósitus cubículi uxóris Décii Imperatóris, postérior vero altérius múneris primicérius, et ambo nollent idólis sacrificáre, idcírco, eiúsdem Imperatóris iussu váriis ac diris sunt excruciáti supplíciis, ac tandem, cervícibus ardénti fuste contúsis, spíritum Deo tradidérunt.
          Nicomedíæ sancti Philóteri Mártyris, qui Paciáni Procónsulis fílius éxstitit, et sub Diocletiáno Imperatóre, multa passus, martýrii corónam accépit.
          Ibídem sanctárum sex Vírginum et Mártyrum, quarum præcípua erat Cyríaca, quæ, cum líbere Maximiánum impietátis obiurgásset, diríssime cæsa et dilaniáta est, atque ad últimum, igne cremáta, martýrium consummávit.
          Cantuáriæ, in Anglia, sancti Dunstáni Epíscopi.
          Lohanéti, in Británnia minóre, sancti Ivónis, Presbýteri et Confessóris; qui, pro Christi amóre, causas pupillórum, viduárum ac páuperum defendébat.
          Ficécli, in Etrúria, sancti Theóphili a Curte, Confessóris, Sacerdótis Ordinis Fratrum Minórum, sacrórum recéssuum propagatóris, quem Pius Papa Undécimus inter Sanctos rétulit.
      en2:
      - type: text
        text: |-
          The Nineteenth of May
      
          The birth of Saint Peter of Morone, Confessor, who, raised from hermit to Supreme Pontiff, was called Celestine the Fifth. But he afterwards abdicated the Pontificate, and, living a religious life in solitude, renowned for virtues and miracles, he passed to the Lord.
          At Rome, Saint Pudentiana, Virgin, who, after countless contests, after reverently providing burial for many Martyrs, after distributing all her possessions to the poor for Christ's sake, at last departed from earth to heaven.
          In the same city, Saint Pudens, Senator, who was the father of the same Saint Pudentiana and of Saint Praxedes, Virgin; and, clothed in Christ through baptism by the Apostles, he preserved the garment of innocence spotlessly to the crown of life.
          Likewise at Rome, on the Appian Way, the birth of the holy eunuchs Calocero and Parthenius; of whom the former was master of the bedchamber of the wife of the Emperor Decius, the latter the chief official of another office; and as both refused to sacrifice to idols, by order of the same Emperor they were tortured with various and dreadful punishments, and at last, with their necks crushed by a burning stake, they gave up their spirits to God.
          At Nicomedia, Saint Philoterus, Martyr, who was the son of the proconsul Pacianus, and, under the Emperor Diocletian, after much suffering, received the crown of martyrdom.
          In the same city, six holy Virgins and Martyrs, of whom the principal was Cyriaca, who, having freely rebuked Maximian for his impiety, was most cruelly beaten and torn, and at last, burned with fire, completed her martyrdom.
          At Canterbury, in England, Saint Dunstan, Bishop.
          At Lannouët, in Brittany, Saint Ivo, Priest and Confessor, who, for love of Christ, defended the causes of orphans, widows, and the poor.
          At Fiésole, in Etruria, Saint Theophilus a Corte, Confessor, Priest of the Order of Friars Minor, propagator of holy retreats, whom Pope Pius the Eleventh enrolled among the Saints.
  psalm.quartod-cimo-kal-ndas-ianu-rii-40d2158a02:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of December, were born into the better life:

          At Alexandria, in Egypt, the blessed martyr Nemesius. He was first brought before the judge on a false accusation that he was a thief, and was acquitted but in the persecution under the Emperor Decius he was accused of Christianity before the judge Aemilian, by whom he was put to the double punishment and condemned to be burnt along with thieves. In the which thing he was conformed to the likeness of the Saviour, who was crucified between thieves.
          At Nice, (now Isnik, in Bithynia,) the holy martyrs Darius, Zosimus, Paul, and Secundus, (in the fourth century.)
          At Nicomedia, the holy martyrs Cyriacus, Paulillus, Secundus, Anastasius, Syndimius, and their Companions, (in the fourth century.)
          In Morocco, (in the fourth century,) the holy martyr Timothy, the Deacon, who after a terrible imprisonment was cast into the fire for Christ's faith's sake, and so finished his testimony.
          At Gaza, in Palestine, (in the third century,) the holy martyrs Meuris and Thea.
          At Auxerre, the holy Confessor Gregory, (looked on as 12th) Bishop (of that see, successor of St. Theodore, in the year 530.)
          At Orleans, the holy Abbot Adjutus, famous for the spirit of prophecy.
          At Rome, holy Fausta, the mother of holy Anastasia, eminent for her rank and godliness, (at the end of the third century.)
          At Avignon, the blessed Pope Urban V, who performed the highest service to the Church; he restored the Apostolic seat to Rome, he completed the union of the Greeks and the Latins, he brought the unbelievers into subjection. His very ancient veneration was ratified and confirmed by Pope Pius IX.
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Ianuárii

          In Mauritánia sancti Timóthei Diáconi, qui ob Christi fidem, post diros cárceres, in ignem coniéctus, martýrium consummávit.
          Alexandríæ beáti Nemésii Mártyris, qui, primo per calúmniam quasi latro Iúdici delátus, eoque crímine absolútus, mox, in persecutióne Décii, Christiánæ religiónis nómine accusátus Æmiliáno Iúdici; a quo, geminátis supplíciis excruciátus, cum latrónibus iussus est incéndi, Salvatóris déferens similitúdinem, qui una cum latrónibus pértulit crucem.
          Nicǽæ, in Bithýnia, sanctórum Mártyrum Dárii, Zósimi, Pauli et Secúndi.
          Nicomedíæ sanctórum Mártyrum Cyríaci, Paulílli, Secúndi, Anastásii, Syndímii et Sociórum.
          Gazæ, in Palæstína, pássio sanctárum Meuris et Theæ.
          Romæ deposítio sancti Anastásii Papæ Primi, viri ditíssimæ paupertátis et apostólicæ sollicitúdinis, quem (ut ait sanctus Hierónymus) diu Roma habére non méruit, ne orbis caput sub tali Epíscopo truncarétur; nam, haud multo post eius óbitum, Roma a Gothis capta et dirépta fuit.
          Antisiodóri sancti Gregórii, Epíscopi et Confessóris.
          Aureliánis, in Gállia, sancti Adiúti Abbátis, prophético spíritu illústris.
          Romæ sanctæ Faustæ, quæ fuit mater sanctæ Anastásiæ, ac nobilitáte et pietáte éxstitit insígnis.
          Avenióne beáti Urbáni Papæ Quinti, qui, Sede Apostólica Romæ restitúta, Græcórum cum Latínis coniunctióne perfécta, infidélibus coércitis, de Ecclésia óptime méritus est. Eius cultum pervetústum Pius Nonus, Póntifex Máximus, ratum hábuit et confirmávit.
      en2:
      - type: text
        text: |-
          The Nineteenth of December
      
          In Mauritania, Saint Timothy, Deacon, who for the faith of Christ, after dreadful imprisonments, was cast into fire and completed his martyrdom.
          At Alexandria, blessed Nemesius, Martyr, who was first falsely accused before the judge as a thief, and acquitted of that charge; but then, in the persecution of Decius, he was accused before the judge Aemilianus on the name of the Christian religion; by whom, tortured with doubled punishments, he was ordered to be burned with thieves, bearing the likeness of the Savior, who endured the Cross alongside thieves.
          At Nicaea, in Bithynia, the holy Martyrs Darius, Zosimus, Paul, and Secundus.
          At Nicomedia, the holy Martyrs Cyriacus, Paulillus, Secundus, Anastasius, Syndimius, and their Companions.
          At Gaza, in Palestine, the passion of Saints Meuris and Thea.
          At Rome, the deposition of Saint Anastasius, the First Pope, a man of most excellent poverty and apostolic solicitude, whom (as Saint Jerome says) Rome did not merit to possess for long, lest the capital of the world should be brought low under such a Bishop; for not long after his death, Rome was captured and sacked by the Goths.
          At Auxerre, Saint Gregory, Bishop and Confessor.
          At Orléans, in France, Saint Adjutus, Abbot, renowned for the spirit of prophecy.
          At Rome, Saint Fausta, who was the mother of Saint Anastasia, and was distinguished for nobility and piety.
          At Avignon, blessed Urban, the Fifth Pope, who, having restored the Apostolic See to Rome, accomplished the union of the Greeks with the Latins, restrained the infidels, and served the Church most excellently. Pope Pius the Ninth, Supreme Pontiff, ratified and confirmed his ancient cult.
  psalm.quartod-cimo-kal-ndas-m-rtii-74ae7c1cb5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of February, were born into the better life:

          Blessed Onesimus, of whom the holy Apostle Paul writeth unto Philemon, and whom also he ordained Bishop of Ephesus after holy Timothy, and committed unto him the preaching of the Word. In the end he was brought to Rome in chains, and there stoned to death for Christ's faith's sake. His body was first buried there, but was thence taken to the place where he had been ordained bishop.
          On the same day is commemorated at Camee in Campania the translation of the holy Virgin and martyr Juliana.
          At Nicomedia, under the Emperor Maximian, she was cruelly beaten by her own father Africanus, then put to diverse torments by the Prefect Evilasius, whom she refused to marry, and afterwards cast into prison, where she fought visibly with the devil she overcame fire and boiling water, and at length finished her martyrdom by being beheaded, [in the year 299.]
          In Egypt, the holy martyr Julian, and five thousand others, [in the year 309.]
          At Caesarea, in Palestine, the holy Egyptian martyrs Elijah, Jeremiah, Isaiah, Samuel, and Daniel. They went of their own accord to Cilicia to minister to the Confessors who had been condemned to penal servitude in the mines; when they were returning thence, they were apprehended, and most cruelly tortured by the President Firmilian under the Emperor Galerius Maximian, and in the end were beheaded, [in the year 309.]
          After whom holy Porphyry, the servant of the martyr Pamphilus, and holy Seleucus the Cappadocian, who had oftentimes contended and always been conquerors, were put to the torture again, and [in the year 309] received their crowns Porphyry by fire, and Seleucus by the sword.
          At Arezzo, in Tuscany, [in the year 1276,] the blessed Pope Gregory X he was a man of Piacenza, and was raised to the Supreme Pontificate from the arch-deaconry [of Liege.]
          He held the Second Council of Lyon, received the Greeks into the unity of the faith, healed the dissensions of Christendom, set forward the recovery of the Holy Land, and governed the Church in holiness.
          At Brescia, [in the year 350,] the holy Confessor Faustinus, Bishop of that see.
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Mártii

          Romæ beáti Onésimi, de quo sanctus Paulus Apóstolus ad Philémonem scribit; quem étiam, post sanctum Timótheum, Ephesiórum Epíscopum ordinávit, prædicationísque verbum illi commísit. Ipse autem Onésimus, vinctus Romam perdúctus ac pro fide Christi lapidátus, primo ibídem sepúltus fuit; inde ad locum ubi Epíscopus fúerat ordinátus, corpus eius delátum est.
          In Ægýpto sancti Iuliáni Mártyris, cum áliis quinque míllibus.
          Cæsaréæ, in Palæstína, sanctórum Mártyrum Ægyptiórum Elíæ, Ieremíæ, Isaíæ, Samuélis et Daniélis; qui, cum spontánee ministrássent Confessóribus in Cilícia ad metálla damnátis, et inde reverteréntur, sunt comprehénsi, et a Firmiliáno Prǽside, sub Galério Maximiáno Imperatóre, sævíssime torti, gládio demum percússi sunt. Post eos sanctus Porphýrius, Pámphili Mártyris fámulus, et sanctus Seléucus Cáppadox, qui iterátis certamínibus sæpe vícerant, rursus cruciáti sunt, atque alter incéndio, gládio alter corónam martýrii accepérunt.
          Nicomedíæ sanctæ Iuliánæ, Vírginis et Mártyris; quæ, sub Maximiáno Imperatóre, primum a patre suo Africáno gráviter cæsa, deínde ab Evilásio Præfécto, cui núbere recusáverat, várie cruciáta, et póstmodum in cárcerem detrúsa, ubi palam cum diábolo conflíxit, demum, cum flammas ígnium et ollam fervéntem superásset, cápitis decollatióne martýrium consummávit. Ipsíus autem corpus póstea Cumas, in Campánia, translátum est.
          Bríxiæ sancti Faustíni, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Sixteenth of February
      
          At Rome, blessed Onesimus, of whom the Apostle Saint Paul writes to Philemon; whom he also ordained as Bishop of the Ephesians after Saint Timothy, and entrusted to him the preaching of the word. Onesimus himself, brought bound to Rome and stoned for the faith of Christ, was first buried there; then his body was carried to the place where he had been ordained Bishop.
          In Egypt, Saint Julian, Martyr, with five thousand others.
          At Caesarea, in Palestine, the holy Egyptian Martyrs Elias, Jeremiah, Isaiah, Samuel, and Daniel; who, having voluntarily ministered to Confessors condemned to the mines in Cilicia, and returning thence, were seized, and under the Governor Firmilianus, in the reign of the Emperor Galerius Maximianus, were most savagely tortured and finally struck with the sword. After them, Saint Porphyrius, servant of the Martyr Pamphilus, and Saint Seleucus, a Cappadocian, who had often prevailed in repeated contests, were again tortured, and one received the crown of martyrdom by fire, the other by the sword.
          At Nicomedia, Saint Juliana, Virgin and Martyr; who, under the Emperor Maximian, first gravely beaten by her father Africanus, then variously tortured by the Prefect Eulasius, to whom she had refused to be wed, and afterwards thrust into prison, where she openly contended with the devil, and finally, having overcome the flames of fire and a boiling pot, completed her martyrdom by beheading. Her body was afterwards translated to Cumae, in Campania.
          At Brescia, Saint Faustinus, Bishop and Confessor.
  psalm.quartod-cimo-kal-ndas-maii-a32f294b6e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18th day of April, were born into the better life:

          At Rome, under the Emperor Cornmodus and the Prefect Perennius, the blessed Senator Apollonius. A slave informed upon him as being a Christian, and he was commanded to give an account of his faith. In order to do this he wrote an admirable treatise, which he read in the Senate but the Senate, nevertheless, ordered him to be beheaded for Christ's sake.
          At Messina, the holy martyrs Eleutherius, Bishop of Illyrium, and Anthia his mother. He was famous for the holiness of his life, and for his power of working miracles. Under the Emperor Hadrian he was tortured upon a heated iron-bed, a grating, and a vessel filled with boiling oil, pitch, and rosin. These he overcame, and was thrown to the lions but by them he was left unhurt, and in the end his throat was cut along with that of his mother.
          Likewise at Messina, the holy Prefect Corebus, who was converted to the faith by holy Eleutherius, and was slain with the sword.
          At Brescia, the holy martyr Calocerus, who was converted to Christ by holy Faustinus and Jovita, and under the aforesaid Emperor Hadrian by his testimony finished a glorious contention.
          At Cordova, the holy martyr Perfectus the Priest, who was killed by the Moors for holding forth against the Mahomedan religion. [The place of his death, which was in the year 850, is still called the Field of Truth.]
          At Milan, holy Cardinal Galdin, Bishop of that see, who gave up his soul to God on finishing a discourse against heretics, [in the year 1176. He was a Cardinal Archbishop and a Legate of the Holy See.]
          At Monte Senario, in Tuscany, [in the thirteenth century,] the blessed Confessor Amadeo, one of the seven founders of the Order of Servants of the Blessed Virgin Mary, whose feast we keep upon the 13th day of February. He was eminent for his burning love toward God.
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Maii

          Apud montem Senárium, in Etrúria, natális sancti Amidǽi Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis, flagrantíssima in Deum caritáte præclári. Ipsíus tamen ac Sociórum festum prídie Idus Februárii celebrátur.
          Romæ beáti Apollónii Senatóris, qui, sub Cómmodo Príncipe et Perénnio Præfécto, a servo próditus quod Christiánus esset, iussúsque ut ratiónem fídei suæ rédderet, insígne volúmen compósuit, quod in Senátu legit; et nihilóminus pro Christo, senténtia Senátus, cápite truncátus est.
          Messánæ, in Sicília, natális sanctórum Mártyrum Eleuthérii, Epíscopi Illýrici, et Anthíæ matris. Ipse, cum esset vitæ sanctimónia et miraculórum virtúte illústris, sub Hadriáno Príncipe, lectum férreum ignítum, cratículam et sartáginem, óleo et pice ac resína fervéntem, súperans, proiéctus quoque leónibus sed ab illis nil læsus, novíssime simul cum matre iugulátur.
          Córdubæ, in Hispánia, sancti Perfécti, Presbýteri et Mártyris, qui a Mauris, eo quod inveherétur in Mahumétis sectam et fírmiter Christi fidem profiterétur, gládio trucidátus est.
          Messánæ, in Sicília, sancti Corébi Præfécti, qui, per sanctum Eleuthérium convérsus ad fidem, gládio percússus est.
          Bríxiæ sancti Calóceri Mártyris, qui, a sanctis Faustíno et Iovíta convérsus ad Christum, sub Hadriáno Príncipe gloriósum confessiónis certámen complévit.
          Medioláni sancti Galdíni, Cardinális et eiúsdem civitátis Epíscopi, qui, concióne advérsus hæréticos expléta, spíritum Deo réddidit.
      en2:
      - type: text
        text: |-
          The Eighteenth of April
      
          At Mount Senarius, in Etruria, the birth of Saint Amadeus, Confessor, one of the seven Founders of the Order of Servants of the Blessed Virgin Mary, distinguished for his most ardent charity toward God. However, his feast and that of his Companions is celebrated on the day before the Ides of February.
          At Rome, blessed Apollonius, Senator, who, under the Emperor Commodus and the Prefect Perennius, denounced by a slave for being a Christian, and ordered to give an account of his faith, composed a distinguished volume, which he read in the Senate; and was nonetheless beheaded for Christ by decree of the Senate.
          At Messina, in Sicily, the birth of the holy Martyrs Eleutherius, Bishop of Illyria, and his mother Anthia. He himself, renowned for holiness of life and the power of miracles, under the Emperor Hadrian, survived a red-hot iron bed, a gridiron, and a frying pan seething with oil, pitch, and resin, and was also thrown to the lions but harmed not at all by them; at last he was slaughtered together with his mother.
          At Córdoba, in Spain, Saint Perfectus, Priest and Martyr, who was slaughtered with a sword by the Moors for attacking the sect of Muhammad and firmly professing the faith of Christ.
          At Messina, in Sicily, Saint Coroebus, Prefect, who, converted to the faith through Saint Eleutherius, was struck with a sword.
          At Brescia, Saint Calogero, Martyr, who, converted to Christ by Saints Faustinus and Jovita, under the Emperor Hadrian, completed the glorious contest of confession.
          At Milan, Saint Galdinus, Cardinal and Bishop of the same city, who, having delivered a sermon against heretics, gave up his spirit to God.
  psalm.quartod-cimo-kal-ndas-nov-mbris-32d12ad728:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of October, were born into the better life:

          At Arenas, in Spain, the holy Confessor Peter of Alcantara, of the Order of Friars Minor, whose name Clement IX enrolled among those of the saints on account of his wonderful spirit of penance and his many miracles.
          At Rome, under the Emperor Mark Antonine, the holy martyrs Ptolemy and Lucius. Of these it is recorded by Justin Martyr that Ptolemy brought a lewd woman to believe in Christ, and taught her to honour chastity, for the which cause he was accused by an unclean man before Urbicius the Prefect. He suffered a long and foul imprisonment, and at length made a public confession of Christ's teaching, and was sentenced to death. Lucius blamed the sentence and openly avowed himself also to be a Christian, for the which cause he was sent to death likewise, and with them was sent a third under the same condemnation.
          At Antioch, the holy martyrs Beronicus, the Virgin Pelagia, and forty-nine others.
          In Egypt, in the persecution under the Emperor Maximin, the holy soldier Varus. He used to visit seven holy monks that were kept in prison, and to minister to them, and when one of them died he chose to be substituted in his place, and along with the others he suffered great cruelties, and gained the palm of martyrdom.
          At Evreux, (at the end of the seventh century,) the holy Confessor Aquilinus, Bishop (of that see.)
          In the country of Orleans, (toward the end of the sixth century,) deceased holy Veran, Bishop (of Cavaillon.)
          At Salerno, (in the fifth century,) holy Eusterius, Bishop (of that see.)
          In Ireland, (at the end of the sixth century,) the holy Confessor Ethbin.
          At Oxford, in England, (in the eighth century,) the holy Virgin Frideswide, (Patroness of that city. She was daughter of the Prince of that territory, and founded at Oxford a nunnery in honour of St. Mary and all the saints, the direction of which was committed to her care.)
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Novémbris

          Sancti Petri de Alcántara, Sacerdótis ex Ordine Minórum et Confessóris, qui migrávit in cælum prídie huius diéi.
          Romæ natális sanctórum Mártyrum Ptolomǽi et Lúcii, sub Marco Antoníno. Horum prior (ut scribit Iustínus Martyr), cum impudícam mulíerem ad Christi convertísset fidem, et castitátem cólere docuísset, ídeo, ab impúro viro apud Præféctum Urbícium accusátus, multo témpore squalóre cárceris macerátus est, et ad últimum, cum de Christi magistério pública confessióne testarétur, iussus est duci ad mortem; Lúcius quoque, cum Urbícii senténtiam improbáret et se Christiánum líbere faterétur, símilem senténtiam excépit; quibus et álius tértius adiúnctus est, qui étiam eódem supplício damnátus fuit.
          Antiochíæ sanctórum Mártyrum Beroníci, Pelágiæ Vírginis, et aliórum quadragínta novem.
          In Ægýpto sancti Vari mílitis, qui, sub Maximíno Imperatóre, dum sanctos septem Mónachos in cárcere deténtos visitáret atque refíceret, vóluit, uno ex ipsis defúncto, in eius locum subrogári; atque ita cum illis, sævíssima passus, martýrii palmam adéptus est.
          Ebróicis, in Gállia, sancti Aquilíni, Epíscopi et Confessóris.
          In território Aurelianénsi deposítio sancti Veráni Epíscopi.
          Apud Salérnum sancti Eustérii Epíscopi.
          In monastério Silvæ Necténsis, in Hibérnia, sancti Ethbíni Abbátis.
          Oxónii, in Anglia, sanctæ Fredeswíndæ Vírginis.
      en2:
      - type: text
        text: |-
          The Eighteenth of October
      
          Saint Peter of Alcantara, Priest of the Order of Friars Minor and Confessor, who passed to heaven on the preceding day.
          At Rome, the birth of the holy Martyrs Ptolemy and Lucius, under Marcus Antoninus. Of these, the former (as Justin Martyr writes), having converted an unchaste woman to the faith of Christ and taught her to practice chastity, was for this reason accused by her impure husband before the Prefect Urbicus, tormented for a long time in the filth of prison, and at last, when he bore witness by public confession to the teaching of Christ, was ordered to be led to death; Lucius also, when he condemned the sentence of Urbicus and freely confessed himself a Christian, received a similar sentence; and another third person was joined to them, who was likewise condemned to the same punishment.
          At Antioch, the holy Martyrs Beronicus, Pelagia, Virgin, and forty-nine others.
          In Egypt, Saint Uar, a soldier, who, under the Emperor Maximinus, while he was visiting and refreshing seven holy Monks held in prison, wished, when one of them died, to be substituted in his place; and so, suffering most savagely with them, he obtained the palm of martyrdom.
          At Évreux, in France, Saint Aquilinus, Bishop and Confessor.
          In the territory of Orléans, the deposition of Saint Veran, Bishop.
          At Salerno, Saint Euthereus, Bishop.
          In the monastery of Silva Nectensis, in Ireland, Saint Ethbin, Abbot.
          At Oxford, in England, Saint Frideswide, Virgin.
  psalm.quartod-cimo-kal-ndas-oct-bris-628d498b87:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18 th day of September, were born into the better life:

          At Osimo, the holy Confessor Joseph of Cupertino, of the Order of Friars Minor Conventuals, whose name Pope Clement XIII enrolled among those of the saints.
          Upon the same day, holy Methodius, Bishop first of Olympus in Lycia, and afterward of Tyre, very famous for his clear words and teaching, who, as is written by holy Jerome, was crowned with martyrdom at Chalcis, in Greece, at the end of the last persecution.
          In the country of Vienne, the holy martyr Ferreolus, of Tribunitial rank. (During the persecution under the Emperor Diocletian,) he was tried by command of the wicked President Crispin, and first most cruelly beaten, then heavily loaded with chains and cast into a foul prison. God loosed his chains, and the gates of the prison opened, and he went forth, but he was followed and again taken, and received the crown of martyrdom by being beheaded.
          Also the holy martyrs Sophia and Irene.
          At Milan, (in the fourth century,) holy Eustorgius I, Bishop of that city, famous through the witness of blessed Ambrose.
          At Gortyna, in Crete, (in the seventh century,) the holy Confessor Eumenius, Bishop (of that see.)
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Octóbris

          Auximi, in Picéno, sancti Ioséphi a Cupertíno, Sacerdótis ex Ordine Minórum Conventuálium et Confessóris; quem Clemens Papa Décimus tértius in Sanctórum númerum rétulit.
          In Chálcide Grǽciæ natális sancti Methódii, qui prius Olýmpii, in Lýcia, et póstea Tyri, in Phœnícia, éxstitit Epíscopus, sermónis nitóre ac doctrína claríssimus; atque, ad extrémum novíssimæ persecutiónis (ut scribit sanctus Hierónymus), martýrio coronátus est.
          In território Viennénsi sancti Ferréoli Mártyris, qui, cum esset tribuníciæ potestátis, iussu impiíssimi Prǽsidis Crispíni tentus, et primo crudelíssime verberátus, deínde, gravi catenárum póndere onústus, in tetérrimum cárcerem trusus est; unde, solútis Dei nutu vínculis et iánuis cárceris patefáctis, éxiens, ab insequéntibus íterum est captus, ac martýrii palmam obtruncatióne cápitis percépit.
          Item sanctárum Mártyrum Sophíæ et Irénes.
          Medioláni sancti Eustórgii Primi, eiúsdem civitátis Epíscopi, beáti Ambrósii testimónio célebris.
          Gortýnæ, in Creta, sancti Euménii, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Eighteenth of September
      
          At Osimo, in Picenum, Saint Joseph of Cupertino, Priest of the Order of Conventual Friars Minor and Confessor, whom Pope Clement the Thirteenth enrolled among the Saints.
          At Chalcis, in Greece, the birth of Saint Methodius, who was first Bishop of Olympus, in Lycia, and afterwards of Tyre, in Phoenicia, most renowned for the elegance and learning of his discourse; and, at the very end of the last persecution (as Saint Jerome writes), was crowned with martyrdom.
          In the territory of Vienne, Saint Ferreolus, Martyr, who, being of tribunician rank, was seized by order of the most impious Governor Crispinus, first most cruelly beaten, then, weighed down by the heavy burden of chains, was thrust into a most foul prison; whence, his bonds loosed by God's will and the prison doors thrown open, he went out, was seized again by those pursuing him, and received the palm of martyrdom by decapitation.
          Likewise, the holy Martyrs Sophia and Irene.
          At Milan, Saint Eustorgius the First, Bishop of the same city, celebrated by the testimony of blessed Ambrose.
          At Gortyna, in Crete, Saint Eumenius, Bishop and Confessor.
  psalm.quartod-cimo-kal-ndas-sept-mbris-276b597008:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of August, were born into the better life:

          At Rome, [in the year 192,] the holy martyr Julius. He was a Senator who was denounced to the judge Vitellius and by him committed to prison, thereafter by command of the Emperor Cornmodus he was beaten with cudgels until he gave up the ghost. His body was buried in the cemetery of Calipodius, upon the Aurelian Way.
          In Cilicia, [about the year 300,] the holy soldiers Andrew the Tribune, and his companions. After obtaining a victory over the Persians by God's help, they were turned to the faith of Christ, and being accused therefore, they were massacred by the army of the President Seleucus in the straits of the Taurus mountain, under the Emperor Maximian.
          In Palestine, the holy martyr Timothy, who after overcoming many torments was burnt at a slow fire, under Urban the President, in the persecution under the Emperor Diocletian. There suffered there at the same place Thecla and Agapius.
          Thecla was thrown to wild beasts, and being rent by them passed away to her Divine Bridegroom. Agapius suffered many tortures, but was kept for greater contendings still.
          At Anagni, [about the year 250,] the holy martyr Magnus, Bishop [of that see,] who was slain in the persecution under Decius.
          At the Brignoles, in Provence, [in the year 1297,] holy Louis, of the Order of Friars Minors, Bishop of Toulouse, famous for the holiness of his life and his miracles. His body was carried thence to Marseilles, and is honourably buried there in the church of the Friars Minors.
          At Sisteron, in Gaul, [in the year 535,] the blessed Confessor Donatus, a Priest, who had been from his very infancy marvellously gifted with the grace of God. He lived as a hermit for many years, and passed away to be with Christ, famous for miracles.
          In Berry, [in the sixth century,] the holy Confessor Marian.
          At Mantua, the holy Confessor Rufinus.
      la:
      - type: text
        text: |-
          Quartodécimo Kaléndas Septémbris

          Cadómi, in Gállia, sancti Ioánnis Eudes Confessóris, Missionárii Apostólici, Fundatóris Congregatiónis Presbyterórum Iesu et Maríæ necnon Ordinis Moniálium Dóminæ Nostræ a Caritáte, et promotóris litúrgici cultus erga Sacratíssima Christi eiúsque Genitrícis Corda; quem Pius Papa Undécimus fastis Sanctórum adscrípsit.
          Romæ Sancti Iúlii, Senatóris et Mártyris; qui, Vitéllio Iúdici tráditus et ab eo in cárcerem trusus, támdiu, iubénte Cómmodo Imperatóre, fústibus cæsus est, donec emítteret spíritum. Ipsíus autem corpus in cœmetério Calepódii via Aurélia, sepúltum fuit.
          Anágniæ sancti Magni Epíscopi et Mártyris, qui in persecutióne Décii necátus est.
          In Cilícia natális sancti Andréæ Tribúni et Sociórum mílitum; qui, victória de Persis divínitus adépta, ad fidem Christi convérsi, et hoc nómine accusáti, sub Maximiáno Imperatóre in angústiis Tauri montis ab exércitu Seléuci Prǽsidis trucidáti sunt.
          In Palæstína sancti Timóthei Mártyris, qui in persecutióne Diocletiáni sub Urbáno Prǽside, post multa superáta supplícia, lento igne combústus est. Passi sunt étiam ibídem Thecla et Agápius: illa feris expósita, eárum déntibus laniáta transívit ad Sponsum: Agápius vero, plúrima torménta perpéssus, ad maióra certámina fuit dilátus.
          Romæ sancti Xysti Tértii, Papæ et Confessóris.
          Apud castrum Bríncolam, in Província, deposítio sancti Ludovíci, ex Ordine Minórum, Epíscopi Tolosáni, vitæ sanctitáte et miráculis clari; cuius corpus, inde Massíliam translátum, in Ecclésia Fratrum Minórum honorífice cónditum fuit, ac póstea Valéntiam, in Hispánia, devéctum est, atque in cathedráli Ecclésia collocátum.
          In pago Sigistérico, in Gállia, beáti Donáti, Presbýteri et Confessóris; qui, ab ipsis usque infántiæ rudiméntis mira Dei grátia prǽditus, anachoréticam vitam multis annis exégit, et miraculórum glória clarus migrávit ad Christum.
          In território Bituricénsi sancti Mariáni Confessóris, cuius virtútes et mirácula beátus Gregórius, Turonénsis Epíscopus, magnis láudibus celebravit.
          Mántuæ sancti Rufíni Confessóris.
          Norimbérgæ sancti Sebáldi Eremítæ, virtútibus et miráculis præclári, qui Sanctórum catálogo a Martíno Papa Quinto adiéctus est.
      en2:
      - type: text
        text: |-
          The Nineteenth of August
      
          At Caen, in France, Saint John Eudes, Confessor, Apostolic Missionary, Founder of the Congregation of the Priests of Jesus and Mary and also of the Order of Nuns of Our Lady of Charity, and promoter of the liturgical cult of the Most Sacred Hearts of Christ and his Mother; whom Pope Pius the Eleventh enrolled in the register of the Saints.
          At Rome, Saint Julius, Senator and Martyr; who, handed over to the judge Vitellius and thrust by him into prison, was beaten with rods for so long by order of the Emperor Commodus that he gave up his spirit. His body was buried in the cemetery of Calepodius on the Aurelian Way.
          At Anagni, Saint Magnus, Bishop and Martyr, who was slain in the persecution of Decius.
          In Cilicia, the birth of Saint Andrew, Tribune, and his companion soldiers; who, having obtained a victory over the Persians by divine aid, were converted to the faith of Christ, and for this reason accused, were slaughtered under the Emperor Maximian in the passes of Mount Taurus by the army of the Governor Seleucus.
          In Palestine, Saint Timothy, Martyr, who in the persecution of Diocletian under the Governor Urbanus, after overcoming many tortures, was burned with a slow fire. Also suffering there were Thecla and Agapius: the former, exposed to wild beasts, was torn apart by their teeth and passed to her Spouse; but Agapius, having endured very many torments, was put off for greater contests.
          At Rome, Saint Sixtus the Third, Pope and Confessor.
          At the castle of Brignoles, in Provence, the deposition of Saint Louis, of the Order of Friars Minor, Bishop of Toulouse, renowned for holiness of life and miracles; whose body, translated from there to Marseille, was honorably deposited in the Church of the Friars Minor, and afterwards conveyed to Valencia, in Spain, and placed in the cathedral church.
          In the village of Sigistre, in France, blessed Donatus, Priest and Confessor, who, endowed from the very beginnings of his infancy with the wondrous grace of God, lived the eremitic life for many years, and renowned with the glory of miracles, passed to Christ.
          In the territory of Bourges, Saint Marianus, Confessor, whose virtues and miracles blessed Gregory, Bishop of Tours, celebrated with great praise.
          At Mantua, Saint Rufinus, Confessor.
          At Nuremberg, Saint Sebaldus, Hermit, renowned for virtues and miracles, who was added to the catalogue of the Saints by Pope Martin the Fifth.
  psalm.quinto-idus-apr-lis-1fd368764b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 9th day of April, were born into the better life:

          At Antioch, holy Prochorus, one of the seven first deacons. He was illustrious for his faith and miracles, and was crowned with martyrdom. [He was the 3rd of the seven deacons, and 66th of the 72 disciples. He was a nephew of St Stephen. After being with St John in Asia, he was made Bishop of Nicomedia, in Bithynia, by St Peter, and later on sent to Antioch.]
          At Rome, the holy martyrs Demetrius, Concessus, Hilary, and their Companions.
          At Sirmium, suffered seven holy Virgins, all martyrs, who purchased eternal life at the price of their blood.
          At Caesarea, in Cappadocia, [in the year 362,] the holy martyr Eupsychius, who was crowned with martyrdom under the Emperor Julian the Apostate for casting down the shrine of Fortune.
          In Africa, the holy martyrs of Massylita, [probably Fez,] upon whose birthday holy Augustine made a discourse.
          At Diarbekr, in Mesopotamia, [in the fifth century,] holy Acatius, Bishop of that see, who even melted down and sold the vessels of the Church to redeem captives withal.
          At Rouen, the holy Confessor Hugh, Bishop of that see, [in the year 730.]
          In the city of Die, [in the sixth century,] holy Marcellus, Bishop thereof, who was famous for miracles.
          In Judea, holy Mary of Cleophas, sister of Mary the most Holy Mother of God.
          At Rome is commemorated the translation of the body of holy Monica, mother of the blessed Augustine, Bishop [of Hippo,] which the supreme Pontiff Martin V caused to be brought into the city from Ostia, and honourably buried in the church of the said blessed Augustine, [in the year 1439.]
          At Mons, in Hainaut, [in the year 686,] the blessed Waldetrude, [First Abbess of Mons and Foundress of that City,] famous for the holiness of her life and for her miracles.
      la:
      - type: text
        text: |-
          Quinto Idus Aprílis

          In Iudǽa sanctæ Maríæ Cléophæ, quam beátus Ioánnes Evangelísta sorórem sanctíssimæ Dei Genitrícis Maríæ núncupat, et cum hac simul iuxta crucem Iesu stetísse narrat.
          Antiochíæ sancti Próchori, qui fuit unus de septem primis Diáconis; et, fide ac miráculis clarus, martýrio coronátus est.
          Romæ natális sanctórum Mártyrum Demétrii, Concéssi, Hilárii et Sociórum.
          Cæsaréæ, in Cappadócia, sancti Eupsýchii Mártyris, qui ob evérsum Fortúnæ fanum, sub Iuliáno Apóstata, martýrium consummávit.
          In Africa sanctórum Mártyrum Massylitanórum, in quorum die natáli sanctus Augustínus tractátum hábuit.
          Sírmii pássio sanctárum septem Vírginum et Mártyrum, quæ, dato simul prétio sánguinis, vitam mercátæ sunt ætérnam.
          Amidæ, in Mesopotámia, sancti Acátii Epíscopi, qui pro rediméndis captívis étiam vasa Ecclésiæ conflávit ac véndidit.
          Rotómagi sancti Hugónis, Epíscopi et Confessóris.
          In civitáte Diénsi, in Gállia, sancti Marcélli Epíscopi, miráculis clari.
          Móntibus, in Hannónia, beátæ Waldetrúdis, vitæ sanctimónia et miráculis claræ.
          Romæ Translátio córporis sanctæ Mónicæ, matris beáti Augustíni Epíscopi; quod, ex Ostiis Tiberínis, Martíno Quinto Summo Pontífice, in Urbem delátum, in Ecclésia eiúsdem beáti Augustíni honorífice recónditum fuit.
      en2:
      - type: text
        text: |-
          The Ninth of April
      
          In Judea, Saint Mary of Cleophas, whom the blessed Evangelist John names as the sister of the most holy Mother of God, Mary, and narrates that she stood together with her beside the cross of Jesus.
          At Antioch, Saint Prochorus, who was one of the first seven Deacons; and, renowned for faith and miracles, was crowned with martyrdom.
          At Rome, the birth of the holy Martyrs Demetrius, Concessa, Hilarius, and their Companions.
          At Caesarea, in Cappadocia, Saint Eupsychius, Martyr, who completed his martyrdom for the destruction of the temple of Fortune, under Julian the Apostate.
          In Africa, the holy Martyrs of Masilita, on whose birth-day Saint Augustine delivered an address.
          At Sirmium, the passion of seven holy Virgins and Martyrs, who together giving the price of blood, purchased eternal life.
          At Amida, in Mesopotamia, Saint Acacius, Bishop, who melted down and sold even the vessels of the Church to ransom captives.
          At Rouen, Saint Hugh, Bishop and Confessor.
          In the city of Die, in France, Saint Marcellus, Bishop, renowned for miracles.
          At Mons, in Hainaut, blessed Waldetrudis, renowned for holiness of life and miracles.
          At Rome, the Translation of the body of Saint Monica, mother of blessed Augustine the Bishop; which was carried from Ostia on the Tiber, under the Supreme Pontiff Martin the Fifth, into the City, and honorably re-enshrined in the church of the same blessed Augustine.
  psalm.quinto-idus-aug-sti-6e798e2650:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the eve of the holy martyr Lawrence.
          Upon the same 9th day of August, we keep in England the feast of the holy Oswald, King of the Northumbrians, whose acts are written by the Venerable Priest Bede, and of whom mention is made upon the 5th day of this same month.
          Upon the same 9th day of August, were born into the better life:

          At Rome, [in the year 258,] the holy soldier Romanus, who was so wrought upon by the confession of the blessed Lawrence that he sought baptism at his hands, and was presently arraigned, beaten with clubs, and then beheaded.
          In Tuscany, [in the year 261,] the holy martyrs Secundian, Marcellian, and Verian. In the time of the Emperor Decius the Consular Promotus caused them first to be hided, then hung upon the rack, scarified with hooks, and burnt in the sides, thereafter they were beheaded, and so gained the palm of victory through martyrdom.
          At Verona, the holy martyrs Firmus and Rusticus, in the time of the Emperor Maximian.
          In Africa, [in the third century,] many holy martyrs, who at the exhortation of holy Numidicus gained the palm of martyrdom in the persecution under the Emperor Valerian by being cast into the fire. Numidicus himself was thrown upon the burning fire along with the others, and then covered with stones but when his daughter dug him out there was still some life left in him, he was healed, and afterwards by his worthy life obtained from blessed Cyprian admission as a Priest to the Church at Carthage.
          At Constantinople, [in the year 730,] the holy martyrs Julian, Marcian, and eight others, who were long tortured, and then slain with the sword by command of the wicked Emperor Leo, on account of the image of the Saviour which they had set up in the Brazen Gate.
          At Châlons[-sur-Marne], in Gaul, [in the fourth century,] the holy Confessor Domitian, [third] Bishop [of that see.]
      la:
      - type: text
        text: |-
          Quinto Idus Augústi

          Vigília sancti Lauréntii Mártyris.
          Romæ sancti Románi, mílitis et Mártyris; qui, confessióne beáti Lauréntii compúnctus, pétiit ab eo baptizári, et, mox exhíbitus ac fústibus cæsus, ad últimum decollátus est.
          In Túscia natális sanctórum Mártyrum Secundiáni, Marcelliáni et Veriáni; qui, témpore Décii, a Promóto Consulári primum cæsi sunt, deínde in equúleo suspénsi, et abrási úngulis, atque igne latéribus appósito assáti, ac tandem triumphálem martýrii palmam, cápite cæsi, meruérunt.
          Verónæ sanctórum Mártyrum Firmi et Rústici, qui, témpore Maximiáni Imperatóris, sub Anolíno Iúdice, cum sacrificáre idólis renúerent et constánter in Christi fide persísterent, ambo iussi sunt, post ália superáta supplícia, fústibus cædi et cápite amputári.
          In Africa commemorátio plurimórum sanctórum Mártyrum, qui, in persecutióne Valeriáni, hortánte eos ad constántiam sancto Numídico, in ignem coniécti, martýrii palmam adépti sunt. Ipse autem Numídicus, licet cum áliis in rogum iniéctus et lapídibus óbrutus fuísset, a fília tamen, effóssus et semivívus repértus, curátus est; ac póstea, ob eius virtútem, in Ecclésiæ Carthaginénsis Presbýterum a beáto Cypriáno méruit cooptári.
          Constantinópoli sanctórum Mártyrum Iuliáni, Marciáni et aliórum octo; qui, ob Salvatóris imáginem, quam in porta ǽnea constitúerant, omnes, ímpii Leónis Imperatóris iussu, post multa torménta, gládio necáti sunt.
          Cataláuni, in Gállia, sancti Domitiáni, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Ninth of August
      
          The Vigil of Saint Lawrence, Martyr.
          At Rome, Saint Romanus, soldier and Martyr; who, moved by the confession of blessed Lawrence, asked him to be baptized, and, shortly brought forward and beaten with rods, was at last beheaded.
          In Tuscany, the birth of the holy Martyrs Secundianus, Marcellianus, and Verianus; who, in the time of Decius, were first beaten by the consular Promotus, then hung on the rack and scraped with claws, roasted with fire applied to their sides, and finally merited the triumphal palm of martyrdom by beheading.
          At Verona, the holy Martyrs Firmus and Rusticus, who, in the time of the Emperor Maximian, under the judge Anolinus, when they refused to sacrifice to idols and persisted steadfastly in the faith of Christ, were both ordered, after other tortures had been overcome, to be beaten with rods and beheaded.
          In Africa, a commemoration of very many holy Martyrs, who, in the persecution of Valerian, encouraged to perseverance by Saint Numidicus, were cast into the fire and obtained the palm of martyrdom. Numidicus himself, though he had been thrown into the pyre with others and buried under stones, was nevertheless dug out by his daughter, found half-alive, and tended; and afterwards, by reason of his virtue, he merited to be enrolled among the Priests of the Church of Carthage by blessed Cyprian.
          At Constantinople, the holy Martyrs Julian, Marcianus, and eight others; who, on account of the image of the Savior which they had set up in the bronze gate, were all slain by the sword after many torments, by order of the impious Emperor Leo.
          At Châlons, in France, Saint Domitian, Bishop and Confessor.
  psalm.quinto-idus-dec-mbris-620cbc6bdf:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 9th of December, were born into the better life:

          At Toledo, in Spain, the holy Virgin and martyr Leocadia. In the persecution under the Emperor Diocletian she suffered a terrible imprisonment under Dacian, Prefect of Spain, and when she heard of the grievous torments of blessed Eulalia and the other martyrs, she knelt down in prayer and gave up her unstained spirit to Christ (,in the year 303).
          At Carthage, the holy martyr Restitutus, Bishop (of that see,) concerning whom on whose solemn feastday holy Augustine preached a discourse to the people.
          Likewise in Africa, the holy martyrs Peter, Successus, Bassian, Primitivus, and twenty others.
          At Limoges, in France, (in the year 46,) the holy Virgin and martyr Valeria.
          At Verona, holy Proculus, Bishop (of that see, in the fourth century.) In the persecution under the Emperor Diocletian he was buffeted and cudgelled and thrust out of the city, but was at length restored to his own church and fell asleep in peace.
          At Pavia, holy Syrus, the first Bishop of that city, who was eminent for the signs and powers of an apostle.
          At Apamea, in Syria, blessed Julian, Bishop, who shone with holiness in the time of the Emperor Severus.
          At Perigueux, in France, (about the year 586,) the holy Abbot Cyprian, a man of great holiness. (He lived as a hermit in the latter part of his life near Dordogne, at a place now called after him.)
          At Nazianzus, (about the year 371,) holy Gorgonia, sister of blessed Gregory the theologian, who hath written of her graces and miracles.
          At Grai, in Burgundy, (in the year 1636,) holy Peter Fourier, Canon Regular of Our Saviour, founder of the Canonesses Regular of Our Lady for the education of girls whom, illustrious for his virtues and miracles, Leo XIII added him to the roll of the Saints.
      la:
      - type: text
        text: |-
          Quinto Idus Decémbris

          Carthágine sancti Restitúti, Epíscopi et Mártyris, in cuius solemnitáte sanctus Augustínus de ipso ad pópulum sermónem hábuit.
          Item in Africa sanctórum Mártyrum Petri, Succéssi, Bassiáni, Primitívi et aliórum vigínti.
          Toléti, in Hispánia, natális sanctæ Leocádiæ, Vírginis et Mártyris; quæ, in persecutióne Diocletiáni Imperatóris, a Præfécto Hispaniárum Daciáno inclúsa cárcere ac dire maceráta, in eo tandem, cum gravíssimos beátæ Euláliæ et reliquórum Mártyrum cruciátus audísset, impollútum spíritum, génibus in oratióne pósitis, Christo réddidit.
          Lemóvicis, in Aquitánia, sanctæ Valériæ, Vírginis et Mártyris.
          Verónæ sancti Próculi Epíscopi, qui, in persecutióne Diocletiáni, cólaphis ac fústibus cæsus, e civitáte pulsus est, ac tandem, in Ecclésiam suam restitútus, quiévit in pace.
          Pápiæ sancti Syri, qui fuit primus eiúsdem civitátis Epíscopus, atque apostólicis signis et virtútibus cláruit.
          Apaméæ, in Sýria, beáti Iuliáni Epíscopi, qui, témpore Sevéri, sanctitáte refúlsit.
          Graii, in Burgúndia, sancti Petri Fourier, qui Canónicus Reguláris fuit Salvatóris Nostri, et Canonissárum Regulárium Dóminæ Nostræ edocéndis puéllis Institútor; atque, virtútibus ac miráculis clarus, a Leóne Décimo tértio, Pontífice Máximo, Sanctórum catálogo adiúnctus est.
          Petragóricis, in Gállia, sancti Cypriáni Abbátis, magnæ sanctitátis viri.
          Naziánzi, in Cappadócia, sanctæ Gorgóniæ, quæ fuit beátæ Nonnæ fília, atque beatórum Gregórii Theológi et Cæsárii soror, cuius ipse Gregórius virtútes et mirácula conscrípsit.
      en2:
      - type: text
        text: |-
          The Ninth of December
      
          At Carthage, Saint Restitutus, Bishop and Martyr, on whose feast-day Saint Augustine delivered a sermon about him to the people.
          Likewise in Africa, the holy Martyrs Peter, Successus, Bassianus, Primitivus, and twenty others.
          At Toledo, in Spain, the birth of Saint Leocadia, Virgin and Martyr; who, in the persecution of the Emperor Diocletian, imprisoned and cruelly tormented by the Prefect of Spain, Dacianus, and when she had heard in prison of the most grievous tortures of blessed Eulalia and the rest of the Martyrs, rendered up her immaculate spirit to Christ, kneeling in prayer.
          At Limoges, in Aquitaine, Saint Valeria, Virgin and Martyr.
          At Verona, Saint Proculo, Bishop, who, in the persecution of Diocletian, beaten with blows and rods, was driven from the city, and at last, restored to his Church, rested in peace.
          At Pavia, Saint Syrus, who was the first Bishop of the same city, and was renowned for apostolic signs and virtues.
          At Apamea, in Syria, blessed Julian, Bishop, who, in the time of Severus, shone with holiness.
          At Gray, in Burgundy, Saint Peter Fourier, who was a Canon Regular of Our Savior, and Founder of the Canonesses Regular of Our Lady for the education of girls; and, renowned for virtues and miracles, was added to the catalogue of the Saints by Pope Leo the Thirteenth, Supreme Pontiff.
          At Périgueux, in France, Saint Cyprian, Abbot, a man of great holiness.
          At Nazianzus, in Cappadocia, Saint Gorgonia, who was the daughter of blessed Nonna and the sister of the blessed Gregory the Theologian and Caesarius, whose virtues and miracles Gregory himself wrote.
  psalm.quinto-idus-febru-rii-2b9bdce3d6:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Cyril, Pope of Alexandria, a most eminent champion of the Catholic faith, and illustrious for his teaching and holiness, of whom mention is made upon the 28th day of January, on the which day he fell asleep in peace.
          Upon the same 9th day of February, were born into the better life:

          At Alexandria, [in the year 249,] the holy Virgin Apollonia. The persecutors under the Emperor Decius first beat out all her teeth, then they built and kindled a funeral fire and threatened to burn her alive upon it unless she would join them in uttering sinful words. She thought a little while within herself, and then the fire of the Holy Ghost flaming up within her, she tore herself suddenly out of the hands of those wicked men and leapt of her own accord into the fire which they had made ready, so that the very actors in this cruelty were awestruck to find a woman more ready to die than were they to kill her.
          At Rome, the holy martyrs Alexander, and thirty-eight others who were crowned at the same time.
          At Solis, in Cyprus, the holy martyrs Ammonius and Alexander.
          At Antioch, [in the year 260,] the holy martyr Nicephorus, who received his crown by being beheaded, under the Emperor Valerian.
          In Africa, in the castle of Lemele, the holy Deacons Primus and Donates, who suffered martyrdom in defending the altar in the church against the Donatists, [sixth century.]
          In the monastery of Fontenelle, holy Ausbert, Bishop of Rouen, [in the year 695.]
          At Canosa, in Apulia, the holy Confessor Sabinus, Bishop of that see, [in the year 566.]
      la:
      - type: text
        text: |-
          Quinto Idus Februárii

          Sancti Cyrílli, Epíscopi Alexandríni, Confessóris et Ecclésiæ Doctóris, cuius dies natális quinto Kaléndas Februárii recensétur.
          Alexandríæ natális sanctæ Apollóniæ, Vírginis et Mártyris, cui persecutóres, sub Décio, dentes omnes primum excussérunt. Deínde, constrúcto ac succénso rogo, iídem commináti sunt, nisi cum eis ímpia verba proférret, vivam se eam incensúros; at illa, cum páululum intra semetípsam deliberásset, repénte se de mánibus impiórum prorípuit, et in ignem, quem paráverant, maióre Sancti Spíritus flamma intus ǽstuans, sponte ita prosilívit, ut perterreréntur étiam ipsi crudelitátis auctóres, quod prómptior invénta esset ad mortem fémina quam persecútor ad pœnam.
          Romæ pássio sanctórum Mártyrum Alexándri et aliórum trigínta octo coronatórum.
          In castéllo Lemelénsi, in Africa, sanctórum Mártyrum Primi et Donáti Diaconórum, qui, cum altáre in Ecclésia tutaréntur, a Donatístis occísi sunt.
          Solis, in Cypro, sanctórum Mártyrum Ammónii et Alexándri.
          Antiochíæ sancti Nicéphori Mártyris, qui sub Valeriáno Imperatóre, cápite cæsus, martýrii corónam accépit.
          In monastério Fontanéllæ, in Gállia, sancti Ansbérti, Rotomagénsis Epíscopi.
          Canúsii, in Apúlia, sancti Sabíni, Epíscopi et Confessóris; qui (ut beátus Gregórius Papa refert), prophétiæ spíritu ac miraculórum dono prǽditus, sibi iam cæco exhíbitum a fámulo, prǽmiis corrúpto, venéni póculum divíno agnóvit instinctu, sed, prænuntiáta mox a Deo suménda de corruptóre vindícta signóque Crucis facto, venénum secúrus ébibit ac nullum ex eo nocuméntum accépit.
      en2:
      - type: text
        text: |-
          The Ninth of February
      
          Saint Cyril, Bishop of Alexandria, Confessor and Doctor of the Church, whose birth-day is noted on the twenty-eighth of January.
          At Alexandria, the birth of Saint Apollonia, Virgin and Martyr, whose persecutors, under Decius, first knocked out all her teeth. Then, having built and kindled a pyre, they threatened that unless she would utter impious words with them, they would burn her alive; but she, having deliberated within herself a little while, suddenly tore herself from the hands of the impious, and, burning inwardly with a greater flame of the Holy Spirit, leaped willingly into the fire they had prepared, so that even the authors of the cruelty were struck with terror, finding the woman readier for death than the persecutor for punishment.
          At Rome, the passion of the holy Martyrs Alexander and thirty-eight other crowned ones.
          In the castle of Lemelensis, in Africa, the holy Martyrs Primus and Donatus, Deacons, who, as they were defending the altar in the Church, were slain by the Donatists.
          At Soli, in Cyprus, the holy Martyrs Ammonius and Alexander.
          At Antioch, Saint Nicephorus, Martyr, who under the Emperor Valerian, beheaded, received the crown of martyrdom.
          In the monastery of Fontenelle, in France, Saint Ansbert, Bishop of Rouen.
          At Canosa, in Apulia, Saint Sabinus, Bishop and Confessor; who (as Pope Saint Gregory relates), gifted with the spirit of prophecy and the gift of miracles, recognized by divine instinct a cup of poison presented to him by a servant who had been bribed, though he was already blind; but, having foretold that God would soon take vengeance on the corrupter, and having made the sign of the Cross, he drank the poison without fear and received no harm from it.
  psalm.quinto-idus-i-lii-e599e88aec:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy brethren Cyril and Methodius, Bishops, who brought many peoples and kings to believe in Christ, and of whom mention is made on the 9th day of March.
          Upon the same 11th day of July, were born into the better life:

          At Rome, the blessed martyr Pope Pius I., [most likely reigned from 142-157,] who was crowned with martyrdom in the persecution under the Emperor Marcus Aurelius Antoninus.
          At Nicopolis, in Armenia, [in the fourth century,] the holy martyrs Januarius and Pelagia, who finished their testimony after having been tormented for four days with the rack, with hooks, and with potsherds.
          In the country of Sens, [in the third century,] the holy martyr Sidronius.
          At Iconium, the holy martyr Marcian, who under the President Perennius through many torments attained the palm, [in the year 243.]
          At Side, in Pamphylia, the holy Priest Cindeus, [third century.] In the persecution under the Emperor Diocletian, the President Stratonicus caused him to be many ways tormented, and afterwards cast into the fire there he remained unhurt, but afterwards, while he was praying, gave up the ghost.
          At Brescia, the holy martyrs Savinus and Cyprian, [martyrs in the Diocese of Poitiers, in the fifth or sixth century.] [La Bresse, in France, the native place of these saints, must be meant instead of Brescia, and probably the last entry on this day is merely a repetition.]
          At Bergamo, [in Lombardy, in the year 683,] holy John, Bishop [of that see,] who was slain by the Arians for guarding the Catholic faith.
          At Cordova, the holy Priest Abundius, who was crowned with martyrdom, [in the year 854,] for inveighing against Mohammedanism.
          In the country of Poitiers, the holy Confessor Sabinus, [sixth century.]
      la:
      - type: text
        text: |-
          Quinto Idus Iúlii

          Romæ sancti Pii Primi, Papæ et Mártyris; qui martýrio coronátus est in persecutióne Marci Aurélii Antoníni.
          Bergómi sancti Ioánnis Epíscopi, qui, ob tuéndam cathólicam fidem, ab Ariánis occísus est.
          Sidæ, in Pamphýlia, sancti Cindéi Presbýteri, qui, sub Diocletiáno Imperatóre et Stratoníco Prǽside, post multa torménta, iniéctus in ignem et nil læsus, demum in oratióne réddidit spíritum.
          Córdubæ, in Hispánia, sancti Abúndii Presbýteri, qui, in persecutióne Arábica, cum in Mahumétis sectam inveherétur, martýrio coronátus est.
          Nicópoli, in Arménia, natális sanctórum Mártyrum Ianuárii et Pelágiæ, qui, equúleo, úngulis et testárum fragméntis per dies quátuor cruciáti, martýrium implevérunt.
          In território Senonénsi sancti Sidronii Mártyris.
          Icónii, in Lycaónia, sancti Marciáni Mártyris, qui, sub Perénnio Prǽside, per multa torménta pervénit ad palmam.
          Bríxiæ sanctórum Mártyrum Savíni et Cypriáni.
          In território Pictaviénsi sancti Sabíni Confessóris.
      en2:
      - type: text
        text: |-
          The Ninth of July
      
          At Rome, Saint Pius the First, Pope and Martyr; who was crowned with martyrdom in the persecution of Marcus Aurelius Antoninus.
          At Bergamo, Saint John, Bishop, who was slain by the Arians for the defense of the Catholic faith.
          At Side, in Pamphylia, Saint Cindeus, Priest, who, under the Emperor Diocletian and the Governor Stratonicus, after many tortures, was cast into fire and harmed not at all, and at last gave up his spirit in prayer.
          At Córdoba, in Spain, Saint Abundus, Priest, who, in the Arabian persecution, for inveighing against the sect of Muhammad, was crowned with martyrdom.
          At Nicopolis, in Armenia, the birth of the holy Martyrs Januarius and Pelagia, who, tortured on the rack, with claws, and with fragments of broken pottery for four days, completed their martyrdom.
          In the territory of Sens, Saint Sidonius, Martyr.
          At Iconium, in Lycaonia, Saint Marcianus, Martyr, who, under the Governor Perennius, through many tortures reached the palm.
          At Brescia, the holy Martyrs Savinus and Cyprian.
          In the territory of Poitiers, Saint Sabinus, Confessor.
  psalm.quinto-idus-i-nii-87f4adefba:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 9th day of June, were born into the better life:

          Upon the Celian Mount of Rome, the holy Martyrs Primus and Felician, who suffered under the Emperors Diocletian and Maximian. These glorious martyrs had led a long life together, and had suffered diverse and dreadful torments sometimes together, and sometimes apart. At length they brought their happy fight to a close, being beheaded under Promotus, President of Mentana.
          At Agen, in Gaul, [in the third century,] suffered the holy martyr Vincent the Levite.
          At Antioch, [in the year 304,] the holy Virgin martyr Pelagia, whom holy Ambrose and John Chrysostom do greatly praise.
          At Syracuse, [in the year 594,] holy Maximian, Bishop [of that see,] of whom holy Pope Gregory the Great doth oftentimes make mention.
          At Andria, in Apulia, [in the twelfth century,] holy Richard, the first Bishop of that city, famous for wondrous works.
          In Scotland, [in the year 597,] holy Colum, Priest and Confessor, [founder and first Abbot of Iona.]
          At Edessa, in Syria, [in the fourth century,] the holy monk Julian, whose illustrious acts are written by the holy Deacon Ephraim.
      la:
      - type: text
        text: |-
          Quinto Idus Iúnii

          Noménti, in Sabínis, natális sanctórum Mártyrum Primi et Feliciáni fratrum, sub Diocletiáno et Maximiáno Imperatóribus. Hi gloriósi Mártyres, cum longǽvam in Dómino vitam duxíssent, et nunc simul pária, nunc singillátim divérsa et exquisíta pertulíssent torménta, ambo tandem felícis pugnæ cursum, a Nomentáno Prǽside Promóto animadvérsi gládio, consummavérunt. Ipsórum autem Mártyrum córpora, póstea Romam transláta, in Ecclésia sancti Stéphani Protomártyris, in monte Cǽlio, honorífice collocáta sunt.
          Agénni, in Gállia, pássio sancti Vincéntii, Levítæ et Mártyris, qui, ob Christi fidem, verbéribus diríssime cæsus et gládio decollátus est.
          Apud Antiochíam sanctæ Pelágiæ, Vírginis et Mártyris, quam sancti Ambrósius et Ioánnes Chrysostómus magnis éfferunt láudibus.
          Syracúsis, in Sicília, sancti Maximiáni Epíscopi, cuius sanctus Gregórius Papa sǽpius méminit.
          Andriæ, in Apúlia, sancti Richárdi, qui fuit primus eiúsdem civitátis Epíscopus, et miráculis cláruit.
          In Ióna, Scótiæ ínsula, sancti Colúmbæ, Presbýteri et Abbátis.
          Edéssæ, in Sýria, sancti Iuliáni Mónachi, cuius præclára gesta sanctus Ephræm Diáconus scripsit.
      en2:
      - type: text
        text: |-
          The Ninth of June
      
          At Nomentum, in the Sabine country, the birth of the holy Martyrs Primus and Felicianus, brothers, under the Emperors Diocletian and Maximian. These glorious Martyrs, having lived a long life in the Lord, and having endured now together equal torments, now separately various and exquisite ones, both at last completed the course of their blessed combat, sentenced by the sword of the Nomentane Governor Promotus. The bodies of these Martyrs were afterwards translated to Rome, and honorably placed in the church of Saint Stephen, the First Martyr, on the Caelian Hill.
          At Agen, in France, the passion of Saint Vincent, Levite and Martyr, who, for the faith of Christ, was most cruelly beaten with rods and beheaded with a sword.
          At Antioch, Saint Pelagia, Virgin and Martyr, whom Saints Ambrose and John Chrysostom extol with great praise.
          At Syracuse, in Sicily, Saint Maximianus, Bishop, whom Pope Saint Gregory mentions several times.
          At Andria, in Apulia, Saint Richard, who was the first Bishop of the same city, and was renowned for miracles.
          On the island of Iona, in Scotland, Saint Columba, Priest and Abbot.
          At Edessa, in Syria, Saint Julian, Monk, whose illustrious deeds the Deacon Saint Ephrem wrote.
  psalm.quinto-idus-ianu-rii-e85cdf3802:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 9th day of January, were born into the better life:

          At Antioch, in the persecution under the Emperors Diocletian and Maximian, the holy martyr Julian, along with whom is commemorated the holy Virgin Basilissa, his wife, who kept her virginity with her husband and ended her life in peace. A multitude of priests and ministers of the Church of Christ had taken refuge with them because of the fury of the persecution. They were burnt with fire, and Julian, by command of the President Marcian, was thereafter made to suffer many torments and was then beheaded.
          Along with him there suffered also the Priest Anthony and Anastasius, whom Julian had raised from the dead and made a partaker of the grace of Christ, and the lad Celsus, together with his mother, Marcionilla, and seven brethren, and many others.
          In Morocco, (in the fourth century,) the holy Virgin and martyr Marciana, who was thrown to wild beasts and so finished her testimony.
          At Smyrna, the holy martyrs Vitalis (probably a Bishop, and the others were most likely Deacons), Revocatus, and Fortunatus.
          In Africa, the holy martyrs Epictetus, Jucundus, Secundus, Vitalis, Felix, and seven others, (in the year 205.)
          At Sebaste, in Armenia, (in the year 392,) holy Peter, Bishop (of that see,) brother of holy Basil the Great (also of St. Gregory of Nyssa. His father was St. Basil the Elder, his mother St. Emmelia, and his grandmother St. Macrina. He was made head of his convent in the year 362, when St. Basil was made bishop, St. Basil having before been Abbot thereof.)
          At Ancona, holy Marcellinus, Bishop of that city, the which, as holy Gregory writeth, he did through the power of God deliver from burning. (He succeeded St. Traso in the Bishopric about the year 550, and was followed by St. Thomas about the year 569. He is secondary Patron of Ancona.)
      la:
      - type: text
        text: |-
          Quinto Idus Ianuárii

          Antiochíæ, sub Diocletiáno et Maximiáno, natális sanctórum Iuliáni Mártyris, et Basilíssæ Vírginis, ipsíus Iuliáni uxóris. Hæc, virginitáte cum viro suo serváta, in pace vitam finívit; Iuliánus vero (postquam multitúdo Sacerdótum et Ministrórum Ecclésiæ Christi, quæ, propter immanitátem persecutiónis, ad eos confúgerat, igne cremáta est), Marciáni Prǽsidis iussu, plúrimis torméntis cruciátus, capitálem senténtiam accépit. Cum ipso étiam Antónius Présbyter, et Anastásius, quem idem Iuliánus, a morte suscitátum, grátiæ Christi partícipem fécerat, et Celsus puer cum huius matre Marcionílla, ac septem fratres, aliíque plúrimi passi sunt.
          Smyrnæ sanctórum Mártyrum Vitális, Revocáti et Fortunáti.
          In Africa sanctórum Mártyrum Epictéti, Iucúndi, Secúndi, Vitális, Felícis et aliórum septem.
          In Mauritánia Cæsariénsi sanctæ Marciánæ Vírginis, quæ, béstiis trádita, martýrium consummávit.
          Sebáste, in Arménia, sancti Petri Epíscopi, fílii sanctórum Basilíi et Emméliæ, atque fratris item sanctórum Basilíi Magni et Gregórii Nysséni Episcopórum, ac Macrinæ Vírginis.
          Anconæ sancti Marcellíni Epíscopi, qui urbem illam (ut sanctus Gregórius Papa scribit) divína virtúte ab incéndio liberávit.
      en2:
      - type: text
        text: |-
          The Ninth of January
      
          At Antioch, under Diocletian and Maximian, the birth of the holy Julian, Martyr, and Basilissa, Virgin, Julian's wife. She, having preserved her virginity with her husband, ended her life in peace; but Julian (after a multitude of Priests and Ministers of the Church of Christ, who had fled to them because of the savagery of the persecution, had been burned with fire), by order of the Governor Marcianus, was tortured with very many torments and received a capital sentence. With him also suffered Anthony the Priest, and Anastasius, whom Julian himself, having raised him from death, had made a partaker of the grace of Christ, and the boy Celsus with his mother Marcionilla, and seven brothers, and many others.
          At Smyrna, the holy Martyrs Vitalis, Revocatus, and Fortunatus.
          In Africa, the holy Martyrs Epictetus, Jucundus, Secundus, Vitalis, Felix, and seven others.
          In Caesarian Mauritania, Saint Marciana, Virgin, who, delivered to the beasts, completed her martyrdom.
          At Sebaste, in Armenia, Saint Peter, Bishop, son of Saints Basil and Emmelia, and likewise the brother of Saints Basil the Great and Gregory of Nyssa, Bishops, and of Macrina the Virgin.
          At Ancona, Saint Marcellinus, Bishop, who (as Pope Saint Gregory writes) delivered that city from fire by divine power.
  psalm.quinto-idus-m-rtii-e384d67f93:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor John of God, founder of the Order of Brethren Hospitallers of the Sick. Famous for his pity toward the poor, and for his lowly esteem of himself, whom the Supreme Pontiff Leo XIII declared the Patron in heaven of all the sick and those who nurse them, and of whom mention hath been made upon the 8th day of this present month of March.
          Upon the same 11th day of March, were born into the better life:

          At Carthage, the holy martyrs Heraclius and Zosimus.
          At Alexandria, the holy martyrs Candidus, Piperion, and twenty others.
          At Laodicea, in Syria, in the persecution under the Emperor Diocletian, the holy martyrs Trophimus and Thalus, who after many cruel torments gained crowns of glory.
          At Antioch, are commemorated many holy martyrs, of whom some were laid upon beds of red-hot iron by command of the Emperor Maximian, not until they died, but until their flesh was cooked, so as to ensure their prolonged suffering and others were put to other most cruel torments, before they received the crown of martyrdom.
          Likewise the holy martyrs Gorgonius and Firmus.
          At Cordova, the holy Priest Eulogius, who deserved a place among the martyrs of the said city, in the persecution under the Saracens, by striving by his writings to rival their contendings for the faith, [in the year 859]
          At Sardis, holy Euthymius, Bishop of that see, who for his honouring of holy images was banished by the Iconoclast Emperor Michael, and martyred under Theophilus.
          At Jerusalem, holy Sophronius, Bishop of that see, [about the year 638.]
          At Milan, holy Benedict, Bishop of that see, [about the year 725]
          In the neighbourhood of Amiens, the holy Abbot Firmin.
          At Carthage, the holy Confessor Constantine.
          At Bauco, the holy Confessor Peter, eminent for the fame of his miracles. [A Spanish soldier who lived as a hermit in Italy.]
      la:
      - type: text
        text: |-
          Quinto Idus Mártii

          Sardis sancti Euthýmii Epíscopi, qui, ob cultum sanctárum Imáginum, a Michaéle, Imperatóre Iconoclásta, in exsílium missus est; ac demum, Theóphilo imperánte, búbulis nervis inhumániter cæsus, martýrium consummávit.
          Córdubæ, in Hispánia, sancti Eulógii, Presbýteri et Mártyris; qui, in persecutióne Saracenórum, ob præcláram et intrépidam Christi confessiónem, verbéribus et álapis cæsus ac decollátus gládio, adiúngi eiúsdem urbis Martýribus méruit, quorum pro fide certámina scribéndo fúerat æmulátus.
          Carthágine sanctórum Mártyrum Heráclii et Zósimi.
          Alexandríæ pássio sanctórum Cándidi, Piperiónis et aliórum vigínti.
          Laodicéæ, in Sýria, sanctórum Mártyrum Tróphimi et Thali, qui in persecutióne Diocletiáni, post multa sǽvaque torménta, corónas glóriæ sunt assecúti.
          Antiochíæ commemorátio plurimórum sanctórum Mártyrum, quorum álii, Maximiáni Imperatóris mandáto, candéntibus cratículis superpósiti, non ad mortem sed ad diutúrnum cruciátum assáti, álii áliis sævíssimis affécti supplíciis, ad palmam martýrii pervenérunt.
          Item sanctórum Mártyrum Gorgónii et Firmi.
          Hierosólymis sancti Sophrónii Epíscopi.
          Medioláni sancti Benedícti Epíscopi.
          In fínibus Ambianénsium sancti Firmíni Abbátis.
          Carthágine sancti Constantíni Confessóris.
          Babúci, in Hérnicis, sancti Petri Confessóris, miraculórum glória conspícui.
      en2:
      - type: text
        text: |-
          The Ninth of March
      
          At Sardis, Saint Euthymius, Bishop, who, for his veneration of holy Images, was sent into exile by the Emperor Michael the Iconoclast; and at last, under the Emperor Theophilus, was inhumanly beaten with ox sinews and completed his martyrdom.
          At Córdoba, in Spain, Saint Eulogius, Priest and Martyr; who, in the Saracen persecution, for his illustrious and intrepid confession of Christ, beaten with rods and blows of the fist and beheaded with a sword, merited to be joined to the Martyrs of the same city, whose contests for the faith he had emulated by his writings.
          At Carthage, the holy Martyrs Heraclius and Zosimus.
          At Alexandria, the passion of the holy Cándidus, Piperion, and twenty others.
          At Laodicea, in Syria, the holy Martyrs Trophimus and Thalus, who in the persecution of Diocletian, after many and savage torments, obtained the crowns of glory.
          At Antioch, a commemoration of very many holy Martyrs, of whom some, by command of the Emperor Maximian, placed on red-hot gridirons, were roasted not to death but to prolonged torment, others were afflicted with most savage punishments, and so reached the palm of martyrdom.
          Likewise, the holy Martyrs Gorgonius and Firmus.
          At Jerusalem, Saint Sophronius, Bishop.
          At Milan, Saint Benedict, Bishop.
          On the borders of the Ambianenses, Saint Firminus, Abbot.
          At Carthage, Saint Constantinus, Confessor.
          At Bauco, in the Hernican country, Saint Peter, Confessor, renowned with the glory of miracles.
  psalm.quinto-idus-maii-0fecd65538:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Pope of Rome, Pius, fifth of that name, a Friar Preacher, of whom mention is made upon the 5th day of this present month. He toiled manfully and hopefully for the restoration of the discipline of the Church, for the extirpation of heresies, and for the defeat of the enemies of the Christian name, and ruled the Catholic Church in holiness of life and government.
          Upon the same 11th day of May, were born into the better life:

          At Rome, upon the Salarian Way, the blessed Priest Anthimus. After he had done excellently well in power and preaching, he was thrown into the Tiber during the persecution under Diocletian, and thence delivered by an angel, who brought him back to his own oratory but he was lastly beheaded, and so passed into heaven as a conqueror.
          Upon the same day, the holy martyr Evellius. He was one of Nero's household, who believed on Christ on seeing the passion of the holy martyr Torpes, and was therefore beheaded.
          Also at Rome, the holy martyrs Maximus, Bassus, and Fabius, who were killed upon the Salarian Way, in the persecution under Diocletian.
          At Camarino, the holy martyrs Anastasius and his Companions, who were put to death under Antiochus the President, in the persecution under Decius.
          At Osimo, in Picenum, the holy martyrs Sisinnius the Deacon, Diocletius, and Florence, disciples of the holy Priest Anthimus, who finished their testimony by being stoned to death, in the persecution under Diocletian.
          At Varennes, [in the eighth century,] the holy martyr Gangulph.
          At Vienne, [toward the end of the fifth century,] the holy Mamertus, Bishop [of that see,] who, on account of a threatening volcanic eruption, instituted in that city the solemn Rogation processions upon the three days before the Ascension of the Lord, the which custom the Universal Church hath since approved by adopting it.
          At Sauvigny, [in the year 994,] deceased holy Majolus, Abbot of Cluny, whose life was illustrious for holy and worthy deeds.
          At the town now called San Severino, in Picenum, the holy Confessor Illuminatus.
          In the town of Grotaglia, in the Diocese of Taranto, [in the year 1716,] the holy Confessor Francis di Girolamo, of the Society of Jesus, an example of singular love and patience in seeking the salvation of souls. Pope Gregory XVI enrolled his name with those of the Saints. His burial is commemorated with great solemnity in the church of the Professed House of his Order at Naples, where his body lieth.
      la:
      - type: text
        text: |-
          Quinto Idus Maii

          Natális beatórum Philíppi et Iacóbi Apostolórum. Ex his Philíppus, cum omnem fere Scýthiam ad Christi fidem convertísset, tandem apud Hierápolim, Asiæ civitátem, cruci affíxus et lapídibus óbrutus, glorióso fine quiévit; Iacóbus vero, qui et frater Dómini légitur et primus Hierosolymórum Epíscopus, e pinna Templi præcipitátus, confráctis inde crúribus, ac fullónis fuste in cérebro percússus, intériit, ibíque, non longe a Templo, sepúltus est.
          Romæ, via Salária, item natális beáti Anthimi Presbýteri, qui, post virtútum et prædicatiónis insígnia, in persecutióne Diocletiáni, in Tíberim præcipitátus, et ab Angelo exínde eréptus, oratório próprio restitútus est; deínde, cápite punítus, victor migrávit ad cælos.
          Ibídem sancti Evéllii Mártyris, qui, cum esset de família Nerónis, ad passiónem sancti Torpétis in Christum crédidit, pro quo et decollátus est.
          Item Romæ sanctórum Mártyrum Máximi, Bassi et Fábii; qui sub Diocletiáno, via Salária, cæsi sunt.
          Auximi, in Picéno, sanctórum Mártyrum Sisínii Diáconi, Dioclétii et Floréntii, discipulórum sancti Anthimi Presbýteri; qui, sub Diocletiáno, lapídibus óbruti, martýrium complevérunt.
          Cameríni sanctórum Mártyrum Anastásii et Sociórum; qui, in persecutióne Décii, sub Antíocho Prǽside, cæsi sunt.
          Varénnis, in Gállia, sancti Gangúlphi Mártyris.
          Viénnæ, in Gállia, sancti Mamérti Epíscopi, qui, ob imminéntem cladem, solémnes ante Ascensiónem Dómini triduánas in ea urbe Litánias instítuit; quem ritum póstea universális Ecclésia recípiens comprobávit.
          Apud Silviníacum, in Gállia, deposítio sancti Maióli, Abbátis Cluniacénsis, cuius vita sanctis méritis fuit præclára.
          Neápoli, in Campánia, sancti Francísci de Hierónymo, in Tarentínæ diœcésis óppido Cryptaleárum orti, Sacerdótis e Societáte Iesu et Confessóris, exímiæ in salúte animárum procuránda caritátis et patiéntiæ viri; quem Gregórius Papa Décimus sextus in Sanctórum cánonem rétulit.
          Apud Septempedános, in Picéno, sancti Illumináti Confessóris.
          Cárali, in Sardínia, sancti Ignátii a Láconi, Confessóris, ex Ordine Minórum Capuccinórum, humilitáte, caritáte et miráculis præclári, quem Pius Papa Duodécimus Sanctórum honóribus decorávit.
      en2:
      - type: text
        text: |-
          The Ninth of May (or, the first of May for Ss. Philip and James)
      
          The birth of the blessed Apostles Philip and James. Of these, Philip, having converted almost all of Scythia to the faith of Christ, at last at Hierapolis, a city of Asia, was crucified and buried under stones, and rested with a glorious death; but James, who is also called the brother of the Lord and was the first Bishop of Jerusalem, thrown from the pinnacle of the Temple, with his legs broken thereby and struck on the head with a fuller's club, died, and was buried there not far from the Temple.
          At Rome, on the Salarian Way, also the birth of blessed Anthimus, Priest, who, after distinguishing himself by virtues and preaching, was in the persecution of Diocletian thrown into the Tiber, rescued thence by an Angel, and restored to his own oratory; then, punished by decapitation, he departed as a victor to the heavens.
          In the same place, Saint Evellius, Martyr, who, being of the household of Nero, came to believe in Christ at the passion of Saint Torpetes, and was beheaded for him.
          Likewise at Rome, the holy Martyrs Maximus, Bassus, and Fabius; who under Diocletian were slain on the Salarian Way.
          At Osimo, in Picenum, the holy Martyrs Sisinius the Deacon, Diocletius, and Florentius, disciples of Saint Anthimus the Priest; who, under Diocletian, buried under stones, completed their martyrdom.
          At Camerino, the holy Martyrs Anastasius and his Companions; who, in the persecution of Decius, under the Governor Antiochus, were slain.
          At Varennes, in France, Saint Gangulphus, Martyr.
          At Vienne, in France, Saint Mamertus, Bishop, who, on account of an impending calamity, instituted in that city the solemn three-day Litanies before the Ascension of the Lord; which rite the universal Church afterwards received and approved.
          At Souvigny, in France, the deposition of Saint Mayeul, Abbot of Cluny, whose life was illustrious with holy merits.
          At Naples, in Campania, Saint Francis of Geronimo, born in a town of the Diocese of Taranto, Crypta delle Grazie, Priest of the Society of Jesus and Confessor, a man of outstanding charity and patience in procuring the salvation of souls; whom Pope Gregory the Sixteenth enrolled in the canon of the Saints.
          At Sanseverino, in Picenum, Saint Illuminatus, Confessor.
          At Cagliari, in Sardinia, Saint Ignatius of Laconi, Confessor, of the Order of Capuchin Friars Minor, renowned for humility, charity, and miracles, whom Pope Pius the Twelfth adorned with the honors of the Saints.
  psalm.quinto-idus-nov-mbris-f58045a0fa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is kept the feast of the Dedication of the Cathedral Church of the Saviour at Rome, (in the year 324).
          Upon the same 9th day of November, were born into the better life:

          At Amasea, in Pontus, the holy soldier Theodore. In the time of the Emperor Maximian he was heavily flogged and cast into prison for his profession of the Christian faith, in prison the Lord appeared unto him, and bade him be steadfast and do manfully, then he was taken out and stretched upon the rack and torn with hooks until his inner parts were seen, and lastly he was thrown into the fire. Holy Gregory of Nyssa hath told his praises in a noble discourse.
          At Tyana, in Cappadocia, under the Emperor Diocletian, the holy martyr Orestes.
          At Thessalonica, under the Emperor Maximian, the holy martyr Alexander.
          At Bourges, the holy Confessor Ursinus, who was ordained at Rome by the successors of the Apostles, and sent to that city as the first Bishop thereof.
          At Naples, in Campania, holy Agrippinus, Bishop (of that see,) famous for miracles.
          At Constantinople, the holy Virgins Eustolia of Rome, and Sopatra, daughter of the Emperor Maurice.
          At Beirut, in Lebanon, is made commemoration of an image of the Saviour which was crucified by the Jews, (about the year 765,) and so much Blood flowed therefrom, that the Churches both of the East and West have plentifully received thereof.
      la:
      - type: text
        text: |-
          Quinto Idus Novémbris

          Romæ, in Lateráno, Dedicátio Basílicæ sanctíssimi Salvatóris, quæ ómnium Urbis et Orbis Ecclesiárum est mater et caput.
          Amaséæ, in Ponto, natális sancti Theodóri mílitis, qui, témpore Maximiáni Imperatóris, pro Christiánæ fídei confessióne, fórtiter cæsus et in cárcerem missus; deínde, Dómino sibi apparénte ac monénte ut constánter et viríliter ágeret, relevátus est; novíssime, postquam in equúleo suspénsus et úngulis ita excarnificátus est, ut eius interióra apparérent nuda, ardéntibus ígnibus comburéndus tráditur. Ipsíus vero laudes sanctus Gregórius Nyssénus præcláro encómio celebrávit.
          Tyánæ, in Cappadócia, pássio sancti Oréstis, sub Diocletiáno Imperatóre.
          Thessalonícæ sancti Alexándri Mártyris, sub Maximiáno Príncipe.
          Apud Bitúricas, in Aquitánia, sancti Ursíni Confessóris, qui, Romæ ordinátus a successóribus Apostolórum, primus eídem Bituricénsi urbi destinátur Epíscopus.
          Neápoli, in Campánia, sancti Agrippíni Epíscopi, miráculis clari.
          Constantinópoli sanctárum Vírginum Eustóliæ Románæ, et Sópatræ, fíliæ Maurítii Imperatóris.
          Berýti, in Sýria, commemorátio Imáginis Salvatóris, quæ, a Iudǽis crucifíxa, tam copiósum emísit sánguinem, ut Orientáles et Occidentáles Ecclésiæ ex eo ubértim accéperint.
      en2:
      - type: text
        text: |-
          The Ninth of November
      
          At Rome, in the Lateran, the Dedication of the Basilica of the most holy Savior, which is the mother and head of all the churches of the City and the World.
          At Amasea, in Pontus, the birth of Saint Theodore, soldier, who, in the time of the Emperor Maximian, for confessing the Christian faith, was bravely beaten and sent to prison; then, encouraged by the Lord appearing to him and urging him to act steadfastly and manfully, he was revived; finally, after being hung on the rack and so scraped with claws that his inner parts were laid bare, he was handed over to be burned with fire. His praises were celebrated by Saint Gregory of Nyssa in a distinguished panegyric.
          At Tyana, in Cappadocia, the passion of Saint Orestes, under the Emperor Diocletian.
          At Thessalonica, Saint Alexander, Martyr, under the Emperor Maximian.
          Among the Bituriges, in Aquitaine, Saint Ursinus, Confessor, who, ordained at Rome by successors of the Apostles, was appointed first Bishop of the same city of Bourges.
          At Naples, in Campania, Saint Agrippinus, Bishop, renowned for miracles.
          At Constantinople, the holy Virgins Eustolia, a Roman, and Sopatra, daughter of the Emperor Maurice.
          At Beirut, in Syria, a commemoration of the Image of the Savior, which, pierced by Jews, shed so copious a flow of blood that the Eastern and Western Churches received abundantly from it.
  psalm.quinto-idus-oct-bris-fe3aa2a3ba:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the same 11th day of October, were born into the better life:
          At Tarsus, in Cilicia, the holy martyrs Tharacus, Probus, and Andronicus, who suffered a long and foul imprisonment in the persecution under the Emperor Diocletian, were three times interrogated under torture and punishment, and, still confessing Christ, were beheaded, and so obtained a glorious triumph.
          In the country of the Vexin, under the President Fescenninus, the holy martyrs Nicasius, Bishop of Rouen, the Priest Quirinus, the Deacon Scubiculus, and the Virgin Pientia.
          Likewise the holy martyrs Anastasius the Priest, Placidus, Genesius, and their Companions.
          In the Thebaid, holy Sarmatas, a disciple of the blessed Abbot Antony, who was slain by the Saracens for Christ's sake.
          At Besancon, in Gaul, the holy martyr Germanus, Bishop (of that see.)
          At Uzes, in Gaul, (in the sixth century,) the holy Confessor Firmin, Bishop (of that see.)
          In Ireland, (in the year 600,) holy Kenneth, Abbot (of Aghaboe.)
          At Lier, in Belgium, (in the eighth century,) the holy Confessor Gummar.
          At Rennes, in Gaul, (in the ninth century,) the holy Confessor Emilian.
          At Tarsus, in Cilicia, the holy sisters Zenais and Philonilla, who were kinswomen of the blessed Apostle Paul according to the flesh, and his disciples in the faith.
          At Verona, (in the fifth century,) the holy Virgin Placidia.
      la:
      - type: text
        text: |-
          Quinto Idus Octóbris

          Festum Maternitátis beátæ Maríæ Vírginis.
          Tarsi, in Cilícia, sanctárum mulíerum Zenáidis et Philoníllæ sorórum, quæ beáti Pauli Apóstoli consanguíneæ et in fide fuérunt discípulæ.
          In pago Vilcassíno, in Gállia, pássio sanctórum Mártyrum Nicásii, qui erat Rotomagénsis Epíscopus, Quiríni Presbýteri, Scubículi Diáconi, et Piéntiæ Vírginis, sub Prǽside Fescenníno.
          Vesontióne, in Gálliis, sancti Germáni, Epíscopi et Mártyris.
          Item pássio sanctórum Anastásii Presbýteri, Plácidi, Genésii et Sociórum.
          Tarsi, in Cilícia, natális sanctórum Mártyrum Tháraci, Probi et Androníci; qui, in persecutióne Diocletiáni, longo témpore cárceris squalóre afflícti, et tértio divérsis torméntis et supplíciis examináti, tandem, in confessióne Christi, abscíssis cervícibus, triúmphum glóriæ sunt adépti.
          In Thebáide sancti Sármatæ, qui fuit discípulus beáti Antónii Abbátis, et a Saracénis pro Christo necátus est.
          Ucétiæ, in Gállia Narbonénsi, sancti Firmíni, Epíscopi et Confessóris.
          Calótii, in diœcési Asténsi, olim Papiénsi, sancti Alexándri Sauli, e Clericórum Regulárium sancti Pauli Congregatióne, Epíscopi et Confessóris; quem, génere, virtútibus, doctrína et miráculis clarum, Pius Décimus, Póntifex Máximus, Sanctórum fastis adscrípsit.
          In monastério Achadh-boénsi, in Hibérnia, sancti Cánici, Presbýteri et Abbátis.
          Lyræ, in Bélgio, deposítio sancti Gummári Confessóris.
          Apud Rhédones, in Gállia, sancti Æmiliáni Confessóris.
          Verónæ sanctæ Placídiæ Vírginis.
      en2:
      - type: text
        text: |-
          The Eleventh of October
      
          The Feast of the Maternity of the Blessed Virgin Mary.
          At Tarsus, in Cilicia, the holy women Zenaida and Philonilla, sisters, who were kinswomen and disciples in the faith of the blessed Apostle Paul.
          In the canton of Vexin, in France, the passion of the holy Martyrs Nicasius, who was Bishop of Rouen, Quirinus the Priest, Scubiculus the Deacon, and Pientia the Virgin, under the Governor Fescenninus.
          At Besançon, in France, Saint Germanus, Bishop and Martyr.
          Likewise, the passion of Saints Anastasius the Priest, Placidus, Genesius, and their Companions.
          At Tarsus, in Cilicia, the birth of the holy Martyrs Tharachus, Probus, and Andronicus; who, in the persecution of Diocletian, afflicted for a long time with the squalor of prison, and examined three times with various torments and punishments, at last, confessing Christ, were beheaded and obtained the triumph of glory.
          In the Thebaid, Saint Sarmata, who was a disciple of blessed Anthony the Abbot, and was slain by the Saracens for Christ.
          At Uzès, in Gallia Narbonensis, Saint Firminus, Bishop and Confessor.
          At Callotio, in the Diocese of Asti, formerly of Pavia, Saint Alexander Sauli, of the Congregation of Clerics Regular of Saint Paul, Bishop and Confessor; whom, renowned for birth, virtues, learning, and miracles, Pope Pius the Tenth, Supreme Pontiff, enrolled in the register of the Saints.
          In the monastery of Aghaboe, in Ireland, Saint Canice, Priest and Abbot.
          At Lierre, in Belgium, the deposition of Saint Gummarus, Confessor.
          At Rennes, in France, Saint Aemilianus, Confessor.
          At Verona, Saint Placida, Virgin.
  psalm.quinto-idus-sept-mbris-34e9ec4f63:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 9th day of September, were born into the better life:

          At Nicomedia, the holy martyrs Dorotheus and Gorgonius. They stood high at the Court of the Emperor Diocletian. They denounced in his presence the persecution which he was raising against the Christians, wherefore he caused them to be hung up, and their whole bodies torn with lashes, then to have the skin taken off their bowels, to be covered with vinegar and salt, and cooked upon a gridiron, and at the last strangled. In after times the body of the blessed Gorgonius was brought to Rome, and laid first upon the Latin Way, and afterwards in the Basilica of St Peter.
          In the land of the Sabines, at the 30th milestone from the city of Rome, the holy martyrs Hyacinth, Alexander, and Tiburtius.
          At Sebaste, under the Emperor Licinius, the holy soldier Severian. He often visited the forty martyrs while they were in prison, whereupon Lysias the President ordered him to be hung up with a stone tied to his feet, and to be beaten and torn with stripes and lashes, under the which torment he gave up the ghost.
          On the same day, the holy martyr Straton, who, for Christ's sake, was bound to two trees and torn asunder, and so finished his testimony.
          Likewise the holy brethren Rufinus and Rufinian, both martyrs.
          At Rome, (in the year 701,) the holy Confessor Pope Sergius I.
          In the country of Therouanne, (in the seventh century,) holy Omer, Bishop (of that see.)
          In Ireland, (in the sixth century,) the holy Abbot Ciaran, (founder of Clonmacnois.)
          At Cartagena, in South America, (in the year 1654,) the holy Confessor Peter Claver, of the Society of Jesus, who toiled for more than forty years among the negro slaves with marvellous self-sacrifice and exceeding love, and of them with his own hand caused nearly three hundred thousand to be born again in Christ. His name was enrolled by the Supreme Pontiff Leo XIII among those of the Saints.
      la:
      - type: text
        text: |-
          Quinto Idus Septémbris

          Nicomedíæ pássio sanctórum Mártyrum Doróthei et Gorgónii, qui, cum essent apud Diocletiánum Augústum honóres amplíssimos consecúti, et persecutiónem, quam ille Christiánis inferébat, detestaréntur, præsénte eo, iussi sunt primo appéndi, et flagris toto córpore laniári; deínde, viscéribus pelle nudátis, acéto et sale perfúndi, sicque assári in cratícula; atque, ad últimum, láqueo necári. Interiécto autem témpore, beáti Gorgónii corpus Romam delátum fuit, ac via Latína pósitum, et inde ad Basílicam sancti Petri translátum.
          In Sabínis, trigésimo ab Urbe milliário, sanctórum Mártyrum Hyacínthi, Alexándri et Tibúrtii.
          Sebáste, in Arménia, sancti Severiáni, qui, cum Licínii Imperatóris esset miles, et Quadragínta Mártyres, in cárcere deténtos frequens visitáret, hinc, iussu Lýsiæ Prǽsidis, saxo ad pedes ligáto suspénsus est, ac, verbéribus cæsus et flagris laniátus, in torméntis réddidit spíritum.
          Eódem die pássio sancti Stratónis, qui pro Christo, ad duas árbores ligátus atque discérptus, martýrium consummávit.
          Item sanctórum Mártyrum Rufíni et Rufiniáni fratrum.
          In território Tarvanénsi, in Gállia, sancti Audomári Epíscopi.
          In monastério Cluanénsi, in Hibérnia, sancti Queráni, Presbýteri et Abbátis.
      en2:
      - type: text
        text: |-
          The Ninth of September
      
          At Nicomedia, the passion of the holy Martyrs Dorotheus and Gorgonius, who, having attained to very great honors with the Emperor Diocletian Augustus, and detesting the persecution which he was inflicting on Christians, were ordered in his presence first to be hung up and torn over their whole bodies with scourges; then, with their flesh stripped bare, to be drenched with vinegar and salt, and so roasted on a gridiron; and, at last, to be strangled with a noose. Some time later, the body of blessed Gorgonius was brought to Rome and laid on the Latin Way, and from there translated to the Basilica of Saint Peter.
          In the Sabine country, thirty miles from the City, the holy Martyrs Hyacinth, Alexander, and Tiburtius.
          At Sebaste, in Armenia, Saint Severianus, who, being a soldier of the Emperor Licinius and frequently visiting the Forty Martyrs held in prison, was, for this reason, by order of the Governor Lysias, hung up with a stone tied to his feet, and, beaten with rods and torn with scourges, gave up his spirit amid torments.
          On the same day, the passion of Saint Straton, who for Christ, bound to two trees and torn apart, completed his martyrdom.
          Likewise, the holy Martyrs Rufinus and Rufinianus, brothers.
          In the territory of Thérouanne, in France, Saint Audomarus, Bishop.
          In the monastery of Clonmacnoise, in Ireland, Saint Kieran, Priest and Abbot.
  psalm.quinto-kal-ndas-apr-lis-2ff2c0630d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor John of Capistrano, of the Order of Friars Minors, illustrious for the holiness of his life, and his zeal for the propagation of the Catholic faith, who by his prayers and miracles procured the defeat of a vast army of Turks, and delivered the fortress of Belgrade from beleaguerment. Of whom mention is made upon the 23rd day of October.
          Upon the same 28th day of March, were born into the better life:

          At Caesarea, in Palestine, [about the year 260,] the holy martyrs Priscus, Malchus, and Alexander. During the persecution under the Emperor Valerian they were dwelling on a little plot of ground in the suburbs of the said city, and when heavenly crowns of martyrdom were then being offered, their love of God and faith in Him enkindled them to go openly to the judge, and to rebuke him for that he so raged after the blood of the godly, whereupon he forthwith commanded them to be devoured by wild beasts for Christ's name's sake.
          At Tarsus, in Cilicia, the holy martyrs Castor and Dorotheus.
          In Africa, the holy martyrs Rogatus, Successus, and sixteen others.
          At Rome, [in the year 440,] the holy Confessor Pope Sixtus III.
          At Nursia, [in the year 517,] the holy Abbot Speus, a man of wondrous patience, and when he passed away out of this life all his brethren saw his soul wing its flight heavenward in a bodily shape like a dove.
          At Chalons, in Gaul, the burial, [in the year 593,] of the holy Confessor Guntram, King of the Franks, who gave himself up so utterly to the things of the Spirit that he fled from the glory of the world, and gave all his goods for the churches, and the poor.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Aprílis

          Sancti Ioánnis de Capistráno, Sacerdótis ex Ordine Minórum et Confessóris, cuius memória recólitur décimo Kaléndas Novémbris.
          Cæsaréæ, in Palæstína, natális sanctórum Mártyrum Prisci, Malchi et Alexándri. Hi tres, in persecutióne Valeriáni, cum in suburbáno agéllo supradíctæ urbis habitárent, atque in ea cæléstes martýrii proponeréntur corónæ, ultro Iúdicem, divíno fídei calóre succénsi, ádeunt, et cur tantum in sánguinem piórum desævíret, obiúrgant; quos ille contínuo, pro Christi nómine, béstiis trádidit devorándos.
          Tarsi, in Cilícia, sanctórum Mártyrum Castóris et Doróthei.
          In Africa sanctórum Mártyrum Rogáti, Succéssi et aliórum séxdecim.
          Apud Núrsiam sancti Spei Abbátis, miræ patiéntiæ viri, cuius ánima (ut refert sanctus Gregórius Papa), cum ex hac vita migráret, in colúmbæ spécie a cunctis frátribus visa est in cælum ascéndere.
          Cabillóne, in Gálliis, deposítio sancti Gunthrámni, Regis Francórum, qui spiritálibus actiónibus ita se mancipávit, ut, relíctis sǽculi pompis, thesáuros suos lárgiter Ecclésiis et paupéribus erogáret.
      en2:
      - type: text
        text: |-
          The Twenty-eighth of March
      
          Saint John of Capistrano, Priest of the Order of Friars Minor and Confessor, whose memory is kept on the twenty-third of October.
          At Caesarea, in Palestine, the birth of the holy Martyrs Priscus, Malchus, and Alexander. These three, in the persecution of Valerian, while they were living in a small farm outside the above-mentioned city, and heavenly crowns of martyrdom were being offered there, of their own accord, inflamed with divine ardor of faith, approached the judge and rebuked him for raging so much against the blood of the devout; whom he straightway handed over to be devoured by beasts, in the name of Christ.
          At Tarsus, in Cilicia, the holy Martyrs Castor and Dorotheus.
          In Africa, the holy Martyrs Rogatus, Successus, and sixteen others.
          At Nursia, Saint Spes, Abbot, a man of wondrous patience, whose soul (as Pope Saint Gregory relates), when it was departing from this life, was seen by all the brethren to ascend to heaven in the form of a dove.
          At Chalon-sur-Saône, in France, the deposition of Saint Guntramnus, King of the Franks, who so devoted himself to spiritual works that, renouncing the pomps of the world, he lavishly distributed his treasures to churches and to the poor.
  psalm.quinto-kal-ndas-aug-sti-f83978f442:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 28th day of July, was born into the better life:

          At Rome, the holy martyr Pope Victor I.
          At Rome also, the holy Confessor Pope Innocent I.
          At Milan, the holy Nazarius, and Celsus a lad, both martyrs, whom Anolinus, during the madness of the persecution which Nero stirred up, caused to be beheaded, after they had been long maltreated and afflicted in prison.
          On the same day are commemorated many holy martyrs in the Thebaid, in Egypt, who suffered in the persecution under Decius and Valerian, when the Christians eagerly accepted death by the sword for Christ's name's sake, and the subtle enemy, seeking to slay souls rather than bodies, invented slower paths to death. One of them, after he had conquered the rack, and plates, and vessels of heated metal, had his hands tied behind his back and was smeared with honey, after which he was set in the burning sun, exposed to the stings of bees and flies. Another was tied down softly among flowers, and a shameless harlot was sent to excite him to lust, but he bit off the end of his tongue and spat it into her face as she was cajoling him.
          At Ancyra, in Galatia, the holy martyr Eustathius, who was put to the question with diverse kinds of torments, and cast into the river, whence he was delivered by an angel. But at length a dove came down to him from heaven, and called him away to his everlasting reward.
          At Miletus, the holy martyr Acatius, who, under the Emperor Licinius, after diverse torments, was cast into a furnace, where by the help of God he remained unhurt, and then finished his testimony by being beheaded.
          In Brittany, [in the sixth century,] the holy Confessor Samson, Bishop [of Dol.]
          At Lyon, [in the second century,] the holy Priest Peregrin, whose blessedness is attested by the glory of miracles.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Augústi

          Medioláni natális sanctórum Mártyrum Nazárii, et Celsi púeri, quos Anolínus, sub rábie persecutiónis quæ per Nerónem excitáta est, diu macerátos et afflíctos in cárcere, gládio feríri iussit.
          Romæ pássio sancti Victóris Primi, Papæ et Mártyris. Item Romæ sancti Innocéntii Primi, Papæ et Confessóris, qui ad Dóminum migrávit quarto Idus Mártii.
          Thebáide, in Ægýpto, commemorátio plurimórum sanctórum Mártyrum, qui in Décii et Valeriáni persecutióne passi sunt, quando Christiánis, optántibus pro Christi nómine gládio pércuti, cállidus hostis, tarda ad mortem supplícia conquírens, ánimas cupiébat iuguláre, non córpora. Ex eórum número unus, post equúleos et láminas ac sartágines superátas, melle perúnctus, ligátis mánibus post tergum, sub ardentíssimo sole, fucórum ac muscárum acúleis expósitus fuit; álius, inter flores mólliter vinctus, cum ad eum, ut concitáret in libídinem, impudicíssimum scortum venísset, præcísam morsu linguam in blandiéntis fáciem éxspuit.
          Ancýræ, in Galátia, sancti Eustáthii Mártyris, qui, váriis tormentórum genéribus excruciátus, atque demérsus in flumen, sed inde ab Angelo eréptus, demum, colúmba e cælis adveniénte, ad prǽmia ætérna vocátus est.
          Miléti, in Cária, sancti Acátii Mártyris, qui, sub Licínio Imperatóre, post divérsas pœnas, iniéctus in fornácem ac Dei ope servátus illǽsus, cápitis abscissióne martýrium complévit.
          In Británnia minóre sancti Sampsónis, Epíscopi et Confessóris.
          Lugdúni, in Gállia, sancti Peregríni Presbýteri, cuius beatitúdinem glória miraculórum testátur.
      en2:
      - type: text
        text: |-
          The Twenty-eighth of July
      
          At Milan, the birth of the holy Martyrs Nazarius and the boy Celsus, whom Anolinus, amid the fury of the persecution stirred up by Nero, having long tormented and afflicted in prison, ordered to be put to the sword.
          At Rome, the passion of Saint Victor the First, Pope and Martyr. Likewise at Rome, Saint Innocent the First, Pope and Confessor, who departed to the Lord on the twelfth of March.
          In the Thebaid, in Egypt, a commemoration of very many holy Martyrs, who suffered in the persecutions of Decius and Valerian, when, as Christians desired to be struck by the sword in the name of Christ, the cunning enemy, seeking slow punishments to death, wished to slaughter souls, not bodies. Of their number, one, after having survived the rack, red-hot plates, and frying pans, was anointed with honey, his hands bound behind his back, exposed under the most burning sun to the stings of hornets and flies; another, gently bound among flowers, when a most shameless harlot had come to stir him to lust, spit his tongue, bitten off, in the face of the one who was blandishing him.
          At Ancyra, in Galatia, Saint Eustathius, Martyr, who, tortured with various kinds of torments and plunged into a river, but rescued thence by an Angel, was finally, as a dove came from heaven, called to eternal rewards.
          At Miletus, in Caria, Saint Acacius, Martyr, who, under the Emperor Licinius, after various punishments, cast into a furnace and preserved unharmed by God's power, completed his martyrdom by the cutting off of his head.
          In Brittany, Saint Sampson, Bishop and Confessor.
          At Lyons, in France, Saint Peregrinus, Priest, whose blessedness is attested by the glory of miracles.
  psalm.quinto-kal-ndas-dec-mbris-576b0231d4:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the Feast of the holy Confessor Gregory, Archbishop of Neo-Caesarea, in Pontus, who was famous for teaching and holiness, and who came to be called the Wonder-worker, on account of the great signs and wonders which he worked to the great glory of the churches. Mention hath been made of him upon the 17th day of this present month of November.
          Upon the same 27th day of November, were born into the better life:

          At Antioch, the holy martyrs Basileus, Patriarch (of that see,) Auxilius, and Saturninus.
          In Persia, the holy martyr James, styled the Dismembered, a famous martyr. In the time of the Emperor Theodosius the younger, to please King Isdegerd, he denied Christ, wherefore his mother and his wife held aloof from him. Then he bethought himself, and went to the King and confessed Christ, and the King in wrath commanded him to be cut limb from limb, and his head to be cut off. At that time countless other martyrs suffered there also.
          At Sebaste, in Armenia, the holy martyrs Hirenarchus, the Priest Acacius, and seven women. It was the constancy of these women which moved Hirenarchus to turn to Christ, and he was beheaded along with Acacius, under Diocletian the Emperor and Maximus the President.
          At the river Cea, in Galicia, the holy martyrs Facundus and Primitivus, who suffered under the President Atticus.
          At Aquileia, (in the fourth century,) holy Valerian, Bishop (of that see).
          At Riez, in Gaul, (in the fifth century,) the holy Confessor Maximus, Bishop of that see, famous for signs and wonders. From his childhood he was endued with every grace, and was father of the monastery of Lerins, and afterward Bishop of the church of Riez.
          At Salzburg, (in the eighth century,) the holy Confessor Farrell, an Irishman, Bishop (of that see,) and Apostle of Carinthia, whose name the Supreme Pontiff Gregory IX enrolled among those of the Saints.
          In India, toward the borders of Persia, holy Barlaam and Josaphat, whose wonderful acts were written by holy John of Damascus.
          At Paris, (in the sixth century,) deceased the holy Monk and Solitary Severinus.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Decémbris

          Antiochíæ sanctórum Mártyrum Basiléi Epíscopi, Auxílii et Saturníni.
          Sebáste, in Arménia, sanctórum Mártyrum Hirenárchi, Acácii Presbýteri, ac septem mulíerum. Harum porro constántia Hirenárchus commótus, ad Christum convérsus, sub Diocletiáno Imperatóre et Máximo Prǽside, una cum Acácio, secúri percútitur.
          Apud Cæam flúvium, in Gallǽcia, sanctórum Facúndi et Primitívi, qui sub Attico Prǽside passi sunt.
          In Pérside sancti Iacóbi intercísi, Mártyris conspícui, qui, témpore Theodósii iunióris, cum in Isdegérdis Regis grátiam Christum negásset, et proptérea mater eius et uxor ab ipsíus se consuetúdine subtraxíssent, hinc, in se revérsus, intrépide coram Vararáne, Isdegérdis fílio ac successóre, se Christiánum esse conféssus est; ideóque ab iráto Rege, lata in eum mortis senténtia, membrátim iussus est concídi et cápite obtruncári. Quo étiam témpore innúmeri álii Mártyres ibídem passi sunt.
          Aquiléiæ sancti Valeriáni Epíscopi.
          Apud Régium, in Gállia, sancti Máximi, Epíscopi et Confessóris; qui, usque a primǽvæ ætátis annis omni virtútum grátia prǽditus, primum Lirinénsis cœnóbii Pater, deínde Regiénsis Ecclésiæ Epíscopus, signis et prodígiis ínclytus éxstitit.
          Salisbúrgi, in Nórico, sancti Virgílii, Epíscopi et Carinthiórum Apóstoli, qui a Gregório Nono, Pontífice Máximo, in Sanctórum númerum adscríptus est.
          Apud Indos, Persis finítimos, sanctórum Bárlaam et Iósaphat, quorum actus mirándos sanctus Ioánnes Damascénus conscrípsit.
          Lutétiæ Parisiórum deposítio sancti Severíni, Mónachi et Solitarii.
      en2:
      - type: text
        text: |-
          The Twenty-seventh of November
      
          At Antioch, the holy Martyrs Basileus, Bishop, Auxentius, and Saturninus.
          At Sebaste, in Armenia, the holy Martyrs Hiernarchus, Acacius the Priest, and seven women. Moved by the constancy of these women, Hiernarchus was converted to Christ, and, under the Emperor Diocletian and the Governor Maximus, was struck with an axe together with Acacius.
          By the river Cea, in Galicia, Saints Facundus and Primitivus, who suffered under the Governor Atticus.
          In Persia, Saint James the Intercisus, a distinguished Martyr, who, in the time of the younger Theodosius, having denied Christ to win favor with King Isdegerdes, and for that reason his mother and wife had withdrawn from his company, then, coming to himself, fearlessly confessed before Vararanes, the son and successor of Isdegerdes, that he was a Christian; and so by the angry King, a sentence of death being pronounced against him, he was ordered to be cut limb from limb and beheaded. At the same time countless other Martyrs suffered there.
          At Aquileia, Saint Valerianus, Bishop.
          At Riez, in France, Saint Maximus, Bishop and Confessor; who, endowed from the years of his earliest youth with every grace of virtue, was first Father of the monastery of Lérins, then Bishop of the Church of Riez, and was renowned with signs and wonders.
          At Salzburg, in Noricum, Saint Virgil, Bishop and Apostle of Carinthia, who was enrolled among the number of the Saints by Pope Gregory the Ninth, Supreme Pontiff.
          Among the Indians bordering on Persia, Saints Barlaam and Joasaph, whose wondrous deeds Saint John of Damascus wrote.
          At Paris, the deposition of Saint Severinus, Monk and Solitary.
  psalm.quinto-kal-ndas-febru-rii-1744918b7f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The feast of the holy Confessor Peter Nolasco, founder of the Order of Blessed Mary of Ransom, for the redemption of captives, who fell asleep in the Lord upon Christmas Eve.
          At Rome, the second Feast of holy Agnes.
          Upon the same 28th day of January, were born into the better life:

          At Rome likewise, the holy martyr Flavian, who suffered in the persecution under the Emperor Diocletian.
          At Apollonia, the holy martyrs Thyrsus, Leucius, Callinicus. In the time of the Emperor Decius they were tortured in diverse ways. Whereafter, Thyrsus and Callinicus were beheaded, and a voice from heaven called away Leucius, and he gave up the ghost, (in the year 250.)
          In the Thebaid, the holy martyrs Leonides and his companions, who secured the palm of martyrdom in the time of the Emperor Diocletian.
          At Alexandria, a multitude of holy martyrs, who upon this day were gathered together in a church at Communion, when they were massacred in diverse ways by the followers of the Arian Duke Syrianus, (in the year 376.) Likewise at Alexandria, the holy Confessor Cyril, Pope of that city a most eminent champion of the Catholic faith, and illustrious for his teaching and holiness, who fell asleep in peace, (in the year 444.) whose feast we keep upon the 9th day of February.
          At Zaragoza, (in the year 315,) holy Valerius, Bishop of that city.
          At Cuenca, in Spain, holy Julian, Bishop of that city, who gave the goods of his Church to the poor, and sought his food by working with his own hands after the manner of the Apostles, and fell asleep in peace, famous for miracles, (in the year 1207.) In the monastery of Rheims, (in the year 545,) the holy Priest John, a man of God.
          In Palestine, (in the sixth century,) the holy Hermit James, who, having fallen away, hid himself for a long time in a sepulchre to do penance, and passed away hence to be ever with the Lord, famous for miracles.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Februárii

          Sancti Petri Nolásci Confessóris, qui Ordinis beátæ Maríæ de Mercéde redemptiónis captivórum éxstitit Fundátor, et octávo Kaléndas Ianuárii obdormívit in Dómino.
          Romæ sanctæ Agnétis, Vírginis et Mártyris, secúndo.
          Alexandríæ natális sancti Cyrílli, eiúsdem urbis Epíscopi, Confessóris et Ecclésiæ Doctóris; qui, cathólicæ fídei præclaríssimus propugnátor, doctrína et sanctitáte illústris quiévit in pace. Eius tamen festívitas quinto Idus Februárii celebrátur.
          Romæ sancti Flaviáni Mártyris, qui sub Diocletiáno passus est.
          Alexandríæ pássio plurimórum sanctórum Mártyrum, qui, hac ipsa die, a factióne Syriáni, Ducis Ariáni, dum in Ecclésia synáxim ágerent, divérso mortis génere sunt interémpti.
          Apollóniæ sanctórum Mártyrum Leúcii, Thyrsi et Calliníci; qui, témpore Décii Imperatóris, váriis tormentórum genéribus cruciáti, ac primus et últimus abscissióne cápitis, médius cælésti voce evocátus spíritum reddens, martýrium consummárunt.
          In Thebáide sanctórum Mártyrum Leónidæ et Sociórum, qui, témpore Diocletiáni, palmam martýrii sunt assecúti.
          Cæsaraugústæ, in Hispánia, sancti Valérii Epíscopi.
          Conchæ, in Hispánia, natális sancti Iuliáni Epíscopi, qui, érogans in páuperes bona Ecclésiæ, ópera mánuum sibi more Apostólico victum quærens, clarus miráculis quiévit in pace.
          In monastério Reomaénsi, in Gállia, deposítio sancti Ioánnis Presbýteri, viri Deo devóti.
          In Palæstína sancti Iacóbi Eremítæ, qui, post lapsum, diu, pæniténtiæ causa, in sepúlcro látuit, et clarus miráculis migrávit ad Dóminum.
      en2:
      - type: text
        text: |-
          The Twenty-eighth of January
      
          Saint Peter Nolasco, Confessor, who was the Founder of the Order of the Blessed Mary of Mercy for the ransom of captives, and fell asleep in the Lord on the twenty-fifth of December.
          At Rome, Saint Agnes, Virgin and Martyr, for the second time.
          At Alexandria, the birth of Saint Cyril, Bishop of the same city, Confessor and Doctor of the Church; who, the most illustrious defender of the Catholic faith, renowned for learning and holiness, rested in peace. However, his feast is celebrated on the ninth of February.
          At Rome, Saint Flavian, Martyr, who suffered under Diocletian.
          At Alexandria, the passion of very many holy Martyrs, who, on this very day, by the faction of Syrianus, an Arian general, while they were holding a synaxis in the Church, were slain by various kinds of death.
          At Apollonia, the holy Martyrs Leucius, Thyrsus, and Callinicus; who, in the time of the Emperor Decius, tortured with various kinds of torments, and the first and last beheaded, the middle one giving up his spirit at a heavenly voice, completed their martyrdom.
          In the Thebaid, the holy Martyrs Leonidas and his Companions, who, in the time of Diocletian, obtained the palm of martyrdom.
          At Saragossa, in Spain, Saint Valerius, Bishop.
          At Cuenca, in Spain, the birth of Saint Julian, Bishop, who, distributing the goods of the Church among the poor, seeking his food by the work of his hands after the apostolic manner, rested in peace renowned for miracles.
          In the monastery of Reomé, in France, the deposition of Saint John, Priest, a man devoted to God.
          In Palestine, Saint James, Hermit, who, after a fall, lay hidden for a long time in a tomb as penance, and, renowned for miracles, departed to the Lord.
  psalm.quinto-kal-ndas-i-lii-e9cd42edf4:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 27th day of June, were born into the better life:

          In Galatia, holy Crescens, the disciple of the blessed Apostle Paul. He made a journey into Gaul, where by the word of his preaching he brought many to believe in Christ. Then he returned home, where he was specially appointed Bishop till the end of his life. He strengthened the Galatians in the work of the Lord, and at last finished his testimony under Trajan.
          At Cordova, [in the fourth century,] the holy martyrs Zoilus and nineteen others.
          At Caesarea, in Palestine, the holy martyr Anectus. In the persecution under Diocletian he exhorted others to martyrdom, and by his prayers caused the idols to fall down wherefore the President Urban caused him to be beaten by ten soldiers, and his hands and feet, and lastly his head, cut off, and so he received the crown of martyrdom.
          At Constantinople, [in the sixth century,] the holy Priest Samson, the harbourer of the poor.
          In the country of Tours, [in the sixth century,] the holy Priest and Confessor John.
          At Varadin, in Hungary, [in the year 1095,] holy King Ladislaw, who is famous for eminent miracles even unto the present day.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Iúlii

          In Galátia sancti Crescéntis, qui fuit beáti Pauli Apóstoli discípulus. Hic, in Gállias tránsitum fáciens, verbo prædicatiónis multos ad fidem Christi convértit; regréssus vero ad gentem cui speciáliter datus erat Epíscopus, demum, sub Traiáno, cum Gálatas ipsos usque ad finem vitæ suæ in ópere Dómini confirmásset, martýrium consummávit.
          Córdubæ, in Hispánia, sanctórum Mártyrum Zóili, et aliórum decem et novem.
          Cæsaréæ, in Palæstína, sancti Anécti Mártyris, qui, in persecutióne Diocletiáni, sub Urbáno Prǽside, cum álios ad martýrium hortátus esset et idóla oratióne sua prostrásset, a decem milítibus verberári iussus est; ac tandem, mánibus pedibúsque præcísis, truncátus cápite, martýrii corónam accépit.
          Constantinópoli sancti Sampsónis Presbýteri, páuperum exceptóris.
          In castro Cainóne, in Gállia, sancti Ioánnis, Presbýteri et Confessóris.
          Varadíni, in Hungária, sancti Ladislái Regis, qui claríssimis miráculis usque ad diem hodiérnum corúscat.
      en2:
      - type: text
        text: |-
          The Twenty-seventh of June
      
          In Galatia, Saint Crescens, who was a disciple of the blessed Apostle Paul. He, passing through the Gauls, converted many to the faith of Christ by the word of preaching; returning to the people for whom he had been specially given as Bishop, at last, under Trajan, having confirmed the Galatians themselves in the Lord's work to the end of his life, he completed his martyrdom.
          At Córdoba, in Spain, the holy Martyrs Zoilus and nineteen others.
          At Caesarea, in Palestine, Saint Anectus, Martyr, who, in the persecution of Diocletian, under the Governor Urbanus, when he had exhorted others to martyrdom and had cast down idols by his prayer, was ordered to be beaten by ten soldiers; and at last, with his hands and feet cut off and beheaded, received the crown of martyrdom.
          At Constantinople, Saint Sampson, Priest, who welcomed the poor.
          In the castle of Chanon, in France, Saint John, Priest and Confessor.
          At Nagyvárad, in Hungary, Saint Ladislas, King, who shines even to this day with most illustrious miracles.
  psalm.quinto-kal-ndas-i-nii-dea81e0abb:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the blessed Pope Gregory VII, a right stout champion and defender of the freedom of the Church, of whom mention is made upon, the 25th day of this present month of May.
          Upon the same 28th day of May, were born into the better life:

          In Sardinia, the holy martyrs Emilius, Felix, Priam, and Lucian, who contended for Christ, and were crowned.
          At Chartres, in Gaul, the holy martyr Caraunus, who received martyrdom by being beheaded, under the Emperor Domitian.
          At Corinth, the holy martyr Helconides. She was first tried with many torments, under the President Perennius, in the time of the Emperor Gordian then was tortured again under the next President Justinus, but was delivered by an Angel. At length her breasts were cut off and she was thrown to wild beasts, and tried with fire, and thereafter finished her testimony by being beheaded.
          Also the holy martyrs Crescens, Dioscorides, Paul, and Helladius.
          At Tekoah, in Palestine, the holy martyrs, monks, who were massacred by the Saracens in the time of the Emperor Theodosius the Younger. Their sacred remains were gathered together by the country-folk, who treated them with great reverence.
          At Paris, [in the sixth century,] the holy Confessor Germanus, Bishop [of that see.] How saintly he was, how worthy, with what wondrous works he shone, hath been written by Fortunatus, Bishop [of Poitiers.]
          At Milan, [in the fifth century,] the holy Senator, Bishop [of that see,] very famous for his graces and learning.
          At Urgel, in Spain, [in the sixth century,] the holy Justus, Bishop [of that see.]
          At Florence, [in the year 1002,] the holy Confessor Podius, Bishop [of that see.]
      la:
      - type: text
        text: |-
          Quinto Kaléndas Iúnii

          Sancti Augustíni, Epíscopi Cantuariénsis et Confessóris, cuius dies natális ágitur séptimo Kaléndas Iúnii.
          In Sardínia sanctórum Mártyrum Æmílii, Felícis, Príami et Luciáni, qui, pro Christo certántes, ab eo glorióse coronáti sunt.
          Carnóti, in Gállia, sancti Caráuni Mártyris, qui sub Domitiáno Imperatóre, cápite amputátus, martýrium sumpsit.
          Item pássio sanctórum Crescéntis, Dioscóridis, Pauli et Helládii.
          Thécuæ, in Palæstína, sanctórum Monachórum Mártyrum, qui, témpore Theodósii iunióris, a Saracénis occísi sunt, quorum sacras relíquias collegérunt áccolæ, et summa veneratióne illas habuérunt.
          Corínthi sanctæ Helicónidis Mártyris, témpore Gordiáni Imperatóris. Hæc primum, sub Perénnio Prǽside, multis torméntis afflícta; deínde, sub eius successóre Iustíno, íterum cruciáta, sed ab Angelis liberáta est; demum, disséctis mammis, ferísque obiécta atque igne probáta, cápitis obtruncatióne martýrium complévit.
          Lutétiæ Parisiórum sancti Germáni, Epíscopi et Confessóris; qui quantæ sanctitátis quantíque fúerit mériti, quibus étiam miráculis clarúerit, litterárum moniméntis Fortunátus Epíscopus consignávit.
          Medioláni sancti Senatóris Epíscopi, virtútibus et eruditióne claríssimi.
          Urgéllæ, in Hispánia Tarraconénsi, sancti Iusti Epíscopi.
          Floréntiæ sancti Pódii, Epíscopi et Confessóris.
          Apud Nováriam sancti Bernárdi a Menthóne Confessóris, qui in monte Iovis, super Alpes, in Valésia, celebérrimum cœnóbium et hospítium exstrúxit, atque a Pio Papa Undécimo, non modo Alpium íncolis vel viatóribus, sed iis étiam qui eárum iuga ascendéndo se exércent, cæléstis Patrónus est attribútus.
      en2:
      - type: text
        text: |-
          The Twenty-eighth of May
      
          Saint Augustine, Bishop of Canterbury and Confessor, whose birth-day is kept on the twenty-sixth of May.
          In Sardinia, the holy Martyrs Aemilius, Felix, Priam, and Lucian, who, contending for Christ, were gloriously crowned by him.
          At Chartres, in France, Saint Carantus, Martyr, who under the Emperor Domitian was beheaded and underwent martyrdom.
          Likewise, the passion of Saints Crescens, Dioscorides, Paul, and Helladius.
          At Tekoa, in Palestine, the holy Martyr Monks, who, in the time of the younger Theodosius, were slain by the Saracens, whose sacred relics the inhabitants gathered and held in the highest veneration.
          At Corinth, Saint Heliconis, Martyr, in the time of the Emperor Gordian. She was first, under the Governor Perennius, afflicted with many torments; then, under his successor Justinus, tortured again, but freed by Angels; finally, with her breasts cut off, exposed to wild beasts and tried by fire, she completed her martyrdom by beheading.
          At Paris, Saint Germanus, Bishop and Confessor; what great holiness, what great merit he possessed, and with what miracles he shone, Bishop Fortunatus recorded in literary monuments.
          At Milan, Saint Senator, Bishop, most renowned for virtues and learning.
          At Urgell, in Tarraconensian Spain, Saint Justus, Bishop.
          At Florence, Saint Podius, Bishop and Confessor.
          Near Novara, Saint Bernard of Menthon, Confessor, who on Mount Jove, over the Alps, in the Valais, built a most celebrated monastery and hospice, and was designated by Pope Pius the Eleventh as the heavenly Patron not only of those who dwell in or travel through the Alps, but also of those who exercise themselves by climbing their peaks.
  psalm.quinto-kal-ndas-ianu-rii-e5c33b0501:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 28th day of December, were born into the better life:

          At Bethlehem of Judah, the holy innocent little children who were slain for Christ's sake by Herod the King.
          At Ancyra, in Galatia, the holy martyrs Eutychius the priest and Domitian the deacon.
          In Africa, the holy martyrs Castor, Victor, and Rogatian.
          At Nicomedia, the holy martyrs, Indes the eunuch, the virgins Domna, Agape, and Theophila, and their companions, who after long contendings by diverse kinds of death gained the crown of martyrdom in the persecution under the Emperor Diocletian.
          At Neo-Caesarea, in Pontus, in the persecution under the Emperor Decius, the holy martyr Troadius. As he was dying, the ghost of holy Gregory the wonder-worker appeared to him and strengthened him to undergo martyrdom.
          At Arabissa, in the lower Armenia, the holy martyr Cassarius, who suffered under the Emperor Galerius Maximian.
          At Lyon, in Gaul, the holy confessor Francis de Sales (1567-1622), Bishop (and Prince) of Geneva, whose name was enrolled among those of the Saints by Pope Alexander VII on account of his burning zeal for the conversion of heretics. His feast is kept by command of the said Pope upon the 29th day of January, being that day whereon his sacred body was brought to Annecy from Lyons. Pope Pius IX, in accordance with a vote of the Congregation of Sacred Rites, declared him a doctor of the universal Church.
          At Rome, the holy priest Domnio.
          In Egypt, the holy monk Theodore (the Sanctified, Abbot from 348, death of St. Pachom of Tabenno, in Egypt. He lived from 314-April 27, 367), a disciple of holy Pachom.
          In the monastery of Lerins the holy monk Anthony, famous for his miracles. A monk of Lerins, which monastery he entered about 523. He died about 525 in the midst of the congregation did the Lord open his mouth, and filled him with the spirit of wisdom and understanding, and clothed him with a robe of glory.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Ianuárii

          In Béthlehem Iudæ natális sanctórum Innocéntium Mártyrum, qui pro Christo ab Heróde Rege interfécti sunt.
          Lugdúni, in Gállia, item natális sancti Francísci Salésii, Epíscopi Gebennénsis et Confessóris; quem, doctrína et flagrantíssimo in converténdis hæréticis zelo præclárum, Alexánder Papa Séptimus in Sanctórum númerum rétulit, et ipsíus festivitátem quarto Kaléndas Februárii, quo die sacrum illíus corpus Lugdúno Annésium, in Sabáudia, fuit translátum, agéndam esse constítuit. Eum Pius Nonus, Póntifex Máximus, Doctórem universális Ecclésiæ declarávit; et Pius Papa Undécimus ómnibus Scriptóribus cathólicis, qui diáriis aliísve scriptis in vulgus edéndis Christiánam sapiéntiam illústrant ac próvehunt et tuéntur, cæléstem Patrónum dedit seu confirmávit.
          Ancýræ, in Galátia, sanctórum Mártyrum Eutýchii Presbýteri, et Domitiáni Diáconi.
          In Africa natális sanctórum Mártyrum Castóris, Victóris et Rogatiáni.
          Nicomedíæ sanctórum Mártyrum Indis eunúchi, Domnæ et Agapis ac Theóphilæ Vírginum, et Sociórum; qui, in persecutióne Diocletiáni, post longa certámina, divérso mortis génere corónam martýrii sunt assecúti.
          Neocæsaréæ, in Ponto, sancti Troádii Mártyris, in persecutióne Décii; cui quidem Troádio agonizánti sanctus Gregórius Thaumatúrgus in spíritu ádfuit, eúmque ad subeúndum martýrium roborávit.
          Arabíssi, in Arménia inferióre, sancti Cæsárii Mártyris, qui sub Galério Maximiáno passus est.
          Romæ sancti Domniónis Presbýteri.
          In monastério Lirinénsi, in Gállia, sancti Antónii Mónachi, miráculis clari.
      en2:
      - type: text
        text: |-
          The Twenty-eighth of December
      
          At Bethlehem in Judea, the birth of the holy Innocents, Martyrs, who were slain for Christ by King Herod.
          At Lyons, in France, likewise the birth of Saint Francis de Sales, Bishop of Geneva and Confessor; who, renowned for learning and his most fervent zeal in converting heretics, was enrolled among the Saints by Pope Alexander the Seventh, who appointed his feast to be kept on the twenty-ninth of January, the day on which his sacred body was translated from Lyons to Annecy, in Savoy. Pope Pius the Ninth, Supreme Pontiff, declared him a Doctor of the universal Church; and Pope Pius the Eleventh gave or confirmed him as heavenly Patron to all Catholic writers who illustrate, advance, and defend Christian wisdom through diaries and other writings published for the general public.
          At Ancyra, in Galatia, the holy Martyrs Eutychius, Priest, and Domitian, Deacon.
          In Africa, the birth of the holy Martyrs Castor, Victor, and Rogation.
          At Nicomedia, the holy Martyrs Indis the eunuch, Domna, Agape, and Theophila, Virgins, and their Companions; who, in the persecution of Diocletian, after long contests, obtained the crown of martyrdom by various kinds of death.
          At Neocaesarea, in Pontus, Saint Troadius, Martyr, in the persecution of Decius; to this Troadius, as he was engaged in combat, Saint Gregory the Wonderworker was present in spirit and strengthened him to undergo martyrdom.
          At Arabissus, in lower Armenia, Saint Caesarius, Martyr, who suffered under Galerius Maximianus.
          At Rome, Saint Domnius, Priest.
          In the monastery of Lérins, in France, Saint Anthony, Monk, renowned for miracles.
  psalm.quinto-kal-ndas-m-rtii-508b2bae2c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 25th day of February, were born into the better life:

          In Egypt, [in the third century,] under the Emperor Numerian, the holy martyrs Victorinus, Victor, Nicephorus, Claudian, Dioscorus, Serapion, and Papias. Victorinus and Victor steadfastly bore grievous tortures on account of their confession of the faith, and were beheaded.
          Nicephorus was laid upon a hot iron bed, and when he had overcome the fire was cut joint from joint. Claudian and Dioscorus were burnt. Serapion and Papias were slain with the sword.
          In Africa, the holy martyrs Donatus, Justus, Herenas, and their Companions.
          At Rome, [in the year 492,] the holy Pope Felix III, who was the great-grandfather of holy Gregory the Great, who saith of him that he appeared unto his holy niece Tharsilla, and called her unto the kingdom of heaven.
          At Constantinople, [in the year 806,] holy Tharasius, Patriarch of that see, famous for his learning and godliness. There remaineth an epistle addressed unto him by Pope Adrian I in defence of holy images.
          At Nazianzum, [in 369,] holy Caesarius, brother of blessed Gregory the Theologian, whom the aforementioned Gregory doth testify that he saw among the multitude of the blessed.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Mártii

          In Ægýpto natális sanctórum Mártyrum Victoríni, Victóris, Nicéphori, Claudiáni, Dióscori, Serapiónis et Pápiæ, sub Numeriáno Imperatóre. Horum duo primi, pro confessióne fídei, exquisíta suppliciórum génera constánter passi, cápite plectúntur; Nicéphorus, post cratículas candéntes ignésque superátos, minutátim concísus est; Claudiánus et Dióscorus flammis incénsi; Serápion vero et Pápias gládio cæsi sunt.
          In Africa sanctórum Mártyrum Donáti, Iusti, Herénæ et Sociórum.
          Constantinópoli sancti Tharásii Epíscopi, eruditióne et pietáte insígnis; ad quem exstat Hadriáni Papæ Primi epístola pro defensióne sanctárum Imáginum.
          Naziánzi, in Cappadócia, sancti Cæsárii, qui beátæ Nonnæ fílius ac beatórum Gregórii Theólogi et Gorgóniæ fuit frater, et quem idem Gregórius inter ágmina beatórum se vidísse testátur.
          In monastério Heidenhémii, diœcésis Eystetténsis, in Germánia, sanctæ Walbúrgæ Vírginis, quæ fuit fília sancti Richárdi, Anglórum Regis, et soror sancti Willebáldi, Eystetténsis Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-fifth of February
      
          In Egypt, the birth of the holy Martyrs Victorinus, Victor, Nicephorus, Claudianus, Dioscorus, Serapion, and Papias, under the Emperor Numerian. Of these, the first two, for confessing the faith, endured exquisite kinds of torments steadfastly and were beheaded; Nicephorus, after surviving red-hot gridirons and fires, was cut into small pieces; Claudianus and Dioscorus were burned in flames; but Serapion and Papias were slain with the sword.
          In Africa, the holy Martyrs Donatus, Justus, Herena, and their Companions.
          At Constantinople, Saint Tarasius, Bishop, renowned for learning and piety; to whom exists an epistle of Pope Hadrian the First in defense of holy Images.
          At Nazianzus, in Cappadocia, Saint Caesarius, who was the son of blessed Nonna and the brother of blessed Gregory the Theologian and Gorgonia, and whom Gregory himself testifies to have seen in the ranks of the blessed.
          In the monastery of Heidenheim, in the Diocese of Eichstätt, in Germany, Saint Walburga, Virgin, who was the daughter of Saint Richard, King of the English, and the sister of Saint Willibald, Bishop of Eichstätt.
  psalm.quinto-kal-ndas-maii-c05da251d4:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 27th day of April, were born into the better life:

          We keep the feast of the holy Priest and monk Egbert, a man of marvellous lowliness and self-denial, of whom mention has been made upon the 24th day of this present month of April.
          At Nicomedia, the holy martyr Anthimus, Bishop of that see, who was beheaded for confessing Christ, in the persecution under the Emperor Diocletian, and so gained the glory of martyrdom. He was followed by almost all his flock, whereof by command of the judge some were slain with the sword, some burnt in fire, and some embarked upon ships and drowned in the sea.
          At Tarsus, in Cilicia, the holy martyrs Castor and Stephen. [St. Stephen was perhaps a Bishop.]
          At Rome, blessed Pope Anastasius [I, in the year 401,] a man very rich in poverty and apostolic care, of whom St. Jerome writeth that Rome deserved not long to have him, lest the head of the world should be cut off under such a Bishop, since no long while after his death Rome was taken and sacked by the Goths.
          At Bologna, [in the sixth century,] the holy Confessor Tertullian, Bishop of that see.
          At Brescia, [in the fifth century,] holy Theophilus, Bishop of that see.
          At Constantinople, the holy Abbot John, [of the monastery of Cathares Hegumenos,] who contended much for the honouring of holy images under the Emperor Leo the Isaurian, [in the year 813, under Leo the Armenian. Leo the Isaurian reigned from 717-741.]
          At Taragona, the blessed Peter Armengal, of the Order of the Blessed Virgin Mary of Ransom for the Redemption of Captives. He suffered many things for the redemption of the faithful in Africa, and at length died a blessed death in the convent of St.-Mary-of-the-Meadows, [in the year 1304.]
          At Lucca, in Italy, [in the year 1278,] the blessed Virgin Zita, very famous for her graces and miracles.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Maii

          Sancti Petri Canísii, Sacerdótis e Societáte Iesu et Confessóris atque Ecclésiæ Doctóris; qui duodécimo Kaléndas Ianuárii migrávit ad Dóminum.
          Nicomedíæ natális sancti Anthimi, Epíscopi et Mártyris; qui in persecutióne Diocletiáni, ob confessiónem Christi, martýrii glóriam obtruncatióne cápitis accépit. Secúta est quoque illum univérsa ferme gregis sui multitúdo; quorum álios Iudex gládio obtruncári, álios conflagrári ígnibus, álios, navículis impósitos, pélago immérgi fecit.
          Tarsi, in Cilícia, sanctórum Castóris et Stéphani Mártyrum.
          Bonóniæ sancti Tertulliáni, Epíscopi et Confessóris.
          Bríxiæ sancti Theóphili Epíscopi.
          In Ægýpto sancti Theodóri Abbátis, qui fuit discípulus sancti Pachómii.
          Constantinópoli sancti Ioánnis Abbátis, qui pro cultu sacrárum Imáginum, sub Leóne Isáurico, plúrimum decertávit.
          Tarracóne, in Hispánia, beáti Petri Armengáudii, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum; qui, multa pro fidélibus rediméndis in Africa passus, tandem, in convéntu sanctæ Maríæ Pratórum, beáto fine quiévit.
          Lucæ, in Túscia, beátæ Zitæ Vírginis, virtútum et miraculórum fama conspícuæ.
      en2:
      - type: text
        text: |-
          The Twenty-seventh of April
      
          Saint Peter Canisius, Priest of the Society of Jesus and Confessor and Doctor of the Church; who departed to the Lord on the twenty-first of December.
          At Nicomedia, the birth of Saint Anthimus, Bishop and Martyr; who in the persecution of Diocletian, for confessing Christ, received the glory of martyrdom by beheading. Almost the entire multitude of his flock also followed him; of whom the judge ordered some to be beheaded, others to be burned in fires, others, put on small boats, to be drowned in the sea.
          At Tarsus, in Cilicia, the holy Martyrs Castor and Stephen.
          At Bologna, Saint Tertullianus, Bishop and Confessor.
          At Brescia, Saint Theophilus, Bishop.
          In Egypt, Saint Theodore, Abbot, who was a disciple of Saint Pachomius.
          At Constantinople, Saint John, Abbot, who for the cult of sacred Images, under Leo the Isaurian, contended very greatly.
          At Tarragona, in Spain, blessed Peter Armengaudius, of the Order of the Blessed Mary of Mercy for the ransom of captives; who, having suffered much in Africa for the redemption of the faithful, at last rested in a blessed death in the convent of Saint Mary of the Meadows.
          At Lucca, in Tuscany, blessed Zita, Virgin, renowned for the fame of her virtues and miracles.
  psalm.quinto-kal-ndas-nov-mbris-41c0dc9c39:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 28th day of October, were born into the better life:

          The blessed Apostles Simon the Canaanite and Thaddeus, who also is called Jude. Simon preached the Gospel in Egypt, and Thaddeus in Mesopotamia, afterward they both came into Persia, and when they had brought into the obedience of Christ a countless multitude of that people, they finished their course by martyrdom.
          At Rome, the holy Virgin Cyrilla, daughter of holy Tryphonia. She was killed for Christ's sake, under the Emperor Claudius.
          Likewise at Rome, in the persecution under the Emperor Valerian, the holy martyrs the Virgin Anastasia the elder and Cyril. Anastasia was thrown into chains under the Prefect Probus, buffeted, and tormented with fire and stripes, and, forasmuch as she remained unshaken in confessing Christ, her breasts were cut off, her nails torn out, her teeth broken, and her hands and feet, and lastly her head, cut off; and gloriously prepared by all these sufferings she passed away as a bride adorned for her husband. As for Cyril, when Anastasia asked for a drink of water, he gave it to her, and for this he was rewarded by suffering death as a martyr.
          At Como, under the Emperor Maximian, the holy martyr Faithful.
          At Mainz, the holy martyr Ferrutius.
          At Meaux, (toward the end of the seventh century,) the holy Confessor Faro, Bishop (of that see.)
          At Naples, holy Gaudiosus, Bishop (of Abitina,) in Africa, who came to Campagna on account of the persecution by the Vandals, and died an holy death in a monastery in the city above named.
          At Vercelli, (at the beginning of the fifth century,) holy Honoratus, Bishop (of that see.)
      la:
      - type: text
        text: |-
          Quinto Kaléndas Novémbris

          In Pérside natális beatórum Apostolórum Simónis Chananǽi, et Thaddǽi, qui et Iudas dícitur. Ex ipsis autem Simon in Ægýpto, Thaddǽus in Mesopotámia Evangélium prædicávit; deínde, in Pérsidem simul ingréssi, ibi, cum innúmeram gentis illíus multitúdinem Christo subdidíssent, martýrium consummárunt.
          Romæ sanctórum Mártyrum Anastásiæ senióris Vírginis, et Cyrílli. Ipsa Virgo, in persecutióne Valeriáni, sub Probo Præfécto, vínculis constrícta, cólaphis cæsa, igne et verbéribus est cruciáta, et, cum in confessióne Christi permanéret immóbilis, tandem, abscíssis mamíllis, evúlsis únguibus, déntibus comminútis, mánibus pedibúsque præcísis, truncáta cápite, tot passiónum ornáta monílibus migrávit ad Sponsum; Cyríllus autem, ei peténti aquam propínans, martýrium pro mercéde accépit.
          Item Romæ sanctæ Cyríllæ Vírginis, quæ fília éxstitit sanctæ Tryphóniæ, et, sub Cláudio Príncipe, pro Christo iuguláta est.
          Apud Comum sancti Fidélis Mártyris, sub Maximiáno Imperatóre.
          Mogúntiæ sancti Ferrútii Mártyris.
          Meldis, in Gállia, sancti Farónis, Epíscopi et Confessóris.
          Vercéllis sancti Honoráti Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-eighth of October
      
          In Persia, the birth of the blessed Apostles Simon the Canaanite and Thaddaeus, who is also called Jude. Of these, Simon preached the Gospel in Egypt and Thaddaeus in Mesopotamia; then, entering Persia together, there, having subjected an innumerable multitude of that nation to Christ, they completed their martyrdom.
          At Rome, the holy Martyrs Anastasia the elder, Virgin, and Cyrillus. The Virgin, in the persecution of Valerian, under the Prefect Probus, was bound in chains, beaten with blows, tortured with fire and rods, and, remaining immovable in the confession of Christ, at last, with her breasts cut off, her nails torn out, her teeth knocked out, and her hands and feet cut off, was beheaded, and adorned with so many ornaments of passion, she passed to her Spouse; but Cyrillus, offering water to her at her request, received martyrdom as his reward.
          Likewise at Rome, Saint Cyrilla, Virgin, who was the daughter of Saint Tryphonia, and under the Emperor Claudius was slaughtered for Christ.
          Near Como, Saint Fidelis, Martyr, under the Emperor Maximian.
          At Mainz, Saint Ferruccius, Martyr.
          At Meaux, in France, Saint Faro, Bishop and Confessor.
          At Vercelli, Saint Honoratus, Bishop.
  psalm.quinto-kal-ndas-oct-bris-007876d56a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 27th day of September, were born into the better life:

          At Aegae, in Cilicia, the holy brethren Cosmas and Damian, both martyrs. They were beheaded in the persecution under the Emperor Diocletian, after they had suffered many torments, bonds, and imprisonment, and after God had enabled them to overcome, in the sea and in the fire, crucifixion, stoning, and arrows. Along with them it is stated that there suffered also three more, who were brethren unto them, namely Anthimus, Leontius, and Euprepius.
          At Rome, the holy Epicharis, a woman of senatorial rank, who, in the same persecution, was beaten with scourges loaded with lead, and then beheaded.
          At Todi, under the same Emperor Diocletian, the holy martyrs Fidentius and Terence.
          At Cordova, (in the ninth century,) the holy brethren Adolph and John, both martyrs, who were crowned for Christ's sake in the persecution under the Arabs.
          At Semont, in Gaul, (in the third century,) the holy martyr Florentine, who had his tongue cut out, and was then beheaded, along with the blessed Hilary.
          At Byblos, in Phoenicia, the holy Mark, Bishop (of that see,) who is called by the blessed Evangelist Luke, (in the Acts of the Apostles,) "John, whose surname was Mark."
          At Milan, holy Caius, Bishop (of that see,) a disciple of the blessed Apostle Barnabas, who suffered much in the persecution under the Emperor Nero, but fell asleep at last in peace.
          At Ravenna, (in the second century,) the holy Confessor Aderitus, Bishop (of that see.)
          At Paris, (in the year 1660,) the holy Priest Vincent of Paul, Founder of the Congregation of the Mission, and of the Sisters of Charity. A man of apostolic spirit, and a father to the poor; whose feast is kept upon the 19th day of July.
          At Paris also, (in the year 1325,) the holy Eleazar (de Sabran,) Earl (of Ariano.)
          In Hainaut, (toward the end of the eighth century,) the holy virgin Hiltrude.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Octóbris

          Ægéæ natális sanctórum Mártyrum Cosmæ et Damiáni fratrum, qui, in persecutióne Diocletiáni, post multa torménta, víncula et cárceres, post mare et ignes, cruces, lapidatiónem et sagíttas divínitus superátas, cápite plectúntur; cum quibus étiam referúntur passi tres eórum fratres germáni, id est Anthimus, Leóntius et Euprépius.
          Lutétiæ Parisiórum item natális sancti Vincéntii a Paulo, Presbýteri et Confessóris, Congregatiónis Presbyterórum Missiónis et Puellárum Caritátis Fundatóris, viri apostólici et páuperum patris; quem Leo Décimus tértius, Póntifex Máximus, ómnium Societátum caritátis, in toto cathólico Orbe exsisténtium et ab eódem Sancto quomodólibet promanántium, cæléstem Patrónum apud Deum constítuit. Ipsíus tamen festívitas quartodécimo Kaléndas Augústi celebrátur.
          Bybli, in Phœnícia, sancti Marci Epíscopi, qui et Ioánnes a beáto Luca nominátur, atque fílius éxstitit illíus beátæ Maríæ, cuius memória tértio Kaléndas Iúlii recensétur.
          Medioláni sancti Caii Epíscopi, qui fuit discípulus beáti Bárnabæ Apóstoli; et, multa in Nerónis persecutióne passus, quiévit in pace.
          Romæ sanctæ Epicháridis, mulíeris Senatóriæ, quæ, in eádem Diocletiáni persecutióne, plumbátis cæsa est atque gládio percússa.
          Tudérti, in Umbria, sanctórum Mártyrum Fidéntii et Teréntii, sub eódem Diocletiáno.
          Córdubæ, in Hispánia, sanctórum Mártyrum Adúlphi et Ioánnis fratrum, qui, in persecutióne Arábica, pro Christo coronáti sunt; eorúmque animáta exémplo beáta Virgo Aurea, ipsorum soror, ad fidem redúcta, et ipsa póstmodum martýrium fórtiter súbiit quartodécimo Kaléndas Augústi.
          Sedúni, in Gállia, sancti Florentíni Mártyris, qui, una cum beáto Hilário, post abscissiónem linguæ, iussus est gládio feríri.
          Ravénnæ sancti Aderíti, Epíscopi et Confessóris.
          Lutétiæ Parisiórum sancti Elzeárii Cómitis.
          In Hannónia sanctæ Hiltrúdis Vírginis.
      en2:
      - type: text
        text: |-
          The Twenty-seventh of September
      
          At Aegeae, the birth of the holy Martyrs Cosmas and Damian, brothers, who, in the persecution of Diocletian, after many torments, bonds and prisons, after sea and fires, crosses, stonings, and arrows overcome by divine power, were beheaded; and with them are also recorded as having suffered three of their own brothers, namely Anthimus, Leontius, and Euprepius.
          At Paris, likewise the birth of Saint Vincent de Paul, Priest and Confessor, Founder of the Congregation of Priests of the Mission and of the Daughters of Charity, an apostolic man and father of the poor; whom Pope Leo the Thirteenth, Supreme Pontiff, constituted before God the heavenly Patron of all Societies of charity existing in the whole Catholic world and in any way deriving from the same Saint. However, his feast is celebrated on the nineteenth of July.
          At Byblos, in Phoenicia, Saint Mark, Bishop, who is also called John by blessed Luke, and was the son of that blessed Mary whose memory is recalled on the twenty-ninth of June.
          At Milan, Saint Caius, Bishop, who was a disciple of blessed Barnabas the Apostle; and, having suffered much in the persecution of Nero, rested in peace.
          At Rome, Saint Epicharis, a senatorial woman, who, in the same persecution of Diocletian, was beaten with leaded thongs and pierced with a sword.
          At Todi, in Umbria, the holy Martyrs Fidentius and Terentius, under the same Diocletian.
          At Córdoba, in Spain, the holy Martyrs Adolphus and John, brothers, who, in the Arabian persecution, were crowned for Christ; and their sister, the blessed Virgin Aurea, animated by their example, was led back to the faith, and afterwards herself bravely underwent martyrdom on the nineteenth of July.
          At Sitten, in France, Saint Florentinus, Martyr, who, together with blessed Hilarius, after the cutting out of his tongue, was ordered to be struck with a sword.
          At Ravenna, Saint Adeodatus, Bishop and Confessor.
          At Paris, Saint Elzear, Count.
          In Hainaut, Saint Hiltrude, Virgin.
  psalm.quinto-kal-ndas-sept-mbris-ddf83626cd:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 28th day of August, were born into the better life:

          At Hippo, in Africa, [in the year 430,] the holy Augustine, Bishop of that city, the eminent Doctor of the Church. He was converted to the Catholic faith, and baptized by blessed Bishop Ambrose. He was the stalwart defender of the faith against the Manicheans and other heretics, and, after manifold toil for the Church of God, he passed away to be rewarded in heaven. His body was first brought from his own city to Sardinia, on account of the barbarians, and afterwards by Luitprand, King of the Lombards, -to Pavia, where it is honourably buried.
          At Rome, [in the year 116 or 132,] the holy martyr Hermes, a man of illustrious worldly station, who, as is written in the acts of the blessed Pope Alexander, was first committed to prison, and then slain with the sword along with many others, under the judge Aurelian.
          At Brioude, in Auvergne, the holy martyr Julian he was a comrade of the blessed Tribune Ferreolus, and secretly served Christ as a soldier but in the persecution under the Emperor Diocletian he was tried by the other soldiers, who horribly murdered him by cutting his throat.
          At Constance, the holy martyr Pelagius, who received his crown under the Emperor Numerian and the judge Evilasius.
          At Salerno, the holy martyrs Fortunatus, Caius, and Anthes, who were beheaded under the Emperor Diocletian and the Proconsul Leontius.
          At Constantinople, [in the year 340,] holy Alexander, [Arch-] Bishop [of that see,] that glorious old man by the power of whose prayer the judgement of God smote Arius so that he burst asunder in the midst, and all his bowels gushed out.
          In Saintes, [about the year 450,] the holy Confessor Vivian, Bishop [of that see.]
          Also, [about the year 395,] holy Moses the Ethiopian, who from a famous robber became a famous Hermit, converted many other robbers, and took them with him to his monastery.
      la:
      - type: text
        text: |-
          Quinto Kaléndas Septémbris

          Hippóne Régio, in Africa, natális sancti Augustíni Epíscopi, Confessóris et Ecclésiæ Doctóris exímii, qui, beáti Ambrósii Epíscopi ópera ad cathólicam fidem convérsus et baptizátus, eam advérsus Manichǽos aliósque hæréticos acérrimus propugnátor deféndit, multísque áliis pro Ecclésia Dei perfúnctus labóribus, ad prǽmia migrávit in cælum. Eius relíquiæ, primo de sua civitáte propter bárbaros in Sardíniam advéctæ, et póstea a Rege Longobardórum Luitprándo Papíam translátæ, ibi honorífice cónditæ sunt.
          Romæ item natális sancti Hermétis, viri illústris, qui (ut in Actis beáti Alexándri Papæ légitur), prius carceráli custódiæ mancipátus, deínde, cum áliis plúrimis, gládio cædénte, martýrium complévit, sub Aureliáno Iúdice.
          Venúsiæ, in Apúlia, pássio sanctórum Septimíni, Ianuárii et Felícis, qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, iussi sunt decollári. Ipsórum tamen ac reliquórum ex duódecim frátribus festívitas agitur Kaléndis Septémbris.
          Briváte, apud Arvérnos, item pássio sancti Iuliáni Mártyris, qui, cum esset beáti Ferréoli Tribúni comes et in hábitu militári occúlte Christo servíret, in persecutióne Diocletiáni, a milítibus tentus est, et, desécto gútture, morte horríbili necátus.
          Constántiæ, in Germánia, sancti Pelágii Mártyris, qui sub Numeriáno Imperatóre et Evilásio Iúdice, cápite amputátus, martýrii corónam accépit.
          Salérni sanctórum Mártyrum Fortunáti, Caii et Anthis; qui, sub Diocletiáno Imperatóre et Leóntio Procónsule, decolláti sunt.
          Constantinópoli sancti Alexándri Epíscopi, gloriósi senis; ob cuius oratiónem Arius, divíno iudício damnátus, crépuit médius, et effúsa sunt víscera eius.
          Apud Sántonas, in Gállia, sancti Viviáni, Epíscopi et Confessóris.
          Item sancti Móysis Æthíopis, qui, ex insígni latróne insígnis Anachorétæ, multos latrónes convértit et secum duxit ad monastérium.
      en2:
      - type: text
        text: |-
          The Twenty-eighth of August
      
          At Hippo Regius, in Africa, the birth of Saint Augustine, Bishop, Confessor and eminent Doctor of the Church, who, converted to the Catholic faith and baptized through the ministry of Bishop Saint Ambrose, defended it as a most vigorous champion against the Manicheans and other heretics, and, having fulfilled many other labors for the Church of God, passed to his reward in heaven. His relics, first brought from his own city because of the barbarians to Sardinia, were afterwards translated to Pavia by Luitprand, King of the Lombards, and honorably deposited there.
          At Rome, likewise the birth of Saint Hermes, a distinguished man, who (as is read in the Acts of blessed Pope Alexander), first held in prison, was then, together with many others, put to the sword and completed his martyrdom, under the judge Aurelian.
          At Venosa, in Apulia, the passion of Saints Septiminus, Januarius, and Felix, sons of Saints Boniface and Thecla, who were ordered to be beheaded by the judge Valerianus under the Emperor Maximian. Their feast and that of the rest of the twelve brothers is kept on the first of September.
          At Brioude, among the Arverni, likewise the passion of Saint Julian, Martyr, who, being the companion of blessed Ferreolus, Tribune, and serving Christ secretly in military dress, was seized in the persecution of Diocletian by soldiers, and, with his throat cut, was slain in a horrible death.
          At Constance, in Germany, Saint Pelagius, Martyr, who, under the Emperor Numerian and the judge Eulasius, was beheaded and received the crown of martyrdom.
          At Salerno, the holy Martyrs Fortunatus, Caius, and Anthis; who, under the Emperor Diocletian and the proconsul Leontius, were beheaded.
          At Constantinople, Saint Alexander, Bishop, a glorious elder; by whose prayer Arius, condemned by divine judgment, burst open in the middle, and his entrails gushed out.
          At Saintes, in France, Saint Vivianus, Bishop and Confessor.
          Likewise, Saint Moses the Ethiopian, who, from a notorious brigand becoming a distinguished monk, converted many brigands and brought them with him to the monastery.
  psalm.quinto-nonas-i-lii-aecd42d616:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 3rd day of July, were born into the better life:

          At Alexandria, the holy martyrs Tryphon and twelve others.
          At Constantinople, the holy martyrs Eulogios and his Companions, [fourth century.]
          At Caesarea, in Cappadocia, holy Hyacinth, a groom of the bed-chamber to the Emperor Trajan. He was accused of Christianity, variously tormented with stripes, and cast into prison, where he died of hunger.
          At Chiusi, in Tuscany, the holy martyrs Irenaeus, a Deacon, and Mustiola, a matron, who under the Emperor Aurelian were tormented in diverse and terrible ways, and gained a crown of martyrdom.
          Upon the same day, the holy martyrs Marcus and Mucian were slain with the sword for Christ's sake. A child called out to them not to sacrifice to idols, and for this reason was ordered to be whipped, and forasmuch as he continued to confess Christ all the more vehemently, he also was put to death, along with a certain Paul who also had exhorted the martyrs.
          At Laodicea, in Syria, holy Anatolius, Bishop [of that see, in the year 283,] who has left writings which are admired not by devout men only, but by philosophers also.
          At Altino, in Venetia, holy Heliodorus, Bishop [of that see, about the year 390,] famous for his teaching and holiness.
          At Ravenna, the holy Confessor Dathus, Bishop [of that see, in the year 190.]
          At Edessa, in Mesopotamia, is commemorated the translation from India of the body of the holy Apostle Thomas, whose relics have since been brought to Ortona, [in Italy. Henry the Liberal, Count of Champagne, brought one whole rib of St. Thomas from the East. He presented it to the Collegiate Church of St Stephen de Troyes (Aube.)]
      la:
      - type: text
        text: |-
          Quinto Nonas Iúlii

          Sancti Irenǽi, Epíscopi et Mártyris, qui migrávit in cælum quarto Kaléndas Iúlii.
          Clúsii, in Etrúria, sanctórum Mártyrum Irenǽi Diáconi, et Mustíolæ matrónæ; qui sub Aureliáno Imperatóre, divérsis atrocibúsque supplíciis cruciáti, corónam martýrii meruérunt.
          Alexandríæ sanctórum Mártyrum Tryphónis et aliórum duódecim.
          Constantinópoli sanctórum Eulógii et Sociórum Mártyrum.
          Cæsaréæ, in Cappadócia, sancti Hyacínthi, qui Traiáni Imperatóris cubiculárius fuit; et, accusátus quod Christiánus esset, plagis várie afflíctus est, atque, in cárcerem trusus, ibi fame consúmptus exspirávit.
          Eódem die sanctórum Mártyrum Marci et Muciáni, qui pro Christo sunt gládio cæsi. Hos cum puer párvulus, ne immolárent idólis, alta voce monéret, verbéribus iussus est cædi; cumque veheméntius Christum confiterétur, tandem, una cum quodam Paulo, Mártyres exhortánte, necátus est.
          Romæ natális sancti Leónis Secúndi, Papæ et Confessóris, qui primo sui Pontificátus anno, plenus méritis, migrávit in cælum.
          Laodicéæ, in Sýria, sancti Anatólii Epíscopi, qui non solum religiósis viris, sed et philosóphis admiránda scripta relíquit.
          Altíni, in Venetórum fínibus, sancti Heliodóri Epíscopi, doctrína et sanctitáte insígnis.
          Ravénnæ sancti Dathi, Epíscopi et Confessóris.
          Edéssæ, in Mesopotámia, Translátio sancti Thomæ Apóstoli ex India; cuius relíquiæ Ortónam, apud Frentános, póstea translátæ sunt.
      en2:
      - type: text
        text: |-
          The Third of July
      
          Saint Irenaeus, Bishop and Martyr, who passed to heaven on the twenty-eighth of June.
          At Chiusi, in Etruria, the holy Martyrs Irenaeus the Deacon, and Mustiola, a matron; who, under the Emperor Aurelian, tortured with various and atrocious punishments, merited the crown of martyrdom.
          At Alexandria, the holy Martyrs Tryphon and twelve others.
          At Constantinople, the holy Martyrs Eulogius and his Companions.
          At Caesarea, in Cappadocia, Saint Hyacinth, who was the chamberlain of the Emperor Trajan; and, accused of being a Christian, was variously afflicted with blows, and thrust into prison, where he perished of hunger.
          On the same day, the holy Martyrs Mark and Mucianus, who were slain with the sword for Christ. When a small boy urged them loudly not to sacrifice to idols, he was ordered to be beaten; and when he confessed Christ more vehemently, at last he was slain together with a certain Paul who was encouraging the Martyrs.
          At Rome, the birth of Saint Leo the Second, Pope and Confessor, who, in the first year of his Pontificate, departed to heaven full of merits.
          At Laodicea, in Syria, Saint Anatolius, Bishop, who left writings admirable not only to religious men but to philosophers as well.
          At Altinum, on the borders of Venetia, Saint Heliodorus, Bishop, renowned for learning and holiness.
          At Ravenna, Saint Datus, Bishop and Confessor.
          At Edessa, in Mesopotamia, the Translation of Saint Thomas the Apostle from India; whose relics were afterwards translated to Ortona, among the Frentani.
  psalm.quinto-nonas-m-rtii-2604ae269c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Aelred, Abbot of Rievaux, of the Cistercian Order, famous for his knowledge of sacred letters, uprightness of life, self-content, wondrous long-suffering, spirit of prophecy, heavenly conversation, and great miracles, who departed this life upon the 12th day of January.
          Upon the same 3rd day of March, were born into the better life:

          At Caesarea, in Palestine, in the persecution under the Emperor Valerian, the holy martyrs Marinus the soldier and Asterius the senator.
          Marinus was accused by his comrades of being a Christian, and when asked by the judge so declared with a loud voice, and was beheaded.
          Asterius took off his own garment, wrapt in it the headless body of the martyr, and took it upon his own shoulder, and for so doing himself received the honour of martyrdom.
          In Spain, the holy martyrs Hemiterius, [or Madir,] and Chelidonius.
          They were stationed as soldiers in camp at Leon in Galicia, when the storm of persecution broke. On account of their confession of the Name of Christ they were taken to Calaxorra, where they were put to diverse torments and crowned with martyrdom. [Their bodies rest in the Cathedral of Calal they are the patrons.]
          Upon the same day the holy martyrs Felix, Luciolus, Fortunatus, Marcia, and their Companions.
          Likewise the holy soldiers Cleonicus, Eutropius, and Basiliscus, who won a happy triumph upon the cross under the President Asclepiades, in the persecution under the Emperor Maximian.
          At Brescia, [in the year 526,] the holy Confessor Titian, Bishop of that see.
          At Bamberg, holy Cunegunda, Empress of the Romans, bride of the Emperor Henry the First, with whose consent she remained always a Virgin. She fell asleep in peace, richly adorned with good works, and after her death was famous for miracles, [in the year 1040.]
      la:
      - type: text
        text: |-
          Quinto Nonas Mártii

          Cæsaréæ, in Palæstína, sanctórum Mártyrum Maríni mílitis, et Astérii Senatóris, in persecutióne Valeriáni. Horum prior, cum accusátus esset a commilitónibus ut Christiánus, et, interrogátus a Iúdice, se Christiánum esse voce claríssima testarétur, martýrii corónam abscissióne cápitis accépit; cumque Astérius corpus Mártyris, cápite truncátum, subiéctis húmeris et substráta veste, qua induebátur, excíperet, honórem quem Mártyri détulit, contínuo et ipse Martyr accépit.
          Calagúrri, in Hispánia, natális sanctórum Mártyrum Hemitérii et Cheledónii fratrum, qui, cum apud Legiónem, Gallǽciæ urbem, in castris militárent, ambo, exsurgénte persecutiónis procélla, pro confessióne nóminis Christi, Calagúrrim usque profécti, ibi, plúribus torméntis afflícti, martýrio coronáti sunt.
          Eódem die pássio sanctórum Felícis, Lucíoli, Fortunáti, Márciæ et Sociórum.
          Item sanctórum mílitum Cleoníci, Eutrópii et Basilísci, qui, in persecutióne Maximiáni, sub Asclepíade Prǽside, crucis supplício felíciter triumphárunt
          Bríxiæ sancti Titiáni, Epíscopi et Confessóris.
          Bambérgæ sanctæ Cunegúndis Augústæ, quæ, sancto Henríco Primo, Romanórum Imperatóri, nupta, perpétuam virginitátem, ipso annuénte, servávit; ac, bonórum óperum méritis cumuláta, sancto fine quiévit, et post óbitum miráculis cláruit.
      en2:
      - type: text
        text: |-
          The Third of March
      
          At Caesarea, in Palestine, the holy Martyrs Marinus, a soldier, and Asterius, a Senator, in the persecution of Valerian. Of these, the former, when accused by his fellow soldiers as a Christian, and when asked by the judge, declared in a very clear voice that he was a Christian, and received the crown of martyrdom by beheading; and when Asterius received the body of the Martyr, decapitated, on his own shoulders and spread under it the garment he was wearing, he immediately received in return the honor he rendered to the Martyr, and became a Martyr himself.
          At Calahorra, in Spain, the birth of the holy Martyrs Emeterius and Chelidonius, brothers, who, while serving in the army at León, a city of Galicia, both, as the storm of persecution arose, departed as far as Calahorra for confessing the name of Christ, and there, afflicted with many torments, were crowned with martyrdom.
          On the same day, the passion of Saints Felix, Luciolus, Fortunatus, Marcia, and their Companions.
          Likewise, the holy soldier Martyrs Cleonicus, Eutropius, and Basiliscus, who, in the persecution of Maximian, under the Governor Asclepiades, triumphed happily through the punishment of the cross.
          At Brescia, Saint Titianus, Bishop and Confessor.
          At Bamberg, Saint Cunegundis, Empress, who, wedded to the holy Emperor Henry the First of the Romans, preserved perpetual virginity with his consent; and, laden with the merits of good works, rested in a holy death, and after her passing became renowned for miracles.
  psalm.quinto-nonas-maii-a4f83d040d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 3rd day of May

          It is commemorated the finding at Jerusalem in the time of the Emperor Constantine of the Most Holy Cross of the Lord.
          Upon the same day, were born into the better life: At Rome, upon the Nomentan Way, the holy martyrs Pope Alexander I., [in the year 117,] and the priests Eventius and Theodulos. Under the Emperor Hadrian and the judge Aurelian, Alexander suffered chains and imprisonment, racking, tearing with hooks, and fire, and was at length put to death by small stabs over his whole body. Eventius and Theodulos were long imprisoned, then examined under torture by fire, and at last beheaded.
          At Narni, [in the year 376,] the holy Confessor Juvenal, Bishop of that see.
          At Constantinople, [in the year 313,] the holy martyrs Alexander the Soldier, and Antonina the Virgin. In the persecution under the Emperor Maximian the President Festus condemned her to a brothel Alexander awaited her there, changed clothes with her, and so enabled her to escape. For this reason they were put to the torture together, and when both had had their hands cut off, they were together cast into the fire for Christ's sake, and having so finished together their noble contending, were crowned together.
          In the Thebaid, [about the year 286,] the holy martyrs Timothy and Myra his wife. The Prefect Arian, after putting them to diverse torments, ordered them to be crucified together. They hung upon the cross alive for nine days, the one strengthening the other in the faith, and so together at last finished their testimony.
          At Aphrodisia, in Karia, [in the fourth century,] the holy martyrs Diodorus and Rodopian, who were stoned to death by their fellow-citizens during the persecution under the Emperor Diocletian.
          Upon Mount Senario, near Florence, [in the thirteenth century,] the blessed Confessors Sosthenes and Uguccio, two of the seven founders of the Order of Servants of the Blessed Virgin Mary, who departed this life upon the same day and at the same hour, as they were repeating the angelic salutation, even as had been foretold to them from heaven.
      la:
      - type: text
        text: |-
          Quinto Nonas Maii

          Romæ, via Nomentána, pássio sanctórum Mártyrum Alexándri, Evéntii et Theodúli Presbyterórum. Ex his Alexánder, sub Hadriáno Príncipe et Aureliáno Iúdice, post víncula, cárceres, equúleum, úngulas et ignes, punctis crebérrimis per tota membra confóssus ac perémptus est; Evéntius vero et Theodúlus, post longos cárceres, ígnibus examináti, ad últimum decolláti sunt.
          Narniæ sancti Iuvenális, Epíscopi et Confessóris.
          Apud montem Senárium, in Etrúria, natális sanctórum Sostenǽi et Ugucciónis Confessórum, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, cǽlitus admóniti, eádem die et hora, salutatiónem Angélicam recitántes, e vita migrárunt. Ipsórum autem ac Sociórum festum prídie Idus Februárii celebrátur.
          Constantinópoli sanctórum Mártyrum Alexándri mílitis, et Antonínæ Vírginis. Hæc, in persecutióne Maximiáni, sub Prǽside Festo, ad lupánar damnáta, et ab Alexándro, qui pro ipsa ibi remánserat, mutátis véstibus clam edúcta, cum eo póstmodum iussa est torquéri; et ambo simul in ignem, præcísis mánibus, pro Christo sunt iniécti, atque ita, egrégio perácto certámine, coronántur.
          In Thebáide sanctórum Mártyrum Timóthei et Mauræ cóniugis, quos Ariánus Præféctus, post multa torménta, cruci iussit affígi; in qua, per novem dies cum vivi pependíssent ac se ipsos in fide roborássent, martýrium consummárunt.
          Aphrodísiæ, in Cária, sanctórum Mártyrum Diodóri et Rhodopiáni, qui, in persecutióne Diocletiáni Imperatóris, a cívibus suis lapidáti sunt.
          Hierosólymis Invéntio sacrosánctæ Crucis Domínicæ, sub Constantíno Imperatóre.
      en2:
      - type: text
        text: |-
          The Third of May
      
          At Rome, on the Nomentan Way, the passion of the holy Martyrs Alexander, Eventius, and Theodulus, Priests. Of these, Alexander, under the Emperor Hadrian and the judge Aurelian, after bonds, prisons, the rack, claws, and fires, was pierced through all his members with frequent punctures and slain; but Eventius and Theodulus, after long imprisonments, tested by fire, were at last beheaded.
          At Narni, Saint Juvenal, Bishop and Confessor.
          At Mount Senarius, in Etruria, the birth of Saints Sostenes and Uguccione, Confessors, of the seven Founders of the Order of Servants of the Blessed Virgin Mary; who, warned from heaven, departed this life on the same day and hour, reciting the Angelic Salutation. Their feast and that of their Companions is celebrated on the day before the Ides of February.
          At Constantinople, the holy Martyrs Alexander, a soldier, and Antonina, Virgin. She, condemned in the persecution of Maximian under the Governor Festus to a house of ill repute, and secretly led out by Alexander, who had remained there in her place, with their garments exchanged, was afterwards ordered to be tortured together with him; and both together, with their hands cut off, were cast into the fire for Christ, and so, having completed a distinguished contest, were crowned.
          In the Thebaid, the holy Martyrs Timothy and Maura, a married couple, whom the Arian Prefect, after many torments, ordered to be affixed to the cross; on which, having hung alive for nine days and strengthened one another in the faith, they completed their martyrdom.
          At Aphrodisias, in Caria, the holy Martyrs Diodorus and Rhodopianus, who, in the persecution of the Emperor Diocletian, were stoned by their own citizens.
          At Jerusalem, the Finding of the most holy Cross of the Lord, under the Emperor Constantine.
  psalm.quinto-nonas-oct-bris-1e51c2d6c7:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Thomas, Bishop of Hereford, in England, of whom mention was made yesterday.
          Upon the same 3rd day of October, were born into the better life:
          At Rome, at the Bear-and-Cap, the holy martyr Candidus, (in the third century.) Upon the same day, the holy martyrs Denis, Faustus, Caius, Peter, Paul, and four others, (in the third century.) They originally suffered much under the Emperor Decius, and then, under the Emperor Valerian, were put to a long course of torments by the President Emilian.
          Among the ancient Saxons, (in Westphalia,) the two holy (English) brethren, both named Ewald, (about the year 695,) (one surnamed the white, and the other the black.) They were priests, and had gone to preach Christ in that country, where they suffered martyrdom, being murdered by the heathen. A bright light was seen around their bodies by night to show where they were, and of what worthiness.
          In Africa, holy Maximian, Bishop of Bagaia, who again and again suffered great cruelties at the hands of the Donatists, and was at last thrown off the top of a lofty tower, and left for dead, but afterwards fell asleep in the Lord, famous for his glorious confession.
          In Palestine, the holy Confessor Hesychius, (in the fourth century,) a disciple of holy Hilarion, and his companion in his journeyings.
          At Brogne, in the diocese of Namur, in Belgium, (in the year 959,) holy Gerard, (Founder and) Abbot, (of the monastery at that place, who introduced a new and most exact discipline into many monasteries of Flanders, Champagne, Lorraine, and Picardy. He reformed some abbeys in Flanders.)
      la:
      - type: text
        text: |-
          Quinto Nonas Octóbris

          Sanctæ Terésiæ a Iesu Infante, ex Ordine Carmelitárum Excalceatórum, Vírginis, peculiáris ómnium Missiónum Patrónæ; cuius dies natális prídie Kaléndas Octóbris recensétur.
          Romæ, ad Ursum pileátum, sancti Cándidi Mártyris.
          Apud antíquos Sáxones sanctórum Mártyrum duórum Ewaldórum, qui, cum essent Presbýteri et Christum ibi prædicáre cœpíssent, comprehénsi sunt a Pagánis et occísi; ad quorum córpora noctu lux multa, diu appárens, et ubi essent et cuius essent mériti, declarávit.
          Eódem die sanctórum Mártyrum Dionýsii, Fausti, Caii, Petri, Pauli et aliórum quátuor, qui primum, sub Décio, multa passi sunt, ac demum, sub Valeriáno, ab Æmiliáno Prǽside diu torméntis vexáti, martýrii palmam meruérunt.
          In Africa sancti Maximiáni, Epíscopi Bagaiénsis, qui, a Donatístis íterum atque íterum sævíssima perpéssus, ex alta dénique turri præcipitátus est, et pro mórtuo derelíctus; sed, póstmodum a transeúntibus colléctus et pia curatióne sanátus, cathólicam fidem propugnáre non déstitit, donec, glória confessiónis clarus, quiévit in Dómino.
          Legióne, in Hispánia, sancti Froiláni, eiúsdem civitátis Epíscopi, monásticæ vitæ propagándæ stúdio, beneficéntia in páuperes, ceterísque virtútibus et miráculis clari.
          In diœcési Namurcénsi, apud Belgas, sancti Gerárdi Abbátis.
          In Palæstína sancti Hesýchii Confessóris, qui fuit sancti Hilariónis discípulus et in peregrinatióne sócius.
          Savónæ, in Ligúria, sanctæ Maríæ Ioséphæ Rosséllo, Institúti Filiárum Nostræ Dóminæ a Misericórdia Fundatrícis, quam, caritátis opéribus præcláram, Pius Papa Duodécimus sanctis Virgínibus adnumerávit.
      en2:
      - type: text
        text: |-
          The Third of October
      
          Saint Theresa of the Child Jesus, of the Order of Discalced Carmelites, Virgin, special Patroness of all Missions; whose birth-day is noted on the thirtieth of September.
          At Rome, at the Ursus Pileatus, Saint Candidus, Martyr.
          Among the ancient Saxons, the two holy Martyr brothers Ewald, who, being Priests and having begun to preach Christ there, were seized by pagans and slain; at whose bodies a great light shining by night for a long time declared both where they were and how great their merits were.
          On the same day, the holy Martyrs Dionysius, Faustus, Caius, Peter, Paul, and four others, who first, under Decius, suffered greatly, and at last, under Valerian, long tormented by the Governor Aemilianus, merited the palm of martyrdom.
          In Africa, Saint Maximianus, Bishop of Bagai, who, most savagely maltreated again and again by the Donatists, was at last thrown from a high tower and left for dead; but, subsequently gathered up by passersby and healed by devout care, he did not cease to defend the Catholic faith, until, renowned for the glory of his confession, he rested in the Lord.
          At León, in Spain, Saint Froilan, Bishop of the same city, renowned for his zeal in promoting the monastic life, his beneficence to the poor, and other virtues and miracles.
          In the Diocese of Namur, among the Belgians, Saint Gerard, Abbot.
          In Palestine, Saint Hesychius, Confessor, who was a disciple of Saint Hilarion and his companion in pilgrimage.
          At Savona, in Liguria, Saint Mary Josepha Rossello, Foundress of the Institute of the Daughters of Our Lady of Mercy, whom Pope Pius the Twelfth numbered among the holy Virgins.
  psalm.quintod-cimo-kal-ndas-apr-lis-272e512086:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          At Jerusalem, holy Confessor Cyril, Bishop of that see, and Doctor of the Church, who suffered many things from the Arians for the faith's sake. He was several times driven from the see, but at length fell asleep in peace, [in the year 386,] illustrious for the glory of holiness. The Ecumenical Council [of Constantinople,] in writing to Pope Damasus, gave a noble witness to the purity of his faith. We keep his feast upon the 22nd day of this present month of March.
          Upon the same 18th day of March, were born into the better life:

          At Caesarea, in Palestine, the blessed martyr Alexander, Bishop [of Jerusalem.] He came to Jerusalem from his own city, in Cappadocia, whereof he was Bishop, in order to visit the holy places. Narcissus, who was already very old, was then ruling the Church of Jerusalem, and Alexander by the revelation of God received the government thereof, afterward, and when he himself was in the venerable glory of grey hairs he was brought to Caesarea in the persecution under the Emperor Decius, and was put in prison, and finished his testimony confessing Christ.
          At Augsburg, the holy martyrs Narcissus, Bishop of Augsburg, and the Deacon Felix. Narcissus was the first who preached the gospel in Rhaetia. He afterwards went into Spain, and after he had brought many to believe in Christ at Girona he there received the palm of martyrdom, along with the Deacon Felix, in the persecution under the Emperor Diocletian.
          At Nicomedia, the ten thousand holy martyrs who were slain with the sword for confessing Christ.
          Also the holy martyrs Trophimus and Eucarpius, [fourth century.]
          In England, holy Edward II., King of the English, who was murdered through a plot of his stepmother, and hath been famous for many miracles, [962-978.]
          At Lucca, in Tuscany, holy Finnan, Bishop of that see, [in the sixth century,] famous for the power of working miracles, but whose principal feast is kept upon the 18th day of November, which is that of the translation of his body.
          At Mantua, the holy Confessor Anselm, Bishop of the see, [in the year 1086.]
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Aprílis

          Hierosólymis sancti Cyrílli Epíscopi, Confessóris et Ecclésiæ Doctóris; qui, ab Ariánis multas pro fídei causa perpéssus iniúrias et ex Ecclésia sua sæpe depúlsus, tandem, sanctitátis glória clarus, in pace quiévit. Ipsíus porro intemerátam fidem prima Constantinopolitána Sýnodus œcuménica, sancto Dámaso Papæ scribens, præcláro testimónio commendávit.
          Cæsaréæ, in Palæstína, natális beáti Alexándri Epíscopi, qui de Cappadócia, ex própria civitáte, ubi erat Epíscopus, sanctórum locórum desidério Hierosólymam pétiit; atque ibi, cum a Narcísso, eiúsdem urbis Epíscopo, iam sene, illa regerétur Ecclésia, ipsíus gubernácula, divína edóctus revelatióne, suscépit. Póstmodum vero, in persecutióne Décii, cum iam longǽvæ ætátis veneránda canítie præfulgéret, ductus est Cæsaréam, et clausus in cárcere, ob confessiónem Christi, martýrium complévit.
          Augústæ sancti Narcíssi Epíscopi, qui primus in Rhǽtia Evangélium prædicávit; deínde in Hispániam proféctus est, et, cum Gerúndæ multos ad Christi fidem convertísset, ibídem, in persecutióne Diocletiáni Imperatóris, una cum Felíce Diácono, martýrii palmam accépit.
          Nicomedíæ sanctórum decem míllium Mártyrum, qui, pro Christi confessióne, gládio percússi sunt.
          Ibídem sanctórum Mártyrum Tróphimi et Eucárpii.
          In Británnia sancti Eduárdi Regis, qui, dolis novércæ necátus, multis miráculis cláruit.
          Lucæ, in Túscia, natális sancti Frigdiáni Epíscopi, virtúte miraculórum illústris.
          Mántuæ sancti Ansélmi, Epíscopi Lucénsis et Confessóris.
          Cárali, in Sardínia, sancti Salvatóris ab Horta, Confessóris, ex Ordine Fratrum Minórum, qui, virtútibus et singulári miraculórum dono cláruit, et a Pio Papa Undécimo inter sanctos Cǽlites adnumerátus est.
      en2:
      - type: text
        text: |-
          The Eighteenth of March
      
          At Jerusalem, Saint Cyril, Bishop, Confessor and Doctor of the Church; who, having suffered many wrongs at the hands of the Arians for the faith, and often driven from his Church, at last rested in peace, renowned for his holiness. Moreover, the First Ecumenical Council of Constantinople, writing to Pope Saint Damasus, commended his inviolate faith with a distinguished testimony.
          At Caesarea, in Palestine, the birth of blessed Alexander, Bishop, who, coming from Cappadocia from his own city, where he was Bishop, sought Jerusalem out of longing for the holy places; and there, when that Church was being governed by Narcissus, Bishop of the same city, already an old man, he took over the guidance of it, taught by divine revelation. Afterwards, in the persecution of Decius, when he was already shining with the venerable white hair of a great age, he was brought to Caesarea, and imprisoned there, and completed his martyrdom for confessing Christ.
          At Augsburg, Saint Narcissus, Bishop, who first preached the Gospel in Raetia; then went to Spain, and, having converted many to the faith of Christ at Gerona, received there, in the persecution of the Emperor Diocletian, the palm of martyrdom together with Felix the Deacon.
          At Nicomedia, ten thousand holy Martyrs, who, for confessing Christ, were put to the sword.
          In the same city, the holy Martyrs Trophimus and Eucarpus.
          In Britain, Saint Edward, King, who, slain by the treachery of his stepmother, shone with many miracles.
          At Lucca, in Tuscany, the birth of Saint Frigidianus, Bishop, renowned for the power of his miracles.
          At Mantua, Saint Anselm, Bishop of Lucca and Confessor.
          At Cagliari, in Sardinia, Saint Salvatore da Horta, Confessor, of the Order of Friars Minor, who shone for virtues and a singular gift of miracles, and was numbered among the holy company by Pope Pius the Eleventh.
  psalm.quintod-cimo-kal-ndas-aug-sti-43b1a72e8c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Camillus de' Lellis, founder of the Congregation of Regular Clerks for ministering to the sick, whose birthday, [in the year 1614,] to the better life: was recorded upon the 14th of this present month of July, and whom the Supreme Pontiff Leo XIII proclaimed the patron in heaven of the sick and of those that tend them.
          Upon the same 18th day of July, were born into the better life:

          At Tivoli, the holy Symphorosa, wife of the holy martyr Getulius, along with her seven sons Crescens, Julian, Nemesius, Primitivus, Justin, Stacteus, and Eugene. Under the Emperor Hadrian the Mother, on account of her invincible constancy, was first long beaten with palm branches, then hung up by the hair, and lastly tied to a stone and thrown into the river her sons stretched upon posts by pullies, finished their testimony by diverse ways of death, [about the year 120.] Their bodies were afterwards brought to Rome, and in the time of the Supreme Pontiff Pius IV, they were found in the Diaconal church of the Holy Angel at the Fish-pond.
          At Carthage, the holy Virgin and martyr Gondines. Because of her Confession of Christ the Pro-consul Rufinus caused her to be four different times racked she was horribly tormented with tearing by hooks, she suffered long a foul imprisonment, and in the end she was slain with the sword, [in the year 203.]
          At Dorostorum, in Mysia, the holy Martyr Aemilian, who was cast into a furnace under the President Capitolinus, in the time of the Emperor Julian the Apostate, and so received the palm of martyrdom.
          At Utrecht, the holy martyr Frederick, Bishop [of that see, in the year 838.]
          In Gallicia, in Spain, the holy Virgin and martyr Marina.
          At Milan, holy Maternus, Bishop [of that see,] who for the sake of Christ and of the church unto him committed was cast into prison, under the Emperor Maximian, and oftentimes beaten, and at length fell asleep in the Lord, glorious for much testifying.
          At Brescia, holy Philastrius, Bishop of that city, who fought much both by word and writing against the heretics, and especially the Arians, of whom he suffered many things, and at length fell asleep in peace, as a Confessor famous for miracles, [in the year 386.]
          At Metz, in Gaul, holy Arnulph, Bishop [of that see,] famous for holiness and the gift of working wonders, who chose to live as an hermit and fell asleep in blessedness, [in the year 641.]
          At Segni, the holy Confessor Bruno, Bishop [of that see, in the year 1125.]
          At Forlimpopoli, on the Emilian Way, holy Ruffillus, Bishop of that city, [in the year 385.]
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Augústi

          Sancti Camílli de Lellis, Presbýteri et Confessóris, Clericórum Regulárium infírmis ministrántium Institutóris, cæléstis hospitálium et infirmórum Patróni; cuius dies natális prídie Idus Iúlii recólitur.
          Tíbure sanctæ Symphorósæ, uxóris sancti Getúlii Mártyris, cum septem fíliis suis, scílicet Crescénte, Iuliáno, Nemésio, Primitívo, Iustíno, Stácteo et Eugénio. Horum mater, sub Hadriáno Príncipe, ob insuperábilem constántiam, primo cæsa diu palmis, deínde crínibus suspénsa, novíssime saxo alligáta, in flumen præcipitáta est; fílii autem, stipítibus ad tróchleas exténsi, divérso mortis éxitu martýrium complevérunt. Eorúndem córpora póstea Romam transláta, et, Pio Quarto Summo Pontífice, in Diaconía sancti Angeli in Piscína fuérunt invénta.
          Traiécti sancti Frideríci, Epíscopi et Mártyris.
          Doróstori, in Mýsia inferióre, sancti Æmiliáni Mártyris, qui, témpore Iuliáni Apóstatæ, sub Capitolíno Prǽside, in fornácem iniéctus, martýrii palmam accépit.
          Carthágine sanctæ Gundénis Vírginis, quæ, iussu Rufíni Procónsulis, ob Christi confessiónem, quater divérsis tempóribus per extensiónem in equúleo torta, et úngulis horrénde lacerántibus cruciáta, cárceris squalóre diu afflícta, novíssime gládio cæsa est.
          Gallǽciæ, in Hispánia, sanctæ Marínæ, Vírginis et Mártyris.
          Medioláni sancti Matérni Epíscopi, qui, sub Maximiáno Imperatóre, pro fide Christi et pro Ecclésia sibi commíssa, in cárcerem detrúsus et sæpe verbéribus cæsus est; ac tandem, multis confessiónibus clarus, obdormívit in Dómino.
          Bríxiæ natális sancti Philástrii, qui fuit eiúsdem civitátis Epíscopus. Hic advérsus hæréticos, præsértim Ariános, a quibus multa passus est, plúrimum verbis scriptísque pugnávit; demum, clarus miráculis, Conféssor in pace quiévit.
          Metis, in Gállia, sancti Arnúlphi Epíscopi, qui, sanctitáte et miráculis illústris, eremíticam delégit vitam, et beáto fine quiévit.
          Signiæ sancti Brunónis, Epíscopi et Confessóris.
          Foro Pompílii, in Æmília, sancti Ruffílli, eiúsdem civitátis Epíscopi.
      en2:
      - type: text
        text: |-
          The Eighteenth of July
      
          Saint Camillus de Lellis, Priest and Confessor, Founder of the Clerics Regular ministering to the sick, heavenly Patron of hospitals and the infirm; whose birth-day is recalled on the fourteenth of July.
          At Tivoli, Saint Symphorosa, wife of Saint Getulius the Martyr, with her seven sons, namely Crescens, Julian, Nemesius, Primitivus, Justin, Stacteus, and Eugene. Their mother, under the Emperor Hadrian, for her insurmountable constancy, first beaten long with blows of the hand, then suspended by her hair, was finally tied to a stone and thrown into a river; but her sons, stretched on stakes to pulley-wheels, completed their martyrdom by various kinds of death. Their bodies were afterwards translated to Rome, and were found, under Pope Pius the Fourth, Supreme Pontiff, in the Diaconia of Saint Angel in Pescheria.
          At Utrecht, Saint Frederick, Bishop and Martyr.
          At Dorostorum, in Lower Moesia, Saint Aemilianus, Martyr, who, in the time of Julian the Apostate, under the Governor Capitolinus, was cast into a furnace and received the palm of martyrdom.
          At Carthage, Saint Gundenis, Virgin, who, by order of the proconsul Rufinus, for confessing Christ, was tortured four separate times by extension on the rack, cruelly lacerated with horrible claws, long afflicted with the squalor of prison, and finally slain with the sword.
          In Galicia, in Spain, Saint Marina, Virgin and Martyr.
          At Milan, Saint Maternus, Bishop, who, under the Emperor Maximian, was thrust into prison for the faith of Christ and for the Church entrusted to him, and often beaten with rods; and at last, renowned for many confessions, fell asleep in the Lord.
          At Brescia, the birth of Saint Filastrius, who was Bishop of the same city. He fought greatly against heretics, especially the Arians, by whom he suffered much, with both words and writings; and at last, renowned for miracles, rested in peace as a Confessor.
          At Metz, in France, Saint Arnulf, Bishop, who, renowned for holiness and miracles, chose the eremitic life and rested in a blessed death.
          At Segni, Saint Bruno, Bishop and Confessor.
          At Forum Pompili, in Aemilia, Saint Rufillus, Bishop of the same city.
  psalm.quintod-cimo-kal-ndas-dec-mbris-84e3f45a42:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 17th day of November, were born into the better life:

          In England, holy Hugh, Bishop of Lincoln. He was a Charter House Monk, who was called to rule the Church of Lincoln, was famous for many miracles, and died an holy death, (in the year 1200.)
          At Neo-Caesarea, in Pontus, (about the year 270,) holy Gregory, Archbishop of that see, who was famous for teaching and holiness, and who came to be called the Wonder-worker, on account of the great signs and wonders which he worked to the great glory of the churches, whose feast we keep upon the 27th day of this present month of November.
          In Palestine, the holy martyrs Alphaeus and Zacchaeus, who were put to death after suffering many torments, in the first year of the persecution under the Emperor Diocletian.
          At Cordova, the holy brother and sister Acisclus and Victoria, both martyrs, who in the same persecution by Diocletian aforesaid, were most cruelly tortured by command of the President Dion, and earned crowns of glory from the hand of the Lord.
          At Alexandria, holy Denys, Bishop (of that see,) a man of great learning, and glorious on account of his many confessions and his diverse sufferings and torments, who at length fell asleep in the Lord, full of days but still a Confessor, in the time of the Emperors Valerian and Gallienus, (in the year 265.)
          At Orleans, (in the year 453,) holy Anian, Bishop (of that see,) the preciousness of whose death, in the sight of the Lord, is attested by many miracles.
          At Tours, (in the year 595,) holy Gregory, Bishop (of that see.)
          At Florence, the holy Confessor Eugene, a Deacon of blessed Zenobius, Bishop of that see.
          In Germany, (in the year 1334,) the holy Virgin Gertrude, of the Order of St. Benedict, eminent for her gift of revelations, whose feast we have kept upon the 15th day of this present month.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Decémbris

          Neocæsaréæ, in Ponto, natális sancti Gregórii, Epíscopi et Confessóris, doctrína et sanctitáte illústris, qui propter signa atque mirácula, quæ cum multa Ecclesiárum glória perpetrávit, Thaumatúrgus est appellátus.
          Helpíthi, in Saxónia, item natális sanctæ Gertrúdis, Vírginis, ex Ordine sancti Benedícti, quæ dono revelatiónum clara éxstitit. Ipsíus tamen festívitas prídie huius diéi celebrátur.
          In Palæstína sanctórum Mártyrum Alphǽi et Zachǽi, qui primo anno persecutiónis Diocletiáni, post multa torménta, capitálem senténtiam subiére.
          Córdubæ, in Hispánia, sanctórum Mártyrum Acíscli et Victóriæ germanórum, qui, in eádem persecutióne, Diónis Prǽsidis iussu sævíssime cruciáti sunt, et illústri passióne corónas a Dómino meruérunt.
          Alexandríæ sancti Dionýsii Epíscopi, summæ eruditiónis viri, qui, multis confessiónibus clarus et pro passiónum tormentorúmque diversitáte magníficus, plenus diérum Conféssor quiévit, Valeriáni et Galliéni Imperatórum tempóribus.
          Aureliánis, in Gállia, sancti Aniáni Epíscopi, cuius mortem in conspéctu Dómini pretiósam mirácula crebra testántur.
          In Británnia sancti Hugónis Epíscopi, qui, ex Mónacho Carthusiáno ad Ecclésiam Lincolniénsem regéndam vocátus, multis cláruit miráculis, et sancto fine quiévit.
          Turónis, in Gállia, sancti Gregórii Epíscopi.
          Floréntiæ sancti Eugénii Confessóris, qui fuit Diáconus beáti Zenóbii, eiúsdem civitátis Epíscopi.
      en2:
      - type: text
        text: |-
          The Seventeenth of November
      
          At Neocaesarea, in Pontus, the birth of Saint Gregory, Bishop and Confessor, renowned for learning and holiness, who, on account of the signs and miracles which he performed to the great glory of the Churches, was called the Wonderworker.
          At Helfta, in Saxony, likewise the birth of Saint Gertrude, Virgin, of the Order of Saint Benedict, who was renowned for the gift of revelations. However, her feast is celebrated on the preceding day.
          In Palestine, the holy Martyrs Alphaeus and Zachaeus, who in the first year of the persecution of Diocletian, after many torments, underwent the capital sentence.
          At Córdoba, in Spain, the holy Martyrs Acisculus and Victoria, brother and sister, who, in the same persecution, were most savagely tortured by order of the Governor Dion and merited crowns from the Lord through their illustrious passion.
          At Alexandria, Saint Dionysius, Bishop, a man of the highest learning, who, renowned for many confessions and magnificent through the variety of his sufferings and torments, rested in peace full of days as a Confessor, in the times of the Emperors Valerian and Gallienus.
          At Orléans, in France, Saint Anianus, Bishop, whose precious death in the sight of the Lord is attested by frequent miracles.
          In Britain, Saint Hugh, Bishop, who, called from a Carthusian Monk to govern the Church of Lincoln, shone with many miracles and rested in a holy death.
          At Tours, in France, Saint Gregory, Bishop.
          At Florence, Saint Eugenius, Confessor, who was a Deacon of blessed Zenobius, Bishop of the same city.
  psalm.quintod-cimo-kal-ndas-febru-rii-4fb0f9ae22:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the Feast of the See of the holy Apostle Peter wherein he first sat at Rome.
          Upon the same 18th day of January, were born into the better life:

          At Rome, the holy Virgin and martyr Prisca, who after suffering many torments was crowned with martyrdom under the Emperor Claudius.
          In Pontus, the holy soldiers Moseus and Ammonius, who were first condemned to penal servitude in the mines and then burnt, (under the Emperor Decius.) Likewise in Pontus, (probably in the year 196,) the holy martyr Athenogenes the Old, called the Theologian, who, when he was about to suffer martyrdom by fire, joyfully sang an hymn, which also he left unto his disciples in writing.
          At Tours, in Gaul, (in the year 498,) holy Volusian, Bishop of that see, who was taken prisoner by the Goths, and while still in exile gave up his soul to God.
          There also, (in the year 593,) the holy hermit (of Tourance,) Leobard, who was a bright light of self-denial and lowliness.
          In Brittany, holy Deicola, Abbot (of Lure,) (in the year 625,) a disciple of blessed Columbanus.
          At Como, (in the year 581,) the holy virgin Liberata.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Februárii

          Romæ pássio sanctæ Priscæ, Vírginis et Mártyris; quæ sub Cláudio Imperatóre, post multa torménta, martýrio coronáta est.
          In Ponto natális sanctórum Mártyrum Moséi et Ammónii, qui, cum essent mílites, primo ad metálla damnáti sunt, ac novíssime igni tráditi.
          Ibídem sancti Athenógenis, antíqui Theólogi, qui, per ignem consummatúrus martýrium, hymnum lætus cecinit, quem et discípulis scriptum relíquit.
          Turónis, in Gállia, sancti Volusiáni Epíscopi, qui, a Gothis captus, in exsílio spíritum Deo réddidit.
          In monastério Lutrénsi, in Burgúndia, sancti Deícolæ Abbátis, qui, natióne Hibérnus, discípulus fuit beáti Columbáni.
          Turónis, in Gállia, sancti Leobárdi reclúsi, qui mira abstinéntia et humilitáte refúlsit.
          Novocómi sanctæ Liberátæ Vírginis.
          Budæ, in Hungária, sanctæ Margarítæ, Vírginis, e régia Arpadénsium família, Ordinis sancti Domínici Moniális, virtúte castitátis et arctíssima pæniténtia insígnis, quam Pius Duodécimus, Póntifex Máximus, sanctárum Vírginum catálogo adscrípsit.
      en2:
      - type: text
        text: |-
          The Eighteenth of January
      
          At Rome, the passion of Saint Prisca, Virgin and Martyr; who, under the Emperor Claudius, after many torments, was crowned with martyrdom.
          In Pontus, the birth of the holy Martyrs Moses and Ammonius, who, being soldiers, were first condemned to the mines and finally handed over to fire.
          In the same place, Saint Athenogenes, an ancient theologian, who, about to complete his martyrdom by fire, joyfully sang a hymn, which he also left written to his disciples.
          At Tours, in France, Saint Volusianus, Bishop, who, captured by the Goths, gave up his spirit to God in exile.
          In the monastery of Lutrensi, in Burgundy, Saint Deicola, Abbot, who, an Irishman by birth, was a disciple of blessed Columban.
          At Tours, in France, Saint Leobardus, a recluse, who shone with wondrous abstinence and humility.
          At Como, Saint Liberata, Virgin.
          At Buda, in Hungary, Saint Margaret, Virgin, of the royal house of the Arpads, a Nun of the Order of Saint Dominic, distinguished for the virtue of chastity and most strict penance, whom Pope Pius the Twelfth, Supreme Pontiff, enrolled in the catalogue of holy Virgins.
  psalm.quintod-cimo-kal-ndas-i-lii-9eb32a9080:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 17th day of June, were born into the better life:

          In England, the holy Abbot Botolph.
          At Rome, two hundred and sixty two holy martyrs, who were slain for Christ's faith's sake in the persecution under Diocletian, and were buried at Cucumber Hill, upon the old Salarian Way.
          At Tarracina, the holy soldier Montanus, who, after many torments, received the crown of martyrdom under Hadrian the Emperor and Leontius the Consular.
          At Venafro, the holy martyrs Nicander and Marcian, who were beheaded in the persecution under Maximian.
          At Chalcedon, the holy martyrs Manuel, Sabel, and Ishmael. They were envoys who had been sent by the King of Persia to Julian the Apostate to treat for peace. Julian commanded them to worship idols, and, forasmuch as they steadfastly refused so to do, he caused them to be slain with the sword.
          At Apollonia, in Macedonia, the holy martyrs Isaurus a Deacon, Innocent, Felix, Jeremiah, and Peregrine, Athenians, who were in diverse ways tormented and then beheaded, under the Tribune Tripontius.
          At Amelia, in Umbria, [in the sixth century,] the holy Himerius, Bishop [of that see,] whose body was taken to Cremona, [five hundred years later.]
          In Berry, [also in the sixth century,] holy Gundulph, Bishop [of that see.]
          At Orleans, [in the year 530,] the holy Priest and Confessor Avitus.
          In Phrygia, [in the fifth century,] the holy Confessor Hypatius.
          Also, [in the year 1160,] the holy Hermit Bessarion.
          At Pisa, in Tuscany, [in the year 1160,] the holy Confessor Rainerius.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Iúlii

          Sancti Gregórii Barbadíci, Cardinális, Epíscopi et Confessóris, cuius dies natális sequénti die recensétur.
          Romæ natális sanctórum ducentórum et sexagínta duórum Mártyrum, qui, in persecutióne Diocletiáni, pro fide Christi sunt necáti, ac pósiti via Salária véteri, ad clivum Cucúmeris.
          Vesontióne, in Gálliis, sancti Antídii, Epíscopi et Mártyris, qui, ob Christi fidem, a Wándalis occísus fuit.
          Apollóniæ, in Macedónia, sanctórum Mártyrum Atheniénsium Isáuri Diáconi, Innocéntii, Felícis, Ieremíæ et Peregríni, qui, a Tripóntio Tribúno várie torti, cápite obtruncáti sunt.
          Tarracínæ, in Campánia, sancti Montáni mílitis, qui, sub Hadriáno Imperatóre et Leóntio Consulári, post multa torménta, martýrii corónam accépit.
          Apud Venáfrum, in Campánia, sanctórum Mártyrum Nicándri et Marciáni, qui, in persecutióne Maximiáni, cápite cæsi sunt.
          Chalcedóne sanctórum Mártyrum Manuélis, Sabélis et Ismaélis, qui, pacis causa apud Iuliánum Apóstatam pro Persárum Rege legatióne fungéntes, ab ipso Imperatóre, cum idóla venerári compelleréntur idque constánti ánimo recusárent, gládio feríri iubéntur.
          Amériæ, in Umbria, sancti Himérii Epíscopi, cuius corpus Cremónam, in Insúbria, translátum est.
          In pago Bituricénsi sancti Gundúlphi Epíscopi.
          Aureliánis, in Gállia, sancti Avíti, Presbýteri et Confessóris.
          In Phrýgia sancti Hypátii Confessóris.
          Item sancti Bessariónis Anachorétæ.
          Pisis, in Túscia, sancti Rainerii Confessóris.
      en2:
      - type: text
        text: |-
          The Eighteenth of June
      
          Saint Gregory Barbarigo, Cardinal, Bishop and Confessor, whose birth-day is noted on the following day.
          At Rome, the birth of two hundred and sixty-two holy Martyrs, who, in the persecution of Diocletian, were slain for the faith of Christ, and placed on the old Salarian Way, at the hill of Cucumer.
          At Besançon, in France, Saint Antidius, Bishop and Martyr, who was slain by the Vandals for the faith of Christ.
          At Apollonia, in Macedonia, the holy Athenian Martyrs Isaurus the Deacon, Innocent, Felix, Jeremiah, and Peregrinus, who, variously tortured by the Tribune Tripontius, were beheaded.
          At Terracina, in Campania, Saint Montanus, a soldier, who, under the Emperor Hadrian and the consular Leontius, after many torments, received the crown of martyrdom.
          Near Venafro, in Campania, the holy Martyrs Nicander and Marcianus, who, in the persecution of Maximian, were beheaded.
          At Chalcedon, the holy Martyrs Manuel, Sabas, and Ismael, who, serving as ambassadors to Julian the Apostate on behalf of the King of Persia for the sake of peace, were ordered by the same Emperor to be struck with the sword when they were compelled to venerate idols and refused with a steadfast spirit.
          At Ameria, in Umbria, Saint Homerius, Bishop, whose body was translated to Cremona, in Liguria.
          In the canton of Bourges, Saint Gundulphus, Bishop.
          At Orléans, in France, Saint Avitus, Priest and Confessor.
          In Phrygia, Saint Hypatius, Confessor.
          Likewise, Saint Bessarion, hermit.
          At Pisa, in Tuscany, Saint Rainerius, Confessor.
  psalm.quintod-cimo-kal-ndas-i-nii-246e0631c2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18th day of May, were born into the better life:

          At Camarino, in the neighbourhood of Ancona, the holy martyr Venantius, who, at fifteen years of age, under Decius the Emperor and Antiochus the President, along with ten others, finished the course of a glorious contention by being beheaded.
          In Egypt, the holy Reader Dioscorus, upon whom the President practiced many and diverse tortures, so that he had his nails dug out, and his sides scarified with lamps, but a sudden light from heaven terrified the tormentors so that they fell down; lastly, he was roasted with hot plates of metal, and so finished his testimony.
          At Spoleto, the holy Felix, Bishop [of Spello,] who gained the palm of martyrdom, under the Emperor Maximian.
          In Egypt, the holy Potamion, Bishop [of Heraclea,] who was first a Confessor of the faith under the Emperor Maximian Gallerius, and afterwards crowned with martyrdom, under the Emperor Constantius and the Arian President Philagrius.
          At Ancyra, in Galatia, the holy martyrs Theodotus, and the Virgins Thecusa his aunt, Alexandra, Claudia, Faina, Euphrasia, Matrona, and Julitta, who were sentenced by the President to the stews, but were preserved by the power of God whereupon stones were tied to their necks and they were sunk in a swamp. Theodotus gathered their remains and buried them honourably, whereupon he was arrested by the President and savagely mangled, and at length received the crown of his testimony by being stricken with the sword.
          At Uppsala, in Sweden, [in the year 1161,] the holy martyr Eric, King of that land.
          At Rome, [in the year 1587,] the holy Confessor Felix of Cantalicio, of the Order of Friars Minors Capuchins, who was remarkable for his Gospel simplicity and charity, and whom the Supreme Pontiff Clement XI numbered among the Saints.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Iúnii

          Cameríni sancti Venántii Mártyris, qui, annos quíndecim natus, sub Décio Imperatóre et Antíocho Prǽside, una cum áliis decem, gloriósi certáminis cursum, cervícibus abscíssis, implévit.
          Ravénnæ natális sancti Ioánnis Primi, Papæ et Mártyris; qui, ab Ariáno Itáliæ Rege Theodoríco illuc dolo evocátus, ibídem, ab eo propter orthodóxam fidem diu macerátus in cárcere, vitam finívit. Ipsíus autem festum recólitur sexto Kaléndas Iúnii, quo die sacrum eius corpus, Romam relátum, in Basílica sancti Petri, Apostolórum Príncipis, sepúltum est.
          Spoléti sancti Felícis Epíscopi, qui, sub Maximiáno Imperatóre, martýrii palmam adéptus est.
          Heracléæ, in Ægýpto, sancti Potamónis Epíscopi, qui primum, sub Maximiáno Galério, Conféssor fuit; deínde, sub Constántio Imperatóre et Ariáno Prǽside Philágrio, martýrio coronátus est. Ipsum vero beátum virum sancti Ecclésiæ Patres Athanásius et Epiphánius suis láudibus celebrárunt.
          In Ægýpto sancti Dióscori Lectóris, in quem Præses multa et vária torménta ita exércuit, ut ungues eius effóderet et lampádibus látera inflammáret, sed, cæléstis lúminis fúlgore pertérriti, cecidérunt minístri; novíssime autem ipse Dióscorus, láminis ardéntibus adústus, martýrium consummávit.
          Ancýræ, in Galátia, sancti Theódoti Mártyris, et sanctárum septem Vírginum et Mártyrum, scílicet Thecúsæ, quæ ipsíus Theódoti erat ámita, Alexándræ, Cláudiæ, Phaínæ, Euphrásiæ, Matrónæ et Iulíttæ. Hæ a Prǽside primum prostitútæ, sed Dei virtúte servátæ, deínde, lapídibus ad colla ligátis, in palúdem mersæ sunt; quarum relíquias colléctas cum Theódotus honorífice sepelísset, ídeo, comprehénsus a Prǽside, sævíssime dilaniátus est, ac demum, ense percússus, martýrii corónam accépit.
          Upsali, in Suécia, sancti Eríci, Regis et Mártyris.
          Romæ sancti Felícis Confessóris, ex Ordine Minórum Capuccinórum, evangélica simplicitáte et caritáte conspícui; quem Clemens Undécimus, Póntifex Máximus, Sanctórum fastis adscrípsit.
      en2:
      - type: text
        text: |-
          The Eighteenth of May
      
          At Camerino, Saint Venantius, Martyr, who, at fifteen years of age, under the Emperor Decius and the Governor Antiochus, together with ten others, completed the course of his glorious contest by beheading.
          At Ravenna, the birth of Saint John the First, Pope and Martyr; who, deceitfully summoned there by Theodoric, the Arian King of Italy, was long tormented there by him in prison on account of the orthodox faith, and ended his life. His feast is recalled on the twenty-seventh of May, on which day his sacred body, brought back to Rome, was buried in the Basilica of Saint Peter, Prince of the Apostles.
          At Spoleto, Saint Felix, Bishop, who, under the Emperor Maximian, obtained the palm of martyrdom.
          At Heraclea, in Egypt, Saint Potamon, Bishop, who was first a Confessor under Maximian Galerius; then, under the Emperor Constantius and the Arian Governor Philagrius, was crowned with martyrdom. Indeed the holy Fathers of the Church Athanasius and Epiphanius celebrated this blessed man with their praises.
          In Egypt, Saint Dioscorus, Reader, against whom the Governor exercised many and various torments, digging out his nails and inflaming his sides with torches, but the ministers fell back terrified by the brightness of heavenly light; finally Dioscorus himself, scorched with burning plates, completed his martyrdom.
          At Ancyra, in Galatia, Saint Theodotus, Martyr, and the seven holy Virgins and Martyrs, namely Thecusa, who was the aunt of Theodotus himself, Alexandra, Claudia, Phaina, Euphrasia, Matrona, and Julitta. These were first condemned to prostitution by the Governor but preserved by the power of God; then, with stones tied to their necks, were drowned in a swamp; when Theodotus had collected their relics and buried them honorably, he was for this reason seized by the Governor, most savagely torn, and finally struck with a sword, and received the crown of martyrdom.
          At Uppsala, in Sweden, Saint Eric, King and Martyr.
          At Rome, Saint Felix, Confessor, of the Order of Capuchin Friars Minor, renowned for evangelical simplicity and charity; whom Pope Clement the Eleventh, Supreme Pontiff, enrolled in the register of the Saints.
  psalm.quintod-cimo-kal-ndas-ianu-rii-84b7a02603:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the Feast of the Blessed Virgin Mary looking shortly to be delivered.
          Upon the same 18th day of December, were born into the better life:

          At Philippi, in Macedonia, (in the year 107,) the holy martyrs Rufus and Zozimus, who were of the number of the disciples by whom the early Church was founded among the Jews and Greeks of whose happy contending holy Polycarp writeth in his Epistle unto the Philippians.
          At Laodicea, in Syria, the holy martyrs Theotimus and Basilian.
          In Africa, the holy martyrs Quintus, Simplicius and others, who suffered in the persecution under the Emperors Decius and Valerian.
          There also the holy martyr Moysetes.
          Likewise in Africa also, the holy martyrs Victurus, Victor, Victorinus, Adjutor, Quartus, and thirty others.
          At Mopsuestia, in Cilicia, holy Auxentius, Bishop (of that see;) he was originally a soldier under the Emperor Licinius, but chose rather to cast away his military belt than to offer grapes to Bacchus; he afterwards became a Bishop, and fell asleep in peace, famous for worthy deeds, (fourth century.)
          At Tours, holy Bishop Gratian, who was ordained by holy Pope Fabian as the first Bishop of that city, and fell asleep in the Lord, famous for many miracles. (He was a disciple of the Apostles.)
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Ianuárii

          Philíppis, in Macedónia, natális sanctórum Mártyrum Rufi et Zósimi, qui ex illórum número discipulórum fuérunt, per quos primitíva Ecclésia in Iudǽis et Græcis fundáta est; de quorum étiam felíci agóne scribit sanctus Polycárpus in epístola ad Philippénses.
          Laodicéæ, in Sýria, pássio sanctórum Theotími et Basiliáni.
          In Africa sanctórum Mártyrum Quincti, Simplícii et aliórum; qui sub Décii et Valeriáni persecutióne passi sunt.
          Ibídem sancti Moysétis Mártyris.
          Item in Africa sanctórum Mártyrum Victúri, Victóris, Victoríni, Adiutóris, Quarti et aliórum trigínta.
          Mopsuéstiæ, in Cilícia, sancti Auxéntii Epíscopi, qui, olim sub Licínio miles, pótius elégit cíngulum exúere quam uvas Baccho offérre; factúsque Epíscopus, præclárus méritis quiévit in pace.
          Turónis, in Gállia, sancti Gratiáni Epíscopi, qui, a sancto Fabiáno Papa primus eiúsdem civitátis Epíscopus ordinátus est, et multis clarus miráculis obdormívit in Dómino.
      en2:
      - type: text
        text: |-
          The Eighteenth of December
      
          At Philippi, in Macedonia, the birth of the holy Martyrs Rufus and Zosimus, who were of the number of those disciples through whom the primitive Church was founded among Jews and Greeks; about whose blessed combat Saint Polycarp also writes in his letter to the Philippians.
          At Laodicea, in Syria, the passion of Saints Theotimus and Basilianus.
          In Africa, the holy Martyrs Quinctus, Simplicius, and others; who suffered in the persecution of Decius and Valerian.
          In the same place, Saint Moyses, Martyr.
          Likewise in Africa, the holy Martyrs Victurus, Victor, Victorinus, Adjutor, Quartus, and thirty others.
          At Mopsuestia, in Cilicia, Saint Auxentius, Bishop, who, once a soldier under Licinius, chose rather to lay aside the military belt than to offer grapes to Bacchus; and, having become a Bishop, rested in peace, renowned for his merits.
          At Tours, in France, Saint Gratianus, Bishop, who was ordained as the first Bishop of the same city by Pope Saint Fabianus, and, renowned for many miracles, fell asleep in the Lord.
  psalm.quintod-cimo-kal-ndas-m-rtii-4dc125d814:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 15th day of February were born into the better life:

          At Brescia, the holy martyrs Faustinus and Jovita, who under the Emperor Hadrian, after many glorious contendings for Christ's faith, received by martyrdom a crown of victory, [about the year 122.]
          At Rome, the holy martyr Crato, [the Orator,] who was baptized by blessed Valentine, Bishop [of Terni, in Umbria,] along with his wife and his whole house and no long while after, he and they together attained unto martyrdom, [in the year 273.]
          At Terni, [in the year 270,] the holy Virgin and martyr Agapis.
          Also the holy martyrs Saturninus, Castulus, Magnus, and Lucius.
          At Vaison, in Gaul, holy Quinidius, Bishop of that see, whose death, [in the year 578,] how precious it was in the sight of the Lord miracles do oftentimes witness.
          At Capua, [in the year 695] the holy Confessor Decorosus, Bishop of that city.
          In the province of Valeria, [in the sixth century,] the holy Priest Severus, of whom blessed Gregory writeth that by his tears he recalled a dead man to life.
          At Antioch, the holy Deacon Joseph.
          In Auvergne, [in the sixth century,] the holy Virgin Georgia.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Mártii

          Bríxiæ natális sanctórum Mártyrum Faustíni et Iovítæ fratrum, qui sub Hadriáno Imperatóre, post multa præclára ob Christi fidem suscépta certámina, victrícem martýrii corónam accepérunt.
          Romæ sancti Cratónis Mártyris, qui, cum uxóre sua et univérsa domo a beáto Valentíno Epíscopo baptizátus, non multo post, una cum illis, martýrio consummátus est.
          Interámnæ natális sanctórum Mártyrum Saturníni, Cástuli, Magni et Lúcii.
          Ibídem sanctæ Agapis, Vírginis et Mártyris.
          Vasióne, in Gálliis, sancti Quinídii Epíscopi, cuius mortem in conspéctu Dómini pretiósam mirácula crebra testántur.
          Cápuæ sancti Decorósi, Epíscopi et Confessóris.
          In Província Valériæ sancti Sevéri Presbýteri, qui (ut beátus Gregórius Papa scribit), fusis lácrimis, defúnctum revocávit ad vitam.
          Antiochíæ sancti Ioséphi Diáconi.
          Arvérnis, in Gállia, sanctæ Geórgiæ Vírginis.
      en2:
      - type: text
        text: |-
          The Fifteenth of February
      
          At Brescia, the birth of the holy Martyrs Faustinus and Jovita, brothers, who, under the Emperor Hadrian, after many glorious contests undertaken for the faith of Christ, received the victorious crown of martyrdom.
          At Rome, Saint Craton, Martyr, who, baptized with his wife and all his household by blessed Bishop Valentine, not long afterwards, together with them, was consummated in martyrdom.
          At Interamna, the birth of the holy Martyrs Saturninus, Castulus, Magnus, and Lucius.
          In the same place, Saint Agape, Virgin and Martyr.
          At Vaison, in France, Saint Quinidius, Bishop, whose precious death in the sight of the Lord is attested by frequent miracles.
          At Capua, Saint Decorosus, Bishop and Confessor.
          In the province of Valeria, Saint Severus, Priest, who (as Pope Saint Gregory writes), with floods of tears, called back a dead man to life.
          At Antioch, Saint Joseph, Deacon.
          Among the Arverni, in France, Saint Georgia, Virgin.
  psalm.quintod-cimo-kal-ndas-maii-ee8649e5b2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 17th day of April, were born into the better life:

          At Rome, the holy martyr Pope Anicetus, [in the year 175,] who received the palm of martyrdom in the persecution under Marcus Aurelius Antoninus and Lucius Verus.
          In Africa, the blessed martyr Mappalicus, who, [in the year 250,] was crowned, along with diverse other martyrs, as it is written by holy Cyprian in his epistle to the Martyrs and Confessors.
          Likewise in Africa, the holy martyrs Fortunatus and Marcian.
          At Antioch, the holy martyrs Peter the Deacon and Hermogenes his servant.
          At Cordova, the holy martyrs Elias the Priest, and the monks Paul and Isidore, [in the year 856.]
          At Vienne, [in the year 540,] holy Pantagathus, Bishop [of that see. He sat for five years and is reckoned the twentieth Bishop of the see. He was present at the Third Council of Orleans. He had been consul.]
          At Tortona, the holy Confessor Innocent, Bishop [of that see, in the year 351.]
          In the monastery of Chaise-Dieu, in the Diocese of Clermont, the holy Confessor Robert, the founder and first Abbot of that monastery, [in the year 1067.]
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Maii

          Romæ sancti Anicéti, Papæ et Mártyris; qui martýrii palmam in persecutióne Marci Aurélii Antoníni et Lúcii Veri accépit.
          Córdubæ, in Hispánia, sanctórum Mártyrum Eliæ Presbýteri, Pauli et Isidóri Monachórum, qui, in persecutióne Arábica, ob Christiánæ fídei professiónem, interémpti sunt.
          Antiochíæ sanctórum Mártyrum Petri Diáconi, et Hermógenis, qui eiúsdem Petri erat miníster.
          In Africa natális beáti Mappálici Mártyris, qui (ut scribit sanctus Cypriánus in epístola ad Mártyres et Confessóres), cum áliis plúribus, martýrio coronátus est.
          Ibídem sanctórum Mártyrum Fortunáti et Marciáni.
          Viénnæ, in Gállia, sancti Pantágathi Epíscopi.
          Dertónæ sancti Innocéntii, Epíscopi et Confessóris.
          Cistércii, in Gállia, sancti Stéphani Abbátis, qui primus erémum Cisterciénsem incóluit, et sanctum Bernárdum, cum sóciis ad se veniéntem, lætus excépit.
          In monastério Casæ Dei, Claromontánæ diœcésis, in Gállia, sancti Robérti Confessóris, qui eiúsdem monastérii cónditor et primus Abbas éxstitit.
      en2:
      - type: text
        text: |-
          The Seventeenth of April
      
          At Rome, Saint Anicetus, Pope and Martyr; who received the palm of martyrdom in the persecution of Marcus Aurelius Antoninus and Lucius Verus.
          At Córdoba, in Spain, the holy Martyrs Elias the Priest, Paul, and Isidore, Monks, who, in the Arabian persecution, were slain for professing the Christian faith.
          At Antioch, the holy Martyrs Peter the Deacon, and Hermogenes, who was the minister of the same Peter.
          In Africa, the birth of blessed Mappalicus, Martyr, who (as Saint Cyprian writes in a letter to Martyrs and Confessors), was crowned with martyrdom together with many others.
          In the same place, the holy Martyrs Fortunatus and Marcianus.
          At Vienne, in France, Saint Pantegathus, Bishop.
          At Dertona, Saint Innocent, Bishop and Confessor.
          At Cîteaux, in France, Saint Stephen, Abbot, who first inhabited the wilderness of Cîteaux, and joyfully received Saint Bernard when he came to him with his companions.
          In the monastery of La Chaise-Dieu, in the Diocese of Clermont, in France, Saint Robert, Confessor, who was the founder and first Abbot of the same monastery.
  psalm.quintod-cimo-kal-ndas-nov-mbris-c67b14cb54:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18th day of October, were born into the better life:

          The blessed Evangelist Luke, who suffered many things for Christ's Name's sake, and died in Bithynia, full of the Holy Ghost. His bones were first brought to Constantinople, and thence to Padua.
          At Antioch, holy Asclepiades, Patriarch (of that see,) who was one of the noble multitude of martyrs who suffered gloriously under Macrinus.
          In the country of Beauvais, the holy martyr Justus, who, while he was yet a lad, was slain under the President Rictiovarus in the persecution under the Emperor Diocletian.
          At Neo-Caesarea, in Pontus, the holy martyr Athenodorus, Bishop (of that see.) He was brother of holy Gregory the Wonder-worker, was famous for his teaching, and was crowned with martyrdom in the persecution under the Emperor Aurelian.
          On the bank of the Euphrates, in Mesopotamia, (at the end of the fourth century,) the holy hermit Julian.
          At Rome, the holy Confessor Paul of the Cross, founder of the Congregation styled the Congregation of the Cross and Passion of our Lord Jesus Christ. He was famous for his marvelous innocency and devotion to penance, and kindled with an exceeding love toward Christ crucified. Pope Pius IX enrolled his name among those of the Saints, and appointed for his festival the 28th day of April.
          At Rome also, (in the third century,) holy Tryphonia, widow of Decius Caesar. She is buried in the Catacombs beside holy Hippolytus.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Novémbris

          In Bithýnia natális beáti Lucæ Evangelístæ, qui, multa passus pro Christi nómine, óbiit Spíritu Sancto plenus. Ipsíus autem ossa póstea Constantinópolim transláta sunt, et inde Patávium deláta.
          Romæ item natális sancti Pauli a Cruce, Presbýteri et Confessóris; qui Congregatiónis a Cruce et Passióne Dómini nostri Iesu Christi nuncupátæ Institútor fuit. Ipsum vero, mira innocéntia ac pæniténtia conspícuum et singulári in Christum crucifíxum caritáte incénsum, Pius Papa Nonus fastis Sanctórum adiúnxit, et eiúsdem festivitátem quarto Kaléndas Maii recoléndam indíxit.
          Arénis, in Hispánia, natális páriter sancti Petri de Alcántara, Sacerdótis ex Ordine Minórum et Confessóris; quem, propter admirábilem pæniténtiam múltaque mirácula, Clemens Nonus, Póntifex Máximus, Sanctórum número adscrípsit. Eius autem festum sequénti die celebrátur.
          Antiochíæ sancti Asclepíadis Epíscopi, qui fuit unus ex præcláro illórum Mártyrum número, qui glorióse sub Macríno passi sunt.
          Neocæsaréæ, in Ponto, sancti Athenodóri Epíscopi, qui fuit frater sancti Gregórii Thaumatúrgi; et, doctrína clarus, in persecutióne Aureliáni, martýrium consummávit.
          Sinomovíci, in território Bellovacénsi, sancti Iusti Mártyris, qui adhuc puer, in persecutióne Diocletiáni Imperatóris, sub Rictiováro Prǽside, cápite amputátus est.
          Romæ sanctæ Tryphóniæ, quæ Décii Cǽsaris quondam uxor ac sanctæ Vírginis et Mártyris Cyríllæ mater éxstitit; cuius corpus in crypta, iuxta sanctum Hippólytum, sepúltum est.
          Apud Auriesville, in statu Neo-Eboracénsi, sanctórum Mártyrum e Societáte Iesu, Isaáci Iogues, Sacerdótis, et Ioánnis de La Lande, Coadiutóris temporális, qui hac et sequénti die ab Iroquénsibus dire necáti sunt, eódem loco ubi, paucis ante annis, Renátus Goupil, et ipse Coadiútor temporális, martýrii palmam consecútus fúerat.
          In fínibus Edessénæ regiónis, in Mesopotámia, commemorátio sancti Iuliáni Eremítæ, cognoménto Sabæ, de quo ágitur étiam sextodécimo Kaléndas Februárii.
      en2:
      - type: text
        text: |-
          The Eighteenth of October
      
          In Bithynia, the birth of blessed Luke the Evangelist, who, having suffered much for the name of Christ, died full of the Holy Spirit. His bones were afterwards translated to Constantinople, and from there brought to Padua.
          At Rome, likewise the birth of Saint Paul of the Cross, Priest and Confessor; who was the Founder of the Congregation named from the Cross and Passion of our Lord Jesus Christ. Him, renowned for wondrous innocence and penance and inflamed with a singular charity toward Christ crucified, Pope Pius the Ninth enrolled in the register of the Saints, and appointed his feast to be celebrated on the twenty-eighth of April.
          At Arenas, in Spain, likewise the birth of Saint Peter of Alcantara, Priest of the Order of Friars Minor and Confessor; whom, on account of his admirable penance and many miracles, Pope Clement the Ninth, Supreme Pontiff, enrolled among the Saints. His feast, however, is celebrated on the following day.
          At Antioch, Saint Asclepiades, Bishop, who was one of the number of those illustrious Martyrs who suffered gloriously under Macrinus.
          At Neocaesarea, in Pontus, Saint Athenodorus, Bishop, who was the brother of Saint Gregory the Wonderworker; and, renowned for learning, completed his martyrdom in the persecution of Aurelian.
          At Sinomovicum, in the territory of Beauvais, Saint Justus, Martyr, who while still a boy, in the persecution of the Emperor Diocletian, under the Governor Rictiovarus, was beheaded.
          At Rome, Saint Tryphonia, who was once the wife of the Caesar Decius and the mother of the holy Virgin and Martyr Cyrilla; whose body was buried in a crypt beside Saint Hippolytus.
          At Auriesville, in the State of New York, the holy Martyrs of the Society of Jesus, Isaac Jogues, Priest, and John de La Lande, temporal Coadjutor, who on this and the following day were cruelly slain by the Iroquois, at the same place where, a few years before, René Goupil, himself also a temporal Coadjutor, had obtained the palm of martyrdom.
          On the borders of the region of Edessa, in Mesopotamia, a commemoration of Saint Julian the Hermit, surnamed Saba, who is also commemorated on the seventeenth of January.
  psalm.quintod-cimo-kal-ndas-oct-bris-ee1dca68c0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we commemorate

          The making of the sacred marks which God was pleased by a wonderful grace to make upon the hands, feet, and side of holy Francis, Founder of the Order of Friars Minor, upon Mount Alvernia in Tuscany.
          Upon the same 17th day of September, were born into the better life:
          At Rome, upon the Tiburtine Way, the holy martyr Justin, a Priest who was famous for his glorious confession of Christ in the persecution under the Emperors Valerian and Gallienus. He buried the bodies of the blessed Pope Xystus, of Lawrence, of Hippolytus, and of many other saints, and at length himself achieved martyrdom under Claudius.
          Likewise at Rome, (under the Emperor Valerian,) the holy martyrs Narcissus and Crescentio.
          In Phrygia, holy Ariadne, martyred under the Emperor Hadrian.
          In Britain, (in the fourth century,) the holy martyrs Socrates and Stephen.
          At Nyon, (on the Lake of Geneva,) the holy martyrs Valerian, Macrinus, and Gordian.
          At Autun, the holy lad Flocellus, who suffered many things under the Emperor Antonine and the President Valerian, and at last was torn by wild beasts, and so received the crown of martyrdom.
          At Liege, blessed Lambert, Bishop of Maastricht. In his godly zeal he rebuked the Royal House (of Pepin,) whereupon the saint was slain by the sinners, and he went hence to live for ever in a mansion in the kingdom of heaven.
          At Zaragoza, in Spain, (in the year 1485,) holy Peter of Arbues, the first Inquisitor of the Faith in the kingdom of Aragon, who was cruelly murdered by some relapsed Jews for the sake of that Catholic faith which in his office he was zealously protecting. Pope Pius IX enrolled his name among those of the holy martyrs.
          Upon the same day, the holy Agathoclia, the handmaid of a certain unbelieving woman, who afflicted her of a long time with stripes and other sufferings, to make her deny Christ, and at length brought her before the judge, by whose orders she was very cruelly mangled and forasmuch as she still remained firm in the confession of the faith, her tongue was cut out, and she was cast into the fire.
          At Cordova, (in the persecution under the Moors, in the ninth century,) the holy Virgin and martyr Columba.
          At Milan, the holy Confessor Satyrus, whose excellences are recorded by his holy brother Ambrose.
          At Rome, the holy Matron Theodora, who ministered constantly to the holy martyrs in the persecution under Diocletian.
          At Bingen, in the diocese of Mainz, (in the year 1179,) the holy Virgin Hildegard.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Octóbris

          In monte Alvérniæ, in Etrúria, commemorátio Impressiónis sacrórum Stígmatum, quibus sanctus Francíscus, Ordinis Minórum Institútor, in suis mánibus, pédibus et látere, mirábili Dei grátia, impréssus fuit.
          Romæ natális sancti Robérti Bellarmíno, Confessóris, e Societáte Iesu, atque Cardinális et Capuáni olim Epíscopi, sanctitáte, doctrína, et plúrimis ad cathólicæ fídei et Apostólicæ Sedis defensiónem suscéptis labóribus claríssimi; quem Pius Undécimus, Póntifex Máximus, Sanctórum honóribus auxit et universális Ecclésiæ Doctórem declarávit, eiúsque festum tértio Idus Maii recoléndum indíxit.
          Romæ, via Tiburtína, natális sancti Iustíni, Presbýteri et Mártyris; qui, in persecutióne Valeriáni et Galliéni, ob confessiónis glóriam fuit insígnis. Hic beáti Pontíficis Xysti Secúndi, Lauréntii, Hippólyti aliorúmque plurimórum Sanctórum córpora sepelívit, ac demum, sub Cláudio, martýrium consummávit.
          Item Romæ sanctórum Mártyrum Narcíssi et Crescentiónis.
          Apud Leódium, in Bélgio, beáti Lambérti, Epíscopi Traiecténsis, qui, cum régiam domum zelo religiónis increpásset, a nocéntibus ínnocens occísus est, sicque aulam regni cæléstis perpétuo victúrus intrávit.
          Cæsaraugústæ, in Hispánia, sancti Petri de Arbues, primi in Aragóniæ regno Quæsitóris fídei; quem, a relápsis Iudǽis ob eándem, quam pro múnere suo strénue tuebátur, cathólicam fidem, immániter trucidátum, sanctórum Mártyrum catálogo Pius Papa Nonus adiúnxit.
          In Británia sanctórum Mártyrum Sócratis et Stéphani.
          Noviodúni, in Gálliis, sanctórum Mártyrum Valeriáni, Macríni et Gordiáni.
          Augustodúni sancti Flocélli púeri, qui, sub Antoníno Imperatóre et Valeriáno Prǽside, multa passus, demum, a feris discérptus, martýrii corónam adéptus est.
          Córdubæ, in Hispánia, sanctæ Colúmbæ, Vírginis et Mártyris.
          In Phrýgia sanctæ Ariádnæ Mártyris, sub Hadriáno Imperatóre.
          Eódem die sanctæ Agathoclíæ, quæ, cum esset ancílla cuiúsdam mulíeris infidélis, a dómina sua longo témpore verbéribus aliísque ærúmnis est vexáta ut Christum negáret; demum, obláta Iúdici ac sǽvius laniáta, et nihilóminus in confessióne fídei persístens, ídeo, post excisiónem linguæ, in ignem proiécta est.
          Medioláni deposítio sancti Sátyri Confessóris, cuius insígnia mérita sanctus Ambrósius, eius frater, commémorat.
          Apud Bíngiam, in diœcési Moguntinénsi, sanctæ Hildegárdis Vírginis.
          Romæ sanctæ Theodóræ matrónæ, quæ, in persecutióne Diocletiáni, sanctis Martýribus sédulo ministrábat.
      en2:
      - type: text
        text: |-
          The Seventeenth of September
      
          On Mount Alvernia, in Etruria, a commemoration of the impression of the sacred Stigmata, with which Saint Francis, Founder of the Order of Friars Minor, was marked in his hands, feet, and side, by the wondrous grace of God.
          At Rome, the birth of Saint Robert Bellarmine, Confessor, of the Society of Jesus, and Cardinal and former Bishop of Capua, most renowned for holiness, learning, and very many labors undertaken for the defense of the Catholic faith and the Apostolic See; whom Pope Pius the Eleventh, Supreme Pontiff, adorned with the honors of the Saints and declared a Doctor of the universal Church, and appointed his feast to be kept on the thirteenth of May.
          At Rome, on the Tiburtine Way, the birth of Saint Justin, Priest and Martyr; who, in the persecution of Valerian and Gallienus, was renowned for the glory of his confession. He buried the bodies of blessed Pope Sixtus the Second, Lawrence, Hippolytus, and many other Saints, and finally, under Claudius, completed his martyrdom.
          Likewise at Rome, the holy Martyrs Narcissus and Crescentio.
          At Liège, in Belgium, blessed Lambert, Bishop of Maastricht, who, when he had rebuked the royal household with zeal for religion, was innocently slain by the guilty, and thus entered for ever living the court of the heavenly kingdom.
          At Saragossa, in Spain, Saint Peter of Arbues, the first Inquisitor of the faith in the kingdom of Aragon; whom, savagely murdered by relapsed Jews on account of that same Catholic faith which he was vigorously guarding in the exercise of his office, Pope Pius the Ninth added to the catalogue of holy Martyrs.
          In Britain, the holy Martyrs Socrates and Stephen.
          At Noyon, in France, the holy Martyrs Valerianus, Macrinus, and Gordianus.
          At Autun, Saint Flocellus, a boy, who, under the Emperor Antoninus and the Governor Valerianus, having suffered greatly, was at last torn apart by wild beasts and obtained the crown of martyrdom.
          At Córdoba, in Spain, Saint Columba, Virgin and Martyr.
          In Phrygia, Saint Ariadne, Martyr, under the Emperor Hadrian.
          On the same day, Saint Agathoclia, who, being the slave of a certain unbelieving woman, was vexed for a long time by her mistress with blows and other afflictions to make her deny Christ; finally, brought before the judge and more savagely torn, and nevertheless persisting in the confession of the faith, was for this reason cast into the fire after the cutting out of her tongue.
          At Milan, the deposition of Saint Satyrus, Confessor, whose distinguished merits Saint Ambrose, his brother, recalls.
          At Bingen, in the Diocese of Mainz, Saint Hildegard, Virgin.
          At Rome, Saint Theodora, a matron, who, in the persecution of Diocletian, was diligently ministering to the holy Martyrs.
  psalm.quintod-cimo-kal-ndas-sept-mbris-133f99f6f6:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 18th day of August, were born into the better life:

          At Rome, upon the Lavican Way, [in the year 328,] holy [widow] Helen, [Empress of the West,] mother of that most religious Emperor Constantine the Great, who was the first to leave to other princes the pattern of how to protect and spread the Church.
          At Palestrina, Italy, [in the year 274,] the holy martyr Agapitus, [principal patron of the Church in Palestrina]; he was fifteen years of age, and hot with the love of Christ. He was tried by command of the Emperor Aurelian, and was first scourged for a very long time with raw thongs, afterwards he suffered worse under the Prefect Antiochus. By command of the Emperor he was thrown to lions, but as these hurt him not at all the servants smote him with the sword, and so he went to be crowned.
          At Rome, the blessed Priests John and Crispus. During the persecution under Diocletian they busied themselves in burying many bodies of the Saints, with whom they themselves were afterward made fellows, and gained the gladness of life eternal [by martyrdom.]
          Likewise at Rome, the holy martyrs Hermas, Serapion, and Polysenus, who were dragged through strait, rocky, and rough places until they gave up their souls to God.
          In Illyricum, [in the second century,] the holy martyrs Florus and Laurus, quarrymen, who, after their masters Proculus and Maximus had been martyred, were put to many torments, under the President Licion, and then thrown into a well.
          At Myra, in Lycia, the holy martyrs Leo and Juliana.
          At Metz, in Gaul, [in the fourth century,] the holy Confessor Firmin, [eleventh] Bishop [of that see.]
          At Montefalco, in Umbria, [in the year 1308,] the blessed Virgin Clare, a Nun of the Order of Hermits of St. Augustine, on whose heart the mysteries of the suffering of the Lord were found set forth anew, and are therein most reverently worshipped. The Supreme Pontiff Leo XIII solemnly enrolled her name in the list of those of the holy Virgins.
      la:
      - type: text
        text: |-
          Quintodécimo Kaléndas Septémbris

          Prænéste natális sancti Agapíti Mártyris, qui cum esset annórum quíndecim, et amóre Christi fervéret, iussu Aureliáni Imperatóris tentus, ac primo nervis crudis diutíssime cæsus, deínde sub Antíocho Præfécto gravióra supplícia passus; exínde cum ex præcépto Imperatóris leónibus obiicerétur, et mínime læsus esset, gládio ministrórum coronándus percútitur.
          Romæ beatórum Ioánnis et Crispi Presbyterórum, qui in persecutióne Diocletiáni multa Sanctórum córpora officiosíssime sepeliérunt, quorum méritis et ipsi póstmodum sociáti, gáudia vitæ ætérnæ meruérunt.
          Item Romæ sanctórum Mártyrum Hermæ, Serapiónis et Polyǽni, qui per angústa, saxósa et áspera loca raptáti, ánimas Deo reddidérunt.
          In Illýrico sanctórum Mártyrum Flori et Lauri artis lapicidínæ, qui, consúmptis martýrio eórum magístris Próculo et Máximo, sub Licióne Prǽside post multa torménta in profúndum púteum sunt demérsi.
          Myræ in Lýcia sanctórum Mártyrum Leónis et Iuliánæ.
          Metis in Gállia sancti Firmíni Epíscopi et Confessóris.
          Romæ via Lavicána sanctæ Hélenæ matris Constantíni Magni piíssimi Imperatóris, qui primus Ecclésiæ tuéndæ atque amplificándæ exémplum céteris Princípibus prǽbuit.
      en2:
      - type: text
        text: |-
          The Eighteenth of August
      
          At Praeneste, the birth of Saint Agapitus, Martyr, who, being fifteen years of age and burning with love of Christ, was seized by order of the Emperor Aurelian, first beaten for a very long time with raw sinews, then under the Prefect Antiochus suffered heavier punishments; then when by the Emperor's command he was thrown to the lions and was not harmed at all, he was struck by the sword of the ministers to be crowned.
          At Rome, the blessed Priests John and Crispus, who in the persecution of Diocletian most diligently buried the bodies of many Saints, and, associated with them by their own merits, afterwards themselves merited the joys of eternal life.
          Likewise at Rome, the holy Martyrs Hermas, Serapion, and Polyaenus, who, dragged through narrow, rocky, and rough places, gave up their souls to God.
          In Illyricum, the holy Martyrs Florus and Laurus, of the stonecutting trade, who, after their masters Proclus and Maximus had completed their martyrdom, were cast into a deep well under the Governor Licion after many torments.
          At Myra, in Lycia, the holy Martyrs Leo and Juliana.
          At Metz, in France, Saint Firminus, Bishop and Confessor.
          At Rome, on the Lavican Way, Saint Helena, mother of Constantine the Great, the most pious Emperor, who was the first to give the other princes an example of protecting and enlarging the Church.
  psalm.s-ptimo-idus-apr-lis-1b482345c9:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 7th day of April, were born into the better life:

          At Rouen, [in the year 17 19,] the holy Confessor John Baptist de la Salle. He was foremost in the teaching of the young, the poor especially, and deserved well of both religion and civil society. He founded the Congregation of the Brothers of the Christian Schools.
          In Africa, the holy martyrs Epiphanius, the Bishop, also Donatus, Rufinus, and thirteen others.
          At Synope, in Pontus, two hundred holy martyrs, [in the year 310.]
          [At Soti,] in Cilicia, the holy martyr Calliopius, who after diverse torments under the prefect Maximian was crucified head downwards, and so gained a noble crown of martyrdom, [in the year 304.]
          At Nicomedia, the holy martyrs Cyriacus and ten others.
          At Alexandria, the holy martyr Peleusius the Priest.
          At Rome, holy Hegesippus, who came to Pope Anicetus, at Rome, [in the year 157,] very soon after the time of the Apostles, and abode there until the time of Pope Eleutherius, [and died in the year 180.] He wrote in plain words a Church history from the Passion of the Lord until his own time, to set forth the lives of those in whose footsteps he followed.
          At Verona, the holy Confessor Saturninus, Bishop of that see, [in the fourth century.]
          In Syria, the holy Hermit Aphraates, who defended the Catholic faith by the power of his miracles against the Arians, in the time of the Emperor Valens.
      la:
      - type: text
        text: |-
          Séptimo Idus Aprílis

          Rotómagi natális sancti Ioánnis Baptístæ de La Salle, Presbýteri et Confessóris, qui, in erudiénda adolescéntia præsértim páupere excéllens, et de religióne civilíque societáte præcláre méritus, Fratrum Scholárum Christianárum Sodalitátem instítuit. Eum Pius Duodécimus, Póntifex Máximus, ómnium Magistrórum púeris adolescentibúsque instituéndis præcípuum apud Deum cæléstem Patrónum constítuit. Ipsíus tamen festum Idibus Maii celebrátur.
          In Africa item natális sanctórum Mártyrum Epiphánii Epíscopi, Donáti, Rufíni et aliórum trédecim.
          Alexandríæ sancti Peléusii, Presbýteri et Mártyris.
          Synópe, in Ponto, sanctórum ducentórum Mártyrum.
          In Cilícia sancti Calliópii Mártyris, qui, sub Maximiáno Præfécto, post ália torménta, cápite in terram verso cruci affíxus, nóbili coróna martýrii decorátus est.
          Nicomedíæ sancti Cyríaci et aliórum decem Mártyrum.
          Verónæ sancti Saturníni, Epíscopi et Confessóris.
          Romæ sancti Hegesíppi, qui, vicínus Apostolórum tempóribus, Romam venit ad Anicétum Pontíficem, ibíque mansit usque ad Eleuthérium, et Ecclesiasticórum Actuum a passióne Dómini usque ad suam ætátem sermóne símplici texuit históriam; ut, quorum vitam sectabátur, dicéndi quoque exprímeret charactére.
          In Sýria sancti Aphraátis Anachorétæ, qui, Valéntis témpore, cathólicam fidem virtúte miraculórum advérsus Ariános deféndit.
      en2:
      - type: text
        text: |-
          The Seventh of April
      
          At Rouen, the birth of Saint John Baptist de La Salle, Priest and Confessor, who, excelling in educating youth, especially the poor, and having served religion and civil society in a most distinguished manner, founded the Brotherhood of the Christian Schools. Pope Pius the Twelfth, Supreme Pontiff, appointed him the principal heavenly Patron before God of all teachers engaged in educating boys and youths. However, his feast is celebrated on the Ides of May.
          In Africa, likewise the birth of the holy Martyrs Epiphanius the Bishop, Donatus, Rufinus, and thirteen others.
          At Alexandria, Saint Peleusius, Priest and Martyr.
          At Sinope, in Pontus, two hundred holy Martyrs.
          In Cilicia, Saint Callopius, Martyr, who, under the Governor Maximian, after other torments, was affixed to a cross head-downward, and was adorned with the noble crown of martyrdom.
          At Nicomedia, Saint Cyriacus and ten other Martyrs.
          At Verona, Saint Saturninus, Bishop and Confessor.
          At Rome, Saint Hegesippus, who, close to the time of the Apostles, came to Rome to the Pontiff Anicetus, and remained there until Eleutherius, and wrote a simple narrative of the Acts of the Church from the Passion of the Lord down to his own time; so that, as he had followed the manner of life of those whose history he wrote, he might also express their character in style.
  psalm.s-ptimo-idus-aug-sti-f81a57cfa0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 7th day of August, were born into the better life:

          At Naples, in Campania, [in the year 1547,] the holy Confessor Gaetan of Tiene, Founder of the Clerks Regular, who with wonderful confidence in God enjoined upon them the first way of living of the Apostles. He was famous for miracles, and Clement X. enrolled his name among those of the Saints.
          At Arezzo, in Tuscany, [in the year 362,] the holy martyr Donatus, Bishop [of that see.], who among other miraculous deeds, by his prayers (as is related by blessed Pope Gregory) made whole again a sacred chalice which had been broken by pagans. He was arrested by the imperial officer Quadratian in the persecution under the Emperor Julian the Apostate, and for as much as he refused to sacrifice to idols he was beheaded, and so finished his testimony. There suffered also along with him the blessed monk Hilarinus, whose feast is kept upon the 16th day of July, being the day whereon his body was brought to Ostia.
          At Rome, [in the third century,] the holy martyrs Peter and Julian, and eighteen others.
          At Milan, [in the second century,] the holy soldier Faustus, who under the Emperor Aurelius Commodus, after many contendings, gained the crown of martyrdom.
          At Como, [in the district of Milan,] the holy martyrs Carpophorus, Exanthus, Cassius, Severinus, Secundus, and Licinius, who were beheaded, [about the year 303,] for confessing Christ.
          At Nisibis, in Mesopotamia, [in the year 363,] holy Dometius, a Persian monk, who was stoned to death with two of his disciples, under the Emperor Julian the Apostate.
          At Rouen, [about the year 407,] holy Vitricius, Bishop [of that see.] He was a soldier who threw away his belt for Christ's sake under the same Emperor Julian. He was put to many torments by his Tribune, and condemned to death, but the executioner who had been sent to behead him was struck blind, and he got his bonds loosed, and escaped. He afterwards became a Bishop, and by his preaching of the word brought the unconquered tribes of the Morini and Nervii to believe in Christ, and at the last fell asleep in peace.
          At Châlons[-sur-Marne,] in Gaul, [in the year 136,] holy Donatian, Bishop [of Châlons.]
          At Messina, in Sicily, [in the year 1306,] the holy Confessor Albert, of the Order of Carmelites, famous for miracles.
      la:
      - type: text
        text: |-
          Séptimo Idus Augústi

          Neápoli, in Campánia, sancti Caietáni Thienǽi Confessóris, Clericórum Regulárium Fundatóris, qui, singulári in Deum fidúcia, prístinam Apostólicam vivéndi formam suis coléndam trádidit, et, miráculis clarus, a Cleménte Papa Décimo inter Sanctos relátus est.
          Arétii, in Túscia, natális sancti Donáti, Epíscopi et Mártyris; qui, inter cétera virtútis ópera (ut scribit beátus Gregórius Papa), cálicem sanctum, a Pagánis fractum, orándo instaurávit. Is, in persecutióne Iuliáni Apóstatæ, a Quadratiáno Augustáli comprehénsus, et, cum sacrificáre idólis renuísset, gládio percússus, martýrium consummávit. Passus est étiam cum eo beátus Hilarínus Mónachus; cuius memória décimo séptimo Kaléndas Augústi recólitur, quo die sacrum ipsíus corpus ad Ostia Tiberína translátum fuit.
          Romæ sanctórum Mártyrum Petri et Iuliáni, cum áliis decem et octo.
          Medioláni sancti Fausti mílitis, qui, sub Aurélio Cómmodo, post multa certámina, martýrii palmam adéptus est.
          Novocómi pássio sanctórum Mártyrum Carpóphori, Exánthi, Cássii, Severíni, Secúndi et Licínii; qui, in confessióne Christi, cápite truncáti sunt.
          Nísibi, in Mesopotámia, sancti Dométii, Mónachi Persæ, qui cum duóbus discípulis, sub Iuliáno Apóstata, lapidátus est.
          Rotómagi sancti Victrícii Epíscopi, qui adhuc miles, sub eódem Iuliáno, abiíciens pro Christo cíngulum, a Tribúno multis torméntis affícitur, et cápitis damnátur; sed, carnífice, qui ad eum cædéndum missus fúerat, cæcitáte percússo, ipse, vínculis solútis, liber evásit. Póstea, Epíscopus factus, indómitas Morinórum et Nerviórum gentes divíni prædicatióne verbi ad Christi fidem perdúxit, et demum Conféssor in pace quiévit.
          Cataláuni, in Gállia, sancti Donatiáni Epíscopi.
          Messánæ, in Sicília, sancti Albérti Confessóris, ex Ordine Carmelitárum, miráculis clari.
      en2:
      - type: text
        text: |-
          The Seventh of August
      
          At Naples, in Campania, Saint Cajetan of Thiene, Confessor, Founder of the Clerics Regular, who, with singular trust in God, handed on to his followers the pristine apostolic form of life to be practiced, and, renowned for miracles, was enrolled among the Saints by Pope Clement the Tenth.
          At Arezzo, in Tuscany, the birth of Saint Donatus, Bishop and Martyr; who, among other works of virtue (as blessed Pope Gregory writes), restored by prayer a holy chalice that had been broken by pagans. He, in the persecution of Julian the Apostate, was seized by the Augustalian Quadratianus, and, when he refused to sacrifice to idols, was struck with the sword and completed his martyrdom. With him also suffered blessed Hilarinus, Monk; whose memory is recalled on the sixteenth of July, the day on which his sacred body was translated to Ostia on the Tiber.
          At Rome, the holy Martyrs Peter and Julian, with eighteen others.
          At Milan, Saint Faustus, a soldier, who, under Aurelius Commodus, after many contests, obtained the palm of martyrdom.
          At Como, the passion of the holy Martyrs Carpophorus, Exanthus, Cassius, Severinus, Secundus, and Licinius; who, confessing Christ, were beheaded.
          At Nisibis, in Mesopotamia, Saint Dometius, a Persian Monk, who together with two disciples was stoned under Julian the Apostate.
          At Rouen, Saint Victricius, Bishop, who, still a soldier under the same Julian, throwing down his belt for Christ, was subjected by the Tribune to many torments and condemned to beheading; but the executioner who had been sent to behead him was struck with blindness, and he himself, freed from his bonds, escaped. Afterwards, made a Bishop, he led the untamed peoples of the Morini and Nervii to the faith of Christ by the preaching of the divine word, and at last rested in peace as a Confessor.
          At Châlons, in France, Saint Donatianus, Bishop.
          At Messina, in Sicily, Saint Albert, Confessor, of the Order of Carmelites, renowned for miracles.
  psalm.s-ptimo-idus-dec-mbris-0f81091172:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the eve of the Immaculate Conception of the Blessed Virgin Mary. On the same day is kept the feast of the holy Confessor Ambrose, Archbishop of Milan, and Doctor of the universal Church, the which is adorned by his holiness and teaching. (His birth into the better life, in the year 397, is recorded upon the 4th day of April. The 7th day of December is the day of his ordination to the Bishopric of Milan.)
          Upon the same 7th day of December, were born into the better life:

          At Alexandria, the blessed soldier Agatho. During the persecution under the Emperor Decius, there were some that would make mock of the bodies of the martyrs, and Agatho forbade them, whereupon straightway a cry of the whole mob was got up against him, he was brought before the judge, and as he stood firm in the confession of Christ he was beheaded, (about the year 250.)
          At Antioch, the holy martyrs Polycarp and Theodore.
          At Tebourba, in Africa, the holy martyr Servus, who in the Vandal persecution under the Arian king Hunneric, was long cudgelled, repeatedly jerked up with pulleys and dropped upon flints, and scraped with sharp stones, and by this torment gained the palm of martyrdom, (in the year 384.)
          At Chieti, in the kingdom of Naples, (in the ninth century,) the holy Confessor Urban, Bishop of (that see.)
          At Saintes, in Gaul, (about the year 400,) the holy Abbot Martin, at whose grave by the power of God famous miracles are oftentimes wrought. (He was the founder and first Abbot of the Monastery of Sanjon.)
          At Meaux, (in the year 657,) the holy Virgin Fara (de Champigny, Abbess of Faremoutier, in the diocese of Meaux.)
      la:
      - type: text
        text: |-
          Séptimo Idus Decémbris

          Sancti Ambrósii Epíscopi, Confessóris et Ecclésiæ Doctóris, qui prídie Nonas Aprílis obdormívit in Dómino, sed hac die potíssimum cólitur, qua Mediolanénsem Ecclésiam gubernándam suscépit.
          Romæ beáti Eutychiáni Papæ, qui per divérsa loca trecéntos quadragínta duos Mártyres manu sua sepelívit; quibus et ipse deínde sociátus, sub Numeriáno Imperatóre, martýrio coronátus est, et in cœmetério Callísti sepúltus.
          Alexandríæ natális beáti Agathónis militáris, qui, in persecutióne Décii, cum prohíberet quosdam voléntes illúdere cadavéribus Mártyrum, clamor repénte totíus vulgi advérsus eum extóllitur; oblátus autem Iúdici, et in Christi confessióne persístens, cápite pro pietáte damnátus est.
          Antiochíæ sanctórum Mártyrum Polycárpi et Theodóri.
          Tubúrbi, in Africa, sancti Servi Mártyris, qui, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, fústibus diutíssime cæsus, tróchleis frequénter in sublíme elevátus atque ictu céleri super sílices póndere córporis dimíssus, et lapídibus acutíssimis perfricátus, martýrii palmam adéptus est.
          Theáni, in Campánia, sancti Urbáni, Epíscopi et Confessóris.
          Apud Sántonas, in Gállia, sancti Martíni Abbátis, ad cuius túmulum crebérrima divínitus fiunt mirácula.
          Eboriáci, in território Meldénsi, commemorátio sanctæ Faræ, étiam Burgundofáræ nómine appellátæ, Abbatíssæ et Vírginis, cuius dies natális tértio Nonas Aprílis recensétur.
      en2:
      - type: text
        text: |-
          The Seventh of December
      
          Saint Ambrose, Bishop, Confessor and Doctor of the Church, who fell asleep in the Lord on the fourth of April, but is especially venerated on this day, on which he undertook the governance of the Church of Milan.
          At Rome, blessed Eutychianus, Pope, who with his own hands buried three hundred and forty-two Martyrs in various places; and was himself afterwards joined to them and, under the Emperor Numerian, crowned with martyrdom, and buried in the cemetery of Callistus.
          At Alexandria, the birth of blessed Agathon the soldier, who, in the persecution of Decius, when he was preventing certain persons who wished to mock the bodies of the Martyrs, the cry of the whole multitude was suddenly raised against him; brought before the judge and persisting in the confession of Christ, he was condemned to death for his piety.
          At Antioch, the holy Martyrs Polycarp and Theodore.
          At Thuburbo, in Africa, Saint Servus, Martyr, who, in the Vandal persecution, under the Arian King Hunneric, beaten with rods for a very long time, frequently raised to a height on rack-wheels and let down with a swift blow onto the flint stones, and rubbed against the sharpest stones, obtained the palm of martyrdom.
          At Teano, in Campania, Saint Urban, Bishop and Confessor.
          At Saintes, in France, Saint Martin, Abbot, at whose tomb most frequent miracles are wrought by God.
          At Evoriacum, in the territory of Meaux, a commemoration of Saint Fara, also called Burgundofara, Abbess and Virgin, whose birth-day is noted on the fifth of April.
  psalm.s-ptimo-idus-febru-rii-ee590b2702:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Abbot Romuald, [buried at Fabriano in Piceno, in the year 1027,] father of the monks of the Camaldolese Institute, of whom mention is made upon the 19th day of June.
          Upon the same 7th day of February, were born into the better life:

          In London, [in the fourth century,] the blessed Augulus, Bishop of that city, who ended his life by martyrdom, and so secured the everlasting prize.
          In Phrygia, the holy martyr Adaucus. He was an Italian of noble birth, and had been honoured by the emperors with dignities of almost every rank, and was still quaestor when he gained the crown of martyrdom in defence of the faith, [in the year 304, at Andandros, a town of Phrygia.] Likewise many other holy martyrs, citizens of the same city, [including the Prefect of the Treasury, the Military Prefect, and the Senate,] who followed with Adaucus. They were all Christians and remained steadfast in the confession of the faith, and the Emperor Galerius Maximian caused them all to be burned with fire.
          At Heraclea, the holy martyr Theodore. He was a trainer of the soldiery, and in the reign of the Emperor Licinius was beheaded after suffering many torments, and so passed away a conqueror to heaven, [in the year 319.]
          In Egypt, holy Moses, the venerable Bishop of [the Saracens in Arabia.] He first lived as a hermit in the desert, but afterwards was made Bishop at the desire of Mauvia, Queen of the Saracens, converted many of that fierce people to the faith, and at length fell asleep in peace, glorious for worthy works.
          At Lucca, in Tuscany, [in the year 722,] holy Richard, Prince of the West Saxons in England, and father of holy Winibald, Willibald, and Walburg.
          At Bologna, [in the year 430,] the holy widow Juliana.
      la:
      - type: text
        text: |-
          Séptimo Idus Februárii

          Sancti Romuáldi Abbátis, Monachórum Camaldulénsium Patris, cuius dies natális tertiodécimo Kaléndas Iúlii recensétur, sed festívitas hac die, ob Translatiónem córporis eius, potíssimum celebrátur.
          Augústæ, cui nunc Londíni nomen, in Británnia, natális beáti Auguli Epíscopi, qui, ætátis cursu per martýrium expléto, ætérna prǽmia suscípere méruit.
          In Phrýgia sancti Adáuci Mártyris, qui, ex Itálico génere clarus, et omni fere dignitátum gradu ab Imperatóribus insignítus, tandem, cum adhuc Quæstóris offício fungerétur, martýrii coróna pro fídei defensióne dignátus est.
          Ibídem plurimórum sanctórum Mártyrum, urbis uníus cívium, quorum dux erat idem Adáucus; qui, cum omnes Christiáni essent, et constánter in fídei confessióne persísterent, a Galério Maximiáno Imperatóre sunt igne consúmpti.
          Heracléæ, in Ponto, sancti Theodóri, ductoris mílitum, qui, Licínio imperánte, post multa torménta, truncátus cápite, victor migrávit in cælum.
          In Ægýpto sancti Móysis, Epíscopi venerábilis, qui primum in erémo vitam solitáriam duxit; deínde, peténte Regína Saracenórum Máuvia, Epíscopus factus, gentem illam ferocíssimam magna ex parte ad fidem convértit, et gloriósus méritis quiévit in pace.
          Lucæ, in Túscia, deposítio sancti Richárdi, Regis Anglórum, qui pater éxstitit sancti Willebáldi, Eystetténsis Epíscopi, ac sanctæ Walbúrgæ Vírginis.
          Bonóniæ sanctæ Iuliánæ Víduæ.
      en2:
      - type: text
        text: |-
          The Seventh of February
      
          Saint Romuald, Abbot, Father of the Camaldolese Monks, whose birth-day is noted on the nineteenth of June, but the feast is most especially celebrated on this day, on account of the Translation of his body.
          At Augusta, now called London, in Britain, the birth of blessed Augulus, Bishop, who, completing the course of his age through martyrdom, merited to receive eternal rewards.
          In Phrygia, Saint Adauctus, Martyr, who, of Italian birth and distinguished, honored with nearly every grade of dignity by the emperors, at last, while still serving in the office of Quaestor, was honored with the crown of martyrdom for defending the faith.
          In the same place, very many holy Martyrs, citizens of one city, whose leader was the same Adauctus; who, as they were all Christians and persisted steadfastly in the confession of the faith, were consumed by fire by the Emperor Galerius Maximianus.
          At Heraclea, in Pontus, Saint Theodore, a military commander, who, under the Emperor Licinius, after many torments, was beheaded and departed as a victor to heaven.
          In Egypt, Saint Moses, a venerable Bishop, who first led the solitary life in the desert; then, at the request of the Saracen Queen Mauvia, was made a Bishop, converted that most ferocious people in great part to the faith, and rested in peace glorious in his merits.
          At Lucca, in Tuscany, the deposition of Saint Richard, King of the English, who was the father of Saint Willibald, Bishop of Eichstätt, and of Saint Walburga, Virgin.
          At Bologna, Saint Juliana, Widow.
  psalm.s-ptimo-idus-i-lii-5097c87876:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of

          Holy Confessor Willibald, first Bishop of Eichstätt, in Saxony, who laboured in the Gospel along with holy Boniface, and turned many peoples to, Christ, [in the year 786,] of whom mention is made upon the 7th day of this present month of July.
          Upon the same 9th day of July, were born into the better life:
          At Rome, at the Dropping Well, the holy martyrs Zeno and ten thousand two hundred and three others, [third century.]
          At Gortyna, in Crete, the holy Cyril, Bishop [of that see.] In the persecution under Decius he was cast into the fire by order of the President Lucius, when his bonds were burnt but he escaped unburnt, and the judge was so confounded at such a marvel that, he would have let him go free, had he not there and then with lively faith proclaimed Christ, wherefore he caused him to be beheaded.
          At Tora, on Lake Velino, in the persecution under the Emperor Decius, the holy martyrs Anatolia and Audax. Anatolia was a Virgin of Christ, she had healed many sick of diverse diseases throughout the whole province of Picenum, and turned them to Christ, when by command of the judge Faustinian she suffered diverse punishments. She was delivered from a serpent which was sent against her and converted Audax to the faith, and at last was run through with a sword as she stood praying with outspread hands. Audax also was thrown into prison, and forthwith received his crown by being beheaded.
          At Alexandria, the holy martyrs Patermuth, Copres, and Alexander, who were slain under the Emperor Julian the Apostate.
          At Brielle, in Holland, the nineteen holy martyrs who are called the Martyrs of Gorcum. They were subjected to diverse mockings and torments, and at last put to death, [in the year 1572,] by the Calvinist heretics, because they defended the authority of the Church of Rome and the real presence of Christ in the Eucharist. Their names were enrolled among those of the holy martyrs by the Supreme Pontiff Pius IX.
          At Martula, in Umbria, the holy Confessor Brictius he suffered many things under Marcian the judge, for confessing the Lord, and when he had turned a great multitude of people to Christ he fell asleep in the Lord. [He was Bishop of Martula at the end of the sixth century.]
          At Città di Castello, the holy Virgin Veronica de Quiliani, of the Order of Friars Minors Capuchins, Abbess of the Convent of Poor Clares at Citta di Castello. [She was born on December 27, 1660, at Mercatello, a little town in the Duchy of Urbino.] Famous for her wonderful love of suffering and other excellences and gifts of heavenly grace, [in the year 1727,] Pope Gregory XVI enrolled her name among those of the holy Virgins.
      la:
      - type: text
        text: |-
          Séptimo Idus Iúlii

          Romæ, ad Guttam iúgiter manántem, natális sanctórum Mártyrum Zenónis, et aliórum decem míllium ac ducentórum trium.
          Gortýnæ, in Creta, sancti Cyrílli Epíscopi, qui, in persecutióne Décii, sub Lúcio Prǽside, flammis est iniéctus, et, cum ab igne, incénsis vínculis, illǽsus evasísset, ac stupóre tanti miráculi a Iúdice dimíssus esset, rursus ab eódem, pro instánti et álacri fídei prædicatióne facta de Christo, comprehénsus et cápite plexus est.
          Brilæ, in Hollándia, pássio novémdecim Mártyrum, Gorcomiénsium nuncupatórum; quorum ex número novem Sacerdótes ac duo Láici erant Fratres Minóres, quátuor Presbýteri sæculáres, duo Præmonstraténses, unus Reguláris Canónicus sancti Augustíni, et unus Dominicánus. Hi omnes, ob tuéndam Ecclésiæ Románæ auctoritátem et reálem Christi in Eucharístia præséntiam, a Calviniánis hæréticis vária ludíbria et torménta perpéssi, tandem, in trabem acti, agónem suum, adstríctis láqueo fáucibus, consummárunt; et a Pio Nono, Pontífice Máximo, inter sanctos Mártyres reláti sunt.
          In civitáte Thora, apud lacum Velínum, item pássio sanctórum Anatóliæ et Audácis, sub Décio Imperatóre. Ex his Anatólia, Christi Virgo, postquam plúrimos per totam Picéni provínciam váriis languóribus afféctos curásset et in Christum credéntes fecísset, Iúdicis Faustiniáni iussu divérsis pœnárum genéribus est vexáta, et, cum ab immísso serpénte líbera evádens Audácem convertísset ad fidem, novíssime, exténsis mánibus orans, gládio transverberáta est; Audax quoque, in custódiam tráditus, sine mora senténtia capitáli coronátur.
          Alexandríæ sanctórum Mártyrum Patermúthii, Coprétis et Alexándri; qui sub Iuliáno Apóstata cæsi sunt.
          Mártulæ, in Umbria, sancti Bríctii Epíscopi, qui, sub Marciáno Iúdice, ob confessiónem Dómini, multa passus est; ac tandem, cum magnam pópuli multitúdinem ad Christum convertísset, Conféssor in pace quiévit.
          Tiférni, in Umbria, sanctæ Verónicæ de Iuliánis Vírginis, in Urbaniénsis diœcésis óppido Mercatéllo natæ, Moniális e secúndo sancti Francísci Ordine ac Tifernátis ascetérii Abbatísse; quam, insígni patiéndi stúdio, ceterísque virtútibus, et cæléstibus charismátibus illústrem, Gregórius Papa Décimus sextus in sanctárum Vírginum collégium adscrípsit.
      en2:
      - type: text
        text: |-
          The Ninth of July
      
          At Rome, at the perpetually flowing Gutta, the birth of the holy Martyrs Zenon, and ten thousand two hundred and three others.
          At Gortyna, in Crete, Saint Cyril, Bishop, who, in the persecution of Decius, under the Governor Lucius, was cast into flames, and, having escaped unharmed from the fire with his bonds burned off, and dismissed by the judge in astonishment at so great a miracle, was again seized by him for his persistent and eager preaching of the faith concerning Christ, and was beheaded.
          At Brielle, in Holland, the passion of nineteen Martyrs, called the Martyrs of Gorcum; of whose number nine Priests and two Laymen were Friars Minor, four secular Priests, two Premonstratensians, one Canon Regular of Saint Augustine, and one Dominican. All of these, for defending the authority of the Roman Church and the real presence of Christ in the Eucharist, endured various mockeries and torments at the hands of Calvinist heretics, and at last, driven onto a beam, completed their combat, their throats tightened with a noose; and they were enrolled among the holy Martyrs by Pope Pius the Ninth, Supreme Pontiff.
          In the city of Thora, near Lake Velino, likewise the passion of Saints Anatolia and Audax, under the Emperor Decius. Of these, Anatolia, a Virgin of Christ, after she had healed very many throughout all the province of Picenum who were afflicted with various diseases and had made them believe in Christ, was vexed with various kinds of punishments by order of the judge Faustinianus, and, having converted Audax to the faith by escaping unharmed from the serpent sent against her, was finally pierced with a sword while praying with hands outstretched; Audax also, handed over to custody, without delay was crowned by a capital sentence.
          At Alexandria, the holy Martyrs Patermuthius, Copres, and Alexander; who were slain under Julian the Apostate.
          At Martula, in Umbria, Saint Brictius, Bishop, who, under the judge Marcianus, suffered much for confessing the Lord; and at last, having converted a great multitude of people to Christ, rested in peace as a Confessor.
          At Città di Castello, in Umbria, Saint Veronica Giuliani, Virgin, born in the town of Mercatello in the Diocese of Urbania, a Nun of the Second Order of Saint Francis and Abbess of the monastery at Città di Castello; whom, illustrious for her distinguished eagerness to suffer, other virtues, and heavenly charisms, Pope Gregory the Sixteenth enrolled in the college of holy Virgins.
  psalm.s-ptimo-idus-i-nii-42ba4d66a4:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the seventh day of June, were born into the better life:

          At Constantinople, the holy Paul, Archbishop of that city. He was oftentimes thrust out by the Arians because of the Catholic faith, and brought back again by the holy Roman Pontiff, Julius I. At length he was banished by the Arian Emperor Constantius to Cucusus, a little town in Cappadocia, where he was cruelly strangled by Arian plotters, and so passed into the kingdom of heaven. His body was brought to Constantinople with great reverence [thirty years later,] in the time of the Emperor Theodosius.
          In Egypt, the holy martyr Licarion, who was mangled, beaten with red-hot iron rods, and suffered other dreadful torments before he was smitten with the sword, and so finished his testimony.
          At Cordova, the holy Monks Peter, Wallabond, Sabinian, Wistremund, Habentius, and Jeremiah, of whom Peter was a Priest and Wallabond a 1154,] the holy Confessor William, Deacon, martyrs [under the Muslims.] Archbishop [of that see,].
          In England, the holy Abbot Robert, of the Cistercian Order. His grave did raise three dead men to life, and who was written in the list of the Saints by Pope Honorius.
          At Aix, in Gaul, holy Maximin, first Bishop of that city.
      la:
      - type: text
        text: |-
          Séptimo Idus Iúnii

          Constantinópoli natális sancti Pauli, eiúsdem civitátis Epíscopi, qui sæpe ab Ariánis ob fidem cathólicam pulsus, et a sancto Iúlio Primo, Románo Pontífice, restitútus est; ac demum, ab Ariáno Imperatóre Constántio relegátus ad Cucúsum, Cappadóciæ oppídulum, ibídem, Arianórum insídiis crudéliter strangulátus, ad cæléstia regna migrávit. Ipsíus autem corpus, Theodósio Imperatóre, Constantinópolim summo honóre translátum fuit.
          Córdubæ, in Hispánia, sanctórum Monachórum et Mártyrum Petri Presbýteri, Wallabónsi Diáconi, Sabiniáni, Wistremúndi, Habéntii et Ieremíæ, qui pro Christo, in persecutióne Arábica, sunt iuguláti.
          Hermópoli, in Ægýpto, sancti Lycariónis Mártyris, qui laniátus, virgis férreis ignítis cæsus, alíaque sævíssima passus est, ac demum, gládio percússus, martýrium consummávit.
          Placéntiæ sancti Antónii Maríæ Gianélli, Bobiénsis Epíscopi, Fundatóris Congregatiónis Filiárum Maríæ sanctíssimæ ab Horto nuncupatárum, quem Pius Papa Duodécimus inter sanctos Cǽlites adnumerávit.
          In Anglia sancti Robérti Abbátis, ex Ordine Cisterciénsi.
      en2:
      - type: text
        text: |-
          The Seventh of June
      
          At Constantinople, the birth of Saint Paul, Bishop of the same city, who was often driven out by the Arians for the Catholic faith, and restored by Saint Julius the First, Roman Pontiff; and at last, banished by the Arian Emperor Constantius to Cucusus, a small town of Cappadocia, he was there cruelly strangled by the treachery of the Arians and passed to the heavenly kingdom. His body, with the Emperor Theodosius, was translated to Constantinople with the highest honor.
          At Córdoba, in Spain, the holy Monks and Martyrs Peter the Priest, Wallabonsus the Deacon, Sabinianus, Wistremund, Habentius, and Jeremiah, who were slaughtered for Christ in the Arabian persecution.
          At Hermopolis, in Egypt, Saint Lycario, Martyr, who was torn, beaten with red-hot iron rods, suffered other most savage torments, and finally, struck with a sword, completed his martyrdom.
          At Piacenza, Saint Anthony Mary Gianelli, Bishop of Bobbio, Founder of the Congregation of the Daughters of the most holy Mary of the Garden, whom Pope Pius the Twelfth numbered among the holy company.
          In England, Saint Robert, Abbot, of the Cistercian Order.
  psalm.s-ptimo-idus-ianu-rii-1ac0df485b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we call to mind the return of the Child Jesus out of Egypt.
          Upon the same 7th day of January, were born into the better life:

          At Nicomedia, for confessing Christ, in the persecution under the Emperor Galerius Maximian, the blessed martyr Lucian, priest of the Church of Antioch, distinguished for his learning and eloquence, whose praise hath been recorded by holy John Chrysostom. He is buried at Helenopolis in Bithynia.
          At Antioch, the holy martyr the deacon Cleri, who on account of his glorious confession was seven times put to the torture, suffered long in prison, and at length was beheaded.
          In the city of Heraclea, the holy martyrs Felix and Januarius.
          On the same day, the holy martyr Julian.
          In Denmark (in the year 1086), the holy martyr King Canute (IV.), whose feast is kept on January 19 (although not in England).
          At Pavia, the holy confessor Crispin (I.), bishop of that see (in the year 248).
          In Dacia, the holy bishop Nicetas, who by his preaching of the Gospel caused savage and barbarous tribes to become mild and gentle. (Fifth century.)
          In Egypt, the blessed monk Theodore, who flourished in holiness in the time of the Emperor Constantine the Great, and of whom mention is made by holy Athanasius in the life of holy Anthony.
          At Barcelona (in the year 1275), holy Raymond of Pehafuerte, of the order of Friars Preachers, famous for his holiness and teaching, whose feast we keep upon the 23rd day of this present month of January.
      la:
      - type: text
        text: |-
          Séptimo Idus Ianuárii

          Relátio púeri Iesu de Ægýpto.
          Nicomédiæ natális beáti Luciáni, Ecclésiæ Antiochénæ Presbýteri et Mártyris; qui, satis clarus doctrína et eloquéntia, passus est, ob Christi confessiónem, in persecutióne Galérii Maximiáni, sepultúsque est Helenópoli, in Bithýnia. Ipsíus autem laudes sanctus Ioánnes Chrysóstomus celebrávit.
          Antiochíæ sancti Cleri Diáconi, qui pro confessiónis glória, sépties tortus ac diu macerátus in cárcere, ad últimum, gládio decollátus, martýrium consummávit.
          In civitáte Heracléa sanctórum Mártyrum Felícis et Ianuárii.
          Eódem die sancti Iuliáni Mártyris.
          In Dánia sancti Canúti, Regis et Mártyris.
          Pápiæ sancti Crispíni, Epíscopi et Confessóris.
          In Dácia sancti Nicetæ Epíscopi, qui feras et bárbaras gentes, Evangélii prædicatióne, mites réddidit ac mansuétas.
          In Ægýpto beáti Theodóri Mónachi, qui, témpore Constantíni Magni, flóruit sanctitáte; cuius méminit sanctus Athanásius in vita sancti Antónii.
      en2:
      - type: text
        text: |-
          The Seventh of January
      
          The Return of the child Jesus from Egypt.
          At Nicomedia, the birth of blessed Lucian, Priest of the Church of Antioch and Martyr; who, sufficiently renowned for learning and eloquence, suffered for confessing Christ in the persecution of Galerius Maximianus, and was buried at Helenopolis, in Bithynia. Saint John Chrysostom celebrated his praises.
          At Antioch, Saint Clerus, Deacon, who for the glory of his confession, tortured seven times and long tormented in prison, at last, beheaded with a sword, completed his martyrdom.
          In the city of Heraclea, the holy Martyrs Felix and Januarius.
          On the same day, Saint Julian, Martyr.
          In Denmark, Saint Canute, King and Martyr.
          At Pavia, Saint Crispinus, Bishop and Confessor.
          In Dacia, Saint Nicetas, Bishop, who, by the preaching of the Gospel, made wild and barbarous peoples gentle and tame.
          In Egypt, blessed Theodore, Monk, who, in the time of Constantine the Great, flourished in holiness; of whom Saint Athanasius makes mention in the life of Saint Anthony.
  psalm.s-ptimo-idus-m-rtii-18f824f5ef:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 9th day of March, were born into the better life:

          At Rome, the holy widow Frances, famous for her nobleness of birth, the holiness of her life, and the grace of working miracles [,in the year 1440].
          At Sebaste, in Armenia, the forty holy Cappadocian soldiers. Under the President Agricolaus, in the time of the Emperor Licinius, after undergoing bonds and a foul imprisonment, and after their faces had been bruised with stones, they were stripped naked, and exposed all night upon the surface of a frozen pool during the bitterest cold of winter, where their bodies perished by the frost, and at length by the breaking of their legs. The illustrious glory of them all hath been celebrated by holy Basil, and the other Fathers in their writings, the chief among them were named Cyrion and Candidus. We keep their feast upon the morrow after.
          At Nyssa, holy Gregory, [in the year 396,] Bishop of that see, brother of blessed Basil the Great. He is very famous for his life and learning. For defending the Catholic faith he was driven out of his own city by the Arian Emperor Valens.
          At Barcelona, in Spain, holy Pacian, Bishop of that see, famous not only for his life but also for his words, who died in a good old age in the time of the Emperor Theodosius.
          In Moravia, [in the ninth century,] the holy Cyril, Bishop [of Moravia,] and Methodius, Bishop [of Kiev,] who brought to believe in Christ many of the peoples of those countries and their kings [,and whose feast we keep upon the 5th day of July].
          At Bologna, [in the year 1463,] the holy Virgin Katherine, of the Order of St. Clare, famous for the holiness of her life, whose body is there reverenced with great honour.
      la:
      - type: text
        text: |-
          Séptimo Idus Mártii

          Romæ sanctæ Francíscæ Víduæ, nobilitáte géneris, vitæ sanctitáte et miraculórum dono célebris.
          Apud Sebásten, in Arménia, natális sanctórum quadragínta mílitum Cappádocum, qui, témpore Licínii Imperatóris, sub Prǽside Agricoláo, post víncula et cárceres tetérrimos, post cæsas lapídibus fácies, nudi sub dio, frigidíssimo híemis témpore, supra stagnum rigens pernoctáre iussi sunt, ubi gelu constrícta eórum córpora disrumpebántur, ac demum crurifrágio martýrium consummárunt. Erant autem inter eos nobilióres Cýrion et Cándidus; eorúmque ómnium præcláras glórias sanctus Basilíus aliíque Patres scriptis suis celebrárunt. Ipsórum porro Mártyrum festívitas sequénti die recólitur.
          Nyssæ deposítio sancti Gregórii Epíscopi, qui sanctórum Basilíi et Emméliæ fílius, et sanctórum item Basilíi Magni ac Petri Sebasténsis Episcopórum et Macrínæ Vírginis frater éxstitit; atque, vita et eruditióne claríssimus, ob fídei cathólicæ defensiónem, sub Ariáno Imperatóre Valénte, civitáte sua pulsus est.
          Barcinóne, in Hispánia, sancti Paciáni Epíscopi, tam vita quam sermóne conspícui; qui, témpore Theodósii Príncipis, in última senectúte finem vitæ sortítus est.
          Bonóniæ sanctæ Catharínæ Vírginis, e secúndo Ordine sancti Francísci, quæ vitæ sanctitáte fuit illústris. Ipsíus autem corpus magno cum honóre ibídem cólitur.
      en2:
      - type: text
        text: |-
          The Ninth of March (Feast of the Forty Martyrs)
      
          At Rome, Saint Frances, Widow, renowned for nobility of birth, holiness of life, and the gift of miracles.
          At Sebaste, in Armenia, the birth of the forty soldier Martyrs of Cappadocia, who, in the time of the Emperor Licinius, under the Governor Agricolaus, after bonds and the most foul prisons, after their faces beaten with stones, were ordered to pass the night naked in the open air in the most frigid winter weather upon a freezing pond, where their bodies, bound fast with cold, were shattered, and at last completed their martyrdom by the breaking of their legs. Among them the more notable were Cyrion and Candidus; and Saint Basil and other Fathers celebrated the illustrious glories of all of them in their writings. The feast of these Martyrs, moreover, is kept on the following day.
          At Nyssa, the deposition of Saint Gregory, Bishop, who was the son of Saints Basil and Emmelia, and the brother of Saints Basil the Great and Peter of Sebaste, Bishops, and Macrina the Virgin; and, most renowned for life and learning, was driven from his city for defending the Catholic faith, under the Arian Emperor Valens.
          At Barcelona, in Spain, Saint Pacianus, Bishop, distinguished as much in life as in speech; who, in the time of the Emperor Theodosius, met his end in extreme old age.
          At Bologna, Saint Catherine, Virgin, of the Second Order of Saint Francis, who was renowned for holiness of life. Her body is venerated there with great honor.
  psalm.s-ptimo-idus-maii-36b9571080:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 9th day of May, were born into the better life:

          At Nazianzus, in Cappadocia, the blessed Gregory, Archbishop of Constantinople, who on account of his wonderful teaching of the things of God is surnamed the Theologian, who set up again the Catholic faith at Constantinople when it had fallen, and stilled the swelling waves of heresy.
          At Rome, the holy Hermes, of whom the Apostle Paul maketh mention in his Epistle to the Romans. He made a worthy offering of himself, and being made acceptable as a sacrifice to God, he departed hence to the kingdom of heaven, famous for good works.
          In Persia, 310 holy martyrs.
          At Cagli, on the Flaminian Way, suffered the holy Gerontius, Bishop of Cervia.
          At Vendôme, [in the third century,] deceased, the holy Confessor Beatus. At Constantinople is commemorated the translation of the bodies of the holy Apostle Andrew, and of the holy Evangelist Luke, out of the Peloponnesos, and of that of Timothy, the disciple of the blessed Apostle Paul, out of Ephesos. The body of the holy Andrew was carried to Amalfi a long while after, and godly multitudes of the faithful there gather to do it reverence. At the grave thereof is secreted a liquid for the healing of diseases.
          There is also commemorated at Rome the translation of the body of the holy Priest Jerome, Doctor of the Church, from Bethlehem of Juda into the cathedral church of St. Mary-by-the-Manger, [commonly called St. Mary the Greater.]
          Also there is commemorated at Bari, in Apulia, the translation thither of the body of the holy Bishop Nicholas, from [his see at] Myra, a city of Lycia.
      la:
      - type: text
        text: |-
          Séptimo Idus Maii

          Naziánzi, in Cappadócia, natális beáti Gregórii Epíscopi, Confessóris et Ecclésiæ Doctóris, ob singulárem divinárum rerum doctrínam cognoménto Theólogi; qui collápsam Constantinópoli cathólicam fidem, ipsíus urbis Episcopátum gerens, restítuit, hæresésque insurgéntes compréssit.
          Romæ sancti Hermæ, cuius Apóstolus Paulus in Epístola ad Romános méminit. Ipse autem Hermas, digne semetípsum sacríficans acceptabilísque Deo hóstia factus, virtútibus clarus cæléstia regna petívit.
          Cállii, via Flamínia, pássio sancti Geróntii, Epíscopi Ficoclénsis.
          In Pérside sanctórum Mártyrum trecentórum et decem.
          In Ægýpto sancti Pachómii Abbátis, qui plúrima erexit in ea regióne monastéria, et régulam Monachórum scripsit, quam ab Angelo dictánte didícerat.
          In castro Vindecíno, in Gállia, deposítio sancti Beáti Confessóris.
          Bonóniæ beáti Nicolái Albergáti, Mónachi Carthusiáni, eiúsdem civitátis Epíscopi et sanctæ Románæ Ecclésiæ Cardinális, sanctitáte et Apostólicis Legatiónibus clari; cuius corpus Floréntiæ, apud Carthusiános, cónditum est.
          Constantinópoli Translátio sanctórum Andréæ Apóstoli, et Lucæ Evangelístæ de Acháia; et Timóthei, uníus ex discípulis beáti Pauli Apóstoli, ab Epheso. Corpus autem sancti Andréæ, longo post témpore Amálphim devéctum, ibi pio fidélium concúrsu honorátur; ex cuius sepúlcro liquor ad languóres curándos iúgiter manat.
          Romæ item Translátio sancti Hierónymi Presbýteri, Confessóris et Ecclésiæ Doctóris, ex Béthlehem Iudæ ad Basílicam sanctæ Maríæ ad Præsépe.
          Bárii quoque, in Apúlia, Translátio sancti Nicolái, Epíscopi et Confessóris, e Myra, civitáte Lýciæ.
      en2:
      - type: text
        text: |-
          The Ninth of May
      
          At Nazianzus, in Cappadocia, the birth of blessed Gregory, Bishop, Confessor and Doctor of the Church, surnamed the Theologian for his singular knowledge of divine things; who, governing the Bishopric of Constantinople, restored the collapsed Catholic faith in that city and suppressed the heresies that were arising.
          At Rome, Saint Hermas, of whom the Apostle Paul makes mention in the Letter to the Romans. Hermas himself, worthily sacrificing himself and becoming an acceptable victim to God, renowned for virtues, sought the heavenly kingdom.
          On the Flaminian Way, at Calle, the passion of Saint Gerontius, Bishop of Ficoclum.
          In Persia, three hundred and ten holy Martyrs.
          In Egypt, Saint Pachomius, Abbot, who established very many monasteries in that region and wrote a Rule for Monks, which he had learned at an angel's dictation.
          In the castle of Vendôme, in France, the deposition of Saint Beatus, Confessor.
          At Bologna, blessed Nicholas Albergati, a Carthusian Monk, Bishop of the same city and Cardinal of the holy Roman Church, renowned for holiness and Apostolic Legations; whose body is deposited at Florence, among the Carthusians.
          At Constantinople, the Translation of the Apostle Andrew, and Luke the Evangelist from Achaia; and of Timothy, one of the disciples of the blessed Apostle Paul, from Ephesus. But the body of Saint Andrew, long afterwards brought to Amalfi, is honored there by the devout concourse of the faithful; from whose tomb a liquid for healing infirmities perpetually flows.
          At Rome, likewise the Translation of Saint Jerome, Priest, Confessor and Doctor of the Church, from Bethlehem in Judea to the Basilica of Saint Mary at the Manger.
          At Bari, in Apulia, likewise the Translation of Saint Nicholas, Bishop and Confessor, from Myra, a city of Lycia.
  psalm.s-ptimo-idus-nov-mbris-90568fe773:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 7th day of November, were born into the better life:

          At Padua, holy Prosdocimus, the first Bishop of that see, who was ordained Bishop by the blessed Apostle Peter, and sent to preach the Word of God in that city, where he shone with many graces and wonders, and died a blessed death.
          At Perugia, (in the year 547,) the holy martyr Herculanus, Bishop (of that see.) On the same day the holy martyr Amaranth, who was buried in the city of Albi when the course of his faithful contending was over, but he is alive for evermore in glory.
          At Melitina, in Armenia, the holy martyrs Hiero, Nicander, Hesychius, and thirty others, who were crowned under the President Lysias, in the persecution under the Emperor Diocletian.
          At Amphipolis, in Macedonia, the holy martyrs Auctus, Taurion, and Thessalonica.
          At Ancyra, under the Emperor Julian the Apostate, the holy martyrs Melasippus, Anthony, and Carina.
          At Cologne, (in the year 1225,) holy Engelbert, Bishop (of that see), who was contented to suffer martyrdom in defence of the freedom of the Church and of the obedience due to the Church of Rome.
          At Alexandria, (about the year 313,) blessed Achillas, Bishop (of that see,) eminent for his learning, faith, conversation, and life.
          In Friesland, (in the year 738,) holy Willebrord, (first) Bishop of Utrecht, who was ordained Bishop by blessed Pope Sergius, and preached the Gospel in Friesland and Denmark, whose feast we keep upon the 29th day of this present month.
          At Metz, (about the year 400,) the holy Confessor Rufus, Bishop (of that see.)
          At Strasbourg, (about the year 693,) holy Florence, Bishop (of that see, and Founder and Abbot of Haslach and of St. Thomas.)
      la:
      - type: text
        text: |-
          Séptimo Idus Novémbris

          Patávii deposítio sancti Prosdócimi, qui fuit primus eiúsdem civitátis Epíscopus. Hic, a beáto Petro Apóstolo Epíscopus ordinátus, ad prædicándum Dei verbum ad prædíctam civitátem missus est; ibíque, multis virtútibus et prodígiis corúscans, beáto fine quiévit.
          Perúsiæ sancti Herculáni, Epíscopi et Mártyris.
          Apud Swelménsem civitátem, in Germánia, pássio sancti Engelbérti, Epíscopi Coloniénsis, qui, cum illuc ex óppido Sosátio ad templum dedicándum pérgeret, a sicáriis intercéptus in via multísque vulnéribus cæsus, gloriósum pro defensióne ecclesiásticæ libertátis et Románæ Ecclésiæ obediéntia martýrium súbiit.
          Eódem die sancti Amaránthi Mártyris, qui apud Albigénsem urbem, in Gállia, exácto agónis fidélis cursu, sepúltus, vivit in glória.
          Melitínæ, in Arménia, pássio sanctórum Hierónis, Nicándri, Hesýchii et aliórum trigínta; qui in persecutióne Diocletiáni, sub Lýsia Prǽside, coronáti sunt.
          Amphípoli, in Macedónia, sanctórum Mártyrum Aucti, Tauriónis et Thessalonícæ.
          Ancýræ, in Galátia, pássio sanctórum Melasíppi, Antónii et Carínæ, sub Iuliáno Apóstata.
          Alexandríæ beáti Achíllæ Epíscopi, qui eruditióne, fide, conversatióne ac móribus fuit insígnis.
          In Frísia deposítio sancti Willibrórdi, Epíscopi Traiecténsis; qui, a beáto Sérgio Papa ordinátus Epíscopus, in Frísia et Dánia Evangélium prædicávit.
          Metis, in Gállia, sancti Rufi, Epíscopi et Confessóris.
          Argentoráti sancti Floréntii Epíscopi.
      en2:
      - type: text
        text: |-
          The Seventh of November
      
          At Padua, the deposition of Saint Prosdocimus, who was the first Bishop of the same city. He, ordained a Bishop by the blessed Apostle Peter, was sent to preach the word of God to the aforesaid city; and there, shining with many virtues and wonders, rested in a blessed death.
          At Perugia, Saint Herculanus, Bishop and Martyr.
          Near the city of Schwelm, in Germany, the passion of Saint Engelbert, Bishop of Cologne, who, journeying there from the town of Soest to dedicate a church, was intercepted on the road by assassins and cut down with many wounds, and underwent a glorious martyrdom for the defense of ecclesiastical liberty and obedience to the Roman Church.
          On the same day, Saint Amaranthus, Martyr, who, near the city of Albi, in France, having completed the course of his faithful contest, buried, lives in glory.
          At Melitene, in Armenia, the passion of Saints Hiero, Nicander, Hesychius, and thirty others; who, in the persecution of Diocletian, under the Governor Lysias, were crowned.
          At Amphipolis, in Macedonia, the holy Martyrs Auctus, Taurion, and Thessalonica.
          At Ancyra, in Galatia, the passion of Saints Melasippus, Antoninus, and Carina, under Julian the Apostate.
          At Alexandria, blessed Achillas, Bishop, who was distinguished for learning, faith, manner of life, and character.
          In Frisia, the deposition of Saint Willibrord, Bishop of Utrecht; who, ordained a Bishop by the blessed Pope Sergius, preached the Gospel in Frisia and Denmark.
          At Metz, in France, Saint Rufus, Bishop and Confessor.
          At Strasbourg, Saint Florentius, Bishop.
  psalm.s-ptimo-idus-oct-bris-8342e3c60e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 9th day of October, were born into the better life:

          At Paris, the holy martyrs Denys the Areopagite, Bishop (of that city,) Rusticus the Priest, and Eleutherius the Deacon. Denys was baptized by the Apostle Paul, and ordained the first Bishop of Athens. He afterward came to Rome, whence he was sent by the Roman Pontiff, the blessed Clement, to preach in Gaul. He came to Paris, where for some years he faithfully executed the task laid upon him then the Prefect Pescenninus, when he had put him to diverse kinds of grievous torments, caused him to be beheaded, along with his two Companions, and so the three together finished their testimony.
          Upon the same day is made memorial of the holy Patriarch Abraham, the father of all them that believe.
          Upon the same day, were born into the better life:
          At Julia, in the country of Parma, upon the Claudian Way, under the Emperor Maximian, the holy martyr Domninus. He was seeking to escape from the fury of the persecutors, but they that came in pursuit of him ran him through with the sword, and he fell gloriously.
          At Monte Casino, (in the year 834,) the holy Abbot Deusdedit, who was cast into prison by the tyrant Sicard, and there died of hunger and wretchednesss.
          In Hainaut, (about the year 680,) the holy Confessor Ghislain, Bishop, who resigned his see and lived as a monk in a monastery founded by himself, and was famous for many graces.
          At Valencia, in Spain, holy Louis Bertrand, of the Order of Friars Preachers, who was filled with the spirit of the Apostolate, and confirmed by innocency of life and many signs the Gospel which he preached to the Americans.
          At Jerusalem, holy Andronicus and Athanasia his wife.
          At Antioch, the holy Abbess Publia. As the Emperor Julian the Apostate was passing by, she and her Virgins sang those words of David: "The idols of the heathen are silver and gold," and "Let them that make them become like unto them," wherefore the Emperor commanded her to be buffeted and sharply rebuked.
      la:
      - type: text
        text: |-
          Séptimo Idus Octóbris

          Romæ sancti Ioánnis Leonárdi Confessóris, Fundatóris Congregatiónis Clericórum Regulárium a Matre Dei, labóribus et miráculis clari, cuius ópera Missiónes a Propagánda Fide institútæ sunt.
          Lutétiæ Parisiórum natális sanctórum Mártyrum Dionýsii Areopagítæ Epíscopi, Rústici Presbýteri, et Eleuthérii Diáconi. Ex his Dionýsius, ab Apóstolo Paulo baptizátus, primus Atheniénsium Epíscopus ordinátus est; deínde Romam venit, atque inde a beáto Cleménte, Románo Pontífice, in Gállias prædicándi grátia diréctus est, et ad præfátam urbem devénit; ibíque, cum per áliquot annos commíssum sibi opus fidéliter prosecútus esset, tandem, a Præfécto Fescenníno, post gravíssima tormentórum génera, una cum Sóciis, gládio animadvérsus, martýrium complévit.
          Eódem die memória sancti Abrahæ, Patriárchæ et ómnium credéntium Patris.
          Apud Cassínum sancti Deúsdedit Abbátis, qui, a Sicárdo tyránno in cárcerem trusus, illic, fame et ærúmnis conféctus, réddidit spíritum.
          Apud Iúliam, in território Parménsi, via Cláudia, sancti Domníni Mártyris; qui, sub Maximiáno Imperatóre, cum vellet persecutiónis rábiem declináre, a persequéntibus est comprehénsus, et, gládio transverberátus, glorióse occúbuit.
          In Hannónia sancti Gisléni, Epíscopi et Confessóris; qui, relícto Episcopátu, Mónachi vitam in monastério a se constrúcto exércuit, et multis virtútibus cláruit.
          Valéntiæ, in Hispánia Tarraconénsi, sancti Ludovíci Bertrandi, ex Ordine Prædicatórum, Confessóris; qui, apostólico spíritu clarus, Evangélium quod Americánis prædicáverat, vitæ innocéntia multísque éditis miráculis confirmávit.
          Hierosólymis sanctórum Androníci et Athanásiæ cóniugis.
          Antiochíæ sanctæ Públiæ Abbatíssæ, quæ, transeúnte Iuliáno Apóstata, Davídicum illud cum suis Virgínibus canens: «Simulácra Géntium argéntum et aurum», et; «Símiles illis fiant qui fáciunt ea»; Imperatóris iussu, álapis cæsa est, et gráviter obiurgáta.
      en2:
      - type: text
        text: |-
          The Ninth of October
      
          At Rome, Saint John Leonardi, Confessor, Founder of the Congregation of Clerics Regular of the Mother of God, renowned for labors and miracles, through whose work the Missions of Propaganda Fide were established.
          At Paris, the birth of the holy Martyrs Dionysius the Areopagite, Bishop, Rusticus the Priest, and Eleutherius the Deacon. Of these, Dionysius, baptized by the Apostle Paul, was ordained the first Bishop of the Athenians; then he came to Rome, and from there was directed by blessed Clement, Roman Pontiff, to France for preaching, and came to the aforesaid city; and there, having faithfully continued for some years the work entrusted to him, was at last, by the Governor Fescenninus, after the most grievous kinds of torments, slain with the sword together with his Companions and completed his martyrdom.
          On the same day, the memory of Saint Abraham, Patriarch and Father of all believers.
          At Cassino, Saint Deusdedit, Abbot, who, thrust into prison by the tyrant Sicardus, there exhausted by hunger and hardships, gave up his spirit.
          At Julia, in the territory of Parma, on the Claudian Way, Saint Domnius, Martyr; who, under the Emperor Maximian, wishing to avoid the fury of the persecution, was seized by those pursuing him, and pierced through with a sword, died gloriously.
          In Hainaut, Saint Ghislain, Bishop and Confessor; who, relinquishing his Bishopric, practiced the monastic life in a monastery built by himself, and was renowned for many virtues.
          At Valencia, in Tarraconensian Spain, Saint Louis Bertrand, of the Order of Preachers, Confessor; who, renowned for apostolic spirit, confirmed with the innocence of his life and many performed miracles the Gospel he had preached to the Americans.
          At Jerusalem, Saints Andronicus and Athanasia, a married couple.
          At Antioch, Saint Publia, Abbess, who, when Julian the Apostate was passing by, singing with her Virgins that verse of David: "The idols of the nations are silver and gold," and "Let those who make them be like them"; was, by the Emperor's command, beaten with blows and gravely rebuked.
  psalm.s-ptimo-idus-sept-mbris-431f5bbb7e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 7th day of September, were born into the better life:

          At Nicomedia, the blessed martyr John. When he saw the cruel edicts against the Christians hanging up in the market-place, in the heat of his faith he stretched forth his hand, pulled them down, and tore them up. When this was told to the Emperors Diocletian and Maximian, who were then in that city, they ordered all the kinds of torment to be tried upon him and the man, right noble as he was, bore this with such a cheerful face and heart that he seemed not even saddened thereby.
          At Caesarea, in Cappadocia, the holy martyr Eupsychius, who was cast into prison under the Emperor Hadrian on the charge of being a Christian. Being shortly liberated therefrom, he forthwith sold his inheritance, and distributed the price thereof partly unto the poor, and partly unto his accusers, as unto benefactors. He was arrested again, and finished his testimony under the judge Sapritius, being mangled, and pierced with the sword.
          At Soli, in Cilicia, the holy martyr Sozon, who under the Emperor Maximian was cast into the fire, and gave up the ghost.
          At Aquileia, (in the persecution under the Emperor Diocletian,) the holy martyr Anastasius.
          In the country of Autun, the holy Virgin and martyr Regina, who passed away to Christ the Bridegroom under the Proconsul Olybrius, by whose orders she was imprisoned, racked, burnt with lamps, and lastly beheaded.
          At Troyes, the holy martyrs Nemorius the Deacon, and his Companions, who were slain by Attila, King of the Huns.
          At Orleans, in Gaul, holy Bishop Evortius, who was first a Subdeacon of the Church of Rome, and was then pointed out by the vision of a dove for Bishop of the aforesaid city.
          In Gaul, the holy Confessor Bishop Augustal.
          At Capua, holy Pamphilus, Bishop (of that see.)
          In the country of Paris, (in the sixth century,) the holy Priest and Confessor Clodoald (St. Cloud) .
      la:
      - type: text
        text: |-
          Séptimo Idus Septémbris

          Trecis, in Gállia, sancti Nemórii Diáconi, et Sociórum Mártyrum, quos Attíla, Rex Hunnórum, interfécit.
          Nicomedíæ natális beáti Ioánnis Mártyris, qui, cum vidéret crudélia advérsus Christiános edícta in foro pendére, hinc, fídei ardóre accénsus, iniécta manu, illa detráxit atque discérpsit. Cumque hoc relátum esset Diocletiáno et Maximiáno Augústis, in eádem urbe constitútis, ómnia suppliciórum génera in eum experíri iussérunt; quæ vir nobilíssimus tanta vultus ac spíritus alacritáte pértulit, ut ne tristis quidem pro his vidéri potúerit.
          Cæsaréæ, in Cappadócia, sancti Eupsýchii Mártyris, qui, sub Hadriáno Imperatóre, accusátus quod Christiánus esset, in cárcerem coniéctus est; et, paulo post inde emíssus, patrimónium statim véndidit, et prétium partim paupéribus, partim accusatóribus, tamquam benefactóribus, distríbuit. Sed, íterum comprehénsus, atque, cum sacrificáre nollet idólis, sævíssime dilaniátus et gládio confóssus, sub Saprítio Iúdice martýrium consummávit.
          Pompeiópoli, in Cilícia, sancti Sozóntis Mártyris, qui sub Maximiáno Imperatóre, in ignem iniéctus, réddidit spíritum.
          Aquiléiæ sancti Anastásii Mártyris.
          Apud Aléxiam véterem, in território Augustodunénsi, sanctæ Regínæ, Vírginis et Mártyris; quæ, sub Procónsule Olýbrio, cárceris et equúlei ac lampadárum afflícta supplíciis, demum, cápite damnáta, migrávit ad Sponsum.
          Aureliánis, in Gállia, deposítio sancti Evórtii Epíscopi, qui, primo Románæ Ecclésiæ Subdiáconus, dehinc divíno múnere per colúmbam designátus est Póntifex præfátæ urbis.
          In Gállia sancti Augustális, Epíscopi et Confessóris.
          Cápuæ sancti Pámphili Epíscopi.
          In território Parisiénsi sancti Clodoáldi, Presbýteri et Confessóris.
      en2:
      - type: text
        text: |-
          The Seventh of September
      
          At Troyes, in France, Saint Nemorius, Deacon, and his Companion Martyrs, whom Attila, King of the Huns, slew.
          At Nicomedia, the birth of blessed John, Martyr, who, when he saw cruel edicts against Christians hanging in the forum, inflamed by the ardor of his faith, laid his hand upon them, tore them down and shredded them. When this was reported to the Emperors Diocletian and Maximian, who were present in the same city, they ordered every kind of punishment to be tried upon him; which that most noble man endured with such cheerfulness of countenance and spirit that he could not even appear sad because of them.
          At Caesarea, in Cappadocia, Saint Eupsychius, Martyr, who, under the Emperor Hadrian, accused of being a Christian, was cast into prison; and, released a little while later, immediately sold his inheritance and distributed the price partly to the poor, partly to his accusers, as to benefactors. But, seized again, and when he refused to sacrifice to idols, most savagely torn and pierced with a sword, he completed his martyrdom under the judge Sapricius.
          At Pompeiopolis, in Cilicia, Saint Sozon, Martyr, who, under the Emperor Maximian, cast into the fire, gave up his spirit.
          At Aquileia, Saint Anastasius, Martyr.
          Near old Alesia, in the territory of Autun, Saint Regina, Virgin and Martyr; who, under the Proconsul Olybrius, afflicted with the punishments of prison, rack, and torches, condemned at last to beheading, passed to her Spouse.
          At Orléans, in France, the deposition of Saint Evurtius, Bishop, who, first a Subdeacon of the Roman Church, was then designated by a divine gift through a dove as Pontiff of the aforesaid city.
          In France, Saint Augustalis, Bishop and Confessor.
          At Capua, Saint Pamphilus, Bishop.
          In the territory of Paris, Saint Clodulf, Priest and Confessor.
  psalm.s-ptimo-kal-ndas-apr-lis-d848c4cc50:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of March, were born into the better life:

          At Rome, upon the Lavican Way, [in the third century,] the holy martyr Castulus. He was a chamberlain of the Palace, and a receiver of the saints. He was three times hung up and interrogated, and as he remained steadfast in confessing the Lord, he was crowned with martyrdom by being thrown into a pit, and buried alive in sand.
          Likewise at Rome, the holy martyrs Peter, Marcian, Jovinus, Thecla, Cassian, and others.
          In the Pentapolis, in Libya, the holy martyrs Theodore, Bishop [of Zaragossa, who was preaching in Pentapolis-Cyrene in North Africa,] the Deacon Irenaeus, and the Readers Serapion and Ammonius.
          At Sirmium, the holy martyrs the Priest Montanus, and Maxima, [his wife,] who were drowned in the river for Christ's faith's sake.
          Likewise the holy martyrs Quadratus, Theodosius, Emmanuel, and forty others.
          At Alexandria, [in the year 354,] the holy martyrs Eutychius and others, who were slain with the sword for the Catholic faith, under the Arian Bishop George, in the time of the Emperor Constantius.
          On the same day, [in the year 309,] holy Ludger, Bishop of Muenster, who preached the gospel to the Saxons.
          At Zaragossa, in Spain, [in the year 651,] the holy Confessor Braulio, Bishop of that see.
          At Trier, [in the year 400,] holy Felix, [who had been] Bishop [of that see for 12 years, and had then retired to a monastery which he had built in honour of the Blessed Virgin, the martyrs of the vanguard of the Theban Legion, and several magistrates of the town of Trier, who had been martyred at the same time.]
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Aprílis

          Romæ, via Lavicána, sancti Cástuli Mártyris, qui, cum esset zetárius Palátii et hospes Sanctórum, a persecutóribus tértio appénsus, tértio audítus, et, in confessióne Dómini persevérans, missus est in fóveam, ac, dimíssa super eum massa arenária, martýrio coronátus est.
          Item Romæ corónæ sanctórum Mártyrum Petri, Marciáni, Iovíni, Theclæ, Cassiáni et aliórum.
          Pentápoli, in Líbya, natális sanctórum Mártyrum Theodóri Epíscopi, Irenǽi Diáconi, Serapiónis et Ammónii Lectórum.
          Sírmii sanctórum Mártyrum Montáni Presbýteri, et Máximæ, qui, ob Christi fidem, in flumen demérsi sunt.
          Item sanctórum Mártyrum Quadráti, Theodósii, Emmanuélis et aliórum quadragínta.
          Alexandríæ sanctórum Mártyrum Eutýchii et aliórum; qui, Constántii témpore, sub Ariáno Epíscopo Geórgio, pro fide cathólica gládio cæsi sunt.
          Eódem die sancti Ludgéri, Epíscopi Monasteriénsis, qui Saxonibus Evangélium prædicávit.
          Cæsaraugústæ, in Hispánia, sancti Bráulii, Epíscopi et Confessóris.
          Tréviris sancti Felícis Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of March
      
          At Rome, on the Lavican Way, Saint Castulus, Martyr, who, being a chamberlain of the Palace and the host of the Saints, was by the persecutors hung up three times, examined three times, and, persevering in the confession of the Lord, was cast into a pit and, a mass of sand thrown down upon him, was crowned with martyrdom.
          Likewise at Rome, the crown of the holy Martyrs Peter, Marcianus, Jovinus, Thecla, Cassianus, and others.
          At Pentapolis, in Libya, the birth of the holy Martyrs Theodore the Bishop, Irenaeus the Deacon, Serapion and Ammonius, Readers.
          At Sirmium, the holy Martyrs Montanus the Priest and Maxima, who, for the faith of Christ, were plunged into a river.
          Likewise, the holy Martyrs Quadratus, Theodosius, Emmanuel, and forty others.
          At Alexandria, the holy Martyrs Eutychius and others; who, in the time of Constantius, under the Arian Bishop George, were slain with the sword for the Catholic faith.
          On the same day, Saint Ludger, Bishop of Münster, who preached the Gospel to the Saxons.
          At Saragossa, in Spain, Saint Braulio, Bishop and Confessor.
          At Trier, Saint Felix, Bishop.
  psalm.s-ptimo-kal-ndas-aug-sti-39583437e6:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of July fell asleep

          Holy Anne, mother of Mary the Mother of God.
          On the same 26th day of July, was also born into the better life: At Philippi, in Macedonia, holy Erastus, who was left there as Bishop by the blessed Apostle Paul, and was there crowned with martyrdom.
          At Rome, upon the Latin Way, the holy martyrs Symphronius, Olympius, Theodulus, and Exuperia, who, as is written in the Acts of the holy Pope Stephen I, were burnt in the fire, and so gained the palm of martyrdom.
          At Porto Romano, the holy martyr Hyacinth. He was first cast into the fire, and then into a torrent, but escaped unhurt. Afterwards, under the Emperor Trajan, Leontius the Consular caused him to be smitten with the sword, and so ended his earthly life. The matron Julia buried his body upon her own farm hard by the city of Rome.
          Also at Rome, [in the second century,] the holy Priest Pastor, who giveth his name to the Church upon the Viminal Hill, which is that of holy Pudentiana.
          At Verona, [in the sixth century,] the holy Confessor Valens, Bishop [of that see.]
          In the monastery of St Benedict, in the country of Mantua, [in the year 1016,] the holy Monk and Hermit Simeon, who fell asleep in a good old age, famous for many marvels.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Augústi

          Dormítio sanctæ Annæ, quæ mater éxstitit Immaculátæ Vírginis Genitrícis Dei Maríæ.
          Philíppis, in Macedónia, natális sancti Erásti, qui, illic a beáto Paulo Apóstolo relíctus Epíscopus, ibídem martýrio coronátus est.
          Romæ, via Latína, sanctórum Mártyrum Symphrónii, Olýmpii, Theodúli et Exsupériæ; qui (ut in gestis sancti Stéphani Papæ légitur), ígnibus combústi, martýrii palmam adépti sunt.
          In Portu Románo sancti Hyacínthi Mártyris, qui, primo in ignem iniéctus, deínde in profluéntem præcipitátus, illǽsus evásit; post hæc, sub Traiáno Imperatóre, a Leóntio Consulári percússus gládio, vitam finívit. Ipsíus corpus Iúlia Matróna in prǽdio suo, iuxta Urbem, sepelívit.
          Verónæ sancti Valéntis, Epíscopi et Confessóris.
          Romæ sancti Pastóris Presbýteri, cuius nómine Títulus exstat in Vimináli, apud sanctam Pudentiánam.
          In monastério sancti Benedícti, in agro Mantuáno, sancti Simeónis, Mónachi et Eremítæ, qui, multis miráculis clarus, in senectúte bona quiévit.
          Lúere, in diœcési Brixiénsi, sanctæ Bartholomǽæ Capitánio, Vírginis, Institúti Sorórum a Caritáte Fundatrícis, puéllis instituéndis præcláræ, quam Pius Papa Duodécimus albo sanctárum Vírginum adscrípsit.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of July
      
          The death of Saint Anne, who was the mother of the Immaculate Virgin, Mother of God, Mary.
          At Philippi, in Macedonia, the birth of Saint Erastus, who, left there by the blessed Apostle Paul as Bishop, was crowned with martyrdom there.
          At Rome, on the Latin Way, the holy Martyrs Symphorianus, Olympius, Theodulus, and Exuperia; who (as is read in the Acts of Pope Saint Stephen), consumed by fire, obtained the palm of martyrdom.
          At the Port of Rome, Saint Hyacinth, Martyr, who, first cast into fire and then thrown into a stream, escaped unharmed; afterwards, under the Emperor Trajan, struck with a sword by the consular Leontius, ended his life. His body was buried by Julia, a Matron, in her estate near the City.
          At Verona, Saint Valens, Bishop and Confessor.
          At Rome, Saint Pastor, Priest, in whose name a titular church stands on the Viminal Hill, near Saint Pudentiana.
          In the monastery of Saint Benedict, in the Mantuan territory, Saint Simeon, Monk and Hermit, who, renowned for many miracles, rested in a good old age.
          At Luere, in the Diocese of Brescia, Saint Bartholomaea Capitanio, Virgin, Foundress of the Institute of Sisters of Charity, renowned for educating girls, whom Pope Pius the Twelfth enrolled in the register of holy Virgins.
  psalm.s-ptimo-kal-ndas-dec-mbris-4693d833d4:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 25th day of November, were born into the better life:

          At Alexandria, the holy Virgin and martyr Katharine. On account of her confession of the Christian faith, she was cast into prison under the Emperor Maximinus. She was long flogged with loaded scourges, and at length beheaded. Her body was in wondrous wise carried by angels to Mount Sinai, where it is devoutly honoured by the pilgrimages of multitudes of Christians.
          At Rome, the holy martyr Moses, a Priest, who was among those whom holy Cyprian oftentimes comforted by his letters while they were kept in prison. He contended manfully not only against the Gentiles, but also against the schismatics and Novatian heretics. At length, as is attested by holy Pope Cornelius, he was crowned with an eminent martyrdom in the persecution under the Emperor Decius.
          At Antioch, the holy martyr Erasmus.
          At Caesarea, in Cappadocia, the holy martyr Mercury. He was a soldier, who, by the help of his Guardian Angel, overcame the barbarians and the cruelty of the Emperor Decius, and passed away to heaven crowned with a martyrdom adorned by victory over many torments.
          In the province of Aemilia, the holy Virgin Jucunda.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Decémbris

          Alexandríæ sanctæ Catharínæ, Vírginis et Mártyris, quæ, ob fídei Christiánæ confessiónem, sub Maximíno Imperatóre, in cárcerem trusa, et póstmodum scorpiónibus diutíssime cæsa, tandem cápitis obtruncatióne martýrium complévit. Ipsíus corpus, in montem Sínai mirabíliter ab Angelis delátum, ibídem, frequénti Christianórum concúrsu, pia veneratióne cólitur.
          Romæ sancti Móysis, Presbýteris et Mártyris; quem, cum áliis deténtum in cárcere, sanctus Cypriánus per lítteras sæpe est consolátus. Ipse autem Móyses, cum non tantum advérsus Gentíles, sed étiam advérsus schismáticos et hæréticos Novatiános infrácto ánimo stetísset, demum (ut sanctus Cornélius Papa testátur), in persecutióne Décii, exímio et admirábili martýrio decorátus est.
          Antiochíæ sancti Erásmi Mártyris.
          Cæsaréæ, in Cappadócia, pássio sancti Mercúrii mílitis, qui custodiéntis se Angeli patrocínio et bárbaros vicit, et Décii sævítiam superávit; multísque auctus tormentórum trophǽis, martýrio coronátus migrávit in cælum.
          In Æmília, Itáliæ província, sanctæ Iucúndæ Vírginis.
      en2:
      - type: text
        text: |-
          The Twenty-fifth of November
      
          At Alexandria, Saint Catherine, Virgin and Martyr, who, for confessing the Christian faith, under the Emperor Maximinus, was thrust into prison, and afterwards beaten most long with scorpions, at last completed her martyrdom by beheading. Her body, wondrously carried by Angels to Mount Sinai, is there venerated with devout reverence by the frequent concourse of Christians.
          At Rome, Saint Moses, Priest and Martyr; whom, held in prison with others, Saint Cyprian frequently consoled by letters. Moses himself, having stood unbroken not only against the Gentiles but also against the schismatics and Novatian heretics, at last (as Pope Saint Cornelius testifies), in the persecution of Decius, was adorned with an excellent and admirable martyrdom.
          At Antioch, Saint Erasmus, Martyr.
          At Caesarea, in Cappadocia, the passion of Saint Mercurius, a soldier, who, under the patronage of the Angel guarding him, both overcame the barbarians and surmounted the cruelty of Decius; and, adorned with the trophies of many torments, was crowned with martyrdom and departed to heaven.
          In Aemilia, a province of Italy, Saint Jucunda, Virgin.
  psalm.s-ptimo-kal-ndas-febru-rii-23b9dbc107:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of January, were born into the better life:

          At Smyrna, holy Polycarp, a disciple of the blessed Apostle John, and by him ordained Bishop of that city, having the charge of all Asia. In the reign of Mark Antony, and Lucius Aurelius Commodus, as the Pro-consul was sitting in the amphitheatre all the people cried out against Polycarp, and to please them he was cast into the fire, but forasmuch as it burned him not he was pierced with the sword, and so received the crown of martyrdom, (in the year 166.) With him there suffered also twelve others that were come from Philadelphia unto the city aforesaid.
          At Hippo, in Africa, the holy martyrs Theogenes, Bishop of that city, and thirty-six others, who in the persecution under the Emperor Valerian reckoned cheaply death here in time, and received the crown of life eternal, (about the year 260.)
          At Bethlehem of Judah, the holy widow Paula, mother of Eustochium, the virgin of Christ. She was of a very noble senatorial family, that gave up the world and distributed all her goods to feed the poor and betook herself to the manger of the Lord, and thence passed away into the kingdom of heaven endowed with many graces and crowned with a long martyrdom, (in the year 404.) Jerome hath written of her life, full of graces.
          In the country of Paris, (in the year 685,) holy Bathildes, Queen (of France,) illustrious for her holiness and the glory of her miracles.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Februárii

          Sancti Polycárpi, Epíscopi Smyrnénsis et Mártyris, qui martýrii corónam séptimo Kaléndas Mártii consecútus est.
          Hippóne Régio, in Africa, sanctórum Theógenis Epíscopi, et aliórum trigínta sex, qui, in persecutióne Valeriáni, contemnéntes temporálem mortem, corónam ætérnæ vitæ adépti sunt.
          Apud Béthlehem Iudæ dormítio sanctæ Paulæ Víduæ, quæ, cum esset e nobilíssimo Senatórum génere, cum beata Vírgine Christi Eustóchio, fília sua, renúntians sǽculo, facultátes suas paupéribus distríbuit, et ad Præsépe Dómini se recépit; ibíque, multis virtútibus prǽdita et longo coronáta martýrio, ad cæléstia regna transívit. Ipsíus autem vitam, virtútibus admirándam, sanctus Hierónymus scripsit.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of January
      
          Saint Polycarp, Bishop of Smyrna and Martyr, who obtained the crown of martyrdom on the twenty-third of February.
          At Hippo Regius, in Africa, the holy Theogenes, Bishop, and thirty-six others, who, in the persecution of Valerian, despising temporal death, obtained the crown of eternal life.
          At Bethlehem in Judea, the passing of Saint Paula, Widow, who, being of the most noble senatorial family, together with the blessed Virgin of Christ Eustochium, her daughter, renouncing the world, distributed her resources to the poor, and withdrew to the manger of the Lord; and there, endowed with many virtues and crowned with a long martyrdom, passed to the heavenly kingdom. Saint Jerome wrote her life, admirable for its virtues.
  psalm.s-ptimo-kal-ndas-i-lii-73f2e73ffe:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 25th day of June, were born into the better life:

          In the country of Golet, near Nusco, the holy Confessor William, father of the hermits of Monte Vergine.
          At Bercea, holy Sosipater, disciple of the blessed Apostle Paul.
          At Rome, the holy Virgin and martyr Lucy, with twenty-two others.
          At Alexandria, the holy martyr Gallican. This was a man of Consular rank, who had received the honour of a triumph and was a personal friend of the Emperor Constantine. He was converted to the faith of Christ by holy John and Paul. After his conversion he withdrew to Ostia with holy Hilarinus, when he gave himself entirely to the service of strangers and the sick. This got noised abroad in all the world so that people came from all parts to see a man who had been a patrician and a consul washing the feet of the poor, laying the table, pouring water on the guests' hands, ministering carefully to the sick, and performing other offices of mercy. He was turned out of Ostia under the Emperor Julian the Apostate, and went to Alexandria. There the judge Raucian would needs have him sacrifice, and forasmuch as he would not, caused him to be beheaded, and so he became Christ's martyr.
          At Sibapolis, in Syria, the holy Virgin and martyr Febronia on account of her steadfastness in faith and chastity during the persecution under Diocletian, the judge Lysimachus ordered her to be first beaten with rods and tormented upon the rack, then torn with combs and burnt with fire afterwards her teeth were hammered out and her breasts cut off, and then she was beheaded, and so passed away to her Divine Bridegroom prepared with all these sufferings as a bride adorned for her husband.
          At Besançon, in Gaul, the holy martyr Antidius, Bishop of Besançon, who for Christ's faith's sake was slain by the Vandals.
          At Reggio, holy Prosper of Aquitaine, Bishop of that city, famous for his learning and godliness, who stoutly contended for the Catholic faith against the Pelagians.
          At Turin, the holy Confessor Maximus, Bishop of Turin, very famous for his teaching and holiness.
          In Holland, the holy Confessor Adelbert, the disciple of holy Willibrord, Archbishop [of Utrecht.]
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Iúlii

          In território Guléti, prope Nuscum, sancti Guliélmi Confessóris, Patris Eremitárum Montis Vírginis.
          Apud Beróeam natális sancti Sosípatris, qui fuit discípulus beáti Pauli Apóstoli.
          Romæ sanctæ Lúciæ, Vírginis et Mártyris, cum áliis vigínti duóbus.
          Alexandríæ sancti Gallicáni Mártyris, viri Consuláris, qui, sublimátus ínfulis triumphálibus et Constantíno Augústo carus, a sanctis Ioánne et Paulo ad Christi fidem convérsus est; eáque suscépta, cum sancto Hilaríno secéssit ad Ostia Tiberína, atque ibi hospitalitáti et infirmórum servítio totum se dedit. Cuius rei fama in toto Orbe divulgáta, multi úndique illuc veniéntes vidébant virum ex Patrício et Cónsule laváre páuperum pedes, pónere mensam, aquam mánibus effúndere, languéntibus sollícite ministráre et cétera pietátis offícia exhibére. Ipse póstmodum, sub Iuliáno Apóstata, inde expúlsus, Alexandríam perréxit; ibíque, cum a Rauciáno Iúdice sacrificáre cogerétur et contémneret, ídeo, percússus gládio, Christi Martyr efféctus est.
          Sibápoli, in Mesopotámia, sanctæ Febróniæ, Vírginis et Mártyris; quæ, in persecutióne Diocletiáni, sub Siléno Iúdice, ob fidem et pudicítiam servándam, primo virgis cæsa et equúleo torta, deínde pectínibus laniáta atque igne succénsa, demum, excússis déntibus ac mammis pedibúsque abscíssis, cápitis damnáta, tot passiónum ornáta monílibus migrávit ad Sponsum.
          Apud Rhégium sancti Prósperi Aquitáni, eiúsdem urbis Epíscopi, eruditióne ac pietáte insígnis, qui advérsus Pelagiános, pro fide cathólica, strénue decertávit.
          Tauríni natális sancti Máximi, Epíscopi et Confessóris, doctrína et sanctitáte celebérrimi.
          In Hollándia sancti Adelbérti Confessóris, qui fuit discípulus sancti Willibrórdi Epíscopi.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of June
      
          In the territory of Goleto, near Nusco, Saint William, Confessor, Father of the Hermits of Monte Vergine.
          At Beroea, the birth of Saint Sosipatrus, who was a disciple of the blessed Apostle Paul.
          At Rome, Saint Lucy, Virgin and Martyr, with twenty-two others.
          At Alexandria, Saint Gallicanus, Martyr, a man of consular rank, who, raised to triumphal honors and dear to Augustus Constantine, was converted to the faith of Christ by Saints John and Paul; and having embraced it, withdrew with Saint Hilarinus to Ostia on the Tiber, and there devoted himself entirely to hospitality and the service of the sick. The fame of this spread throughout the whole world, and many came from everywhere and saw a man who had been Patrician and Consul washing the feet of the poor, setting table, pouring water on hands, diligently ministering to the sick, and performing other offices of piety. He himself afterwards, under Julian the Apostate, expelled from there, went to Alexandria; and there, when he was compelled by the judge Raucianus to sacrifice and refused, was for this reason struck with a sword and became a Martyr of Christ.
          At Sibapolis, in Mesopotamia, Saint Febronia, Virgin and Martyr; who, in the persecution of Diocletian, under the judge Silenus, to preserve her faith and purity, first beaten with rods and tortured on the rack, then torn with iron combs and set on fire, finally, with her teeth knocked out and her breasts and feet cut off, was condemned to beheading, and adorned with so many ornaments of passion, passed to her Spouse.
          At Reggio, Saint Prosper of Aquitaine, Bishop of the same city, renowned for learning and piety, who strenuously fought against the Pelagians for the Catholic faith.
          At Turin, the birth of Saint Maximus, Bishop and Confessor, most celebrated for learning and holiness.
          In Holland, Saint Adalbert, Confessor, who was a disciple of Saint Willibrord the Bishop.
  psalm.s-ptimo-kal-ndas-i-nii-6ceb0d6f9d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the same 26th day of May, were born into the better life:

          At Rome, holy Philip Neri, founder of the Congregation of the Oratory, famous for his virginity, his gift of prophecy, and his wondrous works.
          Also at Rome, the holy Pope and martyr Eleutherius, who led many noble Romans to believe in Christ, and who sent into Britain holy Dyfan and Ffagan, who baptized Lleurwg, Prince [of Morgan,] along with his wife and nearly all his people. We keep his feast upon the 29th day of this present month of May.
          Also in England the feast of the holy Augustine, first Archbishop of Canterbury, called Apostle of England. He was sent hither, along with others, by the blessed Pope Gregory. He preached the Gospel of Christ to the English people. He fell asleep in the Lord at Canterbury, glorious for his graces and wondrous works.
          Also at Rome, the holy Priest Simitrius, and twenty-two others, who suffered martyrdom under the Emperor Antoninus Pius.
          At Athens, the blessed Quadratus, a disciple of the Apostles. During the persecution under Hadrian the Church was scattered in great fear, but he gathered it together again by his faith and labour, and gave unto it a book very useful for the defending of the Christian religion, and worthy of the teaching of the Apostles.
          At Vienne, in Dauphiny, the holy Zachary, Bishop [of that see,] who suffered martyrdom under Trajan.
          In Africa, the holy martyr Quadratus, on whose feast-day holy Augustine [of Hippo] preached a sermon.
          At Todi, [in the persecution under the Emperor Diocletian,] the holy martyrs Felicissimus, Heraclius, and Paulinus.
          In the country of Auxerre, [in the second century,] the holy Priscus and a vast multitude of Christ's faithful people suffered martyrdom.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Iúnii

          Romæ sancti Philíppi Nérii, Presbýteri et Confessóris, qui Congregatiónis Oratórii Fundátor fuit, ac virginitáte, prophetíæ dono, et miráculis éxtitit insígnis.
          Item Romæ sancti Eleuthérii, Papæ et Mártyris, qui multos nóbiles Romanórum ad fidem Christi perdúxit, et sanctos Damiánum et Fugátium in Británniam misit, qui Lúcium Regem, cum uxóre ipsíus ac toto fere pópulo, baptizárunt.
          Cantuáriæ, in Anglia, natális sancti Augustíni, Epíscopi et Confessóris; qui, una cum áliis, a beáto Gregório Papa missus, genti Anglórum sacrum Christi Evangélium prædicávit, ibíque, virtútibus et miráculis gloriósus, obdormívit in Dómino. Eius tamen festívitas quinto Kaléndas Iúnii recólitur.
          Athénis item natális beáti Quadráti, Apostolórum discípuli, qui, in persecutióne Hadriáni, fide et indústria sua cóngregans Ecclésiam grandi terróre dispérsam, librum pro Christiánæ religiónis defensióne, valde útilem et Apostólica doctrína dignum, eídem Imperatóri porréxit.
          Romæ sanctórum Mártyrum Simítrii Presbýteri, et aliórum vigínti duórum; qui sub Antoníno Pio passi sunt.
          Viénnæ, in Gállia, sancti Zacharíæ, Epíscopi et Mártyris, qui sub Traiáno passus est.
          In Africa sancti Quadráti Mártyris, in cuius solemnitáte sanctus Augustínus sermónem hábuit.
          Tudérti, in Umbria, natális sanctórum Mártyrum Felicíssimi, Heráclii et Paulíni.
          In território Antisiodorénsi pássio sancti Prisci Mártyris, qui, cum ingénti multitúdine fidélium Christi, cápite cæsus est.
          In civitáte Quiténsi, Æquatoriánæ Ditiónis, sanctæ Maríæ Annæ a Iesu de Parédes, Vírginis, e tértio Ordine sancti Francísci, austeritáte et in próximum caritáte præcláræ, quam Pius Papa Duodécimus sanctárum Vírginum catálogo adnumerávit.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of May
      
          At Rome, Saint Philip Neri, Priest and Confessor, who was the Founder of the Congregation of the Oratory, and was distinguished for virginity, the gift of prophecy, and miracles.
          Likewise at Rome, Saint Eleutherius, Pope and Martyr, who led many nobles of the Romans to the faith of Christ, and sent Saints Damianus and Fugatius to Britain, who baptized King Lucius, with his wife and nearly all the people.
          At Canterbury, in England, the birth of Saint Augustine, Bishop and Confessor; who, together with others, sent by blessed Pope Gregory, preached the holy Gospel of Christ to the English people, and there, glorious for virtues and miracles, fell asleep in the Lord. However, his feast is recalled on the twenty-eighth of May.
          At Athens, likewise the birth of blessed Quadratus, a disciple of the Apostles, who, in the persecution of Hadrian, gathering together by his faith and industry the Church scattered by great terror, presented to the same Emperor a book for the defense of the Christian religion, very useful and worthy of Apostolic teaching.
          At Rome, the holy Martyrs Simiterius the Priest and twenty-two others; who suffered under Antoninus Pius.
          At Vienne, in France, Saint Zacharias, Bishop and Martyr, who suffered under Trajan.
          In Africa, Saint Quadratus, Martyr, at whose feast Saint Augustine delivered a sermon.
          At Todi, in Umbria, the birth of the holy Martyrs Felicissimus, Heracles, and Paulinus.
          In the territory of Auxerre, the passion of Saint Priscus, Martyr, who, with a great multitude of the faithful of Christ, was beheaded.
          In the city of Quito, of the Ecuadorian territory, Saint Mary Anne of Jesus de Paredes, Virgin, of the Third Order of Saint Francis, renowned for austerity and charity toward neighbor, whom Pope Pius the Twelfth numbered in the catalogue of holy Virgins.
  psalm.s-ptimo-kal-ndas-ianu-rii-9d0bb917d0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 26th day of December, was born into the higher life

          At Jerusalem, holy Stephen, the first Martyr. He was stoned by the Jews not long after the Ascension of the Lord.
          At Rome, holy Marinus, of the Senatorial order. He was arrested under the Emperor Numerian and the Praefect Marcian, on the charge of being a Christian. He was tortured as they used to do to slaves, on the rack and with iron claws. They threw him into a furnace, but the fire was turned into dew, and he was delivered. He was thrown to wild beasts, but they left him unharmed. He was led again to the altar, and, when he prayed, the idols fell down. Then they smote him with the sword, and he became more than conqueror through up-lifting of his testimony.
          Likewise, at Rome, on this day was laid to sleep (in the year 269) beside the Appian Road the holy Pope Denys, who worked hard for the Church, and is a bright ensample of faith.
          At the same place (in the year 417), the holy Pope and confessor Zosimus.
          In Mesopotamia, the holy Bishop Archelaus, well known for his teaching and holiness.
          At Verona (in the year 380), holy Bishop Zeno.
          At Rome, holy Theodore, the chamberlain of St Peter's church, of whom mention is made by blessed Pope Gregory.
          And in diverse places an exceeding great multitude of holy Martyrs and Confessors and holy Virgins.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Ianuárii

          Hierosólymis natális sancti Stéphani Protomártyris, qui a Iudǽis, non longe post Ascensiónem Dómini, lapidátus est.
          Romæ sancti Maríni, ex órdine Senatório viri, qui, sub Numeriáno Imperatóre et Marciáno Præfécto, Christiánæ religiónis causa comprehénsus, equúleo et úngulis servíli more punítus, in sartáginem deínde coniéctus, sed, igne in rorem convérso, liberátus, obiéctus quoque feris et ab illis nullátenus læsus; tandem, ad aram íterum ductus, et, cum idóla oratióne eius corruíssent, percússus gládio, martýrii triúmphum adéptus est.
          Ibídem, via Appia, deposítio sancti Dionýsii Papæ, qui, multis pro Ecclésia impénsis labóribus, fídei documentis clarus effúlsit.
          Item Romæ sancti Zósimi, Papæ et Confessóris.
          In Mesopotámia sancti Archelái Epíscopi, doctrína et sanctitáte célebris.
          Maiúmæ, in Palæstína, sancti Zenónis Epíscopi.
          Romæ sancti Theodóri, qui Mansionárius Ecclésiæ sancti Petri fuit, cuius et méminit beátus Gregórius Papa.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of December
      
          At Jerusalem, the birth of Saint Stephen, the First Martyr, who was stoned by the Jews not long after the Ascension of the Lord.
          At Rome, Saint Marinus, a man of senatorial rank, who, under the Emperor Numerian and the Prefect Marcianus, seized for the cause of the Christian religion, punished on the rack and with claws as though a slave, then cast into a frying pan, but, with the fire turned to dew, was freed, also thrown to the beasts and not at all harmed by them; at last, brought again to an altar, and when the idols fell at his prayer, struck with a sword, he obtained the triumph of martyrdom.
          In the same city, on the Appian Way, the deposition of Saint Dionysius, Pope, who, having spent many labors for the Church, shone with the proofs of faith.
          Likewise at Rome, Saint Zosimus, Pope and Confessor.
          In Mesopotamia, Saint Archelaus, Bishop, renowned for learning and holiness.
          At Maiuma, in Palestine, Saint Zeno, Bishop.
          At Rome, Saint Theodore, who was the Mansionarius of the Church of Saint Peter, of whom blessed Pope Gregory also makes mention.
  psalm.s-ptimo-kal-ndas-m-rtii-4c2057c356:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the eve of the holy Apostle Matthias.
          Upon the 23rd day of February, were born into the better life:

          At Faenza, the holy Peter Damian, [988-1072,] Cardinal Bishop of Ostia, famous for his teaching and holiness, whom Pope Leo XII declared to be a Doctor of the Universal Church.
          At Sirmium, [in the year 307,] the blessed martyr Sirenus a monk who was apprehended by order of the Emperor Maximian, and when he confessed himself to be a Christian was beheaded.
          There likewise, seventy-two holy martyrs, who finished the combat of martyrdom in that city, and received kingdoms which fade not away, eternal in the heavens.
          At Rome, [in the fourth century,] the holy Priest Polycarp, who, along with the blessed Sebastian, brought many to believe in Christ, and by his exhortations led them to the glory of martyrdom.
          In the city of Astorga, [in the year 252,] the holy Virgin Martha, martyred under the Emperor Decius and the Proconsul Paternus.
          At Constantinople, [about the year 860,] the holy monk Lazarus. Because he painted holy images, the Emperor Theophilus, the Iconoclast, put him to grievous tortures, and burnt his hands with a white-hot iron but he was healed by the power of God, restored the painting upon the holy images that had been defaced, and at length fell asleep in peace.
          At Brescia, [about 652,] holy Felix, Bishop of that see.
          At Seville, in Spain, [in the year 485,] the holy Confessor Florence.
          At Todi, [in 324,] the holy Virgin Romana, who was baptized by holy Pope Sylvester, led a heavenly life in dens and caves of the earth, and shone with the glory of miracles.
          In England, [in the seventh century,] the holy Virgin Milburga, daughter of the king of the Mercians, [sister of St. Mildred, and Abbess of Wenlock, Shropshire.]
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Mártii

          Sancti Petri Damiáni, ex Ordine Camaldulénsi, Cardinális et Epíscopi Ostiénsis, Confessóris et Ecclésiæ Doctóris, qui evolávit in cælum prídie huius diéi.
          Smyrnæ natális sancti Polycárpi, qui, beáti Ioánnis Apóstoli discípulus, et ab eo eiúsdem civitátis Epíscopus ordinátus, totíus Asiæ Princeps fuit. Póstea, sub Marco Antoníno et Lúcio Aurélio Cómmodo, sedénte Procónsule et univérso pópulo in theátro advérsus eum personánte, igni tráditus est; et, cum ab igne mínime læderétur, martýrii corónam, gládio confóssus, accépit. Cum illo étiam álii duódecim, qui ex Philadélphia vénerant, in eádem Smyrnénsi urbe, martýrio consummáti sunt. Ipsíus tamen Polycárpi festum séptimo Kaléndas Februárii celebrátur.
          Apud Sírmium beáti Siréni, Mónachi et Mártyris, qui, iubénte Maximiáno Imperatóre, reténtus est, et, cum se Christiánum esse confiterétur, cápite obtruncátus.
          Ibídem natális sanctórum septuagínta duórum Mártyrum, qui, martýrii certámen in præfáta urbe consummántes, mansúra percepérunt regna.
          In civitáte Asturicénsi, in Hispánia, sanctæ Marthæ, Vírginis et Mártyris, quæ, sub Décio Imperatóre et Patérno Procónsule, dire ob Christi fidem est cruciáta et gládio tandem occísa.
          Constantinópoli sancti Lázari Mónachi, qui, cum sacras Imágines píngeret, idcírco, Imperatóris Iconoclástæ Theóphili iussu, diris supplíciis excruciátur, et ei manus candénti ferro combúritur; sed, Dei virtúte sanátus, abrásas Imágines sanctas pingéndo restítuit, ac demum in pace quiévit.
          Bríxiæ sancti Felícis Epíscopi.
          Romæ sancti Polycárpi Presbýteri, qui, cum beáto Sebastiáno, plúrimos ad Christi fidem convértit, atque ad martýrii glóriam exhortándo perdúxit.
          Híspali, in Hispánia, sancti Floréntii Confessóris.
          Tudérti, in Umbria, sanctæ Románæ Vírginis, quæ, a sancto Silvéstro Papa baptizáta, in antris et spelúncis cæléstem vitam duxit, et miraculórum glória cláruit.
          In Anglia sanctæ Milbúrgis Vírginis, fíliæ Regis Merciórum.
      - type: rubric
        text: 'In anno Bissextili bis pronuntiatur Sexto Kaléndas Mártii, et eadem Luna, scilicet die 24 et 25. Prima die, id est 24, hoc modo: Sexto Kaléndas Mártii. Luna..., quota fuerit. Deinde: Commemorátio plurimórum sanctórum Mártyrum et Confessórum, atque sanctárum Vírginum. Secunda die, id est 25: Sexto Kaléndas Mártii. Luna... In Iudǽa..., et cetera, ut in sequenti Lectione.'
      en2:
      - type: text
        text: |-
          The Twenty-third of February
      
          Saint Peter Damian, of the Camaldolese Order, Cardinal and Bishop of Ostia, Confessor and Doctor of the Church, who flew to heaven on the preceding day.
          At Smyrna, the birth of Saint Polycarp, who, a disciple of the blessed Apostle John, and ordained by him as Bishop of the same city, was the foremost man of all Asia. Afterwards, under Marcus Antoninus and Lucius Aurelius Commodus, the Proconsul presiding and the whole people in the theater crying out against him, he was handed over to the fire; and, not harmed at all by the fire, he received the crown of martyrdom, pierced with a sword. With him also twelve others, who had come from Philadelphia, in the same city of Smyrna, completed their martyrdom. However, the feast of Polycarp is celebrated on the twenty-sixth of January.
          At Sirmium, blessed Sirenus, Monk and Martyr, who, by command of the Emperor Maximian, was arrested, and when he confessed himself a Christian, was beheaded.
          In the same place, the birth of seventy-two holy Martyrs, who, completing their contest of martyrdom in the aforesaid city, received everlasting kingdoms.
          In the city of Astorga, in Spain, Saint Martha, Virgin and Martyr, who, under the Emperor Decius and the proconsul Paternus, was cruelly tortured for the faith of Christ and finally slain with a sword.
          At Constantinople, Saint Lazarus, Monk, who, for painting sacred Images, was for this reason tortured with dreadful punishments by order of the Iconoclast Emperor Theophilus, and his hands were burned with red-hot iron; but, healed by the power of God, he restored by painting the sacred Images that had been defaced, and at last rested in peace.
          At Brescia, Saint Felix, Bishop.
          At Rome, Saint Polycarp, Priest, who, together with blessed Sebastian, converted very many to the faith of Christ, and encouraged them by exhortation to the glory of martyrdom.
          At Seville, in Spain, Saint Florentius, Confessor.
          At Todi, in Umbria, Saint Romana, Virgin, who, baptized by Pope Saint Sylvester, lived a heavenly life in caves and caverns, and was renowned for the glory of miracles.
          In England, Saint Milburga, Virgin, daughter of the King of Mercia.
      - type: rubric
        text: 'In a leap year, the Sixth day before the Kalends of March is announced twice, and on the same Moon, that is, on the 24th and 25th. On the first day, that is the 24th, in this manner: the Sixth day before the Kalends of March. The Moon..., whatever it was. Then: A commemoration of very many holy Martyrs and Confessors, and of holy Virgins. On the second day, that is the 25th: the Sixth day before the Kalends of March. The Moon... In Judea..., and the rest, as in the following Reading.'
  psalm.s-ptimo-kal-ndas-maii-3c453123cd:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 25 th day of April, were born into the better life:

          At Alexandria, the blessed Evangelist Mark. He was the disciple and interpreter of the Apostle Peter. He wrote his Gospel at the prayer of the brethren at Rome. He took it with him and went to Egypt, where he was the first man who proclaimed Christ at Alexandria, and where he founded that Church. He was afterward arrested as a believer in Christ, bound with cords, and dragged over stones to his grievous suffering. Then he was remanded to prison, where he was comforted first by a visitation of angels and then by the Lord Himself appearing unto him, and was called unto the kingdom of heaven in the 8th year of Nero, [in the year 68.]
          At Rome, the Greater Litanies, [instituted in sixth century by Pope St. Gregory I, The Great,] take place at St Peter's Church.
          At Syracuse, the holy martyrs Evodius, Hermogenes, and Kallistas. [They were brothers and sister.]
          At Antioch, [in the year 479] the holy martyr Stephen, Patriarch of that see, who suffered many things at the hands of the heretics who assailed the Council of Chalcedon, and was cast into the river Orontes, in the time of the Emperor Zeno. There likewise, [in the second century,] the holy Deacons Philo and Agathopodes.
          At Alexandria, holy Anian, Pope of that see. He was the disciple of blessed Mark, and held that Papacy.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Maii

          Romæ Litaníæ maióres ad sanctum Petrum.
          Alexandríæ natális beáti Marci Evangelístæ. Hic, discípulus et intérpres Apóstoli Petri, rogátus Romæ a frátribus scripsit Evangélium, quo assúmpto, perréxit in Ægýptum, primúsque Alexandríæ Christum annúntians, constítuit Ecclésiam; ac póstea, pro fide Christi tentus, fúnibus vinctus et per saxa raptátus, gráviter afflíctus est; deínde, reclúsus in cárcere, primo angélica visitatióne confortátus est, et demum, ipso Dómino sibi apparénte, ad cæléstia regna vocátus, octávo Nerónis anno.
          Item Alexandríæ sancti Aniáni Epíscopi, qui, beáti Marci discípulus eiúsque in Episcopátu succéssor, clarus virtútibus quiévit in Dómino.
          Antiochíæ sancti Stéphani, Epíscopi et Mártyris, qui ab hæréticis Synódum Chalcedonénsem impugnántibus, multa passus, in Oróntem flúvium præcipitátus est, témpore Zenónis Imperatóris.
          Syracúsis, in Sicília, sanctórum Mártyrum fratrum Evódii, Hermógenis et Callístæ.
          Láubiis, in Bélgio, natális sancti Ermíni, Epíscopi et Confessóris.
          Antiochíæ sanctórum Philónis et Agathopódis Diaconórum, de quibus beátus Ignátius, Epíscopus et Martyr, laudábilem in suis epístolis mentiónem facit.
      en2:
      - type: text
        text: |-
          The Twenty-fifth of April
      
          At Rome, the Greater Litanies at Saint Peter's.
          At Alexandria, the birth of blessed Mark the Evangelist. He, a disciple and interpreter of the Apostle Peter, at the request of the brothers at Rome wrote the Gospel; taking it up, he went to Egypt, and, announcing Christ first at Alexandria, established the Church; and afterwards, seized for the faith of Christ, bound with ropes and dragged over rocks, he was gravely afflicted; then shut up in prison, first he was comforted by an angelic visitation, and at last, with the Lord himself appearing to him, was called to the heavenly kingdom in the eighth year of Nero.
          Likewise at Alexandria, Saint Anianus, Bishop, who, a disciple of blessed Mark and his successor in the Episcopate, rested in the Lord renowned for virtues.
          At Antioch, Saint Stephen, Bishop and Martyr, who, after much suffering at the hands of heretics attacking the Council of Chalcedon, was thrown into the Orontes River in the time of the Emperor Zeno.
          At Syracuse, in Sicily, the holy Martyr brothers Evodius, Hermogenes, and Callista.
          At Lobbes, in Belgium, the birth of Saint Ermin, Bishop and Confessor.
          At Antioch, the holy Deacons Philo and Agathopus, of whom blessed Ignatius, Bishop and Martyr, makes laudable mention in his letters.
  psalm.s-ptimo-kal-ndas-nov-mbris-07bd389d35:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of October, was born into the better life:

          At Rome, the holy martyr, Pope Evaristus, who dyed the Church of God with his blood under the Emperor Hadrian.
          In Africa, the holy martyrs Rogatian the Priest and Felicissimus, who were crowned with a glorious martyrdom in the persecution under the Emperors Valerian and Gallienus. Holy Cyprian writeth of them in his epistle unto the Confessors.
          At Nicomedia, (in the persecution under the Emperor Decius,) the holy martyrs Lucian, Florius, and their Companions.
          On the same day, holy Quod-Vult-Deus, Bishop of Carthage, whom the Arian king Genseric embarked along with his clergy in unseaworthy ships without oars or sails, but beyond all hope he arrived at Naples and there died in exile as a Confessor.
          At Narbonne, the holy Confessor Rusticus, Bishop (of that see,) who enlightened the times of the Emperors Valentinian and Leo.
          At Salerno, (in the seventh century,) holy Gaudiosus, Bishop (of that see.)
          At Pavia, (in the year 1229,) holy Fulke, Bishop (of that see.)
          At Hildesheim, in Saxony, the holy Confessor Bernward, Bishop (of that see,) whose name Celestine III numbered with those of the Saints.
          Also (at Policastro, in the sixth century,) the holy Sub-deacon Quadragesimus, who raised a dead man to life, (as is related by the blessed Pope Gregory.)
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Novémbris

          Romæ sancti Evarísti, Papæ et Mártyris, qui Dei Ecclésiam, sub Hadriáno Imperatóre, suo sánguine purpurávit.
          In Africa sanctórum Mártyrum Rogatiáni Presbýteri, et Felicíssimi, qui, in persecutióne Valeriáni et Galliéni, illústri martýrio coronáti sunt; de quibus étiam scribit sanctus Cypriánus in epístola ad Confessóres.
          Nicomedíæ sanctórum Mártyrum Luciáni, Flórii et Sociórum.
          Narbóne, in Gállia, sancti Rústici, Epíscopi et Confessóris; qui cláruit tempóribus Valentiniáni et Leónis Imperatórum.
          Apud Salérnum sancti Gaudiósi Epíscopi.
          Pápiæ sancti Fulci Epíscopi.
          Item sancti Quadragésimi Subdiáconi, qui et mortuum resuscitávit.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of October
      
          At Rome, Saint Evaristus, Pope and Martyr, who, under the Emperor Hadrian, purpled the Church of God with his own blood.
          In Africa, the holy Martyrs Rogatianus the Priest, and Felicissimus, who, in the persecution of Valerian and Gallienus, were crowned with an illustrious martyrdom; about whom Saint Cyprian also writes in a letter to the Confessors.
          At Nicomedia, the holy Martyrs Lucianus, Florius, and their Companions.
          At Narbonne, in France, Saint Rusticus, Bishop and Confessor; who flourished in the time of the Emperors Valentinian and Leo.
          At Salerno, Saint Gaudiosius, Bishop.
          At Pavia, Saint Fulcus, Bishop.
          Likewise, Saint Quadragesimus, Sub-deacon, who also raised the dead.
  psalm.s-ptimo-kal-ndas-oct-bris-535b2b6b2d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Ninian, Bishop of Galloway in Scotland, of whom mention is made upon the 16th day of this present month of September.
          Upon the same 25th day of September, were born into the better life: At the village of Emmaus, blessed Cleophas, the disciple of Christ, of whom it is said that he was slain by the Jews for confessing the Lord, and thereafter buried with glorious memory within the same house wherein he had prepared a table for the Lord.
          At Rome, the holy martyr Herculan.
          He was a soldier who was turned to Christ on beholding the miracles that were wrought at the passion of the blessed bishop (Pope) Alexander (the First) and was beheaded under the Emperor Antonine, after suffering many torments.
          At Amiens, in Gaul, blessed Firmin, (of Pampeluna, first) Bishop (of Amiens,) who suffered martyrdom under the President Rictiovarus, in the persecution under Diocletian, by being beheaded, after enduring diverse torments.
          At Damascus, the holy martyrs Paul, Tatta his wife, and their sons Sabinian, Maximus, Rufus, and Eugene.
          On the accusation that they were Christians they were flogged and otherwise tormented, and gave up their souls to God.
          In Asia, the holy martyrs Bardomian, Eucarpus, and twenty-six others.
          On the same day, holy Anathalon; he was a disciple of the blessed Apostle Barnabas, and followed after him as Bishop of the Church of Milan.
          At Lyon, (in the year 542) holy Lupus, Bishop (of that see,) who had been an hermit.
          At Auxerre, (at the beginning of the seventh century,) the holy Confessor Anacharius, Bishop (of that see.) At Blois, (at the beginning of the sixth century,) holy Solemnius, Bishop of Chartres, famous for miracles.
          On the same day, (and at the distance of a few years,) holy Principius, Bishop of Soissons, brother to blessed Remi, Bishop of Rheims.
          At Anagni, the holy Virgins Aurelia and Neomisia.
          At San Severino, in the March of Ancona, (in the year 1721) the holy Confessor Pacificus, of the Order of Franciscan Friars Minor of the Reformed Observance, a man of wonderful long-suffering and famous for his love of being alone, whose name Pope Gregory XVI enrolled in the list of the saints.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Octóbris

          Apud castéllum Emmaus natális beáti Cléophæ, qui fuit Christi discípulus, quem et in eádem domo in qua mensam Dómino paráverat, pro confessióne illíus a Iudǽis occísum tradunt, et gloriósa memória sepúltum.
          Ambiáni, in Gállia, beáti Firmíni Epíscopi, qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, post vária torménta, cápitis decollatióne martýrium sumpsit.
          Eódem die, via Cláudia, sancti Herculáni, mílitis et Mártyris; qui, sub Antoníno Imperatóre, miráculis in passióne beáti Alexándri Epíscopi ad Christum convérsus, atque ob fídei confessiónem, post multa torménta, gládio cæsus est.
          Damásci sanctórum Mártyrum Pauli, et Tattæ cóniugis, ac Sabiniáni, Máximi, Rufi et Eugénii filiórum; qui, Christiánæ religiónis accusáti, verbéribus aliísque supplíciis torti sunt, et in cruciátibus ánimas Deo reddidérunt.
          In Asia pássio sanctórum Bardomiáni, Eucárpi et aliórum vigínti sex Mártyrum.
          Lugdúni, in Gállia, deposítio sancti Lupi, qui ex Anachoréta factus est Epíscopus.
          Antisiodóri sancti Anachárii, Epíscopi et Confessóris.
          Blesis, in Gállia, sancti Solémnii, Epíscopi Carnuténsis, miráculis clari.
          Eódem die sancti Princípii, qui fuit Epíscopus Suessionénsis et frater beáti Remígii Epíscopi.
          Anágniæ sanctárum Vírginum Auréliæ et Neomísiæ.
      en2:
      - type: text
        text: |-
          The Twenty-fifth of September
      
          At the castle of Emmaus, the birth of blessed Cleophas, who was a disciple of Christ, and who, tradition says, was slain by the Jews in the same house in which he had prepared the table for the Lord, for confessing him, and was buried with glorious memory.
          At Amiens, in France, blessed Firminus, Bishop, who, in the persecution of Diocletian, under the Governor Rictiovarus, after various torments, underwent martyrdom by beheading.
          On the same day, on the Claudian Way, Saint Herculanus, soldier and Martyr; who, under the Emperor Antoninus, converted to Christ by the miracles at the passion of blessed Alexander the Bishop, and on account of confessing the faith, after many torments, was slain with a sword.
          At Damascus, the holy Martyrs Paul and Tatta, his wife, and their sons Sabinianus, Maximus, Rufus, and Eugene; who, accused of the Christian religion, were tortured with blows and other punishments, and gave up their souls to God amid the tortures.
          In Asia, the passion of the holy Martyrs Bardomianus, Eucarpus, and twenty-six others.
          At Lyons, in France, the deposition of Saint Lupus, who from a hermit became a Bishop.
          At Auxerre, Saint Anacharisus, Bishop and Confessor.
          At Blois, in France, Saint Solemnis, Bishop of Chartres, renowned for miracles.
          On the same day, Saint Principius, who was Bishop of Soissons and the brother of blessed Remigius the Bishop.
          At Anagni, the holy Virgins Aurelia and Neomisia.
  psalm.s-ptimo-kal-ndas-sept-mbris-7a7408a00b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of August, were born into the better life:

          At Rome, [in the year 219,] the holy Pope and martyr Zephyrinus.
          Likewise at Rome, [in the third century,] the holy martyrs Irenaeus and Abundius. In the persecution under the Emperor Valerian they took the body of blessed Concordia out of the sewer into which it had been thrown, and for so doing were themselves drowned in the same sewer. Justin the Priest drew their bodies thence, and buried them under the ground near blessed Lawrence.
          At Vintimiglia, [under the Emperor Maximian,] the holy martyr Secundus. He was a man of good social position, and a captain in the Theban Legion.
          At Bergamo, [in the year 286,] the holy martyr Alexander, who was also a soldier of the same legion. As he constantly confessed the name of the Lord Jesus Christ he was beheaded, and so finished his testimony.
          Among the tribe of the Marsi, holy Simplicius and his sons, Constantius and Victorian, who were first put to diverse torments, under the Emperor Antoninus, and then beheaded, and so gained the crown of martyrdom.
          At Nicomedia, [in the fourth century,] holy Hadrian, the son of the Emperor Probus. He blamed the persecution stirred up by Licinius against the Christians, and was therefore by him ordered to be slain his body was buried at Argyropolis by his uncle Domitius, Bishop of Byzantium.
          In Spain, the holy martyr Victor, who was slain by the Moors for Christ's faith's sake, and so received the crown of martyrdom.
          At Capua, the holy Confessor Rufinus, Bishop [of that see.]
          At Pistoia, the holy Priest and Confessor Felix.
          At Lima, in the kingdom of Peru, holy Rose of St. Mary, a Virgin of the Third Order of St Dominic, whose feast is kept upon the 30th day of this present month of August.
      la:
      - type: text
        text: |-
          Séptimo Kaléndas Septémbris

          Sancti Zephyríni, Papæ et Mártyris, cuius dies natális tertiodécimo Kaléndas Ianuárii recensétur.
          Cardónæ, in Hispánia, tránsitus sancti Raymúndi Nonnáti, Cardinális et Confessóris, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, vitæ sanctitáte et miráculis clari. Ipsíus tamen festum recólitur prídie Kaléndas Septémbris.
          Romæ sanctórum Mártyrum Irenǽi et Abúndii, qui, in persecutióne Valeriáni, eo quod corpus beátæ Concórdiæ, in cloácam proiéctum, leváverant, in eándem cloácam demérsi fuérunt; quorum córpora, a Iustíno Presbýtero inde extrácta, in crypta, iuxta beátum Lauréntium, sepúlta sunt.
          Apud Albintimélium, Ligúriæ civitátem, sancti Secúndi Mártyris, viri spectábilis et Ducis ex legióne Thebæórum.
          Bérgomi sancti Alexándri Mártyris, qui, et ipse unus ex eádem legióne, cum nomen Dómini Iesu Christi constantíssime faterétur, cápitis abscissióne martýrium complévit.
          Apud Marsos sanctórum Simplícii, et eius filiórum Constántii et Victoriáni, qui, sub Antoníno Imperatóre, várie primum excruciáti, tum demum, secúris ictu percússi, martýrii corónam adépti sunt.
          Nicomedíæ pássio sancti Hadriáni, e Probo Cǽsare progéniti, qui, Licínio persecutiónem in Christiános commótam éxprobrans, ab eódem iussus est occídi. Ipsíus corpus Domítius, Byzántii Epíscopus, eius pátruus, in ipsíus civitátis subúrbio cui nomen Argyrópolis, sepelívit.
          In Hispánia sancti Victóris Mártyris, qui pro Christi fide, a Mauris occísus, martýrii coróna donátus est.
          Cápuæ sancti Rufíni, Epíscopi et Confessóris.
          Pistórii, in Túscia, sancti Felícis, Presbýteri et Confessóris.
          Pódii, in diœcési Pictaviénsi, sanctæ Ioánnæ-Elísabeth Bichier des Ages, Vírginis, Congregatiónis Filiárum a Cruce una cum sancto Andréa Hubérto Fournet Fundatrícis, iugi mortificatióne et vitæ innocéntia claræ, quam Pius Papa Duodécimus sanctárum Vírginum fastis accénsuit.
      en2:
      - type: text
        text: |-
          The Twenty-sixth of August
      
          Saint Zephyrinus, Pope and Martyr, whose birth-day is noted on the twentieth of December.
          At Cardona, in Spain, the passing of Saint Raymond Nonnatus, Cardinal and Confessor, of the Order of the Blessed Mary of Mercy for the ransom of captives, renowned for holiness of life and miracles. However, his feast is recalled on the thirty-first of August.
          At Rome, the holy Martyrs Irenaeus and Abundius, who, in the persecution of Valerian, because they had lifted up the body of blessed Concordia that had been thrown into a sewer, were plunged into the same sewer; whose bodies, extracted thence by the Priest Justin, were buried in a crypt beside blessed Lawrence.
          Near Albintimilium, a city of Liguria, Saint Secundus, Martyr, a distinguished man and officer from the Theban Legion.
          At Bergamo, Saint Alexander, Martyr, who, also one from the same legion, when he was confessing most steadfastly the name of the Lord Jesus Christ, completed his martyrdom by beheading.
          Near Marsica, the holy Martyrs Simplicius and his sons Constantius and Victorianus, who, under the Emperor Antoninus, first variously tortured, then finally struck with an axe, obtained the crown of martyrdom.
          At Nicomedia, the passion of Saint Hadrian, sprung from the Caesar Probus, who, rebuking Licinius for the persecution he had stirred up against Christians, was ordered by him to be slain. His body was buried by Domitius, Bishop of Byzantium, his uncle, in the suburb of that city called Argyropolis.
          In Spain, Saint Victor, Martyr, who, slain by the Moors for the faith of Christ, was endowed with the crown of martyrdom.
          At Capua, Saint Rufinus, Bishop and Confessor.
          At Pistoia, in Tuscany, Saint Felix, Priest and Confessor.
          At Poitiers, in the Diocese of Poitiers, Saint Joan-Elizabeth Bichier des Ages, Virgin, Foundress of the Daughters of the Cross together with Saint Andrew Hubert Fournet, renowned for continual mortification and innocence of life, whom Pope Pius the Twelfth enrolled in the register of holy Virgins.
  psalm.sexto-idus-apr-lis-c23b19974d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 8th day of April, were born into the better life:

          At Alexandria, the holy martyr Edesius, brother of the blessed Apphian. Under the Emperor Maximian Galerius he openly rebuked the wicked judge for condemning to the lions the virgins vowed to God, wherefore he was apprehended by the soldiers, put to most cruel torments, and drowned in the sea, for the Lord Christ's sake.
          In Africa, the holy martyrs Januarius, Maxima, and Macaria.
          At Carthage, the holy martyr Concessa.
          On the same day are commemorated holy Herodion, Asyncritus, and Phlegon, concerning whom the blessed Apostle Paul writeth in his Epistle unto the Romans.
          At Corinth, blessed Denis, Bishop of that city, who by the learning and grace which he had in the Word of God, taught by his epistles not only the people of his own city and province but also the bishops of other provinces and cities, and who had such a veneration for the Popes of Rome that he was used to have their Epistles publicly read in the Church upon the Lord's Day. He flourished in the times of the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus.
          At Tours, [in the year 494,] holy Perpetuus, Bishop of that see, a man of wonderful holiness.
          At Fiorentino, in Campania, holy Redemptus, [in the year 586,] Bishop of that see, of whom mention is made by blessed Pope Gregory.
          At Como, the holy Confessor Amantius, Bishop of that see, [about the year 446.]
      la:
      - type: text
        text: |-
          Sexto Idus Aprílis

          Commemorátio sanctórum Herodiónis, Asýncriti et Phlegóntis, de quibus scribit beátus Paulus Apóstolus in Epístola ad Romános.
          Alexandríæ sancti Ædésii Mártyris, qui, sub Maximiáno Galério Imperatóre, cum esset beáti Apphiáni frater, et ímpium Iúdicem, quod Deo dicátas Vírgines leónibus tráderet, palam argúeret, idcírco, a milítibus tentus sævissimísque afféctus supplíciis, in mare demérsus est pro Christo Dómino.
          In Africa sanctórum Mártyrum Ianuárii, Máximæ et Macáriæ.
          Carthágine sanctæ Concéssæ Mártyris.
          Apud Corínthum beáti Dionýsii Epíscopi, qui eruditióne et grátia, quam hábuit in verbo Dei, non solum suæ civitátis et provínciæ pópulos, sed et aliárum provínciarum et úrbium Epíscopos epístolis erudívit; Romanósque Pontífices ádeo cóluit, ut eórum epístolas públice légere in Ecclésia diébus Domínicis consuevérit. Cláruit autem tempóribus Marci Antoníni Veri et Lúcii Aurélii Cómmodi.
          Turónis, in Gállia, sancti Perpétui Epíscopi, admirándæ sanctitátis viri.
          Ferentíni, in Hérnicis, sancti Redémpti Epíscopi, cuius méminit beátus Gregórius Papa.
          Apud Comum sancti Amántii, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Eighth of April
      
          A commemoration of Saints Herodion, Asyncritus, and Phlegon, of whom the blessed Apostle Paul writes in the Letter to the Romans.
          At Alexandria, Saint Aedesius, Martyr, who, under the Emperor Maximian Galerius, being the brother of blessed Apphianus, and publicly condemning the impious judge for handing over Virgins consecrated to God to the lions, was for this reason seized by soldiers, afflicted with the most savage punishments, and plunged into the sea for Christ the Lord.
          In Africa, the holy Martyrs Januarius, Maxima, and Macaria.
          At Carthage, Saint Concessa, Martyr.
          At Corinth, blessed Dionysius, Bishop, who, with the learning and the grace he had in the word of God, instructed not only the peoples of his own city and province, but also the Bishops of other provinces and cities by his letters; and he so venerated the Roman Pontiffs that he was accustomed to read their letters publicly in the Church on Sundays. He flourished in the times of Marcus Antoninus Verus and Lucius Aurelius Commodus.
          At Tours, in France, Saint Perpetuus, Bishop, a man of admirable holiness.
          At Ferentino, in the Hernican country, Saint Redemptus, Bishop, of whom blessed Pope Gregory makes mention.
          Near Como, Saint Amantius, Bishop and Confessor.
  psalm.sexto-idus-aug-sti-6f95892ffd:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 8th day of August are commemorated at Rome the holy martyrs Cyriacus the Deacon, Largus, Smaragdus, and twenty others, who suffered upon the 16th day of March in the persecution under Diocletian and Maximian, and whose bodies, which had been buried by John the Priest beside the Salarian Way, were upon this day moved by the holy Pope Marcellus to Lucina's farm upon the Ostian Way, whence they have since been brought into the city and buried in the deaconry of Sancta Maria in Via Lata.
          Upon the 8th day of August, were born into the better life:

          At Anazarbus, in Cilicia, [in the year 290,] holy Marinus the Elder. Under the Emperor Diocletian and the President Lysias he was flogged, tied to a beam, and mangled, and at last thrown to wild beasts. Likewise, the holy martyrs Eleutherius and Leonides, who finished their martyrdom, [in the third century,] by fire.
          In Persia, under King Sapor, the holy martyr Hormisdas.
          At Cyzicus, upon the Hellespont, [in the year 820,] holy Aemilianus, Bishop [of that see,] who suffered much at the hands of the Emperor Leo on account of the worship of the holy images, and at last died in exile.
          In Crete, [in the year 350,] holy Myron, Bishop [of that see,] famous for miracles.
          At Vienne, in Gaul, [in the fifth century,] the holy Confessor Severus, a Priest, who undertook a wearisome pilgrimage from India in order to preach the Gospel, and when he came to the aforesaid city, by his word and miracles brought a vast multitude of heathen to believe in Christ.
      la:
      - type: text
        text: |-
          Sexto Idus Augústi

          Sancti Ioánnis Baptístæ-Maríæ Vianney, Presbýteri et Confessóris, cæléstis ómnium parochórum Patróni; cuius dies natális prídie Nonas mensis huius recensétur.
          Sanctórum Mártyrum Cyríaci Diáconi, Largi et Smarágdi, qui, cum áliis vigínti Sóciis, passi sunt décimo séptimo Kaléndas Aprílis. Eórum córpora, via Salária a Ioánne Presbýtero sepúlta, sanctus Marcéllus Papa in prǽdium Lucínæ, via Ostiénsi, hoc die tránstulit; quæ póstea, in Urbem deláta, in Diaconía sanctæ Maríæ in via Lata fuérunt recóndita.
          Anazárbi, in Cilícia, sancti Maríni senis, qui, sub Diocletiáno Imperatóre et Lýsia Prǽside, cæsus flagris, in ligno suspénsus ac laniátus, feris tandem obiéctus intériit.
          Item sanctórum Mártyrum Eleuthérii et Leónidæ, qui per ignem martýrium consummárunt.
          In Pérside sancti Hormísdæ Mártyris, sub Sápore Rege.
          Cýzici, in Hellespónto, sancti Æmiliáni Epíscopi, qui, pro sacrárum Imáginum cultu a Leóne Imperatóre multa passus, demum in exsílio vitam finívit.
          In Creta sancti Myrónis Epíscopi, miráculis clari.
          Viénnæ, in Gállia, sancti Sevéri, Presbýteri et Confessóris; qui ex India, Evangélii prædicándi causa, laboriósam peregrinatiónem suscépit, et, cum ad præfátam urbem devenísset, ingéntem Paganórum multitúdinem verbo et miráculis ad Christi fidem convértit.
      en2:
      - type: text
        text: |-
          The Eighth of August
      
          Saint John Baptist Mary Vianney, Priest and Confessor, heavenly Patron of all parish priests; whose birth-day is noted on the fourth of August.
          The holy Martyrs Cyriacus the Deacon, Largus, and Smaragdus, who, together with twenty other Companions, suffered on the sixteenth of March. Their bodies, buried by the Priest John on the Salarian Way, Pope Saint Marcellus translated on this day to the estate of Lucina on the Ostian Way; which, subsequently brought into the City, were deposited in the Diaconia of Saint Mary in Via Lata.
          At Anazarbus, in Cilicia, Saint Marinus the elder, who, under the Emperor Diocletian and the Governor Lysias, beaten with whips, hung on a beam and torn, was finally thrown to the beasts and perished.
          Likewise, the holy Martyrs Eleutherius and Leonidas, who completed their martyrdom through fire.
          In Persia, Saint Hormisdas, Martyr, under King Sapor.
          At Cyzicus, in the Hellespont, Saint Aemilianus, Bishop, who, for the veneration of sacred Images, suffered much from the Emperor Leo, and finally ended his life in exile.
          In Crete, Saint Myron, Bishop, renowned for miracles.
          At Vienne, in France, Saint Severus, Priest and Confessor; who, for the purpose of preaching the Gospel, undertook a laborious journey from India, and, when he had come to the aforesaid city, converted a great multitude of pagans to the faith of Christ by word and miracles.
  psalm.sexto-idus-dec-mbris-22a3f4db18:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the glorious Mary, Mother of God, and always a Virgin, whom the supreme Pontiff Pius IX. did upon this day solemnly define to have been by a singular gift of God preserved unstained by original sin.
          Upon the same 8th day of December, were born into the better life:

          At Rome, the blessed Pope Eutychian, who with his own hands buried in diverse places three hundred and forty-two martyrs, whose fellow he himself afterwards became, being crowned with martyrdom under the Emperor Numerian and buried in the cemetery of Callistus. (He succeeded Felix I (269-274); after five days' interregnum he became Pope on Jan. 3, 275, and died on Dec. 8, 283.)
          At Alexandria, the holy martyr Macarius. Under the Emperor Decius the judge dealt with him in many words to persuade him to deny Christ, but as he only professed his faith the more constantly he was burnt alive, (in the year 250.)
          At Trier, holy Eucharius, a disciple of the blessed Apostle Peter, and the first Bishop of that city.
          In Cyprus, the holy Bishop Sophronius, who was a wonderful protector of little children, orphans, and widows, and an helper of all the poor and depressed.
          In the monastery of Lisieux, the holy Abbot Romaric, who was the first man in the court of King Theodobert, but gave up the world, and became the first in monastic observance. (He was a monk of Luxeuil. He founded the Abbey of Remiremont, of which he became second Abbot in the year 627, and died on Dec. 8, 653.)
          At Constantinople, the holy Hermit Patapius, famous for his graces and miracles.
          At Verona, is commemorated the ordination of holy Zeno, Bishop (of that see in the fourth century.)
      la:
      - type: text
        text: |-
          Sexto Idus Decémbris

          Concéptio Immaculáta gloriósæ semper Vírginis Genitrícis Dei Maríæ, quam fuísse præservátam, singulári Dei privilégio, ab omni originális culpæ labe immúnem, Pius Nonus, Póntifex Máximus, hac ipsa recurrénte die, solémniter definívit.
          Tréviris sancti Euchárii, qui fuit discípulus beáti Petri Apóstoli et primus eiúsdem civitátis Epíscopus.
          Alexandríæ sancti Macárii Mártyris, qui, témpore Décii, cum a Iúdice multis verbis ad negándum Christum suaderétur, et eo maióri constántia suam profiterétur fidem, vivus ad últimum exúri iubétur.
          In Cypro sancti Sophrónii Epíscopi, qui pupillórum, orphanórum ac viduárum defénsor miríficus, et páuperum atque oppressórum ómnium adiútor fuit.
          In monastério Luxoviénsi, in Gállia, sancti Romárici Abbátis, qui, cum in aula Theodobérti Regis primus esset, renuntiávit sǽculo, et monásticæ étiam observántiæ laude céteris antecélluit.
          Constantinópoli sancti Patápii Solitárii, virtútibus et miráculis clari.
          Romæ Invéntio sanctórum Mártyrum Nemésii Diáconi, eiúsque fíliæ Lucíllæ Vírginis, Symphrónii, Olýmpii Tribúni, huiúsque uxóris Exsupériæ et Theodúli fílii; quorum memória octávo Kaléndas Septémbris recensétur.
          Verónæ Ordinátio sancti Zenónis Epíscopi.
      en2:
      - type: text
        text: |-
          The Eighth of December
      
          The Immaculate Conception of the glorious ever-Virgin, Mother of God, Mary, whose preservation, by a singular privilege of God, immune from all stain of original fault, Pope Pius the Ninth, Supreme Pontiff, solemnly defined on this same recurring day.
          At Trier, Saint Eucharius, who was a disciple of the blessed Apostle Peter and the first Bishop of the same city.
          At Alexandria, Saint Macarius, Martyr, who, in the time of Decius, when he was urged by the judge with many words to deny Christ, and confessed his faith with all the greater steadfastness, was at last ordered to be burned alive.
          In Cyprus, Saint Sophronius, Bishop, who was a marvelous defender of orphans and widows and a helper of all the poor and oppressed.
          In the monastery of Luxeuil, in France, Saint Romarius, Abbot, who, having been first at the court of King Theodobert, renounced the world, and excelled others in the pursuit of monastic observance.
          At Constantinople, Saint Patapius, Solitary, renowned for virtues and miracles.
          At Rome, the Finding of the holy Martyrs Nemesius the Deacon and his daughter Lucilla the Virgin, Symphoronius, Olympius the Tribune, and the latter's wife Exuperia and their son Theodulus; whose memory is recalled on the twenty-fifth of August.
          At Verona, the Ordination of Saint Zeno, Bishop.
  psalm.sexto-idus-febru-rii-1deec28a88:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor John de la Matha, founder of the Order of the Most Holy Trinity for the Redemption of Captives, of whom mention is made upon the 17th day of December, upon the which day he fell asleep in the Lord, [in the year 1213.]
          Upon the same 8th day of February, were born into the better life:

          The holy Confessor Jerome Miani, founder of the Congregation of Somascha, whose name was enrolled among those of the saints by Clement XIII, and whose feast we keep upon the 20th day of July.
          At Rome, the holy martyrs Paul, Lucius, and Cyriacus.
          In the Lesser Armenia, the holy martyrs Denis, Aemilian, and Sebastian.
          At Alexandria, under the Emperor Decius, the holy martyr Cointhe. The heathen took her and led her before the idols to make her worship them, and when she would not, they tied her feet with chains and dragged her through the streets of the city until she was mangled to death, [in the year 249.]
          At Constantinople, the martyr monks of the monastery of Dim, who were slain in defence of the Catholic faith, [in the year 485,] for that they brought the letter of holy Pope Felix against the [Patriarch] Acacius.
          In Persia are commemorated those holy martyrs who were put to death in diverse ways, [in the sixth century,] for the Christian faith's sake, under Gabades, King of Persia.
          At Pavia, holy Juventius, Bishop of that see, who laboured earnestly in the Gospel, [in the second century.]
          At Milan, [in the year 620,] the holy Confessor Honoratus, Bishop of that see.
          At Verdun, in Gaul, [in the year 649,] holy Paul, Bishop of that see, famous for the glory of his miracles.
          At Muret, in the country of Limoges, [in the year 1124,] the holy Abbot Stephen, founder of the Order of Grandmont, famous for his graces and miracles.
          In the monastery of Vallombrosa, [in the year 1089,] blessed Peter, Cardinal-Bishop of Albano, of the congregation of Vallombrosa, of the Order of St. Benedict. He was surnamed the Fireproof because he passed unhurt through fire.
      la:
      - type: text
        text: |-
          Sexto Idus Februárii

          Sancti Ioánnis de Matha, Presbýteri et Confessóris, qui Ordinis sanctíssimæ Trinitátis redemptiónis captivórum fuit Institútor, et sextodécimo Kaléndas Ianuárii obdormívit in Dómino.
          Somáschæ, in território Bergoménsi, natális sancti Hierónymi Æmiliáni Confessóris, qui Congregatiónis Somáschæ Fundátor éxstitit; atque, plúribus in vita et post mortem miráculis illústris, a Cleménte Décimo tértio, Pontífice Máximo, Sanctórum fastis adscríptus est, et a Pio Papa Undécimo universális orphanórum ac derelíctæ iuventútis Patrónus apud Deum eléctus et declarátus. Eius tamen festívitas tertiodécimo Kaléndas Augústi recólitur.
          Romæ sanctórum Mártyrum Pauli, Lúcii et Cyríaci.
          In Arménia minóre pássio sanctórum Mártyrum Dionýsii, Æmiliáni et Sebastiáni.
          Constantinópoli natális sanctórum Mártyrum Monachórum monastérii Dii, qui, ob defensiónem fídei cathólicæ, cum tulíssent lítteras sancti Felícis Papæ Tértii advérsus Acácium, diríssime cæsi sunt.
          In Pérside commemorátio sanctórum Mártyrum, qui, sub Rege Persárum Cábade, ob Christiánam fidem, divérsis supplíciis necáti sunt.
          Alexandríæ pássio sanctæ Coínthæ Mártyris, quam Pagáni, sub Décio Imperatóre, corréptam et ad idóla perdúctam, hæc adoráre cogébant; quod cum illa éxsecrans recusáret, ipsíus pedes vínculis innexuérunt, eámque, trahéntes sic vinctam per civitátis platéas, horréndo supplício discerpsérunt.
          Pápiæ sancti Iuvéntii Epíscopi, qui strénue in Evangélio laborávit.
          Medioláni deposítio sancti Honoráti, Epíscopi et Confessóris.
          Virodúni, in Gállia, sancti Pauli Epíscopi, miraculórum dono illústris.
          Apud Murétum, in agro Lemovicénsi, natális sancti Stéphani Abbátis, qui Grandimonténsis Ordinis Institútor fuit, ac virtútibus et miráculis cláruit.
          In monastério Vallis Umbrósæ Beáti Petri, Cardinális et Epíscopi Albanénsis, ex Ordine Vallis Umbrósæ, cognoménto Ignei, quia per ignem illǽsus transívit.
      en2:
      - type: text
        text: |-
          The Eighth of February
      
          Saint John of Matha, Priest and Confessor, who was the Founder of the Order of the Most Holy Trinity for the ransom of captives, and fell asleep in the Lord on the seventeenth of December.
          At Somasca, in the territory of Bergamo, the birth of Saint Jerome Emiliani, Confessor, who was the Founder of the Congregation of Somasca; and, renowned with very many miracles in his life and after death, was enrolled in the register of the Saints by Pope Clement the Thirteenth, Supreme Pontiff, and was chosen and declared by Pope Pius the Eleventh as the universal Patron before God of orphans and abandoned youth. However, his feast is recalled on the twentieth of July.
          At Rome, the holy Martyrs Paul, Lucius, and Cyriacus.
          In Lesser Armenia, the passion of the holy Martyrs Dionysius, Aemilianus, and Sebastian.
          At Constantinople, the birth of the holy Monk Martyrs of the monastery of Dios, who, for defending the Catholic faith, having carried the letters of Pope Saint Felix the Third against Acacius, were most cruelly beaten.
          In Persia, a commemoration of the holy Martyrs, who, under the King of Persia, Cabades, were slain by various torments for the Christian faith.
          At Alexandria, the passion of Saint Quinta, Martyr, whom the pagans, under the Emperor Decius, seizing and bringing to the idols, compelled to worship them; when she rejected and refused this with horror, they tied her feet in bonds, and dragging her thus bound through the streets of the city, tore her apart with a dreadful punishment.
          At Pavia, Saint Juventius, Bishop, who labored strenuously in the Gospel.
          At Milan, the deposition of Saint Honoratus, Bishop and Confessor.
          At Verdun, in France, Saint Paul, Bishop, renowned for the gift of miracles.
          At Muret, in the territory of Limoges, the birth of Saint Stephen, Abbot, who was the Founder of the Order of Grandmont, and shone with virtues and miracles.
          In the monastery of Vallombrosa, blessed Peter, Cardinal and Bishop of Albano, of the Order of Vallombrosa, surnamed the Fiery, because he passed through fire unharmed.
  psalm.sexto-idus-i-lii-7ade9fc58c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 10th day of July, were born into the better life:

          At Rome, under Publius, Prefect of the City, in the time of the Emperor Antonine, seven holy Brethren, the sons of the holy martyr Felicity. Their names were Januarius, Felix, Philip, Silvanus, Alexander, Vitalis, and Martial. Januarius was first beaten with rods and starved, but in the end hided to death with scourges loaded with lead. Felix and Philip were beaten to death with clubs. Silvanus was killed by being cast over a steep place. Alexander, Vitalis, and Martial were beheaded.
          Also at Rome, the holy sisters Rufina and Secunda, both Virgins and both martyrs. In the persecution under the Emperors Valerian and Gallienus they were both tortured and then beheaded, and so passed to heaven. Their bodies lie buried in due honour in the Lateran Cathedral, hard by the Baptistery.
          In Africa, the holy martyrs Januarius, Marinus, Nabor, and Felix, who were all beheaded.
          At Nicopolis, in Armenia, the holy martyrs Leontius, Maurice, Daniel, and their Companions, who were put to diverse and dreadful torments under the Emperor Licinius, and the President Lysias, and at length were cast into the fire, and so finished the course of their testimony.
          In Pisidia, the holy martyrs Bianor and Sylvanus, who suffered most cruel torments for Christ's name's sake, and then were beheaded, and so received their crowns, [fourth century.]
          At Iconium, the holy martyr Apollonius, who finished his illustrious testimony upon the Cross, [fourth century.]
          At Gent [in Flanders], the holy Virgin Amelberga, [in the year 772. She was a nun in the Abbey of Munsterbilzen, in the Diocese of Liège. She died at the age of 31.]
      la:
      - type: text
        text: |-
          Sexto Idus Iúlii

          Romæ pássio sanctórum septem Mártyrum fratrum, filiórum sanctæ Felicitátis Mártyris, id est Ianuárii, Felícis, Philíppi, Silváni, Alexándri, Vitális et Martiális, témpore Antoníni Imperatóris, sub Præfécto Urbis Públio. Ex ipsis vero Ianuárius, post virgárum vérbera et cárceris maceratiónem, plumbátis occísus; Felix et Philíppus fústibus mactáti; Silvánus præcipítio interémptus; Alexánder, Vitális et Martiális capitáli senténtia puníti sunt.
          Item Romæ sanctárum Vírginum et Mártyrum Rufínæ et Secúndæ sorórum, quæ, in persecutióne Valeriáni et Galliéni, torméntis subáctæ sunt; atque ad últimum, cum álteri caput illísum esset gládio, et álteri cervix cæsa, migrárunt in cælum. Ipsárum vero córpora in Basílica Lateranénsi, prope Baptistérium, débito honóre servántur.
          In Africa sanctórum Mártyrum Ianuárii, Maríni, Nabóris et Felícis, qui gládio decolláti sunt.
          Nicópoli, in Arménia, sanctórum Mártyrum Leóntii, Maurítii, Daniélis et Sociórum; qui, sub Licínio Imperatóre et Lýsia Prǽside, várie excruciáti, tandem, in ignem coniécti, martýrii cursum confecérunt.
          In Pisídia sanctórum Mártyrum Bianóris et Silváni, qui sævíssima pro Christi nómine passi, demum, cervícibus abscíssis, coronántur.
          Icónii, in Lycaónia, sancti Apollónii Mártyris, qui per crucem insígne martýrium consummávit.
          Apud Gandávum, in Flándria, sanctæ Amelbérgæ Vírginis.
      en2:
      - type: text
        text: |-
          The Eighth of July
      
          At Rome, the passion of the seven holy Martyr brothers, sons of Saint Felicitas, the Martyr, namely Januarius, Felix, Philip, Silvanus, Alexander, Vitalis, and Martialis, in the time of the Emperor Antoninus, under the Prefect of the City Publius. Of these, Januarius, after the beating of rods and the torment of prison, was slain with leaded thongs; Felix and Philip were battered with clubs; Silvanus was slain by being thrown down; Alexander, Vitalis, and Martialis were punished with capital sentence.
          Likewise at Rome, the holy Virgins and Martyrs Rufina and Secunda, sisters, who, in the persecution of Valerian and Gallienus, were subjected to torments; and at last, one having her head struck with a sword and the other beheaded, they passed to heaven. Their bodies are kept with due honor in the Lateran Basilica, near the Baptistery.
          In Africa, the holy Martyrs Januarius, Marinus, Naboris, and Felix, who were beheaded.
          At Nicopolis, in Armenia, the holy Martyrs Leontius, Mauritius, Daniel, and their Companions; who, under the Emperor Licinius and the Governor Lysias, variously tortured, were at last cast into the fire and completed the course of their martyrdom.
          In Pisidia, the holy Martyrs Bianor and Silvanus, who, having suffered most savagely in the name of Christ, were at last beheaded and crowned.
          At Iconium, in Lycaonia, Saint Apollonius, Martyr, who through the cross completed a distinguished martyrdom.
          Near Ghent, in Flanders, Saint Amelberga, Virgin.
  psalm.sexto-idus-i-nii-cddd0a15ab:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the seventh day of June, were born into the better life:

          At Aix in France, St. Maximin, first bishop of that city, who is said to have been a disciple of the Lord.
          On the same day, St. Calliopa, martyr, who for the faith of Christ received the palm of martyrdom. Her breasts had been cut away, her flesh burned, she was rolled on broken pottery, and was at last beheaded.
          At York in England, St. William, archbishop and confessor, who, among other miracles wrought at his tomb, raised three persons from the dead. He was placed in the calendar of the saints by Pope Honorius III.
          At Soissons in France, the birthday of St. Medard, bishop of Noyon, whose life and precious death are commended by glorious miracles.
          At Rouen, St. Gildard, bishop, brother of this same St. Medard. They were born on the same day, consecrated bishops at the same time, and were taken from this life on the same day, entering heaven together.
          At Sens, the bishop St. Heraclius.
          At Metz, the bishop St. Clodulph.
          In Piceno, St. Severin, bishop of Septempeda.
          In Sardinia, St. Sallustian, confessor.
          At Camerino, St. Victorinus, confessor, the twin brother of St. Severin, bishop of Septempeda.
      la:
      - type: text
        text: |-
          Sexto Idus Iúnii

          Aquis, in Gállia, sancti Maximíni, qui éxstitit primus eiúsdem civitátis Epíscopus, ac Dómini discípulus fuísse tráditur.
          Eódem die sanctæ Callíopæ Mártyris, quæ, ob Christi fidem, abscíssis mammis atque adústis cárnibus, super téstulas volutáta, demum, truncáta cápite, martýrii palmam accépit.
          Eboráci, in Anglia, sancti Willhélmi, Epíscopi et Confessóris, qui, inter cétera ad eius sepúlcrum patráta mirácula, tres mórtuos suscitávit, atque ab Honório Papa Tértio in Sanctórum cánonem relátus est.
          Apud Suessiónes, in Gálliis, natális sancti Medárdi, Epíscopi Novioménsis; cuius vita et mors pretiósa gloriósis miráculis commendátur.
          Rotómagi sancti Gildárdi Epíscopi, qui fuit frater eiúsdem sancti Medárdi. Ambo autem fratres, eódem die nati eodémque die Epíscopi consecráti, uno quoque die de hac vita subtrácti, simul in cælum migrárunt.
          Apud Senónas sancti Heráclii Epíscopi.
          Metis, in Gállia, sancti Clodúlphi Epíscopi.
          In Picéno sancti Severíni, Septempedáni Epíscopi.
          In Sardínia sancti Sallustiáni Confessóris.
          Cameríni sancti Victoríni Confessóris, qui fuit prædícti sancti Severíni, Septempedáni Epíscopi, germánus frater.
      en2:
      - type: text
        text: |-
          The Eighth of June
      
          At Aix, in France, Saint Maximinus, who was the first Bishop of the same city, and is said to have been a disciple of the Lord.
          On the same day, Saint Calliope, Martyr, who, for the faith of Christ, with her breasts cut off and her flesh burned, rolled over potsherds, and finally beheaded, received the palm of martyrdom.
          At York, in England, Saint William, Bishop and Confessor, who, among other miracles wrought at his tomb, raised three dead persons to life, and was enrolled in the canon of the Saints by Pope Honorius the Third.
          At Soissons, in France, the birth of Saint Medard, Bishop of Noyon; whose precious life and death are commended by glorious miracles.
          At Rouen, Saint Gildard, Bishop, who was the brother of the same Saint Medard. Both brothers, born on the same day, consecrated Bishops on the same day, and taken from this life on the same day, passed to heaven together.
          Near Sens, Saint Heraclius, Bishop.
          At Metz, in France, Saint Clodulf, Bishop.
          In Picenum, Saint Severinus, Bishop of Sanseverino.
          In Sardinia, Saint Sallustianus, Confessor.
          At Camerino, Saint Victorinus, Confessor, who was the blood brother of the aforesaid Saint Severinus, Bishop of Sanseverino.
  psalm.sexto-idus-ianu-rii-d574f2535a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 8th day of January, were born into the better life:

          At Beauvais, in Gaul, the holy martyrs Lucian the Priest (first Bishop of that see,) Maximian, and Julian. Maximian and Julian were slain by the persecutors with the sword, but the blessed Lucian, who had come into Gaul with holy Denis, did not receive the like treatment until after great suffering, the which notwithstanding, he feared not to confess aloud the name of Christ. (He died in the year 312.)
          Likewise the holy martyr Eugenian (Bishop of Autun.)
          In Libya, the holy martyrs Theophilus the Deacon, and Helladius, who were first torn and mangled with sharp potsherds, and then cast into the fire, and so gave up their souls to God.
          At Venice, (in the year 1455,) the blessed Confessor Lawrence de' Giustiniani, the first Patriarch of that city he was filled very abundantly with learning and gifts of divine wisdom from on high, and Alexander VIII. enrolled his name among those of the saints. We keep his festival upon the fifth day of September.
          At Hierapolis, in Asia, holy Apollinaris, Bishop (of that see,) who was eminent for holiness and learning, in the time of the Emperor Marcus Antoninus Verus.
          At Naples, in Campania, holy Severinus, Bishop (of that see,) brother of the blessed martyr Victorinus he wrought many good works, and fell asleep full of holiness, (in the year 540.)
          At Pavia, the holy Confessor Maximus, Bishop (of that see, successor to St Epiphanius. He took part in the 4th and 6th Councils of Rome, held by Pope Symmachus against the Antipope Lawrence at the beginning of the sixth century.)
          At Regensburg in Bavaria, holy Bishop Erhard.
          At Metz, holy Patient, Bishop (of that see, in the second century.)
          On the same day, (in the year 482,) in Bavaria, the holy Abbot Severinus, who spread the Gospel among that people, and is called the Apostle of the (Austrians and) Bavarians. His body was, by the will of God, brought to Montefeltro, near Naples, and thence it hath been since taken to the monastery of St. Severino.
      la:
      - type: text
        text: |-
          Sexto Idus Ianuárii

          Venétiis deposítio sancti Lauréntii Iustiniáni, primi Patriárchæ urbis eiúsdem et Confessóris; quem, doctrína et supérnis divínæ sapiéntiæ charismátibus copiosíssime replétum, Alexánder Octávus, Póntifex Máximus, in Sanctórum númerum rétulit. Ipsíus autem festívitas Nonis Septémbris, quo die Cáthedram pontificálem ascéndit, potíssimum celebrátur.
          Bellováci, in Gálliis, sanctórum Mártyrum Luciáni Presbýteri, Maximiáni et Iuliáni. Horum duo últimi a persecutóribus gládio perémpti sunt; beátus autem Luciánus, qui, una cum sancto Dionýsio, in Gálliam vénerat, et ipse, post nímiam cædem, cum Christi nomen viva voce confitéri non timuísset, priórum senténtiam excépit.
          In Líbya sanctórum Mártyrum Theóphili Diáconi, et Helládii, qui, primo laniáti ac téstulis peracútis compúncti, demum, in ignem coniécti, ánimas Deo reddidérunt.
          Augustodúni sancti Eugeniáni Mártyris.
          Hierápoli, in Asia, sancti Apollináris Epíscopi, qui, sub Marco Antoníno Vero, sanctitáte atque doctrína flóruit.
          Neápoli, in Campánia, natális sancti Severíni Epíscopi, qui fuit frater beáti Victoríni Mártyris; et, post multárum virtútum perpetratiónem, plenus sanctitáte quiévit.
          Metis, in Gállia, sancti Patiéntis Epíscopi.
          Pápiæ sancti Máximi, Epíscopi et Confessóris.
          Ratisbónæ, in Bavária, sancti Erhárdi Epíscopi.
          Apud Nóricos sancti Severíni Abbátis, qui apud eam gentem Evangélium propagávit, et Noricórum dictus est Apóstolus. Eius corpus ad Lucullánum prope Neápolim, in Campánia, divínitus delátum, inde póstea ad monastérium sancti Severíni translátum est.
      en2:
      - type: text
        text: |-
          The Eighth of January
      
          At Venice, the passing of Saint Lawrence Justinian, the first Patriarch of that city and Confessor; who, most abundantly filled with learning and the heavenly gifts of divine wisdom, was enrolled in the number of the Saints by Alexander VIII, Supreme Pontiff. His feast is celebrated chiefly on the Nones of September, the day on which he ascended the pontifical throne.
          At Beauvais, in Gaul, the holy Martyrs Lucian the Priest, Maximian, and Julian. The last two were slain by the sword by their persecutors; but blessed Lucian, who had come into Gaul together with Saint Dionysius, himself also, after great slaughter, when he had not feared to confess the name of Christ with his living voice, received the same sentence as his companions.
          In Libya, the holy Martyrs Theophilus the Deacon and Helladius, who were first lacerated and pierced with sharp potsherds, then cast into the fire, and gave back their souls to God.
          At Autun, Saint Eugenianus the Martyr.
          At Hierapolis, in Asia, Saint Apollinaris the Bishop, who flourished in holiness and learning under Marcus Antoninus Verus.
          At Naples, in Campania, the birth of Saint Severinus the Bishop, who was the brother of blessed Victorinus the Martyr; and, after the practice of many virtues, rested full of holiness.
          At Metz, in Gaul, Saint Patience the Bishop.
          At Pavia, Saint Maximus, Bishop and Confessor.
          At Regensburg, in Bavaria, Saint Erhard the Bishop.
          Among the Norici, Saint Severinus the Abbot, who preached the Gospel among that people and was called the Apostle of the Norici. His body was carried by divine providence to Lucullanum near Naples, in Campania, and thence afterward translated to the monastery of Saint Severinus.
  psalm.sexto-idus-m-rtii-6012dc2969:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the forty holy martyrs who suffered at Sebaste, in Armenia.
          Upon the same 10th day of March, were born into a better life:

          At Apamea, in Phrygia, the holy martyrs Caius and Alexander, who were crowned with a glorious martyrdom in the persecution under the Emperors Marcus Antoninus and Lucius Verus, as is written by Appolinaris, Bishop of Hierapolis, in his book against the heretics called Cataphrygians.
          In Persia, forty-two holy martyrs, [about the year 375.]
          At Corinth, the holy martyrs Codratus, Denis, Cyprian, Anectus, Paul, and Crescens, who were slain with the sword under the President Jason, in the persecution under the Emperors Decius and Valerian.
          In Africa, the holy martyr Victor, on whose feast day holy Augustine addressed a discourse to the people.
          At Jerusalem, the holy Confessor Macarius, Patriarch of that see, at whose exhortation Constantine and Helen cleansed the holy places, and adorned them with hallowed churches, [about the year 334. There is a letter to him from Constantine preserved by Socrates.]
          At Paris, [in the year 580,] holy Drostovseus, Abbot [of the monastery of St. Germain des Prés,] the disciple of blessed Germain, Bishop [of Paris.]
          In the monastery of Bobbio, holy Attala, Abbot [of that monastery,] famous for miracles, [in the year 627.]
      la:
      - type: text
        text: |-
          Sexto Idus Mártii

          Sanctórum Quadragínta Mártyrum, quorum natális prídie huius diéi recensétur.
          Apaméæ, in Phrýgia, natális sanctórum Mártyrum Caii et Alexándri, qui (ut scribit Apollináris, Hierapolitánus Epíscopus, in libro advérsus Cataphrýgas hæréticos), in persecutióne Marci Antoníni et Lúcii Veri, glorióso martýrio coronáti sunt.
          In Pérside pássio sanctórum quadragínta duórum Mártyrum.
          Corínthi sanctórum Mártyrum Codráti, Dionýsii, Cypriáni, Anécti, Pauli et Crescéntis, qui, in persecutióne Décii et Valeriáni, sub Iásone Prǽside, gládio cæsi sunt.
          In Africa sancti Victóris Mártyris, in cuius solemnitáte sanctus Augustínus ad pópulum de ipso tractátum hábuit.
          Romæ sancti Simplícii, Papæ et Confessóris.
          Hierosólymis sancti Macárii, Epíscopi et Confessóris; cuius hortátu loca sancta a Constantíno Magno et beáta Heléna, eius matre, expurgáta sunt et sacris Basílicis illustráta.
          Lutétiæ Parisiórum deposítio sancti Droctovéi Abbátis, qui fuit discípulus beáti Germáni Epíscopi.
          In monastério Bobiénsi sancti Attalæ Abbátis, miráculis clari.
      en2:
      - type: text
        text: |-
          The Tenth of March
      
          Of the Holy Forty Martyrs, whose birth is commemorated on the day before this.
          At Apamea, in Phrygia, the birth of the holy Martyrs Gaius and Alexander, who (as Apollinaris, Bishop of Hierapolis, writes in his book against the Cataphrygian heretics) were crowned with glorious martyrdom in the persecution of Marcus Antoninus and Lucius Verus.
          In Persia, the passion of forty-two holy Martyrs.
          At Corinth, the holy Martyrs Codraturus, Dionysius, Cyprian, Anectus, Paul, and Crescens, who were slain with the sword in the persecution of Decius and Valerian, under the governor Jason.
          In Africa, Saint Victor the Martyr, on whose solemnity Saint Augustine delivered a discourse to the people concerning him.
          At Rome, Saint Simplicius, Pope and Confessor.
          At Jerusalem, Saint Macarius, Bishop and Confessor; at whose urging, the holy places were cleansed by Constantine the Great and blessed Helena his mother, and adorned with sacred basilicas.
          At Paris, the passing of Saint Droctoveus the Abbot, who was a disciple of blessed Germanus the Bishop.
          In the monastery of Bobbio, Saint Attala the Abbot, renowned for miracles.
  psalm.sexto-idus-maii-0084e2f7c2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Antonine, Archbishop of Florence, whose birth into the better life is told upon the 2nd day of May.
          Upon the same the 10th day of May, is kept

          At Rome, on the Latin Way, the birthday of the holy martyrs Gordian and Epimachus. Gordian was long beaten with whips loaded with lead, and at last beheaded, in the time of the Emperor Julian the Apostate, because of his confession of Christ's Name. The Christians buried his body at night upon the aforesaid Latin Way, in the same underground place whither had a little while before been brought from Alexandria the remains of the blessed martyr Epimachus, who had there suffered martyrdom for believing in Christ.
          In the land of Uz is commemorated the holy prophet Job, a man of wondrous patience.
          At Rome, the blessed priest and martyr Calepodius, whom the Emperor Alexander [Severus] caused to be slain with the sword, and his body to be dragged through the city and cast into the Tiber; when it had been found it was buried by Pope Callistus.
          Moreover, at Rome also, there were beheaded the Consul Palmatius, along with his wife and children and forty-two others of both sexes of his house; also the Senator Simplicius, with his wife and sixty-eight of his household; also Felix, with his wife Blanda. Their heads were hung up at the different gates of the city to be a terror to Christians.
          Also at Rome, at the Hundred Halls, upon the Latin Way, are commemorated the holy martyrs Quartus and Quintus, whose bodies were taken to Capua.
          At Lentini, in Sicily, [in the third century,] the holy martyrs Alphius, Philadelphus, and Cyrinus.
          At Smyrna, the holy martyr Dioscoredes.
          At Bologna, [in the year 1443,] the blessed Nicholas Albergati, Bishop of that city, a Charterhouse monk, and Cardinal of the holy Roman Church, famous for his holiness and for his work as Legate of the Apostolic See. His body is buried in the Charterhouse at Florence.
          At Taranto, [at the end of the seventh century,] the holy Catald, Bishop [of that city, an Irish monk,] famous for wonders.
          At Milan is commemorated the finding of the bodies of the holy martyrs Nazarius and Celsus. The blessed Bishop Ambrose found the body of holy Nazarius still marked with fresh blood, and took it to the Cathedral Church of the Apostles along with the body of the blessed child Celsus, to whom Nazarius had been foster-father. In the persecution under Nero, Anolinus commanded them both together to be slain with the sword upon the 29th day of July, upon the which day is kept [at Milan] the feast of their martyrdom.
          At Madrid, [in the year 1175,] the holy Isidore the husbandman, famous for wonders, whom Pope Gregory XV enrolled in the list of the Saints along with holy Ignatius of Loyola, Francis Xavier, Teresa, and Philip Neri.
      la:
      - type: text
        text: |-
          Sexto Idus Maii

          Sancti Antoníni, ex Ordine Prædicatórum, Epíscopi Florentíni et Confessóris, cuius dies natális sexto Nonas mensis huius recensétur.
          Romæ, via Latína, natális sanctórum Mártyrum Gordiáni et Epímachi, quorum prior, pro confessióne nóminis Christi, témpore Iuliáni Apóstatæ, diu plumbátis cæsus et ad últimum cápite truncátus, noctu a Christiánis sepúltus eádem via fuit in crypta, in quam beáti Epímachi Mártyris relíquiæ paulo ante translátæ fúerant ab Alexándria, ubi ipse, pro Christi fide, martýrium compléverat prídie Idus Decémbris.
          In terra Hus sancti Iob Prophétæ, admirándæ patiéntiæ viri.
          Romæ beáti Calepódii, Presbýteri et Mártyris; quem Alexánder Imperátor gládio fecit occídi, et corpus eius per civitátem trahi, atque in Tíberim iactári, quod invéntum Callístus Papa sepelívit. Decollátus est étiam Palmátius Consul cum uxóre et fíliis et áliis promíscui sexus quadragínta duóbus de domo sua, Simplícius quoque Senátor cum uxóre et sexagínta octo de família sua, item et Felix cum uxóre sua Blanda; quorum cápita suspénsa sunt per divérsas portas Urbis, ad exémplum Christianórum.
          Item Romæ, via Latína, ad Centum Aulas, natális sanctórum Mártyrum Quarti et Quincti, quorum córpora Cápuam transláta sunt.
          Apud Leontínos, in Sicília, sanctórum Mártyrum Alphíi, Philadélphi et Cyríni.
          Smyrnæ sancti Dioscóridis Mártyris.
          Apud Taréntum sancti Catáldi Epíscopi, miráculis clari.
          Matríti sancti Isidóri Agrícolæ, quem, miráculis clarum, Gregórius Papa Décimus quintus, una cum sanctis Ignátio, Francísco Xavério, Terésia et Philíppo Nério, in Sanctórum númerum rétulit.
          Medioláni Invéntio sanctórum Mártyrum Nazárii et Celsi, in qua beátus Ambrósius Epíscopus corpus sancti Nazárii recenti adhuc sánguine conspérsum réperit, atque ad Basílicam Apostolórum tránstulit, una cum córpore beáti Celsi púeri, quem idem ipse Nazárius nutríerat, et Anolínus, in Nerónis persecutióne, simul cum eo feríri gládio iússerat quinto Kaléndas Augústi; quo die festívitas gloriósi eórum martýrii celebrátur.
      en2:
      - type: text
        text: |-
          The Tenth of May
      
          Saint Antoninus, of the Order of Preachers, Bishop of Florence and Confessor, whose birth is commemorated on the sixth of the Nones of this month.
          At Rome, on the Latin Way, the birth of the holy Martyrs Gordianus and Epimachus; the former, for his confession of the name of Christ in the time of Julian the Apostate, was long beaten with leaden flails and finally beheaded, and buried by night by Christians on the same road in a crypt into which the relics of the blessed Martyr Epimachus had shortly before been transferred from Alexandria, where he himself had completed his martyrdom for the faith of Christ on the day before the Ides of December.
          In the land of Uz, Saint Job the Prophet, a man of wondrous patience.
          At Rome, blessed Calepodius, Priest and Martyr; whom the Emperor Alexander had slain with the sword, his body dragged through the city and cast into the Tiber; it was found and buried by Pope Callixtus. The Consul Palmatius was also beheaded, along with his wife and children and forty-two others of his household of both sexes; likewise the Senator Simplicius with his wife and sixty-eight of his household; and also Felix with his wife Blanda; whose heads were hung over the various gates of the City as a warning to Christians.
          Also at Rome, on the Latin Way, at the Hundred Halls, the birth of the holy Martyrs Quartus and Quintus, whose bodies were translated to Capua.
          At Leontini, in Sicily, the holy Martyrs Alphius, Philadelphus, and Cyrinus.
          At Smyrna, Saint Dioscorus the Martyr.
          At Tarentum, Saint Cataldus the Bishop, renowned for miracles.
          At Madrid, Saint Isidore the Farmer, whom Gregory XV, Pope, together with Saints Ignatius, Francis Xavier, Teresa, and Philip Neri, enrolled in the number of the Saints, renowned for miracles.
          At Milan, the Finding of the holy Martyrs Nazarius and Celsus; in which blessed Ambrose the Bishop found the body of Saint Nazarius still freshly sprinkled with blood, and transferred it to the Basilica of the Apostles, together with the body of the blessed boy Celsus, whom Nazarius himself had raised, and whom Anolinus, in the persecution of Nero, had ordered to be struck with the sword along with him on the fifth day before the Kalends of August; on which day the feast of their glorious martyrdom is celebrated.
  psalm.sexto-idus-nov-mbris-122d605e01:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Tomorrow is the Octave of All Saints.
          Upon the same 8th day of November, were born into the better life:

          At Rome, upon the Lavican Way, upon the third milestone from the city, the holy martyrs Claudius, Nicostratus, Symphorian, Castorius, and Simplicius, they were first cast into prison, then heavily lashed with loaded scourges, and as their faith in Christ could not be shaken the Emperor Diocletian commanded that they should be cast into the river.
          Likewise at Rome, upon the Lavican Way, the holy martyrs called the "Crowned" brethren, Severus, Severian, Carpophorus, and Victorinus, who under the aforesaid Emperor Diocletian were flogged to death with scourges loaded with lead. Their names were afterwards revealed by the Lord after diverse years, but as they were unknown at the time it was ordained that on the anniversary of their deaths they should be commemorated, along with the five above mentioned, under the title of the Four that were Crowned, and the said custom hath still gone on in the Church ever since their names have been known.
          At Rome, (in the year 618,) the holy Pope Deusdedit, whose grace was such that by his kiss he made a leper clean.
          At Bremen, (about the year 789,) holy Willehad, first Bishop of that see. He spread the Gospel in Friesland and Saxony along with holy Boniface, whose disciple he was.
          At Soissons, in Gaul, (in the year 1118,) holy Godfrey, Bishop of Amiens, a man of great holiness.
          At Verdun, the holy Confessor Maurus, Bishop (of that see.)
          At Tours, (in the fourth century,) the holy priest Clarus, whose epitaph was written by holy Paulinus.
      la:
      - type: text
        text: |-
          Sexto Idus Novémbris

          Romæ, via Lavicána, tértio ab Urbe milliário, pássio sanctórum Mártyrum Cláudii, Nicostráti, Symphoriáni, Castórii et Simplícii, qui, primo in cárcerem missi, deínde scorpiónibus gravíssime cæsi, tandem, cum ex fide Christi dimovéri non possent, a Diocletiáno iussi sunt in flúvium præcípites dari.
          Ibídem, via Lavicána, natális sanctórum Quátuor Coronatórum fratrum, id est Sevéri, Severiáni, Carpóphori et Victoríni; qui, sub eódem Imperatóre, íctibus plumbatárum usque ad mortem cæsi sunt. Horum autem nómina, quæ póstea, interiéctis annis, Dómino revelánte, osténsa sunt, cum mínime reperíri tunc potuíssent, statútum fuit ut anniversária dies ipsórum, una cum illis quinque, sub nómine sanctórum Quátuor Coronatórum recolerétur; qui mos, étiam postquam reveláta sunt, in Ecclésia perseverávit.
          Item Romæ sancti Deúsdedit Papæ Primi, qui tanti meriti fuit, ut leprósum ósculo a lepra sanáverit.
          In vico Blexen, ad Visúrgim flúvium, in Germánia, sancti Willehádi, qui primus éxstitit Breménsis civitátis Epíscopus; atque, una cum sancto Bonifátio, cuius discípulus fuit, in Frísia et Saxónia Evangélium propagávit.
          Suessíone, in Gálliis, sancti Godefrídi, Ambianénsis Epíscopi, magnæ sanctitátis viri.
          Apud Virodúnum, in Gállia, sancti Mauri, Epíscopi et Confessóris.
          Turónis, in Gállia, sancti Clari Presbýteri, cuius sanctus Paulínus epitáphium scripsit.
      en2:
      - type: text
        text: |-
          The Eighth of November
      
          At Rome, on the Lavican Way, three miles from the City, the passion of the holy Martyrs Claudius, Nicostratus, Symphorianus, Castorius, and Simplicius, who were first cast into prison, then severely beaten with scorpions, and finally, since they could not be moved from the faith of Christ, were ordered by Diocletian to be thrown headlong into the river.
          At the same place, on the Lavican Way, the birth of the holy Four Crowned Brethren, namely Severus, Severianus, Carpophorus, and Victorinus; who, under the same Emperor, were beaten with leaden flails until they died. Their names, however, which were afterward revealed by the Lord after the passage of years and could not at that time be found, it was decreed that their anniversary should be kept together with those five under the name of the Holy Four Crowned Martyrs; which custom, even after the names were revealed, persisted in the Church.
          Also at Rome, Saint Deusdedit the First, Pope and Confessor, who was of such great merit that he healed a leper of his leprosy by a kiss.
          In the village of Blexen, on the river Weser, in Germany, Saint Willehad, who was the first Bishop of the city of Bremen; and together with Saint Boniface, of whom he was a disciple, preached the Gospel in Frisia and Saxony.
          At Soissons, in Gaul, Saint Godfrey, Bishop of Amiens, a man of great holiness.
          At Verdun, in Gaul, Saint Maurus, Bishop and Confessor.
          At Tours, in Gaul, Saint Clarus the Priest, whose epitaph Saint Paulinus wrote.
  psalm.sexto-idus-oct-bris-d9968660c0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Francis Borgia, General of the Society of Jesus, of whom mention is made upon the last day of September, and who is memorable for hardness of living, the gift of prayer, renunciation of the world, and the refusal of high places in the Church.
          Upon the 10th day of October, were born into the better life:

          At York, in England, (in the year 644,) holy Paulinus, Archbishop of that see. A disciple of the blessed Pope Gregory. Gregory sent him into England along with others to preach the Gospel, and he brought King Edwin and all his people to believe in Christ.
          In the island of Crete, blessed Pinytus, noble among Bishops. He flourished as Bishop of Gnossus, under the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus, and hath left us in his writings a living image of himself as in a looking-glass.
          At Cologne, the holy martyr Gereon, with three hundred and eighteen others, who patiently suffered beheading for true godliness' sake in the persecution under the Emperor Maximian.
          In the same country, the holy martyrs Victor and his Companions.
          At Bonn, in Germany, (in the fourth century,) the holy martyrs Cassius and Florence, and many others.
          At Nicomedia, (in the year 303,) the holy martyrs Eulampius, and the Virgin Eulampia his sister. When Eulampia heard her brother being tortured for Christ's sake she sprang into the midst of the crowd, and embraced him, and joined herself to him. Then they both were put together into a vessel of boiling oil, but were nowise hurt thereby, by the which wonder two hundred others were brought to believe in Christ, and these two hundred, along with the brother and sister, were all beheaded together, and so finished their testimony.
          At Piombino, in Tuscany, (at the end of the sixth century,) the holy Confessor Cerbonius, Bishop (of that see,) who was famous for miracles, both in life and in death, as witness holy Gregory.
          At Verona also, holy Cerbonius, Bishop of Verona.
          At Capua, (about the middle of the ninth century,) holy Paulinus, Bishop (of that see.)
      la:
      - type: text
        text: |-
          Sexto Idus Octóbris

          Sancti Francísci Bórgiæ, Sacerdótis e Societáte Iesu et Confessóris, cuius dies natális prídie Kaléndas Octóbris recensétur.
          Apud Septam, in Mauritánia Tingitána, pássio sanctórum septem Mártyrum, ex Ordine Minórum, scílicet Daniélis, Samuélis, Angeli, Leónis, Nicolái, Hugolíni et Domni; qui, cum essent omnes præter Domnum Sacerdótes, ibídem, ob Evangélii prædicatiónem et Mahuméticæ confutatiónem sectæ, a Saracénis contumélias, víncula et flagélla perpéssi, demum, capítibus abscíssis, martýrii palmam adépti sunt.
          Colóniæ Agrippínæ sancti Gereónis Mártyris, cum áliis trecéntis decem et octo; qui pro vera pietáte, in persecutióne Maximiáni, gládiis patiéntes colla subdidérunt.
          In território eiúsdem urbis sanctórum Victóris et Sociórum Mártyrum.
          Bonnæ, in Germánia, sanctórum Mártyrum Cássii et Floréntii, cum áliis plúrimis.
          Nicomedíæ sanctórum Mártyrum Eulámpii, et soróris Eulámpiæ Vírginis. Hæc porro, cum audísset pro Christo fratrem torquéri, in médiam turbam exsíluit, et, fratrem amplexáta, huic sóciam se adiúnxit; atque ambo, coniécti in ollam fervéntis ólei, sed nulla ex parte læsi, tandem, una cum áliis ducéntis, qui eo miráculo permóti credíderant in Christum, cápitis obtruncatióne martýrium complevérunt.
          In Creta ínsula beáti Pinýti, inter Epíscopos nobilíssimi. Hic, Gnósiæ urbis Epíscopus, sub Marco Antoníno Vero et Lúcio Aurélio Cómmodo flóruit, et in scriptis suis, velut in quodam spéculo, vivéntem sui relíquit imáginem.
          Eboráci, in Anglia, sancti Paulíni Epíscopi, qui fuit beáti Gregórii Papæ discípulus; et, una cum áliis, ad prædicándum Evangélium illuc ab eo missus, Edwínum Regem eiúsque pópulum ad Christi fidem convértit.
          Populónii, in Túscia, sancti Cerbónii, Epíscopi et Confessóris, qui (ut sanctus Gregórius Papa refert) in vita et morte miráculis cláruit.
          Verónæ sancti Cerbónii Epíscopi.
          Cápuæ sancti Paulíni Epíscopi.
      en2:
      - type: text
        text: |-
          The Tenth of October
      
          Saint Francis Borgia, Priest of the Society of Jesus and Confessor, whose birth is commemorated on the day before the Kalends of October.
          At Ceuta, in Mauritania Tingitana, the passion of seven holy Martyrs of the Order of Friars Minor, namely Daniel, Samuel, Angelo, Leo, Nicholas, Hugolinus, and Domnus; who, all being priests except Domnus, suffered there contempt, chains, and flogging for their preaching of the Gospel and refutation of the Mohammedan sect, and were finally beheaded and attained the palm of martyrdom.
          At Cologne, Saint Gereon the Martyr, with three hundred and eighteen others; who for true piety in the persecution of Maximian patiently bowed their necks to the sword.
          In the territory of the same city, the holy Martyrs Victor and his Companions.
          At Bonn, in Germany, the holy Martyrs Cassius and Florentius, with very many others.
          At Nicomedia, the holy Martyrs Eulamplus and his sister the virgin Eulampias. She, upon hearing her brother being tortured for Christ, leaped into the midst of the crowd and, embracing her brother, joined herself to him as his companion; and both were cast into a pot of boiling oil, but in no way harmed, and finally they completed their martyrdom by decapitation, together with two hundred others who had been moved to believe in Christ by that miracle.
          On the island of Crete, blessed Pinytas, most noble among bishops. He was Bishop of Gnossus, flourished under Marcus Antoninus Verus and Lucius Aurelius Commodus, and left in his writings, as in a kind of mirror, a living image of himself.
          At York, in England, Saint Paulinus the Bishop, who was a disciple of blessed Pope Gregory; and, sent there together with others to preach the Gospel, converted King Edwin and his people to the faith of Christ.
          At Populonia, in Tuscany, Saint Cerbonius, Bishop and Confessor, who (as Saint Gregory the Pope relates) was renowned for miracles in life and in death.
          At Verona, Saint Cerbonius the Bishop.
          At Capua, Saint Paulinus the Bishop.
  psalm.sexto-idus-sept-mbris-d9f67d4172:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the same 8th day of September, were born into the better life:
          On the morrow we commemorate the birth of the Most Blessed Mary, always a Virgin, Mother of God.
          Upon the same day are commemorated the holy martyr Adrian, and twenty-three others, who finished their testimony at Nicomedia after many sufferings, under the Emperors Diocletian and Maximian, by having their legs broken, upon the 4th day of March. Their relics were carried by the Christians to Byzantium, where they were buried with reverence and honour, and thence the body of holy Adrian was afterwards brought to Rome, upon the 8th of this month, upon which day the chief feast is kept in his honour.
          At Alexandria, the holy martyrs Ammon, Theophilus, Neoterius, and twenty-two others.
          At Antioch, the holy martyrs Timothy and Faustus.
          At Gaza, in Palestine, the holy brethren Eusebius, Nestabus, and Zeno, all martyrs, in the time of the Emperor Julian the Apostate.
          A multitude of the Gentiles fell upon them, rent them, and slew them.
          There also the holy martyr Nestor, who was most cruelly tormented by the same raging Gentiles, under the same Emperor Julian, and gave up the ghost.
          At Valencia, in Spain, holy Thomas of Villanueva, Archbishop (of that city,) famous for his exceeding charity toward the poor. His name was enrolled among those of the Saints by Pope Alexander VII, and we keep his feast upon the 22nd day of this present month of September.
          At Frisingen, holy Corbinian, first Bishop of that city. He was ordained and sent forth to preach the Gospel by Pope Gregory II. He bore much fruit in Gaul and in Germany, and at length fell asleep in peace, famous for graces and wonders.
      la:
      - type: text
        text: |-
          Sexto Idus Septémbris

          Natívitas beatissimæ semper Vírginis Genetrícis Dei Maríæ.
          Sancti Hadriáni Mártyris; cuius dies natális quarto Nonas Mártii recensétur, sed festívitas hac die, qua sacrum eius corpus Romam translátum fuit, potíssime celebrátur.
          Valéntiæ, in Hispánia Tarraconénsi, natális sancti Thomæ a Villa Nova, ex Eremitárum sancti Augustíni Ordine, Epíscopi et Confessóris, insígnis propter flagrántem in páuperes caritátem; qui ab Alexándro Papa Séptimo in Sanctórum númerum adscríptus est. Ipsíus autem festum décimo Kaléndas Octóbris celebrátur.
          Alexandríæ sanctórum Mártyrum Ammónis, Theóphili, Neotérii et aliórum vigínti duórum.
          Antiochíæ sanctórum Timóthei et Fausti Mártyrum.
          Gazæ, in Palæstína, sanctórum Mártyrum fratrum Eusébii, Néstabi et Zenónis; qui, témpore Iuliáni Apóstatæ, irruénte in eos turba Gentílium, discérpti atque necáti sunt.
          Ibídem sancti Néstoris Mártyris, qui sub eódem Iuliáno, ab iísdem Gentílibus furéntibus sævíssime cruciátus, emísit spíritum.
          Romæ sancti Sérgii Primi, Papæ et Confessóris.
          Frisíngæ sancti Corbiniáni, qui fuit primus eiúsdem civitátis Epíscopus. Hic, a sancto Gregório Secúndo Pontífice ordinátus et ad prædicándum Evangélium missus, úberes fructus in Gállia et Germánia rétulit, ac demum, virtútibus et miráculis clarus, in pace quiévit.
          Carthágine nova, in América meridionáli, sancti Petri Claver, Sacerdótis e Societáte Iesu et Confessóris; qui mira sui abnegatióne et exímia caritáte Nigrítis in servitútem abdúctis, annos ámplius quadragínta, óperam impéndens, tercénta fere eórum míllia Christo sua ipse manu regenerávit; et a Leóne Décimo tértio, Pontífice Máximo, in Sanctórum númerum relátus est, ac dein étiam cæléstis Patrónus peculiáris sacrárum ad Nigrítas Missiónum constitútus et declarátus.
      en2:
      - type: text
        text: |-
          The Eighth of September
      
          The Nativity of the most blessed Mary, ever Virgin, Mother of God.
          Saint Adrian the Martyr; whose birth is commemorated on the fourth of the Nones of March, but whose feast is celebrated chiefly on this day, on which his sacred body was translated to Rome.
          At Valencia, in Tarraconensian Spain, the birth of Saint Thomas of Villanova, of the Order of the Hermits of Saint Augustine, Bishop and Confessor, notable for his ardent charity toward the poor; who was enrolled in the number of the Saints by Pope Alexander VII. His feast is celebrated on the tenth day before the Kalends of October.
          At Alexandria, the holy Martyrs Ammon, Theophilus, Neoterius, and twenty-two others.
          At Antioch, the holy Martyrs Timothy and Faustus.
          At Gaza, in Palestine, the holy Martyrs, brothers Eusebius, Nestabius, and Zeno; who, in the time of Julian the Apostate, were torn apart and killed by a mob of Gentiles that rushed upon them.
          At the same place, Saint Nestor the Martyr, who, under the same Julian, was most cruelly tortured by the same raging Gentiles and gave up his spirit.
          At Rome, Saint Sergius I, Pope and Confessor.
          At Freising, Saint Corbinian, who was the first Bishop of that city. He was ordained by Saint Gregory II, the Pontiff, and sent to preach the Gospel; he brought abundant fruits in Gaul and Germany, and finally rested in peace, renowned for virtues and miracles.
          At Cartagena de Indias, in South America, Saint Peter Claver, Priest of the Society of Jesus and Confessor; who, with wondrous self-denial and outstanding charity, devoting himself for more than forty years to the Africans brought into slavery, regenerated in Christ by his own hand nearly three hundred thousand of them; and he was enrolled in the number of the Saints by Leo XIII, Supreme Pontiff, and was thereafter also constituted and declared the special heavenly Patron of the sacred Missions to the Africans.
  psalm.sexto-kal-ndas-apr-lis-d5625abdd0:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor and Doctor of the Church, John of Damascus, famous for holiness and teaching. He strove manfully for the honouring of the holy images, both by word and writing, against the Emperor Leo the Isaurian wherefore the Emperor commanded that his right hand should be smitten off; whereupon he commended himself to the image of the Blessed Virgin Mary, which he had defended, and forthwith he received back his hand whole and sound. Of whom mention is made upon the 6th day of May.
          Upon the same 27th day of March were born into the better life::

          At Druzipara, in Pannonia, under the Emperor Maximian, the holy soldier Alexander, who after triumphing for Christ in many contendings, and working many miracles, was beheaded, and so finished his testimony.
          On the same day, the holy martyrs the Senator Philetus, his wife Lydia, and his children Macedon and Theoprepis, as also the General Amphilochius, and the notary Chronides, who were all slain for confessing Christ.
          In Persia, the holy martyrs Zanitas, Lazarus, Marotes, Narses, and five others, who were most cruelly slain under Sapor, King of the Persians, and so won the palm of martyrdom, [in the year 326.]
          At Salzburg, [in the year 718,] the holy Confessor Rupert, Bishop of that see, who wondrously spread the gospel among the Bavarians and Styrians.
          In Egypt, the holy Hermit John, a man of great holiness, who, among other graces, was gifted with the spirit of prophecy, whereby he foretold unto the Emperor Theodosius his victory over the tyrants Maximus and Eugenius.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Aprílis

          Sancti Ioánnis Damascéni, Presbýteri, Confessóris et Ecclésiæ Doctóris, cuius dies natális ágitur prídie Nonas Maii.
          Drizíparæ, in Pannónia, sancti Alexándri mílitis, qui, sub Maximiáno Imperatóre, post multos pro Christo agónes superátos múltaque mirácula édita, cápitis abscissióne martýrium complévit.
          In Illýrico sanctórum Philéti Senatóris, Lýdiæ uxóris, et filiórum Macédonis et Theoprépii, itémque Amphilóchii Ducis, et Crónidæ Commentariénsis; qui, pro Christi confessióne, torméntis plúribus superátis, corónam glóriæ sunt adépti.
          In Pérside sanctórum Mártyrum Zanítæ, Lázari, Marótæ, Narsétis et aliórum quinque, qui sub Rege Persárum Sápore, sævíssime trucidáti, martýrii palmam meruérunt.
          Salisbúrgi, in Nórico, sancti Rupérti, Epíscopi et Confessóris, qui apud Bávaros et Nóricos Evangélium mirífice propagávit.
          In Ægýpto sancti Ioánnis Eremítæ, magnæ sanctitátis viri, qui, inter cétera virtútum insígnia, étiam prophético spíritu plenus, Theodósio Imperatóri victórias de tyránnis Máximo et Eugénio prædíxit.
      en2:
      - type: text
        text: |-
          The Seventh of March
      
          Saint John Damascene, Priest, Confessor, and Doctor of the Church, whose birth is celebrated on the day before the Nones of May.
          At Drizipara, in Pannonia, Saint Alexander the soldier, who, under the Emperor Maximian, after many contests endured for Christ and many miracles performed, completed his martyrdom by beheading.
          In Illyricum, the holy Philetus the Senator, Lydia his wife, and their sons Macedonia and Theopreptius, and likewise the officer Amphilochius and the registrar Cronidas; who, after enduring many torments for the confession of Christ, attained the crown of glory.
          In Persia, the holy Martyrs Zanitas, Lazarus, Marotas, Narses, and five others, who under Shapur, King of the Persians, were most cruelly slaughtered and merited the palm of martyrdom.
          At Salzburg, in Noricum, Saint Rupert, Bishop and Confessor, who wondrously propagated the Gospel among the Bavarians and the Norici.
          In Egypt, Saint John the Hermit, a man of great holiness, who among other marks of virtue was also filled with the spirit of prophecy, and foretold to the Emperor Theodosius his victories over the tyrants Maximus and Eugenius.
  psalm.sexto-kal-ndas-aug-sti-3cdc679087:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 27th day of July, were born into the better life:

          At Nicomedia, the holy martyr Pantaleon. He was a physician, who was tried by the Emperor Maximian because he believed in Christ, and tormented on the rack, and by scorching with lamps, amid the which things he was comforted by the Lord appearing to him. At last he finished his testimony by the sword.
          Also at Nicomedia, the holy Priest Hermolaus, by whose teaching blessed Pantaleon was brought to the faith.
          Also, the holy brethren Hermippus and Hermocrates, who, after many sufferings, were put to death by Maximian for confessing Christ.
          At Nola, the holy martyrs Felix, Julia, and Jucunda.
          At Biseglia, in Apulia, the holy martyrs Maurus, Bishop [of that see,] Pantaleemon, and Sergius, who suffered under Trajan.
          On the same day are commemorated the holy martyrs whom the tyrant Dunaan caused to be burnt in Yemen, in Arabia, because they believed in Christ.
          At Cordova, in Spain, in the persecution under the Arabs, the holy martyrs George the Deacon, Felix, Aurelius, Natalia, and Liliosa.
          At Ephesus, the Seven Holy Sleepers, Maximian, Malchus, Martinian, Denis, John, Serapian, and Constantine.
          At Auxerre, [in the sixth century,] deceased the blessed Confessor Etherius, Bishop [of that see.]
          At Constantinople, the blessed Virgin Anthusa, who was scourged, under the Emperor Constantine Copronymus, for honouring the holy images, and was sent into exile, where she fell asleep in the Lord.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Augústi

          Nicomedíæ pássio sancti Pantaleónis médici, qui, pro fide Christi, a Maximiáno Imperatóre tentus, et equúlei pœna ac lampadárum exustióne afflíctus, sed inter hæc, Dómino sibi apparénte, refrigerátus, gládii tandem ictu martýrium consummávit.
          Vigíliis, in Apúlia, sanctórum Mártyrum Mauri Epíscopi, Pantaleémonis et Sérgii; qui passi sunt sub Traiáno.
          Nicomedíæ sancti Hermolái Presbýteri, cuius doctrína beátus Pantáleon ad fidem convérsus est; itémque sanctórum Hermíppi et Hermócratis fratrum, qui, post multas pœnas sibi illátas, capitáli senténtia, ob confessiónem Christi, a Maximiáno Imperatóre puníti sunt.
          Córdubæ, in Hispánia, sanctórum Mártyrum Geórgii Diáconi, Aurélii et uxóris Natáliæ, Felícis et uxóris Liliósæ, in persecutióne Arábica.
          Nolæ, in Campánia, sanctórum Mártyrum Felícis, Iúliæ et Iucúndæ.
          Apud Homerítas, in Arábia, commemorátio sanctórum Mártyrum, qui, sub Dúnaan tyránno, ob Christi fidem, incéndio tráditi sunt.
          Ephesi natális sanctórum septem Dormiéntium, scílicet Maximiáni, Malchi, Martiniáni, Dionýsii, Ioánnis, Serapiónis et Constantíni.
          Romæ sancti Cælestíni Papæ Primi, qui damnávit Constantinopolitánum Epíscopum Nestórium, Pelagiúmque fugávit; cuius étiam auctoritáte universális sancta Sýnodus Ephesína advérsus eúndem Nestórium celebráta est.
          Antisiodóri deposítio beáti Æthérii, Epíscopi et Confessóris.
          Constantinópoli beátæ Anthúsæ Vírginis, quæ, sub Constantíno Coprónymo, ob cultum sanctárum Imáginum, verbéribus cæsa et exsílio relegáta, quiévit in Dómino.
      en2:
      - type: text
        text: |-
          The Seventh of August
      
          At Nicomedia, the passion of Saint Pantaleon the physician, who, seized for the faith of Christ by the Emperor Maximian, and afflicted with the torture of the rack and the burning of torches, yet refreshed in the midst of these sufferings by the Lord appearing to him, finally completed his martyrdom by a blow of the sword.
          At Vigili, in Apulia, the holy Martyrs Maurus the Bishop, Pantalemon, and Sergius; who suffered under Trajan.
          At Nicomedia, Saint Hermolaus the Priest, by whose teaching blessed Pantaleon was converted to the faith; and likewise the holy brothers Hermippus and Hermocrates, who, after many punishments inflicted upon them, were condemned to death for the confession of Christ by the Emperor Maximian.
          At Córdoba, in Spain, the holy Martyrs George the Deacon, Aurelius and his wife Natalia, Felix and his wife Liliosa, in the Arabian persecution.
          At Nola, in Campania, the holy Martyrs Felix, Julia, and Jucunda.
          Among the Homerites, in Arabia, commemoration of the holy Martyrs who, under the tyrant Dhu Nuwas, were given over to burning for the faith of Christ.
          At Ephesus, the birth of the holy Seven Sleepers, namely Maximian, Malchus, Martinianus, Dionysius, John, Serapion, and Constantinus.
          At Rome, Saint Celestine I, Pope, who condemned Nestorius, Bishop of Constantinople, and put Pelagius to flight; and by his authority also the holy universal Council of Ephesus was held against the same Nestorius.
          At Auxerre, the passing of blessed Aetherious, Bishop and Confessor.
          At Constantinople, blessed Anthousa the Virgin, who, under Constantine Copronymus, for the veneration of holy images, was beaten with rods and sent into exile, and rested in the Lord.
  psalm.sexto-kal-ndas-dec-mbris-1d69ce7f24:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of November, were born into the better life:

          At Fabriano, in the March of Ancona, the blessed Abbot Silvester, founder of the Congregation of Monks of the Order of St Benedict, who are called Silvestrians.
          At Alexandria, the holy martyr Peter, Pope of that city, a man enriched with all graces, who was beheaded by order of the Emperor Galerius Maximian.
          Likewise at Alexandria, in the same persecution, the holy martyrs Faustus a Priest, Didius, and Ammonius, along with whom are commemorated the Egyptian Bishops Phileas, Hesychius, Pachomius, and Theodore, and six hundred and sixty Others, who were raised to heaven by the sword of the persecutor.
          At Nicomedia, the holy Priest Marcellus, who in the time of the Emperor Constantius was thrown over a cliff by the Arians, and so died a martyr.
          At Padua, (in the year 1149,) the holy martyr Bellinus, Bishop (of that see.) At Rome, (at the end of the fourth century,) the holy Confessor Pope Siricius, very famous for his teaching, godliness, and zeal for the faith. He condemned diverse heretics and restored the discipline of the Church by healthy enactments.
          At Autun, (in the third century,) holy Amator, Bishop (of that see.) At Constance, (in the tenth century,) holy Conrad, Bishop (of that see.) In the country of Rheims, (in the seventh century,) the holy Confessor Basolus.
          At Adrianople, in Paphlagonia, the holy hermit Stylian, who was famous for miracles.
          In Armenia, (in the tenth century,) the holy monk Nicon.
          At Rome, (in the year 1751,) the holy Confessor Leonard of Port Maurice, of the Order of Friars Minor of the stricter observance, who was famous for his zeal for the salvation of souls and his holy journeys throughout Italy, and whose name the Supreme Pontiff Pius IX enrolled among those of the Saints.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Decémbris

          Apud Fabriánum, in Picéno, beáti Silvéstri Abbátis, Institutóris Congregatiónis Monachórum Silvestrinórum.
          Alexandríæ natális sancti Petri, eiúsdem urbis Epíscopi et Mártyris; qui, cum esset ómnibus virtútibus exornátus, ibídem, Galérii Maximiáni præcépto, cápite obtruncátus est.
          Passi sunt étiam Alexandríæ, in eádem persecutióne, sancti Mártyres Faustus Présbyter, Dídius et Ammónius, itémque Epíscopi quátuor Ægýptii, idest Philéas, Hesýchius, Pachómius et Theodórus, cum áliis sexcéntis sexagínta, quos persecutiónis gládius evéxit ad cælos.
          Apud villam cui nomen Fracta, in território Rhodigiénsi, sancti Bellíni, Epíscopi Patavíni et Mártyris; qui a sicáriis, cum esset Ecclésiæ iurium defénsor exímius, crudéliter impetítus ac multis illátis vulnéribus occísus est.
          Nicomedíæ sancti Marcélli Presbýteri, qui, Constántii témpore, ab Ariánis e rupe præcipitátus, Martyr occúbuit.
          Romæ sancti Sirícii, Papæ et Confessóris, doctrína, pietáte et religiónis zelo præclári, qui vários damnávit hæréticos, et discíplinam ecclesiásticam salubérrimis decrétis instaurávit.
          Augustodúni sancti Amatóris Epíscopi.
          Constántiæ, in Germánia, sancti Conrádi Epíscopi.
          Romæ sancti Leonárdi a Portu Maurítio, Sacerdótis ex Ordine Minórum et Confessóris, zelo animárum et sacris per Itáliam expeditiónibus conspícui; quem Pius Nonus, Póntifex Máximus, in Sanctórum cánonem rétulit, ac Pius Papa Undécimus cæléstem Patrónum Sacerdótum qui ad sacras populáres Missiónes in regiónibus cathólicis ubíque terrárum incúmbunt, elégit et constítuit.
          In território Rheménsi natális sancti Básoli Confessóris.
          Hadrianópoli, in Paphlagónia, sancti Styliáni Anachorétæ, miráculis clari.
          In Arménia sancti Nicónis Mónachi.
      en2:
      - type: text
        text: |-
          The Seventh of November
      
          At Fabriano, in Picenum, blessed Sylvester the Abbot, founder of the Congregation of the Silvestrine Monks.
          At Alexandria, the birth of Saint Peter, Bishop and Martyr of that city; who, adorned with every virtue, was there beheaded at the command of Galerius Maximian.
          Also suffered at Alexandria, in the same persecution, the holy Martyrs Faustus the Priest, Didius, and Ammonius, and likewise four Egyptian bishops, namely Phileas, Hesychius, Pachomius, and Theodore, with six hundred and sixty others, whom the sword of persecution raised to heaven.
          At the village called Fracta, in the territory of Rovigo, Saint Bellinus, Bishop and Martyr of Padua; who, being an outstanding defender of the rights of the Church, was cruelly attacked by assassins and killed with many wounds inflicted upon him.
          At Nicomedia, Saint Marcellus the Priest, who in the time of Constantius was thrown from a cliff by the Arians and died a Martyr.
          At Rome, Saint Siricius, Pope and Confessor, renowned for learning, piety, and zeal for religion, who condemned various heretics and restored ecclesiastical discipline by most salutary decrees.
          At Autun, Saint Amator the Bishop.
          At Constance, in Germany, Saint Conrad the Bishop.
          At Rome, Saint Leonard of Port Maurice, Priest of the Order of Friars Minor and Confessor, conspicuous for zeal for souls and for sacred missions throughout Italy; whom Pius IX, Supreme Pontiff, enrolled in the canon of the Saints, and Pope Pius XI chose and appointed as heavenly Patron of priests who devote themselves to popular sacred missions in Catholic regions throughout the world.
          In the territory of Reims, the birth of Saint Basle the Confessor.
          At Adrianopolis, in Paphlagonia, Saint Stylianus the Anchorite, renowned for miracles.
          In Armenia, Saint Nicon the Monk.
  psalm.sexto-kal-ndas-febru-rii-fb5eacc0ae:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep

          The feast of holy John, Patriarch of Constantinople, (in the years 398-407,) surnamed Chrysostom that is to say, golden mouth on account of the golden stream of his eloquence, whose word and example much profited the Church, but after many toils he ended his life in exile. Mention is made of him upon the 14th day of September, but the 27th of January is the day whereon his sacred body was brought to Constantinople under the Emperor Theodosius the younger, whence it was afterward brought to Rome, and buried in the Basilica of the Prince of the Apostles.
          At Sora, the holy martyr Julian. He was arrested in the persecution under the Emperor Antonine, and while he was being tortured, the temple of the idols fell down, whereupon he was beheaded, and so received the crown of martyrdom.
          In Africa, (in the third century,) the holy martyr Avitus.
          Likewise in Africa, the holy martyrs Datius, Reater, and their companions, who suffered in the persecution under the Vandals.
          Likewise in Africa, the holy martyrs Dativus, Julian, Vincent, and twenty-seven others.
          At Rome, (in the year 671,) holy Pope Vitalian.
          At Mans, (in the year 117,) holy Julian, the first Bishop of that city, whom holy Peter sent thither to preach the Gospel.
          At the monastery of La Val-Benois, the holy Maurus, Abbot of Val-Benois.
          At Brescia, (in the year 1540,) the holy Virgin Angela Merici, Foundress of the Society of Nuns of St. Ursula, whose first duty is to lead young maidens into the paths of the Lord. We keep her festival upon the last day of May, in accordance with an ordinance of Pius VII.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Februárii

          Sancti Ioánnis Chrysóstomi, Epíscopi Constantinopolitáni, Confessóris et Ecclésiæ Doctóris, cæléstis Oratórum sacrórum Patróni; qui décimo octávo Kaléndas Octóbris obdormívit in Dómino. Eius sacrum corpus, sub Theodósio iunióre, hac die Constantinópolim, inde póstea Romam translátum fuit, et in Basílica Príncipis Apostolórum cónditum.
          Bríxiæ natális sanctæ Angelæ Meríci Vírginis, ex tértio Ordine sancti Francísci, quæ Societátem Vírginum sanctæ Ursulæ instítuit, quarum præcípuum munus esset dirígere adolescéntulas in vias Dómini. Eius tamen festívitas Kaléndas Iúnii celebrátur.
          Apud Cenómanos, in Gállia, deposítio sancti Iuliáni, eiúsdem urbis primi Epíscopi, quem sanctus Petrus illuc ad prædicándum Evangélium misit.
          Soræ sancti Iuliáni Mártyris, qui, in persecutióne Antoníni, sub Flaviáno Prǽside, comprehénsus est, et, cum idolórum templum, dum ipse torquerétur, corruísset, martýrii corónam, truncáto cápite, accépit.
          In Africa sancti Avíti Mártyris.
          Ibídem sanctórum Mártyrum Dátii, Reátri et Sociórum, qui in persecutióne Wandálica passi sunt.
          Item sanctórum Datívi, Iuliáni, Vincéntii atque aliórum vigínti septem Mártyrum.
          Romæ sancti Vitaliáni Papæ.
          In monastério Bodacénsi, in Gállia, sancti Mauri Abbátis.
      en2:
      - type: text
        text: |-
          The Seventh of January
      
          Saint John Chrysostom, Bishop of Constantinople, Confessor and Doctor of the Church, heavenly Patron of sacred orators; who fell asleep in the Lord on the eighteenth day before the Kalends of October. His sacred body was translated to Constantinople on this day under Theodosius the Younger, and thence afterward to Rome, where it was enshrined in the Basilica of the Prince of the Apostles.
          At Brescia, the birth of Saint Angela Merici the Virgin, of the Third Order of Saint Francis, who founded the Society of Virgins of Saint Ursula, whose principal duty was to guide young women in the ways of the Lord. Her feast is celebrated on the Kalends of June.
          Among the Cenomani, in Gaul, the passing of Saint Julian, first Bishop of that city, whom Saint Peter sent there to preach the Gospel.
          At Sora, Saint Julian the Martyr, who in the persecution of Antoninus was arrested under the governor Flavianus, and when the temple of idols collapsed while he was being tortured, received the crown of martyrdom by beheading.
          In Africa, Saint Avitus the Martyr.
          At the same place, the holy Martyrs Datus, Reatus, and their Companions, who suffered in the Vandal persecution.
          Also the holy Dativus, Julian, Vincent, and twenty-seven other Martyrs.
          At Rome, Saint Vitalianus the Pope.
          In the monastery of Boadac, in Gaul, Saint Maurus the Abbot.
  psalm.sexto-kal-ndas-i-lii-3d202ed5da:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of June, were born into the better life:

          At Rome, upon the Celian Mount, the holy brethren John and Paul, both martyrs. John was provost of the household, and Paul chief steward of the Virgin Constantia, daughter of the Emperor Constantine. Under the Emperor Julian the Apostate they both received the palm of martyrdom by the sword.
          At Trent, [about the year 400,] the holy Vigilius, Bishop [of that see,] who, because he was striving to stamp out utterly the last remains of idolatry, was stoned by savage men, and so compassed martyrdom for Christ's Name's sake.
          At Cordova, in Spain, [in the tenth century,] the holy child Pelagius, who crowned his confession of the faith with a glorious martyrdom, by being torn to pieces with iron pincers, by order of Abdu'l-Rahman, King of the Saracens.
          At Valenciennes, [at the beginning of the ninth century,] the holy martyrs Salvius, Bishop of Angoulême, and Superius. Also the commemoration of the holy Anthelm, Bishop of Bellay, [in the year 1178.]
          At Poitou, [in the sixth century,] the holy Priest and Confessor Maxentius, who was famous for miracles.
          At Thessalonica, [likewise in the sixth century,] the holy Hermit David.
          On the same day, [in the sixth century also,] the holy Virgin Perseveranda.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Iúlii

          Romæ, in monte Cǽlio, sanctórum Mártyrum Ioánnis et Pauli fratrum, quorum primus erat præpósitus domus, secúndus primicérius Constántiæ Vírginis, fíliæ Constantíni Imperatóris, et ambo póstea, sub Iuliáno Apóstata, martýrii palmam, cædénte gládio, percepérunt.
          Apud Tridéntum sancti Vigílii Epíscopi, qui, cum relíquias idololatríæ pénitus exstirpáre conarétur, ídeo, pro Christi nómine, a feris et bárbaris homínibus percússus lápidum imbre, martýrium implévit.
          Apud Valencénas, in Gállia, pássio sanctórum Mártyrum Sálvii, qui éxstitit Engolisménsis Epíscopus, et Supérii.
          Córdubæ, in Hispánia, natális sancti Pelágii adolescéntuli, qui, ob confessiónem fídei, Regis Saracenórum Abdaraméni iussu forcípibus férreis membrátim præcísus, martýrium suum glorióse consummávit.
          Bellícii, in Gállia, sancti Anthélmi, qui ex maióris Carthúsiæ Prióre, factus est eiúsdem civitátis Epíscopus.
          In pago Pictaviénsi sancti Maxéntii, Presbýteri et Confessóris; qui miráculis cláruit.
          Thessalonícæ sancti David Eremítæ.
          Eódem die sanctæ Perseverándæ Vírginis.
      en2:
      - type: text
        text: |-
          The Seventh of June
      
          At Rome, on the Caelian Hill, the holy Martyrs John and Paul, brothers; the first was steward of the household, the second was secretary to the virgin Constantia, daughter of the Emperor Constantine; and both afterward, under Julian the Apostate, received the palm of martyrdom by the sword.
          At Trent, Saint Vigilius the Bishop, who, while striving to root out the remnants of idolatry entirely, was for that reason, in the name of Christ, struck down by a shower of stones by savage and barbarous men, and thus fulfilled his martyrdom.
          At Valenciennes, in Gaul, the passion of the holy Martyrs Salvius, who was Bishop of Angoulême, and Superius.
          At Córdoba, in Spain, the birth of the young Saint Pelagius, who, for the confession of the faith, was torn limb from limb with iron pincers at the command of Abdarrahman, King of the Saracens, and gloriously completed his martyrdom.
          At Belley, in Gaul, Saint Anthelmus, who from Prior of the Grand Chartreuse became Bishop of that city.
          In the region of Poitiers, Saint Maxentius, Priest and Confessor, renowned for miracles.
          At Thessalonica, Saint David the Hermit.
          On the same day, Saint Perseveranda the Virgin.
  psalm.sexto-kal-ndas-i-nii-6bfae2fdb7:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of holy Bede the Venerable, Confessor and Doctor of the Church, very famous for his holiness and learning.
          Upon the same 27th day of May, were born into the better life:

          The holy martyr Pope John I, who was sent for to Ravenna by Theodoric, the Arian King of Italy, and there cast into prison on account of his orthodox faith, where he suffered long, and at length died.
          At Dorostorum, in Bulgaria, the blessed Julius, a retired Roman soldier, who was arrested in the time of the Emperor Alexander Severus, and brought before the President Maximus, in whose presence he denounced the idols, and steadfastly confessed the Name of Christ, and so was put to death.
          At Sora, the holy Virgin and martyr Restituta. She fought the fight of faith under the Emperor Aurelian and the pro-Consul Agathius. She conquered the attacks of devils, the cajolery of her kinsfolk, and the cruelty of the tormentors. At last she was beheaded, along with other Christians, and so received the crown of martyrdom.
          [At Thelus,] in Artois, [in the seventh century,] the holy martyr Ranulph.
          At Orange, in Gaul, [in the first century,] holy Eutropius, Bishop [of that see,] famous for his graces and wondrous works.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Iúnii

          Sancti Bedæ Venerábilis, Presbýteri, Confessóris et Ecclésiæ Doctóris; qui migrávit in cælum octávo Kaléndas Iúnii.
          Sancti Ioánnis Primi, Papæ et Mártyris; cuius dies natális quintodécimo Kaléndas Iúnii refértur, sed festívitas hac die, ob Translatiónem córporis eius, potíssimum celebrátur.
          Doróstori, in Mýsia inferióre, pássio beáti Iúlii, qui, témpore Alexándri Imperatóris, cum esset veteránus et eméritæ milítiæ, comprehénsus est ab officiálibus, et Máximo Prǽsidi oblátus; quo præsénte, cum exsecrarétur idóla, et Christi nomen constantíssime confiterétur, capitáli senténtia punítus est.
          In pago Atrebaténsi sancti Ranúlfi Mártyris.
          Apud Soram sanctæ Restitútæ, Vírginis et Mártyris; quæ, sub Aureliáno Imperatóre et Agáthio Procónsule, fídei certámine suscépto, dǽmonum ímpetus, paréntum blandítias et tortórum sævítiam superávit, ac demum, cum áliis Christiánis, cápite truncáta, martýrio decoráta est.
          Aráusicæ, in Gálliis, sancti Eutrópii Epíscopi, virtútibus atque miráculis illústris.
          Herbípoli, in Germánia, sancti Brunónis, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Seventh of May
      
          Saint Bede the Venerable, Priest, Confessor, and Doctor of the Church; who departed to heaven on the eighth day before the Kalends of June.
          Saint John I, Pope and Martyr; whose birth is recorded on the fifteenth day before the Kalends of June, but whose feast is celebrated chiefly on this day on account of the Translation of his body.
          At Durostorum, in Lower Moesia, the passion of blessed Julius, who, in the time of the Emperor Alexander, being a veteran of completed military service, was seized by officers and brought before the governor Maximus; in whose presence, when he execrated the idols and most steadfastly confessed the name of Christ, he was condemned to death.
          In the Atrebatian region, Saint Ranulfus the Martyr.
          At Sora, Saint Restituta, Virgin and Martyr; who, under the Emperor Aurelian and the proconsul Agathius, took up the contest of faith, overcame the assaults of demons, the blandishments of her parents, and the cruelty of her torturers, and finally, along with other Christians, was beheaded and adorned with martyrdom.
          At Orange, in Gaul, Saint Eutropius the Bishop, illustrious in virtues and miracles.
          At Würzburg, in Germany, Saint Bruno, Bishop and Confessor.
  psalm.sexto-kal-ndas-ianu-rii-ebf933c280:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 27th day of December were born into the better life:

          At Ephesus, the holy Apostle and Evangelist John. After the writing of his Gospel after his return from exile, and after the Revelation which God gave unto him, he lived on until the time of the Emperor Trajan, and founded and governed the churches of all Asia. He died of old age in the sixty-eighth year after the death of Christ (about the year 101), and was buried hard by the city of Ephesus.
          At Alexandria, holy Maximus, Pope of that See, who was eminently worthy to be called a confessor (in the year 282).
          At Constantinople the holy brethren Theodore (Grapt) and Theophanes. They were bred up from their childhood in the monastery of St. Saba, and afterwards stoutly contended for the honouring of holy images against the Emperor Leo the Armenian, for the which he caused them to be beaten and sent into exile, and after his death they still stoutly withstood the Emperor Theophilus, who was held captive by the same ungodliness, for the which he also caused them to be again beaten and driven into exile. Theodore died in prison, but Theophanes, after that peace was given back to the Church, was made Bishop of Nice, and fell asleep in peace in the Lord (ninth century).
          Likewise, at Constantinople, the holy virgin Niceras, who was eminent for her holiness, in the time of the Emperor Arcadius (about the year 440).
      la:
      - type: text
        text: |-
          Sexto Kaléndas Ianuárii

          Apud Ephesum natális sancti Ioánnis, Apóstoli et Evangelístæ, qui, post Evangélii scriptiónem, post exsílii relegatiónem et Apocalýpsim divínam, usque ad Traiáni Príncipis témpora persevérans, totíus Asiæ fundávit rexítque Ecclésias, ac tandem, conféctus sénio, sexagésimo octávo post passiónem Dómini anno mórtuus est, et iuxta eándem urbem sepúltus.
          Constantinópoli sanctórum Confessórum Theodóri et Theóphanis fratrum, qui, a puerítia in Palæstinénsi sancti Sabbæ monastério nutríti, cum póstea pro sanctárum Imáginum cultu advérsus Leónem Arménum strénue decertárent, eius iussu verbéribus affécti sunt et exsílio relegáti. Sed, eódem Leóne mórtuo, rursus Theóphilo Imperatóri, qui eádem impietáte detinebátur, constánter resisténtes, verbéribus íterum cæsi et in exsílium pulsi sunt, ubi Theodórus in cárcere exspirávit. Theóphanes vero, pace demum Ecclésiæ réddita, factus est Nicǽnæ civitátis Epíscopus, et confessiónis glória præclárus quiévit in Dómino.
          Alexandríæ sancti Máximi Epíscopi, qui satis clarus et insígnis título confessiónis efféctus est.
          Constantinópoli sanctæ Nicáretes Vírginis, quæ, sub Arcádio Imperatóre, cláruit sanctitáte.
      en2:
      - type: text
        text: |-
          The Seventh of December
      
          At Ephesus, the birth of Saint John, Apostle and Evangelist, who, after writing the Gospel, after the exile of Patmos and the divine Apocalypse, persevering unto the times of the Emperor Trajan, founded and governed the churches of all Asia, and finally, worn out with old age, died in the sixty-eighth year after the Passion of the Lord and was buried near that same city.
          At Constantinople, the holy Confessors Theodore and Theophanes, brothers; who, brought up from childhood in the monastery of Saint Sabbas in Palestine, afterward strenuously contending for the veneration of holy images against Leo the Armenian, were by his command beaten and sent into exile. But when the same Leo died, they again steadfastly resisted the Emperor Theophilus, who was held in the same impiety; again they were beaten and driven into exile, where Theodore died in prison. Theophanes, however, when peace was at last restored to the Church, became Bishop of Nicaea, and rested in the Lord illustrious by the glory of his confession.
          At Alexandria, Saint Maximus the Bishop, who was rendered sufficiently famous and illustrious by the title of confessor.
          At Constantinople, Saint Nicareta the Virgin, who flourished in holiness under the Emperor Arcadius.
  psalm.sexto-kal-ndas-m-rtii-933839eff2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 24th day of February, were born into the better life:

          In Judea, the holy Apostle Matthias, who was chosen by the Apostles right after the Ascension of the Lord to take the place of the traitor Judas, and who suffered martyrdom for preaching the Gospel.
          At Rome, the holy martyr Primitiva.
          At Caesarea, in Cappadocia, [in the year 304,] the holy martyr Sergius, whose acts are held most famous.
          In Africa, [in the year 259,] the holy martyrs Montanus, Lucius, Julian, Victoricus, Flavian, and their Companions, who were disciples of holy Cyprian, and finished their testimony under the Emperor Valerian.
          At Rouen, [in the year 588,] the holy martyr Pretextatus, Bishop of that see.
          At Trier, [about the year 499] the holy Confessor Modestus, Bishop of that see.
          In England, [in the year 616,] holy Ethelbert, King of Kent, whom holy Augustine, first Archbishop of Canterbury, converted to the faith of Christ, and whose feast we keep upon the 26th (27th) day of this present month of February.
          At Jerusalem is commemorated the first finding, [in the fourth century,] of the Head of the Lord's forerunner.
      la:
      - type: text
        text: Sexto Kaléndas Mártii
      - type: rubric
        text: 24 aut 25 in anno Bissextili.
      - type: text
        text: |-
          In Iudǽa natális sancti Matthíæ Apóstoli, qui, post Ascensiónem Dómini ab Apóstolis in Iudæ proditóris locum sorte eléctus, pro Evangélii prædicatióne martýrium passus est.
          Romæ sanctæ Primitívæ Mártyris.
          Rotómagi pássio sancti Prætextáti, Epíscopi et Mártyris.
          Cæsaréæ, in Cappadócia, sancti Sérgii Mártyris, cuius gesta præclára habéntur.
          In Africa sanctórum Mártyrum Montáni, Lúcii, Iuliáni, Victórici, Flaviáni et Sociórum, qui discípuli fuérunt sancti Cypriáni, et, sub Valeriáno Imperatóre, martýrium consummárunt.
          Tréviris sancti Modésti, Epíscopi et Confessóris.
          Apud Stylum, in Calábria, sancti Ioánnis, cognoménto Therésti, monásticæ vitæ laude et sanctitáte insígnis,
          In Anglia sancti Edilbérti, Regis Cantiórum, quem sanctus Augustínus, Anglórum Epíscopus, ad Christi fidem convértit.
          Hierosólymis prima Invéntio cápitis sancti Ioánnis Baptístæ Præcursóris Dómini.
      en2:
      - type: text
        text: The Seventh of March
      - type: rubric
        text: The 24th or 25th in a Leap Year.
      - type: text
        text: |-
          In Judea, the birth of Saint Matthias the Apostle, who, after the Ascension of the Lord, was chosen by lot by the Apostles to fill the place of Judas the traitor, and suffered martyrdom for the preaching of the Gospel.
          At Rome, Saint Primitiva the Martyr.
          At Rouen, the passion of Saint Praetextatus, Bishop and Martyr.
          At Caesarea, in Cappadocia, Saint Sergius the Martyr, whose deeds are held in great renown.
          In Africa, the holy Martyrs Montanus, Lucius, Julian, Victoricus, Flavian, and their Companions, who were disciples of Saint Cyprian and completed their martyrdom under the Emperor Valerian.
          At Trier, Saint Modestus, Bishop and Confessor.
          At Stilo, in Calabria, Saint John, surnamed Therestus, distinguished for the praise of monastic life and holiness.
          In England, Saint Ethelbert, King of Kent, whom Saint Augustine, Bishop of the English, converted to the faith of Christ.
          At Jerusalem, the first Finding of the Head of Saint John the Baptist, the Forerunner of the Lord.
  psalm.sexto-kal-ndas-m-rtii-e74ac63054:
    role: psalm
    content:
      en:
      - type: text
        text: The morrow is the eve of the holy Apostle Matthias.
      la:
      - type: text
        text: Sexto Kaléndas Mártii
      en2:
      - type: text
        text: The Seventh of March
  psalm.sexto-kal-ndas-maii-d0d0587276:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 26th day of April, were born into the better life:

          At Rome, the blessed Pope Cletus. He was the second who ruled the Church after the Apostle Peter, and was crowned with martyrdom in the persecution under the Emperor Domitian.
          There also the holy martyr Pope Marcellinus, who was beheaded for Christ's faith's sake, in the persecution under the Emperor Maximian, along with Claudius, Cyrinus, and Antonine, at the time when the persecution was so great that seventeen thousand Christians were crowned with martyrdom within the space of one month.
          At Amasea, in Pontus, [about the year 322,] the holy martyr Basil, Bishop of that see, who gained an illustrious martyrdom under the Emperor Licinius. His body was cast into the sea, but was found by Elpidiphorus on the warning of an angel and was honourably buried.
          At Braga, in Portugal, [in the first century,] the holy martyr Peter, first Bishop of that city.
          At Vienne, the holy Confessor Clarence, Bishop of that see, [about the year 620.]
          At Verona, holy Lucidius, Bishop of that see.
          In the monastery of Centule, [in the seventh century,] the holy Confessor, the Priest Requier.
          At Troyes, the holy virgin Exuperantia, [in the year 380.]
      la:
      - type: text
        text: |-
          Sexto Kaléndas Maii

          Romæ natális beáti Cleti, Papæ et Mártyris; qui, secúndus post Apóstolum Petrum, rexit Ecclésiam, et martýrio in persecutióne Domitiáni coronátus est.
          Sancti Marcellíni, Papæ et Mártyris, cuius dies natális octávo Kaléndas Novémbris recensétur.
          Amaséæ, in Ponto, sancti Basiléi, Epíscopi et Mártyris, qui, sub Licínio Imperatóre, illústre martýrium consummávit. Ipsíus autem corpus, in mare proiéctum, et ab Elpidíphoro, Angeli mónitu repértum, honorífice tumulátum fuit.
          Brácari, in Lusitánia, sancti Petri Mártyris, qui fuit primus eiúsdem civitátis Epíscopus.
          Viénnæ, in Gállia, sancti Claréntii, Epíscopi et Confessóris.
          Verónæ sancti Lucídii Epíscopi.
          In monastério Céntula, in Gállia, sancti Richárii, Presbýteri et Confessóris.
          Trecis, in Gállia, sanctæ Exsuperántiæ Vírginis.
      en2:
      - type: text
        text: |-
          The Seventh of April
      
          At Rome, the birth of blessed Cletus, Pope and Martyr; who, second after the Apostle Peter, governed the Church and was crowned with martyrdom in the persecution of Domitian.
          Saint Marcellinus, Pope and Martyr, whose birth is commemorated on the eighth day before the Kalends of November.
          At Amasea, in Pontus, Saint Basil, Bishop and Martyr, who completed a glorious martyrdom under the Emperor Licinius. His body, cast into the sea, was found by Elpidiphorus at the direction of an Angel and honorably buried.
          At Braga, in Lusitania, Saint Peter the Martyr, who was the first Bishop of that city.
          At Vienne, in Gaul, Saint Clarentius, Bishop and Confessor.
          At Verona, Saint Lucidius the Bishop.
          In the monastery of Centula, in Gaul, Saint Richaruius, Priest and Confessor.
          At Troyes, in Gaul, Saint Exsuperantia the Virgin.
  psalm.sexto-kal-ndas-nov-mbris-db043d6bad:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the eve of the holy Apostles Simon and Jude.
          Upon the same 27th day of October, were born into the better life:

          At Avila, in Spain, the holy martyrs Vincent, Sabina, and Christeta, who were first racked until all their joints were loosened, then stones were put upon their heads which were beaten with heavy logs of wood, until their brains were burst, and so they finished their testimony under the (Emperor Diocletian and the) President Dacian.
          At Thil-Chateau, (in Burgundy, in the third century,) the holy martyr Florence.
          In Cappadocia, the holy martyrs Capitolina and Erotheis her handmaiden, who suffered under the Emperor Diocletian.
          In Ethiopia, holy Frumentius, first Bishop of that country, who was first a captive there, then was ordained Bishop by holy Athanasius, and spread the Gospel in that country.
          Likewise in Ethiopia, the holy King Elesbaan, who, after he had overcome the enemies of Christ in the time of the Emperor Justin, sent his kingly crown to Jerusalem, and made himself a monk in fulfilment of a vow, and so lived until he passed away hence to be ever with the Lord.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Novémbris

          Abulæ, in Hispánia, pássio sanctórum Vincéntii, Sabínæ et Christétæ. Hi primum in equúleo ádeo sunt exténti, ut omnes membrórum compáges laxaréntur; deínde cápita eórum, lapídibus superpósita, usque ad cérebri excussiónem válidis véctibus sunt contúsa, atque ita ipsi martýrium complevérunt, sub Prǽside Daciáno.
          Apud castrum Tyle, in Gállia, sancti Floréntii Mártyris.
          In Cappadócia sanctárum Mártyrum Capitolínæ, eiúsque ancíllæ Erothéidis, quæ sub Diocletiáno sunt passæ.
          Apud Indos sancti Fruméntii Epíscopi, qui, primum ibi captívus, deínde, Epíscopus a sancto Athanásio ordinátus, Evangélium in ea província propagávit.
          Neápoli, in Campánia, sancti Gaudiósi, Epíscopi Africáni, qui ob Wandalórum persecutiónem venit in Campániam, et, in monastério apud eam urbem, sancto fine quiévit.
          In Æthiópia sancti Elésbaan Regis, qui, Christi hóstibus expugnátis, ac, témpore Iustíni Imperatóris, misso regio diadémate Hierosólymam, monásticam vitam, ut vóverat, agens, migrávit ad Dóminum.
      en2:
      - type: text
        text: |-
          The Seventh of October
      
          At Ávila, in Spain, the passion of the holy Victorinus, Sabina, and Christeta. They were first stretched on the rack so that all the joints of their limbs were dislocated; then their heads, with stones placed upon them, were beaten violently with bars until the brain was dashed out, and thus they completed their martyrdom under the governor Dacianus.
          At the fortress of Tilly, in Gaul, Saint Florentius the Martyr.
          In Cappadocia, the holy Martyrs Capitolina and her servant Erotheida, who suffered under Diocletian.
          Among the Indians, Saint Frumentius the Bishop, who was first a captive there, then, ordained Bishop by Saint Athanasius, preached the Gospel in that province.
          At Naples, in Campania, Saint Gaudiosus, Bishop of Africa, who came to Campania on account of the Vandal persecution and rested in a holy death in a monastery near that city.
          In Ethiopia, Saint Elesbaan the King, who, having overcome the enemies of Christ, and having sent his royal diadem to Jerusalem in the time of the Emperor Justin, lived the monastic life as he had vowed, and departed to the Lord.
  psalm.sexto-kal-ndas-oct-bris-f7eeeedc7a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the morrow we keep the feast of holy Theodore, Archbishop of Canterbury, who was sent into England by Pope Vitalian, and was a burning and a shining light for teaching and holiness of whom mention is made upon the 19th day of this present month of September.
          Upon the same 26th day of September, were born into the better life:

          At Nicomedia, the holy martyrs Cyprian and Justina the Virgin. Justina suffered much for Christ's sake under Diocletian the Emperor and Eutholmius the President, and she converted to Christ the warlock Cyprian, who had sought by his magical arts to put her out of her mind, but along with whom she afterwards suffered martyrdom. Their bodies were cast out to be eaten by beasts, but certain Christian sailors took them by night and brought them to Rome, and they were afterwards taken to the church of the Most Holy Saviour, founded by the Emperor Constantine, where they are buried hard by the Baptistery.
          At Rome, the holy martyrs Callistratus and forty-nine others, all soldiers. In the persecution under the Emperor Diocletian, Callistratus was sewn up in a leathern sack and cast into the sea, and when, by the help of God, he escaped unharmed, the others were converted to Christ and suffered martyrdom along with him.
          Likewise at Rome, (in the year 310,) the holy Confessor Pope Eusebius.
          At Bologna, (in the fifth century,) the holy Confessor Eusebius, Bishop (of that see.)
          At Brescia, (in the sixth century,) holy Vigilius, Bishop (of that see.)
          At Albano, holy Senator.
          In the country of Frascati, (at the beginning of the eleventh century,) the blessed Abbot Nilus, a man of great holiness, Founder of the Monastery of Grotta-Ferrata, (of the Italian Congregation of the Order of St. Basil.)
          At Citta di Castello, the holy Priest Amantius, famous for the grace of working miracles.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Octóbris

          Nicomedíæ natális sanctórum Mártyrum Cypriáni, et Iustinæ Vírginis. Hæc, sub Diocletiáno Imperatóre et Eutólmio Prǽside, cum multa pro Christo pertulísset, ipsum quoque Cypriánum, qui erat magus et suis mágicis ártibus eam dementáre conabátur, ad Christiánam fidem convértit; cum quo póstea martýrium sumpsit. Eórum córpora, feris obiécta, rapuérunt noctu quidam nautæ Christiáni, et Romam detulérunt; quæ, póstmodum in Basílicam Constantiniánam transláta, prope Baptistérium cóndita sunt.
          Romæ sancti Callístrati Mártyris, et aliórum quadragínta novem mílitum; qui mílites, in persecutióne Diocletiáni Imperatóris, cum Callistrátus, insútus cúleo et in mare demérsus, divína ope evasísset incólumis, ad Christiánam religiónem convérsi sunt, et cum eo páriter martýrium subiérunt.
          Bonónia; sancti Eusébii, Epíscopi et Confessóris.
          Bríxiæ sancti Vigílii Epíscopi.
          In agro Tusculáno beáti Nili Abbátis, qui fundátor monastérii Cryptæ Ferrátæ ac vir magnæ sanctitátis éxstitit.
          Tiférni, in Umbria, sancti Amántii Presbýteri, virtúte miraculórum illústris.
          Albáni sancti Senatóris.
      en2:
      - type: text
        text: |-
          The Seventh of September
      
          At Nicomedia, the birth of the holy Martyrs Cyprian and the virgin Justina. She, under the Emperor Diocletian and the governor Eutolmius, having suffered much for Christ, also converted to the Christian faith Cyprian himself, who was a sorcerer and was attempting with his magic arts to lead her astray; and afterward she suffered martyrdom with him. Their bodies, cast to the wild beasts, were seized at night by certain Christian sailors, who brought them to Rome; and they were afterward transferred to the Constantinian Basilica and enshrined near the Baptistery.
          At Rome, Saint Callistratus the Martyr and forty-nine other soldiers; who, in the persecution of the Emperor Diocletian, when Callistratus, sewn into a sack and plunged into the sea, escaped unharmed by divine aid, were converted to the Christian religion and underwent martyrdom equally with him.
          At Bologna, Saint Eusebius, Bishop and Confessor.
          At Brescia, Saint Vigilius the Bishop.
          In the Tusculan countryside, blessed Nilus the Abbot, who was the founder of the monastery of Grottaferrata and a man of great holiness.
          At Tiferno, in Umbria, Saint Amantius the Priest, illustrious for the power of miracles.
          At Albano, Saint Senator.
  psalm.sexto-kal-ndas-sept-mbris-2c8a425269:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 27th day of August, were born into the better life:

          At Rome, [in the year 1648,] the holy Confessor Joseph, famous for the innocency of his life and for his miracles, who founded the Order of Poor Regular Clerks of the Mother of God of the Pious Schools, for the teaching of godliness and good learning unto children.
          At Capua, [towards the end of the first century,] the holy martyr Rufus, Bishop [of that see.] A man of Patrician family, who was baptized along with all his house by blessed Apollinaris, the disciple of holy Peter.
          Likewise at Capua, the holy martyrs Rufus and Carpophorus, who suffered under the Emperors Diocletian and Maximian.
          At Tomi, [about the year 303,] in Pontus, the holy martyrs Marcellinus the Tribune, Mannea his wife, and their sons, John, Serapion, and Peter.
          At Lentini, in Sicily, [about the year 256,] the holy Virgin Euthalia, who was slain by her own brother Sermilian with the sword, because she was a Christian, and so passed away to Christ the Bridegroom.
          On the same day holy Anthusa the younger received martyrdom by being drowned in a well for Christ's faith's sake.
          At Bergamo, [about the year 75,] holy Narnus, who was baptized by blessed Barnabas, and was ordained by him to be the first Bishop of that city.
          At Arles, [in the year 542,] holy Caesarius, Bishop of that city, a man of marvellous holiness and godliness.
          At Autun, [about the year 600,] the holy Confessor Syagrius, Bishop [of that see.]
          At Pavia, [in the year 813,] holy John, Bishop [of that see.]
          At Lerida, in Spain, holy Licerius, Bishop [of that see.]
          In the Thebaid, [about the year 450,] the holy Hermit Poemon [or Pastor, Abbot of Scete.]
          At San Severino, in the March of Ancona, [in the year 1396,] the holy widow Margaret.
      la:
      - type: text
        text: |-
          Sexto Kaléndas Septémbris

          Sancti Ioséphi Calasánctii, Presbýteri et Confessóris, qui Ordinis Clericórum Regulárium Páuperum Matris Dei Scholárum Piárum éxstitit Fundátor, atque octávo Kaléndas Septémbris obdormívit in Dómino.
          Poténtiæ, in Lucánia, pássio sanctórum Aróntii, Honoráti, Fortunáti et Sabiniáni; qui, sanctórum Bonifátii et Theclæ fílii, a Valeriáno Iúdice, sub Maximiáno Imperatóre, iussi sunt capitálem subíre senténtiam. Eórum tamen ac reliquórum ex duódecim frátribus festum Kaléndis Septémbris celebrátur.
          Bérgomi sancti Narni, qui, a beáto Bárnaba baptizátus, primus ab ipso eiúsdem civitátis Epíscopus ordinátus est.
          Cápuæ natális sancti Rufi, Epíscopi et Mártyris; qui, cum esset patríciæ dignitátis, a beáto Apollináre, sancti Petri discípulo, cum univérsa família baptizátus est.
          Ibídem sanctórum Mártyrum Rufi et Carpóphori, qui sub Diocletiáno et Maximiáno passi sunt.
          Tomis, in Ponto, sanctórum Mártyrum Marcellíni Tribúni, et uxóris Mannéæ, ac filiórum Ioánnis, Serapiónis et Petri.
          Apud Leontínos, in Sicília, sanctæ Euthalíæ Vírginis, quæ, cum esset Christiána, ad cæléstem Sponsum, a fratre suo Sermiliáno cæsa gládio, migrávit.
          Eódem die pássio sanctæ Anthúsæ iunióris, quæ ob Christi fidem, in púteum mersa, martýrium sumpsit.
          Areláte, in Gállia, sancti Cæsárii Epíscopi, miræ sanctitátis et pietátis viri.
          Augustodúni sancti Syágrii, Epíscopi et Confessóris.
          Papíæ sancti Ioánnis Epíscopi.
          Ilérdæ, in Hispánia Tarraconénsi, sancti Licérii Epíscopi.
          In Thebáide sancti Póemenis Anachorétæ.
          Apud Septempedános, in Picéno, sanctæ Margarítæ Víduæ.
      en2:
      - type: text
        text: |-
          The Seventh of August
      
          Saint Joseph Calasanz, Priest and Confessor, who was the Founder of the Order of Clerics Regular of the Poor of the Mother of God of the Pious Schools, and fell asleep in the Lord on the eighth day before the Kalends of September.
          At Potenza, in Lucania, the passion of the holy Arontius, Honoratus, Fortunatus, and Sabinianus; who were sons of the holy Boniface and Thecla and were ordered by the governor Valerian, under the Emperor Maximian, to undergo capital punishment. The feast of these and the rest of the twelve brothers is celebrated on the Kalends of September.
          At Bergamo, Saint Narnus, who was baptized by blessed Barnabas and ordained by him as the first Bishop of that city.
          At Capua, the birth of Saint Rufus, Bishop and Martyr; who, being of patrician dignity, was baptized together with his whole household by blessed Apollinaris, a disciple of Saint Peter.
          At the same place, the holy Martyrs Rufus and Carpophorus, who suffered under Diocletian and Maximian.
          At Tomi, in Pontus, the holy Martyrs Marcellinus the Tribune and his wife Mannaea, and their sons John, Serapion, and Peter.
          At Leontini, in Sicily, Saint Euthalias the Virgin, who, being a Christian, departed to her heavenly Spouse, slain with the sword by her brother Sermilianus.
          On the same day, the passion of Saint Anthousa the Younger, who for the faith of Christ was plunged into a well and suffered martyrdom.
          At Arles, in Gaul, Saint Caesarius the Bishop, a man of wondrous holiness and piety.
          At Autun, Saint Syagrius, Bishop and Confessor.
          At Pavia, Saint John the Bishop.
          At Lleida, in Tarraconensian Spain, Saint Licerius the Bishop.
          In the Thebaid, Saint Poemen the Anchorite.
          At Septempieda, in Picenum, Saint Margaret the Widow.
  psalm.sexto-nonas-i-lii-aeb9aabbdc:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the visit of the Blessed Virgin Mary to Elizabeth.
          On the same 2nd day of July, were born into the better life:

          At Rome, upon the Aurelian Way, the holy martyrs Processus and Martinian, who were baptized by the blessed Apostle Peter in the Mamertine Prison, and crowned with martyrdom under Nero by being slain with the sword, after suffering the beating of their mouths, the rack, thongs, cudgels, fire, and loaded whips.
          At Rome also, the three holy soldiers who turned to Christ at the martyrdom of the blessed Apostle Paul, and thus earned a share with him in the glory of heaven.
          On the same day, the holy martyrs Ariston, Crescentian, Eutychian, Urban, Vitalis, Justus, Felicissimus, Felix, Marcia, and Symphorosa, who were all crowned with martyrdom in the Campania while the persecution was raging under the Emperor Diocletian.
          At Winchester, in England, the holy Swithin, Bishop of that city, [in the year 863,] whose holiness shone forth in the grace of working miracles, and whose feast day we keep upon the 15th day of this present month of July. [His head was taken to the cathedral of Évreux at the end of the fourteenth century.]
          At Bamberg, [in Bavaria,] holy Otto, Bishop of [that see,] who preached the Gospel to the Pomeranians, and turned them to the faith, [in the year 1139.]
          At Tours, the holy woman Monegund, [about the year 573]
      la:
      - type: text
        text: |-
          Sexto Nonas Iúlii

          Visitátio beátæ Maríæ Vírginis ad Elísabeth.
          Romæ, via Aurélia, natális sanctórum Mártyrum Procéssi et Martiniáni, qui, a beáto Petro Apóstolo in Mamertíni custódia baptizáti, et, sub Neróne, oris contusiónem, equúleum, nervos, fustes, flammas scorpionésque perpéssi, novíssime, gládio percússi, martýrio coronáti sunt.
          Item Romæ pássio sanctórum trium mílitum, qui, ad Christum convérsi in martýrio beáti Pauli Apóstoli, cum eo partícipes fieri cæléstis glóriæ meruérunt.
          Eódem die sanctórum Mártyrum Aristónis, Crescentiáni, Eutychiáni, Urbáni, Vitális, Iusti, Felicíssimi, Felícis, Márciæ et Symphorósæ; qui omnes apud Campániam, cum Diocletiáni Imperatóris persecútio desævíret, martýrio coronáti sunt.
          Wintóniæ, in Anglia, sancti Swithúni Epíscopi, cuius sánctitas miráculis effúlsit.
          Bambérgæ sancti Othónis Epíscopi, qui Pomeránis Evangélium prædicávit, et eos ad fidem convértit.
          Lýciis, in Apúlia, sancti Bernardíni Realíno, Confessóris, qui magistrátus múnere egrégie functus, Societátem Iesu ingréssus et sacerdótio auctus, caritáte ac miráculis incláruit.
          Turónis, in Gállia, deposítio sanctæ Monegúndis, religiósæ féminæ.
      en2:
      - type: text
        text: |-
          The Second of July
      
          The Visitation of the Blessed Virgin Mary to Elizabeth.
          At Rome, on the Aurelian Way, the birth of the holy Martyrs Processus and Martinianus, who were baptized by the blessed Apostle Peter in the Mamertine prison, and, under Nero, having endured the blow to the mouth, the rack, ropes, clubs, flames, and scorpions, were finally struck with the sword and crowned with martyrdom.
          Also at Rome, the passion of three holy soldiers, who were converted to Christ at the martyrdom of the blessed Apostle Paul and merited to become partakers of heavenly glory with him.
          On the same day, the holy Martyrs Ariston, Crescentianus, Eutychianus, Urban, Vitalis, Justus, Felicissimus, Felix, Marcia, and Symphorosa; all of whom were crowned with martyrdom in Campania when the persecution of the Emperor Diocletian was raging.
          At Winchester, in England, Saint Swithun the Bishop, whose holiness shone forth in miracles.
          At Bamberg, Saint Otton the Bishop, who preached the Gospel to the Pomeranians and converted them to the faith.
          At Lecce, in Apulia, Saint Bernardino Realino, Confessor, who served excellently in public office and then, entering the Society of Jesus and being raised to the priesthood, became renowned for charity and miracles.
          At Tours, in Gaul, the passing of Saint Monegundis, a woman of religious life.
  psalm.sexto-nonas-m-rtii-83b53cbdff:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 2nd day of March, were born into the better life:

          In England, [about the year 672,] holy Chad, Bishop of the Mercians and of Lindisfarne, whose eminent graces are recorded by Bede. [His body was buried at Lichfield, first in the Church of Our Lady, second in the Church of St. Peter, and thirdly in the Cathedral dedicated to Our Lady and St. Chad. The town was named Lichfield on account of the number martyred and buried there under Maximian Hercules.]
          At Rome, upon the Latin Way, [about the year 258,] under the Emperors Valerian and Gallienus, the holy martyrs Jovinus and Basileus.
          Likewise at Rome, under the Emperor Alexander and the Prefect Ulpian, many holy martyrs, who were long tortured, and at length put to death.
          At Porto, the holy martyrs Paul, Heraclius, Secundilla, and Januaria.
          At Caesarea, in Cappadocia, the holy martyrs Lucius the Bishop, Absolom, Lorgius.
          In Campania are commemorated eighty holy martyrs, who would not eat meat sacrificed unto idols, nor adore a she-goat's head, and therefore, [about the year 629,] were cruelly slain by the Lombards.
          At Rome, [about the year 483,] the holy Confessor Pope Simplicius.
      la:
      - type: text
        text: |-
          Sexto Nonas Mártii

          Romæ, via Latína, sanctórum Mártyrum Iovíni et Basiléi, qui passi sunt sub Valeriáno et Galliéno Imperatóribus.
          Item Romæ plurimórum sanctórum Mártyrum, qui sub Alexándro Imperatóre et Ulpiáno Præfécto, diu cruciáti, ad extrémum capitáli senténtia damnáti sunt.
          Cæsaréæ, in Cappadócia, sanctórum Mártyrum Lúcii Epíscopi, Absalónis et Lórgii.
          In Portu Románo sanctórum Mártyrum Pauli, Heráclii, Secundíllæ et Ianuáriæ.
          In Campánia commemorátio sanctórum octogínta Mártyrum, qui, cum nollent carnes immolátas comédere nec caput capræ adoráre, a Longobárdis sævíssime cæsi sunt.
          Lichféldiæ, in Anglia, sancti Ceáddæ, Epíscopi Merciórum et Lindisfarnórum, cuius præcláras virtútes sanctus Beda Venerábilis commémorat.
      en2:
      - type: text
        text: |-
          The Fifth of March
      
          At Rome, on the Latin Way, the holy Martyrs Jovinus and Basil, who suffered under the Emperors Valerian and Gallienus.
          Also at Rome, very many holy Martyrs, who under the Emperor Alexander and the prefect Ulpianus, long tortured, were finally condemned to death.
          At Caesarea, in Cappadocia, the holy Martyrs Lucius the Bishop, Absalon, and Lorgius.
          At Portus near Rome, the holy Martyrs Paul, Heraclius, Secundilla, and Januaria.
          In Campania, commemoration of eighty holy Martyrs, who, because they refused to eat meat offered to idols or to adore the head of a goat, were most cruelly slaughtered by the Lombards.
          At Lichfield, in England, Saint Chad, Bishop of the Mercians and Lindisfarne, whose outstanding virtues Saint Bede the Venerable commends.
  psalm.sexto-nonas-maii-6ab4c70697:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 2nd day of May, were born into the better life:

          At Alexandria, in the year 373, holy Athanasius, Pope of that city, most illustrious for his holiness and teaching. Nearly the whole world leagued itself together to persecute him for the Catholic Faith. He fought right stoutly against Emperors, Presidents, and Arian Bishops without number, from the time of the Emperor Constantine until that of the Emperor Valens. To escape their plots he became an outcast upon the face of the wide world, and there was nowhere left where he could hide himself in safety. He returned at last to his own church, and after many contendings and many crowns of long-suffering he passed away to be ever with the Lord, in the 46th year of his priesthood, in the time of the Emperors Valentinian and Valens.
          At Rome, the holy martyrs Saturninus, Neopolus, German, and Celestine, who suffered many things, and were at last cast into prison, where they slept in the Lord.
          Likewise the holy martyrs Exuperius and Zoe his wife, their children Cyriacus and Theodulus, who suffered under the Emperor Hadrian.
          At Seville, the holy martyr the Deacon Felix.
          Upon the same day, [in the year 489,] the holy martyr Vindemial.
      la:
      - type: text
        text: |-
          Sexto Nonas Maii

          Alexandríæ natális sancti Athanásii, eiúsdem urbis Epíscopi, Confessóris et Ecclésiæ Doctóris, sanctitáte et doctrína claríssimi; in cuius persecutiónem univérsus fere Orbis coniuráverat. Ipse tamen cathólicam fidem, a témpore Constantíni usque ad Valéntem, advérsus Imperatóres ac Prǽsides et innúmeros Epíscopos Ariános strénue propugnávit; a quibus plúrimas perpéssus insídias, prófugus toto Orbe actus est, nec ullus ei tutus ad laténdum supérerat locus. Tandem, ad suam Ecclésiam revérsus, illic, post multos agónes multásque patiéntiæ corónas, quadragésimo sexto sui sacerdótii anno migrávit ad Dóminum, témpore Valentiniáni et Valéntis Imperatórum.
          Floréntiæ item natális sancti Antoníni, ex Ordine Prædicatórum, Epíscopi et Confessóris, doctrína et sanctitáte célebris. Ipsíus autem festívitas sexto Idus mensis huius recólitur.
          Romæ sanctórum Mártyrum Saturníni, Neópoli, Germáni et Cælestíni, qui, multa passi, in cárcerem demum coniécti, ibi in Dómino quievérunt.
          Eódem die sancti Vindemiális, Epíscopi et Mártyris, qui, una cum sanctis Epíscopis Eugénio et Longíno doctrína et miráculis advérsus Ariános decértans, a Rege Wandalórum Hunneríco iubétur váriis torméntis afflígi ac tandem cápite obtruncári.
          Híspali, in Hispánia, sancti Felícis, Diáconi et Mártyris.
          Attalíæ, in Pamphýlia, sanctórum Mártyrum Exsupérii, et Zoës uxóris, atque Cyríaci et Theodúli filiórum; qui, sub Hadriáno Imperatóre, cum servi essent cuiúsdam viri Pagáni, omnes, ipso hero iubénte, ob líberam Christiánæ fídei professiónem, primum verberáti sunt ac veheménter torti, deínde, in accénsum clíbanum iniécti, ánimas suas Deo tradidérunt.
      en2:
      - type: text
        text: |-
          The Second of May
      
          At Alexandria, the birth of Saint Athanasius, Bishop of that city, Confessor and Doctor of the Church, most illustrious in holiness and learning; against whom almost the entire world had conspired in persecution. He, however, strenuously defended the Catholic faith, from the time of Constantine until Valens, against Emperors and governors and countless Arian bishops; suffering very many plots from them, he was driven as a fugitive throughout the entire world, and no place remained safe for him to hide. At last, returning to his own Church, he departed to the Lord there, after many contests and many crowns of patience, in the forty-sixth year of his priesthood, in the time of the Emperors Valentinian and Valens.
          At Florence, likewise the birth of Saint Antoninus, of the Order of Preachers, Bishop and Confessor, celebrated for learning and holiness. His feast is kept on the sixth of the Ides of this month.
          At Rome, the holy Martyrs Saturninus, Neopolus, Germanus, and Celestinus, who, after much suffering, were finally cast into prison, where they rested in the Lord.
          On the same day, Saint Vindemialis, Bishop and Martyr, who, contending together with the holy Bishops Eugene and Longinus in teaching and miracles against the Arians, was ordered by Huneric, King of the Vandals, to be afflicted with various torments and finally beheaded.
          At Seville, in Spain, Saint Felix, Deacon and Martyr.
          At Attaleia, in Pamphylia, the holy Martyrs Exsuperius and his wife Zoe, and their sons Cyriacus and Theodulus; who, under the Emperor Hadrian, being slaves of a certain pagan man, were all, at the command of their very master, first beaten and severely tortured for the free profession of the Christian faith, then cast into a burning furnace, and gave up their souls to God.
  psalm.sexto-nonas-oct-bris-707b537c55:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the feast of the Holy Guardian Angels.
          Upon the same 2nd day of October, were born into the better life:

          At Nicomedia, the holy soldier Eleutherius, and an unnumbered multitude of others, all martyrs.
          When the palace of the Emperor Diocletian was burnt, they were falsely accused of the crime of setting it on fire and by the command of that most cruel Emperor they were slaughtered in crowds some were slain with the sword, some were burnt in the fire, and some were cast into the sea. But the first of them was Eleutherius, who was long tortured, but at every new torment seemed to grow more steadfast, like gold tried in the fire, and crowned his testimony with victory.
          In the country of Arras, the blessed Leodegar, Bishop of Autun, (in the year 678,) who was murdered by Ebroin, mayor of the palace to King Theodoric, after he had laid upon him diverse insults and sufferings for the truth's sake.
          Likewise the holy martyr Gerin, brother of the said blessed Leodegar, who was stoned to death at the same place.
          At Antioch, the holy martyrs Primus, Cyril, and Secondarius.
          At Constantinople, the holy Monk Theophilus, who was cruelly scourged and sent into exile, under the Emperor Leo the Isaurian, for defending holy images, and passed away to be ever with the Lord.
          At Hereford, in England, the holy Confessor Thomas, Bishop of that see, whose feast we keep upon the 3rd day of this present month of October.
      la:
      - type: text
        text: |-
          Sexto Nonas Octóbris

          Festum sanctórum Angelórum Custodum.
          Romæ pássio sancti Modésti Sardi, Levítæ et Mártyris; qui, sub Diocletiáno Imperatóre, equúleo tortus atque igne adústus est. Ipsíus vero corpus, Benevéntum póstea translátum, in Ecclésia suo insigníta nómine collocátum fuit.
          In território Atrebaténsi item pássio beáti Leodegárii, Augustodunénsis Epíscopi; quem, váriis iniúriis et divérsis supplíciis pro veritáte afflíctum, Ebroínus, Maior domus régiæ Theodoríci, intérfici iussit.
          Nicomedíæ sancti Eleuthérii, mílitis et Mártyris, cum áliis innúmeris; qui, cum Diocletiáni regia incéndio conflagrásset et falso huius críminis essent accusáti, omnes, iubénte eódem sævíssimo Imperatóre, acervátim necáti sunt. Horum porro álii gládiis obtruncabántur, álii cremabántur ígnibus, álii in mare præcipitabántur; sed inter eos primus Eleuthérius, cum per singula torménta, diu cruciátus, valídior redderétur, martýrium victóriæ suæ, ígnibus velut aurum examinátus, complévit.
          Antiochíæ sanctórum Mártyrum Primi, Cyrílli et Secundárii.
          Eódem die sancti Geríni Mártyris, qui frater éxstitit beáti Leodegárii, Augustodunénsis Epíscopi, et, iubénte ipso Ebroíno, lapídibus óbrutus est.
          Constantinópoli sancti Theóphili Mónachi, qui, pro defensióne sanctárum Imáginum a Leóne Isáurico sævíssime cæsus et in exsílium pulsus, migrávit ad Dóminum.
      en2:
      - type: text
        text: |-
          The Second of October
      
          The Feast of the Holy Guardian Angels.
          At Rome, the passion of Saint Modestus Sardus, Levite and Martyr; who, under the Emperor Diocletian, was tortured on the rack and burned with fire. His body was afterward transferred to Benevento, where it was placed in the church distinguished by his name.
          In the territory of Arras, likewise the passion of blessed Leodegar, Bishop of Autun; who, afflicted for the truth with various injuries and diverse torments, was ordered to be killed by Ebroin, the mayor of the palace of King Theodoric.
          At Nicomedia, Saint Eleutherius the soldier and Martyr, with innumerable others; who, when the palace of Diocletian caught fire and they were falsely accused of this crime, were all ordered by the same most savage Emperor to be slaughtered wholesale. Of these, some were cut down by swords, others burned in fires, others cast into the sea; but among them Eleutherius, after being long tortured through each successive torment, only grew stronger, and completed his martyrdom, as gold is tested by fire.
          At Antioch, the holy Martyrs Primus, Cyrillus, and Secundarius.
          On the same day, Saint Gerinus the Martyr, who was the brother of blessed Leodegar, Bishop of Autun, and was buried under stones at the command of the same Ebroin.
          At Constantinople, Saint Theophilus the Monk, who, most cruelly beaten by Leo the Isaurian for the defense of holy images and driven into exile, departed to the Lord.
  psalm.sextod-cimo-kal-ndas-apr-lis-45486a02fe:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 17th day of March, were born into the better life:

          In Ireland, the holy Confessor Patrick, Bishop [of Armagh,] the first who there preached the Gospel of Christ, and who was famous for great miracles and works of power, [in the year 464.]
          At Jerusalem, holy Joseph of Arimathea, the honourable councillor, the disciple of the Lord, who took down His Body from the cross and laid it in his own new tomb.
          At Rome, the holy martyrs Alexander and Theodore.
          At Alexandria are commemorated many holy martyrs, who were seized by the worshippers of Serapis, and because they would not worship that idol were cruelly murdered by them, in the time of the Emperor Theodosius, who presently afterward sent a rescript to destroy the temple of Serapis.
          At Constantinople, the holy martyr Paul, who was burnt under the Emperor Constantine Copronymus for defending the honouring of holy images.
          At Chalons [-sur-Saône,] in Gaul, holy Agricola, Bishop of that see, [in the year 580.]
          At Nivelles, in Brabant, the holy Virgin Gertrude, the daughter of an illustrious race, who despised this world, and busied herself all her life in holy deeds, so that she won to be espoused to Christ in heaven, [in the year 659.]
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Aprílis

          Apud civitátem Dunum, in Hibérnia, natális sancti Patrícii, Epíscopi et Confessóris, qui primus in ea ínsula Christum evangelizávit, et máximis miráculis et virtútibus cláruit.
          Hierosólymis sancti Ioseph ab Arimathǽa, qui nóbilis Decúrio et discípulus Dómini éxstitit; atque ipsíus Dómini corpus, de cruce depósitum, in monuménto suo novo sepelívit.
          Romæ sanctórum Alexándri et Theodóri Mártyrum.
          Alexandríæ commemorátio plurimórum sanctórum Mártyrum, qui a Serápidis cultóribus comprehénsi, et, cum adoráre idólum constánter renuíssent, sævíssime cæsi sunt, témpore Theodósii Imperatóris; qui mox rescríptum dedit, ut Serápidis templum destruerétur.
          Constantinópoli sancti Pauli Mártyris, qui, sub Constantíno Coprónymo, cum sanctárum Imáginum cultum defénderet, igne combústus est.
          Cabillóne, in Gálliis, sancti Agrícolæ Epíscopi.
          Nivigéllæ, in Brabántia, sanctæ Gertrúdis Vírginis, quæ, claríssimo génere orta, despíciens mundum et toto vitæ suæ cursu in ómnibus sanctitátis offíciis se exércens, Christum sponsum in cælis habére méruit.
      en2:
      - type: text
        text: |-
          The Seventeenth of March
      
          In the city of Down, in Ireland, the birth of Saint Patrick, Bishop and Confessor, who first preached Christ in that island and became renowned for great miracles and virtues.
          At Jerusalem, Saint Joseph of Arimathea, who was a noble councillor and disciple of the Lord; and who buried the body of the Lord himself, taken down from the Cross, in his own new tomb.
          At Rome, the holy Martyrs Alexander and Theodore.
          At Alexandria, commemoration of very many holy Martyrs, who were seized by the worshippers of Serapis, and when they constantly refused to adore the idol, were most cruelly beaten, in the time of the Emperor Theodosius; who soon issued a rescript ordering the temple of Serapis to be destroyed.
          At Constantinople, Saint Paul the Martyr, who, under Constantine Copronymus, when he was defending the veneration of holy images, was burned with fire.
          At Chalon-sur-Saône, in Gaul, Saint Agricola the Bishop.
          At Nivelles, in Brabant, Saint Gertrude the Virgin, who, born of a most illustrious family, spurning the world and exercising herself in all the duties of holiness throughout the entire course of her life, merited to have Christ as her spouse in heaven.
  psalm.sextod-cimo-kal-ndas-aug-sti-c2170c2daa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Osmund, Bishop of Salisbury, of whom mention is made upon the 4th day of December, [in the year 1099.]
          Upon the same 17th day of July, were born into the better life:

          At Rome, the holy Confessor Alexius, [in the year 404,] son of the Senator Euphemian. Upon the first night of his marriage he left his bride untouched, and absconded from his home. After a long pilgrimage he returned to the city, where he was received as a beggar out of charity in his own father's house, and there remained unknown for seventeen years, thus deceiving the world by a new craft. After he was dead, in the Supreme Pontificate of Innocent I, he was recognized by a voice which was heard throughout the churches of the city and by his own writing, and his body was carried with the greatest honour to the Church of Saint Boniface, where he hath been illustrious for many miracles. We keep feast in his honour upon the 24th day of this present month of July.
          At Carthage, the holy martyrs of Scillita, [now Csarin, in Tunis,] Speratus, Nazales, Cythinus, Veturius, Felix, Acyllinus, Laetantius, Januaria, Generosa, Vestina, Donata, and Secunda. At the command of the Prefect Saturninus, after their first confession of Christ, they were cast into prison, where they were laid in stocks and afterward beheaded, [in the year 180.] The body of Speratus was brought from Africa to Gaul, along with the bones of blessed Cyprian and the head of the holy martyr Pantaleon, where it has been laid with religious honour in the church of St. John the Baptist at Lyon.
          At Amarserah, in Paphlagonia, the holy martyr Hyacinth, who suffered many things under the President Castrisius, and fell asleep in prison, [fourth century.]
          At Tivoli, the holy martyr Generosus. [His body lies, with that of the Monk and Confessor St Severinus, under the high altar in the Cathedral of St Lawrence, at Tivoli.]
          At Constantinople, the holy Theodota, martyr under the Emperor Leo the Iconoclast.
          At Rome, the holy Pope Leo IV. [He was elected in 847 and died in 855. He was a Benedictine monk in the monastery of Saint Martin, which was joined to the ancient Vatican Basilica.]
          At Pavia, the holy Confessor Ennodius, Bishop [of that see, in the year 521. He was born at Arles, about 473.]
          At Auxerre, holy Theodosius, Bishop [of that see, in the year 512.]
          At Milan, [in the year 398,] the holy Virgin Marcellina, sister of the blessed Bishop Ambrose, who received the holy veil from Pope Liberius in the church of St. Peter at Rome. Her holiness is attested by the said blessed Ambrose in his writings.
          At Venice is commemorated the translation, [in the year 1230,] of the holy Virgin Marina.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Augústi

          Romæ sancti Aléxii Confessóris, ex Euphemiáno Senatóre progéniti. Hic, prima nocte nuptiárum, sponsa intácta, e domo sua abscédens, ac, post longam peregrinatiónem, ad Urbem rédiens, decem et septem annos tamquam egenus in domo patérna recéptus hospítio, nova mundum arte delúdens, incógnitus mansit; sed post óbitum, et voce per Urbis Ecclésias audíta et scripto suo agnítus, Innocéntio Primo Pontífice Máximo, ad sancti Bonifátii Ecclésiam summo honóre delátus est, ibíque multis miráculis cláruit.
          Carthágine natális sanctórum Mártyrum Scillitanórum, id est Speráti, Narzális, Cythíni, Vetúrii, Felícis, Acyllíni, Lætántii, Ianuáriæ, Generósæ, Vestínæ, Donátæ et Secúndæ; qui, iussu Saturníni Præfécti, post primam Christi confessiónem, in cárcerem trusi et in ligno confíxi, deínde gládio decolláti sunt. Speráti autem relíquiæ, cum óssibus beáti Cypriáni et cápite sancti Pantaleónis Mártyris, ex Africa in Gállias translátæ, Lugdúni, in Basílica sancti Ioánnis Baptístæ, religióse cónditæ fuérunt.
          Amástride, in Paphlagónia, sancti Hyacínthi Mártyris, qui sub Castrítio Prǽside, multa passus, quiévit in cárcere.
          Tíbure sancti Generósi Mártyris.
          Constantinópoli sanctæ Theodótæ Mártyris, sub Leóne Iconoclásta.
          Romæ deposítio sancti Leónis Papæ Quarti.
          Pápiæ sancti Ennódii, Epíscopi et Confessóris.
          Antisiodóri sancti Theodósii Epíscopi.
          Medioláni sanctæ Marcéllinæ Vírginis, soróris beáti Ambrósii Epíscopi, quæ Romæ, in Basílica sancti Petri, a Libério Papa velum consecratiónis accépit; cuius étiam sanctitátem idem beátus Ambrósius scriptis suis testátam facit.
          Venétiis Translátio sanctæ Marínæ Vírginis.
      en2:
      - type: text
        text: |-
          The Seventeenth of July
      
          At Rome, Saint Alexis the Confessor, born of Euphemianus the Senator. He, on the first night of his marriage, leaving his bride untouched and departing from his house, and after a long pilgrimage returning to the City, was received as a pauper for seventeen years as a guest in his father's house, deceiving the world by a new artifice, and remained unrecognized; but after his death, both by a voice heard through the churches of the City and by his own written account, he was recognized and, in the time of Pope Innocent I as Supreme Pontiff, was carried with the greatest honor to the church of Saint Boniface, where he became renowned for many miracles.
          At Carthage, the birth of the holy Martyrs of Scillium, namely Speratus, Narzalus, Cythonius, Veturius, Felix, Acyllinus, Laetantius, Januaria, Generosa, Vestina, Donata, and Secunda; who, by order of the prefect Saturninus, after their first confession of Christ, were thrust into prison and fastened in the stocks, then beheaded. The relics of Speratus, together with the bones of blessed Cyprian and the head of Saint Pantaleon the Martyr, were translated from Africa to Gaul and devoutly enshrined at Lyons in the Basilica of Saint John the Baptist.
          At Amastris, in Paphlagonia, Saint Hyacinth the Martyr, who, under the governor Castritius, after much suffering, rested in prison.
          At Tivoli, Saint Generosus the Martyr.
          At Constantinople, Saint Theodota the Martyr, under Leo the Iconoclast.
          At Rome, the passing of Saint Leo IV, Pope.
          At Pavia, Saint Ennodius, Bishop and Confessor.
          At Auxerre, Saint Theodosius the Bishop.
          At Milan, Saint Marcellina the Virgin, sister of blessed Ambrose the Bishop, who at Rome in the Basilica of Saint Peter received the veil of consecration from Pope Liberius; whose holiness that same blessed Ambrose also attests in his writings.
          At Venice, the Translation of Saint Marina the Virgin.
  psalm.sextod-cimo-kal-ndas-dec-mbris-34561ca52b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of November, were born into the better life:

          At Canterbury, in England, the holy Confessor Edmund Rich, Archbishop of that see, who was driven into exile (at Pontigny) for his defense of the rights of his Church, and died a holy death near Provins, (in Champagne, in the year 1242,) and whose name Innocent IV enrolled among those of the Saints.
          In Africa, the holy martyrs Rufinus, Mark, Valerius, and their Companions.
          On the same day, the holy martyrs Elpidius, Marcellus, Eustochius, and their Companions. Elpidius was of the Senatorial Order, and steadfastly confessed the Christian faith in the presence of the Emperor Julian the Apostate. He and his Companions were first tied to unbroken horses, and so dragged about, but afterwards cast into the fire, and so achieved a glorious martyrdom, (in the fourth century.)
          At Lyon, the holy Confessor Eucherius, Bishop of that see, a man of wonderful faith and teaching. He was of the noblest of the Senatorial Order, and adopted the life and dress of a monk. For a long while he shut himself up in a cave, where he served Christ in fastings and prayers. He was called through the revelation of an angel to occupy the See of Lyons, and was therein solemnly placed. (He died about the year 450.)
          At Padua, holy Fidentius, Bishop (of that see, in the year 168.)
          On the same day, (in the year 759,) the holy Othmar, Abbot (of St. Gall, in Switzerland.)
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Decémbris

          Sanctæ Gertrúdis Vírginis, cuius natális sequénti die recensétur.
          Edimbúrgi, in Scótia, natális sanctæ Margarítæ Víduæ, Scotórum Regínæ, amóre in páuperes et voluntária paupertáte célebris. Ipsíus tamen festívitas quarto Idus Iúnii celebrátur.
          In Africa sanctórum Mártyrum Rufíni, Marci, Valérii et Sociórum.
          Eódem die sanctórum Mártyrum Elpídii, Marcélli, Eustóchii et Sociórum; ex quibus Elpídius, cum esset órdinis Senatórii et coram Iuliáno Apóstata Christiánam fidem constantíssime profiterétur, ídeo, primum equis indómitis, una cum Sóciis, alligátus atque pertráctus, deínde, in ignem coniéctus, gloriósum martýrium consummávit.
          Lugdúni, in Gállia, natális sancti Euchérii, Epíscopi et Confessóris, viri admirándæ fídei et doctrínæ. Hic, ex nobilíssimo Senatórum órdine ad religiósam vitam habitúmque convérsus, diu, intra septa spelúncæ sponte conclúsus, in oratiónibus et ieiúniis Christo servívit; deínde apud præfátam urbem in pontificáli Cáthedra, revelánte Angelo, solémniter collocátus est.
          Patávii sancti Fidéntii Epíscopi.
          Cantuáriæ, in Anglia, sancti Edmúndi, Epíscopi et Confessóris; qui, pro Ecclésiæ suæ iúribus tuéndis in exsílium actus, apud Provínum, Sénonum óppidum, sanctíssime óbiit; et Sanctórum cánoni ab Innocéntio Papa Quarto adscríptus est.
          Eódem die deposítio sancti Othmári Abbátis.
      en2:
      - type: text
        text: |-
          The Seventeenth of November
      
          Saint Gertrude the Virgin, whose birth is commemorated on the following day.
          At Edinburgh, in Scotland, the birth of Saint Margaret the Widow, Queen of the Scots, celebrated for love of the poor and voluntary poverty. Her feast is celebrated on the fourth of the Ides of June.
          In Africa, the holy Martyrs Rufinus, Marcus, Valerius, and their Companions.
          On the same day, the holy Martyrs Elpidius, Marcellus, Eustochius, and their Companions; of whom Elpidius, being of senatorial rank and professing the Christian faith most steadfastly before Julian the Apostate, was for that reason first bound to wild horses along with his Companions and dragged, then cast into the fire, and completed a glorious martyrdom.
          At Lyons, in Gaul, the birth of Saint Eucherius, Bishop and Confessor, a man of wondrous faith and learning. He, converted from the most noble rank of senators to the religious life and habit, served Christ for a long time, voluntarily enclosed within the bounds of a cave, in prayers and fasting; then at the aforesaid city he was solemnly placed on the pontifical throne by the revelation of an Angel.
          At Padua, Saint Fidentius the Bishop.
          At Canterbury, in England, Saint Edmund, Bishop and Confessor; who, driven into exile for defending the rights of his Church, died most holily at Provins, a town of the Senones, and was enrolled in the canon of the Saints by Pope Innocent IV.
          On the same day, the passing of Saint Otmar the Abbot.
  psalm.sextod-cimo-kal-ndas-febru-rii-825f504c26:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 17th day of January, were born into the better life:

          In the Thebaid, (in the year 356,) the holy Abbot Anthony, father of many monks, very illustrious for his life and miracles. Holy Athanasius hath chronicled his acts in a famous book. His sacred body was found by the revelation of God in the time of the Emperor Justinian and brought to Alexandria, where it is buried in the Church of St. John the Baptist.
          At Langres, the holy triplets Speusippus, Eleusippus, and Meleusippus, who were crowned with martyrdom in the time of the Emperor Marcus Aurelius, along with their grandmother Leonilla.
          At Rome is commemorated the finding of the bodies of the holy martyrs Diodorus the Priest, Marian the Deacon, and their Companions, who were keeping the feasts of the martyrs in the Catacombs in the time of holy Pope Stephen, (in the year 257,) when the persecutors closed up the entrance of the Catacomb and buried it up, so that they also died as martyrs.
          At Bourges, (in the year 644,) holy Sulpicius, Bishop of that see, surnamed the Pious, whose life and precious death are rendered famous by glorious miracles.
          In the monastery of St. Andrew at Rome, (in the sixth century,) the blessed monks Anthony, Merulus, and John, of whom writeth holy Pope Gregory.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Februárii

          In Thebáide sancti Antónii Abbátis, qui, multórum Monachórum Pater, vita et miráculis præclaríssimus vixit; cuius gesta sanctus Athanásius insígni volúmine prosecútus est. Eius autem sacrum corpus, sub Iustiniáno Imperatóre, divína revelatióne repértum et Alexandríam delátum, in Ecclésia sancti Ioánnis Baptístæ humátum fuit.
          Apud Língonas, in Gállia, sanctórum tergeminórum Speusíppi, Eleusíppi et Meleusíppi; qui, cum ávia sua Leonílla, martýrio coronáti sunt, témpore Marci Aurélii Imperatóris.
          Apud Bitúricas, in Aquitánia, deposítio sancti Sulpícii Epíscopi, cognoménto Pii, cuius vita et mors pretiósa gloriósis miráculis commendátur.
          Romæ, in monastério sancti Andréæ, beátorum Monachórum Antónii, Méruli et Ioánnis, de quibus scribit sanctus Gregórius Papa.
          In fínibus Edessénæ regiónis, in Mesopotámia, sancti Iuliáni Eremítæ, cognoménto Sabæ, qui, Valéntis Imperatóris témpore, fidem cathólicam, Antiochíæ ferme collápsam, virtúte miraculórum eréxit.
          Romæ Invéntio sanctórum Mártyrum Diodóri Presbýteri, Mariáni Diáconi, et Sociórum, qui, sancto Stéphano Papa Ecclésiam Dei regénte, martýrium Kaléndis Decémbris sunt assecúti.
      en2:
      - type: text
        text: |-
          The Seventeenth of January
      
          In the Thebaid, Saint Anthony the Abbot, father of many monks, most illustrious in life and miracles; whose deeds Saint Athanasius set forth in a distinguished volume. His sacred body, discovered by divine revelation under the Emperor Justinian, was brought to Alexandria and buried in the church of Saint John the Baptist.
          At Langres, in Gaul, the holy triplets Speusippus, Eleusippus, and Meleusippus; who, together with their grandmother Leonilla, were crowned with martyrdom in the time of the Emperor Marcus Aurelius.
          At Bourges, in Aquitaine, the passing of Saint Sulpicius the Bishop, surnamed Pius, whose precious life and death are commended by glorious miracles.
          At Rome, in the monastery of Saint Andrew, the blessed Monks Anthony, Merulus, and John, of whom Saint Gregory the Pope writes.
          On the borders of the Edessene region, in Mesopotamia, Saint Julian the Hermit, surnamed Sabbas, who, in the time of the Emperor Valens, restored the Catholic faith, almost utterly collapsed at Antioch, by the power of miracles.
          At Rome, the Finding of the holy Martyrs Diodorus the Priest, Marianus the Deacon, and their Companions, who, while Saint Stephen the Pope was governing the Church of God, attained martyrdom on the Kalends of December.
  psalm.sextod-cimo-kal-ndas-i-lii-9e9564b8cd:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of June, were born into the better life:

          At Besançon, in Gaul, the holy martyrs Ferreolus a Priest and Ferrutio a Deacon, who were sent forth by the blessed Irenaeus, Bishop [of Lyon,] to preach the Word of God, whereafter they were diverse ways tormented and then beheaded under Claudius the judge.
          At Tarsus, in Cilicia, under the Emperor Diocletian, the holy martyrs Quiricus and his mother Julitta.
          Quiricus was a little boy of three years old when his mother was horribly scourged before the President Alexander, he vehemently wept and lamented her, whereupon he was killed by being dashed against the steps of the judgment-seat. Julitta, after horrid stripes and grievous torments, was beheaded, and so finished her testimony.
          At Mainz, the holy martyrs Aureus and his sister Justina, and the others who were at Communion in the Church when they were massacred by the Huns, who were wasting Germany, [in the year 451.]
          At Limasol, in Cyprus, holy Tycho, Bishop [of that see,] in the time of the Emperor Theodosius the younger.
          At Lyon, [in the year 551,] the blessed Aurelian, Bishop of Arles.
          At Nantes, in Brittany, [in the year 310,] the holy Confessor Similian, Bishop [of that see.]
          At Meissen, in Germany, [in the year 1106,] holy Benno, Bishop [of that see.]
          At the village of La Louvesc, in the Diocese of Vienne, in the Ardèche, [in the year 1640,] the holy Confessor John Francis Regis, of the Society of Jesus, a man of wonderful love and long-suffering in seeking the salvation of souls, whom Pope Clement XII added to the list of the Saints.
          In Brabant, [in the year 1246,] the holy Virgin Lutgard.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Iúlii

          Mogúntiæ pássio sanctórum Aurǽi Epíscopi, et Iustínæ soróris, ac ceterórum Mártyrum; qui, synáxim in Ecclésia agéntes, ab Hunnis, Germániam diripiéntibus, trucidáti sunt.
          Vesontióne, in Gálliis, sanctórum Mártyrum Ferreóli Presbýteri, et Ferrutiónis Diáconi, qui, a beáto Irenǽo Epíscopo missi ad prædicándum verbum Dei, póstea, sub Cláudio Iúdice, divérsis pœnis excruciáti, gládio feriúntur.
          Tarsi, in Cilícia, sanctórum Mártyrum Quírici et Iulíttæ matris, sub Diocletiáno Imperatóre. Ex eis Quíricus, triénnis puéllus, cum matrem, quæ ante Alexándrum Prǽsidem nervis diríssime cædebátur, implacábili luctu lugéret, ad gradus tribunális illísus intériit; Iulítta vero, post dira vérbera et grávia torménta, martýrii sui cursum obtruncatióne cápitis implévit.
          Amathúnte, in Cypro, sancti Tychónis Epíscopi, témpore Theodósii Iunióris.
          Lugdúni, in Gállia, deposítio beáti Aureliáni, Epíscopi Arelaténsis.
          Nannéte, in Británnia minóre, sancti Similiáni, Epíscopi et Confessóris.
          Misnæ, in Germánia, sancti Bennónis Epíscopi.
          In monastério Aquiriénsi, in Brabántia, sanctæ Lutgárdis Vírginis.
      en2:
      - type: text
        text: |-
          The Seventeenth of June
      
          At Mainz, the passion of the holy Aureus the Bishop, and Justina his sister, and the other Martyrs; who, celebrating the synaxis in the church, were slaughtered by the Huns as they were pillaging Germany.
          At Besançon, in Gaul, the holy Martyrs Ferreolus the Priest and Ferrutio the Deacon, who were sent by blessed Irenaeus the Bishop to preach the word of God, and afterward, under the governor Claudius, tortured with diverse punishments, were struck with the sword.
          At Tarsus, in Cilicia, the holy Martyrs Quiricus and Julitta his mother, under the Emperor Diocletian. Of these, Quiricus, a child of three years, mourning his mother with inconsolable grief as she was being most cruelly beaten with cords before the governor Alexander, was dashed against the steps of the tribunal and died; Julitta, after dreadful floggings and grievous torments, completed the course of her martyrdom by beheading.
          At Amathus, in Cyprus, Saint Tychon the Bishop, in the time of Theodosius the Younger.
          At Lyons, in Gaul, the passing of blessed Aurelian, Bishop of Arles.
          At Nantes, in Lesser Brittany, Saint Similianus, Bishop and Confessor.
          At Meissen, in Germany, Saint Benno the Bishop.
          In the monastery of Aywières, in Brabant, Saint Lutgardis the Virgin.
  psalm.sextod-cimo-kal-ndas-i-nii-66ed33e6b8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 17th day of May, were born into the better life:

          At Villa Real, in the kingdom of Valencia, the holy Paschal, of the Order of Friars Minors, a man of wonderful innocency, and wonderful contrition.
          At Pisa, in Tuscany, is commemorated the holy martyr Torpes. He was a great official in the house of Nero, and was one of those of whom the Apostle Paul writeth from the city of Rome unto the Philippians (iv. 22,) "All the Saints salute you, chiefly they that are of Caesar's household." But later on, at the command of Satellicus, because of his belief in Christ, he was buffeted, grievously scourged, and thrown to beasts to be devoured; but he was not hurt thereby, and finished his testimony by being beheaded, upon the 29th day of April; but his feast day is kept upon the 17th day of May on account of the translation of his body.
          On the same day, the holy Virgin and martyr Restituta. In the reign of the Emperor Valerian, Proculus, the judge in Africa, caused her to be tortured in diverse ways, and put into a ship with pitch and tow that she might burn on the sea, but when fire was put to it the flame turned upon them that kindled it. Restituta gave up her spirit to God in prayer, and, by the will of God, the ship containing her body came to shore in the island of Ischia, near Naples, where her remains were received with great worship by the Christians. In after-days the Emperor Constantine the Great caused a church to be built in her honour at Naples.
          At Noyon, [in the reign of the Emperor Diocletian,] the holy martyrs Heradius, Paul, and Aquilinus, along with two others.
          At Chalcedon, under the Emperor Maximian, the holy martyrs Solochan, and the soldiers, his Companions.
          At Alexandria, the holy martyrs Adrion, Victor, and Basilla.
          At Wurzburg, [in the year 1045,] the holy Confessor Bruno, Bishop [of that see.]
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Iúnii

          Apud Villam Regálem, in Hispánia, sancti Paschális, ex Ordine Minórum, Confessóris, miræ innocentiæ et pæniténtiæ viri; quem Leo Papa Décimus tértius cæléstem eucharisticórum Cóetuum et Societátum a sanctíssima Eucharístia Patrónum declarávit.
          Noviodúni, in Gálliis, sanctórum Mártyrum Herádii, Pauli et Aquilíni, cum duóbus áliis.
          Chalcedóne sanctórum Mártyrum Solochónis et Sociórum mílitum, sub Maximiáno Imperatóre.
          Alexandríæ sanctórum Mártyrum Adriónis, Victóris et Basíllæ.
          Eódem die sanctæ Restitútæ, Vírginis et Mártyris; quæ, in Africa, Valeriáno imperánte, a Próculo Iúdice várie torta, et in navículam pice et stupa refértam, ut in mari comburerétur, impósita, tandem, cum in incensóres, immisso igne, flamma converterétur, in oratióne spíritum Deo réddidit. Ipsíus corpus cum eádem navícula, Dei nutu, ad Ænáriam ínsulam, prope Neápolim, in Campánia, devéctum est, et a Christiánis magna veneratióne suscéptum; ac póstmodum in eius honórem Constantínus Magnus Basílicam in ipsa urbe Neápoli erigéndam curávit.
      en2:
      - type: text
        text: |-
          The Seventeenth of May
      
          At Villarreal, in Spain, Saint Paschal, of the Order of Friars Minor, Confessor, a man of wondrous innocence and penance; whom Pope Leo XIII declared heavenly Patron of Eucharistic congresses and societies dedicated to the Most Holy Eucharist.
          At Noyon, in Gaul, the holy Martyrs Heradius, Paul, and Aquilinus, with two others.
          At Chalcedon, the holy Martyrs Solutor and his Companions, soldiers, under the Emperor Maximian.
          At Alexandria, the holy Martyrs Adrion, Victor, and Basilla.
          On the same day, Saint Restituta, Virgin and Martyr; who, in Africa under the Emperor Valerian, variously tortured by the governor Proclus and placed in a small boat filled with pitch and tow to be burned at sea, when the flame turned upon those who had set it alight, gave up her spirit to God in prayer. Her body, together with the same boat, by the will of God was carried to the island of Ischia, near Naples in Campania, and received with great veneration by Christians; and afterward Constantine the Great caused a basilica to be built in her honor in the city of Naples itself.
  psalm.sextod-cimo-kal-ndas-ianu-rii-c7273584e3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 17th day of December, were born into the better life:

          At Eleutheropolis, in Palestine, the holy martyrs Florian, Calanicus, and fifty-eight others, their Companions, who were slain by the Saracens for Christ's faith's sake in the time of the Emperor Heraclius.
          At Marseilles, in Gaul, blessed Lazarus, (called first) Bishop (of that city,) of whom it is written in the Gospel that the Lord raised him from the dead.
          At Rome, holy John de la Matha, founder of the Order of the most Holy Trinity for the redemption of captives. (He died in the year 1213.) His feast is kept upon the 8th day of February by order of Innocent XI.
          In the monastery of Fulda, (in the year 779,) the holy Abbot Sturmius, (of the Order of St Benedict, and first Abbot of Fulda,) Apostle of Saxony, whose name Innocent II enrolled with those of the saints at the second Council of Lateran.
          At Groot-Bijgaarden, near Brussels, in the Brabant, (in the year 1168,) the holy Virgin Wivina, whose eminent holiness is oftentimes attested by miracles. (Foundress of the Abbey of Bijgaarden, in the Archdiocese of Mechelen, of the Order of St. Benedict.)
          At Constantinople, the holy widow Olympias, (about the year 410; born about 368.)
          In the Ardennes, the blessed Widow Begga, sister of holy Gertrude. (She married Ansegise, son of St. Arnoult, Bishop of Metz. She was born about 368, became a widow in 386, and died about 410.)
          Upon the same day is commemorated the translation of the body of the holy martyr Ignatius, Patriarch of Antioch, who was the third to govern that church after the blessed Apostle Peter he suffered at Rome under Trajan, but his body was brought thence to Antioch and laid in the cemetery of the church outside the gate which leadeth unto Daphne, upon the anniversary of the which ceremony holy John Chrysostom preached unto the people. In after-times the body was again brought back to Rome, where it is buried, and highly honoured in the church of St. Clement along with the body of that most blessed Pope and martyr.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Ianuárii

          Romæ natális sancti Ioánnis de Matha, Presbýteri et Confessóris, qui Ordinis sanctíssimæ Trinitátis redemptiónis captivórum Fundátor éxstitit. Ipsíus tamen festívitas, ex dispositióne Innocéntii Papæ Undécimi, ágitur sexto Idus Februárii.
          Massíliæ, in Gállia, beáti Lázari Epíscopi, sanctárum Maríæ Magdalénæ ac Marthæ fratris, quem Dóminus in Evangélio appellásse amícum et a mórtuis excitásse légitur.
          Eleutherópoli, in Palæstína, sanctórum Mártyrum Floriáni, Calaníci, et Sociórum quinquagínta et octo; qui, témpore Heráclii Imperatóris, a Saracénis ob Christi fidem occísi sunt.
          In monastério Fuldénsi sancti Stúrmii, Abbátis et Saxóniæ Apóstoli; quem Innocéntius Papa Secúndus, in Concílio secúndo Lateranénsi, in Sanctórum númerum rétulit.
          Bigárdis, prope Bruxéllas, in Brabántia, sanctæ Wivínæ Vírginis, cuius egrégiam sanctitátem mirácula crebra testántur.
          Constantinópoli sanctæ Olympíadis Víduæ.
          Andániæ, apud Septem Ecclésias, in Bélgio, beátæ Beggæ Víduæ, quæ fuit soror sanctæ Gertrúdis.
          Eódem die Translátio sancti Ignátii, Epíscopi et Mártyris; qui, tértius post beátum Petrum Apóstolum, Antiochénam rexit Ecclésiam. Eius corpus ab urbe Roma, ubi ipse, sub Traiáno, glorióse martýrium tertiodécimo Kaléndas Ianuárii consummáverat, Antiochíam delátum, ibídem, in cœmetério Ecclésiæ, extra portam Daphníticam, pósitum fuit; in qua celebritáte sanctus Ioánnes Chrysóstomus conciónem ad pópulum hábuit. Póstmodum vero eius relíquiæ rursus Romam translátæ sunt, et in Ecclésia sancti Cleméntis, una cum córpore eiúsdem beatíssimi Papæ et Mártyris, summa veneratióne recónditæ.
      en2:
      - type: text
        text: |-
          The Seventeenth of December
      
          At Rome, the birth of Saint John of Matha, Priest and Confessor, who was the Founder of the Order of the Most Holy Trinity for the Redemption of Captives. His feast, however, by the arrangement of Pope Innocent XI, is celebrated on the sixth of the Ides of February.
          At Marseilles, in Gaul, blessed Lazarus the Bishop, brother of the holy Mary Magdalene and Martha, whom the Lord is read in the Gospel to have called his friend and raised from the dead.
          At Eleutheropolis, in Palestine, the holy Martyrs Florian, Calanicus, and fifty-eight Companions; who, in the time of the Emperor Heraclius, were killed by the Saracens for the faith of Christ.
          In the monastery of Fulda, Saint Sturm, Abbot and Apostle of Saxony; whom Pope Innocent II enrolled in the number of the Saints at the Second Lateran Council.
          At Bigards, near Brussels, in Brabant, Saint Wivina the Virgin, whose outstanding holiness frequent miracles attest.
          At Constantinople, Saint Olympias the Widow.
          At Andenne, near the Seven Churches, in Belgium, blessed Begga the Widow, who was the sister of Saint Gertrude.
          On the same day, the Translation of Saint Ignatius, Bishop and Martyr; who, third after the blessed Apostle Peter, governed the Church of Antioch. His body was brought from the city of Rome, where he himself had gloriously completed his martyrdom under Trajan on the thirteenth day before the Kalends of January, to Antioch, and was there placed in the cemetery of the Church outside the Daphnic gate; at which celebration Saint John Chrysostom gave an address to the people. Afterward, however, his relics were translated back to Rome, and with the greatest veneration enshrined in the church of Saint Clement, together with the body of that same most blessed Pope and Martyr.
  psalm.sextod-cimo-kal-ndas-m-rtii-a56b14e5d4:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 14th day of February, were born into the better life:

          At Rome, upon the Flaminian Way, the blessed martyr Valentine, a Priest, who after much healing and teaching was cudgelled and beheaded under Claudius Caesar, [in the year 268.]
          Likewise at Rome, the holy martyrs Vitalis, Felicula, and Zeno.
          At Teramo, [in Umbria, in the year 273,] the holy martyr Valentine, Bishop of that see. He was heavily flogged and committed to jail, but as he would not yield he was thrown out of the prison in the silence of midnight and beheaded by command of Placidus, Prefect of the city. There likewise, [in the year 273,] the holy martyrs Proculus, Ephebus, and Apollonius, who were watching by the body of holy Valentine when they were apprehended by order of Leontius, the consular, and slain with the sword.
          At Alexandria, the holy martyrs Bassus, Anthony, and Protolicus, who were drowned in the sea.
          Likewise at Alexandria, the Priest Cyrion, Bassian the Reader, Agatho the Exorcist, and Moses, who were all burnt with fire and passed away to heaven.
          Also likewise at Alexandria, the holy martyrs Denis and Ammonius, who were beheaded.
          At Ravenna, the holy Confessor Eleuchadius, Bishop of that see.
          In Bithynia, [in the year 470,] the holy Abbot Auxentius.
          At Sorrento, the holy Abbot Antonino. He was in the monastery of Monte Cassino when it was destroyed by the Lombards, and he went thence to a solitude hard by the city of Sorrento, and there [in the year 830,] fell asleep in the Lord, famed for holiness. His body is daily remarkable for many miracles, most chiefly in the delivery of them that are vexed by evil spirits.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Mártii

          Romæ, via Flamínia, natális sancti Valentíni, Presbýteri et Mártyris, qui, post multa sanitátum et doctrínæ insígnia, fústibus cæsus et decollátus est, sub Cláudio Cǽsare.
          Ibídem deposítio sancti Cyrílli, Epíscopi et Confessóris; qui, una cum sancto Methódio, simíliter Epíscopo et fratre suo, cuius dies natális octávo Idus Aprílis recensétur, multas Slávicas gentes earúmque Reges ad fidem Christi perdúxit. Horum tamen Sanctórum festívitas Nonis Iúlii celebrátur.
          Item Romæ sanctórum Mártyrum Vitális, Felículæ et Zenónis.
          Interámnæ sancti Valentíni, Epíscopi et Mártyris, qui, post diútinam cædem mancipátus custódiæ, et, cum superári non posset, tandem, médiæ noctis siléntio eiéctus de cárcere, decollátus est, iussu Præfécti urbis Plácidi.
          Alexandríæ sanctórum Mártyrum Cyriónis Presbýteri, Bassiáni Lectóris, Agathónis Exorcístæ, et Móysis; qui omnes, igne combústi, evolavérunt ad cælum.
          Interámnæ sanctórum Próculi, Ephébi et Apollónii Mártyrum, qui, cum ad sancti Valentíni corpus vigílias ágerent, Leóntii Consuláris iussu comprehénsi sunt, et gládio cæsi.
          Alexandríæ sanctórum Mártyrum Bassi, Antónii et Protólici, qui demérsi sunt in mare.
          Item Alexandríæ sanctórum Dionýsii et Ammónii decollatórum.
          Neápoli, in Campánia, sancti Nostriáni Epíscopi, qui in cathólica fide contra hæréticam pravitátem tuénda éxstitit insígnis.
          Ravénnæ sancti Eleuchádii, Epíscopi et Confessóris.
          In Bithýnia sancti Auxéntii Abbátis.
          Apud Surréntum sancti Antoníni Abbátis, qui e monastério Cassinénsi, a Longobárdis devastáto, in solitúdinem eiúsdem urbis secéssit; ibíque, sanctitáte célebris, obdormívit in Dómino. Ipsíus corpus multis quotídie miráculis, et præsértim in energúmenis liberándis, effúlget.
      en2:
      - type: text
        text: |-
          The Fifteenth of February
      
          At Rome, on the Flaminian Way, the birth of Saint Valentine, Priest and Martyr, who, after many remarkable cures and teaching, was beaten with clubs and beheaded under the Emperor Claudius.
          At the same place, the passing of Saint Cyril, Bishop and Confessor; who, together with Saint Methodius, likewise Bishop and his brother, whose birth is commemorated on the eighth of the Ides of April, led many Slavic peoples and their kings to the faith of Christ. The feast of these Saints, however, is celebrated on the Nones of July.
          Also at Rome, the holy Martyrs Vitalis, Felicula, and Zeno.
          At Interamna, Saint Valentine, Bishop and Martyr, who, after long imprisonment, and since he could not be overcome, was finally taken out of prison in the silence of midnight and beheaded by order of the prefect of the city Placidus.
          At Alexandria, the holy Martyrs Cyrion the Priest, Bassianus the Lector, Agatho the Exorcist, and Moses; who were all burned alive and flew up to heaven.
          At Interamna, the holy Martyrs Proclus, Ephebius, and Apollonius, who, while keeping vigil at the body of Saint Valentine, were seized by order of the consul Leontius and cut down with the sword.
          At Alexandria, the holy Martyrs Bassus, Antonius, and Protolicus, who were plunged into the sea.
          Also at Alexandria, the holy Dionysius and Ammonius, beheaded.
          At Naples, in Campania, Saint Nostrianus the Bishop, who was outstanding in defending the Catholic faith against heretical wickedness.
          At Ravenna, Saint Eleuchadius, Bishop and Confessor.
          In Bithynia, Saint Auxentius the Abbot.
          At Sorrento, Saint Antoninus the Abbot, who withdrew from the monastery of Cassino after it was devastated by the Lombards into the solitude of that city; and there, celebrated for holiness, fell asleep in the Lord. His body shines daily with many miracles, especially in the liberation of those possessed by evil spirits.
  psalm.sextod-cimo-kal-ndas-maii-6b120c663f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 16th day of April, were born into the better life:

          At Rome, [in the year 1783,] the holy Confessor Benedict Joseph Labre, illustrious for his contempt of himself, and his absolute voluntary poverty.
          At Corinth, the holy martyrs Callistus and Charisius, and seven others, who were all drowned in the sea, [third century.]
          At Saragossa, in Spain, the eighteen holy martyrs, Optatus, Lupercus, Successus, Martial, Urban, Julia, Quintilian, Publius, Fronto, Felix, Caecilian, Eventius, Primitivus, Apodemius, and four others who were all named Saturninus; all these were tormented and slain at one time under Dacian, President of Spain, [about the year 304.] Prudentius has celebrated their illustrious martyrdom in poetry.
          Likewise at Saragossa, the holy Virgin and martyr Encratis, who, after her body had been mangled, her breasts cut off, and her liver torn out, still survived, and was kept shut up in prison until her body mortified, [in the year 303 or 304.]
          In the same city, the holy martyrs Caius and Crementius, who having confessed Christ for the second time, remained firm in His faith, and drank the cup of His testimony, [after the year 303.]
          There likewise, [in the sixth century,] the holy martyr Lambert.
          At Palencia, holy Turibius, Bishop of Astorga, who with the help of holy Pope Leo rooted the Priscillianist heresy completely out of Spain, and fell asleep in peace, famous for miracles, [in the year 460.]
          At Braga, in Portugal, [in the year 665,] holy Fructuosus, Bishop of that see.
          On the same day, holy Paternus, Bishop of Avranches, [in the year 565.]
          At Valenciennes, in France, the holy Confessor Drogo, [in the year 1189.]
          At Siena, in Tuscany, blessed Joachim, of the Order of Servants of the Blessed Virgin Mary, [in the year 1305.]
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Maii

          Corínthi natális sanctórum Mártyrum Callísti et Charísii, cum áliis septem, qui omnes, post ália toleráta supplícia, in mare demérsi sunt.
          Cæsaraugústæ, in Hispánia, item natális sanctórum decem et octo Mártyrum, scílicet Optáti, Lupérci, Succéssi, Martiális, Urbáni, Iúliæ, Quinctiliáni, Públii, Frontónis, Felícis, Cæciliáni, Evéntii, Primitívi, Apodémii, et aliórum quátuor qui Saturníni vocáti esse referúntur. Hi omnes sub Daciáno, Hispaniárum Prǽside, simul pœnis affécti atque interémpti sunt; quorum illústre martýrium Prudéntius vérsibus exornávit.
          In eádem civitáte sanctórum Caii et Creméntii, qui, secúndo conféssi et in Christi fide perseverántes, martýrii cálicem gustavérunt.
          Ibídem sancti Lambérti Mártyris.
          Item Cæsaraugústæ sanctæ Encrátidis, Vírginis et Mártyris, quæ, laniáto córpore, mamílla abscíssa et iécore avúlso, adhuc supérstes in cárcere inclúsa et reténta est, donec ulcerátum ipsíus corpus putrésceret.
          Paléntiæ sancti Turíbii, Epíscopi Asturicénsis, qui, ope sancti Leónis Papæ, Priscilliáni hǽresim ex Hispánia pénitus profligávit, clarúsque miráculis quiévit in pace.
          Brácari, in Lusitánia, sancti Fructuósi Epíscopi.
          Sescíaci, in Constantiénsi Gálliæ território, tránsitus sancti Patérni, Epíscopi Abrincénsis et Confessóris.
          Romæ natális sancti Benedícti-Ioséphi Labre Confessóris, qui contémptu sui et extrémæ voluntáriæ paupertátis laude éxstitit insígnis.
          Apud Valencénas, in Gállia, sancti Drogónis Confessóris.
          Nivérnis, in Gállia, sanctæ Maríæ-Bernárdæ Soubirous, Vírginis, e Congregatióne Sorórum a Caritáte et Institutióne Christiána, Lapúrdi, adhuc iuvénculæ, iterátis apparitiónibus Immaculátæ Dei Genitrícis Maríæ recreátæ, quam Pius Papa Undécimus inter sanctas Vírgines adscrípsit.
          Senis, in Túscia, beáti Ióachim, ex Ordine Servórum beátæ Maríæ Vírginis.
      en2:
      - type: text
        text: |-
          The Sixteenth of April
      
          At Corinth, the birth of the holy Martyrs Callistus and Charisius, with seven others, all of whom, after other torments endured, were plunged into the sea.
          At Caesaraugusta, in Spain, likewise the birth of eighteen holy Martyrs, namely Optatus, Lupercus, Successus, Martialis, Urbanus, Julia, Quinctilianus, Publius, Fronto, Felix, Caecilianus, Eventius, Primitivus, Apodemius, and four others who are said to have been named Saturninus. All of these, under Dacianus, governor of the Spains, were simultaneously afflicted with punishments and put to death; whose illustrious martyrdom Prudentius adorned with his verses.
          In the same city, the holy Gaius and Crementius, who confessed twice, and persevering in the faith of Christ, tasted the chalice of martyrdom.
          At the same place, Saint Lambert the Martyr.
          Also at Caesaraugusta, Saint Encratidis, Virgin and Martyr, who, with her body lacerated, her breast cut off, and her liver torn out, was still kept alive and locked in prison, until her ulcerated body should rot.
          At Palencia, Saint Turibius, Bishop of Astorga, who, with the help of Pope Saint Leo, utterly drove the Priscillianist heresy out of Spain and was renowned for miracles.
  psalm.sextod-cimo-kal-ndas-nov-mbris-0f7a1cb8fa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy widow Iadwiga, Grand Princess of Poland, who fell asleep in the Lord upon the 15th day of this present month of October.
          Upon the same 17th day of October, were born into the better life:
          At Antioch, the holy martyr Heron, a disciple of blessed Ignatius, after whom he was made Bishop of that city. He followed in all godliness in the steps of his master, and for the love of Christ laid down his life for the sheep committed to his care.
          Upon the same day, (in the persecution under the Emperor Diocletian,) the holy martyrs Victor, Alexander, and Marian.
          In Persia, (in the fifth century,) the holy martyr Mamelta. She was turned to the faith from the worshipping of idols by a warning from an angel, was stoned by the Gentiles, and drowned in the depths of a lake.
          At Constantinople, the holy monk Andrew of Crete. He was often beaten under the Emperor Constantine Copronymus for his honouring of holy images, and at length, after one of his feet had been cut off, he gave up the ghost.
          At Orange, in Gaul, (in the sixth century,) holy Florentine, Bishop (of that see,) who was famous for many graces, and fell asleep in the Lord.
          At Capua, (in the same sixth century,) holy Victor, Bishop (of that see,) famous for his learning and holiness.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Novémbris

          Parédii, in diœscési Augustodunénsi, sanctæ Margarítæ Maríæ Alacóque, quæ, Ordinem Visitatiónis beátæ Maríæ Vírginis proféssa, exímiis in devotióne erga sacratíssimum Cor Iesu propagánda et público eiúsdem cultu provehéndo méritis excélluit; atque in sanctárum Vírginum album a Benedícto Papa Décimo quinto reláta fuit.
          Antiochíæ natális sancti Herónis, qui fuit discípulus beáti Ignátii; atque, post eum factus Epíscopus, viam magístri pius imitátor est secútus, et pro commendáto sibi grege amátor Christi occúbuit.
          Eódem die pássio sanctórum Victóris, Alexándri et Mariáni.
          In Pérside sanctæ Maméltæ Mártyris, quæ, a cultu idolórum ad fidem Angélico mónitu convérsa, a Gentílibus lapidáta est et in profúndum lacum demérsa.
          Aráusicæ, in Gálliis, sancti Floréntii Epíscopi, qui, multis clarus virtútibus, quiévit in pace.
      en2:
      - type: text
        text: |-
          The Seventeenth of October
      
          At Paray-le-Monial, in the diocese of Autun, Saint Margaret Mary Alacoque, who professed the Order of the Visitation of the Blessed Virgin Mary and was outstanding in devotion to the Most Sacred Heart of Jesus; who was enrolled in the number of the Saints by Benedict XV, Supreme Pontiff.
          At Córdoba, in Spain, Saint Columba, Virgin and Martyr; who, in the persecution under Eulalius, freely came forward to profess the faith and, when she had steadfastly persevered in her confession, was beheaded and attained the palm of martyrdom.
          Romæ sancti Hedisti, Mártyris.
  psalm.sextod-cimo-kal-ndas-oct-bris-86b1d292aa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy martyrs Cornelius, Pope of Rome, and Cyprian, Bishop of Carthage, of whose birth into the better life mention hath been made upon the 14th day of this present month of September.
          Upon the same 16th day of September, were born into the better life:

          At Chalcedon, the holy Virgin and martyr Euphemia. Under the Emperor Diocletian and the Proconsul Priscus, she overcame for Christ's sake torture, imprisonment, stripes, wheels, fire, stones, beasts, rods, sharp saws, and hot metal. When she was again cast to the beasts in the theatre, she prayed the Lord to take her spirit to Himself, and then one of them bit her sacred body, while the rest licked her feet, and she resigned her soul without spot to God.
          At Rome, the holy martyrs Lucy, a noble matron, and Geminian, whom the Emperor Diocletian, after they had suffered grievously and long been tormented, and had thus gained a noble victory by martyrdom, commanded to be slain with the sword.
          Likewise at Rome, upon the Flaminian Way, the holy martyrs Abundius the Priest and Abundantius the Deacon, whom the Emperor Diocletian commanded to be beheaded at the tenth milestone from the city, along with the eminent Marcian, and John, the son of Marcian, whom they had raised from the dead.
          At Heraclea, in Thrace, the holy martyr Sebastiana, who was led to believe in Christ by the blessed Apostle Paul. Under the Emperor Domitian and the President Sergius she was diversely tried and at last slain with the sword.
          At Cordova, (in the ninth century,) the holy martyrs Rogellus and ServusDei, who had their hands and feet cut off and were at last beheaded.
          In Scotland, the holy Confessor Ninian, Bishop (of Galloway, whose feast we keep upon the 25th day of this present month of September.)
          In England, (in the tenth century,) the holy Virgin Edith, daughter of Edgar, King of the English, who was dedicated to God from a child in the Monastery (of the Order of St. Benedict, at Wilton,) and knew not the world, rather then forsook it.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Octóbris

          Sanctórum Mártyrum Cornélii Pape, et Cypriáni, Carthaginénsis Epíscopi, quorum memória décimo octávo Kaléndas Octóbris recólitur.
          Chalcedóne natális sanctæ Euphémiæ, Vírginis et Mártyris; quæ, sub Diocletiáno Imperatóre et Prisco Procónsule, torménta, cárceres, vérbera, arguménta rotárum, ignes, póndera lápidum, béstias, plagas virgárum, serras acútas, sartágines ignítas pro Christo superávit. Sed, rursus in theátrum ad béstias ducta, ibi, cum orásset ad Dóminum ut iam spíritum suum suscíperet, una ex iis morsum sancto córpori infigénte, céteris pedes eius lambéntibus, immaculátum spíritum Deo réddidit.
          Romæ sanctórum Mártyrum Lúciæ, nóbilis matrónæ, et Geminiáni; quos ambos Diocletiánus Imperátor, pœnis gravíssimis afflíctos diúque tortos, tandem, post laudábilem martýrii victóriam, gládio animadvérti præcépit.
          Natális sancti Martíni Primi, Papæ et Mártyris, qui, cum Sérgium ac Paulum et Pyrrhum hæréticos, Romæ coácta Sýnodo, condemnásset, ídeo, iussu Constántis, Imperatóris hærétici, per fraudem captus et Constantinópolim perdúctus, in Chersonésum relegátus est, ibíque, ob cathólicam fidem ærúmnis conféctus, vitam finívit, multísque miráculis cláruit. Eius corpus, póstea Romam translátum, in Ecclésia sanctórum Silvéstri et Martíni cónditum fuit. Ipsíus tamen festívitas prídie Idus Novémbris celebrátur.
          Romæ item natális sanctæ Cæcíliæ, Vírginis et Mártyris, quæ sponsum suum Valeriánum et fratrem eius Tibúrtium ad credéndum in Christum perdúxit, et ad martýrium incitávit. Hanc Almáchius, Urbis Præféctus, post eórum martýrium tenéri, atque illústri passióne, post ignem superátum, fecit gládio consummári, témpore Marci Aurélii Sevéri Alexándri Imperatóris. Eius vero festum recólitur décimo Kaléndas Decémbris.
          Heracléæ, in Thrácia, sanctæ Sebastiánæ Mártyris, quæ a beáto Paulo Apóstolo ad Christi fidem est perdúcta; atque, sub Domitiáno Imperatóre et Sérgio Prǽside, váriis modis tentáta, gládio tandem cæsa est.
          Romæ, via Flamínia, sanctórum Mártyrum Abúndii Presbýteri, et Abundántii Diáconi, quos Diocletiánus Imperátor, una cum illústri viro Marciáno et eius fílio Ioánne, quem illi a mórtuis suscitáverant, gládio feríri iussit, décimo ab Urbe lápide.
          Córdubæ, in Hispánia, sanctórum Mártyrum Rogélli et Servidéi, qui, mánibus pedibúsque abscíssis, ad últimum decolláti sunt.
          Apud Cándidam Casam, in Scótia, sancti Niniáni, Epíscopi et Confessóris.
          In Anglia sanctæ Edíthæ Vírginis, Regis Anglórum Edgári fíliæ, quæ, in monastério a tenéris annis Deo dicáta, sǽculum hoc ignorávit pótius quam relíquit.
          In monte Cassíno Beáti Victóris Papæ Tértii, qui, sancti Gregórii Séptimi succéssor, Apostólicam Sedem novo splendóre illustrávit, insígnem de Saracénis triúmphum divína ope consecútus. Cultum, ab immemorábili témpore eídem exhíbitum, Leo Décimus tértius, Póntifex Máximus, ratum hábuit et confirmávit.
      en2:
      - type: text
        text: |-
          The Sixteenth of September
      
          The holy Martyrs Cornelius the Pope and Cyprian, Bishop of Carthage, whose memory is kept on the eighteenth day before the Kalends of October.
          At Chalcedon, the birth of Saint Euphemia, Virgin and Martyr; who, under the Emperor Diocletian, for the confession of the faith was subjected to various torments, and was finally given to wild beasts and thus completed her martyrdom. Her body, enclosed in a silver vessel, was there kept with great veneration. Afterward, the holy universal Council of Chalcedon was celebrated in her basilica, in which the faith was defined against the Eutychian heresy, and so this holy martyr became, as it were, the guardian of the true faith.
          The holy Cornelius the Centurion, who was baptized by the Apostle Peter, as blessed Luke relates in the Acts of the Apostles.
          In Africa, the holy Martyrs Rogatus and Successus, with four others.
          At Béziers, in Gaul, Saint Aphrodisius the Martyr.
  psalm.sextod-cimo-kal-ndas-sept-mbris-03bfa0819c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is the Octave of the holy martyr Lawrence.
          Upon the same 17th day of August, were born into the better life:

          At Carthage, in Africa, [in the year 483,] the holy martyrs Liberatus the Abbot, Boniface the Deacon, Servus and Rusticus the Sub-Deacons, the monks Rogatus and Septimus, and the boy Maximus. In the persecution by the Vandals under King Hunneric, they were put to diverse and unheard-of tortures, on account of their confession of the Catholic faith and their defence of one baptism at last they were nailed to the wood upon which they were to be burnt, and the fire was several times kindled but by the power of God always extinguished. Then the king commanded to beat in their heads with the handles of oars, and so they finished the lovely course of their fight, and were crowned by the Lord.
          At Caesarea, in Cappadocia, [about the year 273,] the holy martyr Mamas, who endured one long martyrdom from his childhood to his old age, and at last happily finished it under the President Alexander in the reign of the Emperor Aurelian. The holy fathers Basil and Gregory of Nazianzus highly extol him.
          In Achaia, [in the Peloponnesus, about the year 253,] the holy martyr Myron, a Priest, who was beheaded at Cyzicus, [in Asia Minor,] after many torments, under the President Antipater, in the time of the Emperor Decius.
          At Nicomedia, [in the year 303,] the holy martyrs Straton, Philip, and Eutychian. They were condemned to the beasts, but as these left them unhurt they finished their testimony by fire.
          At Terni, [in Spoleto, in the sixth century,] the holy Confessor Anastasius, Bishop [of that see.]
          At Ptolemais, in Palestine, [about the year 260,] the holy martyrs Paul and Juliana his sister, who suffered under the Emperor Valerian.
      la:
      - type: text
        text: |-
          Sextodécimo Kaléndas Septémbris

          Sancti Hyacínthi, ex Ordine Prædicatórum, Confessóris, qui décimo octávo Kaléndas Septémbris obdormívit in Dómino.
          Carthágine sanctórum Mártyrum Liberáti Abbátis, Bonifátii Diáconi, Servi et Rústici Subdiaconórum, Rogáti et Séptimi Monachórum, et Máximi púeri; qui, in persecutióne Wandálica, sub Hunneríco Rege, pro confessióne cathólicæ fídei et pro unici Baptismátis defensióne, váriis et inaudítis supplíciis exagitáti, demum super ligna, quibus concremándi erant, clavis confíxi, et, cum ignis sǽpius accénsus fuísset ac divínitus semper exstínctus, Regis iussu remórum véctibus percússi, et, comminútis cérebris, enecáti, speciósum cursum certáminis sui, coronánte Dómino, perfecérunt.
          In Acháia sancti Myrónis, Presbýteri et Mártyris, qui, sub Décio Imperatóre et Antípatre Prǽside, Cýzici, post multa torménta, cápite truncátus est.
          Cæsaréæ, in Cappadócia, natális sancti Mamántis Mártyris, qui, sanctórum Theódoti et Rufínæ Mártyrum fílius, longum a puerítia ad senectútem usque martýrium duxit, et tandem, imperánte Aureliáno, sub Alexándro Prǽside, illud felíciter consummávit; quem sancti Patres Basilíus et Gregórius Nazianzénus summis láudibus celebrárunt.
          Nicomedíæ sanctórum Mártyrum Stratónis, Philíppi et Eutychiáni; qui, damnáti ad béstias et nil læsi, per ignem martýrium consummárunt.
          Ptolemáide, in Palæstína, pássio sanctórum Mártyrum Pauli, eiúsque soróris Iuliánæ Vírginis; qui ambo, sub Aureliáno Imperatóre, cum in Christi confessióne permanérent immóbiles, iussi sunt váriis et diríssimis torméntis afflígi ac tandem cápite obtruncári.
          Romæ sancti Eusébii Papæ.
          Interámnæ sancti Anastásii, Epíscopi et Confessóris.
          In Monte Falco, in Umbria, sanctæ Claræ, Moniális ex Ordine Eremitárum sancti Augustíni, Vírginis; in cuius viscéribus renováta Domínicæ passiónis mystéria fidéles, máxima cum devotióne, venerántur. Eam Leo Décimus tértius, Summus Póntifex, sanctárum Vírginum albo adscrípsit.
      en2:
      - type: text
        text: |-
          The Eighteenth of August
      
          Saint Hyacinth, of the Order of Preachers, Confessor, who fell asleep in the Lord on the eighteenth day before the Kalends of September.
          At Carthage, the holy Martyrs Liberatus the Abbot, Boniface the Deacon, Servus and Rusticus the Monks, Rogatus and Septimus the children, and Maximus the boy; who, in the Vandal persecution, refusing to be rebaptized by the Arians, endured diverse torments, and were finally beaten with oars and burned by fire.
  psalm.t-rtio-idus-apr-lis-74c38e5369:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 11 th day of April, were born into the better life:

          At Rome, [in the year 461,] the holy Confessor, Pope Leo I, who on account of his eminent worthiness is called the Great. In his times was held the holy Council of Chalcedon, wherein, through his legates, he condemned Eutyches, and whereof by his authority he confirmed the decrees. He ordained many things, wrote excellently, deserved well of the holy Church of God, as a good shepherd over all the Lord's flock, and fell asleep in peace.
          At Pergamos, in Asia, holy Antipas, "the faithful witness," of whom holy John doth make mention in his Revelation. Under the Emperor Domitian he was thrust into the inside of a brazen bull heated red hot, and so finished his testimony.
          At Salona, in Dalmatia, the holy martyrs Domnion, Bishop [of that city, who was converted by St Peter and sent thither,] and eight soldiers.
          At Gortyna, in Crete, [about the year 180,] holy Philip, Bishop of that see, very famous for his life and teaching. He governed the church committed unto him in the times of the Emperors Marcus Antoninus Verus and Lucius Aurelius Commodus, and shielded it from the rage of the Gentiles and the wiles of the heretics.
          At Nicomedia, [under Diocletian,] the holy Priest Eustorgius.
          At Spoleto, [in the year 554,] the holy Confessor Isaac the monk, whose graces have been recorded by holy Pope Gregory.
          At Gaza, in Palestine, under the Emperor Justinian, the holy Hermit Barsanuph.
      la:
      - type: text
        text: |-
          Tértio Idus Aprílis

          Sancti Leónis Papæ Primi, cognoménto Magni, Confessóris et Ecclésiæ Doctóris, cuius dies natális recólitur quarto Idus Novémbris.
          Pérgami, in Asia, sancti Antípæ, testis fidélis, cuius méminit sanctus Ioánnes in Apocalýpsi. Ipse autem Antípas, sub Domitiáno Imperatóre, in bovem ǽneum candéntem coniéctus, martýrium consummávit.
          Salónæ, in Dalmátia, sanctórum Mártyrum Domniónis Epíscopi, cum milítibus octo.
          Gortýnæ, in Creta, sancti Philíppi Epíscopi, vita et doctrína claríssimi, qui, tempóribus Marci Antoníni Veri et Lúcii Aurélii Cómmodi, Ecclésiam sibi créditam regens, a furóre Gentílium et ab hæreticórum insídiis eándem tutátus est.
          Nicomedíæ sancti Eustórgii Presbýteri.
          Spoléti sancti Isaac, Mónachi et Confessóris, cuius virtútes sanctus Gregórius Papa commémorat.
          Apud Gazam, in Palæstína, sancti Barsanúphii Anachorétæ, sub Iustiniáno Imperatóre.
          Lucæ, in Etrúria, sanctæ Gemmæ Galgáni, Vírginis, contemplatióne Domínicæ Passiónis et vitæ sanctitáte mirábilis, quam Pius Papa Duodécimus in Sanctárum númerum rétulit.
      en2:
      - type: text
        text: |-
          The Eleventh of April
      
          Saint Leo I the Pope, surnamed the Great, Confessor and Doctor of the Church, whose birth is kept on the fourth of the Ides of November.
          At Pergamon, in Asia, Saint Antipas, the faithful witness, who, under the Emperor Domitian, was burned alive in a bronze bull.
          At Parenzo, in Istria, Saint Euphrasius the Bishop, who, in the persecution of Diocletian, was beheaded.
          At Braga, in Lusitania, the holy Martyrs Eusebius, Zosimus, and Nestor.
          At Rome, the holy Martyrs Philemon the Reader, Apollonius, Arianus, and Theoticus; who, under the Emperor Diocletian, were bound together and cast into the sea.
          In Africa, Saint Barsanuphius the Abbot, renowned for holiness.
  psalm.t-rtio-idus-aug-sti-bb9a5f814d:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 11th day of August, were born into the better life:

          At Rome, [in the year 286,] between the two Laurel trees, the holy martyr Tiburtius. In the persecution under the Emperor Diocletian the judge Fabian caused him to walk with bare feet upon burning coals, and as he confessed Christ all the more firmly, commanded him to be led to the third mile-stone outside the city, and there beheaded.
          Likewise at Rome, [in the year 295,] the holy Virgin Susanna, a damsel of noble birth, a niece to blessed Pope Caius. She was beheaded in the time of the Emperor Diocletian, and so gained the palm of martyrdom.
          At Comana, in Pontus, [in the year 250,] holy Alexander, Bishop of that city, surnamed the charcoal-burner. He was a most learned philosopher, who learnt to be eminent for humility as a Christian. He was raised by holy Gregory the wonder-worker to fill that see, and was illustrious not only for his preaching but because he suffered martyrdom by fire.
          Upon the same day, under the Emperor Maximinus, [in the fourth century,] the holy martyr Rufinus, Bishop of the Marsi, and his Companions.
          At Évreux, [in the fifth century,] the holy Confessor Taurinus, who was ordained [first] Bishop of that city by blessed Pope Clement. He spread the Christian faith by his preaching of the gospel, and after much labour for that end fell asleep in the Lord, famous for miracles.
          At Cambrai, in Gaul, [in the year 614,] the holy Confessor Gaugeric [St. Géry], Bishop of that see.
          In the province of Valeria, on the Danube, [about the year 540,] the holy Abbot Equitius, whose holiness is attested by the witness of blessed Pope Gregory.
          At Todi, the holy Virgin Digna.
      la:
      - type: text
        text: |-
          Tértio Idus Augústi

          Romæ, inter duas Lauros, natális sancti Tiburtii Mártyris, qui, sub Iúdice Fabiáno, in persecutióne Diocletiáni, cum Christum, nudis plantis super carbónes ardéntes ingréssus, maióri confiterétur constántia, duci in tértium ab Urbe milliárium atque ibídem gládio animadvérti iubétur.
          Item Romæ sanctæ Susánnæ Vírginis, quæ, cum ex nóbili prosápia esset orta et beáti Caii Pontíficis neptis, martýrii palmam, témpore Diocletiáni, cápitis obtruncatióne proméruit.
          Assísii, in Umbria, natális sanctæ Claræ Vírginis, primæ plantæ Páuperum Dominárum Ordinis Minórum; quam, vita et miráculis célebrem, Alexánder Papa Quartus in númerum sanctárum Vírginum rétulit. Ipsíus tamen festum sequénti die celebrátur.
          Cománæ, in Ponto, sancti Alexándri Epíscopi, cognoménto Carbonárii, qui, ex philósopho disertíssimo eminéntem Christiánæ humilitátis sciéntiam adéptus, et a sancto Gregório Thaumatúrgo in thronum illíus Ecclésiæ sublimátus, non solum prædicatióne, sed étiam consummáto per ignem martýrio fuit illústris.
          Eódem die pássio sanctórum Rufíni, Marsórum Epíscopi, et Sociórum eius, sub Maximíno Imperatóre.
          Apud Ebroicénses, in Gállia, sancti Tauríni Epíscopi, qui, a beáto Cleménte Papa ordinátus illíus civitátis Epíscopus, Evangélii prædicatióne Christiánam fidem propagávit, ac, multis pro ea suscéptis labóribus, miraculórum glória conspícuus obdormívit in Dómino.
          Cameráci, in Gállia, sancti Gaugeríci, Epíscopi et Confessóris.
          In província Valériæ sancti Equítii Abbátis, cuius sánctitas testimónio beáti Gregórii Papæ comprobátur.
          Tudérti, in Umbria, sanctæ Dignæ Vírginis.
      en2:
      - type: text
        text: |-
          The Eleventh of August
      
          At Rome, between the two laurels, the birth of Saint Tiburtius the Martyr, who, under the governor Fabianus in the persecution of Diocletian, when he entered upon burning coals with bare feet, magnified Christ who refreshed him, and was beheaded as a martyr.
          At Chalcedon, the birth of Saint Susanna, Virgin and Martyr; of whom it is written that, after many bitter torments, she was beheaded by the sword under the Emperor Diocletian.
          Comemoration of the holy Martyrs Donat and Hilarianus, with twelve Companions, in Africa.
          At Paris, the birth of Saint Alexander, formerly a servant of Saint Susanna, who, after enduring many torments for the faith of Christ, was beheaded.
          Romæ sancti Diógenis Mártyris.
  psalm.t-rtio-idus-dec-mbris-f2943a392a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 11th day of December, were born into the better life:

          At Rome, the holy Confessor Pope Damasus (of Spain), who condemned the arch-heretic Apollinaris, and restored to his papacy Peter, Pope of Alexandria, who had been driven into exile moreover, he found the bodies of many holy martyrs, and caused to be engraved upon their tombstones verses composed by himself. (He died in the year 384.) Likewise at Rome, the holy martyr Thrason, who fed at his own expense Christians who were in prison or sent to work in the baths, or at other public works. He was arrested by order of the Emperor Maximian, and crowned with martyrdom along with two others named Pontian and Pretextatus, (about the year 293.)
          At Amiens, under the same Emperor Maximian, the holy martyrs Victoricus and Fuscian. Rictiovarus the President had iron spikes driven into their nostrils and ears, and redhot nails hammered into their temples after which their eyes were torn out, their bodies pierced with darts, and their heads cut off, and so they and holy Gentian, their host, passed away to be for ever with the Lord, (in the year 303.)
          (At Astrahara, near Persepolis,) in Persia, the holy martyr Barsabas, (with ten monks, whose Abbot he was, in the year 342, at the beginning of the great persecution under Sapor II.)
          In Spain, the holy martyr Eutychius.
          At Piacenza, holy Sabinus, Bishop of that see, (in the fourth century,) famous for miracles.
          At Constantinople, (about the year 489,) holy Daniel the Stylite.
      la:
      - type: text
        text: |-
          Tértio Idus Decémbris

          Romæ sancti Dámasi Primi, Papæ et Confessóris; qui Apollinárem hæresiárcham damnávit, et Petrum, Epíscopum Alexandrínum, fugátum restítuit; multa étiam sanctórum Mártyrum córpora invénit, eorúmque memórias vérsibus exornávit.
          Item Romæ pássio sancti Trasónis, qui, cum Christiános laborántes in thermis, aliísque opéribus públicis fatigátos, et in cárcere pósitos, de suis facultátibus áleret, iussu Maximiáni tentus est, et cum áliis duóbus, id est Pontiáno et Prætextáto, martýrio coronátus.
          Ambiáni, in Gállia, sanctórum Mártyrum Victórici et Fusciáni, sub eódem Imperatóre, in quorum náribus et áuribus iussit Rictiovárus Præses immítti tarínchas, et clavis ardéntibus témpora transfígi, deínde óculos evélli, ac póstmodum eórum córpora iaculári; sicque, una cum sancto Gentiáno, eórum hóspite, capítibus amputátis, migravérunt ad Dóminum.
          In Pérside sancti Bársabæ Mártyris.
          In Hispánia sancti Eutýchii Mártyris.
          Placéntiæ sancti Sabíni Epíscopi, miráculis clari.
          Constantinópoli sancti Daniélis Stylítæ.
      en2:
      - type: text
        text: |-
          The Eleventh of December
      
          At Rome, Saint Damasus I, Pope and Confessor; who condemned the heresiarch Apollinaris, restored Peter, Bishop of Alexandria who had been driven away, transferred many bodies of holy Martyrs, and restored and adorned their tombs with most elegant inscriptions.
          At Autun, in Gaul, the holy Martyrs Fuscian, Victoricus, and Gentian; who, in the time of Diocletian, when they wished to bring the Gospel to the Morini, were seized in a hospice and kept in custody; and the next day, after many torments, were beheaded.
          At Constantinople, Saint Daniel the Stylite, Confessor, who, standing in prayer upon a pillar for thirty-three years, was a wondrous example of penance.
          At Todi, in Umbria, the passing of blessed Jacopone, who, professing the Third Order of Saint Francis, composed remarkable poems in honor of Christ and his most holy Mother.
  psalm.t-rtio-idus-febru-rii-81c85d5997:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Gilbert, founder of the Order of Sempringham, of whom mention hath been made upon the 4th day of this present month of February. Likewise on the morrow we keep the feast of the Seven holy Founders of the Order of Servants of the Blessed Virgin Mary, who after great hardship of life, famous for works and wonders, died a death precious in the sight of the Lord, upon Monte Senario, in Tuscany. The same spirit of brotherhood had made them one in life, the veneration of the people had not divided them in death, and Leo XIII enrolled their names together among those of the Saints.
          Upon the same 11th day of February, were born into the better life:

          In Africa, [in the year 304,] the holy martyrs the Priest Saturninus, Dativus, Felix, Ampelius, and their Companions, who were taken by the soldiers in the persecution under the Emperor Diocletian when they came together in one, as the use is, to hold the Lord's Supper, and suffered under the proconsul Anolinus.
          In Numidia are commemorated many holy martyrs who were arrested, [in the year 303 or 304,] in the persecution aforesaid, and for as much as they would not obey the edict of the Emperor to give up the Scriptures of God, they were put to grievous torments and slain.
          At Adrianople, the holy martyrs Lucius, Bishop [of Adrianople,] and his Companions. He suffered much from the Arians under the Emperor Constantius, and finished his testimony in chains, [in the year 348.] The others were some of the nobler of the citizens who were condemned to death by Count Philagrius because they refused to receive the Arians who had been then condemned in the Council of Sardica.
          At Lyon, [in the year 608,] the holy martyr Desiderius, Bishop of Vienne, [in Gaul.]
          At Ravenna, [about the year 170,] the holy Confessor Calocerus, Bishop of that see.
          At Milan, [in the year 449,] the holy Lazarus, Bishop of that see.
          At Capua, [in the year 450,] holy Castrensis, Bishop of that see.
          At the village of Landon, [in the year 507,] holy Severinus, Abbot of the monastery of St Maurice, at whose prayers the servant of God, King Clovis, was healed of a long malady.
          In Egypt, [about the middle of the fourth century,] the holy monk Jonah, renowned for his graces.
      la:
      - type: text
        text: |-
          Tértio Idus Februárii

          Lapúrdi, in Gállia, Apparítio beátæ Maríæ Vírginis Immaculátæ.
          Hadrianópoli, in Thrácia, sanctórum Mártyrum Lúcii Epíscopi, et Sociórum eius, sub Constántio. Ipse Lúcius, ab Ariánis multa perpéssus, in vínculis martýrium consummávit; céteri vero nobilióres cívium, cum Ariános, in Sardicénsi Concílio tunc damnátos, recípere noluíssent, a Philágrio Cómite capitálem senténtiam excepérunt.
          In Africa natális sanctórum Mártyrum Saturníni Presbýteri, Datívi, Felícis, Ampélii et Sociórum, qui, in persecutióne Diocletiáni, cum ad Domínicum ex more celebrándum conveníssent, idcírco, a milítibus comprehénsi, sub Anolíno Procónsule passi sunt.
          In Numídia commemorátio plurimórum sanctórum Mártyrum, qui in eádem persecutióne comprehénsi sunt, et, cum iuxta Imperatóris edíctum divínas Scriptúras trádere noluíssent, gravíssimis excruciáti sunt supplíciis, ac tandem occísi.
          Romæ sancti Gregórii Papæ Secúndi, qui Leónis Isaúrici impietáti acérrime réstitit, et sanctum Bonifátium ad prædicándum Evangélium in Germániam misit.
          Item Romæ sancti Paschális Papæ Primi, qui plúrima sanctórum Mártyrum córpora levávit e cryptis, eáque in divérsis Urbis Ecclésiis honorífice collocávit.
          Ravénnæ sancti Calóceri, Epíscopi et Confessóris.
          Medioláni sancti Lázari Epíscopi.
          Cápuæ sancti Castrénsis Epíscopi.
          In Castro Nantoniénsi, in Gállia, sancti Severíni, qui fuit Abbas monastérii Agaunénsis, suísque précibus cultórem Dei, Regem Clodovéum, a diútina infirmitáte liberávit.
          In Ægýpto sancti Ionæ Mónachi, virtútibus clari.
          Viénnæ, in Gállia, Translátio córporis sancti Desidérii, Epíscopi et Mártyris, ex território Lugdunénsi, in quo ipse olim passus fúerat décimo Kaléndas Iúnii.
      en2:
      - type: text
        text: |-
          The Eleventh of February
      
          At Lourdes, in France, the Apparition of the Blessed Immaculate Virgin Mary.
          At Adrianopolis, in Thrace, the holy Martyrs Lucius the Bishop and his Companions, under Constantius. Lucius himself, expelled by the Arians from his church, was received at Alexandria by Saint Athanasius, and, when Athanasius was driven away, returned to his church; and after enduring many things for the Catholic faith, he died in the Lord.
          At Lucca, in Tuscany, the birth of Saint Alexander the Bishop, who, in the time of Diocletian, for the confession of Christ was subjected to many torments, and finally crowned with martyrdom.
          At Fossombrone, in Picenum, the holy Martyrs Satur, Castulus, Magnus, and Lucius.
          At Soissons, in Gaul, Saint Severinus the Priest.
          At Tivoli, the holy Martyrs Saturninus and Castulus.
  psalm.t-rtio-idus-i-lii-221b1b92a6:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 13th day of July, were born into the better life:

          At Rome, the holy martyr Pope Anaclete, who governed the Church of God after holy Clement, and adorned the same with a glorious testimony, [in the year 91 or 96.]
          On the same day, the holy Prophets Joel and Ezra, [two of the twelve minor Prophets, in the seventh and fifth centuries, B.C.]
          In Macedonia, blessed Silas, who was one of the first of the Brethren, and was sent by the Apostles to the churches of the Gentiles along with Paul and Barnabas. He was full of the grace of God, earnestly discharged his duty of preaching, and when he had glorified Christ in his sufferings, afterwards fell asleep. Also the holy martyr Serapion, who under the Emperor Severus and the President Aquila attained through fire unto the crown of martyrdom.
          In the island of Chios, the holy martyr Myropis, who under the Emperor Decius and the President Numerian was broken with bars, and so passed away to be with the Lord.
          In Africa, the holy Confessors Eugenius, Bishop of Carthage, glorious for faith and good works, and all the Clergy of that church, to the number of five hundred or more, [in the year 505,] in the persecution of the Vandals, under the Arian King Hunneric, suffered stripes and hunger among whom were very many Readers that were little children and were driven into cruel exile but rejoicing in the Lord. Among the noblest of them were the Archdeacon named Salutaris, and Murrita the second in the ministry, who became Confessors for the third time, and are illustrious for their glorious steadfastness unto Christ.
          In Brittany, the holy Confessor Turiaf, Bishop [of the ancient see of Dol,] a man of marvellous simplicity and innocency, [in the year 749.]
      la:
      - type: text
        text: |-
          Tértio Idus Iúlii

          Bambérgæ natális sancti Henríci Primi, Imperatóris Romanórum et Confessóris, qui cum sancta Cunegúnde, uxóre sua, perpétuam virginitátem servávit, et sanctum Stéphanum, Hungarórum Regem, cum univérso fere ipsíus regno, ad fidem Christi suscipiéndam perdúxit. Eius autem festívitas Idibus mensis huius celebrátur.
          In Palæstína sanctórum Ioélis et Esdræ Prophetárum.
          In Macedónia beáti Silæ, qui, cum esset unus de primis frátribus et ab Apóstolis ad Ecclésias Géntium, una cum Paulo et Bárnaba, destinátus, prædicatiónis offícium, grátia Dei plenus, instánter consummávit, atque, in passiónibus suis Christum claríficans, póstmodum requiévit.
          Item sancti Serapiónis Mártyris, qui, sub Sevéro Imperatóre et Aquila Prǽside, per ignem pervénit ad corónam martýrii.
          In ínsula Chio sanctæ Myrópis Mártyris, quæ sub Décio Imperatóre et Numeriáno Prǽside, véctibus contúsa, migrávit ad Dóminum.
          In Africa sanctórum Confessórum Eugénii, Carthaginénsis Epíscopi, fide ac virtútibus gloriósi, et univérsi cleri eiúsdem Ecclésiæ, qui fere quingénti, vel eo ámplius, in persecutióne Wandálica, sub Ariáno Rege Hunneríco, cæde inediáque maceráti (inter quos plúrimi erant Lectóres infántuli), gaudéntes in Dómino, exsílio crudéli procul extrúsi sunt. Erant étiam nobilíssimi in eis Archidiáconus, nómine Salutáris, et Murítta, secúndus in offício ministrórum; qui, tértio Confessóres effécti, ambo glorióse in Christo, perseverántiæ título, illustráti sunt.
          In Británnia minóre sancti Turiávi, Epíscopi et Confessóris, miræ simplicitátis et innocéntiæ viri.
      en2:
      - type: text
        text: |-
          The Eleventh of July
      
          At Bamberg, the birth of Saint Henry I, Emperor of the Romans and Confessor, who with his holy wife Cunegunda preserved perpetual virginity, strengthened the holy Stephen King of Hungary and his Christian realm with timely aid, and devoted himself completely to the spreading of the Christian faith; and was enrolled in the number of the Saints by Eugene III, Supreme Pontiff.
          At Metz, in Gaul, the holy Martyrs Abundantius and Abundantius.
          At Cordoba, in Spain, Saint Abundius the Priest, a glorious Martyr.
          At Rome, Saint Pius I, Pope and Martyr, of whom Saint Irenaeus and others write that he was of great merit and most illustrious.
  psalm.t-rtio-idus-i-nii-0d9bd7ea71:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 11th day of June, were born into the better life:

          The holy Apostle Barnabas. He was a Cypriot by birth, was by the disciples ordained an Apostle to the Gentiles along with Paul, and went through many countries with him doing that work of preaching the Gospel which had been laid upon them. In the end he went home to Cyprus, where he crowned the dignity of the Apostolate with the glory of martyrdom. Through a revelation from himself his body was discovered in the time of the Emperor Zeno, having with it a copy of the Gospel according to Matthew written with his own hand.
          At Aquileia, the holy brethren Felix and Fortunatus, both martyrs. In the persecution under Diocletian and Maximian they were hung upon the rack, and lighted lamps put to their sides, but these were extinguished by the power of God. Boiling oil was poured into their bellies, and at last, forasmuch as they still stood firm in confessing Christ, they were beheaded.
          At Bologna, [in the year 1267,] the holy Confessor Parisius, a monk of the Order of Camaldoli.
          At Rome is commemorated the translation of the body of holy Gregory of Nazianzus. This sacred body had been brought to Rome from Constantinople and had lain for a long time in the church of the Mother of God at the Campus Martius, when the Supreme Pontiff Gregory XIII, [in the year 1580,] removed it with great pomp to the chapel which he had splendidly decorated in the Basilica of St Peter, and there laid it under the altar with due honour.
      la:
      - type: text
        text: |-
          Tértio Idus Iúnii

          Salamínæ, in Cypro, natális sancti Bárnabæ Apóstoli, qui, natióne Cýprius, cum Paulo Géntium Apóstolus a discípulis ordinátus, multas regiónes cum eo peragrávit, iniúnctum sibi opus Evangélicæ prædicatiónis exércens; postrémo, Cyprum proféctus, ibi Apostolátum suum glorióso martýrio decorávit. Eius corpus, témpore Zenónis Imperatóris, ipso Bárnaba revelánte, repértum est, una cum códice Evangélii sancti Matthǽi, eiúsdem Bárnabæ manu descrípto.
          Salmánticæ, in Hispánia, item natális sancti Ioánnis a sancto Facúndo, ex Eremitárum sancti Augustíni Ordine, Confessóris; qui fídei zelo, sanctimónia vitæ ac miráculis cláruit. Ipsíus autem festívitas sequénti die celebrátur.
          Aquiléiæ pássio sanctórum Felícis et Fortunáti fratrum, qui, in persecutióne Diocletiáni et Maximiáni, equúleo suspénsi, atque, ardéntibus lampádibus circa eórum látera appósitis et mox divína virtúte exstínctis, per ventrem fervénti oleo sunt perfúsi; et ad últimum, cum in Christi confessióne persísterent, gloriósi certáminis cursum, obtruncáti cápite, implevérunt.
          Bremæ natális sancti Rembérti, Hamburgénsis ac Breménsis Epíscopi.
          Tarvísii sancti Parísii, civis Bononiénsis, Confessóris et Mónachi, ex Ordine Camaldulénsi.
          Romæ Translátio sancti Gregórii Nazianzéni, Epíscopi, Confessóris atque Ecclésiæ Doctóris; cuius sacrum corpus, e Constantinópoli ántea delátum ad Urbem, atque in Ecclésia sanctæ Dei Genitrícis ad Campum Mártium diu asservátum, Gregórius Décimus tértius, Póntifex Máximus, in Capéllam, a se in Basílica sancti Petri magnificentíssime exornátam, summa celebritáte tránstulit, ac postrídie digno honóre sub altári cóndidit.
      en2:
      - type: text
        text: |-
          The Eleventh of June
      
          At Salamis, in Cyprus, the birth of Saint Barnabas the Apostle, who, a Cypriot by birth, was ordained as Apostle to the Gentiles together with Paul by the disciples, traveled many regions with him, faithfully discharged the task entrusted to him, and finally was crowned with a glorious martyrdom.
          At Turin, in Piedmont, the holy Martyrs Felix and Fortunatus, brothers.
          At Rome, Saint Parisios the Confessor and Monk, who, as a young boy, committed himself to the direction of Saint Benedict, and under him devoted himself to every work of virtue.
          At Bologna, Saint Felicia, Virgin.
          At Metz, in Gaul, Saint Clodulfus the Bishop, son of Saint Arnulfus.
  psalm.t-rtio-idus-ianu-rii-0241a35085:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 11th day of January, were born into the better life:

          At Rome, the holy Pope Hyginus, who achieved martyrdom gloriously in the persecution under the Emperor Antonine.
          In Africa, (about the year 142,) the blessed martyr Salvius, upon whose feast-day holy Augustine preached to the people of Carthage.
          At Alexandria, the holy martyrs Peter, Severus, and Leucius.
          At Fermo, in Picenum, the holy martyr Alexander, Bishop (of that see.)
          At Amiens, the holy martyr Salvius, Bishop of that see, (in the beginning of the seventh century.)
          At Brindisi, the holy Confessor Leucius, Bishop of that see, (in the end of the second century.)
          At Marissa, in Cappadocia, the holy Abbot Theodosius, (head of all the monasteries of Palestine,) who suffered many things for the Catholic faith, but at length fell asleep in peace, (in the year 529.)
          In the Thebaid, (about the year 330,) the holy Abbot Palaemon, the teacher of holy Pachom.
          At Castel-Saint-Elie, (about the year 577,) hard by Mount Soracte, the holy monk Anastasius and his Companions, whom the Lord called to pass away unto Him.
          At Pavia, the holy virgin Honorata, (in the year 500.)
      la:
      - type: text
        text: |-
          Tértio Idus Ianuárii

          Romæ sancti Hygíni, Papæ et Mártyris; qui, in persecutióne Antoníni, glorióse martýrium consummávit.
          Item Romæ natális sancti Melchíadis, Papæ et Mártyris; qui multa, in persecutióne Maximiáni, passus est, atque, réddita Ecclésiæ pace, quiévit in Dómino. Ipsíus autem festívitas quarto Idus Decémbris celebrátur.
          Firmi, in Picéno, sancti Alexandrí, Epíscopi et Mártyris.
          Ambiáni, in Gállia, sancti Sálvii, Epíscopi et Mártyris.
          In Africa beáti Sálvii Mártyris, in cuius natáli sanctus Augustínus sermónem hábuit ad pópulum Carthaginénsem.
          Alexandríæ sanctórum Mártyrum Petri, Sevéri et Leúcii.
          Brundúsii sancti Leúcii, Epíscopi et Confessóris.
          In Iudǽa sancti Theodósii Cœnobiárchæ, in vico Cappadóciæ Magariásso nati; qui, multa passus pro fide cathólica, in pace tandem quiévit in eo monastério, quod ille super solitárium Hierosolymitánæ diœcésis montem exstrúxerat.
          In Thebáide sancti Palamónis Abbátis, qui fuit mágister sancti Pachómii.
          Suppentóniæ, apud montem Soráctem, sancti Anastásii Mónachi, et Sociórum; qui, divínitus vocáti, felíciter migravérunt ad Dóminum.
          Papíæ sanctæ Honorátæ Vírginis.
      en2:
      - type: text
        text: |-
          The Eleventh of January
      
          At Rome, Saint Hyginus, Pope and Martyr; who gloriously completed his martyrdom in the persecution of Antoninus.
          Also at Rome, the birth of Saint Miltiades, Pope and Martyr; who endured much in the persecution of Maximian, and afterward, peace being given to the Church by the Emperor Constantine, governed it with great prudence.
          In Egypt, Saint Theodisius the Martyr.
          In Africa, Saint Leucius the Bishop, who was a disciple of the Apostle and flourished in holiness and learning.
          In Campania, Saint Salvius the Bishop.
          At Nola, Saint Felix the Priest, surnamed of Nola, who, after suffering many things for the faith of Christ and redeeming many captives with his own money, passed through many contests and at last, worn out with labors, rested in the Lord.
  psalm.t-rtio-idus-m-rtii-23d9cdf6ba:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 13th day of March, were born into the better life:

          At Nicomedia, the holy martyrs Macedonius, Patricia his wife, and Modesta their daughter, [in the year 303]
          At Nice, the holy martyrs Theusetas and Horres his son, Theodora, Nymphodora, Mark, and Arabia, who were all delivered over to the flames for Christ's sake.
          At Eshman, in Egypt, the holy martyr Sabinus, who after suffering many things, was at length drowned in the Nile, [in the year 287. He is said to have been denounced by a beggar he maintained by his alms.]
          In Persia, the holy Virgin and martyr Christina.
          At Cordova, the holy martyrs Roderick the Priest and Salomon, [in the year 857.]
          At Constantinople, holy Nicephorus, Bishop of that see. He was a zealous upholder of the traditions of the Fathers, and for the honouring of holy images constantly withstood the Iconoclast Emperor Leo the Armenian, by whom he was sent into exile, where he suffered a lingering martyrdom for fourteen years, and then passed away to be ever with the Lord, [in the year 828.]
          At Camerino, the holy Confessor Ansovinus, Bishop of that see, [in the year 840.]
          In the Thebaid, the holy Virgin Euphrasia, [in the year 412.]
      la:
      - type: text
        text: |-
          Tértio Idus Mártii

          Córdubæ, in Hispánia, sanctórum Mártyrum Ruderíci Presbýteri, et Salomónis.
          Nicomedíæ natális sanctórum Mártyrum Macedónii, Patríciæ uxóris, et Modéstæ fíliæ.
          Nicǽæ, in Bithýnia, sanctórum Mártyrum Theusétæ, eiúsque fílii Horris, Theodóræ, Nymphodóræ, Marci et Arábiæ; qui omnes pro Christo igni tráditi sunt.
          Hermópoli, in Ægýpto, sancti Sabíni Mártyris, qui multa passus, tandem, proiéctus in flumen, martýrium consummávit.
          In Pérside sanctæ Christínæ, Vírginis et Mártyris.
          Apud Camerínum sancti Ansovíni, Epíscopi et Confessóris.
          In Thebáide deposítio sanctæ Euphrásiæ Vírginis.
          Constantinópoli Translátio sancti Nicéphori, Epíscopi eiúsdem urbis et Confessóris; cuius corpus e Proconnéso, Propóntidis ínsula, ubi ipse quarto Nonas Iúnii ob sanctárum Imáginum cultum exsul obíerat, Constantinópolim relátum est, atque a sancto illíus civitátis Epíscopo Methódio, honorífice in templo sanctórum Apostolórum sepúltum, hac ipsa recurrénte die, in qua olim idem Nicéphorus in exsílium fúerat deportátus.
      en2:
      - type: text
        text: |-
          The Eleventh of March
      
          At Córdoba, in Spain, the holy Martyrs Roderic the Priest and Solomon.
          At Nicomedia, the birth of the holy Martyrs Macedonia, her husband Patricius, and their daughter Modesta.
          At Nicaea, in Bithynia, Saint Pionius the Priest and Martyr, who, under the Emperor Decius, was seized while celebrating the anniversary of the passion of Saint Polycarp, and after enduring many torments was finally burned alive.
          In Gaul, Saint Vincentius the Martyr.
          At Compiègne, in Gaul, Saints Sophronius and Candida.
          In Sardinia, the holy Martyrs Heraclius, Paulus, and Secundilla.
          At Tours, in Gaul, Saint Gregory, Bishop and Confessor, who was illustrious for learning and holiness, and left outstanding works in writing.
  psalm.t-rtio-idus-maii-9c9401b6a3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Virgin Walburg, of whom mention is made upon the 1st day of May.
          Upon the same 13th day of May is kept at Rome the dedication of the church of St. Mary-of-the-Martyrs; this building was called the Pantheon or temple of All the gods, but the blessed Pope Boniface IV cleansed that old temple, and consecrated it in honour of the blessed Mary, always a Virgin, and of All Martyrs, in the time of the Emperor Phocas.
          On the same day, were born into the better life:

          At Constantinople, the blessed martyr Mucius, the Priest. Under the Emperor Diocletian and the Pro-Consul Laodicius, he was first tormented at Amphipolis with many pains and sufferings, on account of his confession of Christ, and afterwards brought to Byzantium, where he was beheaded.
          At Heraclea, the holy martyr Glyceria of Rome, who suffered under the Emperor Antoninus and the President Sabinus.
          At Alexandria are commemorated a great number of holy martyrs who were massacred by the Arians in the church of Theona, on account of the Catholic faith, [in the year 372.]
          At Utrecht, holy Servatius, Bishop of the Church of Tongres. His worthiness was strikingly set forth to all by this, that when everything round about was covered with snow in the winter time, his grave was never covered therewith until a Cathedral Church was built over it by the industry of the citizens.
          In Palestine, [in the year 558,] holy John, surnamed the Silent.
          At Valladolid, [in the year 1456,] the holy Confessor Peter Regalati, a Friar Minor, the restorer of the regular observance in the Convents of Spain. The Supreme Pontiff Benedict XIV enrolled his name with those of the Saints.
      la:
      - type: text
        text: |-
          Tértio Idus Maii

          Sancti Robérti Bellarmíno, e Societáte Iesu, Cardinális atque olim Epíscopi Capuáni, Confessóris et Ecclésiæ Doctóris, cuius dies natális décimo quinto Kaléndas Octóbris recensétur.
          Romæ Dedicátio Ecclésiæ sanctæ Maríæ ad Mártyres, quam beátus Bonifátius Papa Quartus, expurgáto deórum ómnium véteri fano, quod Pántheon vocabátur, in honórem beátæ semper Vírginis Maríæ et ómnium Mártyrum dedicávit, témpore Phocæ Imperatóris. Ipsíus vero Dedicatiónis ánnuam solemnitátem póstmodum Summus Póntifex Gregórius item Quartus ab univérsa Ecclésia, et in honórem quidem ómnium Sanctórum, Kaléndis Novémbris agéndam esse constítuit.
          Constantinópoli beáti Múcii, Presbýteri et Mártyris; qui, sub Diocletiáno Imperatóre et Laudício Procónsule, prius Amphípoli, in Macedónia, multis pœnis atque cruciátibus ob Christi confessiónem afflíctus, póstea, Byzántium usque perdúctus, capitáli senténtia occúbuit.
          Alexandríæ commemorátio plurimórum sanctórum Mártyrum, qui, ob fidem cathólicam, ab Ariánis in Ecclésia Theónæ occísi sunt.
          Heracléæ, in Thrácia, sanctæ Glycériæ, Mártyris Románæ, quæ, sub Antoníno Imperatóre et Sabíno Prǽside, cum fuísset plúrimis ac diris tentáta supplíciis et ab his divína ope incólumis evasísset, tandem feris est obiécta, earúmque una, morsum córpori ipsíus infigénte, spíritum Deo réddidit.
          Apud Traiéctum sancti Servátii, Tungrénsis Ecclésiæ Epíscopi; ad cuius méritum ómnibus demonstrándum, dum témpore híemis ómnia in circúitu nix repléret, sepúlcrum eius numquam opéruit, donec, ex indústria cívium, Basílica super illud ædificáta est.
          In Palæstína sancti Ioánnis Silentiárii, qui, Coloniénsi in Arménia Episcopátu dimísso, in sancti Sabbæ laura monásticam vitam duxit, et sancto fine quiévit.
          Pódii, in diœcési Pictaviénsi, sancti Andréæ Hubérti Fournet, Confessóris, olim párochi, Institúti Filiárum a Cruce una cum sancta Elísabeth Bichier des Ages Fundatóris, quem Pius Papa Undécimus Sanctórum fastis adscrípsit.
      en2:
      - type: text
        text: |-
          The Eleventh of May
      
          Saint Robert Bellarmine, of the Society of Jesus, Cardinal and former Bishop of Capua, Confessor and Doctor of the Church, whose birth is commemorated on the fifteenth day before the Kalends of October.
          At Aquileia, the holy Martyrs Fortunatus the Lector and Hermogoras; who, when brought before the governor Sebastianus, after being tortured in various ways, were beheaded.
          At Brescia, in Lombardy, the holy Martyrs Faustinus and Jovita, brothers, who, after severe torments endured for Christ, were condemned to death by the Emperor Hadrian and crowned with martyrdom.
          At Parenzo, in Istria, Saint Euphrasius the Bishop and Confessor.
          At Vercelli, Saint Theonestus the Bishop, who, hastening to Aquileia to help the holy Hermogoras the Bishop, when he arrived at Vercelli, was seized by the pagans and beheaded.
  psalm.t-rtio-idus-nov-mbris-28bfa41771:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 11th day of November, were born into the better life:

          At Tours, in Gaul, (in the year 397,) the blessed Confessor Martin, Bishop of that see. His life was remarkable for extraordinary miracles he raised three persons from the dead.
          At Cotyaeus, in Phrygia, the glorious passion of the holy Egyptian soldier Mennas. During the persecution under Diocletian he cast away his military belt, and served the King of Heaven in secret in the desert then he went forth, and freely declared himself to be a Christian. He was first examined with horrid tortures, then as he was kneeling in prayer, giving thanks to our Lord Jesus Christ, he was beheaded, (in the year 305.) After his death he was famous for many miracles.
          At Ravenna, the holy martyrs Valentine, Felician, and Victorine, who were crowned in the persecution under the Emperor Diocletian.
          In Mesopotamia, in the persecution under the same Diocletian and Eleusius the President, the holy martyr Athenodorus. He was tormented with fire and other torments, and then condemned to be beheaded but the executioner fell to the earth, and no other dared to smite him with the sword, and as he prayed he fell asleep in the Lord.
          At Lyon, the holy Bishop Veran, whose life was illustrious for his faith and other graces.
          In the monastery of Grotta-Ferrata, near Frascati, (in the year 1054,) the holy Abbot (of Grotta-Ferrata,) Bartholomew, a companion of blessed Nilus, and the writer of his life.
          In the province of Samnium, the blessed hermit, Mennas, whose graces and miracles are recorded by holy Pope Gregory.
      la:
      - type: text
        text: |-
          Tértio Idus Novémbris

          Turónis, in Gállia, natális beáti Martíni, Epíscopi et Confessóris; cuius vita tantis éxstitit miráculis gloriósa, ut trium mortuórum suscitátor esse merúerit.
          Cotyǽi, in Phrýgia, insígnis pássio sancti Mennæ, Ægýptii mílitis, qui, in persecutióne Diocletiáni, postquam, abiécto milítiæ cíngulo, méruit cælésti Regi secréta conversatióne in erémo militáre, procéssit in públicum, et, se Christiánum líbera voce declárans, primo diris cruciátibus examinátur; novíssime, fixis in oratióne génibus, Dómino Iesu Christo grátias agens, gládio cæsus est, ac multis post mortem miráculis cláruit.
          Ravénnæ sanctórum Mártyrum Valentíni, Feliciáni et Victoríni; qui in Diocletiáni persecutióne coronáti sunt.
          In Mesopotámia sancti Athenodóri Mártyris, qui, sub eódem Diocletiáno et Eléusio Prǽside, ígnibus cruciátus et áliis supplíciis tortus, demum cápitis damnátus est, et, cum cárnifex corruísset neque ullus álius gládio illum ferire ausus esset, orans obdormívit in Dómino.
          Lugdúni, in Gállia, sancti Veráni Epíscopi, cuius vita fuit fide et virtútum méritis illústris.
          Constantinópoli sancti Theodóri, Abbátis Studítæ, qui, pro fide cathólica advérsus Iconoclástas strénue pugnans, factus est apud univérsam Ecclésiam cathólicam célebris.
          In monastério Cryptæ Ferrátæ, in agro Tusculáno, sancti Bartholomǽi Abbátis, qui fuit sócius beáti Nili, eiúsque vitam conscrípsit.
          In província Sámnii beáti Mennæ solitárii, cuius virtútes et mirácula sanctus Gregórius Papa commémorat.
      en2:
      - type: text
        text: |-
          The Eleventh of November
      
          At Tours, in Gaul, the birth of blessed Martin, Bishop and Confessor; whose life was so glorious in miracles that he merited to be the raiser of three dead persons to life.
          At Cotiaeum, in Phrygia, the holy Martyrs Menas, Victor, and Vincent; who, under the Emperor Maximian, after enduring bitter torments, were killed with the sword.
          At Constantinople, Saint Menas the Bishop.
          At Rome, Saint Mennas the Martyr, an Egyptian, who after most bitter torments was beheaded.
          At Todi, in Umbria, Saint Fortunatus the Bishop.
          At Verona, Saint Aurelius the Bishop.
          In England, Saint Bertuin the Bishop.
  psalm.t-rtio-idus-oct-bris-58a58f5275:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Of holy Edward, King of England, who died upon the 5th day of January, but whose feast is kept upon the 13th day of October, which is that of the translation of his body.
          Upon the same 13th day of October, were born into the better life:

          At Troas, in Asia Minor, holy Carpus, the disciple of the blessed Apostle Paul.
          At Cordova, in Spain, (in the persecution under the Emperor Diocletian,) the holy martyrs Faustus, Januarius, and Martial, who were first racked, then had their eyebrows, ears, and noses cut off, and their teeth drawn, and at last completed their suffering martyrdom by fire.
          At Thessalonica, the holy martyr Florence, who was put to diverse tortures and then burnt.
          In Austria, (in the eleventh century,) the holy martyr Colman.
          At Ceuta, in Morocco, (in the year 1221,) seven holy martyrs belonging to the Order of Friars Minor namely, Daniel, Samuel, Angelo, Domnus, Leo, Nicolas, and Hugolin for their preaching of the Gospel and their confutation of the Mohammedan religion, the Saracens inflicted upon them insults, chains, and stripes, and then beheaded them and so they gained the palm of martyrdom.
          At Antioch, (towards the end of the second century,) the holy Patriarch Theophilus, the sixth after the blessed Apostle Peter, who held the bishopric of that church.
          At Tours, (in the fifth century,) the holy Confessor Venantius, Abbot (of St. Martin's Monastery.)
          At Subiaco, in Latium, the holy Virgin Chelidonia.
      la:
      - type: text
        text: |-
          Tértio Idus Octóbris

          Sancti Eduárdi, Regis Anglórum et Confessóris, qui Nonis Ianuárii obdormívit in Dómino, sed hac die, ob Translatiónem córporis eius, potíssimum cólitur.
          Apud Tróadem, Asiæ minóris urbem, natális sancti Carpi, qui fuit discípulus beáti Pauli Apóstoli.
          Córdubæ, in Hispánia, item natális sanctórum Mártyrum Fausti, Ianuárii et Martiális; qui, primo equúlei pœna cruciáti, deínde, supercíliis rasis, déntibus evúlsis, áuribus quoque et náribus præcísis, ignis passióne martýrium consummárunt.
          Thessalonícæ sancti Floréntii Mártyris, qui, post vária torménta, igne combústus est.
          Apud Stokeráviam, in Austria, sancti Colmánni Mártyris.
          Antiochíæ sancti Theóphili Epíscopi, qui, sextus post beátum Petrum Apóstolum, eiúsdem Ecclésiæ Pontificátum ténuit.
          Turónis, in Gállia, sancti Venántii, Abbátis et Confessóris.
          Apud Sublácum, in Látio, sanctæ Chelidóniæ Vírginis.
      en2:
      - type: text
        text: |-
          The Thirteenth of October
      
          Saint Edward, King of the English and Confessor, who fell asleep in the Lord on the Nones of January, but is kept chiefly on this day on account of the Translation of his body.
          At Troas, in Asia Minor, the holy Martyrs Faustus, Januarius, and Martialis; who were subjected to flames.
          In the monastery of Saint-Gall, the birth of Saint Gall the Confessor; who, a disciple of Saint Columbanus, illumined that region with his virtues and miracles.
          At Lyon, in Gaul, Saint Nicasius the Bishop and Martyr, who was beheaded.
          At Cluny, in Gaul, the passing of blessed Odilo the Abbot, who with wondrous piety served the monks entrusted to him.
  psalm.t-rtio-idus-sept-mbris-3ffaaf9b85:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 11 th day of September, were born into the better life:

          At Rome, upon the old Salarian Way, at the cemetery of Basilla, the holy brethren Protus and Hyacinth, both martyrs. They were eunuchs who belonged to blessed Eugenia.
          Under the Emperor Gallienus they were arrested on the charge that they were Christians, and, forasmuch as they could not be made to offer sacrifice, they were first grievously beaten, and then beheaded.
          At Laodicea, in Syria, the holy martyrs Diodorus, Diomede, and Didymus.
          At Leon, in Spain, (in the middle of the sixth century,) the holy martyr Vincent, Abbot (of the monastery of St Claudius.)
          In Egypt, holy Paphnutius, Bishop (in the Thebaid.) He was one of those Confessors who under the Emperor Galerius Maximinus had his right eye put out and his left hough cut, and was condemned to penal servitude in the mines. Under the Emperor Constantine the Great he strove stalwartly for the Catholic faith against the Arians, and at length fell asleep in peace, crowned with many crowns.
          At Lyons, (toward the close of the fifth century,) deceased the holy (Confessor) Patient, Bishop (of that see.) At Vercelli, (in the sixth century,) the holy (Confessor) Emilian, Bishop (of that see.) At Alexandria, (in the fifth century,) holy Theodora, who, having carelessly transgressed and deeply repented, continued unknown in the holy habit in wondrous self- denial and longsuffering, until her death.
      la:
      - type: text
        text: |-
          Tértio Idus Septémbris

          Romæ, via Salária véteri, in cœmetério Basíllæ, natális sanctórum Mártyrum Proti et Hyacínthi fratrum, eunuchórum beátæ Eugéniæ. Hi, sub Galliéno Imperatóre, deprehénsi quod essent Christiáni, sacrificáre cogúntur; sed non consentiéntes, primo duríssime verberáti sunt, ac tandem páriter decolláti.
          Legióne, in Hispánia, sancti Vincéntii, Abbátis et Mártyris.
          Laodicéæ, in Sýria, pássio sanctórum Diodóri, Diomédis et Dídymi.
          In Ægýpto sancti Paphnútii Epíscopi, qui unus fuit ex iis Confessóribus, qui, sub Galério Maximiáno Imperatóre, dextro óculo effósso et sinístro póplite excíso, ad metálla damnáti fuérunt; deínde, sub Constantíno Magno, advérsus Ariános, pro fide cathólica, strénue decertávit; et demum, multis corónis auctus, in pace quiévit.
          Lugdúni, in Gállia, deposítio sancti Patiéntis Epíscopi.
          Vercéllis sancti Æmiliáni Epíscopi.
          Alexandríæ sanctæ Theodóræ, quæ, cum incáute deliquísset, inde, facti pǽnitens, mirábili abstinéntia et patiéntia in hábitu sancto perseverávit incógnita usque ad mortem.
      en2:
      - type: text
        text: |-
          The Thirteenth of September
      
          At Rome, on the old Salarian Way, in the cemetery of Basilla, the birth of the holy Martyrs Protus and Hyacinthus, brothers, eunuchs of blessed Eugenia. Under the Emperor Gallienus, caught because they were Christians, they were taken from the virgin to whom they had devoted themselves, and after enduring many severe torments, Hyacinthus died in prison; but Protus was beheaded and thus both were crowned as holy Martyrs.
          At Nicomedia, Saint Julian the Martyr, who, under the Emperor Diocletian, when he would not adore the idols, was hung upside down on a tree and beaten with rods, and finally burned with fire.
          At Nola, in Campania, Saint Felix III, Pope and Confessor.
          At Calahorra, in Spain, the holy Martyrs Emeterius and Chelidonius; who, under the Emperor Diocletian, after enduring various torments, were beheaded and crowned with martyrdom.
  psalm.t-rtio-kal-ndas-apr-lis-a21fa865ed:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 30th day of March, were born into the better life:

          At Rome, upon the Appian Way, the Blessed Tribune Quirinus, [in the year 130.] Holy Pope Alexander was committed to ward with him, and by the same he and all his house were baptized. Under the Emperor Hadrian he was brought before the Judge Aurelian, and as he remained steadfast in the faith, his tongue was cut out, he was racked, and his hands and feet cut off, and at last his contending was finished by the sword.
          At Thessalonica, the holy martyrs Domninus, Victor, and their Companions, [perhaps under Maximianus.]
          At Constantinople is made the commemoration of very many holy martyrs, Catholic communicants whom in the time of the Emperor Constantius the arch-heretic Macedonius tortured and slew in diverse unheard-of ways. Among other things, he pinched off the nipples of the breasts of the faithful women with the lids of boxes, and seared the wound with hot iron.
          At Senlis, holy Regulus, Bishop of Arles, [and of Senlis, in the year 130.]
          At Orleans, in Gaul, holy Pastor, Bishop of that see, [perhaps in the year 557.]
          At Syracuse, [in Sicily,] the holy Confessor Zozimus, Bishop of that see, [in the year 660.]
          On Mount Sinai, holy John, Abbot [of Mount Sinai in the years 525-605,] surnamed Climacus, [which is, being interpreted, "of the ladder." He was probably a native of Palestine.]
          At Aquino, the holy Confessor Clinius. [Native of Greece, and a monk of Monte Casino, fifth century.]
      la:
      - type: text
        text: |-
          Tértio Kaléndas Aprílis

          Romæ, via Appia, pássio beáti Quiríni Tribúni, patris sanctæ Balbínæ Vírginis, qui a beáto Alexándro Papa, quem habébat in custódia, cum omni domo sua baptizátus est; atque, sub Hadriáno Imperatóre, cum esset tráditus Aureliáno Iúdici, et in fídei confessióne persísteret, invíctus Christi miles, post linguæ abscissiónem, equúlei suspensiónem, manuúmque ac pedum detruncatiónem, martýrii agónem gládio consummávit.
          Thessalonícæ natális sanctórum Mártyrum Domníni, Victóris et Sociórum.
          Constantinópoli commemorátio sanctórum plurimórum Mártyrum cathólicæ communiónis, quos, Constántii témpore, Macedónius hæresiárcha, inaudítis tormentórum genéribus cruciátos, occídit; nam, inter cétera, fidélium mulíerum úbera inter compréssa arcárum labra dissécuit, et candénti ferro combússit.
          In castro Silvanecténsi, in Gállia, deposítio sancti Réguli, Arelaténsis Epíscopi.
          Auréliæ, in Gállia, sancti Pastóris Epíscopi.
          Syracúsis, in Sicília, sancti Zósimi, Epíscopi et Confessóris.
          In monte Sina sancti Ioánnis Climáci Abbátis.
          Aquilériæ, in Hispánia, sancti Petri Regaláti, in urbe Vallisoletána orti, Sacerdótis ex Ordine Minórum et Confessóris, reguláris disciplínæ in Hispániæ cœnóbiis restitutóris; quem Benedíctus Décimus quartus, Póntifex Máximus, Sanctórum fastis adscrípsit.
          Apud Aquínum sancti Clínii Confessóris.
      en2:
      - type: text
        text: |-
          The Twenty-Ninth of March
      
          At Rome, on the Appian Way, the passion of blessed Quirinus the Tribune, father of Saint Balbina the Virgin, who was baptized together with his entire household by blessed Pope Alexander, whom he held in custody; and afterward, after many torments, being put into a millstone and cast into the river, suffered martyrdom for Christ.
          At the same place, the holy Martyrs Secundus, Carpophorus, Victorinus, and Severianus; who were beheaded.
          In Lycia, the holy Martyrs Eustathius, Thespesius, and Anatolius.
          In Africa, Saint Barachisius the Martyr, in Persia.
          In Cilicia, Saints Diodorus the Priest and Rhodopianus the Deacon.
  psalm.t-rtio-kal-ndas-aug-sti-1d8134f8c2:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Germain, Bishop of Auxerre, a man illustrious alike for his birth, his faith, his teaching, and the glory of his miracles, who rid Britain of the Pelagian heresy, and of whom mention is made upon the morrow.
          Upon the same 30th day of July, were born into the better life:

          At Rome, the holy martyrs Abdon and Sennen. These were Persians who were brought to Rome in bonds under Decius. They were first hided with scourges loaded with lead, and then slain with the sword.
          At Tuburbe, in Africa, the holy Virgin martyrs Maxima, Donatilla, and Secunda. In the persecution under Valerian and Gallienus, Maxima and Donatilla were given vinegar and gall to drink, then severely hided and racked, burnt over gratings, and rubbed with lime. Afterward, they were thrown to the beasts along with Secunda, a virgin of twelve years of age, but as the beasts would not touch them they were all slain with the sword.
          At Assisi, in Umbria, the holy martyr Rufinus.
          At Caesarea, in Cappadocia, [in the time of the Emperor Diocletian,] the holy martyr Julitta. She raised a law plea against a certain great man who had spoiled her goods, and he pleaded against her that being a Christian she could not be heard, whereupon the judge commanded her to offer some incense to the idols in order that she might be able to plead. She firmly refused, and was cast into the fire, where she resigned her soul to God, but the fire did not hurt her body. Her famous praises have been set forth by holy Basil the Great in a noble discourse.
          At Auxerre, [at the beginning of the sixth century,] the holy Confessor Ursus, Bishop [of that See.]
      la:
      - type: text
        text: |-
          Tértio Kaléndas Augústi

          Romæ sanctórum Mártyrum Abdon et Sennen Persárum, qui, sub Décio, caténis alligáti et Romam addúcti, pro Christi fide prius plumbátis cæsi sunt, deínde gládio interfécti.
          Assísii, in Umbria, sancti Rufíni Mártyris.
          Tubúrbi Lucernáriæ, in Africa, pássio sanctárum Vírginum Máximæ, Donatíllæ et Secúndæ; quarum duæ primæ, in persecutióne Valeriáni et Galliéni, acéto et felle potátæ, deínde plagis acérrimis cæsæ et equúlei extensióne cruciátæ, cratículis étiam exústæ et calce perfricátæ, póstmodum cum Secúnda, Vírgine duódecim annórum, ad béstias simul proiéctæ, sed ab his intáctæ, novíssime gládio iugulátæ sunt.
          Cæsaréæ, in Cappadócia, sanctæ Iulíttæ Mártyris, quæ, cum bona sua, a quodam poténte sibi usurpáta, in iudício repéteret, atque ille exceptiónem daret quod ut Christiána non debéret audíri, mox a Iúdice iussa est thus idólis offérre, ut posset audíri. Quod illa constánter recúsans, in ignem coniécta est, sicque spíritum Deo réddidit; corpus autem a flamma remánsit illǽsum. Eius præcláras laudes sanctus Basilíus Magnus egrégio encómio celebrávit.
          Antisiodóri sancti Ursi, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The Thirtieth of July
      
          At Rome, the holy Martyrs Abdon and Sennen the Persians, who, under Decius, bound in chains and brought to Rome, were first beaten with leaden flails for the faith of Christ, then killed with the sword.
          At Assisi, the translation of the holy body of the Seraphic Virgin Clare, which is venerated in a new and magnificent temple.
          At Spoleto, the holy Martyrs Felix the Priest and Adauctus the Martyr.
          At Lyons, in Gaul, the birth of Saint Julitta the Martyr, who is said to have suffered there under Diocletian.
          At Rome, Saint Leopardus the Martyr.
  psalm.t-rtio-kal-ndas-dec-mbris-3d95ff0a3c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Eve of the holy Apostle Andrew. On the same day we keep the feast of the holy Confessor Willibrord, Archbishop of Utrecht, in Friesland, who was ordained Bishop by blessed Pope Sergius, and preached the Gospel in Friesland and Denmark. Mention is made of him upon the 7th day of this present month of November.
          Upon the same 29th day of November, were born into the better life:

          At Rome, upon the Salarian Way, under the Emperor Maximian, the holy martyrs Saturninus the Elder, and Sisinius the Deacon. They suffered long in prison, and the Prefect of the city then commanded them to be stretched upon the rack, and drawn with thongs, to be flogged with cudgels and loaded scourges, then tormented with fire, and at last to be taken down from the rack and beheaded.
          At Toulouse, the holy martyr Saturninus, Bishop (of that see,) who, in the time of the Emperor Decius, was tried by the pagans in the capitol of the same city, and cast down the steps from the summit thereof, so that his head was broken, and his brain scattered, and his whole body mangled, and he gave up his worthy soul to Christ.
          Likewise, under Decius the Emperor and Aquilinus the President, the holy martyrs Paramon and three hundred and seventy-five others, his Companions.
          At Ancyra, the holy martyr Philomen, who, under the President Felix, in the persecution under the Emperor Aurelian, was tried with fire, and then had nails driven into his hands and feet, and at last into his head, and so finished his testimony.
          At Veroli, the holy martyrs Blaise and Demetrius.
          At Todi, (in the fourth century,) the holy Virgin Illuminata.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Decémbris

          Romæ, via Salária, natális sanctórum Mártyrum Saturníni senis, et Sisínii Diáconi, sub Maximiáno Príncipe; quos, diu in cárcere macerátos, iussit Urbis Præféctus in equúleum levári et áttrahi nervis, fústibus ac scorpiónibus cædi, deínde eis flammas appóni, et, depósitos de equúleo, cápite truncári.
          Tolósæ sancti Saturníni Epíscopi, qui, tempóribus Décii, in Capitólio eiúsdem urbis a Pagánis tentus atque de summa Capitólii arce per omnes gradus præcipitátus est, atque ita, cápite collíso, excussóque cérebro, et toto córpore dilaniáto, dignam Christo ánimam réddidit.
          Item pássio sanctórum Parámonis et Sociórum trecentórum septuagínta quinque, sub Décio Imperatóre et Aquilíno Prǽside.
          Ancýræ, in Galátia, sancti Philómeni Mártyris, qui, in persecutióne Aureliáni Imperatóris, sub Felíce Prǽside, igne probátus, mánibus pedibúsque ac demum cápite clavis confíxo, martýrium consummávit.
          Vérulis, in Hérnicis, sanctórum Mártyrum Blásii et Demétrii.
          Tudérti, in Umbria, sanctæ Illuminátæ Vírginis.
      en2:
      - type: text
        text: |-
          The Thirtieth of November
      
          At Rome, on the Salarian Way, the birth of the holy Martyrs Saturninus the elder and Sisinnius the Deacon, under the Emperor Maximian; whom the prefect of the City ordered stretched on the rack, and with their sinews torn out, tortured for a very long time, and finally beaten to death with clubs.
          At the same place, Saint Castulus the Martyr; who, as he was going back and forth, bringing the holy Martyrs of Christ to his house to pray, was seized by the pagans and, hung up and tortured, and finally buried alive.
          At Turin, Saint Maximus, Bishop and Confessor, who, illustrious for learning and holiness, left many outstanding works in writing.
  psalm.t-rtio-kal-ndas-febru-rii-d354cb7293:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy virgin and Martyr Martina, (third century,) of whom mention is made upon the 1st day of January.
          Upon the same 30th day of January, were born into a better life:

          At Antioch, the blessed martyr Hippolytus, (third century.) He was a Priest who had been led astray into the Novatian schism, but by the operation of the grace of Christ had corrected himself, and had returned into the unity of the Church, for which and within which he afterwards achieved a noble martyrdom. When he was asked by his people which were the true Body, he denied the doctrine of Novatus, and declared that the faith which men ought to keep is the faith which the See of Peter keepeth, and so offered his neck to the executioner.
          In Africa, the holy martyrs Felician, Philappian, and 124 others.
          At Edessa, in Syria, the holy martyr Barsimceus, Bishop of that city, who converted many Gentiles to the faith, and sent them before him to the crown, but himself followed them with the palm of martyrdom under the Emperor Trajan, (second century.) Likewise, at Edessa, holy Barsen, Bishop of that See, who was famous for the grace of healing, but who on account of his Catholic belief was banished to the uttermost parts of that country by the Arian Emperor Valens, and there finished his earthly life, (in the year 379.)
          Likewise the blessed Alexander. He was arrested in the persecution under the Emperor Decius, and died under the torture, (in the year 251,) venerable for his grey hairs and illustrious for his repeated confession.
          At Jerusalem, holy Matthias, Patriarch of that place, (in the second century,) of whom are narrated wondrous acts of faith. He suffered much for Christ's sake under the Emperor Hadrian, but at length fell asleep in peace.
          At Rome, holy Pope Felix (IV, Pope in 526, died in 530,) who laboured much for the Catholic faith.
          At Pavia, the holy Confessor Armentarius, Bishop of that See, (in the year 730.)
          In the monastery of Maubeuge, in Hainaut, in the time of King Dagobert, the holy Virgin Aldegundis, (about the year 689.)
          At Milan, holy Savina, a devout woman, who fell asleep in the Lord, (in the year 311,) while she was praying at the graves of the holy martyrs Nabor and Felix.
          At Viterbo, the holy Virgin Hyacinth de' Mariscotti, (in the year 1640,) a nun of the Third Order of St. Francis, eminent for penitence and for love, whose name Pope Pius VII enrolled with those of the saints.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Februárii

          Sanctæ Martínæ, Vírginis et Mártyris, cuius dies natális Kaléndis Ianuárii recólitur.
          Edéssæ, in Sýria, sancti Barsimǽi Epíscopi, qui, cum Gentíles plúrimos convertísset ad fidem et præmisísset ad corónam, eos secútus est, sub Traiáno, cum palma martýrii.
          Antiochíæ pássio beáti Hippólyti Presbýteri, qui, decéptus aliquándiu schísmate Nováti, sed, operánte grátia Christi, corréctus, ad unitátem Ecclésiæ rédiit, pro qua et in qua póstea illústre martýrium consummávit. Hic, rogátus a suis quænam secta vérior esset, exsecrátus est dogma Nováti, et, eam fidem dicens esse servándam quam Petri Cáthedra custodíret, iúgulum prǽbuit.
          In Africa pássio sanctórum Mártyrum Feliciáni, Philippiáni et aliórum centum vigínti quátuor.
          Item beáti Alexándri, qui, in persecutióne Décii, comprehénsus est, ac, longǽvæ ætátis veneránda canítie et confessióne iteráta respléndens, inter carníficum torménta réddidit spíritum.
          Edéssæ, in Sýria, sancti Barsis Epíscopi, dono curatiónum illústris; qui, a Valénte, Imperatóre Ariáno, in díssitas regiónes ob fidem cathólicam relegátus, ac tríplici mutatióne fatigátus exsílii, vitam finívit.
          Hierosólymis natális sancti Matthíæ Epíscopi, de quo mira et plena fídei gesta narrántur; qui, sub Hadriáno, multa pro Christo perpéssus est, ac demum in pace quiévit.
          Pápiæ sancti Armentárii, Epíscopi et Confessóris.
          In Malbódio, Hannóniæ monastério, sanctæ Aldegúndis Vírginis, témpore Dagobérti Regis.
          Vitérbii sanctæ Hyacínthæ de Mariscóttis Vírginis, ex tértio sancti Francísci Ordine Sanctimoniális, pæniténtia et caritáte insígnis; quam Pius Papa Séptimus Sanctis adscrípsit.
          Medioláni sanctæ Savínæ, féminæ religiosíssimæ, quæ, ad sepúlcra sanctórum Nabóris et Felícis Mártyrum orans, obdormívit in Dómino.
          In território Parisiénsi sanctæ Bathíldis Regínæ, sanctitáte et miraculórum glória præcláræ.
      en2:
      - type: text
        text: |-
          The Thirtieth of January
      
          Saint Martina, Virgin and Martyr, whose birth is kept on the Kalends of January.
          At Edessa, in Syria, Saint Barsimaeus the Bishop, who, having converted very many Gentiles to the faith, and having strengthened them to undergo martyrdom, was himself also seized and tortured, and finally, under the Emperor Trajan, crowned with a glorious martyrdom.
          At the same place, the holy Martyr Adauctus of Phrygia.
          At Rome, Saint Bathildis the Queen, wife of Clovis II, King of the Franks, distinguished for piety and works of mercy.
          In Cappodocia, the holy Martyrs Theogenes and Pontianus, who were beheaded.
          In Cyprus, Saint Therapon the Bishop.
  psalm.t-rtio-kal-ndas-i-lii-c440d25c5b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 29th day of June, were born into the better life:

          At Rome, the holy Apostles Peter and Paul. They suffered under the Emperor Nero upon the same day of the same year. Peter was crucified in the city with his head downwards, and is buried at the Vatican beside the Triumphal Way, surrounded by the veneration of the whole world. Paul was beheaded with the sword, and buried beside the Ostian Way, surrounded by the same honour.
          At Argenten, in Gaul, [in the third century,] the holy martyr Marcellus, who was beheaded for Christ's faith's sake, along with a soldier named Anastasius.
          At Genoa, [in the sixth century,] holy Syrus, Bishop [of that see.]
          At Narni, holy Cassius, Bishop of that city of him holy Gregory hath on record that hardly any day of his life passed wherein he did not offer up unto God Almighty the offerings of atonement and therewith his life accorded well, for he gave away in charity all that he possessed, and at the hour of the sacrifice he wept abundantly. It was his use to come to Rome every year for the birthday of the Apostles, and upon that day, when he had celebrated solemn Mass, and had given unto all the Body of the Lord and the Peace, he passed away to be ever with the Lord.
          In Cyprus, holy Mary, the mother of John whose surname was Mark.
          In the country of Sens, [in the third century,] the holy Virgin Benedicta.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Iúlii

          Romæ natális sanctórum Apostolórum Petri et Pauli, qui eódem anno eodémque die passi sunt, sub Neróne Imperatóre. Horum prior, in eádem Urbe, cápite ad terram verso cruci affíxus, et in Vaticáno iuxta viam Triumphálem sepúltus, totíus Orbis veneratióne celebrátur; postérior autem, gládio animadvérsus, et via Ostiénsi sepúltus, pari honóre habétur.
          In Cypro sanctæ Maríæ, matris Ioánnis qui cognominátus est Marcus.
          In castro Argentómacho, in Gállia, sancti Marcélli Mártyris, qui, pro fide Christi, una cum Anastásio, viro militári, cápite plexus est.
          Génuæ natális sancti Syri Epíscopi.
          Nárniæ sancti Cássii, eiúsdem civitátis Epíscopi, de quo sanctus Gregórius Papa refert quod nullus ferme dies vitæ eius abscedébat, quo placatiónis hóstias omnipoténti Deo non offérret; cui et concordábat vita, quia, cuncta quæ habébat, in eleemósynis tríbuens, in hora sacrifícii totus in lácrimis diffluébat. Demum, natalítio Apostolórum die, quo síngulis annis Romam veníre consuéverat, in eádem Narniénsi urbe, cum Missárum solémnia celebrásset, et corpus Domínicum pacémque ómnibus dedísset, migrávit ad Dóminum.
          In território Senonénsi sanctæ Benedíctæ Vírginis.
      en2:
      - type: text
        text: |-
          The Twenty-Ninth of June
      
          At Rome, the birth of the holy Apostles Peter and Paul, who suffered in the same year and on the same day, under the Emperor Nero. The former, in that same City, was fixed to the cross with his head toward the ground; Saint Paul, however, as a Roman citizen, was beheaded. Both were buried with great honor, Peter on the Vatican Hill and Paul on the Ostian Way. Their feast was instituted by Clement I, Pope, and celebrated with great solemnity by the whole Church.
          In Cyprus, the holy Apostle Barnabas.
          In Pontus, the holy Martyrs Hermon and Companions.
  psalm.t-rtio-kal-ndas-i-nii-1c5e7ad2ab:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the morrow we keep the feast of holy John of Nepomuc, Canon of the metropolitical Cathedral Church of Prague, in Bohemia, who, when he had been vainly tried, to make him violate the seal of sacramental confession, was cast into Xerophagia. the river Moldau, and so earned the palm of martyrdom, of whom mention is made upon the 16th day of May.
          Upon this same 30th day of May, were born into the better life:

          At Rome, upon the Aurelian Way, the holy martyr Pope Felix, who was crowned with martyrdom under the Emperor Aurelian.
          At Torre, in Sardinia, [in the persecution under the Emperor Hadrian,] the holy martyrs Gabinus and Crispulus.
          At Antioch, [in the fourth century,] holy Sycus and Palatinus, who suffered many torments for Christ's Name's sake.
          At Ravenna, [in the fifth century,] the holy Confessor Exuperantius, Bishop [of that see.]
          At Pavia, [in the seventh century,] the holy Anastasius, Bishop [of that see.]
          At Caesarea, in Cappadocia, the holy Basil and Emmelia his wife, father and mother of holy Basil the Great. In the time of the Emperor Galerius Maximian they were banished, and dwelt in the wilderness in Pontus; but they fell asleep in peace after the persecution was over, leaving their children inheritors of their goodness.
          At Seville, in Spain, [in the year 1252,] holy Ferdinand III, King of Castille and Leon, who on account of his excelling graces was surnamed the Saint. Illustrious for his zeal in the propagation of the faith, after conquering the Moors, he left an earthly kingdom to inherit in blessedness a kingdom eternal in heaven.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Iúnii

          Sancti Felícis Primi, Papæ et Mártyris, cuius dies natális tértio Kaléndas Ianuárii recensétur.
          Túrribus, in Sardínia, sanctórum Mártyrum Gabíni et Críspuli.
          Antiochíæ sanctórum Syci et Palatíni, qui, pro Christi nómine, multa torménta passi sunt.
          Ravénnæ sancti Exsuperántii, Epíscopi et Confessóris.
          Pápiæ sancti Anastásii Epíscopi.
          Cæsaréæ, in Cappadócia, sanctórum Basilíi et Emméliæ uxóris, qui fuérunt paréntes beatórum Basilíi Magni et Gregórii Nysséni ac Petri Sebasténsis Episcopórum, atque Macrínæ Vírginis. Hi vero sancti cóniuges, témpore Galérii Maximiáni, extórres facti, Pónticas solitúdines incoluére; et post persecutiónem, fíliis suárum relíctis virtútum herédibus, in pace quievérunt.
          Híspali, in Hispánia, sancti Ferdinándi Tértii, Castéllæ et Legiónis Regis, ob virtútum præstántiam cognoménto Sancti; qui, fídei propagándæ zelo clarus, tandem, devíctis Mauris, ad cæléste regnum, terréno relícto, felíciter evolávit.
          Rotómagi, sanctæ Ioánnæ Arcénsis Vírginis, Puéllæ Aurelianénsis appellátæ, quæ cum fórtiter pro pátria dimicásset, tandem, in hóstium potestátem trádita, iniquo iudício condemnáta est et igne combústa; atque a Benedícto Décimo quinto, Pontífice Máximo, Sanctórum fastis adscrípta.
      en2:
      - type: text
        text: |-
          The Thirtieth of May
      
          Saint Felix I, Pope and Martyr, whose birth is commemorated on the third day before the Kalends of January.
          At Turres, in Sardinia, the holy Martyrs Gabinius and Crispulus.
          At Antioch, the holy Martyrs Ferdinand, Julia, and Jucundus, with two others.
          At Brescia, in Lombardy, the holy Martyrs Faustinus, Jovita, and others.
          At Rome, Saint Exsuperius the Confessor, renowned for holiness.
  psalm.t-rtio-kal-ndas-ianu-rii-f49ec9fab5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 30th day of December were born into the better life:

          At Rome, the birthday of St. Felix I, pope and martyr, who governed the Church during the reign of Emperor Aurelian. His feast day is celebrated on the 30th of May.
          At Spoleto, under the Emperor Maximian, the holy martyrs Sabinus, bishop of that see; the deacons Exuperantius and Marcellus, and the President Venustian along with his wife and children. Marcellus and Exuperantius were first racked then heavily cudgelled, then mangled with hooks, and their sides were afterwards burnt until they died. Venustian and his wife and children were shortly afterward put to the sword holy Sabinus had his hands cut off, and was long imprisoned, and at length lashed to death. These did not all suffer at the same time, but they are all commemorated upon the same day.
          At Alexandria, the holy martyrs Mansuetus, Severus, Appian, Donatus, Honorius and their companions.
          At Thessalonica, the holy martir Anysia (about the year 303). There likewise holy Anysius, bishop of that city. (He succeeded St. Ascole, and died about the year 404.)
          At Milan, the holy confessor Eugenius, bishop of that city.
          At Ravenna, holy Liberius, bishop of that city.
          At Aquila, in the Abruzzi, holy Rainerius, bishop of that city (in the twelfth century).
      la:
      - type: text
        text: |-
          Tértio Kaléndas Ianuárii

          Romæ natális sancti Felícis Primi, Papæ et Mártyris, qui sub Aureliáno Príncipe Ecclésiam rexit. Ipsíus tamen festum tértio Kaléndas Iúnii celebrátur.
          Spoléti item natális sanctórum Mártyrum Sabíni, Assisiénsis Epíscopi, atque Exsuperántii et Marcélli Diaconórum, ac Venustiáni Prǽsidis cum uxóre et fíliis, sub Maximiáno Imperatóre. Ex ipsis Marcéllus et Exsuperántius, primum equúleo suspénsi, deínde fústibus gráviter mactáti, postrémum, abrási úngulis et láterum exustióne assáti, martýrium complevérunt; Venustiánus autem non multo post, simul cum uxóre et fíliis, est gládio necátus; sanctus vero Sabínus, post detruncatiónem mánuum et diútinam cárceris maceratiónem, ad mortem usque cæsus est. Horum martýrium, licet divérso exstíterit témpore, una tamen die recólitur.
          Alexandríæ sanctórum Mansuéti, Sevéri, Appiáni, Donáti, Honórii et Sociórum Mártyrum.
          Thessalonícæ sanctæ Anýsiæ Mártyris.
          Ibídem sancti Anýsii, eiúsdem civitátis Epíscopi.
          Medioláni sancti Eugénii, Epíscopi et Confessóris.
          Ravénnæ sancti Libérii Epíscopi.
          Aquilæ, in Vestínis, sancti Rainérii Epíscopi.
      en2:
      - type: text
        text: |-
          The Thirtieth of December
      
          At Rome, the birth of Saint Felix I, Pope and Martyr, who governed the Church under the Emperor Aurelian. His feast, however, is celebrated on the third day before the Kalends of June.
          At Spoleto, likewise the birth of Saint Sabinus the Bishop and Martyr, with his Companions, namely the Deacons Exsuperantius and Marcellus, and Venustianus the governor with his whole household; who all, in the persecution of Maximian, were variously tortured and put to death.
          At Antioch, the holy Martyrs Sabinus and Adventus.
          At Caesarea, in Palestine, Saint Anysia the Virgin and Martyr, who, when a soldier laid hold of her to bring her to an idol's festival, and she made the sign of the Cross on herself and resisted, was run through with a sword and thus attained the triumph of martyrdom.
          At Troyes, in Gaul, Saint Liberus the Bishop.
          In Achaia, Saint Anysius the Bishop, Confessor.
  psalm.t-rtio-kal-ndas-m-rtii-930fb5e802:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 27th day of February, were born into the better life:

          At Rome, the holy martyrs Alexander, Abundius, Antigonus, and Fortunatus.
          At Alexandria, [in the year 250,] the holy martyr Julian. He was so crippled by the gout that he could neither walk nor stand, and was carried before the judge in a chair by two servants. Of these two servants one denied the faith the other, whose name was Eunus, persisted in confessing Christ along with Julian. They were both placed upon camels and led about the whole city, lashed, and at length publicly burnt upon a pyre.
          There also the holy soldier Besas. He rebuked some who were jeering at the martyrs aforenamed, for which cause he was accused before the judge, and as he stood firm in the faith he was beheaded.
          At Seville, in Spain, [in the year 596,] holy Leander, Bishop of that city, by whose preaching and labours, assisted by Reccared, King of the Visigoths, that nation were converted from the Arian misbelief to the Catholic faith.
          At Constantinople, [in 750] the holy Confessors Basil and Procopius, who in the time of the Emperor Leo the Isaurian, contended valiantly for the honouring of holy images.
          At Lyon, [about the year 660,] holy Baldomer, [locksmith and subdeacon,] the man of God whose grave is famous on account of the miracles which are oftentimes wrought there.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Mártii

          Insulæ, in Aprútio, sancti Gabriélis a Vírgine Perdolénte, Clérici Congregatiónis a Cruce et Passióne Dómini nuncupátæ, et Confessóris; qui, magnis intra breve vitæ spátium méritis et post mortem miráculis clarus, a Benedícto Papa Décimo quinto in Sanctórum cánonem relátus est.
          Romæ natális sanctórum Mártyrum Alexándri, Abúndii, Antígoni et Fortunáti.
          Alexandríæ pássio sancti Iuliáni Mártyris, qui, cum ita pódagra constríctus esset, ut neque incédere neque stare posset, una cum duóbus fámulis, qui eum in sella gestábant, Iúdici offértur; quorum alter fidem negávit, alter, nómine Eunus, cum dómino suo perdurávit in confessióne Christi. Ipse porro Iuliánus et Eunus, camélis impósiti, per totam urbem circumdúci iubéntur, et flagris laniári, ac tandem, incénso rogo, hinc inde spectánte pópulo, combúri.
          Ibídem sancti Besæ mílitis, qui, cum insultántes in prædíctos Mártyres cohibéret, delátus est ad Iúdicem, et, pro fide constánter agens, cápite truncátus.
          Híspali, in Hispánia, natális sancti Leándri, eiúsdem civitátis Epíscopi, qui, sanctórum Isidóri Epíscopi ac Florentínæ Vírginis frater, sua prædicatióne et indústria gentem Visigothórum, adiuvánte Reccarédo, eórum Rege, ab Ariána impietáte ad cathólicam fidem convértit.
          Constantinópoli sanctórum Confessórum Basilíi et Procópii, qui, témpore Leónis Imperatóris, pro cultu sanctárum Imáginum strénue decertárunt.
          Lugdúni, in Gállia, sancti Baldoméri Subdiaconi, viri Deo devóti, cuius sepúlcrum crebris miráculis illustrátur.
      en2:
      - type: text
        text: |-
          The Thirtieth of February
      
          At the island of Inola, in Abruzzo, Saint Gabriel of Our Lady of Sorrows, Cleric of the Congregation of the Cross and Passion of the Lord, Confessor; who, by great merits within a brief span of life, was enrolled in the number of the Saints by Benedict XV, Supreme Pontiff. His feast is celebrated on the twenty-seventh day before the Kalends of April.
          At Trier, the holy Martyrs Eucharius, Valerius, and Maternus.
          At Seville, in Spain, Saint Romanus the Martyr, renowned for miracles.
          At Rome, the holy Martyrs Regulus and Hermes; who were subjected to various torments and beheaded.
  psalm.t-rtio-kal-ndas-maii-2a3e1d6476:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 29th day of April, were born into the better life:

          At Milan, the holy martyr Peter, of the Order of Friars Preachers, who was murdered by heretics for the Catholic faith's sake, [in the year 1252.]
          At Paphos, in Cyprus, holy Tychicus, the disciple of the blessed Apostle Paul, whom that Apostle doth in his Epistles call "a beloved brother and a faithful minister and fellow-servant in the Lord." [He was a native of the province of Asia.]
          At Cirtha, in Numidia, [in the year 260,] the holy martyrs Agapius, Bishop [of Carthagena,] and Secundinus, Bishop [of Braga,] who had long been banished to that city in the persecution under the Emperor Valerian, wherein the fury of the Gentiles did most seek to try the faith of the just. From having been eminent Priests they became glorious martyrs and there suffered along with them the soldier Emilian, the holy Virgins Tartulla and Antonia, and a certain woman with her twin children.
          On the same day, the seven Saints who had been robbers but were converted to Christ by holy Jason, and by martyrdom gained life everlasting, [in the year 100. They are called the robbers of Corfu. Their names are Saturninus, Jusischolus, Faustian, Januarius, Marsalius, Euphrasius, and Mammius.]
          At Brescia, the holy Confessor Paulinus, Bishop of that see, [about the year 428. The Bollandists call him Paul I, and say there never was a Bishop Paulinus of Brescia.]
          In the monastery of Cluny, [in the year 1109,] holy Hew, Abbpt of Cluny.
          In the monastery of Molesme, holy Robert, first Abbot of Citeaux. [He was a monk of Moitier-la-Celle, Abbot of Saint-Michel de Tonnerre, Prior of Saint-Ayoul, and founder of Molesme and Citeaux, [in the year 1110.]
      la:
      - type: text
        text: |-
          Tértio Kaléndas Maii

          Sancti Petri, ex Ordine Prædicatórum, Mártyris, qui octávo Idus Aprílis pro fide cathólica martýrium súbiit.
          Romæ natális sanctæ Catharínæ Senénsis Vírginis, ex tértio Ordine sancti Domínici, vita et miráculis claræ, quam Pius Secúndus, Póntifex Máximus, sanctárum Vírginum número adscrípsit. Ipsíus tamen festum sequénti die celebrátur.
          Apud Paphum, in Cypro, sancti Týchici, qui fuit discípulus beáti Pauli Apóstoli, et ab ipso Apóstolo in suis Epístolis caríssimus frater, miníster fidélis suúsque in Dómino consérvus appellátur.
          Pisis, in Túscia, sancti Torpétis Mártyris, qui magnus in offício Nerónis primum fuit, unúsque ex his, de quibus idem Paulus Apóstolus ab urbe Roma ad Philippénses scribit: « Salútant vos omnes sancti, máxime autem qui de Cǽsaris domo sunt». Sed póstea, pro fide Christi, iubénte Satéllico, álapis cǽditur, verbéribus duríssime affícitur, ac béstiis devorándus tráditur, sed mínime lǽditur; tandem martýrium suum decollatióne complévit.
          Cirthæ, in Numídia, natális sanctórum Mártyrum Agápii et Secundíni Episcopórum, qui, post longum apud præfátam urbem exsílium, in persecutióne Valeriáni, in qua tunc máxime Gentílium rábies ad tentándam iustórum fidem inhiábat, ex illústri sacerdótio effécti sunt Mártyres gloriósi. Passi sunt in eórum collégio Æmiliánus miles, Tertúlla et Antónia, quæ erant sacræ Vírgines, et quædam múlier cum suis géminis.
          In ínsula Corcýra sanctórum septem Latrónum, qui, a sancto Iásone ad Christum convérsi, martýrio vitam adépti sunt sempitérnam.
          Neápoli, in Campánia, sancti Sevéri Epíscopi, qui, inter ália admiránda, mórtuum de sepúlcro excitávit ad tempus, ut mendácem víduæ et pupillórum creditórem argúeret falsitátis.
          Bríxiæ sancti Paulíni, Epíscopi et Confessóris.
          In cœnóbio Cluniacénsi, in Gállia, sancti Hugónis Abbátis.
          In monastério Molisménsi, in Gállia, sancti Robérti, qui fuit primus Abbas Cistércii.
      en2:
      - type: text
        text: |-
          The Twenty-Ninth of April
      
          Saint Peter, of the Order of Preachers, Martyr, who underwent martyrdom for the Catholic faith on the eighth of the Ides of April.
          At Rome, the birth of Saint Catherine of Siena, Virgin, of the Third Order of Saint Dominic, whose feast is kept on the twenty-ninth of April.
          At Antioch, Saint Torquatus and seven Companions, who were bishops ordained by the Apostles and sent to preach in Spain.
          In Africa, Saint Agapetus, Bishop and Martyr.
          In Lucania, the holy Martyrs Paulinus, Lucillus, Cecilianus, and Julian.
  psalm.t-rtio-kal-ndas-nov-mbris-d35b0d176f:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 30th day of October, were born into the better life:

          In Africa, two hundred and twenty holy martyrs.
          At Tangiers, in Morocco, (in the third century,) the holy centurion Marcellus, who accomplished martyrdom by being beheaded under Agricolaus, Vicar to the Prefect of the Pretorium.
          At Alexandria, thirteen holy martyrs, who suffered under the Emperor Decius, along with Julian, Eunus, and Macarius.
          At Alexandria also, the holy martyr Eutropia, who visited the martyrs, and, being most cruelly tormented along with them, gave up the ghost.
          At Cagliari, in Sardinia, the holy martyr Saturninus, who was beheaded under the President Barbarus, in the persecution under the Emperor Diocletian.
          At Apamea, in Phrygia, under the same Emperor Diocletian, the holy martyr Maximus.
          At Leon, in Spain, the holy martyrs Claudius, Lupercus, and Victorius, sons of the holy centurion Marcellus, who were beheaded under the President Diogenian, in the persecution under the Emperors Diocletian and Maximian.
          At Algaea, in Cilicia, under the President Lysias and the Emperor Diocletian, the holy martyrs Zenobius, Bishop (of that see,) and Zenobia his sister.
          At Altino, the holy martyr Theonestus, Bishop (of Philippi, in Macedonia,) who was slain by the Arians.
          At Paris, the holy martyr Lucan.
          At Antioch, (in the third century,) holy Serapion, Patriarch (of that see,) eminent for his learning.
          At Capua, the holy Confessor Germanus, Bishop (of that see,) a man of great holiness, whose soul, at the hour of his death, holy Benedict saw carried heavenward by Angels.
          At Potenza, in Lucania, (in the year 1119,) holy Gerard, Bishop (of that see.)
          At Palma, in Majorca, (in the year 1617,) the holy Confessor Alphonsus Rodriguez, temporal coadjutor in the Society of Jesus, eminent for his lowliness and his love of mortification, whose name Leo XII numbered with those of the Blessed, and Leo XIII with those of the Saints.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Novémbris

          In Sardínia natális sancti Pontiáni, Papæ et Mártyris, qui, ab Alexándro Imperatóre, una cum Hippólyto Presbýtero, in eam ínsulam deportátus, ibídem, mactátus fústibus, martýrium consummávit. Eius corpus a beáto Fabiáno Papa Romam delátum est, atque in cœmetério Callísti sepúltum. Ipsíus tamen festum recólitur tertiodécimo Kaléndas Decémbris.
          Ægéæ, in Cilícia, pássio sanctórum Zenóbii Epíscopi, et Zenóbiæ soróris, sub Diocletiáno Imperatóre et Lýsia Prǽside.
          Altíni, in Venetórum fínibus, sancti Theonésti, Epíscopi et Mártyris, qui ab Ariánis occísus est.
          In Africa natális sanctórum Mártyrum ducentórum vigínti.
          Tingi, in Mauritánia, pássio sancti Marcélli Centuriónis, qui, sanctórum Cláudii ac Lupérci et Victórii Mártyrum pater, cápitis abscissióne martýrium complévit sub Agricoláo, agente vices Præfécti prætório.
          Alexandríæ sanctórum trédecim Mártyrum, qui, cum sanctis Iuliáno, Euno et Macário, passi sunt sub Décio Imperatóre.
          Cárali, in Sardínia, sancti Saturníni Mártyris, qui, in persecutióne Diocletiáni, sub Bárbaro Prǽside, cápite truncátus est.
          Apaméæ, in Phrýgia, sancti Máximi Mártyris, sub eódem Diocletiáno.
          Legióne, in Hispánia, sanctórum Mártyrum Cláudii, Lupérci et Victórii, filiórum sancti Marcélli Centuriónis; qui, in persecutióne Diocletiáni et Maximiáni, sub Diogeniáno Prǽside, iussi sunt decollári.
          Lutétiæ Parisiórum sancti Lucáni Mártyris.
          Alexandríæ sanctæ Eutrópiæ Mártyris, quæ, Mártyres vísitans, apprehénsa est, et, cum illis sævíssime cruciáta, réddidit spíritum.
          Antiochíæ sancti Serapiónis Epíscopi, eruditióne claríssimi.
          Cápuæ sancti Germáni, Epíscopi et Confessóris, magnæ sanctitátis viri; cuius ánimam, in hora óbitus eius, ab Angelis in cælum deférri sanctus Benedíctus aspéxit.
          Poténtiæ, in Lucánia, sancti Gerárdi Epíscopi.
      en2:
      - type: text
        text: |-
          The Thirtieth of October
      
          In Sardinia, the birth of Saint Pontianus, Pope and Martyr, who, deported to that island by the Emperor Alexander together with Hippolytus the Priest, was there beaten with rods and completed martyrdom.
          At the same place, the birth of blessed Hippolytus the Priest, who was deported with Saint Pontianus; and, returning to the faith of the Church and enduring various sufferings, was adorned with the glory of martyrdom.
          At Milan, in Liguria, the holy Martyrs Vitalis and Agricola; who, under the Emperor Diocletian, after severe torments, were condemned to capital punishment.
  psalm.t-rtio-kal-ndas-oct-bris-6e9b14c512:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is made the worshipful Commemoration of the Blessed Archangel Michael on the which day was consecrated in his name the church upon Mount Gargano, mean as to building, but filled with power from heaven.
          Upon the same 29th day of September, were born into the better life:

          In Thrace, the holy martyrs Eutychius, Plautus, and Heraclea.
          In Persia, the holy martyr Gudelia, who had turned many to Christ. Forasmuch as she would not worship the sun and the fire, Sapor the king put her to many torments and caused the skin to be plucked from her head, and her to be fastened to a post, where she won the last victory.
          Likewise in Persia, the holy martyrs Dadas, kinsman of King Sapor, Casdoa his wife, and Gabdelas their son, who were stripped of their worldly goods, tormented with diverse sufferings, imprisoned for a long time, and at last beheaded.
          In Armenia, under the King Tiridates, the holy virgins Ripsimis and her Companions, all martyrs.
          At Auxerre, (in the fifth century,) the holy martyr Fraternus, Bishop (of that see.)
          At Pontecorvo, near by Aquino, (in the twelfth century,) the holy Confessor Grimwald the Priest.
          In Palestine, (in the sixth century,) the holy hermit Quiriacus.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Octóbris

          In monte Gargáno venerábilis memória beáti Michaélis Archángeli, quando ipsíus nómine ibi consecráta fuit Ecclésia, vili quidem facta schémate, sed cælésti præstans virtúte.
          Antisiodóri sancti Fratérni, Epíscopi et Mártyris.
          In Thrácia natális sanctórum Mártyrum Eutýchii, Plauti et Heracléæ.
          In Pérside sanctórum Mártyrum Dadæ, e Sáporis Regis consanguíneis, Cásdoæ uxóris, et Gabdélæ fílii; qui, honóribus exúti ac váriis torméntis dilaniáti, tandem, post longos cárceres, gládio sunt animadvérsi.
          In Arménia sanctárum Vírginum Rípsimis et Sociárum Mártyrum, sub Tiridáte Rege.
          In Pérside sanctæ Gudéliæ Mártyris, quæ, cum plúrimos convertísset ad Christum, ac Solem et Ignem adoráre noluísset, ídeo, sub Sápore Rege, post multa torménta, cute cápitis detrácta, ligno affíxa, méruit obtinére triúmphum.
          In Ponte Curvo, apud Aquínum, sancti Grimoáldi, Presbýteri et Confessóris.
          In Palæstína sancti Quiríaci Anachorétæ.
      en2:
      - type: text
        text: |-
          The Thirtieth of September
      
          On Mount Gargano, the venerable memory of blessed Michael the Archangel, when a church was consecrated there in his name, of humble construction indeed, but excelling in heavenly power.
          At Antioch, Saint Gregory the Bishop, who, because of his outstanding holiness and remarkable miracles, was surnamed the Wonderworker.
          At Brescia, in Lombardy, Saint Faustinus the Bishop.
          At Lodi, the holy Martyrs Onesiphorus and Porphyrius.
          At Alexandria, the holy Pope Liberius.
  psalm.t-rtio-kal-ndas-sept-mbris-7d8f543989:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the morrow we keep the feast of the holy Virgin Rose of St. Mary, whose birth into the better life (in the year 1617) is mentioned upon the 26th day of this present month.
          Upon the same 30th day of August, were born into the better life:

          At Rome, upon the Ostian Way, under the Emperors Diocletian and Maximian, the blessed Priest Felix. After being racked he was sentenced to be beheaded as he was being led to execution he was met by some man who of his own accord professed himself a Christian, and was accordingly forthwith beheaded along with him. The Christians never knew the name of this other, and they accordingly always spoke of him as him who was added, that is, added to the company of the holy martyr Felix in winning of the crown.
          Likewise at Rome, the holy Virgin and martyr Gaudentia, with three others.
          At Rome, [in the year 410,] also the holy Priest Pammachius, [a Roman Senator,] who was eminent for his teaching and holiness.
          At Sfaitla, in Africa, [in the year 399,] sixty blessed martyrs, who were slain by the fury of the Gentiles.
          At Susa, also in Africa, [in the year 250,] holy Boniface and Thecla, who were the parents of twelve sons, all blessed martyrs.
          At Thessalonica, the holy Confessor Fantinus. He suffered much from the Saracens, and was thrust out of the monastery wherein he had lived in marvellous austerity. He led many into the path of salvation, and at length fell asleep in a good old age.
          At Meaux, [in the year 670,] the holy Confessor [Fefrash, an Irishman, who came over into Gaul, where he is called] Fiacre, [and founded a monastery, and died towards the end of the seventh century.]
          At Trevi, [near Subiaco, towards the middle of the eleventh century,] the holy Confessor Peter, famous for many graces and miracles, who there passed away to be with the Lord, and is held in honour and worship.
          At Bologna, [in the year 1026,] the holy Abbot Bononius.
      la:
      - type: text
        text: |-
          Tértio Kaléndas Septémbris

          Sanctæ Rosæ a sancta María, e tértio Ordine sancti Domínici, Vírginis; cuius dies natális nono Kaléndas Septémbris recensétur.
          Romæ, via Ostiénsi, pássio beáti Felícis Presbýteri, sub Diocletiáno et Maximiáno Imperatóribus. Hic, post equúlei vexatiónem, data senténtia, cum ducerétur ad decollándum, óbvius ei fuit quidam Christiánus, qui, dum se Christiánum esse sponte profiterétur, mox cum eódem páriter decollátus est; cuius nomen ignorántes, Christiáni Adáuctum eum appellavérunt, eo quod sancto Felíci auctus sit ad corónam.
          Item Romæ sanctæ Gaudéntiæ, Vírginis et Mártyris, cum áliis tribus.
          Colóniæ Suffetulánæ, in Africa, beatórum sexagínta Mártyrum, qui furóre Gentílium cæsi sunt.
          Bonóniæ sancti Bonónii Abbátis.
          Romæ sancti Pammáchii Presbýteri, qui fuit doctrína et sanctitáte conspícuus.
          Adruméti, in Africa, sanctórum Bonifátii et Theclæ, qui beatórum duódecim filiórum Mártyrum paréntes fuérunt.
          Thessalonícæ sancti Fantíni Confessóris, qui, multa a Saracénis perpéssus, atque e monastério, in quo abstinéntia víxerat admirábili, expúlsus, demum, cum plúrimos ad viam salútis perduxísset, in senectúte bona quiévit.
          In território Meldénsi sancti Fiácrii Confessóris.
          Trebis, in Látio, sancti Petri Confessóris, qui, multis clarus virtútibus et miráculis, ibídem migrávit ad Dóminum, et honorífice cólitur.
      en2:
      - type: text
        text: |-
          The Twenty-Ninth of August
      
          Saint Rose of Lima, of the Third Order of Saint Dominic, Virgin; whose birth is commemorated on the ninth day before the Kalends of September.
          At Rome, on the Ostian Way, the passion of blessed Felix the Priest, under the Emperors Diocletian and Maximian. He, after being racked, when sentence had been given and he was being led out to be beheaded, there met him a certain Christian, who, when he freely declared himself to be a Christian, was presently beheaded along with him; and since his name was unknown, the Christians called him Adauctus, because he had been added to Saint Felix in the crown.
          Also at Rome, Saint Gaudentia, Virgin and Martyr, with three others.
          At Colonia Sufetulana, in Africa, the blessed sixty Martyrs, who were slain by the fury of the Gentiles.
          At Bologna, Saint Bononius the Abbot.
          At Rome, Saint Pammachius the Priest, who was distinguished for learning and holiness.
          At Hadrumetum, in Africa, the holy Bonifatius and Thecla, who were the parents of the blessed twelve Martyr sons.
          At Thessalonica, Saint Fantinus the Confessor, who, having suffered much at the hands of the Saracens and been driven from the monastery in which he had lived an admirable life of abstinence, led very many to the way of salvation and finally rested in a good old age.
          In the territory of Meaux, Saint Fiacre the Confessor.
          At Trevi, in Latium, Saint Peter the Confessor, who, renowned for many virtues and miracles, departed to the Lord there and is honorably venerated.
  psalm.t-rtio-nonas-apr-lis-3c1ab32daa:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 3rd day of April, were born into the better life:

          In England, [in the year 1253,] holy Richard, Bishop of Chichester, famous for his holiness and the glory of his miracles.
          At Taormina, in Sicily, holy Pancras, Bishop of that see, who sealed with his blood the testimony of the gospel of Christ which the holy Apostle Peter had sent him thither to preach.
          At Isnia, in Scythia, the holy martyrs Evagrius and Benignus.
          At Thessalonica, under the Emperor Diocletian, the holy Virgins Agape and Chionia, because they refused to deny Christ, they were first starved in prison, and then cast into the fire. The flame took no hold upon them, but when they had prayed to the Lord, they then gave up their souls to him, [in the year 304.]
          At Tyre, the holy martyr Vulpian. During the persecution under the Emperor Maximian Galerius, he was sewn up inside a sack along with an adder and a dog, and drowned in the sea, [in the year 305.]
          At the Monastery of Mecidion, on Mount Olympus, the holy Abbot Nicetas, who suffered many things under the Emperor Leo the Armenian, on account of the honouring of holy images.
          In England, the holy Virgin Burgundofora, Abbess [of Farmoutier, about the year 655.]
          At Palermo, the holy Confessor Benedict of San Fradello, of the Order of Friars Minors, who was by race a black, whence he was commonly called "the Black." He was famous for his signs and mighty works. He fell asleep in the Lord upon the 4th day of April, [in the year 1585.] The Supreme Pontiff Pius VII. enrolled his name among those of the Saints.
      la:
      - type: text
        text: |-
          Tértio Nonas Aprílis

          Romæ natális beáti Xysti Primi, Papæ et Mártyris; qui, tempóribus Hadriáni Imperatóris, summa cum laude rexit Ecclésiam, ac demum, sub Antoníno Pio, ut sibi Christum lucrifáceret, libénter mortem sustínuit temporálem.
          Tauroménii, in Sicília, sancti Pancrátii Epíscopi, qui Christi Evangélium, quod a sancto Petro Apóstolo illuc missus prædicáverat, martýrii sánguine consignávit.
          Tomis, in Scýthia, natális sanctórum Mártyrum Evágrii et Benígni.
          Tyri, in Phœnícia, sancti Vulpiáni Mártyris, qui, in persecutióne Maximiáni Galérii, cum áspide et cane insútus cúleo, in mare demérsus fuit.
          Thessalonícæ pássio sanctárum Vírginum Agapis et Chióniæ, Diocletiáno Imperatóre, sub quo et sancta Virgo Iréne, eárum soror, póstmodum passúra erat. Ambæ vero, cum Christum negáre nollent, primum in cárcere macerátæ sunt, póstea in ignem missæ, sed a flammis intáctæ, ibi, oratióne ad Dóminum fusa, ánimas reddidérunt.
          In monastério Medícii, in Bithýnia, deposítio sancti Nicétæ Abbátis, qui ob cultum sanctárum Imáginum, sub Leóne Arméno, multa passus est, ac tandem, iuxta Constantinópolim, Conféssor quiévit in pace.
          In Anglia sancti Richárdi, Epíscopi Cicestrénsis, sanctitáte et miraculórum glória conspícui.
          Eboríaci, in território Meldénsi, sanctæ Burgundofáræ, étiam Faræ nómine appellátæ, Abbatíssæ et Vírginis.
      en2:
      - type: text
        text: |-
          The Fifth of April
      
          At Rome, the birth of blessed Xystus I, Pope and Martyr; who, in the times of the Emperor Hadrian, governed the Church with highest praise, and finally, under Antoninus Pius, that he might gain Christ for himself, willingly underwent martyrdom.
          At Antioch, the holy Martyrs Agathopous the Deacon and Theodulus the Lector; who, under the Emperor Severus, were cast into the sea and completed martyrdom.
          At Alexandria, Saint Appian the Martyr.
          In Africa, Saint Dorotheus the Abbot, who, after a long time spent in the desert, attained the grace of prophecy and miracles.
          In Spain, Saint Vincent Ferrer, Priest of the Order of Preachers and Confessor, who illumined the whole Church with the light of his virtues and the fame of his miracles.
  psalm.t-rtio-nonas-aug-sti-78fa35fb63:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 3rd day of August is commemorated the finding at Jerusalem, [in the year 415,] of the body of the most blessed Stephen, the first of all the martyrs, and of those of holy Gamaliel, Nicodemus, and Abibon.
          Their place was revealed by God to Lucian the Priest, in the time of the Emperor Honorius. [The body of St. Stephen now rests at Rome in the Basilica of St. Lawrence beyond the Walls.]
          Upon the same day, were born into the better life:

          At Constantinople, the holy martyr Hermellus.
          In India, upon the coasts of Persia, the holy Monks and others whom King Abenner, when he was persecuting the Church of God, caused to be tormented and slain in diverse ways.
          At Naples, in Campania, [in the year 97,] holy Aspren, Bishop of Naples, who was healed of sickness by the holy Apostle Peter, and thereupon procuring himself to be baptized was ordained Bishop of that city.
          At Autun, [in the year 490,] the holy Confessor Euphronius, Bishop [of that see.]
          At Anagni, [in the year 1105,] holy Peter, Bishop [of that see,] who fell asleep in the Lord, famous for his observance as a Monk first, and afterwards for his carefulness as a shepherd.
          At Philippi, [in the year 60,] in Macedonia, holy Lydia, a seller of purple, who was the first of all to believe the Gospel there at the preaching of the holy Apostle Paul. [Acts xvi, 14]
          At Bercea, in Syria, [about the year 450,] the holy women Marana and Cyra, [Virgins of Bercea.]
      la:
      - type: text
        text: |-
          Tértio Nonas Augústi

          Philíppis, in Macedónia, sanctæ Lýdiæ purpuráriæ, quæ, prædicánte ibídem sancto Paulo Apóstolo, ut beátus Lucas in Actibus Apostólicis refert, ómnium prima crédidit Evangélio.
          Neápoli, in Campánia, sancti Aspréni Epíscopi, qui a sancto Petro Apóstolo, curátus ab infirmitáte ac deínde baptizátus, eiúsdem civitátis Epíscopus ordinátus fuit.
          Constantinópoli natális sancti Hermélli Mártyris.
          Apud Indos, Persis finítimos, pássio sanctórum Monachórum, et aliórum fidélium, quos Abénner Rex, pérsequens Ecclésiam Dei, divérsis afflíctos supplíciis, cædi iussit.
          Augustodúni deposítio sancti Euphrónii, Epíscopi et Confessóris.
          Anágniæ sancti Petri Epíscopi, qui, monástica primum observántia, deínde pastoráli vigilántia clarus, quiévit in Dómino.
          Beróeæ, in Sýria, sanctárum mulíerum Maránæ et Cyræ.
          Hierosólymis Invéntio beatíssimi Stéphani Protomártyris, et sanctórum Gamaliélis, Nicodémi et Abibónis, sicut Luciáno Presbýtero divínitus revelátum est, Honórii Príncipis témpore.
      en2:
      - type: text
        text: |-
          The Fifth of August
      
          At Philippi, in Macedonia, Saint Lydia the seller of purple, who, when the Apostle Paul was preaching there, as blessed Luke relates in the Acts of the Apostles, was the very first of all to believe the Gospel.
          At Nicomedia, the holy Martyrs Domitius the Priest, and Peregrina, Agrippina, and Theophila, virgins; who, under the Emperor Diocletian, after most cruel torments, completed their martyrdom by decapitation.
          At Nola, in Campania, Saint Oswald, Bishop of York, who was a disciple of blessed Dunstan and illumined England with his virtues and miracles.
  psalm.t-rtio-nonas-dec-mbris-a85b93b10b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 3rd day of December is commemorated the birth into the better life:

          In the island of San-Chan, in the Canton River, in China, holy Francis Xavier of the Society of Jesus, Apostle of the Indies, illustrious for the conversion of the Gentiles, for gifts and miracles, who died, (in the year 1552,) full of good works and labours, upon this present 2nd day of December, but his feast is kept upon the morrow by order of Alexander VII.
          In Judea, the holy prophet Zephaniah, (in the seventh century B.C. He is the ninth of the twelve minor prophets.)
          At Rome, the holy martyrs the Tribune Claudius, his wife Hilaria, their sons Jason and Marus, and seventy soldiers. The Emperor Numerian commanded a great stone to be tied to Claudius and that he should be cast into the river the soldiers and the sons of Claudius he also caused to be put to death. The blessed Hilaria buried the bodies of her sons, and was praying at their grave soon after, when she was seized by the heathen, and departed hence to be ever with the Lord, (about the year 257.)
          At Tangier, in Morocco, (in the year 398,) the holy martyr Cassian. He had of a long time discharged the office of a public clerk when the thought came to him from heaven that it was an accursed thing to serve for the slaughter of Christians he resigned his office therefore, and under the public profession of a Christian he earned the victory of martyrdom, (in the year 398.)
          Likewise in Africa, the holy martyrs Claudius, Crispin, Magina, John, and Stephen.
          In Hungary, the holy martyr Agricola.
          At Nicomedia, the holy martyrs Ambicus, Victor, and Julius.
          At Milan, (about the year 318,) the holy Confessor Mirocles, Bishop (of that see,) of whom mention is made by holy Ambrose.
          In England, holy Brian, first Bishop of Dorchester, (he was a Priest of Rome about the year 650, whose feast we keep upon the 5th day of this present month of December.)
          At Chur, in Switzerland, holy Lucius, King of the Britons (of Morganweg,) who was the first British prince to receive the faith of Christ, in the time of Pope Eleutherius, (about the year 182.)
          At Sienna, in Tuscany, the holy Hermit Galgan, (of the order of St. Benedict. He lived on a mountain called Siepi, and died in the year 1181.)
      la:
      - type: text
        text: |-
          Tértio Nonas Decémbris

          Sancti Francísci Xavérii, Sacerdótis e Societáte Iesu et Confessóris, Indiárum Apóstoli, sodalitátis et óperis Propagándæ Fídei atque Missiónum ómnium Patróni cæléstis; qui prídie huius diéi quiévit in pace.
          In Iudǽa sancti Sophoníæ Prophétæ.
          Romæ sanctórum Mártyrum Cláudii Tribúni, et uxóris Hiláriæ, filiórum Iásonis et Mauri, cum septuagínta milítibus. Ex eis Cláudium iussit Numeriánus Imperátor, ingénti saxo alligátum, in flumen præcípitem dari; mílites vero et ipsíus Cláudii fílios capitáli senténtia puníri. Beáta autem Hilária, cum filiórum córpora sepelísset, paulo post, orans ad eórum sepúlcrum, tenta est a Pagánis, et, in cárcerem trusa, migrávit ad Dóminum.
          Tingi, in Mauritánia, pássio sancti Cassiáni Mártyris, qui, cum exceptóris diu gessísset offícium, tandem, admirátus intrépida beáti Marcélli Centuriónis respónsa et immóbilem in Christi fide constántiam, atque cǽlitus inspirátus, exsecrábile duxit Christianórum neci deservíre; ideóque, cum renuntiásset eídem offício, et ipse, sub Christiána professióne, cápite abscíssus, triúmphum méruit obtinére martýrii.
          Item in Africa sanctórum Mártyrum Cláudii, Crispíni, Magínæ, Ioánnis et Stéphani.
          In Pannónia sancti Agrícolæ Mártyris.
          Nicomedíæ pássio sanctórum Ambici, Victóris et Iúlii.
          Medioláni sancti Miroclétis, Epíscopi et Confessóris; cuius aliquándo sanctus Ambrósius méminit.
          Dorcéstriæ, in Anglia, sancti Biríni, qui fuit primus eiúsdem civitátis Epíscopus.
          Curiæ, in Germánia, sancti Lúcii, Britannórum Regis, qui primus ex iis Régibus fidem Christi suscépit, témpore sancti Eleuthérii Papæ.
          Senis, in Túscia, sancti Galgáni Eremítæ.
      en2:
      - type: text
        text: |-
          The Fifth of December
      
          Saint Francis Xavier, Priest of the Society of Jesus and Confessor, Apostle of the Indies, heavenly Patron of the sodality and work of Propagating the Faith and of all Missions; who, famous throughout the whole world for the preaching of the Gospel and the working of miracles, fell asleep in the Lord on the island of Sancian, near China, in the forty-sixth year of his life and the twelfth of his labors in the missions.
          At Antioch, the holy Martyrs Claudius, Asterius, Neon, Domnica, and Theonilla; who, under the Emperor Diocletian, after enduring bitter torments, were crowned with martyrdom.
          In Africa, Saint Birinus the Bishop, who first preached the Gospel in the province of Wessex among the West Saxons.
          At Mainz, in Germany, the holy Martyrs Cassius and Companions.
  psalm.t-rtio-nonas-febru-rii-4ec6e9eefc:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep in England the feast of the holy Confessor Laurence, Archbishop of Canterbury, who governed that church in succession to holy Augustin, and who converted King Ethelbert himself to the faith, of whom mention is made as upon this day.
          Upon the same 3rd day of February, were born into the better life:

          At Sebaste, in Armenia, the holy martyr Blase, (about the year 316,) Bishop of that city, and the worker of many miracles. Under the President Agricolaus he was long flogged, then hung to a beam, where his flesh was rent with iron combs, then he suffered a foul imprisonment, after which he was cast into the lake, and, forasmuch as he came out thence unhurt, he was beheaded, by order of the same judge, along with two lads.
          Before him seven women, who were collecting the drops of his blood as they fell during the torture, were arrested for being Christians, and after being grievously tormented were put to the sword.
          In Africa, the holy Deacon Celerinus, who was kept nineteen days in prison, and was a glorious confessor of Christ under the lash, and in iron chains and other sufferings, and while he overcame the adversary of his contending by his invincible firmness, he led the way for victories for others, (in the year 280.) Likewise the holy martyrs Laurentinus, (these martyrs mentioned by Cyprian, Letter 34,) and Ignatius, his father's and mother's brothers, and Celerina his grandmother, who had before him been crowned with martyrdom, to the glorious praises of all whom there remaineth to witness an epistle of blessed Cyprian.
          Likewise in Africa, the holy martyrs Felix, Symphronius, Hippolytus, and their Companions, (in the year 270.)
          In the town of Gap, (in the second century,) the holy Bishops Tigides and Remedius.
          At Lyon, (about the year 486,) holy Lupicinus and Felix, Bishops of that see.
          On the same day, (in the year 865,) holy Anschar, Bishop of Bremen, who brought the Swedes and the Danes to believe in Christ.
      la:
      - type: text
        text: |-
          Tértio Nonas Februárii

          Sebáste, in Arménia, pássio sancti Blásii, Epíscopi et Mártyris; qui, multórum patrátor miraculórum, sub Agricoláo Prǽside, post diútinam cæsiónem, atque in ligno suspensiónem, ubi férreis pectínibus carnes eius dirúptæ sunt, post tetérrimum cárcerem et in lacum demérsionem, unde salvus exívit, tandem, iubénte eódem Iúdice, una cum duóbus púeris, cápite truncátur. Ante ipsum vero septem mulíeres, quæ guttas sánguinis, ex eiúsdem Mártyris córpore defluéntes, dum torquerétur, colligébant, proptérea, deprehénsæ quod essent Christiánæ, omnes, post dira torménta, gládio percússæ sunt.
          In Africa sancti Celeríni Diáconi, qui, decem et novem dies custódia cárceris septus, in nervo et ferro variísque pœnis gloriósus fuit Christi Conféssor; et, dum inexpugnábili firmitáte certáminis sui vicit adversárium, vincéndi céteris viam fecit.
          Ibídem sanctórum trium Mártyrum, ipsíus Celeríni Diáconi consanguineórum, scílicet Laurentíni pátrui, Ignátii avúnculi, et Celérinæ áviæ, qui ántea martýrio coronáti fúerant; de quorum ómnium gloriósis láudibus exstat beáti Cypriáni epístola.
          Item in Africa sanctórum Mártyrum Felícis, Symphrónii, Hippólyti et Sociórum.
          In óppido Vapíngo, in Gállia, sanctórum Tigídis et Remédii Episcopórum.
          Lugdúni, in Gállia, sanctórum Lupicíni et Felícis, itidem Episcopórum.
          Bremæ sancti Anschárii, Hamburgénsis ac póstea Breménsis simul Epíscopi, qui Suévos et Danos ad Christi fidem convértit, et a Gregório Papa Quarto Legátus Apostólicus totíus Septentriónis fuit institútus.
      en2:
      - type: text
        text: |-
          The Fifth of February
      
          At Sebaste, in Armenia, the passion of Saint Blaise, Bishop and Martyr; who, a worker of many miracles, under the governor Agricolaus, after long scourging and suspension on a tree, was finally beheaded.
          At the same place, the holy Forty Martyrs of Sebaste; whose commemoration is chiefly kept on the tenth of March.
          At Catania, in Sicily, Saint Agatha, Virgin and Martyr; who, under the Emperor Decius and the governor Quintianus, after most cruel torments, was crowded with the glory of martyrdom, and became famous throughout the whole Church.
          At Rome, Saint Aville the Bishop, who was a disciple of the Apostle Peter.
          At Brescia, in Lombardy, Saint Philastrius the Bishop, who strenuously wrote against heresies.
  psalm.t-rtio-nonas-i-lii-98b41d9e1e:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the Feast of St. Anthony Mary Zaccaria, Confessor, founder of the Clerks Regular of St. Paul, a man illustrious for every virtue, and famous for miracles. Leo XIII enrolled his name among those of the Saints. His body is reverenced at Milan, in the Church of St. Barnabas.
          Upon the same 5th day of July, were born into the better life:

          At Rome, the holy martyr Zoe, the wife of the blessed martyr Nicostratus. She was praying at the grave of the blessed Apostle Peter when she was arrested by the persecutor under the Emperor Diocletian, and committed to a dark prison. In the end she was hung on a tree by her neck and hair, and a thick smoke made below her, and so, constantly confessing the Lord, gave up the Ghost.
          In Syria, the holy martyr Domitius, [in the year 363,] who by his power doth many kindnesses unto the dwellers there.
          At Cyrene, in Libya, the holy martyr Cyrilla, [in the year 310.] In the persecution under Diocletian live embers mixed with incense were laid upon her hand, and she held them there for a long while, lest, if she jerked away the live coals, she should seem to have offered the incense, when she was most cruelly mangled, and so passed away to Christ her Bridegroom adorned with her own blood.
          At Jerusalem, holy Athanasius, Deacon [of the Church of Rome.]
          He was seized by the heretics regarding the holy council of Chalcedon, [held in the year 451,] and after he had been tried with all kinds of torments, was at length slain with the sword, [in the year 452.]
          In Sicily, the holy martyrs Agathon and Triphina.
          At Timisoara, on the Black Sea, the holy martyrs Marinus, Theodotus, and Sedophas.
          At Trier, the holy Confessor Numerian, [Bishop of that see, in the year 657.]
          On the same day is commemorated the holy Confessor Michael de Sanctis, of whom mention is made upon the 10th day of April.
          At San Severino, in Picenum, the holy Virgin Philumena, [sixth century.]
      la:
      - type: text
        text: |-
          Tértio Nonas Iúlii

          Cremónæ, in Insúbria, sancti Antónii-Maríæ Zaccaría Confessóris, qui Clericórum Regulárium sancti Pauli et Angelicárum Vírginum fuit Institútor; atque, virtútibus ómnibus et miráculis insígnis, a Leóne Papa Décimo tértio inter Sanctos adscríptus est. Eius corpus Medioláni, in Ecclésia sancti Bárnabæ, cólitur.
          Romæ sanctæ Zoæ Mártyris, uxóris beáti Nicóstrati Mártyris, quæ, sub Diocletiáno Imperatóre, dum ad confessiónem beáti Petri Apóstoli oráret, a persecutóribus est arctáta et in custódiam obscuríssimam trusa; deínde, collo et capíllis in árbore, adhíbito subter horríbili fumo, suspénsa est, et ita, in confessióne Dómini, emísit spíritum.
          Hierosólymis sancti Athanásii Diáconi, qui, pro sancta Sýnodo Chalcedonénsi, ab hæréticis comprehénsus et ómnium cruciátuum expértus génera, ferro tandem necátus est.
          In Sýria natális sancti Domítii Mártyris, qui virtútibus suis multa íncolis præstat benefícia.
          In Sicília sanctórum Mártyrum Agathónis et Triphínæ.
          Tomis, in Scýthia, sanctórum Mártyrum Maríni, Theódoti et Sédophæ.
          Cyréne, in Líbya, sanctæ Cyríllæ Mártyris, quæ, in persecutióne Diocletiáni, ardéntes carbónes cum thure super manum pósitos diu ténuit, ne, prunas excutiéndo, thus obtulísse viderétur; deínde, sævíssime laniáta, próprio decoráta sánguine migrávit ad Sponsum.
          Tréviris sancti Numeriáni, Epíscopi et Confessóris.
          Apud Septempedános, in Picéno, sanctæ Philoménæ Vírginis.
      en2:
      - type: text
        text: |-
          The Fifth of July
      
          At Cremona, in Lombardy, Saint Anthony Mary Zaccaria the Confessor, who was the founder of the Clerks Regular of Saint Paul and of the Angelical Virgins; and, having excelled in all virtues and miracles, was enrolled in the number of the Saints by Gregory XVI, Supreme Pontiff.
          At Trier, in Germany, the holy Martyrs Numerianus the Bishop, and his Companions.
          At Vercelli, the passing of Saint Liberius, Bishop and Confessor, who endured a most steadfast confession of the faith.
          In Nicomedia, the holy Martyrs Agatho and his Companions, under the Emperor Diocletian.
  psalm.t-rtio-nonas-i-nii-02bf18c977:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Virgin Mary Magdalene de' Pazzi, of the Order of Carmelites, famous for her holy life, of whom mention is made upon the 25th day of the month of May.
          Upon the 3rd day of June were born into the better life:

          At Arezzo, in Tuscany, the holy brethren Pergentinus and Laurentinus, both martyrs. They were boys, who, in the persecution under Decius, after bearing horrid torments and showing forth great works of power, were slain by the sword under the President Tiburtius.
          At Constantinople, the holy martyr Lucillian and his four sons, Claud, Hypatius, Paul, and Denis. Lucillian, before he became a Christian, had been a priest of idols. All the five, after they had been put to various tortures, were cast into a furnace, but rain put out the fire, and they all escaped unhurt. Then Lucillian was crucified, and the children were beheaded, and so under Silvanus the President they finished their testimony.
          At the same place, the holy Virgin and martyr Paula, who was arrested while she was gathering up the blood of the aforesaid martyrs. She was beaten with rods, and cast into the fire, but was delivered, and at last beheaded at the same place where the holy Lucillian had been crucified.
          At Cordova, in Spain, the blessed monk Isaac, who, [in the year 851,] was slain with the sword, [by the Muslims,] for Christ's faith's sake.
          At Carthage, the holy Priest Caecilius, who brought holy Cyprian to believe in Christ.
          In the country of Orleans, [in the year 565,] the holy Confessor Liphard the Priest.
          At Lucca, in Tuscany, [in the year 1051,] the holy Confessor Davin, [the Armenian pilgrim.]
          At Paris, the holy Queen Clotilde, at whose entreaties her husband, King Clovis, accepted the faith of Christ.
          At Anagni, the holy Virgin Oliva.
      la:
      - type: text
        text: |-
          Tértio Nonas Iúnii

          Arétii, in Túscia, sanctórum Mártyrum Pergentíni et Laurentíni fratrum, qui, in persecutióne Décii, sub Tibúrtio Prǽside, cum essent púeri, ibídem, post dira supplícia toleráta et magna mirácula osténsa, gládio cæsi sunt.
          Constantinópoli sanctórum Mártyrum Lucilliáni et quátuor puerórum, scílicet Cláudii, Hypátii, Pauli et Dionýsii. His cum púeris Lucilliánus, ex idolórum sacerdóte Christiánus factus, in fornácem, post vária torménta, iniéctus est, sed, flamma imbre exstíncta, omnes illǽsi evasérunt; dénique, ipse cruci affíxus, púeri autem gládio obtruncáti, sub Silváno Prǽside, consummáti sunt.
          Córdubæ, in Hispánia, beáti Isaac Mónachi, qui, pro Christi fide, gládio necátus est.
          Constantinópoli sanctæ Paulæ, Vírginis et Mártyris, quæ, cum prædictórum Mártyrum Lucilliáni ac Sociórum sánguinem collígeret, ídeo, comprehénsa, virgis percússa, et in ignem coniécta sed liberáta, demum et ipsa eódem loco, ubi sanctus Lucilliánus crucifíxus fúerat, decolláta est.
          Carthágine sancti Cæcílii Presbýteri, qui sanctum Cypriánum ad Christi fidem perdúxit.
          In território Aurelianénsi sancti Liphárdi, Presbýteri et Confessóris.
          Lucæ, in Túscia, sancti Davíni Confessóris.
          Anániæ sanctæ Olívæ Vírginis.
          Lutétiæ Parisiórum sanctæ Clotíldis Regínæ, cuius précibus vir eius Clodovéus, Rex Francórum, Christi fidem suscépit.
      en2:
      - type: text
        text: |-
          The Fifth of June
      
          At Arezzo, in Tuscany, the holy Martyrs Pergentinus and Laurentinus, brothers, who, in the persecution of Decius under the governor Tiburtius, being boys, were there, after dreadful torments endured and a most steadfast confession of the faith, beheaded.
          In Germany, Saint Boniface, Bishop, Martyr, and Apostle of the Germans, who brought many peoples to the faith, and finally, when he was about to administer the Sacrament of Confirmation to the newly baptized, was slain by a mob of pagans at Dokkum on the Bordine River.
          At Ferrara, in Lombardy, the passing of Saint Marcellin, Bishop and Confessor.
          In Gaul, Saint Donatianus the Bishop and Martyr.
          At Rome, the holy Martyrs Illyrian and Demetria.
  psalm.t-rtio-nonas-ianu-rii-cce6a05d28:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Octave of the holy Apostle and Evangelist John.
          Upon the same 3rd day of January, were born into the better life:

          At Rome, upon the Appian Way, holy Pope Anterus, who suffered under the Emperor Julius Maximian, and was buried in the cemetery of Callistus. (He reigned one month and 12 days in the year 236.)
          Upon the same day, holy Peter, who suffered the death of the cross at the city of Aulone. (In the year 311 or 291.)
          On the Hellespont, the holy martyrs Cyrinus, Primus, and Theogenes (about the year 320.) At Caesarea, in Cappadocia, the holy centurion Gordius (about the year 320), in whose praise Basil the Great delivered a noble discourse upon his feast day.
          In Cilicia, the holy martyrs Zozimus and Athanasius the Notary, also the holy martyrs Theopemptus and Theona, who suffered an illustrious martyrdom in the persecution under Diocletian.
          At Padua, the holy martyr Daniel (in the year 168.)
          At Vienne, in Gaul, holy Florence, (8th) bishop of that see (successor to St. Paracodius), who was exiled in the time of the Emperor Gallienus, and there finished his testimony (in the year 252.)
          At Paris (in the year 512), the holy virgin (and Patron of Paris) Genevieve, who was dedicated to Christ by blessed Germanus, Bishop of Auxerre, and was famous for her wondrous graces and miracles.
      la:
      - type: text
        text: |-
          Tértio Nonas Ianuárii

          Romæ, via Appia, natális sancti Anthéri, Papæ et Mártyris; qui sub Iúlio Maximíno passus est, et in cœmetério Callísti sepúltus.
          Viénnæ, in Gállia, sancti Floréntii Epíscopi, qui, témpore Galliéni Imperatóris, in exsílium relegátus, illic martýrium consummávit.
          Apud civitátem Aulánam, in Palæstína, pássio sancti Petri, qui crucis supplício interémptus est.
          In Hellespónto sanctórum Mártyrum Cyríni, Primi et Theogénis.
          Cæsaréæ, in Cappadócia, sancti Górdii Centuriónis, Mártyris; de cuius láudibus exstat præclára Basílii Magni orátio, in eius die festo hábita.
          In Cilícia sanctórum Mártyrum Zósimi, et Athanásii Commentariénsis.
          Item sanctórum Theopémpti et Theónæ, qui, in persecutióne Diocletiáni, illústre martýrium obiérunt.
          Patávii sancti Daniélis Mártyris.
          Lutétiæ Parisiórum sanctæ Genovéfæ Vírginis, quæ, a beáto Germáno, Antisiodorénsi Epíscopo, Christo dicáta, admirándis virtútibus et miráculis cláruit.
      en2:
      - type: text
        text: |-
          The Fifth of January
      
          At Rome, on the Appian Way, the birth of Saint Anterus, Pope and Martyr; who suffered under Julius Maximinus and was buried in the cemetery of Callixtus.
          At Vienne, in Gaul, Saint Florentinus the Bishop, who, a disciple of blessed Irenaeus, faithfully propagated the Gospel.
          In Nicomedia, the holy Martyrs Theopemptus the Bishop and Theonas.
          In Cappadocia, Saint Syncliticia the Virgin and her sister Theonilla; who were beheaded for the faith of Christ.
          At Trier, Saints Celsus and Felicissima.
          In Armenia, Saints Indus and Domna, with many others.
  psalm.t-rtio-nonas-m-rtii-84b4e2ecfe:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 5th day of March, were born into the better life:

          At Antioch, [about the year 320,] the holy martyr Phocas. For the Redeemer's name's sake he gained the victory over many an assault of the old serpent, and that victory is still held forth before the people, with this miracle, that if any be bitten of a serpent and touch in faith the door of this martyr's church, he is forthwith healed of the poison.
          At Cassarea, in Palestine, [in the year 308,] the holy martyr Hadrian, who was crowned by command of the President Firmilian, in the persecution under the Emperor Diocletian. He was first thrown to a lion, but afterward slain with the sword.
          On the same day, the holy martyr Eusebius, and nine others.
          At Caesarea, in Palestine, [in the year 200,] holy Theophilus, Bishop of that see, who was a great light for wisdom and good living in the time of the Emperor Severus.
          Likewise in Palestine, on the bank of the Jordan, [in the year 475,] the holy hermit Gerasimus, who flourished in the time of the Emperor Zeno.
          At Naples, [in the year 1734,] holy John Joseph of the Cross, barefooted Friar Minor, first Provincial of the Italian followers of holy Peter of Alcantara. He strove to tread in the footsteps of holy Francis of Assisi and Peter of Alcantara, was a bright ornament of the Seraphic Order, and was numbered among the saints by Pope Gregory XVI.
      la:
      - type: text
        text: |-
          Tértio Nonas Mártii

          Antiochíæ natális sancti Phocæ Mártyris, qui, post multas, quas pro nómine Redemptóris passus est, iniúrias, quáliter de antíquo illo serpénte triumpháverit, hódie quoque pópulis eo miráculo declarátur, quod, si quíspiam a serpénte morsus fúerit, hic, ut iánuam Basílicæ Mártyris credens attígerit, conféstim, evacuáta venéni virtúte, sanátur.
          Cæsaréæ, in Palæstína, sancti Hadriáni Mártyris, qui in persecutióne Diocletiáni Imperatóris, iussu Firmiliáni Prǽsidis, prius ob Christi fidem leóni obiéctus, deínde gládio iugulátus, martýrii corónam accépit.
          Eódem die pássio sanctórum Eusébii Palatíni, et aliórum novem Mártyrum.
          Cæsaréæ, in Palæstína, sancti Theóphili Epíscopi, qui sub Sevéro Príncipe, sapiéntia et vitæ integritáte conspícuus, emícuit.
          Ad ripam Iordánis, item in Palæstína, sancti Gerásimi, Anachorétæ et Abbátis, qui témpore Zenónis Imperatóris flóruit.
          Neápoli, in Campánia, deposítio sancti Ioánnis-Ioséphi a Cruce, Sacerdótis ex Ordine Minórum et Confessóris, qui, sanctórum Francísci Assisiénsis et Petri de Alcántara stúdia æmulátus, Ordini Seráphico insígne decus áddidit, atque a Gregório Papa Décimo sexto in Sanctórum cánonem est relátus.
      en2:
      - type: text
        text: |-
          The Fifth of March
      
          At Antioch, the birth of Saint Phocas the Martyr, who, after many injuries suffered for the name of the Redeemer, how he triumphed over that ancient serpent, even today he declares to the peoples by his miracles.
          At Rome, Saint Lucius I, Pope and Martyr, who, after enduring many hardships for the faith, was crowned with martyrdom.
          In Africa, Saint Peregrinus the Bishop and Martyr, who strenuously defended the faith.
          In Asia, the holy Martyrs Emilian the Bishop and Casian the Lector, with others.
  psalm.t-rtio-nonas-maii-fc062a9f12:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Virgin Catherine of Siena, of the Order of St. Dominic, famous for her life and miracles, whose name Pius II enrolled among those of the holy Virgins, and of whom mention is made upon the 30th day of April.
          Upon the same 5th day of May, were born into the better life:

          At Rome, [in the year 1572,] the holy Pope Pius V, of the Order of Friars Preachers, who toiled mightily and happily to restore the discipline of the Church, to root out heresies, and to crush the enemies of Christianity, and who governed the Catholic Church in holiness of life and law-giving; whose feast we keep upon the 11th day of this present month of May.
          Likewise at Rome, the holy martyr Crescentiana.
          Likewise at Rome, the holy martyr Silvanus.
          At Alexandria, the holy Deacon Euthymius, who died a prisoner for Christ's sake.
          At Thessalonica, the holy martyrs Irenaeus, Peregrinus, and Irene, who were burnt with fire.
          At Auxerre, [in the year 304,] the holy martyr, the Reader Jovinian.
          At Licata, in Sicily, [about the year 1220,] the holy Priest Angelus, of the Order of Carmelite Friars, who was murdered by heretics for defending the Catholic faith.
          At Jerusalem, the holy Confessor Maximus, Bishop of that city. The Caesar Maximian Galerius plucked out one of his eyes, maimed one of his feet with hot iron, and condemned him to penal servitude in the mines.
          At Edessa, in Syria, the holy Confessor Eulogius, Bishop of Edessa.
          At Arles, in Gaul, [in the year 449,] holy Hilary, Bishop [of Arles,] famous for his teaching and holiness.
          At Vienne, in Gaul, [about the fourth century,] holy Nicetus, Bishop of that see, worshipful for his holiness.
          At Bologna, [about the year 540,] holy Theodore, Bishop [of that see,] famous for his worthy works.
          Likewise, [about the year 550,] holy Sacerdos, Bishop of Murviedro, in Spain.
          At Milan, [in the year 470,] holy Gerontius, Bishop [of that see.]
          On this day is also commemorated, at Milan, the conversion of holy Augustine, Bishop [of Hippo,] and Doctor of the Church, to whom the truth of the Catholic faith was taught by the blessed Ambrose, Bishop [of Milan,] and whom he upon this day baptized.
      la:
      - type: text
        text: |-
          Tértio Nonas Maii

          Sancti Pii Quinti, ex Ordine Prædicatórum, Papæ et Confessóris, qui Kaléndis mensis huius obdormívit in Dómino.
          Romæ sancti Silváni Mártyris.
          Item Romæ sanctæ Crescentiánæ Mártyris.
          Leocátæ, in Sicília, sancti Angeli, ex Ordine Carmelitárum, Presbýteri et Mártyris, qui ab hæréticis, ob defensiónem cathólicæ fídei, trucidátus est.
          Alexandríæ sancti Euthýmii Diáconi, qui ob Christum quiévit in cárcere.
          Antisiodóri pássio sancti Ioviniáni Lectóris.
          Thessalonícæ natális sanctórum Mártyrum Irenǽi, Peregríni et Irénes, qui, ígnibus combústi, palmas martýrii percepérunt.
          Hierosólymis sancti Máximi Epíscopi, qui a Maximiáno Galério Cǽsare, post óculum effóssum pedémque igníto ferro adústum, ad metálla damnátus est; atque, liber inde abíre permíssus et Ecclésiæ Hierosolymitánæ præpósitus, ibi, confessiónis glória præclárus, in pace tandem quiévit.
          Edéssæ, in Sýria, sancti Eulógii, Epíscopi et Confessóris.
          Areláte, in Gállia, sancti Hilárii Epíscopi, doctrína et sanctitáte conspícui
          Viénnæ, in Gállia, sancti Nicéti Epíscopi, venerábilis sanctitátis viri.
          Bonóniæ sancti Theodóri Epíscopi, méritis clari.
          Medioláni sancti Gerúntii Epíscopi.
          Eódem die sancti Sacerdótis, Epíscopi Saguntíni.
      en2:
      - type: text
        text: |-
          The Fifth of May
      
          Saint Pius V, of the Order of Preachers, Pope and Confessor, who fell asleep in the Lord on the Kalends of this month.
          At Rome, Saint Silvanus the Martyr.
          Also at Rome, Saint Crescentiana the Martyr.
          At the same place, the holy Martyrs Irenaeus, Peregrinus, and Irene, who, cast into a river, completed their martyrdom.
          In Africa, Saint Maximus, Bishop and Confessor, who was renowned for his works against the Donatists.
  psalm.t-rtio-nonas-nov-mbris-4bbd31c079:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep in England the feast of the holy Virgin and martyr Winefrid.
          Upon the same 3rd day of November, were also born into the better life:

          Holy Quartus, the disciple of the Apostles.
          At Caesarea, in Cappadocia, the holy martyrs Germanus, Theophilus, Caesarius, and Vitalis, who bore a noble testimony in the persecution under the Emperor Decius.
          At Saragossa, countless holy martyrs, who wondrously laid down their lives for Christ's sake under Dacian, President of Spain, (in the year 304.)
          At Viterbo, the holy martyrs Valentine the Priest and Hilary the Deacon, who, in the persecution under the Emperor Maximian, were for Christ's faith's sake cast into the Tiber weighted with stones, but by the will of God were thence delivered by an Angel, and received the crown of martyrdom by being beheaded.
          At the monastery of Clairvaux, (in the year 1148,) holy Maleachlan, Archbishop of Armagh, in Ireland, who in his time shone with many graces, and whose life hath been written by the holy Abbot Bernard.
          On the same day, (in the year 727,) holy Hubert, Bishop of Tongres.
          At Vienne, (in the sixth century,) holy Domnus, Bishop (of that see.)
          Likewise (in the year 755,) holy Pirmin, Bishop of Meaux.
          At Urgel, in Spain, holy Hermengaudus, Bishop (of that see.)
          At Rome, holy Sylvia, the mother of holy Pope Gregory.
      la:
      - type: text
        text: |-
          Tértio Nonas Novémbris

          Medioláni natális sancti Cároli Borromǽi Cardinális, Epíscopi Mediolanénsis et Confessóris, quem, sanctitáte conspícuum et miráculis clarum, Paulus Papa Quintus in sanctórum númerum rétulit. Ipsíus tamen festívitas sequénti die celebrátur.
          Eódem die natális quoque sancti Quarti, Apostolórum discípuli.
          Vitérbii sanctórum Mártyrum Valentíni Presbýteri, et Hilárii Diáconi, qui, in persecutióne Maximiáni, ob Christi fidem, cum saxi póndere in Tíberim præcipitáti et inde ab Angelo divínitus erépti, demum, abscíssis cervícibus, corónam martýrii percepérunt.
          Cæsaréæ, in Cappadócia, sanctórum Mártyrum Germáni, Theóphili, Cæsárii et Vitális; qui, in persecutióne Deciána, óptime duxérunt martýrium.
          Cæsaraugústæ, in Hispánia, sanctórum innumerabílium Mártyrum, qui, sub Hispaniárum Prǽside Daciáno, mirabíliter occubuérunt pro Christo.
          In Anglia sanctæ Wenefrídæ, Vírginis et Mártyris.
          In monastério Clarævallénsi, in Gállia, deposítio sancti Malachíæ, Connerthénsis in Hibérnia Epíscopi, qui multis virtútibus suo témpore cláruit; cuius vitam sanctus Bernárdus Abbas conscrípsit.
          Eódem die sancti Hubérti, Tungrénsis Epíscopi.
          Viénnæ, in Gállia, sancti Domni, Epíscopi et Confessóris.
          Item deposítio sancti Pirmíni, Meldénsis Epíscopi.
          Urgéllæ, in Hispánia Tarraconénsi, sancti Hermengáudii Epíscopi.
          Romæ sanctæ Sílviæ, matris sancti Gregórii Papæ.
      en2:
      - type: text
        text: |-
          The Fifth of November
      
          At Milan, the birth of Saint Charles Borromeo, Cardinal, Bishop of Milan and Confessor, whom Pope Paul V, conspicuous for holiness and renowned for miracles, enrolled in the number of the Saints; and who, in the time of the pestilence, never ceased from performing every duty of charity toward his people.
          At Rome, the holy Martyrs Eusebius, Marcellus, Hypatius, Filetus, Lucian, and Pigasius; who were subjected to diverse torments and beheaded.
          At the same place, Saint Galactio the Monk and Epistemis his wife; who, when she was converted by him to the faith, they both together embraced the monastic life, and completed their lives gloriously in martyrdom.
          At Capua, the holy Martyrs Domitian, Victor, and a Companion.
  psalm.t-rtio-nonas-oct-bris-68bbca6dc8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 5th day of October, were born into the better life:

          At Messina, in Sicily, (in the year 546,) the holy monk Placidus, a disciple of the blessed Abbot Benedict, his brothers Eutychius and Victorinus, and the Virgin Flavia, their sister, along with Donatus, the Deacon Firmatus, Faustus, and thirty other monks, all martyrs, who were massacred for Christ's faith's sake, by the pirate Manucha.
          Upon the same day, (in the year 171,) blessed Thraseas, Bishop of Eumenia, who achieved his martyrdom at Smyrna.
          At Trier, the holy martyrs Palmatius and his Companions, who underwent martyrdom under the President Rictiovarus, in the persecution under the Emperor Diocletian.
          On the same day, the holy Virgin Charitina, under the Emperor Diocletian and the Consular Domitius. She was tormented with fire, and cast into the sea, whence she came forth unharmed, then her hands and feet were cut off, and her teeth shaken, and she gave up her soul in prayer to God.
          At Auxerre, the holy Deacon Firmatus, (in the fifth or sixth century,) and the Virgin Flaviana his sister.
          At Ravenna, the holy Confessor Marcellinus, Bishop of (that see.)
          At Valence, in Gaul, holy Apollinaris, (about the year 520,) Bishop (of that see) his life was famous for his graces, and his death was marked by signs and wonders.
          Upon the same day holy Attilan, Bishop of Zamora, whose name Urban II. numbered with those of the Saints.
          At Leon, (in the year 1006,) in Spain, holy Froilan, Bishop of that city, famous for his zeal in spreading the monastic life, his goodness toward the poor, and other graces and wonders.
          At Rome, the holy widow Galla, daughter of the Consul Symmachus after the death of her husband she passed many years at the church of blessed Peter, intent upon prayer, alms, fastings, and other holy works. Holy Pope Gregory hath written of her right blessed passage hence.
      la:
      - type: text
        text: |-
          Tértio Nonas Octóbris

          Messánæ, in Sicília, natális sanctórum Mártyrum Plácidi Mónachi, e beáti Benedícti Abbátis discípulis, et eius fratrum Eutýchii et Victoríni, ac soróris eórum Fláviæ Vírginis, itémque Donáti, Firmáti Diáconi, Fausti et aliórum trigínta Monachórum, qui omnes a Manúcha piráta, pro Christi fide, necáti sunt.
          Apud Smyrnam item natális beáti Thraséæ, Epíscopi Euméniæ, martýrio consummáti.
          Antisiodóri deposítio sanctórum germanórum Firmáti Diáconi, et Flaviánæ Vírginis.
          Tréviris sanctórum Mártyrum Palmátii et Sociórum; qui, in persecutióne Diocletiáni, sub Rictiováro Prǽside, martýrium subiérunt.
          Eódem die pássio sanctæ Charitínæ Vírginis, quæ, sub Diocletiáno Imperatóre et Domítio Consulári, ígnibus est cruciáta et in mare proiécta, et, cum inde incólumis evasísset, tandem, mánibus et pédibus abscíssis dentibúsque convúlsis, in oratióne spíritum emísit.
          Ravénnæ sancti Marcellíni, Epíscopi et Confessóris.
          Valéntiæ, in Gállia, sancti Apollináris Epíscopi, cuius vita virtútibus fuit illústris, et mors signis ac prodígiis decoráta.
          Eódem die sancti Attiláni, Epíscopi Zamorénsis, quem beátus Urbánus Papa Secúndus in Sanctórum númerum rétulit.
          Romæ sanctæ Gallæ Víduæ, fíliæ Sýmmachi Cónsulis, quæ, viro suo defúncto, apud Ecclésiam beáti Petri multis annis oratióni, eleemósynis, ieiúniis aliísque sanctis opéribus inténta permánsit; cuius felicíssimum tránsitum sanctus Gregórius Papa descrípsit.
      en2:
      - type: text
        text: |-
          The Fifth of October
      
          At Messina, in Sicily, the birth of the holy Martyrs Placid the Monk, one of the disciples of Abbot Benedict, and his brothers Eutychius and Victorinus, and their sister Flavia the Virgin, with Donatus the Priest, Faustus the Deacon, and thirty others; who were slain by the pirates Manaces and Adrictus.
          At the same place, the birth of the holy Martyrs Minnaeus the Monk and his Companions, who suffered in the same persecution.
          At Rome, Saint Apollinaris the Confessor and Bishop, who was a disciple of blessed Peter the Apostle and governed many churches.
          In Tuscany, Saints Titus and Modestus the Martyrs.
  psalm.t-rtio-nonas-sept-mbris-435f6c9bab:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is commemorated at Rome the holy Virgin Serapia. Under the Emperor Hadrian she was given over to two young rakes, but they could not deflower her. Neither could she afterwards be burnt with torches, wherefore, by the command of the judge Berillus, she was cudgelled and then beheaded with the sword. She suffered upon the 29th day of July, and was buried by blessed Sabina in her own sepulchre hard by the threshing-floor of Vindician. But the memory of her martyrdom is kept the most chiefly upon the 3rd day of September, when the stone coffin of Sabina and of herself was there set in order and adorned, and the place of prayer was meetly dedicated.
          Upon the same 3rd day of September, were born into the better life:

          At Corinth, holy Phoebe, of whom the blessed Apostle Paul doth make mention in writing unto the Romans.
          At Aquileia, the holy Virgins, Euphemia, Dorothy, Thecla, and Erasma, all martyrs, who, after many torments, were slain with the sword under Nero, and were buried by holy Hermagoras.
          At Capua, (in the persecution under the Emperor Diocletian,) the holy martyrs Aristaeus, Bishop (of that see,) and the little lad Antonine.
          At Nicomedia, the holy Virgin and martyr Basilissa, who, at nine years of age, in the persecution under the Emperor Diocletian, by the power of God triumphed over stripes, fire, and wild beasts, under the President Alexander, and gave up her soul in prayer to God.
          Likewise the holy martyrs Zeno and Chariton, whereof the one was cast into a vessel of molten lead and the other into a fiery furnace.
          At Cordova, the holy martyr Sandalus, (who suffered in the persecution under the same Emperor Diocletian.) Upon the same day, (in the seventh century,) the holy martyrs Aigulph, Abbot of Lerins, and the monks his Companions, who had their tongues cut out and their eyes put out, and were beheaded with the sword.
          At Toul, in Lorraine, (in the fourth century,) the holy Confessor Mansuetus, Bishop (of that see.) At Milan, (in the sixth century,) deceased holy Auxanus, Bishop (of that see.) Upon the same day, (at the end of the sixth century,) the holy Stylite Simeon the Younger.
          At Rome is commemorated the Ordination as Supreme Pontiff of that excellent man holy Gregory the Great; the compulsion which forced that burden upon him caused the rays of his holiness to shine through all the world, all the clearer in that they shone from an higher spot.
      la:
      - type: text
        text: |-
          Tértio Nonas Septémbris

          Sancti Pii Papæ Décimi, cuius natális dies tertiodécimo Kaléndas Septémbris recensétur.
          Corínthi natális sanctæ Phœbes, cuius méminit beátus Apóstolus Paulus ad Romános scribens.
          Cápuæ sanctórum Mártyrum Aristǽi Epíscopi, et Antoníni púeri.
          Eódem die natális sanctórum Mártyrum Aigúlphi, Abbátis Lirinénsis, et Sociórum ipsíus Monachórum, qui, linguis præcísis oculísque effóssis, gládio obtruncáti sunt.
          Item sanctórum Mártyrum Zenónis et Charitónis; quorum alter in lebétem liquáti plumbi coniéctus est, alter in ignis fornácem immíssus.
          Córdubæ, in Hispánia, sancti Sándali Mártyris.
          Aquiléiæ sanctárum Vírginum et Mártyrum, Euphémiæ, Dorótheæ, Theclæ et Erásmæ, quæ, sub Neróne Imperatóre et Sebásto Prǽside, post multa supplícia, gládio cæsæ sunt, et a sancto Hermágora sepúltæ.
          Nicomedíæ pássio sanctæ Basilíssæ, Vírginis et Mártyris; quæ, annos novem nata, cum in persecutióne Diocletiáni Imperatóris, sub Alexándro Prǽside, vérbera, ignes ac béstias divína virtúte superásset, ipsum Prǽsidem ad Christi fidem convértit, ac tandem extra urbem in oratióne spíritum Deo réddidit.
          Tulli, in Gállia, sancti Mansuéti, Epíscopi et Confessóris.
          Medioláni deposítio sancti Auxáni Epíscopi.
          Eódem die sancti Simeónis Stylítæ iunióris.
          Romæ Translátio sanctæ Serápiæ, Vírginis et Mártyris; quæ passa est quarto Kaléndas Augústi.
          Item Romæ Ordinátio incomparábilis viri sancti Gregórii Magni in Summum Pontíficem; qui, onus illud subíre coáctus, e sublimióri throno clarióribus sanctitátis radiis in Orbe refúlsit.
      en2:
      - type: text
        text: |-
          The Fifth of September
      
          Saint Pius X, Pope, whose birth is commemorated on the thirteenth day before the Kalends of September.
          At Corinth, the birth of Saint Phoebe, whom the blessed Apostle Paul commemorates in writing to the Romans, calling her a servant of the Church of Cenchreae.
          At Capua, Saint Quintus the Bishop, who was a disciple of the Apostles, and, having gained many souls for Christ, flourished in the highest renown of holiness.
          At Thessalonica, Saint Bertha the Virgin and Martyr, who suffered great torments for the faith of Christ.
          In Tuscany, Saint Romulus the Bishop, who was a disciple of the Apostle Peter, and whose life was adorned with remarkable miracles.
  psalm.tertiod-cimo-kal-ndas-apr-lis-207c3fe00a:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 20th day of March, were born into the better life:

          In England, holy Cuthbert, Bishop of Lindisfarne, who from his childhood until his death shone with holy works and miraculous signs [, in the year 687].
          In Judea, holy Joachim, father of the Most Blessed Virgin Mary, Mother of God. We keep his feast upon the Lord's day within the octave of the Assumption of the same Blessed Virgin Mary.
          In Asia, holy Archippus, the fellowsoldier of the blessed Apostle Paul, of whom the same Apostle doth make mention in his Epistles unto Philemon and unto the Colossians. [Archippus is called by St. Ambrose, Bishop of the Colossians.]
          In Syria, the holy martyrs Paul, Cyril, Eugene, and four others.
          On the same day, the holy martyrs Photina of Samaria and her sons Joseph and Victor, also Sebastian the general, Anatolius, Photius, Photis, Parasceve, and Cyriaca, sisters, who all confessed Christ and obtained martyrdom.
          At Amisus, in Paphlagonia, the seven holy women, Alexandra, Claudia, Euphrasia, Matrona, Juliana, Euphemia, and Theodosia, who were slain for confessing the faith, and to whom were added afterward Derphuta and her sister [, about the year 300].
          At Apollonia, holy Nicetas, Bishop of that see, who was driven into banishment for the honouring of holy images, and there gave up the ghost [, eighth century].
          At the monastery of Fontenelle, holy Wolfran, Bishop of Sens, who resigned his see, and died famous for miracles [, in the year 720].
          At Sienna, in Tuscany, blessed Ambrose, of the Order of Friars Preachers, famous for his holiness, his preachments, and his miracles [, in the year 1286].
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Aprílis

          In Iudǽa natális sancti Ióachim, patris immaculátæ Vírginis Genetrícis Dei Maríæ, Confessóris. Ipsíus tamen festum ágitur décimo séptimo Kaléndas Septémbris.
          In Asia item natális sancti Archíppi, qui beáti Pauli Apóstoli éxstitit commílito, et cuius ipse in Epístola ad Philémonem et ad Colossénses méminit.
          In Sýria sanctórum Mártyrum Pauli, Cyrílli, Eugénii et aliórum quátuor.
          Eódem die sanctórum Photínæ Samaritánæ, Ioseph et Victóris filiórum, itémque Sebastiáni Ducis, Anatólii, Phótii, Phótidis, Parascéves et Cyríacæ germanárum; qui omnes, Christum conféssi, martýrium sunt assecúti.
          Amísi, in Paphlagónia, sanctárum septem mulíerum, scílicet Alexándræ, Cláudiæ, Euphrásiæ, Matrónæ, Iuliánæ, Euphémiæ et Theodósiæ; quæ in fídei confessióne sunt cæsæ, eásque secútæ sunt Derphúta et soror ipsíus.
          Apollóniæ sancti Nicétæ Epíscopi, qui, pro sanctárum Imáginum cultu eiéctus in exsílium, illic réddidit spíritum.
          In monastério Fontanéllæ, in Gállia, sancti Wulfránni, Epíscopi Senonénsis, qui, relícto Episcopátu, ibídem, clarus miráculis, decéssit e vita.
          In Británnia deposítio sancti Cuthbérti, Epíscopi Lindisfarnénsis, qui, a puerítia ad óbitum usque, sanctis opéribus et miraculórum signis effúlsit.
          Senis, in Túscia, Beáti Ambrósii, ex Ordine Prædicatórum, sanctitáte, prædicatióne et miráculis clari.
      en2:
      - type: text
        text: |-
          The Twentieth of March
      
          In Judea, the birth of Saint Joachim, father of the immaculate Virgin Mother of God, Confessor. His feast, however, is celebrated on the seventeenth day before the Kalends of September.
          Also in Asia, the blessed Apostle John, at Ephesus.
  psalm.tertiod-cimo-kal-ndas-aug-sti-802f86eb27:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Jerome Miani, founder of the congregation of Somascha, famous for diverse miracles in his life and since his death [in the year 1537,] whose name Pope Clement XIII solemnly enrolled among those of the saints, and of whom mention is made upon the 8th day of February.
          Upon the same 20th day of July, was born into the better life:

          At Antioch, the holy Virgin and martyr Margaret, [in the year 275.]
          On Mount Carmel is commemorated the holy Prophet Elijah, [of Thesbe, 880 B.C.]
          The blessed Joseph called Barsabas, who was surnamed Justus, whom the Apostles appointed along with blessed Matthias that he might take part of the ministry and apostleship, from which Judas by transgression fell. The lot fell upon Matthias, but Joseph nevertheless served in the office of preaching and sanctification, and bore much persecution of the Jews for Christ's faith's sake. He fell asleep in Judea, in a triumphant end. It is told of him that he drank poison, and was unharmed thereby because of his faith in the Lord.
          At Damascus, the holy martyrs Sabinus, Julian, Maximus, Macrobius, Cassia, and Paula, and ten others.
          At Cordova, the holy Deacon Paul. He rebuked the unbelieving princes for their Mohammedan ungodliness and cruelty and constantly preached Christ, wherefore the said princes commanded him to be slain, and he passed away, to receive a martyr's reward in heaven, [in the year 851.]
          In Portugal, the holy Virgin and martyr Wilgefortes, who contended for Christian faith and chastity, and obtained a glorious triumph upon the Cross. [This is probably the same person as St Liberata on January 28.]
          In the country of Boulogne, in Gaul, the holy Abbot Vulmar, a man of wonderful holiness, [in the year 689. Founder of the Abbey of Samer, in the Diocese of Arras.]
          At Trier, the holy Virgin Severa, [in the year 660.]
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Augústi

          Sancti Hierónymi Æmiliáni Confessóris, Congregatiónis Somáschæ Institutóris, cæléstis ómnium orphanórum ac derelíctæ iuventútis Patróni; qui sexto Idus Februárii obdormívit in Dómino.
          Antiochíæ pássio sanctæ Margarítæ, Vírginis et Mártyris.
          In monte Carmélo sancti Elíæ Prophétæ.
          In Iudǽa natális beáti Ioseph, qui cognominátus est Iustus, quem Apóstoli cum beáto Matthía statuérunt ut locum apostolátus Iudæ proditóris impléret; sed, cum sors cecidísset super Matthíam, ipse, nihilóminus prædicatiónis et sanctitátis offício insérviens, multámque pro fide Christi a Iudǽis persecutiónem sústinens, victorióso fine quiévit. De quo étiam refértur quod venénum bíberit, et nihil ex hoc triste propter Dómini fidem pertúlerit.
          Córdubæ, in Hispánia, sancti Pauli, Diáconi et Mártyris; qui, cum infidéles príncipes argúeret Mahuméticæ impietátis ac sævítiæ, et Christum constantíssime prædicáret, idcírco, eórum iussu necátus, ad prǽmia evolávit in cælum.
          Damásci sanctórum Mártyrum Sabíni, Iuliáni, Máximi, Macróbii, Cássiæ et Paulæ, cum áliis decem.
          In Lusitánia sanctæ Wilgefórtis, Vírginis et Mártyris; quæ, pro Christiána fide ac pudicítia decértans, in cruce méruit gloriósum obtinére triúmphum.
          Eódem die natális sanctórum Flaviáni Secúndi, Epíscopi Antiochéni, et Elíæ, Epíscopi Hierosolymitáni; qui, pro Sýnodo Chalcedonénsi ab Anastásio Imperatóre ambo in exsílium acti, victóres migrárunt ad Dóminum.
          In pago Bononiénsi, in Gállia, sancti Vulmári Abbátis, admirándæ sanctitátis viri.
          Tréviris sanctæ Sevéræ Vírginis.
      en2:
      - type: text
        text: |-
          The Twentieth of July
      
          Saint Jerome Emiliani the Confessor, founder of the Congregation of Somascha, heavenly Patron of all orphans and abandoned youth; who fell asleep in the Lord on the sixth of the Ides of February.
          At Antioch, the passion of Saint Margaret, Virgin and Martyr.
          On Mount Carmel, Saint Elijah the Prophet.
          In Judea, the birth of blessed Joseph called Justus, whom the Apostles together with blessed Matthias placed to fill the place of the apostleship of Judas the traitor; but when the lot fell upon Matthias, he himself, nevertheless serving the office of preaching and holiness, and enduring much persecution for the faith of Christ from the Jews, rested in a victorious end. Of him it is also related that he drank poison and suffered no harm therefrom on account of his faith in the Lord.
          At Córdoba, in Spain, Saint Paul, Deacon and Martyr; who, when he rebuked the infidel rulers for their Mohammedan impiety and cruelty, and most steadfastly preached Christ, was for that reason killed at their command, and flew away to his heavenly reward.
          At Damascus, the holy Martyrs Sabinus, Julian, Maximus, Macrobius, Cassia, and Paula, with ten others.
          In Lusitania, Saint Wilgefortis, Virgin and Martyr; who, striving for the Christian faith and chastity, merited to obtain a glorious triumph on the Cross.
          On the same day, the birth of the holy Flavian II, Bishop of Antioch, and Elijah, Bishop of Jerusalem; who, driven into exile by the Emperor Anastasius for the Council of Chalcedon, both departed as victors to the Lord.
          In the region of Boulogne, in Gaul, Saint Vulmar the Abbot, a man of wondrous holiness.
          At Trier, Saint Severa the Virgin.
  psalm.tertiod-cimo-kal-ndas-dec-mbris-477faf1ee3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of November, were born into the better life:

          At Marburg, in Germany, (in the year 1231,) the holy Widow Elizabeth, (Landgravine of Hesse and Thuringia,) of the third Order of St Francis, daughter of Andrew II, King of Hungary, busied without ceasing in works of mercy and famous for miracles.
          On the same day, the holy martyr, Pope Pontian, who was exiled to Sardinia along with the Priest Hippolytus, under the Emperor Alexander, and was there cudgelled to death. His body was brought to Rome by blessed Pope Fabian, and buried in the cemetery of Kallistus.
          At Samaria, the holy Prophet Obadiah.
          At Rome, upon the Appian Way, the holy martyr Maximus, a Priest, who suffered in the persecution under the Emperor Valerian, and was buried hard by holy Pope Xystus.
          At Caesarea, in Cappadocia, the holy martyr Barlaam. He was an unlettered peasant, but filled with the wisdom of Christ, and by the steadfastness of his faith conquered the tyrant (Diocletian) and his fire. Holy Basil the Great preached a famous sermon upon his feast-day.
          In the city of Ecija, blessed Crispin, Bishop (of that see,) who was beheaded, and so won the glory of martyrdom.
          At Vienne, in Gaul, (in the second century,) the holy martyrs Severinus, Exuperius, and Felician after many years had passed they themselves revealed where their bodies were lying the which, being so found, were honourably taken up by the Bishop, clergy, and people of that city, and buried again with due reverence.
          Upon the same day, holy Faustus, a Deacon of Alexandria, who was first sent into exile along with holy Denys in the persecution under the Emperor Valerian, and afterwards in his old age was beheaded in the persecution under the Emperor Diocletian.
          In Isauria, under the Emperor Diocletian and the Tribune Aquilinus, the holy martyrs Azas and a hundred and fifty Companions, all soldiers.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Decémbris

          In óppido Marpúrgi, in Germánia, deposítio sanctæ Elísabeth Víduæ, Regis Hungarórum Andréæ fíliæ, ex tértio Ordine sancti Francísci, quæ, pietátis opéribus assídue inténta, miráculis clara migrávit ad Dóminum.
          Sancti Pontiáni, Papæ et Mártyris; cuius dies natális tértio Kaléndas Novémbris recensétur.
          Samaríæ, in Palæstína, sancti Abdíæ Prophétæ.
          Romæ, via Appia, natális sancti Máximi, Presbýteri et Mártyris, qui, in persecutióne Valeriáni passus, pósitus est ad sanctum Xystum.
          In civitáte Astiagénsi, in Hispánia, beáti Crispíni Epíscopi, qui, cápite amputáto, martýrii glóriam adéptus est.
          Eódem die sancti Fausti, Diáconi Alexandríni, qui primum, in persecutióne Valeriáni, cum sancto Dionýsio, in exsílium missus est; deínde, ætáte longǽvus, in persecutióne Diocletiáni, animadvérsus gládio martýrium consummávit.
          Cæsaréæ, in Cappadócia, sancti Bárlaam Mártyris, qui, agréstis licet et rudis, Christi sapiéntia munítus tyránnum vicit, et ignem ipsum per invíctam fídei constántiam superávit; in cuius die natáli sanctus Basilíus Magnus célebrem hábuit oratiónem.
          Viénnæ, in Gállia, sanctórum Mártyrum Severíni, Exsupérii et Feliciáni; quorum córpora, post multa annórum currícula, ipsis revelántibus, invénta, et a Pontífice, clero et pópulo illíus urbis honorífice subláta, condígno honóre cóndita sunt.
          In Isáuria pássio sanctórum Azæ et Sociórum centum quinquagínta mílitum, sub Diocletiáno Imperatóre et Aquilíno Tribúno.
      en2:
      - type: text
        text: |-
          The Twentieth of November
      
          At the town of Marburg, in Germany, the passing of Saint Elizabeth the Widow, daughter of Andrew, King of Hungary, of the Third Order of Saint Francis, who, ceaselessly devoted to works of piety and renowned for miracles, departed to the Lord.
          Saint Pontianus, Pope and Martyr, whose birth is commemorated on the third day before the Kalends of November.
          At Samaria, in Palestine, the holy Prophet Obadiah.
          At Rome, on the Appian Way, the birth of Saint Maximus, Priest and Martyr, who, having suffered in the persecution of Valerian, was laid to rest near Saint Xystus.
          In the city of Hastigona, in Spain, blessed Crispinus the Bishop, who, having his head cut off, attained the glory of martyrdom.
          On the same day, Saint Faustus, Deacon of Alexandria, who was first, in the persecution of Valerian, sent into exile with Saint Dionysius; then, being of great age, in the persecution of Diocletian, condemned by the sword, he completed martyrdom.
          At Caesarea, in Cappadocia, Saint Barlaam the Martyr, who, though of rural and unlearned background, fortified with the wisdom of Christ, overcame the tyrant, and by his invincible steadfastness of faith conquered fire itself; on whose natal day Saint Basil the Great delivered a celebrated oration.
          At Vienne, in Gaul, the holy Martyrs Severinus, Exsuperius, and Felicianus; whose bodies, after many years, they themselves revealing, were found, and were honorably raised by the bishop, clergy, and people of that city and enshrined with fitting honor.
          In Isauria, the passion of the holy Azas and his Companions, one hundred and fifty soldiers, under the Emperor Diocletian and the tribune Aquilinus.
  psalm.tertiod-cimo-kal-ndas-febru-rii-19750d5c34:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 20th day of January, were born into the better life:

          At Rome, the holy Pope Fabian, who suffered in the time of the Emperor Decius, and was buried in the cemetery of Callistus.
          There also, at the Catacombs, the holy martyr Sebastian, commander of the first cohort under the Emperor Diocletian. Being convicted of Christianity, he was tied up in the midst of a field and shot at by the soldiers, but in the end he was beaten to death with cudgels.
          At Nice, in Bithynia, (in the fourth century,) the holy martyr Neophitus, who in the fifteenth year of his age was flogged, cast into a furnace, and thrown to wild beasts, and for as much as he remained unhurt and constantly professed the faith of Christ, he was at length beheaded.
          At Caesena, (in the tenth century,) holy Maurus, Bishop of that see, famous for graces and miracles.
          In Palestine, (in the year 473,) holy Euthymius, (surnamed the Great,) Abbot (near Jerusalem,) who flourished in the Church in the time of the Emperor Marcian, filled with zeal for catholic discipline, and marked by the power of working miracles.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Februárii

          Romæ natális sancti Fabiáni, Papæ et Mártyris, qui, Décii témpore, martýrium passus est, atque in cœmetério Callísti sepúltus.
          Item Romæ, ad Catacúmbas, sancti Sebastiáni Mártyris, qui, Diocletiáno Imperatóre, cum habéret principátum primæ cohórtis, iussus est, sub título christianitátis, ligári in médio campo, et sagittári a milítibus, atque ad últimum fústibus cædi, donec defíceret.
          Nicǽæ, in Bithýnia, sancti Neóphyti Mártyris, qui, quintumdécimum annum ætátis agens, flagris cæsus, in fornácem immíssus, feris obiéctus, et, cum illǽsus permanéret et Christi fidem constánter profiterétur, gládio tandem occísus est.
          Cæsénæ sancti Mauri Epíscopi, virtútibus et miráculis clari.
          In Palæstína natális sancti Euthýmii Abbátis, qui zelo cathólicæ disciplínæ et virtúte miraculórum, témpore Marciáni Imperatóris, in Ecclésia flóruit.
      en2:
      - type: text
        text: |-
          The Twentieth of January
      
          At Rome, the birth of Saint Fabian, Pope and Martyr, who suffered martyrdom in the time of Decius, and was buried in the cemetery of Callixtus.
          Also at Rome, at the Catacombs, Saint Sebastian the Martyr, who, under the Emperor Diocletian, when he held the command of the first cohort, was ordered, on the charge of being a Christian, to be bound in the middle of the field and shot with arrows by the soldiers, and finally to be beaten with clubs until he expired.
          At Nicaea, in Bithynia, Saint Neophytus the Martyr, who, being in his fifteenth year of age, was beaten with rods, cast into a furnace, thrown to wild beasts, and, when he remained unharmed and steadfastly professed the faith of Christ, was finally slain with the sword.
          At Cesena, Saint Maurus the Bishop, renowned for virtues and miracles.
          In Palestine, the birth of Saint Euthymius the Abbot, who, by his zeal for Catholic discipline and the power of miracles, flourished in the Church in the time of the Emperor Marcian.
  psalm.tertiod-cimo-kal-ndas-i-lii-11f392cda7:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of June, were born into the better life:

          At Florence, St. Juliana Falconieri, virgin, foundress of the Sisters of the Order of the Servants of the Blessed Virgin Mary, who was placed among the holy virgins by the Sovereign Pontiff, Clement XII.
          At Milan, [in the first century,] the holy martyrs Gervase and Protase, brothers. The former, by order of the judge Astasius, was scourged with leaded whips for so long that he expired. The latter, after being scourged with rods, was beheaded. Through divine revelation their bodies were found by St. Ambrose. They were partly covered with blood, and as free from corruption as if they had been put to death that very day. When the translation took place, a blind man recovered his sight by touching their relics, and many persons possessed by demons were delivered.
          At the monastery in the valley of Castro in Piceno, the birthday of St. Romuald, anchoret, a native of Ravenna. He was the founder of the Camaldolese monks, and he restored and greatly extended monastic discipline, which was much relaxed in Italy. His feast is observed on the 7th of February, on which day his sacred relics were transferred to Fabriano.
          At Arezzo in Tuscany, the holy martyrs Gaudentius, bishop, and Culmatius, deacon, who were murdered by the furious heathen, during the reign of Valentinian.
          Also, St. Boniface, martyr, a disciple of blessed Romuald, who was sent by the Roman Pontiff, Gregory V, to preach the Gospel in Russia. Having passed through fire uninjured, and baptized the king and his people, he was killed by the enraged brother of the king, and thus gained the palm of martyrdom which he ardently desired.
          At Ravenna, [likewise in the first century,] St. Ursicinus, martyr, who remained constant through many torments in the confession of martyrdom by being beheaded.
          At Sozopolis, under the governor Domitian, during the persecution of Trajan, St. Zosimus, martyr, who suffered bitter tortures, was beheaded, and thus triumphantly went to heaven.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Iúlii

          Floréntiæ sanctæ Iuliánæ Falconériæ Vírginis, quæ Sorórum Ordinis Servórum beátæ Maríæ Vírginis fuit Institútrix, et a Cleménte Duodécimo, Pontífice Máximo, in sanctárum Vírginum númerum reláta est.
          Medioláni sanctórum Mártyrum Gervásii et Protásii fratrum, ex quibus priórem támdiu iussit Astásius Iudex plumbátis cædi, quoúsque ille spíritum exhaláret; posteriórem vero, fústibus cæsum, cápite truncári. Horum córpora, Dómino revelánte, beátus Ambrósius sánguine conspérsa et ita incorrúpta réperit, ac si eo die ipsi fuíssent interémpti; in quorum translatióne cæcus, féretri tactu, lumen recépit, et plúrimi, vexáti a dæmónibus, liberáti sunt.
          In monastério Vallis Castri, in Picéno, natális sancti Romuáldi Ravennátis, Anachorétæ et Monachórum Camaldulénsium Patris; qui collápsam in Itália eremíticam discíplinam restítuit ac mirífice propagávit. Eius tamen festívitas recólitur séptimo Idus Februárii, quo die sacræ ipsíus relíquiæ Fabriánum sunt translátæ.
          Arétii, in Túscia, sanctórum Mártyrum Gaudéntii Epíscopi, et Culmátii Diáconi, qui, témpore Valentiniáni, furóre Gentílium cæsi sunt.
          Eódem die sancti Bonifátii, Epíscopi et Mártyris; qui fuit beáti Romuáldi discípulus. Hic, a Gregório Quinto, Románo Pontífice, ad prædicándum Evangélium in Rússiam missus, ibi, cum per ignem transísset illǽsus, Regémque ac pópulum baptizásset, a furénte Regis fratre necátus est, atque sic optátam martýrii corónam accépit.
          Ravénnæ sancti Ursicíni Mártyris, qui, sub Paulíno Iúdice, post plúrima torménta, in Dómini confessióne pérmanens immóbilis, cápitis abscissióne martýrium complévit.
          Sozópoli, in Pisídia, sancti Zósimi Mártyris, qui, in persecutióne Traiáni, sub Domitiáno Prǽside, post acérbos cruciátus, cápite amputáto, victor migrávit ad Dóminum.
      en2:
      - type: text
        text: |-
          The Twentieth of June
      
          At Florence, Saint Juliana Falconieri the Virgin, who was the foundress of the Sisters of the Order of the Servants of the Blessed Virgin Mary, and was enrolled in the number of holy Virgins by Pope Clement XII, Supreme Pontiff.
          At Milan, the holy Martyrs Gervasius and Protasius, brothers; of whom the Lord ordered the former to be beaten with leaden flails so long until he breathed his last; the latter, beaten with clubs, was beheaded. Their bodies, revealed by the Lord, blessed Ambrose found sprinkled with blood and so incorrupt as if they had been slain that very day; and at their translation a blind man received sight by touching the bier, and very many who were tormented by demons were freed.
          In the monastery of Valle Castro, in Picenum, the birth of Saint Romuald of Ravenna, Anchorite and Father of the Camaldolese Monks; who restored the eremitical discipline that had collapsed in Italy and propagated it wonderfully. His feast, however, is kept on the seventh of the Ides of February, on which day his sacred relics were translated to Fabriano.
          At Arezzo, in Tuscany, the holy Martyrs Gaudentius the Bishop and Culmatinus the Deacon, who, in the time of Valentinian, were slain by the fury of the Gentiles.
          On the same day, Saint Boniface, Bishop and Martyr, who was a disciple of blessed Romuald. He, sent by Gregory V, Roman Pontiff, to preach the Gospel in Russia, when he had passed through fire unharmed and baptized the King and his people, was killed by the raging brother of the King, and thus received the martyrdom's crown he had longed for.
          At Ravenna, Saint Ursicinus the Martyr, who, under the governor Paulinus, after many torments, remaining steadfast in the confession of the Lord, completed his martyrdom by beheading.
          At Sozopolis, in Pisidia, Saint Zosimus the Martyr, who, in the persecution of Trajan under the governor Domitian, after bitter torments, was beheaded and departed victorious to the Lord.
  psalm.tertiod-cimo-kal-ndas-i-nii-3d25d79214:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the 20th day of May, were born into the better life:

          At Aquila, in the Abruzzi, holy Bernardine of Sienna, of the Order of Friars Minors, who enlightened Italy both by word and example.
          At Rome, on the Salarian Way, [about A.D. 160] the holy Virgin Basilla. She was of the blood of kings and illustriously betrothed, but rejected her spouse, whereupon he accused her of being a Christian, and the Emperor Gallienus ordered that she should either take him back or perish by the sword. She answered that the King of kings was her Bridegroom, and the sword was accordingly passed through her.
          At Nimes, in Gaul, the holy martyr Baudelius. He was apprehended and would not sacrifice, and so remaining inmovable amidst stripes and torments, grasped the palm of martyrdom by a death precious in the sight of the Lord.
          At Edessa, in Syria, the holy martyrs Thalalaeus, Asterius, Alexander, and their companions, who suffered under the Emperor Numerian.
          In the Thebai'd, the holy martyr Aquila, who was lacerated with combs, for Christ's sake.
          At Bourges, in Gaul, [in the seventh century,] the holy Confessor Austregisilus, [Bishop of that see.]
          At Brescia, [early in the seventh century,] the holy Anastasius, Bishop [of that see.]
          At Pavia, [in the eighth century,] the holy Theodore, Bishop [of that see.]
          At Rome, the holy Plautilla, a woman of Consular rank and mother of the blessed Flavia Domitilla. She was baptized by the holy Apostle Peter, and after being eminent for excellency, fell asleep in peace.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Iúnii

          Aquilæ, in Vestínis, sancti Bernardíni Senénsis, Sacerdótis ex Ordine Minórum et Confessóris, qui verbo et exémplo Itáliam illustrávit.
          Romæ sanctæ Plautíllæ, féminæ Consuláris, quæ beatórum Mártyrum Flávii Cleméntis Cónsulis soror et Fláviæ Domitíllæ Vírginis mater éxstitit; atque, a sancto Petro Apóstolo baptizáta, ómnium virtútum laude refúlgens, quiévit in pace.
          Item Romæ, via Salária, natális sanctæ Basíllæ Vírginis, quæ, cum esset ex regio génere, et illustríssimum sponsum habéret illúmque dimisísset, accusáta fuit ab eo quod esset Christiána, et mox decrétum est a Galliéno Augústo ut aut sponsum recíperet, aut gládio interíret; cumque ipsa Virgo, convénta de hoc, respondísset se Regem regum habére sponsum, gládio transverberáta est.
          Nemáusi, in Gálliis, sancti Baudélii Mártyris, qui comprehénsus est a Pagánis, et, cum sacrificáre nollet idólis et in Christi fide inter vérbera et torménta immóbilis persísteret, martýrii palmam pretiósa morte suscépit.
          Edéssæ, apud Ægas, in Cilícia, sanctórum Mártyrum Thalelǽi, Astérii, Alexándri et Sociórum, qui sub Numeriáno Imperatóre passi sunt.
          In Thebáide sancti Aquilæ Mártyris, qui pectínibus pro Christo dilaniátus fuit.
          Apud Bitúricas, in Aquitánia, sancti Austregísili, Epíscopi et Confessóris.
          Bríxiæ sancti Anastásii Epíscopi.
          Pápiæ sancti Theodóri Epíscopi.
      en2:
      - type: text
        text: |-
          The Twentieth of May
      
          At Aquila, in the Vestini, Saint Bernardino of Siena, Priest of the Order of Friars Minor and Confessor, who illumined Italy with his word and example.
          At Rome, Saint Plautilla, a consular woman, who was the sister of the holy Martyr Flavius Clemens the Consul and mother of Flavia Domitilla the Virgin; and, baptized by the Apostle Peter, resplendent with the praise of all virtues, she rested in peace.
          Also at Rome, on the Salarian Way, the birth of Saint Basilla the Virgin, who, being of royal lineage and having a most illustrious betrothed whom she had dismissed, was accused by him of being a Christian, and presently it was decreed by the Emperor Gallienus that she should either take back her betrothed or perish by the sword; and when the Virgin, thus confronted, replied that she had the King of kings as her Spouse, she was run through with the sword.
          At Nîmes, in Gaul, Saint Baudelius the Martyr, who was seized by the pagans, and when he would not sacrifice to the idols and remained steadfast in the faith of Christ amid blows and torments, received the palm of martyrdom by a precious death.
          At Edessa, at Aegae, in Cilicia, the holy Martyrs Thalelaeus, Asterius, Alexander, and their Companions, who suffered under the Emperor Numerian.
          In the Thebaid, Saint Aquila the Martyr, who was torn apart with combs for Christ.
          At Bourges, in Aquitaine, Saint Austregisilus, Bishop and Confessor.
          At Brescia, Saint Anastasius the Bishop.
          At Pavia, Saint Theodore the Bishop.
  psalm.tertiod-cimo-kal-ndas-ianu-rii-1f4a0be4d8:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Tomorrow is the eve of the holy Apostle Thomas.
          Upon the same 20th day of December, were born into the better life:

          At Rome, the holy martyrs Liberatus, Bajulus, Ammon, Zeno, Ptolemy, Ingenes, and Theophilus, all martyrs. They were on guard beside the judgment-seat when a certain Christian who was under the torture began to waver and was almost giving way, and they tried by signs to encourage him to hold out; for this cause all the people cried out against them, and they came forward and confessed themselves to be Christians and Christ, who Himself had given such steadfastness unto His own, did Himself most gloriously triumph in their victory, (in the year 249.)
          At Geldube, (in Thrace,) the holy martyr Julius, (fourth century.)
          In Arabia, the holy martyrs Eugenius and Macarius, two Priests who blamed the ungodliness of the Emperor Julian the Apostate, and for that cause were most cruelly flogged and sent out into the great desert, where they were slain with the sword, (in the year 362.)
          At Antioch, holy Philogonius, Patriarch of the see. He was an advocate when he was called by the will of God to govern that church, and first took up the contending for the Catholic faith along with holy Bishop Alexander, and his Companions, against Arius. He fell asleep in the Lord, illustrious for good works, (in the year 322.) Holy John Chrysostom preached an eloquent sermon on his feast-day.
          At Brescia, the holy Confessor Dominic, Bishop (of that see, about the year 612.)
          On this day is commemorated the burial in Spain of holy Dominic, Abbot of Silos, (in the diocese of Burgos, in Castile, which abbey he founded,) of the Order of St. Benedict, very famous for his miracles wrought for the liberation of captives. (He died in his monastery at Silos, on December 14, 1073.)
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Ianuárii

          Romæ natális sancti Zephyríni, Papæ et Mártyris. Ipsíus tamen festum recólitur séptimo Kaléndas Septémbris.
          Ibídem pássio sancti Ignátii, Epíscopi et Mártyris; qui, tértius post beátum Petrum Apóstolum, Antiochénam rexit Ecclésiam. Hic, in persecutióne Traiáni, damnátus ad béstias, Romam vinctus míttitur; ibíque, circumsedénte Senátu, immaníssimis pœnárum supplíciis primo est afféctus, dehinc obiícitur leónibus, quorum déntibus præfocátus, hóstia Christi effícitur. Eius vero festívitas Kaléndis Februárii celebrátur.
          Item Romæ sanctórum Mártyrum Liberáti et Báiuli.
          In Arábia sanctórum Mártyrum Eugénii et Macárii Presbyterórum, qui a Iuliáno Apóstata, cum ipsíus impietátem arguíssent, sævíssimis plagis affécti sunt, atque in vastíssimam erémum relegáti, et gládio cæsi.
          Alexandríæ sanctórum mílitum et Mártyrum Ammónis, Zenónis, Ptolemǽi, Ingenis et Theóphili; qui, tribunálibus astántes, cum quidam Christiánus, in supplíciis pósitus, trepidáret et iam prope ad negándum declináret, vultu, óculis ac nútibus illum conabántur erígere. Cumque hac de causa clamor totíus pópuli in eos prosilíret, prorumpéntes in médium se Christiános esse testáti sunt; per quorum victóriam Christus, qui suis eam animi constántiam déderat, gloriosíssime triumphávit.
          Géldubæ, in Germánia, sancti Iúlii Mártyris.
          Antiochíæ natális sancti Philogónii Epíscopi, qui, Dei nutu ex causídico ad eam Ecclésiam regéndam accersítus, advérsus Aríum, una cum sancto Alexándro Epíscopo et Sóciis, primum pro fide cathólica certámen íniit, clarúsque méritis quiévit in Dómino; cuius ánnuam festivitátem sanctus Ioánnes Chrysóstomus præcláro encómio celebrávit.
          Bríxiæ sancti Domínici, Epíscopi et Confessóris.
          In Hispánia deposítio sancti Domínici de Sylos Abbátis, e sancti Benedícti Ordine, miráculis in captivórum liberatióne celebérrimi.
      en2:
      - type: text
        text: |-
          The Twentieth of December
      
          At Rome, the birth of Saint Zephyrinus, Pope and Martyr. His feast, however, is kept on the seventh day before the Kalends of September.
          At the same place, the passion of Saint Ignatius, Bishop and Martyr; who, third after the blessed Apostle Peter, governed the Church of Antioch. He, in the persecution of Trajan, condemned to the wild beasts, is sent bound to Rome; and there, the Senate being assembled, he is first subjected to the most savage torments, then thrown to the lions, by whose teeth, being strangled, he becomes a victim for Christ. His feast, however, is celebrated on the Kalends of February.
          Also at Rome, the holy Martyrs Liberatus and Bajulus.
          In Arabia, the holy Martyrs Eugenius and Macarius the Priests, who, when they had rebuked Julian the Apostate for his impiety, were afflicted with most savage blows and banished to a vast desert, and cut down with the sword.
          At Alexandria, the holy soldiers and Martyrs Ammon, Zeno, Ptolemy, Ingenis, and Theophilus; who, standing before the tribunal, when a certain Christian who had been subjected to torments was wavering and about to deny the faith, were trying to encourage him by expression, eyes, and nods. And when for this reason the shouting of all the people burst out against them, they rushed into the midst and declared themselves to be Christians; through whose victory Christ, who had given them that steadfastness of soul, triumphed most gloriously.
          At Geldubia, in Germany, Saint Julius the Martyr.
          At Antioch, the birth of Saint Philogonius the Bishop, who, by the will of God, was summoned from being an advocate to govern that Church, took up the first contest for the Catholic faith against Arius, together with Saint Alexander the Bishop and Companions, and rested illustrious in merits in the Lord; whose annual feast Saint John Chrysostom celebrated with a distinguished encomium.
          At Brescia, Saint Dominic, Bishop and Confessor.
          In Spain, the passing of Saint Dominic of Silos the Abbot, of the Order of Saint Benedict, most celebrated for miracles in the liberation of captives.
  psalm.tertiod-cimo-kal-ndas-m-rtii-117ebb8bf3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 17th day of February, were born into the better life:

          At Rome, the holy martyr Faustinus, and forty-four others, who followed him to his crown.
          In Persia, [in the year 251,] holy Polychronius, Bishop of Babylon, who in the persecution of Decius had his mouth broken with stones, and then with his hands stretched out and his eyes lifted up to heaven, gave up the ghost.
          At Concordia, [in the year 303,] the holy martyrs Donatus, Secundianus, and Romulus, together with eighty-six others, who were partakers in their crown.
          At Caesarea, in Palestine, [in the year 309,] holy Theodulus the Elder, of the household of the President Firmilian. He was stirred up by the example of the martyrs steadfastly to confess Christ, and being himself crucified gained by a noble victory the palm of martyrdom.
          There also the holy martyr Julian the Cappadocian. He kissed the bodies of the slaughtered martyrs, and was therefore accused of Christianity, brought before the President, and burnt on a slow fire.
          In the country of Tervan, holy Silvin, Bishop of Toulouse.
          In Ireland, [in the middle of the sixth century,] the holy Priest and Confessor Fintan, [of the race of whom was Brigid he was Abbot of Cluain-ed-nech in Leinster, and was called chief head of the monks of Ireland.]
          At Florence, [at the end of the thirteenth century,] the blessed Confessor Alexis de' Falconieri, one of the seven founders of the Order of Servants of the Blessed Virgin Mary. He died a blessed death in the hundred and tenth year of his life, strengthened by the presence of Christ Jesus and of the angels.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Mártii

          Floréntiæ natális sancti Aléxii Falconérii Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, décimo supra centésimum vitæ suæ anno, Christi Iesu et Angelórum præséntia recreátus, beáto fine quiévit. Ipsíus tamen ac Sociórum festum prídie Idus Februárii celebrátur.
          Romæ pássio sancti Faustíni, quem álii quadragínta quátuor secúti sunt ad corónam.
          In Pérside natális beáti Polychrónii, Epíscopi Babylónis, qui, in persecutióne Décii, ore lapídibus cæso, mánibus exténsis, ad cælum óculos élevans, emísit spíritum.
          Concórdiæ, in Venetórum fínibus, sanctórum Mártyrum Donáti, Secundiáni et Rómuli, cum áliis octogínta sex, eiúsdem corónæ consórtibus.
          Cæsaréæ, in Palæstína, sancti Theodúli senis, qui, cum esset ex família Prǽsidis Firmiliáni, et, Mártyrum excitátus exémplo Christum constánter confiterétur, martýrii palmam, cruci affíxus, nóbili triúmpho proméruit.
          Ibídem sancti Iuliáni Cappádocis, qui, exosculátus necatórum Mártyrum córpora, et ídeo ut Christiánus delátus et ad Prǽsidem ductus, lento igne iussus est combúri.
          In pago Tarvanénsi, in Gállia, sancti Silvíni, Epíscopi Tolosáni.
          In monastério Cluain-ednechénsi, in Hibérnia, sancti Fintáni, Presbýteri et Abbátis.
      en2:
      - type: text
        text: |-
          The Eighteenth of February
      
          At Florence, the birth of Saint Alexis Falconieri the Confessor, one of the seven founders of the Order of the Servants of the Blessed Virgin Mary; who, in his hundred and tenth year of life, refreshed by the presence of Christ Jesus and the Angels, rested in a blessed end. His feast and that of his Companions, however, is celebrated on the day before the Ides of February.
          At Rome, the passion of Saint Faustinus, whom forty-four others followed to the crown.
          In Persia, the birth of blessed Polychronius, Bishop of Babylon, who, in the persecution of Decius, with his mouth struck by stones, his hands extended, his eyes raised to heaven, gave up his spirit.
          At Concordia, in the borders of the Veneto, the holy Martyrs Donatus, Secundianus, and Romulus, with eighty-six others who shared in the same crown.
          At Caesarea, in Palestine, Saint Theodulus the elder, who, being of the household of the governor Firmilianus, and, stirred by the example of the Martyrs, steadfastly confessing Christ, merited the palm of martyrdom, being fixed to a cross, in a noble triumph.
          At the same place, Saint Julian the Cappadocian, who, having kissed the bodies of the slain Martyrs, and for that reason accused as a Christian and brought before the governor, was ordered to be burned with a slow fire.
          In the region of Thérouanne, in Gaul, Saint Silvinus, Bishop of Toulouse.
          In the monastery of Clonednech, in Ireland, Saint Fintan, Priest and Abbot.
  psalm.tertiod-cimo-kal-ndas-maii-a08878fb75:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of April, were born into the better life:

          At Canterbury, in England, the holy martyr Elphege, Bishop of that see. [He had been Bishop of Winchester. He died in the year 1012.]
          At Corinth, the holy martyr Timon, one of the seven first Deacons. He first dwelt as a teacher at Berea, and thence came, spreading the word of God as far as Corinth there he is said to have been cast into the fire by the Jews and Greeks, but remained unharmed, and was crucified. [He was successively Bishop of Tyre and of Bostra. He preached in Berea, Corinth, the island of Cyprus where he prepared the way for St. Barnabas, Phoenicia, and Arabia.]
          At Malathia, in Armenia, the holy martyrs Hermogenes, Caius, Expeditus, Aristonicus, Rufus, and Galata, who were all crowned upon one and the same day.
          At Cancavella, in Catalonia, the holy martyr Vincent, [in the year 291.]
          On the same day, [in the second century,] the holy martyrs Socrates and Denis, who were run through with lances.
          At Jerusalem, the holy martyr Paphnutius.
          At Antioch, in Pisidia, [in the ninth century,] holy George, Bishop of that see, who died in exile for the honouring of holy images.
          At Rome, the holy Pope, Leo IX, [from the year 1049 till 1054,] illustrious for his grace and the fame of his miracles. [He is the same as St. Bruno, 40th Bishop of Toul.]
          In the monastery of Lobbes, holy Bishop Ursmar, [Abbot of Lobbes, in the years 644-713.]
          At Florence, [in the year 396,] the holy Confessor Crescentius, disciple of the blessed Zenobius, Bishop [of that see. Among the early Bishops of the church of Florence, St. Zenobius, the 5th of that see, is celebrated. He was elected about the year 376 and ministered till the year 407. He buried his sub-deacon St. Crescent with his own hands. St. Crescent is mentioned by St Ambrose.]
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Maii

          Corínthi natális sancti Timónis, qui fuit unus de septem primis Diáconis. Hic primo apud Beroéam Doctor resédit, ac deínde, verbum Dómini disséminans, venit Corínthum; ibíque, a Iudǽis et Græcis (ut tráditur) iniéctus flammis, sed nihil læsus, demum, cruci affíxus, martýrium suum implévit.
          Cantuáriæ, in Anglia, sancti Elphegi, Epíscopi et Mártyris.
          Melitínæ, in Arménia, sanctórum Mártyrum Hermógenis, Caii, Expedíti, Aristoníci, Rufi et Gálatæ, qui omnes una die sunt coronáti.
          Caucolíberi, in Hispánia Tarraconénsi, pássio sancti Vincéntii Mártyris.
          Eódem die sanctórum Mártyrum Sócratis et Dionýsii, qui lánceis confóssi sunt.
          Hierosólymis sancti Paphnútii Mártyris.
          Romæ sancti Leónis Papæ Noni, virtútum et miraculórum laude insígnis.
          Antiochíæ Pisídiæ sancti Geórgii Epíscopi, qui, ob sanctárum Imáginum cultum, exsul occúbuit.
          In cœnóbio Laubiénsi, in Bélgio, sancti Ursmári Epíscopi.
          Floréntiæ sancti Crescéntii Confessóris, qui fuit discípulus beáti Zenóbii Epíscopi.
      en2:
      - type: text
        text: |-
          The nineteenth of April
      
          At Corinth, the birth into heaven of Saint Timon, who was one of the seven first Deacons. He first settled as a teacher at Beroea, and then, spreading the word of the Lord, came to Corinth; there, cast into flames by Jews and Greeks (as is related), yet suffering no harm, he at last fulfilled his martyrdom fixed to a cross.
          At Canterbury, in England, Saint Alphege, Bishop and Martyr.
          At Melitene, in Armenia, the holy Martyrs Hermogenes, Caius, Expeditus, Aristonicus, Rufus, and Galata, who were all crowned on one day.
          At Caucoliberis, in Tarraconensian Spain, the passion of Saint Vincent, Martyr.
          On the same day, the holy Martyrs Socrates and Dionysius, who were pierced through with lances.
          At Jerusalem, Saint Paphnutius, Martyr.
          At Rome, Saint Pope Leo IX, renowned for the praise of his virtues and miracles.
          At Pisidian Antioch, Saint George, Bishop, who died in exile on account of the veneration of holy images.
          In the monastery of Lobbes, in Belgium, Saint Ursmar, Bishop.
          At Florence, Saint Crescentius, Confessor, who was a disciple of the blessed Bishop Zenobius.
  psalm.tertiod-cimo-kal-ndas-nov-mbris-2747832633:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Octave of the holy Confessor Edward.
          On the morrow also we keep the Feast of the Holy Confessor John of Kenty, in Poland, glorious for graces and miracles, whose name the Supreme Pontiff Clement XIII enrolled among those of the Saints, (and of whom mention is made upon the 24th day of December.)
          Upon the same 20th day of October, were born into the better life:

          At Avia, near Aquila, in the Abruzzi, (in the third century,) the blessed martyr Maximus the Levite. From his desire to suffer he showed himself when the persecutors sought for him, when he was interrogated he answered with steadfastness, was tortured upon the rack, then cudgelled, and at last thrown down from an high place, and so slain.
          At Agen, in Gaul, the holy martyr Caprasius. He had escaped from the fury of the persecution, and was lying hid in a cave, when he heard how the blessed Virgin Faith was suffering for Christ's sake. Then he was stirred up to bear suffering likewise, and he prayed the Lord that if He judged him also to be worthy of the glory of martyrdom He would cause a spring of clear water to break forth from the rock of the cave, which thing when the Lord granted, Caprasius went back confidently to the field of battle, and gained the crown of martyrdom by a noble contention.
          At Antioch, the holy Augustal Prefect Artemius, who had been distinguished for the highest military service under the Emperor Constantine the Great, but when he rebuked the Emperor Julian the Apostate for his cruelty toward the Christians, Julian commanded him to be cudgelled, tortured, and beheaded.
          At Cologne, the holy Virgins Martha and Saula, and others, all martyrs.
          At Minden, (in the third century,) the holy martyr Bishop Felician.
          At Paris (is commemorated the translation of the relics of) the holy martyrs George the Deacon and Aurelius, (of whom mention is made upon the 27th day of July.)
          In Portugal, suffered (in the seventh century,) the holy Virgin and martyr Irene.
          At Reims, deceased, (about the year 600,) the holy Confessor Sindulph.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Novémbris

          Sancti Ioánnis Cántii, Presbýteri et Confessóris, qui nono Kaléndas Ianuárii obdormívit in Dómino.
          In Aviénsi civitáte, prope Aquilam, in Vestínis, natális beáti Máximi, Levítæ et Mártyris; qui, patiéndi desidério, inquiréntibus se persecutóribus palam osténdit, et, post responsiónis constántiam, equúleo suspénsus ac tortus, deínde fústibus cæsus, ad últimum, e sublími loco præcipitátus, occúbuit.
          Agénni, in Gállia, sancti Caprásii Mártyris, qui, cum rábiem persecutiónis declínans latéret in spelúnca, tandem, áudiens quáliter beáta Fides Virgo pro Christo agonizáret, índeque animátus ad tolerántiam passiónum, orávit ad Dóminum, ut, si eum glória martýrii dignum iudicáret, ex lápide spelúncæ limpidíssima aqua manáret; quod cum Dóminum præstitísset, secúrus ad áream certáminis properávit, et palmam martýrii, sub Maximiáno Imperatóre, fórtiter dimicándo proméruit.
          Antiochíæ sancti Artémii, Ducis Augustális, qui, sub Constantíno Magno præcláris milítiæ honóribus functus, a Iuliáno Apóstata, quem sævítiæ in Christiános argúerat, fústibus cædi, aliísque torméntis afflígi, ac demum cápite truncári iubétur.
          Constantinópoli sancti Andréæ Creténsis Mónachi, qui ob cultum sacrárum Imáginum, sub Constantíno Coprónymo, sǽpius verberátus, tandem, amputáto áltero pede, réddidit spíritum.
          Colóniæ Agrippínæ pássio sanctárum Vírginum Marthæ et Saulæ, cum áliis plúribus.
          Apud Nabántiam, in Lusitánia, sanctæ Irénes, Vírginis et Mártyris; cuius corpus honorífice sepúltum fuit in óppido Scálabi, quod ipsíus Sanctæ nómine insignítum inde permánsit.
          Alsóntiæ, in território Rheménsi, sancti Sindúlphi, Presbýteri et Confessóris.
          Apud Mindam, in Germánia, Translátio sancti Feliciáni, Epíscopi Fulginátis et Mártyris; cuius ibi depósita fuit sacrárum pars reliquiárum, quæ in Germániam advéctæ sunt ex Umbriæ civitáte Fulgíneo, ubi ipse nono Kaléndas Februárii passus quondam fúerat.
          Lutétiæ Parisiórum item Translátio sanctórum Mártyrum Geórgii Diáconi, et Aurélii, ex urbe Hispániæ Córduba, in qua olim, una cum áliis tribus Sóciis, ambo martýrium compléverant sexto Kaléndas Augústi.
      en2:
      - type: text
        text: |-
          The twentieth of October
      
          Saint John of Cantius, Priest and Confessor, who fell asleep in the Lord on the twenty-fourth of December.
          In the city of Aveia, near Aquila, in the Vestini, the birth into heaven of blessed Maximus, Levite and Martyr; who, out of desire for suffering, showed himself openly to the persecutors who were searching for him, and after standing firm in his reply, was suspended and tortured on the rack, then beaten with clubs, and at last thrown headlong from a height and killed.
          At Agen, in Gaul, Saint Caprasius, Martyr, who, while he lay hidden in a cave to avoid the fury of the persecution, was at last encouraged, upon hearing how the blessed Virgin Fides was contending for Christ, and strengthened by this to endure suffering, he prayed to the Lord that, if he judged him worthy of the glory of martyrdom, the clearest water might flow from the rock of the cave; and when the Lord granted this, he went forth without fear to the arena of combat, and bravely fighting under the Emperor Maximian, merited the palm of martyrdom.
          At Antioch, Saint Artemius, Duke of Augustalis, who, having served with distinguished military honors under Constantine the Great, was ordered by Julian the Apostate—whom he had rebuked for his cruelty toward Christians—to be beaten with clubs, afflicted with other torments, and at last beheaded.
          At Constantinople, Saint Andrew of Crete, Monk, who, for the veneration of holy images, under Constantine Copronymus, was beaten repeatedly and at last, with one foot cut off, gave up his spirit.
          At Cologne, the passion of the holy Virgins Martha and Saula, with many others.
          Near Nabantia, in Portugal, Saint Irene, Virgin and Martyr; whose body was honorably buried in the town of Scalabis, which from that time retained the name of that Saint.
          At Alsontia, in the territory of Rheims, Saint Sindulphus, Priest and Confessor.
          Near Minden, in Germany, the Translation of Saint Felicianus, Bishop of Foligno and Martyr; a portion of his sacred relics, brought into Germany from the Umbrian city of Foligno, was deposited there—the city where he had once suffered on the twenty-fourth of January.
          At Paris, likewise the Translation of the holy Martyrs George the Deacon and Aurelius, from the Spanish city of Córdoba, in which both had formerly completed their martyrdom on the twenty-seventh of July, together with three other companions.
  psalm.tertiod-cimo-kal-ndas-oct-bris-3c7b0ef328:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of September, were born into the better life:

          At Pozzuoli, in Campania, the holy martyrs Januarius, Bishop of Benevento, Festus his Deacon, and Desiderius his Reader, Sosius, a Deacon of the Church of Miseno, Proculus, a Deacon of Pozzuoli, (and two laymen named respectively) Eutyches and Acutius, who were chained and imprisoned, and at length beheaded, under the Emperor Diocletian. The body of the holy Januarius was carried to Naples, and honourably buried in the church there, where also is still kept in a glass phial some of the blood of this most blessed martyr, which is seen to melt and bubble, as though it were fresh, when it is put in sight of his head.
          At Nocera, the holy martyrs Felix and Constance, who suffered under Nero.
          In Palestine, the holy martyrs Peleus, Nilus, and Elias, Bishops of Egypt, who, in the time of the persecution under the Emperor Diocletian, were, along with many other clerks, consumed with fire for Christ's sake.
          On the same day, under the Emperor Probus, the holy martyrs Trophimus, Sabbatius, and Dorymedon.
          Sabbatius was flogged to death at Antioch, by command of Atticus the President; Trophimus was sent to Synnada to the President Perennius, and there, after being put to many torments, he was beheaded along with the Senator Dorymedon.
          At Cordova, in the persecution under the Arabs, (in the ninth century,) the holy virgin and martyr Pomposa.
          At Canterbury, holy Theodore, Archbishop of that city, who was sent into England by Pope Vitalian, and was a burning and a shining light for teaching and holiness. (We keep his feast upon the 26th day of this present month of September.)
          At Tours, (in the fifth century,) the holy Confessor Eustochius, Bishop (of that see,) a man of many graces.
          In the country of Langres, (in the sixth century,) the holy Priest and Confessor Sequanus.
          At Barcelona, in Spain, the blessed virgin Mary de Cervelhon, of the Order of St. Mary of Ransom, who, because of her ready help to them that call upon her, is commonly called Helpful Mary.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Octóbris

          Putéolis, in Campánia, sanctórum Mártyrum Ianuárii, Beneventánæ civitátis Epíscopi, eiúsque Diáconi Festi, et Desidérii Lectóris, Sósii, Diáconi Ecclésiæ Misenátis, Próculi, Diáconi Puteoláni; Eutýchii et Acútii. Hi omnes, post víncula et cárceres, cápite cæsi sunt, sub Diocletiáno Príncipe. Corpus sancti Ianuárii delátum fuit Neápolim, atque honorífice in Ecclésia tumulátum; ubi étiam beatíssimi Mártyris sanguis in ampúlla vitrea adhuc servátur, qui, in conspéctu cápitis illíus pósitus, velut recens liquéscere et ebullíre conspícitur.
          In Palæstína sanctórum Mártyrum et Ægýpti Episcopórum Pélei, Nili et Elíæ; qui, témpore persecutiónis Diocletiáni, cum plúrimis Cléricis, pro Christo sunt igne consúmpti.
          Nucériæ natális sanctórum Mártyrum Felícis et Constántiæ, qui passi sunt sub Neróne.
          Eódem die sanctórum Mártyrum Tróphimi, Sabbátii et Dorymedóntis, sub Probo Imperatóre. Ex eis Sabbátius Antiochíæ, iussu Attici Prǽsidis, támdiu flagris cæsus est, donec emítteret spíritum; Tróphimus vero, Sýnnadam, in Phrýgia, ad Perénnium Prǽsidem missus, ibi, post multos cruciátus, cum Dorymedónte Senatóre, cápitis decollatióne martýrium consummávit.
          Eleutherópoli, in Palæstína, sanctæ Susánnæ, Vírginis et Mártyris; quæ, orta ex idolórum sacerdóte Arthémio et Iudǽa mulíere Martha, ad Christiánam fidem, paréntibus mórtuis, est convérsa, atque ob eándem fidem ab Alexándro Præfécto várie torta et in cárcerem trusa, ibi orans migrávit ad Sponsum.
          Córdubæ, in Hispánia, sanctæ Pompósæ, Vírginis et Mártyris; quæ in persecutióne Arábica, ob impávidam Christi confessiónem decolláta gládio, palmam consecúta est.
          Cantuáriæ sancti Theodóri Epíscopi, qui, a beáto Vitaliáno Papa in Angliam missus, doctrína et sanctitáte refúlsit.
          Turónis, in Gállia, sancti Eustóchii Epíscopi, magnárum virtútum viri.
          In território Lingoniénsi sancti Séquani, Presbýteri et Confessóris.
          Barcinóne, in Hispánia, beátæ Maríæ de Cervellióne, ex Ordine beátæ Maríæ de Mercéde redemptiónis captivórum, Vírginis; quæ, ob præséntem quam invocántibus confert opem, María de Subsídio vulgo nuncupátur.
          In vico Druelle, in diœcési Ruthenénsi, in Gállia, sanctæ Maríæ Guliélmæ-Æmíliæ de Rodat, Vírginis, Congregatiónis Sorórum a sancta Família Fundatrícis, puéllis erudiéndis et egénis sublevándis addictíssimæ, quæ a Pio Duodécimo, Pontífice Máximo, inter sanctas Vírgines reláta est.
      en2:
      - type: text
        text: |-
          The twentieth of September
      
          At Pozzuoli, in Campania, the holy Martyrs Januarius, Bishop of the city of Benevento; his Deacon Festus and the Lector Desiderius; Sossius, Deacon of the Church of Misenum; Proculus, Deacon of Pozzuoli; Eutychus and Acutius. All of these, after imprisonment and chains, were beheaded under the Emperor Diocletian. The body of Saint Januarius was carried to Naples and honorably entombed in the church there; where also the blood of the most blessed Martyr, preserved in a glass vial, is seen, when placed before his severed head, to liquefy and bubble up as if fresh.
          In Palestine, the holy Martyrs and Bishops of Egypt: Peleus, Nilus, and Elias; who, in the time of the Diocletianic persecution, were consumed by fire for Christ, together with many Clergy.
          At Nocera, the birth into heaven of the holy Martyrs Felix and Constance, who suffered under Nero.
          On the same day, the holy Martyrs Trophimus, Sabbatius, and Dorymedon, under the Emperor Probus. Of these, Sabbatius was beaten with rods at Antioch by order of the prefect Atticus until he gave up his spirit; while Trophimus was sent to Synnas, in Phrygia, before the prefect Perenninus, where, after many torments, he completed his martyrdom by beheading together with the Senator Dorymedon.
          At Eleutheropolis, in Palestine, Saint Susanna, Virgin and Martyr; who, born of the pagan priest Arthmeus and a Jewish woman named Martha, was converted to the Christian faith after her parents' death, and, on account of that same faith, variously tortured and cast into prison by the Prefect Alexander, she passed away there in prayer to her Spouse.
          At Córdoba, in Spain, Saint Pomposa, Virgin and Martyr; who, in the Arabian persecution, was beheaded with a sword for her fearless confession of Christ, and received the palm.
          At Canterbury, Saint Theodore, Bishop, who, sent to England by the blessed Pope Vitalian, shone forth in learning and holiness.
          At Tours, in Gaul, Saint Eustochius, Bishop, a man of great virtues.
          In the territory of Langres, Saint Sequanus, Priest and Confessor.
          At Barcelona, in Spain, blessed Mary of Cervelló, Virgin, of the Order of Our Lady of Mercy for the Redemption of Captives; who, on account of the present aid she bestows upon those who invoke her, is commonly called Mary of Help.
          In the village of Druelle, in the diocese of Rodez, in Gaul, Saint Mary Guillélmine-Émilie de Rodat, Virgin, foundress of the Congregation of the Sisters of the Holy Family, most devoted to educating girls and relieving the poor, who was enrolled among the holy Virgins by Pope Pius XII.
  psalm.tertiod-cimo-kal-ndas-sept-mbris-e0232a8b7c:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 20th day of August, were born into the better life:

          In the country of Langres, [in the year 1153,] holy Bernard, the first Abbot of Clairvaux, glorious for his life, his teaching, and his miracles, whom the Supreme Pontiff Pius VIII declared and confirmed a Doctor of the Universal Church.
          In Judea, [in the year 1043 before Christ,] the holy Prophet Samuel, whose sacred bones, as writeth blessed Jerome, were carried to Constantinople by the Emperor Arcadius, and laid near the Hebdomon.
          On the same day, [in the fourth century,] the holy Senator Lucius. He was turned to the faith of Christ by seeing the constancy with which Theodore, Bishop of Cyrene, underwent martyrdom, and drew the President Dignian to the same belief; they went together to Cyprus, and when he saw other Christians there being crowned for confessing the Lord, he thrust himself forward and gained the same crown of martyrdom by being beheaded.
          In Thrace, thirty-seven holy martyrs, who under the President Apellian, for Christ's faith's sake, had their hands and feet cut off, and were cast into a furnace of fire. Likewise the holy martyrs Severus and Memnon the centurion, who finished their testimony by the same kind of death, and departed to heaven as conquerors.
          At Cordova, [in the year 852,] the holy martyrs Leovigild and Christopher. They were monks who were cast into prison for their defence of the Christian faith in the persecution under the Arabs, and were presently beheaded, and so gained the palm of martyrdom, whereafter their bodies were burnt.
          At Rome, [in the third century,] blessed Porphyry, a man of God, from whom the holy martyr Agapitus learnt the faith and teaching of Christ.
          In the island of Noirmoutier, [in the seventh century,] the holy Philibert, [first] Abbot [of Jumièges and of Noirmoutier.]
          In the castle of Chinon, [in the fifth century,] the holy Confessor Maximus, a disciple of blessed Martin, Bishop [of Tours.]
          At Monte Senario, in the Diocese of Florence, [in the year 1268,] the blessed Confessor Manetto [Zantella,] one of the Seven Founders of the Order of Servants of the Blessed Virgin Mary, who died as he was reciting hymns to her.
      la:
      - type: text
        text: |-
          Tertiodécimo Kaléndas Septémbris

          In território Lingoniénsi deposítio sancti Bernárdi, primi Clarævallénsis Abbátis, vita, doctrína et miráculis gloriósi, quem Pius Octávus Póntifex Máximus universális Ecclésiæ Doctórem declarávit, et confirmávit.
          Romæ deposítio sancti Pii décimi, Papæ et Confessóris, fídei integritáte et ecclesiásticæ libertátis propugnatóris invícti, religionísque zelo insígnis, cuius festum tértio Nonas Septémbris recólitur.
          Apud montem Senárium, in Etrúria, natális sancti Manétii Confessóris, e septem Fundatóribus Ordinis Servórum beátæ Maríæ Vírginis; qui, eídem hymnos dicens, expiravit. Ipsíus autem ac Sociórum festum prídie Idus Februárii celebrátur.
          In Iudǽa sancti Samuélis Prophetæ, cuius sancta ossa (ut beátus Hierónymus scribit) Arcádius Augústus Constantinópolim tránstulit, et prope Séptimum collocávit.
          In Cypro sancti Lúcii Senatóris, qui, perspécta constántia Theodóri, Cyrenénsis Epíscopi, in martýrio pósiti, ad Christi fidem est convérsus, et ad eam étiam Digniánum Prǽsidem pertráxit; cum eóque Cyprum proféctus, ibi, cum álios Christiános pro confessióne Dómini coronári vidéret, ultro se ipsum óbtulit, et cápitis obtruncatióne eándem martýrii corónam proméruit.
          In Thrácia sanctórum trigínta septem Mártyrum, qui sub Prǽside Apelliáno pro Christi fide, mánibus pedibúsque præcísis, in camínum ardéntem iniécti sunt.
          Ibídem sanctórum Mártyrum Sevéri, et Mémnonis Centuriónis; qui, eódem mortis génere consummáti, victóres abiérunt in cælum.
          Córdubæ, in Hispánia, sanctórum Mártyrum Leovigíldi et Christóphori Monachórum, qui, in Arabum persecutióne pro Christiánæ fídei defensióne in cárcerem coniécti, ac mox, cervícibus abscíssis, igni tráditi, martýrii palmam adépti sunt.
          In Hério ínsula sancti Philibérti Abbátis.
          Romæ beáti Porphýrii, qui fuit homo Dei, qui sanctum Mártyrem Agapítum erudívit in fide et doctrína Christi.
          In castro Cainóne, in Gállia, sancti Máximi Confessóris, qui éxstitit discípulus beáti Martíni Epíscopi.
      en2:
      - type: text
        text: |-
          The twentieth of August
      
          In the territory of Langres, the deposition of Saint Bernard, first Abbot of Clairvaux, glorious in life, learning, and miracles, whom Pope Pius VIII declared a Doctor of the universal Church and confirmed him as such.
          At Rome, the deposition of Saint Pius X, Pope and Confessor, outstanding for integrity of faith and an invincible champion of ecclesiastical liberty, and remarkable for zeal for religion, whose feast is recalled on the third of September.
          Near Monte Senario, in Etruria, the birth into heaven of Saint Manettus, Confessor, one of the seven Founders of the Order of the Servants of the Blessed Virgin Mary; who, while singing hymns to her, breathed his last. His feast and that of his companions is celebrated on the day before the Ides of February.
          In Judea, Saint Samuel the Prophet, whose holy bones (as blessed Jerome writes) the Emperor Arcadius transferred to Constantinople and placed near the Seventh milestone.
          In Cyprus, Saint Lucius, Senator, who, having witnessed the steadfastness of Theodore, Bishop of Cyrene, in his martyrdom, was converted to the faith of Christ and also drew the prefect Dignianum to it; and sailing with him to Cyprus, where he saw other Christians crowned for confessing the Lord, offered himself willingly and merited the same crown of martyrdom by decapitation.
          In Thrace, the holy Thirty-Seven Martyrs, who, under the prefect Appellianus, for the faith of Christ, had their hands and feet cut off and were cast into a burning furnace.
          In the same place, the holy Martyrs Severus and Memnon the Centurion; who, put to death in the same manner, departed as victors into heaven.
          At Córdoba, in Spain, the holy Martyrs Leovigild and Christopher, Monks, who, in the Arabian persecution, imprisoned for the defense of the Christian faith and soon after beheaded and given to the flames, obtained the palm of martyrdom.
          On the island of Hérieu, Saint Philibert, Abbot.
          At Rome, blessed Porphyrius, who was a man of God, who instructed the holy Martyr Agapitus in the faith and teaching of Christ.
          In the castle of Cainone, in Gaul, Saint Maximus, Confessor, who was a disciple of the blessed Bishop Martin.
  psalm.und-cimo-kal-ndas-apr-lis-ab2d053046:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Confessor Cyril, Bishop of Jerusalem, who suffered many things from the Arians for the faith's sake. He was several times driven from his see, but at length fell asleep in peace, illustrious for the glory of holiness. The Ecumenical Council of Constantinople, in writing to Pope Damasus, gave a noble witness to the purity of his faith. Mention hath been made of him on the 18th day of this present month of March.
          Upon the same 22nd day of March, were born into the better life:

          At Narbonne, in Gaul, holy Paul, Bishop of that see. A disciple of the Apostle, who is said to have been the same person as the Proconsul Sergius Paulus, baptized by the blessed Apostle Paul, and on his way into Spain left at Narbonne, where he received the dignity of Bishop, laboured much in the office of preaching, and passed away to heaven, famous for miracles.
          At Terracina, holy Epaphroditus, the disciple of the Apostles, who was ordained Bishop of the said city, by the blessed Apostle Peter.
          In Africa, the holy martyrs Saturninus and nine others.
          In Galatia, [in the year 252,] the holy martyrs Callinice and Basilissa.
          At Ancyra, the holy martyr Basil, a Priest, who was put to most grievous torments under the Emperor Julian the Apostate, and gave up his soul to God.
          At Carthage, the holy Archdeacon Octavian and many thousand martyrs, who were slaughtered by the Vandals for the Catholic faith's sake.
          There also, holy Deogratias, Bishop of Carthage, who redeemed many captives whom the Vandals had brought from Rome, and fell asleep in the Lord, famous for holy works, [in the year 457.]
          At Osimo, in Picenum, holy Benvenuto, Bishop of that see, [in the year 1276.]
          In Sweden, the holy Virgin Katherine, daughter of holy Bridget, [in the year 1381.]
          At Rome, the holy widow Lea, whose graces and her going hence to be with God have been recorded by Holy Jerome, [about the year 384.]
          At Genoa, the holy widow Katherine, eminent for her contempt of the world and her love toward God, [in the year 1510.]
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Aprílis

          Narbóne, in Gállia, natális sancti Pauli Epíscopi, Apostolórum discípuli, quem tradunt fuísse Sérgium Paulum Procónsulem. Hic, a beáto Apóstolo Paulo baptizátus, et ab eo, cum in Hispániam pérgeret, apud Narbónem relíctus, ibídem Episcopáli dignitáte donátus est; ibíque, prædicatiónis offício non ségniter expléto, clarus miráculis migrávit in cælum.
          Tarracínæ, in Campánia, sancti Epaphrodíti, Apostolórum discípuli, qui a beáto Petro Apóstolo Epíscopus illíus civitátis ordinátus fuit.
          Ancýræ, in Galátia, sancti Basilíi, Presbýteri et Mártyris, qui sub Iuliáno Apóstata, gravíssimis cruciátibus afféctus, ánimam Deo réddidit.
          Carthágine sancti Octaviáni Archidiáconi, et multórum míllium Mártyrum, qui, ob fidem cathólicam, a Wándalis cæsi sunt.
          In Africa sanctórum Mártyrum Saturníni et aliórum novem.
          In Galátia natális sanctárum Mártyrum Callinícæ et Basilíssæ.
          Romæ sancti Zacharíæ Papæ, qui Dei Ecclésiam summa vigilántia gubernávit, et clarus méritis quiévit in pace.
          Carthágine sancti Deográtias, Epíscopi Carthaginénsis, qui plúrimos, a Wándalis captívos ex Urbe ductos, redémit, aliísque sanctis opéribus célebris quiévit in Dómino.
          Auximi, in Picéno, sancti Benvenúti Epíscopi.
          Romæ sanctæ Leæ Víduæ, cuius virtútes et tránsitum ad Deum sanctus Hierónymus scribit.
      en2:
      - type: text
        text: |-
          The twenty-second of March
      
          At Narbonne, in Gaul, the birth into heaven of Saint Paul, Bishop and disciple of the Apostles, who is said to have been Sergius Paulus the Proconsul. He was baptized by the blessed Apostle Paul and, when Paul was journeying into Spain, was left by him at Narbonne and there granted the dignity of Bishop; and there, having fulfilled the office of preaching with diligence, he departed to heaven renowned for miracles.
          At Terracina, in Campania, Saint Epaphroditus, disciple of the Apostles, who was ordained Bishop of that city by the blessed Apostle Peter.
          At Ancyra, in Galatia, Saint Basil, Priest and Martyr, who, under Julian the Apostate, was afflicted with the most grievous torments and gave back his soul to God.
          At Carthage, Saint Octavian the Archdeacon, and many thousands of Martyrs, who were slain by the Vandals for the Catholic faith.
          In Africa, the holy Martyrs Saturninus and nine others.
          In Galatia, the birth into heaven of the holy Martyrs Callinicus and Basilissa.
          At Rome, Saint Pope Zachary, who governed God's Church with the greatest vigilance and, renowned for his merits, rested in peace.
          At Carthage, Saint Deogratias, Bishop of Carthage, who redeemed many captives brought from Rome by the Vandals, and celebrated for other holy works, rested in the Lord.
          At Osimo, in Picenum, Saint Benvenutus, Bishop.
          At Rome, Saint Lea, Widow, whose virtues and passing to God Saint Jerome describes.
  psalm.und-cimo-kal-ndas-aug-sti-c96b2373f7:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 22nd day of July, were born into the better life:

          At Marseilles, holy Mary Magdalen, out of whom the Lord cast seven devils, and who was made worthy to be the first to see this same Saviour after that He was risen from the dead.
          At Philippi, holy Syntyche, of whom mention is made by the blessed Apostle Paul.
          At Ancyra, in Galatia, the holy martyr Plato, [in the year 304.]
          Under the Vicar Agrippinus he was cut with stripes, pronged with iron nails, and tormented with other dire sorts of torments, then at last beheaded, and so gave up his soul unconquered to God. The miracles wrought by him in the succouring of prisoners are attested by the acts of the Second Council of Nicea.
          In Cyprus, the holy Praetor Theophilus. The Arabs strove to make him deny Christ, but as neither bribery nor threats could bend him, they slew him with the sword, [in the year 790.]
          At Antioch, holy Cyril, Bishop [of that see,] famous for his teaching and holiness, [in the year 300.]
          In Auvergne, the holy Abbot Menelaus, [about the year 700, Restorer of the Abbey of Menat, in the Diocese of Clermont.]
          In the Monastery of the Blandijnberg, in Gent in Flanders, holy Wandregisilus [St. Wandrille], Abbot of Fontenelle, [in the year 667, the founder of several monasteries.]
          At Lisbon, the holy Confessor Laurence of Brindisi, Minister-General of the Order of Capuchin Friars Minors of St. Francis. He was famous for his preaching of the word of God, and for his hard work for God's glory, and the Supreme Pontiff Leo XIII enrolled his name among those of the saints.
          At Bethshan, in Palestine, the holy Earl Joseph, [about the year 366.]
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Augústi

          Apud Massíliam, in Gállia, natális sanctæ Maríæ Magdalénæ, de qua Dóminus eiécit septem dæmónia, et quæ ipsum Salvatórem a mórtuis resurgéntem prima vidére méruit.
          Ulyssipóne, in Lusitánia, natális sancti Lauréntii a Brundúsio, Confessóris, ex Ordine Fratrum Minórum Capuccinórum, quem verbi Dei prædicatióne, cælésti doctrína, pontificiis legatiónibus rebúsque ad Dei glóriam et Ecclésiæ utilitátem felíciter gestis præclárum, Leo Papa décimus tértius Sanctárum fastis adscrípsit, et Summus Póntifex Ioánnes vigésimus tértius universális Ecclésiæ Doctórem declarávit, eiúsque festum prídie huius diéi celebrári iussit.
          Philíppis, in Macedónia, sanctæ Synthýches, cuius méminit beátus Paulus Apóstolus.
          Ancýræ, in Galátia, natális sancti Platónis Mártyris, qui, sub Agrippíno Vicário, verbéribus cæsus, uncis laniátus férreis, aliísque immaníssimis tormentórum genéribus cruciátus, demum, abscísso cápite, invíctam ánimam Deo réddidit. Ipsíus vero mirácula in subveniéndis captívis, Acta secúndæ Sýnodi Nicǽnæ testántur.
          In Cypro sancti Theóphili Prætóris, qui ab Arábibus tentus, et, cum nec donis nec minis flecti posset ut Christum negáret, gládio cæsus est.
          Antiochíæ sancti Cyrílli Epíscopi, doctrína et sanctitáte conspícui.
          Menáti, in território Arvernénsi, sancti Meneléi Abbátis.
          In monastério Fontanéllæ, in Gállia, sancti Wandregísili Abbátis, miráculis clari; cuius corpus ad Blandínum monastérium, in Flándria, póstea delátum fuit.
          Scythópoli, in Palæstína, sancti Ioséphi Cómitis.
      en2:
      - type: text
        text: |-
          The twenty-second of July
      
          Near Marseilles, in Gaul, the birth into heaven of Saint Mary Magdalene, from whom the Lord cast out seven demons, and who merited to be the first to see the Savior himself risen from the dead.
          At Lisbon, in Portugal, the birth into heaven of Saint Lawrence of Brindisi, Confessor, of the Order of Friars Minor Capuchin, whom Pope Leo XIII, illustrious for the preaching of the word of God, heavenly learning, pontifical legations, and achievements happily accomplished for the glory of God and the benefit of the Church, enrolled in the catalogue of the Saints; and Pope John XXIII declared him a Doctor of the universal Church and ordered his feast to be celebrated on the preceding day.
          At Philippi, in Macedonia, Saint Syntyche, of whom the blessed Apostle Paul makes mention.
          At Ancyra, in Galatia, the birth into heaven of Saint Plato, Martyr, who, under the vicarius Agrippinus, was beaten with rods, torn with iron hooks, afflicted with other most savage forms of torture, and at last, with his head cut off, gave back his unconquered soul to God. His miracles in assisting captives are attested by the Acts of the Second Council of Nicaea.
          In Cyprus, Saint Theophilus the Praetor, who was captured by the Arabs and, when he could not be moved by gifts or threats to deny Christ, was put to death by the sword.
          At Antioch, Saint Cyril, Bishop, conspicuous for learning and holiness.
          At Menat, in the territory of Auvergne, Saint Menelaüs, Abbot.
          In the monastery of Fontenelle, in Gaul, Saint Wandregisilus, Abbot, renowned for miracles; whose body was afterward transferred to the monastery of Saint Peter at Ghent, in Flanders.
          At Scythopolis, in Palestine, Saint Joseph the Count.
  psalm.und-cimo-kal-ndas-dec-mbris-02d1f1c5c3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          The morrow is the Feast of the Presentation of the Blessed Virgin Mary, Mother of God, in the Temple at Jerusalem.
          Upon the same 21st day of November, were born into the better life:

          Holy Rufus, touching whom the holy Apostle Paul writeth unto the Romans.
          At Rome, the holy martyrs Celsus and Clement.
          At Ostia, the holy martyrs Demetrius and Honorius.
          At Rheims, (in the year 1192,) the holy martyr Albert, Bishop of Liege, who was slain for defending the freedom of the Church.
          In Spain, the holy martyrs Honorius, Eutychius, and Stephen.
          In Pamphylia, under the President Aetius, in the persecution under the Emperor Aurelian, the holy martyr Heliodorus, by whom his very torturers were converted to the faith for the which cause they were drowned in the sea.
          At Rome, holy Pope Gelasius, famous for his teaching and holiness.
          At Verona, the holy Confessor Maurus, Bishop (of that see.) At the monastery of Bobbio, deceased the holy Abbot Columbanus, the founder of many monasteries, and the Father of many monks, who fell asleep in a good old age, bright with many graces.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Decémbris

          Hierosólymis Præsentátio beátæ Dei Genitrícis Vírginis Maríæ in Templo.
          Eódem die natális beáti Rufi, de quo sanctus Paulus Apóstolus ad Romános scribit.
          Romæ pássio sanctórum Celsi et Cleméntis.
          Rhemis, in Gállia, sancti Albérti, Epíscopi Leodiénsis et Mártyris; qui pro tuénda ecclesiástica libertáte necátus est.
          Apud Ostia Tiberína natális sanctórum Mártyrum Demétrii et Honórii.
          In Hispánia sanctórum Mártyrum Honórii, Eutýchii et Stéphani.
          In Pamphýlia sancti Heliodóri Mártyris, in persecutióne Aureliáni, sub Aétio Prǽside. Post eum vero ipsi tortóres, convérsi ad fidem, in mare demérsi sunt.
          Romæ sancti Gelásii Papæ Primi, doctrína et sanctitáte conspícui.
          Verónæ sancti Mauri, Epíscopi et Confessóris.
          In monastério Bobiénsi deposítio sancti Columbáni Abbátis, qui, multórum cœnóbiorum fundátor, plurimórum Monachórum éxstitit Pater, multísque virtútibus clarus, in senectúte bona quiévit.
      en2:
      - type: text
        text: |-
          The twenty-second of November
      
          At Jerusalem, the Presentation of the blessed Mother of God, the Virgin Mary, in the Temple.
          On the same day, the birth into heaven of blessed Rufus, of whom the blessed Apostle Paul writes to the Romans.
          At Rome, the passion of the holy Celsus and Clement.
          At Rheims, in Gaul, Saint Albert, Bishop of Liège and Martyr; who was killed in defense of ecclesiastical liberty.
          Near the Tiber's mouth, the birth into heaven of the holy Martyrs Demetrius and Honorius.
          In Spain, the holy Martyrs Honorius, Eutychius, and Stephen.
          In Pamphylia, Saint Heliodorus, Martyr, in the persecution under Aurelian, under the prefect Aetius. After him, however, his very torturers, converted to the faith, were drowned in the sea.
          At Rome, Saint Pope Gelasius I, conspicuous for learning and holiness.
          At Verona, Saint Maurus, Bishop and Confessor.
          In the monastery of Bobbio, the deposition of Saint Columbanus, Abbot, who, founder of many monasteries and father of countless monks, renowned for many virtues, rested in a good old age.
  psalm.und-cimo-kal-ndas-febru-rii-8c7110c2d5:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 22nd day of January, were born into the better life:

          At Valentia, in Spain, the holy Levite and martyr Vincent. Under the wicked Prefect Dacian he suffered imprisonment, starvation, racking, twisting of his limbs, red-hot plates, and bed of red-hot iron, and other kinds of torments, and passed away to heaven to receive there a martyr's reward, (in the year 304.) The glorious triumph of his passion hath been set forth by Prudentius in noble poetry, and the blessed Augustine and the holy Pope Leo have praised him in the highest language.
          In Persia, the holy monk Anastasius, who, after enduring many torments of imprisonment, stripes, and bonds at Caesarea, in Palestine, suffered much again under Chosroes, King of the Persians, and was at length beheaded, when he had sent before him seventy companions who suffered martyrdom by drowning, (in the year 628.) His head and his venerable image were afterwards brought to Rome, and the acts of the Second Council of Nicea bear witness that at the sight of them devils fly and diseases are healed.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Februárii

          Valéntiæ, in Hispánia Tarraconénsi, sancti Vincéntii, Levítæ et Mártyris; qui, sub impiíssimo Prǽside Daciáno, cárceres, famem, equúleum, distorsiónes membrórum, láminas candéntes, férream cratem ignítam áliaque tormentórum génera perpéssus, ad martýrii prǽmium evolávit in cælum; cuius passiónis nóbilem triúmphum Prudéntius luculénter vérsibus exséquitur, et beátus Augustínus ac sanctus Leo Papa summis láudibus comméndant.
          Apud Bethsáloën, in Assýria, sancti Anastásii Persæ Mónachi, qui, post plúrima torménta cárceris, vérberum et vinculórum, quæ in Cæsaréa Palæstínæ perpéssus fúerat, a Persárum Rege Chósroa multis pœnis afféctus, ad últimum decollátus est, cum prius septuagínta Sócios, qui fúerant in fluénta demérsi, ad martýrium præmisísset. Eius caput Romam, ad Aquas Sálvias, delátum est, una cum veneránda eius imágine, cuius aspéctu fugári dǽmones morbósque curári, Acta secúndi Concílii Nicǽni testántur.
          Ebredúni, in Gálliis, sanctórum Mártyrum Vincéntii, Oróntii et Victóris, qui martýrio in Diocletiáni persecutióne coronáti sunt.
          Nováriæ sancti Gaudéntii, Epíscopi et Confessóris.
          Soræ sancti Domínici Abbátis, miráculis clari.
      en2:
      - type: text
        text: |-
          The twenty-second of January
      
          At Valencia, in Tarraconensian Spain, Saint Vincent, Levite and Martyr; who, under the most impious prefect Dacianus, endured imprisonment, hunger, the rack, the dislocation of his limbs, red-hot iron plates, a burning iron grate, and other kinds of torment, and soared to the reward of martyrdom in heaven; the noble triumph of whose passion Prudentius celebrates in splendid verse, and whom the blessed Augustine and Saint Pope Leo commend with the highest praise.
          Near Bethsaloe, in Assyria, Saint Anastasius the Persian Monk, who, after many torments of prison, beatings, and chains which he had endured in Caesarea of Palestine, was afflicted with many punishments by Chosroes, King of the Persians, and at last was beheaded, having first sent seventy companions, who had been drowned in a river, ahead of him to martyrdom. His head was brought to Rome, to the Aquae Salviae, together with his venerable image, by the sight of which, as the Acts of the Second Council of Nicaea attest, demons are put to flight and diseases are cured.
          At Embrun, in Gaul, the holy Martyrs Vincent, Orontius, and Victor, who were crowned with martyrdom in the persecution of Diocletian.
          At Novara, Saint Gaudentius, Bishop and Confessor.
          At Sora, Saint Dominic, Abbot, renowned for miracles.
  psalm.und-cimo-kal-ndas-i-lii-29b46cc5c9:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of June, were born into the better life:

          At Rome, [in the year 1591,] holy Aloysius Gonzaga, of the Society of Jesus, illustrious for his contempt of earthly rank, and for the innocency of his life.
          Also at Rome, the holy Virgin Demetria, who was crowned with martyrdom under the Emperor Julian the Apostate.
          At Syracuse, in Sicily, the holy martyrs Rufinus and Marcia.
          In Africa, the holy martyrs Cyriacus and Apollinaris.
          At Mainz, the holy martyr Alban, who after long toil and stern contending for Christ's faith was made worthy of the crown of life.
          On the same day, holy Eusebius of Samosata. In the time of the Arian Emperor Constantius he used to visit the Churches of God, disguised as a soldier, to confirm them in the Catholic faith. Under Valens he was banished into Thrace. After peace was restored to the Church in the time of Theodosius he was called back from exile, and was visiting the churches again when an Arian woman dropped a tile upon him from a height which cracked his skull, and so he died a martyr at last, [in the year 380.]
          At Iconium, in Lycaonia, the holy martyr Terence, Bishop [of that see.]
          At Pavia, [in the year 216,] the holy Confessor Urciscenus, Bishop [of that see.]
          At Tongres, holy Martin, Bishop [of that see.]
          At Évreux, the holy Abbot Leufroi, [about the year 738.]
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Iúlii

          Romæ sancti Aloísii Gonzágæ, Clérici e Societáte Iesu et Confessóris, principátus contémptu et innocéntia vitæ claríssimi, quem, a Summo Pontífice Benedícto Décimo tértio adscríptum Sanctórum fastis et Protectórem iuvénibus præsértim studiósis datum, Pius Papa Undécimus cæléstem Christiánæ iuventútis univérsæ Patrónum confirmávit solémniter atque íterum declarávit.
          Item Romæ sanctæ Demétriæ Vírginis, quæ, sanctórum Mártyrum Flaviáni et Dafrósæ fília ac sanctæ Vírginis et Mártyris Bibiánæ soror, ipsa quoque, sub Iuliáno Apóstata, martýrio coronáta est.
          Eódem die sancti Eusébii, Samosaténi Epíscopi; qui, témpore Constántii, Imperatóris Ariáni, sub hábitu militári incognítus Ecclésias Dei visitábat, ut in fide cathólica illas confirmáret. Deínde, sub Valénte, in Thráciam relegátur; sed, réddita pace Ecclésiæ, témpore Theodósii, ab exsílio revocátus, tandem, cum íterum Ecclésias visitáret, ei caput, tégula per mulíerem Ariánam désuper immíssa, confráctum est, sicque Martyr occúbuit.
          Icónii, in Lycaónia, sancti Teréntii, Epíscopi et Mártyris.
          Syracúsis, in Sicília, natális sanctórum Mártyrum Rufíni et Martiæ.
          In Africa sanctórum Mártyrum Cyríaci et Apollináris.
          Mogúntiæ sancti Albáni Mártyris, qui ob Christi fidem, post longos labóres et dura certámina, factus est dignus coróna vitæ.
          Pápiæ sancti Urciscéni, Epíscopi et Confessóris.
          Apud Tungrénses sancti Martíni Epíscopi.
          In pago Ebroicénsi sancti Leutfrídi Abbátis.
      en2:
      - type: text
        text: |-
          The twenty-second of June
      
          At Rome, Saint Aloysius Gonzaga, Cleric of the Society of Jesus and Confessor, most renowned for contempt of princely rank and innocence of life, whom, enrolled in the catalogue of the Saints by the Supreme Pontiff Benedict XIII and given as Patron especially to studious youth, Pope Pius XI solemnly confirmed and again declared the heavenly Patron of all Christian youth.
          Likewise at Rome, Saint Demetria, Virgin, who, daughter of the holy Martyrs Flavian and Dafrosa and sister of the holy Virgin and Martyr Bibiana, was herself also crowned with martyrdom under Julian the Apostate.
          On the same day, Saint Eusebius, Bishop of Samosata; who, in the time of the Arian Emperor Constantius, visited the churches of God in disguise under a soldier's garb to strengthen them in the Catholic faith. Afterwards, under Valens, he was exiled to Thrace; but, when peace was restored to the Church in the time of Theodosius, recalled from exile, he at last, while again visiting the churches, had his head broken by a tile thrown upon him from above by an Arian woman, and thus died a Martyr.
          At Iconium, in Lycaonia, Saint Terentius, Bishop and Martyr.
          At Syracuse, in Sicily, the birth into heaven of the holy Martyrs Rufinus and Martia.
          In Africa, the holy Martyrs Cyriacus and Apollinaris.
          At Mainz, Saint Alban, Martyr, who, for the faith of Christ, after long labors and hard struggles, was found worthy of the crown of life.
          At Pavia, Saint Urciscenus, Bishop and Confessor.
          Near Tongres, Saint Martin, Bishop.
          In the district of Evreux, Saint Leufredus, Abbot.
  psalm.und-cimo-kal-ndas-i-nii-f6929241f3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow we keep the feast of the holy Ubald, Bishop of Gubbio, who was famous for miracles, and of whom mention is made upon the 16th day of this same month of May.
          Upon the same 22nd day of May, were born into the better life:

          At Rome, the holy martyrs Faustinus, Timothy, and Venustus.
          In Africa, [at the beginning of the third century,] the holy martyrs Castus and Emilius, who finished their testimony by the suffering of fire; of them blessed Cyprian writeth that in the first skirmish they were conquered, but in the second battle the Lord made them conquerors, that they who had first yielded to the flames might become stronger than the flames.
          In Corsica, [in the fifth century,] the holy Virgin [martyr] Julia, who endured the Cross, and so was crowned.
          At Comana, in Pontus, the holy martyr Basiliscus, who obtained the glory of martyrdom under the Emperor Maximian and the President Agrippa. He was shod with iron boots pierced with fiery nails, and suffered many other things likewise, before his head was cut off and he was cast into the river.
          In Spain, the holy Virgin martyr Quiteria.
          At Ravenna, the holy Confessor Marcian, Bishop [of that see.]
          In the country of Auxerre, the blessed Abbot Romanus, who ministered to holy Benedict when he was in the cave, and afterwards went into Gaul, where he built a monastery, and fell asleep in the Lord, leaving many heirs of his holiness.
          At Aquino, [in the twelfth century,] the holy Confessor Fulco.
          At Pistoja, in Tuscany, [also in the twelfth century,] the blessed Attho, monk of the Order of Valombrosa, [who became Bishop of Pistoja.]
          At Auxerre, [in the fifth century,] the holy Virgin Helen.
          At Cassia, in Umbria, [in the year 1456,] the blessed Rita, a widow, a nun of the Order of Augustine Hermits, who, after having been married in the world, loved only the Eternal Bridegroom Christ.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Iúnii

          Romæ sanctórum Mártyrum Faustíni, Timóthei et Venústi.
          In Africa sanctórum Mártyrum Casti et Æmílii, qui per passiónis ignem martýrium consummárunt. Hos (ut beátus Cypriánus scribit), in prima congressióne devíctos, Dóminus victóres in secúndo prǽlio réddidit, ut fortióres ígnibus fíerent qui ígnibus ante cessíssent.
          Cománæ, in Ponto, sancti Basilísci Mártyris, qui, sub Maximiáno Imperatóre et Agríppa Prǽside, férreas calceátus crépidas, ignítis clavis confíxas, múltaque ália passus, demum, cápite obtruncátus et in flumen proiéctus, martýrii glóriam consecútus est.
          In Córsica sanctæ Iúliæ Vírginis, quæ crucis supplício coronáta est.
          In Hispánia sanctæ Quitériæ, Vírginis et Mártyris.
          Ravénnæ sancti Marciáni, Epíscopi et Confessóris.
          Pistórii, in Túscia, beáti Atthónis Epíscopi, ex Ordine Vallis Umbrósæ.
          In pago Antisiodorénsi beáti Románi Abbátis, qui sancto Benedícto ministrávit in specu; inde, in Gállias proféctus, ibi, ædificáto monastério relictísque multis sanctitátis alúmnis, quiévit in Dómino.
          Apud Aquínum sancti Fulci Confessóris.
          Antisiodóri sanctæ Hélenæ Vírginis.
          Cássiæ, in Umbria, sanctæ Ritæ Víduæ, Moniális ex Ordine Eremitárum sancti Augustíni; quæ, post sǽculi núptias, ætérnum sponsum Christum únice diléxit.
      en2:
      - type: text
        text: |-
          The twenty-second of May
      
          At Rome, the holy Martyrs Faustinus, Timothy, and Venustus.
          In Africa, the holy Martyrs Castus and Emilius, who completed their martyrdom through the fire of suffering. These men (as the blessed Cyprian writes), defeated in their first encounter, the Lord restored as victors in the second contest, so that those who had given way before fire might become stronger in fire.
          At Comana, in Pontus, Saint Basiliscus, Martyr, who, under the Emperor Maximian and the prefect Agrippa, was shod with iron sandals fitted with red-hot nails, and after enduring many other torments, was at last beheaded and thrown into a river, and thus attained the glory of martyrdom.
          In Corsica, Saint Julia, Virgin, who was crowned with the punishment of the cross.
          In Spain, Saint Quiteria, Virgin and Martyr.
          At Ravenna, Saint Marcian, Bishop and Confessor.
          At Pistoia, in Tuscany, blessed Atto, Bishop, of the Order of Vallombrosa.
          In the district of Auxerre, blessed Romanus, Abbot, who ministered to Saint Benedict in his cave; afterward departing to Gaul, he built a monastery there and left behind many children of holiness, and rested in the Lord.
          Near Aquino, Saint Fulco, Confessor.
          At Auxerre, Saint Helena, Virgin.
          At Cascia, in Umbria, Saint Rita, Widow, Nun of the Order of Hermits of Saint Augustine; who, after wedded life in the world, loved Christ, her eternal Spouse, with singular devotion.
  psalm.und-cimo-kal-ndas-ianu-rii-4d27e0f278:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 22nd day of December, were born into the better life:

          At Rome, between the two Laurels upon the Lavican Way, thirty holy martyrs, who were all crowned in one day in the persecution under the Emperor Diocletian.
          There likewise the holy Flavian, the ex-Prefect (of Rome), who for Christ's sake was first branded and then banished under the Emperor Julian the Apostate. He was sent to Bagni di Ferrata, (near Civita Vecchia,) where he gave up his soul to God in prayer, (in the year 362.)
          At Ostia, the holy martyrs Demetrius, Honoratus, and Florus.
          At Alexandria, the holy martyr Ischyrion. Many injuries and reproaches were cast upon him to make him sacrifice to idols, but he despised them, and was handed over to be slain by the driving of a sharp stake through the midst of his bowels, (in the year 250.)
          In Egypt, (in the third century,) holy Chaeremon, Bishop of Nilopolis, and many other martyrs, of whom some, scattered in flight to escape the persecution under the Emperor Decius, were killed by wild beasts as they wandered in the desert some were destroyed by hunger, cold, and sickness and some were murdered by savages and robbers.
          At Nicomedia, the holy soldier Zeno, who made a jest upon the Emperor Diocletian as he was offering sacrifice to Ceres, and for this cause had his jaws broken, his teeth beaten out, and his head cut off.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Ianuárii

          Romæ, via Lavicána, inter duas Lauros, natális sanctórum trigínta Mártyrum, qui omnes una die, in persecutióne Diocletiáni, martýrio coronáti sunt.
          Item Romæ sancti Flaviáni Expræfécti, viri beátæ Mártyris Dafrósæ atque patris beatárum Vírginum et Mártyrum Bibiánæ ac Demétriæ; qui, sub Iuliáno Apóstata, pro Christo inscriptióne damnátus, et ad Aquas Taurínas, in Etrúria, in exsílium missus, illic in oratióne spíritum Deo réddidit.
          In Ægýpto sanctórum Chæremónis, Epíscopi Nilópolis, et aliórum plurimórum Mártyrum. Horum álii, sæviénte Décii persecutióne, fuga dispérsi, in solitudínibus errántes, a béstiis interémpti sunt; álii fame, frígore ac languóre consúmpti; álii a bárbaris et latrónibus necáti; atque ita omnes, divérso mortis génere, eádem martýrii glória coronáti sunt.
          Apud Ostia Tiberína sanctórum Mártyrum Demétrii, Honoráti et Flori.
          Alexandríæ sancti Ischyriónis Mártyris, qui, cum ad sacrificándum convíciis et iniúriis cogerétur atque contémneret, ídeo, præacúta sude per média víscera transverberátus, neci tráditur.
          Nicomedíæ sancti Zenónis mílitis, qui, cum Diocletiánum Céreri immolántem derisísset, proptérea, maxíllis confráctis dentibúsque excússis, cápite truncátus est.
          Chicágiæ sanctæ Francíscæ Xavériæ Cabríni, Vírginis, Institúti Missionariárum a Sacratíssimo Corde Iesu Fundatrícis, exímia caritáte, invícta ánimi fortitúdine et humilitáte insígnis, quam Pius Papa Duodécimus Sanctárum catálogo adscrípsit et ómnium emigrántium cæléstem apud Deum Patrónam constítuit.
      en2:
      - type: text
        text: |-
          The twenty-second of December
      
          At Rome, on the Via Lavicana, between the two Laurels, the birth into heaven of thirty holy Martyrs, who were all crowned with martyrdom on one day in the persecution of Diocletian.
          Likewise at Rome, Saint Flavian, former Prefect, husband of the blessed Martyr Dafrosa and father of the blessed Virgins and Martyrs Bibiana and Demetria; who, under Julian the Apostate, condemned for the faith of Christ by a written sentence and sent into exile at Aquae Taurinenses, in Etruria, there gave up his spirit to God in prayer.
          In Egypt, the holy Chaerémon, Bishop of Nicopolis, and very many other Martyrs. Of these, some, scattered in flight during the fury of the Decian persecution, wandered in solitudes and were killed by wild beasts; others were consumed by hunger, cold, and disease; others were slain by barbarians and robbers; and so all, by diverse kinds of death, were crowned with the same glory of martyrdom.
          Near the mouth of the Tiber, the holy Martyrs Demetrius, Honoratus, and Florus.
          At Alexandria, Saint Ischyrion, Martyr, who, when he was compelled by insults and violence to offer sacrifice and refused, was for that reason run through the middle of his entrails with a sharpened stake and given over to death.
          At Nicomedia, Saint Zeno the soldier, who, having mocked Diocletian while he was sacrificing to Ceres, had his jaw-bones broken and teeth knocked out, and was beheaded for this.
          At Chicago, Saint Frances Xavier Cabrini, Virgin, Foundress of the Institute of Missionary Sisters of the Most Sacred Heart of Jesus, outstanding for extraordinary charity, unconquered strength of soul, and humility, whom Pope Pius XII enrolled in the catalogue of the Saints and appointed as heavenly Patron before God of all emigrants.
  psalm.und-cimo-kal-ndas-m-rtii-1e67a5c725:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 19th day of February, were born into the better life:

          At Rome, [in the year 296,] the holy martyr Gavin, a Priest who was the brother of the blessed Pope Caius, and who was long kept in prison and chains by the Emperor Diocletian, and gained the gladness of heaven through a death precious in the sight of the Lord.
          In Africa, the holy martyrs Publius, Julian, Marcellus, and others.
          In Palestine are commemorated the holy monks and other martyrs who [about the year 508] were cruelly slain for Christ's faith's sake by the Saracens under Al Mundar, their general.
          At Jerusalem, [in the year 304,] holy Zambdas, [counted thirty-ninth] Bishop of that holy city.
          At Soli, [in Cyprus, in the year 102,] holy Auxibius, Bishop [of that see.]
          At Beneventum, [in the year 682,] holy Barbatus, Bishop of that see, famous for his holiness, who brought the Lombards and their leader to Christ.
          At Milan, [about the year 700,] the holy Confessor Mansuetus, Bishop of that see.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Mártii

          Romæ natális sancti Gabíni, Presbýteri et Mártyris, qui fuit frater beáti Caii Papæ, atque, a Diocletiáno diu in custódia vínculis afflíctus, pretiósa morte sibi cæli gáudia comparávit.
          In Africa sanctórum Mártyrum Públii, Iuliáni, Marcélli et aliórum.
          In Palæstína commemorátio sanctórum Monachórum, et aliórum Mártyrum, qui a Saracénis, sub Duce Alamúndaro, ob Christi fidem, sævíssime cæsi sunt.
          Neápoli, in Campánia, sancti Quod-vult-Deus, Carthaginénsis Epíscopi, qui, una cum Clero, a Rege Ariáno Genseríco in fractas et absque remígiis ac velis naves impósitus, præter spem Neápolim áppulit, ibíque, in exsílio pósitus, Conféssor occúbuit.
          Hierosólymis sancti Zambdæ Epíscopi.
          Solis, in Cypro, sancti Auxíbii Epíscopi.
          Apud Benevéntum sancti Barbati Epíscopi, qui, sanctitáte célebris, Longobárdos et eórum Ducem convértit ad Christum.
          Medioláni sancti Mansuéti, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The twenty-second of February
      
          At Rome, the birth into heaven of Saint Gabinius, Priest and Martyr, who was brother of the blessed Pope Caius, and, long afflicted by Diocletian with custody and chains, gained for himself the joys of heaven by a precious death.
          In Africa, the holy Martyrs Publius, Julian, Marcellus, and others.
          In Palestine, a commemoration of the holy Monks and other Martyrs who were most savagely slaughtered for the faith of Christ by the Saracens, under the duke Alamundarus.
          At Naples, in Campania, Saint Quodvultdeus, Bishop of Carthage, who, together with his Clergy, was put by the Arian King Genseric on broken ships without oars or sails, and, beyond all hope, arrived at Naples, where, living in exile, he died as a Confessor.
          At Jerusalem, Saint Zambdas, Bishop.
          At Soli, in Cyprus, Saint Auxibius, Bishop.
          Near Benevento, Saint Barbatus, Bishop, who, celebrated for holiness, converted the Lombards and their Duke to Christ.
          At Milan, Saint Mansuetus, Bishop and Confessor.
  psalm.und-cimo-kal-ndas-maii-95a0c3eddb:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of April, were born into the better life:

          At Canterbury, in England, holy Anselm, Archbishop of that see, illustrious for his holiness and teaching, [in the year 1109.]
          In Persia, [in the year 345,] the holy martyr Simeon, Bishop of Seleucia and Ctesiphon. He was arrested by order of Sapor, King of the Persians, loaded with chains, and brought before the iniquitous judgment-seat. He refused to worship the sun, and with a free and unfaltering voice bore witness for Christ Jesus. He suffered a long while in prison along with a hundred others, whereof some were bishops, some priests, and others clergy of diverse orders. He recalled to repentance Usthazanes, the king's tutor, who had fallen away from the faith, but who now bravely underwent martyrdom. On the day after, which was the anniversary of the Lord's Sufferings, all the others were slain with the sword before the eyes of Simeon, who earnestly exhorted every one of them, and at the last was himself also beheaded. There suffered, moreover, along with him his eminent Priests Abdechalas and Ananias also Pusicius, the foreman of the king's workmen, who encouraged Ananias when he was wavering, and who was put to a very cruel death by having his tongue cut out through a hole in his neck; and after him was put to death his daughter, who was an hallowed virgin.
          At Alexandria, the holy martyrs, the Priest Arator, Fortunatus, Felix, Silvius, and Vitalis, who fell asleep in prison.
          Also, the holy martyrs Apollo, Isacius, and Crotates, who suffered under the Emperor Diocletian.
          At Antioch, [after the year 686,] the holy Bishop of that city, Anastasius of Sinai.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Maii

          Cantuáriæ, in Anglia, sancti Ansélmi Epíscopi, Confessóris et Ecclésiæ Doctóris, sanctitáte et doctrína conspícui.
          In Pérside natális sancti Simeónis, Epíscopi Seleucíæ et Ctesiphóntis, qui, iubénte Rege Persárum Sápore, comprehénsus ferróque onústus, iníquis tribunálibus exhíbitus, et, cum Solem ipsum adoráre nollet et de Iesu Christo voce líbera et constantíssima testarétur, primum carceráli ergástulo, cum áliis centum (ex quibus álii Epíscopi, álii erant Presbýteri, álii diversórum órdinum Clérici), longo témpore macerátus est. Deínde, cum Usthazánes, Regis nutrítius, qui ante iam lapsus a fide, sed per eum ad pæniténtiam fúerat revocátus, martýrium constánter subiísset, postrídie, qui erat ánnuus Domínicæ passiónis dies, ómnibus ante Simeónis óculos, qui unumquémque eórum strénue exhortabátur, gládio iugulátis, novíssime et ipse decollátus est. Passi sunt étiam cum ipso claríssimi viri Abdéchalas et Ananías, qui eius erant Presbýteri. Pusícius quoque, Præféctus artíficum Regis, eo quod Ananíam titubántem corroborásset, ídeo, collo circa téndinem perforáto et lingua exínde extrácta, crudéli morte occúbuit; post quem et fília eius, quæ erat sacra Virgo, plúribus et diris afflícta cruciátibus ac demum ense decolláta est.
          Alexandríæ sanctórum Mártyrum Aratóris Presbýteri, Fortunáti, Felícis, Sílvii et Vitális, qui in cárcere quievérunt.
          Nicomedíæ sanctórum Mártyrum Apóllinis, Isácii et Codráti; e quibus, sub Diocletiáno Imperatóre, últimus cápite plexus, et, paucis post illum diébus, duo primi in vínculis fame confécti, martýrii corónam meruérunt.
          Antiochíæ sancti Anastásii Sinaítæ Epíscopi.
          Œttingæ Véteris, in Bavária, sancti Conrádi a Parzham, Confessóris, Ordinis Minórum Capuccinórum, caritáte et oratióne insígnis, quem, miráculis clarum, Pius Papa Undécimus Sanctórum número adscrípsit.
      en2:
      - type: text
        text: |-
          The twenty-second of April
      
          At Canterbury, in England, Saint Anselm, Bishop, Confessor, and Doctor of the Church, conspicuous for holiness and learning.
          In Persia, the birth into heaven of Saint Simeon, Bishop of Seleucia and Ctesiphon, who, at the command of the Persian King Sapor, was arrested, laden with chains, and brought before unjust tribunals; and when he refused to worship the sun and bore witness to Jesus Christ with a free and most steadfast voice, he was first worn down for a long time in a prison cell together with a hundred others—of whom some were Bishops, some Priests, some Clerics of various orders. Then, when Usthazanes, the king's foster-father, who had previously fallen from the faith but had been recalled to repentance by him, had steadfastly undergone martyrdom, on the following day—which was the annual day of the Lord's Passion—all were beheaded before Simeon's eyes, each of whom he vigorously exhorted; and last of all he himself was beheaded. The most distinguished men Abdechalas and Ananias, who were his Priests, also suffered with him. Pusicus, too, the Superintendent of the King's craftsmen, because he had strengthened the wavering Ananias, was put to a cruel death by having his neck pierced through the tendon and his tongue pulled out through it; and after him his daughter also, a sacred Virgin, was afflicted with many dreadful torments and at last beheaded with a sword.
          At Alexandria, the holy Martyrs Arator the Priest, Fortunatus, Felix, Silvius, and Vitalis, who rested in prison.
          At Nicomedia, the holy Martyrs Apollo, Isaac, and Codrates; of whom the last, under the Emperor Diocletian, was beheaded, and, a few days after him, the first two perished of hunger in their chains, and they merited the crown of martyrdom.
          At Antioch, Saint Anastasius, Bishop of Sinai.
          At Old Oettingen, in Bavaria, Saint Conrad of Parzham, Confessor, of the Order of Friars Minor Capuchin, outstanding for charity and prayer, whom, renowned for miracles, Pope Pius XI enrolled in the number of the Saints.
  psalm.und-cimo-kal-ndas-nov-mbris-456f7166e3:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 22nd day of October, were born into the better life:

          At Jerusalem, the blessed Bishop Mark, a man of great eminence and learning, who was the first Gentile to be entrusted with the government of the Church of Jerusalem, and who in no long time gained the palm of martyrdom under the Emperor Antonine.
          At Adrianople, in Thrace, the holy martyrs Philip, Bishop (of Heraclea,) the Priest Severus, Eusebius, and Hermes, who, under the Emperor Julian the Apostate, were imprisoned and flogged, and then burnt.
          Likewise, the holy martyrs the Bishop Alexander, the soldier Heraclius, and their Companions.
          At Fermo, in the March of Ancona, (in the third century,) the holy Bishop and martyr Philip.
          At Huesca, in Spain, (in the ninth century,) the holy sisters Nunilo and Alodia, two Virgins who were punished with death by the Saracens for their confession of the faith, and so suffered martyrdom.
          At Cologne, holy Cordula, one of the Companions of holy Ursula, who had hidden herself in terror at the sight of the sufferings and slaughter of the others, but repented thereof, and on the next day showed herself openly, and received the crown of martyrdom, the last of them all.
          At Hierapolis, in Phrygia, holy Abercius, who was illustrious in the time of the Emperor Mark Antonine.
          At Rouen, holy Melanius, Bishop (of that see,) who was ordained by holy Pope Stephen I., and sent thither to preach the Gospel.
          In Tuscany, (towards the end of the ninth century,) the holy Irishman Donatus, (Bishop of Fiesole.)
          At Verona, (in the sixth century,) the holy Confessor Verecundus, Bishop (of that see.)
          At Jerusalem, the holy Mary Salome, concerning whom it is written in the Gospel that she was careful about the burying of the Lord.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Novémbris

          Hierosólymis sanctæ Maríæ Salóme, matris sanctórum Iacóbi et Ioánnis Apostolórum, quæ in Evangélio légitur circa Dómini sepultúram sollícita.
          Item Hierosólymis beáti Marci Epíscopi, claríssimi et doctíssimi viri, qui primus ex Géntibus Ecclésiam Hierosolymórum suscépit regéndam, ac, non multo post, sub Antoníno Imperatóre, martýrii méruit palmam.
          Hadrianópoli, in Thrácia, natális sanctórum Mártyrum Philíppi Epíscopi, Sevéri Presbýteri, Eusébii et Hermétis; qui, sub Iuliáno Apóstata, post cárceres et flagélla, incéndio cremáti sunt.
          Item sanctórum Mártyrum Alexándri Epíscopi, Heráclii mílitis, et Sociórum.
          Apud Firmum, in Picéno, natális sancti Philíppi, Epíscopi et Mártyris.
          Apud Colóniam Agrippínam sanctæ Córdulæ, quæ, cum esset una ex sodálibus sanctæ Ursulæ, atque aliárum supplíciis et cǽdibus pertérrita se occultásset, postrídie, eius rei pǽnitens, se ultro patefécit Hunnis, et, novíssima ómnium, martýrii corónam accépit.
          Oscæ, in Hispánia, sanctárum Vírginum Nunilónis et Alódiæ sorórum, quæ, a Saracénis ob fídei confessiónem capitáli senténtia punítæ, martýrium consummárunt.
          Hierápoli, in Phrýgia, sancti Abércii Epíscopi, qui sub Marco Antoníno Imperatóre cláruit.
          Rotómagi sancti Melánii Epíscopi, qui, a sancto Stéphano Papa ordinátus, illuc ad prædicándum Evangélium missus est.
          In Túscia sancti Donáti Scoti, Epíscopi Fæsuláni.
          Verónæ sancti Verecúndi, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The twenty-second of October
      
          At Jerusalem, Saint Mary Salome, mother of the holy Apostles James and John, who is mentioned in the Gospel as being solicitous about the Lord's burial.
          Likewise at Jerusalem, blessed Mark, Bishop, a most distinguished and learned man, who was the first drawn from the Gentiles to govern the Church of Jerusalem, and not much later, under the Emperor Antoninus, merited the palm of martyrdom.
          At Hadrianople, in Thrace, the birth into heaven of the holy Martyrs Philip, Bishop; Severus, Priest; Eusebius and Hermes; who, under Julian the Apostate, after imprisonment and floggings, were burned in fire.
          Likewise, the holy Martyrs Alexander, Bishop; Heraclius the soldier; and their companions.
          Near Fermo, in Picenum, the birth into heaven of Saint Philip, Bishop and Martyr.
          Near Cologne, Saint Cordula, who, being one of the companions of Saint Ursula and having hidden herself, terrified by the sufferings and slaughter of the others, repented the following day and gave herself up willingly to the Huns, and, the last of all, received the crown of martyrdom.
          At Huesca, in Spain, the holy Virgins Nunilo and Alodia, sisters, who, punished by capital sentence by the Saracens for confessing the faith, completed their martyrdom.
          At Hierapolis, in Phrygia, Saint Abercius, Bishop, who flourished under the Emperor Marcus Antoninus.
          At Rouen, Saint Melanius, Bishop, who was ordained by the holy Pope Stephen and sent there to preach the Gospel.
          In Tuscany, Saint Donatus Scottus, Bishop of Fiesole.
          At Verona, Saint Verecundus, Bishop and Confessor.
  psalm.und-cimo-kal-ndas-oct-bris-4a8b53f02b:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          Upon the 21st day of September, were born into the better life:

          The holy Apostle and Evangelist Matthew, who suffered in Ethiopia, where he had preached the Gospel. A copy of his Gospel written in the Hebrew language was, by a revelation from himself, found in the time of the Emperor Zeno, along with the body of the blessed Apostle Barnabas.
          In the land of Shaar, the holy prophet Jonah, who is buried in Gath.
          At Rome, the holy martyr Pamphilus.
          Likewise at Rome, at the twentieth milestone from the city upon the Claudian Way, the holy Bishop and martyr Pope Alexander I. Under the Emperor Antonine, he, for Christ's faith's sake, overcame fettering, cudgelling, racking, burning with lamps, tearing with hooks, exposure to wild beasts, and the fire of a furnace, and being at last beheaded won the life of glory that fadeth not away. The blessed Pope Damasus afterwards brought his body into the city on the 26th day of November, upon the which day he commanded a feast to be kept in his honour.
          In Phoenicia, the holy martyr Eusebius, who went openly to the Prefect and proclaimed himself a Christian, for the which cause he was put to many torments and then beheaded.
          In Cyprus, the holy Bishop and martyr Isacius, and there also the holy Bishop and Confessor Meletius.
          In Ethiopia, the holy Virgin Iphigenia, who was baptized and consecrated to God by the blessed Apostle Matthew, and fell asleep in a holy death.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Octóbris

          In Æthiópia natális sancti Matthǽi, Apóstoli et Evangelístæ; qui, in ea regióne prǽdicans, martýrium passus est. Huius Evangélium, Hebrǽo sermóne conscríptum, ipso Matthǽo revelánte, invéntum est, una cum córpore beáti Bárnabæ Apóstoli, témpore Zenónis Imperatóris.
          In terra Saar sancti Ionæ Prophétæ, qui sepúltus est in Geth.
          In Æthiópia sanctæ Iphigéniæ Vírginis, quæ, baptizáta a beáto Matthǽo Apóstolo et Deo dicáta, sancto fine quiévit.
          Romæ sancti Pámphili Mártyris.
          Eódem die, via Cláudia, vigésimo ab Urbe milliário, pássio sancti Alexándri Epíscopi, qui, sub Antoníno Imperatóre, pro Christi fide, víncula, fustes, equúleum, lámpades ardéntes, ungulárum laniatiónem, béstias ac fornácis superávit flammas, ac tandem, gládio cæsus, vitam adéptus est gloriósam. Eius corpus póstea beátus Dámasus Papa in Urbem tránstulit sexto Kaléndas Decémbris.
          In Cypro sancti Isácii, Epíscopi et Mártyris.
          In Phœnícia sancti Eusébii Mártyris, qui, cum ultro Præféctum adísset et se Christiánum esse denuntiásset, ab eo, multis torméntis afflíctus, cápite cæsus est.
          In Cypro sancti Melétii, Epíscopi et Confessóris.
      en2:
      - type: text
        text: |-
          The twenty-second of September
      
          In Ethiopia, the birth into heaven of Saint Matthew, Apostle and Evangelist; who, preaching in that region, suffered martyrdom. His Gospel, written in the Hebrew tongue, was discovered at his own revelation, together with the body of the blessed Apostle Barnabas, in the time of the Emperor Zeno.
          In the land of Saar, Saint Jonah the Prophet, who was buried at Geth.
          In Ethiopia, Saint Iphigenia, Virgin, who, baptized by the blessed Apostle Matthew and consecrated to God, rested in a holy death.
          At Rome, Saint Pamphilus, Martyr.
          On the same day, on the Via Claudia, at the twentieth milestone from the City, the passion of Saint Alexander, Bishop, who, under the Emperor Antoninus, for the faith of Christ, endured chains, blows, the rack, burning lamps, the tearing of flesh-hooks, wild beasts, and the flames of a furnace, and at last, struck down by the sword, attained a glorious life. His body was afterward transferred to the City by the blessed Pope Damasus on the twenty-sixth of November.
          In Cyprus, Saint Isaac, Bishop and Martyr.
          In Phoenicia, Saint Eusebius, Martyr, who, having gone of his own accord to the prefect and declared himself a Christian, was afflicted by him with many torments and beheaded.
          In Cyprus, Saint Meletius, Bishop and Confessor.
  psalm.und-cimo-kal-ndas-sept-mbris-f3f4b4e821:
    role: psalm
    content:
      en:
      - type: text
        text: |-
          On the morrow is the Octave of the Assumption of the Blessed Virgin Mary.
          Upon the same 22nd day of August, were born into the better life:

          At Rome, upon the Ostian Way, [in the fourth century,] the holy martyr Timothy. He was tried by Tarquinius, Prefect of the city, and suffered a long imprisonment, and forasmuch as he would not sacrifice to idols, he was then hided, put to horrid tortures, and at length beheaded.
          At Porto, [in the third century,] holy Hippolytus, Bishop [of that city,] a man of eminent learning, who received the palm of martyrdom under the Emperor Alexander, on account of his illustrious confession of the faith, for the which he had his hands and feet tied and was cast into a deep pit full of water his body was buried by the Christians at the same place.
          At Autun, the holy martyr Symphorian, who finished his testimony in the time of the Emperor Aurelian, because he would not sacrifice unto idols, being first beaten, then imprisoned, and in the end beheaded.
          At Rome, [in the second century,] the holy martyr Antoninus. He openly professed himself a Christian, and therefore was sentenced to death by Vitellius the judge, and was buried upon the Aurelian Way.
          Likewise at Porto, [in the third century,] the holy martyrs Martial, Saturninus, Epictetus, Maprilis, and Felix, and their Companions.
          At Nicomedia, under the Emperor Maximian and the President Eutholomius, the holy martyrs Agathonicus, Zoticus, and their Companions.
          At Tarsus, [in Cilicia,] under the Emperor Valerian, the holy martyrs Athanasius, Bishop [of that see,] the noble lady Anthusa, whom he had baptized, and two of her slaves, [called Charisius and Neophytus.]
          At Reims, [at the end of the third century,] the holy martyrs Maurus and his [forty-nine] Companions.
          In Spain, the holy martyrs Fabrician and Philibert.
          At Pavia, the holy martyr Gunifort.
      la:
      - type: text
        text: |-
          Undécimo Kaléndas Septémbris

          Festum Immaculáti Cordis beátæ Vírginis Maríæ.
          Romæ, via Ostiénsi, natális sancti Timóthei Mártyris, qui, a Præfécto Urbis Tarquínio tentus, et longa cárceris custódia macerátus, et, cum sacrificáre idólis noluísset, tértio cæsus et gravíssimis supplíciis attrectátus, ad últimum decollátus est.
          In Portu Románo sancti Hippólyti Epíscopi, eruditióne claríssimi, qui, sub Alexándro Imperatóre, ob præcláram fídei confessiónem, mánibus pedibúsque ligátis in altam fóveam, aquis plenam, præcipitátus, martýrii palmam accépit; cuius corpus apud eúndem locum a Christiánis sepúltum fuit.
          Augustodúni sancti Symphoriáni Mártyris, qui, témpore Aureliáni Imperatóris, cum sacrificáre nollet idólis, primo verbéribus afflíctus est, deínde cárceri mancipátus; atque ad últimum, cæso cápite, martýrium consummávit.
          Tudérti, in Umbria, natális sancti Philíppi Benítii, Confessóris, Florentíni, qui Ordinis Servórum beátæ Maríæ Vírginis éxstitit propagátor et exímiæ humilitátis vir; atque a Cleménte Décimo, Pontífice Máximo, Sanctórum número adscríptus est. Ipsíus autem festívitas sequénti die celebrátur.
          Romæ sancti Antoníni Mártyris, qui, cum se Christiánum líbera voce faterétur, senténtia capitáli a Iúdice Vitéllio damnátus est, et a Rufino Presbýtero via Aurélia sepúltus.
          Tarsi, in Cilícia, commemorátio sanctórum Athanásii, Epíscopi et Mártyris, Anthúsæ, nóbilis féminæ, quam ipse baptizáverat, ac simul Charísii et Neóphyti Mártyrum, eiúsdem Anthúsæ servórum, qui sub Valeriáno Imperatóre passi sunt.
          In Portu Románo sanctórum Mártyrum Martiális, Saturníni, Epictéti, Maprílis et Felícis, cum Sóciis eórum.
          Nicomedíæ pássio sanctórum Agathoníci, Zótici et Sociórum Mártyrum, sub Maximiáno Imperatóre et Eutólmio Prǽside.
          Rhemis, in Gállia, sanctórum Mártyrum Mauri et Sociórum.
          In Hispánia sanctórum Mártyrum Fabriciáni et Philibérti.
          Papíæ sancti Gunifórti Mártyris.
      en2:
      - type: text
        text: |-
          The twenty-second of August
      
          The feast of the Immaculate Heart of the Blessed Virgin Mary.
          At Rome, on the Via Ostiensis, the birth into heaven of Saint Timothy, Martyr, who was seized by the Prefect of the City Tarquinius, worn down by a long imprisonment, and, when he had refused to sacrifice to idols, beaten three times and subjected to the most grievous torments, and at last beheaded.
          At the Port of Rome, Saint Hippolytus, Bishop, most renowned for learning, who, under the Emperor Alexander, for his outstanding confession of the faith, was thrown with hands and feet bound into a deep pit full of water, and received the palm of martyrdom; whose body was buried by Christians near that same place.
          At Autun, Saint Symphorian, Martyr, who, in the time of the Emperor Aurelian, when he refused to sacrifice to idols, was first afflicted with floggings, then cast into prison; and at last, with his head cut off, completed his martyrdom.
          At Todi, in Umbria, the birth into heaven of Saint Philip Benizi, Confessor, of Florence, who was the propagator of the Order of the Servants of the Blessed Virgin Mary and a man of exceptional humility; and he was enrolled in the number of the Saints by Pope Clement X. His feast, however, is celebrated on the following day.
          At Rome, Saint Antoninus, Martyr, who, when he confessed himself a Christian with a free voice, was condemned to capital punishment by the Judge Vitellius and buried by the Priest Rufinus on the Via Aurelia.
          At Tarsus, in Cilicia, a commemoration of the holy Athanasius, Bishop and Martyr; Anthousa, a noble woman whom he had baptized; and likewise the Martyrs Charisius and Neophytus, servants of that same Anthousa, who suffered under the Emperor Valerian.
          At the Port of Rome, the holy Martyrs Martialis, Saturninus, Epictetus, Maprilis, and Felix, with their companions.
          At Nicomedia, the passion of the holy Martyrs Agathonicus, Zoticus, and their companions, under the Emperor Maximian and the prefect Eutolmius.
          At Rheims, in Gaul, the holy Martyrs Maurus and his companions.
          In Spain, the holy Martyrs Fabrician and Philibert.
          At Pavia, Saint Gunifortus, Martyr.
