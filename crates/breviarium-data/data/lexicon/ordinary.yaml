  rubric.sacros-nct-et-indiv-du-trinit-ti-crucif-xi-d-min-cddd73c935:
    role: rubric
    content:
      en:
      - type: text
        text: To the Most Holy and undivided Trinity, to the Manhood of our Lord Jesus Christ Crucified, to the fruitful Virginity of the most blessed and most glorious Mary, always a Virgin, and to the holiness of all the Saints be ascribed everlasting praise, honour, and glory, by all creatures, and to us be granted the forgiveness of all our sins, world without end.
      - type: response
        text: Amen.
      - type: versicle
        text: Blessed be the womb of the Virgin Mary which bore the Son of the Eternal Father.
      - type: response
        text: And blessed be the paps which gave suck to Christ our Lord.
      - type: prayer
        text: Our Father
      - type: prayer
        text: Hail Mary
      la:
      - type: text
        text: Sacrosánctæ et indivíduæ Trinitáti, crucifíxi Dómini nostri Iesu Christi humanitáti, beatíssimæ et gloriosíssimæ sempérque Vírginis Maríæ fœcúndæ integritáti, et ómnium Sanctórum universitáti sit sempitérna laus, honor, virtus et glória ab omni creatúra, nobísque remíssio ómnium peccatórum, per infiníta sǽcula sæculórum.
      - type: response
        text: Amen.
      - type: versicle
        text: Beáta víscera Maríæ Vírginis, quæ portavérunt ætérni Patris Fílium.
      - type: response
        text: Et beáta úbera, quæ lactavérunt Christum Dóminum.
      - type: text
        text: (Et dicitur secreto) Pater noster. (et) Ave Maria.
