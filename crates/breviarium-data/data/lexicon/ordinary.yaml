  hymn.plasm-tor-h-minis-deus-5e0a99fcaf:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Plasmátor hóminis Deus,
          Qui cuncta solus órdinans,
          Humum iubes prodúcere
          Reptántis et feræ genus:

          Qui magna rerum córpora,
          Dictu iubéntis vívida,
          Ut sérviant per órdinem,
          Subdens dedísti hómini:

          Repélle, a servis tuis,
          Quidquid per immundítiam,
          Aut móribus se súggerit,
          Aut áctibus se intérserit.

          Da gaudiórum prǽmia,
          Da gratiárum múnera:
          Dissólve litis víncula:
          Astrínge pacis fœ́dera.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          O God, shaper of man,
          Who alone ordering all things
          Bid the earth bring forth
          The race of creeping things and beasts:
      
          Who gave the great bodies of creation,
          Made living by your commanding word,
          Subjecting them, that they might serve in order,
          To man:
      
          Drive away from your servants
          Whatever impurity
          Insinuates itself in their behavior
          Or intrudes itself in their actions.
      
          Grant us the rewards of joys,
          Grant us the gifts of grace:
          Loose the bonds of strife:
          Bind fast the covenants of peace.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.prima-stropha-hymni-sequentis-dicitur-flexibus-g-bcfce70104:
    role: hymn
    content:
      en:
      - type: rubric
        text: The first verse of the following hymn is said genuflecting.
      - type: text
        text: |-
          Creator Spirit, all Divine,
          Come, visit every soul of Thine,
          And fill with Thy celestial flame
          The hearts which Thou Thyself didst frame.

          O gift of God, Thine is the sweet
          Consoling name of Paraclete
          And spring of life and fire and love
          And unction flowing from above.

          The mystic sevenfold gifts are Thine,
          Finger of God's right hand divine;
          The Father's promise sent to teach
          The tongue a rich and heavenly speech.

          Kindle with fire brought from above
          Each sense, and fill our hearts with love;
          And grant our flesh, so weak and frail,
          The strength of Thine which cannot fail.

          Drive far away our deadly foe,
          And grant us Thy true peace to know;
          So we, led by Thy guidance still,
          May safely pass through every ill.

          To us, through Thee, the grace be shown
          To know the Father and the Son;
          And Spirit of Them both, may we
          Forever rest our faith in Thee.

          To Sire and Son be praises meet,
          And to the Holy Paraclete;
          And may Christ send us from above
          That Holy Spirit's gift of love.
          Amen
      la:
      - type: rubric
        text: Prima stropha hymni sequentis dicitur flexibus genibus.
      - type: text
        text: |-
          Veni Creátor Spíritus,
          Mentes tuórum vísita,
          Imple supérna grátia,
          Quæ tu creásti péctora.

          Qui díceris Paráclitus,
          Altíssimi donum Dei,
          Fons vivus, ignis, cáritas,
          Et spiritális únctio.

          Tu septifórmis múnere,
          Dígitus patérnæ déxteræ,
          Tu rite promíssum Patris,
          Sermóne ditans gúttura.

          Accénde lumen sénsibus:
          Infúnde amórem córdibus:
          Infírma nostri córporis
          Virtúte firmans pérpeti.

          Hostem repéllas lóngius,
          Pacémque dones prótinus:
          Ductóre sic te prǽvio
          Vitémus omne nóxium.

          Per te sciámus da Patrem,
          Noscámus atque Fílium,
          Teque utriúsque Spíritum
          Credámus omni témpore.

          Deo Patri sit glória,
          Et Fílio, qui a mórtuis
          Surréxit, ac Paráclito,
          In sæculórum sǽcula.
          Amen.
