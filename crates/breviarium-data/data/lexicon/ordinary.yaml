  note.1-cor-16-13-14-fda122f062:
    role: note
    content:
      en:
      - type: citation
        text: 1 Cor 16:13-14
      - type: text
        text: Watch ye, stand fast in the faith, do manfully, and be strengthened. Let all your things be done in charity.
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: 'Blessed are they that dwell in thy house, O Lord:'
      - type: response
        text: They shall praise thee for ever and ever.
      la:
      - type: citation
        text: 1 Cor 16:13-14
      - type: text
        text: Vigiláte, state in fide, viríliter ágite, et confortámini. Ómnia vestra in caritáte fiant.
      - type: response
        text: Deo grátias.
      - type: versicle
        text: Beáti qui hábitant in domo tua, Dómine.
      - type: response
        text: In sǽcula sæculórum laudábunt te.
  note.d-minus-in-sion-magnus-e59491c5cf:
    role: note
    content:
      la:
      - type: versicle
        text: Dóminus in Sion magnus.
      - type: response
        text: Et excélsus super omnes pópulos.
  note.eccl-12-2-3-63f3bea6c8:
    role: note
    content:
      la:
      - type: citation
        text: Eccl 12:2-3
      - type: text
        text: 'Bénefac iusto, et invénies retributiónem magnam: et si non ab ipso, certe a Dómino. Non est enim ei bene qui assíduus est in malis, et eleemósynas non danti: quóniam et Altíssimus ódio habet peccatóres, et misértus est pœniténtibus.'
      - type: versicle
        text: Tu autem, Dómine, miserére nobis.
      - type: response
        text: Deo grátias.
      - type: short_response
        text: Misericórdia Dómini * Super timéntes eum.
      - type: response
        text: Misericórdia Dómini * Super timéntes eum.
      - type: versicle
        text: Ab ætérno et usque in ætérnum.
      - type: response
        text: Super timéntes eum.
  note.eccl-12-2-3-c9b502b8c0:
    role: note
    content:
      en:
      - type: citation
        text: Eccli 12:2-3
      - type: text
        text: 'Do good to the just, and thou shalt find great recompense: and if not of him, assuredly of the Lord. For there is no good for him that is always occupied in evil, and that giveth no alms: for the Highest hateth sinners, and hath mercy on the penitent.'
      - type: versicle
        text: But thou, O Lord, have mercy upon us.
      - type: response
        text: Thanks be to God.
      - type: short_response
        text: 'Lord, * hear my prayer:'
      - type: response
        text: 'Lord, * hear my prayer:'
      - type: versicle
        text: And let my cry come unto thee.
      - type: response
        text: 'Hear my prayer:'
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Lord, * hear my prayer.
      la:
      - type: citation
        text: Eccl 12:2-3
      - type: text
        text: 'Bénefac iusto, et invénies retributiónem magnam: et si non ab ipso, certe a Dómino. Non est enim ei bene qui assíduus est in malis, et eleemósynas non danti: quóniam et Altíssimus ódio habet peccatóres, et misértus est pœniténtibus.'
      - type: versicle
        text: Tu autem, Dómine, miserére nobis.
      - type: response
        text: Deo grátias.
      - type: short_response
        text: Dómine, * Exáudi oratiónem meam.
      - type: response
        text: Dómine, * Exáudi oratiónem meam.
      - type: versicle
        text: Et clamor meus ad te véniat.
      - type: response
        text: Exáudi oratiónem meam.
      - type: versicle
        text: Glória Patri, et Fílio, * et Spirítui Sancto.
      - type: response
        text: Sicut erat in princípio, et nunc, et semper, * et in sǽcula sæculórum. Amen.
      - type: response
        text: Dómine, * Exáudi oratiónem meam.
  note.ier-11-18-19-fc1d77c5d6:
    role: note
    content:
      en:
      - type: citation
        text: Jer 11:18-19
      - type: text
        text: 'But thou, O Lord, hast shewn me, and I have known: then thou shewedst me their doings. And I was as a meek lamb, that is carried to be a victim.'
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: Deliver me, O Lord, from the evil man.
      - type: response
        text: Rescue me from the unjust man.
      la:
      - type: citation
        text: Ier 11:18-19
      - type: text
        text: 'Tu autem Dómine demonstrásti mihi, et cognóvi: tunc ostendísti mihi stúdia eórum. Et ego quasi agnus mansuétus, qui portátur ad víctimam.'
      - type: response
        text: Deo grátias.
      - type: versicle
        text: Éripe me, Dómine, ab hómine malo.
      - type: response
        text: A viro iníquo éripe me.
  note.isa-1-16-18-cc9fd27543:
    role: note
    content:
      en:
      - type: citation
        text: Isa 1:16-18
      - type: text
        text: 'Wash yourselves, be clean, take away the evil of your devices from my eyes: cease to do perversely, Learn to do well: seek judgment, relieve the oppressed, judge for the fatherless, defend the widow. And then come, and accuse me, saith the Lord.'
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: They shall bear thee up in their hands,
      - type: response
        text: Lest haply thou dash thy foot against a stone.
      la:
      - type: citation
        text: Isa 1:16-18
      - type: text
        text: 'Lavámini, mundi estóte: auférte malum cogitatiónum vestrárum ab óculis meis: quiéscite ágere pervérse, díscite benefácere: quǽrite iudícium, subveníte opprésso, iudicáte pupíllo, deféndite víduam. Et veníte, et argúite me, dicit Dóminus.'
      - type: response
        text: Deo grátias.
      - type: versicle
        text: In mánibus portábunt te.
      - type: response
        text: Ne forte offéndas ad lápidem pedem tuum.
  note.isa-60-4-5-14014601d9:
    role: note
    content:
      en:
      - type: citation
        text: Isa 60:4-5
      - type: text
        text: Thy sons shall come from afar, and thy daughters shall rise up at thy side. Then shalt thou see, and abound, and thy heart shall wonder and be enlarged, when the multitude of the sea shall be converted to thee, the strength of the Gentiles shall come to thee.
      - type: response
        text: Thanks be to God.
