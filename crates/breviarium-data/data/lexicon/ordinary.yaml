  chapter.de-apostolis-72837948fa:
    role: chapter
    content:
      en:
      - type: heading
        text: Commemoration of the Holy Apostles Peter and Paul
      - type: antiphon
        text: Peter the Apostle, and Paul the Teacher of the Gentiles, have taught us thy law, O Lord.
      - type: text
        text: ''
      - type: versicle
        text: Thou shalt make them princes over all the earth.
      - type: response
        text: They shall be mindful of thy Name, O Lord.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, whose right hand caught the Blessed Peter when he walked upon the water, and began to sink, and thrice delivered his fellow-Apostle Paul from the deep of the sea, when he suffered shipwreck graciously hear us, and grant, for the sake of them both, that we also may attain everlasting glory.
      la:
      - type: heading
        text: De Apostolis
      - type: antiphon
        text: Petrus Apóstolus, et Paulus Doctor Géntium, ipsi nos docuérunt legem tuam Dómine.
      - type: text
        text: ''
      - type: versicle
        text: Constítues eos príncipes super omnem terram.
      - type: response
        text: Mémores erunt nóminis tui Dómine.
      - type: text
        text: |-
          Orémus.
          Deus, cuius déxtera beátum Petrum ambulántem in flúctibus, ne mergerétur, eréxit, et coapóstolum eius Paulum tértio naufragántem de profúndo pélagi liberávit: exáudi nos propítius, et concéde; ut ambórum méritis, æternitátis glóriam consequámur.
  chapter.de-apostolis-97fa0e26a1:
    role: chapter
    content:
      en:
      - type: heading
        text: Commemoration of the Holy Apostles Peter and Paul
      - type: antiphon
        text: These are glorious princes over all the earth, they loved one another in their lives, and in their death they were not divided.
      - type: text
        text: ''
      - type: versicle
        text: Their sound is gone out through all the earth.
      - type: text
        text: A. And their words to the ends of the world.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, whose right hand caught the Blessed Peter when he walked upon the water, and began to sink, and thrice delivered his fellow-Apostle Paul from the deep of the sea, when he suffered shipwreck graciously hear us, and grant, for the sake of them both, that we also may attain everlasting glory.
      la:
      - type: heading
        text: De Apostolis
      - type: antiphon
        text: Gloriósi príncipes terræ, quómodo in vita sua dilexérunt se, ita et in morte non sunt separáti.
      - type: text
        text: ''
      - type: versicle
        text: In omnem terram exívit sonus eórum.
      - type: response
        text: Et in fines orbis terræ verba eórum.
      - type: text
        text: 'Deus, cuius déxtera beátum Petrum ambulántem in flúctibus, ne mergerétur, eréxit, et coapóstolum eius Paulum tértio naufragántem de profúndo pélagi liberávit: exáudi nos propítius, et concéde; ut ambórum méritis, æternitátis glóriam consequámur.'
  chapter.de-beata-maria-8904713905:
    role: chapter
    content:
      la:
      - type: heading
        text: De Beata Maria
      - type: antiphon
        text: 'Sancta María, succúrre míseris, iuva pusillánimes, réfove flébiles, ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu: séntiant omnes tuum iuvámen, quicúmque célebrant tuam sanctam commemoratiónem.'
      - type: antiphon
        text: Sancta María, succúrre míseris, iuva pusillánimes, réfove flébiles, ora pro pópulo, intérveni pro clero, intercéde pro devóto fœmíneo sexu
      - type: rubric
        text: deinde dicuntur semper
      - type: versicle
        text: Ora pro nobis sancta Dei Génetrix.
      - type: response
        text: Ut digni efficiámur promissiónibus Christi.
      - type: text
        text: |
          Orémus.
          Concéde nos fámulos tuos, quǽsumus, Dómine Deus, perpétua mentis et córporis sanitáte gaudére: et, gloriósa beátæ Maríæ semper Vírginis intercessióne, a præsénti liberári tristítia, et ætérna pérfrui lætítia.
          (sed tempore post partum loco horum versuum dicuntur)
          Alma Redemptóris Mater, quæ pérvia cæli
          Porta manes, et stella maris, succúrre cadénti,
          Súrgere qui curat, pópulo: tu quæ genuísti,
          Natúra miránte, tuum sanctum Genitórem,
          Virgo prius ac postérius, Gabriélis ab ore
          Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Post partum, Virgo, invioláta permansísti.
      - type: response
        text: Dei Génetrix, intercéde pro nobis.
      - type: text
        text: |-
          Orémus.
          Deus, qui salútis ætérnæ, beátæ Maríæ virginitáte fecúnda, humáno géneri prǽmia præstitísti: tríbue, quǽsumus; ut ipsam pro nobis intercédere sentiámus, per quam merúimus auctórem vitæ suscípere, Dóminum nostrum Iesum Christum Fílium tuum. Amen.
  chapter.de-beata-maria-e6ebf1f157:
    role: chapter
    content:
      la:
      - type: heading
        text: De Beata Maria
      - type: antiphon
        text: Sancta Dei Génitrix, Virgo semper María, intercéde pro nobis ad Dóminum Deum nostrum. (Allelúia, allelúia.)
      - type: versicle
        text: Ora pro nobis sancta Dei Génetrix.
      - type: response
        text: Ut digni efficiámur promissiónibus Christi.
      - type: text
        text: |
          Orémus.
          Concéde nos fámulos tuos, quǽsumus, Dómine Deus, perpétua mentis et córporis sanitáte gaudére: et, gloriósa beátæ Maríæ semper Vírginis intercessióne, a præsénti liberári tristítia, et ætérna pérfrui lætítia.
          (sed tempore post Epiphaniam aut Septuagesimæ aut Quadragesimæ aut Passionis dicitur)
          Ave, Regína cælórum,
          Ave, Dómina Angelórum:
          Salve radix, salve porta,
          Ex qua mundo lux est orta:

          Gaude, Virgo gloriósa,
          Super omnes speciósa,
          Vale, o valde decóra,
          Et pro nobis Christum exóra.
      - type: versicle
        text: Dignáre me laudáre te, Virgo sacráta.
      - type: response
        text: Da mihi virtútem contra hostes tuos.
      - type: text
        text: |
          Orémus.
          Concéde, miséricors Deus, fragilitáti nostræ præsídium; ut, qui sanctæ Dei Genetrícis memóriam ágimus; intercessiónis eius auxílio, a nostris iniquitátibus resurgámus. Per eúndem Christum Dóminum nostrum. Amen.
          (sed Adventus dicitur)
          Alma Redemptóris Mater, quæ pérvia cæli porta manes,
          et stella maris, succúrre cadénti,
          Súrgere qui curat, pópulo: tu quæ genuísti,
          Natúra miránte, tuum sanctum Genitórem,
          Virgo prius ac postérius, Gabriélis ab ore
          Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Ángelus Dómini nuntiávit Maríæ.
      - type: response
        text: Et concépit de Spíritu Sancto.
      - type: text
        text: |
          Orémus.
          Grátiam tuam, quǽsumus, Dómine, méntibus nostris infúnde: ut, qui, Ángelo nuntiánte, Christi Fílii tui incarnatiónem cognóvimus; per passiónem eius et crucem, ad resurrectiónis glóriam perducámur. Per eúndem Christum Dóminum nostrum. Amen.
          (sed Nativitatis aut Epiphaniæ aut post partum dicitur)
          Alma Redemptóris Mater, quæ pérvia cæli
          Porta manes, et stella maris, succúrre cadénti,
          Súrgere qui curat, pópulo: tu quæ genuísti,
          Natúra miránte, tuum sanctum Genitórem,
          Virgo prius ac postérius, Gabriélis ab ore
          Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Post partum, Virgo, invioláta permansísti.
      - type: response
        text: Dei Génetrix, intercéde pro nobis.
      - type: text
        text: |
          Orémus.
          Deus, qui salútis ætérnæ, beátæ Maríæ virginitáte fecúnda, humáno géneri prǽmia præstitísti: tríbue, quǽsumus; ut ipsam pro nobis intercédere sentiámus, per quam merúimus auctórem vitæ suscípere, Dóminum nostrum Iesum Christum Fílium tuum. Amen.
          (sed Paschali dicitur)
          Regína cæli, lætáre, allelúia;
          Quia quem meruísti portáre, allelúia,
          Resurréxit, sicut dixit, allelúia:
          Ora pro nobis Deum, allelúia.
      - type: versicle
        text: Gaude et lætáre, Virgo María, allelúia.
      - type: response
        text: Quia surréxit Dóminus vere, allelúia.
      - type: text
        text: |-
          Orémus.
          Deus, qui per resurrectiónem Fílii tui, Dómini nostri Iesu Christi, mundum lætificáre dignátus es: præsta, quǽsumus; ut, per eius Genetrícem Vírginem Maríam, perpétuæ capiámus gáudia vitæ. Per eúndem Christum Dóminum nostrum. Amen.
      - type: rubric
        text: deinde dicitur
      - type: text
        text: |-
          Per eúndem Christum Dóminum nostrum.
          (sed post partum omittitur)
      - type: response
        text: Amen.
      - type: text
        text: |-
          (atque commune C10 aut commune C11 hi versus omittuntur)
          (atque rubrica 1951 aut feria 4 dicuntur semper)
      - type: heading
        text: De sancto Ioseph
      - type: antiphon
        text: Ipse Iesus erat incípiens quasi annórum trigínta ut putabátur fílius Ioseph. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Os iusti meditábitur sapiéntiam. (Allelúia.)
      - type: response
        text: Et lingua eius loquétur iudícium. (Allelúia.)
      - type: text
        text: (sed commune C4 aut commune C5 loco huius versus dicitur)
      - type: versicle
        text: Glória et divítiæ in domo eius. (Allelúia.)
      - type: response
        text: Et iustítia eius manet in sǽculum sǽculi. (Allelúia.)
      - type: rubric
        text: deinde dicitur
      - type: text
        text: 'Deus, qui ineffábili providéntia beátum Ioseph sanctíssimæ Genitrícis tuæ sponsum elígere dignátus es: præsta quǽsumus; ut quem protectórem venerámur in terris, intercessórem habére mereámur in cælis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: (atque rubrica 1951 aut feria 3 dicuntur semper)
      - type: heading
        text: De SS. Benedicto, Bernardo et Roberto
      - type: antiphon
        text: Córpora Sanctórum in pace sepúlta sunt, et vivent nómina eórum in ætérnum. (Allelúia, allelúia.)
      - type: versicle
        text: Beáti quos elegísti, Dómine. (Allelúia.)
      - type: response
        text: Habitábunt in átriis tuis. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti, Bernárdi et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.
          (sed die Bernardi)
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: (atque rubrica 1951 aut feria 7 dicuntur semper)
      - type: heading
        text: De Pace
      - type: antiphon
        text: Da pacem Dómine in diébus nostris, quia non est álius, qui pugnet pro nobis, nisi tu Deus noster. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Fiat pax in virtúte tua. (Allelúia.)
      - type: response
        text: Et abundántia in túrribus tuis. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Deus, a quo sancta desidéria, recta consília, et iusta sunt ópera: da servis tuis illam, quam mundus dare non potest, pacem; ut et corda nostra mandátis tuis dédita, et hóstium subláta formídine, témpora sint tua protectióne tranquílla.
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  chapter.de-beata-maria-ef3f0601f6:
    role: chapter
    content:
