        text: Tu exúrgens, Dómine, * Miseréberis Sion.
      - type: versicle
        text: Quia tempus miseréndi eius, quia venit tempus.
      - type: response
        text: Miseréberis Sion.
  short-responsory.veni-ad-liber-ndum-nos-d-mine-deus-virt-tum-1ad7c269b1:
    role: short_responsory
