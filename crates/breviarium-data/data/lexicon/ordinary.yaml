  chapter.gal-6-2-dc34f27e67:
    role: chapter
    content:
      en:
      - type: citation
        text: Gal 6:2
      - type: text
        text: Bear ye one another's burdens; and so you shall fulfill the law of Christ.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Gal 6:2
      - type: text
        text: Alter altérius ónera portáte, et sic adimplébitis legem Christi.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Gal 6:2
      - type: text
        text: Carry one another's burdens, and so shall you fulfill the law of Christ.
      - type: response
        text: Thanks be to God.
  chapter.gen-49-10-4e5fec2238:
    role: chapter
    content:
      en:
      - type: citation
        text: Gen 49:10
      - type: text
        text: The sceptre shall not be taken away from Juda, nor a ruler from his thigh, till he comes that is to be sent, and he shall be the expectation of nations.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Gen 49:10
      - type: text
        text: Non auferétur sceptrum de Iuda, et dux de fémore eius, donec véniat qui mitténdus est; et ipse erit exspectátio géntium.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Gen 49:10
      - type: text
        text: The scepter from Judah and the leader from his thigh will not be taken away, until he who will be sent arrives, and he will be the expectation of Gentiles.
      - type: response
        text: Thanks be to God.
  chapter.heb-9-28-c0993bd6c1:
    role: chapter
    content:
      la:
      - type: citation
        text: Heb 9:28
      - type: text
        text: 'Christus semel oblátus est ad multórum exhauriénda peccáta: * secúndo sine peccáto apparébit expectántibus se, in salútem.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Heb 9:28
      - type: text
        text: 'so also Christ was offered, one time, in order to empty the sins of so many: * he shall appear a second time without sin, for those who await him, unto salvation.'
      - type: response
        text: Thanks be to God.
  chapter.ier-11-19-752929659a:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 11:19
      - type: text
        text: Come, let us put wood on his bread, and cut him off from the land of the living, and let his name be remembered no more.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 11:19
      - type: text
        text: Veníte, mittámus lignum in panem eius, et eradámus eum de terra vivéntium, et nomen eius non memorétur ámplius.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 11:19
      - type: text
        text: Come, let us place wood upon his bread, and let us eradicate him from the land of the living, and let his name no longer be remembered.
      - type: response
        text: Thanks be to God.
  chapter.ier-11-20-ce99bd8a70:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 11:20
      - type: text
        text: 'But thou, O Lord of Sabaoth, who judgest justly, and triest the reins and hearts, let me see thy revenge on them: for to thee I have revealed my cause, O Lord my God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 11:20
      - type: text
        text: 'Tu autem, Dómine Sábaoth, qui iúdicas iuste, et probas renes et corda, vídeam ultiónem tuam ex eis: tibi enim revelávi causam meam, Dómine, Deus meus.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 11:20
      - type: text
        text: But you, O Lord of hosts, who judges justly, and who tests the temperament and the heart, let me see your vengeance against them. For I have revealed my case to you.
      - type: response
        text: Thanks be to God.
  chapter.ier-14-9-5d4cf9979b:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 14:9
      - type: text
        text: 'But thou, O Lord, art among us, and thy name is called upon by us: forsake us not, O Lord our God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 14:9
      - type: text
        text: 'Tu autem in nobis es, Dómine, et nomen sanctum tuum invocátum est super nos: ne derelínquas nos, Dómine, Deus noster.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 14:9
      - type: text
        text: But you, O Lord, are with us, and your name is invoked over us, so do not abandon us!
      - type: response
        text: Thanks be to God.
  chapter.ier-17-13-1f82c8da57:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:13
      - type: text
        text: 'O Lord: all that forsake thee shall be confounded: they that depart from thee, shall be written in the earth: because they have forsaken the Lord, the vein of living waters.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:13
      - type: text
        text: 'Dómine, omnes qui te derelínquunt, confundéntur: recedéntes a te, in terra scribéntur: quóniam dereliquérunt venam aquárum vivéntium Dóminum.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 17:13
      - type: text
        text: 'O Lord, Hope of Israel: all who forsake you will be confounded. Those who withdraw from you will be written into the earth.'
      - type: response
        text: Thanks be to God.
  chapter.ier-17-14-c432761987:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:14
      - type: text
        text: 'Heal me, O Lord, and I shall be healed: save me, and I shall be saved, for thou art my praise.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:14
      - type: text
        text: 'Sana me, Dómine, et sanábor: salvum me fac, et salvus ero: quóniam laus mea tu es.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 17:14
      - type: text
        text: Heal me, O Lord, and I will be healed. Save me, and I will be saved. For you are my praise.
      - type: response
        text: Thanks be to God.
  chapter.ier-17-18-8fb3deafef:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:18
      - type: text
        text: 'Let them be confounded that persecute me, and let not me be confounded: let them be afraid, and let not me be afraid: bring upon them the day of affliction, and with a double destruction, destroy them, O Lord my God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:18
      - type: text
        text: 'Confundántur qui me persequúntur, et non confúndar ego: páveant illi, et non páveam ego: induc super eos diem afflictiónis, et dúplici contritióne cóntere eos, Dómine Deus noster.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 17:18
      - type: text
        text: May those who persecute me be confounded, but may I not be confounded. May they be fearful, and may I not be fearful. Lead over them the day of affliction, and crush them with a double destruction, O Lord our God.
      - type: response
        text: Thanks be to God.
  chapter.ier-18-20-12fa5b6402:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 18:20
      - type: text
        text: Remember that I have stood in thy sight, to speak good for them, and turn away thy indignation from them.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 18:20
      - type: text
        text: Recordáre quod stéterim in conspéctu tuo, ut lóquerer pro eis bonum, et avérterem indignatiónem tuam ab eis.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 18:20
      - type: text
        text: Remember that I have stood in your sight, so as to speak on their behalf for good, and to avert your indignation from them.
      - type: response
        text: Thanks be to God.
  chapter.ier-23-5-6199f32b06:
    role: chapter
    content:
      en:
