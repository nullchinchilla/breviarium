  hymn.t-rne-rerum-c-nditor-4230ee49c5:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Ætérne rerum Cónditor,
          Noctem diémque qui regis,
          Et témporum das témpora,
          Ut álleves fastídium.

          Præco diéi iam sonat,
          Noctis profúndæ pérvigil,
          Noctúrna lux viántibus,
          A nocte noctem ségregans.

          Hoc excitátus Lúcifer
          Solvit polum calígine,
          Hoc omnis errónum cohors
          Viam nocéndi déserit.

          Hoc nauta vires cólligit,
          Pontíque mitéscunt freta:
          Hoc, ipsa Petr[a] Ecclésiæ,
          Canénte, culpam díluit.

          Surgámus ergo strénue,
          Gallus iacéntes éxcitat,
          Et somnoléntos íncrepat,
          Gallus negántes árguit.

          Gallo canénte spes redit,
          Ægris salus refúnditur,
          Mucro latrónis cónditur,
          Lapsis fides revértitur.

          Iesu labéntes réspice,
          Et nos vidéndo córrige:
          Si réspicis, lapsus cadunt,
          Fletúque culpa sólvitur.

          Tu lux refúlge sénsibus,
          Mentísque somnum díscute:
          Te nostra vox primum sonet,
          Et vota solvámus tibi.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc et in perpétuum.
          Amen.
  hymn.t-rne-rerum-c-nditor-f7eb5cd54f:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Maker of all, eternal King,
          Who day and night about dost bring:
          Who weary mortals to relieve,
          Dost in their times the seasons give:

          Now the shrill cock proclaims the day,
          And calls the sun’s awak’ning ray
          The wand’ring pilgrim’s guiding light,
          That marks the watches night by night.

          Roused at the note, the morning star
          Heaven’s dusky veil uplifts afar:
          Night’s vagrant bands no longer roam,
          But from their dark ways hie them home.

          The encouraged sailor’s fears are o’er,
          The foaming billows rage no more:
          Lo! e’en the very Church’s rock
          Melts at the crowing of the cock.

          O let us then like men arise;
          The cock rebukes our slumbering eyes,
          Bestirs who still in sleep would lie,
          And shames who would their Lord deny.

          New hope his clarion-note awakes,
          Sickness the feeble frame forsakes,
          The robber sheathes his lawless sword,
          Faith to the fallen is restored.

          Look on us, Jesu, when we fall,
          And with thy look our souls recall:
          If thou but look, our sins are gone,
          And with due tears our pardon won.

          Shed through our hearts thy piercing ray,
          Our souls’ dull slumber drive away:
          Thy name be first on every tongue,
          To thee our earliest praises sung.

          All laud to God the Father be,
          All praise, Eternal Son, to thee,
          All glory, as is ever meet,
          To God the holy Paraclete.
          Amen.
      la:
      - type: text
        text: |-
          Ætérne rerum Cónditor,
          Noctem diémque qui regis,
          Et témporum das témpora,
          Ut álleves fastídium.

          Noctúrna lux viántibus
          A nocte noctem ségregans,
          Præco diéi iam sonat,
          Iubárque solis évocat.

          Hoc excitátus Lúcifer
          Solvit polum calígine:
          Hoc omnis errónum cohors
          Viam nocéndi déserit.

          Hoc nauta vires cólligit,
          Pontíque mitéscunt freta:
          Hoc, ipsa petra Ecclésiæ,
          Canénte, culpam díluit.

          Surgámus ergo strénue:
          Gallus iacéntes éxcitat,
          Et somnoléntos íncrepat,
          Gallus negántes árguit.

          Gallo canénte, spes redit,
          Ægris salus refúnditur,
          Mucro latrónis cónditur,
          Lapsis fides revértitur.

          Iesu, labántes réspice,
          Et nos vidéndo córrige:
          Si réspicis, labes cadunt,
          Fletúque culpa sólvitur.

          Tu, lux, refúlge sénsibus,
          Mentísque somnum díscute:
          Te nostra vox primum sonet,
          Et vota solvámus tibi.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Nunc et per omne sǽculum.
          Amen.
  hymn.te-lucis-ante-t-rminum-33af4d5940:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Te lucis ante términum,
          Rerum Creátor, póscimus,
          Ut sólita cleméntia
          Sis præsul ad custódiam.

          Procul recédant sómnia,
          Et nóctium phantásmata;
          Hostémque nostrum cómprime,
          Ne polluántur córpora.

          * Præsta, Pater omnípotens,
          Per Iesum Christum Dóminum,
          Qui tecum in perpétuum
          Regnat cum Sancto Spíritu.
          Amen.
  hymn.te-lucis-ante-t-rminum-f252b6676d:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Before the ending of the day,
          Creator of the world, we pray
          That with thy wonted favor thou
          Wouldst be our guard and keeper now.

          From all ill dreams defend our eyes,
          From nightly fears and fantasies;
          Tread under foot our ghostly foe,
          That no pollution we may know.

          * O Father, that we ask be done,
          Through Jesus Christ, thine only Son;
          Who, with the Holy Ghost and thee,
          Doth live and reign eternally.
          Amen.
      la:
      - type: text
        text: |-
          Te lucis ante términum,
          Rerum Creátor, póscimus,
          Ut pro tua cleméntia
          Sis præsul et custódia.

          Procul recédant sómnia,
          Et nóctium phantásmata;
          Hostémque nostrum cómprime,
          Ne polluántur córpora.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.tell-ris-alme-c-nditor-b999d46410:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Earth's mighty Maker, whose command
          Raised from the sea the solid land;
          And drove each billowy heap away,
          And bade the earth stand firm for aye:

          That so, with flowers of golden hue,
          The seeds of each it might renew;
          And fruit-trees bearing fruit might yield,
          And pleasant pasture of the field:

          Our spirit’s rankling wounds efface
          With dewy freshness of thy grace:
          That grief may cleanse each deed of ill,
          And o’er each lust may triumph still.

          Let every soul thy law obey,
          And keep from every evil way;
          Rejoice each promised good to win,
          And flee from every mortal sin.

          Hear thou our prayer, Almighty King!
          Hear thou our praises, while we sing,
          Adoring with the heavenly host,
          The Father, Son, and Holy Ghost!
          Amen.
      la:
      - type: text
        text: |-
          Tellúris alme Cónditor,
          Mundi solum qui séparans,
          Pulsis aquæ moléstiis,
          Terram dedísti immóbilem:

          Ut germen aptum próferens,
          Fulvis decóra flóribus,
          Fecúnda fructu sísteret,
          Pastúmque gratum rédderet.

          Mentis perústæ vúlnera
          Munda viróre grátiæ:
          Ut facta fletu díluat,
          Motúsque pravos átterat.

          Iussis tuis obtémperet:
          Nullis malis appróximet:
          Bonis repléri gáudeat,
          Et mortis ictum nésciat.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.tell-ris-ingens-c-nditor-0a8f97f5e3:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Tellúris ingens Cónditor,
          Mundi solum qui éruens,
          Pulsis aquæ moléstiis,
          Terram dedíst[i] immóbilem:

          Ut germen aptum próferens,
          Fulvis decóra flóribus,
          Fecúnda fructu sísteret,
          Pastúmque gratum rédderet.

          Mentis perústæ vúlnera
          Munda viróre grátiæ:
          Ut facta fletu díluat,
          Motúsque pravos átterat.

          Iussis tuis obtémperet:
          Nullis malis appróximet:
          Bonis repléri gáudeat,
          Et mortis actum nésciat.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.tu-trinit-tis-unitas-82421ce659:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Tu, Trinitátis Unitas,
          Orbem poténter quæ regis,
          Atténde laudis cánticum,
          Quod excubántes psállimus.

          Nam léctulo consúrgimus
          Noctis quiéto témpore,
          Ut flagitémus vúlnerum
          A te medélam ómnium.

          Quo fraude quidquid dǽmonum
          In nóctibus delíquimus,
          Abstérgat illud cǽlitus
          Tuæ potéstas glóriæ.

          Ne corpus adsit sórdidum,
          Nec torpor instet córdium,
          Ne críminis contágio
          Tepéscat ardor spíritus.

          Ob hoc, Redémptor, quǽsumus,
          Reple tuo nos lúmine,
          Per quod diérum círculis
          Nullis ruámus áctibus.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.tu-trinit-tis-unitas-b970709677:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O Three in One, and One in Three,
          Who rulest all things mightily:
          Bow down to hear the songs of praise
          Which, freed from bonds of sleep, we raise.

          While lingers yet the peace of night,
          We rouse us from our slumbers light:
          That might of instant prayer may win
          The healing balm for wounds of sin.

          If, by the wiles of Satan caught,
          This night-time we have sinned in aught,
          That sin Thy glorious power to-day,
          From heaven descending, cleanse away.

          Let naught impure our bodies stain,
          No laggard sloth our souls detain,
          No taint of sin our spirits know,
          To chill the fervor of their glow.

          Wherefore, Redeemer grant that we
          Fulfilled with thine own light may be:
          That, in our course, from day to day,
          By no misdeed we fall away.

          Grant this, O Father ever One
          With Christ, thy sole-begotten Son,
          And Holy Ghost, whom all adore,
          Reigning and blest forevermore.
          Amen.
      la:
      - type: text
        text: |-
          Tu, Trinitátis Unitas,
          Orbem poténter quæ regis,
          Atténde laudis cánticum,
          Quod excubántes psállimus.

          Nam léctulo consúrgimus
          Noctis quiéto témpore,
          Ut flagitémus ómnium
          A te medélam vúlnerum.

          Quo fraude quidquid dǽmonum
          In nóctibus delíquimus,
          Abstérgat illud cǽlitus
          Tuæ potéstas glóriæ.

          Ne corpus astet sórdidum,
          Nec torpor instet córdium,
          Ne críminis contágio
          Tepéscat ardor spíritus.

          Ob hoc, Redémptor, quǽsumus,
          Reple tuo nos lúmine,
          Per quod diérum círculis
          Nullis ruámus áctibus.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.verbum-sup-rnum-pr-diens-6beccf4b5a:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Celestial Word, to this our earth
          Sent down from God's eternal clime,
          To save mankind by mortal birth
          Into a world of change and time;

          Enlighten our hearts; vain hopes destroy;
          And in thy love's consuming fire
          Fill all the soul with heavenly joy,
          And melt the dross of low desire.

          So when the Judge of quick and dead
          Shall bid his awful summons come,
          To whelm the guilty soul with dread,
          And call the blessed to their home.

          Saved from the whirling, black abyss,
          Forevermore to us be given
          To share the feast of saintly bliss,
          And see the face of God in heaven.

          To God the Father and the Son
          Our songs with one accord we raise;
          And to the Holy Spirit, One
          With them, be ever equal praise
          Amen.
      la:
      - type: text
        text: |-
          Verbum supérnum, pródiens
          A Patre olim éxiens,
          Qui natus orbi súbvenis,
          Cursu declívi témporis.

          Illúmina nunc péctora,
          Tuóque amóre cóncrema;
          Audíto ut præcónio
          Sint pulsa tandem lúbrica.

          Iudéxque cum post áderis
          Rimári facta péctoris,
          Reddens vicem pro ábditis,
          Iustísque regnum pro bonis.

          Non demum arctémur malis
          Pro qualitáte críminis;
          Sed cum beátis cómpotes
          Simus perénnes cælibes.

          Laus, honor, virtus, glória,
          Deo Patri, et Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
  hymn.verbum-sup-rnum-pr-diens-86a18cd66b:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Celestial Word, to this our earth
          Sent down from God's eternal clime,
          To save mankind by mortal birth
          Into a world of change and time;

          Enlighten our hearts; vain hopes destroy;
          And in thy love's consuming fire
          Fill all the soul with heavenly joy,
          And melt the dross of low desire.

          So when the Judge of quick and dead
          Shall bid his awful summons come,
          To whelm the guilty soul with dread,
          And call the blessed to their home.

          Saved from the whirling, black abyss,
          Forevermore to us be given
          To share the feast of saintly bliss,
          And see the face of God in heaven.

          To God the Father and the Son
          Our songs with one accord we raise;
          And to the Holy Spirit, One
          With them, be ever equal praise
          Amen.
      la:
      - type: text
        text: |-
          Verbum supérnum, pródiens
          E Patris ætérni sinu,
          Qui natus orbi súbvenis,
          Labénte cursu témporis:

          Illúmina nunc péctora,
          Tuóque amóre cóncrema;
          Ut cor cadúca déserens
          Cæli volúptas ímpleat.

          Ut, cum tribúnal Iúdicis
          Damnábit igni nóxios,
          Et vox amíca débitum
          Vocábit ad cælum pios;

          Non esca flammárum nigros
          Volvámur inter túrbines,
          Vultu Dei sed cómpotes
          Cæli fruámur gáudiis.

          * Patri, simúlque Fílio,
          Tibíque, Sancte Spíritus,
          Sicut fuit, sit iúgiter
          Sæclum per omne glória.
          Amen.
  hymn.vex-lla-regis-pr-deunt-32ee565ceb:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Vexílla Regis pródeunt:
          Fulget Crucis mystérium,
          Quo carne carnis Cónditor
          Suspénsus est patíbulo.

          Quo vulnerátus ínsuper
          Mucróne diro lánceæ,
          Ut nos laváret crímine,
          Manávit und[a] et sánguine.

          Impléta sunt quæ cóncinit
          David fidéli cármine,
          Dicens: In natiónibus
          Regnávit a ligno Deus.

          Arbor decór[a] et fúlgida,
          Ornáta Regis púrpura,
          Elécta digno stípite
          Tam sancta membra tángere.

          Beáta, cuius bráchiis
          Sæcli pepéndit prétium,
          Statéra facta córporis,
          Prædámque tulit tártari.

          (nisi rubrica cisterciensis)
      - type: heading
        text: Sequens stropha dicitur flexis genibus.
      - type: text
        text: |-
          (nisi rubrica cisterciensis)

          O Crux, ave, spes única,
          In hac triúmphi glória
          (sed tempore Passionis)
          Hoc Passiónis témpore
          (sed tempore Paschali)
          In hoc Pascháli gáudio
          Auge piis iustítiam,
          Reísque dona véniam.

          Te summa, Deus, Trínitas,
          Colláudet omnis spíritus:
          Quos per Crucis mystérium
          Salvas, rege per sǽcula.
          Amen.
  hymn.vex-lla-regis-pr-deunt-f3456ff328:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Abroad the regal banners fly,
          Now shines the cross’s mystery;
          Upon it Life did death endure,
          And yet by death did life procure.

          Who, wounded with a direful spear,
          Did, purposely to wash us clear
          From stain of sin, pour out a flood
          Of precious water mixed with blood.

          That which the prophet-king of old
          Hath in mysterious verse foretold,
          Is now accomplished, whilst we see
          God ruling nations from a tree.

          O lovely and refulgent tree,
          Adorned with purpled majesty;
          Culled from a worthy stock, to bear
          Those limbs which sanctifièd were.

          Blest tree, whose happy branches bore
          The wealth that did the world restore;
          The beam that did that body weigh
          Which raised up hell’s expected prey.
      - type: heading
        text: The following verse is said on bended knee.
      - type: text
        text: |-
          O Cross, our one reliance, hail!
          On this triumphant day avail
          (sed tempore Passionis)
          This holy Passiontide avail
          (sed tempore Paschali)
          Thou joy of Eastertide, avail
          To give fresh merit to the saint,
          And pardon to the penitent.

          Blest Trinity, salvation’s spring,
          May every soul thy praises sing;
          To those thou grantest conquest by
          The holy cross, rewards apply.
          Amen.
      la:
      - type: text
        text: |-
          Vexílla Regis pródeunt;
          Fulget Crucis mystérium,
          Qua Vita mortem pértulit,
          Et morte vitam prótulit.

          Quæ, vulneráta lánceæ
          Mucróne diro, críminum
          Ut nos laváret sórdibus,
          Manávit unda et sánguine.

          Impléta sunt quæ cóncinit
          David fidéli cármine,
          Dicéndo natiónibus:
          Regnávit a ligno Deus.

          Arbor decóra et fúlgida,
          Ornáta Regis púrpura,
          Elécta digno stípite
          Tam sancta membra tángere.

          Beáta, cuius brácchiis
          Prétium pepéndit sǽculi,
          Statéra facta córporis,
          Tulítque prædam tártari.
      - type: heading
        text: Sequens stropha dicitur flexis genibus.
      - type: text
        text: |-
          O Crux, ave, spes única,
          In hac triúmphi glória
          (sed tempore Passionis)
          Hoc Passiónis témpore
          (sed tempore Paschali)
          Paschále quæ fers gáudium
          Piis adáuge grátiam,
          Reísque dele crímina.

          Te, fons salútis, Trínitas,
          Colláudet omnis spíritus:
          Quibus Crucis victóriam
          Largíris, adde prǽmium.
          Amen.
  hymn.vox-clara-ecce-ntonat-77730facd4:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Vox clara ecce íntonat,
          Obscúra quæque íncrepat:
          Pellántur éminus sómnia;
          Ab æthre Christus prómicat.

          Mens iam resúrgat tórpida
          Quæ sorde exstat sáucia;
          Sidus refúlget iam novum,
          Ut tollat omne nóxium.

          E sursum Agnus míttitur
          Laxáre gratis débitum:
          Omnes pro indulgéntia
          Vocem demus cum lácrimis,

          Secúndo ut cum fúlserit,
          Mundúmque horror cínxerit,
          Non pro reátu púniat,
          Sed nos pius tunc prótegat.

          Laus, honor, virtus, glória,
          Deo Patri, et Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
  invitatory.ador-mus-d-minum-qui-nos-red-mit-per-crucem-c9ac7ffa5a:
    role: invitatory
    content:
      la:
      - type: text
        text: Adorémus Dóminum, * Qui nos redémit per crucem.
