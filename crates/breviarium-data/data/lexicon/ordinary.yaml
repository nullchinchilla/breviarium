    role: chapter
    content:
      la:
      - type: heading
        text: De SS. Benedicto, Bernardo et Roberto
      - type: antiphon
        text: Córpora Sanctórum in pace sepúlta sunt, et vivent nómina eórum in ætérnum. (Allelúia, allelúia.)
      - type: versicle
        text: Beáti quos elegísti, Dómine. (Allelúia.)
      - type: response
        text: Habitábunt in átriis tuis. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti, Bernárdi et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.
          (sed die Bernardi)
  chapter.gal-6-2-dc34f27e67:
    role: chapter
    content:
      en:
      - type: citation
        text: Gal 6:2
      - type: text
        text: Bear ye one another's burdens; and so you shall fulfill the law of Christ.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Gal 6:2
      - type: text
        text: Alter altérius ónera portáte, et sic adimplébitis legem Christi.
      - type: response
        text: Deo grátias.
  chapter.gen-49-10-4e5fec2238:
    role: chapter
    content:
      en:
      - type: citation
        text: Gen 49:10
      - type: text
        text: The sceptre shall not be taken away from Juda, nor a ruler from his thigh, till he comes that is to be sent, and he shall be the expectation of nations.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Gen 49:10
      - type: text
        text: Non auferétur sceptrum de Iuda, et dux de fémore eius, donec véniat qui mitténdus est; et ipse erit exspectátio géntium.
      - type: response
        text: Deo grátias.
  chapter.heb-9-28-c0993bd6c1:
    role: chapter
    content:
      la:
      - type: citation
        text: Heb 9:28
      - type: text
        text: 'Christus semel oblátus est ad multórum exhauriénda peccáta: * secúndo sine peccáto apparébit expectántibus se, in salútem.'
      - type: response
        text: Deo grátias.
  chapter.ier-11-19-752929659a:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 11:19
      - type: text
        text: Come, let us put wood on his bread, and cut him off from the land of the living, and let his name be remembered no more.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 11:19
      - type: text
        text: Veníte, mittámus lignum in panem eius, et eradámus eum de terra vivéntium, et nomen eius non memorétur ámplius.
      - type: response
        text: Deo grátias.
  chapter.ier-11-20-ce99bd8a70:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 11:20
      - type: text
        text: 'But thou, O Lord of Sabaoth, who judgest justly, and triest the reins and hearts, let me see thy revenge on them: for to thee I have revealed my cause, O Lord my God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 11:20
      - type: text
        text: 'Tu autem, Dómine Sábaoth, qui iúdicas iuste, et probas renes et corda, vídeam ultiónem tuam ex eis: tibi enim revelávi causam meam, Dómine, Deus meus.'
      - type: response
        text: Deo grátias.
  chapter.ier-14-9-5d4cf9979b:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 14:9
      - type: text
        text: 'But thou, O Lord, art among us, and thy name is called upon by us: forsake us not, O Lord our God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 14:9
      - type: text
        text: 'Tu autem in nobis es, Dómine, et nomen sanctum tuum invocátum est super nos: ne derelínquas nos, Dómine, Deus noster.'
      - type: response
        text: Deo grátias.
  chapter.ier-17-13-1f82c8da57:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:13
      - type: text
        text: 'O Lord: all that forsake thee shall be confounded: they that depart from thee, shall be written in the earth: because they have forsaken the Lord, the vein of living waters.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:13
      - type: text
        text: 'Dómine, omnes qui te derelínquunt, confundéntur: recedéntes a te, in terra scribéntur: quóniam dereliquérunt venam aquárum vivéntium Dóminum.'
      - type: response
        text: Deo grátias.
  chapter.ier-17-14-c432761987:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:14
      - type: text
        text: 'Heal me, O Lord, and I shall be healed: save me, and I shall be saved, for thou art my praise.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:14
      - type: text
        text: 'Sana me, Dómine, et sanábor: salvum me fac, et salvus ero: quóniam laus mea tu es.'
      - type: response
        text: Deo grátias.
  chapter.ier-17-18-8fb3deafef:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:18
      - type: text
        text: 'Let them be confounded that persecute me, and let not me be confounded: let them be afraid, and let not me be afraid: bring upon them the day of affliction, and with a double destruction, destroy them, O Lord my God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:18
      - type: text
        text: 'Confundántur qui me persequúntur, et non confúndar ego: páveant illi, et non páveam ego: induc super eos diem afflictiónis, et dúplici contritióne cóntere eos, Dómine Deus noster.'
      - type: response
        text: Deo grátias.
  chapter.ier-18-20-12fa5b6402:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 18:20
      - type: text
        text: Remember that I have stood in thy sight, to speak good for them, and turn away thy indignation from them.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 18:20
      - type: text
        text: Recordáre quod stéterim in conspéctu tuo, ut lóquerer pro eis bonum, et avérterem indignatiónem tuam ab eis.
      - type: response
        text: Deo grátias.
  chapter.ier-23-5-6199f32b06:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 23:5
      - type: text
        text: 'Behold the days come, saith the Lord, and I will raise up to David a just branch: and a king shall reign, and shall be wise, and shall execute judgement and justice in the earth.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 23:5
      - type: text
        text: 'Ecce dies véniunt, dicit Dóminus, et suscitábo David germen iustum: et regnábit rex, et sápiens erit: et fáciet iudícium et iustítiam in terra.'
      - type: response
        text: Deo grátias.
  chapter.ier-23-6-1347900421:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 23:6
      - type: text
        text: 'In those days shall Juda be saved, and Israel shall dwell confidently: and this is the name that they shall call him: the Lord our just one.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 23:6
      - type: text
        text: 'In diébus illis salvábitur Iuda, et Israël habitábit confidénter: et hoc est nomen, quod vocábunt eum, Dóminus iustus noster.'
      - type: response
        text: Deo grátias.
  chapter.io-l-2-12-13-bb2c6604cd:
    role: chapter
    content:
      en:
      - type: citation
        text: Joel 2:12-13
      - type: text
        text: Be converted to me with all your heart, in fasting, and in weeping, and in mourning. And rend your hearts, and not your garments, said the almighty Lord.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ioël 2:12-13
      - type: text
        text: Convertímini ad me in toto corde vestro, in ieiúnio, et fletu, et planctu. Et scíndite corda vestra, et non vestiménta vestra, ait Dóminus omnípotens.
      - type: response
        text: Deo grátias.
  chapter.io-l-2-17-242ca86891:
    role: chapter
    content:
      en:
      - type: citation
        text: Joel 2:17
      - type: text
        text: 'Between the porch and the altar the priests the Lord''s ministers shall weep, and shall say: Spare, O Lord, spare thy people: and give not thy inheritance to reproach, that the heathen should rule over them.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ioël 2:17
      - type: text
        text: 'Inter vestíbulum et altáre plorábunt sacerdótes, minístri Dómini, et dicent: Parce, Dómine, parce pópulo tuo: et ne des hereditátem tuam in oppróbrium, ut dominéntur eis natiónes.'
      - type: response
        text: Deo grátias.
  chapter.isa-14-1-5e88bb70fe:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 14:1
      - type: text
        text: Her time is near at hand, and her days shall not be prolonged. For the Lord will have mercy on Jacob, and will yet choose out of Israel.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 14:1
      - type: text
        text: 'Prope est ut véniat tempus eius, et dies eius non elongabúntur: miserébitur enim Dóminus Iacob, et Israël salvábitur.'
      - type: response
        text: Deo grátias.
  chapter.isa-2-3-31ef9b7b87:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 2:3
      - type: text
        text: 'Come and let us go up to the mountain of the Lord, and to the house of the God of Jacob, and he will teach us his ways, and we will walk in his paths: for the law shall come forth from Sion, and the word of the Lord from Jerusalem.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 2:3
      - type: text
        text: 'Veníte, et ascendámus ad montem Dómini, et ad domum Dei Iacob, et docébit nos vias suas, et ambulábimus in sémitis eius: quia de Sion exíbit lex, et verbum Dómini de Ierúsalem.'
      - type: response
        text: Deo grátias.
  chapter.isa-55-7-d10977f126:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 55:7
      - type: text
        text: 'Let the wicked forsake his way, and the unjust man his thoughts, and let him return to the Lord, and he will have mercy on him, and to our God: for he is bountiful to forgive.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 55:7
      - type: text
        text: Derelínquat ímpius viam suam, et vir iníquus cogitatiónes suas, et revertátur ad Dóminum, et miserébitur eius, et ad Deum nostrum, quóniam multus est ad ignoscéndum.
      - type: response
        text: Deo grátias.
  chapter.isa-58-1-92aba8eb7b:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 58:1
      - type: text
        text: Cry, cease not, lift up thy voice like a trumpet, and show my people their wicked doings, and the house of Jacob their sins.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 58:1
      - type: text
        text: Clama, ne cesses, quasi tuba exálta vocem tuam, et annúntia pópulo meo scélera eórum, et dómui Iacob peccáta eórum.
      - type: response
        text: Deo grátias.
  chapter.isa-58-7-87857c78d3:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 58:7
      - type: text
        text: 'Deal thy bread to the hungry, and bring the needy and the harbourless into thy house: when thou shalt see one naked, cover him, and despise not thy own flesh.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 58:7
      - type: text
        text: 'Frange esuriénti panem tuum, et egénos vagósque induc in domum tuam: cum víderis nudum, óperi eum, et carnem tuam ne despéxeris.'
      - type: response
        text: Deo grátias.
  chapter.k-rie-el-ison-christe-el-ison-k-rie-el-ison-4e1418f5f6:
    role: chapter
    content:
      la:
      - type: text
        text: |-
          Kýrie, eléison. Christe, eléison. Kýrie, eléison.
          Pater noster, qui es in cælis, sanctificétur nomen tuum: advéniat regnum tuum: fiat volúntas tua, sicut in cælo et in terra. Panem nostrum cotidiánum da nobis hódie: et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris:
      - type: versicle
        text: 'Et ne nos indúcas in tentatiónem:'
      - type: response
        text: Sed líbera nos a malo.
      - type: text
        text: Ego dixi …
      - type: versicle
        text: Dómine, exáudi oratiónem meam.
      - type: response
        text: Et clamor meus ad te véniat.
