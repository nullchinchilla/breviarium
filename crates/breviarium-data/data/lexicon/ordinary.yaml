      en2:
      - type: text
        text: |-
          Taught by mystic custom,
          Let us observe this fast,
          Measured by the well-known circuit
          Of four times ten days.
      
          The law and the prophets first
          Prefigured this; afterward
          Christ consecrated it, the King
          And maker of all times.
      
          Let us therefore use more sparingly
          Words, food, and drink,
          Sleep and amusements, and keep
          A stricter watch.
      
          Let us avoid the worst things
          That undermine wandering minds:
          And let us give no place
          To the tyranny of the cunning foe.
      
          Let us bend the avenging wrath,
          Let us weep before the Judge,
          Let us cry with suppliant voice,
          Let us all say on bended knee:
      
          By our offenses we have angered
          Your clemency, O God:
          Pour out upon us from above,
          O Forgiver, your indulgence.
      
          Remember that we are your creation,
          Though perishable:
          We pray you, give not the glory of your name,
          We beseech you, to another.
      
          Loosen the evil that we have done,
          Increase the good that we seek:
          That we may at last be able
          To please you here and for ever.
      
          Grant this, O blessed Trinity;
          Bestow it, O simple Unity;
          That the offerings of our fasting
          May be fruitful for your own.
          Amen.
