  rubric.ave-reg-na-c-l-rum-76ec494780:
    role: rubric
    content:
      en:
      - type: antiphon
        text: Hail, O Queen of heaven
      la:
      - type: text
        text: |
          Ave, Regína cælórum,
          Ave, Dómina Angelórum:
          Salve radix, salve porta,
          Ex qua mundo lux est orta:

          Gaude, Virgo gloriósa,
          Super omnes speciósa,
          Vale, o valde decóra,
          Et pro nobis Christum exóra.
      - type: versicle
        text: Dignáre me laudáre te, Virgo sacráta.
      - type: response
        text: Da mihi virtútem contra hostes tuos.
      - type: text
        text: |-
          Orémus.
          Concéde, miséricors Deus, fragilitáti nostræ præsídium; ut, qui sanctæ Dei Genetrícis memóriam ágimus; intercessiónis eius auxílio, a nostris iniquitátibus resurgámus. Per eúndem Christum Dóminum nostrum. Amen.
      en2:
      - type: text
        text: |-
          Hail, Queen of the heavens,
          Hail, Lady of the Angels:
          hail, O root, hail, O gate,
          from whom the light has risen for the world:
      
          Rejoice, O glorious Virgin,
          fairer than all others,
          farewell, O wondrous one,
          and intercede for us with Christ.
      - type: versicle
        text: Graciously grant me to praise you, O sacred Virgin.
      - type: response
        text: Give me strength against your enemies.
      - type: text
        text: |-
          Let us pray.
          Grant, O merciful God, a refuge to our weakness; that we who celebrate the memory of the holy Mother of God may, by the help of her intercession, rise again from our iniquities. Through the same Christ our Lord. Amen.
