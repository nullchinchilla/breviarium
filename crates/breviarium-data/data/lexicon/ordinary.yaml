          Qui surrexíst[i] a mórtuis,
          Cum Patr[e] et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
  hymn.imm-nse-c-li-c-nditor-7a94fc1cd2:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Imménse cæli Cónditor,
          Qui mixta ne confúnderent,
          Aquæ fluénta dívidens,
          Cælum dedísti límitem.

          Firmans locum cæléstibus,
          Simúlque terræ rívulis;
          Ut unda flammas témperet,
          Terræ solum ne díssipent.

          Infúnde nunc, piíssime,
          Donum perénnis grátiæ:
          Fraudis novæ ne cásibus
          Nos error átterat vetus.

          Lucem fides invéniat:
          Sic lúminis iubar ferat:
          Ut vana cuncta próterat:
          Hanc falsa nulla cómprimant.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.imm-nse-c-li-c-nditor-ac78f1d1c9:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O great Creator of the sky,
          Who wouldest not the floods on high
          With earthly waters to confound,
          But mad’st the firmament their bound;

          The floods above thou didst ordain;
          The floods below thou didst restrain:
          That moisture might attemper heat,
          Lest the parched earth should ruin meet.

          Upon our souls, good Lord, bestow
          Thy gift of grace in endless flow:
          Lest some renewed deceit or wile
          Of former sin should us beguile.

          Let faith discover heav’nly light;
          So shall its rays direct us right:
          And let this faith each error chase,
          And never give to falsehood place.

          Grant this, O Father, ever One
          With Christ, thy sole-begotten Son,
          And Holy Ghost, whom all adore,
          Reigning and blest forevermore.
          Amen.
      la:
      - type: text
        text: |-
          Imménse cæli Cónditor,
          Qui mixta ne confúnderent,
          Aquæ fluénta dívidens,
          Cælum dedísti límitem.

          Firmans locum cæléstibus,
          Simúlque terræ rívulis;
          Ut unda flammas témperet,
          Terræ solum ne díssipent.

          Infúnde nunc, piíssime,
          Donum perénnis grátiæ:
          Fraudis novæ ne cásibus
          Nos error átterat vetus.

          Lucem fides adáugeat:
          Sic lúminis iubar ferat:
          Hæc vana cuncta próterat:
          Hanc falsa nulla cómprimant.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.lucis-cre-tor-ptime-60557a5608:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Lucis Creátor óptime,
          Lucem diérum próferens,
          Primórdiis lucis novæ,
          Mundi parans oríginem:

          Qui mane iunctum vésperi
          Diem vocári prǽcipis:
          Tetrum chaos illábitur,
          Audi preces cum flétibus.

          Ne mens graváta crímine,
          Vitæ sit exsul múnere,
          Dum nil perénne cógitat,
          Seséque culpis ílligat.

          Cælórum pulset íntimum,
          Vitále tollat prǽmium:
          Vitémus omne nóxium:
          Purgémus omne péssimum.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.lucis-cre-tor-ptime-a880bfca9e:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O blest Creator of the light,
          Who mak’st the day with radiance bright,
          And o’er the forming world didst call
          The light from chaos first of all;

          Whose wisdom joined in meet array
          The morn and eve, and named them day:
          Night comes with all its darkling fears;
          Regard thy people’s prayers and tears.

          Lest, sunk in sin, and whelmed with strife,
          They lose the gift of endless life;
          While thinking but the thoughts of time,
          They weave new chains of woe and crime.

          But grant them grace that they may strain
          The heavenly gate and prize to gain:
          Each harmful lure aside to cast,
          And purge away each error past.

          * O Father, that we ask be done,
          Through Jesus Christ, thine only Son;
          Who, with the Holy Ghost and thee,
          Doth live and reign eternally.
          Amen.
      la:
      - type: text
        text: |-
          Lucis Creátor óptime,
          Lucem diérum próferens,
          Primórdiis lucis novæ,
          Mundi parans oríginem:

          Qui mane iunctum vésperi
          Diem vocári prǽcipis:
          Illábitur tetrum chaos,
          Audi preces cum flétibus.

          Ne mens graváta crímine,
          Vitæ sit exsul múnere,
          Dum nil perénne cógitat,
          Seséque culpis ílligat.

          Cæléste pulset óstium:
          Vitále tollat prǽmium:
          Vitémus omne nóxium:
          Purgémus omne péssimum.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.lustra-sex-qui-iam-per-git-345102b58a:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Thirty years among us dwelling,
          His appointed time fulfilled,
          Born for this, he meets his passion,
          For that this he freely willed:
          On the cross the Lamb is lifted,
          Where his life-blood shall be spilled.

          He endured the nails, the spitting,
          Vinegar, and spear, and reed;
          From that holy body broken
          Blood and water forth proceed:
          Earth, and stars, and sky, and ocean,
          By that flood from stain are free.

          Faithful cross! above all other,
          One and only noble tree!
          None in foliage, none in blossom,
          None in fruit thy peers may be;
          Sweetest wood and sweetest iron!
          Sweetest weight is hung on thee.

          Bend thy boughs, O tree of glory!
          Thy relaxing sinews bend;
          For awhile the ancient rigour,
          That thy birth bestowed, suspend;
          And the King of heavenly beauty
          On thy bosom gently tend!

          Thou alone wast counted worthy
          This world's ransom to uphold;
          For a shipwrecked race preparing
          Harbour, like the ark of old;
          With the sacred blood anointed
          From the smitten Lamb that rolled.

          To the Trinity be glory
          Everlasting, as is meet;
          Equal to the Father, equal
          To the Son, and Paraclete:
          Trinal Unity, whose praises
          All created things repeat.
          Amen.
      la:
      - type: text
        text: |-
          Lustra sex qui iam perégit,
          Tempus implens córporis,
          Sponte líbera Redémptor
          Passióni déditus,
          Agnus in Crucis levátur
          Immolándus stípite.

          Felle potus ecce languet,
          Spina, clavi, láncea,
          Mite corpus perforárunt,
          Unda manat, et cruor:
          Terra, pontus, astra, mundus,
          Quo lavántur flúmine!

          Crux fidélis, inter omnes
          Arbor una nóbilis:
          Silva talem nulla profert
          Fronde, flore, gérmine:
          Dulce ferrum, dulce lignum
          Dulce pondus sústinent.

          Flecte ramos, arbor alta,
          Tensa laxa víscera,
          Et rigor lentéscat ille,
          Quem dedit natívitas:
          Et supérni membra Regis
          Tende miti stípite.

          Sola digna tu fuísti
          Ferre mundi víctimam;
          Atque portum præparáre
          Arca mundo náufrago,
          Quam sacer cruor perúnxit,
          Fusus Agni córpore.

          Sempitérna sit beátæ
          Trinitáti glória:
          Æqua Patri, Filióque,
          Par decus Paráclito:
          Uníus, Triníque nomen
          Laudet univérsitas.
          Amen.
  hymn.lustris-sex-qui-iam-per-ctis-2bb259ddf2:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Lustris sex qui iam peráctis,
          Tempus implens córporis,
          Se volénte natus ad hoc,
          Passióni déditus,
          Agnus in Crucis levátur
          Immolándus stípite.

          Hic acétum, fel, arúndo,
          Sputa, clavi, láncea:
          Mite corpus perforátur,
          Sanguis, unda prófluit:
          Terra, pontus, astra, mundus,
          Quo lavántur flúmine!

          Crux fidélis, inter omnes
          Arbor una nóbilis:
          Nulla silva talem profert
          Fronde, flore, gérmine:
          Dulce lignum, dulces clavos,
          Dulce pondus sústinet.

          Flecte ramos, arbor alta,
          Tensa laxa víscera,
          Et rigor lentéscat ille,
          Quem dedit natívitas:
          Ut supérni membra Regis
          Miti tendas stípite.

          Sola digna tu fuísti
          Ferre sæcli prétium,
          Atque portum præparáre
          Nauta mundo náufrago,
          Quem sacer cruor perúnxit,
          Fusus Agni córpore.

          Glória et honor Deo
          Usquequáqu[e] altíssimo:
          Una Patri, Filióque,
          Inclyto Paráclito:
          Cui laus est et potéstas
          Per ætérna sǽcula.
          Amen.
  hymn.lux-ecce-surgit-urea-b55d31aa73:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          See the golden sun arise!
          Let no more our darkened eyes
          Snare us, tangled by surprise
          In the maze of sin!

          From false words and thoughts impure
          Let this light, serene and sure,
          Keep our lips without secure,
          Keep our souls within.

          So may we the day-time spend,
          That, till life’s temptations end,
          Tongue, nor hand, nor eye offend!
          One, above us all,

          Views in his revealing ray
          All we do, and think, and say,
          Watching us from break of day
          Till the twilight fall.

          Unto God the Father, Son,
          Holy Spirit, Three in One,
          One in Three, be glory done,
          Now and evermore.
          Amen.
      la:
      - type: text
        text: |-
          Lux ecce surgit áurea,
          Pallens facéssat cǽcitas,
          Quæ nosmet in præceps diu
          Erróre traxit dévio.

          Hæc lux serénum cónferat,
          Purósque nos præstet sibi:
          Nihil loquámur súbdolum:
          Volvámus obscúrum nihil.

          Sic tota decúrrat dies,
          Ne lingua mendax, ne manus
          Oculíve peccent lúbrici,
          Ne noxa corpus ínquinet.

          Speculátor astat désuper,
          Qui nos diébus ómnibus,
          Actúsque nostros próspicit
          A luce prima in vésperum.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Nunc et per omne sǽculum.
          Amen.
  hymn.lux-ecce-surgit-urea-ba7cc5e8f0:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Lux ecce surgit áurea,
          Pallens facéssat cǽcitas,
          Quæ nosmet in præceps diu
          Erróre traxit dévio.

          Hæc lux serénum cónferat,
          Purósque nos præstet sibi:
          Nihil loquámur súbdolum:
          Volvámus obscúrum nihil.

          Sic tota decúrrat dies,
          Ne lingua mendax, ne manus
          Oculív[e] peccent lúbrici,
          Ne noxa corpus ínquinet.

          Spec[u]látor astat désuper,
          Qui nos diébus ómnibus,
          Actúsque nostros próspicit
          A luce prim[a] in vésperum.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc, et in perpétuum.
          Amen.
  hymn.magn-deus-pot-nti-c92e39b231:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Magnæ Deus poténtiæ,
          Qui ex aquis ortum genus
          Partim remíttis gúrgiti,
          Partim levas in áëra.

          Demérsa lymphis ímprimens,
          Subvécta cælis írrigans:
          Ut stirpe ab una pródita,
          Divérsa rápiant loca:

          Largíre cunctis sérvulis,
          Quos mundat unda Sánguinis,
          Nescíre lapsus críminum,
          Nec ferre mortis tǽdium.

          Ut culpa nullum déprimat:
          Nullum levet iactántia:
          Elísa mens ne cóncidat:
          Eláta mens ne córruat.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.magn-deus-pot-nti-f22c096fcb:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O sovereign Lord of nature’s might,
          Who bad’st the water’s birth divide;
          Part in the heavens to take their flight,
          And part in ocean’s deep to hide;

          These low obscured, on airy wing
          Exalted those, that either race,
          Though from one element they spring,
          Might serve thee in a different place.

          Grant, Lord, that we thy servants all,
          Saved by thy tide of cleansing blood,
          No more ’neath sin's dominion fall,
          Nor fear the thought of death’s dark flood!

          Thy varied love each spirit bless,
          The humble cheer, the high control;
          Check in each heart its proud excess,
          But raise the meek and contrite soul!

          This boon, O Father, we entreat,
          This blessing grant, Eternal Son,
          And Holy Ghost, the Paraclete,
          Both now, and while the ages run.
          Amen.
      la:
      - type: text
        text: |-
          Magnæ Deus poténtiæ,
          Qui fértili natos aqua
          Partim relínquis gúrgiti,
          Partim levas in áëra.

          Demérsa lymphis ímprimens,
          Subvécta cælis érigens:
          Ut stirpe ab una pródita,
          Divérsa répleant loca:

          Largíre cunctis sérvulis,
          Quos mundat unda Sánguinis,
          Nescíre lapsus críminum,
          Nec ferre mortis tǽdium.

          Ut culpa nullum déprimat:
          Nullum éfferat iactántia:
          Elísa mens ne cóncidat:
          Eláta mens ne córruat.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.nocte-surg-ntes-vigil-mus-omnes-31f30353ab:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Now, from the slumbers of the night arising,
          Chant we the holy psalmody of David,
          Hymns to our Master, with a voice concordant,
          Sweetly intoning.

          So may our Monarch pitifully hear us,
          That we may merit with his saints to enter
          Mansions eternal, therewithal possessing
          Joy beatific.

          This be our portion, God forever blessed,
          Father eternal, Son, and Holy Spirit,
          Whose is the glory, which through all creation
          Ever resoundeth.
          Amen.
      la:
      - type: text
        text: |-
          Nocte surgéntes vigilémus omnes,
          Semper in psalmis meditémur, atque
          Voce concórdi Dómino canámus
          Dúlciter hymnos.

          Ut pio Regi páriter canéntes,
          Cum suis Sanctis mereámur aulam
          Íngredi cæli, simul et perénnem
          Dúcere vitam.

          Præstet hoc nobis Déitas beáta
          Patris, ac Nati, paritérque Sancti
          Spíritus, cuius résonat per omnem
          Glória mundum.
          Amen.
  hymn.nocte-surg-ntes-vigil-mus-omnes-c0b362635e:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Nocte surgéntes vigilémus omnes,
          Semper in psalmis meditémur, atque
          Víribus totis Dómino canámus
          Dúlciter hymnos.

          Ut pio Regi páriter canéntes,
          Cum suis Sanctis mereámur aulam
          Íngredi cæli, simul et beátam
          Dúcere vitam.

          Præstet hoc nobis Déitas beáta
          Patris, ac Nati, paritérque Sancti
          Spíritus, cuius réboat per omnem
          Glória mundum.
          Amen.
  hymn.nox-atra-rerum-c-ntegit-7829b41359:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          The dusky veil of night hath laid
          The varied hues of earth in shade;
          Before Thee, righteous Judge of all,
          We contrite in confession fall.

          Take far away our load of sin,
          Our soiled minds make clean within:
          Thy sov’reign grace, O Christ, impart,
          From all offence to guard our heart.

          For lo! our mind is dull and cold,
          Envenomed by sin’s baneful hold:
          Fain would it now the darkness flee,
          And seek, Redeemer, unto Thee.

          Far from it drive the shades of night,
          Its inmost darkness put to flight;
          Till in the daylight of the blest
          It joys to find itself at rest.

          Almighty Father, hear our cry,
          Through Jesus Christ, our Lord most High,
          Who, with the Holy Ghost and Thee,
          Doth live and reign eternally.
          Amen.
      la:
      - type: text
        text: |-
          Nox atra rerum cóntegit
          Terræ colóres ómnium:
          Nos confiténtes póscimus
          Te, iuste iudex córdium.

          Ut áuferas piácula,
          Sordésque mentis ábluas:
          Donésque, Christe, grátiam,
          Ut arceántur crímina.

          Mens ecce torpet ímpia,
          Quam culpa mordet nóxia:
          Obscúra gestit tóllere,
          Et te, Redémptor, quǽrere.

          Repélle tu calíginem
          Intrínsecus quam máxime,
          Ut in beáto gáudeat
          Se collocári lúmine.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.nox-atra-rerum-c-ntegit-e03f9940f3:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Nox atra rerum cóntegit
          Terræ colóres ómnium:
          Nos confiténtes póscimus
          Te, iuste iudex córdium.

          Ut áuferas piácula,
          Sordésque mentis ábluas:
          Donésque, Christe, grátiam,
          Ut arceántur crímina.

          Mens ecce torpet ímpia,
          Quam culpa mordet nóxia:
          Obscúra gestit tóllere,
          Et te, Redémptor, quǽrere.

          Repélle tu calíginem
          Intrínsecus quam máxime,
          Ut in beáto gáudeat
          Se collocári lúmine.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.nox-et-ten-br-et-n-bila-5759ea5134:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Nox, et tenébr[æ], et núbila,
          Confúsa mund[i] et túrbida:
          Lux intrat, albéscit polus:
          Christus venit: discédite.

          Calígo terræ scínditur
          Percússa solis spículo,
          Rebúsque iam color redit,
          Vultu niténtis síderis.

          Te, Christe, solum nóvimus:
          Te mente pur[a] et simplici,
          Flend[o] et canéndo quǽsumus,
          Inténde nostris sénsibus.

          Sunt multa fucis íllita,
          Quæ luce purgéntur tua:
          Tu, lux Eói síderis,
          Vultu serén[o] illúmina.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc, et in perpétuum.
          Amen.
  hymn.nox-et-ten-br-et-n-bila-6955abb215:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Day is breaking, dawn is bright:
          Hence, vain shadows of the night!
          Mists that dim our mortal sight,
          Christ is come! Depart!

          Darkness routed lifts her wings
          As the radiance upwards springs:
          Through the world of wakened things
          Life and colour dart.

          Thee, O Christ, alone we know:
          Singing even in our woe,
          With pure hearts to thee we go:
          On our senses shine!

          In thy beams be purged away
          All that leads our thoughts astray!
          Through our spirits, King of day,
          Pour thy light divine!

          Unto God the Father, Son,
          Holy Spirit, Three in One,
          One in Three, be glory done,
          Now and evermore.
          Amen.
      la:
      - type: text
        text: |-
          Nox, et tenébræ, et núbila,
          Confúsa mundi et túrbida:
          Lux intrat, albéscit polus:
          Christus venit: discédite.

          Calígo terræ scínditur
          Percússa solis spículo,
          Rebúsque iam color redit,
          Vultu niténtis síderis.

          Te, Christe, solum nóvimus:
          Te mente pura et simplici,
          Flendo et canéndo quǽsumus,
          Inténde nostris sénsibus.

          Sunt multa fucis íllita,
          Quæ luce purgéntur tua:
          Tu, vera lux cæléstium,
          Vultu seréno illúmina.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Nunc et per omne sǽculum.
          Amen.
  hymn.nunc-sancte-nobis-sp-ritus-8e3c4585e3:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Come Holy Ghost who ever One
          Art with the Father and the Son,
          It is the hour, our souls possess
          With thy full flood of holiness.

          Let flesh and heart and lips and mind
          Sound forth our witness to mankind;
          And love light up our mortal frame,
          Till others catch the living flame.

          * Almighty Father, hear our cry,
          Through Jesus Christ, our Lord most High,
          Who, with the Holy Ghost and thee,
          Doth live and reign eternally.
          Amen.
      la:
      - type: text
        text: |-
          Nunc, Sancte, nobis, Spíritus,
          Unum Patri cum Fílio,
          Dignáre promptus íngeri
          Nostro refúsus péctori.

          Os, lingua, mens, sensus, vigor
          Confessiónem pérsonent.
          Flamméscat igne cáritas,
          Accéndat ardor próximos.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.o-lux-be-ta-tr-nitas-f46b204900:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          As fades the glowing orb of day,
          To thee, great source of light, we pray;
          Blest Three in One, to every heart
          Thy beams of life and love impart.

          At early dawn, at close of day,
          To thee our vows we humbly pay;
          May we, mid joys that never end,
          With thy bright saints in homage bend.

          To God the Father, and the Son,
          And Holy Spirit, Three in One,
          Be endless glory, as before
          The world began, so evermore.
          Amen.
      la:
      - type: text
        text: |-
          O lux beáta Trínitas,
          Et principális Únitas,
          Iam sol recédit ígneus,
          Infúnde lumen córdibus.

          Te mane laudum cármine,
          Te deprecémur véspere:
          Te nostra supplex glória
          Per cuncta laudet sǽcula.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc, et in perpétuum.
          Amen.
  hymn.o-sol-sal-tis-ntimis-4e64d9647d:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Jesu, salvation’s Sun Divine,
          Within our inmost bosoms shine,
          With light all darkness drive away
          And give the world a better day.

          Now days of grace with mercy flow,
          O Lord, the gift of tears bestow,
          To wash our stains in every part,
          Whilst heavenly fire consumes the heart.

          Rise, crystal tears, from that same source
          From whence our sins derive their course;
          Nor cease, till hardened hearts relent,
          And softened by your streams, repent.

          Behold, the happy days return,
          The days of joy for them that mourn;
          May we of their indulgence share,
          And bless the God that grants our prayer.

          May heaven and earth aloud proclaim
          The Trinity’s almighty fame;
          And we, restored to grace, rejoice
          In newness both of heart and voice.
          Amen.
      la:
      - type: text
        text: |-
          O sol salútis, íntimis,
          Iesu, refúlge méntibus,
          Dum, nocte pulsa, grátior
          Orbi dies renáscitur.

          Dans tempus acceptábile,
          Da lacrimárum rívulis
          Laváre cordis víctimam,
          Quam læta adúrat cáritas.

          Quo fonte manávit nefas,
          Fluent perénnes lácrimæ,
          Si virga pœniténtiæ
          Cordis rigórem cónterat.

          Dies venit, dies tua,
          In qua reflórent ómnia:
          Lætémur et nos in viam
          Tua redúcti déxtera.

          Te prona mundi máchina,
          Clemens, adóret, Trínitas,
          Et nos novi per grátiam
          Novum canámus cánticum.
          Amen.
  hymn.pange-lingua-glori-si-13dcaa9a6e:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Sing, my tongue, the glorious battle
          Sing the last, the dread affray;
          O'er the cross, the victor's trophy,
          Sound the high triumphal lay:
          Tell how Christ, the world's Redeemer,
          As a victim won the day.

          God, his Maker, sorely grieving
          That the first-made Adam fell,
          When he ate the fruit of sorrow,
          Whose reward was death and hell,
          Noted then this wood, the ruin
          Of the ancient wood to quell.

          For the work of our salvation
          Needs would have his order so,
          And the multiform deceiver's
          Art by art would overthrow,
          And from thence would bring the med'cine
          Whence the insult of the foe.

          Wherefore, when the sacred fullness
          Of the appointed time was come,
          This world's Maker left his Father,
          Sent the heav'nly mansion from,
          And proceeded, God Incarnate,
          Of the Virgin's holy womb.

          Weeps the infant in the manger
          That in Bethlehem's stable stands;
          And his limbs the Virgin Mother
          Doth compose in swaddling bands,
          Meetly thus in linen folding
          Of her God the feet and hands.

          To the Trinity be glory
          Everlasting, as is meet;
          Equal to the Father, equal
          To the Son, and Paraclete:
          Trinal Unity, whose praises
          All created things repeat.
          Amen.
      la:
      - type: text
        text: |-
          Pange, lingua, gloriósi
          Láuream certáminis,
          Et super Crucis trophǽo
          Dic triúmphum nóbilem,
          Quáliter Redémptor orbis
          Immolátus vícerit.

          De paréntis protoplásti
          Fraude Factor cóndolens,
          Quando pomi noxiális
          In necem morsu ruit,
          Ipse lignum tunc notávit,
          Damna ligni ut sólveret.

          Hoc opus nostræ salútis
          Ordo depopóscerat,
          Multifórmis proditóris
          Ars ut artem fálleret,
          Et medélam ferret inde,
          Hostis unde lǽserat.

          Quando venit ergo sacri
          Plenitúdo témporis,
          Missus est ab arce Patris
          Natus, orbis Cónditor,
          Atque ventre virgináli
          Carne amíctus pródiit.

          Vagit infans inter arcta
          Cónditus præsépia:
          Membra pannis involúta
          Virgo Mater álligat:
          Et Dei manus pedésque
          Stricta cingit fáscia.

          Sempitérna sit beátæ
          Trinitáti glória,
          Æqua Patri, Filióque;
          Par decus Paráclito:
          Uníus Triníque nomen
          Laudet univérsitas.
          Amen.
