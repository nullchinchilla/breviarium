  hymn.rerum-cre-tor-ptime-6e5133be30:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Who madest all and dost control,
          Lord, with thy touch divine,
          Cast out the slumbers of the soul,
          The rest that is not thine.

          Look down, Eternal Holiness,
          And wash the sins away,
          Of those, who, rising to confess,
          Outstrip the lingering day.

          Our hearts and hands by night, O Lord,
          We lift them in Our need;
          As holy Psalmists give the word,
          And holy Paul the deed.

          Each sin to thee of years gone by,
          Each hidden stain lies bare;
          We shrink not from thine awful eye,
          But pray that thou wouldst spare.

          Grant this, O Father, Only Son
          And Spirit, God of grace,
          To whom all worship shall be done
          In every time and place,
          Amen.
      la:
      - type: text
        text: |-
          Rerum Creátor óptime,
          Rectórque noster, áspice:
          Nos a quiéte nóxia
          Mersos sopóre líbera.

          Te, sancte Christe, póscimus,
          Ignósce culpis ómnibus:
          Ad confiténdum súrgimus,
          Morásque noctis rúmpimus.

          Mentes manúsque tóllimus,
          Prophéta sicut nóctibus
          Nobis geréndum prǽcipit,
          Paulúsque gestis cénsuit.

          Vides malum, quod fécimus:
          Occúlta nostra pándimus:
          Preces geméntes fúndimus,
          Dimítte quod peccávimus.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          Who madest all and dost control,
          Lord, with thy touch divine,
          Cast out the slumbers of the soul,
          The rest that is not thine.
      
          Look down, Eternal Holiness,
          And wash the sins away,
          Of those, who, rising to confess,
          Outstrip the lingering day.
      
          Our hearts and hands by night, O Lord,
          We lift them in Our need;
          As holy Psalmists give the word,
          And holy Paul the deed.
      
          Each sin to thee of years gone by,
          Each hidden stain lies bare;
          We shrink not from thine awful eye,
          But pray that thou wouldst spare.
      
          Grant this, O Father, Only Son
          And Spirit, God of grace,
          To whom all worship shall be done
          In every time and place,
          Amen.
  hymn.rerum-cre-tor-ptime-a863d7a925:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Rerum Creátor óptime,
          Rectórque noster, áspice:
          Nos a quiéte nóxia
          Mersos sopóre líbera.

          Te, sancte Christe, póscimus,
          Ignósce tu criminibus:
          Ad confiténdum súrgimus,
          Morásque noctis rúmpimus.

          Mentes manúsque tóllimus,
          Prophéta sicut nóctibus
          Nobis geréndum prǽcipit,
          Paulúsque gestis cénsuit.

          Vides malum, quod fécimus:
          Occúlta nostra pándimus:
          Preces geméntes fúndimus,
          Dimítte quod peccávimus.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          O best Creator of all things,
          And our Ruler, look upon us:
          Free us, plunged in harmful sleep,
          From rest that harms.
      
          We call upon you, O holy Christ,
          Forgive our sins:
          We rise to make confession
          And break through the delays of night.
      
          We lift up our minds and hands,
          As the prophet bids us
          Do by night,
          And as Paul commended by his deeds.
      
          You see the evil that we have done:
          We lay open our hidden faults:
          We pour forth groaning prayers,
          Forgive what we have sinned.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.rerum-deus-tenax-vigor-7961e90e1c:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Rerum, Deus, tenax vigor,
          Immótus in te pérmanens,
          Lucis diúrnæ témpora
          Succéssibus detérminans:

          Largíre clarum véspere,
          Quo vita nusquam décidat,
          Sed prǽmium mortis sacræ
          Perénnis instet glória.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          O God, the abiding strength of things,
          Dwelling unmoved within yourself,
          Determining the hours of daily light
          By their successions:
      
          Grant a bright evening,
          That life may nowhere fail,
          But may the eternal glory
          Press upon us as the reward of holy death.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.rerum-deus-tenax-vigor-e6b36cae21:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O strength and stay upholding all creation,
          Who ever dost thyself unmoved abide,
          Yet day by day the light in due gradation
          From hour to hour through all its changes guide:

          Grant to life’s day a calm unclouded ending,
          An eve untouched by shadows of decay,
          The brightness of a holy death-bed blending
          With dawning glories of th’ eternal day.

          Hear us, O Father, gracious and forgiving,
          And thou, O Christ, the co-eternal Word,
          Who, with the Holy Ghost, by all things living
          Now and to endless ages art adored.
          Amen.
      la:
      - type: text
        text: |-
