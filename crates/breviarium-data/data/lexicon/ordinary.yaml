  hymn.h-minis-superne-c-nditor-c882049800:
    role: hymn
    content:
      en:
      - type: text
        text: Maker of man, who from thy throne
      - type: text
        text: Dost order all things, God alone;
      - type: text
        text: By whose decree the teeming earth
      - type: text
        text: 'To reptile and to beast gave birth:'
      - type: text
        text: The mighty forms that fill the land,
      - type: text
        text: Instinct with life at thy command,
      - type: text
        text: Are given subdued to humankind
      - type: text
        text: For service in their rank assigned.
      - type: text
        text: From all thy servants drive away
      - type: text
        text: Whate’er of thought impure to-day
      - type: text
        text: Hath been with open action blent,
      - type: text
        text: Or mingled with the heart’s intent.
      - type: text
        text: In heaven thine endless joys bestow,
      - type: text
        text: And grant thy gifts of grace below;
      - type: text
        text: From chains of strife our souls release,
      - type: text
        text: Bind fast the gentle bands of peace.
      - type: text
        text: Grant this, O Father, ever One
      - type: text
        text: With Christ, thy sole-begotten Son,
      - type: text
        text: Whom, with the Spirit we adore,
      - type: text
        text: One God, both now and evermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Hóminis superne Cónditor,
      - type: text
        text: Qui cuncta solus órdinans,
      - type: text
        text: Humum iubes prodúcere
      - type: text
        text: 'Reptántis et feræ genus:'
      - type: text
        text: Et magna rerum córpora,
      - type: text
        text: Dictu iubéntis vívida,
      - type: text
        text: Per témporum certas vices
      - type: text
        text: 'Obtemperáre sérvulis:'
      - type: text
        text: Repélle, quod cupídinis
      - type: text
        text: Ciénte vi nos ímpetit,
      - type: text
        text: Aut móribus se súggerit,
      - type: text
        text: Aut áctibus se intérserit.
      - type: text
        text: Da gaudiórum prǽmia,
      - type: text
        text: 'Da gratiárum múnera:'
      - type: text
        text: 'Dissólve litis víncula:'
      - type: text
        text: Astrínge pacis fœ́dera.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.iam-christe-sol-iust-ti-a407b2c556:
    role: hymn
    content:
      la:
      - type: text
        text: Iam Christe sol iustítiæ,
      - type: text
        text: 'Mentis diéscant ténebræ:'
      - type: text
        text: Virtútum ut lux rédeat,
      - type: text
        text: Terris diem cum réparas.
      - type: text
        text: Dans tempus acceptábile,
      - type: text
        text: Et pǽnitens cor tríbue,
      - type: text
        text: Convértat ut benígnitas
      - type: text
        text: Quos longa suffert píetas.
      - type: text
        text: Quiddámque pæniténtiæ
      - type: text
        text: Da ferre, quamvis grávium,
      - type: text
        text: Maióre tuo múnere,
      - type: text
        text: Quo démptio fit críminum.
      - type: text
        text: Dies venit, dies tua,
      - type: text
        text: 'In qua reflórent ómnia:'
      - type: text
        text: Lætémur in hac ad tuam
      - type: text
        text: Per hanc redúcti grátiam.
      - type: text
        text: Te rerum univérsitas,
      - type: text
        text: Clemens, adóret, Trínitas,
      - type: text
        text: Et nos novi per véniam,
      - type: text
        text: Novum canámus cánticum.
      - type: text
        text: Amen.
  hymn.iam-lucis-orto-s-dere-2014925616:
    role: hymn
    content:
      la:
      - type: text
        text: Iam lucis orto sídere,
      - type: text
        text: Deum precémur súpplices,
      - type: text
        text: Ut in diúrnis áctibus
      - type: text
        text: Nos servet a nocéntibus.
      - type: text
        text: Linguam refrénans témperet,
      - type: text
        text: 'Ne litis horror ínsonet:'
      - type: text
        text: Visum fovéndo cóntegat,
      - type: text
        text: Ne vanitátes háuriat.
      - type: text
        text: Sint pura cordis íntima,
      - type: text
        text: Absístat et vecórdia;
      - type: text
        text: Carnis terat supérbiam
      - type: text
        text: Potus cibíque párcitas.
      - type: text
        text: Ut, cum dies abscésserit,
      - type: text
        text: Noctémque sors redúxerit,
      - type: text
        text: Mundi per abstinéntiam
      - type: text
        text: Ipsi canámus glóriam.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc et in perpétuum.
      - type: text
        text: Amen.
  hymn.iam-lucis-orto-s-dere-6e9435eec1:
    role: hymn
    content:
      en:
      - type: text
        text: Now in the sun's new dawning ray,
      - type: text
        text: Lowly of heart, our God we pray
      - type: text
        text: That he from harm may keep us free
      - type: text
        text: In all the deeds this day shall see.
      - type: text
        text: May fear of him our tongues restrain,
      - type: text
        text: 'Lest strife unguarded speech should stain:'
      - type: text
        text: His favouring care our guardian be,
      - type: text
        text: Lest our eyes feed on vanity.
      - type: text
        text: May every heart be pure from sin
      - type: text
        text: 'And folly find no place therein:'
      - type: text
        text: Scant need of food, excess denied,
      - type: text
        text: Wear down in us the body's pride.
      - type: text
        text: That when the light of day is gone,
      - type: text
        text: And night in course shall follow on.
      - type: text
        text: We, free from cares the world affords,
      - type: text
        text: May chant the praise that is our Lord's.
      - type: text
        text: '* All laud to God the Father be,'
      - type: text
        text: 'All praise, Eternal Son, to thee:'
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To God the holy Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Iam lucis orto sídere,
      - type: text
        text: Deum precémur súpplices,
      - type: text
        text: Ut in diúrnis áctibus
      - type: text
        text: Nos servet a nocéntibus.
      - type: text
        text: Linguam refrénans témperet,
      - type: text
        text: 'Ne litis horror ínsonet:'
      - type: text
        text: Visum fovéndo cóntegat,
      - type: text
        text: Ne vanitátes háuriat.
      - type: text
        text: Sint pura cordis íntima,
      - type: text
        text: Absístat et vecórdia;
      - type: text
        text: Carnis terat supérbiam
      - type: text
        text: Potus cibíque párcitas.
      - type: text
        text: Ut, cum dies abscésserit,
      - type: text
        text: Noctémque sors redúxerit,
      - type: text
        text: Mundi per abstinéntiam
      - type: text
        text: Ipsi canámus glóriam.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.iam-sol-rec-dit-gneus-bbb95e6226:
    role: hymn
    content:
      en:
      - type: text
        text: As fades the glowing orb of day,
      - type: text
        text: To thee, great source of light, we pray;
      - type: text
        text: Blest Three in One, to every heart
      - type: text
        text: Thy beams of life and love impart.
      - type: text
        text: At early dawn, at close of day,
      - type: text
        text: To thee our vows we humbly pay;
      - type: text
        text: May we, mid joys that never end,
      - type: text
        text: With thy bright saints in homage bend.
      - type: text
        text: To God the Father, and the Son,
      - type: text
        text: And Holy Spirit, Three in One,
      - type: text
        text: Be endless glory, as before
      - type: text
        text: The world began, so evermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: 'Iam sol recédit ígneus:'
      - type: text
        text: Tu, lux perénnis, Únitas,
      - type: text
        text: Nostris, beáta Trínitas,
      - type: text
        text: Infúnde lumen córdibus.
      - type: text
        text: Te mane laudum cármine,
      - type: text
        text: Te deprecámur véspere;
      - type: text
        text: Dignéris ut te súpplices
      - type: text
        text: Laudémus inter cǽlites.
      - type: text
        text: Patri, simúlque Fílio,
      - type: text
        text: Tibíque, Sancte Spíritus,
      - type: text
        text: Sicut fuit, sit iúgiter
      - type: text
        text: Sæclum per omne glória.
      - type: text
        text: Amen.
  hymn.iesu-nostra-red-mptio-6c15c746ce:
    role: hymn
    content:
      la:
      - type: text
        text: Iesu nostra redémptio,
      - type: text
        text: Amor et desidérium,
      - type: text
        text: Deus Creátor ómnium,
      - type: text
        text: 'Homo in fine témporum:'
      - type: text
        text: Quæ te vicit cleméntia,
      - type: text
        text: Ut ferres nostra crímina,
      - type: text
        text: Crudélem mortem pátiens,
      - type: text
        text: Ut nos a morte tólleres!
      - type: text
        text: Inférni claustra pénetrans,
      - type: text
        text: Tuos captívos rédimens,
      - type: text
        text: Victor triúmpho nóbili
      - type: text
        text: Ad dextram Patris résidens.
      - type: text
        text: Ipsa te cogat píetas,
      - type: text
        text: Ut mala nostra súperes
      - type: text
        text: Parcénd[o], et voti cómpotes
      - type: text
        text: Nos tuo vultu sáties.
      - type: text
        text: Tu esto nostrum gáudium,
      - type: text
        text: Qui es futúrus prǽmium,
      - type: text
        text: Sit nostra in te glória,
      - type: text
        text: Per cuncta semper sǽcula.
      - type: text
        text: Glória tibi Dómine,
      - type: text
        text: Qui scandis super sídera,
      - type: text
        text: Cum Patre, et Sancto Spíritu,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.iesu-nostra-red-mptio-c16a905b3c:
    role: hymn
    content:
      la:
      - type: text
        text: Iesu nostra redémptio,
      - type: text
        text: Amor et desidérium,
      - type: text
        text: Deus Creátor ómnium,
      - type: text
        text: 'Homo in fine témporum:'
      - type: text
        text: Quæ te vicit cleméntia,
      - type: text
        text: Ut ferres nostra crímina,
      - type: text
        text: Crudélem mortem pátiens,
      - type: text
        text: Ut nos a morte tólleres!
      - type: text
        text: Inférni claustra pénetrans,
      - type: text
        text: Tuos captívos rédimens,
      - type: text
        text: Victor triúmpho nóbili
      - type: text
        text: Ad dextram Patris résidens.
      - type: text
        text: Ipsa te cogat píetas,
      - type: text
        text: Ut mala nostra súperes
      - type: text
        text: Parcénd[o], et voti cómpotes
      - type: text
        text: Nos tuo vultu sáties.
      - type: text
        text: Dudum sacráta péctora
      - type: text
        text: 'Tua replésti grátia:'
      - type: text
        text: Dimítte nostra crímina,
      - type: text
        text: Et da quiéta témpora.
  hymn.iesu-nostra-red-mptio-ebfa6ef679:
    role: hymn
    content:
      la:
      - type: text
        text: Iesu nostra redémptio,
      - type: text
        text: Amor et desidérium,
      - type: text
        text: Deus Creátor ómnium,
      - type: text
        text: 'Homo in fine témporum:'
      - type: text
        text: Quæ te vicit cleméntia,
      - type: text
        text: Ut ferres nostra crímina,
      - type: text
        text: Crudélem mortem pátiens,
      - type: text
        text: Ut nos a morte tólleres!
      - type: text
        text: Inférni claustra pénetrans,
      - type: text
        text: Tuos captívos rédimens,
      - type: text
        text: Victor triúmpho nóbili
      - type: text
        text: Ad dextram Patris résidens.
      - type: text
        text: Ipsa te cogat píetas,
      - type: text
        text: Ut mala nostra súperes
      - type: text
        text: Parcénd[o], et voti cómpotes
      - type: text
        text: Nos tuo vultu sáties.
      - type: text
        text: Quǽsumus, Auctor ómnium,
      - type: text
        text: In hoc pascháli gáudio,
      - type: text
        text: Ab omni mortis ímpetu
      - type: text
        text: Tuum defénde pópulum.
      - type: text
        text: Glória tibi Dómine,
      - type: text
        text: Qui surrexíst[i] a mórtuis,
      - type: text
        text: Cum Patr[e] et Sancto Spíritu,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.imm-nse-c-li-c-nditor-7a94fc1cd2:
    role: hymn
    content:
      la:
      - type: text
        text: Imménse cæli Cónditor,
      - type: text
        text: Qui mixta ne confúnderent,
      - type: text
        text: Aquæ fluénta dívidens,
      - type: text
        text: Cælum dedísti límitem.
      - type: text
        text: Firmans locum cæléstibus,
      - type: text
        text: Simúlque terræ rívulis;
      - type: text
        text: Ut unda flammas témperet,
      - type: text
        text: Terræ solum ne díssipent.
      - type: text
        text: Infúnde nunc, piíssime,
      - type: text
        text: 'Donum perénnis grátiæ:'
      - type: text
        text: Fraudis novæ ne cásibus
      - type: text
        text: Nos error átterat vetus.
      - type: text
        text: 'Lucem fides invéniat:'
      - type: text
        text: 'Sic lúminis iubar ferat:'
      - type: text
        text: 'Ut vana cuncta próterat:'
      - type: text
        text: Hanc falsa nulla cómprimant.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.imm-nse-c-li-c-nditor-ac78f1d1c9:
    role: hymn
    content:
      en:
      - type: text
        text: O great Creator of the sky,
      - type: text
        text: Who wouldest not the floods on high
      - type: text
        text: With earthly waters to confound,
      - type: text
        text: But mad’st the firmament their bound;
      - type: text
        text: The floods above thou didst ordain;
      - type: text
        text: 'The floods below thou didst restrain:'
      - type: text
        text: That moisture might attemper heat,
      - type: text
        text: Lest the parched earth should ruin meet.
      - type: text
        text: Upon our souls, good Lord, bestow
      - type: text
        text: 'Thy gift of grace in endless flow:'
      - type: text
        text: Lest some renewed deceit or wile
      - type: text
        text: Of former sin should us beguile.
      - type: text
        text: Let faith discover heav’nly light;
      - type: text
        text: 'So shall its rays direct us right:'
      - type: text
        text: And let this faith each error chase,
      - type: text
        text: And never give to falsehood place.
      - type: text
        text: Grant this, O Father, ever One
      - type: text
        text: With Christ, thy sole-begotten Son,
      - type: text
        text: And Holy Ghost, whom all adore,
      - type: text
        text: Reigning and blest forevermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Imménse cæli Cónditor,
      - type: text
        text: Qui mixta ne confúnderent,
      - type: text
        text: Aquæ fluénta dívidens,
      - type: text
        text: Cælum dedísti límitem.
      - type: text
        text: Firmans locum cæléstibus,
      - type: text
        text: Simúlque terræ rívulis;
      - type: text
        text: Ut unda flammas témperet,
      - type: text
        text: Terræ solum ne díssipent.
      - type: text
        text: Infúnde nunc, piíssime,
      - type: text
        text: 'Donum perénnis grátiæ:'
      - type: text
        text: Fraudis novæ ne cásibus
      - type: text
        text: Nos error átterat vetus.
      - type: text
        text: 'Lucem fides adáugeat:'
      - type: text
        text: 'Sic lúminis iubar ferat:'
      - type: text
        text: 'Hæc vana cuncta próterat:'
      - type: text
        text: Hanc falsa nulla cómprimant.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.lucis-cre-tor-ptime-60557a5608:
    role: hymn
    content:
      la:
      - type: text
        text: Lucis Creátor óptime,
      - type: text
        text: Lucem diérum próferens,
      - type: text
        text: Primórdiis lucis novæ,
      - type: text
        text: 'Mundi parans oríginem:'
      - type: text
        text: Qui mane iunctum vésperi
      - type: text
        text: 'Diem vocári prǽcipis:'
      - type: text
        text: Tetrum chaos illábitur,
      - type: text
        text: Audi preces cum flétibus.
      - type: text
        text: Ne mens graváta crímine,
      - type: text
        text: Vitæ sit exsul múnere,
      - type: text
        text: Dum nil perénne cógitat,
      - type: text
        text: Seséque culpis ílligat.
      - type: text
        text: Cælórum pulset íntimum,
      - type: text
        text: 'Vitále tollat prǽmium:'
      - type: text
        text: 'Vitémus omne nóxium:'
      - type: text
        text: Purgémus omne péssimum.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.lucis-cre-tor-ptime-a880bfca9e:
    role: hymn
    content:
      en:
      - type: text
        text: O blest Creator of the light,
      - type: text
        text: Who mak’st the day with radiance bright,
      - type: text
        text: And o’er the forming world didst call
      - type: text
        text: The light from chaos first of all;
      - type: text
        text: Whose wisdom joined in meet array
      - type: text
        text: 'The morn and eve, and named them day:'
      - type: text
        text: Night comes with all its darkling fears;
      - type: text
        text: Regard thy people’s prayers and tears.
      - type: text
        text: Lest, sunk in sin, and whelmed with strife,
      - type: text
        text: They lose the gift of endless life;
      - type: text
        text: While thinking but the thoughts of time,
      - type: text
        text: They weave new chains of woe and crime.
      - type: text
        text: But grant them grace that they may strain
      - type: text
        text: 'The heavenly gate and prize to gain:'
      - type: text
        text: Each harmful lure aside to cast,
      - type: text
        text: And purge away each error past.
      - type: text
        text: '* O Father, that we ask be done,'
      - type: text
        text: Through Jesus Christ, thine only Son;
      - type: text
        text: Who, with the Holy Ghost and thee,
      - type: text
        text: Doth live and reign eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Lucis Creátor óptime,
      - type: text
        text: Lucem diérum próferens,
      - type: text
        text: Primórdiis lucis novæ,
      - type: text
        text: 'Mundi parans oríginem:'
      - type: text
        text: Qui mane iunctum vésperi
      - type: text
        text: 'Diem vocári prǽcipis:'
      - type: text
        text: Illábitur tetrum chaos,
      - type: text
        text: Audi preces cum flétibus.
      - type: text
        text: Ne mens graváta crímine,
      - type: text
        text: Vitæ sit exsul múnere,
      - type: text
        text: Dum nil perénne cógitat,
      - type: text
        text: Seséque culpis ílligat.
      - type: text
        text: 'Cæléste pulset óstium:'
      - type: text
        text: 'Vitále tollat prǽmium:'
      - type: text
        text: 'Vitémus omne nóxium:'
      - type: text
        text: Purgémus omne péssimum.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.lustra-sex-qui-iam-per-git-345102b58a:
    role: hymn
    content:
      en:
      - type: text
        text: Thirty years among us dwelling,
      - type: text
        text: His appointed time fulfilled,
      - type: text
        text: Born for this, he meets his passion,
      - type: text
        text: 'For that this he freely willed:'
      - type: text
        text: On the cross the Lamb is lifted,
      - type: text
        text: Where his life-blood shall be spilled.
      - type: text
        text: He endured the nails, the spitting,
      - type: text
        text: Vinegar, and spear, and reed;
      - type: text
        text: From that holy body broken
      - type: text
        text: 'Blood and water forth proceed:'
      - type: text
        text: Earth, and stars, and sky, and ocean,
      - type: text
        text: By that flood from stain are free.
      - type: text
        text: Faithful cross! above all other,
      - type: text
        text: One and only noble tree!
      - type: text
        text: None in foliage, none in blossom,
      - type: text
        text: None in fruit thy peers may be;
      - type: text
        text: Sweetest wood and sweetest iron!
      - type: text
        text: Sweetest weight is hung on thee.
      - type: text
        text: Bend thy boughs, O tree of glory!
      - type: text
        text: Thy relaxing sinews bend;
      - type: text
        text: For awhile the ancient rigour,
      - type: text
        text: That thy birth bestowed, suspend;
      - type: text
        text: And the King of heavenly beauty
      - type: text
        text: On thy bosom gently tend!
      - type: text
        text: Thou alone wast counted worthy
      - type: text
        text: This world's ransom to uphold;
      - type: text
        text: For a shipwrecked race preparing
      - type: text
        text: Harbour, like the ark of old;
      - type: text
        text: With the sacred blood anointed
      - type: text
        text: From the smitten Lamb that rolled.
      - type: text
        text: To the Trinity be glory
      - type: text
        text: Everlasting, as is meet;
      - type: text
        text: Equal to the Father, equal
      - type: text
        text: 'To the Son, and Paraclete:'
      - type: text
        text: Trinal Unity, whose praises
      - type: text
        text: All created things repeat.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Lustra sex qui iam perégit,
      - type: text
        text: Tempus implens córporis,
      - type: text
        text: Sponte líbera Redémptor
      - type: text
        text: Passióni déditus,
      - type: text
        text: Agnus in Crucis levátur
      - type: text
        text: Immolándus stípite.
      - type: text
        text: Felle potus ecce languet,
      - type: text
        text: Spina, clavi, láncea,
      - type: text
        text: Mite corpus perforárunt,
      - type: text
        text: 'Unda manat, et cruor:'
      - type: text
        text: Terra, pontus, astra, mundus,
      - type: text
        text: Quo lavántur flúmine!
      - type: text
        text: Crux fidélis, inter omnes
      - type: text
        text: 'Arbor una nóbilis:'
      - type: text
        text: Silva talem nulla profert
      - type: text
        text: 'Fronde, flore, gérmine:'
      - type: text
        text: Dulce ferrum, dulce lignum
      - type: text
        text: Dulce pondus sústinent.
      - type: text
        text: Flecte ramos, arbor alta,
      - type: text
        text: Tensa laxa víscera,
      - type: text
        text: Et rigor lentéscat ille,
      - type: text
        text: 'Quem dedit natívitas:'
      - type: text
        text: Et supérni membra Regis
      - type: text
        text: Tende miti stípite.
      - type: text
        text: Sola digna tu fuísti
      - type: text
        text: Ferre mundi víctimam;
      - type: text
        text: Atque portum præparáre
      - type: text
        text: Arca mundo náufrago,
      - type: text
        text: Quam sacer cruor perúnxit,
      - type: text
        text: Fusus Agni córpore.
      - type: text
        text: Sempitérna sit beátæ
      - type: text
        text: 'Trinitáti glória:'
      - type: text
        text: Æqua Patri, Filióque,
      - type: text
        text: 'Par decus Paráclito:'
      - type: text
        text: Uníus, Triníque nomen
      - type: text
        text: Laudet univérsitas.
      - type: text
        text: Amen.
  hymn.lustris-sex-qui-iam-per-ctis-2bb259ddf2:
    role: hymn
    content:
      la:
      - type: text
        text: Lustris sex qui iam peráctis,
      - type: text
        text: Tempus implens córporis,
      - type: text
        text: Se volénte natus ad hoc,
      - type: text
        text: Passióni déditus,
      - type: text
        text: Agnus in Crucis levátur
      - type: text
        text: Immolándus stípite.
      - type: text
        text: Hic acétum, fel, arúndo,
      - type: text
        text: 'Sputa, clavi, láncea:'
      - type: text
        text: Mite corpus perforátur,
      - type: text
        text: 'Sanguis, unda prófluit:'
      - type: text
        text: Terra, pontus, astra, mundus,
      - type: text
        text: Quo lavántur flúmine!
      - type: text
        text: Crux fidélis, inter omnes
      - type: text
        text: 'Arbor una nóbilis:'
      - type: text
        text: Nulla silva talem profert
      - type: text
        text: 'Fronde, flore, gérmine:'
      - type: text
        text: Dulce lignum, dulces clavos,
      - type: text
        text: Dulce pondus sústinet.
      - type: text
        text: Flecte ramos, arbor alta,
      - type: text
        text: Tensa laxa víscera,
      - type: text
        text: Et rigor lentéscat ille,
      - type: text
        text: 'Quem dedit natívitas:'
      - type: text
        text: Ut supérni membra Regis
      - type: text
        text: Miti tendas stípite.
      - type: text
        text: Sola digna tu fuísti
      - type: text
        text: Ferre sæcli prétium,
      - type: text
        text: Atque portum præparáre
      - type: text
        text: Nauta mundo náufrago,
      - type: text
        text: Quem sacer cruor perúnxit,
      - type: text
        text: Fusus Agni córpore.
      - type: text
        text: Glória et honor Deo
      - type: text
        text: 'Usquequáqu[e] altíssimo:'
      - type: text
        text: Una Patri, Filióque,
      - type: text
        text: 'Inclyto Paráclito:'
      - type: text
        text: Cui laus est et potéstas
      - type: text
        text: Per ætérna sǽcula.
      - type: text
        text: Amen.
  hymn.lux-ecce-surgit-urea-b55d31aa73:
    role: hymn
    content:
      en:
      - type: text
        text: See the golden sun arise!
      - type: text
        text: Let no more our darkened eyes
      - type: text
        text: Snare us, tangled by surprise
      - type: text
        text: In the maze of sin!
      - type: text
        text: From false words and thoughts impure
      - type: text
        text: Let this light, serene and sure,
      - type: text
        text: Keep our lips without secure,
      - type: text
        text: Keep our souls within.
      - type: text
        text: So may we the day-time spend,
      - type: text
        text: That, till life’s temptations end,
      - type: text
        text: Tongue, nor hand, nor eye offend!
      - type: text
        text: One, above us all,
      - type: text
        text: Views in his revealing ray
      - type: text
        text: All we do, and think, and say,
      - type: text
        text: Watching us from break of day
      - type: text
        text: Till the twilight fall.
      - type: text
        text: Unto God the Father, Son,
      - type: text
        text: Holy Spirit, Three in One,
      - type: text
        text: One in Three, be glory done,
      - type: text
        text: Now and evermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Lux ecce surgit áurea,
      - type: text
        text: Pallens facéssat cǽcitas,
      - type: text
        text: Quæ nosmet in præceps diu
      - type: text
        text: Erróre traxit dévio.
      - type: text
        text: Hæc lux serénum cónferat,
      - type: text
        text: 'Purósque nos præstet sibi:'
      - type: text
        text: 'Nihil loquámur súbdolum:'
      - type: text
        text: Volvámus obscúrum nihil.
      - type: text
        text: Sic tota decúrrat dies,
      - type: text
        text: Ne lingua mendax, ne manus
      - type: text
        text: Oculíve peccent lúbrici,
      - type: text
        text: Ne noxa corpus ínquinet.
      - type: text
        text: Speculátor astat désuper,
      - type: text
        text: Qui nos diébus ómnibus,
      - type: text
        text: Actúsque nostros próspicit
      - type: text
        text: A luce prima in vésperum.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.lux-ecce-surgit-urea-ba7cc5e8f0:
    role: hymn
    content:
      la:
      - type: text
        text: Lux ecce surgit áurea,
      - type: text
        text: Pallens facéssat cǽcitas,
      - type: text
        text: Quæ nosmet in præceps diu
      - type: text
        text: Erróre traxit dévio.
      - type: text
        text: Hæc lux serénum cónferat,
      - type: text
        text: 'Purósque nos præstet sibi:'
      - type: text
        text: 'Nihil loquámur súbdolum:'
      - type: text
        text: Volvámus obscúrum nihil.
      - type: text
        text: Sic tota decúrrat dies,
      - type: text
        text: Ne lingua mendax, ne manus
      - type: text
        text: Oculív[e] peccent lúbrici,
      - type: text
        text: Ne noxa corpus ínquinet.
      - type: text
        text: Spec[u]látor astat désuper,
      - type: text
        text: Qui nos diébus ómnibus,
      - type: text
        text: Actúsque nostros próspicit
      - type: text
        text: A luce prim[a] in vésperum.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc, et in perpétuum.
      - type: text
        text: Amen.
  hymn.magn-deus-pot-nti-c92e39b231:
    role: hymn
    content:
      la:
      - type: text
        text: Magnæ Deus poténtiæ,
      - type: text
        text: Qui ex aquis ortum genus
      - type: text
        text: Partim remíttis gúrgiti,
      - type: text
        text: Partim levas in áëra.
      - type: text
        text: Demérsa lymphis ímprimens,
      - type: text
        text: 'Subvécta cælis írrigans:'
      - type: text
        text: Ut stirpe ab una pródita,
      - type: text
        text: 'Divérsa rápiant loca:'
      - type: text
        text: Largíre cunctis sérvulis,
      - type: text
        text: Quos mundat unda Sánguinis,
      - type: text
        text: Nescíre lapsus críminum,
      - type: text
        text: Nec ferre mortis tǽdium.
      - type: text
        text: 'Ut culpa nullum déprimat:'
      - type: text
        text: 'Nullum levet iactántia:'
      - type: text
        text: 'Elísa mens ne cóncidat:'
      - type: text
        text: Eláta mens ne córruat.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.magn-deus-pot-nti-f22c096fcb:
    role: hymn
    content:
      en:
      - type: text
        text: O sovereign Lord of nature’s might,
      - type: text
        text: Who bad’st the water’s birth divide;
      - type: text
        text: Part in the heavens to take their flight,
      - type: text
        text: And part in ocean’s deep to hide;
      - type: text
        text: These low obscured, on airy wing
      - type: text
        text: Exalted those, that either race,
      - type: text
        text: Though from one element they spring,
      - type: text
        text: Might serve thee in a different place.
      - type: text
        text: Grant, Lord, that we thy servants all,
      - type: text
        text: Saved by thy tide of cleansing blood,
      - type: text
        text: No more ’neath sin's dominion fall,
      - type: text
        text: Nor fear the thought of death’s dark flood!
      - type: text
        text: Thy varied love each spirit bless,
      - type: text
        text: The humble cheer, the high control;
      - type: text
        text: Check in each heart its proud excess,
      - type: text
        text: But raise the meek and contrite soul!
      - type: text
        text: This boon, O Father, we entreat,
      - type: text
        text: This blessing grant, Eternal Son,
      - type: text
        text: And Holy Ghost, the Paraclete,
      - type: text
        text: Both now, and while the ages run.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Magnæ Deus poténtiæ,
      - type: text
        text: Qui fértili natos aqua
      - type: text
        text: Partim relínquis gúrgiti,
      - type: text
        text: Partim levas in áëra.
      - type: text
        text: Demérsa lymphis ímprimens,
      - type: text
        text: 'Subvécta cælis érigens:'
      - type: text
        text: Ut stirpe ab una pródita,
      - type: text
        text: 'Divérsa répleant loca:'
      - type: text
        text: Largíre cunctis sérvulis,
      - type: text
        text: Quos mundat unda Sánguinis,
      - type: text
        text: Nescíre lapsus críminum,
      - type: text
        text: Nec ferre mortis tǽdium.
      - type: text
        text: 'Ut culpa nullum déprimat:'
      - type: text
        text: 'Nullum éfferat iactántia:'
      - type: text
        text: 'Elísa mens ne cóncidat:'
      - type: text
        text: Eláta mens ne córruat.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.nocte-surg-ntes-vigil-mus-omnes-31f30353ab:
    role: hymn
    content:
      en:
      - type: text
        text: Now, from the slumbers of the night arising,
      - type: text
        text: Chant we the holy psalmody of David,
      - type: text
        text: Hymns to our Master, with a voice concordant,
      - type: text
        text: Sweetly intoning.
      - type: text
        text: So may our Monarch pitifully hear us,
      - type: text
        text: That we may merit with his saints to enter
      - type: text
        text: Mansions eternal, therewithal possessing
      - type: text
        text: Joy beatific.
      - type: text
        text: This be our portion, God forever blessed,
      - type: text
        text: Father eternal, Son, and Holy Spirit,
      - type: text
        text: Whose is the glory, which through all creation
      - type: text
        text: Ever resoundeth.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Nocte surgéntes vigilémus omnes,
      - type: text
        text: Semper in psalmis meditémur, atque
      - type: text
        text: Voce concórdi Dómino canámus
      - type: text
        text: Dúlciter hymnos.
      - type: text
        text: Ut pio Regi páriter canéntes,
      - type: text
        text: Cum suis Sanctis mereámur aulam
      - type: text
        text: Íngredi cæli, simul et perénnem
      - type: text
        text: Dúcere vitam.
      - type: text
        text: Præstet hoc nobis Déitas beáta
      - type: text
        text: Patris, ac Nati, paritérque Sancti
      - type: text
        text: Spíritus, cuius résonat per omnem
      - type: text
        text: Glória mundum.
      - type: text
        text: Amen.
  hymn.nocte-surg-ntes-vigil-mus-omnes-c0b362635e:
    role: hymn
    content:
      la:
      - type: text
        text: Nocte surgéntes vigilémus omnes,
      - type: text
        text: Semper in psalmis meditémur, atque
      - type: text
        text: Víribus totis Dómino canámus
      - type: text
        text: Dúlciter hymnos.
      - type: text
        text: Ut pio Regi páriter canéntes,
      - type: text
        text: Cum suis Sanctis mereámur aulam
      - type: text
        text: Íngredi cæli, simul et beátam
      - type: text
        text: Dúcere vitam.
      - type: text
        text: Præstet hoc nobis Déitas beáta
      - type: text
        text: Patris, ac Nati, paritérque Sancti
      - type: text
        text: Spíritus, cuius réboat per omnem
      - type: text
        text: Glória mundum.
      - type: text
        text: Amen.
  hymn.nox-atra-rerum-c-ntegit-7829b41359:
    role: hymn
    content:
      en:
      - type: text
        text: The dusky veil of night hath laid
      - type: text
        text: The varied hues of earth in shade;
      - type: text
        text: Before Thee, righteous Judge of all,
      - type: text
        text: We contrite in confession fall.
      - type: text
        text: Take far away our load of sin,
      - type: text
        text: 'Our soiled minds make clean within:'
      - type: text
        text: Thy sov’reign grace, O Christ, impart,
      - type: text
        text: From all offence to guard our heart.
      - type: text
        text: For lo! our mind is dull and cold,
      - type: text
        text: 'Envenomed by sin’s baneful hold:'
      - type: text
        text: Fain would it now the darkness flee,
      - type: text
        text: And seek, Redeemer, unto Thee.
      - type: text
        text: Far from it drive the shades of night,
      - type: text
        text: Its inmost darkness put to flight;
      - type: text
        text: Till in the daylight of the blest
      - type: text
        text: It joys to find itself at rest.
      - type: text
        text: Almighty Father, hear our cry,
      - type: text
        text: Through Jesus Christ, our Lord most High,
      - type: text
        text: Who, with the Holy Ghost and Thee,
      - type: text
        text: Doth live and reign eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Nox atra rerum cóntegit
      - type: text
        text: 'Terræ colóres ómnium:'
      - type: text
        text: Nos confiténtes póscimus
      - type: text
        text: Te, iuste iudex córdium.
      - type: text
        text: Ut áuferas piácula,
      - type: text
        text: 'Sordésque mentis ábluas:'
      - type: text
        text: Donésque, Christe, grátiam,
      - type: text
        text: Ut arceántur crímina.
      - type: text
        text: Mens ecce torpet ímpia,
      - type: text
        text: 'Quam culpa mordet nóxia:'
      - type: text
        text: Obscúra gestit tóllere,
      - type: text
        text: Et te, Redémptor, quǽrere.
      - type: text
        text: Repélle tu calíginem
      - type: text
        text: Intrínsecus quam máxime,
      - type: text
        text: Ut in beáto gáudeat
      - type: text
        text: Se collocári lúmine.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.nox-atra-rerum-c-ntegit-e03f9940f3:
    role: hymn
    content:
      la:
      - type: text
        text: Nox atra rerum cóntegit
      - type: text
        text: 'Terræ colóres ómnium:'
      - type: text
        text: Nos confiténtes póscimus
      - type: text
        text: Te, iuste iudex córdium.
      - type: text
        text: Ut áuferas piácula,
      - type: text
        text: 'Sordésque mentis ábluas:'
      - type: text
        text: Donésque, Christe, grátiam,
      - type: text
        text: Ut arceántur crímina.
      - type: text
        text: Mens ecce torpet ímpia,
      - type: text
        text: 'Quam culpa mordet nóxia:'
      - type: text
        text: Obscúra gestit tóllere,
      - type: text
        text: Et te, Redémptor, quǽrere.
      - type: text
        text: Repélle tu calíginem
      - type: text
        text: Intrínsecus quam máxime,
      - type: text
        text: Ut in beáto gáudeat
      - type: text
        text: Se collocári lúmine.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.nox-et-ten-br-et-n-bila-5759ea5134:
    role: hymn
    content:
      la:
      - type: text
        text: Nox, et tenébr[æ], et núbila,
      - type: text
        text: 'Confúsa mund[i] et túrbida:'
      - type: text
        text: 'Lux intrat, albéscit polus:'
      - type: text
        text: 'Christus venit: discédite.'
      - type: text
        text: Calígo terræ scínditur
      - type: text
        text: Percússa solis spículo,
      - type: text
        text: Rebúsque iam color redit,
      - type: text
        text: Vultu niténtis síderis.
      - type: text
        text: 'Te, Christe, solum nóvimus:'
      - type: text
        text: Te mente pur[a] et simplici,
      - type: text
        text: Flend[o] et canéndo quǽsumus,
      - type: text
        text: Inténde nostris sénsibus.
      - type: text
        text: Sunt multa fucis íllita,
      - type: text
        text: 'Quæ luce purgéntur tua:'
      - type: text
        text: Tu, lux Eói síderis,
      - type: text
        text: Vultu serén[o] illúmina.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc, et in perpétuum.
      - type: text
        text: Amen.
  hymn.nox-et-ten-br-et-n-bila-6955abb215:
    role: hymn
    content:
      en:
      - type: text
        text: 'Day is breaking, dawn is bright:'
      - type: text
        text: Hence, vain shadows of the night!
      - type: text
        text: Mists that dim our mortal sight,
      - type: text
        text: Christ is come! Depart!
      - type: text
        text: Darkness routed lifts her wings
      - type: text
        text: 'As the radiance upwards springs:'
      - type: text
        text: Through the world of wakened things
      - type: text
        text: Life and colour dart.
      - type: text
        text: 'Thee, O Christ, alone we know:'
      - type: text
        text: Singing even in our woe,
      - type: text
        text: 'With pure hearts to thee we go:'
      - type: text
        text: On our senses shine!
      - type: text
        text: In thy beams be purged away
      - type: text
        text: All that leads our thoughts astray!
      - type: text
        text: Through our spirits, King of day,
      - type: text
        text: Pour thy light divine!
      - type: text
        text: Unto God the Father, Son,
      - type: text
        text: Holy Spirit, Three in One,
      - type: text
        text: One in Three, be glory done,
      - type: text
        text: Now and evermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Nox, et tenébræ, et núbila,
      - type: text
        text: 'Confúsa mundi et túrbida:'
      - type: text
        text: 'Lux intrat, albéscit polus:'
      - type: text
        text: 'Christus venit: discédite.'
      - type: text
        text: Calígo terræ scínditur
      - type: text
        text: Percússa solis spículo,
      - type: text
        text: Rebúsque iam color redit,
      - type: text
        text: Vultu niténtis síderis.
      - type: text
        text: 'Te, Christe, solum nóvimus:'
      - type: text
        text: Te mente pura et simplici,
      - type: text
        text: Flendo et canéndo quǽsumus,
      - type: text
        text: Inténde nostris sénsibus.
      - type: text
        text: Sunt multa fucis íllita,
      - type: text
        text: 'Quæ luce purgéntur tua:'
      - type: text
        text: Tu, vera lux cæléstium,
      - type: text
        text: Vultu seréno illúmina.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.nunc-sancte-nobis-sp-ritus-8e3c4585e3:
    role: hymn
    content:
      en:
      - type: text
        text: Come Holy Ghost who ever One
      - type: text
        text: Art with the Father and the Son,
      - type: text
        text: It is the hour, our souls possess
      - type: text
        text: With thy full flood of holiness.
      - type: text
        text: Let flesh and heart and lips and mind
      - type: text
        text: Sound forth our witness to mankind;
      - type: text
        text: And love light up our mortal frame,
      - type: text
        text: Till others catch the living flame.
      - type: text
        text: '* Almighty Father, hear our cry,'
      - type: text
        text: Through Jesus Christ, our Lord most High,
      - type: text
        text: Who, with the Holy Ghost and thee,
      - type: text
        text: Doth live and reign eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Nunc, Sancte, nobis, Spíritus,
      - type: text
        text: Unum Patri cum Fílio,
      - type: text
        text: Dignáre promptus íngeri
      - type: text
        text: Nostro refúsus péctori.
      - type: text
        text: Os, lingua, mens, sensus, vigor
      - type: text
        text: Confessiónem pérsonent.
      - type: text
        text: Flamméscat igne cáritas,
      - type: text
        text: Accéndat ardor próximos.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.o-lux-be-ta-tr-nitas-f46b204900:
    role: hymn
    content:
      en:
      - type: text
        text: As fades the glowing orb of day,
      - type: text
        text: To thee, great source of light, we pray;
      - type: text
        text: Blest Three in One, to every heart
      - type: text
        text: Thy beams of life and love impart.
      - type: text
        text: At early dawn, at close of day,
      - type: text
        text: To thee our vows we humbly pay;
      - type: text
        text: May we, mid joys that never end,
      - type: text
        text: With thy bright saints in homage bend.
      - type: text
        text: To God the Father, and the Son,
      - type: text
        text: And Holy Spirit, Three in One,
      - type: text
        text: Be endless glory, as before
      - type: text
        text: The world began, so evermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: O lux beáta Trínitas,
      - type: text
        text: Et principális Únitas,
      - type: text
        text: Iam sol recédit ígneus,
      - type: text
        text: Infúnde lumen córdibus.
      - type: text
        text: Te mane laudum cármine,
      - type: text
        text: 'Te deprecémur véspere:'
      - type: text
        text: Te nostra supplex glória
      - type: text
        text: Per cuncta laudet sǽcula.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc, et in perpétuum.
      - type: text
        text: Amen.
  hymn.o-sol-sal-tis-ntimis-4e64d9647d:
    role: hymn
    content:
      en:
      - type: text
        text: Jesu, salvation’s Sun Divine,
      - type: text
        text: Within our inmost bosoms shine,
      - type: text
        text: With light all darkness drive away
      - type: text
        text: And give the world a better day.
      - type: text
        text: Now days of grace with mercy flow,
      - type: text
        text: O Lord, the gift of tears bestow,
      - type: text
        text: To wash our stains in every part,
      - type: text
        text: Whilst heavenly fire consumes the heart.
      - type: text
        text: Rise, crystal tears, from that same source
      - type: text
        text: From whence our sins derive their course;
      - type: text
        text: Nor cease, till hardened hearts relent,
      - type: text
        text: And softened by your streams, repent.
      - type: text
        text: Behold, the happy days return,
      - type: text
        text: The days of joy for them that mourn;
      - type: text
        text: May we of their indulgence share,
      - type: text
        text: And bless the God that grants our prayer.
      - type: text
        text: May heaven and earth aloud proclaim
      - type: text
        text: The Trinity’s almighty fame;
      - type: text
        text: And we, restored to grace, rejoice
      - type: text
        text: In newness both of heart and voice.
      - type: text
        text: Amen.
      la:
      - type: text
        text: O sol salútis, íntimis,
      - type: text
        text: Iesu, refúlge méntibus,
      - type: text
        text: Dum, nocte pulsa, grátior
      - type: text
        text: Orbi dies renáscitur.
      - type: text
        text: Dans tempus acceptábile,
      - type: text
        text: Da lacrimárum rívulis
      - type: text
        text: Laváre cordis víctimam,
      - type: text
        text: Quam læta adúrat cáritas.
      - type: text
        text: Quo fonte manávit nefas,
      - type: text
        text: Fluent perénnes lácrimæ,
      - type: text
        text: Si virga pœniténtiæ
      - type: text
        text: Cordis rigórem cónterat.
      - type: text
        text: Dies venit, dies tua,
      - type: text
        text: 'In qua reflórent ómnia:'
      - type: text
        text: Lætémur et nos in viam
      - type: text
        text: Tua redúcti déxtera.
      - type: text
        text: Te prona mundi máchina,
      - type: text
        text: Clemens, adóret, Trínitas,
      - type: text
        text: Et nos novi per grátiam
      - type: text
        text: Novum canámus cánticum.
      - type: text
        text: Amen.
  hymn.pange-lingua-glori-si-13dcaa9a6e:
    role: hymn
    content:
      en:
      - type: text
        text: Sing, my tongue, the glorious battle
      - type: text
        text: Sing the last, the dread affray;
      - type: text
        text: O'er the cross, the victor's trophy,
      - type: text
        text: 'Sound the high triumphal lay:'
      - type: text
        text: Tell how Christ, the world's Redeemer,
      - type: text
        text: As a victim won the day.
      - type: text
        text: God, his Maker, sorely grieving
      - type: text
        text: That the first-made Adam fell,
      - type: text
        text: When he ate the fruit of sorrow,
      - type: text
        text: Whose reward was death and hell,
      - type: text
        text: Noted then this wood, the ruin
      - type: text
        text: Of the ancient wood to quell.
      - type: text
        text: For the work of our salvation
      - type: text
        text: Needs would have his order so,
      - type: text
        text: And the multiform deceiver's
      - type: text
        text: Art by art would overthrow,
      - type: text
        text: And from thence would bring the med'cine
      - type: text
        text: Whence the insult of the foe.
      - type: text
        text: Wherefore, when the sacred fullness
      - type: text
        text: Of the appointed time was come,
      - type: text
        text: This world's Maker left his Father,
      - type: text
        text: Sent the heav'nly mansion from,
      - type: text
        text: And proceeded, God Incarnate,
      - type: text
        text: Of the Virgin's holy womb.
      - type: text
        text: Weeps the infant in the manger
      - type: text
        text: That in Bethlehem's stable stands;
      - type: text
        text: And his limbs the Virgin Mother
      - type: text
        text: Doth compose in swaddling bands,
      - type: text
        text: Meetly thus in linen folding
      - type: text
        text: Of her God the feet and hands.
      - type: text
        text: To the Trinity be glory
      - type: text
        text: Everlasting, as is meet;
      - type: text
        text: Equal to the Father, equal
      - type: text
        text: 'To the Son, and Paraclete:'
      - type: text
        text: Trinal Unity, whose praises
      - type: text
        text: All created things repeat.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Pange, lingua, gloriósi
      - type: text
        text: Láuream certáminis,
      - type: text
        text: Et super Crucis trophǽo
      - type: text
        text: Dic triúmphum nóbilem,
      - type: text
        text: Quáliter Redémptor orbis
      - type: text
        text: Immolátus vícerit.
      - type: text
        text: De paréntis protoplásti
      - type: text
        text: Fraude Factor cóndolens,
      - type: text
        text: Quando pomi noxiális
      - type: text
        text: In necem morsu ruit,
      - type: text
        text: Ipse lignum tunc notávit,
      - type: text
        text: Damna ligni ut sólveret.
      - type: text
        text: Hoc opus nostræ salútis
      - type: text
        text: Ordo depopóscerat,
      - type: text
        text: Multifórmis proditóris
      - type: text
        text: Ars ut artem fálleret,
      - type: text
        text: Et medélam ferret inde,
      - type: text
        text: Hostis unde lǽserat.
      - type: text
        text: Quando venit ergo sacri
      - type: text
        text: Plenitúdo témporis,
      - type: text
        text: Missus est ab arce Patris
      - type: text
        text: Natus, orbis Cónditor,
      - type: text
        text: Atque ventre virgináli
      - type: text
        text: Carne amíctus pródiit.
      - type: text
        text: Vagit infans inter arcta
      - type: text
        text: 'Cónditus præsépia:'
      - type: text
        text: Membra pannis involúta
      - type: text
        text: 'Virgo Mater álligat:'
      - type: text
        text: Et Dei manus pedésque
      - type: text
        text: Stricta cingit fáscia.
      - type: text
        text: Sempitérna sit beátæ
      - type: text
        text: Trinitáti glória,
      - type: text
        text: Æqua Patri, Filióque;
      - type: text
        text: 'Par decus Paráclito:'
      - type: text
        text: Uníus Triníque nomen
      - type: text
        text: Laudet univérsitas.
      - type: text
        text: Amen.
  hymn.pange-lingua-glori-si-3d5b131d36:
    role: hymn
    content:
      en:
      - type: text
        text: Sing, my tongue, the glorious battle
      - type: text
        text: Sing the last, the dread affray;
      - type: text
        text: O'er the cross, the victor's trophy,
      - type: text
        text: 'Sound the high triumphal lay:'
      - type: text
        text: Tell how Christ, the world's Redeemer,
      - type: text
        text: As a victim won the day.
      - type: text
        text: God, his Maker, sorely grieving
      - type: text
        text: That the first-made Adam fell,
      - type: text
        text: When he ate the fruit of sorrow,
      - type: text
        text: Whose reward was death and hell,
      - type: text
        text: Noted then this wood, the ruin
      - type: text
        text: Of the ancient wood to quell.
      - type: text
        text: For the work of our salvation
      - type: text
        text: Needs would have his order so,
      - type: text
        text: And the multiform deceiver's
      - type: text
        text: Art by art would overthrow,
      - type: text
        text: And from thence would bring the med'cine
      - type: text
        text: Whence the insult of the foe.
      - type: text
        text: Wherefore, when the sacred fullness
      - type: text
        text: Of the appointed time was come,
      - type: text
        text: This world's Maker left his Father,
      - type: text
        text: Sent the heav'nly mansion from,
      - type: text
        text: And proceeded, God Incarnate,
      - type: text
        text: Of the Virgin's holy womb.
      - type: text
        text: Weeps the infant in the manger
      - type: text
        text: That in Bethlehem's stable stands;
      - type: text
        text: And his limbs the Virgin Mother
      - type: text
        text: Doth compose in swaddling bands,
      - type: text
        text: Meetly thus in linen folding
      - type: text
        text: Of her God the feet and hands.
      - type: text
        text: To the Trinity be glory
      - type: text
        text: Everlasting, as is meet;
      - type: text
        text: Equal to the Father, equal
      - type: text
        text: 'To the Son, and Paraclete:'
      - type: text
        text: Trinal Unity, whose praises
      - type: text
        text: All created things repeat.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Pange, lingua, gloriósi
      - type: text
        text: Prœlium certáminis,
      - type: text
        text: Et super Crucis trophǽo
      - type: text
        text: Dic triúmphum nóbilem,
      - type: text
        text: Quáliter Redémptor orbis
      - type: text
        text: Immolátus vícerit.
      - type: text
        text: De paréntis protoplásti
      - type: text
        text: Fraude Factor cóndolens,
      - type: text
        text: Quando pomi noxiális
      - type: text
        text: Morsu in mortem córruit,
      - type: text
        text: Ipse lignum tunc notávit,
      - type: text
        text: Damna ligni ut sólveret.
      - type: text
        text: Hoc opus nostræ salútis
      - type: text
        text: Ordo depopóscerat,
      - type: text
        text: Multifórmis proditóris
      - type: text
        text: Ars ut artem fálleret,
      - type: text
        text: Et medélam ferret inde,
      - type: text
        text: Hostis unde lǽserat.
      - type: text
        text: Quando venit ergo sacri
      - type: text
        text: Plenitúdo témporis,
      - type: text
        text: Missus est ab arce Patris
      - type: text
        text: Natus, orbis Cónditor,
      - type: text
        text: Atque ventre virgináli
      - type: text
        text: Carne amíctus pródiit.
      - type: text
        text: Vagit infans inter arcta
      - type: text
        text: 'Cónditus præsépia:'
      - type: text
        text: Membra pannis involúta
      - type: text
        text: 'Virgo Mater álligat:'
      - type: text
        text: Et manus, pedésque, et crura
      - type: text
        text: Stricta cingit fáscia.
      - type: text
        text: Glória, et honor Deo
      - type: text
        text: Usqueqáque Altíssimo,
      - type: text
        text: Una Patri, Filióque;
      - type: text
        text: 'Inclyto Paráclito:'
      - type: text
        text: Cui laus est et potéstas,
      - type: text
        text: Per ætérna sǽcula.
      - type: text
        text: Amen.
  hymn.plasm-tor-h-minis-deus-5e0a99fcaf:
    role: hymn
    content:
      la:
      - type: text
        text: Plasmátor hóminis Deus,
      - type: text
        text: Qui cuncta solus órdinans,
      - type: text
        text: Humum iubes prodúcere
      - type: text
        text: 'Reptántis et feræ genus:'
      - type: text
        text: Qui magna rerum córpora,
      - type: text
        text: Dictu iubéntis vívida,
      - type: text
        text: Ut sérviant per órdinem,
      - type: text
        text: 'Subdens dedísti hómini:'
      - type: text
        text: Repélle, a servis tuis,
      - type: text
        text: Quidquid per immundítiam,
      - type: text
        text: Aut móribus se súggerit,
      - type: text
        text: Aut áctibus se intérserit.
      - type: text
        text: Da gaudiórum prǽmia,
      - type: text
        text: 'Da gratiárum múnera:'
      - type: text
        text: 'Dissólve litis víncula:'
      - type: text
        text: Astrínge pacis fœ́dera.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.prima-stropha-hymni-sequentis-dicitur-flexibus-g-2c62e8e6c8:
    role: hymn
    content:
      la:
      - type: rubric
        text: Prima stropha hymni sequentis dicitur flexibus genibus.
      - type: text
        text: Veni Creátor Spíritus,
      - type: text
        text: Mentes tuórum vísita,
      - type: text
        text: Imple supérna grátia,
      - type: text
        text: Quæ tu creásti péctora.
      - type: text
        text: Qui Paráclitus díceris,
      - type: text
        text: Donum Dei altíssimi,
      - type: text
        text: Fons vivus, ignis, cáritas,
      - type: text
        text: Et spiritális únctio.
      - type: text
        text: Tu septifórmis múnere,
      - type: text
        text: Dextræ Dei tu dígitus,
      - type: text
        text: Tu rite promíssum Patris,
      - type: text
        text: Sermóne ditans gúttura.
      - type: text
        text: 'Accénde lumen sénsibus:'
      - type: text
        text: 'Infúnde amórem córdibus:'
      - type: text
        text: Infírma nostri córporis
      - type: text
        text: Virtúte firmans pérpeti.
      - type: text
        text: Hostem repéllas lóngius,
      - type: text
        text: 'Pacémque dones prótinus:'
      - type: text
        text: Ductóre sic te prǽvio
      - type: text
        text: Vitémus omne nóxium.
      - type: text
        text: Per te sciámus da Patrem,
      - type: text
        text: Noscámus atque Fílium,
      - type: text
        text: Te utriúsque Spíritum
      - type: text
        text: Credámus omni témpore.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Et Fílio, qui a mórtuis
      - type: text
        text: Surréxit, ac Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.prima-stropha-hymni-sequentis-dicitur-flexibus-g-566651a48a:
    role: hymn
    content:
      en:
      - type: rubric
        text: The first verse of the following hymn is said genuflecting.
      - type: text
        text: Creator Spirit, all Divine,
      - type: text
        text: Come, visit every soul of Thine,
      - type: text
        text: And fill with Thy celestial flame
      - type: text
        text: The hearts which Thou Thyself didst frame.
      - type: text
        text: O gift of God, Thine is the sweet
      - type: text
        text: Consoling name of Paraclete
      - type: text
        text: And spring of life and fire and love
      - type: text
        text: And unction flowing from above.
      - type: text
        text: The mystic sevenfold gifts are Thine,
      - type: text
        text: Finger of God's right hand divine;
      - type: text
        text: The Father's promise sent to teach
      - type: text
        text: The tongue a rich and heavenly speech.
      - type: text
        text: Kindle with fire brought from above
      - type: text
        text: Each sense, and fill our hearts with love;
      - type: text
        text: And grant our flesh, so weak and frail,
      - type: text
        text: The strength of Thine which cannot fail.
      - type: text
        text: Drive far away our deadly foe,
      - type: text
        text: And grant us Thy true peace to know;
      - type: text
        text: So we, led by Thy guidance still,
      - type: text
        text: May safely pass through every ill.
      - type: text
        text: To us, through Thee, the grace be shown
      - type: text
        text: To know the Father and the Son;
      - type: text
        text: And Spirit of Them both, may we
      - type: text
        text: Forever rest our faith in Thee.
      - type: text
        text: To Sire and Son be praises meet,
      - type: text
        text: And to the Holy Paraclete;
      - type: text
        text: And may Christ send us from above
      - type: text
        text: That Holy Spirit's gift of love.
      - type: text
        text: Amen
      la:
      - type: rubric
        text: Prima stropha hymni sequentis dicitur flexibus genibus.
      - type: text
        text: Veni Creátor Spíritus,
      - type: text
        text: Mentes tuórum vísita,
      - type: text
        text: Imple supérna grátia,
      - type: text
        text: Quæ tu creásti péctora.
      - type: text
        text: Qui díceris Paráclitus,
      - type: text
        text: Altíssimi donum Dei,
      - type: text
        text: Fons vivus, ignis, cáritas,
      - type: text
        text: Et spiritális únctio.
      - type: text
        text: Tu septifórmis múnere,
      - type: text
        text: Dígitus patérnæ déxteræ,
      - type: text
        text: Tu rite promíssum Patris,
      - type: text
        text: Sermóne ditans gúttura.
      - type: text
        text: 'Accénde lumen sénsibus:'
      - type: text
        text: 'Infúnde amórem córdibus:'
      - type: text
        text: Infírma nostri córporis
      - type: text
        text: Virtúte firmans pérpeti.
      - type: text
        text: Hostem repéllas lóngius,
      - type: text
        text: 'Pacémque dones prótinus:'
      - type: text
        text: Ductóre sic te prǽvio
      - type: text
        text: Vitémus omne nóxium.
      - type: text
        text: Per te sciámus da Patrem,
      - type: text
        text: Noscámus atque Fílium,
      - type: text
        text: Teque utriúsque Spíritum
      - type: text
        text: Credámus omni témpore.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Et Fílio, qui a mórtuis
      - type: text
        text: Surréxit, ac Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.primo-di-rum-mnium-90402d3210:
    role: hymn
    content:
      en:
      - type: text
        text: Hail day! whereon the One in Three
      - type: text
        text: First formed the earth by sure decree,
      - type: text
        text: The day its Maker rose again,
      - type: text
        text: And vanquished death, and burst our chain.
      - type: text
        text: Away with sleep and slothful ease
      - type: text
        text: We raise our hearts and bend our knees,
      - type: text
        text: And early seek the Lord of all,
      - type: text
        text: Obedient to the Prophet's call.
      - type: text
        text: That He may hearken to our prayer,
      - type: text
        text: Stretch forth His strong right arm to spare,
      - type: text
        text: And ev'ry past offense forgiven,
      - type: text
        text: Restore us to our home in heaven.
      - type: text
        text: Assembled here this holy day,
      - type: text
        text: This holiest hour we raise the lay,
      - type: text
        text: And O that He to whom we sing,
      - type: text
        text: May now reward our offering!
      - type: text
        text: O Father of unclouded light!
      - type: text
        text: Keep us this day as in thy sight,
      - type: text
        text: In word and deed that we may be
      - type: text
        text: From ev'ry touch of evil free.
      - type: text
        text: That this our body's mortal frame
      - type: text
        text: May know no sin, and fear no shame,
      - type: text
        text: Nor fire hereafter be the end
      - type: text
        text: Of passions which our bosom rend.
      - type: text
        text: Redeemer of the world, we pray
      - type: text
        text: That thou wouldst wash our sins away,
      - type: text
        text: And give us, of Thy boundless grace,
      - type: text
        text: The blessings of the heavenly place.
      - type: text
        text: Most Holy Father, hear our cry,
      - type: text
        text: Through Jesus Christ our Lord most High
      - type: text
        text: Who, with the Holy Ghost and thee
      - type: text
        text: Shall live and reign eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Primo diérum ómnium,
      - type: text
        text: Quo mundus extat cónditus,
      - type: text
        text: Vel quo resúrgens Cónditor
      - type: text
        text: Nos morte victa líberat.
      - type: text
        text: Pulsis procul torpóribus
      - type: text
        text: Surgámus omnes ócius,
      - type: text
        text: Et nocte quærámus pium
      - type: text
        text: Sicut prophétam nóvimus.
      - type: text
        text: Nostras preces ut áudiat,
      - type: text
        text: 'Suámque dextram pórrigat:'
      - type: text
        text: Et expiátos sórdibus
      - type: text
        text: Reddat polórum sédibus.
      - type: text
        text: Ut quique sacratíssimo
      - type: text
        text: Huius diéi témpore
      - type: text
        text: Horis quiétis psállimus,
      - type: text
        text: Donis beátis múneret.
      - type: text
        text: Iam nunc patérna cláritas
      - type: text
        text: 'Te postulámus áffatim:'
      - type: text
        text: Absit libído sórdidans
      - type: text
        text: Et omnis actus nóxius.
      - type: text
        text: Ne fœda sit, vel lúbrica
      - type: text
        text: Compágo nostri córporis,
      - type: text
        text: Per quem Avérni ígnibus
      - type: text
        text: Ipsi cremémur ácrius.
      - type: text
        text: Ob hoc Redémptor, quǽsumus,
      - type: text
        text: Ut probra nostra díluas,
      - type: text
        text: Vitæ perénnis cómmoda
      - type: text
        text: Nobis benígne cónferas.
      - type: text
        text: Quo carnis actu éxsules
      - type: text
        text: Effécti ipsi cælibes,
      - type: text
        text: Ut præstolámur cérnui,
      - type: text
        text: Melos canámus glóriæ.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
