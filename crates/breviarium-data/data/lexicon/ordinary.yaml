    content:
      la:
      - type: text
        text: Kýrie, eléison. Christe, eléison. Kýrie, eléison.
      - type: rubric
        text: Pater secreto
      - type: text
        text: 'Pater noster, qui es in cælis, sanctificétur nomen tuum: advéniat regnum tuum: fiat volúntas tua, sicut in cælo et in terra. Panem nostrum cotidiánum da nobis hódie: et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris:'
      - type: versicle
        text: 'Et ne nos indúcas in tentatiónem:'
      - type: response
        text: Sed líbera nos a malo.
      - type: rubric
        text: Credo secreto
      - type: text
        text: 'Credo in Deum, Patrem omnipoténtem, Creatórem cæli et terræ. Et in Iesum Christum, Fílium eius únicum, Dóminum nostrum: qui concéptus est de Spíritu Sancto, natus ex María Vírgine, passus sub Póntio Piláto, crucifíxus, mórtuus, et sepúltus: descéndit ad ínferos; tértia die resurréxit a mórtuis; ascéndit ad cælos; sedet ad déxteram Dei Patris omnipoténtis: inde ventúrus est iudicáre vivos et mórtuos. Credo in Spíritum Sanctum, sanctam Ecclésiam cathólicam, Sanctórum communiónem, remissiónem peccatórum.'
      - type: versicle
        text: Carnis resurrectiónem.
      - type: response
        text: Vitam ætérnam. Amen.
      - type: rubric
        text: deinde dicitur
      - type: text
        text: Et ego ad te …
      - type: versicle
        text: Adiutórium nostrum + in nómine Dómini.
      - type: response
        text: Qui fecit cælum et terram.
      - type: text
        text: |-
          Confíteor Deo omnipoténti, beátæ Maríæ semper Vírgini, beáto Michaéli Archángelo, beáto Ioánni Baptístæ, sanctis Apóstolis Petro et Paulo, et ómnibus Sanctis, quia peccávi nimis, cogitatióne, verbo et ópere: (percutit sibi pectus) mea culpa, mea culpa, mea máxima culpa. Ídeo precor beátam Maríam semper Vírginem, beátum Michaélem Archángelum, beátum Ioánnem Baptístam, sanctos Apóstolos Petrum et Paulum, et omnes Sanctos, oráre pro me ad Dóminum Deum nostrum.
          Misereátur nostri omnípotens Deus, et dimíssis peccátis nostris, perdúcat nos ad vitam ætérnam. Amen.
          Indulgéntiam, + absolutiónem et remissiónem peccatórum nostrórum tríbuat nobis omnípotens et miséricors Dóminus. Amen.
          Dignáre, Dómine …
      - type: versicle
        text: Dómine, exáudi oratiónem meam.
      - type: response
        text: Et clamor meus ad te véniat.
      en2:
      - type: text
        text: Lord, have mercy. Christ, have mercy. Lord, have mercy.
      - type: rubric
        text: Our Father (quietly)
      - type: text
        text: 'Our Father, who art in heaven, hallowed be thy name: thy kingdom come: thy will be done, on earth as it is in heaven. Give us this day our daily bread: and forgive us our trespasses, as we also forgive those who trespass against us:'
      - type: versicle
        text: 'And lead us not into temptation:'
      - type: response
        text: But deliver us from evil.
      - type: rubric
        text: Creed (quietly)
      - type: text
        text: 'I believe in God, the Father almighty, Creator of heaven and earth. And in Jesus Christ, his only Son, our Lord: who was conceived by the Holy Spirit, born of the Virgin Mary, suffered under Pontius Pilate, was crucified, died, and was buried: he descended to the dead; on the third day he rose again from the dead; he ascended into heaven; he is seated at the right hand of God the Father almighty: from thence he will come to judge the living and the dead. I believe in the Holy Spirit, the holy Catholic Church, the communion of Saints, the forgiveness of sins.'
      - type: versicle
        text: The resurrection of the body.
      - type: response
        text: Life everlasting. Amen.
      - type: rubric
        text: then is said
      - type: text
        text: And I to you …
      - type: versicle
        text: Our help + is in the name of the Lord.
      - type: response
        text: Who made heaven and earth.
      - type: text
        text: |-
          I confess to almighty God, to blessed Mary ever-Virgin, to blessed Michael the Archangel, to blessed John the Baptist, to the holy Apostles Peter and Paul, and to all the Saints, that I have sinned exceedingly in thought, word, and deed: (he strikes his breast) through my fault, through my fault, through my most grievous fault. Therefore I beseech blessed Mary ever-Virgin, blessed Michael the Archangel, blessed John the Baptist, the holy Apostles Peter and Paul, and all the Saints, to pray for me to the Lord our God.
          May almighty God have mercy on us, and having forgiven our sins, bring us to eternal life. Amen.
          May the almighty and merciful Lord grant us indulgence, + absolution, and the remission of our sins. Amen.
          Be pleased, O Lord…
      - type: versicle
        text: O Lord, hear my prayer.
      - type: response
        text: And let my cry come before you.
