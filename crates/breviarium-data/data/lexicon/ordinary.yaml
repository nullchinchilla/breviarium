          Amen.
  hymn.nocte-surg-ntes-vigil-mus-omnes-c0b362635e:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Nocte surgéntes vigilémus omnes,
          Semper in psalmis meditémur, atque
          Víribus totis Dómino canámus
          Dúlciter hymnos.

          Ut pio Regi páriter canéntes,
          Cum suis Sanctis mereámur aulam
          Íngredi cæli, simul et beátam
          Dúcere vitam.

          Præstet hoc nobis Déitas beáta
          Patris, ac Nati, paritérque Sancti
          Spíritus, cuius réboat per omnem
          Glória mundum.
          Amen.
      en2:
      - type: text
        text: |-
          Rising by night, let us all keep watch,
          Let us meditate always in the psalms,
          And with all our strength let us sweetly
          Sing hymns to the Lord.
      
          That singing together to the pious King,
          We may merit with his Saints
          To enter the hall of heaven
          And lead a blessed life.
      
          May the blessed Deity of the Father,
          The Son, and likewise the Holy Spirit,
          Whose glory re-echoes throughout all the world,
          Grant us this.
          Amen.
  hymn.nox-atra-rerum-c-ntegit-0e5c87516b:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Nox atra rerum cóntegit
          Terræ colóres ómnium:
          Nos confiténtes póscimus
          Te, iuste iudex córdium.

          Ut áuferas piácula,
          Sordésque mentis ábluas:
          Donésque, Christe, grátiam,
          Ut arceántur crímina.

          Mens ecce torpet ímpia,
          Quam culpa mordet nóxia:
          Obscúra gestit tóllere,
          Et te, Redémptor, quǽrere.

          Repélle tu calíginem
          Intrínsecus quam máxime,
          Ut in beáto gáudeat
          Se collocári lúmine.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          The dark night covers all
          The colors of the earth:
          We who make confession pray to you,
          O just Judge of hearts.
      
          That you may take away our offenses
          And wash away the stains of our minds:
          And, O Christ, grant grace
          That sins may be kept far off.
      
          Behold, the wicked mind grows torpid,
          Bitten by harmful fault:
          It longs to remove the dark things
          And to seek you, O Redeemer.
      
          Drive away the darkness
          As far as possible from within,
          That it may rejoice to be placed
          In the blessed light.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.nox-atra-rerum-c-ntegit-98f9809e03:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          The dusky veil of night hath laid
          The varied hues of earth in shade;
          Before Thee, righteous Judge of all,
          We contrite in confession fall.

          Take far away our load of sin,
          Our soiled minds make clean within:
          Thy sov’reign grace, O Christ, impart,
          From all offence to guard our heart.

          For lo! our mind is dull and cold,
          Envenomed by sin’s baneful hold:
          Fain would it now the darkness flee,
          And seek, Redeemer, unto Thee.

          Far from it drive the shades of night,
          Its inmost darkness put to flight;
          Till in the daylight of the blest
          It joys to find itself at rest.

          Almighty Father, hear our cry,
          Through Jesus Christ, our Lord most High,
          Who, with the Holy Ghost and Thee,
          Doth live and reign eternally.
          Amen.
      la:
      - type: text
        text: |-
