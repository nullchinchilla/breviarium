        text: Jer 23:5
      - type: text
        text: 'Behold the days come, saith the Lord, and I will raise up to David a just branch: and a king shall reign, and shall be wise, and shall execute judgement and justice in the earth.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 23:5
      - type: text
        text: 'Ecce dies véniunt, dicit Dóminus, et suscitábo David germen iustum: et regnábit rex, et sápiens erit: et fáciet iudícium et iustítiam in terra.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 23:5
      - type: text
        text: Behold, the days are approaching, says the Lord, when I will raise up to David a righteous branch. And a king will reign, and he will be wise. And he will exercise judgment and justice upon the earth.
      - type: response
        text: Thanks be to God.
  chapter.ier-23-6-1347900421:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 23:6
      - type: text
        text: 'In those days shall Juda be saved, and Israel shall dwell confidently: and this is the name that they shall call him: the Lord our just one.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 23:6
      - type: text
        text: 'In diébus illis salvábitur Iuda, et Israël habitábit confidénter: et hoc est nomen, quod vocábunt eum, Dóminus iustus noster.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ier 23:6
      - type: text
        text: 'In those days, Judah will be saved, and Israel will live in confidence. And this is the name that they will call him: ''The Lord, our Just One.'''
      - type: response
        text: Thanks be to God.
  chapter.io-l-2-12-13-bb2c6604cd:
    role: chapter
    content:
      en:
      - type: citation
        text: Joel 2:12-13
      - type: text
        text: Be converted to me with all your heart, in fasting, and in weeping, and in mourning. And rend your hearts, and not your garments, said the almighty Lord.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ioël 2:12-13
      - type: text
        text: Convertímini ad me in toto corde vestro, in ieiúnio, et fletu, et planctu. Et scíndite corda vestra, et non vestiménta vestra, ait Dóminus omnípotens.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ioël 2:12-13
      - type: text
        text: 'Now, therefore, the Lord says: ''Be converted to me with your whole heart, in fasting and weeping and mourning.'' And rend your hearts, and not your garments, and convert to the Lord your God.'
      - type: response
        text: Thanks be to God.
  chapter.io-l-2-17-242ca86891:
    role: chapter
    content:
      en:
      - type: citation
        text: Joel 2:17
      - type: text
        text: 'Between the porch and the altar the priests the Lord''s ministers shall weep, and shall say: Spare, O Lord, spare thy people: and give not thy inheritance to reproach, that the heathen should rule over them.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ioël 2:17
      - type: text
        text: 'Inter vestíbulum et altáre plorábunt sacerdótes, minístri Dómini, et dicent: Parce, Dómine, parce pópulo tuo: et ne des hereditátem tuam in oppróbrium, ut dominéntur eis natiónes.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Ioël 2:17
      - type: text
        text: 'Between the vestibule and the altar, the priests, the ministers of the Lord, will weep, and they will say: ''Spare, O Lord, spare your people. And do not bequeath your inheritance into disgrace, so that the nations would rule over them.'''
      - type: response
        text: Thanks be to God.
  chapter.isa-14-1-5e88bb70fe:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 14:1
      - type: text
        text: Her time is near at hand, and her days shall not be prolonged. For the Lord will have mercy on Jacob, and will yet choose out of Israel.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 14:1
      - type: text
        text: 'Prope est ut véniat tempus eius, et dies eius non elongabúntur: miserébitur enim Dóminus Iacob, et Israël salvábitur.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Isa 14:1
      - type: text
        text: Her time is drawing near, and her days will not be prolonged. For the Lord will take pity on Jacob, and he will still choose from Israel.
      - type: response
        text: Thanks be to God.
  chapter.isa-2-3-31ef9b7b87:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 2:3
      - type: text
        text: 'Come and let us go up to the mountain of the Lord, and to the house of the God of Jacob, and he will teach us his ways, and we will walk in his paths: for the law shall come forth from Sion, and the word of the Lord from Jerusalem.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 2:3
      - type: text
        text: 'Veníte, et ascendámus ad montem Dómini, et ad domum Dei Iacob, et docébit nos vias suas, et ambulábimus in sémitis eius: quia de Sion exíbit lex, et verbum Dómini de Ierúsalem.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Isa 2:3
      - type: text
        text: 'And many peoples will go, and they will say: ''Let us approach and ascend to the mountain of the Lord, and to the house of the God of Jacob. And he will teach us his ways, and we will walk in his paths.'' For the law will go forth from Zion, and the Word of the Lord from Jerusalem.'
      - type: response
        text: Thanks be to God.
  chapter.isa-55-7-d10977f126:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 55:7
      - type: text
        text: 'Let the wicked forsake his way, and the unjust man his thoughts, and let him return to the Lord, and he will have mercy on him, and to our God: for he is bountiful to forgive.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 55:7
      - type: text
        text: Derelínquat ímpius viam suam, et vir iníquus cogitatiónes suas, et revertátur ad Dóminum, et miserébitur eius, et ad Deum nostrum, quóniam multus est ad ignoscéndum.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Isa 55:7
      - type: text
        text: Let the impious one abandon his way, and the iniquitous man his thoughts, and let him return to the Lord, and he will take pity on him, and to our God, for he is great in forgiveness.
      - type: response
        text: Thanks be to God.
  chapter.isa-58-1-92aba8eb7b:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 58:1
      - type: text
        text: Cry, cease not, lift up thy voice like a trumpet, and show my people their wicked doings, and the house of Jacob their sins.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 58:1
      - type: text
        text: Clama, ne cesses, quasi tuba exálta vocem tuam, et annúntia pópulo meo scélera eórum, et dómui Iacob peccáta eórum.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Isa 58:1
      - type: text
        text: Cry out! Cease not! Exalt your voice like a trumpet, and announce to my people their wicked acts, and to the house of Jacob their sins.
      - type: response
        text: Thanks be to God.
  chapter.isa-58-7-87857c78d3:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 58:7
      - type: text
        text: 'Deal thy bread to the hungry, and bring the needy and the harbourless into thy house: when thou shalt see one naked, cover him, and despise not thy own flesh.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 58:7
      - type: text
        text: 'Frange esuriénti panem tuum, et egénos vagósque induc in domum tuam: cum víderis nudum, óperi eum, et carnem tuam ne despéxeris.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Isa 58:7
      - type: text
        text: Break your bread with the hungry, and lead the destitute and the homeless into your house. When you see someone naked, cover him, and do not despise your own flesh.
      - type: response
        text: Thanks be to God.
  chapter.k-rie-el-ison-christe-el-ison-k-rie-el-ison-4e1418f5f6:
    role: chapter
    content:
      la:
      - type: text
        text: |-
          Kýrie, eléison. Christe, eléison. Kýrie, eléison.
          Pater noster, qui es in cælis, sanctificétur nomen tuum: advéniat regnum tuum: fiat volúntas tua, sicut in cælo et in terra. Panem nostrum cotidiánum da nobis hódie: et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris:
      - type: versicle
        text: 'Et ne nos indúcas in tentatiónem:'
      - type: response
        text: Sed líbera nos a malo.
      - type: text
        text: Ego dixi …
      - type: versicle
        text: Dómine, exáudi oratiónem meam.
      - type: response
        text: Et clamor meus ad te véniat.
      en2:
      - type: text
        text: |-
          Lord, have mercy. Christ, have mercy. Lord, have mercy.
          Our Father, who art in heaven, hallowed be thy name: thy kingdom come: thy will be done, on earth as it is in heaven. Give us this day our daily bread: and forgive us our trespasses, as we also forgive those who trespass against us:
      - type: versicle
        text: 'And lead us not into temptation:'
      - type: response
        text: But deliver us from evil.
      - type: text
        text: I said …
      - type: versicle
        text: O Lord, hear my prayer.
      - type: response
        text: And let my cry come before you.
  chapter.k-rie-el-ison-christe-el-ison-k-rie-el-ison-8cb2aa5a1d:
