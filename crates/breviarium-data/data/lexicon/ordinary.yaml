  hymn.iam-sol-rec-dit-gneus-bbb95e6226:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          As fades the glowing orb of day,
          To thee, great source of light, we pray;
          Blest Three in One, to every heart
          Thy beams of life and love impart.

          At early dawn, at close of day,
          To thee our vows we humbly pay;
          May we, mid joys that never end,
          With thy bright saints in homage bend.

          To God the Father, and the Son,
          And Holy Spirit, Three in One,
          Be endless glory, as before
          The world began, so evermore.
          Amen.
      la:
      - type: text
        text: |-
          Iam sol recédit ígneus:
          Tu, lux perénnis, Únitas,
          Nostris, beáta Trínitas,
          Infúnde lumen córdibus.

          Te mane laudum cármine,
          Te deprecámur véspere;
          Dignéris ut te súpplices
          Laudémus inter cǽlites.

          Patri, simúlque Fílio,
          Tibíque, Sancte Spíritus,
          Sicut fuit, sit iúgiter
          Sæclum per omne glória.
          Amen.
  hymn.iesu-nostra-red-mptio-6c15c746ce:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iesu nostra redémptio,
          Amor et desidérium,
          Deus Creátor ómnium,
          Homo in fine témporum:

          Quæ te vicit cleméntia,
          Ut ferres nostra crímina,
          Crudélem mortem pátiens,
          Ut nos a morte tólleres!

          Inférni claustra pénetrans,
          Tuos captívos rédimens,
          Victor triúmpho nóbili
          Ad dextram Patris résidens.

          Ipsa te cogat píetas,
          Ut mala nostra súperes
          Parcénd[o], et voti cómpotes
          Nos tuo vultu sáties.

          Tu esto nostrum gáudium,
          Qui es futúrus prǽmium,
          Sit nostra in te glória,
          Per cuncta semper sǽcula.
          Glória tibi Dómine,
          Qui scandis super sídera,
          Cum Patre, et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
  hymn.iesu-nostra-red-mptio-c16a905b3c:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iesu nostra redémptio,
