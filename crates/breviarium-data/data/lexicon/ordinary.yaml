  chapter.crucif-xus-surr-xit-a-m-rtuis-et-red-mit-nos-all-54cbb60eb7:
    role: chapter
    content:
      en:
      - type: antiphon
        text: He that was crucified is risen from the dead, and hath redeemed us. Alleluia, Alleluia.
      - type: text
        text: ''
      - type: versicle
        text: Say among the heathen, Alleluia
      - type: response
        text: That the Lord reigneth from the tree, Alleluia
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, who didst send thy Son to suffer death for us upon the Cross, that thou mightest deliver us from the power of the enemy grant unto us thy servants to be made partakers of his Resurrection.
      - type: prayer
        text: Through the same Jesus Christ, thy Son, Our Lord, Who liveth and reigneth with thee in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: antiphon
        text: Crucifíxus surréxit a mórtuis, et redémit nos, allelúia, allelúia.
