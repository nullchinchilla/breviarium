  rubric.flexis-genibus-4a53b1e58a:
    role: rubric
    content:
      en:
      - type: rubric
        text: kneel
      - type: antiphon
        text: v. O Lord, open thou my mouth that I may bless thy Holy Name. Cleanse my heart from all vain, evil, and wandering thoughts; enlighten my understanding kindle my affections, that I may pray to, and praise thee with attention and devotion; and may worthily be heard before the presence of thy Divine Majesty. Through Christ our Lord.
      - type: antiphon
        text: R. Amen.
      - type: antiphon
        text: v. Lord, in union with that Divine Intention wherewith thou didst thyself praise God, whilst thou wast on earth, I offer these Hours unto thee.
      la:
      - type: rubric
        text: flexis genibus
      - type: antiphon
        text: 'v. Aperi Dómine, os meum ad benedicéndum nomen sanctum tuum: munda quoque cor meum ab ómnibus vanis, pervérsis et aliénis cogitatiónibus; intelléctum illúmina, afféctum inflámma, ut digne, atténte ac devóte hoc Offícium recitáre váleam, et exaudíri mérear ante conspéctum divínæ Maiestátis tuæ. Per Christum Dóminum nostrum.'
      - type: antiphon
        text: R. Amen.
      - type: antiphon
        text: v. Dómine, in unióne illíus divínæ intentiónis, qua ipse in terris laudes Deo persolvísti, has tibi Horas (vel) hanc tibi Horam() persólvo.
      en2:
      - type: rubric
        text: kneeling
      - type: antiphon
        text: 'V. Open, O Lord, my mouth to bless your holy name: cleanse also my heart from all vain, perverse, and wandering thoughts; enlighten my understanding, inflame my affection, that I may be able to recite this Office worthily, attentively, and devoutly, and may merit to be heard before the face of your divine Majesty. Through Christ our Lord.'
      - type: antiphon
        text: R. Amen.
      - type: antiphon
        text: V. O Lord, in union with that divine intention with which you yourself on earth rendered praises to God, I render to you these Hours (or) this Hour.
