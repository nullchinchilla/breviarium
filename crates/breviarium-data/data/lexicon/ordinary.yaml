  hymn.aur-ra-iam-spargit-polum-babbb90f53:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Auróra iam spargit polum:
          Terris dies illábitur:
          Lucis resúltat spículum:
          Discédat omne lúbricum.

          Phantásma noctis décidat:
          Mentis reátus súbruat:
          Quidquid ténebris hórridum
          Nox áttulit culpæ, cadat.

          Ut mane, quod nos últimum
          Hic deprecámur cérnui,
          Cum luce nobis éffluat,
          Hoc dum canóre cóncrepat.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc, et in perpétuum.
          Amen.
      en2:
      - type: text
        text: |-
          Now the dawn scatters over the heavens:
          Day glides upon the earth:
          The ray of light flashes back:
          Let all that is slippery depart.
      
          Let the phantom of the night fall away;
          Let the guilt of the mind be overthrown;
          Whatever of fault the night
          Brought under the cover of darkness, let it fall.
      
          That the morning, which is the last
          We implore here on our knees,
          May flow forth for us with the light,
          While it rings out in this song.
      
          To God the Father be glory,
          And to his only Son,
          With the Spirit the Paraclete,
          Both now and for ever.
          Amen.
  hymn.aur-ra-lucis-r-tilat-748ba90804:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Auróra lucis rútilat,
          Cælum láudibus íntonat,
          Mundus exsúltans iúbilat,
          Gemens inférnus úlulat:

          Cum Rex ille fortíssimus,
          Mortis confráctis víribus,
          Pede concúlcans tártara,
          Solvit a pœna míseros.

          Ille qui clausus lápide
          Custodítur sub mílite,
          Triúmphans pompa nóbili,
          Victor surgit de fúnere.

          Solútis iam gemítibus,
          Et inférni dolóribus,
          Quia surréxit Dóminus,
          Respléndens clamat Ángelus.

          Quǽsumus, Auctor ómnium,
          In hoc pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexíst[i] a mórtuis,
          Cum Patr[e] et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          The dawn of light shines bright,
          The heavens resound with praises,
          The world exults in jubilation,
          The mourning underworld wails:
      
          For that most mighty King,
          With the powers of death now broken,
          Treading the lower regions underfoot,
          Frees the wretched from punishment.
      
          He who was shut in by a stone
          And kept under guard by soldiers,
          Rises victorious from the tomb
          With a glorious procession.
      
          Now that the groaning and the pains of hell
          Are loosed,
          Because the Lord has risen,
          The resplendent Angel proclaims.
      
          We pray, O Author of all things,
          In this Paschal joy,
          Defend your people
          From every assault of death.
      
          Glory to you, O Lord,
          Who rose from the dead,
          With the Father and the Holy Spirit,
          For ever and ever.
          Amen.
  hymn.c-li-deus-sanct-ssime-14d3c5429a:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Cæli Deus sanctíssime,
          Qui lúcidas centrum poli
          Candóre pingis ígneo,
          Augens decóro lúmine:

          Quarto die qui flámmeam
          Solis rotam constítuens,
          Lunæ minístras órdinem,
          Vagósque cursus síderum:

          Ut nóctibus, vel lúmini
          Diremptiónis términum,
          Primórdiis et ménsium
          Signum dares notíssimum;

          Illúmina cor hóminum,
          Abstérge sordes méntium:
          Resólve culpæ vínculum:
          Evérte moles críminum.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          O most holy God of heaven,
          Who paint the bright regions of the sky
          With fiery splendor,
          Enhancing them with beauteous light:
      
          You who on the fourth day
          Set the flaming wheel of the sun in place,
          Appointing the moon to serve in order,
          And the wandering courses of the stars:
      
          That to the nights and to the light
          You might give a fixed boundary of separation,
          And to the beginnings of the months
          A most manifest sign;
      
          Illuminate the hearts of men,
          Wipe away the stains of minds:
          Loose the bond of fault:
          Overthrow the weight of sins.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.c-li-deus-sanct-ssime-827bc9366f:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O God, whose hand hath spread the sky,
          And all its shining hosts on high,
          And painting it with fiery light,
          Made it so beauteous and so bright:

          Thou, when the fourth day was begun,
          Didst frame the circle of the sun,
          And set the moon for ordered change,
          And planets for their wider range:

          To night and day, by certain line,
          Their varying bounds thou didst assign;
          And gav’st a signal, known and meet,
          For months begun and months complete.

          Enlighten thou the hearts of men:
          Polluted souls make pure again:
          Unloose the bands of guilt within:
          Remove the burden of our sin.

          Grant this, O Father, ever One
          With Christ thy sole-begotten Son,
          Whom, with the Spirit we adore,
          One God, both now and evermore.
          Amen.
      la:
      - type: text
        text: |-
          Cæli Deus sanctíssime,
          Qui lúcidas mundi plagas
