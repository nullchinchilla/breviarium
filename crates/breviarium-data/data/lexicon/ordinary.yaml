  hymn.ales-di-i-n-ntius-6a7d6f0055:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Ales diéi núntius
          Lucem propínquam prǽcinit:
          Nos excitátor méntium
          Iam Christus ad vitam vocat.

          Auférte, clamat, léctulos,
          Ægro sopóre désides:
          Castíque, rect[i], ac sóbrii
          Vig[i]láte, iam sum próximus.

          Iesum ciámus vócibus,
          Flentes, precántes, sóbrii:
          Inténta supplicátio
          Dormíre cor mundum vetat.

          Tu, Christe, somnum díscute:
          Tu rumpe noctis víncula:
          Tu solve peccátum vetus,
          Novúmque lumen íngere.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc, et in perpétuum.
          Amen.
      en2:
      - type: text
        text: |-
          The herald of the day, the bird,
          Heralds the approaching light;
          Christ, the awakener of minds,
          Now calls us to life.
      
          "Put away your beds," he cries,
          "You who are sluggish with unhealthy sleep;
          Be chaste, upright, and sober,
          Keep watch—I am already near."
      
          Let us call upon Jesus with our voices,
          Weeping, praying, sober;
          Earnest supplication
          Forbids a pure heart to sleep.
      
          You, O Christ, dispel slumber;
          You break the bonds of night;
          You loosen ancient sin,
          And pour in new light.
      
          To God the Father be glory,
          And to his only Son,
          With the Spirit the Paraclete,
          Both now and for ever.
          Amen.
  hymn.ales-di-i-n-ntius-96c2815cc6:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          As the bird, whose clarion gay
          Sounds before the dawn is grey,
          Christ, who brings the spirit’s day,
          Calls us, close at hand:

          Wake! he cries, and for my sake,
          From your eyes dull slumbers shake!
          Sober, righteous, chaste, awake!
          At the door I stand!

          Lord, to thee we lift on high
          Fervent prayer and bitter cry:
          Hearts aroused to pray and sigh
          May not slumber more:

          Break the sleep of death and time,
          Forged by Adam’s ancient crime;
          And the light of Eden’s prime
          To the world restore!

          Unto God the Father, Son,
          Holy Spirit, Three in One,
          One in Three, be glory done,
          Now and evermore.
          Amen.
      la:
      - type: text
        text: |-
