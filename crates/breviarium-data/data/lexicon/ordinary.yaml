          Et nunc, et in perpétuum.
          Amen.
  hymn.aur-ra-lucis-r-tilat-748ba90804:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Auróra lucis rútilat,
          Cælum láudibus íntonat,
          Mundus exsúltans iúbilat,
          Gemens inférnus úlulat:

          Cum Rex ille fortíssimus,
          Mortis confráctis víribus,
          Pede concúlcans tártara,
          Solvit a pœna míseros.

          Ille qui clausus lápide
          Custodítur sub mílite,
          Triúmphans pompa nóbili,
          Victor surgit de fúnere.

          Solútis iam gemítibus,
          Et inférni dolóribus,
          Quia surréxit Dóminus,
          Respléndens clamat Ángelus.

          Quǽsumus, Auctor ómnium,
          In hoc pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexíst[i] a mórtuis,
          Cum Patr[e] et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
  hymn.c-li-deus-sanct-ssime-14d3c5429a:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Cæli Deus sanctíssime,
          Qui lúcidas centrum poli
          Candóre pingis ígneo,
          Augens decóro lúmine:

          Quarto die qui flámmeam
          Solis rotam constítuens,
          Lunæ minístras órdinem,
          Vagósque cursus síderum:

          Ut nóctibus, vel lúmini
          Diremptiónis términum,
          Primórdiis et ménsium
          Signum dares notíssimum;

          Illúmina cor hóminum,
          Abstérge sordes méntium:
          Resólve culpæ vínculum:
          Evérte moles críminum.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.c-li-deus-sanct-ssime-827bc9366f:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O God, whose hand hath spread the sky,
          And all its shining hosts on high,
          And painting it with fiery light,
          Made it so beauteous and so bright:

          Thou, when the fourth day was begun,
          Didst frame the circle of the sun,
          And set the moon for ordered change,
          And planets for their wider range:

          To night and day, by certain line,
          Their varying bounds thou didst assign;
          And gav’st a signal, known and meet,
          For months begun and months complete.

          Enlighten thou the hearts of men:
          Polluted souls make pure again:
          Unloose the bands of guilt within:
          Remove the burden of our sin.

          Grant this, O Father, ever One
          With Christ thy sole-begotten Son,
          Whom, with the Spirit we adore,
          One God, both now and evermore.
          Amen.
      la:
      - type: text
        text: |-
          Cæli Deus sanctíssime,
          Qui lúcidas mundi plagas
          Candóre pingis ígneo,
          Augens decóro lúmine:

          Quarto die qui flámmeam
          Dum solis accéndis rotam,
          Lunæ minístras órdinem,
          Vagósque cursus síderum:

          Ut nóctibus, vel lúmini
          Diremptiónis términum,
          Primórdiis et ménsium
          Signum dares notíssimum;

          Expélle noctem córdium:
          Abstérge sordes méntium:
          Resólve culpæ vínculum:
          Evérte moles críminum.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.c-nditor-alme-s-derum-3f07c4dff2:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Cónditor alme síderum,
          Ætérna lux credéntium,
          Christe, Redémptor ómnium,
          Exáudi preces súpplicum.

          Qui cóndolens intéritu
          Mortis períre sǽculum,
          Salvásti mundum lánguidum,
          Donans reis remédium,

          Vergénte mundi véspere,
          Uti sponsus de thálamo,
          Egréssus honestíssima
          Vírginis matris cláusula.

          Cuius forti poténtiæ
          Genu curvántur ómnia;
          Cæléstia, terréstria
          Nutu faténtur súbdita.

          Te deprecámur, hágie,
          Ventúre iudex sǽculi,
          Consérva nos in témpore
          Hostis a telo pérfidi.

          Laus, honor, virtus, glória,
          Deo Patri, et Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
  hymn.christe-qui-lux-es-et-dies-5b2a993361:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Christe, qui lux es et dies,
          Noctis tenébras détegis,
          Lucísque lumen créderis,
          Lumen beátum prǽdicans.

          Precámur sancte Dómine,
          defénde nos in hac nocte:
          Sit nobis in te réquies,
          Quiétam noctem tríbue.

          Ne gravis somnus írruat,
          Nec hostis nos subrípiat,
          Nec caro illi conséntiens
          Nos tibi reos státuat.

          Oculi somnum cápiant,
          Cor ad te semper vígilet:
          Déxtera tua prótegat
          Fámulos, qui te díligunt.

          Defénsor noster áspice,
          Insidiántes réprime,
          Gubérna tuos fámulos,
      - type: rubric
        text: Ad hunc Vers. genuflectatur
      - type: text
        text: |-
          Quos Sánguine mercátus es.

          Meménto nostri, Dómine,
          In gravi isto córpore:
          Qui es defénsor ánimæ,
          Adésto nobis, Dómine.

          Præsta Pater omnípotens,
          Per Iesum Christum Dóminum,
          Qui tecum in perpétuum
          Regnat cum Sancto Spíritu.
          Amen.
  hymn.consors-pat-rni-l-minis-45775bc8db:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Consors patérni lúminis,
          Lux ipse lucis, et dies,
          Noctem canéndo rúmpimus:
          Assíste postulántibus.

          Aufer ténebras méntium,
          Fuga catérvas dǽmonum,
          Expélle somnoléntiam,
          Ne pigritántes óbruat.

          Sic, Christe, nobis ómnibus
          Indúlgeas credéntibus,
          Ut prosit exorántibus,
          Quod præcinéntes psállimus.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.consors-pat-rni-l-minis-63eb7753e8:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O Light of Light, O Day-spring bright,
          Co-equal in thy Father’s light:
          Assist us, as with prayer and psalm
          Thy servants break the twilight calm.

          All darkness from our minds dispel,
          And turn to flight the hosts of hell:
          Bid sleepfulness our eyelids fly,
          Lest overwhelmed in sloth we lie.

          Jesu, thy pardon, kind and free,
          Bestow on us who trust in thee:
          And as thy praises we declare,
          O with acceptance hear our prayer.

          O Father, that we ask be done,
          Through Jesus Christ, thine only Son;
          Who, with the Holy Ghost and thee,
          Doth live and reign eternally.
          Amen.
      la:
      - type: text
        text: |-
          Consors patérni lúminis,
          Lux ipse lucis, et dies,
          Noctem canéndo rúmpimus:
          Assíste postulántibus.

          Aufer ténebras méntium,
          Fuga catérvas dǽmonum,
          Expélle somnoléntiam,
          Ne pigritántes óbruat.

          Sic, Christe, nobis ómnibus
          Indúlgeas credéntibus,
          Ut prosit exorántibus,
          Quod præcinéntes psállimus.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.cre-tor-alme-s-derum-190a7aa2e7:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Bright builder of the heavenly poles,
          Eternal light of faithful souls,
          Jesus, Redeemer of mankind,
          Our humble prayers vouchsafe to mind.

          Who, lest the fraud of hell’s black king
          Should all men to destruction bring,
          Didst, by an act of generous love,
          The fainting world’s physician prove.

          Who, that thou mightst our ransom pay
          And wash the stains of sin away,
          Wouldst from a Virgin’s womb proceed
          And on the cross a victim bleed.

          Whose glorious power, whose saving name
          No sooner any voice can frame,
          But heaven and earth and hell agree
          To honour them with trembling knee.

          Thee, Christ, who at the latter day
          Shalt be our Judge, we humbly pray
          Such arms of heavenly grace to send
          As may thy Church from foes defend.

          Be glory given and honour done
          To God the Father and the Son
          And to the Holy Ghost on high,
          From age to age eternally.
          Amen.
      la:
      - type: text
        text: |-
          Creátor alme síderum,
          Ætérna lux credéntium,
          Iesu, Redémptor ómnium,
          Inténde votis súpplicum.

          Qui dǽmonis ne fráudibus
          Períret orbis, ímpetu
          Amóris actus, lánguidi
          Mundi medéla factus es.

          Commúne qui mundi nefas
          Ut expiáres, ad crucem
          E Vírginis sacrário
          Intácta prodis víctima.

          Cuius potéstas glóriæ
          Noménque cum primum sonat,
          Et cǽlites et ínferi
          Treménte curvántur genu.

          Te deprecámur últimæ
          Magnum diéi Iúdicem,
          Armis supérnæ grátiæ
          Defénde nos ab hóstibus.

          Virtus, honor, laus, glória
          Deo Patri cum Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
  hymn.deus-cre-tor-mnium-74819c4bb9:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Deus, creátor ómnium
          políque rector, véstiens
          diem decóro lúmine,
          noctem sopóris grátia,

          Artus solútos ut quies
          reddat labóris úsui
          mentésque fessas állevet
          luctúsque solvat ánxios,

          Grates perácto iam die
          et noctis exórtu preces,
          voti reos ut ádiuves,
          hymnum canéntes sólvimus.

          Te cordis ima cóncinant,
          te vox canóra cóncrepet,
          te díligat castus amor,
          te mens adóret sóbria,

          Ut cum profúnda cláuserit
          diem calígo nóctium,
          fides ténebras nésciat
          et nox fide relúceat.

          Dormíre mentem ne sinas,
          dormíre culpa nóverit,
          castis fides refrígerans,
          somni vapórem témperet.

          Exúta sensu lúbrico,
          te cordis alta sómnient;
          nec hostis ínvidi dolo,
          pavor quiétos súscitet.

          Christum rogámus, et Patrem,
          Christi Patrísque Spíritum;
          Unum potens per ómnia,
          Fove precántes Trínitas.
          Amen.
  hymn.ecce-iam-noctis-tenu-tur-umbra-405051d6b9:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Lo, the dim shadows of the night are waning;
          Lightsome and blushing, dawn of day returneth;
          Fervent in spirit, to the world’s Creator
          Pray we devoutly:

          That he may pity sinners in their sighing,
          Banish all troubles, kindly health bestowing;
          And may he grant us, of his countless blessings,
          Peace that is endless.

          This be our portion, God forever blessed,
          Father eternal, Son, and Holy Spirit,
          Whose is the glory, which through all creation
          Ever resoundeth.
          Amen.
      la:
      - type: text
        text: |-
          Ecce, iam noctis tenuátur umbra,
          Lux et auróræ rútilans corúscat:
          Súpplices rerum Dóminum canóra
          Voce precémur:

          Ut reos culpæ miserátus omnem
          Pellat angórem, tríbuat salútem,
          Donet et nobis bona sempitérnæ
          Múnera pacis.

          Præstet hoc nobis Déitas beáta
          Patris, ac Nati, paritérque Sancti
          Spíritus, cuius résonat per omnem
          Glória mundum.
          Amen.
  hymn.ecce-iam-noctis-tenu-tur-umbra-aeddb88f7a:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Ecce iam noctis tenuátur umbra,
          Lucis auróra rútilans corúscat:
          Súpplices rerum Dóminum canóra
          Voce precémur:

          Ut Deus nostri miserátus, omnem
          Pellat languórem, tríbuat salútem,
          Donet et nobis bona sempitérnæ
          Múnera pacis.

          Præstet hoc nobis Déitas beáta
          Patris, ac Nati, paritérque Sancti
          Spíritus, cuius réboat in omni
          Glória mundo.
          Amen.
  hymn.en-clara-vox-red-rguit-5569d5224a:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Hark, a herald voice is calling;
          “Christ is nigh,” it seems to say;
          “Cast away the dreams of darkness,
          O ye children of the day.”

          Startled at the solemn warning,
          Let the earth-bound soul arise;
          Christ, her sun, all sloth dispelling,
          Shines upon the morning skies.

          Lo, the Lamb, so long expected,
          Comes with pardon down from heaven;
          Let us haste, with tears of sorrow,
          One and all to be forgiven.

          So when next he comes with glory,
          Wrapping all the earth in fear,
          May he then as our defender
          On the clouds of heaven appear.

          Honour, glory, virtue, merit,
          To the Father and the Son,
          With the co-eternal Spirit,
          While eternal ages run.
          Amen.
      la:
      - type: text
        text: |-
          En clara vox redárguit
          Obscúra quæque, pérsonans:
          Procul fugéntur sómnia,
          Ab alto Iesus prómicat.

          Mens iam resúrgat, tórpida,
          Non ámplius iacens humi:
          Sidus refúlget iam novum,
          Ut tollat omne nóxium.

          En Agnus ad nos míttitur
          Laxáre gratis débitum:
          Omnes simul cum lácrimis
          Precémur indulgéntiam.

          Ut cum secúndo fúlserit,
          Metúque mundum cínxerit,
          Non pro reátu púniat,
          Sed nos pius tunc prótegat.

          Virtus, honor, laus, glória
          Deo Patri cum Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
  hymn.ex-more-docti-m-stico-6d8417e5d9:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          The fast, as taught by holy lore,
          We keep in solemn course once more:
          The fast to all men known, and bound
          In forty days of yearly round.

          The law and seers that were of old
          In diverse ways this Lent foretold,
          Which Christ, all seasons’ King and Guide,
          In after ages sanctified.

          More sparing therefore let us make
          The words we speak, the food we take,
          Our sleep and mirth, —and closer barred
          Be every sense in holy guard.

          Avoid the evil thoughts that roll
          Like waters o’er the heedless soul;
          Nor let the foe occasion find
          Our souls in slavery to bind.

          In prayer together let us fall,
          And cry for mercy, one and all,
          And weep before the Judge’s feet,
          And his avenging wrath entreat.

          Thy grace have we offended sore,
          By sins, O God, which we deplore;
          But pour upon us from on high,
          O pardoning One, thy clemency.

          Remember thou, though frail we be,
          That yet thine handiwork are we;
          Nor let the honour of thy name
          Be by another put to shame.

          Forgive the sin that we have wrought;
          Increase the good that we have sought:
          That we at length, our wanderings o'er,
          May please thee here and evermore.

          Grant O thou Blessed Trinity,
          Grant, O Essential Unity,
          That this our fast of forty days
          May work our profit and thy praise.
          Amen.
      la:
      - type: text
        text: |-
          Ex more docti mýstico
          Servémus hoc ieiúnium,
          Deno diérum círculo
          Ducto quater notíssimo.

          Lex et prophétæ prímitus
          Hoc prætulérunt, póstmodum
          Christus sacrávit, ómnium
          Rex atque factor témporum.

          Utámur ergo párcius
          Verbis, cibis et pótibus,
          Somno, iocis, et árctius
          Perstémus in custódia.

          Vitémus autem nóxia,
          Quæ súbruunt mentes vagas:
          Nullúmque demus cállidi
          Hostis locum tyránnidi.

          Flectámus iram víndicem,
          Plorémus ante Iúdicem,
          Clamémus ore súpplici,
          Dicámus omnes cérnui:

          Nostris malis offéndimus
          Tuam, Deus, cleméntiam:
          Effúnde nobis désuper,
          Remíssor, indulgéntiam.

          Meménto quod sumus tui,
          Licet cadúci, plásmatis:
          Ne des honórem nóminis
          Tui, precámur, álteri.

          Laxa malum, quod fécimus,
          Auge bonum, quod póscimus:
          Placére quo tandem tibi
          Possímus hic, et pérpetim.

          Præsta, beáta Trínitas,
          Concéde, simplex Únitas,
          Ut fructuósa sint tuis
          Ieiuniórum múnera.
          Amen.
