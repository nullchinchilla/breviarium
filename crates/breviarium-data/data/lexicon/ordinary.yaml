  short-reading.heb-1-11-12-4610c9c9e9:
    role: short_reading
    content:
      en:
      - type: citation
        text: Heb 1:11-12
      - type: text
        text: 'They shall perish, but thou shalt continue: and they shall all grow old as a garment. And as a vesture shalt thou change them, and they shall be changed: but thou art the selfsame, and thy years shall not fail.'
      la:
      - type: citation
        text: Heb 1:11-12
      - type: text
        text: 'Ipsi períbunt, tu autem permanébis; et omnes sicut vestiméntum veteráscent: et velut amíctum mutábis eos, et mutabúntur: tu autem idem ipse es, et anni tui non defícient.'
      en2:
      - type: citation
        text: Heb 1:11-12
      - type: text
        text: These shall pass away, but you will remain. And all will grow old like a garment. And you will change them like a cloak, and they shall be changed. Yet you are ever the same, and your years will not diminish.
  short-reading.isa-33-2-a3d21ca89a:
    role: short_reading
    content:
      en:
      - type: citation
        text: Isa 33:2
      - type: text
        text: 'O Lord, have mercy on us: for we have waited for thee: be thou our arm in the morning, and our salvation in the time of trouble.'
      la:
      - type: citation
        text: Isa 33:2
      - type: text
        text: 'Dómine, miserére nostri: te enim exspectávimus: esto brácchium nostrum in mane, et salus nostra in témpore tribulatiónis.'
      en2:
      - type: citation
        text: Isa 33:2
      - type: text
        text: O Lord, take pity on us. For we have waited for you. Be our arm in the morning and our salvation in the time of tribulation.
  short-reading.isa-50-6-7-da2838c584:
