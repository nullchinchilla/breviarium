      en2:
      - type: text
        text: |-
          Mighty and true God, our Ruler,
          Who govern the changes of things,
          With splendor you instruct the morning
          And the noon with fires:
      
          Quench the flames of strife,
          Drive off harmful heat,
          Bring health to our bodies
          And true peace to our hearts.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
