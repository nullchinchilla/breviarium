  hymn.t-rne-rerum-c-nditor-4230ee49c5:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Ætérne rerum Cónditor,
          Noctem diémque qui regis,
          Et témporum das témpora,
          Ut álleves fastídium.

          Præco diéi iam sonat,
          Noctis profúndæ pérvigil,
          Noctúrna lux viántibus,
          A nocte noctem ségregans.

          Hoc excitátus Lúcifer
          Solvit polum calígine,
          Hoc omnis errónum cohors
          Viam nocéndi déserit.

          Hoc nauta vires cólligit,
          Pontíque mitéscunt freta:
          Hoc, ipsa Petr[a] Ecclésiæ,
          Canénte, culpam díluit.

          Surgámus ergo strénue,
          Gallus iacéntes éxcitat,
          Et somnoléntos íncrepat,
          Gallus negántes árguit.

          Gallo canénte spes redit,
          Ægris salus refúnditur,
          Mucro latrónis cónditur,
          Lapsis fides revértitur.

          Iesu labéntes réspice,
          Et nos vidéndo córrige:
          Si réspicis, lapsus cadunt,
          Fletúque culpa sólvitur.

          Tu lux refúlge sénsibus,
          Mentísque somnum díscute:
          Te nostra vox primum sonet,
          Et vota solvámus tibi.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc et in perpétuum.
          Amen.
      en2:
      - type: text
        text: |-
          O eternal Creator of all things,
          Who govern night and day,
          And grant the seasons their times,
          To relieve our weariness:
      
          Now the herald of the day sounds out,
          Keeping watch in the deep of night,
          Night's light for those who travel,
          Dividing night from night.
      
          Roused by this, the morning star
          Frees the sky from darkness;
          The whole band of night-wanderers
          Abandon the way of harm.
      
          At this the sailor gathers strength,
          And the straits of the sea grow calm:
          At this, the very rock of the Church,
          As it crows, washes away his fault.
      
          Let us rise therefore with vigor;
          The cock rouses those who lie down
          And rebukes the drowsy,
          The cock rebukes those who deny.
      
          At the cock's crow hope returns,
          Health is poured back to the sick,
          The robber's sword is sheathed,
          Faith returns to the fallen.
      
          Look upon us as we stumble, O Jesus,
          And by your gaze correct us:
          If you look upon us, faults fall away,
          And by weeping sin is dissolved.
      
          You, the light, shine upon our senses,
          Drive away the sleep of the mind:
          Let our voice first sound of you,
          And let us pay our vows to you.
      
          To God the Father be glory,
          And to his only Son,
          With the Spirit the Paraclete,
          Both now and for ever.
          Amen.
  hymn.t-rne-rerum-c-nditor-f7eb5cd54f:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Maker of all, eternal King,
          Who day and night about dost bring:
          Who weary mortals to relieve,
          Dost in their times the seasons give:

          Now the shrill cock proclaims the day,
          And calls the sun’s awak’ning ray
          The wand’ring pilgrim’s guiding light,
          That marks the watches night by night.

          Roused at the note, the morning star
          Heaven’s dusky veil uplifts afar:
          Night’s vagrant bands no longer roam,
          But from their dark ways hie them home.

          The encouraged sailor’s fears are o’er,
          The foaming billows rage no more:
          Lo! e’en the very Church’s rock
          Melts at the crowing of the cock.

          O let us then like men arise;
          The cock rebukes our slumbering eyes,
          Bestirs who still in sleep would lie,
          And shames who would their Lord deny.

          New hope his clarion-note awakes,
          Sickness the feeble frame forsakes,
          The robber sheathes his lawless sword,
          Faith to the fallen is restored.

          Look on us, Jesu, when we fall,
          And with thy look our souls recall:
          If thou but look, our sins are gone,
          And with due tears our pardon won.

          Shed through our hearts thy piercing ray,
          Our souls’ dull slumber drive away:
          Thy name be first on every tongue,
          To thee our earliest praises sung.

          All laud to God the Father be,
          All praise, Eternal Son, to thee,
          All glory, as is ever meet,
          To God the holy Paraclete.
          Amen.
