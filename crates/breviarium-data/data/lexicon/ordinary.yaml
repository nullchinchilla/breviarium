  invitatory.h-die-si-vocem-d-mini-audi-ritis-nol-te-obdur-re-295cb3a4fd:
    role: invitatory
    content:
      en:
      - type: text
        text: When you hear the voice of the Lord today * Do not harden your heart.
      la:
      - type: text
        text: Hódie, si vocem Dómini audiéritis, * Nolíte obduráre corda vestra.
  invitatory.non-sit-vobis-vanum-mane-s-rgere-ante-lucem-quia-e54575c704:
    role: invitatory
    content:
      en:
      - type: text
        text: 'Let it not be vain for you to rise up early, before the light: * For the Lord hath promised a crown to them that watch.'
      la:
      - type: text
        text: 'Non sit vobis vanum mane súrgere ante lucem: * Quia promísit Dóminus corónam vigilántibus.'
  invitatory.prope-est-iam-d-minus-ven-te-ador-mus-a9cf58bd4a:
    role: invitatory
    content:
      en:
      - type: text
        text: The Lord is now near * O come, let us adore Him.
      la:
      - type: text
        text: Prope est iam Dóminus, * Veníte, adorémus.
  invitatory.regem-vent-rum-d-minum-ven-te-ador-mus-f9ed5484cf:
    role: invitatory
    content:
      en:
      - type: text
        text: The Lord, the King who is to come * O come, let us adore Him.
      la:
      - type: text
        text: Regem ventúrum Dóminum, * Veníte, adorémus.
  invitatory.surr-xit-d-minus-vere-allel-ia-c941ce8474:
    role: invitatory
    content:
      en:
      - type: text
        text: The Lord is risen indeed. * Alleluia.
      la:
      - type: text
        text: Surréxit Dóminus vere, * Allelúia.
  marian-antiphon.alma-redempt-ris-mater-qu-p-rvia-c-li-e2fa68e5a8:
    role: marian_antiphon
    content:
      en:
      - type: text
        text: Mother of Christ, hear thou thy people's cry
      - type: text
        text: Star of the deep and Portal of the sky!
      - type: text
        text: Mother of Him who thee from nothing made.
      - type: text
        text: 'Sinking we strive and call to thee for aid:'
      - type: text
        text: O, by what joy which Gabriel brought to thee,
      - type: text
        text: Thou Virgin first and last, let us thy mercy see.
      - type: versicle
        text: After childbirth thou didst remain a virgin.
      - type: response
        text: Intercede for us, O Mother of God.
      - type: prayer
        text: Let us pray.
      - type: text
        text: 'O God, who, by the fruitful virginity of blessed Mary, hast bestowed upon mankind the reward of eternal salvation: grant, we beseech thee, that we may experience her intercession, through whom we have been made worthy to receive the author of life, Our Lord Jesus Christ thy Son. Amen.'
      la:
      - type: text
        text: Alma Redemptóris Mater, quæ pérvia cæli
      - type: text
        text: Porta manes, et stella maris, succúrre cadénti,
      - type: text
        text: 'Súrgere qui curat, pópulo: tu quæ genuísti,'
      - type: text
        text: Natúra miránte, tuum sanctum Genitórem,
      - type: text
        text: Virgo prius ac postérius, Gabriélis ab ore
      - type: text
        text: Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Post partum, Virgo, invioláta permansísti.
      - type: response
        text: Dei Génetrix, intercéde pro nobis.
      - type: text
        text: Orémus.
      - type: text
        text: 'Deus, qui salútis ætérnæ, beátæ Maríæ virginitáte fecúnda, humáno géneri prǽmia præstitísti: tríbue, quǽsumus; ut ipsam pro nobis intercédere sentiámus, per quam merúimus auctórem vitæ suscípere, Dóminum nostrum Iesum Christum Fílium tuum. Amen.'
  marian-antiphon.alma-redempt-ris-mater-qu-p-rvia-c-li-porta-mane-fb4c310fbe:
    role: marian_antiphon
    content:
      en:
      - type: text
        text: Mother of Christ, hear thou thy people's cry
      - type: text
        text: Star of the deep and Portal of the sky!
      - type: text
        text: Mother of Him who thee from nothing made.
      - type: text
        text: 'Sinking we strive and call to thee for aid:'
      - type: text
        text: O, by what joy which Gabriel brought to thee,
      - type: text
        text: Thou Virgin first and last, let us thy mercy see.
      - type: versicle
        text: The Angel of the Lord announced unto Mary.
      - type: response
        text: And she conceived of the Holy Spirit.
      - type: prayer
        text: Let us pray.
      - type: text
        text: 'Pour forth, we beseech thee, O Lord, thy grace into our hearts: that as we have known the incarnation of thy Son Jesus Christ by the message of an Angel, so too by his Cross and passion may we be brought to the glory of his resurrection. Through the same Christ our Lord. Amen.'
      la:
      - type: text
        text: Alma Redemptóris Mater, quæ pérvia cæli porta manes,
      - type: text
        text: et stella maris, succúrre cadénti,
      - type: text
        text: 'Súrgere qui curat, pópulo: tu quæ genuísti,'
      - type: text
        text: Natúra miránte, tuum sanctum Genitórem,
      - type: text
        text: Virgo prius ac postérius, Gabriélis ab ore
      - type: text
        text: Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Ángelus Dómini nuntiávit Maríæ.
      - type: response
        text: Et concépit de Spíritu Sancto.
      - type: text
        text: Orémus.
      - type: text
        text: 'Grátiam tuam, quǽsumus, Dómine, méntibus nostris infúnde: ut, qui, Ángelo nuntiánte, Christi Fílii tui incarnatiónem cognóvimus; per passiónem eius et crucem, ad resurrectiónis glóriam perducámur. Per eúndem Christum Dóminum nostrum. Amen.'
  marian-antiphon.ant-o-lumen-ecclesiae-doctor-veritatis-rosa-pati-e7fd1d12f3:
    role: marian_antiphon
    content:
      en:
      - type: antiphon
        text: Light of the Church, teacher of truth, rose of patience, ivory of chastity, you freely poured forth the waters of wisdom; preacher of grace, unite us with the blessed. (Alleluia.)
      - type: antiphon
        text: V. Blessed Father, Dominic, pray for us. (Alleluia.)
      - type: antiphon
        text: R. That we may be made worthy of the promises of Christ. (Alleluia.)
      - type: prayer
        text: Let us pray.
      - type: text
        text: Grant, we beseech You, almighty God, that we who are weighed down by the burden of our sins, may be relieved through the patronage of the blessed Dominic, Your confessor and our father.
      - type: text
        text: Through Christ our Lord.
      - type: versicle
        text: May the souls of the faithful, through the mercy of God, rest in peace.
      - type: response
        text: Amen.
      la:
      - type: antiphon
        text: 'O Lumen Ecclesiae, doctor veritatis, rosa patientiae, ebur castitatis: aquam sapientiae propinásti gratis, praedicator gratiae, nos iunge beatis. (Allelúia.)'
      - type: antiphon
        text: V. Ora pro nobis, beate Pater Dominice. (Allelúia.)
      - type: antiphon
        text: R. Ut digni efficiamur promissionibus Christi. (Allelúia.)
      - type: text
        text: Orémus.
      - type: antiphon
        text: v. Concede, quaesumus omnipotens Deus, ut qui peccatorum nostrorum pondere premimur, beati Dominici confessoris tui Patris nostri patrocinio sublevemur.~
      - type: text
        text: Per Christum Dóminum nostrum.
      - type: versicle
        text: Fidélium ánimæ per misericórdiam Dei requiéscant in pace.
      - type: response
        text: Amen.
  marian-antiphon.ave-reg-na-c-l-rum-c4cd570572:
    role: marian_antiphon
    content:
      en:
      - type: text
        text: Hail, O Queen of heaven, enthroned!
      - type: text
        text: Hail, by Angels Mistress owned!
      - type: text
        text: Root of Jesse, Gate of morn,
      - type: text
        text: 'Whence the world''s true Light was born:'
      - type: text
        text: Glorious Virgin, joy to thee,
      - type: text
        text: 'Loveliest whom in heaven they see:'
      - type: text
        text: Fairest thou, where all are fair,
      - type: text
        text: Plead with Christ our sins to spare.
      - type: versicle
        text: Allow me to praise thee, holy Virgin.
      - type: response
        text: Give me strength against thine enemies.
      - type: prayer
        text: Let us pray.
      - type: text
        text: Grant, O merciful God, to our weak natures thy protection, that we who commemorate the holy Mother of God may, by the help of her intercession, arise from our iniquities. Through the same Christ our Lord. Amen.
      la:
      - type: text
        text: Ave, Regína cælórum,
      - type: text
        text: 'Ave, Dómina Angelórum:'
      - type: text
        text: Salve radix, salve porta,
      - type: text
        text: 'Ex qua mundo lux est orta:'
      - type: text
        text: Gaude, Virgo gloriósa,
      - type: text
        text: Super omnes speciósa,
      - type: text
        text: Vale, o valde decóra,
      - type: text
        text: Et pro nobis Christum exóra.
      - type: versicle
        text: Dignáre me laudáre te, Virgo sacráta.
      - type: response
        text: Da mihi virtútem contra hostes tuos.
      - type: text
        text: Orémus.
      - type: text
        text: Concéde, miséricors Deus, fragilitáti nostræ præsídium; ut, qui sanctæ Dei Genetrícis memóriam ágimus; intercessiónis eius auxílio, a nostris iniquitátibus resurgámus. Per eúndem Christum Dóminum nostrum. Amen.
  marian-antiphon.completbmv2-1525cca786:
    role: marian_antiphon
    content:
      la:
      - type: rubric
        text: CompletBMV2
      - type: text
        text: Salve, Regína, mater misericórdiæ;
      - type: text
        text: vita, dulcédo et spes nóstra, salve.
      - type: text
        text: Ad te clamámus éxsules fílii Hevæ.
      - type: text
        text: Ad te suspirámus geméntes et flentes
      - type: text
        text: In hac lacrimárum valle.
      - type: text
        text: Eia ergo, advocáta nostra,
      - type: text
        text: illos tuos misericórdes óculos ad nos convérte.
      - type: text
        text: Et Iesum, benedíctum fructum ventris tui,
      - type: text
        text: nobis post hoc exsílium osténde.
      - type: text
        text: O clemens, o pia, o dulcis Virgo María.
      - type: text
        text: (Allelúia.)
      - type: antiphon
        text: Ave María, grátia plena, * Dóminus tecum.
      - type: antiphon
        text: Ave María, grátia plena, * Dóminus tecum.
      - type: text
        text: Salve, Regína, mater misericórdiæ;
      - type: text
        text: vita, dulcédo et spes nóstra, salve.
      - type: text
        text: Ad te clamámus éxsules fílii Hevæ.
      - type: text
        text: Ad te suspirámus geméntes et flentes
      - type: text
        text: In hac lacrimárum valle.
      - type: text
        text: Eia ergo, advocáta nostra,
      - type: text
        text: illos tuos misericórdes óculos ad nos convérte.
      - type: text
        text: Et Iesum, benedíctum fructum ventris tui,
      - type: text
        text: nobis post hoc exsílium osténde.
      - type: text
        text: O clemens, o pia, o dulcis Virgo María.
      - type: versicle
        text: Ora pro nobis, sancta Dei Génetrix.
      - type: response
        text: Ut digni efficiámur promissiónibus Christi.
      - type: text
        text: Orémus.
      - type: text
        text: 'Omnípotens sempitérne Deus, qui gloriósæ Vírginis Matris Maríæ corpus et ánimam, ut dignum Fílii tui habitáculum éffici mererétur, Spíritu Sancto cooperánte, præparásti: da, ut, cuius commemoratióne lætámur, eius pia intercessióne, ab instántibus malis et a morte perpétua liberémur. Per eúndem Christum Dóminum nostrum. Amen.'
  marian-antiphon.reg-na-c-li-l-t-re-allel-ia-7916a6fe7d:
    role: marian_antiphon
    content:
      en:
      - type: text
        text: 'O Queen of heaven rejoice! alleluia:'
      - type: text
        text: For He whom thou didst merit to bear, alleluia,
      - type: text
        text: Hath arisen as he said, alleluia.
      - type: text
        text: Pray for us to God, alleluia.
      - type: versicle
        text: Rejoice and be glad, O Virgin Mary, alleluia.
      - type: response
        text: Because the Lord is truly risen, alleluia.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, who gave joy to the world through the resurrection of thy Son, our Lord Jesus Christ; grant, we beseech thee, that through his Mother, the Virgin Mary, we may obtain the joys of everlasting life. Through the same Christ our Lord. Amen.
      la:
      - type: text
        text: Regína cæli, lætáre, allelúia;
      - type: text
        text: Quia quem meruísti portáre, allelúia,
      - type: text
        text: 'Resurréxit, sicut dixit, allelúia:'
      - type: text
        text: Ora pro nobis Deum, allelúia.
      - type: versicle
        text: Gaude et lætáre, Virgo María, allelúia.
      - type: response
        text: Quia surréxit Dóminus vere, allelúia.
      - type: text
        text: Orémus.
      - type: text
        text: 'Deus, qui per resurrectiónem Fílii tui, Dómini nostri Iesu Christi, mundum lætificáre dignátus es: præsta, quǽsumus; ut, per eius Genetrícem Vírginem Maríam, perpétuæ capiámus gáudia vitæ. Per eúndem Christum Dóminum nostrum. Amen.'
  marian-antiphon.salve-reg-na-mater-miseric-rdi-59a2190345:
    role: marian_antiphon
    content:
      en:
      - type: text
        text: Hail holy Queen, Mother of Mercy,
      - type: text
        text: our life, our sweetness, and our hope.
      - type: text
        text: To thee do we cry, poor banished children of Eve.
      - type: text
        text: To thee do we send up our sighs, mourning and weeping
      - type: text
        text: In this valley of tears.
      - type: text
        text: Turn then, most gracious Advocate,
      - type: text
        text: thine eyes of mercy toward us.
      - type: text
        text: And after this our exile show unto us
      - type: text
        text: the blessed fruit of thy womb, Jesus.
      - type: text
        text: O clement, O loving, O sweet Virgin Mary.
      - type: versicle
        text: Pray for us, O Holy Mother of God.
      - type: response
        text: That we may be made worthy of the promises of Christ.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O almighty, everlasting God, who by the cooperation of the Holy Spirit, didst prepare the body and soul of Mary, glorious Virgin and Mother, to become a worthy dwelling for Thy Son; grant that we who rejoice in her commemoration may, by her gracious intercession, be delivered from present evils and from everlasting death. Through the same Christ our Lord. Amen.
      la:
      - type: text
        text: Salve, Regína, mater misericórdiæ;
      - type: text
        text: vita, dulcédo et spes nóstra, salve.
      - type: text
        text: Ad te clamámus éxsules fílii Hevæ.
      - type: text
        text: Ad te suspirámus geméntes et flentes
      - type: text
        text: In hac lacrimárum valle.
      - type: text
        text: Eia ergo, advocáta nostra,
      - type: text
        text: illos tuos misericórdes óculos ad nos convérte.
      - type: text
        text: Et Iesum, benedíctum fructum ventris tui,
      - type: text
        text: nobis post hoc exsílium osténde.
      - type: text
        text: O clemens, o pia, o dulcis Virgo María.
      - type: versicle
        text: Ora pro nobis, sancta Dei Génetrix.
      - type: response
        text: Ut digni efficiámur promissiónibus Christi.
      - type: text
        text: Orémus.
      - type: text
        text: 'Omnípotens sempitérne Deus, qui gloriósæ Vírginis Matris Maríæ corpus et ánimam, ut dignum Fílii tui habitáculum éffici mererétur, Spíritu Sancto cooperánte, præparásti: da, ut, cuius commemoratióne lætámur, eius pia intercessióne, ab instántibus malis et a morte perpétua liberémur. Per eúndem Christum Dóminum nostrum. Amen.'
