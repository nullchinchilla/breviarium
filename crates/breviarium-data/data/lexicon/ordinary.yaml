  short-reading.1-tim-1-17-b79b561d93:
    role: short_reading
    content:
      en:
      - type: citation
        text: 1 Tim. 1:17
      - type: text
        text: Now to the king of ages, immortal, invisible, the only God, be honour and glory for ever and ever. Amen.
      la:
      - type: citation
        text: 1 Tim. 1:17
      - type: text
        text: Regi sæculórum immortáli et invisíbili, soli Deo honor et glória in sǽcula sæculórum. Amen.
  short-reading.2-thess-3-5-330a490e38:
    role: short_reading
    content:
      en:
      - type: citation
        text: 2 Thess 3:5
      - type: text
        text: And the Lord direct your hearts, in the charity of God, and the patience of Christ.
      la:
      - type: citation
        text: 2 Thess 3:5
      - type: text
        text: Dóminus autem dírigat corda et córpora nostra in caritáte Dei et patiéntia Christi.
  short-reading.act-1-11-0b5a1bb3af:
    role: short_reading
    content:
      en:
      - type: citation
        text: Acts 1:11
      - type: text
        text: Ye men of Galilee, why stand you looking up to heaven? This Jesus who is taken up from you into heaven, shall so come, as you have seen him going into heaven.
      la:
      - type: citation
        text: Act. 1:11
      - type: text
        text: Viri Galilǽi, quid statis aspiciéntes in cælum? Hic Iesus, qui assúmptus est a vobis in cælum, sic véniet, quemádmodum vidístis eum eúntem in cælum.
  short-reading.act-2-11-e613f569cd:
    role: short_reading
    content:
      en:
      - type: citation
        text: Acts 2:11
      - type: text
        text: Jews also, and Proselytes, Cretes and Arabians, we do hear them speak in our tongues the wonderful works of God.
      la:
      - type: citation
        text: Act. 2:11
      - type: text
        text: 'Iudǽi quoque, et Prosélyti, Cretes, et Arabes: audívimus eos loquéntes nostris linguis magnália Dei.'
  short-reading.adiut-rium-nostrum-in-n-mine-d-mini-14f86be6ab:
    role: short_reading
    content:
      la:
      - type: versicle
        text: Adiutórium nostrum ✠ in nómine Dómini.
      - type: response
        text: Qui fecit cælum et terram.
      - type: text
        text: 'Confíteor Deo omnipoténti, beátæ Maríæ semper Vírgini, beáto Michaéli Archángelo, beáto Ioánni Baptístæ, sanctis Apóstolis Petro et Paulo, et ómnibus Sanctis, quia peccávi nimis, cogitatióne, verbo et ópere: (percutit sibi pectus) mea culpa, mea culpa, mea máxima culpa. Ídeo precor beátam Maríam semper Vírginem, beátum Michaélem Archángelum, beátum Ioánnem Baptístam, sanctos Apóstolos Petrum et Paulum, et omnes Sanctos, oráre pro me ad Dóminum Deum nostrum.'
      - type: text
        text: Misereátur nostri omnípotens Deus, et dimíssis peccátis nostris, perdúcat nos ad vitam ætérnam. Amen.
      - type: text
        text: Indulgéntiam, ✠ absolutiónem et remissiónem peccatórum nostrórum tríbuat nobis omnípotens et miséricors Dóminus. Amen.
      - type: text
        text: Dignáre, Dómine …
      - type: versicle
        text: Dómine, exáudi oratiónem meam.
      - type: response
        text: Et clamor meus ad te véniat.
  short-reading.col-3-1-2-3168062998:
    role: short_reading
    content:
      en:
      - type: citation
        text: Col 3:1-2
      - type: text
        text: 'If you be risen with Christ, seek the things that are above; where Christ is sitting at the right hand of God: Mind the things that are above, not the things that are upon the earth.'
