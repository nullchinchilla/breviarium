    role: rubric
    content:
      la:
      - type: antiphon
        text: Spíritus sanctus in te descéndet, María, ne tímeas, habébis in útero Fílium Dei.
      - type: versicle
        text: Ecce ancílla Dómini.
      - type: response
        text: Fiat mihi secúndum verbum tuum.
      - type: text
        text: Orémus.
      - type: text
        text: Lætífica, et ádiuva nos, omnípotens et miséricors Deus, Domínicæ Conceptiónis gáudia recoléntes, et pia Dei Génitrix Virgo semper María (in cuius veneratióne hæc commemorámus) in cunctis necessitátibus nostris grátiam sancti Spíritus nobis ímpetret, et levámen. Per eúndem Christum Dóminum nostrum.
      - type: response
        text: Amen.
