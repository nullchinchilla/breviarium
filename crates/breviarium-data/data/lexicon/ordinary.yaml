        text: |-
          Let us pray.
          O God, from whom are holy desires, right counsels, and just works: give to your servants that peace which the world cannot give; that both our hearts may be devoted to your commandments, and, the fear of enemies being removed, our times may be tranquil under your protection.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  chapter.de-cruce-fbfd826199:
    role: chapter
    content:
      en:
      - type: citation
        text: De cruce
      - type: antiphon
        text: Deliver us from our enemies, O thou our God, by the sign of the Cross.
      - type: text
        text: ''
      - type: versicle
        text: Let all the earth adore thee, and sing to thee.
      - type: response
        text: Let it sing a psalm to thy name, O Lord.
      - type: prayer
        text: Let us pray.
      - type: text
        text: Keep us, we beseech thee, O Lord, in everlasting peace, whom thou didst deign to redeem by the wood of the holy Cross.
      la:
      - type: citation
        text: De cruce
      - type: antiphon
        text: Per signum Crucis de inimícis nostris líbera nos, Deus noster.
      - type: text
        text: ''
      - type: versicle
        text: Omnis terra adóret te, et psallat tibi.
      - type: response
        text: Psalmum dicat nómini tuo, Dómine.
      - type: text
        text: |-
          Orémus.
          Perpétua nos, quǽsumus, Dómine, pace custódi, quos per lignum sanctæ Crucis redímere dignátus es.
      en2:
      - type: citation
        text: Of the Cross
      - type: antiphon
        text: By the sign of the Cross, deliver us from our enemies, O our God.
      - type: text
        text: ''
      - type: versicle
        text: Let all the earth adore you and sing praise to you.
      - type: response
        text: Let them sing a psalm to your name, O Lord.
      - type: text
        text: |-
          Let us pray.
          Keep us, we pray, O Lord, in perpetual peace, us whom you were pleased to redeem through the wood of the holy Cross.
  chapter.de-pace-474fd549fc:
    role: chapter
    content:
      en:
      - type: citation
        text: For Peace
      - type: antiphon
        text: Give peace in our time, O Lord, because there is no one else who fights for us, if not You, our God.
      - type: text
        text: ''
      - type: versicle
        text: Peace be within thy walls.
      - type: response
        text: And prosperity within thy palaces.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, from whom all holy desires, all good counsels, and all just works do proceed; Give unto thy servants that peace which the world cannot give; so that, with our hearts set to obey thy commandments, and freed from the fear of the enemy, we may pass our lives in peace under thy protection.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: citation
        text: De Pace
      - type: antiphon
        text: Da pacem Dómine in diébus nostris, quia non est álius, qui pugnet pro nobis, nisi tu Deus noster. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Fiat pax in virtúte tua. (Allelúia.)
      - type: response
        text: Et abundántia in túrribus tuis. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Deus, a quo sancta desidéria, recta consília, et iusta sunt ópera: da servis tuis illam, quam mundus dare non potest, pacem; ut et corda nostra mandátis tuis dédita, et hóstium subláta formídine, témpora sint tua protectióne tranquílla.
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: citation
        text: Of Peace
      - type: antiphon
        text: Give peace, O Lord, in our days, for there is no other who fights for us except you, our God. (Alleluia.)
      - type: text
        text: ''
      - type: versicle
        text: Let there be peace in your strength. (Alleluia.)
      - type: response
        text: And abundance in your towers. (Alleluia.)
      - type: text
        text: |-
          Let us pray.
          O God, from whom are holy desires, right counsels, and just works: give to your servants that peace which the world cannot give; that both our hearts may be devoted to your commandments, and, the fear of enemies being removed, our times may be tranquil under your protection.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  chapter.de-patrono-vel-titulo-ecclesi-e47ef9b3e8:
    role: chapter
    content:
      la:
      - type: citation
        text: De Patrono vel Titulo Ecclesiæ
      - type: rubric
        text: 'fiat com. consueata ante vel post Commemorationes prædictas, pro dignitate illius, et ultimo loco:'
      en2:
      - type: citation
        text: Of the Patron or Title of the Church
      - type: rubric
        text: 'the customary commemoration is made before or after the aforesaid Commemorations, according to its rank, and in the last place:'
  chapter.de-sancto-ioseph-143cbfe709:
    role: chapter
    content:
      en:
      - type: citation
        text: Commemoration of St. Joseph
      - type: antiphon
        text: Behold a faithful and wise servant whom his Lord hath made ruler over His household.
      - type: text
        text: ''
      - type: versicle
        text: Glory and riches shall be in his house.
      - type: response
        text: And his righteousness endureth for ever.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, who, in thine unspeakable foreknowledge, didst choose thy blessed servant Joseph to be the husband of thine own most holy Mother; mercifully grant that now that he is in heaven with thee, we who on earth do reverence him for our defender, may worthily be holpen by the succour of his prayers to thee on our behalf.
      la:
      - type: citation
        text: De sancto Ioseph
      - type: antiphon
        text: Ecce fidélis servus et prudens, quem constítuit Dóminus super famíliam suam. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Glória et divítiæ in domo eius. (Allelúia.)
      - type: response
        text: Et iustítia eius manet in sǽculum sǽculi. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Deus, qui ineffábili providéntia beátum Ioseph sanctíssimæ Genitrícis tuæ sponsum elígere dignátus es: præsta quǽsumus; ut quem protectórem venerámur in terris, intercessórem habére mereámur in cælis.
      en2:
      - type: citation
        text: Of Saint Joseph
      - type: antiphon
        text: Behold, a faithful and prudent servant, whom the Lord has set over his household. (Alleluia.)
      - type: text
        text: ''
      - type: versicle
        text: Glory and wealth shall be in his house. (Alleluia.)
      - type: response
        text: And his justice endures for ever and ever. (Alleluia.)
      - type: text
        text: |-
          Let us pray.
          O God, who in your ineffable providence were pleased to choose the blessed Joseph as spouse of your most holy Mother, grant, we pray, that we may merit to have as our intercessor in heaven him whom we venerate as our protector on earth.
  chapter.de-sancto-ioseph-4c40457fca:
    role: chapter
    content:
      en:
      - type: citation
        text: Commemoration of St. Joseph
      - type: antiphon
        text: Jesus himself began to be about thirty years of age, being (as was supposed) the son of Joseph.
      - type: text
        text: ''
      - type: versicle
        text: The mouth of the righteous speaketh wisdom.
      - type: response
        text: And his tongue talketh judgment.
      - type: text
        text: (sed commune C4 aut commune C5 loco hujus versus dicitur)
      - type: versicle
        text: Glory and riches shall be in his house.
      - type: response
        text: And his righteousness endureth for ever.
      - type: rubric
        text: deinde dicitur
      - type: text
        text: O God, who, in thine unspeakable foreknowledge, didst choose thy blessed servant Joseph to be the husband of thine own most holy Mother; mercifully grant that now that he is in heaven with thee, we who on earth do reverence him for our defender, may worthily be holpen by the succour of his prayers to thee on our behalf.
      la:
      - type: citation
        text: De sancto Ioseph
      - type: antiphon
        text: Ipse Iesus erat incípiens quasi annórum trigínta ut putabátur fílius Ioseph. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Os iusti meditábitur sapiéntiam. (Allelúia.)
      - type: response
        text: Et lingua eius loquétur iudícium. (Allelúia.)
      - type: text
        text: (sed commune C4 aut commune C5 loco huius versus dicitur)
      - type: versicle
        text: Glória et divítiæ in domo eius. (Allelúia.)
      - type: response
        text: Et iustítia eius manet in sǽculum sǽculi. (Allelúia.)
      - type: rubric
        text: deinde dicitur
      - type: text
        text: 'Deus, qui ineffábili providéntia beátum Ioseph sanctíssimæ Genitrícis tuæ sponsum elígere dignátus es: præsta quǽsumus; ut quem protectórem venerámur in terris, intercessórem habére mereámur in cælis.'
      en2:
      - type: citation
        text: Of Saint Joseph
      - type: antiphon
        text: Jesus himself was beginning to be about thirty years of age, being considered, as was supposed, the son of Joseph. (Alleluia.)
      - type: text
        text: ''
      - type: versicle
        text: The mouth of the just shall meditate wisdom. (Alleluia.)
      - type: response
        text: And his tongue shall speak judgment. (Alleluia.)
      - type: text
        text: (but the common C4 or common C5 is said in place of this verse)
      - type: versicle
        text: Glory and wealth shall be in his house. (Alleluia.)
      - type: response
        text: And his justice endures for ever and ever. (Alleluia.)
      - type: rubric
        text: then is said
      - type: text
        text: 'O God, who in your ineffable providence were pleased to choose blessed Joseph as the spouse of your most holy Mother: grant, we beseech you, that we may merit to have as our intercessor in heaven him whom we venerate as our protector on earth.'
  chapter.de-ss-benedicto-bernardo-et-roberto-8df971d35b:
    role: chapter
    content:
      la:
      - type: citation
        text: De SS. Benedicto, Bernardo et Roberto
      - type: antiphon
        text: Sancti per fidem vicérunt regna, operáti sunt iustítiam, adépti sunt, repromissiónes. (Allelúia, allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Beáti quos elegísti, Dómine. (Allelúia.)
      - type: response
        text: Habitábunt in átriis tuis. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti, Bernárdi et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.
          (sed die Bernardi)
          Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.
      en2:
      - type: citation
        text: Of Saints Benedict, Bernard, and Robert
      - type: antiphon
        text: The Saints through faith conquered kingdoms, wrought justice, and obtained the promises. (Alleluia, alleluia.)
      - type: text
        text: ''
      - type: versicle
        text: Blessed are those whom you have chosen, O Lord. (Alleluia.)
      - type: response
        text: They shall dwell in your courts. (Alleluia.)
      - type: text
        text: |-
          Grant, we pray, almighty God: * that we who keep the commemoration of your holy ones Benedict, Bernard, and Robert, † may also imitate their virtues.
          (but on the day of Bernard)
          Grant, we pray, almighty God: * that we who keep the commemoration of your holy ones Benedict and Robert, † may also imitate their virtues.
