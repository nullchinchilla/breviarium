  collect.commemoratio-2c4381b7fd:
    role: collect
    content:
      en:
      - type: text
        text: Commemoration of
      la:
      - type: text
        text: Commemoratio
  collect.commemoratio-defunctorum-69f1fbf4a8:
    role: collect
    content:
      en:
      - type: text
        text: '#Commemoration of departed'
      la:
      - type: text
        text: '#Commemoratio defunctorum'
  collect.d-mine-deus-omn-potens-qui-ad-princ-pium-huius-d-f492b982ae:
    role: collect
    content:
      en:
      - type: text
        text: 'O Lord, our heavenly Father, Almighty and everlasting God, who has safely brought us to the beginning of this day: defend us by thy mighty power; and grant that this day we fall into no sin, but that all our doings may be ordered by thy governance, to do always what is righteous in thy sight.'
      la:
      - type: text
        text: 'Dómine Deus omnípotens, qui ad princípium huius diéi nos perveníre fecísti: tua nos hódie salva virtúte; ut in hac die ad nullum declinémus peccátum, sed semper ad tuam iustítiam faciéndam nostra procédant elóquia, dirigántur cogitatiónes et ópera.'
  collect.deinde-dicit-lector-commemor-tio-mnium-fratrum-f-bbe8ff32db:
    role: collect
    content:
      la:
      - type: text
        text: (Deinde dicit Lector:) Commemorátio ómnium fratrum, familiárium et benefactórum defunctórum Ordinis nostri.
  collect.oratio-0a3a25105a:
    role: collect
    content:
      en:
      - type: text
        text: '#Prayer'
      la:
      - type: text
        text: '#Oratio'
