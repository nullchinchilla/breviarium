  note.ier-11-18-19-fc1d77c5d6:
    role: note
    content:
      en:
      - type: citation
        text: Jer 11:18-19
      - type: text
        text: 'But thou, O Lord, hast shewn me, and I have known: then thou shewedst me their doings. And I was as a meek lamb, that is carried to be a victim.'
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: Deliver me, O Lord, from the evil man.
      - type: response
        text: Rescue me from the unjust man.
      la:
      - type: citation
        text: Ier 11:18-19
      - type: text
        text: 'Tu autem Dómine demonstrásti mihi, et cognóvi: tunc ostendísti mihi stúdia eórum. Et ego quasi agnus mansuétus, qui portátur ad víctimam.'
      - type: response
        text: Deo grátias.
      - type: versicle
        text: Éripe me, Dómine, ab hómine malo.
      - type: response
        text: A viro iníquo éripe me.
      en2:
      - type: citation
        text: Ier 11:18-19
      - type: text
        text: 'But you, O Lord, have revealed this to me, and I have understood. Then you displayed their efforts to me. And I was like a meek lamb, who is being carried to be a victim. And I did not realize that they had devised plans against me, saying: ''Let us place wood upon his bread, and let us eradicate him from the land of the living, and let his name no longer be remembered.'''
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: Deliver me, O Lord, from evil men.
      - type: response
        text: From unjust men deliver me.
  note.isa-1-16-18-cc9fd27543:
    role: note
    content:
      en:
      - type: citation
        text: Isa 1:16-18
      - type: text
        text: 'Wash yourselves, be clean, take away the evil of your devices from my eyes: cease to do perversely, Learn to do well: seek judgment, relieve the oppressed, judge for the fatherless, defend the widow. And then come, and accuse me, saith the Lord.'
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: They shall bear thee up in their hands,
      - type: response
        text: Lest haply thou dash thy foot against a stone.
      la:
      - type: citation
        text: Isa 1:16-18
      - type: text
        text: 'Lavámini, mundi estóte: auférte malum cogitatiónum vestrárum ab óculis meis: quiéscite ágere pervérse, díscite benefácere: quǽrite iudícium, subveníte opprésso, iudicáte pupíllo, deféndite víduam. Et veníte, et argúite me, dicit Dóminus.'
      - type: response
        text: Deo grátias.
      - type: versicle
        text: In mánibus portábunt te.
      - type: response
        text: Ne forte offéndas ad lápidem pedem tuum.
      en2:
      - type: citation
        text: Isa 1:16-18
      - type: text
        text: Wash, become clean, take away the evil of your intentions from my eyes. Cease to act perversely. Learn to do good. Seek judgment, support the oppressed, judge for the orphan, defend the widow. And then approach and accuse me, says the Lord. Then, if your sins are like scarlet, they shall be made white like snow; and if they are red like vermillion, they shall become white like wool.
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: In their hands they shall carry you.
      - type: response
        text: Lest perhaps you strike your foot against a stone.
  note.isa-60-4-5-14014601d9:
    role: note
    content:
      en:
      - type: citation
        text: Isa 60:4-5
      - type: text
        text: Thy sons shall come from afar, and thy daughters shall rise up at thy side. Then shalt thou see, and abound, and thy heart shall wonder and be enlarged, when the multitude of the sea shall be converted to thee, the strength of the Gentiles shall come to thee.
      - type: response
        text: Thanks be to God.
      - type: versicle
        text: There are three precious gifts which the wise men offered unto the Lord.
      - type: response
        text: Gold, frankincense, and myrrh.
      la:
      - type: citation
        text: Isa 60:4-5
      - type: text
        text: 'Fílii tui de longe vénient et fíliæ tuæ de látere surgent. Tunc vidébis, et áfflues; mirábitur et dilatábitur cor tuum: quando convérsa fúerit ad te multitúdo maris; fortitúdo géntium vénerit tibi.'
      - type: response
        text: Deo grátias.
      - type: text
        text: (nisi rubrica cisterciensis)
      - type: versicle
        text: Tria sunt múnera quæ obtulérunt Magi Dómino.
      - type: response
        text: Aurum, thus et myrrham.
      - type: versicle
        text: Reges Tharsis et ínsulæ múnera ófferent.
      - type: response
        text: Reges Arabum et Saba dona addúcent.
      en2:
      - type: citation
        text: Isa 60:4-5
      - type: text
        text: Lift up your eyes all around and see! All these have been gathered together; they have arrived before you. Your sons will arrive from far away, and your daughters will rise up from your side. Then you will see, and you will overflow, and your heart will be amazed and expanded. When the multitude of the sea will have been converted to you, the strength of the nations will approach you.
      - type: response
        text: Thanks be to God.
      - type: text
        text: (unless the Cistercian rubric applies)
      - type: versicle
        text: These are the three gifts which the Magi offered to the Lord.
      - type: response
        text: Gold, frankincense, and myrrh.
      - type: versicle
        text: The kings of Tarshish and the islands shall offer gifts.
      - type: response
        text: The kings of Arabia and Sheba shall bring tribute.
  note.isa-9-6-1562106cfb:
