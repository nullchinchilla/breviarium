  chapter.de-cruce-e12794b574:
    role: chapter
    content:
      en:
      - type: heading
        text: De cruce
      - type: antiphon
        text: Deliver us from our enemies, O thou our God, by the sign of the Cross.
      - type: versicle
        text: Let all the earth adore thee, and sing to thee.
      - type: response
        text: Let it sing a psalm to thy name, O Lord.
      - type: prayer
        text: Let us pray.
      - type: text
        text: Keep us, we beseech thee, O Lord, in everlasting peace, whom thou didst deign to redeem by the wood of the holy Cross.
      la:
      - type: heading
        text: De cruce
      - type: antiphon
        text: Per signum Crucis de inimícis nostris líbera nos, Deus noster.
      - type: versicle
        text: Omnis terra adóret te, et psallat tibi.
      - type: response
        text: Psalmum dicat nómini tuo, Dómine.
      - type: text
        text: Orémus.
      - type: text
        text: Perpétua nos, quǽsumus, Dómine, pace custódi, quos per lignum sanctæ Crucis redímere dignátus es.
  chapter.de-pace-1a95f147de:
    role: chapter
    content:
      en:
      - type: heading
        text: For Peace
      - type: antiphon
        text: Give peace in our time, O Lord, because there is no one else who fights for us, if not You, our God.
      - type: versicle
        text: Peace be within thy walls.
      - type: response
        text: And prosperity within thy palaces.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, from whom all holy desires, all good counsels, and all just works do proceed; Give unto thy servants that peace which the world cannot give; so that, with our hearts set to obey thy commandments, and freed from the fear of the enemy, we may pass our lives in peace under thy protection.
      - type: prayer
        text: Through Jesus Christ, thy Son our Lord, Who liveth and reigneth with thee, in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: heading
        text: De Pace
      - type: antiphon
        text: Da pacem Dómine in diébus nostris, quia non est álius, qui pugnet pro nobis, nisi tu Deus noster. (Allelúia.)
      - type: versicle
        text: Fiat pax in virtúte tua. (Allelúia.)
      - type: response
        text: Et abundántia in túrribus tuis. (Allelúia.)
      - type: text
        text: Orémus.
      - type: text
        text: 'Deus, a quo sancta desidéria, recta consília, et iusta sunt ópera: da servis tuis illam, quam mundus dare non potest, pacem; ut et corda nostra mandátis tuis dédita, et hóstium subláta formídine, témpora sint tua protectióne tranquílla.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
  chapter.de-patrono-vel-titulo-ecclesi-f8d987b4c5:
    role: chapter
    content:
      la:
      - type: heading
        text: De Patrono vel Titulo Ecclesiæ
      - type: rubric
        text: 'fiat com. consueata ante vel post Commemorationes prædictas, pro dignitate illius, et ultimo loco:'
  chapter.de-sancto-ioseph-87b787d2e5:
    role: chapter
    content:
      en:
      - type: heading
        text: Commemoration of St. Joseph
      - type: antiphon
        text: Behold a faithful and wise servant whom his Lord hath made ruler over His household.
      - type: versicle
        text: Glory and riches shall be in his house.
      - type: response
        text: And his righteousness endureth for ever.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, who, in thine unspeakable foreknowledge, didst choose thy blessed servant Joseph to be the husband of thine own most holy Mother; mercifully grant that now that he is in heaven with thee, we who on earth do reverence him for our defender, may worthily be holpen by the succour of his prayers to thee on our behalf.
      la:
      - type: heading
        text: De sancto Ioseph
      - type: antiphon
        text: Ecce fidélis servus et prudens, quem constítuit Dóminus super famíliam suam. (Allelúia.)
      - type: versicle
        text: Glória et divítiæ in domo eius. (Allelúia.)
      - type: response
        text: Et iustítia eius manet in sǽculum sǽculi. (Allelúia.)
      - type: text
        text: Orémus.
      - type: text
        text: 'Deus, qui ineffábili providéntia beátum Ioseph sanctíssimæ Genitrícis tuæ sponsum elígere dignátus es: præsta quǽsumus; ut quem protectórem venerámur in terris, intercessórem habére mereámur in cælis.'
  chapter.de-sancto-ioseph-bcbeeedfbc:
    role: chapter
    content:
      en:
      - type: heading
        text: Commemoration of St. Joseph
      - type: antiphon
        text: Jesus himself began to be about thirty years of age, being (as was supposed) the son of Joseph.
      - type: versicle
        text: The mouth of the righteous speaketh wisdom.
      - type: response
        text: And his tongue talketh judgment.
      - type: text
        text: (sed commune C4 aut commune C5 loco hujus versus dicitur)
      - type: versicle
        text: Glory and riches shall be in his house.
      - type: response
        text: And his righteousness endureth for ever.
      - type: rubric
        text: deinde dicitur
      - type: text
        text: O God, who, in thine unspeakable foreknowledge, didst choose thy blessed servant Joseph to be the husband of thine own most holy Mother; mercifully grant that now that he is in heaven with thee, we who on earth do reverence him for our defender, may worthily be holpen by the succour of his prayers to thee on our behalf.
      la:
      - type: heading
        text: De sancto Ioseph
      - type: antiphon
        text: Ipse Iesus erat incípiens quasi annórum trigínta ut putabátur fílius Ioseph. (Allelúia.)
      - type: versicle
        text: Os iusti meditábitur sapiéntiam. (Allelúia.)
      - type: response
        text: Et lingua eius loquétur iudícium. (Allelúia.)
      - type: text
        text: (sed commune C4 aut commune C5 loco huius versus dicitur)
      - type: versicle
        text: Glória et divítiæ in domo eius. (Allelúia.)
      - type: response
        text: Et iustítia eius manet in sǽculum sǽculi. (Allelúia.)
      - type: rubric
        text: deinde dicitur
      - type: text
        text: 'Deus, qui ineffábili providéntia beátum Ioseph sanctíssimæ Genitrícis tuæ sponsum elígere dignátus es: præsta quǽsumus; ut quem protectórem venerámur in terris, intercessórem habére mereámur in cælis.'
  chapter.de-ss-benedicto-bernardo-et-roberto-070a36a0b4:
    role: chapter
    content:
      la:
      - type: heading
        text: De SS. Benedicto, Bernardo et Roberto
      - type: antiphon
        text: Sancti per fidem vicérunt regna, operáti sunt iustítiam, adépti sunt, repromissiónes. (Allelúia, allelúia.)
      - type: versicle
        text: Beáti quos elegísti, Dómine. (Allelúia.)
      - type: response
        text: Habitábunt in átriis tuis. (Allelúia.)
      - type: text
        text: Orémus.
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti, Bernárdi et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.'
      - type: text
        text: (sed die Bernardi)
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.'
  chapter.de-ss-benedicto-bernardo-et-roberto-623c5d0c42:
    role: chapter
    content:
      la:
      - type: heading
        text: De SS. Benedicto, Bernardo et Roberto
      - type: antiphon
        text: Córpora Sanctórum in pace sepúlta sunt, et vivent nómina eórum in ætérnum. (Allelúia, allelúia.)
      - type: versicle
        text: Beáti quos elegísti, Dómine. (Allelúia.)
      - type: response
        text: Habitábunt in átriis tuis. (Allelúia.)
      - type: text
        text: Orémus.
      - type: text
        text: 'Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti, Bernárdi et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.'
      - type: text
        text: (sed die Bernardi)
  chapter.gal-6-2-dc34f27e67:
    role: chapter
    content:
      en:
      - type: citation
        text: Gal 6:2
      - type: text
        text: Bear ye one another's burdens; and so you shall fulfill the law of Christ.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Gal 6:2
      - type: text
        text: Alter altérius ónera portáte, et sic adimplébitis legem Christi.
      - type: response
        text: Deo grátias.
  chapter.gen-49-10-4e5fec2238:
    role: chapter
    content:
      en:
      - type: citation
        text: Gen 49:10
      - type: text
        text: The sceptre shall not be taken away from Juda, nor a ruler from his thigh, till he comes that is to be sent, and he shall be the expectation of nations.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Gen 49:10
      - type: text
        text: Non auferétur sceptrum de Iuda, et dux de fémore eius, donec véniat qui mitténdus est; et ipse erit exspectátio géntium.
      - type: response
        text: Deo grátias.
  chapter.heb-9-28-c0993bd6c1:
    role: chapter
    content:
      la:
      - type: citation
        text: Heb 9:28
      - type: text
        text: 'Christus semel oblátus est ad multórum exhauriénda peccáta: * secúndo sine peccáto apparébit expectántibus se, in salútem.'
      - type: response
        text: Deo grátias.
  chapter.ier-11-19-752929659a:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 11:19
      - type: text
        text: Come, let us put wood on his bread, and cut him off from the land of the living, and let his name be remembered no more.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 11:19
      - type: text
        text: Veníte, mittámus lignum in panem eius, et eradámus eum de terra vivéntium, et nomen eius non memorétur ámplius.
      - type: response
        text: Deo grátias.
  chapter.ier-11-20-ce99bd8a70:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 11:20
      - type: text
        text: 'But thou, O Lord of Sabaoth, who judgest justly, and triest the reins and hearts, let me see thy revenge on them: for to thee I have revealed my cause, O Lord my God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 11:20
      - type: text
        text: 'Tu autem, Dómine Sábaoth, qui iúdicas iuste, et probas renes et corda, vídeam ultiónem tuam ex eis: tibi enim revelávi causam meam, Dómine, Deus meus.'
      - type: response
        text: Deo grátias.
  chapter.ier-14-9-5d4cf9979b:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 14:9
      - type: text
        text: 'But thou, O Lord, art among us, and thy name is called upon by us: forsake us not, O Lord our God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 14:9
      - type: text
        text: 'Tu autem in nobis es, Dómine, et nomen sanctum tuum invocátum est super nos: ne derelínquas nos, Dómine, Deus noster.'
      - type: response
        text: Deo grátias.
  chapter.ier-17-13-1f82c8da57:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:13
      - type: text
        text: 'O Lord: all that forsake thee shall be confounded: they that depart from thee, shall be written in the earth: because they have forsaken the Lord, the vein of living waters.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:13
      - type: text
        text: 'Dómine, omnes qui te derelínquunt, confundéntur: recedéntes a te, in terra scribéntur: quóniam dereliquérunt venam aquárum vivéntium Dóminum.'
      - type: response
        text: Deo grátias.
  chapter.ier-17-14-c432761987:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:14
      - type: text
        text: 'Heal me, O Lord, and I shall be healed: save me, and I shall be saved, for thou art my praise.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:14
      - type: text
        text: 'Sana me, Dómine, et sanábor: salvum me fac, et salvus ero: quóniam laus mea tu es.'
      - type: response
        text: Deo grátias.
  chapter.ier-17-18-8fb3deafef:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 17:18
      - type: text
        text: 'Let them be confounded that persecute me, and let not me be confounded: let them be afraid, and let not me be afraid: bring upon them the day of affliction, and with a double destruction, destroy them, O Lord my God.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 17:18
      - type: text
        text: 'Confundántur qui me persequúntur, et non confúndar ego: páveant illi, et non páveam ego: induc super eos diem afflictiónis, et dúplici contritióne cóntere eos, Dómine Deus noster.'
      - type: response
        text: Deo grátias.
  chapter.ier-18-20-12fa5b6402:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 18:20
      - type: text
        text: Remember that I have stood in thy sight, to speak good for them, and turn away thy indignation from them.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 18:20
      - type: text
        text: Recordáre quod stéterim in conspéctu tuo, ut lóquerer pro eis bonum, et avérterem indignatiónem tuam ab eis.
      - type: response
        text: Deo grátias.
  chapter.ier-23-5-6199f32b06:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 23:5
      - type: text
        text: 'Behold the days come, saith the Lord, and I will raise up to David a just branch: and a king shall reign, and shall be wise, and shall execute judgement and justice in the earth.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 23:5
      - type: text
        text: 'Ecce dies véniunt, dicit Dóminus, et suscitábo David germen iustum: et regnábit rex, et sápiens erit: et fáciet iudícium et iustítiam in terra.'
      - type: response
        text: Deo grátias.
  chapter.ier-23-6-1347900421:
    role: chapter
    content:
      en:
      - type: citation
        text: Jer 23:6
      - type: text
        text: 'In those days shall Juda be saved, and Israel shall dwell confidently: and this is the name that they shall call him: the Lord our just one.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ier 23:6
      - type: text
        text: 'In diébus illis salvábitur Iuda, et Israël habitábit confidénter: et hoc est nomen, quod vocábunt eum, Dóminus iustus noster.'
      - type: response
        text: Deo grátias.
  chapter.io-l-2-12-13-bb2c6604cd:
    role: chapter
    content:
      en:
      - type: citation
        text: Joel 2:12-13
      - type: text
        text: Be converted to me with all your heart, in fasting, and in weeping, and in mourning. And rend your hearts, and not your garments, said the almighty Lord.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ioël 2:12-13
      - type: text
        text: Convertímini ad me in toto corde vestro, in ieiúnio, et fletu, et planctu. Et scíndite corda vestra, et non vestiménta vestra, ait Dóminus omnípotens.
      - type: response
        text: Deo grátias.
  chapter.io-l-2-17-242ca86891:
    role: chapter
    content:
      en:
      - type: citation
        text: Joel 2:17
      - type: text
        text: 'Between the porch and the altar the priests the Lord''s ministers shall weep, and shall say: Spare, O Lord, spare thy people: and give not thy inheritance to reproach, that the heathen should rule over them.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Ioël 2:17
      - type: text
        text: 'Inter vestíbulum et altáre plorábunt sacerdótes, minístri Dómini, et dicent: Parce, Dómine, parce pópulo tuo: et ne des hereditátem tuam in oppróbrium, ut dominéntur eis natiónes.'
      - type: response
        text: Deo grátias.
  chapter.isa-14-1-5e88bb70fe:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 14:1
      - type: text
        text: Her time is near at hand, and her days shall not be prolonged. For the Lord will have mercy on Jacob, and will yet choose out of Israel.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 14:1
      - type: text
        text: 'Prope est ut véniat tempus eius, et dies eius non elongabúntur: miserébitur enim Dóminus Iacob, et Israël salvábitur.'
      - type: response
        text: Deo grátias.
  chapter.isa-2-3-31ef9b7b87:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 2:3
      - type: text
        text: 'Come and let us go up to the mountain of the Lord, and to the house of the God of Jacob, and he will teach us his ways, and we will walk in his paths: for the law shall come forth from Sion, and the word of the Lord from Jerusalem.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 2:3
      - type: text
        text: 'Veníte, et ascendámus ad montem Dómini, et ad domum Dei Iacob, et docébit nos vias suas, et ambulábimus in sémitis eius: quia de Sion exíbit lex, et verbum Dómini de Ierúsalem.'
      - type: response
        text: Deo grátias.
  chapter.isa-55-7-d10977f126:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 55:7
      - type: text
        text: 'Let the wicked forsake his way, and the unjust man his thoughts, and let him return to the Lord, and he will have mercy on him, and to our God: for he is bountiful to forgive.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 55:7
      - type: text
        text: Derelínquat ímpius viam suam, et vir iníquus cogitatiónes suas, et revertátur ad Dóminum, et miserébitur eius, et ad Deum nostrum, quóniam multus est ad ignoscéndum.
      - type: response
        text: Deo grátias.
  chapter.isa-58-1-92aba8eb7b:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 58:1
      - type: text
        text: Cry, cease not, lift up thy voice like a trumpet, and show my people their wicked doings, and the house of Jacob their sins.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 58:1
      - type: text
        text: Clama, ne cesses, quasi tuba exálta vocem tuam, et annúntia pópulo meo scélera eórum, et dómui Iacob peccáta eórum.
      - type: response
        text: Deo grátias.
  chapter.isa-58-7-87857c78d3:
    role: chapter
    content:
      en:
      - type: citation
        text: Isa 58:7
      - type: text
        text: 'Deal thy bread to the hungry, and bring the needy and the harbourless into thy house: when thou shalt see one naked, cover him, and despise not thy own flesh.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Isa 58:7
      - type: text
        text: 'Frange esuriénti panem tuum, et egénos vagósque induc in domum tuam: cum víderis nudum, óperi eum, et carnem tuam ne despéxeris.'
      - type: response
        text: Deo grátias.
  chapter.k-rie-el-ison-christe-el-ison-k-rie-el-ison-4e1418f5f6:
    role: chapter
    content:
      la:
      - type: text
        text: Kýrie, eléison. Christe, eléison. Kýrie, eléison.
      - type: text
        text: 'Pater noster, qui es in cælis, sanctificétur nomen tuum: advéniat regnum tuum: fiat volúntas tua, sicut in cælo et in terra. Panem nostrum cotidiánum da nobis hódie: et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris:'
      - type: versicle
        text: 'Et ne nos indúcas in tentatiónem:'
      - type: response
        text: Sed líbera nos a malo.
      - type: text
        text: Ego dixi …
      - type: versicle
        text: Dómine, exáudi oratiónem meam.
      - type: response
        text: Et clamor meus ad te véniat.
  chapter.k-rie-el-ison-christe-el-ison-k-rie-el-ison-8cb2aa5a1d:
    role: chapter
    content:
      la:
      - type: text
        text: Kýrie, eléison. Christe, eléison. Kýrie, eléison.
      - type: rubric
        text: Pater secreto
      - type: text
        text: 'Pater noster, qui es in cælis, sanctificétur nomen tuum: advéniat regnum tuum: fiat volúntas tua, sicut in cælo et in terra. Panem nostrum cotidiánum da nobis hódie: et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris:'
      - type: versicle
        text: 'Et ne nos indúcas in tentatiónem:'
      - type: response
        text: Sed líbera nos a malo.
      - type: text
        text: Dómine, Deus …
  chapter.k-rie-el-ison-christe-el-ison-k-rie-el-ison-d31d1e6d5e:
    role: chapter
    content:
      la:
      - type: text
        text: Kýrie, eléison. Christe, eléison. Kýrie, eléison.
      - type: rubric
        text: Pater secreto
      - type: text
        text: 'Pater noster, qui es in cælis, sanctificétur nomen tuum: advéniat regnum tuum: fiat volúntas tua, sicut in cælo et in terra. Panem nostrum cotidiánum da nobis hódie: et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris:'
      - type: versicle
        text: 'Et ne nos indúcas in tentatiónem:'
      - type: response
        text: Sed líbera nos a malo.
      - type: rubric
        text: Credo secreto
      - type: text
        text: 'Credo in Deum, Patrem omnipoténtem, Creatórem cæli et terræ. Et in Iesum Christum, Fílium eius únicum, Dóminum nostrum: qui concéptus est de Spíritu Sancto, natus ex María Vírgine, passus sub Póntio Piláto, crucifíxus, mórtuus, et sepúltus: descéndit ad ínferos; tértia die resurréxit a mórtuis; ascéndit ad cælos; sedet ad déxteram Dei Patris omnipoténtis: inde ventúrus est iudicáre vivos et mórtuos. Credo in Spíritum Sanctum, sanctam Ecclésiam cathólicam, Sanctórum communiónem, remissiónem peccatórum.'
      - type: versicle
        text: Carnis resurrectiónem.
      - type: response
        text: Vitam ætérnam. Amen.
      - type: text
        text: Benedictus es …
      - type: versicle
        text: Dómine, exáudi oratiónem meam.
      - type: response
        text: Et clamor meus ad te véniat.
  chapter.per-e-ndem-christum-d-minum-nostrum-520934e7e6:
    role: chapter
    content:
      la:
      - type: text
        text: Per eúndem Christum Dóminum nostrum.
      - type: text
        text: (sed post partum omittitur)
      - type: response
        text: Amen.
  chapter.phil-3-20-21-774d1df079:
    role: chapter
    content:
      la:
      - type: citation
        text: Phil 3:20-21
      - type: text
        text: Salvatórem expectámus Dóminum nostrum Iesum Christum, qui reformávit corpus humilitátis nostrae, configurátum córpori claritátis suae.
      - type: response
        text: Deo grátias.
  chapter.rom-13-12-13-f0372a924a:
    role: chapter
    content:
      en:
      - type: citation
        text: Rom 13:12-13
      - type: text
        text: The night is passed, and the day is at hand. Let us therefore cast off the works of darkness, and put on the armour of light. Let us walk honestly, as in the day.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Rom 13:12-13
      - type: text
        text: Nox præcéssit, dies autem appropinquávit. Abiciámus ergo ópera tenebrárum, et induámur arma lucis. Sicut in die honéste ambulémus.
      - type: response
        text: Deo grátias.
  chapter.rom-13-8-e7b984c4ff:
    role: chapter
    content:
      en:
      - type: citation
        text: Rom 13:8
      - type: text
        text: Owe no man any thing, but to love one another. For he that loveth his neighbour, hath fulfilled the law.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Rom 13:8
      - type: text
        text: 'Némini quidquam debeátis, nisi ut ínvicem diligátis: qui enim díligit próximum, legem implévit.'
      - type: response
        text: Deo grátias.
  chapter.rom-6-9-10-3a9fe886c0:
    role: chapter
    content:
      en:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: Knowing that Christ rising again from the dead, dieth now no more, death shall no more have dominion over him. For in that he died to sin, he died once; but in that he liveth, he liveth unto God.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: 'Christus resúrgens ex mórtuis iam non móritur, mors illi ultra non dominábitur. Quod enim mórtuus est peccáto, mórtuus est semel: quod autem vivit, vivit Deo.'
      - type: response
        text: Deo grátias.
  chapter.rom-6-9-10-7da66c6345:
    role: chapter
    content:
      la:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: 'Christus resúrgens ex mórtuis iam non móritur, mors illi ultra non dominábitur. Quod enim mórtuus est peccáto, mórtuus est semel: quod autem vivit, vivit Deo.'
      - type: response
        text: Deo grátias.
  chapter.sancti-omnes-interc-dant-pro-nobis-ad-d-minum-ff123ee4eb:
    role: chapter
    content:
      en:
      - type: antiphon
        text: May all the Saints intercede for us with the Lord.
      - type: versicle
        text: 'The Lord hath made his holy one wonderful:'
      - type: response
        text: The Lord will hear me when I cry unto him.
      - type: heading
        text: Prayer
      - type: rubric
        text: At the letter N., the name of the Titular of the local church is said, if the title is not a divine person or a mystery of the Lord, and when the Office or a Commemoration was not already said of the Saint, and when the name is not already in the prayer. The names of the holy Angels and of St. John the Baptist, if they are titulars, are said before the name of St. Joseph. In all these cases, the words «blessed N.» are omitted.
      - type: prayer
        text: Let us pray.
      - type: text
        text: 'O Lord, we ask thee to save us from dangers to mind and to body: and, by the intercession of the blessed Joseph, the blessed Apostles Peter and Paul, blessed!~'
      - type: prayer
        text: N. and all the Saints, to eliminate all enmity and errors, that thy Church may safely serve thee in freedom.
      - type: prayer
        text: Through the same Jesus Christ, thy Son, Our Lord, Who liveth and reigneth with thee in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: antiphon
        text: Sancti omnes intercédant pro nobis ad Dóminum.
      - type: versicle
        text: Mirificávit Dóminus Sanctos suos.
      - type: response
        text: Et exaudívit eos clamántes ad se.
      - type: heading
        text: Oratio
      - type: rubric
        text: In hac oratione, ad litteram N. exprimitur nomen Titularis propriæ ecclesiæ, dummodo Titulus non sit Persona divina vel Mysterium Domini, aut de ipso ratione Festi factum non fuerit Officium vel Commemoratio, aut illius nomen non sit in eadem Suffragii Oratione expressum; ac nomina sanctorum Angelorum et sancti Ioannis Baptistæ, si Titulares fuerint, præponuntur nomini sancti Ioseph. In hisce autem omnibus casibus et omittuntur verba «atque beáto N.». Si Titularis ante omnes fuerit nominandus, particula «cum» omittitur ante nomen sanctorum Petri et Pauli ac præponitur nomini Sancti Ioseph.
      - type: text
        text: Orémus.
      - type: text
        text: 'A cunctis nos, quǽsumus, Dómine, mentis et córporis defénde perículis: et, intercedénte beáto Ioseph, cum beátis Apóstolis tuis Petro et Paulo, atque beáto~'
      - type: prayer
        text: N. et ómnibus Sanctis, salútem nobis tríbue benígnus et pacem; ut, destrúctis adversitátibus et erróribus univérsis, Ecclésia tua secúra tibi sérviat libertáte.
      - type: prayer
        text: Per eúndem Dóminum nostrum Iesum Christum Fílium tuum, qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
  collect.commemor-tio-mnium-fratrum-famili-rum-rdinis-nos-56f4bdf84a:
    role: collect
    content:
      en:
      - type: short_response
        text: Commemoration of all brothers, friends of our Order, and our benefactors.
      la:
      - type: short_response
        text: Commemorátio ómnium fratrum, familiárum Órdinis nostri, atque benefactórum nostrórum.
  collect.commemoratio-2c4381b7fd:
    role: collect
    content:
      en:
      - type: text
        text: Commemoration of
      la:
      - type: text
        text: Commemoratio
  collect.commemoratio-defunctorum-69f1fbf4a8:
    role: collect
    content:
      en:
      - type: text
        text: '#Commemoration of departed'
      la:
      - type: text
        text: '#Commemoratio defunctorum'
  collect.d-mine-deus-omn-potens-qui-ad-princ-pium-huius-d-f492b982ae:
    role: collect
    content:
      en:
      - type: text
        text: 'O Lord, our heavenly Father, Almighty and everlasting God, who has safely brought us to the beginning of this day: defend us by thy mighty power; and grant that this day we fall into no sin, but that all our doings may be ordered by thy governance, to do always what is righteous in thy sight.'
      la:
      - type: text
        text: 'Dómine Deus omnípotens, qui ad princípium huius diéi nos perveníre fecísti: tua nos hódie salva virtúte; ut in hac die ad nullum declinémus peccátum, sed semper ad tuam iustítiam faciéndam nostra procédant elóquia, dirigántur cogitatiónes et ópera.'
  collect.deinde-dicit-lector-commemor-tio-mnium-fratrum-f-bbe8ff32db:
    role: collect
    content:
      la:
      - type: text
        text: (Deinde dicit Lector:) Commemorátio ómnium fratrum, familiárium et benefactórum defunctórum Ordinis nostri.
  collect.oratio-0a3a25105a:
    role: collect
    content:
      en:
      - type: text
        text: '#Prayer'
      la:
      - type: text
        text: '#Oratio'
  collect.orationes-0ac25e2cd7:
    role: collect
    content:
      en:
      - type: text
        text: '#Prayers'
      la:
      - type: text
        text: '#Orationes'
  collect.v-sita-qu-sumus-d-mine-habitati-nem-istam-et-omn-f350bb990f:
    role: collect
    content:
      en:
      - type: text
        text: Visit, we beseech thee, O Lord, this dwelling, and drive far from it the snares of the enemy; let thy holy angels dwell herein to preserve us in peace, and let thy blessing be always upon us.
      la:
      - type: text
        text: 'Vísita, quǽsumus, Dómine, habitatiónem istam, et omnes insídias inimíci ab ea longe repélle: Ángeli tui sancti hábitent in ea, qui nos in pace custódiant; et benedíctio tua sit super nos semper.'
  hymn.ad-cenam-agni-pr-vidi-4a3d948b5c:
    role: hymn
    content:
      la:
      - type: text
        text: Ad cenam Agni próvidi,
      - type: text
        text: Et stolis albis cándidi,
      - type: text
        text: Post tránsitum maris Rubri,
      - type: text
        text: Christo canámus Príncipi.
      - type: text
        text: Cuius corpus sanctíssimum,
      - type: text
        text: In ara crucis tórridum,
      - type: text
        text: Cruóre eius róseo
      - type: text
        text: Gustándo vívimus Deo.
      - type: text
        text: Protécti Paschæ véspere
      - type: text
        text: A devastánte Angelo,
      - type: text
        text: Erépti de duríssimo
      - type: text
        text: Pharaónis império.
      - type: text
        text: Iam Pascha nostrum Christus est,
      - type: text
        text: 'Qui immolátus agnus est:'
      - type: text
        text: Sinceritátis ázyma,
      - type: text
        text: Caro eius obláta est.
      - type: text
        text: O vere digna hóstia,
      - type: text
        text: Per quam fracta sunt tártara,
      - type: text
        text: Redémpta plebs captiváta,
      - type: text
        text: Réddita vitæ prǽmia.
      - type: text
        text: Consúrgit Christus túmulo,
      - type: text
        text: Victor redit de bárathro,
      - type: text
        text: Tyránnum trudens vínculo,
      - type: text
        text: Et Paradísum réserans.
      - type: text
        text: Quǽsumus, Auctor ómnium,
      - type: text
        text: In hoc pascháli gáudio,
      - type: text
        text: Ab omni mortis ímpetu
      - type: text
        text: Tuum defénde pópulum.
      - type: text
        text: Glória tibi Dómine,
      - type: text
        text: Qui surrexíst[i] a mórtuis,
      - type: text
        text: Cum Patr[e] et Sancto Spíritu,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.ad-r-gias-agni-dapes-782a2215d1:
    role: hymn
    content:
      en:
      - type: text
        text: At the Lamb’s high feast we sing
      - type: text
        text: Praise to our victorious King,
      - type: text
        text: Who hath washed us in the tide
      - type: text
        text: Flowing from his piercèd side.
      - type: text
        text: Praise we him whose love divine
      - type: text
        text: Gives the guests his blood for wine,
      - type: text
        text: Gives his body for the feast,
      - type: text
        text: Love the victim, love the priest.
      - type: text
        text: Where the paschal blood is poured,
      - type: text
        text: Death’s dark angel sheathes his sword;
      - type: text
        text: Israel’s hosts triumphant go
      - type: text
        text: Through the wave that drowns the foe.
      - type: text
        text: Christ, the Lamb whose blood was shed,
      - type: text
        text: Paschal victim, paschal bread;
      - type: text
        text: With sincerity and love
      - type: text
        text: Eat we manna from above.
      - type: text
        text: Mighty victim from the sky,
      - type: text
        text: Powers of hell beneath thee lie;
      - type: text
        text: Death is conquered in the fight;
      - type: text
        text: Thou hast brought us life and light.
      - type: text
        text: Now thy banner thou dost wave;
      - type: text
        text: Vanquished Satan and the grave;
      - type: text
        text: Angels join his praise to tell —
      - type: text
        text: See o’erthrown the prince of hell.
      - type: text
        text: Paschal triumph, paschal joy,
      - type: text
        text: Only sin can this destroy;
      - type: text
        text: From the death of sin set free,
      - type: text
        text: Souls re-born, dear Lord, in Thee.
      - type: text
        text: '* Hymns of glory, songs of praise,'
      - type: text
        text: Father, unto thee we raise;
      - type: text
        text: Risen Lord, all praise to thee,
      - type: text
        text: Ever with the Spirit be.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Ad régias Agni dapes,
      - type: text
        text: Stolis amícti cándidis,
      - type: text
        text: Post tránsitum Maris Rubri,
      - type: text
        text: 'Christo canámus Príncipi:'
      - type: text
        text: Divína cuius cáritas
      - type: text
        text: Sacrum propínat sánguinem,
      - type: text
        text: Almíque membra córporis
      - type: text
        text: Amor sacérdos ímmolat.
      - type: text
        text: Sparsum cruórem póstibus
      - type: text
        text: 'Vastátor horret Ángelus:'
      - type: text
        text: Fugítque divísum mare;
      - type: text
        text: Mergúntur hostes flúctibus.
      - type: text
        text: Iam Pascha nostrum Christus est
      - type: text
        text: Paschális idem víctima,
      - type: text
        text: Et pura puris méntibus
      - type: text
        text: Sinceritátis ázyma.
      - type: text
        text: O vera cæli víctima,
      - type: text
        text: Subiécta cui sunt tártara,
      - type: text
        text: Solúta mortis víncula,
      - type: text
        text: Recépta vitæ prǽmia.
      - type: text
        text: Victor, subáctis ínferis,
      - type: text
        text: Trophǽa Christus éxplicat;
      - type: text
        text: Cælóque apérto, súbditum
      - type: text
        text: Regem tenebrárum trahit.
      - type: text
        text: Ut sis perénne méntibus
      - type: text
        text: Paschále, Iesu, gáudium,
      - type: text
        text: A morte dira críminum
      - type: text
        text: Vitæ renátos líbera.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Et Fílio, qui a mórtuis
      - type: text
        text: Surréxit, ac Paráclito,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.ales-di-i-n-ntius-6a7d6f0055:
    role: hymn
    content:
      la:
      - type: text
        text: Ales diéi núntius
      - type: text
        text: 'Lucem propínquam prǽcinit:'
      - type: text
        text: Nos excitátor méntium
      - type: text
        text: Iam Christus ad vitam vocat.
      - type: text
        text: Auférte, clamat, léctulos,
      - type: text
        text: 'Ægro sopóre désides:'
      - type: text
        text: Castíque, rect[i], ac sóbrii
      - type: text
        text: Vig[i]láte, iam sum próximus.
      - type: text
        text: Iesum ciámus vócibus,
      - type: text
        text: 'Flentes, precántes, sóbrii:'
      - type: text
        text: Inténta supplicátio
      - type: text
        text: Dormíre cor mundum vetat.
      - type: text
        text: 'Tu, Christe, somnum díscute:'
      - type: text
        text: 'Tu rumpe noctis víncula:'
      - type: text
        text: Tu solve peccátum vetus,
      - type: text
        text: Novúmque lumen íngere.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc, et in perpétuum.
      - type: text
        text: Amen.
  hymn.ales-di-i-n-ntius-96c2815cc6:
    role: hymn
    content:
      en:
      - type: text
        text: As the bird, whose clarion gay
      - type: text
        text: Sounds before the dawn is grey,
      - type: text
        text: Christ, who brings the spirit’s day,
      - type: text
        text: 'Calls us, close at hand:'
      - type: text
        text: Wake! he cries, and for my sake,
      - type: text
        text: From your eyes dull slumbers shake!
      - type: text
        text: Sober, righteous, chaste, awake!
      - type: text
        text: At the door I stand!
      - type: text
        text: Lord, to thee we lift on high
      - type: text
        text: 'Fervent prayer and bitter cry:'
      - type: text
        text: Hearts aroused to pray and sigh
      - type: text
        text: 'May not slumber more:'
      - type: text
        text: Break the sleep of death and time,
      - type: text
        text: Forged by Adam’s ancient crime;
      - type: text
        text: And the light of Eden’s prime
      - type: text
        text: To the world restore!
      - type: text
        text: Unto God the Father, Son,
      - type: text
        text: Holy Spirit, Three in One,
      - type: text
        text: One in Three, be glory done,
      - type: text
        text: Now and evermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Ales diéi núntius
      - type: text
        text: 'Lucem propínquam prǽcinit:'
      - type: text
        text: Nos excitátor méntium
      - type: text
        text: Iam Christus ad vitam vocat.
      - type: text
        text: Auférte, clamat, léctulos,
      - type: text
        text: 'Ægro sopóre désides:'
      - type: text
        text: Castíque, recti, ac sóbrii
      - type: text
        text: Vigiláte, iam sum próximus.
      - type: text
        text: Iesum ciámus vócibus,
      - type: text
        text: 'Flentes, precántes, sóbrii:'
      - type: text
        text: Inténta supplicátio
      - type: text
        text: Dormíre cor mundum vetat.
      - type: text
        text: 'Tu, Christe, somnum díscute:'
      - type: text
        text: 'Tu rumpe noctis víncula:'
      - type: text
        text: Tu solve peccátum vetus,
      - type: text
        text: Novúmque lumen íngere.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.audi-ben-gne-c-nditor-8bbd0ace2b:
    role: hymn
    content:
      en:
      - type: text
        text: O kind Creator, bow thine ear
      - type: text
        text: To mark the cry, to know the tear
      - type: text
        text: Before thy throne of mercy spent
      - type: text
        text: In this thy holy fast of Lent.
      - type: text
        text: 'Our hearts are open, Lord, to thee:'
      - type: text
        text: Thou knowest our infirmity;
      - type: text
        text: Pour out on all who seek thy face
      - type: text
        text: Abundance of thy pardoning grace.
      - type: text
        text: Our sins are many, this we know;
      - type: text
        text: Spare us, good Lord, thy mercy show;
      - type: text
        text: And for the honour of thy name
      - type: text
        text: Our fainting souls to life reclaim.
      - type: text
        text: Give us the self-control that springs
      - type: text
        text: From discipline of outward things,
      - type: text
        text: That fasting inward secretly
      - type: text
        text: The soul may purely dwell with thee.
      - type: text
        text: We pray thee, Holy Trinity,
      - type: text
        text: One God, unchanging Unity,
      - type: text
        text: That we from this our abstinence
      - type: text
        text: May reap the fruits of penitence.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Audi, benígne Cónditor,
      - type: text
        text: Nostras preces cum flétibus,
      - type: text
        text: In hoc sacro ieiúnio
      - type: text
        text: Fusas quadragenário.
      - type: text
        text: Scrutátor alme córdium,
      - type: text
        text: 'Infírma tu scis vírium:'
      - type: text
        text: Ad te revérsis éxhibe
      - type: text
        text: Remissiónis grátiam.
      - type: text
        text: Multum quidem peccávimus,
      - type: text
        text: 'Sed parce confiténtibus:'
      - type: text
        text: Ad nóminis laudem tui
      - type: text
        text: Confer medélam lánguidis.
      - type: text
        text: Concéde nostrum cónteri
      - type: text
        text: Corpus per abstinéntiam;
      - type: text
        text: Culpæ ut relínquant pábulum
      - type: text
        text: Ieiúna corda críminum.
      - type: text
        text: Præsta, beáta Trínitas,
      - type: text
        text: Concéde, simplex Únitas;
      - type: text
        text: Ut fructuósa sint tuis
      - type: text
        text: Ieiuniórum múnera.
      - type: text
        text: Amen.
  hymn.audi-ben-gne-c-nditor-90018473d6:
    role: hymn
    content:
      la:
      - type: text
        text: Audi, benígne Cónditor,
      - type: text
        text: Nostras preces cum flétibus,
      - type: text
        text: In hoc sacro ieiúnio
      - type: text
        text: Fusas quadragenário.
      - type: text
        text: Scrutátor alme córdium,
      - type: text
        text: 'Infírma tu scis vírium:'
      - type: text
        text: Ad te revérsis éxhibe
      - type: text
        text: Remissiónis grátiam.
      - type: text
        text: Multum quidem peccávimus,
      - type: text
        text: 'Sed parce confiténtibus:'
      - type: text
        text: Ad laudem tui nóminis
      - type: text
        text: Confer medélam lánguidis.
      - type: text
        text: Concéde nostrum cónteri
      - type: text
        text: Corpus per abstinéntiam;
      - type: text
        text: Culpæ ut relínquant pábulum
      - type: text
        text: Ieiúna corda críminum.
      - type: text
        text: Præsta, beáta Trínitas,
      - type: text
        text: Concéde, simplex Únitas;
      - type: text
        text: Ut fructuósa sint tuis
      - type: text
        text: Ieiuniórum múnera.
      - type: text
        text: Amen.
  hymn.aur-ra-c-lum-p-rpurat-686f4f3e67:
    role: hymn
    content:
      en:
      - type: text
        text: The morn had spread her crimson rays,
      - type: text
        text: When rang the skies with shouts of praise;
      - type: text
        text: Earth joined the joyful hymn to swell,
      - type: text
        text: That brought despair to vanquished hell.
      - type: text
        text: He comes victorious from the grave,
      - type: text
        text: The Lord omnipotent to save,
      - type: text
        text: And brings with him to light of day
      - type: text
        text: The saints who long imprisoned lay.
      - type: text
        text: Vain is the cavern’s three-fold ward —
      - type: text
        text: The stone, the seal, the armed guard;
      - type: text
        text: O death, no more thine arm we fear,
      - type: text
        text: The Victor’s tomb is now thy bier.
      - type: text
        text: Let hymns of joy to grief succeed,
      - type: text
        text: We know that Christ is risen indeed;
      - type: text
        text: We hear his white-robed angel’s voice,
      - type: text
        text: And in our risen Lord rejoice.
      - type: text
        text: With Christ we died, with Christ we rose,
      - type: text
        text: When at the font his name we chose;
      - type: text
        text: Oh, let not sin our robes defile,
      - type: text
        text: And turn to grief the paschal smile.
      - type: text
        text: '* To God the Father let us sing,'
      - type: text
        text: To God the Son, our risen King,
      - type: text
        text: And equally let us adore
      - type: text
        text: The Spirit, God forevermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Auróra cælum púrpurat,
      - type: text
        text: Æther resúltat láudibus,
      - type: text
        text: Mundus triúmphans iúbilat,
      - type: text
        text: 'Horrens avérnus ínfremit:'
      - type: text
        text: Rex ille dum fortíssimus
      - type: text
        text: De mortis inférno specu
      - type: text
        text: Patrum senátum líberum
      - type: text
        text: Edúcit ad vitæ iubar.
      - type: text
        text: Cuius sepúlcrum plúrimo
      - type: text
        text: Custóde signábat lapis,
      - type: text
        text: Victor triúmphat, et suo
      - type: text
        text: Mortem sepúlcro fúnerat.
      - type: text
        text: Sat fúneri, sat lácrimis,
      - type: text
        text: 'Sat est datum dolóribus:'
      - type: text
        text: Surréxit exstínctor necis,
      - type: text
        text: Clamat corúscans Ángelus.
      - type: text
        text: Ut sis perénne méntibus
      - type: text
        text: Paschále, Iesu, gáudium,
      - type: text
        text: A morte dira críminum
      - type: text
        text: Vitæ renátos líbera.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Et Fílio, qui a mórtuis
      - type: text
        text: Surréxit, ac Paráclito,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.aur-ra-iam-spargit-polum-2592988640:
    role: hymn
    content:
      en:
      - type: text
        text: The dawn is sprinkling in the east
      - type: text
        text: Its golden shower, as day flows in;
      - type: text
        text: 'Fast mount the pointed shafts of light:'
      - type: text
        text: Farewell to darkness and to sin!
      - type: text
        text: Away, ye midnight phantoms all!
      - type: text
        text: Away, despondence and despair!
      - type: text
        text: Whatever guilt the night has brought,
      - type: text
        text: Now let it vanish into air.
      - type: text
        text: So, Lord, when that last morning breaks,
      - type: text
        text: Looking to which we sigh and pray,
      - type: text
        text: O may it to thy minstrels prove
      - type: text
        text: The dawning of a better day.
      - type: text
        text: To God the Father glory be,
      - type: text
        text: And to his sole-begotten Son;
      - type: text
        text: Glory, O Holy Ghost, to thee,
      - type: text
        text: While everlasting ages run,
      - type: text
        text: Amen.
      la:
      - type: text
        text: 'Auróra iam spargit polum:'
      - type: text
        text: 'Terris dies illábitur:'
      - type: text
        text: 'Lucis resúltat spículum:'
      - type: text
        text: Discédat omne lúbricum.
      - type: text
        text: 'Phantásma noctis éxsulet:'
      - type: text
        text: 'Mentis reátus córruat:'
      - type: text
        text: Quidquid ténebris hórridum
      - type: text
        text: Nox áttulit culpæ, cadat.
      - type: text
        text: Ut mane, quod nos últimum
      - type: text
        text: Hic deprecámur cérnui,
      - type: text
        text: Cum luce nobis éffluat,
      - type: text
        text: Hoc dum canóre cóncrepat.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.aur-ra-iam-spargit-polum-babbb90f53:
    role: hymn
    content:
      la:
      - type: text
        text: 'Auróra iam spargit polum:'
      - type: text
        text: 'Terris dies illábitur:'
      - type: text
        text: 'Lucis resúltat spículum:'
      - type: text
        text: Discédat omne lúbricum.
      - type: text
        text: 'Phantásma noctis décidat:'
      - type: text
        text: 'Mentis reátus súbruat:'
      - type: text
        text: Quidquid ténebris hórridum
      - type: text
        text: Nox áttulit culpæ, cadat.
      - type: text
        text: Ut mane, quod nos últimum
      - type: text
        text: Hic deprecámur cérnui,
      - type: text
        text: Cum luce nobis éffluat,
      - type: text
        text: Hoc dum canóre cóncrepat.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc, et in perpétuum.
      - type: text
        text: Amen.
  hymn.aur-ra-lucis-r-tilat-748ba90804:
    role: hymn
    content:
      la:
      - type: text
        text: Auróra lucis rútilat,
      - type: text
        text: Cælum láudibus íntonat,
      - type: text
        text: Mundus exsúltans iúbilat,
      - type: text
        text: 'Gemens inférnus úlulat:'
      - type: text
        text: Cum Rex ille fortíssimus,
      - type: text
        text: Mortis confráctis víribus,
      - type: text
        text: Pede concúlcans tártara,
      - type: text
        text: Solvit a pœna míseros.
      - type: text
        text: Ille qui clausus lápide
      - type: text
        text: Custodítur sub mílite,
      - type: text
        text: Triúmphans pompa nóbili,
      - type: text
        text: Victor surgit de fúnere.
      - type: text
        text: Solútis iam gemítibus,
      - type: text
        text: Et inférni dolóribus,
      - type: text
        text: Quia surréxit Dóminus,
      - type: text
        text: Respléndens clamat Ángelus.
      - type: text
        text: Quǽsumus, Auctor ómnium,
      - type: text
        text: In hoc pascháli gáudio,
      - type: text
        text: Ab omni mortis ímpetu
      - type: text
        text: Tuum defénde pópulum.
      - type: text
        text: Glória tibi Dómine,
      - type: text
        text: Qui surrexíst[i] a mórtuis,
      - type: text
        text: Cum Patr[e] et Sancto Spíritu,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.c-li-deus-sanct-ssime-14d3c5429a:
    role: hymn
    content:
      la:
      - type: text
        text: Cæli Deus sanctíssime,
      - type: text
        text: Qui lúcidas centrum poli
      - type: text
        text: Candóre pingis ígneo,
      - type: text
        text: 'Augens decóro lúmine:'
      - type: text
        text: Quarto die qui flámmeam
      - type: text
        text: Solis rotam constítuens,
      - type: text
        text: Lunæ minístras órdinem,
      - type: text
        text: 'Vagósque cursus síderum:'
      - type: text
        text: Ut nóctibus, vel lúmini
      - type: text
        text: Diremptiónis términum,
      - type: text
        text: Primórdiis et ménsium
      - type: text
        text: Signum dares notíssimum;
      - type: text
        text: Illúmina cor hóminum,
      - type: text
        text: 'Abstérge sordes méntium:'
      - type: text
        text: 'Resólve culpæ vínculum:'
      - type: text
        text: Evérte moles críminum.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.c-li-deus-sanct-ssime-827bc9366f:
    role: hymn
    content:
      en:
      - type: text
        text: O God, whose hand hath spread the sky,
      - type: text
        text: And all its shining hosts on high,
      - type: text
        text: And painting it with fiery light,
      - type: text
        text: 'Made it so beauteous and so bright:'
      - type: text
        text: Thou, when the fourth day was begun,
      - type: text
        text: Didst frame the circle of the sun,
      - type: text
        text: And set the moon for ordered change,
      - type: text
        text: 'And planets for their wider range:'
      - type: text
        text: To night and day, by certain line,
      - type: text
        text: Their varying bounds thou didst assign;
      - type: text
        text: And gav’st a signal, known and meet,
      - type: text
        text: For months begun and months complete.
      - type: text
        text: 'Enlighten thou the hearts of men:'
      - type: text
        text: 'Polluted souls make pure again:'
      - type: text
        text: 'Unloose the bands of guilt within:'
      - type: text
        text: Remove the burden of our sin.
      - type: text
        text: Grant this, O Father, ever One
      - type: text
        text: With Christ thy sole-begotten Son,
      - type: text
        text: Whom, with the Spirit we adore,
      - type: text
        text: One God, both now and evermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Cæli Deus sanctíssime,
      - type: text
        text: Qui lúcidas mundi plagas
      - type: text
        text: Candóre pingis ígneo,
      - type: text
        text: 'Augens decóro lúmine:'
      - type: text
        text: Quarto die qui flámmeam
      - type: text
        text: Dum solis accéndis rotam,
      - type: text
        text: Lunæ minístras órdinem,
      - type: text
        text: 'Vagósque cursus síderum:'
      - type: text
        text: Ut nóctibus, vel lúmini
      - type: text
        text: Diremptiónis términum,
      - type: text
        text: Primórdiis et ménsium
      - type: text
        text: Signum dares notíssimum;
      - type: text
        text: 'Expélle noctem córdium:'
      - type: text
        text: 'Abstérge sordes méntium:'
      - type: text
        text: 'Resólve culpæ vínculum:'
      - type: text
        text: Evérte moles críminum.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.c-nditor-alme-s-derum-3f07c4dff2:
    role: hymn
    content:
      la:
      - type: text
        text: Cónditor alme síderum,
      - type: text
        text: Ætérna lux credéntium,
      - type: text
        text: Christe, Redémptor ómnium,
      - type: text
        text: Exáudi preces súpplicum.
      - type: text
        text: Qui cóndolens intéritu
      - type: text
        text: Mortis períre sǽculum,
      - type: text
        text: Salvásti mundum lánguidum,
      - type: text
        text: Donans reis remédium,
      - type: text
        text: Vergénte mundi véspere,
      - type: text
        text: Uti sponsus de thálamo,
      - type: text
        text: Egréssus honestíssima
      - type: text
        text: Vírginis matris cláusula.
      - type: text
        text: Cuius forti poténtiæ
      - type: text
        text: Genu curvántur ómnia;
      - type: text
        text: Cæléstia, terréstria
      - type: text
        text: Nutu faténtur súbdita.
      - type: text
        text: Te deprecámur, hágie,
      - type: text
        text: Ventúre iudex sǽculi,
      - type: text
        text: Consérva nos in témpore
      - type: text
        text: Hostis a telo pérfidi.
      - type: text
        text: Laus, honor, virtus, glória,
      - type: text
        text: Deo Patri, et Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.christe-qui-lux-es-et-dies-5b2a993361:
    role: hymn
    content:
      la:
      - type: text
        text: Christe, qui lux es et dies,
      - type: text
        text: Noctis tenébras détegis,
      - type: text
        text: Lucísque lumen créderis,
      - type: text
        text: Lumen beátum prǽdicans.
      - type: text
        text: Precámur sancte Dómine,
      - type: text
        text: 'defénde nos in hac nocte:'
      - type: text
        text: Sit nobis in te réquies,
      - type: text
        text: Quiétam noctem tríbue.
      - type: text
        text: Ne gravis somnus írruat,
      - type: text
        text: Nec hostis nos subrípiat,
      - type: text
        text: Nec caro illi conséntiens
      - type: text
        text: Nos tibi reos státuat.
      - type: text
        text: Oculi somnum cápiant,
      - type: text
        text: 'Cor ad te semper vígilet:'
      - type: text
        text: Déxtera tua prótegat
      - type: text
        text: Fámulos, qui te díligunt.
      - type: text
        text: Defénsor noster áspice,
      - type: text
        text: Insidiántes réprime,
      - type: text
        text: Gubérna tuos fámulos,
      - type: rubric
        text: Ad hunc Vers. genuflectatur
      - type: text
        text: Quos Sánguine mercátus es.
      - type: text
        text: Meménto nostri, Dómine,
      - type: text
        text: 'In gravi isto córpore:'
      - type: text
        text: Qui es defénsor ánimæ,
      - type: text
        text: Adésto nobis, Dómine.
      - type: text
        text: Præsta Pater omnípotens,
      - type: text
        text: Per Iesum Christum Dóminum,
      - type: text
        text: Qui tecum in perpétuum
      - type: text
        text: Regnat cum Sancto Spíritu.
      - type: text
        text: Amen.
  hymn.consors-pat-rni-l-minis-45775bc8db:
    role: hymn
    content:
      la:
      - type: text
        text: Consors patérni lúminis,
      - type: text
        text: Lux ipse lucis, et dies,
      - type: text
        text: 'Noctem canéndo rúmpimus:'
      - type: text
        text: Assíste postulántibus.
      - type: text
        text: Aufer ténebras méntium,
      - type: text
        text: Fuga catérvas dǽmonum,
      - type: text
        text: Expélle somnoléntiam,
      - type: text
        text: Ne pigritántes óbruat.
      - type: text
        text: Sic, Christe, nobis ómnibus
      - type: text
        text: Indúlgeas credéntibus,
      - type: text
        text: Ut prosit exorántibus,
      - type: text
        text: Quod præcinéntes psállimus.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.consors-pat-rni-l-minis-63eb7753e8:
    role: hymn
    content:
      en:
      - type: text
        text: O Light of Light, O Day-spring bright,
      - type: text
        text: 'Co-equal in thy Father’s light:'
      - type: text
        text: Assist us, as with prayer and psalm
      - type: text
        text: Thy servants break the twilight calm.
      - type: text
        text: All darkness from our minds dispel,
      - type: text
        text: 'And turn to flight the hosts of hell:'
      - type: text
        text: Bid sleepfulness our eyelids fly,
      - type: text
        text: Lest overwhelmed in sloth we lie.
      - type: text
        text: Jesu, thy pardon, kind and free,
      - type: text
        text: 'Bestow on us who trust in thee:'
      - type: text
        text: And as thy praises we declare,
      - type: text
        text: O with acceptance hear our prayer.
      - type: text
        text: O Father, that we ask be done,
      - type: text
        text: Through Jesus Christ, thine only Son;
      - type: text
        text: Who, with the Holy Ghost and thee,
      - type: text
        text: Doth live and reign eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Consors patérni lúminis,
      - type: text
        text: Lux ipse lucis, et dies,
      - type: text
        text: 'Noctem canéndo rúmpimus:'
      - type: text
        text: Assíste postulántibus.
      - type: text
        text: Aufer ténebras méntium,
      - type: text
        text: Fuga catérvas dǽmonum,
      - type: text
        text: Expélle somnoléntiam,
      - type: text
        text: Ne pigritántes óbruat.
      - type: text
        text: Sic, Christe, nobis ómnibus
      - type: text
        text: Indúlgeas credéntibus,
      - type: text
        text: Ut prosit exorántibus,
      - type: text
        text: Quod præcinéntes psállimus.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.cre-tor-alme-s-derum-190a7aa2e7:
    role: hymn
    content:
      en:
      - type: text
        text: Bright builder of the heavenly poles,
      - type: text
        text: Eternal light of faithful souls,
      - type: text
        text: Jesus, Redeemer of mankind,
      - type: text
        text: Our humble prayers vouchsafe to mind.
      - type: text
        text: Who, lest the fraud of hell’s black king
      - type: text
        text: Should all men to destruction bring,
      - type: text
        text: Didst, by an act of generous love,
      - type: text
        text: The fainting world’s physician prove.
      - type: text
        text: Who, that thou mightst our ransom pay
      - type: text
        text: And wash the stains of sin away,
      - type: text
        text: Wouldst from a Virgin’s womb proceed
      - type: text
        text: And on the cross a victim bleed.
      - type: text
        text: Whose glorious power, whose saving name
      - type: text
        text: No sooner any voice can frame,
      - type: text
        text: But heaven and earth and hell agree
      - type: text
        text: To honour them with trembling knee.
      - type: text
        text: Thee, Christ, who at the latter day
      - type: text
        text: Shalt be our Judge, we humbly pray
      - type: text
        text: Such arms of heavenly grace to send
      - type: text
        text: As may thy Church from foes defend.
      - type: text
        text: Be glory given and honour done
      - type: text
        text: To God the Father and the Son
      - type: text
        text: And to the Holy Ghost on high,
      - type: text
        text: From age to age eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Creátor alme síderum,
      - type: text
        text: Ætérna lux credéntium,
      - type: text
        text: Iesu, Redémptor ómnium,
      - type: text
        text: Inténde votis súpplicum.
      - type: text
        text: Qui dǽmonis ne fráudibus
      - type: text
        text: Períret orbis, ímpetu
      - type: text
        text: Amóris actus, lánguidi
      - type: text
        text: Mundi medéla factus es.
      - type: text
        text: Commúne qui mundi nefas
      - type: text
        text: Ut expiáres, ad crucem
      - type: text
        text: E Vírginis sacrário
      - type: text
        text: Intácta prodis víctima.
      - type: text
        text: Cuius potéstas glóriæ
      - type: text
        text: Noménque cum primum sonat,
      - type: text
        text: Et cǽlites et ínferi
      - type: text
        text: Treménte curvántur genu.
      - type: text
        text: Te deprecámur últimæ
      - type: text
        text: Magnum diéi Iúdicem,
      - type: text
        text: Armis supérnæ grátiæ
      - type: text
        text: Defénde nos ab hóstibus.
      - type: text
        text: Virtus, honor, laus, glória
      - type: text
        text: Deo Patri cum Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.deus-cre-tor-mnium-74819c4bb9:
    role: hymn
    content:
      la:
      - type: text
        text: Deus, creátor ómnium
      - type: text
        text: políque rector, véstiens
      - type: text
        text: diem decóro lúmine,
      - type: text
        text: noctem sopóris grátia,
      - type: text
        text: Artus solútos ut quies
      - type: text
        text: reddat labóris úsui
      - type: text
        text: mentésque fessas állevet
      - type: text
        text: luctúsque solvat ánxios,
      - type: text
        text: Grates perácto iam die
      - type: text
        text: et noctis exórtu preces,
      - type: text
        text: voti reos ut ádiuves,
      - type: text
        text: hymnum canéntes sólvimus.
      - type: text
        text: Te cordis ima cóncinant,
      - type: text
        text: te vox canóra cóncrepet,
      - type: text
        text: te díligat castus amor,
      - type: text
        text: te mens adóret sóbria,
      - type: text
        text: Ut cum profúnda cláuserit
      - type: text
        text: diem calígo nóctium,
      - type: text
        text: fides ténebras nésciat
      - type: text
        text: et nox fide relúceat.
      - type: text
        text: Dormíre mentem ne sinas,
      - type: text
        text: dormíre culpa nóverit,
      - type: text
        text: castis fides refrígerans,
      - type: text
        text: somni vapórem témperet.
      - type: text
        text: Exúta sensu lúbrico,
      - type: text
        text: te cordis alta sómnient;
      - type: text
        text: nec hostis ínvidi dolo,
      - type: text
        text: pavor quiétos súscitet.
      - type: text
        text: Christum rogámus, et Patrem,
      - type: text
        text: Christi Patrísque Spíritum;
      - type: text
        text: Unum potens per ómnia,
      - type: text
        text: Fove precántes Trínitas.
      - type: text
        text: Amen.
  hymn.ecce-iam-noctis-tenu-tur-umbra-405051d6b9:
    role: hymn
    content:
      en:
      - type: text
        text: Lo, the dim shadows of the night are waning;
      - type: text
        text: Lightsome and blushing, dawn of day returneth;
      - type: text
        text: Fervent in spirit, to the world’s Creator
      - type: text
        text: 'Pray we devoutly:'
      - type: text
        text: That he may pity sinners in their sighing,
      - type: text
        text: Banish all troubles, kindly health bestowing;
      - type: text
        text: And may he grant us, of his countless blessings,
      - type: text
        text: Peace that is endless.
      - type: text
        text: This be our portion, God forever blessed,
      - type: text
        text: Father eternal, Son, and Holy Spirit,
      - type: text
        text: Whose is the glory, which through all creation
      - type: text
        text: Ever resoundeth.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Ecce, iam noctis tenuátur umbra,
      - type: text
        text: 'Lux et auróræ rútilans corúscat:'
      - type: text
        text: Súpplices rerum Dóminum canóra
      - type: text
        text: 'Voce precémur:'
      - type: text
        text: Ut reos culpæ miserátus omnem
      - type: text
        text: Pellat angórem, tríbuat salútem,
      - type: text
        text: Donet et nobis bona sempitérnæ
      - type: text
        text: Múnera pacis.
      - type: text
        text: Præstet hoc nobis Déitas beáta
      - type: text
        text: Patris, ac Nati, paritérque Sancti
      - type: text
        text: Spíritus, cuius résonat per omnem
      - type: text
        text: Glória mundum.
      - type: text
        text: Amen.
  hymn.ecce-iam-noctis-tenu-tur-umbra-aeddb88f7a:
    role: hymn
    content:
      la:
      - type: text
        text: Ecce iam noctis tenuátur umbra,
      - type: text
        text: 'Lucis auróra rútilans corúscat:'
      - type: text
        text: Súpplices rerum Dóminum canóra
      - type: text
        text: 'Voce precémur:'
      - type: text
        text: Ut Deus nostri miserátus, omnem
      - type: text
        text: Pellat languórem, tríbuat salútem,
      - type: text
        text: Donet et nobis bona sempitérnæ
      - type: text
        text: Múnera pacis.
      - type: text
        text: Præstet hoc nobis Déitas beáta
      - type: text
        text: Patris, ac Nati, paritérque Sancti
      - type: text
        text: Spíritus, cuius réboat in omni
      - type: text
        text: Glória mundo.
      - type: text
        text: Amen.
  hymn.en-clara-vox-red-rguit-5569d5224a:
    role: hymn
    content:
      en:
      - type: text
        text: Hark, a herald voice is calling;
      - type: text
        text: “Christ is nigh,” it seems to say;
      - type: text
        text: “Cast away the dreams of darkness,
      - type: text
        text: O ye children of the day.”
      - type: text
        text: Startled at the solemn warning,
      - type: text
        text: Let the earth-bound soul arise;
      - type: text
        text: Christ, her sun, all sloth dispelling,
      - type: text
        text: Shines upon the morning skies.
      - type: text
        text: Lo, the Lamb, so long expected,
      - type: text
        text: Comes with pardon down from heaven;
      - type: text
        text: Let us haste, with tears of sorrow,
      - type: text
        text: One and all to be forgiven.
      - type: text
        text: So when next he comes with glory,
      - type: text
        text: Wrapping all the earth in fear,
      - type: text
        text: May he then as our defender
      - type: text
        text: On the clouds of heaven appear.
      - type: text
        text: Honour, glory, virtue, merit,
      - type: text
        text: To the Father and the Son,
      - type: text
        text: With the co-eternal Spirit,
      - type: text
        text: While eternal ages run.
      - type: text
        text: Amen.
      la:
      - type: text
        text: En clara vox redárguit
      - type: text
        text: 'Obscúra quæque, pérsonans:'
      - type: text
        text: Procul fugéntur sómnia,
      - type: text
        text: Ab alto Iesus prómicat.
      - type: text
        text: Mens iam resúrgat, tórpida,
      - type: text
        text: 'Non ámplius iacens humi:'
      - type: text
        text: Sidus refúlget iam novum,
      - type: text
        text: Ut tollat omne nóxium.
      - type: text
        text: En Agnus ad nos míttitur
      - type: text
        text: 'Laxáre gratis débitum:'
      - type: text
        text: Omnes simul cum lácrimis
      - type: text
        text: Precémur indulgéntiam.
      - type: text
        text: Ut cum secúndo fúlserit,
      - type: text
        text: Metúque mundum cínxerit,
      - type: text
        text: Non pro reátu púniat,
      - type: text
        text: Sed nos pius tunc prótegat.
      - type: text
        text: Virtus, honor, laus, glória
      - type: text
        text: Deo Patri cum Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.ex-more-docti-m-stico-6d8417e5d9:
    role: hymn
    content:
      en:
      - type: text
        text: The fast, as taught by holy lore,
      - type: text
        text: 'We keep in solemn course once more:'
      - type: text
        text: The fast to all men known, and bound
      - type: text
        text: In forty days of yearly round.
      - type: text
        text: The law and seers that were of old
      - type: text
        text: In diverse ways this Lent foretold,
      - type: text
        text: Which Christ, all seasons’ King and Guide,
      - type: text
        text: In after ages sanctified.
      - type: text
        text: More sparing therefore let us make
      - type: text
        text: The words we speak, the food we take,
      - type: text
        text: Our sleep and mirth, —and closer barred
      - type: text
        text: Be every sense in holy guard.
      - type: text
        text: Avoid the evil thoughts that roll
      - type: text
        text: Like waters o’er the heedless soul;
      - type: text
        text: Nor let the foe occasion find
      - type: text
        text: Our souls in slavery to bind.
      - type: text
        text: In prayer together let us fall,
      - type: text
        text: And cry for mercy, one and all,
      - type: text
        text: And weep before the Judge’s feet,
      - type: text
        text: And his avenging wrath entreat.
      - type: text
        text: Thy grace have we offended sore,
      - type: text
        text: By sins, O God, which we deplore;
      - type: text
        text: But pour upon us from on high,
      - type: text
        text: O pardoning One, thy clemency.
      - type: text
        text: Remember thou, though frail we be,
      - type: text
        text: That yet thine handiwork are we;
      - type: text
        text: Nor let the honour of thy name
      - type: text
        text: Be by another put to shame.
      - type: text
        text: Forgive the sin that we have wrought;
      - type: text
        text: 'Increase the good that we have sought:'
      - type: text
        text: That we at length, our wanderings o'er,
      - type: text
        text: May please thee here and evermore.
      - type: text
        text: Grant O thou Blessed Trinity,
      - type: text
        text: Grant, O Essential Unity,
      - type: text
        text: That this our fast of forty days
      - type: text
        text: May work our profit and thy praise.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Ex more docti mýstico
      - type: text
        text: Servémus hoc ieiúnium,
      - type: text
        text: Deno diérum círculo
      - type: text
        text: Ducto quater notíssimo.
      - type: text
        text: Lex et prophétæ prímitus
      - type: text
        text: Hoc prætulérunt, póstmodum
      - type: text
        text: Christus sacrávit, ómnium
      - type: text
        text: Rex atque factor témporum.
      - type: text
        text: Utámur ergo párcius
      - type: text
        text: Verbis, cibis et pótibus,
      - type: text
        text: Somno, iocis, et árctius
      - type: text
        text: Perstémus in custódia.
      - type: text
        text: Vitémus autem nóxia,
      - type: text
        text: 'Quæ súbruunt mentes vagas:'
      - type: text
        text: Nullúmque demus cállidi
      - type: text
        text: Hostis locum tyránnidi.
      - type: text
        text: Flectámus iram víndicem,
      - type: text
        text: Plorémus ante Iúdicem,
      - type: text
        text: Clamémus ore súpplici,
      - type: text
        text: 'Dicámus omnes cérnui:'
      - type: text
        text: Nostris malis offéndimus
      - type: text
        text: 'Tuam, Deus, cleméntiam:'
      - type: text
        text: Effúnde nobis désuper,
      - type: text
        text: Remíssor, indulgéntiam.
      - type: text
        text: Meménto quod sumus tui,
      - type: text
        text: 'Licet cadúci, plásmatis:'
      - type: text
        text: Ne des honórem nóminis
      - type: text
        text: Tui, precámur, álteri.
      - type: text
        text: Laxa malum, quod fécimus,
      - type: text
        text: 'Auge bonum, quod póscimus:'
      - type: text
        text: Placére quo tandem tibi
      - type: text
        text: Possímus hic, et pérpetim.
      - type: text
        text: Præsta, beáta Trínitas,
      - type: text
        text: Concéde, simplex Únitas,
      - type: text
        text: Ut fructuósa sint tuis
      - type: text
        text: Ieiuniórum múnera.
      - type: text
        text: Amen.
