          Regnans per omne sǽculum.
          Amen.
  hymn.rex-sempit-rne-c-litum-9244452d9a:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O thou, the heavens' eternal King,
          Creator, unto thee we sing,
          With God the Father ever One,
          Co-equal, co-eternal Son.

          Thy hand, when first the world began,
          Made in thine own pure image man,
          And linked to Adam, sprung from earth,
          A living soul of heavenly birth.

          And when by craft the envious foe
          Had marred thy noblest work below,
          Clothed in our flesh, thou didst restore
          The image thou hadst made before.

          Once wast thou born of Mary's womb;
          And now, new-born from out the tomb,
          O Christ, thou bidd'st us rise with thee
          From death to immortality.

          Eternal Shepherd, thou dost lave
          Thy flock in pure baptismal wave,
          That mystic bath, that grave of sin,
          Where ransomed souls new life begin.

          Redeemer, thou for us didst deign
          To hang upon the Cross of pain,
          And give for us the lavish price
          Of thine own blood in sacrifice.

          Grant, Lord, in thee each faithful mind
          Unceasing paschal joy may find;
          And from the death of sin set free
          Souls newly born to life by thee.

          To thee, once dead, who now dost live,
          All glory, Lord, thy people give,
          Whom, with the Father, we adore,
          And Holy Ghost forevermore.
          Amen.
      la:
      - type: text
        text: |-
          Rex sempitérne Cǽlitum,
          Rerum Creátor ómnium,
          Æquális ante sǽcula
          Semper Parénti Fílius:

          Nascénte qui mundo Faber
          Imáginem vultus tui
          Tradens Adámo, nóbilem
          Limo iugásti spíritum.

          Cum livor et fraus dǽmonis
          Fœdásset humánum genus:
          Tu, carne amíctus, pérditam
          Formam refórmas ártifex.

          Qui, natus olim e Vírgine,
          Nunc e sepúlcro násceris,
          Tecúmque nos a mórtuis
          Iubes sepúltos súrgere.

          Qui, pastor ætérnus, gregem
          Aqua lavas baptísmatis:
          Hæc est lavácrum méntium:
          Hæc est sepúlcrum críminum.

          Nobis diu qui débitæ
          Redémptor affíxus cruci,
          Nostræ dedísti pródigus
          Prétium salútis sánguinem.

          Ut sis perénne méntibus
          Paschále, Iesu, gáudium,
          A morte dira críminum
          Vitæ renátos líbera.

          * Deo Patri sit glória,
          Et Fílio, qui a mórtuis
          Surréxit, ac Paráclito,
          In sempitérna sǽcula.
          Amen.
  hymn.rex-sempit-rne-d-mine-5413c77774:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O thou, the heavens' eternal King,
          Creator, unto thee we sing,
          With God the Father ever One,
          Co-equal, co-eternal Son.

          Thy hand, when first the world began,
          Made in thine own pure image man,
          And linked to Adam, sprung from earth,
          A living soul of heavenly birth.

          And when by craft the envious foe
          Had marred thy noblest work below,
          Clothed in our flesh, thou didst restore
          The image thou hadst made before.
          So that thou might redeem man
          Whom thou hadst made
          And us to God might thou wouldst unite
          Through thy union with the flesh.
          Once wast thou born of Mary's womb;
          And now, new-born from out the tomb,
          O Christ, thou bidd'st us rise with thee
          From death to immortality.

          Eternal Shepherd, thou dost lave
          Thy flock in pure baptismal wave,
          That mystic bath, that grave of sin,
          Where ransomed souls new life begin.

          Redeemer, thou for us didst deign
          To hang upon the Cross of pain,
          And give for us the lavish price
          Of thine own blood in sacrifice.

          Grant, Lord, in thee each faithful mind
          Unceasing paschal joy may find;
          And from the death of sin set free
          Souls newly born to life by thee.
          To Thee Who, dead, again dost live,
          All glory, Lord, Thy people give;
          All glory, as is ever meet,
          To Father and to Paraclete.
          Amen.
      la:
      - type: text
        text: |-
          Rex sempitérne Dómine,
          Rerum Creátor ómnium,
          Qui eras ante sǽcula
          Semper cum Patre Fílius:

          Qui mundi in primórdio
          Adam plásmasti hóminem:
          Cui tuæ imágini
          Vultum dedísti símilem.

          Quem diábolus decéperat,
          Hostis humáni géneris,
          Cuius tu formam córporis
          Assúmere dignátus es:

          Ut hóminem redímeres,
          Quem ante iam plasmáveras:
          Et nos Deo coniúngeres,
          Per carnis contubérnium.

          Quem éditum ex Vírgine
          Pavéscit omnis ánima:
          Per quem et nos resúrgere
          Devóta mente crédimus.

          Qui nobis in Baptísmate
          Donásti indulgéntiam,
          Qui tenebámur vínculis
          Ligáti consciéntiæ.

          Qui Crucem propter hóminem
          Suscípere dignátus es:
          Dedísti tuum sánguinem
          Nostræ salútis prétium.

          Quǽsumus Auctor ómnium,
          In hoc Pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexísti a mórtuis,
          Cum Patre et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
  hymn.serm-ne-blando-angelus-8eea60e69a:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Sermóne blando Angelus
          Predíxit muliéribus:
          In Galilǽa Dóminus
          Vidéndus est quantócius.

          Illæ dum pergunt cóncite
          Apóstolis hoc dícere,
          Vidéntes eum vívere,
          Osculántur pedes Dómini.

          Quo ágnito discípuli
          In Galilǽam própere
          Pergunt vidére fáciem
          Desiderátam Dómini.

          Claro pascháli gáudio
          Sol mundo nitet rádio,
          Cum Christum iam Apóstoli
          Visu cernunt corpóreo.

          Osténsa sibi vúlnera,
          In Christi carne fúlgida,
          Resurrexísse Dóminum
          Voce faténtur pública.

          Rex Christe clementíssime,
          Tu corda nostra pósside:
          Ut tibi laudes débitas
          Reddámus omni témpore.

          Quǽsumus, Auctor ómnium,
          In hoc pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexísti a mórtuis,
          Cum Patre et Sancto Spíritu
          In sempitérna sǽcula.
          Amen.
  hymn.somno-ref-ctis-rtubus-00fcb2b01b:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Somno reféctis ártubus,
          Spreto cubíli, súrgimus:
          Nobis, Pater, canéntibus
          Adésse te depóscimus.

          Te lingua primum cóncinat,
          Te mentis ardor ámbiat:
          Ut áctuum sequéntium
          Tu, Sancte, sis exórdium.

          Cedant tenébræ lúmini,
          Et nox diúrno síderi,
          Ut culpa, quam nox íntulit,
          Lucis labáscat múnere.

          Precámur iídem súpplices,
          Noxas ut omnes ámputes,
          Et ore te canéntium
          Laudéris in perpetuum.

          * Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
  hymn.somno-ref-ctis-rtubus-7e627f3118:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Our limbs refreshed with slumber now,
          And sloth cast off, in prayer we bow;
          And while we sing thy praises dear,
          O Father, be thou present here.

          To thee our earliest morning song,
          To thee our hearts full powers belong;
          And thou, O Holy One, prevent
          Each following action and intent.

          As shades at morning flee away,
          And night before the star of day;
          So each transgression of the night
          Be purged by thee, celestial Light!

          Cut off, we pray thee, each offense,
          And every lust of thought and sense:
          That by their lips who thee adore
          Thou mayst be praised forevermore.

          Grant this, O Father ever One
          With Christ, thy sole-begotten Son,
          And Holy Ghost, whom all adore,
          Reigning and blest forevermore.
          Amen.
      la:
      - type: text
        text: |-
