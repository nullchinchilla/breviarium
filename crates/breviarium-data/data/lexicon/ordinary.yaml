          Let us pray.
          Grant, we beseech you, almighty God: * that we who keep the commemoration of your holy ones Benedict, Bernard, and Robert, † may also imitate their virtues.
          (but on the day of Bernard)
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
      - type: text
        text: (and if rubric 1951 or Friday they are always said)
      - type: citation
        text: Of Peace
      - type: antiphon
        text: Give peace, O Lord, in our days, for there is no other who fights for us except you, our God. (Alleluia.)
      - type: text
        text: ''
      - type: versicle
        text: Let there be peace in your strength. (Alleluia.)
      - type: response
        text: And abundance in your towers. (Alleluia.)
