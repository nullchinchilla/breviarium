  chapter.de-apostolis-026d23b622:
    role: chapter
    content:
      en:
      - type: citation
        text: Commemoration of the Holy Apostles Peter and Paul
      - type: antiphon
        text: Peter the Apostle, and Paul the Teacher of the Gentiles, have taught us thy law, O Lord.
      - type: text
        text: ''
      - type: versicle
        text: Thou shalt make them princes over all the earth.
      - type: response
        text: They shall be mindful of thy Name, O Lord.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, whose right hand caught the Blessed Peter when he walked upon the water, and began to sink, and thrice delivered his fellow-Apostle Paul from the deep of the sea, when he suffered shipwreck graciously hear us, and grant, for the sake of them both, that we also may attain everlasting glory.
      la:
      - type: citation
        text: De Apostolis
      - type: antiphon
        text: Petrus Apóstolus, et Paulus Doctor Géntium, ipsi nos docuérunt legem tuam Dómine.
      - type: text
        text: ''
      - type: versicle
        text: Constítues eos príncipes super omnem terram.
      - type: response
        text: Mémores erunt nóminis tui Dómine.
      - type: text
        text: |-
          Orémus.
          Deus, cuius déxtera beátum Petrum ambulántem in flúctibus, ne mergerétur, eréxit, et coapóstolum eius Paulum tértio naufragántem de profúndo pélagi liberávit: exáudi nos propítius, et concéde; ut ambórum méritis, æternitátis glóriam consequámur.
      en2:
      - type: citation
        text: Of the Apostles
      - type: antiphon
        text: Peter the Apostle and Paul, Teacher of the Nations, themselves have taught us your law, O Lord.
      - type: text
        text: ''
      - type: versicle
        text: You shall make them princes over all the earth.
      - type: response
        text: They shall be mindful of your name, O Lord.
      - type: text
        text: |-
          Let us pray.
          O God, whose right hand raised up blessed Peter as he walked upon the waves lest he should sink, and delivered his fellow Apostle Paul, as he suffered shipwreck a third time, from the depths of the sea: hear us graciously, and grant that, by the merits of both, we may attain the glory of eternity.
  chapter.de-apostolis-e9346f754b:
    role: chapter
    content:
      en:
      - type: citation
        text: Commemoration of the Holy Apostles Peter and Paul
      - type: antiphon
        text: These are glorious princes over all the earth, they loved one another in their lives, and in their death they were not divided.
      - type: text
        text: ''
      - type: versicle
        text: Their sound is gone out through all the earth.
      - type: text
        text: A. And their words to the ends of the world.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, whose right hand caught the Blessed Peter when he walked upon the water, and began to sink, and thrice delivered his fellow-Apostle Paul from the deep of the sea, when he suffered shipwreck graciously hear us, and grant, for the sake of them both, that we also may attain everlasting glory.
      la:
      - type: citation
        text: De Apostolis
      - type: antiphon
        text: Gloriósi príncipes terræ, quómodo in vita sua dilexérunt se, ita et in morte non sunt separáti.
      - type: text
        text: ''
      - type: versicle
        text: In omnem terram exívit sonus eórum.
      - type: response
        text: Et in fines orbis terræ verba eórum.
      - type: text
        text: 'Deus, cuius déxtera beátum Petrum ambulántem in flúctibus, ne mergerétur, eréxit, et coapóstolum eius Paulum tértio naufragántem de profúndo pélagi liberávit: exáudi nos propítius, et concéde; ut ambórum méritis, æternitátis glóriam consequámur.'
      en2:
      - type: citation
        text: Of the Apostles
      - type: antiphon
        text: Glorious princes of the earth, as in their life they loved one another, so also in death they were not separated.
      - type: text
        text: ''
      - type: versicle
        text: Their sound has gone forth into all the earth.
      - type: response
        text: And their words to the ends of the world.
      - type: text
        text: 'O God, whose right hand raised up blessed Peter as he walked upon the waves lest he should sink, and delivered his fellow Apostle Paul, as he suffered shipwreck a third time, from the depths of the sea: hear us graciously, and grant that, by the merits of both, we may attain the glory of eternity.'
  chapter.de-beata-maria-0368151478:
    role: chapter
    content:
      la:
      - type: citation
        text: De Beata Maria
      - type: antiphon
        text: Sancta Dei Génitrix, Virgo semper María, intercéde pro nobis ad Dóminum Deum nostrum. (Allelúia, allelúia.)
      - type: versicle
        text: Ora pro nobis sancta Dei Génetrix.
      - type: response
        text: Ut digni efficiámur promissiónibus Christi.
      - type: text
        text: |
          Orémus.
          Concéde nos fámulos tuos, quǽsumus, Dómine Deus, perpétua mentis et córporis sanitáte gaudére: et, gloriósa beátæ Maríæ semper Vírginis intercessióne, a præsénti liberári tristítia, et ætérna pérfrui lætítia.
          (sed tempore post Epiphaniam aut Septuagesimæ aut Quadragesimæ aut Passionis dicitur)
          Ave, Regína cælórum,
          Ave, Dómina Angelórum:
          Salve radix, salve porta,
          Ex qua mundo lux est orta:

          Gaude, Virgo gloriósa,
          Super omnes speciósa,
          Vale, o valde decóra,
          Et pro nobis Christum exóra.
      - type: versicle
        text: Dignáre me laudáre te, Virgo sacráta.
      - type: response
        text: Da mihi virtútem contra hostes tuos.
      - type: text
        text: |
          Orémus.
          Concéde, miséricors Deus, fragilitáti nostræ præsídium; ut, qui sanctæ Dei Genetrícis memóriam ágimus; intercessiónis eius auxílio, a nostris iniquitátibus resurgámus. Per eúndem Christum Dóminum nostrum. Amen.
          (sed Adventus dicitur)
          Alma Redemptóris Mater, quæ pérvia cæli porta manes,
          et stella maris, succúrre cadénti,
          Súrgere qui curat, pópulo: tu quæ genuísti,
          Natúra miránte, tuum sanctum Genitórem,
          Virgo prius ac postérius, Gabriélis ab ore
          Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Ángelus Dómini nuntiávit Maríæ.
      - type: response
        text: Et concépit de Spíritu Sancto.
      - type: text
        text: |
          Orémus.
          Grátiam tuam, quǽsumus, Dómine, méntibus nostris infúnde: ut, qui, Ángelo nuntiánte, Christi Fílii tui incarnatiónem cognóvimus; per passiónem eius et crucem, ad resurrectiónis glóriam perducámur. Per eúndem Christum Dóminum nostrum. Amen.
          (sed Nativitatis aut Epiphaniæ aut post partum dicitur)
          Alma Redemptóris Mater, quæ pérvia cæli
          Porta manes, et stella maris, succúrre cadénti,
          Súrgere qui curat, pópulo: tu quæ genuísti,
          Natúra miránte, tuum sanctum Genitórem,
          Virgo prius ac postérius, Gabriélis ab ore
          Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Post partum, Virgo, invioláta permansísti.
      - type: response
        text: Dei Génetrix, intercéde pro nobis.
      - type: text
        text: |
          Orémus.
          Deus, qui salútis ætérnæ, beátæ Maríæ virginitáte fecúnda, humáno géneri prǽmia præstitísti: tríbue, quǽsumus; ut ipsam pro nobis intercédere sentiámus, per quam merúimus auctórem vitæ suscípere, Dóminum nostrum Iesum Christum Fílium tuum. Amen.
          (sed Paschali dicitur)
          Regína cæli, lætáre, allelúia;
          Quia quem meruísti portáre, allelúia,
          Resurréxit, sicut dixit, allelúia:
          Ora pro nobis Deum, allelúia.
      - type: versicle
        text: Gaude et lætáre, Virgo María, allelúia.
      - type: response
        text: Quia surréxit Dóminus vere, allelúia.
      - type: text
        text: |-
          Orémus.
          Deus, qui per resurrectiónem Fílii tui, Dómini nostri Iesu Christi, mundum lætificáre dignátus es: præsta, quǽsumus; ut, per eius Genetrícem Vírginem Maríam, perpétuæ capiámus gáudia vitæ. Per eúndem Christum Dóminum nostrum. Amen.
      - type: rubric
        text: deinde dicitur
      - type: text
        text: |-
          Per eúndem Christum Dóminum nostrum.
          (sed post partum omittitur)
      - type: response
        text: Amen.
      - type: text
        text: |-
          (atque commune C10 aut commune C11 hi versus omittuntur)
          (atque rubrica 1951 aut feria 4 dicuntur semper)
      - type: citation
        text: De sancto Ioseph
      - type: antiphon
        text: Ipse Iesus erat incípiens quasi annórum trigínta ut putabátur fílius Ioseph. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Os iusti meditábitur sapiéntiam. (Allelúia.)
      - type: response
        text: Et lingua eius loquétur iudícium. (Allelúia.)
      - type: text
        text: (sed commune C4 aut commune C5 loco huius versus dicitur)
      - type: versicle
        text: Glória et divítiæ in domo eius. (Allelúia.)
      - type: response
        text: Et iustítia eius manet in sǽculum sǽculi. (Allelúia.)
      - type: rubric
        text: deinde dicitur
      - type: text
        text: 'Deus, qui ineffábili providéntia beátum Ioseph sanctíssimæ Genitrícis tuæ sponsum elígere dignátus es: præsta quǽsumus; ut quem protectórem venerámur in terris, intercessórem habére mereámur in cælis.'
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: (atque rubrica 1951 aut feria 3 dicuntur semper)
      - type: citation
        text: De SS. Benedicto, Bernardo et Roberto
      - type: antiphon
        text: Córpora Sanctórum in pace sepúlta sunt, et vivent nómina eórum in ætérnum. (Allelúia, allelúia.)
      - type: versicle
        text: Beáti quos elegísti, Dómine. (Allelúia.)
      - type: response
        text: Habitábunt in átriis tuis. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Præsta, quǽsumus, omnípotens Deus: * ut qui sanctórum tuórum Benedícti, Bernárdi et Robérti commemoratiónem cólimus, † eórum étiam virtútes imitémur.
          (sed die Bernardi)
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      - type: text
        text: (atque rubrica 1951 aut feria 7 dicuntur semper)
      - type: citation
        text: De Pace
      - type: antiphon
        text: Da pacem Dómine in diébus nostris, quia non est álius, qui pugnet pro nobis, nisi tu Deus noster. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Fiat pax in virtúte tua. (Allelúia.)
      - type: response
        text: Et abundántia in túrribus tuis. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Deus, a quo sancta desidéria, recta consília, et iusta sunt ópera: da servis tuis illam, quam mundus dare non potest, pacem; ut et corda nostra mandátis tuis dédita, et hóstium subláta formídine, témpora sint tua protectióne tranquílla.
      - type: prayer
        text: 'Per Dóminum nostrum Iesum Christum, Fílium tuum: qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.'
      - type: response
        text: Amen.
      en2:
      - type: citation
        text: Of the Blessed Mary
      - type: antiphon
        text: Holy Mother of God, ever-Virgin Mary, intercede for us to the Lord our God. (Alleluia, alleluia.)
      - type: versicle
        text: Pray for us, holy Mother of God.
      - type: response
        text: That we may be made worthy of the promises of Christ.
      - type: text
        text: |
          Let us pray.
          Grant, we beseech you, O Lord God, that we your servants may rejoice in perpetual health of mind and body: and, by the glorious intercession of blessed Mary ever-Virgin, be freed from present sorrow, and enjoy eternal gladness.
          (but in the time after Epiphany or Septuagesima or Lent or Passiontide is said)
          Hail, O Queen of heaven,
          Hail, O Lady of Angels:
          Hail, root; hail, gateway,
          Through whom the Light of the world was born:
      
          Rejoice, O glorious Virgin,
          Fairer than all others,
          Farewell, O most beautiful,
          And intercede for us with Christ.
      - type: versicle
        text: Graciously grant me to praise you, O sacred Virgin.
      - type: response
        text: Give me strength against your enemies.
      - type: text
        text: |
          Let us pray.
          Grant a refuge to our frailty, O merciful God; that we who keep the memory of the holy Mother of God, may, through the aid of her intercession, rise up from our iniquities. Through the same Christ our Lord. Amen.
          (but in Advent is said)
          Loving Mother of the Redeemer, who remain the ever-open gate of heaven,
          and star of the sea, help a fallen people
          that strives to rise: you who brought forth,
          to the wonder of nature, your holy Creator,
          Virginal before and after, receiving from the mouth of Gabriel
          that Ave, have mercy on sinners.
      - type: versicle
        text: The Angel of the Lord announced to Mary.
      - type: response
        text: And she conceived by the Holy Spirit.
      - type: text
        text: |
          Let us pray.
          Pour forth, we beseech you, O Lord, your grace into our hearts: that we who have come to know the Incarnation of Christ your Son through the message of an Angel, may through his Passion and Cross be brought to the glory of the Resurrection. Through the same Christ our Lord. Amen.
          (but in the Nativity or Epiphany season or after the birth is said)
          Loving Mother of the Redeemer, who remain the ever-open
          Gateway of heaven, and star of the sea, help a fallen people
          that strives to rise: you who brought forth,
          to the wonder of nature, your holy Creator,
          Virginal before and after, receiving from the mouth of Gabriel
          that Ave, have mercy on sinners.
      - type: versicle
        text: After giving birth, O Virgin, you remained inviolate.
      - type: response
        text: Mother of God, intercede for us.
      - type: text
        text: |
          Let us pray.
          O God, who by the fruitful virginity of blessed Mary have bestowed upon the human race the rewards of eternal salvation: grant, we beseech you, that we may experience her intercession for us, through whom we merited to receive the Author of life, our Lord Jesus Christ your Son. Amen.
          (but in Paschal time is said)
          Rejoice, O Queen of heaven, alleluia;
          For he whom you merited to bear, alleluia,
          Has risen, as he said, alleluia:
          Pray for us to God, alleluia.
      - type: versicle
        text: Rejoice and be glad, O Virgin Mary, alleluia.
      - type: response
        text: For the Lord has truly risen, alleluia.
      - type: text
        text: |-
          Let us pray.
          O God, who were pleased to give joy to the world through the Resurrection of your Son our Lord Jesus Christ: grant, we beseech you, that through his Mother, the Virgin Mary, we may lay hold of the joys of eternal life. Through the same Christ our Lord. Amen.
      - type: rubric
        text: then is said
      - type: text
        text: |-
          Through the same Christ our Lord.
          (but after the birth it is omitted)
      - type: response
        text: Amen.
      - type: text
        text: |-
          (and if the common C10 or common C11 these verses are omitted)
          (and if rubric 1951 or Wednesday they are always said)
      - type: citation
        text: Of Saint Joseph
      - type: antiphon
        text: Jesus himself was beginning to be about thirty years of age, being considered, as was supposed, the son of Joseph. (Alleluia.)
      - type: text
        text: ''
      - type: versicle
        text: The mouth of the just shall meditate wisdom. (Alleluia.)
      - type: response
        text: And his tongue shall speak judgment. (Alleluia.)
      - type: text
        text: (but the common C4 or common C5 is said in place of this verse)
      - type: versicle
        text: Glory and wealth shall be in his house. (Alleluia.)
      - type: response
        text: And his justice endures for ever and ever. (Alleluia.)
      - type: rubric
        text: then is said
      - type: text
        text: 'O God, who in your ineffable providence were pleased to choose blessed Joseph as the spouse of your most holy Mother: grant, we beseech you, that we may merit to have as our intercessor in heaven him whom we venerate as our protector on earth.'
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
      - type: text
        text: (and if rubric 1951 or Tuesday they are always said)
      - type: citation
        text: Of Saints Benedict, Bernard, and Robert
      - type: antiphon
        text: The bodies of the Saints have been buried in peace, and their names shall live for ever. (Alleluia, alleluia.)
      - type: versicle
        text: Blessed are those whom you have chosen, O Lord. (Alleluia.)
      - type: response
        text: They shall dwell in your courts. (Alleluia.)
      - type: text
        text: |-
          Let us pray.
          Grant, we beseech you, almighty God: * that we who keep the commemoration of your holy ones Benedict, Bernard, and Robert, † may also imitate their virtues.
          (but on the day of Bernard)
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
      - type: text
        text: (and if rubric 1951 or Saturday they are always said)
      - type: citation
        text: Of Peace
      - type: antiphon
        text: Give peace, O Lord, in our days, for there is no other who fights for us except you, our God. (Alleluia.)
      - type: text
        text: ''
      - type: versicle
        text: Let there be peace in your strength. (Alleluia.)
      - type: response
        text: And abundance in your towers. (Alleluia.)
      - type: text
        text: |-
          Let us pray.
          O God, from whom are holy desires, right counsels, and just works: give to your servants that peace which the world cannot give; that both our hearts may be devoted to your commandments, and, the fear of enemies being removed, our times may be tranquil under your protection.
      - type: prayer
        text: 'Through our Lord Jesus Christ, your Son: who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.'
      - type: response
        text: Amen.
  chapter.de-beata-maria-3eda778b56:
    role: chapter
    content:
      la:
      - type: citation
        text: De Beata Maria
      - type: antiphon
        text: 'Sancta María, succúrre míseris, iuva pusillánimes, réfove flébiles, ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu: séntiant omnes tuum iuvámen, quicúmque célebrant tuam sanctam commemoratiónem.'
      - type: antiphon
        text: Sancta María, succúrre míseris, iuva pusillánimes, réfove flébiles, ora pro pópulo, intérveni pro clero, intercéde pro devóto fœmíneo sexu
      - type: rubric
        text: deinde dicuntur semper
      - type: versicle
        text: Ora pro nobis sancta Dei Génetrix.
      - type: response
        text: Ut digni efficiámur promissiónibus Christi.
      - type: text
        text: |
          Orémus.
          Concéde nos fámulos tuos, quǽsumus, Dómine Deus, perpétua mentis et córporis sanitáte gaudére: et, gloriósa beátæ Maríæ semper Vírginis intercessióne, a præsénti liberári tristítia, et ætérna pérfrui lætítia.
          (sed tempore post partum loco horum versuum dicuntur)
          Alma Redemptóris Mater, quæ pérvia cæli
          Porta manes, et stella maris, succúrre cadénti,
          Súrgere qui curat, pópulo: tu quæ genuísti,
          Natúra miránte, tuum sanctum Genitórem,
          Virgo prius ac postérius, Gabriélis ab ore
          Sumens illud Ave, peccatórum miserére.
      - type: versicle
        text: Post partum, Virgo, invioláta permansísti.
      - type: response
        text: Dei Génetrix, intercéde pro nobis.
      - type: text
        text: |-
          Orémus.
          Deus, qui salútis ætérnæ, beátæ Maríæ virginitáte fecúnda, humáno géneri prǽmia præstitísti: tríbue, quǽsumus; ut ipsam pro nobis intercédere sentiámus, per quam merúimus auctórem vitæ suscípere, Dóminum nostrum Iesum Christum Fílium tuum. Amen.
      en2:
      - type: citation
        text: Of the Blessed Mary
      - type: antiphon
        text: 'Holy Mary, come to the aid of the wretched, help the fainthearted, comfort the sorrowful, pray for the people, intercede for the clergy, intercede for the devout feminine sex: may all who celebrate your holy memory feel your assistance.'
      - type: antiphon
        text: Holy Mary, come to the aid of the wretched, help the fainthearted, comfort the sorrowful, pray for the people, intercede for the clergy, intercede for the devout feminine sex
      - type: rubric
        text: then the following are always said
      - type: versicle
        text: Pray for us, holy Mother of God.
      - type: response
        text: That we may be made worthy of the promises of Christ.
      - type: text
        text: |
          Let us pray.
          Grant, we beseech you, O Lord God, that we your servants may rejoice in perpetual health of mind and body: and, by the glorious intercession of blessed Mary ever-Virgin, be freed from present sorrow, and enjoy eternal gladness.
          (but in the time after the birth, in place of these verses are said)
          Loving Mother of the Redeemer, who remain the ever-open
          Gateway of heaven, and star of the sea, help a fallen people
          that strives to rise: you who brought forth,
          to the wonder of nature, your holy Creator,
          Virginal before and after, receiving from the mouth of Gabriel
          that Ave, have mercy on sinners.
      - type: versicle
        text: After giving birth, O Virgin, you remained inviolate.
      - type: response
        text: Mother of God, intercede for us.
      - type: text
        text: |-
          Let us pray.
          O God, who by the fruitful virginity of blessed Mary have bestowed upon the human race the rewards of eternal salvation: grant, we beseech you, that we may experience her intercession for us, through whom we merited to receive the Author of life, our Lord Jesus Christ your Son. Amen.
