  short-reading.1-pet-5-8-9-7272d8b1ba:
    role: short_reading
    content:
      en:
      - type: citation
        text: 1 Pet 5:8-9
      - type: text
        text: 'Brothers: Be sober and watch: because your adversary the devil, as a roaring lion, goeth about seeking whom he may devour. Whom resist ye, strong in faith.'
      - type: versicle
        text: But thou, O Lord, have mercy upon us.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 1 Pet 5:8-9
      - type: text
        text: 'Fratres: Sóbrii estóte, et vigiláte: quia adversárius vester diábolus tamquam leo rúgiens círcuit, quærens quem dévoret: cui resístite fortes in fide.'
      - type: versicle
