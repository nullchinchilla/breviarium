      en:
      - type: short_response
        text: Come to my rescue * O God, Lord of hosts.
      - type: response
        text: Come to my rescue * O God, Lord of hosts.
      - type: versicle
        text: Show us thy face, and we shall be saved.
      - type: response
        text: O God, Lord of hosts.
      - type: versicle
        text: Glory be to the Father, and to the Son, * and to the Holy Ghost.
      - type: response
        text: As it was in the beginning, is now, * and ever shall be, world without end. Amen.
      - type: response
        text: Come to my rescue * O God, Lord of hosts.
      la:
      - type: short_response
        text: Veni ad liberándum nos, * Dómine, Deus virtútum.
      - type: response
        text: Veni ad liberándum nos, * Dómine, Deus virtútum.
      - type: versicle
        text: Osténde fáciem tuam, et salvi érimus.
      - type: response
