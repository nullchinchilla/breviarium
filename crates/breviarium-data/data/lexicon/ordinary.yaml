      - type: response
        text: That the Lord has reigned from the wood, alleluia.
      - type: text
        text: |-
          Let us pray.
          O God, who willed that your Son should undergo the gibbet of the Cross for us, so that you might drive out from us the power of the enemy: grant to us your servants that we may attain the grace of the Resurrection.
