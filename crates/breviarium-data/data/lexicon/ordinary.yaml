          Amen.
  hymn.consors-pat-rni-l-minis-c0d8793e4e:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Consors patérni lúminis,
          Lux ipse lucis, et dies,
          Noctem canéndo rúmpimus:
          Assíste postulántibus.

          Aufer ténebras méntium,
          Fuga catérvas dǽmonum,
          Expélle somnoléntiam,
          Ne pigritántes óbruat.

          Sic, Christe, nobis ómnibus
          Indúlgeas credéntibus,
          Ut prosit exorántibus,
          Quod præcinéntes psállimus.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          Companion of the Father's light,
          Yourself the light of light and day,
          We break the night with singing:
          Be present with us as we pray.
      
          Take away the darkness of our minds,
          Drive off the hordes of demons,
          Dispel our drowsiness,
          Lest it overwhelm the slothful.
      
          So, O Christ, show indulgence
          To all of us who believe,
          That the psalms we sing before you
          May profit those who pray.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.cre-tor-alme-s-derum-190a7aa2e7:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Bright builder of the heavenly poles,
          Eternal light of faithful souls,
          Jesus, Redeemer of mankind,
          Our humble prayers vouchsafe to mind.

          Who, lest the fraud of hell’s black king
          Should all men to destruction bring,
          Didst, by an act of generous love,
          The fainting world’s physician prove.

          Who, that thou mightst our ransom pay
          And wash the stains of sin away,
          Wouldst from a Virgin’s womb proceed
          And on the cross a victim bleed.

          Whose glorious power, whose saving name
          No sooner any voice can frame,
          But heaven and earth and hell agree
          To honour them with trembling knee.

          Thee, Christ, who at the latter day
          Shalt be our Judge, we humbly pray
          Such arms of heavenly grace to send
          As may thy Church from foes defend.

          Be glory given and honour done
          To God the Father and the Son
          And to the Holy Ghost on high,
          From age to age eternally.
          Amen.
      la:
      - type: text
        text: |-
          Creátor alme síderum,
          Ætérna lux credéntium,
          Iesu, Redémptor ómnium,
          Inténde votis súpplicum.

          Qui dǽmonis ne fráudibus
          Períret orbis, ímpetu
          Amóris actus, lánguidi
          Mundi medéla factus es.

          Commúne qui mundi nefas
          Ut expiáres, ad crucem
          E Vírginis sacrário
          Intácta prodis víctima.

          Cuius potéstas glóriæ
          Noménque cum primum sonat,
          Et cǽlites et ínferi
          Treménte curvántur genu.

          Te deprecámur últimæ
          Magnum diéi Iúdicem,
          Armis supérnæ grátiæ
          Defénde nos ab hóstibus.

          Virtus, honor, laus, glória
          Deo Patri cum Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
