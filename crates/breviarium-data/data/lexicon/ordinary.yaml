  collect.v-sita-qu-sumus-d-mine-habitati-nem-istam-et-omn-f350bb990f:
    role: collect
    content:
      en:
      - type: text
        text: Visit, we beseech thee, O Lord, this dwelling, and drive far from it the snares of the enemy; let thy holy angels dwell herein to preserve us in peace, and let thy blessing be always upon us.
      la:
      - type: text
        text: 'Vísita, quǽsumus, Dómine, habitatiónem istam, et omnes insídias inimíci ab ea longe repélle: Ángeli tui sancti hábitent in ea, qui nos in pace custódiant; et benedíctio tua sit super nos semper.'
      en2:
      - type: text
        text: 'Visit, we pray, O Lord, this dwelling, and drive far from it all the snares of the enemy: let your holy Angels dwell in it, to keep us in peace; and let your blessing be upon us always.'
  hymn.ad-cenam-agni-pr-vidi-4a3d948b5c:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Ad cenam Agni próvidi,
          Et stolis albis cándidi,
          Post tránsitum maris Rubri,
          Christo canámus Príncipi.

          Cuius corpus sanctíssimum,
          In ara crucis tórridum,
          Cruóre eius róseo
          Gustándo vívimus Deo.

          Protécti Paschæ véspere
          A devastánte Angelo,
          Erépti de duríssimo
          Pharaónis império.

          Iam Pascha nostrum Christus est,
          Qui immolátus agnus est:
          Sinceritátis ázyma,
          Caro eius obláta est.

          O vere digna hóstia,
          Per quam fracta sunt tártara,
          Redémpta plebs captiváta,
          Réddita vitæ prǽmia.

          Consúrgit Christus túmulo,
          Victor redit de bárathro,
          Tyránnum trudens vínculo,
          Et Paradísum réserans.

          Quǽsumus, Auctor ómnium,
          In hoc pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexíst[i] a mórtuis,
          Cum Patr[e] et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          To the supper of the Lamb made ready,
          And clothed in garments white and bright,
          After the crossing of the Red Sea,
          Let us sing to Christ the Prince.
      
          Whose most holy body,
          Consumed upon the altar of the Cross,
          By drinking of his crimson Blood
          We live for God.
      
          Protected on the evening of the Passover
          From the devastating Angel,
          Delivered from the most harsh
          Dominion of Pharaoh.
      
          Now Christ our Pasch is sacrificed,
          Who is the Lamb immolated:
          The unleavened bread of sincerity,
          His flesh is offered.
      
          O truly worthy Victim,
          Through whom the depths of hell were broken,
          The captive people were redeemed,
          And the rewards of life restored.
      
          Christ rises from the tomb,
          Victor returning from the abyss,
          Thrusting the tyrant into chains,
          And opening Paradise.
      
          We pray, O Author of all things,
          In this paschal joy,
          From every assault of death
          Defend your people.
      
          Glory to you, O Lord,
          Who rose from the dead,
          With the Father and the Holy Spirit,
          For everlasting ages.
          Amen.
  hymn.ad-r-gias-agni-dapes-b44cb8c347:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          At the Lamb’s high feast we sing
          Praise to our victorious King,
          Who hath washed us in the tide
          Flowing from his piercèd side.

          Praise we him whose love divine
          Gives the guests his blood for wine,
          Gives his body for the feast,
          Love the victim, love the priest.

          Where the paschal blood is poured,
          Death’s dark angel sheathes his sword;
          Israel’s hosts triumphant go
          Through the wave that drowns the foe.

          Christ, the Lamb whose blood was shed,
          Paschal victim, paschal bread;
          With sincerity and love
          Eat we manna from above.

          Mighty victim from the sky,
          Powers of hell beneath thee lie;
          Death is conquered in the fight;
          Thou hast brought us life and light.

          Now thy banner thou dost wave;
          Vanquished Satan and the grave;
          Angels join his praise to tell —
          See o’erthrown the prince of hell.

          Paschal triumph, paschal joy,
          Only sin can this destroy;
          From the death of sin set free,
          Souls re-born, dear Lord, in Thee.

          Hymns of glory, songs of praise,
          Father, unto thee we raise;
          Risen Lord, all praise to thee,
          Ever with the Spirit be.
          Amen.
      la:
      - type: text
        text: |-
          Ad régias Agni dapes,
          Stolis amícti cándidis,
          Post tránsitum Maris Rubri,
          Christo canámus Príncipi:

          Divína cuius cáritas
          Sacrum propínat sánguinem,
          Almíque membra córporis
          Amor sacérdos ímmolat.

          Sparsum cruórem póstibus
          Vastátor horret Ángelus:
          Fugítque divísum mare;
          Mergúntur hostes flúctibus.

          Iam Pascha nostrum Christus est
          Paschális idem víctima,
          Et pura puris méntibus
          Sinceritátis ázyma.

          O vera cæli víctima,
          Subiécta cui sunt tártara,
          Solúta mortis víncula,
          Recépta vitæ prǽmia.

          Victor, subáctis ínferis,
          Trophǽa Christus éxplicat;
          Cælóque apérto, súbditum
          Regem tenebrárum trahit.

          Ut sis perénne méntibus
          Paschále, Iesu, gáudium,
          A morte dira críminum
          Vitæ renátos líbera.

          Deo Patri sit glória,
          Et Fílio, qui a mórtuis
          Surréxit, ac Paráclito,
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
