  hymn.iam-christe-sol-iust-ti-a407b2c556:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iam Christe sol iustítiæ,
          Mentis diéscant ténebræ:
          Virtútum ut lux rédeat,
          Terris diem cum réparas.

          Dans tempus acceptábile,
          Et pǽnitens cor tríbue,
          Convértat ut benígnitas
          Quos longa suffert píetas.

          Quiddámque pæniténtiæ
          Da ferre, quamvis grávium,
          Maióre tuo múnere,
          Quo démptio fit críminum.

          Dies venit, dies tua,
          In qua reflórent ómnia:
          Lætémur in hac ad tuam
          Per hanc redúcti grátiam.

          Te rerum univérsitas,
          Clemens, adóret, Trínitas,
          Et nos novi per véniam,
          Novum canámus cánticum.
          Amen.
      en2:
      - type: text
        text: |-
          Now, O Christ, Sun of justice,
          Let the darkness of minds grow bright:
          That the light of the virtues may return
          As you restore day to the earth.
      
          Granting an acceptable time,
          Grant also a repentant heart,
          That your kindness may convert
          Those whom a long-suffering devotion endures.
      
          Grant us to bear some measure
          Of penance, even for grave sins,
          By your greater gift,
          Through which sins are taken away.
      
          The day comes, your day,
          In which all things reflourish:
          Let us rejoice in this, brought back
          To your path by your grace.
      
          May the universe of creation,
          O merciful Trinity, adore you,
          And may we, made new through pardon,
          Sing a new song.
          Amen.
  hymn.iam-lucis-orto-s-dere-a8374afd13:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iam lucis orto sídere,
          Deum precémur súpplices,
          Ut in diúrnis áctibus
          Nos servet a nocéntibus.

          Linguam refrénans témperet,
          Ne litis horror ínsonet:
          Visum fovéndo cóntegat,
          Ne vanitátes háuriat.

          Sint pura cordis íntima,
          Absístat et vecórdia;
          Carnis terat supérbiam
          Potus cibíque párcitas.

          Ut, cum dies abscésserit,
          Noctémque sors redúxerit,
          Mundi per abstinéntiam
          Ipsi canámus glóriam.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc et in perpétuum.
          Amen.
      en2:
      - type: text
        text: |-
          Now that the morning star has risen,
          Let us humbly pray to God,
          That in our daily actions
          He may keep us from all harm.
      
          May he hold back and bridle the tongue,
          Lest the din of strife ring out:
          May he guard the eyes with care,
          Lest they drink in vanities.
      
          Let the depths of the heart be pure,
          And let folly be far away;
          May sparing use of food and drink
          Curb the pride of the flesh.
      
          That when the day shall pass away
          And fortune bring back the night,
          Pure through our abstinence from the world,
          We may ourselves sing his glory.
      
          To God the Father be glory,
          And to his only Son,
          With the Spirit the Paraclete,
          Both now and for ever.
          Amen.
  hymn.iam-lucis-orto-s-dere-ad9331c74e:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Now in the sun's new dawning ray,
          Lowly of heart, our God we pray
          That he from harm may keep us free
          In all the deeds this day shall see.

          May fear of him our tongues restrain,
          Lest strife unguarded speech should stain:
          His favouring care our guardian be,
          Lest our eyes feed on vanity.

          May every heart be pure from sin
          And folly find no place therein:
          Scant need of food, excess denied,
          Wear down in us the body's pride.

          That when the light of day is gone,
          And night in course shall follow on.
          We, free from cares the world affords,
          May chant the praise that is our Lord's.

          All laud to God the Father be,
          All praise, Eternal Son, to thee:
          All glory, as is ever meet,
          To God the holy Paraclete.
          Amen.
