      la:
      - type: text
        text: Summæ Parens cleméntiæ,
      - type: text
        text: Mundi regis qui máchinam,
      - type: text
        text: Uníus et substántiæ,
      - type: text
        text: 'Trinúsque persónis Deus:'
      - type: text
        text: Nostros pius cum cánticis
      - type: text
        text: 'Fletus benígne súscipe:'
      - type: text
        text: Ut corde puro sórdium
      - type: text
        text: Te perfruámur lárgius.
      - type: text
        text: Lumbos, iecúrque mórbidum
      - type: text
        text: Flammis adúre cóngruis,
      - type: text
        text: Accíncti ut artus éxcubent,
      - type: text
        text: Luxu remóto péssimo.
      - type: text
        text: Quicúmque ut horas nóctium
      - type: text
        text: Nunc concinéndo rúmpimus,
      - type: text
        text: Ditémur omnes áffatim
      - type: text
        text: Donis beátæ pátriæ.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.t-rna-c-li-gl-ria-2ca8b4a2c1:
    role: hymn
    content:
      la:
      - type: text
        text: Ætérna cæli glória,
      - type: text
        text: Beáta spes mortálium,
      - type: text
        text: Celsi Tonántis Únice,
      - type: text
        text: 'Castǽque proles Vírginis:'
      - type: text
        text: Da déxteram surgéntibus,
      - type: text
        text: Exsúrgat et mens sóbria,
      - type: text
        text: Flagrans et in laudem Dei
      - type: text
        text: Grates repéndat débitas.
      - type: text
        text: Ortus refúlget Lúcifer,
      - type: text
        text: 'Sparsámque lucem núntiat:'
      - type: text
        text: 'Cadit calígo nóctium:'
      - type: text
        text: Lux sancta nos illúminet.
      - type: text
        text: Manénsque nostris sénsibus,
      - type: text
        text: Noctem repéllat sǽculi,
      - type: text
        text: Omníque fine diéi
      - type: text
        text: Purgáta servet péctora.
      - type: text
        text: Quæsíta iam primum fides
      - type: text
        text: 'Radícet altis sénsibus:'
      - type: text
        text: Secúnda spes congáudeat,
      - type: text
        text: Qua maior exstat cáritas.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc, et in perpétuum.
      - type: text
        text: Amen.
  hymn.t-rna-c-li-gl-ria-ecea611d73:
    role: hymn
    content:
      en:
      - type: text
        text: O Christ, whose glory fills the heaven,
      - type: text
        text: Our only hope, in mercy given;
      - type: text
        text: Child of a Virgin meek and pure;
      - type: text
        text: 'Son of the Highest evermore:'
      - type: text
        text: Grant us thine aid thy praise to sing,
      - type: text
        text: As opening days new duties bring;
      - type: text
        text: That with the light our life may be
      - type: text
        text: Renewed and sanctified by thee.
      - type: text
        text: The morning star fades from the sky,
      - type: text
        text: 'The sun breaks forth; night’s shadows fly:'
      - type: text
        text: 'O Thou, true Light, upon us shine:'
      - type: text
        text: Our darkness turn to light divine.
      - type: text
        text: Within us grant thy light to dwell;
      - type: text
        text: And from our souls dark sins expel;
      - type: text
        text: Cleanse thou our minds from stain of ill,
      - type: text
        text: And with thy peace our bosoms fill.
      - type: text
        text: To us strong faith forever give,
      - type: text
        text: With joyous hope, in thee to live;
      - type: text
        text: That life’s rough way may ever be
      - type: text
        text: Made strong and pure by charity.
      - type: text
        text: All laud to God the Father be,
      - type: text
        text: 'All praise, Eternal Son, to thee:'
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To God the holy Paraclete,
      - type: text
        text: Amen.
      la:
      - type: text
        text: Ætérna cæli glória,
      - type: text
        text: Beáta spes mortálium,
      - type: text
        text: Summi Tonántis Únice,
      - type: text
        text: 'Castǽque proles Vírginis:'
      - type: text
        text: Da déxteram surgéntibus,
      - type: text
        text: Exsúrgat et mens sóbria,
      - type: text
        text: Flagrans et in laudem Dei
      - type: text
        text: Grates repéndat débitas.
      - type: text
        text: Ortus refúlget Lúcifer,
      - type: text
        text: 'Præítque solem núntius:'
      - type: text
        text: 'Cadunt tenébræ nóctium:'
      - type: text
        text: Lux sancta nos illúminet.
      - type: text
        text: Manénsque nostris sénsibus,
      - type: text
        text: Noctem repéllat sǽculi,
      - type: text
        text: Omníque fine témporis
      - type: text
        text: Purgáta servet péctora.
      - type: text
        text: Quæsíta iam primum fides
      - type: text
        text: 'In corde radíces agat:'
      - type: text
        text: Secúnda spes congáudeat,
      - type: text
        text: Qua maior exstat cáritas.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.t-rne-rerum-c-nditor-4230ee49c5:
    role: hymn
    content:
      la:
      - type: text
        text: Ætérne rerum Cónditor,
      - type: text
        text: Noctem diémque qui regis,
      - type: text
        text: Et témporum das témpora,
      - type: text
        text: Ut álleves fastídium.
      - type: text
        text: Præco diéi iam sonat,
      - type: text
        text: Noctis profúndæ pérvigil,
      - type: text
        text: Noctúrna lux viántibus,
      - type: text
        text: A nocte noctem ségregans.
      - type: text
        text: Hoc excitátus Lúcifer
      - type: text
        text: Solvit polum calígine,
      - type: text
        text: Hoc omnis errónum cohors
      - type: text
        text: Viam nocéndi déserit.
      - type: text
        text: Hoc nauta vires cólligit,
      - type: text
        text: 'Pontíque mitéscunt freta:'
      - type: text
        text: Hoc, ipsa Petr[a] Ecclésiæ,
      - type: text
        text: Canénte, culpam díluit.
      - type: text
        text: Surgámus ergo strénue,
      - type: text
        text: Gallus iacéntes éxcitat,
      - type: text
        text: Et somnoléntos íncrepat,
      - type: text
        text: Gallus negántes árguit.
      - type: text
        text: Gallo canénte spes redit,
      - type: text
        text: Ægris salus refúnditur,
      - type: text
        text: Mucro latrónis cónditur,
      - type: text
        text: Lapsis fides revértitur.
      - type: text
        text: Iesu labéntes réspice,
      - type: text
        text: 'Et nos vidéndo córrige:'
      - type: text
        text: Si réspicis, lapsus cadunt,
      - type: text
        text: Fletúque culpa sólvitur.
      - type: text
        text: Tu lux refúlge sénsibus,
      - type: text
        text: 'Mentísque somnum díscute:'
      - type: text
        text: Te nostra vox primum sonet,
      - type: text
        text: Et vota solvámus tibi.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc et in perpétuum.
      - type: text
        text: Amen.
  hymn.t-rne-rerum-c-nditor-f7eb5cd54f:
    role: hymn
    content:
      en:
      - type: text
        text: Maker of all, eternal King,
      - type: text
        text: 'Who day and night about dost bring:'
      - type: text
        text: Who weary mortals to relieve,
      - type: text
        text: 'Dost in their times the seasons give:'
      - type: text
        text: Now the shrill cock proclaims the day,
      - type: text
        text: And calls the sun’s awak’ning ray
      - type: text
        text: The wand’ring pilgrim’s guiding light,
      - type: text
        text: That marks the watches night by night.
      - type: text
        text: Roused at the note, the morning star
      - type: text
        text: 'Heaven’s dusky veil uplifts afar:'
      - type: text
        text: Night’s vagrant bands no longer roam,
      - type: text
        text: But from their dark ways hie them home.
      - type: text
        text: The encouraged sailor’s fears are o’er,
      - type: text
        text: 'The foaming billows rage no more:'
      - type: text
        text: Lo! e’en the very Church’s rock
      - type: text
        text: Melts at the crowing of the cock.
      - type: text
        text: O let us then like men arise;
      - type: text
        text: The cock rebukes our slumbering eyes,
      - type: text
        text: Bestirs who still in sleep would lie,
      - type: text
        text: And shames who would their Lord deny.
      - type: text
        text: New hope his clarion-note awakes,
      - type: text
        text: Sickness the feeble frame forsakes,
      - type: text
        text: The robber sheathes his lawless sword,
      - type: text
        text: Faith to the fallen is restored.
      - type: text
        text: Look on us, Jesu, when we fall,
      - type: text
        text: 'And with thy look our souls recall:'
      - type: text
        text: If thou but look, our sins are gone,
      - type: text
        text: And with due tears our pardon won.
      - type: text
        text: Shed through our hearts thy piercing ray,
      - type: text
        text: 'Our souls’ dull slumber drive away:'
      - type: text
        text: Thy name be first on every tongue,
      - type: text
        text: To thee our earliest praises sung.
      - type: text
        text: All laud to God the Father be,
      - type: text
        text: All praise, Eternal Son, to thee,
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To God the holy Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Ætérne rerum Cónditor,
      - type: text
        text: Noctem diémque qui regis,
      - type: text
        text: Et témporum das témpora,
      - type: text
        text: Ut álleves fastídium.
      - type: text
        text: Noctúrna lux viántibus
      - type: text
        text: A nocte noctem ségregans,
      - type: text
        text: Præco diéi iam sonat,
      - type: text
        text: Iubárque solis évocat.
      - type: text
        text: Hoc excitátus Lúcifer
      - type: text
        text: 'Solvit polum calígine:'
      - type: text
        text: Hoc omnis errónum cohors
      - type: text
        text: Viam nocéndi déserit.
      - type: text
        text: Hoc nauta vires cólligit,
      - type: text
        text: 'Pontíque mitéscunt freta:'
      - type: text
        text: Hoc, ipsa petra Ecclésiæ,
      - type: text
        text: Canénte, culpam díluit.
      - type: text
        text: 'Surgámus ergo strénue:'
      - type: text
        text: Gallus iacéntes éxcitat,
      - type: text
        text: Et somnoléntos íncrepat,
      - type: text
        text: Gallus negántes árguit.
      - type: text
        text: Gallo canénte, spes redit,
      - type: text
        text: Ægris salus refúnditur,
      - type: text
        text: Mucro latrónis cónditur,
      - type: text
        text: Lapsis fides revértitur.
      - type: text
        text: Iesu, labántes réspice,
      - type: text
        text: 'Et nos vidéndo córrige:'
      - type: text
        text: Si réspicis, labes cadunt,
      - type: text
        text: Fletúque culpa sólvitur.
      - type: text
        text: Tu, lux, refúlge sénsibus,
      - type: text
        text: 'Mentísque somnum díscute:'
      - type: text
        text: Te nostra vox primum sonet,
      - type: text
        text: Et vota solvámus tibi.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.te-lucis-ante-t-rminum-33af4d5940:
    role: hymn
    content:
      la:
      - type: text
        text: Te lucis ante términum,
      - type: text
        text: Rerum Creátor, póscimus,
      - type: text
        text: Ut sólita cleméntia
      - type: text
        text: Sis præsul ad custódiam.
      - type: text
        text: Procul recédant sómnia,
      - type: text
        text: Et nóctium phantásmata;
      - type: text
        text: Hostémque nostrum cómprime,
      - type: text
        text: Ne polluántur córpora.
      - type: text
        text: '* Præsta, Pater omnípotens,'
      - type: text
        text: Per Iesum Christum Dóminum,
      - type: text
        text: Qui tecum in perpétuum
      - type: text
        text: Regnat cum Sancto Spíritu.
      - type: text
        text: Amen.
  hymn.te-lucis-ante-t-rminum-f252b6676d:
    role: hymn
    content:
      en:
      - type: text
        text: Before the ending of the day,
      - type: text
        text: Creator of the world, we pray
      - type: text
        text: That with thy wonted favor thou
      - type: text
        text: Wouldst be our guard and keeper now.
      - type: text
        text: From all ill dreams defend our eyes,
      - type: text
        text: From nightly fears and fantasies;
      - type: text
        text: Tread under foot our ghostly foe,
      - type: text
        text: That no pollution we may know.
      - type: text
        text: '* O Father, that we ask be done,'
      - type: text
        text: Through Jesus Christ, thine only Son;
      - type: text
        text: Who, with the Holy Ghost and thee,
      - type: text
        text: Doth live and reign eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Te lucis ante términum,
      - type: text
        text: Rerum Creátor, póscimus,
      - type: text
        text: Ut pro tua cleméntia
      - type: text
        text: Sis præsul et custódia.
      - type: text
        text: Procul recédant sómnia,
      - type: text
        text: Et nóctium phantásmata;
      - type: text
        text: Hostémque nostrum cómprime,
      - type: text
        text: Ne polluántur córpora.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.tell-ris-alme-c-nditor-b999d46410:
    role: hymn
    content:
      en:
      - type: text
        text: Earth's mighty Maker, whose command
      - type: text
        text: Raised from the sea the solid land;
      - type: text
        text: And drove each billowy heap away,
      - type: text
        text: 'And bade the earth stand firm for aye:'
      - type: text
        text: That so, with flowers of golden hue,
      - type: text
        text: The seeds of each it might renew;
      - type: text
        text: And fruit-trees bearing fruit might yield,
      - type: text
        text: 'And pleasant pasture of the field:'
      - type: text
        text: Our spirit’s rankling wounds efface
      - type: text
        text: 'With dewy freshness of thy grace:'
      - type: text
        text: That grief may cleanse each deed of ill,
      - type: text
        text: And o’er each lust may triumph still.
      - type: text
        text: Let every soul thy law obey,
      - type: text
        text: And keep from every evil way;
      - type: text
        text: Rejoice each promised good to win,
      - type: text
        text: And flee from every mortal sin.
      - type: text
        text: Hear thou our prayer, Almighty King!
      - type: text
        text: Hear thou our praises, while we sing,
      - type: text
        text: Adoring with the heavenly host,
      - type: text
        text: The Father, Son, and Holy Ghost!
      - type: text
        text: Amen.
      la:
      - type: text
        text: Tellúris alme Cónditor,
      - type: text
        text: Mundi solum qui séparans,
      - type: text
        text: Pulsis aquæ moléstiis,
      - type: text
        text: 'Terram dedísti immóbilem:'
      - type: text
        text: Ut germen aptum próferens,
      - type: text
        text: Fulvis decóra flóribus,
      - type: text
        text: Fecúnda fructu sísteret,
      - type: text
        text: Pastúmque gratum rédderet.
      - type: text
        text: Mentis perústæ vúlnera
      - type: text
        text: 'Munda viróre grátiæ:'
      - type: text
        text: Ut facta fletu díluat,
      - type: text
        text: Motúsque pravos átterat.
      - type: text
        text: 'Iussis tuis obtémperet:'
      - type: text
        text: 'Nullis malis appróximet:'
      - type: text
        text: Bonis repléri gáudeat,
      - type: text
        text: Et mortis ictum nésciat.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.tell-ris-ingens-c-nditor-0a8f97f5e3:
    role: hymn
    content:
      la:
      - type: text
        text: Tellúris ingens Cónditor,
      - type: text
        text: Mundi solum qui éruens,
      - type: text
        text: Pulsis aquæ moléstiis,
      - type: text
        text: 'Terram dedíst[i] immóbilem:'
      - type: text
        text: Ut germen aptum próferens,
      - type: text
        text: Fulvis decóra flóribus,
      - type: text
        text: Fecúnda fructu sísteret,
      - type: text
        text: Pastúmque gratum rédderet.
      - type: text
        text: Mentis perústæ vúlnera
      - type: text
        text: 'Munda viróre grátiæ:'
      - type: text
        text: Ut facta fletu díluat,
      - type: text
        text: Motúsque pravos átterat.
      - type: text
        text: 'Iussis tuis obtémperet:'
      - type: text
        text: 'Nullis malis appróximet:'
      - type: text
        text: Bonis repléri gáudeat,
      - type: text
        text: Et mortis actum nésciat.
      - type: text
        text: Præsta, Pater piíssime,
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.tu-trinit-tis-unitas-82421ce659:
    role: hymn
    content:
      la:
      - type: text
        text: Tu, Trinitátis Unitas,
      - type: text
        text: Orbem poténter quæ regis,
      - type: text
        text: Atténde laudis cánticum,
      - type: text
        text: Quod excubántes psállimus.
      - type: text
        text: Nam léctulo consúrgimus
      - type: text
        text: Noctis quiéto témpore,
      - type: text
        text: Ut flagitémus vúlnerum
      - type: text
        text: A te medélam ómnium.
      - type: text
        text: Quo fraude quidquid dǽmonum
      - type: text
        text: In nóctibus delíquimus,
      - type: text
        text: Abstérgat illud cǽlitus
      - type: text
        text: Tuæ potéstas glóriæ.
      - type: text
        text: Ne corpus adsit sórdidum,
      - type: text
        text: Nec torpor instet córdium,
      - type: text
        text: Ne críminis contágio
      - type: text
        text: Tepéscat ardor spíritus.
      - type: text
        text: Ob hoc, Redémptor, quǽsumus,
      - type: text
        text: Reple tuo nos lúmine,
      - type: text
        text: Per quod diérum círculis
      - type: text
        text: Nullis ruámus áctibus.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.tu-trinit-tis-unitas-b970709677:
    role: hymn
    content:
      en:
      - type: text
        text: O Three in One, and One in Three,
      - type: text
        text: 'Who rulest all things mightily:'
      - type: text
        text: Bow down to hear the songs of praise
      - type: text
        text: Which, freed from bonds of sleep, we raise.
      - type: text
        text: While lingers yet the peace of night,
      - type: text
        text: 'We rouse us from our slumbers light:'
      - type: text
        text: That might of instant prayer may win
      - type: text
        text: The healing balm for wounds of sin.
      - type: text
        text: If, by the wiles of Satan caught,
      - type: text
        text: This night-time we have sinned in aught,
      - type: text
        text: That sin Thy glorious power to-day,
      - type: text
        text: From heaven descending, cleanse away.
      - type: text
        text: Let naught impure our bodies stain,
      - type: text
        text: No laggard sloth our souls detain,
      - type: text
        text: No taint of sin our spirits know,
      - type: text
        text: To chill the fervor of their glow.
      - type: text
        text: Wherefore, Redeemer grant that we
      - type: text
        text: 'Fulfilled with thine own light may be:'
      - type: text
        text: That, in our course, from day to day,
      - type: text
        text: By no misdeed we fall away.
      - type: text
        text: Grant this, O Father ever One
      - type: text
        text: With Christ, thy sole-begotten Son,
      - type: text
        text: And Holy Ghost, whom all adore,
      - type: text
        text: Reigning and blest forevermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Tu, Trinitátis Unitas,
      - type: text
        text: Orbem poténter quæ regis,
      - type: text
        text: Atténde laudis cánticum,
      - type: text
        text: Quod excubántes psállimus.
      - type: text
        text: Nam léctulo consúrgimus
      - type: text
        text: Noctis quiéto témpore,
      - type: text
        text: Ut flagitémus ómnium
      - type: text
        text: A te medélam vúlnerum.
      - type: text
        text: Quo fraude quidquid dǽmonum
      - type: text
        text: In nóctibus delíquimus,
      - type: text
        text: Abstérgat illud cǽlitus
      - type: text
        text: Tuæ potéstas glóriæ.
      - type: text
        text: Ne corpus astet sórdidum,
      - type: text
        text: Nec torpor instet córdium,
      - type: text
        text: Ne críminis contágio
      - type: text
        text: Tepéscat ardor spíritus.
      - type: text
        text: Ob hoc, Redémptor, quǽsumus,
      - type: text
        text: Reple tuo nos lúmine,
      - type: text
        text: Per quod diérum círculis
      - type: text
        text: Nullis ruámus áctibus.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.verbum-sup-rnum-pr-diens-6beccf4b5a:
    role: hymn
    content:
      en:
      - type: text
        text: Celestial Word, to this our earth
      - type: text
        text: Sent down from God's eternal clime,
      - type: text
        text: To save mankind by mortal birth
      - type: text
        text: Into a world of change and time;
      - type: text
        text: Enlighten our hearts; vain hopes destroy;
      - type: text
        text: And in thy love's consuming fire
      - type: text
        text: Fill all the soul with heavenly joy,
      - type: text
        text: And melt the dross of low desire.
      - type: text
        text: So when the Judge of quick and dead
      - type: text
        text: Shall bid his awful summons come,
      - type: text
        text: To whelm the guilty soul with dread,
      - type: text
        text: And call the blessed to their home.
      - type: text
        text: Saved from the whirling, black abyss,
      - type: text
        text: Forevermore to us be given
      - type: text
        text: To share the feast of saintly bliss,
      - type: text
        text: And see the face of God in heaven.
      - type: text
        text: To God the Father and the Son
      - type: text
        text: Our songs with one accord we raise;
      - type: text
        text: And to the Holy Spirit, One
      - type: text
        text: With them, be ever equal praise
      - type: text
        text: Amen.
      la:
      - type: text
        text: Verbum supérnum, pródiens
      - type: text
        text: A Patre olim éxiens,
      - type: text
        text: Qui natus orbi súbvenis,
      - type: text
        text: Cursu declívi témporis.
      - type: text
        text: Illúmina nunc péctora,
      - type: text
        text: Tuóque amóre cóncrema;
      - type: text
        text: Audíto ut præcónio
      - type: text
        text: Sint pulsa tandem lúbrica.
      - type: text
        text: Iudéxque cum post áderis
      - type: text
        text: Rimári facta péctoris,
      - type: text
        text: Reddens vicem pro ábditis,
      - type: text
        text: Iustísque regnum pro bonis.
      - type: text
        text: Non demum arctémur malis
      - type: text
        text: Pro qualitáte críminis;
      - type: text
        text: Sed cum beátis cómpotes
      - type: text
        text: Simus perénnes cælibes.
      - type: text
        text: Laus, honor, virtus, glória,
      - type: text
        text: Deo Patri, et Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
  hymn.verbum-sup-rnum-pr-diens-86a18cd66b:
    role: hymn
    content:
      en:
      - type: text
        text: Celestial Word, to this our earth
      - type: text
        text: Sent down from God's eternal clime,
      - type: text
        text: To save mankind by mortal birth
      - type: text
        text: Into a world of change and time;
      - type: text
        text: Enlighten our hearts; vain hopes destroy;
      - type: text
        text: And in thy love's consuming fire
      - type: text
        text: Fill all the soul with heavenly joy,
      - type: text
        text: And melt the dross of low desire.
      - type: text
        text: So when the Judge of quick and dead
      - type: text
        text: Shall bid his awful summons come,
      - type: text
        text: To whelm the guilty soul with dread,
      - type: text
        text: And call the blessed to their home.
      - type: text
        text: Saved from the whirling, black abyss,
      - type: text
        text: Forevermore to us be given
      - type: text
        text: To share the feast of saintly bliss,
      - type: text
        text: And see the face of God in heaven.
      - type: text
        text: To God the Father and the Son
      - type: text
        text: Our songs with one accord we raise;
      - type: text
        text: And to the Holy Spirit, One
      - type: text
        text: With them, be ever equal praise
      - type: text
        text: Amen.
      la:
      - type: text
        text: Verbum supérnum, pródiens
      - type: text
        text: E Patris ætérni sinu,
      - type: text
        text: Qui natus orbi súbvenis,
      - type: text
        text: 'Labénte cursu témporis:'
      - type: text
        text: Illúmina nunc péctora,
      - type: text
        text: Tuóque amóre cóncrema;
      - type: text
        text: Ut cor cadúca déserens
      - type: text
        text: Cæli volúptas ímpleat.
      - type: text
        text: Ut, cum tribúnal Iúdicis
      - type: text
        text: Damnábit igni nóxios,
      - type: text
        text: Et vox amíca débitum
      - type: text
        text: Vocábit ad cælum pios;
      - type: text
        text: Non esca flammárum nigros
      - type: text
        text: Volvámur inter túrbines,
      - type: text
        text: Vultu Dei sed cómpotes
      - type: text
        text: Cæli fruámur gáudiis.
      - type: text
        text: '* Patri, simúlque Fílio,'
      - type: text
        text: Tibíque, Sancte Spíritus,
      - type: text
        text: Sicut fuit, sit iúgiter
      - type: text
        text: Sæclum per omne glória.
      - type: text
        text: Amen.
  hymn.vex-lla-regis-pr-deunt-32ee565ceb:
    role: hymn
    content:
      la:
      - type: text
        text: 'Vexílla Regis pródeunt:'
      - type: text
        text: Fulget Crucis mystérium,
      - type: text
        text: Quo carne carnis Cónditor
      - type: text
        text: Suspénsus est patíbulo.
      - type: text
        text: Quo vulnerátus ínsuper
      - type: text
        text: Mucróne diro lánceæ,
      - type: text
        text: Ut nos laváret crímine,
      - type: text
        text: Manávit und[a] et sánguine.
      - type: text
        text: Impléta sunt quæ cóncinit
      - type: text
        text: David fidéli cármine,
      - type: text
        text: 'Dicens: In natiónibus'
      - type: text
        text: Regnávit a ligno Deus.
      - type: text
        text: Arbor decór[a] et fúlgida,
      - type: text
        text: Ornáta Regis púrpura,
      - type: text
        text: Elécta digno stípite
      - type: text
        text: Tam sancta membra tángere.
      - type: text
        text: Beáta, cuius bráchiis
      - type: text
        text: Sæcli pepéndit prétium,
      - type: text
        text: Statéra facta córporis,
      - type: text
        text: Prædámque tulit tártari.
      - type: text
        text: (nisi rubrica cisterciensis)
      - type: heading
        text: Sequens stropha dicitur flexis genibus.
      - type: text
        text: (nisi rubrica cisterciensis)
      - type: text
        text: O Crux, ave, spes única,
      - type: text
        text: In hac triúmphi glória
      - type: text
        text: (sed tempore Passionis)
      - type: text
        text: Hoc Passiónis témpore
      - type: text
        text: (sed tempore Paschali)
      - type: text
        text: In hoc Pascháli gáudio
      - type: text
        text: Auge piis iustítiam,
      - type: text
        text: Reísque dona véniam.
      - type: text
        text: Te summa, Deus, Trínitas,
      - type: text
        text: 'Colláudet omnis spíritus:'
      - type: text
        text: Quos per Crucis mystérium
      - type: text
        text: Salvas, rege per sǽcula.
      - type: text
        text: Amen.
  hymn.vex-lla-regis-pr-deunt-f3456ff328:
    role: hymn
    content:
      en:
      - type: text
        text: Abroad the regal banners fly,
      - type: text
        text: Now shines the cross’s mystery;
      - type: text
        text: Upon it Life did death endure,
      - type: text
        text: And yet by death did life procure.
      - type: text
        text: Who, wounded with a direful spear,
      - type: text
        text: Did, purposely to wash us clear
      - type: text
        text: From stain of sin, pour out a flood
      - type: text
        text: Of precious water mixed with blood.
      - type: text
        text: That which the prophet-king of old
      - type: text
        text: Hath in mysterious verse foretold,
      - type: text
        text: Is now accomplished, whilst we see
      - type: text
        text: God ruling nations from a tree.
      - type: text
        text: O lovely and refulgent tree,
      - type: text
        text: Adorned with purpled majesty;
      - type: text
        text: Culled from a worthy stock, to bear
      - type: text
        text: Those limbs which sanctifièd were.
      - type: text
        text: Blest tree, whose happy branches bore
      - type: text
        text: The wealth that did the world restore;
      - type: text
        text: The beam that did that body weigh
      - type: text
        text: Which raised up hell’s expected prey.
      - type: heading
        text: The following verse is said on bended knee.
      - type: text
        text: O Cross, our one reliance, hail!
      - type: text
        text: On this triumphant day avail
      - type: text
        text: (sed tempore Passionis)
      - type: text
        text: This holy Passiontide avail
      - type: text
        text: (sed tempore Paschali)
      - type: text
        text: Thou joy of Eastertide, avail
      - type: text
        text: To give fresh merit to the saint,
      - type: text
        text: And pardon to the penitent.
      - type: text
        text: Blest Trinity, salvation’s spring,
      - type: text
        text: May every soul thy praises sing;
      - type: text
        text: To those thou grantest conquest by
      - type: text
        text: The holy cross, rewards apply.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Vexílla Regis pródeunt;
      - type: text
        text: Fulget Crucis mystérium,
      - type: text
        text: Qua Vita mortem pértulit,
      - type: text
        text: Et morte vitam prótulit.
      - type: text
        text: Quæ, vulneráta lánceæ
      - type: text
        text: Mucróne diro, críminum
      - type: text
        text: Ut nos laváret sórdibus,
      - type: text
        text: Manávit unda et sánguine.
      - type: text
        text: Impléta sunt quæ cóncinit
      - type: text
        text: David fidéli cármine,
      - type: text
        text: 'Dicéndo natiónibus:'
      - type: text
        text: Regnávit a ligno Deus.
      - type: text
        text: Arbor decóra et fúlgida,
      - type: text
        text: Ornáta Regis púrpura,
      - type: text
        text: Elécta digno stípite
      - type: text
        text: Tam sancta membra tángere.
      - type: text
        text: Beáta, cuius brácchiis
      - type: text
        text: Prétium pepéndit sǽculi,
      - type: text
        text: Statéra facta córporis,
      - type: text
        text: Tulítque prædam tártari.
      - type: heading
        text: Sequens stropha dicitur flexis genibus.
      - type: text
        text: O Crux, ave, spes única,
      - type: text
        text: In hac triúmphi glória
      - type: text
        text: (sed tempore Passionis)
      - type: text
        text: Hoc Passiónis témpore
      - type: text
        text: (sed tempore Paschali)
      - type: text
        text: Paschále quæ fers gáudium
      - type: text
        text: Piis adáuge grátiam,
      - type: text
        text: Reísque dele crímina.
      - type: text
        text: Te, fons salútis, Trínitas,
      - type: text
        text: 'Colláudet omnis spíritus:'
      - type: text
        text: Quibus Crucis victóriam
      - type: text
        text: Largíris, adde prǽmium.
      - type: text
        text: Amen.
  hymn.vox-clara-ecce-ntonat-77730facd4:
    role: hymn
    content:
      la:
      - type: text
        text: Vox clara ecce íntonat,
      - type: text
        text: 'Obscúra quæque íncrepat:'
      - type: text
        text: Pellántur éminus sómnia;
      - type: text
        text: Ab æthre Christus prómicat.
      - type: text
        text: Mens iam resúrgat tórpida
      - type: text
        text: Quæ sorde exstat sáucia;
      - type: text
        text: Sidus refúlget iam novum,
      - type: text
        text: Ut tollat omne nóxium.
      - type: text
        text: E sursum Agnus míttitur
      - type: text
        text: 'Laxáre gratis débitum:'
      - type: text
        text: Omnes pro indulgéntia
      - type: text
        text: Vocem demus cum lácrimis,
      - type: text
        text: Secúndo ut cum fúlserit,
      - type: text
        text: Mundúmque horror cínxerit,
      - type: text
        text: Non pro reátu púniat,
      - type: text
        text: Sed nos pius tunc prótegat.
      - type: text
        text: Laus, honor, virtus, glória,
      - type: text
        text: Deo Patri, et Fílio,
      - type: text
        text: Sancto simul Paráclito,
      - type: text
        text: In sæculórum sǽcula.
      - type: text
        text: Amen.
