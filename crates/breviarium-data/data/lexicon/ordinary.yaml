  chapter.k-rie-el-ison-christe-el-ison-k-rie-el-ison-d31d1e6d5e:
    role: chapter
    content:
      la:
      - type: text
        text: Kýrie, eléison. Christe, eléison. Kýrie, eléison.
      - type: rubric
        text: Pater secreto
      - type: text
        text: 'Pater noster, qui es in cælis, sanctificétur nomen tuum: advéniat regnum tuum: fiat volúntas tua, sicut in cælo et in terra. Panem nostrum cotidiánum da nobis hódie: et dimítte nobis débita nostra, sicut et nos dimíttimus debitóribus nostris:'
      - type: versicle
        text: 'Et ne nos indúcas in tentatiónem:'
      - type: response
        text: Sed líbera nos a malo.
      - type: rubric
        text: Credo secreto
      - type: text
        text: 'Credo in Deum, Patrem omnipoténtem, Creatórem cæli et terræ. Et in Iesum Christum, Fílium eius únicum, Dóminum nostrum: qui concéptus est de Spíritu Sancto, natus ex María Vírgine, passus sub Póntio Piláto, crucifíxus, mórtuus, et sepúltus: descéndit ad ínferos; tértia die resurréxit a mórtuis; ascéndit ad cælos; sedet ad déxteram Dei Patris omnipoténtis: inde ventúrus est iudicáre vivos et mórtuos. Credo in Spíritum Sanctum, sanctam Ecclésiam cathólicam, Sanctórum communiónem, remissiónem peccatórum.'
      - type: versicle
        text: Carnis resurrectiónem.
      - type: response
        text: Vitam ætérnam. Amen.
      - type: text
        text: Benedictus es …
      - type: versicle
        text: Dómine, exáudi oratiónem meam.
      - type: response
        text: Et clamor meus ad te véniat.
      en2:
      - type: text
        text: Lord, have mercy. Christ, have mercy. Lord, have mercy.
      - type: rubric
        text: Our Father (quietly)
      - type: text
        text: 'Our Father, who art in heaven, hallowed be thy name: thy kingdom come: thy will be done, on earth as it is in heaven. Give us this day our daily bread: and forgive us our trespasses, as we also forgive those who trespass against us:'
      - type: versicle
        text: 'And lead us not into temptation:'
      - type: response
        text: But deliver us from evil.
      - type: rubric
        text: Creed (quietly)
      - type: text
        text: 'I believe in God, the Father almighty, Creator of heaven and earth. And in Jesus Christ, his only Son, our Lord: who was conceived by the Holy Spirit, born of the Virgin Mary, suffered under Pontius Pilate, was crucified, died, and was buried: he descended to the dead; on the third day he rose again from the dead; he ascended into heaven; he is seated at the right hand of God the Father almighty: from thence he will come to judge the living and the dead. I believe in the Holy Spirit, the holy Catholic Church, the communion of Saints, the forgiveness of sins.'
      - type: versicle
        text: The resurrection of the body.
      - type: response
        text: Life everlasting. Amen.
      - type: text
        text: Blessed are you …
      - type: versicle
        text: O Lord, hear my prayer.
      - type: response
        text: And let my cry come before you.
  chapter.per-e-ndem-christum-d-minum-nostrum-520934e7e6:
    role: chapter
    content:
      la:
      - type: text
        text: |-
          Per eúndem Christum Dóminum nostrum.
          (sed post partum omittitur)
      - type: response
        text: Amen.
      en2:
      - type: text
        text: |-
          Through the same Christ our Lord.
          (but after the birth it is omitted)
      - type: response
        text: Amen.
  chapter.phil-3-20-21-774d1df079:
    role: chapter
    content:
      la:
      - type: citation
        text: Phil 3:20-21
      - type: text
        text: Salvatórem expectámus Dóminum nostrum Iesum Christum, qui reformávit corpus humilitátis nostrae, configurátum córpori claritátis suae.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Phil 3:20-21
      - type: text
        text: But our way of life is in heaven. And from heaven, too, we await the Savior, our Lord Jesus Christ, who will transform the body of our lowliness, according to the form of the body of his glory, by means of that power by which he is even able to subject all things to himself.
      - type: response
        text: Thanks be to God.
  chapter.rom-13-12-13-f0372a924a:
    role: chapter
    content:
      en:
      - type: citation
        text: Rom 13:12-13
      - type: text
        text: The night is passed, and the day is at hand. Let us therefore cast off the works of darkness, and put on the armour of light. Let us walk honestly, as in the day.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Rom 13:12-13
      - type: text
        text: Nox præcéssit, dies autem appropinquávit. Abiciámus ergo ópera tenebrárum, et induámur arma lucis. Sicut in die honéste ambulémus.
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Rom 13:12-13
      - type: text
        text: The night has passed, and the day draws near. Therefore, let us cast aside the works of darkness, and be clothed with the armor of light. Let us walk honestly, as in the daylight.
      - type: response
        text: Thanks be to God.
  chapter.rom-13-8-e7b984c4ff:
    role: chapter
    content:
      en:
      - type: citation
        text: Rom 13:8
      - type: text
        text: Owe no man any thing, but to love one another. For he that loveth his neighbour, hath fulfilled the law.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Rom 13:8
      - type: text
        text: 'Némini quidquam debeátis, nisi ut ínvicem diligátis: qui enim díligit próximum, legem implévit.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Rom 13:8
      - type: text
        text: You should owe nothing to anyone, except so as to love one another. For whoever loves his neighbor has fulfilled the law.
      - type: response
        text: Thanks be to God.
  chapter.rom-6-9-10-3a9fe886c0:
    role: chapter
    content:
      en:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: Knowing that Christ rising again from the dead, dieth now no more, death shall no more have dominion over him. For in that he died to sin, he died once; but in that he liveth, he liveth unto God.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: 'Christus resúrgens ex mórtuis iam non móritur, mors illi ultra non dominábitur. Quod enim mórtuus est peccáto, mórtuus est semel: quod autem vivit, vivit Deo.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: 'For we know that Christ, in rising up from the dead, can no longer die: death no longer has dominion over him. For in as much as he died for sin, he died once. But in as much as he lives, he lives for God.'
      - type: response
        text: Thanks be to God.
  chapter.rom-6-9-10-7da66c6345:
    role: chapter
    content:
      la:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: 'Christus resúrgens ex mórtuis iam non móritur, mors illi ultra non dominábitur. Quod enim mórtuus est peccáto, mórtuus est semel: quod autem vivit, vivit Deo.'
      - type: response
        text: Deo grátias.
      en2:
      - type: citation
        text: Rom 6:9-10
      - type: text
        text: 'For we know that Christ, in rising up from the dead, can no longer die: death no longer has dominion over him. For in as much as he died for sin, he died once. But in as much as he lives, he lives for God.'
      - type: response
        text: Thanks be to God.
  chapter.sancti-omnes-interc-dant-pro-nobis-ad-d-minum-d170d069e8:
    role: chapter
    content:
      en:
      - type: antiphon
        text: May all the Saints intercede for us with the Lord.
      - type: text
        text: ''
      - type: versicle
        text: 'The Lord hath made his holy one wonderful:'
      - type: response
        text: The Lord will hear me when I cry unto him.
      - type: citation
        text: Prayer
      - type: rubric
        text: At the letter N., the name of the Titular of the local church is said, if the title is not a divine person or a mystery of the Lord, and when the Office or a Commemoration was not already said of the Saint, and when the name is not already in the prayer. The names of the holy Angels and of St. John the Baptist, if they are titulars, are said before the name of St. Joseph. In all these cases, the words «blessed N.» are omitted.
      - type: prayer
        text: Let us pray.
      - type: text
        text: 'O Lord, we ask thee to save us from dangers to mind and to body: and, by the intercession of the blessed Joseph, the blessed Apostles Peter and Paul, blessed!~'
      - type: prayer
        text: N. and all the Saints, to eliminate all enmity and errors, that thy Church may safely serve thee in freedom.
      - type: prayer
        text: Through the same Jesus Christ, thy Son, Our Lord, Who liveth and reigneth with thee in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: antiphon
        text: Sancti omnes intercédant pro nobis ad Dóminum.
      - type: text
        text: ''
      - type: versicle
        text: Mirificávit Dóminus Sanctos suos.
      - type: response
        text: Et exaudívit eos clamántes ad se.
      - type: citation
        text: Oratio
      - type: rubric
        text: In hac oratione, ad litteram N. exprimitur nomen Titularis propriæ ecclesiæ, dummodo Titulus non sit Persona divina vel Mysterium Domini, aut de ipso ratione Festi factum non fuerit Officium vel Commemoratio, aut illius nomen non sit in eadem Suffragii Oratione expressum; ac nomina sanctorum Angelorum et sancti Ioannis Baptistæ, si Titulares fuerint, præponuntur nomini sancti Ioseph. In hisce autem omnibus casibus et omittuntur verba «atque beáto N.». Si Titularis ante omnes fuerit nominandus, particula «cum» omittitur ante nomen sanctorum Petri et Pauli ac præponitur nomini Sancti Ioseph.
      - type: text
        text: |-
          Orémus.
          A cunctis nos, quǽsumus, Dómine, mentis et córporis defénde perículis: et, intercedénte beáto Ioseph, cum beátis Apóstolis tuis Petro et Paulo, atque beáto~
      - type: prayer
        text: N. et ómnibus Sanctis, salútem nobis tríbue benígnus et pacem; ut, destrúctis adversitátibus et erróribus univérsis, Ecclésia tua secúra tibi sérviat libertáte.
      - type: prayer
        text: Per eúndem Dóminum nostrum Iesum Christum Fílium tuum, qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
      en2:
      - type: antiphon
        text: May all the Saints intercede for us to the Lord.
      - type: text
        text: ''
      - type: versicle
        text: The Lord has made his Saints wonderful.
      - type: response
        text: And he has heard them crying out to him.
      - type: citation
        text: Prayer
      - type: rubric
        text: In this prayer, the letter N. expresses the name of the Titular of one's own church, provided the Titular is not a divine Person or a Mystery of the Lord, or that an Office or Commemoration has not already been made of him by reason of the Feast, or that his name is not already expressed in the same Suffrages Prayer; and the names of the holy Angels and of Saint John the Baptist, if they are Titulars, are placed before the name of Saint Joseph. In all these cases, however, the words «and blessed N.» are also omitted. If the Titular is to be named before all others, the particle «with» is omitted before the names of Saints Peter and Paul and placed before the name of Saint Joseph.
      - type: text
        text: |-
          Let us pray.
          Defend us, we beseech you, O Lord, from all dangers of soul and body: and, through the intercession of blessed Joseph, together with your blessed Apostles Peter and Paul, and blessed~
      - type: prayer
        text: N. and all the Saints, graciously grant us salvation and peace; that, with all adversities and errors destroyed, your Church may serve you in secure freedom.
      - type: prayer
        text: Through the same Lord Jesus Christ your Son, who lives and reigns with you in the unity of the Holy Spirit, God, for ever and ever.
      - type: response
        text: Amen.
