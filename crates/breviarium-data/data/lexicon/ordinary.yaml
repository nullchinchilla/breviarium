    role: chapter
    content:
      la:
      - type: heading
        text: De Patrono vel Titulo Ecclesiæ
      - type: rubric
        text: 'fiat com. consueata ante vel post Commemorationes prædictas, pro dignitate illius, et ultimo loco:'
  chapter.de-sancto-ioseph-87b787d2e5:
    role: chapter
    content:
      en:
      - type: heading
        text: Commemoration of St. Joseph
      - type: antiphon
        text: Behold a faithful and wise servant whom his Lord hath made ruler over His household.
      - type: text
        text: ''
      - type: versicle
        text: Glory and riches shall be in his house.
      - type: response
        text: And his righteousness endureth for ever.
      - type: prayer
        text: Let us pray.
      - type: text
        text: O God, who, in thine unspeakable foreknowledge, didst choose thy blessed servant Joseph to be the husband of thine own most holy Mother; mercifully grant that now that he is in heaven with thee, we who on earth do reverence him for our defender, may worthily be holpen by the succour of his prayers to thee on our behalf.
      la:
      - type: heading
        text: De sancto Ioseph
      - type: antiphon
        text: Ecce fidélis servus et prudens, quem constítuit Dóminus super famíliam suam. (Allelúia.)
      - type: text
        text: ''
      - type: versicle
        text: Glória et divítiæ in domo eius. (Allelúia.)
      - type: response
        text: Et iustítia eius manet in sǽculum sǽculi. (Allelúia.)
      - type: text
        text: |-
          Orémus.
          Deus, qui ineffábili providéntia beátum Ioseph sanctíssimæ Genitrícis tuæ sponsum elígere dignátus es: præsta quǽsumus; ut quem protectórem venerámur in terris, intercessórem habére mereámur in cælis.
