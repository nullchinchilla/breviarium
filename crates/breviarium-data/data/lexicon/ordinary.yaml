  hymn.vex-lla-regis-pr-deunt-c131fd3fc3:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Vexílla Regis pródeunt:
          Fulget Crucis mystérium,
          Quo carne carnis Cónditor
          Suspénsus est patíbulo.

          Quo vulnerátus ínsuper
          Mucróne diro lánceæ,
          Ut nos laváret crímine,
          Manávit und[a] et sánguine.

          Impléta sunt quæ cóncinit
          David fidéli cármine,
          Dicens: In natiónibus
          Regnávit a ligno Deus.

          Arbor decór[a] et fúlgida,
          Ornáta Regis púrpura,
          Elécta digno stípite
          Tam sancta membra tángere.

          Beáta, cuius bráchiis
          Sæcli pepéndit prétium,
          Statéra facta córporis,
          Prædámque tulit tártari.

          (nisi rubrica cisterciensis)
      - type: rubric
        text: Sequens stropha dicitur flexis genibus.
      - type: text
        text: |-
          (nisi rubrica cisterciensis)

          O Crux, ave, spes única,
          In hac triúmphi glória
          (sed tempore Passionis)
          Hoc Passiónis témpore
          (sed tempore Paschali)
          In hoc Pascháli gáudio
          Auge piis iustítiam,
          Reísque dona véniam.

          Te summa, Deus, Trínitas,
          Colláudet omnis spíritus:
          Quos per Crucis mystérium
          Salvas, rege per sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          The banners of the King go forth:
          the mystery of the Cross shines bright,
          whereon the Maker of flesh in the flesh
          was hung upon the gibbet.
      
          Whereon, wounded moreover
          by the cruel point of a lance,
          that he might wash us from sin,
          he poured forth water and blood.
      
          What David foretold is fulfilled
          in his faithful song,
          saying: Among the nations
          God has reigned from the wood.
      
          O tree fair and resplendent,
          arrayed with royal purple,
          chosen with worthy trunk
          to touch such holy members.
      
          Blessed, upon whose arms
          the ransom of the world was hung,
          made a scale for the body,
          and took its prey from hell.
      
          (unless the Cistercian rubric applies)
      - type: rubric
        text: The following stanza is said kneeling.
      - type: text
        text: |-
          (unless the Cistercian rubric applies)
      
          O Cross, hail, our only hope,
          in this glory of triumph
          (but in the time of the Passion)
          in this time of the Passion
          (but in Paschal Time)
          in this Paschal joy
          increase justice for the righteous,
          and grant pardon to the guilty.
      
          You, most high God, O Trinity,
          let every spirit praise together;
          those whom you save through the mystery of the Cross,
          rule through the ages.
          Amen.
  hymn.vox-clara-ecce-ntonat-77730facd4:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Vox clara ecce íntonat,
          Obscúra quæque íncrepat:
          Pellántur éminus sómnia;
          Ab æthre Christus prómicat.

          Mens iam resúrgat tórpida
          Quæ sorde exstat sáucia;
          Sidus refúlget iam novum,
          Ut tollat omne nóxium.

          E sursum Agnus míttitur
          Laxáre gratis débitum:
          Omnes pro indulgéntia
          Vocem demus cum lácrimis,

          Secúndo ut cum fúlserit,
          Mundúmque horror cínxerit,
          Non pro reátu púniat,
          Sed nos pius tunc prótegat.

          Laus, honor, virtus, glória,
          Deo Patri, et Fílio,
          Sancto simul Paráclito,
          In sæculórum sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          Behold, a clear voice rings out,
          rebuking all that is dark;
          dreams are driven far away;
          Christ blazes forth from the heavens.
      
          Now let the sluggish mind arise,
          which lies wounded by defilement;
          now a new star shines bright,
          to take away all that is harmful.
      
          From on high the Lamb is sent
          to forgive debts freely:
          let us all offer a voice with tears
          for indulgence,
      
          So that when he shall shine forth the second time
          and terror shall have girt the world,
          he may not punish us for our guilt,
          but then may the merciful one protect us.
      
          Praise, honor, power, glory,
          to God the Father and to the Son,
          and likewise to the Holy Paraclete,
          unto ages of ages.
          Amen.
