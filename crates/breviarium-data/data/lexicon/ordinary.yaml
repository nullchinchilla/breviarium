          Amen.
  hymn.somno-ref-ctis-rtubus-cd1d1f1514:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Somno reféctis ártubus,
          Spreto cubíli, súrgimus:
          Nobis, Pater, canéntibus
          Adésse te depóscimus.

          Te lingua primum cóncinat,
          Te mentis ardor ámbiat:
          Ut áctuum sequéntium
          Tu, Sancte, sis exórdium.

          Cedant tenébræ lúmini,
          Et nox diúrno síderi,
          Ut culpa, quam nox íntulit,
          Lucis labáscat múnere.

          Precámur iídem súpplices,
          Noxas ut omnes ámputes,
          Et ore te canéntium
          Laudéris in perpetuum.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          With our limbs refreshed by sleep,
          Casting aside our beds, we rise:
          We beseech you, Father, to be present
          As we sing to you.
      
          Let the tongue first begin with you,
          Let the ardor of the mind embrace you:
          That you, O Holy One, may be the beginning
          Of the actions that follow.
      
          Let darkness give way to light,
          And night to the star of day,
          That the fault which night has brought
          May melt away by the gift of light.
      
          We pray likewise as suppliants
          That you may cut away all wrongs,
          And be praised by the voice of those who sing
          For ever.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.splendor-pat-rn-gl-ri-1af1dd28f8:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Splendor patérnæ glóriæ,
          De luce lucem próferens,
          Lux lucis, et fons lúminis,
          Diem dies illúminans:

          Verúsque sol illábere,
          Micans nitóre pérpeti:
          Iubárque Sancti Spíritus
          Infúnde nostris sénsibus.

          Votis vocémus et Patrem,
          Patrem perénnis glóriæ,
          Patrem poténtis grátiæ,
          Culpam reléget lúbricam.

          Confírmet actus strénuos:
          Dentes retúndat ínvidi:
          Casus secúndet ásperos,
          Donet geréndi grátiam.

          Mentem gubérnet et regat,
          Casto, fidéli córpore:
          Fides calóre férveat,
          Fraudis venéna nésciat.

          Christúsque nobis sit cibus,
          Potúsque noster sit fides:
          Læti bibámus sóbriam
          Ebrietátem spíritus.

          Lætus dies hic tránseat,
          Pudor sit ut dilúculum,
          Fides velut merídies,
          Crepúsculum mens nésciat.

          Auróra cursus próvehit,
          Auróra totus pródeat,
          In Patre totus Fílius,
          Et totus in Verbo Pater.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc et in perpétuum.
          Amen.
      en2:
      - type: text
        text: |-
          Radiance of the Father's glory,
          Bringing forth light from light,
          Light of light, and fountain of brightness,
          Day illumining the day:
      
          And you, true sun, glide in,
          Gleaming with perpetual brightness:
          And pour the radiance of the Holy Spirit
          Into our senses.
      
          Let us also call upon the Father in our prayers,
          The Father of everlasting glory,
          The Father of powerful grace,
          That he may banish the slippery fault.
      
          May he strengthen vigorous deeds:
          May he blunt the teeth of the envious:
          May he prosper in harsh adversities:
          May he grant the grace to act rightly.
      
          May he govern and rule the mind,
          With a chaste and faithful body:
          May faith burn with fervor,
          May it know nothing of the poison of deceit.
      
          May Christ be our food,
          And may faith be our drink:
          Let us joyfully drink the sober
          Intoxication of the spirit.
      
          May this day pass joyfully,
          May modesty be like the dawn,
          Faith like the noon,
          Let the mind know no twilight.
      
          The dawn advances the course,
          May all of dawn go forth:
          The Son entirely in the Father,
          And the Father entirely in the Word.
      
          To God the Father be glory,
          And to his only Son,
          With the Spirit the Paraclete,
          Both now and for ever.
          Amen.
  hymn.splendor-pat-rn-gl-ri-1afa66bbaf:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O splendour of God’s glory bright,
          O thou that bringest light from light,
          O light of light, light’s living spring,
          O day, all days illumining.

          O thou true sun, on us thy glance
          Let fall in royal radiance,
          The Spirit’s sanctifying beam
          Upon our earthly senses stream.

          The Father too our prayers implore,
          Father of glory evermore,
          The Father of all grace and might,
          To banish sin from our delight:

          To guide whate’er we nobly do,
          With love all envy to subdue,
          To make ill-fortune turn to fair,
          And give us grace our wrongs to bear.

          Our mind be in his keeping placed,
          Our body true to him and chaste,
          Where only faith her fire shall feed,
          And burn the tares of Satan’s seed.

          And Christ to us for food shall be,
          From him our drink that welleth free,
          The Spirit’s wine, that maketh whole,
          And mocking not, exalts the soul.

          Rejoicing may this day go hence,
          Like virgin dawn our innocence,
          Like fiery noon our faith appear,
          Nor know the gloom of twilight drear.

          Morn in her rosy car is borne;
          Let him come forth our perfect morn,
          The Word in God the Father One,
          The Father perfect in the Son.

          All laud to God the Father be;
          All praise, Eternal Son, to thee;
          All glory, as is ever meet,
          To God the Holy Paraclete.
          Amen.
      la:
      - type: text
        text: |-
          Splendor Patérnæ glóriæ,
          De luce lucem próferens,
          Lux lucis, et fons lúminis,
          Diem dies illúminans:

          Verúsque sol illábere,
          Micans nitóre pérpeti:
          Iubárque Sancti Spíritus
          Infúnde nostris sénsibus.

          Votis vocémus et Patrem,
          Patrem poténtis grátiæ,
          Patrem perénnis glóriæ:
          Culpam reléget lúbricam.

          Confírmet actus strénuos:
          Dentes retúndat ínvidi:
          Casus secúndet ásperos:
          Agénda recte dírigat.

          Mentem gubérnet et regat:
          Sit pura nobis cástitas:
          Fides calóre férveat,
          Fraudis venéna nésciat.

          Christúsque nobis sit cibus,
          Potúsque noster sit fides:
          Læti bibámus sóbriam
          Profusiónem Spíritus.

          Lætus dies hic tránseat:
          Pudor sit ut dilúculum:
          Fides velut merídies:
          Crepúsculum mens nésciat.

          Auróra lucem próvehit,
          Cum luce nobis pródeat
          In Patre totus Fílius,
          Et totus in Verbo Pater.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Nunc et per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          O splendour of God’s glory bright,
          O thou that bringest light from light,
          O light of light, light’s living spring,
          O day, all days illumining.
      
          O thou true sun, on us thy glance
          Let fall in royal radiance,
          The Spirit’s sanctifying beam
          Upon our earthly senses stream.
      
          The Father too our prayers implore,
          Father of glory evermore,
          The Father of all grace and might,
          To banish sin from our delight:
      
          To guide whate’er we nobly do,
          With love all envy to subdue,
          To make ill-fortune turn to fair,
          And give us grace our wrongs to bear.
      
          Our mind be in his keeping placed,
          Our body true to him and chaste,
          Where only faith her fire shall feed,
          And burn the tares of Satan’s seed.
      
          And Christ to us for food shall be,
          From him our drink that welleth free,
          The Spirit’s wine, that maketh whole,
          And mocking not, exalts the soul.
      
          Rejoicing may this day go hence,
          Like virgin dawn our innocence,
          Like fiery noon our faith appear,
          Nor know the gloom of twilight drear.
      
          Morn in her rosy car is borne;
          Let him come forth our perfect morn,
          The Word in God the Father One,
          The Father perfect in the Son.
      
          All laud to God the Father be;
          All praise, Eternal Son, to thee;
          All glory, as is ever meet,
          To God the Holy Paraclete.
          Amen.
  hymn.summ-deus-clem-nti-c1c5334c13:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Great God of boundless mercy hear;
          Thou Ruler of this earthly sphere;
          In substance one, in persons three,
          Dread Trinity in Unity!

          Do thou in love accept our lays
          Of mingled penitence and praise;
          And set our hearts from error free,
          More fully to rejoice in thee.

          Our reins and hearts in pity heal,
          And with thy chastening fires anneal;
          Gird Thou our loins, each passion quell,
          And every harmful lust expel.

          Now as our anthems, upward borne,
          Awake the silence of the morn,
          Enrich us with thy gifts of grace,
          From heaven, thy blissful dwelling-place!

          Hear thou our prayer, Almighty King!
          Hear thou our praises, while we sing,
          Adoring with the heavenly host,
          The Father, Son, and Holy Ghost!
          Amen.
      la:
      - type: text
        text: |-
          Summæ Deus cleméntiæ,
          Mundíque Factor máchinæ,
          Unus potentiáliter,
          Trinúsque personáliter:

          Nostros pius cum cánticis
          Fletus benígne súscipe:
          Quo corde puro sórdibus
          Te perfruámur lárgius.

          Lumbos, iecúrque mórbidum
          Adúre igni cóngruo,
          Accíncti ut sint pérpetim,
          Luxu remóto péssimo.

          Ut quique horas nóctium
          Nunc concinéndo rúmpimus,
          Donis beátæ pátriæ
          Ditémur omnes áffatim

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
