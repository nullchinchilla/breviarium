  note.eccl-12-2-3-63f3bea6c8:
    role: note
    content:
      la:
      - type: citation
        text: Eccl 12:2-3
      - type: text
        text: 'Bénefac iusto, et invénies retributiónem magnam: et si non ab ipso, certe a Dómino. Non est enim ei bene qui assíduus est in malis, et eleemósynas non danti: quóniam et Altíssimus ódio habet peccatóres, et misértus est pœniténtibus.'
      - type: versicle
        text: Tu autem, Dómine, miserére nobis.
      - type: response
        text: Deo grátias.
      - type: short_response
        text: Misericórdia Dómini * Super timéntes eum.
      - type: response
        text: Misericórdia Dómini * Super timéntes eum.
      - type: versicle
        text: Ab ætérno et usque in ætérnum.
      - type: response
        text: Super timéntes eum.
      en2:
      - type: citation
        text: Eccl 12:2-3
      - type: text
        text: Do good to the just, and you will find great recompense, and if not from him, certainly from the Lord. For there is no good for someone who is always occupied in evil, or who does not give alms. For the Most High holds hatred for sinners, but he takes pity on the repentant.
      - type: versicle
        text: But you, O Lord, have mercy on us.
      - type: response
        text: Thanks be to God.
      - type: short_response
        text: The mercy of the Lord * is upon those who fear him.
      - type: response
        text: The mercy of the Lord * is upon those who fear him.
      - type: versicle
        text: From everlasting and unto everlasting.
      - type: response
        text: Upon those who fear him.
