        text: And from the horns of the unicorns my lowliness.
  versicle.de-ore-le-nis-l-bera-me-d-mine-6ce45f17b2:
    role: versicle
    content:
      en:
      - type: versicle
        text: From the lion's mouth, * O Lord, save me.
      - type: response
        text: And my lowness from the horns of the unicorns.
      la:
      - type: versicle
        text: De ore leónis líbera me, Dómine.
      - type: response
        text: Et a córnibus unicórnium humilitátem meam.
      en2:
      - type: versicle
        text: From the mouth of the lion deliver me, O Lord.
      - type: response
        text: And from the horns of the unicorns my lowliness.
  versicle.ded-runt-in-escam-meam-fel-9edee6ac9b:
    role: versicle
    content:
      la:
      - type: versicle
        text: Dedérunt in escam meam fel.
      - type: response
        text: Et in siti mea potavérunt me acéto.
      en2:
      - type: versicle
        text: They gave me gall as my food.
      - type: response
        text: And in my thirst they gave me vinegar to drink.
  versicle.dirig-tur-d-mine-or-tio-mea-287b974bf0:
    role: versicle
    content:
      en:
      - type: versicle
        text: Let the evening prayer ascend unto thee, O Lord.
      - type: response
        text: And let there descend upon us thy mercy.
      la:
      - type: versicle
        text: Dirigátur, Dómine, orátio mea.
      - type: response
        text: Sicut incénsum in conspéctu tuo.
      en2:
      - type: versicle
        text: Let my prayer be directed, O Lord.
      - type: response
        text: Like incense in your sight.
  versicle.dirig-tur-d-mine-or-tio-mea-7725eae96d:
    role: versicle
    content:
      en:
      - type: versicle
        text: O Lord, direct my prayer.
      - type: response
        text: As incense in thy sight.
      la:
      - type: versicle
        text: Dirigátur, Dómine, orátio mea.
      - type: response
        text: Sicut incénsum in conspéctu tuo.
      en2:
      - type: versicle
        text: Let my prayer be directed, O Lord.
      - type: response
        text: Like incense in your sight.
  versicle.ego-dixi-d-mine-miser-re-mei-096cbc7e44:
    role: versicle
    content:
      en:
      - type: versicle
        text: 'I said: O Lord, be thou merciful to me.'
      - type: response
        text: Heal my soul, for I have sinned against thee.
      la:
      - type: versicle
        text: 'Ego dixi: Dómine, miserére mei.'
      - type: response
        text: Sana ánimam meam, quia peccávi tibi.
      en2:
      - type: versicle
        text: 'I said: O Lord, have mercy on me.'
      - type: response
        text: Heal my soul, for I have sinned against you.
  versicle.em-tte-agnum-d-mine-dominat-rem-terr-e0da5fd432:
    role: versicle
    content:
      la:
      - type: versicle
        text: Emítte Agnum, Dómine, dominatórem terræ.
      - type: response
        text: De Petra desérti ad montem fília Sion.
      en2:
      - type: versicle
        text: Send forth the Lamb, O Lord, the ruler of the earth.
      - type: response
        text: From the Rock of the desert to the mount of the daughter of Sion.
  versicle.em-tte-agnum-d-mine-dominat-rem-terr-e35d1f7b9c:
    role: versicle
    content:
      la:
      - type: versicle
        text: Emítte Agnum, Dómine, dominatórem terræ.
      - type: response
        text: De Petra desérti ad montem fíliæ Sion.
      en2:
      - type: versicle
        text: Send forth the Lamb, O Lord, the ruler of the earth.
      - type: response
        text: From the Rock of the desert to the mount of the daughter of Sion.
  versicle.em-tte-sp-ritum-tuum-et-creab-ntur-allel-ia-38fe7def1d:
    role: versicle
    content:
      la:
      - type: versicle
        text: Emítte Spíritum tuum, et creabúntur, allelúia.
      - type: response
        text: Et renovábis fáciem terræ, allelúia.
      en2:
      - type: versicle
        text: Send forth your Spirit, and they shall be created, alleluia.
      - type: response
        text: And you will renew the face of the earth, alleluia.
  versicle.exc-lsus-super-omnes-gentes-d-minus-40b5ae17c8:
    role: versicle
    content:
      la:
      - type: versicle
        text: Excélsus super omnes gentes Dóminus.
      - type: response
        text: Et super calos glória eius.
      en2:
      - type: versicle
        text: The Lord is high above all nations.
      - type: response
        text: And his glory is above the heavens.
  versicle.exc-lsus-super-omnes-gentes-d-minus-d31435eace:
    role: versicle
    content:
      la:
      - type: versicle
        text: Excélsus super omnes gentes Dóminus.
      - type: response
        text: Et super celos glória eius.
      en2:
      - type: versicle
        text: The Lord is high above all nations.
      - type: response
        text: And his glory is above the heavens.
  versicle.exs-rge-christe-diuva-nos-16e4aca95e:
    role: versicle
    content:
      en:
      - type: versicle
        text: Arise, O Christ, and help us.
      - type: response
        text: And deliver us for thy name's sake.
      la:
      - type: versicle
        text: Exsúrge, Christe, ádiuva nos.
      - type: response
        text: Et líbera nos propter nomen tuum.
      en2:
      - type: versicle
        text: Arise, O Christ, help us.
      - type: response
        text: And deliver us for your name's sake.
  versicle.fiat-miseric-rdia-tua-d-mine-super-nos-6aea6086da:
    role: versicle
    content:
      la:
      - type: versicle
        text: Fiat misericórdia tua, Dómine, super nos.
      - type: response
        text: Quemádmodum sperávimus in te.
      en2:
      - type: versicle
        text: Let your mercy be upon us, O Lord.
      - type: response
        text: As we have hoped in you.
  versicle.gav-si-sunt-disc-puli-allel-ia-684c868bd9:
    role: versicle
    content:
      en:
      - type: versicle
        text: The disciples therefore were glad, alleluia.
      - type: response
        text: When they saw the Lord, alleluia.
      la:
      - type: versicle
        text: Gavísi sunt discípuli, allelúia.
      - type: response
        text: Viso Dómino, allelúia.
      en2:
      - type: versicle
        text: The disciples rejoiced, alleluia.
      - type: response
        text: Having seen the Lord, alleluia.
  versicle.homo-pacis-me-in-quo-sper-bam-0db813d2ce:
    role: versicle
    content:
      la:
      - type: versicle
        text: Homo pacis meæ in quo sperábam.
      - type: response
        text: Ampliávit advérsum me supplantatiónem.
      en2:
      - type: versicle
        text: The man of my peace, in whom I trusted.
      - type: response
        text: Has greatly increased his treachery against me.
  versicle.in-m-nibus-port-bunt-te-294561b4db:
    role: versicle
    content:
      la:
      - type: versicle
        text: In mánibus portábunt te.
      - type: response
        text: Ne forte offéndas ad lápidem pedem tuum.
      en2:
      - type: versicle
        text: In their hands they shall carry you.
      - type: response
        text: Lest perhaps you strike your foot against a stone.
  versicle.in-matutinis-d-mine-medit-bor-in-te-a9a0b44887:
    role: versicle
    content:
      la:
      - type: versicle
        text: In matutinis, Dómine, meditábor in te.
      - type: response
        text: Quia fuísti adiútor meus.
      en2:
      - type: versicle
        text: In the morning, O Lord, I will meditate on you.
      - type: response
        text: For you have been my helper.
  versicle.in-resurrecti-ne-tua-christe-allel-ia-82c0447676:
    role: versicle
    content:
      la:
      - type: versicle
        text: In resurrectióne tua, Christe, allelúia.
      - type: response
        text: Cæli et terra læténtur, allelúia.
      en2:
      - type: versicle
        text: In your Resurrection, O Christ, alleluia.
      - type: response
        text: Let the heavens and the earth rejoice, alleluia.
  versicle.in-resurrecti-ne-tua-christe-allel-ia-d3d52696ec:
    role: versicle
    content:
      en:
      - type: versicle
        text: Christ, in thy resurrection, alleluia.
      - type: response
        text: Let heaven and earth rejoice, alleluia.
      la:
      - type: versicle
        text: In resurrectióne tua, Christe, allelúia.
      - type: response
        text: Cæli et terra læténtur, allelúia.
      en2:
      - type: versicle
        text: In your Resurrection, O Christ, alleluia.
      - type: response
        text: Let the heavens and the earth rejoice, alleluia.
  versicle.int-nde-nim-me-et-l-bera-eam-5f4808dbe3:
    role: versicle
    content:
      la:
      - type: versicle
        text: Inténde ánimæ meæ, et líbera eam.
      - type: response
        text: Propter inimícos meos éripe me.
      en2:
      - type: versicle
        text: Attend to my soul, and deliver it.
      - type: response
        text: Because of my enemies, rescue me.
  versicle.mane-nob-scum-d-mine-allel-ia-420868ba16:
    role: versicle
    content:
      en:
      - type: versicle
        text: Stay with us, O Lord, alleluia.
      - type: response
        text: Because it is towards evening, alleluia.
      la:
      - type: versicle
        text: Mane nobíscum, Dómine, allelúia.
      - type: response
        text: Quóniam advesperáscit, allelúia.
      en2:
      - type: versicle
        text: Stay with us, O Lord, alleluia.
      - type: response
        text: For evening is drawing near, alleluia.
  versicle.mem-nto-nostri-d-mine-in-benepl-cito-p-puli-tui-948e6f58f3:
    role: versicle
    content:
      en:
      - type: versicle
        text: Remember us, O Lord, in the favor of thy people.
      - type: response
        text: Visit us with thy salvation.
      la:
      - type: versicle
        text: Meménto nostri, Dómine, in beneplácito pópuli tui.
      - type: response
        text: Vísita nos in salutári tuo.
      en2:
      - type: versicle
        text: Remember us, O Lord, with good will for your people.
      - type: response
        text: Visit us with your salvation.
  versicle.ne-perdas-cum-mpiis-deus-nimam-meam-7db28992b6:
    role: versicle
    content:
      en:
      - type: versicle
        text: Take not away my soul, O God, with the wicked.
      - type: response
        text: Nor my life with bloody men.
      la:
      - type: versicle
        text: Ne perdas cum ímpiis, Deus, ánimam meam.
      - type: response
        text: Et cum viris sánguinum vitam meam.
      en2:
      - type: versicle
        text: Destroy not with the ungodly, O God, my soul.
      - type: response
        text: Nor my life with men of blood.
  versicle.ne-perdas-cum-mpiis-deus-nimam-meam-a188566715:
    role: versicle
    content:
      la:
      - type: versicle
        text: Ne perdas cum ímpiis, Deus, ánimam meam.
      - type: response
        text: Et cum viris sánguinum vitam meam.
      en2:
      - type: versicle
        text: Destroy not with the ungodly, O God, my soul.
      - type: response
        text: Nor my life with men of blood.
  versicle.ngelis-suis-deus-mand-vit-de-te-1d823f93aa:
    role: versicle
    content:
      en:
      - type: versicle
        text: God hath given His Angels charge over thee.
      - type: response
        text: To keep thee in all thy ways.
      la:
      - type: versicle
        text: Ángelis suis Deus mandávit de te.
      - type: response
        text: Ut custódiant te in ómnibus viis tuis.
      en2:
      - type: versicle
        text: God has given his Angels charge over you.
      - type: response
        text: To keep you in all your ways.
  versicle.ngelis-suis-deus-mand-vit-de-te-e7f63a53fc:
    role: versicle
    content:
      la:
      - type: versicle
        text: Ángelis suis Deus mandávit de te.
      - type: response
        text: Ut custódiant te in ómnibus viis tuis.
      - type: versicle
        text: Scuto circúmdabit te véritas eius.
      - type: response
        text: Non timébis a timóre noctúrno.
      en2:
      - type: versicle
        text: God has given his Angels charge over you.
      - type: response
        text: To keep you in all your ways.
      - type: versicle
        text: His truth will surround you as a shield.
      - type: response
        text: You will not fear the terror of the night.
  versicle.ngelis-suis-deus-mand-vit-de-te-f7f88439c3:
    role: versicle
    content:
      en:
      - type: versicle
        text: For he hath given his angels charge over thee.
      - type: response
        text: To keep thee in all thy ways.
      la:
      - type: versicle
        text: Ángelis suis Deus mandávit de te.
      - type: response
        text: Ut custódiant te in ómnibus viis tuis.
      en2:
      - type: versicle
        text: God has given his Angels charge over you.
      - type: response
        text: To keep you in all your ways.
  versicle.ora-pro-nobis-sancta-dei-g-netrix-bd38a845a3:
    role: versicle
    content:
      la:
      - type: versicle
        text: Ora pro nobis sancta Dei Génetrix.
      - type: response
        text: Ut digni efficiámur promissiónibus Christi.
      - type: text
        text: |-
          Orémus.
          Concéde nos fámulos tuos, quǽsumus, Dómine Deus, perpétua mentis et córporis sanitáte gaudére: et, gloriósa beátæ Maríæ semper Vírginis intercessióne, a præsénti liberári tristítia, et ætérna pérfrui lætítia.
      en2:
      - type: versicle
        text: Pray for us, holy Mother of God.
      - type: response
        text: That we may be made worthy of the promises of Christ.
      - type: text
        text: |-
          Let us pray.
          Grant, we pray, O Lord God, that we your servants may rejoice in perpetual health of mind and body: and, by the glorious intercession of Blessed Mary ever Virgin, may we be freed from present sorrow and come to rejoice in eternal gladness.
  versicle.puer-natus-est-nobis-9d35af148b:
    role: versicle
    content:
      la:
      - type: versicle
        text: Puer natus est nobis.
      - type: response
        text: Et fílius datus est nobis.
      en2:
      - type: versicle
        text: A child is born for us.
      - type: response
        text: And a son is given to us.
  versicle.repl-ti-sumus-mane-miseric-rdia-tua-7a1442829b:
    role: versicle
    content:
      en:
      - type: versicle
        text: We are filled in the morning with thy mercy.
      - type: response
        text: And we have rejoiced, and are delighted.
      la:
      - type: versicle
        text: Repléti sumus mane misericórdia tua.
      - type: response
        text: Exsultávimus, et delectáti sumus.
      en2:
      - type: versicle
        text: We have been filled in the morning with your mercy.
      - type: response
        text: We have rejoiced and been glad.
  versicle.ripe-me-d-mine-ab-h-mine-malo-4fb9611bc5:
    role: versicle
    content:
      la:
      - type: versicle
        text: Éripe me, Dómine, ab hómine malo.
      - type: response
        text: A viro iníquo éripe me.
      en2:
      - type: versicle
        text: Deliver me, O Lord, from evil men.
      - type: response
        text: From unjust men deliver me.
  versicle.ripe-me-d-mine-ab-h-mine-malo-8ac40c614b:
    role: versicle
    content:
      en:
      - type: versicle
        text: Deliver me, O Lord, from the evil man.
      - type: response
        text: Rescue me from the unjust man.
      la:
      - type: versicle
        text: Éripe me, Dómine, ab hómine malo.
      - type: response
        text: A viro iníquo éripe me.
      en2:
      - type: versicle
        text: Deliver me, O Lord, from evil men.
      - type: response
        text: From unjust men deliver me.
  versicle.ripe-me-de-inim-cis-meis-deus-meus-c17acd0b71:
    role: versicle
    content:
      en:
      - type: versicle
        text: Deliver me from my enemies, O my God.
      - type: response
        text: And defend me from them that rise up against me.
      la:
      - type: versicle
        text: Éripe me de inimícis meis, Deus meus.
      - type: response
        text: Et ab insurgéntibus in me líbera me.
      en2:
      - type: versicle
        text: Rescue me from my enemies, O my God.
      - type: response
        text: And free me from those who rise up against me.
  versicle.ror-te-c-li-d-super-et-nubes-pluant-iustum-1e6900a1e4:
    role: versicle
    content:
      en:
      - type: versicle
        text: Drop down dew, ye heavens, from above, and let the clouds rain the Just.
      - type: response
        text: Let the earth be opened, and bud forth the Saviour.
      la:
      - type: versicle
        text: Roráte, cæli, désuper, et nubes pluant iustum.
      - type: response
        text: Aperiátur terra, et gérminet Salvatórem.
      en2:
      - type: versicle
        text: Drop down dew, you heavens, from above, and let the clouds rain down the Just One.
      - type: response
        text: Let the earth open and bring forth the Savior.
  versicle.sc-pulis-suis-obumbr-bit-tibi-7a8913b2cc:
    role: versicle
    content:
      en:
      - type: versicle
        text: He will overshadow thee with his shoulders.
      - type: response
        text: And under his wings thou shalt trust.
      la:
      - type: versicle
        text: Scápulis suis obumbrábit tibi.
      - type: response
        text: Et sub pennis eius sperábis.
      en2:
      - type: versicle
        text: He will overshadow you with his shoulders.
      - type: response
        text: And under his wings you shall hope.
  versicle.scuto-circ-mdabit-te-v-ritas-eius-19b06776a4:
    role: versicle
    content:
      en:
      - type: versicle
        text: His truth shall compass thee with a shield.
      - type: response
        text: Thou shalt not be afraid of the terror of the night.
      la:
      - type: versicle
        text: Scuto circúmdabit te véritas eius.
      - type: response
        text: Non timébis a timóre noctúrno.
      en2:
      - type: versicle
        text: His truth will surround you as a shield.
      - type: response
        text: You will not fear the terror of the night.
  versicle.surr-xit-d-minus-vere-allel-ia-55fad0a292:
    role: versicle
    content:
      en:
      - type: versicle
        text: The Lord is risen indeed, alleluia.
      - type: response
        text: And hath appeared to Simon, alleluia.
      la:
      - type: versicle
        text: Surréxit Dóminus vere, allelúia.
      - type: response
        text: Et appáruit Simóni, allelúia.
      en2:
      - type: versicle
        text: The Lord is truly risen, alleluia.
      - type: response
        text: And he appeared to Simon, alleluia.
  versicle.tim-bunt-gentes-nomen-tuum-d-mine-a15e71f64a:
    role: versicle
    content:
      en:
      - type: versicle
        text: And the Gentiles shall fear thy name, O Lord.
      - type: response
        text: And all the kings of the earth thy glory.
      la:
      - type: versicle
        text: Timébunt gentes nomen tuum, Dómine.
      - type: response
        text: Et omnes reges terræ glóriam tuam.
      en2:
      - type: versicle
        text: The nations shall fear your name, O Lord.
      - type: response
        text: And all the kings of the earth your glory.
  versicle.veni-d-mine-et-noli-tard-re-697cb87409:
    role: versicle
    content:
      en:
      - type: versicle
        text: Come, O Lord, do not be late.
      - type: response
        text: Forgive the misdeeds of your people.
      la:
      - type: versicle
        text: Veni, Dómine, et noli tardáre.
      - type: response
        text: Reláxa facínora plebi tuæ.
      en2:
      - type: versicle
        text: Come, O Lord, and do not delay.
      - type: response
        text: Forgive the sins of your people.
  versicle.vox-clam-ntis-in-des-rto-par-te-viam-d-mini-cf8bcbeefc:
    role: versicle
    content:
      en:
      - type: versicle
        text: 'A voice of one crying in the wilderness: Prepare the way of the Lord.'
      - type: response
        text: Make straight his paths.
      la:
      - type: versicle
        text: 'Vox clamántis in desérto: Paráte viam Dómini.'
      - type: response
        text: Rectas fácite sémitas eius.
      en2:
      - type: versicle
        text: 'A voice of one crying in the wilderness: Prepare the way of the Lord.'
      - type: response
        text: Make straight his paths.
