          The world began, so evermore.
          Amen.
  hymn.iesu-nostra-red-mptio-6c15c746ce:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iesu nostra redémptio,
          Amor et desidérium,
          Deus Creátor ómnium,
          Homo in fine témporum:

          Quæ te vicit cleméntia,
          Ut ferres nostra crímina,
          Crudélem mortem pátiens,
          Ut nos a morte tólleres!

          Inférni claustra pénetrans,
          Tuos captívos rédimens,
          Victor triúmpho nóbili
          Ad dextram Patris résidens.

          Ipsa te cogat píetas,
          Ut mala nostra súperes
          Parcénd[o], et voti cómpotes
          Nos tuo vultu sáties.

          Tu esto nostrum gáudium,
          Qui es futúrus prǽmium,
          Sit nostra in te glória,
          Per cuncta semper sǽcula.
          Glória tibi Dómine,
          Qui scandis super sídera,
          Cum Patre, et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          Jesus, our redemption,
          Our love and our longing,
          God, Creator of all things,
          Made man at the end of time:
      
          What mercy overcame you
          To bear our sins,
          Suffering a cruel death,
          That you might lift us from death!
      
          Penetrating the gates of hell,
          Redeeming your own captives,
          Victor in a glorious triumph,
          You sit at the right hand of the Father.
      
          May your own loving kindness compel you
          To overcome our evils
          By pardoning, and satisfy us who have obtained our desire
          With the sight of your face.
      
          Be our joy,
          You who are to be our reward;
          May our glory be in you
          Through all ages for ever.
          Glory to you, O Lord,
          Who ascend above the stars,
          With the Father and the Holy Spirit,
          For ever and ever.
          Amen.
  hymn.iesu-nostra-red-mptio-c16a905b3c:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iesu nostra redémptio,
          Amor et desidérium,
          Deus Creátor ómnium,
          Homo in fine témporum:

          Quæ te vicit cleméntia,
          Ut ferres nostra crímina,
          Crudélem mortem pátiens,
          Ut nos a morte tólleres!

          Inférni claustra pénetrans,
          Tuos captívos rédimens,
          Victor triúmpho nóbili
          Ad dextram Patris résidens.

          Ipsa te cogat píetas,
          Ut mala nostra súperes
          Parcénd[o], et voti cómpotes
          Nos tuo vultu sáties.
          Dudum sacráta péctora
          Tua replésti grátia:
          Dimítte nostra crímina,
          Et da quiéta témpora.
      en2:
      - type: text
        text: |-
          Jesus, our redemption,
          Our love and our longing,
          God, Creator of all things,
          Made man at the end of time:
      
          What mercy overcame you
          To bear our sins,
          Suffering a cruel death,
          That you might lift us from death!
      
          Penetrating the gates of hell,
          Redeeming your own captives,
          Victor in a glorious triumph,
          You sit at the right hand of the Father.
      
          May your own loving kindness compel you
          To overcome our evils
          By pardoning, and satisfy us who have obtained our desire
          With the sight of your face.
          You have already filled with your grace
          Holy hearts dedicated to you:
          Forgive our sins,
          And grant us peaceful times.
  hymn.iesu-nostra-red-mptio-ebfa6ef679:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Iesu nostra redémptio,
          Amor et desidérium,
          Deus Creátor ómnium,
          Homo in fine témporum:

          Quæ te vicit cleméntia,
          Ut ferres nostra crímina,
          Crudélem mortem pátiens,
          Ut nos a morte tólleres!

          Inférni claustra pénetrans,
          Tuos captívos rédimens,
          Victor triúmpho nóbili
          Ad dextram Patris résidens.

          Ipsa te cogat píetas,
          Ut mala nostra súperes
          Parcénd[o], et voti cómpotes
          Nos tuo vultu sáties.
          Quǽsumus, Auctor ómnium,
          In hoc pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexíst[i] a mórtuis,
          Cum Patr[e] et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          Jesus, our redemption,
          Our love and our longing,
          God, Creator of all things,
          Made man at the end of time:
      
          What mercy overcame you
          To bear our sins,
          Suffering a cruel death,
          That you might lift us from death!
      
          Penetrating the gates of hell,
          Redeeming your own captives,
          Victor in a glorious triumph,
          You sit at the right hand of the Father.
      
          May your own loving kindness compel you
          To overcome our evils
          By pardoning, and satisfy us who have obtained our desire
          With the sight of your face.
          We pray, O Author of all things,
          In this Paschal joy,
          Defend your people
          From every assault of death.
      
          Glory to you, O Lord,
          Who rose from the dead,
          With the Father and the Holy Spirit,
          For ever and ever.
          Amen.
  hymn.imm-nse-c-li-c-nditor-7a94fc1cd2:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Imménse cæli Cónditor,
          Qui mixta ne confúnderent,
          Aquæ fluénta dívidens,
          Cælum dedísti límitem.

          Firmans locum cæléstibus,
          Simúlque terræ rívulis;
          Ut unda flammas témperet,
          Terræ solum ne díssipent.

          Infúnde nunc, piíssime,
          Donum perénnis grátiæ:
          Fraudis novæ ne cásibus
          Nos error átterat vetus.

          Lucem fides invéniat:
          Sic lúminis iubar ferat:
          Ut vana cuncta próterat:
          Hanc falsa nulla cómprimant.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          Vast Creator of the heavens,
          Who, dividing the flowing waters
          Lest they intermingle in confusion,
          Set the sky as their limit:
      
          Making a place for the heavenly bodies,
          And likewise for the streams of earth;
          That the water might temper the flames,
          And not dissolve the surface of the earth:
      
          Pour in now, O most loving One,
          The gift of lasting grace:
          Lest ancient error wear us down
          By the occasions of new deceit.
      
          May faith find the light;
          So may it bring forth the ray of brightness:
          That it may overcome all vanities:
          Let no falsehood suppress it.
      
          Grant this, most loving Father,
          And you, the Only-Begotten, equal to the Father,
          With the Spirit the Paraclete,
          Reigning through every age.
          Amen.
  hymn.imm-nse-c-li-c-nditor-ac78f1d1c9:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O great Creator of the sky,
          Who wouldest not the floods on high
          With earthly waters to confound,
          But mad’st the firmament their bound;

          The floods above thou didst ordain;
          The floods below thou didst restrain:
          That moisture might attemper heat,
          Lest the parched earth should ruin meet.

          Upon our souls, good Lord, bestow
          Thy gift of grace in endless flow:
          Lest some renewed deceit or wile
          Of former sin should us beguile.

          Let faith discover heav’nly light;
          So shall its rays direct us right:
          And let this faith each error chase,
          And never give to falsehood place.

          Grant this, O Father, ever One
          With Christ, thy sole-begotten Son,
          And Holy Ghost, whom all adore,
          Reigning and blest forevermore.
          Amen.
