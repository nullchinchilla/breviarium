  hymn.audi-ben-gne-c-nditor-8bbd0ace2b:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O kind Creator, bow thine ear
          To mark the cry, to know the tear
          Before thy throne of mercy spent
          In this thy holy fast of Lent.

          Our hearts are open, Lord, to thee:
          Thou knowest our infirmity;
          Pour out on all who seek thy face
          Abundance of thy pardoning grace.

          Our sins are many, this we know;
          Spare us, good Lord, thy mercy show;
          And for the honour of thy name
          Our fainting souls to life reclaim.

          Give us the self-control that springs
          From discipline of outward things,
          That fasting inward secretly
          The soul may purely dwell with thee.

          We pray thee, Holy Trinity,
          One God, unchanging Unity,
          That we from this our abstinence
          May reap the fruits of penitence.
          Amen.
      la:
      - type: text
        text: |-
          Audi, benígne Cónditor,
          Nostras preces cum flétibus,
          In hoc sacro ieiúnio
          Fusas quadragenário.

          Scrutátor alme córdium,
          Infírma tu scis vírium:
          Ad te revérsis éxhibe
          Remissiónis grátiam.

          Multum quidem peccávimus,
          Sed parce confiténtibus:
          Ad nóminis laudem tui
          Confer medélam lánguidis.

          Concéde nostrum cónteri
          Corpus per abstinéntiam;
          Culpæ ut relínquant pábulum
          Ieiúna corda críminum.

          Præsta, beáta Trínitas,
          Concéde, simplex Únitas;
          Ut fructuósa sint tuis
          Ieiuniórum múnera.
          Amen.
      en2:
      - type: text
        text: |-
          O kind Creator, bow thine ear
