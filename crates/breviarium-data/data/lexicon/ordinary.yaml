  hymn.serm-ne-blando-angelus-8eea60e69a:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Sermóne blando Angelus
          Predíxit muliéribus:
          In Galilǽa Dóminus
          Vidéndus est quantócius.

          Illæ dum pergunt cóncite
          Apóstolis hoc dícere,
          Vidéntes eum vívere,
          Osculántur pedes Dómini.

          Quo ágnito discípuli
          In Galilǽam própere
          Pergunt vidére fáciem
          Desiderátam Dómini.

          Claro pascháli gáudio
          Sol mundo nitet rádio,
          Cum Christum iam Apóstoli
          Visu cernunt corpóreo.

          Osténsa sibi vúlnera,
          In Christi carne fúlgida,
          Resurrexísse Dóminum
          Voce faténtur pública.

          Rex Christe clementíssime,
          Tu corda nostra pósside:
          Ut tibi laudes débitas
          Reddámus omni témpore.

          Quǽsumus, Auctor ómnium,
          In hoc pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexísti a mórtuis,
          Cum Patre et Sancto Spíritu
          In sempitérna sǽcula.
          Amen.
      en2:
      - type: text
        text: |-
          With sweet words the Angel
          Foretold to the women:
          The Lord is to be seen in Galilee
          With all speed.
      
          While they hasten to tell this
          To the Apostles,
          Seeing him alive,
          They kiss the feet of the Lord.
      
          When this was known, the disciples
          Hastily departed to Galilee
          To see the longed-for face
          Of the Lord.
      
          In the bright joy of Easter
          The sun shines upon the world with its ray,
          Now that the Apostles
          Behold Christ with bodily sight.
      
          The wounds shown to them
          Glowing in the flesh of Christ,
          They publicly declare in voice
          That the Lord has risen.
      
          O Christ, most merciful King,
          Take possession of our hearts:
          That we may render you the praises due
          At all times.
      
          We pray, O Author of all things,
          In this Paschal joy,
          Defend your people
          From every assault of death.
      
          Glory to you, O Lord,
          Who rose from the dead,
          With the Father and the Holy Spirit
          For ever and ever.
          Amen.
  hymn.somno-ref-ctis-rtubus-54c8a97993:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          Our limbs refreshed with slumber now,
          And sloth cast off, in prayer we bow;
          And while we sing thy praises dear,
          O Father, be thou present here.

          To thee our earliest morning song,
          To thee our hearts full powers belong;
          And thou, O Holy One, prevent
          Each following action and intent.

          As shades at morning flee away,
          And night before the star of day;
          So each transgression of the night
          Be purged by thee, celestial Light!

          Cut off, we pray thee, each offense,
          And every lust of thought and sense:
          That by their lips who thee adore
          Thou mayst be praised forevermore.

          Grant this, O Father ever One
          With Christ, thy sole-begotten Son,
          And Holy Ghost, whom all adore,
          Reigning and blest forevermore.
          Amen.
      la:
      - type: text
        text: |-
          Somno reféctis ártubus,
          Spreto cubíli, súrgimus:
          Nobis, Pater, canéntibus
          Adésse te depóscimus.

          Te lingua primum cóncinat,
          Te mentis ardor ámbiat:
          Ut áctuum sequéntium
          Tu, Sancte, sis exórdium.

          Cedant tenébræ lúmini,
          Et nox diúrno síderi,
          Ut culpa, quam nox íntulit,
          Lucis labáscat múnere.

          Precámur iídem súpplices,
          Noxas ut omnes ámputes,
          Et ore te canéntium
          Laudéris omni témpore.

          Præsta, Pater piíssime,
          Patríque compar Únice,
          Cum Spíritu Paráclito
          Regnans per omne sǽculum.
          Amen.
      en2:
      - type: text
        text: |-
          Our limbs refreshed with slumber now,
