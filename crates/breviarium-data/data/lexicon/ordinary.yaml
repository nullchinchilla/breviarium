          A cunctis nos, quǽsumus, Dómine, mentis et córporis defénde perículis: et, intercedénte beáta et gloriósa semper Vírgine Dei Genitríce María, cum beáto Ioseph, beátis Apóstolis tuis Petro et Paulo, atque beáto~
      - type: prayer
        text: N. et ómnibus Sanctis, salútem nobis tríbue benígnus et pacem; ut, destrúctis adversitátibus et erróribus univérsis, Ecclésia tua secúra tibi sérviat libertáte.
      - type: prayer
        text: Per eúndem Dóminum nostrum Iesum Christum Fílium tuum, qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
  chapter.crucem-sanctam-s-biit-qui-inf-rnum-confr-git-acc-d101cd5139:
    role: chapter
    content:
      la:
      - type: antiphon
        text: Crucem sanctam súbiit, qui inférnum confrégit; accínctus est poténtia, surréxit die tértia, allelúia.
      - type: versicle
