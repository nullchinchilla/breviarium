  rubric.sp-ritus-sanctus-in-te-desc-ndet-mar-a-ne-t-meas-eb2fce0396:
    role: rubric
    content:
      la:
      - type: antiphon
        text: Spíritus sanctus in te descéndet, María, ne tímeas, habébis in útero Fílium Dei.
      - type: text
        text: ''
      - type: versicle
        text: Ecce ancílla Dómini.
      - type: response
        text: Fiat mihi secúndum verbum tuum.
      - type: text
        text: |-
          Orémus.
          Lætífica, et ádiuva nos, omnípotens et miséricors Deus, Domínicæ Conceptiónis gáudia recoléntes, et pia Dei Génitrix Virgo semper María (in cuius veneratióne hæc commemorámus) in cunctis necessitátibus nostris grátiam sancti Spíritus nobis ímpetret, et levámen. Per eúndem Christum Dóminum nostrum.
      - type: response
        text: Amen.
      en2:
      - type: antiphon
        text: The Holy Spirit will come upon you, Mary; do not be afraid; you will conceive in your womb the Son of God.
      - type: text
        text: ''
      - type: versicle
        text: Behold the handmaid of the Lord.
      - type: response
        text: Be it done to me according to your word.
      - type: text
        text: |-
          Let us pray.
          Gladden and help us, almighty and merciful God, as we recall the joys of the Lord's Conception; and may the devout Virgin Mary, Mother of God, ever-Virgin (in whose veneration we celebrate these things), obtain for us the grace of the Holy Spirit and relief in all our needs. Through the same Christ our Lord.
      - type: response
        text: Amen.
