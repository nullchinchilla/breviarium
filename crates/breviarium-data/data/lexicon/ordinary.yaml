  rubric.reg-na-c-li-l-t-re-allel-ia-b439a22fb0:
    role: rubric
    content:
      en:
      - type: antiphon
        text: O Queen of heaven rejoice
      la:
      - type: text
        text: |
          Regína cæli, lætáre, allelúia;
          Quia quem meruísti portáre, allelúia,
          Resurréxit, sicut dixit, allelúia:
          Ora pro nobis Deum, allelúia.
      - type: versicle
        text: Gaude et lætáre, Virgo María, allelúia.
      - type: response
        text: Quia surréxit Dóminus vere, allelúia.
      - type: text
        text: |-
          Orémus.
          Deus, qui per resurrectiónem Fílii tui, Dómini nostri Iesu Christi, mundum lætificáre dignátus es: præsta, quǽsumus; ut, per eius Genetrícem Vírginem Maríam, perpétuæ capiámus gáudia vitæ. Per eúndem Christum Dóminum nostrum. Amen.
      en2:
      - type: text
        text: |-
          Queen of heaven, rejoice, alleluia;
          for he whom you merited to bear, alleluia,
          has risen, as he said, alleluia:
          pray for us to God, alleluia.
      - type: versicle
        text: Rejoice and be glad, O Virgin Mary, alleluia.
      - type: response
        text: For the Lord has truly risen, alleluia.
      - type: text
        text: |-
          Let us pray.
          O God, who were pleased to give joy to the world through the Resurrection of your Son our Lord Jesus Christ: grant, we beseech you, that through his Mother, the Virgin Mary, we may lay hold of the joys of eternal life. Through the same Christ our Lord. Amen.
