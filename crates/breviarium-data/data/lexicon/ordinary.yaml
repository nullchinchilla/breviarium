  hymn.rector-potens-verax-deus-016c019c86:
    role: hymn
    content:
      la:
      - type: text
        text: Rector potens, verax Deus,
      - type: text
        text: Qui témperas rerum vices,
      - type: text
        text: Splendóre mane ínstruis,
      - type: text
        text: 'Et ígnibus merídiem:'
      - type: text
        text: Exstíngue flammas lítium,
      - type: text
        text: Aufer calórem nóxium,
      - type: text
        text: Confer salútem córporum,
      - type: text
        text: Verámque pacem córdium.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
      - type: text
        text: Rector potens, verax Deus,
      - type: text
        text: Qui témperas rerum vices,
      - type: text
        text: Splendóre mane illúminas,
      - type: text
        text: 'Et ígnibus merídiem:'
      - type: text
        text: Exstíngue flammas lítium,
      - type: text
        text: Aufer calórem nóxium,
      - type: text
        text: Confer salútem córporum,
      - type: text
        text: Verámque pacem córdium.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.rector-potens-verax-deus-581d2ec760:
    role: hymn
    content:
      en:
      - type: text
        text: O God of truth, O Lord of might,
      - type: text
        text: Who orderest time and change aright,
      - type: text
        text: Who send’st the early morning ray,
      - type: text
        text: 'And light’st the glow of perfect day:'
      - type: text
        text: Extinguish thou each sinful fire,
      - type: text
        text: And banish every ill desire;
      - type: text
        text: And while thou keep’st the body whole,
      - type: text
        text: Shed forth thy peace upon the soul.
      - type: text
        text: '* Almighty Father, hear our cry,'
      - type: text
        text: Through Jesus Christ, our Lord most High,
      - type: text
        text: Who, with the Holy Ghost and thee,
      - type: text
        text: Doth live and reign eternally.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Rector potens, verax Deus,
      - type: text
        text: Qui témperas rerum vices,
      - type: text
        text: Splendóre mane illúminas,
      - type: text
        text: 'Et ígnibus merídiem:'
      - type: text
        text: Exstíngue flammas lítium,
      - type: text
        text: Aufer calórem nóxium,
      - type: text
        text: Confer salútem córporum,
      - type: text
        text: Verámque pacem córdium.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.rerum-cre-tor-ptime-039e460eb7:
    role: hymn
    content:
      en:
      - type: text
        text: Who madest all and dost control,
      - type: text
        text: Lord, with thy touch divine,
      - type: text
        text: Cast out the slumbers of the soul,
      - type: text
        text: The rest that is not thine.
      - type: text
        text: Look down, Eternal Holiness,
      - type: text
        text: And wash the sins away,
      - type: text
        text: Of those, who, rising to confess,
      - type: text
        text: Outstrip the lingering day.
      - type: text
        text: Our hearts and hands by night, O Lord,
      - type: text
        text: We lift them in Our need;
      - type: text
        text: As holy Psalmists give the word,
      - type: text
        text: And holy Paul the deed.
      - type: text
        text: Each sin to thee of years gone by,
      - type: text
        text: Each hidden stain lies bare;
      - type: text
        text: We shrink not from thine awful eye,
      - type: text
        text: But pray that thou wouldst spare.
      - type: text
        text: Grant this, O Father, Only Son
      - type: text
        text: And Spirit, God of grace,
      - type: text
        text: To whom all worship shall be done
      - type: text
        text: In every time and place,
      - type: text
        text: Amen.
      la:
      - type: text
        text: Rerum Creátor óptime,
      - type: text
        text: 'Rectórque noster, áspice:'
      - type: text
        text: Nos a quiéte nóxia
      - type: text
        text: Mersos sopóre líbera.
      - type: text
        text: Te, sancte Christe, póscimus,
      - type: text
        text: 'Ignósce culpis ómnibus:'
      - type: text
        text: Ad confiténdum súrgimus,
      - type: text
        text: Morásque noctis rúmpimus.
      - type: text
        text: Mentes manúsque tóllimus,
      - type: text
        text: Prophéta sicut nóctibus
      - type: text
        text: Nobis geréndum prǽcipit,
      - type: text
        text: Paulúsque gestis cénsuit.
      - type: text
        text: 'Vides malum, quod fécimus:'
      - type: text
        text: 'Occúlta nostra pándimus:'
      - type: text
        text: Preces geméntes fúndimus,
      - type: text
        text: Dimítte quod peccávimus.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.rerum-cre-tor-ptime-61da60dcc9:
    role: hymn
    content:
      la:
      - type: text
        text: Rerum Creátor óptime,
      - type: text
        text: 'Rectórque noster, áspice:'
      - type: text
        text: Nos a quiéte nóxia
      - type: text
        text: Mersos sopóre líbera.
      - type: text
        text: Te, sancte Christe, póscimus,
      - type: text
        text: 'Ignósce tu criminibus:'
      - type: text
        text: Ad confiténdum súrgimus,
      - type: text
        text: Morásque noctis rúmpimus.
      - type: text
        text: Mentes manúsque tóllimus,
      - type: text
        text: Prophéta sicut nóctibus
      - type: text
        text: Nobis geréndum prǽcipit,
      - type: text
        text: Paulúsque gestis cénsuit.
      - type: text
        text: 'Vides malum, quod fécimus:'
      - type: text
        text: 'Occúlta nostra pándimus:'
      - type: text
        text: Preces geméntes fúndimus,
      - type: text
        text: Dimítte quod peccávimus.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.rerum-deus-tenax-vigor-1d9e3fdd7c:
    role: hymn
    content:
      en:
      - type: text
        text: O strength and stay upholding all creation,
      - type: text
        text: Who ever dost thyself unmoved abide,
      - type: text
        text: Yet day by day the light in due gradation
      - type: text
        text: 'From hour to hour through all its changes guide:'
      - type: text
        text: Grant to life’s day a calm unclouded ending,
      - type: text
        text: An eve untouched by shadows of decay,
      - type: text
        text: The brightness of a holy death-bed blending
      - type: text
        text: With dawning glories of th’ eternal day.
      - type: text
        text: '* Hear us, O Father, gracious and forgiving,'
      - type: text
        text: And thou, O Christ, the co-eternal Word,
      - type: text
        text: Who, with the Holy Ghost, by all things living
      - type: text
        text: Now and to endless ages art adored.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Rerum, Deus, tenax vigor,
      - type: text
        text: Immótus in te pérmanens,
      - type: text
        text: Lucis diúrnæ témpora
      - type: text
        text: 'Succéssibus detérminans:'
      - type: text
        text: Largíre lumen véspere,
      - type: text
        text: Quo vita nusquam décidat,
      - type: text
        text: Sed prǽmium mortis sacræ
      - type: text
        text: Perénnis instet glória.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.rerum-deus-tenax-vigor-3369fb8ae7:
    role: hymn
    content:
      la:
      - type: text
        text: Rerum, Deus, tenax vigor,
      - type: text
        text: Immótus in te pérmanens,
      - type: text
        text: Lucis diúrnæ témpora
      - type: text
        text: 'Succéssibus detérminans:'
      - type: text
        text: Largíre clarum véspere,
      - type: text
        text: Quo vita nusquam décidat,
      - type: text
        text: Sed prǽmium mortis sacræ
      - type: text
        text: Perénnis instet glória.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.rex-sempit-rne-c-litum-9244452d9a:
    role: hymn
    content:
      en:
      - type: text
        text: O thou, the heavens' eternal King,
      - type: text
        text: Creator, unto thee we sing,
      - type: text
        text: With God the Father ever One,
      - type: text
        text: Co-equal, co-eternal Son.
      - type: text
        text: Thy hand, when first the world began,
      - type: text
        text: Made in thine own pure image man,
      - type: text
        text: And linked to Adam, sprung from earth,
      - type: text
        text: A living soul of heavenly birth.
      - type: text
        text: And when by craft the envious foe
      - type: text
        text: Had marred thy noblest work below,
      - type: text
        text: Clothed in our flesh, thou didst restore
      - type: text
        text: The image thou hadst made before.
      - type: text
        text: Once wast thou born of Mary's womb;
      - type: text
        text: And now, new-born from out the tomb,
      - type: text
        text: O Christ, thou bidd'st us rise with thee
      - type: text
        text: From death to immortality.
      - type: text
        text: Eternal Shepherd, thou dost lave
      - type: text
        text: Thy flock in pure baptismal wave,
      - type: text
        text: That mystic bath, that grave of sin,
      - type: text
        text: Where ransomed souls new life begin.
      - type: text
        text: Redeemer, thou for us didst deign
      - type: text
        text: To hang upon the Cross of pain,
      - type: text
        text: And give for us the lavish price
      - type: text
        text: Of thine own blood in sacrifice.
      - type: text
        text: Grant, Lord, in thee each faithful mind
      - type: text
        text: Unceasing paschal joy may find;
      - type: text
        text: And from the death of sin set free
      - type: text
        text: Souls newly born to life by thee.
      - type: text
        text: To thee, once dead, who now dost live,
      - type: text
        text: All glory, Lord, thy people give,
      - type: text
        text: Whom, with the Father, we adore,
      - type: text
        text: And Holy Ghost forevermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Rex sempitérne Cǽlitum,
      - type: text
        text: Rerum Creátor ómnium,
      - type: text
        text: Æquális ante sǽcula
      - type: text
        text: 'Semper Parénti Fílius:'
      - type: text
        text: Nascénte qui mundo Faber
      - type: text
        text: Imáginem vultus tui
      - type: text
        text: Tradens Adámo, nóbilem
      - type: text
        text: Limo iugásti spíritum.
      - type: text
        text: Cum livor et fraus dǽmonis
      - type: text
        text: 'Fœdásset humánum genus:'
      - type: text
        text: Tu, carne amíctus, pérditam
      - type: text
        text: Formam refórmas ártifex.
      - type: text
        text: Qui, natus olim e Vírgine,
      - type: text
        text: Nunc e sepúlcro násceris,
      - type: text
        text: Tecúmque nos a mórtuis
      - type: text
        text: Iubes sepúltos súrgere.
      - type: text
        text: Qui, pastor ætérnus, gregem
      - type: text
        text: 'Aqua lavas baptísmatis:'
      - type: text
        text: 'Hæc est lavácrum méntium:'
      - type: text
        text: Hæc est sepúlcrum críminum.
      - type: text
        text: Nobis diu qui débitæ
      - type: text
        text: Redémptor affíxus cruci,
      - type: text
        text: Nostræ dedísti pródigus
      - type: text
        text: Prétium salútis sánguinem.
      - type: text
        text: Ut sis perénne méntibus
      - type: text
        text: Paschále, Iesu, gáudium,
      - type: text
        text: A morte dira críminum
      - type: text
        text: Vitæ renátos líbera.
      - type: text
        text: '* Deo Patri sit glória,'
      - type: text
        text: Et Fílio, qui a mórtuis
      - type: text
        text: Surréxit, ac Paráclito,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.rex-sempit-rne-d-mine-5413c77774:
    role: hymn
    content:
      en:
      - type: text
        text: O thou, the heavens' eternal King,
      - type: text
        text: Creator, unto thee we sing,
      - type: text
        text: With God the Father ever One,
      - type: text
        text: Co-equal, co-eternal Son.
      - type: text
        text: Thy hand, when first the world began,
      - type: text
        text: Made in thine own pure image man,
      - type: text
        text: And linked to Adam, sprung from earth,
      - type: text
        text: A living soul of heavenly birth.
      - type: text
        text: And when by craft the envious foe
      - type: text
        text: Had marred thy noblest work below,
      - type: text
        text: Clothed in our flesh, thou didst restore
      - type: text
        text: The image thou hadst made before.
      - type: text
        text: So that thou might redeem man
      - type: text
        text: Whom thou hadst made
      - type: text
        text: And us to God might thou wouldst unite
      - type: text
        text: Through thy union with the flesh.
      - type: text
        text: Once wast thou born of Mary's womb;
      - type: text
        text: And now, new-born from out the tomb,
      - type: text
        text: O Christ, thou bidd'st us rise with thee
      - type: text
        text: From death to immortality.
      - type: text
        text: Eternal Shepherd, thou dost lave
      - type: text
        text: Thy flock in pure baptismal wave,
      - type: text
        text: That mystic bath, that grave of sin,
      - type: text
        text: Where ransomed souls new life begin.
      - type: text
        text: Redeemer, thou for us didst deign
      - type: text
        text: To hang upon the Cross of pain,
      - type: text
        text: And give for us the lavish price
      - type: text
        text: Of thine own blood in sacrifice.
      - type: text
        text: Grant, Lord, in thee each faithful mind
      - type: text
        text: Unceasing paschal joy may find;
      - type: text
        text: And from the death of sin set free
      - type: text
        text: Souls newly born to life by thee.
      - type: text
        text: To Thee Who, dead, again dost live,
      - type: text
        text: All glory, Lord, Thy people give;
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To Father and to Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Rex sempitérne Dómine,
      - type: text
        text: Rerum Creátor ómnium,
      - type: text
        text: Qui eras ante sǽcula
      - type: text
        text: 'Semper cum Patre Fílius:'
      - type: text
        text: Qui mundi in primórdio
      - type: text
        text: 'Adam plásmasti hóminem:'
      - type: text
        text: Cui tuæ imágini
      - type: text
        text: Vultum dedísti símilem.
      - type: text
        text: Quem diábolus decéperat,
      - type: text
        text: Hostis humáni géneris,
      - type: text
        text: Cuius tu formam córporis
      - type: text
        text: 'Assúmere dignátus es:'
      - type: text
        text: Ut hóminem redímeres,
      - type: text
        text: 'Quem ante iam plasmáveras:'
      - type: text
        text: Et nos Deo coniúngeres,
      - type: text
        text: Per carnis contubérnium.
      - type: text
        text: Quem éditum ex Vírgine
      - type: text
        text: 'Pavéscit omnis ánima:'
      - type: text
        text: Per quem et nos resúrgere
      - type: text
        text: Devóta mente crédimus.
      - type: text
        text: Qui nobis in Baptísmate
      - type: text
        text: Donásti indulgéntiam,
      - type: text
        text: Qui tenebámur vínculis
      - type: text
        text: Ligáti consciéntiæ.
      - type: text
        text: Qui Crucem propter hóminem
      - type: text
        text: 'Suscípere dignátus es:'
      - type: text
        text: Dedísti tuum sánguinem
      - type: text
        text: Nostræ salútis prétium.
      - type: text
        text: Quǽsumus Auctor ómnium,
      - type: text
        text: In hoc Pascháli gáudio,
      - type: text
        text: Ab omni mortis ímpetu
      - type: text
        text: Tuum defénde pópulum.
      - type: text
        text: Glória tibi Dómine,
      - type: text
        text: Qui surrexísti a mórtuis,
      - type: text
        text: Cum Patre et Sancto Spíritu,
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.serm-ne-blando-angelus-8eea60e69a:
    role: hymn
    content:
      la:
      - type: text
        text: Sermóne blando Angelus
      - type: text
        text: 'Predíxit muliéribus:'
      - type: text
        text: In Galilǽa Dóminus
      - type: text
        text: Vidéndus est quantócius.
      - type: text
        text: Illæ dum pergunt cóncite
      - type: text
        text: Apóstolis hoc dícere,
      - type: text
        text: Vidéntes eum vívere,
      - type: text
        text: Osculántur pedes Dómini.
      - type: text
        text: Quo ágnito discípuli
      - type: text
        text: In Galilǽam própere
      - type: text
        text: Pergunt vidére fáciem
      - type: text
        text: Desiderátam Dómini.
      - type: text
        text: Claro pascháli gáudio
      - type: text
        text: Sol mundo nitet rádio,
      - type: text
        text: Cum Christum iam Apóstoli
      - type: text
        text: Visu cernunt corpóreo.
      - type: text
        text: Osténsa sibi vúlnera,
      - type: text
        text: In Christi carne fúlgida,
      - type: text
        text: Resurrexísse Dóminum
      - type: text
        text: Voce faténtur pública.
      - type: text
        text: Rex Christe clementíssime,
      - type: text
        text: 'Tu corda nostra pósside:'
      - type: text
        text: Ut tibi laudes débitas
      - type: text
        text: Reddámus omni témpore.
      - type: text
        text: Quǽsumus, Auctor ómnium,
      - type: text
        text: In hoc pascháli gáudio,
      - type: text
        text: Ab omni mortis ímpetu
      - type: text
        text: Tuum defénde pópulum.
      - type: text
        text: Glória tibi Dómine,
      - type: text
        text: Qui surrexísti a mórtuis,
      - type: text
        text: Cum Patre et Sancto Spíritu
      - type: text
        text: In sempitérna sǽcula.
      - type: text
        text: Amen.
  hymn.somno-ref-ctis-rtubus-00fcb2b01b:
    role: hymn
    content:
      la:
      - type: text
        text: Somno reféctis ártubus,
      - type: text
        text: 'Spreto cubíli, súrgimus:'
      - type: text
        text: Nobis, Pater, canéntibus
      - type: text
        text: Adésse te depóscimus.
      - type: text
        text: Te lingua primum cóncinat,
      - type: text
        text: 'Te mentis ardor ámbiat:'
      - type: text
        text: Ut áctuum sequéntium
      - type: text
        text: Tu, Sancte, sis exórdium.
      - type: text
        text: Cedant tenébræ lúmini,
      - type: text
        text: Et nox diúrno síderi,
      - type: text
        text: Ut culpa, quam nox íntulit,
      - type: text
        text: Lucis labáscat múnere.
      - type: text
        text: Precámur iídem súpplices,
      - type: text
        text: Noxas ut omnes ámputes,
      - type: text
        text: Et ore te canéntium
      - type: text
        text: Laudéris in perpetuum.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.somno-ref-ctis-rtubus-7e627f3118:
    role: hymn
    content:
      en:
      - type: text
        text: Our limbs refreshed with slumber now,
      - type: text
        text: And sloth cast off, in prayer we bow;
      - type: text
        text: And while we sing thy praises dear,
      - type: text
        text: O Father, be thou present here.
      - type: text
        text: To thee our earliest morning song,
      - type: text
        text: To thee our hearts full powers belong;
      - type: text
        text: And thou, O Holy One, prevent
      - type: text
        text: Each following action and intent.
      - type: text
        text: As shades at morning flee away,
      - type: text
        text: And night before the star of day;
      - type: text
        text: So each transgression of the night
      - type: text
        text: Be purged by thee, celestial Light!
      - type: text
        text: Cut off, we pray thee, each offense,
      - type: text
        text: 'And every lust of thought and sense:'
      - type: text
        text: That by their lips who thee adore
      - type: text
        text: Thou mayst be praised forevermore.
      - type: text
        text: Grant this, O Father ever One
      - type: text
        text: With Christ, thy sole-begotten Son,
      - type: text
        text: And Holy Ghost, whom all adore,
      - type: text
        text: Reigning and blest forevermore.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Somno reféctis ártubus,
      - type: text
        text: 'Spreto cubíli, súrgimus:'
      - type: text
        text: Nobis, Pater, canéntibus
      - type: text
        text: Adésse te depóscimus.
      - type: text
        text: Te lingua primum cóncinat,
      - type: text
        text: 'Te mentis ardor ámbiat:'
      - type: text
        text: Ut áctuum sequéntium
      - type: text
        text: Tu, Sancte, sis exórdium.
      - type: text
        text: Cedant tenébræ lúmini,
      - type: text
        text: Et nox diúrno síderi,
      - type: text
        text: Ut culpa, quam nox íntulit,
      - type: text
        text: Lucis labáscat múnere.
      - type: text
        text: Precámur iídem súpplices,
      - type: text
        text: Noxas ut omnes ámputes,
      - type: text
        text: Et ore te canéntium
      - type: text
        text: Laudéris omni témpore.
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.splendor-pat-rn-gl-ri-1af1dd28f8:
    role: hymn
    content:
      la:
      - type: text
        text: Splendor patérnæ glóriæ,
      - type: text
        text: De luce lucem próferens,
      - type: text
        text: Lux lucis, et fons lúminis,
      - type: text
        text: 'Diem dies illúminans:'
      - type: text
        text: Verúsque sol illábere,
      - type: text
        text: 'Micans nitóre pérpeti:'
      - type: text
        text: Iubárque Sancti Spíritus
      - type: text
        text: Infúnde nostris sénsibus.
      - type: text
        text: Votis vocémus et Patrem,
      - type: text
        text: Patrem perénnis glóriæ,
      - type: text
        text: Patrem poténtis grátiæ,
      - type: text
        text: Culpam reléget lúbricam.
      - type: text
        text: 'Confírmet actus strénuos:'
      - type: text
        text: 'Dentes retúndat ínvidi:'
      - type: text
        text: Casus secúndet ásperos,
      - type: text
        text: Donet geréndi grátiam.
      - type: text
        text: Mentem gubérnet et regat,
      - type: text
        text: 'Casto, fidéli córpore:'
      - type: text
        text: Fides calóre férveat,
      - type: text
        text: Fraudis venéna nésciat.
      - type: text
        text: Christúsque nobis sit cibus,
      - type: text
        text: 'Potúsque noster sit fides:'
      - type: text
        text: Læti bibámus sóbriam
      - type: text
        text: Ebrietátem spíritus.
      - type: text
        text: Lætus dies hic tránseat,
      - type: text
        text: Pudor sit ut dilúculum,
      - type: text
        text: Fides velut merídies,
      - type: text
        text: Crepúsculum mens nésciat.
      - type: text
        text: Auróra cursus próvehit,
      - type: text
        text: Auróra totus pródeat,
      - type: text
        text: In Patre totus Fílius,
      - type: text
        text: Et totus in Verbo Pater.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Et nunc et in perpétuum.
      - type: text
        text: Amen.
  hymn.splendor-pat-rn-gl-ri-1afa66bbaf:
    role: hymn
    content:
      en:
      - type: text
        text: O splendour of God’s glory bright,
      - type: text
        text: O thou that bringest light from light,
      - type: text
        text: O light of light, light’s living spring,
      - type: text
        text: O day, all days illumining.
      - type: text
        text: O thou true sun, on us thy glance
      - type: text
        text: Let fall in royal radiance,
      - type: text
        text: The Spirit’s sanctifying beam
      - type: text
        text: Upon our earthly senses stream.
      - type: text
        text: The Father too our prayers implore,
      - type: text
        text: Father of glory evermore,
      - type: text
        text: The Father of all grace and might,
      - type: text
        text: 'To banish sin from our delight:'
      - type: text
        text: To guide whate’er we nobly do,
      - type: text
        text: With love all envy to subdue,
      - type: text
        text: To make ill-fortune turn to fair,
      - type: text
        text: And give us grace our wrongs to bear.
      - type: text
        text: Our mind be in his keeping placed,
      - type: text
        text: Our body true to him and chaste,
      - type: text
        text: Where only faith her fire shall feed,
      - type: text
        text: And burn the tares of Satan’s seed.
      - type: text
        text: And Christ to us for food shall be,
      - type: text
        text: From him our drink that welleth free,
      - type: text
        text: The Spirit’s wine, that maketh whole,
      - type: text
        text: And mocking not, exalts the soul.
      - type: text
        text: Rejoicing may this day go hence,
      - type: text
        text: Like virgin dawn our innocence,
      - type: text
        text: Like fiery noon our faith appear,
      - type: text
        text: Nor know the gloom of twilight drear.
      - type: text
        text: Morn in her rosy car is borne;
      - type: text
        text: Let him come forth our perfect morn,
      - type: text
        text: The Word in God the Father One,
      - type: text
        text: The Father perfect in the Son.
      - type: text
        text: All laud to God the Father be;
      - type: text
        text: All praise, Eternal Son, to thee;
      - type: text
        text: All glory, as is ever meet,
      - type: text
        text: To God the Holy Paraclete.
      - type: text
        text: Amen.
      la:
      - type: text
        text: Splendor Patérnæ glóriæ,
      - type: text
        text: De luce lucem próferens,
      - type: text
        text: Lux lucis, et fons lúminis,
      - type: text
        text: 'Diem dies illúminans:'
      - type: text
        text: Verúsque sol illábere,
      - type: text
        text: 'Micans nitóre pérpeti:'
      - type: text
        text: Iubárque Sancti Spíritus
      - type: text
        text: Infúnde nostris sénsibus.
      - type: text
        text: Votis vocémus et Patrem,
      - type: text
        text: Patrem poténtis grátiæ,
      - type: text
        text: 'Patrem perénnis glóriæ:'
      - type: text
        text: Culpam reléget lúbricam.
      - type: text
        text: 'Confírmet actus strénuos:'
      - type: text
        text: 'Dentes retúndat ínvidi:'
      - type: text
        text: 'Casus secúndet ásperos:'
      - type: text
        text: Agénda recte dírigat.
      - type: text
        text: 'Mentem gubérnet et regat:'
      - type: text
        text: 'Sit pura nobis cástitas:'
      - type: text
        text: Fides calóre férveat,
      - type: text
        text: Fraudis venéna nésciat.
      - type: text
        text: Christúsque nobis sit cibus,
      - type: text
        text: 'Potúsque noster sit fides:'
      - type: text
        text: Læti bibámus sóbriam
      - type: text
        text: Profusiónem Spíritus.
      - type: text
        text: 'Lætus dies hic tránseat:'
      - type: text
        text: 'Pudor sit ut dilúculum:'
      - type: text
        text: 'Fides velut merídies:'
      - type: text
        text: Crepúsculum mens nésciat.
      - type: text
        text: Auróra lucem próvehit,
      - type: text
        text: Cum luce nobis pródeat
      - type: text
        text: In Patre totus Fílius,
      - type: text
        text: Et totus in Verbo Pater.
      - type: text
        text: Deo Patri sit glória,
      - type: text
        text: Eiúsque soli Fílio,
      - type: text
        text: Cum Spíritu Paráclito,
      - type: text
        text: Nunc et per omne sǽculum.
      - type: text
        text: Amen.
  hymn.summ-deus-clem-nti-9011a39165:
    role: hymn
    content:
      en:
      - type: text
        text: Great God of boundless mercy hear;
      - type: text
        text: Thou Ruler of this earthly sphere;
      - type: text
        text: In substance one, in persons three,
      - type: text
        text: Dread Trinity in Unity!
      - type: text
        text: Do thou in love accept our lays
      - type: text
        text: Of mingled penitence and praise;
      - type: text
        text: And set our hearts from error free,
      - type: text
        text: More fully to rejoice in thee.
      - type: text
        text: Our reins and hearts in pity heal,
      - type: text
        text: And with thy chastening fires anneal;
      - type: text
        text: Gird Thou our loins, each passion quell,
      - type: text
        text: And every harmful lust expel.
      - type: text
        text: Now as our anthems, upward borne,
      - type: text
        text: Awake the silence of the morn,
      - type: text
        text: Enrich us with thy gifts of grace,
      - type: text
        text: From heaven, thy blissful dwelling-place!
      - type: text
        text: Hear thou our prayer, Almighty King!
      - type: text
        text: Hear thou our praises, while we sing,
      - type: text
        text: Adoring with the heavenly host,
      - type: text
        text: The Father, Son, and Holy Ghost!
      - type: text
        text: Amen.
      la:
      - type: text
        text: Summæ Deus cleméntiæ,
      - type: text
        text: Mundíque Factor máchinæ,
      - type: text
        text: Unus potentiáliter,
      - type: text
        text: 'Trinúsque personáliter:'
      - type: text
        text: Nostros pius cum cánticis
      - type: text
        text: 'Fletus benígne súscipe:'
      - type: text
        text: Quo corde puro sórdibus
      - type: text
        text: Te perfruámur lárgius.
      - type: text
        text: Lumbos, iecúrque mórbidum
      - type: text
        text: Adúre igni cóngruo,
      - type: text
        text: Accíncti ut sint pérpetim,
      - type: text
        text: Luxu remóto péssimo.
      - type: text
        text: Ut quique horas nóctium
      - type: text
        text: Nunc concinéndo rúmpimus,
      - type: text
        text: Donis beátæ pátriæ
      - type: text
        text: Ditémur omnes áffatim
      - type: text
        text: '* Præsta, Pater piíssime,'
      - type: text
        text: Patríque compar Únice,
      - type: text
        text: Cum Spíritu Paráclito
      - type: text
        text: Regnans per omne sǽculum.
      - type: text
        text: Amen.
  hymn.summ-parens-clem-nti-ae3fc140d1:
    role: hymn
    content:
      en:
      - type: text
        text: Great God of boundless mercy hear;
      - type: text
        text: Thou Ruler of this earthly sphere;
      - type: text
        text: In substance one, in persons three,
      - type: text
        text: Dread Trinity in Unity!
      - type: text
        text: Do thou in love accept our lays
      - type: text
        text: Of mingled penitence and praise;
      - type: text
        text: And set our hearts from error free,
      - type: text
        text: More fully to rejoice in thee.
      - type: text
        text: Our reins and hearts in pity heal,
      - type: text
        text: And with thy chastening fires anneal;
      - type: text
        text: Gird Thou our loins, each passion quell,
      - type: text
        text: And every harmful lust expel.
      - type: text
        text: Now as our anthems, upward borne,
      - type: text
        text: Awake the silence of the morn,
      - type: text
