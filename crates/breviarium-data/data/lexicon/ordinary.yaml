texts:
  antiphon.ad-dandam-sci-ntiam-plebi-tu-d-mine-in-remissi-n-8256cfceec:
    role: antiphon
    content:
      la:
      - type: text
        text: Ad dandam sciéntiam * plebi tuæ, Dómine, in remissiónem peccatórum eórum.
  antiphon.allel-ia-asc-ndens-christus-in-altum-allel-ia-ca-63d08fd055:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Allelúia. Ascéndens Christus in altum, allelúia, captívam duxit captivitátem, allelúia, allelúia.
  antiphon.allel-ia-resurr-xit-d-minus-allel-ia-sicut-dixit-1fbc34c983:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Allelúia. Resurréxit Dóminus, allelúia: sicut dixit vobis, allelúia, allelúia.'
  antiphon.allel-ia-sp-ritus-par-clitus-allel-ia-doc-bit-vo-4c07764695:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Allelúia. Spíritus Paráclitus, allelúia, docébit vos ómnia, allelúia, allelúia.
  antiphon.bened-ctus-d-minus-deus-isra-l-quia-visit-vit-et-3a120ab515:
    role: antiphon
    content:
      en:
      - type: text
        text: |-
          Blessed be the Lord * the God of Israel, because he has visited and redeemed his people.
          Blessed be the Lord * the God of Israel.
      la:
      - type: text
        text: |-
          Benedíctus * Dóminus Deus Israël, quia visitávit et liberávit nos.
          Benedíctus * Dóminus Deus Israël.
  antiphon.de-beata-maria-7d302388f8:
    role: antiphon
    content:
      en:
      - type: heading
        text: Commemoration of the Blessed Virgin Mary.
      - type: antiphon
        text: O Holy Mary, be thou an help to the helpless, a strength to the fearful, a comfort to the sorrowful; pray for the people, plead for the clergy, make intercession for all women vowed to God may all that keep thine holy remembrance, feel the might of thine assistance.
      la:
      - type: heading
        text: De Beata Maria
      - type: antiphon
        text: 'Sancta María, succúrre míseris, iuva pusillánimes, réfove flébiles, ora pro pópulo, intérveni pro clero, intercéde pro devóto femíneo sexu: séntiant omnes tuum iuvámen, quicúmque célebrant tuam sanctam commemoratiónem.'
      - type: antiphon
        text: Sancta María, succúrre míseris, iuva pusillánimes, réfove flébiles, ora pro pópulo, intérveni pro clero, intercéde pro devóto fœmíneo sexu
  antiphon.de-beata-maria-9f24050e64:
    role: antiphon
    content:
      la:
      - type: heading
        text: De Beata Maria
      - type: antiphon
        text: Sancta Dei Génitrix, Virgo semper María, intercéde pro nobis ad Dóminum Deum nostrum. (Allelúia, allelúia.)
  antiphon.de-manu-mnium-qui-od-runt-nos-liber-vit-nos-d-mi-72fe322018:
    role: antiphon
    content:
      en:
      - type: text
        text: From the hand of all * who hate us, the Lord has delivered us.
      la:
      - type: text
        text: |-
          De manu ómnium * qui odérunt nos, liberávit nos Dóminus.
          De manu ómnium * qui odérunt nos, líbera nos Dómine.
  antiphon.dep-suit-d-minus-pot-ntes-de-sede-et-exalt-vit-h-fbf9e5127a:
    role: antiphon
    content:
      en:
      - type: text
        text: The Lord has put down * the mighty from their seat, and exalted the humble and meek.
      la:
      - type: text
        text: |-
          Depósuit Dóminus * poténtes de sede, et exaltávit húmiles.
          Depósuit poténtes, * Sanctos persequéntes: et exaltávit húmiles, Christum confiténtes.
  antiphon.ecce-compl-ta-sunt-mnia-qu-dicta-sunt-per-ngelum-ec41348a7d:
    role: antiphon
    content:
      en:
      - type: text
        text: Behold, all things are fulfilled * which were spoken by the Angel concerning the Virgin Mary.
      la:
      - type: text
        text: Ecce compléta sunt * ómnia, quæ dicta sunt per Ángelum de Vírgine María.
  antiphon.er-xit-nobis-d-minus-cornu-sal-tis-in-domo-david-ac8bfacc9e:
    role: antiphon
    content:
      en:
      - type: text
        text: The Lord has raised up * a horn of salvation for us in the house of David his servant.
      la:
      - type: text
        text: Eréxit nobis * Dóminus cornu salútis in domo David púeri sui.
  antiphon.ev-gila-super-nos-t-rne-salv-tor-ne-nos-appreh-n-9c45721793:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: Evígila super nos, * ætérne Salvátor, ne nos apprehéndat cállidus tentátor, quia tu nobis factus es sempitérnus adiútor.
  antiphon.exsult-vit-sp-ritus-meus-in-deo-salut-ri-meo-1cff50af25:
    role: antiphon
    content:
      en:
      - type: text
        text: My spirit rejoices * in God, in my Saviour.
      la:
      - type: text
        text: |-
          Exsultávit * spíritus meus in Deo salutári meo.
          Exsúltet * spíritus meus in Deo salutári meo.
  antiphon.fecit-deus-pot-ntiam-in-br-cchio-suo-disp-rsit-s-29e97fdc8a:
    role: antiphon
    content:
      en:
      - type: text
        text: 'God has shown * the power of his arm: he has scattered the proud in the imagination of their hearts.'
      la:
      - type: text
        text: |-
          Fecit Deus * poténtiam in brácchio suo: dispérsit supérbos mente cordis sui.
          Fac Deus, * poténtiam in brácchio tuo: dispérde supérbos, et exálta húmiles.
  antiphon.ill-mina-d-mine-sed-ntes-in-t-nebris-et-umbra-mo-5198bac72a:
    role: antiphon
    content:
      en:
      - type: text
        text: O Lord, give light * to those who sit in darkness and in the shadow of death, and guide our feet into the way of peace.
      la:
      - type: text
        text: |-
          Illúmina, Dómine, * sedéntes in ténebris et umbra mortis, et dírige pedes nostros in viam pacis.
          Illumináre, Dómine, * his qui in ténebris sedent: et dírige pedes nostros in viam pacis, Deus Israël.
  antiphon.in-sanctit-te-servi-mus-d-mino-et-liber-bit-nos-327b9d059f:
    role: antiphon
    content:
      en:
      - type: text
        text: In holiness * let us serve the Lord, and he will deliver us from our enemies.
      la:
      - type: text
        text: In sanctitáte * serviámus Dómino, et liberábit nos ab inimícis nostris.
  antiphon.in-viam-pacis-d-rige-nos-d-mine-0f6bddfee0:
    role: antiphon
    content:
      la:
      - type: text
        text: In viam pacis * dírige nos Dómine.
  antiphon.m-dia-vita-in-morte-sumus-quem-qu-rimus-adiut-re-d02fa30e1e:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'Média vita in morte sumus: quem quǽrimus adiutórem, nisi te, Dómine, qui pro peccátis nostris iuste irásceris? * Sancte Deus, Sancte fortis, Sancte et miséricors Salvátor, amáræ morti ne tradas nos.'
      - type: antiphon
        text: V. Ne proiícias nos in témpore senectutis; cum defécerit virtus nostra, ne derelínquas nos, Dómine. Sancte Deus.
  antiphon.magn-ficat-nima-mea-d-minum-quia-resp-xit-deus-h-03a29d8ced:
    role: antiphon
    content:
      en:
      - type: text
        text: My soul * magnifies the Lord, because God has regarded my lowliness.
      la:
      - type: text
        text: Magníficat * ánima mea Dóminum, quia respéxit Deus humilitátem meam.
  antiphon.nol-te-tim-re-quinta-enim-die-v-niet-ad-vos-d-mi-af66d2ff6f:
    role: antiphon
    content:
      en:
      - type: text
        text: 'Fear not: * yet five days and the Lord shall come unto you.'
      la:
      - type: text
        text: Nolíte timére; * quinta enim die véniet ad vos Dóminus noster.
  antiphon.o-adon-i-et-dux-domus-isra-l-qui-m-ysi-in-igne-f-651672be73:
    role: antiphon
    content:
      en:
      - type: text
        text: O Adonai, * and Ruler of the house of Israel, who didst appear unto Moses in the burning bush, and gavest him the law in Sinai; come, to redeem us with an outstretched arm!
      la:
      - type: text
        text: 'O Adonái * et Dux domus Israël, qui Móysi in igne flammæ rubi apparuísti, et ei in Sina legem dedísti: veni ad rediméndum nos in brácchio exténto.'
  antiphon.o-clavis-david-et-sceptrum-domus-isra-l-qui-peri-7e84d037bc:
    role: antiphon
    content:
      en:
      - type: text
        text: O Key of David, * and Sceptre of the house of Israel that openest, and no man shutteth; and shuttest and no man openeth; come to bring out the prisoners from the prison, and them that sit in darkness, and in the shadow of death!
      la:
      - type: text
        text: 'O clavis David * et sceptrum domus Israël; qui áperis, et nemo claudit; claudis, et nemo áperit: veni, et educ vinctum de domo cárceris, sedéntem in ténebris, et umbra mortis.'
  antiphon.o-emm-nuel-rex-et-l-gifer-noster-exspect-tio-g-n-353b0f3318:
    role: antiphon
    content:
      en:
      - type: text
        text: O Emmanuel, our King * and our Law-giver, Longing of the Gentiles, yea, and Salvation thereof; come to save us, O Lord our God!
      la:
      - type: text
        text: 'O Emmánuel, * Rex et légifer noster, exspectátio géntium, et Salvátor eárum: veni ad salvándum nos, Dómine, Deus noster.'
  antiphon.o-radix-iesse-qui-stas-in-signum-popul-rum-super-e418131f6a:
    role: antiphon
    content:
      en:
      - type: text
        text: O Root of Jesse, * which standest for an ensign of the people, at whom the kings shall shut their mouths, to whom the Gentiles shall seek; come to deliver us, make no tarrying!
      la:
      - type: text
        text: 'O radix Iesse * qui stas in signum populórum, super quem continébunt reges os suum, quem gentes deprecabúntur: veni ad liberándum nos, iam noli tardáre.'
  antiphon.o-rex-g-ntium-et-desider-tus-e-rum-lap-sque-angu-eabf40fe0e:
    role: antiphon
    content:
      en:
      - type: text
        text: O King of the Gentiles, * yea, and Desire thereof, O Cornerstone that makest of twain one; come to save man, whom thou hast made of the dust of the earth!
      la:
      - type: text
        text: 'O Rex géntium, * et desiderátus eárum, lapísque anguláris, qui facis útraque unum: veni, et salva hóminem, quem de limo formásti.'
  antiphon.o-rex-glori-se-inter-sanctos-tuos-qui-semper-es-a5c4706bd5:
    role: antiphon
    content:
      la:
      - type: antiphon
        text: 'O Rex glorióse inter Sanctos tuos, qui semper es laudábilis et tamen ineffábilis: tu in nobis es, Dómine, et nomen sanctum tuum invocátum est super nos: ne derelínquas nos Deus noster: ut in die iudícii nos collocáre dignéris inter Sanctos et Eléctos tuos, Rex benedícte.'
  antiphon.o-riens-splendor-lucis-t-rn-et-sol-iust-ti-veni-34a0112b26:
    role: antiphon
    content:
      en:
      - type: text
        text: O Day-Spring, * brightness of the everlasting Light, Sun of Righteousness; come, to give light to them that sit in darkness, and in the shadow of death!
      la:
      - type: text
        text: 'O Óriens * splendor lucis ætérnæ, et sol iustítiæ: veni, et illúmina sedéntes in ténebris, et umbra mortis.'
  antiphon.o-sapi-ntia-qu-ex-ore-alt-ssimi-prodi-sti-att-ng-d672aefc94:
    role: antiphon
    content:
      en:
      - type: text
        text: O Wisdom, * that comest out of the mouth of the Most High, that reachest from one end to another, and dost mightily and sweetly order all things; come, to teach us the way of prudence!
      la:
      - type: text
        text: 'O Sapiéntia, * quæ ex ore Altíssimi prodiísti, attíngens a fine usque ad finem, fórtiter suavitérque dispónens ómnia: veni ad docéndum nos viam prudéntiæ.'
  antiphon.per-v-scera-miseric-rdi-dei-nostri-visit-vit-nos-ec401c1560:
    role: antiphon
    content:
      en:
      - type: text
        text: Through the tender mercy * of our God, the dayspring from on high has visited us.
      la:
      - type: text
        text: Per víscera misericórdiæ * Dei nostri visitávit nos Óriens ex alto.
  antiphon.quia-fecit-mihi-d-minus-magna-qui-potens-est-et-cdff14af16:
    role: antiphon
    content:
      la:
      - type: text
        text: Quia fecit * mihi Dóminus magna qui potens est, et sanctum nomen eius.
  antiphon.resp-xit-d-minus-humilit-tem-meam-et-fecit-in-me-788ec00cbf:
    role: antiphon
    content:
      en:
      - type: text
        text: The Lord has regarded * my lowliness, and he who is mighty has done great things through me.
      la:
      - type: text
        text: Respéxit Dóminus * humilitátem meam, et fecit in me magna, qui potens est.
  antiphon.respex-sti-humilit-tem-meam-d-mine-deus-meus-194de4ffca:
    role: antiphon
    content:
      la:
      - type: text
        text: Respexísti * humilitátem meam Dómine Deus meus.
  antiphon.sal-tem-ex-inim-cis-nostris-et-de-manu-mnium-qui-811598f751:
    role: antiphon
    content:
      la:
      - type: text
        text: Salútem * ex inimícis nostris, et de manu ómnium, qui nos odérunt, líbera nos, Dómine.
  antiphon.salva-nos-d-mine-vigil-ntes-cust-di-nos-dormi-nt-984a585d52:
    role: antiphon
    content:
      en:
      - type: antiphon
        text: Protect us, * Lord, while we are awake and safeguard us while we sleep; that we may keep watch with Christ, and rest in peace.
      la:
      - type: antiphon
        text: Salva nos, * Dómine, vigilántes, custódi nos dormiéntes; ut vigilémus cum Christo, et requiescámus in pace.
  antiphon.susc-pit-deus-isra-l-p-erum-suum-sicut-loc-tus-e-4cb8d2ca26:
    role: antiphon
    content:
      la:
      - type: text
        text: |-
          Suscépit Deus * Israël, púerum suum: sicut locútus est ad Ábraham, et sémini eius usque in sǽculum.
          Suscépit Deus * Israël, púerum suum: sicut locútus est ad Ábraham, et semen eius: exaltávit húmiles usque in sǽculum.
  antiphon.susc-pit-deus-isra-l-p-erum-suum-sicut-loc-tus-e-f32320f89f:
    role: antiphon
    content:
      en:
      - type: text
        text: |-
          God hath received * Israel his servant: as he spoke to our fathers, to Abraham and to his seed for ever.
          God hath received * Israel his servant: as he spoke to our fathers, to Abraham and to his seed, and hath exalted the humble forever.
      la:
      - type: text
        text: |-
          Suscépit Deus * Israël, púerum suum: sicut locútus est ad Ábraham, et semen eius usque in sǽculum.
          Suscépit Deus * Israël, púerum suum: sicut locútus est ad Ábraham, et semen eius: exaltáre húmiles usque in sǽculum.
  antiphon.text-0752f4450e:
    role: antiphon
    content:
      la: []
  antiphon.ut-in-proprio-de-tempore-dd25fc9a6a:
    role: antiphon
    content:
      la:
      - type: rubric
        text: ut in Proprio de Tempore
  antiphon.ut-in-proprio-de-tempore-e8942e065f:
    role: antiphon
    content:
      en:
      - type: rubric
        text: as in the Propers of Time
      la:
      - type: rubric
        text: ut in Proprio de Tempore
  blessing.bened-cat-et-cust-diat-nos-omn-potens-et-mis-ric-0fc370509c:
    role: blessing
    content:
      la:
      - type: blessing
        text: Benedícat et custódiat nos omnípotens et miséricors Dóminus, ✠ Pater, et Fílius, et Spíritus Sanctus.
  blessing.bened-cat-et-cust-diat-nos-omn-potens-et-mis-ric-36ccd4bf3b:
    role: blessing
    content:
      en:
      - type: blessing
        text: The almighty and merciful Lord, ✠ the Father, the Son and the Holy Spirit, bless us and keep us.
      la:
      - type: blessing
        text: Benedícat et custódiat nos omnípotens et miséricors Dóminus, ✠ Pater, et Fílius, et Spíritus Sanctus.
  blessing.benedicti-ne-perp-tua-bened-cat-nos-pater-t-rnus-c4067861e6:
    role: blessing
    content:
      en:
      - type: text
        text: |-
          May the Eternal Father bless us with an eternal blessing.
          May the Son, the Sole-begotten, mercifully bless and keep us.
          May the grace of the Holy Spirit enlighten all our hearts and minds.
          In the unity of the Holy Ghost, may the Father and the Son bless us.
      la:
      - type: text
        text: |-
          Benedictióne perpétua benedícat nos Pater ætérnus.
          Unigénitus Dei Fílius nos benedícere et adiuváre dignétur.
          Ad gáudia paradísi perdúcat nos misericórdia Christi.
          Spíritus Sancti grátia illúminet sensus et corda nostra.
          In unitáte Sancti Spíritus, benedícat nos Pater et Fílius.
  blessing.benedictio-00c1605400:
    role: blessing
    content:
      en:
      - type: text
        text: Benediction
      la:
      - type: text
        text: Benedictio
  blessing.benedictio-mens-1db99b875a:
    role: blessing
    content:
      en:
      - type: text
        text: Grace before and after Meal
      la:
      - type: text
        text: Benedictio mensæ
  blessing.d-minus-nos-bened-cat-et-ab-omni-malo-def-ndat-e-899b6fcd8d:
    role: blessing
    content:
      en:
      - type: blessing
        text: May the Lord bless us, ✠ protect us from all evil and bring us to everlasting life. And may the souls of the faithful, through the mercy of God, rest in peace.
      la:
      - type: blessing
        text: Dóminus nos benedícat, ✠ et ab omni malo deféndat, et ad vitam perdúcat ætérnam. Et fidélium ánimæ per misericórdiam Dei requiéscant in pace.
  blessing.deus-pater-omn-potens-sit-nobis-prop-tius-et-cle-19cd36b48b:
    role: blessing
    content:
      en:
      - type: text
        text: |-
          May God the Father Omnipotent, be to us merciful and clement.
          May Christ to all His people give, for ever in His sight to live.
          May the Spirit's fire Divine in our hearts enkindled shine.
          Of all faults and sins may the power of the holy Trinity absolve us.
      la:
      - type: text
        text: |-
          Deus Pater omnípotens sit nobis propítius et clemens.
          Christus perpétuæ det nobis gáudia vitæ.
          Ignem sui amóris accéndat Deus in córdibus nostris.
          A cunctis vítiis et peccátis absólvat nos virtus sanctæ Trinitátis.
  blessing.dies-et-actus-nostros-in-sua-pace-disp-nat-d-min-20bebe3bde:
    role: blessing
    content:
      en:
      - type: blessing
        text: May Almighty God arrange our deeds and our day in His peace.
      - type: response
        text: Amen.
      la:
      - type: blessing
        text: Dies et actus nostros in sua pace dispónat Dóminus omnípotens.
      - type: response
        text: Amen.
  blessing.evang-lica-l-ctio-sit-nobis-salus-et-prot-ctio-52f6a77faa:
    role: blessing
    content:
      en:
      - type: text
        text: |-
          May the Gospel's saving Lord Bless the reading of His Word.
          May the Gospel's glorious word, cleansing to our souls afford.
          Christ That sent the Gospel preacher, In his meaning be our Teacher.
      la:
      - type: text
        text: |-
          Evangélica léctio sit nobis salus et protéctio.
          Per evangélica dicta deleántur nostra delícta.
          Verba sancti Evangélii dóceat nos Christus Fílius Dei.
          Per Evangélicum verbum regnum mareámur ætérnum.
  blessing.ex-udi-d-mine-iesu-christe-preces-serv-rum-tu-ru-0822fb2b3c:
    role: blessing
    content:
      en:
      - type: text
        text: |-
          O Lord Jesus Christ, graciously hear the prayers of Thy servants, and have mercy upon us, Who livest and reignest with the Father, and the Holy Ghost, ever world without end.
          May His loving-kindness and mercy help us, Who liveth and reigneth with the Father, and the Holy Ghost, world without end.
          May the Almighty and merciful Lord loose us from the bonds of our sins.
      la:
      - type: text
        text: |-
          Exáudi, Dómine Iesu Christe, preces servórum tuórum, et miserére nobis: Qui cum Patre et Spíritu Sancto vivis et regnas in sǽcula sæculórum.
          Ipsíus píetas et misericórdia nos ádiuvet, qui cum Patre et Spíritu Sancto vivit et regnat in sǽcula sæculórum.
          A vínculis peccatórum nostrórum absólvat nos omnípotens et miséricors Dóminus.
  blessing.ille-nos-bened-cat-qui-sine-fine-vivit-et-regnat-f262007c20:
    role: blessing
    content:
      en:
      - type: text
        text: |-
          May His blessing be upon us who doth live and reign for ever.
          God's most mighty strength alway be His people's staff and stay.
          May He that is the Angels' King to that high realm His people bring.
          He whose feast-day we are keeping, be our Advocate with God.
          They whose feast-day we are keeping, be our Advocates with God.
          She whose feast-day we are keeping, be our Advocate with God.
          They whose feast-day we are keeping, be our Advocates with God.
          She whose feast-day we are keeping, Mary, blessed Maid of Maidens, be our Advocate with God.
          May he whose feast-day we are keeping, our glorious Father, be our advocate with God.
      la:
      - type: text
        text: |-
          Ille nos benedícat, qui sine fine vivit et regnat.
          Divínum auxílium máneat semper nobíscum.
          Ad societátem cívium supernórum perdúcat nos Rex Angelórum.
          Cuius festum cólimus, ipse intercédat pro nobis ad Dóminum.
          Quorum festum cólimus, ipsi intercédant pro nobis ad Dóminum.
          Cuius festum cólimus, ipsa intercédat pro nobis ad Dóminum.
          Quarum festum cólimus, ipsæ intercédant pro nobis ad Dóminum.
          Cuius festum cólimus, ipsa Virgo vírginum intercédat pro nobis ad Dóminum.
          Cuius festum cólimus, ipse gloriósus Pater noster intercédat pro nobis ad Dóminum.
  blessing.noctem-qui-tam-et-finem-perf-ctum-conc-dat-nobis-190bc5148a:
    role: blessing
    content:
      en:
      - type: blessing
        text: May almighty God grant us a quiet night and a perfect end.
      la:
      - type: blessing
        text: Noctem quiétam et finem perféctum concédat nobis Dóminus omnípotens.
  chapter.1-cor-15-20-22-392630c298:
    role: chapter
    content:
      en:
      - type: citation
        text: 1 Cor 15:20-22
      - type: text
        text: 'But now Christ is risen from the dead, the first-fruits of them that sleep: For by a man came death, and by a man the resurrection of the dead. And as in Adam all die, so also in Christ all shall be made alive.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 1 Cor 15:20-22
      - type: text
        text: 'Christus resurréxit a mórtuis primítiæ dormiéntium: quóniam quidem per hóminem mors, et per hóminem resurréctio mortuórum. Et sicut in Adam omnes moriúntur, ita et in Christo omnes vivificabúntur.'
      - type: response
        text: Deo grátias.
  chapter.1-cor-6-20-ce9a033c35:
    role: chapter
    content:
      en:
      - type: citation
        text: 1 Cor 6:20
      - type: text
        text: For you are bought with a great price. Glorify and bear God in your body.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 1 Cor 6:20
      - type: text
        text: Empti enim estis prétio magno. Glorificáte et portáte Deum in córpore vestro.
      - type: response
        text: Deo grátias.
  chapter.1-ioann-4-16-f396d66d77:
    role: chapter
    content:
      en:
      - type: citation
        text: 1 John. 4:16
      - type: text
        text: 'God is charity: and he that abideth in charity, abideth in God, and God in him.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 1 Ioann. 4:16
      - type: text
        text: 'Deus cáritas est: et qui manet in caritáte, in Deo manet, et Deus in eo.'
      - type: response
        text: Deo grátias.
  chapter.1-ioann-5-7-38592af4d6:
    role: chapter
    content:
      en:
      - type: citation
        text: 1 John 5:7
      - type: text
        text: And there are three who give testimony in heaven, the Father, the Word, and the Holy Ghost. And these three are one.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 1 Ioann. 5:7
      - type: text
        text: 'Tres sunt, qui testimónium dant in cælo: Pater, Verbum et Spíritus Sanctus, et hi tres unum sunt.'
      - type: response
        text: Deo grátias.
  chapter.1-pet-1-17-19-9f21f028ff:
    role: chapter
    content:
      en:
      - type: citation
        text: 1 Pet 1:17-19
      - type: text
        text: Converse in fear during the time of your sojourning here. Knowing that you were not redeemed with corruptible things as gold or silver, but with the precious blood of Christ.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 1 Pet 1:17-19
      - type: text
        text: 'In timóre incolátus vestri témpore conversámini: sciéntes quod non corruptibílibus auro vel argénto redémpti estis, sed pretióso sánguine quasi Agni immaculáti Christi.'
      - type: response
        text: Deo grátias.
  chapter.1-pet-3-18-a8bffa7df8:
    role: chapter
    content:
      en:
      - type: citation
        text: 1 Pet 3:18
      - type: text
        text: 'Because Christ also died once for our sins, the just for the unjust: that he might offer us to God, being put to death indeed in the flesh, but enlivened in the spirit.'
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 1 Pet 3:18
      - type: text
        text: Christus semel pro peccátis nostris mórtuus est, iustus pro iniústis, ut nos offérret Deo, mortificátus quidem carne, vivificátus autem spíritu.
      - type: response
        text: Deo grátias.
  chapter.2-cor-1-3-4-45c7345452:
    role: chapter
    content:
      en:
      - type: citation
        text: 2 Cor 1:3-4
      - type: text
        text: Blessed be the God and Father of our Lord Jesus Christ, the Father of mercies, and the God of all comfort, who comforteth us in all our tribulation.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 2 Cor 1:3-4
      - type: text
        text: Benedíctus Deus, et Pater Dómini nostri Iesu Christi, Pater misericordiárum, et Deus totíus consolatiónis, qui consolátur nos in omni tribulatióne nostra.
      - type: response
        text: Deo grátias.
  chapter.2-cor-1-3-4-a611d36292:
    role: chapter
    content:
      la:
      - type: citation
        text: 2 Cor 1:3-4
      - type: text
        text: Benedíctus Deus, et Pater Dómini nostri Iesu Christi, Pater misericordiárum, et Deus totíus consolatiónis, qui consolátur nos in omni tribulatióne nostra.
      - type: response
        text: Deo grátias.
      - type: citation
        text: 2 Thess 3:5
      - type: text
        text: Dóminus dírigat corda et córpora nostra in caritáte Dei et patiéntia Christi.
      - type: response
        text: Deo grátias.
  chapter.2-cor-13-13-2ae6473436:
    role: chapter
    content:
      en:
      - type: citation
        text: 2 Cor 13:13
      - type: text
        text: The grace of our Lord Jesus Christ, and the charity of God, and the communication of the Holy Ghost be with you all. Amen.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: 2 Cor 13:13
      - type: text
        text: Grátia Dómini nostri Iesu Christi et cáritas Dei et communicátio Sancti Spíritus sit cum ómnibus vobis. Amen.
      - type: response
        text: Deo grátias.
  chapter.2-cor-6-c7e74df562:
    role: chapter
    content:
      la:
      - type: heading
        text: 2. Cor. 6
      - type: text
        text: Ecce nunc tempus acceptábile, ecce nunc dies salútis. Némini dantes ullam offensiónem, ut non vituperétur ministérium nostrum.
      - type: response
        text: Deo grátias.
  chapter.apo-7-12-84a7697e3b:
    role: chapter
    content:
      en:
      - type: citation
        text: Rev 7:12
      - type: text
        text: Benediction, and glory, and wisdom, and thanksgiving, honour, and power, and strength to our God for ever and ever. Amen.
      - type: response
        text: Thanks be to God.
      la:
      - type: citation
        text: Apo 7:12
      - type: text
        text: Benedíctio, et cláritas, et sapiéntia, et gratiárum áctio, honor, virtus, et fortitúdo Deo nostro in sǽcula sæculórum. Amen.
      - type: response
        text: Deo grátias.
  chapter.be-ta-dei-g-nitrix-virgo-mar-a-sanct-que-omnes-i-2c31f67422:
    role: chapter
    content:
      la:
      - type: antiphon
        text: Beáta Dei Génitrix Virgo María, Sanctíque omnes intercédant pro nobis ad Dóminum.
      - type: text
        text: ''
      - type: versicle
        text: Mirificávit Dóminus Sanctos suos.
      - type: response
        text: Et exaudívit eos clamántes ad se.
      - type: heading
        text: Oratio
      - type: rubric
        text: In hac oratione, ad litteram N. exprimitur nomen Titularis propriæ ecclesiæ, dummodo Titulus non sit Persona divina vel Mysterium Domini, aut de ipso ratione Festi factum non fuerit Officium vel Commemoratio, aut illius nomen non sit in eadem Suffragii Oratione expressum; ac nomina sanctorum Angelorum et sancti Ioannis Baptistæ, si Titulares fuerint, præponuntur nomini sancti Ioseph. In hisce autem omnibus casibus omittuntur verba «atque beáto N.»
      - type: text
        text: |-
          Orémus.
          A cunctis nos, quǽsumus, Dómine, mentis et córporis defénde perículis: et, intercedénte beáta et gloriósa semper Vírgine Dei Genitríce María, cum beáto Ioseph, beátis Apóstolis tuis Petro et Paulo, atque beáto~
      - type: prayer
        text: N. et ómnibus Sanctis, salútem nobis tríbue benígnus et pacem; ut, destrúctis adversitátibus et erróribus univérsis, Ecclésia tua secúra tibi sérviat libertáte.
      - type: prayer
        text: Per eúndem Dóminum nostrum Iesum Christum Fílium tuum, qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
      - type: text
        text: (sed commune C1[012] dicitur)
      - type: antiphon
        text: Sancti omnes intercédant pro nobis ad Dóminum.
      - type: text
        text: ''
      - type: versicle
        text: Mirificávit Dóminus Sanctos suos.
      - type: response
        text: Et exaudívit eos clamántes ad se.
      - type: heading
        text: Oratio
      - type: rubric
        text: In hac oratione, ad litteram N. exprimitur nomen Titularis propriæ ecclesiæ, dummodo Titulus non sit Persona divina vel Mysterium Domini, aut de ipso ratione Festi factum non fuerit Officium vel Commemoratio, aut illius nomen non sit in eadem Suffragii Oratione expressum; ac nomina sanctorum Angelorum et sancti Ioannis Baptistæ, si Titulares fuerint, præponuntur nomini sancti Ioseph. In hisce autem omnibus casibus et omittuntur verba «atque beáto N.». Si Titularis ante omnes fuerit nominandus, particula «cum» omittitur ante nomen sanctorum Petri et Pauli ac præponitur nomini Sancti Ioseph.
      - type: text
        text: |-
          Orémus.
          A cunctis nos, quǽsumus, Dómine, mentis et córporis defénde perículis: et, intercedénte beáto Ioseph, cum beátis Apóstolis tuis Petro et Paulo, atque beáto~
      - type: prayer
        text: N. et ómnibus Sanctis, salútem nobis tríbue benígnus et pacem; ut, destrúctis adversitátibus et erróribus univérsis, Ecclésia tua secúra tibi sérviat libertáte.
      - type: prayer
        text: Per eúndem Dóminum nostrum Iesum Christum Fílium tuum, qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
      - type: text
        text: (sed tempore paschali)
      - type: antiphon
        text: Crucifíxus surréxit a mórtuis, et redémit nos, allelúia, allelúia.
      - type: text
        text: ''
      - type: versicle
        text: Dícite in natiónibus, allelúia.
      - type: response
        text: Quia Dóminus regnávit a ligno, allelúia.
      - type: text
        text: |-
          Orémus.
          Deus qui pro nobis Fílium tuum Crucis patíbulum subíre voluísti, ut inimíci a nobis expélleres potestátem: concéde nobis fámulis tuis; ut resurrectiónis grátiam consequámur.
      - type: prayer
        text: Per eúndem Dóminum nostrum Iesum Christum Fílium tuum, qui tecum vivit et regnat in unitáte Spíritus Sancti, Deus, per ómnia sǽcula sæculórum.
      - type: response
        text: Amen.
  chapter.be-ta-dei-g-nitrix-virgo-mar-a-sanct-que-omnes-i-66ff66d743:
    role: chapter
    content:
      en:
      - type: antiphon
        text: May the Blessed Virgin Mary, Mother of God, and all the Saints intercede for us with the Lord.
      - type: text
        text: ''
      - type: versicle
        text: 'The Lord hath made his holy one wonderful:'
      - type: response
        text: The Lord will hear me when I cry unto him.
      - type: heading
        text: Prayer
      - type: rubric
        text: At the letter N., the name of the Titular of the local church is said, if the title is not a divine person or a mystery of the Lord, and when the Office or a Commemoration was not already said of the Saint, and when the name is not already in the prayer. The names of the holy Angels and of St. John the Baptist, if they are titulars, are said before the name of St. Joseph. In all these cases, the words «blessed N.» are omitted.
      - type: prayer
        text: Let us pray.
      - type: text
        text: 'O Lord, we ask thee to save us from dangers to mind and to body: and, by the intercession of the blessed and glorious Virgin Mother of God, blessed Joseph, the blessed Apostles Peter and Paul, blessed~'
      - type: prayer
        text: N. and all the Saints, to eliminate all enmity and errors, that thy Church may safely serve thee in freedom.
      - type: prayer
        text: Through the same Jesus Christ, thy Son, Our Lord, Who liveth and reigneth with thee in the unity of the Holy Ghost, God, world without end.
      - type: response
        text: Amen.
      la:
      - type: antiphon
        text: Beáta Dei Génitrix Virgo María, Sanctíque omnes intercédant pro nobis ad Dóminum.
      - type: text
        text: ''
      - type: versicle
        text: Mirificávit Dóminus Sanctos suos.
      - type: response
        text: Et exaudívit eos clamántes ad se.
