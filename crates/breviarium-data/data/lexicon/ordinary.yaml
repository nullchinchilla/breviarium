        text: '#Orationes'
  collect.v-sita-qu-sumus-d-mine-habitati-nem-istam-et-omn-f350bb990f:
    role: collect
    content:
      en:
      - type: text
        text: Visit, we beseech thee, O Lord, this dwelling, and drive far from it the snares of the enemy; let thy holy angels dwell herein to preserve us in peace, and let thy blessing be always upon us.
      la:
      - type: text
        text: 'Vísita, quǽsumus, Dómine, habitatiónem istam, et omnes insídias inimíci ab ea longe repélle: Ángeli tui sancti hábitent in ea, qui nos in pace custódiant; et benedíctio tua sit super nos semper.'
  hymn.ad-cenam-agni-pr-vidi-4a3d948b5c:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Ad cenam Agni próvidi,
          Et stolis albis cándidi,
          Post tránsitum maris Rubri,
          Christo canámus Príncipi.

          Cuius corpus sanctíssimum,
          In ara crucis tórridum,
          Cruóre eius róseo
          Gustándo vívimus Deo.

          Protécti Paschæ véspere
          A devastánte Angelo,
          Erépti de duríssimo
          Pharaónis império.

          Iam Pascha nostrum Christus est,
          Qui immolátus agnus est:
          Sinceritátis ázyma,
          Caro eius obláta est.

          O vere digna hóstia,
          Per quam fracta sunt tártara,
          Redémpta plebs captiváta,
          Réddita vitæ prǽmia.

          Consúrgit Christus túmulo,
          Victor redit de bárathro,
          Tyránnum trudens vínculo,
          Et Paradísum réserans.

          Quǽsumus, Auctor ómnium,
          In hoc pascháli gáudio,
          Ab omni mortis ímpetu
          Tuum defénde pópulum.

          Glória tibi Dómine,
          Qui surrexíst[i] a mórtuis,
          Cum Patr[e] et Sancto Spíritu,
          In sempitérna sǽcula.
          Amen.
  hymn.ad-r-gias-agni-dapes-782a2215d1:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          At the Lamb’s high feast we sing
          Praise to our victorious King,
          Who hath washed us in the tide
          Flowing from his piercèd side.

          Praise we him whose love divine
          Gives the guests his blood for wine,
          Gives his body for the feast,
          Love the victim, love the priest.

          Where the paschal blood is poured,
          Death’s dark angel sheathes his sword;
          Israel’s hosts triumphant go
          Through the wave that drowns the foe.

          Christ, the Lamb whose blood was shed,
          Paschal victim, paschal bread;
          With sincerity and love
          Eat we manna from above.

          Mighty victim from the sky,
          Powers of hell beneath thee lie;
          Death is conquered in the fight;
          Thou hast brought us life and light.

          Now thy banner thou dost wave;
          Vanquished Satan and the grave;
          Angels join his praise to tell —
          See o’erthrown the prince of hell.

          Paschal triumph, paschal joy,
          Only sin can this destroy;
          From the death of sin set free,
          Souls re-born, dear Lord, in Thee.

          * Hymns of glory, songs of praise,
          Father, unto thee we raise;
          Risen Lord, all praise to thee,
          Ever with the Spirit be.
          Amen.
      la:
      - type: text
        text: |-
          Ad régias Agni dapes,
          Stolis amícti cándidis,
          Post tránsitum Maris Rubri,
          Christo canámus Príncipi:

          Divína cuius cáritas
          Sacrum propínat sánguinem,
          Almíque membra córporis
          Amor sacérdos ímmolat.

          Sparsum cruórem póstibus
          Vastátor horret Ángelus:
          Fugítque divísum mare;
          Mergúntur hostes flúctibus.

          Iam Pascha nostrum Christus est
          Paschális idem víctima,
          Et pura puris méntibus
          Sinceritátis ázyma.

          O vera cæli víctima,
          Subiécta cui sunt tártara,
          Solúta mortis víncula,
          Recépta vitæ prǽmia.

          Victor, subáctis ínferis,
          Trophǽa Christus éxplicat;
          Cælóque apérto, súbditum
          Regem tenebrárum trahit.

          Ut sis perénne méntibus
          Paschále, Iesu, gáudium,
          A morte dira críminum
          Vitæ renátos líbera.

          * Deo Patri sit glória,
          Et Fílio, qui a mórtuis
          Surréxit, ac Paráclito,
          In sempitérna sǽcula.
          Amen.
  hymn.ales-di-i-n-ntius-6a7d6f0055:
    role: hymn
    content:
      la:
      - type: text
        text: |-
          Ales diéi núntius
          Lucem propínquam prǽcinit:
          Nos excitátor méntium
          Iam Christus ad vitam vocat.

          Auférte, clamat, léctulos,
          Ægro sopóre désides:
          Castíque, rect[i], ac sóbrii
          Vig[i]láte, iam sum próximus.

          Iesum ciámus vócibus,
          Flentes, precántes, sóbrii:
          Inténta supplicátio
          Dormíre cor mundum vetat.

          Tu, Christe, somnum díscute:
          Tu rumpe noctis víncula:
          Tu solve peccátum vetus,
          Novúmque lumen íngere.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Et nunc, et in perpétuum.
          Amen.
  hymn.ales-di-i-n-ntius-96c2815cc6:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          As the bird, whose clarion gay
          Sounds before the dawn is grey,
          Christ, who brings the spirit’s day,
          Calls us, close at hand:

          Wake! he cries, and for my sake,
          From your eyes dull slumbers shake!
          Sober, righteous, chaste, awake!
          At the door I stand!

          Lord, to thee we lift on high
          Fervent prayer and bitter cry:
          Hearts aroused to pray and sigh
          May not slumber more:

          Break the sleep of death and time,
          Forged by Adam’s ancient crime;
          And the light of Eden’s prime
          To the world restore!

          Unto God the Father, Son,
          Holy Spirit, Three in One,
          One in Three, be glory done,
          Now and evermore.
          Amen.
      la:
      - type: text
        text: |-
          Ales diéi núntius
          Lucem propínquam prǽcinit:
          Nos excitátor méntium
          Iam Christus ad vitam vocat.

          Auférte, clamat, léctulos,
          Ægro sopóre désides:
          Castíque, recti, ac sóbrii
          Vigiláte, iam sum próximus.

          Iesum ciámus vócibus,
          Flentes, precántes, sóbrii:
          Inténta supplicátio
          Dormíre cor mundum vetat.

          Tu, Christe, somnum díscute:
          Tu rumpe noctis víncula:
          Tu solve peccátum vetus,
          Novúmque lumen íngere.

          Deo Patri sit glória,
          Eiúsque soli Fílio,
          Cum Spíritu Paráclito,
          Nunc et per omne sǽculum.
          Amen.
  hymn.audi-ben-gne-c-nditor-8bbd0ace2b:
    role: hymn
    content:
      en:
      - type: text
        text: |-
          O kind Creator, bow thine ear
          To mark the cry, to know the tear
          Before thy throne of mercy spent
          In this thy holy fast of Lent.

          Our hearts are open, Lord, to thee:
          Thou knowest our infirmity;
          Pour out on all who seek thy face
          Abundance of thy pardoning grace.

          Our sins are many, this we know;
          Spare us, good Lord, thy mercy show;
          And for the honour of thy name
          Our fainting souls to life reclaim.

          Give us the self-control that springs
          From discipline of outward things,
          That fasting inward secretly
          The soul may purely dwell with thee.

          We pray thee, Holy Trinity,
          One God, unchanging Unity,
          That we from this our abstinence
          May reap the fruits of penitence.
          Amen.
      la:
      - type: text
        text: |-
          Audi, benígne Cónditor,
          Nostras preces cum flétibus,
          In hoc sacro ieiúnio
          Fusas quadragenário.

          Scrutátor alme córdium,
          Infírma tu scis vírium:
          Ad te revérsis éxhibe
          Remissiónis grátiam.

          Multum quidem peccávimus,
          Sed parce confiténtibus:
          Ad nóminis laudem tui
          Confer medélam lánguidis.

          Concéde nostrum cónteri
          Corpus per abstinéntiam;
          Culpæ ut relínquant pábulum
          Ieiúna corda críminum.

          Præsta, beáta Trínitas,
          Concéde, simplex Únitas;
          Ut fructuósa sint tuis
          Ieiuniórum múnera.
          Amen.
  hymn.audi-ben-gne-c-nditor-90018473d6:
    role: hymn
    content:
      la:
      - type: text
        text: |-
