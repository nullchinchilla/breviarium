  rubric.deus-v-ni-larg-tor-et-hum-n-sal-tis-am-tor-qu-su-687d24f117:
    role: rubric
    content:
      en:
      - type: text
        text: 'O God the giver of pardon, and the lover of human salvation, we beseech thy clemency: that thou grant the brethren of our congregation, kinsfolk, and benefactors, which are departed out of this world, blessed Mary ever Virgin making intercession with all the saints, to come to the fellowship of eternal blessedness.'
      la:
      - type: text
        text: 'Deus véniæ largítor et humánæ salútis amátor: quǽsumus cleméntiam tuam: ut nostræ congregatiónis fratres, propínquos et benefactóres, qui ex hoc sǽculo transiérunt, beáta María semper vírgine intercedénte cum ómnibus sanctis tuis ad perpétuæ beatitúdinis consórtium perveníre concédas.'
  rubric.dir-gere-et-sanctific-re-r-gere-et-gubern-re-dig-6d126c6d56:
    role: rubric
    content:
      en:
      - type: text
        text: O Lord, Almighty God, King of heaven and earth, Saviour of the world, bless, lead, rule and govern our hearts and bodies, our senses, words and deeds today, following thy law and commandments, that here and for eternity with thy help we shall be saved in freedom. Who livest and reignest, world without end.
      la:
      - type: text
        text: 'Dirígere et sanctificáre, régere et gubernáre dignáre, Dómine Deus, Rex cæli et terræ, hódie corda et córpora nostra, sensus, sermónes et actus nostros in lege tua, et in opéribus mandatórum tuórum: ut hic et in ætérnum, te auxiliánte, salvi et líberi esse mereámur, Salvátor mundi: Qui vivis et regnas in sǽcula sæculórum.'
  rubric.div-num-aux-lium-m-neat-semper-nob-scum-66645b014e:
