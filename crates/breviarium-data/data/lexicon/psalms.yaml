texts:
  psalm.1-1-be-tus-vir-qui-non-biit-in-cons-lio-impi-rum-e270f932c7:
    role: psalm
    content:
      en:
      - type: citation
        text: 1:1 Blessed is the man who hath not walked in the counsel of the ungodly, † nor stood in the way of sinners, * nor sat in the chair of pestilence.
      - type: citation
        text: 1:2 But his will is in the law of the Lord, * and on his law he shall meditate day and night.
      - type: citation
        text: 1:3a And he shall be like a tree which is planted near the running waters, * which shall bring forth its fruit, in due season.
      - type: citation
        text: '1:3b And his leaf shall not fall off: * and all whatsoever he shall do shall prosper.'
      - type: citation
        text: '1:4 Not so the wicked, not so: * but like the dust, which the wind driveth from the face of the earth.'
      - type: citation
        text: '1:5 Therefore the wicked shall not rise again in judgment: * nor sinners in the council of the just.'
      - type: citation
        text: '1:6 For the Lord knoweth the way of the just: * and the way of the wicked shall perish.'
      la:
      - type: citation
        text: '1:1 Beátus vir, qui non ábiit in consílio impiórum, † et in via peccatórum non stetit, * et in cáthedra pestiléntiæ non sedit:'
      - type: citation
        text: 1:2 Sed in lege Dómini volúntas eius, * et in lege eius meditábitur die ac nocte.
      - type: citation
        text: '1:3a Et erit tamquam lignum, quod plantátum est secus decúrsus aquárum, * quod fructum suum dabit in témpore suo:'
      - type: citation
        text: '1:3b Et fólium eius non défluet: * et ómnia quæcúmque fáciet, prosperabúntur.'
      - type: citation
        text: '1:4 Non sic ímpii, non sic: * sed tamquam pulvis, quem próicit ventus a fácie terræ.'
      - type: citation
        text: '1:5 Ídeo non resúrgent ímpii in iudício: * neque peccatóres in concílio iustórum.'
      - type: citation
        text: '1:6 Quóniam novit Dóminus viam iustórum: * et iter impiórum períbit.'
      en2:
      - type: citation
        text: '1:1 Blessed is the man who has not followed the counsel of the impious, and has not remained in the way of sinners, * and has not sat in the chair of pestilence:'
      - type: citation
        text: 1:2 But his will is with the law of the Lord, * and he will meditate on his law, day and night.
      - type: citation
        text: '1:3a And he will be like a tree that has been planted beside running waters, * which will provide its fruit in its time:'
      - type: citation
        text: '1:3b And its leaf will not fall away: * and all things whatsoever that he does will prosper.'
      - type: citation
        text: '1:4 Not so the impious, not so: * but they are like the dust that the wind casts along the face of the earth.'
      - type: citation
        text: '1:5 Therefore, the impious will not prevail again in judgment: * nor sinners in the council of the just.'
      - type: citation
        text: '1:6 For the Lord knows the way of the just: * and the path of the impious will pass away.'
  psalm.10-2-in-d-mino-conf-do-qu-modo-d-citis-nim-me-tr-7c3caf59ff:
    role: psalm
    content:
      en:
      - type: citation
        text: '10:2 In the Lord I put my trust: † how then do you say to my soul: * Get thee away from hence to the mountain, like a sparrow?'
      - type: citation
        text: '10:3 For, lo, the wicked have bent their bow: † they have prepared their arrows in the quiver, * to shoot in the dark the upright of heart.'
      - type: citation
        text: '10:4 For they have destroyed the things which thou hast made: * but what has the just man done?'
      - type: citation
        text: 10:5a The Lord is in his holy temple, * the Lord’s throne is in heaven.
      - type: citation
        text: '10:5b His eyes look on the poor man: * his eyelids examine the sons of men.'
      - type: citation
        text: '10:6 The Lord trieth the just and the wicked: * but he that loveth iniquity, hateth his own soul.'
      - type: citation
        text: '10:7 He shall rain snares upon sinners: * fire and brimstone, and storms of winds, shall be the portion of their cup.'
      - type: citation
        text: '10:8 For the Lord is just, and hath loved justice: * his countenance hath beheld righteousness.'
      la:
      - type: citation
        text: '10:2 In Dómino confído: † quómodo dícitis ánimæ meæ: * Tránsmigra in montem sicut passer?'
      - type: citation
        text: 10:3 Quóniam ecce peccatóres intendérunt arcum, † paravérunt sagíttas suas in pháretra, * ut sagíttent in obscúro rectos corde.
      - type: citation
        text: '10:4 Quóniam quæ perfecísti, destruxérunt: * iustus autem quid fecit?'
      - type: citation
        text: 10:5a Dóminus in templo sancto suo, * Dóminus in cælo sedes eius.
      - type: citation
        text: '10:5b Óculi eius in páuperem respíciunt: * pálpebræ eius intérrogant fílios hóminum.'
      - type: citation
        text: '10:6 Dóminus intérrogat iustum et ímpium: * qui autem díligit iniquitátem, odit ánimam suam.'
      - type: citation
        text: '10:7 Pluet super peccatóres láqueos: * ignis, et sulphur, et spíritus procellárum pars cálicis eórum.'
      - type: citation
        text: '10:8 Quóniam iustus Dóminus, et iustítias diléxit: * æquitátem vidit vultus eius.'
      en2:
      - type: citation
        text: '10:2 I trust in the Lord: how can you say to my soul, * Sojourn to the mountain, like a sparrow?'
      - type: citation
        text: 10:3 For behold, the sinners have bent their bow, they have prepared their arrows in the quiver, * so as to shoot arrows in the dark at the upright of heart.
      - type: citation
        text: '10:4 For they have destroyed the things that you have completed: * but what has the just one done?'
      - type: citation
        text: 10:5a The Lord is in his holy temple, * the Lord's throne is in heaven.
      - type: citation
        text: '10:5b His eyes look upon the poor: * his eyelids question the sons of men.'
      - type: citation
        text: '10:6 The Lord questions the just and the impious: * yet he who loves iniquity hates his own soul.'
      - type: citation
        text: '10:7 He will rain down snares upon sinners: * fire and brimstone and windstorms will be the portion of their cup.'
      - type: citation
        text: '10:8 For the Lord is just, and he has chosen justice: * his countenance has beheld equity.'
  psalm.100-1-miseric-rdiam-et-iud-cium-cant-bo-tibi-d-m-6978b18e03:
    role: psalm
    content:
      en:
      - type: citation
        text: '100:1 Mercy and judgment * I will sing to thee, O Lord:'
      - type: citation
        text: 100:2 I will sing, and I will understand in the unspotted way, * when thou shalt come to me.
      - type: citation
        text: 100:2 I walked in the innocence of my heart, * in the midst of my house.
      - type: citation
        text: '100:3 I did not set before my eyes any unjust thing: * I hated the workers of iniquities.'
      - type: citation
        text: '100:4 The perverse heart did not cleave to me: * and the malignant, that turned aside from me, I would not know.'
      - type: citation
        text: 100:5 The man that in private detracted his neighbour, * him did I persecute.
      - type: citation
        text: 100:5 With him that had a proud eye, and an unsatiable heart, * I would not eat.
      - type: citation
        text: '100:6 My eyes were upon the faithful of the earth, to sit with me: * the man that walked in the perfect way, he served me.'
      - type: citation
        text: '100:7 He that worketh pride shall not dwell in the midst of my house: * he that speaketh unjust things did not prosper before my eyes.'
      - type: citation
        text: '100:8 In the morning I put to death all the wicked of the land: * that I might cut off all the workers of iniquity from the city of the Lord.'
      la:
      - type: citation
        text: '100:1 Misericórdiam, et iudícium * cantábo tibi, Dómine:'
      - type: citation
        text: 100:2 Psallam, et intéllegam in via immaculáta, * quando vénies ad me.
      - type: citation
        text: 100:2 Perambulábam in innocéntia cordis mei, * in médio domus meæ.
      - type: citation
        text: '100:3 Non proponébam ante óculos meos rem iniústam: * faciéntes prævaricatiónes odívi.'
      - type: citation
        text: '100:4 Non adhǽsit mihi cor pravum: * declinántem a me malígnum non cognoscébam.'
      - type: citation
        text: 100:5 Detrahéntem secréto próximo suo, * hunc persequébar.
      - type: citation
        text: 100:5 Supérbo óculo, et insatiábili corde, * cum hoc non edébam.
      - type: citation
        text: '100:6 Óculi mei ad fidéles terræ ut sédeant mecum: * ámbulans in via immaculáta, hic mihi ministrábat.'
      - type: citation
        text: '100:7 Non habitábit in médio domus meæ qui facit supérbiam: * qui lóquitur iníqua, non diréxit in conspéctu oculórum meórum.'
      - type: citation
        text: '100:8 In matutíno interficiébam omnes peccatóres terræ: * ut dispérderem de civitáte Dómini omnes operántes iniquitátem.'
      en2:
      - type: citation
        text: '100:1 I will sing mercy and judgment to you, O Lord: * I will sing psalms.'
      - type: citation
        text: 100:2 And I will have understanding within the immaculate way, * when you will draw near to me. I wandered about in the innocence of my heart, in the midst of my house.
      - type: citation
        text: 100:2 I wandered about in the innocence of my heart, * in the midst of my house.
      - type: citation
        text: '100:3 I will not display any unjust thing before my eyes: * I have hated those carrying out betrayals.'
      - type: citation
        text: '100:4 The perverse heart did not adhere to me: * and the malignant, who turned away before me, I would not recognize.'
      - type: citation
        text: 100:5 The one who secretly detracted his neighbor, * this one I pursued.
      - type: citation
        text: 100:5 The one with an arrogant eye and an insatiable heart, * with that one I would not eat.
      - type: citation
        text: '100:6 My eyes looked toward the faithful of the earth, to sit with me: * the one walking in the immaculate way, this one ministered to me.'
      - type: citation
        text: '100:7 He who has acted arrogantly will not dwell in the midst of my house: * he who has spoken iniquity was not guided with the sight of my eyes.'
      - type: citation
        text: '100:8 In the morning, I executed all the sinners of the earth: * so that I might scatter all the workers of iniquity from the city of the Lord.'
  psalm.101-2-d-mine-ex-udi-orati-nem-meam-et-clamor-meu-4d88945a77:
    role: psalm
    content:
      en:
      - type: citation
        text: '101:2 Hear, O Lord, my prayer: * and let my cry come to thee.'
      - type: citation
        text: '101:3 Turn not away thy face from me: * in the day when I am in trouble, incline thy ear to me.'
      - type: citation
        text: 101:3 In what day soever I shall call upon thee, * hear me speedily.
      - type: citation
        text: '101:4 For my days are vanished like smoke: * and my bones are grown dry like fuel for the fire.'
      - type: citation
        text: '101:5 I am smitten as grass, and my heart is withered: * because I forgot to eat my bread.'
      - type: citation
        text: 101:6 Through the voice of my groaning, * my bone hath cleaved to my flesh.
      - type: citation
        text: '101:7 I am become like to a pelican of the wilderness: * I am like a night raven in the house.'
      - type: citation
        text: 101:8 I have watched, * and am become as a sparrow all alone on the housetop.
      - type: citation
        text: '101:9 All the day long my enemies reproached me: * and they that praised me did swear against me.'
      - type: citation
        text: 101:10 For I did eat ashes like bread, * and mingled my drink with weeping.
      - type: citation
        text: '101:11 Because of thy anger and indignation: * for having lifted me up thou hast thrown me down.'
      - type: citation
        text: 101:12 My days have declined like a shadow, * and I am withered like grass.
      - type: citation
        text: '101:13 But thou, O Lord, endurest for ever: * and thy memorial to all generations.'
      - type: citation
        text: '101:14 Thou shalt arise and have mercy on Sion: * for it is time to have mercy on it, for the time is come.'
      - type: citation
        text: '101:15 For the stones thereof have pleased thy servants: * and they shall have pity on the earth thereof.'
      - type: citation
        text: 101:16 And the Gentiles shall fear thy name, O Lord, * and all the kings of the earth thy glory.
      - type: citation
        text: '101:17 For the Lord hath built up Sion: * and he shall be seen in his glory.'
      - type: citation
        text: '101:18 He hath had regard to the prayer of the humble: * and he hath not despised their petition.'
      - type: citation
        text: '101:19 Let these things be written unto another generation: * and the people that shall be created shall praise the Lord:'
      - type: citation
        text: '101:20 Because he hath looked forth from his high sanctuary: * from heaven the Lord hath looked upon the earth.'
      - type: citation
        text: '101:21 That he might hear the groans of them that are in fetters: * that he might release the children of the slain:'
      - type: citation
        text: '101:22 That they may declare the name of the Lord in Sion: * and his praise in Jerusalem;'
      - type: citation
        text: 101:23 When the people assemble together, * and kings, to serve the Lord.
      - type: citation
        text: '101:24 He answered him in the way of his strength: * Declare unto me the fewness of my days.'
      - type: citation
        text: '101:25 Call me not away in the midst of my days: * thy years are unto generation and generation.'
      - type: citation
        text: '101:26 In the beginning, O Lord, thou foundedst the earth: * and the heavens are the works of thy hands.'
      - type: citation
        text: '101:27 They shall perish but thou remainest: * and all of them shall grow old like a garment:'
      - type: citation
        text: 101:28 And as a vesture thou shalt change them, and they shall be changed. * But thou art always the selfsame, and thy years shall not fail.
      - type: citation
        text: '101:29 The children of thy servants shall continue: * and their seed shall be directed for ever.'
      la:
      - type: citation
        text: '101:2 Dómine, exáudi oratiónem meam: * et clamor meus ad te véniat.'
      - type: citation
        text: '101:3 Non avértas fáciem tuam a me: * in quacúmque die tríbulor, inclína ad me aurem tuam.'
      - type: citation
        text: 101:3 In quacúmque die invocávero te, * velóciter exáudi me.
      - type: citation
        text: '101:4 Quia defecérunt sicut fumus dies mei: * et ossa mea sicut crémium aruérunt.'
      - type: citation
        text: '101:5 Percússus sum ut fænum, et áruit cor meum: * quia oblítus sum comédere panem meum.'
      - type: citation
        text: 101:6 A voce gémitus mei * adhǽsit os meum carni meæ.
      - type: citation
        text: '101:7 Símilis factus sum pellicáno solitúdinis: * factus sum sicut nyctícorax in domicílio.'
      - type: citation
        text: 101:8 Vigilávi, * et factus sum sicut passer solitárius in tecto.
      - type: citation
        text: '101:9 Tota die exprobrábant mihi inimíci mei: * et qui laudábant me, advérsum me iurábant.'
      - type: citation
        text: 101:10 Quia cínerem tamquam panem manducábam, * et potum meum cum fletu miscébam.
      - type: citation
        text: '101:11 A fácie iræ et indignatiónis tuæ: * quia élevans allisísti me.'
      - type: citation
        text: '101:12 Dies mei sicut umbra declinavérunt: * et ego sicut fænum árui.'
      - type: citation
        text: '101:13 Tu autem, Dómine, in ætérnum pérmanes: * et memoriále tuum in generatiónem et generatiónem.'
      - type: citation
        text: '101:14 Tu exsúrgens miseréberis Sion: * quia tempus miseréndi eius, quia venit tempus.'
      - type: citation
        text: '101:15 Quóniam placuérunt servis tuis lápides eius: * et terræ eius miserebúntur.'
      - type: citation
        text: 101:16 Et timébunt gentes nomen tuum, Dómine, * et omnes reges terræ glóriam tuam.
      - type: citation
        text: '101:17 Quia ædificávit Dóminus Sion: * et vidébitur in glória sua.'
      - type: citation
        text: '101:18 Respéxit in oratiónem humílium: * et non sprevit precem eórum.'
      - type: citation
        text: '101:19 Scribántur hæc in generatióne áltera: * et pópulus, qui creábitur, laudábit Dóminum:'
      - type: citation
        text: '101:20 Quia prospéxit de excélso sancto suo: * Dóminus de cælo in terram aspéxit:'
      - type: citation
        text: '101:21 Ut audíret gémitus compeditórum: * ut sólveret fílios interemptórum:'
      - type: citation
        text: '101:22 Ut annúntient in Sion nomen Dómini: * et laudem eius in Ierúsalem.'
      - type: citation
        text: 101:23 In conveniéndo pópulos in unum, * et reges ut sérviant Dómino.
      - type: citation
        text: '101:24 Respóndit ei in via virtútis suæ: * Paucitátem diérum meórum núntia mihi.'
      - type: citation
        text: '101:25 Ne révoces me in dimídio diérum meórum: * in generatiónem et generatiónem anni tui.'
      - type: citation
        text: '101:26 Inítio tu, Dómine, terram fundásti: * et ópera mánuum tuárum sunt cæli.'
      - type: citation
        text: '101:27 Ipsi períbunt, tu autem pérmanes: * et omnes sicut vestiméntum veteráscent.'
      - type: citation
        text: '101:28 Et sicut opertórium mutábis eos, et mutabúntur: * tu autem idem ipse es, et anni tui non defícient.'
      - type: citation
        text: '101:29 Fílii servórum tuórum habitábunt: * et semen eórum in sǽculum dirigétur.'
      en2:
      - type: citation
        text: '101:2 O Lord, hear my prayer: * and let my outcry reach you.'
      - type: citation
        text: '101:3 Do not turn your face away from me: * in whatever day that I am in trouble, incline your ear to me.'
      - type: citation
        text: 101:3 In whatever day that I call upon you, * hear me quickly.
      - type: citation
        text: '101:4 For my days have faded away like smoke: * and my bones have dried out like firewood.'
      - type: citation
        text: '101:5 I have been cut down like hay, and my heart has withered: * for I had forgotten to eat my bread.'
      - type: citation
        text: '101:6 Before the voice of my groaning: * my bone has adhered to my flesh.'
      - type: citation
        text: '101:7 I have become like a pelican in solitude: * I have become like a night raven in a house.'
      - type: citation
        text: 101:8 I have kept vigil, * and I have become like a solitary sparrow on a roof.
      - type: citation
        text: '101:9 All day long my enemies reproached me: * and those who praised me swore oaths against me.'
      - type: citation
        text: 101:10 For I ate ashes like bread, * and mingled my drink with weeping.
      - type: citation
        text: '101:11 Because of your anger and indignation: * for you have lifted me up and cast me down.'
      - type: citation
        text: '101:12 My days have declined like a shadow: * and I am withered like grass.'
      - type: citation
        text: '101:13 But you, O Lord, remain forever: * and your memorial endures from generation to generation.'
      - type: citation
        text: '101:14 You will arise and have mercy on Sion: * for it is time to have mercy on her, for the time has come.'
      - type: citation
        text: '101:15 For your servants have taken pleasure in her stones: * and they will have pity on her dust.'
      - type: citation
        text: 101:16 And the nations shall fear your name, O Lord, * and all the kings of the earth your glory.
      - type: citation
        text: '101:17 For the Lord has built up Sion: * and he shall be seen in his glory.'
      - type: citation
        text: '101:18 He has looked upon the prayer of the lowly: * and has not despised their petition.'
      - type: citation
        text: '101:19 Let these things be written for a future generation: * and a people yet to be created shall praise the Lord:'
      - type: citation
        text: '101:20 For he has looked down from his holy height; * the Lord has looked down from heaven upon the earth:'
      - type: citation
        text: '101:21 To hear the groans of the captive: * to release the children of those who are slain:'
      - type: citation
        text: '101:22 That they may declare the name of the Lord in Sion: * and his praise in Jerusalem.'
      - type: citation
        text: 101:23 When peoples gather together, * and kings to serve the Lord.
      - type: citation
        text: '101:24 He answered him in the way of his strength: * Declare to me the fewness of my days.'
      - type: citation
        text: '101:25 Do not take me away in the midst of my days: * your years endure from generation to generation.'
      - type: citation
        text: '101:26 In the beginning, O Lord, you laid the foundation of the earth: * and the heavens are the work of your hands.'
      - type: citation
        text: '101:27 They shall perish, but you remain: * and all of them shall grow old like a garment.'
      - type: citation
        text: '101:28 And like a covering you shall change them, and they shall be changed: * but you are the selfsame, and your years shall not fail.'
      - type: citation
        text: '101:29 The children of your servants shall dwell: * and their seed shall be directed forever.'
  psalm.102-1-b-nedic-nima-mea-d-mino-et-mnia-qu-intra-m-09050d439a:
    role: psalm
    content:
      en:
      - type: citation
        text: '102:1 Bless the Lord, O my soul: * and let all that is within me bless his holy name.'
      - type: citation
        text: 102:2 Bless the Lord, O my soul, * and never forget all he hath done for thee.
      - type: citation
        text: '102:3 Who forgiveth all thy iniquities: * who healeth all thy diseases.'
      - type: citation
        text: '102:4 Who redeemeth thy life from destruction: * who crowneth thee with mercy and compassion.'
      - type: citation
        text: '102:5 Who satisfieth thy desire with good things: * thy youth shall be renewed like the eagle’s.'
      - type: citation
        text: 102:6 The Lord doth mercies, * and judgment for all that suffer wrong.
      - type: citation
        text: '102:7 He hath made his ways known to Moses: * his wills to the children of Israel.'
      - type: citation
        text: '102:8 The Lord is compassionate and merciful: * longsuffering and plenteous in mercy.'
      - type: citation
        text: '102:9 He will not always be angry: * nor will he threaten for ever.'
      - type: citation
        text: '102:10 He hath not dealt with us according to our sins: * nor rewarded us according to our iniquities.'
      - type: citation
        text: '102:11 For according to the height of the heaven above the earth: * he hath strengthened his mercy towards them that fear him.'
      - type: citation
        text: 102:12 As far as the east is from the west, * so far hath he removed our iniquities from us.
      - type: citation
        text: '102:13 As a father hath compassion on his children, so hath the Lord compassion on them that fear him: * for he knoweth our frame.'
      - type: citation
        text: '102:14 He remembereth that we are dust: * man’s days are as grass, as the flower of the field so shall he flourish.'
      - type: citation
        text: '102:16 For the spirit shall pass in him, and he shall not be: * and he shall know his place no more.'
      - type: citation
        text: '102:17 But the mercy of the Lord is from eternity * and unto eternity upon them that fear him:'
      - type: citation
        text: 102:17 And his justice unto children’s children, * to such as keep his covenant,
      - type: citation
        text: 102:18 And are mindful of his commandments * to do them.
      - type: citation
        text: '102:19 The Lord hath prepared his throne in heaven: * and his kingdom shall rule over all.'
      - type: citation
        text: '102:20 Bless the Lord, all ye his angels: * you that are mighty in strength, and execute his word, hearkening to the voice of his orders.'
      - type: citation
        text: '102:21 Bless the Lord, all ye his hosts: * you ministers of his that do his will.'
      - type: citation
        text: '102:22 Bless the Lord, all his works: * in every place of his dominion, O my soul, bless thou the Lord.'
      la:
      - type: citation
        text: '102:1 Bénedic, ánima mea, Dómino: * et ómnia, quæ intra me sunt, nómini sancto eius.'
      - type: citation
        text: '102:2 Bénedic, ánima mea, Dómino: * et noli oblivísci omnes retributiónes eius.'
      - type: citation
        text: '102:3 Qui propitiátur ómnibus iniquitátibus tuis: * qui sanat omnes infirmitátes tuas.'
      - type: citation
        text: '102:4 Qui rédimit de intéritu vitam tuam: * qui corónat te in misericórdia et miseratiónibus.'
      - type: citation
        text: '102:5 Qui replet in bonis desidérium tuum: * renovábitur ut áquilæ iuvéntus tua:'
      - type: citation
        text: '102:6 Fáciens misericórdias Dóminus: * et iudícium ómnibus iniúriam patiéntibus.'
      - type: citation
        text: 102:7 Notas fecit vias suas Móysi, * fíliis Israël voluntátes suas.
      - type: citation
        text: '102:8 Miserátor, et miséricors Dóminus: * longánimis, et multum miséricors.'
      - type: citation
        text: '102:9 Non in perpétuum irascétur: * neque in ætérnum comminábitur.'
      - type: citation
        text: '102:10 Non secúndum peccáta nostra fecit nobis: * neque secúndum iniquitátes nostras retríbuit nobis.'
      - type: citation
        text: '102:11 Quóniam secúndum altitúdinem cæli a terra: * corroborávit misericórdiam suam super timéntes se.'
      - type: citation
        text: '102:12 Quantum distat ortus ab occidénte: * longe fecit a nobis iniquitátes nostras.'
      - type: citation
        text: '102:13 Quómodo miserétur pater filiórum, misértus est Dóminus timéntibus se: * quóniam ipse cognóvit figméntum nostrum.'
      - type: citation
        text: '102:14 Recordátus est quóniam pulvis sumus: * homo, sicut fænum dies eius, tamquam flos agri sic efflorébit.'
      - type: citation
        text: '102:16 Quóniam spíritus pertransíbit in illo, et non subsístet: * et non cognóscet ámplius locum suum.'
      - type: citation
        text: 102:17 Misericórdia autem Dómini ab ætérno, * et usque in ætérnum super timéntes eum.
      - type: citation
        text: '102:17 Et iustítia illíus in fílios filiórum, * his qui servant testaméntum eius:'
      - type: citation
        text: 102:18 Et mémores sunt mandatórum ipsíus, * ad faciéndum ea.
      - type: citation
        text: '102:19 Dóminus in cælo parávit sedem suam: * et regnum ipsíus ómnibus dominábitur.'
      - type: citation
        text: '102:20 Benedícite Dómino, omnes Ángeli eius: * poténtes virtúte, faciéntes verbum illíus, ad audiéndam vocem sermónum eius.'
      - type: citation
        text: '102:21 Benedícite Dómino, omnes virtútes eius: * minístri eius, qui fácitis voluntátem eius.'
      - type: citation
        text: '102:22 Benedícite Dómino, ómnia ópera eius: * in omni loco dominatiónis eius, bénedic, ánima mea, Dómino.'
      en2:
      - type: citation
        text: '102:1 Bless the Lord, O my soul: * and all that is within me, bless his holy name.'
      - type: citation
        text: '102:2 Bless the Lord, O my soul: * and forget not all his benefits.'
      - type: citation
        text: '102:3 Who forgives all your iniquities: * who heals all your infirmities.'
      - type: citation
        text: '102:4 Who redeems your life from destruction: * who crowns you with mercy and compassion.'
      - type: citation
        text: '102:5 Who satisfies your desire with good things: * your youth shall be renewed like the eagle''s.'
      - type: citation
        text: '102:6 The Lord shows mercy: * and judgment to all who suffer wrong.'
      - type: citation
        text: 102:7 He made known his ways to Moses, * his will to the children of Israel.
      - type: citation
        text: '102:8 The Lord is merciful and gracious: * patient, and plentiful in mercy.'
      - type: citation
        text: '102:9 He will not be angry forever: * nor will he threaten for all time.'
      - type: citation
        text: '102:10 He has not dealt with us according to our sins: * nor rewarded us according to our iniquities.'
      - type: citation
        text: '102:11 For as the height of heaven above the earth: * so has he strengthened his mercy toward those who fear him.'
      - type: citation
        text: '102:12 As far as the east is from the west: * so far has he removed our iniquities from us.'
      - type: citation
        text: '102:13 As a father shows compassion to his children, the Lord has shown compassion to those who fear him: * for he himself knows our frame.'
      - type: citation
        text: '102:14 He has remembered that we are dust: * man, his days are like grass; like the flower of the field, so shall he blossom.'
      - type: citation
        text: '102:16 For the wind shall pass over him, and he shall not subsist: * and he shall know his place no more.'
      - type: citation
        text: 102:17 But the mercy of the Lord is from eternity, * and unto eternity upon those who fear him.
      - type: citation
        text: '102:17 And his righteousness unto the children''s children, * to those who keep his covenant:'
      - type: citation
        text: 102:18 And are mindful of his commandments, * to do them.
      - type: citation
        text: '102:19 The Lord has prepared his throne in heaven: * and his kingdom shall rule over all.'
      - type: citation
        text: '102:20 Bless the Lord, all you his angels: * mighty in strength, who fulfill his word, hearkening to the voice of his commands.'
      - type: citation
        text: '102:21 Bless the Lord, all you his hosts: * his ministers, who do his will.'
      - type: citation
        text: '102:22 Bless the Lord, all his works: * in every place of his dominion, bless the Lord, O my soul.'
  psalm.103-1-b-nedic-nima-mea-d-mino-d-mine-deus-meus-m-3414278aac:
    role: psalm
    content:
      en:
      - type: citation
        text: '103:1 Bless the Lord, O my soul: * O Lord my God, thou art exceedingly great.'
      - type: citation
        text: '103:1 Thou hast put on praise and beauty: * and art clothed with light as with a garment.'
      - type: citation
        text: '103:2 Who stretchest out the heaven like a pavilion: * who coverest the higher rooms thereof with water.'
      - type: citation
        text: '103:3 Who makest the clouds thy chariot: * who walkest upon the wings of the winds.'
      - type: citation
        text: '103:4 Who makest thy angels spirits: * and thy ministers a burning fire.'
      - type: citation
        text: '103:5 Who hast founded the earth upon its own bases: * it shall not be moved for ever and ever.'
      - type: citation
        text: '103:6 The deep like a garment is its clothing: * above the mountains shall the waters stand.'
      - type: citation
        text: '103:7 At thy rebuke they shall flee: * at the voice of thy thunder they shall fear.'
      - type: citation
        text: 103:8 The mountains ascend, and the plains descend * into the place which thou hast founded for them.
      - type: citation
        text: 103:9 Thou hast set a bound which they shall not pass over; * neither shall they return to cover the earth.
      - type: citation
        text: '103:10 Thou sendest forth springs in the vales: * between the midst of the hills the waters shall pass.'
      - type: citation
        text: '103:11 All the beasts of the field shall drink: * the wild asses shall expect in their thirst.'
      - type: citation
        text: '103:12 Over them the birds of the air shall dwell: * from the midst of the rocks they shall give forth their voices.'
      - type: citation
        text: '103:13 Thou waterest the hills from thy upper rooms: * the earth shall be filled with the fruit of thy works:'
      - type: citation
        text: 103:14 Bringing forth grass for cattle, * and herb for the service of men.
      - type: citation
        text: '103:14 That thou mayst bring bread out of the earth: * and that wine may cheer the heart of man.'
      - type: citation
        text: '103:15 That he may make the face cheerful with oil: * and that bread may strengthen man’s heart.'
      - type: citation
        text: '103:16 The trees of the field shall be filled, and the cedars of Libanus which he hath planted: * there the sparrows shall make their nests.'
      - type: citation
        text: 103:17 The highest of them is the house of the heron. * The high hills are a refuge for the harts, the rock for the irchins.
      - type: citation
        text: '103:19 He hath made the moon for seasons: * the sun knoweth his going down.'
      - type: citation
        text: '103:20 Thou hast appointed darkness, and it is night: * in it shall all the beasts of the woods go about:'
      - type: citation
        text: 103:21 The young lions roaring after their prey, * and seeking their meat from God.
      - type: citation
        text: '103:22 The sun ariseth, and they are gathered together: * and they shall lie down in their dens.'
      - type: citation
        text: 103:23 Man shall go forth to his work, * and to his labour until the evening.
      - type: citation
        text: '103:24 How great are thy works, O Lord? * thou hast made all things in wisdom: the earth is filled with thy riches.'
      - type: citation
        text: '103:25 So is this great sea, which stretcheth wide its arms: * there are creeping things without number:'
      - type: citation
        text: 103:26 Creatures little and great. * There the ships shall go.
      - type: citation
        text: 103:27 This sea dragon which thou hast formed to play therein. * All expect of thee that thou give them food in season.
      - type: citation
        text: '103:28 What thou givest to them they shall gather up: * when thou openest thy hand, they shall all be filled with good.'
      - type: citation
        text: '103:29 But if thou turnest away thy face, they shall be troubled: * thou shalt take away their breath, and they shall fail, and shall return to their dust.'
      - type: citation
        text: '103:30 Thou shalt send forth thy spirit, and they shall be created: * and thou shalt renew the face of the earth.'
      - type: citation
        text: '103:31 May the glory of the Lord endure for ever: * the Lord shall rejoice in his works.'
      - type: citation
        text: '103:32 He looketh upon the earth, and maketh it tremble: * he toucheth the mountains, and they smoke.'
      - type: citation
        text: '103:33 I will sing to the Lord as long as I live: * I will sing praise to my God while I have my being.'
      - type: citation
        text: '103:34 Let my speech be acceptable to him: * but I will take delight in the Lord.'
      - type: citation
        text: '103:35 Let sinners be consumed out of the earth, and the unjust, so that they be no more: * O my soul, bless thou the Lord.'
      la:
      - type: citation
        text: '103:1 Bénedic, ánima mea, Dómino: * Dómine, Deus meus, magnificátus es veheménter.'
      - type: citation
        text: '103:1 Confessiónem, et decórem induísti: * amíctus lúmine sicut vestiménto:'
      - type: citation
        text: '103:2 Exténdens cælum sicut pellem: * qui tegis aquis superióra eius.'
      - type: citation
        text: '103:3 Qui ponis nubem ascénsum tuum: * qui ámbulas super pennas ventórum.'
      - type: citation
        text: '103:4 Qui facis ángelos tuos, spíritus: * et minístros tuos ignem uréntem.'
      - type: citation
        text: '103:5 Qui fundásti terram super stabilitátem suam: * non inclinábitur in sǽculum sǽculi.'
      - type: citation
        text: '103:6 Abýssus, sicut vestiméntum, amíctus eius: * super montes stabunt aquæ.'
      - type: citation
        text: '103:7 Ab increpatióne tua fúgient: * a voce tonítrui tui formidábunt.'
      - type: citation
        text: '103:8 Ascéndunt montes: et descéndunt campi * in locum, quem fundásti eis.'
      - type: citation
        text: '103:9 Términum posuísti, quem non transgrediéntur: * neque converténtur operíre terram.'
      - type: citation
        text: '103:10 Qui emíttis fontes in convállibus: * inter médium móntium pertransíbunt aquæ.'
      - type: citation
        text: '103:11 Potábunt omnes béstiæ agri: * exspectábunt ónagri in siti sua.'
      - type: citation
        text: '103:12 Super ea vólucres cæli habitábunt: * de médio petrárum dabunt voces.'
      - type: citation
        text: '103:13 Rigans montes de superióribus suis: * de fructu óperum tuórum satiábitur terra:'
      - type: citation
        text: '103:14 Prodúcens fænum iuméntis, * et herbam servitúti hóminum:'
      - type: citation
        text: '103:14 Ut edúcas panem de terra: * et vinum lætíficet cor hóminis:'
      - type: citation
        text: '103:15 Ut exhílaret fáciem in óleo: * et panis cor hóminis confírmet.'
      - type: citation
        text: '103:16 Saturabúntur ligna campi, et cedri Líbani, quas plantávit: * illic pásseres nidificábunt.'
      - type: citation
        text: '103:17 Heródii domus dux est eórum: * montes excélsi cervis: petra refúgium herináciis.'
      - type: citation
        text: '103:19 Fecit lunam in témpora: * sol cognóvit occásum suum.'
      - type: citation
        text: '103:20 Posuísti ténebras, et facta est nox: * in ipsa pertransíbunt omnes béstiæ silvæ.'
      - type: citation
        text: 103:21 Cátuli leónum rugiéntes, ut rápiant, * et quærant a Deo escam sibi.
      - type: citation
        text: '103:22 Ortus est sol, et congregáti sunt: * et in cubílibus suis collocabúntur.'
      - type: citation
        text: '103:23 Exíbit homo ad opus suum: * et ad operatiónem suam usque ad vésperum.'
      - type: citation
        text: '103:24 Quam magnificáta sunt ópera tua, Dómine! * ómnia in sapiéntia fecísti: impléta est terra possessióne tua.'
      - type: citation
        text: '103:25 Hoc mare magnum, et spatiósum mánibus: * illic reptília, quorum non est númerus.'
      - type: citation
        text: '103:26 Animália pusílla cum magnis: * illic naves pertransíbunt.'
      - type: citation
        text: '103:27 Draco iste, quem formásti ad illudéndum ei: * ómnia a te exspéctant ut des illis escam in témpore.'
      - type: citation
        text: '103:28 Dante te illis, cólligent: * aperiénte te manum tuam, ómnia implebúntur bonitáte.'
      - type: citation
        text: '103:29 Averténte autem te fáciem, turbabúntur: * áuferes spíritum eórum, et defícient, et in púlverem suum reverténtur.'
      - type: citation
        text: '103:30 Emíttes spíritum tuum, et creabúntur: * et renovábis fáciem terræ.'
      - type: citation
        text: '103:31 Sit glória Dómini in sǽculum: * lætábitur Dóminus in opéribus suis:'
      - type: citation
        text: '103:32 Qui réspicit terram, et facit eam trémere: * qui tangit montes, et fúmigant.'
      - type: citation
        text: '103:33 Cantábo Dómino in vita mea: * psallam Deo meo, quámdiu sum.'
      - type: citation
        text: '103:34 Iucúndum sit ei elóquium meum: * ego vero delectábor in Dómino.'
      - type: citation
        text: '103:35 Defíciant peccatóres a terra, et iníqui ita ut non sint: * bénedic, ánima mea, Dómino.'
      en2:
      - type: citation
        text: '103:1 Bless the Lord, O my soul: * O Lord my God, you are exceedingly great.'
      - type: citation
        text: '103:1 You are clothed with praise and beauty: * wrapped in light as with a garment:'
      - type: citation
        text: '103:2 Stretching out heaven like a tent: * who covers its upper parts with waters.'
      - type: citation
        text: '103:3 Who makes the clouds your chariot: * who walks upon the wings of the winds.'
      - type: citation
        text: '103:4 Who makes your angels spirits: * and your ministers a burning fire.'
      - type: citation
        text: '103:5 Who has founded the earth upon its own stability: * it shall not be moved forever and ever.'
      - type: citation
        text: '103:6 The deep, like a garment, is its clothing: * the waters shall stand upon the mountains.'
      - type: citation
        text: '103:7 At your rebuke they shall flee: * at the voice of your thunder they shall be afraid.'
      - type: citation
        text: 103:8 The mountains go up, and the plains go down * to the place which you have founded for them.
      - type: citation
        text: '103:9 You have set a boundary that they shall not pass over: * neither shall they return to cover the earth.'
      - type: citation
        text: '103:10 Who send forth springs in the valleys: * the waters shall pass through the midst of the hills.'
      - type: citation
        text: '103:11 All the beasts of the field shall drink: * the wild asses shall quench their thirst.'
      - type: citation
        text: '103:12 Above them the birds of heaven shall dwell: * from the midst of the rocks they shall give forth their voices.'
      - type: citation
        text: '103:13 Who water the mountains from your upper chambers: * the earth shall be satisfied with the fruit of your works:'
      - type: citation
        text: '103:14 Bringing forth grass for cattle, * and herb for the service of men:'
      - type: citation
        text: '103:14 That you may bring bread out of the earth: * and that wine may cheer the heart of man:'
      - type: citation
        text: '103:15 That he may make the face glad with oil: * and that bread may strengthen the heart of man.'
      - type: citation
        text: '103:16 The trees of the field shall be filled, and the cedars of Lebanon which he has planted: * there the sparrows shall nest.'
      - type: citation
        text: '103:17 The home of the heron is their chief place: * the high mountains are for the stags; the rock is a refuge for the hedgehogs.'
      - type: citation
        text: '103:19 He made the moon for seasons: * the sun knows its setting.'
      - type: citation
        text: '103:20 You have set the darkness, and it is night: * in it all the beasts of the forest shall pass through.'
      - type: citation
        text: 103:21 The young lions roaring after prey, * and seeking their food from God.
      - type: citation
        text: '103:22 The sun has risen and they are gathered together: * and they shall lie down in their dens.'
      - type: citation
        text: '103:23 Man shall go forth to his work: * and to his labor until the evening.'
      - type: citation
        text: '103:24 How great are your works, O Lord! * You have made all things in wisdom: the earth is filled with your possession.'
      - type: citation
        text: '103:25 This great and spacious sea: * therein are creeping things without number.'
      - type: citation
        text: '103:26 Animals small with great: * there ships shall pass.'
      - type: citation
        text: '103:27 This dragon which you have formed to sport therein: * all things look to you to give them food in due season.'
      - type: citation
        text: '103:28 When you give to them, they shall gather: * when you open your hand, all things shall be filled with goodness.'
      - type: citation
        text: '103:29 But when you turn away your face, they shall be troubled: * you shall take away their spirit, and they shall fail, and shall return to their dust.'
      - type: citation
        text: '103:30 You shall send forth your spirit, and they shall be created: * and you shall renew the face of the earth.'
      - type: citation
        text: '103:31 May the glory of the Lord endure forever: * the Lord shall rejoice in his works:'
      - type: citation
        text: '103:32 Who looks upon the earth, and makes it tremble: * who touches the mountains, and they smoke.'
      - type: citation
        text: '103:33 I will sing to the Lord all my life: * I will sing praise to my God as long as I live.'
      - type: citation
        text: '103:34 May my speech be pleasing to him: * but I will take delight in the Lord.'
      - type: citation
        text: '103:35 Let sinners fail from the earth, and the wicked, so that they are no more: * bless the Lord, O my soul.'
  psalm.104-1-confit-mini-d-mino-et-invoc-te-nomen-eius-6ea0c76f29:
    role: psalm
    content:
      en:
      - type: citation
        text: '104:1 Give glory to the Lord, and call upon his name: * declare his deeds among the Gentiles.'
      - type: citation
        text: '104:2 Sing to him, yea sing praises to him: * relate all his wondrous works.'
      - type: citation
        text: '104:3 Glory ye in his holy name: * let the heart of them rejoice that seek the Lord.'
      - type: citation
        text: '104:4 Seek ye the Lord, and be strengthened: * seek his face evermore.'
      - type: citation
        text: 104:5 Remember his marvellous works which he hath done; * his wonders, and the judgments of his mouth.
      - type: citation
        text: 104:6 O ye seed of Abraham his servant; * ye sons of Jacob his chosen.
      - type: citation
        text: '104:7 He is the Lord our God: * his judgments are in all the earth.'
      - type: citation
        text: '104:8 He hath remembered his covenant for ever: * the word which he commanded to a thousand generations.'
      - type: citation
        text: '104:9 Which he made to Abraham; * and his oath to Isaac:'
      - type: citation
        text: '104:10 And he appointed the same to Jacob for a law, * and to Israel for an everlasting testament:'
      - type: citation
        text: '104:11 Saying: To thee will I give the land of Chanaan, * the lot of your inheritance.'
      - type: citation
        text: '104:12 When they were but a small number: * yea very few, and sojourners therein:'
      - type: citation
        text: 104:13 And they passed from nation to nation, * and from one kingdom to another people.
      - type: citation
        text: '104:14 He suffered no man to hurt them: * and he reproved kings for their sakes.'
      - type: citation
        text: '104:15 Touch ye not my anointed: * and do no evil to my prophets.'
      - type: citation
        text: '104:16 And he called a famine upon the land: * and he broke in pieces all the support of bread.'
      - type: citation
        text: '104:17 He sent a man before them: * Joseph, who was sold for a slave.'
      - type: citation
        text: '104:18 They humbled his feet in fetters: the iron pierced his soul, * until his word came.'
      - type: citation
        text: '104:19 The word of the Lord inflamed him: * the king sent, and he released him: the ruler of the people, and he set him at liberty.'
      - type: citation
        text: 104:21 He made him master of his house, * and ruler of all his possession.
      - type: citation
        text: 104:22 That he might instruct his princes as himself, * and teach his ancients wisdom.
      - type: citation
        text: '104:23 And Israel went into Egypt: * and Jacob was a sojourner in the land of Cham.'
      - type: citation
        text: '104:24 And he increased his people exceedingly: * and strengthened them over their enemies,'
      - type: citation
        text: '104:25 He turned their heart to hate his people: * and to deal deceitfully with his servants.'
      - type: citation
        text: '104:26 He sent Moses his servant: * Aaron the man whom he had chosen.'
      - type: citation
        text: 104:27 He gave them power to shew his signs, * and his wonders in the land of Cham.
      - type: citation
        text: '104:28 He sent darkness, and made it obscure: * and grieved not his words.'
      - type: citation
        text: 104:29 He turned their waters into blood, * and destroyed their fish.
      - type: citation
        text: 104:30 Their land brought forth frogs, * in the inner chambers of their kings.
      - type: citation
        text: 104:31 He spoke, and there came diverse sorts of flies, * and sciniphs in all their coasts.
      - type: citation
        text: 104:32 He gave them hail for rain, * a burning fire in the land.
      - type: citation
        text: '104:33 And he destroyed their vineyards, and their fig trees: * and he broke in pieces the trees of their coasts.'
      - type: citation
        text: 104:34 He spoke, and the locust came, and the bruchus, * of which there was no number.
      - type: citation
        text: 104:35 And they devoured all the grass in their land, * and consumed all the fruit of their ground.
      - type: citation
        text: '104:36 And he slew all the firstborn in their land: * the firstfruits of all their labour.'
      - type: citation
        text: '104:37 And he brought them out with silver and gold: * and there was not among their tribes one that was feeble.'
      - type: citation
        text: '104:38 Egypt was glad when they departed: * for the fear of them lay upon them.'
      - type: citation
        text: 104:39 He spread a cloud for their protection, * and fire to give them light in the night.
      - type: citation
        text: '104:40 They asked, and the quail came: * and he filled them with the bread of heaven.'
      - type: citation
        text: '104:41 He opened the rock, and waters flowed: * rivers ran down in the dry land.'
      - type: citation
        text: 104:42 Because he remembered his holy word, * which he had spoken to his servant Abraham.
      - type: citation
        text: 104:43 And he brought forth his people with joy, * and his chosen with gladness.
      - type: citation
        text: '104:44 And he gave them the lands of the Gentiles: * and they possessed the labours of the people:'
      - type: citation
        text: 104:45 That they might observe his justifications, * and seek after his law.
      la:
      - type: citation
        text: '104:1 Confitémini Dómino, et invocáte nomen eius: * annuntiáte inter gentes ópera eius.'
      - type: citation
        text: '104:2 Cantáte ei, et psállite ei: * narráte ómnia mirabília eius.'
      - type: citation
        text: '104:3 Laudámini in nómine sancto eius: * lætétur cor quæréntium Dóminum.'
      - type: citation
        text: '104:4 Quǽrite Dóminum, et confirmámini: * quǽrite fáciem eius semper.'
      - type: citation
        text: '104:5 Mementóte mirabílium eius, quæ fecit: * prodígia eius, et iudícia oris eius.'
      - type: citation
        text: '104:6 Semen Ábraham, servi eius: * fílii Iacob, elécti eius.'
      - type: citation
        text: '104:7 Ipse Dóminus Deus noster: * in univérsa terra iudícia eius.'
      - type: citation
        text: '104:8 Memor fuit in sǽculum testaménti sui: * verbi, quod mandávit in mille generatiónes:'
      - type: citation
        text: '104:9 Quod dispósuit ad Ábraham: * et iuraménti sui ad Isaac:'
      - type: citation
        text: '104:10 Et státuit illud Iacob in præcéptum: * et Israël in testaméntum ætérnum:'
      - type: citation
        text: '104:11 Dicens: Tibi dabo terram Chánaan, * funículum hereditátis vestræ.'
      - type: citation
        text: '104:12 Cum essent número brevi, * paucíssimi et íncolæ eius:'
      - type: citation
        text: 104:13 Et pertransiérunt de gente in gentem, * et de regno ad pópulum álterum.
      - type: citation
        text: '104:14 Non relíquit hóminem nocére eis: * et corrípuit pro eis reges.'
      - type: citation
        text: '104:15 Nolíte tángere christos meos: * et in prophétis meis nolíte malignári.'
      - type: citation
        text: '104:16 Et vocávit famem super terram: * et omne firmaméntum panis contrívit.'
      - type: citation
        text: '104:17 Misit ante eos virum: * in servum venúmdatus est Ioseph.'
      - type: citation
        text: 104:18 Humiliavérunt in compédibus pedes eius, ferrum pertránsiit ánimam eius * donec veníret verbum eius.
      - type: citation
        text: '104:19 Elóquium Dómini inflammávit eum: * misit rex, et solvit eum; princeps populórum, et dimísit eum.'
      - type: citation
        text: '104:21 Constítuit eum dóminum domus suæ: * et príncipem omnis possessiónis suæ:'
      - type: citation
        text: '104:22 Ut erudíret príncipes eius sicut semetípsum: * et senes eius prudéntiam docéret.'
      - type: citation
        text: '104:23 Et intrávit Israël in Ægýptum: * et Iacob áccola fuit in terra Cham.'
      - type: citation
        text: '104:24 Et auxit pópulum suum veheménter: * et firmávit eum super inimícos eius.'
      - type: citation
        text: '104:25 Convértit cor eórum ut odírent pópulum eius: * et dolum fácerent in servos eius.'
      - type: citation
        text: '104:26 Misit Móysen, servum suum: * Aaron, quem elégit ipsum.'
      - type: citation
        text: '104:27 Pósuit in eis verba signórum suórum: * et prodigiórum in terra Cham.'
      - type: citation
        text: '104:28 Misit ténebras, et obscurávit: * et non exacerbávit sermónes suos.'
      - type: citation
        text: '104:29 Convértit aquas eórum in sánguinem: * et occídit pisces eórum.'
      - type: citation
        text: '104:30 Édidit terra eórum ranas: * in penetrálibus regum ipsórum.'
      - type: citation
        text: '104:31 Dixit, et venit cœnomyía: * et cínifes in ómnibus fínibus eórum.'
      - type: citation
        text: '104:32 Pósuit plúvias eórum grándinem: * ignem comburéntem in terra ipsórum.'
      - type: citation
        text: '104:33 Et percússit víneas eórum, et ficúlneas eórum: * et contrívit lignum fínium eórum.'
      - type: citation
        text: '104:34 Dixit, et venit locústa, et bruchus, * cuius non erat númerus:'
      - type: citation
        text: '104:35 Et comédit omne fænum in terra eórum: * et comédit omnem fructum terræ eórum.'
      - type: citation
        text: '104:36 Et percússit omne primogénitum in terra eórum: * primítias omnis labóris eórum.'
      - type: citation
        text: '104:37 Et edúxit eos cum argénto et auro: * et non erat in tríbubus eórum infírmus.'
      - type: citation
        text: '104:38 Lætáta est Ægýptus in profectióne eórum: * quia incúbuit timor eórum super eos.'
      - type: citation
        text: '104:39 Expándit nubem in protectiónem eórum: * et ignem ut lucéret eis per noctem.'
      - type: citation
        text: '104:40 Petiérunt, et venit cotúrnix: * et pane cæli saturávit eos.'
      - type: citation
        text: '104:41 Dirúpit petram et fluxérunt aquæ: * abiérunt in sicco flúmina;'
      - type: citation
        text: '104:42 Quóniam memor fuit verbi sancti sui: * quod hábuit ad Ábraham, púerum suum.'
      - type: citation
        text: 104:43 Et edúxit pópulum suum in exsultatióne, * et eléctos suos in lætítia.
      - type: citation
        text: '104:44 Et dedit illis regiónes géntium: * et labóres populórum possedérunt:'
      - type: citation
        text: 104:45 Ut custódiant iustificatiónes eius, * et legem eius requírant.
      en2:
      - type: citation
        text: '104:1 Give praise to the Lord and call upon his name: * declare his works among the nations.'
      - type: citation
        text: '104:2 Sing to him, and sing praise to him: * tell all his wondrous works.'
      - type: citation
        text: '104:3 Be praised in his holy name: * let the heart of those who seek the Lord rejoice.'
      - type: citation
        text: '104:4 Seek the Lord, and be confirmed: * seek his face always.'
      - type: citation
        text: '104:5 Remember his miracles, which he has done: * his portents, and the judgments of his mouth:'
      - type: citation
        text: '104:6 You offspring of Abraham his servant: * you sons of Jacob, his elect.'
      - type: citation
        text: '104:7 He is the Lord our God: * his judgments are throughout the entire earth.'
      - type: citation
        text: '104:8 He has remembered his covenant for all ages: * the word that he entrusted to a thousand generations,'
      - type: citation
        text: '104:9 which he assigned to Abraham: * and his oath to Isaac:'
      - type: citation
        text: '104:10 And he stationed the same for Jacob with a precept: * and for Israel with an eternal testament:'
      - type: citation
        text: '104:11 saying: To you I will give the land of Canaan, * the allotment of your inheritance.'
      - type: citation
        text: '104:12 Though they may have been but a small number, * very few, and foreigners there:'
      - type: citation
        text: 104:13 and though they passed from nation to nation, * and from one kingdom to another people.
      - type: citation
        text: '104:14 He allowed no man to harm them: * and he reproved kings on their behalf.'
      - type: citation
        text: '104:15 Do not be willing to touch my anointed ones: * and do not be willing to malign my prophets.'
      - type: citation
        text: '104:16 And he called a famine upon the land: * and he crushed every foundation of the bread.'
      - type: citation
        text: '104:17 He sent a man before them: * Joseph, who had been sold as a slave.'
      - type: citation
        text: 104:18 They humbled his feet in shackles; the iron pierced his soul, * until his word arrived.
      - type: citation
        text: '104:19 The eloquence of the Lord inflamed him: * the king sent, and released him; the ruler of the peoples, and he dismissed him.'
      - type: citation
        text: '104:21 He established him as master of his house: * and ruler of all his possessions:'
      - type: citation
        text: '104:22 so that he might instruct his princes as himself: * and teach his elders prudence.'
      - type: citation
        text: '104:23 And Israel entered into Egypt: * and Jacob became a sojourner in the land of Ham.'
      - type: citation
        text: '104:24 And he helped his people greatly: * and he strengthened them over their enemies.'
      - type: citation
        text: '104:25 He turned their heart to hate his people: * and to deal deceitfully with his servants.'
      - type: citation
        text: '104:26 He sent Moses, his servant: * and Aaron, the one whom he chose.'
      - type: citation
        text: '104:27 He placed with them signs of his word: * and portents in the land of Ham.'
      - type: citation
        text: '104:28 He sent darkness and made it conceal: * and he did not afflict them with his speech.'
      - type: citation
        text: '104:29 He turned their waters into blood: * and he slaughtered their fish.'
      - type: citation
        text: '104:30 Their land brought forth frogs: * even in the inner chambers of their kings.'
      - type: citation
        text: '104:31 He spoke, and there came forth common flies: * and gnats, in every region.'
      - type: citation
        text: '104:32 He gave them a shower of hail: * and a burning fire, in the same land.'
      - type: citation
        text: '104:33 And he struck their vineyards and their fig trees: * and he crushed the trees of their region.'
      - type: citation
        text: '104:34 He spoke, and the locust came forth, and the caterpillar, * of which there was no number:'
      - type: citation
        text: '104:35 And it devoured all the grass in their land: * and it consumed all the fruit of their land.'
      - type: citation
        text: '104:36 And he struck all the first-born in their land: * the first-fruits of all their labor.'
      - type: citation
        text: '104:37 And he led them out with silver and gold: * and there was not an infirm one among their tribes.'
      - type: citation
        text: '104:38 Egypt was joyful at their departure: * for the fear of them lay heavy upon them.'
      - type: citation
        text: '104:39 He spread a cloud for their protection: * and a fire, to give them light through the night.'
      - type: citation
        text: '104:40 They petitioned, and the quail came: * and he satisfied them with the bread of heaven.'
      - type: citation
        text: '104:41 He ruptured the rock and the waters flowed: * rivers gushed in the dry land;'
      - type: citation
        text: '104:42 For he had called to mind his holy word: * which he kept near to his servant Abraham.'
      - type: citation
        text: 104:43 And he led forth his people in exultation, * and his elect in rejoicing.
      - type: citation
        text: '104:44 And he gave them the regions of the Gentiles: * and they possessed the labors of the peoples:'
      - type: citation
        text: 104:45 So that they might observe his justifications, * and inquire about his law.
  psalm.105-1-confit-mini-d-mino-qu-niam-bonus-qu-niam-i-44ec08957c:
    role: psalm
    content:
      en:
      - type: citation
        text: '105:1 Give glory to the Lord, for he is good: * for his mercy endureth for ever.'
      - type: citation
        text: 105:2 Who shall declare the powers of the Lord? * who shall set forth all his praises?
      - type: citation
        text: 105:3 Blessed are they that keep judgment, * and do justice at all times.
      - type: citation
        text: '105:4 Remember us, O Lord, in the favour of thy people: * visit us with thy salvation.'
      - type: citation
        text: '105:5 That we may see the good of thy chosen, that we may rejoice in the joy of thy nation: * that thou mayst be praised with thy inheritance.'
      - type: citation
        text: '105:6 We have sinned with our fathers: * we have acted unjustly, we have wrought iniquity.'
      - type: citation
        text: '105:7 Our fathers understood not thy wonders in Egypt: * they remembered not the multitude of thy mercies:'
      - type: citation
        text: 105:7 And they provoked to wrath going up to the sea, * even the Red Sea.
      - type: citation
        text: '105:8 And he saved them for his own name’s sake: * that he might make his power known.'
      - type: citation
        text: '105:9 And he rebuked the Red Sea, and it was dried up: * and he led them through the depths, as in a wilderness.'
      - type: citation
        text: '105:10 And he saved them from the hand of them that hated them: * and he redeemed them from the hand of the enemy.'
      - type: citation
        text: '105:11 And the water covered them that afflicted them: * there was not one of them left.'
      - type: citation
        text: '105:12 And they believed his words: * and they sang his praises.'
      - type: citation
        text: '105:13 They had quickly done, they forgot his works: * and they waited not for his counsels.'
      - type: citation
        text: '105:14 And they coveted their desire in the desert: * and they tempted God in the place without water.'
      - type: citation
        text: '105:15 And he gave them their request: * and sent fulness into their souls.'
      - type: citation
        text: 105:16 And they provoked Moses in the camp, * Aaron the holy one of the Lord.
      - type: citation
        text: '105:17 The earth opened and swallowed up Dathan: * and covered the congregation of Abiron.'
      - type: citation
        text: '105:18 And a fire was kindled in their congregation: * the flame burned the wicked.'
      - type: citation
        text: '105:19 They made also a calf in Horeb: * and they adored the graven thing.'
      - type: citation
        text: 105:20 And they changed their glory * into the likeness of a calf that eateth grass.
      - type: citation
        text: '105:21 They forgot God, who saved them, * who had done great things in Egypt, wondrous works in the land of Cham: terrible things in the Red Sea.'
      - type: citation
        text: '105:23 And he said that he would destroy them: * had not Moses his chosen stood before him in the breach:'
      - type: citation
        text: 105:24 To turn away his wrath, lest he should destroy them; * and they set at nought the desirable land.
      - type: citation
        text: '105:25 They believed not his word, and they murmured in their tents: * they hearkened not to the voice of the Lord.'
      - type: citation
        text: '105:26 And he lifted up his hand over them: * to overthrow them in the desert;'
      - type: citation
        text: 105:27 And to cast down their seed among the nations, * and to scatter them in the countries.
      - type: citation
        text: '105:28 They also were initiated to Beelphegor: * and ate the sacrifices of the dead.'
      - type: citation
        text: '105:29 And they provoked him with their inventions: * and destruction was multiplied among them.'
      - type: citation
        text: '105:30 Then Phinees stood up, and pacified him: * and the slaughter ceased.'
      - type: citation
        text: 105:31 And it was reputed to him unto justice, * to generation and generation for evermore.
      - type: citation
        text: '105:32 They provoked him also at the waters of contradiction: * and Moses was afflicted for their sakes: because they exasperated his spirit.'
      - type: citation
        text: 105:33 And he distinguished with his lips; * they did not destroy the nations of which the Lord spoke unto them.
      - type: citation
        text: '105:35 And they were mingled among the heathens, and learned their works: and served their idols, * and it became a stumblingblock to them.'
      - type: citation
        text: 105:37 And they sacrificed their sons, * and their daughters to devils.
      - type: citation
        text: '105:38 And they shed innocent blood: * the blood of their sons and of their daughters which they sacrificed to the idols of Chanaan.'
      - type: citation
        text: '105:39 And the land was polluted with blood, and was defiled with their works: * and they went aside after their own inventions.'
      - type: citation
        text: '105:40 And the Lord was exceedingly angry with his people: * and he abhorred his inheritance.'
      - type: citation
        text: '105:41 And he delivered them into the hands of the nations: * and they that hated them had dominion over them.'
      - type: citation
        text: '105:42 And their enemies afflicted them: and they were humbled under their hands: * many times did he deliver them.'
      - type: citation
        text: '105:43 But they provoked him with their counsel: * and they were brought low by their iniquities.'
      - type: citation
        text: '105:44 And he saw when they were in tribulation: * and he heard their prayer.'
      - type: citation
        text: '105:45 And he was mindful of his covenant: * and repented according to the multitude of his mercies.'
      - type: citation
        text: 105:46 And he gave them unto mercies, * in the sight of all those that had made them captives.
      - type: citation
        text: '105:47 Save us, O Lord, our God: * and gather us from among nations:'
      - type: citation
        text: 105:47 That we may give thanks to thy holy name, * and may glory in thy praise.
      - type: citation
        text: '105:48 Blessed be the Lord the God of Israel, from everlasting to everlasting: * and let all the people say: So be it, so be it.'
      la:
      - type: citation
        text: '105:1 Confitémini Dómino, quóniam bonus: * quóniam in sǽculum misericórdia eius.'
      - type: citation
        text: 105:2 Quis loquétur poténtias Dómini, * audítas fáciet omnes laudes eius?
      - type: citation
        text: 105:3 Beáti, qui custódiunt iudícium, * et fáciunt iustítiam in omni témpore.
      - type: citation
        text: '105:4 Meménto nostri, Dómine, in beneplácito pópuli tui: * vísita nos in salutári tuo:'
      - type: citation
        text: '105:5 Ad vidéndum in bonitáte electórum tuórum, ad lætándum in lætítia gentis tuæ: * ut laudéris cum hereditáte tua.'
      - type: citation
        text: '105:6 Peccávimus cum pátribus nostris: * iniúste égimus, iniquitátem fécimus.'
      - type: citation
        text: '105:7 Patres nostri in Ægýpto non intellexérunt mirabília tua: * non fuérunt mémores multitúdinis misericórdiæ tuæ.'
      - type: citation
        text: 105:7 Et irritavérunt ascendéntes in mare, * Mare Rubrum.
      - type: citation
        text: '105:8 Et salvávit eos propter nomen suum: * ut notam fáceret poténtiam suam.'
      - type: citation
        text: 105:9 Et incrépuit Mare Rubrum, et exsiccátum est, * et dedúxit eos in abýssis sicut in desérto.
      - type: citation
        text: '105:10 Et salvávit eos de manu odiéntium: * et redémit eos de manu inimíci.'
      - type: citation
        text: '105:11 Et opéruit aqua tribulántes eos: * unus ex eis non remánsit.'
      - type: citation
        text: '105:12 Et credidérunt verbis eius: * et laudavérunt laudem eius.'
      - type: citation
        text: '105:13 Cito fecérunt, oblíti sunt óperum eius: * et non sustinuérunt consílium eius.'
      - type: citation
        text: '105:14 Et concupiérunt concupiscéntiam in desérto: * et tentavérunt Deum in inaquóso.'
      - type: citation
        text: '105:15 Et dedit eis petitiónem ipsórum: * et misit saturitátem in ánimas eórum.'
      - type: citation
        text: '105:16 Et irritavérunt Móysen in castris: * Aaron, sanctum Dómini.'
      - type: citation
        text: '105:17 Apérta est terra, et deglutívit Dathan: * et opéruit super congregatiónem Abíron.'
      - type: citation
        text: 105:18 Et exársit ignis in synagóga eórum * flamma combússit peccatóres.
      - type: citation
        text: 105:19 Et fecérunt vítulum in Horeb * et adoravérunt scúlptile.
      - type: citation
        text: 105:20 Et mutavérunt glóriam suam * in similitúdinem vítuli comedéntis fænum.
      - type: citation
        text: '105:21 Oblíti sunt Deum, qui salvávit eos, * qui fecit magnália in Ægýpto, mirabília in terra Cham: terribília in Mari Rubro.'
      - type: citation
        text: '105:23 Et dixit ut dispérderet eos: * si non Móyses, eléctus eius, stetísset in confractióne in conspéctu eius:'
      - type: citation
        text: '105:24 Ut avérteret iram eius ne dispérderet eos: * et pro níhilo habuérunt terram desiderábilem:'
      - type: citation
        text: '105:25 Non credidérunt verbo eius, et murmuravérunt in tabernáculis suis: * non exaudiérunt vocem Dómini.'
      - type: citation
        text: '105:26 Et elevávit manum suam super eos: * ut prostérneret eos in desérto:'
      - type: citation
        text: '105:27 Et ut deíceret semen eórum in natiónibus: * et dispérgeret eos in regiónibus.'
      - type: citation
        text: '105:28 Et initiáti sunt Beélphegor: * et comedérunt sacrifícia mortuórum.'
      - type: citation
        text: '105:29 Et irritavérunt eum in adinventiónibus suis: * et multiplicáta est in eis ruína.'
      - type: citation
        text: '105:30 Et stetit Phínees, et placávit: * et cessávit quassátio.'
      - type: citation
        text: '105:31 Et reputátum est ei in iustítiam: * in generatiónem et generatiónem usque in sempitérnum.'
      - type: citation
        text: '105:32 Et irritavérunt eum ad aquas contradictiónis: * et vexátus est Móyses propter eos: quia exacerbavérunt spíritum eius.'
      - type: citation
        text: '105:33 Et distínxit in lábiis suis: * non disperdidérunt gentes, quas dixit Dóminus illis.'
      - type: citation
        text: '105:35 Et commísti sunt inter gentes, et didicérunt ópera eórum: et serviérunt sculptílibus eórum: * et factum est illis in scándalum.'
      - type: citation
        text: 105:37 Et immolavérunt fílios suos, * et fílias suas dæmóniis.
      - type: citation
        text: '105:38 Et effudérunt sánguinem innocéntem: * sánguinem filiórum suórum et filiárum suárum, quas sacrificavérunt sculptílibus Chánaan.'
      - type: citation
        text: '105:39 Et infécta est terra in sanguínibus, et contamináta est in opéribus eórum: * et fornicáti sunt in adinventiónibus suis.'
      - type: citation
        text: '105:40 Et irátus est furóre Dóminus in pópulum suum: * et abominátus est hereditátem suam.'
      - type: citation
        text: '105:41 Et trádidit eos in manus géntium: * et domináti sunt eórum qui odérunt eos.'
      - type: citation
        text: '105:42 Et tribulavérunt eos inimíci eórum, et humiliáti sunt sub mánibus eórum: * sæpe liberávit eos.'
      - type: citation
        text: '105:43 Ipsi autem exacerbavérunt eum in consílio suo: * et humiliáti sunt in iniquitátibus suis.'
      - type: citation
        text: '105:44 Et vidit, cum tribularéntur: * et audívit oratiónem eórum.'
      - type: citation
        text: '105:45 Et memor fuit testaménti sui: * et pœnítuit eum secúndum multitúdinem misericórdiæ suæ.'
      - type: citation
        text: 105:46 Et dedit eos in misericórdias * in conspéctu ómnium qui céperant eos.
      - type: citation
        text: '105:47 Salvos nos fac, Dómine, Deus noster: * et cóngrega nos de natiónibus:'
      - type: citation
        text: '105:47 Ut confiteámur nómini sancto tuo: * et gloriémur in laude tua.'
      - type: citation
        text: '105:48 Benedíctus Dóminus, Deus Israël, a sǽculo et usque in sǽculum: * et dicet omnis pópulus: Fiat, fiat.'
      en2:
      - type: citation
        text: '105:1 Confess to the Lord, for he is good: * for his mercy is with every generation.'
      - type: citation
        text: 105:2 Who will declare the powers of the Lord, * who will make a hearing for all his praises?
      - type: citation
        text: 105:3 Blessed are those who keep judgment, * and who do justice at all times.
      - type: citation
        text: '105:4 Remember us, O Lord, with good will for your people: * visit us with your salvation:'
      - type: citation
        text: '105:5 so that we may see the goodness of your elect, so that we may rejoice in the joy of your nation: * so that you may be praised along with your inheritance.'
      - type: citation
        text: '105:6 We have sinned, as have our fathers: * we have acted unjustly; we have wrought iniquity.'
      - type: citation
        text: '105:7 Our fathers did not understand your miracles in Egypt: * they did not remember the multitude of your mercies.'
      - type: citation
        text: 105:7 And they provoked you, while going up to the sea, * the Red Sea.
      - type: citation
        text: '105:8 And he saved them for the sake of his name: * so that he might make known his power.'
      - type: citation
        text: 105:9 And he rebuked the Red Sea, and it dried up, * and he led them into the abyss, as if into a desert.
      - type: citation
        text: '105:10 And he saved them from the hand of those who hated them: * and he redeemed them from the hand of the enemy.'
      - type: citation
        text: '105:11 And the water covered those who troubled them: * not one of them remained.'
      - type: citation
        text: '105:12 And they believed his words: * and they sang his praises.'
      - type: citation
        text: '105:13 As soon as they had finished, they forgot his works: * and they would not endure his counsel.'
      - type: citation
        text: '105:14 And they coveted their desire in the desert: * and they tempted God in a waterless place.'
      - type: citation
        text: '105:15 And he granted to them their request: * and he sent abundance into their souls.'
      - type: citation
        text: '105:16 And they provoked Moses in the camp: * and Aaron, the holy one of the Lord.'
      - type: citation
        text: '105:17 The earth opened and swallowed Dathan: * and it covered the congregation of Abiram.'
      - type: citation
        text: '105:18 And a fire broke out in their congregation: * a flame burned up the sinners.'
      - type: citation
        text: 105:19 And they fashioned a calf at Horeb, * and they adored a graven image.
      - type: citation
        text: 105:20 And they exchanged their glory * for the likeness of a calf that eats hay.
      - type: citation
        text: 105:21 They forgot God, who saved them, * who did great things in Egypt, wonders in the land of Ham, and terrible things at the Red Sea.
      - type: citation
        text: '105:23 And he said that he would destroy them: * yet Moses, his elect, stood firm before him in the breach,'
      - type: citation
        text: '105:24 in order to avert his wrath, lest he destroy them: * and they held the desirable land to be nothing.'
      - type: citation
        text: '105:25 They did not trust in his word, and they murmured in their tabernacles: * they did not heed the voice of the Lord.'
      - type: citation
        text: '105:26 And he lifted up his hand over them: * in order to prostrate them in the desert:'
      - type: citation
        text: '105:27 and in order to cast their offspring among the nations: * and to scatter them among the regions.'
      - type: citation
        text: '105:28 And they were initiated into Baal of Peor: * and they ate the sacrifices of the dead.'
      - type: citation
        text: '105:29 And they provoked him with their inventions: * and ruination was multiplied in them.'
      - type: citation
        text: '105:30 Then Phinehas stood up and placated him: * and so the violent disturbance ceased.'
      - type: citation
        text: '105:31 And it was reputed to him unto justice: * from generation to generation, even forever.'
      - type: citation
        text: '105:32 And they provoked him at the Waters of Contradiction: * and Moses was afflicted because of them,'
      - type: citation
        text: '105:33 for they exasperated his spirit: * and so he divided them with his lips.'
      - type: citation
        text: '105:35 And they were mixed among the Gentiles, and they learned their works; and they served their graven images: * and it became a scandal to them.'
      - type: citation
        text: 105:37 And they sacrificed their sons, * and their daughters, to demons.
      - type: citation
        text: '105:38 And they shed innocent blood: * the blood of their sons and of their daughters, which they sacrificed to the graven images of Canaan.'
      - type: citation
        text: '105:39 And the land was infected with bloodshed, and was contaminated with their works: * and they fornicated according to their own inventions.'
      - type: citation
        text: '105:40 And the Lord became furiously angry with his people: * and he abhorred his inheritance.'
      - type: citation
        text: '105:41 And he handed them over into the hands of the nations: * and those who hated them held dominion over them.'
      - type: citation
        text: '105:42 And their enemies afflicted them, and they were humbled under their hands: * many times he delivered them.'
      - type: citation
        text: '105:43 But they provoked him with their counsel: * and they were brought low by their iniquities.'
      - type: citation
        text: '105:44 And he saw, when they were in tribulation: * and he heard their prayer.'
      - type: citation
        text: '105:45 And he was mindful of his covenant: * and he repented according to the multitude of his mercies.'
      - type: citation
        text: 105:46 And he provided for them with mercies * in the sight of all those who had seized them.
      - type: citation
        text: '105:47 Save us, O Lord our God: * and gather us from the nations:'
      - type: citation
        text: '105:47 That we may give thanks to your holy name: * and glory in your praise.'
      - type: citation
        text: '105:48 Blessed is the Lord, the God of Israel, from age to age: * and let all the people say: Amen. Amen.'
  psalm.106-1-confit-mini-d-mino-qu-niam-bonus-qu-niam-i-6d0d25c5aa:
    role: psalm
    content:
      en:
      - type: citation
        text: '106:1 Give glory to the Lord, for he is good: * for his mercy endureth for ever.'
      - type: citation
        text: '106:2 Let them say so that have been redeemed by the Lord, whom he hath redeemed from the hand of the enemy: * and gathered out of the countries.'
      - type: citation
        text: 106:3 From the rising and the setting of the sun, * from the north and from the sea.
      - type: citation
        text: '106:4 They wandered in a wilderness, in a place without water: * they found not the way of a city for their habitation.'
      - type: citation
        text: '106:5 They were hungry and thirsty: * their soul fainted in them.'
      - type: citation
        text: '106:6 And they cried to the Lord in their tribulation: * and he delivered them out of their distresses.'
      - type: citation
        text: '106:7 And he led them into the right way: * that they might go to a city of habitation.'
      - type: citation
        text: '106:8 Let the mercies of the Lord give glory to him: * and his wonderful works to the children of men.'
      - type: citation
        text: 106:9 For he hath satisfied the empty soul, * and hath filled the hungry soul with good things.
      - type: citation
        text: '106:10 Such as sat in darkness and in the shadow of death: * bound in want and in iron.'
      - type: citation
        text: '106:11 Because they had exasperated the words of God: * and provoked the counsel of the most High:'
      - type: citation
        text: '106:12 And their heart was humbled with labours: * they were weakened, and there was none to help them.'
      - type: citation
        text: '106:13 Then they cried to the Lord in their affliction: * and he delivered them out of their distresses.'
      - type: citation
        text: 106:14 And he brought them out of darkness, * and the shadow of death; and broke their bonds in sunder.
      - type: citation
        text: 106:15 Let the mercies of the Lord give glory to him, * and his wonderful works to the children of men.
      - type: citation
        text: 106:16 Because he hath broken gates of brass, * and burst the iron bars.
      - type: citation
        text: '106:17 He took them out of the way of their iniquity: * for they were brought low for their injustices.'
      - type: citation
        text: '106:18 Their soul abhorred all manner of meat: * and they drew nigh even to the gates of death.'
      - type: citation
        text: '106:19 And they cried to the Lord in their affliction: * and he delivered them out of their distresses.'
      - type: citation
        text: '106:20 He sent his word, and healed them: * and delivered them from their destructions.'
      - type: citation
        text: '106:21 Let the mercies of the Lord give glory to him: * and his wonderful works to the children of men'
      - type: citation
        text: '106:22 And let them sacrifice the sacrifice of praise: * and declare his works with joy.'
      - type: citation
        text: '106:23 They that go down to the sea in ships, * doing business in the great waters:'
      - type: citation
        text: 106:24 These have seen the works of the Lord, * and his wonders in the deep.
      - type: citation
        text: '106:25 He said the word, and there arose a storm of wind: * and the waves thereof were lifted up.'
      - type: citation
        text: '106:26 They mount up to the heavens, and they go down to the depths: * their soul pined away with evils.'
      - type: citation
        text: 106:27 They were troubled, and reeled like a drunken man; * and all their wisdom was swallowed up.
      - type: citation
        text: '106:28 And they cried to the Lord in their affliction: * and he brought them out of their distresses.'
      - type: citation
        text: '106:29 And he turned the storm into a breeze: * and its waves were still.'
      - type: citation
        text: '106:30 And they rejoiced because they were still: * and he brought them to the haven which they wished for.'
      - type: citation
        text: 106:31 Let the mercies of the Lord give glory to him, * and his wonderful works to the children of men.
      - type: citation
        text: '106:32 And let them exalt him in the church of the people: * and praise him in the chair of the ancients.'
      - type: citation
        text: '106:33 He hath turned rivers into a wilderness: * and the sources of water into dry ground:'
      - type: citation
        text: 106:34 A fruitful land into barrenness, * for the wickedness of them that dwell therein.
      - type: citation
        text: 106:35 He hath turned a wilderness into pools of water, * and a dry land into water springs.
      - type: citation
        text: 106:36 And hath placed there the hungry; * and they made a city for their habitation.
      - type: citation
        text: '106:37 And they sowed fields, and planted vineyards: * and they yielded fruit of birth.'
      - type: citation
        text: '106:38 And he blessed them, and they were multiplied exceedingly: * and their cattle he suffered not to decrease.'
      - type: citation
        text: '106:39 Then they were brought to be few: * and they were afflicted through the trouble of evils and sorrow.'
      - type: citation
        text: '106:40 Contempt was poured forth upon their princes: *and he caused them to wander where there was no passing, and out of the way.'
      - type: citation
        text: '106:41 And he helped the poor out of poverty: * and made him families like a flock of sheep.'
      - type: citation
        text: 106:42 The just shall see, and shall rejoice, * and all iniquity shall stop their mouth.
      - type: citation
        text: '106:43 Who is wise, and will keep these things: * and will understand the mercies of the Lord?'
      la:
      - type: citation
        text: '106:1 Confitémini Dómino quóniam bonus: * quóniam in sǽculum misericórdia eius.'
      - type: citation
        text: '106:2 Dicant qui redémpti sunt a Dómino, quos redémit de manu inimíci: * et de regiónibus congregávit eos:'
      - type: citation
        text: '106:3 A solis ortu, et occásu: * ab aquilóne, et mari.'
      - type: citation
        text: '106:4 Erravérunt in solitúdine in inaquóso: * viam civitátis habitáculi non invenérunt.'
      - type: citation
        text: '106:5 Esuriéntes, et sitiéntes: * ánima eórum in ipsis defécit.'
      - type: citation
        text: '106:6 Et clamavérunt ad Dóminum cum tribularéntur: * et de necessitátibus eórum erípuit eos.'
      - type: citation
        text: '106:7 Et dedúxit eos in viam rectam: * ut irent in civitátem habitatiónis.'
      - type: citation
        text: '106:8 Confiteántur Dómino misericórdiæ eius: * et mirabília eius fíliis hóminum.'
      - type: citation
        text: '106:9 Quia satiávit ánimam inánem: * et ánimam esuriéntem satiávit bonis.'
      - type: citation
        text: '106:10 Sedéntes in ténebris, et umbra mortis: * vinctos in mendicitáte et ferro.'
      - type: citation
        text: '106:11 Quia exacerbavérunt elóquia Dei: * et consílium Altíssimi irritavérunt.'
      - type: citation
        text: '106:12 Et humiliátum est in labóribus cor eórum: * infirmáti sunt, nec fuit qui adiuváret.'
      - type: citation
        text: '106:13 Et clamavérunt ad Dóminum cum tribularéntur: * et de necessitátibus eórum liberávit eos.'
      - type: citation
        text: '106:14 Et edúxit eos de ténebris, et umbra mortis: * et víncula eórum disrúpit.'
      - type: citation
        text: '106:15 Confiteántur Dómino misericórdiæ eius: * et mirabília eius fíliis hóminum.'
      - type: citation
        text: '106:16 Quia contrívit portas ǽreas: * et vectes férreos confrégit.'
      - type: citation
        text: '106:17 Suscépit eos de via iniquitátis eórum: * propter iniustítias enim suas humiliáti sunt.'
      - type: citation
        text: '106:18 Omnem escam abomináta est ánima eórum: * et appropinquavérunt usque ad portas mortis.'
      - type: citation
        text: '106:19 Et clamavérunt ad Dóminum cum tribularéntur: * et de necessitátibus eórum liberávit eos.'
      - type: citation
        text: '106:20 Misit verbum suum, et sanávit eos: * et erípuit eos de interitiónibus eórum.'
      - type: citation
        text: '106:21 Confiteántur Dómino misericórdiæ eius: * et mirabília eius fíliis hóminum.'
      - type: citation
        text: '106:22 Et sacríficent sacrifícium laudis: * et annúntient ópera eius in exsultatióne.'
      - type: citation
        text: 106:23 Qui descéndunt mare in návibus, * faciéntes operatiónem in aquis multis.
      - type: citation
        text: 106:24 Ipsi vidérunt ópera Dómini, * et mirabília eius in profúndo.
      - type: citation
        text: '106:25 Dixit, et stetit spíritus procéllæ: * et exaltáti sunt fluctus eius.'
      - type: citation
        text: '106:26 Ascéndunt usque ad cælos, et descéndunt usque ad abýssos: * ánima eórum in malis tabescébat.'
      - type: citation
        text: '106:27 Turbáti sunt, et moti sunt sicut ébrius: * et omnis sapiéntia eórum devoráta est.'
      - type: citation
        text: '106:28 Et clamavérunt ad Dóminum cum tribularéntur: * et de necessitátibus eórum edúxit eos.'
      - type: citation
        text: '106:29 Et státuit procéllam eius in auram: * et siluérunt fluctus eius.'
      - type: citation
        text: '106:30 Et lætáti sunt quia siluérunt: * et dedúxit eos in portum voluntátis eórum.'
      - type: citation
        text: '106:31 Confiteántur Dómino misericórdiæ eius: * et mirabília eius fíliis hóminum.'
      - type: citation
        text: '106:32 Et exáltent eum in ecclésia plebis: * et in cáthedra seniórum laudent eum.'
      - type: citation
        text: '106:33 Pósuit flúmina in desértum: * et éxitus aquárum in sitim.'
      - type: citation
        text: '106:34 Terram fructíferam in salsúginem: * a malítia inhabitántium in ea.'
      - type: citation
        text: '106:35 Pósuit desértum in stagna aquárum: * et terram sine aqua in éxitus aquárum.'
      - type: citation
        text: '106:36 Et collocávit illic esuriéntes: * et constituérunt civitátem habitatiónis.'
      - type: citation
        text: '106:37 Et seminavérunt agros, et plantavérunt víneas: * et fecérunt fructum nativitátis.'
      - type: citation
        text: '106:38 Et benedíxit eis, et multiplicáti sunt nimis: * et iuménta eórum non minorávit.'
      - type: citation
        text: '106:39 Et pauci facti sunt: * et vexáti sunt a tribulatióne malórum, et dolóre.'
      - type: citation
        text: '106:40 Effúsa est contémptio super príncipes: * et erráre fecit eos in ínvio, et non in via.'
      - type: citation
        text: '106:41 Et adiúvit páuperem de inópia: * et pósuit sicut oves famílias.'
      - type: citation
        text: '106:42 Vidébunt recti, et lætabúntur: * et omnis iníquitas oppilábit os suum.'
      - type: citation
        text: 106:43 Quis sápiens et custódiet hæc? * et intélleget misericórdias Dómini.
      en2:
      - type: citation
        text: '106:1 Give thanks to the Lord, for he is good: * for his mercy endures for ever.'
      - type: citation
        text: '106:2 Let those who have been redeemed by the Lord say so, those whom he redeemed from the hand of the enemy: * and gathered them from the regions:'
      - type: citation
        text: '106:3 From the rising of the sun and its setting: * from the north and from the sea.'
      - type: citation
        text: '106:4 They wandered in solitude in a waterless place: * they did not find the way to a city of habitation.'
      - type: citation
        text: '106:5 Hungry and thirsty: * their soul fainted within them.'
      - type: citation
        text: '106:6 And they cried out to the Lord in their tribulation: * and he rescued them from their necessity.'
      - type: citation
        text: '106:7 And he led them in the right way: * that they might go forth to a city of habitation.'
      - type: citation
        text: '106:8 Let them confess to the Lord his mercies: * and his wonders to the sons of men.'
      - type: citation
        text: '106:9 For he has satisfied the empty soul: * and the hungry soul he has filled with good things.'
      - type: citation
        text: '106:10 Those who sat in darkness and in the shadow of death: * shackled in poverty and in iron.'
      - type: citation
        text: '106:11 For they had provoked the words of God: * and had spurned the counsel of the Most High.'
      - type: citation
        text: '106:12 And their heart was brought low with hardships: * they were weakened, and there was no one to help them.'
      - type: citation
        text: '106:13 And they cried out to the Lord in their tribulation: * and he freed them from their distress.'
      - type: citation
        text: '106:14 And he led them out of darkness and the shadow of death: * and he broke apart their chains.'
      - type: citation
        text: '106:15 Let them confess to the Lord his mercies: * and his wonders to the sons of men.'
      - type: citation
        text: '106:16 For he has crushed the gates of brass: * and broken the iron bars.'
      - type: citation
        text: '106:17 He has taken them up from the way of their iniquity: * for they were brought low because of their injustices.'
      - type: citation
        text: '106:18 Their soul abhorred all food: * and they drew near even to the gates of death.'
      - type: citation
        text: '106:19 And they cried out to the Lord in their tribulation: * and he delivered them from their necessity.'
      - type: citation
        text: '106:20 He sent his word, and healed them: * and rescued them from their utter destruction.'
      - type: citation
        text: '106:21 Let them confess to the Lord his mercies: * and his wonders to the sons of men.'
      - type: citation
        text: '106:22 And let them offer sacrifice with the sacrifice of praise: * and declare his works in exultation.'
      - type: citation
        text: '106:23 Those who descend to the sea in ships, * making their livelihood in the great waters:'
      - type: citation
        text: 106:24 These have seen the works of the Lord, * and his wonders in the deep.
      - type: citation
        text: '106:25 He spoke, and a windstorm arose: * and its waves were exalted.'
      - type: citation
        text: '106:26 They ascend even to the heavens, and descend even to the abyss: * their soul wasted away in distress.'
      - type: citation
        text: '106:27 They were troubled and moved like a drunkard: * and all their wisdom was consumed.'
      - type: citation
        text: '106:28 And they cried out to the Lord in their tribulation: * and he led them out of their distress.'
      - type: citation
        text: '106:29 And he replaced the storm with a breeze: * and its waves were stilled.'
      - type: citation
        text: '106:30 And they rejoiced that it was stilled: * and he led them into the haven they desired.'
      - type: citation
        text: '106:31 Let them confess to the Lord his mercies: * and his wonders to the sons of men.'
      - type: citation
        text: '106:32 And let them exalt him in the assembly of the people: * and praise him in the chair of the elders.'
      - type: citation
        text: '106:33 He has placed rivers in the desert: * and sources of water in a waterless land.'
      - type: citation
        text: '106:34 A fruit-bearing land into brine: * because of the malice of those who dwell in it.'
      - type: citation
        text: '106:35 He has placed the desert in pools of water: * and a land without water in sources of water.'
      - type: citation
        text: '106:36 And he has gathered the hungry there: * and they have built a city of habitation.'
      - type: citation
        text: '106:37 And they sowed fields and planted vineyards: * and they yielded the fruit of their increase.'
      - type: citation
        text: '106:38 And he blessed them, and they were multiplied exceedingly: * and their cattle he did not diminish.'
      - type: citation
        text: '106:39 And they became few: * and were afflicted by the tribulation of evils and sorrow.'
      - type: citation
        text: '106:40 Contempt was poured out upon their leaders: * and he caused them to wander in trackless places and not on the way.'
      - type: citation
        text: '106:41 And he helped the poor man out of destitution: * and set families like flocks.'
      - type: citation
        text: '106:42 The upright will see and rejoice: * and every iniquity will stop its mouth.'
      - type: citation
        text: 106:43 Who is wise and will keep these things? * And who will understand the mercies of the Lord?
  psalm.107-2-par-tum-cor-meum-deus-par-tum-cor-meum-can-90617d8ee2:
    role: psalm
    content:
      en:
      - type: citation
        text: '107:2 My heart is ready, O God, my heart is ready: * I will sing, and will give praise, with my glory.'
      - type: citation
        text: 107:3 Arise, my glory; arise, psaltery and harp * I will arise in the morning early.
      - type: citation
        text: '107:4 I will praise thee, O Lord, among the people: * and I will sing unto thee among the nations.'
      - type: citation
        text: '107:5 For thy mercy is great above the heavens: * and thy truth even unto the clouds.'
      - type: citation
        text: '107:6 Be thou exalted, O God, above the heavens, and thy glory over all the earth: * that thy beloved may be delivered.'
      - type: citation
        text: 107:7 Save with thy right hand and hear me. * God hath spoken in his holiness.
      - type: citation
        text: 107:8 I will rejoice, and I will divide Sichem * and I will mete out the vale of tabernacles.
      - type: citation
        text: '107:9 Galaad is mine: and Manasses is mine: * and Ephraim the protection of my head.'
      - type: citation
        text: '107:10 Juda is my king: * Moab the pot of my hope.'
      - type: citation
        text: '107:10 Over Edom I will stretch out my shoe: * the aliens are become my friends.'
      - type: citation
        text: 107:11 Who will bring me into the strong city? * who will lead me into Edom?
      - type: citation
        text: 107:12 Wilt not thou, O God, who hast cast us off? * and wilt not thou, O God, go forth with our armies?
      - type: citation
        text: '107:13 O grant us help from trouble: * for vain is the help of man.'
      - type: citation
        text: '107:14 Through God we shall do mightily: * and he will bring our enemies to nothing.'
      la:
      - type: citation
        text: '107:2 Parátum cor meum, Deus, parátum cor meum: * cantábo, et psallam in glória mea.'
      - type: citation
        text: '107:3 Exsúrge, glória mea, exsúrge, psaltérium et cíthara: * exsúrgam dilúculo.'
      - type: citation
        text: '107:4 Confitébor tibi in pópulis, Dómine: * et psallam tibi in natiónibus.'
      - type: citation
        text: '107:5 Quia magna est super cælos misericórdia tua: * et usque ad nubes véritas tua:'
      - type: citation
        text: '107:6 Exaltáre super cælos, Deus, et super omnem terram glória tua: * ut liberéntur dilécti tui.'
      - type: citation
        text: '107:7 Salvum fac déxtera tua, et exáudi me: * Deus locútus est in sancto suo:'
      - type: citation
        text: 107:8 Exsultábo, et dívidam Síchimam, * et convállem tabernaculórum dimétiar.
      - type: citation
        text: '107:9 Meus est Gálaad, et meus est Manásses: * et Éphraim suscéptio cápitis mei.'
      - type: citation
        text: '107:10 Iuda rex meus: * Moab lebes spei meæ.'
      - type: citation
        text: '107:10 In Idumǽam exténdam calceaméntum meum: * mihi alienígenæ amíci facti sunt.'
      - type: citation
        text: 107:11 Quis dedúcet me in civitátem munítam? * quis dedúcet me usque in Idumǽam?
      - type: citation
        text: 107:12 Nonne tu, Deus, qui repulísti nos, * et non exíbis, Deus, in virtútibus nostris?
      - type: citation
        text: '107:13 Da nobis auxílium de tribulatióne: * quia vana salus hóminis.'
      - type: citation
        text: '107:14 In Deo faciémus virtútem: * et ipse ad níhilum dedúcet inimícos nostros.'
      en2:
      - type: citation
        text: '107:2 My heart is prepared, O God, my heart is prepared: * I will sing and I will chant psalms in my glory.'
      - type: citation
        text: '107:3 Rise up, my glory, rise up, psaltery and harp: * I will arise at dawn.'
      - type: citation
        text: '107:4 I will give thanks to you among the peoples, O Lord: * and I will chant psalms to you among the nations.'
      - type: citation
        text: '107:5 For your mercy is great, above the heavens: * and your truth even to the clouds:'
      - type: citation
        text: '107:6 Be exalted above the heavens, O God, and above all the earth your glory: * that your beloved may be freed.'
      - type: citation
        text: '107:7 Save with your right hand, and hear me: * God has spoken in his holiness:'
      - type: citation
        text: 107:8 I will exult, and I will divide Shechem, * and I will measure out the valley of Tabernacles.
      - type: citation
        text: '107:9 Gilead is mine, and Manasseh is mine: * and Ephraim is the support of my head.'
      - type: citation
        text: '107:10 Judah is my king: * Moab is the bowl of my hope.'
      - type: citation
        text: '107:10 Over Idumea I will extend my sandal: * the foreigners have become my friends.'
      - type: citation
        text: 107:11 Who will lead me into the fortified city? * Who will lead me even into Idumea?
      - type: citation
        text: 107:12 Will not you, O God, who had rejected us, * and will not you, O God, go forth with our armies?
      - type: citation
        text: '107:13 Grant us help from tribulation: * for vain is the help of man.'
      - type: citation
        text: '107:14 In God we will act with strength: * and he himself will bring our enemies to nothing.'
  psalm.108-2-deus-laudem-meam-ne-tac-eris-quia-os-pecca-a791f83338:
    role: psalm
    content:
      en:
      - type: citation
        text: '108:2 God, be not thou silent in my praise: * for the mouth of the wicked and the mouth of the deceitful man is opened against me.'
      - type: citation
        text: 108:3 They have spoken against me with deceitful tongues; and they have compassed me about with words of hatred; * and have fought against me without cause.
      - type: citation
        text: '108:4 Instead of making me a return of love, they detracted me: * but I gave myself to prayer.'
      - type: citation
        text: '108:5 And they repaid me evil for good: * and hatred for my love.'
      - type: citation
        text: '108:6 Set thou the sinner over him: * and may the devil stand at his right hand.'
      - type: citation
        text: 108:7 When he is judged, may he go out condemned; * and may his prayer be turned to sin.
      - type: citation
        text: '108:8 May his days be few: * and his bishopric let another take.'
      - type: citation
        text: 108:9 May his children be fatherless, * and his wife a widow.
      - type: citation
        text: 108:10 Let his children be carried about vagabonds, and beg; * and let them be cast out of their dwellings.
      - type: citation
        text: '108:11 May the usurer search all his substance: * and let strangers plunder his labours.'
      - type: citation
        text: '108:12 May there be none to help him: * nor none to pity his fatherless offspring.'
      - type: citation
        text: 108:13 May his posterity be cut off; * in one generation may his name be blotted out.
      - type: citation
        text: '108:14 May the iniquity of his fathers be remembered in the sight of the Lord: * and let not the sin of his mother be blotted out.'
      - type: citation
        text: '108:15 May they be before the Lord continually, and let the memory of them perish from the earth: * because he remembered not to shew mercy,'
      - type: citation
        text: 108:17 But persecuted the poor man and the beggar; * and the broken in heart, to put him to death.
      - type: citation
        text: '108:18 And he loved cursing, and it shall come unto him: * and he would not have blessing, and it shall be far from him.'
      - type: citation
        text: '108:18 And he put on cursing, like a garment: * and it went in like water into his entrails, and like oil in his bones.'
      - type: citation
        text: 108:19 May it be unto him like a garment which covereth him; * and like a girdle with which he is girded continually.
      - type: citation
        text: 108:20 This is the work of them who detract me before the Lord; * and who speak evils against my soul.
      - type: citation
        text: '108:21 But thou, O Lord, do with me for thy name’s sake: * because thy mercy is sweet.'
      - type: citation
        text: 108:22 Do thou deliver me, for I am poor and needy, * and my heart is troubled within me.
      - type: citation
        text: '108:23 I am taken away like the shadow when it declineth: * and I am shaken off as locusts.'
      - type: citation
        text: '108:24 My knees are weakened through fasting: * and my flesh is changed for oil.'
      - type: citation
        text: '108:25 And I am become a reproach to them: * they saw me and they shaked their heads.'
      - type: citation
        text: 108:26 Help me, O Lord my God; * save me according to thy mercy.
      - type: citation
        text: '108:27 And let them know that this is thy hand: * and that thou, O Lord, hast done it.'
      - type: citation
        text: '108:28 They will curse and thou wilt bless: * let them that rise up against me be confounded: but thy servant shall rejoice.'
      - type: citation
        text: '108:29 Let them that detract me be clothed with shame: * and let them be covered with their confusion as with a double cloak.'
      - type: citation
        text: '108:30 I will give great thanks to the Lord with my mouth: * and in the midst of many I will praise him.'
      - type: citation
        text: 108:31 Because he hath stood at the right hand of the poor, * to save my soul from persecutors.
      la:
      - type: citation
        text: '108:2 Deus, laudem meam ne tacúeris: * quia os peccatóris, et os dolósi super me apértum est.'
      - type: citation
        text: '108:3 Locúti sunt advérsum me lingua dolósa, et sermónibus ódii circumdedérunt me: * et expugnavérunt me gratis.'
      - type: citation
        text: '108:4 Pro eo ut me dilígerent, detrahébant mihi: * ego autem orábam.'
      - type: citation
        text: '108:5 Et posuérunt advérsum me mala pro bonis: * et ódium pro dilectióne mea.'
      - type: citation
        text: '108:6 Constítue super eum peccatórem: * et diábolus stet a dextris eius.'
      - type: citation
        text: '108:7 Cum iudicátur, éxeat condemnátus: * et orátio eius fiat in peccátum.'
      - type: citation
        text: '108:8 Fiant dies eius pauci: * et episcopátum eius accípiat alter.'
      - type: citation
        text: '108:9 Fiant fílii eius órphani: * et uxor eius vídua.'
      - type: citation
        text: '108:10 Nutántes transferántur fílii eius, et mendícent: * et eiciántur de habitatiónibus suis.'
      - type: citation
        text: '108:11 Scrutétur fænerátor omnem substántiam eius: * et dirípiant aliéni labóres eius.'
      - type: citation
        text: '108:12 Non sit illi adiútor: * nec sit qui misereátur pupíllis eius.'
      - type: citation
        text: '108:13 Fiant nati eius in intéritum: * in generatióne una deleátur nomen eius.'
      - type: citation
        text: '108:14 In memóriam rédeat iníquitas patrum eius in conspéctu Dómini: * et peccátum matris eius non deleátur.'
      - type: citation
        text: '108:15 Fiant contra Dóminum semper, et dispéreat de terra memória eórum: * pro eo quod non est recordátus fácere misericórdiam.'
      - type: citation
        text: 108:17 Et persecútus est hóminem ínopem, et mendícum, * et compúnctum corde mortificáre.
      - type: citation
        text: '108:18 Et diléxit maledictiónem, et véniet ei: * et nóluit benedictiónem, et elongábitur ab eo.'
      - type: citation
        text: 108:18 Et índuit maledictiónem sicut vestiméntum, * et intrávit sicut aqua in interióra eius, et sicut óleum in óssibus eius.
      - type: citation
        text: '108:19 Fiat ei sicut vestiméntum, quo operítur: * et sicut zona, qua semper præcíngitur.'
      - type: citation
        text: '108:20 Hoc opus eórum, qui détrahunt mihi apud Dóminum: * et qui loquúntur mala advérsus ánimam meam.'
      - type: citation
        text: '108:21 Et tu, Dómine, Dómine, fac mecum propter nomen tuum: * quia suávis est misericórdia tua.'
      - type: citation
        text: '108:22 Líbera me quia egénus, et pauper ego sum: * et cor meum conturbátum est intra me.'
      - type: citation
        text: '108:23 Sicut umbra cum declínat, ablátus sum: * et excússus sum sicut locústæ.'
      - type: citation
        text: '108:24 Génua mea infirmáta sunt a ieiúnio: * et caro mea immutáta est propter óleum.'
      - type: citation
        text: '108:25 Et ego factus sum oppróbrium illis: * vidérunt me, et movérunt cápita sua.'
      - type: citation
        text: '108:26 Ádiuva me, Dómine, Deus meus: * salvum me fac secúndum misericórdiam tuam.'
      - type: citation
        text: '108:27 Et sciant quia manus tua hæc: * et tu, Dómine, fecísti eam.'
      - type: citation
        text: '108:28 Maledícent illi, et tu benedíces: * qui insúrgunt in me, confundántur: servus autem tuus lætábitur.'
      - type: citation
        text: '108:29 Induántur qui détrahunt mihi, pudóre: * et operiántur sicut diplóide confusióne sua.'
      - type: citation
        text: '108:30 Confitébor Dómino nimis in ore meo: * et in médio multórum laudábo eum.'
      - type: citation
        text: 108:31 Quia ástitit a dextris páuperis, * ut salvam fáceret a persequéntibus ánimam meam.
      en2:
      - type: citation
        text: '108:2 O God, do not be silent toward my praise: * for the mouth of the sinner and the mouth of the deceitful one have been opened against me.'
      - type: citation
        text: '108:3 They have spoken against me with deceitful tongues, and with words of hatred they have surrounded me: * and they have fought against me without cause.'
      - type: citation
        text: '108:4 Instead of loving me they detracted me: * but I gave myself to prayer.'
      - type: citation
        text: '108:5 And they set evil against me in place of good: * and hatred in return for my love.'
      - type: citation
        text: '108:6 Establish a sinner over him: * and let the devil stand at his right hand.'
      - type: citation
        text: '108:7 When he is judged, may he go forth condemned: * and may his prayer be counted as sin.'
      - type: citation
        text: '108:8 May his days be few: * and let another take his episcopate.'
      - type: citation
        text: '108:9 May his sons be orphans: * and his wife a widow.'
      - type: citation
        text: '108:10 May his sons be carried by those who wander and beg: * and may they be cast out of their dwelling places.'
      - type: citation
        text: '108:11 May the money-lender scrutinize all his possessions: * and let foreigners plunder his labors.'
      - type: citation
        text: '108:12 May there be no one to help him: * nor any who shows compassion to his orphaned children.'
      - type: citation
        text: '108:13 May his posterity be brought to ruin: * in one generation may his name be blotted out.'
      - type: citation
        text: '108:14 May the iniquity of his fathers be recalled before the Lord: * and the sin of his mother not be blotted out.'
      - type: citation
        text: '108:15 May these be set against the Lord always, and may the memory of them perish from the earth: * because he did not remember to show mercy.'
      - type: citation
        text: 108:17 And so the destitute man was pursued, with the beggar * and the remorseful in heart, so as to be put to death.
      - type: citation
        text: '108:18 And he loved a curse, and it came to him: * and he was unwilling to have a blessing, and it went far from him.'
      - type: citation
        text: 108:18 And he clothed himself with curses like a garment, * and it entered his inner self like water, and it entered his bones like oil.
      - type: citation
        text: '108:19 May it be to him like a garment that covers him: * and like a belt that always cinches him.'
      - type: citation
        text: '108:20 This is the work of those who detract me with the Lord: * and who speak evils against my soul.'
      - type: citation
        text: '108:21 But as for you, Lord, O Lord: act on my behalf for your name''s sake: * for your mercy is sweet.'
      - type: citation
        text: '108:22 Free me, for I am destitute and poor: * and my heart has been disquieted within me.'
      - type: citation
        text: '108:23 I have been taken away like a shadow when it declines: * and I have been shaken off like locusts.'
      - type: citation
        text: '108:24 My knees have been weakened by fasting: * and my flesh has been replaced by oil.'
      - type: citation
        text: '108:25 And I have become a disgrace to them: * they saw me, and they shook their heads.'
      - type: citation
        text: '108:26 Help me, O Lord, my God: * save me according to your mercy.'
      - type: citation
        text: '108:27 And let them know that this is your hand: * and that you, O Lord, have done this.'
      - type: citation
        text: '108:28 They will curse, and you will bless: * may those who rise up against me be confounded; but your servant will rejoice.'
      - type: citation
        text: '108:29 May those who detract me be clothed with shame: * and may they be covered with their confusion, as if with a double cloak.'
      - type: citation
        text: '108:30 I will confess exceedingly to the Lord with my mouth: * and I will praise him in the midst of the multitude.'
      - type: citation
        text: 108:31 For he stands at the right hand of the poor, * in order to save my soul from persecutors.
  psalm.109-1a-dixit-d-minus-d-mino-meo-sede-a-dextris-m-dbad618f7d:
    role: psalm
    content:
      en:
      - type: citation
        text: '109:1a The Lord said to my Lord: * Sit thou at my right hand:'
      - type: citation
        text: 109:1b Until I make thy enemies * thy footstool.
      - type: citation
        text: '109:2 The Lord will send forth the sceptre of thy power out of Sion: * rule thou in the midst of thy enemies.'
      - type: citation
        text: '109:3 With thee is the principality in the day of thy strength: in the brightness of the saints: * from the womb before the day star I begot thee.'
      - type: citation
        text: '109:4 The Lord hath sworn, and he will not repent: * Thou art a priest for ever according to the order of Melchisedech.'
      - type: citation
        text: 109:5 The Lord at thy right hand * hath broken kings in the day of his wrath.
      - type: citation
        text: '109:6 He shall judge among nations, he shall fill ruins: * he shall crush the heads in the land of many.'
      - type: citation
        text: '109:7 He shall drink of the torrent in the way: * therefore shall he lift up the head.'
      la:
      - type: citation
        text: '109:1a Dixit Dóminus Dómino meo: * Sede a dextris meis:'
      - type: citation
        text: 109:1b Donec ponam inimícos tuos, * scabéllum pedum tuórum.
      - type: citation
        text: '109:2 Virgam virtútis tuæ emíttet Dóminus ex Sion: * domináre in médio inimicórum tuórum.'
      - type: citation
        text: '109:3 Tecum princípium in die virtútis tuæ in splendóribus sanctórum: * ex útero ante lucíferum génui te.'
      - type: citation
        text: '109:4 Iurávit Dóminus, et non pœnitébit eum: * Tu es sacérdos in ætérnum secúndum órdinem Melchísedech.'
      - type: citation
        text: 109:5 Dóminus a dextris tuis, * confrégit in die iræ suæ reges.
      - type: citation
        text: '109:6 Iudicábit in natiónibus, implébit ruínas: * conquassábit cápita in terra multórum.'
      - type: citation
        text: '109:7 De torrénte in via bibet: * proptérea exaltábit caput.'
      en2:
      - type: citation
        text: '109:1a The Lord said to my Lord: * ''Sit at my right hand,'''
      - type: citation
        text: 109:1b until I make your enemies * your footstool.'
      - type: citation
        text: '109:2 The Lord will send forth the scepter of your virtue from Zion: * rule in the midst of your enemies.'
      - type: citation
        text: '109:3 It is with you from the beginning, in the day of your virtue, in the splendor of the saints: * from conception, before the light-bearer, I begot you.'
      - type: citation
        text: '109:4 The Lord has sworn, and he will not repent: * ''You are a priest forever, according to the order of Melchizedek.'''
      - type: citation
        text: 109:5 The Lord is at your right hand. * He has broken kings in the day of his wrath.
      - type: citation
        text: '109:6 He will judge between the nations; he will fill up ruination: * he will shatter heads in the land of the many.'
      - type: citation
        text: '109:7 He will drink from the torrent on the way: * because of this, he will exalt the head.'
  psalm.11-2-salvum-me-fac-d-mine-qu-niam-def-cit-sanctu-0ef1094f23:
    role: psalm
    content:
      en:
      - type: citation
        text: '11:2 Save me, O Lord, for there is now no saint: * truths are decayed from among the children of men.'
      - type: citation
        text: '11:3 They have spoken vain things every one to his neighbour: * with deceitful lips, and with a double heart have they spoken.'
      - type: citation
        text: 11:4 May the Lord destroy all deceitful lips, * and the tongue that speaketh proud things.
      - type: citation
        text: '11:5 Who have said: We will magnify our tongue; † our lips are our own; * who is Lord over us?'
      - type: citation
        text: 11:6a By reason of the misery of the needy, and the groans of the poor, * now will I arise, saith the Lord.
      - type: citation
        text: 11:6b I will set him in safety; * I will deal confidently in his regard.
      - type: citation
        text: '11:7 The words of the Lord are pure words: * as silver tried by the fire, purged from the earth, refined seven times.'
      - type: citation
        text: '11:8 Thou, O Lord, wilt preserve us: and keep us * from this generation for ever.'
      - type: citation
        text: '11:9 The wicked walk round about: * according to thy highness, thou hast multiplied the children of men.'
      la:
      - type: citation
        text: '11:2 Salvum me fac, Dómine, quóniam defécit sanctus: * quóniam diminútæ sunt veritátes a fíliis hóminum.'
      - type: citation
        text: '11:3 Vana locúti sunt unusquísque ad próximum suum: * lábia dolósa, in corde et corde locúti sunt.'
      - type: citation
        text: 11:4 Dispérdat Dóminus univérsa lábia dolósa, * et linguam magníloquam.
      - type: citation
        text: '11:5 Qui dixérunt: Linguam nostram magnificábimus, † lábia nostra a nobis sunt, * quis noster Dóminus est?'
      - type: citation
        text: 11:6a Propter misériam ínopum, et gémitum páuperum, * nunc exsúrgam, dicit Dóminus.
      - type: citation
        text: '11:6b Ponam in salutári: * fiduciáliter agam in eo.'
      - type: citation
        text: '11:7 Elóquia Dómini, elóquia casta: * argéntum igne examinátum, probátum terræ purgátum séptuplum.'
      - type: citation
        text: '11:8 Tu, Dómine, servábis nos: et custódies nos * a generatióne hac in ætérnum.'
      - type: citation
        text: '11:9 In circúitu ímpii ámbulant: * secúndum altitúdinem tuam multiplicásti fílios hóminum.'
      en2:
      - type: citation
        text: '11:2 Save me, O Lord, because holiness has passed away: * because truths have been diminished, before the sons of men.'
      - type: citation
        text: '11:3 They have been speaking emptiness, each one to his neighbor: * they have been speaking with deceitful lips and a duplicitous heart.'
      - type: citation
        text: 11:4 May the Lord scatter all deceitful lips, * along with the tongue that speaks malice.
      - type: citation
        text: '11:5 Who have said: We will magnify our tongue; our lips belong to us, * what is the Lord to us?'
      - type: citation
        text: 11:6a Because of the misery of the destitute and the groaning of the poor, * now I will arise, says the Lord.
      - type: citation
        text: '11:6b I will place him in safety: * I will act faithfully toward him.'
      - type: citation
        text: '11:7 The eloquence of the Lord is pure eloquence: * silver tested by fire, purged from the earth, refined seven times.'
      - type: citation
        text: '11:8 You, O Lord, will preserve us: and you will guard us * from this generation into eternity.'
      - type: citation
        text: '11:9 The impious wander aimlessly: * according to your loftiness, you have multiplied the sons of men.'
  psalm.110-1-confit-bor-tibi-d-mine-in-toto-corde-meo-i-dcfafe900f:
    role: psalm
    content:
      en:
      - type: citation
        text: 110:1 I will praise thee, O Lord, with my whole heart; * in the council of the just, and in the congregation.
      - type: citation
        text: '110:2 Great are the works of the Lord: * sought out according to all his wills.'
      - type: citation
        text: '110:3 His work is praise and magnificence: * and his justice continueth for ever and ever.'
      - type: citation
        text: '110:4 He hath made a remembrance of his wonderful works, † being a merciful and gracious Lord: * (5a) he hath given food to them that fear him.'
      - type: citation
        text: '110:5b He will be mindful for ever of his covenant: * (6) he will shew forth to his people the power of his works.'
      - type: citation
        text: '110:7 That he may give them the inheritance of the Gentiles: * the works of his hands are truth and judgment.'
      - type: citation
        text: '110:8 All his commandments are faithful: † confirmed for ever and ever, * made in truth and equity.'
      - type: citation
        text: '110:9a He hath sent redemption to his people: * he hath commanded his covenant for ever.'
      - type: citation
        text: '110:9b (bow head) Holy and terrible is his name: * (10a) the fear of the Lord is the beginning of wisdom.'
      - type: citation
        text: '110:10b A good understanding to all that do it: * his praise continueth for ever and ever.'
      la:
      - type: citation
        text: '110:1 Confitébor tibi, Dómine, in toto corde meo: * in consílio iustórum, et congregatióne.'
      - type: citation
        text: '110:2 Magna ópera Dómini: * exquisíta in omnes voluntátes eius.'
      - type: citation
        text: '110:3 Conféssio et magnificéntia opus eius: * et iustítia eius manet in sǽculum sǽculi.'
      - type: citation
        text: '110:4 Memóriam fecit mirabílium suórum, † miséricors et miserátor Dóminus: * (5a) escam dedit timéntibus se.'
      - type: citation
        text: '110:5b Memor erit in sǽculum testaménti sui: * (6) virtútem óperum suórum annuntiábit pópulo suo:'
      - type: citation
        text: '110:7 Ut det illis hereditátem géntium: * ópera mánuum eius véritas, et iudícium.'
      - type: citation
        text: '110:8 Fidélia ómnia mandáta eius: † confirmáta in sǽculum sǽculi, * facta in veritáte et æquitáte.'
      - type: citation
        text: '110:9a Redemptiónem misit pópulo suo: * mandávit in ætérnum testaméntum suum.'
      - type: citation
        text: '110:9b (fit reverentia) Sanctum, et terríbile nomen eius: * (10a) inítium sapiéntiæ timor Dómini.'
      - type: citation
        text: '110:10b Intelléctus bonus ómnibus faciéntibus eum: * laudátio eius manet in sǽculum sǽculi.'
      en2:
      - type: citation
        text: '110:1 I will confess to you, O Lord, with my whole heart: * in the council of the just and in the congregation.'
      - type: citation
        text: '110:2 Great are the works of the Lord: * exquisite in all his intentions.'
      - type: citation
        text: '110:3 Confession and magnificence are his work: * and his justice remains from age to age.'
      - type: citation
        text: '110:4 He has created a memorial to his wonders; † he is a merciful and compassionate Lord: * he has given food to those who fear him.'
      - type: citation
        text: '110:5b He will be mindful of his covenant in every age: * (6) he will announce the virtue of his works to his people:'
      - type: citation
        text: '110:7 so that he may give them the inheritance of the nations: * the works of his hands are truth and judgment.'
      - type: citation
        text: '110:8 All his commands are faithful: † confirmed from age to age, * created in truth and fairness.'
      - type: citation
        text: '110:9a He has sent redemption upon his people: * he has commanded his covenant for all eternity.'
      - type: citation
        text: '110:9b (a bow is made) Holy and terrible is his name: * (10a) the fear of the Lord is the beginning of wisdom.'
      - type: citation
        text: '110:10b A good understanding is for all who do it: * his praise remains from age to age.'
  psalm.111-1-be-tus-vir-qui-timet-d-minum-in-mand-tis-e-edb1e28388:
    role: psalm
    content:
      en:
      - type: citation
        text: '111:1 Blessed is the man that feareth the Lord: * he shall delight exceedingly in his commandments.'
      - type: citation
        text: '111:2 His seed shall be mighty upon earth: * the generation of the righteous shall be blessed.'
      - type: citation
        text: '111:3 Glory and wealth shall be in his house: * and his justice remaineth for ever and ever.'
      - type: citation
        text: '111:4 To the righteous a light is risen up in darkness: * he is merciful, and compassionate and just.'
      - type: citation
        text: '111:5 Acceptable is the man that sheweth mercy and lendeth: † he shall order his words with judgment: * (6) because he shall not be moved for ever.'
      - type: citation
        text: '111:7a The just shall be in everlasting remembrance: * he shall not fear the evil hearing.'
      - type: citation
        text: '111:7b His heart is ready to hope in the Lord: † (8) his heart is strengthened, * he shall not be moved until he look over his enemies.'
      - type: citation
        text: '111:9 He hath distributed, he hath given to the poor: † his justice remaineth for ever and ever: * his horn shall be exalted in glory.'
      - type: citation
        text: '111:10 The wicked shall see, and shall be angry, † he shall gnash with his teeth and pine away: * the desire of the wicked shall perish.'
      la:
      - type: citation
        text: '111:1 Beátus vir, qui timet Dóminum: * in mandátis eius volet nimis.'
      - type: citation
        text: '111:2 Potens in terra erit semen eius: * generátio rectórum benedicétur.'
      - type: citation
        text: '111:3 Glória, et divítiæ in domo eius: * et iustítia eius manet in sǽculum sǽculi.'
      - type: citation
        text: '111:4 Exórtum est in ténebris lumen rectis: * miséricors, et miserátor, et iustus.'
      - type: citation
        text: '111:5 Iucúndus homo qui miserétur et cómmodat, † dispónet sermónes suos in iudício: * (6) quia in ætérnum non commovébitur.'
      - type: citation
        text: '111:7a In memória ætérna erit iustus: * ab auditióne mala non timébit.'
      - type: citation
        text: '111:7b Parátum cor eius speráre in Dómino, † (8) confirmátum est cor eius: * non commovébitur donec despíciat inimícos suos.'
      - type: citation
        text: '111:9 Dispérsit, dedit paupéribus: † iustítia eius manet in sǽculum sǽculi, * cornu eius exaltábitur in glória.'
      - type: citation
        text: '111:10 Peccátor vidébit, et irascétur, † déntibus suis fremet et tabéscet: * desidérium peccatórum períbit.'
      en2:
      - type: citation
        text: '111:1 Blessed is the man who fears the Lord: * he will prefer his commandments exceedingly.'
      - type: citation
        text: '111:2 His offspring will be powerful on the earth: * the generation of the upright will be blessed.'
      - type: citation
        text: '111:3 Glory and wealth will be in his house: * and his justice shall remain from age to age.'
      - type: citation
        text: '111:4 For the upright, a light has risen up in the darkness: * he is merciful and compassionate and just.'
      - type: citation
        text: '111:5 Pleasing is the man who shows mercy and lends; † he will order his words with judgment: * for he will not be disturbed in eternity.'
      - type: citation
        text: '111:7a The just one will be an everlasting memorial: * he will not fear a report of disasters.'
      - type: citation
        text: '111:7b His heart is prepared to hope in the Lord; † (8) his heart has been confirmed: * he will not be disturbed, until he looks down upon his enemies.'
      - type: citation
        text: '111:9 He has distributed, he has given to the poor: † his justice shall remain from age to age, * his horn shall be exalted in glory.'
      - type: citation
        text: '111:10 The sinner will see and become angry; † he will gnash his teeth and waste away: * the desire of sinners will perish.'
  psalm.112-1-laud-te-p-eri-d-minum-laud-te-nomen-d-mini-488ebd394f:
    role: psalm
    content:
      en:
      - type: citation
        text: '112:1 Praise the Lord, ye children: * praise ye the name of the Lord.'
      - type: citation
        text: 112:2 (bow head) Blessed be the name of the Lord, * from henceforth now and for ever.
      - type: citation
        text: 112:3 From the rising of the sun unto the going down of the same, * the name of the Lord is worthy of praise.
      - type: citation
        text: 112:4 The Lord is high above all nations; * and his glory above the heavens.
      - type: citation
        text: '112:5 Who is as the Lord our God, who dwelleth on high: * (6) and looketh down on the low things in heaven and in earth?'
      - type: citation
        text: '112:7 Raising up the needy from the earth, * and lifting up the poor out of the dunghill:'
      - type: citation
        text: 112:8 That he may place him with princes, * with the princes of his people.
      - type: citation
        text: 112:9 Who maketh a barren woman to dwell in a house, * the joyful mother of children.
      la:
      - type: citation
        text: '112:1 Laudáte, púeri, Dóminum: * laudáte nomen Dómini.'
      - type: citation
        text: 112:2 (fit reverentia) Sit nomen Dómini benedíctum, * ex hoc nunc, et usque in sǽculum.
      - type: citation
        text: 112:3 A solis ortu usque ad occásum, * laudábile nomen Dómini.
      - type: citation
        text: 112:4 Excélsus super omnes gentes Dóminus, * et super cælos glória eius.
      - type: citation
        text: 112:5 Quis sicut Dóminus, Deus noster, qui in altis hábitat, * (6) et humília réspicit in cælo et in terra?
      - type: citation
        text: '112:7 Súscitans a terra ínopem, * et de stércore érigens páuperem:'
      - type: citation
        text: 112:8 Ut cóllocet eum cum princípibus, * cum princípibus pópuli sui.
      - type: citation
        text: 112:9 Qui habitáre facit stérilem in domo, * matrem filiórum lætántem.
      en2:
      - type: citation
        text: '112:1 Praise the Lord, children: * praise the name of the Lord.'
      - type: citation
        text: 112:2 (a bow is made) Blessed is the name of the Lord, * from this time forward and even forever.
      - type: citation
        text: 112:3 From the rising of the sun, even to its setting, * praiseworthy is the name of the Lord.
      - type: citation
        text: 112:4 The Lord is high above all nations, * and his glory is high above the heavens.
      - type: citation
        text: 112:5 Who is like the Lord, our God, who dwells on high, * (6) and who gazes upon the humble things in heaven and on earth?
      - type: citation
        text: 112:7 He lifts up the needy from the ground, * and he urges the poor away from filth,
      - type: citation
        text: 112:8 so that he may place him with the leaders, * with the leaders of his people.
      - type: citation
        text: 112:9 He causes a barren woman to live in a house, * as the joyful mother of sons.
  psalm.113-1-in-xitu-isra-l-de-g-pto-domus-iacob-de-p-p-8864340955:
    role: psalm
    content:
      en:
      - type: citation
        text: '113:1 When Israel went out of Egypt, * the house of Jacob from a barbarous people:'
      - type: citation
        text: 113:2 Judea was made his sanctuary, * Israel his dominion.
      - type: citation
        text: '113:3 The sea saw and fled: * Jordan was turned back.'
      - type: citation
        text: 113:4 The mountains skipped like rams, * and the hills like the lambs of the flock.
      - type: citation
        text: '113:5 What ailed thee, O thou sea, that thou didst flee: * and thou, O Jordan, that thou wast turned back?'
      - type: citation
        text: 113:6 Ye mountains, that ye skipped like rams, * and ye hills, like lambs of the flock?
      - type: citation
        text: '113:7 At the presence of the Lord the earth was moved, * at the presence of the God of Jacob:'
      - type: citation
        text: 113:8 Who turned the rock into pools of water, * and the stony hill into fountains of waters.
      - type: citation
        text: 113:9 Not to us, O Lord, not to us; * but to thy name give glory.
      - type: citation
        text: '113:10 For thy mercy, and for thy truth’s sake: * lest the Gentiles should say: Where is their God?'
      - type: citation
        text: '113:11 But our God is in heaven: * he hath done all things whatsoever he would.'
      - type: citation
        text: 113:12 The idols of the Gentiles are silver and gold, * the works of the hands of men.
      - type: citation
        text: '113:13 They have mouths and speak not: * they have eyes and see not.'
      - type: citation
        text: '113:14 They have ears and hear not: * they have noses and smell not.'
      - type: citation
        text: '113:15 They have hands and feel not: † they have feet and walk not: * neither shall they cry out through their throat.'
      - type: citation
        text: '113:16 Let them that make them become like unto them: * and all such as trust in them.'
      - type: citation
        text: '113:17 The house of Israel hath hoped in the Lord: * he is their helper and their protector.'
      - type: citation
        text: '113:18 The house of Aaron hath hoped in the Lord: * he is their helper and their protector.'
      - type: citation
        text: '113:19 They that fear the Lord have hoped in the Lord: * he is their helper and their protector.'
      - type: citation
        text: 113:20a The Lord hath been mindful of us, * and hath blessed us.
      - type: citation
        text: '113:20b He hath blessed the house of Israel: * he hath blessed the house of Aaron.'
      - type: citation
        text: 113:21 He hath blessed all that fear the Lord, * both little and great.
      - type: citation
        text: '113:22 May the Lord add blessings upon you: * upon you, and upon your children.'
      - type: citation
        text: 113:23 Blessed be you of the Lord, * who made heaven and earth.
      - type: citation
        text: '113:24 The heaven of heaven is the Lord’s: * but the earth he has given to the children of men.'
      - type: citation
        text: '113:25 The dead shall not praise thee, O Lord: * nor any of them that go down to hell.'
      - type: citation
        text: '113:26 But we that live bless the Lord: * from this time now and for ever.'
      la:
      - type: citation
        text: '113:1 In éxitu Israël de Ægýpto, * domus Iacob de pópulo bárbaro:'
      - type: citation
        text: 113:2 Facta est Iudǽa sanctificátio eius, * Israël potéstas eius.
      - type: citation
        text: '113:3 Mare vidit, et fugit: * Iordánis convérsus est retrórsum.'
      - type: citation
        text: 113:4 Montes exsultavérunt ut aríetes, * et colles sicut agni óvium.
      - type: citation
        text: '113:5 Quid est tibi, mare, quod fugísti: * et tu, Iordánis, quia convérsus es retrórsum?'
      - type: citation
        text: 113:6 Montes, exsultástis sicut aríetes, * et colles, sicut agni óvium.
      - type: citation
        text: 113:7 A fácie Dómini mota est terra, * a fácie Dei Iacob.
      - type: citation
        text: 113:8 Qui convértit petram in stagna aquárum, * et rupem in fontes aquárum.
      - type: citation
        text: '113:9 Non nobis, Dómine, non nobis: * sed nómini tuo da glóriam.'
      - type: citation
        text: '113:10 Super misericórdia tua, et veritáte tua: * nequándo dicant gentes: Ubi est Deus eórum?'
      - type: citation
        text: '113:11 Deus autem noster in cælo: * ómnia quæcúmque vóluit, fecit.'
      - type: citation
        text: 113:12 Simulácra géntium argéntum, et aurum, * ópera mánuum hóminum.
      - type: citation
        text: '113:13 Os habent, et non loquéntur: * óculos habent, et non vidébunt.'
      - type: citation
        text: '113:14 Aures habent, et non áudient: * nares habent, et non odorábunt.'
      - type: citation
        text: '113:15 Manus habent, et non palpábunt: † pedes habent, et non ambulábunt: * non clamábunt in gútture suo.'
      - type: citation
        text: '113:16 Símiles illis fiant qui fáciunt ea: * et omnes qui confídunt in eis.'
      - type: citation
        text: '113:17 Domus Israël sperávit in Dómino: * adiútor eórum et protéctor eórum est,'
      - type: citation
        text: '113:18 Domus Aaron sperávit in Dómino: * adiútor eórum et protéctor eórum est,'
      - type: citation
        text: '113:19 Qui timent Dóminum, speravérunt in Dómino: * adiútor eórum et protéctor eórum est.'
      - type: citation
        text: '113:20a Dóminus memor fuit nostri: * et benedíxit nobis:'
      - type: citation
        text: '113:20b Benedíxit dómui Israël: * benedíxit dómui Aaron.'
      - type: citation
        text: 113:21 Benedíxit ómnibus, qui timent Dóminum, * pusíllis cum maióribus.
      - type: citation
        text: '113:22 Adíciat Dóminus super vos: * super vos, et super fílios vestros.'
      - type: citation
        text: 113:23 Benedícti vos a Dómino, * qui fecit cælum, et terram.
      - type: citation
        text: '113:24 Cælum cæli Dómino: * terram autem dedit fíliis hóminum.'
      - type: citation
        text: '113:25 Non mórtui laudábunt te, Dómine: * neque omnes, qui descéndunt in inférnum.'
      - type: citation
        text: 113:26 Sed nos qui vívimus, benedícimus Dómino, * ex hoc nunc et usque in sǽculum.
      en2:
      - type: citation
        text: '113:1 At the departure of Israel from Egypt, * the house of Jacob from a barbarous people:'
      - type: citation
        text: 113:2 Judea was made his sanctuary; * Israel was made his power.
      - type: citation
        text: '113:3 The sea looked, and it fled: * the Jordan was turned back again.'
      - type: citation
        text: 113:4 The mountains exulted like rams, * and the hills like lambs among the sheep.
      - type: citation
        text: '113:5 What happened to you, O sea, so that you fled: * and to you, O Jordan, so that you were turned back again?'
      - type: citation
        text: 113:6 O mountains, you exulted like rams, * and O hills, like lambs among the sheep.
      - type: citation
        text: 113:7 Before the face of the Lord, the earth was moved, * before the face of the God of Jacob.
      - type: citation
        text: 113:8 He converted the rock into pools of water, * and the cliff into fountains of waters.
      - type: citation
        text: '113:9 Not to us, O Lord, not to us: * but to your name give glory.'
      - type: citation
        text: '113:10 Give glory to your mercy and your truth: * lest the Gentiles should say, ''Where is their God?'''
      - type: citation
        text: '113:11 But our God is in heaven: * all things whatsoever that he has willed, he has done.'
      - type: citation
        text: 113:12 The idols of the nations are silver and gold, * the works of the hands of men.
      - type: citation
        text: 113:13 They have mouths, and do not speak; * they have eyes, and do not see.
      - type: citation
        text: 113:14 They have ears, and do not hear; * they have noses, and do not smell.
      - type: citation
        text: '113:15 They have hands, and do not feel; † they have feet, and do not walk: * they will not cry out from their throat.'
      - type: citation
        text: 113:16 Let those who make them become like them, * along with all who trust in them.
      - type: citation
        text: '113:17 The house of Israel has hoped in the Lord: * he is their helper and their protector,'
      - type: citation
        text: '113:18 The house of Aaron has hoped in the Lord: * he is their helper and their protector,'
      - type: citation
        text: '113:19 Those who fear the Lord have hoped in the Lord: * he is their helper and their protector.'
      - type: citation
        text: '113:20a The Lord has been mindful of us: * and he has blessed us:'
      - type: citation
        text: '113:20b He has blessed the house of Israel: * he has blessed the house of Aaron.'
      - type: citation
        text: 113:21 He has blessed all who fear the Lord, * the small along with the great.
      - type: citation
        text: '113:22 May the Lord increase blessings upon you: * upon you, and upon your children.'
      - type: citation
        text: 113:23 Blessed are you by the Lord, * who made heaven and earth.
      - type: citation
        text: '113:24 The heaven of heavens is the Lord''s: * but the earth he has given to the children of men.'
      - type: citation
        text: '113:25 The dead shall not praise you, O Lord: * nor any of those who go down into the nether world.'
      - type: citation
        text: 113:26 But we who live bless the Lord, * from this time forth and for ever.
  psalm.114-1-dil-xi-qu-niam-ex-udiet-d-minus-vocem-orat-0020b24256:
    role: psalm
    content:
      en:
      - type: citation
        text: 114:1 I have loved, because the Lord will hear * the voice of my prayer.
      - type: citation
        text: '114:2 Because he hath inclined his ear unto me: * and in my days I will call upon him.'
      - type: citation
        text: '114:3a The sorrows of death have compassed me: * and the perils of hell have found me.'
      - type: citation
        text: '114:3b I met with trouble and sorrow: * (4a) and I called upon the name of the Lord.'
      - type: citation
        text: 114:4b O Lord, deliver my soul. ‡ (5) The Lord is merciful and just, * and our God sheweth mercy.
      - type: citation
        text: '114:6 The Lord is the keeper of little ones: * I was humbled, and he delivered me.'
      - type: citation
        text: '114:7 Turn, O my soul, into thy rest: * for the Lord hath been bountiful to thee.'
      - type: citation
        text: '114:8 For he hath delivered my soul from death: ‡ my eyes from tears, * my feet from falling.'
      - type: citation
        text: 114:9 I will please the Lord * in the land of the living.
      la:
      - type: citation
        text: 114:1 Diléxi, quóniam exáudiet Dóminus * vocem oratiónis meæ.
      - type: citation
        text: '114:2 Quia inclinávit aurem suam mihi: * et in diébus meis invocábo.'
      - type: citation
        text: '114:3a Circumdedérunt me dolóres mortis: * et perícula inférni invenérunt me.'
      - type: citation
        text: '114:3b Tribulatiónem et dolórem invéni: * (4a) et nomen Dómini invocávi.'
      - type: citation
        text: '114:4b O Dómine, líbera ánimam meam: ‡ (5) miséricors Dóminus, et iustus, * et Deus noster miserétur.'
      - type: citation
        text: '114:6 Custódiens párvulos Dóminus: * humiliátus sum, et liberávit me.'
      - type: citation
        text: '114:7 Convértere, ánima mea, in réquiem tuam: * quia Dóminus benefécit tibi.'
      - type: citation
        text: '114:8 Quia erípuit ánimam meam de morte: ‡ óculos meos a lácrimis, * pedes meos a lapsu.'
      - type: citation
        text: 114:9 Placébo Dómino * in regióne vivórum.
      en2:
      - type: citation
        text: 114:1 I love the Lord, because he will hear * the voice of my prayer.
      - type: citation
        text: '114:2 Because he has inclined his ear to me: * and in my days I will call upon him.'
      - type: citation
        text: '114:3a The sorrows of death surrounded me: * and the perils of the nether world found me.'
      - type: citation
        text: '114:3b Tribulation and anguish I found: * (4a) and I called upon the name of the Lord.'
      - type: citation
        text: '114:4b O Lord, deliver my soul: ‡ (5) the Lord is merciful and just, * and our God shows mercy.'
      - type: citation
        text: '114:6 The Lord is the keeper of little ones: * I was humbled, and he delivered me.'
      - type: citation
        text: '114:7 Return, O my soul, to your rest: * for the Lord has dealt bountifully with you.'
      - type: citation
        text: '114:8 For he has delivered my soul from death: ‡ my eyes from tears, * my feet from stumbling.'
      - type: citation
        text: 114:9 I will please the Lord * in the land of the living.
  psalm.115-1-cr-didi-propter-quod-loc-tus-sum-ego-autem-b9862cb4a8:
    role: psalm
    content:
      en:
      - type: citation
        text: 115:1 I have believed, therefore have I spoken; * but I have been humbled exceedingly.
      - type: citation
        text: '115:2 I said in my excess: * Every man is a liar.'
      - type: citation
        text: 115:3 What shall I render to the Lord, * for all the things that he hath rendered to me?
      - type: citation
        text: 115:4 I will take the chalice of salvation; * and I will call upon the name of the Lord.
      - type: citation
        text: '115:5 I will pay my vows to the Lord before all his people: * (6) precious in the sight of the Lord is the death of his saints.'
      - type: citation
        text: '115:7a O Lord, for I am thy servant: * I am thy servant, and the son of thy handmaid.'
      - type: citation
        text: '115:7b Thou hast broken my bonds: ‡ (8) I will sacrifice to thee the sacrifice of praise, * and I will call upon the name of the Lord.'
      - type: citation
        text: '115:9 I will pay my vows to the Lord in the sight of all his people: * (10) in the courts of the house of the Lord, in the midst of thee, O Jerusalem.'
      la:
      - type: citation
        text: '115:1 Crédidi, propter quod locútus sum: * ego autem humiliátus sum nimis.'
      - type: citation
        text: '115:2 Ego dixi in excéssu meo: * Omnis homo mendax.'
      - type: citation
        text: 115:3 Quid retríbuam Dómino, * pro ómnibus, quæ retríbuit mihi?
      - type: citation
        text: '115:4 Cálicem salutáris accípiam: * et nomen Dómini invocábo.'
      - type: citation
        text: '115:5 Vota mea Dómino reddam coram omni pópulo eius: * (6) pretiósa in conspéctu Dómini mors sanctórum eius:'
      - type: citation
        text: '115:7a O Dómine, quia ego servus tuus: * ego servus tuus, et fílius ancíllæ tuæ.'
      - type: citation
        text: '115:7b Dirupísti víncula mea: ‡ (8) tibi sacrificábo hóstiam laudis, * et nomen Dómini invocábo.'
      - type: citation
        text: '115:9 Vota mea Dómino reddam in conspéctu omnis pópuli eius: * (10) in átriis domus Dómini, in médio tui, Ierúsalem.'
      en2:
      - type: citation
        text: '115:1 I believed, therefore have I spoken: * but I was greatly humbled.'
      - type: citation
        text: '115:2 I said in my excess: * Every man is a liar.'
      - type: citation
        text: 115:3 What shall I render to the Lord, * for all the things he has rendered to me?
      - type: citation
        text: '115:4 I will take the chalice of salvation: * and I will call upon the name of the Lord.'
      - type: citation
        text: '115:5 I will pay my vows to the Lord before all his people: * (6) precious in the sight of the Lord is the death of his saints:'
      - type: citation
        text: '115:7a O Lord, for I am your servant: * I am your servant, and the son of your handmaid.'
      - type: citation
        text: '115:7b You have broken my bonds: ‡ (8) to you I will offer a sacrifice of praise, * and I will call upon the name of the Lord.'
      - type: citation
        text: '115:9 I will pay my vows to the Lord in the sight of all his people: * (10) in the courts of the house of the Lord, in the midst of you, O Jerusalem.'
  psalm.116-1-laud-te-d-minum-omnes-gentes-laud-te-eum-o-4793be2c32:
    role: psalm
    content:
      en:
      - type: citation
        text: '116:1 Praise the Lord, all ye nations: * praise him, all ye people.'
      - type: citation
        text: '116:2 For his mercy is confirmed upon us: * and the truth of the Lord remaineth for ever.'
      la:
      - type: citation
        text: '116:1 Laudáte Dóminum, omnes gentes: * laudáte eum, omnes pópuli:'
      - type: citation
        text: '116:2 Quóniam confirmáta est super nos misericórdia eius: * et véritas Dómini manet in ætérnum.'
      en2:
      - type: citation
        text: '116:1 Praise the Lord, all you nations: * praise him, all you peoples:'
      - type: citation
        text: '116:2 For his mercy has been confirmed upon us: * and the truth of the Lord endures for ever.'
  psalm.117-1-confit-mini-d-mino-qu-niam-bonus-qu-niam-i-889a41d3e5:
    role: psalm
    content:
      en:
      - type: citation
        text: '117:1 Give praise to the Lord, for he is good: * for his mercy endureth for ever.'
      - type: citation
        text: '117:2 Let Israel now say, that he is good: * that his mercy endureth for ever.'
      - type: citation
        text: 117:3 Let the house of Aaron now say, * that his mercy endureth for ever.
      - type: citation
        text: 117:4 Let them that fear the Lord now say, * that his mercy endureth for ever.
      - type: citation
        text: '117:5 In my trouble I called upon the Lord: * and the Lord heard me, and enlarged me.'
      - type: citation
        text: '117:6 The Lord is my helper: * I will not fear what man can do unto me.'
      - type: citation
        text: '117:7 The Lord is my helper: * and I will look over my enemies.'
      - type: citation
        text: 117:8 It is good to confide in the Lord, * rather than to have confidence in man.
      - type: citation
        text: 117:9 It is good to trust in the Lord, * rather than to trust in princes.
      - type: citation
        text: 117:10 All nations compassed me about; * and in the name of the Lord I have been revenged on them.
      - type: citation
        text: '117:11 Surrounding me they compassed me about: * and in the name of the Lord I have been revenged on them.'
      - type: citation
        text: '117:12 They surrounded me like bees, † and they burned like fire among thorns: * and in the name of the Lord I was revenged on them.'
      - type: citation
        text: '117:13 Being pushed I was overturned that I might fall: * but the Lord supported me.'
      - type: citation
        text: '117:14 The Lord is my strength and my praise: * and he is become my salvation.'
      - type: citation
        text: 117:15 The voice of rejoicing and of salvation * is in the tabernacles of the just.
      - type: citation
        text: '117:16 The right hand of the Lord hath wrought strength: † the right hand of the Lord hath exalted me: * the right hand of the Lord hath wrought strength.'
      - type: citation
        text: '117:17 I shall not die, but live: * and shall declare the works of the Lord.'
      - type: citation
        text: '117:18 The Lord chastising hath chastised me: * but he hath not delivered me over to death.'
      - type: citation
        text: '117:19 Open ye to me the gates of justice: † I will go in to them, and give praise to the Lord. * (20) This is the gate of the Lord, the just shall enter into it.'
      - type: citation
        text: '117:21 I will give glory to thee because thou hast heard me: * and art become my salvation.'
      - type: citation
        text: 117:22 The stone which the builders rejected; * the same is become the head of the corner.
      - type: citation
        text: '117:23 This is the Lord’s doing: * and it is wonderful in our eyes.'
      - type: citation
        text: '117:24 This is the day which the Lord hath made: * let us be glad and rejoice therein.'
      - type: citation
        text: '117:25 O Lord, save me: † O Lord, give good success: * (26a) Blessed be he that cometh in the name of the Lord.'
      - type: citation
        text: '117:26b We have blessed you out of the house of the Lord: * (27a) The Lord is God, and he hath shone upon us.'
      - type: citation
        text: 117:27b Appoint a solemn day, with shady boughs, * even to the horn of the altar.
      - type: citation
        text: '117:28a Thou art my God, and I will praise thee: * thou art my God, and I will exalt thee.'
      - type: citation
        text: 117:28b I will praise thee, because thou hast heard me, * and art become my salvation.
      - type: citation
        text: '117:29 O praise ye the Lord, for he is good: * for his mercy endureth for ever.'
      la:
      - type: citation
        text: '117:1 Confitémini Dómino quóniam bonus: * quóniam in sǽculum misericórdia eius.'
      - type: citation
        text: '117:2 Dicat nunc Israël quóniam bonus: * quóniam in sǽculum misericórdia eius.'
      - type: citation
        text: '117:3 Dicat nunc domus Aaron: * quóniam in sǽculum misericórdia eius.'
      - type: citation
        text: '117:4 Dicant nunc qui timent Dóminum: * quóniam in sǽculum misericórdia eius.'
      - type: citation
        text: '117:5 De tribulatióne invocávi Dóminum: * et exaudívit me in latitúdine Dóminus.'
      - type: citation
        text: '117:6 Dóminus mihi adiútor: * non timébo quid fáciat mihi homo.'
      - type: citation
        text: '117:7 Dóminus mihi adiútor: * et ego despíciam inimícos meos.'
      - type: citation
        text: '117:8 Bonum est confídere in Dómino, * quam confídere in hómine:'
      - type: citation
        text: 117:9 Bonum est speráre in Dómino, * quam speráre in princípibus.
      - type: citation
        text: '117:10 Omnes gentes circuiérunt me: * et in nómine Dómini quia ultus sum in eos.'
      - type: citation
        text: '117:11 Circumdántes circumdedérunt me: * et in nómine Dómini quia ultus sum in eos.'
      - type: citation
        text: '117:12 Circumdedérunt me sicut apes, † et exarsérunt sicut ignis in spinis: * et in nómine Dómini quia ultus sum in eos.'
      - type: citation
        text: '117:13 Impúlsus evérsus sum ut cáderem: * et Dóminus suscépit me.'
      - type: citation
        text: '117:14 Fortitúdo mea, et laus mea Dóminus: * et factus est mihi in salútem.'
      - type: citation
        text: 117:15 Vox exsultatiónis, et salútis * in tabernáculis iustórum.
      - type: citation
        text: '117:16 Déxtera Dómini fecit virtútem: † déxtera Dómini exaltávit me, * déxtera Dómini fecit virtútem.'
      - type: citation
        text: '117:17 Non móriar, sed vivam: * et narrábo ópera Dómini.'
      - type: citation
        text: '117:18 Castígans castigávit me Dóminus: * et morti non trádidit me.'
      - type: citation
        text: '117:19 Aperíte mihi portas iustítiæ, † ingréssus in eas confitébor Dómino: * (20) hæc porta Dómini, iusti intrábunt in eam.'
      - type: citation
        text: '117:21 Confitébor tibi quóniam exaudísti me: * et factus es mihi in salútem.'
      - type: citation
        text: '117:22 Lápidem, quem reprobavérunt ædificántes: * hic factus est in caput ánguli.'
      - type: citation
        text: '117:23 A Dómino factum est istud: * et est mirábile in óculis nostris.'
      - type: citation
        text: '117:24 Hæc est dies, quam fecit Dóminus: * exsultémus, et lætémur in ea.'
      - type: citation
        text: '117:25 O Dómine, salvum me fac, † o Dómine, bene prosperáre: * (26a) benedíctus qui venit in nómine Dómini.'
      - type: citation
        text: '117:26b Benedíximus vobis de domo Dómini: * (27a) Deus Dóminus, et illúxit nobis.'
      - type: citation
        text: 117:27b Constitúite diem solémnem in condénsis, * usque ad cornu altáris.
      - type: citation
        text: '117:28a Deus meus es tu, et confitébor tibi: * Deus meus es tu, et exaltábo te.'
      - type: citation
        text: 117:28b Confitébor tibi quóniam exaudísti me * et factus es mihi in salútem.
      - type: citation
        text: '117:29 Confitémini Dómino quóniam bonus: * quóniam in sǽculum misericórdia eius.'
      en2:
      - type: citation
        text: '117:1 Give praise to the Lord, for he is good: * for his mercy endures for ever.'
      - type: citation
        text: '117:2 Let Israel now say that he is good: * for his mercy endures for ever.'
      - type: citation
        text: '117:3 Let the house of Aaron now say: * for his mercy endures for ever.'
      - type: citation
        text: '117:4 Let those who fear the Lord now say: * for his mercy endures for ever.'
      - type: citation
        text: '117:5 In my tribulation I called upon the Lord: * and the Lord heard me with an open space.'
      - type: citation
        text: '117:6 The Lord is my helper: * I will not fear what man can do to me.'
      - type: citation
        text: '117:7 The Lord is my helper: * and I shall look down upon my enemies.'
      - type: citation
        text: '117:8 It is better to trust in the Lord, * than to trust in man:'
      - type: citation
        text: 117:9 It is better to hope in the Lord, * than to hope in princes.
      - type: citation
        text: '117:10 All nations surrounded me: * and in the name of the Lord I have been avenged on them.'
      - type: citation
        text: '117:11 Surrounding they surrounded me: * and in the name of the Lord I have been avenged on them.'
      - type: citation
        text: '117:12 They surrounded me like bees, † and they burned like fire among thorns: * and in the name of the Lord I have been avenged on them.'
      - type: citation
        text: '117:13 I was pushed hard and was falling: * but the Lord upheld me.'
      - type: citation
        text: '117:14 The Lord is my strength and my praise: * and he has become my salvation.'
      - type: citation
        text: 117:15 The voice of rejoicing and salvation * is in the tents of the just.
      - type: citation
        text: '117:16 The right hand of the Lord has wrought power: † the right hand of the Lord has exalted me, * the right hand of the Lord has wrought power.'
      - type: citation
        text: '117:17 I shall not die, but live: * and I will declare the works of the Lord.'
      - type: citation
        text: '117:18 The Lord has chastised me sorely: * but he has not delivered me over to death.'
      - type: citation
        text: '117:19 Open to me the gates of justice, † I will enter into them and give praise to the Lord: * (20) this is the gate of the Lord, the just shall enter into it.'
      - type: citation
        text: '117:21 I will give praise to you because you have heard me: * and you have become my salvation.'
      - type: citation
        text: '117:22 The stone which the builders rejected: * this has become the head of the corner.'
      - type: citation
        text: '117:23 This has been done by the Lord: * and it is wonderful in our eyes.'
      - type: citation
        text: '117:24 This is the day which the Lord has made: * let us rejoice and be glad in it.'
      - type: citation
        text: '117:25 O Lord, save me, † O Lord, give good success: * (26a) blessed is he who comes in the name of the Lord.'
      - type: citation
        text: '117:26b We have blessed you from the house of the Lord: * (27a) God is the Lord, and he has given us light.'
      - type: citation
        text: 117:27b Appoint a solemn feast on the appointed day, * even to the horn of the altar.
      - type: citation
        text: '117:28a You are my God, and I will praise you: * you are my God, and I will exalt you.'
      - type: citation
        text: 117:28b I will praise you because you have heard me * and you have become my salvation.
      - type: citation
        text: '117:29 Give praise to the Lord, for he is good: * for his mercy endures for ever.'
  psalm.118-1-aleph-be-ti-immacul-ti-in-via-qui-mbulant-3cf26ea6b0:
    role: psalm
    content:
      en:
      - type: citation
        text: 118:1 (Aleph) Blessed are the undefiled in the way, * who walk in the law of the Lord.
      - type: citation
        text: '118:2 Blessed are they that search his testimonies: * that seek him with their whole heart.'
      - type: citation
        text: 118:3 For they that work iniquity, * have not walked in his ways.
      - type: citation
        text: 118:4 Thou hast commanded * thy commandments to be kept most diligently.
      - type: citation
        text: 118:5 O! that my ways may be directed * to keep thy justifications.
      - type: citation
        text: 118:6 Then shall I not be confounded, * when I shall look into all thy commandments.
      - type: citation
        text: 118:7 I will praise thee with uprightness of heart, * when I shall have learned the judgments of thy justice.
      - type: citation
        text: '118:8 I will keep thy justifications: * O! do not thou utterly forsake me.'
      - type: citation
        text: 118:9 (Béth) By what doth a young man correct his way? * By observing thy words.
      - type: citation
        text: '118:10 With my whole heart have I sought after thee: * let me not stray from thy commandments.'
      - type: citation
        text: 118:11 Thy words have I hidden in my heart, * that I may not sin against thee.
      - type: citation
        text: '118:12 Blessed art thou, O Lord: * teach me thy justifications.'
      - type: citation
        text: 118:13 With my lips * I have pronounced all the judgments of thy mouth.
      - type: citation
        text: 118:14 I have been delighted in the way of thy testimonies, * as in all riches.
      - type: citation
        text: '118:15 I will meditate on thy commandments: * and I will consider thy ways.'
      - type: citation
        text: '118:16 I will think of thy justifications: * I will not forget thy words.'
      - type: citation
        text: 118:17 (Ghimel) Give bountifully to thy servant, enliven me * and I shall keep thy words.
      - type: citation
        text: '118:18 Open thou my eyes: * and I will consider the wondrous things of thy law.'
      - type: citation
        text: '118:19 I am a sojourner on the earth: * hide not thy commandments from me.'
      - type: citation
        text: 118:20 My soul hath coveted to long for thy justifications, * at all times.
      - type: citation
        text: '118:21 Thou hast rebuked the proud: * they are cursed who decline from thy commandments.'
      - type: citation
        text: '118:22 Remove from me reproach and contempt: * because I have sought after thy testimonies.'
      - type: citation
        text: '118:23 For princes sat, and spoke against me: * but thy servant was employed in thy justifications.'
      - type: citation
        text: '118:24 For thy testimonies are my meditation: * and thy justifications my counsel.'
      - type: citation
        text: '118:25 (Daleth) My soul hath cleaved to the pavement: * quicken thou me according to thy word.'
      - type: citation
        text: '118:26 I have declared my ways, and thou hast heard me: * teach me thy justifications.'
      - type: citation
        text: '118:27 Make me to understand the way of thy justifications: * and I shall be exercised in thy wondrous works.'
      - type: citation
        text: '118:28 My soul hath slumbered through heaviness: * strengthen thou me in thy words.'
      - type: citation
        text: '118:29 Remove from me the way of iniquity: * and out of thy law have mercy on me.'
      - type: citation
        text: '118:30 I have chosen the way of truth: * thy judgments I have not forgotten.'
      - type: citation
        text: '118:31 I have stuck to thy testimonies, O Lord: * put me not to shame.'
      - type: citation
        text: 118:32 I have run the way of thy commandments, * when thou didst enlarge my heart.
      - type: citation
        text: '118:33 (He) Set before me for a law the way of thy justifications, O Lord: * and I will always seek after it.'
      - type: citation
        text: 118:34 Give me understanding, and I will search thy law; * and I will keep it with my whole heart.
      - type: citation
        text: 118:35 Lead me into the path of thy commandments; * for this same I have desired.
      - type: citation
        text: 118:36 Incline my heart into thy testimonies * and not to covetousness.
      - type: citation
        text: '118:37 Turn away my eyes that they may not behold vanity: * quicken me in thy way.'
      - type: citation
        text: 118:38 Establish thy word to thy servant, * in thy fear.
      - type: citation
        text: '118:39 Turn away my reproach, which I have apprehended: * for thy judgments are delightful.'
      - type: citation
        text: '118:40 Behold I have longed after thy precepts: * quicken me in thy justice.'
      - type: citation
        text: '118:41 (Vau) Let thy mercy also come upon me, O Lord: * thy salvation according to thy word.'
      - type: citation
        text: 118:42 So shall I answer them that reproach me in any thing; * that I have trusted in thy words.
      - type: citation
        text: '118:43 And take not thou the word of truth utterly out of my mouth: * for in thy words, I have hoped exceedingly.'
      - type: citation
        text: 118:44 So shall I always keep thy law, * for ever and ever.
      - type: citation
        text: '118:45 And I walked at large: * because I have sought after thy commandments.'
      - type: citation
        text: '118:46 And I spoke of thy testimonies before kings: * and I was not ashamed.'
      - type: citation
        text: 118:47 I meditated also on thy commandments, * which I loved.
      - type: citation
        text: '118:48 And I lifted up my hands to thy commandments, which I loved: * and I was exercised in thy justifications.'
      - type: citation
        text: 118:49 (Zai) Be thou mindful of thy word to thy servant, * in which thou hast given me hope.
      - type: citation
        text: '118:50 This hath comforted me in my humiliation: * because thy word hath enlivened me.'
      - type: citation
        text: '118:51 The proud did iniquitously altogether: * but I declined not from thy law.'
      - type: citation
        text: '118:52 I remembered, O Lord, thy judgments of old: * and I was comforted.'
      - type: citation
        text: 118:53 A fainting hath taken hold of me, * because of the wicked that forsake thy law.
      - type: citation
        text: 118:54 Thy justifications were the subject of my song, * in the place of my pilgrimage.
      - type: citation
        text: '118:55 In the night I have remembered thy name, O Lord: * and have kept thy law.'
      - type: citation
        text: '118:56 This happened to me: * because I sought after thy justifications.'
      - type: citation
        text: 118:57 (Heth) O Lord, my portion, * I have said, I would keep thy law.
      - type: citation
        text: '118:58 I entreated thy face with all my heart: * have mercy on me according to thy word.'
      - type: citation
        text: '118:59 I have thought on my ways: * and turned my feet unto thy testimonies.'
      - type: citation
        text: '118:60 I am ready, and am not troubled: * that I may keep thy commandments.'
      - type: citation
        text: '118:61 The cords of the wicked have encompassed me: * but I have not forgotten thy law.'
      - type: citation
        text: 118:62 I rose at midnight to give praise to thee; * for the judgments of thy justification.
      - type: citation
        text: 118:63 I am a partaker with all them that fear thee, * and that keep thy commandments.
      - type: citation
        text: '118:64 The earth, O Lord, is full of thy mercy: * teach me thy justifications.'
      - type: citation
        text: 118:65 (Teth) Thou hast done well with thy servant, O Lord, * according to thy word.
      - type: citation
        text: 118:66 Teach me goodness and discipline and knowledge; * for I have believed thy commandments.
      - type: citation
        text: 118:67 Before I was humbled I offended; * therefore have I kept thy word.
      - type: citation
        text: 118:68 Thou art good; * and in thy goodness teach me thy justifications.
      - type: citation
        text: '118:69 The iniquity of the proud hath been multiplied over me: * but I will seek thy commandments with my whole heart.'
      - type: citation
        text: '118:70 Their heart is curdled like milk: * but I have meditated on thy law.'
      - type: citation
        text: 118:71 It is good for me that thou hast humbled me, * that I may learn thy justifications.
      - type: citation
        text: 118:72 The law of thy mouth is good to me, * above thousands of gold and silver.
      - type: citation
        text: '118:73 (Jod) Thy hands have made me and formed me: * give me understanding, and I will learn thy commandments.'
      - type: citation
        text: '118:74 They that fear thee shall see me, and shall be glad: * because I have greatly hoped in thy words.'
      - type: citation
        text: '118:75 I know, O Lord, that thy judgments are equity: * and in thy truth thou hast humbled me.'
      - type: citation
        text: 118:76 O! let thy mercy be for my comfort, * according to thy word unto thy servant.
      - type: citation
        text: '118:77 Let thy tender mercies come unto me, and I shall live: * for thy law is my meditation.'
      - type: citation
        text: '118:78 Let the proud be ashamed, because they have done unjustly towards me: * but I will be employed in thy commandments.'
      - type: citation
        text: '118:79 Let them that fear thee turn to me: * and they that know thy testimonies.'
      - type: citation
        text: 118:80 Let my heart be undefiled in thy justifications, * that I may not be confounded.
      - type: citation
        text: '118:81 (Caph) My soul hath fainted after thy salvation: * and in thy word I have very much hoped.'
      - type: citation
        text: '118:82 My eyes have failed for thy word, * saying: When wilt thou comfort me?'
      - type: citation
        text: '118:83 For I am become like a bottle in the frost: * I have not forgotten thy justifications.'
      - type: citation
        text: '118:84 How many are the days of thy servant: * when wilt thou execute judgment on them that persecute me?'
      - type: citation
        text: '118:85 The wicked have told me fables: * but not as thy law.'
      - type: citation
        text: '118:86 All thy statutes are truth: * they have persecuted me unjustly, do thou help me.'
      - type: citation
        text: '118:87 They had almost made an end of me upon earth: * but I have not forsaken thy commandments.'
      - type: citation
        text: '118:88 Quicken thou me according to thy mercy: * and I shall keep the testimonies of thy mouth.'
      - type: citation
        text: 118:89 (Lamed) For ever, O Lord, * thy word standeth firm in heaven.
      - type: citation
        text: '118:90 Thy truth unto all generations: * thou hast founded the earth, and it continueth.'
      - type: citation
        text: '118:91 By thy ordinance the day goeth on: * for all things serve thee.'
      - type: citation
        text: 118:92 Unless thy law had been my meditation, * I had then perhaps perished in my abjection.
      - type: citation
        text: '118:93 Thy justifications I will never forget: * for by them thou hast given me life.'
      - type: citation
        text: '118:94 I am thine, save thou me: * for I have sought thy justifications.'
      - type: citation
        text: '118:95 The wicked have waited for me to destroy me: * but I have understood thy testimonies.'
      - type: citation
        text: '118:96 I have seen an end of all perfection: * thy commandment is exceeding broad.'
      - type: citation
        text: 118:97 (Mem) How have I loved thy law, O Lord! * it is my meditation all the day.
      - type: citation
        text: '118:98 Through thy commandment, thou hast made me wiser than my enemies: * for it is ever with me.'
      - type: citation
        text: '118:99 I have understood more than all my teachers: * because thy testimonies are my meditation.'
      - type: citation
        text: '118:100 I have had understanding above ancients: * because I have sought thy commandments.'
      - type: citation
        text: '118:101 I have restrained my feet from every evil way: * that I may keep thy words.'
      - type: citation
        text: 118:102 I have not declined from thy judgments, * because thou hast set me a law.
      - type: citation
        text: 118:103 How sweet are thy words to my palate! * more than honey to my mouth.
      - type: citation
        text: '118:104 By thy commandments I have had understanding: * therefore have I hated every way of iniquity.'
      - type: citation
        text: 118:105 (Nun) Thy word is a lamp to my feet, * and a light to my paths.
      - type: citation
        text: 118:106 I have sworn and am determined * to keep the judgments of thy justice.
      - type: citation
        text: '118:107 I have been humbled, O Lord, exceedingly: * quicken thou me according to thy word.'
      - type: citation
        text: '118:108 The free offerings of my mouth make acceptable, O Lord: * and teach me thy judgments.'
      - type: citation
        text: '118:109 My soul is continually in my hands: * and I have not forgotten thy law.'
      - type: citation
        text: '118:110 Sinners have laid a snare for me: * but I have not erred from thy precepts.'
      - type: citation
        text: '118:111 I have purchased thy testimonies for an inheritance for ever: * because they are the joy of my heart.'
      - type: citation
        text: 118:112 I have inclined my heart to do thy justifications for ever, * for the reward.
      - type: citation
        text: '118:113 (Samech) I have hated the unjust: * and I have loved thy law.'
      - type: citation
        text: '118:114 Thou art my helper and my protector: * and in thy word I have greatly hoped.'
      - type: citation
        text: '118:115 Depart from me, ye malignant: * and I will search the commandments of my God.'
      - type: citation
        text: '118:116 Uphold me according to thy word, and I shall live: * and let me not be confounded in my expectation.'
      - type: citation
        text: '118:117 Help me, and I shall be saved: * and I will meditate always on thy justifications.'
      - type: citation
        text: 118:118 Thou hast despised all them that fall off from thy judgments; * for their thought is unjust.
      - type: citation
        text: '118:119 I have accounted all the sinners of the earth prevaricators: * therefore have I loved thy testimonies.'
      - type: citation
        text: '118:120 Pierce thou my flesh with thy fear: * for I am afraid of thy judgments.'
      - type: citation
        text: '118:121 (Ain) I have done judgment and justice: * give me not up to them that slander me.'
      - type: citation
        text: '118:122 Uphold thy servant unto good: * let not the proud calumniate me.'
      - type: citation
        text: '118:123 My eyes have fainted after thy salvation: * and for the word of thy justice.'
      - type: citation
        text: '118:124 Deal with thy servant according to thy mercy: * and teach me thy justifications.'
      - type: citation
        text: '118:125 I am thy servant: * give me understanding that I may know thy testimonies.'
      - type: citation
        text: '118:126 It is time, O Lord, to do: * they have dissipated thy law.'
      - type: citation
        text: 118:127 Therefore have I loved thy commandments * above gold and the topaz.
      - type: citation
        text: '118:128 Therefore was I directed to all thy commandments: * I have hated all wicked ways.'
      - type: citation
        text: '118:129 (Phe) Thy testimonies are wonderful: * therefore my soul hath sought them.'
      - type: citation
        text: '118:130 The declaration of thy words giveth light: * and giveth understanding to little ones.'
      - type: citation
        text: '118:131 I opened my mouth, and panted: * because I longed for thy commandments.'
      - type: citation
        text: 118:132 Look thou upon me, and have mercy on me, * according to the judgment of them that love thy name.
      - type: citation
        text: '118:133 Direct my steps according to thy word: * and let no iniquity have dominion over me.'
      - type: citation
        text: '118:134 Redeem me from the calumnies of men: * that I may keep thy commandments.'
      - type: citation
        text: '118:135 Make thy face to shine upon thy servant: * and teach me thy justifications.'
      - type: citation
        text: '118:136 My eyes have sent forth springs of water: * because they have not kept thy law.'
      - type: citation
        text: '118:137 (Sade) Thou art just, O Lord: * and thy judgment is right.'
      - type: citation
        text: '118:138 Thou hast commanded justice thy testimonies: * and thy truth exceedingly.'
      - type: citation
        text: '118:139 My zeal hath made me pine away: * because my enemies forgot thy words.'
      - type: citation
        text: '118:140 Thy word is exceedingly refined: * and thy servant hath loved it.'
      - type: citation
        text: 118:141 I am very young and despised; but * I forget not thy justifications.
      - type: citation
        text: '118:142 Thy justice is justice for ever: * and thy law is the truth.'
      - type: citation
        text: '118:143 Trouble and anguish have found me: * thy commandments are my meditation.'
      - type: citation
        text: '118:144 Thy testimonies are justice for ever: * give me understanding, and I shall live.'
      - type: citation
        text: '118:145 (Coph) I cried with my whole heart, hear me, O Lord: * I will seek thy justifications.'
      - type: citation
        text: '118:146 I cried unto thee, save me: * that I may keep thy commandments.'
      - type: citation
        text: '118:147 I prevented the dawning of the day, and cried: * because in thy words I very much hoped.'
      - type: citation
        text: '118:148 My eyes to thee have prevented the morning: * that I might meditate on thy words.'
      - type: citation
        text: '118:149 Hear thou my voice, O Lord, according to thy mercy: * and quicken me according to thy judgment.'
      - type: citation
        text: 118:150 They that persecute me have drawn nigh to iniquity; * but they are gone far off from thy law.
      - type: citation
        text: '118:151 Thou art near, O Lord: * and all thy ways are truth.'
      - type: citation
        text: '118:152 I have known from the beginning concerning thy testimonies: * that thou hast founded them for ever.'
      - type: citation
        text: '118:153 (Res) See my humiliation and deliver me: * for I have not forgotten thy law.'
      - type: citation
        text: '118:154 Judge my judgment and redeem me: * quicken thou me for thy word’s sake.'
      - type: citation
        text: 118:155 Salvation is far from sinners; * because they have not sought thy justifications.
      - type: citation
        text: '118:156 Many, O Lord, are thy mercies: * quicken me according to thy judgment.'
      - type: citation
        text: 118:157 Many are they that persecute me, and afflict me; * but I have not declined from thy testimonies.
      - type: citation
        text: 118:158 I beheld the transgressors, and I pined away; * because they kept not thy word.
      - type: citation
        text: 118:159 Behold I have loved thy commandments, O Lord; * quicken me thou in thy mercy.
      - type: citation
        text: '118:160 The beginning of thy words is truth: * all the judgments of thy justice are for ever.'
      - type: citation
        text: '118:161 (Sin) Princes have persecuted me without cause: * and my heart hath been in awe of thy words.'
      - type: citation
        text: 118:162 I will rejoice at thy words, * as one that hath found great spoil.
      - type: citation
        text: 118:163 I have hated and abhorred iniquity; * but I have loved thy law.
      - type: citation
        text: 118:164 Seven times a day I have given praise to thee, * for the judgments of thy justice.
      - type: citation
        text: 118:165 Much peace have they that love thy law, * and to them there is no stumbling-block.
      - type: citation
        text: '118:166 I looked for thy salvation, O Lord: * and I loved thy commandments.'
      - type: citation
        text: '118:167 My soul hath kept thy testimonies: * and hath loved them exceedingly.'
      - type: citation
        text: '118:168 I have kept thy commandments and thy testimonies: * because all my ways are in thy sight.'
      - type: citation
        text: '118:169 (Tau) Let my supplication, O Lord, come near in thy sight: * give me understanding according to thy word.'
      - type: citation
        text: 118:170 Let my request come in before thee; * deliver thou me according to thy word.
      - type: citation
        text: 118:171 My lips shall utter a hymn, * when thou shalt teach me thy justifications.
      - type: citation
        text: '118:172 My tongue shall pronounce thy word: * because all thy commandments are justice.'
      - type: citation
        text: 118:173 Let thy hand be with me to save me; * for I have chosen thy precepts.
      - type: citation
        text: 118:174 I have longed for thy salvation, O Lord; * and thy law is my meditation.
      - type: citation
        text: '118:175 My soul shall live and shall praise thee: * and thy judgments shall help me.'
      - type: citation
        text: '118:176 I have gone astray like a sheep that is lost: * seek thy servant, because I have not forgotten thy commandments.'
      la:
      - type: citation
        text: '118:1 (Aleph) Beáti immaculáti in via: * qui ámbulant in lege Dómini.'
      - type: citation
        text: '118:2 Beáti, qui scrutántur testimónia eius: * in toto corde exquírunt eum.'
      - type: citation
        text: 118:3 Non enim qui operántur iniquitátem, * in viis eius ambulavérunt.
      - type: citation
        text: 118:4 Tu mandásti * mandáta tua custodíri nimis.
      - type: citation
        text: 118:5 Útinam dirigántur viæ meæ, * ad custodiéndas iustificatiónes tuas!
      - type: citation
        text: 118:6 Tunc non confúndar, * cum perspéxero in ómnibus mandátis tuis.
      - type: citation
        text: '118:7 Confitébor tibi in directióne cordis: * in eo quod dídici iudícia iustítiæ tuæ.'
      - type: citation
        text: '118:8 Iustificatiónes tuas custódiam: * non me derelínquas usquequáque.'
      - type: citation
        text: 118:9 (Beth) In quo córrigit adolescéntior viam suam? * In custodiéndo sermónes tuos.
      - type: citation
        text: '118:10 In toto corde meo exquisívi te: * ne repéllas me a mandátis tuis.'
      - type: citation
        text: '118:11 In corde meo abscóndi elóquia tua: * ut non peccem tibi.'
      - type: citation
        text: '118:12 Benedíctus es, Dómine: * doce me iustificatiónes tuas.'
      - type: citation
        text: 118:13 In lábiis meis, * pronuntiávi ómnia iudícia oris tui.
      - type: citation
        text: 118:14 In via testimoniórum tuórum delectátus sum, * sicut in ómnibus divítiis.
      - type: citation
        text: '118:15 In mandátis tuis exercébor: * et considerábo vias tuas.'
      - type: citation
        text: '118:16 In iustificatiónibus tuis meditábor: * non oblivíscar sermónes tuos.'
      - type: citation
        text: '118:17 (Ghimel) Retríbue servo tuo, vivífica me: * et custódiam sermónes tuos:'
      - type: citation
        text: '118:18 Revéla óculos meos: * et considerábo mirabília de lege tua.'
      - type: citation
        text: '118:19 Íncola ego sum in terra: * non abscóndas a me mandáta tua.'
      - type: citation
        text: 118:20 Concupívit ánima mea desideráre iustificatiónes tuas, * in omni témpore.
      - type: citation
        text: '118:21 Increpásti supérbos: * maledícti qui declínant a mandátis tuis.'
      - type: citation
        text: '118:22 Aufer a me oppróbrium, et contémptum: * quia testimónia tua exquisívi.'
      - type: citation
        text: '118:23 Étenim sedérunt príncipes, et advérsum me loquebántur: * servus autem tuus exercebátur in iustificatiónibus tuis.'
      - type: citation
        text: '118:24 Nam et testimónia tua meditátio mea est: * et consílium meum iustificatiónes tuæ.'
      - type: citation
        text: '118:25 (Daleth) Adhǽsit paviménto ánima mea: * vivífica me secúndum verbum tuum.'
      - type: citation
        text: '118:26 Vias meas enuntiávi, et exaudísti me: * doce me iustificatiónes tuas.'
      - type: citation
        text: '118:27 Viam iustificatiónum tuárum ínstrue me: * et exercébor in mirabílibus tuis.'
      - type: citation
        text: '118:28 Dormitávit ánima mea præ tǽdio: * confírma me in verbis tuis.'
      - type: citation
        text: '118:29 Viam iniquitátis ámove a me: * et de lege tua miserére mei.'
      - type: citation
        text: '118:30 Viam veritátis elégi: * iudícia tua non sum oblítus.'
      - type: citation
        text: '118:31 Adhǽsi testimóniis tuis, Dómine: * noli me confúndere.'
      - type: citation
        text: 118:32 Viam mandatórum tuórum cucúrri, * cum dilatásti cor meum.
      - type: citation
        text: '118:33 (He) Legem pone mihi, Dómine, viam iustificatiónum tuárum: * et exquíram eam semper.'
      - type: citation
        text: '118:34 Da mihi intelléctum, et scrutábor legem tuam: * et custódiam illam in toto corde meo.'
      - type: citation
        text: '118:35 Deduc me in sémitam mandatórum tuórum: * quia ipsam vólui.'
      - type: citation
        text: '118:36 Inclína cor meum in testimónia tua: * et non in avarítiam.'
      - type: citation
        text: '118:37 Avérte óculos meos ne vídeant vanitátem: * in via tua vivífica me.'
      - type: citation
        text: 118:38 Státue servo tuo elóquium tuum, * in timóre tuo.
      - type: citation
        text: '118:39 Ámputa oppróbrium meum quod suspicátus sum: * quia iudícia tua iucúnda.'
      - type: citation
        text: '118:40 Ecce, concupívi mandáta tua: * in æquitáte tua vivífica me.'
      - type: citation
        text: '118:41 (Vav) Et véniat super me misericórdia tua, Dómine: * salutáre tuum secúndum elóquium tuum.'
      - type: citation
        text: '118:42 Et respondébo exprobrántibus mihi verbum: * quia sperávi in sermónibus tuis.'
      - type: citation
        text: '118:43 Et ne áuferas de ore meo verbum veritátis usquequáque: * quia in iudíciis tuis supersperávi.'
      - type: citation
        text: '118:44 Et custódiam legem tuam semper: * in sǽculum et in sǽculum sǽculi.'
      - type: citation
        text: '118:45 Et ambulábam in latitúdine: * quia mandáta tua exquisívi.'
      - type: citation
        text: '118:46 Et loquébar in testimóniis tuis in conspéctu regum: * et non confundébar.'
      - type: citation
        text: 118:47 Et meditábar in mandátis tuis, * quæ diléxi.
      - type: citation
        text: '118:48 Et levávi manus meas ad mandáta tua, quæ diléxi: * et exercébar in iustificatiónibus tuis.'
      - type: citation
        text: 118:49 (Zai) Memor esto verbi tui servo tuo, * in quo mihi spem dedísti.
      - type: citation
        text: '118:50 Hæc me consoláta est in humilitáte mea: * quia elóquium tuum vivificávit me.'
      - type: citation
        text: '118:51 Supérbi iníque agébant usquequáque: * a lege autem tua non declinávi.'
      - type: citation
        text: '118:52 Memor fui iudiciórum tuórum a sǽculo, Dómine: * et consolátus sum.'
      - type: citation
        text: 118:53 Deféctio ténuit me, * pro peccatóribus derelinquéntibus legem tuam.
      - type: citation
        text: 118:54 Cantábiles mihi erant iustificatiónes tuæ, * in loco peregrinatiónis meæ.
      - type: citation
        text: '118:55 Memor fui nocte nóminis tui, Dómine: * et custodívi legem tuam.'
      - type: citation
        text: '118:56 Hæc facta est mihi: * quia iustificatiónes tuas exquisívi.'
      - type: citation
        text: 118:57 (Heth) Pórtio mea, Dómine, * dixi custodíre legem tuam.
      - type: citation
        text: '118:58 Deprecátus sum fáciem tuam in toto corde meo: * miserére mei secúndum elóquium tuum.'
      - type: citation
        text: '118:59 Cogitávi vias meas: * et convérti pedes meos in testimónia tua.'
      - type: citation
        text: '118:60 Parátus sum, et non sum turbátus: * ut custódiam mandáta tua.'
      - type: citation
        text: '118:61 Funes peccatórum circumpléxi sunt me: * et legem tuam non sum oblítus.'
      - type: citation
        text: 118:62 Média nocte surgébam ad confiténdum tibi, * super iudícia iustificatiónis tuæ.
      - type: citation
        text: '118:63 Párticeps ego sum ómnium timéntium te: * et custodiéntium mandáta tua.'
      - type: citation
        text: '118:64 Misericórdia tua, Dómine, plena est terra: * iustificatiónes tuas doce me.'
      - type: citation
        text: 118:65 (Teth) Bonitátem fecísti cum servo tuo, Dómine, * secúndum verbum tuum.
      - type: citation
        text: '118:66 Bonitátem, et disciplínam, et sciéntiam doce me: * quia mandátis tuis crédidi.'
      - type: citation
        text: '118:67 Priúsquam humiliárer ego delíqui: * proptérea elóquium tuum custodívi.'
      - type: citation
        text: '118:68 Bonus es tu: * et in bonitáte tua doce me iustificatiónes tuas.'
      - type: citation
        text: '118:69 Multiplicáta est super me iníquitas superbórum: * ego autem in toto corde meo scrutábor mandáta tua.'
      - type: citation
        text: '118:70 Coagulátum est sicut lac cor eórum: * ego vero legem tuam meditátus sum.'
      - type: citation
        text: '118:71 Bonum mihi quia humiliásti me: * ut discam iustificatiónes tuas.'
      - type: citation
        text: 118:72 Bonum mihi lex oris tui, * super míllia auri et argénti.
      - type: citation
        text: '118:73 (Ioth) Manus tuæ fecérunt me, et plasmavérunt me: * da mihi intelléctum, et discam mandáta tua.'
      - type: citation
        text: '118:74 Qui timent te vidébunt me, et lætabúntur: * quia in verba tua supersperávi.'
      - type: citation
        text: '118:75 Cognóvi, Dómine, quia ǽquitas iudícia tua: * et in veritáte tua humiliásti me.'
      - type: citation
        text: 118:76 Fiat misericórdia tua ut consolétur me, * secúndum elóquium tuum servo tuo.
      - type: citation
        text: '118:77 Véniant mihi miseratiónes tuæ, et vivam: * quia lex tua meditátio mea est.'
      - type: citation
        text: '118:78 Confundántur supérbi, quia iniúste iniquitátem fecérunt in me: * ego autem exercébor in mandátis tuis.'
      - type: citation
        text: '118:79 Convertántur mihi timéntes te: * et qui novérunt testimónia tua.'
      - type: citation
        text: 118:80 Fiat cor meum immaculátum in iustificatiónibus tuis, * ut non confúndar.
      - type: citation
        text: '118:81 (Caph) Defécit in salutáre tuum ánima mea: * et in verbum tuum supersperávi.'
      - type: citation
        text: '118:82 Defecérunt óculi mei in elóquium tuum, * dicéntes: Quando consoláberis me?'
      - type: citation
        text: '118:83 Quia factus sum sicut uter in pruína: * iustificatiónes tuas non sum oblítus.'
      - type: citation
        text: 118:84 Quot sunt dies servi tui? * quando fácies de persequéntibus me iudícium?
      - type: citation
        text: '118:85 Narravérunt mihi iníqui fabulatiónes: * sed non ut lex tua.'
      - type: citation
        text: '118:86 Ómnia mandáta tua véritas: * iníque persecúti sunt me, ádiuva me.'
      - type: citation
        text: '118:87 Paulo minus consummavérunt me in terra: * ego autem non derelíqui mandáta tua.'
      - type: citation
        text: '118:88 Secúndum misericórdiam tuam vivífica me: * et custódiam testimónia oris tui.'
      - type: citation
        text: 118:89 (Lamed) In ætérnum, Dómine, * verbum tuum pérmanet in cælo.
      - type: citation
        text: '118:90 In generatiónem et generatiónem véritas tua: * fundásti terram, et pérmanet.'
      - type: citation
        text: '118:91 Ordinatióne tua persevérat dies: * quóniam ómnia sérviunt tibi.'
      - type: citation
        text: '118:92 Nisi quod lex tua meditátio mea est: * tunc forte periíssem in humilitáte mea.'
      - type: citation
        text: '118:93 In ætérnum non oblivíscar iustificatiónes tuas: * quia in ipsis vivificásti me.'
      - type: citation
        text: '118:94 Tuus sum ego, salvum me fac: * quóniam iustificatiónes tuas exquisívi.'
      - type: citation
        text: '118:95 Me exspectavérunt peccatóres ut pérderent me: * testimónia tua intelléxi.'
      - type: citation
        text: '118:96 Omnis consummatiónis vidi finem: * latum mandátum tuum nimis.'
      - type: citation
        text: 118:97 (Mem) Quómodo diléxi legem tuam, Dómine? * tota die meditátio mea est.
      - type: citation
        text: '118:98 Super inimícos meos prudéntem me fecísti mandáto tuo: * quia in ætérnum mihi est.'
      - type: citation
        text: '118:99 Super omnes docéntes me intelléxi: * quia testimónia tua meditátio mea est.'
      - type: citation
        text: '118:100 Super senes intelléxi: * quia mandáta tua quæsívi.'
      - type: citation
        text: '118:101 Ab omni via mala prohíbui pedes meos: * ut custódiam verba tua.'
      - type: citation
        text: '118:102 A iudíciis tuis non declinávi: * quia tu legem posuísti mihi.'
      - type: citation
        text: 118:103 Quam dúlcia fáucibus meis elóquia tua, * super mel ori meo!
      - type: citation
        text: '118:104 A mandátis tuis intelléxi: * proptérea odívi omnem viam iniquitátis.'
      - type: citation
        text: 118:105 (Nun) Lucérna pédibus meis verbum tuum, * et lumen sémitis meis.
      - type: citation
        text: 118:106 Iurávi, et státui * custodíre iudícia iustítiæ tuæ.
      - type: citation
        text: '118:107 Humiliátus sum usquequáque, Dómine: * vivífica me secúndum verbum tuum.'
      - type: citation
        text: '118:108 Voluntária oris mei beneplácita fac, Dómine: * et iudícia tua doce me.'
      - type: citation
        text: '118:109 Ánima mea in mánibus meis semper: * et legem tuam non sum oblítus.'
      - type: citation
        text: '118:110 Posuérunt peccatóres láqueum mihi: * et de mandátis tuis non errávi.'
      - type: citation
        text: '118:111 Hereditáte acquisívi testimónia tua in ætérnum: * quia exsultátio cordis mei sunt.'
      - type: citation
        text: 118:112 Inclinávi cor meum ad faciéndas iustificatiónes tuas in ætérnum, * propter retributiónem.
      - type: citation
        text: '118:113 (Samech) Iníquos ódio hábui: * et legem tuam diléxi.'
      - type: citation
        text: '118:114 Adiútor et suscéptor meus es tu: * et in verbum tuum supersperávi.'
      - type: citation
        text: '118:115 Declináte a me, malígni: * et scrutábor mandáta Dei mei.'
      - type: citation
        text: '118:116 Súscipe me secúndum elóquium tuum, et vivam: * et non confúndas me ab exspectatióne mea.'
      - type: citation
        text: '118:117 Ádiuva me, et salvus ero: * et meditábor in iustificatiónibus tuis semper.'
      - type: citation
        text: '118:118 Sprevísti omnes discedéntes a iudíciis tuis: * quia iniústa cogitátio eórum.'
      - type: citation
        text: '118:119 Prævaricántes reputávi omnes peccatóres terræ: * ídeo diléxi testimónia tua.'
      - type: citation
        text: '118:120 Confíge timóre tuo carnes meas: * a iudíciis enim tuis tímui.'
      - type: citation
        text: '118:121 (Ain) Feci iudícium et iustítiam: * non tradas me calumniántibus me.'
      - type: citation
        text: '118:122 Súscipe servum tuum in bonum: * non calumniéntur me supérbi.'
      - type: citation
        text: '118:123 Óculi mei defecérunt in salutáre tuum: * et in elóquium iustítiæ tuæ.'
      - type: citation
        text: '118:124 Fac cum servo tuo secúndum misericórdiam tuam: * et iustificatiónes tuas doce me.'
      - type: citation
        text: '118:125 Servus tuus sum ego: * da mihi intelléctum, ut sciam testimónia tua.'
      - type: citation
        text: '118:126 Tempus faciéndi, Dómine: * dissipavérunt legem tuam.'
      - type: citation
        text: 118:127 Ídeo diléxi mandáta tua, * super aurum et topázion.
      - type: citation
        text: '118:128 Proptérea ad ómnia mandáta tua dirigébar: * omnem viam iníquam ódio hábui.'
      - type: citation
        text: '118:129 (Phe) Mirabília testimónia tua: * ídeo scrutáta est ea ánima mea.'
      - type: citation
        text: '118:130 Declarátio sermónum tuórum illúminat: * et intelléctum dat párvulis.'
      - type: citation
        text: '118:131 Os meum apérui, et attráxi spíritum: * quia mandáta tua desiderábam.'
      - type: citation
        text: 118:132 Áspice in me, et miserére mei, * secúndum iudícium diligéntium nomen tuum.
      - type: citation
        text: '118:133 Gressus meos dírige secúndum elóquium tuum: * et non dominétur mei omnis iniustítia.'
      - type: citation
        text: '118:134 Rédime me a calúmniis hóminum: * ut custódiam mandáta tua.'
      - type: citation
        text: '118:135 Fáciem tuam illúmina super servum tuum: * et doce me iustificatiónes tuas.'
      - type: citation
        text: '118:136 Éxitus aquárum deduxérunt óculi mei: * quia non custodiérunt legem tuam.'
      - type: citation
        text: '118:137 (Sade) Iustus es, Dómine: * et rectum iudícium tuum.'
      - type: citation
        text: '118:138 Mandásti iustítiam testimónia tua: * et veritátem tuam nimis.'
      - type: citation
        text: '118:139 Tabéscere me fecit zelus meus: * quia oblíti sunt verba tua inimíci mei.'
      - type: citation
        text: '118:140 Ignítum elóquium tuum veheménter: * et servus tuus diléxit illud.'
      - type: citation
        text: '118:141 Adolescéntulus sum ego et contémptus: * iustificatiónes tuas non sum oblítus.'
      - type: citation
        text: '118:142 Iustítia tua, iustítia in ætérnum: * et lex tua véritas.'
      - type: citation
        text: '118:143 Tribulátio, et angústia invenérunt me: * mandáta tua meditátio mea est.'
      - type: citation
        text: '118:144 Ǽquitas testimónia tua in ætérnum: * intelléctum da mihi, et vivam.'
      - type: citation
        text: '118:145 (Coph) Clamávi in toto corde meo, exáudi me, Dómine: * iustificatiónes tuas requíram.'
      - type: citation
        text: '118:146 Clamávi ad te, salvum me fac: * ut custódiam mandáta tua.'
      - type: citation
        text: '118:147 Prævéni in maturitáte, et clamávi: * quia in verba tua supersperávi.'
      - type: citation
        text: '118:148 Prævenérunt óculi mei ad te dilúculo: * ut meditárer elóquia tua.'
      - type: citation
        text: '118:149 Vocem meam audi secúndum misericórdiam tuam, Dómine: * et secúndum iudícium tuum vivífica me.'
      - type: citation
        text: '118:150 Appropinquavérunt persequéntes me iniquitáti: * a lege autem tua longe facti sunt.'
      - type: citation
        text: '118:151 Prope es tu, Dómine: * et omnes viæ tuæ véritas.'
      - type: citation
        text: '118:152 Inítio cognóvi de testimóniis tuis: * quia in ætérnum fundásti ea.'
      - type: citation
        text: '118:153 (Res) Vide humilitátem meam, et éripe me: * quia legem tuam non sum oblítus.'
      - type: citation
        text: '118:154 Iúdica iudícium meum, et rédime me: * propter elóquium tuum vivífica me.'
      - type: citation
        text: '118:155 Longe a peccatóribus salus: * quia iustificatiónes tuas non exquisiérunt.'
      - type: citation
        text: '118:156 Misericórdiæ tuæ multæ, Dómine: * secúndum iudícium tuum vivífica me.'
      - type: citation
        text: '118:157 Multi qui persequúntur me, et tríbulant me: * a testimóniis tuis non declinávi.'
      - type: citation
        text: '118:158 Vidi prævaricántes, et tabescébam: * quia elóquia tua non custodiérunt.'
      - type: citation
        text: '118:159 Vide quóniam mandáta tua diléxi, Dómine: * in misericórdia tua vivífica me.'
      - type: citation
        text: '118:160 Princípium verbórum tuórum, véritas: * in ætérnum ómnia iudícia iustítiæ tuæ.'
      - type: citation
        text: '118:161 (Sin) Príncipes persecúti sunt me gratis: * et a verbis tuis formidávit cor meum.'
      - type: citation
        text: '118:162 Lætábor ego super elóquia tua: * sicut qui invénit spólia multa.'
      - type: citation
        text: '118:163 Iniquitátem ódio hábui, et abominátus sum: * legem autem tuam diléxi.'
      - type: citation
        text: 118:164 Sépties in die laudem dixi tibi, * super iudícia iustítiæ tuæ.
      - type: citation
        text: '118:165 Pax multa diligéntibus legem tuam: * et non est illis scándalum.'
      - type: citation
        text: '118:166 Exspectábam salutáre tuum, Dómine: * et mandáta tua diléxi.'
      - type: citation
        text: '118:167 Custodívit ánima mea testimónia tua: * et diléxit ea veheménter.'
      - type: citation
        text: '118:168 Servávi mandáta tua, et testimónia tua: * quia omnes viæ meæ in conspéctu tuo.'
      - type: citation
        text: '118:169 (Thau) Appropínquet deprecátio mea in conspéctu tuo, Dómine: * iuxta elóquium tuum da mihi intelléctum.'
      - type: citation
        text: '118:170 Intret postulátio mea in conspéctu tuo: * secúndum elóquium tuum éripe me.'
      - type: citation
        text: 118:171 Eructábunt lábia mea hymnum, * cum docúeris me iustificatiónes tuas.
      - type: citation
        text: '118:172 Pronuntiábit lingua mea elóquium tuum: * quia ómnia mandáta tua ǽquitas.'
      - type: citation
        text: '118:173 Fiat manus tua ut salvet me: * quóniam mandáta tua elégi.'
      - type: citation
        text: '118:174 Concupívi salutáre tuum, Dómine: * et lex tua meditátio mea est.'
      - type: citation
        text: '118:175 Vivet ánima mea, et laudábit te: * et iudícia tua adiuvábunt me.'
      - type: citation
        text: '118:176 Errávi, sicut ovis, quæ périit: * quære servum tuum, quia mandáta tua non sum oblítus.'
      en2:
      - type: citation
        text: '118:1 (Aleph) Blessed are the undefiled in the way: * who walk in the law of the Lord.'
      - type: citation
        text: '118:2 Blessed are those who search his testimonies: * who seek him with their whole heart.'
      - type: citation
        text: 118:3 For those who work iniquity * have not walked in his ways.
      - type: citation
        text: 118:4 You have commanded * your precepts to be kept most diligently.
      - type: citation
        text: 118:5 O that my ways may be directed * to keep your justifications!
      - type: citation
        text: 118:6 Then shall I not be confounded, * when I shall look into all your commandments.
      - type: citation
        text: '118:7 I will praise you with an upright heart: * when I shall have learned the judgments of your justice.'
      - type: citation
        text: '118:8 I will keep your justifications: * O forsake me not utterly.'
      - type: citation
        text: 118:9 (Beth) By what does a young man correct his way? * By keeping to your words.
      - type: citation
        text: '118:10 With my whole heart have I sought you: * let me not stray from your commandments.'
      - type: citation
        text: '118:11 Your words have I hidden in my heart: * that I might not sin against you.'
      - type: citation
        text: '118:12 Blessed are you, O Lord: * teach me your justifications.'
      - type: citation
        text: 118:13 With my lips I have pronounced * all the judgments of your mouth.
      - type: citation
        text: 118:14 I have been delighted in the way of your testimonies, * as in all riches.
      - type: citation
        text: '118:15 I will meditate on your commandments: * and I will consider your ways.'
      - type: citation
        text: '118:16 I will think upon your justifications: * I will not forget your words.'
      - type: citation
        text: '118:17 (Ghimel) Deal bountifully with your servant, give me life: * and I will keep your words:'
      - type: citation
        text: '118:18 Open my eyes: * and I will consider the wonders of your law.'
      - type: citation
        text: '118:19 I am a sojourner on the earth: * hide not your commandments from me.'
      - type: citation
        text: 118:20 My soul has longed to desire * your justifications at all times.
      - type: citation
        text: '118:21 You have rebuked the proud: * cursed are those who stray from your commandments.'
      - type: citation
        text: '118:22 Remove from me reproach and contempt: * for I have sought your testimonies.'
      - type: citation
        text: '118:23 For princes sat and spoke against me: * but your servant was employed in your justifications.'
      - type: citation
        text: '118:24 For your testimonies also are my meditation: * and your justifications are my counsel.'
      - type: citation
        text: '118:25 (Daleth) My soul cleaved to the pavement: * give me life according to your word.'
      - type: citation
        text: '118:26 I have declared my ways, and you have heeded me: * teach me your justifications.'
      - type: citation
        text: '118:27 Instruct me in the way of your justifications: * and I will be trained in your wonders.'
      - type: citation
        text: '118:28 My soul has slumbered because of weariness: * confirm me in your words.'
      - type: citation
        text: '118:29 Remove the way of iniquity from me: * and have mercy on me by your law.'
      - type: citation
        text: '118:30 I have chosen the way of truth: * I have not forgotten your judgments.'
      - type: citation
        text: '118:31 I have adhered to your testimonies, O Lord: * do not be willing to confound me.'
      - type: citation
        text: 118:32 I have run by way of your commandments, * when you enlarged my heart.
      - type: citation
        text: '118:33 (He) O Lord, place the law before me, the way of your justifications: * and I will always inquire into it.'
      - type: citation
        text: '118:34 Give me understanding, and I will examine your law: * and I will keep it with my whole heart.'
      - type: citation
        text: '118:35 Lead me according to the path of your commandments: * for I have desired this.'
      - type: citation
        text: '118:36 Bend my heart with your testimonies: * and not with avarice.'
      - type: citation
        text: '118:37 Turn my eyes away, lest they see what is vain: * revive me in your way.'
      - type: citation
        text: 118:38 Station your eloquence with your servant, * along with your fear.
      - type: citation
        text: '118:39 Cut off my disgrace, which I have taken up: * for your judgments are delightful.'
      - type: citation
        text: '118:40 Behold, I have longed for your commandments: * revive me in your fairness.'
      - type: citation
        text: '118:41 (Vav) And let your mercy overwhelm me, O Lord: * your salvation according to your eloquence.'
      - type: citation
        text: '118:42 And I will respond to those who reproach me by word: * for I have hoped in your words.'
      - type: citation
        text: '118:43 And do not utterly take away the word of truth from my mouth: * for in your judgments, I have hoped beyond hope.'
      - type: citation
        text: '118:44 And I will always keep your law: * in this age and forever and ever.'
      - type: citation
        text: '118:45 And I have wandered far and wide: * because I was seeking your commandments.'
      - type: citation
        text: '118:46 And I spoke of your testimonies in the sight of kings: * and I was not confounded.'
      - type: citation
        text: 118:47 And I meditated on your commandments, * which I loved.
      - type: citation
        text: '118:48 And I lifted up my hands to your commandments, which I loved: * and I was trained in your justifications.'
      - type: citation
        text: 118:49 (Zai) Be mindful of your word to your servant, * by which you have given me hope.
      - type: citation
        text: '118:50 This has consoled me in my humiliation: * for your word has revived me.'
      - type: citation
        text: '118:51 The arrogant act altogether iniquitously: * but I have not turned aside from your law.'
      - type: citation
        text: '118:52 I called to mind your judgments of antiquity, O Lord: * and I was consoled.'
      - type: citation
        text: 118:53 Faintness has taken hold of me, * because of the sinners, those who abandon your law.
      - type: citation
        text: 118:54 Your justifications were the subject of my worthy singing, * in the place of my pilgrimage.
      - type: citation
        text: '118:55 During the night, I remembered your name, O Lord: * and I kept your law.'
      - type: citation
        text: '118:56 This has happened to me: * because I sought your justifications.'
      - type: citation
        text: 118:57 (Heth) O Lord, my portion, * I have said that I would keep your law.
      - type: citation
        text: '118:58 I have beseeched your face with my whole heart: * be merciful to me according to your word.'
      - type: citation
        text: '118:59 I have considered my ways: * and I have turned my feet toward your testimonies.'
      - type: citation
        text: '118:60 I have been prepared, and I have not been disturbed: * so that I may keep your commandments.'
      - type: citation
        text: '118:61 The ropes of the impious have encircled me: * and I have not forgotten your law.'
      - type: citation
        text: 118:62 I arose in the middle of the night to confess to you, * over the judgments of your justification.
      - type: citation
        text: '118:63 I am a partaker with all those who fear you: * and who keep your commandments.'
      - type: citation
        text: '118:64 The earth, O Lord, is full of your mercy: * teach me your justifications.'
      - type: citation
        text: 118:65 (Teth) You have done well with your servant, O Lord, * according to your word.
      - type: citation
        text: '118:66 Teach me goodness and discipline and knowledge: * for I have trusted your commandments.'
      - type: citation
        text: '118:67 Before I was humbled, I committed offenses: * because of this, I have kept to your word.'
      - type: citation
        text: '118:68 You are good: * so in your goodness teach me your justifications.'
      - type: citation
        text: '118:69 The iniquity of the arrogant has been multiplied over me: * yet I will examine your commandments with all my heart.'
      - type: citation
        text: '118:70 Their heart has been curdled like milk: * truly, I have meditated on your law.'
      - type: citation
        text: '118:71 It is good for me that you humbled me: * so that I may learn your justifications.'
      - type: citation
        text: 118:72 The law of your mouth is good for me, * beyond thousands of gold and silver pieces.
      - type: citation
        text: '118:73 (Ioth) Your hands have created me and formed me: * give me understanding, and I will learn your commandments.'
      - type: citation
        text: '118:74 Those who fear you will see me, and they will rejoice: * for I have greatly hoped in your words.'
      - type: citation
        text: '118:75 I know, O Lord, that your judgments are fairness: * and in your truth, you have humbled me.'
      - type: citation
        text: 118:76 Let it be your mercy that consoles me, * according to your eloquence to your servant.
      - type: citation
        text: '118:77 Let your compassion draw near to me, and I will live: * for your law is my meditation.'
      - type: citation
        text: '118:78 Let the arrogant be confounded, for unjustly they have done iniquity to me: * but I will be trained in your commandments.'
      - type: citation
        text: '118:79 Let those who fear you turn to me: * along with those who know your testimonies.'
      - type: citation
        text: 118:80 Let my heart be immaculate in your justifications, * so that I may not be confounded.
      - type: citation
        text: '118:81 (Caph) My soul has faltered in your salvation: * yet in your word, I have hoped beyond hope.'
      - type: citation
        text: '118:82 My eyes have failed in your eloquence, * saying: When will you console me?'
      - type: citation
        text: '118:83 For I have become like a wineskin in the frost: * I have not forgotten your justifications.'
      - type: citation
        text: 118:84 How many are the days of your servant? * when will you bring judgment against those who persecute me?
      - type: citation
        text: '118:85 The iniquitous have spoken fables to me: * but these are unlike your law.'
      - type: citation
        text: '118:86 All your commandments are truth: * they have been persecuting me unjustly, assist me.'
      - type: citation
        text: '118:87 They have nearly consumed me on earth: * yet I have not forsaken your commandments.'
      - type: citation
        text: '118:88 Revive me according to your mercy: * and I will keep the testimonies of your mouth.'
      - type: citation
        text: 118:89 (Lamed) O Lord, your word remains firm in heaven, * for all eternity.
      - type: citation
        text: '118:90 Your truth is from generation to generation: * you have founded the earth, and it remains firm.'
      - type: citation
        text: '118:91 By your ordinance, the day perseveres: * for all things are in service to you.'
      - type: citation
        text: '118:92 If your law had not been my meditation: * then perhaps I would have perished in my humiliation.'
      - type: citation
        text: '118:93 I will not forget your justifications, for eternity: * for by them, you have enlivened me.'
      - type: citation
        text: '118:94 I am yours, accomplish my salvation: * for I have inquired into your justifications.'
      - type: citation
        text: '118:95 The sinners have waited for me, in order to destroy me: * I have understood your testimonies.'
      - type: citation
        text: '118:96 I have seen the end of the consummation of all things: * your commandment is exceedingly broad.'
      - type: citation
        text: 118:97 (Mem) How have I loved your law, O Lord? * it is my meditation all day long.
      - type: citation
        text: '118:98 By your commandment, you have made me able to see far beyond my enemies: * for it is with me for eternity.'
      - type: citation
        text: '118:99 I have understood beyond all my teachers: * for your testimonies are my meditation.'
      - type: citation
        text: '118:100 I have understood beyond the elders: * for I have searched your commandments.'
      - type: citation
        text: '118:101 I have prohibited my feet from every evil way: * so that I may keep your words.'
      - type: citation
        text: '118:102 I have not declined from your judgments: * because you have stationed a law for me.'
      - type: citation
        text: 118:103 How sweet is your eloquence to my palate, * more so than honey to my mouth!
      - type: citation
        text: '118:104 I obtained understanding by your commandments: * because of this, I have hated every way of iniquity.'
      - type: citation
        text: 118:105 (Nun) Your word is a lamp to my feet, * and a light to my paths.
      - type: citation
        text: 118:106 I have sworn it, and so I am determined * to keep the judgments of your justice.
      - type: citation
        text: '118:107 I have been altogether humbled, O Lord: * revive me according to your word.'
      - type: citation
        text: '118:108 Make the willing offerings of my mouth well pleasing, O Lord: * and teach me your judgments.'
      - type: citation
        text: '118:109 My soul is always in my hands: * and I have not forgotten your law.'
      - type: citation
        text: '118:110 Sinners have set a snare for me: * yet I have not strayed from your commandments.'
      - type: citation
        text: '118:111 I have acquired your testimonies as an inheritance unto eternity: * for they are the exultation of my heart.'
      - type: citation
        text: 118:112 I have inclined my heart to do your justifications for eternity, * as a recompense.
      - type: citation
        text: '118:113 (Samech) I have hated the iniquitous: * and I have loved your law.'
      - type: citation
        text: '118:114 You are my helper and my supporter: * and in your word, I have greatly hoped.'
      - type: citation
        text: '118:115 Turn away from me, you malignant ones: * and I will examine the commandments of my God.'
      - type: citation
        text: '118:116 Uphold me according to your eloquence, and I will live: * and let me not be confounded in my expectation.'
      - type: citation
        text: '118:117 Help me, and I will be saved: * and I will meditate always on your justifications.'
      - type: citation
        text: '118:118 You have despised all those who fell away from your judgments: * for their intention is unjust.'
      - type: citation
        text: '118:119 I have considered all the sinners of the earth to be transgressors: * therefore, I have loved your testimonies.'
      - type: citation
        text: '118:120 Pierce my flesh with your fear: * for I am afraid of your judgments.'
      - type: citation
        text: '118:121 (Ain) I have accomplished judgment and justice: * do not hand me over to those who slander me.'
      - type: citation
        text: '118:122 Uphold your servant in what is good: * and do not allow the arrogant to slander me.'
      - type: citation
        text: '118:123 My eyes have failed in your salvation: * and in the eloquence of your justice.'
      - type: citation
        text: '118:124 Deal with your servant according to your mercy: * and teach me your justifications.'
      - type: citation
        text: '118:125 I am your servant: * give me understanding, so that I may know your testimonies.'
      - type: citation
        text: '118:126 It is time to act, O Lord: * they have dissipated your law.'
      - type: citation
        text: 118:127 Therefore, I have loved your commandments * beyond gold and topaz.
      - type: citation
        text: '118:128 Because of this, I was directed toward all your commandments: * I held hatred for every iniquitous way.'
      - type: citation
        text: '118:129 (Phe) Your testimonies are wonderful: * therefore, my soul has been examined by them.'
      - type: citation
        text: '118:130 The declaration of your words illuminates: * and it gives understanding to little ones.'
      - type: citation
        text: '118:131 I opened my mouth and drew breath: * for I desired your commandments.'
      - type: citation
        text: 118:132 Gaze upon me and be merciful to me, * according to the judgment of those who love your name.
      - type: citation
        text: '118:133 Direct my steps according to your eloquence: * and let no injustice rule over me.'
      - type: citation
        text: '118:134 Redeem me from the slanders of men: * so that I may keep your commandments.'
      - type: citation
        text: '118:135 Make your face shine upon your servant: * and teach me your justifications.'
      - type: citation
        text: '118:136 My eyes have gushed like springs of water: * because they have not kept your law.'
      - type: citation
        text: '118:137 (Sade) You are just, O Lord: * and your judgment is right.'
      - type: citation
        text: '118:138 You have commanded justice: your testimonies * and your truth even more so.'
      - type: citation
        text: '118:139 My zeal has caused me to pine away: * because my enemies have forgotten your words.'
      - type: citation
        text: '118:140 Your eloquence has been greatly enflamed: * and your servant has loved it.'
      - type: citation
        text: '118:141 I am young and treated with contempt: * yet I have not forgotten your justifications.'
      - type: citation
        text: '118:142 Your justice is justice for all eternity: * and your law is truth.'
      - type: citation
        text: '118:143 Tribulation and anguish have found me: * your commandments are my meditation.'
      - type: citation
        text: '118:144 Your testimonies are fairness unto eternity: * give me understanding, and I will live.'
      - type: citation
        text: '118:145 (Coph) I cried out with my whole heart, heed me, O Lord: * I will ask for your justifications.'
      - type: citation
        text: '118:146 I cried out to you, save me: * so that I may keep your commandments.'
      - type: citation
        text: '118:147 I arrived first in maturity, and so I cried out: * for in your words, I have hoped beyond hope.'
      - type: citation
        text: '118:148 My eyes preceded the dawn for you: * so that I might meditate on your eloquence.'
      - type: citation
        text: '118:149 Hear my voice according to your mercy, O Lord: * and revive me according to your judgment.'
      - type: citation
        text: '118:150 Those who persecute me have drawn near to iniquity: * but they have been brought far from your law.'
      - type: citation
        text: '118:151 You are near, O Lord: * and all your ways are truth.'
      - type: citation
        text: '118:152 I have known from the beginning about your testimonies: * for you founded them in eternity.'
      - type: citation
        text: '118:153 (Res) See my humiliation and rescue me: * for I have not forgotten your law.'
      - type: citation
        text: '118:154 Judge my judgment and redeem me: * revive me because of your eloquence.'
      - type: citation
        text: '118:155 Salvation is far from sinners: * because they have not inquired about your justifications.'
      - type: citation
        text: '118:156 Many are your mercies, O Lord: * enliven me according to your judgment.'
      - type: citation
        text: '118:157 Many are those who persecute me and who trouble me: * I have not turned away from your testimonies.'
      - type: citation
        text: '118:158 I saw the prevaricators, and I pine away: * because they have not kept your word.'
      - type: citation
        text: '118:159 O Lord, see how I have loved your commandments: * revive me in your mercy.'
      - type: citation
        text: '118:160 The beginning of your words is truth: * all the judgments of your justice are for eternity.'
      - type: citation
        text: '118:161 (Sin) The leaders have persecuted me without cause: * and my heart has been awed by your words.'
      - type: citation
        text: '118:162 I will rejoice over your eloquence: * like one who has found many spoils.'
      - type: citation
        text: '118:163 I have held hatred for iniquity, and I have abhorred it: * yet I have loved your law.'
      - type: citation
        text: 118:164 Seven times a day, I uttered praise to you, * about the judgments of your justice.
      - type: citation
        text: '118:165 Those who love your law have great peace: * and there is no scandal for them.'
      - type: citation
        text: '118:166 I have waited for your salvation, O Lord: * and I have loved your commandments.'
      - type: citation
        text: '118:167 My soul has kept to your testimonies: * and has loved them exceedingly.'
      - type: citation
        text: '118:168 I have served your commandments and your testimonies: * for all my ways are before your sight.'
      - type: citation
        text: '118:169 (Thau) O Lord, let my supplication draw near in your sight: * grant understanding to me according to your eloquence.'
      - type: citation
        text: '118:170 Let my petition enter before you: * rescue me according to your word.'
      - type: citation
        text: 118:171 A hymn will burst forth from my lips, * when you will teach me your justifications.
      - type: citation
        text: '118:172 My tongue will pronounce your eloquence: * for all your commandments are fairness.'
      - type: citation
        text: '118:173 Let it be your hand that saves me: * for I have chosen your commandments.'
      - type: citation
        text: '118:174 O Lord, I have longed for your salvation: * and your law is my meditation.'
      - type: citation
        text: '118:175 My soul will live and will praise you: * and your judgments will assist me.'
      - type: citation
        text: '118:176 I have gone astray like a sheep that is lost: * seek out your servant, for I have not forgotten your commandments.'
  psalm.119-1-ad-d-minum-cum-tribul-rer-clam-vi-et-exaud-ca7c36029e:
    role: psalm
    content:
      en:
      - type: citation
        text: '119:1 In my trouble I cried to the Lord: * and he heard me.'
      - type: citation
        text: 119:2 O Lord, deliver my soul from wicked lips, * and a deceitful tongue.
      - type: citation
        text: 119:3 What shall be given to thee, or what shall be added to thee, * to a deceitful tongue?
      - type: citation
        text: 119:4 The sharp arrows of the mighty, * with coals that lay waste.
      - type: citation
        text: '119:5 Woe is me, that my sojourning is prolonged! † I have dwelt with the inhabitants of Cedar: * (6) my soul hath been long a sojourner.'
      - type: citation
        text: '119:7 With them that hated peace I was peaceable: * when I spoke to them they fought against me without cause.'
      la:
      - type: citation
        text: '119:1 Ad Dóminum cum tribulárer clamávi: * et exaudívit me.'
      - type: citation
        text: 119:2 Dómine, líbera ánimam meam a lábiis iníquis, * et a lingua dolósa.
      - type: citation
        text: 119:3 Quid detur tibi, aut quid apponátur tibi * ad linguam dolósam?
      - type: citation
        text: 119:4 Sagíttæ poténtis acútæ, * cum carbónibus desolatóriis.
      - type: citation
        text: '119:5 Heu mihi, quia incolátus meus prolongátus est: † habitávi cum habitántibus Cedar: * (6) multum íncola fuit ánima mea.'
      - type: citation
        text: '119:7 Cum his, qui odérunt pacem, eram pacíficus: * cum loquébar illis, impugnábant me gratis.'
      en2:
      - type: citation
        text: '119:1 When troubled, I cried out to the Lord: * and he heard me.'
      - type: citation
        text: 119:2 O Lord, free my soul from lips of iniquity, * and from the deceitful tongue.
      - type: citation
        text: 119:3 What will be given to you, or what will be added to you * for a deceitful tongue?
      - type: citation
        text: 119:4 The sharp arrows of the powerful, * along with the burning coals of desolation.
      - type: citation
        text: '119:5 Woe to me, for my sojourning has been prolonged: † I have lived with the inhabitants of Kedar: * (6) my soul has long been a sojourner.'
      - type: citation
        text: '119:7 With those who hated peace, I was peaceful: * when I spoke to them, they fought against me without cause.'
  psalm.12-1-squequo-d-mine-oblivisc-ris-me-in-finem-squ-8f08680d62:
    role: psalm
    content:
      en:
      - type: citation
        text: 12:1 How long, O Lord, wilt thou forget me unto the end? * how long dost thou turn away thy face from me?
      - type: citation
        text: 12:2 How long shall I take counsels in my soul, * sorrow in my heart all the day?
      - type: citation
        text: 12:3 How long shall my enemy be exalted over me? * (4a) Consider, and hear me, O Lord my God.
      - type: citation
        text: '12:4b Enlighten my eyes that I never sleep in death: * (5a) lest at any time my enemy say: I have prevailed against him.'
      - type: citation
        text: '12:5b They that trouble me will rejoice when I am moved: * (6a) but I have trusted in thy mercy.'
      - type: citation
        text: '12:6b My heart shall rejoice in thy salvation: † I will sing to the Lord, who giveth me good things: * yea, I will sing to the name of the Lord the most High.'
      la:
      - type: citation
        text: 12:1 Úsquequo, Dómine, obliviscéris me in finem? * Úsquequo avértis fáciem tuam a me?
      - type: citation
        text: 12:2 Quámdiu ponam consília in ánima mea, * dolórem in corde meo per diem?
      - type: citation
        text: 12:3 Úsquequo exaltábitur inimícus meus super me? * (4a) réspice, et exáudi me, Dómine, Deus meus.
      - type: citation
        text: '12:4b Illúmina óculos meos ne umquam obdórmiam in morte: * (5a) nequándo dicat inimícus meus: Præválui advérsus eum.'
      - type: citation
        text: '12:5b Qui tríbulant me, exsultábunt si motus fúero: * (6a) ego autem in misericórdia tua sperávi.'
      - type: citation
        text: '12:6b Exsultábit cor meum in salutári tuo: † cantábo Dómino qui bona tríbuit mihi: * et psallam nómini Dómini altíssimi.'
      en2:
      - type: citation
        text: 12:1 How long, O Lord, will you forget me until the end? * How long will you turn your face away from me?
      - type: citation
        text: 12:2 How long can I take counsel in my soul, * sorrowing in my heart throughout the day?
      - type: citation
        text: 12:3 How long will my enemy be exalted over me? * (4a) Look upon me and listen to me, O Lord my God.
      - type: citation
        text: '12:4b Enlighten my eyes, lest I ever sleep in death: * lest my enemy say: I have prevailed against him.'
      - type: citation
        text: '12:5b They who trouble me will exult if I am moved: * but I have hoped in your mercy.'
      - type: citation
        text: '12:6b My heart will rejoice in your salvation: † I will sing to the Lord who has given good things to me: * and I will chant to the name of the Lord Most High.'
  psalm.120-1-lev-vi-culos-meos-in-montes-unde-v-niet-au-85c5d9252f:
    role: psalm
    content:
      en:
      - type: citation
        text: 120:1 I have lifted up my eyes to the mountains, * from whence help shall come to me.
      - type: citation
        text: 120:2 My help is from the Lord, * who made heaven and earth.
      - type: citation
        text: '120:3 May he not suffer thy foot to be moved: * neither let him slumber that keepeth thee.'
      - type: citation
        text: 120:4 Behold he shall neither slumber nor sleep, * that keepeth Israel.
      - type: citation
        text: 120:5 The Lord is thy keeper, the Lord is thy protection * upon thy right hand.
      - type: citation
        text: '120:6 The sun shall not burn thee by day: * nor the moon by night.'
      - type: citation
        text: '120:7 The Lord keepeth thee from all evil: * may the Lord keep thy soul.'
      - type: citation
        text: 120:8 May the Lord keep thy coming in and thy going out; * from henceforth now and for ever.
      la:
      - type: citation
        text: 120:1 Levávi óculos meos in montes, * unde véniet auxílium mihi.
      - type: citation
        text: 120:2 Auxílium meum a Dómino, * qui fecit cælum et terram.
      - type: citation
        text: '120:3 Non det in commotiónem pedem tuum: * neque dormítet qui custódit te.'
      - type: citation
        text: 120:4 Ecce, non dormitábit neque dórmiet, * qui custódit Israël.
      - type: citation
        text: 120:5 Dóminus custódit te, Dóminus protéctio tua, * super manum déxteram tuam.
      - type: citation
        text: '120:6 Per diem sol non uret te: * neque luna per noctem.'
      - type: citation
        text: '120:7 Dóminus custódit te ab omni malo: * custódiat ánimam tuam Dóminus.'
      - type: citation
        text: '120:8 Dóminus custódiat intróitum tuum, et éxitum tuum: * ex hoc nunc, et usque in sǽculum.'
      en2:
      - type: citation
        text: 120:1 I have lifted up my eyes to the mountains, * from where my help shall come.
      - type: citation
        text: 120:2 My help is from the Lord, * who made heaven and earth.
      - type: citation
        text: '120:3 May he not suffer your foot to be moved: * nor let him slumber who keeps you.'
      - type: citation
        text: 120:4 Behold, he shall neither slumber nor sleep, * who keeps Israel.
      - type: citation
        text: 120:5 The Lord keeps you, the Lord is your protection, * at your right hand.
      - type: citation
        text: '120:6 The sun shall not burn you by day: * nor the moon by night.'
      - type: citation
        text: '120:7 The Lord keeps you from all evil: * may the Lord keep your soul.'
      - type: citation
        text: '120:8 May the Lord keep your going out and your coming in: * from this time forth and even for evermore.'
  psalm.121-1-l-t-tus-sum-in-his-qu-dicta-sunt-mihi-in-d-6c31141ec6:
    role: psalm
    content:
      en:
      - type: citation
        text: '121:1 I rejoiced at the things that were said to me: * We shall go into the house of the Lord.'
      - type: citation
        text: 121:2 Our feet were standing * in thy courts, O Jerusalem.
      - type: citation
        text: 121:3 Jerusalem, which is built as a city, * which is compact together.
      - type: citation
        text: '121:4 For thither did the tribes go up, the tribes of the Lord: * the testimony of Israel, to praise the name of the Lord.'
      - type: citation
        text: 121:5 Because their seats have sat in judgment, * seats upon the house of David.
      - type: citation
        text: '121:6 Pray ye for the things that are for the peace of Jerusalem: * and abundance for them that love thee.'
      - type: citation
        text: '121:7 Let peace be in thy strength: * and abundance in thy towers.'
      - type: citation
        text: 121:8 For the sake of my brethren, and of my neighbours, * I spoke peace of thee.
      - type: citation
        text: 121:9 Because of the house of the Lord our God, * I have sought good things for thee.
      la:
      - type: citation
        text: '121:1 Lætátus sum in his, quæ dicta sunt mihi: * In domum Dómini íbimus.'
      - type: citation
        text: 121:2 Stantes erant pedes nostri, * in átriis tuis, Ierúsalem.
      - type: citation
        text: '121:3 Ierúsalem, quæ ædificátur ut cívitas: * cuius participátio eius in idípsum.'
      - type: citation
        text: '121:4 Illuc enim ascendérunt tribus, tribus Dómini: * testimónium Israël ad confiténdum nómini Dómini.'
      - type: citation
        text: 121:5 Quia illic sedérunt sedes in iudício, * sedes super domum David.
      - type: citation
        text: '121:6 Rogáte quæ ad pacem sunt Ierúsalem: * et abundántia diligéntibus te:'
      - type: citation
        text: '121:7 Fiat pax in virtúte tua: * et abundántia in túrribus tuis.'
      - type: citation
        text: '121:8 Propter fratres meos, et próximos meos, * loquébar pacem de te:'
      - type: citation
        text: 121:9 Propter domum Dómini, Dei nostri, * quæsívi bona tibi.
      en2:
      - type: citation
        text: '121:1 I rejoiced at the things that were said to me: * We shall go into the house of the Lord.'
      - type: citation
        text: 121:2 Our feet were standing, * in your courts, O Jerusalem.
      - type: citation
        text: '121:3 Jerusalem, which is built as a city: * whose participation is within itself.'
      - type: citation
        text: '121:4 For there the tribes went up, the tribes of the Lord: * the testimony of Israel, to praise the name of the Lord.'
      - type: citation
        text: 121:5 For there were seats set in judgment, * seats over the house of David.
      - type: citation
        text: '121:6 Pray for the things that are for the peace of Jerusalem: * and abundance for those who love you:'
      - type: citation
        text: '121:7 Let peace be in your strength: * and abundance in your towers.'
      - type: citation
        text: '121:8 For the sake of my brothers and my neighbors, * I spoke peace concerning you:'
      - type: citation
        text: 121:9 For the sake of the house of the Lord our God, * I sought good things for you.
  psalm.122-1-ad-te-lev-vi-culos-meos-qui-h-bitas-in-c-l-f8afd1fcbb:
    role: psalm
    content:
      en:
      - type: citation
        text: 122:1 To thee have I lifted up my eyes, * who dwellest in heaven.
      - type: citation
        text: 122:2y Behold as the eyes of servants * are on the hands of their masters,
      - type: citation
        text: '122:2b As the eyes of the handmaid are on the hands of her mistress: * so are our eyes unto the Lord our God, until he have mercy on us.'
      - type: citation
        text: '122:3 Have mercy on us, O Lord, have mercy on us: * for we are greatly filled with contempt.'
      - type: citation
        text: '122:4 For our soul is greatly filled: * we are a reproach to the rich, and contempt to the proud.'
      la:
      - type: citation
        text: 122:1 Ad te levávi óculos meos, * qui hábitas in cælis.
      - type: citation
        text: 122:2a Ecce, sicut óculi servórum * in mánibus dominórum suórum,
      - type: citation
        text: '122:2b Sicut óculi ancíllæ in mánibus dóminæ suæ: * ita óculi nostri ad Dóminum, Deum nostrum, donec misereátur nostri.'
      - type: citation
        text: '122:3 Miserére nostri, Dómine, miserére nostri: * quia multum repléti sumus despectióne:'
      - type: citation
        text: '122:4 Quia multum repléta est ánima nostra: * oppróbrium abundántibus, et despéctio supérbis.'
      en2:
      - type: citation
        text: 122:1 To you I have lifted up my eyes, * you who dwell in the heavens.
      - type: citation
        text: 122:2a Behold, as the eyes of servants * are on the hands of their masters,
      - type: citation
        text: '122:2b As the eyes of the handmaid are on the hands of her mistress: * so are our eyes toward the Lord our God, until he have mercy on us.'
      - type: citation
        text: '122:3 Have mercy on us, O Lord, have mercy on us: * for we are greatly filled with contempt:'
      - type: citation
        text: '122:4 For our soul is greatly filled: * a reproach for the prosperous, and contempt for the proud.'
  psalm.123-1-nisi-quia-d-minus-erat-in-nobis-dicat-nunc-aa86f93e8b:
    role: psalm
    content:
      en:
      - type: citation
        text: '123:1 If it had not been that the Lord was with us, let Israel now say: * (2a) If it had not been that the Lord was with us,'
      - type: citation
        text: 123:2b When men rose up against us, * (3a) perhaps they had swallowed us up alive.
      - type: citation
        text: 123:3b When their fury was enkindled against us, * (4) perhaps the waters had swallowed us up.
      - type: citation
        text: '123:5 Our soul hath passed through a torrent: * perhaps our soul had passed through a water insupportable.'
      - type: citation
        text: 123:6 Blessed be the Lord, * who hath not given us to be a prey to their teeth.
      - type: citation
        text: 123:7a Our soul hath been delivered as a sparrow * out of the snare of the fowlers.
      - type: citation
        text: 123:7b The snare is broken, * and we are delivered.
      - type: citation
        text: 123:8 Our help is in the name of the Lord, * who made heaven and earth.
      la:
      - type: citation
        text: '123:1 Nisi quia Dóminus erat in nobis, dicat nunc Israël: * (2a) nisi quia Dóminus erat in nobis,'
      - type: citation
        text: '123:2b Cum exsúrgerent hómines in nos, * (3a) forte vivos deglutíssent nos:'
      - type: citation
        text: 123:3b Cum irascerétur furor eórum in nos, * (4) fórsitan aqua absorbuísset nos.
      - type: citation
        text: '123:5 Torréntem pertransívit ánima nostra: * fórsitan pertransísset ánima nostra aquam intolerábilem.'
      - type: citation
        text: 123:6 Benedíctus Dóminus * qui non dedit nos in captiónem déntibus eórum.
      - type: citation
        text: '123:7a Ánima nostra sicut passer erépta est * de láqueo venántium:'
      - type: citation
        text: 123:7b Láqueus contrítus est, * et nos liberáti sumus.
      - type: citation
        text: 123:8 Adiutórium nostrum in nómine Dómini, * qui fecit cælum et terram.
      en2:
      - type: citation
        text: '123:1 If the Lord had not been among us, let Israel now say: * (2a) if the Lord had not been among us,'
      - type: citation
        text: '123:2b When men rose up against us, * (3a) perhaps they would have swallowed us alive:'
      - type: citation
        text: 123:3b When their fury raged against us, * (4) perhaps the water would have engulfed us.
      - type: citation
        text: '123:5 Our soul has passed through a torrent: * perhaps our soul would have passed through the unbearable water.'
      - type: citation
        text: 123:6 Blessed be the Lord * who has not given us as a prey to their teeth.
      - type: citation
        text: '123:7a Our soul has been rescued like a sparrow * from the snare of the hunters:'
      - type: citation
        text: 123:7b The snare is broken, * and we have been delivered.
      - type: citation
        text: 123:8 Our help is in the name of the Lord, * who made heaven and earth.
  psalm.124-1-qui-conf-dunt-in-d-mino-sicut-mons-sion-no-261bbfa2b9:
    role: psalm
    content:
      en:
      - type: citation
        text: '124:1 They that trust in the Lord shall be as mount Sion: * he shall not be moved for ever that dwelleth (2a) in Jerusalem.'
      - type: citation
        text: '124:2b Mountains are round about it: ‡ so the Lord is round about his people * from henceforth now and for ever.'
      - type: citation
        text: '124:3 For the Lord will not leave the rod of sinners upon the lot of the just: * that the just may not stretch forth their hands to iniquity.'
      - type: citation
        text: 124:4 Do good, O Lord, to those that are good, * and to the upright of heart.
      - type: citation
        text: '124:5 But such as turn aside into bonds, the Lord shall lead out with the workers of iniquity: * peace upon Israel.'
      la:
      - type: citation
        text: '124:1 Qui confídunt in Dómino, sicut mons Sion: * non commovébitur in ætérnum, qui hábitat (2a) in Ierúsalem.'
      - type: citation
        text: '124:2b Montes in circúitu eius: ‡ et Dóminus in circúitu pópuli sui, * ex hoc nunc et usque in sǽculum.'
      - type: citation
        text: '124:3 Quia non relínquet Dóminus virgam peccatórum super sortem iustórum: * ut non exténdant iusti ad iniquitátem manus suas.'
      - type: citation
        text: 124:4 Bénefac, Dómine, bonis, * et rectis corde.
      - type: citation
        text: '124:5 Declinántes autem in obligatiónes addúcet Dóminus cum operántibus iniquitátem: * pax super Israël.'
      en2:
      - type: citation
        text: '124:1 Those who trust in the Lord are like Mount Zion: * he who dwells (2a) in Jerusalem shall not be moved for ever.'
      - type: citation
        text: '124:2b Mountains are round about it: ‡ and the Lord is round about his people, * from this time forth and even for evermore.'
      - type: citation
        text: '124:3 For the Lord will not leave the rod of sinners upon the lot of the just: * lest the just stretch forth their hands to iniquity.'
      - type: citation
        text: 124:4 Do good, O Lord, to those who are good, * and to the upright of heart.
      - type: citation
        text: '124:5 But those who turn aside into bonds, the Lord shall lead away with the workers of iniquity: * peace upon Israel.'
  psalm.125-1-in-convert-ndo-d-minus-captivit-tem-sion-f-504296e127:
    role: psalm
    content:
      en:
      - type: citation
        text: 125:1 When the Lord brought back the captivity of Sion, * we became like men comforted.
      - type: citation
        text: 125:2a Then was our mouth filled with gladness; * and our tongue with joy.
      - type: citation
        text: '125:2b Then shall they say among the Gentiles: * The Lord hath done great things for them.'
      - type: citation
        text: '125:3 The Lord hath done great things for us: * we are become joyful.'
      - type: citation
        text: 125:4 Turn again our captivity, O Lord, * as a stream in the south.
      - type: citation
        text: 125:5 They that sow in tears * shall reap in joy.
      - type: citation
        text: 125:6a Going they went and wept, * casting their seeds.
      - type: citation
        text: 125:6b But coming they shall come with joyfulness, * carrying their sheaves.
      la:
      - type: citation
        text: '125:1 In converténdo Dóminus captivitátem Sion: * facti sumus sicut consoláti:'
      - type: citation
        text: '125:2a Tunc replétum est gáudio os nostrum: * et lingua nostra exsultatióne.'
      - type: citation
        text: '125:2b Tunc dicent inter gentes: * Magnificávit Dóminus fácere cum eis.'
      - type: citation
        text: '125:3 Magnificávit Dóminus fácere nobíscum: * facti sumus lætántes.'
      - type: citation
        text: 125:4 Convérte, Dómine, captivitátem nostram, * sicut torrens in Austro.
      - type: citation
        text: 125:5 Qui séminant in lácrimis, * in exsultatióne metent.
      - type: citation
        text: 125:6a Eúntes ibant et flebant, * mitténtes sémina sua.
      - type: citation
        text: 125:6b Veniéntes autem vénient cum exsultatióne, * portántes manípulos suos.
      en2:
      - type: citation
        text: '125:1 When the Lord turned back the captivity of Zion: * we became like those who are comforted.'
      - type: citation
        text: '125:2a Then our mouth was filled with joy: * and our tongue with exultation.'
      - type: citation
        text: '125:2b Then they shall say among the nations: * The Lord has done great things for them.'
      - type: citation
        text: '125:3 The Lord has done great things for us: * we are become joyful.'
      - type: citation
        text: 125:4 Turn back, O Lord, our captivity, * as a torrent in the south.
      - type: citation
        text: 125:5 Those who sow in tears * shall reap with exultation.
      - type: citation
        text: 125:6a Going they went and wept, * casting their seeds.
      - type: citation
        text: 125:6b But coming they shall come with exultation, * carrying their sheaves.
  psalm.126-1a-nisi-d-minus-dific-verit-domum-in-vanum-l-afd2ecad38:
    role: psalm
    content:
      en:
      - type: citation
        text: 126:1a Unless the Lord build the house, * they labour in vain that build it.
      - type: citation
        text: 126:1b Unless the Lord keep the city, * he watcheth in vain that keepeth it.
      - type: citation
        text: 126:2a It is vain for you to rise before light, * rise ye after you have sitten, you that eat the bread of sorrow.
      - type: citation
        text: '126:2b When he shall give sleep to his beloved, * (3) behold the inheritance of the Lord are children: the reward, the fruit of the womb.'
      - type: citation
        text: 126:4 As arrows in the hand of the mighty, * so the children of them that have been shaken.
      - type: citation
        text: 126:5 Blessed is the man that hath filled the desire with them; * he shall not be confounded when he shall speak to his enemies in the gate.
      la:
      - type: citation
        text: 126:1a Nisi Dóminus ædificáverit domum, * in vanum laboravérunt qui ædíficant eam.
      - type: citation
        text: 126:1b Nisi Dóminus custodíerit civitátem, * frustra vígilat qui custódit eam.
      - type: citation
        text: '126:2a Vanum est vobis ante lucem súrgere: * súrgite postquam sedéritis, qui manducátis panem dolóris.'
      - type: citation
        text: '126:2b Cum déderit diléctis suis somnum: * (3) ecce heréditas Dómini fílii: merces, fructus ventris.'
      - type: citation
        text: '126:4 Sicut sagíttæ in manu poténtis: * ita fílii excussórum.'
      - type: citation
        text: '126:5 Beátus vir, qui implévit desidérium suum ex ipsis: * non confundétur cum loquétur inimícis suis in porta.'
      en2:
      - type: citation
        text: 126:1a Unless the Lord builds the house, * those who build it have labored in vain.
      - type: citation
        text: 126:1b Unless the Lord guards the city, * he who keeps it watches in vain.
      - type: citation
        text: '126:2a It is vain for you to rise before the light: * rise after you have sat down, you who eat the bread of sorrow.'
      - type: citation
        text: '126:2b When he shall have given sleep to his beloved: * (3) behold, the inheritance of the Lord is children: a reward, the fruit of the womb.'
      - type: citation
        text: '126:4 Like arrows in the hand of the mighty: * so the children of those who have been shaken out.'
      - type: citation
        text: '126:5 Blessed is the man who has filled his desire with them: * he shall not be confounded when he speaks to his enemies in the gate.'
  psalm.127-1-be-ti-omnes-qui-timent-d-minum-qui-mbulant-f1403fa64c:
    role: psalm
    content:
      en:
      - type: citation
        text: '127:1 Blessed are all they that fear the Lord: * that walk in his ways.'
      - type: citation
        text: '127:2 For thou shalt eat the labours of thy hands: * blessed art thou, and it shall be well with thee.'
      - type: citation
        text: 127:3a Thy wife as a fruitful vine, * on the sides of thy house.
      - type: citation
        text: 127:3b Thy children as olive plants, * round about thy table.
      - type: citation
        text: 127:4 Behold, thus shall the man be blessed * that feareth the Lord.
      - type: citation
        text: '127:5 May the Lord bless thee out of Sion: * and mayst thou see the good things of Jerusalem all the days of thy life.'
      - type: citation
        text: 127:6 And mayst thou see thy children’s children, * peace upon Israel.
      la:
      - type: citation
        text: 127:1 Beáti, omnes, qui timent Dóminum, * qui ámbulant in viis eius.
      - type: citation
        text: '127:2 Labóres mánuum tuárum quia manducábis: * beátus es, et bene tibi erit.'
      - type: citation
        text: 127:3a Uxor tua sicut vitis abúndans, * in latéribus domus tuæ.
      - type: citation
        text: 127:3b Fílii tui sicut novéllæ olivárum, * in circúitu mensæ tuæ.
      - type: citation
        text: 127:4 Ecce, sic benedicétur homo, * qui timet Dóminum.
      - type: citation
        text: '127:5 Benedícat tibi Dóminus ex Sion: * et vídeas bona Ierúsalem ómnibus diébus vitæ tuæ.'
      - type: citation
        text: 127:6 Et vídeas fílios filiórum tuórum, * pacem super Israël.
      en2:
      - type: citation
        text: 127:1 Blessed are all who fear the Lord, * who walk in his ways.
      - type: citation
        text: '127:2 For you shall eat the labors of your hands: * blessed are you, and it shall be well with you.'
      - type: citation
        text: 127:3a Your wife shall be as a fruitful vine, * on the sides of your house.
      - type: citation
        text: 127:3b Your children shall be as olive plants, * round about your table.
      - type: citation
        text: 127:4 Behold, thus shall the man be blessed, * who fears the Lord.
      - type: citation
        text: '127:5 May the Lord bless you from Zion: * and may you see the good things of Jerusalem all the days of your life.'
      - type: citation
        text: 127:6 And may you see the children of your children, * peace upon Israel.
  psalm.128-1-s-pe-expugnav-runt-me-a-iuvent-te-mea-dica-91a01856d2:
    role: psalm
    content:
      en:
      - type: citation
        text: 128:1 Often have they fought against me from my youth, * let Israel now say.
      - type: citation
        text: '128:2 Often have they fought against me from my youth: * but they could not prevail over me.'
      - type: citation
        text: '128:3 The wicked have wrought upon my back: * they have lengthened their iniquity.'
      - type: citation
        text: '128:4 The Lord who is just will cut the necks of sinners: * (5) let them all be confounded and turned back that hate Sion.'
      - type: citation
        text: '128:6 Let them be as grass upon the tops of houses: * which withereth before it be plucked up:'
      - type: citation
        text: '128:7 Wherewith the mower filleth not his hand: * nor he that gathereth sheaves his bosom.'
      - type: citation
        text: '128:8 And they that passed by have not said: The blessing of the Lord be upon you: * we have blessed you in the name of the Lord.'
      la:
      - type: citation
        text: 128:1 Sæpe expugnavérunt me a iuventúte mea, * dicat nunc Israël.
      - type: citation
        text: '128:2 Sæpe expugnavérunt me a iuventúte mea: * étenim non potuérunt mihi.'
      - type: citation
        text: '128:3 Supra dorsum meum fabricavérunt peccatóres: * prolongavérunt iniquitátem suam.'
      - type: citation
        text: '128:4 Dóminus iustus concídit cervíces peccatórum: * (5) confundántur et convertántur retrórsum omnes, qui odérunt Sion.'
      - type: citation
        text: '128:6 Fiant sicut fænum tectórum: * quod priúsquam evellátur, exáruit:'
      - type: citation
        text: 128:7 De quo non implévit manum suam qui metit, * et sinum suum qui manípulos cólligit.
      - type: citation
        text: '128:8 Et non dixérunt qui præteríbant: Benedíctio Dómini super vos: * benedíximus vobis in nómine Dómini.'
      en2:
      - type: citation
        text: 128:1 Often have they fought against me from my youth, * let Israel now say.
      - type: citation
        text: '128:2 Often have they fought against me from my youth: * yet they could not prevail against me.'
      - type: citation
        text: '128:3 The sinners have built upon my back: * they have prolonged their iniquity.'
      - type: citation
        text: '128:4 The Lord who is just will cut the necks of sinners: * (5) let all who hate Zion be confounded and turned backward.'
      - type: citation
        text: '128:6 Let them be as the grass on the housetops: * which withers before it is plucked up:'
      - type: citation
        text: 128:7 Of which the reaper has not filled his hand, * nor the harvester his bosom.
      - type: citation
        text: '128:8 And those who passed by have not said: The blessing of the Lord be upon you: * we have blessed you in the name of the Lord.'
  psalm.129-1-de-prof-ndis-clam-vi-ad-te-d-mine-2a-d-min-957c9530b4:
    role: psalm
    content:
      en:
      - type: citation
        text: '129:1 Out of the depths I have cried to thee, O Lord: * (2a) Lord, hear my voice.'
      - type: citation
        text: 129:2b Let thy ears be attentive * to the voice of my supplication.
      - type: citation
        text: '129:3 If thou, O Lord, wilt mark iniquities: * Lord, who shall stand it.'
      - type: citation
        text: '129:4a For with thee there is merciful forgiveness: * and by reason of thy law, I have waited for thee, O Lord.'
      - type: citation
        text: '129:4b My soul hath relied on his word: * (5) my soul hath hoped in the Lord.'
      - type: citation
        text: 129:6 From the morning watch even until night, * let Israel hope in the Lord.
      - type: citation
        text: '129:7 Because with the Lord there is mercy: * and with him plentiful redemption.'
      - type: citation
        text: 129:8 And he shall redeem Israel * from all his iniquities.
      la:
      - type: citation
        text: '129:1 De profúndis clamávi ad te, Dómine: * (2a) Dómine, exáudi vocem meam:'
      - type: citation
        text: 129:2b Fiant aures tuæ intendéntes, * in vocem deprecatiónis meæ.
      - type: citation
        text: '129:3 Si iniquitátes observáveris, Dómine: * Dómine, quis sustinébit?'
      - type: citation
        text: '129:4a Quia apud te propitiátio est: * et propter legem tuam sustínui te, Dómine.'
      - type: citation
        text: '129:4b Sustínuit ánima mea in verbo eius: * (5) sperávit ánima mea in Dómino.'
      - type: citation
        text: '129:6 A custódia matutína usque ad noctem: * speret Israël in Dómino.'
      - type: citation
        text: '129:7 Quia apud Dóminum misericórdia: * et copiósa apud eum redémptio.'
      - type: citation
        text: 129:8 Et ipse rédimet Israël, * ex ómnibus iniquitátibus eius.
      en2:
      - type: citation
        text: '129:1 Out of the depths I have cried to you, O Lord: * (2a) Lord, hear my voice:'
      - type: citation
        text: 129:2b Let your ears be attentive * to the voice of my supplication.
      - type: citation
        text: '129:3 If you, O Lord, shall mark iniquities: * Lord, who shall stand?'
      - type: citation
        text: '129:4a For with you there is propitiation: * and for the sake of your law I have waited for you, O Lord.'
      - type: citation
        text: '129:4b My soul has waited upon his word: * (5) my soul has hoped in the Lord.'
      - type: citation
        text: '129:6 From the morning watch even until night: * let Israel hope in the Lord.'
      - type: citation
        text: '129:7 For with the Lord there is mercy: * and with him is plentiful redemption.'
      - type: citation
        text: 129:8 And he shall redeem Israel, * from all his iniquities.
  psalm.13-1a-dixit-ins-piens-in-corde-suo-non-est-deus-3a16fa6275:
    role: psalm
    content:
      en:
      - type: citation
        text: '13:1a The fool hath said in his heart: * there is no God.'
      - type: citation
        text: '13:1b They are corrupt, and are become abominable in their ways: * there is none that doth good, no not one.'
      - type: citation
        text: 13:2 The Lord hath looked down from heaven upon the children of men, * to see if there be any that understand and seek God.
      - type: citation
        text: '13:3a They are all gone aside, they are become unprofitable together: * there is none that doth good: no not one.'
      - type: citation
        text: '13:3b Their throat is an open sepulchre; † with their tongues they acted deceitfully: * the poison of asps is under their lips.'
      - type: citation
        text: 13:3c Their mouth is full of cursing and bitterness; * their feet are swift to shed blood.
      - type: citation
        text: '13:3d Destruction and unhappiness in their ways; † and the way of peace they have not known: * there is no fear of God before their eyes.'
      - type: citation
        text: 13:4 Shall not all they know that work iniquity, * who devour my people as they eat bread?
      - type: citation
        text: '13:5 They have not called upon the Lord: * there have they trembled for fear, where there was no fear.'
      - type: citation
        text: '13:6 For the Lord is in the just generation: † you have confounded the counsel of the poor man; * but the Lord is his hope.'
      - type: citation
        text: 13:7 Who shall give out of Sion the salvation of Israel? * when the Lord shall have turned away the captivity of his people, Jacob shall rejoice, and Israel shall be glad.
      la:
      - type: citation
        text: '13:1a Dixit insípiens in corde suo: * non est Deus.'
      - type: citation
        text: '13:1b Corrúpti sunt, et abominábiles facti sunt in stúdiis suis: * non est qui fáciat bonum, non est usque ad unum.'
      - type: citation
        text: 13:2 Dóminus de cælo prospéxit super fílios hóminum, * ut vídeat si est intéllegens, aut requírens Deum.
      - type: citation
        text: '13:3a Omnes declinavérunt, simul inútiles facti sunt: * non est qui fáciat bonum, non est usque ad unum.'
      - type: citation
        text: '13:3b Sepúlcrum patens est guttur eórum: † linguis suis dolóse agébant * venénum áspidum sub lábiis eórum.'
      - type: citation
        text: '13:3c Quorum os maledictióne et amaritúdine plenum est: * velóces pedes eórum ad effundéndum sánguinem.'
      - type: citation
        text: '13:3d Contrítio et infelícitas in viis eórum, † et viam pacis non cognovérunt: * non est timor Dei ante óculos eórum.'
      - type: citation
        text: 13:4 Nonne cognóscent omnes qui operántur iniquitátem, * qui dévorant plebem meam sicut escam panis?
      - type: citation
        text: 13:5 Dóminum non invocavérunt, * illic trepidavérunt timóre, ubi non erat timor.
      - type: citation
        text: '13:6 Quóniam Dóminus in generatióne iusta est, † consílium ínopis confudístis: * quóniam Dóminus spes eius est.'
      - type: citation
        text: 13:7 Quis dabit ex Sion salutáre Israël? * cum avérterit Dóminus captivitátem plebis suæ, exsultábit Iacob, et lætábitur Israël.
      en2:
      - type: citation
        text: '13:1a The fool has said in his heart: * there is no God.'
      - type: citation
        text: '13:1b They are corrupt, and they have become abominable in their pursuits: * there is none who does good, there is not even one.'
      - type: citation
        text: 13:2 The Lord has looked down from heaven upon the children of men, * to see if there is any one who understands, or who seeks God.
      - type: citation
        text: '13:3a All have gone aside, they are become unprofitable together: * there is none who does good, there is not even one.'
      - type: citation
        text: '13:3b Their throat is an open sepulchre: † they acted deceitfully with their tongues: * the poison of asps is under their lips.'
      - type: citation
        text: '13:3c Whose mouth is full of cursing and bitterness: * their feet are swift to shed blood.'
      - type: citation
        text: '13:3d Destruction and misery are in their ways, † and the way of peace they have not known: * there is no fear of God before their eyes.'
      - type: citation
        text: 13:4 Will they never learn, all who work iniquity, * who devour my people as they eat bread?
      - type: citation
        text: 13:5 They have not called upon the Lord, * there they trembled with fear, where there was no fear.
      - type: citation
        text: '13:6 For the Lord is in the righteous generation, † you have confounded the counsel of the poor: * for the Lord is his hope.'
      - type: citation
        text: 13:7 Who will give from Zion the salvation of Israel? * When the Lord shall have turned away the captivity of his people, Jacob shall rejoice, and Israel shall be glad.
  psalm.130-1a-d-mine-non-est-exalt-tum-cor-meum-neque-e-6e35c85fba:
    role: psalm
    content:
      en:
      - type: citation
        text: '130:1a O Lord, my heart is not exalted: * nor are my eyes lofty.'
      - type: citation
        text: 130:1b Neither have I walked in great matters, * nor in wonderful things above me.
      - type: citation
        text: '130:2a If I was not humbly minded, * but exalted my soul:'
      - type: citation
        text: 130:2b As a child that is weaned is towards his mother, * so reward in my soul.
      - type: citation
        text: 130:3 Let Israel hope in the Lord, * from henceforth now and for ever.
      la:
      - type: citation
        text: '130:1a Dómine, non est exaltátum cor meum: * neque eláti sunt óculi mei.'
      - type: citation
        text: '130:1b Neque ambulávi in magnis: * neque in mirabílibus super me.'
      - type: citation
        text: '130:2a Si non humíliter sentiébam: * sed exaltávi ánimam meam:'
      - type: citation
        text: 130:2b Sicut ablactátus est super matre sua, * ita retribútio in ánima mea.
      - type: citation
        text: 130:3 Speret Israël in Dómino, * ex hoc nunc et usque in sǽculum.
      en2:
      - type: citation
        text: '130:1a Lord, my heart is not exalted: * nor are my eyes lifted up.'
      - type: citation
        text: '130:1b Nor have I walked in great things: * nor in wonders above me.'
      - type: citation
        text: '130:2a If I was not humbly minded: * but have exalted my soul:'
      - type: citation
        text: 130:2b As a weaned child upon his mother, * so reward in my soul.
      - type: citation
        text: 130:3 Let Israel hope in the Lord, * from this time forth and for ever.
  psalm.131-1-mem-nto-d-mine-david-et-omnis-mansuet-dini-a3a2ae8a5a:
    role: psalm
    content:
      en:
      - type: citation
        text: 131:1 Lord, remember David, * and all his meekness.
      - type: citation
        text: '131:2 How he swore to the Lord, * he vowed a vow to the God of Jacob:'
      - type: citation
        text: '131:3 If I shall enter into the tabernacle of my house: * if I shall go up into the bed wherein I lie:'
      - type: citation
        text: 131:4 If I shall give sleep to my eyes, * or slumber to my eyelids,
      - type: citation
        text: '131:5 Or rest to my temples: until I find out a place for the Lord, * a tabernacle for the God of Jacob.'
      - type: citation
        text: '131:6 Behold we have heard of it in Ephrata: * we have found it in the fields of the wood.'
      - type: citation
        text: '131:7 We will go into his tabernacle: * we will adore in the place where his feet stood.'
      - type: citation
        text: '131:8 Arise, O Lord, into thy resting place: * thou and the ark, which thou hast sanctified.'
      - type: citation
        text: '131:9 Let thy priests be clothed with justice: * and let thy saints rejoice.'
      - type: citation
        text: 131:10 For thy servant David’s sake, * turn not away the face of thy anointed.
      - type: citation
        text: '131:11 The Lord hath sworn truth to David, and he will not make it void: * of the fruit of thy womb I will set upon thy throne.'
      - type: citation
        text: '131:12a If thy children will keep my covenant, * and these my testimonies which I shall teach them:'
      - type: citation
        text: 131:12b Their children also for evermore * shall sit upon thy throne.
      - type: citation
        text: '131:13 For the Lord hath chosen Sion: * he hath chosen it for his dwelling.'
      - type: citation
        text: '131:14 This is my rest for ever and ever: * here will I dwell, for I have chosen it.'
      - type: citation
        text: '131:15 Blessing I will bless her widow: * I will satisfy her poor with bread.'
      - type: citation
        text: '131:16 I will clothe her priests with salvation: * and her saints shall rejoice with exceeding great joy.'
      - type: citation
        text: '131:17 There will I bring forth a horn to David: * I have prepared a lamp for my anointed.'
      - type: citation
        text: '131:18 His enemies I will clothe with confusion: * but upon him shall my sanctification flourish.'
      la:
      - type: citation
        text: '131:1 Meménto, Dómine, David, * et omnis mansuetúdinis eius:'
      - type: citation
        text: '131:2 Sicut iurávit Dómino, * votum vovit Deo Iacob:'
      - type: citation
        text: '131:3 Si introíero in tabernáculum domus meæ, * si ascéndero in lectum strati mei:'
      - type: citation
        text: '131:4 Si dédero somnum óculis meis, * et pálpebris meis dormitatiónem:'
      - type: citation
        text: '131:5 Et réquiem tempóribus meis: donec invéniam locum Dómino, * tabernáculum Deo Iacob.'
      - type: citation
        text: '131:6 Ecce, audívimus eam in Éphrata: * invénimus eam in campis silvæ.'
      - type: citation
        text: '131:7 Introíbimus in tabernáculum eius: * adorábimus in loco, ubi stetérunt pedes eius.'
      - type: citation
        text: 131:8 Surge, Dómine, in réquiem tuam, * tu et arca sanctificatiónis tuæ.
      - type: citation
        text: '131:9 Sacerdótes tui induántur iustítiam: * et sancti tui exsúltent.'
      - type: citation
        text: 131:10 Propter David, servum tuum, * non avértas fáciem Christi tui.
      - type: citation
        text: '131:11 Iurávit Dóminus David veritátem, et non frustrábitur eam: * De fructu ventris tui ponam super sedem tuam.'
      - type: citation
        text: '131:12a Si custodíerint fílii tui testaméntum meum, * et testimónia mea hæc, quæ docébo eos:'
      - type: citation
        text: 131:12b Et fílii eórum usque in sǽculum, * sedébunt super sedem tuam.
      - type: citation
        text: '131:13 Quóniam elégit Dóminus Sion: * elégit eam in habitatiónem sibi.'
      - type: citation
        text: '131:14 Hæc réquies mea in sǽculum sǽculi: * hic habitábo quóniam elégi eam.'
      - type: citation
        text: '131:15 Víduam eius benedícens benedícam: * páuperes eius saturábo pánibus.'
      - type: citation
        text: '131:16 Sacerdótes eius índuam salutári: * et sancti eius exsultatióne exsultábunt.'
      - type: citation
        text: 131:17 Illuc prodúcam cornu David, * parávi lucérnam Christo meo.
      - type: citation
        text: '131:18 Inimícos eius índuam confusióne: * super ipsum autem efflorébit sanctificátio mea.'
      en2:
      - type: citation
        text: '131:1 Remember, O Lord, David, * and all his meekness:'
      - type: citation
        text: '131:2 As he swore to the Lord, * he vowed a vow to the God of Jacob:'
      - type: citation
        text: '131:3 If I enter into the tabernacle of my house, * if I go up into the bed where I lie:'
      - type: citation
        text: '131:4 If I give sleep to my eyes, * and slumber to my eyelids:'
      - type: citation
        text: '131:5 And rest to my temples: until I find a place for the Lord, * a tabernacle for the God of Jacob.'
      - type: citation
        text: '131:6 Behold, we heard of it in Ephrata: * we found it in the fields of the wood.'
      - type: citation
        text: '131:7 We will go into his tabernacle: * we will adore in the place where his feet stood.'
      - type: citation
        text: 131:8 Arise, O Lord, into your resting place, * you and the ark of your sanctification.
      - type: citation
        text: '131:9 Let your priests be clothed with justice: * and let your holy ones rejoice.'
      - type: citation
        text: 131:10 For the sake of David your servant, * turn not away the face of your Anointed.
      - type: citation
        text: '131:11 The Lord has sworn to David in truth, and he will not make it void: * Of the fruit of your womb I will set upon your throne.'
      - type: citation
        text: '131:12a If your children will keep my covenant, * and my testimonies which I shall teach them:'
      - type: citation
        text: 131:12b Their children also for evermore, * shall sit upon your throne.
      - type: citation
        text: '131:13 For the Lord has chosen Zion: * he has chosen it for his dwelling.'
      - type: citation
        text: '131:14 This is my resting place for ever and ever: * here will I dwell, for I have chosen it.'
      - type: citation
        text: '131:15 Blessing I will bless her widow: * I will satisfy her poor with bread.'
      - type: citation
        text: '131:16 I will clothe her priests with salvation: * and her holy ones shall rejoice with exceeding great joy.'
      - type: citation
        text: 131:17 There will I bring forth a horn to David, * I have prepared a lamp for my Anointed.
      - type: citation
        text: '131:18 His enemies I will clothe with confusion: * but upon him shall my sanctification flourish.'
  psalm.132-1-ecce-quam-bonum-et-quam-iuc-ndum-habit-re-4c4f40f041:
    role: psalm
    content:
      en:
      - type: citation
        text: '132:1 Behold how good and how pleasant it is * for brethren to dwell together in unity:'
      - type: citation
        text: 132:2a Like the precious ointment on the head, * that ran down upon the beard, the beard of Aaron,
      - type: citation
        text: '132:2b Which ran down to the skirt of his garment: * (3a) as the dew of Hermon, which descendeth upon mount Sion.'
      - type: citation
        text: 132:3b For there the Lord hath commanded blessing, * and life for evermore.
      la:
      - type: citation
        text: '132:1 Ecce quam bonum et quam iucúndum, * habitáre fratres in unum:'
      - type: citation
        text: 132:2a Sicut unguéntum in cápite, * quod descéndit in barbam, barbam Aaron,
      - type: citation
        text: '132:2b Quod descéndit in oram vestiménti eius: * (3a) sicut ros Hermon, qui descéndit in montem Sion.'
      - type: citation
        text: 132:3b Quóniam illic mandávit Dóminus benedictiónem, * et vitam usque in sǽculum.
      en2:
      - type: citation
        text: '132:1 Behold how good and how pleasant it is, * for brethren to dwell in unity:'
      - type: citation
        text: 132:2a Like the precious ointment on the head, * that ran down upon the beard, the beard of Aaron,
      - type: citation
        text: '132:2b Which ran down to the hem of his garment: * (3a) like the dew of Hermon, which descends upon mount Zion.'
      - type: citation
        text: 132:3b For there the Lord has commanded blessing, * and life for evermore.
  psalm.133-1a-ecce-nunc-bened-cite-d-minum-omnes-servi-6fe41449eb:
    role: psalm
    content:
      en:
      - type: citation
        text: '133:1a Behold now bless ye the Lord, * all ye servants of the Lord:'
      - type: citation
        text: 133:1b Who stand in the house of the Lord, * in the courts of the house of our God.
      - type: citation
        text: 133:2 In the nights lift up your hands to the holy places, * and bless ye the Lord.
      - type: citation
        text: 133:3 May the Lord out of Sion bless thee, * he that made heaven and earth.
      la:
      - type: citation
        text: '133:1a Ecce nunc benedícite Dóminum, * omnes servi Dómini:'
      - type: citation
        text: 133:1b Qui statis in domo Dómini, * in átriis domus Dei nostri.
      - type: citation
        text: 133:2 In nóctibus extóllite manus vestras in sancta, * et benedícite Dóminum.
      - type: citation
        text: 133:3 Benedícat te Dóminus ex Sion, * qui fecit cælum et terram.
      en2:
      - type: citation
        text: '133:1a Behold, now bless the Lord, * all you servants of the Lord:'
      - type: citation
        text: 133:1b Who stand in the house of the Lord, * in the courts of the house of our God.
      - type: citation
        text: 133:2 In the nights lift up your hands to the holy place, * and bless the Lord.
      - type: citation
        text: 133:3 May the Lord bless you from Zion, * who made heaven and earth.
  psalm.134-1-laud-te-nomen-d-mini-laud-te-servi-d-minum-95cb8aa976:
    role: psalm
    content:
      en:
      - type: citation
        text: '134:1 Praise ye the name of the Lord: * O you his servants, praise the Lord:'
      - type: citation
        text: 134:2 You that stand in the house of the Lord, * in the courts of the house of our God.
      - type: citation
        text: '134:3 Praise ye the Lord, for the Lord is good: * sing ye to his name, for it is sweet.'
      - type: citation
        text: '134:4 For the Lord hath chosen Jacob unto himself: * Israel for his own possession.'
      - type: citation
        text: 134:5 For I have known that the Lord is great, * and our God is above all gods.
      - type: citation
        text: 134:6 Whatsoever the Lord pleased he hath done, in heaven, in earth, * in the sea, and in all the deeps.
      - type: citation
        text: '134:7 He bringeth up clouds from the end of the earth: * he hath made lightnings for the rain.'
      - type: citation
        text: '134:8 He bringeth forth winds out of his stores: * He slew the firstborn of Egypt from man even unto beast.'
      - type: citation
        text: '134:9 He sent forth signs and wonders in the midst of thee, O Egypt: * upon Pharao, and upon all his servants.'
      - type: citation
        text: '134:10 He smote many nations, * and slew mighty kings:'
      - type: citation
        text: 134:11 Sehon king of the Amorrhites, and Og king of Basan, * and all the kingdoms of Chanaan.
      - type: citation
        text: 134:12 And gave their land for an inheritance, * for an inheritance to his people Israel.
      - type: citation
        text: '134:13 Thy name, O Lord, is for ever: * thy memorial, O Lord, unto all generations.'
      - type: citation
        text: 134:14 For the Lord will judge his people, * and will be entreated in favour of his servants.
      - type: citation
        text: 134:15 The idols of the Gentiles are silver and gold, * the works of men’s hands.
      - type: citation
        text: '134:16 They have a mouth, but they speak not: * they have eyes, but they see not.'
      - type: citation
        text: '134:17 They have ears, but they hear not: * neither is there any breath in their mouths.'
      - type: citation
        text: '134:18 Let them that make them be like to them: * and every one that trusteth in them.'
      - type: citation
        text: '134:19 Bless the Lord, O house of Israel: * bless the Lord, O house of Aaron.'
      - type: citation
        text: '134:20 Bless the Lord, O house of Levi: * you that fear the Lord, bless the Lord.'
      - type: citation
        text: 134:21 Blessed be the Lord out of Sion, * who dwelleth in Jerusalem.
      la:
      - type: citation
        text: 134:1 Laudáte nomen Dómini, * laudáte, servi, Dóminum.
      - type: citation
        text: 134:2 Qui statis in domo Dómini, * in átriis domus Dei nostri.
      - type: citation
        text: '134:3 Laudáte Dóminum, quia bonus Dóminus: * psállite nómini eius, quóniam suáve.'
      - type: citation
        text: 134:4 Quóniam Iacob elégit sibi Dóminus, * Israël in possessiónem sibi.
      - type: citation
        text: 134:5 Quia ego cognóvi quod magnus est Dóminus, * et Deus noster præ ómnibus diis.
      - type: citation
        text: 134:6 Ómnia quæcúmque vóluit, Dóminus fecit in cælo, et in terra, * in mari, et in ómnibus abýssis.
      - type: citation
        text: '134:7 Edúcens nubes ab extrémo terræ: * fúlgura in plúviam fecit.'
      - type: citation
        text: '134:8 Qui prodúcit ventos de thesáuris suis: * qui percússit primogénita Ægýpti ab hómine usque ad pecus.'
      - type: citation
        text: '134:9 Et misit signa, et prodígia in médio tui, Ægýpte: * in Pharaónem, et in omnes servos eius.'
      - type: citation
        text: '134:10 Qui percússit gentes multas: * et occídit reges fortes:'
      - type: citation
        text: 134:11 Sehon, regem Amorrhæórum, et Og, regem Basan, * et ómnia regna Chánaan.
      - type: citation
        text: 134:12 Et dedit terram eórum hereditátem, * hereditátem Israël, pópulo suo.
      - type: citation
        text: '134:13 Dómine, nomen tuum in ætérnum: * Dómine, memoriále tuum in generatiónem et generatiónem.'
      - type: citation
        text: '134:14 Quia iudicábit Dóminus pópulum suum: * et in servis suis deprecábitur.'
      - type: citation
        text: 134:15 Simulácra géntium argéntum, et aurum, * ópera mánuum hóminum.
      - type: citation
        text: '134:16 Os habent, et non loquéntur: * óculos habent, et non vidébunt.'
      - type: citation
        text: '134:17 Aures habent, et non áudient: * neque enim est spíritus in ore ipsórum.'
      - type: citation
        text: '134:18 Símiles illis fiant qui fáciunt ea: * et omnes qui confídunt in eis.'
      - type: citation
        text: '134:19 Domus Israël, benedícite Dómino: * domus Aaron, benedícite Dómino.'
      - type: citation
        text: '134:20 Domus Levi, benedícite Dómino: * qui timétis Dóminum, benedícite Dómino.'
      - type: citation
        text: 134:21 Benedíctus Dóminus ex Sion, * qui hábitat in Ierúsalem.
      en2:
      - type: citation
        text: 134:1 Praise the name of the Lord, * praise the Lord, O you his servants.
      - type: citation
        text: 134:2 Who stand in the house of the Lord, * in the courts of the house of our God.
      - type: citation
        text: '134:3 Praise the Lord, for the Lord is good: * sing praise to his name, for it is sweet.'
      - type: citation
        text: '134:4 For the Lord has chosen Jacob for himself: * Israel for his own possession.'
      - type: citation
        text: 134:5 For I know that the Lord is great, * and our God is above all gods.
      - type: citation
        text: 134:6 Whatsoever the Lord pleased, he has done in heaven and on earth, * in the sea, and in all the deep places.
      - type: citation
        text: '134:7 Who brings up clouds from the ends of the earth: * he has made lightnings for the rain.'
      - type: citation
        text: '134:8 Who brings forth the winds from his treasuries: * who struck the firstborn of Egypt, from man even to beast.'
      - type: citation
        text: '134:9 And he sent signs and wonders in the midst of you, O Egypt: * upon Pharaoh, and upon all his servants.'
      - type: citation
        text: '134:10 Who struck many nations: * and slew mighty kings:'
      - type: citation
        text: 134:11 Sihon, king of the Amorites, and Og, king of Bashan, * and all the kingdoms of Canaan.
      - type: citation
        text: 134:12 And gave their land for a heritage, * a heritage to Israel his people.
      - type: citation
        text: '134:13 O Lord, your name endures for ever: * O Lord, your memorial through all generations.'
      - type: citation
        text: '134:14 For the Lord will judge his people: * and will be entreated in favor of his servants.'
      - type: citation
        text: 134:15 The idols of the nations are silver and gold, * the works of the hands of men.
      - type: citation
        text: '134:16 They have a mouth and speak not: * they have eyes and see not.'
      - type: citation
        text: '134:17 They have ears and hear not: * neither is there any breath in their mouths.'
      - type: citation
        text: '134:18 Let them that make them be like them: * and all that trust in them.'
      - type: citation
        text: '134:19 Bless the Lord, O house of Israel: * bless the Lord, O house of Aaron.'
      - type: citation
        text: '134:20 Bless the Lord, O house of Levi: * you that fear the Lord, bless the Lord.'
      - type: citation
        text: 134:21 Blessed be the Lord from Zion, * who dwells in Jerusalem.
  psalm.135-1-confit-mini-d-mino-qu-niam-bonus-qu-niam-i-df45408036:
    role: psalm
    content:
      en:
      - type: citation
        text: '135:1 Praise the Lord, for he is good: * for his mercy endureth for ever.'
      - type: citation
        text: '135:2 Praise ye the God of gods: * for his mercy endureth for ever.'
      - type: citation
        text: '135:3 Praise ye the Lord of lords: * for his mercy endureth for ever.'
      - type: citation
        text: '135:4 Who alone doth great wonders: * for his mercy endureth for ever.'
      - type: citation
        text: '135:5 Who made the heavens in understanding: * for his mercy endureth for ever.'
      - type: citation
        text: '135:6 Who established the earth above the waters: * for his mercy endureth for ever.'
      - type: citation
        text: '135:7 Who made the great lights: * for his mercy endureth for ever.'
      - type: citation
        text: '135:8 The sun to rule the day: * for his mercy endureth for ever.'
      - type: citation
        text: '135:9 The moon and the stars to rule the night: * for his mercy endureth for ever.'
      - type: citation
        text: '135:10 Who smote Egypt with their firstborn: * for his mercy endureth for ever.'
      - type: citation
        text: '135:11 Who brought out Israel from among them: * for his mercy endureth for ever.'
      - type: citation
        text: '135:12 With a mighty hand and with a stretched out arm: * for his mercy endureth for ever.'
      - type: citation
        text: '135:13 Who divided the Red sea into parts: * for his mercy endureth for ever.'
      - type: citation
        text: '135:14 And brought out Israel through the midst thereof: * for his mercy endureth for ever.'
      - type: citation
        text: '135:15 And overthrew Pharao and his host in the Red sea: * for his mercy endureth for ever.'
      - type: citation
        text: '135:16 Who led his people through the desert: * for his mercy endureth for ever.'
      - type: citation
        text: '135:17 Who smote great kings: * for his mercy endureth for ever.'
      - type: citation
        text: '135:18 And slew strong kings: * for his mercy endureth for ever.'
      - type: citation
        text: '135:19 Sehon king of the Amorrhites: * for his mercy endureth for ever.'
      - type: citation
        text: '135:20 And Og king of Basan: * for his mercy endureth for ever.'
      - type: citation
        text: '135:21 And he gave their land for an inheritance: * for his mercy endureth for ever.'
      - type: citation
        text: '135:22 For an inheritance to his servant Israel: * for his mercy endureth for ever.'
      - type: citation
        text: '135:23 For he was mindful of us in our affliction: * for his mercy endureth for ever.'
      - type: citation
        text: '135:24 And he redeemed us from our enemies: * for his mercy endureth for ever.'
      - type: citation
        text: '135:25 Who giveth food to all flesh: * for his mercy endureth for ever.'
      - type: citation
        text: '135:26 Give glory to the God of heaven: * for his mercy endureth for ever.'
      - type: citation
        text: '135:26 Give glory to the Lord of lords: * for his mercy endureth for ever.'
      la:
      - type: citation
        text: '135:1 Confitémini Dómino quóniam bonus: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:2 Confitémini Deo deórum: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:3 Confitémini Dómino dominórum: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:4 Qui facit mirabília magna solus: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:5 Qui fecit cælos in intelléctu: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:6 Qui firmávit terram super aquas: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:7 Qui fecit luminária magna: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:8 Solem in potestátem diéi: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:9 Lunam, et stellas in potestátem noctis: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:10 Qui percússit Ægýptum cum primogénitis eórum: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:11 Qui edúxit Israël de médio eórum: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:12 In manu poténti, et brácchio excélso: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:13 Qui divísit Mare Rubrum in divisiónes: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:14 Et edúxit Israël per médium eius: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:15 Et excússit Pharaónem, et virtútem eius in Mari Rubro: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:16 Qui tradúxit pópulum suum per desértum: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:17 Qui percússit reges magnos: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:18 Et occídit reges fortes: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:19 Sehon, regem Amorrhæórum: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:20 Et Og, regem Basan: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:21 Et dedit terram eórum hereditátem: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:22 Hereditátem Israël, servo suo: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:23 Quia in humilitáte nostra memor fuit nostri: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:24 Et redémit nos ab inimícis nostris: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:25 Qui dat escam omni carni: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:26 Confitémini Deo cæli: * quóniam in ætérnum misericórdia eius.'
      - type: citation
        text: '135:26 Confitémini Dómino dominórum: * quóniam in ætérnum misericórdia eius.'
      en2:
      - type: citation
        text: '135:1 Give praise to the Lord, for he is good: * for his mercy endures for ever.'
      - type: citation
        text: '135:2 Give praise to the God of gods: * for his mercy endures for ever.'
      - type: citation
        text: '135:3 Give praise to the Lord of lords: * for his mercy endures for ever.'
      - type: citation
        text: '135:4 Who alone does great wonders: * for his mercy endures for ever.'
      - type: citation
        text: '135:5 Who made the heavens with understanding: * for his mercy endures for ever.'
      - type: citation
        text: '135:6 Who established the earth upon the waters: * for his mercy endures for ever.'
      - type: citation
        text: '135:7 Who made the great lights: * for his mercy endures for ever.'
      - type: citation
        text: '135:8 The sun to rule over the day: * for his mercy endures for ever.'
      - type: citation
        text: '135:9 The moon and stars to rule over the night: * for his mercy endures for ever.'
      - type: citation
        text: '135:10 Who struck Egypt with their firstborn: * for his mercy endures for ever.'
      - type: citation
        text: '135:11 Who brought out Israel from among them: * for his mercy endures for ever.'
      - type: citation
        text: '135:12 With a strong hand and an outstretched arm: * for his mercy endures for ever.'
      - type: citation
        text: '135:13 Who divided the Red Sea into parts: * for his mercy endures for ever.'
      - type: citation
        text: '135:14 And brought Israel through the midst of it: * for his mercy endures for ever.'
      - type: citation
        text: '135:15 And overthrew Pharaoh and his army in the Red Sea: * for his mercy endures for ever.'
      - type: citation
        text: '135:16 Who led his people through the desert: * for his mercy endures for ever.'
      - type: citation
        text: '135:17 Who struck great kings: * for his mercy endures for ever.'
      - type: citation
        text: '135:18 And slew mighty kings: * for his mercy endures for ever.'
      - type: citation
        text: '135:19 Sihon, king of the Amorites: * for his mercy endures for ever.'
      - type: citation
        text: '135:20 And Og, king of Bashan: * for his mercy endures for ever.'
      - type: citation
        text: '135:21 And gave their land for a heritage: * for his mercy endures for ever.'
      - type: citation
        text: '135:22 A heritage to Israel his servant: * for his mercy endures for ever.'
      - type: citation
        text: '135:23 For he was mindful of us in our humiliation: * for his mercy is eternal.'
      - type: citation
        text: '135:24 And he redeemed us from our enemies: * for his mercy is eternal.'
      - type: citation
        text: '135:25 He gives food to all flesh: * for his mercy is eternal.'
      - type: citation
        text: '135:26 Confess to the God of heaven: * for his mercy is eternal.'
      - type: citation
        text: '135:26 Confess to the Lord of lords: * for his mercy is eternal.'
  psalm.136-1-super-fl-mina-babyl-nis-illic-s-dimus-et-f-48d6141f90:
    role: psalm
    content:
      en:
      - type: citation
        text: '136:1 Upon the rivers of Babylon, there we sat and wept: * when we remembered Sion:'
      - type: citation
        text: 136:2 On the willows in the midst thereof * we hung up our instruments.
      - type: citation
        text: 136:3 For there they that led us into captivity required of us * the words of songs.
      - type: citation
        text: '136:3 And they that carried us away, said: * Sing ye to us a hymn of the songs of Sion.'
      - type: citation
        text: 136:4 How shall we sing the song of the Lord * in a strange land?
      - type: citation
        text: 136:5 If I forget thee, O Jerusalem, * let my right hand be forgotten.
      - type: citation
        text: '136:6 Let my tongue cleave to my jaws, * if I do not remember thee:'
      - type: citation
        text: 136:6 If I make not Jerusalem * the beginning of my joy.
      - type: citation
        text: '136:7 Remember, O Lord, the children of Edom, * in the day of Jerusalem:'
      - type: citation
        text: '136:7 Who say: Rase it, rase it, * even to the foundation thereof.'
      - type: citation
        text: '136:8 O daughter of Babylon, miserable: * blessed shall he be who shall repay thee thy payment which thou hast paid us.'
      - type: citation
        text: 136:9 Blessed be he that shall take * and dash thy little ones against the rock.
      la:
      - type: citation
        text: '136:1 Super flúmina Babylónis, illic sédimus et flévimus: * cum recordarémur Sion:'
      - type: citation
        text: 136:2 In salícibus in médio eius, * suspéndimus órgana nostra.
      - type: citation
        text: '136:3 Quia illic interrogavérunt nos, qui captívos duxérunt nos, * verba cantiónum:'
      - type: citation
        text: '136:3 Et qui abduxérunt nos: * Hymnum cantáte nobis de cánticis Sion.'
      - type: citation
        text: 136:4 Quómodo cantábimus cánticum Dómini * in terra aliéna?
      - type: citation
        text: 136:5 Si oblítus fúero tui, Ierúsalem, * oblivióni detur déxtera mea.
      - type: citation
        text: '136:6 Adhǽreat lingua mea fáucibus meis, * si non memínero tui:'
      - type: citation
        text: 136:6 Si non proposúero Ierúsalem, * in princípio lætítiæ meæ.
      - type: citation
        text: '136:7 Memor esto, Dómine, filiórum Edom, * in die Ierúsalem:'
      - type: citation
        text: '136:7 Qui dicunt: Exinaníte, exinaníte * usque ad fundaméntum in ea.'
      - type: citation
        text: '136:8 Fília Babylónis mísera: * beátus, qui retríbuet tibi retributiónem tuam, quam retribuísti nobis.'
      - type: citation
        text: 136:9 Beátus, qui tenébit, * et allídet párvulos tuos ad petram.
      en2:
      - type: citation
        text: '136:1 Above the rivers of Babylon, there we sat and wept: * while we remembered Zion.'
      - type: citation
        text: 136:2 By the willow trees, in their midst, * we hung up our instruments.
      - type: citation
        text: '136:3 For, in that place, those who led us into captivity questioned us about the words of the songs: * '
      - type: citation
        text: '136:3 And those who carried us away: * Sing for us a hymn from the songs of Zion.'
      - type: citation
        text: 136:4 How can we sing a song of the Lord * in a foreign land?
      - type: citation
        text: 136:5 If I ever forget you, Jerusalem, * let my right hand be forgotten.
      - type: citation
        text: '136:6 May my tongue adhere to my jaws, * if I do not remember you:'
      - type: citation
        text: 136:6 If I do not set Jerusalem first, * as the beginning of my joy.
      - type: citation
        text: '136:7 O Lord, call to mind the sons of Edom, * in the day of Jerusalem:'
      - type: citation
        text: '136:7 Who say: Despoil it, despoil it * even to its foundation.'
      - type: citation
        text: '136:8 O daughter of Babylon, have pity: * blessed is he who will repay you with your payment, which you have paid to us.'
      - type: citation
        text: 136:9 Blessed is he who will take hold, * and dash your little ones against the rock.
  psalm.137-1-confit-bor-tibi-d-mine-in-toto-corde-meo-q-5ef5cefb0b:
    role: psalm
    content:
      en:
      - type: citation
        text: '137:1 I will praise thee, O Lord, with my whole heart: * for thou hast heard the words of my mouth.'
      - type: citation
        text: '137:2 I will sing praise to thee in the sight of the Angels: * I will worship towards thy holy temple, and I will give glory to thy name.'
      - type: citation
        text: '137:3 For thy mercy, and for thy truth: * for thou hast magnified thy holy name'
      - type: citation
        text: '137:4 In what day soever I shall call upon thee, hear me: * thou shalt multiply strength in my soul.'
      - type: citation
        text: '137:5 May all the kings of the earth give glory to thee: * for they have heard all the words of thy mouth.'
      - type: citation
        text: '137:6 And let them sing in the ways of the Lord: * for great is the glory of the Lord.'
      - type: citation
        text: '137:7 For the Lord is high, and looketh on the low: * and the high he knoweth afar off.'
      - type: citation
        text: '137:8 If I shall walk in the midst of tribulation, thou wilt quicken me: * and thou hast stretched forth thy hand against the wrath of my enemies: and thy right hand hath saved me.'
      - type: citation
        text: '137:9 The Lord will repay for me: * thy mercy, O Lord, endureth for ever: O despise not the works of thy hands.'
      la:
      - type: citation
        text: '137:1 Confitébor tibi, Dómine, in toto corde meo: * quóniam audísti verba oris mei.'
      - type: citation
        text: '137:2 In conspéctu Angelórum psallam tibi: * adorábo ad templum sanctum tuum, et confitébor nómini tuo.'
      - type: citation
        text: '137:3 Super misericórdia tua, et veritáte tua: * quóniam magnificásti super omne, nomen sanctum tuum.'
      - type: citation
        text: '137:4 In quacúmque die invocávero te, exáudi me: * multiplicábis in ánima mea virtútem.'
      - type: citation
        text: '137:5 Confiteántur tibi, Dómine, omnes reges terræ: * quia audiérunt ómnia verba oris tui:'
      - type: citation
        text: '137:6 Et cantent in viis Dómini: * quóniam magna est glória Dómini.'
      - type: citation
        text: '137:7 Quóniam excélsus Dóminus, et humília réspicit: * et alta a longe cognóscit.'
      - type: citation
        text: '137:8 Si ambulávero in médio tribulatiónis, vivificábis me: * et super iram inimicórum meórum extendísti manum tuam, et salvum me fecit déxtera tua.'
      - type: citation
        text: '137:9 Dóminus retríbuet pro me: * Dómine, misericórdia tua in sǽculum: ópera mánuum tuárum ne despícias.'
      en2:
      - type: citation
        text: '137:1 O Lord, I will confess to you with my whole heart: * for you have heard the words of my mouth.'
      - type: citation
        text: '137:2 I will adore before your holy temple, and I will confess your name: * it is above your mercy and your truth.'
      - type: citation
        text: '137:3 On whatever day I call upon you, hear me: * you will multiply virtue in my soul.'
      - type: citation
        text: '137:4 On whatever day that I will call upon you: hear me. * you will multiply virtue in my soul.'
      - type: citation
        text: '137:5 May all the kings of the earth confess to you, O Lord: * for they have heard all the words of your mouth:'
      - type: citation
        text: '137:6 And let them sing in accordance with the ways of the Lord: * for great is the glory of the Lord.'
      - type: citation
        text: '137:7 For the Lord is exalted, and he looks with favor on the humble: * but the lofty he knows from a distance.'
      - type: citation
        text: '137:8 If I wander into the midst of tribulation, you will revive me: * and you extended your hand against the wrath of my enemies, and your right hand saved me.'
      - type: citation
        text: '137:9 The Lord will provide retribution on my behalf: * O Lord, your mercy is forever; do not disdain the works of your hands.'
  psalm.138-1-d-mine-prob-sti-me-et-cognov-sti-me-2-tu-c-e837549ba3:
    role: psalm
    content:
      en:
      - type: citation
        text: '138:1 Lord, thou hast proved me, and known me: * (2) thou hast known my sitting down, and my rising up.'
      - type: citation
        text: '138:3 Thou hast understood my thoughts afar off: * my path and my life thou hast searched out.'
      - type: citation
        text: '138:4 And thou hast foreseen all my ways: * for there is no speech on my tongue.'
      - type: citation
        text: '138:5 Behold, O Lord, thou hast known all things, the last and those of old: * thou hast formed me, and hast laid thy hand upon me.'
      - type: citation
        text: '138:6 Thy knowledge is become wonderful to me: * it is high, and I cannot reach to it.'
      - type: citation
        text: 138:7 Whither shall I go from thy spirit? * or whither shall I flee from thy face?
      - type: citation
        text: '138:8 If I ascend into heaven, thou art there: * if I descend into hell, thou art present.'
      - type: citation
        text: '138:9 If I take my wings early in the morning, * and dwell in the uttermost parts of the sea:'
      - type: citation
        text: '138:10 Even there also shall thy hand lead me: * and thy right hand shall hold me.'
      - type: citation
        text: '138:11 And I said: Perhaps darkness shall cover me: * and night shall be my light in my pleasures.'
      - type: citation
        text: '138:12 But darkness shall not be dark to thee, † and night shall be light as the day: * the darkness thereof, and the light thereof are alike to thee.'
      - type: citation
        text: '138:13 For thou hast possessed my reins: * thou hast protected me from my mother’s womb.'
      - type: citation
        text: '138:14 I will praise thee, for thou art fearfully magnified: ‡ wonderful are thy works, * and my soul knoweth right well.'
      - type: citation
        text: '138:15 My bone is not hidden from thee, which thou hast made in secret: * and my substance in the lower parts of the earth.'
      - type: citation
        text: '138:16 Thy eyes did see my imperfect being, † and in thy book all shall be written: * days shall be formed, and no one in them.'
      - type: citation
        text: '138:17 But to me thy friends, O God, are made exceedingly honourable: * their principality is exceedingly strengthened.'
      - type: citation
        text: '138:18 I will number them, and they shall be multiplied above the sand: * I rose up and am still with thee.'
      - type: citation
        text: '138:19 If thou wilt kill the wicked, O God: * ye men of blood, depart from me:'
      - type: citation
        text: '138:20 Because you say in thought: * They shall receive thy cities in vain.'
      - type: citation
        text: '138:21 Have I not hated them, O Lord, that hated thee: * and pined away because of thy enemies?'
      - type: citation
        text: '138:22 I have hated them with a perfect hatred: * and they are become enemies to me.'
      - type: citation
        text: '138:23 Prove me, O God, and know my heart: * examine me, and know my paths.'
      - type: citation
        text: '138:24 And see if there be in me the way of iniquity: * and lead me in the eternal way.'
      la:
      - type: citation
        text: '138:1 Dómine, probásti me, et cognovísti me: * (2) tu cognovísti sessiónem meam, et resurrectiónem meam.'
      - type: citation
        text: '138:3 Intellexísti cogitatiónes meas de longe: * sémitam meam, et funículum meum investigásti.'
      - type: citation
        text: '138:4 Et omnes vias meas prævidísti: * quia non est sermo in lingua mea.'
      - type: citation
        text: '138:5 Ecce, Dómine, tu cognovísti ómnia novíssima, et antíqua: * tu formásti me, et posuísti super me manum tuam.'
      - type: citation
        text: '138:6 Mirábilis facta est sciéntia tua ex me: * confortáta est, et non pótero ad eam.'
      - type: citation
        text: 138:7 Quo ibo a spíritu tuo? * et quo a fácie tua fúgiam?
      - type: citation
        text: '138:8 Si ascéndero in cælum, tu illic es: * si descéndero in inférnum, ades.'
      - type: citation
        text: '138:9 Si súmpsero pennas meas dilúculo, * et habitávero in extrémis maris:'
      - type: citation
        text: '138:10 Étenim illuc manus tua dedúcet me: * et tenébit me déxtera tua.'
      - type: citation
        text: '138:11 Et dixi: Fórsitan ténebræ conculcábunt me: * et nox illuminátio mea in delíciis meis.'
      - type: citation
        text: '138:12 Quia ténebræ non obscurabúntur a te, † et nox sicut dies illuminábitur: * sicut ténebræ eius, ita et lumen eius.'
      - type: citation
        text: '138:13 Quia tu possedísti renes meos: * suscepísti me de útero matris meæ.'
      - type: citation
        text: '138:14 Confitébor tibi quia terribíliter magnificátus es: ‡ mirabília ópera tua, * et ánima mea cognóscit nimis.'
      - type: citation
        text: '138:15 Non est occultátum os meum a te, quod fecísti in occúlto: * et substántia mea in inferióribus terræ.'
      - type: citation
        text: '138:16 Imperféctum meum vidérunt óculi tui, † et in libro tuo omnes scribéntur: * dies formabúntur, et nemo in eis.'
      - type: citation
        text: '138:17 Mihi autem nimis honorificáti sunt amíci tui, Deus: * nimis confortátus est principátus eórum.'
      - type: citation
        text: '138:18 Dinumerábo eos, et super arénam multiplicabúntur: * exsurréxi, et adhuc sum tecum.'
      - type: citation
        text: '138:19 Si occíderis, Deus, peccatóres: * viri sánguinum, declináte a me:'
      - type: citation
        text: '138:20 Quia dícitis in cogitatióne: * Accípient in vanitáte civitátes tuas.'
      - type: citation
        text: 138:21 Nonne qui odérunt te, Dómine, óderam? * et super inimícos tuos tabescébam?
      - type: citation
        text: '138:22 Perfécto ódio óderam illos: * et inimíci facti sunt mihi.'
      - type: citation
        text: '138:23 Proba me, Deus, et scito cor meum: * intérroga me, et cognósce sémitas meas.'
      - type: citation
        text: '138:24 Et vide, si via iniquitátis in me est: * et deduc me in via ætérna.'
      en2:
      - type: citation
        text: '138:1 O Lord, you have examined me, and you have known me: * (2) you have known my sitting down and my rising up again.'
      - type: citation
        text: '138:3 You have understood my thoughts from afar: * my path and my fate, you have investigated.'
      - type: citation
        text: '138:4 And you have foreseen all my ways: * for there is no word in my tongue.'
      - type: citation
        text: '138:5 Behold, O Lord, you have known all things: the newest and the very old: * you have formed me, and you have placed your hand over me.'
      - type: citation
        text: '138:6 Your knowledge has become a wonder to me: * it has been reinforced, and I am not able to prevail against it.'
      - type: citation
        text: 138:7 Where will I go from your Spirit? * and where will I flee from your face?
      - type: citation
        text: '138:8 If I ascend into heaven, you are there: * if I descend into Hell, you are near.'
      - type: citation
        text: '138:9 If I assume my feathers in early morning, * and dwell in the utmost parts of the sea:'
      - type: citation
        text: '138:10 Even there, your hand will lead me forth: * and your right hand will hold me.'
      - type: citation
        text: '138:11 And I said: Perhaps darkness will overwhelm me: * and the night will be my illumination, to my delight.'
      - type: citation
        text: '138:12 But darkness will not be impenetrable to you, † and night will illuminate like the day: * for just as its darkness is, so also is its light.'
      - type: citation
        text: '138:13 For you have possessed my temperament: * you have supported me from the womb of my mother.'
      - type: citation
        text: '138:14 I will confess to you, for you have been magnified terribly: ‡ your works are miraculous, * and my soul knows this exceedingly well.'
      - type: citation
        text: '138:15 My bone, which you have made in secret, has not been hidden from you: * and my substance is in accord with the lower parts of the earth.'
      - type: citation
        text: '138:16 Your eyes saw my imperfection, † and all this shall be written in your book: * days will be formed, and no one shall be in them.'
      - type: citation
        text: '138:17 But to me, O God, your friends have been greatly honored: * their first ruler has been exceedingly strengthened.'
      - type: citation
        text: '138:18 I will number them, and they will be more numerous than the sand: * I rose up, and I am still with you.'
      - type: citation
        text: '138:19 O God, if only you would cut down sinners: * you men of blood, depart from me.'
      - type: citation
        text: '138:20 For you say in thought: * They will accept your cities in vain.'
      - type: citation
        text: 138:21 Have I not hated those who hated you, O Lord? * and wasted away because of your enemies?
      - type: citation
        text: '138:22 I have hated them with a perfect hatred: * and they have become enemies to me.'
      - type: citation
        text: '138:23 Examine me, O God, and know my heart: * question me, and know my paths.'
      - type: citation
        text: '138:24 And see if there might be in me the way of iniquity: * and lead me in the way of eternity.'
  psalm.139-2-ripe-me-d-mine-ab-h-mine-malo-a-viro-in-qu-a40d0f3cbf:
    role: psalm
    content:
      en:
      - type: citation
        text: '139:2 Deliver me, O Lord, from the evil man: * rescue me from the unjust man.'
      - type: citation
        text: '139:3 Who have devised iniquities in their hearts: * all the day long they designed battles.'
      - type: citation
        text: '139:4 They have sharpened their tongues like a serpent: * the venom of asps is under their lips.'
      - type: citation
        text: '139:5 Keep me, O Lord, from the hand of the wicked: * and from unjust men deliver me.'
      - type: citation
        text: '139:5 Who have proposed to supplant my steps: * the proud have hidden a net for me.'
      - type: citation
        text: '139:6 And they have stretched out cords for a snare: * they have laid for me a stumbling block by the wayside.'
      - type: citation
        text: '139:7 I said to the Lord: Thou art my God: * hear, O Lord, the voice of my supplication.'
      - type: citation
        text: '139:8 O Lord, Lord, the strength of my salvation: * thou hast overshadowed my head in the day of battle.'
      - type: citation
        text: '139:9 Give me not up, O Lord, from my desire to the wicked: * they have plotted against me; do not thou forsake me, lest they should triumph.'
      - type: citation
        text: '139:10 The head of them compassing me about: * the labour of their lips shall overwhelm them.'
      - type: citation
        text: '139:11 Burning coals shall fall upon them; thou wilt cast them down into the fire: * in miseries they shall not be able to stand.'
      - type: citation
        text: '139:12 A man full of tongue shall not be established in the earth: * evil shall catch the unjust man unto destruction.'
      - type: citation
        text: 139:13 I know that the Lord will do justice to the needy, * and will revenge the poor.
      - type: citation
        text: '139:14 But as for the just, they shall give glory to thy name: * and the upright shall dwell with thy countenance.'
      la:
      - type: citation
        text: '139:2 Éripe me, Dómine, ab hómine malo: * a viro iníquo éripe me.'
      - type: citation
        text: '139:3 Qui cogitavérunt iniquitátes in corde: * tota die constituébant prǽlia.'
      - type: citation
        text: '139:4 Acuérunt linguas suas sicut serpéntis: * venénum áspidum sub lábiis eórum.'
      - type: citation
        text: '139:5 Custódi me, Dómine, de manu peccatóris: * et ab homínibus iníquis éripe me.'
      - type: citation
        text: '139:5 Qui cogitavérunt supplantáre gressus meos: * abscondérunt supérbi láqueum mihi:'
      - type: citation
        text: '139:6 Et funes extendérunt in láqueum: * iuxta iter scándalum posuérunt mihi.'
      - type: citation
        text: '139:7 Dixi Dómino: Deus meus es tu: * exáudi, Dómine, vocem deprecatiónis meæ.'
      - type: citation
        text: '139:8 Dómine, Dómine, virtus salútis meæ: * obumbrásti super caput meum in die belli.'
      - type: citation
        text: '139:9 Ne tradas me, Dómine, a desidério meo peccatóri: * cogitavérunt contra me, ne derelínquas me, ne forte exalténtur.'
      - type: citation
        text: '139:10 Caput circúitus eórum: * labor labiórum ipsórum opériet eos.'
      - type: citation
        text: '139:11 Cadent super eos carbónes, in ignem deícies eos: * in misériis non subsístent.'
      - type: citation
        text: '139:12 Vir linguósus non dirigétur in terra: * virum iniústum mala cápient in intéritu.'
      - type: citation
        text: '139:13 Cognóvi quia fáciet Dóminus iudícium ínopis: * et vindíctam páuperum.'
      - type: citation
        text: '139:14 Verúmtamen iusti confitebúntur nómini tuo: * et habitábunt recti cum vultu tuo.'
      en2:
      - type: citation
        text: '139:2 Rescue me, O Lord, from the evil man: * rescue me from the iniquitous man.'
      - type: citation
        text: '139:3 Those who have devised iniquities in their hearts: * all day long they constructed conflicts.'
      - type: citation
        text: '139:4 They have sharpened their tongues like a serpent: * the venom of asps is under their lips.'
      - type: citation
        text: '139:5 Preserve me, O Lord, from the hand of the sinner: * and rescue me from men of iniquity.'
      - type: citation
        text: '139:5 Those who have decided to supplant my steps: * the arrogant have hidden a snare for me:'
      - type: citation
        text: '139:6 And they have stretched out cords for a snare: * they have placed a stumbling block for me near the road.'
      - type: citation
        text: '139:7 I said to the Lord: You are my God: * O Lord, heed the voice of my supplication.'
      - type: citation
        text: '139:8 Lord, O Lord, the strength of my salvation: * you have overshadowed my head in the day of war.'
      - type: citation
        text: '139:9 O Lord, do not hand me over to the sinner by my desire: * they have plotted against me; do not abandon me, lest they should triumph.'
      - type: citation
        text: '139:10 The head of those who encompass me: * the labor of their lips will overwhelm them.'
      - type: citation
        text: '139:11 Burning coals will fall upon them; you will cast them down into the fire: * into miseries that they will not be able to withstand.'
      - type: citation
        text: '139:12 A talkative man will not be guided aright upon the earth: * evils will drag the unjust man unto utter ruin.'
      - type: citation
        text: '139:13 I know that the Lord will accomplish justice for the needy: * and vindication for the poor.'
      - type: citation
        text: '139:14 So then, truly, the just will confess your name: * and the upright will dwell with your countenance.'
  psalm.14-1-d-mine-quis-habit-bit-in-tabern-culo-tuo-au-501b84eada:
    role: psalm
    content:
      en:
      - type: citation
        text: 14:1 Lord, who shall dwell in thy tabernacle? * or who shall rest in thy holy hill?
      - type: citation
        text: '14:2 He that walketh without blemish, * and worketh justice:'
      - type: citation
        text: '14:3a He that speaketh truth in his heart, * who hath not used deceit in his tongue:'
      - type: citation
        text: '14:3b Nor hath done evil to his neighbour: * nor taken up a reproach against his neighbours.'
      - type: citation
        text: '14:4a In his sight the malignant is brought to nothing: * but he glorifieth them that fear the Lord:'
      - type: citation
        text: '14:4b He that sweareth to his neighbour, and deceiveth not; * (5a) He that hath not put out his money to usury, nor taken bribes against the innocent:'
      - type: citation
        text: 14:5b He that doth these things, * shall not be moved for ever.
      la:
      - type: citation
        text: 14:1 Dómine, quis habitábit in tabernáculo tuo? * aut quis requiéscet in monte sancto tuo?
      - type: citation
        text: '14:2 Qui ingréditur sine mácula, * et operátur iustítiam:'
      - type: citation
        text: '14:3a Qui lóquitur veritátem in corde suo, * qui non egit dolum in lingua sua:'
      - type: citation
        text: 14:3b Nec fecit próximo suo malum, * et oppróbrium non accépit advérsus próximos suos.
      - type: citation
        text: '14:4a Ad níhilum dedúctus est in conspéctu eius malígnus: * timéntes autem Dóminum gloríficat:'
      - type: citation
        text: 14:4b Qui iurat próximo suo, et non décipit, * (5a) qui pecúniam suam non dedit ad usúram, et múnera super innocéntem non accépit.
      - type: citation
        text: '14:5b Qui facit hæc: * non movébitur in ætérnum.'
      en2:
      - type: citation
        text: 14:1 O Lord, who will dwell in your tabernacle? * or who will rest on your holy mountain?
      - type: citation
        text: '14:2 He who walks without blemish, * and who works justice:'
      - type: citation
        text: '14:3a He who speaks the truth in his heart, * who has not acted deceitfully with his tongue:'
      - type: citation
        text: 14:3b Nor has he done evil to his neighbor, * and has not taken up a reproach against his neighbors.
      - type: citation
        text: '14:4a In his sight, the malicious one has been reduced to nothing: * but he glorifies those who fear the Lord.'
      - type: citation
        text: 14:4b He who swears to his neighbor and does not deceive, * (5a) he who has not given his money in usury, nor accepted bribes against the innocent.
      - type: citation
        text: '14:5b He who does these things: * will be undisturbed for eternity.'
  psalm.140-1-d-mine-clam-vi-ad-te-ex-udi-me-int-nde-voc-c305bfd4ad:
    role: psalm
    content:
      en:
      - type: citation
        text: '140:1 I have cried to thee, O Lord, hear me: * hearken to my voice, when I cry to thee.'
      - type: citation
        text: 140:2 Let my prayer be directed as incense in thy sight; * the lifting up of my hands, as evening sacrifice.
      - type: citation
        text: '140:3 Set a watch, O Lord, before my mouth: * and a door round about my lips.'
      - type: citation
        text: 140:4 Incline not my heart to evil words; * to make excuses in sins.
      - type: citation
        text: '140:4 With men that work iniquity: * and I will not communicate with the choicest of them.'
      - type: citation
        text: '140:5 The just man shall correct me in mercy, and shall reprove me: * but let not the oil of the sinner fatten my head.'
      - type: citation
        text: '140:6 For my prayer also shall still be against the things with which they are well pleased: * their judges falling upon the rock have been swallowed up.'
      - type: citation
        text: '140:7 They shall hear my words, for they have prevailed: * as when the thickness of the earth is broken up upon the ground.'
      - type: citation
        text: '140:8 Our bones are scattered by the side of hell. * But to thee, O Lord, Lord, are my eyes: in thee have I put my trust, take not away my soul.'
      - type: citation
        text: 140:9 Keep me from the snare, which they have laid for me, * and from the stumbling blocks of them that work iniquity.
      - type: citation
        text: '140:10 The wicked shall fall in his net: * I am alone until I pass.'
      la:
      - type: citation
        text: '140:1 Dómine, clamávi ad te, exáudi me: * inténde voci meæ, cum clamávero ad te.'
      - type: citation
        text: '140:2 Dirigátur orátio mea sicut incénsum in conspéctu tuo: * elevátio mánuum meárum sacrifícium vespertínum.'
      - type: citation
        text: '140:3 Pone, Dómine, custódiam ori meo: * et óstium circumstántiæ lábiis meis.'
      - type: citation
        text: 140:4 Non declínes cor meum in verba malítiæ, * ad excusándas excusatiónes in peccátis.
      - type: citation
        text: '140:4 Cum homínibus operántibus iniquitátem: * et non communicábo cum eléctis eórum.'
      - type: citation
        text: '140:5 Corrípiet me iustus in misericórdia, et increpábit me: * óleum autem peccatóris non impínguet caput meum.'
      - type: citation
        text: '140:6 Quóniam adhuc et orátio mea in beneplácitis eórum: * absórpti sunt iuncti petræ iúdices eórum.'
      - type: citation
        text: '140:7 Áudient verba mea quóniam potuérunt: * sicut crassitúdo terræ erúpta est super terram.'
      - type: citation
        text: '140:8 Dissipáta sunt ossa nostra secus inférnum: * quia ad te, Dómine, Dómine, óculi mei: in te sperávi, non áuferas ánimam meam.'
      - type: citation
        text: '140:9 Custódi me a láqueo, quem statuérunt mihi: * et a scándalis operántium iniquitátem.'
      - type: citation
        text: '140:10 Cadent in retiáculo eius peccatóres: * singuláriter sum ego donec tránseam.'
      en2:
      - type: citation
        text: '140:1 O Lord, I have cried out to you, hear me: * attend to my voice, when I cry out to you.'
      - type: citation
        text: '140:2 Let my prayer be guided like incense in your sight: * the lifting up of my hands, like the evening sacrifice.'
      - type: citation
        text: '140:3 O Lord, station a guard over my mouth: * and a door enclosing my lips.'
      - type: citation
        text: 140:4 Do not turn aside my heart to words of malice, * to making excuses for sins.
      - type: citation
        text: '140:4 With men who work iniquity: * and I will not communicate, even with the best of them.'
      - type: citation
        text: '140:5 The just one will correct me with mercy, and he will rebuke me: * but do not allow the oil of the sinner to fatten my head.'
      - type: citation
        text: '140:6 For my prayer will still be toward their good will: * their judges have been engulfed, joined to the rocks.'
      - type: citation
        text: '140:7 They will hear my words, which have prevailed: * as when the lava of the earth has erupted above ground.'
      - type: citation
        text: '140:8 Our bones have been scattered beside Hell: * for Lord, O Lord, my eyes look to you; in you I have hoped; do not take away my soul.'
      - type: citation
        text: '140:9 Protect me from the snare that they have set up for me: * and from the scandals of those who work iniquity.'
      - type: citation
        text: '140:10 The sinners shall fall into his net: * I am alone until I pass away.'
  psalm.141-2-voce-mea-ad-d-minum-clam-vi-voce-mea-ad-d-da31995d98:
    role: psalm
    content:
      en:
      - type: citation
        text: '141:2 I cried to the Lord with my voice: * with my voice I made supplication to the Lord.'
      - type: citation
        text: '141:3 In his sight I pour out my prayer, * and before him I declare my trouble:'
      - type: citation
        text: 141:4 When my spirit failed me, * then thou knewest my paths.
      - type: citation
        text: 141:4 In this way wherein I walked, * they have hidden a snare for me.
      - type: citation
        text: 141:5 I looked on my right hand, and beheld, * and there was no one that would know me.
      - type: citation
        text: '141:5 Flight hath failed me: * and there is no one that hath regard to my soul.'
      - type: citation
        text: '141:6 I cried to thee, O Lord: * I said: Thou art my hope, my portion in the land of the living.'
      - type: citation
        text: '141:7 Attend to my supplication: * for I am brought very low.'
      - type: citation
        text: 141:7 Deliver me from my persecutors; * for they are stronger than I.
      - type: citation
        text: '141:8 Bring my soul out of prison, that I may praise thy name: * the just wait for me, until thou reward me.'
      la:
      - type: citation
        text: '141:2 Voce mea ad Dóminum clamávi: * voce mea ad Dóminum deprecátus sum:'
      - type: citation
        text: 141:3 Effúndo in conspéctu eius oratiónem meam, * et tribulatiónem meam ante ipsum pronúntio.
      - type: citation
        text: 141:4 In deficiéndo ex me spíritum meum, * et tu cognovísti sémitas meas.
      - type: citation
        text: 141:4 In via hac, qua ambulábam, * abscondérunt láqueum mihi.
      - type: citation
        text: '141:5 Considerábam ad déxteram, et vidébam: * et non erat qui cognósceret me.'
      - type: citation
        text: 141:5 Périit fuga a me, * et non est qui requírat ánimam meam.
      - type: citation
        text: '141:6 Clamávi ad te, Dómine, * dixi: Tu es spes mea, pórtio mea in terra vivéntium.'
      - type: citation
        text: '141:7 Inténde ad deprecatiónem meam: * quia humiliátus sum nimis.'
      - type: citation
        text: '141:7 Líbera me a persequéntibus me: * quia confortáti sunt super me.'
      - type: citation
        text: '141:8 Educ de custódia ánimam meam ad confiténdum nómini tuo: * me exspéctant iusti, donec retríbuas mihi.'
      en2:
      - type: citation
        text: '141:2 With my voice I cried to the Lord: * with my voice I besought the Lord:'
      - type: citation
        text: 141:3 I pour out my prayer before him, * and declare my tribulation in his sight.
      - type: citation
        text: 141:4 When my spirit failed within me, * even then you knew my paths.
      - type: citation
        text: 141:4 In this way, where I was walking, * they hid a snare for me.
      - type: citation
        text: '141:5 I looked to the right, and beheld: * and there was none who would know me.'
      - type: citation
        text: 141:5 Flight perished from me, * and there is none who seeks after my soul.
      - type: citation
        text: '141:6 I cried to you, O Lord, * I said: You are my hope, my portion in the land of the living.'
      - type: citation
        text: '141:7 Attend to my supplication: * for I am brought very low.'
      - type: citation
        text: '141:7 Deliver me from those who persecute me: * for they are too strong for me.'
      - type: citation
        text: '141:8 Bring my soul out of prison to praise your name: * the just await me, until you reward me.'
  psalm.142-1-d-mine-ex-udi-orati-nem-meam-uribus-p-rcip-175ff3b46b:
    role: psalm
    content:
      en:
      - type: citation
        text: '142:1 Hear, O Lord, my prayer: give ear to my supplication in thy truth: * hear me in thy justice.'
      - type: citation
        text: '142:2 And enter not into judgment with thy servant: * for in thy sight no man living shall be justified.'
      - type: citation
        text: '142:3a For the enemy hath persecuted my soul: * he hath brought down my life to the earth.'
      - type: citation
        text: '142:3b He hath made me to dwell in darkness as those that have been dead of old: * (4) and my spirit is in anguish within me: my heart within me is troubled.'
      - type: citation
        text: '142:5 I remembered the days of old, I meditated on all thy works: * I meditated upon the works of thy hands.'
      - type: citation
        text: '142:6 I stretched forth my hands to thee: * my soul is as earth without water unto thee.'
      - type: citation
        text: '142:7a Hear me speedily, O Lord: * my spirit hath fainted away.'
      - type: citation
        text: 142:7b Turn not away thy face from me, * lest I be like unto them that go down into the pit.
      - type: citation
        text: 142:8a Cause me to hear thy mercy in the morning; * for in thee have I hoped.
      - type: citation
        text: '142:8b Make the way known to me, wherein I should walk: * for I have lifted up my soul to thee.'
      - type: citation
        text: '142:9 Deliver me from my enemies, O Lord, to thee have I fled: * (10a) teach me to do thy will, for thou art my God.'
      - type: citation
        text: '142:10b Thy good spirit shall lead me into the right land: * (11a) for thy name’s sake, O Lord, thou wilt quicken me in thy justice.'
      - type: citation
        text: '142:11b Thou wilt bring my soul out of trouble: * (12a) and in thy mercy thou wilt destroy my enemies.'
      - type: citation
        text: '142:12b And thou wilt cut off all them that afflict my soul: * for I am thy servant.'
      la:
      - type: citation
        text: '142:1 Dómine, exáudi oratiónem meam: áuribus pércipe obsecratiónem meam in veritáte tua: * exáudi me in tua iustítia.'
      - type: citation
        text: '142:2 Et non intres in iudícium cum servo tuo: * quia non iustificábitur in conspéctu tuo omnis vivens.'
      - type: citation
        text: '142:3a Quia persecútus est inimícus ánimam meam: * humiliávit in terra vitam meam.'
      - type: citation
        text: '142:3b Collocávit me in obscúris sicut mórtuos sǽculi: * (4) et anxiátus est super me spíritus meus, in me turbátum est cor meum.'
      - type: citation
        text: '142:5 Memor fui diérum antiquórum, meditátus sum in ómnibus opéribus tuis: * in factis mánuum tuárum meditábar.'
      - type: citation
        text: '142:6 Expándi manus meas ad te: * ánima mea sicut terra sine aqua tibi.'
      - type: citation
        text: '142:7a Velóciter exáudi me, Dómine: * defécit spíritus meus.'
      - type: citation
        text: '142:7b Non avértas fáciem tuam a me: * et símilis ero descendéntibus in lacum.'
      - type: citation
        text: '142:8a Audítam fac mihi mane misericórdiam tuam: * quia in te sperávi.'
      - type: citation
        text: '142:8b Notam fac mihi viam, in qua ámbulem: * quia ad te levávi ánimam meam.'
      - type: citation
        text: '142:9 Éripe me de inimícis meis, Dómine, ad te confúgi: * (10a) doce me fácere voluntátem tuam, quia Deus meus es tu.'
      - type: citation
        text: '142:10b Spíritus tuus bonus dedúcet me in terram rectam: * (11a) propter nomen tuum, Dómine, vivificábis me, in æquitáte tua.'
      - type: citation
        text: '142:11b Edúces de tribulatióne ánimam meam: * (12a) et in misericórdia tua dispérdes inimícos meos.'
      - type: citation
        text: '142:12b Et perdes omnes, qui tríbulant ánimam meam: * quóniam ego servus tuus sum.'
      en2:
      - type: citation
        text: '142:1 Lord, hear my prayer: give ear to my supplication in your truth: * hear me in your justice.'
      - type: citation
        text: '142:2 And enter not into judgment with your servant: * for in your sight no living person shall be justified.'
      - type: citation
        text: '142:3a For the enemy has persecuted my soul: * he has brought my life down to the earth.'
      - type: citation
        text: '142:3b He has placed me in dark places, as those who have been dead for ages: * (4) and my spirit is in anguish within me, my heart is troubled within me.'
      - type: citation
        text: '142:5 I remembered the days of old, I meditated on all your works: * I pondered on the deeds of your hands.'
      - type: citation
        text: '142:6 I spread forth my hands to you: * my soul is like waterless ground thirsting for you.'
      - type: citation
        text: '142:7a Hear me quickly, O Lord: * my spirit has failed.'
      - type: citation
        text: '142:7b Turn not your face away from me: * lest I become like those who go down into the pit.'
      - type: citation
        text: '142:8a Make me hear your mercy in the morning: * for in you have I hoped.'
      - type: citation
        text: '142:8b Make known to me the way in which I should walk: * for to you have I lifted up my soul.'
      - type: citation
        text: '142:9 Deliver me from my enemies, O Lord, to you have I fled: * (10a) teach me to do your will, for you are my God.'
      - type: citation
        text: '142:10b Your good Spirit shall lead me into the right land: * (11a) for your name''s sake, O Lord, you will preserve my life, in your justice.'
      - type: citation
        text: '142:11b You will bring my soul out of tribulation: * (12a) and in your mercy you will scatter my enemies.'
      - type: citation
        text: '142:12b And you will destroy all those who afflict my soul: * for I am your servant.'
  psalm.143-1-bened-ctus-d-minus-deus-meus-qui-docet-man-8ab543cdcd:
    role: psalm
    content:
      en:
      - type: citation
        text: 143:1 Blessed be the Lord my God, who teacheth my hands to fight, * and my fingers to war.
      - type: citation
        text: '143:2 My mercy, and my refuge: * my support, and my deliverer:'
      - type: citation
        text: '143:2 My protector, and I have hoped in him: * who subdueth my people under me.'
      - type: citation
        text: 143:3 Lord, what is man, that thou art made known to him? * or the son of man, that thou makest account of him?
      - type: citation
        text: '143:4 Man is like to vanity: * his days pass away like a shadow.'
      - type: citation
        text: '143:5 Lord, bow down thy heavens and descend: * touch the mountains, and they shall smoke.'
      - type: citation
        text: '143:6 Send forth lightning, and thou shalt scatter them: * shoot out thy arrows, and thou shalt trouble them.'
      - type: citation
        text: '143:7 Put forth thy hand from on high, take me out, and deliver me from many waters: * from the hand of strange children:'
      - type: citation
        text: '143:8 Whose mouth hath spoken vanity: * and their right hand is the right hand of iniquity.'
      - type: citation
        text: '143:9 To thee, O God, I will sing a new canticle: * on the psaltery and an instrument of ten strings I will sing praises to thee.'
      - type: citation
        text: '143:10 Who givest salvation to kings: * who hast redeemed thy servant David from the malicious sword: Deliver me,'
      - type: citation
        text: '143:11 And rescue me out of the hand of strange children; whose mouth hath spoken vanity: * and their right hand is the right hand of iniquity:'
      - type: citation
        text: '143:12 Whose sons are as new plants * in their youth:'
      - type: citation
        text: '143:12 Their daughters decked out, * adorned round about after the similitude of a temple:'
      - type: citation
        text: 143:13 Their storehouses full, * flowing out of this into that.
      - type: citation
        text: '143:13 Their sheep fruitful in young, abounding in their goings forth: * their oxen fat.'
      - type: citation
        text: 143:14 There is no breach of wall, nor passage, * nor crying out in their streets.
      - type: citation
        text: '143:15 They have called the people happy, that hath these things: * but happy is that people whose God is the Lord.'
      la:
      - type: citation
        text: 143:1 Benedíctus Dóminus, Deus meus, qui docet manus meas ad prǽlium, * et dígitos meos ad bellum.
      - type: citation
        text: '143:2 Misericórdia mea, et refúgium meum: * suscéptor meus, et liberátor meus:'
      - type: citation
        text: '143:2 Protéctor meus, et in ipso sperávi: * qui subdit pópulum meum sub me.'
      - type: citation
        text: 143:3 Dómine, quid est homo, quia innotuísti ei? * aut fílius hóminis, quia réputas eum?
      - type: citation
        text: '143:4 Homo vanitáti símilis factus est: * dies eius sicut umbra prætéreunt.'
      - type: citation
        text: '143:5 Dómine, inclína cælos tuos, et descénde: * tange montes, et fumigábunt.'
      - type: citation
        text: '143:6 Fúlgura coruscatiónem, et dissipábis eos: * emítte sagíttas tuas, et conturbábis eos.'
      - type: citation
        text: '143:7 Emítte manum tuam de alto, éripe me, et líbera me de aquis multis: * de manu filiórum alienórum.'
      - type: citation
        text: '143:8 Quorum os locútum est vanitátem: * et déxtera eórum, déxtera iniquitátis.'
      - type: citation
        text: '143:9 Deus, cánticum novum cantábo tibi: * in psaltério decachórdo psallam tibi.'
      - type: citation
        text: '143:10 Qui das salútem régibus: * qui redemísti David, servum tuum, de gládio malígno: éripe me.'
      - type: citation
        text: '143:11 Et érue me de manu filiórum alienórum, quorum os locútum est vanitátem: * et déxtera eórum, déxtera iniquitátis:'
      - type: citation
        text: 143:12 Quorum fílii, sicut novéllæ plantatiónes * in iuventúte sua.
      - type: citation
        text: '143:12 Fíliæ eórum compósitæ: * circumornátæ ut similitúdo templi.'
      - type: citation
        text: 143:13 Promptuária eórum plena, * eructántia ex hoc in illud.
      - type: citation
        text: '143:13 Oves eórum fœtósæ, abundántes in egréssibus suis: * boves eórum crassæ.'
      - type: citation
        text: '143:14 Non est ruína macériæ, neque tránsitus: * neque clamor in platéis eórum.'
      - type: citation
        text: '143:15 Beátum dixérunt pópulum, cui hæc sunt: * beátus pópulus, cuius Dóminus Deus eius.'
      en2:
      - type: citation
        text: 143:1 Blessed be the Lord my God, who trains my hands for battle, * and my fingers for war.
      - type: citation
        text: '143:2 My mercy and my refuge: * my defender and my deliverer:'
      - type: citation
        text: '143:2 My protector, and in him have I hoped: * who subdues my people under me.'
      - type: citation
        text: 143:3 Lord, what is man, that you have made yourself known to him? * or the son of man, that you hold him in account?
      - type: citation
        text: '143:4 Man is made like unto vanity: * his days pass away like a shadow.'
      - type: citation
        text: '143:5 Lord, bow your heavens and come down: * touch the mountains, and they shall smoke.'
      - type: citation
        text: '143:6 Flash forth lightning and you shall scatter them: * send out your arrows and you shall trouble them.'
      - type: citation
        text: '143:7 Stretch forth your hand from on high, rescue me and deliver me out of many waters: * from the hand of the sons of strangers.'
      - type: citation
        text: '143:8 Whose mouth has spoken vanity: * and whose right hand is a right hand of iniquity.'
      - type: citation
        text: '143:9 O God, I will sing a new canticle to you: * on the psaltery of ten strings I will sing praise to you.'
      - type: citation
        text: '143:10 Who gives salvation to kings: * who redeemed David your servant from the malicious sword: rescue me.'
      - type: citation
        text: '143:11 And deliver me from the hand of the sons of strangers, whose mouth has spoken vanity: * and whose right hand is a right hand of iniquity:'
      - type: citation
        text: 143:12 Whose sons are as new plantings * in their youth.
      - type: citation
        text: '143:12 Their daughters adorned: * decked out in the likeness of a temple.'
      - type: citation
        text: 143:13 Their storehouses full, * overflowing from one thing to another.
      - type: citation
        text: '143:13 Their sheep fruitful, abounding on their way out: * their oxen fat.'
      - type: citation
        text: '143:14 There is no breach in the wall, nor passage: * nor cry in their streets.'
      - type: citation
        text: '143:15 They have called the people happy that has these things: * happy the people whose God is the Lord.'
  psalm.144-1-exalt-bo-te-deus-meus-rex-et-bened-cam-n-m-fc686b27ea:
    role: psalm
    content:
      en:
      - type: citation
        text: '144:1 I will extol thee, O God my king: * and I will bless thy name for ever; yea, for ever and ever.'
      - type: citation
        text: '144:2 Every day will I bless thee: * and I will praise thy name for ever; yea, for ever and ever.'
      - type: citation
        text: '144:3 Great is the Lord, and greatly to be praised: * and of his greatness there is no end.'
      - type: citation
        text: '144:4 Generation and generation shall praise thy works: * and they shall declare thy power.'
      - type: citation
        text: '144:5 They shall speak of the magnificence of the glory of thy holiness: * and shall tell thy wondrous works.'
      - type: citation
        text: '144:6 And they shall speak of the might of thy terrible acts: * and shall declare thy greatness.'
      - type: citation
        text: '144:7 They shall publish the memory of the abundance of thy sweetness: * and shall rejoice in thy justice.'
      - type: citation
        text: '144:8 The Lord is gracious and merciful: * patient and plenteous in mercy.'
      - type: citation
        text: '144:9 The Lord is sweet to all: * and his tender mercies are over all his works.'
      - type: citation
        text: '144:10 Let all thy works, O Lord, praise thee: * and let thy saints bless thee.'
      - type: citation
        text: '144:11 They shall speak of the glory of thy kingdom: * and shall tell of thy power:'
      - type: citation
        text: '144:12 To make thy might known to the sons of men: * and the glory of the magnificence of thy kingdom.'
      - type: citation
        text: '144:13a Thy kingdom is a kingdom of all ages: * and thy dominion endureth throughout all generations.'
      - type: citation
        text: '144:13b The Lord is faithful in all his words: * and holy in all his works.'
      - type: citation
        text: '144:14 The Lord lifteth up all that fall: * and setteth up all that are cast down.'
      - type: citation
        text: '144:15 The eyes of all hope in thee, O Lord: * and thou givest them meat in due season.'
      - type: citation
        text: 144:16 Thou openest thy hand, * and fillest with blessing every living creature.
      - type: citation
        text: '144:17 The Lord is just in all his ways: * and holy in all his works.'
      - type: citation
        text: '144:18 The Lord is nigh unto all them that call upon him: * to all that call upon him in truth.'
      - type: citation
        text: '144:19 He will do the will of them that fear him: ‡ and he will hear their prayer, * and save them.'
      - type: citation
        text: 144:20 The Lord keepeth all them that love him; * but all the wicked he will destroy.
      - type: citation
        text: '144:21 My mouth shall speak the praise of the Lord: * and let all flesh bless his holy name for ever; yea, for ever and ever.'
      la:
      - type: citation
        text: '144:1 Exaltábo te, Deus meus, rex: * et benedícam nómini tuo in sǽculum, et in sǽculum sǽculi.'
      - type: citation
        text: '144:2 Per síngulos dies benedícam tibi: * et laudábo nomen tuum in sǽculum, et in sǽculum sǽculi.'
      - type: citation
        text: '144:3 Magnus Dóminus, et laudábilis nimis: * et magnitúdinis eius non est finis.'
      - type: citation
        text: '144:4 Generátio et generátio laudábit ópera tua: * et poténtiam tuam pronuntiábunt.'
      - type: citation
        text: '144:5 Magnificéntiam glóriæ sanctitátis tuæ loquéntur: * et mirabília tua narrábunt.'
      - type: citation
        text: '144:6 Et virtútem terribílium tuórum dicent: * et magnitúdinem tuam narrábunt.'
      - type: citation
        text: '144:7 Memóriam abundántiæ suavitátis tuæ eructábunt: * et iustítia tua exsultábunt.'
      - type: citation
        text: '144:8 Miserátor, et miséricors Dóminus: * pátiens, et multum miséricors.'
      - type: citation
        text: '144:9 Suávis Dóminus univérsis: * et miseratiónes eius super ómnia ópera eius.'
      - type: citation
        text: '144:10 Confiteántur tibi, Dómine, ómnia ópera tua: * et sancti tui benedícant tibi.'
      - type: citation
        text: '144:11 Glóriam regni tui dicent: * et poténtiam tuam loquéntur:'
      - type: citation
        text: '144:12 Ut notam fáciant fíliis hóminum poténtiam tuam: * et glóriam magnificéntiæ regni tui.'
      - type: citation
        text: '144:13a Regnum tuum regnum ómnium sæculórum: * et dominátio tua in omni generatióne et generatiónem.'
      - type: citation
        text: '144:13b Fidélis Dóminus in ómnibus verbis suis: * et sanctus in ómnibus opéribus suis.'
      - type: citation
        text: '144:14 Állevat Dóminus omnes qui córruunt: * et érigit omnes elísos.'
      - type: citation
        text: '144:15 Óculi ómnium in te sperant, Dómine: * et tu das escam illórum in témpore opportúno.'
      - type: citation
        text: '144:16 Áperis tu manum tuam: * et imples omne ánimal benedictióne.'
      - type: citation
        text: '144:17 Iustus Dóminus in ómnibus viis suis: * et sanctus in ómnibus opéribus suis.'
      - type: citation
        text: '144:18 Prope est Dóminus ómnibus invocántibus eum: * ómnibus invocántibus eum in veritáte.'
      - type: citation
        text: '144:19 Voluntátem timéntium se fáciet: ‡ et deprecatiónem eórum exáudiet: * et salvos fáciet eos.'
      - type: citation
        text: '144:20 Custódit Dóminus omnes diligéntes se: * et omnes peccatóres dispérdet.'
      - type: citation
        text: '144:21 Laudatiónem Dómini loquétur os meum: * et benedícat omnis caro nómini sancto eius in sǽculum, et in sǽculum sǽculi.'
      en2:
      - type: citation
        text: '144:1 I will extol you, O God my king: * and I will bless your name for ever, and for ever and ever.'
      - type: citation
        text: '144:2 Every day I will bless you: * and I will praise your name for ever, and for ever and ever.'
      - type: citation
        text: '144:3 Great is the Lord and greatly to be praised: * and of his greatness there is no end.'
      - type: citation
        text: '144:4 Generation and generation shall praise your works: * and they shall declare your power.'
      - type: citation
        text: '144:5 They shall speak of the magnificence of the glory of your holiness: * and shall tell of your wonderful works.'
      - type: citation
        text: '144:6 And they shall speak of the power of your awesome deeds: * and shall declare your greatness.'
      - type: citation
        text: '144:7 They shall pour forth the memory of the abundance of your sweetness: * and shall rejoice in your justice.'
      - type: citation
        text: '144:8 The Lord is gracious and merciful: * patient, and rich in mercy.'
      - type: citation
        text: '144:9 The Lord is sweet to all: * and his mercies are over all his works.'
      - type: citation
        text: '144:10 Let all your works, O Lord, praise you: * and let your holy ones bless you.'
      - type: citation
        text: '144:11 They shall speak of the glory of your kingdom: * and shall declare your power:'
      - type: citation
        text: '144:12 To make your power known to the sons of men: * and the glory of the magnificence of your kingdom.'
      - type: citation
        text: '144:13a Your kingdom is a kingdom of all ages: * and your dominion endures through all generations.'
      - type: citation
        text: '144:13b The Lord is faithful in all his words: * and holy in all his works.'
      - type: citation
        text: '144:14 The Lord lifts up all who fall: * and raises up all who are bowed down.'
      - type: citation
        text: '144:15 The eyes of all hope in you, O Lord: * and you give them their food in due season.'
      - type: citation
        text: '144:16 You open your hand: * and fill every living thing with blessing.'
      - type: citation
        text: '144:17 The Lord is just in all his ways: * and holy in all his works.'
      - type: citation
        text: '144:18 The Lord is near to all who call upon him: * to all who call upon him in truth.'
      - type: citation
        text: '144:19 He will do the will of those who fear him: ‡ and he will hear their supplication: * and he will save them.'
      - type: citation
        text: '144:20 The Lord preserves all who love him: * but all the sinners he will destroy.'
      - type: citation
        text: '144:21 My mouth shall speak the praise of the Lord: * and let all flesh bless his holy name for ever, and for ever and ever.'
  psalm.145-2a-lauda-nima-mea-d-minum-laud-bo-d-minum-in-fda18adf76:
    role: psalm
    content:
      en:
      - type: citation
        text: '145:2a Praise the Lord, O my soul, † in my life I will praise the Lord: * I will sing to my God as long as I shall be.'
      - type: citation
        text: '145:2b Put not your trust in princes: * (3) in the children of men, in whom there is no salvation.'
      - type: citation
        text: '145:4 His spirit shall go forth, and he shall return into his earth: * in that day all their thoughts shall perish.'
      - type: citation
        text: '145:5 Blessed is he who hath the God of Jacob for his helper, † whose hope is in the Lord his God: * (6) who made heaven and earth, the sea, and all things that are in them.'
      - type: citation
        text: '145:7a Who keepeth truth for ever: † who executeth judgment for them that suffer wrong: * who giveth food to the hungry.'
      - type: citation
        text: '145:7b The Lord looseth them that are fettered: * (8a) the Lord enlighteneth the blind.'
      - type: citation
        text: '145:8b The Lord lifteth up them that are cast down: * the Lord loveth the just.'
      - type: citation
        text: '145:9 The Lord keepeth the strangers, † he will support the fatherless and the widow: * and the ways of sinners he will destroy.'
      - type: citation
        text: '145:10 The Lord shall reign for ever: thy God, O Sion, * unto generation and generation.'
      la:
      - type: citation
        text: '145:2a Lauda, ánima mea, Dóminum, † laudábo Dóminum in vita mea: * psallam Deo meo quámdiu fúero.'
      - type: citation
        text: '145:2b Nolíte confídere in princípibus: * (3) in fíliis hóminum, in quibus non est salus.'
      - type: citation
        text: '145:4 Exíbit spíritus eius, et revertétur in terram suam: * in illa die períbunt omnes cogitatiónes eórum.'
      - type: citation
        text: '145:5 Beátus, cuius Deus Iacob adiútor eius, † spes eius in Dómino, Deo ipsíus: * (6) qui fecit cælum et terram, mare, et ómnia, quæ in eis sunt.'
      - type: citation
        text: '145:7a Qui custódit veritátem in sǽculum, † facit iudícium iniúriam patiéntibus: * dat escam esuriéntibus.'
      - type: citation
        text: '145:7b Dóminus solvit compedítos: * (8a) Dóminus illúminat cæcos.'
      - type: citation
        text: 145:8b Dóminus érigit elísos, * Dóminus díligit iustos.
      - type: citation
        text: '145:9 Dóminus custódit ádvenas, † pupíllum et víduam suscípiet: * et vias peccatórum dispérdet.'
      - type: citation
        text: 145:10 Regnábit Dóminus in sǽcula, Deus tuus, Sion, * in generatiónem et generatiónem.
      en2:
      - type: citation
        text: '145:2a Praise the Lord, O my soul, † I will praise the Lord while I live: * I will sing praise to my God as long as I shall be.'
      - type: citation
        text: '145:2b Put not your trust in princes: * (3) nor in the sons of men, in whom there is no salvation.'
      - type: citation
        text: '145:4 His spirit shall go forth, and he shall return to his earth: * in that day all his thoughts shall perish.'
      - type: citation
        text: '145:5 Blessed is he whose God is the God of Jacob, † whose hope is in the Lord his God: * (6) who made heaven and earth, the sea, and all things that are in them.'
      - type: citation
        text: '145:7a Who keeps truth for ever, † who does judgment for those who suffer wrong: * who gives food to the hungry.'
      - type: citation
        text: '145:7b The Lord loosens those in chains: * (8a) the Lord gives sight to the blind.'
      - type: citation
        text: 145:8b The Lord raises up those who are bowed down, * the Lord loves the just.
      - type: citation
        text: '145:9 The Lord keeps the strangers, † he will support the fatherless and the widow: * and the ways of sinners he will destroy.'
      - type: citation
        text: 145:10 The Lord shall reign for ever, your God, O Sion, * unto all generations.
  psalm.146-1-laud-te-d-minum-qu-niam-bonus-est-psalmus-a880b8bab4:
    role: psalm
    content:
      en:
      - type: citation
        text: '146:1 Praise ye the Lord, because psalm is good: * to our God be joyful and comely praise.'
      - type: citation
        text: '146:2 The Lord buildeth up Jerusalem: * he will gather together the dispersed of Israel'
      - type: citation
        text: 146:3 Who healeth the broken of heart, * and bindeth up their bruises.
      - type: citation
        text: '146:4 Who telleth the number of the stars: * and calleth them all by their names.'
      - type: citation
        text: '146:5 Great is our Lord, and great is his power: * and of his wisdom there is no number.'
      - type: citation
        text: 146:6 The Lord lifteth up the meek, * and bringeth the wicked down even to the ground.
      - type: citation
        text: '146:7 Sing ye to the Lord with praise: * sing to our God upon the harp.'
      - type: citation
        text: 146:8a Who covereth the heaven with clouds, * and prepareth rain for the earth.
      - type: citation
        text: 146:8b Who maketh grass to grow on the mountains, * and herbs for the service of men.
      - type: citation
        text: '146:9 Who giveth to beasts their food: * and to the young ravens that call upon him.'
      - type: citation
        text: '146:10 He shall not delight in the strength of the horse: * nor take pleasure in the legs of a man.'
      - type: citation
        text: '146:11 The Lord taketh pleasure in them that fear him: * and in them that hope in his mercy.'
      la:
      - type: citation
        text: '146:1 Laudáte Dóminum quóniam bonus est psalmus: * Deo nostro sit iucúnda, decóraque laudátio.'
      - type: citation
        text: '146:2 Ædíficans Ierúsalem Dóminus: * dispersiónes Israélis congregábit.'
      - type: citation
        text: '146:3 Qui sanat contrítos corde: * et álligat contritiónes eórum.'
      - type: citation
        text: '146:4 Qui númerat multitúdinem stellárum: * et ómnibus eis nómina vocat.'
      - type: citation
        text: '146:5 Magnus Dóminus noster, et magna virtus eius: * et sapiéntiæ eius non est númerus.'
      - type: citation
        text: '146:6 Suscípiens mansuétos Dóminus: * humílians autem peccatóres usque ad terram.'
      - type: citation
        text: '146:7 Præcínite Dómino in confessióne: * psállite Deo nostro in cíthara.'
      - type: citation
        text: '146:8a Qui óperit cælum núbibus: * et parat terræ plúviam.'
      - type: citation
        text: '146:8b Qui prodúcit in móntibus fænum: * et herbam servitúti hóminum.'
      - type: citation
        text: '146:9 Qui dat iuméntis escam ipsórum: * et pullis corvórum invocántibus eum.'
      - type: citation
        text: '146:10 Non in fortitúdine equi voluntátem habébit: * nec in tíbiis viri beneplácitum erit ei.'
      - type: citation
        text: '146:11 Beneplácitum est Dómino super timéntes eum: * et in eis, qui sperant super misericórdia eius.'
      en2:
      - type: citation
        text: '146:1 Praise the Lord, for a psalm is good: * to our God be joyful and fitting praise.'
      - type: citation
        text: '146:2 The Lord builds up Jerusalem: * he will gather together the dispersed of Israel.'
      - type: citation
        text: '146:3 Who heals the broken in heart: * and binds up their sorrows.'
      - type: citation
        text: '146:4 Who tells the number of the multitude of stars: * and calls them all by their names.'
      - type: citation
        text: '146:5 Great is our Lord, and great is his power: * and of his wisdom there is no number.'
      - type: citation
        text: '146:6 The Lord raises up the meek: * but brings the sinners down to the earth.'
      - type: citation
        text: '146:7 Sing praise to the Lord with thanksgiving: * sing psalms to our God upon the harp.'
      - type: citation
        text: '146:8a Who covers the heaven with clouds: * and prepares rain for the earth.'
      - type: citation
        text: '146:8b Who makes grass to grow upon the mountains: * and herbs for the service of men.'
      - type: citation
        text: '146:9 Who gives to the beasts their food: * and to the young ravens that call upon him.'
      - type: citation
        text: '146:10 He shall not delight in the strength of the horse: * nor take pleasure in the legs of a man.'
      - type: citation
        text: '146:11 The Lord takes pleasure in those who fear him: * and in those who hope in his mercy.'
  psalm.147-1-lauda-ier-salem-d-minum-lauda-deum-tuum-si-30dbfd3c1a:
    role: psalm
    content:
      en:
      - type: citation
        text: '147:1 Praise the Lord, O Jerusalem: * praise thy God, O Sion.'
      - type: citation
        text: 147:2 Because he hath strengthened the bolts of thy gates * he hath blessed thy children within thee.
      - type: citation
        text: '147:3 Who hath placed peace in thy borders: * and filleth thee with the fat of corn.'
      - type: citation
        text: '147:4 Who sendeth forth his speech to the earth: * his word runneth swiftly.'
      - type: citation
        text: '147:5 Who giveth snow like wool: * scattereth mists like ashes.'
      - type: citation
        text: '147:6 He sendeth his crystal like morsels: * who shall stand before the face of his cold?'
      - type: citation
        text: '147:7 He shall send out his word, and shall melt them: * his wind shall blow, and the waters shall run.'
      - type: citation
        text: '147:8 Who declareth his word to Jacob: * his justices and his judgments to Israel.'
      - type: citation
        text: '147:9 He hath not done in like manner to every nation: * and his judgments he hath not made manifest to them.'
      la:
      - type: citation
        text: '147:1 Lauda, Ierúsalem, Dóminum: * lauda Deum tuum, Sion.'
      - type: citation
        text: '147:2 Quóniam confortávit seras portárum tuárum: * benedíxit fíliis tuis in te.'
      - type: citation
        text: '147:3 Qui pósuit fines tuos pacem: * et ádipe fruménti sátiat te.'
      - type: citation
        text: '147:4 Qui emíttit elóquium suum terræ: * velóciter currit sermo eius.'
      - type: citation
        text: '147:5 Qui dat nivem sicut lanam: * nébulam sicut cínerem spargit.'
      - type: citation
        text: '147:6 Mittit crystállum suam sicut buccéllas: * ante fáciem frígoris eius quis sustinébit?'
      - type: citation
        text: '147:7 Emíttet verbum suum, et liquefáciet ea: * flabit spíritus eius, et fluent aquæ.'
      - type: citation
        text: '147:8 Qui annúntiat verbum suum Iacob: * iustítias, et iudícia sua Israël.'
      - type: citation
        text: '147:9 Non fecit táliter omni natióni: * et iudícia sua non manifestávit eis.'
      en2:
      - type: citation
        text: '147:1 Praise the Lord, O Jerusalem: * praise your God, O Sion.'
      - type: citation
        text: '147:2 Because he has strengthened the bars of your gates: * he has blessed your children within you.'
      - type: citation
        text: '147:3 Who has set peace in your borders: * and fills you with the finest wheat.'
      - type: citation
        text: '147:4 Who sends forth his word to the earth: * his word runs swiftly.'
      - type: citation
        text: '147:5 Who gives snow like wool: * scatters mist like ashes.'
      - type: citation
        text: '147:6 He sends his crystal like morsels: * who shall stand before the face of his cold?'
      - type: citation
        text: '147:7 He shall send out his word, and melt them: * his wind shall blow, and the waters shall flow.'
      - type: citation
        text: '147:8 Who declares his word to Jacob: * his statutes and judgments to Israel.'
      - type: citation
        text: '147:9 He has not done so to every nation: * and his judgments he has not made known to them.'
  psalm.148-1-laud-te-d-minum-de-c-lis-laud-te-eum-in-ex-24931283b4:
    role: psalm
    content:
      en:
      - type: citation
        text: 148:1 Praise ye the Lord from the heavens * praise ye him in the high places.
      - type: citation
        text: '148:2 Praise ye him, all his angels: * praise ye him, all his hosts.'
      - type: citation
        text: '148:3 Praise ye him, O sun and moon: * praise him, all ye stars and light.'
      - type: citation
        text: '148:4 Praise him, ye heavens of heavens: * and let all the waters that are above the heavens, praise the name of the Lord.'
      - type: citation
        text: '148:5 For he spoke, and they were made: * he commanded, and they were created.'
      - type: citation
        text: '148:6 He hath established them for ever, and for ages of ages: * he hath made a decree, and it shall not pass away.'
      - type: citation
        text: '148:7 Praise the Lord from the earth, * ye dragons, and all ye deeps:'
      - type: citation
        text: '148:8 Fire, hail, snow, ice, stormy winds * which fulfill his word:'
      - type: citation
        text: '148:9 Mountains and all hills, * fruitful trees and all cedars:'
      - type: citation
        text: '148:10 Beasts and all cattle: * serpents and feathered fowls:'
      - type: citation
        text: '148:11 Kings of the earth and all people: * princes and all judges of the earth:'
      - type: citation
        text: '148:12 Young men and maidens: † let the old with the younger, praise the name of the Lord: * (13) For his name alone is exalted.'
      - type: citation
        text: '148:14a The praise of him is above heaven and earth: * and he hath exalted the horn of his people.'
      - type: citation
        text: '148:14b A hymn to all his saints: to the children of Israel, a people approaching him.'
      la:
      - type: citation
        text: '148:1 Laudáte Dóminum de cælis: * laudáte eum in excélsis.'
      - type: citation
        text: '148:2 Laudáte eum, omnes Ángeli eius: * laudáte eum, omnes virtútes eius.'
      - type: citation
        text: '148:3 Laudáte eum, sol et luna: * laudáte eum, omnes stellæ et lumen.'
      - type: citation
        text: '148:4 Laudáte eum, cæli cælórum: * et aquæ omnes, quæ super cælos sunt, laudent nomen Dómini.'
      - type: citation
        text: '148:5 Quia ipse dixit, et facta sunt: * ipse mandávit, et creáta sunt.'
      - type: citation
        text: '148:6 Státuit ea in ætérnum, et in sǽculum sǽculi: * præcéptum pósuit, et non præteríbit.'
      - type: citation
        text: 148:7 Laudáte Dóminum de terra, * dracónes, et omnes abýssi.
      - type: citation
        text: '148:8 Ignis, grando, nix, glácies, spíritus procellárum: * quæ fáciunt verbum eius:'
      - type: citation
        text: '148:9 Montes, et omnes colles: * ligna fructífera, et omnes cedri.'
      - type: citation
        text: '148:10 Béstiæ, et univérsa pécora: * serpéntes, et vólucres pennátæ:'
      - type: citation
        text: '148:11 Reges terræ, et omnes pópuli: * príncipes, et omnes iúdices terræ.'
      - type: citation
        text: '148:12 Iúvenes, et vírgines: † senes cum iunióribus laudent nomen Dómini: * (13) quia exaltátum est nomen eius solíus.'
      - type: citation
        text: '148:14a Conféssio eius super cælum et terram: * et exaltávit cornu pópuli sui.'
      - type: citation
        text: '148:14b Hymnus ómnibus sanctis eius: * fíliis Israël, pópulo appropinquánti sibi.'
      en2:
      - type: citation
        text: '148:1 Praise the Lord from the heavens: * praise him in the heights.'
      - type: citation
        text: '148:2 Praise him, all his Angels: * praise him, all his hosts.'
      - type: citation
        text: '148:3 Praise him, sun and moon: * praise him, all you stars and light.'
      - type: citation
        text: '148:4 Praise him, you heavens of heavens: * and let all the waters that are above the heavens praise the name of the Lord.'
      - type: citation
        text: '148:5 For he spoke, and they were made: * he commanded, and they were created.'
      - type: citation
        text: '148:6 He established them for ever and for ages upon ages: * he made a decree, and it shall not pass away.'
      - type: citation
        text: 148:7 Praise the Lord from the earth, * you sea-monsters, and all the depths.
      - type: citation
        text: '148:8 Fire, hail, snow, ice, stormy wind: * that fulfill his word:'
      - type: citation
        text: '148:9 Mountains, and all hills: * fruitful trees, and all cedars.'
      - type: citation
        text: '148:10 Beasts, and all cattle: * serpents, and feathered birds:'
      - type: citation
        text: '148:11 Kings of the earth, and all peoples: * princes, and all judges of the earth.'
      - type: citation
        text: '148:12 Young men and maidens: † let old men and children praise the name of the Lord: * (13) for his name alone is exalted.'
      - type: citation
        text: '148:14a His glory is above heaven and earth: * and he has exalted the horn of his people.'
      - type: citation
        text: '148:14b A hymn for all his saints: * for the children of Israel, a people that draws near to him.'
  psalm.149-1-cant-te-d-mino-c-nticum-novum-laus-eius-in-14c85b62f0:
    role: psalm
    content:
      en:
      - type: citation
        text: '149:1 Sing ye to the Lord a new canticle: * let his praise be in the church of the saints.'
      - type: citation
        text: '149:2 Let Israel rejoice in him that made him: * and let the children of Sion be joyful in their king.'
      - type: citation
        text: '149:3 Let them praise his name in choir: * let them sing to him with the timbrel and the psaltery.'
      - type: citation
        text: '149:4 For the Lord is well pleased with his people: * and he will exalt the meek unto salvation.'
      - type: citation
        text: '149:5 The saints shall rejoice in glory: * they shall be joyful in their beds.'
      - type: citation
        text: '149:6 The high praises of God shall be in their mouth: * and two-edged swords in their hands:'
      - type: citation
        text: '149:7 To execute vengeance upon the nations, * chastisements among the people:'
      - type: citation
        text: 149:8 To bind their kings with fetters, * and their nobles with manacles of iron.
      - type: citation
        text: '149:9 To execute upon them the judgment that is written: * this glory is to all his saints.'
      la:
      - type: citation
        text: '149:1 Cantáte Dómino cánticum novum: * laus eius in ecclésia sanctórum.'
      - type: citation
        text: '149:2 Lætétur Israël in eo, qui fecit eum: * et fílii Sion exsúltent in rege suo.'
      - type: citation
        text: '149:3 Laudent nomen eius in choro: * in týmpano, et psaltério psallant ei:'
      - type: citation
        text: '149:4 Quia beneplácitum est Dómino in pópulo suo: * et exaltábit mansuétos in salútem.'
      - type: citation
        text: '149:5 Exsultábunt sancti in glória: * lætabúntur in cubílibus suis.'
      - type: citation
        text: '149:6 Exaltatiónes Dei in gútture eórum: * et gládii ancípites in mánibus eórum.'
      - type: citation
        text: '149:7 Ad faciéndam vindíctam in natiónibus: * increpatiónes in pópulis.'
      - type: citation
        text: '149:8 Ad alligándos reges eórum in compédibus: * et nóbiles eórum in mánicis férreis.'
      - type: citation
        text: '149:9 Ut fáciant in eis iudícium conscríptum: * glória hæc est ómnibus sanctis eius.'
      en2:
      - type: citation
        text: '149:1 Sing to the Lord a new song: * his praise in the assembly of the saints.'
      - type: citation
        text: '149:2 Let Israel rejoice in him who made him: * and let the children of Sion exult in their king.'
      - type: citation
        text: '149:3 Let them praise his name in the choir: * let them sing psalms to him with timbrel and harp:'
      - type: citation
        text: '149:4 For the Lord takes pleasure in his people: * and will exalt the meek unto salvation.'
      - type: citation
        text: '149:5 The saints shall rejoice in glory: * they shall be joyful in their beds.'
      - type: citation
        text: '149:6 The high praises of God in their throats: * and two-edged swords in their hands.'
      - type: citation
        text: '149:7 To execute vengeance upon the nations: * chastisements upon the peoples.'
      - type: citation
        text: '149:8 To bind their kings in chains: * and their nobles in fetters of iron.'
      - type: citation
        text: '149:9 To execute upon them the judgment written: * this glory is for all his saints.'
  psalm.15-1-cons-rva-me-d-mine-qu-niam-sper-vi-in-te-2-07dc7bac5c:
    role: psalm
    content:
      en:
      - type: citation
        text: 15:1 Preserve me, O Lord, for I have put my trust in thee. ‡ (2) I have said to the Lord, thou art my God, * for thou hast no need of my goods.
      - type: citation
        text: 15:3 To the saints, who are in his land, * he hath made wonderful all my desires in them.
      - type: citation
        text: '15:4a Their infirmities were multiplied: * afterwards they made haste.'
      - type: citation
        text: '15:4b I will not gather together their meetings for blood offerings: * nor will I be mindful of their names by my lips.'
      - type: citation
        text: '15:5 The Lord is the portion of my inheritance and of my cup: * it is thou that wilt restore my inheritance to me.'
      - type: citation
        text: '15:6 The lines are fallen unto me in goodly places: * for my inheritance is goodly to me.'
      - type: citation
        text: '15:7 I will bless the Lord, who hath given me understanding: * moreover my reins also have corrected me even till night.'
      - type: citation
        text: '15:8 I set the Lord always in my sight: * for he is at my right hand, that I be not moved.'
      - type: citation
        text: '15:9 Therefore my heart hath been glad, and my tongue hath rejoiced: * moreover my flesh also shall rest in hope.'
      - type: citation
        text: 15:10 Because thou wilt not leave my soul in hell; * nor wilt thou give thy holy one to see corruption.
      - type: citation
        text: '15:11 Thou hast made known to me the ways of life, † thou shalt fill me with joy with thy countenance: * at thy right hand are delights even to the end.'
      la:
      - type: citation
        text: '15:1 Consérva me, Dómine, quóniam sperávi in te. ‡ (2) Dixi Dómino: Deus meus es tu, * quóniam bonórum meórum non eges.'
      - type: citation
        text: 15:3 Sanctis, qui sunt in terra eius, * mirificávit omnes voluntátes meas in eis.
      - type: citation
        text: '15:4a Multiplicátæ sunt infirmitátes eórum: * póstea acceleravérunt.'
      - type: citation
        text: 15:4b Non congregábo conventícula eórum de sanguínibus, * nec memor ero nóminum eórum per lábia mea.
      - type: citation
        text: '15:5 Dóminus pars hereditátis meæ, et cálicis mei: * tu es, qui restítues hereditátem meam mihi.'
      - type: citation
        text: '15:6 Funes cecidérunt mihi in præcláris: * étenim heréditas mea præclára est mihi.'
      - type: citation
        text: '15:7 Benedícam Dóminum, qui tríbuit mihi intelléctum: * ínsuper et usque ad noctem increpuérunt me renes mei.'
      - type: citation
        text: '15:8 Providébam Dóminum in conspéctu meo semper: * quóniam a dextris est mihi, ne commóvear.'
      - type: citation
        text: '15:9 Propter hoc lætátum est cor meum, et exsultávit lingua mea: * ínsuper et caro mea requiéscet in spe.'
      - type: citation
        text: '15:10 Quóniam non derelínques ánimam meam in inférno: * nec dabis sanctum tuum vidére corruptiónem.'
      - type: citation
        text: '15:11 Notas mihi fecísti vias vitæ, † adimplébis me lætítia cum vultu tuo: * delectatiónes in déxtera tua usque in finem.'
      en2:
      - type: citation
        text: '15:1 Keep me, O Lord, for I have hoped in you. ‡ (2) I said to the Lord: You are my God, * for you have no need of my goods.'
      - type: citation
        text: 15:3 To the saints who are in his land, * he has made all my desires wonderful in them.
      - type: citation
        text: '15:4a Their infirmities have been multiplied: * afterward they made haste.'
      - type: citation
        text: 15:4b I will not gather their gatherings from blood, * nor will I be mindful of their names through my lips.
      - type: citation
        text: '15:5 The Lord is the portion of my inheritance and my chalice: * it is you who will restore my inheritance to me.'
      - type: citation
        text: '15:6 The lines have fallen for me in splendid places: * for my inheritance is most splendid to me.'
      - type: citation
        text: '15:7 I will bless the Lord, who has given me understanding: * moreover even to the night my reins have instructed me.'
      - type: citation
        text: '15:8 I set the Lord always before me: * for he is at my right hand, that I be not moved.'
      - type: citation
        text: '15:9 Therefore my heart was glad, and my tongue rejoiced: * moreover my flesh also shall rest in hope.'
      - type: citation
        text: '15:10 For you will not abandon my soul to hell: * nor will you give your holy one to see corruption.'
      - type: citation
        text: '15:11 You have made known to me the ways of life, † you will fill me with joy with your countenance: * delights at your right hand even to the end.'
  psalm.150-1-laud-te-d-minum-in-sanctis-eius-laud-te-eu-404687823c:
    role: psalm
    content:
      en:
      - type: citation
        text: '150:1 Praise ye the Lord in his holy places: * praise ye him in the firmament of his power.'
      - type: citation
        text: '150:2 Praise ye him for his mighty acts: * praise ye him according to the multitude of his greatness.'
      - type: citation
        text: '150:3 Praise him with sound of trumpet: * praise him with psaltery and harp.'
      - type: citation
        text: '150:4 Praise him with timbrel and choir: * praise him with strings and organs.'
      - type: citation
        text: '150:5 Praise him on high sounding cymbals: † praise him on cymbals of joy: * (6) let every spirit praise the Lord.'
      la:
      - type: citation
        text: '150:1 Laudáte Dóminum in sanctis eius: * laudáte eum in firmaménto virtútis eius.'
      - type: citation
        text: '150:2 Laudáte eum in virtútibus eius: * laudáte eum secúndum multitúdinem magnitúdinis eius.'
      - type: citation
        text: '150:3 Laudáte eum in sono tubæ: * laudáte eum in psaltério, et cíthara.'
      - type: citation
        text: '150:4 Laudáte eum in týmpano, et choro: * laudáte eum in chordis, et órgano.'
      - type: citation
        text: '150:5 Laudáte eum in cýmbalis benesonántibus: † laudáte eum in cýmbalis iubilatiónis: * (6) omnis spíritus laudet Dóminum.'
      en2:
      - type: citation
        text: '150:1 Praise the Lord in his holy places: * praise him in the firmament of his power.'
      - type: citation
        text: '150:2 Praise him for his mighty deeds: * praise him according to the multitude of his greatness.'
      - type: citation
        text: '150:3 Praise him with the sound of trumpet: * praise him with psaltery and harp.'
      - type: citation
        text: '150:4 Praise him with timbrel and choir: * praise him with strings and pipe.'
      - type: citation
        text: '150:5 Praise him with well-sounding cymbals: † praise him with cymbals of jubilation: * (6) let every spirit praise the Lord.'
  psalm.16-1a-ex-udi-d-mine-iust-tiam-meam-int-nde-depre-3c238950e9:
    role: psalm
    content:
      en:
      - type: citation
        text: '16:1a Hear, O Lord, my justice: * attend to my supplication.'
      - type: citation
        text: 16:1b Give ear unto my prayer, * which proceedeth not from deceitful lips.
      - type: citation
        text: '16:2 Let my judgment come forth from thy countenance: * let thy eyes behold the things that are equitable.'
      - type: citation
        text: '16:3 Thou hast proved my heart, and visited it by night, * thou hast tried me by fire: and iniquity hath not been found in me.'
      - type: citation
        text: '16:4 That my mouth may not speak the works of men: * for the sake of the words of thy lips, I have kept hard ways.'
      - type: citation
        text: '16:5 Perfect thou my goings in thy paths: * that my footsteps be not moved.'
      - type: citation
        text: '16:6 I have cried to thee, for thou, O God, hast heard me: * O incline thy ear unto me, and hear my words.'
      - type: citation
        text: 16:7 Shew forth thy wonderful mercies; * thou who savest them that trust in thee.
      - type: citation
        text: 16:8a From them that resist thy right hand keep me, * as the apple of thy eye.
      - type: citation
        text: '16:8b Protect me under the shadow of thy wings: * (9a) from the face of the wicked who have afflicted me.'
      - type: citation
        text: '16:9b My enemies have surrounded my soul: † (10) They have shut up their fat: * their mouth hath spoken proudly.'
      - type: citation
        text: '16:11 They have cast me forth, and now they have surrounded me: * they have set their eyes bowing down to the earth.'
      - type: citation
        text: 16:12 They have taken me, as a lion prepared for the prey; * and as a young lion dwelling in secret places.
      - type: citation
        text: 16:13 Arise, O Lord, disappoint him and supplant him; * deliver my soul from the wicked one; thy sword (14a) from the enemies of thy hand.
      - type: citation
        text: '16:14b O Lord, divide them from the few of the earth in their life: * their belly is filled from thy hidden stores.'
      - type: citation
        text: '16:14c They are full of children: * and they have left to their little ones the rest of their substance.'
      - type: citation
        text: '16:15 But as for me, I will appear before thy sight in justice: * I shall be satisfied when thy glory shall appear.'
      la:
      - type: citation
        text: '16:1a Exáudi, Dómine, iustítiam meam: * inténde deprecatiónem meam.'
      - type: citation
        text: 16:1b Áuribus pércipe oratiónem meam, * non in lábiis dolósis.
      - type: citation
        text: '16:2 De vultu tuo iudícium meum pródeat: * óculi tui vídeant æquitátes.'
      - type: citation
        text: '16:3 Probásti cor meum, et visitásti nocte: * igne me examinásti, et non est invénta in me iníquitas.'
      - type: citation
        text: '16:4 Ut non loquátur os meum ópera hóminum: * propter verba labiórum tuórum ego custodívi vias duras.'
      - type: citation
        text: '16:5 Pérfice gressus meos in sémitis tuis: * ut non moveántur vestígia mea.'
      - type: citation
        text: '16:6 Ego clamávi, quóniam exaudísti me, Deus: * inclína aurem tuam mihi, et exáudi verba mea.'
      - type: citation
        text: 16:7 Mirífica misericórdias tuas, * qui salvos facis sperántes in te.
      - type: citation
        text: 16:8a A resisténtibus déxteræ tuæ custódi me, * ut pupíllam óculi.
      - type: citation
        text: '16:8b Sub umbra alárum tuárum prótege me: * (9a) a fácie impiórum qui me afflixérunt.'
      - type: citation
        text: '16:9b Inimíci mei ánimam meam circumdedérunt, † (10) ádipem suum conclusérunt: * os eórum locútum est supérbiam.'
      - type: citation
        text: '16:11 Proiciéntes me nunc circumdedérunt me: * óculos suos statuérunt declináre in terram.'
      - type: citation
        text: '16:12 Suscepérunt me sicut leo parátus ad prædam: * et sicut cátulus leónis hábitans in ábditis.'
      - type: citation
        text: '16:13 Exsúrge, Dómine, prǽveni eum, et supplánta eum: * éripe ánimam meam ab ímpio, frámeam tuam (14a) ab inimícis manus tuæ.'
      - type: citation
        text: '16:14b Dómine, a paucis de terra dívide eos in vita eórum: * de abscónditis tuis adimplétus est venter eórum.'
      - type: citation
        text: '16:14c Saturáti sunt fíliis: * et dimisérunt relíquias suas párvulis suis.'
      - type: citation
        text: '16:15 Ego autem in iustítia apparébo conspéctui tuo: * satiábor cum apparúerit glória tua.'
      en2:
      - type: citation
        text: '16:1a Hear, O Lord, my just cause: * attend to my supplication.'
      - type: citation
        text: 16:1b Receive my prayer with your ears, * not from deceitful lips.
      - type: citation
        text: '16:2 Let my judgment come forth from your presence: * let your eyes behold what is right.'
      - type: citation
        text: '16:3 You have proved my heart, and visited it by night: * you have tried me by fire, and iniquity has not been found in me.'
      - type: citation
        text: '16:4 That my mouth may not speak the works of men: * for the sake of the words of your lips I have kept hard ways.'
      - type: citation
        text: '16:5 Perfect my steps in your paths: * that my footsteps may not be moved.'
      - type: citation
        text: '16:6 I have cried out, for you have heard me, O God: * incline your ear to me, and hear my words.'
      - type: citation
        text: 16:7 Show forth your wonderful mercies, * O you who save those who hope in you.
      - type: citation
        text: 16:8a Keep me as the apple of your eye, * from those who resist your right hand.
      - type: citation
        text: '16:8b Protect me under the shadow of your wings: * (9a) from the face of the wicked who have afflicted me.'
      - type: citation
        text: '16:9b My enemies have surrounded my soul, † (10) they have enclosed their fatness: * their mouth has spoken pride.'
      - type: citation
        text: '16:11 Casting me down, they have now surrounded me: * they have set their eyes bowing down to the earth.'
      - type: citation
        text: '16:12 They have surrounded me like a lion ready for its prey: * and like a young lion dwelling in hidden places.'
      - type: citation
        text: '16:13 Arise, O Lord, forestall him and overthrow him: * deliver my soul from the wicked, your sword (14a) from the enemies of your hand.'
      - type: citation
        text: '16:14b O Lord, divide them from the few of the earth in their life: * of your hidden things their belly has been filled.'
      - type: citation
        text: '16:14c They are full of children: * and they have left their remains to their little ones.'
      - type: citation
        text: '16:15 But I in justice shall appear before your sight: * I shall be satisfied when your glory appears.'
  psalm.17-2-d-ligam-te-d-mine-fortit-do-mea-3a-d-minus-f8654d9c16:
    role: psalm
    content:
      en:
      - type: citation
        text: '17:2 I will love thee, O Lord, my strength: * (3a) The Lord is my firmament, my refuge, and my deliverer.'
      - type: citation
        text: 17:3b My God is my helper, * and in him will I put my trust.
      - type: citation
        text: 17:3c My protector, and the horn of my salvation, * and my support.
      - type: citation
        text: '17:4 Praising, I will call upon the Lord: * and I shall be saved from my enemies.'
      - type: citation
        text: '17:5 The sorrows of death surrounded me: * and the torrents of iniquity troubled me.'
      - type: citation
        text: '17:6 The sorrows of hell encompassed me: * and the snares of death prevented me.'
      - type: citation
        text: '17:7a In my affliction I called upon the Lord, * and I cried to my God:'
      - type: citation
        text: '17:7b And he heard my voice from his holy temple: * and my cry before him came into his ears.'
      - type: citation
        text: '17:8 The earth shook and trembled: * the foundations of the mountains were troubled and were moved, because he was angry with them.'
      - type: citation
        text: '17:9 There went up a smoke in his wrath: † and a fire flamed from his face: * coals were kindled by it.'
      - type: citation
        text: 17:10 He bowed the heavens, and came down, * and darkness was under his feet.
      - type: citation
        text: 17:11 And he ascended upon the cherubim, and he flew; * he flew upon the wings of the winds.
      - type: citation
        text: '17:12 And he made darkness his covert, † his pavilion round about him: * dark waters in the clouds of the air.'
      - type: citation
        text: 17:13 At the brightness that was before him the clouds passed, * hail and coals of fire.
      - type: citation
        text: '17:14 And the Lord thundered from heaven, † and the Highest gave his voice: * hail and coals of fire.'
      - type: citation
        text: '17:15 And he sent forth his arrows, and he scattered them: * he multiplied lightnings, and troubled them.'
      - type: citation
        text: '17:16a Then the fountains of waters appeared, * and the foundations of the world were discovered:'
      - type: citation
        text: 17:16b At thy rebuke, O Lord, * at the blast of the spirit of thy wrath.
      - type: citation
        text: '17:17 He sent from on high, and took me: * and received me out of many waters.'
      - type: citation
        text: '17:18 He delivered me from my strongest enemies, † and from them that hated me: * for they were too strong for me.'
      - type: citation
        text: '17:19 They prevented me in the day of my affliction: * and the Lord became my protector.'
      - type: citation
        text: '17:20 And he brought me forth into a large place: * he saved me, because he was well pleased with me.'
      - type: citation
        text: '17:21 And the Lord will reward me according to my justice; * and will repay me according to the cleanness of my hands:'
      - type: citation
        text: 17:22 Because I have kept the ways of the Lord; * and have not done wickedly against my God.
      - type: citation
        text: '17:23 For all his judgments are in my sight: * and his justices I have not put away from me.'
      - type: citation
        text: '17:24 And I shall be spotless with him: * and shall keep myself from my iniquity.'
      - type: citation
        text: '17:25 And the Lord will reward me according to my justice: * and according to the cleanness of my hands before his eyes.'
      - type: citation
        text: '17:26 With the holy thou wilt be holy; * and with the innocent man thou wilt be innocent:'
      - type: citation
        text: '17:27 And with the elect thou wilt be elect: * and with the perverse thou wilt be perverted.'
      - type: citation
        text: 17:28 For thou wilt save the humble people; * but wilt bring down the eyes of the proud.
      - type: citation
        text: '17:29 For thou lightest my lamp, O Lord: * O my God, enlighten my darkness.'
      - type: citation
        text: 17:30 For by thee I shall be delivered from temptation; * and through my God I shall go over a wall.
      - type: citation
        text: '17:31 As for my God, his way is undefiled: † the words of the Lord are fire-tried: * he is the protector of all that trust in him.'
      - type: citation
        text: 17:32 For who is God but the Lord? * or who is God but our God?
      - type: citation
        text: 17:33 God, who hath girt me with strength; * and made my way blameless.
      - type: citation
        text: '17:34 Who hath made my feet like the feet of harts: * and who setteth me upon high places.'
      - type: citation
        text: '17:35 Who teacheth my hands to war: * and thou hast made my arms like a brazen bow.'
      - type: citation
        text: '17:36a Thou hast given me the protection of thy salvation: * and thy right hand hath held me up:'
      - type: citation
        text: '17:36b And thy discipline hath corrected me unto the end: * and thy discipline, the same shall teach me.'
      - type: citation
        text: 17:37 Thou hast enlarged my steps under me; * and my feet are not weakened.
      - type: citation
        text: '17:38 I will pursue after my enemies, and overtake them: * and I will not turn again till they are consumed.'
      - type: citation
        text: '17:39 I will break them, and they shall not be able to stand: * they shall fall under my feet.'
      - type: citation
        text: 17:40 And thou hast girded me with strength unto battle; * and hast subdued under me them that rose up against me.
      - type: citation
        text: 17:41 And thou hast made my enemies turn their back upon me, * and hast destroyed them that hated me.
      - type: citation
        text: '17:42 They cried, but there was none to save them, to the Lord: * but he heard them not.'
      - type: citation
        text: 17:43 And I shall beat them as small as the dust before the wind; * I shall bring them to nought, like the dirt in the streets.
      - type: citation
        text: 17:44 Thou wilt deliver me from the contradictions of the people; * thou wilt make me head of the Gentiles.
      - type: citation
        text: '17:45 A people which I knew not, hath served me: * at the hearing of the ear they have obeyed me.'
      - type: citation
        text: 17:46 The children that are strangers have lied to me, * strange children have faded away, and have halted from their paths.
      - type: citation
        text: 17:47 The Lord liveth, and blessed be my God, * and let the God of my salvation be exalted.
      - type: citation
        text: 17:48 O God, who avengest me, and subduest the people under me, * my deliverer from my enraged enemies.
      - type: citation
        text: '17:49 And thou wilt lift me up above them that rise up against me: * from the unjust man thou wilt deliver me.'
      - type: citation
        text: 17:50 Therefore will I give glory to thee, O Lord, among the nations, * and I will sing a psalm to thy name.
      - type: citation
        text: '17:51 Giving great deliverance to his king, † and shewing mercy to David, his anointed: * and to his seed for ever.'
      la:
      - type: citation
        text: '17:2 Díligam te, Dómine, fortitúdo mea: * (3a) Dóminus firmaméntum meum, et refúgium meum, et liberátor meus.'
      - type: citation
        text: 17:3b Deus meus adiútor meus, * et sperábo in eum.
      - type: citation
        text: 17:3c Protéctor meus, et cornu salútis meæ, * et suscéptor meus.
      - type: citation
        text: '17:4 Laudans invocábo Dóminum: * et ab inimícis meis salvus ero.'
      - type: citation
        text: '17:5 Circumdedérunt me dolóres mortis: * et torréntes iniquitátis conturbavérunt me.'
      - type: citation
        text: '17:6 Dolóres inférni circumdedérunt me: * præoccupavérunt me láquei mortis.'
      - type: citation
        text: 17:7a In tribulatióne mea invocávi Dóminum, * et ad Deum meum clamávi.
      - type: citation
        text: '17:7b Et exaudívit de templo sancto suo vocem meam: * et clamor meus in conspéctu eius, introívit in aures eius.'
      - type: citation
        text: '17:8 Commóta est, et contrémuit terra: * fundaménta móntium conturbáta sunt, et commóta sunt, quóniam irátus est eis.'
      - type: citation
        text: '17:9 Ascéndit fumus in ira eius: † et ignis a fácie eius exársit: * carbónes succénsi sunt ab eo.'
      - type: citation
        text: '17:10 Inclinávit cælos, et descéndit: * et calígo sub pédibus eius.'
      - type: citation
        text: '17:11 Et ascéndit super Chérubim, et volávit: * volávit super pennas ventórum.'
      - type: citation
        text: '17:12 Et pósuit ténebras latíbulum suum, † in circúitu eius tabernáculum eius: * tenebrósa aqua in núbibus áëris.'
      - type: citation
        text: 17:13 Præ fulgóre in conspéctu eius nubes transiérunt, * grando et carbónes ignis.
      - type: citation
        text: '17:14 Et intónuit de cælo Dóminus, † et Altíssimus dedit vocem suam: * grando et carbónes ignis.'
      - type: citation
        text: '17:15 Et misit sagíttas suas, et dissipávit eos: * fúlgura multiplicávit, et conturbávit eos.'
      - type: citation
        text: '17:16a Et apparuérunt fontes aquárum, * et reveláta sunt fundaménta orbis terrárum:'
      - type: citation
        text: 17:16b Ab increpatióne tua, Dómine, * ab inspiratióne spíritus iræ tuæ.
      - type: citation
        text: '17:17 Misit de summo, et accépit me: * et assúmpsit me de aquis multis.'
      - type: citation
        text: '17:18 Erípuit me de inimícis meis fortíssimis, † et ab his qui odérunt me: * quóniam confortáti sunt super me.'
      - type: citation
        text: '17:19 Prævenérunt me in die afflictiónis meæ: * et factus est Dóminus protéctor meus.'
      - type: citation
        text: '17:20 Et edúxit me in latitúdinem: * salvum me fecit, quóniam vóluit me.'
      - type: citation
        text: '17:21 Et retríbuet mihi Dóminus secúndum iustítiam meam: * et secúndum puritátem mánuum meárum retríbuet mihi:'
      - type: citation
        text: 17:22 Quia custodívi vias Dómini, * nec ímpie gessi a Deo meo.
      - type: citation
        text: '17:23 Quóniam ómnia iudícia eius in conspéctu meo: * et iustítias eius non répuli a me.'
      - type: citation
        text: '17:24 Et ero immaculátus cum eo: * et observábo me ab iniquitáte mea.'
      - type: citation
        text: '17:25 Et retríbuet mihi Dóminus secúndum iustítiam meam: * et secúndum puritátem mánuum meárum in conspéctu oculórum eius.'
      - type: citation
        text: '17:26 Cum sancto sanctus eris, * et cum viro innocénte ínnocens eris:'
      - type: citation
        text: '17:27 Et cum elécto eléctus eris: * et cum pervérso pervertéris.'
      - type: citation
        text: '17:28 Quóniam tu pópulum húmilem salvum fácies: * et óculos superbórum humiliábis.'
      - type: citation
        text: '17:29 Quóniam tu illúminas lucérnam meam, Dómine: * Deus meus, illúmina ténebras meas.'
      - type: citation
        text: 17:30 Quóniam in te erípiar a tentatióne, * et in Deo meo transgrédiar murum.
      - type: citation
        text: '17:31 Deus meus, impollúta via eius: † elóquia Dómini igne examináta: * protéctor est ómnium sperántium in se.'
      - type: citation
        text: 17:32 Quóniam quis Deus præter Dóminum? * aut quis Deus præter Deum nostrum?
      - type: citation
        text: '17:33 Deus, qui præcínxit me virtúte: * et pósuit immaculátam viam meam.'
      - type: citation
        text: 17:34 Qui perfécit pedes meos tamquam cervórum, * et super excélsa státuens me.
      - type: citation
        text: '17:35 Qui docet manus meas ad prǽlium: * et posuísti, ut arcum ǽreum, brácchia mea.'
      - type: citation
        text: '17:36a Et dedísti mihi protectiónem salútis tuæ: * et déxtera tua suscépit me:'
      - type: citation
        text: '17:36b Et disciplína tua corréxit me in finem: * et disciplína tua ipsa me docébit.'
      - type: citation
        text: '17:37 Dilatásti gressus meos subtus me: * et non sunt infirmáta vestígia mea:'
      - type: citation
        text: '17:38 Pérsequar inimícos meos et comprehéndam illos: * et non convértar, donec defíciant.'
      - type: citation
        text: '17:39 Confríngam illos, nec póterunt stare: * cadent subtus pedes meos.'
      - type: citation
        text: '17:40 Et præcinxísti me virtúte ad bellum: * et supplantásti insurgéntes in me subtus me.'
      - type: citation
        text: 17:41 Et inimícos meos dedísti mihi dorsum, * et odiéntes me disperdidísti.
      - type: citation
        text: '17:42 Clamavérunt, nec erat qui salvos fáceret ad Dóminum: * nec exaudívit eos.'
      - type: citation
        text: '17:43 Et commínuam eos, ut púlverem ante fáciem venti: * ut lutum plateárum delébo eos.'
      - type: citation
        text: '17:44 Erípies me de contradictiónibus pópuli: * constítues me in caput géntium.'
      - type: citation
        text: '17:45 Pópulus quem non cognóvi servívit mihi: * in audítu auris obedívit mihi.'
      - type: citation
        text: 17:46 Fílii aliéni mentíti sunt mihi, * fílii aliéni inveteráti sunt, et claudicavérunt a sémitis suis.
      - type: citation
        text: '17:47 Vivit Dóminus, et benedíctus Deus meus: * et exaltétur Deus salútis meæ.'
      - type: citation
        text: '17:48 Deus, qui das vindíctas mihi, et subdis pópulos sub me: * liberátor meus de inimícis meis iracúndis.'
      - type: citation
        text: '17:49 Et ab insurgéntibus in me exaltábis me: * a viro iníquo erípies me.'
      - type: citation
        text: '17:50 Proptérea confitébor tibi in natiónibus, Dómine: * et nómini tuo psalmum dicam.'
      - type: citation
        text: '17:51 Magníficans salútes Regis eius, † et fáciens misericórdiam Christo suo David: * et sémini eius usque in sǽculum.'
      en2:
      - type: citation
        text: '17:2 I will love you, O Lord, my strength: * (3a) the Lord is my firmament, and my refuge, and my deliverer.'
      - type: citation
        text: 17:3b My God is my helper, * and in him will I hope.
      - type: citation
        text: 17:3c My protector, and the horn of my salvation, * and my support.
      - type: citation
        text: '17:4 I will praise the Lord with invocation: * and I shall be saved from my enemies.'
      - type: citation
        text: '17:5 The sorrows of death surrounded me: * and the torrents of iniquity troubled me.'
      - type: citation
        text: '17:6 The sorrows of hell encompassed me: * the snares of death anticipated me.'
      - type: citation
        text: 17:7a In my affliction I called upon the Lord, * and I cried to my God.
      - type: citation
        text: '17:7b And he heard my voice from his holy temple: * and my cry came before him, into his ears.'
      - type: citation
        text: '17:8 The earth was moved and trembled: * the foundations of the mountains were troubled and were shaken, because he was angry with them.'
      - type: citation
        text: '17:9 A smoke ascended by his wrath: † and a fire flared up from his face: * coals were kindled by it.'
      - type: citation
        text: '17:10 He bent the heavens, and he descended: * and darkness was under his feet.'
      - type: citation
        text: '17:11 And he ascended upon the Cherubim, and he flew: * he flew upon the feathers of the winds.'
      - type: citation
        text: '17:12 And he set darkness as his hiding place, † with his tabernacle all around him: * dark waters in the clouds of the air.'
      - type: citation
        text: 17:13 At the brightness that was before his sight, the clouds crossed by, * with hail and coals of fire.
      - type: citation
        text: '17:14 And the Lord thundered from heaven, † and the Most High uttered his voice: * with hail and coals of fire.'
      - type: citation
        text: '17:15 And he sent forth his arrows and scattered them: * he multiplied lightnings, and he set them in disarray.'
      - type: citation
        text: '17:16a And the fountains of waters appeared, * and the foundations of the world were revealed:'
      - type: citation
        text: 17:16b By your rebuke, O Lord, * by the inspiration of the Spirit of your wrath.
      - type: citation
        text: '17:17 He sent from on high, and he accepted me: * and he took me up out of many waters.'
      - type: citation
        text: '17:18 He rescued me from my strongest enemies, † and from those who hated me: * for they had been too strong for me.'
      - type: citation
        text: '17:19 They intercepted me in the day of my affliction: * and the Lord became my protector.'
      - type: citation
        text: '17:20 And he led me out into a wide place: * he accomplished my salvation, because he willed me.'
      - type: citation
        text: '17:21 And the Lord will reward me according to my justice: * and he will repay me according to the purity of my hands:'
      - type: citation
        text: 17:22 For I have preserved the ways of the Lord, * and I have not behaved impiously before my God.
      - type: citation
        text: '17:23 For all his judgments are in my sight: * and his justice I have not pushed away from me.'
      - type: citation
        text: '17:24 And I will be immaculate together with him: * and I will keep myself from my iniquity.'
      - type: citation
        text: '17:25 And the Lord will reward me according to my justice: * and according to the purity of my hands before his eyes.'
      - type: citation
        text: '17:26 With the holy, you will be holy, * and with the innocent, you will be innocent:'
      - type: citation
        text: '17:27 And with the elect, you will be elect: * and with the perverse, you will be perverse.'
      - type: citation
        text: '17:28 For you will save the humble people: * and you will bring down the eyes of the arrogant.'
      - type: citation
        text: '17:29 For you illuminate my lamp, O Lord: * my God, enlighten my darkness.'
      - type: citation
        text: '17:30 For in you, I will be delivered from temptation: * and with my God, I will climb over a wall.'
      - type: citation
        text: '17:31 As for my God, his way is undefiled: † the eloquence of the Lord has been examined by fire: * he is the protector of all who hope in him.'
      - type: citation
        text: 17:32 For who is God, except the Lord? * and who is God, except our God?
      - type: citation
        text: '17:33 It is God who has wrapped me with virtue: * and made my way immaculate.'
      - type: citation
        text: 17:34 It is he who has perfected my feet like the feet of deer, * and who stations me upon the heights.
      - type: citation
        text: '17:35 It is he who trains my hands for battle: * and you have set my arms like a bow of brass.'
      - type: citation
        text: '17:36a And you have given me the protection of your salvation: * and your right hand sustains me:'
      - type: citation
        text: '17:36b And your discipline has corrected me unto the end: * and your discipline itself will teach me.'
      - type: citation
        text: '17:37 You have expanded my footsteps under me: * and my tracks have not been weakened:'
      - type: citation
        text: '17:38 I will pursue my enemies and apprehend them: * and I will not turn back until they have failed.'
      - type: citation
        text: '17:39 I will break them, and they will not be able to stand: * they will fall under my feet.'
      - type: citation
        text: '17:40 And you have wrapped me with virtue for the battle: * and those rising up against me, you have subdued under me.'
      - type: citation
        text: 17:41 And you have given the back of my enemies to me, * and you have destroyed those who hated me.
      - type: citation
        text: '17:42 They cried out, but there was none to save them, to the Lord: * but he did not heed them.'
      - type: citation
        text: '17:43 And I will crush them into dust before the face of the wind: * so that I will obliterate them like the mud in the streets.'
      - type: citation
        text: '17:44 You will rescue me from the contradictions of the people: * you will set me at the head of the Gentiles.'
      - type: citation
        text: '17:45 A people I did not know has served me: * as soon as their ears heard, they were obedient to me.'
      - type: citation
        text: 17:46 The sons of foreigners have been deceitful to me, * the sons of foreigners have grown weak with time, and they have wavered from their paths.
      - type: citation
        text: '17:47 The Lord lives, and blessed is my God: * and may the God of my salvation be exalted.'
      - type: citation
        text: '17:48 O God, who vindicates me and who subdues the people under me: * my liberator from my enraged enemies.'
      - type: citation
        text: '17:49 And you will exalt me above those who rise up against me: * from the iniquitous man, you will rescue me.'
      - type: citation
        text: '17:50 Because of this, I will confess to you among the nations, O Lord: * and I will compose a psalm to your name:'
      - type: citation
        text: '17:51 Magnifying the salvation of his king, † and showing mercy to David, his Christ: * and to his offspring, even for all time.'
  psalm.18-2-c-li-en-rrant-gl-riam-dei-et-pera-m-nuum-ei-47038898e6:
    role: psalm
    content:
      en:
      - type: citation
        text: 18:2 The heavens shew forth the glory of God, * and the firmament declareth the work of his hands.
      - type: citation
        text: 18:3 Day to day uttereth speech, * and night to night sheweth knowledge.
      - type: citation
        text: 18:4 There are no speeches nor languages, * where their voices are not heard.
      - type: citation
        text: '18:5 Their sound hath gone forth into all the earth: * and their words unto the ends of the world.'
      - type: citation
        text: '18:6a He hath set his tabernacle in the sun: * and he, as a bridegroom coming out of his bride chamber,'
      - type: citation
        text: '18:6b Hath rejoiced as a giant to run the way: * (7a) his going out is from the end of heaven,'
      - type: citation
        text: '18:7b And his circuit even to the end thereof: * and there is no one that can hide himself from his heat.'
      - type: citation
        text: '18:8 The law of the Lord is unspotted, converting souls: * the testimony of the Lord is faithful, giving wisdom to little ones.'
      - type: citation
        text: '18:9 The justices of the Lord are right, rejoicing hearts: * the commandment of the Lord is lightsome, enlightening the eyes.'
      - type: citation
        text: '18:10 The fear of the Lord is holy, enduring for ever and ever: * the judgments of the Lord are true, justified in themselves.'
      - type: citation
        text: '18:11 More to be desired than gold and many precious stones: * and sweeter than honey and the honeycomb.'
      - type: citation
        text: 18:12 For thy servant keepeth them, * and in keeping them there is a great reward.
      - type: citation
        text: '18:13 Who can understand sins? † from my secret ones cleanse me, O Lord: * (14a) and from those of others spare thy servant.'
      - type: citation
        text: '18:14b If they shall have no dominion over me, then shall I be without spot: * and I shall be cleansed from the greatest sin.'
      - type: citation
        text: '18:15a And the words of my mouth shall be such as may please: * and the meditation of my heart always in thy sight.'
      - type: citation
        text: 18:15b O Lord, my helper, * and my redeemer.
      la:
      - type: citation
        text: '18:2 Cæli enárrant glóriam Dei: * et ópera mánuum eius annúntiat firmaméntum.'
      - type: citation
        text: 18:3 Dies diéi erúctat verbum, * et nox nocti índicat sciéntiam.
      - type: citation
        text: 18:4 Non sunt loquélæ, neque sermónes, * quorum non audiántur voces eórum.
      - type: citation
        text: '18:5 In omnem terram exívit sonus eórum: * et in fines orbis terræ verba eórum.'
      - type: citation
        text: '18:6a In sole pósuit tabernáculum suum: * et ipse tamquam sponsus procédens de thálamo suo:'
      - type: citation
        text: '18:6b Exsultávit ut gigas ad curréndam viam, * (7a) a summo cælo egréssio eius:'
      - type: citation
        text: '18:7b Et occúrsus eius usque ad summum eius: * nec est qui se abscóndat a calóre eius.'
      - type: citation
        text: '18:8 Lex Dómini immaculáta, convértens ánimas: * testimónium Dómini fidéle, sapiéntiam præstans párvulis.'
      - type: citation
        text: '18:9 Iustítiæ Dómini rectæ, lætificántes corda: * præcéptum Dómini lúcidum, illúminans óculos.'
      - type: citation
        text: '18:10 Timor Dómini sanctus, pérmanens in sǽculum sǽculi: * iudícia Dómini vera, iustificáta in semetípsa.'
      - type: citation
        text: '18:11 Desiderabília super aurum et lápidem pretiósum multum: * et dulcióra super mel et favum.'
      - type: citation
        text: 18:12 Étenim servus tuus custódit ea, * in custodiéndis illis retribútio multa.
      - type: citation
        text: '18:13 Delícta quis intéllegit? † ab occúltis meis munda me: * (14a) et ab aliénis parce servo tuo.'
      - type: citation
        text: '18:14b Si mei non fúerint domináti, tunc immaculátus ero: * et emundábor a delícto máximo.'
      - type: citation
        text: '18:15a Et erunt ut compláceant elóquia oris mei: * et meditátio cordis mei in conspéctu tuo semper.'
      - type: citation
        text: 18:15b Dómine, adiútor meus, * et redémptor meus.
      en2:
      - type: citation
        text: '18:2 The heavens describe the glory of God: * and the firmament announces the work of his hands.'
      - type: citation
        text: 18:3 Day proclaims the word to day, * and night to night imparts knowledge.
      - type: citation
        text: 18:4 There are no speeches or conversations, * where their voices are not being heard.
      - type: citation
        text: '18:5 Their sound has gone forth through all the earth: * and their words to the ends of the world.'
      - type: citation
        text: '18:6a He has placed his tabernacle in the sun: * and he is like a bridegroom coming out of his bedroom:'
      - type: citation
        text: '18:6b He has exulted like a giant running along the way, * (7a) his departure is from the summit of heaven:'
      - type: citation
        text: '18:7b And his course reaches all the way to its summit: * neither is there anyone who can hide himself from his heat.'
      - type: citation
        text: '18:8 The law of the Lord is immaculate, converting souls: * the testimony of the Lord is faithful, providing wisdom to little ones.'
      - type: citation
        text: '18:9 The justice of the Lord is right, rejoicing hearts: * the precepts of the Lord are brilliant, enlightening the eyes.'
      - type: citation
        text: '18:10 The fear of the Lord is holy, enduring for all generations: * the judgments of the Lord are true, justified in themselves.'
      - type: citation
        text: '18:11 Desirable beyond gold and many precious stones: * and sweeter than honey and the honeycomb.'
      - type: citation
        text: 18:12 For, indeed, your servant keeps them, * and in keeping them, there are many rewards.
      - type: citation
        text: '18:13 Who can understand transgression? † From my hidden faults, cleanse me, O Lord: * (14a) and from those of others, spare your servant.'
      - type: citation
        text: '18:14b If they will have no dominion over me, then I will be immaculate: * and I will be cleansed from the greatest transgression.'
      - type: citation
        text: '18:15a And the eloquence of my mouth will be so as to please: * along with the meditation of my heart in your sight always.'
      - type: citation
        text: 18:15b O Lord, my helper, * and my redeemer.
  psalm.19-2-ex-udiat-te-d-minus-in-die-tribulati-nis-pr-9f212e6ce1:
    role: psalm
    content:
      en:
      - type: citation
        text: '19:2 May the Lord hear thee in the day of tribulation: * may the name of the God of Jacob protect thee.'
      - type: citation
        text: '19:3 May he send thee help from the sanctuary: * and defend thee out of Sion.'
      - type: citation
        text: '19:4 May he be mindful of all thy sacrifices: * and may thy whole burnt offering be made fat.'
      - type: citation
        text: 19:5 May he give thee according to thy own heart; * and confirm all thy counsels.
      - type: citation
        text: 19:6 We will rejoice in thy salvation; * and in the name of our God we shall be exalted.
      - type: citation
        text: '19:7a The Lord fulfil all thy petitions: * now have I known that the Lord hath saved his anointed.'
      - type: citation
        text: '19:7b He will hear him from his holy heaven: * the salvation of his right hand is in powers.'
      - type: citation
        text: '19:8 Some trust in chariots, and some in horses: * but we will call upon the name of the Lord, our God.'
      - type: citation
        text: '19:9 They are bound, and have fallen: * but we are risen, and are set upright.'
      - type: citation
        text: '19:10 O Lord, save the king: * and hear us in the day that we shall call upon thee.'
      la:
      - type: citation
        text: '19:2 Exáudiat te Dóminus in die tribulatiónis: * prótegat te nomen Dei Iacob.'
      - type: citation
        text: '19:3 Mittat tibi auxílium de sancto: * et de Sion tueátur te.'
      - type: citation
        text: '19:4 Memor sit omnis sacrifícii tui: * et holocáustum tuum pingue fiat.'
      - type: citation
        text: '19:5 Tríbuat tibi secúndum cor tuum: * et omne consílium tuum confírmet.'
      - type: citation
        text: '19:6 Lætábimur in salutári tuo: * et in nómine Dei nostri magnificábimur.'
      - type: citation
        text: '19:7a Ímpleat Dóminus omnes petitiónes tuas: * nunc cognóvi quóniam salvum fecit Dóminus Christum suum.'
      - type: citation
        text: '19:7b Exáudiet illum de cælo sancto suo: * in potentátibus salus déxteræ eius.'
      - type: citation
        text: '19:8 Hi in cúrribus, et hi in equis: * nos autem in nómine Dómini, Dei nostri invocábimus.'
      - type: citation
        text: '19:9 Ipsi obligáti sunt, et cecidérunt: * nos autem surréximus et erécti sumus.'
      - type: citation
        text: '19:10 Dómine, salvum fac regem: * et exáudi nos in die, qua invocavérimus te.'
      en2:
      - type: citation
        text: '19:2 May the Lord hear you in the day of tribulation: * may the name of the God of Jacob protect you.'
      - type: citation
        text: '19:3 May he send you help from the sanctuary: * and watch over you from Zion.'
      - type: citation
        text: '19:4 May he be mindful of all your sacrifices: * and may your burnt-offerings be fat.'
      - type: citation
        text: '19:5 May he grant to you according to your heart: * and confirm all your counsels.'
      - type: citation
        text: '19:6 We will rejoice in your salvation: * and in the name of our God, we will be magnified.'
      - type: citation
        text: '19:7a May the Lord fulfill all your petitions: * now I know that the Lord has saved his Christ.'
      - type: citation
        text: '19:7b He will hear him from his holy heaven: * the salvation of his right hand is in his power.'
      - type: citation
        text: '19:8 Some trust in chariots, and some in horses: * but we will call upon the name of the Lord our God.'
      - type: citation
        text: '19:9 They have been bound, and they have fallen: * but we have risen up and we have been set upright.'
      - type: citation
        text: '19:10 O Lord, save the king: * and hear us on the day that we will call upon you.'
  psalm.2-1-quare-fremu-runt-gentes-et-p-puli-medit-ti-s-93ec6da8d8:
    role: psalm
    content:
      en:
      - type: citation
        text: 2:1 Why have the Gentiles raged, * and the people devised vain things?
      - type: citation
        text: 2:2 The kings of the earth stood up, and the princes met together, * against the Lord and against his Christ.
      - type: citation
        text: '2:3 Let us break their bonds asunder: * and let us cast away their yoke from us.'
      - type: citation
        text: '2:4 He that dwelleth in heaven shall laugh at them: * and the Lord shall deride them.'
      - type: citation
        text: 2:5 Then shall he speak to them in his anger, * and trouble them in his rage.
      - type: citation
        text: 2:6 But I am appointed king by him over Sion his holy mountain, * preaching his commandment.
      - type: citation
        text: '2:7 The Lord hath said to me: * Thou art my son, this day have I begotten thee.'
      - type: citation
        text: 2:8 Ask of me, and I will give thee the Gentiles for thy inheritance, * and the utmost parts of the earth for thy possession.
      - type: citation
        text: 2:9 Thou shalt rule them with a rod of iron, * and shalt break them in pieces like a potter’s vessel.
      - type: citation
        text: '2:10 And now, O ye kings, understand: * receive instruction, you that judge the earth.'
      - type: citation
        text: '2:11 Serve ye the Lord with fear: * and rejoice unto him with trembling.'
      - type: citation
        text: 2:12 Embrace discipline, lest at any time the Lord be angry, * and you perish from the just way.
      - type: citation
        text: 2:13 When his wrath shall be kindled in a short time, * blessed are all they that trust in him.
      la:
      - type: citation
        text: '2:1 Quare fremuérunt gentes: * et pópuli meditáti sunt inánia?'
      - type: citation
        text: 2:2 Astitérunt reges terræ, et príncipes convenérunt in unum * advérsus Dóminum, et advérsus Christum eius.
      - type: citation
        text: '2:3 Dirumpámus víncula eórum: * et proiciámus a nobis iugum ipsórum.'
      - type: citation
        text: '2:4 Qui hábitat in cælis, irridébit eos: * et Dóminus subsannábit eos.'
      - type: citation
        text: 2:5 Tunc loquétur ad eos in ira sua, * et in furóre suo conturbábit eos.
      - type: citation
        text: 2:6 Ego autem constitútus sum Rex ab eo super Sion montem sanctum eius, * prǽdicans præcéptum eius.
      - type: citation
        text: '2:7 Dóminus dixit ad me: * Fílius meus es tu, ego hódie génui te.'
      - type: citation
        text: 2:8 Póstula a me, et dabo tibi gentes hereditátem tuam, * et possessiónem tuam términos terræ.
      - type: citation
        text: 2:9 Reges eos in virga férrea, * et tamquam vas fíguli confrínges eos.
      - type: citation
        text: '2:10 Et nunc, reges, intellégite: * erudímini, qui iudicátis terram.'
      - type: citation
        text: '2:11 Servíte Dómino in timóre: * et exsultáte ei cum tremóre.'
      - type: citation
        text: 2:12 Apprehéndite disciplínam, nequándo irascátur Dóminus, * et pereátis de via iusta.
      - type: citation
        text: '2:13 Cum exárserit in brevi ira eius: * beáti omnes qui confídunt in eo.'
      en2:
      - type: citation
        text: '2:1 Why have the Gentiles been seething: * and why have the people been pondering nonsense?'
      - type: citation
        text: '2:2 The kings of the earth have stood up, and the leaders have joined together as one * against the Lord, and against his Christ:'
      - type: citation
        text: '2:3 Let us shatter their chains: * and cast their yoke away from us.'
      - type: citation
        text: '2:4 He who dwells in heaven will ridicule them: * and the Lord will mock them.'
      - type: citation
        text: 2:5 Then will he speak to them in his anger, * and trouble them with his fury.
      - type: citation
        text: 2:6 Yet I have been appointed king by him over Zion, his holy mountain, * preaching his precepts.
      - type: citation
        text: '2:7 The Lord has said to me: * You are my son, this day have I begotten you.'
      - type: citation
        text: 2:8 Ask of me, and I will give to you the Gentiles for your inheritance, * and the ends of the earth for your possession.
      - type: citation
        text: 2:9 You will rule them with an iron rod, * and you will shatter them like a potter's vessel.
      - type: citation
        text: '2:10 And now, O kings, understand: * be instructed, you who judge the earth.'
      - type: citation
        text: '2:11 Serve the Lord in fear: * and rejoice before him with trembling.'
      - type: citation
        text: 2:12 Embrace discipline, lest at any time the Lord be angry, * and you perish from the just way.
      - type: citation
        text: '2:13 When his wrath shall be kindled in a short time: * blessed are all who trust in him.'
  psalm.20-2-d-mine-in-virt-te-tua-l-t-bitur-rex-et-supe-45a2b579ba:
    role: psalm
    content:
      en:
      - type: citation
        text: 20:2 The king rejoices in thy strength, O Lord; * and in thy salvation he shall rejoice exceedingly.
      - type: citation
        text: '20:3 Thou hast given him his heart’s desire: * and hast not withholden from him the will of his lips.'
      - type: citation
        text: '20:4 For thou hast prevented him with blessings of sweetness: * thou hast set on his head a crown of precious stones.'
      - type: citation
        text: '20:5 He asked life of thee: * and thou hast given him length of days for ever and ever.'
      - type: citation
        text: '20:6 His glory is great in thy salvation: * glory and great beauty shalt thou lay upon him.'
      - type: citation
        text: '20:7 For thou shalt give him to be a blessing for ever and ever: * thou shalt make him joyful in gladness with thy countenance.'
      - type: citation
        text: '20:8 For the king hopeth in the Lord: * and through the mercy of the most High he shall not be moved.'
      - type: citation
        text: '20:9 Let thy hand be found by all thy enemies: * let thy right hand find out all them that hate thee.'
      - type: citation
        text: '20:10 Thou shalt make them as an oven of fire, * in the time of thy anger: the Lord shall trouble them in his wrath, and fire shall devour them.'
      - type: citation
        text: '20:11 Their fruit shalt thou destroy from the earth: * and their seed from among the children of men.'
      - type: citation
        text: '20:12 For they have intended evils against thee: * they have devised counsels which they have not been able to establish.'
      - type: citation
        text: '20:13 For thou shalt make them turn their back: * in thy remnants thou shalt prepare their face.'
      - type: citation
        text: '20:14 Be thou exalted, O Lord, in thy own strength: * we will sing and praise thy power.'
      la:
      - type: citation
        text: '20:2 Dómine, in virtúte tua lætábitur rex: * et super salutáre tuum exsultábit veheménter.'
      - type: citation
        text: '20:3 Desidérium cordis eius tribuísti ei: * et voluntáte labiórum eius non fraudásti eum.'
      - type: citation
        text: '20:4 Quóniam prævenísti eum in benedictiónibus dulcédinis: * posuísti in cápite eius corónam de lápide pretióso.'
      - type: citation
        text: '20:5 Vitam pétiit a te: * et tribuísti ei longitúdinem diérum in sǽculum, et in sǽculum sǽculi.'
      - type: citation
        text: '20:6 Magna est glória eius in salutári tuo: * glóriam et magnum decórem impónes super eum.'
      - type: citation
        text: '20:7 Quóniam dabis eum in benedictiónem in sǽculum sǽculi: * lætificábis eum in gáudio cum vultu tuo.'
      - type: citation
        text: '20:8 Quóniam rex sperat in Dómino: * et in misericórdia Altíssimi non commovébitur.'
      - type: citation
        text: '20:9 Inveniátur manus tua ómnibus inimícis tuis: * déxtera tua invéniat omnes, qui te odérunt.'
      - type: citation
        text: '20:10 Pones eos ut clíbanum ignis in témpore vultus tui: * Dóminus in ira sua conturbábit eos, et devorábit eos ignis.'
      - type: citation
        text: '20:11 Fructum eórum de terra perdes: * et semen eórum a fíliis hóminum.'
      - type: citation
        text: '20:12 Quóniam declinavérunt in te mala: * cogitavérunt consília, quæ non potuérunt stabilíre.'
      - type: citation
        text: '20:13 Quóniam pones eos dorsum: * in relíquiis tuis præparábis vultum eórum.'
      - type: citation
        text: '20:14 Exaltáre, Dómine, in virtúte tua: * cantábimus et psallémus virtútes tuas.'
      en2:
      - type: citation
        text: '20:2 O Lord, in your strength the king shall rejoice: * and in your salvation he shall exult exceedingly.'
      - type: citation
        text: '20:3 You have given him his heart''s desire: * and have not withheld from him the will of his lips.'
      - type: citation
        text: '20:4 For you have gone before him with the blessings of sweetness: * you have set upon his head a crown of precious stone.'
      - type: citation
        text: '20:5 He asked life of you: * and you gave him length of days for ever and ever.'
      - type: citation
        text: '20:6 Great is his glory in your salvation: * glory and great majesty you will lay upon him.'
      - type: citation
        text: '20:7 For you will give him a blessing for ever and ever: * you will make him joyful in gladness with your face.'
      - type: citation
        text: '20:8 For the king hopes in the Lord: * and through the mercy of the Most High he shall not be moved.'
      - type: citation
        text: '20:9 Let your hand be found upon all your enemies: * your right hand shall find all who hate you.'
      - type: citation
        text: '20:10 You shall make them as a fiery oven in the time of your face: * the Lord in his anger shall trouble them, and fire shall devour them.'
      - type: citation
        text: '20:11 You shall destroy their fruit from the earth: * and their seed from among the sons of men.'
      - type: citation
        text: '20:12 For they have devised evils against you: * they thought up counsels which they could not establish.'
      - type: citation
        text: '20:13 For you shall make them turn their back: * among those that remain, you shall prepare their face.'
      - type: citation
        text: '20:14 Be exalted, O Lord, in your strength: * we will sing and praise your mighty deeds.'
  psalm.21-2-deus-deus-meus-r-spice-in-me-quare-me-derel-378b5a827b:
    role: psalm
    content:
      en:
      - type: citation
        text: '21:2 O God my God, look upon me: why hast thou forsaken me? * Far from my salvation are the words of my sins.'
      - type: citation
        text: '21:3 O my God, I shall cry by day, and thou wilt not hear: * and by night, and it shall not be reputed as folly in me.'
      - type: citation
        text: 21:4 But thou dwellest in the holy place, * the praise of Israel.
      - type: citation
        text: '21:5 In thee have our fathers hoped: * they have hoped, and thou hast delivered them.'
      - type: citation
        text: '21:6 They cried to thee, and they were saved: * they trusted in thee, and were not confounded.'
      - type: citation
        text: '21:7 But I am a worm, and no man: * the reproach of men, and the outcast of the people.'
      - type: citation
        text: '21:8 All they that saw me have laughed me to scorn: * they have spoken with the lips, and wagged the head.'
      - type: citation
        text: '21:9 He hoped in the Lord, let him deliver him: * let him save him, seeing he delighteth in him.'
      - type: citation
        text: '21:10 For thou art he that hast drawn me out of the womb: * my hope from the breasts of my mother. I was cast upon thee from the womb.'
      - type: citation
        text: 21:11 From my mother’s womb thou art my God, * depart not from me.
      - type: citation
        text: '21:12 For tribulation is very near: * for there is none to help me.'
      - type: citation
        text: '21:13 Many calves have surrounded me: * fat bulls have besieged me.'
      - type: citation
        text: 21:14 They have opened their mouths against me, * as a lion ravening and roaring.
      - type: citation
        text: 21:15 I am poured out like water; * and all my bones are scattered.
      - type: citation
        text: 21:15 My heart is become like wax melting * in the midst of my bowels.
      - type: citation
        text: '21:16 My strength is dried up like a potsherd, and my tongue hath cleaved to my jaws: * and thou hast brought me down into the dust of death.'
      - type: citation
        text: '21:17 For many dogs have encompassed me: * the council of the malignant hath besieged me.'
      - type: citation
        text: 21:17 They have dug my hands and feet. * They have numbered all my bones.
      - type: citation
        text: 21:18 And they have looked and stared upon me. * They parted my garments amongst them; and upon my vesture they cast lots.
      - type: citation
        text: 21:20 But thou, O Lord, remove not thy help to a distance from me; * look towards my defence.
      - type: citation
        text: '21:21 Deliver, O God, my soul from the sword: * my only one from the hand of the dog.'
      - type: citation
        text: 21:22 Save me from the lion’s mouth; * and my lowness from the horns of the unicorns.
      - type: citation
        text: '21:23 I will declare thy name to my brethren: * in the midst of the church will I praise thee.'
      - type: citation
        text: '21:24 Ye that fear the Lord, praise him: * all ye the seed of Jacob, glorify him.'
      - type: citation
        text: '21:25 Let all the seed of Israel fear him: * because he hath not slighted nor despised the supplication of the poor man.'
      - type: citation
        text: '21:25 Neither hath he turned away his face from me: * and when I cried to him he heard me.'
      - type: citation
        text: '21:26 With thee is my praise in a great church: * I will pay my vows in the sight of them that fear him.'
      - type: citation
        text: '21:27 The poor shall eat and shall be filled: and they shall praise the Lord that seek him: * their hearts shall live for ever and ever.'
      - type: citation
        text: '21:28 All the ends of the earth * shall remember, and shall be converted to the Lord:'
      - type: citation
        text: 21:28 And all the kindreds of the Gentiles * shall adore in his sight.
      - type: citation
        text: 21:29 For the kingdom is the Lord’s; * and he shall have dominion over the nations.
      - type: citation
        text: '21:30 All the fat ones of the earth have eaten and have adored: * all they that go down to the earth shall fall before him.'
      - type: citation
        text: '21:31 And to him my soul shall live: * and my seed shall serve him.'
      - type: citation
        text: '21:32 There shall be declared to the Lord a generation to come: * and the heavens shall shew forth his justice to a people that shall be born, which the Lord hath made.'
      la:
      - type: citation
        text: '21:2 Deus, Deus meus, réspice in me: quare me dereliquísti? * longe a salúte mea verba delictórum meórum.'
      - type: citation
        text: '21:3 Deus meus, clamábo per diem, et non exáudies: * et nocte, et non ad insipiéntiam mihi.'
      - type: citation
        text: 21:4 Tu autem in sancto hábitas, * laus Israël.
      - type: citation
        text: '21:5 In te speravérunt patres nostri: * speravérunt, et liberásti eos.'
      - type: citation
        text: '21:6 Ad te clamavérunt, et salvi facti sunt: * in te speravérunt, et non sunt confúsi.'
      - type: citation
        text: '21:7 Ego autem sum vermis, et non homo: * oppróbrium hóminum, et abiéctio plebis.'
      - type: citation
        text: '21:8 Omnes vidéntes me, derisérunt me: * locúti sunt lábiis, et movérunt caput.'
      - type: citation
        text: '21:9 Sperávit in Dómino, erípiat eum: * salvum fáciat eum, quóniam vult eum.'
      - type: citation
        text: '21:10 Quóniam tu es, qui extraxísti me de ventre: * spes mea ab ubéribus matris meæ. In te proiéctus sum ex útero:'
      - type: citation
        text: '21:11 De ventre matris meæ Deus meus es tu, * ne discésseris a me:'
      - type: citation
        text: '21:12 Quóniam tribulátio próxima est: * quóniam non est qui ádiuvet.'
      - type: citation
        text: '21:13 Circumdedérunt me vítuli multi: * tauri pingues obsedérunt me.'
      - type: citation
        text: 21:14 Aperuérunt super me os suum, * sicut leo rápiens et rúgiens.
      - type: citation
        text: '21:15 Sicut aqua effúsus sum: * et dispérsa sunt ómnia ossa mea.'
      - type: citation
        text: 21:15 Factum est cor meum tamquam cera liquéscens * in médio ventris mei.
      - type: citation
        text: '21:16 Áruit tamquam testa virtus mea, et lingua mea adhǽsit fáucibus meis: * et in púlverem mortis deduxísti me.'
      - type: citation
        text: '21:17 Quóniam circumdedérunt me canes multi: * concílium malignántium obsédit me.'
      - type: citation
        text: '21:17 Fodérunt manus meas et pedes meos: * dinumeravérunt ómnia ossa mea.'
      - type: citation
        text: '21:18 Ipsi vero consideravérunt et inspexérunt me: * divisérunt sibi vestiménta mea, et super vestem meam misérunt sortem.'
      - type: citation
        text: '21:20 Tu autem, Dómine, ne elongáveris auxílium tuum a me: * ad defensiónem meam cónspice.'
      - type: citation
        text: '21:21 Érue a frámea, Deus, ánimam meam: * et de manu canis únicam meam:'
      - type: citation
        text: '21:22 Salva me ex ore leónis: * et a córnibus unicórnium humilitátem meam.'
      - type: citation
        text: '21:23 Narrábo nomen tuum frátribus meis: * in médio ecclésiæ laudábo te.'
      - type: citation
        text: '21:24 Qui timétis Dóminum, laudáte eum: * univérsum semen Iacob, glorificáte eum.'
      - type: citation
        text: '21:25 Tímeat eum omne semen Israël: * quóniam non sprevit, neque despéxit deprecatiónem páuperis:'
      - type: citation
        text: '21:25 Nec avértit fáciem suam a me: * et cum clamárem ad eum, exaudívit me.'
      - type: citation
        text: '21:26 Apud te laus mea in ecclésia magna: * vota mea reddam in conspéctu timéntium eum.'
      - type: citation
        text: '21:27 Edent páuperes, et saturabúntur: et laudábunt Dóminum qui requírunt eum: * vivent corda eórum in sǽculum sǽculi.'
      - type: citation
        text: '21:28 Reminiscéntur et converténtur ad Dóminum * univérsi fines terræ:'
      - type: citation
        text: 21:28 Et adorábunt in conspéctu eius * univérsæ famíliæ géntium.
      - type: citation
        text: '21:29 Quóniam Dómini est regnum: * et ipse dominábitur géntium.'
      - type: citation
        text: '21:30 Manducavérunt et adoravérunt omnes pingues terræ: * in conspéctu eius cadent omnes qui descéndunt in terram.'
      - type: citation
        text: '21:31 Et ánima mea illi vivet: * et semen meum sérviet ipsi.'
      - type: citation
        text: '21:32 Annuntiábitur Dómino generátio ventúra: * et annuntiábunt cæli iustítiam eius pópulo qui nascétur, quem fecit Dóminus.'
      en2:
      - type: citation
        text: '21:2 O God, my God, look upon me: why have you forsaken me? * Far from my salvation are the words of my transgressions.'
      - type: citation
        text: '21:3 O my God, I shall cry by day, and you will not hear: * and by night, and it shall not be accounted as folly in me.'
      - type: citation
        text: 21:4 But you dwell in the holy place, * the praise of Israel.
      - type: citation
        text: '21:5 In you our fathers hoped: * they hoped, and you delivered them.'
      - type: citation
        text: '21:6 They cried to you, and they were saved: * they hoped in you, and were not confounded.'
      - type: citation
        text: '21:7 But I am a worm, and no man: * the reproach of men, and the outcast of the people.'
      - type: citation
        text: '21:8 All they that saw me have laughed me to scorn: * they have spoken with the lips and wagged the head.'
      - type: citation
        text: '21:9 He hoped in the Lord, let him deliver him: * let him save him, seeing he delights in him.'
      - type: citation
        text: '21:10 For you it is who drew me out of the womb: * my hope from the breasts of my mother. Upon you was I cast from the womb:'
      - type: citation
        text: '21:11 From my mother''s womb you are my God, * depart not from me:'
      - type: citation
        text: '21:12 For tribulation is near: * for there is none to help.'
      - type: citation
        text: '21:13 Many calves have surrounded me: * fat bulls have besieged me.'
      - type: citation
        text: 21:14 They have opened their mouth against me, * as a ravening and roaring lion.
      - type: citation
        text: '21:15 I am poured out like water: * and all my bones are scattered.'
      - type: citation
        text: 21:15 My heart is become like melting wax * in the midst of my bowels.
      - type: citation
        text: '21:16 My strength is dried up like a potsherd, and my tongue has cleaved to my jaws: * and you have brought me down into the dust of death.'
      - type: citation
        text: '21:17 For many dogs have surrounded me: * the council of the malignant has besieged me.'
      - type: citation
        text: '21:17 They have dug my hands and feet: * they have numbered all my bones.'
      - type: citation
        text: '21:18 They themselves have looked and stared upon me: * they parted my garments among them, and upon my vesture they cast lots.'
      - type: citation
        text: '21:20 But you, O Lord, remove not your help far from me: * look to my defense.'
      - type: citation
        text: '21:21 Deliver, O God, my soul from the sword: * my only one from the hand of the dog:'
      - type: citation
        text: '21:22 Save me from the mouth of the lion: * and my lowliness from the horns of the unicorns.'
      - type: citation
        text: '21:23 I will declare your name to my brothers: * in the midst of the assembly I will praise you.'
      - type: citation
        text: '21:24 You that fear the Lord, praise him: * all you seed of Jacob, glorify him.'
      - type: citation
        text: '21:25 Let all the seed of Israel fear him: * for he has not despised nor scorned the supplication of the poor man:'
      - type: citation
        text: '21:25 Nor has he turned away his face from me: * and when I cried to him, he heard me.'
      - type: citation
        text: '21:26 With you is my praise in the great assembly: * I will pay my vows in the sight of those who fear him.'
      - type: citation
        text: '21:27 The poor shall eat and shall be filled: and they shall praise the Lord who seek him: * their hearts shall live for ever and ever.'
      - type: citation
        text: '21:28 All the ends of the earth shall remember * and shall be converted to the Lord:'
      - type: citation
        text: 21:28 And all the kindreds of the nations * shall adore in his sight.
      - type: citation
        text: '21:29 For the kingdom is the Lord''s: * and he shall have dominion over the nations.'
      - type: citation
        text: '21:30 All the fat ones of the earth have eaten and adored: * all they that go down to the earth shall fall before him.'
      - type: citation
        text: '21:31 And my soul shall live for him: * and my seed shall serve him.'
      - type: citation
        text: '21:32 There shall be declared to the Lord a generation to come: * and the heavens shall announce his justice to a people that shall be born, whom the Lord has made.'
  psalm.22-1-d-minus-regit-me-et-nihil-mihi-d-erit-in-lo-ce0bda50ff:
    role: psalm
    content:
      en:
      - type: citation
        text: '22:1 The Lord ruleth me: and I shall want nothing. * He hath set me in a place of pasture.'
      - type: citation
        text: '22:2 He hath brought me up, on the water of refreshment: * he hath converted my soul.'
      - type: citation
        text: 22:3 He hath led me on the paths of justice, * for his own name’s sake.
      - type: citation
        text: 22:4 For though I should walk in the midst of the shadow of death, I will fear no evils, * for thou art with me.
      - type: citation
        text: 22:4 Thy rod and thy staff, * they have comforted me.
      - type: citation
        text: 22:5 Thou hast prepared a table before me * against them that afflict me.
      - type: citation
        text: 22:5 Thou hast anointed my head with oil; * and my chalice which inebriateth me, how goodly is it!
      - type: citation
        text: 22:6 And thy mercy will follow me * all the days of my life.
      - type: citation
        text: 22:6 And that I may dwell in the house of the Lord * unto length of days.
      la:
      - type: citation
        text: '22:1 Dóminus regit me, et nihil mihi déerit: * in loco páscuæ ibi me collocávit.'
      - type: citation
        text: '22:2 Super aquam refectiónis educávit me: * ánimam meam convértit.'
      - type: citation
        text: 22:3 Dedúxit me super sémitas iustítiæ, * propter nomen suum.
      - type: citation
        text: '22:4 Nam, et si ambulávero in médio umbræ mortis, non timébo mala: * quóniam tu mecum es.'
      - type: citation
        text: '22:4 Virga tua, et báculus tuus: * ipsa me consoláta sunt.'
      - type: citation
        text: 22:5 Parásti in conspéctu meo mensam, * advérsus eos, qui tríbulant me.
      - type: citation
        text: '22:5 Impinguásti in óleo caput meum: * et calix meus inébrians quam præclárus est!'
      - type: citation
        text: '22:6 Et misericórdia tua subsequétur me * ómnibus diébus vitæ meæ:'
      - type: citation
        text: 22:6 Et ut inhábitem in domo Dómini, * in longitúdinem diérum.
      en2:
      - type: citation
        text: '22:1 The Lord governs me, and I shall want nothing: * in a place of pasture there he has settled me.'
      - type: citation
        text: '22:2 He has led me up beside the waters of refreshment: * he has converted my soul.'
      - type: citation
        text: 22:3 He has led me on the paths of justice, * for his name's sake.
      - type: citation
        text: '22:4 For though I should walk in the midst of the shadow of death, I will fear no evils: * for you are with me.'
      - type: citation
        text: '22:4 Your rod and your staff: * these have comforted me.'
      - type: citation
        text: 22:5 You have prepared a table before me * against those who trouble me.
      - type: citation
        text: '22:5 You have anointed my head with oil: * and my inebriating chalice, how excellent it is!'
      - type: citation
        text: '22:6 And your mercy will follow me * all the days of my life:'
      - type: citation
        text: 22:6 And that I may dwell in the house of the Lord, * for length of days.
  psalm.23-1-d-mini-est-terra-et-plenit-do-eius-orbis-te-f8cd8e5810:
    role: psalm
    content:
      en:
      - type: citation
        text: '23:1 The earth is the Lord’s and the fulness thereof: * the world, and all they that dwell therein.'
      - type: citation
        text: 23:2 For he hath founded it upon the seas; * and hath prepared it upon the rivers.
      - type: citation
        text: '23:3 Who shall ascend into the mountain of the Lord: * or who shall stand in his holy place?'
      - type: citation
        text: 23:4 The innocent in hands, and clean of heart, * who hath not taken his soul in vain, nor sworn deceitfully to his neighbour.
      - type: citation
        text: 23:5 He shall receive a blessing from the Lord, * and mercy from God his Saviour.
      - type: citation
        text: 23:6 This is the generation of them that seek him, * of them that seek the face of the God of Jacob.
      - type: citation
        text: '23:7 Lift up your gates, O ye princes, and be ye lifted up, O eternal gates: * and the King of Glory shall enter in.'
      - type: citation
        text: '23:8 Who is this King of Glory? * the Lord who is strong and mighty: the Lord mighty in battle.'
      - type: citation
        text: '23:9 Lift up your gates, O ye princes, and be ye lifted up, O eternal gates: * and the King of Glory shall enter in.'
      - type: citation
        text: 23:10 Who is this King of Glory? * the Lord of hosts, he is the King of Glory.
      la:
      - type: citation
        text: '23:1 Dómini est terra, et plenitúdo eius: * orbis terrárum, et univérsi qui hábitant in eo.'
      - type: citation
        text: '23:2 Quia ipse super mária fundávit eum: * et super flúmina præparávit eum.'
      - type: citation
        text: 23:3 Quis ascéndet in montem Dómini? * aut quis stabit in loco sancto eius?
      - type: citation
        text: 23:4 Ínnocens mánibus et mundo corde, * qui non accépit in vano ánimam suam, nec iurávit in dolo próximo suo.
      - type: citation
        text: '23:5 Hic accípiet benedictiónem a Dómino: * et misericórdiam a Deo, salutári suo.'
      - type: citation
        text: 23:6 Hæc est generátio quæréntium eum, * quæréntium fáciem Dei Iacob.
      - type: citation
        text: '23:7 Attóllite portas, príncipes, vestras, et elevámini, portæ æternáles: * et introíbit Rex glóriæ.'
      - type: citation
        text: '23:8 Quis est iste Rex glóriæ? * Dóminus fortis et potens: Dóminus potens in prǽlio.'
      - type: citation
        text: '23:9 Attóllite portas, príncipes, vestras, et elevámini, portæ æternáles: * et introíbit Rex glóriæ.'
      - type: citation
        text: 23:10 Quis est iste Rex glóriæ? * Dóminus virtútum ipse est Rex glóriæ.
      en2:
      - type: citation
        text: '23:1 The earth is the Lord''s and the fullness thereof: * the world, and all who dwell therein.'
      - type: citation
        text: '23:2 For he has founded it upon the seas: * and has prepared it upon the rivers.'
      - type: citation
        text: 23:3 Who shall ascend the mountain of the Lord? * or who shall stand in his holy place?
      - type: citation
        text: 23:4 The innocent in hands and clean of heart, * who has not taken his soul in vain, nor sworn deceitfully to his neighbor.
      - type: citation
        text: '23:5 He shall receive a blessing from the Lord: * and mercy from God his savior.'
      - type: citation
        text: 23:6 This is the generation of those who seek him, * of those who seek the face of the God of Jacob.
      - type: citation
        text: '23:7 Lift up your gates, O princes, and be lifted up, O eternal gates: * and the King of glory shall enter in.'
      - type: citation
        text: '23:8 Who is this King of glory? * The Lord who is strong and mighty: the Lord mighty in battle.'
      - type: citation
        text: '23:9 Lift up your gates, O princes, and be lifted up, O eternal gates: * and the King of glory shall enter in.'
      - type: citation
        text: 23:10 Who is this King of glory? * The Lord of hosts, he is the King of glory.
  psalm.24-1-ad-te-d-mine-lev-vi-nimam-meam-deus-meus-in-3d72138760:
    role: psalm
    content:
      en:
      - type: citation
        text: '24:1 To thee, O Lord, have I lifted up my soul: * In thee, O my God, I put my trust; let me not be ashamed.'
      - type: citation
        text: '24:3 Neither let my enemies laugh at me: * for none of them that wait on thee shall be confounded.'
      - type: citation
        text: 24:4 Let all them be confounded that act unjust things * without cause.
      - type: citation
        text: 24:4 Shew, O Lord, thy ways to me, * and teach me thy paths.
      - type: citation
        text: 24:5 Direct me in thy truth, and teach me; * for thou art God my Saviour; and on thee have I waited all the day long.
      - type: citation
        text: 24:6 Remember, O Lord, thy bowels of compassion; * and thy mercies that are from the beginning of the world.
      - type: citation
        text: 24:7 The sins of my youth * and my ignorances do not remember.
      - type: citation
        text: '24:7 According to thy mercy remember thou me: * for thy goodness’ sake, O Lord.'
      - type: citation
        text: '24:8 The Lord is sweet and righteous: * therefore he will give a law to sinners in the way.'
      - type: citation
        text: '24:9 He will guide the mild in judgment: * he will teach the meek his ways.'
      - type: citation
        text: 24:10 All the ways of the Lord are mercy and truth, * to them that seek after his covenant and his testimonies.
      - type: citation
        text: '24:11 For thy name’s sake, O Lord, thou wilt pardon my sin: * for it is great.'
      - type: citation
        text: 24:12 Who is the man that feareth the Lord? * He hath appointed him a law in the way he hath chosen.
      - type: citation
        text: '24:13 His soul shall dwell in good things: * and his seed shall inherit the land.'
      - type: citation
        text: '24:14 The Lord is a firmament to them that fear him: * and his covenant shall be made manifest to them.'
      - type: citation
        text: '24:15 My eyes are ever towards the Lord: * for he shall pluck my feet out of the snare.'
      - type: citation
        text: 24:16 Look thou upon me, and have mercy on me; * for I am alone and poor.
      - type: citation
        text: '24:17 The troubles of my heart are multiplied: * deliver me from my necessities.'
      - type: citation
        text: 24:18 See my abjection and my labour; * and forgive me all my sins.
      - type: citation
        text: 24:19 Consider my enemies for they are multiplied, * and have hated me with an unjust hatred.
      - type: citation
        text: '24:20 Keep thou my soul, and deliver me: * I shall not be ashamed, for I have hoped in thee.'
      - type: citation
        text: '24:21 The innocent and the upright have adhered to me: * because I have waited on thee.'
      - type: citation
        text: 24:22 Deliver Israel, O God, * from all his tribulations.
      la:
      - type: citation
        text: '24:1 Ad te, Dómine, levávi ánimam meam: * Deus meus, in te confído, non erubéscam.'
      - type: citation
        text: '24:3 Neque irrídeant me inimíci mei: * étenim univérsi, qui sústinent te, non confundéntur.'
      - type: citation
        text: 24:4 Confundántur omnes iníqua agéntes * supervácue.
      - type: citation
        text: '24:4 Vias tuas, Dómine, demónstra mihi: * et sémitas tuas édoce me.'
      - type: citation
        text: '24:5 Dírige me in veritáte tua, et doce me: * quia tu es, Deus, salvátor meus, et te sustínui tota die.'
      - type: citation
        text: 24:6 Reminíscere miseratiónum tuárum, Dómine, * et misericordiárum tuárum, quæ a sǽculo sunt.
      - type: citation
        text: 24:7 Delícta iuventútis meæ, * et ignorántias meas ne memíneris.
      - type: citation
        text: '24:7 Secúndum misericórdiam tuam meménto mei tu: * propter bonitátem tuam, Dómine.'
      - type: citation
        text: '24:8 Dulcis et rectus Dóminus: * propter hoc legem dabit delinquéntibus in via.'
      - type: citation
        text: '24:9 Díriget mansuétos in iudício: * docébit mites vias suas.'
      - type: citation
        text: 24:10 Univérsæ viæ Dómini, misericórdia et véritas, * requiréntibus testaméntum eius et testimónia eius.
      - type: citation
        text: '24:11 Propter nomen tuum, Dómine, propitiáberis peccáto meo: * multum est enim.'
      - type: citation
        text: 24:12 Quis est homo qui timet Dóminum? * legem státuit ei in via, quam elégit.
      - type: citation
        text: '24:13 Ánima eius in bonis demorábitur: * et semen eius hereditábit terram.'
      - type: citation
        text: '24:14 Firmaméntum est Dóminus timéntibus eum: * et testaméntum ipsíus ut manifestétur illis.'
      - type: citation
        text: '24:15 Óculi mei semper ad Dóminum: * quóniam ipse evéllet de láqueo pedes meos.'
      - type: citation
        text: '24:16 Réspice in me, et miserére mei: * quia únicus et pauper sum ego.'
      - type: citation
        text: '24:17 Tribulatiónes cordis mei multiplicátæ sunt: * de necessitátibus meis érue me.'
      - type: citation
        text: '24:18 Vide humilitátem meam, et labórem meum: * et dimítte univérsa delícta mea.'
      - type: citation
        text: 24:19 Réspice inimícos meos quóniam multiplicáti sunt, * et ódio iníquo odérunt me.
      - type: citation
        text: '24:20 Custódi ánimam meam, et érue me: * non erubéscam quóniam sperávi in te.'
      - type: citation
        text: '24:21 Innocéntes et recti adhæsérunt mihi: * quia sustínui te.'
      - type: citation
        text: 24:22 Líbera, Deus, Israël, * ex ómnibus tribulatiónibus suis.
      en2:
      - type: citation
        text: '24:1 To you, O Lord, I have lifted up my soul: * O my God, in you I trust, let me not be put to shame.'
      - type: citation
        text: '24:3 Let not my enemies laugh at me: * for none of those who wait for you shall be confounded.'
      - type: citation
        text: 24:4 Let all who act unjustly be confounded * and in vain.
      - type: citation
        text: '24:4 Show me your ways, O Lord: * and teach me your paths.'
      - type: citation
        text: '24:5 Direct me in your truth and teach me: * for you are God my savior, and in you I have waited all the day long.'
      - type: citation
        text: 24:6 Remember your mercies, O Lord, * and your loving-kindnesses, which have been from of old.
      - type: citation
        text: 24:7 The sins of my youth * and my ignorances do not remember.
      - type: citation
        text: '24:7 According to your mercy remember me, O Lord: * for your goodness'' sake, O Lord.'
      - type: citation
        text: '24:8 The Lord is sweet and righteous: * therefore he will give a law to those who go astray in the way.'
      - type: citation
        text: '24:9 He will guide the meek in judgment: * he will teach the meek his ways.'
      - type: citation
        text: 24:10 All the ways of the Lord are mercy and truth, * for those who seek his covenant and his testimonies.
      - type: citation
        text: 24:11 For the sake of your name, O Lord, you will pardon my sin, * for it is great.
      - type: citation
        text: 24:12 Who is the man that fears the Lord? * He will appoint him a law in the way he has chosen.
      - type: citation
        text: 24:13 His soul shall dwell in good things, * and his seed shall inherit the land.
      - type: citation
        text: 24:14 The Lord is a stronghold for those who fear him, * and his covenant is made manifest to them.
      - type: citation
        text: 24:15 My eyes are ever toward the Lord, * for he shall pluck my feet out of the snare.
      - type: citation
        text: 24:16 Look upon me, and have mercy on me, * for I am alone and poor.
      - type: citation
        text: '24:17 The troubles of my heart are multiplied: * deliver me from my necessities.'
      - type: citation
        text: 24:18 See my lowliness and my toil, * and forgive all my sins.
      - type: citation
        text: 24:19 Look upon my enemies, for they are multiplied, * and they hate me with unjust hatred.
      - type: citation
        text: '24:20 Keep my soul, and deliver me: * let me not be confounded, for I have hoped in you.'
      - type: citation
        text: 24:21 The innocent and the upright have cleaved to me, * because I have waited for you.
      - type: citation
        text: 24:22 Deliver, O God, Israel, * from all his tribulations.
  psalm.25-1-i-dica-me-d-mine-qu-niam-ego-in-innoc-ntia-663be73eae:
    role: psalm
    content:
      en:
      - type: citation
        text: '25:1 Judge me, O Lord, for I have walked in my innocence: * and I have put my trust in the Lord, and shall not be weakened.'
      - type: citation
        text: 25:2 Prove me, O Lord, and try me; * burn my reins and my heart.
      - type: citation
        text: 25:3 For thy mercy is before my eyes; * and I am well pleased with thy truth.
      - type: citation
        text: '25:4 I have not sat with the council of vanity: * neither will I go in with the doers of unjust things.'
      - type: citation
        text: 25:5 I have hated the assembly of the malignant; * and with the wicked I will not sit.
      - type: citation
        text: '25:6 I will wash my hands among the innocent; * and will compass thy altar, O Lord:'
      - type: citation
        text: '25:7 That I may hear the voice of thy praise: * and tell of all thy wondrous works.'
      - type: citation
        text: 25:8 I have loved, O Lord, the beauty of thy house; * and the place where thy glory dwelleth.
      - type: citation
        text: '25:9 Take not away my soul, O God, with the wicked: * nor my life with bloody men:'
      - type: citation
        text: '25:10 In whose hands are iniquities: * their right hand is filled with gifts.'
      - type: citation
        text: '25:11 But as for me, I have walked in my innocence: * redeem me, and have mercy on me.'
      - type: citation
        text: '25:12 My foot hath stood in the direct way: * in the churches I will bless thee, O Lord.'
      la:
      - type: citation
        text: '25:1 Iúdica me, Dómine, quóniam ego in innocéntia mea ingréssus sum: * et in Dómino sperans non infirmábor.'
      - type: citation
        text: '25:2 Proba me, Dómine, et tenta me: * ure renes meos et cor meum.'
      - type: citation
        text: '25:3 Quóniam misericórdia tua ante óculos meos est: * et complácui in veritáte tua.'
      - type: citation
        text: '25:4 Non sedi cum concílio vanitátis: * et cum iníqua geréntibus non introíbo.'
      - type: citation
        text: '25:5 Odívi ecclésiam malignántium: * et cum ímpiis non sedébo.'
      - type: citation
        text: '25:6 Lavábo inter innocéntes manus meas: * et circúmdabo altáre tuum, Dómine:'
      - type: citation
        text: 25:7 Ut áudiam vocem laudis, * et enárrem univérsa mirabília tua.
      - type: citation
        text: 25:8 Dómine, diléxi decórem domus tuæ, * et locum habitatiónis glóriæ tuæ.
      - type: citation
        text: '25:9 Ne perdas cum ímpiis, Deus, ánimam meam, * et cum viris sánguinum vitam meam:'
      - type: citation
        text: '25:10 In quorum mánibus iniquitátes sunt: * déxtera eórum repléta est munéribus.'
      - type: citation
        text: '25:11 Ego autem in innocéntia mea ingréssus sum: * rédime me, et miserére mei.'
      - type: citation
        text: '25:12 Pes meus stetit in dirécto: * in ecclésiis benedícam te, Dómine.'
      en2:
      - type: citation
        text: 25:1 Judge me, O Lord, for I have walked in my innocence, * and trusting in the Lord I shall not falter.
      - type: citation
        text: '25:2 Prove me, O Lord, and try me: * purify my reins and my heart.'
      - type: citation
        text: 25:3 For your mercy is before my eyes, * and I have been well pleased in your truth.
      - type: citation
        text: 25:4 I have not sat with the council of vanity, * and I will not enter with those who do iniquity.
      - type: citation
        text: 25:5 I have hated the assembly of the malignant, * and with the wicked I will not sit.
      - type: citation
        text: '25:6 I will wash my hands among the innocent, * and I will compass your altar, O Lord:'
      - type: citation
        text: 25:7 That I may hear the voice of praise, * and tell of all your wondrous works.
      - type: citation
        text: 25:8 O Lord, I have loved the beauty of your house, * and the place where your glory dwells.
      - type: citation
        text: '25:9 Take not away my soul, O God, with the wicked, * nor my life with men of blood:'
      - type: citation
        text: '25:10 In whose hands are iniquities: * their right hand is filled with bribes.'
      - type: citation
        text: '25:11 But as for me, I have walked in my innocence: * redeem me, and have mercy on me.'
      - type: citation
        text: '25:12 My foot has stood in the right way: * in the assemblies I will bless you, O Lord.'
  psalm.26-1-d-minus-illumin-tio-mea-et-salus-mea-quem-t-365f2bbd5b:
    role: psalm
    content:
      en:
      - type: citation
        text: 26:1 The Lord is my light and my salvation, * whom shall I fear?
      - type: citation
        text: '26:1 The Lord is the protector of my life: * of whom shall I be afraid?'
      - type: citation
        text: 26:2 Whilst the wicked draw near against me, * to eat my flesh.
      - type: citation
        text: 26:2 My enemies that trouble me, * have themselves been weakened, and have fallen.
      - type: citation
        text: 26:3 If armies in camp should stand together against me, * my heart shall not fear.
      - type: citation
        text: 26:3 If a battle should rise up against me, * in this will I be confident.
      - type: citation
        text: 26:4 One thing I have asked of the Lord, this will I seek after; * that I may dwell in the house of the Lord all the days of my life.
      - type: citation
        text: 26:4 That I may see the delight of the Lord, * and may visit his temple.
      - type: citation
        text: 26:5 For he hath hidden me in his tabernacle; * in the day of evils, he hath protected me in the secret place of his tabernacle.
      - type: citation
        text: '26:6 He hath exalted me upon a rock: * and now he hath lifted up my head above my enemies.'
      - type: citation
        text: '26:6 I have gone round, and have offered up in his tabernacle a sacrifice of jubilation: * I will sing, and recite a psalm to the Lord.'
      - type: citation
        text: '26:7 Hear, O Lord, my voice, with which I have cried to thee: * have mercy on me and hear me.'
      - type: citation
        text: '26:8 My heart hath said to thee: My face hath sought thee: * thy face, O Lord, will I still seek.'
      - type: citation
        text: 26:9 Turn not away thy face from me; * decline not in thy wrath from thy servant.
      - type: citation
        text: 26:9 Be thou my helper, * forsake me not; do not thou despise me, O God my Saviour.
      - type: citation
        text: '26:10 For my father and my mother have left me: * but the Lord hath taken me up.'
      - type: citation
        text: 26:11 Set me, O Lord, a law in thy way, * and guide me in the right path, because of my enemies.
      - type: citation
        text: 26:12 Deliver me not over to the will of them that trouble me; * for unjust witnesses have risen up against me; and iniquity hath lied to itself.
      - type: citation
        text: 26:13 I believe to see the good things of the Lord * in the land of the living.
      - type: citation
        text: 26:14 Expect the Lord, do manfully, * and let thy heart take courage, and wait thou for the Lord.
      la:
      - type: citation
        text: 26:1 Dóminus illuminátio mea, et salus mea, * quem timébo?
      - type: citation
        text: 26:1 Dóminus protéctor vitæ meæ, * a quo trepidábo?
      - type: citation
        text: '26:2 Dum apprópiant super me nocéntes, * ut edant carnes meas:'
      - type: citation
        text: 26:2 Qui tríbulant me inimíci mei, * ipsi infirmáti sunt, et cecidérunt.
      - type: citation
        text: 26:3 Si consístant advérsum me castra, * non timébit cor meum.
      - type: citation
        text: 26:3 Si exsúrgat advérsum me prǽlium, * in hoc ego sperábo.
      - type: citation
        text: '26:4 Unam pétii a Dómino, hanc requíram, * ut inhábitem in domo Dómini ómnibus diébus vitæ meæ:'
      - type: citation
        text: 26:4 Ut vídeam voluptátem Dómini, * et vísitem templum eius.
      - type: citation
        text: '26:5 Quóniam abscóndit me in tabernáculo suo: * in die malórum protéxit me in abscóndito tabernáculi sui.'
      - type: citation
        text: '26:6 In petra exaltávit me: * et nunc exaltávit caput meum super inimícos meos.'
      - type: citation
        text: '26:6 Circuívi, et immolávi in tabernáculo eius hóstiam vociferatiónis: * cantábo, et psalmum dicam Dómino.'
      - type: citation
        text: '26:7 Exáudi, Dómine, vocem meam, qua clamávi ad te: * miserére mei, et exáudi me.'
      - type: citation
        text: '26:8 Tibi dixit cor meum, exquisívit te fácies mea: * fáciem tuam, Dómine, requíram.'
      - type: citation
        text: '26:9 Ne avértas fáciem tuam a me: * ne declínes in ira a servo tuo.'
      - type: citation
        text: '26:9 Adiútor meus esto: * ne derelínquas me, neque despícias me, Deus, salutáris meus.'
      - type: citation
        text: '26:10 Quóniam pater meus, et mater mea dereliquérunt me: * Dóminus autem assúmpsit me.'
      - type: citation
        text: '26:11 Legem pone mihi, Dómine, in via tua: * et dírige me in sémitam rectam propter inimícos meos.'
      - type: citation
        text: '26:12 Ne tradíderis me in ánimas tribulántium me: * quóniam insurrexérunt in me testes iníqui, et mentíta est iníquitas sibi.'
      - type: citation
        text: 26:13 Credo vidére bona Dómini * in terra vivéntium.
      - type: citation
        text: '26:14 Exspécta Dóminum, viríliter age: * et confortétur cor tuum, et sústine Dóminum.'
      en2:
      - type: citation
        text: 26:1 The Lord is my light and my salvation, * whom shall I fear?
      - type: citation
        text: 26:1 The Lord is the protector of my life, * of whom shall I be afraid?
