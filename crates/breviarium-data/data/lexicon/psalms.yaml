  psalm.89-1-d-mine-ref-gium-factus-es-nobis-a-generati-bca33005c4:
    role: psalm
    content:
      en:
      - type: citation
        text: 89:1 Lord, thou hast been our refuge * from generation to generation.
      - type: citation
        text: 89:2 Before the mountains were made, or the earth and the world was formed; * from eternity and to eternity thou art God.
      - type: citation
        text: '89:3 Turn not man away to be brought low: * and thou hast said: Be converted, O ye sons of men.'
      - type: citation
        text: 89:4 For a thousand years in thy sight * are as yesterday, which is past.
      - type: citation
        text: 89:5 And as a watch in the night, * things that are counted nothing, shall their years be.
      - type: citation
        text: '89:6 In the morning man shall grow up like grass; in the morning he shall flourish and pass away: * in the evening he shall fall, grow dry, and wither.'
      - type: citation
        text: '89:7 For in thy wrath we have fainted away: * and are troubled in thy indignation.'
      - type: citation
        text: '89:8 Thou hast set our iniquities before thy eyes: * our life in the light of thy countenance.'
      - type: citation
        text: 89:9 For all our days are spent; * and in thy wrath we have fainted away.
      - type: citation
        text: '89:9 Our years shall be considered as a spider: * the days of our years in them are threescore and ten years.'
      - type: citation
        text: '89:10 But if in the strong they be fourscore years: * and what is more of them is labour and sorrow.'
      - type: citation
        text: '89:10 For mildness is come upon us: * and we shall be corrected.'
      - type: citation
        text: 89:11 Who knoweth the power of thy anger, * and for thy fear can number thy wrath?
      - type: citation
        text: '89:12 So make thy right hand known: * and men learned in heart, in wisdom.'
      - type: citation
        text: 89:13 Return, O Lord, how long? * and be entreated in favour of thy servants.
      - type: citation
        text: '89:14 We are filled in the morning with thy mercy: * and we have rejoiced, and are delighted all our days.'
      - type: citation
        text: '89:15 We have rejoiced for the days in which thou hast humbled us: * for the years in which we have seen evils.'
      - type: citation
        text: '89:16 Look upon thy servants and upon their works: * and direct their children.'
      - type: citation
        text: '89:17 And let the brightness of the Lord our God be upon us: and direct thou the works of our hands over us; * yea, the work of our hands do thou direct.'
      la:
      - type: citation
        text: '89:1 Dómine, refúgium factus es nobis: * a generatióne in generatiónem.'
      - type: citation
        text: '89:2 Priúsquam montes fíerent, aut formarétur terra et orbis: * a sǽculo et usque in sǽculum tu es, Deus.'
      - type: citation
        text: '89:3 Ne avértas hóminem in humilitátem: * et dixísti: Convertímini, fílii hóminum.'
      - type: citation
        text: 89:4 Quóniam mille anni ante óculos tuos, * tamquam dies hestérna, quæ prætériit,
      - type: citation
        text: 89:5 Et custódia in nocte, * quæ pro níhilo habéntur, eórum anni erunt.
      - type: citation
        text: '89:6 Mane sicut herba tránseat, mane flóreat, et tránseat: * véspere décidat, indúret et aréscat.'
      - type: citation
        text: 89:7 Quia defécimus in ira tua, * et in furóre tuo turbáti sumus.
      - type: citation
        text: '89:8 Posuísti iniquitátes nostras in conspéctu tuo: * sǽculum nostrum in illuminatióne vultus tui.'
      - type: citation
        text: '89:9 Quóniam omnes dies nostri defecérunt: * et in ira tua defécimus.'
      - type: citation
        text: '89:9 Anni nostri sicut aránea meditabúntur: * dies annórum nostrórum in ipsis, septuagínta anni.'
      - type: citation
        text: '89:10 Si autem in potentátibus, octogínta anni: * et ámplius eórum, labor et dolor.'
      - type: citation
        text: '89:10 Quóniam supervénit mansuetúdo: * et corripiémur.'
      - type: citation
        text: '89:11 Quis novit potestátem iræ tuæ: * et præ timóre tuo iram tuam dinumeráre?'
      - type: citation
        text: '89:12 Déxteram tuam sic notam fac: * et erudítos corde in sapiéntia.'
      - type: citation
        text: 89:13 Convértere, Dómine, úsquequo? * et deprecábilis esto super servos tuos.
      - type: citation
        text: '89:14 Repléti sumus mane misericórdia tua: * et exsultávimus, et delectáti sumus ómnibus diébus nostris.'
      - type: citation
        text: '89:15 Lætáti sumus pro diébus, quibus nos humiliásti: * annis, quibus vídimus mala.'
      - type: citation
        text: '89:16 Réspice in servos tuos, et in ópera tua: * et dírige fílios eórum.'
      - type: citation
        text: '89:17 Et sit splendor Dómini, Dei nostri, super nos, et ópera mánuum nostrárum dírige super nos: * et opus mánuum nostrárum dírige.'
      en2:
      - type: citation
        text: 89:1 O Lord, you have been our refuge * from generation to generation.
      - type: citation
        text: '89:2 Before the mountains were made, or the earth and the world were formed: * from age to age you are, O God.'
      - type: citation
        text: '89:3 Do not turn man back to humiliation: * and you said: Be converted, O children of men.'
      - type: citation
        text: 89:4 For a thousand years in your sight, * are as yesterday, which is past,
      - type: citation
        text: '89:5 And a watch of the night, * which was held for nothing: so their years shall be.'
      - type: citation
        text: '89:6 In the morning, he may pass away like grass; in the morning, he may flower and pass away: * in the evening, he will fall, and harden, and become dry.'
      - type: citation
        text: 89:7 For, at your wrath, we have withered away, * and we have been disturbed by your fury.
      - type: citation
        text: '89:8 You have placed our iniquities in your sight: * our age in the illumination of your countenance.'
      - type: citation
        text: '89:9 For all our days have faded away: * and at your wrath, we have fainted.'
      - type: citation
        text: '89:9 Our years will be considered to be like a spider''s web: * the days of our years in them, seventy years.'
      - type: citation
        text: '89:10 But in the powerful, eighty years: * and more of these are with hardship and sorrow.'
      - type: citation
        text: '89:10 For meekness has come upon us: * and we shall be chastened.'
      - type: citation
        text: '89:11 Who knows the power of your wrath: * and, before fear, can number your wrath?'
      - type: citation
        text: '89:12 So make your right hand thus known: * and men learned in heart, in wisdom.'
      - type: citation
        text: 89:13 Return, O Lord, how long? * And may you be persuaded on behalf of your servants.
      - type: citation
        text: '89:14 We were filled in the morning with your mercy: * and we exulted and delighted all our days.'
      - type: citation
        text: '89:15 We have rejoiced because of the days in which you humbled us: * because of the years in which we saw evils.'
      - type: citation
        text: '89:16 Look down upon your servants and upon their works: * and direct their sons.'
      - type: citation
        text: '89:17 And may the splendor of the Lord our God be upon us, and direct the works of our hands over us: * and direct the work of our hands.'
  psalm.9-2-confit-bor-tibi-d-mine-in-toto-corde-meo-nar-b81917c043:
    role: psalm
    content:
      en:
      - type: citation
        text: '9:2 I will give praise to thee, O Lord, with my whole heart: * I will relate all thy wonders.'
      - type: citation
        text: '9:3 I will be glad and rejoice in thee: * I will sing to thy name, O thou most high.'
      - type: citation
        text: '9:4 When my enemy shall be turned back: * they shall be weakened and perish before thy face.'
      - type: citation
        text: '9:5 For thou hast maintained my judgment and my cause: * thou hast sat on the throne, who judgest justice.'
      - type: citation
        text: '9:6 Thou hast rebuked the Gentiles, and the wicked one hath perished: * thou hast blotted out their name for ever and ever.'
      - type: citation
        text: '9:7a The swords of the enemy have failed unto the end: * and their cities thou hast destroyed.'
      - type: citation
        text: 9:7b Their memory hath perished with a noise. * (8a) But the Lord remaineth for ever.
      - type: citation
        text: '9:8b He hath prepared his throne in judgment: * (9) And he shall judge the world in equity, he shall judge the people in justice.'
      - type: citation
        text: '9:10 And the Lord is become a refuge for the poor: * a helper in due time in tribulation.'
      - type: citation
        text: '9:11 And let them trust in thee who know thy name: * for thou hast not forsaken them that seek thee, O Lord.'
      - type: citation
        text: '9:12 Sing ye to the Lord, who dwelleth in Sion: * declare his ways among the Gentiles.'
      - type: citation
        text: '9:13 For requiring their blood he hath remembered them: * he hath not forgotten the cry of the poor.'
      - type: citation
        text: '9:14 Have mercy on me, O Lord: * see my humiliation which I suffer from my enemies.'
      - type: citation
        text: 9:15 Thou that liftest me up from the gates of death, * that I may declare all thy praises in the gates of the daughter of Sion.
      - type: citation
        text: '9:16a I will rejoice in thy salvation: * the Gentiles have stuck fast in the destruction which they have prepared.'
      - type: citation
        text: 9:16b Their foot hath been taken * in the very snare which they hid.
      - type: citation
        text: '9:17 The Lord shall be known when he executeth judgments: * the sinner hath been caught in the works of his own hands.'
      - type: citation
        text: 9:18 The wicked shall be turned into hell, * all the nations that forget God.
      - type: citation
        text: '9:19 For the poor man shall not be forgotten to the end: * the patience of the poor shall not perish for ever.'
      - type: citation
        text: '9:20 Arise, O Lord, let not man be strengthened: * let the Gentiles be judged in thy sight.'
      - type: citation
        text: '9:21 Appoint, O Lord, a lawgiver over them: * that the Gentiles may know themselves to be but men.'
      - type: citation
        text: 9:22 Why, O Lord, hast thou retired afar off? * why dost thou slight us in our wants, in the time of trouble?
      - type: citation
        text: '9:23 Whilst the wicked man is proud, the poor is set on fire: * they are caught in the counsels which they devise.'
      - type: citation
        text: '9:24 For the sinner is praised in the desires of his soul: * and the unjust man is blessed.'
      - type: citation
        text: 9:25 The sinner hath provoked the Lord, * according to the multitude of his wrath he will not seek him.
      - type: citation
        text: '9:26a God is not before his eyes: * his ways are filthy at all times.'
      - type: citation
        text: '9:26b Thy judgments are removed from his sight: * he shall rule over all his enemies.'
      - type: citation
        text: '9:27 For he hath said in his heart: * I shall not be moved from generation to generation, and shall be without evil.'
      - type: citation
        text: '9:28 His mouth is full of cursing, and of bitterness, and of deceit: * under his tongue are labour and sorrow.'
      - type: citation
        text: 9:29 He sitteth in ambush with the rich, in private places, * that he may kill the innocent.
      - type: citation
        text: '9:30a His eyes are upon the poor man: * he lieth in wait, in secret, like a lion in his den.'
      - type: citation
        text: '9:30b He lieth in ambush, that he may catch the poor man: * so catch the poor, whilst he draweth him to him.'
      - type: citation
        text: 9:31 In his net he will bring him down, * he will crouch and fall, when he shall have power over the poor.
      - type: citation
        text: '9:32 For he hath said in his heart: God hath forgotten, * he hath turned away his face, not to see to the end.'
      - type: citation
        text: '9:33 Arise, O Lord God, let thy hand be exalted: * forget not the poor.'
      - type: citation
        text: '9:34 Wherefore hath the wicked provoked God? * for he hath said in his heart: He will not require it.'
      - type: citation
        text: '9:35a Thou seest it, for thou considerest labour and sorrow: * that thou mayst deliver them into thy hands.'
      - type: citation
        text: '9:35b To thee is the poor man left: * thou wilt be a helper to the orphan.'
      - type: citation
        text: '9:36 Break thou the arm of the sinner and of the malignant: * his sin shall be sought, and shall not be found.'
      - type: citation
        text: '9:37 The Lord shall reign to eternity, yea, for ever and ever: * ye Gentiles shall perish from his land.'
      - type: citation
        text: '9:38 The Lord hath heard the desire of the poor: * thy ear hath heard the preparation of their heart.'
      - type: citation
        text: 9:39 To judge for the fatherless and for the humble, * that man may no more presume to magnify himself upon earth.
      la:
      - type: citation
        text: '9:2 Confitébor tibi, Dómine, in toto corde meo: * narrábo ómnia mirabília tua.'
      - type: citation
        text: '9:3 Lætábor et exsultábo in te: * psallam nómini tuo, Altíssime.'
      - type: citation
        text: '9:4 In converténdo inimícum meum retrórsum: * infirmabúntur, et períbunt a fácie tua.'
      - type: citation
        text: '9:5 Quóniam fecísti iudícium meum et causam meam: * sedísti super thronum, qui iúdicas iustítiam.'
      - type: citation
        text: '9:6 Increpásti gentes, et périit ímpius: * nomen eórum delésti in ætérnum, et in sǽculum sǽculi.'
      - type: citation
        text: '9:7a Inimíci defecérunt frámeæ in finem: * et civitátes eórum destruxísti.'
      - type: citation
        text: '9:7b Périit memória eórum cum sónitu: * (8a) et Dóminus in ætérnum pérmanet.'
      - type: citation
        text: '9:8b Parávit in iudício thronum suum: * (9) et ipse iudicábit orbem terræ in æquitáte, iudicábit pópulos in iustítia.'
      - type: citation
        text: '9:10 Et factus est Dóminus refúgium páuperi: * adiútor in opportunitátibus, in tribulatióne.'
      - type: citation
        text: '9:11 Et sperent in te qui novérunt nomen tuum: * quóniam non dereliquísti quæréntes te, Dómine.'
      - type: citation
        text: '9:12 Psállite Dómino, qui hábitat in Sion: * annuntiáte inter gentes stúdia eius:'
      - type: citation
        text: '9:13 Quóniam requírens sánguinem eórum recordátus est: * non est oblítus clamórem páuperum.'
      - type: citation
        text: '9:14 Miserére mei, Dómine: * vide humilitátem meam de inimícis meis.'
      - type: citation
        text: 9:15 Qui exáltas me de portis mortis, * ut annúntiem omnes laudatiónes tuas in portis fíliæ Sion.
      - type: citation
        text: '9:16a Exsultábo in salutári tuo: * infíxæ sunt gentes in intéritu, quem fecérunt.'
      - type: citation
        text: 9:16b In láqueo isto, quem abscondérunt, * comprehénsus est pes eórum.
      - type: citation
        text: '9:17 Cognoscétur Dóminus iudícia fáciens: * in opéribus mánuum suárum comprehénsus est peccátor.'
      - type: citation
        text: 9:18 Convertántur peccatóres in inférnum, * omnes gentes quæ obliviscúntur Deum.
      - type: citation
        text: '9:19 Quóniam non in finem oblívio erit páuperis: * patiéntia páuperum non períbit in finem.'
      - type: citation
        text: '9:20 Exsúrge, Dómine, non confortétur homo: * iudicéntur gentes in conspéctu tuo.'
      - type: citation
        text: '9:21 Constítue, Dómine, legislatórem super eos: * ut sciant gentes quóniam hómines sunt.'
      - type: citation
        text: 9:22 Ut quid, Dómine, recessísti longe, * déspicis in opportunitátibus, in tribulatióne?
      - type: citation
        text: '9:23 Dum supérbit ímpius, incénditur pauper: * comprehendúntur in consíliis quibus cógitant.'
      - type: citation
        text: '9:24 Quóniam laudátur peccátor in desidériis ánimæ suæ: * et iníquus benedícitur.'
      - type: citation
        text: 9:25 Exacerbávit Dóminum peccátor, * secúndum multitúdinem iræ suæ non quæret.
      - type: citation
        text: '9:26a Non est Deus in conspéctu eius: * inquinátæ sunt viæ illíus in omni témpore.'
      - type: citation
        text: '9:26b Auferúntur iudícia tua a fácie eius: * ómnium inimicórum suórum dominábitur.'
      - type: citation
        text: '9:27 Dixit enim in corde suo: * Non movébor a generatióne in generatiónem sine malo.'
      - type: citation
        text: '9:28 Cuius maledictióne os plenum est, et amaritúdine, et dolo: * sub lingua eius labor et dolor.'
      - type: citation
        text: '9:29 Sedet in insídiis cum divítibus in occúltis: * ut interfíciat innocéntem.'
      - type: citation
        text: '9:30a Óculi eius in páuperem respíciunt: * insidiátur in abscóndito, quasi leo in spelúnca sua.'
      - type: citation
        text: '9:30b Insidiátur ut rápiat páuperem: * rápere páuperem, dum áttrahit eum.'
      - type: citation
        text: '9:31 In láqueo suo humiliábit eum: * inclinábit se, et cadet, cum dominátus fúerit páuperum.'
      - type: citation
        text: '9:32 Dixit enim in corde suo: Oblítus est Deus, * avértit fáciem suam ne vídeat in finem.'
      - type: citation
        text: '9:33 Exsúrge, Dómine Deus, exaltétur manus tua: * ne obliviscáris páuperum.'
      - type: citation
        text: '9:34 Propter quid irritávit ímpius Deum? * dixit enim in corde suo: Non requíret.'
      - type: citation
        text: '9:35a Vides quóniam tu labórem et dolórem consíderas: * ut tradas eos in manus tuas.'
      - type: citation
        text: '9:35b Tibi derelíctus est pauper: * órphano tu eris adiútor.'
      - type: citation
        text: '9:36 Cóntere brácchium peccatóris et malígni: * quærétur peccátum illíus, et non inveniétur.'
      - type: citation
        text: '9:37 Dóminus regnábit in ætérnum, et in sǽculum sǽculi: * períbitis, gentes, de terra illíus.'
      - type: citation
        text: '9:38 Desidérium páuperum exaudívit Dóminus: * præparatiónem cordis eórum audívit auris tua.'
      - type: citation
        text: 9:39 Iudicáre pupíllo et húmili, * ut non appónat ultra magnificáre se homo super terram.
      en2:
      - type: citation
        text: '9:2 I will confess to you, O Lord, with my whole heart: * I will recount all your wonders.'
      - type: citation
        text: '9:3 I will rejoice and exult in you: * I will sing a psalm to your name, O Most High.'
      - type: citation
        text: '9:4 When my enemy is turned back: * they will be weakened and perish before your face.'
      - type: citation
        text: '9:5 For you have accomplished my judgment and my cause: * you have sat upon the throne that judges justice.'
      - type: citation
        text: '9:6 You have rebuked the Gentiles, and the impious one has perished: * you have deleted their name in eternity, and forever and ever.'
      - type: citation
        text: '9:7a The spears of the enemy have failed in the end: * and their cities you have destroyed.'
      - type: citation
        text: '9:7b Their memory has perished with a sound: * (8a) and the Lord remains in eternity.'
      - type: citation
        text: '9:8b He has prepared his throne in judgment: * (9) and he himself will judge the world in equity, he will judge the peoples in justice.'
      - type: citation
        text: '9:10 And the Lord has become a refuge for the poor: * a helper in opportunity, in tribulation.'
      - type: citation
        text: '9:11 And may they hope in you who know your name: * for you have not abandoned those seeking you, O Lord.'
      - type: citation
        text: '9:12 Sing a psalm to the Lord, who dwells in Zion: * announce his study among the Gentiles:'
      - type: citation
        text: '9:13 Because of those who yearned for their blood, he has remembered them: * he has not forgotten the cry of the poor.'
      - type: citation
        text: '9:14 Have mercy on me, O Lord: * see my humiliation from my enemies.'
      - type: citation
        text: 9:15 You lift me up from the gates of death, * so that I may announce all your praises at the gates of the daughter of Zion.
      - type: citation
        text: '9:16a I will exult in your salvation: * the Gentiles have become trapped in the ruin that they made.'
      - type: citation
        text: 9:16b In this snare of theirs, which they have hidden, * the foot of them has been caught.
      - type: citation
        text: '9:17 The Lord will be recognized when making judgments: * the sinner has been caught in the works of his own hands.'
      - type: citation
        text: 9:18 The sinners will be turned into Hell, * all the Gentiles who have forgotten God.
      - type: citation
        text: '9:19 For the poor will not be forgotten in the end: * the patience of the poor will not perish in the end.'
      - type: citation
        text: '9:20 Rise up, O Lord, let not man be strengthened: * let the Gentiles be judged in your sight.'
      - type: citation
        text: '9:21 O Lord, establish a lawgiver over them: * so that the Gentiles may know that they are only men.'
      - type: citation
        text: 9:22 So then, why, O Lord, have you withdrawn far away, * have you overlooked us in opportunity, in tribulation?
      - type: citation
        text: '9:23 While the impious is arrogant, the poor is enflamed: * they are held by the counsels that they devise.'
      - type: citation
        text: '9:24 For the sinner is praised by the desires of his soul: * and the iniquitous one is blessed.'
      - type: citation
        text: 9:25 The sinner has provoked the Lord, * according to the multitude of his wrath, he will not seek him.
      - type: citation
        text: '9:26a God is not before his sight: * his ways are stained at all times.'
      - type: citation
        text: '9:26b Your judgments are removed from his face: * he will be master of all his enemies.'
      - type: citation
        text: '9:27 For he has said in his heart: * I will not be disturbed, from generation to generation without evil.'
      - type: citation
        text: '9:28 His mouth is full of curses, and bitterness, and deceit: * under his tongue are hardship and sorrow.'
      - type: citation
        text: '9:29 He sits in ambush with resources in hidden places: * so that he may execute the innocent.'
      - type: citation
        text: '9:30a His eyes catch sight of the poor: * he lies in ambush in hiding, like a lion in his den.'
      - type: citation
        text: '9:30b He lies in ambush so that he may seize the poor: * to seize the poor as he draws him in.'
      - type: citation
        text: '9:31 With his snare he will bring him down: * he will crouch down and pounce, when he has power over the poor.'
      - type: citation
        text: 9:32 For he has said in his heart, God has forgotten, * he has turned away his face, lest he see to the end.
      - type: citation
        text: '9:33 Rise up, O Lord God, let your hand be exalted: * do not forget the poor.'
      - type: citation
        text: 9:34 How has the impious one provoked God? * for he has said in his heart, He will not inquire.
      - type: citation
        text: '9:35a You do see, for you examine hardship and sorrow: * so that you may deliver them into your hands.'
      - type: citation
        text: '9:35b The poor one has been abandoned to you: * you will be a helper to the orphan.'
      - type: citation
        text: '9:36 Break the arm of the sinner and the malicious: * his sin will be sought, and it will not be found.'
      - type: citation
        text: '9:37 The Lord shall reign in eternity, and forever and ever: * you will perish from his land, O Gentiles.'
      - type: citation
        text: '9:38 The Lord has heeded the desire of the poor: * your ear has listened to the preparation of their heart,'
      - type: citation
        text: 9:39 so as to judge for the orphan and the humble, * so that man may no longer presume to magnify himself upon the earth.
  psalm.90-1-qui-h-bitat-in-adiut-rio-alt-ssimi-in-prote-ed0ca7af02:
    role: psalm
    content:
      en:
      - type: citation
        text: 90:1 He that dwelleth in the aid of the most High, * shall abide under the protection of the God of Jacob.
      - type: citation
        text: '90:2 He shall say to the Lord: Thou art my protector, and my refuge: * my God, in him will I trust.'
      - type: citation
        text: '90:3 For he hath delivered me from the snare of the hunters: * and from the sharp word.'
      - type: citation
        text: '90:4 He will overshadow thee with his shoulders: * and under his wings thou shalt trust.'
      - type: citation
        text: '90:5 His truth shall compass thee with a shield: * thou shalt not be afraid of the terror of the night.'
      - type: citation
        text: '90:6 Of the arrow that flieth in the day, † of the business that walketh about in the dark: * of invasion, or of the noonday devil.'
      - type: citation
        text: '90:7 A thousand shall fall at thy side, † and ten thousand at thy right hand: * but it shall not come nigh thee.'
      - type: citation
        text: '90:8 But thou shalt consider with thy eyes: * and shalt see the reward of the wicked.'
      - type: citation
        text: '90:9 Because thou, O Lord, art my hope: * thou hast made the most High thy refuge.'
      - type: citation
        text: '90:10 There shall no evil come to thee: * nor shall the scourge come near thy dwelling.'
      - type: citation
        text: 90:11 For he hath given his angels charge over thee; * to keep thee in all thy ways.
      - type: citation
        text: '90:12 In their hands they shall bear thee up: * lest thou dash thy foot against a stone.'
      - type: citation
        text: '90:13 Thou shalt walk upon the asp and the basilisk: * and thou shalt trample under foot the lion and the dragon.'
      - type: citation
        text: '90:14 Because he hoped in me I will deliver him: * I will protect him because he hath known my name.'
      - type: citation
        text: '90:15 He shall cry to me, and I will hear him: ‡ I am with him in tribulation, * I will deliver him, and I will glorify him.'
      - type: citation
        text: 90:16 I will fill him with length of days; * and I will shew him my salvation.
      la:
      - type: citation
        text: 90:1 Qui hábitat in adiutório Altíssimi, * in protectióne Dei cæli commorábitur.
      - type: citation
        text: '90:2 Dicet Dómino: Suscéptor meus es tu, et refúgium meum: * Deus meus sperábo in eum.'
      - type: citation
        text: 90:3 Quóniam ipse liberávit me de láqueo venántium, * et a verbo áspero.
      - type: citation
        text: '90:4 Scápulis suis obumbrábit tibi: * et sub pennis eius sperábis.'
      - type: citation
        text: '90:5 Scuto circúmdabit te véritas eius: * non timébis a timóre noctúrno,'
      - type: citation
        text: '90:6 A sagítta volánte in die, † a negótio perambulánte in ténebris: * ab incúrsu, et dæmónio meridiáno.'
      - type: citation
        text: '90:7 Cadent a látere tuo mille, † et decem míllia a dextris tuis: * ad te autem non appropinquábit.'
      - type: citation
        text: '90:8 Verúmtamen óculis tuis considerábis: * et retributiónem peccatórum vidébis.'
      - type: citation
        text: '90:9 Quóniam tu es, Dómine, spes mea: * Altíssimum posuísti refúgium tuum.'
      - type: citation
        text: '90:10 Non accédet ad te malum: * et flagéllum non appropinquábit tabernáculo tuo.'
      - type: citation
        text: '90:11 Quóniam Ángelis suis mandávit de te: * ut custódiant te in ómnibus viis tuis.'
      - type: citation
        text: '90:12 In mánibus portábunt te: * ne forte offéndas ad lápidem pedem tuum.'
      - type: citation
        text: '90:13 Super áspidem, et basilíscum ambulábis: * et conculcábis leónem et dracónem.'
      - type: citation
        text: '90:14 Quóniam in me sperávit, liberábo eum: * prótegam eum, quóniam cognóvit nomen meum.'
      - type: citation
        text: '90:15 Clamábit ad me, et ego exáudiam eum: ‡ cum ipso sum in tribulatióne: * erípiam eum et glorificábo eum.'
      - type: citation
        text: '90:16 Longitúdine diérum replébo eum: * et osténdam illi salutáre meum.'
      en2:
      - type: citation
        text: 90:1 Whoever dwells with the assistance of the Most High, * will abide in the protection of the God of heaven.
      - type: citation
        text: '90:2 He will say to the Lord: You are my supporter and my refuge: * my God, I will hope in him.'
      - type: citation
        text: 90:3 For he has freed me from the snare of those who go hunting, * and from the harsh word.
      - type: citation
        text: '90:4 He will overshadow you with his shoulders: * and you will hope under his wings.'
      - type: citation
        text: '90:5 His truth will surround you with a shield: * you will not be afraid before the terror of the night,'
      - type: citation
        text: '90:6 Before the arrow flying in the day, before the troubles that wander in the darkness: * before invasion and the midday demon.'
      - type: citation
        text: '90:7 A thousand will fall before your side, and ten thousand before your right hand: * yet it will not draw near to you.'
      - type: citation
        text: '90:8 You will consider with your eyes: * and you will see the retribution of sinners.'
      - type: citation
        text: '90:9 For you, O Lord, are my hope: * you have set the Most High as your refuge.'
      - type: citation
        text: '90:10 Disaster will not draw near to you: * and the scourge will not approach your tabernacle.'
      - type: citation
        text: '90:11 For he has given his Angels charge over you: * so as to preserve you in all your ways.'
      - type: citation
        text: '90:12 With their hands they will carry you: * lest you hurt your foot against a stone.'
      - type: citation
        text: '90:13 You will walk over the asp and the king serpent: * and you will trample the lion and the dragon.'
      - type: citation
        text: '90:14 Because he has hoped in me, I will free him: * I will protect him, because he has known my name.'
      - type: citation
        text: '90:15 He will cry out to me, and I will heed him: he is with me in tribulation: * I will rescue him, and I will glorify him.'
      - type: citation
        text: '90:16 I will fill him with length of days: * and I will reveal to him my salvation.'
  psalm.91-2-bonum-est-confit-ri-d-mino-et-ps-llere-n-mi-b49eeacdde:
    role: psalm
    content:
      en:
      - type: citation
        text: '91:2 It is good to give praise to the Lord: * and to sing to thy name, O most High.'
      - type: citation
        text: '91:3 To shew forth thy mercy in the morning, * and thy truth in the night:'
      - type: citation
        text: '91:4 Upon an instrument of ten strings, upon the psaltery: * with a canticle upon the harp.'
      - type: citation
        text: '91:5 For thou hast given me, O Lord, a delight in thy doings: * and in the works of thy hands I shall rejoice.'
      - type: citation
        text: 91:6 O Lord, how great are thy works! * thy thoughts are exceeding deep.
      - type: citation
        text: '91:7 The senseless man shall not know: * nor will the fool understand these things.'
      - type: citation
        text: '91:8 When the wicked shall spring up as grass: * and all the workers of iniquity shall appear:'
      - type: citation
        text: '91:9 That they may perish for ever and ever: * but thou, O Lord, art most high for evermore.'
      - type: citation
        text: '91:10 For behold thy enemies, O Lord, for behold thy enemies shall perish: * and all the workers of iniquity shall be scattered.'
      - type: citation
        text: '91:11 But my horn shall be exalted like that of the unicorn: * and my old age in plentiful mercy.'
      - type: citation
        text: '91:12 My eye also hath looked down upon my enemies: * and my ear shall hear of the downfall of the malignant that rise up against me.'
      - type: citation
        text: '91:13 The just shall flourish like the palm tree: * he shall grow up like the cedar of Libanus.'
      - type: citation
        text: 91:14 They that are planted in the house of the Lord * shall flourish in the courts of the house of our God.
      - type: citation
        text: '91:15 They shall still increase in a fruitful old age: * and shall be well treated, that they may shew,'
      - type: citation
        text: 91:16 That the Lord our God is righteous, * and there is no iniquity in him.
      la:
      - type: citation
        text: '91:2 Bonum est confitéri Dómino: * et psállere nómini tuo, Altíssime.'
      - type: citation
        text: '91:3 Ad annuntiándum mane misericórdiam tuam: * et veritátem tuam per noctem.'
      - type: citation
        text: '91:4 In decachórdo, psaltério: * cum cántico, in cíthara.'
      - type: citation
        text: '91:5 Quia delectásti me, Dómine, in factúra tua: * et in opéribus mánuum tuárum exsultábo.'
      - type: citation
        text: 91:6 Quam magnificáta sunt ópera tua, Dómine! * nimis profúndæ factæ sunt cogitatiónes tuæ.
      - type: citation
        text: '91:7 Vir insípiens non cognóscet: * et stultus non intélleget hæc.'
      - type: citation
        text: '91:8 Cum exórti fúerint peccatóres sicut fænum: * et apparúerint omnes, qui operántur iniquitátem:'
      - type: citation
        text: '91:9 Ut intéreant in sǽculum sǽculi: * tu autem Altíssimus in ætérnum, Dómine.'
      - type: citation
        text: '91:10 Quóniam ecce inimíci tui, Dómine, quóniam ecce inimíci tui períbunt: * et dispergéntur omnes, qui operántur iniquitátem.'
      - type: citation
        text: '91:11 Et exaltábitur sicut unicórnis cornu meum: * et senéctus mea in misericórdia úberi.'
      - type: citation
        text: '91:12 Et despéxit óculus meus inimícos meos: * et in insurgéntibus in me malignántibus áudiet auris mea.'
      - type: citation
        text: '91:13 Iustus, ut palma florébit: * sicut cedrus Líbani multiplicábitur.'
      - type: citation
        text: 91:14 Plantáti in domo Dómini, * in átriis domus Dei nostri florébunt.
      - type: citation
        text: '91:15 Adhuc multiplicabúntur in senécta úberi: * et bene patiéntes erunt, ut annúntient:'
      - type: citation
        text: '91:16 Quóniam rectus Dóminus, Deus noster: * et non est iníquitas in eo.'
      en2:
      - type: citation
        text: '91:2 It is good to confess to the Lord: * and to sing psalms to your name, O Most High.'
      - type: citation
        text: '91:3 To announce your mercy in the morning: * and your truth throughout the night.'
      - type: citation
        text: '91:4 Upon the ten strings, upon the psaltery: * with a canticle, upon stringed instruments.'
      - type: citation
        text: '91:5 For you, O Lord, have delighted me with your doings: * and I will exult in the works of your hands.'
      - type: citation
        text: 91:6 How great are your works, O Lord! * your thoughts have been made exceedingly deep.
      - type: citation
        text: '91:7 A foolish man will not know these things: * and a senseless one will not understand them.'
      - type: citation
        text: '91:8 When sinners will have risen up like grass, * and when all those who work iniquity will have appeared:'
      - type: citation
        text: '91:9 That they shall pass away, age after age: * but you, O Lord, are the Most High for all eternity.'
      - type: citation
        text: '91:10 For behold your enemies, O Lord, for behold your enemies will perish: * and all those who work iniquity will be dispersed.'
      - type: citation
        text: '91:11 And my horn will be exalted like that of the single-horned beast: * and my old age in fruitful mercy.'
      - type: citation
        text: '91:12 And my eye has looked down upon my enemies: * and my ear will hear of the malignant rising up against me.'
      - type: citation
        text: '91:13 The just one will flourish like the palm tree: * he will be multiplied like the cedar of Lebanon.'
      - type: citation
        text: 91:14 Those planted in the house of the Lord * will flourish in the courts of the house of our God.
      - type: citation
        text: '91:15 They will still be multiplied in a fruitful old age: * and they will endure well, so that they may announce:'
      - type: citation
        text: '91:16 That the Lord our God is righteous: * and that there is no iniquity in him.'
  psalm.92-1a-d-minus-regn-vit-dec-rem-ind-tus-est-ind-t-cb62d19fc7:
    role: psalm
    content:
      en:
      - type: citation
        text: '92:1a The Lord hath reigned, he is clothed with beauty: * the Lord is clothed with strength, and hath girded himself.'
      - type: citation
        text: 92:1b For he hath established the world * which shall not be moved.
      - type: citation
        text: '92:2 Thy throne is prepared from of old: * thou art from everlasting.'
      - type: citation
        text: '92:3a The floods have lifted up, O Lord: * the floods have lifted up their voice.'
      - type: citation
        text: 92:3b The floods have lifted up their waves, * (4a) with the noise of many waters.
      - type: citation
        text: '92:4b Wonderful are the surges of the sea: * wonderful is the Lord on high.'
      - type: citation
        text: '92:5 Thy testimonies are become exceedingly credible: * holiness becometh thy house, O Lord, unto length of days.'
      la:
      - type: citation
        text: '92:1a Dóminus regnávit, decórem indútus est: * indútus est Dóminus fortitúdinem, et præcínxit se.'
      - type: citation
        text: 92:1b Étenim firmávit orbem terræ, * qui non commovébitur.
      - type: citation
        text: '92:2 Paráta sedes tua ex tunc: * a sǽculo tu es.'
      - type: citation
        text: '92:3a Elevavérunt flúmina, Dómine: * elevavérunt flúmina vocem suam.'
      - type: citation
        text: 92:3b Elevavérunt flúmina fluctus suos, * (4a) a vócibus aquárum multárum.
      - type: citation
        text: '92:4b Mirábiles elatiónes maris: * mirábilis in altis Dóminus.'
      - type: citation
        text: '92:5 Testimónia tua credibília facta sunt nimis: * domum tuam decet sanctitúdo, Dómine, in longitúdinem diérum.'
      en2:
      - type: citation
        text: '92:1a The Lord has reigned, he has been clothed with beauty: * the Lord has been clothed with strength, and he has girded himself.'
      - type: citation
        text: 92:1b Yet he has also confirmed the world, * which will not be moved.
      - type: citation
        text: '92:2 My throne is prepared from of old: * you are from everlasting.'
      - type: citation
        text: '92:3a The floods have lifted up, O Lord: * the floods have lifted up their voice.'
      - type: citation
        text: 92:3b The floods have lifted up their waves, * before the noise of many waters.
      - type: citation
        text: '92:4b Wondrous are the surges of the sea: * wondrous is the Lord on high.'
      - type: citation
        text: '92:5 Your testimonies have been made exceedingly trustworthy: * sanctity befits your house, O Lord, with length of days.'
  psalm.93-1-deus-ulti-num-d-minus-deus-ulti-num-l-bere-9f3e53317a:
    role: psalm
    content:
      en:
      - type: citation
        text: '93:1 The Lord is the God to whom revenge belongeth: * the God of revenge hath acted freely.'
      - type: citation
        text: '93:2 Lift up thyself, thou that judgest the earth: * render a reward to the proud.'
      - type: citation
        text: '93:3 How long shall sinners, O Lord: * how long shall sinners glory?'
      - type: citation
        text: '93:4 Shall they utter, and speak iniquity: * shall all speak who work injustice?'
      - type: citation
        text: '93:5 Thy people, O Lord, they have brought low: * and they have afflicted thy inheritance.'
      - type: citation
        text: '93:6 They have slain the widow and the stranger: * and they have murdered the fatherless.'
      - type: citation
        text: '93:7 And they have said: The Lord shall not see: * neither shall the God of Jacob understand.'
      - type: citation
        text: '93:8 Understand, ye senseless among the people: * and, you fools, be wise at last.'
      - type: citation
        text: 93:9 He that planted the ear, shall he not hear? * or he that formed the eye, doth he not consider?
      - type: citation
        text: '93:10 He that chastiseth nations, shall he not rebuke: * he that teacheth man knowledge?'
      - type: citation
        text: 93:11 The Lord knoweth the thoughts of men, * that they are vain.
      - type: citation
        text: '93:12 Blessed is the man whom thou shalt instruct, O Lord: * and shalt teach him out of thy law.'
      - type: citation
        text: '93:13 That thou mayst give him rest from the evil days: * till a pit be dug for the wicked.'
      - type: citation
        text: '93:14 For the Lord will not cast off his people: * neither will he forsake his own inheritance.'
      - type: citation
        text: '93:15 Until justice be turned into judgment: * and they that are near it are all the upright in heart.'
      - type: citation
        text: 93:16 Who shall rise up for me against the evildoers? * or who shall stand with me against the workers of iniquity?
      - type: citation
        text: 93:17 Unless the Lord had been my helper, * my soul had almost dwelt in hell.
      - type: citation
        text: '93:18 If I said: My foot is moved: * thy mercy, O Lord, assisted me.'
      - type: citation
        text: 93:19 According to the multitude of my sorrows in my heart, * thy comforts have given joy to my soul.
      - type: citation
        text: 93:20 Doth the seat of iniquity stick to thee, * who framest labour in commandment?
      - type: citation
        text: 93:21 They will hunt after the soul of the just, * and will condemn innocent blood.
      - type: citation
        text: '93:22 But the Lord is my refuge: * and my God the help of my hope.'
      - type: citation
        text: '93:23 And he will render them their iniquity: and in their malice he will destroy them: * the Lord our God will destroy them.'
      la:
      - type: citation
        text: '93:1 Deus ultiónum Dóminus: * Deus ultiónum líbere egit.'
      - type: citation
        text: '93:2 Exaltáre, qui iúdicas terram: * redde retributiónem supérbis.'
      - type: citation
        text: '93:3 Úsquequo peccatóres, Dómine, * úsquequo peccatóres gloriabúntur:'
      - type: citation
        text: '93:4 Effabúntur, et loquéntur iniquitátem: * loquéntur omnes, qui operántur iniustítiam?'
      - type: citation
        text: '93:5 Pópulum tuum, Dómine, humiliavérunt: * et hereditátem tuam vexavérunt.'
      - type: citation
        text: '93:6 Víduam, et ádvenam interfecérunt: * et pupíllos occidérunt.'
      - type: citation
        text: '93:7 Et dixérunt: Non vidébit Dóminus, * nec intélleget Deus Iacob.'
      - type: citation
        text: '93:8 Intellégite, insipiéntes in pópulo: * et stulti, aliquándo sápite.'
      - type: citation
        text: 93:9 Qui plantávit aurem, non áudiet? * aut qui finxit óculum, non consíderat?
      - type: citation
        text: '93:10 Qui córripit gentes, non árguet: * qui docet hóminem sciéntiam?'
      - type: citation
        text: 93:11 Dóminus scit cogitatiónes hóminum, * quóniam vanæ sunt.
      - type: citation
        text: '93:12 Beátus homo, quem tu erudíeris, Dómine: * et de lege tua docúeris eum,'
      - type: citation
        text: '93:13 Ut mítiges ei a diébus malis: * donec fodiátur peccatóri fóvea.'
      - type: citation
        text: '93:14 Quia non repéllet Dóminus plebem suam: * et hereditátem suam non derelínquet.'
      - type: citation
        text: '93:15 Quoadúsque iustítia convertátur in iudícium: * et qui iuxta illam omnes qui recto sunt corde.'
      - type: citation
        text: 93:16 Quis consúrget mihi advérsus malignántes? * aut quis stabit mecum advérsus operántes iniquitátem?
      - type: citation
        text: '93:17 Nisi quia Dóminus adiúvit me: * paulo minus habitásset in inférno ánima mea.'
      - type: citation
        text: '93:18 Si dicébam: Motus est pes meus: * misericórdia tua, Dómine, adiuvábat me.'
      - type: citation
        text: '93:19 Secúndum multitúdinem dolórum meórum in corde meo: * consolatiónes tuæ lætificavérunt ánimam meam.'
      - type: citation
        text: '93:20 Numquid adhǽret tibi sedes iniquitátis: * qui fingis labórem in præcépto?'
      - type: citation
        text: '93:21 Captábunt in ánimam iusti: * et sánguinem innocéntem condemnábunt.'
      - type: citation
        text: '93:22 Et factus est mihi Dóminus in refúgium: * et Deus meus in adiutórium spei meæ.'
      - type: citation
        text: '93:23 Et reddet illis iniquitátem ipsórum: et in malítia eórum dispérdet eos: * dispérdet illos Dóminus, Deus noster.'
      en2:
      - type: citation
        text: '93:1 The Lord is the God of retribution: * the God of retribution acts in order to deliver.'
      - type: citation
        text: '93:2 Lift yourself up, for you judge the earth: * repay the arrogant with retribution.'
      - type: citation
        text: '93:3 How long will sinners, O Lord, * how long will sinners glory:'
      - type: citation
        text: '93:4 How long will they utter and speak iniquity: * how long will all who work injustice speak out?'
      - type: citation
        text: '93:5 They have humiliated your people, O Lord: * and they have harassed your inheritance.'
      - type: citation
        text: '93:6 They have executed the widow and the new arrival: * and they have slaughtered the orphan.'
      - type: citation
        text: '93:7 And they have said: The Lord will not see, * nor will the God of Jacob understand.'
      - type: citation
        text: '93:8 Understand, you senseless ones among the people: * and be wise at last, you foolish ones.'
      - type: citation
        text: 93:9 He who formed the ear, will he not hear? * And he who forged the eye, does he not look closely?
      - type: citation
        text: '93:10 He who chastises nations, will he not rebuke: * he who teaches man knowledge?'
      - type: citation
        text: 93:11 The Lord knows the thoughts of men, * that these are in vain.
      - type: citation
        text: '93:12 Blessed is the man whom you will instruct, O Lord: * and you will teach him from your law,'
      - type: citation
        text: '93:13 So may you soothe him from the evil days: * until a pit may be dug for sinners.'
      - type: citation
        text: '93:14 For the Lord will not drive away his people: * and he will not abandon his inheritance.'
      - type: citation
        text: '93:15 Even until the time when justice is converted into judgment: * and when those who are close to it are all those who are upright of heart.'
      - type: citation
        text: 93:16 Who will rise up with me against the malignant? * Or who will stand with me against the workers of iniquity?
      - type: citation
        text: '93:17 Except that the Lord assisted me: * my soul almost would have dwelt in Hell.'
      - type: citation
        text: '93:18 If ever I said, My foot is slipping: * your mercy, O Lord, assisted me.'
      - type: citation
        text: '93:19 According to the multitude of my sorrows in my heart: * your consolations have given joy to my soul.'
      - type: citation
        text: '93:20 Does the seat of iniquity adhere to you: * you who contrive hardship within a commandment?'
      - type: citation
        text: '93:21 They will hunt down the soul of the just: * and they will condemn innocent blood.'
      - type: citation
        text: '93:22 And the Lord has been made into a refuge for me: * and my God into the assistance of my hope.'
      - type: citation
        text: '93:23 And he will repay them their iniquity, and he will destroy them in their malice: * the Lord our God will utterly destroy them.'
  psalm.94-1-ven-te-exsult-mus-d-mino-iubil-mus-deo-salu-23c7514442:
    role: psalm
    content:
      en:
      - type: citation
        text: '94:1 O come, let us sing unto the Lord : let us make a joyful noise to the God of our salvation.'
      - type: citation
        text: 94:2 Let us come before His presence with thanksgiving, and make a joyful noise unto Him with psalms.
      - type: citation
        text: 94:3 For the Lord is a great God, and a great King above all gods.
      - type: citation
        text: '94:4 In His hand are the inmost depths of the earth : and the heights of the hills are His also.'
      - type: citation
        text: 94:5 For the sea is His, and He made it, and His hands formed the dry land.
      - type: citation
        text: '94:6 Come let us adore and fall down: and weep before the Lord that made us: For he is the Lord our God:'
      - type: citation
        text: 94:7 And we are the people of His pasture, and the sheep of His hand. Today if ye will hear His voice, harden not your heart.
      - type: citation
        text: 94:8 As in the Provocation, and as in the day of Temptation in the wilderness, when your fathers tempted Me, and proved Me, and saw My works.
      - type: citation
        text: '94:9 Forty years long was I grieved with that generation, and said: It is a people that do alway err in their heart.'
      - type: citation
        text: 94:10 And they have not known My ways; unto whom I sware in My wrath that they should not enter into My rest.
      la:
      - type: citation
        text: '94:1 Veníte, exsultémus Dómino: * iubilémus Deo salutári nostro:'
      - type: citation
        text: '94:2 Præoccupémus fáciem eius in confessióne: * et in psalmis iubilémus ei.'
      - type: citation
        text: '94:3 Quóniam Deus magnus Dóminus: * et Rex magnus super omnes deos.'
      - type: citation
        text: '94:4 Quia in manu eius sunt omnes fines terræ: * et altitúdines móntium ipsíus sunt.'
      - type: citation
        text: '94:5 Quóniam ipsíus est mare, et ipse fecit illud: * et siccam manus eius formavérunt.'
      - type: citation
        text: '94:6 Veníte adorémus, et procidámus: et plorémus ante Dóminum, qui fecit nos. * Quia ipse est Dóminus Deus noster:'
      - type: citation
        text: '94:7 Et nos pópulus páscuæ eius, et oves manus eius. * Hódie si vocem eius audiéritis, nolíte obduráre corda vestra:'
      - type: citation
        text: '94:8 Sicut in irritatióne secúndum diem tentatiónis in desérto: * ubi tentavérunt me patres vestri, probavérunt me, et vidérunt ópera mea.'
      - type: citation
        text: '94:9 Quadragínta annis offénsus fui generatióni illi, * et dixi: Semper hi errant corde.'
      - type: citation
        text: '94:10 Et isti non cognovérunt vias meas, ut iurávi in ira mea: * Si introíbunt in réquiem meam.'
      en2:
      - type: citation
        text: '94:1 Come, let us exult in the Lord: * let us shout joyfully to God, our Savior:'
      - type: citation
        text: '94:2 Let us anticipate his presence with confession: * and let us sing joyfully to him with psalms.'
      - type: citation
        text: '94:3 For the Lord is a great God: * and a great King over all gods.'
      - type: citation
        text: '94:4 For in his hand are all the limits of the earth: * and the heights of the mountains are his.'
      - type: citation
        text: '94:5 For the sea is his, and he made it: * and his hands formed the dry land.'
      - type: citation
        text: '94:6 Come, let us adore and fall prostrate, and let us weep before the Lord who made us. * For he is the Lord our God:'
      - type: citation
        text: '94:7 And we are the people of his pasture and the sheep of his hand. * If today you hear his voice, harden not your hearts:'
      - type: citation
        text: '94:8 As in the provocation, according to the day of temptation in the wilderness: * where your fathers tempted me; they tested me, though they had seen my works.'
      - type: citation
        text: '94:9 For forty years, I was offended by that generation, * and I said: These have always strayed in heart.'
      - type: citation
        text: '94:10 And these have not known my ways, so I swore in my wrath: * They shall not enter into my rest.'
  psalm.94-1-ven-te-exsult-mus-d-mino-iubil-mus-deo-salu-fe91e76dfc:
    role: psalm
    content:
      en:
      - type: citation
        text: '94:1 O come, let us sing unto the Lord : let us make a joyful noise to the God of our salvation.'
      - type: citation
        text: 94:2 Let us come before His presence with thanksgiving, and make a joyful noise unto Him with psalms.
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: 94:3 For the Lord is a great God, and a great King above all gods.
      - type: citation
        text: '94:4 In His hand are the inmost depths of the earth : and the heights of the hills are His also.'
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: 94:5 For the sea is His, and He made it, and His hands formed the dry land.
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: 94:7 And we are the people of His pasture, and the sheep of His hand. Today if ye will hear His voice, harden not your heart.
      - type: citation
        text: 94:8 As in the Provocation, and as in the day of Temptation in the wilderness, when your fathers tempted Me, and proved Me, and saw My works.
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: '94:9 Forty years long was I grieved with that generation, and said: It is a people that do alway err in their heart.'
      - type: citation
        text: 94:10 And they have not known My ways; unto whom I sware in My wrath that they should not enter into My rest.
      - type: citation
        text: repeat full invitatory antiphon
      la:
      - type: citation
        text: '94:1 Veníte, exsultémus Dómino: * iubilémus Deo salutári nostro:'
      - type: citation
        text: '94:2 Præoccupémus fáciem eius in confessióne: * et in psalmis iubilémus ei.'
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: '94:3 Quóniam Deus magnus Dóminus: * et Rex magnus super omnes deos.'
      - type: citation
        text: '94:4 Quia in manu eius sunt omnes fines terræ: * et altitúdines móntium ipsíus sunt.'
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: '94:5 Quóniam ipsíus est mare, et ipse fecit illud: * et siccam manus eius formavérunt.'
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: '94:7 Et nos pópulus páscuæ eius, et oves manus eius. * Hódie si vocem eius audiéritis, nolíte obduráre corda vestra:'
      - type: citation
        text: '94:8 Sicut in irritatióne secúndum diem tentatiónis in desérto: * ubi tentavérunt me patres vestri, probavérunt me, et vidérunt ópera mea.'
      - type: citation
        text: repeat full invitatory antiphon
      - type: citation
        text: '94:9 Quadragínta annis offénsus fui generatióni illi, * et dixi: Semper hi errant corde.'
      - type: citation
        text: '94:10 Et isti non cognovérunt vias meas, ut iurávi in ira mea: * Si introíbunt in réquiem meam.'
      - type: citation
        text: repeat full invitatory antiphon
      en2:
      - type: citation
        text: '94:1 Come, let us exult in the Lord: * let us shout joyfully to God, our Savior:'
      - type: citation
        text: '94:2 Let us anticipate his presence with confession: * and let us sing joyfully to him with psalms.'
      - type: citation
        text: Repeat the full invitatory antiphon.
      - type: citation
        text: '94:3 For the Lord is a great God: * and a great King over all gods.'
      - type: citation
        text: '94:4 For in his hand are all the limits of the earth: * and the heights of the mountains are his.'
      - type: citation
        text: Repeat the full invitatory antiphon.
      - type: citation
        text: '94:5 For the sea is his, and he made it: * and his hands formed the dry land.'
      - type: citation
        text: Repeat the full invitatory antiphon.
      - type: citation
        text: '94:7 And we are the people of his pasture and the sheep of his hand. * If today you hear his voice, harden not your hearts:'
      - type: citation
        text: '94:8 As in the provocation, according to the day of temptation in the wilderness: * where your fathers tempted me; they tested me, though they had seen my works.'
      - type: citation
        text: Repeat the full invitatory antiphon.
      - type: citation
        text: '94:9 For forty years, I was offended by that generation, * and I said: These have always strayed in heart.'
      - type: citation
        text: '94:10 And these have not known my ways, so I swore in my wrath: * They shall not enter into my rest.'
      - type: citation
        text: Repeat the full invitatory antiphon.
  psalm.95-1-cant-te-d-mino-c-nticum-novum-cant-te-d-min-b2d393a775:
    role: psalm
    content:
      en:
      - type: citation
        text: '95:1 Sing ye to the Lord a new canticle: * sing to the Lord, all the earth.'
      - type: citation
        text: '95:2 Sing ye to the Lord and bless his name: * shew forth his salvation from day to day.'
      - type: citation
        text: '95:3 Declare his glory among the Gentiles: * his wonders among all people.'
      - type: citation
        text: '95:4 For the Lord is great, and exceedingly to be praised: * he is to be feared above all gods.'
      - type: citation
        text: '95:5 For all the gods of the Gentiles are devils: * but the Lord made the heavens.'
      - type: citation
        text: '95:6 Praise and beauty are before him: * holiness and majesty in his sanctuary.'
      - type: citation
        text: '95:7 Bring ye to the Lord, O ye kindreds of the Gentiles, bring ye to the Lord glory and honour: * bring to the Lord glory unto his name.'
      - type: citation
        text: '95:8 Bring up sacrifices, and come into his courts: * adore ye the Lord in his holy court.'
      - type: citation
        text: 95:9 Let all the earth be moved at his presence. * Say ye among the Gentiles, the Lord hath reigned.
      - type: citation
        text: '95:10 For he hath corrected the world, which shall not be moved: * he will judge the people with justice.'
      - type: citation
        text: '95:11 Let the heavens rejoice, and let the earth be glad, let the sea be moved, and the fulness thereof: * the fields and all things that are in them shall be joyful.'
      - type: citation
        text: '95:12 Then shall all the trees of the woods rejoice before the face of the Lord, because he cometh: * because he cometh to judge the earth.'
      - type: citation
        text: 95:13 He shall judge the world with justice, * and the people with his truth.
      la:
      - type: citation
        text: '95:1 Cantáte Dómino cánticum novum: * cantáte Dómino, omnis terra.'
      - type: citation
        text: '95:2 Cantáte Dómino, et benedícite nómini eius: * annuntiáte de die in diem salutáre eius.'
      - type: citation
        text: 95:3 Annuntiáte inter gentes glóriam eius, * in ómnibus pópulis mirabília eius.
      - type: citation
        text: '95:4 Quóniam magnus Dóminus, et laudábilis nimis: * terríbilis est super omnes deos.'
      - type: citation
        text: '95:5 Quóniam omnes dii géntium dæmónia: * Dóminus autem cælos fecit.'
      - type: citation
        text: '95:6 Conféssio, et pulchritúdo in conspéctu eius: * sanctimónia et magnificéntia in sanctificatióne eius.'
      - type: citation
        text: '95:7 Afférte Dómino, pátriæ géntium, afférte Dómino glóriam et honórem: * afférte Dómino glóriam nómini eius.'
      - type: citation
        text: '95:8 Tóllite hóstias, et introíte in átria eius: * adoráte Dóminum in átrio sancto eius.'
      - type: citation
        text: '95:9 Commoveátur a fácie eius univérsa terra: * dícite in géntibus quia Dóminus regnávit.'
      - type: citation
        text: '95:10 Étenim corréxit orbem terræ qui non commovébitur: * iudicábit pópulos in æquitáte.'
      - type: citation
        text: '95:11 Læténtur cæli, et exsúltet terra: commoveátur mare, et plenitúdo eius: * gaudébunt campi, et ómnia quæ in eis sunt.'
      - type: citation
        text: '95:12 Tunc exsultábunt ómnia ligna silvárum a fácie Dómini, quia venit: * quóniam venit iudicáre terram.'
      - type: citation
        text: 95:13 Iudicábit orbem terræ in æquitáte, * et pópulos in veritáte sua.
      en2:
      - type: citation
        text: '95:1 Sing to the Lord a new song: * sing to the Lord, all the earth.'
      - type: citation
        text: '95:2 Sing to the Lord and bless his name: * announce his salvation from day to day.'
      - type: citation
        text: 95:3 Announce his glory among the Gentiles, * his miracles among all peoples.
      - type: citation
        text: '95:4 For the Lord is great and greatly to be praised: * he is terrible beyond all gods.'
      - type: citation
        text: '95:5 For all the gods of the Gentiles are demons: * but the Lord made the heavens.'
      - type: citation
        text: '95:6 Confession and beauty are in his sight: * sanctity and magnificence are in his sanctuary.'
      - type: citation
        text: '95:7 Bring to the Lord, you natives of the nations, bring to the Lord glory and honor: * bring to the Lord glory for his name.'
      - type: citation
        text: '95:8 Lift up sacrifices, and enter into his courts: * adore the Lord in his holy court.'
      - type: citation
        text: '95:9 Let the entire earth be shaken before his face: * say among the Gentiles that the Lord has reigned.'
      - type: citation
        text: '95:10 Yet he has also corrected the world, which will not be moved: * he will judge the peoples with fairness.'
      - type: citation
        text: '95:11 Let the heavens rejoice and let the earth exult; let the sea and all its fullness be moved: * the fields and all the things that are in them will be glad.'
      - type: citation
        text: '95:12 Then all the trees of the forest will rejoice before the face of the Lord, for he comes: * for he comes to judge the earth.'
      - type: citation
        text: 95:13 He will judge the whole world with fairness, * and the peoples with his truth.
  psalm.96-1-d-minus-regn-vit-exs-ltet-terra-l-t-ntur-ns-dd1e4c4b22:
    role: psalm
    content:
      en:
      - type: citation
        text: '96:1 The Lord hath reigned, let the earth rejoice: * let many islands be glad.'
      - type: citation
        text: '96:2 Clouds and darkness are round about him: * justice and judgment are the establishment of his throne.'
      - type: citation
        text: 96:3 A fire shall go before him, * and shall burn his enemies round about.
      - type: citation
        text: '96:4 His lightnings have shone forth to the world: * the earth saw and trembled.'
      - type: citation
        text: '96:5 The mountains melted like wax, at the presence of the Lord: * at the presence of the Lord of all the earth.'
      - type: citation
        text: '96:6 The heavens declared his justice: * and all people saw his glory.'
      - type: citation
        text: 96:7 Let them be all confounded that adore graven things, * and that glory in their idols.
      - type: citation
        text: '96:7 Adore him, all you his angels: * Sion heard, and was glad.'
      - type: citation
        text: 96:8 And the daughters of Juda rejoiced, * because of thy judgments, O Lord.
      - type: citation
        text: '96:9 For thou art the most high Lord over all the earth: * thou art exalted exceedingly above all gods.'
      - type: citation
        text: '96:10 You that love the Lord, hate evil: * the Lord preserveth the souls of his saints, he will deliver them out of the hand of the sinner.'
      - type: citation
        text: 96:11 Light is risen to the just, * and joy to the right of heart.
      - type: citation
        text: '96:12 Rejoice, ye just, in the Lord: * and give praise to the remembrance of his holiness.'
      la:
      - type: citation
        text: '96:1 Dóminus regnávit, exsúltet terra: * læténtur ínsulæ multæ.'
      - type: citation
        text: '96:2 Nubes, et calígo in circúitu eius: * iustítia, et iudícium corréctio sedis eius.'
      - type: citation
        text: 96:3 Ignis ante ipsum præcédet, * et inflammábit in circúitu inimícos eius.
      - type: citation
        text: '96:4 Illuxérunt fúlgura eius orbi terræ: * vidit, et commóta est terra.'
      - type: citation
        text: '96:5 Montes, sicut cera fluxérunt a fácie Dómini: * a fácie Dómini omnis terra.'
      - type: citation
        text: '96:6 Annuntiavérunt cæli iustítiam eius: * et vidérunt omnes pópuli glóriam eius.'
      - type: citation
        text: '96:7 Confundántur omnes, qui adórant sculptília: * et qui gloriántur in simulácris suis.'
      - type: citation
        text: '96:7 Adoráte eum, omnes Ángeli eius: * audívit, et lætáta est Sion.'
      - type: citation
        text: '96:8 Et exsultavérunt fíliæ Iudæ, * propter iudícia tua, Dómine:'
      - type: citation
        text: '96:9 Quóniam tu Dóminus Altíssimus super omnem terram: * nimis exaltátus es super omnes deos.'
      - type: citation
        text: '96:10 Qui dilígitis Dóminum, odíte malum: * custódit Dóminus ánimas sanctórum suórum, de manu peccatóris liberábit eos.'
      - type: citation
        text: 96:11 Lux orta est iusto, * et rectis corde lætítia.
      - type: citation
        text: '96:12 Lætámini, iusti, in Dómino: * et confitémini memóriæ sanctificatiónis eius.'
      en2:
      - type: citation
        text: '96:1 The Lord has reigned, let the earth exult: * let the many islands rejoice.'
      - type: citation
        text: '96:2 Clouds and mist are all around him: * justice and judgment are corrections from his throne.'
      - type: citation
        text: 96:3 A fire will precede him, * and it will enflame his enemies all around.
      - type: citation
        text: '96:4 His lightnings have enlightened the whole world: * the earth saw, and it was shaken.'
      - type: citation
        text: '96:5 The mountains flowed like wax before the face of the Lord: * before the face of the Lord of all the earth.'
      - type: citation
        text: '96:6 The heavens announced his justice: * and all peoples saw his glory.'
      - type: citation
        text: '96:7 May all those who adore graven images be confounded: * and those who glory in their false images.'
      - type: citation
        text: '96:7 Adore him, all you his Angels: * Zion heard, and was glad.'
      - type: citation
        text: '96:8 And the daughters of Judah exulted, * because of your judgments, O Lord:'
      - type: citation
        text: '96:9 For you are the Most High Lord over all the earth: * you are greatly exalted above all gods.'
      - type: citation
        text: '96:10 You who love the Lord, hate evil: * the Lord watches over the souls of his holy ones; he will deliver them from the hand of sinners.'
      - type: citation
        text: 96:11 The light has risen for the just, * and joy for the upright of heart.
      - type: citation
        text: '96:12 Rejoice in the Lord, you just ones: * and confess to the memory of his sanctuary.'
  psalm.97-1-cant-te-d-mino-c-nticum-novum-quia-mirab-li-e52cf23bc5:
    role: psalm
    content:
      en:
      - type: citation
        text: '97:1 Sing ye to the Lord a new canticle: * because he hath done wonderful things.'
      - type: citation
        text: 97:1 His right hand hath wrought for him salvation, * and his arm is holy.
      - type: citation
        text: '97:2 The Lord hath made known his salvation: * he hath revealed his justice in the sight of the Gentiles.'
      - type: citation
        text: 97:3 He hath remembered his mercy * and his truth toward the house of Israel.
      - type: citation
        text: 97:3 All the ends of the earth have seen * the salvation of our God.
      - type: citation
        text: 97:4 Sing joyfully to God, all the earth; * make melody, rejoice and sing.
      - type: citation
        text: '97:5 Sing praise to the Lord on the harp, on the harp, and with the voice of a psalm: * with long trumpets, and sound of cornet.'
      - type: citation
        text: '97:6 Make a joyful noise before the Lord our king: * let the sea be moved and the fulness thereof: the world and they that dwell therein.'
      - type: citation
        text: '97:8 The rivers shall clap their hands, the mountains shall rejoice together at the presence of the Lord: * because he cometh to judge the earth.'
      - type: citation
        text: 97:9 He shall judge the world with justice, * and the people with equity.
      la:
      - type: citation
        text: '97:1 Cantáte Dómino cánticum novum: * quia mirabília fecit.'
      - type: citation
        text: '97:1 Salvávit sibi déxtera eius: * et brácchium sanctum eius.'
      - type: citation
        text: '97:2 Notum fecit Dóminus salutáre suum: * in conspéctu géntium revelávit iustítiam suam.'
      - type: citation
        text: 97:3 Recordátus est misericórdiæ suæ, * et veritátis suæ dómui Israël.
      - type: citation
        text: 97:3 Vidérunt omnes términi terræ * salutáre Dei nostri.
      - type: citation
        text: '97:4 Iubiláte Deo, omnis terra: * cantáte, et exsultáte, et psállite.'
      - type: citation
        text: '97:5 Psállite Dómino in cíthara, in cíthara et voce psalmi: * in tubis ductílibus, et voce tubæ córneæ.'
      - type: citation
        text: '97:6 Iubiláte in conspéctu regis Dómini: * moveátur mare, et plenitúdo eius: orbis terrárum, et qui hábitant in eo.'
      - type: citation
        text: '97:8 Flúmina plaudent manu, simul montes exsultábunt a conspéctu Dómini: * quóniam venit iudicáre terram.'
      - type: citation
        text: 97:9 Iudicábit orbem terrárum in iustítia, * et pópulos in æquitáte.
      en2:
      - type: citation
        text: '97:1 Sing to the Lord a new song: * for he has performed wonders.'
      - type: citation
        text: '97:1 His right hand has accomplished salvation for him: * with his holy arm.'
      - type: citation
        text: '97:2 The Lord has made known his salvation: * he has revealed his justice in the sight of the nations.'
      - type: citation
        text: 97:3 He has remembered his mercy, * and his truth toward the house of Israel.
      - type: citation
        text: 97:3 All the ends of the earth have seen * the salvation of our God.
      - type: citation
        text: '97:4 Sing joyfully to God, all the earth: * sing and exult, and sing psalms.'
      - type: citation
        text: '97:5 Sing psalms to the Lord with stringed instruments, with strings and the voice of a psalmist: * with subtle wind instruments and the voice of woodwinds.'
      - type: citation
        text: '97:6 Make a joyful noise before the Lord our king: * let the sea be moved and all its fullness, the whole world and all who dwell in it.'
      - type: citation
        text: '97:8 The rivers will clap their hands, the mountains will exult together, before the presence of the Lord: * for he comes to judge the earth.'
      - type: citation
        text: 97:9 He will judge the whole world with justice, * and the peoples with fairness.
  psalm.98-1-d-minus-regn-vit-irasc-ntur-p-puli-qui-sede-36390ff180:
    role: psalm
    content:
      en:
      - type: citation
        text: '98:1 The Lord hath reigned, let the people be angry: * he that sitteth on the cherubims: let the earth be moved.'
      - type: citation
        text: 98:2 The Lord is great in Sion, * and high above all people.
      - type: citation
        text: '98:3 Let them give praise to thy great name: for it is terrible and holy: * and the king’s honour loveth judgment.'
      - type: citation
        text: '98:4 Thou hast prepared directions: * thou hast done judgment and justice in Jacob.'
      - type: citation
        text: 98:5 Exalt ye the Lord our God, and adore his footstool, * for it is holy.
      - type: citation
        text: '98:6 Moses and Aaron among his priests: * and Samuel among them that call upon his name.'
      - type: citation
        text: '98:6 They called upon the Lord, and he heard them: * he spoke to them in the pillar of the cloud.'
      - type: citation
        text: 98:7 They kept his testimonies, * and the commandment which he gave them.
      - type: citation
        text: '98:8 Thou didst hear them, O Lord our God: * thou wast a merciful God to them, and taking vengeance on all their inventions.'
      - type: citation
        text: '98:9 Exalt ye the Lord our God, and adore at his holy mountain: * for the Lord our God is holy.'
      la:
      - type: citation
        text: '98:1 Dóminus regnávit, irascántur pópuli: * qui sedet super Chérubim, moveátur terra.'
      - type: citation
        text: '98:2 Dóminus in Sion magnus: * et excélsus super omnes pópulos.'
      - type: citation
        text: '98:3 Confiteántur nómini tuo magno: quóniam terríbile, et sanctum est: * et honor regis iudícium díligit.'
      - type: citation
        text: '98:4 Tu parásti directiónes: * iudícium et iustítiam in Iacob tu fecísti.'
      - type: citation
        text: '98:5 Exaltáte Dóminum, Deum nostrum, et adoráte scabéllum pedum eius: * quóniam sanctum est.'
      - type: citation
        text: '98:6 Móyses et Aaron in sacerdótibus eius: * et Sámuel inter eos, qui ínvocant nomen eius:'
      - type: citation
        text: '98:6 Invocábant Dóminum, et ipse exaudiébat eos: * in colúmna nubis loquebátur ad eos.'
      - type: citation
        text: 98:7 Custodiébant testimónia eius, * et præcéptum quod dedit illis.
      - type: citation
        text: '98:8 Dómine, Deus noster, tu exaudiébas eos: * Deus, tu propítius fuísti eis, et ulcíscens in omnes adinventiónes eórum.'
      - type: citation
        text: '98:9 Exaltáte Dóminum, Deum nostrum, et adoráte in monte sancto eius: * quóniam sanctus Dóminus, Deus noster.'
      en2:
      - type: citation
        text: '98:1 The Lord has reigned: let the peoples be angry; * he who sits upon the cherubim, let the earth be moved.'
      - type: citation
        text: '98:2 The Lord is great in Zion: * and he is high above all peoples.'
      - type: citation
        text: '98:3 May they confess to your great name, for it is terrible and holy: * and the honor of the king loves judgment.'
      - type: citation
        text: '98:4 You have prepared guidance: * you have accomplished judgment and justice in Jacob.'
      - type: citation
        text: '98:5 Exalt the Lord our God, and adore the footstool of his feet: * for it is holy.'
      - type: citation
        text: '98:6 Moses and Aaron are among his priests: * and Samuel is among those who call upon his name.'
      - type: citation
        text: '98:6 They called upon the Lord, and he heeded them: * he spoke to them in the pillar of the cloud.'
      - type: citation
        text: 98:7 They kept his testimonies, * and the precept that he gave them.
      - type: citation
        text: '98:8 You heeded them, O Lord our God: * O God, you were a forgiving God to them, though taking vengeance on all their inventions.'
      - type: citation
        text: '98:9 Exalt the Lord our God, and adore on his holy mountain: * for the Lord our God is holy.'
  psalm.99-2a-iubil-te-deo-omnis-terra-serv-te-d-mino-in-0cf23f014e:
    role: psalm
    content:
      en:
      - type: citation
        text: '99:2a Sing joyfully to God, all the earth: * serve ye the Lord with gladness.'
      - type: citation
        text: 99:2b Come in before his presence * with exceeding great joy.
      - type: citation
        text: '99:3a Know ye that the Lord he is God: * he made us, and not we ourselves.'
      - type: citation
        text: '99:3b We are his people and the sheep of his pasture. ‡ (4a) Go ye into his gates with praise, * into his courts with hymns: and give glory to him.'
      - type: citation
        text: '99:4b Praise ye his name: (5) for the Lord is sweet, † his mercy endureth for ever, * and his truth to generation and generation.'
      la:
      - type: citation
        text: '99:2a Iubiláte Deo, omnis terra: * servíte Dómino in lætítia.'
      - type: citation
        text: 99:2b Introíte in conspéctu eius, * in exsultatióne.
      - type: citation
        text: '99:3a Scitóte quóniam Dóminus ipse est Deus: * ipse fecit nos, et non ipsi nos.'
      - type: citation
        text: '99:3b Pópulus eius, et oves páscuæ eius: ‡ (4a) introíte portas eius in confessióne, * átria eius in hymnis: confitémini illi.'
      - type: citation
        text: '99:4b Laudáte nomen eius: (5) quóniam suávis est Dóminus, † in ætérnum misericórdia eius, * et usque in generatiónem et generatiónem véritas eius.'
      en2:
      - type: citation
        text: '99:2a Shout joyfully to God, all the earth: * serve the Lord with rejoicing.'
      - type: citation
        text: 99:2b Enter into his sight, * in exultation.
      - type: citation
        text: '99:3a Know that the Lord himself is God: * he made us, and we ourselves did not.'
      - type: citation
        text: '99:3b We are his people and the sheep of his pasture: ‡ enter his gates with confession, * his courts with hymns, and acknowledge him.'
      - type: citation
        text: '99:4b Praise his name: for the Lord is sweet, † his mercy is in eternity, * and his truth is from generation to generation.'
  psalm.canticum-ann-3-reg-2-1-16-e3359a9686:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Anna
      - type: citation
        text: 1 Sam 2:1-16
      - type: citation
        text: '2:1 My heart hath rejoiced in the Lord, * and my horn is exalted in my God:'
      - type: citation
        text: '2:2 My mouth is enlarged over my enemies: * because I have joyed in thy salvation.'
      - type: citation
        text: '2:3 There is none holy as the Lord is: for there is no other beside thee, * and there is none strong like our God.'
      - type: citation
        text: '2:4 Do not multiply to speak lofty things, * boasting:'
      - type: citation
        text: '2:5 Let old matters depart from your mouth: for the Lord is a God of all knowledge, * and to him are thoughts prepared.'
      - type: citation
        text: 2:6 The bow of the mighty is overcome, * and the weak are girt with strength.
      - type: citation
        text: '2:7 They that were full before have hired out themselves for bread: * and the hungry are filled,'
      - type: citation
        text: '2:8 So that the barren hath borne many: * and she that had many children is weakened.'
      - type: citation
        text: 2:9 The Lord killeth and maketh alive, * he bringeth down to hell and bringeth back again.
      - type: citation
        text: 2:10 The Lord maketh poor and maketh rich, * he humbleth and he exalteth.
      - type: citation
        text: '2:11 He raiseth up the needy from the dust, * and lifteth up the poor from the dunghill:'
      - type: citation
        text: 2:12 That he may sit with princes, * and hold the throne of glory.
      - type: citation
        text: 2:13 For the poles of the earth are the Lord’s, * and upon them he hath set the world.
      - type: citation
        text: 2:14 He will keep the feet of his saints, and the wicked shall be silent in darkness, * because no man shall prevail by his own strength.
      - type: citation
        text: '2:15 The adversaries of the Lord shall fear him: * and upon them shall he thunder in the heavens.'
      - type: citation
        text: 2:16 The Lord shall judge the ends of the earth, and he shall give empire to his king, * and shall exalt the horn of his Christ.
      la:
      - type: heading
        text: Canticum Annæ
      - type: citation
        text: 3 Reg 2:1-16
      - type: citation
        text: 2:1 Exsultávit cor meum in Dómino, * et exaltátum est cornu meum in Deo meo.
      - type: citation
        text: '2:2 Dilatátum est os meum super inimícos meos: * quia lætáta sum in salutári tuo.'
      - type: citation
        text: '2:3 Non est sanctus, ut est Dóminus: neque enim est álius extra te, * et non est fortis sicut Deus noster.'
      - type: citation
        text: '2:4 Nolíte multiplicáre loqui sublímia, * gloriántes:'
      - type: citation
        text: '2:5 Recédant vétera de ore vestro: quia Deus scientiárum, Dóminus est, * et ipsi præparántur cogitatiónes.'
      - type: citation
        text: 2:6 Arcus fórtium superátus est, * et infírmi accíncti sunt róbore.
      - type: citation
        text: '2:7 Repléti prius, pro pánibus se locavérunt: * et famélici saturáti sunt.'
      - type: citation
        text: '2:8 Donec stérilis péperit plúrimos: * et quæ multos habébat fílios, infirmáta est.'
      - type: citation
        text: 2:9 Dóminus mortíficat et vivíficat, * dedúcit ad ínferos et redúcit.
      - type: citation
        text: 2:10 Dóminus páuperem facit et ditat, * humíliat et súblevat.
      - type: citation
        text: '2:11 Súscitat de púlvere egénum, * et de stércore élevat páuperem:'
      - type: citation
        text: 2:12 Ut sédeat cum princípibus, * et sólium glóriæ téneat.
      - type: citation
        text: 2:13 Dómini enim sunt cárdines terræ, * et pósuit super eos orbem.
      - type: citation
        text: '2:14 Pedes sanctórum suórum servábit, et ímpii in ténebris conticéscent: * quia non in fortitúdine sua roborábitur vir.'
      - type: citation
        text: '2:15 Dóminum formidábunt adversárii eius: * et super ipsos in cælis tonábit:'
      - type: citation
        text: 2:16 Dóminus iudicábit fines terræ, et dabit impérium regi suo, * et sublimábit cornu Christi sui.
      en2:
      - type: heading
        text: Canticle of Anna
      - type: citation
        text: 3 Reg 2:1-16
      - type: citation
        text: 2:1 My heart exults in the Lord, * and my horn is exalted in my God.
      - type: citation
        text: '2:2 My mouth is enlarged over my enemies: * for I have rejoiced in your salvation.'
      - type: citation
        text: '2:3 Nothing is holy as the Lord is holy: for there is no other beside you, * and nothing is strong as our God is strong.'
      - type: citation
        text: 2:4 Do not continue speaking of great things, * boasting.
      - type: citation
        text: '2:5 Let what is old depart from your mouth: for the Lord is the God of knowledge, and he is Lord, * and thoughts are prepared for him.'
      - type: citation
        text: 2:6 The bow of the powerful has been overwhelmed, * and the weak have been girded with strength.
      - type: citation
        text: '2:7 Those who before were filled, have hired themselves out for bread: * and the starving have been filled.'
      - type: citation
        text: '2:8 So that the barren have given birth to many: * but she who had borne many sons has become unable.'
      - type: citation
        text: '2:9 The Lord brings death, and he gives life: * he leads away to death, and he brings back again.'
      - type: citation
        text: '2:10 The Lord impoverishes, and he enriches: * he humbles, and he lifts up.'
      - type: citation
        text: '2:11 He raises up the indigent from the dust, * and he lifts up the poor from filth:'
      - type: citation
        text: 2:12 So that they may sit with princes, * and take hold of a throne of glory.
      - type: citation
        text: 2:13 For the hinges of the earth belong to the Lord, * and he has placed the globe upon them.
      - type: citation
        text: '2:14 He will preserve the feet of his holy ones, and the impious will be silenced in darkness: * for no man will prevail by his own strength.'
      - type: citation
        text: '2:15 The adversaries of the Lord will dread him: * and over them, he will thunder in the heavens.'
      - type: citation
        text: 2:16 The Lord will judge the parts of the earth, and he will give dominion to his king, * and he will lift up the horn of his Christ.
  psalm.canticum-b-mari-virginis-luc-1-46-55-ce5eba84a7:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of the Blessed Virgin
      - type: citation
        text: Luke 1:46-55
      - type: citation
        text: 1:46 My soul + * doth magnify the Lord.
      - type: citation
        text: 1:47 And my spirit hath rejoiced * in God my Saviour.
      - type: citation
        text: 1:48 Because he hath regarded the humility of his handmaid; * for behold from henceforth all generations shall call me blessed.
      - type: citation
        text: 1:49 Because he that is mighty, hath done great things to me; * and holy is his name.
      - type: citation
        text: 1:50 And his mercy is from generation unto generations, * to them that fear him.
      - type: citation
        text: '1:51 He hath shewed might in his arm: * he hath scattered the proud in the conceit of their heart.'
      - type: citation
        text: 1:52 He hath put down the mighty from their seat, * and hath exalted the humble.
      - type: citation
        text: 1:53 He hath filled the hungry with good things; * and the rich he hath sent empty away.
      - type: citation
        text: '1:54 He hath received Israel his servant, * being mindful of his mercy:'
      - type: citation
        text: 1:55 As he spoke to our fathers, * to Abraham and to his seed for ever.
      la:
      - type: heading
        text: Canticum B. Mariæ Virginis
      - type: citation
        text: Luc. 1:46-55
      - type: citation
        text: 1:46 Magníficat + * ánima mea Dóminum.
      - type: citation
        text: '1:47 Et exsultávit spíritus meus: * in Deo, salutári meo.'
      - type: citation
        text: '1:48 Quia respéxit humilitátem ancíllæ suæ: * ecce enim ex hoc beátam me dicent omnes generatiónes.'
      - type: citation
        text: '1:49 Quia fecit mihi magna qui potens est: * et sanctum nomen eius.'
      - type: citation
        text: '1:50 Et misericórdia eius, a progénie in progénies: * timéntibus eum.'
      - type: citation
        text: '1:51 Fecit poténtiam in brácchio suo: * dispérsit supérbos mente cordis sui.'
      - type: citation
        text: '1:52 Depósuit poténtes de sede: * et exaltávit húmiles.'
      - type: citation
        text: '1:53 Esuriéntes implévit bonis: * et dívites dimísit inánes.'
      - type: citation
        text: '1:54 Suscépit Israël púerum suum: * recordátus misericórdiæ suæ.'
      - type: citation
        text: '1:55 Sicut locútus est ad patres nostros: * Ábraham, et sémini eius in sǽcula.'
      en2:
      - type: heading
        text: Canticle of the Blessed Virgin Mary
      - type: citation
        text: Luc. 1:46-55
      - type: citation
        text: '1:46 My soul + * proclaims the greatness of the Lord.'
      - type: citation
        text: '1:47 And my spirit rejoices * in God my Saviour.'
      - type: citation
        text: '1:48 He has looked upon his handmaid in her lowliness; * for behold, from this day forward, all generations will call me blessed.'
      - type: citation
        text: '1:49 For the Almighty has done great things for me, * and holy is his name.'
      - type: citation
        text: '1:50 His mercy is from age to age * for those who fear him.'
      - type: citation
        text: '1:51 He has made known the strength of his arm, * and has scattered the proud in their conceit of heart.'
      - type: citation
        text: '1:52 He has cast down the mighty from their thrones * and has exalted those who are lowly.'
      - type: citation
        text: '1:53 He has filled the hungry with good things, * and has sent the rich away empty.'
      - type: citation
        text: '1:54 He has helped his servant Israel, * mindful of his mercy,'
      - type: citation
        text: '1:55 even as he promised to our fathers, * to Abraham and his descendants forever.'
  psalm.canticum-david-1-par-29-10-13-cee63960d7:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of David
      - type: citation
        text: 1 Chron. 29:10-13
      - type: citation
        text: 29:10 Blessed art thou, O Lord the God of Israel, our father * from eternity to eternity.
      - type: citation
        text: '29:11 Thine, O Lord, is magnificence, and power, * and glory, and victory:'
      - type: citation
        text: '29:11 And to thee is praise: * for all that is in heaven, and in earth, is thine:'
      - type: citation
        text: 29:11 Thine is the kingdom, O Lord, * and thou art above all princes.
      - type: citation
        text: 29:12 Thine are riches, and thine is glory, * thou hast dominion over all,
      - type: citation
        text: '29:12 In thy hand is power and might: * in thy hand greatness, and the empire of all things.'
      - type: citation
        text: 29:13 Now therefore our God we give thanks to thee, * and we praise thy glorious name.
      la:
      - type: heading
        text: Canticum David
      - type: citation
        text: 1 Par. 29:10-13
      - type: citation
        text: 29:10 Benedíctus es, Dómine, Deus Israël patris nostri, * ab ætérno in ætérnum.
      - type: citation
        text: '29:11 Tua est, Dómine, magnificéntia, et poténtia, * et glória, atque victória:'
      - type: citation
        text: '29:11 Et tibi laus: * cuncta enim quæ in cælo sunt, et in terra, tua sunt:'
      - type: citation
        text: 29:11 Tuum, Dómine, regnum, * et tu es super omnes príncipes.
      - type: citation
        text: '29:12 Tuæ divítiæ, et tua est glória: * tu domináris ómnium,'
      - type: citation
        text: '29:12 In manu tua virtus et poténtia: * in manu tua magnitúdo, et impérium ómnium.'
      - type: citation
        text: 29:13 Nunc ígitur, Deus noster, confitémur tibi, * et laudámus nomen tuum ínclitum.
      en2:
      - type: heading
        text: Canticle of David
      - type: citation
        text: 1 Par. 29:10-13
      - type: citation
        text: 29:10 Blessed are you, O Lord God of Israel, our Father, * from eternity to eternity.
      - type: citation
        text: '29:11 Yours, O Lord, is magnificence and power, * and glory, and victory:'
      - type: citation
        text: '29:11 And to you is praise: * for all the things that are in heaven and on earth are yours:'
      - type: citation
        text: 29:11 Yours is the kingdom, O Lord, * and you are above all rulers.
      - type: citation
        text: '29:12 Yours is wealth, and yours is glory: * you have dominion over all things,'
      - type: citation
        text: '29:12 In your hand is virtue and power: * in your hand is greatness and authority over all things.'
      - type: citation
        text: 29:13 Now therefore, we confess to you, our God, * and we praise your famous name.
  psalm.canticum-ecclesiastic-eccli-14-22-15-3-4-15-6-614f525dac:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Ecclesiasticae
      - type: citation
        text: Eccli 14:22;15:3-4;15:6
      - type: citation
        text: 4:22 Blessed is the man that shall continue in wisdom, and that shall meditate in his justice, * and in his mind shall think of the all-seeing eye of God.
      - type: citation
        text: 15:3 With the bread of life and understanding, * she shall feed him, and give him the water of wholesome wisdom to drink.
      - type: citation
        text: '15:4 And she shall be made strong in him, and he shall not be moved: And she shall hold him fast, and he shall not be confounded: * and she shall exalt him among his neighbours.'
      - type: citation
        text: 15:6 And shall cause him to inherit an everlasting name * the Lord our God.
      la:
      - type: heading
        text: Canticum Ecclesiasticæ
      - type: citation
        text: Eccli 14:22;15:3-4;15:6
      - type: citation
        text: 14:22 Beátus vir qui in sapiéntia morábitur, † et qui in iustítia sua meditábitur, * et in sensu cogitábit circumspectiónem Dei.
      - type: citation
        text: '15:3 Cibábit illum pane vitæ et intelléctus, * et aqua sapiéntiæ salutáris potábit illum:'
      - type: citation
        text: '15:4 Et firmábitur in illo, et non flectétur: † et continébit illum, et non confundétur: * et exaltábit illum apud próximos suos.'
      - type: citation
        text: 15:6 Et nómine ætérno hæreditábit illum * Dóminus Deus noster.
      en2:
      - type: heading
        text: Canticle of Sirach
      - type: citation
        text: Eccli 14:22;15:3-4;15:6
      - type: citation
        text: 14:22 Blessed is the man who will abide in wisdom, and who will meditate on her righteousness, * and who, in his mind, will consider the circumspection of God.
      - type: citation
        text: 15:3 She will feed him with the bread of life and understanding, * and she will give him to drink from the water of salvific wisdom.
      - type: citation
        text: '15:4 And she will hold to him, and he will not waver: † and she will embrace him, and he will not be confounded: * and she will exalt him among those closest to him.'
      - type: citation
        text: 15:6 And with an everlasting name * the Lord our God will cause him to inherit.
  psalm.canticum-ecclesiastic-eccli-31-8-11-b3eda217fd:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Ecclesiaticae
      - type: citation
        text: Eccli 31:8-11
      - type: citation
        text: '31:8 Blessed is the man that is found without blemish: and that hath not gone after gold, * nor put his trust in money nor in treasures.'
      - type: citation
        text: 31:9 Who is he, and we will praise him? * for he hath done wonderful things in his life.
      - type: citation
        text: 31:10 Who hath been tried thereby, and made perfect, * he shall have glory everlasting.
      - type: citation
        text: '31:10 He that could have transgressed, and hath not transgressed: * and could do evil things, and hath not done them.'
      - type: citation
        text: 31:11 Therefore are his goods established in the Lord, * and all the church of the saints shall declare his alms.
      la:
      - type: heading
        text: Canticum Ecclesiasticæ
      - type: citation
        text: Eccli 31:8-11
      - type: citation
        text: 31:8 Beátus vir, qui invéntus est sine mácula,† et qui post aurum non ábiit, * nec sperávit in pecúnia et thesáuris.
      - type: citation
        text: 31:9 Quis est hic, et laudábimus eum? * fecit enim mirabília in vita sua.
      - type: citation
        text: '31:10 Qui probátus est in illo, et perféctus est, * erit illi glória ætérna:'
      - type: citation
        text: 31:10 Qui pótuit tránsgredi, et non est transgréssus; * fácere mala, et non fecit.
      - type: citation
        text: 31:11 Ideo stabilíta sunt bona illíus in Dómino, * et eleemósynas illíus enarrábit omnis ecclésia sanctórum.
      en2:
      - type: heading
        text: Canticle of Sirach
      - type: citation
        text: Eccli 31:8-11
      - type: citation
        text: 31:8 Blessed is the rich man who is found to be without blemish, * and blessed is he who has not gone after gold, nor placed his hope in money or treasures.
      - type: citation
        text: '31:9 Who is he? For we should praise him: * for he has done wonderful things in his life.'
      - type: citation
        text: 31:10 He has been tested by it, and has become perfect, * and he will have eternal glory.
      - type: citation
        text: '31:10 He was able to transgress, but he has not transgressed: * he was able to do evil, but he has not done evil.'
      - type: citation
        text: 31:11 Therefore, his good things are established in the Lord, * and the entire Church of the saints will proclaim his almsgiving.
  psalm.canticum-ecclesiastic-eccli-39-17-21-41463ad122:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Ecclesiasticae
      - type: citation
        text: Eccli 39:17-21
      - type: citation
        text: '39:17 By a voice he saith: Hear me, ye divine offspring, and bud forth as the rose planted by the brooks of waters.'
      - type: citation
        text: 39:18 Give ye a sweet odour as frankincense.
      - type: citation
        text: 39:19 Send forth flowers, as the lily, and yield a smell, and bring forth leaves in grace, and praise with canticles, and bless the Lord in his works.
      - type: citation
        text: '39:20 Magnify his name, and give glory to him with the voice of your lips, and with the canticles of your mouths, and with harps, and in praising him, you shall say in this manner:'
      - type: citation
        text: 39:21 All the works of the Lord are exceeding good.
      la:
      - type: heading
        text: Canticum Ecclesiasticæ
      - type: citation
        text: Eccli 39:17-21
      - type: citation
        text: 39:17 Obaudíte me, divíni fructus, * et quasi rosa plantáta super rivos aquárum fructificáte.
      - type: citation
        text: 39:18 Quasi Líbanus * odórem suavitátis habéte.
      - type: citation
        text: 39:19 Floréte flores, quasi lílium, et date odórem, † et frondéte in grátiam; et collaudáte cánticum, * et benedícite Dóminum in opéribus suis.
      - type: citation
        text: 39:20 Date nómini eius magnificéntiam, † et confitémini illi in voce labiórum vestrórum, * et in cánticis labiórum, et cítharis;
      - type: citation
        text: '39:21 Et sic dicétis in confessióne: * Opera Dómini univérsa bona valde.'
      en2:
      - type: heading
        text: Canticle of Sirach
      - type: citation
        text: Eccli 39:17-21
      - type: citation
        text: 39:17 Listen to me, O divine fruits, * and you shall bear fruit, like roses planted beside streams of waters.
      - type: citation
        text: 39:18 You shall have a sweet fragrance, * like the cedars of Lebanon.
      - type: citation
        text: 39:19 Blossom with flowers, like the lily, and diffuse a fragrance, and sprout leaves in grace; and give praise with canticles, * and bless the Lord in his works.
      - type: citation
        text: '39:20 Give magnificence to his name, and confess to him with the voice of your lips and with the canticles of your mouth and with stringed instruments; * and in so praising him, you will confess:'
      - type: citation
        text: 39:21 All the works of the Lord are very good.
  psalm.canticum-ecclesiastici-sir-36-1-16-211966064d:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Ecclesiasticus
      - type: citation
        text: Sir 36:1-16
      - type: citation
        text: '36:1 Have mercy upon us, O God of all, and behold us, * and shew us the light of thy mercies:'
      - type: citation
        text: '36:2 And send thy fear upon the nations, * that have not sought after thee:'
      - type: citation
        text: 36:3 That they may know that there is no God beside thee, * and that they may shew forth thy wonders.
      - type: citation
        text: 36:4 Lift up thy hand over the strange nations, * that they may see thy power.
      - type: citation
        text: 36:5 For as thou hast been sanctified in us in their sight, * so thou shalt be magnified among them in our presence,
      - type: citation
        text: 36:6 That they may know thee, as we also have known thee, * that there is no God beside thee, O Lord.
      - type: citation
        text: 36:7 Renew thy signs, and work new miracles. * Glorify thy hand, and thy right arm.
      - type: citation
        text: 36:8 Raise up indignation, and pour out wrath. * Take away the adversary, and crush the enemy.
      - type: citation
        text: 36:9 Hasten the time, and remember the end, * that they may declare thy wonderful works.
      - type: citation
        text: '36:10 Let him that escapeth be consumed by the rage of the fire: * and let them perish that oppress thy people.'
      - type: citation
        text: '36:11 Crush the head of the princes of the enemies * that say: There is no other beside us.'
      - type: citation
        text: '36:12 Gather together all the tribes of Jacob: that they may know that there is no God besides thee, * and may declare thy great works.'
      - type: citation
        text: 36:13 And thou shalt inherit them * as from the beginning.
      - type: citation
        text: '36:14 Have mercy on thy people, upon whom thy name is invoked: * and upon Israel, whom thou hast raised up to be thy firstborn.'
      - type: citation
        text: 36:15 Have mercy on Jerusalem, the city which thou hast sanctified, * the city of thy rest.
      - type: citation
        text: 36:16 Fill Sion with thy unspeakable words, * and thy people with thy glory.
      la:
      - type: heading
        text: Canticum Ecclesiastici
      - type: citation
        text: Sir 36:1-16
      - type: citation
        text: '36:1 Miserére nostri, Deus ómnium, et réspice nos, * et osténde nobis lucem miseratiónum tuárum:'
      - type: citation
        text: 36:2 Et immítte timórem tuum super gentes, * quæ non exquisiérunt te,
      - type: citation
        text: 36:3 Ut cognóscant quia non est Deus nisi tu, * et enárrent magnália tua.
      - type: citation
        text: 36:4 Álleva manum tuam super gentes aliénas, * ut vídeant poténtiam tuam.
      - type: citation
        text: 36:5 Sicut enim in conspéctu eórum sanctificátus es in nobis, * sic in conspéctu nostro magnificáberis in eis,
      - type: citation
        text: 36:6 Ut cognóscant te, sicut et nos cognóvimus, * quóniam non est Deus præter te, Dómine.
      - type: citation
        text: 36:7 Ínnova signa, et immúta mirabília. * Glorífica manum, et brácchium dextrum.
      - type: citation
        text: 36:8 Éxcita furórem, et effúnde iram. * Tolle adversárium, et afflíge inimícum.
      - type: citation
        text: 36:9 Festína tempus, et meménto finis, * ut enárrent mirabília tua.
      - type: citation
        text: '36:10 In ira flammæ devorétur qui salvátur: * et qui péssimant plebem tuam, invéniant perditiónem.'
      - type: citation
        text: '36:11 Cóntere caput príncipum inimicórum, * dicéntium: Non est álius præter nos.'
      - type: citation
        text: '36:12 Cóngrega omnes tribus Iacob: ut cognóscant quia non est Deus nisi tu, * et enárrent magnália tua:'
      - type: citation
        text: 36:13 Et hereditábis eos, * sicut ab inítio.
      - type: citation
        text: '36:14 Miserére plebi tuæ, super quam invocátum est nomen tuum: * et Israël, quem coæquásti primogénito tuo.'
      - type: citation
        text: 36:15 Miserére civitáti sanctificatiónis tuæ Ierúsalem, * civitáti requiéi tuæ.
      - type: citation
        text: 36:16 Reple Sion inenarrabílibus verbis tuis, * et glória tua pópulum tuum.
      en2:
      - type: heading
        text: Canticle of Sirach
      - type: citation
        text: Sir 36:1-16
      - type: citation
        text: 36:1 Have mercy on us, O God of all, and look with favor on us, * and show us the light of your compassion.
      - type: citation
        text: 36:2 And send your fear upon the nations, * who have not sought you,
      - type: citation
        text: 36:3 that they may acknowledge that there is no God except you, * and may declare your great deeds.
      - type: citation
        text: 36:4 Lift up your hand over foreign nations, * that they may see your power.
      - type: citation
        text: 36:5 For just as, in their sight, you have been sanctified in us, * so also, in our sight, you will be magnified in them,
      - type: citation
        text: 36:6 that they may know you, as we also have known you, * for there is no God apart from you, O Lord.
      - type: citation
        text: 36:7 Renew your signs, and work new wonders. * Glorify your hand and your right arm.
      - type: citation
        text: 36:8 Stir up your fury, and pour out your wrath. * Take away our adversary, and afflict our enemy.
      - type: citation
        text: 36:9 Hasten the time, and remember the end, * that they may declare your wonders.
      - type: citation
        text: 36:10 Let those who escape be devoured by the wrath of fire; * and let those who harass your people find perdition.
      - type: citation
        text: '36:11 Crush the head of the leaders of the enemies, * who say: There is no other beside us.'
      - type: citation
        text: 36:12 Gather together all the tribes of Jacob, that they may acknowledge that there is no God except you, * and may declare your great deeds;
      - type: citation
        text: 36:13 and you will make them your inheritance, * as from the beginning.
      - type: citation
        text: 36:14 Take pity on your people, over whom your name has been invoked, * and on Israel, whom you have treated as your firstborn.
      - type: citation
        text: 36:15 Take pity on Jerusalem, the city of your sanctification, * the city of your rest.
      - type: citation
        text: 36:16 Fill Zion with your ineffable words, * and fill your people with your glory.
  psalm.canticum-eccli-36-14-19-0c9edc3fe1:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Ecclesiasticae
      - type: citation
        text: Eccli 36:14-19
      - type: citation
        text: '36:14 Have mercy on thy people, upon whom thy name is invoked: and upon Israel, whom thou hast raised up to be thy firstborn.'
      - type: citation
        text: 36:15 Have mercy on Jerusalem, the city which thou hast sanctified, the city of thy rest.
      - type: citation
        text: 36:16 Fill Sion with thy unspeakable words, and thy people with thy glory.
      - type: citation
        text: 36:17 Give testimony to them that are thy creatures from the beginning, and raise up the prophecies which the former prophets spoke in thy name.
      - type: citation
        text: '36:18 Reward them that patiently wait for thee, that thy prophets may be found faithful: and hear the prayers of thy servants,'
      - type: citation
        text: 36:19 According to the blessing of Aaron over thy people, and direct us into the way of justice, and let all know that dwell upon the earth, that thou art God the beholder of all ages.
      la:
      - type: heading
        text: Canticum
      - type: citation
        text: Eccli 36:14-19
      - type: citation
        text: '36:14 Miserére plebi tuæ, super quam invocátum est nomen tuum: * et Israël quem coæquásti primogénito tuo.'
      - type: citation
        text: 36:15 Miserére civitáti sanctificatiónis tuæ, Ierúsalem, * civitáti requiéi tuæ.
      - type: citation
        text: 36:16 Reple Sion inenarrabílibus verbis tuis, * et glória tua pópulum tuum.
      - type: citation
        text: 36:17 Da testimónium his qui ab inítio creatúræ tuæ sunt, * et súscita prædicatiónes quas locúti sunt in nómine tuo prophétæ prióres.
      - type: citation
        text: '36:18 Da mercédem sustinéntibus te, * ut prophétæ tui fidéles inveniántur:'
      - type: citation
        text: '36:18 Et exáudi oratiónes servórum tuórum, secúndum benedictiónem Aaron de pópulo tuo: * et dírige nos in viam iustítiæ.'
      - type: citation
        text: 36:19 Et sciant omnes qui hábitant terram, * quia tu es Deus conspéctor sæculórum.
      en2:
      - type: heading
        text: Canticle
      - type: citation
        text: Eccli 36:14-19
      - type: citation
        text: 36:14 Take pity on your people, over whom your name has been invoked, * and on Israel, whom you have treated as your firstborn.
      - type: citation
        text: 36:15 Take pity on Jerusalem, the city of your sanctification, * the city of your rest.
      - type: citation
        text: 36:16 Fill Zion with your ineffable words, * and fill your people with your glory.
      - type: citation
        text: 36:17 Give testimony to those who have been your creatures from the beginning, * and lift up the prophecies which the former prophets spoke in your name.
      - type: citation
        text: '36:18 Give a reward to those who endure for you, * that your prophets may be found to be faithful:'
      - type: citation
        text: 36:18 And heed the prayers of your servants, according to the blessing of Aaron over your people, * and direct us in the way of justice.
      - type: citation
        text: 36:19 And let all who inhabit the earth know * that you are God, the Beholder of all ages.
  psalm.canticum-eiusdem-isa-33-13-18-9f8bce4500:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 33:13-18
      - type: citation
        text: 33:13 Hear, you that are far off, what I have done, and you that are near know my strength.
      - type: citation
        text: 33:14 The sinners in Sion are afraid, trembling hath seized upon the hypocrites. Which of you can dwell with devouring fire? which of you shall dwell with everlasting burnings?
      - type: citation
        text: 33:15 He that walketh in justices, and speaketh truth, that casteth away avarice by oppression, and shaketh his hands from all bribes, that stoppeth his ears lest he hear blood, and shutteth his eyes that he may see no evil.
      - type: citation
        text: '33:16 He shall dwell on high, the fortifications of rocks shall be his highness: bread is given him, his waters are sure.'
      - type: citation
        text: 33:17 His eyes shall see the king in his beauty, they shall see the land far off.
      - type: citation
        text: '33:18 Thy heart shall meditate fear: where is the learned? where is he that pondereth the words of the law? where is the teacher of little ones?'
      la:
      - type: heading
        text: Canticum eiusdem
      - type: citation
        text: Isa 33:13-18
      - type: citation
        text: 33:13 Audíte, qui longe estis, quæ fécerim; * et cognóscite, vicíni, fortitúdinem meam.
      - type: citation
        text: 33:14 Contérriti sunt in Sion peccatóres; * possédit tremor hypócritas.
      - type: citation
        text: 33:14 Quis póterit habitáre de vobis cum igne devoránte? * quis habitábit ex vobis cum ardóribus sempitérnis?
      - type: citation
        text: 33:15 Qui ámbulat in iustítiis et lóquitur veritátem, † qui próicit avarítiam ex calúmnia, * et éxcutit manus suas ab omni múnere,
      - type: citation
        text: 33:16 Qui obtúrat aures suas ne áudiat sánguinem, * et claudit óculos suos ne vídeat malum.
      - type: citation
        text: '33:17 Iste in excélsis habitábit; † muniménta saxórum sublímitas eius: * panis ei datus est, aquæ eius fidéles sunt.'
      - type: citation
        text: 33:18 Regem in decóre suo vidébunt óculi eius, † cernent terram de longe. * Cor tuum meditábitur timórem.
      en2:
      - type: heading
        text: Canticle of the Same
      - type: citation
        text: Isa 33:13-18
      - type: citation
        text: 33:13 You who are far away, listen to what I have done; * and you who are near, acknowledge my strength.
      - type: citation
        text: 33:14 The sinners in Zion are terrified; * trembling has taken hold of the hypocrites.
      - type: citation
        text: 33:14 Who among you is able to live with a devouring fire? * Who among you will live with an everlasting flame?
      - type: citation
        text: 33:15 The one who walks in justice and speaks the truth, who casts out avarice from oppression, * and shakes all bribes from his hands,
      - type: citation
        text: 33:16 who blocks his ears so that he may not hear of bloodshed, * and closes his eyes so that he may not see evil.
      - type: citation
        text: 33:17 Such a one will live on high; the fortification of rocks will be his lofty place; * bread has been given to him, his waters are reliable.
      - type: citation
        text: 33:18 His eyes will see the king in his elegance; they will discern the land from far away. * Your heart will meditate on fear.
  psalm.canticum-eiusdem-isa-42-10-16-6273b9dc18:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 42:10-16
      - type: citation
        text: 42:10 Sing ye to the Lord a new song, * his praise is from the ends of the earth.
      - type: citation
        text: '42:10 You that go down to the sea, and all that are therein: * ye islands, and ye inhabitants of them.'
      - type: citation
        text: '42:11 Let the desert and the cities thereof be exalted: * Cedar shall dwell in houses:'
      - type: citation
        text: 42:11 Ye inhabitants of Petra, give praise, * they shall cry from the top of the mountains.
      - type: citation
        text: 42:12 They shall give glory to the Lord, * and shall declare his praise in the islands.
      - type: citation
        text: 42:13 The Lord shall go forth as a mighty man, * as a man of war shall he stir up zeal.
      - type: citation
        text: '42:13 He shall shout and cry: * he shall prevail against his enemies.'
      - type: citation
        text: 42:14 I have always held my peace, I have I kept silence, I have been patient, * I will speak now as a woman in labour.
      - type: citation
        text: 42:14 I will destroy, and swallow up at once. * I will lay waste the mountains and hills, and will make all their grass to wither.
      - type: citation
        text: 42:15 And I will turn rivers into islands * , and will dry up the standing pools.
      - type: citation
        text: '42:16 And I will lead the blind into the way which they know not: * and in the paths which they were ignorant of I will make them walk.'
      - type: citation
        text: 42:16 I will make darkness light before them, * and crooked things straight.
      la:
      - type: heading
        text: Canticum eiusdem
      - type: citation
        text: Isa 42:10-16
      - type: citation
        text: 42:10 Cantáte Dómino cánticum novum, * laus eius ab extrémis terræ,
      - type: citation
        text: '42:10 Qui descénditis in mare, et plenitúdo eius: * ínsulæ, et habitatóres eárum.'
      - type: citation
        text: 42:11 Sublevétur desértum et civitátes eius * in dómibus habitábit Cedar.
      - type: citation
        text: '42:11 Laudáte, habitatóres Petræ: * de vértice móntium clamábunt.'
      - type: citation
        text: 42:12 Ponent Dómino glóriam, * et laudem eius in ínsulis nuntiábunt.
      - type: citation
        text: '42:13 Dóminus sicut fortis egrediétur, * sicut vir prœliátor suscitábit zelum:'
      - type: citation
        text: '42:13 Vociferábitur, et clamábit: * super inimícos suos confortábitur.'
      - type: citation
        text: '42:14 Tácui semper, sílui, pátiens fui: * sicut partúriens loquar.'
      - type: citation
        text: 42:14 Dissipábo, et absorbébo simul. * desértos fáciam montes et colles, et omne gramen eórum exsiccábo.
      - type: citation
        text: 42:15 Et ponam flúmina in ínsulas, * et stagna arefáciam.
      - type: citation
        text: 42:16 Et ducam cæcos in viam quam nésciunt, * et in sémitis quas ignoravérunt ambuláre eos fáciam.
      - type: citation
        text: 42:16 Ponam ténebras coram eis in lucem, * et prava in recta.
      en2:
      - type: heading
        text: Canticle of the Same
      - type: citation
        text: Isa 42:10-16
      - type: citation
        text: 42:10 Sing to the Lord a new canticle, * his praise from the ends of the earth,
      - type: citation
        text: 42:10 you who descend into the sea and all its fullness, * the islands and their inhabitants.
      - type: citation
        text: 42:11 Let the desert and its cities be lifted up; * Kedar will dwell in houses.
      - type: citation
        text: 42:11 O inhabitants of the Rock, give praise; * they will cry out from the top of the mountains.
      - type: citation
        text: 42:12 They will give glory to the Lord, * and they will announce his praise to the islands.
      - type: citation
        text: '42:13 The Lord will go forth like a strong man; * like a man of battle, he will stir up zeal:'
      - type: citation
        text: 42:13 he will shout and cry out; * he will prevail against his enemies.
      - type: citation
        text: 42:14 I have always been quiet; I have been silent; I have been patient; * I will speak like a woman giving birth.
      - type: citation
        text: 42:14 I will destroy and consume, all at once; * I will desolate mountains and hills, and wither all their grass.
      - type: citation
        text: 42:15 And I will turn rivers into islands, * and I will dry up the pools of water.
      - type: citation
        text: 42:16 And I will lead the blind along a way which they do not know, * and I will cause them to walk along paths with which they were unfamiliar.
      - type: citation
        text: 42:16 I will turn darkness into light before them, * and crooked into straight.
  psalm.canticum-eiusdem-isa-49-7-13-3a590b0f0b:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 49:7-13
      - type: citation
        text: 49:7 Thus saith the Lord the redeemer of Israel, his Holy One, to the soul that is despised, * to the nation that is abhorred, to the servant of rulers.
      - type: citation
        text: 49:7 Kings shall see, end princes shall rise up, and adore for the Lord’s sake, because he is faithful, * and for the Holy One of Israel, who hath chosen thee.
      - type: citation
        text: '49:8 Thus saith the Lord: In an acceptable time I have heard thee, * and in the day of salvation I have helped thee.'
      - type: citation
        text: '49:8 And I have preserved thee, and given thee to be a covenant of the people, * that thou mightest raise up the earth, and possess the inheritances that were destroyed:'
      - type: citation
        text: '49:9 That thou mightest say to them that are bound: Come forth: * and to them that are in darkness: Shew yourselves.'
      - type: citation
        text: 49:9 They shall feed in the ways, * and their pastures shall be in every plain.
      - type: citation
        text: '49:10 They shall not hunger, nor thirst, neither shall the heat nor the sun strike them: * for he that is merciful to them, shall be their shepherd, and at the fountains of waters he shall give them drink.'
      - type: citation
        text: 49:11 And I will make all my mountains a way, * and my paths shall be exalted.
      - type: citation
        text: 49:12 Behold these shall come from afar, and behold these from the north and from the sea, * and these from the south country.
      - type: citation
        text: '49:13 Give praise, O ye heavens, and rejoice, O earth, ye mountains, give praise with jubilation: * because the Lord hath comforted his people, and will have mercy on his poor ones.'
      la:
      - type: heading
        text: Canticum eiusdem
      - type: citation
        text: Isa 49:7-13
      - type: citation
        text: 49:7 Hæc dicit Dóminus redémptor Israël, sanctus eius, ad contemptíbilem ánimam, * ad abominátam gentem, ad servum dominórum.
      - type: citation
        text: 49:7 Reges vidébunt, et consúrgent príncipes, et adorábunt propter Dóminum, quia fidélis est, * et sanctum Israël qui elégit te.
      - type: citation
        text: '49:8 Hæc dicit Dóminus: In témpore plácito exaudívi te, * et in die salútis auxiliátus sum tui.'
      - type: citation
        text: '49:8 Et servávi te, et dedi te in fœdus pópuli, * ut suscitáres terram, et possidéres hereditátes dissipátas:'
      - type: citation
        text: '49:9 Ut díceres his qui vincti sunt: exíte, * et his qui in ténebris: revelámini.'
      - type: citation
        text: 49:9 Super vias pascéntur, * et in ómnibus planis páscua eórum.
      - type: citation
        text: 49:10 Non esúrient neque sítient, et non percútiet eos æstus et sol, * quia miserátor eórum reget eos, et ad fontes aquárum potábit eos.
      - type: citation
        text: 49:11 Et ponam omnes montes meos in viam, * et sémitæ meæ exaltabúntur.
      - type: citation
        text: 49:12 Ecce isti de longe vénient, et ecce illi ab aquilóne et mari, * et isti de terra austráli.
      - type: citation
        text: '49:13 Laudáte cæli, et exsúlta terra, iubiláte montes laudem: * quia consolátus est Dóminus pópulum suum, et páuperum suórum miserébitur.'
      en2:
      - type: heading
        text: Canticle of the Same
      - type: citation
        text: Isa 49:7-13
      - type: citation
        text: 49:7 Thus says the Lord, the Redeemer of Israel, his Holy One, to a contemptible soul, * to an abominable nation, to the servant of lords.
      - type: citation
        text: 49:7 Kings will see, and princes will rise up, and they will adore, because of the Lord, for he is faithful, * and the Holy One of Israel who has chosen you.
      - type: citation
        text: '49:8 Thus says the Lord: In a pleasing time, I have heeded you, * and in the day of salvation, I have assisted you.'
      - type: citation
        text: '49:8 And I have preserved you, and I have presented you as a covenant of the people, * that you would lift up the earth, and possess the scattered inheritances:'
      - type: citation
        text: '49:9 that you would say to those who are bound: Go forth! * and to those who are in darkness: Be released!'
      - type: citation
        text: 49:9 They will pasture along the roads, * and their pastures will be in every open place.
      - type: citation
        text: 49:10 They will not hunger or thirst, and the heat and the sun will not strike them, * for the one who takes pity on them will rule them, and he will give them to drink from fountains of waters.
      - type: citation
        text: 49:11 And I will make all my mountains into a road, * and my paths will be exalted.
      - type: citation
        text: 49:12 Behold, some will come from far away, and behold, others from the north and from the sea, * and still others from the land of the south.
      - type: citation
        text: 49:13 Give praise, O heavens, and exult, O earth, let the mountains give praise with jubilation; * for the Lord has consoled his people, and he will take pity on his poor ones.
  psalm.canticum-ezechi-isa-38-10-24-1d5840d74a:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Ezechias
      - type: citation
        text: Isa 38:10-23
      - type: citation
        text: '38:10 I said: In the midst of my days * I shall go to the gates of hell:'
      - type: citation
        text: '38:11 I sought for the residue of my years. * I said: I shall not see the Lord God in the land of the living.'
      - type: citation
        text: 38:12 I shall behold man no more, * nor the inhabitant of rest.
      - type: citation
        text: 38:13 My generation is at an end, and it is rolled away from me, * as a shepherd’s tent.
      - type: citation
        text: '38:14 My life is cut off, as by a weaver: whilst I was yet but beginning, he cut me off: * from morning even to night thou wilt make an end of me.'
      - type: citation
        text: '38:15 I hoped till morning, * as a lion so hath he broken all my bones:'
      - type: citation
        text: '38:16 From morning even to night thou wilt make an end of me. * I will cry like a young swallow, I will meditate like a dove:'
      - type: citation
        text: '38:17 My eyes are weakened * looking upward:'
      - type: citation
        text: 38:18 Lord, I suffer violence, answer thou for me. * What shall I say, or what shall he answer for me, whereas he himself hath done it?
      - type: citation
        text: 38:19 I will recount to thee all my years * in the bitterness of my soul.
      - type: citation
        text: '38:20 O Lord, if man’s life be such, and the life of my spirit be in such things as these, thou shalt correct me, and make me to live. * Behold in peace is my bitterness most bitter:'
      - type: citation
        text: 38:21 But thou hast delivered my soul that it should not perish, * thou hast cast all my sins behind thy back.
      - type: citation
        text: '38:22 For hell shall not confess to thee, neither shall death praise thee: * nor shall they that go down into the pit, look for thy truth.'
      - type: citation
        text: '38:23 The living, the living, he shall give praise to thee, as I do this day: * the father shall make thy truth known to the children.'
      - type: citation
        text: 38:24 O Lord, save me, and we will sing our psalms all the days of our life * in the house of the Lord.
      la:
      - type: heading
        text: Canticum Ezechiæ
      - type: citation
        text: Isa 38:10-24
      - type: citation
        text: '38:10 Ego dixi: In dimídio diérum meórum * vadam ad portas ínferi.'
      - type: citation
        text: '38:11 Quæsívi resíduum annórum meórum. * Dixi: Non vidébo Dóminum Deum in terra vivéntium.'
      - type: citation
        text: 38:12 Non aspíciam hóminem ultra, * et habitatórem quiétis.
      - type: citation
        text: 38:13 Generátio mea abláta est, et convolúta est a me, * quasi tabernáculum pastórum.
      - type: citation
        text: '38:14 Præcísa est velut a texénte, vita mea: dum adhuc ordírer, succídit me: * de mane usque ad vésperam fínies me.'
      - type: citation
        text: '38:15 Sperábam usque ad mane, * quasi leo sic contrívit ómnia ossa mea:'
      - type: citation
        text: '38:16 De mane usque ad vésperam fínies me: * sicut pullus hirúndinis sic clamábo, meditábor ut colúmba:'
      - type: citation
        text: 38:17 Attenuáti sunt óculi mei, * suspiciéntes in excélsum.
      - type: citation
        text: 38:18 Dómine, vim pátior, respónde pro me. * Quid dicam, aut quid respondébit mihi, cum ipse fécerit?
      - type: citation
        text: 38:19 Recogitábo tibi omnes annos meos * in amaritúdine ánimæ meæ.
      - type: citation
        text: '38:20 Dómine, si sic vívitur, et in tálibus vita spíritus mei, corrípies me, et vivificábis me. * Ecce, in pace amaritúdo mea amaríssima:'
      - type: citation
        text: '38:21 Tu autem eruísti ánimam meam ut non períret: * proiecísti post tergum tuum ómnia peccáta mea.'
      - type: citation
        text: '38:22 Quia non inférnus confitébitur tibi, neque mors laudábit te: * non exspectábunt qui descéndunt in lacum, veritátem tuam.'
      - type: citation
        text: '38:23 Vivens vivens ipse confitébitur tibi, sicut et ego hódie: * pater fíliis notam fáciet veritátem tuam.'
      - type: citation
        text: 38:24 Dómine, salvum me fac * et psalmos nostros cantábimus cunctis diébus vitæ nostræ in domo Dómini.
      en2:
      - type: heading
        text: Canticle of Hezekiah
      - type: citation
        text: Isa 38:10-24
      - type: citation
        text: '38:10 I said: In the middle of my days * I will go to the gates of Hell.'
      - type: citation
        text: '38:11 I sought the remainder of my years. * I said: I will not see the Lord God in the land of the living.'
      - type: citation
        text: 38:12 I will no longer behold man, * nor the habitation of rest.
      - type: citation
        text: 38:13 My longevity has been taken away, and it has been folded up and taken from me, * like the tent of a shepherd.
      - type: citation
        text: 38:14 My life has been cut off, as if by a weaver; while I was still beginning, he cut me off; * from morning until evening, you have marked out my limits.
      - type: citation
        text: 38:15 I hoped, even until morning; * like a lion, so has he crushed all my bones.
      - type: citation
        text: 38:16 From morning until evening, you have marked my limits; * I will cry out like a young swallow; I will meditate like a dove.
      - type: citation
        text: 38:17 My eyes have been weakened * by gazing upward.
      - type: citation
        text: 38:18 O Lord, I suffer violence! Answer in my favor. * What can I say, or what would he answer me, since he himself has done this?
      - type: citation
        text: 38:19 I will acknowledge to you all my years * in the bitterness of my soul.
      - type: citation
        text: '38:20 O Lord, if such is life, and if the life of my spirit is of such a kind, may you correct me and may you cause me to live. * Behold, in peace my bitterness is most bitter:'
      - type: citation
        text: 38:21 but you have rescued my soul, so that it would not perish; * you have cast all my sins behind your back.
      - type: citation
        text: 38:22 For Hell will not confess to you, and death will not praise you; * those who descend into the pit will not hope for your truth.
      - type: citation
        text: 38:23 The living, the living, these will give praise to you, as I also do this day; * the father will make the truth known to the sons.
      - type: citation
        text: 38:24 O Lord, save me, * and we will sing our psalms all the days of our life in the house of the Lord.
  psalm.canticum-ezechielis-ez-36-24-28-008bffe4ae:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Ezechiel
      - type: citation
        text: Ez 36:24-28
      - type: citation
        text: 36:24 For I will take you from among the Gentiles, and will gather you together out of all the countries, * and will bring you into your own land.
      - type: citation
        text: 36:25 And I will pour upon you clean water, and you shall be cleansed from all your filthiness, * and I will cleanse you from all your idols.
      - type: citation
        text: '36:26 And I will give you a new heart, * and put a new spirit within you:'
      - type: citation
        text: 36:26 And I will take away the stony heart out of your flesh, * and will give you a heart of flesh.
      - type: citation
        text: '36:27 And I will put my spirit in the midst of you: * and I will cause you to walk in my commandments, and to keep my judgments, and do them.'
      - type: citation
        text: 36:28 And you shall dwell in the land which I gave to your fathers, * and you shall be my people, and I will be your God.
      la:
      - type: heading
        text: Canticum Ezechielis
      - type: citation
        text: Ez 36:24-28
      - type: citation
        text: 36:24 Tollam quippe vos de géntibus, et congregábo vos de univérsis terris, * et addúcam vos in terram vestram.
      - type: citation
        text: 36:25 Et effúndam super vos aquam mundam, et mundabímini ab ómnibus inquinaméntis vestris, * et ab univérsis idólis vestris mundábo vos.
      - type: citation
        text: '36:26 Et dabo vobis cor novum, * et spíritum novum ponam in médio vestri:'
      - type: citation
        text: 36:26 Et áuferam cor lapídeum de carne vestra, * et dabo vobis cor cárneum.
      - type: citation
        text: '36:27 Et spíritum meum ponam in médio vestri: * et fáciam ut in præcéptis meis ambulétis, et iudícia mea custodiátis et operémini.'
      - type: citation
        text: '36:28 Et habitábitis in terra quam dedi pátribus vestris: * et éritis mihi in pópulum, et ego ero vobis in Deum.'
      en2:
      - type: heading
        text: Canticle of Ezekiel
      - type: citation
        text: Ez 36:24-28
      - type: citation
        text: 36:24 Certainly, I will take you away from the Gentiles, and I will gather you together from all the lands, * and I will lead you into your own land.
      - type: citation
        text: 36:25 And I will pour clean water over you, and you shall be cleansed from all your filth, * and I will cleanse you from all your idols.
      - type: citation
        text: '36:26 And I will give you a new heart, * and I will place a new spirit in your midst:'
      - type: citation
        text: 36:26 And I will take away the heart of stone from your flesh, * and I will give you a heart of flesh.
      - type: citation
        text: 36:27 And I will place my Spirit in your midst; * and I will act so that you may walk in my precepts, and keep my judgments and observe them.
      - type: citation
        text: 36:28 And you shall live in the land that I gave to your fathers; * and you shall be my people, and I will be your God.
  psalm.canticum-habacuc-hab-3-1-6-d99f1d4e23:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Habacuc
      - type: citation
        text: Hab 3:1-6
      - type: citation
        text: 3:1 O Lord, I have heard thy hearing, * and was afraid.
      - type: citation
        text: '3:2 O Lord, thy work, * in the midst of the years bring it to life:'
      - type: citation
        text: '3:2 In the midst of the years thou shalt make it known: * when thou art angry, thou wilt remember mercy.'
      - type: citation
        text: '3:3 God will come from the south, * and the holy one from mount Pharan:'
      - type: citation
        text: 3:3 His glory covered the heavens, * and the earth is full of his praise.
      - type: citation
        text: '3:4 His brightness shall be as the light; * horns are in his hands:'
      - type: citation
        text: '3:4 There is his strength hid: * Death shall go before his face.'
      - type: citation
        text: 3:5 And the devil shall go forth before his feet. * He stood and measured the earth.
      - type: citation
        text: '3:6 He beheld, and melted the nations: * and the ancient mountains were crushed to pieces.'
      - type: citation
        text: 3:6 The hills of the world were bowed down * by the journeys of his eternity.
      la:
      - type: heading
        text: Canticum Habacuc
      - type: citation
        text: Hab 3:1-6
      - type: citation
        text: 3:1 Dómine audívi auditiónem tuam, * et tímui.
      - type: citation
        text: '3:2 Dómine opus tuum * in médio annórum vivífica illud:'
      - type: citation
        text: 3:2 In médio annórum notum fácies. * Cum irátus fúeris, misericórdiæ recordáberis.
      - type: citation
        text: '3:3 Deus ab Austro véniet, * et sanctus de monte Pharan:'
      - type: citation
        text: '3:3 Opéruit cælos glória eius: * et laudis eius plena est terra.'
      - type: citation
        text: '3:4 Splendor eius ut lux erit: * córnua in mánibus eius:'
      - type: citation
        text: 3:4 Ibi abscóndita est fortitúdo eius. * Ante fáciem eius ibit mors.
      - type: citation
        text: 3:5 Et egrediétur diábolus ante pedes eius. * Stetit, et mensus est terram.
      - type: citation
        text: '3:6 Aspéxit, et dissólvit Gentes: * et contríti sunt montes sǽculi:'
      - type: citation
        text: 3:6 Incurváti sunt colles mundi, * ab itinéribus æternitátis eius.
      en2:
      - type: heading
        text: Canticle of Habakkuk
      - type: citation
        text: Hab 3:1-6
      - type: citation
        text: 3:1 Lord, I heard what has been said about you, * and I was afraid.
      - type: citation
        text: '3:2 Lord, your work, * in the midst of years, revive it:'
      - type: citation
        text: 3:2 In the midst of years, make it known. * When you are angry, you will remember mercy.
      - type: citation
        text: '3:3 God will come from the south, * and the Holy One from mount Pharan:'
      - type: citation
        text: 3:3 His glory has covered the heavens; * and the earth is full of his praise.
      - type: citation
        text: '3:4 His brightness shall be like the light; * horns are in his hands:'
      - type: citation
        text: 3:4 There, his strength has been hidden. * Death will go forth before his face.
      - type: citation
        text: 3:5 And the devil shall depart before his feet. * He stood, and measured the earth.
      - type: citation
        text: 3:6 He looked, and dissolved the Gentiles; * and the mountains of ages past have been shattered.
      - type: citation
        text: 3:6 The hills of the world have bowed down, * from the paths of his eternity.
  psalm.canticum-habacuc-hab-3-2-33-a5525f35fe:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Habacuc
      - type: citation
        text: Hab 3:2-33
      - type: citation
        text: 3:2 O Lord, I have heard thy hearing, * and was afraid.
      - type: citation
        text: '3:3 O Lord, thy work, * in the midst of the years bring it to life:'
      - type: citation
        text: '3:4 In the midst of the years thou shalt make it known: * when thou art angry, thou wilt remember mercy.'
      - type: citation
        text: '3:5 God will come from the south, * and the holy one from mount Pharan:'
      - type: citation
        text: 3:6 His glory covered the heavens, * and the earth is full of his praise.
      - type: citation
        text: '3:7 His brightness shall be as the light: * horns are in his hands:'
      - type: citation
        text: '3:8 There is his strength hid: * Death shall go before his face.'
      - type: citation
        text: 3:9 And the devil shall go forth before his feet. * He stood and measured the earth.
      - type: citation
        text: '3:10 He beheld, and melted the nations: * and the ancient mountains were crushed to pieces.'
      - type: citation
        text: 3:11 The hills of the world were bowed down * by the journeys of his eternity.
      - type: citation
        text: 3:12 I saw the tents of Ethiopia for their iniquity, * the curtains of the land of Madian shall be troubled.
      - type: citation
        text: 3:13 Wast thou angry, O Lord, with the rivers? * or was thy wrath upon the rivers? or thy indignation in the sea?
      - type: citation
        text: '3:14 Who will ride upon thy horses: * and thy chariots are salvation.'
      - type: citation
        text: '3:15 Thou wilt surely take up thy bow: * according to the oaths which thou hast spoken to the tribes.'
      - type: citation
        text: '3:16 Thou wilt divide the rivers of the earth. The mountains saw thee, and were grieved: * the great body of waters passed away.'
      - type: citation
        text: '3:17 The deep put forth its voice: * the deep lifted up its hands.'
      - type: citation
        text: 3:18 The sun and the moon stood still in their habitation, * in the light of thy arrows, they shall go in the brightness of thy glittering spear.
      - type: citation
        text: '3:19 In thy anger thou wilt tread the earth under foot: * in thy wrath thou wilt astonish the nations.'
      - type: citation
        text: '3:20 Thou wentest forth for the salvation of thy people: * for salvation with thy Christ.'
      - type: citation
        text: '3:21 Thou struckest the head of the house of the wicked: * thou hast laid bare his foundation even to the neck.'
      - type: citation
        text: 3:22 Thou hast cursed his sceptres, the head of his warriors, * them that came out as a whirlwind to scatter me.
      - type: citation
        text: 3:23 Their joy * was like that of him that devoureth the poor man in secret.
      - type: citation
        text: 3:24 Thou madest a way in the sea for thy horses, * in the mud of many waters.
      - type: citation
        text: '3:25 I have heard and my bowels were troubled: * my lips trembled at the voice.'
      - type: citation
        text: 3:26 Let rottenness enter into my bones, * and swarm under me.
      - type: citation
        text: '3:27 That I may rest in the day of tribulation: * that I may go up to our people that are girded.'
      - type: citation
        text: '3:28 For the fig tree shall not blossom: * and there shall be no spring in the vines.'
      - type: citation
        text: '3:29 The labour of the olive tree shall fail: * and the fields shall yield no food:'
      - type: citation
        text: 3:30 The flock shall be cut off from the fold, * and there shall be no herd in the stalls.
      - type: citation
        text: '3:31 But I will rejoice in the Lord: * and I will joy in God my Jesus.'
      - type: citation
        text: '3:32 The Lord God is my strength: * and he will make my feet like the feet of harts:'
      - type: citation
        text: 3:33 And he the conqueror will lead me upon my high places * singing psalms.
      la:
      - type: heading
        text: Canticum Habacuc
      - type: citation
        text: Hab 3:2-33
      - type: citation
        text: 3:2 Dómine, audívi auditiónem tuam, * et tímui.
      - type: citation
        text: '3:3 Dómine, opus tuum, * in médio annórum vivífica illud:'
      - type: citation
        text: '3:4 In médio annórum notum fácies: * cum irátus fúeris, misericórdiæ recordáberis.'
      - type: citation
        text: '3:5 Deus ab Austro véniet, * et sanctus de monte Pharan:'
      - type: citation
        text: '3:6 Opéruit cælos glória eius: * et laudis eius plena est terra.'
      - type: citation
        text: '3:7 Splendor eius ut lux erit: * córnua in mánibus eius:'
      - type: citation
        text: '3:8 Ibi abscóndita est fortitúdo eius: * ante fáciem eius ibit mors.'
      - type: citation
        text: 3:9 Et egrediétur diábolus ante pedes eius. * Stetit, et mensus est terram.
      - type: citation
        text: '3:10 Aspéxit, et dissólvit gentes: * et contríti sunt montes sǽculi.'
      - type: citation
        text: 3:11 Incurváti sunt colles mundi, * ab itinéribus æternitátis eius.
      - type: citation
        text: 3:12 Pro iniquitáte vidi tentória Æthiópiæ, * turbabúntur pelles terræ Mádian.
      - type: citation
        text: 3:13 Numquid in flumínibus irátus es, Dómine? * aut in flumínibus furor tuus? vel in mari indignátio tua?
      - type: citation
        text: '3:14 Qui ascéndes super equos tuos: * et quadrígæ tuæ salvátio.'
      - type: citation
        text: '3:15 Súscitans suscitábis arcum tuum: * iuraménta tríbubus quæ locútus es.'
      - type: citation
        text: '3:16 Flúvios scindes terræ: vidérunt te, et doluérunt montes: * gurges aquárum tránsiit.'
      - type: citation
        text: '3:17 Dedit abýssus vocem suam: * altitúdo manus suas levávit.'
      - type: citation
        text: 3:18 Sol, et luna stetérunt in habitáculo suo, * in luce sagittárum tuárum, ibunt in splendóre fulgurántis hastæ tuæ.
      - type: citation
        text: '3:19 In frémitu conculcábis terram: * et in furóre obstupefácies gentes.'
      - type: citation
        text: '3:20 Egréssus es in salútem pópuli tui: * in salútem cum Christo tuo.'
      - type: citation
        text: '3:21 Percussísti caput de domo ímpii: * denudásti fundaméntum eius usque ad collum.'
      - type: citation
        text: 3:22 Maledixísti sceptris eius, cápiti bellatórum eius, * veniéntibus ut turbo ad dispergéndum me.
      - type: citation
        text: 3:23 Exsultátio eórum * sicut eius, qui dévorat páuperem in abscóndito.
      - type: citation
        text: 3:24 Viam fecísti in mari equis tuis, * in luto aquárum multárum.
      - type: citation
        text: '3:25 Audívi, et conturbátus est venter meus: * a voce contremuérunt lábia mea.'
      - type: citation
        text: 3:26 Ingrediátur putrédo in óssibus meis, * et subter me scáteat.
      - type: citation
        text: '3:27 Ut requiéscam in die tribulatiónis: * ut ascéndam ad pópulum accínctum nostrum.'
      - type: citation
        text: '3:28 Ficus enim non florébit: * et non erit germen in víneis.'
      - type: citation
        text: '3:29 Mentiétur opus olívæ: * et arva non áfferent cibum.'
      - type: citation
        text: '3:30 Abscindétur de ovíli pecus: * et non erit arméntum in præsépibus.'
      - type: citation
        text: '3:31 Ego autem in Dómino gaudébo: * et exsultábo in Deo Iesu meo.'
      - type: citation
        text: '3:32 Deus Dóminus fortitúdo mea: * et ponet pedes meos quasi cervórum.'
      - type: citation
        text: 3:33 Et super excélsa mea dedúcet me victor * in psalmis canéntem.
      en2:
      - type: heading
        text: Canticle of Habakkuk
      - type: citation
        text: Hab 3:2-33
      - type: citation
        text: 3:2 Lord, I heard what has been said about you, * and I was afraid.
      - type: citation
        text: '3:3 Lord, your work, * in the midst of years, revive it:'
      - type: citation
        text: 3:4 In the midst of years, make it known; * when you are angry, you will remember mercy.
      - type: citation
        text: '3:5 God will come from the south, * and the Holy One from mount Pharan:'
      - type: citation
        text: 3:6 His glory has covered the heavens; * and the earth is full of his praise.
      - type: citation
        text: '3:7 His brightness shall be like the light; * horns are in his hands:'
      - type: citation
        text: 3:8 There, his strength has been hidden; * death will go forth before his face.
      - type: citation
        text: 3:9 And the devil shall depart before his feet. * He stood, and measured the earth.
      - type: citation
        text: 3:10 He looked, and dissolved the nations; * and the mountains of ages past have been shattered.
      - type: citation
        text: 3:11 The hills of the world have bowed down, * from the paths of his eternity.
      - type: citation
        text: 3:12 I saw the tents of Ethiopia for their iniquity; * the tent-skins of the land of Midian will be thrown into confusion.
      - type: citation
        text: 3:13 Could you have been angry with the rivers, Lord? * Or was your fury within the rivers, or your indignation in the sea?
      - type: citation
        text: 3:14 You who mount upon your horses, * and your chariots are salvation.
      - type: citation
        text: 3:15 Being stirred up, you will take up your bow; * the oaths you have spoken to the tribes.
      - type: citation
        text: '3:16 You will split apart the rivers of the earth: they saw you, and the mountains grieved; * the great body of waters crossed over.'
      - type: citation
        text: 3:17 The abyss uttered its voice; * the height lifted up its hands.
      - type: citation
        text: 3:18 The sun and the moon have stood firm in their dwelling place, * in the light of your arrows, they shall go forth in the splendor of your flashing spear.
      - type: citation
        text: 3:19 With a roar, you will trample the earth; * and in your fury, you will cause the nations to be stupefied.
      - type: citation
        text: 3:20 You have gone forth for the salvation of your people; * for salvation with your Christ.
      - type: citation
        text: 3:21 You struck the head of the house of the impious; * you laid bare its foundation even to the neck.
      - type: citation
        text: 3:22 You have cursed his scepters, the head of his warriors, * those who approached like a whirlwind so as to scatter me.
      - type: citation
        text: 3:23 Their exultation * is like that of one who devours the poor in secret.
      - type: citation
        text: 3:24 You made a way in the sea for your horses, * in the mud of great waters.
      - type: citation
        text: 3:25 I heard, and my stomach became troubled; * at the voice, my lips trembled.
      - type: citation
        text: 3:26 Let decay enter into my bones, * and let it seethe beneath me.
      - type: citation
        text: 3:27 That I may rest in the day of tribulation; * that I may ascend to our girded people.
      - type: citation
        text: 3:28 For the fig tree will not flower, * and there will be no bud on the vines.
      - type: citation
        text: 3:29 The labor of the olive tree will be misleading; * and the fields will bring forth no food.
      - type: citation
        text: 3:30 The flock will be cut off from the fold; * and there will be no herd in the stalls.
      - type: citation
        text: 3:31 But I will rejoice in the Lord; * and I will exult in God my Jesus.
      - type: citation
        text: 3:32 The Lord God is my strength; * and he will set my feet like those of the stag.
      - type: citation
        text: 3:33 And he, the victor, will lead me beyond my high places, * singing in psalms.
  psalm.canticum-ibid-10-17-21-c2958641fe:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Sapientiae
      - type: citation
        text: Sap 10:17-21
      - type: citation
        text: '10:17 And God rendered to the just the wages of their labours, * and conducted them in a wonderful way:'
      - type: citation
        text: '10:17 And he was to them for a covert by day, * and for the light of stars by night:'
      - type: citation
        text: 10:18 And he brought them through the Red Sea, * and carried them over through a great water.
      - type: citation
        text: 10:19 But their enemies he drowned in the sea, * and from the depth of hell he brought them out.
      - type: citation
        text: 10:20 Therefore the just took the spoils of the wicked, * and they sung to your holy name, O Lord,
      - type: citation
        text: 10:21 And they praised with one accord your victorious hand, for wisdom opened the mouth of the dumb, * and made the tongues of infants eloquent.
      la:
      - type: heading
        text: Canticum
      - type: citation
        text: Ibid. 10:17-21
      - type: citation
        text: '10:17 Réddidit Deus iustis mercédem labórum suórum, * et dedúxit illos in via mirábili:'
      - type: citation
        text: 10:17 Et fuit illis in velaménto diéi, * et in luce stellárum per noctem;
      - type: citation
        text: 10:18 Tránstulit illos per mare Rubrum, * et transvéxit illos per aquam nímiam.
      - type: citation
        text: 10:19 Inimícos autem illórum demérsit in mare, * et ab altitúdine inferórum edúxit illos.
      - type: citation
        text: 10:20 Ideo iusti tulérunt spólia impiórum, * et decantavérunt, Dómine, nomen sanctum tuum,
      - type: citation
        text: '10:21 Et victrícem manum tuam laudavérunt páriter: † quóniam sapiéntia apéruit os mutórum, * et línguas infántium fecit disértas.'
      en2:
      - type: heading
        text: Canticle
      - type: citation
        text: Ibid. 10:17-21
      - type: citation
        text: '10:17 And she rendered to the just the wages of their labors, * and led them along a wondrous way:'
      - type: citation
        text: 10:17 And she was to them like a cover by day, * and in the light of the stars by night;
      - type: citation
        text: 10:18 She carried them through the Red Sea, * and led them across a great water.
      - type: citation
        text: 10:19 But their enemies she submerged in the sea, * and from the furthest depths she drew them up.
      - type: citation
        text: 10:20 And they chanted to your holy name, Lord, * and together praised your victorious hand,
      - type: citation
        text: 10:21 Because wisdom opened the mouth of the mute, * and made the speech of infants eloquent.
  psalm.canticum-ibid-v-13-19-4dec0ea96f:
    role: psalm
    content:
      en:
