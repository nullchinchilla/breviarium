      - type: citation
        text: 7:3 Nequándo rápiat ut leo ánimam meam, * dum non est qui rédimat, neque qui salvum fáciat.
      - type: citation
        text: '7:4 Dómine, Deus meus, si feci istud, * si est iníquitas in mánibus meis:'
      - type: citation
        text: 7:5 Si réddidi retribuéntibus mihi mala, * décidam mérito ab inimícis meis inánis.
      - type: citation
        text: 7:6 Persequátur inimícus ánimam meam, † et comprehéndat, et concúlcet in terra vitam meam, * et glóriam meam in púlverem dedúcat.
      - type: citation
        text: '7:7a Exsúrge, Dómine, in ira tua: * et exaltáre in fínibus inimicórum meórum.'
      - type: citation
        text: '7:7b Et exsúrge, Dómine, Deus meus, in præcépto quod mandásti: * (8a) et synagóga populórum circúmdabit te.'
      - type: citation
        text: '7:8b Et propter hanc in altum regrédere: * (9a) Dóminus iúdicat pópulos.'
      - type: citation
        text: 7:9b Iúdica me, Dómine, secúndum iustítiam meam, * et secúndum innocéntiam meam super me.
      - type: citation
        text: 7:10 Consumétur nequítia peccatórum, et díriges iustum, * scrutans corda et renes, Deus.
      - type: citation
        text: 7:11 Iustum adiutórium meum a Dómino, * qui salvos facit rectos corde.
      - type: citation
        text: '7:12 Deus iudex iustus, fortis, et pátiens: * numquid iráscitur per síngulos dies?'
      - type: citation
        text: '7:13 Nisi convérsi fuéritis, gládium suum vibrábit: * arcum suum teténdit, et parávit illum.'
      - type: citation
        text: '7:14 Et in eo parávit vasa mortis: * sagíttas suas ardéntibus effécit.'
      - type: citation
        text: '7:15 Ecce, partúriit iniustítiam: * concépit dolórem, et péperit iniquitátem.'
      - type: citation
        text: '7:16 Lacum apéruit, et effódit eum: * et íncidit in fóveam quam fecit.'
      - type: citation
        text: '7:17 Convertétur dolor eius in caput eius: * et in vérticem ipsíus iníquitas eius descéndet.'
      - type: citation
        text: '7:18 Confitébor Dómino secúndum iustítiam eius: * et psallam nómini Dómini altíssimi.'
      en2:
