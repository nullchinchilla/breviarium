      - type: citation
        text: 3:14 Thou hast cursed his sceptres, † the head of his warriors, * them that came out as a whirlwind to scatter me.
      - type: citation
        text: 3:14 Their joy * was like that of him that devoureth the poor man in secret.
      - type: citation
        text: 3:15 Thou madest a way in the sea for thy horses, * in the mud of many waters.
      - type: citation
        text: '3:16 I have heard and my bowels were troubled: * my lips trembled at the voice.'
      - type: citation
        text: 3:16 Let rottenness enter into my bones, * and swarm under me.
      - type: citation
        text: '3:16 That I may rest in the day of tribulation: * that I may go up to our people that are girded.'
      - type: citation
        text: '3:17 For the fig tree shall not blossom: * and there shall be no spring in the vines.'
      - type: citation
        text: '3:17 The labour of the olive tree shall fail: * and the fields shall yield no food:'
      - type: citation
        text: 3:17 The flock shall be cut off from the fold, * and there shall be no herd in the stalls.
      - type: citation
        text: '3:18 But I will rejoice in the Lord: * and I will joy in God my Jesus.'
      - type: citation
        text: '3:19 The Lord God is my strength: * and he will make my feet like the feet of harts:'
      - type: citation
        text: 3:19 And he the conqueror will lead me upon my high places * singing psalms.
      la:
      - type: heading
        text: Canticum
      - type: citation
        text: Ibid. v. 13-19
      - type: citation
        text: '3:13 Egréssus es in salútem pópuli tui: * in salútem cum Christo tuo:'
      - type: citation
        text: '3:13 Percussísti caput de domo ímpii: * denudásti fundaméntum eius usque ad collum.'
      - type: citation
        text: 3:14 Maledixísti sceptris eius, † cápiti bellatórum eius, * veniéntibus ut turbo ad dispergéndum me.
      - type: citation
        text: 3:14 Exsultátio eórum, * sicut eius qui dévorat páuperem in abscóndito.
      - type: citation
        text: 3:15 Viam fecísti in mari equis tuis, * in luto aquárum multárum.
      - type: citation
        text: '3:16 Audívi, et conturbátus est venter meus: * a voce contremuérunt lábia mea.'
      - type: citation
        text: 3:16 Ingrediátur putrédo in óssibus meis, * et subter me scáteat.
      - type: citation
        text: '3:16 Ut requiéscam in die tribulatiónis: * ut ascéndam ad pópulum accínctum nostrum.'
      - type: citation
        text: '3:17 Ficus enim non florébit: * et non erit germen in víneis.'
      - type: citation
        text: '3:17 Mentiétur opus olívæ: * et arva non áfferent cibum.'
      - type: citation
        text: '3:17 Abscindétur de ovíli pecus: * et non erit arméntum in præsépibus.'
      - type: citation
        text: '3:18 Ego autem in Dómino gaudébo: * et exsultábo in Deo Iesu meo.'
      - type: citation
        text: '3:19 Deus Dóminus fortitúdo mea: * et ponet pedes meos quasi cervórum.'
      - type: citation
        text: 3:19 Et super excélsa mea dedúcet me victor * in psalmis canéntem.
      en2:
      - type: heading
        text: Canticle
      - type: citation
        text: Ibid. v. 13-19
      - type: citation
        text: '3:13 You have gone forth for the salvation of your people; * for salvation with your Christ:'
      - type: citation
        text: 3:13 You struck the head of the house of the impious; * you laid bare its foundation even to the neck.
      - type: citation
        text: 3:14 You have cursed his scepters, the head of his warriors, * those who approached like a whirlwind so as to scatter me.
      - type: citation
        text: 3:14 Their exultation, * like that of one who devours the poor in secret.
      - type: citation
        text: 3:15 You made a way in the sea for your horses, * in the mud of great waters.
      - type: citation
        text: 3:16 I heard, and my stomach became troubled; * at the voice, my lips trembled.
      - type: citation
        text: 3:16 Let decay enter into my bones, * and let it seethe beneath me.
      - type: citation
        text: 3:16 That I may rest in the day of tribulation; * that I may ascend to our girded people.
      - type: citation
        text: 3:17 For the fig tree will not flower; * and there will be no bud on the vines.
      - type: citation
        text: 3:17 The labor of the olive tree will be misleading; * and the fields will bring forth no food.
      - type: citation
        text: 3:17 The flock will be cut off from the fold; * and there will be no herd in the stalls.
      - type: citation
        text: 3:18 But I will rejoice in the Lord; * and I will exult in God my Jesus.
      - type: citation
        text: 3:19 The Lord God is my strength; * and he will set my feet like those of the stag.
      - type: citation
        text: 3:19 And he, the victor, will lead me beyond my high places, * singing in psalms.
  psalm.canticum-ibid-v-7-12-d7ca26ff7b:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Habacuc
      - type: citation
        text: Hab 3:7-12
      - type: citation
        text: 3:7 I saw the tents of Ethiopia for their iniquity, * the curtains of the land of Madian shall be troubled.
      - type: citation
        text: 3:8 Wast thou angry, O Lord, with the rivers? † or was thy wrath upon the rivers? * or thy indignation in the sea?
      - type: citation
        text: '3:8 Who will ride upon thy horses: * and thy chariots are salvation.'
      - type: citation
        text: '3:9 Thou wilt surely take up thy bow: * according to the oaths which thou hast spoken to the tribes.'
      - type: citation
        text: '3:9 Thou wilt divide the rivers of the earth. † The mountains saw thee, and were grieved: * the great body of waters passed away.'
      - type: citation
        text: '3:10 The deep put forth its voice: * the deep lifted up its hands.'
      - type: citation
        text: 3:11 The sun and the moon stood still in their habitation, † in the light of thy arrows, * they shall go in the brightness of thy glittering spear.
      - type: citation
        text: '3:12 In thy anger thou wilt tread the earth under foot: * in thy wrath thou wilt astonish the nations.'
      la:
      - type: heading
        text: Canticum
      - type: citation
        text: Ibid. v. 7-12
      - type: citation
        text: 3:7 Pro iniquitáte vidi tentória Æthiópiæ, * turbabúntur pelles terræ Mádian.
      - type: citation
        text: 3:8 Numquid in flumínibus irátus es Dómine? † aut in flumínibus furor tuus? * vel in mari indignátio tua?
      - type: citation
        text: '3:8 Qui ascéndes super equos tuos: * et quadrígæ tuæ salvátio.'
      - type: citation
        text: '3:9 Súscitans suscitábis arcum tuum: * iuraménta tríbubus quæ locútus es:'
      - type: citation
        text: '3:9 Flúvios scindes terræ: † Vidérunt te, et doluérunt montes: * gurges aquárum tránsiit.'
      - type: citation
        text: '3:10 Dedit abýssus vocem suam: * altitúdo manus suas levávit.'
      - type: citation
        text: 3:11 Sol et luna stetérunt in habitáculo suo, † in luce sagittárum tuárum, * ibunt in splendóre fulgurántis hastæ tuæ.
      - type: citation
        text: '3:12 In frémitu conculcábis terram: * in furóre obstupefácies Gentes.'
      en2:
      - type: heading
        text: Canticle
      - type: citation
        text: Ibid. v. 7-12
      - type: citation
        text: 3:7 I saw the tents of Ethiopia for their iniquity; * the tent-skins of the land of Midian will be thrown into confusion.
      - type: citation
        text: 3:8 Could you have been angry with the rivers, Lord? Or was your fury within the rivers? * Or your indignation in the sea?
      - type: citation
        text: 3:8 You who mount upon your horses; * and your chariots are salvation.
      - type: citation
        text: '3:9 Being stirred up, you will take up your bow; * the oaths you have spoken to the tribes:'
      - type: citation
        text: '3:9 You will split apart the rivers of the earth: they saw you, and the mountains grieved; * the great body of waters crossed over.'
      - type: citation
        text: 3:10 The abyss uttered its voice; * the height lifted up its hands.
      - type: citation
        text: 3:11 The sun and the moon have stood firm in their dwelling place, in the light of your arrows; * they shall go forth in the splendor of your flashing spear.
      - type: citation
        text: 3:12 With a roar, you will trample the earth; * in your fury, you will cause the nations to be stupefied.
  psalm.canticum-ieremi-ier-14-17-21-158e9ed5dc:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Jeremias
      - type: citation
        text: Jer 14:17-21
      - type: citation
        text: 14:17 Let my eyes shed down tears night and day, * and let them not cease,
      - type: citation
        text: 14:17 Because the virgin daughter of my people is afflicted with a great affliction, * with an exceeding grievous evil.
      - type: citation
        text: '14:18 If I go forth into the fields, behold the slain with the sword: * and if I enter into the city, behold them that are consumed with famine.'
      - type: citation
        text: 14:18 The prophet also and the priest are gone into a land * which they knew not.
      - type: citation
        text: 14:19 Hast thou utterly cast away Juda, * or hath thy soul abhorred Sion?
      - type: citation
        text: 14:19 Why then hast thou struck us, * so that there is no healing for us?
      - type: citation
        text: '14:19 We have looked for peace, and there is no good: * and for the time of healing, and behold trouble.'
      - type: citation
        text: 14:20 We acknowledge, O Lord, our wickedness, * the iniquities of our fathers, because we have sinned against thee.
      - type: citation
        text: '14:21 Give us not to be a reproach, for thy name''s sake, * and do not disgrace in us the throne of thy glory:'
      - type: citation
        text: 14:21 Remember, * break not thy covenant with us.
      la:
      - type: heading
        text: Canticum Ieremiæ
      - type: citation
        text: Ier 14:17-21
      - type: citation
        text: 14:17 Dedúcant óculi mei lácrymam per noctem et diem, * et non táceant,
      - type: citation
        text: 14:17 Quóniam contritióne magna contríta est virgo fília pópuli mei, * plaga péssima veheménter.
      - type: citation
        text: '14:18 Si egréssus fúero ad agros, ecce occísi gládio: * et si introíero in civitátem, ecce attenuáti fame.'
      - type: citation
        text: 14:18 Prophéta quoque et sacérdos abiérunt in terram * quam ignorábant.
      - type: citation
        text: 14:19 Numquid proíciens abiecísti Iudam? * aut Sion abomináta est ánima tua?
      - type: citation
        text: 14:19 Quare ergo percussísti nos, * ita ut nulla sit sánitas?
      - type: citation
        text: '14:19 Exspectávimus pacem, et non est bonum: * et tempus curatiónis, et ecce turbátio.'
      - type: citation
        text: 14:20 Cognóvimus Dómine impietátes nostras, * iniquitátes patrum nostrórum, quia peccávimus tibi.
      - type: citation
        text: '14:21 Ne des nos in oppróbrium, propter nomen tuum, * neque fácias nobis contuméliam sólii glóriæ tuæ:'
      - type: citation
        text: 14:21 Recordáre, * ne írritum fácias fœdus tuum nobíscum.
      en2:
      - type: heading
        text: Canticle of Jeremiah
      - type: citation
        text: Ier 14:17-21
      - type: citation
        text: 14:17 Let my eyes shed tears throughout the night and day, * and let them not cease,
      - type: citation
        text: 14:17 For the virgin daughter of my people has been crushed by a great affliction, * by a very grievous wound.
      - type: citation
        text: '14:18 If I go out into the fields: behold, those slain by the sword; * and if I enter into the city: behold, those weakened by famine.'
      - type: citation
        text: 14:18 The prophet also and the priest have gone into a land * that they did not know.
      - type: citation
        text: 14:19 Have you utterly cast away Judah? * Or has your soul abhorred Zion?
      - type: citation
        text: 14:19 Why then have you struck us, * so that there is no healing for us?
      - type: citation
        text: 14:19 We waited for peace, but there is no good; * and for a time of healing, but behold, distress.
      - type: citation
        text: 14:20 We acknowledge, O Lord, our impieties, * the iniquities of our fathers, for we have sinned against you.
      - type: citation
        text: '14:21 Do not give us over to disgrace, for the sake of your name, * nor bring dishonor upon the throne of your glory:'
      - type: citation
        text: 14:21 Remember, * do not make void your covenant with us.
  psalm.canticum-ieremi-ier-17-7-8-188f1f7ef2:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Jeremiae
      - type: citation
        text: Jer 17:7-8
      - type: citation
        text: 17:7 Blessed be the man that trusteth in the Lord, * and the Lord shall be his confidence.
      - type: citation
        text: '17:8 And he shall be as a tree that is planted by the waters, that spreadeth out its roots towards moisture: * and it shall not fear when the heat cometh.'
      - type: citation
        text: 17:8 And the leaf thereof shall be green, and in the time of drought it shall not be solicitous, * neither shall it cease at any time to bring forth fruit.
      la:
      - type: heading
        text: Canticum Ieremiæ
      - type: citation
        text: Ier 17:7-8
      - type: citation
        text: 17:7 Benedíctus vir qui confídit in Dómino, * et erit Dóminus fidúcia eius.
      - type: citation
        text: 17:8 Et erit quasi lignum quod transplantátur super aquas, † quod ad humórem mittit radíces suas, * et non timébit cum vénerit æstus.
      - type: citation
        text: 17:8 Et erit fólium eius víride, † et in témpore siccitátis non erit sollícitum, * nec aliquándo désinet fácere fructum.
      en2:
      - type: heading
        text: Canticle of Jeremiah
      - type: citation
        text: Ier 17:7-8
      - type: citation
        text: 17:7 Blessed is the man who trusts in the Lord, * for the Lord will be his confidence.
      - type: citation
        text: 17:8 And he will be like a tree transplanted beside waters, † which sends out its roots to the moisture, * and it will not fear when the heat comes.
      - type: citation
        text: 17:8 And its leaf will be green, † and in the time of drought it will have no anxiety, * nor will it ever cease to bear fruit.
  psalm.canticum-ieremi-ier-31-10-18-5250e438d5:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Jeremias
      - type: citation
        text: Jer 31:10-18
      - type: citation
        text: 31:10 Hear the word of the Lord, O ye nations, * and declare it in the islands that are afar off,
      - type: citation
        text: '31:11 And say: He that scattered Israel will gather him: * and he will keep him as the shepherd doth his flock.'
      - type: citation
        text: 31:12 For the Lord hath redeemed Jacob, * and delivered him out of the hand of one that was mightier than he.
      - type: citation
        text: '31:13 And they shall come, and shall give praise in mount Sion: * and they shall flow together to the good things of the Lord,'
      - type: citation
        text: 31:14 For the corn, and wine, and oil, * and the increase of cattle and herds,
      - type: citation
        text: 31:15 And their soul shall be as a watered garden, * and they shall be hungry no more.
      - type: citation
        text: '31:16 Then shall the virgin rejoice in the dance, * the young men and old men together:'
      - type: citation
        text: 31:17 And I will turn their mourning into joy, * and will comfort them, and make them joyful after their sorrow.
      - type: citation
        text: '31:18 And I will fill the soul of the priests with fatness: * and my people shall be filled with my good things.'
      la:
      - type: heading
        text: Canticum Ieremiæ
      - type: citation
        text: Ier 31:10-18
      - type: citation
        text: 31:10 Audíte verbum Dómini, gentes, * et annuntiáte in ínsulis, quæ procul sunt,
      - type: citation
        text: '31:11 Et dícite: Qui dispérsit Israël, congregábit eum: * et custódiet eum sicut pastor gregem suum.'
      - type: citation
        text: 31:12 Redémit enim Dóminus Iacob, * et liberávit eum de manu potentióris.
      - type: citation
        text: '31:13 Et vénient, et laudábunt in monte Sion: * et cónfluent ad bona Dómini,'
      - type: citation
        text: '31:14 Super fruménto, et vino, et óleo, * et fœtu pécorum et armentórum:'
      - type: citation
        text: 31:15 Erítque ánima eórum quasi hortus irríguus, * et ultra non esúrient.
      - type: citation
        text: '31:16 Tunc lætábitur virgo in choro, * iúvenes et senes simul:'
      - type: citation
        text: 31:17 Et convértam luctum eórum in gáudium, * et consolábor eos, et lætificábo a dolóre suo.
      - type: citation
        text: '31:18 Et inebriábo ánimam sacerdótum pinguédine: * et pópulus meus bonis meis adimplébitur.'
      en2:
      - type: heading
        text: Canticle of Jeremiah
      - type: citation
        text: Ier 31:10-18
      - type: citation
        text: 31:10 Listen to the word of the Lord, O nations, * and announce it amid the islands that are far away,
      - type: citation
        text: '31:11 And say: Whoever has scattered Israel will gather him, * and he will guard him as a shepherd guards his flock.'
      - type: citation
        text: 31:12 For the Lord has redeemed Jacob, * and has freed him from the hand of one more powerful.
      - type: citation
        text: 31:13 And they will come and give praise on Mount Zion, * and they will flow together to the good things of the Lord,
      - type: citation
        text: '31:14 Over grain, and wine, and oil, * and the offspring of flocks and herds:'
      - type: citation
        text: 31:15 And their soul will be like an irrigated garden, * and they will hunger no more.
      - type: citation
        text: '31:16 Then the virgin will rejoice in the dance, * the young men and old together:'
      - type: citation
        text: 31:17 And I will turn their mourning into gladness, * and I will console them and gladden them after their sorrow.
      - type: citation
        text: 31:18 And I will inebriate the soul of the priests with fatness, * and my people will be filled with my good things.
  psalm.canticum-ieremi-ier-7-2-7-e8e0473dae:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Jeremiae
      - type: citation
        text: Jer 7:2-7
      - type: citation
        text: '7:2 Stand in the gate of the house of the Lord, and proclaim there this word, and say: Hear ye the word of the Lord, all ye men of Juda, that enter in at these gates, to adore the Lord.'
      - type: citation
        text: '7:3 Thus saith the Lord of hosts the God of Israel:'
      - type: citation
        text: '4:3 Make your ways and your doings good: and I will dwell with you in this place.'
      - type: citation
        text: '7:4 Trust not in lying words, saying: The temple of the Lord, the temple of the Lord, it is the temple of the Lord.'
      - type: citation
        text: '7:5 For if you will order well your ways, and your doings: if you will execute judgement between a man and his neighbor,'
      - type: citation
        text: 7:6 If you oppress not the stranger, the fatherless, and the widow,
      - type: citation
        text: 7:6 and shed not innocent blood in this place, and walk not after strange gods to your own hurt,
      - type: citation
        text: '7:7 I will dwell with you in this place: in the land, which I gave to your fathers from the beginning and for evermore.'
      la:
      - type: heading
        text: Canticum Ieremiæ
      - type: citation
        text: Ier 7:2-7
      - type: citation
        text: 7:2 Audíte verbum Dómini, omnis Iuda, * qui ingredímini per portas has ut adorétis Dóminum.
      - type: citation
        text: '7:3 Hæc dicit Dóminus exercítuum, * Deus Israël:'
      - type: citation
        text: 7:3 Bonas fácite vias vestras, et stúdia vestra, * et habitábo vobíscum in loco isto.
      - type: citation
        text: '7:4 Nolíte confídere in verbis mendácii, dicéntes: * Templum Dómini, templum Dómini, templum Dómini est.'
      - type: citation
        text: '7:5 Quóniam si bene direxéritis vias vestras, * et stúdia vestra:'
      - type: citation
        text: 7:6 Si fecéritis iudícium inter virum et próximum eius, * ádvenæ, et pupíllo, et víduæ non fecéritis calúmniam,
      - type: citation
        text: '7:6 Nec sánguinem innocéntem effudéritis in loco hoc, * et post deos aliénos non ambulavéritis in malum vobismetípsis:'
      - type: citation
        text: 7:7 Habitábo vobíscum in loco isto, * in terra quam dedi pátribus vestris a sǽculo et usque in sǽculum.
      en2:
      - type: heading
        text: Canticle of Jeremiah
      - type: citation
        text: Ier 7:2-7
      - type: citation
        text: 7:2 Listen to the word of the Lord, all you of Judah, * who enter through these gates to adore the Lord.
      - type: citation
        text: '7:3 Thus says the Lord of hosts, * the God of Israel:'
      - type: citation
        text: 7:3 Make your ways and your intentions good, * and I will live with you in this place.
      - type: citation
        text: '7:4 Do not trust in lying words, saying: * ''The temple of the Lord, the temple of the Lord, the temple of the Lord.'''
      - type: citation
        text: '7:5 For if you truly amend your ways * and your intentions:'
      - type: citation
        text: 7:6 If you execute judgment between a man and his neighbor, * if you do not wrong the stranger, the orphan, and the widow,
      - type: citation
        text: '7:6 And if you do not pour out innocent blood in this place, * and do not walk after strange gods, to your own harm:'
      - type: citation
        text: 7:7 I will live with you in this place, * in the land that I gave to your fathers from of old and forever.
  psalm.canticum-isai-isa-12-1-7-0dc50b43de:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Isaias
      - type: citation
        text: Isa 12:1-7
      - type: citation
        text: '12:1 I will give thanks to thee, O Lord, for thou wast angry with me: * thy wrath is turned away, and thou hast comforted me.'
      - type: citation
        text: '12:2 Behold, God is my saviour, * I will deal confidently, and will not fear:'
      - type: citation
        text: 12:3 Because the Lord is my strength, and my praise, * and he is become my salvation.
      - type: citation
        text: '12:4 You shall draw waters with joy out of the saviour’s fountains: * And you shall say in that day: Praise ye the Lord, and call upon his name:'
      - type: citation
        text: '12:5 Make his works known among the people: * remember that his name is high.'
      - type: citation
        text: '12:6 Sing ye to the Lord, for he hath done great things: * shew this forth in all the earth.'
      - type: citation
        text: '12:7 Rejoice, and praise, O thou habitation of Sion: * for great is he that is in the midst of thee the Holy One of Israel.'
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 12:1-7
      - type: citation
        text: '12:1 Confitébor tibi, Dómine, quóniam irátus es mihi: * convérsus est furor tuus, et consolátus es me.'
      - type: citation
        text: '12:2 Ecce Deus salvátor meus, * fiduciáliter agam, et non timébo:'
      - type: citation
        text: 12:3 Quia fortitúdo mea, et laus mea Dóminus, * et factus est mihi in salútem.
      - type: citation
        text: '12:4 Hauriétis aquas in gáudio de fóntibus Salvatóris: * et dicétis in die illa: Confitémini Dómino, et invocáte nomen eius:'
      - type: citation
        text: '12:5 Notas fácite in pópulis adinventiónes eius: * mementóte quóniam excélsum est nomen eius.'
      - type: citation
        text: '12:6 Cantáte Dómino quóniam magnífice fecit: * annuntiáte hoc in univérsa terra.'
      - type: citation
        text: '12:7 Exsúlta, et lauda, habitátio Sion: * quia magnus in médio tui Sanctus Israël.'
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 12:1-7
      - type: citation
        text: 12:1 I will confess to you, O Lord, because you have been angry with me; * your fury has been turned away, and you have consoled me.
      - type: citation
        text: '12:2 Behold, God is my savior; * I will act faithfully and will not be afraid:'
      - type: citation
        text: 12:3 For the Lord is my strength and my praise, * and he has become my salvation.
      - type: citation
        text: '12:4 You will draw water with gladness from the fountains of the Savior: * and you will say on that day: Give thanks to the Lord and invoke his name:'
      - type: citation
        text: 12:5 Make known his deeds among the peoples; * remember that his name is exalted.
      - type: citation
        text: 12:6 Sing to the Lord, for he has acted magnificently; * announce this throughout all the earth.
      - type: citation
        text: 12:7 Exult and give praise, O habitation of Zion, * for great in your midst is the Holy One of Israel.
  psalm.canticum-isai-isa-2-2-3-8fa84619b2:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 2:2-3
      - type: citation
        text: 2:2 And in the last days the mountain of the house of the Lord shall be prepared on the top of mountains,
      - type: citation
        text: 2:2 and it shall be exalted above the hills, and all nations shall flow unto it.
      - type: citation
        text: '2:3 And many people shall go, and say: Come and let us go up to the mountain of the Lord, and to the house of the God of Jacob,'
      - type: citation
        text: '2:3 and he will teach us his ways, and we will walk in his paths:'
      - type: citation
        text: 2:3 for the law shall come forth from Sion, and the word of the Lord from Jerusalem.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 2:2-3
      - type: citation
        text: '2:2 Et erit in novíssimis diébus: præparátus mons domus Dómini * in vértice móntium,'
      - type: citation
        text: 2:2 Et elevábitur super colles, * et fluent ad eum omnes gentes.
      - type: citation
        text: '2:3 et ibunt pópuli multi, et dicent: * Veníte, et ascendámus ad montem Dómini, et ad domum Dei Iacob,'
      - type: citation
        text: '2:3 Et docébit nos vias suas, * et ambulábimus in sémitis eius:'
      - type: citation
        text: 2:3 Quia de Sion exíbit lex, * et verbum Dómini de Ierúsalem.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 2:2-3
      - type: citation
        text: '2:2 And it shall come to pass in the last days: the mountain of the house of the Lord * shall be prepared on the summit of the mountains,'
      - type: citation
        text: 2:2 And it shall be exalted above the hills, * and all nations shall flow to it.
      - type: citation
        text: '2:3 And many peoples shall go, and they shall say: * ''Come, let us ascend to the mountain of the Lord, and to the house of the God of Jacob,'''
      - type: citation
        text: '2:3 And he will teach us his ways, * and we will walk in his paths:'
      - type: citation
        text: 2:3 For the law shall go forth from Zion, * and the Word of the Lord from Jerusalem.
  psalm.canticum-isai-isa-26-1-12-fb9ad502c7:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 26:1-12
      - type: citation
        text: 26:1 Sion the city of our strength a saviour, * a wall and a bulwark shall be set therein.
      - type: citation
        text: 26:2 Open ye the gates, and let the just nation, * that keepeth the truth, enter in.
      - type: citation
        text: '26:3 The old error is passed away: thou wilt keep peace: * peace, because we have hoped in thee.'
      - type: citation
        text: 26:4 You have hoped in the Lord for evermore, * in the Lord God mighty for ever.
      - type: citation
        text: 26:5 For he shall bring down them that dwell on high, * the high city he shall lay low.
      - type: citation
        text: 26:5 He shall bring it down even to the ground, * he shall pull it down even to the dust.
      - type: citation
        text: 26:6 The foot shall tread it down, the feet of the poor, * the steps of the needy.
      - type: citation
        text: 26:7 The way of the just is right, * the path of the just is right to walk in.
      - type: citation
        text: '26:8 And in the way of thy judgments, O Lord, we have patiently waited for thee: * thy name, and thy remembrance are the desire of the soul.'
      - type: citation
        text: '26:9 My soul hath desired thee in the night: * yea, and with my spirit within me in the morning early I will watch to thee.'
      - type: citation
        text: 26:9 When thou shalt do thy judgments on the earth, * the inhabitants of the world shall learn justice.
      - type: citation
        text: '26:10 Let us have pity on the wicked, but he will not learn justice: * in the land of the saints he hath done wicked things, and he shall not see the glory of the Lord.'
      - type: citation
        text: '26:11 Lord, let thy hand be exalted, and let them not see: * let the envious people see, and be confounded: and let fire devour thy enemies.'
      - type: citation
        text: '26:12 Lord, thou wilt give us peace: * for thou hast wrought all our works for us.'
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 26:1-12
      - type: citation
        text: 26:1 Urbs fortitúdinis nostræ Sion salvátor, * ponétur in ea murus et antemurále.
      - type: citation
        text: 26:2 Aperíte portas, et ingrediátur gens iusta, * custódiens veritátem.
      - type: citation
        text: '26:3 Vetus error ábiit: servábis pacem: * pacem, quia in te sperávimus.'
      - type: citation
        text: '26:4 Sperástis in Dómino in sǽculis ætérnis: * in Dómino Deo forti in perpétuum.'
      - type: citation
        text: '26:5 Quia incurvábit habitántes in excélso: * civitátem sublímem humiliábit.'
      - type: citation
        text: 26:5 Humiliábit eam usque ad terram, * détrahet eam usque ad púlverem.
      - type: citation
        text: 26:6 Conculcábit eam pes, pedes páuperis, * gressus egenórum.
      - type: citation
        text: 26:7 Sémita iusti recta est, * rectus callis iusti ad ambulándum.
      - type: citation
        text: '26:8 Et in sémita iudiciórum tuórum Dómine sustinúimus te: * nomen tuum et memoriále tuum in desidério ánimæ.'
      - type: citation
        text: 26:9 Anima mea desiderávit te in nocte, * sed et spíritu meo in præcórdiis meis de mane vigilábo ad te.
      - type: citation
        text: 26:9 Cum féceris iudícia tua in terra, * iustítiam discent habitatóres orbis.
      - type: citation
        text: '26:10 Misereámur ímpio, et non discet iustítiam: * in terra sanctórum iníqua gessit, et non vidébit glóriam Dómini.'
      - type: citation
        text: '26:11 Dómine exaltétur manus tua, et non vídeant: * vídeant, et confundántur zelántes pópuli: et ignis hostes tuos dévoret.'
      - type: citation
        text: '26:12 Dómine dabis pacem nobis: * ómnia enim ópera nostra operátus es nobis.'
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 26:1-12
      - type: citation
        text: 26:1 The city of our strength is Zion, our savior; * a wall and a bulwark shall be set within it.
      - type: citation
        text: 26:2 Open the gates, and let the just people enter, * those who keep the truth.
      - type: citation
        text: '26:3 The old error has passed away; you will preserve peace: * peace, for we have hoped in you.'
      - type: citation
        text: 26:4 You have trusted in the Lord for ages eternal, * in the Lord God, strong forever.
      - type: citation
        text: 26:5 For he will bow down those who dwell on high; * the lofty city he will bring low.
      - type: citation
        text: 26:5 He will humble it even to the earth, * he will cast it down even to the dust.
      - type: citation
        text: 26:6 The foot shall trample it, the feet of the poor, * the steps of the needy.
      - type: citation
        text: 26:7 The path of the just is upright; * the way of the just is straight for walking.
      - type: citation
        text: 26:8 And on the path of your judgments, O Lord, we have waited for you; * your name and your remembrance are the desire of the soul.
      - type: citation
        text: 26:9 My soul has longed for you in the night; * and with my spirit within me I will watch for you at dawn.
      - type: citation
        text: 26:9 When you accomplish your judgments on the earth, * the inhabitants of the world will learn justice.
      - type: citation
        text: 26:10 Though the wicked receive mercy, he will not learn justice; * in the land of the holy ones he has acted wickedly, and will not see the glory of the Lord.
      - type: citation
        text: 26:11 Lord, let your hand be exalted, that they may not see; * but let them see and be put to shame — the envious peoples — and let fire devour your enemies.
      - type: citation
        text: 26:12 Lord, you will give us peace; * for all our works you have accomplished for us.
  psalm.canticum-isai-isa-33-2-10-8ae5387b2e:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 33:2-10
      - type: citation
        text: '33:2 O Lord, have mercy on us: for we have waited for thee: be thou our arm in the morning, and our salvation in the time of trouble.'
      - type: citation
        text: 33:3 At the voice of the angel the people fled, and at the lifting up thyself the nations are scattered.
      - type: citation
        text: 33:4 And your spoils shall be gathered together as the locusts are gathered, as when the ditches are full of them.
      - type: citation
        text: '33:5 The Lord is magnified, for he hath dwelt on high: he hath filled Sion with judgment and justice.'
      - type: citation
        text: '33:6 And there shall be faith in thy times: riches of salvation, wisdom and knowledge: the fear of the Lord is his treasure.'
      - type: citation
        text: 33:7 Behold they that see shall cry without, the angels of peace shall weep bitterly.
      - type: citation
        text: 33:8 The ways are made desolate, no one passeth by the road, the covenant is made void, he hath rejected the cities, he hath not regarded the men.
      - type: citation
        text: '33:9 The land hath mourned, and languished: Libanus is confounded and become foul, and Saron is become as a desert: and Basan and Carmel are shaken.'
      - type: citation
        text: '33:10 Now will I rise up, saith the Lord: now will I be exalted, now will I lift up myself.'
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 33:2-10
      - type: citation
        text: 33:2 Dómine, miserére nostri, te enim exspectávimus; † esto bráchium nostrum in mane, * et salus nostra in témpore tribulatiónis.
      - type: citation
        text: 33:3 A voce Angeli fugérunt pópuli, * et ab exaltatióne tua dispérsæ sunt gentes.
      - type: citation
        text: 33:4 Et congregabúntur spólia vestra sicut collígitur bruchus, * velut cum fossæ plenæ fúerint de eo.
      - type: citation
        text: 33:5 Magnificátus est Dóminus, quóniam habitávit in excélso; * implévit Sion iudício et iustítia.
      - type: citation
        text: '33:6 Et erit fides in tempóribus tuis: † divítiæ salútis sapiéntia: * et sciéntia; timor Dómini ipse est thesáurus eius.'
      - type: citation
        text: 33:7 Ecce vidéntes clamábunt foris; * ángeli pacis amáre flebunt.
      - type: citation
        text: '33:8 Dissipátæ sunt viæ, cessávit tránsiens per sémitam: † írritum factum est pactum, * proiécit civitátes, non reputávit hómines.'
      - type: citation
        text: 33:9 Luxit et elánguit terra; * confúsus est Líbanus, et obsórduit.
      - type: citation
        text: 33:9 Et factus est Saron sicut desértum, * et concússa est Basan, et Carmélus.
      - type: citation
        text: 33:10 Nunc consúrgam, dicit Dóminus; * nunc exaltábor, nunc sublevábor.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 33:2-10
      - type: citation
        text: 33:2 O Lord, have mercy on us, for we have waited for you; † be our arm every morning, * and our salvation in the time of tribulation.
      - type: citation
        text: 33:3 At the voice of the Angel the peoples fled; * and at your exaltation the nations were scattered.
      - type: citation
        text: 33:4 And your spoils shall be gathered together as the locust is gathered, * as when the ditches are filled with them.
      - type: citation
        text: 33:5 The Lord has been magnified, for he dwells on high; * he has filled Zion with judgment and justice.
      - type: citation
        text: '33:6 And there shall be faith in your times: † riches of salvation, wisdom * and knowledge; the fear of the Lord — that is his treasure.'
      - type: citation
        text: 33:7 Behold, those who see shall cry out outside; * the angels of peace shall weep bitterly.
      - type: citation
        text: 33:8 The roads are desolate, travelers have ceased from the path; † the covenant has been made void, * he has rejected cities, he has disregarded men.
      - type: citation
        text: 33:9 The earth has mourned and languished; * Lebanon is confounded and defiled.
      - type: citation
        text: 33:9 And Sharon has become like a desert, * and Bashan and Carmel are laid waste.
      - type: citation
        text: 33:10 Now I will arise, says the Lord; * now I will be exalted, now I will lift myself up.
  psalm.canticum-isai-isa-40-10-17-c34b96df9e:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 40:10-17
      - type: citation
        text: '40:10 Behold the Lord God shall come with strength, * and his arm shall rule:'
      - type: citation
        text: 40:10 Behold his reward is with him * and his work is before him.
      - type: citation
        text: '40:11 He shall feed his flock like a shepherd: he shall gather together the lambs with his arm, * and shall take them up in his bosom, and he himself shall carry them that are with young.'
      - type: citation
        text: 40:12 Who hath measured the waters * in the hollow of his hand, and weighed the heavens with his palm?
      - type: citation
        text: 40:12 Who hath poised with three fingers the bulk of the earth, * and weighed the mountains in scales, and the hills in a balance?
      - type: citation
        text: 40:13 Who hath forwarded the spirit of the Lord? * or who hath been his counsellor, and hath taught him?
      - type: citation
        text: 40:14 With whom hath he consulted, and who hath instructed him, and taught him the path of justice, * and taught him knowledge, and shewed him the way of understanding?
      - type: citation
        text: 40:15 Behold the Gentiles are as a drop of a bucket, * and are counted as the smallest grain of a balance.
      - type: citation
        text: 40:16 Behold the islands are as a little dust. And Libanus shall not be enough to burn, * nor the beasts thereof sufficient for a burnt offering.
      - type: citation
        text: 40:17 All nations are before him as if they had no being at all, * and are counted to him as nothing, and vanity.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 40:10-17
      - type: citation
        text: '40:10 Ecce Dóminus Deus in fortitúdine véniet, * et bráchium eius dominábitur:'
      - type: citation
        text: 40:10 Ecce merces eius cum eo, * et opus illíus coram illo.
      - type: citation
        text: '40:11 Sicut pastor gregem suum pascet: in bráchio suo congregábit agnos, * et in sinu suo levábit, fœtas ipse portábit.'
      - type: citation
        text: 40:12 Quis mensus est pugíllo aquas, * et cælos palmo ponderávit?
      - type: citation
        text: 40:12 Quis appéndit tribus dígitis molem terræ, * et librávit in póndere montes, et colles in statéra?
      - type: citation
        text: 40:13 Quis adiúvit spíritum Dómini? * aut quis consiliárius eius fuit, et osténdit illi?
      - type: citation
        text: 40:14 Cum quo íniit consílium, et instrúxit eum, et dócuit eum sémitam iustítiæ, * et erudívit eum sciéntiam, et viam prudéntiæ osténdit illi?
      - type: citation
        text: '40:15 Ecce gentes quasi stilla sítulæ, * et quasi moméntum statéræ reputátæ sunt:'
      - type: citation
        text: 40:16 Ecce ínsulæ quasi pulvis exíguus. Et Líbanus non suffíciet ad succendéndum, * et animália eius non suffícient ad holocáustum.
      - type: citation
        text: 40:17 Omnes gentes quasi non sint, sic sunt coram eo, * et quasi níhilum et ináne reputátæ sunt ei.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 40:10-17
      - type: citation
        text: '40:10 Behold, the Lord God shall come in strength, * and his arm shall rule:'
      - type: citation
        text: 40:10 Behold, his reward is with him, * and his work is before him.
      - type: citation
        text: 40:11 He will tend his flock like a shepherd; with his arm he will gather the lambs, * and he will lift them to his bosom, and he himself will carry the nursing ewes.
      - type: citation
        text: 40:12 Who has measured the waters in the hollow of his hand, * and who has weighed the heavens with his palm?
      - type: citation
        text: 40:12 Who has suspended the mass of the earth with three fingers, * and weighed the mountains on a balance and the hills on a scale?
      - type: citation
        text: 40:13 Who has assisted the Spirit of the Lord? * Or who has been his counselor and has taught him?
      - type: citation
        text: 40:14 With whom did he take counsel, and who instructed him, and taught him the path of justice, * and guided him to knowledge, and revealed to him the way of understanding?
      - type: citation
        text: 40:15 Behold, the nations are like a drop of water in a bucket, * and they are considered as the smallest grain on a balance.
      - type: citation
        text: 40:16 Behold, the islands are like a little dust. And Lebanon will not be sufficient to start a fire, * and its animals will not be sufficient for a burnt offering.
      - type: citation
        text: 40:17 All the nations in his sight are as if they did not exist, * and they are considered by him as if they were nothingness and emptiness.
  psalm.canticum-isai-isa-45-15-30-1260c42cf2:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Isaias
      - type: citation
        text: Isa 45:15-30
      - type: citation
        text: 45:15 Verily thou art a hidden God, * the God of Israel the saviour.
      - type: citation
        text: '45:16 They are all confounded and ashamed: * the forgers of errors are gone together into confusion.'
      - type: citation
        text: '45:17 Israel is saved in the Lord with an eternal salvation: * you shall not be confounded, and you shall not be ashamed for ever and ever.'
      - type: citation
        text: '45:18 For thus saith the Lord that created the heavens, * God himself that formed the earth, and made it, the very maker thereof:'
      - type: citation
        text: '45:19 He did not create it in vain: he formed it to be inhabited. * I am the Lord, and there is no other.'
      - type: citation
        text: '45:20 I have not spoken in secret, * in a dark place of the earth:'
      - type: citation
        text: '45:21 I have not said to the seed of Jacob: Seek me in vain. * I am the Lord that speak justice, that declare right things.'
      - type: citation
        text: '45:22 Assemble yourselves, and come, and draw near together, * ye that are saved of the Gentiles:'
      - type: citation
        text: 45:23 They have no knowledge that set up the wood of their graven work, * and pray to a god that cannot save.
      - type: citation
        text: '45:24 Tell ye, and come, and consult together: * who hath declared this from the beginning, who hath foretold this from that time?'
      - type: citation
        text: 45:25 Have not I the Lord, and there is no God else besides me? * A just God and a saviour, there is none besides me.
      - type: citation
        text: '45:26 Be converted to me, and you shall be saved, all ye ends of the earth: * for I am God, and there is no other.'
      - type: citation
        text: '45:27 I have sworn by myself, the word of justice shall go out of my mouth, * and shall not return:'
      - type: citation
        text: 45:28 For every knee shall be bowed to me, * and every tongue shall swear.
      - type: citation
        text: '45:29 Therefore shall he say: In the Lord are my justices and empire: * they shall come to him, and all that resist him shall be confounded.'
      - type: citation
        text: 45:30 In the Lord shall all the seed * of Israel be justified and praised.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 45:15-30
      - type: citation
        text: 45:15 Vere tu es Deus abscónditus, * Deus Israël, Salvátor.
      - type: citation
        text: '45:16 Confúsi sunt, et erubuérunt omnes: * simul abiérunt in confusiónem fabricatóres errórum.'
      - type: citation
        text: '45:17 Israël salvátus est in Dómino salúte ætérna: * non confundémini, et non erubescétis usque in sǽculum sǽculi.'
      - type: citation
        text: '45:18 Quia hæc dicit Dóminus creans cælos, * ipse Deus formans terram, et fáciens eam, ipse plastes eius:'
      - type: citation
        text: '45:19 Non in vanum creávit eam, ut habitarétur, formávit eam: * Ego Dóminus, et non est álius.'
      - type: citation
        text: '45:20 Non in abscóndito locútus sum, * in loco terræ tenebróso:'
      - type: citation
        text: '45:21 Non dixi sémini Iacob frustra: Quǽrite me: * ego Dóminus loquens iustítiam, annúntians recta.'
      - type: citation
        text: '45:22 Congregámini, et veníte, et accédite simul * qui salváti estis ex géntibus:'
      - type: citation
        text: 45:23 Nesciérunt qui levant lignum sculptúræ suæ, * et rogant deum non salvántem.
      - type: citation
        text: '45:24 Annuntiáte, et veníte, et consiliámini simul: * Quis audítum fecit hoc ab inítio, ex tunc prædíxit illud?'
      - type: citation
        text: 45:25 Numquid non ego Dóminus, et non est ultra Deus absque me? * Deus iustus, et salvans non est præter me.
      - type: citation
        text: '45:26 Convertímini ad me, et salvi éritis, omnes fines terræ: * quia ego Deus, et non est álius.'
      - type: citation
        text: '45:27 In memetípso iurávi, egrediétur de ore meo iustítiæ verbum, * et non revertétur:'
      - type: citation
        text: 45:28 Quia mihi curvábitur omne genu, * et iurábit omnis lingua.
      - type: citation
        text: '45:29 Ergo in Dómino, dicet, meæ sunt iustítiæ et impérium: * ad eum vénient, et confundéntur omnes qui repúgnant ei.'
      - type: citation
        text: 45:30 In Dómino iustificábitur, et laudábitur * omne semen Israël.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 45:15-30
      - type: citation
        text: 45:15 Truly, you are a hidden God, * the God of Israel, the Savior.
      - type: citation
        text: 45:16 They have all been confounded and are ashamed; * together the fabricators of errors have departed into confusion.
      - type: citation
        text: 45:17 Israel is saved in the Lord by an eternal salvation; * you will not be confounded, and you will not be ashamed, even forever and ever.
      - type: citation
        text: '45:18 For thus says the Lord, who created the heavens, * God himself who formed the earth and made it, the very Molder of it:'
      - type: citation
        text: 45:19 He did not create it to no purpose; he formed it so that it would be inhabited. * I am the Lord, and there is no other.
      - type: citation
        text: 45:20 I have not spoken in secret, * in a dark place of the earth.
      - type: citation
        text: 45:21 I have not said to the offspring of Jacob, 'Seek me in vain.' * I am the Lord, who speaks justice, who announces what is right.
      - type: citation
        text: 45:22 Assemble yourselves, and approach, and draw near together, * you who have been saved among the Gentiles.
      - type: citation
        text: 45:23 They lack knowledge, who lift up the wood of their sculpture, * and who petition a god unable to save.
      - type: citation
        text: '45:24 Announce it, and approach, and consult together: * who has caused this to be heard from the beginning, and who has foretold it from that time?'
      - type: citation
        text: 45:25 Is it not I, the Lord? And is there some other god beside me? * I am a just God who saves, and there is no one except me.
      - type: citation
        text: 45:26 All ends of the earth, be converted to me, and you will be saved; * for I am God, and there is no other.
      - type: citation
        text: 45:27 I have sworn by myself. The Word of justice will proceed from my mouth, * and it will not turn back.
      - type: citation
        text: 45:28 For every knee shall bend to me, * and every tongue shall swear it.
      - type: citation
        text: 45:29 Therefore, he will say, 'In the Lord are my justices and my dominion.' * They will go to him, and all who fight against him will be confounded.
      - type: citation
        text: 45:30 In the Lord, all the offspring of Israel * will be justified and praised.
  psalm.canticum-isai-isa-61-10-11-62-1-3-01b42cdc7e:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 61:10-11; 62:1-3
      - type: citation
        text: '61:10 I will greatly rejoice in the Lord, and my soul shall be joyful in my God: for he hath clothed me with the garments of salvation: and with the robe of justice he hath covered me, as a bridegroom decked with a crown, and as a bride adorned with her jewels.'
      - type: citation
        text: '61:11 For as the earth bringeth forth her bud, and as the garden causeth her seed to shoot forth: so shall the Lord God make justice to spring forth, and praise before all the nations.'
      - type: citation
        text: 62:1 For Sion’s sake I will not hold my peace, and for the sake of Jerusalem, I will not rest till her just one come forth as brightness, and her saviour be lighted as a lamp.
      - type: citation
        text: '62:2 And the Gentiles shall see thy just one, and all kings thy glorious one: and thou shalt be called by a new name, which the mouth of the Lord shall name.'
      - type: citation
        text: 62:3 And thou shalt be a crown of glory in the hand of the Lord, and a royal diadem in the hand of thy God.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 61:10-11; 62:1-3
      - type: citation
        text: '61:10 Gaudens gaudébo in Dómino, * et exsultábit ánima mea in Deo meo:'
      - type: citation
        text: 61:10 Quia índuit me vestiméntis salútis, * et induménto iustítiæ circúmdedit me,
      - type: citation
        text: 61:10 Quasi sponsum decorátum coróna, * et quasi sponsam ornátam monílibus suis.
      - type: citation
        text: 61:11 Sicut enim terra profert germen suum, † et sicut hortus semen suum gérminat, * sic Dóminus Deus germinábit iustítiam et laudem coram univérsis géntibus.
      - type: citation
        text: 62:1 Propter Sion non tacébo, et propter Ierúsalem non quiéscam, † donec egrediátur ut splendor iustus eius, * et salvátor eius ut lampas accendátur.
      - type: citation
        text: 62:2 Et vidébunt gentes iustum tuum, * et cuncti reges ínclitum tuum;
      - type: citation
        text: 62:2 Et vocábitur tibi nomen novum, * quod os Dómini nominábit.
      - type: citation
        text: 62:3 Et eris coróna glóriæ in manu Dómini, * et diadéma regni in manu Dei tui.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 61:10-11; 62:1-3
      - type: citation
        text: 61:10 I will rejoice greatly in the Lord, * and my soul will exult in my God;
      - type: citation
        text: 61:10 for he has clothed me with the vestments of salvation, * and he has wrapped me in the clothing of justice,
      - type: citation
        text: 61:10 like a groom arrayed with a crown, * and like a bride adorned with her jewels.
      - type: citation
        text: 61:11 For as the earth brings forth its seedlings, † and as the garden produces its seeds, * so will the Lord God bring forth justice and praise in the sight of all the nations.
      - type: citation
        text: 62:1 For the sake of Zion, I will not be silent, and for the sake of Jerusalem, I will not rest, † until her Just One advances in splendor, * and her Savior is kindled like a lamp.
      - type: citation
        text: 62:2 And the Gentiles will see your Just One, * and all the kings will see your Renowned One;
      - type: citation
        text: 62:2 and you shall be called by a new name, * which the mouth of the Lord will choose.
      - type: citation
        text: 62:3 And you shall be a crown of glory in the hand of the Lord, * and a royal diadem in the hand of your God.
  psalm.canticum-isai-isa-61-6-9-dc6b47eae4:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 61:6-9
      - type: citation
        text: '61:6 But you shall be called the priests of the Lord: * to you it shall be said: You ministers of our God:'
      - type: citation
        text: 61:6 You shall eat the riches of the Gentiles, * and you shall pride yourselves in their glory.
      - type: citation
        text: '61:7 For your double confusion and shame, * they shall praise their part:'
      - type: citation
        text: 61:7 Therefore shall they receive double in their land, * everlasting joy shall be unto them.
      - type: citation
        text: '61:8 For I am the Lord that loves judgment, * and hates robbery in a holocaust:'
      - type: citation
        text: 61:8 And I will make their work in truth, * and I will make a perpetual covenant with them.
      - type: citation
        text: '61:9 And they shall know their seed among the Gentiles, * and their offspring in the midst of peoples:'
      - type: citation
        text: 61:9 All that shall see them, shall know them, * that these are the seed which the Lord has blessed.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 61:6-9
      - type: citation
        text: '61:6 Vos autem sacerdótes Dómini vocabímini: * minístri Dei nostri, dicétur vobis:'
      - type: citation
        text: 61:6 Fortitúdinem géntium comedétis, * et in glória eárum superbiétis.
      - type: citation
        text: 61:7 Pro confusióne vestra dúplici et rubóre, * laudábunt partem suam;
      - type: citation
        text: 61:7 Propter hoc in terra sua duplícia possidébunt, * lætítia sempitérna erit eis.
      - type: citation
        text: '61:8 Quia ego Dóminus díligens iudícium, * et ódio habens rapínam in holocáusto:'
      - type: citation
        text: 61:8 Et dabo opus eórum in veritáte, * et fœdus perpétuum fériam eis.
      - type: citation
        text: '61:9 Et scient in géntibus semen eórum, * et germen eórum in médio populórum:'
      - type: citation
        text: 61:9 Omnes qui víderint eos cognóscent illos, * quia isti sunt semen, cui benedíxit Dóminus.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 61:6-9
      - type: citation
        text: 61:6 But you yourselves will be called the priests of the Lord; * it will be said to you, 'You are the ministers of our God.'
      - type: citation
        text: 61:6 You will eat from the strength of the Gentiles, * and you will pride yourself on their glory.
      - type: citation
        text: 61:7 Instead of your double confusion and shame, * they will praise their portion;
      - type: citation
        text: 61:7 because of this, they will possess double in their land; * everlasting joy will be for them.
      - type: citation
        text: 61:8 For I am the Lord, who loves judgment, * and who holds hatred for robbery within a burnt offering;
      - type: citation
        text: 61:8 and I will turn their work into truth, * and I will forge a perpetual covenant with them.
      - type: citation
        text: 61:9 And they will know their offspring among the nations, * and their progeny in the midst of the peoples;
      - type: citation
        text: 61:9 all who see them will recognize them, * that these are the offspring whom the Lord has blessed.
  psalm.canticum-isai-isa-62-4-7-d1aef3097d:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 62:4-7
      - type: citation
        text: '62:4 Thou shalt no more be called Forsaken: and thy land shall no more be called Desolate: but thou shalt be called My pleasure in her, and thy land inhabited. Because the Lord hath been well pleased with thee: and thy land shall be inhabited.'
      - type: citation
        text: 62:5 For the young man shall dwell with the virgin, and thy children shall dwell in thee. And the bridegroom shall rejoice over the bride, and thy God shall rejoice over thee.
      - type: citation
        text: 62:6 Upon thy wails, O Jerusalem, I have appointed watchmen all the day, and all the night, they shall never hold their peace. You that are mindful of the Lord, hold not your peace,
      - type: citation
        text: 62:7 And give him no silence till he establish, and till he make Jerusalem a praise in the earth.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 62:4-7
      - type: citation
        text: '62:4 Non vocáberis ultra Derelícta, * et terra tua non vocábitur ámplius Desoláta:'
      - type: citation
        text: '62:4 Sed vocáberis, Volúntas mea in ea, * et terra tua inhabitáta:'
      - type: citation
        text: '62:4 Quia complácuit Dómino in te: * et terra tua inhabitábitur.'
      - type: citation
        text: '62:5 Habitábit enim iúvenis cum vírgine, * et habitábunt in te fílii tui:'
      - type: citation
        text: 62:5 Et gaudébit sponsus super sponsam, * et gaudébit super te Deus tuus.
      - type: citation
        text: 62:6 Super muros tuos, Ierúsalem, constítui custódes; * tota die et tota nocte in perpétuum non tacébunt.
      - type: citation
        text: 62:6 Qui reminiscímini Dómini, ne taceátis, † et ne detis siléntium ei, * donec stabíliat et donec ponat Ierúsalem laudem in terra.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 62:4-7
      - type: citation
        text: 62:4 You will no longer be called Forsaken, * and your land will no longer be called Desolate;
      - type: citation
        text: 62:4 instead, you shall be called My Will within it, * and your land shall be called Inhabited;
      - type: citation
        text: 62:4 for the Lord has been well pleased with you, * and your land will be inhabited.
      - type: citation
        text: 62:5 For the young man will live with the virgin, * and your children will live with you;
      - type: citation
        text: 62:5 and the groom will rejoice over the bride, * and your God will rejoice over you.
      - type: citation
        text: 62:6 Upon your walls, O Jerusalem, I have stationed watchmen; * all day and all night, unceasingly, they will not be silent.
      - type: citation
        text: 62:6 You who are mindful of the Lord, do not be silent, † and do not grant silence to him, * until he makes firm and establishes Jerusalem as a praise upon the earth.
  psalm.canticum-isai-isa-63-1-5-cc983d9b6c:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 63:1-5
      - type: citation
        text: 63:1 Who is this that cometh from Edom, with dyed garments from Bosra,
      - type: citation
        text: 63:1 This beautiful one in his robe, walking in the greatness of his strength.
      - type: citation
        text: 63:1 I, that speak justice, and am a defender to save.
      - type: citation
        text: 63:2 Why then is thy apparel red, and thy garments like theirs that tread in the winepress?
      - type: citation
        text: '63:3 I have trodden the winepress alone, and of the Gentiles there is not a man with me:'
      - type: citation
        text: 63:3 I have trampled on them in my indignation, and have trodden them down in my wrath,
      - type: citation
        text: 63:3 And their blood is sprinkled upon my garments, and I have stained all my apparel.
      - type: citation
        text: 63:4 For the day of vengeance is in my heart, the year of my redemption is come.
      - type: citation
        text: '63:5 I looked about, and there was none to help: I sought, and there was none to give aid:'
      - type: citation
        text: 63:5 And my own arm hath saved for me, and my indignation itself hath helped me.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 63:1-5
      - type: citation
        text: 63:1 Quis est iste, qui venit de Edom, * tinctis véstibus de Bosra?
      - type: citation
        text: 63:1 Iste formósus in stola sua, * grádiens in multitúdine fortitúdinis suæ.
      - type: citation
        text: 63:1 Ego qui loquor iustítiam, * et propugnátor sum ad salvándum.
      - type: citation
        text: 63:2 Quare ergo rubrum est induméntum tuum, * et vestiménta tua sicut calcántium in torculári?
      - type: citation
        text: '63:3 Tórcular calcávi solus, * et de géntibus non est vir mecum:'
      - type: citation
        text: '63:3 Calcávi eos in furóre meo, * et conculcávi eos in ira mea:'
      - type: citation
        text: 63:3 Et aspérsus est sanguis eorum super vestiménta mea, * et ómnia induménta mea inquinávi.
      - type: citation
        text: 63:4 Dies enim ultiónis in corde meo; * annus redemptiónis meæ venit.
      - type: citation
        text: '63:5 Circumspéxi, et non erat auxiliátor; * quæsívi, et non fuit qui adiuváret:'
      - type: citation
        text: 63:5 Et salvávit mihi bráchium meum, * et indignátio mea ipsa auxiliáta est mihi.
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 63:1-5
      - type: citation
        text: 63:1 Who is this, who arrives from Edom, * with dyed garments from Bozrah?
      - type: citation
        text: 63:1 This is the Handsome One in his robe, * advancing by the fullness of his strength.
      - type: citation
        text: 63:1 It is I, the Speaker of Justice, * and I am the Fighter for Salvation.
      - type: citation
        text: 63:2 So then, why is your garment red, * and why are your vestments like those of one who treads the winepress?
      - type: citation
        text: 63:3 I have trod the winepress alone, * and among the nations there is no man beside me;
      - type: citation
        text: 63:3 I have trampled on them in my fury, * and I have tread them down in my wrath;
      - type: citation
        text: 63:3 and their blood has been sprinkled on my vestments, * and I have stained all my garments.
      - type: citation
        text: 63:4 For the day of vengeance is in my heart; * the year of my redemption has arrived.
      - type: citation
        text: 63:5 I gazed around, and there was no one to assist; * I sought, and there was no one who would help;
      - type: citation
        text: 63:5 and so my own arm has saved for me, * and my own wrath itself has assisted me.
  psalm.canticum-isai-isa-66-10-16-335fb70a03:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 66:10-16
      - type: citation
        text: '66:10 Rejoice with Jerusalem, and be glad with her, * all you that love her:'
      - type: citation
        text: '66:10 Rejoice for joy with her, all you that mourn for her. * That you may suck, and be filled with the breasts of her consolations:'
      - type: citation
        text: 66:11 That you may milk out, and flow with delights, * from the abundance of her glory.
      - type: citation
        text: '66:12 For thus saith the Lord: Behold I will bring upon her as it were a river of peace, * and as an overflowing torrent the glory of the Gentiles,'
      - type: citation
        text: 66:12 Which you shall suck; you shall be carried at the breasts, * end upon the knees they shall caress you.
      - type: citation
        text: 66:13 As one whom the mother caresseth, so will I comfort you, * and you shall be comforted in Jerusalem.
      - type: citation
        text: 66:14 You shall see and your heart shall rejoice, * and your bones shall flourish like an herb,
      - type: citation
        text: 66:14 And the hand of the Lord shall be known to his servants, * and he shall be angry with his enemies.
      - type: citation
        text: 66:15 For behold the Lord will come with fire, and his chariots are like a whirlwind, * to render his wrath in indignation, and his rebuke with flames of fire.
      - type: citation
        text: 66:16 For the Lord shall judge by fire, and by his sword unto all flesh, * and the slain of the Lord shall be many.
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 66:10-16
      - type: citation
        text: '66:10 Lætámini cum Ierúsalem et exsultáte in ea, * omnes qui dilígitis eam:'
      - type: citation
        text: '66:10 Gaudéte cum ea gáudio, univérsi qui lugétis super eam: * ut sugátis et repleámini ab úbere consolatiónis eius:'
      - type: citation
        text: 66:11 Ut mulgeátis et delíciis affluátis * ab omnímoda glória eius.
      - type: citation
        text: '66:12 Quia hæc dicit Dóminus: Ecce ego declinábo super eam quasi flúvium pacis, * et quasi torréntem inundántem glóriam géntium,'
      - type: citation
        text: '66:12 Quam sugétis: ad úbera portabímini, * et super génua blandiéntur vobis.'
      - type: citation
        text: 66:13 Quómodo si cui mater blandiátur, ita ego consolábor vos, * et in Ierúsalem consolabímini.
      - type: citation
        text: '66:14 Vidébitis, et gaudébit cor vestrum, * et ossa vestra quasi herba germinábunt:'
      - type: citation
        text: 66:14 Et cognoscétur manus Dómini servis eius, * et indignábitur inimícis suis.
      - type: citation
        text: '66:15 Quia ecce Dóminus in igne véniet, et quasi turbo quadrígæ eius, * réddere in indignatióne furórem suum et increpatiónem suam in flamma ignis:'
      - type: citation
        text: '66:16 Quia in igne Dóminus diiudicábit, et in gládio suo ad omnem carnem: * et multiplicabúntur interfécti a Dómino,'
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 66:10-16
      - type: citation
        text: 66:10 Rejoice with Jerusalem, and exult in her, * all you who love her;
      - type: citation
        text: 66:10 rejoice greatly with her, all you who mourn over her; * so may you nurse and be filled from the breasts of her consolations;
      - type: citation
        text: 66:11 so may you receive milk and overflow with delights * from every portion of her glory.
      - type: citation
        text: '66:12 For thus says the Lord: Behold, I will turn a river of peace toward her, * and like an inundating torrent, the glory of the Gentiles,'
      - type: citation
        text: 66:12 from which you will nurse. You will be carried at the breasts, * and they will caress you upon the knees.
      - type: citation
        text: 66:13 In the manner of one whom a mother caresses, so will I console you, * and you will be consoled in Jerusalem.
      - type: citation
        text: 66:14 You will see, and your heart will be glad, * and your bones will flourish like a plant;
      - type: citation
        text: 66:14 and the hand of the Lord will be known to his servants, * and he will be angry with his enemies.
      - type: citation
        text: 66:15 For behold, the Lord will arrive with fire, and his four-horse chariots will be like a whirlwind, * to render his wrath with indignation, and his rebuke with flames of fire;
      - type: citation
        text: 66:16 for the Lord will divide with fire, and with his sword among all flesh; * and those slain by the Lord will be many.
  psalm.canticum-isai-isa-9-2-7-3cd686765e:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Isaiae
      - type: citation
        text: Isa 9:2-7
      - type: citation
        text: '9:2 The people that walked in darkness, * have seen a great light:'
      - type: citation
        text: 9:2 To them that dwelt in the region of the shadow of death, * light is risen.
      - type: citation
        text: 9:3 Thou hast multiplied the nation, * and hast not increased the joy.
      - type: citation
        text: 9:3 They shall rejoice before thee, as they that rejoice in the harvest, * as conquerors rejoice after taking a prey, when they divide the spoils.
      - type: citation
        text: 9:4 For the yoke of their burden, and the rod of their shoulder, * and the sceptre of their oppressor thou best overcome, as in the day of Median.
      - type: citation
        text: 9:5 For every violent taking of spoils, with tumult, * and garment mingled with blood, shall be burnt, and be fuel for the fire.
      - type: citation
        text: 9:6 For a child is born to us, * and a son is given to us,
      - type: citation
        text: '9:6 And the government is upon his shoulder: * and his name shall be called, Wonderful, Counsellor,'
      - type: citation
        text: 9:6 God the Mighty, the Father of the world to come, * the Prince of Peace.
      - type: citation
        text: '9:7 His empire shall be multiplied, * and there shall be no end of peace:'
      - type: citation
        text: 9:7 He shall sit upon the throne of David, and upon his kingdom; * to establish it and strengthen it with judgment and with justice.
      - type: citation
        text: '9:7 From henceforth and for ever: * The zeal of the Lord of hosts will perform this.'
      la:
      - type: heading
        text: Canticum Isaiæ
      - type: citation
        text: Isa 9:2-7
      - type: citation
        text: 9:2 Pópulus, qui ambulábat in ténebris, * vidit lucem magnam.
      - type: citation
        text: 9:2 Habitántibus in regióne umbræ mortis, * lux orta est eis.
      - type: citation
        text: 9:3 Multiplicásti gentem, * et non magnificásti lætítiam.
      - type: citation
        text: '9:3 Lætabúntur coram te, sicut qui lætántur in messe: * sicut exsúltant victóres capta præda, quando dívidunt spólia.'
      - type: citation
        text: 9:4 Iugum enim óneris eius, et virgam húmeri eius, * et sceptrum exactóris eius superásti sicut in die Mádian.
      - type: citation
        text: 9:5 Quia omnis violénta prædátio cum tumúltu, * et vestiméntum mistum sánguine, erit in combustiónem, et cibus ignis.
      - type: citation
        text: 9:6 Párvulus enim natus est nobis, * et fílius datus est nobis,
      - type: citation
        text: '9:6 Et factus est principátus super húmerum eius: * et vocábitur nomen eius, Admirábilis, Consiliárius,'
      - type: citation
        text: 9:6 Deus, Fortis, Pater futúri sǽculi, * Princeps pacis.
      - type: citation
        text: 9:7 Multiplicábitur eius impérium, * et pacis non erit finis.
      - type: citation
        text: 9:7 Super sólium David, et super regnum eius sedébit, * ut confírmet illud et corróboret in iudício et iustítia,
      - type: citation
        text: '9:7 Ámodo et usque in sempitérnum: * zelus Dómini exercítuum fáciet hoc.'
      en2:
      - type: heading
        text: Canticle of Isaiah
      - type: citation
        text: Isa 9:2-7
      - type: citation
        text: 9:2 The people who walked in darkness * have seen a great light.
      - type: citation
        text: 9:2 A light has risen * for the inhabitants of the region of the shadow of death.
      - type: citation
        text: 9:3 You have increased the nation, * but you have not increased the rejoicing.
      - type: citation
        text: 9:3 They will rejoice before you, like those who rejoice at the harvest, * like the victorious exulting after capturing the prey, when they divide the spoils.
      - type: citation
        text: 9:4 For you have prevailed over the yoke of their burden, and over the rod of their shoulder, * and over the scepter of their oppressor, as in the day of Midian.
      - type: citation
        text: 9:5 For every violent plunder with a tumult, * and every garment mixed with blood, will be burned up and will become fuel for the fire.
      - type: citation
        text: 9:6 For unto us a child is born, * and unto us a son is given,
      - type: citation
        text: '9:6 and leadership is placed upon his shoulder; * and his name shall be called: Wonderful, Counselor,'
      - type: citation
        text: 9:6 mighty God, Father of the future age, * Prince of Peace.
      - type: citation
        text: 9:7 His reign will be increased, * and there will be no end to his peace.
      - type: citation
        text: 9:7 He will sit upon the throne of David and over his kingdom, * to confirm and strengthen it in judgment and justice,
      - type: citation
        text: '9:7 From now even unto eternity: * the zeal of the Lord of hosts shall accomplish this.'
  psalm.canticum-iudith-iudith-16-15-22-d1a4d58937:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Judith
      - type: citation
        text: Judith 16:15-22
      - type: citation
        text: 16:15 Let us sing a hymn to the Lord, * let us sing a new hymn to our God.
      - type: citation
        text: 16:16 O Adonai, Lord, great art thou, and glorious in thy power, * and no one can overcome thee.
      - type: citation
        text: '16:17 Let all thy creatures serve thee: * because thou hast spoken, and they were made:'
      - type: citation
        text: 16:18 Thou didst send forth thy spirit, and they were created, * and there is no one that can resist thy voice.
      - type: citation
        text: '16:19 The mountains shall be moved from the foundations with the waters: * the rocks shall melt as wax before thy face.'
      - type: citation
        text: 16:20 But they that fear thee, * shall be great with thee in all things.
      - type: citation
        text: '16:21 Woe be to the nation that riseth up against my people: for the Lord almighty will take revenge on them, * in the day of judgment he will visit them.'
      - type: citation
        text: 16:22 For he will give fire, and worms into their flesh, * that they may burn, and may feel for ever.
      la:
      - type: heading
        text: Canticum Iudith
      - type: citation
        text: Iudith 16:15-22
      - type: citation
        text: 16:15 Hymnum cantémus Dómino, * hymnum novum cantémus Deo nostro.
      - type: citation
        text: 16:16 Adonái, Dómine, magnus es tu, et præclárus in virtúte tua, * et quem superáre nemo potest.
      - type: citation
        text: '16:17 Tibi sérviat omnis creatúra tua: * quia dixísti, et facta sunt:'
      - type: citation
        text: 16:18 Misísti spíritum tuum, et creáta sunt, * et non est qui resístat voci tuæ.
      - type: citation
        text: '16:19 Montes a fundaméntis movebúntur cum aquis: * petræ, sicut cera, liquéscent ante fáciem tuam.'
      - type: citation
        text: 16:20 Qui autem timent te, * magni erunt apud te per ómnia.
      - type: citation
        text: '16:21 Væ genti insurgénti super genus meum: Dóminus enim omnípotens vindicábit in eis, * in die iudícii visitábit illos.'
      - type: citation
        text: 16:22 Dabit enim ignem, et vermes in carnes eórum, * ut urántur, et séntiant usque in sempitérnum.
      en2:
      - type: heading
        text: Canticle of Judith
      - type: citation
        text: Iudith 16:15-22
      - type: citation
        text: 16:15 Let us sing a canticle to the Lord, * let us sing a new hymn to our God.
      - type: citation
        text: 16:16 O Adonai, O Lord, you are great, and splendid in your power, * and no one is able to overcome you.
      - type: citation
        text: '16:17 Let all your creatures serve you: * for you spoke, and they were made:'
      - type: citation
        text: 16:18 You sent forth your Spirit, and they were created, * and there is no one who can withstand your voice.
      - type: citation
        text: '16:19 The mountains will be moved from their foundations by the waters: * the rocks, like wax, will liquefy before your face.'
      - type: citation
        text: 16:20 But those who fear you * will be great with you in all things.
      - type: citation
        text: '16:21 Woe to the people that rises up against my people: for the Lord almighty will be vindicated against them, * in the day of judgment he will visit them.'
      - type: citation
        text: 16:22 For he will bestow fire and worms upon their flesh, * so that they may burn and have sensations without ceasing.
  psalm.canticum-moysis-deut-32-1-65-c9e40f627d:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Moses
      - type: citation
        text: Deut 32:1-65
      - type: citation
        text: 32:1 Hear, O ye heavens, the things I speak, * let the earth give ear to the words of my mouth.
      - type: citation
        text: 32:2 Let my doctrine gather as the rain, * let my speech distill as the dew,
      - type: citation
        text: '32:3 As a shower upon the herb, and as drops upon the grass. * Because I will invoke the name of the Lord:'
      - type: citation
        text: '32:4 Give ye magnificence to our God. * The works of God are perfect, and all his ways are judgments:'
      - type: citation
        text: '32:5 God is faithful and without any iniquity, he is just and right. * They have sinned against him, and are none of his children in their filth:'
      - type: citation
        text: 32:6 They are a wicked and perverse generation. * Is this the return thou makest to the Lord, O foolish and senseless people?
      - type: citation
        text: 32:7 Is not he thy father, * that hath possessed thee, and made thee, and created thee?
      - type: citation
        text: '32:8 Remember the days of old, * think upon every generation:'
      - type: citation
        text: '32:9 Ask thy father, and he will declare to thee: * thy elders and they will tell thee.'
      - type: citation
        text: '32:10 When the Most High divided the nations: * when he separated the sons of Adam,'
      - type: citation
        text: 32:11 He appointed the bounds of people * according to the number of the children of Israel.
      - type: citation
        text: '32:12 But the Lord’s portion is his people: * Jacob the lot of his inheritance.'
      - type: citation
        text: '32:13 He found him in a desert land, * in a place of horror, and of vast wilderness:'
      - type: citation
        text: '32:14 He led him about, and taught him: * and he kept him as the apple of his eye.'
      - type: citation
        text: 32:15 As the eagle enticing her young to fly, * and hovering over them,
      - type: citation
        text: 32:16 He spread his wings, and hath taken him * and carried him on his shoulders.
      - type: citation
        text: '32:17 The Lord alone was his leader: * and there was no strange god with him.'
      - type: citation
        text: '32:18 He set him upon high land: * that he might eat the fruits of the fields,'
      - type: citation
        text: 32:19 That he might suck honey out of the rock, * and oil out of the hardest stone,
      - type: citation
        text: '32:20 Butter of the herd, and milk of the sheep * with the fat of lambs, and of the rams of the breed of Basan:'
      - type: citation
        text: 32:21 And goats with the marrow of wheat, * and might drink the purest blood of the grape.
      - type: citation
        text: '32:22 The beloved grew fat, and kicked: * he grew fat, and thick and gross,'
      - type: citation
        text: 32:23 He forsook God who made him, * and departed from God his saviour.
      - type: citation
        text: 32:24 They provoked him by strange gods, * and stirred him up to anger, with their abominations.
      - type: citation
        text: '32:25 They sacrificed to devils and not to God: * to gods whom they knew not:'
      - type: citation
        text: 32:26 That were newly come up, * whom their fathers worshipped not.
      - type: citation
        text: 32:27 Thou hast forsaken the God that beget * and hast forgotten the Lord that created thee.
      - type: citation
        text: '32:28 The Lord saw, and was moved to wrath: * because his own sons and daughters provoked him.'
      - type: citation
        text: '32:29 And he said: I will hide my face from them, * and will consider what their last end shall be:'
      - type: citation
        text: 32:30 for it is a perverse generation, * and unfaithful children.
      - type: citation
        text: '32:31 They have provoked me with that which was no god, * and have angered me with their vanities:'
      - type: citation
        text: 32:32 and I will provoke them with that which is no people, * and will vex them with a foolish nation.
      - type: citation
        text: '32:33 A fire is kindled in my wrath, * and shall burn even to the lowest hell:'
      - type: citation
        text: 32:34 and shall devour the earth with her increase, * and shall burn the foundations of the mountains.
      - type: citation
        text: 32:35 I will heap evils upon them, * and will spend my arrows among them.
      - type: citation
        text: '32:36 They shall be consumed with famine, * and birds shall devour them with a most bitter bite:'
      - type: citation
        text: 32:37 I will send the teeth of beasts upon them, * with the fury of creatures that trail upon the ground, and of serpents.
      - type: citation
        text: 32:38 Without, the sword shall lay them waste, and terror within, * both the young man and the virgin, the sucking child with the man in years.
      - type: citation
        text: '32:39 I said: Where are they? * I will make the memory of them to cease from among men.'
      - type: citation
        text: '32:40 But for the wrath of the enemies * I have deferred it: lest perhaps their enemies might be proud,'
      - type: citation
        text: '32:41 and should say: Our mighty hand, and not the Lord, * hath done all these things.'
      - type: citation
        text: 32:42 They are a nation without counsel, and without wisdom * O that they would be wise and would understand, and would provide for their last end.
      - type: citation
        text: 32:43 How should one pursue after a thousand, * and two chase ten thousand?
      - type: citation
        text: 32:44 Was it not, because their God had sold them, * and the Lord had shut them up?
      - type: citation
        text: '32:45 For our God is not as their gods: * our enemies themselves are judges.'
      - type: citation
        text: '32:46 Their vines are of the vineyard of Sodom, * and of the suburbs of Gomorrha:'
      - type: citation
        text: 32:47 their grapes are grapes of gall, * and their clusters most bitter.
      - type: citation
        text: 32:48 Their wine is the gall of dragons, * and the venom of asps, which is incurable.
      - type: citation
        text: 32:49 Are not these things stored up with me, * and sealed up in my treasures?
      - type: citation
        text: '32:50 Revenge is mine, and I will repay them in due time, * that their foot may slide:'
      - type: citation
        text: 32:51 the day of destruction is at hand, * and the time makes haste to come.
      - type: citation
        text: '32:52 The Lord will judge his people, * and will have mercy on his servants:'
      - type: citation
        text: 32:53 he shall see that their hand is weakened, * and that they who were shut up have also failed, and they that remained are consumed.
      - type: citation
        text: '32:54 And he shall say: Where are their gods, * in whom they trusted?'
      - type: citation
        text: '32:55 Of whose victims they ate the fat, * and drank the wine of their drink offerings:'
      - type: citation
        text: 32:56 let them arise and help you, * and protect you in your distress.
      - type: citation
        text: '32:57 See ye that I alone am, * and there is no other God besides me:'
      - type: citation
        text: '32:58 I will kill and I will make to live: I will strike, and I will heal, * and there is none that can deliver out of my hand.'
      - type: citation
        text: '32:59 I will lift up my hand to heaven, * and I will say: I live for ever.'
      - type: citation
        text: '32:60 If I shall whet my sword as the lightning, * and my hand take hold on judgment:'
      - type: citation
        text: 32:61 I will render vengeance to my enemies, * and repay them that hate me.
      - type: citation
        text: 32:62 I will make my arrows drunk with blood, * and my sword shall devour flesh,
      - type: citation
        text: 32:63 of the blood of the slain * and of the captivity, of the bare head of the enemies.
      - type: citation
        text: '32:64 Praise his people, ye nations, * for he will revenge the blood of his servants:'
      - type: citation
        text: 32:65 and will render vengeance to their enemies, * and he will be merciful to the land of his people.
      la:
      - type: heading
        text: Canticum Moysis
      - type: citation
        text: Deut 32:1-65
      - type: citation
        text: '32:1 Audíte, cæli, quæ loquor: * áudiat terra verba oris mei.'
      - type: citation
        text: 32:2 Concréscat ut plúvia doctrína mea, * fluat ut ros elóquium meum.
      - type: citation
        text: 32:3 Quasi imber super herbam, et quasi stillæ super grámina. * Quia nomen Dómini invocábo.
      - type: citation
        text: '32:4 Date magnificéntiam Deo nostro. * Dei perfécta sunt ópera, et omnes viæ eius iudícia:'
      - type: citation
        text: '32:5 Deus fidélis, et absque ulla iniquitáte, iustus et rectus. * Peccavérunt ei, et non fílii eius in sórdibus:'
      - type: citation
        text: 32:6 Generátio prava atque pervérsa. * Hǽccine reddis Dómino, pópule stulte et insípiens?
      - type: citation
        text: 32:7 Numquid non ipse est pater tuus, * qui possédit te, et fecit, et creávit te?
      - type: citation
        text: '32:8 Meménto diérum antiquórum, * cógita generatiónes síngulas:'
      - type: citation
        text: '32:9 Intérroga patrem tuum, et annuntiábit tibi: * maióres tuos, et dicent tibi.'
      - type: citation
        text: '32:10 Quando dividébat Altíssimus gentes: * quando separábat fílios Adam.'
      - type: citation
        text: 32:11 Constítuit términos populórum * iuxta númerum filiórum Israël.
      - type: citation
        text: '32:12 Pars autem Dómini, pópulus eius: * Iacob funículus hereditátis eius.'
      - type: citation
        text: '32:13 Invénit eum in terra desérta, * in loco horróris et vastæ solitúdinis:'
      - type: citation
        text: '32:14 Circumdúxit eum, et dócuit: * et custodívit quasi pupíllam óculi sui.'
      - type: citation
        text: 32:15 Sicut áquila próvocans ad volándum pullos suos, * et super eos vólitans,
      - type: citation
        text: 32:16 Expándit alas suas, et assúmpsit eum, * atque portávit in húmeris suis.
      - type: citation
        text: '32:17 Dóminus solus dux eius fuit: * et non erat cum eo deus aliénus.'
      - type: citation
        text: '32:18 Constítuit eum super excélsam terram: * ut coméderet fructus agrórum,'
      - type: citation
        text: 32:19 Ut súgeret mel de petra, * oleúmque de saxo duríssimo.
      - type: citation
        text: '32:20 Butýrum de arménto, et lac de óvibus * cum ádipe agnórum, et aríetum filiórum Basan:'
      - type: citation
        text: 32:21 Et hircos cum medúlla trítici, * et sánguinem uvæ bíberet meracíssimum.
      - type: citation
        text: '32:22 Incrassátus est diléctus, et recalcitrávit: * incrassátus, impinguátus, dilatátus,'
      - type: citation
        text: 32:23 Derelíquit Deum, factórem suum, * et recéssit a Deo, salutári suo.
      - type: citation
        text: 32:24 Provocavérunt eum in diis aliénis, * et in abominatiónibus ad iracúndiam concitavérunt.
      - type: citation
        text: '32:25 Immolavérunt dæmóniis, et non Deo, * diis, quos ignorábant:'
      - type: citation
        text: 32:26 Novi recentésque venérunt, * quos non coluérunt patres eórum.
      - type: citation
        text: 32:27 Deum qui te génuit dereliquísti, * et oblítus es Dómini, creatóris tui.
      - type: citation
        text: '32:28 Vidit Dóminus, et ad iracúndiam concitátus est: * quia provocavérunt eum fílii sui et fíliæ.'
      - type: citation
        text: '32:29 Et ait: Abscóndam fáciem meam ab eis, * et considerábo novíssima eórum:'
      - type: citation
        text: 32:30 Generátio enim pervérsa est, * et infidéles fílii.
      - type: citation
        text: '32:31 Ipsi me provocavérunt in eo, qui non erat Deus, * et irritavérunt in vanitátibus suis:'
      - type: citation
        text: 32:32 Et ego provocábo eos in eo, qui non est pópulus, * et in gente stulta irritábo illos.
      - type: citation
        text: '32:33 Ignis succénsus est in furóre meo, * et ardébit usque ad inférni novíssima:'
      - type: citation
        text: 32:34 Devorabítque terram cum gérmine suo, * et móntium fundaménta combúret.
      - type: citation
        text: 32:35 Congregábo super eos mala, * et sagíttas meas complébo in eis.
      - type: citation
        text: '32:36 Consuméntur fame, * et devorábunt eos aves morsu amaríssimo:'
      - type: citation
        text: 32:37 Dentes bestiárum immíttam in eos, * cum furóre trahéntium super terram, atque serpéntium.
      - type: citation
        text: 32:38 Foris vastábit eos gládius, et intus pavor, * iúvenem simul ac vírginem, lactántem cum hómine sene.
      - type: citation
        text: '32:39 Dixi: Ubinam sunt? * cessáre fáciam ex homínibus memóriam eórum.'
      - type: citation
        text: '32:40 Sed propter iram inimicórum dístuli: * ne forte superbírent hostes eórum,'
      - type: citation
        text: '32:41 Et dícerent: Manus nostra excélsa, et non Dóminus, * fecit hæc ómnia.'
      - type: citation
        text: 32:42 Gens absque consílio est, et sine prudéntia. * Utinam sáperent, et intellégerent, ac novíssima providérent.
      - type: citation
        text: 32:43 Quómodo persequátur unus mille, * et duo fugent decem míllia?
      - type: citation
        text: 32:44 Nonne ídeo, quia Deus suus véndidit eos, * et Dóminus conclúsit illos?
      - type: citation
        text: '32:45 Non enim est Deus noster ut dii eórum: * et inimíci nostri sunt iúdices.'
      - type: citation
        text: '32:46 De vínea Sodomórum vínea eórum, * et de suburbánis Gomórrhæ:'
      - type: citation
        text: 32:47 Uva eórum uva fellis, * et botri amaríssimi.
      - type: citation
        text: 32:48 Fel dracónum vinum eórum, * et venénum áspidum insanábile.
      - type: citation
        text: 32:49 Nonne hæc cóndita sunt apud me, * et signáta in thesáuris meis?
      - type: citation
        text: '32:50 Mea est últio, et ego retríbuam in témpore, * ut labátur pes eórum:'
      - type: citation
        text: 32:51 Iuxta est dies perditiónis, * et adésse festínant témpora.
      - type: citation
        text: '32:52 Iudicábit Dóminus pópulum suum, * et in servis suis miserébitur:'
      - type: citation
        text: 32:53 Vidébit quod infirmáta sit manus, * et clausi quoque defecérunt, residuíque consúmpti sunt.
      - type: citation
        text: '32:54 Et dicet: Ubi sunt dii eórum, * in quibus habébant fidúciam?'
      - type: citation
        text: '32:55 De quorum víctimis comedébant ádipes, * et bibébant vinum libáminum:'
      - type: citation
        text: 32:56 Surgant, et opituléntur vobis, * et in necessitáte vos prótegant.
      - type: citation
        text: '32:57 Vidéte quod ego sim solus, * et non sit álius Deus præter me:'
      - type: citation
        text: '32:58 Ego occídam, et ego vívere fáciam: percútiam, et ego sanábo, * et non est qui de manu mea possit erúere.'
      - type: citation
        text: '32:59 Levábo ad cælum manum meam, et dicam: * Vivo ego in ætérnum.'
      - type: citation
        text: '32:60 Si acúero ut fulgur gládium meum, * et arripúerit iudícium manus mea:'
      - type: citation
        text: 32:61 Reddam ultiónem hóstibus meis, * et his qui odérunt me retríbuam.
      - type: citation
        text: 32:62 Inebriábo sagíttas meas sánguine, * et gládius meus devorábit carnes,
      - type: citation
        text: 32:63 De cruóre occisórum, * et de captivitáte, nudáti inimicórum cápitis.
      - type: citation
        text: '32:64 Laudáte, gentes, pópulum eius, * quia sánguinem servórum suórum ulciscétur:'
      - type: citation
        text: 32:65 Et vindíctam retríbuet in hostes eórum, * et propítius erit terræ pópuli sui.
      en2:
      - type: heading
        text: Canticle of Moses
      - type: citation
        text: Deut 32:1-65
      - type: citation
        text: '32:1 Listen, O heavens, to what I am saying: * let the earth hear the words of my mouth.'
      - type: citation
        text: 32:2 Let my doctrine accumulate like the rain, * let my eloquence flow like the dew,
      - type: citation
        text: 32:3 Like a mist upon the plants, and like droplets upon the grass. * For I will invoke the name of the Lord.
      - type: citation
        text: '32:4 Acknowledge the magnificence of our God. * The works of God are perfect, and all his ways are judgments:'
      - type: citation
        text: '32:5 God is faithful and without any iniquity, just and upright. * They have sinned against him, and in their filth they are not his sons:'
      - type: citation
        text: 32:6 They are a depraved and perverse generation. * Is this how you repay the Lord, O foolish and senseless people?
      - type: citation
        text: 32:7 Is he himself not your father, * who has possessed you, and made you, and created you?
      - type: citation
        text: '32:8 Remember the days of antiquity, * consider each generation:'
      - type: citation
        text: 32:9 Question your father, and he will declare it to you; * your elders, and they will tell it to you.
      - type: citation
        text: 32:10 When the Most High divided the nations, * when he separated the sons of Adam,
      - type: citation
        text: 32:11 He appointed the limits of the peoples * according to the number of the sons of Israel.
      - type: citation
        text: '32:12 But the Lord''s portion is his people: * Jacob is the lot of his inheritance.'
      - type: citation
        text: '32:13 He discovered him in a desert land, * in a place of horror and a vast wilderness:'
      - type: citation
        text: 32:14 He led him around and taught him, * and he guarded him like the pupil of his eye.
      - type: citation
        text: 32:15 Just as an eagle encourages its young to fly, * and, flying above them,
      - type: citation
        text: 32:16 Stretches out its wings, and takes them up, * and carries them on its shoulders.
      - type: citation
        text: '32:17 The Lord alone was his leader: * and there was no strange god with him.'
      - type: citation
        text: '32:18 He stood him upon an exalted land: * so that he might eat the fruits of the fields,'
      - type: citation
        text: 32:19 So that he might eat honey from the rock, * and oil from the hardest stone.
      - type: citation
        text: '32:20 Butter from the herd, and milk from the sheep, * with fat from the lambs, and with rams from the sons of Bashan:'
      - type: citation
        text: 32:21 And goats with the kernel of the wheat, * and so that he might drink the undiluted blood of the grape.
      - type: citation
        text: '32:22 The beloved grew fat, and he kicked: * having grown fat and thick and wide,'
      - type: citation
        text: 32:23 He abandoned God, his Maker, * and he withdrew from God, his Savior.
      - type: citation
        text: 32:24 They provoked him with strange gods, * and they stirred him to anger by their abominations.
      - type: citation
        text: '32:25 They immolated to demons and not to God, * to gods whom they did not know:'
      - type: citation
        text: 32:26 New and recent arrivals, * whom their fathers did not worship.
      - type: citation
        text: 32:27 You have forsaken the God who conceived you, * and you have forgotten the Lord, your Creator.
      - type: citation
        text: '32:28 The Lord saw, and he was stirred to anger: * for his own sons and daughters provoked him.'
      - type: citation
        text: '32:29 And he said: I will hide my face from them, * and I will consider their very end:'
      - type: citation
        text: 32:30 For this is a perverse generation, * and they are unfaithful sons.
      - type: citation
        text: '32:31 They have provoked me with that which was not God, * and they have angered me with their emptiness:'
      - type: citation
        text: 32:32 And so I will provoke them with that which is not a people, * and I will anger them with a foolish nation.
      - type: citation
        text: '32:33 A fire has been kindled in my fury, * and it will burn even to the deepest Hell:'
      - type: citation
        text: 32:34 It will devour the earth with its produce, * and it will burn the foundations of the mountains.
      - type: citation
        text: 32:35 I will heap evils upon them, * and I will expend my arrows among them.
      - type: citation
        text: '32:36 They will be consumed by famine, * and birds with a very bitter bite will devour them:'
      - type: citation
        text: 32:37 I will send forth the teeth of wild beasts among them, * with the fury of creatures that scurry across the ground, and of serpents.
      - type: citation
        text: 32:38 Outside, the sword will devastate them, and inside there will be dread, * for the young man as much as for the maiden, for the nursing child as much as for the old man.
      - type: citation
        text: '32:39 I said: Where are they? * I will cause their memory to cease from among men.'
      - type: citation
        text: '32:40 But because of the wrath of the enemies I have delayed it: * lest perhaps their enemies would be arrogant,'
      - type: citation
        text: '32:41 And would say: Our exalted hand, and not the Lord, * has done all these things.'
      - type: citation
        text: 32:42 They are a nation without counsel and without prudence. * Would that they were wise and understanding, and would provide for their very end.
      - type: citation
        text: 32:43 How is it that one pursues a thousand, * and two put ten thousand to flight?
      - type: citation
        text: 32:44 Is it not because their God has sold them, * and the Lord has enclosed them?
      - type: citation
        text: '32:45 For our God is not like their gods: * and our enemies are judges.'
      - type: citation
        text: '32:46 Their vine is of the vines of Sodom, * and from the suburbs of Gomorrah:'
      - type: citation
        text: 32:47 Their grapes are the grapes of gall, * and their grape clusters are most bitter.
      - type: citation
        text: 32:48 Their wine is the gall of snakes, * and it is the incurable venom of asps.
      - type: citation
        text: 32:49 Have not these things been stored up with me, * and sealed up amid my treasures?
      - type: citation
        text: '32:50 Vengeance is mine, and I will repay them in due time, * so that their foot may slip and fall:'
      - type: citation
        text: 32:51 The day of perdition is near, * and the time rushes to appear.
      - type: citation
        text: '32:52 The Lord will judge his people, * and he will take pity on his servants:'
      - type: citation
        text: 32:53 He will see that their hand has been weakened, * and that those who have been enclosed have likewise failed, and those who have been left behind have been consumed.
      - type: citation
        text: '32:54 And he shall say: Where are their gods, * in whom they had confidence?'
      - type: citation
        text: '32:55 They ate the fat of their victims, * and drank the wine of their libations:'
      - type: citation
        text: 32:56 Let these rise up, and bring relief to you, * and protect you in your distress.
      - type: citation
        text: '32:57 See that I am alone, * and there is no other God beside me:'
      - type: citation
        text: 32:58 I will kill, and I will cause to live; I will strike, and I will heal, * and there is no one who is able to rescue from my hand.
      - type: citation
        text: '32:59 I will lift up my hand to heaven, and I will say: * I live in eternity.'
      - type: citation
        text: '32:60 When I sharpen my sword like lightning, * and my hand takes hold of judgment:'
      - type: citation
        text: 32:61 I will render vengeance to my enemies, * and I will repay those who hate me.
      - type: citation
        text: 32:62 I will inebriate my arrows with blood, * and my sword will devour flesh,
      - type: citation
        text: 32:63 From the blood of the slain, * and from the captive, from the exposed head of the enemies.
      - type: citation
        text: '32:64 You nations, praise his people, * for he will avenge the blood of his servants:'
      - type: citation
        text: 32:65 And he will distribute vengeance to their enemies, * and he will be merciful to the land of his people.
  psalm.canticum-moysis-exod-15-1-22-4c1d80f9a6:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Moses
      - type: citation
        text: Exod. 15:1-22
      - type: citation
        text: '15:1 Let us sing to the Lord: for he is gloriously magnified, * the horse and the rider he hath thrown into the sea.'
      - type: citation
        text: '15:2 The Lord is my strength and my praise, * and he is become salvation to me:'
      - type: citation
        text: '15:3 He is my God and I will glorify him: * the God of my father, and I will exalt him.'
      - type: citation
        text: '15:4 The Lord is as a man of war, Almighty is his name. * Pharao’s chariots and his army he hath cast into the sea:'
      - type: citation
        text: 15:5 His chosen captains are drowned in the Red Sea. * The depths have covered them, they are sunk to the bottom like a stone.
      - type: citation
        text: '15:6 Thy right hand, O Lord, is magnified in strength: thy right hand, O Lord, hath slain the enemy. * And in the multitude of thy glory thou hast put down thy adversaries:'
      - type: citation
        text: '15:7 Thou hast sent thy wrath, which hath devoured them like stubble. * And with the blast of thy anger the waters were gathered together:'
      - type: citation
        text: 15:8 The flowing water stood, * the depths were gathered together in the midst of the sea.
      - type: citation
        text: '15:9 The enemy said: I will pursue and overtake, * I will divide the spoils, my soul shall have its fill:'
      - type: citation
        text: 15:10 I will draw my sword, * my hand shall slay them.
      - type: citation
        text: '15:11 Thy wind blew and the sea covered them: * they sunk as lead in the mighty waters.'
      - type: citation
        text: 15:12 Who is like to thee, among the strong, O Lord? * who is like to thee, glorious in holiness, terrible and praiseworthy, doing wonders?
      - type: citation
        text: '15:13 Thou stretchedst forth thy hand, and the earth swallowed them. * In thy mercy thou hast been a leader to the people which thou hast redeemed:'
      - type: citation
        text: 15:14 And in thy strength thou hast carried them * to thy holy habitation.
      - type: citation
        text: '15:15 Nations rose up, and were angry: * sorrows took hold on the inhabitants of Philisthiim.'
      - type: citation
        text: '15:16 Then were the princes of Edom troubled, trembling seized on the stout men of Moab: * all the inhabitants of Chanaan became stiff.'
      - type: citation
        text: '15:17 Let fear and dread fall upon them, * in the greatness of thy arm:'
      - type: citation
        text: '15:18 Let them become unmoveable as a stone, until thy people, O Lord, pass by: * until this thy people pass by, which thou hast possessed.'
      - type: citation
        text: 15:19 Thou shalt bring them in, and plant them in the mountain of thy inheritance, * in thy most firm habitation which thou hast made, O Lord;
      - type: citation
        text: 15:20 Thy sanctuary, O Lord, which thy hands have established. * The Lord shall reign for ever and ever.
      - type: citation
        text: '15:21 For Pharao went in on horseback with his chariots and horsemen into the sea: * and the Lord brought back upon them the waters of the sea:'
      - type: citation
        text: 15:22 But the children of Israel walked on dry ground * in the midst thereof.
      la:
      - type: heading
        text: Canticum Moysis
      - type: citation
        text: Exod. 15:1-22
      - type: citation
        text: '15:1 Cantémus Dómino: glorióse enim magnificátus est, * equum et ascensórem deiécit in mare.'
      - type: citation
        text: 15:2 Fortitúdo mea, et laus mea Dóminus, * et factus est mihi in salútem.
      - type: citation
        text: '15:3 Iste Deus meus, et glorificábo eum: * Deus patris mei, et exaltábo eum.'
      - type: citation
        text: 15:4 Dóminus quasi vir pugnátor, Omnípotens nomen eius. * Currus Pharaónis et exércitum eius proiécit in mare.
      - type: citation
        text: '15:5 Elécti príncipes eius submérsi sunt in Mari Rubro: * abýssi operuérunt eos, descendérunt in profúndum quasi lapis.'
      - type: citation
        text: '15:6 Déxtera tua, Dómine, magnificáta est in fortitúdine: déxtera tua, Dómine, percússit inimícum. * Et in multitúdine glóriæ tuæ deposuísti adversários tuos:'
      - type: citation
        text: '15:7 Misísti iram tuam, quæ devorávit eos sicut stípulam. * Et in spíritu furóris tui congregátæ sunt aquæ:'
      - type: citation
        text: 15:8 Stetit unda fluens, * congregátæ sunt abýssi in médio mari.
      - type: citation
        text: '15:9 Dixit inimícus: Pérsequar et comprehéndam, * dívidam spólia, implébitur ánima mea:'
      - type: citation
        text: 15:10 Evaginábo gládium meum, * interfíciet eos manus mea.
      - type: citation
        text: '15:11 Flavit spíritus tuus, et opéruit eos mare: * submérsi sunt quasi plumbum in aquis veheméntibus.'
      - type: citation
        text: 15:12 Quis símilis tui in fórtibus, Dómine? * quis símilis tui, magníficus in sanctitáte, terríbilis atque laudábilis, fáciens mirabília?
      - type: citation
        text: '15:13 Extendísti manum tuam, et devorávit eos terra. * Dux fuísti in misericórdia tua pópulo quem redemísti:'
      - type: citation
        text: 15:14 Et portásti eum in fortitúdine tua, * ad habitáculum sanctum tuum.
      - type: citation
        text: '15:15 Ascendérunt pópuli, et iráti sunt: * dolóres obtinuérunt habitatóres Philísthiim.'
      - type: citation
        text: '15:16 Tunc conturbáti sunt príncipes Edom, robústos Moab obtínuit tremor: * obriguérunt omnes habitatóres Chánaan.'
      - type: citation
        text: '15:17 Írruat super eos formído et pavor, * in magnitúdine brácchii tui:'
      - type: citation
        text: 15:18 Fiant immóbiles quasi lapis, donec pertránseat pópulus tuus, Dómine, * donec pertránseat pópulus tuus iste, quem possedísti.
      - type: citation
        text: '15:19 Introdúces eos, et plantábis in monte hereditátis tuæ, * firmíssimo habitáculo tuo quod operátus es, Dómine:'
      - type: citation
        text: 15:20 Sanctuárium tuum, Dómine, quod firmavérunt manus tuæ. * Dóminus regnábit in ætérnum et ultra.
      - type: citation
        text: '15:21 Ingréssus est enim eques Phárao cum cúrribus et equítibus eius in mare: * et redúxit super eos Dóminus aquas maris:'
      - type: citation
        text: 15:22 Fílii autem Israël ambulavérunt per siccum * in médio eius.
      en2:
      - type: heading
        text: Canticle of Moses
      - type: citation
        text: Exod. 15:1-22
      - type: citation
        text: '15:1 Let us sing to the Lord, for he has been gloriously magnified: * the horse and the rider he has cast into the sea.'
      - type: citation
        text: 15:2 The Lord is my strength and my praise, * and he has become my salvation.
      - type: citation
        text: '15:3 He is my God, and I shall glorify him: * the God of my father, and I will exalt him.'
      - type: citation
        text: 15:4 The Lord is like a fighting man; Almighty is his name. * The chariots of Pharaoh and his army he has cast into the sea.
      - type: citation
        text: '15:5 His elect leaders have been submerged in the Red Sea: * the abyss has covered them; they descended into the depths like a stone.'
      - type: citation
        text: '15:6 Your right hand, O Lord, has been magnified in strength; your right hand, O Lord, has struck down the enemy. * And in the multitude of your glory you have put down your adversaries:'
      - type: citation
        text: '15:7 You sent out your wrath, which devoured them like stubble. * And by the breath of your fury the waters were gathered together:'
      - type: citation
        text: 15:8 The flowing waves stood still, * the abyss was gathered into the midst of the sea.
      - type: citation
        text: '15:9 The enemy said: I will pursue and overtake them, * I will divide the spoils; my soul will be filled:'
      - type: citation
        text: 15:10 I will unsheathe my sword, * my hand will put them to death.
      - type: citation
        text: '15:11 Your breath blew, and the sea covered them: * they were submerged like lead into the mighty waters.'
      - type: citation
        text: 15:12 Who is like you in strength, O Lord? * Who is like you, magnificent in sanctity, terrible and yet praiseworthy, accomplishing miracles?
      - type: citation
        text: '15:13 You extended your hand, and the earth devoured them. * In your mercy you have been a leader to the people whom you have redeemed:'
      - type: citation
        text: 15:14 And in your strength you have carried them * to your holy dwelling place.
      - type: citation
        text: '15:15 Peoples rose up and became angry: * sorrows took hold of the inhabitants of Philistia.'
      - type: citation
        text: '15:16 Then the leaders of Edom were stirred up, trembling took hold of the robust of Moab: * all the inhabitants of Canaan were petrified.'
      - type: citation
        text: '15:17 Let fear and dread fall upon them, * by the magnitude of your arm:'
      - type: citation
        text: 15:18 Let them become immobilized like stone, until your people cross through, O Lord, * until this, your people whom you possess, cross through.
      - type: citation
        text: '15:19 You shall lead them in and plant them on the mountain of your inheritance, * in your most firm dwelling place which you have formed, O Lord:'
      - type: citation
        text: 15:20 Your sanctuary, O Lord, which your hands have made firm. * The Lord will reign in eternity and beyond.
      - type: citation
        text: '15:21 For the rider Pharaoh, with his chariots and horsemen, entered the sea: * and the Lord brought back upon them the waters of the sea.'
      - type: citation
        text: 15:22 But the sons of Israel walked across dry ground * in its midst.
  psalm.canticum-ose-osea-6-1-6-683fbf2397:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Osee
      - type: citation
        text: Osea 6:1-6
      - type: citation
        text: '6:1 Come, and let us return to the Lord: for he hath taken us, and he will heal us: he will strike, and he will cure us.'
      - type: citation
        text: '6:3 He will revive us after two days: on the third day he will raise us up, and we shall live in his sight.'
      - type: citation
        text: 6:3 We shall know, and we shall follow on, that we may know the Lord.
      - type: citation
        text: 6:3 His going forth is prepared as the morning light, and he will come to us as the early and the latter rain to the earth.
      - type: citation
        text: 6:4 What shall I do to thee, O Ephraim? what shall I do to thee, O Juda? your mercy is as a morning cloud, and as the dew that goeth away in the morning.
      - type: citation
        text: '6:5 For this reason have I hewed them by the prophets, I have slain them by the words of my mouth: and thy judgments shall go forth as the light.'
      - type: citation
        text: '6:6 For I desired mercy, and not sacrifice: and the knowledge of God more than holocausts.'
      la:
      - type: heading
        text: Canticum Oseæ
      - type: citation
        text: Osea 6:1-6
      - type: citation
        text: 6:1 Veníte, et revertámur ad Dóminum, † quia ipse cepit, et sanábit nos; * percútiet, et curábit nos.
      - type: citation
        text: 6:3 Vivificábit nos post duos dies; † in die tértia suscitábit nos, * et vivémus in conspéctu eius.
      - type: citation
        text: 6:3 Sciémus, sequemúrque, * ut cognoscámus Dóminum.
      - type: citation
        text: 6:3 Quasi dilúculum præparátus est egréssus eius, * et véniet quasi imber nobis temporáneus et serótinus terræ.
      - type: citation
        text: 6:4 Quid fáciam tibi, Ephraim? quid fáciam tibi, Iuda? † misericórdia vestra quasi nubes matutína, * et quasi ros mane pertránsiens.
      - type: citation
        text: '6:5 Propter hoc dolávi in prophétis; † occídi eos in verbis oris mei: * et iudícia tua quasi lux egrediéntur.'
      - type: citation
        text: 6:6 Quia misericórdiam vólui, et non sacrifícium; * et sciéntiam Dei plus quam holocáusta.
      en2:
      - type: heading
        text: Canticle of Hosea
      - type: citation
        text: Osea 6:1-6
      - type: citation
        text: 6:1 Come, let us return to the Lord, † for he has seized us, and he will heal us; * he will strike, and he will cure us.
      - type: citation
        text: 6:3 He will revive us after two days; † on the third day he will raise us up, * and we will live in his sight.
      - type: citation
        text: 6:3 We will understand, and we will continue on, * so that we may know the Lord.
      - type: citation
        text: 6:3 His landing place has been prepared like the first light of morning, * and he will come to us like the early and the late rains of the land.
      - type: citation
        text: 6:4 What am I to do with you, Ephraim? What am I to do with you, Judah? † Your mercy is like the morning mist, * and like the dew passing away in the morning.
      - type: citation
        text: '6:5 Because of this, I have cut them down with the prophets; † I have slain them with the words of my mouth: * and your judgments will go forth like the light.'
      - type: citation
        text: 6:6 For I desired mercy and not sacrifice; * and knowledge of God more than holocausts.
  psalm.canticum-proverb-prov-9-1-6-10-12-0771c73fd6:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Proverb
      - type: citation
        text: Prov. 9:1-6, 10-12
      - type: citation
        text: 9:1 Wisdom has built herself a house, she has hewn her out seven pillars.
      - type: citation
        text: 9:2 She has slain her victims, mingled her wine, and set forth her table.
      - type: citation
        text: '9:3 She has sent her maids to invite to the tower, and to the walls of the city:'
      - type: citation
        text: '9:4 Whosoever is a little one, let him come to me. And to the unwise she said:'
      - type: citation
        text: 9:5 Come, eat my bread, and drink the wine which I have mingled for you.
      - type: citation
        text: 9:6 Forsake childishness, and live, and walk by the ways of prudence.
      - type: citation
        text: '9:10 The fear of the Lord is the beginning of wisdom: and the knowledge of the holy is prudence.'
      - type: citation
        text: 9:11 For by me shall your days be multiplied, and years of life shall be added to you.
      - type: citation
        text: '9:12 If you be wise, you shall be so to yourself: and if a scorner, you alone shall bear the evil.'
      la:
      - type: heading
        text: Canticum Proverb
      - type: citation
        text: Prov. 9:1-6, 10-12
      - type: citation
        text: '9:1 Sapiéntia ædificávit sibi domum: * excídit colúmnas septem.'
      - type: citation
        text: 9:2 Immolávit víctimas suas, * míscuit vinum, et propósuit mensam suam.
      - type: citation
        text: 9:3 Misit ancíllas suas ut vocárent ad arcem, * et ad mœnia civitátis.
      - type: citation
        text: '9:4 Si quis est párvulus, véniat ad me. * Et insipiéntibus locúta est:'
      - type: citation
        text: 9:5 Veníte, comédite panem meum, * et bíbite vinum quod míscui vobis.
      - type: citation
        text: 9:6 Relínquite infántiam, et vívite, * et ambuláte per vias prudéntiæ.
      - type: citation
        text: 9:10 Princípium sapiéntiæ timor Dómini, * et sciéntia sanctórum prudéntia.
      - type: citation
        text: 9:11 Per me enim multiplicabúntur dies tui, * et addéntur tibi anni vitæ.
      - type: citation
        text: 9:12 Si sápiens fúeris, tibimetípsi eris; * si autem illúsor, solus portábis malum.
      en2:
      - type: heading
        text: Canticle of Proverbs
      - type: citation
        text: Prov. 9:1-6, 10-12
      - type: citation
        text: '9:1 Wisdom has built a house for herself: * she has hewn seven columns.'
      - type: citation
        text: 9:2 She has immolated her victims, * she has mixed her wine and set forth her table.
      - type: citation
        text: 9:3 She has sent her maids to call out to the tower * and to the walls of the city.
      - type: citation
        text: '9:4 If anyone is little, let him come to me. * And to the unwise she has said:'
      - type: citation
        text: 9:5 Come, eat my bread, * and drink the wine that I have mixed for you.
      - type: citation
        text: 9:6 Leave behind childishness, and live, * and walk by the ways of prudence.
      - type: citation
        text: 9:10 The fear of the Lord is the beginning of wisdom, * and knowledge of holiness is prudence.
      - type: citation
        text: 9:11 For by me your days will be multiplied, * and years of life will be added to you.
      - type: citation
        text: 9:12 If you would be wise, you will be so for yourself; * but if you would be one who ridicules, you alone shall carry the evil.
  psalm.canticum-quicumque-symbolum-athanasium-58d365a881:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Quicumque
      - type: citation
        text: Symbolum Athanasium
      - type: text
        text: |-
          Whosoever willeth to be saved, * before all things it is necessary that he hold the Catholic faith.
          Which faith except every one do keep whole and undefiled, * without doubt he shall perish eternally.
          Now the Catholic faith is this, * that we worship one God in Trinity, and Trinity in Unity.
          Neither confounding the Persons, * nor dividing the substance.
          For there is one Person of the Father, another of the Son, * and another of the Holy Ghost.
          But the Godhead of the Father, of the Son, and of the Holy Ghost is one, * the Glory Equal, the Majesty Co-Eternal.
          Such as the Father is, such is the Son, * and such is the Holy Ghost.
          The Father Uncreated, the Son Uncreated, * and the Holy Ghost Uncreated.
          The Father Infinite, the Son Infinite, * and the Holy Ghost Infinite. * The Father Eternal, the Son Eternal, * and the Holy Ghost Eternal.
          And yet they are not three Eternals, * but one Eternal.
          As also they are not three Uncreated, nor three Infinites, * but One Uncreated, and One Infinite.
          So likewise the Father is Almighty, the Son Almighty, * and the Holy Ghost Almighty.
          And yet they are not three Almighties, * but One Almighty.
          So the Father is God, the Son God, * and the Holy Ghost God.
          And yet they are not three Gods, * but One God.
          So the Father is Lord, the Son Lord, * and the Holy Ghost Lord.
          And yet they are not three Lords, * but One Lord.
          For, like as we are compelled by Christian truth to acknowledge every Person by Himself to be God and Lord, * so are we forbidden by the Catholic Religion to say, there be three Gods or three Lords.
          The Father is made of none, * neither created, nor begotten.
          The Son is of the Father alone: * not made, nor created, but begotten.
          The Holy Ghost is of the Father, and the Son: * not made, nor created, nor begotten, but proceeding.
          So there is One Father, not three Fathers; one Son, not three Sons; * one Holy Ghost, not three Holy Ghosts.
          And in this Trinity is nothing afore or after, nothing is greater or less; * but the whole three Persons are Co-Eternal together, and Co-Equal.
          So that in all things, as is aforesaid, * the Unity in Trinity, and the Trinity in Unity is to be worshipped.
          He therefore that willeth to be safe, * let him thus think of the Trinity.
          But it is necessary to eternal salvation, * that he also believe faithfully the Incarnation of our Lord Jesus Christ.
          The right Faith therefore is, that we believe and confess, * that our Lord Jesus Christ, the Son of God, is God and man.
          God, of the Substance of the Father, Begotten before the worlds: * and Man, of the substance of His mother, born in the world.
          Perfect God, Perfect Man, * of a reasoning soul and human flesh subsisting.
          Equal to the Father as touching His Godhead, * inferior to the Father as touching His Manhood.
          Who, although He be God and Man, * yet He is not two, but One Christ.
          One, however, not by conversion of the Godhead into Flesh, * but by taking of the Manhood into God.
          One altogether, not by confusion of Substance, * but by Unity of Person.
          For as the reasoning soul and flesh is one man, * so God and man is One Christ.
          Who suffered for our salvation, descended into hell, * rose again the third day from the dead.
          He ascended into heaven, He sitteth on the right hand of the Father, God Almighty, * from whence He shall come to judge the quick and the dead.
          At whose coming all men shall rise again with their bodies, * and shall give account for their own works.
          And they that have done good shall go into life eternal, * but they that have done evil into eternal fire.
          This is the Catholic Faith, * which except a man believe faithfully and firmly, he cannot be safe.
      la:
      - type: heading
        text: Canticum Quicumque
      - type: citation
        text: Symbolum Athanasium
      - type: text
        text: |-
          Quicúmque vult salvus esse, * ante ómnia opus est, ut téneat cathólicam fidem:
          Quam nisi quisque íntegram inviolatámque serváverit, * absque dúbio in ætérnum períbit.
          Fides autem cathólica hæc est: * ut unum Deum in Trinitáte, et Trinitátem in unitáte venerémur.
          Neque confundéntes persónas, * neque substántiam separántes.
          Alia est enim persóna Patris, ália Fílii, * ália Spíritus Sancti:
          Sed Patris, et Fílii, et Spíritus Sancti una est divínitas, * æquális glória, coætérna maiéstas.
          Qualis Pater, talis Fílius, * talis Spíritus Sanctus.
          Increátus Pater, increátus Fílius, * increátus Spíritus Sanctus.
          Imménsus Pater, imménsus Fílius, * imménsus Spíritus Sanctus.
          Ætérnus Pater, ætérnus Fílius, * ætérnus Spíritus Sanctus.
          Et tamen non tres ætérni, * sed unus ætérnus.
          Sicut non tres increáti, nec tres imménsi, * sed unus increátus, et unus imménsus.
          Simíliter omnípotens Pater, omnípotens Fílius, * omnípotens Spíritus Sanctus.
          Et tamen non tres omnipoténtes, * sed unus omnípotens.
          Ita Deus Pater, Deus Fílius, * Deus Spíritus Sanctus.
          Et tamen non tres Dii, * sed unus est Deus.
          Ita Dóminus Pater, Dóminus Fílius, * Dóminus Spíritus Sanctus.
          Et tamen non tres Dómini, * sed unus est Dóminus.
          Quia, sicut singillátim unamquámque persónam Deum ac Dóminum confitéri christiána veritáte compéllimur: * ita tres Deos aut Dóminos dícere cathólica religióne prohibémur.
          Pater a nullo est factus: * nec creátus, nec génitus.
          Fílius a Patre solo est: * non factus, nec creátus, sed génitus.
          Spíritus Sanctus a Patre et Fílio: * non factus, nec creátus, nec génitus, sed procédens.
          Unus ergo Pater, non tres Patres: unus Fílius, non tres Fílii: * unus Spíritus Sanctus, non tres Spíritus Sancti.
          Et in hac Trinitáte nihil prius aut postérius, nihil maius aut minus: * sed totæ tres persónæ coætérnæ sibi sunt et coæquáles.
          Ita ut per ómnia, sicut iam supra dictum est, * et únitas in Trinitáte, et Trínitas in unitáte veneránda sit.
          Qui vult ergo salvus esse, * ita de Trinitáte séntiat.
          Sed necessárium est ad ætérnam salútem, * ut Incarnatiónem quoque Dómini nostri Iesu Christi fidéliter credat.
          Est ergo fides recta ut credámus et confiteámur, * quia Dóminus noster Iesus Christus, Dei Fílius, Deus et homo est.
          Deus est ex substántia Patris ante sǽcula génitus: * et homo est ex substántia matris in sǽculo natus.
          Perféctus Deus, perféctus homo: * ex ánima rationáli et humána carne subsístens.
          Æquális Patri secúndum divinitátem: * minor Patre secúndum humanitátem.
          Qui licet Deus sit et homo, * non duo tamen, sed unus est Christus.
          Unus autem non conversióne divinitátis in carnem, * sed assumptióne humanitátis in Deum.
          Unus omníno, non confusióne substántiæ, * sed unitáte persónæ.
          Nam sicut ánima rationális et caro unus est homo: * ita Deus et homo unus est Christus.
          Qui passus est pro salúte nostra: descéndit ad ínferos: * tértia die resurréxit a mórtuis.
          Ascéndit ad cælos, sedet ad déxteram Dei Patris omnipoténtis: * inde ventúrus est iudicáre vivos et mórtuos.
          Ad cuius advéntum omnes hómines resúrgere habent cum corpóribus suis; * et redditúri sunt de factis própriis ratiónem.
          Et qui bona egérunt, ibunt in vitam ætérnam: * qui vero mala, in ignem ætérnum.
          Hæc est fides cathólica, * quam nisi quisque fidéliter firmitérque credíderit, salvus esse non póterit.
      en2:
      - type: heading
        text: Canticle of the Athanasian Creed
      - type: citation
        text: Athanasian Creed
      - type: text
        text: |-
          Whoever wishes to be saved, * before all things it is necessary that he hold the Catholic faith:
          For unless each one preserves it whole and inviolate, * without doubt he will perish forever.
          Now the Catholic faith is this: * that we worship one God in the Trinity, and the Trinity in unity.
          Not confounding the Persons, * nor dividing the substance.
          For the Person of the Father is one, that of the Son another, * that of the Holy Spirit another:
          But the divinity of the Father, and of the Son, and of the Holy Spirit is one, * equal in glory, coeternal in majesty.
          Such as the Father is, such is the Son, * such is the Holy Spirit.
          Uncreated the Father, uncreated the Son, * uncreated the Holy Spirit.
          Immeasurable the Father, immeasurable the Son, * immeasurable the Holy Spirit.
          Eternal the Father, eternal the Son, * eternal the Holy Spirit.
          And yet there are not three eternal, * but one eternal.
          Just as there are not three uncreated, nor three immeasurable, * but one uncreated and one immeasurable.
          Likewise almighty the Father, almighty the Son, * almighty the Holy Spirit.
          And yet there are not three almighty, * but one almighty.
          Thus God the Father, God the Son, * God the Holy Spirit.
          And yet there are not three Gods, * but one God.
          Thus Lord the Father, Lord the Son, * Lord the Holy Spirit.
          And yet there are not three Lords, * but one Lord.
          For just as we are compelled by Christian truth to confess each Person individually as God and Lord: * so we are forbidden by the Catholic faith to say there are three Gods or three Lords.
          The Father was made by no one: * neither created nor begotten.
          The Son is from the Father alone: * not made, nor created, but begotten.
          The Holy Spirit is from the Father and the Son: * not made, nor created, nor begotten, but proceeding.
          There is therefore one Father, not three Fathers: one Son, not three Sons: * one Holy Spirit, not three Holy Spirits.
          And in this Trinity there is nothing prior or subsequent, nothing greater or lesser: * but all three Persons are coeternal with one another and coequal.
          So that in all things, as has already been said above, * both the unity in the Trinity and the Trinity in unity is to be worshipped.
          Whoever, therefore, wishes to be saved, * let him think thus concerning the Trinity.
          But it is necessary for eternal salvation * that he also faithfully believe in the Incarnation of our Lord Jesus Christ.
          The right faith, therefore, is that we believe and confess, * that our Lord Jesus Christ, the Son of God, is God and man.
          He is God, begotten of the substance of the Father before all ages: * and he is man, born of the substance of his mother in this age.
          Perfect God, perfect man: * subsisting of a rational soul and human flesh.
          Equal to the Father according to his divinity: * lesser than the Father according to his humanity.
          Who, though he is God and man, * is yet not two, but one Christ.
          One, however, not by the conversion of divinity into flesh, * but by the assumption of humanity into God.
          One altogether, not by confusion of substance, * but by unity of person.
          For just as a rational soul and flesh make one man: * so God and man make one Christ.
          Who suffered for our salvation: he descended into hell: * on the third day he rose again from the dead.
          He ascended into heaven, he sits at the right hand of God the Father almighty: * from there he will come to judge the living and the dead.
          At whose coming all men must rise again with their bodies; * and they are to render an account of their own deeds.
          And those who have done good will go into eternal life: * but those who have done evil, into eternal fire.
          This is the Catholic faith, * which unless each one believes faithfully and firmly, he will not be able to be saved.
  psalm.canticum-sap-3-7-9-155403b655:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Sapientiae
      - type: citation
        text: Sap 3:7-9
      - type: citation
        text: 3:7 The just shall shine, * and shall run to and fro like sparks among the reeds.
      - type: citation
        text: 3:8 They shall judge nations, and rule over people, * and their Lord shall reign forever.
      - type: citation
        text: '3:9 They that trust in him, shall understand the truth: * and they that are faithful in love shall rest in him:'
      - type: citation
        text: 3:9 For grace * and peace is to his elect.
      la:
      - type: heading
        text: Canticum
      - type: citation
        text: Sap 3:7-9
      - type: citation
        text: 3:7 Fulgébunt iusti, * et tamquam scintíllæ in arundinéto discúrrent.
      - type: citation
        text: 3:8 Iudicábunt natiónes, et dominabúntur pópulis, * et regnábit Dóminus illórum in perpétuum.
      - type: citation
        text: '3:9 Qui confídunt in illo, intélligent veritátem, * et fidéles in dilectióne acquiéscent illi:'
      - type: citation
        text: 3:9 Quóniam donum * et pax est eléctis eius.
      en2:
      - type: heading
        text: Canticle
      - type: citation
        text: Sap 3:7-9
      - type: citation
        text: 3:7 The just will shine, * and they will dash about like sparks among stubble.
      - type: citation
        text: 3:8 They will judge the nations and rule over the people, * and their Lord will reign forever.
      - type: citation
        text: '3:9 Those who trust in him will understand the truth, * and those who are faithful in love will rest in him:'
      - type: citation
        text: 3:9 For grace * and peace is for his elect.
  psalm.canticum-sapienti-sap-16-20-21-26-29-17-1-74faaef3f4:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Sapientiæ
      - type: citation
        text: Sap 16:20-21, 26, 29; 17:1
      - type: citation
        text: 16:20 You did feed your people with the food of angels, and gave them bread from heaven prepared without labour,
      - type: citation
        text: 16:20 Having in it all that is delicious, and the sweetness of every taste.
      - type: citation
        text: '16:21 For your sustenance shewed your sweetness to your children:'
      - type: citation
        text: 16:21 And serving every man’s will, it was turned to what every man liked.
      - type: citation
        text: 16:26 That your children, O Lord, whom you loved, might know that it is not the growing of fruits that nourishes men, but your word preserves them that believe in you.
      - type: citation
        text: 16:29 For the hope of the unthankful shall melt away as the winter’s ice, and shall run off as unprofitable water.
      - type: citation
        text: '17:1 For your judgments, O Lord, are great, and your words cannot be expressed: therefore undisciplined souls have erred.'
      la:
      - type: heading
        text: Canticum Sapientiæ
      - type: citation
        text: Sap 16:20-21, 26, 29; 17:1
      - type: citation
        text: 16:20 Angelórum esca nutrivísti pópulum tuum, * et parátum panem de cælo præstitísti illis sine labóre,
      - type: citation
        text: 16:20 Omne delectaméntum in se habéntem, * et omnis sapóris suavitátem.
      - type: citation
        text: '16:21 Substántia enim tua dulcédinem tuam, * quam in fílios habes, ostendébat:'
      - type: citation
        text: 16:21 Et desérviens uniuscuiúsque voluntáti, * ad quod quisque volébat convertebátur.
      - type: citation
        text: 16:26 Ut scirent fílii tui quos dilexísti, Dómine, † quóniam non nativitátis fructus pascunt hómines, * sed sermo tuus hos qui in te credíderint consérvat.
      - type: citation
        text: 16:29 Ingráti enim spes tamquam hibernális glácies tabéscet, * et dispériet tamquam aqua supervácua.
      - type: citation
        text: '17:1 Magna sunt enim iudícia tua, Dómine, † et inenarrabília verba tua: * propter hoc indisciplinátæ ánimæ erravérunt.'
      en2:
      - type: heading
        text: Canticle of Wisdom
      - type: citation
        text: Sap 16:20-21, 26, 29; 17:1
      - type: citation
        text: 16:20 You nourished your people with the food of angels, * and, having prepared bread from heaven, you served them without labor,
      - type: citation
        text: 16:20 That which holds within itself every delight, * and the sweetness of every flavor.
      - type: citation
        text: '16:21 For your nature showed your sweetness, * which you hold within your sons:'
      - type: citation
        text: 16:21 And serving the will of each one, * it was converted to what each one preferred.
      - type: citation
        text: 16:26 That your sons might know, whom you loved, O Lord, † that it is not the fruits of nature which feed men, * but your word which preserves those who believe in you.
      - type: citation
        text: 16:29 For the hope of the ungrateful will melt away like the winter's ice, * and will disperse like overflowing water.
      - type: citation
        text: '17:1 For your judgments, O Lord, are great, † and your words are indescribable: * therefore undisciplined souls have wandered astray.'
  psalm.canticum-sapienti-sap-3-1-6-4b0c1bc770:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Sapientiae
      - type: citation
        text: Sap 3:1-6
      - type: citation
        text: 3:1 But the souls of the just are in the hand of God, * and the torment of death shall not touch them.
      - type: citation
        text: '3:2 In the sight of the unwise they seemed to die: * and their departure was taken for misery:'
      - type: citation
        text: '3:3 And their going away from us, for utter destruction: * but they are in peace.'
      - type: citation
        text: 3:4 And though in the sight of men they suffered torments, * their hope is full of immortality.
      - type: citation
        text: '3:5 Afflicted in few things, in many they shall be well rewarded: * because God hath tried them, and found them worthy of himself.'
      - type: citation
        text: 3:6 As gold in the furnace he hath proved them, † and as a victim of a holocaust he hath received them, * and in time there shall be respect had to them
      la:
      - type: heading
        text: Canticum Sapientiæ
      - type: citation
        text: Sap 3:1-6
      - type: citation
        text: 3:1 Iustórum autem ánimæ in manu Dei sunt, * et non tangent illos torméntum mortis.
      - type: citation
        text: 3:2 Visi sunt óculis insipiéntium mori, * et æstimáta est afflíctio éxitus illórum,
      - type: citation
        text: '3:3 Et quod a nobis est iter extermínium; * illi autem sunt in pace:'
      - type: citation
        text: 3:4 Etsi coram homínibus torménta passi sunt, * spes illórum immortalitáte plena est.
      - type: citation
        text: 3:5 In paucis vexáti, in multis bene disponéntur, * quóniam Deus tentávit eos, et invénit illos dignos se.
      - type: citation
        text: 3:6 Tamquam aurum in fornáce probávit illos, † et quasi holocáusti hóstiam accépit illos, * et in témpore erit respéctus illórum.
      en2:
      - type: heading
        text: Canticle of Wisdom
      - type: citation
        text: Sap 3:1-6
      - type: citation
        text: 3:1 But the souls of the just are in the hand of God, * and no torment of death will touch them.
      - type: citation
        text: 3:2 In the eyes of the foolish they seemed to die, * and their departure was considered an affliction,
      - type: citation
        text: '3:3 And their going away from us a banishment; * yet they are in peace:'
      - type: citation
        text: 3:4 And though, in the sight of men, they suffered torments, * their hope is full of immortality.
      - type: citation
        text: 3:5 Troubled in few things, in many things they will be well compensated, * for God has tested them and found them worthy of himself.
      - type: citation
        text: 3:6 Like gold in the furnace he has proved them, † and as a sacrificial victim of a holocaust he has received them, * and in due time there will be consideration of them.
  psalm.canticum-simeonis-luc-2-29-32-3181b4f94a:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Simeon
      - type: citation
        text: Luke 2:29-32
      - type: citation
        text: 2:29 Now thou dost dismiss thy servant, O Lord, + * according to thy word in peace;
      - type: citation
        text: 2:30 Because my eyes have seen * thy salvation,
      - type: citation
        text: '2:31 Which thou hast prepared * before the face of all peoples:'
      - type: citation
        text: 2:32 A light to the revelation of the Gentiles, * and the glory of thy people Israel.
      la:
      - type: heading
        text: Canticum Simeonis
      - type: citation
        text: Luc. 2:29-32
      - type: citation
        text: '2:29 Nunc dimíttis + servum tuum, Dómine, * secúndum verbum tuum in pace:'
      - type: citation
        text: 2:30 Quia vidérunt óculi mei * salutáre tuum,
      - type: citation
        text: 2:31 Quod parásti * ante fáciem ómnium populórum,
      - type: citation
        text: 2:32 Lumen ad revelatiónem géntium, * et glóriam plebis tuæ Israël.
      en2:
      - type: heading
        text: Canticle of Simeon
      - type: citation
        text: Luc. 2:29-32
      - type: citation
        text: '2:29 Now you dismiss + your servant in peace, * according to your word, O Master.'
      - type: citation
        text: '2:30 For my eyes have seen * your salvation,'
      - type: citation
        text: '2:31 which you have prepared * in the sight of all the peoples:'
      - type: citation
        text: '2:32 a light for revelation to the nations, * and the glory of your people Israel.'
  psalm.canticum-sophoni-soph-3-8-13-e3a282a2f5:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Sophonee
      - type: citation
        text: Soph 3:8-13
      - type: citation
        text: '3:8 Wherefore expect me, saith the Lord, in the day of my resurrection that is to come, for my judgment is to assemble the Gentiles, and to gather the kingdoms:'
      - type: citation
        text: '3:8 And to pour upon them my indignation, all my fierce anger:'
      - type: citation
        text: 3:8 For with the fire of my jealousy shall all the earth be devoured.
      - type: citation
        text: 3:9 Because then I will restore to the people a chosen lip, that all may call upon the name of the Lord, and may serve him with one shoulder.
      - type: citation
        text: 3:10 From beyond the rivers of Ethiopia, shall my suppliants the children of my dispersed people bring me an offering.
      - type: citation
        text: '3:11 In that day thou shalt not be ashamed for all thy doings, wherein thou hast transgressed against me:'
      - type: citation
        text: 3:11 For then I will take away out of the midst of thee thy proud boasters, and thou shalt no more be lifted up because of my holy mountain.
      - type: citation
        text: '3:12 And I will leave in the midst of thee a poor and needy people: and they shall hope in the name of the Lord.'
      - type: citation
        text: '3:13 The remnant of Israel shall not do iniquity, nor speak lies, nor shall a deceitful tongue be found in their mouth:'
      - type: citation
        text: 3:13 For they shall feed, and shall lie down, and there shall be none to make them afraid..
      la:
      - type: heading
        text: Canticum Sophoniæ
      - type: citation
        text: Soph 3:8-13
      - type: citation
        text: '3:8 Exspécta me, dicit Dóminus, in die resurrectiónis meæ in futúrum: * quia iudícium meum ut cóngregem gentes, et cólligam regna,'
      - type: citation
        text: '3:8 Et effúndam super eos indignatiónem meam, * omnem iram furóris mei:'
      - type: citation
        text: 3:8 In igne enim zeli mei * devorábitur omnis terra.
      - type: citation
        text: 3:9 Quia tunc reddam pópulis lábium eléctum, † ut ínvocent omnes in nómine Dómini, * et sérviant ei húmero uno.
      - type: citation
        text: 3:10 Ultra flúmina Æthiópiæ, inde súpplices mei; * fílii dispersórum meórum déferent munus mihi.
      - type: citation
        text: '3:11 In die illa non confundéris super cunctis adinventiónibus tuis, * quibus prævaricáta es in me:'
      - type: citation
        text: 3:11 Quia tunc áuferam de médio tui magníloquos supérbiæ tuæ, * et non adiícies exaltári ámplius in monte sancto meo.
      - type: citation
        text: '3:12 Et derelínquam in médio tui pópulum páuperem et egénum: * et sperábunt in nómine Dómini.'
      - type: citation
        text: '3:13 Relíquiæ Israël non fácient iniquitátem, † nec loquéntur mendácium, * et non inveniétur in ore eórum lingua dolósa:'
      - type: citation
        text: 3:13 Quóniam ipsi pascéntur, et accubábunt, * et non erit qui extérreat.
      en2:
      - type: heading
        text: Canticle of Zephaniah
      - type: citation
        text: Soph 3:8-13
      - type: citation
        text: '3:8 Expect me, says the Lord, in the day of my resurrection in the future: * for my judgment is to gather together the nations and to collect the kingdoms,'
      - type: citation
        text: '3:8 And to pour out over them my indignation, * all the fury of my anger:'
      - type: citation
        text: 3:8 For by the fire of my zeal * all the earth will be devoured.
      - type: citation
        text: 3:9 For then I will restore to the peoples a chosen lip, † so that all may invoke the name of the Lord, * and may serve him with one shoulder.
      - type: citation
        text: 3:10 From beyond the rivers of Ethiopia, my supplicants; * the sons of my diaspora will carry a gift to me.
      - type: citation
        text: '3:11 In that day you will not be ashamed over all of your inventions, * by which you have transgressed against me:'
      - type: citation
        text: 3:11 For then I will take away from your midst your arrogant boasters of pride, * and you will no longer be exalted on my holy mountain.
      - type: citation
        text: '3:12 And I will bequeath into your midst a poor and needy people: * and they will hope in the name of the Lord.'
      - type: citation
        text: '3:13 The remnant of Israel will not do iniquity, † nor speak lies, * and a deceitful tongue will not be found in their mouth:'
      - type: citation
        text: 3:13 For they will pasture and will recline, * and there will be no one to strike them with terror.
  psalm.canticum-thren-5-1-7-15-17-19-21-ab6789fd66:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle from Lamentations
      - type: citation
        text: Lam 5:1-7,15-17,19-21
      - type: citation
        text: '5:1 Remember, O Lord, what is come upon us: * consider and behold our reproach.'
      - type: citation
        text: '5:2 Our inheritance is turned to aliens: * our houses to strangers.'
      - type: citation
        text: '5:3 We are become orphans without a father: * our mothers are as widows.'
      - type: citation
        text: '5:4 We have drunk our water for money: * we have bought our wood.'
      - type: citation
        text: 5:5 We were dragged by the necks, * we were weary and no rest was given us.
      - type: citation
        text: 5:6 We have given our hand to Egypt, and to the Assyrians, * that we might be satisfied with bread.
      - type: citation
        text: '5:7 Our fathers have sinned, and are not: * and we have borne their iniquities.'
      - type: citation
        text: 5:15 The joy of our heart is ceased, * our dancing is turned into mourning.
      - type: citation
        text: '5:16 The crown is fallen from our head: * woe to us, because we have sinned.'
      - type: citation
        text: 5:17 Therefore is our heart sorrowful, * therefore are our eyes become dim.
      - type: citation
        text: 5:19 But thou, O Lord, shalt remain for ever, * thy throne from generation to generation.
      - type: citation
        text: 5:20 Why wilt thou forget us for ever? * why wilt thou forsake us for a long time?
      - type: citation
        text: '5:21 Convert us, O Lord, to thee, and we shall be converted: * renew our days, as from the beginning.'
      la:
      - type: heading
        text: Canticum
      - type: citation
        text: Thren. 5:1-7,15-17,19-21
      - type: citation
        text: '5:1 Recordáre Dómine quid accíderit nobis: * intuére et réspice oppróbrium nostrum.'
      - type: citation
        text: 5:2 Heréditas nostra versa est ad aliénos, * domus nostræ ad extráneos.
      - type: citation
        text: 5:3 Pupílli facti sumus absque patre, * matres nostræ quasi víduæ.
      - type: citation
        text: '5:4 Aquam nostram pecúnia bíbimus: * ligna nostra prétio comparávimus.'
      - type: citation
        text: 5:5 Cervícibus nostris minabámur, * lassis non dabátur réquies.
      - type: citation
        text: 5:6 Ægýpto dédimus manum et Assýriis, * ut saturarémur pane.
      - type: citation
        text: '5:7 Patres nostri peccavérunt, et non sunt: * et nos iniquitátes eórum portávimus.'
      - type: citation
        text: '5:15 Defécit gáudium cordis nostri: * versus est in luctum chorus noster.'
      - type: citation
        text: '5:16 Cécidit coróna cápitis nostri: * væ nobis, quia peccávimus.'
      - type: citation
        text: '5:17 Proptérea mœstum factum est cor nostrum: * ídeo contenebráti sunt óculi nostri.'
      - type: citation
        text: 5:19 Tu autem Dómine in ætérnum permanébis, * sólium tuum in generatiónem et generatiónem.
      - type: citation
        text: 5:20 Quare in perpétuum obliviscéris nostri, * derelínques nos in longitúdine diérum?
      - type: citation
        text: '5:21 Convérte nos Dómine ad te, et convertémur: * ínnova dies nostros, sicut a princípio.'
      en2:
      - type: heading
        text: Canticle
      - type: citation
        text: Thren. 5:1-7,15-17,19-21
      - type: citation
        text: '5:1 Remember, O Lord, what has befallen us: * look and regard our disgrace.'
      - type: citation
        text: 5:2 Our inheritance has been turned over to foreigners, * our houses to outsiders.
      - type: citation
        text: 5:3 We have become orphans without a father, * our mothers are like widows.
      - type: citation
        text: '5:4 We paid for our drinking water: * we acquired our wood for a price.'
      - type: citation
        text: 5:5 We were dragged by our necks, * no rest was given to us in our weariness.
      - type: citation
        text: 5:6 We have given our hand to Egypt and to the Assyrians, * so that we may be satisfied with bread.
      - type: citation
        text: '5:7 Our fathers have sinned, and are no more: * and we have carried their iniquities.'
      - type: citation
        text: '5:15 The gladness of our heart has failed: * our singing has been turned into mourning.'
      - type: citation
        text: '5:16 The crown has fallen from our head: * woe to us, for we have sinned.'
      - type: citation
        text: '5:17 Because of this, our heart has become sorrowful: * and for this reason our eyes have been darkened.'
      - type: citation
        text: 5:19 But you, O Lord, shall remain for eternity, * your throne from generation to generation.
      - type: citation
        text: 5:20 Why would you forget us forever, * and forsake us for so long?
      - type: citation
        text: '5:21 Convert us, O Lord, to you, and we shall be converted: * renew our days, as from the beginning.'
  psalm.canticum-tobi-tob-13-1-11-845cf716ca:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Tobias
      - type: citation
        text: Tob. 13:1-11
      - type: citation
        text: '13:1 Thou art great, O Lord, for ever, * and thy kingdom is unto all ages:'
      - type: citation
        text: '13:2 For thou scourgest, and thou savest: thou leadest down to hell, and bringest up again: * and there is none that can escape thy hand.'
      - type: citation
        text: '13:3 Give glory to the Lord, ye children of Israel, * and praise him in the sight of the Gentiles:'
      - type: citation
        text: 13:4 Because he hath therefore scattered you among the Gentiles, who know not him, * that you may declare his wonderful works,
      - type: citation
        text: 13:5 And make them know * that there is no other almighty God besides him.
      - type: citation
        text: '13:6 He hath chastised us for our iniquities: * and he will save us for his own mercy.'
      - type: citation
        text: '13:7 See then what he hath done with us, and with fear and trembling give ye glory to him: * and extol the eternal King of worlds in your works.'
      - type: citation
        text: '13:8 As for me, I will praise him in the land of my captivity: * because he hath shewn his majesty toward a sinful nation.'
      - type: citation
        text: 13:9 Be converted therefore, ye sinners, and do justice before God, * believing that he will shew his mercy to you.
      - type: citation
        text: 13:10 And I and my soul * will rejoice in him.
      - type: citation
        text: 13:11 Bless ye the Lord, all his elect, * keep days of joy, and give glory to him.
      la:
      - type: heading
        text: Canticum Tobiæ
      - type: citation
        text: Tob. 13:1-11
      - type: citation
        text: '13:1 Magnus es, Dómine, in ætérnum, * et in ómnia sǽcula regnum tuum:'
      - type: citation
        text: '13:2 Quóniam tu flagéllas, et salvas: dedúcis ad ínferos, et redúcis: * et non est qui effúgiat manum tuam.'
      - type: citation
        text: '13:3 Confitémini Dómino, fílii Israël, * et in conspéctu géntium laudáte eum:'
      - type: citation
        text: 13:4 Quóniam ídeo dispérsit vos inter gentes, quæ ignórant eum, * ut vos enarrétis mirabília eius,
      - type: citation
        text: 13:5 Et faciátis scire eos, * quia non est álius Deus omnípotens præter eum.
      - type: citation
        text: '13:6 Ipse castigávit nos propter iniquitátes nostras: * et ipse salvábit nos propter misericórdiam suam.'
      - type: citation
        text: '13:7 Aspícite ergo quæ fecit nobíscum, et cum timóre et tremóre confitémini illi: * Regémque sæculórum exaltáte in opéribus vestris.'
      - type: citation
        text: '13:8 Ego autem in terra captivitátis meæ confitébor illi: * quóniam osténdit maiestátem suam in gentem peccatrícem.'
      - type: citation
        text: '13:9 Convertímini ítaque, peccatóres, et fácite iustítiam coram Deo, * credéntes quod fáciat vobíscum misericórdiam suam:'
      - type: citation
        text: 13:10 Ego autem, et ánima mea * in eo lætábimur.
      - type: citation
        text: '13:11 Benedícite Dóminum, omnes elécti eius: * ágite dies lætítiæ, et confitémini illi.'
      en2:
      - type: heading
        text: Canticle of Tobias
      - type: citation
        text: Tob. 13:1-11
      - type: citation
        text: '13:1 You are great, O Lord, for eternity, * and your kingdom is with all ages:'
      - type: citation
        text: '13:2 For you scourge, and you save; you lead down to the grave, and you bring up again: * and there is no one who can escape from your hand.'
      - type: citation
        text: 13:3 Confess to the Lord, O sons of Israel, * and praise him in the sight of the nations.
      - type: citation
        text: 13:4 For indeed he has dispersed you among the Gentiles, who are ignorant of him, * that you may proclaim his wonders,
      - type: citation
        text: 13:5 And that you may cause them to know * that there is no other almighty God, except him.
      - type: citation
        text: '13:6 He has chastised us because of our iniquities: * and he will save us because of his mercy.'
      - type: citation
        text: '13:7 Therefore, look upon what he has done for us, and with fear and trembling confess to him: * and extol the King of all ages with your works.'
      - type: citation
        text: '13:8 But as for me, I will confess him in the land of my captivity: * for he has revealed his majesty within a sinful nation.'
      - type: citation
        text: 13:9 And so, be converted, you sinners, and do justice in the presence of God, * believing that he will act in his mercy toward you.
      - type: citation
        text: 13:10 But I and my soul * will rejoice in him.
      - type: citation
        text: '13:11 Bless the Lord, all you his elect: * keep days of rejoicing, and confess to him.'
  psalm.canticum-tobi-tob-13-10-17-0150da972d:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticum Tobiae
      - type: citation
        text: Tob 13:10-17
      - type: citation
        text: 13:10 Bless ye the Lord, all his elect, keep days of joy, and give glory to him.
      - type: citation
        text: 13:11 Jerusalem, city of God, the Lord hath chastised thee for the works of thy hands.
      - type: citation
        text: 13:12 Give glory to the Lord for thy good things, and bless the God eternal, that he may rebuild his tabernacle in thee,
      - type: citation
        text: 13:12 And may call back all the captives to thee, and thou mayst rejoice for ever and ever.
      - type: citation
        text: '13:13 Thou shalt shine with a glorious light: and all the ends of the earth shall worship thee.'
      - type: citation
        text: '13:14 Nations from afar shall come to thee: and shall bring gifts, and shall adore the Lord in thee, and shall esteem thy land as holy.'
      - type: citation
        text: 13:15 For they shall call upon the great name in thee.
      - type: citation
        text: '13:16 They shall be cursed that shall despise thee: and they shall be condemned that shall blaspheme thee: and blessed shall they be that shall build thee up.'
      - type: citation
        text: 13:17 But thou shalt rejoice in thy children, because they shall all be blessed, and shall be gathered together to the Lord.
      la:
      - type: heading
        text: Canticum Tobiæ
      - type: citation
        text: Tob 13:10-17
      - type: citation
        text: '13:10 Benedícite Dóminum omnes elécti eius: * ágite dies lætítiæ, et confitémini illi.'
      - type: citation
        text: 13:11 Ierúsalem cívitas Dei, * castigávit te Dóminus in opéribus mánuum tuárum.
      - type: citation
        text: '13:12 Confitére Dómino in bonis tuis, * et bénedic Deum sæculórum: ut reædíficet in te tabernáculum suum,'
      - type: citation
        text: 13:12 Et révocet ad te omnes captívos, * et gáudeas in ómnia sǽcula sæculórum.
      - type: citation
        text: 13:13 Luce spléndida fulgébis, * et omnes fines terræ adorábunt te.
      - type: citation
        text: 13:14 Natiónes ex longínquo ad te vénient, * et múnera deferéntes adorábunt in te Dóminum,
      - type: citation
        text: '13:15 Et terram tuam in sanctificatiónem habébunt: * nomen enim magnum invocábunt in te.'
      - type: citation
        text: '13:16 Maledícti erunt qui contémpserint te, et condemnáti erunt omnes qui blasphemáverint te: * benedictíque erunt qui ædificáverint te.'
      - type: citation
        text: 13:17 Tu autem lætáberis in fíliis tuis, * quóniam omnes benedicéntur, et congregabúntur ad Dóminum.
      en2:
      - type: heading
        text: Canticle of Tobias
      - type: citation
        text: Tob 13:10-17
      - type: citation
        text: '13:10 Bless the Lord, all you his elect: * keep days of rejoicing, and confess to him.'
      - type: citation
        text: 13:11 O Jerusalem, the city of God, * the Lord has chastised you for the works of your hands.
      - type: citation
        text: 13:12 Confess to the Lord with your good things, and bless the God of all ages, that he may rebuild his tabernacle in you,
      - type: citation
        text: 13:12 And he may recall all the captives to you, * and you may rejoice in all ages and forever.
      - type: citation
        text: 13:13 You will shine with a splendid light, * and all the ends of the earth will adore by you.
      - type: citation
        text: 13:14 Nations from far away will come to you, * bringing gifts and adoring the Lord in you,
      - type: citation
        text: '13:15 And they will hold your land in sanctification: * for they will invoke the Great Name in you.'
      - type: citation
        text: '13:16 Those who despise you will be cursed, and all those who blaspheme by you will be condemned: * and those who build you up will be blessed.'
      - type: citation
        text: 13:17 But you will rejoice in your sons, * for they will all be blessed, and they will be gathered together for the Lord.
  psalm.canticum-trium-puerorum-dan-3-52-57-27d7882c68:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of the Three Young Men
      - type: citation
        text: Dan 3:52-57
      - type: citation
        text: '3:52 Blessed art thou, O Lord the God of our fathers: * and worthy to be praised, and glorified, and exalted above all for ever:'
      - type: citation
        text: '3:53 And blessed is the holy name of thy glory: * and worthy to be praised, and exalted above all in all ages.'
      - type: citation
        text: '3:54 Blessed art thou in the holy temple of thy glory: * and exceedingly to be praised, and exceeding glorious for ever.'
      - type: citation
        text: 3:55 Blessed art thou on the throne of thy kingdom, * and exceedingly to be praised, and exalted above all for ever.
      - type: citation
        text: '3:56 Blessed art thou, that beholdest the depths, and sittest upon the cherubims: * and worthy to be praised and exalted above all for ever.'
      - type: citation
        text: '3:57 Blessed art thou in the firmament of heaven: * and worthy of praise, and glorious for ever.'
      - type: citation
        text: '3:58 All ye works of the Lord, bless the Lord: * praise and exalt him above all for ever.'
      la:
      - type: heading
        text: Canticum Trium Puerorum
      - type: citation
        text: Dan 3:52-57
      - type: citation
        text: '3:52 Benedíctus es, Dómine, Deus patrum nostrórum: * et laudábilis, et gloriósus, et superexaltátus in sǽcula.'
      - type: citation
        text: '3:53 Et benedíctum nomen glóriæ tuæ sanctum: * et laudábile, et superexaltátum in ómnibus sǽculis.'
      - type: citation
        text: '3:54 Benedíctus es in templo sancto glóriæ tuæ: * et superlaudábilis, et supergloriósus in sǽcula.'
      - type: citation
        text: '3:55 Benedíctus es in throno regni tui: * et superlaudábilis, et superexaltátus in sǽcula.'
      - type: citation
        text: '3:56 Benedíctus es, qui intuéris abýssos, et sedes super Chérubim: * et laudábilis, et superexaltátus in sǽcula.'
      - type: citation
        text: '3:57 Benedíctus es in firmaménto cæli: * et laudábilis, et gloriósus in sǽcula.'
      - type: citation
        text: '3:58 Benedícite, ómnia ópera Dómini, Dómino: * laudáte, et superexaltáte eum in sǽcula.'
      en2:
      - type: heading
        text: Canticle of the Three Young Men
      - type: citation
        text: Dan 3:52-57
      - type: citation
        text: '3:52 Blessed are you, Lord, God of our fathers: * praiseworthy, and glorious, and exalted above all forever.'
      - type: citation
        text: '3:53 And blessed is the holy name of your glory: * praiseworthy, and exalted above all, for all ages.'
      - type: citation
        text: '3:54 Blessed are you in the holy temple of your glory: * praiseworthy above all and exalted above all forever.'
      - type: citation
        text: '3:55 Blessed are you on the throne of your kingdom: * praiseworthy above all and exalted above all forever.'
      - type: citation
        text: '3:56 Blessed are you who behold the abyss and sit upon the Cherubim: * praiseworthy and exalted above all forever.'
      - type: citation
        text: '3:57 Blessed are you in the firmament of heaven: * praiseworthy and glorious forever.'
      - type: citation
        text: '3:58 Bless the Lord, all works of the Lord: * praise and exalt him above all forever.'
  psalm.canticum-trium-puerorum-dan-3-57-88-56-3f52409fd2:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of the Three Young Men
      - type: citation
        text: Dan 3:57-88,56
      - type: citation
        text: '3:57 All ye works of the Lord, bless the Lord: * praise and exalt him above all for ever.'
      - type: citation
        text: '3:58 O ye angels of the Lord, bless the Lord: * O ye heavens, bless the Lord:'
      - type: citation
        text: '3:59 O all ye waters that are above the heavens, bless the Lord: * O all ye powers of the Lord, bless the Lord.'
      - type: citation
        text: '3:60 O ye sun and moon, bless the Lord: * O ye stars of heaven, bless the Lord.'
      - type: citation
        text: '3:61 O every shower and dew, bless ye the Lord: * O all ye spirits of God, bless the Lord.'
      - type: citation
        text: '3:62 O ye fire and heat, bless the Lord: * O ye cold and heat, bless the Lord.'
      - type: citation
        text: '3:63 O ye dews and hoar frosts, bless the Lord: * O ye frost and cold, bless the Lord.'
      - type: citation
        text: '3:64 O ye ice and snow, bless the Lord: * O ye nights and days, bless the Lord.'
      - type: citation
        text: '3:65 O ye light and darkness, bless the Lord: * O ye lightnings and clouds, bless the Lord.'
      - type: citation
        text: '3:66 O let the earth bless the Lord: * let it praise and exalt him above all for ever.'
      - type: citation
        text: '3:67 O ye mountains and hills, bless the Lord: * O all ye things that spring up in the earth, bless the Lord.'
      - type: citation
        text: '3:68 O ye fountains, bless the Lord: * O ye seas and rivers, bless the Lord.'
      - type: citation
        text: '3:69 O ye whales, and all that move in the waters, bless the Lord: * O all ye fowls of the air, bless the Lord.'
      - type: citation
        text: '3:70 O all ye beasts and cattle, bless the Lord: * O ye sons of men, bless the Lord.'
      - type: citation
        text: '3:71 O let Israel bless the Lord: * let them praise and exalt him above all for ever.'
      - type: citation
        text: '3:72 O ye priests of the Lord, bless the Lord: * O ye servants of the Lord, bless the Lord.'
      - type: citation
        text: '3:73 O ye spirits and souls of the just, bless the Lord: * O ye holy and humble of heart, bless the Lord.'
      - type: citation
        text: '3:74 O Ananias, Azarias, and Misael, bless ye the Lord: * praise and exalt him above all for ever.'
      - type: citation
        text: 3:75 (Bow head) Let us bless the Father and the Son, with the Holy Ghost; * let us praise and exalt him above all for ever.
      - type: citation
        text: '3:56 Blessed art thou, O Lord, in the firmament of heaven: * and worthy of praise, and glorious for ever.'
      la:
      - type: heading
        text: Canticum Trium Puerorum
      - type: citation
        text: Dan 3:57-88,56
      - type: citation
        text: '3:57 Benedícite, ómnia ópera Dómini, Dómino: * laudáte et superexaltáte eum in sǽcula.'
      - type: citation
        text: '3:58 Benedícite, Ángeli Dómini, Dómino: * benedícite, cæli, Dómino.'
      - type: citation
        text: '3:59 Benedícite, aquæ omnes, quæ super cælos sunt, Dómino: * benedícite, omnes virtútes Dómini, Dómino.'
      - type: citation
        text: '3:60 Benedícite, sol et luna, Dómino: * benedícite, stellæ cæli, Dómino.'
      - type: citation
        text: '3:61 Benedícite, omnis imber et ros, Dómino: * benedícite, omnes spíritus Dei, Dómino.'
      - type: citation
        text: '3:62 Benedícite, ignis et æstus, Dómino: * benedícite, frigus et æstus, Dómino.'
      - type: citation
        text: '3:63 Benedícite, rores et pruína, Dómino: * benedícite, gelu et frigus, Dómino.'
      - type: citation
        text: '3:64 Benedícite, glácies et nives, Dómino: * benedícite, noctes et dies, Dómino.'
      - type: citation
        text: '3:65 Benedícite, lux et ténebræ, Dómino: * benedícite, fúlgura et nubes, Dómino.'
      - type: citation
        text: '3:66 Benedícat terra Dóminum: * laudet et superexáltet eum in sǽcula.'
      - type: citation
        text: '3:67 Benedícite, montes et colles, Dómino: * benedícite, univérsa germinántia in terra, Dómino.'
      - type: citation
        text: '3:68 Benedícite, fontes, Dómino: * benedícite, mária et flúmina, Dómino.'
      - type: citation
        text: '3:69 Benedícite, cete, et ómnia, quæ movéntur in aquis, Dómino: * benedícite, omnes vólucres cæli, Dómino.'
      - type: citation
        text: '3:70 Benedícite, omnes béstiæ et pécora, Dómino: * benedícite, fílii hóminum, Dómino.'
      - type: citation
        text: '3:71 Benedícat Israël Dóminum: * laudet et superexáltet eum in sǽcula.'
      - type: citation
        text: '3:72 Benedícite, sacerdótes Dómini, Dómino: * benedícite, servi Dómini, Dómino.'
      - type: citation
        text: '3:73 Benedícite, spíritus, et ánimæ iustórum, Dómino: * benedícite, sancti, et húmiles corde, Dómino.'
      - type: citation
        text: '3:74 Benedícite, Ananía, Azaría, Mísaël, Dómino: * laudáte et superexaltáte eum in sǽcula.'
      - type: citation
        text: '3:75 (Fit reverentia:) Benedicámus Patrem et Fílium cum Sancto Spíritu: * laudémus et superexaltémus eum in sǽcula.'
      - type: citation
        text: '3:56 Benedíctus es, Dómine, in firmaménto cæli: * et laudábilis, et gloriósus, et superexaltátus in sǽcula.'
      en2:
      - type: heading
        text: Canticle of the Three Young Men
      - type: citation
        text: Dan 3:57-88,56
      - type: citation
        text: '3:57 Bless the Lord, all works of the Lord: * praise and exalt him above all forever.'
      - type: citation
        text: '3:58 Bless the Lord, Angels of the Lord: * bless the Lord, O heavens.'
      - type: citation
        text: '3:59 Bless the Lord, all waters that are above the heavens: * bless the Lord, all powers of the Lord.'
      - type: citation
        text: '3:60 Bless the Lord, sun and moon: * bless the Lord, stars of heaven.'
      - type: citation
        text: '3:61 Bless the Lord, every rain and dew: * bless the Lord, all spirits of God.'
      - type: citation
        text: '3:62 Bless the Lord, fire and heat: * bless the Lord, cold and warmth.'
      - type: citation
        text: '3:63 Bless the Lord, dews and frost: * bless the Lord, sleet and winter.'
      - type: citation
        text: '3:64 Bless the Lord, ice and snow: * bless the Lord, nights and days.'
      - type: citation
        text: '3:65 Bless the Lord, light and darkness: * bless the Lord, lightning and clouds.'
      - type: citation
        text: '3:66 May the earth bless the Lord: * and praise and exalt him above all forever.'
      - type: citation
        text: '3:67 Bless the Lord, mountains and hills: * bless the Lord, all things that grow in the land.'
      - type: citation
        text: '3:68 Bless the Lord, O fountains: * bless the Lord, O seas and rivers.'
      - type: citation
        text: '3:69 Bless the Lord, O whales and all things that move in the waters: * bless the Lord, all birds of heaven.'
      - type: citation
        text: '3:70 Bless the Lord, all beasts and cattle: * bless the Lord, O sons of men.'
      - type: citation
        text: '3:71 May Israel bless the Lord: * and praise and exalt him above all forever.'
      - type: citation
        text: '3:72 Bless the Lord, priests of the Lord: * bless the Lord, servants of the Lord.'
      - type: citation
        text: '3:73 Bless the Lord, spirits and souls of the just: * bless the Lord, holy and humble of heart.'
      - type: citation
        text: '3:74 Bless the Lord, Hananiah, Azariah, Mishael: * praise and exalt him above all forever.'
      - type: citation
        text: '3:75 (All make a bow:) Let us bless the Father and the Son with the Holy Spirit: * let us praise and exalt him above all forever.'
      - type: citation
        text: '3:56 Blessed are you, O Lord, in the firmament of heaven: * praiseworthy, and glorious, and exalted above all forever.'
  psalm.canticum-zachari-luc-1-68-79-1fcedf672a:
    role: psalm
    content:
      en:
      - type: heading
        text: Canticle of Zacharias
      - type: citation
        text: Luke 1:68-79
      - type: citation
        text: '1:68 Blessed be the Lord + God of Israel; * because he hath visited and wrought the redemption of his people:'
      - type: citation
        text: '1:69 And hath raised up an horn of salvation to us, * in the house of David his servant:'
      - type: citation
        text: '1:70 As he spoke by the mouth of his holy Prophets, * who are from the beginning:'
      - type: citation
        text: '1:71 Salvation from our enemies, * and from the hand of all that hate us:'
      - type: citation
        text: 1:72 To perform mercy to our fathers, * and to remember his holy testament,
      - type: citation
        text: 1:73 The oath, which he swore to Abraham our father, * that he would grant to us,
      - type: citation
        text: 1:74 That being delivered from the hand of our enemies, * we may serve him without fear,
      - type: citation
        text: 1:75 In holiness and justice before him, * all our days.
      - type: citation
        text: '1:76 And thou, child, shalt be called the prophet of the Highest: * for thou shalt go before the face of the Lord to prepare his ways:'
      - type: citation
        text: '1:77 To give knowledge of salvation to his people, * unto the remission of their sins:'
      - type: citation
        text: '1:78 Through the bowels of the mercy of our God, * in which the Orient from on high hath visited us:'
      - type: citation
        text: '1:79 To enlighten them that sit in darkness, and in the shadow of death: * to direct our feet into the way of peace.'
      la:
      - type: heading
        text: Canticum Zachariæ
      - type: citation
        text: Luc. 1:68-79
      - type: citation
        text: '1:68 Benedíctus + Dóminus, Deus Israël: * quia visitávit, et fecit redemptiónem plebis suæ:'
      - type: citation
        text: '1:69 Et eréxit cornu salútis nobis: * in domo David, púeri sui.'
      - type: citation
        text: '1:70 Sicut locútus est per os sanctórum, * qui a sǽculo sunt, prophetárum eius:'
      - type: citation
        text: 1:71 Salútem ex inimícis nostris, * et de manu ómnium, qui odérunt nos.
      - type: citation
        text: '1:72 Ad faciéndam misericórdiam cum pátribus nostris: * et memorári testaménti sui sancti.'
      - type: citation
        text: '1:73 Iusiurándum, quod iurávit ad Ábraham patrem nostrum, * datúrum se nobis:'
      - type: citation
        text: 1:74 Ut sine timóre, de manu inimicórum nostrórum liberáti, * serviámus illi.
      - type: citation
        text: 1:75 In sanctitáte, et iustítia coram ipso, * ómnibus diébus nostris.
      - type: citation
        text: '1:76 Et tu, puer, Prophéta Altíssimi vocáberis: * præíbis enim ante fáciem Dómini, paráre vias eius:'
      - type: citation
        text: '1:77 Ad dandam sciéntiam salútis plebi eius: * in remissiónem peccatórum eórum:'
      - type: citation
        text: '1:78 Per víscera misericórdiæ Dei nostri: * in quibus visitávit nos, óriens ex alto:'
      - type: citation
        text: '1:79 Illumináre his, qui in ténebris, et in umbra mortis sedent: * ad dirigéndos pedes nostros in viam pacis.'
      en2:
      - type: heading
        text: Canticle of Zechariah
      - type: citation
        text: Luc. 1:68-79
      - type: citation
        text: '1:68 Blessed + be the Lord God of Israel: * for he has visited his people and redeemed them,'
      - type: citation
        text: '1:69 he has raised up for us a horn of salvation * in the house of David his servant,'
      - type: citation
        text: '1:70 as he spoke through the mouth of his holy ones, * his prophets from ages past:'
      - type: citation
        text: '1:71 salvation from our foes, * and from the hand of all who hate us;'
      - type: citation
        text: '1:72 to show mercy to our fathers, * and to remember his holy covenant,'
      - type: citation
        text: '1:73 the oath he swore to Abraham our father, * to grant us'
      - type: citation
        text: '1:74 that, freed from the hand of our foes, * we may serve him without fear,'
      - type: citation
        text: '1:75 in holiness and righteousness before him, * all the days of our life.'
      - type: citation
        text: '1:76 And you, little child, will be called the Prophet of the Most High: * for you will go before the Lord to make ready his ways,'
      - type: citation
        text: '1:77 to grant knowledge of salvation to his people, * by the forgiveness of their sins,'
      - type: citation
        text: '1:78 through the tender mercy of our God, * by which the Dawn from on high will visit us,'
      - type: citation
        text: '1:79 to shine on those who sit in darkness and in the shadow of death, * to guide our feet into the way of peace.'
