  psalm.70-1-in-te-d-mine-sper-vi-non-conf-ndar-in-t-rnu-9d5b8a8808:
    role: psalm
    content:
      en:
      - type: citation
        text: '70:1 In thee, O Lord, I have hoped, let me never be put to confusion: * deliver me in thy justice, and rescue me.'
      - type: citation
        text: 70:2 Incline thy ear unto me, * and save me.
      - type: citation
        text: '70:3 Be thou unto me a God, a protector, and a place of strength: * that thou mayst make me safe.'
      - type: citation
        text: 70:3 For thou art my firmament * and my refuge.
      - type: citation
        text: 70:4 Deliver me, O my God, out of the hand of the sinner, * and out of the hand of the transgressor of the law and of the unjust.
      - type: citation
        text: '70:5 For thou art my patience, O Lord: * my hope, O Lord, from my youth.'
      - type: citation
        text: '70:6 By thee have I been confirmed from the womb: * from my mother’s womb thou art my protector.'
      - type: citation
        text: '70:7 Of thee shall I continually sing: * I am become unto many as a wonder, but thou art a strong helper.'
      - type: citation
        text: 70:8 Let my mouth be filled with praise, that I may sing thy glory; * thy greatness all the day long.
      - type: citation
        text: '70:9 Cast me not off in the time of old age: * when my strength shall fail, do not thou forsake me.'
      - type: citation
        text: 70:10 For my enemies have spoken against me; * and they that watched my soul have consulted together,
      - type: citation
        text: '70:11 Saying: God hath forsaken him: pursue and take him, * for there is none to deliver him.'
      - type: citation
        text: '70:12 O God, be not thou far from me: * O my God, make haste to my help.'
      - type: citation
        text: 70:13 Let them be confounded and come to nothing that detract my soul; * let them be covered with confusion and shame that seek my hurt.
      - type: citation
        text: 70:14 But I will always hope; * and will add to all thy praise.
      - type: citation
        text: 70:15 My mouth shall shew forth thy justice; * thy salvation all the day long.
      - type: citation
        text: '70:16 Because I have not known learning, I will enter into the powers of the Lord: * O Lord, I will be mindful of thy justice alone.'
      - type: citation
        text: '70:17 Thou hast taught me, O God, from my youth: * and till now I will declare thy wonderful works.'
      - type: citation
        text: '70:18 And unto old age and grey hairs: * O God, forsake me not,'
      - type: citation
        text: '70:18 Until I shew forth thy arm * to all the generation that is to come:'
      - type: citation
        text: '70:19 Thy power, and thy justice, O God, even to the highest great things thou hast done: * O God, who is like to thee?'
      - type: citation
        text: '70:20 How great troubles hast thou shewn me, many and grievous: and turning thou hast brought me to life, * and hast brought me back again from the depths of the earth:'
      - type: citation
        text: 70:21 Thou hast multiplied thy magnificence; * and turning to me thou hast comforted me.
      - type: citation
        text: '70:22 For I will also confess to thee thy truth with the instruments of psaltery: * O God, I will sing to thee with the harp,'
      - type: citation
        text: 70:23 My lips shall greatly rejoice, when I shall sing to thee; * and my soul which thou hast redeemed.
      - type: citation
        text: 70:24 Yea and my tongue shall meditate on thy justice all the day; * when they shall be confounded and put to shame that seek evils to me.
      la:
      - type: citation
        text: '70:1 In te, Dómine, sperávi, non confúndar in ætérnum: * in iustítia tua líbera me, et éripe me.'
      - type: citation
        text: 70:2 Inclína ad me aurem tuam, * et salva me.
      - type: citation
        text: '70:3 Esto mihi in Deum protectórem, et in locum munítum: * ut salvum me fácias,'
      - type: citation
        text: 70:3 Quóniam firmaméntum meum, * et refúgium meum es tu.
      - type: citation
        text: '70:4 Deus meus, éripe me de manu peccatóris, * et de manu contra legem agéntis et iníqui:'
      - type: citation
        text: '70:5 Quóniam tu es patiéntia mea, Dómine: * Dómine, spes mea a iuventúte mea.'
      - type: citation
        text: '70:6 In te confirmátus sum ex útero: * de ventre matris meæ tu es protéctor meus.'
      - type: citation
        text: '70:7 In te cantátio mea semper: * tamquam prodígium factus sum multis: et tu adiútor fortis.'
      - type: citation
        text: '70:8 Repleátur os meum laude, ut cantem glóriam tuam: * tota die magnitúdinem tuam.'
      - type: citation
        text: '70:9 Ne proícias me in témpore senectútis: * cum defécerit virtus mea, ne derelínquas me.'
      - type: citation
        text: '70:10 Quia dixérunt inimíci mei mihi: * et qui custodiébant ánimam meam, consílium fecérunt in unum.'
      - type: citation
        text: '70:11 Dicéntes: Deus derelíquit eum, persequímini, † et comprehéndite eum: * quia non est qui erípiat.'
      - type: citation
        text: '70:12 Deus, ne elongéris a me: * Deus meus, in auxílium meum réspice.'
      - type: citation
        text: '70:13 Confundántur, et defíciant detrahéntes ánimæ meæ: * operiántur confusióne, et pudóre qui quærunt mala mihi.'
      - type: citation
        text: '70:14 Ego autem semper sperábo: * et adíciam super omnem laudem tuam.'
      - type: citation
        text: '70:15 Os meum annuntiábit iustítiam tuam: * tota die salutáre tuum.'
      - type: citation
        text: '70:16 Quóniam non cognóvi litteratúram, † introíbo in poténtias Dómini: * Dómine, memorábor iustítiæ tuæ solíus.'
      - type: citation
        text: '70:17 Deus, docuísti me a iuventúte mea: * et usque nunc pronuntiábo mirabília tua.'
      - type: citation
        text: '70:18 Et usque in senéctam et sénium: * Deus, ne derelínquas me,'
      - type: citation
        text: '70:18 Donec annúntiem brácchium tuum * generatióni omni, quæ ventúra est:'
      - type: citation
        text: '70:19 Poténtiam tuam, et iustítiam tuam, Deus, † usque in altíssima, quæ fecísti magnália: * Deus, quis símilis tibi?'
      - type: citation
        text: '70:20 Quantas ostendísti mihi tribulatiónes multas et malas: et convérsus vivificásti me: * et de abýssis terræ íterum reduxísti me:'
      - type: citation
        text: '70:21 Multiplicásti magnificéntiam tuam: * et convérsus consolátus es me.'
      - type: citation
        text: '70:22 Nam et ego confitébor tibi in vasis psalmi veritátem tuam: * Deus, psallam tibi in cíthara, Sanctus Israël.'
      - type: citation
        text: '70:23 Exsultábunt lábia mea cum cantávero tibi: * et ánima mea, quam redemísti.'
      - type: citation
        text: '70:24 Sed et lingua mea tota die meditábitur iustítiam tuam: * cum confúsi et revériti fúerint, qui quærunt mala mihi.'
      en2:
      - type: citation
        text: '70:1 In you, O Lord, I have hoped, let me never be confounded in eternity: * in your justice deliver me and rescue me.'
      - type: citation
        text: 70:2 Incline your ear to me, * and save me.
      - type: citation
        text: '70:3 Be to me a God, a protector, and a place of strength: * that you may make me safe,'
      - type: citation
        text: 70:3 For you are my firmament * and my refuge.
      - type: citation
        text: '70:4 Deliver me, O my God, from the hand of the sinner, * and from the hand of the lawbreaker and the unjust:'
      - type: citation
        text: '70:5 For you are my patience, O Lord: * O Lord, my hope from my youth.'
      - type: citation
        text: '70:6 By you have I been confirmed from the womb: * from my mother''s womb you are my protector.'
      - type: citation
        text: '70:7 My singing shall be always of you: * I am become as it were a wonder to many, and you are a strong helper.'
      - type: citation
        text: '70:8 Let my mouth be filled with praise, that I may sing your glory: * your greatness all the day long.'
      - type: citation
        text: '70:9 Cast me not off in the time of old age: * when my strength shall fail, do not forsake me.'
      - type: citation
        text: '70:10 For my enemies have spoken against me: * and they who kept guard on my soul have taken counsel together.'
      - type: citation
        text: '70:11 Saying: God has forsaken him; pursue and take him: * for there is none to deliver him.'
      - type: citation
        text: '70:12 O God, be not far from me: * O my God, look to my help.'
      - type: citation
        text: '70:13 Let them be confounded and come to nothing who detract my soul: * let them be covered with confusion and shame who seek my hurt.'
      - type: citation
        text: '70:14 But I will always hope: * and will add to all your praise.'
      - type: citation
        text: '70:15 My mouth shall declare your justice: * your salvation all the day long.'
      - type: citation
        text: '70:16 Because I have not known learning, † I will enter into the powers of the Lord: * O Lord, I will be mindful of your justice alone.'
      - type: citation
        text: '70:17 O God, you have taught me from my youth: * and till now I will declare your wonderful works.'
      - type: citation
        text: '70:18 And even to old age and grey hairs: * O God, forsake me not,'
      - type: citation
        text: '70:18 Until I declare your arm * to every generation that is to come:'
      - type: citation
        text: '70:19 Your power, and your justice, O God, even to the highest, which you have wrought magnificently: * O God, who is like to you?'
      - type: citation
        text: '70:20 How great tribulations, many and grievous, have you shown me: and turning, you have brought me to life again: * and you have brought me back again from the depths of the earth:'
      - type: citation
        text: '70:21 You have multiplied your magnificence: * and turning to me you have comforted me.'
      - type: citation
        text: '70:22 For I will also confess to you your truth with instruments of psalmody: * O God, I will sing to you with the harp, O Holy One of Israel.'
      - type: citation
        text: '70:23 My lips shall greatly rejoice when I shall sing to you: * and my soul, which you have redeemed.'
      - type: citation
        text: '70:24 Yea, and my tongue shall meditate on your justice all the day: * when they shall be confounded and put to shame that seek my hurt.'
  psalm.71-2-deus-iud-cium-tuum-regi-da-et-iust-tiam-tua-daf9261293:
    role: psalm
    content:
      en:
      - type: citation
        text: '71:2 Give to the king thy judgment, O God: * and to the king’s son thy justice:'
      - type: citation
        text: 71:2 To judge thy people with justice, * and thy poor with judgment.
      - type: citation
        text: '71:3 Let the mountains receive peace for the people: * and the hills justice.'
      - type: citation
        text: '71:4 He shall judge the poor of the people, and he shall save the children of the poor: * and he shall humble the oppressor.'
      - type: citation
        text: 71:5 And he shall continue with the sun, and before the moon, * throughout all generations.
      - type: citation
        text: 71:6 He shall come down like rain upon the fleece; * and as showers falling gently upon the earth.
      - type: citation
        text: 71:7 In his days shall justice spring up, and abundance of peace, * till the moon be taken away.
      - type: citation
        text: 71:8 And he shall rule from sea to sea, * and from the river unto the ends of the earth.
      - type: citation
        text: '71:9 Before him the Ethiopians shall fall down: * and his enemies shall lick the ground.'
      - type: citation
        text: '71:10 The kings of Tharsis and the islands shall offer presents: * the kings of the Arabians and of Saba shall bring gifts:'
      - type: citation
        text: '71:11 And all kings of the earth shall adore him: * all nations shall serve him.'
      - type: citation
        text: '71:12 For he shall deliver the poor from the mighty: * and the needy that had no helper.'
      - type: citation
        text: '71:13 He shall spare the poor and needy: * and he shall save the souls of the poor.'
      - type: citation
        text: '71:14 He shall redeem their souls from usuries and iniquity: * and their names shall be honourable in his sight.'
      - type: citation
        text: '71:15 And he shall live, and to him shall be given of the gold of Arabia, for him they shall always adore: * they shall bless him all the day.'
      - type: citation
        text: '71:16 And there shall be a firmament on the earth on the tops of mountains, above Libanus shall the fruit thereof be exalted: * and they of the city shall flourish like the grass of the earth.'
      - type: citation
        text: '71:17 Let his name be blessed for evermore: * his name continueth before the sun.'
      - type: citation
        text: '71:17 And in him shall all the tribes of the earth be blessed: * all nations shall magnify him.'
      - type: citation
        text: 71:18 Blessed be the Lord, the God of Israel, * who alone doth wonderful things.
      - type: citation
        text: '71:19 And blessed be the name of his majesty for ever: * and the whole earth shall be filled with his majesty. So be it. So be it.'
      la:
      - type: citation
        text: '71:2 Deus, iudícium tuum regi da: * et iustítiam tuam fílio regis:'
      - type: citation
        text: 71:2 Iudicáre pópulum tuum in iustítia, * et páuperes tuos in iudício.
      - type: citation
        text: '71:3 Suscípiant montes pacem pópulo: * et colles iustítiam.'
      - type: citation
        text: '71:4 Iudicábit páuperes pópuli, et salvos fáciet fílios páuperum: * et humiliábit calumniatórem.'
      - type: citation
        text: 71:5 Et permanébit cum sole, et ante lunam, * in generatióne et generatiónem.
      - type: citation
        text: '71:6 Descéndet sicut plúvia in vellus: * et sicut stillicídia stillántia super terram.'
      - type: citation
        text: '71:7 Oriétur in diébus eius iustítia, et abundántia pacis: * donec auferátur luna.'
      - type: citation
        text: '71:8 Et dominábitur a mari usque ad mare: * et a flúmine usque ad términos orbis terrárum.'
      - type: citation
        text: '71:9 Coram illo prócident Æthíopes: * et inimíci eius terram lingent.'
      - type: citation
        text: '71:10 Reges Tharsis, et ínsulæ múnera ófferent: * reges Árabum et Saba dona addúcent.'
      - type: citation
        text: '71:11 Et adorábunt eum omnes reges terræ: * omnes gentes sérvient ei:'
      - type: citation
        text: '71:12 Quia liberábit páuperem a poténte: * et páuperem, cui non erat adiútor.'
      - type: citation
        text: '71:13 Parcet páuperi et ínopi: * et ánimas páuperum salvas fáciet.'
      - type: citation
        text: '71:14 Ex usúris et iniquitáte rédimet ánimas eórum: * et honorábile nomen eórum coram illo.'
      - type: citation
        text: '71:15 Et vivet, et dábitur ei de auro Arábiæ, et adorábunt de ipso semper: * tota die benedícent ei.'
      - type: citation
        text: '71:16 Et erit firmaméntum in terra in summis móntium, superextollétur super Líbanum fructus eius: * et florébunt de civitáte sicut fænum terræ.'
      - type: citation
        text: '71:17 Sit nomen eius benedíctum in sǽcula: * ante solem pérmanet nomen eius.'
      - type: citation
        text: '71:17 Et benedicéntur in ipso omnes tribus terræ: * omnes gentes magnificábunt eum.'
      - type: citation
        text: '71:18 Benedíctus Dóminus, Deus Israël, * qui facit mirabília solus:'
      - type: citation
        text: '71:19 Et benedíctum nomen maiestátis eius in ætérnum: * et replébitur maiestáte eius omnis terra: fiat, fiat.'
      en2:
      - type: citation
        text: '71:2 Give your judgment, O God, to the king: * and your justice to the king''s son:'
      - type: citation
        text: 71:2 To judge your people with justice, * and your poor with judgment.
      - type: citation
        text: '71:3 Let the mountains take up peace for the people: * and the hills, justice.'
      - type: citation
        text: '71:4 He will judge the poor of the people, and he will bring salvation to the sons of the poor: * and he will humble the false accuser.'
      - type: citation
        text: 71:5 And he will remain, with the sun and before the moon, * from generation to generation.
      - type: citation
        text: '71:6 He will descend like rain upon fleece: * and like showers showering upon the earth.'
      - type: citation
        text: '71:7 In his days, justice will rise, with abundance of peace: * until the moon is taken away.'
      - type: citation
        text: '71:8 And he will rule from sea to sea: * and from the river to the limits of the whole world.'
      - type: citation
        text: '71:9 In his sight, the Ethiopians will fall prostrate: * and his enemies will lick the ground.'
      - type: citation
        text: '71:10 The kings of Tarshish and the islands will offer gifts: * the kings of Arabia and of Seba will bring gifts.'
      - type: citation
        text: '71:11 And all the kings of the earth shall adore him: * all nations will serve him:'
      - type: citation
        text: '71:12 For he will free the poor from the powerful: * and the poor one who has no helper.'
      - type: citation
        text: '71:13 He will spare the poor and the indigent: * and he will bring salvation to the souls of the poor.'
      - type: citation
        text: '71:14 He will redeem their souls from usuries and from iniquity: * and their names shall be honorable in his sight.'
      - type: citation
        text: '71:15 And he will live, and to him will be given from the gold of Arabia, and they will always adore him: * they will bless him all the day long.'
      - type: citation
        text: '71:16 And there will be a firmament on earth, at the summits of mountains; its fruits will be extolled above Lebanon: * and they will flourish from the city like the grass of the earth.'
      - type: citation
        text: '71:17 May his name be blessed for ever: * may his name remain before the sun.'
      - type: citation
        text: '71:17 And all the tribes of the earth will be blessed in him: * all nations will magnify him.'
      - type: citation
        text: '71:18 Blessed is the Lord, God of Israel, * who alone does wondrous things:'
      - type: citation
        text: '71:19 And blessed is the name of his majesty in eternity: * and all the earth will be filled with his majesty. Amen. Amen.'
  psalm.72-1-quam-bonus-isra-l-deus-his-qui-recto-sunt-c-727ed71ad4:
    role: psalm
    content:
      en:
      - type: citation
        text: 72:1 How good is God to Israel, * to them that are of a right heart!
      - type: citation
        text: 72:2 But my feet were almost moved; * my steps had wellnigh slipped.
      - type: citation
        text: 72:3 Because I had a zeal on occasion of the wicked, * seeing the prosperity of sinners.
      - type: citation
        text: 72:4 For there is no regard to their death, * nor is there strength in their stripes.
      - type: citation
        text: '72:5 They are not in the labour of men: * neither shall they be scourged like other men.'
      - type: citation
        text: '72:6 Therefore pride hath held them fast: * they are covered with their iniquity and their wickedness.'
      - type: citation
        text: '72:7 Their iniquity hath come forth, as it were from fatness: * they have passed into the affection of the heart.'
      - type: citation
        text: '72:8 They have thought and spoken wickedness: * they have spoken iniquity on high.'
      - type: citation
        text: '72:9 They have set their mouth against heaven: * and their tongue hath passed through the earth.'
      - type: citation
        text: 72:10 Therefore will my people return here * and full days shall be found in them.
      - type: citation
        text: '72:11 And they said: How doth God know? * and is there knowledge in the most High?'
      - type: citation
        text: 72:12 Behold these are sinners; and yet abounding in the world * they have obtained riches.
      - type: citation
        text: '72:13 And I said: Then have I in vain justified my heart, * and washed my hands among the innocent.'
      - type: citation
        text: 72:14 And I have been scourged all the day; * and my chastisement hath been in the mornings.
      - type: citation
        text: '72:15 If I said: I will speak thus; * behold I should condemn the generation of thy children.'
      - type: citation
        text: '72:16 I studied that I might know this thing, * it is a labour in my sight:'
      - type: citation
        text: 72:17 Until I go into the sanctuary of God, * and understand concerning their last ends.
      - type: citation
        text: '72:18 But indeed for deceits thou hast put it to them: * when they were lifted up, thou hast cast them down.'
      - type: citation
        text: '72:19 How are they brought to desolation? they have suddenly ceased to be: * they have perished by reason of their iniquity.'
      - type: citation
        text: 72:20 As the dream of them that awake, O Lord; * so in thy city thou shalt bring their image to nothing.
      - type: citation
        text: '72:21 For my heart hath been inflamed, and my reins have been changed: * and I am brought to nothing, and I knew not.'
      - type: citation
        text: '72:23 I am become as a beast before thee: * and I am always with thee.'
      - type: citation
        text: 72:24 Thou hast held me by my right hand; and by thy will thou hast conducted me, * and with thy glory thou hast received me.
      - type: citation
        text: 72:25 For what have I in heaven? * and besides thee what do I desire upon earth?
      - type: citation
        text: '72:26 For thee my flesh and my heart hath fainted away: * thou art the God of my heart, and the God that is my portion for ever.'
      - type: citation
        text: '72:27 For behold they that go far from thee shall perish: * thou hast destroyed all them that are disloyal to thee.'
      - type: citation
        text: '72:28 But it is good for me to adhere to my God, * to put my hope in the Lord God:'
      - type: citation
        text: 72:28 That I may declare all thy praises, * in the gates of the daughter of Sion.
      la:
      - type: citation
        text: 72:1 Quam bonus Israël Deus, * his, qui recto sunt corde!
      - type: citation
        text: '72:2 Mei autem pæne moti sunt pedes: * pæne effúsi sunt gressus mei.'
      - type: citation
        text: 72:3 Quia zelávi super iníquos, * pacem peccatórum videns.
      - type: citation
        text: '72:4 Quia non est respéctus morti eórum: * et firmaméntum in plaga eórum.'
      - type: citation
        text: '72:5 In labóre hóminum non sunt, * et cum homínibus non flagellabúntur:'
      - type: citation
        text: 72:6 Ídeo ténuit eos supérbia, * opérti sunt iniquitáte et impietáte sua.
      - type: citation
        text: '72:7 Pródiit quasi ex ádipe iníquitas eórum: * transiérunt in afféctum cordis.'
      - type: citation
        text: '72:8 Cogitavérunt, et locúti sunt nequítiam: * iniquitátem in excélso locúti sunt.'
      - type: citation
        text: '72:9 Posuérunt in cælum os suum: * et lingua eórum transívit in terra.'
      - type: citation
        text: '72:10 Ídeo convertétur pópulus meus hic: * et dies pleni inveniéntur in eis.'
      - type: citation
        text: '72:11 Et dixérunt: Quómodo scit Deus, * et si est sciéntia in excélso?'
      - type: citation
        text: 72:12 Ecce, ipsi peccatóres, et abundántes in sǽculo, * obtinuérunt divítias.
      - type: citation
        text: '72:13 Et dixi: Ergo sine causa iustificávi cor meum, * et lavi inter innocéntes manus meas:'
      - type: citation
        text: 72:14 Et fui flagellátus tota die, * et castigátio mea in matutínis.
      - type: citation
        text: '72:15 Si dicébam: Narrábo sic: * ecce, natiónem filiórum tuórum reprobávi.'
      - type: citation
        text: '72:16 Existimábam ut cognóscerem hoc, * labor est ante me:'
      - type: citation
        text: '72:17 Donec intrem in Sanctuárium Dei: * et intéllegam in novíssimis eórum.'
      - type: citation
        text: '72:18 Verúmtamen propter dolos posuísti eis: * deiecísti eos dum allevaréntur.'
      - type: citation
        text: '72:19 Quómodo facti sunt in desolatiónem, súbito defecérunt: * periérunt propter iniquitátem suam.'
      - type: citation
        text: 72:20 Velut sómnium surgéntium, Dómine, * in civitáte tua imáginem ipsórum ad níhilum rédiges.
      - type: citation
        text: '72:21 Quia inflammátum est cor meum, et renes mei commutáti sunt: * et ego ad níhilum redáctus sum, et nescívi.'
      - type: citation
        text: '72:23 Ut iuméntum factus sum apud te: * et ego semper tecum.'
      - type: citation
        text: '72:24 Tenuísti manum déxteram meam: et in voluntáte tua deduxísti me, * et cum glória suscepísti me.'
      - type: citation
        text: 72:25 Quid enim mihi est in cælo? * et a te quid vólui super terram?
      - type: citation
        text: '72:26 Defécit caro mea, et cor meum: * Deus cordis mei, et pars mea Deus in ætérnum.'
      - type: citation
        text: '72:27 Quia ecce, qui elóngant se a te, períbunt: * perdidísti omnes, qui fornicántur abs te.'
      - type: citation
        text: '72:28 Mihi autem adhærére Deo bonum est: * pónere in Dómino Deo spem meam:'
      - type: citation
        text: 72:28 Ut annúntiem omnes prædicatiónes tuas, * in portis fíliæ Sion.
      en2:
      - type: citation
        text: 72:1 How good is God to Israel, * to those who are upright in heart!
      - type: citation
        text: '72:2 But my feet were nearly moved: * my steps had nearly slipped.'
      - type: citation
        text: 72:3 For I was zealous over the iniquitous, * seeing the peacefulness of sinners.
      - type: citation
        text: '72:4 For they have no respect for their death: * nor do they have support in their wounds.'
      - type: citation
        text: '72:5 They are not with the hardships of men, * nor will they be scourged with men:'
      - type: citation
        text: 72:6 Therefore, arrogance has held on to them; * they have been covered with their iniquity and impiety.
      - type: citation
        text: '72:7 Their iniquity has proceeded, as if from fat: * they have parted from the affection of the heart.'
      - type: citation
        text: '72:8 They have thought and spoken wickedness: * they have spoken iniquity in high places.'
      - type: citation
        text: '72:9 They have set their mouth against heaven: * and their tongue has traversed the earth.'
      - type: citation
        text: '72:10 Therefore, my people will be converted here: * and fullness of days will be found in them.'
      - type: citation
        text: '72:11 And they said: How would God know, * and is there knowledge in high places?'
      - type: citation
        text: 72:12 Behold, these are sinners, and, abounding in this age, * they have obtained riches.
      - type: citation
        text: '72:13 And I said: So then, without purpose have I justified my heart, * and washed my hands among the innocent:'
      - type: citation
        text: 72:14 And I have been scourged all day long, * and I have received my chastisement in the mornings.
      - type: citation
        text: '72:15 If I were to say that I would explain this: * behold, I would condemn this nation of your sons.'
      - type: citation
        text: '72:16 I considered, so that I might know this: * it is a hardship before me:'
      - type: citation
        text: '72:17 Until I may enter into the Sanctuary of God: * and understand it to its last part.'
      - type: citation
        text: '72:18 So, because of deceitfulness, truly, you have placed it before them: * while they were being lifted up, you were casting them down.'
      - type: citation
        text: '72:19 How have they been brought to desolation? They have suddenly failed: * they have perished because of their iniquity.'
      - type: citation
        text: 72:20 As a dream is to those who awaken, O Lord, * so will you reduce their image to nothing in your city.
      - type: citation
        text: '72:21 For my heart has been inflamed, and my temperament has been changed: * and so I have been reduced to nothing, and I did not know it.'
      - type: citation
        text: '72:23 I have become like a beast of burden to you: * and I am always with you.'
      - type: citation
        text: '72:24 You have held my right hand, and in your will you have conducted me: * and with your glory you have taken me up.'
      - type: citation
        text: 72:25 For what is there for me in heaven? * And what do I wish for on earth before you?
      - type: citation
        text: '72:26 My flesh has failed, and my heart: * O God of my heart, and God my portion, into eternity.'
      - type: citation
        text: '72:27 For behold, those who put themselves far from you will perish: * you have destroyed all those who fornicate away from you.'
      - type: citation
        text: '72:28 But it is good for me to adhere to God: * to put my hope in the Lord God:'
      - type: citation
        text: 72:28 That I may announce all your prophecies, * at the gates of the daughter of Zion.
  psalm.73-1-ut-quid-deus-repul-sti-in-finem-ir-tus-est-6e99bf79a6:
    role: psalm
    content:
      en:
      - type: citation
        text: '73:1 O God, why hast thou cast us off unto the end: * why is thy wrath enkindled against the sheep of thy pasture?'
      - type: citation
        text: 73:2 Remember thy congregation, * which thou hast possessed from the beginning.
      - type: citation
        text: '73:2 The sceptre of thy inheritance which thou hast redeemed: * mount Sion in which thou hast dwelt.'
      - type: citation
        text: 73:3 Lift up thy hands against their pride unto the end; * see what things the enemy hath done wickedly in the sanctuary.
      - type: citation
        text: 73:4 And they that hate thee have made their boasts, * in the midst of thy solemnity.
      - type: citation
        text: 73:5 They have set up their ensigns for signs, * and they knew not both in the going out and on the highest top.
      - type: citation
        text: 73:6 As with axes in a wood of trees, they have cut down at once the gates thereof, * with axe and hatchet they have brought it down.
      - type: citation
        text: '73:7 They have set fire to thy sanctuary: * they have defiled the dwelling place of thy name on the earth.'
      - type: citation
        text: '73:8 They said in their heart, the whole kindred of them together: * Let us abolish all the festival days of God from the land.'
      - type: citation
        text: '73:9 Our signs we have not seen, there is now no prophet: * and he will know us no more.'
      - type: citation
        text: '73:10 How long, O God, shall the enemy reproach: * is the adversary to provoke thy name for ever?'
      - type: citation
        text: '73:11 Why dost thou turn away thy hand: and thy right hand * out of the midst of thy bosom for ever?'
      - type: citation
        text: '73:12 But God is our king before ages: * he hath wrought salvation in the midst of the earth.'
      - type: citation
        text: '73:13 Thou by thy strength didst make the sea firm: * thou didst crush the heads of the dragons in the waters.'
      - type: citation
        text: '73:14 Thou hast broken the heads of the dragon: * thou hast given him to be meat for the people of the Ethiopians.'
      - type: citation
        text: '73:15 Thou hast broken up the fountains and the torrents: * thou hast dried up the Ethan rivers.'
      - type: citation
        text: '73:16 Thine is the day, and thine is the night: * thou hast made the morning light and the sun.'
      - type: citation
        text: '73:17 Thou hast made all the borders of the earth: * the summer and the spring were formed by thee.'
      - type: citation
        text: '73:18 Remember this, the enemy hath reproached the Lord: * and a foolish people hath provoked thy name.'
      - type: citation
        text: '73:19 Deliver not up to beasts the souls that confess to thee: * and forget not to the end the souls of thy poor.'
      - type: citation
        text: '73:20 Have regard to thy covenant: * for they that are the obscure of the earth have been filled with dwellings of iniquity.'
      - type: citation
        text: '73:21 Let not the humble be turned away with confusion: * the poor and needy shall praise thy name.'
      - type: citation
        text: '73:22 Arise, O God, judge thy own cause: * remember thy reproaches with which the foolish man hath reproached thee all the day.'
      - type: citation
        text: '73:23 Forget not the voices of thy enemies: * the pride of them that hate thee ascendeth continually.'
      la:
      - type: citation
        text: '73:1 Ut quid, Deus, repulísti in finem: * irátus est furor tuus super oves páscuæ tuæ?'
      - type: citation
        text: 73:2 Memor esto congregatiónis tuæ, * quam possedísti ab inítio.
      - type: citation
        text: '73:2 Redemísti virgam hereditátis tuæ: * mons Sion, in quo habitásti in eo.'
      - type: citation
        text: '73:3 Leva manus tuas in supérbias eórum in finem: * quanta malignátus est inimícus in sancto!'
      - type: citation
        text: '73:4 Et gloriáti sunt qui odérunt te: * in médio solemnitátis tuæ.'
      - type: citation
        text: '73:5 Posuérunt signa sua, signa: * et non cognovérunt sicut in éxitu super summum.'
      - type: citation
        text: '73:6 Quasi in silva lignórum secúribus excidérunt iánuas eius in idípsum: * in secúri et áscia deiecérunt eam.'
      - type: citation
        text: '73:7 Incendérunt igni Sanctuárium tuum: * in terra polluérunt tabernáculum nóminis tui.'
      - type: citation
        text: '73:8 Dixérunt in corde suo cognátio eórum simul: * Quiéscere faciámus omnes dies festos Dei a terra.'
      - type: citation
        text: '73:9 Signa nostra non vídimus, iam non est prophéta: * et nos non cognóscet ámplius.'
      - type: citation
        text: '73:10 Úsquequo, Deus, improperábit inimícus: * irrítat adversárius nomen tuum in finem?'
      - type: citation
        text: 73:11 Ut quid avértis manum tuam, et déxteram tuam, * de médio sinu tuo in finem?
      - type: citation
        text: '73:12 Deus autem Rex noster ante sǽcula: * operátus est salútem in médio terræ.'
      - type: citation
        text: '73:13 Tu confirmásti in virtúte tua mare: * contribulásti cápita dracónum in aquis.'
      - type: citation
        text: '73:14 Tu confregísti cápita dracónis: * dedísti eum escam pópulis Æthíopum.'
      - type: citation
        text: '73:15 Tu dirupísti fontes, et torréntes: * tu siccásti flúvios Ethan.'
      - type: citation
        text: '73:16 Tuus est dies, et tua est nox: * tu fabricátus es auróram et solem.'
      - type: citation
        text: '73:17 Tu fecísti omnes términos terræ: * æstátem et ver tu plasmásti ea.'
      - type: citation
        text: '73:18 Memor esto huius, inimícus improperávit Dómino: * et pópulus insípiens incitávit nomen tuum.'
      - type: citation
        text: 73:19 Ne tradas béstiis ánimas confiténtes tibi, * et ánimas páuperum tuórum ne obliviscáris in finem.
      - type: citation
        text: '73:20 Réspice in testaméntum tuum: * quia repléti sunt, qui obscuráti sunt terræ dómibus iniquitátum.'
      - type: citation
        text: '73:21 Ne avertátur húmilis factus confúsus: * pauper et inops laudábunt nomen tuum.'
      - type: citation
        text: '73:22 Exsúrge, Deus, iúdica causam tuam: * memor esto improperiórum tuórum, eórum quæ ab insipiénte sunt tota die.'
      - type: citation
        text: '73:23 Ne obliviscáris voces inimicórum tuórum: * supérbia eórum, qui te odérunt, ascéndit semper.'
      en2:
      - type: citation
        text: '73:1 O God, why have you rejected us to the end: * why has your fury become enraged over the sheep of your pasture?'
      - type: citation
        text: 73:2 Be mindful of your congregation, * which you have possessed from the beginning.
      - type: citation
        text: '73:2 You redeemed the scepter of your inheritance: * mount Zion, in which you have dwelt.'
      - type: citation
        text: '73:3 Lift up your hands against their arrogance in the end: * how great the malice of the enemy has been in the sanctuary!'
      - type: citation
        text: '73:4 And those who hate you have been glorified: * in the midst of your solemnity.'
      - type: citation
        text: '73:5 They have set up their signs as signs: * and they did not understand, as at the departure from on high.'
      - type: citation
        text: '73:6 As in a forest of wood, with axes they have cut down the entrances thereof: * with axe and hatchet they have brought it down.'
      - type: citation
        text: '73:7 They have set fire to your Sanctuary: * they have polluted the tabernacle of your name on earth.'
      - type: citation
        text: '73:8 They have said in their heart, all their kindred together: * Let us cause all the feast days of God to cease from the land.'
      - type: citation
        text: '73:9 We have not seen our signs; there is now no prophet: * and he will know us no more.'
      - type: citation
        text: '73:10 How long, O God, will the enemy reproach: * is the adversary to provoke your name until the end?'
      - type: citation
        text: 73:11 Why do you turn your hand away, and your right hand, * from the midst of your bosom until the end?
      - type: citation
        text: '73:12 But God is our King before all ages: * he has wrought salvation in the midst of the earth.'
      - type: citation
        text: '73:13 In your power you confirmed the sea: * you crushed the heads of the serpents in the waters.'
      - type: citation
        text: '73:14 You have broken the heads of the serpent: * you have given him as food for the people of the Ethiopians.'
      - type: citation
        text: '73:15 You have disrupted the fountains and the torrents: * you have dried up the rivers of Ethan.'
      - type: citation
        text: '73:16 Yours is the day, and yours is the night: * you have made the morning light and the sun.'
      - type: citation
        text: '73:17 You have made all the limits of the earth: * the summer and the spring were formed by you.'
      - type: citation
        text: '73:18 Be mindful of this: the enemy has reproached the Lord: * and a foolish people has provoked your name.'
      - type: citation
        text: 73:19 Do not hand over to beasts the souls that confess to you, * and do not forget the souls of your poor until the end.
      - type: citation
        text: '73:20 Look upon your covenant: * for those who have been darkened upon the earth have been filled by the iniquity of the houses.'
      - type: citation
        text: '73:21 Do not allow the humble to be turned away in confusion: * the poor and the needy will praise your name.'
      - type: citation
        text: '73:22 Rise up, O God, judge your own cause: * be mindful of your reproaches, which are made by the foolish all the day.'
      - type: citation
        text: '73:23 Do not forget the voices of your adversaries: * the arrogance of those who hate you rises up continually.'
  psalm.74-2-confit-bimur-tibi-deus-confit-bimur-et-invo-a2fc216dee:
    role: psalm
    content:
      en:
      - type: citation
        text: '74:2 We will praise thee, O God: * we will praise, and we will call upon thy name.'
      - type: citation
        text: '74:3 We will relate thy wondrous works: * when I shall take a time, I will judge justices.'
      - type: citation
        text: '74:4 The earth is melted, and all that dwell therein: * I have established the pillars thereof.'
      - type: citation
        text: '74:5 I said to the wicked: Do not act wickedly: * and to the sinners: Lift not up the horn.'
      - type: citation
        text: '74:6 Lift not up your horn on high: * speak not iniquity against God.'
      - type: citation
        text: '74:7 For neither from the east, nor from the west, nor from the desert hills: * for God is the judge.'
      - type: citation
        text: '74:8 One he putteth down, and another he lifteth up: * for in the hand of the Lord there is a cup of strong wine full of mixture.'
      - type: citation
        text: '74:9 And he hath poured it out from this to that: but the dregs thereof are not emptied: * all the sinners of the earth shall drink.'
      - type: citation
        text: '74:10 But I will declare for ever: * I will sing to the God of Jacob.'
      - type: citation
        text: '74:11 And I will break all the horns of sinners: * but the horns of the just shall be exalted.'
      la:
      - type: citation
        text: '74:2 Confitébimur tibi, Deus: * confitébimur, et invocábimus nomen tuum.'
      - type: citation
        text: '74:3 Narrábimus mirabília tua: * cum accépero tempus, ego iustítias iudicábo.'
      - type: citation
        text: '74:4 Liquefácta est terra, et omnes qui hábitant in ea: * ego confirmávi colúmnas eius.'
      - type: citation
        text: '74:5 Dixi iníquis: Nolíte iníque ágere: * et delinquéntibus: Nolíte exaltáre cornu:'
      - type: citation
        text: '74:6 Nolíte extóllere in altum cornu vestrum: * nolíte loqui advérsus Deum iniquitátem.'
      - type: citation
        text: '74:7 Quia neque ab Oriénte, neque ab Occidénte, neque a desértis móntibus: * quóniam Deus iudex est.'
      - type: citation
        text: '74:8 Hunc humíliat, et hunc exáltat: * quia calix in manu Dómini vini meri plenus misto.'
      - type: citation
        text: '74:9 Et inclinávit ex hoc in hoc: verúmtamen fæx eius non est exinaníta: * bibent omnes peccatóres terræ.'
      - type: citation
        text: '74:10 Ego autem annuntiábo in sǽculum: * cantábo Deo Iacob.'
      - type: citation
        text: '74:11 Et ómnia córnua peccatórum confríngam: * et exaltabúntur córnua iusti.'
      en2:
      - type: citation
        text: '74:2 We will confess to you, O God: * we will confess, and we will call upon your name.'
      - type: citation
        text: '74:3 We will declare your wonders: * when I have received the time, I will judge justices.'
      - type: citation
        text: '74:4 The earth has been dissolved, with all who dwell in it: * I have confirmed its pillars.'
      - type: citation
        text: '74:5 I said to the iniquitous: Do not act unjustly: * and to the offenders: Do not exalt the horn:'
      - type: citation
        text: '74:6 Do not exalt your horn on high: * do not speak iniquity against God.'
      - type: citation
        text: '74:7 For it is neither from the east, nor from the west, nor from the desert mountains: * for God is judge.'
      - type: citation
        text: '74:8 This one he humbles, and that one he exalts: * for in the hand of the Lord there is a cup of undiluted wine, full of consternation.'
      - type: citation
        text: '74:9 And he poured from this one into that one: yet its dregs have not been emptied out: * all the sinners of the earth shall drink.'
      - type: citation
        text: '74:10 But I will announce it in every age: * I will sing to the God of Jacob.'
      - type: citation
        text: '74:11 And I will break all the horns of sinners: * and the horns of the just will be exalted.'
  psalm.75-2-notus-in-iud-a-deus-in-isra-l-magnum-nomen-9459dad9c6:
    role: psalm
    content:
      en:
      - type: citation
        text: '75:2 In Judea God is known: * his name is great in Israel.'
      - type: citation
        text: '75:3 And his place is in peace: * and his abode in Sion:'
      - type: citation
        text: 75:4 There hath he broken the powers of bows, * the shield, the sword, and the battle.
      - type: citation
        text: 75:5 Thou enlightenest wonderfully from the everlasting hills. * All the foolish of heart were troubled.
      - type: citation
        text: 75:6 They have slept their sleep; * and all the men of riches have found nothing in their hands.
      - type: citation
        text: 75:7 At thy rebuke, O God of Jacob, * they have all slumbered that mounted on horseback.
      - type: citation
        text: 75:8 Thou art terrible, and who shall resist thee? * from that time thy wrath.
      - type: citation
        text: '75:9 Thou hast caused judgment to be heard from heaven: * the earth trembled and was still,'
      - type: citation
        text: 75:10 When God arose in judgment, * to save all the meek of the earth.
      - type: citation
        text: '75:11 For the thought of man shall give praise to thee: * and the remainders of the thought shall keep holiday to thee.'
      - type: citation
        text: '75:12 Vow ye, and pay to the Lord your God: * all you that are round about him bring presents.'
      - type: citation
        text: '75:13 To him that is terrible, even to him who taketh away the spirit of princes: * to the terrible with the kings of the earth.'
      la:
      - type: citation
        text: '75:2 Notus in Iudǽa Deus: * in Israël magnum nomen eius.'
      - type: citation
        text: '75:3 Et factus est in pace locus eius: * et habitátio eius in Sion.'
      - type: citation
        text: 75:4 Ibi confrégit poténtias árcuum, * scutum, gládium, et bellum.
      - type: citation
        text: '75:5 Illúminans tu mirabíliter a móntibus ætérnis: * turbáti sunt omnes insipiéntes corde.'
      - type: citation
        text: '75:6 Dormiérunt somnum suum: * et nihil invenérunt omnes viri divitiárum in mánibus suis.'
      - type: citation
        text: 75:7 Ab increpatióne tua, Deus Iacob, * dormitavérunt qui ascendérunt equos.
      - type: citation
        text: 75:8 Tu terríbilis es, et quis resístet tibi? * ex tunc ira tua.
      - type: citation
        text: '75:9 De cælo audítum fecísti iudícium: * terra trémuit et quiévit,'
      - type: citation
        text: 75:10 Cum exsúrgeret in iudícium Deus, * ut salvos fáceret omnes mansuétos terræ.
      - type: citation
        text: '75:11 Quóniam cogitátio hóminis confitébitur tibi: * et relíquiæ cogitatiónis diem festum agent tibi.'
      - type: citation
        text: '75:12 Vovéte, et réddite Dómino, Deo vestro: * omnes, qui in circúitu eius affértis múnera.'
      - type: citation
        text: 75:13 Terríbili et ei qui aufert spíritum príncipum, * terríbili apud reges terræ.
      en2:
      - type: citation
        text: '75:2 In Judea, God is known: * in Israel, his name is great.'
      - type: citation
        text: '75:3 And his place has been formed with peace: * and his dwelling place is in Zion.'
      - type: citation
        text: 75:4 In that place, he has broken the powers of the bows, * the shield, the sword, and the battle.
      - type: citation
        text: '75:5 You illuminate wondrously from the mountains of eternity: * all the foolish of heart have been disturbed.'
      - type: citation
        text: '75:6 They have slept their sleep: * and all the men of riches have found nothing in their hands.'
      - type: citation
        text: 75:7 At your rebuke, O God of Jacob, * those who were mounted on horseback have fallen asleep.
      - type: citation
        text: 75:8 You are terrible, and so who can withstand you? * From thence is your wrath.
      - type: citation
        text: '75:9 You have caused judgment to be heard from heaven: * the earth trembled and was quieted,'
      - type: citation
        text: 75:10 when God rose up in judgment, * in order to bring salvation to all the meek of the earth.
      - type: citation
        text: '75:11 For the thinking of man will confess to you: * and the legacy of his thinking will keep a feast day to you.'
      - type: citation
        text: '75:12 Make vows and pay them to the Lord, your God: * all you who surround him, bring gifts to him who is terrible,'
      - type: citation
        text: 75:13 even to him who takes away the spirit of leaders, * to him who is terrible with the kings of the earth.
  psalm.76-2-voce-mea-ad-d-minum-clam-vi-voce-mea-ad-deu-edf522e562:
    role: psalm
    content:
      en:
      - type: citation
        text: 76:2 I cried to the Lord with my voice; * to God with my voice, and he gave ear to me.
      - type: citation
        text: 76:3 In the day of my trouble I sought God, with my hands lifted up to him in the night, * and I was not deceived.
      - type: citation
        text: '76:4 My soul refused to be comforted: * I remembered God, and was delighted, and was exercised, and my spirit swooned away.'
      - type: citation
        text: '76:5 My eyes prevented the watches: * I was troubled, and I spoke not.'
      - type: citation
        text: '76:6 I thought upon the days of old: * and I had in my mind the eternal years.'
      - type: citation
        text: '76:7 And I meditated in the night with my own heart: * and I was exercised and I swept my spirit.'
      - type: citation
        text: 76:8 Will God then cast off for ever? * or will he never be more favourable again?
      - type: citation
        text: 76:9 Or will he cut off his mercy for ever, * from generation to generation?
      - type: citation
        text: 76:10 Or will God forget to shew mercy? * or will he in his anger shut up his mercies?
      - type: citation
        text: '76:11 And I said, Now have I begun: * this is the change of the right hand of the most High.'
      - type: citation
        text: '76:12 I remembered the works of the Lord: * for I will be mindful of thy wonders from the beginning.'
      - type: citation
        text: '76:13 And I will meditate on all thy works: * and will be employed in thy inventions.'
      - type: citation
        text: '76:14 Thy way, O God, is in the holy place: who is the great God like our God? * Thou art the God that dost wonders.'
      - type: citation
        text: '76:15 Thou hast made thy power known among the nations: * with thy arm thou hast redeemed thy people, the children of Jacob and of Joseph.'
      - type: citation
        text: '76:17 The waters saw thee, O God, the waters saw thee: * and they were afraid, and the depths were troubled.'
      - type: citation
        text: '76:18 Great was the noise of the waters: * the clouds sent out a sound.'
      - type: citation
        text: '76:18 For thy arrows pass: * the voice of thy thunder in a wheel.'
      - type: citation
        text: '76:19 Thy lightnings enlightened the world: * the earth shook and trembled.'
      - type: citation
        text: '76:20 Thy way is in the sea, and thy paths in many waters: * and thy footsteps shall not be known.'
      - type: citation
        text: 76:21 Thou hast conducted thy people like sheep, * by the hand of Moses and Aaron.
      la:
      - type: citation
        text: '76:2 Voce mea ad Dóminum clamávi: * voce mea ad Deum, et inténdit mihi.'
      - type: citation
        text: '76:3 In die tribulatiónis meæ Deum exquisívi, mánibus meis nocte contra eum: * et non sum decéptus.'
      - type: citation
        text: '76:4 Rénuit consolári ánima mea, * memor fui Dei, et delectátus sum, et exercitátus sum: et defécit spíritus meus.'
      - type: citation
        text: '76:5 Anticipavérunt vigílias óculi mei: * turbátus sum, et non sum locútus.'
      - type: citation
        text: '76:6 Cogitávi dies antíquos: * et annos ætérnos in mente hábui.'
      - type: citation
        text: 76:7 Et meditátus sum nocte cum corde meo, * et exercitábar, et scopébam spíritum meum.
      - type: citation
        text: '76:8 Numquid in ætérnum proíciet Deus: * aut non appónet ut complacítior sit adhuc?'
      - type: citation
        text: 76:9 Aut in finem misericórdiam suam abscíndet, * a generatióne in generatiónem?
      - type: citation
        text: 76:10 Aut obliviscétur miseréri Deus? * aut continébit in ira sua misericórdias suas?
      - type: citation
        text: '76:11 Et dixi: Nunc cœpi: * hæc mutátio déxteræ Excélsi.'
      - type: citation
        text: '76:12 Memor fui óperum Dómini: * quia memor ero ab inítio mirabílium tuórum.'
      - type: citation
        text: '76:13 Et meditábor in ómnibus opéribus tuis: * et in adinventiónibus tuis exercébor.'
      - type: citation
        text: '76:14 Deus, in sancto via tua: quis Deus magnus sicut Deus noster? * tu es Deus qui facis mirabília.'
      - type: citation
        text: '76:15 Notam fecísti in pópulis virtútem tuam: * redemísti in brácchio tuo pópulum tuum, fílios Iacob et Ioseph.'
      - type: citation
        text: '76:17 Vidérunt te aquæ, Deus, vidérunt te aquæ: * et timuérunt, et turbátæ sunt abýssi.'
      - type: citation
        text: '76:18 Multitúdo sónitus aquárum: * vocem dedérunt nubes.'
      - type: citation
        text: '76:18 Étenim sagíttæ tuæ tránseunt: * vox tonítrui tui in rota.'
      - type: citation
        text: '76:19 Illuxérunt coruscatiónes tuæ orbi terræ: * commóta est, et contrémuit terra.'
      - type: citation
        text: '76:20 In mari via tua, et sémitæ tuæ in aquis multis: * et vestígia tua non cognoscéntur.'
      - type: citation
        text: 76:21 Deduxísti sicut oves pópulum tuum, * in manu Móysi et Aaron.
      en2:
      - type: citation
        text: '76:2 I cried out to the Lord with my voice: * to God with my voice, and he attended to me.'
      - type: citation
        text: '76:3 In the days of my tribulation, I sought God, with my hands opposite him in the night: * and I was not deceived.'
      - type: citation
        text: '76:4 I was mindful of God, and I was delighted, and I was distressed: * and my spirit fell away.'
      - type: citation
        text: '76:5 My eyes anticipated the vigils: * I was disturbed, and I did not speak.'
      - type: citation
        text: '76:6 I considered the days of antiquity: * and I held the years of eternity in my mind.'
      - type: citation
        text: 76:7 And I meditated in the night with my heart, * and I was distressed, and I examined my spirit.
      - type: citation
        text: '76:8 So then, will God reject for eternity: * or will he not continue to allow himself to show favor?'
      - type: citation
        text: 76:9 Or will he cut off his mercy in the end, * from generation to generation?
      - type: citation
        text: 76:10 And would God ever forget to be merciful? * Or would he, in his wrath, restrict his mercies?
      - type: citation
        text: '76:11 And I said, Now I have begun: * this change is from the right hand of the Most High.'
      - type: citation
        text: '76:12 I was mindful of the works of the Lord: * for I will be mindful from the beginning of your wonders.'
      - type: citation
        text: '76:13 And I will meditate on all your works: * and I will take part in your intentions.'
      - type: citation
        text: 76:14 Your way, O God, is in what is holy; which God is great like our God? * You are the God who performs miracles.
      - type: citation
        text: '76:15 You have made your virtue known among the peoples: * with your arm, you have redeemed your people, the sons of Jacob and of Joseph.'
      - type: citation
        text: '76:17 The waters saw you, O God, the waters saw you: * and they were afraid, and the depths were stirred up.'
      - type: citation
        text: '76:18 Great was the sound of the waters: * the clouds uttered a voice.'
      - type: citation
        text: '76:18 For your arrows also pass by: * the voice of your thunder is like a wheel.'
      - type: citation
        text: '76:19 Your flashes have illuminated the whole world: * the earth was moved and it trembled.'
      - type: citation
        text: '76:20 Your way is through the sea, and your paths are through many waters: * and your traces will not be known.'
      - type: citation
        text: 76:21 You have conducted your people like sheep, * by the hand of Moses and Aaron.
  psalm.77-1-att-ndite-p-pule-meus-legem-meam-inclin-te-6ea7f1f845:
    role: psalm
    content:
      en:
      - type: citation
        text: '77:1 Attend, O my people, to my law: * incline your ears to the words of my mouth.'
      - type: citation
        text: '77:2 I will open my mouth in parables: * I will utter propositions from the beginning.'
      - type: citation
        text: 77:3 How great things have we heard and known, * and our fathers have told us.
      - type: citation
        text: 77:4 They have not been hidden from their children, * in another generation.
      - type: citation
        text: 77:4 Declaring the praises of the Lord, and his powers, * and his wonders which he hath done.
      - type: citation
        text: '77:5 And he set up a testimony in Jacob: * and made a law in Israel.'
      - type: citation
        text: '77:5 How great things he commanded our fathers, that they should make the same known to their children: * that another generation might know them.'
      - type: citation
        text: 77:6 The children that should be born and should rise up, * and declare them to their children.
      - type: citation
        text: '77:7 That they may put their hope in God and may not forget the works of God: * and may seek his commandments.'
      - type: citation
        text: 77:8 That they may not become like their fathers, * a perverse and exasperating generation.
      - type: citation
        text: '77:8 A generation that set not their heart aright: * and whose spirit was not faithful to God.'
      - type: citation
        text: '77:9 The sons of Ephraim who bend and shoot with the bow: * they have turned back in the day of battle.'
      - type: citation
        text: '77:10 They kept not the covenant of God: * and in his law they would not walk.'
      - type: citation
        text: 77:11 And they forgot his benefits, * and his wonders that he had shewn them.
      - type: citation
        text: 77:12 Wonderful things did he do in the sight of their fathers, in the land of Egypt, * in the field of Tanis.
      - type: citation
        text: '77:13 He divided the sea and brought them through: * and he made the waters to stand as in a vessel.'
      - type: citation
        text: '77:14 And he conducted them with a cloud by day: * and all the night with a light of fire.'
      - type: citation
        text: '77:15 He struck the rock in the wilderness: * and gave them to drink, as out of the great deep.'
      - type: citation
        text: '77:16 He brought forth water out of the rock: * and made streams run down as rivers.'
      - type: citation
        text: '77:17 And they added yet more sin against him: * they provoked the most High to wrath in the place without water.'
      - type: citation
        text: 77:18 And they tempted God in their hearts, * by asking meat for their desires.
      - type: citation
        text: '77:19 And they spoke ill of God: * they said: Can God furnish a table in the wilderness?'
      - type: citation
        text: 77:20 Because he struck the rock, and the waters gushed out, * and the streams overflowed.
      - type: citation
        text: 77:20 Can he also give bread, * or provide a table for his people?
      - type: citation
        text: '77:21 Therefore the Lord heard, and was angry: * and a fire was kindled against Jacob, and wrath came up against Israel.'
      - type: citation
        text: '77:22 Because they believed not in God: * and trusted not in his salvation.'
      - type: citation
        text: 77:23 And he had commanded the clouds from above, * and had opened the doors of heaven.
      - type: citation
        text: 77:24 And had rained down manna upon them to eat, * and had given them the bread of heaven.
      - type: citation
        text: '77:25 Man ate the bread of angels: * he sent them provisions in abundance.'
      - type: citation
        text: '77:26 He removed the south wind from heaven: * and by his power brought in the southwest wind.'
      - type: citation
        text: '77:27 And he rained upon them flesh as dust: * and feathered fowls like as the sand of the sea.'
      - type: citation
        text: 77:28 And they fell in the midst of their camp, * round about their pavilions.
      - type: citation
        text: '77:29 So they did eat, and were filled exceedingly, and he gave them their desire: * they were not defrauded of that which they craved.'
      - type: citation
        text: '77:30 As yet their meat was in their mouth: * and the wrath of God came upon them.'
      - type: citation
        text: 77:31 And he slew the fat ones amongst them, * and brought down the chosen men of Israel.
      - type: citation
        text: '77:32 In all these things they sinned still: * and they believed not for his wondrous works.'
      - type: citation
        text: 77:33 And their days were consumed in vanity, * and their years in haste.
      - type: citation
        text: '77:34 When he slew them, then they sought him: * and they returned, and came to him early in the morning.'
      - type: citation
        text: '77:35 And they remembered that God was their helper: * and the most high God their redeemer.'
      - type: citation
        text: '77:36 And they loved him with their mouth: * and with their tongue they lied unto him:'
      - type: citation
        text: '77:37 But their heart was not right with him: * nor were they counted faithful in his covenant.'
      - type: citation
        text: '77:38 But he is merciful, and will forgive their sins: * and will not destroy them.'
      - type: citation
        text: '77:38 And many a time did he turn away his anger: * and did not kindle all his wrath.'
      - type: citation
        text: '77:39 And he remembered that they are flesh: * a wind that goeth and returneth not.'
      - type: citation
        text: '77:40 How often did they provoke him in the desert: * and move him to wrath in the place without water?'
      - type: citation
        text: '77:41 And they turned back and tempted God: * and grieved the holy one of Israel.'
      - type: citation
        text: '77:42 They remembered not his hand, * in the day that he redeemed them from the hand of him that afflicted them:'
      - type: citation
        text: 77:43 How he wrought his signs in Egypt, * and his wonders in the field of Tanis.
      - type: citation
        text: 77:44 And he turned their rivers into blood, * and their showers that they might not drink.
      - type: citation
        text: '77:45 He sent amongst them diverse sorts of flies, which devoured them: * and frogs which destroyed them.'
      - type: citation
        text: 77:46 And he gave up their fruits to the blast, * and their labours to the locust.
      - type: citation
        text: 77:47 And he destroyed their vineyards with hail, * and their mulberry trees with hoarfrost.
      - type: citation
        text: 77:48 And he gave up their cattle to the hail, * and their stock to the fire.
      - type: citation
        text: '77:49 And he sent upon them the wrath of his indignation: * indignation and wrath and trouble, which he sent by evil angels.'
      - type: citation
        text: '77:50 He made a way for a path to his anger: * he spared not their souls from death, and their cattle he shut up in death.'
      - type: citation
        text: '77:51 And he killed all the firstborn in the land of Egypt: * the firstfruits of all their labour in the tabernacles of Cham.'
      - type: citation
        text: '77:52 And he took away his own people as sheep: * and guided them in the wilderness like a flock.'
      - type: citation
        text: '77:53 And he brought them out in hope, and they feared not: * and the sea overwhelmed their enemies.'
      - type: citation
        text: '77:54 And he brought them into the mountain of his sanctuary: * the mountain which his right hand had purchased.'
      - type: citation
        text: '77:54 And he cast out the Gentiles before them: * and by lot divided to them their land by a line of distribution.'
      - type: citation
        text: 77:55 And he made the tribes of Israel * to dwell in their tabernacles.
      - type: citation
        text: '77:56 Yet they tempted, and provoked the most high God: * and they kept not his testimonies.'
      - type: citation
        text: '77:57 And they turned away, and kept not the covenant: * even like their fathers they were turned aside as a crooked bow.'
      - type: citation
        text: '77:58 They provoked him to anger on their hills: * and moved him to jealousy with their graven things.'
      - type: citation
        text: 77:59 God heard, and despised them, * and he reduced Israel exceedingly as it were to nothing.
      - type: citation
        text: 77:60 And he put away the tabernacle of Silo, * his tabernacle where he dwelt among men.
      - type: citation
        text: '77:61 And he delivered their strength into captivity: * and their beauty into the hands of the enemy.'
      - type: citation
        text: '77:62 And he shut up his people under the sword: * and he despised his inheritance.'
      - type: citation
        text: '77:63 Fire consumed their young men: * and their maidens were not lamented.'
      - type: citation
        text: '77:64 Their priests fell by the sword: * and their widows did not mourn.'
      - type: citation
        text: 77:65 And the Lord was awaked as one out of sleep, * and like a mighty man that hath been surfeited with wine.
      - type: citation
        text: '77:66 And he smote his enemies on the hinder parts: * he put them to an everlasting reproach.'
      - type: citation
        text: '77:67 And he rejected the tabernacle of Joseph: * and chose not the tribe of Ephraim:'
      - type: citation
        text: 77:68 But he chose the tribe of Juda, * mount Sion which he loved.
      - type: citation
        text: 77:69 And he built his sanctuary as of unicorns, in the land * which he founded for ever.
      - type: citation
        text: '77:70 And he chose his servant David, and took him from the flocks of sheep: * he brought him from following the ewes great with young,'
      - type: citation
        text: 77:71 To feed Jacob his servant, * and Israel his inheritance.
      - type: citation
        text: '77:72 And he fed them in the innocence of his heart: * and conducted them by the skilfulness of his hands.'
      la:
      - type: citation
        text: '77:1 Atténdite, pópule meus, legem meam: * inclináte aurem vestram in verba oris mei.'
      - type: citation
        text: '77:2 Apériam in parábolis os meum: * loquar propositiónes ab inítio.'
      - type: citation
        text: '77:3 Quanta audívimus et cognóvimus ea: * et patres nostri narravérunt nobis.'
      - type: citation
        text: '77:4 Non sunt occultáta a fíliis eórum: * in generatióne áltera.'
      - type: citation
        text: '77:4 Narrántes laudes Dómini, et virtútes eius: * et mirabília eius, quæ fecit.'
      - type: citation
        text: '77:5 Et suscitávit testimónium in Iacob: * et legem pósuit in Israël.'
      - type: citation
        text: '77:5 Quanta mandávit pátribus nostris nota fácere ea fíliis suis: * ut cognóscat generátio áltera.'
      - type: citation
        text: 77:6 Fílii qui nascéntur, et exsúrgent, * et narrábunt fíliis suis.
      - type: citation
        text: '77:7 Ut ponant in Deo spem suam, et non obliviscántur óperum Dei: * et mandáta eius exquírant.'
      - type: citation
        text: '77:8 Ne fiant sicut patres eórum: * generátio prava et exásperans.'
      - type: citation
        text: '77:8 Generátio, quæ non diréxit cor suum: * et non est créditus cum Deo spíritus eius.'
      - type: citation
        text: '77:9 Fílii Ephrem intendéntes et mitténtes arcum: * convérsi sunt in die belli.'
      - type: citation
        text: '77:10 Non custodiérunt testaméntum Dei: * et in lege eius noluérunt ambuláre.'
      - type: citation
        text: '77:11 Et oblíti sunt benefactórum eius: * et mirabílium eius quæ osténdit eis.'
      - type: citation
        text: '77:12 Coram pátribus eórum fecit mirabília in terra Ægýpti: * in campo Táneos.'
      - type: citation
        text: '77:13 Interrúpit mare, et perdúxit eos: * et státuit aquas quasi in utre.'
      - type: citation
        text: '77:14 Et dedúxit eos in nube diéi: * et tota nocte in illuminatióne ignis.'
      - type: citation
        text: '77:15 Interrúpit petram in erémo: * et adaquávit eos velut in abýsso multa.'
      - type: citation
        text: '77:16 Et edúxit aquam de petra: * et dedúxit tamquam flúmina aquas.'
      - type: citation
        text: '77:17 Et apposuérunt adhuc peccáre ei: * in iram excitavérunt Excélsum in inaquóso.'
      - type: citation
        text: 77:18 Et tentavérunt Deum in córdibus suis, * ut péterent escas animábus suis.
      - type: citation
        text: '77:19 Et male locúti sunt de Deo: * dixérunt: Numquid póterit Deus paráre mensam in desérto?'
      - type: citation
        text: '77:20 Quóniam percússit petram, et fluxérunt aquæ: * et torréntes inundavérunt.'
      - type: citation
        text: 77:20 Numquid et panem póterit dare, * aut paráre mensam pópulo suo?
      - type: citation
        text: '77:21 Ídeo audívit Dóminus, et dístulit: * et ignis accénsus est in Iacob, et ira ascéndit in Israël.'
      - type: citation
        text: '77:22 Quia non credidérunt in Deo: * nec speravérunt in salutári eius:'
      - type: citation
        text: '77:23 Et mandávit núbibus désuper: * et iánuas cæli apéruit.'
      - type: citation
        text: '77:24 Et pluit illis manna ad manducándum: * et panem cæli dedit eis.'
      - type: citation
        text: 77:25 Panem Angelórum manducávit homo, * cibária misit eis in abundántia.
      - type: citation
        text: '77:26 Tránstulit Austrum de cælo: * et indúxit in virtúte sua Áfricum.'
      - type: citation
        text: '77:27 Et pluit super eos sicut púlverem carnes: * et sicut arénam maris volatília pennáta.'
      - type: citation
        text: '77:28 Et cecidérunt in médio castrórum eórum: * circa tabernácula eórum.'
      - type: citation
        text: '77:29 Et manducavérunt, et saturáti sunt nimis, et desidérium eórum áttulit eis: * non sunt fraudáti a desidério suo.'
      - type: citation
        text: '77:30 Adhuc escæ eórum erant in ore ipsórum: * et ira Dei ascéndit super eos.'
      - type: citation
        text: 77:31 Et occídit pingues eórum, * et eléctos Israël impedívit.
      - type: citation
        text: '77:32 In ómnibus his peccavérunt adhuc: * et non credidérunt in mirabílibus eius.'
      - type: citation
        text: '77:33 Et defecérunt in vanitáte dies eórum: * et anni eórum cum festinatióne.'
      - type: citation
        text: '77:34 Cum occíderet eos, quærébant eum: * et revertebántur, et dilúculo veniébant ad eum.'
      - type: citation
        text: '77:35 Et rememoráti sunt quia Deus adiútor est eórum: * et Deus excélsus redémptor eórum est.'
      - type: citation
        text: 77:36 Et dilexérunt eum in ore suo, * et lingua sua mentíti sunt ei.
      - type: citation
        text: '77:37 Cor autem eórum non erat rectum cum eo: * nec fidéles hábiti sunt in testaménto eius.'
      - type: citation
        text: '77:38 Ipse autem est miséricors, et propítius fiet peccátis eórum: * et non dispérdet eos.'
      - type: citation
        text: '77:38 Et abundávit ut avérteret iram suam: * et non accéndit omnem iram suam:'
      - type: citation
        text: '77:39 Et recordátus est quia caro sunt: * spíritus vadens et non rédiens.'
      - type: citation
        text: 77:40 Quóties exacerbavérunt eum in desérto, * in iram concitavérunt eum in inaquóso?
      - type: citation
        text: '77:41 Et convérsi sunt, et tentavérunt Deum: * et Sanctum Israël exacerbavérunt.'
      - type: citation
        text: 77:42 Non sunt recordáti manus eius, * die qua redémit eos de manu tribulántis.
      - type: citation
        text: 77:43 Sicut pósuit in Ægýpto signa sua, * et prodígia sua in campo Táneos.
      - type: citation
        text: '77:44 Et convértit in sánguinem flúmina eórum: * et imbres eórum, ne bíberent.'
      - type: citation
        text: '77:45 Misit in eos cœnomyíam, et comédit eos: * et ranam, et dispérdidit eos.'
      - type: citation
        text: '77:46 Et dedit ærúgini fructus eórum: * et labóres eórum locústæ.'
      - type: citation
        text: '77:47 Et occídit in grándine víneas eórum: * et moros eórum in pruína.'
      - type: citation
        text: '77:48 Et trádidit grándini iuménta eórum: * et possessiónem eórum igni.'
      - type: citation
        text: '77:49 Misit in eos iram indignatiónis suæ: * indignatiónem, et iram, et tribulatiónem: immissiónes per ángelos malos.'
      - type: citation
        text: '77:50 Viam fecit sémitæ iræ suæ, non pepércit a morte animábus eórum: * et iuménta eórum in morte conclúsit.'
      - type: citation
        text: '77:51 Et percússit omne primogénitum in terra Ægýpti: * primítias omnis labóris eórum in tabernáculis Cham.'
      - type: citation
        text: '77:52 Et ábstulit sicut oves pópulum suum: * et perdúxit eos tamquam gregem in desérto.'
      - type: citation
        text: '77:53 Et dedúxit eos in spe, et non timuérunt: * et inimícos eórum opéruit mare.'
      - type: citation
        text: '77:54 Et indúxit eos in montem sanctificatiónis suæ: * montem, quem acquisívit déxtera eius.'
      - type: citation
        text: '77:54 Et eiécit a fácie eórum gentes: * et sorte divísit eis terram in funículo distributiónis.'
      - type: citation
        text: '77:55 Et habitáre fecit in tabernáculis eórum: * tribus Israël.'
      - type: citation
        text: '77:56 Et tentavérunt, et exacerbavérunt Deum excélsum: * et testimónia eius non custodiérunt.'
      - type: citation
        text: '77:57 Et avertérunt se, et non servavérunt pactum: * quemádmodum patres eórum convérsi sunt in arcum pravum.'
      - type: citation
        text: '77:58 In iram concitavérunt eum in cóllibus suis: * et in sculptílibus suis ad æmulatiónem eum provocavérunt.'
      - type: citation
        text: '77:59 Audívit Deus, et sprevit: * et ad níhilum redégit valde Israël.'
      - type: citation
        text: '77:60 Et répulit tabernáculum Silo: * tabernáculum suum, ubi habitávit in homínibus.'
      - type: citation
        text: '77:61 Et trádidit in captivitátem virtútem eórum: * et pulchritúdinem eórum in manus inimíci.'
      - type: citation
        text: '77:62 Et conclúsit in gládio pópulum suum: * et hereditátem suam sprevit.'
      - type: citation
        text: '77:63 Iúvenes eórum comédit ignis: * et vírgines eórum non sunt lamentátæ.'
      - type: citation
        text: '77:64 Sacerdótes eórum in gládio cecidérunt: * et víduæ eórum non plorabántur.'
      - type: citation
        text: '77:65 Et excitátus est tamquam dórmiens Dóminus: * tamquam potens crapulátus a vino.'
      - type: citation
        text: '77:66 Et percússit inimícos suos in posterióra: * oppróbrium sempitérnum dedit illis.'
      - type: citation
        text: '77:67 Et répulit tabernáculum Ioseph: * et tribum Éphraim non elégit.'
      - type: citation
        text: 77:68 Sed elégit tribum Iuda, * montem Sion quem diléxit.
      - type: citation
        text: 77:69 Et ædificávit sicut unicórnium sanctifícium suum in terra, * quam fundávit in sǽcula.
      - type: citation
        text: '77:70 Et elégit David, servum suum, et sústulit eum de grégibus óvium: * de post fœtántes accépit eum,'
      - type: citation
        text: '77:71 Páscere Iacob, servum suum, * et Israël, hereditátem suam:'
      - type: citation
        text: '77:72 Et pavit eos in innocéntia cordis sui: * et in intelléctibus mánuum suárum dedúxit eos.'
      en2:
      - type: citation
        text: '77:1 O my people, attend to my law: * incline your ears to the words of my mouth.'
      - type: citation
        text: '77:2 I will open my mouth in parables: * I will speak about concepts that are from the beginning.'
      - type: citation
        text: '77:3 We have heard and known such great things: * and our fathers have described them to us.'
      - type: citation
        text: '77:4 These things have not been hidden from their sons: * in any generation.'
      - type: citation
        text: '77:4 Declaring the praises of the Lord, and his virtues: * and the wonders that he has done.'
      - type: citation
        text: '77:5 And he has received testimony with Jacob: * and he has set a law within Israel.'
      - type: citation
        text: '77:5 Such great things, he has commanded our fathers, so as to make these things known to their sons: * so that another generation might know them.'
      - type: citation
        text: 77:6 Sons who will be born and will grow up, * and will describe them to their sons.
      - type: citation
        text: '77:7 So then, may they put their hope in God, and may they not forget the works of God: * and may they seek his commandments.'
      - type: citation
        text: '77:8 May they not become like their fathers: * a perverse and exasperating generation.'
      - type: citation
        text: '77:8 A generation that does not straighten their heart: * and whose spirit is not trustworthy with God.'
      - type: citation
        text: '77:9 The sons of Ephraim, who bend and shoot the bow: * have been turned back in the day of battle.'
      - type: citation
        text: '77:10 They have not kept the covenant of God: * and they were not willing to walk in his law.'
      - type: citation
        text: '77:11 And they have been forgetful of his benefits: * and of his miracle, which he revealed to them.'
      - type: citation
        text: '77:12 He performed miracles in the sight of their fathers, in the land of Egypt: * in the field of Tanis.'
      - type: citation
        text: '77:13 He broke the sea and he led them through: * and he stationed the waters, as if in a vessel.'
      - type: citation
        text: '77:14 And he led them with a cloud by day: * and with illumination by fire throughout the night.'
      - type: citation
        text: '77:15 He broke through the rock in the wasteland: * and he gave them to drink, as if from the great abyss.'
      - type: citation
        text: '77:16 He brought forth water from the rock: * and he conducted the waters, as if they were rivers.'
      - type: citation
        text: '77:17 And yet, they continued to sin against him: * in a waterless place, they provoked the Most High with resentment.'
      - type: citation
        text: 77:18 And they tempted God in their hearts, * by asking for food according to their desires.
      - type: citation
        text: '77:19 And they spoke badly about God: * they said, Would God be able to prepare a table in the desert?'
      - type: citation
        text: '77:20 He struck the rock, and so waters flowed, and the torrents flooded: * but would even he be able to provide bread,'
      - type: citation
        text: 77:20 or provide a table * for his people?
      - type: citation
        text: '77:21 Therefore, the Lord heard, and he was dismayed: * and a fire was kindled within Jacob, and an anger ascended into Israel.'
      - type: citation
        text: '77:22 For they neither put their trust in God: * nor did they hope in his salvation:'
      - type: citation
        text: '77:23 And he commanded the clouds from above: * and he opened the doors of heaven.'
      - type: citation
        text: '77:24 And he rained down manna upon them to eat: * and he gave them the bread of heaven.'
      - type: citation
        text: 77:25 Man ate the bread of Angels, * he sent them provisions in abundance.
      - type: citation
        text: '77:26 He transferred the south wind from heaven: * and in his virtue, he brought in the Southwest wind.'
      - type: citation
        text: '77:27 And he rained down flesh upon them, as if it were dust: * and feathered birds, as if they were the sand of the sea.'
      - type: citation
        text: '77:28 And they fell down in the midst of their camp: * encircling their tabernacles.'
      - type: citation
        text: '77:29 And they ate until they were greatly satisfied, and he brought to them according to their desires: * they were not cheated out of what they wanted.'
      - type: citation
        text: '77:30 Their food was still in their mouth: * and then the wrath of God came upon them.'
      - type: citation
        text: 77:31 And he slew the fat ones among them, * and he impeded the elect of Israel.
      - type: citation
        text: '77:32 In all these things, they continued to sin: * and they were not trustworthy with his miracles.'
      - type: citation
        text: '77:33 And their days faded away into vanity: * and their years with haste.'
      - type: citation
        text: '77:34 When he slew them, then they sought him: * and they returned, and they drew near to him in the early morning.'
      - type: citation
        text: '77:35 And they were mindful that God is their helper: * and that the Most High God is their redeemer.'
      - type: citation
        text: 77:36 And they chose him with their mouth, * and then they lied to him with their tongue.
      - type: citation
        text: '77:37 For their heart was not upright with him: * nor have they been living faithfully in his covenant.'
      - type: citation
        text: '77:38 Yet he is merciful, and he will pardon their sins: * and he will not destroy them.'
      - type: citation
        text: '77:38 And he has abundantly turned aside his own wrath: * and he did not enflame his wrath entirely:'
      - type: citation
        text: '77:39 And he remembered that they are flesh: * a spirit that goes forth and does not return.'
      - type: citation
        text: 77:40 How often did they provoke him in the desert, * and stir him to wrath in a waterless place?
      - type: citation
        text: '77:41 And they turned back and tempted God: * and they exasperated the Holy One of Israel.'
      - type: citation
        text: 77:42 They did not remember his hand, * in the day that he redeemed them from the hand of the one troubling them.
      - type: citation
        text: 77:43 Thus he positioned his signs in Egypt, * and his wonders in the field of Tanis.
      - type: citation
        text: 77:44 And he turned their rivers into blood, * along with their rain showers, so that they could not drink.
      - type: citation
        text: 77:45 He sent among them the common fly, and it devoured them, * and the frog, and it scattered them.
      - type: citation
        text: 77:46 And he gave up their fruits to mold, * and their labors to the locust.
      - type: citation
        text: 77:47 And he slew their vineyards with hail, * and their mulberry trees with severe frost.
      - type: citation
        text: 77:48 And he delivered their cattle to the hail, * and their possessions to fire.
      - type: citation
        text: '77:49 And he sent the wrath of his indignation among them: * indignation and wrath and tribulation, sent forth by evil angels.'
      - type: citation
        text: '77:50 He made way for the path of his anger; he did not spare their souls from death: * and he enclosed their beasts of burden in death.'
      - type: citation
        text: '77:51 And he struck all the first-born in the land of Egypt: * the first-fruits of all their labor in the tabernacles of Ham.'
      - type: citation
        text: 77:52 And he took away his own people like sheep, * and he led them through the wilderness like a flock.
      - type: citation
        text: '77:53 And he led them out in hope, and they did not fear: * and the sea covered their enemies.'
      - type: citation
        text: '77:54 And he led them to the mountain of his sanctification: * the mountain that his right hand had acquired.'
      - type: citation
        text: '77:54 And he cast out the Gentiles before their face: * and he divided their land by lot to them, with a line of distribution.'
      - type: citation
        text: '77:55 And he caused them to dwell in their tabernacles: * the tribes of Israel.'
      - type: citation
        text: '77:56 Yet they tempted and aggravated God Most High: * and they did not keep his testaments.'
      - type: citation
        text: '77:57 And they turned themselves aside, and they did not serve the covenant: * just as their fathers, they were turned backwards like a crooked bow.'
      - type: citation
        text: '77:58 They impelled him to anger on their hills: * and they provoked him to rivalry with their graven images.'
      - type: citation
        text: '77:59 God listened, and he spurned them: * and he reduced Israel greatly, almost to nothing.'
      - type: citation
        text: '77:60 And he rejected the tabernacle of Shiloh: * his tabernacle where he had dwelt among men.'
      - type: citation
        text: '77:61 And he delivered their virtue into captivity: * and their beauty into the hands of the enemy.'
      - type: citation
        text: '77:62 And he enclosed his people with the sword: * and he spurned his inheritance.'
      - type: citation
        text: '77:63 Fire consumed their young men: * and their virgins were not lamented.'
      - type: citation
        text: '77:64 Their priests fell by the sword: * and their widows did not weep.'
      - type: citation
        text: '77:65 And the Lord was awakened, as if out of sleep: * and like a powerful man impaired by wine.'
      - type: citation
        text: '77:66 And he struck his enemies on the back: * he gave them over to everlasting disgrace.'
      - type: citation
        text: '77:67 And he rejected the tabernacle of Joseph: * and he did not choose the tribe of Ephraim.'
      - type: citation
        text: '77:68 But he chose the tribe of Judah: * mount Zion, which he loved.'
      - type: citation
        text: 77:69 And he built up his sanctuary like a single-horned beast in the land, * which he founded for all ages.
      - type: citation
        text: '77:70 And he chose his servant David, and he took him from the flocks of the sheep: * he received him from following the ewes with their young,'
      - type: citation
        text: 77:71 in order to pasture Jacob his servant, * and Israel his inheritance.
      - type: citation
        text: '77:72 And he fed them with the innocence of his heart: * and he led them with the understanding of his hands.'
  psalm.78-1-deus-ven-runt-gentes-in-heredit-tem-tuam-po-f06ea7faeb:
    role: psalm
    content:
      en:
      - type: citation
        text: '78:1 O God, the heathens are come into thy inheritance, they have defiled thy holy temple: * they have made Jerusalem as a place to keep fruit.'
      - type: citation
        text: '78:2 They have given the dead bodies of thy servants to be meat for the fowls of the air: * the flesh of thy saints for the beasts of the earth.'
      - type: citation
        text: 78:3 They have poured out their blood as water, round about Jerusalem, * and there was none to bury them.
      - type: citation
        text: '78:4 We are become a reproach to our neighbours: * a scorn and derision to them that are round about us.'
      - type: citation
        text: '78:5 How long, O Lord, wilt thou be angry for ever: * shall thy zeal be kindled like a fire?'
      - type: citation
        text: '78:6 Pour out thy wrath upon the nations that have not known thee: * and upon the kingdoms that have not called upon thy name.'
      - type: citation
        text: 78:7 Because they have devoured Jacob; * and have laid waste his place.
      - type: citation
        text: '78:8 Remember not our former iniquities: let thy mercies speedily prevent us, * for we are become exceeding poor.'
      - type: citation
        text: '78:9 Help us, O God, our saviour: and for the glory of thy name, O Lord, deliver us: * and forgive us our sins for thy name’s sake:'
      - type: citation
        text: '78:10 Lest they should say among the Gentiles: Where is their God? * And let him be made known among the nations before our eyes,'
      - type: citation
        text: '78:10 By the revenging the blood of thy servants, which hath been shed: * let the sighing of the prisoners come in before thee.'
      - type: citation
        text: 78:11 According to the greatness of thy arm, * take possession of the children of them that have been put to death.
      - type: citation
        text: '78:12 And render to our neighbours sevenfold in their bosom: * the reproach wherewith they have reproached thee, O Lord.'
      - type: citation
        text: 78:13 But we thy people, and the sheep of thy pasture, * will give thanks to thee for ever.
      - type: citation
        text: 78:13 We will shew forth thy praise, * unto generation and generation.
      la:
      - type: citation
        text: '78:1 Deus, venérunt gentes in hereditátem tuam, polluérunt templum sanctum tuum: * posuérunt Ierúsalem in pomórum custódiam.'
      - type: citation
        text: '78:2 Posuérunt morticína servórum tuórum, escas volatílibus cæli: * carnes sanctórum tuórum béstiis terræ.'
      - type: citation
        text: '78:3 Effudérunt sánguinem eórum tamquam aquam in circúitu Ierúsalem: * et non erat qui sepelíret.'
      - type: citation
        text: '78:4 Facti sumus oppróbrium vicínis nostris: * subsannátio et illúsio his, qui in circúitu nostro sunt.'
      - type: citation
        text: '78:5 Úsquequo, Dómine, irascéris in finem: * accendétur velut ignis zelus tuus?'
      - type: citation
        text: '78:6 Effúnde iram tuam in gentes, quæ te non novérunt: * et in regna quæ nomen tuum non invocavérunt:'
      - type: citation
        text: '78:7 Quia comedérunt Iacob: * et locum eius desolavérunt.'
      - type: citation
        text: '78:8 Ne memíneris iniquitátum nostrárum antiquárum, cito antícipent nos misericórdiæ tuæ: * quia páuperes facti sumus nimis.'
      - type: citation
        text: '78:9 Ádiuva nos, Deus, salutáris noster: et propter glóriam nóminis tui, Dómine, líbera nos: * et propítius esto peccátis nostris, propter nomen tuum:'
      - type: citation
        text: '78:10 Ne forte dicant in géntibus: Ubi est Deus eórum? * et innotéscat in natiónibus coram óculis nostris.'
      - type: citation
        text: '78:10 Últio sánguinis servórum tuórum, qui effúsus est: * intróeat in conspéctu tuo gémitus compeditórum.'
      - type: citation
        text: 78:11 Secúndum magnitúdinem brácchii tui, * pósside fílios mortificatórum.
      - type: citation
        text: '78:12 Et redde vicínis nostris séptuplum in sinu eórum: * impropérium ipsórum, quod exprobravérunt tibi, Dómine.'
      - type: citation
        text: 78:13 Nos autem pópulus tuus, et oves páscuæ tuæ, * confitébimur tibi in sǽculum.
      - type: citation
        text: 78:13 In generatiónem et generatiónem * annuntiábimus laudem tuam.
      en2:
      - type: citation
        text: '78:1 O God, the Gentiles have entered into your inheritance; they have polluted your holy temple: * they have set Jerusalem as a place to keep an orchard.'
      - type: citation
        text: '78:2 They have placed the dead bodies of your servants as food for the birds of the sky: * the flesh of your saints for the beasts of the earth.'
      - type: citation
        text: '78:3 They have poured out their blood like water all around Jerusalem: * and there was no one who would bury them.'
      - type: citation
        text: '78:4 We have become a disgrace to our neighbors: * a mockery and a derision to those who are around us.'
      - type: citation
        text: 78:5 How long, O Lord? Will you be angry until the end? * Will your zeal be kindled like a fire?
      - type: citation
        text: '78:6 Pour out your wrath among the Gentiles who have not known you: * and upon the kingdoms that have not invoked your name.'
      - type: citation
        text: '78:7 For they have devoured Jacob: * and they have desolated his place.'
      - type: citation
        text: '78:8 Do not remember our iniquities of the past; may your mercies quickly intercept us: * for we have been made greatly poor.'
      - type: citation
        text: '78:9 Help us, O God, our Savior; and free us, Lord, for the glory of your name: * and be merciful to our sins, for the sake of your name.'
      - type: citation
        text: '78:10 Let them not say among the Gentiles: Where is their God? * and may it become known among the nations before our eyes.'
      - type: citation
        text: 78:10 May the vengeance of the blood of your servants that has been poured out * enter before you as the groaning of those in chains.
      - type: citation
        text: 78:11 According to the greatness of your arm, * take possession of the sons of those who have been put to death.
      - type: citation
        text: '78:12 And repay our neighbors sevenfold within their sinews: * the reproach with which they have reproached you, O Lord.'
      - type: citation
        text: '78:13 But we are your people and the sheep of your pasture: * we will give thanks to you in all ages.'
      - type: citation
        text: 78:13 From generation to generation * we will declare your praise.
  psalm.79-2-qui-regis-isra-l-int-nde-qui-ded-cis-velut-9627c60379:
    role: psalm
    content:
      en:
      - type: citation
        text: '79:2 Give ear, O thou that rulest Israel: * thou that leadest Joseph like a sheep.'
      - type: citation
        text: 79:2 Thou that sittest upon the cherubims, * shine forth before Ephraim, Benjamin, and Manasses.
      - type: citation
        text: 79:3 Stir up thy might, and come * to save us.
      - type: citation
        text: '79:4 Convert us, O God: * and shew us thy face, and we shall be saved.'
      - type: citation
        text: 79:5 O Lord God of hosts, * how long wilt thou be angry against the prayer of thy servant?
      - type: citation
        text: '79:6 How long wilt thou feed us with the bread of tears: * and give us for our drink tears in measure?'
      - type: citation
        text: '79:7 Thou hast made us to be a contradiction to our neighbours: * and our enemies have scoffed at us.'
      - type: citation
        text: '79:8 O God of hosts, convert us: * and shew thy face, and we shall be saved.'
      - type: citation
        text: '79:9 Thou hast brought a vineyard out of Egypt: * thou hast cast out the Gentiles and planted it.'
      - type: citation
        text: '79:10 Thou wast the guide of its journey in its sight: * thou plantedst the roots thereof, and it filled the land.'
      - type: citation
        text: '79:11 The shadow of it covered the hills: * and the branches thereof the cedars of God.'
      - type: citation
        text: 79:12 It stretched forth its branches unto the sea, * and its boughs unto the river.
      - type: citation
        text: 79:13 Why hast thou broken down the hedge thereof, * so that all they who pass by the way do pluck it?
      - type: citation
        text: '79:14 The boar out of the wood hath laid it waste: * and a singular wild beast hath devoured it.'
      - type: citation
        text: '79:15 Turn again, O God of hosts, * look down from heaven, and see, and visit this vineyard:'
      - type: citation
        text: '79:16 And perfect the same which thy right hand hath planted: * and upon the son of man whom thou hast confirmed for thyself.'
      - type: citation
        text: 79:17 Things set on fire and dug down * shall perish at the rebuke of thy countenance.
      - type: citation
        text: '79:18 Let thy hand be upon the man of thy right hand: * and upon the son of man whom thou hast confirmed for thyself.'
      - type: citation
        text: '79:19 And we depart not from thee, thou shalt quicken us: * and we will call upon thy name.'
      - type: citation
        text: '79:20 O Lord God of hosts, convert us: * and shew thy face, and we shall be saved.'
      la:
      - type: citation
        text: '79:2 Qui regis Israël, inténde: * qui dedúcis velut ovem Ioseph.'
      - type: citation
        text: 79:2 Qui sedes super Chérubim, * manifestáre coram Éphraim, Béniamin, et Manásse.
      - type: citation
        text: 79:3 Éxcita poténtiam tuam, et veni, * ut salvos fácias nos.
      - type: citation
        text: '79:4 Deus, convérte nos: * et osténde fáciem tuam, et salvi érimus.'
      - type: citation
        text: 79:5 Dómine, Deus virtútum, * quoúsque irascéris super oratiónem servi tui?
      - type: citation
        text: '79:6 Cibábis nos pane lacrimárum: * et potum dabis nobis in lácrimis in mensúra?'
      - type: citation
        text: '79:7 Posuísti nos in contradictiónem vicínis nostris: * et inimíci nostri subsannavérunt nos.'
      - type: citation
        text: '79:8 Deus virtútum, convérte nos: * et osténde fáciem tuam, et salvi érimus.'
      - type: citation
        text: '79:9 Víneam de Ægýpto transtulísti: * eiecísti gentes, et plantásti eam.'
      - type: citation
        text: '79:10 Dux itíneris fuísti in conspéctu eius: * plantásti radíces eius, et implévit terram.'
      - type: citation
        text: '79:11 Opéruit montes umbra eius: * et arbústa eius cedros Dei.'
      - type: citation
        text: '79:12 Exténdit pálmites suos usque ad mare: * et usque ad flumen propágines eius.'
      - type: citation
        text: '79:13 Ut quid destruxísti macériam eius: * et vindémiant eam omnes, qui prætergrediúntur viam?'
      - type: citation
        text: '79:14 Exterminávit eam aper de silva: * et singuláris ferus depástus est eam.'
      - type: citation
        text: '79:15 Deus virtútum, convértere: * réspice de cælo, et vide, et vísita víneam istam.'
      - type: citation
        text: '79:16 Et pérfice eam, quam plantávit déxtera tua: * et super fílium hóminis, quem confirmásti tibi.'
      - type: citation
        text: 79:17 Incénsa igni, et suffóssa * ab increpatióne vultus tui períbunt.
      - type: citation
        text: '79:18 Fiat manus tua super virum déxteræ tuæ: * et super fílium hóminis, quem confirmásti tibi.'
      - type: citation
        text: '79:19 Et non discédimus a te, vivificábis nos: * et nomen tuum invocábimus.'
      - type: citation
        text: '79:20 Dómine, Deus virtútum, convérte nos: * et osténde fáciem tuam, et salvi érimus.'
      en2:
      - type: citation
        text: '79:2 You who reign over Israel, give heed: * you who lead Joseph like a sheep.'
      - type: citation
        text: 79:2 You who sit upon the Cherubim, * be revealed before Ephraim, Benjamin, and Manasseh.
      - type: citation
        text: 79:3 Awaken your power, and draw near, * to save us.
      - type: citation
        text: '79:4 O God, convert us: * and reveal your face, and we will be saved.'
      - type: citation
        text: 79:5 O Lord, God of hosts, * how long will you be angry over the prayer of your servant?
      - type: citation
        text: '79:6 How long will you feed us the bread of tears: * and give us to drink a full measure of tears?'
      - type: citation
        text: '79:7 You have set us as a contradiction to our neighbors: * and our enemies have ridiculed us.'
      - type: citation
        text: '79:8 O God of hosts, convert us: * and reveal your face, and we will be saved.'
      - type: citation
        text: '79:9 You have transferred a vineyard from Egypt: * you have cast out the Gentiles, and planted it.'
      - type: citation
        text: '79:10 You were the leader of the journey in its sight: * you planted its roots, and it filled the earth.'
      - type: citation
        text: '79:11 Its shadow covered the hills: * and its branches covered the cedars of God.'
      - type: citation
        text: '79:12 It extended its new branches even to the sea: * and its new seedlings even to the river.'
      - type: citation
        text: '79:13 So then, why have you destroyed its walls: * so that all those who pass along the way may gather its grapes?'
      - type: citation
        text: '79:14 The wild boar of the forest has trampled it: * and a single wild beast has laid waste to it.'
      - type: citation
        text: '79:15 O God of hosts, turn back: * look down from heaven, and see, and visit this vineyard.'
      - type: citation
        text: '79:16 And complete what your right hand has planted: * and look upon the son of man, whom you have confirmed for yourself.'
      - type: citation
        text: 79:17 Whatever has been set on fire and dug under * will perish at the rebuke of your countenance.
      - type: citation
        text: '79:18 Let your hand be over the man on your right: * and over the son of man, whom you have confirmed for yourself.'
      - type: citation
        text: '79:19 For we do not depart from you; you will revive us: * and we will invoke your name.'
      - type: citation
        text: '79:20 O Lord, God of hosts, convert us: * and reveal your face, and we will be saved.'
  psalm.8-2a-d-mine-d-minus-noster-quam-admir-bile-est-n-347ce90dd3:
    role: psalm
    content:
      en:
      - type: citation
        text: 8:2a O Lord our Lord, * how admirable is thy name in the whole earth!
      - type: citation
        text: 8:2b For thy magnificence is elevated * above the heavens.
      - type: citation
        text: 8:3 Out of the mouth of infants and of sucklings thou hast perfected praise, because of thy enemies, * that thou mayst destroy the enemy and the avenger.
      - type: citation
        text: '8:4 For I will behold thy heavens, the works of thy fingers: * the moon and the stars which thou hast founded.'
      - type: citation
        text: 8:5 What is man that thou art mindful of him? * or the son of man that thou visitest him?
      - type: citation
        text: '8:6 Thou hast made him a little less than the angels, † thou hast crowned him with glory and honour: * (7) and hast set him over the works of thy hands.'
      - type: citation
        text: '8:8 Thou hast subjected all things under his feet, * all sheep and oxen: moreover the beasts also of the fields.'
      - type: citation
        text: 8:9 The birds of the air, and the fishes of the sea, * that pass through the paths of the sea.
      - type: citation
        text: 8:10 O Lord our Lord, * how admirable is thy name in all the earth!
      la:
      - type: citation
        text: 8:2a Dómine, Dóminus noster, * quam admirábile est nomen tuum in univérsa terra!
      - type: citation
        text: 8:2b Quóniam eleváta est magnificéntia tua, * super cælos.
      - type: citation
        text: 8:3 Ex ore infántium et lacténtium perfecísti laudem propter inimícos tuos, * ut déstruas inimícum et ultórem.
      - type: citation
        text: '8:4 Quóniam vidébo cælos tuos, ópera digitórum tuórum: * lunam et stellas, quæ tu fundásti.'
      - type: citation
        text: 8:5 Quid est homo quod memor es eius? * aut fílius hóminis, quóniam vísitas eum?
      - type: citation
        text: '8:6 Minuísti eum paulo minus ab Ángelis, † glória et honóre coronásti eum: * (7) et constituísti eum super ópera mánuum tuárum.'
      - type: citation
        text: '8:8 Ómnia subiecísti sub pédibus eius, * oves et boves univérsas: ínsuper et pécora campi.'
      - type: citation
        text: 8:9 Vólucres cæli, et pisces maris, * qui perámbulant sémitas maris.
      - type: citation
        text: 8:10 Dómine, Dóminus noster, * quam admirábile est nomen tuum in univérsa terra!
      en2:
      - type: citation
        text: 8:2a O Lord, our Lord, * how admirable is your name throughout all the earth!
      - type: citation
        text: 8:2b For your magnificence is elevated * above the heavens.
      - type: citation
        text: 8:3 Out of the mouths of babes and infants you have perfected praise, because of your enemies, * so that you may destroy the enemy and the revenger.
      - type: citation
        text: '8:4 For I will behold your heavens, the works of your fingers: * the moon and the stars, which you have founded.'
      - type: citation
        text: 8:5 What is man, that you are mindful of him? * or the son of man, that you visit him?
      - type: citation
        text: '8:6 You reduced him to a little less than the Angels; you have crowned him with glory and honor: * and you have set him over the works of your hands.'
      - type: citation
        text: 8:8 You have subjected all things under his feet, * all sheep and oxen, and in addition the beasts of the field.
      - type: citation
        text: 8:9 The birds of the air, and the fish of the sea, * which pass through the paths of the sea.
      - type: citation
        text: 8:10 O Lord, our Lord, * how admirable is your name throughout all the earth!
  psalm.80-2-exsult-te-deo-adiut-ri-nostro-iubil-te-deo-7160b5f5f9:
    role: psalm
    content:
      en:
      - type: citation
        text: '80:2 Rejoice to God, our helper: * sing aloud to the God of Jacob.'
      - type: citation
        text: '80:3 Take a psalm, and bring hither the timbrel: * the pleasant psaltery with the harp.'
      - type: citation
        text: 80:4 Blow up the trumpet on the new moon, * on the noted day of your solemnity.
      - type: citation
        text: 80:5 For it is a commandment in Israel, * and a judgment to the God of Jacob.
      - type: citation
        text: '80:6 He ordained it for a testimony in Joseph, when he came out of the land of Egypt: * he heard a tongue which he knew not.'
      - type: citation
        text: '80:7 He removed his back from the burdens: * his hands had served in baskets.'
      - type: citation
        text: '80:8 Thou calledst upon me in affliction, and I delivered thee: * I heard thee in the secret place of tempest: I proved thee at the waters of contradiction.'
      - type: citation
        text: '80:9 Hear, O my people, and I will testify to thee: * O Israel, if thou wilt hearken to me; there shall be no new god in thee: neither shalt thou adore a strange god.'
      - type: citation
        text: '80:11 For I am the Lord thy God, who brought thee out of the land of Egypt: * open thy mouth wide, and I will fill it.'
      - type: citation
        text: '80:12 But my people heard not my voice: * and Israel hearkened not to me.'
      - type: citation
        text: '80:13 So I let them go according to the desires of their heart: * they shall walk in their own inventions.'
      - type: citation
        text: '80:14 If my people had heard me: * if Israel had walked in my ways:'
      - type: citation
        text: 80:15 I should soon have humbled their enemies, * and laid my hand on them that troubled them.
      - type: citation
        text: '80:16 The enemies of the Lord have lied to him: * and their time shall be for ever.'
      - type: citation
        text: 80:17 And he fed them with the fat of wheat, * and filled them with honey out of the rock.
      la:
      - type: citation
        text: '80:2 Exsultáte Deo, adiutóri nostro: * iubiláte Deo Iacob.'
      - type: citation
        text: '80:3 Súmite psalmum, et date týmpanum: * psaltérium iucúndum cum cíthara.'
      - type: citation
        text: 80:4 Buccináte in Neoménia tuba, * in insígni die solemnitátis vestræ.
      - type: citation
        text: '80:5 Quia præcéptum in Israël est: * et iudícium Deo Iacob.'
      - type: citation
        text: '80:6 Testimónium in Ioseph pósuit illud, cum exíret de terra Ægýpti: * linguam, quam non nóverat, audívit.'
      - type: citation
        text: '80:7 Divértit ab onéribus dorsum eius: * manus eius in cóphino serviérunt.'
      - type: citation
        text: '80:8 In tribulatióne invocásti me, et liberávi te: * exaudívi te in abscóndito tempestátis: probávi te apud aquam contradictiónis.'
      - type: citation
        text: '80:9 Audi, pópulus meus, et contestábor te: * Israël, si audíeris me, non erit in te deus recens, neque adorábis deum aliénum.'
      - type: citation
        text: '80:11 Ego enim sum Dóminus Deus tuus, qui edúxi te de terra Ægýpti: * diláta os tuum, et implébo illud.'
      - type: citation
        text: '80:12 Et non audívit pópulus meus vocem meam: * et Israël non inténdit mihi.'
      - type: citation
        text: '80:13 Et dimísi eos secúndum desidéria cordis eórum: * ibunt in adinventiónibus suis.'
      - type: citation
        text: '80:14 Si pópulus meus audísset me: * Israël si in viis meis ambulásset:'
      - type: citation
        text: '80:15 Pro níhilo fórsitan inimícos eórum humiliássem: * et super tribulántes eos misíssem manum meam.'
      - type: citation
        text: '80:16 Inimíci Dómini mentíti sunt ei: * et erit tempus eórum in sǽcula.'
      - type: citation
        text: '80:17 Et cibávit eos ex ádipe fruménti: * et de petra, melle saturávit eos.'
      en2:
      - type: citation
        text: '80:2 Exult before God our helper: * sing joyfully to the God of Jacob.'
      - type: citation
        text: '80:3 Take up a psalm, and bring forth the timbrel: * a pleasing Psalter with stringed instruments.'
      - type: citation
        text: 80:4 Sound the trumpet at the new moon, * on the noteworthy day of your solemnity.
      - type: citation
        text: '80:5 For it is a precept in Israel: * and a judgment for the God of Jacob.'
      - type: citation
        text: '80:6 He set it as a testimony in Joseph, when he came out of the land of Egypt: * he heard a tongue that he knew not.'
      - type: citation
        text: '80:7 He turned his back from the burdens: * his hands had served in the basket.'
      - type: citation
        text: '80:8 In tribulation you called upon me, and I delivered you: * I heard you in the secret place of the storm; I proved you at the waters of contradiction.'
      - type: citation
        text: '80:9 Hear, O my people, and I will testify to you: * O Israel, if you will hear me, there shall be no new god among you, nor shall you adore a foreign god.'
      - type: citation
        text: '80:11 For I am the Lord your God, who brought you out of the land of Egypt: * open your mouth wide, and I will fill it.'
      - type: citation
        text: '80:12 But my people did not hear my voice: * and Israel did not heed me.'
      - type: citation
        text: '80:13 So I dismissed them according to the desires of their heart: * they shall walk in their own devices.'
      - type: citation
        text: '80:14 If my people had heard me: * if Israel had walked in my ways:'
      - type: citation
        text: '80:15 I would have humbled their enemies as nothing: * and I would have stretched forth my hand upon those who troubled them.'
      - type: citation
        text: '80:16 The enemies of the Lord have lied to him: * and their time shall be for ever.'
      - type: citation
        text: '80:17 And he fed them with the fat of wheat: * and filled them with honey from the rock.'
  psalm.81-1-deus-stetit-in-synag-ga-de-rum-in-m-dio-aut-cdef724b89:
    role: psalm
    content:
      en:
      - type: citation
        text: '81:1 God hath stood in the congregation of gods: * and being in the midst of them he judgeth gods.'
      - type: citation
        text: '81:2 How long will you judge unjustly: * and accept the persons of the wicked?'
      - type: citation
        text: '81:3 Judge for the needy and fatherless: * do justice to the humble and the poor.'
      - type: citation
        text: 81:4 Rescue the poor; * and deliver the needy out of the hand of the sinner.
      - type: citation
        text: '81:5 They have not known nor understood: they walk on in darkness: * all the foundations of the earth shall be moved.'
      - type: citation
        text: '81:6 I have said: You are gods * and all of you the sons of the most High.'
      - type: citation
        text: '81:7 But you like men shall die: * and shall fall like one of the princes.'
      - type: citation
        text: '81:8 Arise, O God, judge thou the earth: * for thou shalt inherit among all the nations.'
      la:
      - type: citation
        text: '81:1 Deus stetit in synagóga deórum: * in médio autem deos diiúdicat.'
      - type: citation
        text: '81:2 Úsquequo iudicátis iniquitátem: * et fácies peccatórum súmitis?'
      - type: citation
        text: '81:3 Iudicáte egéno, et pupíllo: * húmilem, et páuperem iustificáte.'
      - type: citation
        text: '81:4 Erípite páuperem: * et egénum de manu peccatóris liberáte.'
      - type: citation
        text: '81:5 Nesciérunt, neque intellexérunt, in ténebris ámbulant: * movebúntur ómnia fundaménta terræ.'
      - type: citation
        text: '81:6 Ego dixi: Dii estis, * et fílii Excélsi omnes.'
      - type: citation
        text: '81:7 Vos autem sicut hómines moriémini: * et sicut unus de princípibus cadétis.'
      - type: citation
        text: '81:8 Surge, Deus, iúdica terram: * quóniam tu hereditábis in ómnibus géntibus.'
      en2:
      - type: citation
        text: '81:1 God stood in the assembly of gods: * and in the midst he judges among gods.'
      - type: citation
        text: '81:2 How long will you judge unjustly: * and accept the faces of sinners?'
      - type: citation
        text: '81:3 Judge for the needy and the orphan: * justify the humble and the poor.'
      - type: citation
        text: '81:4 Rescue the poor: * and deliver the needy from the hand of the sinner.'
      - type: citation
        text: '81:5 They have not known, nor understood; they walk in darkness: * all the foundations of the earth shall be moved.'
      - type: citation
        text: '81:6 I have said: You are gods, * and all of you sons of the Most High.'
      - type: citation
        text: '81:7 But you shall die like men: * and shall fall like one of the princes.'
      - type: citation
        text: '81:8 Arise, O God, judge the earth: * for you shall inherit among all the nations.'
  psalm.82-2-deus-quis-s-milis-erit-tibi-ne-t-ceas-neque-52fb06bfda:
    role: psalm
    content:
      en:
      - type: citation
        text: 82:2 O God, who shall be like to thee? * Hold not thy peace, neither be O God, thou still,
      - type: citation
        text: '82:3 For lo, thy enemies have made a noise: * and they that hate thee have lifted up the head.'
      - type: citation
        text: 82:4 They have taken a malicious counsel against thy people, * and have consulted against thy saints.
      - type: citation
        text: '82:5 They have said: Come and let us destroy them, * so that they be not a nation: and let the name of Israel be remembered no more.'
      - type: citation
        text: '82:6 For they have contrived with one consent: * they have made a covenant together against thee; the tabernacles of the Edomites, and the Ismahelites:'
      - type: citation
        text: '82:8 Moab, and the Agarens, Gebal, and Ammon and Amalec: * the Philistines, with the inhabitants of Tyre.'
      - type: citation
        text: '82:9 Yea, and the Assyrian also is joined with them: * they are come to the aid of the sons of Lot.'
      - type: citation
        text: '82:10 Do to them as thou didst to Madian and to Sisara: * as to Jabin at the brook of Cisson.'
      - type: citation
        text: '82:11 Who perished at Endor: * and became as dung for the earth.'
      - type: citation
        text: 82:12 Make their princes like Oreb, and Zeb, * and Zebee, and Salmana.
      - type: citation
        text: '82:13 All their princes, * who have said: Let us possess the sanctuary of God for an inheritance.'
      - type: citation
        text: 82:14 O my God, make them like a wheel; * and as stubble before the wind.
      - type: citation
        text: '82:15 As fire which burneth the wood: * and as a flame burning mountains:'
      - type: citation
        text: '82:16 So shalt thou pursue them with thy tempest: * and shalt trouble them in thy wrath.'
      - type: citation
        text: 82:17 Fill their faces with shame; * and they shall seek thy name, O Lord.
      - type: citation
        text: '82:18 Let them be ashamed and troubled for ever and ever: * and let them be confounded and perish.'
      - type: citation
        text: '82:19 And let them know that the Lord is thy name: * thou alone art the most High over all the earth.'
      la:
      - type: citation
        text: 82:2 Deus, quis símilis erit tibi? * Ne táceas, neque compescáris, Deus.
      - type: citation
        text: '82:3 Quóniam ecce inimíci tui sonuérunt: * et qui odérunt te extulérunt caput.'
      - type: citation
        text: '82:4 Super pópulum tuum malignavérunt consílium: * et cogitavérunt advérsus sanctos tuos.'
      - type: citation
        text: '82:5 Dixérunt: Veníte, et disperdámus eos de gente: * et non memorétur nomen Israël ultra.'
      - type: citation
        text: '82:6 Quóniam cogitavérunt unanímiter: * simul advérsum te testaméntum disposuérunt, tabernácula Idumæórum et Ismahelítæ:'
      - type: citation
        text: '82:8 Moab, et Agaréni, Gebal, et Ammon, et Ámalec: * alienígenæ cum habitántibus Tyrum.'
      - type: citation
        text: '82:9 Étenim Assur venit cum illis: * facti sunt in adiutórium fíliis Lot.'
      - type: citation
        text: '82:10 Fac illis sicut Mádian, et Sísaræ: * sicut Iabin in torrénte Cisson.'
      - type: citation
        text: '82:11 Disperiérunt in Endor: * facti sunt ut stercus terræ.'
      - type: citation
        text: '82:12 Pone príncipes eórum sicut Oreb, et Zeb, * et Zébee, et Sálmana:'
      - type: citation
        text: '82:13 Omnes príncipes eórum: * qui dixérunt: Hereditáte possideámus Sanctuárium Dei.'
      - type: citation
        text: '82:14 Deus meus, pone illos ut rotam: * et sicut stípulam ante fáciem venti.'
      - type: citation
        text: '82:15 Sicut ignis, qui combúrit silvam: * et sicut flamma combúrens montes:'
      - type: citation
        text: '82:16 Ita persequéris illos in tempestáte tua: * et in ira tua turbábis eos.'
      - type: citation
        text: '82:17 Imple fácies eórum ignomínia: * et quærent nomen tuum, Dómine.'
      - type: citation
        text: '82:18 Erubéscant, et conturbéntur in sǽculum sǽculi: * et confundántur, et péreant.'
      - type: citation
        text: '82:19 Et cognóscant quia nomen tibi Dóminus: * tu solus Altíssimus in omni terra.'
      en2:
      - type: citation
        text: 82:2 O God, who shall be like you? * Be not silent, neither be still, O God.
      - type: citation
        text: '82:3 For behold, your enemies have made a noise: * and they who hate you have lifted up their head.'
      - type: citation
        text: '82:4 They have devised a malicious counsel against your people: * and they have plotted against your holy ones.'
      - type: citation
        text: '82:5 They have said: Come, and let us destroy them as a nation: * and let the name of Israel be remembered no more.'
      - type: citation
        text: '82:6 For they have plotted together with one accord: * they have made a covenant against you— the tents of the Edomites and the Ishmaelites:'
      - type: citation
        text: '82:8 Moab and the Hagarenes, Gebal and Ammon and Amalek: * the Philistines with the inhabitants of Tyre.'
      - type: citation
        text: '82:9 And Assyria also has come with them: * they have become a help for the sons of Lot.'
      - type: citation
        text: '82:10 Do to them as you did to Midian and to Sisera: * as to Jabin at the torrent of Kishon.'
      - type: citation
        text: '82:11 They perished at Endor: * they became as dung upon the earth.'
      - type: citation
        text: '82:12 Make their princes as Oreb and Zeb, * and Zebah and Zalmunna:'
      - type: citation
        text: '82:13 All their princes: * who have said: Let us possess the sanctuary of God as our inheritance.'
      - type: citation
        text: 82:14 O my God, make them like a wheel, * and like stubble before the face of the wind.
      - type: citation
        text: '82:15 As fire that burns a forest: * and as a flame burning mountains:'
      - type: citation
        text: '82:16 So shall you pursue them in your storm: * and in your anger you shall trouble them.'
      - type: citation
        text: '82:17 Fill their faces with shame: * and they shall seek your name, O Lord.'
      - type: citation
        text: '82:18 Let them be ashamed and troubled for ever and ever: * and let them be confounded and perish.'
      - type: citation
        text: '82:19 And let them know that the Lord is your name: * you alone are the Most High over all the earth.'
  psalm.83-2-quam-dil-cta-tabern-cula-tua-d-mine-virt-tu-af2fabf720:
    role: psalm
    content:
      en:
      - type: citation
        text: 83:2 How lovely are thy tabernacles, O Lord of hosts! * my soul longeth and fainteth for the courts of the Lord.
      - type: citation
        text: 83:3 My heart and my flesh * have rejoiced in the living God.
      - type: citation
        text: '83:4 For the sparrow hath found herself a house, * and the turtledove a nest for herself where she may lay her young ones:'
      - type: citation
        text: 83:4 Thy altars, O Lord of hosts, * my king and my God.
      - type: citation
        text: '83:5 Blessed are they that dwell in thy house, O Lord: * they shall praise thee for ever and ever.'
      - type: citation
        text: '83:6 Blessed is the man whose help is from thee: * in his heart he hath disposed to ascend by steps, in the vale of tears, in the place which he hath set.'
      - type: citation
        text: '83:8 For the lawgiver shall give a blessing, they shall go from virtue to virtue: * the God of gods shall be seen in Sion.'
      - type: citation
        text: '83:9 O Lord God of hosts, hear my prayer: * give ear, O God of Jacob.'
      - type: citation
        text: '83:10 Behold, O God our protector: * and look on the face of thy Christ.'
      - type: citation
        text: 83:11 For better is one day in thy courts * above thousands.
      - type: citation
        text: 83:11 I have chosen to be an abject in the house of my God, * rather than to dwell in the tabernacles of sinners.
      - type: citation
        text: '83:12 For God loveth mercy and truth: * the Lord will give grace and glory.'
      - type: citation
        text: '83:13 He will not deprive of good things them that walk in innocence: * O Lord of hosts, blessed is the man that trusteth in thee.'
      la:
      - type: citation
        text: '83:2 Quam dilécta tabernácula tua, Dómine virtútum: * concupíscit, et déficit ánima mea in átria Dómini.'
      - type: citation
        text: 83:3 Cor meum, et caro mea * exsultavérunt in Deum vivum.
      - type: citation
        text: '83:4 Étenim passer invénit sibi domum: * et turtur nidum sibi, ubi ponat pullos suos.'
      - type: citation
        text: '83:4 Altária tua, Dómine virtútum: * Rex meus, et Deus meus.'
      - type: citation
        text: '83:5 Beáti, qui hábitant in domo tua, Dómine: * in sǽcula sæculórum laudábunt te.'
      - type: citation
        text: '83:6 Beátus vir, cuius est auxílium abs te: * ascensiónes in corde suo dispósuit, in valle lacrimárum in loco, quem pósuit.'
      - type: citation
        text: '83:8 Étenim benedictiónem dabit legislátor, ibunt de virtúte in virtútem: * vidébitur Deus deórum in Sion.'
      - type: citation
        text: '83:9 Dómine, Deus virtútum, exáudi oratiónem meam: * áuribus pércipe, Deus Iacob.'
      - type: citation
        text: '83:10 Protéctor noster, áspice, Deus: * et réspice in fáciem Christi tui:'
      - type: citation
        text: 83:11 Quia mélior est dies una in átriis tuis, * super míllia.
      - type: citation
        text: '83:11 Elégi abiéctus esse in domo Dei mei: * magis quam habitáre in tabernáculis peccatórum.'
      - type: citation
        text: '83:12 Quia misericórdiam, et veritátem díligit Deus: * grátiam et glóriam dabit Dóminus.'
      - type: citation
        text: '83:13 Non privábit bonis eos, qui ámbulant in innocéntia: * Dómine virtútum, beátus homo, qui sperat in te.'
      en2:
      - type: citation
        text: '83:2 How beloved are your tabernacles, O Lord of hosts: * my soul longs and faints for the courts of the Lord.'
      - type: citation
        text: 83:3 My heart and my flesh * have rejoiced in the living God.
      - type: citation
        text: '83:4 For the sparrow has found itself a house: * and the turtledove a nest for itself, where it may lay its young.'
      - type: citation
        text: '83:4 Your altars, O Lord of hosts: * my King and my God.'
      - type: citation
        text: '83:5 Blessed are they who dwell in your house, O Lord: * they shall praise you for ever and ever.'
      - type: citation
        text: '83:6 Blessed is the man whose help is from you: * he has set ascents in his heart, in the valley of tears, in the place he has appointed.'
      - type: citation
        text: '83:8 For the lawgiver shall give a blessing; they shall go from strength to strength: * the God of gods shall be seen in Zion.'
      - type: citation
        text: '83:9 O Lord, God of hosts, hear my prayer: * give ear, O God of Jacob.'
      - type: citation
        text: '83:10 Behold, O God, our protector: * and look upon the face of your Christ:'
      - type: citation
        text: 83:11 For one day in your courts is better * than a thousand elsewhere.
      - type: citation
        text: '83:11 I have chosen to be cast down in the house of my God: * rather than to dwell in the tents of sinners.'
      - type: citation
        text: '83:12 For God loves mercy and truth: * the Lord will give grace and glory.'
      - type: citation
        text: '83:13 He will not deprive of good things those who walk in innocence: * O Lord of hosts, blessed is the man who hopes in you.'
  psalm.84-2-benedix-sti-d-mine-terram-tuam-avert-sti-ca-b7ec89b3c5:
    role: psalm
    content:
      en:
      - type: citation
        text: '84:2 Lord, thou hast blessed thy land: * thou hast turned away the captivity of Jacob.'
      - type: citation
        text: '84:3 Thou hast forgiven the iniquity of thy people: * thou hast covered all their sins.'
      - type: citation
        text: '84:4 Thou hast mitigated all thy anger: * thou hast turned away from the wrath of thy indignation.'
      - type: citation
        text: '84:5 Convert us, O God our saviour: * and turn off thy anger from us.'
      - type: citation
        text: '84:6 Wilt thou be angry with us for ever: * or wilt thou extend thy wrath from generation to generation?'
      - type: citation
        text: '84:7 Thou wilt turn, O God, and bring us to life: * and thy people shall rejoice in thee.'
      - type: citation
        text: 84:8 Shew us, O Lord, thy mercy; * and grant us thy salvation.
      - type: citation
        text: '84:9 I will hear what the Lord God will speak in me: * for he will speak peace'
      - type: citation
        text: '84:9 And unto his saints: * and unto them that are converted to the heart.'
      - type: citation
        text: '84:10 Surely his salvation is near to them that fear him: * that glory may dwell in our land.'
      - type: citation
        text: '84:11 Mercy and truth have met each other: * justice and peace have kissed.'
      - type: citation
        text: '84:12 Truth is sprung out of the earth: * and justice hath looked down from heaven.'
      - type: citation
        text: '84:13 For the Lord will give goodness: * and our earth shall yield her fruit.'
      - type: citation
        text: '84:14 Justice shall walk before him: * and shall set his steps in the way.'
      la:
      - type: citation
        text: '84:2 Benedixísti, Dómine, terram tuam: * avertísti captivitátem Iacob.'
      - type: citation
        text: '84:3 Remisísti iniquitátem plebis tuæ: * operuísti ómnia peccáta eórum.'
      - type: citation
        text: '84:4 Mitigásti omnem iram tuam: * avertísti ab ira indignatiónis tuæ.'
      - type: citation
        text: '84:5 Convérte nos, Deus, salutáris noster: * et avérte iram tuam a nobis.'
      - type: citation
        text: 84:6 Numquid in ætérnum irascéris nobis? * aut exténdes iram tuam a generatióne in generatiónem?
      - type: citation
        text: '84:7 Deus, tu convérsus vivificábis nos: * et plebs tua lætábitur in te.'
      - type: citation
        text: '84:8 Osténde nobis, Dómine, misericórdiam tuam: * et salutáre tuum da nobis.'
      - type: citation
        text: '84:9 Áudiam quid loquátur in me Dóminus Deus: * quóniam loquétur pacem in plebem suam.'
      - type: citation
        text: '84:9 Et super sanctos suos: * et in eos, qui convertúntur ad cor.'
      - type: citation
        text: '84:10 Verúmtamen prope timéntes eum salutáre ipsíus: * ut inhábitet glória in terra nostra.'
      - type: citation
        text: '84:11 Misericórdia, et véritas obviavérunt sibi: * iustítia, et pax osculátæ sunt.'
      - type: citation
        text: '84:12 Véritas de terra orta est: * et iustítia de cælo prospéxit.'
      - type: citation
        text: '84:13 Étenim Dóminus dabit benignitátem: * et terra nostra dabit fructum suum.'
      - type: citation
        text: '84:14 Iustítia ante eum ambulábit: * et ponet in via gressus suos.'
      en2:
      - type: citation
        text: '84:2 You have blessed, O Lord, your land: * you have turned away the captivity of Jacob.'
      - type: citation
        text: '84:3 You have forgiven the iniquity of your people: * you have covered all their sins.'
      - type: citation
        text: '84:4 You have mitigated all your wrath: * you have turned away from the wrath of your indignation.'
      - type: citation
        text: '84:5 Convert us, O God our Savior: * and turn away your wrath from us.'
      - type: citation
        text: 84:6 Will you be angry with us for ever? * Or will you extend your wrath from generation to generation?
      - type: citation
        text: '84:7 O God, you, being turned, will give us life: * and your people shall rejoice in you.'
      - type: citation
        text: '84:8 Show us, O Lord, your mercy: * and grant us your salvation.'
      - type: citation
        text: '84:9 I will hear what the Lord God will speak in me: * for he will speak peace unto his people.'
      - type: citation
        text: '84:9 And unto his holy ones: * and unto those who are converted to the heart.'
      - type: citation
        text: '84:10 Surely his salvation is near for those who fear him: * that glory may dwell in our land.'
      - type: citation
        text: '84:11 Mercy and truth have met each other: * justice and peace have kissed.'
      - type: citation
        text: '84:12 Truth has sprung out of the earth: * and justice has looked down from heaven.'
      - type: citation
        text: '84:13 For the Lord will give goodness: * and our earth shall yield her fruit.'
      - type: citation
        text: '84:14 Justice shall walk before him: * and shall set his steps in the way.'
  psalm.85-1-incl-na-d-mine-aurem-tuam-et-ex-udi-me-qu-n-aa0e0000b9:
    role: psalm
    content:
      en:
      - type: citation
        text: '85:1 Incline thy ear, O Lord, and hear me: * for I am needy and poor.'
      - type: citation
        text: '85:2 Preserve my soul, for I am holy: * save thy servant, O my God, that trusteth in thee.'
      - type: citation
        text: 85:3 Have mercy on me, O Lord, for I have cried to thee all the day. * Give joy to the soul of thy servant, for to thee, O Lord, I have lifted up my soul.
      - type: citation
        text: '85:5 For thou, O Lord, art sweet and mild: * and plenteous in mercy to all that call upon thee.'
      - type: citation
        text: '85:6 Give ear, O Lord, to my prayer: * and attend to the voice of my petition.'
      - type: citation
        text: '85:7 I have called upon thee in the day of my trouble: * because thou hast heard me.'
      - type: citation
        text: '85:8 There is none among the gods like unto thee, O Lord: * and there is none according to thy works.'
      - type: citation
        text: '85:9 All the nations thou hast made shall come and adore before thee, O Lord: * and they shall glorify thy name.'
      - type: citation
        text: '85:10 For thou art great and dost wonderful things: * thou art God alone.'
      - type: citation
        text: '85:11 Conduct me, O Lord, in thy way, and I will walk in thy truth: * let my heart rejoice that it may fear thy name.'
      - type: citation
        text: '85:12 I will praise thee, O Lord my God, with my whole heart, * and I will glorify thy name for ever:'
      - type: citation
        text: '85:13 For thy mercy is great towards me: * and thou hast delivered my soul out of the lower hell.'
      - type: citation
        text: '85:14 O God, the wicked are risen up against me, and the assembly of the mighty have sought my soul: * and they have not set thee before their eyes.'
      - type: citation
        text: 85:15 And thou, O Lord, art a God of compassion, and merciful, * patient, and of much mercy, and true.
      - type: citation
        text: '85:16 O look upon me, and have mercy on me: * give thy command to thy servant, and save the son of thy handmaid.'
      - type: citation
        text: '85:17 Shew me a token for good: that they who hate me may see, and be confounded, * because thou, O Lord, hast helped me and hast comforted me.'
      la:
      - type: citation
        text: '85:1 Inclína, Dómine, aurem tuam, et exáudi me: * quóniam inops, et pauper sum ego.'
      - type: citation
        text: '85:2 Custódi ánimam meam, quóniam sanctus sum: * salvum fac servum tuum, Deus meus, sperántem in te.'
      - type: citation
        text: '85:3 Miserére mei, Dómine, quóniam ad te clamávi tota die: * lætífica ánimam servi tui, quóniam ad te, Dómine, ánimam meam levávi.'
      - type: citation
        text: '85:5 Quóniam tu, Dómine, suávis, et mitis: * et multæ misericórdiæ ómnibus invocántibus te.'
      - type: citation
        text: '85:6 Áuribus pércipe, Dómine, oratiónem meam: * et inténde voci deprecatiónis meæ.'
      - type: citation
        text: '85:7 In die tribulatiónis meæ clamávi ad te: * quia exaudísti me.'
      - type: citation
        text: '85:8 Non est símilis tui in diis, Dómine: * et non est secúndum ópera tua.'
      - type: citation
        text: '85:9 Omnes gentes quascúmque fecísti, vénient, et adorábunt coram te, Dómine: * et glorificábunt nomen tuum.'
      - type: citation
        text: '85:10 Quóniam magnus es tu, et fáciens mirabília: * tu es Deus solus.'
      - type: citation
        text: '85:11 Deduc me, Dómine, in via tua, et ingrédiar in veritáte tua: * lætétur cor meum ut tímeat nomen tuum.'
      - type: citation
        text: '85:12 Confitébor tibi, Dómine, Deus meus, in toto corde meo, * et glorificábo nomen tuum in ætérnum:'
      - type: citation
        text: '85:13 Quia misericórdia tua magna est super me: * et eruísti ánimam meam ex inférno inferióri.'
      - type: citation
        text: '85:14 Deus, iníqui insurrexérunt super me, et synagóga poténtium quæsiérunt ánimam meam: * et non proposuérunt te in conspéctu suo.'
      - type: citation
        text: 85:15 Et tu, Dómine, Deus miserátor et miséricors, * pátiens, et multæ misericórdiæ, et verax,
      - type: citation
        text: '85:16 Réspice in me, et miserére mei, * da impérium tuum púero tuo: et salvum fac fílium ancíllæ tuæ.'
      - type: citation
        text: '85:17 Fac mecum signum in bonum, ut vídeant qui odérunt me, et confundántur: * quóniam tu, Dómine, adiuvísti me, et consolátus es me.'
      en2:
      - type: citation
        text: '85:1 Incline your ear, O Lord, and hear me: * for I am needy and poor.'
      - type: citation
        text: '85:2 Preserve my soul, for I am holy: * save your servant, O my God, who trusts in you.'
      - type: citation
        text: '85:3 Have mercy on me, O Lord, for I have cried to you all the day: * give joy to the soul of your servant, for to you, O Lord, I have lifted up my soul.'
      - type: citation
        text: '85:5 For you, O Lord, are sweet and mild: * and plenteous in mercy to all who call upon you.'
      - type: citation
        text: '85:6 Give ear, O Lord, to my prayer: * and attend to the voice of my supplication.'
      - type: citation
        text: '85:7 In the day of my trouble I called upon you: * because you heard me.'
      - type: citation
        text: '85:8 There is none like you among the gods, O Lord: * and there is none according to your works.'
      - type: citation
        text: '85:9 All the nations you have made shall come and adore before you, O Lord: * and shall glorify your name.'
      - type: citation
        text: '85:10 For you are great and do marvelous things: * you are God alone.'
      - type: citation
        text: '85:11 Lead me, O Lord, in your way, and I will walk in your truth: * let my heart rejoice that it may fear your name.'
      - type: citation
        text: '85:12 I will praise you, O Lord my God, with my whole heart, * and I will glorify your name for ever:'
      - type: citation
        text: '85:13 For your mercy is great over me: * and you have delivered my soul from the lower hell.'
      - type: citation
        text: '85:14 O God, the wicked have risen up against me, and the assembly of the mighty have sought my soul: * and they have not set you before their eyes.'
      - type: citation
        text: 85:15 But you, O Lord, are a God of compassion and mercy, * patient, and plenteous in mercy, and true,
      - type: citation
        text: '85:16 Look upon me, and have mercy on me, * give your strength to your servant: and save the son of your handmaid.'
      - type: citation
        text: '85:17 Show me a token for good, that they who hate me may see and be confounded: * because you, O Lord, have helped me and comforted me.'
  psalm.86-1-fundam-nta-eius-in-m-ntibus-sanctis-d-ligit-ce205d50d3:
    role: psalm
    content:
      en:
      - type: citation
        text: '86:1 The foundations thereof are in the holy mountains: * The Lord loveth the gates of Sion above all the tabernacles of Jacob.'
      - type: citation
        text: 86:3 Glorious things are said of thee, * O city of God.
      - type: citation
        text: 86:4 I will be mindful of Rahab and of Babylon * knowing me.
      - type: citation
        text: 86:4 Behold the foreigners, and Tyre, and the people of the Ethiopians, * these were there.
      - type: citation
        text: '86:5 Shall not Sion say: This man and that man is born in her? * and the Highest himself hath founded her.'
      - type: citation
        text: 86:6 The Lord shall tell in his writings of peoples and of princes, * of them that have been in her.
      - type: citation
        text: 86:7 The dwelling in thee * is as it were of all rejoicing.
      la:
      - type: citation
        text: '86:1 Fundaménta eius in móntibus sanctis: * díligit Dóminus portas Sion super ómnia tabernácula Iacob.'
      - type: citation
        text: 86:3 Gloriósa dicta sunt de te, * cívitas Dei.
      - type: citation
        text: 86:4 Memor ero Rahab, et Babylónis * sciéntium me.
      - type: citation
        text: 86:4 Ecce, alienígenæ, et Tyrus, et pópulus Æthíopum, * hi fuérunt illic.
      - type: citation
        text: '86:5 Numquid Sion dicet: Homo, et homo natus est in ea: * et ipse fundávit eam Altíssimus?'
      - type: citation
        text: '86:6 Dóminus narrábit in scriptúris populórum, et príncipum: * horum, qui fuérunt in ea.'
      - type: citation
        text: 86:7 Sicut lætántium ómnium * habitátio est in te.
      en2:
      - type: citation
        text: '86:1 Its foundations are on the holy mountains: * the Lord loves the gates of Zion above all the tabernacles of Jacob.'
      - type: citation
        text: 86:3 Glorious things are spoken of you, * O city of God.
      - type: citation
        text: 86:4 I will be mindful of Rahab, and of Babylon * among those that know me.
      - type: citation
        text: '86:4 Behold the Philistines, and Tyre, and the people of Ethiopia: * these were born there.'
      - type: citation
        text: '86:5 Shall not Zion say: A man, and a man was born in her: * and the Most High himself has founded her?'
      - type: citation
        text: '86:6 The Lord shall recount in the writings of the peoples and of the princes: * of those who were born in her.'
      - type: citation
        text: 86:7 As of all those who rejoice, * the dwelling is in you.
  psalm.87-2-d-mine-deus-sal-tis-me-in-die-clam-vi-et-no-486e5ae7bc:
    role: psalm
    content:
      en:
      - type: citation
        text: '87:2 Lord, the God of my salvation: * I have cried in the day, and in the night before thee.'
      - type: citation
        text: '87:3 Let my prayer come in before thee: * incline thy ear to my petition.'
      - type: citation
        text: '87:4 For my soul is filled with evils: * and my life hath drawn nigh to hell.'
      - type: citation
        text: '87:5 I am counted among them that go down to the pit: * I am become as a man without help, free among the dead.'
      - type: citation
        text: '87:6 Like the slain sleeping in the sepulchres, whom thou rememberest no more: * and they are cast off from thy hand.'
      - type: citation
        text: '87:7 They have laid me in the lower pit: * in the dark places, and in the shadow of death.'
      - type: citation
        text: '87:8 Thy wrath is strong over me: * and all thy waves thou hast brought in upon me.'
      - type: citation
        text: '87:9 Thou hast put away my acquaintance far from me: * they have set me an abomination to themselves.'
      - type: citation
        text: '87:9 I was delivered up, and came not forth: * my eyes languished through poverty.'
      - type: citation
        text: '87:10 All the day I cried to thee, O Lord: * I stretched out my hands to thee.'
      - type: citation
        text: 87:11 Wilt thou shew wonders to the dead? * or shall physicians raise to life, and give praise to thee?
      - type: citation
        text: '87:12 Shall any one in the sepulchre declare thy mercy: * and thy truth in destruction?'
      - type: citation
        text: 87:13 Shall thy wonders be known in the dark; * and thy justice in the land of forgetfulness?
      - type: citation
        text: '87:14 But I, O Lord, have cried to thee: * and in the morning my prayer shall prevent thee.'
      - type: citation
        text: '87:15 Lord, why castest thou off my prayer: * why turnest thou away thy face from me?'
      - type: citation
        text: '87:16 I am poor, and in labours from my youth: * and being exalted have been humbled and troubled.'
      - type: citation
        text: '87:17 Thy wrath hath come upon me: * and thy terrors have troubled me.'
      - type: citation
        text: '87:18 They have come round about me like water all the day: * they have compassed me about together.'
      - type: citation
        text: '87:19 Friend and neighbour thou hast put far from me: * and my acquaintance, because of misery.'
      la:
      - type: citation
        text: '87:2 Dómine, Deus salútis meæ: * in die clamávi, et nocte coram te.'
      - type: citation
        text: '87:3 Intret in conspéctu tuo orátio mea: * inclína aurem tuam ad precem meam:'
      - type: citation
        text: '87:4 Quia repléta est malis ánima mea: * et vita mea inférno appropinquávit.'
      - type: citation
        text: '87:5 Æstimátus sum cum descendéntibus in lacum: * factus sum sicut homo sine adiutório, inter mórtuos liber.'
      - type: citation
        text: '87:6 Sicut vulneráti dormiéntes in sepúlcris, quorum non es memor ámplius: * et ipsi de manu tua repúlsi sunt.'
      - type: citation
        text: '87:7 Posuérunt me in lacu inferióri: * in tenebrósis, et in umbra mortis.'
      - type: citation
        text: '87:8 Super me confirmátus est furor tuus: * et omnes fluctus tuos induxísti super me.'
      - type: citation
        text: '87:9 Longe fecísti notos meos a me: * posuérunt me abominatiónem sibi.'
      - type: citation
        text: '87:9 Tráditus sum, et non egrediébar: * óculi mei languérunt præ inópia.'
      - type: citation
        text: '87:10 Clamávi ad te, Dómine, tota die: * expándi ad te manus meas.'
      - type: citation
        text: '87:11 Numquid mórtuis fácies mirabília: * aut médici suscitábunt, et confitebúntur tibi?'
      - type: citation
        text: 87:12 Numquid narrábit áliquis in sepúlcro misericórdiam tuam, * et veritátem tuam in perditióne?
      - type: citation
        text: 87:13 Numquid cognoscéntur in ténebris mirabília tua, * et iustítia tua in terra obliviónis?
      - type: citation
        text: '87:14 Et ego ad te, Dómine, clamávi: * et mane orátio mea prævéniet te.'
      - type: citation
        text: '87:15 Ut quid, Dómine, repéllis oratiónem meam: * avértis fáciem tuam a me?'
      - type: citation
        text: '87:16 Pauper sum ego, et in labóribus a iuventúte mea: * exaltátus autem, humiliátus sum et conturbátus.'
      - type: citation
        text: '87:17 In me transiérunt iræ tuæ: * et terróres tui conturbavérunt me.'
      - type: citation
        text: '87:18 Circumdedérunt me sicut aqua tota die: * circumdedérunt me simul.'
      - type: citation
        text: '87:19 Elongásti a me amícum et próximum: * et notos meos a miséria.'
      en2:
      - type: citation
        text: '87:2 O Lord, the God of my salvation: * I have cried by day, and in the night before you.'
      - type: citation
        text: '87:3 Let my prayer enter into your sight: * incline your ear to my supplication.'
      - type: citation
        text: '87:4 For my soul is filled with evils: * and my life has drawn near to the grave.'
      - type: citation
        text: '87:5 I am counted among those who go down to the pit: * I have become as a man without help, free among the dead.'
      - type: citation
        text: '87:6 Like the wounded sleeping in the sepulchres, whom you remember no more: * and they are cast off from your hand.'
      - type: citation
        text: '87:7 They have placed me in the lower pit: * in the dark places, and in the shadow of death.'
      - type: citation
        text: '87:8 Your wrath is confirmed over me: * and all your waves you have brought in upon me.'
      - type: citation
        text: '87:9 You have put my acquaintances far from me: * they have made me an abomination to themselves.'
      - type: citation
        text: '87:9 I am shut up, and I cannot go forth: * my eyes have languished through poverty.'
      - type: citation
        text: '87:10 I cried to you, O Lord, all the day: * I stretched out my hands to you.'
      - type: citation
        text: '87:11 Will you work wonders for the dead: * or shall the physicians raise them up, and they shall give thanks to you?'
      - type: citation
        text: 87:12 Shall anyone in the sepulchre declare your mercy, * and your truth in destruction?
      - type: citation
        text: 87:13 Shall your wonders be known in the dark, * and your justice in the land of forgetfulness?
      - type: citation
        text: '87:14 But I, O Lord, have cried to you: * and in the morning my prayer shall come before you.'
      - type: citation
        text: '87:15 Why, O Lord, do you reject my prayer: * why do you turn your face away from me?'
      - type: citation
        text: '87:16 I am poor, and in labors from my youth: * and being exalted, I have been humbled and troubled.'
      - type: citation
        text: '87:17 Your wrath has passed over me: * and your terrors have troubled me.'
      - type: citation
        text: '87:18 They have surrounded me like water all the day: * they have compassed me about together.'
      - type: citation
        text: '87:19 You have put far from me friend and neighbor: * and my acquaintances, because of misery.'
  psalm.88-2-miseric-rdias-d-mini-in-t-rnum-cant-bo-48bf020082:
    role: psalm
    content:
      en:
      - type: citation
        text: 88:2 The mercies of the Lord * I will sing for ever.
      - type: citation
        text: 88:2 I will shew forth thy truth with my mouth * to generation and generation.
      - type: citation
        text: '88:3 For thou hast said: Mercy shall be built up for ever in the heavens: * thy truth shall be prepared in them.'
      - type: citation
        text: '88:4 I have made a covenant with my elect: I have sworn to David my servant: * Thy seed will I settle for ever.'
      - type: citation
        text: 88:5 And I will build up thy throne * unto generation and generation.
      - type: citation
        text: '88:6 The heavens shall confess thy wonders, O Lord: * and thy truth in the church of the saints.'
      - type: citation
        text: '88:7 For who in the clouds can be compared to the Lord: * or who among the sons of God shall be like to God?'
      - type: citation
        text: '88:8 God, who is glorified in the assembly of the saints: * great and terrible above all them that are about him.'
      - type: citation
        text: 88:9 O Lord God of hosts, who is like to thee? * thou art mighty, O Lord, and thy truth is round about thee.
      - type: citation
        text: '88:10 Thou rulest the power of the sea: * and appeasest the motion of the waves thereof.'
      - type: citation
        text: '88:11 Thou hast humbled the proud one, as one that is slain: * with the arm of thy strength thou hast scattered thy enemies.'
      - type: citation
        text: '88:12 Thine are the heavens, and thine is the earth: the world and the fulness thereof thou hast founded: * the north and the sea thou hast created.'
      - type: citation
        text: '88:13 Thabor and Hermon shall rejoice in thy name: * thy arm is with might.'
      - type: citation
        text: '88:14 Let thy hand be strengthened, and thy right hand exalted: * justice and judgment are the preparation of thy throne.'
      - type: citation
        text: '88:15 Mercy and truth shall go before thy face: * blessed is the people that knoweth jubilation.'
      - type: citation
        text: '88:16 They shall walk, O Lord, in the light of thy countenance: and in thy name they shall rejoice all the day, * and in thy justice they shall be exalted.'
      - type: citation
        text: '88:18 For thou art the glory of their strength: * and in thy good pleasure shall our horn be exalted.'
      - type: citation
        text: 88:19 For our protection is of the Lord, * and of our king the holy one of Israel.
      - type: citation
        text: '88:20 Then thou spokest in a vision to thy saints, and saidst: * I have laid help upon one that is mighty, and have exalted one chosen out of my people.'
      - type: citation
        text: '88:21 I have found David my servant: * with my holy oil I have anointed him.'
      - type: citation
        text: '88:22 For my hand shall help him: * and my arm shall strengthen him.'
      - type: citation
        text: '88:23 The enemy shall have no advantage over him: * nor the son of iniquity have power to hurt him.'
      - type: citation
        text: 88:24 And I will cut down his enemies before his face; * and them that hate him I will put to flight.
      - type: citation
        text: '88:25 And my truth and my mercy shall be with him: * and in my name shall his horn be exalted.'
      - type: citation
        text: 88:26 And I will set his hand in the sea; * and his right hand in the rivers.
      - type: citation
        text: '88:27 He shall cry out to me: Thou art my father: * my God, and the support of my salvation.'
      - type: citation
        text: 88:28 And I will make him my firstborn, * high above the kings of the earth.
      - type: citation
        text: '88:29 I will keep my mercy for him for ever: * and my covenant faithful to him.'
      - type: citation
        text: '88:30 And I will make his seed to endure for evermore: * and his throne as the days of heaven.'
      - type: citation
        text: '88:31 And if his children forsake my law, * and walk not in my judgments:'
      - type: citation
        text: '88:32 If they profane my justices: * and keep not my commandments:'
      - type: citation
        text: '88:33 I will visit their iniquities with a rod: *and their sins with stripes.'
      - type: citation
        text: '88:34 But my mercy I will not take away from him: * nor will I suffer my truth to fail.'
      - type: citation
        text: '88:35 Neither will I profane my covenant: * and the words that proceed from my mouth I will not make void.'
      - type: citation
        text: '88:36 Once have I sworn by my holiness: I will not lie unto David: * his seed shall endure for ever.'
      - type: citation
        text: '88:37 And his throne as the sun before me: * and as the moon perfect for ever, and a faithful witness in heaven.'
      - type: citation
        text: '88:39 But thou hast rejected and despised: * thou hast been angry with thy anointed.'
      - type: citation
        text: '88:40 Thou hast overthrown the covenant of thy servant: * thou hast profaned his sanctuary on the earth.'
      - type: citation
        text: '88:41 Thou hast broken down all his hedges: * thou hast made his strength fear.'
      - type: citation
        text: '88:42 All that pass by the way have robbed him: * he is become a reproach to his neighbours.'
      - type: citation
        text: '88:43 Thou hast set up the right hand of them that oppress him: * thou hast made all his enemies to rejoice.'
      - type: citation
        text: 88:44 Thou hast turned away the help of his sword; * and hast not assisted him in battle.
      - type: citation
        text: '88:45 Thou hast made his purification to cease: * and thou hast cast his throne down to the ground.'
      - type: citation
        text: '88:46 Thou hast shortened the days of his time: * thou hast covered him with confusion.'
      - type: citation
        text: 88:47 How long, O Lord, turnest thou away unto the end? * shall thy anger burn like fire?
      - type: citation
        text: '88:48 Remember what my substance is: * for hast thou made all the children of men in vain?'
      - type: citation
        text: '88:49 Who is the man that shall live, and not see death: * that shall deliver his soul from the hand of hell?'
      - type: citation
        text: 88:50 Lord, where are thy ancient mercies, * according to what thou didst swear to David in thy truth?
      - type: citation
        text: '88:51 Be mindful, O Lord, of the reproach of thy servants * which I have held in my bosom of many nations:'
      - type: citation
        text: 88:52 Wherewith thy enemies have reproached, O Lord; * wherewith they have reproached the change of thy anointed.
      - type: citation
        text: 88:53 Blessed be the Lord for evermore. * So be it. So be it.
      la:
      - type: citation
        text: 88:2 Misericórdias Dómini * in ætérnum cantábo.
      - type: citation
        text: 88:2 In generatiónem et generatiónem * annuntiábo veritátem tuam in ore meo.
      - type: citation
        text: '88:3 Quóniam dixísti: In ætérnum misericórdia ædificábitur in cælis: * præparábitur véritas tua in eis.'
      - type: citation
        text: '88:4 Dispósui testaméntum eléctis meis, iurávi David, servo meo: * Usque in ætérnum præparábo semen tuum.'
      - type: citation
        text: 88:5 Et ædificábo in generatiónem et generatiónem * sedem tuam.
      - type: citation
        text: '88:6 Confitebúntur cæli mirabília tua, Dómine: * étenim veritátem tuam in ecclésia sanctórum.'
      - type: citation
        text: '88:7 Quóniam quis in núbibus æquábitur Dómino: * símilis erit Deo in fíliis Dei?'
      - type: citation
        text: '88:8 Deus, qui glorificátur in consílio sanctórum: * magnus et terríbilis super omnes qui in circúitu eius sunt.'
      - type: citation
        text: 88:9 Dómine, Deus virtútum, quis símilis tibi? * potens es, Dómine, et véritas tua in circúitu tuo.
      - type: citation
        text: '88:10 Tu domináris potestáti maris: * motum autem flúctuum eius tu mítigas.'
      - type: citation
        text: '88:11 Tu humiliásti sicut vulnerátum, supérbum: * in brácchio virtútis tuæ dispersísti inimícos tuos.'
      - type: citation
        text: '88:12 Tui sunt cæli, et tua est terra, orbem terræ et plenitúdinem eius tu fundásti: * aquilónem, et mare tu creásti.'
      - type: citation
        text: '88:13 Thabor et Hermon in nómine tuo exsultábunt: * tuum brácchium cum poténtia.'
      - type: citation
        text: '88:14 Firmétur manus tua, et exaltétur déxtera tua: * iustítia et iudícium præparátio sedis tuæ.'
      - type: citation
        text: '88:15 Misericórdia et véritas præcédent fáciem tuam: * beátus pópulus, qui scit iubilatiónem.'
      - type: citation
        text: '88:16 Dómine, in lúmine vultus tui ambulábunt, et in nómine tuo exsultábunt tota die: * et in iustítia tua exaltabúntur.'
      - type: citation
        text: '88:18 Quóniam glória virtútis eórum tu es: * et in beneplácito tuo exaltábitur cornu nostrum.'
      - type: citation
        text: 88:19 Quia Dómini est assúmptio nostra, * et Sancti Israël, regis nostri.
      - type: citation
        text: '88:20 Tunc locútus es in visióne sanctis tuis, et dixísti: * Pósui adiutórium in poténte: et exaltávi eléctum de plebe mea.'
      - type: citation
        text: '88:21 Invéni David, servum meum: * óleo sancto meo unxi eum.'
      - type: citation
        text: '88:22 Manus enim mea auxiliábitur ei: * et brácchium meum confortábit eum.'
      - type: citation
        text: 88:23 Nihil profíciet inimícus in eo, * et fílius iniquitátis non appónet nocére ei.
      - type: citation
        text: '88:24 Et concídam a fácie ipsíus inimícos eius: * et odiéntes eum in fugam convértam.'
      - type: citation
        text: '88:25 Et véritas mea, et misericórdia mea cum ipso: * et in nómine meo exaltábitur cornu eius.'
      - type: citation
        text: '88:26 Et ponam in mari manum eius: * et in flumínibus déxteram eius.'
      - type: citation
        text: '88:27 Ipse invocábit me: Pater meus es tu: * Deus meus, et suscéptor salútis meæ.'
      - type: citation
        text: 88:28 Et ego primogénitum ponam illum * excélsum præ régibus terræ.
      - type: citation
        text: '88:29 In ætérnum servábo illi misericórdiam meam: * et testaméntum meum fidéle ipsi.'
      - type: citation
        text: '88:30 Et ponam in sǽculum sǽculi semen eius: * et thronum eius sicut dies cæli.'
      - type: citation
        text: '88:31 Si autem derelíquerint fílii eius legem meam: * et in iudíciis meis non ambuláverint:'
      - type: citation
        text: '88:32 Si iustítias meas profanáverint: * et mandáta mea non custodíerint:'
      - type: citation
        text: '88:33 Visitábo in virga iniquitátes eórum: * et in verbéribus peccáta eórum.'
      - type: citation
        text: '88:34 Misericórdiam autem meam non dispérgam ab eo: * neque nocébo in veritáte mea:'
      - type: citation
        text: '88:35 Neque profanábo testaméntum meum: * et quæ procédunt de lábiis meis, non fáciam írrita.'
      - type: citation
        text: '88:36 Semel iurávi in sancto meo: Si David méntiar: * semen eius in ætérnum manébit.'
      - type: citation
        text: '88:37 Et thronus eius sicut sol in conspéctu meo, * et sicut luna perfécta in ætérnum: et testis in cælo fidélis.'
      - type: citation
        text: '88:39 Tu vero repulísti et despexísti: * distulísti Christum tuum.'
      - type: citation
        text: '88:40 Evertísti testaméntum servi tui: * profanásti in terra Sanctuárium eius.'
      - type: citation
        text: '88:41 Destruxísti omnes sepes eius: * posuísti firmaméntum eius formídinem.'
      - type: citation
        text: '88:42 Diripuérunt eum omnes transeúntes viam: * factus est oppróbrium vicínis suis.'
      - type: citation
        text: '88:43 Exaltásti déxteram depriméntium eum: * lætificásti omnes inimícos eius.'
      - type: citation
        text: '88:44 Avertísti adiutórium gládii eius: * et non es auxiliátus ei in bello.'
      - type: citation
        text: '88:45 Destruxísti eum ab emundatióne: * et sedem eius in terram collisísti.'
      - type: citation
        text: '88:46 Minorásti dies témporis eius: * perfudísti eum confusióne.'
      - type: citation
        text: '88:47 Úsquequo, Dómine, avértis in finem: * exardéscet sicut ignis ira tua?'
      - type: citation
        text: '88:48 Memoráre quæ mea substántia: * numquid enim vane constituísti omnes fílios hóminum?'
      - type: citation
        text: '88:49 Quis est homo, qui vivet, et non vidébit mortem: * éruet ánimam suam de manu ínferi?'
      - type: citation
        text: 88:50 Ubi sunt misericórdiæ tuæ antíquæ, Dómine, * sicut iurásti David in veritáte tua?
      - type: citation
        text: 88:51 Memor esto, Dómine, oppróbrii servórum tuórum * quod contínui in sinu meo multárum géntium.
      - type: citation
        text: 88:52 Quod exprobravérunt inimíci tui, Dómine, * quod exprobravérunt commutatiónem Christi tui.
      - type: citation
        text: '88:53 Benedíctus Dóminus in ætérnum: * fiat, fiat.'
