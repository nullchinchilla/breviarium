        text: 26:2 My enemies who trouble me * have themselves stumbled and fallen.
      - type: citation
        text: 26:3 If armies encamp against me, * my heart shall not fear.
      - type: citation
        text: 26:3 If battle rise up against me, * in this I will hope.
      - type: citation
        text: '26:4 One thing I have asked of the Lord, this will I seek after: * that I may dwell in the house of the Lord all the days of my life:'
      - type: citation
        text: 26:4 That I may behold the delight of the Lord, * and may visit his temple.
      - type: citation
        text: '26:5 For he has hidden me in his tabernacle: * in the day of troubles he has protected me in the secret place of his tabernacle.'
      - type: citation
        text: '26:6 He has exalted me upon a rock: * and now he has lifted up my head above my enemies.'
      - type: citation
        text: '26:6 I have gone about and offered in his tabernacle a sacrifice of jubilation: * I will sing and will recite a psalm to the Lord.'
      - type: citation
        text: '26:7 Hear, O Lord, my voice with which I have cried to you: * have mercy on me, and hear me.'
      - type: citation
        text: '26:8 My heart has said to you: my face has sought you: * your face, O Lord, will I seek.'
      - type: citation
        text: '26:9 Turn not away your face from me: * turn not away in anger from your servant.'
      - type: citation
        text: '26:9 Be my helper: * forsake me not, nor despise me, O God my Savior.'
      - type: citation
        text: '26:10 For my father and my mother have forsaken me: * but the Lord has taken me up.'
      - type: citation
        text: '26:11 Set me a law, O Lord, in your way: * and guide me in the right path because of my enemies.'
      - type: citation
        text: '26:12 Deliver me not over to the souls of those who trouble me: * for unjust witnesses have risen up against me, and iniquity has lied to itself.'
      - type: citation
        text: 26:13 I believe that I shall see the good things of the Lord * in the land of the living.
      - type: citation
        text: '26:14 Wait for the Lord, do manfully: * and let your heart take courage, and wait for the Lord.'
  psalm.27-1-ad-te-d-mine-clam-bo-deus-meus-ne-s-leas-a-cbeb774111:
    role: psalm
    content:
      en:
      - type: citation
        text: '27:1 Unto thee will I cry, O Lord: my God, be not thou silent to me: * lest if thou be silent to me, I become like them that go down into the pit.'
      - type: citation
        text: 27:2 Hear, O Lord, the voice of my supplication, when I pray to thee; * when I lift up my hands to thy holy temple.
      - type: citation
        text: '27:3 Draw me not away together with the wicked; * and with the workers of iniquity destroy me not:'
      - type: citation
        text: 27:3 Who speak peace with their neighbour, * but evils are in their hearts.
      - type: citation
        text: 27:4 Give them according to their works, * and according to the wickedness of their inventions.
      - type: citation
        text: '27:4 According to the works of their hands give thou to them: * render to them their reward.'
      - type: citation
        text: '27:5 Because they have not understood the works of the Lord, and the operations of his hands: * thou shalt destroy them, and shalt not build them up.'
      - type: citation
        text: 27:6 Blessed be the Lord, * for he hath heard the voice of my supplication.
      - type: citation
        text: '27:7 The Lord is my helper and my protector: * in him hath my heart confided, and I have been helped.'
      - type: citation
        text: 27:7 And my flesh hath flourished again, * and with my will I will give praise to him.
      - type: citation
        text: 27:8 The Lord is the strength of his people, * and the protector of the salvation of his anointed.
      - type: citation
        text: '27:9 Save, O Lord, thy people, and bless thy inheritance: * and rule them and exalt them for ever.'
      la:
      - type: citation
        text: '27:1 Ad te, Dómine, clamábo, Deus meus, ne síleas a me: * nequándo táceas a me, et assimilábor descendéntibus in lacum.'
      - type: citation
        text: '27:2 Exáudi, Dómine, vocem deprecatiónis meæ dum oro ad te: * dum extóllo manus meas ad templum sanctum tuum.'
      - type: citation
        text: '27:3 Ne simul trahas me cum peccatóribus: * et cum operántibus iniquitátem ne perdas me.'
      - type: citation
        text: 27:3 Qui loquúntur pacem cum próximo suo, * mala autem in córdibus eórum.
      - type: citation
        text: 27:4 Da illis secúndum ópera eórum, * et secúndum nequítiam adinventiónum ipsórum.
      - type: citation
        text: '27:4 Secúndum ópera mánuum eórum tríbue illis: * redde retributiónem eórum ipsis.'
      - type: citation
        text: 27:5 Quóniam non intellexérunt ópera Dómini, et in ópera mánuum eius * déstrues illos, et non ædificábis eos.
      - type: citation
        text: '27:6 Benedíctus Dóminus: * quóniam exaudívit vocem deprecatiónis meæ.'
      - type: citation
        text: '27:7 Dóminus adiútor meus, et protéctor meus: * in ipso sperávit cor meum, et adiútus sum.'
      - type: citation
        text: '27:7 Et reflóruit caro mea: * et ex voluntáte mea confitébor ei.'
      - type: citation
        text: '27:8 Dóminus fortitúdo plebis suæ: * et protéctor salvatiónum Christi sui est.'
      - type: citation
        text: '27:9 Salvum fac pópulum tuum, Dómine, et bénedic hereditáti tuæ: * et rege eos, et extólle illos usque in ætérnum.'
      en2:
      - type: citation
        text: '27:1 To you, O Lord, will I cry, O my God, be not silent to me: * lest if you be silent to me, I become like those who go down into the pit.'
      - type: citation
        text: '27:2 Hear, O Lord, the voice of my supplication while I pray to you: * while I lift up my hands toward your holy temple.'
      - type: citation
        text: '27:3 Draw me not away together with sinners: * and destroy me not with those who work iniquity.'
      - type: citation
        text: 27:3 Who speak peace with their neighbor, * but evil is in their hearts.
      - type: citation
        text: 27:4 Give them according to their works, * and according to the wickedness of their devices.
      - type: citation
        text: '27:4 According to the works of their hands render to them: * repay them their recompense.'
      - type: citation
        text: 27:5 Because they have not understood the works of the Lord, and the works of his hands, * you shall destroy them, and shall not build them up.
      - type: citation
        text: '27:6 Blessed be the Lord: * for he has heard the voice of my supplication.'
      - type: citation
        text: '27:7 The Lord is my helper and my protector: * in him my heart has trusted, and I have been helped.'
      - type: citation
        text: '27:7 And my flesh has flourished again: * and with my whole will I will give praise to him.'
      - type: citation
        text: 27:8 The Lord is the strength of his people, * and the protector of the salvation of his anointed.
      - type: citation
        text: '27:9 Save your people, O Lord, and bless your inheritance: * and rule them and exalt them forever.'
  psalm.28-1-aff-rte-d-mino-f-lii-dei-aff-rte-d-mino-f-l-20d691eef6:
    role: psalm
    content:
      en:
      - type: citation
        text: '28:1 Bring to the Lord, O ye children of God: * bring to the Lord the offspring of rams.'
      - type: citation
        text: '28:2 Bring to the Lord glory and honour: bring to the Lord glory to his name: * adore ye the Lord in his holy court.'
      - type: citation
        text: 28:3 The voice of the Lord is upon the waters; the God of majesty hath thundered, * The Lord is upon many waters.
      - type: citation
        text: 28:4 The voice of the Lord is in power; * the voice of the Lord in magnificence.
      - type: citation
        text: '28:5 The voice of the Lord breaketh the cedars: * yea, the Lord shall break the cedars of Libanus.'
      - type: citation
        text: 28:6 And shall reduce them to pieces, as a calf of Libanus, * and as the beloved son of unicorns.
      - type: citation
        text: '28:7 The voice of the Lord divideth the flame of fire: * The voice of the Lord shaketh the desert: and the Lord shall shake the desert of Cades.'
      - type: citation
        text: '28:9 The voice of the Lord prepareth the stags: and he will discover the thick woods: * and in his temple all shall speak his glory.'
      - type: citation
        text: '28:10 The Lord maketh the flood to dwell: * and the Lord shall sit king for ever.'
      - type: citation
        text: '28:11 The Lord will give strength to his people: * the Lord will bless his people with peace.'
      la:
      - type: citation
        text: '28:1 Afférte Dómino, fílii Dei: * afférte Dómino fílios aríetum.'
      - type: citation
        text: '28:2 Afférte Dómino glóriam et honórem, afférte Dómino glóriam nómini eius: * adoráte Dóminum in átrio sancto eius.'
      - type: citation
        text: '28:3 Vox Dómini super aquas, Deus maiestátis intónuit: * Dóminus super aquas multas.'
      - type: citation
        text: '28:4 Vox Dómini in virtúte: * vox Dómini in magnificéntia.'
      - type: citation
        text: '28:5 Vox Dómini confringéntis cedros: * et confrínget Dóminus cedros Líbani:'
      - type: citation
        text: '28:6 Et commínuet eas tamquam vítulum Líbani: * et diléctus quemádmodum fílius unicórnium.'
      - type: citation
        text: '28:7 Vox Dómini intercidéntis flammam ignis: * vox Dómini concutiéntis desértum: et commovébit Dóminus desértum Cades.'
      - type: citation
        text: '28:9 Vox Dómini præparántis cervos, et revelábit condénsa: * et in templo eius omnes dicent glóriam.'
      - type: citation
        text: '28:10 Dóminus dilúvium inhabitáre facit: * et sedébit Dóminus Rex in ætérnum.'
      - type: citation
        text: '28:11 Dóminus virtútem pópulo suo dabit: * Dóminus benedícet pópulo suo in pace.'
      en2:
      - type: citation
        text: '28:1 Bring to the Lord, O you sons of God: * bring to the Lord the offspring of rams.'
      - type: citation
        text: '28:2 Bring to the Lord glory and honor, bring to the Lord glory to his name: * adore the Lord in his holy court.'
      - type: citation
        text: '28:3 The voice of the Lord is upon the waters, the God of majesty has thundered: * the Lord is upon many waters.'
      - type: citation
        text: '28:4 The voice of the Lord in power: * the voice of the Lord in magnificence.'
      - type: citation
        text: '28:5 The voice of the Lord breaking the cedars: * and the Lord shall break the cedars of Lebanon.'
      - type: citation
        text: '28:6 And shall reduce them to pieces, as a calf of Lebanon: * and as the beloved son of unicorns.'
      - type: citation
        text: '28:7 The voice of the Lord dividing the flame of fire: the voice of the Lord shaking the desert: * and the Lord shall shake the desert of Cades.'
      - type: citation
        text: '28:9 The voice of the Lord preparing the stags, and he shall reveal the dense forests: * and in his temple all shall speak his glory.'
      - type: citation
        text: '28:10 The Lord makes the flood to dwell: * and the Lord shall sit as King forever.'
      - type: citation
        text: '28:11 The Lord will give strength to his people: * the Lord will bless his people with peace.'
  psalm.29-2-exalt-bo-te-d-mine-qu-niam-suscep-sti-me-ne-f9b9133006:
    role: psalm
    content:
      en:
      - type: citation
        text: '29:2 I will extol thee, O Lord, for thou hast upheld me: * and hast not made my enemies to rejoice over me.'
      - type: citation
        text: 29:3 O Lord my God, I have cried to thee, * and thou hast healed me.
      - type: citation
        text: '29:4 Thou hast brought forth, O Lord, my soul from hell: * thou hast saved me from them that go down into the pit.'
      - type: citation
        text: '29:5 Sing to the Lord, O ye his saints: * and give praise to the memory of his holiness.'
      - type: citation
        text: 29:6 For wrath is in his indignation; * and life in his good will.
      - type: citation
        text: 29:6 In the evening weeping shall have place, * and in the morning gladness.
      - type: citation
        text: '29:7 And in my abundance I said: * I shall never be moved.'
      - type: citation
        text: 29:8 O Lord, in thy favour, * thou gavest strength to my beauty.
      - type: citation
        text: 29:8 Thou turnedst away thy face from me, * and I became troubled.
      - type: citation
        text: '29:9 To thee, O Lord, will I cry: * and I will make supplication to my God.'
      - type: citation
        text: 29:10 What profit is there in my blood, * whilst I go down to corruption?
      - type: citation
        text: 29:10 Shall dust confess to thee, * or declare thy truth?
      - type: citation
        text: '29:11 The Lord hath heard, and hath had mercy on me: * the Lord became my helper.'
      - type: citation
        text: '29:12 Thou hast turned for me my mourning into joy: * thou hast cut my sackcloth, and hast compassed me with gladness:'
      - type: citation
        text: '29:13 To the end that my glory may sing to thee, and I may not regret: * O Lord my God, I will give praise to thee for ever.'
      la:
      - type: citation
        text: '29:2 Exaltábo te, Dómine, quóniam suscepísti me: * nec delectásti inimícos meos super me.'
      - type: citation
        text: 29:3 Dómine, Deus meus, clamávi ad te, * et sanásti me.
      - type: citation
        text: '29:4 Dómine, eduxísti ab inférno ánimam meam: * salvásti me a descendéntibus in lacum.'
      - type: citation
        text: '29:5 Psállite Dómino, sancti eius: * et confitémini memóriæ sanctitátis eius.'
      - type: citation
        text: '29:6 Quóniam ira in indignatióne eius: * et vita in voluntáte eius.'
      - type: citation
        text: '29:6 Ad vésperum demorábitur fletus: * et ad matutínum lætítia.'
      - type: citation
        text: '29:7 Ego autem dixi in abundántia mea: * Non movébor in ætérnum.'
      - type: citation
        text: 29:8 Dómine, in voluntáte tua, * præstitísti decóri meo virtútem.
      - type: citation
        text: 29:8 Avertísti fáciem tuam a me, * et factus sum conturbátus.
      - type: citation
        text: '29:9 Ad te, Dómine, clamábo: * et ad Deum meum deprecábor.'
      - type: citation
        text: 29:10 Quæ utílitas in sánguine meo, * dum descéndo in corruptiónem?
      - type: citation
        text: 29:10 Numquid confitébitur tibi pulvis, * aut annuntiábit veritátem tuam?
      - type: citation
        text: '29:11 Audívit Dóminus, et misértus est mei: * Dóminus factus est adiútor meus.'
      - type: citation
        text: '29:12 Convertísti planctum meum in gáudium mihi: * conscidísti saccum meum, et circumdedísti me lætítia:'
      - type: citation
        text: '29:13 Ut cantet tibi glória mea, et non compúngar: * Dómine, Deus meus, in ætérnum confitébor tibi.'
      en2:
      - type: citation
        text: '29:2 I will extol you, O Lord, for you have upheld me: * and have not made my enemies to rejoice over me.'
      - type: citation
        text: 29:3 O Lord my God, I cried to you, * and you healed me.
      - type: citation
        text: '29:4 O Lord, you have brought my soul out of hell: * you have saved me from those who go down into the pit.'
      - type: citation
        text: '29:5 Sing praise to the Lord, O you his saints: * and give thanks to the remembrance of his holiness.'
      - type: citation
        text: '29:6 For his wrath is in his indignation: * and life is in his good will.'
      - type: citation
        text: '29:6 In the evening weeping shall have place: * and in the morning gladness.'
      - type: citation
        text: '29:7 And in my abundance I said: * I shall never be moved.'
      - type: citation
        text: 29:8 O Lord, in your good will, * you gave strength to my beauty.
      - type: citation
        text: 29:8 You turned away your face from me, * and I became troubled.
      - type: citation
        text: '29:9 To you, O Lord, will I cry: * and I will make supplication to my God.'
      - type: citation
        text: 29:10 What profit is there in my blood, * while I go down to corruption?
      - type: citation
        text: 29:10 Shall dust confess to you, * or shall it declare your truth?
      - type: citation
        text: '29:11 The Lord heard, and had mercy on me: * the Lord became my helper.'
      - type: citation
        text: '29:12 You have turned my mourning into gladness for me: * you have cut off my sackcloth, and you have surrounded me with joy:'
      - type: citation
        text: '29:13 So then, may my glory sing to you, and may I not regret it: * O Lord my God, I will confess to you for eternity.'
  psalm.3-2-d-mine-quid-multiplic-ti-sunt-qui-tr-bulant-98fe33d4ab:
    role: psalm
    content:
      en:
      - type: citation
        text: 3:2 Why, O Lord, are they multiplied that afflict me? * many are they who rise up against me.
      - type: citation
        text: '3:3 Many say to my soul: * There is no salvation for him in his God.'
      - type: citation
        text: 3:4 But thou, O Lord art my protector, * my glory, and the lifter up of my head.
      - type: citation
        text: '3:5 I have cried to the Lord with my voice: * and he hath heard me from his holy hill.'
      - type: citation
        text: '3:6 I have slept and taken my rest: * and I have risen up, because the Lord hath protected me.'
      - type: citation
        text: '3:7 I will not fear thousands of the people, surrounding me: * arise, O Lord; save me, O my God.'
      - type: citation
        text: '3:8 For thou hast struck all them who are my adversaries without cause: * thou hast broken the teeth of sinners.'
      - type: citation
        text: '3:9 Salvation is of the Lord: * and thy blessing is upon thy people.'
      la:
      - type: citation
        text: 3:2 Dómine, quid multiplicáti sunt qui tríbulant me? * multi insúrgunt advérsum me.
      - type: citation
        text: '3:3 Multi dicunt ánimæ meæ: * Non est salus ipsi in Deo eius.'
      - type: citation
        text: 3:4 Tu autem, Dómine, suscéptor meus es, * glória mea, et exáltans caput meum.
      - type: citation
        text: '3:5 Voce mea ad Dóminum clamávi: * et exaudívit me de monte sancto suo.'
      - type: citation
        text: '3:6 Ego dormívi, et soporátus sum: * et exsurréxi, quia Dóminus suscépit me.'
      - type: citation
        text: '3:7 Non timébo míllia pópuli circumdántis me: * exsúrge, Dómine, salvum me fac, Deus meus.'
      - type: citation
        text: '3:8 Quóniam tu percussísti omnes adversántes mihi sine causa: * dentes peccatórum contrivísti.'
      - type: citation
        text: '3:9 Dómini est salus: * et super pópulum tuum benedíctio tua.'
      en2:
      - type: citation
        text: 3:2 Lord, why have they who trouble me been multiplied? * Many rise up against me.
      - type: citation
        text: '3:3 Many say of my soul: * There is no salvation for him in his God.'
      - type: citation
        text: 3:4 But you, O Lord, are my sustainer, * my glory, and the one who lifts up my head.
      - type: citation
        text: '3:5 With my voice I cried out to the Lord: * and he heard me from his holy mountain.'
      - type: citation
        text: '3:6 I slept, and took my rest: * and I arose, for the Lord sustained me.'
      - type: citation
        text: '3:7 I will not fear thousands of people surrounding me: * arise, O Lord, save me, O my God.'
      - type: citation
        text: '3:8 For you have struck all who oppose me without cause: * you have broken the teeth of sinners.'
      - type: citation
        text: '3:9 Salvation belongs to the Lord: * and your blessing is upon your people.'
  psalm.30-2-in-te-d-mine-sper-vi-non-conf-ndar-in-t-rnu-37f0f04466:
    role: psalm
    content:
      en:
      - type: citation
        text: '30:2 In thee, O Lord, have I hoped, let me never be confounded: * deliver me in thy justice.'
      - type: citation
        text: '30:3 Bow down thy ear to me: * make haste to deliver me.'
      - type: citation
        text: 30:3 Be thou unto me a God, a protector, and a house of refuge, * to save me.
      - type: citation
        text: 30:4 For thou art my strength and my refuge; * and for thy name’s sake thou wilt lead me, and nourish me.
      - type: citation
        text: '30:5 Thou wilt bring me out of this snare, which they have hidden for me: * for thou art my protector.'
      - type: citation
        text: '30:6 Into thy hands I commend my spirit: * thou hast redeemed me, O Lord, the God of truth.'
      - type: citation
        text: 30:7 Thou hast hated them that regard vanities, * to no purpose.
      - type: citation
        text: '30:7 But I have hoped in the Lord: * I will be glad and rejoice in thy mercy.'
      - type: citation
        text: 30:8 For thou hast regarded my humility, * thou hast saved my soul out of distresses.
      - type: citation
        text: '30:9 And thou hast not shut me up in the hands of the enemy: * thou hast set my feet in a spacious place.'
      - type: citation
        text: '30:10 Have mercy on me, O Lord, for I am afflicted: * my eye is troubled with wrath, my soul, and my belly:'
      - type: citation
        text: '30:11 For my life is wasted with grief: * and my years in sighs.'
      - type: citation
        text: 30:11 My strength is weakened through poverty * and my bones are disturbed.
      - type: citation
        text: 30:12 I am become a reproach among all my enemies, and very much to my neighbours; * and a fear to my acquaintance.
      - type: citation
        text: 30:12 They that saw me without fled from me. * I am forgotten as one dead from the heart.
      - type: citation
        text: 30:13 I am become as a vessel that is destroyed. * For I have heard the blame of many that dwell round about.
      - type: citation
        text: 30:14 While they assembled together against me, * they consulted to take away my life.
      - type: citation
        text: '30:15 But I have put my trust in thee, O Lord: * I said: Thou art my God. My lots are in thy hands.'
      - type: citation
        text: 30:16 Deliver me out of the hands of my enemies; * and from them that persecute me
      - type: citation
        text: 30:17 Make thy face to shine upon thy servant; save me in thy mercy. * Let me not be confounded, O Lord, for I have called upon thee.
      - type: citation
        text: 30:18 Let the wicked be ashamed, and be brought down to hell. * Let deceitful lips be made dumb.
      - type: citation
        text: 30:19 Which speak iniquity against the just, * with pride and abuse.
      - type: citation
        text: 30:20 How great is the multitude of thy sweetness, O Lord, * which thou hast hidden for them that fear thee!
      - type: citation
        text: 30:20 Which thou hast wrought for them that hope in thee, * in the sight of the sons of men.
      - type: citation
        text: 30:21 Thou shalt hide them in the secret of thy face, * from the disturbance of men.
      - type: citation
        text: 30:21 Thou shalt protect them in thy tabernacle * from the contradiction of tongues.
      - type: citation
        text: 30:22 Blessed be the Lord, * for he hath shewn his wonderful mercy to me in a fortified city.
      - type: citation
        text: '30:23 But I said in the excess of my mind: * I am cast away from before thy eyes.'
      - type: citation
        text: 30:23 Therefore thou hast heard the voice of my prayer, * when I cried to thee.
      - type: citation
        text: '30:24 O love the Lord, all ye his saints: * for the Lord will require truth, and will repay them abundantly that act proudly.'
      - type: citation
        text: 30:25 Do ye manfully, and let your heart be strengthened, * all ye that hope in the Lord.
      la:
      - type: citation
        text: '30:2 In te, Dómine, sperávi, non confúndar in ætérnum: * in iustítia tua líbera me.'
      - type: citation
        text: 30:3 Inclína ad me aurem tuam, * accélera ut éruas me.
      - type: citation
        text: '30:3 Esto mihi in Deum protectórem, et in domum refúgii: * ut salvum me fácias.'
      - type: citation
        text: '30:4 Quóniam fortitúdo mea, et refúgium meum es tu: * et propter nomen tuum dedúces me, et enútries me.'
      - type: citation
        text: '30:5 Edúces me de láqueo hoc, quem abscondérunt mihi: * quóniam tu es protéctor meus.'
      - type: citation
        text: '30:6 In manus tuas comméndo spíritum meum: * redemísti me, Dómine, Deus veritátis.'
      - type: citation
        text: 30:7 Odísti observántes vanitátes, * supervácue.
      - type: citation
        text: '30:7 Ego autem in Dómino sperávi: * exsultábo, et lætábor in misericórdia tua.'
      - type: citation
        text: 30:8 Quóniam respexísti humilitátem meam, * salvásti de necessitátibus ánimam meam.
      - type: citation
        text: '30:9 Nec conclusísti me in mánibus inimíci: * statuísti in loco spatióso pedes meos.'
      - type: citation
        text: '30:10 Miserére mei, Dómine, quóniam tríbulor: * conturbátus est in ira óculus meus, ánima mea, et venter meus:'
      - type: citation
        text: '30:11 Quóniam defécit in dolóre vita mea: * et anni mei in gemítibus.'
      - type: citation
        text: '30:11 Infirmáta est in paupertáte virtus mea: * et ossa mea conturbáta sunt.'
      - type: citation
        text: '30:12 Super omnes inimícos meos factus sum oppróbrium et vicínis meis valde: * et timor notis meis.'
      - type: citation
        text: '30:12 Qui vidébant me, foras fugérunt a me: * oblivióni datus sum, tamquam mórtuus a corde.'
      - type: citation
        text: '30:13 Factus sum tamquam vas pérditum: * quóniam audívi vituperatiónem multórum commorántium in circúitu.'
      - type: citation
        text: 30:14 In eo dum convenírent simul advérsum me, * accípere ánimam meam consiliáti sunt.
      - type: citation
        text: '30:15 Ego autem in te sperávi, Dómine: * dixi: Deus meus es tu: in mánibus tuis sortes meæ.'
      - type: citation
        text: 30:16 Éripe me de manu inimicórum meórum, * et a persequéntibus me.
      - type: citation
        text: '30:17 Illústra fáciem tuam super servum tuum, salvum me fac in misericórdia tua: * Dómine, non confúndar, quóniam invocávi te.'
      - type: citation
        text: '30:18 Erubéscant ímpii, et deducántur in inférnum: * muta fiant lábia dolósa.'
      - type: citation
        text: '30:19 Quæ loquúntur advérsus iustum iniquitátem: * in supérbia, et in abusióne.'
      - type: citation
        text: 30:20 Quam magna multitúdo dulcédinis tuæ, Dómine, * quam abscondísti timéntibus te.
      - type: citation
        text: 30:20 Perfecísti eis, qui sperant in te, * in conspéctu filiórum hóminum.
      - type: citation
        text: 30:21 Abscóndes eos in abscóndito faciéi tuæ * a conturbatióne hóminum.
      - type: citation
        text: 30:21 Próteges eos in tabernáculo tuo * a contradictióne linguárum.
      - type: citation
        text: '30:22 Benedíctus Dóminus: * quóniam mirificávit misericórdiam suam mihi in civitáte muníta.'
      - type: citation
        text: '30:23 Ego autem dixi in excéssu mentis meæ: * Proiéctus sum a fácie oculórum tuórum.'
      - type: citation
        text: 30:23 Ídeo exaudísti vocem oratiónis meæ, * dum clamárem ad te.
      - type: citation
        text: '30:24 Dilígite Dóminum omnes sancti eius: * quóniam veritátem requíret Dóminus, et retríbuet abundánter faciéntibus supérbiam.'
      - type: citation
        text: 30:25 Viríliter ágite, et confortétur cor vestrum, * omnes, qui sperátis in Dómino.
      en2:
      - type: citation
        text: '30:2 In you, O Lord, I have hoped; let me never be confounded: * in your justice, deliver me.'
      - type: citation
        text: 30:3 Incline your ear to me, * hasten to rescue me.
      - type: citation
        text: '30:3 Be for me a protector God and a house of refuge: * so as to accomplish my salvation.'
      - type: citation
        text: '30:4 For you are my strength and my refuge: * and for the sake of your name, you will lead me and nourish me.'
      - type: citation
        text: '30:5 You will lead me out of this snare, which they have hidden for me: * for you are my protector.'
      - type: citation
        text: '30:6 Into your hands I commend my spirit: * you have redeemed me, O Lord, God of truth.'
      - type: citation
        text: 30:7 You have hated those who practice emptiness * to no purpose.
      - type: citation
        text: '30:7 But I have hoped in the Lord: * I will exult and rejoice in your mercy.'
      - type: citation
        text: 30:8 For you have looked upon my humility, * you have saved my soul from needfulness.
      - type: citation
        text: '30:9 And you have not enclosed me in the hands of the enemy: * you have set my feet in a spacious place.'
      - type: citation
        text: '30:10 Have mercy on me, Lord, for I am troubled: * my eye has been disturbed by wrath, along with my soul and my gut:'
      - type: citation
        text: '30:11 For my life has fallen into sorrow: * and my years into sighing.'
      - type: citation
        text: '30:11 My virtue has been weakened in poverty: * and my bones have been disturbed.'
      - type: citation
        text: '30:12 I have become a disgrace among all my enemies, and even more so to my neighbors: * and a dread to my acquaintances.'
      - type: citation
        text: '30:12 Those who catch sight of me flee away from me: * I have become forgotten, like one dead to the heart.'
      - type: citation
        text: '30:13 I have become like a damaged utensil: * for I have heard the harsh criticism of many who linger in the area.'
      - type: citation
        text: 30:14 While assembled together against me in that place, * they deliberated on how to take away my life.
      - type: citation
        text: '30:15 But I have hoped in you, O Lord: * I said: You are my God; my fate is in your hands.'
      - type: citation
        text: 30:16 Rescue me from the hand of my enemies, * and from those who are persecuting me.
      - type: citation
        text: '30:17 Shine your face upon your servant, save me in your mercy: * Lord, let me not be confounded, for I have called upon you.'
      - type: citation
        text: '30:18 Let the impious be ashamed and be drawn down into Hell: * may deceitful lips be silenced.'
      - type: citation
        text: '30:19 Those that speak iniquity against the just: * in arrogance and in abusiveness.'
      - type: citation
        text: 30:20 How great is the multitude of your sweetness, O Lord, * which you keep hidden for those who fear you.
      - type: citation
        text: 30:20 You have perfected it for those who hope in you, * in the sight of the sons of men.
      - type: citation
        text: 30:21 You hide them in the concealment of your face * from the disturbance of men.
      - type: citation
        text: 30:21 You protect them in your tabernacle * from the contradiction of tongues.
      - type: citation
        text: '30:22 Blessed is the Lord: * for he has shown his wonderful mercy to me, in a fortified city.'
      - type: citation
        text: '30:23 But I said in the excess of my mind: * I have been cast away from the glance of your eyes.'
      - type: citation
        text: 30:23 And so, you heeded the voice of my prayer, * while I was still crying out to you.
      - type: citation
        text: '30:24 Love the Lord, all you his saints: * for the Lord will require truth, and he will abundantly repay those who act with arrogance.'
      - type: citation
        text: 30:25 Act manfully, and let your heart be strengthened, * all you who hope in the Lord.
  psalm.31-1-be-ti-quorum-rem-ss-sunt-iniquit-tes-et-quo-6531c8b978:
    role: psalm
    content:
      en:
      - type: citation
        text: 31:1 Blessed are those whose iniquities are forgiven * and whose sins are covered.
      - type: citation
        text: 31:2 Blessed is the man to whom the Lord hath not imputed sin, * and in whose spirit there is no guile.
      - type: citation
        text: 31:3 Because I was silent my bones grew old; * whilst I cried out all the day long.
      - type: citation
        text: '31:4 For day and night thy hand was heavy upon me: * I am turned in my anguish, whilst the thorn is fastened.'
      - type: citation
        text: 31:5 I have acknowledged my sin to thee, * and my injustice I have not concealed.
      - type: citation
        text: '31:5 I said I will confess against myself my injustice to the Lord: * and thou hast forgiven the wickedness of my sin.'
      - type: citation
        text: 31:6 For this shall every one that is holy pray to thee * in a seasonable time.
      - type: citation
        text: 31:6 And yet in a flood of many waters, * they shall not come nigh unto him.
      - type: citation
        text: '31:7 Thou art my refuge from the trouble which hath encompassed me: * my joy, deliver me from them that surround me.'
      - type: citation
        text: '31:8 I will give thee understanding, and I will instruct thee in this way, in which thou shalt go: * I will fix my eyes upon thee.'
      - type: citation
        text: 31:9 Do not become like the horse and the mule, * who have no understanding.
      - type: citation
        text: 31:9 With bit and bridle bind fast their jaws, * who come not near unto thee.
      - type: citation
        text: 31:10 Many are the scourges of the sinner, * but mercy shall encompass him that hopeth in the Lord.
      - type: citation
        text: 31:11 Be glad in the Lord, and rejoice, ye just, * and glory, all ye right of heart.
      la:
      - type: citation
        text: '31:1 Beáti quorum remíssæ sunt iniquitátes: * et quorum tecta sunt peccáta.'
      - type: citation
        text: 31:2 Beátus vir, cui non imputávit Dóminus peccátum, * nec est in spíritu eius dolus.
      - type: citation
        text: 31:3 Quóniam tácui, inveteravérunt ossa mea, * dum clamárem tota die.
      - type: citation
        text: '31:4 Quóniam die ac nocte graváta est super me manus tua: * convérsus sum in ærúmna mea, dum confígitur spina.'
      - type: citation
        text: '31:5 Delíctum meum cógnitum tibi feci: * et iniustítiam meam non abscóndi.'
      - type: citation
        text: '31:5 Dixi: Confitébor advérsum me iniustítiam meam Dómino: * et tu remisísti impietátem peccáti mei.'
      - type: citation
        text: 31:6 Pro hac orábit ad te omnis sanctus, * in témpore opportúno.
      - type: citation
        text: 31:6 Verúmtamen in dilúvio aquárum multárum, * ad eum non approximábunt.
      - type: citation
        text: '31:7 Tu es refúgium meum a tribulatióne, quæ circúmdedit me: * exsultátio mea, érue me a circumdántibus me.'
      - type: citation
        text: '31:8 Intelléctum tibi dabo, et ínstruam te in via hac, qua gradiéris: * firmábo super te óculos meos.'
      - type: citation
        text: 31:9 Nolíte fíeri sicut equus et mulus, * quibus non est intelléctus.
      - type: citation
        text: 31:9 In camo et freno maxíllas eórum constrínge, * qui non appróximant ad te.
      - type: citation
        text: 31:10 Multa flagélla peccatóris, * sperántem autem in Dómino misericórdia circúmdabit.
      - type: citation
        text: 31:11 Lætámini in Dómino et exsultáte, iusti, * et gloriámini, omnes recti corde.
      en2:
      - type: citation
        text: '31:1 Blessed are they whose iniquities have been forgiven: * and whose sins have been covered.'
      - type: citation
        text: 31:2 Blessed is the man to whom the Lord has not imputed sin, * and in whose spirit there is no deceit.
      - type: citation
        text: 31:3 Because I was silent, my bones grew old, * while still I cried out all day long.
      - type: citation
        text: '31:4 For, day and night, your hand was heavy upon me: * I have been converted in my anguish, while still the thorn is piercing.'
      - type: citation
        text: '31:5 I have acknowledged my offense to you: * and I have not concealed my injustice.'
      - type: citation
        text: '31:5 I said: I will confess against myself, my injustice to the Lord: * and you forgave the impiety of my sin.'
      - type: citation
        text: 31:6 For this, everyone who is holy will pray to you, * in due time.
      - type: citation
        text: 31:6 Yet truly, in a flood of many waters, * they will not draw near to him.
      - type: citation
        text: '31:7 You are my refuge from the tribulation that has surrounded me: * you are my exultation; rescue me from those who are surrounding me.'
      - type: citation
        text: '31:8 I will give you understanding, and I will instruct you in this way, in which you will walk: * I will fix my eyes upon you.'
      - type: citation
        text: 31:9 Do not become like the horse and the mule, * which have no understanding.
      - type: citation
        text: 31:9 Their jaws are constrained with bit and bridle, * so as not to draw near to you.
      - type: citation
        text: 31:10 Many are the scourges of the sinner, * but mercy will surround him that hopes in the Lord.
      - type: citation
        text: 31:11 Rejoice in the Lord and exult, you just ones, * and glory, all you upright of heart.
  psalm.32-1-exsult-te-iusti-in-d-mino-rectos-decet-coll-8c90efafa2:
    role: psalm
    content:
      en:
      - type: citation
        text: '32:1 Rejoice in the Lord, O ye just: * praise becometh the upright.'
      - type: citation
        text: 32:2 Give praise to the Lord on the harp; * sing to him with the psaltery, the instrument of ten strings.
      - type: citation
        text: 32:3 Sing to him a new canticle, * sing well unto him with a loud noise.
      - type: citation
        text: 32:4 For the word of the Lord is right, * and all his works are done with faithfulness.
      - type: citation
        text: 32:5 He loveth mercy and judgment; * the earth is full of the mercy of the Lord.
      - type: citation
        text: '32:6 By the word of the Lord the heavens were established; * and all the power of them by the spirit of his mouth:'
      - type: citation
        text: 32:7 Gathering together the waters of the sea, as in a vessel; * laying up the depths in storehouses.
      - type: citation
        text: 32:8 Let all the earth fear the Lord, * and let all the inhabitants of the world be in awe of him.
      - type: citation
        text: '32:9 For he spoke and they were made: * he commanded and they were created.'
      - type: citation
        text: 32:10 The Lord bringeth to nought the counsels of nations; * and he rejecteth the devices of people, and casteth away the counsels of princes.
      - type: citation
        text: '32:11 But the counsel of the Lord standeth for ever: * the thoughts of his heart to all generations.'
      - type: citation
        text: '32:12 Blessed is the nation whose God is the Lord: * the people whom he hath chosen for his inheritance.'
      - type: citation
        text: '32:13 The Lord hath looked from heaven: * he hath beheld all the sons of men.'
      - type: citation
        text: 32:14 From his habitation which he hath prepared, * he hath looked upon all that dwell on the earth.
      - type: citation
        text: '32:15 He who hath made the hearts of every one of them: * who understandeth all their works.'
      - type: citation
        text: '32:16 The king is not saved by a great army: * nor shall the giant be saved by his own great strength.'
      - type: citation
        text: '32:17 Vain is the horse for safety: * neither shall he be saved by the abundance of his strength.'
      - type: citation
        text: '32:18 Behold the eyes of the Lord are on them that fear him: * and on them that hope in his mercy.'
      - type: citation
        text: 32:19 To deliver their souls from death; * and feed them in famine.
      - type: citation
        text: '32:20 Our soul waiteth for the Lord: * for he is our helper and protector.'
      - type: citation
        text: '32:21 For in him our heart shall rejoice: * and in his holy name we have trusted.'
      - type: citation
        text: 32:22 Let thy mercy, O Lord, be upon us, * as we have hoped in thee.
      la:
      - type: citation
        text: '32:1 Exsultáte, iusti, in Dómino: * rectos decet collaudátio.'
      - type: citation
        text: '32:2 Confitémini Dómino in cíthara: * in psaltério decem chordárum psállite illi.'
      - type: citation
        text: '32:3 Cantáte ei cánticum novum: * bene psállite ei in vociferatióne.'
      - type: citation
        text: 32:4 Quia rectum est verbum Dómini, * et ómnia ópera eius in fide.
      - type: citation
        text: '32:5 Díligit misericórdiam et iudícium: * misericórdia Dómini plena est terra.'
      - type: citation
        text: '32:6 Verbo Dómini cæli firmáti sunt: * et spíritu oris eius omnis virtus eórum.'
      - type: citation
        text: '32:7 Cóngregans sicut in utre aquas maris: * ponens in thesáuris abýssos.'
      - type: citation
        text: '32:8 Tímeat Dóminum omnis terra: * ab eo autem commoveántur omnes inhabitántes orbem.'
      - type: citation
        text: '32:9 Quóniam ipse dixit, et facta sunt: * ipse mandávit, et creáta sunt.'
      - type: citation
        text: '32:10 Dóminus díssipat consília géntium: * réprobat autem cogitatiónes populórum, et réprobat consília príncipum.'
      - type: citation
        text: '32:11 Consílium autem Dómini in ætérnum manet: * cogitatiónes cordis eius in generatióne et generatiónem.'
      - type: citation
        text: '32:12 Beáta gens, cuius est Dóminus, Deus eius: * pópulus, quem elégit in hereditátem sibi.'
      - type: citation
        text: '32:13 De cælo respéxit Dóminus: * vidit omnes fílios hóminum.'
      - type: citation
        text: 32:14 De præparáto habitáculo suo * respéxit super omnes, qui hábitant terram.
      - type: citation
        text: '32:15 Qui finxit sigillátim corda eórum: * qui intéllegit ómnia ópera eórum.'
      - type: citation
        text: '32:16 Non salvátur rex per multam virtútem: * et gigas non salvábitur in multitúdine virtútis suæ.'
      - type: citation
        text: '32:17 Fallax equus ad salútem: * in abundántia autem virtútis suæ non salvábitur.'
      - type: citation
        text: '32:18 Ecce, óculi Dómini super metuéntes eum: * et in eis, qui sperant super misericórdia eius:'
      - type: citation
        text: '32:19 Ut éruat a morte ánimas eórum: * et alat eos in fame.'
      - type: citation
        text: '32:20 Ánima nostra sústinet Dóminum: * quóniam adiútor et protéctor noster est.'
      - type: citation
        text: '32:21 Quia in eo lætábitur cor nostrum: * et in nómine sancto eius sperávimus.'
      - type: citation
        text: '32:22 Fiat misericórdia tua, Dómine, super nos: * quemádmodum sperávimus in te.'
      en2:
      - type: citation
        text: '32:1 Exult in the Lord, you just ones: * together, praise the upright.'
      - type: citation
        text: '32:2 Confess to the Lord with stringed instruments: * sing psalms to him with the psaltery of ten strings.'
      - type: citation
        text: '32:3 Sing to him a new song: * sing psalms to him skillfully, with loud exclamation.'
      - type: citation
        text: 32:4 For the word of the Lord is upright, * and all his works are in faith.
      - type: citation
        text: '32:5 He loves mercy and judgment: * the earth is full of the mercy of the Lord.'
      - type: citation
        text: '32:6 By the word of the Lord, the heavens were established: * and all their power, by the Spirit of his mouth:'
      - type: citation
        text: '32:7 Gathering together the waters of the sea, as if in a container: * placing the depths in storage.'
      - type: citation
        text: '32:8 Let all the earth fear the Lord: * and may all the inhabitants of the world quake before him.'
      - type: citation
        text: '32:9 For he spoke, and they became: * he commanded, and they were created.'
      - type: citation
        text: '32:10 The Lord scatters the counsels of the nations: * but he reproves the thoughts of the peoples, and he rejects the counsels of the leaders.'
      - type: citation
        text: '32:11 But the counsel of the Lord remains for eternity: * the thoughts of his heart from generation to generation.'
      - type: citation
        text: 32:12 Blessed is the nation whose God is the Lord, * the people whom he has chosen as his inheritance.
      - type: citation
        text: '32:13 The Lord has looked down from heaven: * he has seen all the sons of men.'
      - type: citation
        text: 32:14 From his well-prepared dwelling place * he has gazed upon all who dwell on the earth.
      - type: citation
        text: '32:15 He has formed the hearts of each one of them: * he understands all their works.'
      - type: citation
        text: '32:16 The king is not saved by great power: * nor will the giant be saved by his many powers.'
      - type: citation
        text: '32:17 The horse is false safety: * for he will not be saved by the abundance of his powers.'
      - type: citation
        text: '32:18 Behold, the eyes of the Lord are on those who fear him: * and on those who hope in his mercy:'
      - type: citation
        text: '32:19 So as to rescue their souls from death: * and to feed them during famine.'
      - type: citation
        text: '32:20 Our soul remains with the Lord: * for he is our helper and protector.'
      - type: citation
        text: '32:21 For in him, our heart will rejoice: * and in his holy name, we have hoped.'
      - type: citation
        text: '32:22 Let your mercy be upon us, O Lord: * just as we have hoped in you.'
  psalm.33-2-bened-cam-d-minum-in-omni-t-mpore-semper-la-425ecdbe99:
    role: psalm
    content:
      en:
      - type: citation
        text: 33:2 I will bless the Lord at all times, * his praise shall be always in my mouth.
      - type: citation
        text: '33:3 In the Lord shall my soul be praised: * let the meek hear and rejoice.'
      - type: citation
        text: 33:4 O magnify the Lord with me; * and let us extol his name together.
      - type: citation
        text: 33:5 I sought the Lord, and he heard me; * and he delivered me from all my troubles.
      - type: citation
        text: '33:6 Come ye to him and be enlightened: * and your faces shall not be confounded.'
      - type: citation
        text: '33:7 This poor man cried, and the Lord heard him: * and saved him out of all his troubles.'
      - type: citation
        text: '33:8 The Angel of the Lord shall encamp round about them that fear him: * and shall deliver them.'
      - type: citation
        text: '33:9 O taste, and see that the Lord is sweet: * blessed is the man that hopeth in him.'
      - type: citation
        text: '33:10 Fear the Lord, all ye his saints: * for there is no want to them that fear him.'
      - type: citation
        text: '33:11 The rich have wanted, and have suffered hunger: * but they that seek the Lord shall not be deprived of any good.'
      - type: citation
        text: '33:12 Come, children, hearken to me: * I will teach you the fear of the Lord.'
      - type: citation
        text: '33:13 Who is the man that desireth life: * who loveth to see good days?'
      - type: citation
        text: 33:14 Keep thy tongue from evil, * and thy lips from speaking guile.
      - type: citation
        text: '33:15 Turn away from evil and do good: * seek after peace and pursue it.'
      - type: citation
        text: '33:16 The eyes of the Lord are upon the just: * and his ears unto their prayers.'
      - type: citation
        text: '33:17 But the countenance of the Lord is against them that do evil things: * to cut off the remembrance of them from the earth.'
      - type: citation
        text: '33:18 The just cried, and the Lord heard them: * and delivered them out of all their troubles.'
      - type: citation
        text: '33:19 The Lord is nigh unto them that are of a contrite heart: * and he will save the humble of spirit.'
      - type: citation
        text: 33:20 Many are the afflictions of the just; * but out of them all will the Lord deliver them.
      - type: citation
        text: 33:21 The Lord keepeth all their bones, * not one of them shall be broken.
      - type: citation
        text: '33:22 The death of the wicked is very evil: * and they that hate the just shall be guilty.'
      - type: citation
        text: '33:23 The Lord will redeem the souls of his servants: * and none of them that trust in him shall offend.'
      la:
      - type: citation
        text: '33:2 Benedícam Dóminum in omni témpore: * semper laus eius in ore meo.'
      - type: citation
        text: '33:3 In Dómino laudábitur ánima mea: * áudiant mansuéti, et læténtur.'
      - type: citation
        text: '33:4 Magnificáte Dóminum mecum: * et exaltémus nomen eius in idípsum.'
      - type: citation
        text: '33:5 Exquisívi Dóminum, et exaudívit me: * et ex ómnibus tribulatiónibus meis erípuit me.'
      - type: citation
        text: '33:6 Accédite ad eum, et illuminámini: * et fácies vestræ non confundéntur.'
      - type: citation
        text: '33:7 Iste pauper clamávit, et Dóminus exaudívit eum: * et de ómnibus tribulatiónibus eius salvávit eum.'
      - type: citation
        text: '33:8 Immíttet Ángelus Dómini in circúitu timéntium eum: * et erípiet eos.'
      - type: citation
        text: '33:9 Gustáte, et vidéte quóniam suávis est Dóminus: * beátus vir, qui sperat in eo.'
      - type: citation
        text: '33:10 Timéte Dóminum, omnes sancti eius: * quóniam non est inópia timéntibus eum.'
      - type: citation
        text: '33:11 Dívites eguérunt et esuriérunt: * inquiréntes autem Dóminum non minuéntur omni bono.'
      - type: citation
        text: '33:12 Veníte, fílii, audíte me: * timórem Dómini docébo vos.'
      - type: citation
        text: '33:13 Quis est homo qui vult vitam: * díligit dies vidére bonos?'
      - type: citation
        text: '33:14 Próhibe linguam tuam a malo: * et lábia tua ne loquántur dolum.'
      - type: citation
        text: '33:15 Divérte a malo, et fac bonum: * inquíre pacem, et perséquere eam.'
      - type: citation
        text: '33:16 Óculi Dómini super iustos: * et aures eius in preces eórum.'
      - type: citation
        text: '33:17 Vultus autem Dómini super faciéntes mala: * ut perdat de terra memóriam eórum.'
      - type: citation
        text: '33:18 Clamavérunt iusti, et Dóminus exaudívit eos: * et ex ómnibus tribulatiónibus eórum liberávit eos.'
      - type: citation
        text: '33:19 Iuxta est Dóminus iis, qui tribuláto sunt corde: * et húmiles spíritu salvábit.'
      - type: citation
        text: '33:20 Multæ tribulatiónes iustórum: * et de ómnibus his liberábit eos Dóminus.'
      - type: citation
        text: '33:21 Custódit Dóminus ómnia ossa eórum: * unum ex his non conterétur.'
      - type: citation
        text: '33:22 Mors peccatórum péssima: * et qui odérunt iustum, delínquent.'
      - type: citation
        text: '33:23 Rédimet Dóminus ánimas servórum suórum: * et non delínquent omnes qui sperant in eo.'
      en2:
      - type: citation
        text: '33:2 I will bless the Lord at all times: * his praise will be ever in my mouth.'
      - type: citation
        text: '33:3 In the Lord, my soul will be praised: * may the meek listen and rejoice.'
      - type: citation
        text: '33:4 Magnify the Lord with me: * and let us extol his name in itself.'
      - type: citation
        text: '33:5 I sought the Lord, and he heeded me: * and he carried me away from all my tribulations.'
      - type: citation
        text: '33:6 Approach him and be enlightened: * and your faces will not be confounded.'
      - type: citation
        text: '33:7 This poor one cried out, and the Lord heeded him: * and he saved him from all his tribulations.'
      - type: citation
        text: '33:8 The Angel of the Lord will encamp around those who fear him: * and he will rescue them.'
      - type: citation
        text: '33:9 Taste and see that the Lord is sweet: * blessed is the man who hopes in him.'
      - type: citation
        text: '33:10 Fear the Lord, all you his saints: * for there is no destitution for those who fear him.'
      - type: citation
        text: '33:11 The rich have been needy and hungry: * but those who seek the Lord will not be deprived of any good thing.'
      - type: citation
        text: '33:12 Come forward, sons. Listen to me: * I will teach you the fear of the Lord.'
      - type: citation
        text: 33:13 Which is the man who wills life, * who chooses to see good days?
      - type: citation
        text: '33:14 Prohibit your tongue from evil: * and your lips from speaking deceit.'
      - type: citation
        text: '33:15 Turn away from evil, and do good: * inquire about peace, and pursue it.'
      - type: citation
        text: '33:16 The eyes of the Lord are on the just: * and his ears are with their prayers.'
      - type: citation
        text: '33:17 But the countenance of the Lord is upon those who do evil: * to perish the remembrance of them from the earth.'
      - type: citation
        text: '33:18 The just cried out, and the Lord heard them: * and he freed them from all their tribulations.'
      - type: citation
        text: '33:19 The Lord is near to those who are troubled in heart: * and he will save the humble in spirit.'
      - type: citation
        text: '33:20 Many are the afflictions of the just: * and from them all the Lord will free them.'
      - type: citation
        text: '33:21 The Lord preserves all of their bones: * not one of them shall be broken.'
      - type: citation
        text: '33:22 The death of a sinner is very harmful: * and those who hate the just will fare badly.'
      - type: citation
        text: '33:23 The Lord will redeem the souls of his servants: * and none of those who hope in him will fare badly.'
  psalm.34-1-i-dica-d-mine-noc-ntes-me-exp-gna-impugn-nt-005bdcbd79:
    role: psalm
    content:
      en:
      - type: citation
        text: '34:1 Judge thou, O Lord, them that wrong me: * overthrow them that fight against me.'
      - type: citation
        text: '34:2 Take hold of arms and shield: * and rise up to help me.'
      - type: citation
        text: '34:3 Bring out the sword, and shut up the way against them that persecute me: * say to my soul: I am thy salvation.'
      - type: citation
        text: 34:4 Let them be confounded and ashamed * that seek after my soul.
      - type: citation
        text: 34:4 Let them be turned back and be confounded * that devise against me.
      - type: citation
        text: '34:5 Let them become as dust before the wind: * and let the Angel of the Lord straiten them.'
      - type: citation
        text: 34:6 Let their way become dark and slippery; * and let the Angel of the Lord pursue them.
      - type: citation
        text: '34:7 For without cause they have hidden their net for me unto destruction: * without cause they have upbraided my soul.'
      - type: citation
        text: '34:8 Let the snare which he knoweth not come upon him: and let the net which he hath hidden catch him: * and into that very snare let them fall.'
      - type: citation
        text: 34:9 But my soul shall rejoice in the Lord; * and shall be delighted in his salvation.
      - type: citation
        text: '34:10 All my bones shall say: * Lord, who is like to thee?'
      - type: citation
        text: 34:10 Who deliverest the poor from the hand of them that are stronger than he; * the needy and the poor from them that strip him.
      - type: citation
        text: 34:11 Unjust witnesses rising up * have asked me things I knew not.
      - type: citation
        text: '34:12 They repaid me evil for good: * to the depriving me of my soul.'
      - type: citation
        text: 34:13 But as for me, when they were troublesome to me, * I was clothed with haircloth.
      - type: citation
        text: 34:13 I humbled my soul with fasting; * and my prayer shall be turned into my bosom.
      - type: citation
        text: '34:14 As a neighbour and as an own brother, so did I please: * as one mourning and sorrowful so was I humbled.'
      - type: citation
        text: '34:15 But they rejoiced against me, and came together: * scourges were gathered together upon me, and I knew not.'
      - type: citation
        text: '34:16 They were separated, and repented not: they tempted me, they scoffed at me with scorn: * they gnashed upon me with their teeth.'
      - type: citation
        text: '34:17 Lord, when wilt thou look upon me? * rescue thou my soul from their malice: my only one from the lions.'
      - type: citation
        text: 34:18 I will give thanks to thee in a great church; * I will praise thee in a strong people.
      - type: citation
        text: '34:19 Let not them that are my enemies wrongfully rejoice over me: * who have hated me without cause, and wink with the eyes.'
      - type: citation
        text: 34:20 For they spoke indeed peaceably to me; * and speaking in the anger of the earth they devised guile.
      - type: citation
        text: '34:21 And they opened their mouth wide against me; * they said: Well done, well done, our eyes have seen it.'
      - type: citation
        text: '34:22 Thou hast seen, O Lord, be not thou silent: * O Lord, depart not from me.'
      - type: citation
        text: '34:23 Arise, and be attentive to my judgment: * to my cause, my God, and my Lord.'
      - type: citation
        text: 34:24 Judge me, O Lord my God according to thy justice, * and let them not rejoice over me.
      - type: citation
        text: '34:25 Let them not say in their hearts: It is well, it is well, to our mind: * neither let them say: We have swallowed him up.'
      - type: citation
        text: '34:26 Let them blush: and be ashamed together, * who rejoice at my evils.'
      - type: citation
        text: 34:26 Let them be clothed with confusion and shame, * who speak great things against me.
      - type: citation
        text: '34:27 Let them rejoice and be glad, who are well pleased with my justice, * and let them say always: The Lord be magnified, who delights in the peace of his servant.'
      - type: citation
        text: 34:28 And my tongue shall meditate thy justice, * thy praise all the day long.
      la:
      - type: citation
        text: 34:1 Iúdica, Dómine, nocéntes me, * expúgna impugnántes me.
      - type: citation
        text: '34:2 Apprehénde arma et scutum: * et exsúrge in adiutórium mihi.'
      - type: citation
        text: '34:3 Effúnde frámeam, et conclúde advérsus eos, qui persequúntur me: * dic ánimæ meæ: Salus tua ego sum.'
      - type: citation
        text: 34:4 Confundántur et revereántur, * quæréntes ánimam meam.
      - type: citation
        text: 34:4 Avertántur retrórsum, et confundántur * cogitántes mihi mala.
      - type: citation
        text: '34:5 Fiant tamquam pulvis ante fáciem venti: * et Ángelus Dómini coárctans eos.'
      - type: citation
        text: '34:6 Fiat via illórum ténebræ et lúbricum: * et Ángelus Dómini pérsequens eos.'
      - type: citation
        text: '34:7 Quóniam gratis abscondérunt mihi intéritum láquei sui: * supervácue exprobravérunt ánimam meam.'
      - type: citation
        text: '34:8 Véniat illi láqueus, quem ignórat: et cáptio, quam abscóndit, apprehéndat eum: * et in láqueum cadat in ipsum.'
      - type: citation
        text: '34:9 Ánima autem mea exsultábit in Dómino: * et delectábitur super salutári suo.'
      - type: citation
        text: '34:10 Ómnia ossa mea dicent: * Dómine, quis símilis tibi?'
      - type: citation
        text: '34:10 Erípiens ínopem de manu fortiórum eius: * egénum et páuperem a diripiéntibus eum.'
      - type: citation
        text: 34:11 Surgéntes testes iníqui, * quæ ignorábam interrogábant me.
      - type: citation
        text: '34:12 Retribuébant mihi mala pro bonis: * sterilitátem ánimæ meæ.'
      - type: citation
        text: 34:13 Ego autem cum mihi molésti essent, * induébar cilício.
      - type: citation
        text: '34:13 Humiliábam in ieiúnio ánimam meam: * et orátio mea in sinu meo convertétur.'
      - type: citation
        text: '34:14 Quasi próximum, et quasi fratrem nostrum, sic complacébam: * quasi lugens et contristátus, sic humiliábar.'
      - type: citation
        text: '34:15 Et advérsum me lætáti sunt, et convenérunt: * congregáta sunt super me flagélla, et ignorávi.'
      - type: citation
        text: '34:16 Dissipáti sunt, nec compúncti, tentavérunt me, subsannavérunt me subsannatióne: * frenduérunt super me déntibus suis.'
      - type: citation
        text: 34:17 Dómine, quando respícies? * restítue ánimam meam a malignitáte eórum, a leónibus únicam meam.
      - type: citation
        text: 34:18 Confitébor tibi in ecclésia magna, * in pópulo gravi laudábo te.
      - type: citation
        text: '34:19 Non supergáudeant mihi qui adversántur mihi iníque: * qui odérunt me gratis et ánnuunt óculis.'
      - type: citation
        text: '34:20 Quóniam mihi quidem pacífice loquebántur: * et in iracúndia terræ loquéntes, dolos cogitábant.'
      - type: citation
        text: '34:21 Et dilatavérunt super me os suum: * dixérunt: Euge, euge, vidérunt óculi nostri.'
      - type: citation
        text: '34:22 Vidísti, Dómine, ne síleas: * Dómine, ne discédas a me.'
      - type: citation
        text: '34:23 Exsúrge et inténde iudício meo: * Deus meus, et Dóminus meus in causam meam.'
      - type: citation
        text: 34:24 Iúdica me secúndum iustítiam tuam, Dómine, Deus meus, * et non supergáudeant mihi.
      - type: citation
        text: '34:25 Non dicant in córdibus suis: Euge, euge, ánimæ nostræ: * nec dicant: Devorávimus eum.'
      - type: citation
        text: 34:26 Erubéscant et revereántur simul, * qui gratulántur malis meis.
      - type: citation
        text: 34:26 Induántur confusióne et reveréntia * qui magna loquúntur super me.
      - type: citation
        text: '34:27 Exsúltent et læténtur qui volunt iustítiam meam: * et dicant semper: Magnificétur Dóminus qui volunt pacem servi eius.'
      - type: citation
        text: 34:28 Et lingua mea meditábitur iustítiam tuam, * tota die laudem tuam.
      en2:
      - type: citation
        text: 34:1 O Lord, judge those who harm me, * assail those who attack me.
      - type: citation
        text: '34:2 Take hold of weapons and a shield: * and rise up in assistance to me.'
      - type: citation
        text: '34:3 Bring forth the spear, and close in on those who persecute me: * say to my soul, ''I am your salvation.'''
      - type: citation
        text: 34:4 Let them be confounded and in awe, * who pursue my soul.
      - type: citation
        text: 34:4 Let them be turned back and be confounded, * who think up evil against me.
      - type: citation
        text: '34:5 May they become like dust before the face of the wind: * and let the Angel of the Lord hem them in.'
      - type: citation
        text: '34:6 May their way become dark and slippery: * and may the Angel of the Lord pursue them.'
      - type: citation
        text: '34:7 For, without cause, they have concealed their snare for me unto destruction: * over nothing, they have rebuked my soul.'
      - type: citation
        text: '34:8 Let the snare, of which he is ignorant, come upon him, and let the deception, which he has hidden, take hold of him: * and may he fall into that very snare.'
      - type: citation
        text: '34:9 But my soul will exult in the Lord: * and delight over his salvation.'
      - type: citation
        text: '34:10 All my bones will say: * ''Lord, who is like you?'''
      - type: citation
        text: '34:10 He rescues the needy from the hand of the stronger one: * the indigent and the poor from those who plunder him.'
      - type: citation
        text: 34:11 Unfair witnesses have risen up, * interrogating me about things of which I am ignorant.
      - type: citation
        text: '34:12 They repaid me evil for good: * to the deprivation of my soul.'
      - type: citation
        text: 34:13 But as for me, when they were harassing me, * I was clothed with haircloth.
      - type: citation
        text: '34:13 I humbled my soul with fasting: * and my prayer will become my sinews.'
      - type: citation
        text: '34:14 Like a neighbor, and like our brother, so did I please: * like one mourning and contrite, so was I humbled.'
      - type: citation
        text: '34:15 And they have been joyful against me, and they joined together: * scourges have been gathered over me, and I was ignorant of it.'
      - type: citation
        text: '34:16 They have been scattered, yet they were unremorseful. They have tested me. They scoffed at me with scorn: * they gnashed their teeth over me.'
      - type: citation
        text: 34:17 Lord, when will you look down upon me? * Restore my soul from before their malice, my only one from before the lions.
      - type: citation
        text: 34:18 I will confess to you in a great Church, * I will praise you among a weighty people.
      - type: citation
        text: '34:19 May those who are my unjust adversaries not be glad over me: * those who have hated me without cause, and who nod agreement with their eyes.'
      - type: citation
        text: '34:20 For indeed, they spoke peacefully to me: * and speaking with passion to the earth, they intended deceit.'
      - type: citation
        text: '34:21 And they opened their mouth wide over me: * they said, ''Well, well, our eyes have seen.'''
      - type: citation
        text: '34:22 You have seen, O Lord, do not be silent: * Lord, do not depart from me.'
      - type: citation
        text: '34:23 Rise up and be attentive to my judgment: * my God and my Lord, to my cause.'
      - type: citation
        text: 34:24 Judge me according to your justice, O Lord, my God, * and do not let them be glad over me.
      - type: citation
        text: '34:25 Do not let them say in their hearts, ''Well, well, to our soul'': * neither let them say, ''We have devoured him.'''
      - type: citation
        text: 34:26 Let them blush and be in awe together, * those who congratulate at my misfortunes.
      - type: citation
        text: 34:26 Let them be clothed with confusion and awe, * who speak great things against me.
      - type: citation
        text: '34:27 Let them exult and rejoice, who wish my justice: * and let them ever say, ''The Lord be magnified,'' who will the peace of his servant.'
      - type: citation
        text: 34:28 And so my tongue will express your justice, * your praise all day long.
  psalm.35-2-dixit-ini-stus-ut-del-nquat-in-semet-pso-no-df86c62359:
    role: psalm
    content:
      en:
      - type: citation
        text: '35:2 The unjust hath said within himself, that he would sin: * there is no fear of God before his eyes.'
      - type: citation
        text: 35:3 For in his sight he hath done deceitfully, * that his iniquity may be found unto hatred.
      - type: citation
        text: '35:4 The words of his mouth are iniquity and guile: * he would not understand that he might do well.'
      - type: citation
        text: '35:5 He hath devised iniquity on his bed, * he hath set himself on every way that is not good: but evil he hath not hated.'
      - type: citation
        text: 35:6 O Lord, thy mercy is in heaven, * and thy truth reacheth even to the clouds.
      - type: citation
        text: 35:7 Thy justice is as the mountains of God, * thy judgments are a great deep.
      - type: citation
        text: '35:7 Men and beasts thou wilt preserve, O Lord: * O how hast thou multiplied thy mercy, O God!'
      - type: citation
        text: 35:8 But the children of men * shall put their trust under the covert of thy wings.
      - type: citation
        text: 35:9 They shall be inebriated with the plenty of thy house; * and thou shalt make them drink of the torrent of thy pleasure.
      - type: citation
        text: 35:10 For with thee is the fountain of life; * and in thy light we shall see light.
      - type: citation
        text: 35:11 Extend thy mercy to them that know thee, * and thy justice to them that are right in heart.
      - type: citation
        text: 35:12 Let not the foot of pride come to me, * and let not the hand of the sinner move me.
      - type: citation
        text: 35:13 There the workers of iniquity are fallen, * they are cast out, and could not stand.
      la:
      - type: citation
        text: '35:2 Dixit iniústus ut delínquat in semetípso: * non est timor Dei ante óculos eius.'
      - type: citation
        text: '35:3 Quóniam dolóse egit in conspéctu eius: * ut inveniátur iníquitas eius ad ódium.'
      - type: citation
        text: '35:4 Verba oris eius iníquitas, et dolus: * nóluit intellégere ut bene ágeret.'
      - type: citation
        text: '35:5 Iniquitátem meditátus est in cubíli suo: * ástitit omni viæ non bonæ, malítiam autem non odívit.'
      - type: citation
        text: '35:6 Dómine, in cælo misericórdia tua: * et véritas tua usque ad nubes.'
      - type: citation
        text: '35:7 Iustítia tua sicut montes Dei: * iudícia tua abýssus multa.'
      - type: citation
        text: '35:7 Hómines, et iuménta salvábis, Dómine: * quemádmodum multiplicásti misericórdiam tuam, Deus.'
      - type: citation
        text: 35:8 Fílii autem hóminum, * in tégmine alárum tuárum sperábunt.
      - type: citation
        text: '35:9 Inebriabúntur ab ubertáte domus tuæ: * et torrénte voluptátis tuæ potábis eos.'
      - type: citation
        text: '35:10 Quóniam apud te est fons vitæ: * et in lúmine tuo vidébimus lumen.'
      - type: citation
        text: 35:11 Præténde misericórdiam tuam sciéntibus te, * et iustítiam tuam his, qui recto sunt corde.
      - type: citation
        text: '35:12 Non véniat mihi pes supérbiæ: * et manus peccatóris non móveat me.'
      - type: citation
        text: '35:13 Ibi cecidérunt qui operántur iniquitátem: * expúlsi sunt, nec potuérunt stare.'
      en2:
      - type: citation
        text: '35:2 The unjust one has said within himself that he would commit offenses: * there is no fear of God before his eyes.'
      - type: citation
        text: '35:3 For he has acted deceitfully in his sight: * such that his iniquity will be found to be hatred.'
      - type: citation
        text: '35:4 The words of his mouth are iniquity and deceit: * he is unwilling to understand, so that he may act well.'
      - type: citation
        text: '35:5 He has been considering iniquity on his bed: * he has set himself on every way that is not good; moreover, he has not hated evil.'
      - type: citation
        text: '35:6 Lord, your mercy is in heaven: * and your truth is even to the clouds.'
      - type: citation
        text: '35:7 Your justice is like the mountains of God: * your judgments are a great abyss.'
      - type: citation
        text: '35:7 Men and beasts, you will save, O Lord: * how you have multiplied your mercy, O God.'
      - type: citation
        text: 35:8 And so the sons of men * will hope under the cover of your wings.
      - type: citation
        text: '35:9 They will be inebriated with the fruitfulness of your house: * and you will give them to drink from the torrent of your enjoyment.'
      - type: citation
        text: '35:10 For with you is the fountain of life: * and within your light, we will see the light.'
      - type: citation
        text: 35:11 Extend your mercy before those who know you, * and your justice to these, who are upright in heart.
      - type: citation
        text: '35:12 May arrogant feet not approach me: * and may the hand of the sinner not disturb me.'
      - type: citation
        text: '35:13 In that place, those who work iniquity have fallen: * they have been expelled; they were not able to stand.'
  psalm.36-1-noli-mul-ri-in-malign-ntibus-neque-zel-veri-ecaac62eed:
    role: psalm
    content:
      en:
      - type: citation
        text: 36:1 Be not emulous of evildoers; * nor envy them that work iniquity.
      - type: citation
        text: 36:2 For they shall shortly wither away as grass, * and as the green herbs shall quickly fall.
      - type: citation
        text: 36:3 Trust in the Lord, and do good, * and dwell in the land, and thou shalt be fed with its riches.
      - type: citation
        text: 36:4 Delight in the Lord, * and he will give thee the requests of thy heart.
      - type: citation
        text: 36:5 Commit thy way to the Lord, and trust in him, * and he will do it.
      - type: citation
        text: '36:6 And he will bring forth thy justice as the light, and thy judgment as the noonday: * be subject to the Lord and pray to him.'
      - type: citation
        text: 36:7 Envy not the man who prospereth in his way; * the man who doth unjust things.
      - type: citation
        text: 36:8 Cease from anger, and leave rage; * have no emulation to do evil.
      - type: citation
        text: '36:9 For the evildoers shall be cut off: * but they that wait upon the Lord shall inherit the land.'
      - type: citation
        text: '36:10 For yet a little while, and the wicked shall not be: * and thou shalt seek his place, and shalt not find it.'
      - type: citation
        text: 36:11 But the meek shall inherit the land, * and shall delight in abundance of peace.
      - type: citation
        text: '36:12 The sinner shall watch the just man: * and shall gnash upon him with his teeth.'
      - type: citation
        text: '36:13 But the Lord shall laugh at him: * for he foreseeth that his day shall come.'
      - type: citation
        text: '36:14 The wicked have drawn out the sword: * they have bent their bow.'
      - type: citation
        text: 36:14 To cast down the poor and needy, * to kill the upright of heart.
      - type: citation
        text: 36:15 Let their sword enter into their own hearts, * and let their bow be broken.
      - type: citation
        text: 36:16 Better is a little to the just, * than the great riches of the wicked.
      - type: citation
        text: 36:17 For the arms of the wicked shall be broken in pieces; * but the Lord strengtheneth the just.
      - type: citation
        text: 36:18 The Lord knoweth the days of the undefiled; * and their inheritance shall be for ever.
      - type: citation
        text: 36:19 They shall not be confounded in the evil time; and in the days of famine they shall be filled, * because the wicked shall perish.
      - type: citation
        text: 36:20 And the enemies of the Lord, presently after they shall be honoured and exalted, * shall come to nothing and vanish like smoke.
      - type: citation
        text: 36:21 The sinner shall borrow, and not pay again; * but the just sheweth mercy and shall give.
      - type: citation
        text: '36:22 For such as bless him shall inherit the land: * but such as curse him shall perish.'
      - type: citation
        text: 36:23 With the Lord shall the steps of a man be directed, * and he shall like well his way.
      - type: citation
        text: 36:24 When he shall fall he shall not be bruised, * for the Lord putteth his hand under him.
      - type: citation
        text: 36:25 I have been young, and now am old; * and I have not seen the just forsaken, nor his seed seeking bread.
      - type: citation
        text: 36:26 He sheweth mercy, and lendeth all the day long; * and his seed shall be in blessing.
      - type: citation
        text: 36:27 Decline from evil and do good, * and dwell for ever and ever.
      - type: citation
        text: '36:28 For the Lord loveth judgment, and will not forsake his saints: * they shall be preserved for ever.'
      - type: citation
        text: 36:28 The unjust shall be punished, * and the seed of the wicked shall perish.
      - type: citation
        text: 36:29 But the just shall inherit the land, * and shall dwell therein for evermore.
      - type: citation
        text: '36:30 The mouth of the just shall meditate wisdom: * and his tongue shall speak judgment.'
      - type: citation
        text: 36:31 The law of his God is in his heart, * and his steps shall not be supplanted.
      - type: citation
        text: 36:32 The wicked watcheth the just man, * and seeketh to put him to death.
      - type: citation
        text: 36:33 But the Lord will not leave him in his hands; * nor condemn him when he shall be judged.
      - type: citation
        text: '36:34 Expect the Lord and keep his way: and he will exalt thee to inherit the land: * when the sinners shall perish thou shalt see.'
      - type: citation
        text: 36:35 I have seen the wicked highly exalted, * and lifted up like the cedars of Libanus.
      - type: citation
        text: '36:36 And I passed by, and lo, he was not: * and I sought him and his place was not found.'
      - type: citation
        text: '36:37 Keep innocence, and behold justice: * for there are remnants for the peaceable man.'
      - type: citation
        text: '36:38 But the unjust shall be destroyed together: * the remnants of the wicked shall perish.'
      - type: citation
        text: 36:39 But the salvation of the just is from the Lord, * and he is their protector in the time of trouble.
      - type: citation
        text: '36:40 And the Lord will help them and deliver them: * and he will rescue them from the wicked, and save them, because they have hoped in him.'
      la:
      - type: citation
        text: '36:1 Noli æmulári in malignántibus: * neque zeláveris faciéntes iniquitátem.'
      - type: citation
        text: '36:2 Quóniam tamquam fænum velóciter aréscent: * et quemádmodum ólera herbárum cito décident.'
      - type: citation
        text: '36:3 Spera in Dómino, et fac bonitátem: * et inhábita terram, et pascéris in divítiis eius.'
      - type: citation
        text: '36:4 Delectáre in Dómino: * et dabit tibi petitiónes cordis tui.'
      - type: citation
        text: '36:5 Revéla Dómino viam tuam, et spera in eo: * et ipse fáciet.'
      - type: citation
        text: '36:6 Et edúcet quasi lumen iustítiam tuam: et iudícium tuum tamquam merídiem: * súbditus esto Dómino, et ora eum.'
      - type: citation
        text: '36:7 Noli æmulári in eo, qui prosperátur in via sua: * in hómine faciénte iniustítias.'
      - type: citation
        text: '36:8 Désine ab ira, et derelínque furórem: * noli æmulári ut malignéris.'
      - type: citation
        text: '36:9 Quóniam qui malignántur, exterminabúntur: * sustinéntes autem Dóminum, ipsi hereditábunt terram.'
      - type: citation
        text: '36:10 Et adhuc pusíllum, et non erit peccátor: * et quæres locum eius et non invénies.'
      - type: citation
        text: '36:11 Mansuéti autem hereditábunt terram: * et delectabúntur in multitúdine pacis.'
      - type: citation
        text: '36:12 Observábit peccátor iustum: * et stridébit super eum déntibus suis.'
      - type: citation
        text: '36:13 Dóminus autem irridébit eum: * quóniam próspicit quod véniet dies eius.'
      - type: citation
        text: '36:14 Gládium evaginavérunt peccatóres: * intendérunt arcum suum,'
      - type: citation
        text: '36:14 Ut deíciant páuperem et ínopem: * ut trucídent rectos corde.'
      - type: citation
        text: '36:15 Gládius eórum intret in corda ipsórum: * et arcus eórum confringátur.'
      - type: citation
        text: 36:16 Mélius est módicum iusto, * super divítias peccatórum multas.
      - type: citation
        text: '36:17 Quóniam brácchia peccatórum conteréntur: * confírmat autem iustos Dóminus.'
      - type: citation
        text: '36:18 Novit Dóminus dies immaculatórum: * et heréditas eórum in ætérnum erit.'
      - type: citation
        text: '36:19 Non confundéntur in témpore malo, et in diébus famis saturabúntur: * quia peccatóres períbunt.'
      - type: citation
        text: '36:20 Inimíci vero Dómini mox ut honorificáti fúerint et exaltáti: * deficiéntes, quemádmodum fumus defícient.'
      - type: citation
        text: '36:21 Mutuábitur peccátor, et non solvet: * iustus autem miserétur et tríbuet.'
      - type: citation
        text: '36:22 Quia benedicéntes ei hereditábunt terram: * maledicéntes autem ei disperíbunt.'
      - type: citation
        text: '36:23 Apud Dóminum gressus hóminis dirigéntur: * et viam eius volet.'
      - type: citation
        text: '36:24 Cum cecíderit non collidétur: * quia Dóminus suppónit manum suam.'
      - type: citation
        text: '36:25 Iúnior fui, étenim sénui: * et non vidi iustum derelíctum, nec semen eius quærens panem.'
      - type: citation
        text: '36:26 Tota die miserétur et cómmodat: * et semen illíus in benedictióne erit.'
      - type: citation
        text: '36:27 Declína a malo, et fac bonum: * et inhábita in sǽculum sǽculi.'
      - type: citation
        text: '36:28 Quia Dóminus amat iudícium, et non derelínquet sanctos suos: * in ætérnum conservabúntur.'
      - type: citation
        text: '36:28 Iniústi puniéntur: * et semen impiórum períbit.'
      - type: citation
        text: '36:29 Iusti autem hereditábunt terram: * et inhabitábunt in sǽculum sǽculi super eam.'
      - type: citation
        text: 36:30 Os iusti meditábitur sapiéntiam, * et lingua eius loquétur iudícium.
      - type: citation
        text: 36:31 Lex Dei eius in corde ipsíus, * et non supplantabúntur gressus eius.
      - type: citation
        text: '36:32 Consíderat peccátor iustum: * et quærit mortificáre eum.'
      - type: citation
        text: '36:33 Dóminus autem non derelínquet eum in mánibus eius: * nec damnábit eum, cum iudicábitur illi.'
      - type: citation
        text: '36:34 Exspécta Dóminum, et custódi viam eius: et exaltábit te ut hereditáte cápias terram: * cum períerint peccatóres vidébis.'
      - type: citation
        text: 36:35 Vidi ímpium superexaltátum, * et elevátum sicut cedros Líbani.
      - type: citation
        text: '36:36 Et transívi, et ecce non erat: * et quæsívi eum, et non est invéntus locus eius.'
      - type: citation
        text: '36:37 Custódi innocéntiam, et vide æquitátem: * quóniam sunt relíquiæ hómini pacífico.'
      - type: citation
        text: '36:38 Iniústi autem disperíbunt simul: * relíquiæ impiórum interíbunt.'
      - type: citation
        text: '36:39 Salus autem iustórum a Dómino: * et protéctor eórum in témpore tribulatiónis.'
      - type: citation
        text: '36:40 Et adiuvábit eos Dóminus et liberábit eos: * et éruet eos a peccatóribus, et salvábit eos: quia speravérunt in eo.'
      en2:
      - type: citation
        text: '36:1 Do not choose to imitate the malicious: * neither should you envy those who work iniquity.'
      - type: citation
        text: '36:2 For they will quickly wither away like dry grass: * and in like manner to kitchen herbs, they will soon droop.'
      - type: citation
        text: '36:3 Hope in the Lord and do good: * and dwell in the land, and so you shall be pastured with its riches.'
      - type: citation
        text: '36:4 Delight in the Lord: * and he will grant to you the petitions of your heart.'
      - type: citation
        text: '36:5 Reveal your way to the Lord, and hope in him: * and he will accomplish it.'
      - type: citation
        text: '36:6 And he will bring forth your justice like the light, and your judgment like the midday: * be subject to the Lord and pray to him.'
      - type: citation
        text: '36:7 Do not choose to compete with him who prospers in his way: * with the man who does injustices.'
      - type: citation
        text: '36:8 Cease from wrath and leave behind rage: * do not choose to imitate the malicious.'
      - type: citation
        text: '36:9 For those who are malicious will be exterminated: * but those who remain with the Lord, these will inherit the land.'
      - type: citation
        text: '36:10 Yet still a little while, and the sinner will not be: * and you will search his place and find nothing.'
      - type: citation
        text: '36:11 But the meek shall inherit the earth: * and they will delight in the multitude of peace.'
      - type: citation
        text: '36:12 The sinner will observe the just: * and he will gnash his teeth over him.'
      - type: citation
        text: '36:13 But the Lord will laugh at him: * for he knows in advance that his day will come.'
      - type: citation
        text: '36:14 The sinners have drawn the sword: * they have bent their bow,'
      - type: citation
        text: '36:14 So as to cast down the poor and the needy: * so as to massacre the upright of heart.'
      - type: citation
        text: '36:15 Let their sword enter into their own hearts: * and let their bow be broken.'
      - type: citation
        text: 36:16 Better is a little to the just, * than the great riches of the wicked.
      - type: citation
        text: '36:17 For the arms of the wicked shall be broken: * but the Lord strengthens the just.'
      - type: citation
        text: '36:18 The Lord knows the days of the blameless: * and their inheritance shall be for ever.'
      - type: citation
        text: '36:19 They shall not be confounded in the evil time, and in the days of famine they shall be filled: * for the wicked shall perish.'
      - type: citation
        text: '36:20 But the enemies of the Lord, as soon as they are honored and exalted: * failing, they shall fail like smoke.'
      - type: citation
        text: '36:21 The wicked man borrows and does not repay: * but the just man shows mercy and gives.'
      - type: citation
        text: '36:22 For those who bless him shall inherit the land: * but those who curse him shall perish.'
      - type: citation
        text: '36:23 By the Lord the steps of a man are directed: * and he takes delight in his way.'
      - type: citation
        text: '36:24 When he falls he shall not be cast down: * for the Lord holds his hand beneath him.'
      - type: citation
        text: '36:25 I have been young, and now am old: * yet I have not seen the just forsaken, nor his seed seeking bread.'
      - type: citation
        text: '36:26 All the day he shows mercy and lends: * and his seed shall be in blessing.'
      - type: citation
        text: '36:27 Turn from evil and do good: * and dwell for ever and ever.'
      - type: citation
        text: '36:28 For the Lord loves judgment, and will not forsake his saints: * they shall be preserved for ever.'
      - type: citation
        text: '36:28 The unjust shall be punished: * and the seed of the wicked shall perish.'
      - type: citation
        text: '36:29 But the just shall inherit the land: * and shall dwell upon it for ever and ever.'
      - type: citation
        text: 36:30 The mouth of the just shall meditate wisdom, * and his tongue shall speak judgment.
      - type: citation
        text: 36:31 The law of his God is in his heart, * and his steps shall not stumble.
      - type: citation
        text: '36:32 The wicked man watches the just: * and seeks to put him to death.'
      - type: citation
        text: '36:33 But the Lord will not abandon him in his hands: * nor condemn him when he is judged.'
      - type: citation
        text: '36:34 Wait for the Lord and keep his way: and he will exalt you to inherit the land: * when the wicked have perished you shall see it.'
      - type: citation
        text: 36:35 I have seen the wicked highly exalted, * and lifted up like the cedars of Lebanon.
      - type: citation
        text: '36:36 And I passed by, and behold he was no more: * and I sought him, and his place was not found.'
      - type: citation
        text: '36:37 Keep innocence and see righteousness: * for there is a future for the man of peace.'
      - type: citation
        text: '36:38 But the unjust shall perish together: * the remnant of the wicked shall be cut off.'
      - type: citation
        text: '36:39 But the salvation of the just is from the Lord: * and he is their protector in the time of tribulation.'
      - type: citation
        text: '36:40 And the Lord shall help them and deliver them: * and he shall rescue them from the wicked, and save them: because they have hoped in him.'
  psalm.37-2-d-mine-ne-in-fur-re-tuo-rguas-me-neque-in-i-29f512eb74:
    role: psalm
    content:
      en:
      - type: citation
        text: 37:2 Rebuke me not, O Lord, in thy indignation; * nor chastise me in thy wrath.
      - type: citation
        text: '37:3 For thy arrows are fastened in me: * and thy hand hath been strong upon me.'
      - type: citation
        text: '37:4 There is no health in my flesh, because of thy wrath: * there is no peace for my bones, because of my sins.'
      - type: citation
        text: '37:5 For my iniquities are gone over my head: * and as a heavy burden are become heavy upon me.'
      - type: citation
        text: 37:6 My sores are putrified and corrupted, * because of my foolishness.
      - type: citation
        text: '37:7 I am become miserable, and am bowed down even to the end: * I walked sorrowful all the day long.'
      - type: citation
        text: 37:8 For my loins are filled with illusions; * and there is no health in my flesh.
      - type: citation
        text: '37:9 I am afflicted and humbled exceedingly: * I roared with the groaning of my heart.'
      - type: citation
        text: 37:10 Lord, all my desire is before thee, * and my groaning is not hidden from thee.
      - type: citation
        text: 37:11 My heart is troubled, my strength hath left me, * and the light of my eyes itself is not with me.
      - type: citation
        text: 37:12 My friends and my neighbours * have drawn near, and stood against me.
      - type: citation
        text: '37:12 And they that were near me stood afar off: * and they that sought my soul used violence.'
      - type: citation
        text: 37:13 And they that sought evils to me spoke vain things, * and studied deceits all the day long.
      - type: citation
        text: '37:14 But I, as a deaf man, heard not: * and as a dumb man not opening his mouth.'
      - type: citation
        text: '37:15 And I became as a man that heareth not: * and that hath no reproofs in his mouth.'
      - type: citation
        text: '37:16 For in thee, O Lord, have I hoped: * thou wilt hear me, O Lord my God.'
      - type: citation
        text: '37:17 For I said: Lest at any time my enemies rejoice over me: * and whilst my feet are moved, they speak great things against me.'
      - type: citation
        text: '37:18 For I am ready for scourges: * and my sorrow is continually before me.'
      - type: citation
        text: '37:19 For I will declare my iniquity: * and I will think for my sin.'
      - type: citation
        text: '37:20 But my enemies live, and are stronger than I: * and they that hate me wrongfully are multiplied.'
      - type: citation
        text: 37:21 They that render evil for good, have detracted me, * because I followed goodness.
      - type: citation
        text: '37:22 Forsake me not, O Lord my God: * do not thou depart from me.'
      - type: citation
        text: 37:23 Attend unto my help, * O Lord, the God of my salvation.
      la:
      - type: citation
        text: 37:2 Dómine, ne in furóre tuo árguas me, * neque in ira tua corrípias me.
      - type: citation
        text: '37:3 Quóniam sagíttæ tuæ infíxæ sunt mihi: * et confirmásti super me manum tuam.'
      - type: citation
        text: '37:4 Non est sánitas in carne mea a fácie iræ tuæ: * non est pax óssibus meis a fácie peccatórum meórum.'
      - type: citation
        text: '37:5 Quóniam iniquitátes meæ supergréssæ sunt caput meum: * et sicut onus grave gravátæ sunt super me.'
      - type: citation
        text: 37:6 Putruérunt et corrúptæ sunt cicatríces meæ, * a fácie insipiéntiæ meæ.
      - type: citation
        text: '37:7 Miser factus sum, et curvátus sum usque in finem: * tota die contristátus ingrediébar.'
      - type: citation
        text: '37:8 Quóniam lumbi mei impléti sunt illusiónibus: * et non est sánitas in carne mea.'
      - type: citation
        text: '37:9 Afflíctus sum, et humiliátus sum nimis: * rugiébam a gémitu cordis mei.'
      - type: citation
        text: '37:10 Dómine, ante te omne desidérium meum: * et gémitus meus a te non est abscónditus.'
      - type: citation
        text: '37:11 Cor meum conturbátum est, derelíquit me virtus mea: * et lumen oculórum meórum, et ipsum non est mecum.'
      - type: citation
        text: 37:12 Amíci mei, et próximi mei * advérsum me appropinquavérunt, et stetérunt.
      - type: citation
        text: '37:12 Et qui iuxta me erant, de longe stetérunt: * et vim faciébant qui quærébant ánimam meam.'
      - type: citation
        text: '37:13 Et qui inquirébant mala mihi, locúti sunt vanitátes: * et dolos tota die meditabántur.'
      - type: citation
        text: '37:14 Ego autem tamquam surdus non audiébam: * et sicut mutus non apériens os suum.'
      - type: citation
        text: '37:15 Et factus sum sicut homo non áudiens: * et non habens in ore suo redargutiónes.'
      - type: citation
        text: '37:16 Quóniam in te, Dómine, sperávi: * tu exáudies me, Dómine, Deus meus.'
      - type: citation
        text: '37:17 Quia dixi: Nequándo supergáudeant mihi inimíci mei: * et dum commovéntur pedes mei, super me magna locúti sunt.'
      - type: citation
        text: '37:18 Quóniam ego in flagélla parátus sum: * et dolor meus in conspéctu meo semper.'
      - type: citation
        text: '37:19 Quóniam iniquitátem meam annuntiábo: * et cogitábo pro peccáto meo.'
      - type: citation
        text: '37:20 Inimíci autem mei vivunt, et confirmáti sunt super me: * et multiplicáti sunt qui odérunt me iníque.'
      - type: citation
        text: '37:21 Qui retríbuunt mala pro bonis, detrahébant mihi: * quóniam sequébar bonitátem.'
      - type: citation
        text: '37:22 Ne derelínquas me, Dómine, Deus meus: * ne discésseris a me.'
      - type: citation
        text: 37:23 Inténde in adiutórium meum, * Dómine, Deus, salútis meæ.
      en2:
      - type: citation
        text: 37:2 O Lord, rebuke me not in your fury, * nor chastise me in your wrath.
      - type: citation
        text: '37:3 For your arrows are fixed in me: * and you have laid your hand upon me.'
      - type: citation
        text: '37:4 There is no soundness in my flesh because of your anger: * there is no peace in my bones because of my sins.'
      - type: citation
        text: '37:5 For my iniquities have gone over my head: * and like a heavy burden they are weighed down upon me.'
      - type: citation
        text: 37:6 My wounds have putrefied and festered, * because of my foolishness.
      - type: citation
        text: '37:7 I have become wretched and bowed down to the end: * all the day I walked in sorrow.'
      - type: citation
        text: '37:8 For my loins are filled with delusions: * and there is no soundness in my flesh.'
      - type: citation
        text: '37:9 I am afflicted and greatly humbled: * I groaned with the groan of my heart.'
      - type: citation
        text: '37:10 O Lord, before you is all my desire: * and my groaning is not hidden from you.'
      - type: citation
        text: '37:11 My heart is troubled, my strength has failed me: * and the light of my eyes itself is not with me.'
      - type: citation
        text: 37:12 My friends and my neighbors * drew near and stood against me.
      - type: citation
        text: '37:12 And those who were close to me stood afar off: * and those who sought my soul used violence.'
      - type: citation
        text: '37:13 And those who sought evil against me spoke vanities: * and meditated deceits all the day.'
      - type: citation
        text: '37:14 But I, like a deaf man, heard not: * and was as a mute not opening his mouth.'
      - type: citation
        text: '37:15 And I became as a man that hears not: * and who has no reproofs in his mouth.'
      - type: citation
        text: '37:16 For in you, O Lord, have I hoped: * you will hear me, O Lord my God.'
      - type: citation
        text: '37:17 For I said: Lest my enemies ever exult over me: * and when my feet are shaken, they speak great things against me.'
      - type: citation
        text: '37:18 For I am ready for scourges: * and my sorrow is ever before me.'
      - type: citation
        text: '37:19 For I will declare my iniquity: * and I will think upon my sin.'
      - type: citation
        text: '37:20 But my enemies live and are stronger than I: * and those who hate me wrongfully are multiplied.'
      - type: citation
        text: '37:21 Those who return evil for good spoke ill of me: * because I pursued goodness.'
      - type: citation
        text: '37:22 Do not forsake me, O Lord my God: * do not depart from me.'
      - type: citation
        text: 37:23 Make haste to my assistance, * O Lord, God of my salvation.
  psalm.38-2-dixi-cust-diam-vias-meas-ut-non-del-nquam-i-2977534898:
    role: psalm
    content:
      en:
      - type: citation
        text: '38:2 I said: I will take heed to my ways: * that I sin not with my tongue.'
      - type: citation
        text: 38:2 I have set guard to my mouth, * when the sinner stood against me.
      - type: citation
        text: '38:3 I was dumb, and was humbled, and kept silence from good things: * and my sorrow was renewed.'
      - type: citation
        text: '38:4 My heart grew hot within me: * and in my meditation a fire shall flame out.'
      - type: citation
        text: '38:5 I spoke with my tongue: * O Lord, make me know my end.'
      - type: citation
        text: '38:5 And what is the number of my days: * that I may know what is wanting to me.'
      - type: citation
        text: '38:6 Behold thou hast made my days measurable: * and my substance is as nothing before thee.'
      - type: citation
        text: '38:6 And indeed all things are vanity: * every man living.'
      - type: citation
        text: '38:7 Surely man passeth as an image: * yea, and he is disquieted in vain.'
      - type: citation
        text: '38:7 He storeth up: * and he knoweth not for whom he shall gather these things.'
      - type: citation
        text: 38:8 And now what is my hope? Is it not the Lord? * And my substance is with thee.
      - type: citation
        text: '38:9 Deliver thou me from all my iniquities: * thou hast made me a reproach to the fool.'
      - type: citation
        text: '38:10 I was dumb, and I opened not my mouth, because thou hast done it: * remove thy scourges from me.'
      - type: citation
        text: '38:12 The strength of thy hand hath made me faint in rebukes: * thou hast corrected man for iniquity.'
      - type: citation
        text: '38:12 And thou hast made his soul to waste away like a spider: * surely in vain is any man disquieted.'
      - type: citation
        text: '38:13 Hear my prayer, O Lord, and my supplication: * give ear to my tears.'
      - type: citation
        text: '38:13 Be not silent: for I am a stranger with thee, * and a sojourner as all my fathers were.'
      - type: citation
        text: 38:14 O forgive me, that I may be refreshed, before I go hence, * and be no more.
      la:
      - type: citation
        text: '38:2 Dixi: Custódiam vias meas: * ut non delínquam in lingua mea.'
      - type: citation
        text: 38:2 Pósui ori meo custódiam, * cum consísteret peccátor advérsum me.
      - type: citation
        text: '38:3 Obmútui, et humiliátus sum, et sílui a bonis: * et dolor meus renovátus est.'
      - type: citation
        text: '38:4 Concáluit cor meum intra me: * et in meditatióne mea exardéscet ignis.'
      - type: citation
        text: '38:5 Locútus sum in lingua mea: * Notum fac mihi, Dómine, finem meum.'
      - type: citation
        text: '38:5 Et númerum diérum meórum quis est: * ut sciam quid desit mihi.'
      - type: citation
        text: '38:6 Ecce mensurábiles posuísti dies meos: * et substántia mea tamquam níhilum ante te.'
      - type: citation
        text: 38:6 Verúmtamen univérsa vánitas, * omnis homo vivens.
      - type: citation
        text: '38:7 Verúmtamen in imágine pertránsit homo: * sed et frustra conturbátur.'
      - type: citation
        text: '38:7 Thesaurízat: * et ignórat cui congregábit ea.'
      - type: citation
        text: 38:8 Et nunc quæ est exspectátio mea? Nonne Dóminus? * Et substántia mea apud te est.
      - type: citation
        text: '38:9 Ab ómnibus iniquitátibus meis érue me: * oppróbrium insipiénti dedísti me.'
      - type: citation
        text: '38:10 Obmútui, et non apérui os meum, quóniam tu fecísti: * ámove a me plagas tuas.'
      - type: citation
        text: '38:12 A fortitúdine manus tuæ ego deféci in increpatiónibus: * propter iniquitátem corripuísti hóminem.'
      - type: citation
        text: '38:12 Et tabéscere fecísti sicut aráneam ánimam eius: * verúmtamen vane conturbátur omnis homo.'
      - type: citation
        text: '38:13 Exáudi oratiónem meam, Dómine, et deprecatiónem meam: * áuribus pércipe lácrimas meas.'
      - type: citation
        text: '38:13 Ne síleas: quóniam ádvena ego sum apud te, et peregrínus, * sicut omnes patres mei.'
      - type: citation
        text: 38:14 Remítte mihi, ut refrígerer priúsquam ábeam, * et ámplius non ero.
      en2:
      - type: citation
        text: '38:2 I said: I will keep my ways: * that I sin not with my tongue.'
      - type: citation
        text: 38:2 I set a guard upon my mouth, * while the wicked stood against me.
      - type: citation
        text: '38:3 I was dumb and was humbled, and kept silence from good things: * and my sorrow was renewed.'
      - type: citation
        text: '38:4 My heart grew warm within me: * and in my meditation a fire shall blaze forth.'
      - type: citation
        text: '38:5 I spoke with my tongue: * Make me know, O Lord, my end.'
      - type: citation
        text: '38:5 And what is the number of my days: * that I may know what is wanting to me.'
      - type: citation
        text: '38:6 Behold, you have made my days as a handbreadth: * and my substance is as nothing before you.'
      - type: citation
        text: 38:6 Yet surely all is vanity, * every man that lives.
      - type: citation
        text: '38:7 Surely man passes like an image: * yea, and he is disquieted in vain.'
      - type: citation
        text: '38:7 He lays up treasures: * and knows not for whom he gathers them.'
      - type: citation
        text: 38:8 And now what is my hope? Is it not the Lord? * And my substance is with you.
      - type: citation
        text: '38:9 Deliver me from all my iniquities: * you have made me a reproach to the foolish.'
      - type: citation
        text: '38:10 I was dumb and opened not my mouth, because you have done it: * remove your scourges from me.'
      - type: citation
        text: '38:12 Through the strength of your hand I have failed under your rebukes: * you have corrected man for iniquity.'
      - type: citation
        text: '38:12 And you have made his soul waste away like a spider: * yet surely every man is disquieted in vain.'
      - type: citation
        text: '38:13 Hear my prayer, O Lord, and my supplication: * give ear to my tears.'
      - type: citation
        text: '38:13 Be not silent: for I am a stranger with you, and a sojourner, * as all my fathers were.'
      - type: citation
        text: 38:14 Spare me, that I may be refreshed before I depart, * and be no more.
  psalm.39-2-exsp-ctans-exspect-vi-d-minum-et-int-ndit-m-70724099d3:
    role: psalm
    content:
      en:
      - type: citation
        text: 39:2 With expectation I have waited for the Lord, * and he was attentive to me.
      - type: citation
        text: 39:3 And he heard my prayers, * and brought me out of the pit of misery and the mire of dregs.
      - type: citation
        text: 39:3 And he set my feet upon a rock, * and directed my steps.
      - type: citation
        text: 39:4 And he put a new canticle into my mouth, * a song to our God.
      - type: citation
        text: '39:4 Many shall see, and shall fear: * and they shall hope in the Lord.'
      - type: citation
        text: 39:5 Blessed is the man whose trust is in the name of the Lord; * and who hath not had regard to vanities, and lying follies.
      - type: citation
        text: '39:6 Thou hast multiplied thy wonderful works, O Lord my God: * and in thy thoughts there is no one like to thee.'
      - type: citation
        text: 39:6 I have declared and I have spoken * they are multiplied above number.
      - type: citation
        text: 39:7 Sacrifice and oblation thou didst not desire; * but thou hast pierced ears for me.
      - type: citation
        text: '39:7 Burnt offering and sin offering thou didst not require: * then said I, Behold I come.'
      - type: citation
        text: '39:8 In the head of the book it is written of me that I should do thy will: * O my God, I have desired it, and thy law in the midst of my heart.'
      - type: citation
        text: '39:10 I have declared thy justice in a great church, * lo, I will not restrain my lips: O Lord, thou knowest it.'
      - type: citation
        text: '39:11 I have not hid thy justice within my heart: * I have declared thy truth and thy salvation.'
      - type: citation
        text: 39:11 I have not concealed thy mercy and thy truth * from a great council.
      - type: citation
        text: '39:12 Withhold not thou, O Lord, thy tender mercies from me: * thy mercy and thy truth have always upheld me.'
      - type: citation
        text: 39:13 For evils without number have surrounded me; * my iniquities have overtaken me, and I was not able to see.
      - type: citation
        text: '39:13 They are multiplied above the hairs of my head: * and my heart hath forsaken me.'
      - type: citation
        text: '39:14 Be pleased, O Lord to deliver me: * look down, O Lord, to help me.'
      - type: citation
        text: 39:15 Let them be confounded and ashamed together, that seek after my soul * to take it away.
      - type: citation
        text: 39:15 Let them be turned backward and be ashamed * that desire evils to me.
      - type: citation
        text: '39:16 Let them immediately bear their confusion, * that say to me: ’T is well, ’t is well.'
      - type: citation
        text: '39:17 Let all that seek thee rejoice and be glad in thee: * and let such as love thy salvation say always: The Lord be magnified.'
      - type: citation
        text: '39:18 But I am a beggar and poor: * the Lord is careful for me.'
      - type: citation
        text: '39:18 Thou art my helper and my protector: * O my God, be not slack.'
      la:
      - type: citation
        text: 39:2 Exspéctans exspectávi Dóminum, * et inténdit mihi.
      - type: citation
        text: '39:3 Et exaudívit preces meas: * et edúxit me de lacu misériæ, et de luto fæcis.'
      - type: citation
        text: '39:3 Et státuit super petram pedes meos: * et diréxit gressus meos.'
      - type: citation
        text: 39:4 Et immísit in os meum cánticum novum, * carmen Deo nostro.
      - type: citation
        text: '39:4 Vidébunt multi, et timébunt: * et sperábunt in Dómino.'
      - type: citation
        text: '39:5 Beátus vir, cuius est nomen Dómini spes eius: * et non respéxit in vanitátes et insánias falsas.'
      - type: citation
        text: '39:6 Multa fecísti tu, Dómine, Deus meus, mirabília tua: * et cogitatiónibus tuis non est qui símilis sit tibi.'
      - type: citation
        text: '39:6 Annuntiávi et locútus sum: * multiplicáti sunt super númerum.'
      - type: citation
        text: '39:7 Sacrifícium et oblatiónem noluísti: * aures autem perfecísti mihi.'
      - type: citation
        text: '39:7 Holocáustum et pro peccáto non postulásti: * tunc dixi: Ecce, vénio.'
      - type: citation
        text: '39:8 In cápite libri scriptum est de me ut fácerem voluntátem tuam: * Deus meus, vólui, et legem tuam in médio cordis mei.'
      - type: citation
        text: '39:10 Annuntiávi iustítiam tuam in ecclésia magna, * ecce, lábia mea non prohibébo: Dómine, tu scisti.'
      - type: citation
        text: '39:11 Iustítiam tuam non abscóndi in corde meo: * veritátem tuam et salutáre tuum dixi.'
      - type: citation
        text: 39:11 Non abscóndi misericórdiam tuam et veritátem tuam * a concílio multo.
      - type: citation
        text: '39:12 Tu autem, Dómine, ne longe fácias miseratiónes tuas a me: * misericórdia tua et véritas tua semper suscepérunt me.'
      - type: citation
        text: '39:13 Quóniam circumdedérunt me mala, quorum non est númerus: * comprehendérunt me iniquitátes meæ, et non pótui ut vidérem.'
      - type: citation
        text: '39:13 Multiplicátæ sunt super capíllos cápitis mei: * et cor meum derelíquit me.'
      - type: citation
        text: '39:14 Compláceat tibi, Dómine, ut éruas me: * Dómine, ad adiuvándum me réspice.'
      - type: citation
        text: 39:15 Confundántur et revereántur simul, qui quærunt ánimam meam, * ut áuferant eam.
      - type: citation
        text: 39:15 Convertántur retrórsum, et revereántur, * qui volunt mihi mala.
      - type: citation
        text: '39:16 Ferant conféstim confusiónem suam, * qui dicunt mihi: Euge, euge.'
      - type: citation
        text: '39:17 Exsúltent et læténtur super te omnes quæréntes te: * et dicant semper: Magnificétur Dóminus: qui díligunt salutáre tuum.'
      - type: citation
        text: '39:18 Ego autem mendícus sum, et pauper: * Dóminus sollícitus est mei.'
      - type: citation
        text: '39:18 Adiútor meus, et protéctor meus tu es: * Deus meus, ne tardáveris.'
      en2:
      - type: citation
        text: 39:2 With expectation I have waited for the Lord, * and he turned to me.
      - type: citation
        text: '39:3 And he heard my prayers: * and he brought me out of the pit of misery and the mire of dregs.'
      - type: citation
        text: '39:3 And he set my feet upon a rock: * and directed my steps.'
      - type: citation
        text: 39:4 And he put a new song into my mouth, * a hymn to our God.
      - type: citation
        text: '39:4 Many shall see and shall fear: * and shall hope in the Lord.'
      - type: citation
        text: '39:5 Blessed is the man whose hope is in the name of the Lord: * and who has not regarded vanities and lying follies.'
      - type: citation
        text: '39:6 Many things you have done, O Lord my God, your wonders: * and in your thoughts there is none like you.'
      - type: citation
        text: '39:6 I have declared and I have spoken: * they are multiplied above number.'
      - type: citation
        text: '39:7 Sacrifice and oblation you did not desire: * but you have pierced ears for me.'
      - type: citation
        text: '39:7 Burnt offering and sin offering you did not require: * then I said: Behold, I come.'
      - type: citation
        text: '39:8 In the head of the book it is written of me that I should do your will: * O my God, I have desired it, and your law in the midst of my heart.'
      - type: citation
        text: '39:10 I have declared your justice in the great assembly, * behold, I will not restrain my lips: O Lord, you know it.'
      - type: citation
        text: '39:11 I have not hidden your justice in my heart: * I have declared your truth and your salvation.'
      - type: citation
        text: 39:11 I have not hidden your mercy and your truth * from a great assembly.
      - type: citation
        text: '39:12 But you, O Lord, do not withhold your compassion from me: * your mercy and your truth have always upheld me.'
      - type: citation
        text: '39:13 For evils without number have surrounded me: * my iniquities have overtaken me, and I could not see.'
      - type: citation
        text: '39:13 They are multiplied above the hairs of my head: * and my heart has forsaken me.'
      - type: citation
        text: '39:14 Be pleased, O Lord, to deliver me: * O Lord, look to my aid.'
      - type: citation
        text: 39:15 Let them be confounded and ashamed together, who seek my soul * to take it away.
      - type: citation
        text: 39:15 Let them be turned back and put to shame, * who desire evil for me.
      - type: citation
        text: '39:16 Let them straightway bear their confusion, * who say to me: Well done, well done.'
      - type: citation
        text: '39:17 Let all who seek you exult and rejoice in you: * and let those who love your salvation always say: The Lord be magnified.'
      - type: citation
        text: '39:18 But I am poor and needy: * the Lord is solicitous for me.'
      - type: citation
        text: '39:18 You are my helper and my protector: * O my God, do not delay.'
  psalm.4-2a-cum-invoc-rem-exaud-vit-me-deus-iust-ti-me-faee7b9ce8:
    role: psalm
    content:
      en:
      - type: citation
        text: '4:2a When I called upon him, the God of my justice heard me: * when I was in distress, thou hast enlarged me.'
      - type: citation
        text: '4:2b Have mercy on me: * and hear my prayer.'
      - type: citation
        text: 4:3 O ye sons of men, how long will you be dull of heart? * Why do you love vanity, and seek after lying?
      - type: citation
        text: '4:4 Know ye also that the Lord hath made his holy one wonderful: * the Lord will hear me when I shall cry unto him.'
      - type: citation
        text: '4:5 Be ye angry, and sin not: ‡ the things you say in your hearts, * be sorry for them upon your beds.'
      - type: citation
        text: '4:6 Offer up the sacrifice of justice, † and trust in the Lord: * many say, Who sheweth us good things?'
      - type: citation
        text: '4:7 The light of thy countenance, O Lord, is signed upon us: * thou hast given gladness in my heart.'
      - type: citation
        text: 4:8 By the fruit of their corn, their wine, and oil, * they are multiplied.
      - type: citation
        text: '4:9 In peace in the selfsame * I will sleep, and I will rest:'
      - type: citation
        text: 4:10 For thou, O Lord, singularly * hast settled me in hope.
      la:
      - type: citation
        text: '4:2a Cum invocárem exaudívit me Deus iustítiæ meæ: * in tribulatióne dilatásti mihi.'
      - type: citation
        text: 4:2b Miserére mei, * et exáudi oratiónem meam.
      - type: citation
        text: 4:3 Fílii hóminum, úsquequo gravi corde? * ut quid dilígitis vanitátem, et quǽritis mendácium?
      - type: citation
        text: '4:4 Et scitóte quóniam mirificávit Dóminus sanctum suum: * Dóminus exáudiet me cum clamávero ad eum.'
      - type: citation
        text: '4:5 Irascímini, et nolíte peccáre: ‡ quæ dícitis in córdibus vestris, * in cubílibus vestris compungímini.'
      - type: citation
        text: '4:6 Sacrificáte sacrifícium iustítiæ, † et speráte in Dómino. * Multi dicunt: Quis osténdit nobis bona?'
      - type: citation
        text: '4:7 Signátum est super nos lumen vultus tui, Dómine: * dedísti lætítiam in corde meo.'
      - type: citation
        text: 4:8 A fructu fruménti, vini, et ólei sui * multiplicáti sunt.
      - type: citation
        text: 4:9 In pace in idípsum * dórmiam, et requiéscam;
      - type: citation
        text: 4:10 Quóniam tu, Dómine, singuláriter in spe * constituísti me.
      en2:
      - type: citation
        text: '4:2a When I called upon him, the God of my justice heard me: * in tribulation you gave me room.'
      - type: citation
        text: 4:2b Have mercy on me, * and hear my prayer.
      - type: citation
        text: 4:3 O children of men, how long will you be dull of heart? * Why do you love vanity and seek falsehood?
      - type: citation
        text: '4:4 Know also that the Lord has made his holy one wonderful: * the Lord will hear me when I cry out to him.'
      - type: citation
        text: '4:5 Be angry, and sin not: ‡ the things you say in your hearts, * repent of them upon your beds.'
      - type: citation
        text: '4:6 Offer a sacrifice of justice, † and trust in the Lord. * Many say: Who shows us good things?'
      - type: citation
        text: '4:7 The light of your face, O Lord, is signed upon us: * you have given gladness to my heart.'
      - type: citation
        text: 4:8 By the fruit of their grain, wine, and oil * they have been multiplied.
      - type: citation
        text: 4:9 In peace, in the selfsame, * I will sleep and take my rest;
      - type: citation
        text: 4:10 For you, O Lord, alone * have established me in hope.
  psalm.40-2-be-tus-qui-int-llegit-super-eg-num-et-p-upe-fbf917e6a4:
    role: psalm
    content:
      en:
      - type: citation
        text: '40:2 Blessed is he that understandeth concerning the needy and the poor: * the Lord will deliver him in the evil day.'
      - type: citation
        text: '40:3 The Lord preserve him and give him life, and make him blessed upon the earth: * and deliver him not up to the will of his enemies.'
      - type: citation
        text: '40:4 The Lord help him on his bed of sorrow: * thou hast turned all his couch in his sickness.'
      - type: citation
        text: '40:5 I said: O Lord, be thou merciful to me: * heal my soul, for I have sinned against thee.'
      - type: citation
        text: '40:6 My enemies have spoken evils against me: * when shall he die and his name perish?'
      - type: citation
        text: '40:7 And if he came in to see me, he spoke vain things: * his heart gathered together iniquity to itself.'
      - type: citation
        text: 40:7 He went out * and spoke to the same purpose.
      - type: citation
        text: '40:8 All my enemies whispered together against me: * they devised evils to me.'
      - type: citation
        text: '40:9 They determined against me an unjust word: * shall he that sleepeth rise again no more?'
      - type: citation
        text: 40:10 For even the man of my peace, in whom I trusted, * who ate my bread, hath greatly supplanted me.
      - type: citation
        text: '40:11 But thou, O Lord, have mercy on me, and raise me up again: * and I will requite them.'
      - type: citation
        text: '40:12 By this I know, that thou hast had a good will for me: * because my enemy shall not rejoice over me.'
      - type: citation
        text: '40:13 But thou hast upheld me by reason of my innocence: * and hast established me in thy sight for ever.'
      - type: citation
        text: 40:14 Blessed be the Lord the God of Israel from eternity to eternity. * So be it. So be it.
      la:
      - type: citation
        text: '40:2 Beátus qui intéllegit super egénum, et páuperem: * in die mala liberábit eum Dóminus.'
      - type: citation
        text: '40:3 Dóminus consérvet eum, et vivíficet eum, et beátum fáciat eum in terra: * et non tradat eum in ánimam inimicórum eius.'
      - type: citation
        text: '40:4 Dóminus opem ferat illi super lectum dolóris eius: * univérsum stratum eius versásti in infirmitáte eius.'
      - type: citation
        text: '40:5 Ego dixi: Dómine, miserére mei: * sana ánimam meam, quia peccávi tibi.'
      - type: citation
        text: '40:6 Inimíci mei dixérunt mala mihi: * Quando moriétur, et períbit nomen eius?'
      - type: citation
        text: '40:7 Et si ingrediebátur ut vidéret, vana loquebátur: * cor eius congregávit iniquitátem sibi.'
      - type: citation
        text: 40:7 Egrediebátur foras, * et loquebátur in idípsum.
      - type: citation
        text: '40:8 Advérsum me susurrábant omnes inimíci mei: * advérsum me cogitábant mala mihi.'
      - type: citation
        text: '40:9 Verbum iníquum constituérunt advérsum me: * Numquid qui dormit non adíciet ut resúrgat?'
      - type: citation
        text: '40:10 Étenim homo pacis meæ, in quo sperávi: * qui edébat panes meos, magnificávit super me supplantatiónem.'
      - type: citation
        text: '40:11 Tu autem, Dómine, miserére mei, et resúscita me: * et retríbuam eis.'
      - type: citation
        text: '40:12 In hoc cognóvi quóniam voluísti me: * quóniam non gaudébit inimícus meus super me.'
      - type: citation
        text: '40:13 Me autem propter innocéntiam suscepísti: * et confirmásti me in conspéctu tuo in ætérnum.'
      - type: citation
        text: '40:14 Benedíctus Dóminus, Deus Israël, a sǽculo et usque in sǽculum: * fiat, fiat.'
      en2:
      - type: citation
        text: '40:2 Blessed is he who understands concerning the needy and the poor: * the Lord will deliver him in the evil day.'
      - type: citation
        text: '40:3 The Lord preserve him, and give him life, and make him blessed upon the earth: * and deliver him not up to the will of his enemies.'
      - type: citation
        text: '40:4 The Lord help him upon his bed of sorrow: * you have turned all his couch in his sickness.'
      - type: citation
        text: '40:5 I said: O Lord, be merciful to me: * heal my soul, for I have sinned against you.'
      - type: citation
        text: '40:6 My enemies have spoken evil of me: * When shall he die and his name perish?'
      - type: citation
        text: '40:7 And if one came to see me, he spoke vain things: * his heart gathered iniquity to itself.'
      - type: citation
        text: 40:7 He went out, * and spoke to the same purpose.
      - type: citation
        text: '40:8 All my enemies whispered against me: * they devised evil against me.'
      - type: citation
        text: '40:9 They determined against me an unjust word: * Will he who sleeps rise no more?'
      - type: citation
        text: '40:10 For even the man of my peace, in whom I trusted: * who ate my bread, has greatly supplanted me.'
      - type: citation
        text: '40:11 But you, O Lord, have mercy on me, and raise me up again: * and I will repay them.'
      - type: citation
        text: '40:12 By this I know that you have had a good will toward me: * because my enemy shall not rejoice over me.'
      - type: citation
        text: '40:13 But you have upheld me by reason of my innocence: * and have established me in your sight for ever.'
      - type: citation
        text: '40:14 Blessed be the Lord, the God of Israel, from age to age: * so be it, so be it.'
  psalm.41-2-quem-dmodum-des-derat-cervus-ad-fontes-aqu-1c69bf9de0:
    role: psalm
    content:
      en:
      - type: citation
        text: 41:2 As the hart panteth after the fountains of water; * so my soul panteth after thee, O God.
      - type: citation
        text: 41:3 My soul hath thirsted after the strong living God; * when shall I come and appear before the face of God?
      - type: citation
        text: '41:4 My tears have been my bread day and night, * whilst it is said to me daily: Where is thy God?'
      - type: citation
        text: '41:5 These things I remembered, and poured out my soul in me: * for I shall go over into the place of the wonderful tabernacle, even to the house of God:'
      - type: citation
        text: 41:5 With the voice of joy and praise; * the noise of one feasting.
      - type: citation
        text: 41:6 Why art thou sad, O my soul? * and why dost thou trouble me?
      - type: citation
        text: '41:6 Hope in God, for I will still give praise to him: * the salvation of my countenance, and my God.'
      - type: citation
        text: '41:7 My soul is troubled within myself: * therefore will I remember thee from the land of Jordan and Hermoniim, from the little hill.'
      - type: citation
        text: 41:8 Deep calleth on deep, * at the noise of thy flood-gates.
      - type: citation
        text: 41:8 All thy heights and thy billows * have passed over me.
      - type: citation
        text: 41:9 In the daytime the Lord hath commanded his mercy; * and a canticle to him in the night.
      - type: citation
        text: '41:9 With me is prayer to the God of my life. * I will say to God: Thou art my support.'
      - type: citation
        text: 41:10 Why hast thou forgotten me? * and why go I mourning, whilst my enemy afflicteth me?
      - type: citation
        text: 41:11 Whilst my bones are broken, * my enemies who trouble me have reproached me;
      - type: citation
        text: '41:11 Whilst they say to me day by day: Where is thy God? * Why art thou cast down, O my soul? and why dost thou disquiet me?'
      - type: citation
        text: '41:12 Hope thou in God, for I will still give praise to him: * the salvation of my countenance, and my God.'
      la:
      - type: citation
        text: '41:2 Quemádmodum desíderat cervus ad fontes aquárum: * ita desíderat ánima mea ad te, Deus.'
      - type: citation
        text: '41:3 Sitívit ánima mea ad Deum fortem vivum: * quando véniam, et apparébo ante fáciem Dei?'
      - type: citation
        text: '41:4 Fuérunt mihi lácrimæ meæ panes die ac nocte: * dum dícitur mihi cotídie: Ubi est Deus tuus?'
      - type: citation
        text: '41:5 Hæc recordátus sum, et effúdi in me ánimam meam: * quóniam transíbo in locum tabernáculi admirábilis, usque ad domum Dei.'
      - type: citation
        text: '41:5 In voce exsultatiónis, et confessiónis: * sonus epulántis.'
      - type: citation
        text: 41:6 Quare tristis es, ánima mea? * et quare contúrbas me?
      - type: citation
        text: '41:6 Spera in Deo, quóniam adhuc confitébor illi: * salutáre vultus mei, et Deus meus.'
      - type: citation
        text: '41:7 Ad meípsum ánima mea conturbáta est: * proptérea memor ero tui de terra Iordánis, et Hermóniim a monte módico.'
      - type: citation
        text: 41:8 Abýssus abýssum ínvocat, * in voce cataractárum tuárum.
      - type: citation
        text: 41:8 Ómnia excélsa tua, et fluctus tui * super me transiérunt.
      - type: citation
        text: '41:9 In die mandávit Dóminus misericórdiam suam: * et nocte cánticum eius.'
      - type: citation
        text: '41:9 Apud me orátio Deo vitæ meæ, * dicam Deo: Suscéptor meus es.'
      - type: citation
        text: 41:10 Quare oblítus es mei? * et quare contristátus incédo, dum afflígit me inimícus?
      - type: citation
        text: 41:11 Dum confringúntur ossa mea, * exprobravérunt mihi qui tríbulant me inimíci mei.
      - type: citation
        text: '41:11 Dum dicunt mihi per síngulos dies: Ubi est Deus tuus? * quare tristis es, ánima mea? et quare contúrbas me?'
      - type: citation
        text: '41:12 Spera in Deo, quóniam adhuc confitébor illi: * salutáre vultus mei, et Deus meus.'
      en2:
      - type: citation
        text: 41:2 As the hart longs for the water-springs, * so my soul longs for you, O God.
      - type: citation
        text: '41:3 My soul has thirsted for God, the strong and living God: * when shall I come and appear before the face of God?'
      - type: citation
        text: '41:4 My tears have been my bread day and night: * while they say to me daily: Where is your God?'
      - type: citation
        text: '41:5 These things I remembered, and poured out my soul within me: * for I shall pass into the place of the wonderful tabernacle, even to the house of God.'
      - type: citation
        text: '41:5 With the voice of rejoicing and praise: * the sound of feasting.'
      - type: citation
        text: 41:6 Why are you sad, O my soul? * and why do you trouble me?
      - type: citation
        text: '41:6 Hope in God, for I will still give praise to him: * the salvation of my countenance, and my God.'
      - type: citation
        text: '41:7 My soul is troubled within me: * therefore I will remember you from the land of Jordan and Hermon, from the little mountain.'
      - type: citation
        text: 41:8 Deep calls unto deep, * at the noise of your cataracts.
      - type: citation
        text: 41:8 All your heights and your billows * have passed over me.
      - type: citation
        text: '41:9 In the daytime the Lord commanded his mercy: * and at night his song was with me.'
      - type: citation
        text: '41:9 With me is a prayer to the God of my life: * I will say to God: You are my refuge.'
      - type: citation
        text: 41:10 Why have you forgotten me? * and why do I go sorrowful while my enemy afflicts me?
      - type: citation
        text: 41:11 While my bones are broken, * my enemies who trouble me have reproached me.
      - type: citation
        text: '41:11 While they say to me day after day: Where is your God? * why are you sad, O my soul? and why do you trouble me?'
      - type: citation
        text: '41:12 Hope in God, for I will still give praise to him: * the salvation of my countenance, and my God.'
  psalm.42-1-i-dica-me-deus-et-disc-rne-causam-meam-de-g-d2303c1e72:
    role: psalm
    content:
      en:
      - type: citation
        text: '42:1 Judge me, O God, and distinguish my cause from the nation that is not holy: * deliver me from the unjust and deceitful man.'
      - type: citation
        text: '42:2 For thou art God my strength: * why hast thou cast me off? and why do I go sorrowful whilst the enemy afflicteth me?'
      - type: citation
        text: '42:3 Send forth thy light and thy truth: * they have conducted me, and brought me unto thy holy hill, and into thy tabernacles.'
      - type: citation
        text: '42:4 And I will go in to the altar of God: * to God who giveth joy to my youth.'
      - type: citation
        text: '42:5 To thee, O God my God, I will give praise upon the harp: * why art thou sad, O my soul? and why dost thou disquiet me?'
      - type: citation
        text: '42:6 Hope in God, for I will still give praise to him: * the salvation of my countenance, and my God.'
      la:
      - type: citation
        text: 42:1 Iúdica me, Deus, et discérne causam meam de gente non sancta, * ab hómine iníquo, et dolóso érue me.
      - type: citation
        text: '42:2 Quia tu es, Deus, fortitúdo mea: * quare me repulísti? et quare tristis incédo, dum afflígit me inimícus?'
      - type: citation
        text: '42:3 Emítte lucem tuam et veritátem tuam: * ipsa me deduxérunt, et adduxérunt in montem sanctum tuum, et in tabernácula tua.'
      - type: citation
        text: '42:4 Et introíbo ad altáre Dei: * ad Deum, qui lætíficat iuventútem meam.'
      - type: citation
        text: '42:5 Confitébor tibi in cíthara, Deus, Deus meus: * quare tristis es, ánima mea? et quare contúrbas me?'
      - type: citation
        text: '42:6 Spera in Deo, quóniam adhuc confitébor illi: * salutáre vultus mei, et Deus meus.'
      en2:
      - type: citation
        text: 42:1 Judge me, O God, and distinguish my cause from that of an unholy people, * deliver me from the unjust and deceitful man.
      - type: citation
        text: '42:2 For you are God, my strength: * why have you cast me off? and why do I go sorrowful while the enemy afflicts me?'
      - type: citation
        text: '42:3 Send forth your light and your truth: * they have led me and brought me to your holy mountain and into your tabernacles.'
      - type: citation
        text: '42:4 And I will go in to the altar of God: * to God, who gives joy to my youth.'
      - type: citation
        text: '42:5 I will praise you upon the harp, O God, my God: * why are you sad, O my soul? and why do you trouble me?'
      - type: citation
        text: '42:6 Hope in God, for I will still give praise to him: * the salvation of my countenance, and my God.'
  psalm.43-2-deus-uribus-nostris-aud-vimus-patres-nostri-d6a7c8dc95:
    role: psalm
    content:
      en:
      - type: citation
        text: '43:2 We have heard, O God, with our ears: * our fathers have declared to us,'
      - type: citation
        text: 43:2 The work thou hast wrought in their days, * and in the days of old.
      - type: citation
        text: '43:3 Thy hand destroyed the Gentiles, and thou plantedst them: * thou didst afflict the people and cast them out.'
      - type: citation
        text: '43:4 For they got not the possession of the land by their own sword: * neither did their own arm save them.'
      - type: citation
        text: '43:4 But thy right hand and thy arm, and the light of thy countenance: * because thou wast pleased with them.'
      - type: citation
        text: 43:5 Thou art thyself my king and my God, * who commandest the saving of Jacob.
      - type: citation
        text: '43:6 Through thee we will push down our enemies with the horn: * and through thy name we will despise them that rise up against us.'
      - type: citation
        text: '43:7 For I will not trust in my bow: * neither shall my sword save me.'
      - type: citation
        text: '43:8 But thou hast saved us from them that afflict us: * and hast put them to shame that hate us.'
      - type: citation
        text: '43:9 In God shall we glory all the day long: * and in thy name we will give praise for ever.'
      - type: citation
        text: '43:10 But now thou hast cast us off, and put us to shame: * and thou, O God, wilt not go out with our armies.'
      - type: citation
        text: '43:11 Thou hast made us turn our back to our enemies: * and they that hated us plundered for themselves.'
      - type: citation
        text: '43:12 Thou hast given us up like sheep to be eaten: * thou hast scattered us among the nations.'
      - type: citation
        text: '43:13 Thou hast sold thy people for no price: * and there was no reckoning in the exchange of them.'
      - type: citation
        text: 43:14 Thou hast made us a reproach to our neighbours, * a scoff and derision to them that are round about us.
      - type: citation
        text: '43:15 Thou hast made us a byword among the Gentiles: * a shaking of the head among the people.'
      - type: citation
        text: '43:16 All the day long my shame is before me: * and the confusion of my face hath covered me.'
      - type: citation
        text: '43:17 At the voice of him that reproacheth and detracteth me: * at the face of the enemy and persecutor.'
      - type: citation
        text: '43:18 All these things have come upon us, yet we have not forgotten thee: * and we have not done wickedly in thy covenant.'
      - type: citation
        text: '43:19 And our heart hath not turned back: * neither hast thou turned aside our steps from thy way.'
      - type: citation
        text: '43:20 For thou hast humbled us in the place of affliction: * and the shadow of death hath covered us.'
      - type: citation
        text: '43:21 If we have forgotten the name of our God, * and if we have spread forth our hands to a strange god:'
      - type: citation
        text: '43:22 Shall not God search out these things: * for he knoweth the secrets of the heart.'
      - type: citation
        text: '43:22 Because for thy sake we are killed all the day long: * we are counted as sheep for the slaughter.'
      - type: citation
        text: 43:23 Arise, why sleepest thou, O Lord? * arise, and cast us not off to the end.
      - type: citation
        text: 43:24 Why turnest thou thy face away? * and forgettest our want and our trouble?
      - type: citation
        text: '43:25 For our soul is humbled down to the dust: * our belly cleaveth to the earth.'
      - type: citation
        text: 43:26 Arise, O Lord, help us * and redeem us for thy name’s sake.
      la:
      - type: citation
        text: '43:2 Deus áuribus nostris audívimus: * patres nostri annuntiavérunt nobis.'
      - type: citation
        text: 43:2 Opus, quod operátus es in diébus eórum, * et in diébus antíquis.
      - type: citation
        text: '43:3 Manus tua gentes dispérdidit, et plantásti eos: * afflixísti pópulos, et expulísti eos.'
      - type: citation
        text: '43:4 Nec enim in gládio suo possedérunt terram, * et brácchium eórum non salvávit eos:'
      - type: citation
        text: '43:4 Sed déxtera tua, et brácchium tuum, et illuminátio vultus tui: * quóniam complacuísti in eis.'
      - type: citation
        text: '43:5 Tu es ipse Rex meus et Deus meus: * qui mandas salútes Iacob.'
      - type: citation
        text: '43:6 In te inimícos nostros ventilábimus cornu: * et in nómine tuo spernémus insurgéntes in nobis.'
      - type: citation
        text: '43:7 Non enim in arcu meo sperábo: * et gládius meus non salvábit me.'
      - type: citation
        text: '43:8 Salvásti enim nos de affligéntibus nos: * et odiéntes nos confudísti.'
      - type: citation
        text: '43:9 In Deo laudábimur tota die: * et in nómine tuo confitébimur in sǽculum.'
      - type: citation
        text: '43:10 Nunc autem repulísti et confudísti nos: * et non egrediéris, Deus, in virtútibus nostris.'
      - type: citation
        text: '43:11 Avertísti nos retrórsum post inimícos nostros: * et qui odérunt nos, diripiébant sibi.'
      - type: citation
        text: '43:12 Dedísti nos tamquam oves escárum: * et in géntibus dispersísti nos.'
      - type: citation
        text: '43:13 Vendidísti pópulum tuum sine prétio: * et non fuit multitúdo in commutatiónibus eórum.'
      - type: citation
        text: 43:14 Posuísti nos oppróbrium vicínis nostris, * subsannatiónem et derísum his, qui sunt in circúitu nostro.
      - type: citation
        text: '43:15 Posuísti nos in similitúdinem géntibus: * commotiónem cápitis in pópulis.'
      - type: citation
        text: 43:16 Tota die verecúndia mea contra me est, * et confúsio faciéi meæ coopéruit me.
      - type: citation
        text: '43:17 A voce exprobrántis, et obloquéntis: * a fácie inimíci, et persequéntis.'
      - type: citation
        text: '43:18 Hæc ómnia venérunt super nos, nec oblíti sumus te: * et iníque non égimus in testaménto tuo.'
      - type: citation
        text: '43:19 Et non recéssit retro cor nostrum: * et declinásti sémitas nostras a via tua:'
      - type: citation
        text: 43:20 Quóniam humiliásti nos in loco afflictiónis, * et coopéruit nos umbra mortis.
      - type: citation
        text: '43:21 Si oblíti sumus nomen Dei nostri, * et si expándimus manus nostras ad deum aliénum:'
      - type: citation
        text: 43:22 Nonne Deus requíret ista? * ipse enim novit abscóndita cordis.
      - type: citation
        text: '43:22 Quóniam propter te mortificámur tota die: * æstimáti sumus sicut oves occisiónis.'
      - type: citation
        text: 43:23 Exsúrge, quare obdórmis, Dómine? * exsúrge, et ne repéllas in finem.
      - type: citation
        text: 43:24 Quare fáciem tuam avértis, * oblivísceris inópiæ nostræ, et tribulatiónis nostræ?
      - type: citation
        text: '43:25 Quóniam humiliáta est in púlvere ánima nostra: * conglutinátus est in terra venter noster.'
      - type: citation
        text: '43:26 Exsúrge, Dómine, ádiuva nos: * et rédime nos propter nomen tuum.'
      en2:
      - type: citation
        text: '43:2 O God, we have heard with our ears: * our fathers have declared to us.'
      - type: citation
        text: 43:2 The work you wrought in their days, * and in the days of old.
      - type: citation
        text: '43:3 Your hand destroyed the Gentiles and planted them: * you afflicted the peoples and cast them out.'
      - type: citation
        text: '43:4 For they did not possess the land by their own sword, * and their own arm did not save them:'
      - type: citation
        text: '43:4 But your right hand, and your arm, and the light of your face: * because you were well pleased with them.'
      - type: citation
        text: '43:5 You yourself are my King and my God: * who command the saving of Jacob.'
      - type: citation
        text: '43:6 Through you we will scatter our enemies with the horn: * and in your name we will despise those who rise up against us.'
      - type: citation
        text: '43:7 For I will not trust in my bow: * and my sword will not save me.'
      - type: citation
        text: '43:8 For you have saved us from those who afflict us: * and you have put to shame those who hate us.'
      - type: citation
        text: '43:9 In God we will be praised all the day long: * and in your name we will give praise for ever.'
      - type: citation
        text: '43:10 But now you have cast off and put us to shame: * and you, O God, will not go out with our armies.'
      - type: citation
        text: '43:11 You have turned us back behind our enemies: * and those who hated us plundered us for themselves.'
      - type: citation
        text: '43:12 You have given us up like sheep for food: * and you have scattered us among the nations.'
      - type: citation
        text: '43:13 You have sold your people for nothing: * and there was no great number in exchange for them.'
      - type: citation
        text: 43:14 You have made us a reproach to our neighbors, * a scorn and derision to those who are round about us.
      - type: citation
        text: '43:15 You have made us a byword among the nations: * a shaking of the head among the peoples.'
      - type: citation
        text: 43:16 All the day long my shame is before me, * and the confusion of my face has covered me.
      - type: citation
        text: '43:17 At the voice of him who reproaches and slanders: * at the face of the enemy and the persecutor.'
      - type: citation
        text: '43:18 All these things have come upon us, yet we have not forgotten you: * and we have not dealt unjustly in your covenant.'
      - type: citation
        text: '43:19 Our heart has not turned back: * and you have not diverted our steps from your way:'
      - type: citation
        text: 43:20 For you have humbled us in a place of affliction, * and the shadow of death has covered us.
      - type: citation
        text: '43:21 If we have forgotten the name of our God, * and if we have spread out our hands to a strange god:'
      - type: citation
        text: 43:22 Shall not God search these things out? * for he knows the secrets of the heart.
      - type: citation
        text: '43:22 For because of you, we are killed all day long: * we are considered as sheep for the slaughter.'
      - type: citation
        text: 43:23 Rise up. Why do you fall asleep, O Lord? * Rise up, and do not reject us in the end.
      - type: citation
        text: 43:24 Why do you turn your face away, * and why do you forget our needfulness and our tribulation?
      - type: citation
        text: '43:25 For our soul has been humbled into the dust: * our belly has been bound to the earth.'
      - type: citation
        text: '43:26 Rise up, O Lord, help us: * and redeem us for the sake of your name.'
  psalm.44-2a-eruct-vit-cor-meum-verbum-bonum-dico-ego-p-47a757bebe:
    role: psalm
    content:
      en:
      - type: citation
        text: 44:2a My heart hath uttered a good word; * I speak my works to the King.
      - type: citation
        text: 44:2b My tongue is the pen of a scrivener * that writeth swiftly.
      - type: citation
        text: '44:3 Thou art beautiful above the sons of men: † grace is poured abroad in thy lips; * therefore hath God blessed thee for ever.'
      - type: citation
        text: 44:4 Gird thy sword upon thy thigh, * O thou most mighty.
      - type: citation
        text: 44:5a With thy comeliness and thy beauty * set out, proceed prosperously, and reign.
      - type: citation
        text: '44:5b Because of truth and meekness and justice: * and thy right hand shall conduct thee wonderfully.'
      - type: citation
        text: '44:6 Thy arrows are sharp: under thee shall people fall, * into the hearts of the king’s enemies.'
      - type: citation
        text: '44:7 Thy throne, O God, is for ever and ever: * the sceptre of thy kingdom is a sceptre of uprightness.'
      - type: citation
        text: '44:8 Thou hast loved justice, and hated iniquity: * therefore God, thy God, hath anointed thee with the oil of gladness above thy fellows.'
      - type: citation
        text: '44:9 Myrrh and stacte and cassia perfume thy garments, from the ivory houses: * out of which (10a) the daughters of kings have delighted thee in thy glory.'
      - type: citation
        text: 44:10b The queen stood on thy right hand, in gilded clothing; * surrounded with variety.
      - type: citation
        text: '44:11 Hearken, O daughter, and see, and incline thy ear: * and forget thy people and thy father’s house.'
      - type: citation
        text: 44:12 And the king shall greatly desire thy beauty; * for he is the Lord thy God, and him they shall adore.
      - type: citation
        text: 44:13 And the daughters of Tyre with gifts, * yea, all the rich among the people, shall entreat thy countenance.
      - type: citation
        text: 44:14 All the glory of the king’s daughter is within, * in golden borders, (15a) clothed round about with varieties.
      - type: citation
        text: '44:15b After her shall virgins be brought to the king: * her neighbours shall be brought to thee.'
      - type: citation
        text: '44:16 They shall be brought with gladness and rejoicing: * they shall be brought into the temple of the king.'
      - type: citation
        text: '44:17 Instead of thy fathers, sons are born to thee: * thou shalt make them princes over all the earth.'
      - type: citation
        text: 44:18a They shall remember thy name * throughout all generations.
      - type: citation
        text: 44:18b Therefore shall people praise thee for ever; yea, * for ever and ever.
      la:
      - type: citation
        text: '44:2a Eructávit cor meum verbum bonum: * dico ego ópera mea Regi.'
      - type: citation
        text: '44:2b Lingua mea cálamus scribæ: * velóciter scribéntis.'
      - type: citation
        text: '44:3 Speciósus forma præ fíliis hóminum, † diffúsa est grátia in lábiis tuis: * proptérea benedíxit te Deus in ætérnum.'
      - type: citation
        text: 44:4 Accíngere gládio tuo super femur tuum, * potentíssime.
      - type: citation
        text: '44:5a Spécie tua et pulchritúdine tua: * inténde, próspere procéde, et regna.'
      - type: citation
        text: '44:5b Propter veritátem, et mansuetúdinem, et iustítiam: * et dedúcet te mirabíliter déxtera tua.'
      - type: citation
        text: '44:6 Sagíttæ tuæ acútæ, pópuli sub te cadent: * in corda inimicórum Regis.'
      - type: citation
        text: '44:7 Sedes tua, Deus, in sǽculum sǽculi: * virga directiónis virga regni tui.'
      - type: citation
        text: '44:8 Dilexísti iustítiam, et odísti iniquitátem: * proptérea unxit te Deus, Deus tuus, óleo lætítiæ præ consórtibus tuis.'
      - type: citation
        text: '44:9 Myrrha, et gutta, et cásia a vestiméntis tuis, a dómibus ebúrneis: * ex quibus delectavérunt te (10a) fíliæ regum in honóre tuo.'
      - type: citation
        text: '44:10b Ástitit regína a dextris tuis in vestítu deauráto: * circúmdata varietáte.'
      - type: citation
        text: '44:11 Audi fília, et vide, et inclína aurem tuam: * et oblivíscere pópulum tuum et domum patris tui.'
      - type: citation
        text: '44:12 Et concupíscet Rex decórem tuum: * quóniam ipse est Dóminus Deus tuus, et adorábunt eum.'
      - type: citation
        text: '44:13 Et fíliæ Tyri in munéribus * vultum tuum deprecabúntur: omnes dívites plebis.'
      - type: citation
        text: 44:14 Omnis glória eius fíliæ Regis ab intus, * in fímbriis áureis (15a) circumamícta varietátibus.
      - type: citation
        text: '44:15b Adducéntur Regi vírgines post eam: * próximæ eius afferéntur tibi.'
      - type: citation
        text: '44:16 Afferéntur in lætítia et exsultatióne: * adducéntur in templum Regis.'
      - type: citation
        text: '44:17 Pro pátribus tuis nati sunt tibi fílii: * constítues eos príncipes super omnem terram.'
      - type: citation
        text: '44:18a Mémores erunt nóminis tui: * in omni generatióne et generatiónem.'
      - type: citation
        text: '44:18b Proptérea pópuli confitebúntur tibi in ætérnum: * et in sǽculum sǽculi.'
      en2:
      - type: citation
        text: '44:2a My heart has uttered a good word: * I speak of my works to the King.'
      - type: citation
        text: '44:2b My tongue is like the pen of a scribe: * who writes quickly.'
      - type: citation
        text: '44:3 You are a brilliant form before the sons of men, † grace has been poured freely into your lips: * because of this, God has blessed you in eternity.'
      - type: citation
        text: 44:4 Fasten your sword to your thigh, * O most powerful one.
      - type: citation
        text: '44:5a With your splendor and your excellence: * proceed prosperously, and reign.'
      - type: citation
        text: '44:5b For the sake of truth and meekness and justice: * and so will your right hand lead you wondrously.'
      - type: citation
        text: '44:6 Your arrows are sharp; the people will fall under you: * with the hearts of the enemies of the King.'
      - type: citation
        text: '44:7 Your throne, O God, is forever and ever: * the scepter of your kingdom is a scepter of true aim.'
      - type: citation
        text: '44:8 You have loved justice and hated iniquity: * because of this, God, your God, has anointed you with the oil of gladness before your co-heirs.'
      - type: citation
        text: '44:9 Myrrh and balsam and cinnamon perfume your garments, from the houses of ivory: * from these, they have delighted you, (10a) the daughters of kings in your honor.'
      - type: citation
        text: '44:10b The queen assisted at your right hand in clothing of gold: * encircled with diversity.'
      - type: citation
        text: '44:11 Listen, daughter, and see, and incline your ear: * and forget your people and your father''s house.'
      - type: citation
        text: '44:12 And the king will desire your beauty: * for he is the Lord your God, and they will adore him.'
      - type: citation
        text: '44:13 And the daughters of Tyre with gifts * will entreat your countenance: all the rich men of the people.'
      - type: citation
        text: 44:14 All the glory of the daughter of the King is inside, * in golden fringes, (15a) clothed all around with diversities.
      - type: citation
        text: '44:15b After her, virgins will be led to the King: * her neighbors will be brought to you.'
      - type: citation
        text: '44:16 They will be brought with gladness and exultation: * they will be led into the temple of the King.'
      - type: citation
        text: '44:17 For your fathers, sons have been born to you: * you will establish them as leaders over all the earth.'
      - type: citation
        text: '44:18a They will remember your name always: * for generation after generation.'
      - type: citation
        text: '44:18b Because of this, peoples will confess to you in eternity: * and forever and ever.'
  psalm.45-2-deus-noster-ref-gium-et-virtus-adi-tor-in-t-b52259d5c9:
    role: psalm
    content:
      en:
      - type: citation
        text: '45:2 Our God is our refuge and strength: * a helper in troubles, which have found us exceedingly.'
      - type: citation
        text: 45:3 Therefore we will not fear, when the earth shall be troubled; * and the mountains shall be removed into the heart of the sea.
      - type: citation
        text: '45:4 Their waters roared and were troubled: * the mountains were troubled with his strength.'
      - type: citation
        text: '45:5 The stream of the river maketh the city of God joyful: * the most High hath sanctified his own tabernacle.'
      - type: citation
        text: '45:6 God is in the midst thereof, it shall not be moved: * God will help it in the morning early.'
      - type: citation
        text: '45:7 Nations were troubled, and kingdoms were bowed down: * he uttered his voice, the earth trembled.'
      - type: citation
        text: '45:8 The Lord of armies is with us: * the God of Jacob is our protector.'
      - type: citation
        text: '45:9 Come and behold ye the works of the Lord: what wonders he hath done upon earth, * making wars to cease even to the end of the earth.'
      - type: citation
        text: '45:10 He shall destroy the bow, and break the weapons: * and the shield he shall burn in the fire.'
      - type: citation
        text: 45:11 Be still and see that I am God; * I will be exalted among the nations, and I will be exalted in the earth.
      - type: citation
        text: '45:12 The Lord of armies is with us: * the God of Jacob is our protector.'
      la:
      - type: citation
        text: '45:2 Deus noster refúgium, et virtus: * adiútor in tribulatiónibus, quæ invenérunt nos nimis.'
      - type: citation
        text: '45:3 Proptérea non timébimus dum turbábitur terra: * et transferéntur montes in cor maris.'
      - type: citation
        text: '45:4 Sonuérunt, et turbátæ sunt aquæ eórum: * conturbáti sunt montes in fortitúdine eius.'
      - type: citation
        text: '45:5 Flúminis ímpetus lætíficat civitátem Dei: * sanctificávit tabernáculum suum Altíssimus.'
      - type: citation
        text: '45:6 Deus in médio eius, non commovébitur: * adiuvábit eam Deus mane dilúculo.'
      - type: citation
        text: '45:7 Conturbátæ sunt gentes, et inclináta sunt regna: * dedit vocem suam, mota est terra.'
      - type: citation
        text: '45:8 Dóminus virtútum nobíscum: * suscéptor noster Deus Iacob.'
      - type: citation
        text: '45:9 Veníte, et vidéte ópera Dómini, quæ pósuit prodígia super terram: * áuferens bella usque ad finem terræ.'
      - type: citation
        text: '45:10 Arcum cónteret, et confrínget arma: * et scuta combúret igni.'
      - type: citation
        text: '45:11 Vacáte, et vidéte quóniam ego sum Deus: * exaltábor in géntibus, et exaltábor in terra.'
      - type: citation
        text: '45:12 Dóminus virtútum nobíscum: * suscéptor noster Deus Iacob.'
      en2:
      - type: citation
        text: '45:2 Our God is our refuge and strength: * a helper in the tribulations that have greatly overwhelmed us.'
      - type: citation
        text: '45:3 Because of this, we will not be afraid when the earth will be turbulent: * and the mountains will be transferred into the heart of the sea.'
      - type: citation
        text: '45:4 They thundered, and the waters were stirred up among them: * the mountains have been disturbed by his strength.'
      - type: citation
        text: '45:5 The frenzy of the river rejoices the city of God: * the Most High has sanctified his tabernacle.'
      - type: citation
        text: '45:6 God is in its midst; it will not be shaken: * God will assist it in the early morning.'
      - type: citation
        text: '45:7 The peoples have been disturbed, and the kingdoms have been bowed down: * he uttered his voice, the earth has been moved.'
      - type: citation
        text: '45:8 The Lord of hosts is with us: * the God of Jacob is our supporter.'
      - type: citation
        text: '45:9 Draw near and behold the works of the Lord, what portents he has set upon the earth: * carrying away wars even to the end of the earth.'
      - type: citation
        text: '45:10 He will crush the bow and break the weapons: * and he will burn the shield with fire.'
      - type: citation
        text: '45:11 Be still, and see that I am God: * I will be exalted among the peoples, and I will be exalted upon the earth.'
      - type: citation
        text: '45:12 The Lord of hosts is with us: * the God of Jacob is our supporter.'
  psalm.46-2-omnes-gentes-pl-udite-m-nibus-iubil-te-deo-be836bba5f:
    role: psalm
    content:
      en:
      - type: citation
        text: '46:2 O clap your hands, all ye nations: * shout unto God with the voice of joy,'
      - type: citation
        text: '46:3 For the Lord is high, terrible: * a great king over all the earth.'
      - type: citation
        text: 46:4 He hath subdued the people under us; * and the nations under our feet.
      - type: citation
        text: 46:5 He hath chosen for us his inheritance, * the beauty of Jacob which he hath loved.
      - type: citation
        text: 46:6 God is ascended with jubilee, * and the Lord with the sound of trumpet.
      - type: citation
        text: '46:7 Sing praises to our God, sing ye: * sing praises to our king, sing ye.'
      - type: citation
        text: '46:8 For God is the king of all the earth: * sing ye wisely.'
      - type: citation
        text: '46:9 God shall reign over the nations: * God sitteth on his holy throne.'
      - type: citation
        text: '46:10 The princes of the people are gathered together, with the God of Abraham: * for the strong gods of the earth are exceedingly exalted.'
      la:
      - type: citation
        text: '46:2 Omnes gentes, pláudite mánibus: * iubiláte Deo in voce exsultatiónis.'
      - type: citation
        text: '46:3 Quóniam Dóminus excélsus, terríbilis: * Rex magnus super omnem terram.'
      - type: citation
        text: '46:4 Subiécit pópulos nobis: * et gentes sub pédibus nostris.'
      - type: citation
        text: '46:5 Elégit nobis hereditátem suam: * spéciem Iacob, quam diléxit.'
      - type: citation
        text: '46:6 Ascéndit Deus in iúbilo: * et Dóminus in voce tubæ.'
      - type: citation
        text: '46:7 Psállite Deo nostro, psállite: * psállite Regi nostro, psállite.'
      - type: citation
        text: '46:8 Quóniam Rex omnis terræ Deus: * psállite sapiénter.'
      - type: citation
        text: '46:9 Regnábit Deus super gentes: * Deus sedet super sedem sanctam suam.'
      - type: citation
        text: '46:10 Príncipes populórum congregáti sunt cum Deo Ábraham: * quóniam dii fortes terræ veheménter eleváti sunt.'
      en2:
      - type: citation
        text: '46:2 All nations, clap your hands: * shout joyfully to God with a voice of exultation.'
      - type: citation
        text: '46:3 For the Lord is exalted and terrible: * a great King over all the earth.'
      - type: citation
        text: '46:4 He has subjected the peoples to us: * and subdued the nations under our feet.'
      - type: citation
        text: '46:5 He has chosen us for his inheritance: * the splendor of Jacob, whom he has loved.'
      - type: citation
        text: '46:6 God ascends with jubilation: * and the Lord with the voice of the trumpet.'
      - type: citation
        text: '46:7 Sing psalms to our God, sing psalms: * sing psalms to our King, sing psalms.'
      - type: citation
        text: '46:8 For God is the King of all the earth: * sing psalms wisely.'
      - type: citation
        text: '46:9 God will reign over the peoples: * God sits upon his holy throne.'
      - type: citation
        text: '46:10 The leaders of the peoples have been gathered together with the God of Abraham: * for the strong gods of the earth have been exceedingly exalted.'
  psalm.47-2-magnus-d-minus-et-laud-bilis-nimis-in-civit-3b7d9c5734:
    role: psalm
    content:
      en:
      - type: citation
        text: 47:2 Great is the Lord, and exceedingly to be praised * in the city of our God, in his holy mountain.
      - type: citation
        text: 47:3 With the joy of the whole earth is mount Sion founded, * on the sides of the north, the city of the great king.
      - type: citation
        text: 47:4 In her houses shall God be known, * when he shall protect her.
      - type: citation
        text: '47:5 For behold the kings of the earth assembled themselves: * they gathered together.'
      - type: citation
        text: '47:6 So they saw, and they wondered, they were troubled, they were moved: * trembling took hold of them.'
      - type: citation
        text: 47:7 There were pains as of a woman in labour; * with a vehement wind thou shalt break in pieces the ships of Tharsis.
      - type: citation
        text: '47:9 As we have heard, so have we seen, in the city of the Lord of hosts, in the city of our God: * God hath founded it for ever.'
      - type: citation
        text: 47:10 We have received thy mercy, O God, * in the midst of thy temple.
      - type: citation
        text: '47:11 According to thy name, O God, so also is thy praise unto the ends of the earth: * thy right hand is full of justice.'
      - type: citation
        text: 47:12 Let mount Sion rejoice, and the daughters of Juda be glad; * because of thy judgments, O Lord.
      - type: citation
        text: '47:13 Surround Sion, and encompass her: * tell ye in her towers.'
      - type: citation
        text: 47:14 Set your hearts on her strength; and distribute her houses, * that ye may relate it in another generation.
      - type: citation
        text: '47:15 For this is God, our God unto eternity, and for ever and ever: * he shall rule us for evermore.'
      la:
      - type: citation
        text: 47:2 Magnus Dóminus, et laudábilis nimis * in civitáte Dei nostri, in monte sancto eius.
      - type: citation
        text: 47:3 Fundátur exsultatióne univérsæ terræ mons Sion, * látera Aquilónis, cívitas Regis magni.
      - type: citation
        text: '47:4 Deus in dómibus eius cognoscétur: * cum suscípiet eam.'
      - type: citation
        text: '47:5 Quóniam ecce reges terræ congregáti sunt: * convenérunt in unum.'
      - type: citation
        text: '47:6 Ipsi vidéntes sic admiráti sunt, conturbáti sunt, commóti sunt: * tremor apprehéndit eos.'
      - type: citation
        text: '47:7 Ibi dolóres ut parturiéntis: * in spíritu veheménti cónteres naves Tharsis.'
      - type: citation
        text: '47:9 Sicut audívimus, sic vídimus in civitáte Dómini virtútum, in civitáte Dei nostri: * Deus fundávit eam in ætérnum.'
      - type: citation
        text: 47:10 Suscépimus, Deus, misericórdiam tuam, * in médio templi tui.
      - type: citation
        text: '47:11 Secúndum nomen tuum, Deus, sic et laus tua in fines terræ: * iustítia plena est déxtera tua.'
      - type: citation
        text: '47:12 Lætétur mons Sion, et exsúltent fíliæ Iudæ: * propter iudícia tua, Dómine.'
      - type: citation
        text: '47:13 Circúmdate Sion, et complectímini eam: * narráte in túrribus eius.'
      - type: citation
        text: '47:14 Pónite corda vestra in virtúte eius: * et distribúite domos eius, ut enarrétis in progénie áltera.'
      - type: citation
        text: '47:15 Quóniam hic est Deus, Deus noster in ætérnum et in sǽculum sǽculi: * ipse reget nos in sǽcula.'
      en2:
      - type: citation
        text: 47:2 The Lord is great and exceedingly praiseworthy * in the city of our God, on his holy mountain.
      - type: citation
        text: 47:3 Mount Zion is being founded with the exultation of the whole earth, * on the north side, the city of the great King.
      - type: citation
        text: '47:4 In her houses, God will be known: * since he will support her.'
      - type: citation
        text: '47:5 For behold, the kings of the earth have been gathered together: * they have convened as one.'
      - type: citation
        text: '47:6 Such did they see, and they were astonished; they were disturbed, they were moved: * trembling took hold of them.'
      - type: citation
        text: '47:7 In that place, their pains were that of a woman in labor: * with a vehement spirit, you will crush the ships of Tarshish.'
      - type: citation
        text: '47:9 As we have heard, so we have seen, in the city of the Lord of hosts, in the city of our God: * God has founded her in eternity.'
      - type: citation
        text: 47:10 We have received your mercy, O God, * in the midst of your temple.
      - type: citation
        text: '47:11 According to your name, O God, so does your praise reach to the ends of the earth: * your right hand is full of justice.'
      - type: citation
        text: '47:12 Let mount Zion rejoice, and let the daughters of Judah exult: * because of your judgments, O Lord.'
      - type: citation
        text: '47:13 Encircle Zion and embrace her: * discourse in her towers.'
      - type: citation
        text: '47:14 Set your hearts on her virtue: * and distribute her houses, so that you may discourse of it in another generation.'
      - type: citation
        text: '47:15 For this is God, our God, in eternity and forever and ever: * he will rule us forever.'
  psalm.48-2-aud-te-h-c-omnes-gentes-uribus-perc-pite-om-3c85712d6b:
    role: psalm
    content:
      en:
      - type: citation
        text: '48:2 Hear these things, all ye nations: * give ear, all ye inhabitants of the world.'
      - type: citation
        text: '48:3 All you that are earthborn, and you sons of men: * both rich and poor together.'
      - type: citation
        text: '48:4 My mouth shall speak wisdom: * and the meditation of my heart understanding'
      - type: citation
        text: 48:5 I will incline my ear to a parable; * I will open my proposition on the psaltery.
      - type: citation
        text: 48:6 Why shall I fear in the evil day? * the iniquity of my heel shall encompass me.
      - type: citation
        text: 48:7 They that trust in their own strength, * and glory in the multitude of their riches,
      - type: citation
        text: '48:8 No brother can redeem, nor shall man redeem: * he shall not give to God his ransom,'
      - type: citation
        text: '48:9 Nor the price of the redemption of his soul: * and shall labour for ever, and shall still live unto the end.'
      - type: citation
        text: '48:11 He shall not see destruction, when he shall see the wise dying: * the senseless and the fool shall perish together:'
      - type: citation
        text: '48:11 And they shall leave their riches to strangers: * and their sepulchres shall be their houses for ever.'
      - type: citation
        text: '48:12 Their dwelling places to all generations: * they have called their lands by their names.'
      - type: citation
        text: 48:13 And man when he was in honour did not understand; * he is compared to senseless beasts, and is become like to them.
      - type: citation
        text: '48:14 This way of theirs is a stumbling block to them: * and afterwards they shall delight in their mouth.'
      - type: citation
        text: '48:15 They are laid in hell like sheep: * death shall feed upon them.'
      - type: citation
        text: 48:15 And the just shall have dominion over them in the morning; * and their help shall decay in hell from their glory.
      - type: citation
        text: 48:16 But God will redeem my soul from the hand of hell, * when he shall receive me.
      - type: citation
        text: 48:17 Be not thou afraid, when a man shall be made rich, * and when the glory of his house shall be increased.
      - type: citation
        text: 48:18 For when he shall die he shall take nothing away; * nor shall his glory descend with him.
      - type: citation
        text: '48:19 For in his lifetime his soul will be blessed: * and he will praise thee when thou shalt do well to him.'
      - type: citation
        text: '48:20 He shall go in to the generations of his fathers: * and he shall never see light.'
      - type: citation
        text: '48:21 Man when he was in honour did not understand: * he hath been compared to senseless beasts, and made like to them.'
      la:
      - type: citation
        text: '48:2 Audíte hæc, omnes gentes: * áuribus percípite omnes, qui habitátis orbem:'
      - type: citation
        text: '48:3 Quique terrígenæ, et fílii hóminum: * simul in unum dives et pauper.'
      - type: citation
        text: '48:4 Os meum loquétur sapiéntiam: * et meditátio cordis mei prudéntiam.'
      - type: citation
        text: '48:5 Inclinábo in parábolam aurem meam: * apériam in psaltério propositiónem meam.'
      - type: citation
        text: '48:6 Cur timébo in die mala? * iníquitas calcánei mei circúmdabit me:'
      - type: citation
        text: '48:7 Qui confídunt in virtúte sua: * et in multitúdine divitiárum suárum gloriántur.'
      - type: citation
        text: '48:8 Frater non rédimit, rédimet homo: * non dabit Deo placatiónem suam.'
      - type: citation
        text: '48:9 Et prétium redemptiónis ánimæ suæ: * et laborábit in ætérnum, et vivet adhuc in finem.'
      - type: citation
        text: '48:11 Non vidébit intéritum, cum víderit sapiéntes moriéntes: * simul insípiens, et stultus períbunt.'
      - type: citation
        text: '48:11 Et relínquent aliénis divítias suas: * et sepúlcra eórum domus illórum in ætérnum.'
      - type: citation
        text: '48:12 Tabernácula eórum in progénie et progénie: * vocavérunt nómina sua in terris suis.'
      - type: citation
        text: '48:13 Et homo, cum in honóre esset, non intelléxit: * comparátus est iuméntis insipiéntibus, et símilis factus est illis.'
      - type: citation
        text: '48:14 Hæc via illórum scándalum ipsis: * et póstea in ore suo complacébunt.'
      - type: citation
        text: '48:15 Sicut oves in inférno pósiti sunt: * mors depáscet eos.'
      - type: citation
        text: '48:15 Et dominabúntur eórum iusti in matutíno: * et auxílium eórum veteráscet in inférno a glória eórum.'
      - type: citation
        text: '48:16 Verúmtamen Deus rédimet ánimam meam de manu ínferi: * cum accéperit me.'
      - type: citation
        text: '48:17 Ne timúeris, cum dives factus fúerit homo: * et cum multiplicáta fúerit glória domus eius.'
      - type: citation
        text: '48:18 Quóniam cum interíerit, non sumet ómnia: * neque descéndet cum eo glória eius.'
      - type: citation
        text: '48:19 Quia ánima eius in vita ipsíus benedicétur: * confitébitur tibi cum beneféceris ei.'
      - type: citation
        text: '48:20 Introíbit usque in progénies patrum suórum: * et usque in ætérnum non vidébit lumen.'
      - type: citation
        text: '48:21 Homo, cum in honóre esset, non intelléxit: * comparátus est iuméntis insipiéntibus, et símilis factus est illis.'
      en2:
      - type: citation
        text: '48:2 Hear these things, all nations: * pay attention, all you who inhabit the world:'
      - type: citation
        text: '48:3 whoever is earth-born, and you sons of men: * together as one, the rich and the poor.'
      - type: citation
        text: '48:4 My mouth will speak wisdom: * and the meditation of my heart will speak prudence.'
      - type: citation
        text: '48:5 I will incline my ear to a parable: * I will open my case with the psaltery.'
      - type: citation
        text: '48:6 Why should I fear in the evil day? * the iniquity at my heel will surround me:'
      - type: citation
        text: '48:7 Those who trust in their own strength: * and who glory in the multitude of their riches.'
      - type: citation
        text: '48:8 No brother redeems, nor will man buy back: * he will not give to God his appeasement.'
      - type: citation
        text: '48:9 Nor the price for the redemption of his soul: * and he will labor continuously, and still live until the end.'
      - type: citation
        text: '48:11 He will not see death, when he sees the wise dying: * the foolish and the senseless will perish together.'
      - type: citation
        text: '48:11 And they will leave their riches to strangers: * and their sepulchers will be their houses forever.'
      - type: citation
        text: '48:12 Their tabernacles from generation to generation: * they have called their names in their own lands.'
      - type: citation
        text: '48:13 And man, when he was held in honor, did not understand: * he has been compared to the senseless beasts, and he has become like them.'
      - type: citation
        text: '48:14 This way of theirs is a scandal to them: * and afterwards, they will delight in their mouth.'
      - type: citation
        text: '48:15 They have been placed in Hell like sheep: * death will feed on them.'
      - type: citation
        text: '48:15 And the just will have dominion over them in the morning: * and their help will grow old in Hell for their glory.'
      - type: citation
        text: '48:16 Even so, truly God will redeem my soul from the hand of Hell: * when he will receive me.'
      - type: citation
        text: '48:17 Do not be afraid, when a man will have been made rich: * and when the glory of his house will have been multiplied.'
      - type: citation
        text: '48:18 For when he dies, he will take nothing away: * and his glory will not descend with him.'
      - type: citation
        text: '48:19 For his soul will be blessed in his lifetime: * and he will admit to you when you do good to him.'
      - type: citation
        text: '48:20 He will even enter with the progeny of his fathers: * and even in eternity, he will not see the light.'
      - type: citation
        text: '48:21 Man, when he was in honor, did not understand: * he has been compared to the senseless beasts, and he has become like them.'
  psalm.49-1-deus-de-rum-d-minus-loc-tus-est-et-voc-vit-2d855ca5c6:
    role: psalm
    content:
      en:
      - type: citation
        text: '49:1 The God of gods, the Lord hath spoken: * and he hath called the earth.'
      - type: citation
        text: '49:1 From the rising of the sun, to the going down thereof: * out of Sion the loveliness of his beauty.'
      - type: citation
        text: '49:3 God shall come manifestly: our God shall come, * and shall not keep silence.'
      - type: citation
        text: '49:3 A fire shall burn before him: * and a mighty tempest shall be round about'
      - type: citation
        text: 49:4 He shall call heaven from above, * and the earth, to judge his people.
      - type: citation
        text: '49:5 Gather ye together his saints to him: * who set his covenant before sacrifices.'
      - type: citation
        text: '49:6 And the heavens shall declare his justice: * for God is judge.'
      - type: citation
        text: '49:7 Hear, O my people, and I will speak: O Israel, and I will testify to thee: * I am God, thy God.'
      - type: citation
        text: '49:8 I will not reprove thee for thy sacrifices: * and thy burnt offerings are always in my sight.'
      - type: citation
        text: '49:9 I will not take calves out of thy house: * nor he goats out of thy flocks.'
      - type: citation
        text: '49:10 For all the beasts of the woods are mine: * the cattle on the hills, and the oxen.'
      - type: citation
        text: '49:11 I know all the fowls of the air: * and with me is the beauty of the field.'
      - type: citation
        text: '49:12 If I should be hungry, I would not tell thee: * for the world is mine, and the fulness thereof.'
      - type: citation
        text: 49:13 Shall I eat the flesh of bullocks? * or shall I drink the blood of goats?
      - type: citation
        text: '49:14 Offer to God the sacrifice of praise: * and pay thy vows to the most High.'
      - type: citation
        text: '49:15 And call upon me in the day of trouble: * I will deliver thee, and thou shalt glorify me.'
      - type: citation
        text: '49:16 But to the sinner God hath said: * Why dost thou declare my justices, and take my covenant in thy mouth?'
      - type: citation
        text: '49:17 Seeing thou hast hated discipline: * and hast cast my words behind thee.'
      - type: citation
        text: '49:18 If thou didst see a thief thou didst run with him: * and with adulterers thou hast been a partaker.'
      - type: citation
        text: 49:19 Thy mouth hath abounded with evil, * and thy tongue framed deceits.
      - type: citation
        text: '49:20 Sitting thou didst speak against thy brother, and didst lay a scandal against thy mother’s son: * these things hast thou done, and I was silent.'
      - type: citation
        text: '49:21 Thou thoughtest unjustly that I should be like to thee: * but I will reprove thee, and set before thy face.'
      - type: citation
        text: 49:22 Understand these things, you that forget God; * lest he snatch you away, and there be none to deliver you.
      - type: citation
        text: '49:23 The sacrifice of praise shall glorify me: * and there is the way by which I will shew him the salvation of God.'
      la:
      - type: citation
        text: '49:1 Deus deórum, Dóminus locútus est: * et vocávit terram,'
      - type: citation
        text: '49:1 A solis ortu usque ad occásum: * ex Sion spécies decóris eius.'
      - type: citation
        text: '49:3 Deus maniféste véniet: * Deus noster et non silébit.'
      - type: citation
        text: '49:3 Ignis in conspéctu eius exardéscet: * et in circúitu eius tempéstas válida.'
      - type: citation
        text: '49:4 Advocábit cælum desúrsum: * et terram discérnere pópulum suum.'
      - type: citation
        text: '49:5 Congregáte illi sanctos eius: * qui órdinant testaméntum eius super sacrifícia.'
      - type: citation
        text: '49:6 Et annuntiábunt cæli iustítiam eius: * quóniam Deus iudex est.'
      - type: citation
        text: '49:7 Audi, pópulus meus, et loquar: Israël, et testificábor tibi: * Deus, Deus tuus ego sum.'
      - type: citation
        text: '49:8 Non in sacrifíciis tuis árguam te: * holocáusta autem tua in conspéctu meo sunt semper.'
      - type: citation
        text: '49:9 Non accípiam de domo tua vítulos: * neque de grégibus tuis hircos.'
      - type: citation
        text: '49:10 Quóniam meæ sunt omnes feræ silvárum: * iuménta in móntibus et boves.'
      - type: citation
        text: '49:11 Cognóvi ómnia volatília cæli: * et pulchritúdo agri mecum est.'
      - type: citation
        text: '49:12 Si esuríero, non dicam tibi: * meus est enim orbis terræ, et plenitúdo eius.'
      - type: citation
        text: 49:13 Numquid manducábo carnes taurórum? * aut sánguinem hircórum potábo?
      - type: citation
        text: '49:14 Ímmola Deo sacrifícium laudis: * et redde Altíssimo vota tua.'
      - type: citation
        text: '49:15 Et ínvoca me in die tribulatiónis: * éruam te, et honorificábis me.'
      - type: citation
        text: '49:16 Peccatóri autem dixit Deus: * Quare tu enárras iustítias meas, et assúmis testaméntum meum per os tuum?'
      - type: citation
        text: '49:17 Tu vero odísti disciplínam: * et proiecísti sermónes meos retrórsum:'
      - type: citation
        text: '49:18 Si vidébas furem, currébas cum eo: * et cum adúlteris portiónem tuam ponébas.'
      - type: citation
        text: '49:19 Os tuum abundávit malítia: * et lingua tua concinnábat dolos.'
      - type: citation
        text: '49:20 Sedens advérsus fratrem tuum loquebáris, et advérsus fílium matris tuæ ponébas scándalum: * hæc fecísti, et tácui.'
      - type: citation
        text: '49:21 Existimásti, iníque, quod ero tui símilis: * árguam te, et státuam contra fáciem tuam.'
      - type: citation
        text: '49:22 Intellégite hæc, qui obliviscímini Deum: * nequándo rápiat, et non sit qui erípiat.'
      - type: citation
        text: '49:23 Sacrifícium laudis honorificábit me: * et illic iter, quo osténdam illi salutáre Dei.'
      en2:
      - type: citation
        text: '49:1 The God of gods, the Lord has spoken: * and he has called the earth,'
      - type: citation
        text: '49:1 From the rising of the sun to its setting: * the beauty of his glory shines forth from Zion.'
      - type: citation
        text: '49:3 God will come manifestly: * our God and he will not be silent.'
      - type: citation
        text: '49:3 Fire will blaze before him: * and around him a mighty tempest.'
      - type: citation
        text: '49:4 He will call to heaven above: * and to the earth, to judge his people.'
      - type: citation
        text: '49:5 Gather to him his holy ones: * those who ratify his covenant over sacrifices.'
      - type: citation
        text: '49:6 And the heavens will proclaim his justice: * for God is judge.'
      - type: citation
        text: '49:7 Hear, O my people, and I will speak: O Israel, and I will testify against you: * I am God, your God.'
      - type: citation
        text: '49:8 I will not reprove you for your sacrifices: * your burnt offerings are always before me.'
      - type: citation
        text: '49:9 I will not accept calves from your house: * nor he-goats from your flocks.'
      - type: citation
        text: '49:10 For all the wild beasts of the forest are mine: * the cattle on the mountains and the oxen.'
      - type: citation
        text: '49:11 I know all the birds of the air: * and the beauty of the field is with me.'
      - type: citation
        text: '49:12 If I were hungry, I would not tell you: * for the world is mine, and the fullness thereof.'
      - type: citation
        text: 49:13 Shall I eat the flesh of bulls? * Or drink the blood of goats?
      - type: citation
        text: '49:14 Offer to God a sacrifice of praise: * and pay your vows to the Most High.'
      - type: citation
        text: '49:15 And call upon me in the day of tribulation: * I will deliver you, and you shall glorify me.'
      - type: citation
        text: '49:16 But to the sinner God has said: * Why do you recite my commandments, and take my covenant upon your lips?'
      - type: citation
        text: '49:17 Yet you have hated discipline: * and have cast my words behind you.'
      - type: citation
        text: '49:18 If you saw a thief, you ran with him: * and with adulterers you cast your lot.'
      - type: citation
        text: '49:19 Your mouth has abounded in malice: * and your tongue fashioned deceits.'
      - type: citation
        text: '49:20 Sitting, you spoke against your brother, and against the son of your mother you laid a stumbling block: * these things you did, and I was silent.'
      - type: citation
        text: '49:21 You thought, O wicked one, that I would be like you: * I will reprove you and set the charge before your face.'
      - type: citation
        text: '49:22 Understand these things, you who forget God: * lest he seize you, and there be none to deliver you.'
      - type: citation
        text: '49:23 A sacrifice of praise will honor me: * and there is the way by which I will show him the salvation of God.'
  psalm.5-2-verba-mea-uribus-p-rcipe-d-mine-int-llege-cl-0e8d1481e9:
    role: psalm
    content:
      en:
      - type: citation
        text: 5:2 Give ear, O Lord, to my words * understand my cry.
      - type: citation
        text: 5:3 Hearken to the voice of my prayer, * O my King and my God.
      - type: citation
        text: '5:4 For to thee will I pray: * O Lord, in the morning thou shalt hear my voice.'
      - type: citation
        text: '5:5 In the morning I will stand before thee, and will see: * because thou art not a God that willest iniquity.'
      - type: citation
        text: '5:6 Neither shall the wicked dwell near thee: * nor shall the unjust abide before thy eyes.'
      - type: citation
        text: '5:7a Thou hatest all the workers of iniquity: * thou wilt destroy all that speak a lie.'
      - type: citation
        text: 5:7b The bloody and the deceitful man the Lord will abhor. * (8a) But as for me in the multitude of thy mercy,
      - type: citation
        text: 5:8b I will come into thy house; * I will worship towards thy holy temple, in thy fear.
      - type: citation
        text: '5:9 Conduct me, O Lord, in thy justice: * because of my enemies, direct my way in thy sight.'
      - type: citation
        text: '5:10 For there is no truth in their mouth: * their heart is vain.'
      - type: citation
        text: '5:11a Their throat is an open sepulchre: † they dealt deceitfully with their tongues: * judge them, O God.'
      - type: citation
        text: '5:11b Let them fall from their devices: † according to the multitude of their wickednesses cast them out: * for they have provoked thee, O Lord.'
      - type: citation
        text: '5:12a But let all them be glad that hope in thee: * they shall rejoice for ever, and thou shalt dwell in them.'
      - type: citation
        text: '5:12b And all they that love thy name shall glory in thee: * (13a) For thou wilt bless the just.'
      - type: citation
        text: 5:13b O Lord, thou hast crowned us, * as with a shield of thy good will.
      la:
      - type: citation
        text: 5:2 Verba mea áuribus pércipe, Dómine, * intéllege clamórem meum.
      - type: citation
        text: 5:3 Inténde voci oratiónis meæ, * Rex meus et Deus meus.
      - type: citation
        text: '5:4 Quóniam ad te orábo: * Dómine, mane exáudies vocem meam.'
      - type: citation
        text: '5:5 Mane astábo tibi et vidébo: * quóniam non Deus volens iniquitátem tu es.'
      - type: citation
        text: '5:6 Neque habitábit iuxta te malígnus: * neque permanébunt iniústi ante óculos tuos.'
      - type: citation
        text: '5:7a Odísti omnes, qui operántur iniquitátem: * perdes omnes, qui loquúntur mendácium.'
      - type: citation
        text: '5:7b Virum sánguinum et dolósum abominábitur Dóminus: * (8a) ego autem in multitúdine misericórdiæ tuæ.'
      - type: citation
        text: '5:8b Introíbo in domum tuam: * adorábo ad templum sanctum tuum in timóre tuo.'
      - type: citation
        text: '5:9 Dómine, deduc me in iustítia tua: * propter inimícos meos dírige in conspéctu tuo viam meam.'
      - type: citation
        text: '5:10 Quóniam non est in ore eórum véritas: * cor eórum vanum est.'
      - type: citation
        text: 5:11a Sepúlcrum patens est guttur eórum, † linguis suis dolóse agébant, * iúdica illos, Deus.
      - type: citation
        text: 5:11b Décidant a cogitatiónibus suis, † secúndum multitúdinem impietátum eórum expélle eos, * quóniam irritavérunt te, Dómine.
      - type: citation
        text: '5:12a Et læténtur omnes, qui sperant in te, * in ætérnum exsultábunt: et habitábis in eis.'
      - type: citation
        text: 5:12b Et gloriabúntur in te omnes, qui díligunt nomen tuum, * (13a) quóniam tu benedíces iusto.
      - type: citation
        text: 5:13b Dómine, ut scuto bonæ voluntátis tuæ * coronásti nos.
      en2:
      - type: citation
        text: 5:2 Give ear to my words, O Lord, * attend to my cry.
      - type: citation
        text: 5:3 Hearken to the voice of my prayer, * my King and my God.
      - type: citation
        text: '5:4 For to you I will pray: * O Lord, in the morning you will hear my voice.'
      - type: citation
        text: '5:5 In the morning I will stand before you and watch: * for you are not a God who desires iniquity.'
      - type: citation
        text: '5:6 Neither will the wicked dwell beside you: * nor will the unjust endure before your eyes.'
      - type: citation
        text: '5:7a You have hated all who work iniquity: * you will destroy all who speak falsehood.'
      - type: citation
        text: '5:7b The Lord will abhor the man of blood and deceit: * (8a) but I, through the abundance of your mercy.'
      - type: citation
        text: '5:8b I will enter your house: * I will worship toward your holy temple in your fear.'
      - type: citation
        text: '5:9 O Lord, lead me in your justice: * because of my enemies, direct my way in your sight.'
      - type: citation
        text: '5:10 For there is no truth in their mouth: * their heart is vain.'
      - type: citation
        text: 5:11a Their throat is an open sepulchre, † they dealt treacherously with their tongues, * judge them, O God.
      - type: citation
        text: 5:11b Let them fall from their counsels, † according to the multitude of their impieties cast them out, * for they have provoked you, O Lord.
      - type: citation
        text: '5:12a And let all who hope in you rejoice, * they shall exult forever: and you will dwell in them.'
      - type: citation
        text: 5:12b And all who love your name shall glory in you, * (13a) for you will bless the just.
      - type: citation
        text: 5:13b O Lord, as with a shield of your good will * you have crowned us.
  psalm.50-3a-miser-re-mei-deus-sec-ndum-magnam-miseric-20e1e6f4b6:
    role: psalm
    content:
      en:
      - type: citation
        text: 50:3a Have mercy on me, O God, * according to thy great mercy.
      - type: citation
        text: 50:3b And according to the multitude of thy tender mercies * blot out my iniquity.
      - type: citation
        text: 50:4 Wash me yet more from my iniquity, * and cleanse me from my sin.
      - type: citation
        text: 50:5 For I know my iniquity, * and my sin is always before me.
      - type: citation
        text: '50:6 To thee only have I sinned, and have done evil before thee: * that thou mayst be justified in thy words, and mayst overcome when thou art judged.'
      - type: citation
        text: 50:7 For behold I was conceived in iniquities; * and in sins did my mother conceive me.
      - type: citation
        text: '50:8 For behold thou hast loved truth: * the uncertain and hidden things of thy wisdom thou hast made manifest to me.'
      - type: citation
        text: '50:9 Thou shalt sprinkle me with hyssop, and I shall be cleansed: * thou shalt wash me, and I shall be made whiter than snow.'
      - type: citation
        text: '50:10 To my hearing thou shalt give joy and gladness: * and the bones that have been humbled shall rejoice.'
      - type: citation
        text: 50:11 Turn away thy face from my sins, * and blot out all my iniquities.
      - type: citation
        text: '50:12 Create a clean heart in me, O God: * and renew a right spirit within my bowels.'
      - type: citation
        text: 50:13 Cast me not away from thy face; * and take not thy holy spirit from me.
      - type: citation
        text: 50:14 Restore unto me the joy of thy salvation, * and strengthen me with a perfect spirit.
      - type: citation
        text: '50:15 I will teach the unjust thy ways: * and the wicked shall be converted to thee.'
      - type: citation
        text: '50:16 Deliver me from blood, O God, thou God of my salvation: * and my tongue shall extol thy justice.'
      - type: citation
        text: '50:17 O Lord, thou wilt open my lips: * and my mouth shall declare thy praise.'
      - type: citation
        text: '50:18 For if thou hadst desired sacrifice, I would indeed have given it: * with burnt offerings thou wilt not be delighted.'
      - type: citation
        text: '50:19 A sacrifice to God is an afflicted spirit: * a contrite and humbled heart, O God, thou wilt not despise.'
      - type: citation
        text: 50:20 Deal favourably, O Lord, in thy good will with Sion; * that the walls of Jerusalem may be built up.
      - type: citation
        text: '50:21 Then shalt thou accept the sacrifice of justice, oblations and whole burnt offerings: * then shall they lay calves upon thy altar.'
      la:
      - type: citation
        text: 50:3a Miserére mei, Deus, * secúndum magnam misericórdiam tuam.
      - type: citation
        text: 50:3b Et secúndum multitúdinem miseratiónum tuárum, * dele iniquitátem meam.
      - type: citation
        text: '50:4 Ámplius lava me ab iniquitáte mea: * et a peccáto meo munda me.'
      - type: citation
        text: '50:5 Quóniam iniquitátem meam ego cognósco: * et peccátum meum contra me est semper.'
      - type: citation
        text: '50:6 Tibi soli peccávi, et malum coram te feci: * ut iustificéris in sermónibus tuis, et vincas cum iudicáris.'
      - type: citation
        text: '50:7 Ecce enim, in iniquitátibus concéptus sum: * et in peccátis concépit me mater mea.'
      - type: citation
        text: '50:8 Ecce enim, veritátem dilexísti: * incérta et occúlta sapiéntiæ tuæ manifestásti mihi.'
      - type: citation
        text: '50:9 Aspérges me hyssópo, et mundábor: * lavábis me, et super nivem dealbábor.'
      - type: citation
        text: '50:10 Audítui meo dabis gáudium et lætítiam: * et exsultábunt ossa humiliáta.'
      - type: citation
        text: '50:11 Avérte fáciem tuam a peccátis meis: * et omnes iniquitátes meas dele.'
      - type: citation
        text: '50:12 Cor mundum crea in me, Deus: * et spíritum rectum ínnova in viscéribus meis.'
      - type: citation
        text: '50:13 Ne proícias me a fácie tua: * et spíritum sanctum tuum ne áuferas a me.'
      - type: citation
        text: '50:14 Redde mihi lætítiam salutáris tui: * et spíritu principáli confírma me.'
      - type: citation
        text: '50:15 Docébo iníquos vias tuas: * et ímpii ad te converténtur.'
      - type: citation
        text: '50:16 Líbera me de sanguínibus, Deus, Deus salútis meæ: * et exsultábit lingua mea iustítiam tuam.'
      - type: citation
        text: '50:17 Dómine, lábia mea apéries: * et os meum annuntiábit laudem tuam.'
      - type: citation
        text: '50:18 Quóniam si voluísses sacrifícium, dedíssem útique: * holocáustis non delectáberis.'
      - type: citation
        text: '50:19 Sacrifícium Deo spíritus contribulátus: * cor contrítum, et humiliátum, Deus, non despícies.'
      - type: citation
        text: '50:20 Benígne fac, Dómine, in bona voluntáte tua Sion: * ut ædificéntur muri Ierúsalem.'
      - type: citation
        text: '50:21 Tunc acceptábis sacrifícium iustítiæ, oblatiónes, et holocáusta: * tunc impónent super altáre tuum vítulos.'
      en2:
      - type: citation
        text: 50:3a Have mercy on me, O God, * according to your great mercy.
      - type: citation
        text: 50:3b And according to the multitude of your tender mercies, * blot out my iniquity.
      - type: citation
        text: '50:4 Wash me more thoroughly from my iniquity: * and cleanse me from my sin.'
      - type: citation
        text: '50:5 For I acknowledge my iniquity: * and my sin is always before me.'
      - type: citation
        text: '50:6 Against you only have I sinned, and have done evil in your sight: * that you may be justified in your words, and prevail when you are judged.'
      - type: citation
        text: '50:7 For behold, I was conceived in iniquities: * and in sins did my mother conceive me.'
      - type: citation
        text: '50:8 For behold, you have loved truth: * the uncertain and hidden things of your wisdom you have made manifest to me.'
      - type: citation
        text: '50:9 You will sprinkle me with hyssop, and I shall be cleansed: * you will wash me, and I shall be made whiter than snow.'
      - type: citation
        text: '50:10 To my hearing you will give joy and gladness: * and the bones that have been humbled shall rejoice.'
      - type: citation
        text: '50:11 Turn away your face from my sins: * and blot out all my iniquities.'
      - type: citation
        text: '50:12 Create a clean heart in me, O God: * and renew a right spirit within my inmost parts.'
      - type: citation
        text: '50:13 Cast me not away from your face: * and take not your holy spirit from me.'
      - type: citation
        text: '50:14 Restore to me the joy of your salvation: * and strengthen me with a sovereign spirit.'
      - type: citation
        text: '50:15 I will teach the unjust your ways: * and the wicked shall be converted to you.'
      - type: citation
        text: '50:16 Deliver me from blood, O God, God of my salvation: * and my tongue shall extol your justice.'
      - type: citation
        text: '50:17 O Lord, you will open my lips: * and my mouth shall declare your praise.'
      - type: citation
        text: '50:18 For if you had desired sacrifice, I would indeed have given it: * with burnt offerings you will not be delighted.'
      - type: citation
        text: '50:19 A sacrifice to God is a troubled spirit: * a contrite and humbled heart, O God, you will not despise.'
      - type: citation
        text: '50:20 Deal favorably, O Lord, with your good will toward Sion: * that the walls of Jerusalem may be built up.'
      - type: citation
        text: '50:21 Then shall you accept a sacrifice of justice, oblations, and burnt offerings: * then shall they lay calves upon your altar.'
  psalm.51-3-quid-glori-ris-in-mal-tia-qui-potens-es-in-e584f46ebd:
    role: psalm
    content:
      en:
      - type: citation
        text: 51:3 Why dost thou glory in malice, * thou that art mighty in iniquity?
      - type: citation
        text: '51:4 All the day long thy tongue hath devised injustice: * as a sharp razor, thou hast wrought deceit.'
      - type: citation
        text: '51:5 Thou hast loved malice more than goodness: * and iniquity rather than to speak righteousness.'
      - type: citation
        text: 51:6 Thou hast loved all the words of ruin, * O deceitful tongue.
      - type: citation
        text: '51:7 Therefore will God destroy thee for ever: * he will pluck thee out, and remove thee from thy dwelling place: and thy root out of the land of the living.'
      - type: citation
        text: '51:8 The just shall see and fear, and shall laugh at him, and say: * Behold the man that made not God his helper:'
      - type: citation
        text: '51:9 But trusted in the abundance of his riches: * and prevailed in his vanity.'
      - type: citation
        text: 51:10 But I, as a fruitful olive tree in the house of God, * have hoped in the mercy of God for ever, yea for ever and ever.
      - type: citation
        text: '51:11 I will praise thee for ever, because thou hast done it: * and I will wait on thy name, for it is good in the sight of thy saints.'
      la:
      - type: citation
        text: 51:3 Quid gloriáris in malítia, * qui potens es in iniquitáte?
      - type: citation
        text: '51:4 Tota die iniustítiam cogitávit lingua tua: * sicut novácula acúta fecísti dolum.'
      - type: citation
        text: '51:5 Dilexísti malítiam super benignitátem: * iniquitátem magis quam loqui æquitátem.'
      - type: citation
        text: 51:6 Dilexísti ómnia verba præcipitatiónis, * lingua dolósa.
      - type: citation
        text: '51:7 Proptérea Deus déstruet te in finem, * evéllet te, et emigrábit te de tabernáculo tuo: et radícem tuam de terra vivéntium.'
      - type: citation
        text: '51:8 Vidébunt iusti, et timébunt, et super eum ridébunt, et dicent: * Ecce homo, qui non pósuit Deum adiutórem suum:'
      - type: citation
        text: '51:9 Sed sperávit in multitúdine divitiárum suárum: * et præváluit in vanitáte sua.'
      - type: citation
        text: '51:10 Ego autem, sicut olíva fructífera in domo Dei, * sperávi in misericórdia Dei in ætérnum: et in sǽculum sǽculi.'
      - type: citation
        text: '51:11 Confitébor tibi in sǽculum, quia fecísti: * et exspectábo nomen tuum, quóniam bonum est in conspéctu sanctórum tuórum.'
      en2:
      - type: citation
        text: 51:3 Why do you glory in malice, * you who are mighty in iniquity?
      - type: citation
        text: '51:4 All day long your tongue devised injustice: * like a sharp razor you have wrought deceit.'
      - type: citation
        text: '51:5 You have loved malice above kindness: * and iniquity more than speaking equity.'
      - type: citation
        text: 51:6 You have loved all words of ruin, * O deceitful tongue.
      - type: citation
        text: 51:7 Therefore God will destroy you utterly, * he will pluck you out and remove you from your dwelling, and your root from the land of the living.
      - type: citation
        text: '51:8 The just shall see, and shall fear, and shall laugh at him, and shall say: * Behold the man who did not take God for his helper:'
      - type: citation
        text: '51:9 But trusted in the abundance of his riches: * and grew strong in his vanity.'
      - type: citation
        text: '51:10 But I, as a fruitful olive tree in the house of God, * have hoped in the mercy of God forever: yea, for ever and ever.'
      - type: citation
        text: '51:11 I will praise you forever, because you have done it: * and I will wait on your name, for it is good in the sight of your holy ones.'
  psalm.52-1-dixit-ins-piens-in-corde-suo-non-est-deus-4a0f28d7d4:
    role: psalm
    content:
      en:
      - type: citation
        text: '52:1 The fool said in his heart: * There is no God.'
      - type: citation
        text: '52:2 They are corrupted, and become abominable in iniquities: * there is none that doth good.'
      - type: citation
        text: '52:3 God looked down from heaven on the children of men: * to see if there were any that did understand, or did seek God.'
      - type: citation
        text: 52:4 All have gone aside, they are become unprofitable together, * there is none that doth good, no not one.
      - type: citation
        text: 52:5 Shall not all the workers of iniquity know, * who eat up my people as they eat bread?
      - type: citation
        text: '52:6 They have not called upon God: * there have they trembled for fear, where there was no fear.'
      - type: citation
        text: '52:6 For God hath scattered the bones of them that please men: * they have been confounded, because God hath despised them.'
      - type: citation
        text: 52:7 Who will give out of Sion the salvation of Israel? * when God shall bring back the captivity of his people, Jacob shall rejoice, and Israel shall be glad.
      la:
      - type: citation
        text: '52:1 Dixit insípiens in corde suo: * Non est Deus.'
      - type: citation
        text: '52:2 Corrúpti sunt, et abominábiles facti sunt in iniquitátibus: * non est qui fáciat bonum.'
      - type: citation
        text: '52:3 Deus de cælo prospéxit super fílios hóminum: * ut vídeat si est intéllegens, aut requírens Deum.'
      - type: citation
        text: '52:4 Omnes declinavérunt, simul inútiles facti sunt: * non est qui fáciat bonum, non est usque ad unum.'
      - type: citation
        text: 52:5 Nonne scient omnes qui operántur iniquitátem, * qui dévorant plebem meam ut cibum panis?
      - type: citation
        text: '52:6 Deum non invocavérunt: * illic trepidavérunt timóre, ubi non erat timor.'
      - type: citation
        text: '52:6 Quóniam Deus dissipávit ossa eórum qui homínibus placent: * confúsi sunt, quóniam Deus sprevit eos.'
      - type: citation
        text: 52:7 Quis dabit ex Sion salutáre Israël? * cum convérterit Deus captivitátem plebis suæ, exsultábit Iacob, et lætábitur Israël.
      en2:
      - type: citation
        text: '52:1 The fool has said in his heart: * There is no God.'
      - type: citation
        text: '52:2 They are corrupt, and have become abominable in their iniquities: * there is none who does good.'
      - type: citation
        text: '52:3 God has looked down from heaven upon the children of men: * to see if there be any who understand, or who seek God.'
      - type: citation
        text: '52:4 All have turned aside, they are become unprofitable together: * there is none who does good, not even one.'
      - type: citation
        text: 52:5 Shall not all who work iniquity know, * who devour my people as they eat bread?
      - type: citation
        text: '52:6 They have not called upon God: * there they trembled with fear, where there was no fear.'
      - type: citation
        text: '52:6 For God has scattered the bones of those who please men: * they have been confounded, because God has despised them.'
      - type: citation
        text: 52:7 Who will give out of Zion the salvation of Israel? * When God shall turn away the captivity of his people, Jacob shall rejoice, and Israel shall be glad.
  psalm.53-3-deus-in-n-mine-tuo-salvum-me-fac-et-in-virt-a956e75882:
    role: psalm
    content:
      en:
      - type: citation
        text: 53:3 Save me, O God, by thy name, * and judge me in thy strength.
      - type: citation
        text: '53:4 O God, hear my prayer: * give ear to the words of my mouth.'
      - type: citation
        text: '53:5 For strangers have risen up against me; and the mighty have sought after my soul: * and they have not set God before their eyes.'
      - type: citation
        text: '53:6 For behold God is my helper: * and the Lord is the protector of my soul.'
      - type: citation
        text: 53:7 Turn back the evils upon my enemies; * and cut them off in thy truth.
      - type: citation
        text: '53:8 I will freely sacrifice to thee, * and will give praise, O God, to thy name: because it is good:'
      - type: citation
        text: '53:9 For thou hast delivered me out of all trouble: * and my eye hath looked down upon my enemies.'
      la:
      - type: citation
        text: '53:3 Deus, in nómine tuo salvum me fac: * et in virtúte tua iúdica me.'
      - type: citation
        text: '53:4 Deus, exáudi oratiónem meam: * áuribus pércipe verba oris mei.'
      - type: citation
        text: '53:5 Quóniam aliéni insurrexérunt advérsum me, et fortes quæsiérunt ánimam meam: * et non proposuérunt Deum ante conspéctum suum.'
      - type: citation
        text: '53:6 Ecce enim, Deus ádiuvat me: * et Dóminus suscéptor est ánimæ meæ.'
      - type: citation
        text: '53:7 Avérte mala inimícis meis: * et in veritáte tua dispérde illos.'
      - type: citation
        text: '53:8 Voluntárie sacrificábo tibi, * et confitébor nómini tuo, Dómine: quóniam bonum est:'
      - type: citation
        text: '53:9 Quóniam ex omni tribulatióne eripuísti me: * et super inimícos meos despéxit óculus meus.'
      en2:
      - type: citation
        text: '53:3 O God, save me by your name: * and judge me by your strength.'
      - type: citation
        text: '53:4 O God, hear my prayer: * give ear to the words of my mouth.'
      - type: citation
        text: '53:5 For strangers have risen up against me, and the mighty have sought my soul: * and they have not set God before their eyes.'
      - type: citation
        text: '53:6 For behold, God is my helper: * and the Lord is the upholder of my soul.'
      - type: citation
        text: '53:7 Turn back the evils upon my enemies: * and in your truth destroy them.'
      - type: citation
        text: '53:8 I will freely sacrifice to you, * and I will confess your name, O God, because it is good:'
      - type: citation
        text: '53:9 For you have quickly rescued me from all tribulation: * and my eye has looked down upon my enemies.'
  psalm.54-2-ex-udi-deus-orati-nem-meam-et-ne-desp-xeris-b694938ee1:
    role: psalm
    content:
      en:
      - type: citation
        text: '54:2 Hear, O God, my prayer, and despise not my supplication: * be attentive to me and hear me.'
      - type: citation
        text: 54:3 I am grieved in my exercise; * and am troubled, at the voice of the enemy, and at the tribulation of the sinner.
      - type: citation
        text: 54:4 For they have cast iniquities upon me; * and in wrath they were troublesome to me.
      - type: citation
        text: '54:5 My heart is troubled within me: * and the fear of death is fallen upon me.'
      - type: citation
        text: '54:6 Fear and trembling are come upon me: * and darkness hath covered me.'
      - type: citation
        text: '54:7 And I said: Who will give me wings like a dove, * and I will fly and be at rest?'
      - type: citation
        text: 54:8 Lo, I have gone far off flying away; * and I abode in the wilderness.
      - type: citation
        text: 54:9 I waited for him that hath saved me * from pusillanimity of spirit, and a storm.
      - type: citation
        text: 54:10 Cast down, O Lord, and divide their tongues; * for I have seen iniquity and contradiction in the city.
      - type: citation
        text: '54:11 Day and night shall iniquity surround it upon its walls: * and in the midst thereof are labour, and injustice.'
      - type: citation
        text: 54:12 And usury and deceit * have not departed from its streets.
      - type: citation
        text: 54:13 For if my enemy had reviled me, * I would verily have borne with it.
      - type: citation
        text: 54:13 And if he that hated me had spoken great things against me, * I would perhaps have hidden myself from him.
      - type: citation
        text: 54:14 But thou a man of one mind, * my guide, and my familiar.
      - type: citation
        text: '54:15 Who didst take sweetmeats together with me: * in the house of God we walked with consent.'
      - type: citation
        text: 54:16 Let death come upon them, * and let them go down alive into hell.
      - type: citation
        text: '54:16 For there is wickedness in their dwellings: * in the midst of them.'
      - type: citation
        text: '54:17 But I have cried to God: * and the Lord will save me.'
      - type: citation
        text: '54:18 Evening and morning, and at noon I will speak and declare: * and he shall hear my voice.'
      - type: citation
        text: '54:19 He shall redeem my soul in peace from them that draw near to me: * for among many they were with me.'
      - type: citation
        text: 54:20 God shall hear, * and the Eternal shall humble them.
      - type: citation
        text: '54:20 For there is no change with them, and they have not feared God: * he hath stretched forth his hand to repay.'
      - type: citation
        text: 54:21 They have defiled his covenant, they are divided by the wrath of his countenance, * and his heart hath drawn near.
      - type: citation
        text: 54:22 His words are smoother than oil, * and the same are darts.
      - type: citation
        text: '54:23 Cast thy care upon the Lord, and he shall sustain thee: * he shall not suffer the just to waver for ever.'
      - type: citation
        text: 54:24 But thou, O God, shalt bring them down * into the pit of destruction.
      - type: citation
        text: 54:24 Bloody and deceitful men shall not live out half their days; * but I will trust in thee, O Lord.
      la:
      - type: citation
        text: '54:2 Exáudi, Deus, oratiónem meam, et ne despéxeris deprecatiónem meam: * inténde mihi, et exáudi me.'
      - type: citation
        text: '54:3 Contristátus sum in exercitatióne mea: * et conturbátus sum a voce inimíci, et a tribulatióne peccatóris.'
      - type: citation
        text: '54:4 Quóniam declinavérunt in me iniquitátes: * et in ira molésti erant mihi.'
      - type: citation
        text: '54:5 Cor meum conturbátum est in me: * et formído mortis cécidit super me.'
      - type: citation
        text: '54:6 Timor et tremor venérunt super me: * et contexérunt me ténebræ.'
      - type: citation
        text: '54:7 Et dixi: Quis dabit mihi pennas sicut colúmbæ, * et volábo, et requiéscam?'
      - type: citation
        text: '54:8 Ecce, elongávi fúgiens: * et mansi in solitúdine.'
      - type: citation
        text: 54:9 Exspectábam eum, qui salvum me fecit * a pusillanimitáte spíritus et tempestáte.
      - type: citation
        text: '54:10 Præcípita, Dómine, dívide linguas eórum: * quóniam vidi iniquitátem, et contradictiónem in civitáte.'
      - type: citation
        text: '54:11 Die ac nocte circúmdabit eam super muros eius iníquitas: * et labor in médio eius, et iniustítia.'
      - type: citation
        text: 54:12 Et non defécit de platéis eius * usúra, et dolus.
      - type: citation
        text: 54:13 Quóniam si inimícus meus maledixísset mihi, * sustinuíssem útique.
      - type: citation
        text: 54:13 Et si is, qui óderat me, super me magna locútus fuísset, * abscondíssem me fórsitan ab eo.
      - type: citation
        text: '54:14 Tu vero, homo unánimis: * dux meus, et notus meus:'
      - type: citation
        text: '54:15 Qui simul mecum dulces capiébas cibos: * in domo Dei ambulávimus cum consénsu.'
      - type: citation
        text: '54:16 Véniat mors super illos: * et descéndant in inférnum vivéntes:'
      - type: citation
        text: '54:16 Quóniam nequítiæ in habitáculis eórum: * in médio eórum.'
      - type: citation
        text: '54:17 Ego autem ad Deum clamávi: * et Dóminus salvábit me.'
      - type: citation
        text: '54:18 Véspere, et mane, et merídie narrábo et annuntiábo: * et exáudiet vocem meam.'
      - type: citation
        text: '54:19 Rédimet in pace ánimam meam ab his, qui appropínquant mihi: * quóniam inter multos erant mecum.'
      - type: citation
        text: 54:20 Exáudiet Deus, et humiliábit illos, * qui est ante sǽcula.
      - type: citation
        text: '54:20 Non enim est illis commutátio, et non timuérunt Deum: * exténdit manum suam in retribuéndo.'
      - type: citation
        text: '54:21 Contaminavérunt testaméntum eius, divísi sunt ab ira vultus eius: * et appropinquávit cor illíus.'
      - type: citation
        text: '54:22 Mollíti sunt sermónes eius super óleum: * et ipsi sunt iácula.'
      - type: citation
        text: '54:23 Iacta super Dóminum curam tuam, et ipse te enútriet: * non dabit in ætérnum fluctuatiónem iusto.'
      - type: citation
        text: 54:24 Tu vero, Deus, dedúces eos, * in púteum intéritus.
      - type: citation
        text: '54:24 Viri sánguinum, et dolósi non dimidiábunt dies suos: * ego autem sperábo in te, Dómine.'
      en2:
      - type: citation
        text: '54:2 Listen to my prayer, O God, and do not despise my supplication: * be attentive to me, and heed me.'
      - type: citation
        text: '54:3 I have been grieved in my training: * and I have been disturbed at the voice of the adversary, and at the tribulation of the sinner.'
      - type: citation
        text: '54:4 For they have diverted iniquities toward me: * and they have been harassing me with rage.'
      - type: citation
        text: '54:5 My heart has become disturbed within me: * and the dread of death has fallen over me.'
      - type: citation
        text: '54:6 Fear and trembling have overwhelmed me: * and darkness has buried me.'
      - type: citation
        text: '54:7 And I said: Who will give me wings like the dove, * so that I may fly away and take rest?'
      - type: citation
        text: '54:8 Behold, I have fled far away: * and I linger in solitude.'
      - type: citation
        text: 54:9 I waited for him who saved me * from a weak-minded spirit and from a tempest.
      - type: citation
        text: '54:10 Cast them down, O Lord, divide their tongues: * for I have seen iniquity and contradiction in the city.'
      - type: citation
        text: '54:11 Day and night, iniquity will surround it upon its walls: * and hardship is in its midst, and injustice.'
      - type: citation
        text: 54:12 And usury and deceit have not fallen away * from its streets.
      - type: citation
        text: 54:13 For if my enemy had spoken evil against me, * certainly I would have sustained it.
      - type: citation
        text: 54:13 And if he who hated me had been speaking great things against me, * I would perhaps have hidden myself from him.
      - type: citation
        text: '54:14 Truly, you are a man of one mind: * my leader and my acquaintance:'
      - type: citation
        text: '54:15 Who took sweet food together with me: * in the house of God, we walked side-by-side.'
      - type: citation
        text: '54:16 Let death come upon them: * and let them descend alive into Hellfire:'
      - type: citation
        text: '54:16 For there is wickedness in their dwellings: * in their midst.'
      - type: citation
        text: '54:17 But I have cried out to God: * and the Lord will save me.'
      - type: citation
        text: '54:18 Evening and morning and midday, I will discourse and announce: * and he will heed my voice.'
      - type: citation
        text: '54:19 He will redeem my soul in peace from those who draw near to me: * for, among the many, they were with me.'
      - type: citation
        text: 54:20 God will hear, and he will humble them, * he who is before time.
      - type: citation
        text: '54:20 For there is no change with them, and they have not feared God: * he has stretched forth his hand in retribution.'
      - type: citation
        text: '54:21 They have contaminated his covenant; they were divided by the wrath of his countenance: * and his heart has drawn near.'
      - type: citation
        text: '54:22 His words are smoother than oil: * and they are arrows.'
      - type: citation
        text: '54:23 Cast your cares upon the Lord, and he will nurture you: * he will not allow the just to be tossed about forever.'
      - type: citation
        text: 54:24 Truly, O God, you will lead them away * into the well of death.
      - type: citation
        text: '54:24 Bloody and deceitful men will not divide their days in half: * but I will hope in you, O Lord.'
  psalm.55-2-miser-re-mei-deus-qu-niam-conculc-vit-me-ho-a2a246fd67:
    role: psalm
    content:
      en:
      - type: citation
        text: 55:2 Have mercy on me, O God, for man hath trodden me under foot; * all the day long he hath afflicted me fighting against me.
      - type: citation
        text: 55:3 My enemies have trodden on me all the day long; * for they are many that make war against me.
      - type: citation
        text: '55:4 From the height of the day I shall fear: * but I will trust in thee.'
      - type: citation
        text: '55:5 In God I will praise my words, in God I have put my trust: * I will not fear what flesh can do against me.'
      - type: citation
        text: '55:6 All the day long they detested my words: * all their thoughts were against me unto evil.'
      - type: citation
        text: '55:7 They will dwell and hide themselves: * they will watch my heel.'
      - type: citation
        text: '55:8 As they have waited for my soul, for nothing shalt thou save them: * in thy anger thou shalt break the people in pieces.'
      - type: citation
        text: '55:9 O God, I have declared to thee my life: * thou hast set my tears in thy sight,'
      - type: citation
        text: 55:9 As also in thy promise. * Then shall my enemies be turned back.
      - type: citation
        text: 55:10 In what day soever I shall call upon thee, * behold I know thou art my God.
      - type: citation
        text: 55:11 In God will I praise the word, in the Lord will I praise his speech. * In God have I hoped, I will not fear what man can do to me.
      - type: citation
        text: '55:12 In me, O God, are vows to thee, * which I will pay, praises to thee:'
      - type: citation
        text: '55:13 Because thou hast delivered my soul from death, my feet from falling: * that I may please in the sight of God, in the light of the living.'
      la:
      - type: citation
        text: '55:2 Miserére mei, Deus, quóniam conculcávit me homo: * tota die impúgnans tribulávit me.'
      - type: citation
        text: '55:3 Conculcavérunt me inimíci mei tota die: * quóniam multi bellántes advérsum me.'
      - type: citation
        text: '55:4 Ab altitúdine diéi timébo: * ego vero in te sperábo.'
      - type: citation
        text: '55:5 In Deo laudábo sermónes meos, in Deo sperávi: * non timébo quid fáciat mihi caro.'
      - type: citation
        text: '55:6 Tota die verba mea exsecrabántur: * advérsum me omnes cogitatiónes eórum in malum.'
      - type: citation
        text: '55:7 Inhabitábunt et abscóndent: * ipsi calcáneum meum observábunt.'
      - type: citation
        text: '55:8 Sicut sustinuérunt ánimam meam, pro níhilo salvos fácies illos: * in ira pópulos confrínges.'
      - type: citation
        text: '55:9 Deus, vitam meam annuntiávi tibi: * posuísti lácrimas meas in conspéctu tuo.'
      - type: citation
        text: '55:9 Sicut et in promissióne tua: * tunc converténtur inimíci mei retrórsum:'
      - type: citation
        text: '55:10 In quacúmque die invocávero te: * ecce, cognóvi, quóniam Deus meus es.'
      - type: citation
        text: '55:11 In Deo laudábo verbum, in Dómino laudábo sermónem: * in Deo sperávi, non timébo quid fáciat mihi homo.'
      - type: citation
        text: 55:12 In me sunt, Deus, vota tua, * quæ reddam, laudatiónes tibi.
      - type: citation
        text: '55:13 Quóniam eripuísti ánimam meam de morte, et pedes meos de lapsu: * ut pláceam coram Deo in lúmine vivéntium.'
      en2:
      - type: citation
        text: '55:2 Have mercy on me, O God, for man has trampled over me: * all day long, he has afflicted me by fighting against me.'
      - type: citation
        text: '55:3 My enemies have trampled over me all day long: * for those who make war against me are many.'
      - type: citation
        text: '55:4 From the height of the day, I will be afraid: * but truly, I will hope in you.'
      - type: citation
        text: '55:5 In God, I will praise my words; in God, I have put my trust: * I will not fear what flesh can do to me.'
      - type: citation
        text: '55:6 All day long, they curse my words: * all their intentions are for evil against me.'
      - type: citation
        text: '55:7 They will dwell and hide themselves: * they will watch my heel.'
      - type: citation
        text: '55:8 Just as they waited for my soul, nothing will save them: * in your anger, you will crush the people.'
      - type: citation
        text: '55:9 O God, I have announced my life to you: * you have placed my tears in your sight.'
      - type: citation
        text: '55:9 Even in your promise: * then my enemies will be turned back:'
      - type: citation
        text: '55:10 On whatever day that I call upon you: * behold, I know that you are my God.'
      - type: citation
        text: '55:11 In God, I will praise the word; in the Lord, I will praise his speech: * in God, I have hoped; I will not fear what man can do to me.'
      - type: citation
        text: '55:12 My vows to you, O God, are in me, * I will repay them: praises be to you.'
      - type: citation
        text: '55:13 For you have rescued my soul from death, and my feet from slipping: * so that I may be pleasing in the sight of God, in the light of the living.'
  psalm.56-2-miser-re-mei-deus-miser-re-mei-qu-niam-in-t-f1bb071d7b:
    role: psalm
    content:
      en:
      - type: citation
        text: '56:2 Have mercy on me, O God, have mercy on me: * for my soul trusteth in thee.'
      - type: citation
        text: 56:2 And in the shadow of thy wings will I hope, * until iniquity pass away.
      - type: citation
        text: 56:3 I will cry to God the most High; * to God who hath done good to me.
      - type: citation
        text: '56:4 He hath sent from heaven and delivered me: * he hath made them a reproach that trod upon me.'
      - type: citation
        text: 56:4 God hath sent his mercy and his truth, * and he hath delivered my soul from the midst of the young lions. I slept troubled.
      - type: citation
        text: 56:5 The sons of men, whose teeth are weapons and arrows, * and their tongue a sharp sword.
      - type: citation
        text: 56:6 Be thou exalted, O God, above the heavens, * and thy glory above all the earth.
      - type: citation
        text: 56:7 They prepared a snare for my feet; * and they bowed down my soul.
      - type: citation
        text: 56:7 They dug a pit before my face, * and they are fallen into it.
      - type: citation
        text: '56:8 My heart is ready, O God, my heart is ready: * I will sing, and rehearse a psalm.'
      - type: citation
        text: '56:9 Arise, O my glory, arise psaltery and harp: * I will arise early.'
      - type: citation
        text: '56:10 I will give praise to thee, O Lord, among the people: * I will sing a psalm to thee among the nations.'
      - type: citation
        text: '56:11 For thy mercy is magnified even to the heavens: * and thy truth unto the clouds.'
      - type: citation
        text: '56:12 Be thou exalted, O God, above the heavens: * and thy glory above all the earth.'
      la:
      - type: citation
        text: '56:2 Miserére mei, Deus, miserére mei: * quóniam in te confídit ánima mea.'
      - type: citation
        text: 56:2 Et in umbra alárum tuárum sperábo, * donec tránseat iníquitas.
      - type: citation
        text: '56:3 Clamábo ad Deum altíssimum: * Deum qui benefécit mihi.'
      - type: citation
        text: '56:4 Misit de cælo, et liberávit me: * dedit in oppróbrium conculcántes me.'
      - type: citation
        text: '56:4 Misit Deus misericórdiam suam, et veritátem suam, * et erípuit ánimam meam de médio catulórum leónum: dormívi conturbátus.'
      - type: citation
        text: '56:5 Fílii hóminum dentes eórum arma et sagíttæ: * et lingua eórum gládius acútus.'
      - type: citation
        text: 56:6 Exaltáre super cælos, Deus, * et in omnem terram glória tua.
      - type: citation
        text: '56:7 Láqueum paravérunt pédibus meis: * et incurvavérunt ánimam meam.'
      - type: citation
        text: '56:7 Fodérunt ante fáciem meam fóveam: * et incidérunt in eam.'
      - type: citation
        text: '56:8 Parátum cor meum, Deus, parátum cor meum: * cantábo, et psalmum dicam.'
      - type: citation
        text: '56:9 Exsúrge, glória mea, exsúrge, psaltérium et cíthara: * exsúrgam dilúculo.'
      - type: citation
        text: '56:10 Confitébor tibi in pópulis, Dómine: * et psalmum dicam tibi in géntibus:'
      - type: citation
        text: 56:11 Quóniam magnificáta est usque ad cælos misericórdia tua, * et usque ad nubes véritas tua.
      - type: citation
        text: '56:12 Exaltáre super cælos, Deus: * et super omnem terram glória tua.'
      en2:
      - type: citation
        text: '56:2 Be merciful to me, O God, be merciful to me: * for my soul trusts in you.'
      - type: citation
        text: 56:2 And I will hope in the shadow of your wings, * until iniquity passes away.
      - type: citation
        text: '56:3 I will cry out to God Most High: * to God who has been kind to me.'
      - type: citation
        text: '56:4 He sent from heaven and freed me: * he has surrendered into disgrace those who trampled me.'
      - type: citation
        text: '56:4 God has sent his mercy and his truth, * and he has rescued my soul from the midst of the young lions: I slept troubled.'
      - type: citation
        text: '56:5 The sons of men: their teeth are weapons and arrows, * and their tongue is a sharp sword.'
      - type: citation
        text: 56:6 Be exalted above the heavens, O God, * and your glory above all the earth.
      - type: citation
        text: '56:7 They prepared a snare for my feet: * and they bowed down my soul.'
      - type: citation
        text: '56:7 They dug a pit before my face: * and they have fallen into it.'
      - type: citation
        text: '56:8 My heart is prepared, O God, my heart is prepared: * I will sing, and I will compose a psalm.'
      - type: citation
        text: '56:9 Rise up, my glory; rise up, psaltery and harp: * I will arise in early morning.'
      - type: citation
        text: '56:10 I will confess to you, O Lord, among the peoples: * and I will compose a psalm to you among the nations:'
      - type: citation
        text: 56:11 For your mercy has been magnified, even to the heavens, * and your truth, even to the clouds.
      - type: citation
        text: '56:12 Be exalted above the heavens, O God: * and your glory above all the earth.'
  psalm.57-2-si-vere-tique-iust-tiam-loqu-mini-recta-iud-480078c065:
    role: psalm
    content:
      en:
      - type: citation
        text: '57:2 If in very deed you speak justice: * judge right things, ye sons of men.'
      - type: citation
        text: '57:3 For in your heart you work iniquity: * your hands forge injustice in the earth.'
      - type: citation
        text: '57:4 The wicked are alienated from the womb; they have gone astray from the womb: * they have spoken false things.'
      - type: citation
        text: '57:5 Their madness is according to the likeness of a serpent: * like the deaf asp that stoppeth her ears:'
      - type: citation
        text: 57:6 Which will not hear the voice of the charmers; * nor of the wizard that charmeth wisely.
      - type: citation
        text: '57:7 God shall break in pieces their teeth in their mouth: * the Lord shall break the grinders of the lions.'
      - type: citation
        text: 57:8 They shall come to nothing, like water running down; * he hath bent his bow till they be weakened.
      - type: citation
        text: '57:9 Like wax that melteth they shall be taken away: * fire hath fallen on them, and they shall not see the sun.'
      - type: citation
        text: 57:10 Before your thorns could know the brier; he swalloweth them up, * as alive, in his wrath.
      - type: citation
        text: '57:11 The just shall rejoice when he shall see the revenge: * he shall wash his hands in the blood of the sinner.'
      - type: citation
        text: '57:12 And man shall say: If indeed there be fruit to the just: * there is indeed a God that judgeth them on the earth.'
      la:
      - type: citation
        text: '57:2 Si vere útique iustítiam loquímini: * recta iudicáte, fílii hóminum.'
      - type: citation
        text: '57:3 Étenim in corde iniquitátes operámini: * in terra iniustítias manus vestræ concínnant.'
      - type: citation
        text: '57:4 Alienáti sunt peccatóres a vulva, erravérunt ab útero: * locúti sunt falsa.'
      - type: citation
        text: '57:5 Furor illis secúndum similitúdinem serpéntis: * sicut áspidis surdæ, et obturántis aures suas,'
      - type: citation
        text: '57:6 Quæ non exáudiet vocem incantántium: * et venéfici incantántis sapiénter.'
      - type: citation
        text: '57:7 Deus cónteret dentes eórum in ore ipsórum: * molas leónum confrínget Dóminus.'
      - type: citation
        text: '57:8 Ad níhilum devénient tamquam aqua decúrrens: * inténdit arcum suum donec infirméntur.'
      - type: citation
        text: '57:9 Sicut cera, quæ fluit, auferéntur: * supercécidit ignis, et non vidérunt solem.'
      - type: citation
        text: '57:10 Priúsquam intellégerent spinæ vestræ rhamnum: * sicut vivéntes, sic in ira absórbet eos.'
      - type: citation
        text: '57:11 Lætábitur iustus cum víderit vindíctam: * manus suas lavábit in sánguine peccatóris.'
      - type: citation
        text: '57:12 Et dicet homo: Si útique est fructus iusto: * útique est Deus iúdicans eos in terra.'
      en2:
      - type: citation
        text: '57:2 If, truly and certainly, you speak justice: * then judge what is right, you sons of men.'
      - type: citation
        text: '57:3 For, even in your heart, you work iniquity: * your hands construct injustice on the earth.'
      - type: citation
        text: '57:4 Sinners have become foreigners from the womb; they have gone astray from conception: * they have spoken falsehood.'
      - type: citation
        text: '57:5 Their fury is similar to that of a serpent: * like a deaf asp, who even blocks her ears,'
      - type: citation
        text: '57:6 Who will not listen to the voice of charmers: * nor even to the enchanter who chants wisely.'
      - type: citation
        text: '57:7 God will crush their teeth within their own mouth: * the Lord will break the molars of the lions.'
      - type: citation
        text: '57:8 They will come to nothing, like water flowing away: * he has aimed his bow, while they are weakened.'
      - type: citation
        text: '57:9 Like wax that flows, they will be carried away: * fire has fallen upon them, and they will not see the sun.'
      - type: citation
        text: '57:10 Before your thorns could know the brier: * he consumes them alive, as if in rage.'
      - type: citation
        text: '57:11 The just one will rejoice when he sees vindication: * he will wash his hands in the blood of the sinner.'
      - type: citation
        text: '57:12 And man will say: If the just one is fruitful, * then, truly, there is a God judging them on earth.'
  psalm.58-2-ripe-me-de-inim-cis-meis-deus-meus-et-ab-in-aacedd736d:
    role: psalm
    content:
      en:
      - type: citation
        text: 58:2 Deliver me from my enemies, O my God; * and defend me from them that rise up against me.
      - type: citation
        text: 58:3 Deliver me from them that work iniquity, * and save me from bloody men.
      - type: citation
        text: '58:4 For behold they have caught my soul: * the mighty have rushed in upon me:'
      - type: citation
        text: '58:5 Neither is it my iniquity, nor my sin, O Lord: * without iniquity have I run, and directed my steps.'
      - type: citation
        text: '58:6 Rise up thou to meet me, and behold: * even thou, O Lord, the God of hosts, the God of Israel.'
      - type: citation
        text: '58:6 Attend to visit all the nations: * have no mercy on all them that work iniquity.'
      - type: citation
        text: '58:7 They shall return at evening, and shall suffer hunger like dogs: * and shall go round about the city.'
      - type: citation
        text: '58:8 Behold they shall speak with their mouth, and a sword is in their lips: * for who, say they, hath heard us?'
      - type: citation
        text: '58:9 But thou, O Lord, shalt laugh at them: * thou shalt bring all the nations to nothing.'
      - type: citation
        text: '58:10 I will keep my strength to thee: for thou art my protector: * my God, his mercy shall prevent me.'
      - type: citation
        text: '58:12 God shall let me see over my enemies: slay them not, * lest at any time my people forget.'
      - type: citation
        text: '58:12 And scatter them by thy power; * and bring them down, O Lord, my protector:'
      - type: citation
        text: '58:13 For the sin of their mouth, and the word of their lips: * and let them be taken in their pride.'
      - type: citation
        text: '58:13 And for their cursing and lying they shall be talked of, when they are consumed: * when they are consumed by thy wrath, and they shall be no more.'
      - type: citation
        text: 58:14 And they shall know that God will rule Jacob, * and all the ends of the earth.
      - type: citation
        text: '58:15 They shall return at evening and shall suffer hunger like dogs: * and shall go round about the city.'
      - type: citation
        text: 58:16 They shall be scattered abroad to eat, * and shall murmur if they be not filled.
      - type: citation
        text: '58:17 But I will sing thy strength: * and will extol thy mercy in the morning.'
      - type: citation
        text: 58:17 For thou art become my support, * and my refuge, in the day of my trouble.
      - type: citation
        text: '58:18 Unto thee, O my helper, will I sing, for thou art God my defence: * my God my mercy.'
      la:
      - type: citation
        text: '58:2 Éripe me de inimícis meis, Deus meus: * et ab insurgéntibus in me líbera me.'
      - type: citation
        text: '58:3 Éripe me de operántibus iniquitátem: * et de viris sánguinum salva me.'
      - type: citation
        text: '58:4 Quia ecce cepérunt ánimam meam: * irruérunt in me fortes.'
      - type: citation
        text: '58:5 Neque iníquitas mea, neque peccátum meum, Dómine: * sine iniquitáte cucúrri, et diréxi.'
      - type: citation
        text: '58:6 Exsúrge in occúrsum meum, et vide: * et tu, Dómine, Deus virtútum, Deus Israël,'
      - type: citation
        text: '58:6 Inténde ad visitándas omnes gentes: * non misereáris ómnibus, qui operántur iniquitátem.'
      - type: citation
        text: '58:7 Converténtur ad vésperam: et famem patiéntur ut canes, * et circuíbunt civitátem.'
      - type: citation
        text: '58:8 Ecce, loquéntur in ore suo, et gládius in lábiis eórum: * quóniam quis audívit?'
      - type: citation
        text: '58:9 Et tu, Dómine, deridébis eos: * ad níhilum dedúces omnes gentes.'
      - type: citation
        text: '58:10 Fortitúdinem meam ad te custódiam, quia, Deus, suscéptor meus es: * Deus meus, misericórdia eius prævéniet me.'
      - type: citation
        text: '58:12 Deus osténdet mihi super inimícos meos, ne occídas eos: * nequándo obliviscántur pópuli mei.'
      - type: citation
        text: '58:12 Dispérge illos in virtúte tua: * et depóne eos, protéctor meus, Dómine:'
      - type: citation
        text: '58:13 Delíctum oris eórum, sermónem labiórum ipsórum: * et comprehendántur in supérbia sua.'
      - type: citation
        text: '58:13 Et de exsecratióne et mendácio annuntiabúntur in consummatióne: * in ira consummatiónis, et non erunt.'
      - type: citation
        text: '58:14 Et scient quia Deus dominábitur Iacob: * et fínium terræ.'
      - type: citation
        text: '58:15 Converténtur ad vésperam: et famem patiéntur ut canes, * et circuíbunt civitátem.'
      - type: citation
        text: '58:16 Ipsi dispergéntur ad manducándum: * si vero non fúerint saturáti, et murmurábunt.'
      - type: citation
        text: '58:17 Ego autem cantábo fortitúdinem tuam: * et exsultábo mane misericórdiam tuam.'
      - type: citation
        text: 58:17 Quia factus es suscéptor meus, * et refúgium meum, in die tribulatiónis meæ.
      - type: citation
        text: '58:18 Adiútor meus, tibi psallam, quia, Deus, suscéptor meus es: * Deus meus, misericórdia mea.'
      en2:
      - type: citation
        text: '58:2 Rescue me from my enemies, my God: * and free me from those who rise up against me.'
      - type: citation
        text: '58:3 Rescue me from those who work iniquity: * and save me from men of blood.'
      - type: citation
        text: '58:4 For behold, they have seized my soul: * the strong have rushed upon me.'
      - type: citation
        text: '58:5 Neither my iniquity, nor my sin, O Lord: * I have run and gone directly, without iniquity.'
      - type: citation
        text: '58:6 Rise up to meet me, and see: * even you, O Lord, the God of hosts, the God of Israel,'
      - type: citation
        text: '58:6 Reach out to visit all nations: * do not take pity on all those who work iniquity.'
      - type: citation
        text: 58:7 They will return toward evening, and they will suffer hunger like dogs, * and they will wander around the city.
      - type: citation
        text: '58:8 Behold, they will speak with their mouth, and a sword is in their lips: * for who has heard us?'
      - type: citation
        text: '58:9 And you, O Lord, will laugh at them: * you will lead all the Gentiles to nothing.'
      - type: citation
        text: '58:10 I will guard my strength toward you, for you are God, my supporter: * my God, his mercy will precede me.'
      - type: citation
        text: '58:12 God will oversee my enemies for me; do not slay them: * lest at times my people may forget them.'
      - type: citation
        text: '58:12 Scatter them by your virtue: * and depose them, O Lord, my protector:'
      - type: citation
        text: '58:13 By the offense of their mouth and by the speech of their lips: * and may they be caught in their arrogance.'
      - type: citation
        text: '58:13 And, for their cursing and lying, they will be made known at the consummation: * in the fury of the consummation, and so they will be no more.'
      - type: citation
        text: '58:14 And they will know that God will rule over Jacob: * even to the ends of the earth.'
      - type: citation
        text: 58:15 They will return toward evening, and they will suffer hunger like dogs, * and they will wander around the city.
      - type: citation
        text: 58:16 They will be dispersed in order to gnaw; * and truly, when they will not have been satisfied, they will murmur.
      - type: citation
        text: 58:17 But I will sing your strength, * and I will extol your mercy in the morning.
      - type: citation
        text: 58:17 For you have been my supporter, * and my refuge in the day of my tribulation.
      - type: citation
        text: '58:18 To you, my helper, I will sing psalms, for you are God, my supporter: * my God is my mercy.'
  psalm.59-3-deus-repul-sti-nos-et-destrux-sti-nos-ir-tu-b6572db2ca:
    role: psalm
    content:
      en:
      - type: citation
        text: 59:3 God, thou hast cast us off, and hast destroyed us; * thou hast been angry, and hast had mercy on us.
      - type: citation
        text: '59:4 Thou hast moved the earth, and hast troubled it: * heal thou the breaches thereof, for it has been moved.'
      - type: citation
        text: 59:5 Thou hast shewn thy people hard things; * thou hast made us drink the wine of sorrow.
      - type: citation
        text: '59:6 Thou hast given a warning to them that fear thee: * that they may flee from before the bow:'
      - type: citation
        text: 59:7 That thy beloved may be delivered. * Save me with thy right hand, and hear me.
      - type: citation
        text: '59:8 God hath spoken in his holy place: * I will rejoice, and I will divide Sichem; and will mete out the vale of tabernacles.'
      - type: citation
        text: '59:9 Galaad is mine, and Manasses is mine: * and Ephraim is the strength of my head.'
      - type: citation
        text: '59:9 Juda is my king: * Moab is the pot of my hope.'
      - type: citation
        text: '59:10 Into Edom will I stretch out my shoe: * to me the foreigners are made subject.'
      - type: citation
        text: 59:11 Who will bring me into the strong city? * who will lead me into Edom?
      - type: citation
        text: 59:12 Wilt not thou, O God, who hast cast us off? * and wilt not thou, O God, go out with our armies?
      - type: citation
        text: '59:13 Give us help from trouble: * for vain is the salvation of man.'
      - type: citation
        text: '59:14 Through God we shall do mightily: * and he shall bring to nothing them that afflict us.'
      la:
      - type: citation
        text: '59:3 Deus, repulísti nos, et destruxísti nos: * irátus es, et misértus es nobis.'
      - type: citation
        text: '59:4 Commovísti terram, et conturbásti eam: * sana contritiónes eius, quia commóta est.'
      - type: citation
        text: '59:5 Ostendísti pópulo tuo dura: * potásti nos vino compunctiónis.'
      - type: citation
        text: '59:6 Dedísti metuéntibus te significatiónem: * ut fúgiant a fácie arcus:'
      - type: citation
        text: '59:7 Ut liberéntur dilécti tui: * salvum fac déxtera tua, et exáudi me.'
      - type: citation
        text: '59:8 Deus locútus est in sancto suo: * lætábor, et partíbor Síchimam: et convállem tabernaculórum metíbor.'
      - type: citation
        text: '59:9 Meus est Gálaad, et meus est Manásses: * et Éphraim fortitúdo cápitis mei.'
      - type: citation
        text: '59:9 Iuda rex meus: * Moab olla spei meæ.'
      - type: citation
        text: '59:10 In Idumǽam exténdam calceaméntum meum: * mihi alienígenæ súbditi sunt.'
      - type: citation
        text: 59:11 Quis dedúcet me in civitátem munítam? * quis dedúcet me usque in Idumǽam?
      - type: citation
        text: 59:12 Nonne tu, Deus, qui repulísti nos? * et non egrediéris, Deus, in virtútibus nostris?
      - type: citation
        text: '59:13 Da nobis auxílium de tribulatióne: * quia vana salus hóminis.'
      - type: citation
        text: '59:14 In Deo faciémus virtútem: * et ipse ad níhilum dedúcet tribulántes nos.'
      en2:
      - type: citation
        text: '59:3 O God, you have rejected us, and you have ruined us: * you became angry, and yet you have been merciful to us.'
      - type: citation
        text: '59:4 You have moved the earth, and you have disturbed it: * heal its breaches, for it has been moved.'
      - type: citation
        text: '59:5 You have revealed to your people difficulties: * you have made us drink the wine of remorse.'
      - type: citation
        text: '59:6 You have given a warning sign to those who fear you, * so that they may flee from before the face of the bow:'
      - type: citation
        text: '59:7 So that your beloved may be delivered: * save us with your right hand, and hear me.'
      - type: citation
        text: '59:8 God has spoken in his holy place: * I will rejoice, and I will divide Shechem, and I will measure the steep valley of the tabernacles.'
      - type: citation
        text: '59:9 Gilead is mine, and Manasseh is mine: * and Ephraim is the strength of my head.'
      - type: citation
        text: '59:9 Judah is my king: * Moab is the cooking pot of my hope.'
      - type: citation
        text: '59:10 Into Idumea, I will extend my shoe: * to me, the foreigners have been made subject.'
      - type: citation
        text: 59:11 Who will lead me into the fortified city? * Who will lead me all the way to Idumea?
      - type: citation
        text: 59:12 Will not you, O God, who has rejected us? * And will not you, O God, go out with our armies?
      - type: citation
        text: '59:13 Grant us help from tribulation: * for salvation from man is empty.'
      - type: citation
        text: '59:14 In God, we will act virtuously: * and those who trouble us, he will lead to nothing.'
  psalm.6-2-d-mine-ne-in-fur-re-tuo-rguas-me-neque-in-ir-380353cd82:
    role: psalm
    content:
      en:
      - type: citation
        text: 6:2 Lord, rebuke me not in thy indignation, * nor chastise me in thy wrath.
      - type: citation
        text: '6:3 Have mercy on me, O Lord, for I am weak: * heal me, O Lord, for my bones are troubled.'
      - type: citation
        text: '6:4 And my soul is troubled exceedingly: * but thou, O Lord, how long?'
      - type: citation
        text: '6:5 Turn to me, O Lord, and deliver my soul: * O save me for thy mercy’s sake.'
      - type: citation
        text: '6:6 For there is no one in death, that is mindful of thee: * and who shall confess to thee in hell?'
      - type: citation
        text: '6:7 I have laboured in my groanings, † every night I will wash my bed: * I will water my couch with my tears.'
      - type: citation
        text: '6:8 My eye is troubled through indignation: * I have grown old amongst all my enemies.'
      - type: citation
        text: '6:9 Depart from me, all ye workers of iniquity: * for the Lord hath heard the voice of my weeping.'
      - type: citation
        text: '6:10 The Lord hath heard my supplication: * the Lord hath received my prayer.'
      - type: citation
        text: '6:11 Let all my enemies be ashamed, and be very much troubled: * let them be turned back, and be ashamed very speedily.'
      la:
      - type: citation
        text: 6:2 Dómine, ne in furóre tuo árguas me, * neque in ira tua corrípias me.
      - type: citation
        text: '6:3 Miserére mei, Dómine, quóniam infírmus sum: * sana me, Dómine, quóniam conturbáta sunt ossa mea.'
      - type: citation
        text: '6:4 Et ánima mea turbáta est valde: * sed tu, Dómine, úsquequo?'
      - type: citation
        text: '6:5 Convértere, Dómine, et éripe ánimam meam: * salvum me fac propter misericórdiam tuam.'
      - type: citation
        text: '6:6 Quóniam non est in morte qui memor sit tui: * in inférno autem quis confitébitur tibi?'
      - type: citation
        text: '6:7 Laborávi in gémitu meo, † lavábo per síngulas noctes lectum meum: * lácrimis meis stratum meum rigábo.'
      - type: citation
        text: '6:8 Turbátus est a furóre óculus meus: * inveterávi inter omnes inimícos meos.'
      - type: citation
        text: '6:9 Discédite a me, omnes, qui operámini iniquitátem: * quóniam exaudívit Dóminus vocem fletus mei.'
      - type: citation
        text: 6:10 Exaudívit Dóminus deprecatiónem meam, * Dóminus oratiónem meam suscépit.
      - type: citation
        text: '6:11 Erubéscant, et conturbéntur veheménter omnes inimíci mei: * convertántur et erubéscant valde velóciter.'
      en2:
      - type: citation
        text: 6:2 O Lord, do not rebuke me in your fury, * nor chastise me in your anger.
      - type: citation
        text: '6:3 Have mercy on me, Lord, for I am weak: * heal me, Lord, for my bones have become disturbed,'
      - type: citation
        text: '6:4 And my soul has been very troubled: * but as for you, Lord, when?'
      - type: citation
        text: '6:5 Turn to me, Lord, and rescue my soul: * save me because of your mercy.'
      - type: citation
        text: '6:6 For there is no one in death who would be mindful of you: * and who will confess to you in Hell?'
      - type: citation
        text: '6:7 I have labored in my groaning, † every night, with my tears, I will wash my bed: * and I will drench my blanket with my tears.'
      - type: citation
        text: '6:8 My eye has been troubled by rage: * I have grown old among all my enemies.'
      - type: citation
        text: '6:9 Scatter before me, all you who work iniquity: * for the Lord has heard the voice of my weeping.'
      - type: citation
        text: 6:10 The Lord has heard my supplication, * the Lord has accepted my prayer.
      - type: citation
        text: '6:11 Let all my enemies be ashamed and together be greatly troubled: * may they be converted and become ashamed very quickly.'
  psalm.60-2-ex-udi-deus-deprecati-nem-meam-int-nde-orat-4b5cbca1ae:
    role: psalm
    content:
      en:
      - type: citation
        text: '60:2 Hear, O God, my supplication: * be attentive to my prayer.'
      - type: citation
        text: '60:3 To thee have I cried from the ends of the earth: * when my heart was in anguish, thou hast exalted me on a rock.'
      - type: citation
        text: '60:4 Thou hast conducted me; for thou hast been my hope: * a tower of strength against the face of the enemy.'
      - type: citation
        text: '60:5 In thy tabernacle I shall dwell for ever: * I shall be protected under the covert of thy wings.'
      - type: citation
        text: '60:6 For thou, my God, hast heard my prayer: * thou hast given an inheritance to them that fear thy name.'
      - type: citation
        text: '60:7 Thou wilt add days to the days of the king: * his years even to generation and generation.'
      - type: citation
        text: '60:8 He abideth for ever in the sight of God: * his mercy and truth who shall search?'
      - type: citation
        text: '60:9 So will I sing a psalm to thy name for ever and ever: * that I may pay my vows from day to day.'
      la:
      - type: citation
        text: '60:2 Exáudi, Deus, deprecatiónem meam: * inténde oratióni meæ.'
      - type: citation
        text: '60:3 A fínibus terræ ad te clamávi: * dum anxiarétur cor meum, in petra exaltásti me.'
      - type: citation
        text: '60:4 Deduxísti me, quia factus es spes mea: * turris fortitúdinis a fácie inimíci.'
      - type: citation
        text: '60:5 Inhabitábo in tabernáculo tuo in sǽcula: * prótegar in velaménto alárum tuárum.'
      - type: citation
        text: '60:6 Quóniam tu, Deus meus, exaudísti oratiónem meam: * dedísti hereditátem timéntibus nomen tuum.'
      - type: citation
        text: '60:7 Dies super dies regis adícies: * annos eius usque in diem generatiónis et generatiónis.'
      - type: citation
        text: '60:8 Pérmanet in ætérnum in conspéctu Dei: * misericórdiam et veritátem eius quis requíret?'
      - type: citation
        text: '60:9 Sic psalmum dicam nómini tuo in sǽculum sǽculi: * ut reddam vota mea de die in diem.'
      en2:
      - type: citation
        text: '60:2 O God, pay attention to my supplication: * be attentive to my prayer.'
      - type: citation
        text: '60:3 I cried out to you from the ends of the earth: * when my heart was in anguish, you exalted me on a rock.'
      - type: citation
        text: '60:4 You have led me, for you have been my hope: * a tower of strength before the face of the enemy.'
      - type: citation
        text: '60:5 I will dwell in your tabernacle forever: * I will be protected under the cover of your wings.'
      - type: citation
        text: '60:6 For you, my God, have listened to my prayer: * you have granted an inheritance to those who fear your name.'
      - type: citation
        text: '60:7 You will add days to the days of the king: * his years, even to the time of generation after generation.'
      - type: citation
        text: '60:8 He remains in eternity, in the sight of God: * who will long for his mercy and truth?'
      - type: citation
        text: '60:9 So I will compose a psalm to your name, forever and ever: * that I may repay my vows from day to day.'
  psalm.61-2-nonne-deo-subi-cta-erit-nima-mea-ab-ipso-en-0fcb4802d5:
    role: psalm
    content:
      en:
      - type: citation
        text: 61:2 Shall not my soul be subject to God? * for from him is my salvation.
      - type: citation
        text: '61:3 For he is my God and my saviour: * he is my protector, I shall be moved no more.'
      - type: citation
        text: 61:4 How long do you rush in upon a man? * you all kill, as if you were thrusting down a leaning wall, and a tottering fence.
      - type: citation
        text: '61:5 But they have thought to cast away my price; I ran in thirst: * they blessed with their mouth, but cursed with their heart.'
      - type: citation
        text: '61:6 But be thou, O my soul, subject to God: * for from him is my patience.'
      - type: citation
        text: '61:7 For he is my God and my saviour: * he is my helper, I shall not be moved.'
      - type: citation
        text: '61:8 In God is my salvation and my glory: * he is the God of my help, and my hope is in God.'
      - type: citation
        text: '61:9 Trust in him, all ye congregation of people: pour out your hearts before him. * God is our helper for ever.'
      - type: citation
        text: '61:10 But vain are the sons of men, the sons of men are liars in the balances: * that by vanity they may together deceive.'
      - type: citation
        text: '61:11 Trust not in iniquity, and cover not robberies: * if riches abound, set not your heart upon them.'
      - type: citation
        text: 61:12 God hath spoken once, these two things have I heard, that power belongeth to God, and mercy to thee, O Lord; * for thou wilt render to every man according to his works.
      la:
      - type: citation
        text: 61:2 Nonne Deo subiécta erit ánima mea? * ab ipso enim salutáre meum.
      - type: citation
        text: '61:3 Nam et ipse Deus meus, et salutáris meus: * suscéptor meus, non movébor ámplius.'
      - type: citation
        text: '61:4 Quoúsque irrúitis in hóminem? * interfícitis univérsi vos: tamquam paríeti inclináto et macériæ depúlsæ?'
      - type: citation
        text: '61:5 Verúmtamen prétium meum cogitavérunt repéllere, cucúrri in siti: * ore suo benedicébant, et corde suo maledicébant.'
      - type: citation
        text: '61:6 Verúmtamen Deo subiécta esto, ánima mea: * quóniam ab ipso patiéntia mea.'
      - type: citation
        text: '61:7 Quia ipse Deus meus, et salvátor meus: * adiútor meus, non emigrábo.'
      - type: citation
        text: '61:8 In Deo salutáre meum, et glória mea: * Deus auxílii mei, et spes mea in Deo est.'
      - type: citation
        text: '61:9 Speráte in eo omnis congregátio pópuli, effúndite coram illo corda vestra: * Deus adiútor noster in ætérnum.'
      - type: citation
        text: '61:10 Verúmtamen vani fílii hóminum, mendáces fílii hóminum in statéris: * ut decípiant ipsi de vanitáte in idípsum.'
      - type: citation
        text: '61:11 Nolíte speráre in iniquitáte, et rapínas nolíte concupíscere: * divítiæ si áffluant, nolíte cor appónere.'
      - type: citation
        text: '61:12 Semel locútus est Deus, duo hæc audívi, quia potéstas Dei est, et tibi, Dómine, misericórdia: * quia tu reddes unicuíque iuxta ópera sua.'
      en2:
      - type: citation
        text: 61:2 Will my soul not be subject to God? * For from him is my salvation.
      - type: citation
        text: '61:3 Yes, he himself is my God and my salvation: * he is my supporter; I will be moved no more.'
      - type: citation
        text: 61:4 How is it that you rush against a man? * Every one of you puts to death, as if you were pulling down a ruined wall, leaning over and falling apart.
      - type: citation
        text: '61:5 So, truly, they intended to reject my price; I ran in thirst: * they blessed with their mouth, and cursed with their heart.'
      - type: citation
        text: '61:6 Yet, truly, my soul will be subject to God: * for from him is my patience.'
      - type: citation
        text: '61:7 For he is my God and my Savior: * he is my helper; I will not be expelled.'
      - type: citation
        text: '61:8 In God is my salvation and my glory: * he is the God of my help, and my hope is in God.'
      - type: citation
        text: '61:9 All peoples gathered together, trust in him; pour out your hearts in his sight: * God is our helper for eternity.'
      - type: citation
        text: '61:10 So, truly, the sons of men are untrustworthy; the sons of men are liars in the scales: * so that, by emptiness, they may deceive among themselves.'
      - type: citation
        text: '61:11 Do not trust in iniquity, and do not desire plunder: * if riches flow toward you, do not be willing to set your heart on them.'
      - type: citation
        text: '61:12 God has spoken once; I have heard two things: that power belongs to God, and that mercy belongs to you, O Lord: * for you will repay each one according to his works.'
  psalm.62-2a-deus-deus-meus-ad-te-de-luce-v-gilo-1be106da20:
    role: psalm
    content:
      en:
      - type: citation
        text: 62:2a O God, my God, * to thee do I watch at break of day.
      - type: citation
        text: 62:2b For thee my soul hath thirsted; * for thee my flesh, O how many ways!
      - type: citation
        text: '62:3 In a desert land, and where there is no way, and no water: ‡ so in the sanctuary have I come before thee, * to see thy power and thy glory.'
      - type: citation
        text: '62:4 For thy mercy is better than lives: * thee my lips shall praise.'
      - type: citation
        text: '62:5 Thus will I bless thee all my life long: * and in thy name I will lift up my hands.'
      - type: citation
        text: '62:6 Let my soul be filled as with marrow and fatness: * and my mouth shall praise thee with joyful lips.'
      - type: citation
        text: '62:7 If I have remembered thee upon my bed, † I will meditate on thee in the morning: * (8a) because thou hast been my helper.'
      - type: citation
        text: '62:8b And I will rejoice under the covert of thy wings: † my soul hath stuck close to thee: * (9) thy right hand hath received me.'
      - type: citation
        text: '62:10 But they have sought my soul in vain, † they shall go into the lower parts of the earth: * (11) they shall be delivered into the hands of the sword, they shall be the portions of foxes.'
      - type: citation
        text: '62:12 But the king shall rejoice in God, all they shall be praised that swear by him: * because the mouth is stopped of them that speak wicked things.'
      la:
      - type: citation
        text: 62:2a Deus, Deus meus, * ad te de luce vígilo.
      - type: citation
        text: 62:2b Sitívit in te ánima mea, * quam multiplíciter tibi caro mea.
      - type: citation
        text: '62:3 In terra desérta, et ínvia, et inaquósa: ‡ sic in sancto appárui tibi, * ut vidérem virtútem tuam, et glóriam tuam.'
      - type: citation
        text: '62:4 Quóniam mélior est misericórdia tua super vitas: * lábia mea laudábunt te.'
      - type: citation
        text: '62:5 Sic benedícam te in vita mea: * et in nómine tuo levábo manus meas.'
      - type: citation
        text: '62:6 Sicut ádipe et pinguédine repleátur ánima mea: * et lábiis exsultatiónis laudábit os meum.'
      - type: citation
        text: '62:7 Si memor fui tui super stratum meum, † in matutínis meditábor in te: * (8a) quia fuísti adiútor meus.'
      - type: citation
        text: '62:8b Et in velaménto alárum tuárum exsultábo, † (9) adhǽsit ánima mea post te: * me suscépit déxtera tua.'
      - type: citation
        text: '62:10 Ipsi vero in vanum quæsiérunt ánimam meam, † introíbunt in inferióra terræ: * (11) tradéntur in manus gládii, partes vúlpium erunt.'
      - type: citation
        text: '62:12 Rex vero lætábitur in Deo, † laudabúntur omnes qui iurant in eo: * quia obstrúctum est os loquéntium iníqua.'
      en2:
      - type: citation
        text: 62:2a O God, my God, * to you I keep vigil until first light.
      - type: citation
        text: 62:2b My soul has thirsted for you, * how manifoldly for you is my flesh.
      - type: citation
        text: '62:3 In a deserted land, both inaccessible and waterless: ‡ so I have appeared in the sanctuary before you, * that I might behold your virtue and your glory.'
      - type: citation
        text: '62:4 For your mercy is better than life itself: * my lips will praise you.'
      - type: citation
        text: '62:5 So will I bless you in my life: * and in your name I will lift up my hands.'
      - type: citation
        text: '62:6 Let my soul be filled as if with marrow and fatness: * and my mouth will give praise with exultant lips.'
      - type: citation
        text: '62:7 When I have remembered you on my bed, † in the morning I will meditate on you: * (8a) for you have been my helper.'
      - type: citation
        text: '62:8b And I will exult under the cover of your wings, † (9) my soul has clung close to you: * your right hand has supported me.'
      - type: citation
        text: '62:10 Truly, these ones have sought my soul in vain, † they will enter into the lower parts of the earth: * (11) they will be delivered into the hand of the sword; they will be the portions of foxes.'
      - type: citation
        text: '62:12 Truly, the king will rejoice in God, † all those who swear by him will be praised: * for the mouth of those who speak iniquity has been blocked.'
  psalm.63-2-ex-udi-deus-orati-nem-meam-cum-d-precor-a-t-929c73f9fd:
    role: psalm
    content:
      en:
      - type: citation
        text: '63:2 Hear, O God, my prayer, when I make supplication to thee: * deliver my soul from the fear of the enemy.'
      - type: citation
        text: 63:3 Thou hast protected me from the assembly of the malignant; * from the multitude of the workers of iniquity.
      - type: citation
        text: 63:4 For they have whetted their tongues like a sword; * they have bent their bow a bitter thing, to shoot in secret the undefiled.
      - type: citation
        text: '63:6 They will shoot at him on a sudden, and will not fear: * they are resolute in wickedness.'
      - type: citation
        text: '63:6 They have talked of hiding snares; * they have said: Who shall see them?'
      - type: citation
        text: '63:7 They have searched after iniquities: * they have failed in their search.'
      - type: citation
        text: '63:7 Man shall come to a deep heart: * and God shall be exalted.'
      - type: citation
        text: '63:8 The arrows of children are their wounds: * and their tongues against them are made weak.'
      - type: citation
        text: 63:9 All that saw them were troubled; * and every man was afraid.
      - type: citation
        text: '63:10 And they declared the works of God: * and understood his doings.'
      - type: citation
        text: '63:11 The just shall rejoice in the Lord, and shall hope in him: * and all the upright in heart shall be praised.'
      la:
      - type: citation
        text: '63:2 Exáudi, Deus, oratiónem meam cum déprecor: * a timóre inimíci éripe ánimam meam.'
      - type: citation
        text: '63:3 Protexísti me a convéntu malignántium: * a multitúdine operántium iniquitátem.'
      - type: citation
        text: '63:4 Quia exacuérunt ut gládium linguas suas: * intendérunt arcum rem amáram, ut sagíttent in occúltis immaculátum.'
      - type: citation
        text: '63:6 Súbito sagittábunt eum, et non timébunt: * firmavérunt sibi sermónem nequam.'
      - type: citation
        text: '63:6 Narravérunt ut abscónderent láqueos: * dixérunt: Quis vidébit eos?'
      - type: citation
        text: '63:7 Scrutáti sunt iniquitátes: * defecérunt scrutántes scrutínio.'
      - type: citation
        text: '63:7 Accédet homo ad cor altum: * et exaltábitur Deus.'
      - type: citation
        text: '63:8 Sagíttæ parvulórum factæ sunt plagæ eórum: * et infirmátæ sunt contra eos linguæ eórum.'
      - type: citation
        text: '63:9 Conturbáti sunt omnes qui vidébant eos: * et tímuit omnis homo.'
      - type: citation
        text: 63:10 Et annuntiavérunt ópera Dei, * et facta eius intellexérunt.
      - type: citation
        text: 63:11 Lætábitur iustus in Dómino, et sperábit in eo, * et laudabúntur omnes recti corde.
      en2:
      - type: citation
        text: '63:2 Hear, O God, my prayer of supplication: * rescue my soul from the fear of the enemy.'
      - type: citation
        text: '63:3 You have protected me from the assembly of the malignant: * from a multitude of workers of iniquity.'
      - type: citation
        text: '63:4 For they have sharpened their tongues like a sword: * they have formed their bow into a bitter thing, so that they may shoot arrows from hiding at the immaculate.'
      - type: citation
        text: '63:6 They will suddenly shoot arrows at him, and they will not be afraid: * they are resolute in their wicked talk.'
      - type: citation
        text: '63:6 They have spoken so as to hide snares: * they said: Who will see them?'
      - type: citation
        text: '63:7 They have been searching carefully for iniquities: * their exhaustive search has failed.'
      - type: citation
        text: '63:7 Man will approach with a deep heart: * and God will be exalted.'
      - type: citation
        text: '63:8 The arrows of the little ones have become their wounds: * and their tongues have been weakened against them.'
      - type: citation
        text: '63:9 All those who saw them have been troubled: * and every man was afraid.'
      - type: citation
        text: 63:10 And they announced the works of God, * and they understood his acts.
      - type: citation
        text: 63:11 The just will rejoice in the Lord, and they will hope in him, * and all the upright of heart will be praised.
  psalm.64-2-te-decet-hymnus-deus-in-sion-et-tibi-redd-t-9ad079efe5:
    role: psalm
    content:
      en:
      - type: citation
        text: '64:2 A hymn, O God, becometh thee in Sion: * and a vow shall be paid to thee in Jerusalem.'
      - type: citation
        text: '64:3 O hear my prayer: * all flesh shall come to thee.'
      - type: citation
        text: '64:4 The words of the wicked have prevailed over us: * and thou wilt pardon our transgressions.'
      - type: citation
        text: '64:5 Blessed is he whom thou hast chosen and taken to thee: * he shall dwell in thy courts.'
      - type: citation
        text: 64:5 We shall be filled with the good things of thy house; holy is thy temple, * wonderful in justice.
      - type: citation
        text: 64:6 Hear us, O God our saviour, * who art the hope of all the ends of the earth, and in the sea afar off.
      - type: citation
        text: '64:7 Thou who preparest the mountains by thy strength, being girded with power: * who troublest the depth of the sea, the noise of its waves.'
      - type: citation
        text: '64:8 The Gentiles shall be troubled, and they that dwell in the uttermost borders shall be afraid at thy signs: * thou shalt make the outgoings of the morning and of the evening to be joyful.'
      - type: citation
        text: 64:10 Thou hast visited the earth, and hast plentifully watered it; * thou hast many ways enriched it.
      - type: citation
        text: 64:10 The river of God is filled with water, thou hast prepared their food; * for so is its preparation.
      - type: citation
        text: 64:11 Fill up plentifully the streams thereof, multiply its fruits; * it shall spring up and rejoice in its showers.
      - type: citation
        text: '64:12 Thou shalt bless the crown of the year of thy goodness: * and thy fields shall be filled with plenty.'
      - type: citation
        text: '64:13 The beautiful places of the wilderness shall grow fat: * and the hills shall be girded about with joy.'
      - type: citation
        text: '64:14 The rams of the flock are clothed, and the vales shall abound with corn: * they shall shout, yea they shall sing a hymn.'
      la:
      - type: citation
        text: '64:2 Te decet hymnus, Deus, in Sion: * et tibi reddétur votum in Ierúsalem.'
      - type: citation
        text: '64:3 Exáudi oratiónem meam: * ad te omnis caro véniet.'
      - type: citation
        text: '64:4 Verba iniquórum prævaluérunt super nos: * et impietátibus nostris tu propitiáberis.'
      - type: citation
        text: '64:5 Beátus, quem elegísti, et assumpsísti: * inhabitábit in átriis tuis.'
      - type: citation
        text: '64:5 Replébimur in bonis domus tuæ: * sanctum est templum tuum, mirábile in æquitáte.'
      - type: citation
        text: 64:6 Exáudi nos, Deus, salutáris noster, * spes ómnium fínium terræ, et in mari longe.
      - type: citation
        text: '64:7 Prǽparans montes in virtúte tua, accínctus poténtia: * qui contúrbas profúndum maris sonum flúctuum eius.'
      - type: citation
        text: '64:8 Turbabúntur gentes, et timébunt qui hábitant términos a signis tuis: * éxitus matutíni, et véspere delectábis.'
      - type: citation
        text: '64:10 Visitásti terram, et inebriásti eam: * multiplicásti locupletáre eam.'
      - type: citation
        text: '64:10 Flumen Dei replétum est aquis, parásti cibum illórum: * quóniam ita est præparátio eius.'
      - type: citation
        text: '64:11 Rivos eius inébria, multíplica genímina eius: * in stillicídiis eius lætábitur gérminans.'
      - type: citation
        text: '64:12 Benedíces corónæ anni benignitátis tuæ: * et campi tui replebúntur ubertáte.'
      - type: citation
        text: '64:13 Pinguéscent speciósa desérti: * et exsultatióne colles accingéntur.'
      - type: citation
        text: '64:14 Indúti sunt aríetes óvium, et valles abundábunt fruménto: * clamábunt, étenim hymnum dicent.'
      en2:
      - type: citation
        text: '64:2 O God, a hymn adorns you in Zion: * and a vow will be repaid to you in Jerusalem.'
      - type: citation
        text: '64:3 Hear my prayer: * all flesh will come to you.'
      - type: citation
        text: '64:4 Words of iniquity have prevailed over us: * and you will pardon our impieties.'
      - type: citation
        text: '64:5 Blessed is he whom you have chosen and taken up: * he will dwell in your courts.'
      - type: citation
        text: '64:5 We will be filled with the good things of your house: * holy is your temple, wonderful in equity.'
      - type: citation
        text: 64:6 Hear us, O God our Savior, * the hope of all the ends of the earth, and of a sea far away.
      - type: citation
        text: '64:7 You prepare the mountains in your virtue, wrapped with power: * you who stir up the depths of the sea, the noise of its waves.'
      - type: citation
        text: '64:8 The nations will be troubled, and those who dwell at the limits will be afraid before your signs: * you will make the passing of morning and evening enjoyable.'
      - type: citation
        text: '64:10 You have visited the earth, and you have saturated it: * you have enriched it in so many ways.'
      - type: citation
        text: '64:10 The river of God has been filled with water; you have prepared their food: * for thus is its preparation.'
      - type: citation
        text: 64:11 Drench its streams, multiply its fruits; * it will spring up and rejoice in its showers.
      - type: citation
        text: 64:12 You will bless the crown of the year with your kindness, * and your fields will be filled with abundance.
      - type: citation
        text: 64:13 The beauty of the desert will fatten, * and the hills will be wrapped with exultation.
      - type: citation
        text: '64:14 The rams of the sheep have been clothed, and the valleys will abound with grain: * they will cry out; yes, they will even utter a hymn.'
  psalm.65-1-iubil-te-deo-omnis-terra-psalmum-d-cite-n-m-83f5aa1a9b:
    role: psalm
    content:
      en:
      - type: citation
        text: 65:1 Shout with joy to God, all the earth, sing ye a psalm to his name; * give glory to his praise.
      - type: citation
        text: 65:3 Say unto God, How terrible are thy works, O Lord! * in the multitude of thy strength thy enemies shall lie to thee.
      - type: citation
        text: '65:4 Let all the earth adore thee, * and sing to thee: let it sing a psalm to thy name.'
      - type: citation
        text: 65:5 Come and see the works of God; * who is terrible in his counsels over the sons of men.
      - type: citation
        text: '65:6 Who turneth the sea into dry land, in the river they shall pass on foot: * there shall we rejoice in him.'
      - type: citation
        text: '65:7 Who by his power ruleth for ever: his eyes behold the nations; * let not them that provoke him be exalted in themselves.'
      - type: citation
        text: '65:8 O bless our God, ye Gentiles: * and make the voice of his praise to be heard.'
      - type: citation
        text: '65:9 Who hath set my soul to live: * and hath not suffered my feet to be moved:'
      - type: citation
        text: '65:10 For thou, O God, hast proved us: * thou hast tried us by fire, as silver is tried.'
      - type: citation
        text: '65:11 Thou hast brought us into a net, thou hast laid afflictions on our back: * thou hast set men over our heads.'
      - type: citation
        text: 65:12 We have passed through fire and water, * and thou hast brought us out into a refreshment.
      - type: citation
        text: '65:13 I will go into thy house with burnt offerings: * I will pay thee my vows, which my lips have uttered,'
      - type: citation
        text: 65:14 And my mouth hath spoken, * when I was in trouble.
      - type: citation
        text: '65:15 I will offer up to thee holocausts full of marrow, with burnt offerings of rams: * I will offer to thee bullocks with goats.'
      - type: citation
        text: 65:16 Come and hear, all ye that fear God, * and I will tell you what great things he hath done for my soul.
      - type: citation
        text: '65:17 I cried to him with my mouth: * and I extolled him with my tongue.'
      - type: citation
        text: 65:18 If I have looked at iniquity in my heart, * the Lord will not hear me.
      - type: citation
        text: 65:19 Therefore hath God heard me, * and hath attended to the voice of my supplication.
      - type: citation
        text: 65:20 Blessed be God, * who hath not turned away my prayer, nor his mercy from me.
      la:
      - type: citation
        text: '65:1 Iubiláte Deo, omnis terra, psalmum dícite nómini eius: * date glóriam laudi eius.'
      - type: citation
        text: '65:3 Dícite Deo: Quam terribília sunt ópera tua, Dómine! * in multitúdine virtútis tuæ mentiéntur tibi inimíci tui.'
      - type: citation
        text: '65:4 Omnis terra adóret te, et psallat tibi: * psalmum dicat nómini tuo.'
      - type: citation
        text: '65:5 Veníte, et vidéte ópera Dei: * terríbilis in consíliis super fílios hóminum.'
      - type: citation
        text: '65:6 Qui convértit mare in áridam, in flúmine pertransíbunt pede: * ibi lætábimur in ipso.'
      - type: citation
        text: '65:7 Qui dominátur in virtúte sua in ætérnum, óculi eius super gentes respíciunt: * qui exásperant non exalténtur in semetípsis.'
      - type: citation
        text: '65:8 Benedícite, gentes, Deum nostrum: * et audítam fácite vocem laudis eius,'
      - type: citation
        text: '65:9 Qui pósuit ánimam meam ad vitam: * et non dedit in commotiónem pedes meos.'
      - type: citation
        text: '65:10 Quóniam probásti nos, Deus: * igne nos examinásti, sicut examinátur argéntum.'
      - type: citation
        text: '65:11 Induxísti nos in láqueum, posuísti tribulatiónes in dorso nostro: * imposuísti hómines super cápita nostra.'
      - type: citation
        text: '65:12 Transívimus per ignem et aquam: * et eduxísti nos in refrigérium.'
      - type: citation
        text: '65:13 Introíbo in domum tuam in holocáustis: * reddam tibi vota mea, quæ distinxérunt lábia mea.'
      - type: citation
        text: 65:14 Et locútum est os meum, * in tribulatióne mea.
      - type: citation
        text: '65:15 Holocáusta medulláta ófferam tibi cum incénso aríetum: * ófferam tibi boves cum hircis.'
      - type: citation
        text: '65:16 Veníte, audíte, et narrábo, omnes, qui timétis Deum: * quanta fecit ánimæ meæ.'
      - type: citation
        text: 65:17 Ad ipsum ore meo clamávi, * et exaltávi sub lingua mea.
      - type: citation
        text: 65:18 Iniquitátem si aspéxi in corde meo, * non exáudiet Dóminus.
      - type: citation
        text: 65:19 Proptérea exaudívit Deus, * et atténdit voci deprecatiónis meæ.
      - type: citation
        text: 65:20 Benedíctus Deus, * qui non amóvit oratiónem meam, et misericórdiam suam a me.
      en2:
      - type: citation
        text: '65:1 Shout joyfully to God, all the earth, sing a psalm to his name: * give glory to his praise.'
      - type: citation
        text: '65:3 Exclaim to God: How terrible are your works, O Lord! * according to the fullness of your virtue, your enemies will speak lies about you.'
      - type: citation
        text: '65:4 Let all the earth adore you and sing psalms to you: * may it sing a psalm to your name.'
      - type: citation
        text: '65:5 Draw near and see the works of God: * who is terrible in his counsels over the sons of men.'
      - type: citation
        text: '65:6 He converts the sea into dry land; they will cross the river on foot: * there, we will rejoice in him.'
      - type: citation
        text: '65:7 He rules by his virtue for eternity; his eyes gaze upon the nations: * may those who exasperate him not be exalted in themselves.'
      - type: citation
        text: '65:8 Bless our God, you Gentiles: * and make the voice of his praise be heard,'
      - type: citation
        text: '65:9 He has set my soul toward life: * and he has granted that my feet may not be shaken.'
      - type: citation
        text: '65:10 For you, O God, have tested us: * you have examined us by fire, just as silver is examined.'
      - type: citation
        text: '65:11 You have led us into a snare; you have placed tribulations on our back: * you have set men over our heads.'
      - type: citation
        text: '65:12 We have crossed through fire and water: * and you have led us out to refreshment.'
      - type: citation
        text: '65:13 I will enter your house with holocausts: * I will repay my vows to you, which my lips discerned.'
      - type: citation
        text: 65:14 And my mouth spoke, * in my tribulation.
      - type: citation
        text: '65:15 I will offer to you holocausts full of marrow, with the burnt offerings of rams: * I will offer to you bulls as well as goats.'
      - type: citation
        text: '65:16 Draw near and listen, all you who fear God: * I will describe to you how much he has done for my soul.'
      - type: citation
        text: 65:17 I cried out to him with my mouth, * and I extolled him under my breath.
      - type: citation
        text: 65:18 If I have seen iniquity in my heart, * the Lord would not heed me.
      - type: citation
        text: 65:19 And yet, God has heeded me, * and he has attended to the voice of my supplication.
      - type: citation
        text: 65:20 Blessed is God, * who has not removed my prayer, nor his mercy, from me.
  psalm.66-2-deus-misere-tur-nostri-et-bened-cat-nobis-i-a15fdb6836:
    role: psalm
    content:
      en:
      - type: citation
        text: '66:2 May God have mercy on us, and bless us: * may he cause the light of his countenance to shine upon us, and may he have mercy on us.'
      - type: citation
        text: '66:3 That we may know thy way upon earth: * thy salvation in all nations.'
      - type: citation
        text: '66:4 Let people confess to thee, O God: * let all people give praise to thee.'
      - type: citation
        text: '66:5 Let the nations be glad and rejoice: * for thou judgest the people with justice, and directest the nations upon earth.'
      - type: citation
        text: '66:6 Let the people, O God, confess to thee: * (7a) let all the people give praise to thee: the earth hath yielded her fruit.'
      - type: citation
        text: '66:7b May God, our God bless us, (8) may God bless us: * and all the ends of the earth fear him.'
      la:
      - type: citation
        text: '66:2 Deus misereátur nostri, et benedícat nobis: * illúminet vultum suum super nos, et misereátur nostri.'
      - type: citation
        text: 66:3 Ut cognoscámus in terra viam tuam, * in ómnibus géntibus salutáre tuum.
      - type: citation
        text: '66:4 Confiteántur tibi pópuli, Deus: * confiteántur tibi pópuli omnes.'
      - type: citation
        text: '66:5 Læténtur et exsúltent gentes: * quóniam iúdicas pópulos in æquitáte, et gentes in terra dírigis.'
      - type: citation
        text: '66:6 Confiteántur tibi pópuli, Deus, confiteántur tibi pópuli omnes: * (7a) terra dedit fructum suum.'
      - type: citation
        text: '66:7b Benedícat nos Deus, Deus noster, (8) benedícat nos Deus: * et métuant eum omnes fines terræ.'
      en2:
      - type: citation
        text: '66:2 May God have mercy on us and bless us: * may he shine his countenance upon us, and may he have mercy on us.'
      - type: citation
        text: 66:3 So may we know your way upon the earth, * your salvation among all nations.
      - type: citation
        text: '66:4 Let the peoples confess to you, O God: * let all the peoples confess to you.'
      - type: citation
        text: '66:5 May the nations rejoice and exult: * for you judge the peoples with equity, and you direct the nations on earth.'
      - type: citation
        text: '66:6 Let the peoples confess to you, O God, let all the peoples confess to you: * (7a) the earth has provided her fruit.'
      - type: citation
        text: '66:7b May God, our God, bless us, (8) may God bless us: * and may all the ends of the earth fear him.'
  psalm.67-2-exs-rgat-deus-et-dissip-ntur-inim-ci-eius-e-9e4a574521:
    role: psalm
    content:
      en:
      - type: citation
        text: '67:2 Let God arise, and let his enemies be scattered: * and let them that hate him flee from before his face.'
      - type: citation
        text: '67:3 As smoke vanisheth, so let them vanish away: * as wax melteth before the fire, so let the wicked perish at the presence of God.'
      - type: citation
        text: '67:4 And let the just feast, and rejoice before God: * and be delighted with gladness.'
      - type: citation
        text: '67:5a Sing ye to God, sing a psalm to his name, * make a way for him who ascendeth upon the west: (bow head) the Lord is his name.'
      - type: citation
        text: '67:5b Rejoice ye before him: * but the wicked shall be troubled at his presence, (6a) who is the father of orphans, and the judge of widows.'
      - type: citation
        text: '67:6b God in his holy place: * (7a) God who maketh men of one manner to dwell in a house:'
      - type: citation
        text: 67:7b Who bringeth out them that were bound in strength; * in like manner them that provoke, that dwell in sepulchres.
      - type: citation
        text: '67:8 O God, when thou didst go forth in the sight of thy people, * when thou didst pass through the desert:'
      - type: citation
        text: 67:9 The earth was moved, and the heavens dropped at the presence of the God of Sinai, * at the presence of the God of Israel.
      - type: citation
        text: '67:10 Thou shalt set aside for thy inheritance a free rain, * O God: and it was weakened, but thou hast made it perfect.'
      - type: citation
        text: 67:11 In it shall thy animals dwell; * in thy sweetness, O God, thou hast provided for the poor.
      - type: citation
        text: 67:12 The Lord shall give the word to them that preach good tidings, * with great power.
      - type: citation
        text: 67:13 The king of powers is of the beloved, * of the beloved; and the beauty of the house shall divide spoils.
      - type: citation
        text: 67:14 If you sleep among the midst of lots, you shall be as the wings of a dove covered with silver, * and the hinder parts of her back with the paleness of gold.
      - type: citation
        text: 67:15 When he that is in heaven appointeth kings over her, they shall be whited with snow in Selmon. * (16a) The mountain of God is a fat mountain,
      - type: citation
        text: 67:16b a curdled mountain, a fat mountain; * (17a) Why suspect, ye curdled mountains?
      - type: citation
        text: '67:17b A mountain in which God is well pleased to dwell: * for there the Lord shall dwell unto the end.'
      - type: citation
        text: '67:18 The chariot of God is attended by ten thousands; thousands of them that rejoice: * the Lord is among them in Sinai, in the holy place.'
      - type: citation
        text: 67:19a Thou hast ascended on high, thou hast led captivity captive; * thou hast received gifts in men.
      - type: citation
        text: 67:19b Yea for those also that do not believe, * the dwelling of the Lord God.
      - type: citation
        text: '67:20 Blessed be the Lord day by day: * the God of our salvation will make our journey prosperous to us.'
      - type: citation
        text: '67:21 Our God is the God of salvation: * and of the Lord, of the Lord are the issues from death.'
      - type: citation
        text: '67:22 But God shall break the heads of his enemies: * the hairy crown of them that walk on in their sins.'
      - type: citation
        text: '67:23 The Lord said: I will turn them from Basan, * I will turn them into the depth of the sea:'
      - type: citation
        text: 67:24 That thy foot may be dipped in the blood of thy enemies; * the tongue of thy dogs be red with the same.
      - type: citation
        text: '67:25 They have seen thy goings, O God, * the goings of my God: of my king who is in his sanctuary.'
      - type: citation
        text: 67:26 Princes went before joined with singers, * in the midst of young damsels playing on timbrels.
      - type: citation
        text: 67:27 In the churches bless ye God the Lord, * from the fountains of Israel.
      - type: citation
        text: 67:28a There is Benjamin a youth, * in ecstasy of mind.
      - type: citation
        text: '67:28b The princes of Juda are their leaders: * the princes of Zabulon, the princes of Nephthali.'
      - type: citation
        text: '67:29 Command thy strength, O God: * confirm, O God, what thou hast wrought in us.'
      - type: citation
        text: 67:30 From thy temple in Jerusalem, * kings shall offer presents to thee.
      - type: citation
        text: 67:31a Rebuke the wild beasts of the reeds, the congregation of bulls with the kine of the people; * who seek to exclude them who are tried with silver.
      - type: citation
        text: '67:31b Scatter thou the nations that delight in wars: (32) ambassadors shall come out of Egypt: * Ethiopia shall soon stretch out her hands to God.'
      - type: citation
        text: '67:33a Sing to God, ye kingdoms of the earth: * sing ye to the Lord:'
      - type: citation
        text: 67:33b Sing ye to God, (34a) who mounteth above the heaven of heavens, * to the east.
      - type: citation
        text: '67:34b Behold he will give to his voice the voice of power: (35) give ye glory to God for Israel, * his magnificence, and his power is in the clouds.'
      - type: citation
        text: '67:36 God is wonderful in his saints: the God of Israel is he who will give power and strength to his people; * blessed be God.'
      la:
      - type: citation
        text: 67:2 Exsúrgat Deus, et dissipéntur inimíci eius, * et fúgiant qui odérunt eum, a fácie eius.
      - type: citation
        text: '67:3 Sicut déficit fumus, defíciant: * sicut fluit cera a fácie ignis, sic péreant peccatóres a fácie Dei.'
      - type: citation
        text: '67:4 Et iusti epuléntur, et exsúltent in conspéctu Dei: * et delecténtur in lætítia.'
      - type: citation
        text: '67:5a Cantáte Deo, psalmum dícite nómini eius: * iter fácite ei, qui ascéndit super occásum: (fit reverentia) Dóminus nomen illi.'
      - type: citation
        text: '67:5b Exsultáte in conspéctu eius: * turbabúntur a fácie eius, (6a) patris orphanórum et iúdicis viduárum.'
      - type: citation
        text: '67:6b Deus in loco sancto suo: * (7a) Deus, qui inhabitáre facit uníus moris in domo:'
      - type: citation
        text: 67:7b Qui edúcit vinctos in fortitúdine, * simíliter eos qui exásperant, qui hábitant in sepúlcris.
      - type: citation
        text: '67:8 Deus, cum egrederéris in conspéctu pópuli tui, * cum pertransíres in desérto:'
      - type: citation
        text: 67:9 Terra mota est, étenim cæli distillavérunt a fácie Dei Sínai, * a fácie Dei Israël.
      - type: citation
        text: '67:10 Plúviam voluntáriam segregábis, Deus, hereditáti tuæ: * et infirmáta est, tu vero perfecísti eam.'
      - type: citation
        text: '67:11 Animália tua habitábunt in ea: * parásti in dulcédine tua páuperi, Deus.'
      - type: citation
        text: 67:12 Dóminus dabit verbum evangelizántibus, * virtúte multa.
      - type: citation
        text: '67:13 Rex virtútum dilécti, dilécti: * et speciéi domus divídere spólia.'
      - type: citation
        text: 67:14 Si dormiátis inter médios cleros, pennæ colúmbæ deargentátæ, * et posterióra dorsi eius in pallóre auri.
      - type: citation
        text: '67:15 Dum discérnit cæléstis reges super eam, nive dealbabúntur in Selmon: * (16a) mons Dei, mons pinguis.'
      - type: citation
        text: '67:16b Mons coagulátus, mons pinguis: * (17a) ut quid suspicámini montes coagulátos?'
      - type: citation
        text: '67:17b Mons, in quo beneplácitum est Deo habitáre in eo: * étenim Dóminus habitábit in finem.'
      - type: citation
        text: '67:18 Currus Dei decem míllibus múltiplex, míllia lætántium: * Dóminus in eis in Sina in sancto.'
      - type: citation
        text: '67:19a Ascendísti in altum, cepísti captivitátem: * accepísti dona in homínibus.'
      - type: citation
        text: 67:19b Étenim non credéntes, * inhabitáre Dóminum Deum.
      - type: citation
        text: '67:20 Benedíctus Dóminus die cotídie: * prósperum iter fáciet nobis Deus salutárium nostrórum.'
      - type: citation
        text: '67:21 Deus noster, Deus salvos faciéndi: * et Dómini Dómini éxitus mortis.'
      - type: citation
        text: '67:22 Verúmtamen Deus confrínget cápita inimicórum suórum: * vérticem capílli perambulántium in delíctis suis.'
      - type: citation
        text: '67:23 Dixit Dóminus: Ex Basan convértam, * convértam in profúndum maris:'
      - type: citation
        text: '67:24 Ut intingátur pes tuus in sánguine: * lingua canum tuórum ex inimícis, ab ipso.'
      - type: citation
        text: '67:25 Vidérunt ingréssus tuos, Deus: * ingréssus Dei mei: regis mei qui est in sancto.'
      - type: citation
        text: '67:26 Prævenérunt príncipes coniúncti psalléntibus: * in médio iuvenculárum tympanistriárum.'
      - type: citation
        text: 67:27 In ecclésiis benedícite Deo Dómino, * de fóntibus Israël.
      - type: citation
        text: '67:28a Ibi Béniamin adolescéntulus: * in mentis excéssu.'
      - type: citation
        text: '67:28b Príncipes Iuda, duces eórum: * príncipes Zábulon, príncipes Néphtali.'
      - type: citation
        text: '67:29 Manda, Deus, virtúti tuæ: * confírma hoc, Deus, quod operátus es in nobis.'
      - type: citation
        text: 67:30 A templo tuo in Ierúsalem, * tibi ófferent reges múnera.
      - type: citation
        text: '67:31a Íncrepa feras arúndinis, congregátio taurórum in vaccis populórum: * ut exclúdant eos, qui probáti sunt argénto.'
      - type: citation
        text: '67:31b Díssipa gentes, quæ bella volunt: (32) vénient legáti ex Ægýpto: * Æthiópia prævéniet manus eius Deo.'
      - type: citation
        text: '67:33a Regna terræ, cantáte Deo: * psállite Dómino.'
      - type: citation
        text: 67:33b Psállite Deo, (34a) qui ascéndit super cælum cæli, * ad Oriéntem.
      - type: citation
        text: 67:34b Ecce dabit voci suæ vocem virtútis, (35) date glóriam Deo super Israël, * magnificéntia eius, et virtus eius in núbibus.
      - type: citation
        text: 67:36 Mirábilis Deus in sanctis suis, Deus Israël ipse dabit virtútem, et fortitúdinem plebi suæ, * benedíctus Deus.
      en2:
      - type: citation
        text: 67:2 May God rise up, and may his enemies be scattered, * and may those who hate him flee from before his face.
      - type: citation
        text: '67:3 Just as smoke vanishes, so may they vanish: * just as wax flows away before the face of fire, so may sinners pass away before the face of God.'
      - type: citation
        text: '67:4 And so, let the just feast and let them exult in the sight of God: * and be delighted in gladness.'
      - type: citation
        text: '67:5a Sing to God, sing a psalm to his name: * make a path for him who ascends over the west: (bow) the Lord is his name.'
      - type: citation
        text: '67:5b Exult in his sight: * they will be troubled before his face, (6a) the father of orphans and the judge of widows.'
      - type: citation
        text: '67:6b God is in his holy place: * (7a) God who makes men dwell in a house under one custom:'
      - type: citation
        text: 67:7b He leads out those who are strongly bound, * likewise those who exasperate, who dwell in tombs.
      - type: citation
        text: '67:8 O God, when you departed in the sight of your people, * when you passed through the desert:'
      - type: citation
        text: 67:9 the earth was moved, for the heavens rained down before the face of the God of Sinai, * before the face of the God of Israel.
      - type: citation
        text: '67:10 You will set aside for your inheritance, O God, a willing rain: * and though it was weak, truly, you have made it perfect.'
      - type: citation
        text: '67:11 Your animals will dwell in it: * O God, in your sweetness, you have provided for the poor.'
      - type: citation
        text: 67:12 The Lord will give the word to those who proclaim the good news, * with great virtue.
      - type: citation
        text: '67:13 The King of virtue is beloved among the beloved: * and the beauty of the house will divide the spoils.'
      - type: citation
        text: 67:14 If you take your rest in the midst of the clergy, you will be like a dove whose wings are covered with fine silver, * and the feathers of its back with the pallor of gold.
      - type: citation
        text: '67:15 When heaven discerns kings to be over her, they will be whitened with the snows of Zalmon: * (16a) the mountain of God is a fat mountain.'
      - type: citation
        text: '67:16b A dense mountain, a fat mountain: * (17a) so then, why are you distrustful of dense mountains?'
      - type: citation
        text: '67:17b The mountain on which God is well pleased to dwell: * for even there, the Lord will dwell until the end.'
      - type: citation
        text: '67:18 The chariot of God is ten-thousandfold, thousands rejoicing: * the Lord is with them in Sinai, in the holy place.'
      - type: citation
        text: '67:19a You have ascended on high; you have taken captivity captive: * you have accepted gifts among men.'
      - type: citation
        text: 67:19b For even those who do not believe * dwell with the Lord God.
      - type: citation
        text: '67:20 Blessed is the Lord, day after day: * the God of our salvation will make our journey prosper for us.'
      - type: citation
        text: '67:21 Our God is the God who will bring about our salvation: * and our Lord is the Lord who has brought an end to death.'
      - type: citation
        text: '67:22 So then, truly, God will break the heads of his enemies: * the hairy skull of those who wander around in their offenses.'
      - type: citation
        text: '67:23 The Lord said: I will turn them away from Bashan, * I will turn them into the depths of the sea:'
      - type: citation
        text: '67:24 so that your feet may be soaked in blood: * so that the tongue of your dogs may be soaked with the same, from the enemies.'
      - type: citation
        text: '67:25 O God, they have seen your arrival: * the arrival of my God, of my king who is in the holy place.'
      - type: citation
        text: '67:26 The leaders went ahead, united with the singers of psalms: * in the midst of young women playing on timbrels.'
      - type: citation
        text: 67:27 In the churches, bless the Lord God, * from the fountains of Israel.
      - type: citation
        text: '67:28a There is Benjamin, a youth: * in ecstasy of mind.'
      - type: citation
        text: '67:28b The leaders of Judah, their governors: * the leaders of Zebulun, the leaders of Naphtali.'
      - type: citation
        text: '67:29 Command by your virtue, O God: * confirm in this place, O God, what you have wrought in us.'
      - type: citation
        text: 67:30 Before your temple in Jerusalem, * kings will offer gifts to you.
      - type: citation
        text: '67:31a Rebuke the wild beasts of the reeds, the congregation of bulls with the cows of the peoples: * so that those who have been tested like silver may not be excluded.'
      - type: citation
        text: '67:31b Scatter the nations that desire wars: (32) ambassadors will come out of Egypt: * Ethiopia will offer in advance her hands to God.'
      - type: citation
        text: '67:33a O kingdoms of the earth, sing to God: * sing psalms to the Lord.'
      - type: citation
        text: 67:33b Sing psalms to God, (34a) who ascends to the heaven of the heavens, * toward the east.
      - type: citation
        text: 67:34b Behold, he will utter his voice, the voice of virtue, (35) give glory to God beyond Israel, * his magnificence and his virtue is in the clouds.
      - type: citation
        text: '67:36 God is wonderful in his saints; the God of Israel himself will give virtue and strength to his people: * blessed is God.'
  psalm.68-2-salvum-me-fac-deus-qu-niam-intrav-runt-aqu-0011d0b7e2:
    role: psalm
    content:
      en:
      - type: citation
        text: '68:2 Save me, O God: * for the waters are come in even unto my soul.'
      - type: citation
        text: '68:3 I stick fast in the mire of the deep: * and there is no sure standing.'
      - type: citation
        text: '68:3 I am come into the depth of the sea: * and a tempest hath overwhelmed me.'
      - type: citation
        text: '68:4 I have laboured with crying; my jaws are become hoarse: * my eyes have failed, whilst I hope in my God.'
      - type: citation
        text: 68:5 They are multiplied above the hairs of my head, * who hate me without cause.
      - type: citation
        text: '68:5 My enemies are grown strong who have wrongfully persecuted me: * then did I pay that which I took not away.'
      - type: citation
        text: 68:6 O God, thou knowest my foolishness; * and my offences are not hidden from thee.
      - type: citation
        text: 68:7 Let not them be ashamed for me, who look for thee, O Lord, * the Lord of hosts.
      - type: citation
        text: 68:7 Let them not be confounded on my account, * who seek thee, O God of Israel.
      - type: citation
        text: 68:8 Because for thy sake I have borne reproach; * shame hath covered my face.
      - type: citation
        text: 68:9 I am become a stranger to my brethren, * and an alien to the sons of my mother.
      - type: citation
        text: '68:10 For the zeal of thy house hath eaten me up: * and the reproaches of them that reproached thee are fallen upon me.'
      - type: citation
        text: '68:11 And I covered my soul in fasting: * and it was made a reproach to me.'
      - type: citation
        text: '68:12 And I made haircloth my garment: * and I became a byword to them.'
      - type: citation
        text: '68:13 They that sat in the gate spoke against me: * and they that drank wine made me their song.'
      - type: citation
        text: 68:13 But as for me, my prayer is to thee, O Lord; * for the time of thy good pleasure, O God.
      - type: citation
        text: 68:14 In the multitude of thy mercy hear me, * in the truth of thy salvation.
      - type: citation
        text: '68:15 Draw me out of the mire, that I may not stick fast: * deliver me from them that hate me, and out of the deep waters.'
      - type: citation
        text: '68:16 Let not the tempest of water drown me, nor the deep swallow me up: * and let not the pit shut her mouth upon me.'
      - type: citation
        text: 68:17 Hear me, O Lord, for thy mercy is kind; * look upon me according to the multitude of thy tender mercies.
      - type: citation
        text: '68:18 And turn not away thy face from thy servant: * for I am in trouble, hear me speedily.'
      - type: citation
        text: '68:19 Attend to my soul, and deliver it: * save me because of my enemies.'
      - type: citation
        text: 68:20 Thou knowest my reproach, and my confusion, * and my shame.
      - type: citation
        text: 68:21 In thy sight are all they that afflict me; * my heart hath expected reproach and misery.
      - type: citation
        text: '68:21 And I looked for one that would grieve together with me, * but there was none: and for one that would comfort me, and I found none.'
      - type: citation
        text: 68:22 And they gave me gall for my food, * and in my thirst they gave me vinegar to drink.
      - type: citation
        text: 68:23 Let their table become as a snare before them, * and a recompense, and a stumblingblock.
      - type: citation
        text: 68:24 Let their eyes be darkened that they see not; * and their back bend thou down always.
      - type: citation
        text: '68:25 Pour out thy indignation upon them: * and let thy wrathful anger take hold of them.'
      - type: citation
        text: '68:26 Let their habitation be made desolate: * and let there be none to dwell in their tabernacles.'
      - type: citation
        text: 68:27 Because they have persecuted him whom thou hast smitten; * and they have added to the grief of my wounds.
      - type: citation
        text: '68:28 Add thou iniquity upon their iniquity: * and let them not come into thy justice.'
      - type: citation
        text: 68:29 Let them be blotted out of the book of the living; * and with the just let them not be written.
      - type: citation
        text: '68:30 I am poor and sorrowful: * thy salvation, O God, hath set me up.'
      - type: citation
        text: '68:31 I will praise the name of God with a canticle: * and I will magnify him with praise.'
      - type: citation
        text: 68:32 And it shall please God better than a young calf, * that bringeth forth horns and hoofs.
      - type: citation
        text: '68:33 Let the poor see and rejoice: * seek ye God, and your soul shall live.'
      - type: citation
        text: '68:34 For the Lord hath heard the poor: * and hath not despised his prisoners.'
      - type: citation
        text: 68:35 Let the heavens and the earth praise him; * the sea, and every thing that creepeth therein.
      - type: citation
        text: 68:36 For God will save Sion, * and the cities of Juda shall be built up.
      - type: citation
        text: 68:36 And they shall dwell there, * and acquire it by inheritance.
      - type: citation
        text: 68:37 And the seed of his servants shall possess it; * and they that love his name shall dwell therein.
      la:
      - type: citation
        text: '68:2 Salvum me fac, Deus: * quóniam intravérunt aquæ usque ad ánimam meam.'
      - type: citation
        text: '68:3 Infíxus sum in limo profúndi: * et non est substántia.'
      - type: citation
        text: '68:3 Veni in altitúdinem maris: * et tempéstas demérsit me.'
      - type: citation
        text: '68:4 Laborávi clamans, raucæ factæ sunt fauces meæ: * defecérunt óculi mei, dum spero in Deum meum.'
      - type: citation
        text: 68:5 Multiplicáti sunt super capíllos cápitis mei, * qui odérunt me gratis.
      - type: citation
        text: '68:5 Confortáti sunt qui persecúti sunt me inimíci mei iniúste: * quæ non rápui, tunc exsolvébam.'
      - type: citation
        text: '68:6 Deus, tu scis insipiéntiam meam: * et delícta mea a te non sunt abscóndita.'
      - type: citation
        text: 68:7 Non erubéscant in me qui exspéctant te, Dómine, * Dómine virtútum.
      - type: citation
        text: 68:7 Non confundántur super me * qui quærunt te, Deus Israël.
      - type: citation
        text: '68:8 Quóniam propter te sustínui oppróbrium: * opéruit confúsio fáciem meam.'
      - type: citation
        text: 68:9 Extráneus factus sum frátribus meis, * et peregrínus fíliis matris meæ.
      - type: citation
        text: '68:10 Quóniam zelus domus tuæ comédit me: * et oppróbria exprobrántium tibi cecidérunt super me.'
      - type: citation
        text: '68:11 Et opérui in ieiúnio ánimam meam: * et factum est in oppróbrium mihi.'
      - type: citation
        text: '68:12 Et pósui vestiméntum meum cilícium: * et factus sum illis in parábolam.'
      - type: citation
        text: '68:13 Advérsum me loquebántur, qui sedébant in porta: * et in me psallébant qui bibébant vinum.'
      - type: citation
        text: '68:13 Ego vero oratiónem meam ad te, Dómine: * tempus benepláciti, Deus.'
      - type: citation
        text: '68:14 In multitúdine misericórdiæ tuæ exáudi me, * in veritáte salútis tuæ:'
      - type: citation
        text: '68:15 Éripe me de luto, ut non infígar: * líbera me ab iis, qui odérunt me, et de profúndis aquárum.'
      - type: citation
        text: '68:16 Non me demérgat tempéstas aquæ, neque absórbeat me profúndum: * neque úrgeat super me púteus os suum.'
      - type: citation
        text: '68:17 Exáudi me, Dómine, quóniam benígna est misericórdia tua: * secúndum multitúdinem miseratiónum tuárum réspice in me.'
      - type: citation
        text: '68:18 Et ne avértas fáciem tuam a púero tuo: * quóniam tríbulor, velóciter exáudi me.'
      - type: citation
        text: '68:19 Inténde ánimæ meæ, et líbera eam: * propter inimícos meos éripe me.'
      - type: citation
        text: 68:20 Tu scis impropérium meum, et confusiónem meam, * et reveréntiam meam.
      - type: citation
        text: '68:21 In conspéctu tuo sunt omnes qui tríbulant me: * impropérium exspectávit cor meum, et misériam.'
      - type: citation
        text: '68:21 Et sustínui qui simul contristarétur, et non fuit: * et qui consolarétur, et non invéni.'
      - type: citation
        text: '68:22 Et dedérunt in escam meam fel: * et in siti mea potavérunt me acéto.'
      - type: citation
        text: 68:23 Fiat mensa eórum coram ipsis in láqueum, * et in retributiónes, et in scándalum.
      - type: citation
        text: '68:24 Obscuréntur óculi eórum ne vídeant: * et dorsum eórum semper incúrva.'
      - type: citation
        text: '68:25 Effúnde super eos iram tuam: * et furor iræ tuæ comprehéndat eos.'
      - type: citation
        text: '68:26 Fiat habitátio eórum desérta: * et in tabernáculis eórum non sit qui inhábitet.'
      - type: citation
        text: '68:27 Quóniam quem tu percussísti, persecúti sunt: * et super dolórem vúlnerum meórum addidérunt.'
      - type: citation
        text: '68:28 Appóne iniquitátem super iniquitátem eórum: * et non intrent in iustítiam tuam.'
      - type: citation
        text: '68:29 Deleántur de libro vivéntium: * et cum iustis non scribántur.'
      - type: citation
        text: '68:30 Ego sum pauper et dolens: * salus tua, Deus, suscépit me.'
      - type: citation
        text: '68:31 Laudábo nomen Dei cum cántico: * et magnificábo eum in laude:'
      - type: citation
        text: '68:32 Et placébit Deo super vítulum novéllum: * córnua producéntem et úngulas.'
      - type: citation
        text: '68:33 Vídeant páuperes et læténtur: * quǽrite Deum, et vivet ánima vestra.'
      - type: citation
        text: '68:34 Quóniam exaudívit páuperes Dóminus: * et vinctos suos non despéxit.'
      - type: citation
        text: 68:35 Laudent illum cæli et terra, * mare et ómnia reptília in eis.
      - type: citation
        text: '68:36 Quóniam Deus salvam fáciet Sion: * et ædificabúntur civitátes Iuda.'
      - type: citation
        text: 68:36 Et inhabitábunt ibi, * et hereditáte acquírent eam.
      - type: citation
        text: '68:37 Et semen servórum eius possidébit eam: * et qui díligunt nomen eius, habitábunt in ea.'
      en2:
      - type: citation
        text: '68:2 Save me, O God: * for the waters have entered, even to my soul.'
      - type: citation
        text: '68:3 I have become stuck in a deep quagmire: * and there is no firm footing.'
      - type: citation
        text: '68:3 I have arrived at the height of the sea: * and a tempest has overwhelmed me.'
      - type: citation
        text: '68:4 I have endured hardships, while crying out; my jaws have become hoarse: * my eyes have failed, while I hoped in my God.'
      - type: citation
        text: 68:5 Those who hate me without cause have been multiplied beyond the hairs of my head, * who hate me without cause.
      - type: citation
        text: '68:5 My enemies who persecuted me unjustly have been strengthened: * then I was required to pay for what I did not take.'
      - type: citation
        text: '68:6 O God, you know my foolishness: * and my offenses have not been hidden from you.'
      - type: citation
        text: 68:7 Let those who wait for you, O Lord, * O Lord of hosts, not be shamed in me.
      - type: citation
        text: 68:7 Let those who seek you, O God of Israel, * not be confounded over me.
      - type: citation
        text: '68:8 For because of you, I have endured reproach: * confusion has covered my face.'
      - type: citation
        text: 68:9 I have become a stranger to my brothers, * and a sojourner to the sons of my mother.
      - type: citation
        text: '68:10 For zeal for your house has consumed me: * and the reproaches of those who reproached you have fallen upon me.'
      - type: citation
        text: '68:11 And I covered my soul with fasting: * and it has become a reproach to me.'
      - type: citation
        text: '68:12 And I made sackcloth my garment: * and I became a byword to them.'
      - type: citation
        text: '68:13 They who sat at the gate spoke against me: * and they that drank wine made me their song.'
      - type: citation
        text: '68:13 But as for me, my prayer is to you, O Lord: * a time of your good pleasure, O God.'
      - type: citation
        text: '68:14 In the multitude of your mercy hear me, * in the truth of your salvation:'
      - type: citation
        text: '68:15 Draw me out of the mire, that I may not stick fast: * deliver me from those who hate me, and from the deep waters.'
      - type: citation
        text: '68:16 Let not the tempest of water overwhelm me, nor the deep swallow me up: * nor let the pit close its mouth upon me.'
      - type: citation
        text: '68:17 Hear me, O Lord, for your mercy is kind: * look upon me according to the multitude of your tender mercies.'
      - type: citation
        text: '68:18 And turn not away your face from your servant: * for I am in trouble, hear me speedily.'
      - type: citation
        text: '68:19 Attend to my soul and deliver it: * rescue me because of my enemies.'
      - type: citation
        text: 68:20 You know my reproach, and my confusion, * and my shame.
      - type: citation
        text: '68:21 In your sight are all those who afflict me: * my heart has expected reproach and misery.'
      - type: citation
        text: '68:21 And I looked for one who would grieve together with me, and there was none: * and for one who would comfort me, and I found none.'
      - type: citation
        text: '68:22 And they gave me gall for my food: * and in my thirst they gave me vinegar to drink.'
      - type: citation
        text: 68:23 Let their table become a snare before them, * and a recompense, and a stumbling block.
      - type: citation
        text: '68:24 Let their eyes be darkened so that they may not see: * and bend down their back always.'
      - type: citation
        text: '68:25 Pour out your indignation upon them: * and let your wrathful anger take hold of them.'
      - type: citation
        text: '68:26 Let their habitation be made desolate: * and let there be none to dwell in their tents.'
      - type: citation
        text: '68:27 Because they have persecuted him whom you have smitten: * and they have added to the grief of my wounds.'
      - type: citation
        text: '68:28 Add iniquity upon their iniquity: * and let them not enter into your justice.'
      - type: citation
        text: '68:29 Let them be blotted out of the book of the living: * and let them not be written with the just.'
      - type: citation
        text: '68:30 But I am poor and sorrowful: * your salvation, O God, has lifted me up.'
      - type: citation
        text: '68:31 I will praise the name of God with a canticle: * and I will magnify him with praise:'
      - type: citation
        text: '68:32 And it shall please God better than a young calf: * that bringeth forth horns and hoofs.'
      - type: citation
        text: '68:33 Let the poor see and rejoice: * seek God, and your soul shall live.'
      - type: citation
        text: '68:34 For the Lord has heard the poor: * and has not despised his prisoners.'
      - type: citation
        text: 68:35 Let the heavens and the earth praise him, * the sea, and every thing that creeps therein.
      - type: citation
        text: '68:36 For God will save Sion: * and the cities of Juda shall be built up.'
      - type: citation
        text: 68:36 And they shall dwell there, * and shall acquire it by inheritance.
      - type: citation
        text: '68:37 And the seed of his servants shall possess it: * and they that love his name shall dwell in it.'
  psalm.69-2-deus-in-adiut-rium-meum-int-nde-d-mine-ad-a-922a2b3ce1:
    role: psalm
    content:
      en:
      - type: citation
        text: 69:2 O God, come to my assistance; * O Lord, make haste to help me.
      - type: citation
        text: '69:3 Let them be confounded and ashamed * that seek my soul:'
      - type: citation
        text: '69:4 Let them be turned backward, and blush for shame * that desire evils to me:'
      - type: citation
        text: '69:4 Let them be presently turned away blushing for shame * that say to me: ’T is well, ’t is well.'
      - type: citation
        text: '69:5 Let all that seek thee rejoice and be glad in thee; * and let such as love thy salvation say always: The Lord be magnified.'
      - type: citation
        text: 69:6 But I am needy and poor; * O God, help me.
      - type: citation
        text: '69:6 Thou art my helper and my deliverer: * O Lord, make no delay.'
      la:
      - type: citation
        text: '69:2 Deus, in adiutórium meum inténde: * Dómine, ad adiuvándum me festína.'
      - type: citation
        text: 69:3 Confundántur et revereántur, * qui quærunt ánimam meam.
      - type: citation
        text: 69:4 Avertántur retrórsum, et erubéscant, * qui volunt mihi mala.
      - type: citation
        text: '69:4 Avertántur statim erubescéntes, * qui dicunt mihi: Euge, euge.'
      - type: citation
        text: '69:5 Exsúltent et læténtur in te omnes qui quærunt te, * et dicant semper: Magnificétur Dóminus: qui díligunt salutáre tuum.'
      - type: citation
        text: '69:6 Ego vero egénus, et pauper sum: * Deus, ádiuva me.'
      - type: citation
        text: '69:6 Adiútor meus, et liberátor meus es tu: * Dómine, ne moréris.'
      en2:
      - type: citation
        text: '69:2 O God, come to my assistance: * O Lord, make haste to help me.'
      - type: citation
        text: 69:3 Let them be confounded and ashamed * who seek my soul.
      - type: citation
        text: 69:4 Let them be turned backward and blush, * who desire evils to me.
      - type: citation
        text: '69:4 Let them be immediately turned away blushing, * who say to me: It is well, it is well.'
      - type: citation
        text: '69:5 Let all who seek you rejoice and be glad in you, * and let those who love your salvation say always: The Lord be magnified.'
      - type: citation
        text: '69:6 But I am needy and poor: * O God, help me.'
      - type: citation
        text: '69:6 You are my helper and my deliverer: * O Lord, make no delay.'
  psalm.7-2-d-mine-deus-meus-in-te-sper-vi-salvum-me-fac-dc672b037a:
    role: psalm
    content:
      en:
      - type: citation
        text: '7:2 O Lord my God, in thee have I put my trust: * save me from all them that persecute me, and deliver me.'
      - type: citation
        text: 7:3 Lest at any time he seize upon my soul like a lion, * while there is no one to redeem me, nor to save.
      - type: citation
        text: '7:4 O Lord my God, if I have done this thing, * if there be iniquity in my hands:'
      - type: citation
        text: 7:5 If I have rendered to them that repaid me evils, * let me deservedly fall empty before my enemies.
      - type: citation
        text: 7:6 Let the enemy pursue my soul, † and take it, and tread down my life on the earth, * and bring down my glory to the dust.
      - type: citation
        text: '7:7a Rise up, O Lord, in thy anger: * and be thou exalted in the borders of my enemies.'
      - type: citation
        text: '7:7b And arise, O Lord my God, in the precept which thou hast commanded: * (8a) and a congregation of people shall surround thee.'
      - type: citation
        text: 7:8b And for their sakes return thou on high. * (9a) The Lord judgeth the people.
      - type: citation
        text: 7:9b Judge me, O Lord, according to my justice, * and according to my innocence in me.
      - type: citation
        text: '7:10 The wickedness of sinners shall be brought to nought: and thou shalt direct the just: * the searcher of hearts and reins is God.'
      - type: citation
        text: '7:11 Just is my help from the Lord: * who saveth the upright of heart.'
      - type: citation
        text: '7:12 God is a just judge, strong and patient: * is he angry every day?'
      - type: citation
        text: '7:13 Except you will be converted, he will brandish his sword: * he hath bent his bow, and made it ready.'
      - type: citation
        text: 7:14 And in it he hath prepared the instruments of death, * he hath made ready his arrows for them that burn.
      - type: citation
        text: 7:15 Behold he hath been in labour with injustice; * he hath conceived sorrow, and brought forth iniquity.
      - type: citation
        text: '7:16 He hath opened a pit and dug it: * and he is fallen into the hole he made.'
      - type: citation
        text: '7:17 His sorrow shall be turned on his own head: * and his iniquity shall come down upon his crown.'
      - type: citation
        text: '7:18 I will give glory to the Lord according to his justice: * and will sing to the name of the Lord the most High.'
